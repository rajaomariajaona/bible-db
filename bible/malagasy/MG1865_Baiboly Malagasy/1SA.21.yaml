document_id: 1SA.21,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nandosiran'i Davida nankany Noba, sy ny nialany tany nankany Gata
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Dia nitsangana Davida ka lasa; fa Jonatana kosa nankany an-tanàna.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa hoy ny mpisorona: Ny sabatr''i Goliata Filistina, ilay novonoinao tao amin''ny lohasaha Elaha, indro, fa mifono lamba ao ivohon''ny efoda izy; ka raha iny no ho entinao, dia ento; fa tsy misy afa-tsy iny eto. Ary hoy Davida: Tsy misy tahaka iny, fa omeo ahy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary Davida niainga nandositra tamin''izany andro izany mba tsy ho azon''i Saoly, dia nankany amin''i Akisy, mpanjakan''i Gata. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary hoy ny mpanompon''i Akisy taminy: Tsy ity moa no Davida, mpanjakan''ny tany? Tsy izy va no nandihizany sy nifampihirany hoe: Saoly nahafaty arivoarivo, Fa Davida nahafaty alinalina? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary dia nalatsak''i Davida tao am-pony izany teny izany, ka natahotra an''i Akisy, mpanjakan''i Gata, indrindra izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia nody adala teo anatrehany izy ka nanao tahaka ny olona very saina teo aminy, fa nanoratsoratra teo amin''ny lela-vavahady izy, sady navelany hitsororoka tamin''ny somony ny iviny. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary hoy Akisy tamin''ny mpanompony: He! hitanareo fa very saina io lehilahy io, ka nahoana no nentinareo etỳ amiko izy? Izaho moa mitady olona very saina, no nitondranareo ity olona very saina ity mba hanondrana eto anatrehako? Moa hiditra ato an-tranoko va ilehio?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary Davida tonga tany Noba, tany amin''i Ahimeleka mpisorona; ary toran-kovitra Ahimeleka, raha nihaona tamin''i Davida, ka nanao taminy hoe: Nahoana no mandeha irery ianao, fa tsy misy manaraka anao? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia hoy Davida tamin''i Ahimeleka mpisorona: Ny mpanjaka efa nanome raharaha ahy, ka hoy izy tamiko: Aoka tsy ho fantatr''olona ny raharaha nanirahako sy nandidiako anao; ka dia nasaiko nankary ny zatovoko. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Koa inona no misy ato aminao? Omeo mofo dimy aho ho etỳ an-tanako, na izay misy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary ny mpisorona namaly an''i Davida hoe: Tsy misy mofo fihinana ato amiko, fa mofo masina ihany no ato, ka raha mba nifady vehivavy ahay mantsy ny zatovo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary Davida namaly ny mpisorona ka nanao taminy hoe: Eny, fa hatramin''ny hateloana efa tsy niara-nitoetra tamim-behivavy rahateo izahay; ary tamin''izaho niainga dia masina ny fanaky ny zatovo; ary na dia tsy masina aza ny lalana, dia hohamasinina anio izy noho ny fanaka. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary ny mpisorona nanome azy mofo masina; fa tsy nisy mofo teo, afa-tsy ny mofo aseho, izay nalainy teo anatrehan''i Jehovah, mba hasiana mofo mafana tamin''ny andro nanesorana azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '(Nefa nisy anankiray tamin''ny mpanompon''i Saoly teo tamin''izany andro izany, voahazona teo anatrehan''i Jehovah, Doega Edomita no anarany; lehiben''ny mpiandrin''i Saoly izy.) '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary hoy Davida tamin''i Ahimeleka: Tsy misy lefona na sabatra va eto aminao? fa izaho tsy nitondra ny sabatro na ny fiadiako etỳ amiko, satria nahamaika ny raharahan''ny mpanjaka. '
