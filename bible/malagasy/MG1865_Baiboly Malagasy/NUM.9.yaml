document_id: NUM.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny rahona izay nitarihan'i Jehovah ny Zanak'Isiraely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy tany an-efitr''i Sinay tamin''ny volana voalohany tamin''ny taona faharoa taorian''ny nivoahany avy tany amin''ny tany Egypta ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Aoka hotandreman''ny Zanak''Isiraely ny Paska amin''ny fotoany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Amin''ny harivan''ny andro fahefatra ambin''ny folo amin''ity volana ity no hitandremanareo azy amin''ny fotoany; araka ny didy sy ny fanao rehetra aminy no hitandremanareo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Mosesy niteny tamin''ny Zanak''Isiraely mba hitandrina ny Paska. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nitandrina ny Paska tany an-efitr''i Sinay izy tamin''ny harivan''ny andro fahefatra ambin''ny folo tamin''ny volana voalohany; araka izay rehetra efa nandidian''i Jehovah an''i Mosesy no nataon''ny Zanak''Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nisy olona sasany izay naloto tamim-paty ka tsy nahazo nitandrina ny Paska tamin''izany andro izany; dia nankeo anatrehan''i Mosesy sy Arona izy tamin''izany andro izany '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ka nanao taminy hoe: Maloto tamim-paty izahay, ka nahoana no sakanana tsy hiaraka amin''ny Zanak''Isiraely hanatitra ny fanatitra ho an''i Jehovah amin''ny fotoany? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hoy Mosesy taminy: Andraso aloha, fa hanontaniako izay handidian''i Jehovah ny aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mitenena amin''ny Zanak''Isiraely hoe: Raha misy olona eo aminareo, na eo amin''ny taranakareo hatramin''ny fara mandimby, maloto amim-paty, na lasan-davitra, dia mbola hitandrina ny Paska ho an''i Jehovah ihany koa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Amin''ny harivan''ny andro fahefatra ambin''ny folo amin''ny volana faharoa no hitandremany azy; ary hampiarahina amin''ny mofo tsy misy masirasira sy ny anana mangidy no fihinany azy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Aza avela hasiany sisa ho tra-maraina, ary aza avela hisy hotapahiny ny taolany; araka ny lalàna rehetra ny amin''ny Paska ihany koa no hitandremany azy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa ny olona izay madio sady tsy lasan-davitra, nefa tsy mety mitandrina ny Paska, dia hofongorana tsy ho amin''ny fireneny, satria tsy nanatitra ny fanatitra ho an''i Jehovah tamin''ny fotoany izy; ho meloka izany olona izany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary raha misy mivahiny eo aminareo ka mba te-hitandrina ny Paska ho an'i Jehovah, dia araka ny didy sy ny fanao amin'ny Paska ihany no hanaovany azy; lalàna iray ihany no ho aminareo, na vahiny, na tompon-tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary tamin''ny andro izay nananganana ny tabernakely ny rahona dia nanarona ny tabernakely, dia ny trano-lain''ny Vavolombelona; ary nony hariva dia niseho teo ambonin''ny tabernakely tahaka ny afo izy mandra-pahamarain''ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia toy izany mandrakariva izy: ny rahona nanarona azy, nefa niseho tahaka ny afo izy nony alina. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary rehefa niakatra niala tamin''ny tranolay ny rahona, dia niainga ny Zanak''Isiraely, ka teo amin''izay nijanonan''ny rahona no nitobiany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Araka ny didin''i Jehovah no niaingan''ny Zanak''Isiraely, ary araka ny didin''i Jehovah koa no nitobiany; tamin''ny andro rehetra izay nijanonan''ny rahona teo ambonin''ny tabernakely no nitobiany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary na dia nijanona ela teo ambonin''ny tabernakely aza ny rahona, dia nitandrina izay nasain''i Jehovah notandremana ihany ny Zanak''Isiraely ka tsy niainga. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa indraindray kosa dia andro vitsy ihany no nijanonan''ny rahona teo ambonin''ny tabernakely; araka ny didin''i Jehovah ihany no nitobiany, ary araka ny didin''i Jehovah no niaingany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary indraindray kosa dia nijanona hatramin''ny hariva ka hatramin''ny maraina ihany ny rahona, ary raha niakatra izy nony maraina, dia niainga ny Zanak''Isiraely; koa na andro na alina no niakaran''ny rahona, dia niainga izy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary na indroa andro, na iray volana, na ela aza, no nijanonan''ny rahona teo ambonin''ny tabernakely dia mbola nitoby ihany ny Zanak''Isiraely, fa tsy niainga; fa raha niakatra kosa ny rahona, dia niainga izy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Araka ny didin'i Jehovah no nitobiany, ary araka ny didin'i Jehovah no niaingany; nitandrina izay nasain'i Jehovah notandremany izy, araka ny tenin'i Jehovah izay nampitondrainy an'i Mosesy.
