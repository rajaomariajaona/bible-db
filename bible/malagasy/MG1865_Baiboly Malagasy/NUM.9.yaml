document_id: NUM.9,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny rahona izay nitarihan'i Jehovah ny Zanak'Isiraely
  - type: text
    content: 'Ary Jehovah niteny tamin''i Mosesy tany an-efitr''i Sinay tamin''ny volana voalohany tamin''ny taona faharoa taorian''ny nivoahany avy tany amin''ny tany Egypta ka nanao hoe: '
  '10':
  - type: text
    content: 'Mitenena amin''ny Zanak''Isiraely hoe: Raha misy olona eo aminareo, na eo amin''ny taranakareo hatramin''ny fara mandimby, maloto amim-paty, na lasan-davitra, dia mbola hitandrina ny Paska ho an''i Jehovah ihany koa izy. '
  '11':
  - type: text
    content: 'Amin''ny harivan''ny andro fahefatra ambin''ny folo amin''ny volana faharoa no hitandremany azy; ary hampiarahina amin''ny mofo tsy misy masirasira sy ny anana mangidy no fihinany azy. '
  '12':
  - type: text
    content: 'Aza avela hasiany sisa ho tra-maraina, ary aza avela hisy hotapahiny ny taolany; araka ny lalàna rehetra ny amin''ny Paska ihany koa no hitandremany azy. '
  '13':
  - type: text
    content: 'Fa ny olona izay madio sady tsy lasan-davitra, nefa tsy mety mitandrina ny Paska, dia hofongorana tsy ho amin''ny fireneny, satria tsy nanatitra ny fanatitra ho an''i Jehovah tamin''ny fotoany izy; ho meloka izany olona izany. '
  '14':
  - type: text
    content: Ary raha misy mivahiny eo aminareo ka mba te-hitandrina ny Paska ho an'i Jehovah, dia araka ny didy sy ny fanao amin'ny Paska ihany no hanaovany azy; lalàna iray ihany no ho aminareo, na vahiny, na tompon-tany.
  '15':
  - type: text
    content: 'Ary tamin''ny andro izay nananganana ny tabernakely ny rahona dia nanarona ny tabernakely, dia ny trano-lain''ny Vavolombelona; ary nony hariva dia niseho teo ambonin''ny tabernakely tahaka ny afo izy mandra-pahamarain''ny andro. '
  '16':
  - type: text
    content: 'Dia toy izany mandrakariva izy: ny rahona nanarona azy, nefa niseho tahaka ny afo izy nony alina. '
  '17':
  - type: text
    content: 'Ary rehefa niakatra niala tamin''ny tranolay ny rahona, dia niainga ny Zanak''Isiraely, ka teo amin''izay nijanonan''ny rahona no nitobiany. '
  '18':
  - type: text
    content: 'Araka ny didin''i Jehovah no niaingan''ny Zanak''Isiraely, ary araka ny didin''i Jehovah koa no nitobiany; tamin''ny andro rehetra izay nijanonan''ny rahona teo ambonin''ny tabernakely no nitobiany. '
  '19':
  - type: text
    content: 'Ary na dia nijanona ela teo ambonin''ny tabernakely aza ny rahona, dia nitandrina izay nasain''i Jehovah notandremana ihany ny Zanak''Isiraely ka tsy niainga. '
  '2':
  - type: text
    content: 'Aoka hotandreman''ny Zanak''Isiraely ny Paska amin''ny fotoany. '
  '20':
  - type: text
    content: 'Fa indraindray kosa dia andro vitsy ihany no nijanonan''ny rahona teo ambonin''ny tabernakely; araka ny didin''i Jehovah ihany no nitobiany, ary araka ny didin''i Jehovah no niaingany. '
  '21':
  - type: text
    content: 'Ary indraindray kosa dia nijanona hatramin''ny hariva ka hatramin''ny maraina ihany ny rahona, ary raha niakatra izy nony maraina, dia niainga ny Zanak''Isiraely; koa na andro na alina no niakaran''ny rahona, dia niainga izy. '
  '22':
  - type: text
    content: 'Ary na indroa andro, na iray volana, na ela aza, no nijanonan''ny rahona teo ambonin''ny tabernakely dia mbola nitoby ihany ny Zanak''Isiraely, fa tsy niainga; fa raha niakatra kosa ny rahona, dia niainga izy. '
  '23':
  - type: text
    content: Araka ny didin'i Jehovah no nitobiany, ary araka ny didin'i Jehovah no niaingany; nitandrina izay nasain'i Jehovah notandremany izy, araka ny tenin'i Jehovah izay nampitondrainy an'i Mosesy.
  '3':
  - type: text
    content: 'Amin''ny harivan''ny andro fahefatra ambin''ny folo amin''ity volana ity no hitandremanareo azy amin''ny fotoany; araka ny didy sy ny fanao rehetra aminy no hitandremanareo azy. '
  '4':
  - type: text
    content: 'Ary Mosesy niteny tamin''ny Zanak''Isiraely mba hitandrina ny Paska. '
  '5':
  - type: text
    content: 'Dia nitandrina ny Paska tany an-efitr''i Sinay izy tamin''ny harivan''ny andro fahefatra ambin''ny folo tamin''ny volana voalohany; araka izay rehetra efa nandidian''i Jehovah an''i Mosesy no nataon''ny Zanak''Isiraely. '
  '6':
  - type: text
    content: 'Ary nisy olona sasany izay naloto tamim-paty ka tsy nahazo nitandrina ny Paska tamin''izany andro izany; dia nankeo anatrehan''i Mosesy sy Arona izy tamin''izany andro izany '
  '7':
  - type: text
    content: 'ka nanao taminy hoe: Maloto tamim-paty izahay, ka nahoana no sakanana tsy hiaraka amin''ny Zanak''Isiraely hanatitra ny fanatitra ho an''i Jehovah amin''ny fotoany? '
  '8':
  - type: text
    content: 'Fa hoy Mosesy taminy: Andraso aloha, fa hanontaniako izay handidian''i Jehovah ny aminareo. '
  '9':
  - type: text
    content: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
