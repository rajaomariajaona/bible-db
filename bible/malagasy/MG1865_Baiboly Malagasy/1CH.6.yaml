document_id: 1CH.6,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin''i Levy dia Gersona sy Kehata ary Merary. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny zakalahin''i Elkana dia Amasay sy Ahimota. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny amin''i Elkana, ny zananilahy dia Zofay, ary Nahata no zanakalahin''i Zofay, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eliaba no zanakalahin''i Nahata, Jerohama no zanakalahin''i Eliaba, Elkana no zanakalahin''i Jerohama. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny zanakalahin'i Samoela dia Vasny lahimatoa sy Abia
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: (Jozla sy Abia faralahy); izahao and 18 sy 1 Sam. viii.2'
      marker-yv: yv-n
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin''i Merary dia Maly, Libny no zanakalahin''i Maly, Semey no zanakalahin''i Libny, Oza no zanakalahin''i Semey, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simea no zanakalahin''i Oza, Hagia no zanakalahin''i Simea, Asaba no zanakalahin''i Hagia. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no notendren''i Davida ho mpiventy hira tao amin''ny tranon''i Jehovah, rehefa voapetraka tao ny fiara, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nanao hira fanompoam-pivavahana izy tao amin''ny tabernakely, dia ny trano-lay fihaonana, ambara-panaon''i Solomona ny tranon''i Jehovah tany Jerosalema; koa raha nanao ny raharahany izy, dia nitsangana araka ny filaharany avy, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia izao no nanompo mbamin''ny zanany: Tamin''ny zanakalahin''ny Kehatita dia Hemana mpihira, zanakalahin''i Joela, zanakalahin''i Samoela, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: zanakalahin'i Elkana, zanakalahin'i Jerohama, zanakalahin'i Eliala, zanakalahin'i Toa.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no anaran''ny zanakalahin''i Gersona: Libny sy Semey. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'zanakalahin''i Zofa, zanakalahin''i Elkana, zanakalahin''i Mahata, zanakalahin''i Amasay, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: zanakalahin'i Elkana, zanakalahin'i Joela, zanakalahin'i Azaria, zanakalahin'i Zefania,
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'zanakalahin''i Tahata, zanakalahin''i Asira, zanakalahin''i Ebiasafa, zanakalahin''i Kora, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'zanakalahin''i Jizara, zanakalahin''i Kehata, zanakalahin''i Levy, zanak''Isiraely. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Asafa rahalahiny, izay nitsangana teo amin''ny ankavanany, dia Asafa, zanakalahin''i Berekia, zanakalahin''i Simea, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'zanakalahin''i Mikaela, zanakalahin''i Beseia, zanakalahin''i Malkia, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'zanakalahin''i Etny, zanakalahin''i Zera, zanakalahin''i Adaia, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'zanakalahin''i Etana, zanakalahin''i Zima, zanakalahin''i Simey, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: zanakalahin'i Jahata, zanakalahin'i Gersona, zanakalahin'i Levy.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny rahalahin''ireo kosa, dia ny zanakalahin''i Merary, nitsangana teo amin''ny ankaviany: Etana, zanakalahin''i Kisy, zanakalahin''i Abdia, zanakalahin''i Maloka, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny zanakalahin''i Kehata dia Amrama sy Jizara sy Hebrona ary Oziela. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: zanakalahin'i Hasabia, zanakalahin'i Amazia, zanakalahin'i Hilkia,
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'zanakalahin''i Amzy, zanakalahin''i Bany, zanakalahin''i Samera, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'zanakalahin''i Maly, zanakalahin''i Mosy, zanakalahin''i Merary, zanakalahin''i Levy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny Levita rahalahin'ireo koa dia efa nomena hanao ny fanompoana rehetra ao amin'ny tabernakelin'ny tranon'Andriamanitra.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa Arona sy ny zananilahy no nanatitra
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. nandoro ho fofona
      marker-yv: yv-n
    - type: text
      text: ' teo ambonin''ny alitara fandoroana ny fanatitra dorana sy teo ambonin''ny alitara fandoroana ditin-kazo manitra, mba hanao ny raharaha rehetra ao amin''ny fitoerana masina indrindra sy hanao fanavotana ho an''ny Isiraely, araka izay rehetra nandidian''i Mosesy, mpanompon''Andriamanitra. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny zanakalahin''i Arona dia Eleazara, ary Finehasa no zanakalahin''i Eleazara, Abisoa no zanakalahin''i Finehasa, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Boky no zanakalahin''i Abisoa, Ozy no zanakalahin''i Boky, Zerahia no zanakalahin''i Ozy, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Meraiota no zanakalahin''i Zerahia, Amaria no zanakalahin''i Meraiota, Ahitoba no zanakalahin''i Amaria, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zadoka no zanakalahin''i Ahitoba, Ahimaza no zanakalahin''i Zadoka. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no fonenany araka ny vohiny tao amin''ny zara-taniny avy, dia ny an''ny taranak''i Arona, avy amin''ny fokon''ny Kehatita; fa azy ny loka: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin''i Merary dia Maly sy Mosy. Ary izao no fokon''ny Levita araka ny rainy: '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nomeny azy Hebrona tao amin''ny tanin''ny Joda sy ny tany manodidina azy. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny saha momba ny tanàna sy ny vohiny kosa nomeny an''i Kaleba, zanak''i Jefone. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny taranak''i Arona nomeny an''i Hebrona, tanàna fiarovana, ary Libna sy ny tany manodidina azy ary Jatira sy Estemoa sy ny tany manodidina azy '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary Hilena sy ny tany manodidina azy ary Debira sy ny tany manodidina azy
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary Asana sy ny tany manodidina azy ary Beti-semesy sy ny tany manodidina azy; '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary avy tamin''ny firenen''i Benjamina dia Geba sy ny tany manodidina azy ary Alemeta sy ny tany manodidina azy ary Anotata sy ny tany manodidina azy. Dia telo ambin''ny folo no isan''ny tanànan''izy mianakavy rehetra. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny an''ny taranak''i Kehata sisa tamin''ny fokon''izany firenena izany dia tanàna folo araka ny filokana tamin''ny antsasaky ny firenen''i Manase. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny an'ny taranak'i Gersona araka ny fokony dia tanàna telo ambin'ny folo tamin'ny firenen'Isakara sy ny firenen'i Asera sy ny firenen'i Naftaly ary ny firenen'i Manase any Basana.
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny loka azon''ny taranak''i Merary araka ny fokony dia tanàna roa ambini ny folo avy tamin''ny firenen''i Robena sy ny firenen''i Gada ary ny firenen''i Zebolona. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nomen'ny Zanak'i Isiraely ho an'ny Levita ireo tanàna ireo sy ny tany manodidina azy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy amin''i Gersona: Libny no zanak''i Gersona, Jahata no zanak''i Libny, Zima no zanak''i Jahata, '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nomeny tamin''ny filokana ireto tanàna tononina ireto avy tamin''ny firenena taranak''i Joda sy ny firenena taranak''i Simeona ary ny firenena taranak''i Benjamina. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny sasany amin''ny fokon''ny taranak''i Kehata dia nahazo tanàna avy tamin''ny firenen''i Efraima. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nomeny azy Sekema, tanàna fiarovana, tao amin''ny tany havoan''i Efraima sy ny tany manodidina azy ary Gazera sy ny tany manodidina azy '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary Jokmeama sy ny tany manodidina azy ary Beti-horona sy ny tany manodidina azy
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary Aialona sy ny tany manodidina azy ary Gata-rimona sy ny tany manodidina azy; '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny avy tamin''ny antsasaky ny firenen''i Manase dia Amera sy ny tany manodidina azy ary Bileama sy ny tany manodidina azy, dia ho an''ny fokon''ny taranak''i Kehata sisa. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny an''ny taranak''i Gersona dia Golana any Basana sy ny tany manodidina azy ary Astarta, sy ny tany manodidina azy avy tamin''ny antsasaky ny firenen''i Manase; '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny avy tamin''ny firenen''Isakara dia Kadesy sy ny tany manodidina azy ary Daberata sy ny tany manodidina azy '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary Ramota sy ny tany manodidina azy ary Anema sy ny tany manodidina azy; '
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny avy tamin''ny firenen''i Asera dia Masala sy ny tany manodidina azy ary Abdona sy ny tany manodidina azy '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joa no zanak''i Zima, Ido no zanak''i Joa, Zera no zanak''Ido, Jeateray zanak''i Zera. '
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary Hokoka sy ny tany manodidina azy ary Rehoba sy ny tany manodidina azy; '
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny avy tamin''ny firenen''i Naftaly dia Kadesy any Galilia sy ny tany manodidina azy ary Hamona sy ny tany manodidina azy ary Kiriataima sy ny tany manodidina azy. '
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny an''ny sisa, taranak''i Merary, dia avy tamin''ny firenen''i Zebolona, dia Rimono sy ny tany manodidina azy ary Tabara sy ny tany manodidina azy; '
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary any an-dafin''i Jordana, tandrifin''i Jeriko, atsinanan''i Jordana, koa dia avy tamin''ny firenen''i Robena, dia Bazera any an-efitra sy ny tany manodidina azy ary Jaza sy ny tany manodidina azy '
  '64':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary Kedemota sy ny tany manodidina azy ary Mefata sy ny tany manodidina azy; '
  '65':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary avy tamin''ny firenen''i Gada dia Ramota-gileada sy ny tany manodidina azy ary Mahanaima sy ny tany manodidina azy '
  '66':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary Hesbona sy ny tany manodidina azy ary Jazera sy ny tany manodidina azy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin''i Kehata dia Aminadaba, Kora no zanakalahin''i Aminadaba, Asira no zakalahin''i Kora, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elkana no zanakalahin''i Asira, Ebiasafa no zanakalahin''i Elkana, Asira no zanakalahin''i Ebiasafa, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tahata no zanakalahin''i Asira, Oriela no zanakalahin''i Tahata, Ozia no zanakalahin''i Oriela, ary Saoly no zanakalahin''i Ozia. '
