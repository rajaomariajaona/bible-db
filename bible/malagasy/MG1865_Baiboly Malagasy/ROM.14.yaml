document_id: ROM.14,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny handraisana izay malemy finoana, sy ny tokony hifandeferana
  - type: text
    content: 'Ary raiso ny malemy finoana, nefa aza ,mandray azy hitsaranareo ny eritreriny. '
  '10':
  - type: text
    content: 'Fa nahoana ianao no mitsara ny rahalahinao? Ary nahoana kosa ianao no manao tsinontsinona ny rahalahinao? Fa samy hiseho eo anoloan''ny fitsaran''Andriamanitra isika rehetra. '
  '11':
  - type: text
    content: 'Fa voasoratra hoe: Raha velona koa Aho, hoy Jehovah, ny lohalika rehetra handohalika amiko, Ary ny lela rehetra hidera an''Andriamanitra (Isa. 45. 23). '
  '12':
  - type: text
    content: 'Koa samy hampamoahin''Andriamanitra ny amin''ny tenany avy isika rehetra. '
  '13':
  - type: text
    content: Koa aza mifampitsara intsony isika; fa aleo mihevitra
  - type: note
    content: Gr. mitsara
  - type: text
    content: ' izao, dia ny tsy hanisy fandavoana na fanafintohinana eo anoloan''ny rahalahy. '
  '14':
  - type: text
    content: 'Mahalala sady matoky ao amin''i Jesosy Tompo aho fa tsy misy zavatra maloto ho azy; fa raha misy manao zavatra ho maloto, dia aminy ihany no maloto izany. '
  '15':
  - type: text
    content: 'Fa raha mampalahelo ny rahalahinao ny fihinanao, dia tsy mba manaraka ny fitiavana intsony ianao. Aza ny fihinanao no animbanao azy, fa efa maty Kristy hamonjy azy. '
  '16':
  - type: text
    content: Aoka ary tsy mba hotenenina ratsy
  - type: note
    content: Gr. hanaovana blasfemia; izahao Mat.9.3
  - type: text
    content: ' ny fahasoavana azonareo. '
  '17':
  - type: text
    content: 'Fa ny fanjakan''Andriamanitra dia tsy amin''ny fihinanana sy ny fisotroana, fa fahamarinana sy fiadanana ary fifaliana ao amin''ny Fanahy Masina. '
  '18':
  - type: text
    content: 'Fa izay manompo an''i Kristy amin''izany zavatra izany no sitrak''Andriamanitra sy eken''ny olona fa tsara. '
  '19':
  - type: text
    content: 'Koa dia aoka isika hiezaka hitady ny momba ny fiadanana sy ny momba ny fifampandrosoana. '
  '2':
  - type: text
    content: 'Ny anankiray mino fa mahazo mihinana ny zavatra rehatra izy, fa ny anankiray kosa malemy finoana, ka dia mihinana zava-maniry ihany. '
  '20':
  - type: text
    content: 'Aza izay hanina no andravanao ny asan''Andriamanitra. Madio avokoa ny zavatra rehetra, nefa ratsy ho an''ny olona izay mihinana amin''ny fahatafintohinana. '
  '21':
  - type: text
    content: Fa tsara ny tsy mihinana hena, na misotro divay, na manao izay hahatafintohina
  - type: note
    content: 'Ampio hoe: na hahalavo, na hahalemy'
  - type: text
    content: ' ny rahalahinao. '
  '22':
  - type: text
    content: 'Ny finoana izay anananao dia hazòny ho anao eo anatrehan''Andriamanitra. Sambatra izay tsy manameloka ny tenany amin''izay zavatra ekeny. '
  '23':
  - type: text
    content: Fa izay miahanahana dia meloka raha homana, satria tsy avy amin'ny finoana izany; fa ota izay rehetra tsy avy amin'ny finoana.
  '3':
  - type: text
    content: 'Aoka ny mihinana tsy hanamavo ny tsy mihinana; ary aoka kosa ny tsy mihinana tsy hitsara ny mihinana; fa Andriamanitra no efa nandray ary. '
  '4':
  - type: text
    content: 'Iza moa ianao izay mitsara ny mpanompon''ny hafa? Amin''ny tompony ihany no ijoroany na ahalavoany. Nefa hampitoerina ihany izy; fa mahay mampitoetra azy ny Tompo. '
  '5':
  - type: text
    content: 'Ny anankiray manao ny andro anankiray ho mihoatra noho ny andro sasany; ary ny anankiray kosa manao ny andro rehetra hitovy. Aoka samy hatoky tsara ao amin''ny sainy avy izy. '
  '6':
  - type: text
    content: 'Ny mitandrina ny andro dia mitandrina izany ho an''ny Tompo. Ary ny mihinana dia mihinana ho an''ny Tompo, satria misaotra an''Andriamanitra izy; ary ny tsy mihinana kosa dia tsy mihinana ho an''ny Tompo, sady misaotra an''Andriamanitra koa izy. '
  '7':
  - type: text
    content: 'Fa tsy misy velon-ko an''ny tenany isika, ary tsy misy maty ho an''ny tenany. '
  '8':
  - type: text
    content: 'Fa raha velona isika, dia velona ho an''ny Tompo; ary raha maty isika, dia maty ho an''ny Tompo; koa amin''izany, na velona na maty isika, dia an''ny Tompo ihany. '
  '9':
  - type: text
    content: 'Fa izany no nahafatesan''i Kristy sy nahavelomany indray, mba ho Tompon''ny maty sy ny velona Izy. '
