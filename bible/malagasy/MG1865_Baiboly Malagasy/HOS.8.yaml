document_id: HOS.8,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny loza hanjo ny Isiraely noho ny nivadihany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ataovy eo am-bavanao
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. lanilaninao
      marker-yv: yv-n
    - type: text
      text: ' ny anjomara! Fa hisy toy ny voromahery hipaoka ny tranon''i Jehovah, satria efa nivadika ny fanekeko sy nandika ny lalàko ireo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary na dia nanangy tany amin''ny jentilisa aza izy, dia hovoriko ankehitriny; Ary hihavitsy izy noho ny entan''ny mpanjakan''ireo mpanapaka. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa Efraima nanao alitara maro hanotana, eny, efa nahazo alitara hanotana izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Na dia soratako ho azy ny teny betsaka amin''ny lalàko aza, dia ataony ho toy ny zavatra tsy izy izany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Mamono zavatra hatao fanatitra ho Ahy izy, eny, mihinana ny henan''izany, nefa tsy sitrak''i Jehovah izany; Ankehitriny dia hotsarovany ny fahotany, ary hovaliany ny helony; Eny, izy ireny dia hiverina ho any Egypta. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Efa nanadino ny Mpanao azy Isiraely ka nanorina trano vaventy, ary Joda nanamaro tanàna mimanda; Fa haterako afo ao an-tanànany, ka holevonin'izany ny trano vaventiny.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Izaho dia hitarainany hoe: Andriamanitro ô, izahay Isiraely mahalala Anao. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ataon''ny Isiraely ho zavatra maharikoriko ny soa; Ny fahavalo no hanenjika azy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ireny dia nanangana mpanjaka nefa tsy avy tamiko; Nifidy mpanapaka izy, nefa tsy fantatro; Ny volafotsiny sy ny volamenany no nataony sampiny mba hamongorana azy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Maharikoriko
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Ataony ho zava-maharikoriko'
      marker-yv: yv-n
    - type: text
      text: ' ilay ombilahy kelinao, ry Samaria; Mirehitra aminareo'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. aminy
      marker-yv: yv-n
    - type: text
      text: ' ny fahatezerako; Mandra-pahoviana no tsy ho tohanareo'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. tohany
      marker-yv: yv-n
    - type: text
      text: ' ny fahadiovana? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa avy tamin''ny Isiraely koa izany; Ny mpiasa no nanao azy, ka dia tsy Andriamanitra izy, fa ho torotoro ilay ombilahy kelin''i Samaria. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa rivotra no nafafiny, ary tadio no hojinjany; Tsy misy vary mitsangana, ny salohiny tsy hisy ventiny; Ary raha tàhiny hisy aza, dia ny olona hafa firenena no hihinana azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Voatelina Isiraely; Ankehitriny dia efa tonga tahaka ny fanaka tsy mahafinaritra izy any amin''ny jentilisa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa niakatra ho any Asyria izy Toy ny borikidia mandeha irery; Efraima dia nanangy ireo lehilahiny
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. fitiavany
      marker-yv: yv-n
    - type: text
      text: ' '
