document_id: HOS.8,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny loza hanjo ny Isiraely noho ny nivadihany
  - type: text
    content: Ataovy eo am-bavanao
  - type: note
    content: Heb. lanilaninao
  - type: text
    content: ' ny anjomara! Fa hisy toy ny voromahery hipaoka ny tranon''i Jehovah, satria efa nivadika ny fanekeko sy nandika ny lalàko ireo. '
  '10':
  - type: text
    content: 'Ary na dia nanangy tany amin''ny jentilisa aza izy, dia hovoriko ankehitriny; Ary hihavitsy izy noho ny entan''ny mpanjakan''ireo mpanapaka. '
  '11':
  - type: text
    content: 'Fa Efraima nanao alitara maro hanotana, eny, efa nahazo alitara hanotana izy. '
  '12':
  - type: text
    content: 'Na dia soratako ho azy ny teny betsaka amin''ny lalàko aza, dia ataony ho toy ny zavatra tsy izy izany. '
  '13':
  - type: text
    content: 'Mamono zavatra hatao fanatitra ho Ahy izy, eny, mihinana ny henan''izany, nefa tsy sitrak''i Jehovah izany; Ankehitriny dia hotsarovany ny fahotany, ary hovaliany ny helony; Eny, izy ireny dia hiverina ho any Egypta. '
  '14':
  - type: text
    content: Efa nanadino ny Mpanao azy Isiraely ka nanorina trano vaventy, ary Joda nanamaro tanàna mimanda; Fa haterako afo ao an-tanànany, ka holevonin'izany ny trano vaventiny.
  '2':
  - type: text
    content: 'Izaho dia hitarainany hoe: Andriamanitro ô, izahay Isiraely mahalala Anao. '
  '3':
  - type: text
    content: 'Ataon''ny Isiraely ho zavatra maharikoriko ny soa; Ny fahavalo no hanenjika azy. '
  '4':
  - type: text
    content: 'Ireny dia nanangana mpanjaka nefa tsy avy tamiko; Nifidy mpanapaka izy, nefa tsy fantatro; Ny volafotsiny sy ny volamenany no nataony sampiny mba hamongorana azy. '
  '5':
  - type: text
    content: Maharikoriko
  - type: note
    content: 'Na: Ataony ho zava-maharikoriko'
  - type: text
    content: ' ilay ombilahy kelinao, ry Samaria; Mirehitra aminareo'
  - type: note
    content: Heb. aminy
  - type: text
    content: ' ny fahatezerako; Mandra-pahoviana no tsy ho tohanareo'
  - type: note
    content: Heb. tohany
  - type: text
    content: ' ny fahadiovana? '
  '6':
  - type: text
    content: 'Fa avy tamin''ny Isiraely koa izany; Ny mpiasa no nanao azy, ka dia tsy Andriamanitra izy, fa ho torotoro ilay ombilahy kelin''i Samaria. '
  '7':
  - type: text
    content: 'Fa rivotra no nafafiny, ary tadio no hojinjany; Tsy misy vary mitsangana, ny salohiny tsy hisy ventiny; Ary raha tàhiny hisy aza, dia ny olona hafa firenena no hihinana azy. '
  '8':
  - type: text
    content: 'Voatelina Isiraely; Ankehitriny dia efa tonga tahaka ny fanaka tsy mahafinaritra izy any amin''ny jentilisa. '
  '9':
  - type: text
    content: Fa niakatra ho any Asyria izy Toy ny borikidia mandeha irery; Efraima dia nanangy ireo lehilahiny
  - type: note
    content: Heb. fitiavany
  - type: text
    content: ' '
