document_id: EZR.7,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nandehanan'ny Jiosy maro koa izay nentin'i Ezra avy tany Babylona
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary rehefa afaka izany, tamin''ny nanjakan''i Artaksersesy, mpanjakan''i Persia, dia niakatra Ezra, zanak''i Seraia, zanak''i Azaria, zanak''i Hilklay '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa Ezra nampiomana ny fony hitady ny lalàn''i Jehovah ka hankatò izany ary hampianatra ny Isiraely didy sy fitsipika. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary izao no tenin''ny taratasy izay nomen''i Artaksersesy mpanjaka an''i Ezra mpisorona, ilay mpanora-dalàna mahay ny tenin''ny lalàn''i Jehovah sy ny didiny tamin''ny Isiraely: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Artaksersesy, mpanjakan''ny mpanjaka, ho an''i Ezra mpisorona, mpanora-dalàna mahay tsara ny lalàn''Andriamanitry ny lanitra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Izaho manao didy fa na iza na iza eto amin''ny fanjakako amin''ny olona Isiraely sy ny mpisorony ary ny Levita no te-hiaraka aminao hankany Jerosalema, dia mahazo mandeha izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa ianao efa nirahin''ny mpanjaka sy izy fito lahy mpanolo-tsainy handinika ny toetran''i Joda sy Jerosalema araka ny lalàn''Andriamanitrao izay eny an-tananao; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ary hitondra ny volafotsy sy ny volamena izay efa naterin''ny mpanjaka sy ireo mpanolo-tsaina tamin''ny sitrapo ho an''Andriamanitry ny Isiraely, Izay monina any Jerosalema; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ary ny volafotsy sy ny volamena rehetra izay ho azonao eran''ny tany Babylona sy ny fanati-tsitrapo aterin''ny olona sy ny mpisorona, dia izay ateriny amin''ny sitrapo hanaovany ny tranon''Andriamaniny, izay any Jerosalema. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Koa amin''izany dia ividiano omby sy ondrilahy sy zanak''ondry mbamin''ny fanatitra hohanina sy ny fanatitra aidina momba azy amin''io vola io araka izay marina, ka atero eo ambonin''ny alitara ao an-tranon''Andriamanitrareo izay any Jerosalema ireny. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary izay rehetra sitrakao sy ny rahalahinao hatao amin''ny volafotsy sy ny volamena sisa, dia ataovy izany araka ny sitrapon''Andriamanitrareo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary ny fanaka izay nomena anao hanaovana ny fanompoana ao an-tranon''Andriamanitrao dia atolory eo anatrehan''Andriamanitra any Jerosalema. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'zanak''i Saloma, zanak''i Zadoka, zanak''i Ahitoba, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary izay rehetra mbola hilainao koa ka tsy maintsy haloanao ho an''ny tranon''Andriamanitrao dia alao ao amin''ny trano firaketan''ny mpanjaka. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary izaho, Artaksersesy mpanjaka, dia manao didy koa ho amin''ny mpitahiry ny haren''ny fanjakana rehetra izay any an-dafin''ny ony, fa na inona na inona no ilain''i Ezra mpisorona, mpanora-dalàna mahay ny lalàn''Andriamanitry ny lanitra, aminareo, dia tovy marina izany, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'na hatramin''ny talenta volafotsy zato sy ny vary tritika zato kora sy ny divay zato bata sy ny diloilo zato bata ary ny sira tsy misy fatrany aza. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Na inona na inona andidian''Andriamanitry ny lanitra dia aoka hataonao tanteraka avokoa ho an''ny tranon''Andriamanitry ny lanitra; fa nahoana no havela hisy fahatezerana hihatra amin''ny fanjakan''ny mpanjaka sy ny zanany? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary mampahafantatra anareo koa izahay fa ny mpisorona rehetra sy ny Levita sy ny mpihira sy ny mpiandry varavarana sy ny Netinima ary ny mpanompo amin''io tranon''Andriamanitra io dia tsy mba hampandoavina hetra, na haba, na sara. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary ianao, ry Ezra, araka ny fahendren''Andriamanitrao izay eo an-tananao, dia manendre mpanapaka sy mpitsara, izay hitsara ny olona rehetra any an-dafin''ny ony, dia izay rehetra mahalala ny lalàn''Andriamanitrao; fa izay tsy mbola mahalala izany dia aoka hampianarinareo. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary na iza na iza tsy mety mankatò ny lalan''Andriamanitrao sy ny lalàn''ny mpanjaka, dia aoka hotsaraina marina izy na hovonoina, na horoahina, na hosazina, na hafatotra. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Isaorana anie Jehovah, Andriamanitry ny razantsika, Izay efa nanisy izany tao am-pon''ny mpanjaka hahatsara tarehy ny tranon''i Jehovah any Jerosalema. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: sady efa nampahazo ahy famindram-po teo anatrehan'ny mpanjaka sy ireo mpanolo-tsainy ary ny mpanapaka lehibe rehetra ao amin'ny mpanjaka. Ary dia nampaherezina aho araka ny nomban'ny tanan'i Jehovah Andriamanitro ahy ka nahangona loholona tamin'ny Isiraely mba hiara-miakatra amiko.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'zanak''i Amaria, zanak''i Azaria, zanak''i Meraiota, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'zanak''i Zerahia, zanak''i Ozy, zanak''i Boky, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'zanak''i Abisoa, zanak''i Finehasa, zanak''i Eleazara, zanak''i Arona mpisoronabe; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'io Ezra io dia niakatra avy tany Babylona (mpanora-dalàna izy sady nahay ny lalàn''i Mosesy, izay efa nomen''i Jehovah, Andriamanitry ny Isiraely); ary nomen''ny mpanjaka azy izay rehetra nangatahiny, araka ny nomban''ny tànan''i Jehovah Andriamaniny azy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary niakatra koa ny sasany amin''ny Zanak''Isiraely sy ny sasany amin''ny mpisorona mbamin''ny Levita sy ny mpihira sy ny mpiandry varavarana ary ny Netinima mba hankany Jerosalema tamin''ny taona fahafito nanjakan''i Artaksersesy mpanjaka. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary tonga tany Jerosalema Ezra tamin''ny volana fahadimy tamin''ny taona fahafito nanjakan''ny mpanjaka. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa tamin''ny andro voalohany tamin''ny volana voalohany no niaingany niakatra avy tany Babylona; ary tamin''ny andro voalohany tamin''ny volana fahadimy no nahatongavany tany Jerosalema araka ny soa nataon''ny tànan''Andriamaniny taminy. '
