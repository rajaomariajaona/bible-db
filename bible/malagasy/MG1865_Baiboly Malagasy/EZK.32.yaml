document_id: EZK.32
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitomaniana noho ny nanjo an'i Farao sy ny vahoakany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin''ny andro voalohany tamin''ny volana faharoa ambin''ny folo tamin''ny taona faharoa ambin''ny folo dia tonga tamiko ny tenin''i Jehovah nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry zanak''olona, manaova hira fahalahelovana ny amin''i Farao, mpanjakan''i Egypta, ka ataovy aminy hoe: Nanao ny tenanao ho tahaka ny liona tanora tamin''ny firenena ianao, kanjo tahaka ny dragona'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Na. mamba
    marker-yv: yv-n
  - type: text
    text: ' ao anatin''ny rano be; Ary nitsoriaka teny amin''ny oninao ianao dia nanakobankobana ny rano tamin''ny tongotrao ka nahaloto ny ony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izao no lazain''i Jehovah Tompo: Ny firenena betsaka tafatambatra no ho entiko mamelatra ny haratoko aminao, ary hakarin''ireny amin''ny haratoko ianao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hatsipiko eny an-tanety ianao ary hariako any an-tsaha, dia hampitangoroniko eo aminao ny voro-manidina rehetra, ary homeko hivokisan''ny bibi-dia rehetra ny tenanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Haeliko eny an-tendrombohitra ny nofonao, ary hofenoiko ny tenabenao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hahavonao
    marker-yv: yv-n
  - type: text
    text: ' ny lohasaha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hataoko safotry ny rànao ny tany Hatramin''ny tendrombohitra aza; Ary ho feno anao ny ony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary raha hovonoiko ny fahazavanao, dia hosaronako ny lanitra: Hotafiako lamba fisaonana ny kintany; Ny masoandro hotakonako rahona, ary ny volana tsy hangarangarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Eny, ireny fanazavana eny amin''ny lanitra ireny dia hotafiako lamba fisaonana avokoa noho ny aminao, ary hosaronako aizina ny taninao, hoy Jehovah Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hataoko mitebiteby koa ny fon''ny firenena maro, raha hampandrenesiko ny firenena maro ny naharavanao, dia any amin''ny tany izay tsy fantatrao '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Eny, hataoko talanjona anao ny firenena maro, Ary hipararetra noho ny aminao ny mpanjakany, raha hantsodiko eo imasony ny sabatro, ary samy hangovitra lalandava izy amin''ny fanahiany ny ainy, raha mby amin''ny andro haharavanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa izao no lazain''i Jehovah Tompo: Ny sabatry ny mpanjakan''i Babylona dia ho tonga aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny sabatry ny mahery, izay samy masiaka indrindra amin''ny firenena, ho entiko mandavo ny vahoakanao maro be, dia horavany ny reharehan''i Egypta, ka ho fongotra ny vahoakany maro be rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Haringako koa ny biby fiompiny rehetra eny amoron''ny rano maro, ary tsy hanakobankobana azy intsony ny tongotry ny olona, na handoto azy ny kitron''ny biby fiompy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia hahenako
  - type: usfm
    marker: x
    children:
    - type: text
      text: Na. hampandriko hadio
    marker-yv: yv-n
  - type: text
    text: ' ny ranony, ary hampandehaniko toy ny diloilo ny oniny, hoy Jehovah Tompo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Raha hataoko lao ny tany Egypta, ka hofoanako tsy hisy na inona na inona izay nahafeno azy teo; Ary haringako ny monina rehetra ao aminy, dia ho fantatra fa Izaho no Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izany no hira fahalahelovana hataon'ny olona; Ny zanakavavin'ny firenena no hihira izany; Eny, ho fahalahelovana an'i Egypta sy ny vahoakany maro be rehetra no hihirany izany, hoy Jehovah Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary tamin''ny andro fahadimy ambin''ny folo tamin''ny volana tamin''ny taona faharoa ambin''ny folo dia tonga tamiko ny tenin''i Jehovah nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ry zanak''olona, isaony ny vahoaka maroben''i Egypta, ary ampidino izy mbamin''ny zanakavavin''ny firenena malaza ho any ambanin''ny tany, miaraka amin''izay midina any an-davaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mihoatra noho ny an'iza moa ny hatsaran-tarehinao? Midina, ka miampara
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mandria
    marker-yv: yv-n
  - type: text
    text: ' amin''izay tsy voafora. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Any amin''ny voatrabaky ny sabatra no hiampatramparany; Ny sabatra dia efa voatolotra; Tariho izy mbamin''ny vahoakany maro be rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izy sy ny nanampy azy no resahin'ireo malaza amin'ny lehilahy mahery any amin'ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: ' manao hoe: Tafidina ka miampatra ny tsy voafora, dia ireo voatrabaky ny sabatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ao koa Asyria mbamin''ny vahoakany maro be rehetra; Manodidina azy ny fasany; Voatrabaka izy rehetra, samy lavon''ny sabatra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Efa natao any am-paravodi-lavaka ny fasany, ary ny vahoakany maro be dia manodidina ny fasany; Voatrabaka izy rehetra, samy lavon''ny sabatra, dia ireo izay nahatonga tahotra tany amin''ny tanin''ny velona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ao koa Elama mbamin''ny vahoakany maro be rehetra manodidina ny fasany; Voatrabaka izy rehetra, samy lavon''ny sabatra, ka tafidina tsy voafora ho any ambanin''ny tany, dia ireo nahatonga ny fahatahorana azy tany amin''ny tanin''ny velona, ary samy mitondra henatra miaraka amin''izay midina any an-davaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Teo amin'ny voatrabaka no nanaovana fandriana ho azy mbamin'ny vahoakany maro be rehetra; Manodidina azy ny fasany, izy rehetra samy tsy voafora sady voatrabaky ny sabatra, fa efa niely tany amin'ny tanin'ny velona ny fahatahorana azy, ary samy mitondra henatra miaraka amin'izay midina any an-davaka izy; Ao amin'ny voa-trabaka no nametrahany azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ao koa Meseka-tobala mbamin''ny vahoakany maro be rehetra; Manodidina azy ny fasany; Samy tsy voafora izy rehetra sady voatrabaky ny sabatra, satria nahatonga ny fahatahorana azy tany amin''ny tanin''ny velona izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary tsy hiara-miampatra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mandry
    marker-yv: yv-n
  - type: text
    text: ' amin''ny lehilahy mahery izay lavo isan''ny tsy voafora izy, dia ireo tafidina any amin''ny fiainan-tsi-hita'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: ' ka mitondra ny fiadiany, sady voapetraka eo ambanin''ny lohany ny sabany. Ary ao amin''ny taolany ny helony, satria nampahatahotra ny mahery tany amin''ny tanin''ny velona izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Eny, ianao dia haripaka ao amin'ny tsy voafora ka hiara-miampatra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mandry
    marker-yv: yv-n
  - type: text
    text: ' amin''ny voatrabaky ny sabatra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ao koa Edoma mbamin'ny mpanjakany sy ny mpanapaka rehetra tao aminy, Izay natao ao amin'ny voatrabaky ny sabatra, na dia be aza ny heriny, miara-miampatra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mandry
    marker-yv: yv-n
  - type: text
    text: ' amin''ny tsy voafora izy sy amin''izay midina any an-davaka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ao koa ireo andrianan'ny avaratra rehetra sy ny Sidoniana rehetra, izay niara-nidina tamin'ny voatrabaka menatra izy, na dia efa natahorana noho ny heriny aza, ary miampatra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mandry
    marker-yv: yv-n
  - type: text
    text: ' tsy voafora ao amin''izay voatrabaky ny sabatra izy ka mitondra henatra ao amin''izay midina any an-davaka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ireny dia ho hitan''i Farao, ka dia hionona izy ny amin''ny vahoakany maro be. Voatrabaky ny sabatra parao mbamin''ny miaramilany rehetra, hoy Jehovah Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Fa efa nahatonga ny fahatahorana azy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Na. Ahy
    marker-yv: yv-n
  - type: text
    text: ' tany amin''ny tanin''ny velona Aho; Ary Farao dia halevina'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hampandrina
    marker-yv: yv-n
  - type: text
    text: ' ao amin''ny tsy voafora, miaraka amin''ireo voatrabaky ny sabatra, dia Farao mbamin''ny vahoakany maro be rehetra, hoy Jehovah Tompo.'
