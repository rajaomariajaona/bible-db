document_id: GEN.35,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nialan'i Jakoba tany Betela, sy ny nahafatesan-dRahely tany an-dalana, ary ny anaran'ny zanakalahin'i Jakoba roa ambin'ny folo
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Andriamanitra tamin''i Jakoba : Miaingà, miakara any Betela ianao ka monena any; ary manorena alitara any ho an''Andriamanitra Izay niseho taminao, fony ianao nandositra ny tavan''i Esao rahalahinao. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Andriamanitra taminy: Jakoba no anaranao; nefa tsy hatao hoe Jakoba intsony ny anaranao, fa Isiraely ny anaranao; dia nataony hoe Isiraely no anarany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Andriamanitra taminy: Izaho no Andriamanitra Tsitoha; maroa fara sy mihabetsaha; firenena maro no hiseho avy aminao, ary hisy mpanjaka amin''ny haterakao; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny tany izay nomeko an''i Abrahama sy Isaka dia homeko anao; ary ny taranakao mandimby anao koa no homeko ny tany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Andriamanitra niakatra niala taminy, teo amin''ilay niresahany taminy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jakoba dia nanorina tsangam-bato teo amin''ny fitoerana izay niresahany taminy ka nanidina fanatitra aidina teo aminy sady nampidina diloilo teo aminy koa. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny anaran'ny tany izay niresahan'Andriamanitra taminy dia nataon'i Jakoba hoe Betela.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifindra niala tany Betela izy; ary nony efa kely foana no sisa tsy nahatongavany tao Efrata, dia nihetsi-jaza Rahely sady sarotiny. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony sarotiny toy izany izy, dia hoy ny mpampivelona taminy: Aza matahotra ianao; fa izato koa no zazalahy ho anao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa hiala aina (fa maty izy), dia nataony hoe Benony ny anarany; fa ny rainy kosa nanao azy hoe Benjamina. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia maty Rahely ka nalevina teo amin''ny lalana mankany Efrata (Betlehema izany). '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jakoba tamin''izay tao an-tranony mbamin''izay rehetra nomba azy: Ario ireo andriamani-kafa, izay ao aminareo, dia madiova, sady ovay ny fitafianareo; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jakoba nanorina tsangam-bato teo ambonin''ny fasany, dia ilay tsangam-bato ao amin''ny fasan-dRahely mandraka androany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa nifindra Isiraely ka nanorina ny lainy tao ankoatr''i Migdaledera. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha nonina teo amin''izany tany izany Isiraely, dia avy Robena ka nandry tamin''i Bila, vaditsindranon-drainy; ary nahare izany Isiraely. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny zanakalahin''i Jakoba dia roa ambin''ny folo mirahalahy: ny zanak''i Lea dia Robena, lahimatoan''i Jakoba, sy Simeona sy Levy sy Joda sy Isakara ary Zebolona; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny zana-dRahely kosa dia Josefa sy Benjamina; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny zanak''i Bila, ankizivavin-dRahely, kosa dia Dana sy Naftaly; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ny zanak'i Zilpa, ankizivavin'i Lea, kosa dia Gada sy Asera. Ireo no zanakalahin'i Jakoba izay naterany tany Mesopotamia.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jakoba nankany amin''Isaka rainy tany Mamre, any Kiriat-arba (Hebrona izany), izay nivahinian''i Abrahama sy Isaka. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny andro niainan''Isaka dia valo-polo amby zato taona. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niala aina Isaka ka maty, ary voangona any amin'ny razany, rehefa tratrantitra sady ela niainana izy; ary dia nandevina azy Esao sy Jakoba zananilahy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary andeha hiainga isika ka hiakatra any Betela; ary hanao alitara any aho ho an''Andriamanitra, Izay nihaino ahy tamin''ny andron''ny fahoriako ary nomba ahy tamin''ny lalana izay nalehako. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia natolony teo amin''i Jakoba ny andriamani-kafa rehetra izay notànany sy ny kavina izay teny an-tsofiny; ary dia nalevin''i Jakoba tao am-pototry ny hazo terebinta izay tao akaikin''i Sekema ireo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia lasa nandeha izy; ary nisy tahotra avy amin'Andriamanitra nahazo ny tanàna manodidina azy, ka tsy nanenjika ny zanak'i Jakoba izy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jakoba dia tonga tany Lozy (Betela izany), izay any amin''ny tany Kanana, dia izy sy ny olona rehetra izay nomba azy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanorina alitara teo izy, ka nataony hoe El-betela no anaran''izany tany izany; fa teo no nisehoan''Andriamanitra taminy, fony izy nandositra ny tavan''ny rahalahiny. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary maty Debora, mpitaiza an-dRebeka, ka naleviny tao am-pototr''i Betela, teo ambanin''ny hazo ôka; ary ny anaran''io dia nataony hoe Alona-bakota. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Andriamanitra niseho indray tamin''i Jakoba, raha tonga avy tany Mesopotamia izy, ka nitahy azy. '
