document_id: 2KI.23,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanjakan'i Joahaza sy Joiakima ary Joiakina
  - type: text
    content: 'Ary nanirahan''ny mpanjaka, ka dia vory tany aminy ny loholon''ny Joda Jerosalema rehetra. '
  '10':
  - type: text
    content: 'Ary nolotoiny koa Tofeta, izay eo amin''ny lohasahan''ny taranak''i Hinoma, mba tsy hisy hampandeha ny zananilahy na ny zananivavy hamaky ny afo ho an''i Moloka intsony. '
  '11':
  - type: text
    content: Ary ny soavaly izay nohamasinin'ireo mpanjakan'ny Joda ho an'ny masoandro ka nataony teo amin'ny fidirana ho ao an-tranon'i Jehovah, teo akaikin'ny efi-tranon'i Natana-meleka tandapa
  - type: note
    content: Heb. ionoka
  - type: text
    content: ', izay tao Parvara'
  - type: note
    content: Tokony ho anaran-trano madinika sasany teo an-kianjan'ny tempoly
  - type: text
    content: ', dia nesoriny; ary ny kalesin''ny masoandro nodorany tamin''ny afo. '
  '12':
  - type: text
    content: 'Ary ireo alitara teo an-tampon-trano ambony amin''ny tranon''i Ahaza, izay nataon''ireo mpanjakan''ny Joda, sy ny alitara izay nataon''i Manase tao anatin''ny kianja roa tamin''ny tranon''i Jehovah, dia noravan''ny mpanjaka ka notorotoroiny, dia nafafiny tany amin''ny lohasahan-driaka Kidrona ny vovony. '
  '13':
  - type: text
    content: 'Ary nolotoin''ny mpanjaka ireo fitoerana avo izay teo anoloan''i Jerosalema, teo amin''ny ankavanan''ny tendrombohitra nahitan-doza, dia ireo nataon''i Solomona, mpanjakan''ny Isiraely, ho an''i Astarta, fa havetavetan''ny Sidoniana, sy ho an''i Kemosy, fahavetavetan''i Moaba, ary ho an''i Milkoma, fahavetavetan''ny taranak''i Amona. '
  '14':
  - type: text
    content: 'Dia notorotoroiny ny tsangam-baton-tsampy sady nokapainy koa ny Aseraha, ka nofenoiny taolan''olona ny nitoerany. '
  '15':
  - type: text
    content: 'Ary ny alitara izay tao Betela sy ny fitoerana avo izay nataon''i Jeroboama, zanak''i Nebata, ilay nampanota ny Isiraely, dia noravany koa; ary nodorany ny fitoerana avo ka notorotoroiny ho vovoka, ary nodorany koa ny Aseraha. '
  '16':
  - type: text
    content: Ary nitodika Josia ka nahita ny fasana teny an-tendrombohitra, dia naniraka naka ny taolana tao am-pasana, ary nodorany teo ambonin'ny alitara ireny nandotoany azy, araka ny tenin'i Jehovah, izay notorin'ilay lehilahin'Andriamanitra
  - type: note
    content: Izahao 1 Mpanjaka xiii. 2
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Dia hoy izy: Tsangam-baton''iza itsy hitako itsy? Ary hoy ny mponina tao an-tanana taminy: Fasan''ilay lehilahin''Andriamanitra izay avy tany Joda io, dia ilay nitory izao zavatra nataonao tamin''ny alitara eto Betela izao. '
  '18':
  - type: text
    content: 'Ary hoy izy: Aoka itsy; aza misy manetsika ny taolany akory. Dia tsy nokasihiny ny taolany sy ny taolan''ilay mpaminany avy tany Samaria.'
  '19':
  - type: text
    content: 'Ary ny trano rehetra tamin''ny fitoerana avo, izay teny amin''ny tanànan''i Samaria, izay nataon''ireo mpanjakan''ny Isiraely ka nahatonga fahatezerana, dia noravan''i Josia koa ka nataony araka izay rehetra efa navony tany Betela. '
  '2':
  - type: text
    content: 'Dia niakatra ho ao an-tranon''i Jehovah ny mpanjaka, ary nanaraka azy ny lehilahy rehetra amin''ny Joda sy ny mponina rehetra tany Jerosalema mbamin''ny mpisorona sy ny mpaminany ary ny vahoaka rehetra, na kely na lehibe; ary novakiny teo anatrehany ny teny rehetra tamin''ny bokin''ny fanekena izay hita tao an-tranon''i Jehovah. '
  '20':
  - type: text
    content: 'Ary ny mpisorona rehetra izay teo, dia ny mpisorona amin''ny fitoerana avo, novonoiny teo ambonin''ny alitara, sady nandoro taolan''olona teo koa izy, dia niverina nankany Jerosalema. '
  '21':
  - type: text
    content: 'Ary ny mpanjaka nandidy ny vahoaka rehetra hoe: Tandremo ny Paskan''i Jehovah Andriamanitrareo, araka ny voasoratra ao amin''ny bokin''ity fanekena ity. '
  '22':
  - type: text
    content: 'Fa tsy nisy Paska notandremana toy izany hatramin''ny andron''ny mpitsara izay nitsara ny Isiraely, na tamin''ny andro rehetra nanjakan''ny mpanjakan''ny Isiraely sy ny mpanjakan''ny Joda; '
  '23':
  - type: text
    content: fa tamin'ny taona fahavalo ambin'ny folo nanjakan'i Josia mpanjaka no nitandremany izany Paska izany ho an'i Jehovah tany Jerosalema.
  '24':
  - type: text
    content: 'Ary ny nanao azy ho tsindrian-javatra sy ny mpanao hatsarana sy ny terafima sy ny sampy ary ny fahavetavetana rehetra izay hita tany amin''ny tany Joda sy tany Jerosalema dia nesorin''i Josia koa, mba hanatanterahana ny tenin''ny lalàna voasoratra ao amin''ilay boky hitan''i Hilkia mpisorona tao an-tranon''i Jehovah. '
  '25':
  - type: text
    content: 'Ary tsy nisy mpanjaka tahaka azy teo alohany, izay niverina ho amin''i Jehovah tamin''ny fony rehetra sy ny fanahiny rehetra sy ny heriny rehetra araka ny lalàn''i Mosesy rehetra; sady tsy nisy tahaka azy intsony niseho tao aoriany. '
  '26':
  - type: text
    content: 'Nefa Jehovah tsy nitsahatra tamin''ny firehetan''ny fahatezerany mafy, dia ilay fahatezerana nirehitra tamin''ny Joda noho ny fampahatezerana rehetra izay nampahatezeran''i Manase Azy. '
  '27':
  - type: text
    content: 'Dia hoy Jehovah: Hesoriko koa ny Joda hiala eo imasoko, tahaka ny nanesorako ny Isiraely, ary holaviko ity tanàna Jerosalema nofidiko ity sy ny trano izay nolazaiko hoe: Ho ao ny anarako.'
  '28':
  - type: text
    content: 'Ary ny tantaran''i Josia sisa mbamin''izay rehetra nataony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany? '
  '29':
  - type: text
    content: 'Tamin''ny andro nanjakan''i Josia no niakaran''i Farao-neko, mpanjakan''i Egypta, hankany amoron''ny ony Eofrata hiady amin''ny mpanjakan''i Asyria; ary Josia mpanjaka dia nandeha hiady amin''i Farao. Kanjo nony hitany, dia matiny tao Megido izy. '
  '3':
  - type: text
    content: 'Ary ny mpanjaka nitsangana teo amin''ny fitoeran''andriana, dia nanao fanekena teo anatrehan''i Jehovah hanaraka Azy sy hitandrina ny lalàny sy ny teni-vavolombelony ary ny didiny amin''ny fony rehetra sy ny fanahiny rehetra, hankatò ny tenin''ny fanekena sy izay voasoratra ao amin''izany boky izany. Ary ny vahoaka rehetra koa dia mba nanaiky ny fanekena. '
  '30':
  - type: text
    content: Ary ny fatiny dia napetraky ny mpanompony tao anaty kalesy ka nentiny niala tao Megido ho any Jerosalema, dia naleviny tao amin'ny fasany. Ary nalain'ny vahoaka Joahaza, zanak'i Josia, dia nohosorany ka nampanjakainy handimby an-drainy.
  '31':
  - type: text
    content: 'Telo amby roa-polo taona Joahaza fony izy vao nanjaka, ary telo volana no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Hamotala, zanakavavin''i Jeremia, avy any Libna. '
  '32':
  - type: text
    content: 'Ary nanao izay ratsy eo imason''i Jehovah izy tahaka izay rehetra nataon''ny razany. '
  '33':
  - type: text
    content: 'Ary nafatotr''i Farao-neko tao Ribla any amin''ny tany Hamata izy, mba tsy hanjakany any Jerosalema, sady nampandoaviny sazy talenta volafotsy zato sy talenta volamena iray ny fanjakana. '
  '34':
  - type: text
    content: 'Ary Farao-neko nanendry an''i Eliakima, zanak''i Josia, ho mpanjaka hisolo an''i Josia rainy; ary ny anarany novany ho Joiakima, fa Joahaza kosa dia nentiny ho any Egypta ka maty tany. '
  '35':
  - type: text
    content: Ary ny volafotsy sy ny volamena dia nomen'i Joiakima an'i Farao; kanefa notombanany avokoa ny olona rehetra araka ny didin'i Farao, ary ny vahoaka rehetra dia samy nampandoaviny vola araka ny tombany avy, mba homeny an'i Farao-neko.
  '36':
  - type: text
    content: 'Dimy amby roa-polo taona Joiakima, fony izy vao nanjaka, ary nanjaka iraika ambin''ny folo taona tany Jerosalema izy. Ary ny anaran-dreniny dia Zebida, zanakavavin''i Pedaia, avy any Romaha. '
  '37':
  - type: text
    content: Ary nanao izay ratsy eo imason'i Jehovah izy tahaka izay nataon'ny razany.
  '4':
  - type: text
    content: 'Ary ny mpanjaka nandidy an''i Hilkia mpisoronabe sy ireo mpisorona manarakaraka ary ny mpiandry varavarana hamoaka ny fanaka rehetra izay natao ho an''i Bala sy Astarta ary ho an''izay rehetra eny amin''ny lanitra hiala amin''ny tempolin''i Jehovah; ka nodorany tany ivelan''i Jerosalema teny amin''ny saha amoron''i Kidrona ireny, ary nentiny ho any Betela ny vovony. '
  '5':
  - type: text
    content: Ary natsahany koa ny mpisorona amin'ny andriamani-tsi-izy, izay notendren'ny mpanjakan'ny Joda handoro ditin-kazo manitra eny amin'ny fitoerana avo tany amin'ny tanànan'ny Joda sy tamin'ny manodidina an'i Jerosalema, sy izay nandoro ditin-kazo manitra koa ho an'i Bala, dia ny masoandro, ary ho an'ny volana sy ny kintana amin'ny Zodiaka
  - type: note
    content: Heb. Mazotoa; izahao Joba xxxviii. 32
  - type: text
    content: ' ary ho an''izay rehetra eny amin''ny lanitra. '
  '6':
  - type: text
    content: 'Ary ny Aseraha navoakany hiala amin''ny tranon''i Jehovah ho any ivelan''i Jerosalema, ao amin''ny lohasahan-driaka Kidrona; ary nodorany tao io ka notorotoroiny ho vovoka, ary ny vovony nafafiny teny ambonin''ny fasam-bahoaka. '
  '7':
  - type: text
    content: 'Ary noravany ny tranon''ny olona nanolo-tena hijangajanga ho fanompoan-tsampy izay teo amin''ny tranon''i Jehovah, dia ireo nanenoman''ny vehivavy lay ho an''i Astarta. '
  '8':
  - type: text
    content: 'Ary nampaka ny mpisorona rehetra avy tamin''ny tanànan''ny Joda izy, dia nolotoiny ny fitoerana avo, izay nandoroan''ny mpisorona ditin-kazo manitra, hatrany Geba ka hatrany Beri-sheba ary noravany ny fitoerana avo tao akaikin''ny vavahady, dia ilay teo anoloan''ny vavahadin''i Josoa, komandin''ny tanàna, sy ilay teo an-kavia raha miditra amin''ny vavahadin''ny tanana. '
  '9':
  - type: text
    content: 'Fa ny mpisorona tamin''ny fitoerana avo tsy navela hanatitra teo ambonin''ny alitaran''i Jehovah any Jerosalema; nefa nahazo niara-nihinana mofo tsy misy masirasira tamin''ny rahalahiny ihany izy. '
