document_id: 2TH.2,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fananarana sy fanaovam-beloma
  - type: text
    content: 'Ary mangataka aminareo izahay, ry rahalahy, ny amin''ny fihavian''i Jesosy Kristy Tompontsika sy ny hanangonana antsika ho eo aminy, '
  '10':
  - type: text
    content: 'ary ny famitahana momba ny tsi-fahamarinana amin''izay ho very, satria tsy nandray ny fitiavana ny fahamarinana izay hamonjena azy izy. '
  '11':
  - type: text
    content: 'Koa izany no ampanateran''Andriamanitra fiàsan''ny fahadisoan-kevitra aminy hinoany ny lainga, '
  '12':
  - type: text
    content: mba hohelohina avokoa izay rehetra tsy nino ny marina, fa nankasitraka ny tsy marina.
  '13':
  - type: text
    content: 'Fa izahay tsy maintsy misaotra an''Andriamanitra mandrakariva ny aminareo, ry rahalahy malalan''ny Tompo, satria Andriamanitra efa nifidy anareo hatramin''ny voalohany hahazo famonjena amin''ny fanamasinan''ny Fanahy sy ny finoana ny marina, '
  '14':
  - type: text
    content: 'sady ho amin''izany koa no niantsoany anareo tamin''ny filazantsaranay hahazoanareo ny voninahitr''i Jesosy Kristy Tompontsika. '
  '15':
  - type: text
    content: 'Koa tomoera tsara, ry rahalahy, ka hazòny ny fampianarana natolotra izay nampianarina anareo, na tamin''ny teninay, na tamin''ny epistilinay. '
  '16':
  - type: text
    content: 'Ary Jesosy Kristy Tompontsika sy Andriamanitra Raintsika, Izay efa tia antsika ka nanome antsika fampiononana mandrakizay sy fanantenana tsara amin''ny fahasoavana, '
  '17':
  - type: text
    content: no hampionona ny fonareo anie sy hampahery anareo amin'ny asa sy ny teny tsara rehetra.
  '2':
  - type: text
    content: 'mba tsy halaky hohetsiketsehina amin''ny saina na hampitahorina ianareo, na amin''ny fanahy, na amin''ny teny, na amin''ny epistily izay toa avy aminay, milaza fa efa miandoha ny andron''ny Tompo. '
  '3':
  - type: text
    content: 'Aza mety hofitahin''olona akory ianareo; fa tsy ho avy izany, raha tsy efa tonga aloha ny fihemorana, ka hiseho ilay lehilahin''ota, dia ilay zanaky ny fahaverezana, '
  '4':
  - type: text
    content: 'ilay manohitra ka manandra-tena ho ambony noho izay rehetra atao hoe Andriamanitra, na izay ivavahana, ka dia mipetraka eo amin''ny tempolin''Andriamanitra izy ka manao ny tenany ho Andriamanitra. '
  '5':
  - type: text
    content: 'Tsy tsaroanareo va fa fony mbola teo aminareo ihany aho, dia efa nilaza izany zavatra izany taminareo? '
  '6':
  - type: text
    content: 'Ary ankehitriny fantatrareo ny zavatra misakana, mba hampisehoana azy amin''ny fotoan''androny. '
  '7':
  - type: text
    content: Fa miasa sahady ny zava-miafina, dia ny tsi-fankatoavan-dalàna. kanefa mandra-panaisotra ilay misakana ankehitriny ihany
  - type: note
    content: 'Na: kanefa ao ihany ilay misakana mandra-panaisotra azy'
  - type: text
    content: '. '
  '8':
  - type: text
    content: Ary dia haseho ilay tena mpandika lalàna, izay holevonin'i Jesosy Tompo
  - type: note
    content: Na:(holevonin'ny Tompo)
  - type: text
    content: ' amin''ny fofonain''ny vavany ary hofoanany amin''ny fisehoan''ny fihaviany; '
  '9':
  - type: text
    content: 'ny fihavin''ilehiny dia araka ny fiàsan''i Satana amin''ny hery sy ny famantarana sy ny fahagagana mandainga rehetra '
