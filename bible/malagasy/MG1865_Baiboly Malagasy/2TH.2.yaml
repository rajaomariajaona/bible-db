document_id: 2TH.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fananarana sy fanaovam-beloma
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary mangataka aminareo izahay, ry rahalahy, ny amin''ny fihavian''i Jesosy Kristy Tompontsika sy ny hanangonana antsika ho eo aminy, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mba tsy halaky hohetsiketsehina amin''ny saina na hampitahorina ianareo, na amin''ny fanahy, na amin''ny teny, na amin''ny epistily izay toa avy aminay, milaza fa efa miandoha ny andron''ny Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aza mety hofitahin''olona akory ianareo; fa tsy ho avy izany, raha tsy efa tonga aloha ny fihemorana, ka hiseho ilay lehilahin''ota, dia ilay zanaky ny fahaverezana, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ilay manohitra ka manandra-tena ho ambony noho izay rehetra atao hoe Andriamanitra, na izay ivavahana, ka dia mipetraka eo amin''ny tempolin''Andriamanitra izy ka manao ny tenany ho Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsy tsaroanareo va fa fony mbola teo aminareo ihany aho, dia efa nilaza izany zavatra izany taminareo? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ankehitriny fantatrareo ny zavatra misakana, mba hampisehoana azy amin''ny fotoan''androny. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa miasa sahady ny zava-miafina, dia ny tsi-fankatoavan-dalàna. kanefa mandra-panaisotra ilay misakana ankehitriny ihany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: kanefa ao ihany ilay misakana mandra-panaisotra azy'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary dia haseho ilay tena mpandika lalàna, izay holevonin'i Jesosy Tompo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Na:(holevonin'ny Tompo)
    marker-yv: yv-n
  - type: text
    text: ' amin''ny fofonain''ny vavany ary hofoanany amin''ny fisehoan''ny fihaviany; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ny fihavin''ilehiny dia araka ny fiàsan''i Satana amin''ny hery sy ny famantarana sy ny fahagagana mandainga rehetra '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ary ny famitahana momba ny tsi-fahamarinana amin''izay ho very, satria tsy nandray ny fitiavana ny fahamarinana izay hamonjena azy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa izany no ampanateran''Andriamanitra fiàsan''ny fahadisoan-kevitra aminy hinoany ny lainga, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: mba hohelohina avokoa izay rehetra tsy nino ny marina, fa nankasitraka ny tsy marina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa izahay tsy maintsy misaotra an''Andriamanitra mandrakariva ny aminareo, ry rahalahy malalan''ny Tompo, satria Andriamanitra efa nifidy anareo hatramin''ny voalohany hahazo famonjena amin''ny fanamasinan''ny Fanahy sy ny finoana ny marina, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'sady ho amin''izany koa no niantsoany anareo tamin''ny filazantsaranay hahazoanareo ny voninahitr''i Jesosy Kristy Tompontsika. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Koa tomoera tsara, ry rahalahy, ka hazòny ny fampianarana natolotra izay nampianarina anareo, na tamin''ny teninay, na tamin''ny epistilinay. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary Jesosy Kristy Tompontsika sy Andriamanitra Raintsika, Izay efa tia antsika ka nanome antsika fampiononana mandrakizay sy fanantenana tsara amin''ny fahasoavana, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: no hampionona ny fonareo anie sy hampahery anareo amin'ny asa sy ny teny tsara rehetra.
