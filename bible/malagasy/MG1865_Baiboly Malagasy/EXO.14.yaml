document_id: EXO.14
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lazao amin''ny Zanak''Isiraely mba hivily izy ka hitoby eo akaikin''i Pi-hahirota, eo anelanelan''i Migdolasy ny ranomasina; eo akaikin''i Bala-zefona, dia tandrifiny, no hitobianareo, eo amoron''ny ranomasina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Farao hilaza ny Zanak''Isiraely hoe: Azon''ny tamberintany izy ka voahidin''ny efitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia hanamafy ny fon'i Farao Aho, ka hanenjika anareo izy; dia hankalazaina Aho noho ny hataoko amin'i Farao sy amin'ny miaramilany rehetra, ka ho fantatry ny Egyptiana fa Izaho no Jehovah. Dia nataon'ny Zanak'Isiraely izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nisy nanambara tamin''ny mpanjakan''i Egypta fa efa nandositra ny olona, dia niova ny fon''i Farao sy ny mpanompony ny amin''ny olona, ka hoy izy: Inona izao nataontsika izao, no nandefa ny Isiraely hiala tamin''ny fanompoany antsika isika? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nasainy nofehezina tamin''ny kalesy ny soavaly, sady nitondra ny vahoakany hanaraka azy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nitondra kalesy enin-jato voafantina sy ny kalesin''ny Egyptiana rehetra izy, izay samy nisy mpiady avy izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary Jehovah nanamafy ny fon''i Farao, mpanjakan''i Egypta, dia nanenjika ny Zanak''Isiraely izy, na dia tamin''ny tanana avo aza no nivoahany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Koa nanenjika azy ny Egyptiana, dia ny soavaly rehetra mitarika ny kalesin'i Farao sy ny soavaliny fitaingina ary ny miaramilany, ka nahatratra azy nitoby teo amoron'ny ranomasina, teo anilan'i Pi-hahirota, tandrifin'i Balazefona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary rehefa mby akaiky Farao, dia natopin''ny Zanak''Isiraely ny masony, ka, indreo, ny Egyptiana tamy manenjika azy; dia raiki-tahotra indrindra ny Zanak''Isiraely ka nitaraina tamin''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy koa izy tamin''i Mosesy: Moa tsy nisy fasana va tany Egypta, no nentinao ho faty atỳ an-efitra izahay? Nahoana no nanao izany taminay ianao ka nitondra anay nivoaka avy tany Egypta? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tsy izao va no teny nolazainay taminao fony tany Egypta hoe: Aoka izay fa avelao ihany izahay hanompo ny Egyptiana? Fa aleonay manompo ny Egyptiana toy izay ho faty any an-efitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy Mosesy tamin''ny olona: Aza matahotra ianareo, mijanòna, fa ho hitanareo ny famonjen''i Jehovah, izay hataony ho anareo anio; fa ny Egyptiana, izay hitanareo anio, dia tsy ho hitanareo intsony mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jehovah hiady ho anareo, fa ianareo kosa hangina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy Jehovah tamin''i Mosesy: Nahoana no mitaraina amiko ianao? lazao amin''ny Zanak''Isiraely mba handroso. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary aingao ny tehinao, dia ahinjiro ambonin''ny ranomasina ny tananao, ka saraho ny rano, dia handeha hamaky eo afovoan''ny ranomasina mandia ny tany maina ny Zanak''Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary, indro, Izaho hanamafy ny fon''ny Egyptiana, ka hiditra hanenjika azy izy; dia hankalazaina Aho noho ny hataoko amin''i Farao sy amin''ny miaramilany rehetra mbamin''ny kalesiny sy ny mpitaingin-tsoavaliny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'dia ho fantatry ny Egyptiana fa Izaho no Jehovah, rehefa ankalazaina Aho noho ny ataoko amin''i Farao sy ny kalesiny sy ny mpitaingin-tsoavaliny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary Ilay Anjelin''Andriamanitra, Izay nandeha teo alohan''ny tobin''ny Isiraely, dia nifindra ka nankeo aoriany; ary ny andri-rahona nifindra niala teo alohany dia nijanona teo aoriany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ka tonga teo anelanelan''ny tobin''ny Egyptiana sy ny tobin''ny Isiraely: dia teo ihany ny rahona sy ny fahamaizinana, nefa nampahazava ny alina kosa, ka dia tsy nifanatona izy roa tonta mandritra ny alina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia nahinjitr''i Mosesy teo ambonin''ny ranomasina ny tànany; ary rivotra mahery avy atsinanana no nampisavan''i Jehovah ny ranomasina mandritra iny alina iny, ka nataony tany maina ny ranomasina, ary dia voasaraka ny rano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia nandeha teo afovoan''ny ranomasina nandia ny tany maina ny Zanak''Isiraely; ary ny rano dia tonga fefy ho azy teo amin''ny ankavanany sy teo amin''ny ankaviany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia nanenjika azy ny Egyptiana ka niditra nanaraka azy teo afovoan''ny ranomasina, dia ny soavalin''i Farao rehetra sy ny kalesiny ary ny mpitaingin-tsoavaliny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary tamin''ny fiambenana maraina dia nijery ny tobin''ny Egyptiana tao amin''ny andri-afo sy ny rahona Jehovah ka nampifanaritaka ny tobin''ny Egyptiana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary nanala ny kodian''ny kalesiny Izy ka nampahasarotra ny nandehanany, dia hoy ny Egyptiana: Aoka handositra ny tavan''ny Isiraely isika, fa Jehovah no miady amin''ny Egyptiana ho an''ireo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary hoy Jehovah tamin''i Mosesy: Ahinjiro eo ambonin''ny ranomasina ny tananao, mba hikatonan''ny rano amin''ny Egyptiana mbamin''ny kalesiny sy ny mpitaingin-tsoa valiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia nahinjitr''i Mosesy teo ambonin''ny ranomasina ny tànany, ka nikatona ho tahaka ny teo ny ranomasina, rehefa nadiva ho maraina ny andro; ary ny Egyptiana nandositra, kanjo nitsena ny rano ihany izy, dia narian''i Jehovah teo afovoan''ny ranomasina ny Egyptiana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary dia nikatona ny rano ka nanarona ny kalesy sy ny mpitaingin-tsoavaly, dia ny miaramilan''i Farao rehetra izay niditra teo amin''ny ranomasina nanenjika ny Zanak''Isiraely; koa tsy nisy niangana na dia iray akory aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa ny Zanak''Isiraely kosa nandeha tamin''ny tany maina teo afovoan''ny ranomasina; ary ny rano dia tonga fefy ho azy teo amin''ny ankavanany sy teo amin''ny ankaviany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Izany no namonjen''i Jehovah ny Isiraely tamin''izany andro izany mba tsy ho azon''ny Egyptiana; ary hitan''ny Isiraely teny amoron''ny ranomasina ny fatin''ny Egyptiana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary rehefa hitan'ny Isiraely ny asa lehibe izay nataon'ny tànan'i Jehovah tamin'ny Egyptiana, dia natahotra an'i Jehovah ny olona ka nino an'i Jehovah sy Mosesy mpanompony.
