document_id: JER.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny faminanian'i Jeremia ny loza, sy ny nanoheran'i Pasora azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no lazain''i Jehovah: Andeha mividy tavoara tanimanga, ary makà anti-panahy amin''ny vahoaka sy anti-panahy amin''ny mpisorona, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: dia mivoaha ho any amin'ny Lohasahan'ny taranak'i Hinoma, izay eo anoloan'ny vavahady Harsota
  - type: usfm
    marker: x
    children:
    - type: text
      text: Harsota = tavim-bilany(?)
    marker-yv: yv-n
  - type: text
    text: ', ary torio eo ny teny izay holazaiko aminao, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka ataovy hoe: Mihainoa ny tenin''i Jehovah, ry mpanjakan''ny Joda sy ry mponina ato Jerosalema! Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Indro, hahatonga loza amin''ity tanàna ity Aho izay mandre izany, dia hangintsingintsina ny sofiny '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'satria efa nahafoy Ahy izy ka nahatonga ity tanàna ity ho hafahafa, fa nandoro ditin-kazo manitra tato ho an''andriamani-kafa, izay tsy fantany, na fantatry ny razany, na ny mpanjakan''ny Joda, sady efa nameno ran''ny marina ity tanàna ity '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary nanorina ny fitoerana avo ho an''i Bala handoroany ny zanany ho fanatitra dorana ho an''i Bala, izay tsy nandidiako, na nolazaiko, na tao an-tsaiko akory aza. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa, indro, avy ny andro, hoy Jehovah, izay tsy hanaovana ity fitoerana ity intsony hoe Tofeta, na Lohasahan''ny taranak''i Hinoma, fa Lohasaha Famonoana kosa. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary hofoanako
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hararako
    marker-yv: yv-n
  - type: text
    text: ' amin''ity tanàna ity ny fisainan''ny Joda sy Jerosalema, ka hataoko lavon-tsabatra eo anoloan''ny fahavalony sy amin''ny tànan''izay mitady ny ainy izy; ary ny fatiny dia homeko ho fihinan''ny voro-manidina sy ny bibi-dia. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ity tanàna ity dia hataoko ho figagana sy ho zavatra mampisitrisitra, ka izay rehetra mandalo azy dia ho gaga sady hisitrisitra noho ny loza rehetra efa namelezana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hampihinaniko ny nofon''ny zananilahy sy ny nofon''ny zananivavy izy, ary samy hihinana ny nofon''ny namany avy izy eo amin''ny fahirano sy ny fahaterena, izay haneren''ny fahavalony sy izay mitady ny ainy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia torotoroy eo imason''ny olona izay miaraka aminao ilay tavoara, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ka ataovy aminy hoe: Izao no lazain''i Jehovah, Tompon''ny maro: Toy izao no hanorotoroako ity firenena sy ity tanàna ity, dia toy ny famakin''ny mpanefy tanimanga ny vilany tany, ka tsy azo atambatra intsony; ary any Tofeta aza no handevenany noho ny tsi-fisian-tany hafa handevenana. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia toy izany no hataoko amin''ity tanàna ity sy amin''izay mponina ato, ka dia hatao tahaka an''i Tofeta ity tanàna ity, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary ny tranon'i Jerosalema sy ny tranon'ny mpanjakan'ny Joda dia ho tonga maloto tahaka an'i Tofeta, dia ny trano rehetra izay nandoroany ditin-kazo manitra teo an-tampony ho an'izay rehetra eny amin'ny lanitra sy nanidinany fanatitra aidina ho an'izay andriamani-kafa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Jeremia dia tonga avy tany Tofeta, izay nanirahan''i Jehovah azy haminany, ka nitsangana teo amin''ny kianjan''ny tranon''i Jehovah izy, dia nanao tamin''ny vahoaka rehetra hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Indro, hataoko mihatra amin''ity tanàna ity sy amin''ny zana-bohiny rehetra ny loza rehetra izay nolazaiko hatao aminy noho ny nanamafiany ny hatony tsy hihainoany ny teniko.'
