document_id: JOB.22
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny teny fanintelony nataon'i Elifaza
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia namaly Elifaza Temanita ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mahasoa an'Andriamanitra va ny olona? Tsia, fa mahasoa ny tenany ihany ny olon-kendry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mampaninona ny Tsitoha moa, raha marina ianao, sa misy tombony ho Azy, raha ataonao tsy misy diso ny alehanao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Moa ny fahatahoranao Azy va no ananarany anao, sy ifanatrehany aminao amin'ny fitsarana?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsy be va ny faharatsianao, sady tsy hita isa ny helokao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa efa naka tsatòka tsy ahoan-tsy ahoana tamin'ny rahalahinao ianao ka nanendaka ny akanjon'ny mahantra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mitanjaka
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tsy nanome rano hosotroin'ny mangetaheta ianao sady tsy nahafoy hanina ho an'ny noana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa ny olona sandriana ihany no nanana ny tany; Ary ny manan-kaja ihany no nitoetra teo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Efa nampialainao maina ny mpitondratena. Ary tapahina ny sandrin'ny kamboty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa noho izany dia misy fandrika manodidina anao, ary ny fahatahorana dia mampihorohoro anao tampoka;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Moa tsy ianao va ny maizina Sy ny rano mandriaka mandifotra anao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tsy avo tahaka ny lanitra va Andriamanitra? Jereo ny hahavon'ny kintana, endrey ny hahavony!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nefa hoy ianao: Ataon''Andriamanitra ahoana no fahafantatra? Mahay mitsara ary ankoatry ny rahona maizina va Izy?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny rahona matevina manakona Azy, ka tsy mahita Izy; Ary mandehandeha eny amin'ny lanitra Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Moa hizotra amin'ny lalana izay nalehan'ny olona fahagola va ianao? Dia ilay nalehan'ny olona ratsy fanahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izay nesorina alohan'ny androny, ka nindaosin'ny riaka ny fanorenany,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia ireo izay manao tamin''Andriamanitra hoe: Mialà aminay! Ary inona no azon''ny Tsitoha atao ho anay'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. azy
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Kanefa Izy no efa nameno zava-tsoa ny tranony ho lavitra ahy anie ny fisainan'ny ratsy fanahy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny marina mahita ka mifaly, Ary ny tsy manan-tsiny mihomehy ireny hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Marina tokoa fa efa rava ny fahavalontsika, ary ny hareny betsaka efa levon'ny afo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mifankazara amin'ny Tsitoha ianao, dia hiadana; Izany no hahatongavan'ny soa aminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Masìna ianao, mandraisa fampianarana avy amin'ny vavany, ary alatsaho ao am-ponao ny teniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Raha miverina aminy ianao, dia haorina tsara, eny, raha ampanalavirinao ny lainao ny heloka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ario eny amin'ny vovoka ny akoram-bolamena sy ny akoram-bolafotsy, eny, ario eny amin'ny vato eny an-dohasahan-driaka ny volamena avy any Ofira;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa ny Tsitoha no ho akoram-bolamenanao sy akoram-bolafotsinao, Ary ho volafotsy mamirapiratra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Na tsara, na azo amin'ny fisasarana
    marker-yv: yv-n
  - type: text
    text: ' ho anao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa amin'izany dia hiravoravo amin'ny Tsitoha ianao ka hanandratra ny tavanao amin'Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Raha mifona aminy ianao, dia hihaino anao Izy; Ary ny voadinao dia hefainao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary raha misy kasainao hatao, dia hotanterahina aminao, ary hamirapiratra amin'ny lalanao ny mazava.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Raha misy mietry
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Raha mietry izy'
    marker-yv: yv-n
  - type: text
    text: ', dia hataonao hoe: Misandrata; fa ny manetry tena hovonjeny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Hanafaka ny olona meloka Izy, eny, ny fahadiovan'ny tananao no hamonjena azy.
