document_id: JOB.22,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny fanintelony nataon'i Elifaza
  - type: text
    content: 'Dia namaly Elifaza Temanita ka nanao hoe:'
  '10':
  - type: text
    content: Koa noho izany dia misy fandrika manodidina anao, ary ny fahatahorana dia mampihorohoro anao tampoka;
  '11':
  - type: text
    content: Moa tsy ianao va ny maizina Sy ny rano mandriaka mandifotra anao?
  '12':
  - type: text
    content: Tsy avo tahaka ny lanitra va Andriamanitra? Jereo ny hahavon'ny kintana, endrey ny hahavony!
  '13':
  - type: text
    content: 'Nefa hoy ianao: Ataon''Andriamanitra ahoana no fahafantatra? Mahay mitsara ary ankoatry ny rahona maizina va Izy?'
  '14':
  - type: text
    content: Ny rahona matevina manakona Azy, ka tsy mahita Izy; Ary mandehandeha eny amin'ny lanitra Izy.
  '15':
  - type: text
    content: Moa hizotra amin'ny lalana izay nalehan'ny olona fahagola va ianao? Dia ilay nalehan'ny olona ratsy fanahy.
  '16':
  - type: text
    content: Izay nesorina alohan'ny androny, ka nindaosin'ny riaka ny fanorenany,
  '17':
  - type: text
    content: 'Dia ireo izay manao tamin''Andriamanitra hoe: Mialà aminay! Ary inona no azon''ny Tsitoha atao ho anay'
  - type: note
    content: Heb. azy
  - type: text
    content: '?'
  '18':
  - type: text
    content: Kanefa Izy no efa nameno zava-tsoa ny tranony ho lavitra ahy anie ny fisainan'ny ratsy fanahy!
  '19':
  - type: text
    content: 'Ny marina mahita ka mifaly, Ary ny tsy manan-tsiny mihomehy ireny hoe:'
  '2':
  - type: text
    content: Mahasoa an'Andriamanitra va ny olona? Tsia, fa mahasoa ny tenany ihany ny olon-kendry.
  '20':
  - type: text
    content: Marina tokoa fa efa rava ny fahavalontsika, ary ny hareny betsaka efa levon'ny afo.
  '21':
  - type: text
    content: Mifankazara amin'ny Tsitoha ianao, dia hiadana; Izany no hahatongavan'ny soa aminao.
  '22':
  - type: text
    content: Masìna ianao, mandraisa fampianarana avy amin'ny vavany, ary alatsaho ao am-ponao ny teniny.
  '23':
  - type: text
    content: Raha miverina aminy ianao, dia haorina tsara, eny, raha ampanalavirinao ny lainao ny heloka.
  '24':
  - type: text
    content: Ario eny amin'ny vovoka ny akoram-bolamena sy ny akoram-bolafotsy, eny, ario eny amin'ny vato eny an-dohasahan-driaka ny volamena avy any Ofira;
  '25':
  - type: text
    content: Fa ny Tsitoha no ho akoram-bolamenanao sy akoram-bolafotsinao, Ary ho volafotsy mamirapiratra
  - type: note
    content: Na tsara, na azo amin'ny fisasarana
  - type: text
    content: ' ho anao.'
  '26':
  - type: text
    content: Fa amin'izany dia hiravoravo amin'ny Tsitoha ianao ka hanandratra ny tavanao amin'Andriamanitra.
  '27':
  - type: text
    content: Raha mifona aminy ianao, dia hihaino anao Izy; Ary ny voadinao dia hefainao.
  '28':
  - type: text
    content: Ary raha misy kasainao hatao, dia hotanterahina aminao, ary hamirapiratra amin'ny lalanao ny mazava.
  '29':
  - type: text
    content: Raha misy mietry
  - type: note
    content: 'Na: Raha mietry izy'
  - type: text
    content: ', dia hataonao hoe: Misandrata; fa ny manetry tena hovonjeny.'
  '3':
  - type: text
    content: Mampaninona ny Tsitoha moa, raha marina ianao, sa misy tombony ho Azy, raha ataonao tsy misy diso ny alehanao?
  '30':
  - type: text
    content: Hanafaka ny olona meloka Izy, eny, ny fahadiovan'ny tananao no hamonjena azy.
  '4':
  - type: text
    content: Moa ny fahatahoranao Azy va no ananarany anao, sy ifanatrehany aminao amin'ny fitsarana?
  '5':
  - type: text
    content: Tsy be va ny faharatsianao, sady tsy hita isa ny helokao?
  '6':
  - type: text
    content: Fa efa naka tsatòka tsy ahoan-tsy ahoana tamin'ny rahalahinao ianao ka nanendaka ny akanjon'ny mahantra
  - type: note
    content: Heb. mitanjaka
  - type: text
    content: .
  '7':
  - type: text
    content: Tsy nanome rano hosotroin'ny mangetaheta ianao sady tsy nahafoy hanina ho an'ny noana.
  '8':
  - type: text
    content: Fa ny olona sandriana ihany no nanana ny tany; Ary ny manan-kaja ihany no nitoetra teo.
  '9':
  - type: text
    content: Efa nampialainao maina ny mpitondratena. Ary tapahina ny sandrin'ny kamboty.
