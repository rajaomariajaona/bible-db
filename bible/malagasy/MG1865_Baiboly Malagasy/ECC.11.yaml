document_id: ECC.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Anatra ho an'ny tanora fanahy mba hanampoizany ny hihavian'ny fahanterana sy ny fahafatesana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Atsipazo eny ambonin''ny rano ny haninao, fa ho hitanao ihany izy rehefa ela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Samy omeo anjara ny fito, ary na dia ny valo aza, fa tsy fantatrao izay fahoriana hanjo atỳ ambonin''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Raha feno ranonorana ny rahona, dia halatsany amin'ny tany izany; ary na mianjera mianatsimo na mianavaratra ny hazo, dia eo amin'izay ianjerany ihany no handriany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izay fatra-pihevitra ny rivotra tsy hamafy, ary izay manahy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mijery
    marker-yv: yv-n
  - type: text
    text: ' ny rahona tsy hijinja. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Toy ny tsy ahafantaranao ny amin''ny alehan''ny rivotra, na ny amin''ny fitombon''ny taolana ao an-kibon''izay manan''anaka, dia toy izany no tsy ahafantaranao ny asan''Andriamanitra, Mpanao ny zavatra rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Amin'ny maraina dia afafazo ny voanao, ary amin'ny hariva dia aza atsahatra ny tananao; fa tsy fantatrao izay ho vanona, na ny teo aloha, na ny teo aoriana, na angamba samy ho vanona avokoa izy roa tonta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mamy tokoa ny mazava, ary mahafinaritra ny maso ny mijery ny masoandro; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'fa na dia ela velona aza ny olona, dia aoka ho faly amin''ny androny rehetra izy ka hahatsiaro ny andro maizina, fa ho maro ireny: izay rehetra ho avy dia zava-poana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mifalia, ry zatovo, dieny mbola tanora ianao; ary aoka ny fonao hampifalifaly anao amin''ny andro fahatanoranao; ka mandehana any amin''izay sitraky ny fonao sy izay jeren''ny masonao; nefa aoka ho fantatrao fa ho entin''Andriamanitra hotsaraina ianao amin''izany rehetra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa esory ao am-ponao ny alahelo, ary avilio tsy hikasika ny nofonao ny ratsy; fa ny fahatanorana sy ny fahatanjahana dia samy zava-poana.
