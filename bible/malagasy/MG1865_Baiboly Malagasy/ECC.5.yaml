document_id: ECC.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mbola hitsarana ny mpampahory sy ny mpamadika ny rariny ary ny maha-zava-poana ny harena sy ny tokony hifaliana amin'izay omen'Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Aza haingam-bava, ary aza malaky manonona teny eo anatrehan'Andriamanitra ny fonao; fa Andriamanitra dia any an-danitra ary ianao etỳ an-tany, koa aoka ho vitsy ny teninao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa ny haben''ny fisasarana no mahatonga ny nofy; ary ny haben''ny teny no isehoan''ny rediredin''ny adala. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Raha mivoady amin''Andriamanitra ianao, aza manao ampitso lava: fa tsy ankasitrahany ny adala; koa efao ny voadinao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aleo tsy mivoady toy izay mivoady ka tsy mahefa. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Aza avela hahatonga heloka amin'ny tenanao ny vavanao; ary aza manao eo imason'ny anjely
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: iraka;'
    marker-yv: yv-n
  - type: text
    text: ' hoe: Niteny tsy nahy aho; nahoana no ho tezitra amin''ny teninao Andriamanitra ka hanimba ny asan''ny tananao? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa amin'ny haben'ny nofy dia misy zava-poana; ary toy izany koa ny haben'ny teny, fa Andriamanitra no atahory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha hitanao ny fampahoriana ny malahelo sy ny famadihana ny fitsarana sy ny rariny amin'ny tany, dia aza gaga amin'izany; fa misy ambony kokoa mibanjina ny ambony, ary mbola misy ambony noho ireo indray aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa na dia izany rehetra izany aza, dia mahasoa ny tany ny fisian''ny mpanjaka amin''izay tany volena. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izay tia vola tsy hety ho voky vola; ary izay fatra-pitia harena be tsy hety ho vokin''ny fitomboan-karena; fa zava-poana koa izany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Raha mitombo ny fananana, dia mitombo koa ny mpihinana azy; ary inona no soa azon''ny tompony, afa-tsy ny mijery maso azy fotsiny ihany? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mamy ny torimason'ny mpiasa, na homan-kely na homam-be izy; fa ny haben'ny ananan
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny fahavokisan'''
    marker-yv: yv-n
  - type: text
    text: '''ny manan-karena kosa no tsy ahitany tory. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Misy ratsy mahory efa hitako atỳ ambanin''ny masoandro, dia harena tehirizin''ny tompony, nefa mampidi-doza amin''ny tenany; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'sady levona izany harena izany noho ny loza manjo; ary miteraka zazalahy ralehilahy nefa tsy misy na inona na inona eny an-tànany, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Toy ny nivoahany mitanjaka avy tany an-kibon-dreniny, dia toy izay nihaviany ihany no hiverenany; ary tsy hisy na inona na inona ho entin''ny tànany ho valin''ny fisasarany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia ratsy mahory koa izany, fa toy izay nihaviany indrindra no handehanany; ary inona no soa azony noho ny nisasarany ho an''ny rivotra? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary koa, homa-maizina amin''ny androny rehetra izy sady manana alahelo be sy fahoriana ary fahasosorana. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Indro, efa hitako izay soa sy izay tsara, dia ny mihinana sy misotro ary mifaly amin'ny fisasarana rehetra izay isasaran'ny olona atỳ ambanin'ny masoandro amin'izay andro vitsy iainany omen'Andriamanitra azy; fa izany no anjarany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary koa, ny olona rehetra izay omen''Andriamanitra vola aman-karena sady omeny fahefana hihinanany azy sy hahazoany ny anjarany sy hifaliany amin''ny fisasarana, dia fanomezan''Andriamanitra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa tsy hahatsiaro loatra ny andro niainany izy, satria ny fahafinaretan'ny fony no avalin'Andriamanitra azy.
