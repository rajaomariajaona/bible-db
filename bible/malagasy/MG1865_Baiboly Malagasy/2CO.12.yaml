document_id: 2CO.12,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Tsy maintsy mirehareha aho, na dia tsy mahasoa aza izany; fa handroso hilaza fahitana sy fanambaran''ny Tompo aho. '
  '10':
  - type: text
    content: 'Koa dia finaritra aho amin''ny fahalemena, amin''ny fampahoriana, amin''ny fahaterena, amin''ny fanenjehana, amin''ny fahantrana, noho ny amin''i Kristy; fa ny fahalemeko no fahatanjahako. '
  '11':
  - type: text
    content: Efa tonga adala aho; ianareo no nahatery ahy; fa tokony hoderainareo aho, satria tsy latsaka noho ireo Apostoly ambony indrindra
  - type: note
    content: 'Na: fatratra loatra'
  - type: text
    content: ' ireo, na dia tsinontsinona aza aho. '
  '12':
  - type: text
    content: 'Ny famantarana mah''Apostoly ahy dia natao teo aminareo tokoa tamin''ny faharetana rehetra, tamin''ny famantarana sy ny fahagagana ary tamin''ny asa lehibe. '
  '13':
  - type: text
    content: 'Fa inona moa no nahalatsaka anareo noho ny fiangonana sasany, afa-tsy ny tsy namakiako tratra anareo? Mamelà ahy ary amin''izany fahadisoana izany. '
  '14':
  - type: text
    content: 'Indro, efa fanintelony izao no vonona hankatỳ aminareo aho, nefa tsy hahavaky tratra anareo; fa tsy ny fanananareo no tadiaviko, fa ianareo; fa tsy ny zanaka no tokony hihary ho an''ny ray aman-dreniny, fa ny ray aman-dreniny no tokony hihary ho an''ny zanany. '
  '15':
  - type: text
    content: Ary izaho dia faly indrindra handany sy holanina hahasoa ny fanahinareo, na dia araka ny fitombon'ny fitiavako anareo aza no fihenan'ny fitiavanareo ahy.
  '16':
  - type: text
    content: 'Kanefa, na dia izany aza, izaho tsy nahavaky tratra anareo, fa nanao saina, hono, aho, dia nahazo anareo tamin''ny fihendrena. '
  '17':
  - type: text
    content: 'Moa izay nirahiko tany aminareo va nisy nanaovako anareo ho vola aman-karena? '
  '18':
  - type: text
    content: Nangataka an'i Titosy aho, sady nirahiko nomba azy ilay rahalahy. Moa Titosy va nanao anareo ho vola aman-karena? Tsy fanahy iray ihany va no nandehananay? Tsy iray ihany va no dianay?
  '19':
  - type: text
    content: 'Efa ela izay no nanaovanareo anay ho miala tsiny aminareo. Eo anatrehan''Andriamanitra no itenenanay ao amin''i Kristy; fa ny zavatra rehetra, ry malala, dia ho fampandrosoana anareo. '
  '2':
  - type: text
    content: 'Mahalala olona anankiray ao amin''i Kristy aho, tokony ho efatra ambin''ny folo taona lasa izay - na tao amin''ny tena, na tsy tao amin''ny tena, tsy fantatro, Andriamanitra no mahalala - ilay anankiray dia nakarina ho any amin''ny lanitra fahatelo. '
  '20':
  - type: text
    content: 'Fa matahotra aho, fandrao, rehefa tonga aho, dia hahita anareo ho toy izay tsy tiako, ary ho hitanareo aho ho toy izay tsy tianareo ; fandrao hisy fifandirana, fialonana, fiafonafonana, fifampiandaniana, fanaratsiana, fibitsibitsihana, fieboeboana, fikotranana, - '
  '21':
  - type: text
    content: eny, fandrao, rehefa tonga indray aho, dia hampietry ahy eo anatrehanareo Andriamanitro, ary izaho hanana alahelo amin'ny maro izay nanota teo aloha ka tsy mbola nibebaka tamin'ny fahalotoana sy ny fijangajangana ary ny fijejojejoana nataony.
  '3':
  - type: text
    content: 'Ary mahalala ilay olona anankiray aho - na tao amin''ny tena, na tsy tao amin''ny tena, tsy fantatro, Andriamanitra no mahalala - '
  '4':
  - type: text
    content: 'fa nakarina ho any Paradisa izy ka nandre teny tsy azo tenenina sady tsy tokony holazain''olona. '
  '5':
  - type: text
    content: 'Ilay anankiray no hataoko rehareha; fa ny amin''ny tenako dia tsy hirehareha aho afa-tsy amin''ny fahalemena ihany. '
  '6':
  - type: text
    content: 'Fa na dia te-hirehareha aza aho, dia tsy ho adala, fa hilaza ny marina; nefa tsy manao izany aho, fandrao misy olona mihevitra ahy ho mihoatra noho izay ahitany ahy na izay andrenesany ny teniko. '
  '7':
  - type: text
    content: Ary fandrao hirehareha noho ny habetsaky ny fanambarana aho, dia nasiana tsilo tamin'ny nofo
  - type: note
    content: 'Na: Notsatohana hazo maranitra ny nofoko'
  - type: text
    content: ', dia irak''i Satana hamely ahy, fandrao hirehareha aho. '
  '8':
  - type: text
    content: 'Izany no nangatahako intelo tamin''ny Tompo, mba hialan''izany amiko. '
  '9':
  - type: text
    content: 'Nefa hoy Izy tamiko; Ampy ho anao ny fahasoavako; fa ny heriko. dia tanterahina amin''ny fahalemena. Koa mainka sitrako ny hirehareha amin''ny fahalemeko, mba hitoeran''ny herin''i Kristy amiko. '
