document_id: EZK.35,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny handravana an'i Edoma noho ny nandrafiany ny Isiraely
  - type: text
    content: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  '10':
  - type: text
    content: 'Ary noho ny nanaovanao hoe: Ireto firenena roa ireto sy ireto tany roa ireto dia ho ahy avokoa, Ka hanana azy izahay kanefa teo ihany Jehovah '
  '11':
  - type: text
    content: 'Dia izao no lazain''i Jehovah: Raha velona koa Aho, dia hanao araka ny fahatezeranao sy ny fialonanao Aho, izay nataonao noho ny fandrafianao azy; Ary hampahafantariko ao aminy ny tenako amin''ny hitsarako anao. '
  '12':
  - type: text
    content: 'Ka dia ho fantatrao fa Izaho Jehovah no efa nandre ny fanaratsiana, izay nolazainao ny amin''ireny tendrombohitry ny Isiraely hoe: Foana ireny ka nomena anay ho fivelomanay. '
  '13':
  - type: text
    content: 'Ary nanao teny miavonavona namely Ahy ianareo sy nanamaro ny teninareo namely Aha; efa reko izany. '
  '14':
  - type: text
    content: 'Izao no lazain''i Jehovah Tompo: Rehefa mifaly ny tany rehetra, dia hofoanako kosa ianao, '
  '15':
  - type: text
    content: 'Toy ny nifalianao ny amin''ny lovan''ny taranak''Isirady, satria nofoanana ireny, dia toy izany kosa no hataoko aminao: Ho foana ianao, ry tendrombohitra Seïra sy Edoma rehetra; Ka dia ho fantatra fa Izaho no Jehovah.'
  '2':
  - type: text
    content: 'Ry zanak''olona, manandrifia ny tendrombohitra Seïra, ka maminania ny hamelezana azy, '
  '3':
  - type: text
    content: 'dia ataovy aminy hoe: Izao no lazain''i Jehovah Tompo: Indro, avy hamely anao Aho, ry tendrombohitra Seïra, ary hahinjitro aminao ny tanako, ka hataoko foana sy lao ianao. '
  '4':
  - type: text
    content: 'Ny tanànanao hataoko korontam-bato, ary ianao ho lao; Ka dia ho fantatrao fa Izaho no Jehovah. '
  '5':
  - type: text
    content: Noho ny fandrafianao hatry ny fony ela sy ny nanoloranao ny zanak'Isiraely ho fatin
  - type: note
    content: Heb. ho eo an-tànan'
  - type: text
    content: '''ny sabatra, fony tamin''ny andro nahitany loza, dia ny fotoan''ny heloka mahafaty, '
  '6':
  - type: text
    content: 'Dia izao no lazain''i Jehovah: Raha velona koa Aho, dia hataoko manjary rà ianao, ary rà no hanenjika anao; Satria tsy nankahalainao ny rà, dia rà kosa no hanenjika anao. '
  '7':
  - type: text
    content: 'Hataoko foana sy lao ny tendrombohitra Seïra, sady hataoko tsy misy intsony ny mandroso sy ny miverina, '
  '8':
  - type: text
    content: 'Ary hofenoiko ny olony voavono ny tendrombohiny; Eny, ao amin''ny havoananao sy ny lohasahanao Ary amoron''ny lohasahan-driakanao rehetra no hiampatramparan''izay voatrabaky ny sabatra. '
  '9':
  - type: text
    content: 'Hataoko rava mandrakizay ianao, ary tsy honenana intsony ny tanànanao; Ka dia ho fantatrareo fa Izaho no Jehovah. '
