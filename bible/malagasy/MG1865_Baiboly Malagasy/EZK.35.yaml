document_id: EZK.35
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny handravana an'i Edoma noho ny nandrafiany ny Isiraely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry zanak''olona, manandrifia ny tendrombohitra Seïra, ka maminania ny hamelezana azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia ataovy aminy hoe: Izao no lazain''i Jehovah Tompo: Indro, avy hamely anao Aho, ry tendrombohitra Seïra, ary hahinjitro aminao ny tanako, ka hataoko foana sy lao ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny tanànanao hataoko korontam-bato, ary ianao ho lao; Ka dia ho fantatrao fa Izaho no Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Noho ny fandrafianao hatry ny fony ela sy ny nanoloranao ny zanak'Isiraely ho fatin
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ho eo an-tànan'
    marker-yv: yv-n
  - type: text
    text: '''ny sabatra, fony tamin''ny andro nahitany loza, dia ny fotoan''ny heloka mahafaty, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia izao no lazain''i Jehovah: Raha velona koa Aho, dia hataoko manjary rà ianao, ary rà no hanenjika anao; Satria tsy nankahalainao ny rà, dia rà kosa no hanenjika anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hataoko foana sy lao ny tendrombohitra Seïra, sady hataoko tsy misy intsony ny mandroso sy ny miverina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hofenoiko ny olony voavono ny tendrombohiny; Eny, ao amin''ny havoananao sy ny lohasahanao Ary amoron''ny lohasahan-driakanao rehetra no hiampatramparan''izay voatrabaky ny sabatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hataoko rava mandrakizay ianao, ary tsy honenana intsony ny tanànanao; Ka dia ho fantatrareo fa Izaho no Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary noho ny nanaovanao hoe: Ireto firenena roa ireto sy ireto tany roa ireto dia ho ahy avokoa, Ka hanana azy izahay kanefa teo ihany Jehovah '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia izao no lazain''i Jehovah: Raha velona koa Aho, dia hanao araka ny fahatezeranao sy ny fialonanao Aho, izay nataonao noho ny fandrafianao azy; Ary hampahafantariko ao aminy ny tenako amin''ny hitsarako anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ka dia ho fantatrao fa Izaho Jehovah no efa nandre ny fanaratsiana, izay nolazainao ny amin''ireny tendrombohitry ny Isiraely hoe: Foana ireny ka nomena anay ho fivelomanay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nanao teny miavonavona namely Ahy ianareo sy nanamaro ny teninareo namely Aha; efa reko izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izao no lazain''i Jehovah Tompo: Rehefa mifaly ny tany rehetra, dia hofoanako kosa ianao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Toy ny nifalianao ny amin''ny lovan''ny taranak''Isirady, satria nofoanana ireny, dia toy izany kosa no hataoko aminao: Ho foana ianao, ry tendrombohitra Seïra sy Edoma rehetra; Ka dia ho fantatra fa Izaho no Jehovah.'
