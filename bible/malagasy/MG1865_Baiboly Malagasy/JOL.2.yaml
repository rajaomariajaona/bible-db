document_id: JOL.2,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hitsaharan'ny loza, sy ny hihavian'ny fitahiana
  - type: text
    content: 'Tsofy ao Ziona ny anjomara! Ary miantsoa mafy ao an-tendrombohitro masina! Aoka hangovitra ny mponina rehetra amin''ny tany; Fa avy ny andron''i Jehovah, eny, efa antomotra izany, '
  '10':
  - type: text
    content: 'Eo alohany dia mihorohoro ny tany, ary mihozongozona ny lanitra; Ny masoandro sy ny volana tonga maizina, ary ny kintana tsy mamirapiratra. '
  '11':
  - type: text
    content: 'Ary Jehovah mahatonga kotroka eo alohan''ny miaramilany; Fa lehibe indrindra ny tobiny ary mahery izay manatanteraka ny teniny; Fa lehibe sy mahatahotra indrindra ny andron''i Jehovah, ka iza no mahatanty izany? '
  '12':
  - type: text
    content: 'Koa na dia ankehitriny aza, hoy Jehovah, miverena amiko amin''ny fonareo rehetra ary amin''ny fifadian-kanina sy ny fitomaniana ary ny fitarainana. '
  '13':
  - type: text
    content: 'Ary ny fonareo no triatriaro, fa aza ny fitafianareo, ary miverena amin''i Jehovah Andriamanitrareo; Fa mamindra fo sy miantra Izy, mahari-po sady be famindram-po ary manenina ny amin''ny loza, '
  '14':
  - type: text
    content: Fandrao mba
  - type: note
    content: Heb. Iza no mahalala na
  - type: text
    content: ' hanenina ihany Izy ka hamela fitahiana ao aoriany, dia fanatitra hohanina sy fanatitra aidina ho an''i Jehovah Andriamanitrareo. '
  '15':
  - type: text
    content: 'Tsofy ao Ziona ny anjomara, ka manamasina andro fifadian-kanina, miantsoa fivoriana masina. '
  '16':
  - type: text
    content: 'Angony ny vahoaka, manamasina fiangonana, vorio ny loholona, angòny ny ankizy madinika mbamin''ny zaza minono; Aoka ny mpampakatra hiala ao an-efi-tranony, ary aoka ny ampakarina hiala ao an-trano fandriany. '
  '17':
  - type: text
    content: 'Eo anelanelan''ny lavarangana fidirana sy ny alitara no aoka hitomanian''ny mpisorona, mpanao fanompoam-pivavahana ho an''i Jehovah, ka hanao hoe: Iantrao ny olonao, Jehovah, ary aza avela ho latsa ny lovanao, ka hotapahin''ny jentilisa'
  - type: note
    content: 'Na: Hanaovan''ny jentilisa azy ho ambentinteny'
  - type: text
    content: '; Fa nahoana no hataony any amin''ny firenena hoe: Aiza Izay Andriamaniny?'
  '18':
  - type: text
    content: 'Ary Jehovah dia saro-piaro ny taniny sady niantra ny olony. '
  '19':
  - type: text
    content: 'Eny, Jehovah namaly ka nanao amin''ny olony hoe: Indro, hanatitra ny divay sy ny ranom-boaloboka ary ny diloilo ho anareo Aho, ka ho vokin''izany ianareo; Ary tsy havelako ho latsa any amin''ny Jentilisa intsony ianareo. '
  '2':
  - type: text
    content: Dia andro maizina sy manjombona, andro mandrahona sy maizim-pito, toy ny fahazavan'ny maraina miely manerana ny tendrombohitra, dia firenena lehibe sy matanjaka, ka tsy nisy tahaka azy hatrizay hatrizay, sady tsy hisy tahaka azy intsony any aoriany hatramin'ny taonan'ny taranaka fara mandimby.
  '20':
  - type: text
    content: 'Ary ilay avy any avaratra dia hampanalaviriko anareo ka horoahiko ho any amin''ny tany karankaina sy mariry; Ny loha-lalany ho any amin''ny ranomasina atsinanana, ary ny vodi-lalany ho any amin''ny ranomasina andrefana; Ary ny hamaimboany hiakatra, ary ny fofon-dratsiny hisondrotra; Fa efa nanao zava-dehibe izy. '
  '21':
  - type: text
    content: 'Aza matahotra, ry tany fambolena, miravoravoa sy mifalia; Fa manao zava-dehibe Jehovah. '
  '22':
  - type: text
    content: 'Aza matahotra, ry biby any an-tsaha, fa mihamaitso ny kijana any an-efitra, mamoa ny hazo, ary vokatra ny aviavy sy ny voaloboka. '
  '23':
  - type: text
    content: Ary ianareo, ry zanak'i Ziona, miravoravoa sy mifalia amin'i Jehovah Andriamanitrareo; Fa hanome anareo ny loha-orana onony Izy
  - type: note
    content: 'Na: Homeny mpampianatra ny fahamarinana ianareo'
  - type: text
    content: ', dia handatsaka ranonorana mivatravatra ho anareo, eny, ny loha-orana sy ny fara-orana aloha. '
  '24':
  - type: text
    content: 'Dia ho feno vary ny famoloana, ary hihoatra ny vata fanantazana ny divay sy ny diloilo. '
  '25':
  - type: text
    content: 'Ary honerako ho anareo ilay taona nohanin''ny valala, dia ny koraika sy ny sompanga ary ny kijeja, izay miaramilako betsaka nalefako hamely anareo. '
  '26':
  - type: text
    content: 'Ary hihinana ianareo ka ho voky dia hidera ny anaran''i Jehovah Andriamanitrareo, fa mahagaga ny fitondrany anareo; Ary tsy ho menatra mandrakizay oloko. '
  '27':
  - type: text
    content: Dia ho fantatrareo fa ao afovoan'Isiraely Aho, ary Izaho no Jehovah Andriamanitrareo, fa tsy misy hafa; Ary tsy ho menatra mandrakizay ny oloko.
  '3':
  - type: text
    content: 'Eo alohany misy afo mandevona, ary any aoriany misy lelafo mandoro; Tahaka ny saha Edena ny tany eo alohany, fa ny any aoriany kosa dia tahaka ny efitra foana, eny, tsy misy tsy azony. '
  '4':
  - type: text
    content: 'Mitarehin-tsoavaly ny tarehiny; Ary tahaka ny firiotry ny mpitaingin-tsoavaly ny firiotrany. '
  '5':
  - type: text
    content: 'Tahaka ny figorodon''ny kalesy any an-tampon''ny tendrombohitra no figorodon''ny fitsambikimbikiny, sy tahaka ny fipororotry ny lelafo eny amin''ny hain-tanety, ary tahaka ny firenena mahery voalamina hiady. '
  '6':
  - type: text
    content: Eo anoloany dia raiki-tahotra indrindra ny firenena; Ny tarehy rehetra mivaloarika
  - type: note
    content: 'Na: tera-mena'
  - type: text
    content: '; '
  '7':
  - type: text
    content: 'Mitsarapaka tahaka ny lehilahy mahery izy ary mananika ny manda tahaka ny mpiady, samy mandroso amin''izay hitsiny ka tsy vaky laharana; '
  '8':
  - type: text
    content: Tsy mifanosika izy, fa samy mandroso amin'izay hitsiny; Ary na dia miezaka mamaky ny sabatra aza izy, dia tsy voaratra
  - type: note
    content: 'Na: voasakana'
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Mifamoivoy eran''ny tanàna izy, mihazakazaka eny amin''ny manda izy, mananika ny trano izy, miditra ao am-baravarankely toy ny mpangalatra izy. '
