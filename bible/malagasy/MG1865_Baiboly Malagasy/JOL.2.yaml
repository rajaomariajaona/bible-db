document_id: JOL.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hitsaharan'ny loza, sy ny hihavian'ny fitahiana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tsofy ao Ziona ny anjomara! Ary miantsoa mafy ao an-tendrombohitro masina! Aoka hangovitra ny mponina rehetra amin''ny tany; Fa avy ny andron''i Jehovah, eny, efa antomotra izany, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia andro maizina sy manjombona, andro mandrahona sy maizim-pito, toy ny fahazavan'ny maraina miely manerana ny tendrombohitra, dia firenena lehibe sy matanjaka, ka tsy nisy tahaka azy hatrizay hatrizay, sady tsy hisy tahaka azy intsony any aoriany hatramin'ny taonan'ny taranaka fara mandimby.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Eo alohany misy afo mandevona, ary any aoriany misy lelafo mandoro; Tahaka ny saha Edena ny tany eo alohany, fa ny any aoriany kosa dia tahaka ny efitra foana, eny, tsy misy tsy azony. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mitarehin-tsoavaly ny tarehiny; Ary tahaka ny firiotry ny mpitaingin-tsoavaly ny firiotrany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tahaka ny figorodon''ny kalesy any an-tampon''ny tendrombohitra no figorodon''ny fitsambikimbikiny, sy tahaka ny fipororotry ny lelafo eny amin''ny hain-tanety, ary tahaka ny firenena mahery voalamina hiady. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Eo anoloany dia raiki-tahotra indrindra ny firenena; Ny tarehy rehetra mivaloarika
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tera-mena'
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mitsarapaka tahaka ny lehilahy mahery izy ary mananika ny manda tahaka ny mpiady, samy mandroso amin''izay hitsiny ka tsy vaky laharana; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsy mifanosika izy, fa samy mandroso amin'izay hitsiny; Ary na dia miezaka mamaky ny sabatra aza izy, dia tsy voaratra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: voasakana'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mifamoivoy eran''ny tanàna izy, mihazakazaka eny amin''ny manda izy, mananika ny trano izy, miditra ao am-baravarankely toy ny mpangalatra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Eo alohany dia mihorohoro ny tany, ary mihozongozona ny lanitra; Ny masoandro sy ny volana tonga maizina, ary ny kintana tsy mamirapiratra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Jehovah mahatonga kotroka eo alohan''ny miaramilany; Fa lehibe indrindra ny tobiny ary mahery izay manatanteraka ny teniny; Fa lehibe sy mahatahotra indrindra ny andron''i Jehovah, ka iza no mahatanty izany? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa na dia ankehitriny aza, hoy Jehovah, miverena amiko amin''ny fonareo rehetra ary amin''ny fifadian-kanina sy ny fitomaniana ary ny fitarainana. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny fonareo no triatriaro, fa aza ny fitafianareo, ary miverena amin''i Jehovah Andriamanitrareo; Fa mamindra fo sy miantra Izy, mahari-po sady be famindram-po ary manenina ny amin''ny loza, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fandrao mba
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Iza no mahalala na
    marker-yv: yv-n
  - type: text
    text: ' hanenina ihany Izy ka hamela fitahiana ao aoriany, dia fanatitra hohanina sy fanatitra aidina ho an''i Jehovah Andriamanitrareo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tsofy ao Ziona ny anjomara, ka manamasina andro fifadian-kanina, miantsoa fivoriana masina. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Angony ny vahoaka, manamasina fiangonana, vorio ny loholona, angòny ny ankizy madinika mbamin''ny zaza minono; Aoka ny mpampakatra hiala ao an-efi-tranony, ary aoka ny ampakarina hiala ao an-trano fandriany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Eo anelanelan''ny lavarangana fidirana sy ny alitara no aoka hitomanian''ny mpisorona, mpanao fanompoam-pivavahana ho an''i Jehovah, ka hanao hoe: Iantrao ny olonao, Jehovah, ary aza avela ho latsa ny lovanao, ka hotapahin''ny jentilisa'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Hanaovan''ny jentilisa azy ho ambentinteny'
    marker-yv: yv-n
  - type: text
    text: '; Fa nahoana no hataony any amin''ny firenena hoe: Aiza Izay Andriamaniny?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary Jehovah dia saro-piaro ny taniny sady niantra ny olony. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Eny, Jehovah namaly ka nanao amin''ny olony hoe: Indro, hanatitra ny divay sy ny ranom-boaloboka ary ny diloilo ho anareo Aho, ka ho vokin''izany ianareo; Ary tsy havelako ho latsa any amin''ny Jentilisa intsony ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ilay avy any avaratra dia hampanalaviriko anareo ka horoahiko ho any amin''ny tany karankaina sy mariry; Ny loha-lalany ho any amin''ny ranomasina atsinanana, ary ny vodi-lalany ho any amin''ny ranomasina andrefana; Ary ny hamaimboany hiakatra, ary ny fofon-dratsiny hisondrotra; Fa efa nanao zava-dehibe izy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Aza matahotra, ry tany fambolena, miravoravoa sy mifalia; Fa manao zava-dehibe Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Aza matahotra, ry biby any an-tsaha, fa mihamaitso ny kijana any an-efitra, mamoa ny hazo, ary vokatra ny aviavy sy ny voaloboka. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary ianareo, ry zanak'i Ziona, miravoravoa sy mifalia amin'i Jehovah Andriamanitrareo; Fa hanome anareo ny loha-orana onony Izy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Homeny mpampianatra ny fahamarinana ianareo'
    marker-yv: yv-n
  - type: text
    text: ', dia handatsaka ranonorana mivatravatra ho anareo, eny, ny loha-orana sy ny fara-orana aloha. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia ho feno vary ny famoloana, ary hihoatra ny vata fanantazana ny divay sy ny diloilo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary honerako ho anareo ilay taona nohanin''ny valala, dia ny koraika sy ny sompanga ary ny kijeja, izay miaramilako betsaka nalefako hamely anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary hihinana ianareo ka ho voky dia hidera ny anaran''i Jehovah Andriamanitrareo, fa mahagaga ny fitondrany anareo; Ary tsy ho menatra mandrakizay oloko. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Dia ho fantatrareo fa ao afovoan'Isiraely Aho, ary Izaho no Jehovah Andriamanitrareo, fa tsy misy hafa; Ary tsy ho menatra mandrakizay ny oloko.
