document_id: ZEP.3,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny hibebahan'ny jentilisa, sy ny hanomezam-boninahitra ny Isiraely
  - type: text
    content: 'Lozan''ny tanàna miodina sady voaloto, Dia ilay mampahory! '
  '10':
  - type: text
    content: Avy any an-dafin'ny onin'i Etiopia no hitondrana ny mpivavaka amiko, Dia ny zanakavavin'izay naeliko, ho fanatitra ho Ahy
  - type: note
    content: 'Na: hitondran''ny mpivavaka amiko ... ny fanatitra ho ahy'
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Amin''izany andro izany dia tsy ho menatra ianao tamin''izay nataonao rehetra, Izay nanotanao tamiko; Ka dia hesoriko aminao ireo mibitaka amim-pireharehana, Ary tsy hiavonavona eo an-tendrombohitro masina intsony ianao. '
  '12':
  - type: text
    content: 'Nefa hamelako olona ory sy malahelo ihany ao aminao, Ary ny anaran''i Jehovah no hialofany, '
  '13':
  - type: text
    content: 'Ny sisa amin''ny Isiraely dia tsy hanao meloka na handainga, Ary tsy hisy lela mamitaka eo am-bavany; Fa hihinana sy handry izy, ka tsy hisy hanaitaitra azy. '
  '14':
  - type: text
    content: 'Mihobia, ry Ziona zanakavavy; Manaova feo fifaliana, ry Isiraely; Mifalia sy miravoravoa amin''ny fonao rehetra, ry Jerosalema zanakavavy. '
  '15':
  - type: text
    content: 'Jehovah efa nampitsahatra ny fitsarana anao ka nandroaka ny fahavalonao; Jehovah, Mpanjakan''ny Isiraely, no ao aminao; Tsy hahita loza intsony ianao. '
  '16':
  - type: text
    content: 'Amin''izany andro izany dia holazaina amin''i Jerosalema hoe: Aza matahotra Ary aza miraviravy tanana, ry Ziona. '
  '17':
  - type: text
    content: Jehovah Andriamanitrao no ao aminao, Mahery Izy ka hamonjy; Hiravoravo anao amin'ny fifaliana Izy; Ho sondriana
  - type: note
    content: Heb. hangina
  - type: text
    content: ' amin''ny fitiavany Izy; Hifaly anao amin''ny fihobiana Izy. '
  '18':
  - type: text
    content: Hangoniko izay manina
  - type: note
    content: 'Na: efa lavitra'
  - type: text
    content: ' ny fotoam-pivavahana; Avy aminao ihany ireny, Ary itambesaran''ny latsa izy'
  - type: note
    content: 'Na: Ary mitambesatra aminy ny fandatsana anao (Heb. fandatsana azy); na: Avy taminao izay itambesaran''ny latsa ireny'
  - type: text
    content: '. '
  '19':
  - type: text
    content: Indro, hasiako amin'Izany andro izany izay rehetra nampahory anao; Hovonjeko ny mandringa, ary hovoriko ny noroahina, Eny, hataoko ho fiderana sy ho anarana ireny izay efa nitondra henatra tany amin'ny tany rehetra
  - type: note
    content: 'Na: any amin''ny tany rehetra izay efa nitondrany henatra'
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'Tsy nihaino ny feo izy, Na nino anatra; Jehovah tsy nitokiany, Andriamaniny tsy nohatoniny. '
  '20':
  - type: text
    content: Amin'izany andro izany no hitondrako anareo miditra, Eny, amin'izany andro izany no hanangonako anareo; Fa hataoko ho anarana sy ho fiderana any amin'ny firenena rehetra amin'ny tany ianareo, Raha hampodiko avy amin'ny fahababoana ianareo, ka ho hitan'ny masonareo izany, hoy Jehovah.
  '3':
  - type: text
    content: Liona mierona ao aminy ireo lehibeny; Amboadia
  - type: note
    content: Lopa
  - type: text
    content: ' hariva ny mpitsarany Ka tsy mamela'
  - type: note
    content: 'Na: tsy mamela taolana'
  - type: text
    content: ' ho tra-maraina. '
  '4':
  - type: text
    content: 'Vavana sady mpamitaka ny mpaminaniny; Mandoto izay masina ny mpisorony, Eny, mamadika ny lalàna izy. '
  '5':
  - type: text
    content: 'Jehovah no marina ao afovoany, Tsy manao izay tsy marina Izy; Isa-maraina isa-maraina no amoahany ny fitsarany ho amin''ny mazava, ka tsy diso izany. Fa ny tsy marina tsy mba mahalala henatra. '
  '6':
  - type: text
    content: 'Efa nahafongana firenena Aho, Rava ny tilikambo eny amin''ny zorony; Nosimbako ny lalany tsy hisy mpandeha; Rava ny tanànany, ka tsy misy olona, Eny, tsy misy mponina. '
  '7':
  - type: text
    content: 'Hoy Izaho: Hatahotra Ahy tokoa ianao ka hino anatra, Dia tsy ho rava ny fonenanao'
  - type: note
    content: Heb. fonenany
  - type: text
    content: ', Araka izay rehetra voatendriko hamelezana anao'
  - type: note
    content: Heb. azy
  - type: text
    content: ; Kanefa nifoha maraina koa izy ka nanao Izay ratsy rehetra.
  '8':
  - type: text
    content: 'Koa miandrasa Ahy ianareo, hoy Jehovah, Ambara-pihavin''ny andro hitsanganako haka babo; Fa izao no kasaiko hatao: Hamory firenena sy hanangona fanjakana Aho, Hanidinako ny fahatezerako amin''ireo, dia ny firehetan''ny fahatezerako rehetra, Ka ho levon''ny afon''ny fahasaro-piaroko ny tany rehetra.'
  '9':
  - type: text
    content: Fa amin'izany dia hovako ho madio ny molotry ny firenena, Hiantsoan'izy rehetra ny anaran'i Jehovah, hanompoany Azy amin'ny firaisan-kina
  - type: note
    content: Heb. soroka iray
  - type: text
    content: '. '
