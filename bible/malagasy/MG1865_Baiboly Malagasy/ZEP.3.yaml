document_id: ZEP.3,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'ny hibebahan'ny jentilisa, sy ny hanomezam-boninahitra ny Isiraely
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Lozan''ny tanàna miodina sady voaloto, Dia ilay mampahory! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Avy any an-dafin'ny onin'i Etiopia no hitondrana ny mpivavaka amiko, Dia ny zanakavavin'izay naeliko, ho fanatitra ho Ahy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: hitondran''ny mpivavaka amiko ... ny fanatitra ho ahy'
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Amin''izany andro izany dia tsy ho menatra ianao tamin''izay nataonao rehetra, Izay nanotanao tamiko; Ka dia hesoriko aminao ireo mibitaka amim-pireharehana, Ary tsy hiavonavona eo an-tendrombohitro masina intsony ianao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nefa hamelako olona ory sy malahelo ihany ao aminao, Ary ny anaran''i Jehovah no hialofany, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ny sisa amin''ny Isiraely dia tsy hanao meloka na handainga, Ary tsy hisy lela mamitaka eo am-bavany; Fa hihinana sy handry izy, ka tsy hisy hanaitaitra azy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mihobia, ry Ziona zanakavavy; Manaova feo fifaliana, ry Isiraely; Mifalia sy miravoravoa amin''ny fonao rehetra, ry Jerosalema zanakavavy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Jehovah efa nampitsahatra ny fitsarana anao ka nandroaka ny fahavalonao; Jehovah, Mpanjakan''ny Isiraely, no ao aminao; Tsy hahita loza intsony ianao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Amin''izany andro izany dia holazaina amin''i Jerosalema hoe: Aza matahotra Ary aza miraviravy tanana, ry Ziona. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Jehovah Andriamanitrao no ao aminao, Mahery Izy ka hamonjy; Hiravoravo anao amin'ny fifaliana Izy; Ho sondriana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. hangina
      marker-yv: yv-n
    - type: text
      text: ' amin''ny fitiavany Izy; Hifaly anao amin''ny fihobiana Izy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Hangoniko izay manina
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: efa lavitra'
      marker-yv: yv-n
    - type: text
      text: ' ny fotoam-pivavahana; Avy aminao ihany ireny, Ary itambesaran''ny latsa izy'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Ary mitambesatra aminy ny fandatsana anao (Heb. fandatsana azy); na: Avy taminao izay itambesaran''ny latsa ireny'
      marker-yv: yv-n
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Indro, hasiako amin'Izany andro izany izay rehetra nampahory anao; Hovonjeko ny mandringa, ary hovoriko ny noroahina, Eny, hataoko ho fiderana sy ho anarana ireny izay efa nitondra henatra tany amin'ny tany rehetra
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: any amin''ny tany rehetra izay efa nitondrany henatra'
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Tsy nihaino ny feo izy, Na nino anatra; Jehovah tsy nitokiany, Andriamaniny tsy nohatoniny. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Amin'izany andro izany no hitondrako anareo miditra, Eny, amin'izany andro izany no hanangonako anareo; Fa hataoko ho anarana sy ho fiderana any amin'ny firenena rehetra amin'ny tany ianareo, Raha hampodiko avy amin'ny fahababoana ianareo, ka ho hitan'ny masonareo izany, hoy Jehovah.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Liona mierona ao aminy ireo lehibeny; Amboadia
    - type: usfm
      marker: x
      children:
      - type: text
        text: Lopa
      marker-yv: yv-n
    - type: text
      text: ' hariva ny mpitsarany Ka tsy mamela'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: tsy mamela taolana'
      marker-yv: yv-n
    - type: text
      text: ' ho tra-maraina. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Vavana sady mpamitaka ny mpaminaniny; Mandoto izay masina ny mpisorony, Eny, mamadika ny lalàna izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Jehovah no marina ao afovoany, Tsy manao izay tsy marina Izy; Isa-maraina isa-maraina no amoahany ny fitsarany ho amin''ny mazava, ka tsy diso izany. Fa ny tsy marina tsy mba mahalala henatra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Efa nahafongana firenena Aho, Rava ny tilikambo eny amin''ny zorony; Nosimbako ny lalany tsy hisy mpandeha; Rava ny tanànany, ka tsy misy olona, Eny, tsy misy mponina. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Hoy Izaho: Hatahotra Ahy tokoa ianao ka hino anatra, Dia tsy ho rava ny fonenanao'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. fonenany
      marker-yv: yv-n
    - type: text
      text: ', Araka izay rehetra voatendriko hamelezana anao'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. azy
      marker-yv: yv-n
    - type: text
      text: ; Kanefa nifoha maraina koa izy ka nanao Izay ratsy rehetra.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Koa miandrasa Ahy ianareo, hoy Jehovah, Ambara-pihavin''ny andro hitsanganako haka babo; Fa izao no kasaiko hatao: Hamory firenena sy hanangona fanjakana Aho, Hanidinako ny fahatezerako amin''ireo, dia ny firehetan''ny fahatezerako rehetra, Ka ho levon''ny afon''ny fahasaro-piaroko ny tany rehetra.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa amin'izany dia hovako ho madio ny molotry ny firenena, Hiantsoan'izy rehetra ny anaran'i Jehovah, hanompoany Azy amin'ny firaisan-kina
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. soroka iray
      marker-yv: yv-n
    - type: text
      text: '. '
