document_id: PSA.108
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fahatokiana an'Andriamanitra sy fanantenana ny heriny haharesy ny fahavalo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tonon-kira. Salamo nataon'i Davida. Andriamanitra ô, tafatoetra ny foko; Ny fanahiko
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ny voninahitro
    marker-yv: yv-n
  - type: text
    text: ' no hihira sy hankalaza. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mifohaza, ry valiha sy lokanga; hifoha maraina koa aho
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hampifoha ny maraina aho'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hidera Anao eny amin''ny firenena maro aho, Jehovah ô, Ary hankalaza Anao eny amin''ny jentilisa. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa lehibe mihoatra ny lanitra ny famindram-ponao; Ary mipaka eny amin''ny rahona ny fahamarinanao. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Misandrata any ambonin''ny lanitra Hianao, Andriamanitra ô; Ary aoka ho etỳ ambonin''ny tany rehetra ny voninahitrao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mba hahafaka ny malalanao, Dia vonjeo amin'ny tananao ankavanana aho, ka valio.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Andriamanitra niteny tamin''ny fahamasinany hoe: Hifaly Aho ka hizara an''i Sekema, Ary ny lohasahan''i Sokota horefesiko; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ahy Gileada, Ahy Manase; Ary aron''ny lohako Efraima; Tehim-panjakako Joda; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tavindranoko fanasana Moaba; Edoma no hanipazako ny kapako; noho ny amin'i Filistia ho hihobiako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Iza no hitondra ahy ho any an-tanàna mafy? Iza no hitarika ahy ho any Edoma? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tsy Hianao va no efa nanary anay, Andriamanitra ô, Sady tsy mivoaka miaraka amin''ny miaramilanay, Andriamanitra ô? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Vonjeo amin''ny fahavalo izahay; Fa zava-poana ny famonjena ataon''ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Andriamanitra no haharezan-tsika; Fa Izy no hanitsakitsaka ny fahavalontsika.
