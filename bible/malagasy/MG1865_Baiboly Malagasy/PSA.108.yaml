document_id: PSA.108,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahatokiana an'Andriamanitra sy fanantenana ny heriny haharesy ny fahavalo
  - type: text
    content: Tonon-kira. Salamo nataon'i Davida. Andriamanitra ô, tafatoetra ny foko; Ny fanahiko
  - type: note
    content: Heb. ny voninahitro
  - type: text
    content: ' no hihira sy hankalaza. '
  '10':
  - type: text
    content: 'Iza no hitondra ahy ho any an-tanàna mafy? Iza no hitarika ahy ho any Edoma? '
  '11':
  - type: text
    content: 'Tsy Hianao va no efa nanary anay, Andriamanitra ô, Sady tsy mivoaka miaraka amin''ny miaramilanay, Andriamanitra ô? '
  '12':
  - type: text
    content: 'Vonjeo amin''ny fahavalo izahay; Fa zava-poana ny famonjena ataon''ny olona. '
  '13':
  - type: text
    content: Andriamanitra no haharezan-tsika; Fa Izy no hanitsakitsaka ny fahavalontsika.
  '2':
  - type: text
    content: Mifohaza, ry valiha sy lokanga; hifoha maraina koa aho
  - type: note
    content: 'Na: hampifoha ny maraina aho'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Hidera Anao eny amin''ny firenena maro aho, Jehovah ô, Ary hankalaza Anao eny amin''ny jentilisa. '
  '4':
  - type: text
    content: 'Fa lehibe mihoatra ny lanitra ny famindram-ponao; Ary mipaka eny amin''ny rahona ny fahamarinanao. '
  '5':
  - type: text
    content: 'Misandrata any ambonin''ny lanitra Hianao, Andriamanitra ô; Ary aoka ho etỳ ambonin''ny tany rehetra ny voninahitrao. '
  '6':
  - type: text
    content: Mba hahafaka ny malalanao, Dia vonjeo amin'ny tananao ankavanana aho, ka valio.
  '7':
  - type: text
    content: 'Andriamanitra niteny tamin''ny fahamasinany hoe: Hifaly Aho ka hizara an''i Sekema, Ary ny lohasahan''i Sokota horefesiko; '
  '8':
  - type: text
    content: 'Ahy Gileada, Ahy Manase; Ary aron''ny lohako Efraima; Tehim-panjakako Joda; '
  '9':
  - type: text
    content: Tavindranoko fanasana Moaba; Edoma no hanipazako ny kapako; noho ny amin'i Filistia ho hihobiako.
