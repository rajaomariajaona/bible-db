document_id: PSA.38,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fivavak'izay ory dia ory indrindra
  - type: text
    content: Salamo nataon'i Davida. Ho fampahatsiarovana. Jehovah ô, aza ny fahatezeranao no ananaranao ahy; ary aza ny fahaviniranao no amaizanao ahy.
  '10':
  - type: text
    content: 'Miemponempona ny foko, lany ny heriko, ary ny fahiratan''ny masoko aza efa nandao ahy. '
  '11':
  - type: text
    content: 'Ny olo-malalako sy ny sakaizako aza efa manalavitra ny fahoriako; Ary ny havako mijanona eny lavitra eny. '
  '12':
  - type: text
    content: Mamela-pandrika izay mitady ny aiko; ary izay mitady hanimba ahy miteny fanimbana,sy misaim-pitaka mandrakariva.
  '13':
  - type: text
    content: 'Fa izaho dia tahaka ny marenina ka tsy mandre, ary tahaka ny moana ka tsy mahaloa-bava; '
  '14':
  - type: text
    content: 'Eny, dia tahaka ny olona tsy mandre, sady tsy misy teny havaly eo am-bavany. '
  '15':
  - type: text
    content: 'Fa ianao no antenaiko Jehovah ô; ianao no hamaly, ry Tompo Andriamanitra ô. '
  '16':
  - type: text
    content: 'Fa hoy izaho: sao dia hifalian''izy ireo anie aho;ary raha mibolisatra ny tongotro, dia hirehareha amiko izy. '
  '17':
  - type: text
    content: 'Fa efa ho lavo aho, ary ny fanaintainako dia tsaroako mandrakariva. '
  '18':
  - type: text
    content: Fa ny heloko no hambarako; matahotra
  - type: note
    content: 'Na: Malahelo'
  - type: text
    content: ' aho noho ny fahotako. '
  '19':
  - type: text
    content: 'Fa ny fahavaloko velona ihany sady mahery; ary maro no mandrafy ahy tsy ahoan-tsy ahoana; '
  '2':
  - type: text
    content: 'Fa mitsatoka amiko ny zana-tsipìkanao,ary manindry ahy mafy ny tananao, '
  '20':
  - type: text
    content: 'Ary mamaly ratsy ny soa izy ireo ka mandrafy ahy ho valin''ny fanarahako ny tsara. '
  '21':
  - type: text
    content: 'Aza mahafoy ahy,Jehovah ô; Ry Andriamanitro ô, aza manalavitra ahy. '
  '22':
  - type: text
    content: Faingàna hamonjy ahy, ry Tompo, Mpamonjy ahy ô.
  '3':
  - type: text
    content: 'Tsy misy fahasalamana ny nofoko noho ny fahatezeranao; tsy misy tsy marary ny taolako noho ny fahotako. '
  '4':
  - type: text
    content: 'Fa ny heloko efa mihoatra ny lohako; tahaka ny entana mavesatra izy ka tsy zakako. '
  '5':
  - type: text
    content: 'Maimbo sady mihady ny feriko noho ny hadalako. '
  '6':
  - type: text
    content: 'Mitanondrika sy mijoretra indrindra aho, ary misaona mandrakariva. '
  '7':
  - type: text
    content: 'Ary ny vaniako henika ny aretina mahamay, ka tsy misy fahasalamana ny nofoko. '
  '8':
  - type: text
    content: Marikoditra aho sady torovana indrindra; midradradradra aho noho ny fitolokon'ny foko.
  '9':
  - type: text
    content: 'Ry Tompo ô, eo anatrehanao ny faniriako rehetra;ary ny fisentoako tsy mba miafina aminao. '
