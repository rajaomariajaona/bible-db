document_id: PSA.38
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fivavak'izay ory dia ory indrindra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Salamo nataon'i Davida. Ho fampahatsiarovana. Jehovah ô, aza ny fahatezeranao no ananaranao ahy; ary aza ny fahaviniranao no amaizanao ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa mitsatoka amiko ny zana-tsipìkanao,ary manindry ahy mafy ny tananao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tsy misy fahasalamana ny nofoko noho ny fahatezeranao; tsy misy tsy marary ny taolako noho ny fahotako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa ny heloko efa mihoatra ny lohako; tahaka ny entana mavesatra izy ka tsy zakako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Maimbo sady mihady ny feriko noho ny hadalako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mitanondrika sy mijoretra indrindra aho, ary misaona mandrakariva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny vaniako henika ny aretina mahamay, ka tsy misy fahasalamana ny nofoko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Marikoditra aho sady torovana indrindra; midradradradra aho noho ny fitolokon'ny foko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ry Tompo ô, eo anatrehanao ny faniriako rehetra;ary ny fisentoako tsy mba miafina aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Miemponempona ny foko, lany ny heriko, ary ny fahiratan''ny masoko aza efa nandao ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny olo-malalako sy ny sakaizako aza efa manalavitra ny fahoriako; Ary ny havako mijanona eny lavitra eny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mamela-pandrika izay mitady ny aiko; ary izay mitady hanimba ahy miteny fanimbana,sy misaim-pitaka mandrakariva.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa izaho dia tahaka ny marenina ka tsy mandre, ary tahaka ny moana ka tsy mahaloa-bava; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Eny, dia tahaka ny olona tsy mandre, sady tsy misy teny havaly eo am-bavany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa ianao no antenaiko Jehovah ô; ianao no hamaly, ry Tompo Andriamanitra ô. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa hoy izaho: sao dia hifalian''izy ireo anie aho;ary raha mibolisatra ny tongotro, dia hirehareha amiko izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa efa ho lavo aho, ary ny fanaintainako dia tsaroako mandrakariva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa ny heloko no hambarako; matahotra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Malahelo'
    marker-yv: yv-n
  - type: text
    text: ' aho noho ny fahotako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa ny fahavaloko velona ihany sady mahery; ary maro no mandrafy ahy tsy ahoan-tsy ahoana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary mamaly ratsy ny soa izy ireo ka mandrafy ahy ho valin''ny fanarahako ny tsara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Aza mahafoy ahy,Jehovah ô; Ry Andriamanitro ô, aza manalavitra ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Faingàna hamonjy ahy, ry Tompo, Mpamonjy ahy ô.
