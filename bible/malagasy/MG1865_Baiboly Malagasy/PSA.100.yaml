document_id: PSA.100,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoana izao tontolo izao hanompo an'i Jehovah
  - type: text
    content: 'Salamo ho fiderana. Mihobia ho an''i Jehovah, ry tany rehetra. '
  '2':
  - type: text
    content: 'Manompoa an''i Jehovah amin''ny fifaliana; Mankanesa eo anatrehany amin''ny fihobiana. '
  '3':
  - type: text
    content: Aoka ho fantatrareo fa Jehovah no Andriamanitra; Izy no nanao antsika, ary Azy isika
  - type: note
    content: 'Na: fa tsy isika'
  - type: text
    content: ', Dia olony sy ondry fiandriny. '
  '4':
  - type: text
    content: 'Midira eo amin''ny vavahadiny amin''ny fisaorana, Ary eo an-kianjany amin''ny fiderana; Misaora Azy, mankalazà ny anarany, '
  '5':
  - type: text
    content: Fa tsara Jehovah; Mandrakizay ny famindram-pony, Ary mihatra amin'ny taranaka fara mandimby ny fahamarinany.
