document_id: PSA.100
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiantsoana izao tontolo izao hanompo an'i Jehovah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Salamo ho fiderana. Mihobia ho an''i Jehovah, ry tany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Manompoa an''i Jehovah amin''ny fifaliana; Mankanesa eo anatrehany amin''ny fihobiana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aoka ho fantatrareo fa Jehovah no Andriamanitra; Izy no nanao antsika, ary Azy isika
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fa tsy isika'
    marker-yv: yv-n
  - type: text
    text: ', Dia olony sy ondry fiandriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Midira eo amin''ny vavahadiny amin''ny fisaorana, Ary eo an-kianjany amin''ny fiderana; Misaora Azy, mankalazà ny anarany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa tsara Jehovah; Mandrakizay ny famindram-pony, Ary mihatra amin'ny taranaka fara mandimby ny fahamarinany.
