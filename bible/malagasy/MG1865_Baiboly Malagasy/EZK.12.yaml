document_id: EZK.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nasain'Andriamanitra nataon'i Ezekiela hahalalan'ny Isiraely fa samy ho lasan-ko babo, na ny mpanjaka, na ny vahoaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry zanak''olona, ianao monina eto amin''ny taranaka maditra, izay mana-maso hahitana, nefa tsy mahita, ary manan-tsofina handrenesana, nefa tsy mandre fa taranaka maditra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa ianao, ry zanak''olona, mifeheza entana handeha hifindra ho any amin''ny fahababoana, ka miaingà antoandro eo imasony; ary mialà eo imasony eo amin''izay itoeranao ho any amin''ny fitoerana hafa; angamba mba ho fantany fa taranaka maditra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia havoakanao antoandro eo imasony ny entanao, toy ny entan''ny olona handeha ho any amin''ny fahababoana; fa ny tenanao kosa dia hivoaka hariva eo imasony toy ny fivoaky ny handeha ho any amin''ny fahababoana. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Boroboahy eo imasony ny manda, ka ao no amoahy ny entanao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ataovy an-tsoroka eo imasony no fitondranao azy, ka ento mivoaka, rehefa maizina dia maizina ny andro; sarony ny tavanao mba tsy hahitanao ny tany; fa efa nataoko ho famantarana mahagaga ho an''ny taranak''Isiraely ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nanao araka izay efa nandidiana ahy aho, ka nentiko nivoaka antoandro ny entako, toy py entan''ny olona handeha ho any amin''ny fahababoana, ary nony hariva dia noboroboahako tamin''ny tanako ny manda, ka nony efa maizina dia maizina ny andro, dia nentiko nivoaka izany ka teny an-tsoroka no nitondrako azy teo imasony. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nony maraina dia tonga tamiko ny tenin''i Jehovah nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ry zanak''olona, moa ny taranak''Isiraely, izay taranaka maditra, tsy manontany aminao hoe va: Inona izao ataonao izao? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ambarao aminy hoe: Izao no lazain''i Jehovah Tompo: Ity faminaniana ny loza ity dia ho amin''ny mpanjakan''i Jerosalema sy ny taranak''Isiraely rehetra izay ao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lazao hoe: Izaho dia famantarana mahagaga ho anareo, koa tahaka izay ataoko no hatao amin''ireo; hifindra sy ho lasan-ko babo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny mpanjaka, izay ao aminy dia hitondra ny entany eny an-tsorony nony efa maizina dia maizina ny andro ka hivoaka; hoboroboahan''ny olona ny manda hamoahana azy; hanarona ny tavany izy mba tsy ho hitan''ny masony ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny fandrika haratoko dia hovelariko aminy, ka ho voan''ny fandrika izy; dia ho entiko any Babylona any amin''ny tanin''ny Kaldeana izy, ary tsy hahita izany, nefa ho faty any ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary izay rehetra manodidina azy, dia ny mpanampy azy sy ny miaramilany rehetra, haeliko ho amin''ny rivotra rehetra, sady hanatsoaka sabatra ho enti-manenjika azy Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary dia ho fantany fa Izaho no Jehovah, raha ahahako any amin''ny jentilisa sy ampieleziko any amin''ny tany samy hafa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nefa hamelako olom-bitsy ihany izy ho sisa tsy ho ringan''ny sabatra.sy ny mosary sy ny areti- mandringana, mba hisy hitantara ny fahavetavetany rehetra any amin''ny jentilisa izay alehany; ka dia ho fantany fa Izaho no Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tonga tamiko ny tenin''i Jehovah nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ry zanak''olona, hano amin-korohoro ny haninao, ary sotroy amin-kovitra sy amin''ahiahy ny ranonao. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary lazao amin''ny vahoaka hoe Izao no lazain''i Jehovah Tompo ny amin''ny mponina ao Jerosalema, ao amin''ny tanin''ny Isiraely: Amin''ahiahy no hihinanany ny haniny, ary amim-pahatalanjonana no hisotroany ny ranony, mba ho foana mihitsy ny tany, ka tsy hisy na inona na inona ao, noho ny fandozan''izay rehetra monina ao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia ho rava ny tanàna onenana, ary ho lao ny tany; ka dia ho fantatrareo fa Izaho no Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ry zanak''olona, ahoana moa, izao fitenenana ataonareo ao amin''ny tanin''ny Isiraely izao hoe: Mihaela ny andro, ary tonga tsinontsinona ny fahitana rehetra? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Koa lazao aminy hoe: Izao no lazain''i Jehovah Tompo: Hatsahatro izany fitenenana izany ka tsy hatao fiteny ao amin''ny Isiraely intsony; fa lazao aminy kosa hoe: Akaiky ny andro sy ny tenin''ny fahitana rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa tsy hisy fahitana foana intsony na faminaniana mandrobo ao amin''ny taranak''Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa Izaho no Jehovah; hiteny Aho, ary ny teny lazaiko dia ho tò tokoa; tsy hajanona ela intsony izany; fa ho amin'ny andronareo, ry taranaka maditra, no hilazako ny teny sy hanatanterahako azy, hoy Jehovah Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ry zanak''olona, indro, ny taranak''Isiraely manao hoe: Mbola ho ela izany fahitana hitany izany, ary ny amin''ny fotoana mbola lavitra no vinaniny. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Koa lazao aminy hoe: Izao no lazain''i Jehovah Tompo: Tsy hisy hajanona ela intsony ny teniko; fa ny teny izay lazaiko dia hotanterahiko, hoy Jehovah Tompo.'
