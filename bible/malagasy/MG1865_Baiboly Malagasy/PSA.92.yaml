document_id: PSA.92,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fifaliana amin'Andriamanitra noho ny asany sy ny fitsarany marina
  - type: text
    content: 'Salamo. Tonon-kira hatao amin''ny andro Sabata. Tsara ny hidera an''i Jehovah Sy ny hankalaza ny anaranao, ry Avo Indrindra ô, '
  '10':
  - type: text
    content: 'Fa ny tandroko kosa asandratrao ho tahaka ny an''ny ombimanga; Mihosotra diloilo vaovao aho. '
  '11':
  - type: text
    content: 'Ary faly ny masoko mahita ny amin''ny fahavaloko, Ary finaritra ny sofiko mandre ny amin''ny ratsy fanahy izay efa mitsangana hamely ahy. '
  '12':
  - type: text
    content: Ny marina hamololona tahaka ny rofia
  - type: note
    content: palma
  - type: text
    content: ; Hisandrahaka
  - type: note
    content: Heb. Ho tonga lehibe
  - type: text
    content: ' tahaka ny sedera any Libanona izy; '
  '13':
  - type: text
    content: 'Efa nambolena tao an-tranon''i Jehovah izy Ka maniry eo an-kianjan''Andriamanitsika; '
  '14':
  - type: text
    content: 'Mbola manorobona ihany izy, na dia efa antitra aza; Dofodofotra sy maitso izy, '
  '15':
  - type: text
    content: Mba hanambara fa mahitsy Jehovah, Vatolampiko Izay tsy misy tsiny.
  '2':
  - type: text
    content: 'Ary hanambara ny famindram-ponao nony maraina Sy ny fahamarinanao nony alina, '
  '3':
  - type: text
    content: 'Amin''ny valiha tory folo Sy amin''ny feon-dokanga. '
  '4':
  - type: text
    content: Fa ampifalinao amin'ny nataonao aho Jehovah ô; Ny asan'ny tananao no hihobiako.
  '5':
  - type: text
    content: 'Jehovah ô, akory ny halehiben''ny asanao! Lalina indrindra ny fisainanao. '
  '6':
  - type: text
    content: 'Ny ketrina tsy mahafantatra izany, Ary ny adala koa tsy mba mahalala. '
  '7':
  - type: text
    content: 'Raha mitsiry tahaka ny ahitra ny ratsy fanahy, Ary mamony ny mpanao ratsy rehetra, Dia izany no ho fandringanana azy mandrakizay. '
  '8':
  - type: text
    content: 'Nefa Hianao, Jehovah ô, dia avo mandrakizay. '
  '9':
  - type: text
    content: 'Fa, indreo, ny fahavalonao, Jehovah ô, Fa, indreo, ringana ny fahavalonao; Mihahaka ny mpanao ratsy rehetra. '
