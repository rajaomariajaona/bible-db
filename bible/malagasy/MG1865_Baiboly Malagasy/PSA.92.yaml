document_id: PSA.92,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fifaliana amin'Andriamanitra noho ny asany sy ny fitsarany marina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salamo. Tonon-kira hatao amin''ny andro Sabata. Tsara ny hidera an''i Jehovah Sy ny hankalaza ny anaranao, ry Avo Indrindra ô, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny tandroko kosa asandratrao ho tahaka ny an''ny ombimanga; Mihosotra diloilo vaovao aho. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary faly ny masoko mahita ny amin''ny fahavaloko, Ary finaritra ny sofiko mandre ny amin''ny ratsy fanahy izay efa mitsangana hamely ahy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny marina hamololona tahaka ny rofia
    - type: usfm
      marker: x
      children:
      - type: text
        text: palma
      marker-yv: yv-n
    - type: text
      text: ; Hisandrahaka
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Ho tonga lehibe
      marker-yv: yv-n
    - type: text
      text: ' tahaka ny sedera any Libanona izy; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nambolena tao an-tranon''i Jehovah izy Ka maniry eo an-kianjan''Andriamanitsika; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mbola manorobona ihany izy, na dia efa antitra aza; Dofodofotra sy maitso izy, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mba hanambara fa mahitsy Jehovah, Vatolampiko Izay tsy misy tsiny.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hanambara ny famindram-ponao nony maraina Sy ny fahamarinanao nony alina, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin''ny valiha tory folo Sy amin''ny feon-dokanga. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ampifalinao amin'ny nataonao aho Jehovah ô; Ny asan'ny tananao no hihobiako.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehovah ô, akory ny halehiben''ny asanao! Lalina indrindra ny fisainanao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny ketrina tsy mahafantatra izany, Ary ny adala koa tsy mba mahalala. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mitsiry tahaka ny ahitra ny ratsy fanahy, Ary mamony ny mpanao ratsy rehetra, Dia izany no ho fandringanana azy mandrakizay. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa Hianao, Jehovah ô, dia avo mandrakizay. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa, indreo, ny fahavalonao, Jehovah ô, Fa, indreo, ringana ny fahavalonao; Mihahaka ny mpanao ratsy rehetra. '
