document_id: PSA.92
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fifaliana amin'Andriamanitra noho ny asany sy ny fitsarany marina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Salamo. Tonon-kira hatao amin''ny andro Sabata. Tsara ny hidera an''i Jehovah Sy ny hankalaza ny anaranao, ry Avo Indrindra ô, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hanambara ny famindram-ponao nony maraina Sy ny fahamarinanao nony alina, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Amin''ny valiha tory folo Sy amin''ny feon-dokanga. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa ampifalinao amin'ny nataonao aho Jehovah ô; Ny asan'ny tananao no hihobiako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jehovah ô, akory ny halehiben''ny asanao! Lalina indrindra ny fisainanao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny ketrina tsy mahafantatra izany, Ary ny adala koa tsy mba mahalala. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Raha mitsiry tahaka ny ahitra ny ratsy fanahy, Ary mamony ny mpanao ratsy rehetra, Dia izany no ho fandringanana azy mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nefa Hianao, Jehovah ô, dia avo mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa, indreo, ny fahavalonao, Jehovah ô, Fa, indreo, ringana ny fahavalonao; Mihahaka ny mpanao ratsy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa ny tandroko kosa asandratrao ho tahaka ny an''ny ombimanga; Mihosotra diloilo vaovao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary faly ny masoko mahita ny amin''ny fahavaloko, Ary finaritra ny sofiko mandre ny amin''ny ratsy fanahy izay efa mitsangana hamely ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny marina hamololona tahaka ny rofia
  - type: usfm
    marker: x
    children:
    - type: text
      text: palma
    marker-yv: yv-n
  - type: text
    text: ; Hisandrahaka
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Ho tonga lehibe
    marker-yv: yv-n
  - type: text
    text: ' tahaka ny sedera any Libanona izy; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Efa nambolena tao an-tranon''i Jehovah izy Ka maniry eo an-kianjan''Andriamanitsika; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mbola manorobona ihany izy, na dia efa antitra aza; Dofodofotra sy maitso izy, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mba hanambara fa mahitsy Jehovah, Vatolampiko Izay tsy misy tsiny.
