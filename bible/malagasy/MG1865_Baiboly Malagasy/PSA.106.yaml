document_id: PSA.106,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fivadibadihan'ny Isiraely ampitahaina amin'ny fahamarinan'Andriamanitra
  - type: text
    content: 'Haleloia. Miderà an''i Jehovah, fa tsara Izy, Fa mandrakizay ny famindram-pony. '
  '10':
  - type: text
    content: 'Namonjy azy tamin''ny tanan''ny mpandrafy Izy Ary nanavotra azy tamin''ny tanan''ny fahavalo. '
  '11':
  - type: text
    content: 'Dia nosaronan''ny rano kosa ny rafiny. Ka tsy nisy niangana na dia iray akory aza. '
  '12':
  - type: text
    content: Dia nino ny teniny izy Ka nihira ny fiderana Azy.
  '13':
  - type: text
    content: 'Nalaky nanadino ny asany izy ka tsy niandry ny saina hatolony, '
  '14':
  - type: text
    content: 'Fa fatra-pila izy tany an-efitra, Sady naka fanahy an''Andriamanitra tany an-tany foana. '
  '15':
  - type: text
    content: Dia nomeny azy izay nilainy, Kanefa nampahahiaziny kosa izy
  - type: note
    content: 'Na: ny fanahiny'
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Dia nialona an''i Mosesy tany an-toby Izy ireo Sady nialona an''i Arona, olo-masin''i Jehovah. '
  '17':
  - type: text
    content: Nisokatra ny tany, dia nitelina an'i Datana Ka nanarona ny antokon
  - type: note
    content: Heb. ny fiangonany
  - type: text
    content: '''i Abìrama. '
  '18':
  - type: text
    content: Dia nisy afo nirehitra tamin'ny antokony
  - type: note
    content: Heb. ny fiangonany
  - type: text
    content: ; Lelafo no nandoro ny ratsy fanahy.
  '19':
  - type: text
    content: 'Nanao ombilahy kely tany Horeba izy Ka niankohoka teo anoloan''ny sarin-javatra an-idina. '
  '2':
  - type: text
    content: 'Iza no mahalaza ny asa lehibe ataon''i Jehovah, Na mahatonona ny fiderana Azy rehetra? '
  '20':
  - type: text
    content: 'Ary ny voninahiny dia natakalony Sarin''ny omby homana ahitra. '
  '21':
  - type: text
    content: 'Nohadinoiny Andriamanitra, Mpamonjy azy, Izay efa nanao zava-dehibe tany Egypta, '
  '22':
  - type: text
    content: 'Dia fahagagana tany amin''ny tanin''i Hama sy zava-mahatahotra teo amin''ny Ranomasina Mena. '
  '23':
  - type: text
    content: Ary nikasa
  - type: note
    content: Heb. nilaza
  - type: text
    content: ' handringana azy Izy, Raha tsy Mosesy voafidiny no nandroso hijoro tamin''ny banga teo anatrehany hampiala ny fahatezerany mba tsy handringanany azy.'
  '24':
  - type: text
    content: 'Ary nanamavo ny tany mahafinaritra ireo Sady tsy mba nino ny teniny, '
  '25':
  - type: text
    content: 'Fa nimonomonona tany an-dainy Ka tsy nihaino ny feon''i Jehovah. '
  '26':
  - type: text
    content: 'Dia nanandratra ny tànany taminy Izy, Fa hampiampatrampatra azy any an-efitra '
  '27':
  - type: text
    content: Ary ny taranany kosa any amin'ny jentilisa, Ary hampihahakahaka azy any amin'ny tany maro Izy.
  '28':
  - type: text
    content: 'Nikambana tamin''i Bala-peora ireo ka nihinana ny fanatitra ho an''ny maty, '
  '29':
  - type: text
    content: 'Dia nampahatezitra an''i Jehovah tamin''ny nataony, Ka dia namely azy tampoka ny areti-mandringana. '
  '3':
  - type: text
    content: 'Sambatra izay mitandrina ny mety Ka manao ny marina mandrakariva. '
  '30':
  - type: text
    content: 'Fa nitsangana nandroso Finehasa ka nanao fitsarana; Dia nitsahatra ny areti-mandringana. '
  '31':
  - type: text
    content: Ary nisaina ho fahamarinany izany Hatramin'ny taranaka fara mandimby mandrakizay.
  '32':
  - type: text
    content: 'Nampahatezitra an''i Jehovah teo anilan''ny ranon''i Meriba ireo, Ka nisy nanjo an''i Mosesy noho ny nataon''ireo; '
  '33':
  - type: text
    content: Fa niodina tamin'ny Fanahin'i Jehovah ireo, ka dia nihoa-bava Mosesy.
  '34':
  - type: text
    content: 'Tsy naringany ny firenena Izay nasain''i Jehovah naringany; '
  '35':
  - type: text
    content: 'Fa nifangaro tamin''ny jentilisa izy Ka nianatra ny fanaony, '
  '36':
  - type: text
    content: 'Dia nanompo ny sampiny izy, Ka dia nody fandrika ho azy izany. '
  '37':
  - type: text
    content: Namono ny zananilahy sy ny zananivavy ho fanatitra ho an'ny demonia
  - type: note
    content: Heb. ireo tompo
  - type: text
    content: ' ireo; '
  '38':
  - type: text
    content: 'Eny, nandatsaka rà marina izy, Dia ny ran''ny zananilahy sy ny zananivavy, Izay novonoiny ho fanatitra ho an''ny sampin''i Kanana; Ka dia nametaveta ny tany tamin''ny rà izy. '
  '39':
  - type: text
    content: Ary naloto tamin'ny asany izy Ary nahatonga azy ho mijangajanga ny nataony.
  '4':
  - type: text
    content: 'Jehovah ô, tsarovy aho araka ny fankasitrahanao ny olonao; Vangio amin''ny famonjenao aho, '
  '40':
  - type: text
    content: 'Dia nirehitra tamin''ny olony ny fahatezeran''i Jehovah, Ka nataony ho zava-betaveta ny lovany. '
  '41':
  - type: text
    content: 'Dia nanolotra azy teo an-tànan''ny jentilisa Izy, Ka izay nankahala azy no nanapaka azy. '
  '42':
  - type: text
    content: 'Ary nampahory azy ny fahavalony, Ka naetry tambanin''ny tànany izy. '
  '43':
  - type: text
    content: 'Matetika Izy no nahafaka azy; Fa ireo kosa niodina taminy ihany araka ny fisainany Ka nihalevona noho ny helony. '
  '44':
  - type: text
    content: 'Kanefa nijery ny fahoriany ihany Izy. Raha nandre ny fitarainany; '
  '45':
  - type: text
    content: 'Dia nahatsiaro ny fanekeny Izy Ka nanenina araka ny haben''ny famindram-pony. '
  '46':
  - type: text
    content: Dia nataony nahita famindram-po ireny Tamin'izay rehetra namabo azy.
  '47':
  - type: text
    content: Vonjeo izahay, ry Jehovah Andriamanitray ô, Ka angòny avy amin'ny jentilisa, Mba hisaoranay ny anaranao masina Sy hifalianay amin'ny fiderana Anao.
  '48':
  - type: text
    content: 'Isaorana anie Jehovah Andriamanitry ny Isiraely, hatramin''ny taloha indrindra ka mandrakizay; Ary aoka ny olona rehetra hanao hoe: Amena! Haleloia.'
  '5':
  - type: text
    content: Hahitako ny soa azon'ny voafidinao, Hifaliako amin'ny fifalian'ny firenenao, Hiravoravoako miaraka amin'ny lovanao.
  '6':
  - type: text
    content: 'Efa nanota izahay mbamin''ny razanay, Efa nanao izay meloka sy ratsy izahay. '
  '7':
  - type: text
    content: 'Ny razanay tany Egypta tsy mba nandinika ny fahagagana nataonao; Tsy mba nahatsiaro ny habetsahan''ny famindram-ponao ireny, Fa niodina teo amoron-dranomasina, Dia teo amoron''ny Ranomasina Mena '
  '8':
  - type: text
    content: 'Kanefa namonjy azy ihany Izy noho ny anarany, Mba hampahafantarany ny asany lehibe. '
  '9':
  - type: text
    content: 'Dia noteneniny mafy ny Ranomasina Mena, ka tonga maina iny; Ary nitondra azy nita ny rano lalina tahaka ny efitra Izy, '
