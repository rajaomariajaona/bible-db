document_id: PSA.106,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fivadibadihan'ny Isiraely ampitahaina amin'ny fahamarinan'Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Haleloia. Miderà an''i Jehovah, fa tsara Izy, Fa mandrakizay ny famindram-pony. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Namonjy azy tamin''ny tanan''ny mpandrafy Izy Ary nanavotra azy tamin''ny tanan''ny fahavalo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia nosaronan''ny rano kosa ny rafiny. Ka tsy nisy niangana na dia iray akory aza. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Dia nino ny teniny izy Ka nihira ny fiderana Azy.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nalaky nanadino ny asany izy ka tsy niandry ny saina hatolony, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa fatra-pila izy tany an-efitra, Sady naka fanahy an''Andriamanitra tany an-tany foana. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Dia nomeny azy izay nilainy, Kanefa nampahahiaziny kosa izy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ny fanahiny'
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia nialona an''i Mosesy tany an-toby Izy ireo Sady nialona an''i Arona, olo-masin''i Jehovah. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Nisokatra ny tany, dia nitelina an'i Datana Ka nanarona ny antokon
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ny fiangonany
      marker-yv: yv-n
    - type: text
      text: '''i Abìrama. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Dia nisy afo nirehitra tamin'ny antokony
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ny fiangonany
      marker-yv: yv-n
    - type: text
      text: ; Lelafo no nandoro ny ratsy fanahy.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nanao ombilahy kely tany Horeba izy Ka niankohoka teo anoloan''ny sarin-javatra an-idina. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Iza no mahalaza ny asa lehibe ataon''i Jehovah, Na mahatonona ny fiderana Azy rehetra? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary ny voninahiny dia natakalony Sarin''ny omby homana ahitra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Nohadinoiny Andriamanitra, Mpamonjy azy, Izay efa nanao zava-dehibe tany Egypta, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia fahagagana tany amin''ny tanin''i Hama sy zava-mahatahotra teo amin''ny Ranomasina Mena. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ary nikasa
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. nilaza
      marker-yv: yv-n
    - type: text
      text: ' handringana azy Izy, Raha tsy Mosesy voafidiny no nandroso hijoro tamin''ny banga teo anatrehany hampiala ny fahatezerany mba tsy handringanany azy.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary nanamavo ny tany mahafinaritra ireo Sady tsy mba nino ny teniny, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fa nimonomonona tany an-dainy Ka tsy nihaino ny feon''i Jehovah. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia nanandratra ny tànany taminy Izy, Fa hampiampatrampatra azy any an-efitra '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ary ny taranany kosa any amin'ny jentilisa, Ary hampihahakahaka azy any amin'ny tany maro Izy.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Nikambana tamin''i Bala-peora ireo ka nihinana ny fanatitra ho an''ny maty, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Dia nampahatezitra an''i Jehovah tamin''ny nataony, Ka dia namely azy tampoka ny areti-mandringana. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Sambatra izay mitandrina ny mety Ka manao ny marina mandrakariva. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Fa nitsangana nandroso Finehasa ka nanao fitsarana; Dia nitsahatra ny areti-mandringana. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ary nisaina ho fahamarinany izany Hatramin'ny taranaka fara mandimby mandrakizay.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Nampahatezitra an''i Jehovah teo anilan''ny ranon''i Meriba ireo, Ka nisy nanjo an''i Mosesy noho ny nataon''ireo; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Fa niodina tamin'ny Fanahin'i Jehovah ireo, ka dia nihoa-bava Mosesy.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Tsy naringany ny firenena Izay nasain''i Jehovah naringany; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Fa nifangaro tamin''ny jentilisa izy Ka nianatra ny fanaony, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Dia nanompo ny sampiny izy, Ka dia nody fandrika ho azy izany. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Namono ny zananilahy sy ny zananivavy ho fanatitra ho an'ny demonia
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ireo tompo
      marker-yv: yv-n
    - type: text
      text: ' ireo; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Eny, nandatsaka rà marina izy, Dia ny ran''ny zananilahy sy ny zananivavy, Izay novonoiny ho fanatitra ho an''ny sampin''i Kanana; Ka dia nametaveta ny tany tamin''ny rà izy. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Ary naloto tamin'ny asany izy Ary nahatonga azy ho mijangajanga ny nataony.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Jehovah ô, tsarovy aho araka ny fankasitrahanao ny olonao; Vangio amin''ny famonjenao aho, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Dia nirehitra tamin''ny olony ny fahatezeran''i Jehovah, Ka nataony ho zava-betaveta ny lovany. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Dia nanolotra azy teo an-tànan''ny jentilisa Izy, Ka izay nankahala azy no nanapaka azy. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Ary nampahory azy ny fahavalony, Ka naetry tambanin''ny tànany izy. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Matetika Izy no nahafaka azy; Fa ireo kosa niodina taminy ihany araka ny fisainany Ka nihalevona noho ny helony. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Kanefa nijery ny fahoriany ihany Izy. Raha nandre ny fitarainany; '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Dia nahatsiaro ny fanekeny Izy Ka nanenina araka ny haben''ny famindram-pony. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Dia nataony nahita famindram-po ireny Tamin'izay rehetra namabo azy.
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Vonjeo izahay, ry Jehovah Andriamanitray ô, Ka angòny avy amin'ny jentilisa, Mba hisaoranay ny anaranao masina Sy hifalianay amin'ny fiderana Anao.
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Isaorana anie Jehovah Andriamanitry ny Isiraely, hatramin''ny taloha indrindra ka mandrakizay; Ary aoka ny olona rehetra hanao hoe: Amena! Haleloia.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Hahitako ny soa azon'ny voafidinao, Hifaliako amin'ny fifalian'ny firenenao, Hiravoravoako miaraka amin'ny lovanao.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Efa nanota izahay mbamin''ny razanay, Efa nanao izay meloka sy ratsy izahay. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ny razanay tany Egypta tsy mba nandinika ny fahagagana nataonao; Tsy mba nahatsiaro ny habetsahan''ny famindram-ponao ireny, Fa niodina teo amoron-dranomasina, Dia teo amoron''ny Ranomasina Mena '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Kanefa namonjy azy ihany Izy noho ny anarany, Mba hampahafantarany ny asany lehibe. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia noteneniny mafy ny Ranomasina Mena, ka tonga maina iny; Ary nitondra azy nita ny rano lalina tahaka ny efitra Izy, '
