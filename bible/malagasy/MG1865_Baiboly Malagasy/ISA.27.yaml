document_id: ISA.27
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny namaizan'i Jehovah ny Isiraely sy ny mbola hamindrany fo aminy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Amin''izany andro izany ny sabatr''i Jehovah, izay mafy sady lehibe no mahery, no ho entiny mamaly ny leviatana, dia ilay menarana mandositra, sy ny leviatana, dia ilay menarana miforoporotra, Ary hovonoiny ilay dragona ao an-dranomasina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Amin''izany andro izany no hihiranareo ny amin''ny tanim-boaloboka ahazoana divay mahery hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izaho Jehovah no mpiaro io; Isaky ny indray mipi-maso no andemako azy, Fandrao misy manimba azy; Na andro na alina dia miaro azy aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tsy misy fahatezerana ato amiko; Enga anie ka hisy hery sy tsilo eto anatrehako hiadiako. Dia hiroatako ireo ka hodorako avokoa! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa raha tsy izany, dia aoka hifikitra amin''ny heriko kosa izy ka hihavana amiko; Eny, aoka hihavana amiko izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Amin'ny andro ho avy dia hamaka tsara Jakoba; Ary Isiraely hamony sy hitsimoka ka hameno izao tontolo izao amin'ny fahavokarany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Moa tahaka ny namelezana izay namely azy va no moa namelezany azy koa? Ary tahaka ny namonoana izay novonoiny va no mba namonoana azy koa? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tamin''ny nandroahany azy dia voafetra no niadiany taminy; Nokororohiny tamin''ny rivony mahery izy tamin''ny andron''ny rivotra avy any atsinanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ka izao no hamelana ny helok'i Jakoba, Ary izao ihany no vokatry ny nanesorana ny fahotany, dia amin'ny anaovany ny vato rehetra amin'ny alitara ho tahaka ny vato sokay voatorotoro, ary ny Aseraha
  - type: usfm
    marker: x
    children:
    - type: text
      text: Anaran'andriamani-tsi-izy, na sariny
    marker-yv: yv-n
  - type: text
    text: ' sy ny tsangan-kazo'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tsangam-bato'
    marker-yv: yv-n
  - type: text
    text: ' ho an''ny masoandro dia tsy hitsangana intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa ho foana ny tanàna mimanda, ka dia ho fonenana afoy sy ilaozana tahaka ny efitra: Ao no hihinanan''ny zanak''omby, ary ao no handriany sy handaniany ny rantsan-kazony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Raha malazo ny rantsany, dia hotapatapahina, ka ho avy ny vehivavy hitaina azy, satria firenena tsy manam-pahalalana izy, dia tsy hiantra azy ny Mpanao azy, ary tsy hamindra fo aminy ny Mpamorona azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary amin'izany andro izany dia hisy fampihintsanana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fivelezam-bary'
    marker-yv: yv-n
  - type: text
    text: ' ataon''i Jehovah hatramin''ny ony mandriaka ka hatramin''ny lohasahan-driak''i Egypta; Ary ianareo samy hotsimponina tsirairay, ry Zanak''Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary amin'izany andro izany koa no hitsofana anjomara lehibe, dia ho avy izay very tany amin'ny tany Asyria sy izay efa voaroaka tany amin'ny tany Egypta, ka hiankohoka eo anatrehan'i Jehovah ao amin'ny tendrombohitra masina any Jerosalema.
