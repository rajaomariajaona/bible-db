document_id: NEH.13
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin''izany andro izany dia novakiana teo anatrehan''ny olona ny teny tao amin''ny bokin''i Mosesy, ka hita voasoratra ao fa ny Amonita sy ny Moabita dia tsy mahazo miditra amin''ny fiangonan''Andriamanitra ao fa ny Amonita sy ny Moabita dia tsy mahazo miditra amin''ny fiangonan''Andriamanitra mandrakizay, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'satria tsy nitsena hanina sy rano ny Zanak''Isiraely izy, fa nanamby an''i Balama hanozona azy; kanjo nampodin''Andriamanitsika ho fitahiana kosa ny fanozonana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary rehefa ren''ny olona ny lalàna, dia navahany hiala tamin''ny Isiraely ny olona hafa firenena rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary talohan''izany Eliasiba mpisorona, izay voatendry ho ao anatin''ny efi-trano ao an-tranon''Andriamanitsika sady havan''i Tobia akaikiny, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'dia efa nanamboatra efi-trano lehibe ho azy, dia ilay nitehirizana ny fanatitra hohanina fahiny mbamin''ny ditin-kazo mani-pofona sy ny fanaka ary ny ampahafolon''ny vary sy ny ranom-boaloboka sy ny diloilo, izay anjara voadidy ho an''ny Levita sy ny mpihira ary ny mpiandry varavarana, ary ny fanatitra asandratra ho an''ny mpisorona. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa tamin''izany rehetra izany dia tsy mba tany Jerosalema aho: fa tamin''ny taona faharoa amby telo-polo nanjakan''i Artaksersesy, mpanjakan''i Babylona, no nahatongavako tany amin''ny mpanjaka; fa nony taoriandriana kely dia niera tamin''ny mpanjaka aho; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary nankany Jerosalema aho ka nahita ny ratsy nataon''i Eliasiba ho an''i Tobia tamin''ny nanamboarany efi-trano ho azy teo anatin''ny kianjan''ny tranon''Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nalahelo indrindra aho, ka navoakako ny fanaka rehetra izay an''i Tobia hiala tamin''ny efi-trano. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary nasaiko nodiovin'ny olona ny efi-trano, dia naveriko tao indray ny fanaky ny tranon'Andriamanitra mbamin'ny fanatitra hohanina sy ny ditin-kazo mani-pofona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hitako fa tsy voaloa ny fiveloman''ny Levita; ka dia samy efa nandositra ho any an-tsahany avy ny Levita sy ny mpihira izay nanao ny raharaha. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nifandahatra tamin''ny mpanapaka aho ka nanao hoe: Nahoana no dia ilaozana ny tranon''Andriamanitra? Dia namory azy aho ka nametraka azy teo amin''ny toerany avy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nentin''ny Joda rehetra ho ao amin''ny trano firaketana ny ampahafolon''ny vary sy ny ranom-boaloboka ary ny diloilo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nanendry mpitandrina ny trano firaketana aho, dia Selemia mpisorona sy Zadoka mpanoratra ary Pedaia avy tamin''ny Levita; ary manarakaraka azy telo lahy dia Hanana, zanak''i Zakora, zanak''i Matania; fa natao ho mahatoky ireo; ary ny adidin''ireo dia ny hizara ho an''ny rahalahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tsarovy aho noho izany, ry Andriamanitro ô, ka aza kosehina ny soa nataoko tao amin''ny tranon''Andriamanitro sy ny amin''ny raharaha tokony hatao ao. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary tamin''izany andro izany dia nahita ny sasany tany Joda aho fa nanosihosy famiazam-boaloboka tamin''ny Sabata sy nampiditra amboara ary nampitondra entana ny boriky sady nitondra divay koa sy voaloboka sy aviavy ary entana samy hafa rehetra, izay nentiny ho any Jerosalema tamin''ny andro Sabata; dia nananatra azy mafy aho tamin''ny andro nivarotany hanina. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nisy olona avy any Tyro nitoetra tao, izay nitondra hazandrano sy varotra samy hafa ka nivarotra tamin''ny taranak''i Joda sy tany Jerosalema tamin''ny Sabata; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nifandahatra tamin''ireo manan-kaja amin''ny Joda aho ka nanao taminy hoe: Inona izao zava-dratsy ataonareo izao, no dia mandoto ny andro Sabata ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tsy nanao toy izao va ny razanareo, ka dia nahatran'Andriamanitsika amintsika sy amin'ity tanàna ity izao loza rehetra izao? fa ianareo izao dia efa mampitombo ny fahatezerana mirehitra izay mihatra amin'ny Isiraely amin'ny andotoanareo ny Sabata.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary raha vao malomaloka ny vavahadin''i Jerosalema talohan''ny Sabata, dia nasaiko nohidiana ny vavahady, ka tsy navelako hovohana mandra-pahatapitry ny Sabata ary notendreko ny zatovoko sasany hiambina teo am-bavahady mba tsy hampidirana entana amin''ny andro Sabata. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ka dia nandry teo ivelan''i Jerosalema indray mandeha na indroa ny mpandranto sy ny mpivarotra zavatra samy hafa; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'dia nananatra azy mafy aho ka nanao taminy hoe: Nahoana ianareo no mandry eto anilan''ny manda Raha mbola manao izany indray ianareo, dia hosamboriko. Koa hatramin''izany andro izany dia tsy tonga tamin''ny Sabata intsony izy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary ny Levita dia nasaiko nanadio ny tenany ka ho avy hiambina eo am-bavahady, mba hanamasinany ny andro Sabata. Tsarovy aho noho izany koa, ry Andriamanitro ô, ary iantrao aho araka ny haben'ny famindram-ponao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary tamin''izany andro izany dia hitako ny Jiosy izay efa nanambady vehivavy avy any Asdoda sy Amona sy Moaba; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ary ny antsasaky ny zanany dia nanao tenin''ny Asdodita, fa tsy nahay teny Jiosy, fa nanaraka ny fiteniny avy isam-pirenena izy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia nifandahatra taminy aho ka nanozona azy ary namely ny sasany sy nandrompotra ny volony, dia nampianiana azy tamin''Andriamanitra hoe: Aza manome ny zanakareo-vavy ho vadin''ny zananilahy, ary aza maka ny zananivavy ho vadin''ny zanakareo-lahy, na ho vadinareo. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tsy izany va no nanotan''i Solomona, Mpanjakan''i Isiraely? kanefa tsy nisy mpanjaka tahaka azy tany amin''ny firenena maro, fa tian''Andriamaniny izy ka nataon''Andriamanitra ho mpanjaka tamin''ny Isiraely rehetra; kanefa na dia izy aza dia, nampanotain''ny vehivavy hafa firenena. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Koa mety va raha ianareo no re fa manao izao ratsy lehibe rehetra izao ka manota amin''Andriamanitsika amin''ny akanareo vehivavy hafa firenena ho vadinareo? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary vinanton''i Sanbala Horonita ny anankiray amin''ny zanak''i Joiada, zanak''i Eliasiba, mpisoronabe, ka dia noroahiko niala teo amiko izy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tsarovy ireo, ry Andriamanitro ô, noho ny nandotoany fisoronana, eny, ny faneken''ny fisoronana sy ny Levita. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Toy izany no nanadiovako azy ho afaka amin''ny tamin''ny olona hafa firenena rehetra, sy nanendreko ny anjara-raharahan''ny mpisorona sy ny Levita samy ho amin''ny raharahany avy, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ary ny amin'ny fanaterana ny kitay hazo tamin'izay fotoan'androny sy ny voaloham-bokatra. Tsarovy aho ka hasoavy, ry Andriamanitro ô.
