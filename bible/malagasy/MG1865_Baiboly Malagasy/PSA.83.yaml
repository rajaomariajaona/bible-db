document_id: PSA.83,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitarainana noho ny nikambanan'ny firenena maro hamely ny Isiraely
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonon-kira. Salamo nataon''i Asafa. Andriamanitra ô, aza mangina; aza mihombom-bava Hianao, ary aza mamitsaka, Andriamanitra ô. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maty tany En-dora ireo; tonga zeziky ny tany izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ataovy tahaka an''i Oreba sy Zeba ny mpanapaka azy. Eny, ny andrianany rehetra dia ataovy tahaka an''i Zebaha sy Zaimona, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay nanao hoe: aoka halaintsika ho antsika ny fonenan''Andriamanitra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Andriamanitro ô, ataovy tahaka ny tadio ireo, dia tahaka ny akofa entin''ny rivotra, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tahaka ny afo mandoro ala sy tahaka ny lelafo mampirehitra tendrombohitra; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka ho toy izany no anafotofotoanao azy amin''ny tadionao, sy ampahatahoranao azy amin''ny tafio-drivotrao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sarony henatra ny tavany, mba hitadiavany ny anaranao, Jehovah ô. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka ho menatra sy ho amin-tahotra mandrakizay izy; eny, aoka hangaihay sy haringana izy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary aoka ho fantany fa Hianao irery ihany, Izay atao hoe Jehovah, no ilay Avo Indrindra ambonin'ny tany rehetra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa, indro, mitabataba ny fahavalonao; ary izay mankahala Anao dia manandratra ny lohany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny olonao no iokoany amin''ny hafetsena; ary miara-misaina hamely izay voafinao izy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy izy: Avia, ka andeha hofongorantsika tsy ho firenena izy, mba tsy hotsarovana intsony ny anaran''Isiraely. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa efa niray tetika tokoa ireo, ka nanao fanekena hanohitra Anao, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia ny lain''ny Edomita sy ny Isimaelita, ny Moabita sy ny Hagarita, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny Gebalita sy ny Amonita ary ny Amalekita, ny Filistina mbamin''ny mponina any Tyro. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny Asyriana koa nikambana taminy; tonga sandrin'ny taranak'i Lota ireo.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ataovy tahaka ny Midiana izy, ary tahaka an''i Sisera sy Jabina teo amin''ny ony Kisona; '
