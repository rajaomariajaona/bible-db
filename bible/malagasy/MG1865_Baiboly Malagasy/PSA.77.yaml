document_id: PSA.77,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fahatsiarovana ny amin'ny taon-dasa ho enti-mampionona ny fo, raha mila ho reraka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho an''ny mpiventy hira. Al-jedotona. Salamo nataon''i Asafa. Ny feoko dia mankany amin''Andriamanitra, ka mitaraina aho; eny, ny feoko mankany amin''Andriamanitra, ka mihaino ahy Izy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izaho: Izao no mahararirary ny foko, dia ny niovan'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Nefa tsarovako ny taon'''
      marker-yv: yv-n
    - type: text
      text: '''ny tanana ankavanan''ny Avo Indrindra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hampahatsiaro ny asan''i Jehovah aho, fa ta-hahatsiaro ny fahagagana nataonao fony taloha; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny hisaina ny asanao rehetra aho, ary hihevitra ny nataonao.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Andriamanitra ô, amin'ny fitoerana masina
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: amin''ny fahamasinana'
      marker-yv: yv-n
    - type: text
      text: ' ny lalanao; iza no andriamani-dehibe tahaka an''Andriamanitra? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hianao no Andriamanitra Izay manao fahagagana; efa nampahalala ny herinao teny amin''ny firenena Hianao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Navotan''ny sandrinao ny olonao, dia ny taranak''i Jakoba sy Josefa. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny rano be nahita Anao, Andriamanitra ô, ny rano be nahita Anao ka toran-kovitra; eny, nanonjanonja ny lalina. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandatsaka ranonorana ny rahona; nikotrokotroka ny lanitra; nifanaretsaka koa ny zana-tsipìkanao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fikotrokotroky ny kotrokorana dia teo amin'ny tadio
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: dia nikodiadia'
      marker-yv: yv-n
    - type: text
      text: '; nahazava izao rehetra izao ny helatra; nihovotrovotra sy nihorohoro ny tany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tany amin''ny ranomasina ny lalanao, ary ny nalehanao dia tany amin''ny rano mandriaka, ka tsy fantatra ny dian-tongotrao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin''ny andro fahoriako no nitadiavako ny Tompo; ny tanako nasandratra nony alina ka tsy vizana; ny fanahiko tsy nety nampiononina. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tanan'i Mosesy sy Arona no nitondranao ny olonao toy ny ondry.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ta-hahatsiaro an'Andriamanitra aho, ka dia nisento; te-hieritreritra aho, ka dia reraka ny fanahiko.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mampiari-tory ny masoko Hianao; mitebiteby aho ka tsy mahateny. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nihevitra ny andro fahiny aho, dia ny taon-dasa ela. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ta-hahatsiaro ny nitendreko valiha tamin''ny alina aho; te-hidinidinika amin''ny foko aho, ary ny fanahiko nanontany mafy hoe: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hanary mandrakizay va ny Tompo? Tsy hankasitraka intsony va Izy? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Efa nitsahatra mandrakizay va ny famindram-pony? Efa tapitra mandrakizay va ny teniny?
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nanadino hamindra fo va Andriamanitra? Efa nohidiany an-katezerana va ny fiantràny? '
