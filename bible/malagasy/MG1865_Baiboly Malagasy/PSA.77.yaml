document_id: PSA.77,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahatsiarovana ny amin'ny taon-dasa ho enti-mampionona ny fo, raha mila ho reraka
  - type: text
    content: 'Ho an''ny mpiventy hira. Al-jedotona. Salamo nataon''i Asafa. Ny feoko dia mankany amin''Andriamanitra, ka mitaraina aho; eny, ny feoko mankany amin''Andriamanitra, ka mihaino ahy Izy. '
  '10':
  - type: text
    content: 'Ary hoy izaho: Izao no mahararirary ny foko, dia ny niovan'
  - type: note
    content: 'Na: Nefa tsarovako ny taon'''
  - type: text
    content: '''ny tanana ankavanan''ny Avo Indrindra. '
  '11':
  - type: text
    content: 'Hampahatsiaro ny asan''i Jehovah aho, fa ta-hahatsiaro ny fahagagana nataonao fony taloha; '
  '12':
  - type: text
    content: Eny hisaina ny asanao rehetra aho, ary hihevitra ny nataonao.
  '13':
  - type: text
    content: Andriamanitra ô, amin'ny fitoerana masina
  - type: note
    content: 'Na: amin''ny fahamasinana'
  - type: text
    content: ' ny lalanao; iza no andriamani-dehibe tahaka an''Andriamanitra? '
  '14':
  - type: text
    content: 'Hianao no Andriamanitra Izay manao fahagagana; efa nampahalala ny herinao teny amin''ny firenena Hianao. '
  '15':
  - type: text
    content: 'Navotan''ny sandrinao ny olonao, dia ny taranak''i Jakoba sy Josefa. '
  '16':
  - type: text
    content: 'Ny rano be nahita Anao, Andriamanitra ô, ny rano be nahita Anao ka toran-kovitra; eny, nanonjanonja ny lalina. '
  '17':
  - type: text
    content: 'Nandatsaka ranonorana ny rahona; nikotrokotroka ny lanitra; nifanaretsaka koa ny zana-tsipìkanao. '
  '18':
  - type: text
    content: Ny fikotrokotroky ny kotrokorana dia teo amin'ny tadio
  - type: note
    content: 'Na: dia nikodiadia'
  - type: text
    content: '; nahazava izao rehetra izao ny helatra; nihovotrovotra sy nihorohoro ny tany. '
  '19':
  - type: text
    content: 'Tany amin''ny ranomasina ny lalanao, ary ny nalehanao dia tany amin''ny rano mandriaka, ka tsy fantatra ny dian-tongotrao. '
  '2':
  - type: text
    content: 'Tamin''ny andro fahoriako no nitadiavako ny Tompo; ny tanako nasandratra nony alina ka tsy vizana; ny fanahiko tsy nety nampiononina. '
  '20':
  - type: text
    content: Ny tanan'i Mosesy sy Arona no nitondranao ny olonao toy ny ondry.
  '3':
  - type: text
    content: Ta-hahatsiaro an'Andriamanitra aho, ka dia nisento; te-hieritreritra aho, ka dia reraka ny fanahiko.
  '4':
  - type: text
    content: 'Mampiari-tory ny masoko Hianao; mitebiteby aho ka tsy mahateny. '
  '5':
  - type: text
    content: 'Nihevitra ny andro fahiny aho, dia ny taon-dasa ela. '
  '6':
  - type: text
    content: 'Ta-hahatsiaro ny nitendreko valiha tamin''ny alina aho; te-hidinidinika amin''ny foko aho, ary ny fanahiko nanontany mafy hoe: '
  '7':
  - type: text
    content: 'Hanary mandrakizay va ny Tompo? Tsy hankasitraka intsony va Izy? '
  '8':
  - type: text
    content: Efa nitsahatra mandrakizay va ny famindram-pony? Efa tapitra mandrakizay va ny teniny?
  '9':
  - type: text
    content: 'Efa nanadino hamindra fo va Andriamanitra? Efa nohidiany an-katezerana va ny fiantràny? '
