document_id: JER.12,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fitarainana nataon'i Jeremia noho ny nanambinana ny ratsy fanahy, sy ny navalin'i Jehovah azy
  - type: text
    content: 'Raha mifandahatra aminao aho, Jehovah ô dia Hianao no marina; Nefa kosa aoka ihany mba handahatra aminao aho: Nahoana ary no ambinina ny lalan''ny ratsy fanahy? Nahoana no miadana ny mpiodina rehetra? '
  '10':
  - type: text
    content: 'Mpitondra maro no nanimba ny tanim-boaloboko, nohitsakitsahiny ny anjarako; Nataony tany efitra lao ny anjarako mahafinaritra; '
  '11':
  - type: text
    content: 'Nataony lao izany, eny, lao izy ka mitomany amiko; Nataony lao avokoa ny tany rehetra, satria tsy nisy nandatsaka am-po. '
  '12':
  - type: text
    content: 'Ny mpandrava dia tonga any amin''ny tendrombohitra mangadihady rehetra any an-efitra; Fa misy sabatr''i Jehovah mandringana amin''ny faran''ny tany ka hatramin''ny farany koa, ka dia tsy misy fiadanana ho an''ny nofo rehetra. '
  '13':
  - type: text
    content: 'Vary no nafafiny, fa tsilo no nojinjany; Nanasatra ny tenany izy, kanjo herim-po very foana izany; Dia hangaihay ny amin''ny zavatra azonareo ianareo noho ny firehetan''ny fahatezeran''i Jehovah. '
  '14':
  - type: text
    content: 'Izao no lazain''i Jehovah ny amin''ireo ratsy fanahy rehetra mifanakaiky fonenena amiko ireo, dia izay mikasikasika ny tany nomeko ho lovan''ny Isiraely oloko: Indro, hongotako tsy ho amin''ny taniny ireo, ary ny taranak''i Joda koa dia hongotako tsy ho eo aminy. '
  '15':
  - type: text
    content: 'Nefa nony efa voaongotra izy, dia hamindra fo aminy indray Aho, ka samy ho entiko mody any amin''ny lovany sy ny taniny avy indray izy. '
  '16':
  - type: text
    content: 'Koa raha mba hianatra ny fanaon''ny oloko tokoa ireo ka hianiana amin''ny anarako hoe: Raha velona koa Jehovah, tahaka ny nampianaran''ireo ny oloko hianiana amin''i Bala, dia haorina ao amin''ny oloko izy; '
  '17':
  - type: text
    content: Fa raha tsy hankatò kosa izy, dia hongotako izany firenena izany, eny, hongotako sy haringako izy, hoy Jehovah.
  '2':
  - type: text
    content: Nambolenao izy, ka dia miorim-paka; Mitombo izy, ka dia mamoa; Manakaiky Anao amin'ny vavany izy, nefa manalavitra Anao amin'ny fony
  - type: note
    content: Heb. voany
  - type: text
    content: '. '
  '3':
  - type: text
    content: Fa Hianao, Jehovah ô, mahalala ahy; Mahita ahy Hianao sady mizaha toetra ny foko ny aminao; Sariho toy ny ondry hovonoina ireny, ary atokàny
  - type: note
    content: Heb. hamasino
  - type: text
    content: ' ho amin''ny andro hamonoana. '
  '4':
  - type: text
    content: 'Mandra-pahoviana no hisaonan''ny tany sy hahalazoan''ny ahitra any amin''ny saha rehetra? Noho ny faharatsian''ny mponina any dia lany ringana ny biby sy ny vorona; Fa hoy ireo: Tsy mba hahita izay hiafarantsika izy.'
  '5':
  - type: text
    content: Raha niara-nihazakazaka tamin'ny mandeha an-tongotra ianao ka voany, dia hataonao ahoana no fihaika ny soavaly? Ary raha eny amin'ny tany miadana no anananao toky, hanao ahoana kosa ianao, raha mby any amin'ny kirihitrala eny amoron
  - type: note
    content: Heb. ny reharehany
  - type: text
    content: '''i Jordana? '
  '6':
  - type: text
    content: 'Fa na dia ny rahalahinao sy ny mpianakavin''ny rainao aza dia samy namitaka anao; Eny, niantso mafy teo aorianao ireo; Aza mino azy, na dia tsara fiteny aminao aza izy. '
  '7':
  - type: text
    content: 'Nilaozako ny tranoko, nafoiko ny lovako; Ny sombin''aiko dia natolotro ho eo an-tànan''ny fahavalony. '
  '8':
  - type: text
    content: 'Raha amiko, ny lovako dia efa toy ny liona any an''ala; Mierona amiko izy, ka dia halako. '
  '9':
  - type: text
    content: 'Moa tahaka ny vorona mpihaza hafahafa volo amiko va ny lovako, no mivory manodidina azy ny vorona mpihaza? Avia, ka angòny ny bibi-dia rehetra, ampanatony ireny hihinana. '
