document_id: JER.12,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fitarainana nataon'i Jeremia noho ny nanambinana ny ratsy fanahy, sy ny navalin'i Jehovah azy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mifandahatra aminao aho, Jehovah ô dia Hianao no marina; Nefa kosa aoka ihany mba handahatra aminao aho: Nahoana ary no ambinina ny lalan''ny ratsy fanahy? Nahoana no miadana ny mpiodina rehetra? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mpitondra maro no nanimba ny tanim-boaloboko, nohitsakitsahiny ny anjarako; Nataony tany efitra lao ny anjarako mahafinaritra; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nataony lao izany, eny, lao izy ka mitomany amiko; Nataony lao avokoa ny tany rehetra, satria tsy nisy nandatsaka am-po. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpandrava dia tonga any amin''ny tendrombohitra mangadihady rehetra any an-efitra; Fa misy sabatr''i Jehovah mandringana amin''ny faran''ny tany ka hatramin''ny farany koa, ka dia tsy misy fiadanana ho an''ny nofo rehetra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vary no nafafiny, fa tsilo no nojinjany; Nanasatra ny tenany izy, kanjo herim-po very foana izany; Dia hangaihay ny amin''ny zavatra azonareo ianareo noho ny firehetan''ny fahatezeran''i Jehovah. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain''i Jehovah ny amin''ireo ratsy fanahy rehetra mifanakaiky fonenena amiko ireo, dia izay mikasikasika ny tany nomeko ho lovan''ny Isiraely oloko: Indro, hongotako tsy ho amin''ny taniny ireo, ary ny taranak''i Joda koa dia hongotako tsy ho eo aminy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa nony efa voaongotra izy, dia hamindra fo aminy indray Aho, ka samy ho entiko mody any amin''ny lovany sy ny taniny avy indray izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa raha mba hianatra ny fanaon''ny oloko tokoa ireo ka hianiana amin''ny anarako hoe: Raha velona koa Jehovah, tahaka ny nampianaran''ireo ny oloko hianiana amin''i Bala, dia haorina ao amin''ny oloko izy; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha tsy hankatò kosa izy, dia hongotako izany firenena izany, eny, hongotako sy haringako izy, hoy Jehovah.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nambolenao izy, ka dia miorim-paka; Mitombo izy, ka dia mamoa; Manakaiky Anao amin'ny vavany izy, nefa manalavitra Anao amin'ny fony
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. voany
      marker-yv: yv-n
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa Hianao, Jehovah ô, mahalala ahy; Mahita ahy Hianao sady mizaha toetra ny foko ny aminao; Sariho toy ny ondry hovonoina ireny, ary atokàny
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. hamasino
      marker-yv: yv-n
    - type: text
      text: ' ho amin''ny andro hamonoana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mandra-pahoviana no hisaonan''ny tany sy hahalazoan''ny ahitra any amin''ny saha rehetra? Noho ny faharatsian''ny mponina any dia lany ringana ny biby sy ny vorona; Fa hoy ireo: Tsy mba hahita izay hiafarantsika izy.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha niara-nihazakazaka tamin'ny mandeha an-tongotra ianao ka voany, dia hataonao ahoana no fihaika ny soavaly? Ary raha eny amin'ny tany miadana no anananao toky, hanao ahoana kosa ianao, raha mby any amin'ny kirihitrala eny amoron
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ny reharehany
      marker-yv: yv-n
    - type: text
      text: '''i Jordana? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa na dia ny rahalahinao sy ny mpianakavin''ny rainao aza dia samy namitaka anao; Eny, niantso mafy teo aorianao ireo; Aza mino azy, na dia tsara fiteny aminao aza izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nilaozako ny tranoko, nafoiko ny lovako; Ny sombin''aiko dia natolotro ho eo an-tànan''ny fahavalony. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha amiko, ny lovako dia efa toy ny liona any an''ala; Mierona amiko izy, ka dia halako. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa tahaka ny vorona mpihaza hafahafa volo amiko va ny lovako, no mivory manodidina azy ny vorona mpihaza? Avia, ka angòny ny bibi-dia rehetra, ampanatony ireny hihinana. '
