document_id: 1CH.21,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanisana ny vahoaka, sy ny aretina nanjo ny olona noho izany, ary ny fifonana nataon'i Davida
  - type: text
    content: 'Ary Satana nitsangana hampidi-doza tamin''ny Isiraely ka nanome saina an''i Davida hanisa ny Isiraely. '
  '10':
  - type: text
    content: 'Mandehana, ka lazao amin''i Davida hoe: Izao no lazain''i Jehovah: Zavatra telo loha no apetrako eto anoloanao, koa fidio izay iray hataoko aminao. '
  '11':
  - type: text
    content: 'Ary Gada nankany amin''i Davida ka nanao taminy hoe: Izao no lazain''i Jehovah: Mifidia: '
  '12':
  - type: text
    content: 'Mosary telo taona va? Sa fandringanana eo alohan''ny fahavalonao telo volana, raha tratry ny sabatry ny fahavalonao ianao? Sa ny sabatr''i Jehovah, dia areti-mandringana, no hamely ny tany hateloana, ka Ilay Anjelin''i Jehovah handringana eran''ny tanin''ny Isiraely rehetra? Koa hevero tsara izay valiny ho entiko miverina any amin''Izay naniraka ahy. '
  '13':
  - type: text
    content: 'Ary hoy Davida tamin''i Gada: Indrisy! poritra loatra aho! nefa aleoko ho azon''ny tànan''i Jehovah, fa lehibe ny famindram-pony toy izay ho azon''izay tànan''olona. '
  '14':
  - type: text
    content: 'Dia nasian''i Jehovah areti-mandringana ny Isiraely ka nahafatesana fito alina izy. '
  '15':
  - type: text
    content: 'Ary Andriamanitra naniraka Anjely hankany Jerosalema handrava azy; ary raha ilay mbola nandrava iny Izy, dia nijery Jehovah ka nanenina ny amin''ny loza ka nanao tamin''Ilay Anjely nandrava hoe: Aoka izay! Atsaharo ny tananao ankehitriny. Ary Ilay Anjelin''i Jehovah nitsangana teo anilan''ny famoloan''i Araona Jebosita.'
  '16':
  - type: text
    content: Ary Davida nanopy ny masony ka nahita Ilay Anjelin'i Jehovah nitsangana teo anelanelan'ny tany sy ny lanitra sady nitana sabatra voatsoaka teny an-tanany, izay natondrony manandrify an'i Jerosalema. Dia niankohoka Davida sy ny loholon'ny Isiraely, izay efa samy nitafy lamba fisaonana
  - type: note
    content: Heb. lamba malailay
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Ary hoy Davida tamin''Andriamanitra: Tsy izaho va no nandidy hanisa ny vahoaka? Izaho no nanota sy nanao ratsy tokoa; fa ireo ondry ireo kosa, inona moa no mba nataony? Eny, Jehovah Andriamanitro ô, mifona aminao re aho, aoka ny tananao hamely ahy sy ny mpianakavin''ny raiko, fa aza ny olonao no asianao amin''ny areti-mandringana. '
  '18':
  - type: text
    content: 'Ary Gada nasain''Ilay Anjelin''i Jehovah hilaza amin''i Davida mba hiakatra hanangana alitara ho an''i Jehovah ao amin''ny famoloan''i Araona Jebosita. '
  '19':
  - type: text
    content: Koa dia niakatra Davida araka ny tenin'i Gada, izay nolazainy tamin'ny anaran'i Jehovah.
  '2':
  - type: text
    content: 'Dia hoy Davida tamin''i Joaba sy tamin''ireo lehiben''ny vahoaka: Mandehana, isao ny Isiraely hatrany Beri-sheba ka hatrany Dana; ary ento atỳ amiko ny isany mba ho fantatro. '
  '20':
  - type: text
    content: Ary Araona niherika ka nahita Ilay Anjely; ary ny zanany efa-dahy izay teo aminy dia niery. Ary Araona nively vary tao tamin'izay.
  '21':
  - type: text
    content: 'Ary nony tonga teo amin''i Araona Davida, dia nijery Araona ka nahita an''i Davida, ary dia niala avy teo amin''ny famoloana izy ka niankohoka tamin''ny tany teo anatrehan''i Davida. '
  '22':
  - type: text
    content: 'Ary hoy Davida tamin''i Araona: Mba omeo ahy amin''izay tokom-bidiny ity famoloana ity hanorenako alitara ho an''i Jehovah; omeo ahy izy, mba hitsaharan''ny areti-mandringana tsy hamely ny vahoaka. '
  '23':
  - type: text
    content: 'Fa hoy Araona tamin''i Davida: Ento ary ho anao, ary aoka ny mpanjaka tompoko hanao izay sitrany; indro, omeko koa ny omby ho fanatitra dorana ary ny fivelezam-bary ho kitay ary ny vary tritika ho fanatitra hohanina; foiko avokoa izy rehetra. '
  '24':
  - type: text
    content: 'Fa hoy Davida mpanjaka tamin''i Araona: Tsia, fa hovidiko mihitsy araka izay tokom-bidiny; fa tsy haka izay anao ho an''i Jehovah aho ary tsy hanatitra fanatitra dorana amin''izay azoko fotsiny. '
  '25':
  - type: text
    content: 'Dia nomen''i Davida sekely volamena lanjan''enin-jato Araona ho vidin''ny tany. '
  '26':
  - type: text
    content: 'Ary Davida nanorina alitara teo ho an''i Jehovah ka nanatitra fanatitra dorana sy fanati-pihavanana; dia niantso an''i Jehovah izy ka novaliany tamin''ny afo avy tany an-danitra, izay latsaka teo amin''ny alitara fandoroana ny fanatitra dorana. '
  '27':
  - type: text
    content: Ary Jehovah nandidy Ilay Anjely, ka dia nampidiriny tamin'ny tranony ny sabany.
  '28':
  - type: text
    content: 'Tamin''izany andro izany, nony hitan''i Davida fa novalian''i Jehovah teo amin''ny famoloan''i Araona Jebosita izy, dia namono zavatra hatao fanatitra teo izy. '
  '29':
  - type: text
    content: 'Fa ny tabernakelin''i Jehovah izay nataon''i Mosesy tany an-efitra sy ny alitara fandoroana ny fanatitra dorana kosa dia teo amin''ny fitoerana avo tao Gibeona fahizay; '
  '3':
  - type: text
    content: 'Fa hoy Joaba: Jehovah anie hampitombo ny olony ho injato toy izao na firy na firy izy; fa moa tsy mpanompon''ny tompoko izy rehetra, ry mpanjaka tompoko? Koa inona indray no itadiavan''ny tompoko izany zavatra izany? Nahoana no dia hampahadiso ny Isiraely? '
  '30':
  - type: text
    content: nefa Davida tsy nahazo nankeo anoloan'izany hanontany amin'Andriamanitra; fa raiki-tahotra izy noho ny sabatr'Ilay Anjelin'i Jehovah.
  '4':
  - type: text
    content: 'Nefa tsy azon''i Joaba nolavina ny tenin''ny mpanjaka; ka dia niainga izy ka nitety ny Isiraely rehetra; dia tonga tany Jerosalema indray izy. '
  '5':
  - type: text
    content: 'Ary natolotr''i Joaba an''i Davida ny isan''ny olona voalamina, ka nisy iray hetsy sy iray tapitrisa ny lehilahy mahatan-tsabatra teo amin''ny Isiraely; ary fito alina sy efatra hetsy ny lehilahy mahatan-tsabatra teo amin''ny Joda. '
  '6':
  - type: text
    content: Fa ny Levy sy ny Benjamina tsy mba nalaminy, satria fahavetavetana tamin'i Joaba ny tenin'ny mpanjaka.
  '7':
  - type: text
    content: 'Ary tsy sitrak''Andriamanitra izany zavatra izany; ka dia namely ny Isiraely Izy. '
  '8':
  - type: text
    content: 'Ary hoy Davida tamin''Andriamanitra; Efa nanota indrindra aho tamin''izao nataoko izao; koa ankehitriny, mifona aminao aho, esory ny heloky ny mpanomponao, fa efa nanao fahadalana lehibe tokoa aho. '
  '9':
  - type: text
    content: 'Ary hoy Jehovah tamin''i Gada mpahitan''i Davida: '
