document_id: DEU.4,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitarihan-teny nataon'i Mosesy ny amin'ny lalàna
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ankehitriny, ry Isiraely, mihainoa ny didy sy ny fitsipika izay ampianariko anareo harahinareo, mba ho velona ianareo ka hiditra sy handova ny tany izay omen''i Jehovah, Andriamanitry ny razanareo, anareo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia izay hitanao tamin''ny andro izay nitsangananao teo anatrehan''i Jehovah Andriamanitrao tany Horeba, fony Jehovah nilaza tamiko hoe: Angony etỳ amiko ny olona, dia hampandrenesiko azy ny teniko, izay hianarany mba hatahotra Ahy amin''ny andro rehetra hiainany ambonin''ny tany sady hampianariny ny zanany koa. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanakaiky ianareo ka nitsangana teo am-bodin''ny tendrombohitra; ary ny tendrombohitra nirehitra afo manakatra ny lanitra, sady nisy aizina sy rahona ary aizim-pito. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny taminareo teo amin''ny afo Jehovah; ny teny ihany no renareo, fa tsy nahita endrika akory ianareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nambarany taminareo ny fanekeny, izay nandidiany anareo harahina, dia ny Didy Folo ary nosoratany teo amin''ny vato fisaka roa ireo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izaho nodidian''i Jehovah tamin''izany andro izany hampianatra anareo didy sy fitsipika, mba harahinareo any amin''ny tany izay efa hidiranareo holovana. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tandremo tsara ny fanahinareo; fa tsy nahita endrika akory ianareo tamin''ny andro izay nitenenan''i Jehovah taminareo tao amin''ny afo tany Horeba; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fandrao manao ratsy ianareo ka manao sarin-javatra voasokitra ho anareo, araka izay endri-javatra na inona na inona, dia sarin-dehilahy, na sarim-behivavy, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'na sarim-biby izay etỳ ambonin''ny tany, na sarim-borona manana elatra izay manidina eny amin''ny habakabaka, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'na sarim-biby mandady na mikisaka amin''ny tany, na sarin-kazandrano izay ao amin''ny rano ambanin''ny tany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary andrao raha miandrandra ny lanitra ianao ka mahita ny masoandro sy ny volana ary ny kintana, dia izay rehetra eny amin''ny lanitra, dia ho voataona ianao hiankokoha eo anatrehany sy hanompo azy, izay nataon''i Jehovah Andriamanitrao ho anjaran''ny firenena rehetra ambanin''ny lanitra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza ampianareo ny teny izay andidiako anareo, ary aza anesoranareo, fa tandremo ny didin''i Jehovah Andriamanitrareo izay andidiako anareo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ianareo no nalain''i Jehovah ka nentiny nivoaka avy tao amin''ny memy fandrendreham-by (dia avy tany Egypta) mba ho firenena ho Azy tahaka ny amin''izao anio izao. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah dia tezitra tamiko noho ny aminareo ka nianiana fa tsy hita an''i Jordana aho, na hiditra any amin''ny tany soa izay omen''i Jehovah Andriamanitrao ho lovanao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izaho ho faty amin''ity tany ity, fa tsy hita an''i Jordana; fa ianareo kosa no hita ka handova izany tany soa izany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitandrema ianareo, fandrao manadino ny faneken''i Jehovah Andriamanitrareo izay nataony taminareo ka manao sarin-javatra voasokitra ho anareo, araka ny endriky ny zavatra izay efa nandraran''i Jehovah Andriamanitrao anao. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa Jehovah Andriamanitrao dia afo mandevona; eny, Andriamanitra saro-piaro Izy.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha miteraka sy ho loa-jafy koa ianao, ka efa nitoetra ela teo amin''ny tany ianareo ary manao ratsy ka manao sarin-javatra voasokitra, araka izay endriky ny zavatra na inona na inona, sy manao ratsy eo imason''i Jehovah Andriamanitrao ary mampahatezitra Azy, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia miantso ny lanitra sy ny tany ho vavolombelona aho anio fa vetivety foana dia ho fongotra tokoa ianareo tsy ho eo amin''ny tany izay alehanareo hita an''i Jordana holovana; tsy ho maro andro eo ianareo, fa haringana tokoa. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah hampiely anareo any amin''ny firenen-tsamy hafa; ary ho tonga olom-bitsy izay sisa aminareo any amin''ny firenen-tsamy hafa izay hitondran''i Jehovah anareo. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary any no hanompoanareo andriamanitra asan'ny tànan'olona, dia vato aman-kazo, izay tsy mahita, na mandre, na mihinana, na manimbolo.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa any ianao no hitady an''i Jehovah Andriamanitrao ka hahita Azy, raha mitady Azy amin''ny fonao rehetra sy ny fanahinao rehetra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny masonareo efa nahita izay nataon''i Jehovah noho ny tamin''i Bala-peora; fa ny olona rehetra izay nanaraka an''i Bala-peora dia naringan''i Jehovah Andriamanitrao tsy ho eo aminao. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha azom-pahoriana ianao, fa manjo anao ireo zavatra rehetra ireo, dia hiverina amin''i Jehovah Andriamanitrao ianao any am-parany ka hihaino ny feony; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa Andriamanitra mamindra fo Jehovah Andriamanitrao ka tsy hahafoy anao, na handringana anao, na hanadino ny fanekena tamin''ny razanao, izay efa nianianany taminy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa anontanio ange ny andro lasa, izay teo alohanao hatramin''ny andro izay namoronan''Andriamanitra olombelona tetỳ ambonin''ny tany ary hatramin''ny faravodilanitra manodidina, raha mba nisy zavatra lehibe tahaka izany, na mba efa nisy re tahaka izany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa efa nisy firenena nandre ny feon''Andriamanitra niteny tao amin''ny afo, tahaka ny efa renao, ka velona ihany? '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa efa nanandrana handeha haka firenena ho Azy avy amin''ny firenena hafa va Andriamanitra amin''ny fizahan-toetra sy ny famantarana sy ny fahagagana sy ny ady sy ny tanana mahery sy ny sandry nahinjitra ary ny fampahatahorana lehibe, araka izay rehetra nataon''i Jehovah Andriamanitrareo ho anareo tany Egypta teo imasonao? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hianao no nampahitainy izany, mba hahafantaranao fa Jehovah no Andriamanitra, fa tsy misy afa-tsy Izy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy tany an-danitra no nampandrenesany anao ny feony hananarany anao; ary teo ambonin''ny tany no nanehoany anao ny afony lehibe; ary ny teniny efa renao avy tao afovoan''ny afo. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary satria tia ny razanao Izy ka nifidy ny zanany mandimby azy, dia Izy no nitondra anao nivoaka avy tany Egypta tamin''ny heriny lehibe, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'handroahany eo anoloanao firenena maro izay lehibe sy mahery noho ianao, mba hampidirany anao sy hanomezany anao ny taniny ho lova, tahaka ny amin''izao anio izao. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa aoka ho fantatrao anio, ka tsarovy ao am-ponao, fa Jehovah no Andriamanitra any amin''ny lanitra ambony sy etỳ amin''ny tany ambany, ka tsy misy afa-tsy Izy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ianareo izay nifikitra tamin''i Jehovah Andriamanitrareo kosa dia samy velona avokoa izao anio izao. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia tandremo ny lalàny sy ny didiny izay andidiako anao anio, mba hahita soa ianao sy ny taranakao mandimby anao, ary mba ho maro andro ianao any amin'ny tany, izay omen'i Jehovah Andriamanitrao ho anao mandrakizay.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin''izay Mosesy dia nanokana tanàna telo any an-dafy atsinanan''i Jordana, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba handosiran''izay nahafaty ny namany tsy nahy ka tsy nankahala azy teo aloha, dia ho velona izy raha mandositra ao amin''ny anankiray amin''ireo tanàna ireo: '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia Bazera any an-efitra, amin'ny tany lemaka, an'ny Robenita; ary Ramota-gileada an'ny Gadita; ary Golana any Basana an'ny Manasita.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no lalàna izay nalahatr''i Mosesy teo anatrehan''ny Zanak''Isiraely. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no teni-vavolombelona sy didy ary fitsipika, izay nambaran''i Mosesy tamin''ny Zanak''Isiraely, rehefa nivoaka avy tany Egypta izy, '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tany an-dafin''i Jordana, tao an-dohasaha tandrifin''i Beti-peora, tao amin''ny tanin''i Sihona, ilay mpanjakan''ny Amorita nonina tao Hesbona, dia ilay noresen''i Mosesy sy ny Zanak''Isiraely, rehefa nivoaka avy tany Egypta izy, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka dia azony ny tanin''i Sihona sy ny tanin''i Oga, mpanjakan''i Basana, dia ny mpanjaka roa tamin''ny Amorita, izay tany an-dafy atsinanan''i Jordana, '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'hatrany Aroera, izay ao amoron''ny lohasahan-driaka Arnona, ka hatramin''ny tendrombohitra Siona (Hermona izany), '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia ny tani-hay rehetra any an-dafy atsinanan'i Jordana ka hatramin'ny ranomasina amin'ny tani-hay eo ambodin'i Pisga.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, efa nampianariko didy sy fitsipika ianareo, araka izay nandidian''i Jehovah Andriamanitro ahy, mba harahinareo any amin''ny tany izay efa hidiranareo holovana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa tandremo ary ataovy izany, fa izany no ho fahendrenareo sy ho fanananareo saina eny imason''ny firenen-tsamy hafa; fa handre izany lalàna rehetra izany izy ka hanao hoe: Olona hendry sy manan-tsaina tokoa io firenena io '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa iza no firenena, na dia lehibe aza, no mba manana andriamanitra akaiky azy tahaka an''i Jehovah Andriamanitra amin''izay rehetra iantsoantsika Azy? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary iza no firenena, na dia lehibe aza, no mba manana didy sy fitsipika marina tahaka izao lalàna rehetra izao, izay ataoko eo anatrehanareo anio? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa kosa mitandrema ianao, ka tandremo tsara ny fanahinao, fandrao hadinoinao ny zavatra izay efa hitan''ny masonao, ary andrao miala amin''ny fonao izany, amin''ny andro rehetra hiainanao, fa ampahafantaro ny zanakao sy ny zafinao izany, '
