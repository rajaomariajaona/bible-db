document_id: LUK.15,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary ny mpamory hetra rehetra sy ny mpanota nanatona hihaino an''i Jesosy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Lazaiko aminareo fa misy fifaliana toy izany eo anatrehan''ny anjelin''Andriamanitra ny amin''ny mpanota iray izay mibebaka. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary hoy Jesosy: Nisy lehilahy anankiray nanana zanaka mirahalahy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary hoy ilay zandriny tamin-drainy: Raiko, omeo ahy ny anjara-fananana tokony ho ahy. Dia nozarainy tamin''izy mirahalahy ny fananany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary nony afaka kelikely, dia nangonin''ilay zandriny ny fananany rehetra, ka lasa nankany an-tany lavitra izy, dia nandany ny fananany tamin''ny fiveloman-dratsy tany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary rehefa laniny avokoa ny fananany rehetra, dia nisy mosary mafy tamin''izany tany izany, ka nahantra izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia nandeha izy ka niankina tamin''ny tompon-tany anankiray tamin''izany tany izany, ary dia nirahiny tany an-tsahany hiandry kisoa. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary satriny hameno ny kibony tamin''ny voan-kazo fihinan''ny kisoa, fa tsy nisy nanome azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary raha nody ny sainy, dia hoy izy: Indrisy maro ny olona karamain''ny raiko manan-kanina be dia be, fa izaho kosa maty mosary eto! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Hiainga aho, dia hody any amin''ny raiko ka hanao aminy hoe: Raiko ô, efa nanota tamin''ny lanitra sy teo anatrehanao aho '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'ka tsy miendrika hatao hoe zanakao intsony; fa ataovy tahaka ny anankiray amin''ny olona karamainao aho. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia nimonomonona ny Fariseo sy ny mpanora-dalàna ka nanao hoe: Ilehity mandray ny mpanota ka miara-mihinana aminy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia niainga izy ka nankany amin-drainy. Fa raha mbola lavitra izy, dia tazan-drainy, ary onena azy izy ka nihazakazaka, dia namihina ny vozony sady nanoroka azy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary ilay zanany nanao taminy hoe: Raiko ô, efa nanota tamin''ny lanitra sy teo anatrehanao aho ka tsy miendrika hatao hoe zanakao intsony. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa rainy kosa nanao tamin''ny ankizilahiny hoe: Alao haingana ny akanjo tsara indrindra ka ampiakanjoy azy; ary asio peratra ny tànany sy kapa ny tongony; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'ary ento ny zanak''omby nafahy, ka vonoy; ary aoka isika hihinana sy hifaly; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'fa ity zanako ity efa maty, fa velona indray, ary efa very, fa hita indray. Dia nifaly izy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fa tany an-tsaha ny zanany lahimatoa; ary nony nody izy ka mby teo akaiky ny trano, dia nandre zava-maneno sy dihy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary niantso ankizilahy anankiray izy ka nanontany azy izay anton''izany zavatra izany. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary hoy ilay ankizilahy taminy: Tonga ny rahalahinao, ka namono ny zanak''omby nafahy ny rainao, satria efa tafaverina soa aman-tsara ato aminy izy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dia tezitra izy ka tsy nety niditra; ary nivoaka rainy ka nampandroso azy. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Fa izy namaly ka nanao tamin-drainy hoe: Indro, izay ela izay aho no efa nanompo anao ka tsy mbola nandika ny didinao na dia indray mandeha akory aza; nefa izaho tsy mbola nomenao na dia zanak''osy aza mba hifaliako amin''ny sakaizako; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa Izy nanao izao fanoharana izao taminy hoe: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'fa raha vao tonga kosa io zanakao io, izay efa nandany ny fanananao tamin''ny vehivavy janga, dia namono ho azy ny zanak''omby nafahy ianao. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary hoy rainy taminy: Anaka, ianao eto amiko mandrakariva, ary anao avokoa izay rehetra ananako. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Fa mety ny mifaly sy miravoravo; fa ity rahalahinao ity efa maty, fa velona indray, ary efa very, fa hita indray.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Iza moa no olona aminareo, izay manana ondry zato, ka very ny anankiray, no tsy mandao ny sivy amby sivi-folo any an-efitra ka mandeha hitady ilay very mandra-pahitany azy? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'ary rehefa hitany iny, dia ataony eo an-tsorony, ka dia faly izy; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ary rehefa tonga ao an-trano izy, dia mamory ny sakaizany sy ny namany ka manao aminy hoe: Avia hiara-mifaly amiko; fa efa hitako ilay ondriko very. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Lazaiko aminareo fa hisy fifaliana toy izany any an-danitra ny amin'ny mpanota iray izay mibebaka noho ny amin'ny olona marina sivy amby sivi-folo, izay tsy misy tokony hibebahany.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary iza moa no vehivavy manana farantsakely
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr.drakma
      marker-yv: yv-n
    - type: text
      text: ' folo, ka very ny anankiray, no tsy mampirehitra jiro ka mifafa trano sy mitady fatratra mandra-pahitany azy? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary raha hitany iny, dia mamory ny vehivavy sakaizany sy ny namany izy ka manao hoe: Avia hiara-mifaly amiko; fa efa hitako ny farantsakely'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. drakma
      marker-yv: yv-n
    - type: text
      text: ' izay very. '
