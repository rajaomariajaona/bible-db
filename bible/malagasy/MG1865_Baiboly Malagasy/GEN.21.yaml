document_id: GEN.21,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fanekena nataon'i Abrahama sy Abimeleka
  - type: text
    content: 'Ary Jehovah namangy an''i Saraha araka ilay efa nolazainy, ary dia nataon''i Jehovah tamin''i Saraha araka ilay efa noteneniny. '
  '10':
  - type: text
    content: 'Dia hoy izy tamin''i Abrahama: Roahy io andevovavy io sy ny zanany; fa ny zanak''io andevovavy io tsy hiray lova amin''ny zanako, dia amin''Isaka. '
  '11':
  - type: text
    content: 'Fa ratsy teo imason''i Abrahama indrindra izany teny izany noho ny amin''ny zanany. '
  '12':
  - type: text
    content: 'Ary hoy Andriamanitra tamin''i Abrahama: Aoka tsy ho ratsy eo imasonao ny amin''ny zaza sy ny andevovavinao; fa izay rehetra lazain''i Saraha aminao, dia ekeo ny teniny, fa avy amin''Isaka no hantsoina izay taranaka ho anao. '
  '13':
  - type: text
    content: 'Nefa ny zanaky ny andevovavy kosa dia hataoko ho firenena, satria terakao ihany izy. '
  '14':
  - type: text
    content: 'Dia nifoha maraina koa Abrahama ka naka mofo sy siny hoditra iray feno rano, ary nomeny an''i Hagara ka napetrany teo an-tsorony ary natolony azy koa ny zaza, dia nampandehaniny izy mianaka; ary lasa nandeha izy ka nirenireny tany an-efitr''i Beri-sheba. '
  '15':
  - type: text
    content: 'Ary rehefa lany ny rano tao amin''ny siny hoditra, dia nariany teo ampototry ny hazo kely anankiray ny zaza. '
  '16':
  - type: text
    content: 'Dia lasa izy ka nipetraka terỳ lavidavitra tandrifiny, tokony ho tra-tsipìka; fa hoy izy: Aza mba ho hitako anie izay hahafatesan''ny zaza. Ary nipetraka tandrifiny izy, dia nanandratra ny feony nitomany. '
  '17':
  - type: text
    content: 'Ary ren''Andriamanitra ny feon''ny zaza, dia niantso an''i Hagara Ilay Anjelin''Andriamanitra tany an-danitra ka nanao taminy hoe : Inona izato manjo anao, ry Hagara ? Aza matahotra, fa efa ren''Andriamanitra ny feon''ny zaza eo amin''ny itoerany. '
  '18':
  - type: text
    content: 'Mitsa­ngana, areno ny zaza, ka tantano; fa hataoko firenena lehibe izy. '
  '19':
  - type: text
    content: 'Dia nampahiratin''Andriamanitra ny mason''i Hagara, ka nahita lavaka fantsakana izy; ary lasa izy, dia nameno rano ny siny hoditra ka nampisotro rano ny zaza. '
  '2':
  - type: text
    content: 'Dia nanan''anaka Saraha ka niteraka zazalahy tamin''i Abrahama, rehefa antitra izy, tamin''ny fotoana izay efa nolazain''Andriamanitra taminy. '
  '20':
  - type: text
    content: 'Ary nomban''Andriamanitra ny zaza. dia nitombo izy; ary nonina tany an-efitra izy ka nony efa lehibe dia tonga mpandefa tsipìka. '
  '21':
  - type: text
    content: Ary nonina tany an-efitra Parana izy ka nakan'ny reniny vady avy tany amin'ny tany Egypta izy.
  '22':
  - type: text
    content: 'Ary tamin''izany andro izany Abimeleka sy Pikola, komandin''ny miaramilany, dia niteny tamin''i Abrahama ka nanao hoe: Omban''Andriamanitra ianao amin''izay re­hetra ataonao; '
  '23':
  - type: text
    content: 'koa ankehitriny ianiano amin''Andriamanitra aho fa tsy hamitaka ahy na ny zanako na ny taranako ianao; fa araka ny soa izay efa nataoko taminao no mba ataovy amiko sy amin''ny tany izay ivahinianao. '
  '24':
  - type: text
    content: 'Ary hoy Abrahama: Hianiana ihany aho. '
  '25':
  - type: text
    content: 'Ary Abrahama nananatra an''i Abimeleka noho ny lavaka fantsakana anankiray izay efa nalain''ny mpanompon''i Abimeleka an-keriny '
  '26':
  - type: text
    content: 'Dia hoy Abimeleka: Tsy fantatro izay nanao izany; fa ianao tsy mbola nanambara tamiko, ary izaho koa tsy mba nahare, raha tsy vao izao. '
  '27':
  - type: text
    content: 'Ary Abrahama naka ondry aman''osy sy omby. ka nomeny an''i Abimeleka; dia nanao fanekena izy roa lahy. '
  '28':
  - type: text
    content: 'Ary Abrahama nanokana ondrivavikely fito navahana tamin''ny ondry. '
  '29':
  - type: text
    content: 'Ary hoy Abimeleka tamin''i Abrahama: Hatao inona ireo ondrivavy kely fito natokanao ireo? '
  '3':
  - type: text
    content: 'Ary ny anaran''ny zanany izay teraka, ilay naterak''i Saraha taminy dia nataon''i Abrahama hoe Isaka. '
  '30':
  - type: text
    content: 'Ary hoy izy: Mba horaisinao avy amin''ny tanako ireo ondrivavy kely fito ireo ho vavolombelona amiko fa izaho nihady io lavaka fantsakana io. '
  '31':
  - type: text
    content: 'Izany no nanaovana io tany io hoe Beri-sheba; satria teo no nianianan''izy roa lahy. '
  '32':
  - type: text
    content: 'Dia nanao fanekena tany Beri-sheba izy; ary dia niainga Abimeleka sy Pikola, komandin''ny miaramilany, ka niverina ho any amin''ny tanin''ny Filistina. '
  '33':
  - type: text
    content: 'Dia namboly hazo tamariska tany Beri-sheba Abrahama ka tao no niantsoany ny anaran''i Jehovah, dia Andriamanitra Mandrakizay. '
  '34':
  - type: text
    content: Ary Abrahama nivahiny elaela ihany tany amin'ny tanin'ny Filistina.
  '4':
  - type: text
    content: 'Dia noforan''i Abrahama Isaka zanany, rehefa teraka havaloana izy, araka izay efa nandidian''Andriamanitra azy. '
  '5':
  - type: text
    content: 'Ary efa zato taona Abrahama, raha niteraka an''i Isaka zanany izy. '
  '6':
  - type: text
    content: 'Ary hoy Saraha: Efa nampihomehezin''Andriamanitra aho; izay rehetra mandre dia hiara-mihomehy amiko. '
  '7':
  - type: text
    content: 'Ary hoy koa izy: Nampoizin''iza akory moa no hilaza amin''i Abrahama fa hampinono zaza Saraha? kanjo efa niteraka zazalahy taminy aho, rehefa antitra izy. '
  '8':
  - type: text
    content: 'Ary rehefa lehibe ny zaza, dia notazana; ary Abrahama nanao fanasana lehibe tamin''ny andro nanotazana an''Isaka. '
  '9':
  - type: text
    content: 'Ary Saraha nahita fa nihomehy ny zanak''i Hagara Egyptiana, izay efa naterany tamin''i Abrahama. '
