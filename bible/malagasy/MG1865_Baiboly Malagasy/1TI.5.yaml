document_id: 1TI.5,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny fitondrana ny loholona sy ny vehivavy mpitondratena mbamin'ny sasany koa, ary anatra ho amin'ny mpanompon'olona
  - type: text
    content: 'Aza mamely mafy loatra ny anti-panahy, fa anaro toy ny ray izy, ny tanora fanahy toy ny rahalahy, '
  '10':
  - type: text
    content: 'ary tsara laza amin''ny asa tsara; raha namelon-jaza izy, raha nampiantrano vahiny, raha nanasa ny tongotry ny olona masina, raha namonjy ny nozoim-pahoriana, raha nazoto nanaraka ny asa tsara rehetra. '
  '11':
  - type: text
    content: 'Fa mandava ny mpitondra-tena tanora; fa raha tsy maharitra ny fifehezan''i Kristy izy, dia ta-hanam-bady '
  '12':
  - type: text
    content: 'ka hahazo fanamelohana, satria nandà ny finoany voalohany izy. '
  '13':
  - type: text
    content: 'Sady mianatra ho malaina koa izy ka mandehandeha mitety trano; ary tsy malaina ihany, fa mpilazalaza sy mpandehandeha miraharaha ny an''olona ka manao teny tsy mety. '
  '14':
  - type: text
    content: 'Koa tiako ny mpitondratena tanora fanahy hanam-bady sy hanana zanaka sy hanapaka ny tranony ka tsy hanome vava ny fahavalo hiteny ratsy. '
  '15':
  - type: text
    content: 'Fa ny sasany efa nivily sahady nanaraka an''i Satana. '
  '16':
  - type: text
    content: Raha misy vehivavy mino manana mpitondratena, aoka izy hamelona azy, ary aza avela hahavaky tratra ny fiangonana
  - type: note
    content: Gr. eklesia
  - type: text
    content: ', mba hamelomany izay efa mpitondratena tokoa. '
  '17':
  - type: text
    content: Aoka ny loholona
  - type: note
    content: Gr. presbytera
  - type: text
    content: ' izay mitondra tsara hatao tokony hahazo fanajana roa heny indrindra fa izay nikely aina amin''ny teny sy ny fampianarana. '
  '18':
  - type: text
    content: 'Fa hoy ny Soratra Masina: "Aza manakombona ny vavan''ny omby mively vary ianao" (Deo. 25.4) Ary koa: "Ny mpiasa miendrika hahazo ny karamany" (Lio.10.7). '
  '19':
  - type: text
    content: Aza mandray teny hiampangana loholona
  - type: note
    content: Gr. presbytera
  - type: text
    content: ', raha tsy misy vavolombelona roa na telo. '
  '2':
  - type: text
    content: 'ny vehivavy anti-panahy toy ny reny, ny tanora fanahy toy ny anabavy, amin''ny fahadiovana rehetra. '
  '20':
  - type: text
    content: 'Izay manota dia anaro eo anatrehan''ny olona rehetra, mba hatahotra koa ny sasany. '
  '21':
  - type: text
    content: 'Mananatra anao mafy aho eo anatrehan''Andriamanitra sy Kristy Jesosy ary ny anjely voafidy mba hotandremanao izany zavatra izany, tsy manao olon-tiana, na manao na inona na inona amin''ny fiangarana. '
  '22':
  - type: text
    content: 'Aza malaky mametra-tanana amin''olona na iza na iza, ary aza miombona ota amin''ny sasany; tehirizo madio ny tenanao. '
  '23':
  - type: text
    content: 'Aza misotro rano intsony fa misotroa divay kely noho ny vava-fonao sy ny fahosaosanao matetika. '
  '24':
  - type: text
    content: 'Ny fahotan''ny olona sasany miharihary ka mialoha ho amin''ny fitsarana, fa ny an''ny sasany kosa manaraka ato aoriana. '
  '25':
  - type: text
    content: Ary miharihary toy izany koa ny asa tsara; ary izay tsy toy izany dia tsy ho azo afenina.
  '3':
  - type: text
    content: 'Omeo voninahitra ny mpitondratena izay efa mpitondratena tokoa. '
  '4':
  - type: text
    content: 'Fa raha misy mpitondratena manana zanaka na zafy, aoka ireo hianatra aloha haneho izay toe-panahy araka an''Andriamanitra amin''ny ao an-tranony ka hamaly soa ny rainy aman-dreniny; fa izany no ankasitrahana eo anatrehan''Andriamanitra. '
  '5':
  - type: text
    content: 'Fa izay efa mpitondratena tokoa ka irery tena dia efa manantena an''Andriamanitra ka maharitra amin''ny fangatahana sy ny fivavahana andro aman''alina '
  '6':
  - type: text
    content: 'Fa izay vehivavy manaram-po amin''ny fahafinaretana dia maty fahavelony. '
  '7':
  - type: text
    content: 'Ary izany zavatra izany no andidio, mba tsy hananany tsiny. '
  '8':
  - type: text
    content: 'Fa raha misy tsy mamelona ny azy, indrindra fa ny ankohonany, dia efa nandà ny finoana izy ka ratsy noho ny tsy mino aza. '
  '9':
  - type: text
    content: 'Aza soratana ho isan''ny mpitondratena izay latsaka noho ny enim-polo taona sady efa nanam-bady indray mandeha ihany '
