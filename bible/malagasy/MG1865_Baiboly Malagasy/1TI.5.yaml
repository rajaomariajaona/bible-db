document_id: 1TI.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny fitondrana ny loholona sy ny vehivavy mpitondratena mbamin'ny sasany koa, ary anatra ho amin'ny mpanompon'olona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Aza mamely mafy loatra ny anti-panahy, fa anaro toy ny ray izy, ny tanora fanahy toy ny rahalahy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ny vehivavy anti-panahy toy ny reny, ny tanora fanahy toy ny anabavy, amin''ny fahadiovana rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Omeo voninahitra ny mpitondratena izay efa mpitondratena tokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa raha misy mpitondratena manana zanaka na zafy, aoka ireo hianatra aloha haneho izay toe-panahy araka an''Andriamanitra amin''ny ao an-tranony ka hamaly soa ny rainy aman-dreniny; fa izany no ankasitrahana eo anatrehan''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa izay efa mpitondratena tokoa ka irery tena dia efa manantena an''Andriamanitra ka maharitra amin''ny fangatahana sy ny fivavahana andro aman''alina '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa izay vehivavy manaram-po amin''ny fahafinaretana dia maty fahavelony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary izany zavatra izany no andidio, mba tsy hananany tsiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa raha misy tsy mamelona ny azy, indrindra fa ny ankohonany, dia efa nandà ny finoana izy ka ratsy noho ny tsy mino aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aza soratana ho isan''ny mpitondratena izay latsaka noho ny enim-polo taona sady efa nanam-bady indray mandeha ihany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ary tsara laza amin''ny asa tsara; raha namelon-jaza izy, raha nampiantrano vahiny, raha nanasa ny tongotry ny olona masina, raha namonjy ny nozoim-pahoriana, raha nazoto nanaraka ny asa tsara rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa mandava ny mpitondra-tena tanora; fa raha tsy maharitra ny fifehezan''i Kristy izy, dia ta-hanam-bady '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ka hahazo fanamelohana, satria nandà ny finoany voalohany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Sady mianatra ho malaina koa izy ka mandehandeha mitety trano; ary tsy malaina ihany, fa mpilazalaza sy mpandehandeha miraharaha ny an''olona ka manao teny tsy mety. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa tiako ny mpitondratena tanora fanahy hanam-bady sy hanana zanaka sy hanapaka ny tranony ka tsy hanome vava ny fahavalo hiteny ratsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa ny sasany efa nivily sahady nanaraka an''i Satana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Raha misy vehivavy mino manana mpitondratena, aoka izy hamelona azy, ary aza avela hahavaky tratra ny fiangonana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. eklesia
    marker-yv: yv-n
  - type: text
    text: ', mba hamelomany izay efa mpitondratena tokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aoka ny loholona
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. presbytera
    marker-yv: yv-n
  - type: text
    text: ' izay mitondra tsara hatao tokony hahazo fanajana roa heny indrindra fa izay nikely aina amin''ny teny sy ny fampianarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa hoy ny Soratra Masina: "Aza manakombona ny vavan''ny omby mively vary ianao" (Deo. 25.4) Ary koa: "Ny mpiasa miendrika hahazo ny karamany" (Lio.10.7). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Aza mandray teny hiampangana loholona
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. presbytera
    marker-yv: yv-n
  - type: text
    text: ', raha tsy misy vavolombelona roa na telo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Izay manota dia anaro eo anatrehan''ny olona rehetra, mba hatahotra koa ny sasany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mananatra anao mafy aho eo anatrehan''Andriamanitra sy Kristy Jesosy ary ny anjely voafidy mba hotandremanao izany zavatra izany, tsy manao olon-tiana, na manao na inona na inona amin''ny fiangarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Aza malaky mametra-tanana amin''olona na iza na iza, ary aza miombona ota amin''ny sasany; tehirizo madio ny tenanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Aza misotro rano intsony fa misotroa divay kely noho ny vava-fonao sy ny fahosaosanao matetika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny fahotan''ny olona sasany miharihary ka mialoha ho amin''ny fitsarana, fa ny an''ny sasany kosa manaraka ato aoriana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary miharihary toy izany koa ny asa tsara; ary izay tsy toy izany dia tsy ho azo afenina.
