document_id: PSA.79,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fifonana noho ny faharavana nataon'ny fahavalo
  - type: text
    content: 'Salamo nataon''i Asafa. Andriamanitra ô, tonga eto amin''ny lovanao ny jentilisa, ka nandoto ny tempolinao masina sady nanao an''i Jerosalema ho korontam-bato. '
  '10':
  - type: text
    content: 'Nahoana ny jentilisa no hanao hoe: aiza izay Andriamaniny? aoka ho fantatra amin''ny jentilisa eo imasonay ny famaliana ny ran''ny mpanomponao izay nalatsaka. '
  '11':
  - type: text
    content: 'Aoka ho tonga eo anatrehanao ny fisentoan''ny mpifatotra; araka ny halehiben''ny sandrinao dia arovy tsy ho faty ny zanaky ny fahafatesana. '
  '12':
  - type: text
    content: 'Ary valio impito heny ho ao an-tratran''ny mifanila fonenana aminay ny fanaratsiana izay nanaratsiany Anao, Tompo ô. '
  '13':
  - type: text
    content: Fa izahay, olonao sy ondry fiandrinao, dia hisaotra Anao mandrakizay; hatramin'ny taranaka fara mandimby no hilazanay ny fideràna Anao.
  '2':
  - type: text
    content: 'Ny fatin''ny mpanomponao nomeny hohanin''ny voro-manidina, ny nofon''ny olonao masina ho an''ny bibidia; '
  '3':
  - type: text
    content: 'Ny ràny naidiny manodidina an''i Jerosalema tahaka ny rano, ary tsy nisy handevina. '
  '4':
  - type: text
    content: Tonga fandatsan'ny namanay izahay, sady faneso sy fanakoran'izay manodidina anay.
  '5':
  - type: text
    content: 'Mandra-pahoviana, Jehovah ô, no hanontolo fo Hianao, ka hirehitra tahaka ny afo ny fahasaro-piaoronao? '
  '6':
  - type: text
    content: 'Aidino amin''ny jentilisa izay tsy mahalala Anao ny fahatezeranao, sy amin''ny fanjakana izay tsy miantso ny anaranao; '
  '7':
  - type: text
    content: 'Fa efa nandany an''i Jakoba izy ireo sady nandrava ny fonenany. '
  '8':
  - type: text
    content: 'Aza tsarovana aminay ny heloky ny razanay; aoka ho avy faingana hitsena anay ny fiantrànao, fa reraka indrindra izahay. '
  '9':
  - type: text
    content: 'Vonjeo izahay, ry Andriamanitry ny famonjena anay ô, noho ny voninahitry ny anaranao; ary afaho izahay, ka mamelà ny helokay, noho ny anaranao. '
