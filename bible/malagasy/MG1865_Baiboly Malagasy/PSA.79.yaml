document_id: PSA.79
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fifonana noho ny faharavana nataon'ny fahavalo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Salamo nataon''i Asafa. Andriamanitra ô, tonga eto amin''ny lovanao ny jentilisa, ka nandoto ny tempolinao masina sady nanao an''i Jerosalema ho korontam-bato. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny fatin''ny mpanomponao nomeny hohanin''ny voro-manidina, ny nofon''ny olonao masina ho an''ny bibidia; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny ràny naidiny manodidina an''i Jerosalema tahaka ny rano, ary tsy nisy handevina. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tonga fandatsan'ny namanay izahay, sady faneso sy fanakoran'izay manodidina anay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mandra-pahoviana, Jehovah ô, no hanontolo fo Hianao, ka hirehitra tahaka ny afo ny fahasaro-piaoronao? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Aidino amin''ny jentilisa izay tsy mahalala Anao ny fahatezeranao, sy amin''ny fanjakana izay tsy miantso ny anaranao; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa efa nandany an''i Jakoba izy ireo sady nandrava ny fonenany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aza tsarovana aminay ny heloky ny razanay; aoka ho avy faingana hitsena anay ny fiantrànao, fa reraka indrindra izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Vonjeo izahay, ry Andriamanitry ny famonjena anay ô, noho ny voninahitry ny anaranao; ary afaho izahay, ka mamelà ny helokay, noho ny anaranao. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nahoana ny jentilisa no hanao hoe: aiza izay Andriamaniny? aoka ho fantatra amin''ny jentilisa eo imasonay ny famaliana ny ran''ny mpanomponao izay nalatsaka. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Aoka ho tonga eo anatrehanao ny fisentoan''ny mpifatotra; araka ny halehiben''ny sandrinao dia arovy tsy ho faty ny zanaky ny fahafatesana. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary valio impito heny ho ao an-tratran''ny mifanila fonenana aminay ny fanaratsiana izay nanaratsiany Anao, Tompo ô. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa izahay, olonao sy ondry fiandrinao, dia hisaotra Anao mandrakizay; hatramin'ny taranaka fara mandimby no hilazanay ny fideràna Anao.
