document_id: EZK.11,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Filazana ny amin'ny loza hanjo, sy fampanantenana ny famindram-po
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ary nisy fanahy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: rivotra'
      marker-yv: yv-n
    - type: text
      text: ' nanainga ahy koa, dia nitondra ahy ho eo amin''ny vavahady atsinanana amin''ny tranon''i Jehovah, dia ilay manatrika ny atsinanana; ary, indreo, nisy olona dimy amby roa-polo lahy teo anoloan''ny vavahady; dia hitako teo amin''ireo Jazania, zanak''i Azora, sy Pelatia, zanak''i Benaia, lehiben''ny vahoaka. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ho lavon''ny sabatra ianareo; any amin''ny sisin-tanin''ny Isiraely no hitsarako anareo, ka dia ho fantatrareo fa Izaho no Jehovah. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ity tanàna ity tsy ho vilaninareo, ary ianareo tsy ho hena ato anatiny; fa any amin''ny sisin-tanin''ny Isiraely no hitsarako anareo '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'ka dia ho fantatrareo fa Izaho no Jehovah, satria tsy nandeha araka ny lalàko ianareo na nanaraka ny fitsipiko, fa araka ny fitsipiky ny jentilisa izay manodidina anareo ihany no nataonareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary raha mbola naminany aho, dia maty Pelatia, zanak''i Benaia. Dia niankohoka aho ka nitaraina tamin''ny feo mahery nanao hoe: Indrisy! Jehovah Tompo ô, holevoninao va ny hany sisa amin''ny Isiraely? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ry zanak'olona, ny rahalahinao, eny, ny rahalahinao no andraikitrao
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: iray firazanana aminao'
      marker-yv: yv-n
    - type: text
      text: ', dia ny taranak''Isiraely rehetra, izay nitenenan''ny mponina any Jerosalema hoe: Manalavira an''i Jehovah; izahay no nomena ity tany ity ho lova. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Koa lazao hoe: Izao no lazain''i Jehovah Tompo: Na dia nampandehaniko lavitra any amin''ny jentilisa aza izy ka naeliko tany amin''ny tany maro, dia ho fitoerana masina ho azy vetivety'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: kely ho azy'
      marker-yv: yv-n
    - type: text
      text: ' Aho any amin''ny tany izay alehany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Koa lazao hoe: Izao no lazain''i Jehovah Tompo: Hovoriko avy any amin''ny firenena ianareo, ary hangoniko avy any amin''ny tany izay nampielezana anareo, ka homeko ny tanin''ny Isiraely ianareo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary ho tonga ao izy ka hanaisotra ny zava-dratsiny rehetra sy ny fahavetavetany rehetra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia homeko fo iray izy, ary hasiako fanahy vaovao ao anatinareo; ary hesoriko amin''ny nofony ny fo vato, ka homeko fo nofo izy, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia hoy Izy tamiko: Ry zanak''olona, ireo no lehilahy izay mamoron-tsain-dratsy sady manolo-tsain-dratsy eto amin''ity tanàna ity, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'mba handehanany araka ny didiko sy hitandremany ny fitsipiko ka hanarahany izany, ary izy dia ho oloko, ary Izaho ho Andriamaniny. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Fa ny amin'izay manana fo manina ny zava-dratsiny
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. manaraka ny fon'ny zava-dratsiny
      marker-yv: yv-n
    - type: text
      text: ' sy ny fahavetavetany, dia hatsingeriko ho eo an-dohany ihany ny nataony'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. lalana
      marker-yv: yv-n
    - type: text
      text: ', hoy Jehovah Tompo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia nasandratry ny kerobima ny elany sy ny kodia teo anilany; ary ny voninahitr''Andriamanitry ny Isiraely no teo amboniny. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary ny voninahitr''i Jehovah niakatra niala tao amin''ny tanàna ka nijanona teo an-tampon''ny tendrombohitra atsinanan''ny tanàna. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Dia nisy fanahy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: rivotra'
      marker-yv: yv-n
    - type: text
      text: ' nanainga ahy tamin''ny fahitana, dia tamin''ny Fanahin''Andriamanitra, ka nitondra ahy ho any Kaldea ho any amin''ny babo. Dia niakatra niala tamiko ny fahitana izay efa hitako. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ary nolazaiko tamin'ny babo ny teny rehetra izay nasehon'i Jehovah ahy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'dia izay manao hoe: Mbola lavitra ny hanaovana trano; ity tanàna ity no vilany, ary isika no hena; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'ka dia maminania hamely azy, eny, maminania, ry zanak''olona. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary tonga tao amiko ny Fanahin''i Jehovah, ka hoy Izy tamiko: Lazao hoe: Izao no lazain''i Jehovah: Izany no fiteninareo, ry taranak''Isiraely, ary fantatro izay rehetra ao an-tsainareo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Hianareo efa nahamaro ny voavononareo teto amin''ity tanàna ity, ary ny lalambeny efa nofenoinareo faty. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Koa izao no lazain''i Jehovah Tompo: Ny voavononareo, izay nataonareo tao aminy, no hena, ary ity tanàna ity no vilany; nefa havoaka avy ao aminy ianareo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Natahotra ny sabatra ianareo; nefa hataoko mahatratra anareo ihany ny sabatra, hoy Jehovah Tompo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary havoakako avy ato aminy ianareo ka hatolotro ho eny an-tànan''ny hafa firenena, ary hanao fitsarana aminareo Aho. '
