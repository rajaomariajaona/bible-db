document_id: JOB.42,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny farany nataon'i Joba, sy ny nanomezan'Andriamanitra azy fiadanana indray
  - type: text
    content: 'Ary Joba dia namaly an''i Jehovah ka nanao hoe:'
  '10':
  - type: text
    content: 'Ary Jehovah nampody ny fiadanan''i Joba, raha nivavaka ho an''ny sakaizany izy, ka dia nanome azy indroa toraka izay nananany fahiny Izy. '
  '11':
  - type: text
    content: Dia avy ny rahalahiny rehetra sy ny anabaviny rehetra ary ny olona rehetra izay fantany fahiny ka nankao aminy ary niara-nihinana taminy tao an-tranony ary nitsapa alahelo sady nampionona azy noho ny fahoriana rehetra izay efa nahatran'i Jehovah taminy; ary samy nanome azy vakim-bola
  - type: note
    content: Heb. kesita;
  - type: text
    content: ' iray avy sy kavim-bolamena iray avy izy rehetra. '
  '12':
  - type: text
    content: 'Ary Jehovah nitahy ny niafaran''i Joba mihoatra noho ny voalohany ka nanana ondry aman''osy efatra arivo amby iray alina sy rameva enina arivo sy omby roa arivo ary borikivavy arivo izy. '
  '13':
  - type: text
    content: 'Ary nanan-janaka fito lahy sy vavy telo koa izy, '
  '14':
  - type: text
    content: 'ka ny anaran''ny zokiny nataony hoe Jemima, ary ny anaran''ny manarakaraka Kezia, ary ny anaran''ny faravavy Kerena-hapoka. '
  '15':
  - type: text
    content: 'Ary tsy nisy vehivavy tsara tarehy tahaka ny zanakavavin''i Joba hita tany amin''ny tany rehetra, ary niara-nomen-drainy lova tamin''ny anadahiny izy. '
  '16':
  - type: text
    content: 'Ary mbola velona efa-polo amby zato taona Joba taorian''izany ka nahita ny zananilahy sy ny zafiny ka hatramin''ny zafin-dohaliny aza. '
  '17':
  - type: text
    content: Dia maty Joba, rehefa tratrantitra ka ela niainana
  - type: note
    content: Heb. voky andro
  - type: text
    content: .
  '2':
  - type: text
    content: Fantatro fa hainao avokoa ny zavatra rehetra, ary tsy azo ferana ny fisainanao.
  '3':
  - type: text
    content: Iza no mahatakona ny fisainanao amin'ny tsi-fahalalana? Koa dia nilaza izay tsy fantatro aho, dia zava-mahagaga loatra amiko, izay tsy takatry ny saiko.
  '4':
  - type: text
    content: Mifona aminao aho, mihainoa, fa hiteny aho; Hanontany Anao aho, ka ampahafantaro.
  '5':
  - type: text
    content: Fandrenesan'ny sofina ihany no nandrenesako Anao; Fa ankehitriny izao kosa dia ny masoko no mahita Anao;
  '6':
  - type: text
    content: Koa dia miaiky sy mibebaka Eto amin'ny vovoka sy ny lavenona aho.
  '7':
  - type: text
    content: 'Ary rehefa voalazan''i Jehovah tamin''i Joba izany teny izany, dia hoy koa Izy tamin''i Elifaza Temanita: Mirehitra aminao sy ny sakaizanao roa lahy ny fahatezerako satria tsy mba marina tahaka ny filàzan''i Joba mpanompoko ny filàzanareo Ahy. '
  '8':
  - type: text
    content: 'Koa ankehitriny makà vantotr''ombilahy fito sy ondrilahy fito ho anareo, ary mankanesa ao amin''i Joba mpanompoko, ka manatera fanatitra dorana ho anareo; ary Joba mpanompoko no hifona ho anareo, fa izy no hankasitrahako, fandrao hamaly anareo araka ny fahadalanareo Aho, satria tsy marina tahaka ny filàzan''i Joba mpanompoko ny filàzanareo Ahy. '
  '9':
  - type: text
    content: Dia nandeha Elifaza Temanita sy Bildada Sohita ary Zofara Namatita ka nanao araka izay nandidian'i Jehovah azy; ary Jehovah dia nankasitraka an'i Joba.
