document_id: EZR.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nataon'ny Samaritana hisakanana ny Jiosy tsy hanao ny tempoly sy ny nandraran'ny mpanjakan'i Persia azy tsy hanao intsony
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nony ren''ny fahavalon''ny Joda sy ny Benjamina fa ireo efa nody avy tamin''ny fahababoana dia efa manao tempoly ho an''i Jehovah, Andriamanitry ny Isiraely, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia nanatona an''i Zerobabela sy ny lohan''ny fianakaviana izy ka nanao taminy hoe: Aoka mba hiara-manao aminareo izahay, fa mitady an''Andriamanitrareo tahaka anareo ihany koa izahay, ary ho Azy no namonoanay zavatra hatao fanatitra hatramin''ny andron''i Esara-hadona, mpanjakan''i Asyria, izay efa nampakatra anay ho atỳ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa Zerobabela sy Jesoa mbamin''ny namany lohan''ny fianakaviana tamin''ny Isiraely namaly azy hoe: Tsy misy raharaha hikambananareo aminay amin''ny hanaovana trano ho an''Andriamanitray; fa izahay ihany no hanao trano ho an''i Jehovah, Andriamanitry ny Isiraely, araka izay efa nandidian''itompokolahy Kyrosy, mpanjakan''i Persia, anay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny tompon-tany nanao izay hampiraviravy tanana ny Jiosy sy nandevilevy azy mba tsy hanao ny trano '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: sady nanamby olona hanome hevitra hanohitra azy hahafoana ny heviny hatramin'ny andro nanjakan'i Kyrosy tany Persia ka hatramin'ny nanjakan'i Dariosy, mpanjakan'i Persia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary raha vao nanjaka Ahasoerosy, dia nanoratra ho any aminy ireo hanendrikendrika ny mponina tany Joda sy Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary tamin'ny andron'i Artaksersesy no nanoratan'i Bislama sy Mitredata sy Tabela mbamin'ny namany sisa ho any amin'i Artaksersesy, mpanjakan'i Persia; ary ny soratra tamin'ny taratasy dia nataony tarehin-tsoratra Syriana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Aramiana
    marker-yv: yv-n
  - type: text
    text: ' sady nataony teny Syriana'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Aramiana
    marker-yv: yv-n
  - type: text
    text: ' koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Rehoma mpanolo-tsaina sy Simsay mpanoratra dia nanoratra taratasy ho any amin''i Artaksersesy mpanjaka hanendrikendrika an''i Jerosalema toy izao: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Rehoma mpanolo-tsaina sy Simsay mpanoratra ary ny namany sisa, dia ny Dinaita, ny Afarsatkita, ny Tarpelita, ny Afarsaita, ny Arkevita, ny Babyloniana, ny Sosanita, ny Dehavita sy ny Elamita, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'mbamin''ny firenena sisa izay nentin''i Asnapara lehibe sady malaza ho babo, ka namponeniny tany an-tanàna Samaria sy tany amin''ny tany sasany etỳ an-dafin''ny ony etỳ... '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izao no teny amin''ny taratasy nampitondrainy ho any amin''i Artaksersesy mpanjaka: Ny lehilahy mpanomponao etỳ an-dafin''ny ony etỳ ..... '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Aoka ho fantatry ny mpanjaka fa ny Jiosy, izay niakatra avy tany aminao hankatỳ aminay, dia efa tonga any Jerosalema ka manamboatra ilay tanàna fikomiana sady ratsy, dia mahavita ny mandany izy izao ary manamboatra ny fanorenany koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Koa aoka ho fantatry ny mpanjaka fa raha hatao io tanàna io, ka hatsangana indray ny mandany, dia tsy hety handoa hetra, na haba, na sara, izy; ka dia hahatonga fatiantoka ho an''ny fanjakana izany any aoriana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Koa satria mahazo ny fivelomanay
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mihinana ny sira
    marker-yv: yv-n
  - type: text
    text: ' avy amin''ny lapan''ny mpanjaka izahay, dia tsy mety raha odianay tsy hita ny fatiantoky ny fanjakana, ka dia efa naniraka hampahafantatra ny mpanjaka izany izahay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'mba hizahana ny boky tantaran''ny razanao; dia ho hitanao eo amin''ny boky tantara, ka ho fantatrao fa tanàna fikomiana io tanàna io ka naha-fatiantoka ny mpanjaka sy ny tany maro, sady efa nisy fikomiana niseho tao hatrizay ela izay; koa izany no nandravana io tanàna io. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary mampahafantatra ny mpanjaka izahay fa raha hamboarina io tanàna io, ka vita ny mandany, dia tsy hanana fanjakana amin''ny etỳ an-dafin''ny ony etỳ intsony ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nampitondrain''ny mpanjaka ny valiny ho any amin-dRehoma mpanolo-tsaina sy Simsay mpanoratra mbamin''ny namany sisa izay nonina tany Samaria sy tany amin''ny tanàna sasany an-dafin''ny ony, nanao hoe: Fiadanana ..... '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny taratasy izay nampitondrainareo ho atỳ aminay dia efa voavaky tsara teo anatrehako; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ary izaho nandidy, ka nasaiko nizahana, dia hita fa nanandra-tena nikomy tamin''ny mpanjaka maro hatrizay ela izay tokoa io tanàna io, ka nisy fikomiana sy fihodinana niseho teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary efa nisy mpanjaka mahery izay nanjaka tany Jerosalema nanapaka ny tany rehetra any an-dafin''ny ony ka nandoavana hetra sy haba ary sara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Koa dia manaova didy hampitsahatra ireo olona ireo, mba tsy hamboarina io tanàna io, raha tsy mahazo teny avy atỳ amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary tandremo tsara, fandrao misy tsy vitanareo izany; fa nahoana no havela handroso ny ratsy ka hahatonga fatiantoka ho an''ny fanjakana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary rehefa voavaky teo anatrehan-dRehoma mpanolo-tsaina sy Simsay mpanoratra mbamin'ny namany ny taratasin'i Artaksersesy mpanjaka, dia niakatra faingana ho any Jerosalema ho any amin'ny Jiosy izy ka nampitsahatra azy an-keriny
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. amin-tsandry aman-kery
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dia natsahatra tsy natao ny tranon'Andriamanitra, izay tany Jerosalema; ary mbola nitsahatra ihany izany hatramin'ny taona faharoa nanjakan'i Dariosy, mpanjakan'i Persia.
