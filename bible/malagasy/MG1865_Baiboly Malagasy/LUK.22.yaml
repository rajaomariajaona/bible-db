document_id: LUK.22,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary efa mby akaiky ny andro firavoravoana fihinanana ny mofo tsy misy masirasira, dia ilay andro atao hoe Paska. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Izy taminy: Indro, raha miditra ao an-tanàna ianareo, dia hisy lehilahy mitondra siny feno rano hifanena aminareo; manaraha azy ao amin''ny trano izay hidirany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lazao amin''ny tompon-trano hoe: Izao no lazain''ny Mpampianatra aminao: Aiza ny efi-trano hiarahako mihinana ny Paska amin''ny mpianatro? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izy hanoro anareo efi-trano malalaka ambony rihana, izay efa nasiana fipetrahana; any no amboary. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha izy ka nahita araka izay efa nolazainy taminy; dia namboatra ny Paska izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony tonga ny fotoana, dia nipetraka hihinana Izy mbamin''ny Apostoly. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy taminy: Naniry koa raha naniry Aho hiara-mihinana ity Paska ity aminareo, dieny mbola tsy mijaly Aho. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa lazaiko aminareo fa tsy mba hihinana izany intsony Aho ambara-pahatanterak''izany ao amin''ny fanjakan''Andriamanitra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandray kapoaka Izy, dia nisaotra ka nanao hoe: Raiso ity, ka zarao aminareo; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa lazaiko aminareo fa hatramin''izao dia tsy hisotro ny vokatry ny voaloboka intsony Aho mandra-pahatongan''ny fanjakan''Andriamanitra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandray mofo Izy, ary rehefa nisaotra, dia novakiny ka natolony azy sady nataony hoe : Ity no tenako izay omena ho anareo; izao no ataovinareo ho fahatsiarovana Ahy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny lohan'ny mpisorona sy ny mpanora-dalàna nitady izay hamonoany an'i Jesosy; nefa natahotra ny olona izy.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary araka izany koa ny kapoaka, rehefa vita ny sakafo, dia hoy Izy: Ity kapoaka ity no fanekena vaovao amin''ny rako, izay aidina ho anareo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa, indro, ny tànan''izay mamadika Ahy dia eto amiko eto ambonin''ny latabatra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny Zanak''olona mandeha tokoa, araka izay nanendrena; nefa lozan''izay lehilahy hahazoana manolotra Azy! '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireo nifanontany izay anankiray eo aminy hahefa izany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy koa fifandirana tao aminy ny amin''izay anankiray aminy hatao lehibe. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jesosy taminy: Ny mpanjakan''ny jentilisa mampanompo azy ary izay manapaka azy no atao hoe mpanao soa. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy mba toy izany ianareo; fa izay lehibe aminareo dia aoka ho toy ny zandry; ary izay manapaka dia aoka ho toy ny mpanompo. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa iza moa no lehibe, izay mipetraka mihinana va, sa izay manompo? Tsy izay mipetraka mihinana va? Fa Izaho dia eo aminareo toy izay manompo. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ianareo no naharitra nanaraka Ahy tamin''ny fakam-panahy nihatra tamiko; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa Izaho dia manendry fanjakana ho anareo tahaka ny nanendren''ny Raiko ho Ahy, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Satana niditra tao anatin''i Jodasy, ilay atao hoe Iskariota, anankiray tamin''ny roa ambin''ny folo lahy; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba hihinana sy hisotro eo amin''ny latabatro amin''ny fanjakako ianareo sady hipetraka ambony seza fiandrianana hitsara ny firenen''isiraely roa ambin''ny folo, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny Tompo: Ry Simona, ry Simona, indro, Satana efa nilofo nitady anareo hokororohiny toy ny vary. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa Izaho nangataka ho anao, mba tsy ho levona ny finoanao; ary rehefa mibebaka ianao, dia ampaherezo ireo rahalahinao. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy taminy: Tompoko, vonona hanaraka Anao aho, na ho ao an-tranomaizina, na dia ho amin''ny fahafatesana aza. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Jesosy: Lazaiko aminao, ry Petera: Raha tsy mbola misy akoho maneno anio, dia handà intelo ho tsy mahalala Ahy ianao.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa Izy taminy: Raha nirahiko tsy nitondra kitapom-bola na kitapom-batsy na kapa ianareo, moa nisy zavatra nahory anareo va? Dia hoy ireo: Tsy nisy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Izy taminy: Fa amin''izao kosa, izay manana kitapom-bola dia aoka hitondra azy; ary toy izany koa ny kitapom-batsy; ary izay tsy manan-tsabatra kosa, dia aoka hivarotra ny lambany izy ka hividy. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa lazaiko aminareo: Tsy maintsy ho tanteraka amiko izao voasoratra izao hoe: Ary Izy natao ho isan''ny mpanota (Isa. 53. 12); fa efa ho tanteraka ny amiko. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ireo: Tompoko, indreto sabatra roa. Dia hoy Jesosy taminy: Aoka izay.'
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nivoaka Jesosy, koa araka ny fanaony dia nankao an-tendrombohitra Oliva Izy, ary ny mpianatra koa nanaraka Azy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nankao amin''ny lohan''ny mpisorona sy ny lehiben''ny mpiambina izy ka niresaka taminy ny amin''izay hamadihany an''i Jesosy amin''ireo. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha vao tonga tao amin''izany tany izany, dia hoy Izy taminy: Mivavaha mba tsy hidiranareo amin''ny fakam-panahy. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Izy nihataka taminy tokony ho indray mitora-bato, dia nandohalika ka nivavaka hoe: '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raiko ô, raha sitrakao, dia esory amiko ity kapoaka ity; nefa aoka tsy ny sitrapoko anie no hatao, fa ny Anao. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy anjely avy tany an-danitra niseho teo aminy ka nampahery Azy. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary fadiranovana Izy, ka dia nivavaka mafimafy kokoa; ary ny dininy dia tahaka ny rà nipotrapotraka tamin''ny tany. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nitsangana avy nivavaka Izy, dia nankeo amin''ny mpianatra ka nahita azy matorin''alahelo. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Izy taminy: Nahoana no dia matory ianareo? Mitsangàna, ka mivavaha, mba tsy hidiranareo amin''ny fakam-panahy. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha mbola niteny Jesosy, indreo, tamy ny vahoaka, ary ilay atao hoe Jodasy, isan''ny roa ambin''ny folo lahy, dia nandeha teo alohany ka nanatona an''i Jesosy hanoroka Azy. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Jesosy taminy: Ry Jodasy, fanorohana va no amadihanao ny Zanak''olona? '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay teo aminy, raha nahita izay efa hanjo, dia nanao hoe: Tompoko, hamely amin''ny sabatra va izahay? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia faly ireo ka nanaiky hanome vola azy. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny anankiray teo aminy dia nikapa ny mpanompon''ny mpisoronabe ka nahafaka ny sofiny ankavanana. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Jesosy namaly ka nanao hoe: Aoka ihany na dia izao aza. Dia nanendry ny sofiny Izy ka nahasitrana azy. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jesosy tamin''ny lohan''ny mpisorona sy ny lehiben''ny mpiambina ny tempoly ary ny loholona izay tonga hisambotra Azy: Mivoaka mitondra sabatra sy langilangy toy ny hisambotra jiolahy va ianareo? '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha teo aminareo isan'andro teo an-kianjan'ny tempoly Aho, dia tsy naninji-tanana tamiko ianareo; fa izao no fotoanareo sy herin'ny maizina.
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izy ireo nisambotra an''i Jesosy, dia nitondra Azy ho ao an-tranon''ny mpisoronabe. Ary Petera nanaraka teny lavidavitra eny. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha namelona afo teo an-kianja ireo ka nipetraka, dia mba nipetraka teo aminy koa Petera. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny ankizivavy anankiray, nony nahita azy nipetraka teo anilan''ny afo, dia nandinika azy ka nanao hoe: Ity koa nomba Azy. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izy nandà ka nanao hoe: Ravehivavy, tsy fantatro Izy. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary vetivety foana rehefa afaka izany, dia nisy olona hafa koa nahita azy ka nanao hoe: Hianao koa mba naman''ireny. Fa Petera nanao hoe: Ralehilahy, tsy mba namany aho. '
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa afaka tokony ho ora iray, dia nisy anankiray koa nitompo teny ka nanao hoe: Ilehio nomba Azy marina tokoa, fa Galiliana izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nanaiky izy ka nitady izay andro hahazoany hamadika Azy amin'ireo amin'ny tsy misy olona.
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Petera: Ralehilahy, tsy fantatro izay lazainao. Ary niaraka tamin''izay, raha mbola niteny izy, dia nisy akoho naneno. '
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny Tompo nitodika, dia nijery an''i Petera. Ary Petera nahatsiaro ilay tenin''ny Tompo nolazainy taminy hoe: Raha tsy mbola misy akoho maneno anio, dia handà Ahy intelo ianao. '
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nivoaka Petera, dia nitomany mafy indrindra. '
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny lehilahy izay nitana an''i Jesosy dia nanao Azy ho fihomehezana sady nikapoka Azy. '
  '64':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nanampi-maso Azy izy, dia nanontany Azy hoe: Maminania; iza moa no namely Anao? '
  '65':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary niteny ratsy izy nilaza zavatra maro hafa koa nanaratsiany Azy.
  '66':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha vao nazava ny andro, niangona ny loholona, dia ny lohan''ny mpisorona sy ny mpanora-dalàna, ka nitondra an''i Jesosy ho eo amin''ny Synedriona, dia nanao hoe: '
  '67':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha Hianao no Kristy, dia lazao aminay. Fa hoy Izy taminy: Na dia hilaza aminareo aza Aho, dia tsy hino ianareo. '
  '68':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary na dia hanontany aza Aho, dia tsy hamaly akory ianareo. '
  '69':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hatramin''izao ny Zanak''olona dia hipetraka eo an-tanana ankavanan''ny herin''Andriamanitra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga ny andro fihinanana ny mofo tsy misy masirasira, dia ilay tsy maintsy hamonoana ny Paska. '
  '70':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy rehetra: Zanak''Andriamanitra va ary Hianao? Ary hoy Izy taminy: Voalazanareo fa Izaho no Izy. '
  '71':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ireo: Ka inona indray no ilantsika vavolombelona? fa ny tenantsika no efa nandre tamin''ny vavany.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy naniraka an''i Petera sy Jaona ka nanao hoe: Mandehana, ka amboary ny Paska hohanintsika. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ireo taminy: Aiza no tianao hanamboaranay azy? '
