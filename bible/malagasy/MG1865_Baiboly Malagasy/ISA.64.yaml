document_id: ISA.64,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia tahaka ny fandevon''ny afony tapa-kazo maina sy ny fampangotraky ny afo ny rano mba hampahafantatra ny fahavalonao ny anaranao ka hangovitra eo anoloanao ny jentilisa. '
  '10':
  - type: text
    content: 'Ny tranonay masina sady mendrika, Izay nideran''ny razanay Anao, dia voadotry ny afo, ary rava ny zavatray mahafinaritra rehetra. '
  '11':
  - type: text
    content: Ary mbola mahatsindry fo amin'izany zavatra izany ihany va Hianao, Jehovah ô? Hangina va Hianao ka hampahory anay mafy loatra?
  '2':
  - type: text
    content: Raha nanao zava-mahatahotra izay tsy nantenainay Hianao, dia nidina, ka nihorohoro
  - type: note
    content: 'Na: niempo'
  - type: text
    content: ' teo anoloanao ny tendrombohitra. '
  '3':
  - type: text
    content: 'Fa hatrizay hatrizay dia tsy mbola ren''ny olona, na nohenoiny, Na hitan''ny masony, Izay Andriamanitra miasa ho an''ny miandry Azy afa-tsy Hianao. '
  '4':
  - type: text
    content: Mitsena
  - type: note
    content: 'Na: Miantra'
  - type: text
    content: ' izay mifaly hanao ny marina Hianao, dia izay mahatsiaro Anao amin''ny lalanao; indro, Hianao dia tezitra, ary hita fa meloka'
  - type: note
    content: 'Na: ary efa nanota'
  - type: text
    content: ' izahay; Hatramin''ny ela dia izany no toetray, ka dia hovonjena va? '
  '5':
  - type: text
    content: 'Fa samy efa tahaka ny olo-maloto izahay rehetra, ary tahaka ny lamba mihosin-drà ny fahamarinanay rehetra; Malazo tahaka ny ravina izahay rehetra, ary ny helokay mipaoka anay tahaka ny rivotra, '
  '6':
  - type: text
    content: 'Tsy misy miantso ny anaranao, na mifoha hifikitra aminao; fa efa nanafina ny tavanao taminay Hianao ka nandevona anay noho ny helokay. '
  '7':
  - type: text
    content: 'Fa ankehitriny, Jehovah ô, rainay Hianao; izahay dia tanimanga, ary Hianao no mpanefy anay, ary asan''ny tananao izahay rehetra. '
  '8':
  - type: text
    content: 'Aza dia tezitra mafy loatra, Jehovah ô. Ary aza dia mahatsiaro heloka mandrakizay; masina Hianao, tsinjovy, fa olonao izahay rehetra. '
  '9':
  - type: text
    content: 'Tonga efitra ireo tanànanao masina, Eny, tany lavavolo Ziona, ary efa lao Jerosalema. '
