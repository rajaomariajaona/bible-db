document_id: ISA.64
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia tahaka ny fandevon''ny afony tapa-kazo maina sy ny fampangotraky ny afo ny rano mba hampahafantatra ny fahavalonao ny anaranao ka hangovitra eo anoloanao ny jentilisa. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Raha nanao zava-mahatahotra izay tsy nantenainay Hianao, dia nidina, ka nihorohoro
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: niempo'
    marker-yv: yv-n
  - type: text
    text: ' teo anoloanao ny tendrombohitra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa hatrizay hatrizay dia tsy mbola ren''ny olona, na nohenoiny, Na hitan''ny masony, Izay Andriamanitra miasa ho an''ny miandry Azy afa-tsy Hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mitsena
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Miantra'
    marker-yv: yv-n
  - type: text
    text: ' izay mifaly hanao ny marina Hianao, dia izay mahatsiaro Anao amin''ny lalanao; indro, Hianao dia tezitra, ary hita fa meloka'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ary efa nanota'
    marker-yv: yv-n
  - type: text
    text: ' izahay; Hatramin''ny ela dia izany no toetray, ka dia hovonjena va? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa samy efa tahaka ny olo-maloto izahay rehetra, ary tahaka ny lamba mihosin-drà ny fahamarinanay rehetra; Malazo tahaka ny ravina izahay rehetra, ary ny helokay mipaoka anay tahaka ny rivotra, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy misy miantso ny anaranao, na mifoha hifikitra aminao; fa efa nanafina ny tavanao taminay Hianao ka nandevona anay noho ny helokay. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa ankehitriny, Jehovah ô, rainay Hianao; izahay dia tanimanga, ary Hianao no mpanefy anay, ary asan''ny tananao izahay rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aza dia tezitra mafy loatra, Jehovah ô. Ary aza dia mahatsiaro heloka mandrakizay; masina Hianao, tsinjovy, fa olonao izahay rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tonga efitra ireo tanànanao masina, Eny, tany lavavolo Ziona, ary efa lao Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny tranonay masina sady mendrika, Izay nideran''ny razanay Anao, dia voadotry ny afo, ary rava ny zavatray mahafinaritra rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary mbola mahatsindry fo amin'izany zavatra izany ihany va Hianao, Jehovah ô? Hangina va Hianao ka hampahory anay mafy loatra?
