document_id: PSA.35,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoana an'Andriamanitra hamaly ny ratsy ataon'ny mpanenjika
  - type: text
    content: 'Nataon''i Davida. Jehovah ô, mamalia izay manana ady amiko; miadia amin''izay mamely ahy. '
  '10':
  - type: text
    content: 'Ny taolako rehetra hanao hoe: Jehovah ô, iza no tahaka Anao, Izay manafaka ny ory amin''izay tsy tohany, eny, ny ory sy ny malahelo amin''izay mamabo azy?'
  '11':
  - type: text
    content: 'Mitsangana ny vavolombelona mampidi-doza; ka izay tsy fantatro no anadinany ahy. '
  '12':
  - type: text
    content: 'Mamaly ratsy ahy ho solon''ny soa izy, ka mamoy malala ny fanahiko. '
  '13':
  - type: text
    content: 'Ary ny amiko, raha narary izy ireo, dia lamba fisaonana no nitafiako; nampahory ny tenako tamin''ny ny fifadian-kanina aho; ary ny fivavako nody tao an-tratrako. '
  '14':
  - type: text
    content: 'Toy ny nisy nanjo ny sakaizako na ny rahalahiko no nandehanako; nitanondrika tamin''alahelo toy ny fisaona reny aho. '
  '15':
  - type: text
    content: Nefa nony ho lavo kosa aho, dia faly izy ireo ka niangona;olona faraidina no nitangorona hamely ahy, nefa tsy fantatro
  - type: note
    content: 'Na: Olona faraidina, izay fantatro, no nitangorona hamely ahy'
  - type: text
    content: '; namiravira izy ka tsy mba nitsahatra; '
  '16':
  - type: text
    content: Naman'ny olon-dratsy manendrikendrika ho enti-mila sitraka
  - type: note
    content: Heb. hahazoa-mofo; na;tena mpanendrikendrika indrindra
  - type: text
    content: ' izy ka nihidy vazana tamiko.'
  '17':
  - type: text
    content: 'Ry Tompo ô, mandra-pahoviana no hijerenao ? Avereno ny fanahiko ho afaka amin''ny fandringanany, ny hany malalako ho afaka amin''ny liona tanora. '
  '18':
  - type: text
    content: 'Hisaotra Anao eo amin''ny fiangonana lehibe aho; hidera Anao eo afovoan''ny olona maro aho. '
  '19':
  - type: text
    content: 'Aoka tsy hifalian''izay mandrafy ahy foana aho; ary aoka tsy hami-maso izay mankahala ahy tsy ahoan-tsy ahoana. '
  '2':
  - type: text
    content: 'Raiso ny ampinga kely sy ny ampinga lehibe ka mitsangàna hamonjy ahy. '
  '20':
  - type: text
    content: 'Fa tsy fihavanana no lazainy; fa mamorom-pitaka izy hamelezany izay mibonaika ambonin''ny tany. '
  '21':
  - type: text
    content: 'Dia mitanatana vava amiko izy ka manao hoe: Hià! sakoa izay! efa hita''ny masonay. '
  '22':
  - type: text
    content: 'Efa hitanao, Jehovah ô, ka aza manentsin-tadiny; ry Tompo ô, aza manalavitra ahy. '
  '23':
  - type: text
    content: 'Mahatsiarova, ka mifohaza ho amin''ny fitsaràna ahy, O Andriamanitro sy Tompoko! mifohaza ho amin''ny adiko. '
  '24':
  - type: text
    content: 'Tsarao aho, Jehovah Andriamanitro ô, araka ny fahamarinanao; ary aoka tsy hifalian''ireo aho. '
  '25':
  - type: text
    content: 'Aoka tsy hanao anakampo hoe izy: Hià! faly izahay! aoka tsy hanao hoe izy: efa natelinay izy. '
  '26':
  - type: text
    content: 'Aoka ho menatra sy hangaihay avokoa izay mifaly amin''ny manjo ahy; aoka hitafy henatra sy fahafaham-baraka izay mirehareha amiko. '
  '27':
  - type: text
    content: 'Aoka hihoby sy hifaly izay mankasitraka ny fahamarinako; ary aoka izy hanao mandrakariva hoe: hankalazaina anie Jehovah, Izay mankasitraka ny fiadanan''ny mpanompony. '
  '28':
  - type: text
    content: Ary ny lelako hilaza ny fahamarinanao; ny fiderana Anao no hataoko mandrakariva.
  '3':
  - type: text
    content: 'Ary raiso ny lefona, ka sakano izay manenjika ahy; lazao amin''ny fanahiko hoe: Famonjena anao Aho.'
  '4':
  - type: text
    content: 'Aoka ho menatra sy ho afa-baraka izay mitady ny aiko; aoka hiamboho sy hangaihay izay misaina hanisy ratsy ahy. '
  '5':
  - type: text
    content: 'Aoka ho tahaka ny akofa eo alohan''ny rivotra izy. Ary aoka ny Anjelin''i Jehovah handroaka azy. '
  '6':
  - type: text
    content: 'Aoka ho maizina sy malama ny lalany, ary aoka ny Anjelin''i Jehovah hanenjika azy. '
  '7':
  - type: text
    content: 'Fa tsy ahoan-tsy ahoana no nanaovany fandri-totofana hahazoany ahy; tsy ahoan-tsy ahoana no nandavahany hamandrihany ny aiko. '
  '8':
  - type: text
    content: 'Aoka ny fandringanana ho tonga tampoka aminy; ary aoka hahazo azy ny fandrika harato nafeniny, ka ho latsaka ao amin''izany fandringanana izany indrindra izy. '
  '9':
  - type: text
    content: 'Fa ny fanahiko kosa hifaly amin''i Jehovah sy ho ravoravo amin''ny famonjeny. '
