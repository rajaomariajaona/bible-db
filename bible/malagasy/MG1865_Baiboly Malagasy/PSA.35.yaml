document_id: PSA.35
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiantsoana an'Andriamanitra hamaly ny ratsy ataon'ny mpanenjika
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nataon''i Davida. Jehovah ô, mamalia izay manana ady amiko; miadia amin''izay mamely ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Raiso ny ampinga kely sy ny ampinga lehibe ka mitsangàna hamonjy ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary raiso ny lefona, ka sakano izay manenjika ahy; lazao amin''ny fanahiko hoe: Famonjena anao Aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aoka ho menatra sy ho afa-baraka izay mitady ny aiko; aoka hiamboho sy hangaihay izay misaina hanisy ratsy ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Aoka ho tahaka ny akofa eo alohan''ny rivotra izy. Ary aoka ny Anjelin''i Jehovah handroaka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Aoka ho maizina sy malama ny lalany, ary aoka ny Anjelin''i Jehovah hanenjika azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa tsy ahoan-tsy ahoana no nanaovany fandri-totofana hahazoany ahy; tsy ahoan-tsy ahoana no nandavahany hamandrihany ny aiko. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aoka ny fandringanana ho tonga tampoka aminy; ary aoka hahazo azy ny fandrika harato nafeniny, ka ho latsaka ao amin''izany fandringanana izany indrindra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa ny fanahiko kosa hifaly amin''i Jehovah sy ho ravoravo amin''ny famonjeny. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny taolako rehetra hanao hoe: Jehovah ô, iza no tahaka Anao, Izay manafaka ny ory amin''izay tsy tohany, eny, ny ory sy ny malahelo amin''izay mamabo azy?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mitsangana ny vavolombelona mampidi-doza; ka izay tsy fantatro no anadinany ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mamaly ratsy ahy ho solon''ny soa izy, ka mamoy malala ny fanahiko. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny amiko, raha narary izy ireo, dia lamba fisaonana no nitafiako; nampahory ny tenako tamin''ny ny fifadian-kanina aho; ary ny fivavako nody tao an-tratrako. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Toy ny nisy nanjo ny sakaizako na ny rahalahiko no nandehanako; nitanondrika tamin''alahelo toy ny fisaona reny aho. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nefa nony ho lavo kosa aho, dia faly izy ireo ka niangona;olona faraidina no nitangorona hamely ahy, nefa tsy fantatro
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Olona faraidina, izay fantatro, no nitangorona hamely ahy'
    marker-yv: yv-n
  - type: text
    text: '; namiravira izy ka tsy mba nitsahatra; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Naman'ny olon-dratsy manendrikendrika ho enti-mila sitraka
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hahazoa-mofo; na;tena mpanendrikendrika indrindra
    marker-yv: yv-n
  - type: text
    text: ' izy ka nihidy vazana tamiko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ry Tompo ô, mandra-pahoviana no hijerenao ? Avereno ny fanahiko ho afaka amin''ny fandringanany, ny hany malalako ho afaka amin''ny liona tanora. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hisaotra Anao eo amin''ny fiangonana lehibe aho; hidera Anao eo afovoan''ny olona maro aho. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Aoka tsy hifalian''izay mandrafy ahy foana aho; ary aoka tsy hami-maso izay mankahala ahy tsy ahoan-tsy ahoana. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa tsy fihavanana no lazainy; fa mamorom-pitaka izy hamelezany izay mibonaika ambonin''ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia mitanatana vava amiko izy ka manao hoe: Hià! sakoa izay! efa hita''ny masonay. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Efa hitanao, Jehovah ô, ka aza manentsin-tadiny; ry Tompo ô, aza manalavitra ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mahatsiarova, ka mifohaza ho amin''ny fitsaràna ahy, O Andriamanitro sy Tompoko! mifohaza ho amin''ny adiko. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tsarao aho, Jehovah Andriamanitro ô, araka ny fahamarinanao; ary aoka tsy hifalian''ireo aho. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Aoka tsy hanao anakampo hoe izy: Hià! faly izahay! aoka tsy hanao hoe izy: efa natelinay izy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Aoka ho menatra sy hangaihay avokoa izay mifaly amin''ny manjo ahy; aoka hitafy henatra sy fahafaham-baraka izay mirehareha amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Aoka hihoby sy hifaly izay mankasitraka ny fahamarinako; ary aoka izy hanao mandrakariva hoe: hankalazaina anie Jehovah, Izay mankasitraka ny fiadanan''ny mpanompony. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary ny lelako hilaza ny fahamarinanao; ny fiderana Anao no hataoko mandrakariva.
