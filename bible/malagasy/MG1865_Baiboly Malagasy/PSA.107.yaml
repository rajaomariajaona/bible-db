document_id: PSA.107,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiantsoana ny olona efa nahita soa tamin'Andriamanitra mba hisaotra Azy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Miderà an''i Jehovah, fa tsara Fa mandrakizay ny famindram-pony. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Izay nipetraka tao amin''ny maizina sy ny aloky ny fahafatesana, Voafato-pahoriana sy vy, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Satria nandà ny tenin''Andriamanitra Sady naniratsira ny anatry ny Avo Indrindra; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Dia nampietreny tamin'ny fahoriana ny fony; Ka potraka
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. tafintohina
      marker-yv: yv-n
    - type: text
      text: ' izy, nefa tsy nisy hamonjy; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia nitaraina tamin''i Jehovah ireo, raha ory, Ka novonjeny tamin''ny fahatereny. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nitondra azy nivoaka avy tao amin''ny maizina sy ny aloky ny fahafatesana Izy, Ary notosany ny fatorany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Aoka hidera an''i Jehovah ireo noho ny famindram-pony Sy ny fahagagana ataony amin''ny zanak''olombelona! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Fa nanorotoro ny varavarana varahina Izy, Ary ny hidy vy nohenteriny.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Mitondra fahoriana ny adala noho ny fahadisoany sy ny helony: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Nahamonamonaina azy ny hanina rehetra; Ary nanakaiky ny vavahadin''ny fahafatesana izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia nitaraina tamin''i Jehovah ireo, raha ory, Ka novonjeny tamin''ny fahatereny. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Aoka hanao izany ny navotan'i Jehovah, Dia izay navotany ho afa-ka tamin'ny tanan'ny fahavalo
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fahoriana'
      marker-yv: yv-n
    - type: text
      text: ', '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Nandefa ny teniny Izy mba hahasitrana azy Ary nanafaka azy tamin''ny longoa nianjerany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Aoka hidera an''i Jehovah ireo noho ny famindram-pony Sy ny fahagagana ataony amin''ny zanak''olombelona! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary aoka hanatitra fanati-pisaorana izy Sy hilaza ny asany amin'ny fihobiana.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Izay midina any an-dranomasina ka mandeha an-tsambo Sy manao raharaha any amin''ny rano lehibe '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'No mahita ny asan''i Jehovah Sy ny fahagagana ataony amin''ny rano lalina. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fa niteny Izy ka nanangana rivotra mahery, Izay nampisondrotra ny onjan-drano; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Niakatra hatramin''ny lanitra ny olona, ary nidina hatramin''ny lalina; Ny fanahiny levona noho ny fahoriana. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Nisangodingodina ireo sady nivembena toy ny mamo, Ka dia very ny sainy rehetra. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dia nitaraina tamin''i Jehovah ireo, raha ory, Ka nampiala azy tamin''ny fahatereny Izy. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Nanony ny rivotra mahery Izy, Ka nitsahatra ny onjan-drano. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Sy nangoniny avy tany amin''ny tany maro, Dia avy tany atsinanana sy andrefana ary tany avaratra sy tany amin''ny ranomasina. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Dia faly ireo, satria nitsahatra izany; Ary nentiny ho amin''ny fitodiana niriny izy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Aoka hidera an''i Jehovah ireo noho ny famindram-pony Sy ny fahagagana ataony amin''ny zanak''olombelona! '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Ary aoka hanandratra Azy eo amin'ny fiangonan'ny olona izy Ka hidera Azy eo amin'ny fipetrahan'ny loholona.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Mampody ny ony ho efitra Izy Ary ny loharano ho tany mangentana, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ny tany mahavokatra ho tanin-tsira, Noho ny faharatsian''ny mponina eo. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Mampody ny efitra ho rano monina Izy Sy ny tany maina ho loharano, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ary amponeniny eo izay noana, Mba hanamboatra tanana honenana; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary hamafy eny an-tsaha izy Sady hanao tanim-boaloboka Ka hahazo vokatra be. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Dia mitahy azy Izy mba hitomboany betsaka, Ka tsy avelany hihavitsy ny biby fiompiny. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Fa mihakely sy mietry indray izy Noho ny fampahoriana sy ny loza ary ny alahelo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nirenireny tany an-efitra ireny ka nanavatsava tany an-tany foana, Ary tsy nahita tanàna honenana. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Mampidina fanamavoana amin''ny mpanapaka Jehovah Ka mampirenireny azy any an-efitra tsy misy lalana; '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Fa manandratra ny malahelo ho afa-pahoriana kosa Izy,Ka mahamaro mianakavy azy toy ny ondry andiany. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Hahita izany ny marina ka ho faly; Fa hihombom-bava kosa ny ratsy fanahy rehetra.
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Izay hendry dia aoka hahafantatra izany Ka hahalala ny famindram-pon'i Jehovah.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Noana sy nangetaheta izy, Sady reraka ny ainy tao anatiny, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia nitaraina tamin''i Jehovah ireo, raha ory, Ka novonjeny tamin''ny fahatereny; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia nitondra azy tamin''ny lalana mahitsy Izy, Mba hankanesany any amin''izay tanàna honenana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Aoka hidera an''i Jehovah ireo noho ny famindram-pony Sy ny fahagagana ataony amin''ny zanak''olombelona! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa mahafa-po ny fanahy mangetaheta Izy, Ary ny fanahy noana dia vokisany soa.
