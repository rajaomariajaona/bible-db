document_id: PSA.107,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoana ny olona efa nahita soa tamin'Andriamanitra mba hisaotra Azy
  - type: text
    content: 'Miderà an''i Jehovah, fa tsara Fa mandrakizay ny famindram-pony. '
  '10':
  - type: text
    content: 'Izay nipetraka tao amin''ny maizina sy ny aloky ny fahafatesana, Voafato-pahoriana sy vy, '
  '11':
  - type: text
    content: 'Satria nandà ny tenin''Andriamanitra Sady naniratsira ny anatry ny Avo Indrindra; '
  '12':
  - type: text
    content: Dia nampietreny tamin'ny fahoriana ny fony; Ka potraka
  - type: note
    content: Heb. tafintohina
  - type: text
    content: ' izy, nefa tsy nisy hamonjy; '
  '13':
  - type: text
    content: 'Dia nitaraina tamin''i Jehovah ireo, raha ory, Ka novonjeny tamin''ny fahatereny. '
  '14':
  - type: text
    content: 'Nitondra azy nivoaka avy tao amin''ny maizina sy ny aloky ny fahafatesana Izy, Ary notosany ny fatorany. '
  '15':
  - type: text
    content: 'Aoka hidera an''i Jehovah ireo noho ny famindram-pony Sy ny fahagagana ataony amin''ny zanak''olombelona! '
  '16':
  - type: text
    content: Fa nanorotoro ny varavarana varahina Izy, Ary ny hidy vy nohenteriny.
  '17':
  - type: text
    content: 'Mitondra fahoriana ny adala noho ny fahadisoany sy ny helony: '
  '18':
  - type: text
    content: 'Nahamonamonaina azy ny hanina rehetra; Ary nanakaiky ny vavahadin''ny fahafatesana izy. '
  '19':
  - type: text
    content: 'Dia nitaraina tamin''i Jehovah ireo, raha ory, Ka novonjeny tamin''ny fahatereny. '
  '2':
  - type: text
    content: Aoka hanao izany ny navotan'i Jehovah, Dia izay navotany ho afa-ka tamin'ny tanan'ny fahavalo
  - type: note
    content: 'Na: fahoriana'
  - type: text
    content: ', '
  '20':
  - type: text
    content: 'Nandefa ny teniny Izy mba hahasitrana azy Ary nanafaka azy tamin''ny longoa nianjerany. '
  '21':
  - type: text
    content: 'Aoka hidera an''i Jehovah ireo noho ny famindram-pony Sy ny fahagagana ataony amin''ny zanak''olombelona! '
  '22':
  - type: text
    content: Ary aoka hanatitra fanati-pisaorana izy Sy hilaza ny asany amin'ny fihobiana.
  '23':
  - type: text
    content: 'Izay midina any an-dranomasina ka mandeha an-tsambo Sy manao raharaha any amin''ny rano lehibe '
  '24':
  - type: text
    content: 'No mahita ny asan''i Jehovah Sy ny fahagagana ataony amin''ny rano lalina. '
  '25':
  - type: text
    content: 'Fa niteny Izy ka nanangana rivotra mahery, Izay nampisondrotra ny onjan-drano; '
  '26':
  - type: text
    content: 'Niakatra hatramin''ny lanitra ny olona, ary nidina hatramin''ny lalina; Ny fanahiny levona noho ny fahoriana. '
  '27':
  - type: text
    content: 'Nisangodingodina ireo sady nivembena toy ny mamo, Ka dia very ny sainy rehetra. '
  '28':
  - type: text
    content: 'Dia nitaraina tamin''i Jehovah ireo, raha ory, Ka nampiala azy tamin''ny fahatereny Izy. '
  '29':
  - type: text
    content: 'Nanony ny rivotra mahery Izy, Ka nitsahatra ny onjan-drano. '
  '3':
  - type: text
    content: 'Sy nangoniny avy tany amin''ny tany maro, Dia avy tany atsinanana sy andrefana ary tany avaratra sy tany amin''ny ranomasina. '
  '30':
  - type: text
    content: 'Dia faly ireo, satria nitsahatra izany; Ary nentiny ho amin''ny fitodiana niriny izy. '
  '31':
  - type: text
    content: 'Aoka hidera an''i Jehovah ireo noho ny famindram-pony Sy ny fahagagana ataony amin''ny zanak''olombelona! '
  '32':
  - type: text
    content: Ary aoka hanandratra Azy eo amin'ny fiangonan'ny olona izy Ka hidera Azy eo amin'ny fipetrahan'ny loholona.
  '33':
  - type: text
    content: 'Mampody ny ony ho efitra Izy Ary ny loharano ho tany mangentana, '
  '34':
  - type: text
    content: 'Ny tany mahavokatra ho tanin-tsira, Noho ny faharatsian''ny mponina eo. '
  '35':
  - type: text
    content: 'Mampody ny efitra ho rano monina Izy Sy ny tany maina ho loharano, '
  '36':
  - type: text
    content: 'Ary amponeniny eo izay noana, Mba hanamboatra tanana honenana; '
  '37':
  - type: text
    content: 'Ary hamafy eny an-tsaha izy Sady hanao tanim-boaloboka Ka hahazo vokatra be. '
  '38':
  - type: text
    content: 'Dia mitahy azy Izy mba hitomboany betsaka, Ka tsy avelany hihavitsy ny biby fiompiny. '
  '39':
  - type: text
    content: 'Fa mihakely sy mietry indray izy Noho ny fampahoriana sy ny loza ary ny alahelo. '
  '4':
  - type: text
    content: 'Nirenireny tany an-efitra ireny ka nanavatsava tany an-tany foana, Ary tsy nahita tanàna honenana. '
  '40':
  - type: text
    content: 'Mampidina fanamavoana amin''ny mpanapaka Jehovah Ka mampirenireny azy any an-efitra tsy misy lalana; '
  '41':
  - type: text
    content: 'Fa manandratra ny malahelo ho afa-pahoriana kosa Izy,Ka mahamaro mianakavy azy toy ny ondry andiany. '
  '42':
  - type: text
    content: Hahita izany ny marina ka ho faly; Fa hihombom-bava kosa ny ratsy fanahy rehetra.
  '43':
  - type: text
    content: Izay hendry dia aoka hahafantatra izany Ka hahalala ny famindram-pon'i Jehovah.
  '5':
  - type: text
    content: 'Noana sy nangetaheta izy, Sady reraka ny ainy tao anatiny, '
  '6':
  - type: text
    content: 'Dia nitaraina tamin''i Jehovah ireo, raha ory, Ka novonjeny tamin''ny fahatereny; '
  '7':
  - type: text
    content: 'Dia nitondra azy tamin''ny lalana mahitsy Izy, Mba hankanesany any amin''izay tanàna honenana. '
  '8':
  - type: text
    content: 'Aoka hidera an''i Jehovah ireo noho ny famindram-pony Sy ny fahagagana ataony amin''ny zanak''olombelona! '
  '9':
  - type: text
    content: Fa mahafa-po ny fanahy mangetaheta Izy, Ary ny fanahy noana dia vokisany soa.
