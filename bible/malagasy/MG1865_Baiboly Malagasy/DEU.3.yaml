document_id: DEU.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny tsy hidiran'i Mosesy ao Kanana, sy ny nanendrena an'i Josoa handimby azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia niverina isika ka niakatra tamin''ny lalana mankany Basana; ary nivoaka hiady amintsika tao Edrehy Oga, mpanjakan''i Basana, mbamin''ny vahoakany rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy Jehovah tamiko: Aza matahotra azy ianao; fa efa natolotro eo an-tananao izy mbamin''ny vahoakany rehetra sy ny taniny, ary ianao hanao aminy araka izay nataonao tamin''i Sihona, mpanjakan''ny Amorita, izay nonina tao Hesbona. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia natolotr''i Jehovah Andriamanitsika teo an-tanantsika koa Oga, mpanjakan''i Basana, sy ny vahoakany rehetra; dia nandresy azy isika mandra-paha-tsi-hisy niangana na dia iray akory aza. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia afatsika ny tanànany rehetra tamin''izany andro izany, tsy nisy tanàna izay tsy nalaintsika taminy, dia tanàna enim-polo, dia ny tany Argoba rehetra, izay fanjakan''i Oga tany Basana. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ireo tanàna rehetra ireo dia samy nasiana manda avo sy vavahady ary hidy hahamafy azy, afa-tsy ny vohitra madinika maro dia maro. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia naringantsika ireny tahaka izay efa nataontsika tamin''i Sihona, mpanjakan''i Hesbona; naringana ny mponina rehetra tamin''ny isan-tanàna mbamin''ny zaza amim-behivavy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa ny biby fiompy rehetra sy ny fananana tamin''ireo tanàna ireo dia nataontsika babo ho antsika. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nalaintsika tamin''izany andro izany tamin''ny mpanjaka roan''ny Amorita ny tany izay any an-dafin''i Jordana, hatramin''ny lohasahan-driaka Arnona ka hatramin''ny tendrombohitra Hermona '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hermona nataon''ny Sidoniana hoe Siriona; ary ny Amorita kosa nanao azy hoe Senira, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'dia ny tanàna rehetra amin''ny tany lemaka sy Gileada rehetra ary Basana rehetra hatrany Saleka sy Edrehy, dia ny tanàna amin''ny fanjakan''i Oga tany Basana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa Oga, mpanjakan''i Basana, ihany no sisa velona tamin''ny Refalta; indro, farafara vy ny farafarany (tsy ao Raban''ny taranak''i Amona va Izany?), sivy hakiho ny halavany, ary efatra hakiho ny sakany, araka ny hakihon''ny lehilahy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary io tany io dia azontsika tamin''izany andro izany; hatrany Aroera, izay eo amoron''ny lohasahan-driaka Arnona, sy ny antsasaky ny tany havoan''i Gileada ary ny tanàna eo dia nomeko ny Robenita sy ny Gadita. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ry Gileada sisa sy Basana rehetra, izay fanjakan''i Oga, dia nomeko ny antsasaky ny firenen''i Manase, dia ny tany Argoba rehetra, dia Basana rehetra (atao hoe tanin''ny Refaita izany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jaïra, zanak''i Manase, no nahafaka ny tany Argoba rehetra, hatramin''ny fari-tanin''ny Gesorita sy ny Makatita; ary ny anaran''izany (dia Basana) nataony hoe Havota-jaira, araka ny anaran-tenany ihany, mandraka androany). '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary Gileada dia nomeko an''i Makira. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ny Robenita sy ny Gadita dia nomeko ny hatrany Gileada ka hatramin''ny lohasahan-driaka Arnona, dia ny antsasaky ny lohasaha, sy ny fari-tany hatramin''ny amoron''ny lohasahan-driaka Jaboka, izay fari-tanin''ny taranak''i Amona, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ary ny tani-hay koa sy Jordana ary ny fari-tany hatrany Kireneta ka hatramin''ny ranomasina amin''ny tani-hay, dia ny Ranomasin-tsira, eo am-bodin''i Pisga, dia ao atsinanany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nandidy anareo tamin''izany andro izany aho ka nanao hoe: Jehovah Andriamanitrareo efa nanome anareo ity tany ity ho lovanareo; andeha mita eo alohan''ny Zanak''Isiraely rahalahinareo ianareo rehetra izay mahery, samy efa voaomana hiady. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa ny vadinareo sy ny zanakareo madinika ary ny ombinareo (fantatro fa be omby ianareo) dia hitoetra ao an-tanànanareo izay nomeko anareo, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: mandra-panomen'i Jehovah fitsaharana ny rahalahinareo tahaka ny anareo, ka holovany koa ny tany izay nomen'i Jehovah Andriamanitrareo azy any an-dafin'i Jordana; dia hiverina ianareo, samy ho any amin'ny taniny avy, izay nomeko anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia nandidy an''i Josoa aho tamin''izany andro izany ka nanao hoe: Ny masonao efa nahita izay rehetra nataon''i Jehovah Andriamanitrareo tamin''ireo mpanjaka roa lahy ireo; dia toy izany no hataon''i Jehovah amin''ny fanjakana rehetra izay halehanao. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Aza matahotra azy ianareo; fa Jehovah Andriamanitrareo no hiady ho anareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia nitaraina tamin''i Jehovah tamin''izany andro izany aho ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Jehovah Tompo ô, Hianao vao naneho tamin''ny mpanomponao ny fahalehibiazanao sy ny tananao mahery; fa aiza no misy andriamanitra, na any an-danitra na atỳ an-tany, izay mahay manao araka ny asanao sy ny herinao? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Aoka mba handeha hita aho ka hahita ny tany soa izay any an-dafin''i Jordana, dia ilay be tendrombohitra tsara sy Libanona. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa tezitra tamiko Jehovah noho ny aminareo ka tsy nihaino ahy; dia hoy Jehovah tamiko: Aoka izay, fa aza miteny amiko intsony ny amin''izany zavatra izany ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Miakara eo an-tampon''i Pisga ianao, ary atopazy ny masonao miankandrefana sy mianavaratra ary mianatsimo sy miantsinanana, ary aoka hijery ny masonao; fa tsy hita izany Jordana izany ianao; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'fa mandidia an''i Josoa ianao, dia mampahereza azy sy mampahatanjaha azy; fa izy no handeha hita eo alohan''ity firenena ity, ary izy no hampandova azy ny tany izay ho hitanao. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ka dia nitoetra tany an-dohasaha tandrifin'i Beti-peora isika.
