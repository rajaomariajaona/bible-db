document_id: LEV.17,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'ny hamonoana ny biby hatao fanatitra, sy ny amin'ny mifady rà
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary na iza na iza amin''ny taranak''Isiraely, na amin''ny vahiny eo aminareo, no mihinan-drà, ny Tavako dia hanandrina ny olona izay mihinan-drà, ka hofongorana tsy ho amin''ny fireneny izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa ny ain''ny nofo dia amin''ny rà; ary nomeko anareo izany hatao ambonin''ny alitara hanao fanavotana ho an''ny ainareo, fa ny rà no manao fanavotana, satria aina izany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Koa izany no nilazako tamin''ny Zanak''Isiraely hoe: Aza misy mihinan-drà, na ianareo, na ny vahiny eo aminareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Na iza na iza amin''ny Zanak''Isiraely, na amin''ny vahiny eo aminy, no mihaza ka mahazo biby na vorona izay fihinana, dia haidiny amin''ny tany ny ràny ka hototofany; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'fa ny amin''ny amin''ny nofo rehetra, dia ny ràny no ainy; koa izany no nilazako tamin''ny Zanak''Isiraely hoe: Aza mihinana ny ran''ny nofo; fa ny ràny no ain''ny nofo rehetra, ka izay rehetra mihinana azy dia haringana. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary ny olona rehetra, na tompon-tany, na vahiny, izay mihinana izay maty ho azy, na izay noviraviraim-biby, dia hanasa fitafiana sy handro amin'ny rano, ary haloto mandra-paharivan'ny andro izy, vao hadio.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Fa raha tsy manasa fitafiana sy mandro izy, dia ho meloka.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mitenena amin''i Arona sy ny zanany ary ny Zanak''Isiraely rehetra hoe: Izao no nandidian''i Jehovah: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Na iza na iza amin''ny taranak''Isiraely no mamono omby, na zanak''ondry, na osy, na eo an-toby, na any ivelan''ny toby, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'ka tsy mitondra azy ho eo anoloan''ny varavaran''ny trano-lay fihaonana, hanaterana azy ho fanatitra ho an''i Jehovah eo anoloan''ny tabernakelin''i Jehovah, dia ho meloka noho ny rà nalatsany izany olona izany, ka hofongorana tsy ho amin''ny fireneny izy, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'mba ho entin''ny Zanak''isiraely ho an''i Jehovah eo anoloan''ny varavaran''ny trano-lay fihaonana, ho amin''ny mpisorona, ny zavatra vonoiny ho fanatitra, izay famonony tany an-tsaha; ary dia hateriny ho fanati-pihavanana ho an''i Jehovah izany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary ny mpisorona hanopy ny rà amin''ny alitaran''i Jehovah eo anoloan''ny varavaran''ny trano-lay fihaonana ka handoro ny saborany ho fofona ho hanitra ankasitrahana ho an''i Jehovah. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary tsy hateriny intsony ny fanatiny ho an''ny Seïrima izay nijangajangany. Ho lalàna mandrakizay hatramin''ny taranany fara mandimby izany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary lazao aminy hoe: Na iza na iza amin''ny taranak''Isiraely, na amin''ny vahiny eo aminareo, no manatitra fanatitra dorana, na fanatitra hafa alatsa-drà, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'ka tsy mitondra azy ho eo anoloan''ny varavaran''ny trano-lay fihaonana hanatitra azy ho an''i Jehovah, dia hofongorana tsy ho amin''ny fireneny. '
