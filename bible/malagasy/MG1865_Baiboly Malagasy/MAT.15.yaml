document_id: MAT.15,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Dia nankeo amin''i Jesosy ny Fariseo sy ny mpanora-dalàna sasany avy tany Jerosalema ka nanao hoe: '
  '10':
  - type: text
    content: 'Ary niantso ny vahoaka hankeo aminy Izy ka nanao taminy hoe: Mihainoa ka mahafantara: '
  '11':
  - type: text
    content: 'tsy izay miditra amin''ny vava no mahaloto ny olona; fa izay mivoaka avy amin''ny vava, izany no mahaloto ny olona. '
  '12':
  - type: text
    content: 'Dia nankeo aminy ny mpianatra ka nanao taminy hoe: Fantatrao va fa tafintohina ny Fariseo, raha nandre izany teny izany? '
  '13':
  - type: text
    content: 'Ary Izy namaly ka nanao hoe: Ny zavatra rehetra izay tsy nambolen''ny Raiko Izay any an-danitra dia hongotana. '
  '14':
  - type: text
    content: 'Avelao izy; mpitarika jamba izy; ary raha ny jamba no mitarika ny jamba, dia samy ho latsaka any an-kady izy roa. '
  '15':
  - type: text
    content: 'Ary Petera namaly ka nanao taminy hoe: Lazao aminay ny hevitr''izany fanoharana izany. '
  '16':
  - type: text
    content: 'Ary hoy Jesosy: Hianareo koa va mbola tsy mahafantatra ihany? '
  '17':
  - type: text
    content: 'Tsy fantatrareo va fa izay rehetra miditra amin''ny vava dia mankao an-kibo ka avoaka ao amin''ny fivoahana? '
  '18':
  - type: text
    content: 'Fa izay mivoaka avy amin''ny vava kosa dia avy amin''ny fo, ka izany no mahaloto ny olona. '
  '19':
  - type: text
    content: Fa avy amin'ny fo no ivoahan'ny sain-dratsy, dia ny vonoan'olona, ny fakam-badin'olona, ny fijangajangana, ny halatra, ny ampanga lainga, ny fitenenan-dratsy
  - type: note
    content: Gr. blasfemia, izahao 9. 3
  - type: text
    content: '; '
  '2':
  - type: text
    content: 'Nahoana ny mpianatrao no mandika ny fampianarana voatolotry ny razana? Fa tsy mba manasa tanana izy, raha hihinan-kanina. '
  '20':
  - type: text
    content: izany no mahaloto ny olona; fa ny mihinana amin'ny tanana tsy misasa tsy mba mahaloto ny olona.
  '21':
  - type: text
    content: 'Dia niala teo Jesosy ka nankany amin''ny fari-tanin''i Tyro sy Sidona. '
  '22':
  - type: text
    content: 'Ary, indro, nisy vehivavy Kananita anankiray nivoaka avy tamin''izany tany izany ka niantso nanao hoe: Mamindrà fo amiko, Tompoko, Zanak''i Davida ô! ny zanako-vavy ampahorin''ny demonia loatra. '
  '23':
  - type: text
    content: 'Fa Izy tsy namaly teny azy. dia nanatona ny mpianany ka nangataka taminy nanao hoe: Roahy izy, fa miantso mafy ato aoriantsika. '
  '24':
  - type: text
    content: 'Ary Izy namaly ka nanao hoe: Tsy nirahina Aho afa-tsy ho amin''ny ondry very amin''ny taranak''isiraely. '
  '25':
  - type: text
    content: 'Fa nanatona ihany ravehivavy, dia niankohoka teo anatrehany ka nanao hoe: Tompoko ô, vonjeo aho. '
  '26':
  - type: text
    content: 'Fa Izy namaly ka nanao hoe: Tsy mety raha maka ny mofon-jaza ka manipy azy ho an''ny amboakely. '
  '27':
  - type: text
    content: 'Fa hoy ravehivavy: Marina izany, Tompoko; fa na dia ny amboakely aza mba mihinana izay sombintsombiny latsaka avy amin''ny latabatry ny tompony ihany. '
  '28':
  - type: text
    content: 'Dia namaly Jesosy ka nanao taminy hoe: Ravehivavy, lehibe ny finoanao; tongava aminao araka izay irinao. Dia sitrana ny zananivavy tamin''izay ora izay. '
  '29':
  - type: text
    content: 'Ary raha niala teo Jesosy, dia nankany amoron''ny Ranomasin''i Galilia Izy; ary niakatra nankeo an-tendrombohitra Izy ka nipetraka teo; '
  '3':
  - type: text
    content: 'Ary Izy namaly ka nanao taminy hoe: Nahoana kosa ianareo no mandika ny didin''Andriamanitra noho ny fampianarana voatolotra anareo? '
  '30':
  - type: text
    content: 'ary nisy vahoaka betsaka nankeo aminy nitondra ny mandringa, ny jamba, ny moana, ny kilemaina, ary ny maro hafa koa, ka nametraka azy teo akaikin''ny tongotr''i Jesosy; dia nahasitrana azy Izy; '
  '31':
  - type: text
    content: 'ka dia talanjona ny vahoaka, raha nahita ny moana miteny, ny kilemaina sitrana, ny mandringa afaka, ary ny jamba mahiratra; dia nankalaza an''Andriamanitry ny Isiraely izy. '
  '32':
  - type: text
    content: 'Ary Jesosy niantso ny mpianany hankeo aminy ka nanao hoe: Mahonena Ahy ny vahoaka, fa efa nitoetra hateloana tatỳ amiko izy izao ka tsy manan-kohanina; ary tsy tiako ny hampody azy tsy mihinana, fandrao reraka eny an-dalana izy. '
  '33':
  - type: text
    content: 'Fa hoy ny mpianatra taminy: Aiza no hahitanay mofo atỳ an-efitra ampy hahavoky izao vahoaka betsaka izao! '
  '34':
  - type: text
    content: 'Ary hoy Jesosy taminy: Misy mofo firy any aminareo? Ary hoy izy: Fito sy hazandrano madinika vitsy foana. '
  '35':
  - type: text
    content: 'Ary Izy nandidy ny vahoaka betsaka hipetraka amin''ny tany. '
  '36':
  - type: text
    content: 'Dia nandray ny mofo fito mbamin''ny hazandrano Izy, ary rehefa nisaotra, dia namaky ka nanolotra azy ho an''ny mpianatra, ary ny mpianatra kosa nanolotra ho an''ny vahoaka. '
  '37':
  - type: text
    content: 'Ary nihinana avokoa izy rehetra, ka dia voky; ary nangoniny ny sombintsombiny sisa tsy lany, ka dia nahafeno sobiky fito. '
  '38':
  - type: text
    content: 'Ary izay nihinana dia efatra arivo lahy, afa-tsy ny zaza amim-behivavy. '
  '39':
  - type: text
    content: Ary nony efa nampody ny vahoaka Izy, dia niondrana an-tsambokely ka nankany amin'ny sisin-tanin'i Magadana.
  '4':
  - type: text
    content: 'Fa Andriamanitra efa nanao hoe: Manajà ny rainao sy ny reninao (Eks. 20. 12), ary koa: Izay miteny ratsy ny rainy na ny reniny dia hatao maty tokoa (Eks. 21. 17). '
  '5':
  - type: text
    content: 'Fa hoy kosa ianareo: Na zovy na zovy no hilaza amin''ny rainy na ny reniny hoe: Efa fanatitra ho an''Andriamanitra izay rehetra tokony hahazoanao soa avy amiko, dia tsy mba hanaja ny rainy akory izy. '
  '6':
  - type: text
    content: 'Koa dia foananareo ny tenin''Andriamanitra noho ny fampianarana voatolotra anareo. '
  '7':
  - type: text
    content: 'Ry mpihatsaravelatsihy, marina ny naminanian''Isaia anareo hoe: '
  '8':
  - type: text
    content: 'Ity firenena ity manaja Ahy amin''ny molony; Fa ny fony kosa lavitra Ahy. '
  '9':
  - type: text
    content: 'Koa foana ny ivavahan''ireo amiko, raha mampianatra ny didin''olombelona ho fampianarana izy (Isa. 29. 13). '
