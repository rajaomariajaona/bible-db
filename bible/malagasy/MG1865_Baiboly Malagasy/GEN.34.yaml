document_id: GEN.34
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nakan'i Sekema an'i Dina sy ny namalian'i Simeona sy Levy izany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nivoaka Dina, zanakavavin''i Lea, izay naterany tamin''i Jakoba, mba hizaha ny zazavavy tompon-tany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nahita azy Sekema, zanakalahin''i Hamora Hivita, andriana tamin''izany tany izany; dia naka azy izy ary nandry taminy ka nampietry azy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ny fony dia raiki-pitia tamin''i Dina, zanakavavin''i Jakoba; eny, tia ny zazavavy izy, ka dia nanao teny malefaka nahafinaritra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Sekema dia niteny tamin''i Hamora rainy ka nanao hoe: Alao io zazavavy io ho vadiko. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ren''i Jakoba fa efa nandoto an''i Dina zananivavy izy; nefa ny zananilahy mbola niandry ny omby aman''ondriny tany an-tsaha; ka dia nangina aloha Jakoba mandra-pahatongany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nivoaka Hamora, rain''i Sekema, nankany amin''i Jakoba hidinika taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny zanak''i Jakoba dia tonga avy tany an-tsaha, rehefa nandre izy, ka nalahelo sady tezitra indrindra, satria Sekema efa nanao izay fady indrindra teo amin''ny Isiraely noho ny nandriany tamin''ny zanakavavin''i Jakoba; fa zavatra izay tsy tokony hatao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary Hamora nidinika taminy ka nanao hoe: Ny fon''i Sekema zanakolahy efa raiki-pitia amin''ny zanakareo-vavy; koa masìna ianareo, mba omeo azy ho vadiny. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary aoka hifanambady anaka isika: omeo anay ny zanakareo vavy, ary alao ho anareo kosa ny zanakai-vavy, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hiara-monina aminay ianareo; ary indro ny tany eo anoloanareo; oneno, dia manaova varotra ao, ary aoka ho isan''ny tompon-tany ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy Sekema tamin''ny rain''i Dina sy ny anadahiny: Aoka mba hahita fitia eto imasonareo aho, ary izay lazainareo amiko dia homeko; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'na dia harena be sy zavatra betsaka aza no asainareo homeko, dia homeko ihany araka izay holazainareo amiko; fa omeo ahy ny zazavavy ho vadiko. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny zanak''i Jakoba namaly an''i Sekema sy Hamora rainy tamin''ny fitaka ka nisaroro azy noho ny nandotoany an''i Dina anabaviny; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary hoy izy taminy: Tsy azonay atao ny hanome ny anabavinay ho an''izay lehilahy tsy voafora; fa fahavetavetana aminay izany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izao ihany no azonay hanekena anareo: Raha ho tahaka anay ianareo, ka hoforana ny lehilahy rehetra aminareo, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'dia homenay anareo ny zanakai-vavy, ary ny zanakareo-vavy kosa halainay ho anay, dia hiara-monina aminareo izahay, ka ho firenena iray isika. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa raha tsy hanaraka ny teninay ianareo ka hoforana dia halainay ny zanakai-vavy, ka handeha izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia sitrak''i Hamorasy Sekema zanany izany teniny izany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary tsy nitaredretra ilay zatovo hanao izany zavatra izany, satria efa tia ny zanakavavin''i Jakoba izy. Ary izy no nalaza indrindra tamin''izay rehetra tao an-tranon''ny rainy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Hamora sy Sekema zananilahy nankeo amin''ny vavahadin''ny tanànany, dia niteny tamin''ny mponina tao an-tanànany ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ireo olona ireo mipetraka tsara eto amintsika, dia aoka honina eto amin''ny tany izy ka hanao varotra eto; fa. indro, ny tany dia malalaka eo anoloany; ny zananivavy dia aoka halaintsika ho vadintsika, ary ny zanatsika vavy dia aoka homentsika azy kosa. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nefa izao monja ihany no hanaovan''ireo lehilahy ireo fanekena amintsika mba hiara-monina amintsika ho firenena iray: mba hoforana koa, hono, ny lehilahy rehetra eto amintsika tahaka izay namorana azy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tsy ho antsika va ny omby aman''ondriny sy ny fananany mbamin''ny biby fiompiny rehetra? Aoka hanaiky ny teniny ihany isika, dia hiara-monina amintsika izy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary izay rehetra nivoaka tamin'ny vavahadin'ny tanànany dia nanaiky ny tenin'i Hamora sy Sekema zanany; ary noforana ny lehilahy rehetra, dia izay rehetra nivoaka tamin'ny vavahadin'ny tanànany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary nony tamin''ny andro fahatelo, rehefa ilay narary mafy iny izy ireo, dia samy nitondra ny sabany ny zanak''i Jakoba roa lahy, dia Simeona sy Levy, anadahin''i Dina, ka niakatra sahisahy tao an-tanàna, dia namono ny lehilahy rehetra tao. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary Hamora sy Sekema zananilahy dia novonoiny tamin''ny lelan-tsabatra koa; dia naka an''i Dina tao an-tranon''i Sekema izy ka lasa nandeha. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary ny zanak''i Jakoba nankeny amin''ny faty ka namabo ny tanàna noho ny nandotoany ny anabaviny. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ny ondry aman''osiny sy ny ombiny sy ny borikiny mbamin''izay rehetra tao an-tanàna sy izay rehetra tany an-tsaha dia nahorony avokoa; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ary ny fananany re­hetra sy ny zanany madinika rehetra ary ny vadiny dia nobaboiny ka nofaohiny avokoa mbamin''izay rehetra tao an-trano. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary hoy Jakoba tamin''i Simeona sy Levy: Efa nahatonga loza amiko ianareo, fa efa nomaimboinareo eto amin''ny mponina amin''ny tany aho, dia amin''ny Kananita sy ny Perizita; nefa olom-bitsy aho, ka dia hiangona hamely ahy izy ireo ka hamono ahy; dia ho fongotra aho, dia izaho sy ny ankohonako. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa hoy kosa izy: Moa ny anabavinay havela hataony toy ny vehivavy janga va?'
