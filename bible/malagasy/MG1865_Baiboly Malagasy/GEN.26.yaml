document_id: GEN.26,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nampakaran'i Esao vehivavy Kananita ho vadiny
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy mosary indray teo amin''ny tany afa-tsy ilay mosary voalohany fony fahavelon''i Abrahama. Ary Isaka nankany amin''i Abimeleka mpanjakan''ny Filistina, tany Gerara. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Abimeleka: Inona izao nataonao taminay izao? Saiky nisy nandry tamin''ny vadinao ny olona, dia ho nahatonga heloka taminay ianao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandidy ny vahoakany rehetra Abimeleka ka nanao hoe: Izay manendry io lehilahy io na ny vadiny dia hatao maty tokoa. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namafy tamin''izany tany izany Isaka ka nahazo zato heny tamin''izay taona izay, satria efa notahin''i Jehovah izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanan-karena ralehilahy ka nandroso sy nitombo ambara-pahatongany ho mpanjatobe indrindra; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa nanana fananana be izy, dia ondry aman''osy sy omby ary andevo maro; ka dia nialona azy ny Filistina. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny lavaka fantsakana rehetra, izay efa nohadin''ny mpanompon-drainy fony fahavelon''i Abrahama rainy, dia efa novonoin''ny Filistina sy nototofany tany avokoa. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Abimeleka tamin''Isaka: Miala atỳ aminay; fa ianao mahery lavitra noho izahay. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary lasa niala teo Isaka, dia nanorina ny lainy teo an-dohasahan''i Gerara ka nonina teo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia noloaran''Isaka indray ny lavaka fantsakana izay voahady fony fahavelon''i Abrahama rainy, fa efa novonoin''ny Filistina ireny, rehefa maty Abrahama; ary dia nasiany anarana ireny araka ny anarana izay efa nanaovan-drainy azy ihany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nihady teo amin''ny lohasaha ny mpanompon''Isaka ka nahita loharano velona teo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah niseho taminy ka nanao hoe: Aza midina any Egypta ianao; mitoera eo amin''ny tany izay holazaiko aminao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niady tamin''ny mpiandry ombin''Isaka ny mpiandry omby tao Gerara ka nanao hoe: Anay ny rano; ary ny anaran''ny lavaka fantsakana dia nataon''Isaka hoe Eseka, satria nifanditra taminy izy ireo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nihady lavaka fantsakana hafa koa izy, ka niadiany indray io; ary ny anarany dia nataony hoe Sitna. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifindra niala teo izy ka nihady lavaka fantsakana hafa koa indray; fa io kosa tsy mba niadiany; koa ny anarany dia nataony hoe Rehobota; fa hoy izy: Efa nomen''i Jehovah toerana malalaka isika ankehitriny, dia hihamaro eo amin''ny tany.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niakatra niala teo izy ka nankany Beri-sheba. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah niseho taminy tamin''iny alina iny ka nanao hoe: Izaho no Andriamanitr''i Abrahama rainao; aza matahotra, fa momba anao Aho ka hitahy anao sy hahamaro ny taranakao noho ny amin''i Abrahama mpanompoko. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanorina alitara teo izy, dia niantso ny anaran''i Jehovah sady nanorina ny lainy teo koa; ary nihady lavaka fantsakana teo ny mpanompon''Isaka. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Abimeleka mbamin''i Ahozata sakaizany sy Pikola, komandin''ny miaramilany, dia niala tao Gerara hankany amin''Isaka. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Isaka taminy: Nahoana ianareo no mankaty amiko, kanefa nankahala ahy ianareo ka nandroaka ahy niala teo aminareo? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy ireo: Efa hitanay marimarina fa momba anao Jehovah, ka dia hoy izahay: Aoka samy hanao fianianana isika, dia izahay sy ianao, ary aoka izahay hanao fanekena aminao, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa tsy hanisy ratsy anay ianao, tahaka ny tsy nanendrenay anao akory, sy tahaka ny tsy nanaovanay na inona na inona taminao afa-tsy ny soa ihany, fa efa nampandehaninay soa aman-tsara ianao. Fa ianao ankehitriny efa notahin''i Jehovah. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miva­hinia eto amin''ity tany ity ianao, dia homba anao sy hitahy anao Aho; fa ianao sy ny taranakao no homeko ireto tany rehetra ireto, ka hotoviko ny fianianana izay nataoko tamin''i Abrahama rainao; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanao fanasana ho azy Isaka, ka dia nihinana sy nisotro izy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifoha maraina koa izy, ka samy nanao fianianana; dia nampandehanin''Isaka ireo, ka dia lasa nody soa aman-tsara izy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin''izany andro izany dia avy ny mpanompon''Isaka ka nanambara taminy ny amin''ny lavaka fantsakana izay efa nohadiny ka nanao taminy hoe: Efa nahita rano izahay. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nanao ny anarany hoe Sheba izy; izany no nanaovana ny anaran'ny tanàna hoe Beri-sheba mandraka androany.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa efa-polo taona Esao, dia nampakatra an''i Jodita, zanakavavin''i Bery Hetita, sy Basemata, zanakavavin''i Elona Hetita, izy. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nangidy tamin'ny fanahin'Isaka sy Rebeka indrindra ireny.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hahamaro ny taranakao ho tahaka ny kintana eny amin''ny lanitra Aho, ka homeko ny taranakao ireto tany rehetra ireto, ary amin''ny taranakao no hitahiana ny firenena rehetra ambonin''ny tany; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria efa nihaino ny feoko Abrahama ka nitandrina izay nasaiko notandremany, dia ny didiko sy ny teniko ary ny lalàko. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Isaka dia nitoetra tany Gerara. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny lehilahy tompon-tany nanontany ny amin''ny vadiny; ary hoy kosa izy: Anabaviko izy; fa natahotra hilaza hoe: Vadiko izy, fandrao, hoy izy, hamono ahy ny lehilahy tompon-tany noho Rebeka, satria tsara tarehy izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nitoetra ela teo izy, dia nitsirika teo am-baravarankely Abimeleka, mpanjakan''ny Filistina, ka nahita fa, indro, Isaka nisangy tamin-dRebeka vadiny. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Abimeleka dia niantso an''Isaka ka nanao hoe: Efa hita mihi­tsy fa vadinao izy, ka nahoana no nolazainao hoe: Anabaviko izy? Ary hoy Isaka taminy: Satria hoy izaho anakampo: Fandrao maty aho noho ny aminy. '
