document_id: PSA.53,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny faharatsian'ny olona sy ny faniriam-pamonjena
  - type: text
    content: 'Ho an''ny mpiventy hira. Al-mahalath. Maskila nataon''i Davida. Ny adala manao anakampo hoe: tsy misy Andriamanitra. Manao izay ratsy sy vetaveta izy, tsy misy manao ny tsara.'
  '2':
  - type: text
    content: 'Eny an-danitra Andriamanitra miondrika mijery ny zanak''olombelona, mba hizaha na misy hendry mitady an''Andriamanitra. '
  '3':
  - type: text
    content: Samy efa nivily izy rehetra ka tonga vetaveta avokoa; tsy misy manao ny tsara, na dia iray akory aza.
  '4':
  - type: text
    content: 'Tsy mahalala va ny mpanao ratsy, izay mihinana ny oloko toy ny fihinan-kanina, ary Andriamanitra tsy antsoiny? '
  '5':
  - type: text
    content: Indreo, matahotra dia matahotra ireny, nefa tsy nisy tokony hatahorany; fa Andriamanitra efa nanely ny taolan'izay nitoby hamely anao; nampahamenatra azy ianao, satria efa narian'Andriamanitra izy.
  '6':
  - type: text
    content: Enga anie ka hivoaka avy ao Ziona ny famonjena ny Isiraely! raha ampodin'Andriamanitra avy amin'ny fahababoana ny olony, dia ho faly Jakoba, ary ho ravoravo Isiraely.
