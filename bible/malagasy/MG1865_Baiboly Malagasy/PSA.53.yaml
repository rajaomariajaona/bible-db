document_id: PSA.53,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny faharatsian'ny olona sy ny faniriam-pamonjena
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ho an''ny mpiventy hira. Al-mahalath. Maskila nataon''i Davida. Ny adala manao anakampo hoe: tsy misy Andriamanitra. Manao izay ratsy sy vetaveta izy, tsy misy manao ny tsara.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Eny an-danitra Andriamanitra miondrika mijery ny zanak''olombelona, mba hizaha na misy hendry mitady an''Andriamanitra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Samy efa nivily izy rehetra ka tonga vetaveta avokoa; tsy misy manao ny tsara, na dia iray akory aza.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tsy mahalala va ny mpanao ratsy, izay mihinana ny oloko toy ny fihinan-kanina, ary Andriamanitra tsy antsoiny? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Indreo, matahotra dia matahotra ireny, nefa tsy nisy tokony hatahorany; fa Andriamanitra efa nanely ny taolan'izay nitoby hamely anao; nampahamenatra azy ianao, satria efa narian'Andriamanitra izy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Enga anie ka hivoaka avy ao Ziona ny famonjena ny Isiraely! raha ampodin'Andriamanitra avy amin'ny fahababoana ny olony, dia ho faly Jakoba, ary ho ravoravo Isiraely.
