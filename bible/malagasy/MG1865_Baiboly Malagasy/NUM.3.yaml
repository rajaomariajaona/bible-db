document_id: NUM.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandaminana ny firenen'i Levy, sy ny nitobiany, ary ny zavatra hotandremany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary izao no taranak''i Arona sy Mosesy tamin''ny andro nitenenan''i Jehovah tamin''i Mosesy teo an-tendrombohitra Sinay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny anaran''ny zanakalahin''i Arona dia Nadaba lahimatoa sy Abiho ary Eleazara sy Itamara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ireo no anaran''ny zanakalahin''i Arona, dia ny mpisorona voahosotra, izay natokana hanao fisoronana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa maty teo anatrehan''i Jehovah Nadaba sy Abiho tamin''izy nanatitra afo tsy izy teo anatrehan''i Jehovah tany an-efitr''i Sinay, sady samy tsy nanan-janaka izy mirahalahy; ary Eleazara sy Itamara no nanao fisoronana teo anatrehan''i Arona rainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ento ny firenen''i Levy hanatona, ka ampitoero eo anatrehan''i Arona mpisorona mba hanompo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hitandrina ny anjara-raharahan''i Arona sy ny anjara raharahan''ny fiangonana rehetra eo anoloan''ny trano-lay fihaonana izy, ka hanao ny fanompoana ao amin''ny tabernakely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hitandrina ny fanaka rehetra momba ny trano-lay fihaonana sy ny anjara-raharahan''ny Zanak''Isiraely izy ka hanao ny fanompoana ao amin''ny tabernakely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary homenao an''i Arona sy ny zananilahy ny Levita; efa nomena azy mihitsy avy amin''ny Zanak''Isiraely ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Arona sy ny zananilahy hotendrenao hitandrina ny fisoronany; fa raha olon-kafa no manakaiky, dia hatao maty izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Indro, Izaho efa naka ny Levita avy tamin''ny Zanak''Isiraely ho solon''ny lahimatoa rehetra izay voalohan-teraka eo amin''ny Zanak''Isiraely: dia Ahy ny Levita, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'satria Ahy ny lahimatoa rehetra; tamin''ilay andro namelezako ny voalohan-teraka rehetra tany amin''ny tany Egypta no nanamasinako ny voalohan-teraka rehetra eo amin''ny Isiraely ho Ahy, na olona, na biby fiompy: Ahy ireo; Izaho no Jehovah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy tany an-efitr''i Sinay ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Alamino ny Levita araka ny fianakaviany sy ny fokony; ny lahy rehetra eo aminy hatramin''ny iray volana no ho miakatra no halaminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary Mosesy nandamina azy araka ny tenin''i Jehovah, araka izay efa nandidiana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary izao no zanakalahin''i Levy, araka ny anarany: Gersona sy Kehata ary Merary. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary izao no anaran''ny zanakalahin''i Gersona, araka ny fianakaviany: Libny sy Simey. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ny zanakalahin''i Kehata, araka ny fianakaviany, dia Amrama sy Jizara sy Hebrona ary Oziela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ny zanakalahin''i Merary, araka ny fianakaviany, dia Maly sy Mosy. Ireo no fokon''ny Levita, araka ny fianakaviany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Avy tamin''i Gersona ny fokon''ny Libnita sy ny Simeita: Ireo no fokon''ny Gersonita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary izay nalamina, araka ny isan''ny lahy rehetra hatramin''ny iray volana no ho miakatra, dia diman-jato amby fito arivo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ny fokon''ny Gersonita dia hitoby eo ivohon''ny tabernakely, dia eo andrefany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ny lohan''ny fianakavian''ny Gersonka dia Efiasafa, zanak''i Laela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ny anjara-raharahan''ny zanak''i Gersona eo amin''ny trano-lay fihaonana dia ny tabernakely sy ny lay sy ny firakony sy ny varavarana lamba amin''ny varavaran''ny trano-lay fihaonana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ary ny fefi-lamban'ny kianja sy ny vavahady lamba amin'ny vavahadin'ny kianja, izay manodidina ny tabernakely sy ny alitara, ary ny kofehy rehetra momba azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary avy tamin''i Kehata ny fokon''ny Amramita sy ny fokon''ny Jizarita sy ny fokon''ny Hebronita ary ny fokon''ny Ozielita; ireo no fokon''ny Kehatita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ny isan''ny lahy rehetra hatramin''ny iray volana no ho miakatra, izay mpitandrina ny anjara-raharaha momba ny fitoerana masina, dia enin-jato amby valo arivo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ny fokon''ny zanak''i Kehata dia hitoby eo amin''ny lafiny atsimo amin''ny tabernakely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary ny lohan''ny fianakaviana amin''ny fokon''ny Kehatita dia Elisafana, zanak''i Oziela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary ny anjara-raharahany dia ny fiara sy ny latabatra sy ny fanaovan-jiro sy ny alitara roa, ary ny fanaky ny fitoerana masina, izay fanaovana fanompoam-pivavahana, ary ny varavarana lamba mbamin''ny zavatra rehetra fanaovana ny fanompoana momba azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary ny lehiben''ny lohan''ny Levita dia Eleazara, zanak''i Arona mpisorona, izay lehiben''ny mpitandrina ny anjara-raharaha ny amin''ny fitoerana masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Avy tamin''i Merary ny fokon''ny Malita sy ny fokon''ny Mosita; Ireo no fokon''i Merary. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary izay nalamina, araka ny isan''ny lahy rehetra hatramin''ny iray volana no ho miakatra, dia roan-jato amby enina arivo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary ny lohan''ny fianakaviana amin''ny fokon''i Merary dia Zoriela, zanak''i Abihaila; ireo no hitoby eo amin''ny lafiny avaratra amin''ny tabernakely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary ny anjara-raharahan''ny zanak''i Merary dia ny zana-kazo amin''ny tabernakely sy ny barany sy ny andriny ary ny faladiany, ary ny fanaka rehetra momba azy, sy ny zavatra rehetra enti-manao fanompoana ao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ary ny tsangantsangan'ny kianja manodidina sy ny faladiany sy ny tsimany ary ny kofehiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary ny mitoby eo anoloan''ny tabernakely atsinanany, dia eo anoloan''ny trano-lay fihaonana, tandrifin''ny fiposahan''ny masoandro, dia Mosesy sy Arona ary ny zanany, izay mpitandrina ny anjara-raharaha momba ny fitoerana masina, dia ny anjara-raharahan''ny Zanak''Isiraely; ary raha olon-kafa no manakaiky, dia hatao maty izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Ny tontalin'izay nalamina avy tamin'ny Levita, dia izay nalamin'i Mosesy sy Arona araka ny didin'i Jehovah, avy tamin'ny fokony, ny lahy rehetra hatramin'ny iray volana no ho miakatra, dia roa arivo amby roa alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary hoy Jehovah tamin''i Mosesy: Alamino ny lahimatoa rehetra eo amin''ny Zanak''Isiraely hatramin''ny iray volana no ho miakatra, ka alao isa ny anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary alao ho Ahy ny Levita ho solon''ny lahimatoa rehetra eo amin''ny Zanak''Isiraely: Izaho no Jehovah; ary ny biby fiompin''ny Levita ho solon''ny voalohan-teraka rehetra amin''ny biby fiompin''ny Zanak''Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Dia nalamin''i Mosesy ny lahimatoa rehetra teo amin''ny Zanak''Isiraely, araka izay efa nandidian''i Jehovah azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ary ny lahimatoa rehetra, araka ny anarany tsirairay hatramin'ny iray volana no ho miakatra, izay nalamina avy taminy dia telo amby fito-polo sy roan-jato sy roa arivo sy roa alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Alao ny Levita ho solon''ny lahimatoa rehetra eo amin''ny Zanak''Isiraely; ary ny biby fiompin''ny Levita ho solon''ny biby fiompiny: Ahy ny Levita; Izaho no Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary ny amin''ny avotry ny telo amby fito-polo sy roan-jato amin''ny lahimatoan''ny Zanak''Isiraely, izay mihoatra isa noho ny Levita, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'dia hangalanao sekely dimy isan-olona; araka ny sekely masina no hangalanao azy (gera roa-polo ny sekely iray). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Dia homenao an''i Arona sy ny zanany ny vola ho avotr''ireo mihoatra isa ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Ary Mosesy nandray ny vola izay avotry ny nihoatra isa noho ny voavotry ny Levita; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'tamin''ny lahimatoan''ny Zanak''Isiraely no nandraisany ny vola, dia sekely dimy amby enim-polo sy telon-jato sy arivo, araka ny sekely masina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: dia nomen'i Mosesy an'i Arona sy ny zanany izany vola avotra izany, araka ny tenin'i Jehovah, dia araka izay efa nandidian'i Jehovah an'i Mosesy.
