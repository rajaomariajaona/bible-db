document_id: NUM.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny mpisafo-tany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy, ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Maniraha lehilahy vitsivitsy hisafo ny tany Kanana, izay omeko ho an''ny Zanak''Isiraely; dia lehilahy iray avy isam-pirazanany no hirahinareo, ka izay samy lohan''ny fireneny avy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Mosesy dia naniraka azy hiala any an-efitra Parana, araka ny didin''i Jehovah; ary samy lohan''ny firenen''ny Zanak''Isiraely ireo lehilahy rehetra ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary izao no anarany: Avy tamin''ny firenen''i Robena dia Samoa, zanak''i Zakora;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'avy tamin''ny firenen''i Simeona dia Safata, zanak''i Hory; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'avy tamin''ny firenen''i Joda dia Kaleba, zanak''i Jefone; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'avy tamin''ny firenen''Isakara dia Jigala, zanak''i Josefa; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'avy tamin''ny firenen''i Efraima dia Hosea, zanak''i Nona; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'avy tamin''ny firenen''i Benjamina dia Palty, zanak''i Rafo; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'avy tamin''ny firenen''i Zebolona dia Gadiela, zanak''i Sody; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'avy tamin''ny firenen''i Josefa, tamin''ny firenen''i Manase, dia Gady, zanak''i Sosy; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'avy tamin''ny firenen''i Dana dia Amiela, zanak''i Gemaly; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'avy tamin''ny firenen''i Asera dia Setora, zanak''i Mikaela; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'avy tamin''ny firenen''i Naftaly dia Naby, zanak''i Vofsy; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'avy tamin''ny firenen''i Gada dia Geoela, zanak''i Maky. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ireo no anaran''ny lehilahy izay nirahin''i Mosesy hisafo ny tany. Ary Hosea, zanak''i Nona, dia nataon''i Mosesy hoe Josoa. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Mosesy naniraka ireo hisafo ny tany Kanana ka nanao taminy hoe: Miakara atỳ amin''ny tany atsimo ianareo, ka miakara ho any amin''ny tany havoana; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'dia izahao izay toetry ny tany sy ny olona monina any, na mahery, na osa, na vitsy, na maro; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ary izay toetry ny tany itoerany, na tsara, na ratsy; ary ny toetry ny tanàna izay itoerany, na ao an-day, na ao an-tanàna mimanda; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ary ny toetry ny tany, na lonaka, na màzana, na misy hazo eo, na tsia; ary mahereza ianareo, ka itondray ny vokatry ny tany. Ary ny andro fahizany dia fahamasahan''ny voaloboka mialin-taona. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia niakatra ireo ka nisafo ny tany hatramin'ny efitra Zina ka hatrany Rehoba, dia ao akaikin'i Hamata.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia niakatra tao amin''ny tany atsimo izy ka nankany Hebrona; ary teo Ahimana sy Sesay ary Talmay, teraky ny Anakita. (Ary Hebrona dia voaorina fito taona talohan''i Zoana any Egypta.) '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia nankany amin''ny lohasaha Eskola izy ka nanapaka sampam-boaloboka teo izay nisy sampahony iray ihany, ary nolanjain-droa lahy tamin''ny hazo izany; ary ny ampongaben-danitra sy ny aviavy dia nitondrany koa. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary izany tany izany dia nataony hoe Lohasaha Eskola, noho ny sampahom-boaloboka izay notapahin''ny Zanak''Isiraely teo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary niverina avy nisafo ny tany ireo, nony afaka efa-polo andro. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia nankeo amin''i Mosesy sy Arona ary ny fiangonana, dia ny Zanak''Isiraely rehetra, tany an-efitra Parana izy, dia tany Kadesy, ka nitondra teny taminy sy ny fiangonana rehetra sady naneho azy ny vokatry ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia nilaza taminy izy ka nanao hoe: Tonga tany amin''ny tany izay nanirahanao anay izahay, koa tondra-dronono sy tantely tokoa izy; ary itony no vokatra avy tany. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Kanefa kosa mahery ny olona izay monina eo amin''ny tany; ary ny tanàna dia mimanda sady lehibe dia lehibe; ary koa, nahita ny teraky ny Anakita teo izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ny Amalekita no monina eo amin''ny tany atsimo; ary ny Hetita sy ny Jebosita ary ny Amorita no monina any amin''ny tany havoana; ary ny Kananita no monina eo amoron''ny ranomasina sy eo amoron''i Jordana. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa Kaleba dia nampangina ny olona teo anatrehan''i Mosesy ka nanao hoe: Andeha isika hiakatra mihitsy mba hahazoantsika azy, fa haharesy azy tokoa isika. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa hoy kosa ny lehilahy izay niara-niakatra taminy: Tsy mahazo miakatra handresy ny olona isika; fa mahery noho isika izy. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia nilaza ratsy ny tany izay nosafoiny tamin''ny Zanak''Isiraely izy ka nanao hoe: Ny tany izay nalehanay nosafoina dia tany izay mandevona ny monina eo, ary ny olona rehetra izay hitanay teo dia olona vaventibe; '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ary nahita ny Nefilima teo izahay, dia taranaky ny Anakita avy amin'ny Nefilima; ary teo imasonay dia tahaka ny tsingentana izahay; ary toy izany koa izahay teo imasony.
