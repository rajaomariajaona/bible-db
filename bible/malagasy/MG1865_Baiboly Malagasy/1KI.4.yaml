document_id: 1KI.4,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'ny mpanao raharaham-panjakana, ary ny voninahitr'i Solomona sy ny fahendreny
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ary nanjaka tamin'ny Isiraely rehetra Solomona mpanjaka.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Beni-haseda tao Arobota; Soko sy ny tany Hefera rehetra no azy; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ben''abinadaba tao amin''ny havoan''i Dora rehetra (Tafata, zanakavavin''i Solomona, no vadiny); '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Bana, zanak''i Ahiloda; azy Tanaka sy Megido ary Beti-sana rehetra, izay anilan''i Zaretana, ambanin''i Jezirela, hatrany Beti-sana ka hatrany Abela-mehola, dia hatrany ankoatr''i Jokneama no azy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Beni-gabera tao Ramota-gileada; ny tanàna madinika an'i Jaïra
    - type: usfm
      marker: x
      children:
      - type: text
        text: Havota-jaïra; izahao Nom. xxxii. 41
      marker-yv: yv-n
    - type: text
      text: ', zanak''i Manase, izay any Gileada, no azy; azy koa ny tany Argoba, izay any Basana, dia tanana enim-polo lehibe nisy manda sy hidy varahina; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ahinadaba, zanak''Ido, tany Mahanaima; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ahimaza tany Naftaly; izy kosa nanambady an''i Basemata, zanakavavin''i Solomona; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Bana, zanak''i Hosay, tany Asera sy Alota; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Josafata, zanak''i Paroa, tany Isakara; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Simey, zanak''i Ela, tany Benjamina; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Gabera, zanak''i Ory, tany amin''ny tany Gileada, tanin''i Sihona, mpanjakan''ny Amorita, sy Oga, mpanjakan''i Basana; ary izy ihany no voatendry ho amin''izany tany izany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary izao no lehibe tao aminy: Azaria, zanak''i Zadoka, no mpisorona'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: zanak''i Zadoka mpisorona'
      marker-yv: yv-n
    - type: text
      text: '; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary ny Joda sy ny Isiraely dia maro, tahaka ny fasika amoron-dranomasina ny hamarony, sady mihinana sy misotro ary mifaly.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Elihorefa sy Ahia, zanak''i Sisa, no mpanoratra; Josafata. zanak''i Ahiloda, no mpitadidy ny raharaha-mpanjakana; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'ary Benaia, zanak''i Joiada, no komandin''ny miaramila; ary Zadoka sy Abiatara no mpisorona; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ary Azaria, zanak'i Natana, no lehiben'ny olona voatendry; ary Zaboda, zanak'i Natana, no mpanolotsaina
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. mpisorona
      marker-yv: yv-n
    - type: text
      text: ', sakaizan''ny mpanjaka, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ary Ahisara no lehiben''ny tao an-dapa; ary Adonirama, zanak''i Abda, no komandin''ny mpanao fanompoana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary Solomona nanendry roa ambin''ny folo lahy ho amin''ny Isiraely rehetra hiadidy ny zavatra rehetra nilain''ny mpanjaka sy ny ankohonany; samy niadidy ny iray volana avy amin''ny herintaona izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary izao no anarany: Beni-hora tany amin''ny tany havoan''i Efraima; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Beni-dakera tao Makaza sy tao Salbima sy Beti-semesy ary Elon-beti-hanana; '
