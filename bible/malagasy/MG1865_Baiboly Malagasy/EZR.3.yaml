document_id: EZR.3,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanombohana ny raharaham-pivavahana indray, sy ny nanorenana ny tempoly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary nony tonga ny volana fahafito, rehefa tafapetraka teny amin''ny tanànany avy ny Zanak''Isiraely, dia nivory tany Jerosalema toy ny olona iray izy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary rehefa naorin''ny mpiasa ny tempolin''i Jehovah, dia nasainy hidera an''i Jehovah ny mpisorona, sady niakanjo ny akanjony sy nitondra trompetra, ary ny Levita, zanak''i Asafa, kosa nitondra kipantsona, araka ny nandidian''i Davida, mpanjakan''ny Isiraely. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia nanao hira nifamalivaly nidera sy nisaotra an''i Jehovah izy, fa tsara Izy, fa mandrakizay ny famindram-pony amin''ny Isiraely. Dia nihoby mafy ny olona rehetra, raha nidera an''i Jehovah, satria vita ny fanorenan''ny tranon''i Jehovah. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nefa maro ny mpisorona sy ny Levita ary ny lohan''ny fianakaviana, dia ny antitra izay efa nahita ny trano voalohany, no nitomany mafy dia mafy, nony naorina teo imasony izany trano izany; nefa maro kosa no nanandratra ny feony nihoby sy nifaly; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ka dia tsy fantatry ny olona izay fifaliana na izay fitomaniana noho izany horakoraka be izany, fa nihoby mafy ny olona, ka re lavitra ny horakoraka.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia nitsangana Jesoa, zanak''i Jozadaka, sy ny mpisorona rahalahiny ary Zerobabela, zanak''i Sealtiela, sy ny rahalahiny ka nanorina ny alitaran''Andriamanitry ny Isiraely hanaterana fanatitra dorana eo amboniny, araka izay voasoratra ao amin''ny lalàn''i Mosesy, lehilahin''Andriamanitra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia naoriny teo amin''ilay efa niorenany ihany ny alitara, satria natahotra ny tompon-tany izy, ary nanatitra fanatitra dorana teo amboniny ho an''i Jehovah izy, dia ny fanatitra dorana marain-tsy hariva. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary nitandrina ny andro firavoravoana fitoerana ao amin''ny trano rantsan-kazo koa izy, araka ny voasoratra, sy ny amin''ny fanatitra dorana isan''andro araka ny isany avy, tahaka ny fanao, araka izay voatendry hatao isan''andro avy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary rehefa afaka izany, dia nanatitra ny fanatitra dorana mandrakariva izy sy ilay fanao amin''ny voaloham-bolana sy amin''ny fotoam-pivavahana nohamasinina rehetra izay voatendrin''i Jehovah ary ny avy amin''izay rehetra nanatitra fanati-tsitrapo ho an''i Jehovah. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Tamin''ny andro voalohany tamin''ny volana fahafito no niantomboka nanatitra fanatitra dorana ho an''i Jehovah izy. Nefa tsy mbola natao ny fanorenan''ny tempolin''i Jehovah. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary nomeny vola ny mpipai-bato sy ny mpandrafitra, ary ny any Tyro sy ny any Sidona dia nomeny zavatra hohanina sy hosotroina sy diloilo mba hitondrany hazo sedera avy any Libanona hatramin''ny ranomasina any Jopa, araka ny teny efa azony tamin''i Kyrosy, mpanjakan''i Persia. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary tamin''ny volana faharoa tamin''ny taona faharoa taorian''ny nahatongavany tany amin''ny tranon''Andriamanitra tany Jerosalema dia niantomboka Zerobabela, zanak''i Sealtiela, sy Jesoa, zanak''i Jozadaka, mbamin''ny rahalahiny sisa, dia ny mpisorona sy ny Levita ary izay rehetra tonga tany Jerosalema avy tany amin''ny fahababoana, ka nanendry ny Levita izay hatramin''ny roa-polo taona no ho miakatra izy ho tonian''ny asa amin''ny tranon''i Jehovah. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia niara-nitsangana Jesoa sy ny zanany ary ny rahalahiny, ary Kadmiela sy ny zanany, zanak''i Joda, ho tonian''ny mpiasa tamin''ny tranon''Andriamanitra, ary ny zanak''i Henadada koa mbamin''ny zanany sy ny Levita rahalahiny. '
