document_id: JOB.13,96
type_code: plt
verses:
  '1':
  - type: text
    content: Indro, izany rehetra izany efa hitan'ny masoko, ary efa ren'ny sofiko ka fantany.
  '10':
  - type: text
    content: Hanameloka anareo mihitsy Izy, Raha miangatra mangingina ianareo.
  '11':
  - type: text
    content: Tsy hampahatahotra anareo va ny fahalehibiazany? Ary tsy hitsatoka aminareo va ny fahatahorana avy aminy?
  '12':
  - type: text
    content: Ireo teny tononinareo ireo dia ohabolana lavenona foana, ary manda fotaka ihany ny mandanareo.
  '13':
  - type: text
    content: Mangina, ka mialà amiko ianareo, mba hitenenako; Fa aoka hanjo ahy ihany izay hanjo ahy.
  '14':
  - type: text
    content: Nahoana no hitondra ny nofoko amin'ny nifiko aho? Tsia, fa manao ny aiko tsy ho zavatra aho
  - type: note
    content: 'Na: Ka manao ny aiko eo an-tanako'
  - type: text
    content: .
  '15':
  - type: text
    content: Na dia hamono ahy aza Izy, mbola hanantena Azy ihany aho
  - type: note
    content: 'Na: Indro, hamono ahy Izy, tsy manam-panantenana aho'
  - type: text
    content: ; Kanefa hanamarina ny lalako eo anatrehany aho.
  '16':
  - type: text
    content: 'Ary izao no ho famonjena ahy: Ny'
  - type: note
    content: 'Na: Ary ho famonjena ahy Izy, fa ny'
  - type: text
    content: ' mpihatsaravelatsihy'
  - type: note
    content: 'Na: ratsy fanahy'
  - type: text
    content: ' tsy sahy mankeo anatrehany.'
  '17':
  - type: text
    content: Mihainoa dia mihainoa ny teniko, ary aoka ho ren'ny sofinareo ny filazàko.
  '18':
  - type: text
    content: Indro, fa efa voatoriko
  - type: note
    content: 'Na: voalamiko'
  - type: text
    content: ' ny adiko; Fantatro fa hanan-drariny aho.'
  '19':
  - type: text
    content: Iza no hahazo hifandahatra amiko? Fa raha izany, dia hangina aho ka hiala aina.
  '2':
  - type: text
    content: Izay fantatrareo dia mba fantatro koa; Tsy latsaka noho ianareo aho tsy akory.
  '20':
  - type: text
    content: Izao zavatra roa loha izao ihany no aza mba atao amiko, dia tsy hiery Anao aho;
  '21':
  - type: text
    content: Esory hanalavitra ahy ny tananao, ary aoka tsy hampahatsiravina ahy fampitahoranao.
  '22':
  - type: text
    content: Dia miantsoa, fa izaho hamaly; Na aoka hiteny aho, ka valio aho.
  '23':
  - type: text
    content: Firy ary ny heloko sy ny fahotako? Mba ampahalalao izay fiodinako sy fahotako aho.
  '24':
  - type: text
    content: Nahoana no manafina ny tavanao Hianao, ka manao ahy ho fahavalonao?
  '25':
  - type: text
    content: Moa izay ravin-kazo indaosin'ny rivotra avy va no ampitahorinao? Ary izay vodivary maina avy va no enjehinao?
  '26':
  - type: text
    content: Fa zava-mangidy no tendrenao hamely ahy, ka ampanodiavinao ahy, ny heloky ny fahatanorako;
  '27':
  - type: text
    content: Dia mampiditra ny tongotro eo amin'ny boloky hazo Hianao ary mitsikilo ny diako rehetra; Ny hodiavin'ny tongotro dia feranao.
  '28':
  - type: text
    content: Dia izaho ity izay mihalevona tahaka ny zavatra hanin'ny fositra, eny, tahaka ny fitafiana lanin'ny kalalao.
  '3':
  - type: text
    content: Kanefa raha izaho, dia ny Tsitoha no tiako hitenenana, ary Andriamanitra no iriko handaharan-teny.
  '4':
  - type: text
    content: Fa ianareo kosa dia mpamoron-dainga; Dokotera tsy mahomby ianareo rehetra,
  '5':
  - type: text
    content: Enga anie ka hangina mihitsy ianareo, dia ho fahendrenareo izany!
  '6':
  - type: text
    content: Masìna ianareo, henoy ny anatro, ary tandremo izay alahatry ny molotro.
  '7':
  - type: text
    content: Hanao teny tsy marina ho enti-manamarina an'Andriamanitra va ianareo? Hiteny fitaka ho Azy va ianareo?
  '8':
  - type: text
    content: Hiangatra ho Azy va ianareo? Handaha-teny ho an'Andriamanitra va ianareo
  '9':
  - type: text
    content: Ho tsara aminareo va, raha mandinika anareo Izy? Na ho azonareo fitahina hoatra ny famitaka zanak'olombelona va Izy?
