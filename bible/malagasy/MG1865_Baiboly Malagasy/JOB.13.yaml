document_id: JOB.13
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Indro, izany rehetra izany efa hitan'ny masoko, ary efa ren'ny sofiko ka fantany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Izay fantatrareo dia mba fantatro koa; Tsy latsaka noho ianareo aho tsy akory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Kanefa raha izaho, dia ny Tsitoha no tiako hitenenana, ary Andriamanitra no iriko handaharan-teny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa ianareo kosa dia mpamoron-dainga; Dokotera tsy mahomby ianareo rehetra,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Enga anie ka hangina mihitsy ianareo, dia ho fahendrenareo izany!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Masìna ianareo, henoy ny anatro, ary tandremo izay alahatry ny molotro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hanao teny tsy marina ho enti-manamarina an'Andriamanitra va ianareo? Hiteny fitaka ho Azy va ianareo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Hiangatra ho Azy va ianareo? Handaha-teny ho an'Andriamanitra va ianareo
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ho tsara aminareo va, raha mandinika anareo Izy? Na ho azonareo fitahina hoatra ny famitaka zanak'olombelona va Izy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hanameloka anareo mihitsy Izy, Raha miangatra mangingina ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tsy hampahatahotra anareo va ny fahalehibiazany? Ary tsy hitsatoka aminareo va ny fahatahorana avy aminy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ireo teny tononinareo ireo dia ohabolana lavenona foana, ary manda fotaka ihany ny mandanareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mangina, ka mialà amiko ianareo, mba hitenenako; Fa aoka hanjo ahy ihany izay hanjo ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nahoana no hitondra ny nofoko amin'ny nifiko aho? Tsia, fa manao ny aiko tsy ho zavatra aho
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ka manao ny aiko eo an-tanako'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Na dia hamono ahy aza Izy, mbola hanantena Azy ihany aho
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Indro, hamono ahy Izy, tsy manam-panantenana aho'
    marker-yv: yv-n
  - type: text
    text: ; Kanefa hanamarina ny lalako eo anatrehany aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary izao no ho famonjena ahy: Ny'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ary ho famonjena ahy Izy, fa ny'
    marker-yv: yv-n
  - type: text
    text: ' mpihatsaravelatsihy'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ratsy fanahy'
    marker-yv: yv-n
  - type: text
    text: ' tsy sahy mankeo anatrehany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mihainoa dia mihainoa ny teniko, ary aoka ho ren'ny sofinareo ny filazàko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Indro, fa efa voatoriko
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: voalamiko'
    marker-yv: yv-n
  - type: text
    text: ' ny adiko; Fantatro fa hanan-drariny aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Iza no hahazo hifandahatra amiko? Fa raha izany, dia hangina aho ka hiala aina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izao zavatra roa loha izao ihany no aza mba atao amiko, dia tsy hiery Anao aho;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Esory hanalavitra ahy ny tananao, ary aoka tsy hampahatsiravina ahy fampitahoranao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia miantsoa, fa izaho hamaly; Na aoka hiteny aho, ka valio aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Firy ary ny heloko sy ny fahotako? Mba ampahalalao izay fiodinako sy fahotako aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Nahoana no manafina ny tavanao Hianao, ka manao ahy ho fahavalonao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Moa izay ravin-kazo indaosin'ny rivotra avy va no ampitahorinao? Ary izay vodivary maina avy va no enjehinao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa zava-mangidy no tendrenao hamely ahy, ka ampanodiavinao ahy, ny heloky ny fahatanorako;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Dia mampiditra ny tongotro eo amin'ny boloky hazo Hianao ary mitsikilo ny diako rehetra; Ny hodiavin'ny tongotro dia feranao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dia izaho ity izay mihalevona tahaka ny zavatra hanin'ny fositra, eny, tahaka ny fitafiana lanin'ny kalalao.
