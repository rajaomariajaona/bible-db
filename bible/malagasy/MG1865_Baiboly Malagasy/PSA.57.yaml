document_id: PSA.57,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fangataham-pamindram-po sy fahatokiana an'Andriamanitra, na dia hodidinim-pahavalo aza
  - type: text
    content: Ho an'ny mpiventy hira. Al-tasheth. Miktama nataon'i Davida tamin'ny nandosirany an'i Saoly tao anaty zohy. Mamindrà fo amiko. Andriamanitra ô, mamindrà fo amiko; fa Hianao no ialofan'ny fanahiko; eny, ao amin'ny aloky ny elatrao no ialofako, mandra-pahalasan'ny loza.
  '10':
  - type: text
    content: Fa lehibe mihatra amin'ny lanitra ny famindram-ponao, ary mihatra amin'ny rahona ny fahamarinanao.
  '11':
  - type: text
    content: Misandrata any ambonin'ny lanitra Hianao, Andriamanitra ô; aoka ho ambonin'ny tany rehetra ny voninahitrao.
  '2':
  - type: text
    content: 'Hitaraina amin''Andriamanitra Avo Indrindra aho, dia amin''Andriamanitra Izay mahatanteraka ho ahy. '
  '3':
  - type: text
    content: 'Haniraka avy any an-danitra Izy ka hamonjy ahy, raha miteny ratsy izay misafoaka manenjika ahy; eny, Andriamanitra haniraka ny famindram-pony sy ny fahamarinany. '
  '4':
  - type: text
    content: 'Ny fanahiko dia eo afovoan''ny liona; handry eo amin''ny masiaka aho, dia eo amin''ny zanak''olombelona,- lefona sy zana-tsipìka ny nifiny, ary sabatra maranitra ny lelany. '
  '5':
  - type: text
    content: Misandrata any ambonin'ny lanitra Hianao, Andriamanitra ô! aoka ho ambonin'ny tany rehetra ny voninahitrao.
  '6':
  - type: text
    content: Efa namela-pandrika harato haningotra ny diako izy, ary nampitanondrika ny fanahiko
  - type: note
    content: 'Na: nitanondrika ny fanahiko'
  - type: text
    content: ; nihady lavaka teo anoloako izy, kanjo ny tenany ihany no latsaka ao anatiny.
  '7':
  - type: text
    content: 'Tafatoetra ny foko, Andriamanitra ô, eny, tafatoetra ny foko; hihira sy hankalaza aho. '
  '8':
  - type: text
    content: Mifohaza, ry voninahitro; mifohaza ry valiha sy lokanga; hifoha maraina koa
  - type: note
    content: 'Na: Hampifoha ny maraina aho'
  - type: text
    content: ' aho. '
  '9':
  - type: text
    content: 'Hidera Anao eny amin''ny vahoaka aho, Tompo ô, hankalaza Anao eny amin''ny firenena aho. '
