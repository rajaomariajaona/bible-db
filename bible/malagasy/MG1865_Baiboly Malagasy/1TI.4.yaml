document_id: 1TI.4,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'ny hihemoran'ny sasany, sy fananarana an'i Timoty hazoto hanefa ny anjara-fanompoany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Fa ny Fanahy milaza marina fa amin''ny andro aoriana dia hihemotra amin''ny finoana ny sasany, manaiky fanahy mamitaka sy fampianaran''ny demonia, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa izany no ikelezanay aina sy iezahanay, satria izahay manantena an''Andriamanitra velona, Izay Mpamonjy ny olona rehetra, indrindra fa izay mino. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Izany zavatra izany no andidio sy ampianaro. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Aoka tsy hisy olona hanao tsinontsinona anao noho ny hatanoranao; fa aoka ho tonga fianarana ho an''ny mino ianao amin''ny fiteny, amin''ny fitondran-tena, amin''ny fitiavana, amin''ny finoana, amin''ny fahadiovana. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Mandra-pihaviko tandremo ny famakian-teny, ny fananarana, ny fampianarana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Aza tsy mitandrina ny fanomezam-pahasoavana izay ao anatinao, izay nomena anao tamin'ny faminaniana sy ny fametrahan-tànan'ny loholona
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. presbytera
      marker-yv: yv-n
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mazotoa hihevitra izany zavatra izany, dia mikeleza aina fatratra amin''izany, mba hiseho amin''ny olona rehetra ny fandrosoanao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tandremo ny tenanao sy ny fampianaranao, ka mahareta amin'izany; fa raha manao izany ianao, dia hamonjy ny tenanao sy izay mihaino anao.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'amin''ny fihatsaram-belatsihin''ny mpilaza lainga, ka voapetaky ny vy mahamay ny fieritreretany, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'izay mandrara tsy hanam-bady, ary mampifady hanina, izay nataon''Andriamanitra ho an''izay mino sady mahalala ny marina, mba horaisiny amin''ny fisaorana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa ny zavatra rehetra nataon''Andriamanitra dia tsara avokoa, ka tsy misy tokony holavina, raha raisina amin''ny fisaorana, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'satria hamasinin''ny tenin''Andriamanitra sy ny fivavahana izany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Raha manoro hevitra ny rahalahy ny amin''izany zavatra izany ianao, dia ho mpanompo tsara an''i Kristy Jesosy, tezaina amin''ny tenin''ny finoana sy ny fampianarana tsara izay efa narahinao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa ny anganongano ratsy fanaom-bavy antitra dia lavo, ka mampiasà ny tenanao ho amin''ny toe-panahy araka an''Andriamanitra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa mahasoa kely ihany ny fampiasana ny tena; fa ny toe-panahy araka an''Andriamanitra no mahasoa amin''ny zavatra rehetra ka manana ny teny fikasana ny amin''ny fiainana ankehitriny sy ny ho avy koa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mahatoky izao teny izao ka tokony hekena amin''ny fankasitrahana rehetra. '
