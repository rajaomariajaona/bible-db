document_id: ISA.12
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hiteny ianao amin''izany andro izany hoe: Hidera Anao aho, Jehovah ô; Fa na dia tezitra tamiko aza Hianao, dia'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Fa tezitra tamiko Hianao, nefa'
    marker-yv: yv-n
  - type: text
    text: ' afaka ny fahatezeranao, ka mampionona ahy Hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Indro, Andriamanitra no famonjena ahy; dia hatoky aho, fa tsy mba hatahotra; Fa Jehovah Tompo no heriko sy fiderako, fa efa famonjena ahy Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa amin''ny fifaliana no hantsakanareo rano amin''ny loharanom-pamonjena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hiteny ianao amin''izany andro izany ka hanao hoe: Miderà an''i Jehovah, miantsoa ny anarany, ampahafantaro any amin''ny firenena ny asany. Ampahatsiarovy fa efa misandratra ny anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mankalazà an''i Jehovah, fa asa lehibe no nataony; Ary aoka ho fantatra any amin''ny tany rehetra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Miantsoa mafy sy mihobia, ry mponina any Ziona; Fa lehibe ao afovoanao ny Iray Masin'ny Isiraely.
