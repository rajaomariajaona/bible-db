document_id: ACT.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nifidianan'ny Apostoly ny anankiray ho namany hisolo an'i Jodasy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ry Teofilo, ilay boky voalohany dia nosoratako ny amin''izay nataon''i Jesosy sy nampianariny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'hatramin''ny andro nampiakarana Azy, rehefa nodidiany tamin''ny Fanahy Masina ny Apostoly izay nofidiny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'sady niseho koa tamin''ny famantarana maro taorian''ny nijaliany fa velona Izy, ka niseho taminy efa-polo andro Izy ary nilaza ny amin''ny fanjakan''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary raha niara-niangona
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: niara-nihinana'
    marker-yv: yv-n
  - type: text
    text: ' teo aminy Jesosy, dia namepetra azy tsy hiala an''i Jerosalema, fa hiandry ny teny fikasan''ny Ray, izay efa renareo tamiko, hoy Izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'fa Jaona nanao batisa tamin''ny rano; fa ianareo kosa hatao batisa amin''ny Fanahy Masina, rehefa afaka andro vitsivitsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa izay tafangona teo dia nanontany Azy hoe: Tompoko, amin''izao va no hampodianao ny fanjakana ho amin''ny Isiraely? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa hoy kosa Izy taminy: Tsy anareo ny hahalala ny andro na ny fotoana izay efa notendren''ny Ray amin''ny fahefany ihany'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: izay nataon''ny Ray ho adidin''ny tenany ihany'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hahazo hery ianareo amin''ny hilatsahan''ny Fanahy Masina aminareo, ary ho vavolombeloko any Jerosalema sy eran''i Jodia sy Samaria ary hatramin''ny faran''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary rehefa nilaza izany Jesosy, dia nakarina Izy, raha mbola nijery izy ireo; ary nisy rahona nitondra Azy, ka tsy hitan''ny masony intsony Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary raha mbola nandinika ny lanitra izy ireo tamin''ny nandehanan''i Jesosy, indreo, nisy roa lahy teo anilany niakanjo akanjo fotsy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'izay nanao hoe: Ry lehilahy Galiliana, nahoana no mijanona eto mijery ny lanitra ianareo? iny Jesosy Izay nampiakarina niala taminareo ho any an-danitra iny dia mbola ho avy tahaka ny nahitanareo Azy niakatra ho any an-danitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary izy ireo niverina tany Jerosalema, rehefa avy teo amin''ny tendrombohitra atao hoe Oliva, izay akaikin''i Jerosalema (araka izay mety haleha amin''ny Sabata). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary rehefa tafiditra izy, dia niakatra ho any an-trano ambony, izay fitoerany, - dia Petera sy Jaona sy Jakoba sy Andrea, Filipo sy Tomasy, Bartolomeo sy Matio, Jakoba zanak'i Alfeo, sy Simona Zelota ary Jodasy, zanak
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: rahalahin'''
    marker-yv: yv-n
  - type: text
    text: '''i Jakoba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ireo rehetra ireo niray saina naharitra nivavaka mbamin'ny vehivavy sy Maria, renin'i Jesosy, ary ny rahalahiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary tamin'izany andro izany dia nitsangana teo afovoan'ny rahalahy Petera (tokony ho roa-polo amby zato no isan'ny olona
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. anarana
    marker-yv: yv-n
  - type: text
    text: ' vory teo) ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ry rahalahy, tsy maintsy notanterahina ilay tenin''ny Soratra Masina nampilazain''ny Fanahy Masina rahateo an''i Davida ny amin''i Jodasy, izay tonga mpitarika ny olona nisambotra an''i Jesosy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'fa izy dia isantsika ihany ka nahazo anjara tamin''izao fanompoana izao koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa izany lehilahy izany dia nahazo saha tamin''ny tambin''ny fahotany; ary potraka niankohoka izy, dia vaky ny kibony ka nipoaka sady nivaroraka avokoa ny tsinainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary fantatr''izay rehetra monina eto Jerosalema izany, ka ny anaran''izany saha izany amin''ny fiteniny dia atao hoe Akeldama, izany hoe Sahan-drà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa voasoratra eo amin''ny Bokin''ny Salamo hoe: Aoka ho lao ny fonenany, Ary aoka tsy hisy olona honina ao (Sal. 69. 25); ary koa: Aoka ho lasan''olon-kafa ny anjara-raharahany (Sal. 109. 8). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Koa amin''ireo lehilahy niaraka teto amintsika mandrakariva ireo, raha niditra sy nivoaka tamintsika Jesosy Tompo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'hatramin''ny batisan''i Jaona ka hatramin''ny andro nampiakarana Azy niala tamintsika, dia tokony hisy anankiray ho namantsika mba ho vavolombelon''ny nitsanganany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nanokana roa lahy izy, dia Josefa, atao hoe Barsabasy, izay atao hoe koa Josto, ary Matia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nivavaka izy ka nanao hoe: Hianao, Tompo ô, Izay mahalala ny fon''ny olona rehetra, asehoy izay nofidinao amin''izy roa lahy ireto, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'mba hahazoany anjara amin''izao fanompoana sy ny mah''Apostoly izao, izay nialan''i Jodasy hankanesany any amin''ny fitoerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia nanao filokana ho azy izy, ka latsaka tamin'i Matia ny filokana; ary izy no lany ho isan'ny Apostoly iraika ambin'ny folo lahy.
