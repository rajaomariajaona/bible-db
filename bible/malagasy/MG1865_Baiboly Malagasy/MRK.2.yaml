document_id: MRK.2
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nony niditra tao Kapernaomy indray Izy, rehefa afaka andro vitsivitsy, dia re fa tao an-trano Izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka dia tafangona ny maro, ka tsy nisy hitoerana intsony, na dia teny anoloan''ny varavarana aza; ary Izy nitory ny teny taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nisy nanatona nitondra ny anankiray mararin''ny paralysisa ho eo aminy, izay nolanjain''efa-dahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary satria tsy afaka nanakaiky Azy izy noho ny habetsahan''ny vahoaka, dia nanesorany ny tafon''ny trano nitoeran''i Jesosy, ka nony efa voasokatra, dia nampidininy teo ny fandriana izay nandrian''ilay nararin''ny paralysisa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Jesosy, nony nahita ny finoan''ireo, dia nanao tamin''ilay mararin''ny paralysisa hoe: Anaka, voavela ny helokao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nisy mpanora-dalàna sasany nipetraka teo ka nieritreritra tao am-pony hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nahoana Ilehity no miteny toy izany? Miteny ratsy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. manao blasfemia, izahao Mat.9.3
    marker-yv: yv-n
  - type: text
    text: ' Izy. Iza no mahavela heloka afa-tsy Iray ihany, dia Andriamanitra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary niaraka tamin''izay Jesosy dia nahalala tao am-panahiny fa nieritreritra izany tao am-pony ireo, dia hoy Izy taminy: Nahoana ianareo no mieritreritra izany zavatra izany ao am-ponareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Iza moa no moramora kokoa, ny manao amin''ilay mararin''ny paralysisa hoe: Voavela ny helokao, sa ny manao hoe: Mitsangàna, betao ny fandrianao, ka mandehana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa mba ho fantatrareo fa ny Zanak''olona manana fahefana etỳ ambonin''ny tany hamela heloka, dia lazaiko aminao (hoy Izy tamin''ilay mararin''ny paralysisa): '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mitsangàna, betao ny fandrianao, ka modia any an-tranonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nitsangana izy ka nambeta ny fandriany niaraka tamin''izay ary niala teo anatrehan''ny olona rehetra; dia talanjona izy rehetra ka nankalaza an''Andriamanitra nanao hoe: Tsy mbola nahita izay toy izao izahay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary lasa nandeha teny amoron-dranomasina indray Jesosy; ary ny vahoaka rehetra nanatona Azy, ka dia nampianatra azy Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary nony nandalo Izy, dia nahita an'i Levy, zanak'i Alfeo, nipetraka teo am-pamorian-ketra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Izahao Mat. 9.9
    marker-yv: yv-n
  - type: text
    text: '; ka hoy Izy taminy: Manaraha Ahy. Dia nitsangana izy ka nanaraka Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary raha nipetraka nihinana tao an-tranony Izy, dia maro ny mpamory hetra sy ny mpanota no niara-nipetraka nihinana tamin''i Jesosy mbamin''ny mpianany; fa nisy maro tao, dia nanaraka Azy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary ny mpanora-dalàna, izay isan'ny Fariseo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Na:Ary ny Mpanora-dalàna sy ny Fariseo
    marker-yv: yv-n
  - type: text
    text: ', raha nahita fa niara-nipetraka nihinana tamin''ny mpanota sy ny mpamory hetra Izy, dia niteny tamin''ny mpianatra hoe: Miara-mihinana sy misotro amin''ny mpamory hetra sy ny mpanota Izy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary raha nahare izany Jesosy, dia nanao taminy hoe: Tsy ny finaritra no mila mpanao fanafody, fa ny marary; tsy tonga hiantso ny marina Aho, fa ny mpanota '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny mpianatr''i Jaona sy ny Fariseo nifady hanina tamin''izany; dia avy izy ka nanao tamin''i Jesosy hoe: Nahoana ny mpianatr''i Jaona sy ny mpianatry ny Fariseo no mifady hanina, fa ny mpianatrao kosa tsy mba mifady? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary Jesosy niteny taminy hoe: Mahay mifady va ny havan''ny mpampakatra raha mbola ao aminy ihany ny mpampakatra? Raha mbola ao aminy ihany ny mpampakatra dia tsy mahay mifady izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa ho avy andro izay hanalana ny mpampakatra hiala ao aminy, ka amin''izany andro izany hifady izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tsy misy olona manjaitra tapa-damba tsy mbola voalòna amin''ny lamba tonta; fa raha izany, ny vaovao izay natampina dia handrompitra ny tonta, ka hitatra ny triatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary tsy misy olona manisy divay vaovao ao anaty siny hoditra tonta. fa raha izany, ny divay dia hahatriatra ny siny hoditra, ka dia samy ho very foana ny divay sy ny siny hoditra; fa divay vaovao no ho ao anaty siny hoditra vaovao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nandeha namaky ny tanim-bary tamin''ny Sabata Jesosy; ary ny mpianatra dia nanoty ny salohim-bary teny am-pandehanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ny Fariseo nanao taminy hoe: Indro, nahoana ireo no manao izay tsy mety amin''ny Sabata? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa hoy Izy taminy: Tsy mbola novakinareo va ny teny milaza ilay nataon''i Davida, raha reraky ny hanoanana izy mbamin''izay nanaraka azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'fa niditra tao an-tranon''Andriamanitra tamin''ny andron''i Abiatara mpisoronabe izy ka nihinana ny mofo aseho, izay mahadiso raha misy homana izany, afa-tsy ny mpisorona ihany, ary nomeny koa izay nanaraka azy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary hoy Izy taminy: Ny Sabata no natao ho ny olona, fa tsy ny olona ho an''ny Sabata. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ka dia Tompon'ny Sabata aza ny Zanak'olona.
