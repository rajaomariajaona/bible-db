document_id: 1SA.17
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nitoeran'i Davida tao amin'i Saoly, sy ny nialonan'i Saoly azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny Filistina namory ny miaramilany hiady, ka tafavory tao Soko any Joda izy ary nitoby teo anelanelan''i Soko sy Azeka, dia tao Efesa-damima. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Saoly sy ny lehilahy amin''ny Isiraely dia tafavory ka nitoby teo amin''ny lohasaha Elaha ary nilahatra hiady amin''ny Filistina. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ny Filistina dia teo am-pita teo amin''ny tendrombohitra iray, ary ny Isiraely kosa teo am-pita teo amin''ny tendrombohitra iray, ary lohasaha no elanelany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nisy lehilahy iray mpihantsy ady nivoaka avy teny amin''ny tobin''ny Filistina, Goliata avy any Gata no anarany; enina hakiho sy irain-jehy no halavany '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary nisatroka fiarovan-doha varahina izy, ary niakanjo fiarovan-tratra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Vy na varahina nifanindritsindry lany tahaka ny kiran'ny hazan-drano
    marker-yv: yv-n
  - type: text
    text: ', ka ny lanjan''ny akanjony varahina dia dimy arivo sekely. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nanao fiarovan-dranjo varahina tamin''ny tongony izy ary lefom-pohy varahina teo an-damosiny. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny haben''ny zaran-defony dia tahaka ny vodi-tenon''ny mpanenona; ary ny lela-lefony dia vy lanjan-tsekely enin-jato; ary nisy nitondra ny ampinga lehibe nandeha teo alohany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nijanona izy, dia niantso ny miaramilan''ny Isiraely ka nanao taminy hoe: Nahoana ianareo no mivoaka hilahatra hiady? Tsy Filistina va aho, ary ianareo kosa mpanompon''i Saoly? Mifidiana lehilahy iray ianareo, ary aoka izy hidina etỳ amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Raha tàhiny maharesy ahy izy ka mahafaty ahy, dia ho mpanomponareo izahay; fa raha resiko kosa izy ka matiko, dia ho mpanomponay ianareo ka hanompo anay. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy ilay Filistina: Izaho efa nihaika ny miaramilan''ny Isiraely androany; amoahy lehilahy iray aho hiady amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary raha ren''i Saoly sy ny Isiraely rehetra izany tenin''ilay Filistina izany, dia nivadi-po izy ka raikitahotra loatra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Davida dia zanak''ilay Efratita avy any Betlehema-joda atao hoe Jese, izay nanana zanaka valo mirahalahy; ary Jese dia efa zokiolona sy anti-panahy tamin''ny andron''i Saoly; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ary ny zokiny telo lahy tamin''ny zanak''i Jese lasa nanaraka an''i Saoly nankany an-tafika; ary ny anaran''ny zanany telo lahy lasa nankany an-tafika dia Eliaba, lahimatoa, sy Abinadaba, lahiaivo, ary Sama no fahatelony; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary Davida no faralahy; ary izy telo lahy zokiny lasa nanaraka an''i Saoly; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'fa Davida kosa nivoivoy avy tany amin''i Saoly hiandry ny ondrin-drainy tany Betlehema. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary ilay Filistina nanatona marain-tsy hariva ka niseho efa-polo andro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy Jese tamin''i Davida zanany: Ento ity lango eran''ny efaha ity sy ireto mofo folo ireto ho an''ny rahalahinao; ka dia atero faingana ho any an-toby ho any amin''ny rahalahinao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary ento ho an'ny mpifehy arivony ireto fromazy didiny folo ireto, dia izahao na tsara ihany ny rahalahinao, na manao ahoana, ary itondray izay hahafantarako ny toeny aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary Saoly sy izy telo lahy mbamin'ny lehilahy rehetra amin'ny Isiraely dia teo amin'ny lohasaha Elaha niady tamin'ny Filistina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nifoha maraina koa Davida ka namela ny ondriny hotandreman''olona, ary naka ny entany izy ka lasa nandeha araka ny nandidian''i Jese azy; ary tonga teo amin''ny sehatra-sariety izy; ary ny antokon''ny miaramila izay efa hivoaka hilahatra dia nanakora hiady tamin''izay. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa ny Isiraely sy ny Filistina efa nilahatra hiady ka nifanatrika ny miaramila. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary Davida namela ny entany teo anilan''ny mpiambina entana, dia nihazakazaka nankeny amin''ny laharan''ny miaramila, ary tonga ka nanontany ny amin''izay toetry ny rahalahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary raha mbola niresaka taminy izy, indro, tamy niakatra avy teo amin''ny laharan''ny miaramilan''ny Filistina ilay mpihantsy ady, lehilahy Filistina avy any Gata, Goliata no anarany; ary niteny tahaka ny teo aloha ihany izy ka ren''i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ary ny lehilahy rehetra amin''ny Isiraely, raha nahita io lehilahy io, dia nandositra azy, fa natahotra indrindra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy ny lehilahy amin''ny Isiraely: Efa hitanareo va io lehilahy miakatra io? Hihaika ny Isiraely no iakarany; koa izay lehilahy mahafaty io dia hataon''ny mpanjaka manan-karem-bevava, ary dia homeny koa ny zananivavy ho vadiny, sady tsy hampandoavin-ketra amin''ny Isiraely ny tarana-drainy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary hoy Davida tamin''ny olona teo anilany: Ahoana sy ahoana ange no hatao amin''izay lehilahy mahafaty io Filistina io ka mahafa-tondromaso ny Isiraely? Fa zinona moa io Filistina tsy mifora io, no dia hihaika ny miaramilan''Andriamanitra velona? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary ny olona namaly hoe: Izany ka izany no hatao amin''izay lehilahy mahafaty azy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary Eliaba zokiny nandre azy niteny tamin''ny olona dia nirehitra tamin''i Davida ny fahatezerany, ka hoy izy: Nahoana ianao no midina etỳ? Ary amin''iza moa no namelanao ireny ondry vitsy ireny any an-efitra? fantatro ny avonavonao sy ny faharatsian''ny fonao, fa hizaha ny ady no idinanao etỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary hoy Davida: Moa maninona aho izao? Mba miteny aho, ka nahoana moa? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary niala teo aminy hankany amin'ny sasany koa izy ka niteny tahaka ny teo; ary ny olona namaly azy tahaka ny teo ihany indray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary nony ren''ny olona ny teny izay nataon''i Davida, dia nambarany tamin''i Saoly; ka dia naniraka naka azy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary hoy Davida tamin''i Saoly: Aoka tsy ho ketraka amin''ilehio ny fon''ny olona; fa ny mpanomponao handeha hiady amin''io Filistina io. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa hoy Saoly tamin''i Davida: Tsy tohanao ny handeha hiady amin''io Filistina io, satria mbola zaza ianao, fa izy efa mpiady hatrizay niainany. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Fa hoy Davida tamin''i Saoly: Ny mpanomponao niandry ny ondrin-drainy, ary nisy liona sy bera tonga tao ka nahalasa zanak''ondry teo amin''ny ondry, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'dia nanenjika azy aho ka namely azy, ary azoko teny am-bavany ilay zanak''ondry; ary nony handramatra ahy izy, dia nohazoniko tamin''ny somony, ary nasiako ka matiko. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ny liona sy ny bera samy novonoin''ny mpanomponao; ary io Filistina tsy mifora io dia ho tahaka ny anankiray amin''ireny, satria nihaika ny miaramilan''Andriamanitra velona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ary hoy koa Davida; Jehovah, Izay namonjy ahy tamin'ny tanan'ny liona sy ny bera, Izy no hamonjy ahy amin'ny tanan'io Filistina io. Dia hoy Saoly tamin'i Davida; Mandehana, ary homba anao anie Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ary Saoly nampiakanjo an'i Davida ny akanjo fiadiany ary nanisy fiarovan-doha varahina tamin'ny lohany sy nampiakanjo azy akanjo fiarovan-tratra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Vy na varahina nifanindritsindry lany tahaka ny kiran'ny hazan-drano
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary Davida namehy ny sabany tamin''ny akanjo fiadiany, dia nanandrana handeha; fa tsy mbola nahazatra azy izany, ka hoy izy tamin''i Saoly: Tsy afa-mandeha amin''ireto aho, fa tsy mbola nahazatra ahy; ary dia nesorin''i Davida izany. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Dia nitondra ny tehiny teny an-tànany izy sady nifidy vato kilonjy dimy tao amin'ny lohasahan-driaka, ka nataony tao anatin'ny kitapo fitondran'ny mpiandry ondry, izay teny aminy, ary ny antsamotadiny koa teny an-tànany; dia nanatona ilay Filistina izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary ilay Filistina nandroso nanatona an''i Davida, sady teo alohany ilay lehilahy mitondra ny ampinga lehibe. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ary nony nijerijery an'i Davida ilay Filistina ka nahita azy, dia nianjonanjona taminy, fa tanora izy sady mena volo
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tendron-tava'
    marker-yv: yv-n
  - type: text
    text: ' no tsara tarehy. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ary hoy ilay Filistina tamin''i Davida: Alika angaha aho, no hatonin''ialahy amin''ny tehina? Ary nanozona an''i Davida tamin''ireo andriamaniny ilay Filistina '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'sady nanao tamin''i Davida hoe: Avia etỳ amiko, dia homeko ny voro-manidina sy ny bibi-dia ny nofon''ialahy. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Fa hoy kosa Davida tamin''ilay Filistina: Hianao manatona ahy amin''ny sabatra sy ny lefona ary ny lefom-pohy; fa izaho kosa manatona anao amin''ny anaran''i Jehovah, Tompon''ny maro, Andriamanitry ny miaramilan''ny Isiraely, Izay efa nohaikainao. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Anio no hanoloran''i Jehovah anao amin''ny tanako, ary hamely anao aho ka hanapaka ny lohanao, dia homeko ny voro-manidina sy ny bibi-dia ny fatin''ny miaramilan''ny Filistina anio, mba ho fantatry ny tany rehetra fa manana Andriamanitra tokoa ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary ho fantatr''izao fiangonana rehetra izao fa tsy sabatra sy lefona no amonjen''i Jehovah; fa an''i Jehovah ny ady, ary hanolotra anareo ho eo an-tananay Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ary nony niainga ilay Filistina ka nanatona hitsena an''i Davida, dia nandroso faingana Davida ka nihazakazaka ho eo amin''ny laharan''ny miaramila hitsena ilay Filistina. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Ary natsofok''i Davida tao an-kitapo ny tananay, ka naka vato tao izy, ka dia nalefany tamin''ny antsamotady, ka nahavoa ilay Filistina tamin''ny handriny, ary nilentika tamin''ny handriny ny vato, dia potraka niankohoka tamin''ny tany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Toy izany no nandresen''i Davida ilay Filistina tamin''ny vaton''antsamotady, fa namely ilay Filistina izy ka nahafaty azy, ary tsy nisy sabatra teny an-tànan''i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Dia nihazakazaka Davida ka nitsangana teo anilan''ilay Filistina, dia nalainy ny sabatr''ilehio ka notsoahany tamin''ny tranony, dia namonoany azy, sy nanapahany ny lohany. Ary nony hitan''ny Filistina fa maty ilay lehilahy maheriny, dia vaky nandositra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Ary ny lehilahy amin'ny Isiraely sy ny Joda dia nitsangana ka nanakora sy nanenjika ny Filistina hatrany akaikin'i Gay
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (Gata)'
    marker-yv: yv-n
  - type: text
    text: ' sy ny vavahadin''i Ekrona; ary izay voa tamin''ny Filistina dia niampatrampatra teny amin''ny lalana mankany Saraima ary hatrany Gata ka hatrany Ekrona. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Ary ny Zanak''Isiraely niverina avy nanenjika mafy ny Filistina ka namabo ny tobiny koa. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Ary ny lohan'ilay Filistina dia noraisin'i Davida ka nentiny tany Jerosalema; fa ny fiadiany napetrany tao amin'ny lainy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Ary nony nahita an''i Davida nandeha hiady tamin''ny Filistina Saoly, dia hoy izy tamin''i Abnera, komandin''ny miaramila: Ry Abnera, zanak''iza moa iny zaza iny? Ary hoy Abnera: Raha velona koa ny ainao, ry mpanjaka, tsy fantatro velively. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Ary hoy ny mpanjaka: Anontanionao na zanak''iza na zanak''iza iny zaza iny. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Ary nony niverina avy namono ilay Filistina Davida, dia nalain''i Abnera izy ka nentiny teo anatrehan''i Saoly, ary mbola teny an-tànany ihany ny lohan''ilay Filistina. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Dia hoy Saoly taminy: Zanak''iza moa ianao, ry zatovo? Ary hoy Davida: Zanak''i Jese Betlehemita mpanomponao aho.'
