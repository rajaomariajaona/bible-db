document_id: PRO.28
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny ratsy fanahy mandositra, na dia tsy misy manenjika aza; Fa ny marina kosa dia matoky toy ny liona tanora.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny fahotan
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fikomian'''
    marker-yv: yv-n
  - type: text
    text: '''ny tany mahamaro mpanapaka; Fa ny fisian''ny olona manan-tsaina'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: manan-tsaina sady mahalala rariny'
    marker-yv: yv-n
  - type: text
    text: ' kosa no mampahateza ny fanjakana'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Fa noho ny manan-tsaina no haharetan''ny fahamarinana'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny malahelo izay mampahory ny mahantra Dia toy ny ranonorana izay manindao ka tsy maha-misy hanina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izay mahafoy ny lalàna dia mandoka ny ratsy fanahy; Fa izay mitandrina ny lalàna dia mirehitra amin'ny fanoherana azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny ratsy fanahy dia tsy mahalala rariny; Fa izay mitady an'i Jehovah no mahalala ny zavatra rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny malahelo izay mandeha amin'ny fahitsiany Dia tsara noho ny manan-karena izay mivadika ka mandeha amin'ny lalana miolikolika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Izay mitandrina ny lalàna no zanaka hendry; Fa izay misakaiza amin'ny mpandany harena dia manome henatra ny rainy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay mampitombo ny fananany amin'ny zana-bola sy ny tombony Dia mamory ho an'izay miantra ny malahelo
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay manentsin-tadiny tsy hihaino ny lalàna, Na ny fivavahany aza dia fahavetavetana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izay mampivily ny mahitsy ho amin'ny lalan-dratsy Dia ho lavo amin'ny lavaka nataony; Fa ny tsy misy tsiny no handova ny soa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny manan-karena manao azy ho hendry; Fa ny malahelo izay manan-tsaina dia hizaha toetra azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha ravoravo ny marina, dia be ny famirapiratana; Fa raha misandratra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Na. mitsangana
    marker-yv: yv-n
  - type: text
    text: ' kosa ny ratsy fanahy, dia miery ny vahoaka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izay manafina ny fahotany tsy hambinina; Fa izay mitsotra ka mahafoy azy no hahazo famindram-po.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Sambatra izay olona matahotra mandrakariva; Fa izay manamafy ny fony no hidiran-doza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Liona mierona sy bera miremby Ny mpanapaka ratsy fanahy amin'ny olona reraka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny mpanapaka tsy ampy saina dia mahery mampahory; Izay mankahala ny fieremana no ho ela velona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay itambesaran-keloka noho ny fandatsahan-drà dia handositra hatrany an-davaka; Aoka tsy hisy hihazona azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Izay mandeha tsy misy tsiny no ho voavonjy; Fa izay mivadika ka mandeha amin''ny lalana miolikolika no ho lavo tampoka. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Izay miasa ny taniny dia ho voky hanina Fa izay manaraka ny olom-poana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: zava-poana'
    marker-yv: yv-n
  - type: text
    text: ' ho voky alahelo kosa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izay olona mahatoky tokoa dia ho be fitahiana; Fa izay maimay ta-hanan-karena dia tsy maintsy hohelohina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy mety raha mizaha tavan'olona; Kanefa na dia amin'ny sombin-kanina ihany aza dia sahin'ny olona hanotana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny mpialona dia maimay ta-hanan-karena; Tsy fantany fa hanjo azy ny alahelo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Izay mananatra olona no hahazo fitia be rahatrizay Noho izay mandrobo amin'ny lelany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izay mandroba ray sy reny Ka manao hoe: Tsy heloka izany, Dia naman''ny mpanimba.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Izay mierina
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: miavonavona am-po'
    marker-yv: yv-n
  - type: text
    text: ' manetsika ady; Fa izay matoky an''i Jehovah dia hohatavezina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Izay matoky ny fony dia adala; Fa izay mandeha amin'ny fahendrena no ho afa-miala.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izay manome ny malahelo tsy hanan-java-mahory; Fa izay mitampi-maso hahazo ozona be;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Raha misandratra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mitsangana'
    marker-yv: yv-n
  - type: text
    text: ' ny ratsy fanahy, dia miery ny vahoaka; Fa raha ringana kosa izy, dia mihamaro ny marina.'
