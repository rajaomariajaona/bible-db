document_id: PRO.28,96
type_code: plt
verses:
  '1':
  - type: text
    content: Ny ratsy fanahy mandositra, na dia tsy misy manenjika aza; Fa ny marina kosa dia matoky toy ny liona tanora.
  '10':
  - type: text
    content: Izay mampivily ny mahitsy ho amin'ny lalan-dratsy Dia ho lavo amin'ny lavaka nataony; Fa ny tsy misy tsiny no handova ny soa.
  '11':
  - type: text
    content: Ny manan-karena manao azy ho hendry; Fa ny malahelo izay manan-tsaina dia hizaha toetra azy.
  '12':
  - type: text
    content: Raha ravoravo ny marina, dia be ny famirapiratana; Fa raha misandratra
  - type: note
    content: Na. mitsangana
  - type: text
    content: ' kosa ny ratsy fanahy, dia miery ny vahoaka.'
  '13':
  - type: text
    content: Izay manafina ny fahotany tsy hambinina; Fa izay mitsotra ka mahafoy azy no hahazo famindram-po.
  '14':
  - type: text
    content: Sambatra izay olona matahotra mandrakariva; Fa izay manamafy ny fony no hidiran-doza.
  '15':
  - type: text
    content: Liona mierona sy bera miremby Ny mpanapaka ratsy fanahy amin'ny olona reraka.
  '16':
  - type: text
    content: Ny mpanapaka tsy ampy saina dia mahery mampahory; Izay mankahala ny fieremana no ho ela velona.
  '17':
  - type: text
    content: Izay itambesaran-keloka noho ny fandatsahan-drà dia handositra hatrany an-davaka; Aoka tsy hisy hihazona azy.
  '18':
  - type: text
    content: 'Izay mandeha tsy misy tsiny no ho voavonjy; Fa izay mivadika ka mandeha amin''ny lalana miolikolika no ho lavo tampoka. '
  '19':
  - type: text
    content: Izay miasa ny taniny dia ho voky hanina Fa izay manaraka ny olom-poana
  - type: note
    content: 'Na: zava-poana'
  - type: text
    content: ' ho voky alahelo kosa.'
  '2':
  - type: text
    content: Ny fahotan
  - type: note
    content: 'Na: fikomian'''
  - type: text
    content: '''ny tany mahamaro mpanapaka; Fa ny fisian''ny olona manan-tsaina'
  - type: note
    content: 'Na: manan-tsaina sady mahalala rariny'
  - type: text
    content: ' kosa no mampahateza ny fanjakana'
  - type: note
    content: 'Na: Fa noho ny manan-tsaina no haharetan''ny fahamarinana'
  - type: text
    content: .
  '20':
  - type: text
    content: Izay olona mahatoky tokoa dia ho be fitahiana; Fa izay maimay ta-hanan-karena dia tsy maintsy hohelohina.
  '21':
  - type: text
    content: Tsy mety raha mizaha tavan'olona; Kanefa na dia amin'ny sombin-kanina ihany aza dia sahin'ny olona hanotana.
  '22':
  - type: text
    content: 'Ny mpialona dia maimay ta-hanan-karena; Tsy fantany fa hanjo azy ny alahelo. '
  '23':
  - type: text
    content: Izay mananatra olona no hahazo fitia be rahatrizay Noho izay mandrobo amin'ny lelany.
  '24':
  - type: text
    content: 'Izay mandroba ray sy reny Ka manao hoe: Tsy heloka izany, Dia naman''ny mpanimba.'
  '25':
  - type: text
    content: Izay mierina
  - type: note
    content: 'Na: miavonavona am-po'
  - type: text
    content: ' manetsika ady; Fa izay matoky an''i Jehovah dia hohatavezina.'
  '26':
  - type: text
    content: Izay matoky ny fony dia adala; Fa izay mandeha amin'ny fahendrena no ho afa-miala.
  '27':
  - type: text
    content: Izay manome ny malahelo tsy hanan-java-mahory; Fa izay mitampi-maso hahazo ozona be;
  '28':
  - type: text
    content: Raha misandratra
  - type: note
    content: 'Na: mitsangana'
  - type: text
    content: ' ny ratsy fanahy, dia miery ny vahoaka; Fa raha ringana kosa izy, dia mihamaro ny marina.'
  '3':
  - type: text
    content: Ny malahelo izay mampahory ny mahantra Dia toy ny ranonorana izay manindao ka tsy maha-misy hanina.
  '4':
  - type: text
    content: Izay mahafoy ny lalàna dia mandoka ny ratsy fanahy; Fa izay mitandrina ny lalàna dia mirehitra amin'ny fanoherana azy.
  '5':
  - type: text
    content: Ny ratsy fanahy dia tsy mahalala rariny; Fa izay mitady an'i Jehovah no mahalala ny zavatra rehetra.
  '6':
  - type: text
    content: Ny malahelo izay mandeha amin'ny fahitsiany Dia tsara noho ny manan-karena izay mivadika ka mandeha amin'ny lalana miolikolika.
  '7':
  - type: text
    content: Izay mitandrina ny lalàna no zanaka hendry; Fa izay misakaiza amin'ny mpandany harena dia manome henatra ny rainy.
  '8':
  - type: text
    content: Izay mampitombo ny fananany amin'ny zana-bola sy ny tombony Dia mamory ho an'izay miantra ny malahelo
  '9':
  - type: text
    content: Izay manentsin-tadiny tsy hihaino ny lalàna, Na ny fivavahany aza dia fahavetavetana.
