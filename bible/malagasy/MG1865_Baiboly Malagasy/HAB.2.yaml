document_id: HAB.2,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nilazan'i Jehovah tamin'ny mpaminany ny amin'ny handringanana ny Kaldeana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hitsangana eo ambonin'ny fitazanako aho Ary hijoro eo ambonin'ny manda, Hiandry hahitako izay holazainy amiko Sy izay havaliko amin'ny fitarainako.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa namoron-tsaina izay hahatonga henatra ho an''ny taranakao ianao, Dia ny handringanana firenena maro; Ary nankahà-doza hihatra amin''ny ainao ianao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa hitaraina ny vato ao amin'ny rindrina, Ary ny sakamandimby ao amin'ny trano
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. hazo
      marker-yv: yv-n
    - type: text
      text: ' no hamaly azy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lozan''izay manao vohitra amin''ny fandatsahan-drà Sy manorina tanàna amin''ny heloka! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, tsy avy amin''i Jehovah, Tompon''ny maro, va no hiasan''ny olona ho an''ny afo, Sy hisasaran''ny firenena noho ny zava-poana? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny tany ho feno ny fahalalana ny voninahitr''i Jehovah, Toy ny fanaron''ny rano ny fanambanin''ny ranomasina. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lozan''izay mampisotro divay ny namany Dia ianao izay manampy fahatezerana ka mampahamano azy, Mba hijery ny fitanjahany; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Efa feno henatra ianao, fa tsy voninahitra; Mba sotroy koa, ka mitanjaha
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: aoka ho hita fa tsy voafora ianao'
      marker-yv: yv-n
    - type: text
      text: '; Hatolotra anao ny kapoaka eny an-tanana ankavanan''i Jehovah, Ary fahamenarana no ho amin''ny voninahitrao. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hanody anao ny loza natao tamin''i Libanona Sy ny fandringanana mahatahotra namelezana ny biby, Noho ny ran''ny olona sy ny loza natao tamin''ny tany, Dia tamin''ny tanàna sy ny mponina rehetra ao aminy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahasoa inona ny sarin-javatra voasokitra, No misokitra azy ny mpanao azy? Na ny sarin-javatra an-idina sy ny mpampianatra lainga, No matoky azy izay namorona azy Tamin''ny nanaovany sampy moana? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lozan''izay manao amin''ny hazo hoe: Mifohaza! Ary amin''ny vato moana hoe: Mitsangàna! Hampianatra va ireo ? He! voapetaka takela-bolamena sy volafotsy ihany izy, Nefa tsy misy fanahy akory ao anatiny. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly ahy Jehovah ka nanao hoe: Soraty ny fahitana, ka ataovy velona tsara ny soratra eo amin''ny fàfana, Mba ho azon''ny mihazakazaka hovakina aza'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: mba hihazakazahan''izy mamaky azy'
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehovah dia ao amin'ny tempoliny masina; Mangina eo anatrehany, ry tany rehetra!
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny fahitana dia mbola ho amin''ny fotoan''andro, Ary mikendry ny farany izy ka tsy ho diso; Eny, na dia mitaredretra aza izy, andraso ihany, Fa ho avy tokoa izy ka tsy hijanona. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indro, feno avonavona ny fanahin'ireny, fa tsy mahitsy ao anatiny, Fa ny marina ho velon'ny finoany
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fa ny marina amin''ny finoana no ho velona'
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary koa, mamitaka ny divay; Ny olona miavonavona tsy mba mahatoetra, Dia ilay mitanatana vava tahaka ny fiainan-tsi-hita
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Shoela
      marker-yv: yv-n
    - type: text
      text: ', Eny, toy ny fahafatesana, ka tsy mety voky, Fa manangona ny firenena rehetra ho ao aminy Sy mamory ny olona rehetra ho ao aminy.. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy hanao oha-teny hamelezana azy va ireto rehetra ireto ? Tsy hanao eson-teny sy fitenenana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. fampanonona
      marker-yv: yv-n
    - type: text
      text: ' hanoherana azy va izy ka hanao hoe: Lozan''izay mahery mandroaka ny tsy azy! Mandra-pahoviana! dia ilay mivesatra ny zavatra nalaina ho tsatòka '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy hitsangana tampoka va izay hanaikitra anao, Ary tsy hifoha va izay hanaitaitra anao, Ka ho babony ianao? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa efa namabo firenena maro ianao, Ka dia mba hobaboin''ny sisa rehetra amin''ny firenena kosa, Noho ny ran''ny olona sy ny fandozana natao tamin''ny tany, Dia tamin''ny tanàna sy ny mponina rehetra ao aminy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lozan''izay fatra-pila harena amin''ny tsy marina ho an''ny taranany, Hanaovany ny akaniny any amin''ny avo, Mba tsy ho tratry ny tanan''ny loza '
