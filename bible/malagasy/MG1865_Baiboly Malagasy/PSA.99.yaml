document_id: PSA.99,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanomezam-boninahitra an'Andriamanitra noho ny fahalehibiazany sy ny fahamarinany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehovah no Mpanjaka aoka hangovitra ny firenena; Mipetraka amin''ny kerobima Izy, aoka hihorohoro ny tany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lehibe any Ziona Jehovah; Ary avo ambonin''ny firenena rehetra Izy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka hidera ny anaranao lehibe sy mahatahotra ireo; Fa masina Jehovah. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny herin'ny mpanjaka dia tia rariny; Ampitoerinao ny fahitsiana; Fitsarana sy fahamarinana no ataonao eo amin'i Jakoba.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manandrata an''i Jehovah Andriamanitsika ianareo, Ka miankohofa eo amin''ny fitoeran-tongony; Fa masina Izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mosesy sy Arona tamin''ny mpisorony, Ary Samoela tamin''izay mpiantso ny anarany, Niantso an''i Jehovah ireo, ary namaly: azy Izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niteny taminy tao anatin''ny andri-rahona Izy; Nitandrina ny teni-vavolombelony izy ireo, Dia ny didy izay efa nomeny azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehovah Andriamanitray ô, Hianao no namaly ny nataony; Andriamanitra, Mpamela ny helony, Hianao, Na dia namaly azy noho ny nataony aza.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Asandrato Jehovah Andriamanitsika, Ary miankohofa eo an-tendrombohiny masina; Fa masina Jehovah Andriamanitsika.
