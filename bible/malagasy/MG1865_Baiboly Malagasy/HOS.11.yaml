document_id: HOS.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hamindran'i Jehovah fo amin'ny Isiraely, na dia be aza ny helony
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fony mbola zaza Isiraely, dia tiako izy, ary nantsoiko hiala tany Egypta ny zanako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nony nisy niantso azy, dia vao mainka nandositra ireny izy; Ho an''ireo Bala kosa no amonoany zavatra hatao fanatitra, ary ho an''ny sarin-javatra voasokitra no andoroany ditin-kazo manitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa Izaho no nampianatra an'i Efraima handeha. Eny, notrotroiko tamin'ny sandriko
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. notrotroiny tamin'ny sandriny
    marker-yv: yv-n
  - type: text
    text: ' aza izy. Nefa tsy fantany fa Izaho no nahasitrana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tamin'ny kofehy fitarihana olona no nitarihako azy, dia tamin'ny mahazakan'ny fitiavana; Ary efa toy izay manainga ny fehim-bava
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. zioga
    marker-yv: yv-n
  - type: text
    text: ' eo ambonin''ny valanoranony Aho ka nanolo-kanina azy tsimoramora. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsy hiverina ho any amin''ny tany Egypta izy, fa Asyria no ho mpanjakany, satria tsy nety nibebaka izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary noho ny fisainany dia hisy sabatra hantsodina ao an-tanànany ka handrava sy handevona ny hidiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Minia miodina amiko ny oloko; Ary na dia antsoiny ho amin''ny Avo aza izy, samy tsy mety miainga akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hataoko ahoana e no fahafoy anao, ry Efraima, na ho fanolotra anao, ry Isiraely! Hataoko ahoana e no fanao anao ho tahaka an''i Adma! Hataoko ahoana e no fametraka anao ho tahaka an''i Zeboima! Onena ny foko, mafy loatra ny alaheloko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy hanontolo fo Aho, na handringana an'i Efraima intsony; Fa Andriamanitra Aho, fa tsy olona, dia ny Iray Masina ao aminao, ka dia tsy ho avy amim-pahatezerana mirehitra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tsy hiditra ao an-tanàna Aho'
    marker-yv: yv-n
  - type: text
    text: ' Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Harahin''ireny Jehovah, hierona toy ny liona Izy; Eny, Izy no hierona, dia hanatona amin-kovitra avy any andrefana ny zanaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hanatona amin-kovitra avy any Egypta toy ny voronkely izy, ary avy any amin'ny tany Asyria toy ny voromailala; Ka dia hampitoeriko ao an-tranony izy, hoy Jehovah.
