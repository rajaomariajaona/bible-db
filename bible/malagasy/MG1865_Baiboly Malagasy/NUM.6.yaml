document_id: NUM.6,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tso-drano fanaon'ny mpisorona
  - type: text
    content: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  '10':
  - type: text
    content: 'ary amin''ny andro fahavalo dia hitondra domohina roa na zana-boromailala roa ho eo amin''ny mpisorona, eo anoloan''ny varavaran''ny trano-lay fihaonana izy. '
  '11':
  - type: text
    content: 'Ary ny mpisorona dia hanatitra ny anankiray ho fanatitra noho ny ota, ary ny anankiray kosa ho fanatitra dorana, dia hanao fanavotana ho azy, satria nanota ny amin''ny faty izy; ary hanamasina ny lohany amin''izany andro izany izy. '
  '12':
  - type: text
    content: 'Dia hanokana ho an''i Jehovah ny androny fitokanany izy ka hitondra ondrilahy iray izay iray taona ho fanati-panonerana; fa ho very ny andro teo aloha, satria voaloto ny fitokanany '
  '13':
  - type: text
    content: 'Ary izao no lalàna ny amin''ny Nazirita: Rehefa tapitra ny andro fitokanany, dia ho entina ho eo anoloan''ny varavaran''ny trano-lay fihaonana izy; '
  '14':
  - type: text
    content: 'ary hanatitra ny fanatiny ho an''i Jehovah izy, dia ondrilahy iray izay iray taona tsy misy kilema ho fanatitra dorana, ary ondrivavy iray izay iray taona tsy misy kilema ho fanatitra noho ny ota, ary ondrilahy iray tsy misy kilema ho fanati-pihavanana, '
  '15':
  - type: text
    content: 'ary mofo tsy misy masirasira iray harona, dia mofo atao amin''ny koba tsara toto voaharo diloilo sy mofo manify tsy misy masirasira sady voahoso-diloilo, mbamin''ny fanatitra hohanina sy ny fanatitra aidina momba azy. '
  '16':
  - type: text
    content: 'Dia haterin''ny mpisorona eo anatrehan''i Jehovah ireo; ary hateriny koa ny fanatiny noho ny ota sy ny fanatitra dorany; '
  '17':
  - type: text
    content: 'dia hateriny ny ondrilahy ho fanati-pihavanana ho an''i Jehovah mbamin''ny mofo tsy misy masirasira iray harona; ary haterin''ny mpisorona koa ny fanatitra hohaniny sy ny fanatitra aidiny. '
  '18':
  - type: text
    content: 'Ary ny Nazirita hanaratra, ny lohany izay fitokanany eo anoloan''ny varavaran''ny trano-lay fihaonana, ary horaisiny ny volon-dohany fitokanany ka hataony eo amin''ny afo izay eo ambanin''ny fanati-pihavanana. '
  '19':
  - type: text
    content: 'Dia halain''ny mpisorona ny sorok''ondrilahy izay efa masaka sy mofo iray tsy misy masirasira avy amin''ny harona ary mofo manify iray tsy misy masirasira ka hataony eo amin''ny tanan''ny Nazirita, rehefa voaharatra ny lohany izay fitokanany. '
  '2':
  - type: text
    content: 'Mitenena amin''ny Zanak''Isiraely hoe: Raha misy lehilahy na vehivavy mivoady hitokana ho Nazirita mba hitokana ho an''i Jehovah, '
  '20':
  - type: text
    content: Dia hahevahevan'ny mpisorona ireo ho fanatitra ahevaheva eo anatrehan'i Jehovah; ho masina izany ho an'ny mpisorona ho fanampin'ny tratra ahevaheva sy ny soroka asandratra; ary rehefa afaka izany, dia vao mahazo misotro divay ny Nazirita.
  '21':
  - type: text
    content: Izany no lalàna ny amin'ny Nazirita, izay mivoady hitondra fanatitra ho an'i Jehovah noho ny fitokanany, afa-tsy izay zavatra hafa tratry ny ananany; araka ny voady izay nivoadiany no hataony, araka ny lalàna ny amin'ny fitokanany.
  '22':
  - type: text
    content: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  '23':
  - type: text
    content: 'Mitenena amin''i Arona sy ny zanany hoe: Izao no teny ho entinareo mitso-drano ny Zanak''Isiraely: '
  '24':
  - type: text
    content: 'Hitahy anao anie Jehovah ka hiaro anao; '
  '25':
  - type: text
    content: 'Hampamirapiratra ny tavany aminao anie Jehovah ka hamindra fo aminao; '
  '26':
  - type: text
    content: 'Hanandratra ny tavany aminao anie Jehovah ka hanome anao fiadanana. '
  '27':
  - type: text
    content: Dia hametraka ny anarako amin'ny Zanak'Isiraely izy; ary Izaho hitahy azy.
  '3':
  - type: text
    content: 'dia hifady divay sy toaka izy; tsy hisotro divay efa maharikivy na toaka efa maharikivy izy, ary tsy hisotro ranom-boaloboka izy, na hihinana voaloboka akory, na ny lena, na ny maina. '
  '4':
  - type: text
    content: 'Amin''ny andro fitokanany rehetra dia tsy hihinana izay atao amin''ny voaloboka hatramin''ny voany ka hatramin''ny hodiny izy. '
  '5':
  - type: text
    content: 'Amin''ny andro rehetra izay nivoadiany hitokana dia tsy hokasihin-kareza ny lohany; mandra-pahatapitry ny andro izay nitokanany ho an''i Jehovah dia ho masina izy, ka havelany haniry ny volondohany. '
  '6':
  - type: text
    content: 'Amin''ny andro rehetra izay itokanany ho an''i Jehovah dia tsy hiditra am-paty izy; '
  '7':
  - type: text
    content: 'aoka tsy handoto tena izy na dia amin''ny rainy, na ny reniny, na ny rahalahiny, na ny anabaviny aza, raha maty ireo, satria eo amin''ny lohany ny fitokanana ho an''Andriamaniny. '
  '8':
  - type: text
    content: 'Amin''ny andro fitokanany rehetra dia ho masina ho an''i Jehovah izy. '
  '9':
  - type: text
    content: 'Ary raha misy olona maty tampoka eo anilany ka mandoto ny lohany izay fitokanany dia hanaratra ny lohany amin''ny andro fanadiovana azy izy, dia amin''ny andro fahafito no hanaratany azy; '
