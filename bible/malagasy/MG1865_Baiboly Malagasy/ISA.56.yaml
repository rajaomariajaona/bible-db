document_id: ISA.56,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahadiso ny lehiben'ny Isiraely, sy ny nataon'ny olona koa
  - type: text
    content: 'Izao no lazain''i Jehovah: Tandremo ny rariny, ary manaova ny marina, fa efa madiva ho tonga ny famonjeko, ary efa hiseho ny fahamarinako. '
  '10':
  - type: text
    content: 'Jamba ny mpitiliny, samy tsy mahalala izy rehetra, amboa moana avokoa, izy rehetra, ka tsy mahavovo, manonofy izy, eny, mandry ka torimaso. '
  '11':
  - type: text
    content: 'Lian-kanina ireny amboa ireny; ka tsy mahalala voky, sady mpiandry tsy mahafantatra ireny; samy efa nivily ho amin''ny lalany avy izy rehetra, samy mankamin''ny filàny harena avokoa izy rehetra. '
  '12':
  - type: text
    content: Avia, ianareo, hoy ireny fa haka divay aho, ary aoka hiboboka toaka isika; ary rahampitso dia ho tahaka ny anio ihany, eny, hanoatra lavitra aza
  '2':
  - type: text
    content: 'Sambatra ny zanak''olombelona izay manao izany, ary ny zanak''olona izay mitana izany, dia izay mitandrina ny Sabata ka tsy manao azy ho tsy masina sady miaro ny tanany tsy hanao izay ratsy akory. '
  '3':
  - type: text
    content: 'Ary aoka ny hafa firenena izay efa manaiky ho an''i Jehovah tsy hanao hoe: Hesorin''i Jehovah tsy ho isan''ny olony tokoa aho; Ary aoka ny ionoka tsy hanao hoe: Indro, hazo maina aho. '
  '4':
  - type: text
    content: 'Fa izao no lazain''i Jehovah: Ny amin''ny ionoka izay mitandrina ny Sabatako sy mifidy izay sitrako ary mitana ny fanekeko, '
  '5':
  - type: text
    content: 'Dia hanaovako fahatsiarovana sy anarana ao an-tranoko sy ao anatin''ny mandako izy, izay tsara lavitra noho ny an''ny zanakalahy sy ny zanakavavy; dia anarana mandrakizay izay tsy hesorina no homeko azy. '
  '6':
  - type: text
    content: 'Ary ny hafa firenena izay efa manaiky ho an''i Jehovah mba hanompo Azy sy ho tia ny anaran''i Jehovah mba ho mpanompony dia izay rehetra mitandrina ny Sabata ka tsy manao azy ho tsy masina sady mitana ny fanekeko '
  '7':
  - type: text
    content: 'Dia ho entiko ho any an-tendrombohitro masina, ka hampifaliko ao an-tranoko fivavahana; ny fanatitra dorany sy ny fanatitra hafa alatsa-drà dia hankasitrahana eo ambonin''ny alitarako, fa ny tranoko hatao hoe trano fivavahana ho an''ny firenena rehetra. '
  '8':
  - type: text
    content: 'Izao no lazain''i Jehovah Tompo, Izay mamory ny Isiraely voaroaka: Mbola hamory ny sasany koa ho eo aminy Aho, hanampy izay efa voavory eo aminy.'
  '9':
  - type: text
    content: He, ianareo bibi-dia rehetra! Avia hihinana, ianareo biby rehetra any an'ala
  - type: note
    content: 'Na: He, ianareo bibi-dia rehetra, Avia hihinana ny biby rehetra any an''ala'
  - type: text
    content: '. '
