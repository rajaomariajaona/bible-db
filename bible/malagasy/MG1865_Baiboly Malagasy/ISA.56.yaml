document_id: ISA.56
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahadiso ny lehiben'ny Isiraely, sy ny nataon'ny olona koa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no lazain''i Jehovah: Tandremo ny rariny, ary manaova ny marina, fa efa madiva ho tonga ny famonjeko, ary efa hiseho ny fahamarinako. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sambatra ny zanak''olombelona izay manao izany, ary ny zanak''olona izay mitana izany, dia izay mitandrina ny Sabata ka tsy manao azy ho tsy masina sady miaro ny tanany tsy hanao izay ratsy akory. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary aoka ny hafa firenena izay efa manaiky ho an''i Jehovah tsy hanao hoe: Hesorin''i Jehovah tsy ho isan''ny olony tokoa aho; Ary aoka ny ionoka tsy hanao hoe: Indro, hazo maina aho. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa izao no lazain''i Jehovah: Ny amin''ny ionoka izay mitandrina ny Sabatako sy mifidy izay sitrako ary mitana ny fanekeko, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hanaovako fahatsiarovana sy anarana ao an-tranoko sy ao anatin''ny mandako izy, izay tsara lavitra noho ny an''ny zanakalahy sy ny zanakavavy; dia anarana mandrakizay izay tsy hesorina no homeko azy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny hafa firenena izay efa manaiky ho an''i Jehovah mba hanompo Azy sy ho tia ny anaran''i Jehovah mba ho mpanompony dia izay rehetra mitandrina ny Sabata ka tsy manao azy ho tsy masina sady mitana ny fanekeko '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia ho entiko ho any an-tendrombohitro masina, ka hampifaliko ao an-tranoko fivavahana; ny fanatitra dorany sy ny fanatitra hafa alatsa-drà dia hankasitrahana eo ambonin''ny alitarako, fa ny tranoko hatao hoe trano fivavahana ho an''ny firenena rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izao no lazain''i Jehovah Tompo, Izay mamory ny Isiraely voaroaka: Mbola hamory ny sasany koa ho eo aminy Aho, hanampy izay efa voavory eo aminy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He, ianareo bibi-dia rehetra! Avia hihinana, ianareo biby rehetra any an'ala
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: He, ianareo bibi-dia rehetra, Avia hihinana ny biby rehetra any an''ala'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jamba ny mpitiliny, samy tsy mahalala izy rehetra, amboa moana avokoa, izy rehetra, ka tsy mahavovo, manonofy izy, eny, mandry ka torimaso. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lian-kanina ireny amboa ireny; ka tsy mahalala voky, sady mpiandry tsy mahafantatra ireny; samy efa nivily ho amin''ny lalany avy izy rehetra, samy mankamin''ny filàny harena avokoa izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Avia, ianareo, hoy ireny fa haka divay aho, ary aoka hiboboka toaka isika; ary rahampitso dia ho tahaka ny anio ihany, eny, hanoatra lavitra aza
