document_id: SNG.7,96
type_code: plt
verses:
  '1':
  - type: text
    content: Miverena, miverena, ry Solemita; Miverena, miverena, mba hijerenay anao. Inona no hitanareo amin'ny Solemita? Dihy tahaka ny an'i Mahanaima
  - type: note
    content: 'Na: ataon''ny mpandihy roa tonta;'
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Ny vavanao dia toy ny divay tsara, eny, divay mikorotsaka mora eo an-tendan''ny malalako sady miditra misononoka amin''ny molotry ny matory. '
  '11':
  - type: text
    content: An'ny malalako aho, sady manina ahy
  - type: note
    content: Heb. ho amiko ny faniriany;
  - type: text
    content: ' izy. '
  '12':
  - type: text
    content: 'Avia, ry malalako, aoka handeha ho any an-tsaha isika; Andeha handry any ambanivohitra isika. '
  '13':
  - type: text
    content: Dia aoka hifoha maraina koa ho any an-tanim-boaloboka isika; Aoka hizahantsika raha mitsimoka ny voaloboka, sy mivelatra ny voniny, ary mamony ny ampongaben-danitra any no hanehoako ny fitiavako anao. Mamerovero tsara ny dodaima
  - type: note
    content: mandragora
  - type: text
    content: ', sady ao am-bavahadintsika misy voankazo tsara samy hafa, na ny vao na ny ela: Efa notehiriziko ho anao izany, ry malalako.'
  '2':
  - type: text
    content: Endrey! mahate-hijery ny famindran'ny tongotrao mikiraro
  - type: note
    content: Heb. mikapa
  - type: text
    content: ', ry zazavavy zanak''andriana! Dia tahaka ny firavaka ny amboam-penao, nataon''ny tanan''ny mahay zavatra. '
  '3':
  - type: text
    content: 'Ny foitrao dia tahaka ny tomaboha kivorivory; Tsy ho diso divay noharoharoan-java-manitra anie izy! Ny kibonao dia tahaka ny vary tritika voatoby sady voaravaka lilia manodidina. '
  '4':
  - type: text
    content: 'Ny nononao roa dia tahaka ny gazela kambana mbola tanora. '
  '5':
  - type: text
    content: Ny vozonao dia tahaka ny tilikambo ivory; Ny masonao dia tahaka ny kamory any Hesbona, dia eo am-bavahadin'ny tanàna be olona
  - type: note
    content: 'Na: eo am-bavahadin''i Beta-rabina'
  - type: text
    content: '; Ny oronao dia tahaka ny tilikambo any Libanona, izay manandrify an''i Damaskosy. '
  '6':
  - type: text
    content: 'Ny lohanao dia tahaka an''i Karmela, ary ny volon-dohanao milantolanto dia somary volomparasy. Voatanan''ny volo olioly ny mpanjaka! '
  '7':
  - type: text
    content: Endrey! tsara tarehy sady mahafinaritra ianao, ry malala
  - type: note
    content: Heb. ry fitiavana
  - type: text
    content: ', amin''izao zava-mahafinaritra rehetra izao! '
  '8':
  - type: text
    content: Izato tsangananao dia tahaka ny rofia
  - type: note
    content: palma
  - type: text
    content: ', Ary ny nononao dia tahaka ny sampahony. '
  '9':
  - type: text
    content: 'Hoy izaho: Hananika ny rofia'
  - type: note
    content: palma
  - type: text
    content: ' aho ka handray ny rantsany; Ary aoka ny nononao ho toy ny sampahom-boaloboka amiko, ary ny fofonainao ho tahaka ny an''ny poma,'
