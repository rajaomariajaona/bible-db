document_id: SNG.7
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Miverena, miverena, ry Solemita; Miverena, miverena, mba hijerenay anao. Inona no hitanareo amin'ny Solemita? Dihy tahaka ny an'i Mahanaima
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ataon''ny mpandihy roa tonta;'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Endrey! mahate-hijery ny famindran'ny tongotrao mikiraro
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mikapa
    marker-yv: yv-n
  - type: text
    text: ', ry zazavavy zanak''andriana! Dia tahaka ny firavaka ny amboam-penao, nataon''ny tanan''ny mahay zavatra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny foitrao dia tahaka ny tomaboha kivorivory; Tsy ho diso divay noharoharoan-java-manitra anie izy! Ny kibonao dia tahaka ny vary tritika voatoby sady voaravaka lilia manodidina. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny nononao roa dia tahaka ny gazela kambana mbola tanora. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny vozonao dia tahaka ny tilikambo ivory; Ny masonao dia tahaka ny kamory any Hesbona, dia eo am-bavahadin'ny tanàna be olona
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: eo am-bavahadin''i Beta-rabina'
    marker-yv: yv-n
  - type: text
    text: '; Ny oronao dia tahaka ny tilikambo any Libanona, izay manandrify an''i Damaskosy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny lohanao dia tahaka an''i Karmela, ary ny volon-dohanao milantolanto dia somary volomparasy. Voatanan''ny volo olioly ny mpanjaka! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Endrey! tsara tarehy sady mahafinaritra ianao, ry malala
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ry fitiavana
    marker-yv: yv-n
  - type: text
    text: ', amin''izao zava-mahafinaritra rehetra izao! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izato tsangananao dia tahaka ny rofia
  - type: usfm
    marker: x
    children:
    - type: text
      text: palma
    marker-yv: yv-n
  - type: text
    text: ', Ary ny nononao dia tahaka ny sampahony. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hoy izaho: Hananika ny rofia'
  - type: usfm
    marker: x
    children:
    - type: text
      text: palma
    marker-yv: yv-n
  - type: text
    text: ' aho ka handray ny rantsany; Ary aoka ny nononao ho toy ny sampahom-boaloboka amiko, ary ny fofonainao ho tahaka ny an''ny poma,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny vavanao dia toy ny divay tsara, eny, divay mikorotsaka mora eo an-tendan''ny malalako sady miditra misononoka amin''ny molotry ny matory. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: An'ny malalako aho, sady manina ahy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ho amiko ny faniriany;
    marker-yv: yv-n
  - type: text
    text: ' izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Avia, ry malalako, aoka handeha ho any an-tsaha isika; Andeha handry any ambanivohitra isika. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia aoka hifoha maraina koa ho any an-tanim-boaloboka isika; Aoka hizahantsika raha mitsimoka ny voaloboka, sy mivelatra ny voniny, ary mamony ny ampongaben-danitra any no hanehoako ny fitiavako anao. Mamerovero tsara ny dodaima
  - type: usfm
    marker: x
    children:
    - type: text
      text: mandragora
    marker-yv: yv-n
  - type: text
    text: ', sady ao am-bavahadintsika misy voankazo tsara samy hafa, na ny vao na ny ela: Efa notehiriziko ho anao izany, ry malalako.'
