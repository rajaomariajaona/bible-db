document_id: LEV.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanatitra hohanina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary raha misy manatitra fanatitra hohanina ho an''i Jehovah, dia koba tsara toto no hataony fanatiny; ary hanidina diloilo aminy izy sy hanisy ditin-kazo mani-pofona eo amboniny. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hitondra azy ho amin''ireo mpisorona, zanak''i Arona, izy, dia handraofan''ireo eran-tànan-ila ny kobany sy ny diloilony mbamin''ny ditin-kazo manipofona rehetra; ary hodoran''ny mpisorona ho fofona eo ambonin''ny alitara izany fanati-pahatsiarovana avy aminy izany; dia fanatitra atao amin''ny afo ho hanitra ankasitrahana ho an''i Jehovah izany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ny sisa amin''ny fanatitra hohanina dia ho an''i Arona sy ny zanany; ho masina dia masina avy amin''ny fanatitra atao amin''ny afo ho an''i Jehovah izany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary raha manatitra fanatitra hohanina voaendy amin''ny fanendasa-mofo ianao, dia aoka ho mofo tsy misy masirasira atao amin''ny koba tsara toto sady voaharo diloilo sy mofo manify tsy misy masirasira sady voahoso-diloilo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary raha fanatitra hohanina voaendy amin''ny lapoely no fanatitrao, dia aoka ho koba tsara toto voaharo diloilo sady tsy misy masirasira. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hovakivakinao izy ary hanidinanao diloilo; dia fanatitra hohanina izany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary raha fanatitra hohanina voahandro amin''ny vilany no fanatitrao, dia koba tsara toto asian-diloilo no hatao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ho entinao ho an''i Jehovah ny fanatitra hohanina izay atao amin''ireo zavatra ireo; ary rehefa voatitra eo amin''ny mpisorona izany, dia ho entiny eo amin''ny alitara. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny mpisorona haka ny fanati-pahatsiarovana avy amin''ny fanatitra hohanina ka handoro azy ho fofona eo ambonin''ny alitara; dia fanatitra atao amin''ny afo ho hanitra ankasitrahana ho an''i Jehovah izany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny sisa amin''ny fanatitra hohanina dia ho an''i Arona sy ny zanany; ho masina dia masina avy amin''ny fanatitra atao amin''ny afo ho an''i Jehovah izany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny fanatitra hohanina rehetra, izay aterinareo ho an''i Jehovah, dia aza asiana zava-maharikivy; fa ny masirasira sy ny tantely dia samy tsy hangalanareo hodorana ho fofona ho fanatitra atao amin''ny afo ho an''i Jehovah; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'fa ho fanatitra voaloham-bokatra ihany no hahazoanareo manatitra ireo ho an''i Jehovah; kanefa tsy hakarina eo ambonin''ny alitara ho hanitra ankasitrahana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary samy asio sira ny fanatitra hohaninao rehetra; ary ny siran''ny faneken''Andriamanitrao dia aza atsahatra amin''ny fanatitra hohaninao; fa manatera sira miaraka amin''ny fanatitrao rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary raha manatitra fanatitra hohanina ho an''i Jehovah avy amin''ny voaloham-bokatra ianao, dia salohim-bary voaendy amin''ny afo, dia lango avy amin''ny salohy maitso, no haterinao ho fanatitra hohanina avy amin''ny voaloham-bokatrao. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hasianao diloilo izy, sady hasianao ditin-kazo mani-pofona eo amboniny; dia fanatitra hohanina izany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary hodoran'ny mpisorona ho fofona ny fanati-pahatsiarovana avy amin'ny langony sy avy amin'ny diloilony ary ny ditin-kazo mani-pofona rehetra; dia fanatitra atao amin'ny afo ho an'i Jehovah izany.
