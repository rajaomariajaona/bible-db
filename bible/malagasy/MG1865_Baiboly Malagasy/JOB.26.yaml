document_id: JOB.26,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny navalin'i Joba
  - type: text
    content: 'Dia namaly Joba ka nanao hoe:'
  '10':
  - type: text
    content: Asiany faritra manodidina eny ambonin'ny rano. Hatramin'izay ihaonan'ny mazava sy ny maizina.
  '11':
  - type: text
    content: Ny andrin'ny lanitra nihozongozona sady ankona amin'ny teny mafy ataony.
  '12':
  - type: text
    content: Ny heriny no entiny mampanonja ny ranomasina, ary ny fahendreny no anorotoroany an-dRahaba
  - type: note
    content: Izahao ix. 13
  - type: text
    content: ;
  '13':
  - type: text
    content: Ny fanahiny no mahatsara tarehy ny lanitra; Ny tànany no nitomboka ny menarana mandositra.
  '14':
  - type: text
    content: Indro, ireny dia vao ny sisintsisin'ny alehany ihany aza, ary siosion-teny mamelovelo no andrenesantsika Azy; Fa raha ny fikotrokotroky ny heriny, iza moa no mahatakatra izany?
  '2':
  - type: text
    content: Endrey! nanohana ny tsy manan-kery ianao sy nampahatanjaka ny sandry malemy!
  '3':
  - type: text
    content: Ary nanolo-tsaina ny tsy hendry sy nampahafantatra izay fahendrena betsaka!
  '4':
  - type: text
    content: Iza no nandaharanao teny? Ary fanahin'izay no nivoaka avy tao aminao?
  '5':
  - type: text
    content: Ny matoatoa dia ampanaintainina Any ambanin'ny rano sy any ambanin'ny mponina any.
  '6':
  - type: text
    content: Ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola
  - type: text
    content: ' miharihary eo anatrehany, ary ny fandringanana dia tsy mirakotra.'
  '7':
  - type: text
    content: Mamelatra ny lanitra avaratra ho eny ambonin'ny habakabaka Izy ary manantona ny tany amin'ny tsy misy.
  '8':
  - type: text
    content: Fonosiny amin'ireo rahony matevina ny rano, nefa ny fanambanin'ny rahona tsy mety triatra.
  '9':
  - type: text
    content: Manakona ny seza fiandrianany tsy ho hitantsika Izy amin'ny amelarany ny rahony hanarona azy.
