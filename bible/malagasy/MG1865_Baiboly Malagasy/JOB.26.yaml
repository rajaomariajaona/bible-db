document_id: JOB.26
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny teny navalin'i Joba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia namaly Joba ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Endrey! nanohana ny tsy manan-kery ianao sy nampahatanjaka ny sandry malemy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary nanolo-tsaina ny tsy hendry sy nampahafantatra izay fahendrena betsaka!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Iza no nandaharanao teny? Ary fanahin'izay no nivoaka avy tao aminao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny matoatoa dia ampanaintainina Any ambanin'ny rano sy any ambanin'ny mponina any.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: ' miharihary eo anatrehany, ary ny fandringanana dia tsy mirakotra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mamelatra ny lanitra avaratra ho eny ambonin'ny habakabaka Izy ary manantona ny tany amin'ny tsy misy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fonosiny amin'ireo rahony matevina ny rano, nefa ny fanambanin'ny rahona tsy mety triatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Manakona ny seza fiandrianany tsy ho hitantsika Izy amin'ny amelarany ny rahony hanarona azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Asiany faritra manodidina eny ambonin'ny rano. Hatramin'izay ihaonan'ny mazava sy ny maizina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny andrin'ny lanitra nihozongozona sady ankona amin'ny teny mafy ataony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny heriny no entiny mampanonja ny ranomasina, ary ny fahendreny no anorotoroany an-dRahaba
  - type: usfm
    marker: x
    children:
    - type: text
      text: Izahao ix. 13
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny fanahiny no mahatsara tarehy ny lanitra; Ny tànany no nitomboka ny menarana mandositra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Indro, ireny dia vao ny sisintsisin'ny alehany ihany aza, ary siosion-teny mamelovelo no andrenesantsika Azy; Fa raha ny fikotrokotroky ny heriny, iza moa no mahatakatra izany?
