document_id: JOB.26,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny teny navalin'i Joba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly Joba ka nanao hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Asiany faritra manodidina eny ambonin'ny rano. Hatramin'izay ihaonan'ny mazava sy ny maizina.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny andrin'ny lanitra nihozongozona sady ankona amin'ny teny mafy ataony.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny heriny no entiny mampanonja ny ranomasina, ary ny fahendreny no anorotoroany an-dRahaba
    - type: usfm
      marker: x
      children:
      - type: text
        text: Izahao ix. 13
      marker-yv: yv-n
    - type: text
      text: ;
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fanahiny no mahatsara tarehy ny lanitra; Ny tànany no nitomboka ny menarana mandositra.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indro, ireny dia vao ny sisintsisin'ny alehany ihany aza, ary siosion-teny mamelovelo no andrenesantsika Azy; Fa raha ny fikotrokotroky ny heriny, iza moa no mahatakatra izany?
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Endrey! nanohana ny tsy manan-kery ianao sy nampahatanjaka ny sandry malemy!
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nanolo-tsaina ny tsy hendry sy nampahafantatra izay fahendrena betsaka!
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Iza no nandaharanao teny? Ary fanahin'izay no nivoaka avy tao aminao?
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny matoatoa dia ampanaintainina Any ambanin'ny rano sy any ambanin'ny mponina any.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fiainan-tsi-hita
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Sheola
      marker-yv: yv-n
    - type: text
      text: ' miharihary eo anatrehany, ary ny fandringanana dia tsy mirakotra.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mamelatra ny lanitra avaratra ho eny ambonin'ny habakabaka Izy ary manantona ny tany amin'ny tsy misy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fonosiny amin'ireo rahony matevina ny rano, nefa ny fanambanin'ny rahona tsy mety triatra.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manakona ny seza fiandrianany tsy ho hitantsika Izy amin'ny amelarany ny rahony hanarona azy.
