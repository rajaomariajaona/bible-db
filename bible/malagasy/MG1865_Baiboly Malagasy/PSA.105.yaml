document_id: PSA.105,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanomezam-boninahitra an'Andriamanitra noho ny asany mahagaga tamin'ny nitondrany ny Isiraely nivoaka avy tany Egypta
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Miderà an''i Jehovah, miantsoa ny anarany; Ataovy fantatra any amin''ny firenena ny asany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Izay naoriny ho lalana ho an''i Jakoba, Sy ho fanekena mandrakizay ho an''Isiraely, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ka nataony hoe: Homeko anao ny tany Kanana, Ho lovanareo voazara amin''ny famolaina, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fony mbola olom-bitsy izy, Eny, vitsy sady vahiny tao, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary nifindrafindra tany amin''ny firenena, Sy nifindrafindra fanjakana ho amin''ny firenen-kafa, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Tsy nisy navelany hampahory azy, Ary nananatra mpanjaka Izy noho ny amin''ireo hoe: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Aza manendry ireo voahosotro, Ary aza manisy ratsy ireo mpaminaniko. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia niantso ny mosary ho amin''ny tany Izy; Notapahiny avokoa ny mofo rehetra, izay tohan''aina; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Naniraka lehilahy hialoha azy Izy; Josefa namidy ho andevo; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Nampijaliny tamin''ny fatorana ny tongony; Nogadrany vy izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Mandra-pahatongan''ny fotoana hahatanterahan''ny teniny; Nizaha toetra azy ny tenin''i Jehovah. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mihirà ho Azy, mankalazà Azy; Saintsaino ny fahagagana rehetra ataony. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Naniraka ny mpanjaka hamaha azy, Eny, ny mpanapaka ny vahoaka, mba handefa azy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Nanao azy ho tompon''ny tranony izy Sy ho mpanapaka ny fananany rehetra, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Mba hamatotra ny mpanapaka araka ny sitrapony, Sy hampianatra fahendrena ny loholony.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary Isiraely nankany Egypta; Eny, Jakoba nivahiny tany amin''ny tanin''i Hama. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia nahamaro ny taranaky ny olony ho be indrindra Izy ka nampahery azy noho ny fahavalony. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Nampiova ny fon''ireny hankahala ny olony Izy Sy hihendry ny mpanompony. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Naniraka an''i Mosesy mpanompony Sy Arona izay nofidiny Izy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary izy ireo nanao ny famantarany teo aminy Sy fahagagana tany amin''ny tanin''i Hama. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Nahatonga aizina Izy ka nahamaizina; Ary tsy nandà ny teniny izy ireo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Nahatonga ny ranony ho rà Izy Ka nahafaty ny hazandranony. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ataovy ho reharehanareo ny anarany masina; Aoka hifaly ny fon'izay mitady an'i Jehovah.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Nisy sahona betsaka ny taniny, Eny, na dia hatrao an-trano fandrian''ny mpanjakany aza. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Niteny Izy, dia tonga ny lalitra betsaka
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fihitra, na kalalao'
      marker-yv: yv-n
    - type: text
      text: ' Sy ny moka teny amin''ny faritaniny rehetra. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Nahatonga havandra ho solon''ny ranonorana Izy Sy afo midedadeda teny amin''ny taniny. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Namely ny voalobony sy ny aviaviny Izy Ka nanapatapaka ny hazo teo amin''ny taniny. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Niteny Izy, dia tonga ny valala Sy ny sompanga tsy hita isa; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Dia nihinana ny zava-maitso rehetra teny amin''ny taniny ireny Ka nandany ny vokatry ny taniny. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ary namely ny lahimatoa rehetra tany amin''ny taniny Izy, Dia ny voalohan''ainy rehetra. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary dia nitondra ny olony nivoaka Izy sady nampahazo azy volafotsy sy volamena; Ary tsy nisy nangozohozo na dia iray akory aza tamin''ny fireneny. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Faly Egypta tamin'ny nahalasanany; Fa efa nahazo azy ny fahatahorana ireo.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Namelatra rahona ho fialokalofana Izy Ary afo ho fanazavana nony alina. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mitadiava an''i Jehovah sy ny heriny Katsaho mandrakariva ny tavany. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Nangataka izy ireo, dia nahatonga papelika Izy, Ary mofon-danitra no namokisany azy. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Nanokatra ny vatolampy Izy, dia nigororoana ny rano Ka nandriaka tamin''ny tany maina ho renirano. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Fa nahatsiaro ny teniny masina Sy Abrahama mpanompony Izy, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Dia nitondra ny olony nivoaka tamin''ny fifaliana Izy Ary ny voafidiny tamin''ny fihobiana; '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Ka dia nanome azy ny tanin''ny jentilisa Izy; Ary nandova ny vitan''ny firenena maro ireny, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Mba hitandremany ny didiny, Sy hankatoavany ny lalàny. Haleloia.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tsarovy ny asa mahagaga natao-ny Dia ny fahagagany sy ny fitsaran''ny vavany, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ry taranak''i Abrahama mpanom-pony, Dia ianareo olom-boafidiny, taranak''i Jakoba. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Jehovah, Izy no Andriamanitsika; Manerana ny tany rehetra ny fitsarany.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mahatsiaro ny fanekeny mandrakizay Izy, Dia ilay teny izay voadidiny ho an''ny taranaka arivo mandimby, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Eny, ilay nataony tamin''i Abrahama, Sy ny fianianany tamin''Isaka; '
