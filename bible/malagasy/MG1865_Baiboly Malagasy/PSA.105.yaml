document_id: PSA.105,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanomezam-boninahitra an'Andriamanitra noho ny asany mahagaga tamin'ny nitondrany ny Isiraely nivoaka avy tany Egypta
  - type: text
    content: 'Miderà an''i Jehovah, miantsoa ny anarany; Ataovy fantatra any amin''ny firenena ny asany. '
  '10':
  - type: text
    content: 'Izay naoriny ho lalana ho an''i Jakoba, Sy ho fanekena mandrakizay ho an''Isiraely, '
  '11':
  - type: text
    content: 'Ka nataony hoe: Homeko anao ny tany Kanana, Ho lovanareo voazara amin''ny famolaina, '
  '12':
  - type: text
    content: 'Fony mbola olom-bitsy izy, Eny, vitsy sady vahiny tao, '
  '13':
  - type: text
    content: 'Ary nifindrafindra tany amin''ny firenena, Sy nifindrafindra fanjakana ho amin''ny firenen-kafa, '
  '14':
  - type: text
    content: 'Tsy nisy navelany hampahory azy, Ary nananatra mpanjaka Izy noho ny amin''ireo hoe: '
  '15':
  - type: text
    content: 'Aza manendry ireo voahosotro, Ary aza manisy ratsy ireo mpaminaniko. '
  '16':
  - type: text
    content: 'Dia niantso ny mosary ho amin''ny tany Izy; Notapahiny avokoa ny mofo rehetra, izay tohan''aina; '
  '17':
  - type: text
    content: 'Naniraka lehilahy hialoha azy Izy; Josefa namidy ho andevo; '
  '18':
  - type: text
    content: 'Nampijaliny tamin''ny fatorana ny tongony; Nogadrany vy izy. '
  '19':
  - type: text
    content: 'Mandra-pahatongan''ny fotoana hahatanterahan''ny teniny; Nizaha toetra azy ny tenin''i Jehovah. '
  '2':
  - type: text
    content: 'Mihirà ho Azy, mankalazà Azy; Saintsaino ny fahagagana rehetra ataony. '
  '20':
  - type: text
    content: 'Naniraka ny mpanjaka hamaha azy, Eny, ny mpanapaka ny vahoaka, mba handefa azy. '
  '21':
  - type: text
    content: 'Nanao azy ho tompon''ny tranony izy Sy ho mpanapaka ny fananany rehetra, '
  '22':
  - type: text
    content: Mba hamatotra ny mpanapaka araka ny sitrapony, Sy hampianatra fahendrena ny loholony.
  '23':
  - type: text
    content: 'Ary Isiraely nankany Egypta; Eny, Jakoba nivahiny tany amin''ny tanin''i Hama. '
  '24':
  - type: text
    content: 'Dia nahamaro ny taranaky ny olony ho be indrindra Izy ka nampahery azy noho ny fahavalony. '
  '25':
  - type: text
    content: 'Nampiova ny fon''ireny hankahala ny olony Izy Sy hihendry ny mpanompony. '
  '26':
  - type: text
    content: 'Naniraka an''i Mosesy mpanompony Sy Arona izay nofidiny Izy. '
  '27':
  - type: text
    content: 'Ary izy ireo nanao ny famantarany teo aminy Sy fahagagana tany amin''ny tanin''i Hama. '
  '28':
  - type: text
    content: 'Nahatonga aizina Izy ka nahamaizina; Ary tsy nandà ny teniny izy ireo. '
  '29':
  - type: text
    content: 'Nahatonga ny ranony ho rà Izy Ka nahafaty ny hazandranony. '
  '3':
  - type: text
    content: Ataovy ho reharehanareo ny anarany masina; Aoka hifaly ny fon'izay mitady an'i Jehovah.
  '30':
  - type: text
    content: 'Nisy sahona betsaka ny taniny, Eny, na dia hatrao an-trano fandrian''ny mpanjakany aza. '
  '31':
  - type: text
    content: Niteny Izy, dia tonga ny lalitra betsaka
  - type: note
    content: 'Na: fihitra, na kalalao'
  - type: text
    content: ' Sy ny moka teny amin''ny faritaniny rehetra. '
  '32':
  - type: text
    content: 'Nahatonga havandra ho solon''ny ranonorana Izy Sy afo midedadeda teny amin''ny taniny. '
  '33':
  - type: text
    content: 'Namely ny voalobony sy ny aviaviny Izy Ka nanapatapaka ny hazo teo amin''ny taniny. '
  '34':
  - type: text
    content: 'Niteny Izy, dia tonga ny valala Sy ny sompanga tsy hita isa; '
  '35':
  - type: text
    content: 'Dia nihinana ny zava-maitso rehetra teny amin''ny taniny ireny Ka nandany ny vokatry ny taniny. '
  '36':
  - type: text
    content: 'Ary namely ny lahimatoa rehetra tany amin''ny taniny Izy, Dia ny voalohan''ainy rehetra. '
  '37':
  - type: text
    content: 'Ary dia nitondra ny olony nivoaka Izy sady nampahazo azy volafotsy sy volamena; Ary tsy nisy nangozohozo na dia iray akory aza tamin''ny fireneny. '
  '38':
  - type: text
    content: Faly Egypta tamin'ny nahalasanany; Fa efa nahazo azy ny fahatahorana ireo.
  '39':
  - type: text
    content: 'Namelatra rahona ho fialokalofana Izy Ary afo ho fanazavana nony alina. '
  '4':
  - type: text
    content: 'Mitadiava an''i Jehovah sy ny heriny Katsaho mandrakariva ny tavany. '
  '40':
  - type: text
    content: 'Nangataka izy ireo, dia nahatonga papelika Izy, Ary mofon-danitra no namokisany azy. '
  '41':
  - type: text
    content: 'Nanokatra ny vatolampy Izy, dia nigororoana ny rano Ka nandriaka tamin''ny tany maina ho renirano. '
  '42':
  - type: text
    content: 'Fa nahatsiaro ny teniny masina Sy Abrahama mpanompony Izy, '
  '43':
  - type: text
    content: 'Dia nitondra ny olony nivoaka tamin''ny fifaliana Izy Ary ny voafidiny tamin''ny fihobiana; '
  '44':
  - type: text
    content: 'Ka dia nanome azy ny tanin''ny jentilisa Izy; Ary nandova ny vitan''ny firenena maro ireny, '
  '45':
  - type: text
    content: Mba hitandremany ny didiny, Sy hankatoavany ny lalàny. Haleloia.
  '5':
  - type: text
    content: 'Tsarovy ny asa mahagaga natao-ny Dia ny fahagagany sy ny fitsaran''ny vavany, '
  '6':
  - type: text
    content: 'Ry taranak''i Abrahama mpanom-pony, Dia ianareo olom-boafidiny, taranak''i Jakoba. '
  '7':
  - type: text
    content: Jehovah, Izy no Andriamanitsika; Manerana ny tany rehetra ny fitsarany.
  '8':
  - type: text
    content: 'Mahatsiaro ny fanekeny mandrakizay Izy, Dia ilay teny izay voadidiny ho an''ny taranaka arivo mandimby, '
  '9':
  - type: text
    content: 'Eny, ilay nataony tamin''i Abrahama, Sy ny fianianany tamin''Isaka; '
