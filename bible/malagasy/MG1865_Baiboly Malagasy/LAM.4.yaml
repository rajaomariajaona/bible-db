document_id: LAM.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fietren-tena noho ny fitsarana ataon'Andriamanitra, ary fanantenam-pamonjena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Indrisy! efa matromatroka ny volamena; Efa niova ny tena volamena tsara! Ny vato nohamasinina dia efa nahahany eny an-joron-dalambe rehetra eny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Indrisy! ny zanaka mahafinaritr'i Ziona, izay saro-bidy tahaka ny tena volamena, dia efa atao ho toy ny siny, asan-tànan'ny mpanefy tanimanga!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Na dia ny amboadia
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: jakala'
    marker-yv: yv-n
  - type: text
    text: ' aza dia manolotra nono hampinonoany ny zanany; Fa ny oloko zanakavavy kosa dia efa masiaka toy ny ostritsa any an-efitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny lelan'ny zaza minono miraikitra amin'ny lanilaniny noho ny hetaheta; Ny ankizy madinika mangataka hanina, nefa tsy misy mizara ho azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izay nihinana zava-py dia mahantra eny an-dalambe; Izay notezaina tamin'ny jaky dia mandamaka eny amin'ny zezika
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Naziritany
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa ny heloky ny oloko zanakavavy dia lehibe noho ny helok'i Sodoma, Izay noravana indray mipi-maso monja, nefa tsy nokasihin-tanana akory,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny lehibeny
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Naziritany
    marker-yv: yv-n
  - type: text
    text: ' dia mangatsakatsaka noho ny fanala, eny, fotsy noho ny ronono; Mena noho ny voahangy'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: perila'
    marker-yv: yv-n
  - type: text
    text: ' ny tenany; Tahaka ny vato safira ny endriny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa izao kosa dia mainty noho ny arina ny tarehiny, ka tsy fantatra eny an-dalana izy; Ny hodiny miraikitra amin'ny taolany ka tonga maina toy ny hazo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsara ny matin-tsabatra noho ny maty mosary; Fa ireto dia mihareraka toy ny voatrobaka noho ny tsi-fisian'ny vokatry ny saha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny tanan''ny vehivavy malemy fanahy aza dia nahandro ny zanany: Eny, izany no nohaniny tamin''ny fandringanana ny oloko zanakavavy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tanterahin'i Jehovah ny fahavinirany, naidiny ny fahatezerany mirehitra, ary Izy nampirehitra afo tao Ziona, handevonana ny fanorenany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny mpanjakan'ny tany sy ny mponina rehetra amin'izao tontolo izao dia tsy nanampo fa ny rafilahy sy ny fahavalo no ho tafiditra ao amin'ny vavahadin'i Jerosalema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Noho ny fahotan'ny mpaminany sy ny heloky ny mpisorony, izay nandatsaka ny ran'ny marina tao aminy, no nahatongavan'izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Niraparapa toy ny jamba teny an-dalambe izy, sady voahosin-drà ny tenany, ka tsy nisy sahy nikasika ny akanjony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny olona niantsoantso azy hoe: Mialà ianareo, fa maloto, mialà, mialà, aza mikasika anay. Raha nandositra sy niraparapa izy, dia hoy ny olona tany amin''ny jentilisa: Tsy mahazo mivahiny atỳ intsony ireny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny fahatezeran
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. tavany
    marker-yv: yv-n
  - type: text
    text: '''i Jehovah no nampihahakahaka azy, ary tsy mijery azy intsony Izy; Ny mpisorona tsy hajain''ireny, ary ny antitra tsy amindrany fo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mbola pahina ny masonay miandry foana ny hamonjy anay; Nitazana teo amin'ny tilikambo izahay nanantena ny firenena izay tsy nahavonjy anay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mitsongo-dia anay izy, ka tsy mahazo mandeha eny an-dalambe aza izahay; Akaiky ny fara-fiainanay, tapitra ny andronay, eny, tonga ny fara-fiainanay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny mpanenjika anay dia haingam-pandeha noho ny voromahery eny amin'ny lanitra, ka miolomay manenjika anay any an-tendrombohitra ary manotrika anay any an-efitra izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny fofonainay, ilay voahosotr''i Jehovah, dia efa voafandriky ny longoany, dia ilay nataonay hoe: Ao ambanin''ny alokalony no hahavelona anay any amin''ny firenena.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mifalia sy miraveravoa ihany ary, ry Edoma zanakavavy, izay monina any amin'ny tany Oza, ianao koa no horosoana ny kapoaka, ka ho mamo sy hitanjaka ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tsy misy intsony ny helokao, ry Ziona zanakavavy, tsy ho entina ho babo intsony ianao; Hamaly anao Izy, ry Edoma zanakavavy, noho ny helokao ka hampiseho ny fahotanao.
