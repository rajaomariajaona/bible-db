document_id: LAM.4,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fietren-tena noho ny fitsarana ataon'Andriamanitra, ary fanantenam-pamonjena
  - type: text
    content: Indrisy! efa matromatroka ny volamena; Efa niova ny tena volamena tsara! Ny vato nohamasinina dia efa nahahany eny an-joron-dalambe rehetra eny.
  '10':
  - type: text
    content: 'Ny tanan''ny vehivavy malemy fanahy aza dia nahandro ny zanany: Eny, izany no nohaniny tamin''ny fandringanana ny oloko zanakavavy.'
  '11':
  - type: text
    content: Tanterahin'i Jehovah ny fahavinirany, naidiny ny fahatezerany mirehitra, ary Izy nampirehitra afo tao Ziona, handevonana ny fanorenany.
  '12':
  - type: text
    content: Ny mpanjakan'ny tany sy ny mponina rehetra amin'izao tontolo izao dia tsy nanampo fa ny rafilahy sy ny fahavalo no ho tafiditra ao amin'ny vavahadin'i Jerosalema.
  '13':
  - type: text
    content: Noho ny fahotan'ny mpaminany sy ny heloky ny mpisorony, izay nandatsaka ny ran'ny marina tao aminy, no nahatongavan'izao.
  '14':
  - type: text
    content: Niraparapa toy ny jamba teny an-dalambe izy, sady voahosin-drà ny tenany, ka tsy nisy sahy nikasika ny akanjony.
  '15':
  - type: text
    content: 'Ny olona niantsoantso azy hoe: Mialà ianareo, fa maloto, mialà, mialà, aza mikasika anay. Raha nandositra sy niraparapa izy, dia hoy ny olona tany amin''ny jentilisa: Tsy mahazo mivahiny atỳ intsony ireny.'
  '16':
  - type: text
    content: Ny fahatezeran
  - type: note
    content: Heb. tavany
  - type: text
    content: '''i Jehovah no nampihahakahaka azy, ary tsy mijery azy intsony Izy; Ny mpisorona tsy hajain''ireny, ary ny antitra tsy amindrany fo.'
  '17':
  - type: text
    content: Mbola pahina ny masonay miandry foana ny hamonjy anay; Nitazana teo amin'ny tilikambo izahay nanantena ny firenena izay tsy nahavonjy anay.
  '18':
  - type: text
    content: Mitsongo-dia anay izy, ka tsy mahazo mandeha eny an-dalambe aza izahay; Akaiky ny fara-fiainanay, tapitra ny andronay, eny, tonga ny fara-fiainanay.
  '19':
  - type: text
    content: Ny mpanenjika anay dia haingam-pandeha noho ny voromahery eny amin'ny lanitra, ka miolomay manenjika anay any an-tendrombohitra ary manotrika anay any an-efitra izy.
  '2':
  - type: text
    content: Indrisy! ny zanaka mahafinaritr'i Ziona, izay saro-bidy tahaka ny tena volamena, dia efa atao ho toy ny siny, asan-tànan'ny mpanefy tanimanga!
  '20':
  - type: text
    content: 'Ny fofonainay, ilay voahosotr''i Jehovah, dia efa voafandriky ny longoany, dia ilay nataonay hoe: Ao ambanin''ny alokalony no hahavelona anay any amin''ny firenena.'
  '21':
  - type: text
    content: Mifalia sy miraveravoa ihany ary, ry Edoma zanakavavy, izay monina any amin'ny tany Oza, ianao koa no horosoana ny kapoaka, ka ho mamo sy hitanjaka ianao.
  '22':
  - type: text
    content: Tsy misy intsony ny helokao, ry Ziona zanakavavy, tsy ho entina ho babo intsony ianao; Hamaly anao Izy, ry Edoma zanakavavy, noho ny helokao ka hampiseho ny fahotanao.
  '3':
  - type: text
    content: Na dia ny amboadia
  - type: note
    content: 'Na: jakala'
  - type: text
    content: ' aza dia manolotra nono hampinonoany ny zanany; Fa ny oloko zanakavavy kosa dia efa masiaka toy ny ostritsa any an-efitra.'
  '4':
  - type: text
    content: Ny lelan'ny zaza minono miraikitra amin'ny lanilaniny noho ny hetaheta; Ny ankizy madinika mangataka hanina, nefa tsy misy mizara ho azy.
  '5':
  - type: text
    content: Izay nihinana zava-py dia mahantra eny an-dalambe; Izay notezaina tamin'ny jaky dia mandamaka eny amin'ny zezika
  - type: note
    content: Heb. Naziritany
  - type: text
    content: .
  '6':
  - type: text
    content: Fa ny heloky ny oloko zanakavavy dia lehibe noho ny helok'i Sodoma, Izay noravana indray mipi-maso monja, nefa tsy nokasihin-tanana akory,
  '7':
  - type: text
    content: Ny lehibeny
  - type: note
    content: Heb. Naziritany
  - type: text
    content: ' dia mangatsakatsaka noho ny fanala, eny, fotsy noho ny ronono; Mena noho ny voahangy'
  - type: note
    content: 'Na: perila'
  - type: text
    content: ' ny tenany; Tahaka ny vato safira ny endriny.'
  '8':
  - type: text
    content: Fa izao kosa dia mainty noho ny arina ny tarehiny, ka tsy fantatra eny an-dalana izy; Ny hodiny miraikitra amin'ny taolany ka tonga maina toy ny hazo.
  '9':
  - type: text
    content: Tsara ny matin-tsabatra noho ny maty mosary; Fa ireto dia mihareraka toy ny voatrobaka noho ny tsi-fisian'ny vokatry ny saha.
