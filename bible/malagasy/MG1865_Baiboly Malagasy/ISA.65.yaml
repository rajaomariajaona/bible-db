document_id: ISA.65,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fandavan'i Jehovah ny maro noho ny fanao tsy marina narahiny, sy ny fitahiana kasainy ho amin'ny mibebaka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Notadiavin''zay tsy naniry Aho sy hitan''izay tsy nitady; hoy Izaho tamin''ny firenena izay tsy nantsoina tamin''ny anarako: Inty Aho! Inty Aho! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Sarona ho tonga fiandrasana ondry ary ny lohasaha akora ho fandrian''omby, ho an''ny oloko izay nitady Ahy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa ny aminareo izay mahafoy an'i Jehovah sy manadino ny tendrombohitro masina, sady mamelatra latabatra ho an'i Gada
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gada = Zara, ary Meny = Vintana; samy anaran'andriamani-tsi-izy ireo
      marker-yv: yv-n
    - type: text
      text: ' sy mampidina'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. mameno
      marker-yv: yv-n
    - type: text
      text: ' divay noharoharoan-javatra ho an''i Meny, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia hotendreko ho voan''ny sabatra ianareo ka hankohofina hovonoina avokoa, satria niantso Aho, fa tsy namaly ianareo, niteny Aho, fa tsy nihaino ianareo, fa nanao izay ratsy eo imasoko, ary izay tsy sitrako no nofidinareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Koa izao no lazain''i Jehovah Tompo: Indro, ny mpanompoko hihinana, fa ianareo kosa ho mosarena; Indro, ny mpanompoko hisotro, fa ianareo kosa ho main-tenda; indro, ny mpanompoko hifaly, fa ianareo kosa ho menatra; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Indro, ny mpanompoko hihoby noho ny faharavoam-po, fa ianareo kosa hitoloko noho ny alahelom-po
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. fanaintanam-po
      marker-yv: yv-n
    - type: text
      text: ' sy hidradradradra noho ny fahoriam-panahy'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. fahatorotoroam-panahy
      marker-yv: yv-n
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary hamela ny anaranareo ho fiozonana amin''ireo voafidiko ianareo, ary hahafaty anao Jehovah Tompo; fa ny mpanompony kosa dia homeny anaram-baovao; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ka izay miarahaba tena etỳ ambonin'ny tany dia hanao izany amin'ny anaran'Andriamanitry ny Amena
    - type: usfm
      marker: x
      children:
      - type: text
        text: Amena = fahamarinana
      marker-yv: yv-n
    - type: text
      text: ; ary izay mianiana etỳ ambonin'ny tany dia hianiana amin'Andriamanitry ny Amena
    - type: usfm
      marker: x
      children:
      - type: text
        text: Amena = fahamarinana
      marker-yv: yv-n
    - type: text
      text: ', satria efa hadino ny fahoriana taloha, sady voafina izany ka tsy hitan''ny masoko.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa, indro, Izaho mahary lanitra vaovao sy tany vaovao, ka dia tsy hotsarovana intsony ny taloha, na ho mby ao an-tsaina akory aza.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa mifalia kosa sy miravoravoa mandrakizay, satria mahary izany Aho; fa, indro, mahary an''i Jerosalema ho fifaliana Aho ary ny olony ho firavoravoana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia ho faly amin''i Jerosalema Aho sy ho ravoravo amin''ny oloko; ary ny feo mitomany tsy ho re any intsony, na ny feo mitaraina. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Namelatra ny tanako mandritra ny andro Aho tamin''ny firenena miodina, izay mandeha amin''ny lalana tsy tsara araka ny fisainany ihany, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary na dia ny zaza minono any aza dia tsy ho fohy andro, ary tsy hisy anti-panahy izay tsy nahatapitra ny androny; fa mbola zatovo ihany izay maty na dia efa zato taona aza, ary ny mpanota aza, dia hahatratra zato taona vao hozonina
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Ary ny mpanota izay mahatratra zato taona ihany dia hatao ho voaozona'
      marker-yv: yv-n
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Hanao trano ny olona ka hitoetra ao; Ary hanao tanim-boaloboka ny olona ka hihinana ny vokatra aminy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Tsy hanao trano hitoeran''olon-kafa izy, Na hamboly zavatra hohanin''olon-kafa; Fa ho tahaka ny andron''ny hazo ny andron''ny oloko, Ary ireo voafidiko dia hanaram-po amin''ny asan''ny tanany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Tsy hisasatra foana izy, na hitera-jaza ho tratry ny loza tampoka; Fa taranak'izay notahin'i Jehovah ireo, Ary ny terany ho ao aminy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Mbamin''ny terany koa'
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Raha tsy mbola miantso aza izy dia hamaly Aho; Ary raha mbola miteny izy, dia hihaino Aho. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ny amboadia
    - type: usfm
      marker: x
      children:
      - type: text
        text: lopa
      marker-yv: yv-n
    - type: text
      text: ' sy ny zanak''ondry hiara-komana, Ary ny liona hihina-mololo tahaka ny omby, Ary ny menarana, dia vovoka no ho fihinany; Ary tsy handratra na hanimba eran''ny tendrombohitro masina izy, hoy Jehovah.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia firenena izay nahatezitra ahy mandrakariva na dia eo imasoko aza, izay mamono zavatra hatao fanatitra eo amin''ny tanimboly Ary mandoro ditin-kazo manitra eny ambonin''ny tanimanga, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia izay mipetraka any amin''ny fasana ary mitoetra mandritra ny alina ao am-pierena, sady mihinana henan-kisoa, ary ny ron''ny hena fahavetavetana no ao amin''ny loviany, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Izay manao hoe: Mihataha, fa aza manakaiky ahy, fa izaho no masina, fa tsy ianao, ireny dia setroka ao am-bavoroko, eny, afo mirehitra mandritra ny andro. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Indro, izao no voasoratra eo anatrehako: Tsy hangina Aho mandra-pamaliko anareo'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. azy
      marker-yv: yv-n
    - type: text
      text: ' eny, mandra-pamaliko ho ao an-tratranareo'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. tratrany
      marker-yv: yv-n
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ny helokareo sy ny heloky ny razanareo koa, hoy Jehovah, dia izay olona nandoro ditin-kazo manitra teny an-tendrombohitra ary nihaika Ahy teny amin''ny havoana; eny, hamatra ny valin''ny asany ho ao an-tratrany Aho aloha. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Izao no lazain''i Jehovah: Tahaka ny ranom-boaloboka hita ao antsampahony ka ataon''ny olona hoe: Aza simbana, fa misy fitahiana ao anatiny dia toy izany no hataoko noho ny amin''ny mpanompoko, ka tsy hanimba azy rehetra Aho. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Hahatonga taranaka avy amin''i Jakoba Aho sy mpandova ny tendrombohitro avy amin''i Joda; Ary ireo voafidiko no handova azy, eny, ny mpanompoko no honina ao. '
