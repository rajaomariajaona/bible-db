document_id: EZK.28
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faminaniana ny amin'i Sidona, sy fanomezan-toky ny Isiraely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry zanak''olona, lazao amin''ny mpanjakan''i Tyro hoe: Izao no lazain''i Jehovah Tompo: Satria miavonavona ny fonao. ka hoy ianao: Mba Andriamanitra koa aho; eto amin''ny anankiray amin''ny fipetrahan''Andriamanitra no ipetrahako, dia eto ampovoan''ny ranomasina. Nefa olona ihany ianao, fa tsy Andriamanitra tsinona, Na dia nataonao toy ny fon''Andriamanitra aza ny fonao, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hay! hendry noho Daniela ianao! Tsy misy zava-miafina azo afenina anao izany! '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny fahendrenao sy ny fahalalanao no nahazoanao haren. Eny, izany no nahazoanao volamena sy volafotsy ho ao amin''ny rakitrao '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny haben''ny fahendrenao tamin''ny varotrao no nampitomboanao ny harenao, ka dia miavonavona ny fonao noho ny harenao; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa, indro, izao no lazain''i Jehovah Tompo: Satria efa nataonao ho toy ny fon''Andriamanitra ny fonao, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia, indro, hitondra olona hafa firenena Aho hamely anao, dia izay masiaka indrindra amin''ny firenena, Ka hotsoahany ny sabany hamelezany ny fahendrenao tsara, ary hataony matroka ny famirapiratanao '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Havariny ho any an-davaka ianao, ka ho faty toy ny fahafatesan''izay voatrabaka ao amin''ny ranomasina. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Moa mbola hitompo teny fantatra va ianao eo imason''izay mamono anao hoe mba Andriamanitra koa aho? Nefa olona ihany ianao, fa tsy Andriamanitra tsinona, raha mby eo an-tànan''izay manatrabaka anao '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tahaka ny fahafatesan''ny tsy voafora no hahafatesan''ny fahavalo anao; Fa Izaho no niteny izany, hoy Jehovah Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ry zanak''olona, manaova hira fahalahelovana ny amin''ny mpanjakan''i Tyro, ka lazao aminy hoe: Izao no lazain''i Jehovah Tompo: Ry ilay mahatanteraka'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. manisy tombon-kase
    marker-yv: yv-n
  - type: text
    text: ' ny rafitra tsara tarehy tonga marika sady feno fahendrena no tena tsara tarehy, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tany Edena, sahan'Andriamanitra, ianao; Ny vato soa rehetra ny eloelo teo amboninao, dia ny karneola, ny topaza, ny onyksa, ny krysolita, ny beryla, ny jaspy, ny safira, ny robina, ny emeralda ary ny volamena; Ny fampanenoana ny ampongatapakao sy ny sodinao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: vehivavy'
    marker-yv: yv-n
  - type: text
    text: ' dia tao aminao, tamin''ny andro namoronana anao dia natao koa ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hianao dia kerobima voahosotra izay manaloka, fa voatendriko ianao; Tao an-tendrombohitra masin''Andriamanitra ianao; Tao amin''ny vato mirehitra no nitsangantsangananao. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tsy nanan-tsiny ianao tamin''ny nalehanao hatramin''ny andro namoronana anao ka mandra-pahita heloka tao aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Noho ny habetsahan''ny varotra nataonao dia nofenoina loza tao aminao, ka nanota ianao; Ary dia nolotoiko ka nariako niala tamin''ny tendrombohitr''Andriamanitra ianao, Ary nosimbako ianao, ry kerobima manaloka, hiala tao amin''ny vato mirehitra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Niavonavona ny fonao noho ny hatsaran-tarehinao; Efa nahasimba ny fahendrenao mbamin''ny famirapiratanao ianao; Nazerako eny an-tany ianao sady natolotro ho fitalanjonan''ireo mpanjaka, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Noho ny haben''ny helokao tamin''ny tsi-fahamarinan''ny varotrao, dia voalotonao ny fitoeranao masina; Koa izany no hamoahako afo avy ao aminao handevona anao, ary hataoko tonga lavenona eny ambonin''ny tany ianao eo imason''izay rehetra mijery anao. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny firenena rehetra izay mahalala anao dia ho gaga anao; Ho tonga fampitahorana ianao ary tsy ho ao intsony mandrakizay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ry zanak''olona, manandrifia an''i Sidona, dia maminania ny hamelezana azy, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ka ataovy hoe: Izao no lazain''i Jehovah Tompo: Indro, efa hamely anao Aho, ry Sidona, ary hankalazaina ao ampovoanao Aho; Ka dia ho fantatra fa Izaho no Jehovah, raha manatanteraka ny fitsarana azy Aho ka miseho ho masina amin''ny ataoko aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa hahatonga areti-mandringana hamely azy Aho ary rà ho eny an-dalambeny; Dia hiampatrampatra eny aminy ny voatrabaky ny sabatra izay mamely avy eny manodidina eny; Ka dia ho fantatra fa Izaho no Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary tsy hisy roy mampangirifiry na tsilo mampanaintaina intsony ho an'ny taranak'Isiraely, avy amin'ireo manodidina azy, izay manao tsinontsinona azy; Ka dia ho fantatra fa Izaho no Jehovah Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Izao no lazain''i Jehovah Tompo: Raha angoniko avy any amin''ny firenena izay nampielezana azy ny taranak''Isiraely, dia hiseho ho masina eo imason''ny firenena Aho amin''ny ataoko aminy, ka honina any aminy taniny izay nomeko an''i Jakoba mpanompoko izy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia handry fahizay any izy ka hanorina trano sy hanao tanim-boaloboka; eny, handry fahizay izy amin'ny anatanterahako ny fitsarana ireo rehetra manodidina azy izay manao tsinontsinona azy; ka dia ho fantatra fa Izaho no Jehovah Andriamaniny.
