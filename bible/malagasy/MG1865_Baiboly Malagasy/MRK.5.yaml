document_id: MRK.5,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga teny am-pitan''ny ranomasina tao amin''ny tanin''ny Gerasena izy ireo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nifona mafy taminy izy mba tsy horoahiny hiala amin''izany tany izany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy kisoa maro andiany izay nandrasana teny akaikin''ny tendrombohitra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nifona taminy ireo ka nanao hoe: Alefaso izahay ho any anatin''ny kisoa mba hiditra any aminy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia neken'i Jesosy. Ary ny fanahy maloto, rehefa nivoaka, dia niditra tao anatin'ny kisoa; ary ireo kisoa andiany ireo nitratrevatreva teny amin'ny hantsana ho any amin'ny ranomasina (tokony ho roa arivo no isany), ka dia maty
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. kenda
      marker-yv: yv-n
    - type: text
      text: ' tany amin''ny ranomasina izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpiandry azy dia nandositra ka nilaza tao an-tanàna sy tany an-tsaha. Dia nandeha ny olona mba hizaha izany zavatra izany; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary tonga tany amin''i Jesosy izy ka nahita ilay demoniaka, izay nisy ny legiona, fa indro izy nipetraka nitafy lamba sady ary saina; ka raiki-tahotra ny olona. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay efa nahita dia nilazalaza tamin''ny olona izay natao tamin''ilay demoniaka sy ny amin''ny kisoa. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nifona tamin''i Jesosy izy mba hiala amin''ny taniny. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa hiondrana teo an-tsambokely Jesosy, dia nangataka taminy ilay demoniaka mba hanaraka Azy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa tsy navelan''i Jesosy izy; fa hoy Izy taminy: Modia ihany any an-tranonao ho any amin''ny havanao, ka lazao aminy izay zavatra lehibe nataon''ny Tompo taminao sy ny namindrany fo taminao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony niala teo an-tsambokely Izy, niaraka tamin''izay dia nisy lehilahy azom-panahy maloto nivoaka avy teny amin''ny fasana ka nifanena taminy, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha izy ka nitory tany Dekapolisy izay zavatra lehibe efa nataon''i Jesosy taminy; ka dia gaga ny olona rehetra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nita an-tsambokely indray Jesosy ka tonga teny am-pita, dia nisy vahoaka betsaka tafangona teo aminy; ary teo amoron-dranomasina Izy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia avy ny anankiray tamin''ny mpanapaka ny synagoga, Jairo no anarany; ary rehefa nahita an''i Jesosy izy, dia niankohoka teo amin''ny tongony '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka niangavy fatratra taminy hoe: Marary efa ho faty ny zanako-vavy kely; andeha re, mametraha ny tananao aminy, mba ho sitrana'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. voavonjy
      marker-yv: yv-n
    - type: text
      text: ' izy ka ho velona. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha niaraka taminy Izy; ary nisy vahoaka betsaka nanaraka Azy ka nifanety taminy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nisy vehivavy anankiray izay efa narary
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. narary nandeha rà
      marker-yv: yv-n
    - type: text
      text: ' roa ambin''ny folo taona '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady efa niaritra zavatra be tamin''ny mpanao fanafody maro ka nandany ny fananany rehetra, nefa tsy nety sitrana, fa vao mainka nihanarary kokoa aza; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa rehefa nahare ny amin''i Jesosy izy, dia nankeo ivohony namaky ny vahoaka ary nanendry ny lambany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy izy: Na dia ny fitafiany ihany aza no voatendriko, dia ho sitrana'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. voavonjy
      marker-yv: yv-n
    - type: text
      text: ' aho. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary niaraka tamin'izay dia ritra ny loharanon'aretiny
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. fandehanan'ny ràny
      marker-yv: yv-n
    - type: text
      text: ', ka tsaroany tao amin''ny tenany fa sitrana izy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa nitoetra tao amin''ny fasana izy; ary tsy nisy olona nahafatotra azy intsony na dia tamin''ny gadra aza. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niaraka tamin''izay dia fantatr''i Jesosy fa nisy hery niala taminy, dia nihodina teo afovoan''ny vahoaka Izy ka nanao hoe: Iza izany nanendry ny lambako izany? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny mpianany taminy: Hitanao izao vahoaka mifanety aminao izao, ka hoy Hianao va: Iza no nanendry Ahy? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nijery manodidina Izy hizaha ny vehivavy izay efa nanao izany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raiki-tahotra sady tora-kovitra ravehivavy, satria fantany izay natao taminy, ka dia nankeo aminy izy ka niankohoka teo anatrehany ary nanambara taminy ny marina rehetra. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy taminy: Anaka, ny finoanao no nahasitrana'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. namonjy
      marker-yv: yv-n
    - type: text
      text: ' anao: mandehana soa aman-tsara, ary sitràna amin''ny aretinao. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mbola niteny Jesosy, dia nisy tonga avy tany amin''ilay mpanapaka ny synagoga ka nanao hoe: Efa maty ny zanakao-vavy; nahoana ianao no mbola manahirana ny Mpampianatra ihany? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy nahoan'i Jesosy izany teny nataony izany, fa
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Ary nony ren''i Jesosy ny teny nataony, dia'
      marker-yv: yv-n
    - type: text
      text: ' hoy Izy tamin''ilay mpanapaka ny synagoga: Aza matahotra, minoa fotsiny ihany. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy nisy olona navelany hanaraka Azy afa-tsy Petera sy Jakoba ary Jaona, rahalahin''i Jakoba. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia tonga tao an-tranon''ilay mpanapaka ny synagoga izy ireo, ka hitan''i Jesosy ny tabataba, dia ny olona izay nitomany sy ninaonaona be ihany. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa niditra Izy, dia niteny taminy hoe: Nahoana ianareo no mitabataba sy mitomany? Tsy maty razazavavy, fa matory. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa efa nafatony matetika tanin''ny gadra, na ny tànany, na ny tongony; nefa ny gadra tamin''ny tànany notapahiny, ary ny gadra tamin''ny tongony notorotoroiny, ka tsy nisy olona nahafolaka azy. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nihomehy Azy fatratra ny olona. Fa nandroaka azy rehetra Izy, dia nitondra ny ray aman-drenin-drazazavavy mbamin''izay olona teo aminy ka niditra tao amin''izay nisy an-drazazavavy. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandray ny tànan-drazazavavy Izy ka niteny taminy hoe: Talita komy, izany hoe, raha adika: Ry zazavavy, hoy Izaho aminao: Mitsangàna. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitsangana niaraka tamin''izay razazavavy ka afa-nandeha; fa efa roa ambin''ny folo taona izy. Ary niaraka tamin''izay dia talanjona indrindra ny olona. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Jesosy nandrara azy mafy mba tsy ho fantatr'olona izany; ary nasainy nomena hanina razazavavy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary mandrakariva, na andro na alina, dia nitoetra teny amin''ny fasana sy teny an-tendrombohitra izy ka ninananana sady niteti-tena tamin''ny vato. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nony nahita an''i Jesosy teny lavitra eny izy, dia nihazakazaka ka niankohoka teo anatrehany '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady niantso tamin''ny feo mahery hoe: Moa mifaninona akory izaho sy Hianao, ry Jesosy, Zanak''Andriamanitra Avo Indrindra? Ampianianiko amin''Andriamanitra Hianao, aza mampijaly ahy, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria Jesosy efa nanao taminy hoe: Mivoaha amin''ity lehilahy ity, ry fanahy maloto. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanontany azy Jesosy hoe: Iza moa no anaranao? Ary izy namaly hoe: Legiona no anarako, satria maro izahay. '
