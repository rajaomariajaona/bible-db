document_id: JER.9,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'ny tsi-fahatokian-tena, sy ny fahatokiana an'Andriamanitra, Izay mitsara marina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Enga anie ka hahita fitoerana any an-efitra aho tahaka ny fitoeran''ny mpandeha! Dia hahafoy ny fireneko aho ka hiala aminy, satria mpijangajanga avokoa izy rehetra, eny, mpivadika miray tetika izy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Jerosalema dia hataoko korontam-bato sy fonenan'ny amboadia
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: jakala'
      marker-yv: yv-n
    - type: text
      text: '; ary ny tanànan''ny Joda hataoko lao tsy hisy mponina. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Iza no olon-kendry mba hahafantatra izao, sady efa nitenenan''ny vavan''i Jehovah mba hanambara izao? Fa nahoana no noravana ny tany sady may ho toy ny efitra, ka tsy misy mandeha mamaky eo aminy? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jehovah: satria nahafoy ny lalàko izay nataoko teo anoloany izy ka tsy nankato izany ary tsy nihaino ny feoko, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nandeha araka ny ditry ny fony sy nanaraka ireo Bala araka izay nampianarin''ny razany azy, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Indro, hofahanako zava-mahafaty ity firenena ity sy hampisotroiko rano mangidy; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary haeliko any amin''izay jentilisa tsy fantany na fantatry ny razany izy; Ary hampanenjehiko azy ny sabatra ambara-pandaniko azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain''i Jehovah. Tompon''ny maro: Mihevera tsara, ka antsoy ireny vehivavy mpanao hira fahalahelovana mba ho avy; Eny, ampanalao ireny vehivavy mahay mba ho tonga; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary asaovy haingana ireny hanandratra fidradradradrana ho antsika, mba hampijojy ny ranomasontsika sy hampivarina ny ranomaso avy amin''ny hodimasontsika. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa misy feo midradradradra re any Ziona hoe: Indrisy! rava isika; Afa-baraka indrindra isika, satria tsy maintsy mamoy ny tany, fa efa narodana ny trano nitoerantsika. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa mihainoa ny tenin''i Jehovah, ianareo vehivavy, ary aoka hohenoin''ny sofinareo ny tenin''ny vavany, ka ampianaro fidradradradrana ny zanakavavinareo, ary samia mampianatra hira fahalahelovana ny namany avy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manenjana ny lelany toy ny fanenjana tsipìka izy mba handefa lainga. Ary tsy araka ny marina no mahahery azy etỳ ambonin''ny tany; Fa mandroso amin''ny ratsy ka hatramin''ny ratsy izy, ary Izaho tsy mba fantany, hoy Jehovah. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny fahafatesana efa nananika ny varavarankelintsika ka niditra tao an-dapantsika, mba handringana ny ankizy madinika tsy ho eny an-dalambe sy ny zatovo tsy ho eny an-kalalahana. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ataovy hoe: Izao no lazain''i Jehovah: Hiampatrampatra ny fatin''ny olona ka ho tonga tahaka ny zezika eny an-tsaha sy tahaka ny amboara nilaozan'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. any aorian'
      marker-yv: yv-n
    - type: text
      text: '''ny mpijinja, Izay tsy misy manangona azy.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain''i Jehovah: Aoka ny hendry tsy hirehareha amin''ny fahendreny, ary aoka ny mahery tsy hirehareha amin''ny heriny, ary aoka ny manan-karena tsy hirehareha amin''ny hareny; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izay te-hirehareha dia aoka hirehareha amin''izao: Dia ny fahendreny sy ny fahalalany Ahy ho Jehovah, Izay manao famindram-po sy fitsarana marina ary fahamarinana etỳ ambonin''ny tany; fa izany no sitrako, hoy Jehovah. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indro, avy ny andro, hoy Jehovah, izay hamaliako ny voafora rehetra mbamin'ny tsy voafora koa
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: izay toy ny tsy voafora'
      marker-yv: yv-n
    - type: text
      text: ', '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia Egypta sy Joda sy Edoma sy ny taranak'i Amona ary Moaba mbamin'izay rehetra voahety sisim-bolo, izay monina any an-efitra; Fa ny jentilisa rehetra dia tsy voafora, ary ny taranak'Isiraely rehetra kosa dia tsy voafora fo.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samia miaro tena amin''ny namany avy ianareo. Ary aza misy matoky olona na dia ny rahalahy aza; Fa ny rahalahy rehetra dia mamingana tokoa, ary ny namana rehetra mandehandeha manaratsy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy rehetra samy mamitaka ny namany avy, ka tsy misy miteny marina; Mampianatra ny lelany handainga izy ary manasa-tena amin''ny fanaovan-dratsy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fonenanao dia ao anatin''ny fitaka; Fitaka no nandavany tsy hahalalana Ahy, hoy Jehovah. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izao no lazain''i Jehovah, Tompon''ny maro: Indro, handrendrika sy hizaha toetra azy Aho; Fa ahoana no hataoko noho ny amin''ny oloko zanakavavy? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zana-tsipìka mahafaty ny lelany ka miteny fitaka; Raha amin''ny vavany, dia miteny fihavanana amin''ny namany izy, kanjo ao anatiny kosa dia manao otri-po. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy hovaliako va izy amin''izany zavatra izany? hoy Jehovah, tsy hialako fo va ny firenena toy izany? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Noho ny amin'ny tendrombohitra no hitomaniako sy hidradradrako, ary noho ny amin'ny kijana any an-efitra no hanaovako hira fa halahelovana, satria may izy, ka tsy misy mandeha mamaky eo aminy, ary tsy misy fimàmàn'omby re intsony, ary na ny voro-manidina na ny bibi-dia samy efa nandositra ka lasa avokoa.
