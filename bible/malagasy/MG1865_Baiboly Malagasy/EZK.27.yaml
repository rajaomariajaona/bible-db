document_id: EZK.27,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny harena amam-boninahitra nananan'i Tyro, sy fitomaniana noho ny manjo azy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny avy any Persia sy ny Lydiana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Loda
      marker-yv: yv-n
    - type: text
      text: ' ary ny Libyana'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Pota
      marker-yv: yv-n
    - type: text
      text: ' dia isan''ny miaramila mpiadinao; Nanantona ampinga sy fiarovan-doha teny aminao ireo ka nahatsara tarehy anao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny terak''i Arvada sy ny miaramilanao no teny ambonin''ny mandanao manodidina, ary lehilahy mahery no tao amin''ny tilikambonao; Ny ampingany dia nahantony teny amin''ny mandanao manodidina; Ireo no nahatanteraka ny hatsaran-tarehinao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tarsisy no mpandranto nankany aminao noho ny haben''ny harena samy hafa rehetra; Volafotsy sy vy sy vifotsy ary firaka na nentiny natakalo ny entanao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Javana sy Tobala ary Maseka no mpandranto nankany aminao, ka olona sy fanaka varahina no natakalony ny varotrao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny terak''i Togarma nitondra soavaly sy soavaly fitaingina ary ampondra natakalo ny entanao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny terak'i Dedana no mpandranto nankany aminao; Ny avy amin'ny moron-dranomasina maro no tonga hivarotra tao aminao ka nitondra ivory
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. vangy ivory
      marker-yv: yv-n
    - type: text
      text: ' sy hazomainty natakalo ny entanao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Syria no mpandranto nankany aminao noho ny habetsahan''ny tao-zavatrao, ka karbonkolo sy lamba volomparasy sy tenona samy hafa soratra sy rongony fotsy madinika sy voahangy ary robina No nentiny natakalo ny entanao. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joda sy ny tanin''ny Isiraely no mpandranto nankany aminao, ka vary tritika avy tany Minita sy zava-mamy sy tantely sy diloilo ary balsama no natakalony ny varotrao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Damaskosy no mpandranto nankany aminao noho ny habetsahan''ny taozavatrao, dia ny haben''ny harenao rehetra, ka nitondra divay avy any Helbona sy volon''ondry fotsy izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vedana koa sy Javana avy any Ozala dia nitondra vy voatefy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: vy mamirapiratra'
      marker-yv: yv-n
    - type: text
      text: ' natakalo ny entanao; Kasia sy veromanitra no natakalony ny varotrao'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Vedana sy Javana nitondra folo hatakalo ny varotrao; vy voatefy sy kasia ary veromanitra no isian''ny varotrao'
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hianao, ry zanak''olona, manaova hira fahalahelovana ny amin''i Tyro, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dedana no mpandranto nankany aminao, nitondra lamba fanao lamban-tsoavaly. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Arabia sy ireo andriandahin''i Kedara rehetra no nandranto tany aminao, ka zanak''ondry sy ondrilahy ary osilahy no nentiny natao varotra tao aminao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpandranto avy any Sheba sy Rama no mpandranto nankany aminao, Ka zava-manitra tsara indrindra sy vato soa samy hafa karazana ary volamena no nentiny natakalo ny entanao. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Harana sy Kane ary Edena sy mpandranto avy any Sheba sy Asyria ary Kilmada no mpandranto nankany aminao. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no mpandranto nankany aminao nitondra ny fitafiana marevaka rehetra, dia kapôty manga sy samy hafa soratra ary vata sedera mifehy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Na; vata mifehy mafy
      marker-yv: yv-n
    - type: text
      text: ' misy fitafiana soa no natakalony ny varotrao. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny sambon''i Tarsisy no mpitondra ny entanao, dia feno sady be voninahitra ianao teo amin''ny ranomasina. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nentin''ny mpivoinao teny amin''ny rano be ianao, dia nahavaky anao tao amin''ny ranomasina ny rivotra avy any atsinanana. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny harenao sy ny vidin''entanao, ny varotrao, ny matilonao sy ny mpitondra sambonao, ny mpanentsin-tsambonao sy ny mpividy ny entanao ary ny miaramilanao rehetra izay tao aminao mbamin''ny olona betsaka tafangona tao aminao dia nilentika tao amin''ny ranomasina tamin''ny andro nandravana anao. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho ny fidradradradran''ny mpitondra sambonao dia mihorohoro ny tany manodidina. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary samy midina miala amin''ny sambony ny mpivoy rehetra sy ny matilo ary ny mpitondra sambo rehetra eny an-dranomasina ka mijanòna eny an-tanety; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka ataovy aminy hoe: He, ry ilay monina amin''ny vava-ranomasina, Mpandranto ho an''ny firenena ho any ny moron-dranomasina maro samy hafa; Izao no lazain''i Jehovah Tompo: He, ry Tyro, ianao efa nanao hoe: Izaho dia tena tsara tarehy! '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary manandratra ny feony noho ny nanjo anao izy ka midradradradra mafy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. mangidy
      marker-yv: yv-n
    - type: text
      text: ' sady manopy vovoka hiraraka amin''ny lohany ary mihosinkosin-davenona; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary mibory loha avokoa izy noho ny aminao sy misikina lamba fisaonana ary mitomany anao amin''ny fangidiam-panahy izy, dia fisaonana mafy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha midradradradra izy, dia manao hira fahalahelovana ny aminao ka mitomany anao hoe: Iza moa no tahaka an''i Tyro, dia tahaka ilay rava ao ampovoan''ny ranomasina ? '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha nivoaka avy amin''ny ranomasina ny varotrao, dia nahatretrika firenena maro ianao; Tamin''ny haben''ny harenao sy ny varotrao dia nampanan-karena ny mpanjakan''ny tany ianao. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin''ny andro nandravan''ny ranomasina anao ho any amin''ny rano lalina dia niara-nilentika taminao ny varotrao sy ny olona tafangona tao aminao. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Talanjona anao ny mponina rehetra amin''ny moron-dranomasina, ary raiki-tahotra ny mpanjakany ka dia mivalomainty. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Misitrisitra anao ny mpandranto amin'ny firenena; tonga fampitahorana ianao ary tsy ho ao intsony mandrakizay
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ao amin''ny ranomasina ny taninao, efa tanteraky ny mpandrafitra anao ny hatsaran-tarehinao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hazo kypreso avy any Senira no nanaovany ny lampihazonao; Sedera avy any Libanona no nalainy hatao andrin-tsambonao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Oka avy any Basana no nanaovany ny fivoinao; hazo bokso avy any amin''ny moron-dranomasin''i Kitima no nataony fipetrahan''ny mpivoinao sady nasiany parike ivory. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rongony madinika samy hafa soratra avy any Egypta no natao lainao mba ho faneva ho anao; Lamba manga sy volomparasy avy any amin''ny moron-dranomasin''i Elisa no eloelonao. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mponina any Sidona sy Arvada no mpivoinao; Ny olon-kendrinao, ry Tyro, no tao aminao, ka ireo no mpitondra sambonao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zokiolon''i Gebala sy izay hendry tany no tao aminao ho mpanentsin-tsambonao; ny sambo rehetra teny amin''ny ranomasina mbamin''ny matilony dia tonga tao aminao hanakalo ny rantonao. '
