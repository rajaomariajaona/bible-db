document_id: 1JN.1,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny firaisan'ny Kristiana amin'Andriamanitra, ary ny vavolombelona mampiseho sy mahamarina izany
  - type: text
    content: 'Izay hatramin''ny voalohany, dia izay efa renay, izay efa hitan''ny masonay, izay efa nojerenay sady efa notsapain''ny tananay, dia ny amin''ny Teny Fiainana '
  '10':
  - type: text
    content: 'Raha hoy isika: Tsy nanota isika, dia mampandainga Azy, ary tsy ato anatintsika.'
  '2':
  - type: text
    content: '(fa efa naseho ny fiainana, ary efa nahita azy izahay, dia tonga vavolombelona ka manambara aminareo ny fiainana mandrakizay, izay tao amin''ny Ray ka efa naseho taminay), - '
  '3':
  - type: text
    content: 'izay efa hitanay sy renay no ambaranay aminareo, mba hahazoanareo firaisana aminay koa; ary ny firaisanay dia amin''ny Ray sy amin''i Jesosy Kristy Zanany. '
  '4':
  - type: text
    content: Ary izao zavatra izao no soratanay, mba ho tanteraka ny fifaliantsika
  - type: note
    content: 'Na: fifalianareo'
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Ary izao no teny renay taminy ka ambaranay aminareo: Andriamanitra dia mazava, ary tsy misy maizina akory ao aminy.'
  '6':
  - type: text
    content: 'Raha hoy isika: Manana firaisana aminy isika, kanefa mandeha amin''ny maizina, dia mandainga isika ka tsy manao ny marina. '
  '7':
  - type: text
    content: 'Fa raha mandeha eo amin''ny mazava isika, tahaka Azy eo amin''ny mazava, dia manana firaisana isika, ary ny ran''i Jesosy Zanany no manadio antsika ho afaka amin''ny ota rehetra. '
  '8':
  - type: text
    content: 'Raha hoy isika: Tsy manana ota isika, dia mamita-tena, ary ny marina tsy ato anatintsika.'
  '9':
  - type: text
    content: 'Raha miaiky ny fahotantsika isika, dia mahatoky sy marina Izy ka mamela ny fahotantsika sy manadio antsika ho afaka amin''ny tsi-fahamarinana rehetra. '
