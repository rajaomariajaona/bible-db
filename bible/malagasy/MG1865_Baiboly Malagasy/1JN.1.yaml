document_id: 1JN.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny firaisan'ny Kristiana amin'Andriamanitra, ary ny vavolombelona mampiseho sy mahamarina izany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izay hatramin''ny voalohany, dia izay efa renay, izay efa hitan''ny masonay, izay efa nojerenay sady efa notsapain''ny tananay, dia ny amin''ny Teny Fiainana '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '(fa efa naseho ny fiainana, ary efa nahita azy izahay, dia tonga vavolombelona ka manambara aminareo ny fiainana mandrakizay, izay tao amin''ny Ray ka efa naseho taminay), - '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'izay efa hitanay sy renay no ambaranay aminareo, mba hahazoanareo firaisana aminay koa; ary ny firaisanay dia amin''ny Ray sy amin''i Jesosy Kristy Zanany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary izao zavatra izao no soratanay, mba ho tanteraka ny fifaliantsika
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fifalianareo'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary izao no teny renay taminy ka ambaranay aminareo: Andriamanitra dia mazava, ary tsy misy maizina akory ao aminy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha hoy isika: Manana firaisana aminy isika, kanefa mandeha amin''ny maizina, dia mandainga isika ka tsy manao ny marina. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa raha mandeha eo amin''ny mazava isika, tahaka Azy eo amin''ny mazava, dia manana firaisana isika, ary ny ran''i Jesosy Zanany no manadio antsika ho afaka amin''ny ota rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Raha hoy isika: Tsy manana ota isika, dia mamita-tena, ary ny marina tsy ato anatintsika.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Raha miaiky ny fahotantsika isika, dia mahatoky sy marina Izy ka mamela ny fahotantsika sy manadio antsika ho afaka amin''ny tsi-fahamarinana rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Raha hoy isika: Tsy nanota isika, dia mampandainga Azy, ary tsy ato anatintsika.'
