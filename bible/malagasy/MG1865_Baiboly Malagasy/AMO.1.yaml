document_id: AMO.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny loza hanjo ny firenena enina amin'ny jentilisa sy ny Joda, ary indrindra fa ny Isiraely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny tenin'i Amosa, izay isan'ny mpiandry ondry tao Tekoa, dia izay hitany ny amin'ny Isiraely tamin'ny andro nanjakan'i Ozia, mpanjakan'ny Joda, sy tamin'ny andro nanjakan'i Jeroboama, zanak'i Joasy, mpanjakan'ny Isiraely, roa taona talohan'ny horohorontany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy izy: Jehovah mierona ao Ziona ary mampikotroka any Jerosalema; Ny saha fiandrasana ondry dia mitomany ary maina ny tampon''i Karmela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izao no lazain''i Jehovah: Noho ny fahotana telon''i Damaskosy, eny, efatra aza, dia tsy havelako'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. tsy hahemotro
    marker-yv: yv-n
  - type: text
    text: ' izy, satria kodia vy no nivelezany an''i Gileada; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa haterako afo ny tranon''i Hazaela, ka handevona ny tranoben''i Beni-hadada izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Hotorotoroiko koa ny hidin'i Damaskosy, ary hofoanako tsy hisy mponina
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mpanapaka'
    marker-yv: yv-n
  - type: text
    text: ' ny lohasahan''i Avena, ary Bet-edena tsy hisy hitana tehina fanapahana; Ary ny vahoakan''i Syria dia ho lasan-ko babo any Kira, hoy Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izao no lazain''i Jehovah: Noho ny fahotana telon''i Gaza, eny, efatra aza, dia tsy havelako'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. tsy hahemotro
    marker-yv: yv-n
  - type: text
    text: ' izy, satria lasany ho babo avika ny olona hatolony ho any Edoma; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa haterako afo ny mandan''i Gaza, ka handevona ny tranobeny izany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hofoanako Asdoda tsy hisy mponina, ary Askelona tsy hisy hitana tehina fanapahana; Dia haveriko ny tanako hamely an''i Ekrona, ka ho faty izay sisa amin''ny Filistina, hoy Jehovah Tompo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izao no lazain''i Jehovah: noho ny fahotana telon''i Tyro, eny efatra aza, dia tsy havelako'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. tsy hahemotro
    marker-yv: yv-n
  - type: text
    text: ' izy, satria natolony ho any Edoma ny babo rehetra, ary tsy notsarovany ny fanekem-pirahalahiana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa haterako afo ny mandan''i Tyro, ka handevona ny tranobeny izany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izao no lazain''i Jehovah: noho ny fahotana telon''i Edoma, eny, efatra aza, dia tsy havelako'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. tsy hahemotro
    marker-yv: yv-n
  - type: text
    text: ' izy, satria nanenjika ny rahalahiny tamin''ny sabatra izy, ka nofoanany ny fiantrany, ny fahatezerany dia namiravira mandrakariva, ary ny fahavinirany notehiriziny lalandava; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa haterako afo ao Temana, ka handevona ny tranoben''i Bozra izany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izao no lazain''i Jehovah: noho ny fahotana telon''ny taranak''i Amona, eny, efatra aza, dia tsy havelako'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. tsy hahemotro
    marker-yv: yv-n
  - type: text
    text: ' izy, satria notatahany izay bevohoka tao Gileada, hanitarany ny fari-taniny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa hampirehitra afo ao amin''ny mandan''i Raba Aho, ka handevona ny tranobeny izany, sady hisy akora amin''ny andro iadiana sy rivo-mahery amin''ny andron''ny tadio; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia ho lasan-ko babo ny mpanjakany mbamin'ireo mpanapaka rehetra ao aminy, hoy Jehovah.
