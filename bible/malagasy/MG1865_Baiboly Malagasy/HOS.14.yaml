document_id: HOS.14,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hamindran'i Jehovah fo amin'ny Isiraely, rehefa mibebaka
  - type: text
    content: Hovaliana Samaria noho ny helony, Fa niodina tamin'Andriamaniny izy; Ho lavon-tsabatra izy, ny zanany madinika hotorotoroina, ary izay bevohoka eo aminy hotatahana.
  '2':
  - type: text
    content: 'Ry Isiraely ô, miverena amin''i Jehovah Andriamanitrao, fa lavon-keloka ianao. '
  '3':
  - type: text
    content: 'Mitondrà teny ianareo, eny, miverena amin''i Jehovah, ka manaova aminy hoe: Mamelà ny heloka rehetra, ary raiso izay tsara, ka dia haterinay'
  - type: note
    content: Heb. haloanay
  - type: text
    content: ' ho fanatitra'
  - type: note
    content: Heb. vantotr'ombilahy
  - type: text
    content: ' ny molotray. '
  '4':
  - type: text
    content: 'Asyria tsy hamonjy anay, tsy hitaingin-tsoavaly izahay sady tsy hiteny amin''ny asan''ny tananay intsony hoe: Ry Andriamanitray ô; Fa ao aminao no ahitan''ny kamboty famindram-po. '
  '5':
  - type: text
    content: 'Hositraniko ny fiodinany, ho tia azy tsy vozonana Aho; Fa efa niala taminy ny fahatezerako. '
  '6':
  - type: text
    content: 'Ho tahaka ny ando Aho amin''ny Isiraely; Hamony tahaka ny lilia izy, ary hamaka tahaka an''i Libanona. '
  '7':
  - type: text
    content: Hisandrahaka ny rantsany, ho tahaka ny an'ny hazo oliva ny hatsaran-tarehiny, ary ho tahaka ny an'i Libanona ny hanitra avy aminy.
  '8':
  - type: text
    content: Izay mipetraka ao ambanin'ny alokalony dia hampahavokatra vary indray
  - type: note
    content: 'Na: ho velombelominao indray toy ny vary izy'
  - type: text
    content: ', ary haniry tahaka ny voaloboka izy; Ny lazany ho tahaka ny an''ny divay avy any Libanona.'
  '9':
  - type: text
    content: Ry Efraima ô, hataoko
  - type: note
    content: 'Na: Efraima hanao hoe: Hataoko'
  - type: text
    content: ' inona intsony izay sampy? Izaho dia efa nihaino ka nitsinjo anao'
  - type: note
    content: Heb. azy
  - type: text
    content: ; Tahaka ny hazo kypreso maitso Aho, avy amiko no hahazoana ny vokatrao. Iza no hendry mba hahafantatra izany zavatra izany? Na manan-tsaina mba hahalala izany? Fa mahitsy ny lalan'i Jehovah, ary ny marina no mizotra eny aminy; Fa ny mpanota kosa dia tafintohina eny aminy.
