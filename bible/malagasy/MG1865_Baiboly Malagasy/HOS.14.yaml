document_id: HOS.14,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hamindran'i Jehovah fo amin'ny Isiraely, rehefa mibebaka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Hovaliana Samaria noho ny helony, Fa niodina tamin'Andriamaniny izy; Ho lavon-tsabatra izy, ny zanany madinika hotorotoroina, ary izay bevohoka eo aminy hotatahana.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ry Isiraely ô, miverena amin''i Jehovah Andriamanitrao, fa lavon-keloka ianao. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Mitondrà teny ianareo, eny, miverena amin''i Jehovah, ka manaova aminy hoe: Mamelà ny heloka rehetra, ary raiso izay tsara, ka dia haterinay'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. haloanay
      marker-yv: yv-n
    - type: text
      text: ' ho fanatitra'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. vantotr'ombilahy
      marker-yv: yv-n
    - type: text
      text: ' ny molotray. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Asyria tsy hamonjy anay, tsy hitaingin-tsoavaly izahay sady tsy hiteny amin''ny asan''ny tananay intsony hoe: Ry Andriamanitray ô; Fa ao aminao no ahitan''ny kamboty famindram-po. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Hositraniko ny fiodinany, ho tia azy tsy vozonana Aho; Fa efa niala taminy ny fahatezerako. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ho tahaka ny ando Aho amin''ny Isiraely; Hamony tahaka ny lilia izy, ary hamaka tahaka an''i Libanona. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Hisandrahaka ny rantsany, ho tahaka ny an'ny hazo oliva ny hatsaran-tarehiny, ary ho tahaka ny an'i Libanona ny hanitra avy aminy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Izay mipetraka ao ambanin'ny alokalony dia hampahavokatra vary indray
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ho velombelominao indray toy ny vary izy'
      marker-yv: yv-n
    - type: text
      text: ', ary haniry tahaka ny voaloboka izy; Ny lazany ho tahaka ny an''ny divay avy any Libanona.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ry Efraima ô, hataoko
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Efraima hanao hoe: Hataoko'
      marker-yv: yv-n
    - type: text
      text: ' inona intsony izay sampy? Izaho dia efa nihaino ka nitsinjo anao'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. azy
      marker-yv: yv-n
    - type: text
      text: ; Tahaka ny hazo kypreso maitso Aho, avy amiko no hahazoana ny vokatrao. Iza no hendry mba hahafantatra izany zavatra izany? Na manan-tsaina mba hahalala izany? Fa mahitsy ny lalan'i Jehovah, ary ny marina no mizotra eny aminy; Fa ny mpanota kosa dia tafintohina eny aminy.
