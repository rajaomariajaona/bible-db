document_id: 1CO.12,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'ny fanomezam-pahasoavana samy hafa
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary ny amin''ny zava-panahy, ry rahalahy, dia tsy tiako tsy ho fantatrareo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ary ny anankiray ny manao fahagagana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. hery
      marker-yv: yv-n
    - type: text
      text: ', ary ny anankiray ny maminany, ary ny anankiray ny mahafantatra fanahy samy hafa, ary ny anankiray ny miteny amin''ny fiteny samy hafa tsy fantatra, ary ny anankiray ny mandika fiteny tsy fantatra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ireo rehetra ireo dia asan''ny Fanahy iray ihany, zarazarainy ho azy rehetra avy araka ny sitrapony. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa tahaka ny tena iray ihany, anefa maro no momba ny tena, ary ireo rehetra momba ny tena ireo, na dia maro aza, dia tena iray ihany, dia tahaka izany koa Kristy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fa Fanahy iray ihany no nanaovam-batisa antsika rehetra ho tena iray, na Jiosy an jentilisa
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. Grika
      marker-yv: yv-n
    - type: text
      text: ', na andevo na tsy andevo; ary isika rehetra dia efa nampisotroina ny Fanahy iray. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Nefa ny momba ny tena tsy iray, fa maro. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Raha ny tongotra hanao hoe: Satria tsy tanana aho, dia tsy mba momba ny tena, amin''izany dia tsy momba ny tena va izy? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary raha ny sofina hanao hoe: Satria tsy maso aho, dia tsy mba momba ny tena,- koa amin''izany dia tsy momba ny tena va izy? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Raha maso avokoa ny tena rehetra, aiza ary izay fandrenesana? Raha fandrenesana avokoa, aiza ary izay fanimboloana? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa Andriamanitra efa nametraka izay rehetra momba ny tena, samy ho eo amin''ny tena araka ny sitrapony. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary raha izay rehetra momba ny tena no tonga iray monja, aiza intsony izay tena? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fantatrareo fa fony jentilisa ianareo, dia nentina tany amin''ny sampy moana araka izay nitaomana anareo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa maro ny momba ny tena, nefa ny tena dia iray ihany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary ny maso tsy mahazo manao amin''ny tanana hoe: Tsy mila anao aho; ary indray, ny loha tsy mahazo manao amin''ny tongotra hoe: Tsy mila anareo aho. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa mainka ilaintsika aza ny momba ny tena izay atao ho malemilemy kokoa noho ny sasany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary ny momba ny tena izay ataontsika ho kely voninahitra kokoa dia tafiantsika voninahitra bebe kokoa; ary izay tsy misy haja amin''ny momba ny tenantsika no hajaintsika kokoa; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'fa tsy mila izany ny efa misy haja rahateo amin''ny momba ny tenantsika. Fa tamin''ny nanamboaran''Andriamanitra ny tena, dia izay kely voninahitra no nomeny voninahitra bebe kokoa, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'mba tsy hisy fisarahana eo amin''ny tena, fa mba hifampiahy ny momba ny tena rehetra. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary raha mijaly ny anankiray amin''ny momba ny tena, dia miara-mijaly avokoa izay rehetra momba ny tena; fa raha omem-boninahitra kosa ny anankiray amin''ny momba ny tena, dia miara-mifaly avokoa izay rehetra momba ny tena. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary ianareo no tenan''i Kristy, ka samy momba ny tenany avokoa araka ny anjaranareo avy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ary Andriamanitra efa nanendry ny sasany teo amin'ny fiangonana, voalohany Apostoly, faharoa mpaminany, fahatelo mpampianatra, manaraka izany dia fahagagana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. hery
      marker-yv: yv-n
    - type: text
      text: ', dia fanomezam-pahasoavana ho enti-mahasitrana, dia fanampiana, dia fitondrana, dia fiteny samy hafa tsy fantatra. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Apostoly va izy rehetra? Mpaminany va izy rehetra? Mpampianatra va izy rehetra? Manao fahagagana va izy rehetra? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Koa mampahafantatra anareo aho fa tsy misy olona ampitenenin''ny Fanahin''Andriamanitra ka manao hoe: Voaozona'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. anatema
      marker-yv: yv-n
    - type: text
      text: ' Jesosy; ary tsy misy mahay manaiky hoe: Jesosy no Tompo, raha tsy amin''ny Fanahy Masina.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Manana fanomezam-pahasoavana ho enti-mahasitrana va izy rehetra? Miteny amin''ny fiteny tsy fantatra va izy rehetra? Mandika teny va izy rehetra? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Nefa maniria fatratra ny fanomezam-pahasoavana lehibe indrindra; ary, indro, izay lalana tsara indrindra no atoroko anareo:'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Zarazaraina ho samy hafa ny fanomezam-pahasoavana, nefa ny Fanahy dia iray ihany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary zarazaraina ho samy hafa ny fanompoana, nefa ny Tompo dia iray ihany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary zarazaraina ho samy hafa ny asa, nefa Andriamanitra dia iray ihany, Izay miasa ny zavatra rehetra amin''ny olona rehetra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary izy rehetra dia samy nomena ny fampisehoana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fisehoan'''
      marker-yv: yv-n
    - type: text
      text: ' ny Fanahy hahasoa. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa ny anankiray nomen''ny Fanahy teny fahendrena, ary ny anankiray teny fahalalana, araka izany Fanahy izany ihany, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'ary ny anankiray finoana, amin''izany Fanahy izany ihany, ary ny anankiray fanomezam-pahasoavana ho enti-mahasitrana, amin''izany Fanahy iray izany ihany, '
