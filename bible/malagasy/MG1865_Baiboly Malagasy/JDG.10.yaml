document_id: JDG.10,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tantaran'i Jefta, sy ny nandreseny ny Amonita
  - type: text
    content: 'Ary taorian''i Abimeleka dia nitsangana hamonjy ny Isiraely Tola, zanak''i Dodo, lehilahy avy tamin''ny Isakara; ary mponina tao Samira any amin''ny tany havoan''i Efraima izy. '
  '10':
  - type: text
    content: 'Dia nitaraina tamin''i Jehovah ny Zanak''Isiraely ka nanao hoe: Efa nanota taminao izahay, satria efa nahafoy an''Andriamanitray ka nanompo ireo Bala. '
  '11':
  - type: text
    content: 'Ary hoy Jehovah tamin''ny Zanak''Isiraely: Moa tsy efa namonjy anareo tamin''ny tanan''ny Egyptiana sy ny Amorita sy ny taranak''i Amona ary ny Filistina va Aho? '
  '12':
  - type: text
    content: 'Ary nampahory anareo koa ny Sidoniana sy ny Amalekita ary ny Maonita, ka nitaraina tamiko ianareo, dia novonjeko tamin''ny tànany. '
  '13':
  - type: text
    content: 'Nefa ianareo nahafoy Ahy ka nanompo andriamani-kafa; koa izany kosa no tsy hamonjeko anareo intsony. '
  '14':
  - type: text
    content: 'Mandehana, ka mitaraina amin''ireo andriamanitra efa nofidinareo; aoka ireo no hamonjy anareo amin''ny andron''ny fahantranareo. '
  '15':
  - type: text
    content: 'Ary hoy ny Zanak''Isiraely tamin''i Jehovah: Efa nanota izahay; ataovy aminay izay rehetra sitrakao; kanefa mba vonjeo ihany izahay anio. '
  '16':
  - type: text
    content: Dia nanary ireo andriamani-kafa tao aminy izy ka nanompo an'i Jehovah; dia tsy nahatsindry ny fanahiny intsony Jehovah noho ny fahantran'ny Isiraely.
  '17':
  - type: text
    content: 'Dia nivory ny taranak''i Amona ka nitoby tany Gileada. Ary nivory kosa ny Zanak''Isiraely ka nitoby tany Mizpa. '
  '18':
  - type: text
    content: 'Dia nifampiera ny olona, dia ireo andrianan''i Gileada, hoe: Iza no lehilahy handeha voalohany hiady amin''ny taranak''i Amona? dia ho lohany amin''ny mponina rehetra any Gileada izy.'
  '2':
  - type: text
    content: Ary nitsara ny Isiraely telo amby roa-polo taona izy, dia maty ka nalevina tao Samira.
  '3':
  - type: text
    content: 'Ary nitsangana nandimby azy Jaïra Gileadita ka nitsara ny Isiraely roa amby roa-polo taona. '
  '4':
  - type: text
    content: Ary nanana zanakalahy telo-polo izay nitaingina zana-boriky telo-polo izy, ary izy ireo nanana tanàna telo-polo any amin'ny tany Gileada; ary atao hoe Havota-jaïra
  - type: note
    content: Havota-jaïra = Tanàna madinika an'i Jaïra
  - type: text
    content: ' mandraka androany ireo. '
  '5':
  - type: text
    content: Dia maty Jaïra ka nalevina tany Kamona.
  '6':
  - type: text
    content: 'Ary ny Zanak''Isiraely dia nanao izay ratsy eo imason''i Jehovah indray ka nanompo ireo Bala sy Astarta sy ny andriamanitr''i Syria sy ny andriamanitr''i Sidona sy ny andriamanitr''i Moaba sy ny andriamanitry ny taranak''i Amona ary ny andriamanitry ny Filistina, dia nahafoy an''i Jehovah izy ka tsy nanompo Azy. '
  '7':
  - type: text
    content: 'Dia nirehitra tamin''ny Isiraely ny fahatezeran''i Jehovah, ka nivarotra azy ho eo an-tànan''ny Filistina sy ho eo an-tànan''ny taranak''i Amona Izy. '
  '8':
  - type: text
    content: 'Ary nampahory sy nanorotoro ny Zanak''Isiraely ireo tamin''izany taona izany: valo ambin''ny folo taona no nampahoriany ny Zanak''Isiraely rehetra, izay tany an-dafin''i Jordana, tany amin''ny tanin''ny Amorita any Gileada. '
  '9':
  - type: text
    content: 'Ary nita an''i Jordana ny taranak''i Amona mba hiady koa amin''ny Joda sy ny Benjamina ary ny taranak''i Efraima; ka dia nahantra indrindra ny Isiraely. '
