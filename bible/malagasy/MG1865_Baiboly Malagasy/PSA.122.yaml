document_id: PSA.122,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fifaliana ny amin'i Jerosalema sy fangatahan-tsoa ho azy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fihirana fiakarana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Fihirana misy hevitra ambaratonga'
      marker-yv: yv-n
    - type: text
      text: '. Nataon''i Davida. FALY aho, raha hoy izy ireo tamiko: Andeha isika ho any an-tranon''i Jehovah. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tongotray efa mijoro Eo anatin'ny vavahadinao, ry Jerosalema ô,
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia ianao ry Jerosalema, izay efa vita Tahaka ny tanàna efa voalamina tsara; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Any no iakaran''ny firenena,Dia ireo firenen''i Jehovah (Lalàna amin''ny Isiraely izany). Mba hisaotra ny anaran''i Jehovah. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa any no misy seza fitsarana mipetraka, Dia ny seza fiandrianan'ny mpianakavin'i Davida.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mangataha fiadanana ho an''i Jerosalema; Hambinina anie izay tia anao; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fiadanana anie ho ao anatin''ny mandanao; Fanambinana anie ho ao an-dapanao '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho ny rahalahiko sy ny namako No hanaovako hoe Fiadanana anie ho ao anatinao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Noho ny tranon'i Jehovah Andriamanitsika Dia hitady izay hahatsara anao aho.
