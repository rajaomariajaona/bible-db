document_id: PSA.122,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fifaliana ny amin'i Jerosalema sy fangatahan-tsoa ho azy
  - type: text
    content: Fihirana fiakarana
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga'
  - type: text
    content: '. Nataon''i Davida. FALY aho, raha hoy izy ireo tamiko: Andeha isika ho any an-tranon''i Jehovah. '
  '2':
  - type: text
    content: Ny tongotray efa mijoro Eo anatin'ny vavahadinao, ry Jerosalema ô,
  '3':
  - type: text
    content: 'Dia ianao ry Jerosalema, izay efa vita Tahaka ny tanàna efa voalamina tsara; '
  '4':
  - type: text
    content: 'Any no iakaran''ny firenena,Dia ireo firenen''i Jehovah (Lalàna amin''ny Isiraely izany). Mba hisaotra ny anaran''i Jehovah. '
  '5':
  - type: text
    content: Fa any no misy seza fitsarana mipetraka, Dia ny seza fiandrianan'ny mpianakavin'i Davida.
  '6':
  - type: text
    content: 'Mangataha fiadanana ho an''i Jerosalema; Hambinina anie izay tia anao; '
  '7':
  - type: text
    content: 'Fiadanana anie ho ao anatin''ny mandanao; Fanambinana anie ho ao an-dapanao '
  '8':
  - type: text
    content: 'Noho ny rahalahiko sy ny namako No hanaovako hoe Fiadanana anie ho ao anatinao. '
  '9':
  - type: text
    content: Noho ny tranon'i Jehovah Andriamanitsika Dia hitady izay hahatsara anao aho.
