document_id: JOB.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny teny voalohany nataon'i Bildada
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia namaly Bildada Sohita ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mandra-pahoviana no hiteny toy izany ianao, ka ho rivotra mahery ny teny aloaky ny vavanao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Andriamanitra va hamadika ny fitsarana, na ny Tsitoha hamadika ny rariny?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Raha nanota taminy ny zanakao, dia efa nampanodiaviny azy ny fahadisoany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa raha ianao kosa mandroso mitady an'Andriamanitra ka mifona amin'ny Tsitoha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary raha madio sy mahitsy ianao, dia hifoha hamonjy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hiambina'
    marker-yv: yv-n
  - type: text
    text: ' anao tokoa Izy ary hampiadana indray ny fonenan''ny fahamarinanao,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ka na dia kely aza no niandohanao, dia ho lehibe indrindra no hiafaranao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa masìna ianao, anontanio ange ny ntaolo, ka fantaro ny hevitra hitan'ny razany
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: (Fa vao omaly isika ka tsy mba mahalala, fa aloka ihany ny androntsika etỳ ambonin'ny tany);
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy ireny va no hampianatra anao ka hilaza aminao ary hamoaka teny avy ao am-pony?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Haniry va ny zozoro, raha tsy eny amin'ny fotaka? Hitrebona va ny harefo, raha tsy misy rano?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mbola maitso izy sady tsy voajinja, kanefa malazo alohan'ny zava-maitso rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Toy izany no lalan'izay rehetra manadino an'Andriamanitra; Ary ho very ny fanantenan'ny mpihatsaravelatsihy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ratsy fanahy'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa ho maito ny fanantenany, eny, ho tranon-kala ny tokiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Miankina amin'ny tranony izy, kanjo tsy maharitra iny; Mihazona azy mafy izy, kanjo tsy mahazaka azy iny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mitsimoka tsara tandrifin'ny masoandro izy, ary ny rantsany misandrahaka eo amin'ny tanimboliny;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mifelipelika mifaniditra eo amin'ny korontam-bato ny fakany ary mahazo any anelanelany;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Kanjo nony fongorany hiala amin''ny fitoerany izy, dia handà azy izany ka hanao hoe: Tsy mbola nahita anao akory aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Indro, izany ihany no fifalian'ny lalan-kalehany; ary hisy hafa indray mitrebona avy amin'ny vovoka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Indro, Andriamanitra tsy hanary ny olona tsy manan-tsiny ary tsy hitantana ny mpanao ratsy;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mbola hofenoiny hehy ny vavanao sy hoby ny molotrao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Izay mankahala anao hitafy henatra; Ary tsy hisy intsony ny lain'ny ratsy fanahy.
