document_id: JOB.8,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny teny voalohany nataon'i Bildada
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly Bildada Sohita ka nanao hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy ireny va no hampianatra anao ka hilaza aminao ary hamoaka teny avy ao am-pony?
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Haniry va ny zozoro, raha tsy eny amin'ny fotaka? Hitrebona va ny harefo, raha tsy misy rano?
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mbola maitso izy sady tsy voajinja, kanefa malazo alohan'ny zava-maitso rehetra.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toy izany no lalan'izay rehetra manadino an'Andriamanitra; Ary ho very ny fanantenan'ny mpihatsaravelatsihy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ratsy fanahy'
      marker-yv: yv-n
    - type: text
      text: ','
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ho maito ny fanantenany, eny, ho tranon-kala ny tokiny.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Miankina amin'ny tranony izy, kanjo tsy maharitra iny; Mihazona azy mafy izy, kanjo tsy mahazaka azy iny.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mitsimoka tsara tandrifin'ny masoandro izy, ary ny rantsany misandrahaka eo amin'ny tanimboliny;
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mifelipelika mifaniditra eo amin'ny korontam-bato ny fakany ary mahazo any anelanelany;
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanjo nony fongorany hiala amin''ny fitoerany izy, dia handà azy izany ka hanao hoe: Tsy mbola nahita anao akory aho.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indro, izany ihany no fifalian'ny lalan-kalehany; ary hisy hafa indray mitrebona avy amin'ny vovoka.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mandra-pahoviana no hiteny toy izany ianao, ka ho rivotra mahery ny teny aloaky ny vavanao?
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indro, Andriamanitra tsy hanary ny olona tsy manan-tsiny ary tsy hitantana ny mpanao ratsy;
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mbola hofenoiny hehy ny vavanao sy hoby ny molotrao.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mankahala anao hitafy henatra; Ary tsy hisy intsony ny lain'ny ratsy fanahy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Andriamanitra va hamadika ny fitsarana, na ny Tsitoha hamadika ny rariny?
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha nanota taminy ny zanakao, dia efa nampanodiaviny azy ny fahadisoany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha ianao kosa mandroso mitady an'Andriamanitra ka mifona amin'ny Tsitoha.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha madio sy mahitsy ianao, dia hifoha hamonjy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: hiambina'
      marker-yv: yv-n
    - type: text
      text: ' anao tokoa Izy ary hampiadana indray ny fonenan''ny fahamarinanao,'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ka na dia kely aza no niandohanao, dia ho lehibe indrindra no hiafaranao.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa masìna ianao, anontanio ange ny ntaolo, ka fantaro ny hevitra hitan'ny razany
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: (Fa vao omaly isika ka tsy mba mahalala, fa aloka ihany ny androntsika etỳ ambonin'ny tany);
