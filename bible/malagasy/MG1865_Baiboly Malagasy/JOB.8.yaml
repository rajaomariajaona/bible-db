document_id: JOB.8,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny voalohany nataon'i Bildada
  - type: text
    content: 'Dia namaly Bildada Sohita ka nanao hoe:'
  '10':
  - type: text
    content: Tsy ireny va no hampianatra anao ka hilaza aminao ary hamoaka teny avy ao am-pony?
  '11':
  - type: text
    content: Haniry va ny zozoro, raha tsy eny amin'ny fotaka? Hitrebona va ny harefo, raha tsy misy rano?
  '12':
  - type: text
    content: Mbola maitso izy sady tsy voajinja, kanefa malazo alohan'ny zava-maitso rehetra.
  '13':
  - type: text
    content: Toy izany no lalan'izay rehetra manadino an'Andriamanitra; Ary ho very ny fanantenan'ny mpihatsaravelatsihy
  - type: note
    content: 'Na: ratsy fanahy'
  - type: text
    content: ','
  '14':
  - type: text
    content: Fa ho maito ny fanantenany, eny, ho tranon-kala ny tokiny.
  '15':
  - type: text
    content: Miankina amin'ny tranony izy, kanjo tsy maharitra iny; Mihazona azy mafy izy, kanjo tsy mahazaka azy iny.
  '16':
  - type: text
    content: Mitsimoka tsara tandrifin'ny masoandro izy, ary ny rantsany misandrahaka eo amin'ny tanimboliny;
  '17':
  - type: text
    content: Mifelipelika mifaniditra eo amin'ny korontam-bato ny fakany ary mahazo any anelanelany;
  '18':
  - type: text
    content: 'Kanjo nony fongorany hiala amin''ny fitoerany izy, dia handà azy izany ka hanao hoe: Tsy mbola nahita anao akory aho.'
  '19':
  - type: text
    content: Indro, izany ihany no fifalian'ny lalan-kalehany; ary hisy hafa indray mitrebona avy amin'ny vovoka.
  '2':
  - type: text
    content: Mandra-pahoviana no hiteny toy izany ianao, ka ho rivotra mahery ny teny aloaky ny vavanao?
  '20':
  - type: text
    content: Indro, Andriamanitra tsy hanary ny olona tsy manan-tsiny ary tsy hitantana ny mpanao ratsy;
  '21':
  - type: text
    content: Mbola hofenoiny hehy ny vavanao sy hoby ny molotrao.
  '22':
  - type: text
    content: Izay mankahala anao hitafy henatra; Ary tsy hisy intsony ny lain'ny ratsy fanahy.
  '3':
  - type: text
    content: Andriamanitra va hamadika ny fitsarana, na ny Tsitoha hamadika ny rariny?
  '4':
  - type: text
    content: Raha nanota taminy ny zanakao, dia efa nampanodiaviny azy ny fahadisoany.
  '5':
  - type: text
    content: Fa raha ianao kosa mandroso mitady an'Andriamanitra ka mifona amin'ny Tsitoha.
  '6':
  - type: text
    content: Ary raha madio sy mahitsy ianao, dia hifoha hamonjy
  - type: note
    content: 'Na: hiambina'
  - type: text
    content: ' anao tokoa Izy ary hampiadana indray ny fonenan''ny fahamarinanao,'
  '7':
  - type: text
    content: Ka na dia kely aza no niandohanao, dia ho lehibe indrindra no hiafaranao.
  '8':
  - type: text
    content: Fa masìna ianao, anontanio ange ny ntaolo, ka fantaro ny hevitra hitan'ny razany
  '9':
  - type: text
    content: (Fa vao omaly isika ka tsy mba mahalala, fa aloka ihany ny androntsika etỳ ambonin'ny tany);
