document_id: PSA.11,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny avalin'ny mahery finoana izay sakaizany saro-tahotra
  - type: text
    content: 'Ho an''ny mpiventy hira. Nataon''i Davida. Jehovah no ialofako; ahoana no anaovanareo amin''ny fanahiko hoe: mandosira ho any an-tendrombohitrareo toy ny voron-kely'
  - type: note
    content: 'Na: ry voronkely'
  - type: text
    content: '?'
  '2':
  - type: text
    content: 'Fa, indro, ny ratsy fanahy manenjana ny tsipìkany; efa nanamboatra ny zana-tsipìkany eo amin''ny kofehy izy, nikendry tao amin''ny maizina hitifitra ny mahitsy fo. '
  '3':
  - type: text
    content: Fa rava ny fanorenana
  - type: note
    content: 'Na: voazera ny andry'
  - type: text
    content: ', ka inona indray no azon''ny marina atao? '
  '4':
  - type: text
    content: Jehovah dia ao amin'ny tempoliny masina, ny seza fiandrianan'i Jehovah dia any an-danitra; ny masony mijery, eny, ny hodi-masony mizaha toetra ny zanak'olombelona.
  '5':
  - type: text
    content: 'Jehovah mizaha toetra ny marina; fa ny ratsy fanahy sy ny mifaly hampidi-doza dia samy halan''ny fanahiny. '
  '6':
  - type: text
    content: 'Handatsaka fandrika amin''ny ratsy fanahy Izy tahaka ny fandatsaka ranonorana; afo sy solifara ary rivo-mahamay no ho anjara kapoakany. '
  '7':
  - type: text
    content: Fa marina Jehovah, ka fahamarinana no tiany; ny mahitsy no hahita ny tavany
  - type: note
    content: 'Na: Ny mahitsy no hitan''ny tavany'
  - type: text
    content: .
