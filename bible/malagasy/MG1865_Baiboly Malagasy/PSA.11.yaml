document_id: PSA.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny avalin'ny mahery finoana izay sakaizany saro-tahotra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Nataon''i Davida. Jehovah no ialofako; ahoana no anaovanareo amin''ny fanahiko hoe: mandosira ho any an-tendrombohitrareo toy ny voron-kely'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ry voronkely'
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa, indro, ny ratsy fanahy manenjana ny tsipìkany; efa nanamboatra ny zana-tsipìkany eo amin''ny kofehy izy, nikendry tao amin''ny maizina hitifitra ny mahitsy fo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa rava ny fanorenana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: voazera ny andry'
    marker-yv: yv-n
  - type: text
    text: ', ka inona indray no azon''ny marina atao? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Jehovah dia ao amin'ny tempoliny masina, ny seza fiandrianan'i Jehovah dia any an-danitra; ny masony mijery, eny, ny hodi-masony mizaha toetra ny zanak'olombelona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jehovah mizaha toetra ny marina; fa ny ratsy fanahy sy ny mifaly hampidi-doza dia samy halan''ny fanahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Handatsaka fandrika amin''ny ratsy fanahy Izy tahaka ny fandatsaka ranonorana; afo sy solifara ary rivo-mahamay no ho anjara kapoakany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa marina Jehovah, ka fahamarinana no tiany; ny mahitsy no hahita ny tavany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ny mahitsy no hitan''ny tavany'
    marker-yv: yv-n
  - type: text
    text: .
