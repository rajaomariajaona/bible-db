document_id: JHN.5
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa afaka izany, dia nisy andro firavoravoan''ny Jiosy, ary Jesosy niakatra tany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary misy farihy any Jerosalema, eo akaikin''ny vavahadin''ondry, izay atao amin''ny teny Hebreo hoe Betesda, misy fialofana dimy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tao no nandrian'ny marary maro, ny jamba, ny mandringa, ny mati-ila
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Gr. efa maina, na malazo. Ampio hoe: miandry ny fihetsehan''ny rano (4) Fa nisy anjely nidina tany amin''ny farihy indraindray ka nampihetsika ny rano; koa izay iray niroboka aloha, rehefa nihetsika ny rano, dia sitrana na inona na inona no aretina nanjo azy'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nisy lehilahy anankiray teo, izay efa narary valo amby telo-polo taona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha nahita azy mandry Jesosy ka nahalala fa efa toy izany ela izy, dia hoy Izy taminy: Te-ho sitrana va ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ilay marary namaly Azy hoe: Tompoko, raha hetsehina ny rano, dia tsy mba misy olona handroboka ahy eto amin''ny farihy; nefa raha mandeha aho, dia misy olon-kafa misosoka eo alohako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hoy Jesosy taminy: Mitsangana, ento ny fandrianao, ka mandehana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary niaraka tamin''izay dia sitrana ralehilahy ka nitondra ny fandriany, dia lasa nandeha. Ary Sabata izay andro izay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy ny Jiosy tamin''ilay efa sitrana: Sabata ny andro, ka tsy mety raha mitondra ny fandrianao ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa ralehilahy namaly azy hoe: Ilay nahasitrana ahy no nanao tamiko hoe: Ento ny fandrianao, ka mandehana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ireo nanontany azy hoe: Iza moa izany Lehilahy izany Izay nanao taminao hoe: Ento ny fandrianao, ka mandehana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa ilay sitrana tsy nahalala Ary; fa niala teo Jesosy, satria nisy vahoaka betsaka teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Rehefa afaka izany, dia hitan''i Jesosy teo an-kianjan''ny tempoly ralehilahy, ka hoy Izy taminy: Indro, efa sitrana ianao; aza manota intsony, fandrao hanjo anao izay ratsy noho ny teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia lasa ralehilahy ka nanambara tamin''ny Jiosy fa Jesosy no nahasitrana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary noho izany ny Jiosy dia nanenjika an''i Jesosy, satria nanao izany zavatra izany tamin''ny Sabata Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa Jesosy namaly azy hoe: Ny Raiko miasa mandraka ankehitriny, ary Izaho koa miasa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nefa vao mainka nitady hamono Azy ny Jiosy, tsy noho ny namahany ny amin''ny Sabata ihany, fa noho ny nilazany koa fa Andriamanitra no Rainy, ka nanao ny tenany ho mitovy amin''Andriamanitra Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary Jesosy namaly ka nanao taminy hoe: Lazaiko aminareo marina dia marina tokoa: Ny Zanaka tsy mahazo manao na inona na inona ho Azy, afa-tsy izay hitany ataon''ny Ray; fa na inona na inona no ataon''ny Ray dia toy izany koa no ataon''ny Zanaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa ny Ray tia ny Zanaka ka maneho Azy ny zavatra rehetra izay ataon''ny tenany; ary asa lehibe noho ireny no hasehony Azy, mba ho gaga ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa toy ny Ray manangana sy mamelona ny maty, dia tahaka izany koa no ameloman''ny Zanaka izay tiany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa ny Ray aza tsy mitsara olona, fa ny fitsarana rehetra dia nomeny ny Zanaka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'mba hanajan''ny olona rehetra ny Zanaka, tahaka ny fanajany ny Ray. Izay tsy manaja ny Zanaka dia tsy manaja ny Ray, Izay naniraka Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Lazaiko aminareo marina dia marina tokoa: Izay mandre ny teniko ka mino Izay naniraka Ahy no manana fiainana mandrakizay, ka tsy hohelohina'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. hotsaraina
    marker-yv: yv-n
  - type: text
    text: '; fa tafafindra niala tamin''ny fahafatesana ho amin''ny fiainana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Lazaiko aminareo marina dia marina tokoa: Avy ny andro'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. ora
    marker-yv: yv-n
  - type: text
    text: ' ary tonga ankehitriny, izay handrenesan''ny maty ny feon''ny Zanak''Andriamanitra; ary izay mandre dia ho velona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa tahaka ny Ray manana fiainana ho Azy, dia tahaka izany koa ny Zanaka nomeny hanana fiainana ho Azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ary nomeny fahefana hitsara Izy, satria Zanak''olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Aza gaga amin'izany; fa avy ny andro
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. ora
    marker-yv: yv-n
  - type: text
    text: ' izay handrenesan''ny olona rehetra any am-pasana ny feony; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'dia hivoaka izy: izay nanao tsara dia ho any amin''ny fitsanganana ho fiainana fa izay nanao ratsy kosa dia ho any amin''fitsanganana ho fahamelohana'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. ho fitsarana
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Raha Izaho ihany, dia tsy mahay manao na inona na inona; araka izay reko no itsarako; ary marina ny fitsarako; fa tsy mitady ny sitrapoko Aho, fa ny sitrapon''izay naniraka Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Raha Izaho no manambara ny tenako, dia tsy marina ny fanambarako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Misy Anankiray Izay manambara Ahy. ary fantatro fa marina ny fanambarana izay anambarany Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Hianareo naniraka tany amin''i Jaona, ary nanambara ny marina izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Fa Izaho tsy mandray ny fanambarana avy amin''olona; fa milaza izany zavatra izany Aho mba ho voavonjy ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Izy dia jiro nirehitra ka nazava; ary nahafinaritra anareo ny nifalianareo vetivety tamin''faharavany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Fa Izaho kosa manana fanambarana lehibe noho Jaona; fa ny asa nomen''ny Ahy hovitaiko, dia izany asa ataoko izany no manambara Ahy fa nirahin''ny Ray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary ny Ray Izay naniraka Ahy, Izy no nanambara Ahy. Tsy mba renareo ny feony, na hitanareo akory aza ny endriny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ary ny teniny tsy mba mitoetra ao anatinareo, satria tsy mino Izay nirahiny ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Dinihinareo
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Diniho'
    marker-yv: yv-n
  - type: text
    text: ' ny Soratra Masina, ataonareo fa ao aminy no anananareo fiainana mandrakizay, ary ireny no manambara Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Kanefa tsy mety manatona Ahy ianareo hanananareo fiainana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Tsy mandray laza avy amin''olona '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Fa fantatro ianareo, fa tsy misy fitiavana an''Andriamanitra ao am-ponareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Izaho dia avy amin''ny anaran''ny Raiko, nefa tsy raisinareo; raha misy hafa avy amin''ny anaran''ny tenany, dia horaisinareo ihany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Hataonareo izay mifampitady laza ahoana no fino, nefa ny laza avy amin''ny Andriamanitra Tokana kosa dia tsy tadiavinareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Aza ataonareo fa Izaho no hiampanga anareo amin''ny Ray; misy ny mpiampanga anareo, dia Mosesy izay itokianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Fa raha mba nino an''i Mosesy ianareo, dia hino Ahy, satria nanoratra nilaza Ahy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Fa raha tsy mino izay nosoratany ianareo, hataonareo ahoana no fino ny teniko?
