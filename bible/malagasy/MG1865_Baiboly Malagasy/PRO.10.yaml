document_id: PRO.10,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ohabolana samy hafa ny amin'ny tsi-fitovian'ny toetry ny hendry sy ny adala, mbamin'ny valin'ny ataony avy
  - type: text
    content: Ohabolan'i Solomona. Ny zanaka hendry mahafaly ny rainy; Fa ny zanaka adala mampalahelo ny reniny.
  '10':
  - type: text
    content: Izay mami-maso manome alahelo; Fa ho lavo ny adala maro vava.
  '11':
  - type: text
    content: Loharanon'aina ny vavan'ny marina; Fa loza no mandrakotra ny vavan'ny ratsy fanahy
  - type: note
    content: Izahao and. 6
  - type: text
    content: '. '
  '12':
  - type: text
    content: Ny fankahalana dia manetsika ady; Fa ny fitiavana manarona ny ota rehetra.
  '13':
  - type: text
    content: Amin'ny molotry ny manan-tsaina no ahitam-pahendrena; Fa tsorakazo no ho amin'ny lamosin'ny tsy ampy saina.
  '14':
  - type: text
    content: 'Ny hendry mirakitra fahalalana; Fa ny vavan''ny adala eo akaikin''ny fandringanana. '
  '15':
  - type: text
    content: Ny haren'ny manan-karena no vohiny mafy; Fa ny tsi-fananan'ny ory no fandringanana azy.
  '16':
  - type: text
    content: Ho fiainana ny asan'ny marina; Fa ho ota ny fitomboan'ny haren'ny ratsy fanahy.
  '17':
  - type: text
    content: 'Izay mino anatra dia ho tonga eo amin''ny lalan''ny fiainana; Fa mivily izay mandà anatra. '
  '18':
  - type: text
    content: Izay mitahiry lolompo dia manana molotra mandainga, Ary izay mampiely endrikendrika dia adala.
  '19':
  - type: text
    content: Ny teny maro tsy ilaozan'izay ota; Fa izay mahatana ny molony no hendry.
  '2':
  - type: text
    content: Ny harena azo amin'ny tsy marina dia tsy mahasoa na inona na inona; Fa ny fahamarinana no mamonjy amin'ny fahafatesana.
  '20':
  - type: text
    content: Volafotsy voafantina ny lelan'ny marina; Fa ny fon'ny ratsy fanahy tsy misy vidiny.
  '21':
  - type: text
    content: Ny molotry ny marina mamelona ny maro; Fa maty ny adala noho ny tsi-fananany fahalalana.
  '22':
  - type: text
    content: Ny fitahian'i Jehovah no mampanan-karena, Ary tsy azon'ny fisasarana ampiana izany
  - type: note
    content: 'Na: Ary tsy ampiany alahelo'
  - type: text
    content: '. '
  '23':
  - type: text
    content: Toa laolaon'ny adala ny fanaovan-dratsy Fa raha ny manan-tsaina, dia fahendrena kosa
  - type: note
    content: 'Na: Toa laolaon''ny adala ny fahafetsena; Fa ny manan-tsaina no manam-pahendrena'
  - type: text
    content: .
  '24':
  - type: text
    content: Ny tahotry ny ratsy fanahy hihatra aminy; Fa ny irin'ny marina no homena azy.
  '25':
  - type: text
    content: Rehefa mipaoka ny tafio-drivotra, dia tsy ao intsony ny ratsy fanahy; Fa ny marina voaorina ho mandrakizay.
  '26':
  - type: text
    content: Toy ny vinaingitra amin'ny nify sy ny setroka amin'ny maso. Dia mba toy izany koa ny malaina amin'izay maniraka azy.
  '27':
  - type: text
    content: Ny fahatahorana an'i Jehovah no mahela velona; Fa ny taonan'ny ratsy fanahy hohafohezina.
  '28':
  - type: text
    content: Ny fanantenan'ny marina dia fifaliana; Fa ny fanantenan'ny ratsy fanahy ho foana.
  '29':
  - type: text
    content: Ny lalan'i Jehovah dia fiarovana mafy ho an'izay tsy misy tsiny, Fa fandringanana kosa ho an'ny mpanao ratsy.
  '3':
  - type: text
    content: Tsy avelan'i Jehovah ho mosarena ny fanahin'ny marina; Fa foanany ny fanirian'ny ratsy fanahy.
  '30':
  - type: text
    content: 'Ny marina tsy hangozohozo mandrakizay; Fa ny ratsy fanahy tsy honina amin''ny tany. '
  '31':
  - type: text
    content: Eo amin'ny vavan'ny marina no itsimohan'ny fahendrena; Fa ny lela fandainga hofongorana.
  '32':
  - type: text
    content: Ny molotry ny marina mahalala izay ankasitrahana; Fa ny vavan'ny ratsy fanahy dia feno fitaka.
  '4':
  - type: text
    content: Ho tonga malahelo ny miraviravy tanana amin'ny asany; Fa mampanan-karena ny tanan'ny mazoto.
  '5':
  - type: text
    content: Izay manangona amin'ny fararano no zanaka hendry; Fa izay sondrian-tory amin'ny taom-pijinjana no zanaka mampahamenatra.
  '6':
  - type: text
    content: Fitahiana no ho ao amin'ny lohan'ny marina; Fa loza no mandrakotra
  - type: note
    content: 'Na: Fa manaron-doza'
  - type: text
    content: ' ny vavan''ny ratsy fanahy. '
  '7':
  - type: text
    content: Hankasitrahana ny fahatsiarovana ny marina; Fa ho lò ny anaran'ny ratsy fanahy.
  '8':
  - type: text
    content: Izay hendry am-po no handray ny didy; Fa ho lavo ny adala maro vava.
  '9':
  - type: text
    content: Izay mandeha tsy misy tsiny no mandeha matoky; Fa izay maniasia amin'ny alehany dia fantatra.
