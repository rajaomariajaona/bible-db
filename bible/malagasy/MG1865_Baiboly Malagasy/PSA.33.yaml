document_id: PSA.33,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an'Andriamanitra Mpitondra izao rehetra izao sy Mpiaro ny olona
  - type: text
    content: 'Mihobia ho an''i Jehovah ianareo, ry olo-marina; fa mendrika hataon''ny olo-mahitsy ny fiderana. '
  '10':
  - type: text
    content: 'Jehovah mahafoana ny fisainan''ny firenen-tsamy hafa; Mahatsinontsinona ny hevitry ny olona Izy. '
  '11':
  - type: text
    content: Ny fisainan'i Jehovah maharitra mandrakizay, ny hevitry ny fony mahatratra ny taranaka fara mandimby.
  '12':
  - type: text
    content: 'Sambatra ny firenena izay manana an''i Jehovah ho Andriamaniny, dia ny olona nofidiny ho lovany. '
  '13':
  - type: text
    content: 'Eny an-danitra no itsinjovan''i Jehovah, mijery ny zanak''olombelona rehetra Izy; '
  '14':
  - type: text
    content: 'Eo amin''ny fonenany no ijereny ny mponina rehetra ambonin''ny tany, '
  '15':
  - type: text
    content: 'Dia Izy Mpamorona ny fon''izy rehetra sy Mpamantatra ny asany rehetra. '
  '16':
  - type: text
    content: 'Tsy misy mpanjaka voavonjin''ny hamaroan''ny miaramilany; ny olo-mahery tsy voavonjin''ny haben''ny heriny. '
  '17':
  - type: text
    content: 'Ny soavaly tsy azo itokiana ho famonjena, ary tsy mahavonjy ny haben''ny heriny. '
  '18':
  - type: text
    content: 'Indro, ny mason''i Jehovah mitsinjo izay matahotra Azy, dia izay manantena ny famindram-pony, '
  '19':
  - type: text
    content: mba hanafaka ny fanahiny amin'ny fahafatesana, sy hamelona azy, raha misy mosary.
  '2':
  - type: text
    content: 'Miderà an''i Jehovah amin''ny lokanga; mankalazà Azy amin''ny valiha tory folo. '
  '20':
  - type: text
    content: 'Ny fanahintsika miandry an''i Jehovah; famonjena antsika sy ampingantsika Izy. '
  '21':
  - type: text
    content: 'Fa Izy no ifalian''ny fontsika, satria ny anarany masina no itokiantsika. '
  '22':
  - type: text
    content: Jehovah ô, aoka ny famindram-ponao hitoetra aminay araka ny anantenanay Anao.
  '3':
  - type: text
    content: 'Mihirà fihiram-baovao ho Azy; mitendre tsara amin''ny feo fifaliana. '
  '4':
  - type: text
    content: 'Fa mahitsy ny tenin''i Jehovah, ary ny asany rehetra dia mahatoky avokoa. '
  '5':
  - type: text
    content: Tia fahamarinana sy rariny Izy; henika ny famindram-pon'i Jehovah ny tany.
  '6':
  - type: text
    content: 'Ny tenin''i Jehovah no nanaovana ny lanitra; ary ny fofonain''ny vavany no nanaovana ny hamaroany rehetra. '
  '7':
  - type: text
    content: 'Mampiavosa ny rano ao an-dranomasina ho toy ny antontan-javatra Izy; mitahiry ny rano lalina ao an-trano fitehirizana Izy. '
  '8':
  - type: text
    content: 'Aoka hatahotra an''i Jehovah ny tany rehetra; aoka hangovitra eo anatrehany ny mponina rehetra amin''izao tontolo izao. '
  '9':
  - type: text
    content: Fa Izy no niteny dia ary izany; Izy no nandidy, dia nitoetra mafy izany.
