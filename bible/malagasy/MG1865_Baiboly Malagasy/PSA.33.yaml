document_id: PSA.33,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiderana an'Andriamanitra Mpitondra izao rehetra izao sy Mpiaro ny olona
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Mihobia ho an''i Jehovah ianareo, ry olo-marina; fa mendrika hataon''ny olo-mahitsy ny fiderana. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Jehovah mahafoana ny fisainan''ny firenen-tsamy hafa; Mahatsinontsinona ny hevitry ny olona Izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ny fisainan'i Jehovah maharitra mandrakizay, ny hevitry ny fony mahatratra ny taranaka fara mandimby.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Sambatra ny firenena izay manana an''i Jehovah ho Andriamaniny, dia ny olona nofidiny ho lovany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Eny an-danitra no itsinjovan''i Jehovah, mijery ny zanak''olombelona rehetra Izy; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Eo amin''ny fonenany no ijereny ny mponina rehetra ambonin''ny tany, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia Izy Mpamorona ny fon''izy rehetra sy Mpamantatra ny asany rehetra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Tsy misy mpanjaka voavonjin''ny hamaroan''ny miaramilany; ny olo-mahery tsy voavonjin''ny haben''ny heriny. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ny soavaly tsy azo itokiana ho famonjena, ary tsy mahavonjy ny haben''ny heriny. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Indro, ny mason''i Jehovah mitsinjo izay matahotra Azy, dia izay manantena ny famindram-pony, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: mba hanafaka ny fanahiny amin'ny fahafatesana, sy hamelona azy, raha misy mosary.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Miderà an''i Jehovah amin''ny lokanga; mankalazà Azy amin''ny valiha tory folo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ny fanahintsika miandry an''i Jehovah; famonjena antsika sy ampingantsika Izy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fa Izy no ifalian''ny fontsika, satria ny anarany masina no itokiantsika. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Jehovah ô, aoka ny famindram-ponao hitoetra aminay araka ny anantenanay Anao.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Mihirà fihiram-baovao ho Azy; mitendre tsara amin''ny feo fifaliana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa mahitsy ny tenin''i Jehovah, ary ny asany rehetra dia mahatoky avokoa. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tia fahamarinana sy rariny Izy; henika ny famindram-pon'i Jehovah ny tany.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ny tenin''i Jehovah no nanaovana ny lanitra; ary ny fofonain''ny vavany no nanaovana ny hamaroany rehetra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Mampiavosa ny rano ao an-dranomasina ho toy ny antontan-javatra Izy; mitahiry ny rano lalina ao an-trano fitehirizana Izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Aoka hatahotra an''i Jehovah ny tany rehetra; aoka hangovitra eo anatrehany ny mponina rehetra amin''izao tontolo izao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa Izy no niteny dia ary izany; Izy no nandidy, dia nitoetra mafy izany.
