document_id: DEU.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampahatsiarovana ny nitondran'Andriamanitra ny Isiraely sy ny nampanetreny tena azy, ary fananarana azy, andrao miavonavona izy ka manadino an'Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny lalàna rehetra izay andidiako anao anio dia tandremo harahinareo, mba ho velona ianareo ka hihamaro ary hiditra sady handova ny tany izay nianianan''i Jehovah tamin''ny razanareo homena azy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary tsarovy ny lalana rehetra izay nitondran''i Jehovah Andriamanitrao anao tany an-efitra izao efa-polo taona izao, hampanetry tena anao sy hizaha toetra anao ary hahalala izay ao am-ponao, na hitandrina ny didiny ianao, na tsia. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nampanetry tena anao Izy ka namela anao ho noana, dia nanome anao ny mana hohaninao, izay tsy fantatrao na ny razanao, hampahafantarany anao fa tsy mofo ihany no iveloman''ny olona; fa izay rehetra aloaky ny vavan''i Jehovah no iveloman''ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny fitafianao teny aminao tsy rovitra, ary ny tongotrao tsy nivonto izao efa-polo taona izao. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Koa aoka ho fantatrao amin''ny fonao, fa tahaka ny fananaran''ny olona ny zanany no fananaran''i Jehovah Andriamanitrao anao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary tandremo ny didin'i Jehovah Andriamanitrao, mba handehananao amin'ny lalany sy hatahoranao Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa Jehovah Andriamanitrao efa hampiditra anao any amin''ny tany soa, dia tany misy renirano sy loharano ary rano lalina eny amin''ny lohasaha sy ny tendrombohitra, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'tany misy vary tritika sy vary hordea sy voaloboka sy aviavy ary ampongaben-danitra, tany misy hazo oliva sy tantely, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'tany izay hihinananao hanina amin''ny fanaranam-po, sady tsy hanan-java-mahory akory eo ianao, tany misy vy ny vato ao aminy, ary ao amin''ny tendrombohiny no hihadianao varahina. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary rehefa nihinana ianao ka voky ary misaotra an''i Jehovah Andriamanitrao noho ny tany soa izay nomeny anao, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'dia mitandrema, fandrao hadinoinao Jehovah Andriamanitrao, ka tsy tandremanao ny didiny sy ny fitsipiny ary ny lalàny, izay andidiako anao anio; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'fandrao, rehefa nihinana ianao ka voky ary nanao trano tsara ka mitoetra ao, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ary mihamaro ny ombinao sy ny ondry aman''osinao, ary mitombo koa ny volafotsinao sy ny volamenanao, ary mitombo ny fanananao rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'dia hiavonavona ny fonao, ka hohadinoinao Jehovah Andriamanitrao, Izay nitondra anao nivoaka avy tany amin''ny tany Egypta, tamin''ny trano nahandevozana, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izay nitondra anao tany amin''ny efitra lehibe sady mahatahotra, izay misy menaran''afo sy maingoka, dia ny tany mangentana tsy misy rano, ary nampivoaka rano ho anao avy tamin''ny vatolampy afovato, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izay nanome anao mana hohanina tany an-efitra, dia zavatra tsy fantatry ny razanao, mba hampanetry tena anao sy hizaha toetra anao ary hanisy soa anao any am-parany; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ary andrao ianao hanao anakampo hoe: Ny tanjako sy ny herin''ny tanako no nahavoriako izao harena izao; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'fa tsarovy Jehovah Andriamanitrao, fa Izy no manome anao hery hahavory harena, mba haoriny ny fanekeny, izay nianianany tamin''ny razanao, tahaka ny amin''izao anio izao. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa raha manadino an''i Jehovah Andriamanitrao mihitsy ianao ka manaraka izay andriamani-kafa sady manompo azy sy miankohoka eo anatrehany, dia milaza aminareo marimarina aho fa haringana tokoa ianareo: '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: tahaka ny andringanana ny firenen-tsamy hafa, izay aringan'i Jehovah eo anoloanareo, no handringanana anareo, satria tsy nihaino ny feon'i Jehovah Andriamanitrareo ianareo.
