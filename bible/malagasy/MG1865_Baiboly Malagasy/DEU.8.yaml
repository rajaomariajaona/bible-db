document_id: DEU.8,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampahatsiarovana ny nitondran'Andriamanitra ny Isiraely sy ny nampanetreny tena azy, ary fananarana azy, andrao miavonavona izy ka manadino an'Andriamanitra
  - type: text
    content: 'Ny lalàna rehetra izay andidiako anao anio dia tandremo harahinareo, mba ho velona ianareo ka hihamaro ary hiditra sady handova ny tany izay nianianan''i Jehovah tamin''ny razanareo homena azy. '
  '10':
  - type: text
    content: 'Ary rehefa nihinana ianao ka voky ary misaotra an''i Jehovah Andriamanitrao noho ny tany soa izay nomeny anao, '
  '11':
  - type: text
    content: 'dia mitandrema, fandrao hadinoinao Jehovah Andriamanitrao, ka tsy tandremanao ny didiny sy ny fitsipiny ary ny lalàny, izay andidiako anao anio; '
  '12':
  - type: text
    content: 'fandrao, rehefa nihinana ianao ka voky ary nanao trano tsara ka mitoetra ao, '
  '13':
  - type: text
    content: 'ary mihamaro ny ombinao sy ny ondry aman''osinao, ary mitombo koa ny volafotsinao sy ny volamenanao, ary mitombo ny fanananao rehetra, '
  '14':
  - type: text
    content: 'dia hiavonavona ny fonao, ka hohadinoinao Jehovah Andriamanitrao, Izay nitondra anao nivoaka avy tany amin''ny tany Egypta, tamin''ny trano nahandevozana, '
  '15':
  - type: text
    content: 'Izay nitondra anao tany amin''ny efitra lehibe sady mahatahotra, izay misy menaran''afo sy maingoka, dia ny tany mangentana tsy misy rano, ary nampivoaka rano ho anao avy tamin''ny vatolampy afovato, '
  '16':
  - type: text
    content: 'Izay nanome anao mana hohanina tany an-efitra, dia zavatra tsy fantatry ny razanao, mba hampanetry tena anao sy hizaha toetra anao ary hanisy soa anao any am-parany; '
  '17':
  - type: text
    content: 'ary andrao ianao hanao anakampo hoe: Ny tanjako sy ny herin''ny tanako no nahavoriako izao harena izao; '
  '18':
  - type: text
    content: 'fa tsarovy Jehovah Andriamanitrao, fa Izy no manome anao hery hahavory harena, mba haoriny ny fanekeny, izay nianianany tamin''ny razanao, tahaka ny amin''izao anio izao. '
  '19':
  - type: text
    content: 'Fa raha manadino an''i Jehovah Andriamanitrao mihitsy ianao ka manaraka izay andriamani-kafa sady manompo azy sy miankohoka eo anatrehany, dia milaza aminareo marimarina aho fa haringana tokoa ianareo: '
  '2':
  - type: text
    content: 'Ary tsarovy ny lalana rehetra izay nitondran''i Jehovah Andriamanitrao anao tany an-efitra izao efa-polo taona izao, hampanetry tena anao sy hizaha toetra anao ary hahalala izay ao am-ponao, na hitandrina ny didiny ianao, na tsia. '
  '20':
  - type: text
    content: tahaka ny andringanana ny firenen-tsamy hafa, izay aringan'i Jehovah eo anoloanareo, no handringanana anareo, satria tsy nihaino ny feon'i Jehovah Andriamanitrareo ianareo.
  '3':
  - type: text
    content: 'Dia nampanetry tena anao Izy ka namela anao ho noana, dia nanome anao ny mana hohaninao, izay tsy fantatrao na ny razanao, hampahafantarany anao fa tsy mofo ihany no iveloman''ny olona; fa izay rehetra aloaky ny vavan''i Jehovah no iveloman''ny olona. '
  '4':
  - type: text
    content: 'Ny fitafianao teny aminao tsy rovitra, ary ny tongotrao tsy nivonto izao efa-polo taona izao. '
  '5':
  - type: text
    content: 'Koa aoka ho fantatrao amin''ny fonao, fa tahaka ny fananaran''ny olona ny zanany no fananaran''i Jehovah Andriamanitrao anao. '
  '6':
  - type: text
    content: Ary tandremo ny didin'i Jehovah Andriamanitrao, mba handehananao amin'ny lalany sy hatahoranao Azy.
  '7':
  - type: text
    content: 'Fa Jehovah Andriamanitrao efa hampiditra anao any amin''ny tany soa, dia tany misy renirano sy loharano ary rano lalina eny amin''ny lohasaha sy ny tendrombohitra, '
  '8':
  - type: text
    content: 'tany misy vary tritika sy vary hordea sy voaloboka sy aviavy ary ampongaben-danitra, tany misy hazo oliva sy tantely, '
  '9':
  - type: text
    content: 'tany izay hihinananao hanina amin''ny fanaranam-po, sady tsy hanan-java-mahory akory eo ianao, tany misy vy ny vato ao aminy, ary ao amin''ny tendrombohiny no hihadianao varahina. '
