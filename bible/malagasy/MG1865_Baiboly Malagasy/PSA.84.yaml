document_id: PSA.84
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Alahelo ny tranon'Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Al-hagitith. Salamo nataon''ny Koraita. Endrey ny hatsaran''ny tabernakelinao, Jehovah, Tompon''ny maro, ô! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Manina sady vonton''alahelo ny kianjan''i Jehovah ny fanahiko; ny foko sy ny nofoko mihoby an''Andriamanitra velona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Eny, ny tsikirity mahita trano, ary ny sidintsidina mahita akany ho azy hametrahany ny zanany. Dia ny alitaranao, Jehovah, Tompon''ny maro ô, Mpanjakako sy Andriamanitro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Sambatra izay mitoetra ao an-tranonao; hidera Anao mandrakariva izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Sambatra izay olona manan-kery avy aminao; ao am-pony ny lalana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Raha mandeha mamaky ny lohasaha Baka
  - type: usfm
    marker: x
    children:
    - type: text
      text: Baka = Fitomaniana
    marker-yv: yv-n
  - type: text
    text: ' izy, Dia ataony misy loharano izany, ary ny loha-orana manarom-pitahiana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Miampy hery eny am-pandehanana izy; samy miseho eo anatrehan'Andriamanitra any Ziona izy rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jehovah, Andriamanitry ny maro ô, henoy ny fivavako; mandrenesa ry Andriamanitr''i Jakoba ô. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Andriamanitra, Ampinganay ô, tsinjovy ka jereo ny tavan''ny voahosotrao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa ny indray andro eo an-kianjanao dia tsara noho ny arivo; aleoko mipetraka eo amin''ny tokonam-baravaran''ny tranon''Andriamanitra, toy izay mitoetra ao an-dain''ny ratsy fanahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa Masoandro sy Ampinga Jehovah Andriamanitra; fahasoavana sy voninahitra no homen'i Jehovah; tsy hiaro zava-tsoa amin'izay mandeha amin'ny fahitsiana izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Jehovah, Tompon'ny maro ô, sambatra izay olona matoky Anao.
