document_id: EXO.11,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Filazana ny hihavian'ny loza fahafolo
  - type: text
    content: 'Fa Jehovah nilaza tamin''i Mosesy, hoe: Mbola hahatonga loza iray koa amin''i Farao sy Egypta Aho; ary rehefa afaka izany, dia handefa anareo hiala atỳ izy; ary rehefa handefa anareo rehetra izy, dia handroaka anareo fatratra hiala atỳ. '
  '10':
  - type: text
    content: Ary Mosesy sy Arona nanao ireo fahagagana rehetra ireo teo amin'i Farao; nefa Jehovah nanamafy ny fon'i Farao, ka tsy nandefa ny Zanak'Isiraely hiala tamin'ny taniny izy.
  '2':
  - type: text
    content: 'Koa mitenena amin''ny olona, ary aoka ny lehilahy samy hangataka firavaka volafotsy sy firavaka volamena amin''ny namany avy, ary ny vehivavy amin''ny namany avy koa. '
  '3':
  - type: text
    content: 'Dia nataon''i Jehovah nahita fitia teo imason''ny Egyptiana ny olona. Ary Mosesy dia lehilahy malaza indrindra teo amin''ny tany Egypta, dia teo imason''ny mpanompon''i Farao sy teo imason''ny vahoaka. '
  '4':
  - type: text
    content: 'Ary hoy Mosesy: Izao no lazain''i Jehovah: Rehefa tokony ho mamatonalina Izaho hivoaka hankeo afovoan''i Egypta, '
  '5':
  - type: text
    content: 'dia ho faty ny lahimatoa rehetra eto amin''ny tany Egypta, hatramin''ny matoan''i Farao izay mipetraka eo ambonin''ny seza fiandrianany ka hatramin''ny matoan''ny ankizivaviny izay eo anilan''ny fikosoham-bary, ary ny voalohan-teraky ny biby fiompy rehetra. '
  '6':
  - type: text
    content: 'Ary hisy fidradradradrana mafy eran''ny tany Egypta rehetra, izay tsy mbola nisy tahaka izany, sady tsy hisy tahaka izany intsony. '
  '7':
  - type: text
    content: 'Kanefa tsy hisy na dia alika aza hanetsika ny lela ny amin''ny Zanak''Isiraely rehetra, na amin''ny olona, na amin''ny biby, mba ho fantatrareo ny tsi-fampitovian''i Jehovah ny Egyptiana sy ny Isiraely. '
  '8':
  - type: text
    content: 'Ary hidina ho ao amiko ireo mpanomponao rehetra ireo dia hiankohoka eo anatrehako ka hanao hoe: Mandehana ianao sy ny olona rehetra izay manaraka anao; ary rehefa afaka izany, dia vao handeha aho. Dia niala teo amin''i Farao tamin''ny fahatezerana mirehitra Mosesy. '
  '9':
  - type: text
    content: 'Ary hoy Jehovah tamin''i Mosesy: Tsy hihaino anareo Farao, mba hitomboan''ny fahagagana izay hataoko eto amin''ny tany Egypta. '
