document_id: 1SA.25,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahafatesan'i Samoela, ary ny amin'i Nabala sy Abigaila
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary maty Samoela; ary nivory ny Isiraely rehetra ka nisaona azy sy nandevina azy tao amin'ny fonenany tao Rama. Ary Davida niainga ka nidina nankany an-efitra Parana.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Nabala namaly ny mpanompon''i Davida hoe: Inona moa Davida? Ary inona moa ny zanak''i Jese? Misy mpanompo maro ankehitriny izay milefa miala amin''ny tompony. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa halaiko va ny mofoko sy ny ranoko ary ny zavatra izay efa novonoiko ho an''ny mpanety ondriko, ka homeko izay olona tsy fantatro nihaviana akory? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nihodina ny zatovon''i Davida ka nankany amin''izay nalehany; ary dia nody tany aminy indray izy ka nanambara izany teny rehetra izany taminy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Davida tamin''ny olony: Samia manao ny sabatrareo eo amin''ny fehin-tsabany avy ianareo; ka dia samy nanao ny sabany teo amin''ny fehin-tsabany avy ny olona, ary dia mba nanao ny sabany teo amin''ny fehin-tsabany koa Davida; ary nisy tokony ho efa-jato lahy niakatra nanaraka an''i Davida, ary roan-jato lahy kosa nipetraka teo amin''ny entana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Abigaila, vadin''i Nabala, dia nilazan''ny anankiray tamin''ny zatovony hoe: Indro, Davida naniraka olona avy tany an-efitra mba hiarahaba ny tompontsika, nefa nisafoaka tamin''ireny izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ireo lehilahy ireo dia nanao tsara tokoa taminay, ka tsy naninona tsy naninona izahay, ary tsy nisy zavatra very tamin''izay andro nitoeranay tao aminy, fony tany an-tsaha izahay. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy no mandanay andro aman''alina tamin''ny andro rehetra nitoeranay niandry ondry tao aminy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa dia fantaro sy hevero ankehitriny izay hataonao; fa ratsy no ifofoan'ny tompontsika mbamin'ny ankohonany rehetra; fa Nabala dia tena ratsy fanahy, ka tsy misy olona mahazo miteny aminy.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nandeha faingana Abigaila ka naka mofo roan-jato sy divay eran'ny tavoara
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: siny hoditra'
      marker-yv: yv-n
    - type: text
      text: ' roa sy ondry dimy voavoatra sy lango indimin''ny vata'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. sea
      marker-yv: yv-n
    - type: text
      text: ' sy takela-boaloboka maina zato ary ampempan''aviavy roan-jato, dia nasampiny tamin''ny boriky izany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy tamin''ny zatovony: Mandehana eo alohako, indro, izaho hanaraka anareo; nefa Nabala vadiny tsy mba nilazany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy lehilahy tao Maona, ary tao Karmela ny fananany; mpanjatobe ralehilahy ka nanana ondry telo arivo sy osy arivo, ary nanety ny ondriny tao Karmela izy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin''izany, nony nitaingina ny borikiny izy ka nidina tao amin''ny takon''ny havoana, dia indro, Davida sy ny olony nidina nanatona azy, ary izy nifanena taminy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Davida efa nilaza hoe: Foana tokoa ny an-efitra, ka tsy nisy very na inona na inona; fa novaliany ratsy ny soa nataoko. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mba hataon''Andriamanitra toy izany anie ny fahavalon''i Davida, eny, mihoatra noho izany aza, raha dia havelako hisy miangana na dia lehilahy iray aza izay mety ho azy ambara-pahazavan''ny andro. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Abigaila, raha nahita an''i Davida, dia niala faingana tamin''ny boriky ary niankohoka teo anatrehan''i Davida ka nitsaoka azy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niankohoka tamin''ny tongony izy ka nanao hoe: Aoka ho ahy dia ho ahy ity heloka ity, tompokolahy; masìna ianao, avelao ny ankizivavinao hiteny eto anatrehanao, ka henoy ny tenin''ny ankizivavinao. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Masìna ianao, aoka ny tompoko tsy hisaina io Nabala lehilahy tena ratsy fanahy io, fa araka ny anarany ihany no toeny; Nabala
    - type: usfm
      marker: x
      children:
      - type: text
        text: Nabala = Adala
      marker-yv: yv-n
    - type: text
      text: ' no anarany, ary hadalana no ao aminy; fa izaho ankizivavinao, tompoko, tsy mba nahita ny zatovo nirahinao. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ankehitriny, tompoko, raha velona koa Jehovah, ary raha velona koa ny fanahinao, Jehovah efa niaro anao tsy hahazo heloka amin''ny fandatsahan-drà ary tsy hamaly ho an''ny tenanao; ary avelao ny fahavalonao sy izay mitady hanisy ratsy anao, tompoko, ho tahaka an''i Nabala. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao saotra nentin''ny ankizivavinao aminao izao, tompoko, dia aoka homena ny zatovo manaraka ny Tompoko. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Masìna ianao, mamelà ny fahadisoan''ny ankizivavinao, fa Jehovah hampaharitra ny taranaky ny tompoko tokoa; fa ny tompoko miady ny adin''i Jehovah, ary tsy misy ratsy ho hita aminao amin''ny andro rehetra iainanao. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa raha misy olona mitsangana hanenjika anao ka mitady ny ainao, dia hofehezina amin''ny fehin''aina ao amin''i Jehovah Andriamanitra ny fanahin''ny tompoko, fa ny fanahin''ny fahavalonao kosa dia hatorany toy ny eo amin''ny foitran''antsamotady. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nabala no anaran-dralehilahy; ary Abigaila no anaran''ny vavy; vehivavy hendry sady tsara tarehy izy; fa ny lahy kosa saro-po sy ratsy amin''izay ataony; ary isan''ny taranak''i Kaleba izy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin''izany, raha Jehovah mahavita amin''ny tompoko araka ny soa rehetra nilazany anao ka manendry anao ho mpanapaka ny Isiraely, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia tsy ho alahelo
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. fahatafintohinana
      marker-yv: yv-n
    - type: text
      text: ' na ho nenina'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. fahatafintohinana
      marker-yv: yv-n
    - type: text
      text: ' amin''ny fon''ny tompoko izany, fa tsy nandatsa-drà foana ianao, na namaly ho an''ny tenanao, tompoko; fa rehefa asian''i Jehovah soa ny tompoko, dia mba tsarovy aho ankizivavinao. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Davida tamin''i Abigaila: Isaorana anie Jehovah, Andriamanitry ny Isiraely, Izay naniraka anao hihaona amiko androany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hotahiny anie ny fahendrenao, ary hotahiny anie ianao, izay niaro ahy androany tsy hahazo heloka amin''ny fandatsahan-drà ary tsy hamaly ho an''ny tenako. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa, raha velona koa Jehovah, Andriamanitry ny Isiraely, Izay niaro ahy tsy hanisy ratsy anao, raha tsy avy faingana hitsena ahy ianao toy izay, dia efa tsy nasiako niangana na dia lehilahy iray aza amin''i Nabala ambara-pahazavan''ny andro. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka dia noraisin''i Davida teny an-tànany ilay zavatra nentiny, ary hoy izy taminy: Miakara soa aman-tsara ho any an-tranonao ianao; indro, efa nohenoiko ny feonao, ary nankasitrahako ianao. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Abigaila dia tonga tao amin''i Nabala; kanjo, indro, nanao fanasana tao an-tranony izy tahaka ny fanasan''ny mpanjaka, ary faly ny fon''i Nabala tamin''izany, ary mamo loatra izy, ka dia tsy nisy nambaran''ny vavy taminy, na kely na be mandra-pahazavan''ny andro. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony maraina, ka afaka ny hamamoan''i Nabala, dia nambaran''ny vavy taminy izany zavatra izany, ka dia matihena ny fony ka tonga tahaka ny vato. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nony afaka hafoloana, dia nasian'i Jehovah Nabala, ka dia maty izy.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony ren''i Davida fa maty Nabala, dia hoy izy: Isaorana anie Jehovah izay niady ho ahy ka nahafa-tondromaso ahy tamin''i Nabala sy niaro ny mpanompony tsy hahatanteraka ny ratsy; fa ny ratsy nataon''i Nabala dia nampodin''i Jehovah ho eo an-dohany ihany. Ary Davida naniraka hiresaka amin''i Abigaila hila azy ho vady. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ren''i Davida tany an-efitra fa Nabala manety ny ondriny. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony tonga tany amin''i Abigaila teo Karmela ny mpanompon''i Davida, dia hoy izy: Davida naniraka anay hankatỳ aminao hila anao ho vadiny. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitsangana izy ary niankohoka tamin''ny tany ka nanao hoe: Indro, aoka ny ankizivavinao ho mpanompo hanasa ny tongotry ny mpanompon''itompokolahy. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Abigaila nitsangana faingana ka nitaingina boriky, ary ankizivaviny dimy no nanaraka azy; dia nanaraka ny irak''i Davida izy, ka dia novadiny. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Davida efa nanambady an''i Ahinoama avy any Jezirela koa; ary samy novadiny avokoa izy roa vavy. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa Saoly efa nanome an'i Mikala, zananivavy, vadin'i Davida, ho vadin'i Palty, zanak'i Laisy, avy any Galima.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naniraka zatovo folo lahy Davida ka nanao taminy hoe: Miakara any Karmela ianareo, ary mankanesa any amin''i Nabala, ka miarahabà azy amin''ny anarako. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no holazainareo aminy: trarantitra ianao, fiadanana anie ho anao, ary fiadanana ho amin''ny ankohonanao, ary fiadanana ho amin''izay anananao rehetra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ankehitriny efa reko fa manety ondry ianao; koa ny mpiandry ondrinao, izay tao aminay, tsy nasianay ratsy, ary tsy nisy very na inona na inona tamin''ny andro rehetra nitoerany tao Karmela. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Anontanio ny zatovonao, fa hilaza aminao izy. Koa aoka hahita fitia eo imasonao ny zatovo (fa andro fifaliana no ihavianay); masìna ianao, mba omeo amin''izay azon''ny tananao ireto mpanomponao sy Davida zanakao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tonga ny zatovon''i Davida, dia niteny tamin''i Nabala tamin''ny anaran''i Davida araka izany teny rehetra Izany izy, ka dia nipetraka. '
