document_id: MIC.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny loza hanjo an'i Samaria sy Joda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny tenin'i Jehovah izay tonga tamin'i Morastita tamin'ny andro nanjakan'i Jotama sy Ahaza ary Hezetia, mpanjakan'ny Joda, dia ilay hitany ny amin'i Samaria sy Jerosalema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Samia mihaino ianareo, ry firenena rehetra; Atongilano ny sofinareo, ry tany sy izay zavatra rehetra eo aminy; Ary aoka Jehovah Tompo no ho vavolombelona hanameloka anareo, Dia Jehovah avy ao amin''ny tempoliny masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa, indro, Jehovah mivoaka avy ao amin''ny fitoerany Ary midina ka mandia ny havoana amin''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Miempo ao ambaniny ny tendrombohitra, Ary mivava ny lohasaha, Tahaka ny savoka taninin''ny afo, Sy tahaka ny rano akorotsaka eny amin''ny hantsana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Noho ny fahadisoan''i Jakoba sy ny fahotan''ny taranak''Isiraely no isian''izany rehetra izany. Iza no nahadiso an''i Jakoba? Tsy Samaria va? Ary iza no fitoerana avon''i Joda? Tsy Jerosalema va? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa Samaria dia hataoko korontam-bato any an-tsaha Sy tany fambolem-boaloboka; Ary hakorotsako ho any an-dohasaha ny vatony, Ka haharihariko ny fanorenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hotorotoroina ny sampiny voasokitra rehetra, Ary hodorana amin''ny afo ny tanginy rehetra, Sady hofoanako ny sampiny rehetra; Tangin''ny vehivavy janga no nanangonany ireny, Ary hody ho tangin''ny vehivavy janga indray izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Koa izany no hitomaniako sy hidradradradrako, Ka handeha sady horobaina no mitanjaka aho; Hikaonkaona
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hisaona
    marker-yv: yv-n
  - type: text
    text: ' toy ny amboadia'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: jakala'
    marker-yv: yv-n
  - type: text
    text: ' aho Ary hikiakiaka'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hitomany
    marker-yv: yv-n
  - type: text
    text: ' toy ny ostritsa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa tsy azo sitranina ny ferin'i Samaria
  - type: usfm
    marker: x
    children:
    - type: text
      text: He. ny feriny
    marker-yv: yv-n
  - type: text
    text: '; Fa mihatra amin''i Joda izany, Ary mahatratra ny vavahadin''ny oloko aza, dia any Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aza ambaranareo any Gata izany, Aza mitomany akory! Mihosinkosina
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mihosinkosena... ianao'
    marker-yv: yv-n
  - type: text
    text: ' vovoka ao Beti-le-afra'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Beti-le-afra = fitoeram-bovoka
    marker-yv: yv-n
  - type: text
    text: ' aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mandehana mitanjaka mitondra henatra, ry mponina ao Safira
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Safira: = tsara tarehy'
    marker-yv: yv-n
  - type: text
    text: '; Tsy mivoaka ny mponina ao Zanana; Ny fisaonan''i Beti-haezela no misakana anareo tsy hijanona ao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa malahelo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. manaintaina
    marker-yv: yv-n
  - type: text
    text: ' ny soa ny mponina ao Marota'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Marota = fangidiana
    marker-yv: yv-n
  - type: text
    text: ', Satria loza no efa nidina avy tamin''i Jehovah ho ao am-bavahadin''i Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fehezo amin''ny soavaly haingam-pandeha ny kalesy, ry mponina ao Lakisy; Niandohan''ny fahotan''i Ziona zanakavavy iny, Fa tao aminao no nahitana ny fahadisoan''Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Koa izany no hanomezanao taratasy fisaorana ho an'i Moresetagata; Ranotrambo ho an'ny mpanjakan'ny Isiraely ireo tranon'i Akziba
  - type: usfm
    marker: x
    children:
    - type: text
      text: Akziba = ranotrambo
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mbola hitondrako olon-kandova ianao. Ry mponina ao Maresa
  - type: usfm
    marker: x
    children:
    - type: text
      text: Maresa = lova
    marker-yv: yv-n
  - type: text
    text: '; Ho tonga hatrany Adolama aza ny voninahitr''Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Miheteza sy mikakasa Noho ny zanakao nahafinaritra; Halehibiazo ny solanao ho toy ny an'ny voltora
  - type: usfm
    marker: x
    children:
    - type: text
      text: karazam-borona lehibe izay sola
    marker-yv: yv-n
  - type: text
    text: ', Fa lasan-ko babo niala taminao izy.'
