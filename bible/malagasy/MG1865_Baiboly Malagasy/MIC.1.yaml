document_id: MIC.1,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny loza hanjo an'i Samaria sy Joda
  - type: text
    content: Ny tenin'i Jehovah izay tonga tamin'i Morastita tamin'ny andro nanjakan'i Jotama sy Ahaza ary Hezetia, mpanjakan'ny Joda, dia ilay hitany ny amin'i Samaria sy Jerosalema.
  '10':
  - type: text
    content: Aza ambaranareo any Gata izany, Aza mitomany akory! Mihosinkosina
  - type: note
    content: 'Na: mihosinkosena... ianao'
  - type: text
    content: ' vovoka ao Beti-le-afra'
  - type: note
    content: Beti-le-afra = fitoeram-bovoka
  - type: text
    content: ' aho. '
  '11':
  - type: text
    content: Mandehana mitanjaka mitondra henatra, ry mponina ao Safira
  - type: note
    content: 'Safira: = tsara tarehy'
  - type: text
    content: '; Tsy mivoaka ny mponina ao Zanana; Ny fisaonan''i Beti-haezela no misakana anareo tsy hijanona ao. '
  '12':
  - type: text
    content: Fa malahelo
  - type: note
    content: Heb. manaintaina
  - type: text
    content: ' ny soa ny mponina ao Marota'
  - type: note
    content: Marota = fangidiana
  - type: text
    content: ', Satria loza no efa nidina avy tamin''i Jehovah ho ao am-bavahadin''i Jerosalema. '
  '13':
  - type: text
    content: 'Fehezo amin''ny soavaly haingam-pandeha ny kalesy, ry mponina ao Lakisy; Niandohan''ny fahotan''i Ziona zanakavavy iny, Fa tao aminao no nahitana ny fahadisoan''Isiraely. '
  '14':
  - type: text
    content: Koa izany no hanomezanao taratasy fisaorana ho an'i Moresetagata; Ranotrambo ho an'ny mpanjakan'ny Isiraely ireo tranon'i Akziba
  - type: note
    content: Akziba = ranotrambo
  - type: text
    content: '. '
  '15':
  - type: text
    content: Mbola hitondrako olon-kandova ianao. Ry mponina ao Maresa
  - type: note
    content: Maresa = lova
  - type: text
    content: '; Ho tonga hatrany Adolama aza ny voninahitr''Isiraely. '
  '16':
  - type: text
    content: Miheteza sy mikakasa Noho ny zanakao nahafinaritra; Halehibiazo ny solanao ho toy ny an'ny voltora
  - type: note
    content: karazam-borona lehibe izay sola
  - type: text
    content: ', Fa lasan-ko babo niala taminao izy.'
  '2':
  - type: text
    content: 'Samia mihaino ianareo, ry firenena rehetra; Atongilano ny sofinareo, ry tany sy izay zavatra rehetra eo aminy; Ary aoka Jehovah Tompo no ho vavolombelona hanameloka anareo, Dia Jehovah avy ao amin''ny tempoliny masina. '
  '3':
  - type: text
    content: 'Fa, indro, Jehovah mivoaka avy ao amin''ny fitoerany Ary midina ka mandia ny havoana amin''ny tany. '
  '4':
  - type: text
    content: 'Miempo ao ambaniny ny tendrombohitra, Ary mivava ny lohasaha, Tahaka ny savoka taninin''ny afo, Sy tahaka ny rano akorotsaka eny amin''ny hantsana. '
  '5':
  - type: text
    content: 'Noho ny fahadisoan''i Jakoba sy ny fahotan''ny taranak''Isiraely no isian''izany rehetra izany. Iza no nahadiso an''i Jakoba? Tsy Samaria va? Ary iza no fitoerana avon''i Joda? Tsy Jerosalema va? '
  '6':
  - type: text
    content: 'Koa Samaria dia hataoko korontam-bato any an-tsaha Sy tany fambolem-boaloboka; Ary hakorotsako ho any an-dohasaha ny vatony, Ka haharihariko ny fanorenany. '
  '7':
  - type: text
    content: 'Hotorotoroina ny sampiny voasokitra rehetra, Ary hodorana amin''ny afo ny tanginy rehetra, Sady hofoanako ny sampiny rehetra; Tangin''ny vehivavy janga no nanangonany ireny, Ary hody ho tangin''ny vehivavy janga indray izy. '
  '8':
  - type: text
    content: Koa izany no hitomaniako sy hidradradradrako, Ka handeha sady horobaina no mitanjaka aho; Hikaonkaona
  - type: note
    content: Heb. hisaona
  - type: text
    content: ' toy ny amboadia'
  - type: note
    content: 'Na: jakala'
  - type: text
    content: ' aho Ary hikiakiaka'
  - type: note
    content: Heb. hitomany
  - type: text
    content: ' toy ny ostritsa. '
  '9':
  - type: text
    content: Fa tsy azo sitranina ny ferin'i Samaria
  - type: note
    content: He. ny feriny
  - type: text
    content: '; Fa mihatra amin''i Joda izany, Ary mahatratra ny vavahadin''ny oloko aza, dia any Jerosalema. '
