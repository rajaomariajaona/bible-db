document_id: EXO.27
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary manaova ny alitara amin''ny hazo akasia: dimy hakiho avy ny lafiny efatra, dia ho efa-joro tsy mivadi-mandry izy; ary telo hakiho ny hahavony. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary manaova ny tandrony eo amin''ny zorony efatra, ka ataovy miray aminy; ary petaho takela-barahina. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary manaova ny vilaniny fandraofan-davenona handraofana ny lavenony ary ny sotron''afony sy ny loviany famafazana ary ny fitrebiny sy ny fitondran''afony; varahina no hanaovanao ny fanaka rehetra momba azy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary manaova makarakara varahina tahaka ny harato ho eo aminy; ary manaova vava-varahina efatra hatao ambonin''ny harato eo amin''ny zorony efatra, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ataovy eo ambanin''ny sikin''ny alitara hatreo ambodiny izany; ary aoka ny makarakara hanasaka ny alitara. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary manaova bao ho amin''ny alitara, dia bao hazo akasia, ka petaho takela-barahina, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ampidiro eo amin''ny vava varahina ny bao; ary aoka ho eo amin''ny lafiny roa amin''ny alitara ny bao, raha lanjaina izy, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hazo fisaka no arafeto ho alitara, ka ataovy hobokaty; araka izay naseho taminao tao an-tendrombohitra no hanaovana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary manaova ny kianjan''ny tabernakely: amin''ny lafiny atsimo hisy fefy lamba rongony fotsy madinika voahasina ho amin''ny kianja, zato hakiho ny halavany amin''ny lafiny iray; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ary ho roa-polo ny tsangantsangany, ary ho roa-polo ny faladiany varahina; ho volafotsy ny fihantonana amin''ny tsangantsangany sy ny anjaka hitohizany, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ho tahaka izany amin''ny lafiny avaratra, amin''ny lavany dia hisy fefy lamba, zato hakiho ny halavany, ary ho roa-polo ny tsangantsangany, ary ho roa-polo ny faladiany varahina; ho volafotsy ny fihantonana amin''ny tsangantsangany sy ny anjaka hitohizany, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hisy fefy lamba dimam-polo hakiho amin''ny sakan''ny kianja amin''ny lafiny andrefana; ho folo ny tsangantsangany, ary ho folo ny faladiany, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny sakan''ny kianja amin''ny lafiny atsinanana ho dimam-polo hakiho. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hisy fefy lamba dimy ambin''ny folo hakiho amin''ny sakany iray; ho telo ny tsangantsangany, ary ho telo ny faladiany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hisy fefy lamba dimy ambin''ny folo hakiho amin''ny sakany iray koa; ho telo ny tsangantsangany ary ho telo ny faladiany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary eo amin''ny vavahadin''ny kianja dia hisy vavahady sy lamba roa-polo hakiho, dia manga sy volomparasy sy mena ary rongony fotsy madinika voahasina, asan''ny mahay tenona samy hafa soratra; ho efatra ny tsangantsangany, ary ho efatra ny faladiany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny tsangantsangany rehetra amin''ny kianja manodidina dia samy hisy anjaka volafotsy hitohizany; ho volafotsy ny fihantonany, ary ho varahina ny faladiany, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny lavan''ny kianja ho zato hakiho, ary ny sakany ho dimam-polo hakiho, ary ny hahavony ho dimy hakiho, ka hatao rongony fotsy madinika voahasina izany, ary ho varahina ny faladiany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ho varahina avokoa ny fiasana rehetra momba ny tabernakely; ary ny tsimatra rehetra momba azy sy ny tsimatry ny kianja ho varahina koa. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary mandidia ny Zanak''Isiraely hitondra aminao diloilon''oliva tsara voavely hatao fanazavana, mba hampirehetana jiro mandrakariva. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ao anatin'ny trano lay fihaonana, dia eo ivelan'ny efitra lamba izay manakona ny Vavolombelona, no handaharan'i Arona sy ny zanany azy ho eo anatrehan'i Jehovah hatramin'ny hariva ka hatramin'ny maraina; ho lalàna mandrakizay amin'ny Zanak'Isiraely izany hatramin'ny taranany fara mandimby,
