document_id: HAB.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fandozana nataon'ny Kaldeana, ary ny fitarainan'ny mpaminany noho izany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Faminaniana ny loza hanjo, izay hitan''i Habakoka mpaminany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jehovah ô, indrisy ny hahelan''ny efa nitarainako, Nefa tsy nohenoinao! Mitaraina aho hoe: Loza! Nefa tsy vonjenao ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nahoana no ataonao mahita faharatsiana aho. Ary mijery fahoriana Hianao? Fa fandravana sy loza no eo anatrehako, Ary misy ady, sady miseho ny fifandirana. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Koa noho izany dia ngoly ny lalàna, Ary tsy mivoaka ny rariny; Fa irohonan'ny ratsy fanahy ny marina, Ka izany no ivoahan'ny fitsarana miangatra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. miolana
    marker-yv: yv-n
  - type: text
    text: ' . '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jereo any amin''ny jentilisa, ka diniho, ary gagà dia gagà; Fa manao zavatra amin''ny andronareo Aho, Izay tsy hinoanareo, na dia holazaina aminareo aza. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa, indro, atsangako ny Kaldeana, Dia ilay firenena masiaka
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mangidy
    marker-yv: yv-n
  - type: text
    text: ' sady mirehidrehitra, Izay mamaky eran''ny tany Hahazoany fonenana izay tsy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mahatsiravina sy mahatahotra izy; Avy amin''ny tenany ihany ny fitsarany sy ny fahalehibiazany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Faingana noho ny leoparda ny soavaliny Sady masiaka noho ny amboadia
  - type: usfm
    marker: x
    children:
    - type: text
      text: lopa
    marker-yv: yv-n
  - type: text
    text: ' hariva; Ny mpitaingin-tsoavaliny mampiriotra, eny, ny mpitaingin-tsoavaliny dia avy lavitra; Miezaka toy ny voromahery maika hihinana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hampidi-doza no ihavian'izy rehetra; Ny handroso ihany no atrehiny fatratra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: atrehan''izy rehetra'
    marker-yv: yv-n
  - type: text
    text: ', Ka manangona sambotra toy ny fasika izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izy manakora ny mpanjaka, Ary ihomehezany ny mpanapaka; Ny tanàna mimanda rehetra dia ihomehezany, Ka dia manandratra tovon-tany
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. vovoka
    marker-yv: yv-n
  - type: text
    text: ' izy ka mahafata azy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia mihelina toy ny rivotra izy Ary mandroso ka mahazo heloka. Izany heriny izany no andriamaniny! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tsy hatrizay hatrizay va Hianao, Jehovah Andriamanitro, Iray Masiko? Tsy ho faty izahay; Ry Jehovah ô, ho famaizana no nanendrenao ireny, Ry Vatolampy ô, fananarana no nanangananao azy '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hianao, Izay madio maso ka tsy te-hitsinjo ny ratsy Ary tsy mahajery fahoriana, Nahoana Hianao no mijery izay mamitaka Ary mangina, raha ny ratsy fanahy mandrapaka ny marina noho izy, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary manao ny olona ho toy ny hazandrano any an-dranomasina, Sy ho toy ny biby mandady sy mikisaka, izay tsy mana-mpanapaka? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Aingainy amin''ny fintana izy rehetra, Samboriny amin''ny haratony Ary sarihany amin''ny harato tarihiny; Ka dia faly sy ravoravo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa izany no amonoany zavatra hatao fanatitra ho an''ny haratony sy andoroany ditin-kazo manitra ho an''ny harato tarihiny; Fa ireo no ahazoany hanina matsiro sy anjara matavy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Koa noho izany dia hanaisotra ny ao amin'ny tandrohony va izy Ary hamono firenena mandrakariva ka tsy hiantra?
