document_id: HAB.1,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fandozana nataon'ny Kaldeana, ary ny fitarainan'ny mpaminany noho izany
  - type: text
    content: 'Faminaniana ny loza hanjo, izay hitan''i Habakoka mpaminany. '
  '10':
  - type: text
    content: Izy manakora ny mpanjaka, Ary ihomehezany ny mpanapaka; Ny tanàna mimanda rehetra dia ihomehezany, Ka dia manandratra tovon-tany
  - type: note
    content: Heb. vovoka
  - type: text
    content: ' izy ka mahafata azy. '
  '11':
  - type: text
    content: 'Dia mihelina toy ny rivotra izy Ary mandroso ka mahazo heloka. Izany heriny izany no andriamaniny! '
  '12':
  - type: text
    content: 'Tsy hatrizay hatrizay va Hianao, Jehovah Andriamanitro, Iray Masiko? Tsy ho faty izahay; Ry Jehovah ô, ho famaizana no nanendrenao ireny, Ry Vatolampy ô, fananarana no nanangananao azy '
  '13':
  - type: text
    content: 'Hianao, Izay madio maso ka tsy te-hitsinjo ny ratsy Ary tsy mahajery fahoriana, Nahoana Hianao no mijery izay mamitaka Ary mangina, raha ny ratsy fanahy mandrapaka ny marina noho izy, '
  '14':
  - type: text
    content: 'Ary manao ny olona ho toy ny hazandrano any an-dranomasina, Sy ho toy ny biby mandady sy mikisaka, izay tsy mana-mpanapaka? '
  '15':
  - type: text
    content: 'Aingainy amin''ny fintana izy rehetra, Samboriny amin''ny haratony Ary sarihany amin''ny harato tarihiny; Ka dia faly sy ravoravo izy. '
  '16':
  - type: text
    content: 'Koa izany no amonoany zavatra hatao fanatitra ho an''ny haratony sy andoroany ditin-kazo manitra ho an''ny harato tarihiny; Fa ireo no ahazoany hanina matsiro sy anjara matavy. '
  '17':
  - type: text
    content: Koa noho izany dia hanaisotra ny ao amin'ny tandrohony va izy Ary hamono firenena mandrakariva ka tsy hiantra?
  '2':
  - type: text
    content: 'Jehovah ô, indrisy ny hahelan''ny efa nitarainako, Nefa tsy nohenoinao! Mitaraina aho hoe: Loza! Nefa tsy vonjenao ihany. '
  '3':
  - type: text
    content: 'Nahoana no ataonao mahita faharatsiana aho. Ary mijery fahoriana Hianao? Fa fandravana sy loza no eo anatrehako, Ary misy ady, sady miseho ny fifandirana. '
  '4':
  - type: text
    content: Koa noho izany dia ngoly ny lalàna, Ary tsy mivoaka ny rariny; Fa irohonan'ny ratsy fanahy ny marina, Ka izany no ivoahan'ny fitsarana miangatra
  - type: note
    content: Heb. miolana
  - type: text
    content: ' . '
  '5':
  - type: text
    content: 'Jereo any amin''ny jentilisa, ka diniho, ary gagà dia gagà; Fa manao zavatra amin''ny andronareo Aho, Izay tsy hinoanareo, na dia holazaina aminareo aza. '
  '6':
  - type: text
    content: Fa, indro, atsangako ny Kaldeana, Dia ilay firenena masiaka
  - type: note
    content: Heb. mangidy
  - type: text
    content: ' sady mirehidrehitra, Izay mamaky eran''ny tany Hahazoany fonenana izay tsy azy. '
  '7':
  - type: text
    content: 'Mahatsiravina sy mahatahotra izy; Avy amin''ny tenany ihany ny fitsarany sy ny fahalehibiazany. '
  '8':
  - type: text
    content: Faingana noho ny leoparda ny soavaliny Sady masiaka noho ny amboadia
  - type: note
    content: lopa
  - type: text
    content: ' hariva; Ny mpitaingin-tsoavaliny mampiriotra, eny, ny mpitaingin-tsoavaliny dia avy lavitra; Miezaka toy ny voromahery maika hihinana izy. '
  '9':
  - type: text
    content: Hampidi-doza no ihavian'izy rehetra; Ny handroso ihany no atrehiny fatratra
  - type: note
    content: 'Na: atrehan''izy rehetra'
  - type: text
    content: ', Ka manangona sambotra toy ny fasika izy. '
