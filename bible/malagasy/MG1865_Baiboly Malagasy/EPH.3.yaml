document_id: EPH.3,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanendrena an'i Paoly ho Apostolin'ny jentilisa, sy ny vavaka aman-tsaotra nataony ho an'ny fiangonana tao Efesosy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary noho izany, izaho Paoly, mpifatotra an''i Kristy Jesosy, noho ny aminareo jentilisa, - '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mba hampahafantarina ireo fanapahana sy fahefana any an-danitra amin'izao ankehitriny izao ny mahamaro samy hafa ny fahendren'Andriamanitra amin'ny fitondrany ny fiangonana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. eklesia
      marker-yv: yv-n
    - type: text
      text: ', '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'araka ny fikasana hatrizay hatrizay izay nataony tao amin''i Kristy Jesosy Tompontsika, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay ananantsika fahasahiana sy fanatonana amin''ny fahatokiana noho ny finoana Azy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izany no angatahako aminareo mba tsy ho ketraka amin''ny fahoriako ho anareo, fa voninahitrareo izany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary noho izany no andohalehako amin''ny Ray '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay ahazoan''ny fianakaviana rehetra any an-danitra sy etỳ an-tany anarana, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba homeny anareo, araka ny haren''ny voninahiny, ny mba hohatanjahina fatratra amin''ny Fanahiny ny toe-panahinareo; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba hitoeran''i Kristy ao am-ponareo amin''ny finoana, ka hamaka sy hiorina mafy amin''ny fitiavana ianareo, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba hahaizanareo mbamin''ny olona masina rehetra ny hahafantatra tsara izay sakany sy lavany ary hahavony sy halavany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary hahalala ny fitiavan''i Kristy, izay mihoatra noho ny fahalalana, mba hamenoana anareo ho amin''ny fahafenoan''Andriamanitra rehetra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'raha mba renareo ny fitondrana ny fahasoavan''Andriamanitra izay nomena ahy ho anareo, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ho an''izay mahay manao mihoatra noho ny zavatra rehetra, eny, mihoatra lavitra noho izay rehetra angatahintsika na heverintsika aza, araka ny hery izay miasa ato amintsika, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ho Azy anie ny voninahitra ao amin'ny fiangonana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. eklesia
      marker-yv: yv-n
    - type: text
      text: ' sy ao amin''i Kristy Jesosy hatramin''ny taranaka farany indrindra mandrakizay mandrakizay. Amena.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa fanambarana no nampahafantarana ahy ny zava-niafina, araka ny voasoratro tamin''ny teny fohifohy teo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary araka izany, raha mamaky ianareo, dia ho hainareo fantarina ny fahafantarako ny zava-niafina ny amin''i Kristy, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izay tsy mbola nampahafantarina ny zanak''olombelona tamin''ny taranaka lasa tahaka ny fanambaran''ny Fanahy ankehitriny amin''ny Apostoly masina sy ny mpaminany, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia ny ahatongavan''ny jentilisa ho mpiray lova sy ho tena iray ary ho mpiombona ny teny fikasana ao amin''i Kristy Jesosy noho ny filazantsara, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izay nanaovana ahy ho mpanompo araka ny fanomezan''ny fahasoavan''Andriamanitra, izay nomena ahy araka ny fiàsan''ny heriny. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny, izaho, izay kely noho ny kely indrindra amin''ny olona masina rehetra, no nomena izao fahasoavana izao, dia ny hitory amin''ny jentilisa ny haren''i Kristy tsy hita lany, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny hampahazava ny olona rehetra mba hahalalany izay fitondrana ny zava-miafina, dia Ilay voafina hatramin''ny nanaovana izao tontolo izao tao amin''Andriamanitra, Izay nanao ny zavatra rehetra; '
