document_id: PRO.19,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsara ny malahelo mandeha tsy misy tsiny Noho izay mandainga amin'ny molony sady adala.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny ho velona amin'ny fahafinaretana dia tsy tandrifiny ho an'ny adala, Koa mainka izay hanapahan'ny mpanompo ny zanak'andriana.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fahendren'ny olona manindry ny fahatezerany, Ary voninahitra ho azy ny tsy mamaly fahadisoana.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fahatezeran''ny mpanjaka dia toy ny fieron''ny liona tanora: Fa ny fitiany kosa toy ny ando amin''ny ahitra.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanaka adala mahabe fahoriana ny rainy; Ary ny ady ataon''ny vehivavy dia toy ny rano mitete mandrakariva. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Trano sy harena no lova avy amin'ny ray; Fa ny vady hendry kosa dia avy amin'i Jehovah.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny hakamoana mahasondrian-tory, Ary ho mosarena ny olona malaina.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mitandrina ny didy mitandrina ny ainy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ny fanahiny'
      marker-yv: yv-n
    - type: text
      text: '; Fa izay tsy mihevitra ny alehany dia ho faty. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay miantra ny malahelo dia mampisambotra an'i Jehovah, Ary izay nomeny dia honerany kosa.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Faizo ny zanakao, fa mbola misy azo antenaina ihany, Nefa aza dia entim-po loatra, fandrao mahafaty azy.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny lozabe tsy maintsy hampijalina; Ary na dia vonjenao aza izy, dia mbola hanahirana anao ihany indray.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy tsara raha tsy manam-pahalalana ny fanahy; Ary izay miezaka mosalahy dia ho diso lalana. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Henoy ny saina atolotra, ary raiso ny fananarana, Mba ho hendry ianao amin'izay hiafaranao
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: any aoriana'
      marker-yv: yv-n
    - type: text
      text: .
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Maro ny hevitra ao am-pon'ny olona; Fa ny fisainan'i Jehovah no haharitra.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fifaliana amin'ny olona ny manisy soa; Ary aleo ho malahelo toy izay ho mpandainga.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fahatahorana an''i Jehovah no ahazoana fiainana; Izay manana izany tsy mba handry fotsy sady tsy hiharan-doza. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny malaina dia mangarona ny eo an-dovia amin'ny tànany, Nefa ny mampakatra azy ho amin'ny vavany dia tsy zakany.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kapohy ny mpaniratsira, dia ho hendry ny kely saina; Ary anaro ny manan-tsaina, dia hahalala fahendrena izy.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mitohatoha amin-drainy sy mandroaka ny reniny Dia zanaka mahamenatra sy mahafa-baraka.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Anaka, mitsahara tsy hihaino anatra Izay mampanalavitra anao ny tenin'ny fahalalana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Anaka, raha dia minia manalavitra ny tenin''ny fahalalana ianao, Dia mitsahara tsy hihaino anatra'
      marker-yv: yv-n
    - type: text
      text: .
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny vavolombelona ratsy maniratsira ny fitsarana; Ary ny vavan'ny ratsy fanahy mitelina ny ratsy.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vonona ho amin'ny mpaniratsira ny fanamelohana, Ary ny kapoka ho amin'ny lamosin'ny adala.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fahadalan'ny olona no mahasimba ny alehany, Ka amin'i Jehovah no sosotra ny fony.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny harena mahamaro sakaiza; Fa ny malahelo afoin'ny sakaizany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny vavolombelona mandainga tsy ho afa-tsiny, Ary izay mamoaka lainga tsy ho afa-miala.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Maro no mandambolambo andriana; Ary ny olona rehetra samy misakaiza amin'izay mpanome zavatra.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny malahelo dia halan'ny rahalahiny rehetra, Koa mainka fa ny sakaizany tsy hanalavitra azy va? Manandrandra amin'ny teny tsy misy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. manenjika teny tsy misy
      marker-yv: yv-n
    - type: text
      text: ' izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mihary fahendrena no tia ny tenany, Ary izay mitandrina fahalalana hahita soa.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny vavolombelona mandainga tsy maintsy hampijalina, Ary ny miteny lainga ho very.
