document_id: 1CO.4,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Anatra noho ny fiavonavonan'ny Korintiana
  - type: text
    content: 'Aoka hataon''ny olona ho mpanompon''i Kristy sy mpitandrina''ny zava-miafina izay an''Andriamanitra izahay. '
  '10':
  - type: text
    content: 'Izahay dia adala noho ny amin''i Kristy, fa ianareo no hendry ao amin''i Kristy! izahay malemy, fa ianareo no mahery! ianareo manandaza, fa izahay mavomavo! '
  '11':
  - type: text
    content: 'Mandraka ankehitriny izao dia noana sy mangetaheta sy tsy manan-kitafy sy asiana totohondry ary tsy manana antom-ponenana izahay; '
  '12':
  - type: text
    content: 'Ary misasatra miasa amin''ny tananay izahay; raha tevatevaina izahay, dia misaotra; raha enjehina, dia miaritra; '
  '13':
  - type: text
    content: 'raha tenenina mafy, dia mamaly teny moramora kosa; atao toy ny faditr''izao tontolo izao izahay, dia faikan''ny olona rehetra, mandraka ankehitriny. '
  '14':
  - type: text
    content: 'Tsy ny hahamenatra anareo anefa no anoratako izany zavatra izany, fa mananatra anareo toy ny zanako malalako aho. '
  '15':
  - type: text
    content: 'Fa na dia manana mpampianatra iray alina ao amin''i Kristy aza ianareo, dia tsy maro ray ianareo; fa izaho no niteraka anareo ao amin''i Kristy Jesosy tamin''ny filazantsara. '
  '16':
  - type: text
    content: 'Koa mananatra anareo aho: manahafa ahy ianareo. '
  '17':
  - type: text
    content: Ary noho izany dia nirahiko ho any aminareo Timoty, zanako malalako sy mahatoky ao amin'ny Tompo, ka izy no hampahatsiaro anareo ny fanaoko
  - type: note
    content: Gr. lalako
  - type: text
    content: ' ao amin''i Kristy, tahaka ny ampianariko ao amin''ny fiangonana rehetra eny tontolo eny. '
  '18':
  - type: text
    content: 'Fa ny sasany mirehareha hoatra ilay tsy mikasa ho avy any aminareo iny aho. '
  '19':
  - type: text
    content: 'Fa ho avy any aminareo faingana aho, raha sitrapon''ny Tompo, dia ho fantatro izay herin''ireo mpirehareha ireo, fa tsy ny fiteniny. '
  '2':
  - type: text
    content: Ary raha izany, dia fantatrareo fa ny mpitandrina
  - type: note
    content: 'Gr: mpitandrina fananana'
  - type: text
    content: ' dia tokony ho olona mahatoky. '
  '20':
  - type: text
    content: 'Fa ny fanjakan''Andriamanitra tsy amin''ny teny, fa amin''ny hery. '
  '21':
  - type: text
    content: Inona ary no tianareo? Ho avy aminareo mitondra tsorakazo va aho, sa amin'ny fitiavana sy ny fahalemem-panahy?
  '3':
  - type: text
    content: Fa raha ny amiko, dia ataoko ho zavatra kely foana, na hotsarainareo aho, na hotsarain'olona
  - type: note
    content: Gr. andron'olona
  - type: text
    content: ' fa ny tenako aza tsy mitsara ahy. '
  '4':
  - type: text
    content: 'Fa tsy hitako izay tsiniko, nefa tsy mahamarina ahy izany; fa ny Tompo no Mpitsara ahy: '
  '5':
  - type: text
    content: koa amin'izany aza mitsara na inona na inona alohan'ny fotoana, dia ny fihavian'ny Tompo, Izay hampiharihary ny zavatra takona ao amin'ny maizina ka hampiseho ny fikasan'ny fo; dia samy hahazo izay derany avy amin'Andriamanitra izy rehetra.
  '6':
  - type: text
    content: 'Ary izany zavatra izany, ry rahalahy, nataoko oha-teny hilaza ahy sy Apolosy noho ny aminareo, mba hianaranareo aminay ny tsy hihoatra noho ny voasoratra, mba tsy hisy hireharehanareo hankalaza ny anankiray, fa hanevateva ny anankiray kosa. '
  '7':
  - type: text
    content: 'Fa iza no mampihoatra anao? Ary inona no anananao, izay tsy noraisinao? Fa raha nandray ihany ianao, nahoana no mirehareha hoatra ny tsy nandray? '
  '8':
  - type: text
    content: 'Efa afa-po sahady ianareo, efa manan-karena sahady ianareo, efa manjaka ianareo; kanefa hay! tsy izahay tsy akory no nahazoanareo izany! Enga anie ka manjaka tokoa ianareo, hiarahanay sy ianareo manjaka. '
  '9':
  - type: text
    content: 'Fa ataoko fa nasehon''Andriamanitra ho faraidina izahay Apostoly, dia toy izay voaheloka hovonoina; fa izahay dia natao ho fizàhan''izao rehetra izao, na anjely na olona. '
