document_id: JOB.36,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary mbola nandroso niteny ihany Eliho ka nanao hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Dia manokatra ny sofiny hihaino fananarana Izy ka mandidy azy hibebaka hiala amin'ny ratsy.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Raha mihaino ka manaiky Azy Izy, dia lany amin'ny fiadanana ny androny, ary ny taonany amin'ny fahafinaretana
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fa raha tsy mihaino kosa izy, dia ho voan'ny fiadiana ka ho faty tsy amim-pahalalana.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fa ny mpihatsaravelatsihy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ny ratsy fanahy'
      marker-yv: yv-n
    - type: text
      text: ' dia mirakitra fahatezerana; Tsy mitaraina izy, na dia afatony aza;'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ka dia maty raha mbola tanora izy, eny, afaka ny ainy eo amin'ny olom-betaveta
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dia ny olona mpanolo-tena ho amin'ny fijangajangana ho fanompoan-tsampy;
      marker-yv: yv-n
    - type: text
      text: ','
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa ny fahorian'ny ory kosa no entin'Andriamanitra mamonjy azy, Ary ny manjo azy no entiny manokatra ny sofiny.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary na dia ianao aza dia ampialainy amin'ny fahaterena ho amin'ny malalaka izay tsy misy mahatery; Ary ny matavy indrindra no aroso ho eo ambonin'ny latabatrao.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Nefa raha fatra-pikikitra amin'ny adin'ny ratsy fanahy ianao, dia hihazona anao ny ady sy ny fanamelohana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Dia hifanaikaiky ny ady sy ny fanamelohana;'
      marker-yv: yv-n
    - type: text
      text: ;
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Aoka tsy hamporisika anao hiteny ratsy ny fahatezerana, ary aoka tsy hampivily hevitra anao ny halehiben'ny avotra.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Moa hahatonga anao ho ao amin'izay tsy misy fahoriana va ny fitarainanao na izay rehetra tratry ny fahatanjahana?
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mahareta kely amiko, dia hambarako aminao, fa mbola misy teny holazaina hanamarina an'Andriamanitra.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Aza irinao ny hihavian'ny alina, izay ampialana ny olona amin'ny fitoerany.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tandremo, aza mivily ho amin'ny ratsy; Fa saingy ozoim-pahoriana ianao, dia mifidy izany.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Indro, Andriamanitra miasa amin'ny heriny mampiseho ny fisandratany; Iza no mba mpampianatra tahaka Azy?
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Iza no efa nandidy Azy ny amin''izay lalan-kalehany? Ary iza no efa nilaza taminy hoe: Efa nanao ratsy Hianao?'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Tsarovy ny hankalaza ny asany, Izay efa nataon'ny olona an-kira.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Fa faly mahita izany ny olona rehetra; Ary jeren'ny zanak'olombelona eny lavitra eny izany.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Indro, lehibe Andriamanitra, ka tsy takatry ny saintsika Izy; Ary tsy hita isa ny taonany.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Fa mampisavoana ny rano Izy, dia milatsaka ho ranonorana aman-javona izany,
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Izay aidin'ny rahona ka alatsany amin'ny olona maro be.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ary koa, iza moa no mahalala ny amin'ny fivelatry ny rahona sy ny fikotrokotroka ao an-dainy?
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Halaiko avy lavitra ny fahalalako, ka hanamarina ny Mpanao ahy aho.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Indro, mamelatra ny fahazavany eo amboniny Izy ary manao ny fanambanin'ny ranomasina ho firakofany.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Fa ireny zavatra ireny no itsarany ny firenena sady anomezany hanina betsaka.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Mifono fahazavana ny tànany, ary baikoiny iny mba hahavoa ny fahavalony
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Ary baikoiny ny ady sy ny fanamelohana'
      marker-yv: yv-n
    - type: text
      text: ;
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ny fikotrokotrony dia manambara Azy, ary ny omby aman'ondry koa aza milaza ny hihaviany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa tsy lainga tsy akory ny teniko; Lehilahy tanteraka amin'ny fahalalana no eto aminao.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Indro, lehibe Andriamanitra, kanefa tsy mba mamingavinga, lehibe amin'ny herin'ny fahalalana Izy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tsy mitsimbina ny ain'ny ratsy fanahy Izy, fa manome rariny ho an'ny ory.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tsy mampiala ny masony amin'ny marina Izy; Eo amin'ny mpanjaka ambonin'ny seza fiandrianany no ampitoerany azy ho mandrakizay, ka dia tafasandratra.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary raha voafatotra amin'ny gadra izy sy voafehy amin'ny tadin'ny fahoriana.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Dia ambarany azy ny asany sy ny fahotany, fa efa nanandra-tena izy ireny.
