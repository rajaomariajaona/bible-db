document_id: JOB.36,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary mbola nandroso niteny ihany Eliho ka nanao hoe:'
  '10':
  - type: text
    content: Dia manokatra ny sofiny hihaino fananarana Izy ka mandidy azy hibebaka hiala amin'ny ratsy.
  '11':
  - type: text
    content: Raha mihaino ka manaiky Azy Izy, dia lany amin'ny fiadanana ny androny, ary ny taonany amin'ny fahafinaretana
  '12':
  - type: text
    content: Fa raha tsy mihaino kosa izy, dia ho voan'ny fiadiana ka ho faty tsy amim-pahalalana.
  '13':
  - type: text
    content: Fa ny mpihatsaravelatsihy
  - type: note
    content: 'Na: ny ratsy fanahy'
  - type: text
    content: ' dia mirakitra fahatezerana; Tsy mitaraina izy, na dia afatony aza;'
  '14':
  - type: text
    content: Ka dia maty raha mbola tanora izy, eny, afaka ny ainy eo amin'ny olom-betaveta
  - type: note
    content: Dia ny olona mpanolo-tena ho amin'ny fijangajangana ho fanompoan-tsampy;
  - type: text
    content: ','
  '15':
  - type: text
    content: Fa ny fahorian'ny ory kosa no entin'Andriamanitra mamonjy azy, Ary ny manjo azy no entiny manokatra ny sofiny.
  '16':
  - type: text
    content: Ary na dia ianao aza dia ampialainy amin'ny fahaterena ho amin'ny malalaka izay tsy misy mahatery; Ary ny matavy indrindra no aroso ho eo ambonin'ny latabatrao.
  '17':
  - type: text
    content: Nefa raha fatra-pikikitra amin'ny adin'ny ratsy fanahy ianao, dia hihazona anao ny ady sy ny fanamelohana
  - type: note
    content: 'Na: Dia hifanaikaiky ny ady sy ny fanamelohana;'
  - type: text
    content: ;
  '18':
  - type: text
    content: Aoka tsy hamporisika anao hiteny ratsy ny fahatezerana, ary aoka tsy hampivily hevitra anao ny halehiben'ny avotra.
  '19':
  - type: text
    content: Moa hahatonga anao ho ao amin'izay tsy misy fahoriana va ny fitarainanao na izay rehetra tratry ny fahatanjahana?
  '2':
  - type: text
    content: Mahareta kely amiko, dia hambarako aminao, fa mbola misy teny holazaina hanamarina an'Andriamanitra.
  '20':
  - type: text
    content: Aza irinao ny hihavian'ny alina, izay ampialana ny olona amin'ny fitoerany.
  '21':
  - type: text
    content: Tandremo, aza mivily ho amin'ny ratsy; Fa saingy ozoim-pahoriana ianao, dia mifidy izany.
  '22':
  - type: text
    content: Indro, Andriamanitra miasa amin'ny heriny mampiseho ny fisandratany; Iza no mba mpampianatra tahaka Azy?
  '23':
  - type: text
    content: 'Iza no efa nandidy Azy ny amin''izay lalan-kalehany? Ary iza no efa nilaza taminy hoe: Efa nanao ratsy Hianao?'
  '24':
  - type: text
    content: Tsarovy ny hankalaza ny asany, Izay efa nataon'ny olona an-kira.
  '25':
  - type: text
    content: Fa faly mahita izany ny olona rehetra; Ary jeren'ny zanak'olombelona eny lavitra eny izany.
  '26':
  - type: text
    content: Indro, lehibe Andriamanitra, ka tsy takatry ny saintsika Izy; Ary tsy hita isa ny taonany.
  '27':
  - type: text
    content: Fa mampisavoana ny rano Izy, dia milatsaka ho ranonorana aman-javona izany,
  '28':
  - type: text
    content: Izay aidin'ny rahona ka alatsany amin'ny olona maro be.
  '29':
  - type: text
    content: Ary koa, iza moa no mahalala ny amin'ny fivelatry ny rahona sy ny fikotrokotroka ao an-dainy?
  '3':
  - type: text
    content: Halaiko avy lavitra ny fahalalako, ka hanamarina ny Mpanao ahy aho.
  '30':
  - type: text
    content: Indro, mamelatra ny fahazavany eo amboniny Izy ary manao ny fanambanin'ny ranomasina ho firakofany.
  '31':
  - type: text
    content: Fa ireny zavatra ireny no itsarany ny firenena sady anomezany hanina betsaka.
  '32':
  - type: text
    content: Mifono fahazavana ny tànany, ary baikoiny iny mba hahavoa ny fahavalony
  - type: note
    content: 'Na: Ary baikoiny ny ady sy ny fanamelohana'
  - type: text
    content: ;
  '33':
  - type: text
    content: Ny fikotrokotrony dia manambara Azy, ary ny omby aman'ondry koa aza milaza ny hihaviany.
  '4':
  - type: text
    content: Fa tsy lainga tsy akory ny teniko; Lehilahy tanteraka amin'ny fahalalana no eto aminao.
  '5':
  - type: text
    content: Indro, lehibe Andriamanitra, kanefa tsy mba mamingavinga, lehibe amin'ny herin'ny fahalalana Izy.
  '6':
  - type: text
    content: Tsy mitsimbina ny ain'ny ratsy fanahy Izy, fa manome rariny ho an'ny ory.
  '7':
  - type: text
    content: Tsy mampiala ny masony amin'ny marina Izy; Eo amin'ny mpanjaka ambonin'ny seza fiandrianany no ampitoerany azy ho mandrakizay, ka dia tafasandratra.
  '8':
  - type: text
    content: Ary raha voafatotra amin'ny gadra izy sy voafehy amin'ny tadin'ny fahoriana.
  '9':
  - type: text
    content: Dia ambarany azy ny asany sy ny fahotany, fa efa nanandra-tena izy ireny.
