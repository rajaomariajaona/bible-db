document_id: PSA.41,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitarainan'ilay ampahorin'ny olon-tsy tia sy ny sakaiza mamadika
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ho an''ny mpiventy hira. Salamo nataon''i Davida. Sambatra izay mahatsiaro ny malahelo; Jehovah hamonjy azy amin''ny andro fahoriana. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa ianao kosa Jehovah ô, mamindrà fo amiko, ka atsangano aho mba hamaliako azy.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Izao no hahafantarako fa mankasitraka ahy Hianao, dia ny tsy anakoran''ny fahavaloko ahy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary ny amiko, dia manohana ahy amin'ny fahitsiako Hianao, ka mampitoetra ahy eo anatrehanao mandrakizay.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Isaorana anie Jehovah, Andriamanitry ny Isiraely, hatramin'ny taloha indrindra ka mandrakizay. Amena dia Amena.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Jehovah hitandrina sy hiaro azy tsy ho faty; hatao ho sambatra ambonin''ny tany izy, ary tsy mba hatolotrao amin''ny sitrapon''ny fahavalony. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Jehovah hanohana azy eo ambonin'ny farafara hitsaboana azy. Ny fandriany rehetra eo am-paharariany dia hovanao.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Hoy izaho: Jehovah ô, mamindrà fo amiko; sitrano ny fanahiko, fa efa nanota taminao aho. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ny fahavaloko maniry ahy ho simba ka manao hoe: Rahoviana no ho faty izy, ka ho very ny anarany? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary raha avy mamangy, izy dia miteny zava-poana; ny fony mamory faharatsiana ho an''ny tenany; mivoaka eny ivelany izy ka milazalaza. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Mitakoritsika ahy izay rehetra mankahala ahy; misaina hanisy ratsy ahy izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tena zava-dratsy, hoy izy, no aidina aminy; ary raha mandry izy dia tsy hitsangana intsony. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Eny, ny sakaizako, izay maha-toky ahy sady nihinana ny haniko, no nanangana ny ombelahin-tongony hamely ahy. '
