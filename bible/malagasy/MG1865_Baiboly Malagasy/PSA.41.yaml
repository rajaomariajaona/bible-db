document_id: PSA.41,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainan'ilay ampahorin'ny olon-tsy tia sy ny sakaiza mamadika
  - type: text
    content: 'Ho an''ny mpiventy hira. Salamo nataon''i Davida. Sambatra izay mahatsiaro ny malahelo; Jehovah hamonjy azy amin''ny andro fahoriana. '
  '10':
  - type: text
    content: Fa ianao kosa Jehovah ô, mamindrà fo amiko, ka atsangano aho mba hamaliako azy.
  '11':
  - type: text
    content: 'Izao no hahafantarako fa mankasitraka ahy Hianao, dia ny tsy anakoran''ny fahavaloko ahy. '
  '12':
  - type: text
    content: Ary ny amiko, dia manohana ahy amin'ny fahitsiako Hianao, ka mampitoetra ahy eo anatrehanao mandrakizay.
  '13':
  - type: text
    content: Isaorana anie Jehovah, Andriamanitry ny Isiraely, hatramin'ny taloha indrindra ka mandrakizay. Amena dia Amena.
  '2':
  - type: text
    content: 'Jehovah hitandrina sy hiaro azy tsy ho faty; hatao ho sambatra ambonin''ny tany izy, ary tsy mba hatolotrao amin''ny sitrapon''ny fahavalony. '
  '3':
  - type: text
    content: Jehovah hanohana azy eo ambonin'ny farafara hitsaboana azy. Ny fandriany rehetra eo am-paharariany dia hovanao.
  '4':
  - type: text
    content: 'Hoy izaho: Jehovah ô, mamindrà fo amiko; sitrano ny fanahiko, fa efa nanota taminao aho. '
  '5':
  - type: text
    content: 'Ny fahavaloko maniry ahy ho simba ka manao hoe: Rahoviana no ho faty izy, ka ho very ny anarany? '
  '6':
  - type: text
    content: 'Ary raha avy mamangy, izy dia miteny zava-poana; ny fony mamory faharatsiana ho an''ny tenany; mivoaka eny ivelany izy ka milazalaza. '
  '7':
  - type: text
    content: 'Mitakoritsika ahy izay rehetra mankahala ahy; misaina hanisy ratsy ahy izy. '
  '8':
  - type: text
    content: 'Tena zava-dratsy, hoy izy, no aidina aminy; ary raha mandry izy dia tsy hitsangana intsony. '
  '9':
  - type: text
    content: 'Eny, ny sakaizako, izay maha-toky ahy sady nihinana ny haniko, no nanangana ny ombelahin-tongony hamely ahy. '
