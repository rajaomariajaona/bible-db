document_id: PSA.71,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavaka ataon'izay mahatsiaro ny famindram-pon'Andriamanitra taminy hatry ny fony tanora
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hianao, Jehovah ô, no itokiako; aoka tsy ho menatra mandrakizay aho. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa miresaka ahy ny fahavaloko; ary miara-mioko izay manotrika hahazo ny aiko. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka manao hoe: Andriamanitra efa nahafoy azy; enjeho izy, ka sambory, fa tsy misy hamonjy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Andriamanitra ô, aza manalavitra ahy; Andriamanitro ô, faingana hamonjy ahy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka ho menatra sy ho levona ny mpanohitra ny fanahiko; aoka hitafy henatra sy fahafaham-baraka izay mitady hanisy ratsy ahy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izaho kosa dia hanantena mandrakariva, ary hitombo lalandava ny fideràko Anao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vavako hitory ny fahamarinanao sy ny famonjenao mandrakariva, fa tsy fantatro ny isany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho entiko ny asa lehibe nataon'i Jehovah Tompo; hampahatsiaro ny fahamarinanao aho, dia ny Anao ihany.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Andriamanitra ô, Hianao efa nampianatra ahy hatry ny fony aho mbola tanora; ary mandraka ankehitriny dia nitory ny fahagaganao aho. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa mandra-pahantitro sy fotsy volo, dia aza mahafoy ahy, Andriamanitra ô, mandra-pilazako ny sandrinao amin'ny taranaka sy ny asanao lehibe amin'izay rehetra mbola ho avy.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary mihatra amin''izay avo indrindra ny fahamarinanao, Andriamanitra ô, Izay nanao zava-dehibe: Andriamanitra ô, iza no tahaka Anao? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vonjeo ny fahamarinanao aho, ka afaho; atongilano amiko ny sofinao, ka vonjeo aho. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hianao Izay nampahita ahy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: anay'
      marker-yv: yv-n
    - type: text
      text: ' fahoriana be sady mafy no hamelona ahy'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: anay'
      marker-yv: yv-n
    - type: text
      text: ' indray, ka hampiakatra ahy'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: anay'
      marker-yv: yv-n
    - type: text
      text: ' indray hiala amin''ny fitoerana lalina amin''ny tany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ampitomboy ny voninahitro, ary aoka hampionona ahy indray Hianao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho kosa hidera Anao amin''ny valiha, dia ny fahamarinanao, Andriamanitro; hankalaza Anao amin''ny lokanga aho, ry Iray Masin''ny Isiraely ô. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hihoby ny molotro raha mankalaza Anao; ny fanahiko koa izay efa navotanao; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny lelako hitory ny fahamarinanao mandrakariva; fa efa menatra sy mangaihay izay mitady hanisy ratsy ahy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aoka ho vatolampy fonenana hohatoniko mandrakariva Hianao, Izay efa nandidy hamonjy ahy; fa harambatoko sy batery fiarovana ho ahy Hianao.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Andriamanitro ô, afaho amin''ny tanan''ny ratsy fanahy aho, dia amin''ny tanan''ny mpanao meloka sy ny lozabe. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Hianao no fanantenako, Jehovah Tompo ô, ry tokiko hatry ny fony aho mbola tanora. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hianao no nanankinana ahy hatrany am-bohoka; ianao namoaka
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: no Mpiaro, na Mpanisy soa, ahy hatry, etc'
      marker-yv: yv-n
    - type: text
      text: ' ahy avy tany an-kibon-dreniko; ianao no deraiko mandrakariva. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tonga toa zava-mahagaga eo imason''ny maro aho; nefa Hianao no fiarovana mafy ho ahy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vavako ho feno ny fideràna Anao sy ny fankalazana Anao mandrakariva. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza manary ahy, rehefa antitra aho; ary aza mahafoy ahy, rehefa ketraka ny heriko.
