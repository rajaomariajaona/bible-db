document_id: JOB.31
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Efa nampanekeko ny masoko; Koa hataoko ahoana indray no fijery zazavavy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. virijina
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa raha izany, dia inona no anjara avy amin'Andriamanitra any ambony. Sy lova avy amin'ny Tsitoha any amin'ny avo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Moa tsy loza va no manjo ny ratsy fanahy? Ary tsy fahoriana va no mahazo ny mpanao ratsy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Moa tsy Andriamanitra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Izy
    marker-yv: yv-n
  - type: text
    text: ' va no mijery ny lalako ka manisa ny diako rehetra?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Raha tàhiny nandeha tamin'ny fitaka aho na niezaka tamin'ny fahafetsena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: (Enga anie ka holanjain'Andriamanitra eo amin'ny mizanan'ny fahamarinana aho! Dia ho fantany ny tsi-fananako tsiny);
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Raha tàhiny nivily niala tamin''ny lalana ny diako, na nanaraka ny masoko ny foko, na nisy tsiny niraikitra tamin''ny tanako:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia aoka hamafy aho, fa olon-kafa no hihinana, ary aoka ho fongotra izay amboleko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Raha tahìny adala tamin'ny vadin'olona ny foko, ka namitsaka teo am-baravaran'ny namako aho,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia aoka kosa ny vadiko halain
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hitoto ho an'''
    marker-yv: yv-n
  - type: text
    text: '''ny sasany, ary aoka olon-kafa no handry aminy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa fahavetavetana izany, eny, heloka tokony hotsarain'ny mpitsara;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa afo mandevona hatrany amin'ny fandringanana izany ka hanongotra ny vokatro rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Raha tàhiny aho nandà ny rariny izay an'ny ankizilahiko na ny ankizivaviko, raha nifamaly tamiko izy,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia inona no hataoko, raha hitsangana Andriamanitra? Ary ahoana no havaliko Azy, raha handinika Izy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa moa tsy Izay nanao ahy tany an-kibo ihany va no nanao azy koa? Ary tsy Iray ihany va no namorona anay tany am-bohoka?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Raha tàhiny aho nandà Izay nirin'ny malahelo ka nahapahina ny mason'ny mpitondratena,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Na nihinana ny sombin-kaniko irery, ka tsy mba nihinanan'ny kamboty
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: (Fa tsy izany, fa hatry ny fony mbola tanora aho, dia notezaina teo amiko tahaka ny zanaka ny kamboty, Ary nitondra ny mpitondratena hatrany an-kibon-dreniko aho);
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Raha tàhiny aho nahita olona efa ho faty noho ny tsi-fananan-damba. Na malahelo tsy manan-kitafy,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Koa tsy nankasitraka ahy ny tenany
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. valahany
    marker-yv: yv-n
  - type: text
    text: ', ary tsy nanafàna azy ny volon''ondriko;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Raha tahìny aho naninjitra ny tanako hampahory ny kamboty, saingy hitako fa nisy niandany tamiko teo am-bavahady:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia aoka ny foto-tsandriko hitsoaka hiala amin'ny rangomainako, eny, aoka ny sandriko ho latsaka hiala amin'ny taolam-panaviko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa mampahatahotra ahy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Fa hanjo ahy ny zava-mahatahotra, dia'
    marker-yv: yv-n
  - type: text
    text: ' ny loza avy amin''Andriamanitra, ka tsy mahavita na inona na inona aho noho ny fahalehibiazany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Raha tàhiny aho nanao ny volamena ho fanantenako, na nanonona ny volamena tsara hoe: Ry tokiko ô;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Raha tàhiny ho nifaly noho ny haben'ny fananako sy noho ny nahazoan'ny tanako harena betsaka;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Raha tàhiny aho nijery ny masoandro, raha namirapiratra izy, na ny volana, raha nandeha tamin'ny fangarangarany izy,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ka voafitaka mangingina ny foko, ary nanoroka ny tanako ny vavako
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: (Dia heloka hanamelohan'ny mpitsara koa izany; Fa ho nihatsaravelatsihy tamin'Andriamanitra Izay any ambony aho);
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Raha tàhiny aho nifaly noho ny loza nanjo izay nankahala ahy, na nibitabitaka, raha nozoim-pahoriana izy
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: (Tsia, fa tsy navelako hanota akory ny vavako hangataka ozona hanjo azy);
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Raha tàhiny ny tao an-daiko tsy nanao hoe: Iza moa no tsy voky tamin''ny henany'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Iza moa no tsy voky tamin''ny fianakaviany?'
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ny vahiny aza tsy nandry teny alatrano; Fa novohako ny varavarako manatrika ny lalana;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Raha tàhiny aho mba nanarona ny fahadisoako tahaka an'i Adama
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tahaka ny olona'
    marker-yv: yv-n
  - type: text
    text: ' ka nanafina ny heloko tato an-tratrako,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Satria nampihorohoro ny foko ny vahoaka maro be, ary natahotra aho, fandrao hamavoin'ny fokon'olona, ka dia namitsaka, fa tsy sahy nivoaka ny varavarana
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Enga anie ka hisy hihaino ahy! Indro ny soniako! Enga anie ka hamaly ahy ny Tsitoha! Indro ny taratasy voasoratr'ilay manana ady amiko!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Hataoko eny an-tsoroko tokoa izany ary hafehiko amiko ho satro-boninahitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ny isan'ny diako dia hambarako aminy, ary tahaka ny fanakon'ny zanak'andriana no hanatonako Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Raha tàhiny mitaraina hiampanga ahy ny taniko, ka miara-mitomany ny vavasako;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Raha tàhiny aho nihinana ny vokatra, nefa tsy nandoa ny vidiny.Na nanao izay hahafaty ny ain''ny tompony:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Dia aoka ny tsilo no haniry hisolo ny vary tritika. Ary ny ahi-dratsy hisolo ny vary hordea. Tapitra ny tenin'i Joba.
