document_id: 2SA.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanirian'i Davida hanao tempoly sy ny toky nomen'Andriamanitra azy ny amin'ny haharetan'ny fanjakany, ary ny vavaka nataon'i Davida tamin'izany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary raha nipetraka tao an-tranony ny mpanjaka, ary efa nampiadanin''i Jehovah tamin''ny fahavalony rehetra manodidina azy izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia hoy ny mpanjaka tamin''i Natana mpaminany: Akory izato izaho mitoetra amin''ny trano sedera, nefa ny fiaran''Andriamanitra kosa mitoetra ao anaty lay! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia hoy Natana tamin''ny mpanjaka: Andeha, ataovy izay rehetra ao am-ponao; fa Jehovah no momba anao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary tamin''ny alin''iny ihany dia tonga tamin''i Natana ny tenin''i Jehovah nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Andeha, lazao amin''i Davida mpanompoko hoe: Izao no lazain''i Jehovah: Hianao va no hanao trano hitoerako? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa tsy mbola nitoetra an-trano Aho hatramin'ny nitondrako ny Zanak'Isiraely niakatra avy tany Egypta ka mandraka androany, fa nifindrafindra toby
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lay
    marker-yv: yv-n
  - type: text
    text: ' sy nifindrafindra toerana'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. tabernakely
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary tamin''izay rehetra nifindrafindrako niaraka tamin''ny Zanak''Isiraely, moa nisy nitenenako akory va ny firenen''Isiraely, izay notendreko ho mpiandry ny Isiraely oloko, ka nanaovako hoe: Nahoana no tsy manao trano sedera ho Ahy ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa lazao amin''i Davida mpanompoko hoe: Izao no lazain''i Jehovah, Tompon''ny maro: Izaho no naka anao avy tany an-tsaha, dia avy tamin''ny niandrasanao ondry, mba ho mpanapaka ny Isiraely oloko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nomba anao tamin''izay nalehanao rehetra Aho, ka naringako tsy ho eo anoloanao ny fahavalonao rehetra, ary homeko anarana malaza tahaka ny anaran''izay lehibe ambonin''ny tany ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hifidy tany ho an''ny Isiraely oloko Aho sady hamponina azy, ka dia handry fahizay amin''ny fonenany ary tsy hanana ahiahy intsony izy, ary ny zanaky ny faharatsiana tsy hampahory azy intsony tahaka ny taloha '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: sy tahaka ny hatramin'ny nanendreko mpitsara ho mpifehy ny Isiraely oloko; ary hampiadana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. nampiadana
    marker-yv: yv-n
  - type: text
    text: ' anao ho afaka amin''ny fahavalonao rehetra Aho. Ary lazain''i Jehovah aminao koa fa hanome taranaka'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hanao trano
    marker-yv: yv-n
  - type: text
    text: ' ho anao Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary rehefa tapitra ny andronao, ka hodi-mandry any amin''ny razanao ianao, dia hatsangako handimby anao ny zanakao izay haterakao, ary hampitoeriko ny fanjakany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'dia io no hanao trano ho an''ny anarako, ary Izaho kosa hampitoetra ny seza fiandrianan''ny fanjakany ho mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izaho ho rainy, ary izy ho zanako. Raha manao izay meloka izy, dia hanariko amin''ny tsorakazon''ny olona sy ny kapoky ny zanak''olombelona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'nefa ny famindram-poko tsy mba hiala aminy, tahaka ny nanesorako izany tamin''i Saoly, izay nesoriko teo alohanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ny taranakao sy ny fanjakanao hitoetra eo anatrehanao mandrakizay; ny seza fiandriananao hitoetra mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Araka izany teny rehetra izany sy araka izao fahitana rehetra izao no nolazain''i Natana tamin''i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary Davida mpanjaka niditra ka nipetraka teo anatrehan''i Jehovah ary nanao hoe: Zinona moa aho, Jehovah Tompo ô? Ary zinona ny mpianakaviko, no novimbininao ambaraka ankehitriny aho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary mbola ataonao ho zavatra kely ihany aza izany, Jehovah Tompo ô, fa, indro, efa voalazanao koa ny amin''ny taranaky ny mpanomponao hatramin''ny mbola any aoriana lavitra aza. Ary izany dia fanaon''ny olona, Jehovah Tompo ô. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ka inona intsony no holazain''i Davida aminao? Fa Hianao, Jehovah Tompo ô, no mahalala ny mpanomponao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Noho ny teninao sy araka ny sitraponao no nanaovanao io zavatra lehibe rehetra io, hampahalalanao ny mpanomponao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa amin''izany dia lehibe Hianao, Jehovah Andriamanitra; fa tsy misy tahaka Anao, ka tsy misy Andriamanitra afa-tsy Hianao araka izay rehetra ren''ny sofinay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary aiza moa no misy firenena etỳ an-tany tahaka ny Isiraely olonao, izay nalehan''Andriamanitra havotana ho olony, sy hanaovany anarana ho Azy, ary hanaovany zavatra lehibe ho anareo sy zava-mahatahotra ho an''ny taninao teo anatrehan''ny olonao, izay navotanao ho Anao avy tamin''ny firenen''i Egypta sy ny andriamaniny? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nampitoerinao ny Isiraely olonao ho olonao mandrakizay: ary Hianao, Jehovah ô, no efa tonga Andriamaniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ankehitriny, Jehovah Andriamanitra ô, ilay teny nolazainao ny amin''ny mpanomponao sy ny taranany dia ampitoero ho mandrakizay, ary ataovy araka izay nolazainao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary aoka hohalehibiazina mandrakizay ny anaranao ka hatao hoe; Jehovah, Tompon''ny maro, no Andriamanitry ny Isiraely; ka dia hampitoerina eo anatrehanao ny taranak''i Davida mpanomponao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa Hianao, Jehovah Tompon''ny maro, Andriamanitry ny Isiraely, efa nilaza tamin''ny mpanomponao hoe: Izaho hanome taranaka anao'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hanao trano ho anao
    marker-yv: yv-n
  - type: text
    text: '; koa izany no nampahasahy ny fon''ny mpanomponao hanao izao vavaka izao aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary noho izany, Jehovah Tompo ô, satria Hianao no Andriamanitra, ary marina ny teninao, ary Hianao efa nilaza izany zava-tsoa izany ny amin''ny mpanomponao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: dia aoka ho sitrakao ny hitahy ny taranaky ny mpanomponao haharitra mandrakizay eo anatrehanao; fa Hianao, Jehovah Tompo ô, efa niteny izany; eny, aoka ny fitahianao no hitahianao ny taranaky ny mpanomponao mandrakizay.
