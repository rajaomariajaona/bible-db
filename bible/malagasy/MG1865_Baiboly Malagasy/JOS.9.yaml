document_id: JOS.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hafetsena nataon'ny Gibeonita mba tsy handringanana azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary rehefa nandre izany ny mpanjaka rehetra izay etỳ an-dafin'i Jordana, na ny tany amin'ny tany havoana, na ny tany amin'ny tany lemaka amoron-tsiraka
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sefela
    marker-yv: yv-n
  - type: text
    text: ', na ny tany amoron''ny Ranomasina Lehibe tandrifin''i Libanona, dia ny Hetita, ny Amorita, ny Kananita, ny Perizita, ny Hivita ary ny Jebosita, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: dia niray hina niangona hiady amin'i Josoa sy ny Isiraely izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ny mponina tao Gibeona nahare izay nanaovan''i Josoa an''i Jeriko sy Ay, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: dia nanao hafetsena kosa izy ka nandeha, ary nody ho iraka
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: nitondra vatsy'
    marker-yv: yv-n
  - type: text
    text: ' ka nitondra lasaka tonta nasampiny teo amin''ny borikiny sy siny hoditra tonta sady triatra ka nofehipehezina nasiany divay, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ary kapa tonta sady nitampintampina teo amin'ny tongony, ary lamba tonta notafiny; ary efa maina sy bobongolo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Na. torotoro
    marker-yv: yv-n
  - type: text
    text: ' ny mofo rehetra izay vatsiny. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nankany amin''i Josoa teo an-toby tany Gilgala izy ireo ka niteny taminy sy tamin''ny Isiraelita nanao hoe: Avy any an-tany lavitra izahay; koa ankehitriny mba manaova fanekena aminay ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy ny Isiraelita tamin''ireo Hivita ireo: Angamba mponina ato aminay ihany ianareo, ka hataonay ahoana no fanao fanekena aminareo? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hoy izy tamin''i Josoa: Mpanomponao izahay. Ary hoy Josoa taminy: Iza moa ianareo, ary avy aiza ? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy izy ireo taminy: Avy tany an-tany lavitra indrindra izahay mpanomponao noho ny anaran''i Jehovah Andriamanitrao; fa efa renay ny lazany sy izay rehetra nataony tany Egypta '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ary izay rehetra nataony tamin''ny mpanjaka roa tamin''ny Amorita, izay tany an-dafin''i Jordana, dia Sihona, mpanjakan''i Hesbona, sy Oga, mpanjakan''i Basana, izay tany Astarta. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia niteny taminay ny loholonay sy ny mponina rehetra amin''ny taninay ka nanao hoe: Mitondrà vatsy eny an-tananareo ho any amin''ny haleha, dia mandehana hitsena azy, ka lazao aminy hoe: Mpanomponao izahay; koa ankehitriny manaova fanekena aminay. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Itony mofonay itony dia vao mafana no nalainay tany an-tranonay ho vatsy tamin'ny andro nivoahanay hankatỳ aminareo; fa ankehitriny, indro, efa maina sy bobongolo
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: torotoro'
    marker-yv: yv-n
  - type: text
    text: ' izy; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ary vaovao ireto siny hoditra misy divay ireto izay nofenoinay; fa, indreo, efa triatra izy; ary efa rovitra ireto lambanay sy kapanay ireto noho ny halavitry ny naleha. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nangalan''ny olona ny vatsin''ireo, nefa tsy nanontany tamin''ny vavan''i Jehovah izy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary Josoa dia nanao fihavanana taminy ka nanao fanekena taminy mba tsy hamono azy; ary ny lohan''ny fiangonana koa dia nianiana taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary nony efa afaka hateloana no nanaovany fanekena taminy, dia reny fa mifanakaiky aminy ihany ireo sady mitoetra eo aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia niainga ny Zanak''Isiraely ka tonga tany an-tanànan''ireo tamin''ny andro fahatelo. Ary Gibeona sy Kefira sy Berota ary Kiriata-jearima no tanànany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa tsy namely azy ny Zanak''Isiraely, satria Jehovah, Andriamanitry ny Isiraely, no efa nianianan''ny lohan''ny fiangonana taminy. Dia nimonomonona tamin''ireo loholona ny fiangonana rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa hoy ny loholona rehetra tamin''ny fiangonana rehetra: Jehovah, Andriamanitry ny Isiraely, no efa nianiananay taminy; koa ankehitriny tsy mahazo mamely azy isika. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa izao no hataontsika aminy: Havelantsika ho velona ihany izy, fandrao hisy fahatezerana mahatratra antsika noho ny fianianana nataontsika taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy koa ny loholona taminy: Aoka ihany ho velona izy. Dia tonga mpikapa hazo sy mpantsaka rano ho an''ny fiangonana rehetra izy, araka ny teny nataon''ny loholona taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia niantso azy ireo Josoa ka nanao taminy hoe: Nahoana no namitaka anay ianareo ka nanao hoe: Lavitra anareo indrindra izahay, kanjo eto aminay ihany no onenanareo? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Koa ankehitriny voaozona ianareo, ary tsy hisy ho afaka, fa ho andevo sy ho mpikapa hazo ary ho mpantsaka rano ho an''ny tranon''Andriamanitro ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia namaly an''i Josoa izy ireo ka nanao hoe: Satria nambara tokoa taminay mpanomponao fa Jehovah Andriamanitrao efa nandidy an''i Mosesy mpanompony hanome anareo ny tany rehetra sy handringana ny mponina rehetra amin''ny tany eo anoloanareo, ary natahotra ny ho faty izahay noho ny aminareo, ka dia nanao izany zavatra izany; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'koa ankehitriny, indreto, eto an-tananao izahay, koa araka izay ataonao ho tsara sy marina hatao aminay dia ataovy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia nanao izany taminy izy ka namonjy azy tamin''ny tanan''ny Zanak''Isiraely, mba tsy hahafaty azy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Dia natolotr'i Josoa tamin'izany andro izany ireo ho mpikapa hazo sy ho mpantsaka rano ho an'ny fiangonana sy ho an'ny alitaran'i Jehovah mandraka androany eo amin'ny tany izay hofidiny.
