document_id: JOS.9,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hafetsena nataon'ny Gibeonita mba tsy handringanana azy
  - type: text
    content: Ary rehefa nandre izany ny mpanjaka rehetra izay etỳ an-dafin'i Jordana, na ny tany amin'ny tany havoana, na ny tany amin'ny tany lemaka amoron-tsiraka
  - type: note
    content: Heb. Sefela
  - type: text
    content: ', na ny tany amoron''ny Ranomasina Lehibe tandrifin''i Libanona, dia ny Hetita, ny Amorita, ny Kananita, ny Perizita, ny Hivita ary ny Jebosita, '
  '10':
  - type: text
    content: 'ary izay rehetra nataony tamin''ny mpanjaka roa tamin''ny Amorita, izay tany an-dafin''i Jordana, dia Sihona, mpanjakan''i Hesbona, sy Oga, mpanjakan''i Basana, izay tany Astarta. '
  '11':
  - type: text
    content: 'Dia niteny taminay ny loholonay sy ny mponina rehetra amin''ny taninay ka nanao hoe: Mitondrà vatsy eny an-tananareo ho any amin''ny haleha, dia mandehana hitsena azy, ka lazao aminy hoe: Mpanomponao izahay; koa ankehitriny manaova fanekena aminay. '
  '12':
  - type: text
    content: Itony mofonay itony dia vao mafana no nalainay tany an-tranonay ho vatsy tamin'ny andro nivoahanay hankatỳ aminareo; fa ankehitriny, indro, efa maina sy bobongolo
  - type: note
    content: 'Na: torotoro'
  - type: text
    content: ' izy; '
  '13':
  - type: text
    content: 'ary vaovao ireto siny hoditra misy divay ireto izay nofenoinay; fa, indreo, efa triatra izy; ary efa rovitra ireto lambanay sy kapanay ireto noho ny halavitry ny naleha. '
  '14':
  - type: text
    content: 'Ary nangalan''ny olona ny vatsin''ireo, nefa tsy nanontany tamin''ny vavan''i Jehovah izy. '
  '15':
  - type: text
    content: 'Ary Josoa dia nanao fihavanana taminy ka nanao fanekena taminy mba tsy hamono azy; ary ny lohan''ny fiangonana koa dia nianiana taminy. '
  '16':
  - type: text
    content: Ary nony efa afaka hateloana no nanaovany fanekena taminy, dia reny fa mifanakaiky aminy ihany ireo sady mitoetra eo aminy.
  '17':
  - type: text
    content: 'Dia niainga ny Zanak''Isiraely ka tonga tany an-tanànan''ireo tamin''ny andro fahatelo. Ary Gibeona sy Kefira sy Berota ary Kiriata-jearima no tanànany. '
  '18':
  - type: text
    content: 'Fa tsy namely azy ny Zanak''Isiraely, satria Jehovah, Andriamanitry ny Isiraely, no efa nianianan''ny lohan''ny fiangonana taminy. Dia nimonomonona tamin''ireo loholona ny fiangonana rehetra. '
  '19':
  - type: text
    content: 'Fa hoy ny loholona rehetra tamin''ny fiangonana rehetra: Jehovah, Andriamanitry ny Isiraely, no efa nianiananay taminy; koa ankehitriny tsy mahazo mamely azy isika. '
  '2':
  - type: text
    content: dia niray hina niangona hiady amin'i Josoa sy ny Isiraely izy.
  '20':
  - type: text
    content: 'Fa izao no hataontsika aminy: Havelantsika ho velona ihany izy, fandrao hisy fahatezerana mahatratra antsika noho ny fianianana nataontsika taminy. '
  '21':
  - type: text
    content: 'Ary hoy koa ny loholona taminy: Aoka ihany ho velona izy. Dia tonga mpikapa hazo sy mpantsaka rano ho an''ny fiangonana rehetra izy, araka ny teny nataon''ny loholona taminy. '
  '22':
  - type: text
    content: 'Dia niantso azy ireo Josoa ka nanao taminy hoe: Nahoana no namitaka anay ianareo ka nanao hoe: Lavitra anareo indrindra izahay, kanjo eto aminay ihany no onenanareo? '
  '23':
  - type: text
    content: 'Koa ankehitriny voaozona ianareo, ary tsy hisy ho afaka, fa ho andevo sy ho mpikapa hazo ary ho mpantsaka rano ho an''ny tranon''Andriamanitro ianareo. '
  '24':
  - type: text
    content: 'Dia namaly an''i Josoa izy ireo ka nanao hoe: Satria nambara tokoa taminay mpanomponao fa Jehovah Andriamanitrao efa nandidy an''i Mosesy mpanompony hanome anareo ny tany rehetra sy handringana ny mponina rehetra amin''ny tany eo anoloanareo, ary natahotra ny ho faty izahay noho ny aminareo, ka dia nanao izany zavatra izany; '
  '25':
  - type: text
    content: 'koa ankehitriny, indreto, eto an-tananao izahay, koa araka izay ataonao ho tsara sy marina hatao aminay dia ataovy. '
  '26':
  - type: text
    content: 'Dia nanao izany taminy izy ka namonjy azy tamin''ny tanan''ny Zanak''Isiraely, mba tsy hahafaty azy ireo. '
  '27':
  - type: text
    content: Dia natolotr'i Josoa tamin'izany andro izany ireo ho mpikapa hazo sy ho mpantsaka rano ho an'ny fiangonana sy ho an'ny alitaran'i Jehovah mandraka androany eo amin'ny tany izay hofidiny.
  '3':
  - type: text
    content: 'Ary ny mponina tao Gibeona nahare izay nanaovan''i Josoa an''i Jeriko sy Ay, '
  '4':
  - type: text
    content: dia nanao hafetsena kosa izy ka nandeha, ary nody ho iraka
  - type: note
    content: 'Na: nitondra vatsy'
  - type: text
    content: ' ka nitondra lasaka tonta nasampiny teo amin''ny borikiny sy siny hoditra tonta sady triatra ka nofehipehezina nasiany divay, '
  '5':
  - type: text
    content: ary kapa tonta sady nitampintampina teo amin'ny tongony, ary lamba tonta notafiny; ary efa maina sy bobongolo
  - type: note
    content: Na. torotoro
  - type: text
    content: ' ny mofo rehetra izay vatsiny. '
  '6':
  - type: text
    content: 'Dia nankany amin''i Josoa teo an-toby tany Gilgala izy ireo ka niteny taminy sy tamin''ny Isiraelita nanao hoe: Avy any an-tany lavitra izahay; koa ankehitriny mba manaova fanekena aminay ianareo. '
  '7':
  - type: text
    content: 'Ary hoy ny Isiraelita tamin''ireo Hivita ireo: Angamba mponina ato aminay ihany ianareo, ka hataonay ahoana no fanao fanekena aminareo? '
  '8':
  - type: text
    content: 'Fa hoy izy tamin''i Josoa: Mpanomponao izahay. Ary hoy Josoa taminy: Iza moa ianareo, ary avy aiza ? '
  '9':
  - type: text
    content: 'Dia hoy izy ireo taminy: Avy tany an-tany lavitra indrindra izahay mpanomponao noho ny anaran''i Jehovah Andriamanitrao; fa efa renay ny lazany sy izay rehetra nataony tany Egypta '
