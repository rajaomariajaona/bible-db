document_id: PSA.28
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiantsoana an'Andriamanitra hanafaka ny olony sy hanameloka ny ratsy fanahy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nataon''i Davida. Hianao no antsoiko, Jehovah ô, Ry vatolampiko ô, aza manentsin-tadiny amiko; fandrao, raha mangina amiko Hianao, dia ho tahaka izay midina any an-davaka aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mihainoa ny feon''ny fifonako, raha mitaraina aminao aho, raha manandratra ny tanako ho amin''ny fitoeranao masina indrindra aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aza atao indray manakipaka amin''ny ratsy fanahy sy ny mpanao meloka aho, fa ireny dia milaza fihavanana amin''ny namany, kanjo ratsy no ao am-pony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Manomeza azy araka ny asany sy ny faharatsian''ny ataony; eny, manomeza azy araka ny vitan''ny tànany, valio izy araka izay iendrehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa tsy mihevitra ny asan'i Jehovah, na ny vitan'ny tànany, izy, dia horavan'i Jehovah izy, fa tsy haoriny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Isaorana anie Jehovah, fa efa nihaino ny feon''ny fifonako Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jehovah no heriko sy ampingako; izy no nitokian''ny foko, ka voavonjy aho; dia mifaly ny foko, ka ny hirako no hiderako Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jehovah no heriny, ary Izy no fiarovana mafy hamonjena ny voahosony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Vonjeo ny olonao, ary tahio ny lovanao; andraso izy, ka tezao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Heb: ento'
    marker-yv: yv-n
  - type: text
    text: ' mandrakizay.'
