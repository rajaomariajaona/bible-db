document_id: PSA.28,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoana an'Andriamanitra hanafaka ny olony sy hanameloka ny ratsy fanahy
  - type: text
    content: 'Nataon''i Davida. Hianao no antsoiko, Jehovah ô, Ry vatolampiko ô, aza manentsin-tadiny amiko; fandrao, raha mangina amiko Hianao, dia ho tahaka izay midina any an-davaka aho. '
  '2':
  - type: text
    content: 'Mihainoa ny feon''ny fifonako, raha mitaraina aminao aho, raha manandratra ny tanako ho amin''ny fitoeranao masina indrindra aho. '
  '3':
  - type: text
    content: 'Aza atao indray manakipaka amin''ny ratsy fanahy sy ny mpanao meloka aho, fa ireny dia milaza fihavanana amin''ny namany, kanjo ratsy no ao am-pony. '
  '4':
  - type: text
    content: 'Manomeza azy araka ny asany sy ny faharatsian''ny ataony; eny, manomeza azy araka ny vitan''ny tànany, valio izy araka izay iendrehany. '
  '5':
  - type: text
    content: Fa tsy mihevitra ny asan'i Jehovah, na ny vitan'ny tànany, izy, dia horavan'i Jehovah izy, fa tsy haoriny.
  '6':
  - type: text
    content: 'Isaorana anie Jehovah, fa efa nihaino ny feon''ny fifonako Izy. '
  '7':
  - type: text
    content: 'Jehovah no heriko sy ampingako; izy no nitokian''ny foko, ka voavonjy aho; dia mifaly ny foko, ka ny hirako no hiderako Azy. '
  '8':
  - type: text
    content: 'Jehovah no heriny, ary Izy no fiarovana mafy hamonjena ny voahosony. '
  '9':
  - type: text
    content: Vonjeo ny olonao, ary tahio ny lovanao; andraso izy, ka tezao
  - type: note
    content: 'Heb: ento'
  - type: text
    content: ' mandrakizay.'
