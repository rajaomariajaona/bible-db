document_id: EZK.15,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanoharana mampiseho ny toetr'i Jerosalema
  - type: text
    content: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  '2':
  - type: text
    content: 'Ry zanak''olona, inona no ihoaran''ny tahom-boaloboka noho ny hazo rehetra, dia ny sakeli-boaloboka izay isan''ny hazo any an''ala? '
  '3':
  - type: text
    content: 'Moa mba fangalan-kazo hatao zavatra akory va izy, na mba fangalana fihantonan-javatra? '
  '4':
  - type: text
    content: 'Indro, hatsipy any anaty afo hataina izy; ny laniny roa ho levon''ny afo, ary ny tenatenany ho may. Ka moa azo atao zavatra akory va izy? '
  '5':
  - type: text
    content: Indro, fony izy tsy mbola nahafahana aza, dia tsy azo natao zavatra, koa mainka fa rehefa levon'ny afo sy may izy?
  '6':
  - type: text
    content: 'Koa izao no lazain''i Jehovah Tompo: Toy ny tahom-boaloboka amin''ny hazo any an''ala, izay natolotro hataina, dia toy izany no hanolorako ny mponina any Jerosalema. '
  '7':
  - type: text
    content: 'Ary hanandrina azy ny tavako; hiala avy amin''ny afo izy nefa ho levon''ny afo hafa indray; ka dia ho fantatrareo fa Izaho no Jehovah, raha manandrina azy ny tavako. '
  '8':
  - type: text
    content: Ary hataoko lao ny tany noho ny nivadihany tamiko, hoy Jehovah Tompo.
