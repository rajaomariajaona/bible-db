document_id: 2CH.23,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin''ny taona fahafito Joiada nitombo hery ka nanao fanekena tamin''ny mpifehy zato, dia Azaria, zanak''i Jerohama, sy Isimaela, zanak''i Johanana, sy Azaria, zanak''i Obeda, sy Mahaseia, zanak''i Adaia, ary Elisafata, zanak''1 Zikry. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny vahoaka rehetra dia nalahany, samy nitana ny fiadiany avy hanodidina ny mpanjaka hatramin''ny lafiny ankavavan''ny trano ka hatramin''ny lafiny ankavia, hatramin''ny alitara ka hatramin''ny trano. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nentiny nivoaka ny zanakalahin'ny mpanjaka ka nampisatrohiny ny satro-boninahitra, sady notolorany ny teni-vavolombelona
    - type: usfm
      marker: x
      children:
      - type: text
        text: Dia ny Didy Folo
      marker-yv: yv-n
    - type: text
      text: ', ka dia nampanjakainy. Ary Joiada sy ny zanany nanosotra azy ka niantso hoe: Ho ela velona anie ny mpanjaka!'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony ren''i Atalia ny tabataban''ny vahoaka nifamoivoy sy niarahaba ny mpanjaka, dia mba nankao amin''ny vahoaka tao an-tranon''i Jehovah koa izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hitany fa, indro, ny mpanjaka nitsangana teo amin''ny fitoeran''andriana teo amin''ny fidirana, ary ny mpanapaka sy ny mpitsoka ny trompetra dia teo anilan''ny mpanjaka; ary ny vahoaka rehetra dia nifaly sady nitsoka ny trompetra ary ny mpihira amin''ny zava-maneno isan-karazany no nitarika ny hira fiderana. Dia nandriatra ny fitafiany Atalia ka niantso hoe: Fikomiana! fikomiana! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nasain''i Joiada navoaky ny kapiteny! mpifehy ny miaramila, izy, ka hoy izy tamin''ireo: Avoahy eny ivelan''ny filaharana izy, ary izay manaraka azy dia vonoy amin''ny sabatra. Fa ny mpisorona efa nandrara hoe: Aza vonoina eto an-tranon''i Jehovah izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny olona nisava teo an-daniny roa, dia nankamin'ny fidirana amin'ny vavahadin-tsoavaly ravehivavy ka niditra tao an-tranon'ny mpanjaka; dia novonoiny teo izy.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Joiada nampanao fanekena ny vahoaka rehetra sy ny mpanjaka mbamin''ny tenany mba ho olon''i Jehovah. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny vahoaka vehetra niditra tao an-tranon''i Bala ka nandrava azy; ny alitara sy ny endri-javatra dia notorotoroiny avokoa, ary Matana, mpisoron''i Bala, novonoiny teo anoloan''ny alitara. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Joiada nanendry olona hitandrina ny tranon''i Jehovah hofehezin''ny Levita mpisorona izay nozarazarain''i Davida ho ao an-tranon''i Jehovah, hanatitra ny fanatitra dorana ho an''i Jehovah, araka ny voasoratra ao amin''ny lalàn''i Mosesy, amin''ny fifaliana sy ny fihirana, dia araka ny nasain''i Davida natao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nalatsany teo am-bavahadin''ny tranon''i Jehovah ny mpiandry varavarana mba tsy hisy zavatra maloto na inona na inona ho tafiditra ao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitety an''i Joda Ireo ka namory ny Levita avy tany amin''ny tanànan''ny Joda rehetra sy ny lohan''ny fianakaviana tamin''ny Isiraely, dia tonga tany Jerosalema ireo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nalainy ny mpifehy zato sy ny olona manan-kaja sy ny mpanapaka ny olona ary ny vahoaka rehetra; ary dia nentiny nidina avy tao an-tranon''i Jehovah ny mpanjaka, ka ny vavahady ambony no nalehany hankao an-tranon''ny mpanjaka; ary nametraka ny mpanjaka teo amin''ny seza fiandrianan''ny fanjakana izy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nifaly ny vahoaka rehetra; ary nandry fahizay ny tanana, fa Atalia efa novonoiny tamin'ny sabatra.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny olona rehetra vory tao dia nanao fanekena tamin''ny mpanjaka tao an-tranon''Andriamanitra. Ary hoy Joiada taminy: Indro, ny zanaky ny mpanjaka no hanjaka araka ny efa nolazain''i Jehovah ny amin''ny taranak''i Davida. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no hataonareo: ny ampahatelonareo izay milatsaka amin''ny Sabata, dia ny mpisorona sy ny Levita, ho mpiandry varavarana; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny ampahatelonareo ho ao an-tranon''ny mpanjaka; ary ny ampahatelonareo ho eo amin''ny vavahadin''ny fanorenana; ary ny vahoaka rehetra kosa dia ho eo amin''ny kianjan''ny tranon''i Jehovah. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa aza avela hisy hiditra ao an-tranon''i Jehovah afa-tsy ny mpisorona sy ny Levita izay manao fanompoam-pivavahana ihany; ireo ihany no hiditra, satria masina ireo; fa ny vahoaka rehetra kosa dia hitandrina izay nasain''i Jehovah hotandremana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny Levita hanemitra manodidina ny mpanjaka, samy mitana ny fiadiany avy; ka na iza na iza miditra ao an-trano dia Vonoy, ary arahonareo ny mpanjaka, na miditra na mivoaka izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny Levita sy ny Joda rehetra dia nanao araka izay rehetra nandidian''i Joiada mpisorona azy, ka samy nitondra ny olom-peheziny izay nilatsaka tamin''ny Sabata sy izay niala tamin''ny Sabata izy; fa Joiada mpisorona tsy nandrava ny antokony. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nomen''i Joiada mpisorona ho an''ny mpifehy zato ny lefona sy ny ampinga kely sy ny ampinga lehibe, izay an''i Davida mpanjaka ka tao an-tranon''Andriamanitra. '
