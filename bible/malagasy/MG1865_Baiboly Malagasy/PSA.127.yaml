document_id: PSA.127,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahatsinontsinon'ny ataon'ny olona, raha tsy ambinin'Andriamanitra
  - type: text
    content: Fihirana fiakarana
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga'
  - type: text
    content: '. Nataon''i Solomona. Raha tsy Jehovah no manao ny trano, Dia miasa foana ny mpanao azy. Raha tsy Jehovah no miambina ny tanàna, Dia miari-tory foana ny mpiambina. '
  '2':
  - type: text
    content: Zava-poana ho anareo ny mifoha maraina Sy ny alim-pandry Ka homana ny hanina azo amin'ny fahasahiranana; Izany anefa dia omeny ihany ho an'ny malalany, na dia matory aza izy.
  '3':
  - type: text
    content: 'Indro, lova avy amin''i Jehovah ny zanaka maro; Tamby ny ateraky ny kibo. '
  '4':
  - type: text
    content: 'Tahaka ny zana-tsipìka eo an-tànan''ny mahery Ny zanaky ny fahatanorana. '
  '5':
  - type: text
    content: Sambatra izay mameno ny tranon-jana-tsipìkany amin'ireny; Tsy ho menatra ireny, raha mifamaly amin'ny fahavalo eo am-bavahady.
