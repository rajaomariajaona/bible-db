document_id: PSA.127,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahatsinontsinon'ny ataon'ny olona, raha tsy ambinin'Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fihirana fiakarana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Fihirana misy hevitra ambaratonga'
      marker-yv: yv-n
    - type: text
      text: '. Nataon''i Solomona. Raha tsy Jehovah no manao ny trano, Dia miasa foana ny mpanao azy. Raha tsy Jehovah no miambina ny tanàna, Dia miari-tory foana ny mpiambina. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Zava-poana ho anareo ny mifoha maraina Sy ny alim-pandry Ka homana ny hanina azo amin'ny fahasahiranana; Izany anefa dia omeny ihany ho an'ny malalany, na dia matory aza izy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, lova avy amin''i Jehovah ny zanaka maro; Tamby ny ateraky ny kibo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tahaka ny zana-tsipìka eo an-tànan''ny mahery Ny zanaky ny fahatanorana. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sambatra izay mameno ny tranon-jana-tsipìkany amin'ireny; Tsy ho menatra ireny, raha mifamaly amin'ny fahavalo eo am-bavahady.
