document_id: NEH.8
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary rehefa tonga ny volana fahafito, dia samy tany an-tanànany avy ny Zanak''Isiraely. Dia nivory tahaka ny olona iray izy rehetra ho eo an-kalalahana teo anoloan''ny vavahadin-drano; ary niteny tamin''i Ezra mpanora-dalàna izy mba ho entiny ny bokin''ny lalan''i Mosesy izay nandidian''i Jehovah ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nentin''i Ezra mpisorona ny lalàna tamin''ny andro voalohany tamin''ny volana fahafito ho eo anatrehan''ny fiangonana, na lehilahy na vehivavy, mbamin''izay rehetra efa mahahaino. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia novakina teo an-kalalahana teo anoloan''ny vavahadin-drano izy hatramin''ny vao maraina koa ka ambara-pitataovovonan''ny andro, dia teo anatrehan''ny lehilahy sy ny vehivavy mbamin''izay efa mahahaino; ary ny olona rehetra dia nampandry sofina hihaino ny bokin''ny lalàna. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Ezra mpanora-dalàna nitsangana teo ambonin''ny lampihazo fitoriana, izay efa natao ho fitoriana izany; ary Matitia sy Sema sy Anaia sy Oria sy Hilkia ary Mahaseia no nitsangana teo anilany ankavanana; ary Pedaia sy Misaela sy Malkia sy Hasoma sy Hasbadana sy Zakaria ary Mesolama no teo anilany ankavia kosa. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia nosokafan''i Ezra teo imason''ny olona rehetra ny boky (fa ambony toerana noho ny olona rehetra izy); ary rehefa nosokafany izany, dia nitsangana koa ny olona rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Ezra nisaotra an''i Jehovah, Andriamanitra lehibe; ary ny olona rehetra nanandra-tanana ka namaly hoe: Amena, Amena; dia niondrika izy sady niankohoka tamin''ny tany teo anatrehan''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary Jesoa sy Bany sy Serebia sy Jamina sy Akoba sy Sabetahy sy Hodia sy Mahaseia sy Kelita sy Azaria sy Jozabada sy Hanana sy Pelaia ary ny Levita dia nampianatra ny olona ny lalàna; ary ny olona dia teo amin''izay nitoerany ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia novakiny mazava ny teny tao amin''ny bokin''ny lalàn''Andriamanitra, sady nohazavainy tsara ny heviny, ka dia azon''ny olona tsara ny teny novakina. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Nehemia governora sy Ezra mpisorona, mpanora-dalàna, ary ny Levita izay nampianatra ny olona dia nanao tamin''ny olona rehetra hoe: Masina ho an''i Jehovah Andriamanitrareo ity andro ity; koa aza malahelo na mitomany. Fa nitomany ny olona rehetra raha nandre ny tenin''ny lalàna. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy izy taminy: Mandehana, hano ny matavy, ary sotroy ny mamy, dia mba anatero anjara izay tsy manan-javatra voavoatra; fa masina ho an''ny Tompontsika ity andro ity; koa aza malahelo ianareo, fa ny fifaliana avy amin''i Jehovah no fiarovana mafy ho anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny Levita nampangina ny olona rehetra ka nanao hoe: Mangina ianareo, fa masina ity andro ity; koa aza malahelo ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia nandeha ny olona rehetra hihinana sy hisotro sy hanatitra anjara ho an'ny sasany ary hifaly indrindra, satria azony tsara ny teny izay notorina taminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nony ampitson''iny dia vory teo amin''i Ezra mpanora-dalàna ny lohan''ny fianakaviana tamin''ny olona rehetra sy ny mpisorona ary ny Levita mba handinika ny tenin''ny lalàna. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hitany voasoratra teo amin''ny lalàna, izay nampandidian''i Jehovah an''i Mosesy, fa tokony hitoetra ao amin''ny trano rantsan-kazo ny Zanak''Isiraely amin''ny andro firavoravoana amin''ny volana fahafito, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ary tokony hampandre ny olona sy handefa teny mitety ny tanànany rehetra sy Jerosalema ka hanao hoe: Mandehana any an-tendrombohitra, ka makà sampan''oliva sy sampan''oliva maniry ho azy sy sampan-drotra sy sampan-drofia ary sampan-kazo be ravina hanaovana trano rantsan-kazo araka, ny voasoratra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nandeha ny olona ka naka, ary samy nanao trano rantsan-kazo ho azy teo amin''ny tampon-tranony avy sy teo anatin''ny tokotaniny avy sy teo anatin''ny kianjan''ny tranon''Andriamanitra sy teo an-kalalahana teo akaikin''ny vavahadin-drano ary teo an-kalalahana akaikin''ny vavahadin''i Efraima. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Eny, nanao trano rantsan-kazo avokoa ny fiangonana rehetra izay efa niverina avy tamin''ny fahababoana, ka nipetraka tao anatiny izy; fa tsy mbola nanao toy izany ny Zanak''Isiraely hatramin''ny andron''i Josoa, zanak''i Nona, ka hatramin''izany andro izany. Ary dia nisy fifaliana lehibe indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary namaky ny teny tao amin'ny bokin'ny lalàn'Andriamanitra isan'andro isan'andro izy hatramin'ny andro voalohany ka hatramin'ny andro farany. Ary nanao andro firavoravoana hafitoana izy; ary tamin'ny andro fahavalo dia fara-fivoriana araka ny fanao.
