document_id: JOB.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny teny fanindroany nataon'i Bildada
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia namaly Bildada Sohita ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mandra-pahoviana no hamandrika teny ianareo? Mba hendre aloha, dia vao hiteny izahay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sao ataonareo ho biby anie izahay ka tahaka ny maloto eo imasonareo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ry ilay mamiravira tena amin'ny fahatezerana, noho ny aminao va no hahatonga ny tany ho lao, ary ny vatolampy hafindra hiala amin'ny fitoerany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsy izany, fa ho faty ny jiron'ny ratsy fanahy, ary hilopilopy ny lelafony;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny mazava manjary maizina ao amin'ny lainy, ary ny jirony eo amboniny dia maty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Etena ny herin'ny diany, ary ny fisainany ihany no mandavo azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa ny tongony ihany no mahatonga azy eo amin'ny fandrika harato, ka manitsaka eo amin'ny harato izy;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Azon'ny fandrika ny ombelahin-tongony ary voahazon'ny tadivavarana
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Miafina ao amin'ny tany ny fandrika haningotra azy sy ny tonta eny an-dalana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fampitahorana no mampitahotra azy manodidina ka mampivadi-po azy eny amin'ny alehany rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Liana azy ny loza
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Lanin''ny mosary izy'
    marker-yv: yv-n
  - type: text
    text: ', ary ny fandringanana dia vonona eo anilany;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Eny, laniny tsikelikely ny hodiny; ny momba ny tenany dia lanin'ny lahimatoan'ny fahafatesana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ongotana hiala amin'ny lainy ny zavatra itokiany, ka tsy maintsy ho entina ho amin'ilay mpanjaka mampahatahotra indrindra izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izay tsy taranany no hitoetra ao amin'ny lainy; Solifara no hafafy amin'ny fonenany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Maina ny fakany ao ambany, ary tapaka
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: malazo'
    marker-yv: yv-n
  - type: text
    text: ' ny rantsany eo ambony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny fahatsiarovana azy dia very tsy ho eo amin'ny tany. Ary tsy malaza eny ivelany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Roahina hiala amin'ny mazava ho any amin'ny maizina izy ary enjehina hiala amin'izao tontolo izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tsy manana fara mandimby eo amin'ny fireneny izy, ka tsy misy tsy tratry ny loza ny ao amin'ny fonenany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny manjo azy dia italanjonan'ny any andrefana, ary ny any atsinanana raiki-tahotra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izany tokoa no anjaran'ny ratsy fanahy, ary izany no manjo ny tsy mahalala an'Andriamanitra.
