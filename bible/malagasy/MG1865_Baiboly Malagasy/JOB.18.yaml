document_id: JOB.18,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny fanindroany nataon'i Bildada
  - type: text
    content: 'Dia namaly Bildada Sohita ka nanao hoe:'
  '10':
  - type: text
    content: Miafina ao amin'ny tany ny fandrika haningotra azy sy ny tonta eny an-dalana.
  '11':
  - type: text
    content: Fampitahorana no mampitahotra azy manodidina ka mampivadi-po azy eny amin'ny alehany rehetra.
  '12':
  - type: text
    content: Liana azy ny loza
  - type: note
    content: 'Na: Lanin''ny mosary izy'
  - type: text
    content: ', ary ny fandringanana dia vonona eo anilany;'
  '13':
  - type: text
    content: Eny, laniny tsikelikely ny hodiny; ny momba ny tenany dia lanin'ny lahimatoan'ny fahafatesana.
  '14':
  - type: text
    content: Ongotana hiala amin'ny lainy ny zavatra itokiany, ka tsy maintsy ho entina ho amin'ilay mpanjaka mampahatahotra indrindra izy.
  '15':
  - type: text
    content: Izay tsy taranany no hitoetra ao amin'ny lainy; Solifara no hafafy amin'ny fonenany.
  '16':
  - type: text
    content: Maina ny fakany ao ambany, ary tapaka
  - type: note
    content: 'Na: malazo'
  - type: text
    content: ' ny rantsany eo ambony.'
  '17':
  - type: text
    content: Ny fahatsiarovana azy dia very tsy ho eo amin'ny tany. Ary tsy malaza eny ivelany izy.
  '18':
  - type: text
    content: Roahina hiala amin'ny mazava ho any amin'ny maizina izy ary enjehina hiala amin'izao tontolo izao.
  '19':
  - type: text
    content: Tsy manana fara mandimby eo amin'ny fireneny izy, ka tsy misy tsy tratry ny loza ny ao amin'ny fonenany.
  '2':
  - type: text
    content: Mandra-pahoviana no hamandrika teny ianareo? Mba hendre aloha, dia vao hiteny izahay.
  '20':
  - type: text
    content: Ny manjo azy dia italanjonan'ny any andrefana, ary ny any atsinanana raiki-tahotra.
  '21':
  - type: text
    content: Izany tokoa no anjaran'ny ratsy fanahy, ary izany no manjo ny tsy mahalala an'Andriamanitra.
  '3':
  - type: text
    content: Sao ataonareo ho biby anie izahay ka tahaka ny maloto eo imasonareo?
  '4':
  - type: text
    content: Ry ilay mamiravira tena amin'ny fahatezerana, noho ny aminao va no hahatonga ny tany ho lao, ary ny vatolampy hafindra hiala amin'ny fitoerany?
  '5':
  - type: text
    content: Tsy izany, fa ho faty ny jiron'ny ratsy fanahy, ary hilopilopy ny lelafony;
  '6':
  - type: text
    content: Ny mazava manjary maizina ao amin'ny lainy, ary ny jirony eo amboniny dia maty.
  '7':
  - type: text
    content: Etena ny herin'ny diany, ary ny fisainany ihany no mandavo azy.
  '8':
  - type: text
    content: Fa ny tongony ihany no mahatonga azy eo amin'ny fandrika harato, ka manitsaka eo amin'ny harato izy;
  '9':
  - type: text
    content: Azon'ny fandrika ny ombelahin-tongony ary voahazon'ny tadivavarana
