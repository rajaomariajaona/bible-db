document_id: ACT.28,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny toetr'i Paoly tany Roma, sy izay nataony tany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary rehefa voavonjy izahay, vao fantatray fa Melita no anaran''ilay nosy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary voninahitra be no nomen'ny olona anay; ary rehefa handeha izahay, dia novatsiany tsara.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary rehefa afaka telo volana, dia niondrana izahay tamin'ny sambon'Aleksandria, izay efa nandany ny ririnina teo amin'izany nosy izany sady nisy sarin'ny Zaza Kambana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. Dioskory; dia Kastora sy Poloksa
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary rehefa nitody tany Syrakosa izahay, dia nitoetra teo hateloana. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary nony niala teo izahay, dia nisompirana nankany Regioma; ary rehefa afaka indray andro, dia nifofofofo avy any atsimo ny rivotra, koa nony ampitso dia tonga tao Potioly izahay; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'tao no nahitanay ny rahalahy sasany, ary izy niangavy anay hitoetra tao aminy hafitoana. Ary toy izany no nandrosoanay nankany Roma. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary nony nahare ny dianay ny rahalahy tany, dia tonga izy nitsena anay hatrany amin'ny Tsenan'Apio sy ny Tranombahiny Telo; raha nahita azy Paoly, dia nisaotra an'Andriamanitra izy ka nahazo toky.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary rehefa tonga tany Roma izahay
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Ampio hoe: ny mpifatotra dia natolotry ny kapiteny ho amin''ny lehiben''ny mpiambina; fa'
      marker-yv: yv-n
    - type: text
      text: ', Paoly dia navelany hitoetra mitokana teo amin''ny miaramila anankiray izay niambina azy.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary rehefa afaka hateloana, dia nampanalain''i Paoly hiangona izay lohandohany tamin''ny Jiosy; ary rehefa niangona ireo, dia hoy izy taminy: Ry rahalahy, izaho dia mpifatotra avy tany Jerosalema natolotra teo an-tànan''ny Romana, na dia tsy diso tamin''ny firenentsika aza, na tamin''ny fanaon-drazana; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ary rehefa nanadina ahy mafy ireo, dia saiky nandefa ahy ihany, satria tsy nisy nataoko izay tokony hahafaty ahy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa raha notoherin''ny Jiosy izany, dia tery aho ka nilaza fa handahatra amin''i Kaisara, nefa tsy mba toy ny manana teny hiampangako ny fireneko tsy akory. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary tsy kely ny soa nasehon''ny tompon-tany taminay; fa namelona afo izy ka nandray tsara anay rehetra, satria nilatsaka tamin''izay ny ranonorana, sady nangatsiaka ny andro. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary izany zavatra izany no nampanalako anareo, hahitako anareo sy hiresahako aminareo; fa noho ny fanantenan''ny Isiraely no ifatorako amin''ity gadra ity. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary hoy izy ireo taminy; Izahay tsy mbola nahazo taratasy avy tany Jodia milaza anao, ary tsy mbola nisy rahalahy izay nankaty nanambara na nilaza ratsy anao; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: fa tianay ho re aminao izay hevitrao; fa ny amin'izany antoko izany dia fantatray fa efa ratsy laza eny tontolo eny izy.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary rehefa nanao fotoana taminy ireo, dia maro no nankeo aminy tao an-trano nitoerany; ary izy nilaza sy nanambara taminy ny fanjakan''Andriamanitra hatramin''ny maraina ka hatramin''ny hariva, ary ny teny eo amin''ny lalàn''i Mosesy sy ny mpaminany no nitaomany azy hino an''i Jesosy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary ny sasany nino izay nolazainy, fa ny sasany kosa tsy mba nino. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary raha tsy niray saina ireo dia niala, rehefa nanao teny indraim-bava Paoly hoe: Marina izay nampilazain''ny Fanahy Masina an''Isaia mpaminany tamin''ny razanareo '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'manao hoe: Mandehana any amin''ity firenena ity ianao, ka lazao hoe: Mba hahare mandrakariva ihany ianareo, fa tsy hahalala; Ary mba hijery mandrakariva ihany ianareo, fa tsy hahita; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Fa efa adala ny fon''ireo olona ireo, ary efa lalodalovana ny sofiny, ary efa nakimpiny ny masony, Fandrao hahita ny masony, sy handre ny sofiny, ary hahalala ny fony, dia hibebaka izy, ka hahasitrana azy Aho. (Isa. 6. 9, 10). '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Koa aoka ho fantatrareo fa izao famonjen'Andriamanitra izao dia nampitondraina ho any amin'ny jentilisa, ary izy hihaino azy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Ampio hoe: (29) Ary rehefa nilaza izany izy, dia lasa ny Jiosy ka niady hevitra fatratra'
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia namory kitay hazo iray trotroana Paoly ka nanohoka izany teo amin''ny afo; ary nisy menarana nivoaka avy tamin''ny afo ka niraikitra tamin''ny tànany. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary Paoly nitoetra roa taona ngarangidina tao an-trano nohofany ka nandray tsara izay rehetra nankeo aminy, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: dia nitory ny fanjakan'Andriamanitra ka nampianatra ny amin'i Jesosy Kristy Tompo tamin'ny fahasahiana be, ary tsy nisy fisakanana.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary raha hitan''ny tompon-tany ny biby niraikitra tamin''ny tànany, dia niresaka hoe izy: Mpamono olona tokoa io lehilahy io, ka na dia voavonjy tamin''ny ranomasina aza izy, tsy avelan''ny todin''aina ho velona. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa nakifiny ho eo amin''ny afo ilay biby, ka tsy nisy naninona izy na dia kely akory aza. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary ny olona kosa nanampo azy hivonto, na hikarapoka ho faty tampoka; fa rehefa niandry ela izy ka nahita fa tsy nisy na inona na inona nanjo an''i Paoly, dia niova saina izy ka nanao hoe: andriamanitra io. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary teo akaikin''io dia nisy sahan''i Popilo, mpanapaka ny nosy, izay nandray anay ka nampiantrano anay tsara hateloana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary nararin''ny tazo sady nivalan-drà ny rain''i Popilo; ary Paoly niditra teo aminy ka nivavaka sady nametra-tanana taminy, dia nahasitrana azy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary rehefa vita izany, dia tonga koa ny sasany izay narary teo amin''ny nosy, ka dia sitrana. '
