document_id: PSA.113
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiderana an'Andriamanitra lehibe, Izay manandratra ny malahelo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Haleloia. Miderà, ianareo mpanompon''i Jehovah, Miderà ny anaran''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Isaorana anie ny anaran''i Jehovah Hatramin''izao ka ho mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hatramin''ny fiposahan''ny masoandro ka hatramin''ny filentehany No hoderaina anie ny anaran''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Avo ambonin'ny jentilisa Jehovah; Ambonin'ny lanitra ny voninahiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Iza no tahaka an''i Jehovah Andriamanitsika, Izay mipetraka any amin''ny avo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nefa miondrika mijery Ny any an-danitra sy ny etỳ an-tany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Manangana ny malahelo hiala amin''ny vovoka Izy Ary manandratra ny mahantra ho afaka eo amin''ny zezika, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mba hametraka azy ho naman''ny mpanapaka ny olony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mampitoetra tsara ny momba Izy, Fa mahatonga azy ho renin-jaza mifaly. Haleloia.
