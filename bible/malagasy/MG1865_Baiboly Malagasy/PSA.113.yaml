document_id: PSA.113,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an'Andriamanitra lehibe, Izay manandratra ny malahelo
  - type: text
    content: 'Haleloia. Miderà, ianareo mpanompon''i Jehovah, Miderà ny anaran''i Jehovah. '
  '2':
  - type: text
    content: 'Isaorana anie ny anaran''i Jehovah Hatramin''izao ka ho mandrakizay. '
  '3':
  - type: text
    content: 'Hatramin''ny fiposahan''ny masoandro ka hatramin''ny filentehany No hoderaina anie ny anaran''i Jehovah. '
  '4':
  - type: text
    content: Avo ambonin'ny jentilisa Jehovah; Ambonin'ny lanitra ny voninahiny.
  '5':
  - type: text
    content: 'Iza no tahaka an''i Jehovah Andriamanitsika, Izay mipetraka any amin''ny avo, '
  '6':
  - type: text
    content: 'Nefa miondrika mijery Ny any an-danitra sy ny etỳ an-tany? '
  '7':
  - type: text
    content: 'Manangana ny malahelo hiala amin''ny vovoka Izy Ary manandratra ny mahantra ho afaka eo amin''ny zezika, '
  '8':
  - type: text
    content: 'Mba hametraka azy ho naman''ny mpanapaka ny olony. '
  '9':
  - type: text
    content: Mampitoetra tsara ny momba Izy, Fa mahatonga azy ho renin-jaza mifaly. Haleloia.
