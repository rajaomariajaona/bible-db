document_id: JHN.1
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin''ny voalohany ny Teny, ary ny Teny tao amin''Andriamanitra, ary ny Teny dia Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izy dia tao amin''Andriamanitra tamin''ny voalohany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izy no nahariana ny zavatra rehetra; ary raha tsy Izy dia tsy nisy nahariana izao zavatra ary izao, na dia iray aza. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izy no nisiam-piainana; ary ny fiainana no fanazavana ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ny mazava dia mamirapiratra ao amin'ny maizina; fa ny maizina tsy nandray azy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Tsy mahasakana azy'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nisy lehilahy nirahin''Andriamanitra, Jaona no anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izy tonga ho vavolombelona hanambara ny Mazava, mba hinoan''ny olona rehetra noho ny teniny. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tsy izy anefa no Ilay Mazava, fa tonga ho vavolombelona hanambara ny Mazava ihany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tao ny tena Mazava
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Izy no tena Mazava'
    marker-yv: yv-n
  - type: text
    text: ' Izay mahazava ny olona rehetra tonga amin''izao tontolo izao'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ny Mazava marina, Izay mahazava ny olona rehetra, dia tonga amin''izao tontolo izao'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Teo amin''izao tontolo izao Izy, ary Izy no nanaovana izao tontolo izao, nefa izao tontolo izao tsy nahalala Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tonga tany amin''ny Azy Izy, fa ny Azy tsy nandray Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa izay rehetra nandray Azy dia nomeny hery
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: anarana, na fahefana'
    marker-yv: yv-n
  - type: text
    text: ' ho tonga zanak''Andriamanitra, dia izay mino ny anarany, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'dia ireo izay tsy nateraky ny rà, na ny sitrapon''ny nofo, na ny sitrapon''ny olona, fa naterak''Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary ny Teny dia tonga nofo ka nonina
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. nitoetra an-day
    marker-yv: yv-n
  - type: text
    text: ' tamintsika; ary hitanay ny voninahiny, dia voninahitra miendrika ho an''ny Lahitokana avy tamin''ny Ray, sady feno fahasoavana sy fahamarinana. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jaona nanambara Azy ka niantso hoe: Izy Ilay nolazaiko hoe: Izay avy '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa tamin''ny fahafenoany no nandraisantsika rehetra, dia fahasoavana anampy fahasoavana. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa ny lalàna dia nomena tamin''ny alalan''i Mosesy; [fa] ny fahasoavana sy ny fahamarinana kosa dia tonga tamin''ny alalan''i Jesosy Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tsy nisy nahita an''Andriamanitra na oviana na oviana ; fa ny Zanakalahy Tokana, Izay ao an-tratran''ny Ray, Izy no nanambara [Azy]. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary izao no nambaran''i Jaona, raha ny Jiosy naniraka mpisorona sy Levita avy tany Jerosalema hankany aminy mba hanontany azy hoe: Iza moa ianao? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nilaza marina izy ka tsy nandà, fa hoy ny filàzany: Tsy izaho no Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary izy ireo nanontany azy hoe: Ahoana ary? Elia va ianao? Fa hoy izy: Tsy izy aho. Ilay Mpaminany va ianao? Fa izy namaly hoe: Tsia. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia hoy ireo taminy: Iza ary ianao? mba hitondranay valiny ho any amin''izay naniraka anay. Lazainao ho iza moa ny tenanao? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia hoy izy: Izaho dia feon''ny miantso mafy any an-efitra hoe: Ataovy mahitsy ny lalan''i Jehovah (Isa. 40. 3), araka izay nolazain''Isaia mpaminany. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary iraka avy tamin''ny Fariseo ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia nanontany azy ireo ka nanao taminy hoe: Nahoana ary ianao no manao batisa raha tsy ianao no Kristy, na Elia, na Ilay Mpaminany? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jaona namaly azy ka nanao hoe: Izaho manao batisa amin''ny rano; fa eto aminareo misy Anankiray Izay tsy fantatrareo, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'dia Ilay avy ao aoriako, ary tsy miendrika hamaha ny fehin-kapany aza aho. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Izany zavatra izany dia natao tany Betania
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Betabara'
    marker-yv: yv-n
  - type: text
    text: ' any an-dafin''i Jordana, izay nanaovan''i Jaona batisa. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Nony ampitso dia nahita an''i Jesosy avy manatona azy Jaona, ka dia hoy izy: Indro ny Zanak''ondrin''Andriamanitra, Izay manaisotra'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mitondra'
    marker-yv: yv-n
  - type: text
    text: ' ny fahotan''izao tontolo izao! '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Izy Ilay nolazaiko hoe: Misy Lehilahy avy ao aoriako Izay efa tonga eo alohako, satria talohako Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary izaho tsy nahalala Azy; fa mba haseho amin'ny Isiraely Izy, izany no nihaviako manao batisa amin'ny rano.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary Jaona nanambara ka nanao hoe: Izaho nahita ny Fanahy midina avy any an-danitra tahaka ny voro-mailala ka nitoetra teo amboniny. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary izaho tsy nahalala Azy; fa Izay naniraka ahy hanao batisa amin''ny rano no nilaza tamiko hoe: Izay ho hitanao idinan''ny Fanahy sy itoerany, dia Izy no Mpanao batisa amin''ny Fanahy Masina. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary nahita aho, ka dia nanambara fa Izy no Zanak''Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Nony ampitson''iny indray dia nijanona Jaona sy ny mpianany roa lahy; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'ary nijery an''i Jesosy nitsangantsangana izy ka nanao hoe: Indro ny Zanak''ondrin''Andriamanitra! '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary ireo mpianatra roa lahy ireo, rehefa nandre azy niteny, dia nanaraka an''i Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary Jesosy nitodika ka nahita azy manaraka, dia nanao taminy hoe: Inona no tadiavinareo? Ary hoy izy roa lahy taminy: Raby (izay atao hoe, raha adika, Mpampianatra ô, aiza Hianao no mitoetra? '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Hoy Izy taminy: Avia, fa ho hitanareo. Koa dia nandeha izy ka nahita izay nitoerany ary nitoetra teo aminy tamin''izany andro izany; ary efa tokony ho ora fahafolo tamin''izay. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Andrea, rahalahin''i Simona Petera, no anankiray tamin''izy roa lahy, izay nandre ny tenin''i Jaona ka nanaraka an''i Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Izy no nahita an''i Simona rahalahiny aloha, dia hoy izy taminy: Efa nahita ny Mesia izahay (izay atso hoe, raha adika, ny Kristy). '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Dia nitondra azy ho any amin''i Jesosy izy. Ary nony nijery azy Jesosy, dia hoy Izy: Hianao no Simona, zanak''i Jaona; ianao hatao hoe Kefasy (izay atao hoe, raha adika, Petera'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Petera = vato
    marker-yv: yv-n
  - type: text
    text: ') '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Nony ampitso dia te-hiala ho any Galilia Jesosy, ary nahita an''i Filipo Izy ka nanao taminy hoe: Manaraha Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary Filipo dia avy any Betsaida, tanànan''i Andrea sy Petera. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Filipo kosa nahita an''i Natanaela ka nanao taminy hoe: Efa hitanay Ilay nosoratan''i Mosesy tao amin''ny lalàna, sy nosoratan''ny mpaminany, dia Jesosy, zanak''i Josefa, avy any Nazareta. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary hoy Natanaela taminy: Moa mba misy zava-tsoa va avy any Nazareta? Dia hoy Filipo taminy: Andeha hizaha. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Jesosy nahita an''i Natanaela avy manatona Azy, dia nilaza azy hoe: Indro ny tena Isiraelita tsy misy fitaka. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Hoy Natanaela taminy: Ahoana no ahafantaranao ahy? Dia namaly Jesosy ka nanao taminy hoe: Fony tsy mbola niantso anao Filipo, dia hitako teo ambanin''ny aviavy'
  - type: usfm
    marker: x
    children:
    - type: text
      text: aviavimbazaha
    marker-yv: yv-n
  - type: text
    text: ' ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Dia namaly Natanaela ka nanao hoe: Raby ô, Hianao no Zanak''Andriamanitra; Hianao no Mpanjakan''ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Jesosy namaly ka nanao taminy hoe: Moa ny nilazako taminao va fa hitako teo ambanin''ny aviavy ianao no inoanao? Hahita zavatra lehibe noho izany ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Ary hoy koa Izy taminy: Lazaiko aminareo marina dia marina tokoa: Ho hitanareo ny lanitra misokatra sy ny anjelin''Andriamanitra miakatra sy midina eo ambonin''ny Zanak''olona.'
