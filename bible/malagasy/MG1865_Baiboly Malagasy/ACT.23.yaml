document_id: ACT.23
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny namindrana an'i Paoly nankany Kaisaria mba tsy ho azon'izay efa nianiana hahafaty azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Paoly dia nibanjina ny Synedriona ka nanao hoe: Ry rahalahy, izaho nanompo an''Andriamanitra tamin''ny fieritreretana tsara mandraka androany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Ananiasy mpisoronabe nandidy izay nitsangana teo hamely ny vavany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy Paoly taminy: Andriamanitra mba hamely anao, ry rafi-bato voalalotra fotsy; fa ianao va mipetraka hitsara ahy araka ny lalàna, nefa asainao kapohina tsy araka ny lalàna aho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary izay nitsangana teo dia nanao hoe: Tevatevainao va ny mpisoronaben''Andriamanitra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy Paoly: Tsy fantatro fa mpisoronabe izy, ry rahalahy; fa voasoratra hoe: Aza miteny ratsy ny mpanapaka ny firenenao (Eks. 22. 27). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary rehefa fantatr''i Paoly fa Sadoseo ny sasany, ary ny sasany kosa Fariseo, dia niantso teo amin''ny Synedriona izy ka nanao hoe: Ry rahalahy, izaho dia Fariseo, zanaky ny Fariseo; ny amin''ny fanantenana sy ny fitsanganan''ny maty no itsarana ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary rehefa nilaza izany izy, dia nifanditra ny Fariseo sy ny Sadoseo, ka nizara roa toko ny olona maro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa ny Sadoseo manao hoe: Tsy misy fitsanganan''ny maty, sady tsy misy anjely na fanahy; fa ny Fariseo kosa manaiky izany avokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nisy antsoantso maharenina teo, ary ny mpanora-dalàna sasany, izay isan''ny antoko atao hoe Fariseo, nitsangana dia niady hevitra ka nanao hoe: Tsy hitanay izay helok''io lehilahy io; fa sao fanahy na anjely no niteny taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary rehefa nitabataba be ihany izy, dia natahotra ny mpifehy arivo, fandrao hifandroritan'ny olona Paoly ka ho samatsamaka, dia nasainy nidina ny miaramila mba haka azy an-keriny hiala teo ampovoany ary mba hitondra azy ho any anati-rova.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny Tompo nitsangana teo anilany tamin''iny alina iny ka nanao hoe: Matokia, fa tahaka ny nanambaranao Ahy tany Jerosalema no mbola hanambaranao Ahy any Roma koa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nony maraina dia niray tetika ny Jiosy ka niozona sy nianiana fa tsy hihinana na hisotro izy ambara-pamonony an''i Paoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary tsy omby efa-polo no niray tetika nanao izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary izy nankany amin''ny mpisoronabe sy ny loholona ka nanao hoe: Efa niozona sy nianiana izahay fa tsy hanandran-javatra na inona na inona ambara-pamononay an''i Paoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Koa ankehitriny dia milazà amin''ny mpifehy arivo ianareo sy ny Synedriona mba hampidina azy hankatỳ aminareo, mody ta-hamototra azy marimarina kokoa ny amin''izay nataony; ary izahay kosa dia efa vonona hamono azy, dieny tsy mbola mby akaiky izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nony ren''ny zanak''anabavin''i Paoly ny fanotrehana, dia lasa nankany anatirova izy ka nilaza tamin''i Paoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Paoly niantso ny kapiteny anankiray hankeo aminy ka nanao hoe: Ento mankany amin''ny mpifehy arivo ity zatovo ity, fa manan-teny holazaina aminy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa dia nandray azy ilay kapiteny ka nitondra azy ho any amin''ny mpifehy arivo, dia nanao hoe: Paoly mpifatotra niantso ahy hankeo aminy ka nangataka ahy hitondra ity zatovo ity hanketo aminao, fa manan-teny holazaina aminao, hono, izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ny mpifehy arivo nitantana azy, ary nony efa nitokana tao amin''ny mangingina izy, dia nanontaniany hoe: Inona moa no teny holazainao amiko? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hoy ilay zatovo: Ny Jiosy efa nifanaiky hangataka aminao hampidina an''i Paoly ho any amin''ny Synedriona rahampitso, mody ta-hanadina azy marimarina kokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Koa aza manaiky azy ianao, fa misy tsy omby efa-polo lahy izy manotrika hisambotra an''i Paoly, ka efa niozona sy nianiana izy fa tsy hihinana na hisotro ambara-pamonony azy; ary efa vonona izy ankehitriny ka miandry ny teny avy aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny mpifehy arivo nampandeha ilay zatovo ka nandidy azy hoe: Aza milaza amin''olona fa efa nilaza izany tamiko ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary niantso kapiteny roa lahy hankeo aminy izy ka nanao hoe: Manomàna miaramila roan-jato lahy sy an-tsoavaly fito-polo ary mpiloka lefona roan-jato hankany Kaisaria anio alina amin''ny ora fahatelo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ary itondray biby koa hitaingenan''i Paoly hitondra azy soa aman-tsara ho any amin''i Feliksa mpanapaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary izy nanoratra taratasy nisy izao teny izao: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Klaodio Lysia miarahaba an''i Feliksa, mpanapaka tsara indrindra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ity lehilahy ity dia nosamborin''ny Jiosy ka efa saiky novonoiny; fa nony fantatro fa Romana izy, dia nitondra ny miaramila aho ka namonjy azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary satria ta-hahalala tsara izay niampangany azy aho, dia nentiko nidina ho eo amin''ny Synedriona izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'dia hitako fa ady hevitra ny amin''ny lalàny no niampangany azy, fa tsy nisy niampangany azy izay tokony hahafaty na hamatorana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ary rehefa voalaza tamiko fa nisy nikasa hanotrika hisambotra an-dralehilahy, dia naniraka faingana hitondra azy aminao aho, ary ny mpiampanga koa nasaiko hilaza atỳ anatrehanao izay iampangany azy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ampio hoe: Veloma'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia nalain''ny miaramila Paoly araka ny nandidiana azy ka nentiny tamin''iny alina iny ho any Antipatria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary nony ampitso dia navelany handeha hiaraka aminy ny an-tsoavaly, fa izy kosa niverina ho any anati-rova. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Rehefa tonga tany Kaisaria ireo, dia nanolotra ny taratasy tamin''ny mpanapaka sady nanolotra an''i Paoly ho eo anatrehany koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary rehefa novakiny ilay taratasy, dia nanontany izay zara-fanapahana nihaviany izy; ary rehefa fantany fa avy tany Kilikia izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'dia hoy izy: Hihaino tsara ny teninao aho, rehefa tongay ny mpiampanga anao. Dia nasainy nambenana tao an-dapan''i'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. pretoria
    marker-yv: yv-n
  - type: text
    text: ' Heroda izy.'
