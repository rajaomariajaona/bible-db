document_id: EXO.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiomanan'ny Zanak'Isiraely alohan'ny nanomezan'Andriamanitra azy ny Lalàna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'TAMIN''ny volana fahatelo taorian''ny nialan''ny Zanak''Isiraely tamin''ny tany Egypta, dia tamin''izany andro izany no nahatongavany tany an-efitr''i Sinay. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary rehefa nifindra niala teo Refidima izy ka tonga tany amin''ny efitr''i Sinay, dia nitoby teo amin''ny efitra; dia tandrifin''ny tendrombohitra no nitobian''ny Isiraely teo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Mosesy niakatra ho ao amin''Andriamanitra, dia niantso azy Jehovah tao an-tendrombohitra ka nanao hoe: Izao no holazainao amin''ny taranak''i Jakoba sy hambaranao amin''ny Zanak''Isiraely: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hianareo efa nahita izay nataoko tamin''ny Egyptiana sy izay nitondrako anareo tamin''ny elatry ny voromahery ary ny nampankanesako anareo ho atỳ amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Koa ankehitriny, raha hihaino ny feoko tokoa ianareo ka hitandrina ny fanekeko, dia ho rakitra soa ho Ahy mihoatra noho ny firenena rehetra ianareo; fa Ahy ny tany rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia ho fanjaka-mpisorona sy ho firenena masina ho Ahy ianareo. Ireo teny ireo no holazainao amin''ny Zanak''Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nandeha Mosesy ka nampaka ny loholon''ny vahoaka, dia nalahany teo anatrehany ireo teny rehetra ireo, izay nandidian''i Jehovah azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia namaly indray miredona ny olona rehetra ka nanao hoe: Izay teny rehetra nolazain''i Jehovah dia hataonay. Ary dia nentin''i Mosesy tao amin''i Jehovah kosa ny tenin''ny olona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy Jehovah tamin''i Mosesy: Indro Aho mankeo aminao ao anatin''ny rahona maizina, mba ho ren''ny olona raha miteny aminao Aho, ka dia hino anao mandrakariva izy. Dia nambaran''i Mosesy tamin''i Jehovah ny tenin''ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy Jehovah tamin''i Mosesy: Ma­ndehana ho eny amin''ny olona, ka manamasina azy anio sy ampitso, ary ampanasao ny fitafiany izy: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ary aoka samy hiomana ho amin''ny andro fahatelo izy; fa amin''ny andro fahatelo no hidinan''i Jehovah ho eo imason''ny olona rehetra eo an-tampon''ny tendrombohitra Sinay. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hanisy fefy manodidina ho an''ny olona ianao ka hanao hoe: Mitandrema ianareo mba tsy hiakatra ao amin''ny tendrombohitra, na hikasika ny sisiny akory aza; fa na iza na iza mikasika ny tendrombohitra dia hatao maty tokoa; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'tsy hisy tanana hikasika azy, fa hotoraham-bato tokoa izy, na hotifirina tokoa, na biby na olona, tsy mba hovelomina izy; fa raha manao feo lavareny ny anjomara, dia vao hiakatra ho ao amin''ny tendrombohitra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nidina avy tao amin''ny tendrombohitra Mosesy ka nankeny amin''ny olona; dia nanamasina ny olona izy, ka samy nanasa ny fitafiany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy izy tamin''ny olona: Miomàna ianareo ho amin''ny andro fahatelo; aza manakaiky vehivavy akory.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nony tamin''ny marain''ny andro fahatelo dia nisy kotrokorana sy helatra ary rahona matevina teo amin''ny tendrombohitra, ary nisy feon''anjomara mafy indrindra, dia toran-kovitra ny olona rehetra izay teo an-toby. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Mosesy nitondra ny olona nivoaka avy teo an-toby mba hihaona amin''Andriamanitra; dia nijanona teo am-bodin''ny tendrombohitra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny tendrombohitra Sinay nivoa-tsetroka avokoa, satria Jehovah nidina teo amboniny tao anaty afo; dia niakatra ny setroka tahaka ny setroky ny lafaoro lehibe, ary nihorohoro mafy ny tendrombohitra Sinay rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary rehefa notsofina ny anjomara ka nidradradradra, dia niteny Mosesy, ary Andriamanitra namaly feo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Jehovah nidina nankeo an-tendrombohitra Sinay, dia teo an-tampon''ny tendrombohitra; ary Jehovah niantso an''i Mosesy hankeo an-tampon''ny tendrombohitra; dia niakatra Mosesy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy Jehovah tamin''i Mosesy: Midìna, ka pepero ny olona, fandrao hisisika hankao amin''i Jehovah izy mba hijery ka hahafatesana maro. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary aoka ny mpisorona koa, izay manakaiky an''i Jehovah, hanamasina ny tenany, fandrao himaona hamely azy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary hoy Mosesy tamin''i Jehovah: Tsy mahazo miakatra ho eto amin''ny tendrombohitra Sinay ny olona; fa Hianao nandidy anay ka nanao hoe: Fefeo ny tendrombohitra, ka hamasino izy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary hoy Jehovah taminy: Mandehana midina, nefa miakara ianao, ka ento hiaraka aminao Arona; fa ny mpisorona sy ny olona dia aza avela hisisika hiakatra ho ao amin''i Jehovah, fandrao haringana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary Mosesy dia nidina nankeny amin'ny olona ka niteny taminy.
