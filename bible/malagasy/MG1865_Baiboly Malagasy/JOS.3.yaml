document_id: JOS.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nitan'ny Zanak'Isiraely an'i Jordana, sy ny tsangam-bato nataony tao Gilgala, ary ny tahotry ny Amorita sy ny Kananita tamin'izany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nifoha maraina koa Josoa; ary ny olona dia niala tany Sitima ka nankany Jordana, dia Josoa sy ny Zanak''Isiraely rehetra, ary nitoetra teo izy aloha vao nita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary rehefa afaka hateloana, dia nandeha namaky ny toby ny mpifehy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka nandidy ny olona hoe: Rehefa hitanareo ny fiaran''ny faneken''i Jehovah Andriamanitrareo ary ny Levita mpisorona mitondra azy, dia mialà amin''izay itoeranareo, ka manaraha azy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '(kanefa asio elanelany, tokony ho roa arivo hakiho, aminareo sy izy, fa aza manakaiky azy), mba ho fantatrareo ny lalana izay mety halehanareo; fa tsy mbola nalehanareo akory izao lalana izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy Josoa tamin''ny olona: Manamasina ny tenanareo: fa rahampitso dia hanao fahagagana eo aminareo Jehovah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary niteny tamin''ny mpisorona Josoa ka nanao hoe: Ento ny fiaran''ny fanekena, ka mità eo anoloan''ny olona. Dia nitondra ny fiaran''ny fanekena izy ka nandeha teo anoloan''ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy Jehovah tamin''i Josoa: Anio no hanandratako anao eo imason''ny Isiraely rehetra, hahafantarany fa tahaka ny nombako an''i Mosesy no hombako anao koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary mandidia ny mpisorona izay mitondra ny fiaran''ny fanekena, ka ataovy hoe: Rehefa mihatra amin''ny moron''i Jordana ianareo, dia mijanòna eo Jordana ihany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Josoa nanao tamin''ny Zanak''Isiraely hoe: Mankanesa atỳ, ka mihainoa ny tenin''i Jehovah Andriamanitrareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy Josoa: Izao no hahafantaranareo fa eo aminareo Andriamanitra velona, ka horoahiny eo alohanareo tokoa ny Kananita sy ny Hetita sy ny Hivita sy ny Perizita sy ny Girgasita sy ny Amorita ary ny Jebosita: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Indro, ny fiaran''ny faneken''ny Tompon''ny tany rehetra no mandroso eo alohanareo ho eo Jordana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'koa ankehitriny mangalà lehilahy roa ambin''ny folo amin''ny firenen''Isiraely ho anareo, dia iray avy isam-pirenena; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ary raha vao mijanona eo amin'ny rano Jordana ny faladian'ny mpisorona izay mitondra ny fiaran'ny faneken'i Jehovah, Tompon'ny tany rehetra, dia ho tapaka ny rano Jordana, dia ny rano izay midina avy any ambony, ka hijanona ho toy ny antontan-javatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary raha niala tamin''ny lainy hita an''i Jordana ny olona, ary ny mpisorona nitondra ny fiaran''ny fanekena eo alohan''ny olona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ka tonga teo Jordana izay nitondra ny fiara, ary naroboky ny mpisorona izay nitondra ny fiara tamin''ny sisin-drano ny tongony (fa tondraka mihoatra ny morony rehetra Jordana mandritra ny fararano), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: dia nijanona ny rano izay nidina avy tany ambony ka tonga toy ny antontan-javatra terỳ lavitra erỳ, dia terỳ amin'ny tanàna Adama, izay eo anilan'i Zaretana; eny, tapaka tokoa ny rano izay nidina ho any amin'ny ranomasin'ny tani-hay
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Arabà
    marker-yv: yv-n
  - type: text
    text: ', dia ny Ranomasin-tsira; ary ny olona dia nita tandrifin''i Jeriko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary ny mpisorona izay nitondra ny fiaran'ny faneken'i Jehovah dia nijoro tsara tamin'ny tany maina teo afovoan'i Jordana, ary ny Isiraely rehetra nandeha tamin'ny tany maina mandra-pahatafitan'izy rehetra an'i Jordana.
