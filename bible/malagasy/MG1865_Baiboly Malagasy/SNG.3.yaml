document_id: SNG.3,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'ny nampakarana an-dravehivavy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Teo am-pandriako nony alina dia mazàna nitady ilay tian''ny fanahiko aho; Nitady azy aho, fa tsy nahita azy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Volafotsy no nataony andriny, ary volamena ny fiankinana, volomparasy ny ondany, ny ao anatiny voaravaka amin''ny fanomezam-pitiavana avy tamin''ny zanakavavin''i Jerosalema. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mivoaha, ry zanakavavin'i Ziona, ka mijere an'i Solomona mpanjaka, misatroka ilay satro-boninahitra nasatro-dreniny azy tamin'ny andro nampakarany vady, dia tamin'ny andro nifalian'ny fony.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia hoy izaho: Hifoha aho ka handehandeha eo an-tanàna, dia eny an-dalambe sy eny an-kalalahana, hitady ilay tian''ny fanahiko eny, nitady azy aho, nefa tsy nahita azy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Hitan''ny antily izay mandehandeha eny an-tanàna aho; Dia hoy izaho: Sao mba hitanareo lahy ilay tian''ny fanahiko iny? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Nony vao nandalo ireo vetivety foana aho, dia hitako ilay tian''ny fanahiko, ka nohazoniko izy, fa tsy navelako handeha, mandra-pitondrako azy ho any an-tranon''ineny, dia any amin''ny efi-tranon''ilay niteraka ahy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mampianiana anareo amin'ny gazela
    - type: usfm
      marker: x
      children:
      - type: text
        text: Anaram-biby haingan-tongotra
      marker-yv: yv-n
    - type: text
      text: ' na amin''ny dieravavy'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Anaram-biby haingan-tongotra
      marker-yv: yv-n
    - type: text
      text: ' any an-tsaha aho, ry zanakavavin''i Jerosalema; Aza manaitra na mamoha ny fitiavana, raha tsy efa sitrapony.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Iza moa iry vehivavy miakatra avy any an-efitra, tahaka ny setroka mitankosina, sady tsara fofona amin''ny miora sy ny ditin-kazo mani-pofona mbamin''ny vovoka manitra samy hafa entin''ny mpandranto? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Indro ny filanjan
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. farafara
      marker-yv: yv-n
    - type: text
      text: '''i Solomona! Lehilahy enim-polo, mahery avokoa, avy amin''ny lehilahy mahery amin''ny Isiraely, no manotrona azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'An-tsabatra avokoa izy rehetra sady mahay miady, samy mitondra ny sabany eo am-balahany avy noho ny tahotra amin''ny alina. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nanao filanjana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. farafara
      marker-yv: yv-n
    - type: text
      text: ' ho azy Solomona mpanjaka tamin''ny hazo avy any Libanona: '
