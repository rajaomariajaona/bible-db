document_id: 1CH.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny fianakavian'i Saoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nisaina araka ny firazanany avy ny Isiraely rehetra; ary, indro, efa voasoratra ao amin''ny bokin''ny mpanjakan''ny Isiraely izany. Ary ny Joda dia nentina ho babo tany Babylona noho ny fahotany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ny mponina taloha tamin''ny taniny sy ny tanànany avy dia ny Isiraely sy ny mpisorona sy ny Levita ary ny Netinima. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary tany Jerosalema no nonenan''ny sasany amin''ny taranak''i Joda sy Benjamina sy Efraima sy Manase: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia Otahy, zanak''i Amihoda, zanak''i Omry, zanak''Imry, zanak''i Bany, avy amin''ny taranak''i Fareza, zanak''i Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary tamin''ny Silonita dia Asay, lahimatoa, sy ny zanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary tamin''ny taranak''i Zera dia Jeoela sy ny rahalahiny, dia sivi-folo amby enin-jato. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary tamin''ny taranak''i Benjamina dia Salo, zanak''i Mesolama, zanak''i Hodavia, zanak''i Hasenoa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'sy Jibnia, zanak''i Jerohama, sy Elaha, zanak''i Ozy, zanak''i Mikry, sy Mesolama, zanak''i Sefatia, zanak''i Regoela, zanak''i Jibnia; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ary ny isan'ny rahalahiny araka ny firazanany dia enina amby dimam-polo sy sivin-jato. Ireo lehilahy rehetra ireo dia samy lohan'ny fianakaviany avy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary tamin''ny mpisorona dia Jedaia sy Joiariba sy Jatina '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'sy Azaria, zanak''i Hilkia, zanak''i Mesolama, zanak''i Zadoka, zanak''i Meraiota, zanak''i Ahitoba, mpanapaka ny tranon''Andriamanitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ary Adaia, zanak''i Jerohama, zanak''i Pasora, zanak''i Malkia, ary Masay, zanak''i Adiela, zanak''i Jazera, zanak''i Mesolama, zanak''i Mesilemita, zanak''Imera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary ny rahalahin'ireo, izay samy lohan'ny fianakaviany avy, dia enim-polo amby fiton-jato amby arivo; lehilahy mahery amin'ny fanaovana ny fanompoana ao an-tranon'Andriamanitra ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary tamin''ny Levita dia Semaia, zanak''i Hasoba, zanak''i Azrikama, zanak''i Hasabia, tamin''ny taranak''i Merary, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ary Bakbakara sy Haresy sy Galala sy Matania, zanak''i Mika, zanak''i Zikry, zanak''i Asafa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ary Obadia, zanak'i Semaia, zanak'i Galala, zanak'i Jedotona, ary Berekia, zanak'i Asa, zanak'i Elkana, izay nonina tamin'ny vohitry ny Netotatita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny mpiandry varavarana dia Saloma sy Akoba sy Talmona sy Ahimana ary ny rahalahiny; fa Saloma no lohany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ambaraka ankehitriny dia ao amin''ny vavahadin''ny mpanjaka atsinanana izy; ireo no mpiandry varavarana tamin''ny tobin''ny taranak''i Levy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary Saloma, zanak''i Kore, zanak''i Abiasafa, zanak''i Kora, sy ny Koraita rahalahiny araka ny fianakaviany avy no mpanao ny fanompoana amin''ny fiandrasana ny varavaran''ny lay; ary ny razany koa dia mpiambina ny vavahady tao amin''ny tobin''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Finehasa, zanak''i Eleazara, no mpanapaka ireo taloha, ary Jehovah nomba azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary Zakaria, zanak''i Meselemia, no mpiandry ny varavaran''ny trano-lay fihaonana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny isan''ireo voafidy ho mpiandry varavarana ireo dia roa ambin''ny folo amby roan-jato. Ireo dia voasoratra araka ny firazanany tany amin''ny vohiny avy; ary notendren''i Davida sy Samoela mpahita izy noho ny fahamarinany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ka dia ireo sy ny taranany no niandry varavarana tao amin'ny tranon'i Jehovah, dia ny trano-lay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Teo amin''ny lafiny efatra no nitoeran''ny mpiandry varavarana, dia teo atsinanana sy andrefana sy avaratra ary atsimo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ny rahalahiny izay nonina teo amin''ny vohiny dia nasaina ho avy isan-kafitoana ho eo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa nanao tamin''ny fahamarinany ireo Levita efa-dahy, lohan''ny mpiandry varavarana, ireo, ary tonian''ny efi-trano fitehirizana sy ny rakitry ny tranon''Andriamanitra koa izy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary manodidina ny tranon''Andriamanitra no nandriany; fa izy ireo no mpiambina azy sady adidiny ny famohana ny trano isa-maraina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary ny sasany aminy nitandrina ny fanaka momba ny fanompoana; fa an-isany no nitondrany azy miditra sy mivoaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary ny sasany aminy koa notendrena hitandrina ny fanaka, dia ny fanaka masina rehetra, sy ny koba tsara toto sy ny divay sy ny diloilo sy ny ditin-kazo manitra ary ny zava-manitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary ny sasany tamin''ny zanaky ny mpisorona nangaroharo ny zava-manitra fanosorana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary Matatia, anankiray tamin''ny Levita, lahimatoan''i Saloma Koraita, no tonian''ny zavatra izay natao tamin''ny fanendasana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary ny sasany tamin''ny rahalahiny, tamin''ny taranaky ny Kehatita, no tonian''ny mofo aseho hamboatra azy isan-tSabata. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary ireo ihany koa no mpihira, lohan''ny fianakaviana amin''ny Levita, izay mitoetra tsy manan-draharaha hafa ao amin''ireo efi-trano; fa tsy maintsy ho amin''izany raharaha izany andro aman''alina izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ireo dia lohan'ny fianakaviana tamin'ny Levita araka ny firazanany avy, dia samy loholona. Ireo no nonina tany Jerosalema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary tao Gibeona no nonenan''i Jeiela, razamben''ny an''i Gibeona, ary ny anaran''ny vadiny dia Imaka; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'ary ny zanany lahimatoa dia Abdona, dia Zora, dia Kisy, dia Bala, dia Nera, dia Nadaba, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'dia Gedora, dia Ahio, dia Zakaria, dia Miklota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary Miklota niteraka an''i Simeama. Ary ireo koa niara-nonina tamin''ny rahalahiny tany Jerosalema nifanandrify fonenana taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary Nera niteraka an''i Kisy; ary Kisy niteraka an''i Saoly; ary Saoly niteraka an''i Jonatana sy Malkisoa sy Abinadaba ary Esbala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary ny zanakalahin''i Jonatana dia Meribala, ary Meribala niteraka an''i Mika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ary ny zanakalahin'i Mika dia Pitona sy Maleka sy Tarea ary Ahaza
  - type: usfm
    marker: x
    children:
    - type: text
      text: Izahao viii. 35
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary Ahaza niteraka an''i Jara; ary Jara niteraka an''i Alemeta sy Azmaveta ary Zimry; ary Zimry niteraka an''i Moza; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'ary Moza niteraka an''i Binea; ary Refaia no zanakalahin''i Binea, Elasa no zanakalahin''i Refaia, Azela no zanakalahin''i Elasa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary Azela nanana zanaka enina mirahalahy ka izao no anarany avy: Azrikama sy Bokero sy Isimaela sy Searia sy Obadia ary Hanana; ireo no zanakalahin''i Azela.'
