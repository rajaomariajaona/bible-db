document_id: SNG.4,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Endrey, tsara tarehy ianao, ry tompokovavy havako! Endrey, tsara tarehy ianao! Ny masonao dia voromailala eo amin'ny fisalobonanao
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: volonao milantolanto'
      marker-yv: yv-n
    - type: text
      text: '; Ny volonao dia tahaka ny osy andiany, izay mandriandry eny an-kilan''ny tendrombohitr''i Gileada. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Akory ny hatsaran'ny fitiavanao, ry havako
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ampakariko
      marker-yv: yv-n
    - type: text
      text: ' ampakariko! Akory ny hatsaran''ny fitiavanao! eny, tsara noho ny divay! Ary ny fofon''ny menaka manitrao dia mihoatra noho ny zava-manitra rehetra! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Mitete tantely toy ny avy amin''ny tohotra ny molotrao, ry ampakariko; Tantely sy ronono no ao ambanin''ny lelanao, ary ny fofon''ny fitafianao dia tahaka ny fofon''i Libanona. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Saha voahidy ny havako
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. anabaviko
      marker-yv: yv-n
    - type: text
      text: ' ampakariko, loharano voahidy, fantsakan-drano voaisy tombo-kase. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Hianao no saha anirian''ny ampongaben-danitra tsara voa, sady misy kofera sy narda, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Eny, narda sy safrona, veromanitra sy havozomanitra sy ny hazo misy ny ditin-kazo mani-pofona rehetra. Miora sy hazo manitra
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ahalota
      marker-yv: yv-n
    - type: text
      text: ' Mbamin''ny zava-manitra tsara rehetra; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Loharano ao an-tanimboly ianao, loharano miboiboika, ary renirano kely avy any Libanona.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Mifohaza, ry rivotra avy any avaratra; avia, ry avy any atsimo, Mitsofa eny an-tsahako hielezan'ny fofony manitra. Aoka ny malalako hankatỳ an-tanimboliny ka hihinana ny voankazony tsara.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ny nifinao dia tahaka ny ondrivavy andiany efa voahety, izay miakatra avy eo amin''ny fampandroana; Samy kambana avy ireo, fa tsy misy tsy mana-namana. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tahaka ny kofehy jaky ny molotrao, ary mahafinaritra ny vavanao
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. fitenenanao
      marker-yv: yv-n
    - type: text
      text: ; Tahaka ny hasin'ampongaben-danitra ny takolakao eo amin'ny fisalobonanao
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: volonao milantolanto'
      marker-yv: yv-n
    - type: text
      text: ', '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ny vozonao dia tahaka ny tilikambon''i Davida, natao ho trano fihantonam-piadiana; Ampinga arivo no voahantona eo, dia ny ampinga rehetra an''ny lehilahy mahery. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ny nononao roa dia toy ny diera kambana mbola tanora, izay homana eny amin''ny lilia. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mandra-pangatsiatsiaky ny andro, ka efa hilentika ny masoandro
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. mandositra ny aloka
      marker-yv: yv-n
    - type: text
      text: ', dia handeha aho ho any amin''ny tendrombohitry ny miora sy ny havoan''ny ditin-kazo mani-pofona.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Tsara avokoa izato bikanao izato, ry tompokovavy havako; Tsy misy kilema ianao. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Hiaraka amiko avy any Libanona ianao, ry ampakariko, eny, hiaraka amiko avy any Libanona, hitazana eny an-tampon''i Amana, eny an-tampon''i Senira sy Hermona, eny an-davaky ny liona, eny an-tendrombohitry ny leoparda. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Efa lasanao ny foko, ry havako
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ampakariko
      marker-yv: yv-n
    - type: text
      text: ' ampakariko, efa lasanao ny foko tamin''ny masonao an-ila sy tamin''ny rojo anankiray amin''ny vozonao. '
