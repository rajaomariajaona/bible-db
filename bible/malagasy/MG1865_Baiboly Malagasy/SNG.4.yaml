document_id: SNG.4,96
type_code: plt
verses:
  '1':
  - type: text
    content: Endrey, tsara tarehy ianao, ry tompokovavy havako! Endrey, tsara tarehy ianao! Ny masonao dia voromailala eo amin'ny fisalobonanao
  - type: note
    content: 'Na: volonao milantolanto'
  - type: text
    content: '; Ny volonao dia tahaka ny osy andiany, izay mandriandry eny an-kilan''ny tendrombohitr''i Gileada. '
  '10':
  - type: text
    content: Akory ny hatsaran'ny fitiavanao, ry havako
  - type: note
    content: Heb. ampakariko
  - type: text
    content: ' ampakariko! Akory ny hatsaran''ny fitiavanao! eny, tsara noho ny divay! Ary ny fofon''ny menaka manitrao dia mihoatra noho ny zava-manitra rehetra! '
  '11':
  - type: text
    content: 'Mitete tantely toy ny avy amin''ny tohotra ny molotrao, ry ampakariko; Tantely sy ronono no ao ambanin''ny lelanao, ary ny fofon''ny fitafianao dia tahaka ny fofon''i Libanona. '
  '12':
  - type: text
    content: Saha voahidy ny havako
  - type: note
    content: Heb. anabaviko
  - type: text
    content: ' ampakariko, loharano voahidy, fantsakan-drano voaisy tombo-kase. '
  '13':
  - type: text
    content: 'Hianao no saha anirian''ny ampongaben-danitra tsara voa, sady misy kofera sy narda, '
  '14':
  - type: text
    content: Eny, narda sy safrona, veromanitra sy havozomanitra sy ny hazo misy ny ditin-kazo mani-pofona rehetra. Miora sy hazo manitra
  - type: note
    content: Heb. ahalota
  - type: text
    content: ' Mbamin''ny zava-manitra tsara rehetra; '
  '15':
  - type: text
    content: Loharano ao an-tanimboly ianao, loharano miboiboika, ary renirano kely avy any Libanona.
  '16':
  - type: text
    content: Mifohaza, ry rivotra avy any avaratra; avia, ry avy any atsimo, Mitsofa eny an-tsahako hielezan'ny fofony manitra. Aoka ny malalako hankatỳ an-tanimboliny ka hihinana ny voankazony tsara.
  '2':
  - type: text
    content: 'Ny nifinao dia tahaka ny ondrivavy andiany efa voahety, izay miakatra avy eo amin''ny fampandroana; Samy kambana avy ireo, fa tsy misy tsy mana-namana. '
  '3':
  - type: text
    content: Tahaka ny kofehy jaky ny molotrao, ary mahafinaritra ny vavanao
  - type: note
    content: Heb. fitenenanao
  - type: text
    content: ; Tahaka ny hasin'ampongaben-danitra ny takolakao eo amin'ny fisalobonanao
  - type: note
    content: 'Na: volonao milantolanto'
  - type: text
    content: ', '
  '4':
  - type: text
    content: 'Ny vozonao dia tahaka ny tilikambon''i Davida, natao ho trano fihantonam-piadiana; Ampinga arivo no voahantona eo, dia ny ampinga rehetra an''ny lehilahy mahery. '
  '5':
  - type: text
    content: 'Ny nononao roa dia toy ny diera kambana mbola tanora, izay homana eny amin''ny lilia. '
  '6':
  - type: text
    content: Mandra-pangatsiatsiaky ny andro, ka efa hilentika ny masoandro
  - type: note
    content: Heb. mandositra ny aloka
  - type: text
    content: ', dia handeha aho ho any amin''ny tendrombohitry ny miora sy ny havoan''ny ditin-kazo mani-pofona.'
  '7':
  - type: text
    content: 'Tsara avokoa izato bikanao izato, ry tompokovavy havako; Tsy misy kilema ianao. '
  '8':
  - type: text
    content: 'Hiaraka amiko avy any Libanona ianao, ry ampakariko, eny, hiaraka amiko avy any Libanona, hitazana eny an-tampon''i Amana, eny an-tampon''i Senira sy Hermona, eny an-davaky ny liona, eny an-tendrombohitry ny leoparda. '
  '9':
  - type: text
    content: Efa lasanao ny foko, ry havako
  - type: note
    content: Heb. ampakariko
  - type: text
    content: ' ampakariko, efa lasanao ny foko tamin''ny masonao an-ila sy tamin''ny rojo anankiray amin''ny vozonao. '
