document_id: 1CO.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny hena izay efa natao fanatitra tamin'ny sampy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny amin''ny hena aterina amin''ny sampy, dia fantatsika fa manana fahalalana isika rehetra. Ny fahalalana mampieboebo; fa ny fitiavana no mampandroso. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa raha misy manao azy hahalala, dia tsy mbola mahalala araka izay tokony ho fantany akory izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa raha misy tia an''Andriamanitra, dia izy no fantany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny amin''ny mihinana ny hena aterina amin''ny sampy, dia fantatsika fa tsinontsinona akory ny sampy amin''izao tontolo izao, ary tsy misy Andriamanitra afa-tsy Iray ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa na dia misy aza atao hoe andriamanitra, na any an-danitra, na etỳ an-tany (toy ny misy andriamanitra maro sy tompo maro); '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'nefa amintsika kosa dia Andriamanitra iray ihany, dia ny Ray, Izay nihavian''ny zavatra rehetra, ary ho Azy isika; ary iray ihany ny Tompo, dia Jesosy Kristy, Izay nahariana ny zavatra rehetra sady nahariana antsika koa. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Kanefa tsy ary manana izany fahalalana izany avokoa ny olona rehetra; fa ny sasany, satria zatra amin''ny sampy mandraka ankehitriny izao, dia homana ny hena ka mahatsiaro azy ho zavatra naterina tamin''ny sampy; ka dia voaloto ny fieritreretany, satria malemy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa ny hanina tsy hampaninona antsika amin''Andriamanitra; fa na dia tsy homana aza isika, dia tsy matiantoka, ary na dia homana kosa aza isika, dia tsy mahazo tombony. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nefa tandremo, fandrao izany fahafahanareo izany ho tonga fahatafintohinana ho an''ny malemy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa raha misy mahita anao izay manam-pahalalana mipetraka mihinana ao amin''ny tempolin''ny sampy, tsy hampahasahy ny fieritreretan''ny malemy hihinana izay hena aterina amin''ny sampy koa va izany? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa verin''ny fahalalanao ny malemy, dia ny rahalahy izay navotan''i Kristy tamin''ny fahafatesana? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa raha manota toy izany amin''ny rahalahy ianareo ka manimba ny fieritreretan''ny malemy, dia manota amin''i Kristy ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Koa raha ny hanina no mahatafintohina ny rahalahiko, dia tsy hihinan-kena akory aho mandrakizay, fandrao mahatafintohina ny rahalahiko.
