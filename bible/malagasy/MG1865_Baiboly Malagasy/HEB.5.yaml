document_id: HEB.5,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Anatra sy famporisihana hampandroso tsara ny olona
  - type: text
    content: 'Fa ny mpisoronabe rehetra dia alaina amin''ny olona ka tendrena ho solon''ny olona hanao ny raharahan''Andriamanitra, hanatitra fanomezana sy fanatitra hanafaka ota, '
  '10':
  - type: text
    content: fa notononin'Andriamanitra hoe Mpisoronabe "araka ny fanaon'i Melkizedeka."
  '11':
  - type: text
    content: 'Ny amin''izany dia manana teny maro izahay sady sarotra ambara, satria lalodalovana ny sofinareo. '
  '12':
  - type: text
    content: 'Fa na dia tokony ho efa mpampianatra aza ianareo noho ny fahelan''ny andro, dia mbola mila izay hampianatra anareo ny abidim-pianaran''ny tenin''Andriamanitra indray; ary efa toy izay tokony homen-dronono ianareo, fa tsy ventin-kanina. '
  '13':
  - type: text
    content: 'Fa izay rehetra mivelona amin''ny ronono dia tsy zatra amin''ny tenin''ny fahamarinana, satria mbola zaza-bodo. '
  '14':
  - type: text
    content: Fa ho an'izay efa lehibe
  - type: note
    content: 'Na: tanteraka'
  - type: text
    content: ' ny ventin-kanina, dia ho an''izay manana ny saina efa zatra nampiasaina tsara ka mahay manavaka ny tsara sy ny ratsy.'
  '2':
  - type: text
    content: 'dia olona izay mahay mitondra mora ny tsy mahalala sy ny mania, satria ny tenany koa dia mba hodidinin''ny fahalemena ihany; '
  '3':
  - type: text
    content: 'ary noho izany dia tsy maintsy hanao fanatitra hanafaka ota ho an''ny tenany koa izy, toy ny ataony ho an''ny olona ihany. '
  '4':
  - type: text
    content: 'Ary tsy misy maka izany voninahitra izany ho an''ny tenany afa-tsy izay antsoin''Andriamanitra, tahaka an''i Arona. '
  '5':
  - type: text
    content: 'Dia toy izany koa Kristy: tsy Izy no nanandratra ny tenany ho Mpisoronabe, fa Ilay nanao taminy hoe: "Zanako Hianao, Izaho niteraka Anao androany" (Sal.2.7); '
  '6':
  - type: text
    content: 'ary toy ny lazainy eo amin''ny teny hafa koa hoe: "Hianao no Mpisorona mandrakizay Araka ny fanaon''i Melkizedeka" (Sal.110.4). '
  '7':
  - type: text
    content: Tamin'ny andron'ny nofony, raha nanao
  - type: note
    content: Gr. nanatitra
  - type: text
    content: ' fivavahana sy fangatahana nomban''ny fitarainana mafy sy ny ranomaso be tamin''izay nahavonjy Azy tamin''ny fahafatesana Izy, sady voahaino noho ny fahatahorany an''Andriamanitra'
  - type: note
    content: 'Na: voahaino ka afaka tamin''ny fahatahorany'
  - type: text
    content: ', '
  '8':
  - type: text
    content: 'dia nianatra fanarahana tamin''izay fahoriana nentiny Izy, na dia Zanaka aza; '
  '9':
  - type: text
    content: 'ary rehefa natao tanteraka Izy, dia tonga loharanon''ny famonjena mandrakizay ho an''izay rehetra manaraka Azy, '
