document_id: HEB.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Anatra sy famporisihana hampandroso tsara ny olona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa ny mpisoronabe rehetra dia alaina amin''ny olona ka tendrena ho solon''ny olona hanao ny raharahan''Andriamanitra, hanatitra fanomezana sy fanatitra hanafaka ota, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia olona izay mahay mitondra mora ny tsy mahalala sy ny mania, satria ny tenany koa dia mba hodidinin''ny fahalemena ihany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary noho izany dia tsy maintsy hanao fanatitra hanafaka ota ho an''ny tenany koa izy, toy ny ataony ho an''ny olona ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary tsy misy maka izany voninahitra izany ho an''ny tenany afa-tsy izay antsoin''Andriamanitra, tahaka an''i Arona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia toy izany koa Kristy: tsy Izy no nanandratra ny tenany ho Mpisoronabe, fa Ilay nanao taminy hoe: "Zanako Hianao, Izaho niteraka Anao androany" (Sal.2.7); '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary toy ny lazainy eo amin''ny teny hafa koa hoe: "Hianao no Mpisorona mandrakizay Araka ny fanaon''i Melkizedeka" (Sal.110.4). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tamin'ny andron'ny nofony, raha nanao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. nanatitra
    marker-yv: yv-n
  - type: text
    text: ' fivavahana sy fangatahana nomban''ny fitarainana mafy sy ny ranomaso be tamin''izay nahavonjy Azy tamin''ny fahafatesana Izy, sady voahaino noho ny fahatahorany an''Andriamanitra'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: voahaino ka afaka tamin''ny fahatahorany'
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'dia nianatra fanarahana tamin''izay fahoriana nentiny Izy, na dia Zanaka aza; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ary rehefa natao tanteraka Izy, dia tonga loharanon''ny famonjena mandrakizay ho an''izay rehetra manaraka Azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: fa notononin'Andriamanitra hoe Mpisoronabe "araka ny fanaon'i Melkizedeka."
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny amin''izany dia manana teny maro izahay sady sarotra ambara, satria lalodalovana ny sofinareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa na dia tokony ho efa mpampianatra aza ianareo noho ny fahelan''ny andro, dia mbola mila izay hampianatra anareo ny abidim-pianaran''ny tenin''Andriamanitra indray; ary efa toy izay tokony homen-dronono ianareo, fa tsy ventin-kanina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa izay rehetra mivelona amin''ny ronono dia tsy zatra amin''ny tenin''ny fahamarinana, satria mbola zaza-bodo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa ho an'izay efa lehibe
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tanteraka'
    marker-yv: yv-n
  - type: text
    text: ' ny ventin-kanina, dia ho an''izay manana ny saina efa zatra nampiasaina tsara ka mahay manavaka ny tsara sy ny ratsy.'
