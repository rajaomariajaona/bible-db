document_id: TIT.3,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Mampahatsiarova azy hanaiky izay manapaka sy manam-pahefana, hanoa tsara, ho vonona ho amin''ny asa tsara rehetra, '
  '10':
  - type: text
    content: Izay mpanao hevi-diso
  - type: note
    content: 'Na: olona mitokana ho azy'
  - type: text
    content: ', rehefa nanarinao indray maka na indroa, dia ialao, '
  '11':
  - type: text
    content: 'satria fantatrao fa voavadika izay manao izany ka sady manota no manamelo-tena koa. '
  '12':
  - type: text
    content: 'Rehefa maniraka an''i Artema ny Tykiko ho atỳ aminao aho, dia mazotoa hankany amiko any Nikopolia ianao, fa mikasa handany ny ririnina any aho. '
  '13':
  - type: text
    content: 'Mazotoa hamoaka an''i Zena mpahay lalàna sy Apolosy, mba tsy hisy zavatra hilainy. '
  '14':
  - type: text
    content: 'Ary aoka ny antsika koa hianatra hanao asa tsara hahazoany izay ilainy, fandrao tsy hisy vokatra izy. '
  '15':
  - type: text
    content: Manao veloma anao izay rehetra atỳ amiko. Manaova veloma izay rehetra tia anay amin'ny finoana. Ho aminareo rehetra anie ny fahasoavana.
  '2':
  - type: text
    content: 'tsy hiteny ratsy olona, tsy ho mpila ady, fa ho mpandefitra, maneho ny halemem-panahy rehetra amin''ny olona rehetra. '
  '3':
  - type: text
    content: 'Fa isika koa dia adala fahiny, tsy nanaiky, voafitaka, dia andevon''ny filàna sy ny fahafinaretana maro, ary velona teo amin''ny lolompo sy ny fialonana, sady hala no nifankahala. '
  '4':
  - type: text
    content: 'Fa rehefa niseho ny fahamoram-panahin''Andriamanitra, Mpamonjy antsika, sy ny fitiavany ny olona, '
  '5':
  - type: text
    content: 'dia tsy avy tamin''ny asa amin''ny fahamarinana izay nataontsika, fa araka ny famindram-po kosa no namonjeny antsika, tamin''ny fanasan''ny fiterahana indray sy ny fanavaozan''ny Fanahy Masina, '
  '6':
  - type: text
    content: 'Izay naidiny betsaka tamintsika tamin''ny alalan''i Jesosy Kristy, Mpamonjy antsika, '
  '7':
  - type: text
    content: 'mba hohamarinina amin''ny fahasoavany isika ka ho tonga mpandova araka ny fanantenana ny fiainana mandrakizay. '
  '8':
  - type: text
    content: 'Mahatoky izany teny izany, ary izany zavatra izany dia tiako hitompoanao mafy, mba hotandreman''izay efa mino an''Andriamanitra ny hanao asa tsara. Sady tsara no mahasoa ny olona izany zavatra izany. '
  '9':
  - type: text
    content: 'Fa halaviro ny fanontaniana adala sy ny tantaram-pirazanana sy ny fifandirana sy ny ady teny ny amin''ny lalàna; fa tsy mahasoa sady zava-poana izany. '
