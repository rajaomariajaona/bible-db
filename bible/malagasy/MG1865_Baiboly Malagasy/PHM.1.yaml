document_id: PHM.1,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiarahabana an'i Filemona, sy fifonana ho an'i Onesimosy, ary fanaovam-beloma
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Paoly, mpifatotra an''i Kristy Jesosy, ary Timoty rahalahy, mamangy an''i Filemona, izay malalanay sy mpiara-miasa aminay, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Eny, miangavy aminao aho ny amin'ny zanako, izay naterako teto amin'ny fifatorako, dia Onesimosy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Onesimosy = Mahasoa
      marker-yv: yv-n
    - type: text
      text: ', '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'ilay tsy nahasoa anao fahiny, nefa ankehitriny mahasoa antsika, dia ianao sy izaho; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'izay nampodiko indray, dia ilay sombin''ny aiko; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'saiky nohazoniko tatỳ amiko izy hanompo ahy hisolo anao eto amin''ny fifatorako noho ny filazantsara; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'nefa raha tsy nahalala izay hevitrao aho aloha, dia tsy ta-hanao na inona na inona, mba tsy ho toy ny amin''ny fanerena ny soa ataonao, fa amin''ny sitrapo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa izany angaha no nialany vetivety, dia ny mba hanananao azy mandrakizay, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'tsy toy ny andevo intsony anefa, fa efa mihoatra noho ny andevo, dia rahalahy malala, indrindra fa ho ahy, mainka fa ho anao, na amin''ny nofo, na amin''ny Tompo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Koa raha ataonao ho namanao aho, dia raiso toa ahy izy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Nefa raha nanao izay tsy marina taminao izy, na mitrosa, dia ataovy ho ahy izany; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'izaho Paoly no manoratra izany amin''ny tanako, izaho no handoa izany - nefa tsy lazaiko aminao fa mitrosa ny tenanao amiko aza ianao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'ary mamangy an''i Apia anabavinay sy Arkipo, miaramila namantsika, ary ny fiangonana ao an-tranonao: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Eny, ry rahalahy, aoka hanana fifaliana avy aminao ao amin''ny Tompo aho; velombelomy ny foko ao amin''i Kristy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Noho ny fahatokiako fa hanaiky ianao no anoratako aminao, ka fantatro fa hanao mihoatra noho izay lazaiko aza ianao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary izao koa: Mba anamboary trano hitoerako aho; fa manantena aho fa homena anareo noho ny vavaka ataonareo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Manao veloma anao Epafra, mpifatotra namako ao amin''i Kristy Jesosy, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'sy Marka sy Aristarko sy Demasy ary Lioka, mpiara-miasa amiko. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ho amin'ny fanahinareo anie ny fahasoavan'i Jesosy Kristy Tompontsika. Amena.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ho aminareo anie ny fahasoavana sy ny fiadanana avy amin''Andriamanitra Raintsika sy Jesosy Kristy Tompo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Misaotra an''Andriamanitro mandrakariva aho, raha mahatsiaro anao amin''ny fivavahako, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: satria reko ny fitiavanao sy ny finoana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ny finoanao'
      marker-yv: yv-n
    - type: text
      text: ' izay anananao ho an''i Jesosy Tompo sy ho an''ny olona masina rehetra, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'mba hiasa mafy ho an''i Kristy ny fiombonana avy amin''ny finoanao amin''ny fahalalana tsara ny zavatra rehetra izay ao anatinareo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa nanana fifaliana sy fiononana amin''ny fitiavanao aho, satria efa novelombelominao ny fon''ny olona masina, ry rahalahy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Koa na dia manana fahasahiana be ao amin''i Kristy handidy anao amin''izay mendrika aza aho, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: nefa noho ny fitiavana, izaho Paoly, izay efa anti-panahy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ambasadôra'
      marker-yv: yv-n
    - type: text
      text: ' sady mpifatotra an''i Kristy Jesosy koa ankehitriny, dia miangavy aminao. '
