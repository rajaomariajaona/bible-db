document_id: JHN.11,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary nisy lehilahy anankiray narary, dia Lazarosy avy any Betania, tanànan''i Maria sy Marta rahavaviny. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa raha misy kosa mandeha amin''ny alina, dia ho tafintohina izay, ka tsy misy mazava ao aminy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Izany no nolazainy; ary rehefa afaka izany, dia hoy Izy taminy: Matory Lazarosy sakaizantsika; fa handeha hamoha azy Aho. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia hoy ny mpianatra taminy: Tompoko, raha matory izy, dia ho tsara ihany'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. hovonjena
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nefa Jesosy nilaza ny fahafatesany; fa nataon''izy ireo kosa fa fialan-tsasatra amin''ny torimaso no nolazainy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary tamin''izany Jesosy dia nilaza tsotra taminy hoe: Maty Lazarosy; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ary faly Aho noho ny aminareo, satria tsy teo Aho, mba hinoanareo; fa andeha isika hankany aminy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia hoy Tomasy (izay atao hoe Didymo) tamin''ny mpianatra namany: Andeha isika mba hiara-maty aminy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary nony tonga Jesosy, dia hitany fa efa nilevina hefarana izy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ary Betania dia tao akaikin'i Jerosalema, tokony ho dimy ambin'ny folo stadio
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: telo kilometatra'
      marker-yv: yv-n
    - type: text
      text: ' no elanelany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary maro tamin''ny Jiosy no efa tonga teo amin''i Marta sy Maria hitsapa alahelo azy noho ny amin''ny anadahiny. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Maria dia ilay nanosotra ny Tompo tamin''ny menaka manitra sy namaoka ny tongony tamin''ny volon-dohany, ary Lazarosy anadahiny no narary. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary Marta, raha nandre fa tamy Jesosy, dia nandeha nitsena Azy; fa Maria kosa nitoetra tao an-trano. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary hoy Marta tamin''i Jesosy: Tompoko, raha teto Hianao, dia tsy maty ny anadahiko. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Nefa fantatro fa na dia ankehitriny izao aza na inona na inona no hangatahinao amin''Andriamanitra dia homen''Andriamanitra Anao. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Hoy Jesosy taminy: Hitsangana ny anadahinao. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Fa hoy Marta taminy: Fantatro ihany fa hitsangana izy amin''ny fitsanganan''ny maty amin''ny andro farany; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Hoy Jesosy taminy: Izaho no fananganana ny maty sy fiainana; izay mino Ahy, na dia maty aza, dia ho velona indray. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary izay rehetra velona ka mino Ahy dia tsy ho faty mandrakizay. Mino izany va ianao? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Hoy izy taminy: Eny, Tompoko; mino aho fa Hianao no Kristy, Zanak''Andriamanitra, Ilay ho tonga amin''izao tontolo izao. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary rehefa nilaza izany izy, dia lasa nandeha ka niantso mangingina an''i Maria rahavaviny, nanao hoe: Tonga ny Mpampianatra ka miantso anao. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary raha vao nandre izany Maria, dia nitsangana faingana izy ka nankeo aminy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary izy mirahavavy dia naniraka tany amin''i Jesosy hanao hoe: Tompoko, marary ilay tianao. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Fa Jesosy tsy mbola tonga tao an-tanàna, fa mbola teo amin''ilay nitsenan''i Marta Azy ihany. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary ny Jiosy izay tao amin''i Maria tao an-trano ka nitsapa alahelo azy, raha nahita azy nitsangana faingana ka nivoaka, dia nanaraka azy, satria nataony fa nankany amin''ny fasana hitomany any izy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary Maria, rehefa tonga teo amin''nitoeran''i Jesosy ka nahita Azy, dia niankohoka teo amin''ny tongony ka nanao taminy hoe: Tompoko, raha teto Hianao, dia tsy maty ny anadahiko. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary Jesosy nony nahita azy nitomany sy ny Jiosy izay niaraka taminy nitomany koa, dia vonto ny fanahiny, ka tora-kovitra Izy; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'ary hoy Izy: Aiza moa no nandevenanareo azy? Dia hoy ireo taminy: Tompoko, andeha hizaha. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Jesosy nitomany. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Dia hoy ny Jiosy: Akory ity haben''ny fitiavany azy! '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Fa hoy ny sasany: Moa tsy hain''ilehity, Izay nampahiratra ny mason''ilay jamba va, ny manao izay tsy ho nahafaty an-dralehilahy ity? '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Dia vonto indray ny fanahin''i Jesosy ka nankeo amin''ny fasana Izy; ary zohy izany, sady nisy vato narindrina teo. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Hoy Jesosy: Esory ny vato. Hoy Marta, anabavin''ny maty, taminy: Tompoko, maimbo izy izao, fa efa hefarana izay. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary rehefa ren''i Jesosy izany, dia hoy Izy: Tsy ho fahafatesana no anton''izany aretina izany, fa ny hampisehoana ny voninahitr''Andriamanitra, mba hankalazana ny Zanak''Andriamanitra. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Hoy Jesosy taminy: Tsy voalazako va fa raha hino ianao, dia ho hitanao ny voninahitr''Andriamanitra? '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Dia nesoriny ny vato. Ary Jesosy dia nanandratra ny masony ka nanao hoe: Ray ô, misaotra Anao Aho, fa efa nihaino Ahy Hianao. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Raha Izaho, dia fantatro fa mihaino Ahy mandrakariva Hianao; fa noho ny vahoaka mitsangana manodidina no nilazako izany, mba hinoany fa Hianao no naniraka Ahy. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Ary rehefa nanao izany teny izany Izy, dia niantso tamin''ny feo mahery hoe: Ry Lazarosy, mivoaha! '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Dia nivoaka ny maty nisy fehim-paty ny tànany sy ny tongony, sady voafehy mosara koa ny tavany. Hoy Jesosy tamin''ny olona: Vahao izy, ka avelao handeha. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Ary maro tamin''ny Jiosy, dia ireo nankeo amin''i Maria ka nahita ny zavatra nataon''i Jesosy ireo, no nino Azy. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Fa ny sasany tamin''ireo kosa dia lasa nankany amin''ny Fariseo ka nilaza taminy izay nataony. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Ary ny lohan''ny mpisorona sy ny Fariseo nanangona ny Synedriona ka nanao hoe: Ahoana no hataontsika? fa iny Lehilahy iny dia manao famantarana maro. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Raha avelantsika hanao toy izany ihany Izy, dia hino Azy avokoa ny olona rehetra; ary ho avy ny Romana ka handrava ny fonenantsika sy ny firenentsika. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Ary ny anankiray taminy, dia Kaiafa, mpisoronabe tamin''izany taona izany, nanao taminy hoe: Hianareo tsy mahalala na inona na inona, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary Jesosy tia an''i Marta sy ny rahavaviny ary Lazarosy. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'na misaina akory fa tsara ho anareo, raha ny lehilahy iray no ho faty hamonjy ny firenena, mba tsy ho rava avokoa ity firenena ity. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Ary tsy niteny izany ho azy izy, fa satria mpisoronabe tamin''izany taona izany izy, dia naminany fa Jesosy ho faty hamonjy ny firenena; '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'ary tsy hamonjy io firenena io ihany, fa mba hanangona ny zanak''Andriamanitra izay efa niely ho antoko iray. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'Koa hatramin''izany andro izany dia nihendry hahafaty Azy ireo. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'Ary Jesosy tsy nandeha niharihary teny amin''ny Jiosy intsony; fa niala teo Izy nankany amin''ny tany akaikin''ny efitra, ho any an-tanàna atao hoe Efraima, ary nitoetra tany Izy mbamin''ny mpianatra. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'Ary efa akaiky ny Pasky ny Jiosy; ary maro avy tany an-tsaha no niakatra ho any Jerosalema talohan''ny Paska mba hanadio ny tenany. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'Dia nitady an''i Jesosy ireo, raha nijanona teo an-kianjan''ny tempoly, ka niresaka hoe: Ahoana no hevitrareo? Tsy mba ho tonga amin''ny andro firavoravoana va Izy? '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: Ary ny lohan'ny mpisorona sy ny Fariseo efa nandidy fa raha misy olona mahalala izay itoerany, dia tsy maintsy milaza, mba hisamborany Azy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Koa nony ren''i Jesosy fa narary Lazarosy, dia mbola nitoetra indroa andro teo amin''izay nitoerany ihany Izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Rehefa afaka izany, dia hoy Izy tamin''ny mpianatra: Andeha isika ho any Jodia indray. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Hoy ny mpianatra taminy: Raby ô, vao haingana teo no nitadiavan''ny Jiosy hitora-bato Anao, ka hankany indray va Hianao? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Jesosy namaly hoe: Tsy roa ambin''ny folo va ny ora amin''ny indray andro? Raha misy mandeha amin''ny antoandro, dia tsy mba tafintohina izy, fa mahita ny fahazavan''izao tontolo izao. '
