document_id: PSA.143,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faniriam-pamindram-po noho ny fahoriana mafy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salamo nataon''i Davida. Jehovah ô, henoy ny fivavako, ary atongilano amin''ny fifonako ny sofinao; Valio aho araka ny teninao marina sy ny fahamarinanao. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ampianaro hanao ny sitraponao aho; Fa Hianao no Andriamanitro; Aoka ny Fanahinao tsara no hitarihanao ahy amin''izay tany marina. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho ny anaranao, Jehovah ô, velomy aho; Araka ny fahamarinanao avoahy ny fanahiko ho afaka amin''ny fahoriana. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary araka ny famindram-ponao fongory ny fahavaloko, Ka aringano izay rehetra mampahory ny fanahiko; Fa mpanomponao aho.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary aza dia mifandahatra amin'ny mpanomponao eo am-pitsarana; Fa tsy misy olombelona ho marina eo anatrehanao.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nanenjika ny fanahiko ny fahavalo; Namely ny aiko ho lavo tamin''ny tany izy: Nampitoeriny tao amin''ny maizina aho, toy izay efa maty ela. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia reraka ny fanahiko ato anatiko; Fadiranovana ny foko ato anatiko. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahatsiaro ny andro fahiny ho Ary misaina ny asanao rehetra; Ny asan''ny tananao no eritreretiko. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mananty tanana aminao aho; Ny fanahiko dia tahaka ny tany mangetana eo anatrehanao.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faingàna hamaly ahy, Jehovah ô, fa reraka ny fanahiko; Aza manafina ny tavanao amiko, Fandrao ho tahaka izay midina any am-pasana aho. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ampandreneso ny famindram-ponao aho nony maraina, Fa Hianao no itokiako; Ampahalalao ahy izay lalana tokony halehako, Fa aminao no ananganako ny fanahiko. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehovah ô, vonjeo amin''ny fa-havaloko aho; Ao aminao no iereko. '
