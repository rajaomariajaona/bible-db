document_id: GEN.50,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary Josefa nihohoka tamin''ny tavan''ny rainy ka nitomany teo amboniny sady nanoroka azy. '
  '10':
  - type: text
    content: 'Ary rehefa tonga teo Goren''atada izy, izay ao an-dafin''i Jordana, dia nanao fisaonana lehibe sy mafy indrindra teo izy; dia nisaona an-drainy hafitoana Josefa. '
  '11':
  - type: text
    content: 'Ary rehefa hitan''ny Kananita tompon-tany ny fisaonana teo Goren-atada, dia hoy izy: Fisaonana mafy amin''ny Egyptiana izao; izany no nanaovany ny anarany hoe Abel-Egyptiana, izay ao an-dafin''i Jordana. '
  '12':
  - type: text
    content: 'Ary ny zanakalahin''i Jakoba nanao taminy araka izay nandidiany azy, '
  '13':
  - type: text
    content: 'dia nitondra azy tany amin''ny tany Kanana, ary nandevina azy tao amin''ny zohy amin''ny saha Makpela, tandrifin''i Mamre, dia ilay novidin''i Abrahama mbamin''ny saha tamin''i Efrona Hetita ho tany fandevenana. '
  '14':
  - type: text
    content: Ary rehefa voalevin'i Josefa ny rainy, dia niverina tany Egypta izy sy ny rahalahiny mbamin'izay rehetra niara-niakatra taminy handevina ny rainy.
  '15':
  - type: text
    content: 'Ary rehefa hitan''ny rahalahin''i Josefa fa maty ny rainy, dia hoy izy: Andrao hanao fo-lentika amintsika Josefa ka hamaly antsika tokoa noho izay ratsy rehetra nataontsika taminy. '
  '16':
  - type: text
    content: 'Dia naniraka nankany amin''i Josefa izy ka nanao hoe: Ny rainao nanafatra, fony izy tsy mbola maty, '
  '17':
  - type: text
    content: 'ka nanao hoe: Izao no holazainareo amin''i Josefa: Mamela re ny fahadisoan''ny rahalahinao sy ny fahotany, fa efa nanao ratsy taminao izy; eny, mamela ankehitriny ny fahadisoan''ny mpanompon''ny Andriamanitry ny rainao. Dia nitomany Josefa, raha niteny taminy izy ireo. '
  '18':
  - type: text
    content: 'Koa nanatona azy ny rahalahiny, dia nianko­hoka teo anatrehany ka nanao hoe: Indreto izahay ho mpanomponao. '
  '19':
  - type: text
    content: 'Ary hoy Josefa taminy: Aza matahotra; fa moa solon''Andriamanitra va aho? '
  '2':
  - type: text
    content: 'Ary nasain''i Josefa nanosotra zava-manitra an-drainy ny mpanompony izay mpanao fanafody; dia nanosotra an''Isiraely ny mpanao fanafody. '
  '20':
  - type: text
    content: 'Hianareo no nisaina hanisy ratsy ahy; fa Andriamanitra kosa nisaina izany ho soa, hanao tahaka ny amin''izao anio izao, hamelona olona betsaka. '
  '21':
  - type: text
    content: Koa ankehitriny, aza matahotra ianareo; fa izaho hamelona anareo sy ny zanakareo madinika. Dia nampionona azy sy nanao teny malefaka nahafinaritra azy izy.
  '22':
  - type: text
    content: 'Ary Josefa sy ny ankohonan''ny rainy nonina tany Egypta; ary ny andro niainan''i Josefa dia folo amby zato taona. '
  '23':
  - type: text
    content: 'Ary hitan''i Josefa ny zafiafin''i Efraima; ny zanak''i Makira koa, zanakalahin''i Manase, dia noraisin''i Josefa ho eo am-pofoany. '
  '24':
  - type: text
    content: 'Ary hoy Josefa tamin''ny rahalahiny: Ho faty aho; nefa Andriamanitra hamangy anareo tokoa ka hitondra anareo hiala amin''ity tany ity ho any amin''ny tany izay nianianany tamin''i Abrahama sy Isaka ary Jakoba homena azy. '
  '25':
  - type: text
    content: 'Ary Josefa dia nampianiana ny zanak''Isiraely ka nanao hoe: Hamangy anareo tokoa Andriamanitra, dia hitondra ny taolako hiala eto ianareo. '
  '26':
  - type: text
    content: Dia maty Josefa, rehefa folo amby zato taona; ary dia nohosorany zava-manitra izy ka napetrany tao anatin'ny vata tany Egypta.
  '3':
  - type: text
    content: 'Ary notanterahiny taminy ny efa-polo andro, fa izany no isan''ny andro nanosoram-paty; ary ny Egyptiana nisaona azy fito-polo andro. '
  '4':
  - type: text
    content: 'Ary rehefa tapitra ny andro nisaonana azy, Josefa dia niteny tamin''ny tao an-tranon''i Farao ka nanao hoe: Raha mba nahita fitia eo imasonareo aho, masìna ianareo, lazao amin''i Farao, ka ataovy hoe: '
  '5':
  - type: text
    content: 'Ny raiko efa nampianiana ahy ka nanao hoe: Indro, ho faty aho; koa ao amin''ny fasako, izay nohadiko ho ahy any amin''ny tany Kanana, dia ao no andeveno ahy. Koa ankehitriny, trarantitra ianao, aoka aho hiakatra handevina ny raiko, dia hiverina atỳ indray. '
  '6':
  - type: text
    content: 'Ary hoy Farao: Miakara ary, ka aleveno ny rainao araka izay nampianianany anao. '
  '7':
  - type: text
    content: 'Dia lasa niakatra Josefa handevina ny rainy; ary niara-niakatra taminy ny mpanompon''i Farao rehetra, dia ny loholona tao an-tranony sy ny loholona rehetra tany amin''ny tany Egypta, '
  '8':
  - type: text
    content: 'ary ny ankohonan''i Josefa rehetra sy ny rahalahiny ary ny ankohonan-drainy; ny ankizy madinika sy ny ondriny aman''osiny sy ny ombiny ihany no navelany tao amin''ny tany Gosena. '
  '9':
  - type: text
    content: 'Ary nisy kalesy sy mpitaingin-tsoavaly niara-niakatra taminy koa, ka lehibe dia lehibe ny tobiny. '
