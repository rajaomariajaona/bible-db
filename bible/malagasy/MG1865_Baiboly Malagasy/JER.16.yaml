document_id: JER.16,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nasain'Andriamanitra nataon'i Jeremia ny amin'ny loza hampijaliana ny Joda
  - type: text
    content: 'Ary tonga tamiko ny tenin''i Jehovah hoe: '
  '10':
  - type: text
    content: 'Ary raha ambaranao amin''ity firenena ity izany teny rehetra izany, ka hoy izy aminao: Nahoana Jehovah no nilaza izany loza mafy rehetra izany hamelezana anay? Fa inona no helokay, ary inona no fahotanay, izay nanotanay tamin''i Jehovah Andriamanitray? '
  '11':
  - type: text
    content: 'dia lazao aminy hoe: Noho ny nahafoizan''ny razanareo Ahy, hoy Jehovah, sy ny nanarahany andriamani-kafa sy ny nanompoany azy sy ny niankohofany teo anatrehany ary ny nahafoizany Ahy sy ny tsy nitandremany ny lalàko. '
  '12':
  - type: text
    content: 'Ary ny tenanareo koa nanao ratsy mihoatra noho ny razanareo; Fa he! ianareo samy mandeha araka ny ditry ny fo ratsinareo avokoa ka tsy mihaino Ahy; '
  '13':
  - type: text
    content: Ka dia horoahiko hiala amin'ity tany ity ianareo ho any amin'ny tany tsy fantatrareo na ny razanareo; Any no hanompoanareo andriamani-kafa andro aman'alina, satria tsy hamindra fo aminareo Aho.
  '14':
  - type: text
    content: 'Koa, indro, avy any andro, hoy Jehovah, izay tsy hanaovana intsony hoe: Raha velona koa Jehovah, Izay nitondra ny Zanak''Isiraely niakatra avy tany amin''ny tany Egypta; '
  '15':
  - type: text
    content: 'Fa izao kosa: Raha velona koa Jehovah, Izay nitondra ny Zanak''Isiraely niakatra avy tany amin''ny tany avaratra sy avy tany amin''ny tany rehetra izay nandroahany azy; Fa hampodiko ho amin''ny tany izay nomeko ny razany izy. '
  '16':
  - type: text
    content: 'Indro, Izaho haniraka mpamono maro, hoy Jehovah, Izay hamono azy; Ary rehefa afaka izany, dia haniraka mpihaza maro Aho, Izay hihaza azy any amin''ny tendrombohitra sy ny havoana rehetra ary any an-tsefatsefaky ny harambato. '
  '17':
  - type: text
    content: 'Fa ny masoko dia mijery ny alehany rehetra, ka tsy miafina amin''ny tavako izany, ary tsy takona amin''ny masoko ny helony. '
  '18':
  - type: text
    content: Alohan'izany anefa dia hovaliako avy sasaka ny helony sy ny fahotany noho ny nandotoany ny taniko, dia ny namenoany ny lovako tamin'ireo fatin'ny sampiny
  - type: note
    content: Heb. fahavetavetany
  - type: text
    content: ' sy fahavetavetany ireo. '
  '19':
  - type: text
    content: 'Jehovah ô, ry heriko sy fiarovana mafy ho ahy ary fandosirako amin''ny andro fahoriana ô! Ho tonga aminao ny jentilisa avy any amin''ny faran''ny tany dia hanao hoe: Eny, tokoa lainga no nolovan''ny razanay, dia zava-poana sady tsy misy mahasoa. '
  '2':
  - type: text
    content: 'Aza manam-bady ianao, ary aoka tsy hanan-janakalahy na zanakavavy amin''ity tany ity. '
  '20':
  - type: text
    content: 'Moa mahay manao andriamanitra ho azy va ny olona? Tsy Andriamanitra ireny. '
  '21':
  - type: text
    content: Koa, indro, hampahafantariko azy amin'izao indray mandeha izao, eny, hampahafantariko azy ny tanako sy ny heriko, ka dia ho fantany fa Jehovah no anarako.
  '3':
  - type: text
    content: 'Fa izao no lazain''i Jehovah ny amin''ny zanakalahy sy ny zanakavavy izay teraka amin''ity tany ity sy ny amin''ny reniny izay niteraka azy ary ny amin''ny rainy izay niteraka azy amin''ity tany ity koa: '
  '4':
  - type: text
    content: 'Ho fatin''ny loza samy hafa izy, nefa tsy hisaonana na halevina, fa ho zezika eny ambonin''ny tany; ary ho lanin-tsabatra sy mosary izy, ka ho fihinan''ny voro-manidina sy ny bibi-dia ny fatiny. '
  '5':
  - type: text
    content: 'Fa izao no lazain''i Jehovah: Aza miditra amin''ny trano misy fisaonana, ary aza misaona na mitsapa alahelo azy; Fa efa hesoriko tsy ho amin''ity firenena ity ny fiadanako, hoy Jehovah, dia ny famindram-po sy ny fiantrana. '
  '6':
  - type: text
    content: 'Ho faty na ny lehibe na ny kely amin''ity tany ity; Samy tsy halevina na hisaonana izy, na hitetehan''ny sasany tena, na hiboriany; '
  '7':
  - type: text
    content: 'Ary tsy hisy hamahan-kanina azy amin''ny fisaonany, mba hampionona azy ny amin''ny maty; Ary tsy hisy hampisotro azy amin''ny kapoaka fampiononana, raha maty ny rainy na ny reniny; '
  '8':
  - type: text
    content: 'Ary aza miditra ao amin''ny trano misy fanasana koa ianao, hiara-mitoetra aminy hihinana sy hisotro. '
  '9':
  - type: text
    content: 'Fa izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Indro, hatsahatro amin''ity tany ity eo imasonareo sy amin''ny andronareo ny feo mifaly sy ny feo miravoravo, dia ny feon''ny mpampakatra sy ny feon''ny ampakarina. '
