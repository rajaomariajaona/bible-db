document_id: DEU.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny handravana izay zavatra momba ny fivavahana amin'ny sampy, ary ny amin'ny hivavahana amin'Andriamanitra ao amin'izay tany fidiny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'IZAO no didy sy fitsipika izay hotandremanareo harahina any amin''ny tany izay omen''i Jehovah, Andriamanitry ny razanao, anao holovana amin''ny andro rehetra hiainanareo ambonin''ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Horavanareo mihitsy ny toerana rehetra izay nanompoan''ny firenen-tsamy hafa izay horoahinareo ny andriamaniny teny ambonin''ny tendrombohitra avo sy ny havoana ary teny ambanin''ny hazo maitso rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia horavanareo ny alitarany, ary hotorotoroinareo ny tsangam-baton-tsampiny, ary hodoranareo amin''ny afo ny Aserahany, ary ny sarin-javatra voasokitra, izay andriamaniny, dia hokapainareo, ka dia hofoananareo tsy ho eo amin''izany tany izany intsony ny anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aza manao toy izany amin''i Jehovah Andriamanitrareo ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa ny tany izay hofidin''i Jehovah Andriamanitrareo amin''ny firenenareo rehetra hasiany ny anarany sy honenany no hohatoninareo sy halehanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary any no hitondranareo ny fanatitra doranareo sy ny fanatitrareo hafa alatsa-drà sy ny fahafolon-karenareo sy ny fanatitra asandratry ny tananareo sy ny fanalam-boadinareo sy ny fanati-tsitraponareo ary ny voalohan-teraky ny ombinareo sy ny ondry aman''osinareo; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary any no hihinananareo sy ny ankohonanareo eo anatrehan''i Jehovah Andriamanitrareo ary hifalianareo amin''izay rehetra harin''ny tananareo, izay efa nitahian''i Jehovah Andriamanitrao anao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aza manao araka izay rehetra ataontsika eto ankehitriny intsony ianareo, dia izao samy manao izay mahitsy eo imasony avy izao. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa ianareo tsy mbola tonga any amin''ny fitsaharana sy ny lova izay omen''i Jehovah Andriamanitrao anao. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa rehefa tafita an''i Jordana ianareo ka monina any amin''ny tany izay omen''i Jehovah Andriamanitrareo anareo holovana, ary homeny fitsaharan''ady amin''ny fahavalonareo rehetra manodidina ianareo ka mandry fahizay, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'dia eo amin''ny tany izay hofidin''i Jehovah Andriamanitrareo hampitoerany ny anarany no hitondranareo izay rehetra andidiako anareo, dia ny fanatitra doranareo sy ny fanatitrareo hafa alatsa-drà sy ny fahafolon-karenareo sy ny fanatitra asandratry ny tananareo, ary izay zavatra tsara ataonareo voady amin''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hifaly eo anatrehan''i Jehovah Andriamanitrareo ianareo sy ny zanakareo-lahy sy ny zanakareo-vavy sy ny ankizilahinareo sy ny ankizivavinareo ary ny Levita izay ao an-tanànanareo; fa ny Levita tsy mba manana anjara na lova eo aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mitandrema mba tsy haterinao eny amin''izay tany rehetra tianao ny fanatitra doranao; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'fa eo amin''ny tany izay hofidin''i Jehovah ihany amin''ny firenenao anankiray no hanateranao azy, sady eo koa no hanaovanao izay rehetra andidiako anao. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Kanefa mahazo mamono zavatra sy mihinan-kena ianao, araka izay rehetra irinao eny amin''ny tanànanao rehetra, araka ny fitahian''i Jehovah Andriamanitrao izay omeny anao; na ny maloto, na ny madio dia samy mahazo mihinana azy ihany, tahaka ny ahazoany mihinana ny gazela sy ny diera. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Kanefa ny ràny no aza hanina, fa aidino amin''ny tany toy ny rano. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tsy azonao hanina ao an-tanànanao, na ny ampahafolon''ny varinao sy ny ranom-boalobokao sy ny diloilonao, na ny voalohan-teraky ny ombinao sy ny ondry aman''osinao, na ny zavatra rehetra hataonao voady, na ny fanati-tsitraponao, na ny fanatitra asandratry ny tananao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa eo anatrehan''i Jehovah Andriamanitrao no hihinananao azy, dia eo amin''ny tany izay hofidin''i Jehovah Andriamanitrao, dia ianao sy ny zanakao-lahy sy ny zanakao-vavy sy ny ankizilahinao sy ny ankizivavinao ary ny Levita izay ao an-tanànanao; ary hifaly eo anatrehan''i Jehovah Andriamanitrao ianao amin''izay rehetra hanin''ny tananao. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mitandrema mba tsy ho foinao ny Levita amin''ny andro rehetra hiainanao amin''ny taninao. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Raha hitarin''i Jehovah Andriamanitrao ny fari-taninao, araka izay nolazainy taminao, ka hoy ianao: Hihinan-kena aho, satria maniry hihinan-kena ny fanahinao, dia mahazo mihinan-kena araka izay rehetra irin''ny fanahinao ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Raha lavitra anao loatra ny tany izay hofidin''i Jehovah Andriamanitrao hasiany ny anarany, dia hamonoanao ny ombinao sy ny ondry aman''osinao izay nomen''i Jehovah anao, araka izay efa nandidiako anao, ary hohaninao ao an-tanànanao, araka izay rehetra irin''ny fanahinao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Kanefa tahaka ny ahazoanao mihinana ny gazela sy ny diera no hahazoanao mihinana ireny: na ny maloto na ny madio dia samy mahazo mihinana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Kanefa tandremo tsara mba tsy hohaninao ny rà, fa ny rà no aina, ary tsy mahazo mihinana ny aina amin''ny hena ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Aza mihinana azy ianao, fa aidino amin''ny tany toy ny rano izy; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'eny, aza mihinana azy ianao, mba hahita soa ianao sy ny taranakao mandimby anao, raha manao izay mahitsy eo imason''i Jehovah ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Kanefa ny zava-masinao sy ny zavatra nataonao voady dia ento mankany amin''ny tany izay hofidin''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary atero eo amin''ny alitaran''i Jehovah Andriamanitrao ny fanatitra doranao, dia ny henany sy ny ràny; ary ny ran''ny fanatitrao hafa dia aidino eo amin''ny alitaran''i Jehovah Andriamanitrao, fa ny henany dia azonao hohanina ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tandremo, ka henoy izao teny rehetra izao, izay andidiako anao, mba hahita soa ianao sy ny taranakao mandimby anao mandrakizay, raha manao izay tsara sy mahitsy eo imason''i Jehovah Andriamanitrao ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Rehefa aringan''i Jehovah Andriamanitrao eo anoloanao ny firenen-tsamy hafa, izay alehanao horesenao, ary handresy azy ianao ka honina eo amin''ny taniny, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'dia mitandrema, fandrao voafandrika hanaraka ny fanaony ianao, rehefa voaringana eo anoloanao izy; ary andrao mamotopototra ny amin''ny andriamaniny ianao ka manao hoe: Nanao ahoana no nanompoan''ireny firenena ireny ny andriamaniny? fa izaho koa mba hanao toy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Aza manao toy izany amin'i Jehovah Andriamanitrao; fa ny fahavetavetana rehetra, izay halan'i Jehovah, no nataony tamin'ny andriamaniny; fa ny zananilahy sy ny zananivavy aza dia nodorany tamin'ny afo ho an'ny andriamaniny.
