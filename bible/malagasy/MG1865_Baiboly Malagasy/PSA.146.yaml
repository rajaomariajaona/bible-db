document_id: PSA.146,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dera ho an'Andriamanitra, Mpamonjy tokana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Haleloia. Miderà an''i Jehovah, ry fanahiko. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Manjaka mandrakizay Jehovah, Hatramin'ny taranaka fara mandimby Andriamanitrao, ry Ziona. Haleloia.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hidera an'i Jehovah aho, raha mbola miaina koa; Eny, hankalaza an'Andriamanitra aho, raha mbola velona koa.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Aza matoky ny lehibe, Na ny zanak''olombelona izay tsy mahavonjy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Miala ny fofonainy, ka miverina ho amin''ny taniny izy; Ary amin''izay indrindra no hahafoanan''ny fikasany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Sambatra izay manana an''Andriamanitr''i Jakoba ho Mpanampy azy Sady manantena an''i Jehovah Andriamaniny, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Izay nanao ny lanitra sy ny tany, Ny ranomasina sy izay rehetra ao anatiny, Izay mitandrina fahamarinana mandrakizay, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Izay manome rariny ho an'ny ampahoriana, Izay manome hanina ho an'ny noana. Jehovah mamaha ny mpifatotra;
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Jehovah mampahiratra ny jamba Jehovah mampitraka ny mitanondrika; Jehovah tia ny marina; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Jehovah miaro ny vahiny Ary manandratra ny kamboty sy ny mpitondratena, Fa mamadika ny lalan''ny ratsy fanahy kosa. '
