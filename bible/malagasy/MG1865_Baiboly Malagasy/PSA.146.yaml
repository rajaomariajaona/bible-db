document_id: PSA.146,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Dera ho an'Andriamanitra, Mpamonjy tokana
  - type: text
    content: 'Haleloia. Miderà an''i Jehovah, ry fanahiko. '
  '10':
  - type: text
    content: Manjaka mandrakizay Jehovah, Hatramin'ny taranaka fara mandimby Andriamanitrao, ry Ziona. Haleloia.
  '2':
  - type: text
    content: Hidera an'i Jehovah aho, raha mbola miaina koa; Eny, hankalaza an'Andriamanitra aho, raha mbola velona koa.
  '3':
  - type: text
    content: 'Aza matoky ny lehibe, Na ny zanak''olombelona izay tsy mahavonjy. '
  '4':
  - type: text
    content: 'Miala ny fofonainy, ka miverina ho amin''ny taniny izy; Ary amin''izay indrindra no hahafoanan''ny fikasany. '
  '5':
  - type: text
    content: 'Sambatra izay manana an''Andriamanitr''i Jakoba ho Mpanampy azy Sady manantena an''i Jehovah Andriamaniny, '
  '6':
  - type: text
    content: 'Izay nanao ny lanitra sy ny tany, Ny ranomasina sy izay rehetra ao anatiny, Izay mitandrina fahamarinana mandrakizay, '
  '7':
  - type: text
    content: Izay manome rariny ho an'ny ampahoriana, Izay manome hanina ho an'ny noana. Jehovah mamaha ny mpifatotra;
  '8':
  - type: text
    content: 'Jehovah mampahiratra ny jamba Jehovah mampitraka ny mitanondrika; Jehovah tia ny marina; '
  '9':
  - type: text
    content: 'Jehovah miaro ny vahiny Ary manandratra ny kamboty sy ny mpitondratena, Fa mamadika ny lalan''ny ratsy fanahy kosa. '
