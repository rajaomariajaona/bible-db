document_id: DEU.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Anatra ny amin'ny tsi-fanamarinan-tena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'MIHAINOA, ry Isiraely ô: ianao izao dia efa hita an''i Jordana hiditra eo amin''ny tany ka handresy firenen-tsamy hafa, izay lehibe sy mahery noho ianao, sy hahafaka tanàna lehibe izay misy manda manakatra ny lanitra, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia firenena lehibe sady olona lava, dia taranaky ny Anakita izay fantatrao, sady efa renao ny lazany hoe: Iza no mahajanona eo anoloan''ny taranak''i Anàka? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa aoka ho fantatrao anio fa Jehovah Andriamanitrao no efa handeha hita eo alohanao tahaka ny afo mandevona, ka Izy no handringana azy sy hampietry azy eo anoloanao; dia handroaka azy ianao ka handringana azy faingana, araka izay nolazain''i Jehovah taminao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary rehefa voaroak''i Jehovah Andriamanitrao eo anoloanao izy, dia aza manao anakampo hoe: Ny fahamarinako no nitondran''i Jehovah ahy niditra handova ity tany ity; fa ny haratsiam-panahin''ireo firenena ireo no androahan''i Jehovah azy eo anoloanao. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsy ny fahamarinanao, na ny hitsim-ponao, no andehananao handova ny taniny; fa ny haratsiam-panahin''ireo firenena ireo no androahan''i Jehovah Andriamanitrao azy eo anoloanao hahatò ny teny izay nianianan''i Jehovah tamin''i Abrahama sy Isaka ary Jakoba razanao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa aoka ho fantatrao fa tsy ny fahamarinanao no anomezan''i Jehovah Andriamanitrao izany tany soa izany ho lovanao; fa firenena mafy hatoka ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tsarovy ka aza hadinoinao ny nampahatezeranao an''i Jehovah Andriamanitrao tany an-efitra: eny, hatramin''ny andro nialanao tany amin''ny tany Egypta ka hatramin''ny nahatongavanareo teto amin''ity tany ity dia mbola niodina tamin''i Jehovah ihany ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Na dia tany Horeba aza dia nampahatezitra an''i Jehovah ianareo, dia tezitra taminareo Izy ka saiky nandringana anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Raha niakatra tao an-tendrombohitra aho handray ny vato fisaka, dia ny vato fisaka izay nisy ny fanekena nataon''i Jehovah taminareo, ka nitoetra efa-polo andro sy efa-polo alina tao an-tendrombohitra sady tsy nihinan-kanina na nisotro rano, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'dia nomen''i Jehovah ahy ny vato fisaka roa, voasoratry ny fanondron''Andriamanitra; ary teo aminy no nisy ilay teny rehetra nolazain''i Jehovah taminareo tao an-tendrombohitra tao amin''ny andro nivoriana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nony tapitra ny efa-polo andro sy efa-polo alina, dia nomen''i Jehovah ahy ny vato fisaka roa, dia ilay nisy ny fanekena. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy Jehovah tamiko: Miaingà, ka midina faingana hiala etỳ ianao; fa efa nanao ratsy ny olonao izay nentinao nivoaka avy tany Egypta; efa nalaky nivily niala tamin''ny lalana izay efa nasaiko nalehany izy ka nanao sarin-javatra an-idina ho azy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy koa Jehovah tamiko: Efa hitako ity firenena ity, fa, indro, olona mafy hatoka izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Avelao Aho handringana azy, ka hovonoiko ny anarany tsy ho eny ambanin''ny lanitra, ary dia hataoko firenena mahery sy lehibe noho izy ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nihodina aho ka nidina niala tamin''ny tendrombohitra, raha mbola nirehitra afo izy; ary ny vato fisaka roa nisy ny fanekena dia teny an-tanako roa. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nijery aho, ka, indro, efa nanota tamin''i Jehovah Andriamanitrareo ianareo ka nanao ombilahy kely an-idina ho anareo; nalaky nivily ianareo niala tamin''ny lalana izay efa nasain''i Jehovah nalehanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia noraisiko ny vato fisaka roa ka nazerako avy teny an-tanako roa ho vakivaky teo imasonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary niankohoka teo anatrehan''i Jehovah efa-polo andro sy efa-polo alina tahaka ilay teo ihany aho ka tsy nihinan-kanina, na nisotro rano, noho ny fahotanareo rehetra, izay nataonareo tamin''ny nanaovanareo izay ratsy eo imason''i Jehovah, ka nampahatezeranareo Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa natahotra ny fahavinirana sy ny fahatezerana aho, izay nahatezeran''i Jehovah taminareo handringanana anareo. Dia nihaino ahy indray Jehovah tamin''izany andro izany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Jehovah dia tezitra indrindra tamin''i Arona ka saiky nandevona azy; dia nifona ho an''i Arona koa aho tamin''izany andro izany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary noraisiko ny fahotanareo, dia ilay ombilahy kely izay nataonareo, ka nodorako tamin''ny afo, dia notorotoroiko sy nomontsamontsaniko mandra-pahatongany ho madinika toy ny vovoka; ary ny vovony dia nariako teo amin''ny renirano izay midina avy amin''ny tendrombohitra. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary tao Tabera sy Masa ary Kibrota-hatava no nampahatezeranareo an''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary raha nampandehanin''i Jehovah niala tao Kadesi-barnea ianareo ka nataony hoe: Miakara, ka lovao ny tany izay nomeko anareo, dia nandà ny tenin''i Jehovah Andriamanitrareo ianareo, fa tsy nihaino Azy, na nino ny feony. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Eny, niodina tamin''i Jehovah ihany ianareo hatramin''ny andro nahalalako anareo no ho mankaty. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary niankohoka teo anatrehan''i Jehovah aho nandritra izany efa-polo andro sy efa-polo alina izany, satria efa nolazain''i Jehovah fa handringana anareo Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia nifona tamin''i Jehovah aho ka nanao hoe: Jehovah Tompo ô, aza mandringana ny firenenao sy ny lovanao, izay navotanao tamin''ny fahalehibiazanao ka nentinao nivoaka avy tany Egypta tamin''ny tananao mahery. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tsarovy ny mpanomponao, dia Abrahama sy Isaka ary Jakoba; fa aza mijery ny ditran''ity firenena ity, na ny haratsiam-panahiny, na ny fahotany, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'fandrao izay monina amin''ny tany nitondranao anay nivoaka avy tany hanao hoe: Satria tsy hain''i Jehovah ny hitondra azy ho any amin''ny tany izay nolazainy taminy, ary satria nankahala azy Izy, dia izany no nitondrany azy nivoaka hahafaty azy atỳ an-efitra. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Kanefa ireo dia firenenao sy lovanao, izay nentinao nivoaka tamin'ny herinao lehibe sy ny sandrinao nahinjitra.
