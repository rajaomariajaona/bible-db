document_id: JAS.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Toky ho an'ny Kristiana azom-pahoriana, sy anatra samy hafa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'He! ianareo manan-karena, mitomania sy midradradradrà noho ny fahoriana izay efa manjo anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny harenareo efa simba, ary ny fitafianareo efa lanin''ny kalalao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny volamena sy ny volafotsinareo dia efa harafesina; ary ny harafesiny dia ho vavolombelona hiampanga anareo sady handany ny nofonareo tahaka ny afo. Efa namory harena amin''ny andro farany ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Indro, ny karaman''ny mpiasa nijinja ny taninareo, izay hazoninareo, dia mitaraina; ary ny fitarainan''ny mpijinja dia efa tafiditra amin''ny sofin''ny Tompon''ny maro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Efa velona tamin''ny fy tetỳ ambonin''ny tany ianareo sady nanaram-po tamin''ny fahafinaretana; efa namahy ny fonareo tamin''ny andro hamonoana ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Efa nanameloka namono ny marina
  - type: usfm
    marker: x
    children:
    - type: text
      text: Na. Ilay marina . . . Izy
    marker-yv: yv-n
  - type: text
    text: ' ianareo; fa tsy manohitra anareo izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary amin''izany dia mahareta tsara, ry rahalahy, mandra-pihavin''ny Tompo. Indro, ny mpiasa tany miandry ny voka-tsoa amin''ny tany ka maharitra amin''izany mandra-pahazony ny ranonorana aloha sy aoriana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mahareta koa ianareo, mampahereza ny fonareo, fa efa mby akaiky ny fihavian''ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aza mifampimonomonona, ry rahalahy, fandrao hohelohina ianareo; Indro, ny Mpitsara efa mitsangana eo anoloan''ny varavarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ry rahalahiko, aoka ny mpaminany izay niteny tamin''ny anaran''ny Tompo no halainareo ho fianarana ny fandeferam-pahoriana sy ny faharetana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Indro, ataontsika fa sambatra izay efa naharitra. Efa renareo ny faharetan''i Joba ary efa hitanareo ny faran''ny nataon''ny Tompo taminy, fa miantra indrindra ny Tompo sady be famindram-po. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa mihoatra noho ny zavatra rehetra, ry rahalahiko, aza mianiana, na amin'ny lanitra, na amin'ny tany, na amin'izay fianianana hafa akory aza; fa aoka ny fanaikinareo ho "Eny", ary ny fandànareo ho "Tsia", fandrao hiharan'ny fitsarana ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Misy azom-pahoriana va eo aminareo? Aoka izy hivavaka. Misy faly va? Aoka izy hihira fiderana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Misy marary va eo aminareo? Aoka izy hampaka ny loholon
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. presbytera
    marker-yv: yv-n
  - type: text
    text: '''ny fiangonana'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. eklesia
    marker-yv: yv-n
  - type: text
    text: '; ary aoka hanosotra diloilo azy amin''ny anaran''ny Tompo ireo sady hivavaka eo aminy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ary ny fivavaky ny finoana dia hamonjy ilay marary, fa ny Tompo hanangana azy; ary raha nanota izy, dia havela ny helony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa mifaneke heloka ianareo, ary mifampivavaha, mba ho sitrana ianareo. Ny fiàsan''ny fivavaky ny marina dia mahery indrindra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Elia dia olona tahaka antsika ihany, ary izy nahery nivavaka mba tsy hilatsahan''ny ranonorana; dia tsy nilatsaka tamin''ny tany ny ranonorana telo taona sy enim-bolana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nivavaka indray izy, dia nandatsaka ranonorana ny lanitra, ka nahavokatra ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ry rahalahiko, raha misy eo aminareo miala amin''ny fahamarinana, ary misy anankiray mampibebaka azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: aoka ho fantany fa izay mampibebaka ny mpanota hiala amin'ny lalan'ny fahadisoany dia hamonjy fanahy tsy ho faty sady hanarona heloka be.
