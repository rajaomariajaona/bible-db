document_id: JER.32
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nividianan'i Jeremia tany ho vavolombelon'ny finoany fa mbola hampodina ny Isiraely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no teny tonga tamin''i Jeremia avy tamin''i Jehovah tamin''ny taona fahafolo nanjakan''i Zedekia, mpanjakan''ny Joda, dia ny taona fahavalo ambin''ny folo nanjakan''i Nebokadnezara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa tamin''izany no nanaovan''ny miaramilan''ny mpanjakan''i Babylona fahirano an''i Jerosalema; ary Jeremia mpaminany nambenana teo an-kianjan''ny trano fiambenana, izay teo amin''ny tranon''ny mpanjakan''ny Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa Zedekia, mpanjakan''ny Joda, nampiambina azy ka nanao hoe: Nahoana ianao no maminany hoe: Izao no lazain''i Jehovah: Indro, hatolotro eo an-tànan''ny mpanjakan''i Babylona ity tanàna ity, ka ho afany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ary Zedekia, mpanjakan''ny Joda, dia tsy ho afa-mandositra ny tanan''ny Kaldeana, fa hatolotra eo an-tànan''ny mpanjakan''i Babylona tokoa izy, ary hiteny aminy mifanatrika izy sady hifankahita maso aminy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary ho any Babylona no hitondrana an''i Zedekia, ka ho any izy ambara-pamangiko azy, hoy Jehovah; na dia miady amin''ny Kaldeana aza ianareo, dia tsy hambinina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy Jeremia: Tonga tamiko ny tenin''i Jehovah hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Indro Hanamela, zanak''i Saloma, rahalahin-drainao, ho avy eto aminao hanao hoe: Vidionao ny sahako izay ao Anatota, fa ianao no havana akaiky tokony hanavotra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary Hanamela, zana-drahalahin''ikaky, dia tonga tamiko teo an-kianjan''ny trano fiambenana araka ny tenin''i Jehovah, ka hoy izy tamiko: Masìna ianao, vidio ny sahako izay ao Anatota, dia ilay ao amin''ny tanin''ny Benjamina, fa ianao no havana akaiky tokony handova sy hanavotra azy, vidio re ho anao. Ka dia fantatro fa tenin''i Jehovah izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary novidiko tamin''i Hanamela, zana-drahalahin''ikaky, ny saha izay tao Anatota, ary nolanjaiko ny vola, dia sekely volafotsy fito ambin''ny folo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nosoratako tamin''ny taratasy izany ka nasiako tombo-kase sady nasiako vavolombelona, ary nolanjaiko tamin''ny mizana ny vola. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ka dia noraisiko ny taratasy nisy ny fanekena tamin''ny vidin-tany, dia ilay voaisy tombo-kase araka ny lalàna sy ny fanao, mbamin''ny taratasy mivelatra koa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia natolotro an''i Baroka, zanak''i Neria, zanak''i Mahaseia, ilay taratasy nisy ny fanekena tamin''ny vidin-tany, teo imason''i Hanamela, zana-drahalahin''ikaky, sy teo anatrehan''ny vavolombelona izay nanao sonia tamin''ny taratasy nisy ny fanekena tamin''ny vidin-tany, dia teo anatrehan''ny Jiosy rehetra izay nipetraka teo an-kianjan''ny trano fiambenana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nandidy an''i Baroka teo anatrehan''ireo aho nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izao no lazain''i Jenovah, Tompon''ny maro, Andriamanitry ny Isiraely: Ento ireto taratasy ireto, dia ireto taratasy misy ny fanekena amin''ny vidin-tany, dia ilay misy tombo-kase, mbamin''ny taratasy mivelatra, ary ataovy ao anaty vilany tany izy mba haharitra ela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Mbola hisy trano sy saha ary tanim-boaloboka hovidina indray eto amin''ity tany ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary rehefa voatolotra an''i Baroka, zanak''i Neria, ilay taratasy nisy ny fanekena tamin''ny vidin-tany, dia nivavaka tamin''i Jehovah aho hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Indrisy, Jehovah Tompo ô! Indro, Hianao no nanao ny lanitra sy ny tany tamin''ny herinao lehibe sy ny sandrinao ahinjitra, ary tsy misy zava-mahagaga izay tsy hainao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mamindra fo amin''ny arivo arivo Hianao ary mamaly ny heloky ny ray ho ao an-tratran''ny zanany mandimby azy dia Andriamanitra lehibe sy mahery, Jehovah, Tompon''ny maro, no anarany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'lehibe amin''ny fisainana sy mahery amin''ny atao; fa ny masonao mibanjina ny alehan''ny zanak''olombelona rehetra mba hanome azy rehetra araka ny lalany avy sy araka ny vokatry ny asany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'dia Ilay nanisy famantarana sy fahagagana tany amin''ny tany Egypta ka mandraka androany koa, na ao amin''ny Isiraely, na ao amin''ny olona hafa koa, ka dia nanao anarana ho Anao tahaka ny amin''izao anio izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nitondra ny Isiraely olonao nivoaka avy tany amin''ny tany Egypta Hianao tamin''ny famantarana sy ny fahagagana ary ny tanana mahery sy ny sandry nahinjitra ary ny fampahatahorana lehibe, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ka dia nanome azy ity tany ity, izay efa nianiananao nolazainao tamin''ny razany homena azy, dia tany tondra-dronono sy tantely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary tonga teto izy, dia nandova azy, nefa tsy nihaino ny feonao izy sady tsy nandeha araka ny lalànao; ary tsy nanao na inona na inona tamin''izay rehetra nasainao nataony izy, ka dia nataonao mihatra aminy izao loza rehetra izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Indro, ny tovon-tany efa miorina akaikin''ny tanàna hanafahana azy, ary ny tanàna dia atolotra eo an-tànan''ny Kaldeana izay mamely azy noho ny sabatra sy ny mosary sy ny areti-mandringana; ary izay nolazainao dia tonga, ka indro, hitan''ny masonao izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary Hianao, Jehovah Tompo ô, dia niteny tamiko ka nanao hoe: Vidionao vola ny saha, ary makà vavolombelona, na dia efa voatolotra eo an-tànan''ny Kaldeana aza ny tanàna.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia tonga tamin''i Jeremia ny tenin''i Jehovah hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Indro, Izaho no Jehovah, Andriamanitry ny nofo rehetra; moa misy zava-mahagaga izay tsy haiko va? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Koa izao no lazain''i Jehovah: Indro, efa hatolotro eo an-tànan''ny Kaldeana ity tanàna ity sy eo an-tànan''i Nebokadnezara mpanjakan''i Babylona, ka ho afany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary ny Kaldeana, izay efa mamely ity tanàna ity dia hiditra ary handrehitra afo eto ka handoro azy mbamin''ny trano izay efa nandoroana ditin-kazo manitra teo an-tampony ho an''i Bala, sady nanidinana fanatitra aidina ho an''andriamani-kafa mba hampahatezitra Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa izay ratsy eo imasoko ihany no nataon''ny Zanak''Isiraely sy ny taranak''i Joda hatry ny fony ireo mbola kely; fa ny Zanak''Isiraely efa nampahatezitra Ahy tamin''ny asan''ny tànany, hoy Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa ity tanàna ity dia efa nampahatezitra sy nampahavinitra Ahy hatramin''ny andro nanorenana azy ka mandraka androany, mba hanesorako azy tsy ho eo anatrehako, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'noho ny ratsy rehetra nataon''ny Zanak''Isiraely sy ny taranak''i Joda, dia izy sy ny mpanjakany sy ny mpanapaka azy sy ny mpisorony sy ny mpaminaniny sy ny lehilahy amin''ny Joda ary ny mponina any Jerosalema, mba hampahatezitra Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa efa niamboho Ahy izy, fa tsy nanatrika Ahy, ary na dia nampianariko aza izy - eny, nifoha maraina koa Aho ka nampianatra azy, dia tsy nihaino mba hahazoany anatra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Fa nametraka ny fahavetavetany tato amin''ny trano izay efa niantsoana ny anarako izy handotoany azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ary nanorina ny fitoerana avon'i Bala, izay ao amin'ny Lohasahan'ny taranak'i Hinoma, izy mba hampandeha ny zananilahy sy ny zananivavy hamaky ny afo ho an'i Moloka, izay tsy nandidiako azy, na tao an-tsaiko akory aza, ka dia nanao izany fahavetavetana izany izy mba hampanota ny Joda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Koa noho izany dia izao no lazain''i Jehovah, Andriamanitry ny Isiraely, ny amin''ity tanàna ity, izay ataonareo hoe: Hatolotra eo an-tànan''ny mpanjakan''i Babylona amin''ny sabatra sy ny mosary ary ny areti-mandringana izy: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Indro izy hangoniko avy any amin''ny tany rehetra izay nandroahako azy tamin''ny fahatezerako sy ny fisafoahako ary ny fahavinirana be; ary ho entiko amin''ity tany ity indray izy ka hataoko mandry fahizay; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ary izy ho oloko, ary Izaho ho Andriamaniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia homeko fo iray sy lalana iray izy, mba hatahorany Ahy lalandava hahasoa azy sy ny zanany mandimby azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'dia hanao fanekena mandrakizay aminy Aho, dia ny tsy hitsaharako amin''ny fanasoavako azy; ary ny fahatahorana Ahy dia hataoko ao am-pony kosa, mba tsy hialany amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Eny, ho faly aminy Aho ka hahasoa azy, dia hamboly azy amin''ity tany ity tokoa amin''ny foko rehetra sy ny fanahiko rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Fa izao no lazain''i Jehovah: Araka ny nampahatongavako izao loza lehibe rehetra izao tamin''ity firenena ity, dia araka izany asa no hampahatongavako ny soa rehetra izay nokasaiko'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. nolazaiko
    marker-yv: yv-n
  - type: text
    text: ' ho azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ary mbola hisy fividianana saha eto amin''ity tany ity, izay ataonareo hoe Tany lao tsy misy olona na biby fiompy sady efa voatolotra eo an-tànan''ny Kaldeana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Eny, saha no hovidin'ny olona vola, ka hosoratany amin'ny taratasy sy hasiany tombo-kase ary hasiany vavolombelona ao amin'ny tanin'ny Benjamina sy amin'ny manodidina an'i Jerosalema sy amin'ny tanànan'ny Joda sy amin'ny tanàna any amin'ny tany havoana sy amin'ny tanàna ny amin'ny tany lemaka amoron-tsiraka
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sefela
    marker-yv: yv-n
  - type: text
    text: ' ary amin''ny tanàna any amin''ny tany atsimo; fa hampodiko avy amin''ny fahababoany izy, hoy Jehovah.'
