document_id: JER.32,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nividianan'i Jeremia tany ho vavolombelon'ny finoany fa mbola hampodina ny Isiraely
  - type: text
    content: 'Izao no teny tonga tamin''i Jeremia avy tamin''i Jehovah tamin''ny taona fahafolo nanjakan''i Zedekia, mpanjakan''ny Joda, dia ny taona fahavalo ambin''ny folo nanjakan''i Nebokadnezara. '
  '10':
  - type: text
    content: 'Ary nosoratako tamin''ny taratasy izany ka nasiako tombo-kase sady nasiako vavolombelona, ary nolanjaiko tamin''ny mizana ny vola. '
  '11':
  - type: text
    content: 'Ka dia noraisiko ny taratasy nisy ny fanekena tamin''ny vidin-tany, dia ilay voaisy tombo-kase araka ny lalàna sy ny fanao, mbamin''ny taratasy mivelatra koa; '
  '12':
  - type: text
    content: 'dia natolotro an''i Baroka, zanak''i Neria, zanak''i Mahaseia, ilay taratasy nisy ny fanekena tamin''ny vidin-tany, teo imason''i Hanamela, zana-drahalahin''ikaky, sy teo anatrehan''ny vavolombelona izay nanao sonia tamin''ny taratasy nisy ny fanekena tamin''ny vidin-tany, dia teo anatrehan''ny Jiosy rehetra izay nipetraka teo an-kianjan''ny trano fiambenana. '
  '13':
  - type: text
    content: 'Ary nandidy an''i Baroka teo anatrehan''ireo aho nanao hoe: '
  '14':
  - type: text
    content: 'Izao no lazain''i Jenovah, Tompon''ny maro, Andriamanitry ny Isiraely: Ento ireto taratasy ireto, dia ireto taratasy misy ny fanekena amin''ny vidin-tany, dia ilay misy tombo-kase, mbamin''ny taratasy mivelatra, ary ataovy ao anaty vilany tany izy mba haharitra ela. '
  '15':
  - type: text
    content: 'Fa izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Mbola hisy trano sy saha ary tanim-boaloboka hovidina indray eto amin''ity tany ity. '
  '16':
  - type: text
    content: 'Ary rehefa voatolotra an''i Baroka, zanak''i Neria, ilay taratasy nisy ny fanekena tamin''ny vidin-tany, dia nivavaka tamin''i Jehovah aho hoe: '
  '17':
  - type: text
    content: 'Indrisy, Jehovah Tompo ô! Indro, Hianao no nanao ny lanitra sy ny tany tamin''ny herinao lehibe sy ny sandrinao ahinjitra, ary tsy misy zava-mahagaga izay tsy hainao. '
  '18':
  - type: text
    content: 'Mamindra fo amin''ny arivo arivo Hianao ary mamaly ny heloky ny ray ho ao an-tratran''ny zanany mandimby azy dia Andriamanitra lehibe sy mahery, Jehovah, Tompon''ny maro, no anarany, '
  '19':
  - type: text
    content: 'lehibe amin''ny fisainana sy mahery amin''ny atao; fa ny masonao mibanjina ny alehan''ny zanak''olombelona rehetra mba hanome azy rehetra araka ny lalany avy sy araka ny vokatry ny asany, '
  '2':
  - type: text
    content: 'Fa tamin''izany no nanaovan''ny miaramilan''ny mpanjakan''i Babylona fahirano an''i Jerosalema; ary Jeremia mpaminany nambenana teo an-kianjan''ny trano fiambenana, izay teo amin''ny tranon''ny mpanjakan''ny Joda. '
  '20':
  - type: text
    content: 'dia Ilay nanisy famantarana sy fahagagana tany amin''ny tany Egypta ka mandraka androany koa, na ao amin''ny Isiraely, na ao amin''ny olona hafa koa, ka dia nanao anarana ho Anao tahaka ny amin''izao anio izao. '
  '21':
  - type: text
    content: 'Ary nitondra ny Isiraely olonao nivoaka avy tany amin''ny tany Egypta Hianao tamin''ny famantarana sy ny fahagagana ary ny tanana mahery sy ny sandry nahinjitra ary ny fampahatahorana lehibe, '
  '22':
  - type: text
    content: 'ka dia nanome azy ity tany ity, izay efa nianiananao nolazainao tamin''ny razany homena azy, dia tany tondra-dronono sy tantely. '
  '23':
  - type: text
    content: 'Ary tonga teto izy, dia nandova azy, nefa tsy nihaino ny feonao izy sady tsy nandeha araka ny lalànao; ary tsy nanao na inona na inona tamin''izay rehetra nasainao nataony izy, ka dia nataonao mihatra aminy izao loza rehetra izao. '
  '24':
  - type: text
    content: 'Indro, ny tovon-tany efa miorina akaikin''ny tanàna hanafahana azy, ary ny tanàna dia atolotra eo an-tànan''ny Kaldeana izay mamely azy noho ny sabatra sy ny mosary sy ny areti-mandringana; ary izay nolazainao dia tonga, ka indro, hitan''ny masonao izany. '
  '25':
  - type: text
    content: 'Ary Hianao, Jehovah Tompo ô, dia niteny tamiko ka nanao hoe: Vidionao vola ny saha, ary makà vavolombelona, na dia efa voatolotra eo an-tànan''ny Kaldeana aza ny tanàna.'
  '26':
  - type: text
    content: 'Dia tonga tamin''i Jeremia ny tenin''i Jehovah hoe: '
  '27':
  - type: text
    content: 'Indro, Izaho no Jehovah, Andriamanitry ny nofo rehetra; moa misy zava-mahagaga izay tsy haiko va? '
  '28':
  - type: text
    content: 'Koa izao no lazain''i Jehovah: Indro, efa hatolotro eo an-tànan''ny Kaldeana ity tanàna ity sy eo an-tànan''i Nebokadnezara mpanjakan''i Babylona, ka ho afany. '
  '29':
  - type: text
    content: 'Ary ny Kaldeana, izay efa mamely ity tanàna ity dia hiditra ary handrehitra afo eto ka handoro azy mbamin''ny trano izay efa nandoroana ditin-kazo manitra teo an-tampony ho an''i Bala, sady nanidinana fanatitra aidina ho an''andriamani-kafa mba hampahatezitra Ahy. '
  '3':
  - type: text
    content: 'Fa Zedekia, mpanjakan''ny Joda, nampiambina azy ka nanao hoe: Nahoana ianao no maminany hoe: Izao no lazain''i Jehovah: Indro, hatolotro eo an-tànan''ny mpanjakan''i Babylona ity tanàna ity, ka ho afany; '
  '30':
  - type: text
    content: 'Fa izay ratsy eo imasoko ihany no nataon''ny Zanak''Isiraely sy ny taranak''i Joda hatry ny fony ireo mbola kely; fa ny Zanak''Isiraely efa nampahatezitra Ahy tamin''ny asan''ny tànany, hoy Jehovah. '
  '31':
  - type: text
    content: 'Fa ity tanàna ity dia efa nampahatezitra sy nampahavinitra Ahy hatramin''ny andro nanorenana azy ka mandraka androany, mba hanesorako azy tsy ho eo anatrehako, '
  '32':
  - type: text
    content: 'noho ny ratsy rehetra nataon''ny Zanak''Isiraely sy ny taranak''i Joda, dia izy sy ny mpanjakany sy ny mpanapaka azy sy ny mpisorony sy ny mpaminaniny sy ny lehilahy amin''ny Joda ary ny mponina any Jerosalema, mba hampahatezitra Ahy. '
  '33':
  - type: text
    content: 'Fa efa niamboho Ahy izy, fa tsy nanatrika Ahy, ary na dia nampianariko aza izy - eny, nifoha maraina koa Aho ka nampianatra azy, dia tsy nihaino mba hahazoany anatra izy. '
  '34':
  - type: text
    content: 'Fa nametraka ny fahavetavetany tato amin''ny trano izay efa niantsoana ny anarako izy handotoany azy; '
  '35':
  - type: text
    content: ary nanorina ny fitoerana avon'i Bala, izay ao amin'ny Lohasahan'ny taranak'i Hinoma, izy mba hampandeha ny zananilahy sy ny zananivavy hamaky ny afo ho an'i Moloka, izay tsy nandidiako azy, na tao an-tsaiko akory aza, ka dia nanao izany fahavetavetana izany izy mba hampanota ny Joda.
  '36':
  - type: text
    content: 'Koa noho izany dia izao no lazain''i Jehovah, Andriamanitry ny Isiraely, ny amin''ity tanàna ity, izay ataonareo hoe: Hatolotra eo an-tànan''ny mpanjakan''i Babylona amin''ny sabatra sy ny mosary ary ny areti-mandringana izy: '
  '37':
  - type: text
    content: 'Indro izy hangoniko avy any amin''ny tany rehetra izay nandroahako azy tamin''ny fahatezerako sy ny fisafoahako ary ny fahavinirana be; ary ho entiko amin''ity tany ity indray izy ka hataoko mandry fahizay; '
  '38':
  - type: text
    content: 'ary izy ho oloko, ary Izaho ho Andriamaniny. '
  '39':
  - type: text
    content: 'Dia homeko fo iray sy lalana iray izy, mba hatahorany Ahy lalandava hahasoa azy sy ny zanany mandimby azy; '
  '4':
  - type: text
    content: 'ary Zedekia, mpanjakan''ny Joda, dia tsy ho afa-mandositra ny tanan''ny Kaldeana, fa hatolotra eo an-tànan''ny mpanjakan''i Babylona tokoa izy, ary hiteny aminy mifanatrika izy sady hifankahita maso aminy; '
  '40':
  - type: text
    content: 'dia hanao fanekena mandrakizay aminy Aho, dia ny tsy hitsaharako amin''ny fanasoavako azy; ary ny fahatahorana Ahy dia hataoko ao am-pony kosa, mba tsy hialany amiko. '
  '41':
  - type: text
    content: 'Eny, ho faly aminy Aho ka hahasoa azy, dia hamboly azy amin''ity tany ity tokoa amin''ny foko rehetra sy ny fanahiko rehetra. '
  '42':
  - type: text
    content: 'Fa izao no lazain''i Jehovah: Araka ny nampahatongavako izao loza lehibe rehetra izao tamin''ity firenena ity, dia araka izany asa no hampahatongavako ny soa rehetra izay nokasaiko'
  - type: note
    content: Heb. nolazaiko
  - type: text
    content: ' ho azy. '
  '43':
  - type: text
    content: 'Ary mbola hisy fividianana saha eto amin''ity tany ity, izay ataonareo hoe Tany lao tsy misy olona na biby fiompy sady efa voatolotra eo an-tànan''ny Kaldeana. '
  '44':
  - type: text
    content: Eny, saha no hovidin'ny olona vola, ka hosoratany amin'ny taratasy sy hasiany tombo-kase ary hasiany vavolombelona ao amin'ny tanin'ny Benjamina sy amin'ny manodidina an'i Jerosalema sy amin'ny tanànan'ny Joda sy amin'ny tanàna any amin'ny tany havoana sy amin'ny tanàna ny amin'ny tany lemaka amoron-tsiraka
  - type: note
    content: Heb. Sefela
  - type: text
    content: ' ary amin''ny tanàna any amin''ny tany atsimo; fa hampodiko avy amin''ny fahababoany izy, hoy Jehovah.'
  '5':
  - type: text
    content: 'ary ho any Babylona no hitondrana an''i Zedekia, ka ho any izy ambara-pamangiko azy, hoy Jehovah; na dia miady amin''ny Kaldeana aza ianareo, dia tsy hambinina. '
  '6':
  - type: text
    content: 'Ary hoy Jeremia: Tonga tamiko ny tenin''i Jehovah hoe: '
  '7':
  - type: text
    content: 'Indro Hanamela, zanak''i Saloma, rahalahin-drainao, ho avy eto aminao hanao hoe: Vidionao ny sahako izay ao Anatota, fa ianao no havana akaiky tokony hanavotra azy. '
  '8':
  - type: text
    content: 'Ary Hanamela, zana-drahalahin''ikaky, dia tonga tamiko teo an-kianjan''ny trano fiambenana araka ny tenin''i Jehovah, ka hoy izy tamiko: Masìna ianao, vidio ny sahako izay ao Anatota, dia ilay ao amin''ny tanin''ny Benjamina, fa ianao no havana akaiky tokony handova sy hanavotra azy, vidio re ho anao. Ka dia fantatro fa tenin''i Jehovah izany. '
  '9':
  - type: text
    content: 'Ary novidiko tamin''i Hanamela, zana-drahalahin''ikaky, ny saha izay tao Anatota, ary nolanjaiko ny vola, dia sekely volafotsy fito ambin''ny folo. '
