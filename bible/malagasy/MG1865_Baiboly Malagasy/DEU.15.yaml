document_id: DEU.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny ho fanao amin'ny voalohan-teraky ny biby fiompy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary isam-pito taona dia manaova fanafahana ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary izao no ho fomban''ny fanafahana: Ny tompon-trosa rehetra izay nampanàna vola tamin''ny namany dia hamoy izany; tsy hanery ny namany izay rahalahiny handoa izy, satria efa voantso ny fanafahan''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny olona hafa firenena ihany no azonao terena handoa; fa izay anao amin''ny rahalahinao kosa dia hafoinao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'kanefa tsy dia hisy olo-malahelo eo aminao, fa hitahy anao tokoa Jehovah eo amin''ny tany izay omen''i Jehovah Andriamanitrao ho lovanao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'raha mihaino tsara ny feon''i Jehovah Andriamanitrao ianao ka mitandrina hanaraka izao lalàna rehetra izao, izay andidiako anao anio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa Jehovah Andriamanitrao hitahy anao araka izay nolazainy taminao; ary hampisambotra ny firenena maro ianao, fa ianao kosa tsy hisambotra; ary hanapaka firenena maro ianao, fa izy kosa tsy mba hanapaka anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Raha misy malahelo ny rahalahinao ao an-tanànanao anankiray amin''ny taninao izay omen''i Jehovah Andriamanitrao anao, dia aza manamafy ny fonao, na manakombona ny tananao, amin''ny rahalahinao malahelo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'fa sokafy tsara aminy ny tananao, ka ampisambory izay ilainy, araka izay mahory azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mitandrema fandrao hisy hevi-dratsy ao am-ponao manao hoe: Antomotra ny taona fahafito, dia ny taom-panafahana; ary ho ratsy fijery ny rahalahinao malahelo ianao, ka tsy hanome azy akory ianao; ary hitaraina amin''i Jehovah hiampanga anao Izy, ka dia ho fahotanao izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Omeo tokoa izy, ary aoka tsy halahelo ny fonao raha manome azy, satria izany zavatra izany no hitahian''i Jehovah Andriamanitrao anao amin''ny asanao rehetra sy amin''izay rehetra ataon''ny tananao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa ny tany tsy ilaozan''olo-malahelo, koa izany no andidiako anao hoe: Sokafy tsara amin''ny rahalahinao ny tananao, dia amin''ny malahelo sy ny mahantra eo amin''ny taninao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Raha hamidy aminao ny namanao, na lehilahy Hebreo, na vehivavy Hebreo, ka efa nanompo anao enin-taona, dia hovotsoranao ho afaka izy amin''ny taona fahafito. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary raha hovotsoranao ho afaka izy, dia tsy havelanao handeha fotsiny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'fa hisy hampitondrainao azy avy amin''ny ondry aman''osinao ary avy amin''ny famoloanao sy ny famiazanao: araka izay efa nitahian''i Jehovah Andriamanitrao anao no hanomezanao azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary tsarovy fa andevo tany amin''ny tany Egypta ianao, nefa Jehovah Andriamanitrao efa nanavotra anao, koa izany no andidiako anao izao zavatra izao anio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Kanefa raha hoy izy aminao: Tsy hiala aminao aho, satria tsy foiny ianao sy ny ankohonanao, ka finaritra aminao izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'dia halainao ny haolo ka hotevehinao amin''ny varavarana ny sofiny, dia ho mpanomponao mandrakizay izy. Ary toy izany koa no hataonao amin''ny ankizivavinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Aza ataonao ho sarotra ny hamotsotra azy ho afaka, fa indroa toraka ny karaman'ny mpikarama no azonao tamin'ny nanompoany anao enin-taona; dia hitahy anao Jehovah Andriamanitrao amin'izay rehetra ataonao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny lahy rehetra amin''ny voalohan-teraky ny ombinao sy ny ondry aman''osinao dia hohamasininao ho an''i Jehovah Andriamanitrao; aza mampiasa ny voalohan-teraky ny ombinao, na manety ny voalohan-teraky ny ondry aman''osinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Eo anatrehan''i Jehovah Andriamanitrao no hihinananao sy ny ankohonanao azy isan-taona isan-taona eo amin''ny fitoerana izay hofidin''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa raha misy kilemany izy: na mandringa, na jamba, na izay kilema ratsy hafa akory, dia aza vonoinao hatao fanatitra ho an''i Jehovah Andriamanitrao ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ao an-tanànanao ihany no hihinananao ireny; na ny olona maloto na ny madio dia samy mahazo mihinana azy, tahaka ny ahazoany mihinana ny gazela sy ny diera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Kanefa ny ràny no aza hanina, fa aidino amin'ny tany toy ny rano.
