document_id: JOB.3,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fitarainan'i Joba noho ny fahoriana nanjo azy
  - type: text
    content: 'Rehefa afaka izany, dia niloa-bava Joba ka nanozona ny androny '
  '10':
  - type: text
    content: Satria tsy nanidy ny varavaran'ny kibon'ineny izy ka tsy nanafina fahoriana tamin'ny masoko.
  '11':
  - type: text
    content: Nahoana re aho no tsy maty hatrany am-bohoka e, ary tsy niala aina, fony vao nivoaka avy tany an-kibo e?
  '12':
  - type: text
    content: Nahoana no nisy lohalika niandry ahy? Ary nahoana no nisy nono hinonoako?
  '13':
  - type: text
    content: Fa raha tsy izany, dia efa nandry aho toy izay ka niadana, eny, natory aho ka afa-tsasatra,
  '14':
  - type: text
    content: Teo amin'ny mpanjaka sy ny mpanolo-tsaina avy amin'ny tany, izay nanao
  - type: note
    content: 'Na: namboatra'
  - type: text
    content: ' ireny tanàna efa rava'
  - type: note
    content: 'Na: fasana lehibe'
  - type: text
    content: ','
  '15':
  - type: text
    content: Na teo amin'ny andriandahy izay manana volamena sady mameno volafotsy ny tranony;
  '16':
  - type: text
    content: Na efa tsy ary toy ny zaza tsy tonga volana aho ka nafenina, dia toy ny zaza izay tsy nahita ny mazava akory.
  '17':
  - type: text
    content: Any no itsaharan'ny ratsy fanahy tsy hampitebiteby, ary any ny reraka no afa-tsasatra;
  '18':
  - type: text
    content: Miara-miadana avokoa ny mpifatotra; Tsy mandre ny feon'ny mpampiasa izy.
  '19':
  - type: text
    content: Samy any ny kely sy ny lehibe, Ary ny mpanompo dia afaka amin'ny tompony.
  '2':
  - type: text
    content: 'nanao hoe:'
  '20':
  - type: text
    content: Nahoana no fahazavana no mba omena ny reraka, ary fiainana ho an'izay latsaka amin'ny fangidiana?
  '21':
  - type: text
    content: 'Izay miandry fahafatesana, nefa tsy avy izy, sady mitady azy mihoatra noho ny fitady harena nafenina:'
  '22':
  - type: text
    content: Izay faly indrindra sady ravoravo, raha mahita ny fasana,
  '23':
  - type: text
    content: Dia olona izay mandeha ao amin'ny maizina sady voafefin'Andriamanitra manodidina.
  '24':
  - type: text
    content: Fa mialoha ny haninkaniko ny fitolokoko, ary migororoana toy ny rano ny fidradradradrako;
  '25':
  - type: text
    content: Fa Izay atahorako no mahazo ahy, ary izay angovitako no manjo ahy.
  '26':
  - type: text
    content: Tsy mbola nahita fiadanana na fitsaharana na fakàna aina akory aza aho, dia tonga indray ny tebiteby.
  '3':
  - type: text
    content: 'Foàna anie ny andro nahaterahako sy ny alina izay nanao hoe: Misy zazalahy vao torontoronina!'
  '4':
  - type: text
    content: Izany andro izany dia aoka ho maizina, ary aoka tsy hitady azy Andriamanitra any ambony; ary aoka tsy hisy mazava hamirapiratra aminy;
  '5':
  - type: text
    content: Aoka ny aizina sy ny aloky ny fahafatesana hahalasa azy indray
  - type: note
    content: Na:handoto azy
  - type: text
    content: ; Aoka ny rahona hitatao eo amboniny; Aoka izay zavatra mahamaizina ny andro hampahatsiravina azy.
  '6':
  - type: text
    content: Izany alina izany aoka ny aizim-pito hisambotra azy; Aoka tsy hiara-mifaly amin'ny andron'ny taona izy. Ary tsy ho tonga amin'ny isan'ny volana;
  '7':
  - type: text
    content: Indro izany alina izany aoka ho momba izy; Aoka tsy ho velona ao ny hoby;
  '8':
  - type: text
    content: Aoka hanozona azy ny mpanozona andro, Izay mahay mamoha ny dragona;
  '9':
  - type: text
    content: Aoka ho maizina ny kintan'ny marainany; Aoka hiandry ny mazava izy, nefa tsy hisy, ary aoka tsy ho faly mahita ny hodimason'ny maraina izy,
