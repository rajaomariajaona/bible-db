document_id: JOB.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitarainan'i Joba noho ny fahoriana nanjo azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa afaka izany, dia niloa-bava Joba ka nanozona ny androny '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Foàna anie ny andro nahaterahako sy ny alina izay nanao hoe: Misy zazalahy vao torontoronina!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izany andro izany dia aoka ho maizina, ary aoka tsy hitady azy Andriamanitra any ambony; ary aoka tsy hisy mazava hamirapiratra aminy;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Aoka ny aizina sy ny aloky ny fahafatesana hahalasa azy indray
  - type: usfm
    marker: x
    children:
    - type: text
      text: Na:handoto azy
    marker-yv: yv-n
  - type: text
    text: ; Aoka ny rahona hitatao eo amboniny; Aoka izay zavatra mahamaizina ny andro hampahatsiravina azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izany alina izany aoka ny aizim-pito hisambotra azy; Aoka tsy hiara-mifaly amin'ny andron'ny taona izy. Ary tsy ho tonga amin'ny isan'ny volana;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Indro izany alina izany aoka ho momba izy; Aoka tsy ho velona ao ny hoby;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Aoka hanozona azy ny mpanozona andro, Izay mahay mamoha ny dragona;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aoka ho maizina ny kintan'ny marainany; Aoka hiandry ny mazava izy, nefa tsy hisy, ary aoka tsy ho faly mahita ny hodimason'ny maraina izy,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Satria tsy nanidy ny varavaran'ny kibon'ineny izy ka tsy nanafina fahoriana tamin'ny masoko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nahoana re aho no tsy maty hatrany am-bohoka e, ary tsy niala aina, fony vao nivoaka avy tany an-kibo e?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nahoana no nisy lohalika niandry ahy? Ary nahoana no nisy nono hinonoako?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa raha tsy izany, dia efa nandry aho toy izay ka niadana, eny, natory aho ka afa-tsasatra,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Teo amin'ny mpanjaka sy ny mpanolo-tsaina avy amin'ny tany, izay nanao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: namboatra'
    marker-yv: yv-n
  - type: text
    text: ' ireny tanàna efa rava'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fasana lehibe'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Na teo amin'ny andriandahy izay manana volamena sady mameno volafotsy ny tranony;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Na efa tsy ary toy ny zaza tsy tonga volana aho ka nafenina, dia toy ny zaza izay tsy nahita ny mazava akory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Any no itsaharan'ny ratsy fanahy tsy hampitebiteby, ary any ny reraka no afa-tsasatra;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Miara-miadana avokoa ny mpifatotra; Tsy mandre ny feon'ny mpampiasa izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Samy any ny kely sy ny lehibe, Ary ny mpanompo dia afaka amin'ny tompony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nahoana no fahazavana no mba omena ny reraka, ary fiainana ho an'izay latsaka amin'ny fangidiana?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Izay miandry fahafatesana, nefa tsy avy izy, sady mitady azy mihoatra noho ny fitady harena nafenina:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Izay faly indrindra sady ravoravo, raha mahita ny fasana,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia olona izay mandeha ao amin'ny maizina sady voafefin'Andriamanitra manodidina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fa mialoha ny haninkaniko ny fitolokoko, ary migororoana toy ny rano ny fidradradradrako;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa Izay atahorako no mahazo ahy, ary izay angovitako no manjo ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tsy mbola nahita fiadanana na fitsaharana na fakàna aina akory aza aho, dia tonga indray ny tebiteby.
