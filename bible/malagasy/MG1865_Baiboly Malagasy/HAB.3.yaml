document_id: HAB.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vavaka nangatahan'ny mpaminany famindram-po
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny fivavak'i Habakoka mpaminany. Araka ny Sigionota.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Jehovah ô, efa reko ny filazana Anao, ka raiki-tahotra aho; Jehovah ô, velomy ny asanao ao an-tenatenan'ny taona, Ataovy fantatra ao an-tenatenan'ny taona izany; Na dia tezitra aza Hianao, tsarovy ny indrafo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tamy avy any Temana Andriamanitra, Dia ny iray Masina avy any an-tendrombohitra Parana. [Sela] Manarona ny lanitra ny voninahiny, Ary manenika ny tany ny fiderana Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Misy famirapiratana toy ny mazava, Ary misy tàna-masoandro avy eo amin'ny tànany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: avy eo anilany'
    marker-yv: yv-n
  - type: text
    text: ; Ary ao no fieren'ny heriny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Eo alohany no andehanan'ny areti-mandringana, Ary areti-mandripaka
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: zava-mahamay'
    marker-yv: yv-n
  - type: text
    text: ' no mivoaka avy eo aoriany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mijanona Izy ka manozongozona ny tany; Mijery Izy ka mampangovitra ny firenena, Ary torotoro ny tendrombohitra mandrakizay, Mietry ny havoana fahagola, Fanaony hatry ny fahagola ny Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mahita ny lain'i Kosana azom-pahoriana aho, Sady mipararetra ny ambain-dain'ny tany Midiana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Moa amin'ny ony va no irehetan'ny fahatezeran'i Jehovah ? Amin'ny ony va no ahatezeranao, Na amin'ny ranomasina va no ahasosoranao, No dia mitaingina ny soavalinao sy ny kalesim-pamonjenao Hianao ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nalan-tsarona ny tsipìkanao; Efa nianianana ny fikapohan'ny teny
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny fiainana tamin''ny firenena dia teny'
    marker-yv: yv-n
  - type: text
    text: . [Sela] Namakivaky ny tany Hianao mba hisy ony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nahita Anao ny tendrombohitra ka toran-kovitra; Mirotsaka
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Mandalo
    marker-yv: yv-n
  - type: text
    text: ' ny ranonorana mivatravatra, Mamoa-peo ny lalina Sady manangan-tanana ho amin''ny avo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny masoandro sy ny volana niditra teo amin'ny fitoerany, Noho ny fahazavan'ny zana-tsipìkanao mitsoriaka Sy ny fanelatselatry ny lefonao mamirapiratra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Amin'ny fahatezeranao no anitsahanao ny tany; Amin'ny fahaviniranao no anosihosenao ny firenena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mivoaka hamonjy ny olonao Hianao, dia hamonjy ny voahosotrao; Torotoroinao ny tapenaky ny tranon
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lohan'
    marker-yv: yv-n
  - type: text
    text: '''ny ratsy fanahy, Ka ahariharinao hatreo an-tenatenany'
  - type: usfm
    marker: x
    children:
    - type: text
      text: an-katony
    marker-yv: yv-n
  - type: text
    text: ' ny fanorenany. [sela]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny lefony ihany no anaboroahanao ny lohan'ireo miaramilany betsaka, Izay avy toy ny tadio hanely ahy, Sady mifaly handany mangingina ny ory izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mitety ny ranomasina amin'ny soavalinao Hianao, Dia eny amin'ny rano be miavovona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Nony mandre aho, dia mandevilevy ny kiboko; Ny molotro mipararetra noho ny feo; Azon'ny fahalòvana ny taolako, ary mangovitra aho; Fa tsy maintsy miandry ny andro fahoriana aho, Dia izay hiakaran'ny mpanao an-diany hamely ny olonao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa na dia tsy mamontsina aza ny aviavy, Ary tsy misy voany ny voaloboka, Na dia mahadiso fanantenana aza ny oliva, Ary tsy mahavokatra hohanina ny saha, Na dia vonoina aza ny ondry ao amin'ny vala, Ary tsy misy omby ao am-pahitra,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nefa izaho dia mbola hifaly amin'i Jehovah ihany Sy hiravoravo amin'Andriamanitry ny famonjena ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Jehovah Tompo no tanjako, Ary manao ny tongotro ho toy ny an'ny dieravavy Izy Ka mampandeha ahy any amin'ny havoanako. Ho an'ny mpiventy hira. Hampiarahina amin'ny valiha.
