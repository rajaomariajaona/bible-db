document_id: EXO.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fahasivy: ny aizim-pito'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hoy Jehovah tamin''i Mosesy: Mankanesa ao amin''i Farao; fa Izaho efa nanamafy ny fony sy ny fon''ny mpanompony, mba hanehoako izao famantarako izao eo aminy; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ary mba holazainao ho ren''ny zanakao sy ny zafinao izay zavatra nataoko teto Egypta sy izay famantarana nataoko teo aminy, mba ho fantatrareo fa Izaho no Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Mosesy sy Arona dia nankao amin''i Farao ka nanao taminy hoe: Izao no lazain''i Jehovah, Andriamanitry ny Hebreo: Mandrapahoviana no handavanao tsy hanetry tena eo anatrehako? alefaso ny oloko mba hanompo Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa raha mandà ka tsy mandefa ny oloko ianao, indro, hahatonga valala amin''ny taninao rehetra Aho rahampitso; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'dia handrakotra ny tany rehetra ireny, ka tsy ho hita ny tany; dia hohaniny ny sisan''ny havandra, izay navela ho anareo, ka hohaniny avokoa ny hazo rehetra izay maniry ho anareo any an-tsaha; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'dia hameno ny tranonao sy ny tranon''ny mpanomponao rehetra ary ny tranon''ny Egyptiana rehetra ireny; ary tsy mbola hitan''ny rainao na ny raibenao izay toy izay hatr''izay andro niainany tetỳ ambonin''ny tany ka mandraka androany. Dia nihodina izy ka niala teo amin''i Farao. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy ny mpanompon''i Farao taminy: Mandra-pahoviana no ho fandrika amintsika iny lehilahy iny? alefaso ireo olona ireo hanompo an''i Jehovah Andriamaniny; tsy mbola fantatrao va fa efa simba Egypta? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nisy nampiverina an''i Mosesy sy Arona hankao amin''i Farao indray: ary hoy izy taminy: Mandehana, manompo an''i Jehovah Andriamanitrareo; nefa iza avy moa no handeha? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy Mosesy: Ny tanora sy ny antitra aminay ho entinay handeha, ary ny zanakai-lahy sy ny zanakai-vavy sy ny ondry aman''osinay ary ny ombinay ho entinay handeha; fa hisy andro firavoravoanay ho an''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa hoy Farao taminy: Aoka homba anareo ihany anie Jehovah, raha handefa anareo mbamin''ny zanakareo madinika aho; mitandrema, fa misy ratsy eo anoloanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tsy izany, fa mandehana ianareo lehilahy lehibe ka manompoa an''i Jehovah, fa izany no tadiavinareo. Ary izy roa lahy dia noroahina hiala teo anatrehan''i Farao. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy Jehovah tamin''i Mosesy: Ahinjiro ambonin''ny tany Egypta ny tananao hihavian''ny valala, dia hiakatra ho eto amin''ny tany Egypta ireny, ary dia hihinana ny zava-maniry amin''ny tany, dia izay rehetra sisan''ny havandra. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nahinjitr''i Mosesy tambonin''ny tany Egypta ny tehiny, ary Jehovah nitondra rivotra avy any atsinanana hankany amin''ny tany mandritra iny andro sy iny alina iny; ary nony maraina dia nitondra ny valala ny rivotra avy any atsinanana. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny valala niakatra ho amin''ny tany Egypta rehetra, dia nipetraka nanerana ny tany Egypta rehetra; ary nampahory indrindra ireny, ka tsy nisy valala toy izany tany aloha, ary ato aoriany koa tsy hisy toy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa nandrakotra ny tany rehetra ireny, ka efa maizina ny tany; ary nohaniny ny anana rehetra teo amin''ny tany sy ny voankazo rehetra, izay sisan''ny havandra; ka dia tsy nisy sisa ny zava-maitso eran''ny tany Egypta rehetra, na tamin''ny hazo, na tamin''ny anana tany an-tsaha. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary Farao dia nampaka an''i Mosesy sy Arona faingana ka nanao hoe: Efa nanota tamin''i Jehovah Andriamanitrareo sy taminareo aho. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ankehitriny, masìna ianao mamela ny fahotako izao indray mandeha izao ihany, ka mangataha amin''i Jehovah Andriamanitrareo hampialany amiko izao mahafaty iray loha izao monja. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia niala teo amin''i Farao izy ka nangataka tamin''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary Jehovah nahatonga rivotra mahery indrindra avy andrefana kosa, izay nitondra ny valala ka namarina azy tao amin''ny Ranomasina Mena; dia tsy nisy sisa intsony ny valala eran''ny tany Egypta rehetra, na dia iray akory aza. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nefa Jehovah nanamafy ny fon'i Farao, ka tsy nandefa ny Zanak'Isiraely izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy Jehovah tamin''i Mosesy: Ahinjiro manandrify ny lanitra ny tananao, mba hisy aizina amin''ny tany Egypta, dia aizina azo tsapaina. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia nahinjitr''i Mosesy nanandrify ny lanitra ny tànany; dia nisy aizim-pito eran''ny tany Egypta rehetra hateloana, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: koa tsy mba nifankahita ny olona, na niala tamin'izay nitoerany, hateloana; fa ny Zanak'Isiraely rehetra kosa nisy mazava teo amin'ny fonenany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary Farao dia nampaka an''i Mosesy ka nanao hoe: Mandehana ianareo, manompoa an''i Jehovah; fa ny ondry aman''osinareo sy ny ombinareo ihany no aoka havelanareo; ary ny zanakareo madinika dia aoka hiaraka aminareo koa. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy Mosesy: Hianao no hanolotra eto an-tananay izay fanatitra dorana sy fanatitra hafa alatsa-drà haterinay ho an''i Jehovah Andriamanitray; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ary ny omby aman''ondrinay dia ho entinay hiaraka aminay koa; fa tsy hisy havela na dia ny kitrony iray aza, satria ireny no hangalanay hanompoana an''i Jehovah Andriamanitray; ary tsy mbola fantatray izay ho entinay manompo an''i Jehovah mandra-pahatonganay any. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary Jehovah dia nanamafy ny fon''i Farao, ka tsy nety nandefa azy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary hoy Farao taminy: Mialà amiko; koa mitandrema, fa aoka tsy hahita ny tavako intsony ianao; fa amin''izay andro hahitanao ny tavako dia ho faty ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary hoy Mosesy: Marina izay nolazainao; fa tsy hahita ny tavanao intsony aho.'
