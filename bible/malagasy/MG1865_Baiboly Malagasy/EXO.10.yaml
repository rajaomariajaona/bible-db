document_id: EXO.10,96
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Fahasivy: ny aizim-pito'
  - type: text
    content: 'Ary hoy Jehovah tamin''i Mosesy: Mankanesa ao amin''i Farao; fa Izaho efa nanamafy ny fony sy ny fon''ny mpanompony, mba hanehoako izao famantarako izao eo aminy; '
  '10':
  - type: text
    content: 'Fa hoy Farao taminy: Aoka homba anareo ihany anie Jehovah, raha handefa anareo mbamin''ny zanakareo madinika aho; mitandrema, fa misy ratsy eo anoloanareo. '
  '11':
  - type: text
    content: 'Tsy izany, fa mandehana ianareo lehilahy lehibe ka manompoa an''i Jehovah, fa izany no tadiavinareo. Ary izy roa lahy dia noroahina hiala teo anatrehan''i Farao. '
  '12':
  - type: text
    content: 'Ary hoy Jehovah tamin''i Mosesy: Ahinjiro ambonin''ny tany Egypta ny tananao hihavian''ny valala, dia hiakatra ho eto amin''ny tany Egypta ireny, ary dia hihinana ny zava-maniry amin''ny tany, dia izay rehetra sisan''ny havandra. '
  '13':
  - type: text
    content: 'Dia nahinjitr''i Mosesy tambonin''ny tany Egypta ny tehiny, ary Jehovah nitondra rivotra avy any atsinanana hankany amin''ny tany mandritra iny andro sy iny alina iny; ary nony maraina dia nitondra ny valala ny rivotra avy any atsinanana. '
  '14':
  - type: text
    content: 'Ary ny valala niakatra ho amin''ny tany Egypta rehetra, dia nipetraka nanerana ny tany Egypta rehetra; ary nampahory indrindra ireny, ka tsy nisy valala toy izany tany aloha, ary ato aoriany koa tsy hisy toy izany. '
  '15':
  - type: text
    content: 'Fa nandrakotra ny tany rehetra ireny, ka efa maizina ny tany; ary nohaniny ny anana rehetra teo amin''ny tany sy ny voankazo rehetra, izay sisan''ny havandra; ka dia tsy nisy sisa ny zava-maitso eran''ny tany Egypta rehetra, na tamin''ny hazo, na tamin''ny anana tany an-tsaha. '
  '16':
  - type: text
    content: 'Ary Farao dia nampaka an''i Mosesy sy Arona faingana ka nanao hoe: Efa nanota tamin''i Jehovah Andriamanitrareo sy taminareo aho. '
  '17':
  - type: text
    content: 'Ary ankehitriny, masìna ianao mamela ny fahotako izao indray mandeha izao ihany, ka mangataha amin''i Jehovah Andriamanitrareo hampialany amiko izao mahafaty iray loha izao monja. '
  '18':
  - type: text
    content: 'Dia niala teo amin''i Farao izy ka nangataka tamin''i Jehovah. '
  '19':
  - type: text
    content: 'Ary Jehovah nahatonga rivotra mahery indrindra avy andrefana kosa, izay nitondra ny valala ka namarina azy tao amin''ny Ranomasina Mena; dia tsy nisy sisa intsony ny valala eran''ny tany Egypta rehetra, na dia iray akory aza. '
  '2':
  - type: text
    content: 'ary mba holazainao ho ren''ny zanakao sy ny zafinao izay zavatra nataoko teto Egypta sy izay famantarana nataoko teo aminy, mba ho fantatrareo fa Izaho no Jehovah. '
  '20':
  - type: text
    content: Nefa Jehovah nanamafy ny fon'i Farao, ka tsy nandefa ny Zanak'Isiraely izy.
  '21':
  - type: text
    content: 'Ary hoy Jehovah tamin''i Mosesy: Ahinjiro manandrify ny lanitra ny tananao, mba hisy aizina amin''ny tany Egypta, dia aizina azo tsapaina. '
  '22':
  - type: text
    content: 'Dia nahinjitr''i Mosesy nanandrify ny lanitra ny tànany; dia nisy aizim-pito eran''ny tany Egypta rehetra hateloana, '
  '23':
  - type: text
    content: koa tsy mba nifankahita ny olona, na niala tamin'izay nitoerany, hateloana; fa ny Zanak'Isiraely rehetra kosa nisy mazava teo amin'ny fonenany.
  '24':
  - type: text
    content: 'Ary Farao dia nampaka an''i Mosesy ka nanao hoe: Mandehana ianareo, manompoa an''i Jehovah; fa ny ondry aman''osinareo sy ny ombinareo ihany no aoka havelanareo; ary ny zanakareo madinika dia aoka hiaraka aminareo koa. '
  '25':
  - type: text
    content: 'Ary hoy Mosesy: Hianao no hanolotra eto an-tananay izay fanatitra dorana sy fanatitra hafa alatsa-drà haterinay ho an''i Jehovah Andriamanitray; '
  '26':
  - type: text
    content: 'ary ny omby aman''ondrinay dia ho entinay hiaraka aminay koa; fa tsy hisy havela na dia ny kitrony iray aza, satria ireny no hangalanay hanompoana an''i Jehovah Andriamanitray; ary tsy mbola fantatray izay ho entinay manompo an''i Jehovah mandra-pahatonganay any. '
  '27':
  - type: text
    content: 'Ary Jehovah dia nanamafy ny fon''i Farao, ka tsy nety nandefa azy izy. '
  '28':
  - type: text
    content: 'Ary hoy Farao taminy: Mialà amiko; koa mitandrema, fa aoka tsy hahita ny tavako intsony ianao; fa amin''izay andro hahitanao ny tavako dia ho faty ianao. '
  '29':
  - type: text
    content: 'Ary hoy Mosesy: Marina izay nolazainao; fa tsy hahita ny tavanao intsony aho.'
  '3':
  - type: text
    content: 'Ary Mosesy sy Arona dia nankao amin''i Farao ka nanao taminy hoe: Izao no lazain''i Jehovah, Andriamanitry ny Hebreo: Mandrapahoviana no handavanao tsy hanetry tena eo anatrehako? alefaso ny oloko mba hanompo Ahy. '
  '4':
  - type: text
    content: 'Fa raha mandà ka tsy mandefa ny oloko ianao, indro, hahatonga valala amin''ny taninao rehetra Aho rahampitso; '
  '5':
  - type: text
    content: 'dia handrakotra ny tany rehetra ireny, ka tsy ho hita ny tany; dia hohaniny ny sisan''ny havandra, izay navela ho anareo, ka hohaniny avokoa ny hazo rehetra izay maniry ho anareo any an-tsaha; '
  '6':
  - type: text
    content: 'dia hameno ny tranonao sy ny tranon''ny mpanomponao rehetra ary ny tranon''ny Egyptiana rehetra ireny; ary tsy mbola hitan''ny rainao na ny raibenao izay toy izay hatr''izay andro niainany tetỳ ambonin''ny tany ka mandraka androany. Dia nihodina izy ka niala teo amin''i Farao. '
  '7':
  - type: text
    content: 'Ary hoy ny mpanompon''i Farao taminy: Mandra-pahoviana no ho fandrika amintsika iny lehilahy iny? alefaso ireo olona ireo hanompo an''i Jehovah Andriamaniny; tsy mbola fantatrao va fa efa simba Egypta? '
  '8':
  - type: text
    content: 'Dia nisy nampiverina an''i Mosesy sy Arona hankao amin''i Farao indray: ary hoy izy taminy: Mandehana, manompo an''i Jehovah Andriamanitrareo; nefa iza avy moa no handeha? '
  '9':
  - type: text
    content: 'Ary hoy Mosesy: Ny tanora sy ny antitra aminay ho entinay handeha, ary ny zanakai-lahy sy ny zanakai-vavy sy ny ondry aman''osinay ary ny ombinay ho entinay handeha; fa hisy andro firavoravoanay ho an''i Jehovah. '
