document_id: NUM.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny raharahan'ny Levita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy tany an-efitr''i Sinay, tao amin''ny trano-lay fihaonana tamin''ny andro voalohany tamin''ny volana faharoa, tamin''ny taona faharoa taorian''ny nivoahany avy tany amin''ny tany Egypta, ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alao isa ny fiangonana, dia ny Zanak''Isiraely rehetra, araka ny fokony sy ny fianakaviany avy, ary araka ny anarany tsirairay, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia ny lehilahy rehetra amin''ny Isiraely hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo alefa hanafika; handamina azy araka ny antokony avy ianao sy Arona. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary aoka hisy lehilahy iray avy isam-pirenena ho namanareo, dia izay samy lohan''ny fianakaviany avy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary izao no anaran''ireo lehilahy ho namanareo ireo: Ny avy amin''i Robena dia Elizora, zanak''i Sedeora; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ny avy amin''i Simeona dia Selomiela, zanak''i Zorisaday; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ny avy amin''i Joda dia Nasona, zanak''i Aminadaba; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ny avy amin''Isakara dia Netanela, zanak''i Zoara; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ny avy amin''i Zebolona dia Eliaba, zanak''i Helona; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ny avy amin''ny zanak''i Josefa dia Elisama, zanak''i Amihoda, avy amin''i Efraima, ary Gamaliela, zanak''i Pedazora, avy amin''i Manase kosa; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ny avy amin''i Benjamina dia Abidana, zanak''i Gideony; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ny avy amin''i Dana dia Ahiezera, zanak''i Amisaday; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ny avy amin''i Asera dia Fagiela, zanak''i Okrana; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ny avy amin''i Gada dia Eliasafa, zanak''i Doela; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ny avy amin''i Naftaly dia Ahira, zanak''i Enana. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ireo no voafidin''ny fiangonana, dia samy lohan''ny fireneny avy sady mpifehy arivo amin''ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Mosesy sy Arona naka ireo olona voatonona anarana ireo, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'dia namory ny fiangonana rehetra tamin''ny andro voalohany tamin''ny volana faharoa; ary samy nampanoratra ny anarany avy izy araka ny firazanany, dia araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin''ny roa-polo taona no ho miakatra. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Araka izay nandidian''i Jehovah an''i Mosesy no nandaminany azy tany an-efitr''Sinay. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary tamin''ny taranak''i Robena, lahimatoan''Isiraely, araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, dia ny lehilahy rehetra hatramin''ny roa-polo taona no ho miakatra izay azo nalefa hanafika, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: izay voalamina avy tamin'ny firenen'i Robena dia diman-jato amby enina arivo sy efatra alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary tamin''ny taranak''i Simeona araka ny fokony sy ny fianakaviany, dia izay rehetra voalamina, araka ny anarany tsirairay, dia ny lehilahy rehetra hatramin''ny roa-polo taona no ho miakatra, izay azo nalefa hanafika '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: izay voalamina avy tamin'ny firenen'i Simeona dia telon-jato amby sivy arivo sy dimy alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary tamin''ny taranak''i Gada araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo nalefa hanafika, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: izay voalamina avy tamin'ny firenen'i Gada dia dimam-polo amby enin-jato sy dimy arivo sy efatra alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary tamin''ny taranak''i Joda araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo nalefa hanafika, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: izay voalamina avy tamin'ny firenen'i Joda dia enin-jato amby efatra arivo sy fito alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary tamin''ny taranak''Isakara araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo nalefa hanafika, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: izay voalamina avy tamin'ny firenen'Isakara dia efa-jato amby efatra arivo sy dimy alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary tamin''ny taranak''i Zebolona araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo nalefa hanafika, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: izay voalamina avy tamin'ny firenen'i Zebolona dia efa-jato amby fito arivo sy dimy alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary tamin''ny taranak''i Josefa: dia avy tamin''ny taranak''i Efraima araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo nalefa hanafika, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: izay voalamina avy tamin'ny firenen'i Efraima dia diman-jato amby efatra alina;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'ary tamin''ny taranak''i Manase araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo nalefa hanafika, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: izay voalamina avy tamin'ny firenen'i Manase dia roan-jato amby roa arivo sy telo alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary tamin''ny taranak''i Benjamina araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo nalefa hanafika, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: izay voalamina avy tamin'ny firenen'i Benjamina dia efa-jato amby dimy arivo sy telo alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary tamin''ny taranak''i Dana araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo nalefa hanafika, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: izay voalamina avy tamin'ny firenen'i Dana dia fiton-jato amby roa arivo sy enina alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary tamin''ny taranak''i Asera araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo nalefa hanafika '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: izay voalamina avy tamin'ny firenen'i Asera dia diman-jato amby arivo sy efatra alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary tamin''ny taranak''i Naftaly araka ny fokony sy ny fianakaviany, ary araka ny anarany tsirairay, hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo nalefa hanafika, '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: izay voalamina avy tamin'ny firenen'i Asera dia efa-jato amby telo arivo sy dimy alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ireo no voalamin''i Mosesy sy Arona ary ny roa ambin''ny folo lahy lehibe amin''ny Isiraely, izay samy lohan''ny fianakaviany avy. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary izay rehetra avy tamin''ny Zanak''Isiraely araka ny fianakaviany, hatramin''ny roa-polo taona no ho miakatra, dia izay rehetra azo nalefa hanafika avy amin''ny Isiraely, '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: dia dimam-polo amby dimam-jato sy telo arivo sy enina hetsy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Fa ny Levita, araka ny fireneny kosa dia tsy mba nalamina ho isan''ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Fa Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Ny firenen''ny Levita ihany no aza alamina, ary aza mba alaina isa miaraka amin''ny Zanak''Isiraely; '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'fa tendreo izy hitandrina ny tabernakelin''ny Vavolombelona sy ny fanaka rehetra ary ny zavatra rehetra izay momba azy; fa izy no hitondra ny tabernakely sy ny zavatra rehetra momba azy sady hanao fanompoam-pivavahana ao; ary manodidina ny tabernakely no hitobiany. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Ary raha hafindra ny tabernakely, dia ny Levita no hangorona azy; ary raha haorina ny tabernakely, dia ny Levita no hanangana azy; fa raha olon-kafa no manakaiky, dia hatao maty izy. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Dia hitoby ny Zanak''Isiraely, samy eo amin''ny tobiny avy, ary samy eo amin''ny fanevany ary, araka ny antokony. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Fa ny Levita kosa hitoby manodidina ny tabernakelin''ny Vavolombelona, mba tsy hisy fahatezerana hahatratra ny fiangonan''ny Zanak''Isiraely; ary ny Levita hitandrina ny anjara raharaha momba ny tabernakelin''ny Vavolombelona. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Dia nataon'ny Zanak'Isiraely izany; araka izay rehetra efa nandidian'i Jehovah an'i Mosesy no nataony.
