document_id: PSA.44
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fivavaky ny Isiraely nony saiky resim-pahavalo, nefa tsy nahafoy an'Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Nataon''ny Koraita. Maskila. Ny sofinay no nandrenesanay, Andriamanitra ô, ny razanay nilaza taminay ny asa nataonao tamin''ny androny, dia tamin''ny andro fahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny tananao no nandroahanao ny firenen-tsamy hafa, fa izy kosa nampitoerinao; efa nampahorinao ny firenena maro, fa izy kosa nataonao mahafeno tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa tsy ny sabany no nahazoany ny tany, ary tsy ny sandriny no namonjy azy; fa ny tananao ankavanana sy ny sandrinao ary ny fahazavan'ny tavanao, satria efa sitrakao izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hianao dia Hianao no Mpanjakako, Andriamanitra ô; Mandidia famonjena ho an''i Jakoba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hianao no hanosehanay ny fahavalonay; ny anaranao no hanitsahanay izay mitsangana hamely anay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa tsy ny tsipikako no itokiako, ary ny sabatro tsy hahavonjy ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa namonjy anay tamin''ny fahavalonay Hianao, ary ny nankahala anay dia nataonao menatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Andriamanitra no ankalazainay mandrakariva; ary ny anaranao no hoderainay mandrakizay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa efa nanary anay ianao ka nampahamenatra anay, ary tsy mba mivoaka miaraka amin''ny antokon''ny miaramilanay Hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ataonao miamboho ny fahavalonay izahay, koa ny mankahala anay dia nanaram-po namabo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Atolotrao tahaka ny ondry hohanina izahay, ary aelinao any amin''ny firenen-tsamy hafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mivarotra ny olonao tsy vola tsy harena Hianao, ka tsy mahazo tombony amin''ny vidiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ataonao fandatsan''ny olona miray monina aminay izahay, dia fanakora sy faneson''izay manodidina anay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ataonao ho ambentinteny amin''ny firenen-tsamy hafa izahay, dia fihifikifihan-doha amin''ny olona maro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tsaroako mandrakariva ny fahafaham-boninahitro, ary efa manafotra ahy ny fangaihaizako, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Noho ny feon'ny mpanaratsy sy ny mpanamavo, noho ny fahavalo sy ny mpamaly ratsy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Izany rehetra izany no manjo anay, nefa tsy manadino anao izahay ary tsy mivadika ny fanekenao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tsy mihemotra ny fonay, ary tsy miala amin''ny lalanao ny dianay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nefa Hianao nanorotoro anay teo amin'ny fitoeran'ny amboadia
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: jakala'
    marker-yv: yv-n
  - type: text
    text: ' sy nanarona anay tamin''ny aloky ny fahafatesana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Raha nanadino ny anaran''Andriamanitray izahay, na nananty tanana tamin''ny andriamani-kafa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tsy handinika izany va Andriamanitra? Fa Izy mahalala ny miafina ao am-po. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa noho ny aminao no amonoana anay mandrakariva; toy ny ondry hovonoina no fijery anay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mifohaza, ry Tompo ô, nahoana no matory Hianao? Mitsangàna, aza manary mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nahoana no manafina ny tavanao Hianao, ka manadino ny fahantranay sy ny fahorianay? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa miankohoka amin''ny vovoka ny fanahinay, miraikitra amin''ny tany ny kibonay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Mitsangàna hamonjy anay, ary avoty izahay araka ny famindram-ponao.
