document_id: PSA.44,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fivavaky ny Isiraely nony saiky resim-pahavalo, nefa tsy nahafoy an'Andriamanitra
  - type: text
    content: 'Ho an''ny mpiventy hira. Nataon''ny Koraita. Maskila. Ny sofinay no nandrenesanay, Andriamanitra ô, ny razanay nilaza taminay ny asa nataonao tamin''ny androny, dia tamin''ny andro fahiny. '
  '10':
  - type: text
    content: 'Ataonao miamboho ny fahavalonay izahay, koa ny mankahala anay dia nanaram-po namabo. '
  '11':
  - type: text
    content: 'Atolotrao tahaka ny ondry hohanina izahay, ary aelinao any amin''ny firenen-tsamy hafa. '
  '12':
  - type: text
    content: 'Mivarotra ny olonao tsy vola tsy harena Hianao, ka tsy mahazo tombony amin''ny vidiny. '
  '13':
  - type: text
    content: 'Ataonao fandatsan''ny olona miray monina aminay izahay, dia fanakora sy faneson''izay manodidina anay. '
  '14':
  - type: text
    content: 'Ataonao ho ambentinteny amin''ny firenen-tsamy hafa izahay, dia fihifikifihan-doha amin''ny olona maro. '
  '15':
  - type: text
    content: 'Tsaroako mandrakariva ny fahafaham-boninahitro, ary efa manafotra ahy ny fangaihaizako, '
  '16':
  - type: text
    content: Noho ny feon'ny mpanaratsy sy ny mpanamavo, noho ny fahavalo sy ny mpamaly ratsy.
  '17':
  - type: text
    content: 'Izany rehetra izany no manjo anay, nefa tsy manadino anao izahay ary tsy mivadika ny fanekenao. '
  '18':
  - type: text
    content: 'Tsy mihemotra ny fonay, ary tsy miala amin''ny lalanao ny dianay. '
  '19':
  - type: text
    content: Nefa Hianao nanorotoro anay teo amin'ny fitoeran'ny amboadia
  - type: note
    content: 'Na: jakala'
  - type: text
    content: ' sy nanarona anay tamin''ny aloky ny fahafatesana. '
  '2':
  - type: text
    content: 'Ny tananao no nandroahanao ny firenen-tsamy hafa, fa izy kosa nampitoerinao; efa nampahorinao ny firenena maro, fa izy kosa nataonao mahafeno tany. '
  '20':
  - type: text
    content: 'Raha nanadino ny anaran''Andriamanitray izahay, na nananty tanana tamin''ny andriamani-kafa, '
  '21':
  - type: text
    content: 'Tsy handinika izany va Andriamanitra? Fa Izy mahalala ny miafina ao am-po. '
  '22':
  - type: text
    content: Fa noho ny aminao no amonoana anay mandrakariva; toy ny ondry hovonoina no fijery anay.
  '23':
  - type: text
    content: 'Mifohaza, ry Tompo ô, nahoana no matory Hianao? Mitsangàna, aza manary mandrakizay. '
  '24':
  - type: text
    content: 'Nahoana no manafina ny tavanao Hianao, ka manadino ny fahantranay sy ny fahorianay? '
  '25':
  - type: text
    content: 'Fa miankohoka amin''ny vovoka ny fanahinay, miraikitra amin''ny tany ny kibonay. '
  '26':
  - type: text
    content: Mitsangàna hamonjy anay, ary avoty izahay araka ny famindram-ponao.
  '3':
  - type: text
    content: Fa tsy ny sabany no nahazoany ny tany, ary tsy ny sandriny no namonjy azy; fa ny tananao ankavanana sy ny sandrinao ary ny fahazavan'ny tavanao, satria efa sitrakao izy.
  '4':
  - type: text
    content: 'Hianao dia Hianao no Mpanjakako, Andriamanitra ô; Mandidia famonjena ho an''i Jakoba. '
  '5':
  - type: text
    content: 'Hianao no hanosehanay ny fahavalonay; ny anaranao no hanitsahanay izay mitsangana hamely anay. '
  '6':
  - type: text
    content: 'Fa tsy ny tsipikako no itokiako, ary ny sabatro tsy hahavonjy ahy. '
  '7':
  - type: text
    content: 'Fa namonjy anay tamin''ny fahavalonay Hianao, ary ny nankahala anay dia nataonao menatra. '
  '8':
  - type: text
    content: Andriamanitra no ankalazainay mandrakariva; ary ny anaranao no hoderainay mandrakizay.
  '9':
  - type: text
    content: 'Fa efa nanary anay ianao ka nampahamenatra anay, ary tsy mba mivoaka miaraka amin''ny antokon''ny miaramilanay Hianao. '
