document_id: NUM.11,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nimonomononan'ny Zanak'Isiraely tao Tabera sy Kibrota-hatava
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia nitaraim-pahoriana teo anatrehan''i Jehovah ny olona, ary nony ren''i Jehovah izany, dia nirehitra ny fahatezerany, ary ny afon''i Jehovah nandoro azy, ka may ny teo an-tsisin''ny toby. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Mosesy nandre ny olona nitomany tamin''ny isam-pianakaviany, samy teo amin''ny varavaran''ny lainy avy; dia nirehitra fatratra ny fahatezeran''i Jehovah; ary tsy sitrak''i Mosesy koa izany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Mosesy tamin''i Jehovah: Nahoana no dia nasianao ratsy ny mpanomponao? ary nahoana no tsy nahita fitia eo imasonao aho, ka nampitondrainao enta-mavesatra, dia ity firenena rehetra ity? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho va no torontoronina an''ity firenena rehetra ity? ary izaho va no niteraka azy, no ilazanao hoe: Trotroinao izy, tahaka ny ray mpitaiza mitondra ny zaza minono, ho any amin''ny tany izay nianiananao tamin''ny razany homena azy? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy aiza no hahazoako hena homena ity firenena rehetra ity, no dia mitomany amiko izy manao hoe: Omeo hena izahay hohaninay? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy zakako izaho irery ny mitondra ity firenena rehetra ity, fa mavesatra amiko loatra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa raha izao no ataonao amiko, masìna Hianao, vonoy mihitsy aho, raha nahita fitia eo imasonao; fa aza avela hahita ny fahoriako aho. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jehovah tamin''i Mosesy: Manangòna fito-polo lahy amin''ny loholon''ny Isiraely ho etỳ amiko, dia izay fantatrao ho loholona amin''ny fireneny sy mpifehy azy; ary ento miaraka aminao ho ao amin''ny trano-lay fihaonana izy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hidina Aho ka hiteny aminao eo; ary Izaho haka amin''ny Fanahy Izay ao aminao ka hametraka izany ao amin''ireo, ary hiara-mitondra ity firenena ity aminao ireo, fa tsy ianao irery intsony no hitondra azy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa lazao amin''ny olona hoe: Manamasìna ny tenanareo ho amin''ny ampitso, dia hihinan-kena ianareo; fa nitomany teo anatrehan''i Jehovah ianareo ka nanao hoe: Enga anie ka hisy hanome hena hohaninay! fa soa no hitanay tany Egypta; dia homen''i Jehovah hena ianareo, ka hohaninareo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy indray andro no hihinananareo na indroa andro, na hadimiana, na hafoloana, na roa-polo andro aza, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitaraina tamin''i Mosesy ny olona; ary Mosesy nifona tamin''i Jehovah, dia maty ny afo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa hatramin''ny iray volana mipaka, dia mandra-pivoakany amin''ny vavoronareo ka haharikoriko anareo; satria nolavinareo Jehovah, Izay eo aminareo, ka nitomany teo anatrehany ianareo nanao hoe: Nahoana re no nivoaka avy tany Egypta izahay? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Mosesy: Ny olona izay itoerako dia lehilahy enina hetsy izay mahalia lalana; ary hoy ianao: Homeko hena izy mba hohaniny mandritra ny iray volana. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa ondry aman''osy sy omby va no hovonoina ho azy hahavoky azy? sa ny hazandrano rehetra ao amin''ny ranomasina no hangonina ho azy hahavoky azy? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jehovah tamin''i Mosesy: Nihafohy va ny tànan''i Jehovah? ankehitriny dia ho hitanao na ho tanteraka aminao ny teniko, na tsia. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivoaka Mosesy ka nilaza ny tenin''i Jehovah tamin''ny olona; dia nanangona fito-polo lahy tamin''ny loholon''ny firenena izy ka nampitoetra azy manodidina ny trano-lay. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nidina teo amin''ny rahona Jehovah ka niteny taminy, dia nangalany ny Fanahy izay tao amin''i Mosesy ka napetrany tao amin''ny loholona fito-polo lahy; ary raha mbola nitoetra tao aminy ny Fanahy, dia naminany izy, nefa tsy nanao intsony. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nisy roa lahy nijanona teo an-toby, Eldada no anaran''ny anankiray, ary Medada no anaran''ny anankiray; ary ny Fanahy nitoetra tao aminy; ary isan''izay voasoratra izy roa lahy, nefa tsy mba nankeo amin''ny trano-lay; dia naminany teo an-toby izy roa lahy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy zatovo nihazakazaka, dia nilaza tamin''i Mosesy ka nanao hoe: Eldada sy Medada maminany etsy an-toby. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly Josoa, zanak''i Nona, izay nanompo an''i Mosesy hatry ny fony tanora, ka nanao hoe: Ry Mosesy, tompoko, rarao izy roa lahy. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Mosesy taminy: Izaho va no ialonanao? enga anie ka ho mpaminany avokoa ny olon''i Jehovah rehetra, ka halatsak''i Jehovah aminy ny Fanahiny! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny anaran'izany tany izany dia nataony hoe Tabera, satria nandoro azy ny afon'i Jehovah.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nankeo an-toby Mosesy sy ny loholon''ny Isiraely. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy rivotra nivoaka avy tamin''i Jehovah ka nitondra papelika avy tany amin''ny ranomasina ary nampihahakahaka azy teny amin''ny toby, ka tokony ho lalana indray andro manodidina ny toby no nisy azy, ary tokony ho roa hakiho ambonin''ny tany izy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitsangana ny olona nandritra izany andro izany sy nandritra ny alina sy ny ampitson''iny koa ka nanangona ny papelika; ary izay kely fanangona no folo homera; ary nahahiny ho maina ireny manodidina ny toby. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha mbola teo am-bavany ny hena ka tsy mbola lany, dia nirehitra tamin''ny olona ny fahatezeran''i Jehovah, ary namely ny olony tamin''ny kapoka mafy indrindra Izy. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny anaran''izany tany izany nataony hoe: Kibrota-hatava, satria teo no nandevenana ny olona izay liana. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary niala tao Kibrota-hatava ny olona ka nifindra nankany Hazerota; dia nitoetra tany Hazerota izy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny olona hafa firenena izay niharo taminy dia liana, ary ny Zanak''Isiraely koa dia nitomany indray hoe: Enga anie ka hisy hanome hena hohaninay! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsaroanay ny hazandrano izay nohaninay, maimaim-poana tany Egypta mbamin''ny voatango sy tongolo samy hafa karazana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao dia maina ny ainay: tsy misy na inona na inona eto imasonay afa-tsy ny mana ihany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mana dia toy ny voan-drafy, ary ny tarehiny dia tahaka ny tarehin''ny bedola. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nandehandeha ny olona ka nanangona azy, dia nitoto azy tamin''ny fikosoham-bary na tamin''ny laona, ary nahandro azy tamin''ny vilany, dia nanao mofo azy; ary ny fanandramana azy dia tahaka ny fanandramana mofo misy diloilo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha nilatsaka tamin''ny toby ny ando nony alina, dia nilatsaka koa niaraka taminy ny mana. '
