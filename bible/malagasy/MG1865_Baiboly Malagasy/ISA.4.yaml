document_id: ISA.4
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary amin''izany andro izany dia hisy vehivavy fito hihazona lehilahy iray ka hanao hoe: Ny haninay ihany no hohaninay, ary ny lambanay ihany no hotafinay; Fa izao ihany no angatahinay: Aoka hotononina amin''ny anaranao izahay, Ka afaho tondromaso'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Amin'izany andro izany ny rantsan
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: solofon'''
    marker-yv: yv-n
  - type: text
    text: '''i Jehovah dia ho tonga fahatsaran-tarehy sy voninahitra, Ary ny vokatry ny tany dia ho rehareha sy firavaka ho an''ny Isiraely sisa afaka; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary izay sisa any Ziona sy izay mbola mitoetra any Jerosalema dia hatao hoe masina. Dia izay rehetra voasoratra ho isan''ny velona any Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Rehefa voasasan''ny Tompo ho afaka amin''ny fahalotoany ireo zanakavavin''i Ziona, Ary rehefa voadion''ny fanahy fitsarana,sy ny fanahy fandringanana Jerosalema, Ho afaka amin''ny ran''olona nalatsany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Jehovah hamorona rahona sy setroka raha antoandro Sy fahazavan''ny afo midedadeda nony alina Ho eny ambonin''ny fitoerana rehetra any an-tendrombohitra Ziona Sy ho eny ambonin''ny fivoriany rehetra; Ary eny ambonin''ny voninahitra rehetra dia hisy eloelo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ka hisy trano-lay ho fialokalofana amin'ny hainandro raha antoandro Ary ho fialofana sy fierena amin'ny tafio-drivotra sy ny ranonorana.
