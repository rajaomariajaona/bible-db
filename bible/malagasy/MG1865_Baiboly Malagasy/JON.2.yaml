document_id: JON.2,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny namonjena an'i Jona, sy ny vavaka aman-tsaotra nataony
  - type: text
    content: 'Ary Jehovah nanomana hazandrano lehibe hitelina an''i Jona. Ary Jona dia tao an-kibon''ilay hazandrano hateloan''andro sy hateloan''alina. '
  '10':
  - type: text
    content: Fa izaho, dia feo midera no entiko mamono zavatra hatao fanatitra ho Anao, Ary izay nivoadiako dia hefaiko; An'i Jehovah ny famonjena.
  - type: text
    content: Ary Jehovah nandidy ilay hazandrano, ka dia naloany ho eny amin'ny tany maina Jona.
  '2':
  - type: text
    content: 'Dia nivavaka tamin''i Jehovah Andriamaniny tao an-kibon''ny hazandrano Jona '
  '3':
  - type: text
    content: 'ka nanao hoe: Niantso an''i Jehovah tamin''ny fahoriako aho, Ka dia namaly ahy Izy; Tao anatin''ny fiainan-tsi-hita'
  - type: note
    content: Heb. Shoela
  - type: text
    content: ' no nitarainako, Dia nihaino ny feoko Hianao.'
  '4':
  - type: text
    content: Fa efa natsipinao tao amin'ny lalina aho, Dia tao amin'ny ranomasina, Ka voasafotry ny riaka aho; Nanarona ahy ny alon-dranonao sy ny onjanao rehetra.
  '5':
  - type: text
    content: 'Dia hoy izaho: Voaroaka tsy ho eo anatrehanao aho, Nefa mbola nanatrika ny tempolinao masina ihany.'
  '6':
  - type: text
    content: Ny rano nanarona ahy hatramin'ny aiko, Ny lalina namefy ahy manodidina; Ny zava-maniry any an-dranomasina nisingotra manodidina ny lohako.
  '7':
  - type: text
    content: Tafalatsaka tany amin'ny fanambanin'ny tendrombohitra aho; Ny hidin'ny tany nanidy ahy mandrakizay; Nefa nampiakatra ny aiko avy tao an-davaka Hianao, Jehovah Andriamanitro ô.
  '8':
  - type: text
    content: Raha reraka tato anatiko ny fanahiko, Dia nahatsiaro an'i Jehovah aho; Ka tonga tao aminao ny fivavako, Dia tao amin'ny tempolinao masina.
  '9':
  - type: text
    content: Izay mivavaka amin'ny sampy
  - type: note
    content: Heb. zava-poana mandainga
  - type: text
    content: ' Dia mahafoy Izay Mpamindra fo aminy'
  - type: note
    content: Heb. ny famindram-pony
