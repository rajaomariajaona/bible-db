document_id: PSA.140,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fangataham-piarovana noho ny ataon'ny olona ratsy fanahy sy fetsy vava
  - type: text
    content: 'Ho an''ny mpiventy hira. Salamo nataon''i Davida. Jehovah ô, vonjeo amin''ny olon-dratsy aho, Ary arovy amin''ny olon-dozabe, '
  '10':
  - type: text
    content: 'Aoka hisy vain''afo halatsaka aminy; Aoka hariana any anaty afo izy, na any amin''ny rano lalina, ka tsy hiarina intsony. '
  '11':
  - type: text
    content: 'Tsy hampitoerina amin''ny tany ny olo-mahay vava; Henjehin-doza ny olon-dozabe ka ho lavo. '
  '12':
  - type: text
    content: 'Fantatro fa Jehovah no handahatra ny tenin''ny mahantra Sady hanome rariny ho an''ny malahelo. '
  '13':
  - type: text
    content: Eny tokoa, ny marina hisaotra ny anaranao; Hitoetra eo anatrehanao ny mahitsy.
  '2':
  - type: text
    content: 'Izay mihevitra ratsy ao am-pony Ka manangana ady isan''andro '
  '3':
  - type: text
    content: 'Mandranitra ny lelany tahaka ny bibilava izy, Ny poizin''ny menarana no ao ambanin''ny molony. '
  '4':
  - type: text
    content: 'Jehovah ô, vonjeo amin''ny tanan''ny ratsy fanahy aho, Ary arovy amin''ny olon-dozabe, Izay efa nihevitra handronjina ahy ho potraka. '
  '5':
  - type: text
    content: Ny mpiavonavona efa nanafina fandrika sy kofehy hamandrihany ahy; Efa namela-pandrika harato teo amoron-dalana izy; Nametraka tadivavarana hahazoany ahy izy.
  '6':
  - type: text
    content: 'Hoy izaho tamin''i Jehovah Andriamanitro Hianao; Henoy ny feon''ny fifonako, Jehovah ô! '
  '7':
  - type: text
    content: 'Jehovah, Tompo ô, ry Herin''ny famonjena ahy, Manarona ny lohako amin''ny andro fiadiana Hianao. '
  '8':
  - type: text
    content: 'Jehovah ô, aza manome ny irin''ny ratsy fanahy; Ary aza avela ho tanteraka ny hevi-dratsiny, fandrao hisandratra izy. '
  '9':
  - type: text
    content: 'Ny lohan''izay manemitra ahy Dia aoka hosaronan''ny ratsy tononin''ny molony. '
