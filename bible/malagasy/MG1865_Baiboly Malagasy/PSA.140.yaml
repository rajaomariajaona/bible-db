document_id: PSA.140,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fangataham-piarovana noho ny ataon'ny olona ratsy fanahy sy fetsy vava
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ho an''ny mpiventy hira. Salamo nataon''i Davida. Jehovah ô, vonjeo amin''ny olon-dratsy aho, Ary arovy amin''ny olon-dozabe, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Aoka hisy vain''afo halatsaka aminy; Aoka hariana any anaty afo izy, na any amin''ny rano lalina, ka tsy hiarina intsony. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tsy hampitoerina amin''ny tany ny olo-mahay vava; Henjehin-doza ny olon-dozabe ka ho lavo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fantatro fa Jehovah no handahatra ny tenin''ny mahantra Sady hanome rariny ho an''ny malahelo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Eny tokoa, ny marina hisaotra ny anaranao; Hitoetra eo anatrehanao ny mahitsy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Izay mihevitra ratsy ao am-pony Ka manangana ady isan''andro '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Mandranitra ny lelany tahaka ny bibilava izy, Ny poizin''ny menarana no ao ambanin''ny molony. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Jehovah ô, vonjeo amin''ny tanan''ny ratsy fanahy aho, Ary arovy amin''ny olon-dozabe, Izay efa nihevitra handronjina ahy ho potraka. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny mpiavonavona efa nanafina fandrika sy kofehy hamandrihany ahy; Efa namela-pandrika harato teo amoron-dalana izy; Nametraka tadivavarana hahazoany ahy izy.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Hoy izaho tamin''i Jehovah Andriamanitro Hianao; Henoy ny feon''ny fifonako, Jehovah ô! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Jehovah, Tompo ô, ry Herin''ny famonjena ahy, Manarona ny lohako amin''ny andro fiadiana Hianao. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Jehovah ô, aza manome ny irin''ny ratsy fanahy; Ary aza avela ho tanteraka ny hevi-dratsiny, fandrao hisandratra izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ny lohan''izay manemitra ahy Dia aoka hosaronan''ny ratsy tononin''ny molony. '
