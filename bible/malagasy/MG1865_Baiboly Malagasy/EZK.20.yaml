document_id: EZK.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny toetry ny Isiraely hatramin'ny ela, sy ny zavatra hanjo azy, ary ny mbola hampodian'Andriamanitra azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin''ny andro fahafolo tamin''ny volana fahadimy tamin''ny taona fahafito dia nisy tonga ny loholon''ny Isiraely mba hanontany amin''i Jehovah, ka nipetraka teo anatrehako izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia tonga tamiko ny tenin''i Jehovah nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ry zanak''olona, mitenena amin''ireo loholon''ny Isiraely, ka ataovy aminy hoe: Izao no lazain''i Jehovah Tompo: Moa hanontany amiko va no ihavianareo? Raha velona koa Aho, hoy Jehovah Tompo, dia tsy hety hanontanianareo mihitsy Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tsy hotsarainao va izy, ry zanak''olona, tsy hotsarainao va izy? Ampahalalao ny fahavetavetan''ny razany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ataovy aminy hoe: Izao no lazain''i Jehovah Tompo: Tamin''ny andro nifidianako ny Isiraely sy ny ananganako tanana tamin''ny taranak''i Jakoba sy nanaovako izay hahafantarany Ahy tany amin''ny tany Egypta raha nanangan-tanana taminy Aho ka nanao hoe: Izaho no Jehovah Andriamanitrareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'tamin''izany andro izany no nananganako tanana taminy hitondra azy hivoaka avy tany amin''ny tany Egypta ho any amin''ny tany notadiaviko ho azy, izay tondra-dronono sy tantely sady tena endriky ny tany rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia hoy Izaho taminy: Samia manary ny fahavetavetan''ny masonareo avy ianareo, ary aza mandoto tena amin''ny sampin''i Egypta; Izaho no Jehovah Andriamanitrareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nefa niodina tamiko izy ka tsy nety nihaino Ahy; samy tsy nanary ny fahavetavetan''ny masony na nahafoy ny sampin''i Egypta, ka dia hoy Izaho: Haidiko aminy ny fahavinirako, ary hotanterahiko aminy eo amin''ny tany Egypta ny fahatezerako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Kanefa niasa noho ny amin''ny anarako Aho, mba tsy handotoana izany eo imason''ny jentilisa izay nitoerany, sady teo imasony no nanaovako izay hahafantarany Ahy tamin''ny nitondrako azy nivoaka avy tany amin''ny tany Egypta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa dia nentiko nivoaka avy tany amin''ny tany Egypta izy ka nentiko ho any an-efitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nomeko azy ny didiko, ary nampahafantariko azy ny fitsipiko, izay mahavelona ny olona manaraka izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nomeko azy koa ny Sabatako ho famantarana ho amiko sy ho aminy mba ho fantany fa Izaho Jehovah no manamasina azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Kanjo niodina tamiko tany an-efitra ihany ny taranak''Isiraely, ka tsy nandeha araka ny didiko izy, fa nanamavo ny fitsipiko, izay mahavelona ny olona manaraka izany, ary nandoto dia nandoto ny Sabatako izy, dia hoy Izaho: Haidiko aminy any an-efitra ny fahatezerako hahalany ringana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Kanefa niasa noho ny amin'ny anarako Aho, mba tsy handotoana izany eo anatrehan'ny jentilisa izay nahita ay nitondrako azy nivoaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary Izaho dia nanangan-tanana taminy tany an-efitra koa fa tsy hitondra azy ho any amin''ny tany efa nomeko azy, izay tondra-dronono sy tantely sady tena endriky ny tany rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'satria efa nanamavo ny fitsipiko izy ary tsy nandeha araka ny didiko, fa nandoto ny Sabatako; fa ny fony dia nanaraka ny sampiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nefa niantra azy ihany ny masoko, ka dia tsy naringako na nolevoniko tany an-efitra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa hoy Izaho tamin''ny zanany tany an-efitra: Aza mandeha araka ny fanaon-drazanareo ianareo, na mitandrina ny fitsipiny, na mandoto tena amin''ny sampiny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'fa Izaho no Jehovah Andriamanitrareo; koa mandehana araka ny didiko, ary mitandrema ny fitsipiko, ka araho izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary manamasina sy Sabatako, mba ho famantarana ho amiko sy ho aminareo, ka dia ho fantatrareo fa Izaho no Jehovah Andriamanitrareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Kanjo niodina tamiko koa ny zanany: tsy nandeha araka ny didiko izy, na nitandrina hanaraka ny fitsipiko, izay mahavelona ny olona manaraka izany, fa nandoto ny Sabatako izy, ka dia hoy Izaho: Haidiko aminy ny fahavinirako. ary hotanterahiko aminy any an-efitra ny fahatezerato. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Nefa nampihemotra ny tanako Aho, ka dia niasa noho ny amin'ny anarako, mba tsy ho voaloto izany eo anatrehan'ny jentilisa izay nahita ny nitondrako azy nivoaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia nanangan-tanana taminy tany an''efitra, indray Aho, hampiely azy any amin''ny jentilisa sy hampihahaka azy any amin''ny tany samy hafa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'satria tsy nanaraka ny fitsipiko izy, fa nanamavo ny didiko sy nandoto ny Sabatako, ary ny masony nanaraka ny sampin''ny razany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary nomeko didy tsy tsara koa izy sy fitsipika izay tsy mahavelona Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia nandoto azy tamin'ny fanatiny Aho, dia tamin'ny nampandehanany ny voalohan-teraka rehetra hamaky ny afo
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: dia tamin''ny nanokanany ny voalohan-teraka rehetra; izahao Eks. xiii. 12'
    marker-yv: yv-n
  - type: text
    text: ', hampahatalanjonako azy, mba hahafantarany fa Izaho no Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Koa mitenena amin''ny taranak''Isiraely, ry zanak''olona, ka ataovy aminy hoe: Izao no lazain''i Jehovah Tompo: Tamin''izao no mbola nanamavoan''ny razanareo Ahy tamin''ny nivadihany tamiko: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nony nitondra azy ho any amin''ny tany izay nananganako tanana homena azy Aho, dia nahita ny havoana andrandraina rehetra sy ny hazo misandrahaka rehetra izy, ka tao no namonoany zavatra hatao fanatitra, ary tao koa no nametrahany ny fanatiny mahatezitra; tao koa no nanaterany hanitra ankasitrahana, ary tao no nanidinany ny fanatitra aidiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ka dia hoy Izaho taminy: Ahoana moa ny amin''ny fitoerana avo alehanareo ? Ka dia fitoerana avo no natao anarany mandraka androany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Koa ataovy amin''ny taranak''Isiraely hoe: Izao no lazain''i Jehovah Tompo: Moa mandoto tena araka ny fanaon'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lalana
    marker-yv: yv-n
  - type: text
    text: '''ny razanareo va ianareo, sy mijangajanga manaraka ny fahavetavetany va, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'ary mandoto tena amin''ny sampinareo rehetra mandraka androany va ianareo amin''ny anateranareo ny fanomezanareo sy ny ampandehananareo ny zanakareo hamaky ny afo? Ary Izaho va hety hanontanianareo, ry taranak''Isiraely? Raha velona koa Aho, hoy Jehovah Tompo, tsy hety hanontanianareo mihitsy Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary tsy ho tanteraka mihitsy ny eritreritry ny fanahinareo hoe: Ho tahaka ny jentilisa izahay, dia tahaka ny firenena amin''ny tany samy hafa, ka hanao fanompoam-pivavahana ho an''ny vato aman-kazo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Raha velona koa Aho, hoy Jehovah Tompo, dia tanana mahery sy sandry ahinjitra ary fahatezerana aidina no hanjakako aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary amin''ny tanana mahery sy ny sandry ahinjitra ary amin''ny fahatezerana aidina no hitondrako anareo mivoaka avy any amin''ny firenena sy hamoriako anareo avy any amin''ny tany izay nampielezana anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia ho entiko ho any an-efitry ny firenena ianareo, ary any no hifandaharako mifanatrika aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Tahaka ny nifandaharako tamin''ny razanareo tany an-efitry ny tany Egypta, dia toy izany koa no hifandaharako aminareo, hoy Jehovah Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary hampandaloviko eo ambanin''ny tehina ianareo ka hampidiriko hofehezin''ny fanekena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ary havahako hiala aminareo ny mpiodina sy izay manota amiko; eny, ho entiko hiala amin'ny tany ivahiniany ireo, nefa tsy hisy ho tafiditra ao amin'ny tanin'ny Isiraely izy; ka dia ho fantatrareo fa Izaho no Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary ny aminareo, ry taranak''Isiraely, izao no lazain''i Jehovah Tompo; Samia mandeha ianareo, ka manompoa ny sampinareo; nefa any aoriana kosa dia hihaino Ahy mihitsy ianareo ka tsy handoto ny anarako masina intsony amin''ny fanatitrareo sy amin''ny sampinareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Fa ao an-tendrombohitro masina, dia ao an-tendrombohitra avon''ny Isiraely, hoy Jehovah Tompo, no hanompoan''ny taranak''Isiraely rehetra Ahy, dia izay rehetra amin''ny tany; ao no hankasitrahako azy, ary ao no hilako ny fanatitrareo sy ny voaloham-bokatra aterinareo amin''ny zava-masinareo rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Hankasitrahako toy ny hanitra ankasitrahana ianareo amin''ny hitondrako anareo mivoata avy any amin''ny firenena sy ny hamoriako anareo avy any amin''ny tany samy hafa nampielezana anareo, ka dia hiseho ho masina eo anatrehan''ny jentilisa Aho amin''ny hataoko aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary ho fantatrareo fa Izaho no Jehovah, raha mitondra anareo ho any amin''ny tanin''ny Isiraely Aho, dia ny tany izay nananganako tanana nomena ny razanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ary hotsaroanareo any ny nalehanareo sy ny nataonareo rehetra izay nahaloto anareo; ary haharikoriko anareo ny tenanareo noho ny ratsy rehetra izay nataonareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Dia ho fantatrareo fa Izaho no Jehovah, rehefa miasa aminareo Aho noho ny amin'ny anarako, fa tsy araka ny lalàn-dratsinareo, na araka ny ratsy fanaonareo, ry taranak'Isiraely, hoy Jehovah Tompo.
