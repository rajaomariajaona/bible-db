document_id: AMO.8,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahitana nentin'Andriamanitra nilaza tamin'i Amosa ny fahantomotry ny loza hanjo ny Isiraely
  - type: text
    content: 'Izao no nasehon''i Jehovah Tompo tamiko; Indro, nisy harona feno voankazo masaka fahavaratra. '
  '10':
  - type: text
    content: Hampodiko ho fitomaniana ny andro firavoravoanareo, ary ho hira fahalahelovana ny hiranareo rehetra, hofeheziko lamba fisaonana
  - type: note
    content: Heb. lamba malailay
  - type: text
    content: ' ny valahana rehetra, sady hokakasako ny loha rehetra; Ary hataoko ho toy ny fisaonana zanakalahy tokana izany, Ka ny farany dia ho tahaka ny andro mangidy. '
  '11':
  - type: text
    content: Indro, avy ny andro, hoy Jehovah Tompo, izay hanaterako mosary amin'ny tany, tsy fanirian-kanina anefa, na hetahetan-drano, fa faniriana
  - type: note
    content: Heb. mosary
  - type: text
    content: ' handre ny tenin''i Jehovah; '
  '12':
  - type: text
    content: 'Ary hivembena hatrany amin''ny ranomasina ka hatrany amin''ny ranomasina ny olona ary hatrany amin''ny avaratra ka hatrany amin''ny atsinanana, eny, hivezivezy hitady ny tenin''i Jehovah izy, nefa tsy hahita. '
  '13':
  - type: text
    content: 'Amin''izany andro izany dia ho jemby noho ny hetaheta ny virijina tsara tarehy sy ny zatovolahy, '
  '14':
  - type: text
    content: 'Dia ireo izay mianiana amin''ny fahotan''i Samaria, ka manao hoe: velona koa ny andriamanitrao, ry Dana, ary raha velona koa ny fanaon''i Beri-sheba; eny, ho lavo izy ka tsy hiarina intsony.'
  '2':
  - type: text
    content: 'Ary hoy Izy: Inona no hitanao, ry Amosa? Dia hoy izaho: Harona feno voankazo masaka fahavaratra. Dia hoy Jehovah tamiko: Tonga amin''ny Isiraely oloko ny farany; Tsy handefitra aminy'
  - type: note
    content: Heb. handalo azy
  - type: text
    content: ' intsony Aho. '
  '3':
  - type: text
    content: Ho tonga naonaona ny hira ao an-dapa
  - type: note
    content: 'Na: tempoly'
  - type: text
    content: ' amin''izany andro izany, hoy Jehovah Tompo; Ho be ny faty, Hatraiza hatraiza no hanariany azy. Mangina re! '
  '4':
  - type: text
    content: 'Mihanoa izao, ianareo izay mihanahana te-hitelina ny malahelo sy hahafongana ny mpandefitra amin''ny tany '
  '5':
  - type: text
    content: 'Ka manao hoe: Rahoviana no ho tapitra ny voaloham-bolana, hivarotantsika vary, sy ny Sabata, hanokafantsika ny lava-bary, ka hanakelezana ny efaha sy hanalehibiazana ny sekely, ary hanaovana mizana mandainga '
  '6':
  - type: text
    content: 'Mba hovidintsika volafotsy ny mahantra sy kiraro iray lomisy ny malahelo, ary hivarotantsika ny loha-kororoky ny vary? '
  '7':
  - type: text
    content: 'Jehovah nianiana tamin''ny Reharehan''i Jakoba ka nanao hoe: Tsy hisy hobadinoiko mandrakizay ny asany na dia iray akory aza! '
  '8':
  - type: text
    content: 'Tsy hihorohoro noho izany va ny tany, sy hitomany ny mponina rehetra ao aminy? Eny, ny tany rehetra hihatondraka tahaka an''i Neily sy hihena indray toy ny Neilin''i Egypta. '
  '9':
  - type: text
    content: 'Ary amin izany andro izany, hoy Jehovah Tompo, dia halentiko mitataovovonana ny masoandro, ary hohamaiziniko antoandrobenanahary ny tany; '
