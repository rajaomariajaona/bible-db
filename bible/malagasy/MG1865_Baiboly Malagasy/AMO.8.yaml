document_id: AMO.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahitana nentin'Andriamanitra nilaza tamin'i Amosa ny fahantomotry ny loza hanjo ny Isiraely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no nasehon''i Jehovah Tompo tamiko; Indro, nisy harona feno voankazo masaka fahavaratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy Izy: Inona no hitanao, ry Amosa? Dia hoy izaho: Harona feno voankazo masaka fahavaratra. Dia hoy Jehovah tamiko: Tonga amin''ny Isiraely oloko ny farany; Tsy handefitra aminy'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. handalo azy
    marker-yv: yv-n
  - type: text
    text: ' intsony Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ho tonga naonaona ny hira ao an-dapa
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tempoly'
    marker-yv: yv-n
  - type: text
    text: ' amin''izany andro izany, hoy Jehovah Tompo; Ho be ny faty, Hatraiza hatraiza no hanariany azy. Mangina re! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mihanoa izao, ianareo izay mihanahana te-hitelina ny malahelo sy hahafongana ny mpandefitra amin''ny tany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ka manao hoe: Rahoviana no ho tapitra ny voaloham-bolana, hivarotantsika vary, sy ny Sabata, hanokafantsika ny lava-bary, ka hanakelezana ny efaha sy hanalehibiazana ny sekely, ary hanaovana mizana mandainga '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mba hovidintsika volafotsy ny mahantra sy kiraro iray lomisy ny malahelo, ary hivarotantsika ny loha-kororoky ny vary? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jehovah nianiana tamin''ny Reharehan''i Jakoba ka nanao hoe: Tsy hisy hobadinoiko mandrakizay ny asany na dia iray akory aza! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tsy hihorohoro noho izany va ny tany, sy hitomany ny mponina rehetra ao aminy? Eny, ny tany rehetra hihatondraka tahaka an''i Neily sy hihena indray toy ny Neilin''i Egypta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary amin izany andro izany, hoy Jehovah Tompo, dia halentiko mitataovovonana ny masoandro, ary hohamaiziniko antoandrobenanahary ny tany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hampodiko ho fitomaniana ny andro firavoravoanareo, ary ho hira fahalahelovana ny hiranareo rehetra, hofeheziko lamba fisaonana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lamba malailay
    marker-yv: yv-n
  - type: text
    text: ' ny valahana rehetra, sady hokakasako ny loha rehetra; Ary hataoko ho toy ny fisaonana zanakalahy tokana izany, Ka ny farany dia ho tahaka ny andro mangidy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Indro, avy ny andro, hoy Jehovah Tompo, izay hanaterako mosary amin'ny tany, tsy fanirian-kanina anefa, na hetahetan-drano, fa faniriana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mosary
    marker-yv: yv-n
  - type: text
    text: ' handre ny tenin''i Jehovah; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hivembena hatrany amin''ny ranomasina ka hatrany amin''ny ranomasina ny olona ary hatrany amin''ny avaratra ka hatrany amin''ny atsinanana, eny, hivezivezy hitady ny tenin''i Jehovah izy, nefa tsy hahita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Amin''izany andro izany dia ho jemby noho ny hetaheta ny virijina tsara tarehy sy ny zatovolahy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia ireo izay mianiana amin''ny fahotan''i Samaria, ka manao hoe: velona koa ny andriamanitrao, ry Dana, ary raha velona koa ny fanaon''i Beri-sheba; eny, ho lavo izy ka tsy hiarina intsony.'
