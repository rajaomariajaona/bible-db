document_id: 1CH.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny zanakalahin'Isiraely, sy ny taranak'i Joda, ary ny fonenany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no zanakalahin''Isiraely: Robena sy Simeona sy Levy sy Joda sy Isakara sy Zebolona '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: sy Dana sy Josefa sy Benjamina sy Naftaly sy Gada ary Asera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny zanakalahin''i Joda dia Era sy Onana ary Sela; ireo telo ireo no naterak''i Batsoa Kananita taminy. Ary ratsy fanahy teo imason''i Jehovah Era, lahimatoan''i Joda, dia nahafaty azy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Tamara vinantoni-vavy niteraka an''i Fareza sy Zera taminy. Dimy no zanakalahin''i Joda rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny zanakalahin''i Fareza dia Hezrona sy Hamola. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny zanakalahin''i Zera dia Zimry sy Etana sy Hemana sy Kalkola ary Dara; dimy lahy no isany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ny zanakalahin'i Karmy dia Akara, izay nampidi-doza tamin'ny Isiraely, dia ilay nandika ny didy ny amin'ny zavatra voaozona
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb; natao herema
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny zanakalahin''i Etana dia Azaria. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny zanakalahin''i Hezrona izay naterany dia Jeramela sy Rama ary Kelobay; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ary Rama niteraka an''i Aminadaba; ary Aminadaba niteraka an''i Nasona, lohan''ny taranak''i Joda; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ary Nasona niteraka an''i Salma; ary Salma niteraka an''i Boaza; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ary Boaza niteraka an''i Obeda; ary Obeda niteraka an''i Jese; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ary Jese niteraka an''i Eliaba, lahimatoa, sy Abinadaba, lahiaivo, sy Simea, fahatelo, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'sy Netanela, fahefatra, sy Raday, fahadimy, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'sy Ozema, fahenina, ary Davida, faralahy; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Zeroba sy Abigaila no anabaviny; ary telo ny zanakalahin''i Zeroia, dia Abisay sy Joaba ary Asahela; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ary Abigaila niteraka an''i Amasa; ary Jitra Isimaelita no rain''i Amasa. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary Kaleba, zanakalahin''i Hezrona, niteraka tamin''i Azoba vadiny sy tamin''i Jeriota. Izao no zanakalahin''i Azoba: Jasera sy Sobaba ary Ardona. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nony maty Azoba, dia Efrata no nalain''i Kaleba ho vadiny, ary izy niteraka an''i Hora taminy; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ary Hora niteraka an''i Ory; ary Ory niteraka an''i Bezalila. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nony afaka izany, Hezrona niray tamin''ny zanakavavin''i Makira, rain''i Gileada, izay novadiny rehefa enim-polo taona izy, dia niteraka an''i Segoba taminy ravehivavy; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ary Segoba niteraka an''i Jaira, izay nanana tanàna madinika telo amby roa-polo tany amin''ny tany Gileada. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nalain''i Gesora sy Arama tamin''ny Jairita ny tanàna madinika an''i Jaira mbamin''i Kenata sy ny zana-bohiny, dia tanàna enim-polo izany. Ireo rehetra ireo no an''ny zanak''i Makira, rain''i Gileada. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nony maty Hezrona tany Kaleba-efrata, Abia, vadin''i Hezrona, dia niteraka an''i Asora, razamben''ny any Tekoa, taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ny zanakalahin''i Jeramela, lahimatoan''i Hezrona, dia Rama, lahimatoa, sy Bona sy Orena sy Ozema ary Ahia. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jeramela nanana vady hafa koa atao hoe Atara; izy no renin''i Onama. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary ny zanakalahin''i Rama, lahimatoan''i Jeramela, dia Maza sy Jamina ary Ekera. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary ny zanakalahin''i Onama dia Samay sy Jada. Ary ny zanakalahin''i Samay dia Nadaba sy Abisora. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary ny anaran''ny vadin''i Abisora dia Abihaila; ary izy niteraka an''i Abana sy Molida taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary ny zanakalahin''i Nadaba dia Saleda sy Apaima; fa maty momba Saleda. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary ny zanakalahin''i Apaima dia Jisy Ary ny zanakalahin''i Jisy dia Sesana. Ary ny zanakalahin''i Sesana dia Ahelay. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary ny zanakalahin''i Jada, rahalahin''i Samay, dia Jatera sy Jonatana; nefa maty momba Jatera. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary ny zanakalahin''i Jonatana dia Paleta sy Zaza. Ireo no zanakalahin''i Jeramela. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary Sesana tsy nanana zanakalahy, fa vavy avokoa. Ary Sesana nanana mpanompo Egyptiana, Jara no anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary ny zananivavy nomen''i Sesana ho vadin''i Jara mpanompony; ary izy niteraka an''i Atahy taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary Atahy niteraka an''i Natana; ary Natana niteraka an''i Zabada; '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'ary Zabada niteraka an''i Efiala; ary Efiala niteraka an''i Obeda; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ary Obeda niteraka an''i Jeho; ary Jeho niteraka an''i Azaria; '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'ary Azaria niteraka an''i Haleza; ary Haleza niteraka an''i Elasa; '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'ary Elasa niteraka an''i Sismay; ary Sismay niteraka an''i Saloma; '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'ary Saloma niteraka an''i Jekamia; ary Jekamia niteraka an''i Elisama. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary ny zanakalahin''i Kaleba, rahalahin''i Jeramela, dia Mesa, lahimatoa, razamben''ny any Zifa, sy ny zanakalahin''i Maresa, razamben''ny any Hebrona. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ary ny zanakalahin''i Hebrona dia Kora sy Tapoa sy Rakema ary Sema. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary Sema niteraka an''i Rahama, rain''i Jorkeama, ary Rakema niteraka an''i Samay; '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'ary ny zanakalahin''i Samay dia Maona, ary Maona no razamben''ny any Beti-zora; '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'ary Efaha, vaditsindranon''i Kaleba, niteraka an''i Harana sy Moza sy Gazeza; ary Harana niteraka an''i Gazeza. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary ny zanakalahin''i Jeday dia Ragema sy Jotama sy Gesana sy Paleta sy Efaha ary Safa. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Maka, vaditsindranon''i Kaleba, niteraka an''i Sabera sy Tirana. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Izy koa niteraka an'i Safa, razamben'ny any Madmana, sy Seva, razamben'ny any Makbena sady razamben'ny any Gibea; ary ny zanakavavin'i Kaleba dia Aksa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Izao no zanakalahin''i Kaleba, zanak''i Hora, lahimatoan''i Efrata: Sobala, razamben''ny any Kiriata-Jearima, '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Salma, razamben''ny any Betlehema, Harefa, razamben''ny any Beti-gadera. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Ary Sobala, razamben''ny any Kiriata Zarima, nanan-janakalahy, dia Haroe sy Hatsi-hamenokota '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'ary ny fokon''i Kiriata-Jearima koa, dia ny Jitrita sy ny Potita sy ny Somatita ary ny Misraita; avy tamin''ireo no nihavian''ny Zoraita sy ny Estaolita. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Ny zanakalahin''i Salma dia Betlehema sy ny Netofatita sy Atrota-beti-joaba ary Hatsi-hamanatita sy ny Zoraita '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: ary ny fokon'ny mpanoratra izay nonina tany Jabeza, dia ny Tiratita sy ny Simeatita ary ny Sokatita. Ireo no Kenita avy tamin'i Hamata, rain'ny taranak'i Rekaba.
