document_id: 1CH.2,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny zanakalahin'Isiraely, sy ny taranak'i Joda, ary ny fonenany
  - type: text
    content: 'Izao no zanakalahin''Isiraely: Robena sy Simeona sy Levy sy Joda sy Isakara sy Zebolona '
  '10':
  - type: text
    content: 'ary Rama niteraka an''i Aminadaba; ary Aminadaba niteraka an''i Nasona, lohan''ny taranak''i Joda; '
  '11':
  - type: text
    content: 'ary Nasona niteraka an''i Salma; ary Salma niteraka an''i Boaza; '
  '12':
  - type: text
    content: 'ary Boaza niteraka an''i Obeda; ary Obeda niteraka an''i Jese; '
  '13':
  - type: text
    content: 'ary Jese niteraka an''i Eliaba, lahimatoa, sy Abinadaba, lahiaivo, sy Simea, fahatelo, '
  '14':
  - type: text
    content: 'sy Netanela, fahefatra, sy Raday, fahadimy, '
  '15':
  - type: text
    content: 'sy Ozema, fahenina, ary Davida, faralahy; '
  '16':
  - type: text
    content: 'Zeroba sy Abigaila no anabaviny; ary telo ny zanakalahin''i Zeroia, dia Abisay sy Joaba ary Asahela; '
  '17':
  - type: text
    content: 'ary Abigaila niteraka an''i Amasa; ary Jitra Isimaelita no rain''i Amasa. '
  '18':
  - type: text
    content: 'Ary Kaleba, zanakalahin''i Hezrona, niteraka tamin''i Azoba vadiny sy tamin''i Jeriota. Izao no zanakalahin''i Azoba: Jasera sy Sobaba ary Ardona. '
  '19':
  - type: text
    content: 'Ary nony maty Azoba, dia Efrata no nalain''i Kaleba ho vadiny, ary izy niteraka an''i Hora taminy; '
  '2':
  - type: text
    content: sy Dana sy Josefa sy Benjamina sy Naftaly sy Gada ary Asera.
  '20':
  - type: text
    content: 'ary Hora niteraka an''i Ory; ary Ory niteraka an''i Bezalila. '
  '21':
  - type: text
    content: 'Ary nony afaka izany, Hezrona niray tamin''ny zanakavavin''i Makira, rain''i Gileada, izay novadiny rehefa enim-polo taona izy, dia niteraka an''i Segoba taminy ravehivavy; '
  '22':
  - type: text
    content: 'ary Segoba niteraka an''i Jaira, izay nanana tanàna madinika telo amby roa-polo tany amin''ny tany Gileada. '
  '23':
  - type: text
    content: 'Ary nalain''i Gesora sy Arama tamin''ny Jairita ny tanàna madinika an''i Jaira mbamin''i Kenata sy ny zana-bohiny, dia tanàna enim-polo izany. Ireo rehetra ireo no an''ny zanak''i Makira, rain''i Gileada. '
  '24':
  - type: text
    content: 'Ary nony maty Hezrona tany Kaleba-efrata, Abia, vadin''i Hezrona, dia niteraka an''i Asora, razamben''ny any Tekoa, taminy. '
  '25':
  - type: text
    content: 'Ary ny zanakalahin''i Jeramela, lahimatoan''i Hezrona, dia Rama, lahimatoa, sy Bona sy Orena sy Ozema ary Ahia. '
  '26':
  - type: text
    content: 'Jeramela nanana vady hafa koa atao hoe Atara; izy no renin''i Onama. '
  '27':
  - type: text
    content: 'Ary ny zanakalahin''i Rama, lahimatoan''i Jeramela, dia Maza sy Jamina ary Ekera. '
  '28':
  - type: text
    content: 'Ary ny zanakalahin''i Onama dia Samay sy Jada. Ary ny zanakalahin''i Samay dia Nadaba sy Abisora. '
  '29':
  - type: text
    content: 'Ary ny anaran''ny vadin''i Abisora dia Abihaila; ary izy niteraka an''i Abana sy Molida taminy. '
  '3':
  - type: text
    content: 'Ny zanakalahin''i Joda dia Era sy Onana ary Sela; ireo telo ireo no naterak''i Batsoa Kananita taminy. Ary ratsy fanahy teo imason''i Jehovah Era, lahimatoan''i Joda, dia nahafaty azy Jehovah. '
  '30':
  - type: text
    content: 'Ary ny zanakalahin''i Nadaba dia Saleda sy Apaima; fa maty momba Saleda. '
  '31':
  - type: text
    content: 'Ary ny zanakalahin''i Apaima dia Jisy Ary ny zanakalahin''i Jisy dia Sesana. Ary ny zanakalahin''i Sesana dia Ahelay. '
  '32':
  - type: text
    content: 'Ary ny zanakalahin''i Jada, rahalahin''i Samay, dia Jatera sy Jonatana; nefa maty momba Jatera. '
  '33':
  - type: text
    content: 'Ary ny zanakalahin''i Jonatana dia Paleta sy Zaza. Ireo no zanakalahin''i Jeramela. '
  '34':
  - type: text
    content: 'Ary Sesana tsy nanana zanakalahy, fa vavy avokoa. Ary Sesana nanana mpanompo Egyptiana, Jara no anarany. '
  '35':
  - type: text
    content: 'Ary ny zananivavy nomen''i Sesana ho vadin''i Jara mpanompony; ary izy niteraka an''i Atahy taminy. '
  '36':
  - type: text
    content: 'Ary Atahy niteraka an''i Natana; ary Natana niteraka an''i Zabada; '
  '37':
  - type: text
    content: 'ary Zabada niteraka an''i Efiala; ary Efiala niteraka an''i Obeda; '
  '38':
  - type: text
    content: 'ary Obeda niteraka an''i Jeho; ary Jeho niteraka an''i Azaria; '
  '39':
  - type: text
    content: 'ary Azaria niteraka an''i Haleza; ary Haleza niteraka an''i Elasa; '
  '4':
  - type: text
    content: 'Ary Tamara vinantoni-vavy niteraka an''i Fareza sy Zera taminy. Dimy no zanakalahin''i Joda rehetra. '
  '40':
  - type: text
    content: 'ary Elasa niteraka an''i Sismay; ary Sismay niteraka an''i Saloma; '
  '41':
  - type: text
    content: 'ary Saloma niteraka an''i Jekamia; ary Jekamia niteraka an''i Elisama. '
  '42':
  - type: text
    content: 'Ary ny zanakalahin''i Kaleba, rahalahin''i Jeramela, dia Mesa, lahimatoa, razamben''ny any Zifa, sy ny zanakalahin''i Maresa, razamben''ny any Hebrona. '
  '43':
  - type: text
    content: 'Ary ny zanakalahin''i Hebrona dia Kora sy Tapoa sy Rakema ary Sema. '
  '44':
  - type: text
    content: 'Ary Sema niteraka an''i Rahama, rain''i Jorkeama, ary Rakema niteraka an''i Samay; '
  '45':
  - type: text
    content: 'ary ny zanakalahin''i Samay dia Maona, ary Maona no razamben''ny any Beti-zora; '
  '46':
  - type: text
    content: 'ary Efaha, vaditsindranon''i Kaleba, niteraka an''i Harana sy Moza sy Gazeza; ary Harana niteraka an''i Gazeza. '
  '47':
  - type: text
    content: 'Ary ny zanakalahin''i Jeday dia Ragema sy Jotama sy Gesana sy Paleta sy Efaha ary Safa. '
  '48':
  - type: text
    content: 'Maka, vaditsindranon''i Kaleba, niteraka an''i Sabera sy Tirana. '
  '49':
  - type: text
    content: Izy koa niteraka an'i Safa, razamben'ny any Madmana, sy Seva, razamben'ny any Makbena sady razamben'ny any Gibea; ary ny zanakavavin'i Kaleba dia Aksa.
  '5':
  - type: text
    content: 'Ny zanakalahin''i Fareza dia Hezrona sy Hamola. '
  '50':
  - type: text
    content: 'Izao no zanakalahin''i Kaleba, zanak''i Hora, lahimatoan''i Efrata: Sobala, razamben''ny any Kiriata-Jearima, '
  '51':
  - type: text
    content: 'Salma, razamben''ny any Betlehema, Harefa, razamben''ny any Beti-gadera. '
  '52':
  - type: text
    content: 'Ary Sobala, razamben''ny any Kiriata Zarima, nanan-janakalahy, dia Haroe sy Hatsi-hamenokota '
  '53':
  - type: text
    content: 'ary ny fokon''i Kiriata-Jearima koa, dia ny Jitrita sy ny Potita sy ny Somatita ary ny Misraita; avy tamin''ireo no nihavian''ny Zoraita sy ny Estaolita. '
  '54':
  - type: text
    content: 'Ny zanakalahin''i Salma dia Betlehema sy ny Netofatita sy Atrota-beti-joaba ary Hatsi-hamanatita sy ny Zoraita '
  '55':
  - type: text
    content: ary ny fokon'ny mpanoratra izay nonina tany Jabeza, dia ny Tiratita sy ny Simeatita ary ny Sokatita. Ireo no Kenita avy tamin'i Hamata, rain'ny taranak'i Rekaba.
  '6':
  - type: text
    content: 'Ary ny zanakalahin''i Zera dia Zimry sy Etana sy Hemana sy Kalkola ary Dara; dimy lahy no isany. '
  '7':
  - type: text
    content: Ary ny zanakalahin'i Karmy dia Akara, izay nampidi-doza tamin'ny Isiraely, dia ilay nandika ny didy ny amin'ny zavatra voaozona
  - type: note
    content: Heb; natao herema
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Ary ny zanakalahin''i Etana dia Azaria. '
  '9':
  - type: text
    content: 'Ary ny zanakalahin''i Hezrona izay naterany dia Jeramela sy Rama ary Kelobay; '
