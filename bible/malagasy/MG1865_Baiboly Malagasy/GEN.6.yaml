document_id: GEN.6,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Noa sy ny Safo-drano
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha vao nihamaro ny olona tambonin''ny tany ka teraka zazavavy maro, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Noa niteraka zanaka telo mirahalahy , dia Sema sy Hama ary Jafeta. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary simba ny tany teo anatrehan''Andriamanitra sady heni-doza; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia hitan'Andriamanitra ny tany, ka, indro, efa simba izy; fa ny nofo rehetra samy efa nanimba ny lalany avy tambonin'ny tany.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Andriamanitra tamin''i Noa: Ny faran''ny nofo rehetra efa mby eto anatrehako, satria efa heni-doza ny tany noho ny amin''olona, ka, indro, efa handringana azy mbamin''ny tany Aho. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa manaova sambo-fiara ho anao amin''ny hazo gofera; ary hasianao efitrefitra ny sambo-fiara, ka hopetahanao dity ao anatiny sy eo ivelany izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary toy izao no hanaovanao azy: hakiho telon-jato ny lavan''ny sambo-fiara, hakiho dimam-polo ny sakany, ary hakiho telo-polo ny hahavony. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hasianao fidiran''ny mazava ny sambo-fiara, ary amin''ny hakiho iray no hahavitanao azy hatreo ambony; ary hasianao varavarana ny rindrin''ny sambo-fiara ; hataonao efitra telo mifanongoa izy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary, indro, Izaho efa hahatonga ny safo-drano ambonin''ny tany handringana ny nofo rehetra izay manam-nofonaina ambanin''ny lanitra; dia ho faty izay rehetra eo amin''ny tany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa kosa haoriko ny fanekeko aminao; ary hiditra ao anatin''ny sambo-fiara ianao sy ny vadinao aman-janakao mbamin''ny vinantonao vavy miaraka aminao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny zava-manan''aina rehetra, dia ny nofo rehetra, hitondranao roa avy isan-karazany ho ao anatin''ny sambo-fiara, hovelomina miaraka aminao; ho lahy sy vavy avy ireo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia hitan''ny zanak''Andriamanitra fa tsara tarehy ny zanakavavin''ny olona; ka dia nifidy vady ho azy tamin''izy rehetra araka izay tiany izy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vorona, samy araka ny karazany avy; ary ny biby, samy araka ny karazany avy, ary ny biby rehetra izay mandady na mikisaka amin''ny tany, samy araka ny karazany avy, dia, roa avy samy araka ny karazany avy, dia roa avy isan-karazany no hankeo aminao hovelomina. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary analao ho anao ny zavatra rehetra izay mety ho fihinana, ka angòny ho eo aminao; dia ho fihinana ho anao sy ho an''ireo koa izany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nataon'i Noa izany; araka izay rehetra nandidian'Andriamanitra azy no nataony.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jehovah: Tsy mba hanapaka mandrakariva ao amin''ny olona ny Fanahiko, fa amin''ny faniavany dia nofo izy; nefa ho roa-polo amby zato taona ny androny. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny Nefilima nitoetra tambonin''ny tany tamin''izany andro izany, sy taorian''izany koa, raha nivady tamin''ny zanakavavin''ny olona ny zanak''Andriamanitra, ka niterahany; ireo no ilay olo-mahery hatrizay ela izay, dia ny lehilahy nanan-daza. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hitan''i Jehovah fa be ny faharatsian''ny olona tambonin''ny tany, ka izay fisainana rehetra avy amin''ny fony dia ratsy ihany mandritra ny andro. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah nanenina noho ny nanaovany ny olona tambonin''ny tany, ka nalahelo ny fony. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jehovah: Haringako tsy hisy ambonin''ny tany ny olona izay noforoniko, hatramin''ny olona ka hatramin''ny biby fiompy sy ny biby mandady na mikisaka mbamin''ny voro-manidina; fa manenina Aho noho ny nanaovako azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa Noa kosa nahita fitia teo imason'i Jehovah.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no tantaran''i Noa: Noa dia lehilahy marina sady tsy nisy tsiny teo amin''ny olona niara-belona taminy; eny, niara-nandeha tamin''Andriamanitra Noa. '
