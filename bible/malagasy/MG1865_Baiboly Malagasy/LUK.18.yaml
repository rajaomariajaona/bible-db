document_id: LUK.18,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy nilaza fanoharana taminy, fa tsy mety raha tsy mivavaka mandrakariva izy ka tsy reraka, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy roa lahy niakatra teo an-kianjan''ny tempoly hivavaka, ny anankiray Fariseo, ary ny anankiray mpamory hetra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ilay Fariseo nitsangana ka nivavaka nitokana hoe: Andriamanitra ô, misaotra Anao aho fa tsy mba tahaka ny olona sasany, izay mpanao an-keriny, tsy marina, mpijangajanga, na tahaka io mpamory hetra io aza. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mifady indroa isan-kerinandro aho; mandoa ny fahafolon-karena amin''izay azoko rehetra aho. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ilay mpamory hetra kosa nijanona teny lavitra eny, sady tsy nety niandrandra ny lanitra akory, fa niteha-tratra ka nanao hoe: Andriamanitra ô, mamindrà fo amiko mpanota. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazaiko aminareo: Izany lehilahy izany nidina tany an-tranony efa nohamarinina noho ny anankiray; fa izay rehetra manandra-tena no haetry, ary izay rehetra manetry tena no hasandratra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy nitondra zazakely koa ho eo amin''i Jesosy mba hotendreny; fa raha vao nahita izany ny mpianatra, dia nandrara azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Jesosy niantso ireo hankeo aminy ka nanao hoe: Avelao ny zaza hanatona Ahy, ary aza raràna; fa an''ny toa azy ny fanjakan''Andriamanitra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazaiko aminareo marina tokoa: Na zovy na zovy no ny handray ny fanjakan''Andriamanitra tahaka ny zaza, dia tsy ho tafiditra aminy akory. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy mpanapaka anankiray nanontany Azy hoe: Mpampianatra tsara ô, inona no hataoko handovako fiainana mandrakizay? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Jesosy taminy: Nahoana Aho no ataonao tsara? Tsy misy tsara afa-tsy Iray ihany, dia Andriamanitra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nanao hoe: Nisy mpitsara tao an-tanàna anankiray, izay tsy natahotra an''Andriamanitra, na mena-maso olona. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fantatrao ny didy hoe: Aza mijangajanga, Aza mamono olona, Aza mangalatra, Aza mety ho vavolombelona mandainga, Manajà ny rainao sy ny reninao (Eks. 20. 12-16). '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy kosa izy: Izany rehetra izany dia efa notandremako hatry ny fony aho mbola kely. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nandre izany Jesosy, dia hoy Izy taminy: Mbola diso zavatra iray loha ianao: amidio ny fanananao rehetra, ka zarao ho an''ny malahelo, dia hanana rakitra any an-danitra ianao; ary avia, manaraha Ahy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nandre izany ralehilahy, dia nalahelo loatra; fa nanan-karena dia nanan-karena izy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy, raha nijery azy, dia nanao hoe: Manao ahoana ny hasarotry ny hidiran''ny manan-karena amin''ny fanjakan''Andriamanitra! '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ho moramora kokoa ny hidiran''ny rameva amin''ny vodi-fanjaitra noho ny hidiran''ny manan-karena amin''ny fanjakan''Andriamanitra! '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay nandre dia nanao hoe: Iza indray moa no azo hovonjena? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Jesosy: Izay zavatra tsy hain''ny olona dia hain''Andriamanitra. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Petera: Indro, izahay efa nahafoy izay nety ho anay ka nanaraka Anao. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jesosy taminy: Lazaiko aminareo marina tokoa: Tsy misy olona izay efa nahafoy trano, na vady, na rahalahy, na ray, na reny, na zanaka, noho ny fanjakan''Andriamanitra, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy mpitondratena tao amin''izany tanàna izany, izay nankao aminy matetika ka nanao hoe: Omeo rariny aho amin''ilay manana ady amiko. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izay tsy handray be lavitra amin''izao andro ankehitriny izao, ary amin''ny andro ho avy dia fiainana mandrakizay. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy naka ny roa ambin''ny folo lahy ka nanao taminy hoe: Indro, miakatra ho any Jerosalema isika, dia ho tanteraka ny zavatra rehetra izay voasoratry ny mpaminany ny amin''ny Zanak''olona. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hatolotra ho amin''ny jentilisa Izy, dia hataony fihomehezana sy hisetrasetrany sy hororany '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary hokapohiny sy hovonoiny, ary amin''ny andro fahatelo dia hitsangana Izy. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa tsy nisy azony akory izany teny izany, fa nafenina taminy izy ka dia tsy fantany izay nolazainy. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha Jesosy nanakaiky an''i Jeriko, dia indro jamba anankiray nipetraka nangataka teo amoron-dalana. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha nandre ny vahoaka mandalo izy, dia nanontany hoe: Inona izany? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny olona taminy: Jesosy avy any Nazareta no mandalo. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niantso mafy ralehilahy ka nanao hoe: Ry Jesosy, Zanak''i Davida ô, mamindrà fo amiko. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay nandeha teny aloha dia niteny mafy azy mba hangina, fa vao mainka niantsoantso izy ka nanao hoe: Ry Zanak''i Davida ô, mamindrà fo amiko. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy nanaiky izy aloha; fa rehefa afaka izany, dia nanao anakampo hoe izy: Na dia tsy matahotra an''Andriamanitra aza aho sady tsy mena-maso olona, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy nijanona, dia nasainy ho entina eo aminy ralehilahy; ary rehefa mby akaiky izy, dia nanontany azy Jesosy '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nanao hoe: Inona moa no tianao hataoko aminao? Ary hoy izy: Tompoko, ny mba hampahiratina ny masoko. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jesosy taminy: Mahirata ny masonao; ny finoanao no efa nahavonjy anao. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary niaraka tamin'izay dia nahiratra ny masony, ka nanaraka an'i Jesosy izy sady nankalaza an'Andriamanitra; ary ny vahoaka rehetra, raha nahita, dia nidera an'Andriamanitra.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba homeko rariny ihany io mpitondratena io, fa manahirana ahy izy, fandrao ho avy mandrakariva izy ka hampahasosotra ahy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny Tompo: Henoy izay lazain''ilay mpitsara tsy marina. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Andriamanitra tsy hanome rariny ny olom-boafidiny va, izay mitaraina aminy andro aman''alina, ary moa hitaredretra va Izy? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazaiko aminareo fa homeny rariny faingana izy. Kanefa, raha avy ny Zanak''olona, moa hahita finoana etỳ ambonin''ny tany va Izy? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy nanao ity fanoharana ity tamin''ny sasany izay natoky tena ho marina ka namingavinga ny hafa; '
