document_id: GEN.43,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandehanan'ny zanak'i Jakoba fanindroany, sy ny nizahan'i Josefa toetra azy
  - type: text
    content: 'Ary mafy ny mosary teo amin''ny tany. '
  '10':
  - type: text
    content: 'fa raha tsy nijanonjanona izahay, dia efa tafaverina fanindroany toy izay. '
  '11':
  - type: text
    content: 'Ary hoy Isiraely rainy taminy: Raha izany ary no izy, dia izao no ataovy: analao ny vokatra malaza amin''ny tany ka ataovy ao anatin''ny fitondran-entanareo, dia ento midina haterina ho an-dralehilahy, dia balsama kely sy tantely kely, ditin-kazo nekota sy lota sy pistakia ary amygdala; '
  '12':
  - type: text
    content: 'ary mitondra vola toraka ny teo eny an-tananareo; ary ilay vola izay naverina teo am-bavan''ny lasakanareo dia ento miverina indray; angamba fahadisoana izany. '
  '13':
  - type: text
    content: 'Ary ny rahalahinareo ento ihany; dia miainga ka miverena indray ho any amin-dralehilahy; '
  '14':
  - type: text
    content: 'ary Andriamanitra Tsitoha anie hampahita famindram-po anareo eo anatrehan-dralehilahy, mba hampodiny ny rahalahinareo anankiray sy Benjamina. Ary izaho, raha foanana anaka aho, dia foana anaka ihany. '
  '15':
  - type: text
    content: Dia nentin'ireo lehilahy ireo ny zavatra hateriny, ary vola indroa toraka ny teo koa no nentiny teny an-tànany mbamin'i Benjamina; ary niainga izy, dia nidina tany Egypta ka tonga teo anatrehan'i Josefa.
  '16':
  - type: text
    content: 'Ary Josefa, raha nahita an''i Benjamina niaraka taminy, dia nanao tamin''ny mpikarakara ny tao an-tranony hoe: Ampidiro atsy an-trano ireo lehilahy ireo, dia amonoy zavatra izy ka anaovy nahandro; fa hiara-mihinana amiko izy raha mitataovovonana ny andro. '
  '17':
  - type: text
    content: 'Dia nataon-dralehilahy araka izay nandidian''i Josefa; ka nampidirin-dralehilahy tao an-tranon''i Josefa ireo. '
  '18':
  - type: text
    content: 'Dia raiki-tahotra ireo lehilahy ireo, satria nampidirina tao an-tranon''i Josefa, ka hoy izy: Maintsy ilay vola naverina tao anatin''ny lasakantsika fahiny va no nampidirana antsika, hivarinany amintsika sy hianjerany amintsika! dia halainy ho andevo isika, ary halainy koa ny borikintsika. '
  '19':
  - type: text
    content: 'Dia nanatona an-dralehilahy, mpikarakara ny tao an-tranon''i Josefa, izy ka niteny taminy teo am-baravaran''ny trano nanao hoe: '
  '2':
  - type: text
    content: 'AryY rehefa laniny ny vary izay efa nalainy tany Egypta, dia hoy ny rainy taminy: Mandehana indray, mividia hanina kely ho antsika. '
  '20':
  - type: text
    content: 'Mba henoy kely izahay, tompokolahy: nidina hividy hanina tokoa izahay fahiny: '
  '21':
  - type: text
    content: 'ary rehefa tonga teo amin''izay nandrianay izahay, dia nosokafanay ny lasakanay, ka indreo ny volanay isan-dahy teo am-bavan''ny lasakanay avy, tonga lanja avokoa ny volanay; ary efa nentinay niverina eto an-tananay izany. '
  '22':
  - type: text
    content: 'Ary nitondra vola hafa koa eto an-tananay izahay hamidy hanina: tsy fantatray izay nanao ny volanay tao anatin''ny lasakanay. '
  '23':
  - type: text
    content: 'Ary hoy izy: Matokia ianareo, fa aza matahotra; Andriamanitrareo, dia Andriamanitry ny rainareo, no nanome anareo harena tao anatin''ny lasakanareo; ny volanareo dia efa tonga tatỳ amiko ihany. Dia namoaka an''i Simeona ho eo aminy izy. '
  '24':
  - type: text
    content: 'Ary nampidirin-dralehilahy tao an-tranon''i Josefa ireo olona ireo ka nomeny rano, dia nanasa tongotra izy, ary ny borikiny nomeny hanina koa. '
  '25':
  - type: text
    content: 'Dia nandamina ny zavatra hateriny izy mandra-pihavin''i Josefa rehefa mitataovovonana ny andro; fa efa reny fa eo no hihinanany hanina. '
  '26':
  - type: text
    content: 'Ary rehefa tonga tao an-trano Josefa, dia nampidirin''izy mirahalahy avy ho ao an-trano mba hatolotra azy ireo zavatra efa nentiny, dia niankohoka tamin''ny tany teo anatrehany izy. '
  '27':
  - type: text
    content: 'Ary Josefa nanontany ny toeny ka nanao hoe: Tsara ihany va ny rainareo, ilay lahy antitra nolazainareo? mbola velona ihany va izy? '
  '28':
  - type: text
    content: 'Dia hoy izy: Tsara ihany ny mpanomponao rainay; mbola velona ihany izy. Dia niondrika izy ireo ka niankohoka. '
  '29':
  - type: text
    content: 'Ary Josefa nanopy ny masony ka nahita an''i Benjamina rahalahiny, zanakalahin''ny reniny, dia hoy izy: Io va no zandrinareo faralahy, izay nolazainareo tamiko? Sady hoy koa izy: Andriamanitra anie hanisy soa anao, anaka '
  '3':
  - type: text
    content: 'Ary Joda niteny taminy ka nanao hoe: Efa nilaza mafy taminay ralehilahy ka nanao hoe: Tsy hahita ny tavako ianareo, raha tsy hiaraka aminareo ilay rahalahinareo. '
  '30':
  - type: text
    content: 'Dia niala faingana Josefa, fa nangorakoraka ny fony noho ny rahalahiny, ka nitady izay hitomaniany izy; dia niditra tao an-efi-trano izy ka nitomany tao. '
  '31':
  - type: text
    content: 'Ary rehefa nanasa ny tavany izy, dia nivoaka; ary nanindry ny fangorakoraky ny fony izy ka nanao hoe: Ento ny nahandro. '
  '32':
  - type: text
    content: 'Dia narosony mitokana ny ho an''i Josefa, ary mitokana ny ho an''ny rahalahiny, ary mitokana koa ny ho an''ny Egyptiana izay nihinana teo aminy, satria ny Egyptiana tsy mahazo miara-komana amin''ny Hebreo, fa fahavetavetana amin''ny Egyptiana izany. '
  '33':
  - type: text
    content: 'Dia nipetraka teo anatrehany izy, ny lahimatoa araka ny fizokiany, ary ny faralahy araka ny fizandriany; dia samy talanjona ka nifampijerijery izy. '
  '34':
  - type: text
    content: Ary samy nitondrana anjara-hanina avy teo anoloan'i Josefa izy mirahalahy avy; kanefa ny anjara-hanin'i Benjamina dia indimy toraka ny anjaran-drery tamin'izy rehetra. Dia niara-nisotro sy nivoky divay teo aminy izy.
  '4':
  - type: text
    content: 'Raha hampandehaninao hiaraka aminay ny rahalahinay, dia hidina izahay ka hividy hanina ho anao; '
  '5':
  - type: text
    content: 'fa raha tsy hampandehaninao izy, dia tsy hidina izahay; fa hoy ralehilahy taminay: Tsy hahita ny tavako ianareo, raha tsy hiaraka aminareo ilay rahalahinareo. '
  '6':
  - type: text
    content: 'Ary hoy Isiraely: Nahoana no dia nampidi-doza tamiko ianareo ka nanambara tamin-dralehilahy fa mbola nanan-drahalahy koa ianareo? '
  '7':
  - type: text
    content: 'Ary hoy izy ireo: Nanadina dia nanadina ny amin''ny tenanay sy ny mpianakavinay ralehilahy ka nanao hoe: Mbola velona ihany va izay rainareo? ary manan-drahalahy hafa koa va ianareo? Dia nambaranay taminy araka izany teny izany; moa nampoizinay akory va izay hanaovany hoe: Ento midina ny rahalahinareo? '
  '8':
  - type: text
    content: 'Ary hoy Joda tamin''Isiraely rainy: Ampandehano hiaraka amiko ny zaza, dia hiainga izahay ka handeha, mba ho velona isika ka tsy ho faty, dia izahay sy ianao ary ny zanatsika madinika koa. '
  '9':
  - type: text
    content: 'Izaho no hiantoka azy; amin''ny tanako no handraisanao azy; raha tsy ho entiko atỳ aminao ka hatolotro eto anatrehanao izy, dia ho meloka aminao amin''ny andro rehetra hiainako aho; '
