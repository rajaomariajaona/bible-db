document_id: ISA.13,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny loza hanjo an'i Babylona
  - type: text
    content: Faminaniana hitan'Isaia, zanak'i Amoza, ny amin'ny loza hanjo an'i Babylona.
  '10':
  - type: text
    content: 'Fa ny kintan''ny lanitra, na dia ireo Telonohorefy aza, dia tsy hampamirapiratra ny fahazavany; ny masoandro ho maizina amin''ny iposahany; Ary ny volana tsy hangarangarana. '
  '11':
  - type: text
    content: 'Ary hatsingeriko amin''izao tany rehetra izao ny faharatsiany, sy amin''ny ratsy fanahy ny helony; Ary hatsahatro ny fireharehan''ny mpiavonavona, Ary haetriko ny fiavonavonan''ny mpampahory. '
  '12':
  - type: text
    content: 'Dia hataoko ho saro-tadiavina mihoatra noho ny volamena tsara ny olombelona, eny, noho ny tena volamena avy any Ofira aza. '
  '13':
  - type: text
    content: 'Ary noho izany dia hampihorohoroiko ny lanitra, ary ny tany hientanentana hiala amin''ny fitoerany noho ny fahatezeran''i Jehovah, Tompon''ny maro, sy noho ny andro firehetan''ny fahatezerany. '
  '14':
  - type: text
    content: 'Ary ho tahaka ny gazela hazaina ny olona, sy ho tahaka ny ondry aman''osy tsy misy mpamory, ka dia samy ho lasa any amin''ny fireneny avy izy, eny, samy handositra ho any amin''ny taniny avy izy. '
  '15':
  - type: text
    content: 'Izay rehetra azo dia holefonina, ary izay rehetra tratra dia ho lavon''ny sabatra. '
  '16':
  - type: text
    content: 'Ary ny zanany madinika hotorotoroina eo imasony; Ny tranony hobaboina, ary ny vadiny hosavihina. '
  '17':
  - type: text
    content: 'Indro, hamporisihiko hamely azy ny Mediana, izay manao ny volafotsy tsy ho zavatra ary tsy mankamamy ny volamena. '
  '18':
  - type: text
    content: 'Ny tsipìkany handripaka ny zatovo, ary izay ateraky ny kibo tsy hamindrany fo, eny, na dia ny zaza aza tsy hiantran''ny masony. '
  '19':
  - type: text
    content: 'Ary Babylona, ravaky ny fanjakana maro Tabiha sy reharehan''ny Kaldeana, Dia ho rava tahaka ny nandravan''Andriamanitra an''i Sodoma sy Gomora; '
  '2':
  - type: text
    content: 'Manangàna faneva eo an-tampon''izay tendrombohitra mangadihady ianareo, manandrata feo hiantso azy, hofay tanana izy hiditra amin''ny vavahadin''ireo mpanapaka. '
  '20':
  - type: text
    content: 'Tsy honenana mandrakizay izy ary tsy hitoerana intsony hatramin''ny taranaka fara mandimby, Tsy hisy Arabo hanorin-day any, na mpiandry ondry hampandry ny ondriny any; '
  '21':
  - type: text
    content: Fa ny bibi-dia any an-efitra no hitoetra any, ho feno vorondolo
  - type: note
    content: 'Na: hyena'
  - type: text
    content: ' ny tranony, ny ostritsa no hitoetra any, ary ny osilahy'
  - type: note
    content: Heb. seirima; izahao Lev. xvii. 7
  - type: text
    content: ' no hitsambikimbikina any, '
  '22':
  - type: text
    content: Ny kary
  - type: note
    content: Heb. jakala
  - type: text
    content: ' no hifampierena ao an-tranobeny'
  - type: note
    content: Heb. mpitondratenany
  - type: text
    content: ', ary ny amboadia'
  - type: note
    content: 'Na: jakala'
  - type: text
    content: ' ao amin''ny lapa nanaranam-po; efa antomotra ny fotoany, ary ny androny tsy hatao ela.'
  '3':
  - type: text
    content: 'Izaho efa nandidy ny nohamasiniko, eny, efa niantso ny lehilahy maheriko aho, dia ireo mibitaka amim-pireharehana, hahatanteraka ny fahatezerako. '
  '4':
  - type: text
    content: Injany! ny horakoraka any an-tendrombohitra, tahaka ny an'ny vahoaka be
  - type: note
    content: 'Na: firenena lehibe'
  - type: text
    content: '! Dia ny fitabataban''ny fanjakan''ny firenena efa tafatambatra! Jehovah, Tompon''ny maro, no manomana miaramila hiady, '
  '5':
  - type: text
    content: 'Izay avy any amin''ny tany lavitra, any amin''ny faravodilanitra, dia Jehovah sy ireo fitaovan''ny fahatezerany, ho enti-mandrava ny tany rehetra. '
  '6':
  - type: text
    content: 'Midradradradrà ianareo, fa efa antomotra ny andron''i Jehovah, ka tahaka ny loza tsy toha avy amin''ny Tsitoha no fihaviny. '
  '7':
  - type: text
    content: 'Ary noho izany dia hiraviravy ny tanana rehetra, ary ho kivy ny fon''ny zanak''olombelona rehetra; '
  '8':
  - type: text
    content: 'Ho toran-kovitra izy; Fanaintainana sy fahoriana no hahazo azy, ka hijalijaly tahaka ny vehivavy mihetsi-jaza izy; samy ho talanjona izy ka hifampijery; Mitarehin-delafo ny tarehiny. '
  '9':
  - type: text
    content: 'Indro, avy ny andron''i Jehovah, dia loza sy fahavinirana ary firehetan''ny fahatezerana hanafoanana ny tany sy handringanana ny mpanota tsy ho ao. '
