document_id: ISA.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faminaniana ny loza hanjo an'i Babylona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Faminaniana hitan'Isaia, zanak'i Amoza, ny amin'ny loza hanjo an'i Babylona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Manangàna faneva eo an-tampon''izay tendrombohitra mangadihady ianareo, manandrata feo hiantso azy, hofay tanana izy hiditra amin''ny vavahadin''ireo mpanapaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izaho efa nandidy ny nohamasiniko, eny, efa niantso ny lehilahy maheriko aho, dia ireo mibitaka amim-pireharehana, hahatanteraka ny fahatezerako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Injany! ny horakoraka any an-tendrombohitra, tahaka ny an'ny vahoaka be
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: firenena lehibe'
    marker-yv: yv-n
  - type: text
    text: '! Dia ny fitabataban''ny fanjakan''ny firenena efa tafatambatra! Jehovah, Tompon''ny maro, no manomana miaramila hiady, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izay avy any amin''ny tany lavitra, any amin''ny faravodilanitra, dia Jehovah sy ireo fitaovan''ny fahatezerany, ho enti-mandrava ny tany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Midradradradrà ianareo, fa efa antomotra ny andron''i Jehovah, ka tahaka ny loza tsy toha avy amin''ny Tsitoha no fihaviny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary noho izany dia hiraviravy ny tanana rehetra, ary ho kivy ny fon''ny zanak''olombelona rehetra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ho toran-kovitra izy; Fanaintainana sy fahoriana no hahazo azy, ka hijalijaly tahaka ny vehivavy mihetsi-jaza izy; samy ho talanjona izy ka hifampijery; Mitarehin-delafo ny tarehiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Indro, avy ny andron''i Jehovah, dia loza sy fahavinirana ary firehetan''ny fahatezerana hanafoanana ny tany sy handringanana ny mpanota tsy ho ao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa ny kintan''ny lanitra, na dia ireo Telonohorefy aza, dia tsy hampamirapiratra ny fahazavany; ny masoandro ho maizina amin''ny iposahany; Ary ny volana tsy hangarangarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hatsingeriko amin''izao tany rehetra izao ny faharatsiany, sy amin''ny ratsy fanahy ny helony; Ary hatsahatro ny fireharehan''ny mpiavonavona, Ary haetriko ny fiavonavonan''ny mpampahory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hataoko ho saro-tadiavina mihoatra noho ny volamena tsara ny olombelona, eny, noho ny tena volamena avy any Ofira aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary noho izany dia hampihorohoroiko ny lanitra, ary ny tany hientanentana hiala amin''ny fitoerany noho ny fahatezeran''i Jehovah, Tompon''ny maro, sy noho ny andro firehetan''ny fahatezerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ho tahaka ny gazela hazaina ny olona, sy ho tahaka ny ondry aman''osy tsy misy mpamory, ka dia samy ho lasa any amin''ny fireneny avy izy, eny, samy handositra ho any amin''ny taniny avy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izay rehetra azo dia holefonina, ary izay rehetra tratra dia ho lavon''ny sabatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ny zanany madinika hotorotoroina eo imasony; Ny tranony hobaboina, ary ny vadiny hosavihina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Indro, hamporisihiko hamely azy ny Mediana, izay manao ny volafotsy tsy ho zavatra ary tsy mankamamy ny volamena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny tsipìkany handripaka ny zatovo, ary izay ateraky ny kibo tsy hamindrany fo, eny, na dia ny zaza aza tsy hiantran''ny masony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary Babylona, ravaky ny fanjakana maro Tabiha sy reharehan''ny Kaldeana, Dia ho rava tahaka ny nandravan''Andriamanitra an''i Sodoma sy Gomora; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tsy honenana mandrakizay izy ary tsy hitoerana intsony hatramin''ny taranaka fara mandimby, Tsy hisy Arabo hanorin-day any, na mpiandry ondry hampandry ny ondriny any; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa ny bibi-dia any an-efitra no hitoetra any, ho feno vorondolo
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hyena'
    marker-yv: yv-n
  - type: text
    text: ' ny tranony, ny ostritsa no hitoetra any, ary ny osilahy'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. seirima; izahao Lev. xvii. 7
    marker-yv: yv-n
  - type: text
    text: ' no hitsambikimbikina any, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny kary
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. jakala
    marker-yv: yv-n
  - type: text
    text: ' no hifampierena ao an-tranobeny'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mpitondratenany
    marker-yv: yv-n
  - type: text
    text: ', ary ny amboadia'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: jakala'
    marker-yv: yv-n
  - type: text
    text: ' ao amin''ny lapa nanaranam-po; efa antomotra ny fotoany, ary ny androny tsy hatao ela.'
