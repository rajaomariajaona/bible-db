document_id: ZEC.8
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tonga ny tenin''i Jehovah, Tompon''ny maro, nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Saro-piaro dia saro-piaro an''i Ziona Aho, eny, saro-piaro azy amin''ny fahatezerana mafy Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izao no lazain''i Jehovah: Efa tafaverina ho eto Ziona Aho ka honina eto afovoan''i Jerosalema; ary Jerosalema dia hatao hoe Tanànan''ny fahamarinana, ary ny tendrombohitr''i Jehovah, Tompon''ny maro, dia hatao hoe Tendrombohitra masina. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Mbola hisy lahy antitra sy vavy antitra hipetraka eny an-dalamben''i Jerosalema, samy hitehina amin''ny tehina eny an-tànany isan-olona noho ny fahanterany; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary eny an-dalambe any an-tanàna dia ho feno ankizilahy madinika sy ankizivavy madinika milalao eny an-dalambe. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Raha mahagaga izany eo imason''ny sisa amin''ity firenena ity amin''izany andro izany, moa hahagaga eo imasoko koa va? hoy Jehovah, Tompon''ny maro. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Indro, hamonjy ny oloko avy any amin''ny tany atsinanana sy amin''ny tany andrefana Aho; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary hitondra azy Aho, ka honina any Jerosalema izy; dia ho oloko izy, ary Izaho kosa ho Andriamaniny amin''ny fahamarinana sy ny fahitsiana. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Aoka hatanjaka ny tananareo izay mandre izany teny izany amin''izao andro izao avy amin''ny vavan''ny mpaminany, izay teo tamin''ny andro nanaovana ny fanorenan''ny tranon''i Jehovah, Tompon''ny maro, dia ny nanaovana ny tempoly. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa talohan''izany andro izany dia tsy nisy valim-pahasasarana ho an''ny olona, na valim-pahasasarana ho an''ny biby fiompy; ary tsy nisy fiadanana ho an''izay nivoaka sy izay niditra noho ny fahavalo, fa nalefako samy hifamely amin''ny namany avy ny olona rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa amin''izay kosa dia tsy ho toy ny tamin''ny fahiny intsony amin''ny sisa amin''ity firenena ity Aho, hoy Jehovah, Tompon''ny maro. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa hisy vokatry ny fiadanana, ny voaloboka hamoa
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'na: fa hamoa ny voankazo izay vanona amin''ny fiadanana, dia ny voaloboka'
    marker-yv: yv-n
  - type: text
    text: ', ary ny tany hahavokatra, ary ny lanitra hampilatsaka ny andony, ary ny sisa amin''ity firenena ity no hampandovaiko izany rehetra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary toy ny nahatongavanareo ho fanozonana tany amin''ny firenena, ry taranak''i Joda sy ry taranak''Isiraely, dia ho toy izany no hamonjeko anareo, ka dia ho tonga fitsofan-drano kosa ianareo; aza matahotra, fa aoka hatanjaka ny tananareo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa izao no lazain''i Jehovah, Tompon''ny maro: Toy ny nisainako hahatonga loza aminareo tamin''ny nampahatezeran''ny razanareo Ahy, hoy Jehovah, Tompon''ny maro, ka tsy nanenina Aho, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'dia ho toy izany kosa no hisainako hanisy soa an''i Jerosalema sy ny taranak''i Joda amin''izao andro izao: aza matahotra ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izao no zavatra hataonareo: Samia miteny marina amin''ny namany avy ianareo; mitsarà marina, eny, mitsarà hahatonga fiadanana ao am-bavahadinareo; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ary aza misy mieritreritra ao am-ponareo hanisy ratsy ny namanareo ianareo, ary aza tia fianianan-tsy tò; fa izany rehetra izany dia halako, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny tenin''i Jehovah, Tompon''ny maro, dia tonga tamiko nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Ny fifadian-kanina amin''ny volana fahefatra sy ny fifadian-kanina amin''ny fahadimy sy ny fifadian-kanina amin''ny fahafito ary ny fifadian-kanina amin''ny fahafolo dia samy ho tonga fifaliana sy firavoravoana ary fotoana mahafinaritra avokoa ho an''ny taranak''i Joda; koa tiava ny fahamarinana sy ny fiadanana. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Mbola hisy firenena sy mponina avy amin''ny tanàna maro ho avy; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ary ny mponina ao amin''ny anankiray hankany amin''ny anankiray kosa ka hanao hoe: Aoka handeha tokoa isika hifona amin''i Jehovah sy hitady an''i Jehovah, Tompon''ny maro; izaho koa mba handeha. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Eny, ho avy ny olona maro sy ny firenena mahery mba hitady an''i Jehovah, Tompon''ny maro, any Jerosalema sy hifona amin''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Amin''izany andro izany dia hisy folo lahy avy amin''ny firenena samy hafa fiteny rehetra hihazona ny sisin-damban''ny Jiosy anankiray ka hanao hoe: Mba handeha hiaraka aminareo izahay; fa efa renay fa momba anareo Andriamanitra.'
