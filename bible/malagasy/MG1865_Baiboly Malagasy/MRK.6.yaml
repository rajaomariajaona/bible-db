document_id: MRK.6,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary niala teo Izy ka tonga tany amin''ny taniny, sady nanaraka Azy ny mpianany. '
  '10':
  - type: text
    content: 'Ary hoy koa Izy taminy: Izay trano hidiranareo, dia mitoera ao mandra-pialanareo any. '
  '11':
  - type: text
    content: 'Ary izay tanàna tsy hampandroso anareo, na tsy hihaino anareo, raha miala ianareo, dia ahintsano ny vovoka ao am-paladianareo ho vavolombelona aminy. '
  '12':
  - type: text
    content: 'Dia lasa nandeha izy ireo ka nitory fa tokony hibebaka ny olona. '
  '13':
  - type: text
    content: 'Ary demonia maro no navoakany; ary nohosorany diloilo ny marary maro ka nositraniny. '
  '14':
  - type: text
    content: 'Ary nahare izany Heroda mpanjaka (fa efa nalaza ny anaran''i Jesosy), dia hoy izy: Jaona Mpanao-batisa efa nitsangana tamin''ny maty izay, ka izany no ananany hery hanao ireo asa lehibe ireo. '
  '15':
  - type: text
    content: 'Fa hoy ny sasany: Elia Izy; ary hoy ny sasany: Mpaminany Izy dia toy ny anankiray amin''ny mpaminany. '
  '16':
  - type: text
    content: 'Ary rehefa nahare izany Heroda, dia hoy izy: Jaona izay, ilay notapahiko ny lohany; efa nitsangana izy. '
  '17':
  - type: text
    content: 'Fa Heroda ihany no naniraka sy nisambotra an''i Jaona ka namatotra azy tao an-tranomaizina noho ny amin''i Herodiasy vadin''i Filipo rahalahiny; fa nanambady azy izy. '
  '18':
  - type: text
    content: 'Fa Jaona efa nilaza tamin''i Heroda hoe: Diso ianao, raha manambady ny vadin''ny rahalahinao. '
  '19':
  - type: text
    content: 'Ary Herodiasy dia nanao otri-po taminy ka naniry hahafaty azy, nefa tsy nahazo. '
  '2':
  - type: text
    content: 'Ary rehefa tonga ny Sabata, dia nampianatra tao amin''ny synagoga Izy; ary maro izay nihaino Azy dia talanjona indrindra ka nanao hoe: Taiza no nahazoan''ilehity izany zavatra izany, ary manao ahoana ny fahendrena nomena Azy sy izao asa lehibe ataon''ny tànany izao? '
  '20':
  - type: text
    content: Fa Heroda natahotra an'i Jaona, satria fantany fa lehilahy marina sy masina izy, ka dia niaro azy izy; ary rehefa nandre azy izy, dia very hevitra be ihany
  - type: note
    content: 'Na: nanao zavatra maro'
  - type: text
    content: '; ary nihaino azy tamin''ny hafaliana izy. '
  '21':
  - type: text
    content: Ary rehefa tonga izay andro antonona, dia ilay nanaovan'i Heroda fanasana ho an'ny lehibe sy ny mpifehy arivo ary ny loholona tany Galilia tamin'ny andro fahatsiarovana ny
  - type: note
    content: 'Na: tamin''ny fitsingerenan''ny taona'
  - type: text
    content: ' nahaterahany, '
  '22':
  - type: text
    content: 'ka niditra ny zanakavavin''i Herodiasy ary nandihy ka nahafaly an''i Heroda mbamin''izay niara-nipetraka nihinana teo aminy, dia hoy ny mpanjaka tamin-drazazavavy: Angataho amiko izay tianao na inona na inona, dia homeko anao. '
  '23':
  - type: text
    content: 'Ary nianiana taminy hoe izy: Na inona na inona hangatahinao amiko dia homeko anao na dia hatramin''ny antsasaky ny fanjakako aza. '
  '24':
  - type: text
    content: 'Dia nivoaka razazavavy ka nanao tamin-dreniny hoe: Inona no hangatahiko? Ary hoy reniny: Ny lohan''i Jaona Mpanao-batisa. '
  '25':
  - type: text
    content: 'Dia niditra faingana niaraka tamin''izay izy ho ao amin''ny mpanjaka ka nangataka hoe: Tiako raha homenao ahy faingana eto an-dovia ny lohan''i Jaona Mpanao-batisa. '
  '26':
  - type: text
    content: 'Dia nalahelo indrindra ny mpanjaka, kanefa noho ny fianianany sy ny olona izay nipetraka nihinana teo, dia tsy sahy nandà azy izy. '
  '27':
  - type: text
    content: 'Ary niaraka tamin''izay ny mpanjaka dia naniraka mpiambina, ka nasainy nentiny ny lohan''i Jaona. Ary dia nandeha izy, ka notapahiny tao an-tranomaizina ny lohany. '
  '28':
  - type: text
    content: 'Dia nentiny teo an-dovia ny lohany ka nomeny an-drazazavavy; ary razazavavy kosa dia nanome azy an-dreniny. '
  '29':
  - type: text
    content: 'Ary rehefa nandre izany ny mpianany, dia tonga ka naka ny faty ary nandevina azy. '
  '3':
  - type: text
    content: 'Tsy ilay mpandrafitra, zanak''i Maria, ary rahalahin''i Jakoba sy Josesy sy Jodasy sy Simona va Ilehity? Ary tsy etỳ amintsika va ireo anabaviny? Dia tafintohina taminy izy. '
  '30':
  - type: text
    content: 'Ary ny Apostoly niangona teo amin''i Jesosy ka nilaza taminy izay rehetra efa nataony mbamin''izay nampianariny. '
  '31':
  - type: text
    content: 'Ary hoy Jesosy taminy: Avia ianareo hitokana any an-tany foana, ka mialà sasatra kelikely (fa maro no nifamoivoy, ka tsy nisy hihinanana aza). '
  '32':
  - type: text
    content: 'Dia nandeha an-tsambokely izy hitokana any an-tany foana. '
  '33':
  - type: text
    content: Ary ny olona nahita azy mandeha, sady betsaka no nahalala an'i Jesosy, dia niala avy teny amin'ny tanàna rehetra ny olona ka nihazakazaka nandeha an-tanety
  - type: note
    content: 'Na: nandeha tongotra'
  - type: text
    content: ', dia tonga talohany.'
  '34':
  - type: text
    content: 'Ary nony niala Jesosy, dia nahita vahoaka betsaka Izy ka onena azy, fa tahaka ny ondry tsy manana mpiandry ireo; dia nampianatra azy zavatra maro Izy. '
  '35':
  - type: text
    content: 'Ary rehefa hariva ny andro, dia nanatona Azy ny mpianany ka nanao hoe: Tany foana ity, ka efa hariva ny andro ankehitriny; '
  '36':
  - type: text
    content: 'ravao ny olona mba hankanesany eny an-tsaha sy eny amin''ny vohitra manodidina hividy hanina ho azy. '
  '37':
  - type: text
    content: 'Fa Izy namaly ka nanao taminy hoe: Omeonareo hanina izy. Fa hoy kosa izy ireo taminy: Handeha hividy mofo izay azon''ny denaria roan-jato va izahay, ka homenay azy hohaniny? '
  '38':
  - type: text
    content: 'Fa hoy Izy taminy: Misy mofo firy any aminareo? Andeha, izahao. Ary rehefa fantany, dia hoy izy: Dimy sy hazandrano roa. '
  '39':
  - type: text
    content: 'Dia nasain''i Jesosy nampipetraka ny olona rehetra hatao an-tokotokony eny ambonin''ny ahi-maitso izy. '
  '4':
  - type: text
    content: 'Fa ho Jesosy taminy: Tsy misy mpaminany tsy hajaina afa-tsy eo amin''ny taniny sy ny havany ary ny ankohonany ihany. '
  '40':
  - type: text
    content: 'Dia nipetraka an-tokony zato sy dimam-polo avy ny olona. '
  '41':
  - type: text
    content: 'Ary rehefa voarain''i Jesosy ny mofo dimy sy ny hazandrano roa, dia niandrandra ny lanitra Izy ka nisaotra, dia novakiny ny mofo ka natolony ny mpianatra mba harosony eny anoloan''ny olona; ary ny hazandrano roa nozarainy tamin''ny olona rehetra. '
  '42':
  - type: text
    content: 'Ary samy nihinana avokoa ny olona rehetra ka voky. '
  '43':
  - type: text
    content: 'Ary nangoniny izay sombintsombin''ny mofo sy ny hazandrano, ka dia nahafeno harona roa ambin''ny folo. '
  '44':
  - type: text
    content: 'Ary izay nihinana ny mofo dia dimy arivo lahy. '
  '45':
  - type: text
    content: 'Ary niaraka tamin''izay Jesosy dia nanery ny mpianany hiondrana an-tsambokely hita hialoha ho any Betsaida, mandra-pandràvany ny vahoaka. '
  '46':
  - type: text
    content: Ary rehefa nanao veloma ny olona Izy, dia lasa nankany an-tendrombohitra hivavaka.
  '47':
  - type: text
    content: 'Ary nony hariva ny andro, dia efa mby teo ampovoan''ny ranomasina ny sambokely, ary Izy irery ihany no teo an-tanety. '
  '48':
  - type: text
    content: 'Ary nahita azy ireo sahirana nivoy fatratra Izy, fa notohain''ny rivotra: ary tokony ho tamin''ny fiambenana fahefatra amin''ny alina dia nankeny aminy nitsangantsangana tambonin''ny ranomasina Jesosy ka nikasa handalo azy. '
  '49':
  - type: text
    content: 'Ary rehefa hitany nitsangantsangana tambonin''ny ranomasina Izy, dia nataony ho matoatoa, ka niantso mafy izy ireo. '
  '5':
  - type: text
    content: 'Ary tsy nahazo nampiseho hery akory Izy teo, afa-tsy ny nametraka ny tànany tamin''ny olona marary vitsy foana ka nahasitrana azy. '
  '50':
  - type: text
    content: 'Fa izy rehetra samy nahita Azy avokoa, ka dia raiki-tahotra. Ary Izy niteny taminy niaraka tamin''izay ka nanao taminy hoe: Matokia, fa Izaho ihany; aza matahotra. '
  '51':
  - type: text
    content: 'Ary niakatra nankeo aminy teo an-tsambokely Izy; dia nitsahatra ny rivotra, ka dia talanjona izy ireo. '
  '52':
  - type: text
    content: 'Ary tsy fantany ny amin''ny mofo; fa efa mafy ny fony. '
  '53':
  - type: text
    content: 'Ary nony tafita izy, dia tonga teo amin''ny tany Genesareta ka niantsona teo. '
  '54':
  - type: text
    content: 'Ary raha niala teo an-tsambokely izy, dia nahalala an''i Jesosy niaraka tamin''izay ny olona teo '
  '55':
  - type: text
    content: 'ka nihazakazaka tamin''izany tany rehetra izany ary nitondra ny marary tamin''ny fandriana ho any amin''izay reny fa nitoerany. '
  '56':
  - type: text
    content: Ary na taiza na taiza no nidiran'i Jesosy, na tao amin'ny vohitra, na tao an-tanàna, na tany an-tsaha, dia napetraka teo an-kianja ny marary, ary ny olona nangataka hanendry na dia ny somotraviavin-dambany ihany aza; ary sitrana
  - type: note
    content: Gr. voavonjy
  - type: text
    content: ' izay rehetra nanendry Azy.'
  '6':
  - type: text
    content: Ary gaga Izy noho ny tsi-finoany. Dia nitety ny vohitra manodidina Izy ka nampianatra.
  '7':
  - type: text
    content: 'Ary niantso ny roa ambin''ny folo lahy hankeo aminy Izy ka naniraka azy tsiroaroa sy nanome azy fahefana hamoaka fanahy maloto. '
  '8':
  - type: text
    content: Ary nandrara azy Izy mba tsy hitondra zavatra ho any amin'ny halehany, na hanina, na kitapo, na vola
  - type: note
    content: Gr. varahina
  - type: text
    content: ' ao amin''ny fehin-kibony, afa-tsy tehina ihany. '
  '9':
  - type: text
    content: 'Fa asio kapa ny tongotrareo; ary aza mitondra akanjo roa. '
