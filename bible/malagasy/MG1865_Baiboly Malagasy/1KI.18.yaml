document_id: 1KI.18,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nihaonan'i Elia tamin'i Ahaba. sy ny nandreseny ny mpaminanin'i Bala
  - type: text
    content: 'Ary nony afaka andro maro, dia tonga tamin''i Elia ny tenin''i Jehovah tamin''ny taona fahatelo nanao hoe: Mandehana hiseho amin''i Ahaba, fa handatsaka ranonorana amin''ny tany Aho. '
  '10':
  - type: text
    content: 'Raha velona koa Jehovah Andriamanitrao, dia tsy misy firenena na fanjakana izay tsy nanirahan''ny tompoko hitady anao; ary raha hoy ny olona: Tsy ato izy, dia nampianianiny izany firenena sy fanjakana izany raha tsy nahita anao izy. '
  '11':
  - type: text
    content: 'Ary ankehitriny hoy ianao: Andeha, lazao amin''ny tomponao hoe: Injao, atsy Elia. '
  '12':
  - type: text
    content: 'Nefa raha vao miala aminao aho, dia ho entin''ny Fanahin''i Jehovah any amin''izay tsy fantatro ianao; koa raha tonga aho ka milaza amin''i Ahaba, nefa tsy ho hitany ianao tsinona, dia hovonoiny aho; kanefa izaho mpanomponao matahotra an''i Jehovah hatry ny fony mbola kely. '
  '13':
  - type: text
    content: 'Moa tsy nolazaina taminao va, tompoko, izay nataoko tamin''ilay namonoan''i Jezebela ny mpaminanin''i Jehovah, dia ny nanafenako ny mpaminanin''i Jehovah zato lahy, ka dimam-polo avy no nataoko tao an-johy iray, ary novelomiko mofo sy rano ireo? '
  '14':
  - type: text
    content: 'Nefa ankehitriny hoy ianao: Andeha, lazao amin''ny tomponao hoe: Injao, atsy Elia; dia hamono ahy Ahaba. '
  '15':
  - type: text
    content: 'Fa hoy Elia: Raha velona koa Jehovah, Tompon''ny maro, Izay itsanganako eo anatrehany, dia hiseho aminy tokoa aho anio. '
  '16':
  - type: text
    content: Dia lasa Obadia nitsena an'i Ahaba ka nilaza taminy; ary Ahaba nandeha hitsena an'i Elia.
  '17':
  - type: text
    content: 'Ary nony hitan''i Ahaba Elia, dia hoy izy taminy: Hay! tonga etỳ ianao, ry ilay mampidi-doza amin''ny Isiraely! '
  '18':
  - type: text
    content: 'Fa Elia namaly hoe: Tsy izaho no nampidi-doza tamin''ny Isiraely, fa ianao sy ny mpianakavin''ny rainao ihany tamin''ny nandavanareo ny didin''i Jehovah sy ny nanarahanao ireo Bala. '
  '19':
  - type: text
    content: 'Ary ankehitriny maniraha hamory ny Isiraely rehetra hihaona amiko any an-tendrombohitra Karmela, ary ny mpaminanin''i Bala dimam-polo amby efa-jato sy ny mpaminanin''ny Aseraha efa-jato, izay mihinana eo amin''ny latabatr''i Jezebela. '
  '2':
  - type: text
    content: Dia niainga Elia hiseho amin'i Ahaba. Ary mafy ny mosary tany Samaria.
  '20':
  - type: text
    content: 'Dia naniraka tany amin''ny Zanak''Isiraely rehetra Ahaba ka namory ny mpaminany ho any an-tendrombohitra Karmela. '
  '21':
  - type: text
    content: 'Ary dia nankeo amin''ny olona rehetra Elia ka nanao hoe: Mandra-pahoviana no hiroa saina ianareo ? Raha Jehovah no Andriamanitra, manaraha Azy; fa raha Bala kosa, dia manaraha azy. Fa ny olona tsy namaly azy akory.'
  '22':
  - type: text
    content: 'Dia hoy Elia tamin''ny olona: Izaho dia izaho irery ihany no sisa amin''ny mpaminanin''i Jehovah; fa ny mpaminanin''i Bala kosa dia dimam- -polo amby efa-jato lahy. '
  '23':
  - type: text
    content: 'Koa aoka ireo no hanome vantotr''ombilahy roa ho antsika; ary aoka izy no hifidy ny iray ho azy, dia handrasa azy ka hametraka azy eo ambonin''ny kitay hazo, nefa tsy hasiana afo ao; ary izaho kosa hamboatra ny iray ka hametraka azy eo ambonin''ny kitay hazo, nefa tsy hasiana afo koa ao. '
  '24':
  - type: text
    content: 'Ary miantsoa ny anaran''ny andriamanitrareo ianareo, ary izaho kosa hiantso ny anaran''i Jehovah; koa Izay Andriamanitra mamaly amin''ny afo, dia aoka Izy no ho Andriamanitra. Ary ny olona rehetra namaly hoe: Marina izany teny izany. '
  '25':
  - type: text
    content: 'Ary hoy Elia tamin''ireo mpaminanin''i Bala: Mifidiana vantotr''ombilahy iray ho anareo, ka dia manamboara aloha ianareo, satria ianareo no maro; ary miantsoa ny anaran''ny andriamanitrareo, nefa aza asiana afo ao. '
  '26':
  - type: text
    content: 'Dia naka ny vantotr''ombilahy izay nomeny azy ireo ka namboatra azy, dia niantso ny anaran''i Bala hatramin''ny maraina ka mandra-pitataovovonan''ny andro izy nanao hoe: Ry Bala ô. henoy izahay! Kanjo tsy nisy nanoina na namaly akory. Ary nihinjakinjaka tamin''ny alitara izay nataony izy. '
  '27':
  - type: text
    content: 'Ary nony nitataovovonana ny andro, dia nanesoeso azy Elia ka nanao hoe: Miantsoa mafy ihany, fa andriamanitra izy; angamba sondrian-dresaka izy, na miavela, na nisy nalehany, na matory angaha izy ka tsy maintsy hofohazina. '
  '28':
  - type: text
    content: 'Dia niantso mafy indray ireo sady nitetika ny tenany araka ny fanaony amin''ny sabatra sy ny lefona mandra-pahaloa-drà tamin''ny tenany. '
  '29':
  - type: text
    content: 'Ary na dia efa nitsidika aza ny andro, dia mbola naminany ihany izy hatramin''ny fotoan''ny fanatitra hariva; nefa tsy nisy nanoina, na namaly, na nihaino azy akory. '
  '3':
  - type: text
    content: 'Ary Ahaba niantso an''i Obadia, izay lehiben''ny tao an-dapany (Obadia dia natahotra an''i Jehovah tokoa, '
  '30':
  - type: text
    content: 'Ary hoy Elia tamin''ny olona rehetra: Manatona ahy. Dia nanatona azy ny olona rehetra. Ary Elia namboatra ny alitaran''i Jehovah izay efa rava '
  '31':
  - type: text
    content: 'ka naka vato roa ambin''ny folo, araka ny isan''ny firenen''ny zanak''i Jakoba, izay nihavian''ilay tenin''i Jehovah hoe: Isiraely no ho anaranao; '
  '32':
  - type: text
    content: ary izany vato izany dia nataony alitara ho an'ny anaran'i Jehovah; ary nanao hady kely manodidina ny alitara koa izy, izay mifafy
  - type: note
    content: 'Na: mahalany'
  - type: text
    content: ' voan-javatra indroan''ny famarana'
  - type: note
    content: Heb. sea
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'Ary nandahatra ny kitay hazo izy, dia nandrasa ny vantotr''ombilahy ka nametraka azy teo ambonin''ny kitay hazo, '
  '34':
  - type: text
    content: 'dia nanao hoe: Fenoy rano ny siny efatra, ka aidino amin''ny fanatitra dorana sy amin''ny kitay hazo. Dia hoy koa izy: Ataovy indray izany. Dia nataony indray. Ary hoy koa izy: Ataovy indray koa izany. Ary dia nataony indray koa. '
  '35':
  - type: text
    content: 'Ary ny rano nikorotsaka nanodidina ny alitara; ka nofenoiny rano koa ny hady kely. '
  '36':
  - type: text
    content: 'Ary nony tamin''ny fotoan''ny fanatitra hariva dia nanatona Elia mpaminany ka nanao hoe: Jehovah ô. Andriamanitr''i Abrahama sy Isaka ary Isiraely, aoka ho fantatra anio fa Hianao no Andriamanitra amin''ny Isiraely, ary izaho no mpanomponao, ary araka ny teninao no efa nanaovako izao zavatra izao. '
  '37':
  - type: text
    content: 'Mihainoa ahy mihainoa ahy, Jehovah ô, mba hahafantaran''ireto olona ireto fa Hianao Jehovah no Andriamanitra, ary Hianao no mampiverina ny fony indray. '
  '38':
  - type: text
    content: 'Dia latsaka ny afon''i Jehovah ka nandevona ny fanatitra dorana sy ny kitay hazo sy ny vato ary ny vovoka sady nandritra ny rano tao amin''ny hady kely. '
  '39':
  - type: text
    content: 'Ary raha nahita izany ny olona rehetra, dia niankohoka ka nanao hoe: Jehovah, Izy no Andriamanitra; Jehovah, Izy no Andriamanitra. '
  '4':
  - type: text
    content: 'ka nony naringan''i Jezebela ny mpaminanin''i Jehovah, dia nalain''i Obadia ny mpaminany zato ka nafeniny, dimam-polo avy no nataony tao an-johy iray, ary novelominy mofo sy rano ireo). '
  '40':
  - type: text
    content: 'Ary hoy Elia taminy: Sambory ny mpaminanin''i Bala; aza avela hisy afa-mandositra izy na dia iray akory aza. Dia nosamborin''ny olona izy; ary nentin''i Elia ho eo amin''ny ony Kisona, ka dia novonoiny teo.'
  '41':
  - type: text
    content: 'Ary hoy Elia tamin''i Ahaba: Miakara hihinana sy hisotro, fa misasasasa izato ny ranonorana be. '
  '42':
  - type: text
    content: 'Dia niakatra hihinana sy hisotro Ahaba. Fa Elia kosa niakatra ho eo an-tampon''i Karmela, dia niankohoka tamin''ny tany, ary ny lohany nataony teo anelanelan''ny lohaliny '
  '43':
  - type: text
    content: 'Ary hoy izy tamin''ny zatovony: Miakara kely, ka tazano ny ranomasina. Dia niakatra izy ka nitazana, dia nanao hoe: Tsy misy na inona na inona. Ary hoy izy: Mandehana koa impito. '
  '44':
  - type: text
    content: 'Ary nony fanimpitony, dia hoy izy: Misy rahona kely hoatra ny tànan''olona miakatra avy eny amin''ny ranomasina. Dia hoy izy: Miakara, ka lazao amin''i Ahaba hoe: Amboary ny kalesinao, ka midìna, fandrao voasakan''ny ranonorana ianao. '
  '45':
  - type: text
    content: 'Ary vetivety dia maintin''ny rahona sy ny rivotra ny lanitra, ka nisy ranonorana be. Ary Ahaba niakatra tamin''ny kalesy ka nankany Jezirela. '
  '46':
  - type: text
    content: Ary ny tànan'i Jehovah dia tao amin'i Elia, dia nisikina izy ka nihazakazaka teo alohan i Ahaba mandra-pahatongany tany Jezirela.
  '5':
  - type: text
    content: 'Ary hoy Ahaba tamin''i Obadia: Andeha mitety ny tany, dia hatrany amin''ny loharano rehetra sy hatrany amin''ny lohasahan-driaka rehetra; fa angamba hahita ahitra hamelomana ny soavaly sy ny ampondra isika, mba tsy hisy hovonointsika ny biby fiompintsika. '
  '6':
  - type: text
    content: Dia nizara lalana izy, ka Ahaba nandeha tamin'ny lalana iray, ary Obadia kosa nandeha tamin'ny lalana iray.
  '7':
  - type: text
    content: 'Ary raha tany an-dalana Obadia indro, Elia nifanena taminy; ary nahalala azy izy, dia niankohoka ka nanao hoe: Hay! ianao va ity, ry Elia tompoko? '
  '8':
  - type: text
    content: 'Ary izy namaly azy hoe: Eny, izaho ity, andeha, lazao amin''ny tomponao hoe: Injao, atsy Elia. '
  '9':
  - type: text
    content: 'Fa hoy Obadia: Inona no heloko, no anoloranao ny mpanomponao ho eo an-tànan''i Ahaba hamonoany ahy? '
