document_id: REV.4,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fideran'ny any an-danitra an'Andriamanitra, Mpanao ny zavatra rehetra
  - type: text
    content: 'Rehefa afaka izany, dia hitako fa, indro, nisy varavarana nivoha tany an-danitra; ary ilay feo voalohany izay efa reko dia tahaka ny an''ny trompetra niteny tamiko hoe: Miakara atỳ, dia hasehoko anao izay zavatra tsy maintsy ho avy rahatrizay.'
  '10':
  - type: text
    content: 'dia hiankohoka eo anoloan''izay mipetraka eo ambonin''ny seza fiandrianana ny loholona efatra amby roa-polo ka hivavaka amin''izay velona mandrakizay mandrakizay, dia hanipy ny satro-boninahiny eo anoloan''ny seza fiandrianana ka hanao hoe: '
  '11':
  - type: text
    content: Hianao, Tomponay sy Andriamanitray, no miendrika handray ny voninahitra sy ny haja ary ny hery; Fa Hianao no nahary ny zavatra rehetra, Ary noho ny sitraponao no nahanisy sy nahary azy.
  '2':
  - type: text
    content: 'Ary niaraka tamin''izay dia voatsindrin''ny Fanahy aho; ary indro seza fiandrianana nipetraka tany an-danitra, ary nisy Anankiray nipetraka teo ambonin''ny seza fiandrianana. '
  '3':
  - type: text
    content: 'Ary ny tarehin''ilay nipetraka dia tahaka ny vato jaspy sy karneola; ary avana mitarehin''emeralda no nanodidina ny seza fiandrianana. '
  '4':
  - type: text
    content: Ary manodidina ilay seza fiandrianana iray dia nisy seza fiandrianana efatra amby roa-polo; ary teo ambonin'ireo seza fiandrianana ireo dia nisy loholona
  - type: note
    content: Gr. presbytera
  - type: text
    content: ' efatra amby roa-polo nipetraka, nitafy fitafiana fotsy sady nisatroka satro-boninahitra volamena. '
  '5':
  - type: text
    content: 'Ary nisy helatra sy feo ary kotrokorana nivoaka avy tamin''ny seza fiandrianana; ary nisy jiro fito nirehitra teo anoloan''ny seza fiandrianana, dia Fanahy fiton''Andriamanitra ireo. '
  '6':
  - type: text
    content: 'Ary teo anoloan''ny seza fiandrianana dia nisy toa ranomasina fitaratra tahaka ny vato krystaly; ary teo afovoan''ny seza fiandrianana sy manodidina azy nisy zava-manan''aina efatra feno maso avokoa ny anoloany sy ny ivohony. '
  '7':
  - type: text
    content: 'Ary ny zava-manan''aina voalohany dia tahaka ny liona, ary ny zava-manan''aina faharoa dia tahaka ny zanak''omby, ary ny zava-manan''aina fahatelo dia manana tava tahaka ny tavan''olona, ary ny zava-manan''aina fahefatra dia tahaka ny voromahery manidina. '
  '8':
  - type: text
    content: 'Ary ny zava-manan''aina efatra dia samy nanana elatra enina avy, sady feno maso ny tenany rehetra manodidina ka hatrao anatiny; ary tsy mitsahatra andro aman''alina izy manao hoe: Masina, masina, masina ny Tompo Andriamanitra Tsitoha, Ilay taloha sy ankehitriny ary ho avy. '
  '9':
  - type: text
    content: 'Ary raha ny zava-manan''aina hanome voninahitra sy haja ary fisaorana ho an''ilay mipetraka eo ambonin''ny seza fiandrianana, dia Izay velona mandrakizay mandrakizay, '
