document_id: GEN.28
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nisehoan'Andriamanitra tamin'i Jakoba tao Betela
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Isaka nampaka an''i Jakoba ka nitso-drano azy ary namepetra azy hoe : Aza maka vady avy amin''ny zanakavavin''ny Kananita ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Miainga ka mankanesa any Mesopotamia, any amin''ny tranon''i Betoela rain-dreninao; dia makà vady any, avy amin''ny zanakavavin''i Labana anadahin-dreninao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Andriamanitra Tsitoha anie hitahy anao ka hahamaro fara anao sy hampitombo anao, mba ho tonga firenena maro ianao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ary homeny anao anie ny fitahiana an''i Abrahama, dia ho anao sy ny taranakao koa, mba handovanao ny tany fivahinianao, izay efa nomen''Andriamanitra an''i Abrahama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Isaka nampandeha an''i Jakoba ka dia lasa izy nankany Mesopotamia, ho any amin''i Labana, zanak''i Betoela Syriana, anadahin-dRebeka, renin''i Jakoba sy Esao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nony hitan''i Esao fa Isaka efa nitso-drano an''i Jakoba ka efa nampandeha azy ho any Mesopotamia haka vady any ary nitso-drano azy sady namepetra azy hoe: Aza maka vady avy amin''ny zanakavavin''ny Kananita ianao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'koa Jakoba efa nanaraka ny tenin''ny rainy aman-dreniny ka lasa nankany Mesopotamia; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary hitan''i Esao fa efa ratsy teo imason''Isaka rainy ny zanakavavin''ny Kananita: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: dia lasa Esao nankany amin'Isimaela ka naka an'i Mahalota, zanakavavin'Isimaela, zanak'i Abrahama, sady anabavin'i Nebaiota, ho vadiny, ho fanampin'ny vady izay nananany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nivoaka avy tany Beri-sheba Jakoba ka nankany Harana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary tonga teo amin''ny fitoerana anankiray izy ka nandry teo niloaka alina, satria efa maty ny masoandro; dia naka vato tamin''izany fitoerana izany izy, ka nataony ondana, dia nandry teo izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nanonofy izy, ka, indro, nisy tohatra niorina tamin''ny tany, ka nipaka tamin''ny lanitra ny lohany; ary, indreo, nisy anjelin''Andriamanitra niakatra sy nidina teo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary, indro, Jehovah niseho teo amboniny ka nanao hoe: Izaho no Jehovah, Andriamanitr''i Abrahama rainao sy Andriamanitr''Isaka; ny tany izay andrianao dia homeko anao sy ny taranakao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary ny taranakao ho be tahaka ny vovoka amin''ny tany; dia hiely any andrefana sy any atsinanana ary any avaratra sy any atsimo ianao; ary aminao sy ny taranakao no hitahiana ny firenena rehetra ambonin''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary, indro, Izaho momba anao ka hiaro anao amin''izay lalan-kalehanao rehetra ary hampody anao indray ho amin''ity tany ity; fa tsy handao anao Aho mandra-panaoko izay voalazako taminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary Jakoba nahatsiaro tamin''ny torimasony, dia nanao hoe: Ato amin''ity fitoerana ity tokoa Jehovah, fa izaho no tsy nahalala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia raiki-tahotra izy ka nanao hoe : Endrey, mahatahotra ity fitoerana ity! tsy hafa ity, fa tranon''Andriamanitra sy vavahadin''ny lanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nifoha maraina koa Jakoba, dia naka ilay vato izay nataony ondana ka nanorina azy ho tsangam-bato, dia nampidina diloilo teo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ny anaran''izany fitoerana izany dia nataony hoe Betela, fa Lozy no anaran''ilay tanàna tany aloha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nivoady Jakoba ka nanao hoe: Raha homba ahy Andriamanitra ka hiaro ahy amin''izao lalana alehako izao, ary hanome ahy mofo hohaniko sy lamba hitafiako, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ka ho tafaverina soa aman-tsara any amin''ny tranon''ny raiko aho, dia Jehovah no ho Andriamanitro, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ary ity vato izay naoriko ho tsangam-bato ity ho tranon'Andriamanitra, ary izay rehetra homenao ahy, dia homeko Anao tokoa ny ampahafolony.
