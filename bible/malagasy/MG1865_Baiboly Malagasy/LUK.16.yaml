document_id: LUK.16,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary hoy koa Jesosy tamin''ny mpianatra: Nisy olona manan-karena anankiray nanana mpitandrina ny fananany; ary ilehiny dia nampangain''olona taminy fa mandany ny fananany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary izay mahatoky amin''ny kely indrindra dia mahatoky koa amin''ny be; ary izay tsy marina amin''ny kely indrindra dia tsy marina koa amin''ny be. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Koa raha tsy mahatoky amin''ny mamôna tsy marina ianareo, iza no hatoky anareo ny amin''ny tena harena? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary raha tsy mahatoky amin''izay an''olona ianareo, iza no hanome anareo izay anareo? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Tsy misy mpanompo mahay manompo tompo roa; fa ny anankiray ho halany, ary anankiray ho tiany; na ny anankiray hombany, ary ny anankiray hohamavoiny. Tsy mahay manompo an''Andriamanitra sy mamôna ianareo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary ny Fariseo, izay fatra-pitia vola, raha nandre izany rehetra izay, dia naneso an''i Jesosy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary hoy Jesosy taminy: Hianareo dia mpanamarin-tena eo anatrehan''ny olona, nefa Andriamanitra mahalala ny fonareo; fa izay zavatra heverin''ny olona ho ambony dia fahavetavetana eo anatrehan''Andriamanitra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ny lalàna sy ny mpaminany dia hatramin''i Jaona; ary hatramin''izany no efa nitoriana ny filazantsaran''ny fanjakan''Andriamanitra, ary misesika izay rehetra miditra eo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa ho moramora kokoa ny hahafoanan''ny lanitra sy ny tany noho ny hahafoanan''ny tendron-tsoratra iray monja aza amin''ny lalàna. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Izay rehetra misao-bady ka mampakatra ny hafa dia mijangajanga; ary izay mampakatra vehivavy voasaotra dia mijangajanga koa. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nisy lehilahy manan-karena anankiray niakanjo volomparasy sy rongony fotsy madinika sady nanaram-po fatratra isan''andro tamin''ny fahafinaretana. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary nampaka azy izy ka nanao taminy hoe: Ahoana izao fandrenesako anao izao? Mamoaha ny amin''ny fitandremanao ny fananako; fa tsy mahazo mitandrina ny fananako intsony ianao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary nisy olo-malahelo ferena anankiray atao hoe Lazarosy napetraka teo anilan''ny vavahadiny; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ary naniry mba hihinana izay latsaka avy tamin'ny latabatr'ilay manan-karena izy, fa ny alika kosa no avy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ary ny alika koa dia avy'
      marker-yv: yv-n
    - type: text
      text: ' ka nilelaka ny feriny. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary maty ilay malahelo, dia nentin''ny anjely ho any an-tratran''i Abrahama; ary maty koa ilay manan-karena, dia nalevina; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ary raha nijaly tao amin'ny fiainan-tsi-hita
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. Hadesy
      marker-yv: yv-n
    - type: text
      text: ' izy ka niandrandra, dia nahita an''i Abrahama teny lavitra eny sy Lazarosy teo an-tratrany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary izy niantso ka nanao hoe: Ry Abrahama raiko ô, mamindrà fo amiko, ka iraho Lazarosy mba hanoboka ny tendron''ny rantsan-tanany amin''ny rano mba hampangatsiaka ny lelako; fa fadiranovana aho eto anatin''ity lelafo ity. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fa hoy Abrahama: Anaka, tsarovy fa ianao efa nahazo ny zava-tsoanao tamin''ny andro niainanao, ary Lazarosy kosa ny zava-dratsy; fa ankehitriny izy no ampifalinay . ary ianao kosa no fadiranovana. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary mihoatra noho izany rehetra izany, misy tevana makadiry ajadona ao anelanelantsika, mba tsy ho afa-mita hankeny aminareo izay te-hiala etỳ, ary ny ho afa-mita hanketỳ aminay izay eny. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Dia hoy izy: Mangataka aminao ary aho, ry raiko: mba iraho Lazarosy hankany amin''ny tranon''ny raiko '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '(fa manana rahalahy dimy aho), mba hilaza tsara aminy, fandrao mba ho tongay amin''ity fijaliana ity koa izy. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Fa hoy Abrahama taminy: Manana an''i Mosesy sy ny mpaminany izy; aoka hihaino ireo izy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary ilay mpitandrina ny fananana nanao anakampo hoe: Inona ange no hataoko, fa esorin''ny tompoko amin''ny fitandremana ny fananany aho? Ny miasa tany tsy tratry ny aiko; ny mangataka mahamenatra ahy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Fa hoy kosa izy: Tsia, ry Abrahama, raiko; fa raha misy miala amin''ny maty hankany aminy, dia hibebaka izy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Fa hoy Abrahama taminy: Raha tsy mihaino an''i Mosesy sy ny mpaminany izy, dia tsy hety hino izy, na dia misy mitsangana amin''ny maty aza.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fantatro izay hataoko, mba hisy handray ahy ho ao an-tranony, rehefa voaisotra amin''ny fitandremana ny fananana aho. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia niantso izay rehetra nitrosa tamin''ny tompony izy hankao aminy ka nanao tamin''ny voalohany hoe: Hoatrinona no trosan''ny tompoko aminao? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary hoy io: Diloilo injaton''ny famarana'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. bata
      marker-yv: yv-n
    - type: text
      text: '. Dia hoy izy taminy koa: Inty, raiso ny taratasinao, ary mipetraha faingana, ka dimam-polo no soraty. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia hoy izy tamin''ny anankiray koa: Hoatrinona kosa no trosa aminao? Ary hoy izy: Vary injaton''ny famarana'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. kora
      marker-yv: yv-n
    - type: text
      text: '. Dia hoy izy taminy koa: Inty, raiso ny taratasinao ka valo-polo no soraty. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary ny tompony nidera ilay mpitandrina tsy marina, satria nanan-tsaina izy; fa ny zanak''izao tontolo izao dia manan-tsaina kokoa ny amin''ny karazany noho ny zanaky ny mazava. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary hoy Izaho aminareo: Aoka ny mamôna tsy marina ho entinareo mahazo sakaiza, mba horaisin''ireo ho any amin''ny fonenana mandrakizay ianareo, rehefa lany izany. '
