document_id: PSA.48,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tsy nahazoan'ny fahavalo hamely ny tanànan'Andriamanitra, Mpanjaka lehibe
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tonon-kira. Salamo nataon'ny Koraita. Lehibe Jehovah ka mendrika hoderaina indrindra, ao an-tanànan'Andriamanitsika, ao an-tendrombohiny masina.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Araka ny anaranao, Andriamanitra ô, no fiderana Anao hatramin'ny faran'ny tany; feno fahamarinana ny tananao ankavanana.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka hifaly ny tendrombohitra Ziona, aoka ho ravoravo ny zanaka-vavin''Joda, noho ny fitsaranao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manodidina an''i Ziona ianareo, eny, mandehana manodidina azy; isao ny tilikambony, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hevero tsara ny mandany, diniho ny tranon''andrianany, mba hambaranareo amin''ny taranaka mandimby. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa izany no Andriamanitra, dia Andriamanitsika mandrakizay doria; Izy no hitarika antsika na dia hatramin'ny fahafatesana aza.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avo mahafinaritra, fifalian''ny tany rehetra, ny tendrombohitra Ziona, eo amin''ny ilany avaratra, tanànan''ny Mpanjaka lehibe. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Andriamanitra ao an-tranon''andriana ao dia nanao izay hahafantarana Azy ho fiarovana avo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa he! niangona ny mpanjaka maro, niara-nandroso avokoa izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nijery izy ka talanjona terỳ; Very hevitra izy ka nalaky nandositra; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hovitra no nahazo azy teo, dia tahaka ny fanaintainan''ny vehivavy raha miteraka. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amin'ny rivotra avy any atsinanana no namakianao ny sambon'i Tarsisy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Araka izay efa rentsika no hitantsika, tao an-tanànan''i Jehovah, Tompon''ny maro, tao an-tanànan''Andriamanitsika. Andriamanitra mampitoetra azy mandrakizay. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nieritreritra ny famindram-ponao izahay, Andriamanitra ô, tao anatin''ny tempolinao. '
