document_id: EPH.5,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Koa amin''izany dia aoka hanahaka an''Andriamanitra ianareo tahaka ny zanaka malala; '
  '10':
  - type: text
    content: 'mamantatra izay ankasitrahan''ny Tompo. '
  '11':
  - type: text
    content: 'Ary aza miray amin''ny asan''ny maizina tsy mahavoka-tsoa, fa aleo mananatra izany. '
  '12':
  - type: text
    content: 'Fa izay ataony ao amin''ny miafina, dia mahamenatra na dia ny milaza izany aza. '
  '13':
  - type: text
    content: 'Fa ny zavatra rehetra, raha anarina, dia asehon''ny mazava; fa na inona na inona aseho dia mazava. '
  '14':
  - type: text
    content: 'Koa izany no ilazany hoe: Mifohaza ianao izay matory, Ary mitsangàna amin''ny maty, Dia hampahazava anao Kristy. '
  '15':
  - type: text
    content: 'Koa tandremo tsara izay fandehanareo, mba tsy hitondranareo tena tahaka ny adala, fa tahaka ny hendry, '
  '16':
  - type: text
    content: 'ka hararaoty ny andro azo anaovan-tsoa, fa ratsy izao fiainana izao. '
  '17':
  - type: text
    content: 'Ary noho izany dia aza manao adaladala, fa aoka ho fantatrareo izay sitrapon''ny Tompo. '
  '18':
  - type: text
    content: 'Ary aza ho mamon-divay ianareo, fa amin''izany dia misy fanaranam-po amin''ny ratsy, fa aoka hofenoina ny Fanahy, '
  '19':
  - type: text
    content: 'ka mifampilazà amin''ny salamo sy ny fihirana ary ny tonon-kiram-panahy, dia mihira sy mikalo ao am-ponareo ho an''ny Tompo, '
  '2':
  - type: text
    content: ary mandehana amin'ny fitiavana, toy ny nitiavan'i Kristy anareo, dia ny nanolorany ny tenany ho fanatitra sy ho fanavotana
  - type: note
    content: Gr. fanatitra alatsa-drà
  - type: text
    content: ' amin''Andriamanitra, ho hanitra ankasitrahana, hamonjy antsika. '
  '20':
  - type: text
    content: 'misaotra an''Andriamanitra Ray mandrakariva noho ny zavatra rehetra, amin''ny anaran''i Jesosy Kristy Tompontsika, '
  '21':
  - type: text
    content: 'sady mifanaiky amin''ny fahatahorana an''i Kristy, '
  '22':
  - type: text
    content: 'Hianareo vehivavy, maneke ny vadinareo tahaka ny anekena ny Tompo. '
  '23':
  - type: text
    content: Fa ny lahy no lohan'ny vavy, dia tahaka an'i Kristy koa no Lohan'ny fiangonana
  - type: note
    content: Gr. eklesia
  - type: text
    content: '; ary Izy no mpamonjy ny tena. '
  '24':
  - type: text
    content: Fa tahaka ny aneken'ny fiangonana
  - type: note
    content: Gr. eklesia
  - type: text
    content: ' an''i Kristy no haneken''ny vavy ny lahy koa amin''ny zavatra rehetra. '
  '25':
  - type: text
    content: Hianareo lehilahy, tiava ny vadinareo, dia tahaka ny nitiavan'i Kristy ny fiangonana
  - type: note
    content: Gr. eklesia
  - type: text
    content: ' ka nanolorany ny tenany hamonjy azy, '
  '26':
  - type: text
    content: 'mba hahamasina azy amin''ny anadiovany azy amin''ny rano fanasana amin''ny teny; '
  '27':
  - type: text
    content: mba horaisiny
  - type: note
    content: Gr. hatolony
  - type: text
    content: ' ho an''ny tenany izany ho fiangonana'
  - type: note
    content: Gr. eklesia
  - type: text
    content: ' malaza tsy misy pentimpentina, na fiketronana, na izay toy izany, fa mba ho masina sady tsy misy tsiny izy. '
  '28':
  - type: text
    content: 'Dia tahaka izany koa, ny lehilahy tokony ho tia ny vadiny tahaka ny tenany ihany. Izay tia ny vadiny dia tia ny tenany. '
  '29':
  - type: text
    content: Fa tsy mba nisy olona tsy tia ny nofony, fa mamelona sy mitaiza azy, dia tahaka an'i Kristy amin'ny fiangonana
  - type: note
    content: Gr. eklesia
  - type: text
    content: '; '
  '3':
  - type: text
    content: 'Fa ny fijangajangana sy ny fahalotoana rehetra, na ny fieremana, dia aza avela hotononina eo aminareo akory aza, fa tsy mahamendrika ny olona masina izany, '
  '30':
  - type: text
    content: 'fa momba ny tenany isika. '
  '31':
  - type: text
    content: 'Ary noho izany ny lehilahy dia handao ny rainy sy ny reniny ka hiray amin''ny vadiny, ary dia ho nofo iray ihany izy roroa (Gen. 2. 24). '
  '32':
  - type: text
    content: Zava-miafina lehibe izany; fa milaza ny amin'i Kristy sy ny fiangonana
  - type: note
    content: Gr. eklesia
  - type: text
    content: ' aho. '
  '33':
  - type: text
    content: Na dia izany aza, samia tia ny vadiny tahaka ny tenany ianareo lehilahy rehetra, ary aoka kosa ny vavy hanaja
  - type: note
    content: Gr. hatahotra
  - type: text
    content: ' ny lahy.'
  '4':
  - type: text
    content: 'na fahavetavetana, na resaka fahadalana, na voso-dratsy, izay tsy tokony hatao, fa aleo misaotra. '
  '5':
  - type: text
    content: 'Fa fantatrareo marimarina fa samy tsy manana lova eo amin''ny fanjakan''i Kristy sy Andriamanitra na ny mpijangajanga rehetra, na ny olom-betaveta, na ny olona mierina (mpanompo sampy izany). '
  '6':
  - type: text
    content: 'Aza mety hofitahin''olona amin''ny teny foana ianareo; fa izany zavatra izany no mahatonga ny fahatezeran''Andriamanitra amin''ny zanaky ny tsi-fanarahana. '
  '7':
  - type: text
    content: 'Koa aza mety ho mpiombona aminy ianareo. '
  '8':
  - type: text
    content: 'Fa maizina ianareo fahiny, fa efa mazava ao amin''ny Tompo kosa ankehitriny; mandehana tahaka ny zanaky ny mazava '
  '9':
  - type: text
    content: '(fa ny vokatry ny mazava dia ao amin''ny fahatsarana rehetra sy ny fahamarinana ary ny fahitsiana), '
