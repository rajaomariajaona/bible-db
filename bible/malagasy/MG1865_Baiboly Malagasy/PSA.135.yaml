document_id: PSA.135,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiderana an'Andriamanitra noho ny heriny sy ny nitondrany ny Isiraely, ary filazana ny mahatsinontsinona ny sampy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Haleloia. Miderà ny anaran''i Jehovah; Miderà, ianareo mpanompon''i Jehovah, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia Ilay namely ny jentilisa maro Ka nahafaty mpanjaka mahery, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia Sihona, mpanjakan''ny Amorita, Sy Oga, mpanjakan''i Basana, Ary ny fanjakan''i Kanana rehetra; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary ny taniny nomeny ho lova, Eny, ho lovan'ny Isiraely olony.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Jehovah ô, mandrakizay ny anaranao; Jehovah ô, hihatra amin''ny taranaka fara mandimby ny fahatsiarovana Anao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa hanome rariny ny olony Izy Ary hanenina ny amin''ny mpanompony. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ny sampin''ny jentilisa dia volafotsy sy volamena, Asan''ny tànan''olona; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Manam-bava izy, fa tsy miteny; Mana-maso izy, fa tsy mahita; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Manan-tsofina izy, fa tsy mandre; Ary tsy misy fofonaina ao am-bavany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ho tahaka azy izay manao azy Sy izay rehetra matoky azy.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Misaora an''i Jehovah, ry taranak''Isiraely; Misaora an''i Jehovah, ry taranak''i Arona; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Hianareo izay mpitoetra ao an-tranon''i Jehovah, Eo anatin''ny kianjan''ny tranon''Andriamanitsika. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Misaora an''i Jehovah, ry taranak''i Levy; Hianareo izay matahotra an''i Jehovah, misaora an''i Jehovah. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Isaorana avy any Ziona anie Jehovah, Izay mitoetra any Jerosalema. Haleloia.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Miderà an''i Jehovah, fa tsara Izy; Mankalazà ny anarany, fa mahafinaritra izany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa Jakoba nofidin'i Jehovah ho Azy, Ary Isiraely ho rakitra soa ho Azy,
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa fantatro fa lehibe Jehovah, Ary ambonin''ny andriamanitra rehetra ny Tompontsika. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Manao izay sitrapony rehetra Jehovah, Na any amin''ny lanitra, na etỳ ambonin''ny tany, Na any amin''ny ranomasina sy ny rano lalina rehetra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Mampiakatra zavona avy amin''ny faran''ny tany Izy; Manao helatra arahin-dranonorana Izy; Mamoaka ny rivotra avy ao an-trano fitehirizany Izy, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia Ilay namely ny voalohan-terak''i Egypta, Na olona, na biby. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nanatitra famantarana sy fahagagana teo aminao Izy, ry Egypta ô, Eny, tamin''i Farao sy ny mpanompony rehetra, '
