document_id: LUK.24
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa nony maraina koa tamin''ny andro voalohany amin''ny herinandro, dia nankany amin''ny fasana izy nitondra ny zava-manitra izay efa namboariny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hitany fa, indro, ny vato efa voakodia niala tamin''ny fasana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia niditra izy, nefa tsy nahita ny fatin''i Jesosy Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary raha mbola very hevitra tamin''izany izy, indreo, nisy roa lahy niseho taminy nitafy fitafiana manelatrelatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nony natahotra izy ka niankohoka, dia hoy izy roa lahy taminy: Nahoana no ato amin''ny maty no itadiavanareo ny velona? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy ato Izy fa efa nitsangana; tsarovy ny teny izay nataony taminareo, fony Izy mbola tany Galilia, hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny Zanak''olona tsy maintsy hatolotra eo an-tànan''ny mpanota ka hohomboana amin''ny hazo fijaliana ary hitsangana amin''ny andro fahatelo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nahatsiaro ny teniny izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary niverina niala tamin''ny fasana izy, dia nilaza izany rehetra izany tamin''ny iraika ambin''ny folo lahy sy ny namany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Teo Maria Magdalena sy Johana ary Maria, renin''i Jakoba; ary ny vehivavy sasany izay naman''ireo koa dia nilaza izany tamin''ny Apostoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nefa nataony ho arirarira foana izany teny izany ka tsy ninoany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa Petera nitsangana, dia nihazakazaka nankany amin'ny fasana; ary niondrika izy ka nahita ny lambam-paty mipetraka mitokana; dia lasa nody izy sady gaga noho ny zavatra izay tonga teo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary, indreo, nisy roa lahy tamin'ireny nandeha tamin'izany andro izany hankany amin'ny vohitra atao hoe Emaosy, tokony ho enim-polo stadio
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Roa ambin''ny folo kilometatra'
    marker-yv: yv-n
  - type: text
    text: ' raha any Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia niresaka ny amin''izay zavatra rehetra nanjo izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary raha mbola niresaka sy niara-nisaina izy, dia nanatona Jesosy ka niaraka taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nefa ny mason''ireo nohazonina mba tsy hahafantarany Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy Izy taminy: Ahoana izao teny resahinareo etỳ am-pandehanana izao? Dia nijanona ireo sady nalahelo tarehy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny anankiray, izay atao hoe Kleopasy, namaly ka nanao taminy hoe: Hianao irery va no vahiny mitoetra any Jerosalema tsy mba mahalala'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Vahiny mitoetra irery angaha Hianao any Jerosalema ka tsy mahalala'
    marker-yv: yv-n
  - type: text
    text: ' izay zavatra tonga tao tamin''izao andro izao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa hoy Izy taminy: Zavatra manao ahoana moa izany? Ary hoy izy roa lahy taminy: Ny amin''i Jesosy avy any Nazareta, mpaminany mahery tamin''ny asa sy ny teny teo anatrehan''Andriamanitra sy ny vahoaka rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'dia ny amin''ny nanoloran''ny lohan''ny mpisorona sy ny mpanapaka eto amintsika Azy hanamelohany Azy ho faty, sy ny nanomboany Azy tamin''ny hazo fijaliana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nefa nantenainay fa Izy no Ilay efa hanavotra ny Isiraely; ary tsy izany ihany, fa androany no andro fahatelo hatr''izay nahatongavan''izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nefa kosa ny vehivavy sasany izay namanay nahahavery hevitra anay, fa tany amin''ny fasana maraina koa izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ary raha tsy nahita ny faty izy, dia tonga ka nilaza fa efa nahita anjely niseho kosa, izay nilaza fa velona Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nandeha ny sasany izay nomba anay ka nankany amin''ny fasana, ary nahita araka izay nolazain''ny vehivavy; nefa Izy tsy hitany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy Izy taminy: Ry adala sy votsa saina ka tsy mino izay rehetra nolazain''ny mpaminany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Moa tsy tokony ho niaritra izany va Kristy ka hiditra any amin''ny voninahiny? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia nanomboka hatramin''i Mosesy sy ny mpaminany rehetra Izy, ka nanambara taminy ny hevitry ny teny milaza Azy ao amin''ny Soratra Masina rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary efa mby teo akaikin''ny vohitra izay efa halehan''izy roa lahy izy, ary Jesosy toa nanao handeha lavitra kokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa ireo nanery Azy ka nanao hoe: Mitoera atỳ aminay; fa efa ho hariva izao, ka lasan-davitra ny andro. Dia niditra hitoetra tao aminy Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary raha niara-nipetraka nihinana teo aminy Izy, dia nandray ny mofo ka nisaotra, dia namaky sy nanolotra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia nahiratra ny mason''ireo, ka nahalala Azy; fa Izy kosa dia tonga tsy hitany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia niresaka hoe izy: Tsy nangorakoraka va ny fontsika, raha niresaka tamintsika teny an-dalana Izy ka namoaka ny hevitry ny Soratra Masina tamintsika? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia niainga tamin''izany ora izany izy roa lahy ka niverina nankany Jerosalema, ary nahita ny iraika ambin''ny folo lahy mbamin''izay nomba azy tafangona teo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'sady nilaza hoe: Efa nitsangana marina tokoa ny Tompo ka efa niseho tamin''i Simona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary ireo kosa dia nilaza izay efa niseho teny an-dalàna sy ny nahafantarany Azy tamin''ny namakiana ny mofo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary raha mbola nilaza izany izy, Jesosy dia nitsangana teo afovoany ka nanao taminy hoe: Fiadanana ho anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dia taitra sady raiki-tahotra izy, satria nataony fa nahita matoatoa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Nefa hoy Jesosy taminy: Nahoana no taitra ianareo? ary nahoana no miahanahana ny fonareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Izahao ny tanako sy ny tongotro, fa Izaho no Izy; tsapao Aho, ka jereo, fa ny matoatoa tsy mba manana nofo sy taolana, tahaka izao ahitanareo Ahy izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary rehefa niteny izany Izy, dia nasehony azy ny tànany sy ny tongony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary raha mbola tsy nino ihany izy ireo noho ny hafaliana sady mbola talanjona, dia hoy Jesosy taminy: Manan-kanina va ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ary dia nomeny tapaky ny hazandrano voatono
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ampio hoe: sy tantely'
    marker-yv: yv-n
  - type: text
    text: ' Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ary Izy nandray, dia nihinana teo anatrehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Dia hoy Izy taminy: Izao no teniko izay nolazaiko taminareo, fony mbola tao aminareo Aho, fa tsy maintsy ho tanteraka izay rehetra nanoratana Ahy teo amin''ny lalàn''i Mosesy sy ny mpaminany ary ny Salamo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Dia nanokatra ny sain''ireo Izy hahalala ny Soratra Masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary hoy Izy taminy: Izany no voasoratra, fa Kristy hiaritra ka hitsangana amin''ny maty amin''ny andro fahatelo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'ary mba hotorina amin''ny anarany ny fibebahana sy ny famelan-keloka amin''ny firenena rehetra, manomboka eto Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ary ianareo no vavolombelon''izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Ary, indro, Izaho mampitondra ny teny fikasan'ny Raiko ho anareo; fa mitoera eto an-tanàna mandra-panafiana anareo amin'ny hery avy any amin'ny avo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Ary Jesosy nitondra azy hatrany Betania, dia nanandratra ny tànany ka nitso-drano azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Ary raha mbola nitso-drano azy Izy, dia nisaraka taminy ka nakarina ho any an-danitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Ary izy ireo nitsaoka Azy, dia niverina ho any Jerosalema sady faly indrindra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Ary teo an-kianjan'ny tempoly isan'andro izy nankalaza an'Andriamanitra.
