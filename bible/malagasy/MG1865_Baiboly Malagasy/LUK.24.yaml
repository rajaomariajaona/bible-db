document_id: LUK.24,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Fa nony maraina koa tamin''ny andro voalohany amin''ny herinandro, dia nankany amin''ny fasana izy nitondra ny zava-manitra izay efa namboariny. '
  '10':
  - type: text
    content: 'Teo Maria Magdalena sy Johana ary Maria, renin''i Jakoba; ary ny vehivavy sasany izay naman''ireo koa dia nilaza izany tamin''ny Apostoly. '
  '11':
  - type: text
    content: 'Nefa nataony ho arirarira foana izany teny izany ka tsy ninoany. '
  '12':
  - type: text
    content: Fa Petera nitsangana, dia nihazakazaka nankany amin'ny fasana; ary niondrika izy ka nahita ny lambam-paty mipetraka mitokana; dia lasa nody izy sady gaga noho ny zavatra izay tonga teo.
  '13':
  - type: text
    content: Ary, indreo, nisy roa lahy tamin'ireny nandeha tamin'izany andro izany hankany amin'ny vohitra atao hoe Emaosy, tokony ho enim-polo stadio
  - type: note
    content: 'Na: Roa ambin''ny folo kilometatra'
  - type: text
    content: ' raha any Jerosalema. '
  '14':
  - type: text
    content: 'Dia niresaka ny amin''izay zavatra rehetra nanjo izy. '
  '15':
  - type: text
    content: 'Ary raha mbola niresaka sy niara-nisaina izy, dia nanatona Jesosy ka niaraka taminy. '
  '16':
  - type: text
    content: 'Nefa ny mason''ireo nohazonina mba tsy hahafantarany Azy. '
  '17':
  - type: text
    content: 'Ary hoy Izy taminy: Ahoana izao teny resahinareo etỳ am-pandehanana izao? Dia nijanona ireo sady nalahelo tarehy. '
  '18':
  - type: text
    content: 'Ary ny anankiray, izay atao hoe Kleopasy, namaly ka nanao taminy hoe: Hianao irery va no vahiny mitoetra any Jerosalema tsy mba mahalala'
  - type: note
    content: 'Na: Vahiny mitoetra irery angaha Hianao any Jerosalema ka tsy mahalala'
  - type: text
    content: ' izay zavatra tonga tao tamin''izao andro izao? '
  '19':
  - type: text
    content: 'Fa hoy Izy taminy: Zavatra manao ahoana moa izany? Ary hoy izy roa lahy taminy: Ny amin''i Jesosy avy any Nazareta, mpaminany mahery tamin''ny asa sy ny teny teo anatrehan''Andriamanitra sy ny vahoaka rehetra, '
  '2':
  - type: text
    content: 'Ary hitany fa, indro, ny vato efa voakodia niala tamin''ny fasana. '
  '20':
  - type: text
    content: 'dia ny amin''ny nanoloran''ny lohan''ny mpisorona sy ny mpanapaka eto amintsika Azy hanamelohany Azy ho faty, sy ny nanomboany Azy tamin''ny hazo fijaliana. '
  '21':
  - type: text
    content: 'Nefa nantenainay fa Izy no Ilay efa hanavotra ny Isiraely; ary tsy izany ihany, fa androany no andro fahatelo hatr''izay nahatongavan''izany. '
  '22':
  - type: text
    content: 'Nefa kosa ny vehivavy sasany izay namanay nahahavery hevitra anay, fa tany amin''ny fasana maraina koa izy, '
  '23':
  - type: text
    content: 'ary raha tsy nahita ny faty izy, dia tonga ka nilaza fa efa nahita anjely niseho kosa, izay nilaza fa velona Izy. '
  '24':
  - type: text
    content: 'Dia nandeha ny sasany izay nomba anay ka nankany amin''ny fasana, ary nahita araka izay nolazain''ny vehivavy; nefa Izy tsy hitany. '
  '25':
  - type: text
    content: 'Ary hoy Izy taminy: Ry adala sy votsa saina ka tsy mino izay rehetra nolazain''ny mpaminany. '
  '26':
  - type: text
    content: 'Moa tsy tokony ho niaritra izany va Kristy ka hiditra any amin''ny voninahiny? '
  '27':
  - type: text
    content: 'Dia nanomboka hatramin''i Mosesy sy ny mpaminany rehetra Izy, ka nanambara taminy ny hevitry ny teny milaza Azy ao amin''ny Soratra Masina rehetra. '
  '28':
  - type: text
    content: 'Ary efa mby teo akaikin''ny vohitra izay efa halehan''izy roa lahy izy, ary Jesosy toa nanao handeha lavitra kokoa. '
  '29':
  - type: text
    content: 'Fa ireo nanery Azy ka nanao hoe: Mitoera atỳ aminay; fa efa ho hariva izao, ka lasan-davitra ny andro. Dia niditra hitoetra tao aminy Izy. '
  '3':
  - type: text
    content: 'Dia niditra izy, nefa tsy nahita ny fatin''i Jesosy Tompo. '
  '30':
  - type: text
    content: 'Ary raha niara-nipetraka nihinana teo aminy Izy, dia nandray ny mofo ka nisaotra, dia namaky sy nanolotra azy. '
  '31':
  - type: text
    content: 'Dia nahiratra ny mason''ireo, ka nahalala Azy; fa Izy kosa dia tonga tsy hitany. '
  '32':
  - type: text
    content: 'Dia niresaka hoe izy: Tsy nangorakoraka va ny fontsika, raha niresaka tamintsika teny an-dalana Izy ka namoaka ny hevitry ny Soratra Masina tamintsika? '
  '33':
  - type: text
    content: 'Dia niainga tamin''izany ora izany izy roa lahy ka niverina nankany Jerosalema, ary nahita ny iraika ambin''ny folo lahy mbamin''izay nomba azy tafangona teo '
  '34':
  - type: text
    content: 'sady nilaza hoe: Efa nitsangana marina tokoa ny Tompo ka efa niseho tamin''i Simona. '
  '35':
  - type: text
    content: 'Ary ireo kosa dia nilaza izay efa niseho teny an-dalàna sy ny nahafantarany Azy tamin''ny namakiana ny mofo. '
  '36':
  - type: text
    content: 'Ary raha mbola nilaza izany izy, Jesosy dia nitsangana teo afovoany ka nanao taminy hoe: Fiadanana ho anareo. '
  '37':
  - type: text
    content: 'Dia taitra sady raiki-tahotra izy, satria nataony fa nahita matoatoa izy. '
  '38':
  - type: text
    content: 'Nefa hoy Jesosy taminy: Nahoana no taitra ianareo? ary nahoana no miahanahana ny fonareo? '
  '39':
  - type: text
    content: 'Izahao ny tanako sy ny tongotro, fa Izaho no Izy; tsapao Aho, ka jereo, fa ny matoatoa tsy mba manana nofo sy taolana, tahaka izao ahitanareo Ahy izao. '
  '4':
  - type: text
    content: 'Ary raha mbola very hevitra tamin''izany izy, indreo, nisy roa lahy niseho taminy nitafy fitafiana manelatrelatra. '
  '40':
  - type: text
    content: 'Ary rehefa niteny izany Izy, dia nasehony azy ny tànany sy ny tongony. '
  '41':
  - type: text
    content: 'Ary raha mbola tsy nino ihany izy ireo noho ny hafaliana sady mbola talanjona, dia hoy Jesosy taminy: Manan-kanina va ianareo? '
  '42':
  - type: text
    content: Ary dia nomeny tapaky ny hazandrano voatono
  - type: note
    content: 'Ampio hoe: sy tantely'
  - type: text
    content: ' Izy. '
  '43':
  - type: text
    content: 'Ary Izy nandray, dia nihinana teo anatrehany. '
  '44':
  - type: text
    content: 'Dia hoy Izy taminy: Izao no teniko izay nolazaiko taminareo, fony mbola tao aminareo Aho, fa tsy maintsy ho tanteraka izay rehetra nanoratana Ahy teo amin''ny lalàn''i Mosesy sy ny mpaminany ary ny Salamo. '
  '45':
  - type: text
    content: 'Dia nanokatra ny sain''ireo Izy hahalala ny Soratra Masina. '
  '46':
  - type: text
    content: 'Ary hoy Izy taminy: Izany no voasoratra, fa Kristy hiaritra ka hitsangana amin''ny maty amin''ny andro fahatelo; '
  '47':
  - type: text
    content: 'ary mba hotorina amin''ny anarany ny fibebahana sy ny famelan-keloka amin''ny firenena rehetra, manomboka eto Jerosalema. '
  '48':
  - type: text
    content: 'Ary ianareo no vavolombelon''izany. '
  '49':
  - type: text
    content: Ary, indro, Izaho mampitondra ny teny fikasan'ny Raiko ho anareo; fa mitoera eto an-tanàna mandra-panafiana anareo amin'ny hery avy any amin'ny avo.
  '5':
  - type: text
    content: 'Ary nony natahotra izy ka niankohoka, dia hoy izy roa lahy taminy: Nahoana no ato amin''ny maty no itadiavanareo ny velona? '
  '50':
  - type: text
    content: 'Ary Jesosy nitondra azy hatrany Betania, dia nanandratra ny tànany ka nitso-drano azy. '
  '51':
  - type: text
    content: 'Ary raha mbola nitso-drano azy Izy, dia nisaraka taminy ka nakarina ho any an-danitra. '
  '52':
  - type: text
    content: 'Ary izy ireo nitsaoka Azy, dia niverina ho any Jerosalema sady faly indrindra. '
  '53':
  - type: text
    content: Ary teo an-kianjan'ny tempoly isan'andro izy nankalaza an'Andriamanitra.
  '6':
  - type: text
    content: 'Tsy ato Izy fa efa nitsangana; tsarovy ny teny izay nataony taminareo, fony Izy mbola tany Galilia, hoe: '
  '7':
  - type: text
    content: 'Ny Zanak''olona tsy maintsy hatolotra eo an-tànan''ny mpanota ka hohomboana amin''ny hazo fijaliana ary hitsangana amin''ny andro fahatelo. '
  '8':
  - type: text
    content: 'Dia nahatsiaro ny teniny izy. '
  '9':
  - type: text
    content: 'Ary niverina niala tamin''ny fasana izy, dia nilaza izany rehetra izany tamin''ny iraika ambin''ny folo lahy sy ny namany rehetra. '
