document_id: PSA.111
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salamo abidy. Ny fahatsaran'Andriamanitra, sy ny soa ataony amin'ny olony
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Haleloia. Hidera an'i Jehovah amin'ny foko rehetra aho, Eo amin'ny fivorian'ny marina sy ny fiangonan-dehibe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lehibe ny asan''i Jehovah, Ka dinihin''izay rehetra mankasitraka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Madera sady malaza ny asany; Ary ny fahamarinany maharitra mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Manao izay hahatsiarovana ny fahagagana ataony Izy; Miantra sy mamindra fo Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nomeny hanina
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. toha
    marker-yv: yv-n
  - type: text
    text: ' izay matahotra Azy; Tsarovany mandrakizay ny fanekeny. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny herin''ny asany nasehony tamin''ny olony. Tamin''ny nanomezany azy ny lovan''ny jentilisa. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny asan''ny tànany dia fahamarinana sy fitsarana; Mahatoky avokoa ny didiny rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mitoetra mafy mandrakizay doria ireny, Fa natao tamin''ny fahamarinana sy ny fahitsiana. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Manatitra fanavotana ho an''ny olony Izy; Efa nanorina ny fanekeny ho mandrakizay Izy; Masina sy mahatahotra ny anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny fahatahorana an'i Jehovah no fiandoham-pahendrena; Fahalalana tsara no ananan'izay rehetra mankatò izany
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ireo
    marker-yv: yv-n
  - type: text
    text: ; Maharitra mandrakizay ny fiderana Azy.
