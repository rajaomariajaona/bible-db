document_id: PSA.61,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fangatahan'ny mpanjaka efa nandositra, mba hampodin'Andriamanitra indray
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ho an'ny mpiventy hira. Hampiarahina amin'ny valiha. Nataon'i Davida. Henoy ny fitarainako, Andriamanitra ô; tandremo ny fivavako.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Any am-paran''ny tany no hiantsoako Anao raha reraka ny foko; ento aho ho any amin''ny vatolampy izay avo ka tsy tratro; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa aroko Hianao sy tilikambo mafy handosirako ny fahavalo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Aoka hitoetra ao an-tranonao mandrakizay aho; aoka hialoka ao ambanin''ny fanomban''ny elatrao aho, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa Hianao, Andriamanitra ô efa nandre ny voadiko; efa nomenao ahy ny lovan''izay matahotra ny anaranao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Halavao ny andron''ny mpanjaka; aoka ny taonany hahatratra ny taranaka maro. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Aoka hitoetra eo anatrehan''Andriamanitra mandrakizay izy; famindram-po sy fahamarinana no tendreo hiaro azy; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ka dia izany no hankalazako ny anaranao mandrakizay, mba hanefako isan'andro ny voadiko.
