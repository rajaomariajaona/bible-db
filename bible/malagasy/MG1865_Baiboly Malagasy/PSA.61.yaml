document_id: PSA.61,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fangatahan'ny mpanjaka efa nandositra, mba hampodin'Andriamanitra indray
  - type: text
    content: Ho an'ny mpiventy hira. Hampiarahina amin'ny valiha. Nataon'i Davida. Henoy ny fitarainako, Andriamanitra ô; tandremo ny fivavako.
  '2':
  - type: text
    content: 'Any am-paran''ny tany no hiantsoako Anao raha reraka ny foko; ento aho ho any amin''ny vatolampy izay avo ka tsy tratro; '
  '3':
  - type: text
    content: 'Fa aroko Hianao sy tilikambo mafy handosirako ny fahavalo. '
  '4':
  - type: text
    content: 'Aoka hitoetra ao an-tranonao mandrakizay aho; aoka hialoka ao ambanin''ny fanomban''ny elatrao aho, '
  '5':
  - type: text
    content: 'Fa Hianao, Andriamanitra ô efa nandre ny voadiko; efa nomenao ahy ny lovan''izay matahotra ny anaranao. '
  '6':
  - type: text
    content: 'Halavao ny andron''ny mpanjaka; aoka ny taonany hahatratra ny taranaka maro. '
  '7':
  - type: text
    content: 'Aoka hitoetra eo anatrehan''Andriamanitra mandrakizay izy; famindram-po sy fahamarinana no tendreo hiaro azy; '
  '8':
  - type: text
    content: Ka dia izany no hankalazako ny anaranao mandrakizay, mba hanefako isan'andro ny voadiko.
