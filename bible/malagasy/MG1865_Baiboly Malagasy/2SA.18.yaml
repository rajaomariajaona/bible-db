document_id: 2SA.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandrenesan'i Davida ny nahafatesan'i Absaloma sy ny hamafin'ny alahelony azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Davida nandamina ny olona izay nomba azy ka nanendry mpifehy arivo sy mpifehy zato hifehy azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Davida nampandeha ny olona, ka ny ampahatelony nofehezin''i Joaba, ary ny ampahatelony nofehezin''i Abisay, zanak''i Zeroia, rahalahin''i Joaba, ary ny ampahatelony kosa nofehezin''Itahy Gatita. Ary hoy ny mpanjaka tamin''ny vahoaka: Izaho koa dia handeha hiaraka aminareo tokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa hoy ny vahoaka: Tsy avelanay andeha ianao; fa raha mandositra izahay, dia tsy hahoany; ary na matiny sasaka aza izahay, dia tsy hahoany akory; fa ianao no hoatra ny iray alina aminay; koa tsara raha hamonjy anay avy tao an-tanàna ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy ny mpanjaka taminy: Izay sitrakareo ary no hataoko. Dia nitsangana teo anilan''ny vavahady ny mpanjaka, ary ny vahoaka rehetra nivoaka isan-jato sy isan''arivo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny mpanjaka nandidy an''i Joaba sy Abisay ary Itahy hoe: Noho ny amiko dia mamindrà fo amin''i Absaloma zatovo. Ary ny olona rehetra dia nahare ny nandidian''ny mpanjaka ny mpifehy rehetra ny amin''i Absaloma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ka dia nivoaka teny an-tsaha ny vahoaka hiady amin''ny Isiraely, ka rafitra tao amin''ny alan''i Efraima ny ady; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary resy tao ny lehilahy amin''ny Isiraely teo anoloan''ny mpanompon''i Davida, ka be dia be no ringana androtrizay, dia olona roa alina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa nihahakahaka teny rehetra teny ny ady; ka ny matin''ny ala androtrizay dia be noho ny matin''ny sabatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Absaloma nifanehatra tamin''ny mpanompon''i Davida. Ary nitaingina ampondra izy, ary ny ampondra nandeha teo ambanin''ny rantsan-kazo mikirindro tamin''ny hazo terebinta, ka voahazon''ny hazo terebinta ny lohan''i Absaloma, ka dia nikiraviravy teo anelanelan''ny lanitra sy ny tany izy; fa lasa ny ampondra nitaingenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nisy lehilahy anankiray nahita izany, dia nanambara tamin''i Joaba hoe: Indro, hitako mihantona amin''ny hazo terebinta Absaloma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy Joaba tamin''ilay lehilahy nilaza taminy: Koa nahoana, raha nahita azy ianao, no tsy nasianao hianjera amin''ny tany izy, ka dia tsy maintsy ho nomeko sekely volafotsy folo sy fehin-kibo ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa hoy ralehilahy tamin''i Joaba: Na dia efa mby an-tanako aza ny sekely volafotsy arivo, tsy haninjitra ny tanako hamely ny zanaky ny mpanjaka aho; fa teo anatrehanay no nandidian''ny mpanjaka anao sy Abisay ary Itahy hoe: Samia mitandrina an''i Absaloma zatovo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tsy misy zavatra azo afenina amin'ny mpanjaka, koa raha nanao hafahafa taminy aho, na dia ianao io aza dia ho nitsangana hanameloka ahy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ho nahafoy ahy'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy Joaba: Tsy handany andro foana eto aminao aho. Ary nitondra lefona telo teny an-tanany Izy, ka natsatony tamin''ny fon''i Absaloma, raha mbola velona teo amin''ny hazo terebinta izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nisy tovolahy folo, mpitondra ny fiadian''i Joaba, nanodidina an''i Absaloma ka namely azy ho faty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary Joaba nitsoka ny anjomara, ka dia niverina avy nanenjika ny Isiraely ny vahoaka, satria niantran''i Joaba izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nalain''ny olona Absaloma ka natsipiny tao an-davaka lehibe anankiray tao anaty ala, dia nasiany antontam-bato lehibe teo amboniny; ary ny Isiraely rehetra samy nandositra ho any amin''ny lainy avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary fony mbola velona Absaloma, dia efa naka vato izy ka nanao ilay tsangam-bato ho azy tao an-dohasahan''ny Mpanjaka, fa hoy izy: Tsy manan-janakalahy hamelo-maso ahy aho; ary dia nataony araka ny anaran''ny tenany ihany ilay tsangam-bato, ka mbola atao hoe: Fahatsiarovana an''i Absaloma no anarany mandraka androany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hoy Ahimaza, zanak''i Zadoka: Aoka aho hihazakazaka hitondra teny mahafaly ho any amin''ny mpanjaka ny amin''ny nanomezan''i Jehovah azy ny rariny ka nahafahany tamin''ny fahavalony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa hoy Joaba taminy: Tsy ho mpitondra teny mahafaly ianao, raha mandeha anio, satria maty ny zanakalahin''ny mpanjaka, fa andro hafa dia mbola hitondra teny mahafaly ihany ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy Joaba tamin''ilay Kosita: Andeha, ambarao amin''ny mpanjaka izay efa hitanao. Ary ilay Kosita niankohoka teo anatrehan''i Joaba, dia lasa nihazakazaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa Ahimaza, zanak''i Zadoka, dia mbola niteny tamin''i Joaba ihany nanao hoe: Ka nahoana aza, aoka ihany aho mba hiezaka koa hanaraka ilay Kosita. Fa hoy Joaba: Ahoana no hiezahanao, anaka; fa na dia mandeha aza ianao, tsy hisy teny mahafaly hahazoanao fitia tsinona? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ka nahoana aza, hoy izy: Aoka ihany aho hiezaka. Dia hoy Joaba taminy: Miezaha ary. Ary dia niezaka tamin''ny lalana eny amin''ny lemaka Ahimaza ka nihoatra an''ilay Kosita.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary Davida nipetraka teo anelanelan''ny vavahady roa; ary ny mpitily niakatra teo ambony vavahady teo amin''ny manda, ka nanopy ny masony, dia nahita, ka indry misy lehilahy iray mihazakazaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ny mpitily niantso ka nilaza tamin''ny mpanjaka. Dia hoy ny mpanjaka: Raha irery izy, dia ho teny mahafaly no entiny. Ary mbola nanatona anatona ihany ralehilahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary ny mpitily nahita lehilahy iray koa nihazakazaka, dia niantso ny mpiandry vavahady izy nanao hoe: Indry koa misy lehilahy iray tamy mihazakazaka. Dia hoy ny mpanjaka: Mitondra teny mahafaly ihany koa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary hoy ny mpitily: Raha toa ahy, dia tahaka ny fihazakazak''i Ahimaza, zanak''i Zadoka, no fihazakazak''iny aloha. Ary hoy ny mpanjaka: Lehilahy tsara fanahy iny, ka hitondra teny soa mahafaly no ihaviany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary Ahimaza niantso ka nanao tamin''ny mpanjaka hoe: Fiadanana! sady niankohoka tamin''ny tany teo anatrehan''ny mpanjaka izy ka nanao hoe: Isaorana anie Jehovah Andriamanitrao, Izay efa nanolotra ny olona nanainga tanana hikomy amin''ny mpanjaka tompoko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia hoy ny mpanjaka: Tsara ihany va Absaloma zatovo? Fa hoy Ahimaza: Tamin''ny nanirahan''i Joaba ny mpanompon''ny mpanjaka sy izaho mpanomponao koa dia nandre tabataba be aho, nefa tsy fantatro izay antony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary hoy ny mpanjaka taminy: Mitanilà kely ary, ka mijanòna etsy; dia nitanila izy ka nitoetra teo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary, indro, avy ilay Kosita ka nanao hoe: Aoka ny mpanjaka tompoko hihaino teny mahafaly; fa Jehovah efa nanome anao ny rariny ka nahafaka anao ankehitriny tamin''izay rehetra nitsangana hikomy aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary hoy ny mpanjaka tamin''ilay Kosita: Tsara ihany va Absaloma zatovo? Fa hoy ilay Kosita: Aoka ny fahavalon''ny mpanjaka tompoko sy izay rehetra mitsangana hanisy ratsy anao ho tahaka iny zatovo iny.'
