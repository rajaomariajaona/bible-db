document_id: 2KI.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanjakan'i Jehorama sy Ahazia tamin'ny Joda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Elisa efa niteny tamin-dravehivavy, renin''ilay zaza maty novelominy, ka nanao hoe: Miaingà, ka mandehana ianao sy ny ankohonanao, ary mivahinia any amin''izay azonao hivahiniana; fa Jehovah efa niantso ny mosary, sady efa ho tonga izany ka haharitra fito taona amin''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia niainga ravehivavy ka nanao araka ny tenin''ilay lehilahin''Andriamanitra; eny, lasa izy sy ny ankohonany ka nivahiny fito taona tany amin''ny tanin''ny Filistina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nony afaka ny fito taona, dia nody avy tany amin''ny tanin''ny Filistina ravehivavy; ary lasa nitaraina tamin''ny mpanjaka izy ny amin''ny tranony sy ny taniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny mpanjaka niteny tamin''i Gehazy, zatovon''ny lehilahin''Andriamanitra, hoe: Masìna ianao, lazao amiko izay zava-dehibe rehetra nataon''i Elisa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary raha mbola nilazalaza tamin''ny mpanjaka ny amin''ny nameloman''i Elisa ny maty izy dia, indro, ilay vehivavy renin''ny zaza maty novelominy, nitaraina tamin''ny mpanjaka ny amin''ny tranony sy ny taniny. Ary hoy Gehazy: Ry mpanjaka tompoko ô, ity ilay vehivavy, ary io koa ilay zanany maty novelomin''i Elisa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nony nanontanian''ny mpanjaka ravehivavy, dia nilaza. Ary dia notendren''ny mpanjaka ny tandapa anankiray ka nomeny teny hoe: Avereno izay azy rehetra, ary onero ny vokatry ny taniny rehetra hatramin''ny andro nialany tamin''ny tany ka mandraka ankehitriny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary Elisa tonga tany Damaskosy tamin''i Beni-hadada, mpanjakan''i Syria, narary; ary nisy nanambara taminy hoe: Indro, tonga atỳ ny lehilahin''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy ny mpanjaka tamin''i Hazaela: Mitondrà fanomezana eny an-tananao, ka mandehana, mitsenà ilay lehilahin''Andriamanitra, ary manontania izay tenin''i Jehovah aminy ka ataovy hoe: Ho sitrana ihany va aho amin''izao aretiko izao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia lasa Hazaela nitsena azy sady nitondra fanomezana tamin''izay zava-tsoa rehetra any Damaskosy, dia entana entin-drameva efa-polo; ary tonga izy ka nitsangana teo anatrehany ary nanao hoe: Beni-hadada zanakao, mpanjakan''i Syria, no naniraka ahy ho atỳ aminao hanontany hoe: Ho sitrana ihany va aho amin''izao aretiko izao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy Elisa taminy: Mandehana, ka lazao aminy hoe: Eny, ho sitrana tokoa ianao. Kanefa'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (Tsy ho sitrana ianao; fa)'
    marker-yv: yv-n
  - type: text
    text: ' Jehovah efa naneho ahy fa ho faty tokoa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nibanjina azy mandra-pikaodikaodiny izy; ary dia nitomany ny lehilahin''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy Hazaela: Nahoana no mitomany ianao, tompoko? Ary izy namaly hoe: Satria fantatro izay ratsy hataonao amin''ny Zanak''Isiraely: ny fiarovany mafy hodoranao, ny zatovony hovonoinao amin''ny sabatra, ny zanany madinika hotorotoroinao, ary izay bevohoka eo aminy hotatahanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa hoy Hazaela: Fa zinona moa ny mpanomponao, dia ity alika ity, no dia hahavita izany zavatra lehibe izany? Fa Elisa namaly hoe: Efa nasehon''i Jehovah tamiko fa, indro, ianao ho mpanjakan''i Syria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia niala tamin''i Elisa izy ka nankany amin''ny tompony; ary izy nanontany azy hoe: Ahoana no nolazain''i Elisa taminao? Dia namaly hoe izy: Nolazainy tamiko fa ho velona tokoa ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary nony ampitso, dia nalain'i Hazaela ny lamba firakotra ka natsobony tamin'ny rano ary nasarony ny tavan'i Beni-hadada, ka dia maty izy; ary Hazaela no nanjaka nandimby azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary tamin''ny taona fahadimy nanjakan''i Jorama, zanak''i Ahaba, mpanjakan''ny Isiraely, no vao nanjakan''i Jehorama, zanak''i Josafata, mpanjakan''ny Joda, tamin''ny nanjakan''i Josafata tany Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Roa amby telo-polo taona izy, fony vao nanjaka, ary valo taona no nanjakany tany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nandeha tamin''ny lalan''ny mpanjakan''ny Isiraely izy, dia tahaka ny nataon''ny taranak''i Ahaba, fa ny zanakavavin''i Ahaba no vadiny, eny, nanao izay ratsy eo imason''i Jehovah izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nefa Jehovah tsy nety nandringana ny Joda noho ny amin'i Davida mpanompony, araka ilay nolazainy taminy fa homeny jiro mandrakizay ho an
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: izy sy'
    marker-yv: yv-n
  - type: text
    text: '''ny taranany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tamin''ny androny no niodinan''i Edoma ka tsy nanoa ny Joda, fa nanangana mpanjaka ho azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ka dia nankany Zaira Jehorama, ary ny kalesy rehetra nentiny hiaraka aminy; ary nanaovany latsak'alina ny Edomita, izay nanodidina azy, mbamin'ny komandin'ny kalesy; ary ny olona nandositra nody
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ho any an-dainy
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary Edoma mbola niodina ka tsy nanoa ny Joda mandraka androany. Ary Libna koa dia niodina tamin'izany andro izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny tantaran''i Jehorama sisa mbamin''izay rehetra nataony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary Jehorama lasa nodimandry any amin'ny razany, dia nalevina tao amin'ny razany tao an-tanànan'i Davida; ary Ahazia zanany no nanjaka nandimby azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary tamin''ny taona faharoa ambin''ny folo nanjakan''i Jorama, zanak''i Ahaba, mpanjakan''ny Isiraely, no vao nanjakan''i Ahazia, zanak''i Jehorama, mpanjakan''ny Joda, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Roa amby roa-polo taona Ahazia, fony izy vao nanjaka, ary herintaona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Atalia, zanakavavin''i Omry, mpanjakan''ny Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary nandeha tamin''ny lalan''ny taranak''i Ahaba izy, ka nanao izay ratsy eo imason''i Jehovah tahaka ny nataon''ny taranak''i Ahaba, fa vinanton''ny taranak''i Ahaba ihany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary niaraka tamin''i Jorama, zanak''i Ahaba, izy mba hiady amin''i Hazaela, mpanjakan''i Syria, tany Ramota-gileada; ary ny Syriana nahavoa an''i Jorama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Dia niverina Jorama mpanjaka mba hotsaboina tao Jezirela amin'ny feriny tamin'ny nahavoazan'ny Syriana azy tao Rama, fony izy niady tamin'i Hazaela, mpanjakan'i Syria. Ary Ahazia, zanak'i Jehorama, mpanjakan'ny Joda, nidina hamangy an'i Jorama, zanak'i Ahaba, teo Jezirela, satria narary izy.
