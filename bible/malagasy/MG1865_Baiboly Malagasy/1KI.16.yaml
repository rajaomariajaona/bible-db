document_id: 1KI.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny niantombohan'ny nanjahan'i Ahaba tamin'ny Isiraely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tonga tamin''i Jeho, zanak''i Hanany, ny tenin''i Jehovah ny amin i Basa nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Satria nasandratro avy tamin''ny vovoka ianao ka notendreko ho mpanapaka ny Isiraely oloko; nefa kosa nandeha tamin''ny lalan''i Jeroboama ihany ianao ary nampanota ny Isiraely oloko ka nampahatezitra Ahy tamin''ny fahotany, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia, indro, hofongorako Basa sy ny taranany, ary ny taranakao hataoko tahaka ny taranak''Jeroboama, zanak''i Nebata. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Koa izay tamingan'i Basa maty ao an-tanàna dia hohanin'ny alika; ary izay tamingany maty any an-tsaha dia hohanin'ny voro-manidina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny tantaran''i Basa sisa mbamin''izay nataony ary ny heriny, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Basa lasa nodimandry any amin''ny razany, dia nalevina tao Tirza; ary Elaha zanany no nanjaka nandimby azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary Jeho mpaminany zanak''i Hanany, dia nampitondraina ny tenin''i Jehovah ny amin''i Basa sy ny taranany, satria nanao ratsy teo imason''i Jehovah ka nampahatezitra Azy tamin''ny asan''ny tanany, ka dia tonga tahaka ny mpianakavin''i Jeroboama, ary satria namono ireo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tamin''ny taona fahenina amby roa-polo nanjakan''i Asa, mpanjakan''ny Joda, no vao nanjakan''i Elaha, zanak''i Basa, tamin''ny Isiraely tao Tirza, ary nanjaka roa taona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Zimry mpanompony, komandin''ny antsasaky ny kalesiny, nikomy taminy, raha nisotro ho mamo tao Tirza, tao an-tranon''i Arza, lehiben''ny tao an-dapa tao Tirza, izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia niditra Zimry ka namely an''i Elaha ho faty tamin''ny taona fahafito amby roa-polo nanjakan''i Asa, mpanjakan''ny Joda, ary izy no nanjaka nisolo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nony vao nanjaka Zimry ka nipetraka tamin''ny seza fiandrianany, dia namono ny mpianakavin''i Basa rehetra izy; ka tsy navelany hisy miangana na dia lehilahy iray akory aza. na tamin''ny havany, na tamin''ny sakaizany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Toy izany no nandringanan''i Zimry ny mpianakavin''i Basa rehetra, araka ny tenin''i Jehovah izay nampilazainy an''i Jehovah mpaminany ny amin''i Basa, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'noho ny fahotany rehetra sy ny fahotan''i Elaha zanany koa, izay nataony sady nampanotany ny Isiraely ka nampahatezitra an''i Jehovah, Andriamanitry ny Isiraely, tamin''ny zava-poanany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny tantaran''i Elaha sisa mbamin''izay rehetra nataony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tamin''ny taona fahafito amby roa-polo nanjakan''i Asa, mpanjakan''ny Joda, no nanjakan''i Zimry hafitoana tao Tirza. Ary ny olona nanao fahirano an''i Gibetona, izay an''ny Filistina. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ny olona izay nitoby teo dia nandre hoe: Efa nikomy Zimry sady efa namono ny mpanjaka koa; ary ny Isiraely rehetra tany an-tobiny nampanjaka an''i Omry, komandin''ny miaramila, androtrizay ihany ho mpanjakan''ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia niakatra avy tao Gibetona Omry sy ny Isiraely rehetra niaraka taminy, ka dia nanao fahirano an''i Tirza. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nony hitan''i Zimry fa afaka ny tanana, dia lasa niditra tao amin''ny trano avo amin''ny lapa izy, ary nodorany tamin''ny afo ny lapa. ka may tao izy, dia maty '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'noho ny fahotana izay nataony tamin''ny nanaovany izay ratsy eo imason''i Jehovah, tamin''ny nandehanany tamin''ny lalan''i Jeroboama sy tamin''ny fahotana izay nataony sady nampanotany ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ny tantaran''i Zimry sisa mbamin''ny fikomiany, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary tamin''izany dia nizara roa ny lehilahy amin''ny Isiraely: ny antsasany nomba an i Tibny, zanak''i Ginata, hampanjaka azy; ary ny antsasany kosa nomba an''i Omry. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa ny olona izay nomba an'i Omry naharesy ny olona izay nomba an'i Tibny, zanak'i Ginata; ka dia maty Tibny, ary Omry no nanjaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tamin''ny taona fahiraika amby telo-polo nanjakan''i Asa, mpanjakan''ny Joda, no vao nanjakan''i Omry; ary nanjaka roa ambin''ny folo taona tamin''ny Isiraely izy; tao Tirza no nanjakany enin-taona. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary novidiny talenta volafotsy roa tamin''i Samera ny havoan''i Samaria, dia nanao tanàna teo an-tampon''ny havoana izy, ary nataony hoe Samaria, araka ny anaran''i Samera, tompon''ny havoana, ny anaran''ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa Omry nanao izay ratsy eo imason''i Jehovah; eny, nanao ratsy mihoatra noho izay rehetra teo alohany izy; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'fa nandeha tamin''ny lalana rehetra nalehan''i Jeroboama, zanak''i Nebata, sy tamin''ny fahotana izay nampanotany ny Isiraely izy ka nampahatezitra an''i Jehovah, Andriamanitry ny Isiraely, tamin''ny zava-poanany. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary ny tantaran''i Omry sisa mbamin''izay nataony sy ny heriny izay nasehony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary Omry lasa nodi-mandry any amin'ny razany, dia nalevina tao Samaria izy; ary Ahaba zanany no nanjaka nandimby azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary Ahaba, zanak''i Omry, vao nanjaka tamin''ny Isiraely tamin''ny taona fahavalo amby telo-polo nanjakan''i Asa, mpanjakan''ny Joda, ary nanjaka tamin''ny Isiraely tao Samaria roa amby roa-polo Taona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary Ahaba, zanak''i Omry, nanao izay ratsy eo imason''i Jehovah mihoatra noho izay rehetra teo alohany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa nataony ho zavatra kely foana ny handeha amin''ny fahotan''i Jeroboama, zanak''i Nebata. ka dia nampakatra an''i Jezebela, zanakavavin''i Etibala, mpanjakan''ny Sidoniana, izy ho vadiny, dia nandeha nanompo an''i Bala ka niankohoka teo anatrehany. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary nanao alitara ho an''i Bala tao amin''ny tranon''i Bala izay nataony tao Samaria izy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary Ahaba nanao ny Aseraha ka nampahatezitra an''i Jehovah, Andriamanitry ny Isiraely, mihoatra noho ny mpanjakan''ny Isiraely rehetra izay teo alohany. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Tamin'ny andron'i Ahaba no nanorenan'i Hiela Betelita an'i Jeriko; ny ain'i Abìrama lahimatoany no sazin'ny nanorenany ny fanambaniny, ary ny ain'i Segoba faralahiny no sazin'ny nananganany ny vavahadiny, araka ny tenin'i Jehovah izay nampilazainy an'i Josoa, zanak'i Nona.
