document_id: 1KI.16,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny niantombohan'ny nanjahan'i Ahaba tamin'ny Isiraely
  - type: text
    content: 'Ary tonga tamin''i Jeho, zanak''i Hanany, ny tenin''i Jehovah ny amin i Basa nanao hoe: '
  '10':
  - type: text
    content: 'Dia niditra Zimry ka namely an''i Elaha ho faty tamin''ny taona fahafito amby roa-polo nanjakan''i Asa, mpanjakan''ny Joda, ary izy no nanjaka nisolo azy. '
  '11':
  - type: text
    content: 'Ary nony vao nanjaka Zimry ka nipetraka tamin''ny seza fiandrianany, dia namono ny mpianakavin''i Basa rehetra izy; ka tsy navelany hisy miangana na dia lehilahy iray akory aza. na tamin''ny havany, na tamin''ny sakaizany. '
  '12':
  - type: text
    content: 'Toy izany no nandringanan''i Zimry ny mpianakavin''i Basa rehetra, araka ny tenin''i Jehovah izay nampilazainy an''i Jehovah mpaminany ny amin''i Basa, '
  '13':
  - type: text
    content: 'noho ny fahotany rehetra sy ny fahotan''i Elaha zanany koa, izay nataony sady nampanotany ny Isiraely ka nampahatezitra an''i Jehovah, Andriamanitry ny Isiraely, tamin''ny zava-poanany. '
  '14':
  - type: text
    content: 'Ary ny tantaran''i Elaha sisa mbamin''izay rehetra nataony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany? '
  '15':
  - type: text
    content: 'Tamin''ny taona fahafito amby roa-polo nanjakan''i Asa, mpanjakan''ny Joda, no nanjakan''i Zimry hafitoana tao Tirza. Ary ny olona nanao fahirano an''i Gibetona, izay an''ny Filistina. '
  '16':
  - type: text
    content: 'Ary ny olona izay nitoby teo dia nandre hoe: Efa nikomy Zimry sady efa namono ny mpanjaka koa; ary ny Isiraely rehetra tany an-tobiny nampanjaka an''i Omry, komandin''ny miaramila, androtrizay ihany ho mpanjakan''ny Isiraely. '
  '17':
  - type: text
    content: 'Dia niakatra avy tao Gibetona Omry sy ny Isiraely rehetra niaraka taminy, ka dia nanao fahirano an''i Tirza. '
  '18':
  - type: text
    content: 'Ary nony hitan''i Zimry fa afaka ny tanana, dia lasa niditra tao amin''ny trano avo amin''ny lapa izy, ary nodorany tamin''ny afo ny lapa. ka may tao izy, dia maty '
  '19':
  - type: text
    content: 'noho ny fahotana izay nataony tamin''ny nanaovany izay ratsy eo imason''i Jehovah, tamin''ny nandehanany tamin''ny lalan''i Jeroboama sy tamin''ny fahotana izay nataony sady nampanotany ny Isiraely. '
  '2':
  - type: text
    content: 'Satria nasandratro avy tamin''ny vovoka ianao ka notendreko ho mpanapaka ny Isiraely oloko; nefa kosa nandeha tamin''ny lalan''i Jeroboama ihany ianao ary nampanota ny Isiraely oloko ka nampahatezitra Ahy tamin''ny fahotany, '
  '20':
  - type: text
    content: 'Ary ny tantaran''i Zimry sisa mbamin''ny fikomiany, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany? '
  '21':
  - type: text
    content: 'Ary tamin''izany dia nizara roa ny lehilahy amin''ny Isiraely: ny antsasany nomba an i Tibny, zanak''i Ginata, hampanjaka azy; ary ny antsasany kosa nomba an''i Omry. '
  '22':
  - type: text
    content: Fa ny olona izay nomba an'i Omry naharesy ny olona izay nomba an'i Tibny, zanak'i Ginata; ka dia maty Tibny, ary Omry no nanjaka.
  '23':
  - type: text
    content: 'Tamin''ny taona fahiraika amby telo-polo nanjakan''i Asa, mpanjakan''ny Joda, no vao nanjakan''i Omry; ary nanjaka roa ambin''ny folo taona tamin''ny Isiraely izy; tao Tirza no nanjakany enin-taona. '
  '24':
  - type: text
    content: 'Ary novidiny talenta volafotsy roa tamin''i Samera ny havoan''i Samaria, dia nanao tanàna teo an-tampon''ny havoana izy, ary nataony hoe Samaria, araka ny anaran''i Samera, tompon''ny havoana, ny anaran''ny tanàna. '
  '25':
  - type: text
    content: 'Fa Omry nanao izay ratsy eo imason''i Jehovah; eny, nanao ratsy mihoatra noho izay rehetra teo alohany izy; '
  '26':
  - type: text
    content: 'fa nandeha tamin''ny lalana rehetra nalehan''i Jeroboama, zanak''i Nebata, sy tamin''ny fahotana izay nampanotany ny Isiraely izy ka nampahatezitra an''i Jehovah, Andriamanitry ny Isiraely, tamin''ny zava-poanany. '
  '27':
  - type: text
    content: 'Ary ny tantaran''i Omry sisa mbamin''izay nataony sy ny heriny izay nasehony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany? '
  '28':
  - type: text
    content: Ary Omry lasa nodi-mandry any amin'ny razany, dia nalevina tao Samaria izy; ary Ahaba zanany no nanjaka nandimby azy.
  '29':
  - type: text
    content: 'Ary Ahaba, zanak''i Omry, vao nanjaka tamin''ny Isiraely tamin''ny taona fahavalo amby telo-polo nanjakan''i Asa, mpanjakan''ny Joda, ary nanjaka tamin''ny Isiraely tao Samaria roa amby roa-polo Taona izy. '
  '3':
  - type: text
    content: 'dia, indro, hofongorako Basa sy ny taranany, ary ny taranakao hataoko tahaka ny taranak''Jeroboama, zanak''i Nebata. '
  '30':
  - type: text
    content: 'Ary Ahaba, zanak''i Omry, nanao izay ratsy eo imason''i Jehovah mihoatra noho izay rehetra teo alohany. '
  '31':
  - type: text
    content: 'Fa nataony ho zavatra kely foana ny handeha amin''ny fahotan''i Jeroboama, zanak''i Nebata. ka dia nampakatra an''i Jezebela, zanakavavin''i Etibala, mpanjakan''ny Sidoniana, izy ho vadiny, dia nandeha nanompo an''i Bala ka niankohoka teo anatrehany. '
  '32':
  - type: text
    content: 'Ary nanao alitara ho an''i Bala tao amin''ny tranon''i Bala izay nataony tao Samaria izy. '
  '33':
  - type: text
    content: 'Ary Ahaba nanao ny Aseraha ka nampahatezitra an''i Jehovah, Andriamanitry ny Isiraely, mihoatra noho ny mpanjakan''ny Isiraely rehetra izay teo alohany. '
  '34':
  - type: text
    content: Tamin'ny andron'i Ahaba no nanorenan'i Hiela Betelita an'i Jeriko; ny ain'i Abìrama lahimatoany no sazin'ny nanorenany ny fanambaniny, ary ny ain'i Segoba faralahiny no sazin'ny nananganany ny vavahadiny, araka ny tenin'i Jehovah izay nampilazainy an'i Josoa, zanak'i Nona.
  '4':
  - type: text
    content: Koa izay tamingan'i Basa maty ao an-tanàna dia hohanin'ny alika; ary izay tamingany maty any an-tsaha dia hohanin'ny voro-manidina.
  '5':
  - type: text
    content: 'Ary ny tantaran''i Basa sisa mbamin''izay nataony ary ny heriny, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany? '
  '6':
  - type: text
    content: 'Ary Basa lasa nodimandry any amin''ny razany, dia nalevina tao Tirza; ary Elaha zanany no nanjaka nandimby azy. '
  '7':
  - type: text
    content: 'Ary Jeho mpaminany zanak''i Hanany, dia nampitondraina ny tenin''i Jehovah ny amin''i Basa sy ny taranany, satria nanao ratsy teo imason''i Jehovah ka nampahatezitra Azy tamin''ny asan''ny tanany, ka dia tonga tahaka ny mpianakavin''i Jeroboama, ary satria namono ireo izy. '
  '8':
  - type: text
    content: 'Tamin''ny taona fahenina amby roa-polo nanjakan''i Asa, mpanjakan''ny Joda, no vao nanjakan''i Elaha, zanak''i Basa, tamin''ny Isiraely tao Tirza, ary nanjaka roa taona izy. '
  '9':
  - type: text
    content: 'Ary Zimry mpanompony, komandin''ny antsasaky ny kalesiny, nikomy taminy, raha nisotro ho mamo tao Tirza, tao an-tranon''i Arza, lehiben''ny tao an-dapa tao Tirza, izy. '
