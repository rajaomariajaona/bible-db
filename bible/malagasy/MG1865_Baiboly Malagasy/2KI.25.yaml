document_id: 2KI.25,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary tamin''ny andro fahafolo tamin''ny volana fahafolo tamin''ny taona fahasivy nanjakan''i Zedekia dia tonga Nebokadnezara, mpanjakan''i Babylona, sy ny miaramilany rehetra hamely an''i Jerosalema indray ka nitoby tandrifiny; ary nanao tilikambo manodidina azy izy. '
  '10':
  - type: text
    content: 'Ary ny manda manodidina an''i Jerosalema dia noravan''ny miaramilan''ny Kaldeana rehetra, izay nanaraka ny lehiben''ny mpiambina. '
  '11':
  - type: text
    content: 'Ary izay olona sisa tao an-tanana sy izay efa nandositra nanatona ny mpanjakan''i Babylona ary ny vahoaka betsaka sisa dia nentin''i Neborazadana, lehiben''ny mpiambina, ho babo avokoa. '
  '12':
  - type: text
    content: 'Nefa ny olona malahelo dia nisy navelany ihany ho mpamboatra tanim-boaloboka sy ho mpiasa tany. '
  '13':
  - type: text
    content: Ary ireo andry varahina teo an-tranon'i Jehovah sy ny fitoeran-tavin-drano sy ny tavin-drano varahina lehibe
  - type: note
    content: Heb. ny ranomasina
  - type: text
    content: ' izay teo an-tranon''i Jehovah dia notorotoroin''ny Kaldeana, ka nentiny ho any Babylona ny varahina. '
  '14':
  - type: text
    content: 'Ary nentiny koa ny vilany fandraofan-davenona sy ny sotron''afo sy ny antsy sy ny lovia kely ary ny fanaka varahina rehetra izay nenti-nanao fanompoam-pivavahana. '
  '15':
  - type: text
    content: 'Ary nentiny koa ny fitoeran-davenon-jiro sy ny lovia famafazana na ny volamena na ny volafotsy dia samy nentiny avokoa '
  '16':
  - type: text
    content: 'ary ny andry roa sy ny tavin-drano lehibe iray ary ireo fitoeran-tavin-drano, izay nataon''i Solomona ho amin''ny tranon''i Jehovah; ny varahina tamin''izany fanaka rehetra izany dia tsy hita lanja. '
  '17':
  - type: text
    content: 'Valo ambin''ny folo hakiho ny hahavon''ny andry iray, ary varahina ny kapitaliny sady telo hakiho ny hahavony; ary varahina avokoa ny harato sy ny ampongabendanitra amin''ny kapitaliny manodidina; ary tahaka izany koa ny andry faharoa mbamin''ny harato. '
  '18':
  - type: text
    content: 'Ary ny lehiben''ny mpiambina nisambotra an''i Seraia mpisoronabe sy zefania, mpisorona manarakaraka, ary mpiandry varavarana koa telo lahy; '
  '19':
  - type: text
    content: 'ary tao an-tanàna no nisamborany ny tandapa anankiray, mpifehy ny miaramila, ary dimy lahy tamin''izay mpitoetra teo anatrehan''ny mpanjaka, izay hita tao an-tanàna, ary ny mpanoratry ny komandin''ny miaramila, izay mpandamina ny ho miaramila, sy ny olona tompon-tany enim-polo lahy, izay hitany tao an-tanàna; '
  '2':
  - type: text
    content: 'Ary nataony fahirano ny tanàna hatramin''ny taona fahiraika ambin''ny folo nanjakan''i Zedekia mpanjaka. '
  '20':
  - type: text
    content: 'dia nosamborin''i Nebozaradana, lehiben''ny mpiambina, ireo ka nentiny ho any amin''ny mpanjakan''i Babylona tao Ribla. '
  '21':
  - type: text
    content: 'Dia novonoin''ny mpanjakan''i Babylona tao Ribla any amin''ny tany Hamata ireo. Toy izany no nitondrana ny Joda ho babo niala tamin''ny taniny. '
  '22':
  - type: text
    content: 'Fa ny amin''ny olona izay sisa tany amin''ny tanin''ny Joda, izay navelan''i Nebokadnezara, mpanjakan''i Babylona, dia Gedalia, zanak''i Ahikama, zanak''i Safana, no notendreny ho mpanapaka azy. '
  '23':
  - type: text
    content: 'Ary nony ren''ny komandin''ny miaramila rehetra mbamin''ny olom-peheziny avy fa Gedalia no notendren''i Nebokadnezara, mpanjakan''i Babylona, ho mpanapaka, dia nankany amin''i Gedalia tany Mizpa Isimaela, zanak''i Netania, sy Johanana, zanak''i Karea, sy Seraia, zanak''i Tanometa Netofatita, ary Jazania, zanak''ilay Makatita, dia ireo sy ny olom-peheziny avy. '
  '24':
  - type: text
    content: 'Ary Gedalia nianiana taminy sy tamin''ny olom-peheziny ka nanao hoe: Aza matahotra ny amin''ny mpanompon''ny Kaldeana, fa mitomoera amin''ny tany, ary manompoa ny mpanjakan''i Babylona, fa izany no hahasoa anareo. '
  '25':
  - type: text
    content: 'Ary tamin''ny volana fahafito, dia avy Isimaela, zanak''i Netania, zanak''i Elisama, isan''ny fianakavian''ny mpanjaka, mbamin''ny olona folo lahy koa ka namely an''i Gedalia, dia nahafaty azy sy ny Jiosy ary ny Kaldeana izay tao aminy tany Mizpa. '
  '26':
  - type: text
    content: Ary niainga ny olona rehetra, na kely na lehibe, mbamin'ny komandin'ny miaramila, nankany Egypta, fa natahotra ny Kaldeana izy.
  '27':
  - type: text
    content: Ary tamin'ny andro fahafito amby roa-polo tamin'ny volana faharoa ambin'ny folo tamin'ny taona fahafito amby telo-polo taorian'ny namaboana an'i Joiakina, mpanjakan'ny Joda, tamin'ny taona vao nanjakan'i Evila-merodaka, mpanjakan'i Babylona, dia nasandrany
  - type: note
    content: Heb. nasandratra ny lohany
  - type: text
    content: ' hiala tao an-trano-maizina Joiakina, mpanjakan''ny Joda. '
  '28':
  - type: text
    content: 'Dia nitenenany soa izy, ka ny seza fiandrianany nataony ambony noho ny seza fiandrianan''ireo mpanjaka namany tao Babylona. '
  '29':
  - type: text
    content: 'Ka dia novan''i Joiakina ny fitafiany fony mbola tao an-trano-maizina; ary nihinan-kanina teo anatrehany mandrakariva izy tamin''ny andro niainany rehetra. '
  '3':
  - type: text
    content: 'Ary tamin''ny andro fahasivy tamin''ny volana fahefatra dia mafy ny mosary tao an-tanàna, fa tsy nisy hanina ho an''ny olona tompon-tany. '
  '30':
  - type: text
    content: Ary ny hanina nohaniny dia hanina nomena avy amin'ny mpanjaka araka ny tokony ho anjarany isan'andro isan'andro tamin'ny andro rehetra niainany.
  '4':
  - type: text
    content: Ary nisy voabanga ny tanana, dia nandositra alina ny miaramila rehetra tamin'ny lalana nankamin'ny vavahady tanelanelan'ny manda roa, izay eo anilan'ny sahan'ny mpanjaka (fa ny Kaldeana nanodidina ny tanàna), ary ny mpanjaka nandeha tamin'ny lalana mankeny amin'ny tani-hay
  - type: note
    content: Heb. Arabà
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Ary ny miaramilan''ny Kaldeana nanenjika ny mpanjaka ka nahatratra azy teny amin''ny tani-hay any Jeriko; dia nipariaka nandao azy ny miaramilany rehetra. '
  '6':
  - type: text
    content: 'Ary voasambotra ny mpanjaka ka nentina niakatra ho any amin''ny mpanjakan''i Babylona tao Ribla, ka dia notsaraina tao izy. '
  '7':
  - type: text
    content: 'Ary ny zanakalahin''i Zedekia dia novonoiny teo imason-drainy, ary ny mason''i Zedekia kosa nopotsiriny, dia nafatony tamin''ny gadra varahina izy ka nentiny nankany Babylona. '
  '8':
  - type: text
    content: 'Ary tamin''ny andro fahafito tamin''ny volana fahadimy tamin''ny taona fahasivy ambin''ny folo nanjakan''i Nebokadnezara, mpanjakan''i Babylona dia tonga tany Jerosalema Nebozaradana, lehiben''ny mpiambina, mpanompon''ny mpanjakan''i Babylona, '
  '9':
  - type: text
    content: 'ka nandoro ny tranon''i Jehovah sy ny tranon''ny mpanjaka mbamin''ny trano rehetra tany Jerosalema: ny trano lehibe rehetra dia nodorany tamin''ny afo avokoa. '
