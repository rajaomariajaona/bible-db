document_id: PSA.20,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavaka ho an'ny mpanjaka raha mivoaka hanafika
  - type: text
    content: 'Ho an''ny mpiventy hira. Salamo nataon''i Davida. Hihaino anao anie Jehovah amin''ny andro fahoriana; hitondra anao ho any amin''ny avo anie ny anaran''Andriamanitr''i Jakoba. '
  '2':
  - type: text
    content: 'Hahatonga famonjena ho anao avy amin''ny fitoerana masina anie Izy, ary hanohana anao avy any Ziona. '
  '3':
  - type: text
    content: 'Hahatsiaro ny fanatitra hohaninao rehetra anie Izy, ary hankasitraka ny fanatitra doranao. '
  '4':
  - type: text
    content: 'Hanome anao araka ny fonao anie Izy ary hahatanteraka ny fisainanao rehetra. '
  '5':
  - type: text
    content: Aoka hihoby noho ny famonjena azonao izahay, ary amin'ny anaran'Andriamanitray no hanangananay faneva; ho tanterahin'i Jehovah anie ny angatahinao rehetra.
  '6':
  - type: text
    content: 'Ankehitriny dia fantatro fa Jehovah mamonjy ny voahosony; hamaly azy avy amin''ny lanitry ny fahamasinany Izy amin''ny herin''ny famonjen''ny tànany ankavanana. '
  '7':
  - type: text
    content: 'Ny sasany mitoky amin''ny kalesy, ary ny sasany amin''ny soavaly; Fa raha izahay kosa, dia ny anaran''i Jehovah Andriamanitray no hoderainay. '
  '8':
  - type: text
    content: 'Ireo dia reraka sady lavo; fa izahay kosa efa mitsangana sy mijoro, '
  '9':
  - type: text
    content: Jehovah ô, vonjeo ny mpanjaka; hamaly anay anie Izy
  - type: note
    content: 'Na: Jehovah ô, vonjeo! Hamaly anay anie ny Mpanjaka'
  - type: text
    content: ' amin''izay andro iantsoanay Azy.'
