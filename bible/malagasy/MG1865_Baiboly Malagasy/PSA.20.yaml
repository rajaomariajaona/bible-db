document_id: PSA.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vavaka ho an'ny mpanjaka raha mivoaka hanafika
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Salamo nataon''i Davida. Hihaino anao anie Jehovah amin''ny andro fahoriana; hitondra anao ho any amin''ny avo anie ny anaran''Andriamanitr''i Jakoba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hahatonga famonjena ho anao avy amin''ny fitoerana masina anie Izy, ary hanohana anao avy any Ziona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hahatsiaro ny fanatitra hohaninao rehetra anie Izy, ary hankasitraka ny fanatitra doranao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hanome anao araka ny fonao anie Izy ary hahatanteraka ny fisainanao rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Aoka hihoby noho ny famonjena azonao izahay, ary amin'ny anaran'Andriamanitray no hanangananay faneva; ho tanterahin'i Jehovah anie ny angatahinao rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ankehitriny dia fantatro fa Jehovah mamonjy ny voahosony; hamaly azy avy amin''ny lanitry ny fahamasinany Izy amin''ny herin''ny famonjen''ny tànany ankavanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny sasany mitoky amin''ny kalesy, ary ny sasany amin''ny soavaly; Fa raha izahay kosa, dia ny anaran''i Jehovah Andriamanitray no hoderainay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ireo dia reraka sady lavo; fa izahay kosa efa mitsangana sy mijoro, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Jehovah ô, vonjeo ny mpanjaka; hamaly anay anie Izy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Jehovah ô, vonjeo! Hamaly anay anie ny Mpanjaka'
    marker-yv: yv-n
  - type: text
    text: ' amin''izay andro iantsoanay Azy.'
