document_id: ISA.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hitsarana ny tany, sy ny hanjakan'i Jehovah ao Ziona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Indro, Jehovah mahafoana ny tany ka mahalao azy ary mampihohoka azy ka manely izay mponina ao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Koa ho sahala ihany ny hanjo ny mpisorona sy ny vahoaka, ny tompolahy sy ny mpanompolahiny, ny tompovavy sy ny mpanompovaviny, ny mpivarotra sy ny mpividy, ny mpampisambotra sy ny mpisambotra, ny mpampanàna vola sy ny mpanana vola. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hatao foana dia foana ny tany, ary hobaboina dia hobaboina tokoa izy, fa Jehovah no efa niteny. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Misaona sy malazo ny tany; Milofika sy malazo izao tontolo izao; Milofika ny lehibe indrindra amin''ny olona etỳ an-tany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny tany dia efa voavetavetan''ny mponina ao aminy, satria nandika ny lalàna sy nanota ny didy izy ary nivadika ny fanekena mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary noho izany dia ozona no mandevona ny tany, ary ny mponina ao dia valiana noho ny helony, sady voadotra ny mponina amin''ny tany ka dia olona vitsy foana no sisa ao. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Misaona ny ranom-boaloboka, milofika ny taro-boaloboka, misento avokoa ilay nifaly am-po; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mitsahatra ny firavoravoana amin''ny ampongatapaka, tapitra ny fitabataban''ny niravoravo; Mitsahatra ny fifaliana amin-dokanga; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tsy mihira eo am-pisotroan-divay intsony izy, mangidy amin''izay misotro azy ny toaka; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Rava ny tanana be fikorontanana, mirindrina ny trano rehetra ka tsy azo idiran''olona; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Misy fitarainana divay eny an-tsaha, tafalentika toy ny masoandro ny fifaliana rehetra; Voaroaka ny faharavoravoan''ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fahafoanana ihany no sisa ao an-tanàna, satria rava sady montsamontsana ny vavahady, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa ao amin''ny tany, ao amin''ny olona, dia hisy toy ny amin''ny fikapohana hazo oliva sy ny fitsimpontsimponam-boaloboka, rehefa tapitra ny andro fiotazana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ireo dia hanandratra ny feony ka hihoby; Noho ny fahalehibiazan''i Jehovah dia hiantso mafy eny amin''ny ranomasina izy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mankalazà an''i Jehovah any amin''ny tany atsinanana, dia ny anaran''i Jehovah, Andriamanitry ny Isiraely, any amin''ny amoron- dranomasina. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hatrany am-paran''ny tany no nandrenesanay hira hoe: Voninahitra ho an''ny marina. Fa hoy izaho: Indrisy izato halevonako! Indrisy ity halevonako! Ny mpamitaka dia mamitaka; Eny, ny mpamitaka dia mamitaka fatratra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tahotra sy longoa ary fandrika no mahazo anao, ry mponina amin''ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary izay mandositra noho ny fandrenesana ny tahotra dia ho latsaka any an-davaka; Ary izay miakatra avy ao anatin''ny lavaka dia ho voan''ny fandrika; Fa misy varavarana mivoha any amin''ny avo, ary mihorohoro ny fanorenan''ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Rava dia rava ny tany; Mitresaka dia mitresaka ny tany; Mihorohoro dia mihorohoro ny tany; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mivembena dia mivenbena tahaka ny mamo ny tany ka mitsingevaheva toy ny fandriana mihantona; ary mitambesatra aminy ny fahadisoany, dia potraka izy ka tsy ho tafarina intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary amin''izany andro izany dia any an-danitra no hamalian''i Jehovah ny antokon''ny lanitra, ary etỳ an-tany kosa ny mpanjakan''ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia hangonina ao an-davaka tahaka ny mpifatotra ireny ka hohidiana ao an-trano-maizina, ary rehefa afaka andro maro, dia hovangiana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hovaliana'
    marker-yv: yv-n
  - type: text
    text: ' ihany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia hivoara-mena ny volana, ary hivaloarika ny masoandro, fa Jehovah, Tompon'ny maro, no Mpanjaka ao an-tendrombohitra Ziona sy any Jerosalema, ary eo anatrehan'ny loholony dia misy voninahitra.
