document_id: JHN.14
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Aza malahelo ny fonareo; minoa an'Andriamanitra, ary minoa Ahy koa
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mino an''Andriamanitra ianareo, dia minoa Ahy koa'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ao an-tranon''ny Raiko misy fitoerana maro; raha tsy izany, dia efa nilaza taminareo Aho; fa handeha hamboatra fitoerana ho anareo Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary raha handeha hamboatra fitoerana ho anareo Aho, dia ho avy indray ka handray anareo ho any amiko, ka izay itoerako no hitoeranareo koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary fantatrareo koa ny lalana ho any amin'izay halehako
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (ary izay alehako dia fantatrareo, ary fantatrareo koa ny lalana)'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hoy Tomasy taminy: Tompoko, tsy fantatray izay alehanao; ka hataonay ahoana no fahafantatra ny lalana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hoy Jesosy taminy: Izaho no lalana sy fahamarinana ary fiainana; tsy misy olona mankany amin''ny Ray, afa-tsy amin''ny alalako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Raha nahafantatra Ahy ianareo, dia ho nahafantatra ny Raiko koa; ary hatramin''izao dia mahafantatra Azy ianareo sady efa nahita Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hoy Filipo taminy: Tompoko, asehoy anay ny Ray, dia ampy ho anay izay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hoy Jesosy taminy: Izay ela izay no efa nitoerako teto aminareo, ka tsy mbola fantatrao ihany va Aho, ry Filipo? Izay nahita Ahy dia nahita ny Ray; koa ahoana no anaovanareo hoe: Asehoy anay ny Ray? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tsy mino va ianao fa Izaho ao amin''ny Ray, ary ny Ray ato amiko? Ny teny izay lazaiko aminareo, dia tsy avy amiko izany lazaiko izany; fa ny Ray mitoetra ato amiko no manao ny asa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Minoa Ahy fa Izaho ao amin''ny Ray, ary ny Ray ato amiko; fa raha tsy izany, dia minoa Ahy noho ny asa ihany aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lazaiko aminareo marina dia marina tokoa: Izay mino Ahy, ny asa ataoko no hataony koa; ary hanao asa lehibe noho izany aza izy, satria Izaho mankany amin''ny Ray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary na inona na inona no hangatahinareo amin''ny anarako, dia hataoko izany, mba hankalazana ny Ray eo amin''ny Zanaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Raha mangataka zavatra amiko amin'ny anarako
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mangataka zavatra amin''ny anarako'
    marker-yv: yv-n
  - type: text
    text: ' ianareo, dia hataoko izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Raha tia Ahy ianareo, dia hitandrina ny didiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary Izaho hangataka amin'ny Ray, ary Izy hanome anareo Mpananatra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. Parakleto, dia Mpanampy, na Mpampahery, na Solovava
    marker-yv: yv-n
  - type: text
    text: ' hafa mba ho eo aminareo mandrakizay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'dia ny Fanahin''ny fahamarinana, Izay tsy azon''izao tontolo izao horaisina, satria tsy hitany na fantany; fa ianareo no mahafantatra Azy, satria mitoetra eo aminareo Izy, ary ho ao anatinareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tsy hamela anareo ho kamboty Aho; hankatỳ aminareo Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Vetivety foana dia tsy hahita Ahy intsony izao tontolo izao; fa ianareo no hahita Ahy; satria velona Aho, dia ho velona koa ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Amin''izany andro izany dia ho fantatrareo fa Izaho ao amin''ny Raiko, ary ianareo ato amiko, ary Izaho ao aminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Izay manana ny didiko ka mitandrina izany, dia izy no tia Ahy; ary izay tia Ahy no ho tian''ny Raiko, ary Izaho ho tia azy ka hiseho aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hoy Jodasy (tsy Iskariota) taminy: Tompoko, nahoana no aminay ihany no hisehoanao, fa tsy amin''izao tontolo izao koa? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jesosy namaly ka nanao taminy hoe: Raha misy tia Ahy, dia hitandrina ny teniko izy; ary ny Raiko ho tia azy, ary hankao aminy Izahay ka honina ao aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izay tsy tia Ahy dia tsy mitandrina ny teniko; ary ny teny izay renareo dia tsy Ahy, fa an''ny Ray izay naniraka Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Izany teny izany dia efa voalazako taminareo raha mbola mitoetra eto aminareo Aho; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: fa ny Mpananatra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. Parakleto, dia Mpanampy, na Mpampahery, na Solovava
    marker-yv: yv-n
  - type: text
    text: ', dia ny Fanahy Masina, Izay hirahin''ny Ray amin''ny anarako. Izy no hampianatra anareo ny zavatra rehetra sy hampahatsiaro anareo ny zavatra rehetra izay nolazaiko taminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fiadanana no avelako ho anareo, ny fiadanako no omeko anareo; tsy tahaka ny fanomen''izao tontolo izao no fanomeko anareo. Aza malahelo na matahotra ny fonareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Efa renareo fa Izaho nilaza taminareo hoe: Handeha Aho, nefa ho avy aminareo indray. Raha tia Ahy ianareo, dia ho faly, satria mankany amin''ny Ray Aho; fa ny Ray dia lehibe noho Izaho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary ankehitriny efa nilaza taminareo Aho, dieny tsy mbola tonga izany, mba hinoanareo, rehefa tonga. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Tsy hilaza zavatra maro aminareo intsony Aho; fa avy ny andrianan''izao tontolo izao, nefa tsy manana na inona na inona ato amiko izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fa mba ho fantatr'izao tontolo izao fa tiako ny Ray, ary araka izay nandidian'ny Ray Ahy, dia izany no hataoko. Mitsangàna, andeha isika hiala eto.
