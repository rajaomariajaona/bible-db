document_id: PSA.37,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salamo abidy. Ny tsi-faharetan'ny fanambinana ny ratsy fanahy, ary ny fahatezan'ny fitahiana azon'ny tsara fanahy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nataon''i Davida. Aoka tsy hirehitra ny fahatezeranao noho ny amin''ny mpanao ratsy; Ary aza mialona ny mpanao meloka; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa rehefa afaka kelikely, dia tsy hisy ny ratsy fanahy; Handinika ny fonenany ianao, fa tsy ho hita izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa ny mpandefitra kosa no handova ny tany ka hiravoravo amin'ny haben'ny fiadanana.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ny ratsy fanahy manao hevi-dratsy hamelezana ny maraina ka mihidy vazana aminy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny tompo mihomehy azy, satria hitany fa ho tonga ny androny.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ny ratsy fanahy nampitsoaka ny sabany ka nanenjana ny tsipìkany mba hampikarapoka ny ory sy ny malahelo, ary hamono ny mahitsy lalana. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny sabany hitsatoka amin'ny fony ihany, ary ny tsipìkany ho tapatapaka.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Tsara lavitra ny kely ananan''ny ratsy fanahy maro. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa ny sandrin'ny ratsy fanahy ho tapatapaka; Fa Jehovah manohana ny marina.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fantatr''i Jehovah ny andron''ny mahitsy; Ary ny lovany ho mandrakizay. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tsy mba ho menatra amin'ny andro fahoriana ireny; ary amin'ny taona mosarena dia ho voky izy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fa hojinjana faingana tahaka ny ahitra izy ka halazo tahaka ny ahi-maitso.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa ny ratsy fanahy haringana, ary ny fahavalon''i Jehovah ho tahaka ny voninahitry ny saha; Ho levona izy, eny, ho levon-ko setroka izy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Misambotra ny ratsy fanahy, nefa tsy manohitra
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: tsy mahonitra'
      marker-yv: yv-n
    - type: text
      text: '; Fa ny marina kosa mamindra fo ka manome. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Fa izay tahìny no handova ny tany; Ary izay ozoniny kosa no hofongorana.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Avy amin''i Jehovah no mahalavorary ny dian''ny olona, ka Izy no mankasitraka ny lalany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Na dia lavo aza izy, tsy dia mikarapoka, fa Jehovah no mitantana azy.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Efa mba tanora ihany aho, ary efa antitra ankehitriny; Fa tsy mbola hitako mangataka hanina. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Miantra mandrakariva ireny ka mampisambotra; ary ny taranany hotahina.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Halaviro ny ratsy, ka manaova soa. Dia honina mandrakizay ianao. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Fa Jehovah tia rariny sady tsy hahafoy ny olony masina; Harovana mandrakizay ireo; Fa taranaky ny ratsy fanahy hofongorana, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ny marina handova ny tany Ka honina ao aminy mandrakizay
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Matokia an''i Jehovah ianao, ka manaova soa, dia honina amin''ny tany ianao ka ho faly amin''ny fahamarinana. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ny vavan''ny marina miresaka fahendrena, Ary ny lelany manambara ny rariny. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ny lalàn'Andriamaniny no ao am-pony; Tsy mba ho solafaka ny diany.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Mitsikilo ny marina ny ratsy fanahy ka mitady hahafaty azy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Jehovah tsy hahafoy azy eo an-tanany. Na hanameloka azy, raha tsaraina izy.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Miandrasa an'i Jehovah, ka tandremo ny lalàny, dia hanandratra anao handova ny tany Izy; Ho faly hahita ny hamongorana ny ratsy fanahy ianao.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Efa hitako ny ratsy fanahy, fa loza loatra izy, ary nandrahaka tahaka ny hazo maitso maniry ho azy; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Kanjo nandalo izy ka, indro, tsy teo intsony; Ary nitady azy ka, tsy hita izy. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Diniho ny mahitsy, ka jereo ny marina; Fa misy farany
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: taranaka'
      marker-yv: yv-n
    - type: text
      text: ' ho an''ny olona tia fihavanana'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Fa fiadanana no faran''izany olona izany'
      marker-yv: yv-n
    - type: text
      text: '. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Fa ny mpanota haringana avokoa; Ny hihafaran''ny ratsy fanahy ho fongotra. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Fa ny famonjena ny marina dia avy amin''i Jehovah; Fiarovana mafy ho azy amin''ny andro fahoriana Izy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary miravoravoa amin''i Jehovah ianao, dia homeny anao izay irin''ny fonao. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Ary Jehovah mamonjy azy sy manafaka azy; eny, manafaka azy amin'ny ratsy fanahy Izy ka mamonjy azy, satria nialoka taminy izy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ankino amin''i Jehovah ny lalanao, ary matokia Azy, fa hataony tanteraka. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary hampiseho ny fahamarinanao tahaka ny mazava Izy, ary ny rariny ho anao tahaka ny mitataovovonana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Miantombena tsara miandry an'i Jehovah ianao ka manantenà Azy; Aza tezitra amin'izay ambinina amin'ny lalany dia amin'izay olona manao sain-dratsy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mitsahara amin''ny fahatezerana, ary mahafoiza ny fahavinirana; aoka tsy hirehitra ny fahatezeranao; fa ratsy no hiafaran''izany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa ny mpanao ratsy hofongoro-na; Ary izay miandry an'i Jehovah no handova ny tany.
