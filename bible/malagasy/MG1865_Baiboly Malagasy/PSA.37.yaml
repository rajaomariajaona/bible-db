document_id: PSA.37,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Salamo abidy. Ny tsi-faharetan'ny fanambinana ny ratsy fanahy, ary ny fahatezan'ny fitahiana azon'ny tsara fanahy
  - type: text
    content: 'Nataon''i Davida. Aoka tsy hirehitra ny fahatezeranao noho ny amin''ny mpanao ratsy; Ary aza mialona ny mpanao meloka; '
  '10':
  - type: text
    content: 'Fa rehefa afaka kelikely, dia tsy hisy ny ratsy fanahy; Handinika ny fonenany ianao, fa tsy ho hita izy. '
  '11':
  - type: text
    content: Fa ny mpandefitra kosa no handova ny tany ka hiravoravo amin'ny haben'ny fiadanana.
  '12':
  - type: text
    content: 'Ny ratsy fanahy manao hevi-dratsy hamelezana ny maraina ka mihidy vazana aminy. '
  '13':
  - type: text
    content: Ny tompo mihomehy azy, satria hitany fa ho tonga ny androny.
  '14':
  - type: text
    content: 'Ny ratsy fanahy nampitsoaka ny sabany ka nanenjana ny tsipìkany mba hampikarapoka ny ory sy ny malahelo, ary hamono ny mahitsy lalana. '
  '15':
  - type: text
    content: Ny sabany hitsatoka amin'ny fony ihany, ary ny tsipìkany ho tapatapaka.
  '16':
  - type: text
    content: 'Tsara lavitra ny kely ananan''ny ratsy fanahy maro. '
  '17':
  - type: text
    content: Fa ny sandrin'ny ratsy fanahy ho tapatapaka; Fa Jehovah manohana ny marina.
  '18':
  - type: text
    content: 'Fantatr''i Jehovah ny andron''ny mahitsy; Ary ny lovany ho mandrakizay. '
  '19':
  - type: text
    content: Tsy mba ho menatra amin'ny andro fahoriana ireny; ary amin'ny taona mosarena dia ho voky izy.
  '2':
  - type: text
    content: Fa hojinjana faingana tahaka ny ahitra izy ka halazo tahaka ny ahi-maitso.
  '20':
  - type: text
    content: 'Fa ny ratsy fanahy haringana, ary ny fahavalon''i Jehovah ho tahaka ny voninahitry ny saha; Ho levona izy, eny, ho levon-ko setroka izy. '
  '21':
  - type: text
    content: Misambotra ny ratsy fanahy, nefa tsy manohitra
  - type: note
    content: 'Na: tsy mahonitra'
  - type: text
    content: '; Fa ny marina kosa mamindra fo ka manome. '
  '22':
  - type: text
    content: Fa izay tahìny no handova ny tany; Ary izay ozoniny kosa no hofongorana.
  '23':
  - type: text
    content: 'Avy amin''i Jehovah no mahalavorary ny dian''ny olona, ka Izy no mankasitraka ny lalany. '
  '24':
  - type: text
    content: Na dia lavo aza izy, tsy dia mikarapoka, fa Jehovah no mitantana azy.
  '25':
  - type: text
    content: 'Efa mba tanora ihany aho, ary efa antitra ankehitriny; Fa tsy mbola hitako mangataka hanina. '
  '26':
  - type: text
    content: Miantra mandrakariva ireny ka mampisambotra; ary ny taranany hotahina.
  '27':
  - type: text
    content: 'Halaviro ny ratsy, ka manaova soa. Dia honina mandrakizay ianao. '
  '28':
  - type: text
    content: 'Fa Jehovah tia rariny sady tsy hahafoy ny olony masina; Harovana mandrakizay ireo; Fa taranaky ny ratsy fanahy hofongorana, '
  '29':
  - type: text
    content: Ny marina handova ny tany Ka honina ao aminy mandrakizay
  '3':
  - type: text
    content: 'Matokia an''i Jehovah ianao, ka manaova soa, dia honina amin''ny tany ianao ka ho faly amin''ny fahamarinana. '
  '30':
  - type: text
    content: 'Ny vavan''ny marina miresaka fahendrena, Ary ny lelany manambara ny rariny. '
  '31':
  - type: text
    content: Ny lalàn'Andriamaniny no ao am-pony; Tsy mba ho solafaka ny diany.
  '32':
  - type: text
    content: 'Mitsikilo ny marina ny ratsy fanahy ka mitady hahafaty azy. '
  '33':
  - type: text
    content: Jehovah tsy hahafoy azy eo an-tanany. Na hanameloka azy, raha tsaraina izy.
  '34':
  - type: text
    content: Miandrasa an'i Jehovah, ka tandremo ny lalàny, dia hanandratra anao handova ny tany Izy; Ho faly hahita ny hamongorana ny ratsy fanahy ianao.
  '35':
  - type: text
    content: 'Efa hitako ny ratsy fanahy, fa loza loatra izy, ary nandrahaka tahaka ny hazo maitso maniry ho azy; '
  '36':
  - type: text
    content: 'Kanjo nandalo izy ka, indro, tsy teo intsony; Ary nitady azy ka, tsy hita izy. '
  '37':
  - type: text
    content: Diniho ny mahitsy, ka jereo ny marina; Fa misy farany
  - type: note
    content: 'Na: taranaka'
  - type: text
    content: ' ho an''ny olona tia fihavanana'
  - type: note
    content: 'Na: Fa fiadanana no faran''izany olona izany'
  - type: text
    content: '. '
  '38':
  - type: text
    content: 'Fa ny mpanota haringana avokoa; Ny hihafaran''ny ratsy fanahy ho fongotra. '
  '39':
  - type: text
    content: 'Fa ny famonjena ny marina dia avy amin''i Jehovah; Fiarovana mafy ho azy amin''ny andro fahoriana Izy. '
  '4':
  - type: text
    content: 'Ary miravoravoa amin''i Jehovah ianao, dia homeny anao izay irin''ny fonao. '
  '40':
  - type: text
    content: Ary Jehovah mamonjy azy sy manafaka azy; eny, manafaka azy amin'ny ratsy fanahy Izy ka mamonjy azy, satria nialoka taminy izy.
  '5':
  - type: text
    content: 'Ankino amin''i Jehovah ny lalanao, ary matokia Azy, fa hataony tanteraka. '
  '6':
  - type: text
    content: 'Ary hampiseho ny fahamarinanao tahaka ny mazava Izy, ary ny rariny ho anao tahaka ny mitataovovonana. '
  '7':
  - type: text
    content: Miantombena tsara miandry an'i Jehovah ianao ka manantenà Azy; Aza tezitra amin'izay ambinina amin'ny lalany dia amin'izay olona manao sain-dratsy.
  '8':
  - type: text
    content: 'Mitsahara amin''ny fahatezerana, ary mahafoiza ny fahavinirana; aoka tsy hirehitra ny fahatezeranao; fa ratsy no hiafaran''izany. '
  '9':
  - type: text
    content: Fa ny mpanao ratsy hofongoro-na; Ary izay miandry an'i Jehovah no handova ny tany.
