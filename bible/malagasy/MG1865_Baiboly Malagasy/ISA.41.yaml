document_id: ISA.41,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahalehibiazan'i Jehovah, izay miseho amin'ny fitondrany ny firenena sy ny fiarovany ny Isiraely, ary ny fanambarany rahateo ny zavatra mbola ho avy
  - type: text
    content: 'Mangina hihaino ahy ianareo, ry nosy, ary aoka handroso hery ny firenena; Aoka hanatona izy, ka dia hiteny; Andeha isika hifanatona eo amin''ny fitsarana. '
  '10':
  - type: text
    content: 'Aza matahotra ianao, fa momba anao Aho; Ary aza miherikerika foana, fa Izaho no Andriamanitrao; Mampahery anao Aho sady mamonjy anao; Eny, mitantana anao amin''ny tanana ankavanan''ny fahamarinako Aho. '
  '11':
  - type: text
    content: 'Indro, ho menatra sy hangaihay izay rehetra tezitra aminao, ho tsinontsinona izy; Eny, ho levona izay miady aminao. '
  '12':
  - type: text
    content: 'Hotadiavinao izay mifanditra aminao, fa tsy ho hitanao, ary ho tahaka ny tsinontsinona sy ny zava-poana izay miady aminao. '
  '13':
  - type: text
    content: 'Fa Izaho Jehovah Andriamanitrao no mitantana ny tananao ankavanana, dia ilay manao aminao hoe: Aza matahotra, Izaho no hamonjy anao. '
  '14':
  - type: text
    content: 'Aza matahotra ianao, ry Jakoba kankana, dia ianareo, ry Isiraely olom-bitsy, Izaho no hamonjy anao, hoy Jehovah, Ary ny Iray Masin''ny Isiraely no Mpanavotra anao. '
  '15':
  - type: text
    content: 'Indro, ataoko kodia vy vaovao misy nify maranitra ianao; Hively ny tendrombohitra ianao ka hanorotoro azy ho vovoka ary hanao ny havoana ho tahaka ny akofa. '
  '16':
  - type: text
    content: Hikororoka azy ianao, ka hopaohin'ny rivotra izy, ary ny tafio-drivotra hanely azy; Fa ianao kosa dia hiravoravo amin'i Jehovah, ary ny Iray Masin'ny Isiraely no ho reharehanao.
  '17':
  - type: text
    content: 'Ny ory sy ny malahelo mitady rano, fa tsy mahita, ary ny lelany mainan''ny hetaheta; Izaho Jehovah no hihaino azy, Izaho, Andriamanitry ny Isiraely, tsy hahafoy azy; '
  '18':
  - type: text
    content: 'Hampiboika renirano ao amin''ny tendrombohitra mangadihady Aho ary loharano ao amin''ny lohasaha; Hanao ny efitra ho farihy Aho ary ny tany karankaina no loharano miboiboika. '
  '19':
  - type: text
    content: Hampaniry hazo sedera sy akasia sy rotra
  - type: note
    content: myrta
  - type: text
    content: ' ary oliva'
  - type: note
    content: Heb. oliva maniry ho azy
  - type: text
    content: ' any an-efitra Aho ary kypreso sy pina sy bokso eny an-tani-hay, '
  '2':
  - type: text
    content: Iza no nanaitra avy any atsinanana ilay nomban'ny fahamarinana tamin'ny diany rehetra
  - type: note
    content: 'Na: nantsoin''ny fahamarinana hanaraka azy'
  - type: text
    content: ', ary nanolotra ny firenena ho eo anatrehany, ka nampanapahiny ireo mpanjaka izy? Iza no nanao ny sabany ho tahaka ny vovoka, ary ny tsipìkany ho tahaka ny vodivary voapaoka? '
  '20':
  - type: text
    content: 'Mba ho hitany sy ho fantany sy hoheveriny ary ho azony an-tsaina fa ny tànan''i Jehovah no nanao izany, ary ny Iray Masin''ny Isiraely no nahary izany. '
  '21':
  - type: text
    content: Alaharo eto ny teninareo, hoy Jehovah; Asehoy izay mahamarina ny anareo
  - type: note
    content: Heb. fiarovana mafy
  - type: text
    content: ', hoy ny Mpanjakan''i Jakoba. '
  '22':
  - type: text
    content: Aoka hampanatoniny ka hasehony amintsika izay zavatra mbola ho avy; Ambarao izay zavatra taloha
  - type: note
    content: Heb. zavatra voalohany
  - type: text
    content: ', mba hoheverinay ka ho fantatray izay hiafarany, na ilazao izay zavatra ho avy izahay. '
  '23':
  - type: text
    content: 'Ambarao anay izay zavatra ho avy rahatrizay, mba ho fantatray fa andriamanitra ianareo; Eny, manaova soa, na manaova ratsy, mba hitaha isika, ka samy hahita. '
  '24':
  - type: text
    content: 'Indro, ianareo dia naman''ny tsinontsinona, ary ny asanareo dia naman''ny zava-poana; vetaveta izay mifidy anareo. '
  '25':
  - type: text
    content: 'Nanaitra ny anankiray avy tany avaratra Aho, ka tonga izy. Dia ny anankiray avy any amin''ny fiposahan''ny masoandro, izay hiantso ny anarako, ary hanosihosy ny mpanapaka tahaka ny fanosihosy feta izy, ary tahaka ny mpanefy vilany mihosy tanimanga. '
  '26':
  - type: text
    content: 'Iza no nitory izany hatramin''ny voalohany, mba ho fantatray? Ary hatry ny fony taloha, mba hataonay hoe: Marina? Tsy nisy nanambara, eny, tsy nisy nitory; Ary tsy nisy nandre ny teninareo. '
  '27':
  - type: text
    content: 'Izaho no voalohany Izay milaza amin''i Ziona hoe: Indreo, indreo izy, sady manome mpitondra teny soa mahafaly ho an''i Jerosalema. '
  '28':
  - type: text
    content: 'Dia nijery Aho, kanjo tsy nisy olona, eny, nojereko ireny kanjo tsy nisy mpanolo-tsaina hamaly Ahy, raha manontany azy Aho. '
  '29':
  - type: text
    content: Indro, zava-poana avokoa izy rehetra; Tsinontsinona ny asany; Rivotra sy zava-poana ny sampiny anidina.
  '3':
  - type: text
    content: 'Mipaoka ireo izy ka mandroso soa aman-tsara any amin''izay lalana tsy mbola nodiavin''ny tongony. '
  '4':
  - type: text
    content: 'Iza moa no nanao sy nahavita izany, sady miantso ny taranaka maro hatramin''ny taloha? Izaho Jehovah no voalohany, ary hatramin''ny farany dia mbola Izaho ihany no Izy. '
  '5':
  - type: text
    content: 'Ny nosy nahita ka raiki-tahotra; Toran-kovitra ny vazan-tany dia nanatona izy ka tonga. '
  '6':
  - type: text
    content: 'Samy nanampy ny namany avy izy rehetra, ary samy nilaza tamin''ny rahalahiny avy hoe: Matokia. '
  '7':
  - type: text
    content: 'Koa ny mpandrafitra dia nampahery ny mpanefy volamena, ary izay nandama tamin''ny tantanana nampahery izay nively teo amin''ny riandriana, ka hoy izy, miantso ny solohoto: Tsara ity, dia nohomboany mafy tamin''ny hombo izy mba tsy hihozongozona.'
  '8':
  - type: text
    content: 'Fa ianao kosa, ry Isiraely mpanompoko, sy Jakoba, izay nofidiko, Taranak''i Abrahama sakaizako, '
  '9':
  - type: text
    content: 'Hianao izay efa notantanako avy tany amin''ny faran''ny tany ary nantsoiko avy tany an-tsisiny ka nilazako hoe: Mpanompoko ianao, Efa nofidiko ka tsy mba nariako: '
