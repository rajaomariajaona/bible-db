document_id: ISA.41,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahalehibiazan'i Jehovah, izay miseho amin'ny fitondrany ny firenena sy ny fiarovany ny Isiraely, ary ny fanambarany rahateo ny zavatra mbola ho avy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Mangina hihaino ahy ianareo, ry nosy, ary aoka handroso hery ny firenena; Aoka hanatona izy, ka dia hiteny; Andeha isika hifanatona eo amin''ny fitsarana. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Aza matahotra ianao, fa momba anao Aho; Ary aza miherikerika foana, fa Izaho no Andriamanitrao; Mampahery anao Aho sady mamonjy anao; Eny, mitantana anao amin''ny tanana ankavanan''ny fahamarinako Aho. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Indro, ho menatra sy hangaihay izay rehetra tezitra aminao, ho tsinontsinona izy; Eny, ho levona izay miady aminao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Hotadiavinao izay mifanditra aminao, fa tsy ho hitanao, ary ho tahaka ny tsinontsinona sy ny zava-poana izay miady aminao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa Izaho Jehovah Andriamanitrao no mitantana ny tananao ankavanana, dia ilay manao aminao hoe: Aza matahotra, Izaho no hamonjy anao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Aza matahotra ianao, ry Jakoba kankana, dia ianareo, ry Isiraely olom-bitsy, Izaho no hamonjy anao, hoy Jehovah, Ary ny Iray Masin''ny Isiraely no Mpanavotra anao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Indro, ataoko kodia vy vaovao misy nify maranitra ianao; Hively ny tendrombohitra ianao ka hanorotoro azy ho vovoka ary hanao ny havoana ho tahaka ny akofa. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Hikororoka azy ianao, ka hopaohin'ny rivotra izy, ary ny tafio-drivotra hanely azy; Fa ianao kosa dia hiravoravo amin'i Jehovah, ary ny Iray Masin'ny Isiraely no ho reharehanao.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ny ory sy ny malahelo mitady rano, fa tsy mahita, ary ny lelany mainan''ny hetaheta; Izaho Jehovah no hihaino azy, Izaho, Andriamanitry ny Isiraely, tsy hahafoy azy; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Hampiboika renirano ao amin''ny tendrombohitra mangadihady Aho ary loharano ao amin''ny lohasaha; Hanao ny efitra ho farihy Aho ary ny tany karankaina no loharano miboiboika. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Hampaniry hazo sedera sy akasia sy rotra
    - type: usfm
      marker: x
      children:
      - type: text
        text: myrta
      marker-yv: yv-n
    - type: text
      text: ' ary oliva'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. oliva maniry ho azy
      marker-yv: yv-n
    - type: text
      text: ' any an-efitra Aho ary kypreso sy pina sy bokso eny an-tani-hay, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Iza no nanaitra avy any atsinanana ilay nomban'ny fahamarinana tamin'ny diany rehetra
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: nantsoin''ny fahamarinana hanaraka azy'
      marker-yv: yv-n
    - type: text
      text: ', ary nanolotra ny firenena ho eo anatrehany, ka nampanapahiny ireo mpanjaka izy? Iza no nanao ny sabany ho tahaka ny vovoka, ary ny tsipìkany ho tahaka ny vodivary voapaoka? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mba ho hitany sy ho fantany sy hoheveriny ary ho azony an-tsaina fa ny tànan''i Jehovah no nanao izany, ary ny Iray Masin''ny Isiraely no nahary izany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Alaharo eto ny teninareo, hoy Jehovah; Asehoy izay mahamarina ny anareo
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. fiarovana mafy
      marker-yv: yv-n
    - type: text
      text: ', hoy ny Mpanjakan''i Jakoba. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Aoka hampanatoniny ka hasehony amintsika izay zavatra mbola ho avy; Ambarao izay zavatra taloha
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. zavatra voalohany
      marker-yv: yv-n
    - type: text
      text: ', mba hoheverinay ka ho fantatray izay hiafarany, na ilazao izay zavatra ho avy izahay. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ambarao anay izay zavatra ho avy rahatrizay, mba ho fantatray fa andriamanitra ianareo; Eny, manaova soa, na manaova ratsy, mba hitaha isika, ka samy hahita. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Indro, ianareo dia naman''ny tsinontsinona, ary ny asanareo dia naman''ny zava-poana; vetaveta izay mifidy anareo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Nanaitra ny anankiray avy tany avaratra Aho, ka tonga izy. Dia ny anankiray avy any amin''ny fiposahan''ny masoandro, izay hiantso ny anarako, ary hanosihosy ny mpanapaka tahaka ny fanosihosy feta izy, ary tahaka ny mpanefy vilany mihosy tanimanga. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Iza no nitory izany hatramin''ny voalohany, mba ho fantatray? Ary hatry ny fony taloha, mba hataonay hoe: Marina? Tsy nisy nanambara, eny, tsy nisy nitory; Ary tsy nisy nandre ny teninareo. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Izaho no voalohany Izay milaza amin''i Ziona hoe: Indreo, indreo izy, sady manome mpitondra teny soa mahafaly ho an''i Jerosalema. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Dia nijery Aho, kanjo tsy nisy olona, eny, nojereko ireny kanjo tsy nisy mpanolo-tsaina hamaly Ahy, raha manontany azy Aho. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Indro, zava-poana avokoa izy rehetra; Tsinontsinona ny asany; Rivotra sy zava-poana ny sampiny anidina.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Mipaoka ireo izy ka mandroso soa aman-tsara any amin''izay lalana tsy mbola nodiavin''ny tongony. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Iza moa no nanao sy nahavita izany, sady miantso ny taranaka maro hatramin''ny taloha? Izaho Jehovah no voalohany, ary hatramin''ny farany dia mbola Izaho ihany no Izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ny nosy nahita ka raiki-tahotra; Toran-kovitra ny vazan-tany dia nanatona izy ka tonga. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Samy nanampy ny namany avy izy rehetra, ary samy nilaza tamin''ny rahalahiny avy hoe: Matokia. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Koa ny mpandrafitra dia nampahery ny mpanefy volamena, ary izay nandama tamin''ny tantanana nampahery izay nively teo amin''ny riandriana, ka hoy izy, miantso ny solohoto: Tsara ity, dia nohomboany mafy tamin''ny hombo izy mba tsy hihozongozona.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa ianao kosa, ry Isiraely mpanompoko, sy Jakoba, izay nofidiko, Taranak''i Abrahama sakaizako, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Hianao izay efa notantanako avy tany amin''ny faran''ny tany ary nantsoiko avy tany an-tsisiny ka nilazako hoe: Mpanompoko ianao, Efa nofidiko ka tsy mba nariako: '
