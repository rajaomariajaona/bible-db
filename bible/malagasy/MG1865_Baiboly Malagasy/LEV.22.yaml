document_id: LEV.22
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy, ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mitenena amin''i Arona sy ny zanany mba hitandremany ny amin''ny tsy hanakekeny ny zava-masina izay hamasinin''ny Zanak''Isiraely ho Ahy tsy hanamavoany ny anarako masina: Izaho no Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Lazao aminy hoe: Izay rehetra maloto amin''ny zanakareo, hatramin''ny taranakareo fara mandimby, nefa manakaiky ny zava-masina izay hamasinin''ny Zanak''Isiraely ho an''i Jehovah, dia hofongorana tsy ho eo anatrehako: Izaho no Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Na iza na iza amin''ny taranak''i Arona no boka na marary mitsika dia tsy hihinana ny zava-masina mandra-pahadiony. Ary izay rehetra mikasika izay maloto amim-paty, na izay lehilahy nialan''ny azy, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'na izay mikasika biby mandady na mikisaka izay mahaloto, na lehilahy izay mahaloto, na inona na inona no fahalotoany, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ny olona izay mikasika izany dia haloto mandra-paharivan''ny andro ka tsy hihinana amin''ny zava-masina, raha tsy mandro amin''ny rano. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary rehefa milentika ny masoandro, dia hadio izy, ka vao izay no mahazo mihinana amin''ny zava-masina, satria fihinany izany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izay maty ho azy, na izay noviravirain-biby, dia tsy hohaniny, mba tsy hahaloto azy: Izaho no Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary aoka hitandrina izay nasaiko tandremana izy, fandrao ho meloka noho izany izy ka ho fatin''ny nanamavoany azy: Izaho Jehovah no manamasina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary aza avela hisy olon-kafa hihinana zava-masina; na izay mivahiny ao amin''ny mpisorona, na izay mpikarama, dia samy tsy mahazo mihinana zava-masina. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa raha misy olona novidin''ny mpisorona, dia hahazo mihinana amin''izany ihany izy; ary ny ompikeliny hahazo mihinana amin''ny fihinan''ny mpisorona koa. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary raha misy zanakavavin''ny mpisorona manambady olon-kafa, dia tsy hihinana amin''ny fanatitra avy amin''ny zava-masina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa raha misy zanakavavin''ny mpisorona maty vady, na efa nisaorana, ka tsy manan-janaka, ary mody any an-tranon-drainy izy toy ny fony izy mbola kely, dia mahazo mihinana ny fihinan-drainy ihany izy; fa aoka tsy hisy olon-kafa hihinana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary raha misy olona mihinana tsy nahy amin''ny zava-masina, dia honerany ny zava-masina ka homeny ny mpisorona sady hampiany ho tonga avy fahenina: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary aoka tsy hisy hametaveta ny zava-masin''ny Zanak''Isiraely, izay ateriny ho an''i Jehovah, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: na hahatonga ota aman-keloka noho ny nihinanany ny zava-masiny; fa Izaho Jehovah no manamasina azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mitenena amin''i Arona sy ny zanany ary ny zanak''Isiraely rehetra hoe: Na iza na iza amin''ny taranak''Isiraely, na amin''ny vahiny eo amin''ny Isiraely, no manatitra ny fanatiny ho fanatitra hanalany voady na ho fanati-tsitrapony, izay hateriny ho an''i Jehovah ho fanatitra dorana, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'dia lahy tsy misy kilema no hateriny, na omby izany, na zanak''ondry, na osy, mba hankasitrahana anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Izay rehetra misy kilema dia tsy haterinareo; fa tsy hankasitrahana anareo izany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary raha misy manatitra fanati-pihavanana ho an''i Jehovah, na ho fanatitra hanalany voady, na ho fanati-tsitrapo, na omby izany, na ondry, na osy, dia ny tsara izay tsy misy kilema na kely akory aza no hateriny mba hankasitrahana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa ny jamba na ny misy tapaka, na ny kilemaina, na ny ferena, na ny boka, na ny kongonina, dia izany no tsy haterinareo ho an''i Jehovah, na hataonareo fanatitra amin''ny afo eo ambonin''ny alitara ho an''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Na omby, na ondry, na osy, izay misy sampona, dia azonao haterina ho fanati-tsitrapo; fa raha atao fanatitra hanalam-boady, dia tsy hankasitrahana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izay voaporitra, na voatoro, na voaombotra, na voadidy ho afaka ny vihiny, dia tsy azonareo aterina ho an''i Jehovah; ary aza manao izany eo amin''ny taninareo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary raha misy entin''olona hafa firenena aza izany zavatra izany, dia tsy azonareo haterina ho hanin''Andriamanitrareo, satria efa simba izy ka misy kilema; tsy mba hankasitrahana anareo izany. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Raha misy omby, na ondry, na osy, vao teraka, dia hitoetra amin-dreniny hafitoana izy; fa rehefa hatramin''ny andro fahavalo no ho miakatra, dia hankasitrahana izy, raha atao fanatitra atao amin''ny afo ho an''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary ny ombivavy, na ny ondrivavy, na ny osivavy, dia tsy hovonoinareo indray andro izy sy ny zanany. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary raha mamono zavatra hatao fanati-pisaorana ho an''i Jehovah ianareo, dia amin''izay hankasitrahana anareo no hamonoanareo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Amin''izany andro izany ihany no hihinanana azy, fa aza amelana ho tra-maraina: Izaho no Jehovah '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary tandremo ny didiko, ka araho izany: Izaho no Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary aza manamavo ny anarako masina; fa hohamasinina eo amin''ny Zanak''Isiraely Aho: Izaho Jehovah, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Izay nitondra anareo nivoaka avy tany amin'ny tany Egypta mba ho Andriamanitrareo, no manamasina anareo; Izaho no Jehovah.
