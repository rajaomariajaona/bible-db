document_id: EZK.39,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary ianao, ry zanak''olona, dia maminania ny hamelezana an''i Goga, ka ataovy hoe: Izao no lazain''i Jehovah Tompo: Indro, hamely anao Aho, ry Goga, mpanjakan''i Rosy sy Meseka ary Tobala. '
  '10':
  - type: text
    content: 'fa tsy haka kitay hazo any an-tsaha na hanapaka hazo any an''ala izy, fa hitaina ny fiadiana ka hamabo izay efa namabo azy sy handroba izay efa nandroba azy, hoy Jehovah Tompo. '
  '11':
  - type: text
    content: Ary amin'izany andro izany dia homeko tany eo amin'ny Isiraely Goga hasiana fasana, dia ny lohasahan'ny mpandalo manolotra ny ranomasina, ka hisakana
  - type: note
    content: 'Na: hampitampina orona'
  - type: text
    content: ' ny mpandalo izany; ary any no handevenany an''i Goga sy ny olony maro be rehetra; ary ny anarany hataony hoe Lohasahan''ireo olona maroben''i Goga. '
  '12':
  - type: text
    content: 'Ary fito volana mipaka no handevenan''ny taranak''Isirady azy, hanadiovany ny tany. '
  '13':
  - type: text
    content: 'Eny, ny tompon-tany rehetra no handevina azy; ary ho laza ho azy izany amin''ny andro hampisehoako ny voninahitro, hoy Jehovah Tompo. '
  '14':
  - type: text
    content: 'Ary izy hanavaka sy hanendry olona ho mpitety ny tany sy izay hiaraka amin''ny mpitety koa handevina ny mbola sisa eny ambonin''ny tany, hanadiovana azy; rehefa afaka fito volana, dia vao hikatsaka izy; '
  '15':
  - type: text
    content: 'ary raha mandeha mitety ny tany ireo mpitety ka mahita taolan''olona, dia hanorina marika eo anilany izy, mandra-pandevin''ny mpandevina azy ao amin''ny Lohasahan''ireo maro ben''i Goga. '
  '16':
  - type: text
    content: Ary hisy tanàna koa hatao hoe Hamona
  - type: note
    content: Hamona = Olona maro be
  - type: text
    content: '. Toy izany no hanadiovany ny tany. '
  '17':
  - type: text
    content: 'Ary ianao, ry zanak''olona, dia izao na lazain''i Jehovah Tompo: Ataovy amin''ny voro-manidina rehetra sy ny bibi-dia rehetra hoe: Mivoria ianareo, ka mankanesa atỳ; miangòna ianareo avy amin''ny manodidina ho amin''ny fanatitro izay vonoiko ho anareo, dia fanatitra lehibe eny an-tendrombohitry ny Isiraely, hihinananareo nofo sy hisotroanareo rà. '
  '18':
  - type: text
    content: 'Ny nofon''ny lehilahy mahery no hohaninareo, ary ny ran''ireo mpanjakan''ny tany no hosotroinareo, dia ondrilahy sy zanak''ondry sy osilahy ary vantotr''ombilahy, samy mifahy avy any Basana izy rehetra. '
  '19':
  - type: text
    content: 'Dia hihinana matavy ianareo mandra-pahavokinareo ary hisotro rà mandra-pahaleonareo avy amin''ny fanatitro izay novonoiko ho anareo. '
  '2':
  - type: text
    content: 'Hitarika sy hitondra anao hiakatra avy any amin''ny farany avaratra Aho, dia ho entiko ho any an-tendrombohitry ny Isiraely ianao. '
  '20':
  - type: text
    content: 'Ary ho voky soavaly sy ny mpitaingina azy ary lehilahy mahery mbamin''ny miaramila rehetra eo amin''ny latabatro ianareo, hoy Jehovah Tompo. '
  '21':
  - type: text
    content: 'Ary hasehoko any amin''ny jentilisa ny voninahitro, ka ho hitan''ny firenena rehetra ny fitsarana hataoko sy ny tanako izay hahinjitro aminy. '
  '22':
  - type: text
    content: 'Ary ho fantatry ny taranak''Isiraely fa Izaho no Jehovah Andriamaniny hatry ny androtr''iny ka hatramin''ny ho avy rehetra. '
  '23':
  - type: text
    content: 'Ary ho fantatry ny jentilisa fa ny heloky ny taranak''Isiraely no nahababo azy; fa satria nivadika tamiko izy, dia izany no nanafenako ny tavako taminy sy nanolorako azy ho eo an-tànan''ny fahavalony, ka dia lavon-tsabatra izy rehetra. '
  '24':
  - type: text
    content: Araka ny fahalotoany sy ny fahadisoany no navaliko azy sy nanafenako ny tavako taminy.
  '25':
  - type: text
    content: 'Koa izao no lazain''i Jehovah Tompo: Ankehitriny dia hampodiko avy amin''ny fahababoany Jakoba, ary hamindrako fo ny taranak''Isiraely rehetra; ary hiseho ho saro-piaro noho ny amin''ny anarako masina Aho. '
  '26':
  - type: text
    content: Dia mba hahatsiaro
  - type: note
    content: Heb. hitondra
  - type: text
    content: ' ny fahamenarany sy ny fahadisoany rehetra izay nandisoany tamiko izy, rehefa mandry fahizay ao amin''ny taniny, ka tsy misy manaitaitra azy, '
  '27':
  - type: text
    content: 'rehefa ampodiko avy any amin''ny firenena izy ary angoniko avy any amin''ny tanin''ny fahavalony; ary hiseho ho masina eo imason''ny jentilisa Aho amin''ny ataoko amin''ireny; '
  '28':
  - type: text
    content: 'dia ho fantany fa Izaho Jehovah no Andriamaniny amin''ny ampandehanako azy ho babo any amin''ny firenena sy amin''ny anangonako azy ho any amin''ny taniny, ka tsy hisy hafoiko any izy na dia iray akory aza. '
  '29':
  - type: text
    content: Ary tsy hafeniko aminy intsony ny tavako; fa haidiko ao amin'ny taranak'Isiraely ny Fanahiko, hoy Jehovah Tompo.
  '3':
  - type: text
    content: 'Ary hasiako ny tsipìkanao hiala eny an-tananao ankavia, ary halatsako hiala eny an-tananao an-kavanana ny zana-tsipìkanao. '
  '4':
  - type: text
    content: 'Any an-tendrombohitry ny Isiraely no hiampatramparanao sy ny miaramilanao rehetra mbamin''ny firenena izay miaraka aminao; homeko hohanin''ny vorona mpihaza samy hafa karazana rehetra sy ny bibi-dia ianao. '
  '5':
  - type: text
    content: 'Eny an-tsaha no hiamparanao; fa Izaho no efa niteny, hoy Jehovah Tompo. '
  '6':
  - type: text
    content: 'Ary haterako afo Magoga sy izay mipetraka tsy manana ahiahy any amoron-tsiraka; ka dia ho fantany fa Izaho no Jehovah. '
  '7':
  - type: text
    content: Ary ny anarako masina dia hataoko fantatra ao amin'ny Isiraely oloko; ary tsy havelako holotoina intsony ny anarako masina; ka dia ho fantatry ny firenena fa Izaho no Jehovah, Izay masina ao amin'ny Isiraely.
  '8':
  - type: text
    content: 'Indro, tonga izany ka tanteraka, hoy Jehovah Tompo. Izany no andro izay nolazaiko. '
  '9':
  - type: text
    content: 'Ary hivoaka ny mponina ao amin''ny tanànan''ny Isiraely ka handrehitra sy hitaina ny fiadiana, dia ny ampinga lehibe, ny tsipìka sy ny zana-tsipìka, ny langilangy sy ny lefona, ary hitaina izany mandritra ny fito taona izy; '
