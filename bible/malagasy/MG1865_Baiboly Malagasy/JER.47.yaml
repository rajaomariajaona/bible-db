document_id: JER.47
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faminaniana ny amin'ny Filistina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny tenin'i Jehovah izay tonga tamin'i Jeremia mpaminany ny amin'ny Filistina, fony Farao tsy mbola namely an'i Gaza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain''i Jehovah: Indro, misy rano mizotra avy any avaratra ka ho tonga ony maria manafotra ny tany mbamin''izay rehetra ao aminy, dia ny tanàna mbamin''izay monina ao aminy; Ka dia hitaraina ny olona, ary hidradradradra ny mponina rehetra amin''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Noho ny fikatrokatroky ny kitron''ny soavaliny matanjaka sy ny fikorodondrodon''ny kalesiny ary ny fikotrototroky ny kodiany ny ray dia tsy miherika ny zanany, fa efa miraviravy tanana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Noho ny hihavian''ny andro handravana ny Filistina rehetra sy handringanana izay sisa rehetra amin''ny mpamonjy an''i Tyro sy Sidona; Fa horavan''i Jehovah ny Filistina, dia ny sisa avy any amin''ny nosy Kaftora. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Voaharatra Gaza, ringana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Mangina'
    marker-yv: yv-n
  - type: text
    text: ' Askelona mbamin''ny sisa amin''ny lohasahany; Mandra-pahoviana no mbola hitetika ny tenanao ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Indrisy ry sabatr''i Jehovah! Mandra-pahoviana no tsy hitsaharanao? Midira ao amin''ny tranonao ihany; Mitsahara, ka mijanòna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hataony
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Hataonao
    marker-yv: yv-n
  - type: text
    text: ' ahoana no fitsahatra. Fa Jehovah no nandidy azy, eny, hamely an''i Askelona mbamin''ny eny amoron-dranomasina no efa nanendreny azy.'
