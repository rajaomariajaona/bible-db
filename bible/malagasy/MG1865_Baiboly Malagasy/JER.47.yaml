document_id: JER.47,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin'ny Filistina
  - type: text
    content: Ny tenin'i Jehovah izay tonga tamin'i Jeremia mpaminany ny amin'ny Filistina, fony Farao tsy mbola namely an'i Gaza.
  '2':
  - type: text
    content: 'Izao no lazain''i Jehovah: Indro, misy rano mizotra avy any avaratra ka ho tonga ony maria manafotra ny tany mbamin''izay rehetra ao aminy, dia ny tanàna mbamin''izay monina ao aminy; Ka dia hitaraina ny olona, ary hidradradradra ny mponina rehetra amin''ny tany. '
  '3':
  - type: text
    content: 'Noho ny fikatrokatroky ny kitron''ny soavaliny matanjaka sy ny fikorodondrodon''ny kalesiny ary ny fikotrototroky ny kodiany ny ray dia tsy miherika ny zanany, fa efa miraviravy tanana, '
  '4':
  - type: text
    content: 'Noho ny hihavian''ny andro handravana ny Filistina rehetra sy handringanana izay sisa rehetra amin''ny mpamonjy an''i Tyro sy Sidona; Fa horavan''i Jehovah ny Filistina, dia ny sisa avy any amin''ny nosy Kaftora. '
  '5':
  - type: text
    content: Voaharatra Gaza, ringana
  - type: note
    content: 'Na: Mangina'
  - type: text
    content: ' Askelona mbamin''ny sisa amin''ny lohasahany; Mandra-pahoviana no mbola hitetika ny tenanao ianao? '
  '6':
  - type: text
    content: 'Indrisy ry sabatr''i Jehovah! Mandra-pahoviana no tsy hitsaharanao? Midira ao amin''ny tranonao ihany; Mitsahara, ka mijanòna. '
  '7':
  - type: text
    content: Hataony
  - type: note
    content: Heb. Hataonao
  - type: text
    content: ' ahoana no fitsahatra. Fa Jehovah no nandidy azy, eny, hamely an''i Askelona mbamin''ny eny amoron-dranomasina no efa nanendreny azy.'
