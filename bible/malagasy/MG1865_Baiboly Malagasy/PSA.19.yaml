document_id: PSA.19,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fanehoana ny voninahitr'Andriamanitra, amin'ny asan'ny tànany, na amin'ny lalàna nomeny
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ho an''ny mpiventy hira. Salamo nataon''i Davida. Ny lanitra mitory ny voninahitr''Andriamanitra; ary ny habakabaka manambara ny asan''ny tànany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Irina noho ny volamena ireny, eny, noho ny tena volamena betsaka aza; ary mamy noho ny tantely, eny, noho ny tantely mitete avy amin''ny tohotra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary ny mpanomponao dia hazavain'ireny; amin'ny fitandremana azy misy valiny lehibe.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Raha ny fahatsontsana, dia iza re no mahalala izany? ataovy tsy manan-tsiny aho ny amin''izay ota tsy fantatra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Arovy ny mpanomponao tsy ho azon''ny ota sahisahy; aoka tsy hanapaka ahy izany; dia ho marina tokoa aho ka tsy hanan-tsiny ny amin''izay fahadisoana lehibe. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Aoka ny tenin'ny vavako sy ny fisainan'ny foko samy hankasitrahana eo imasonao, Jehovah ô, Vatolampiko sy Mpanavotra ahy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ny andro samy miteny amin''ny andro mandimby azy, ary ny alina samy manolo-pahalalana amin''ny alina mandimby azy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tsy misy teny na fiteny anefa; tsy re izay feony
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Izay tsy andrenesana ny feony; na: Izay tsy re ny feony'
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Efa nivoaka ho any amin'ny tany rehetra ny famolainany
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: feony'
      marker-yv: yv-n
    - type: text
      text: ', ary ny teniny dia mihatra amin''ny faran''izao rehetra izao. Trano-lay ho an''ny masoandro no nataony teo aminy; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary ny masoandro dia tahaka ny mpampaka-bady mivoaka avy ao an-trano fandriany; sady mifaly tahaka ny lehilahy matanjaka mihazakazaka amin''ny alehany izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Any amin'ny faravodilanitra ny fiposahany, ary ny alehany dia hatramin'ny farany koa, ka tsy misy takona amin'ny hafanany.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Tsy misy tsiny ny lalàn''i Jehovah, mamelombelona ny fanahy; mahatoky ny teni-vavolombelon''i Jehovah, mahahendry ny kely saina. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mahitsy ny fandidian''i Jehovah, mahafaly ny fo; madio ny didin''i Jehovah, mampahazava ny maso. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Madio ny fahatahorana an''i Jehovah, maharitra mandrakizay; marina ny fitsipik''i Jehovah, eny, mahitsy avokoa. '
