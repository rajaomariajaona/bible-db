document_id: PSA.70,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fangatataham-pamonjena
  - type: text
    content: 'Ho an''ny mpiventy hira. Nataon''i Davida. Ho fampahatsiarovana. Andriamanitra ô, faingàna hanafaka ahy; Jehovah ô, faingàna hamonjy ahy. '
  '2':
  - type: text
    content: 'Aoka ho menatra sy hangaihay izay mitady ny aiko; aoka hiamboho sy ho afa-baraka izay faly amin''ny manjo ahy; '
  '3':
  - type: text
    content: 'Aoka hiamboho noho ny fahamenarany izay manao hoe: Hià! sakoa izay! '
  '4':
  - type: text
    content: 'Aoka hifaly sy ho ravoravo aminao izay rehetra mitady Anao; ary aoka izay tia ny famonjenao hanao mandrakariva hoe: hankalazaina anie Andriamanitra. '
  '5':
  - type: text
    content: Fa izaho dia ory sy malahelo; faingàna hankatỳ amiko, Andriamanitra ô; Mpamonjy sy Mpanafaka ahy Hianao; aza ela, Jehovah ô.
