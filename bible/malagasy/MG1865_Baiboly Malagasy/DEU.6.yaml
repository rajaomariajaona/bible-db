document_id: DEU.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny fitiavana an'Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary izao no lalàna, dia ny didy sy ny fitsipika, izay nasain''i Jehovah Andriamanitrareo hampianarina anareo mba harahinareo any amin''ny tany izay alehanareo holovana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mba hatahoranao an''i Jehovah Andriamanitrao, hitandremanao ny lalàny rehetra sy ny didiny izay andidiako anao, dia ianao sy ny zanakao ary ny zafinao, amin''ny andro rehetra hiainanao, mba ho maro andro ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Koa mihainoa, ry Isiraely, ka mitandrema hanaraka izany, mba hahita soa ianao, ary mba hitomboanareo indrindra, araka izay nolazain'i Jehovah, Andriamanitry ny razanao, taminao, dia any amin'ny tany tondra-dronono sy tantely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mihainoa, ry Isiraely: Jehovah Andriamanitsika dia Jehovah iray ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary tiava an''i Jehovah Andriamanitrao amin''ny fonao rehetra sy ny fanahinao rehetra ary ny herinao rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary aoka ho ao am-ponao izao teny andidiako anao anio izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia ampianaro tsara ny zanakao izany, ary resaho, na mipetraka ao an-tranonao ianao, na mandeha any an-dalana, na mandry, na mifoha; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary fehezo ho famantarana eo amin''ny tananao ireny, ary aoka ho fehy fampahatsiarovana eo ambonin''ny handrinao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ary soraty eo amin''ny tolam-baravaran''ny tranonao sy eo amin''ny vavahadinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary rehefa entin''i Jehovah Andriamanitrao ianao ho any amin''ny tany izay nianianany tamin''i Abrahama sy Isaka ary Jakoba razanao homena anao, dia tany misy tanàna lehibe sady tsara, izay tsy nataonao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'sy trano feno zava-tsoa rehetra, izay tsy nofenoinao, sy lavaka famorian-drano voalavaka eo amin''ny vato, izay tsy nolavahanao, sy tany voavoly voaloboka sy hazo oliva, izay tsy nambolenao, ary mihinana ianao ka voky, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia mitandrema fandrao hadinoinao Jehovah, Izay nitondra anao nivoaka avy tany amin''ny tany Egypta, tamin''ny trano nahandevozana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Matahora an''i Jehovah Andriamanitrao ianao, ka manompoa Azy, ary aoka ny anarany no hianiananao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Aza manaraka izay andriamani-kafa amin''ireny andriamanitry ny firenena manodidina anareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'fa Andriamanitra saro-piaro eo aminao Jehovah Andriamanitrao, fandrao hirehitra aminao ny fahatezeran''i Jehovah Andriamanitrao, ka hofongorany tsy ho eo ambonin''ny tany ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Aza maka fanahy an''i Jehovah Andriamanitrareo ianareo, tahaka ilay nakanareo fanahy Azy tao Masa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tandremo tsara ny didin''i Jehovah Andriamanitrareo sy ny teni-vavolombelony ary ny lalàny, izay efa nandidiany anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ataovy izay mahitsy sady tsara eo imason''i Jehovah, mba hahita soa ianao ary mba hidiranao handova ny tany soa izay nianianan''i Jehovah tamin''ny razanao homena azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ary mba horoahiny tsy ho eo anoloanao ny fahavalonao rehetra, araka izay nolazain''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary raha manontany anao ny zanakao amin''ny andro ho avy ka manao hoe: Manao ahoana moa ny teni-vavolombelona sy ny didy ary ny fitsipika, izay efa nandidian''i Jehovah Andriamanitsika anareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia holazainao aminy hoe: Andevon''i Farao tany Egypta isika, ary tanana mahery no nitondran''i Jehovah antsika nivoaka avy tany Egypta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary Jehovah nanao famantarana sy fahagagana lehibe sady mandoza tamin''ny Egyptiana sy Farao ary ny ankohonany teo imasontsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nitondra antsika nivoaka avy tany Izy hampidirany antsika mba homeny antsika ny tany izay nianianany tamin''ny razantsika homena azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary Jehovah nandidy antsika hanaraka ireo didy rehetra ireo sy hatahotra an''i Jehovah Andriamanitsika, mba hahita soa mandrakariva isika sy ho velona tahaka ny amin''izao anio izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary ho fahamarinantsika ny mitandrina hanaraka izany didy rehetra izany eo anatrehan'i Jehovah Andriamanitsika, araka izay efa nandidiany antsika.
