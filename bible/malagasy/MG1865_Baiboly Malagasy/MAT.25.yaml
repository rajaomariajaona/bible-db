document_id: MAT.25,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary amin'izany ny fanjakan'ny lanitra dia ho tahaka ny virijina folo, izay nitondra ny fanalany
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fanilony'
      marker-yv: yv-n
    - type: text
      text: ' ka nivoaka hitsena ny mpampakatra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha mbola lasa nividy izy, dia tonga ny mpampakatra, ary izay efa niomana dia niara-niditra taminy tao amin''ny fampakaram-bady, ary dia narindrina ny varavarana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa afaka izany, dia tonga kosa ireo virijina teo ka nanao hoe Tompoko, tompoko, vohay izahay. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izy namaly hoe: Lazaiko aminareo marina tokoa: Tsy fantatro ianareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa amin''izany miambena ianareo, fa tsy fantatrareo na ny andro na ny ora. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny fanjakan''ny lanitra dia tahaka ny olona izay efa handeha ho any an-tany hafa ka niantso ny mpanompony, dia nanolotra azy ny fananany: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa ny anankiray nomeny talenta dimy, ny anankiray roa, ary ny anankiray iray,- samy araka izay fahaizany avy; dia lasa nandeha izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niaraka tamin''izay dia lasa ilay nandray ny talenta dimy, ka nataony varotra izany; ary nahazo tombony talenta dimy koa izy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary toy izany koa, ilay nandray ny roa dia nahazo roa ho tombony. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ilay nandray ny iray kosa dia lasa nihady ny tany ka nandevina ny volan''ny tompony. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony ela, dia tonga ny tompon''ireo mpanompo ireo ka nampilaza azy ny amin''ny volany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny dimy tamin''ireo dia adala, fa ny dimy kosa hendry. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nanatona ilay nandray ny talenta dimy, dia nitondra talenta dimy koa izy ka nanao hoe: Tompoko, talenta dimy no natolotrao ahy; indro, nahazo tombony talenta dimy koa aho. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny tompony taminy: Tsara izany, ry mpanompo tsara sady mahatoky; nahatoky'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Ry mpanompo tsara sady mahatoky, nahatoky tsara, etc'
      marker-yv: yv-n
    - type: text
      text: ' tamin''ny kely ianao, dia hotendreko ho mpanapaka ny be; midìra amin''ny fifalian''ny tomponao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nanatona koa ilay nandray ny talenta roa, dia hoy izy: Tompoko, talenta roa no natolotrao ahy; indro, nahazo tombony talenta roa koa aho. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny tompony taminy: Tsara izany, ry mpanompo tsara sady mahatoky; nahatoky'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Ry mpanompo tsara sady mahatoky, nahatoky tsara, etc'
      marker-yv: yv-n
    - type: text
      text: ' tamin''ny kely ianao, dia hotendreko ho mpanapaka ny be; midìra amin''ny fifalian''ny tomponao. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nony nanatona kosa ilay nandray ny talenta iray, dia nilaza hoe: Tompoko, fantatro fa olona mila voatsiary ianao, mijinja eny amin''izay tsy namafazanao, ary manangona eny amin''izay tsy nanahafanao; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia natahotra aho ka lasa nandevina ny talentanao tao anatin''ny tany; indry, lasanao ny anao. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny tompony namaly ka nanao taminy hoe: Ry mpanompo ratsy sady malaina, efa fantatrao fa mijinja eny amin''izay tsy namafazako aho, ary manangona eny amin''izay tsy nanahafako; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa tokony ho nampanàna ny volako tamin''ny mpanana vola ianao, ka raha tonga aho, dia ho nandray ny ahy mban-janany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa alao aminy ny talenta, dia omeo ilay manana ny talenta folo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izay rehetra manana dia homena, ka hanam-be izy; fa izay tsy manana kosa, na dia izay ananany aza dia halaina aminy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny adala nandray ny fanalany
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fanilony'
      marker-yv: yv-n
    - type: text
      text: ', nefa tsy nitondra solika fitaiza; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ario ho any amin''ny maizina any ivelany ny mpanompo tsy mahasoa; any no hisy ny fitomaniana sy ny fikitroha-nify. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha tonga ny Zanak''olona amin''ny voninahiny, arahin''ny anjely rehetra, dia hipetraka eo ambonin''ny seza fiandrianan''ny voninahiny Izy; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ny firenena rehetra hangonina eo anatrehany, dia hanavaka azy, tahaka ny mpiandry ondry manavaka ny ondry amin'ny osy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Gr: zanak''osy'
      marker-yv: yv-n
    - type: text
      text: '; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary hametraka ny ondry eo amin'ny ankavanany Izy, fa ny osy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Gr: zanak''osy'
      marker-yv: yv-n
    - type: text
      text: ' eo amin''ny ankaviany. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin''izany ny Mpanjaka dia hilaza amin''izay eo amin''ny ankavanany hoe: Avia ianareo izay notahin''ny Raiko, mandovà ny fanjakana izay voavoatra ho anareo hatrizay nanorenana izao tontolo izao; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa noana Aho, dia nomenareo hanina; nangetaheta Aho dia nampisotroinareo; nivahiny Aho, dia nampiantranoinareo; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tsy nanan-kitafy Aho, dia notafianareo; narary Aho, dia notsaboinareo; tao an-tranomaizina Aho, dia novangianareo. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia hamaly Azy ny marina ka hanao hoe: Tompoko, oviana no hitanay noana Hianao ka nomenay hanina, na nangetaheta ka nampisotroinay? '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary oviana no hitanay nivahiny Hianao ka nampiantranoinay, na tsy nanan-kitafy ka notafianay? '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary oviana no hitanay narary Hianao, na tao an-tranomaizina, ka novangianay? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ny hendry kosa nitondra solika tao anatin'ny fitondrany sy ny fanalany
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fanilony'
      marker-yv: yv-n
    - type: text
      text: '. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hamaly ny Mpanjaka ka hanao aminy hoe: Lazaiko aminareo marina tokoa: Araka izay efa nataonareo tamin''ny anankiray amin''ireto rahalahiko kely indrindra ireto no nataonareo tamiko. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia hilaza indray amin''izay eo amin''ny ankaviany kosa Izy hoe: Mialà amiko, ianareo izay voaozona, ho any amin''ny afo maharitra mandrakizay, izay voavoatra ho an''ny devoly sy ny anjeliny; '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa noana Aho, fa tsy mba nomenareo hanina; nangetaheta Aho, fa tsy mba nampisotroinareo; '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nivahiny Aho, fa tsy mba nampiantranoinareo; tsy nanan-kitafy Aho, fa tsy mba notafianareo; narary sy tao an-tranomaizina Aho, fa tsy mba novangianareo. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia hamaly kosa ireo hoe: Tompoko, oviana no hitanay noana Hianao, na nangetaheta, na nivahiny, na tsy nanan-kitafy, na narary, na tao an-tranomaizina, ka tsy mba nanompo Anao izahay? '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hamaly azy Izy ka hanao hoe: Lazaiko aminareo marina tokoa: Araka izay tsy nataonareo tamin''ny anankiray amin''ireto kely indrindra ireto no tsy mba nataonareo tamiko. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ireo dia hiala ho any amin'ny fampijaliana mandrakizay; fa ny marina ho any amin'ny fiainana mandrakizay.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha naharitra ela ny mpampakatra, dia samy rendrehana avy izy rehetra, ka dia natory. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony mamatonalina, dia nisy antso hoe: Indro ny mpampakatra! Mivoaha mba hitsena azy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nitsangana ireo virijina ireo, ka samy namboatra ny fanalany
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fanilony'
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny adala tamin''ny hendry: Mba omeo kely amin''ny solikareo izahay; fa efa ho faty ny fanalanay'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fanilonay'
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny hendry namaly ka nanao hoe: Sao tsy ampy ho anay sy ho anareo, fa mandehana mankany amin''ny mpivarotra ianareo, ka mividiana ho anareo. '
