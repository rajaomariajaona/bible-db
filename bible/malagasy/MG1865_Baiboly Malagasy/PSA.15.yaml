document_id: PSA.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny toetry ny olona izay mahazo monina ao amin'Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Salamo nataon'i Davida. Jehovah ô, iza no hitoetra ao amin'ny tabernakelinao? iza no honina ao an-tendrombohitrao masina?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izay mandeha tsy misy tsiny ary manao izay mahitsy, sady misaintsaina ny marina ny fony; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tsy manendrikendrika amin''ny lelany, sady tsy manisy ratsy ny sakaizany, ary tsy manao izay hahafa-baraka ny namany, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy manaja ny ratsy fanahy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Heb: Ny lavina. Na: Izay mietry sy maniva tena'
    marker-yv: yv-n
  - type: text
    text: ', fa manome voninahitra ny matahotra an''i Jehovah; tsy mivadika amin''ny fianianany, na dia maningotra ny tenany aza, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Sady tsy mampihana ny volany, na mandray kolikoly hanameloka ny marina, izay mitandrina izany dia tsy mba hangozohozo mandrakizay.
