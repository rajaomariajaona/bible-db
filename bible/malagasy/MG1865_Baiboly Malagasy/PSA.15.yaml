document_id: PSA.15,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny toetry ny olona izay mahazo monina ao amin'Andriamanitra
  - type: text
    content: Salamo nataon'i Davida. Jehovah ô, iza no hitoetra ao amin'ny tabernakelinao? iza no honina ao an-tendrombohitrao masina?
  '2':
  - type: text
    content: 'Izay mandeha tsy misy tsiny ary manao izay mahitsy, sady misaintsaina ny marina ny fony; '
  '3':
  - type: text
    content: 'Tsy manendrikendrika amin''ny lelany, sady tsy manisy ratsy ny sakaizany, ary tsy manao izay hahafa-baraka ny namany, '
  '4':
  - type: text
    content: Tsy manaja ny ratsy fanahy
  - type: note
    content: 'Heb: Ny lavina. Na: Izay mietry sy maniva tena'
  - type: text
    content: ', fa manome voninahitra ny matahotra an''i Jehovah; tsy mivadika amin''ny fianianany, na dia maningotra ny tenany aza, '
  '5':
  - type: text
    content: Sady tsy mampihana ny volany, na mandray kolikoly hanameloka ny marina, izay mitandrina izany dia tsy mba hangozohozo mandrakizay.
