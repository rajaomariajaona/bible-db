document_id: PSA.119
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: SINA
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Sambatra ny mahitsy lalana,Izay mandeha araka ny lalàn''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sambatra izay mitandrina ny teni-vavolombelony Ka mitady Azy amin''ny fo rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Eny, Izay tsy manao ratsy. Fa mandeha araka ny lalany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hianao namoaka ny didinao Mba hotandremana tsara. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Enga anie ka ho tafatoetra ny lalako Hitandremako ny didinao! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia tsy ho menatra aho, Raha mandinika ny didinao rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hidera Anao amin''ny hitsim-po aho Amin''ny ianarako ny fitsipikao marina. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny didinao no hotandremako; Aza dia mahafoy ahy Hianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Inona no hiarovan''ny zatovo ny lalan-kalehany tsy ho voaloto? Ny fitandremana araka ny teninao. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tamin''ny foko rehetra no nitadiavako Anao; Aza avela hivily hiala amin''ny didinao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ato am-poko no iraketako ny teninao, Mba tsy hanotako aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Isaorana anie Hianao, Jehovah ô; Ampianaro ahy ny didinao. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny molotro no nentiko nilaza Ny fitsipika rehetra naloaky ny vavanao. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny lalan''ny teni-vavolombelonao no ifaliako, Tahaka ny ifaliako amin''ny harena rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny didinao no hosaintsainiko, Ary hodinihiko ny lalanao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny didinao no hiravoravoako: Tsy hohadinoiko ny teninao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Asio soa aho mpanomponao, mba ho velona Ka hitandrina ny teninao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ampahirato ny masoko, mba hahitako Zava-mahagaga ao amin''ny lalànao. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Vahiny etỳ an-tany aho; Aza afeninao ahy ny didinao. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Torotoro ny fanahiko noho ny faniriany Ny fitsipikao mandrakariva. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Voateninao mafy ny mpirehareha, dia ny olom-boaozona, Izay mania miala amin''ny didinao. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Esory amiko ny fahafaham-baraka sy ny fanamavoana: Fa efa nitandrina ny teni-vavolombelonao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Na dia ny mpanapaka aza dia mipetraka, ka iokoany aho; Izaho mpanomponao misaintsaina ny didinao. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny teni-vavolombelonao koa no firavoravoako, Eny, mpanolo-tsaina ahy izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Miraikitra amin''ny vovoka ny fanahiko; Velomy aho araka ny teninao. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny lalako no nolazaiko, ary namaly ahy Hianao: Ampianaro ahy ny didinao. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ampahalalao ahy ny lalan''ny didinao; Dia hoheveriko ny fahagagana nataonao. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mipotrapotra-dranomaso aho noho ny alaheloko; Ampaherezo aho araka ny teninao. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ny lalan''ny lainga no esory amiko: Ary ny lalànao no anasoavy ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny lalàn''ny fahamarinanao no fidiko; Apetrako eo anatrehako ny fitsipikao. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Mifikitra amin''ny teni-vavolombelonao aho; Jehovah ô, aza avela ho azon-kenatra aho; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ny lalan'ny didinao no ihazakazahako, Fa
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Raha'
    marker-yv: yv-n
  - type: text
    text: ' ampahalalahinao ny foko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Jehovah ô, toroy ny lalan''ny didinao aho; Dia hotandremako hatramin''ny farany izany. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Omeo fahalalana aho mba hitandrina ny lalànao; Eny, hitandrina azy amin''ny foko rehetra aho. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ampandehano amin''ny lalan''ny didinao aho; Fa izany no sitrako. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Amporisiho ny foko ho amin''ny teni-vavolombelonao, Fa tsy ho amin''ny fieremana. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Avilio ny masoko tsy hijery zava-poana; Velomy amin''ny lalanao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Tovy ny teninao amin'ny mpanomponao, Izay matahotra Anao indrindra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Tovy amin'ny mpanomponao ny teninao, Izay mahatonga ny fahatahorana Anao
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Esory ny fahafaham-baraka. izay atahorako; Fa tsara ny fitsipikao. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Indro, manina ny didinao aho, Velomy amin'ny fahamarinanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Aoka ho tonga amiko ny famindram-ponao, Jehovah ô, Dia ny famonjenao, araka ny teninao. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Dia hamaly izay miteny ratsy ahy aho, Satria matoky ny teninao. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ary aza dia esorina amin''ny vavako ny teny marina; Fa miandry ny fitsaranao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Dia hitandrina ny lalinao mandrakariva aho, Dia mandrakizay doria. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary handeha amin''ny malalaka aho; Fa ny didinao no tadiaviko. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Hilaza ny teni-vavolombelonao eo anatrehan''ireo mpanjaka aho Ka tsy ho menatra. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary hiravoravo amin''ny didinao aho Satria tiako ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Hasandratro ny tanako ho amin''ny didinao satria tiako ireny: Hosaintsainiko ny didinao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Tsarovy ny teny natao tamiko mpanomponao Izay nampanantenanao ahy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Satria nampanantenainao aho'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Izao no mampionona ahy amin''ny fahoriako; Ny teninao no mamelona ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Ny mpirehareha maniratsira ahy: Tsy mba mivily miala amin''ny lalànao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Mahatsiaro ny fitsipikao izay hatramin''ny taloha aho, Jehovah ô, Dia mionona aho. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Fahatezerana mirehitra no nahazo ahy Noho ny amin''ny ratsy fanahy izay mahafoy ny lalànao. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Ny didinao no ataoko an-kira Ao amin''ny trano fivahiniako. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Mahatsiaro ny anaranao nony alina aho, Jehovah ô, Ka mitandrina ny lalànao. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Izao no ahy: Mitandrina ny didinao aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Anjarako Jehovah; Minia mitandrina ny teninao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Mifona aminao amin''ny foko rehetra aho: Mamindrà fo amiko araka ny teninao. '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Mihevitra ny lalako aho Ka mamerina ny tongotro ho amin''ny teni-vavolombelonao. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Mandeha faingana aho ka tsy mitaredretra, Amin''ny fitandremana ny didinao. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Nihodidina tamiko ny famato-ran''ny ratsy fanahy; Tsy mba nanadino ny lalànao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Mamatonalina no hifohazako hidera Anao Noho ny fitsipikao marina. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Naman''izay rehetra matahotra Anao aho Sy naman''izay mitandrina ny didinao. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: Jehovah ô, henika ny famindram-ponao ny tany; Ampianaro ahy ny didinao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Jehovah ô, efa nasianao soa ny mpanomponao, Araka ny teninao. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Ampianaro fahafantarana tsara sy fahalalana aho, Fa matoky ny didinao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Fony tsy mbola azom-pahoriana aho, dia naniasia; Fa ankehitriny dia mitandrina ny teninao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'Sady tsara Hianao no Mpanao ny tsara; Ampianaro ahy ny didinao. '
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: 'Namoron-dainga hamelezana ahy ny mpirehareha; Amin''ny foko rehetra no itandremako ny didinao. '
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'Matavy tahaka ny menaka ny fony; Fa izaho kosa, dia ny lalànao no iravoravoako. '
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: 'Soa ihany aho nampahorina, Mba hianarako ny didinao. '
  - type: usfm
    marker: v
    metadata:
      v: '72'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: Ny lalàn'ny vavanao no mahatsara ahy Mihoatra noho ny volamena sy ny volafotsy tsy omby arivo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '73'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: 'Ny tananao nanao ahy sy namboatra ahy; Ampianaro aho, mba hianarako ny didinao. '
  - type: usfm
    marker: v
    metadata:
      v: '74'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: 'Izay matahotra Anao hahita ahy ka ho faly; Fa ny teninao no andrasako. '
  - type: usfm
    marker: v
    metadata:
      v: '75'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: 'Fantatro, Jehovah ô, fa marina ny fitsaranao. Ary ny fahamarinanao no nampahorianao ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '76'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '76'
  - type: text
    text: 'Ny famindram-ponao anie no hampiononana ahy Araka ny teninao tamin''ny mpanomponao. '
  - type: usfm
    marker: v
    metadata:
      v: '77'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '77'
  - type: text
    text: 'Aoka ho tonga amiko ny fiantranao, mba ho velona aho; Fa ny lalànao no firavoravoako. '
  - type: usfm
    marker: v
    metadata:
      v: '78'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '78'
  - type: text
    text: Aoka ho menatra ny mpirehareha, fa nampahory ahy tsy ahoan-tsy ahoana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: nanoloky ahy tamin''ny lainga'
    marker-yv: yv-n
  - type: text
    text: ' izy; Izaho hisaintsaina ny didinao. '
  - type: usfm
    marker: v
    metadata:
      v: '79'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '79'
  - type: text
    text: 'Aoka hiverina amiko izay matahotra Anao Sy izay mahalala ny teni-vavolombelonao. '
  - type: usfm
    marker: v
    metadata:
      v: '80'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '80'
  - type: text
    text: Aoka ho marina tsara ny foko amin'ny fitanana ny didinao, Mba tsy ho menatra aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '81'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '81'
  - type: text
    text: 'Ritra ny aiko, satria manina ny famonjenao aho; Ny teninao no andrasako. '
  - type: usfm
    marker: v
    metadata:
      v: '82'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '82'
  - type: text
    text: 'Pahina ny masoko miandry ny teninao, Ka hoy izaho: Rahoviana no hampionona ahy Hianao? '
  - type: usfm
    marker: v
    metadata:
      v: '83'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '83'
  - type: text
    text: 'Fa tahaka ny siny hoditra ao amin''ny setroka aho. Nefa ny didinao tsy mba hadinoiko. '
  - type: usfm
    marker: v
    metadata:
      v: '84'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '84'
  - type: text
    text: 'Hoatrinona no andron''ny mpanomponao? Rahoviana no hanao fitsarana amin''izay manenjika ahy Hianao? '
  - type: usfm
    marker: v
    metadata:
      v: '85'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '85'
  - type: text
    text: 'Efa nanao longoa hianjerako ny mpirehareha, Dia izay tsy manaraka ny lalànao. '
  - type: usfm
    marker: v
    metadata:
      v: '86'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '86'
  - type: text
    text: 'Marina ny didinao rehetra; Manenjika ahy tsy ahoan-tsy ahoana ireny; vonjeo aho. '
  - type: usfm
    marker: v
    metadata:
      v: '87'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '87'
  - type: text
    text: 'Saiky laniny teo amin''ny tany aho, Kanefa tsy mba mahafoy ny didinao. '
  - type: usfm
    marker: v
    metadata:
      v: '88'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '88'
  - type: text
    text: Velomy aho araka ny famindram-ponao; Dia hitandrina ny teni-vavolombelona naloaky ny vavanao aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '89'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '89'
  - type: text
    text: 'Ho mandrakizay, Jehovah ô, No nanorenanao any an-danitra ny teninao. '
  - type: usfm
    marker: v
    metadata:
      v: '90'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '90'
  - type: text
    text: 'Hihatra amin''ny taranaka fara-mandimby ny fahamarinanao; Efa nampitoetra ny tany Hianao, ka, indro, mitoetra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '91'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '91'
  - type: text
    text: Hanefa ny fitsaranao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Araka ny nanendrenao azy'
    marker-yv: yv-n
  - type: text
    text: ' no itoerany mandraka androany; Fa mpanomponao ny zavatra rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '92'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '92'
  - type: text
    text: 'Raha tsy ny lalànao no niravoravoako, Dia maty tamin''ny fahoriako aho. '
  - type: usfm
    marker: v
    metadata:
      v: '93'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '93'
  - type: text
    text: 'Tsy hohadinoiko mandrakizay ny didinao; Fa ireny no amelomanao ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '94'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '94'
  - type: text
    text: 'Anao aho, vonjeo aho; Fa ny didinao no tadiaviko. '
  - type: usfm
    marker: v
    metadata:
      v: '95'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '95'
  - type: text
    text: 'Miandry ahy ny ratsy fanahy mba hahafaty ahy; Mandinika ny teni-vavolombelonao aho '
  - type: usfm
    marker: v
    metadata:
      v: '96'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '96'
  - type: text
    text: Efa hitako fa manam-pahataperana avokoa ny tanteraka rehetra; Malalaka indrindra ny didinao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '97'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '97'
  - type: text
    text: 'Endrey ny fitiavako ny lalànao! Fisaintsainako mandrakariva izany. '
  - type: usfm
    marker: v
    metadata:
      v: '98'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '98'
  - type: text
    text: 'Ny didinao mampahahendry ahy mihoatra noho ny fahavaloko, Satria ato amiko mandrakizay ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '99'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '99'
  - type: text
    text: 'Hendry noho ny mpampianatra ahy rehetra aho, Satria ny teni-vavolombelonao no fisaintsainako. '
  - type: usfm
    marker: v
    metadata:
      v: '100'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '100'
  - type: text
    text: 'Hendry noho ny anti-panahy aho, Satria ny didinao no notandremako. '
  - type: usfm
    marker: v
    metadata:
      v: '101'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '101'
  - type: text
    text: 'Efa narovako ny tongotro tsy ho amin''izay lalàn-dratsy, Mba hitandremako ny teninao. '
  - type: usfm
    marker: v
    metadata:
      v: '102'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '102'
  - type: text
    text: 'Tsy mba miala amin''ny fitsipikao aho; Fa Hianao no mampianatra ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '103'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '103'
  - type: text
    text: 'Endrey ny hamamin''ny teninao, raha andramako! Mihoatra noho ny tantely ato am-bavako aza! '
  - type: usfm
    marker: v
    metadata:
      v: '104'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '104'
  - type: text
    text: Ny didinao no nahazoako fahalalana; Izany no ankahalako ny lalam-pitaka rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '105'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '105'
  - type: text
    text: 'Fanilon''ny tongotro Sy fanazavana ny lalako ny teninao. '
  - type: usfm
    marker: v
    metadata:
      v: '106'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '106'
  - type: text
    text: 'Efa nianiana aho fa hitandrina ny fitsipikao marina, Ka nefaiko izany. '
  - type: usfm
    marker: v
    metadata:
      v: '107'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '107'
  - type: text
    text: 'Ampahorina indrindra aho; Jehovah ô, velomy aho araka ny teninao. '
  - type: usfm
    marker: v
    metadata:
      v: '108'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '108'
  - type: text
    text: 'Jehovah ô, aoka anie mba hankasitrahanao ny fanati-tsitrapo aloaky ny vavako, Ary ampianaro ahy ny fitsipikao. '
  - type: usfm
    marker: v
    metadata:
      v: '109'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '109'
  - type: text
    text: An-tenda
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. An-tanako
    marker-yv: yv-n
  - type: text
    text: ' ihany ny aiko mandrakariva; Kanefa tsy manadino ny lalànao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '110'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '110'
  - type: text
    text: 'Ny ratsy fanahy mamela-pandrika haningotra ahy; Kanefa tsy mania miala amin''ny didinao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '111'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '111'
  - type: text
    text: 'Efa noraisiko ho lovako mandrakizay ny teni-vavolombelonao, Satria fifalian''ny foko izany. '
  - type: usfm
    marker: v
    metadata:
      v: '112'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '112'
  - type: text
    text: Apetrako ny foko hankatò ny didinao Mandrakizay hatramin'ny farany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '113'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '113'
  - type: text
    text: 'Halako ny mpiroa saina; Fa ny lalànao no tiako. '
  - type: usfm
    marker: v
    metadata:
      v: '114'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '114'
  - type: text
    text: 'Fiereko sy ampingako Hianao; Ny teninao no andrasako. '
  - type: usfm
    marker: v
    metadata:
      v: '115'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '115'
  - type: text
    text: 'Mialà amiko ianareo mpanao ratsy, Mba hitandremako ny didin''Andriamanitro. '
  - type: usfm
    marker: v
    metadata:
      v: '116'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '116'
  - type: text
    text: 'Tohàny aho araka ny teninao, mba ho velona, Ary aoka tsy ho menatra amin''ny fanantenako aho. '
  - type: usfm
    marker: v
    metadata:
      v: '117'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '117'
  - type: text
    text: 'Tohàny aho mba ho voavonjy, Ka ho faly hijery ny didinao mandrakariva. '
  - type: usfm
    marker: v
    metadata:
      v: '118'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '118'
  - type: text
    text: 'Ataonao tsinontsinona izay rehetra mania amin''ny didinao; Fa famitahan-tena ihany ny laingany. '
  - type: usfm
    marker: v
    metadata:
      v: '119'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '119'
  - type: text
    text: 'Efa nataonao fanary tain-drendrika ny ratsy fanahy rehetra amin''ny tany; Izany no itiavako ny teni-vavolombelonao. '
  - type: usfm
    marker: v
    metadata:
      v: '120'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '120'
  - type: text
    text: Mipararetra ny nofoko ny fahatahorana Anao, Ary matahotra ny fitsaranao aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '121'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '121'
  - type: text
    text: 'Manaraka ny fitsipika sy ny fahamarinana aho; Aza manolotra ahy ho amin''ny mpampahory ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '122'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '122'
  - type: text
    text: 'Iantohy mba ho soa ny mpanomponao; Aza avela hampahory ahy ny mpirehareha. '
  - type: usfm
    marker: v
    metadata:
      v: '123'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '123'
  - type: text
    text: 'Pahina ny masoko miandry ny famonjenao. Sy ny tenin''ny fahamarinanao. '
  - type: usfm
    marker: v
    metadata:
      v: '124'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '124'
  - type: text
    text: 'Ataovy amin''ny mpanomponao araka ny famindram-ponao; Ary ampianaro ahy ny didinao. '
  - type: usfm
    marker: v
    metadata:
      v: '125'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '125'
  - type: text
    text: 'Mpanomponao aho, ka ampianaro, Mba ho fantatro ny teni-vavolombelonao. '
  - type: usfm
    marker: v
    metadata:
      v: '126'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '126'
  - type: text
    text: Efa andro tokony hampisehoan'i Jehovah ny heriny
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hiasan'i Jehovah
    marker-yv: yv-n
  - type: text
    text: ' izao; Fa nandika ny lalànao ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '127'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '127'
  - type: text
    text: 'Izany no itiavako ny didinao mihoatra noho ny volamena, Eny, noho ny tena volamena aza. '
  - type: usfm
    marker: v
    metadata:
      v: '128'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '128'
  - type: text
    text: Izany no iheverako ny didy rehetra ho marina avokoa; Halako ny lalam-pitaka rehetra;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '129'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '129'
  - type: text
    text: 'Mahagaga ny teni-vavolombelonao, Ka dia mitandrina azy ny fanahiko. '
  - type: usfm
    marker: v
    metadata:
      v: '130'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '130'
  - type: text
    text: 'Mahazava ny famoahana ny hevitry ny teninao Ka manome fahalalana ho an''ny kely saina. '
  - type: usfm
    marker: v
    metadata:
      v: '131'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '131'
  - type: text
    text: 'Mitanatana vava aho ka mihanahana, Fa ny didinao no iriko. '
  - type: usfm
    marker: v
    metadata:
      v: '132'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '132'
  - type: text
    text: 'Todiho aho, ka mamindrà fo amiko, Araka ny tokony ho anjaran''izay tia ny anaranao. '
  - type: usfm
    marker: v
    metadata:
      v: '133'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '133'
  - type: text
    text: 'Ampitoero eo amin''ny teninao ny diako; Ary aza avela hanapaka ahy izay mety ho faharatsiana. '
  - type: usfm
    marker: v
    metadata:
      v: '134'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '134'
  - type: text
    text: 'Vonjeo amin''ny fampahorian''ny olona Dia hitandrina ny didinao. '
  - type: usfm
    marker: v
    metadata:
      v: '135'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '135'
  - type: text
    text: 'Ampamirapirato amin''ny mpanomponao ny tavanao; Ary ampianaro ahy ny didinao. '
  - type: usfm
    marker: v
    metadata:
      v: '136'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '136'
  - type: text
    text: Rano mandriaka no mijononoka amin'ny masoko Noho ny tsi-fitandreman'ny olona ny lalànao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '137'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '137'
  - type: text
    text: 'Marina Hianao, Jehovah ô, Ary mahitsy ny fitsipikao. '
  - type: usfm
    marker: v
    metadata:
      v: '138'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '138'
  - type: text
    text: 'Efa voadidinao amin''ny fahamarinana Sy ny fahatokiana indrindra ny teni-vavolombelonao. '
  - type: usfm
    marker: v
    metadata:
      v: '139'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '139'
  - type: text
    text: 'Efa maharitra aina ahy ny fahasaro-piaroko, Satria nanadino ny teninao ny mpandrafy ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '140'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '140'
  - type: text
    text: 'Voazaha toetra tamin''ny memy ny teninao, Ka dia tian''ny mpanomponao. '
  - type: usfm
    marker: v
    metadata:
      v: '141'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '141'
  - type: text
    text: 'Kely aho ka natao ho tsinontsinona; Nefa tsy hadinoiko ny didinao. '
  - type: usfm
    marker: v
    metadata:
      v: '142'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '142'
  - type: text
    text: 'Ny fahamarinanao dia fahamarinana mandrakizay, Ary marina ny lalànao. '
  - type: usfm
    marker: v
    metadata:
      v: '143'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '143'
  - type: text
    text: 'Fahoriana sy fahaterena no nahazo ahy; Ny didinao no firavoravoako. '
  - type: usfm
    marker: v
    metadata:
      v: '144'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '144'
  - type: text
    text: Ny fahamarinan'ny teni-vavolombelonao dia mandrakizay; Ampianaro aho, mba ho velona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '145'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '145'
  - type: text
    text: 'Ny foko rehetra no nentiko nitaraina hoe: Valio aho, Jehovah ô; Ny didinao no hotandremako; '
  - type: usfm
    marker: v
    metadata:
      v: '146'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '146'
  - type: text
    text: 'Nitaraina taminao aho nanao hoe Vonjeo aho, Dia hitandrina ny didinao. '
  - type: usfm
    marker: v
    metadata:
      v: '147'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '147'
  - type: text
    text: 'Raha mbola tsy nazavaratsy aza ny andro, dia nitaraina aho; Ny teninao no andrasako. '
  - type: usfm
    marker: v
    metadata:
      v: '148'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '148'
  - type: text
    text: 'Nialoha ny fiambenana amin''ny alina ny masoko, Mba hisaintsainako ny teninao. '
  - type: usfm
    marker: v
    metadata:
      v: '149'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '149'
  - type: text
    text: 'Henoy ny feoko araka ny famindram-ponao, Jehovah ô, Velomy aho araka ny fitsipikao. '
  - type: usfm
    marker: v
    metadata:
      v: '150'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '150'
  - type: text
    text: 'Efa mby akaiky izay fatra-panaraka ny ratsy, Dia izay manalavitra ny lalànao. '
  - type: usfm
    marker: v
    metadata:
      v: '151'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '151'
  - type: text
    text: 'Akaiky Hianao, Jehovah ô; Ary marina ny didinao rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '152'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '152'
  - type: text
    text: Efa fantatro ela tamin'ny teni-vavolombelonao Fa nampitoerinao ho mandrakizay ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '153'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '153'
  - type: text
    text: 'Jereo ny fahoriako, ka vonjeo aho; Fa ny lalànao tsy mba hadinoiko. '
  - type: usfm
    marker: v
    metadata:
      v: '154'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '154'
  - type: text
    text: 'Soloy vava aho, ka vonjeo; Velomy aho araka ny teninao. '
  - type: usfm
    marker: v
    metadata:
      v: '155'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '155'
  - type: text
    text: 'Lavitra ny ratsy fanahy ny famonjena, Satria ny didinao tsy tadiaviny. '
  - type: usfm
    marker: v
    metadata:
      v: '156'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '156'
  - type: text
    text: 'Lehibe ny antranao, Jehovah ô; Velomy aho araka ny fitsipikao. '
  - type: usfm
    marker: v
    metadata:
      v: '157'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '157'
  - type: text
    text: 'Maro ny mpanenjika sy mpandrafy ahy; Tsy mba niala tamin''ny teni-vavolombelonao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '158'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '158'
  - type: text
    text: 'Mijery ny mpivadika aho, ka maharikoriko ahy ireny, Dia izay tsy nitandrina ny teninao. '
  - type: usfm
    marker: v
    metadata:
      v: '159'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '159'
  - type: text
    text: 'He ny fitiavako ny didinao! Jehovah ô, velomy aho araka ny famindram-ponao. '
  - type: usfm
    marker: v
    metadata:
      v: '160'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '160'
  - type: text
    text: Fahamarinana no tontalin-kevitry ny teninao; Ary mandrakizay ny fitsipikao marina rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '161'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '161'
  - type: text
    text: 'Na dia ny mpanapaka aza dia nanenjika ahy tsy ahoan-tsy ahoana; Nefa ny teninao no atahoran''ny foko. '
  - type: usfm
    marker: v
    metadata:
      v: '162'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '162'
  - type: text
    text: 'Faly aho noho ny teninao Tahaka ny mahazo babo be. '
  - type: usfm
    marker: v
    metadata:
      v: '163'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '163'
  - type: text
    text: 'Halako ny lainga ka ataoko ho fahavetavetana; Ny lalànao no tiako. '
  - type: usfm
    marker: v
    metadata:
      v: '164'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '164'
  - type: text
    text: 'Impito isan''andro no iderako Anao Noho ny fitsipikao marina. '
  - type: usfm
    marker: v
    metadata:
      v: '165'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '165'
  - type: text
    text: 'Be fiadanana izay tia ny lalànao, Ary tsy misy mahatafintohina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '166'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '166'
  - type: text
    text: 'Miandry ny famonjenao aho, Jehovah ô, Ka mankatò ny didinao. '
  - type: usfm
    marker: v
    metadata:
      v: '167'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '167'
  - type: text
    text: 'Mitandrina ny teni-vavolombelonao ny fanahiko, Ka tiako indrindra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '168'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '168'
  - type: text
    text: Mitandrina ny didinao sy ny teni-vavolombelonao aho; Fa ny lalan-kalehako rehetra dia eo anatrehanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '169'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '169'
  - type: text
    text: 'Aoka anie ho tonga eo anatrehanao ny fitarainako, Jehovah ô; Ampianaro aho araka ny teninao. '
  - type: usfm
    marker: v
    metadata:
      v: '170'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '170'
  - type: text
    text: 'Aoka anie ho tonga eo anatrehanao ny fifonako; Vonjeo aho araka ny teninao. '
  - type: usfm
    marker: v
    metadata:
      v: '171'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '171'
  - type: text
    text: 'Aoka hiboiboika fiderana ny molotro, Fa ampianarinao ahy ny didinao. '
  - type: usfm
    marker: v
    metadata:
      v: '172'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '172'
  - type: text
    text: 'Hihira ny teninao ny lelako, Fa marina ny didinao rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '173'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '173'
  - type: text
    text: 'Aoka anie hamonjy ahy ny tananao; Fa efa nifidy ny didinao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '174'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '174'
  - type: text
    text: 'Efa manina ny famonjenao aho, Jehovah ô; Ary ny lalànao no firavoravoako. '
  - type: usfm
    marker: v
    metadata:
      v: '175'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '175'
  - type: text
    text: 'Aoka anie ho velona ny fanahiko ka hidera Anao; Ary aoka anie hamonjy ahy ny fitsaranao. '
  - type: usfm
    marker: v
    metadata:
      v: '176'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '176'
  - type: text
    text: Efa nania aho; tadiavo ny mpanomponao toy ny fitady ondry very; Fa ny didinao tsy mba hadinoiko.
