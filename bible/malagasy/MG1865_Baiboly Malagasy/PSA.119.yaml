document_id: PSA.119,96
type_code: plt
verses:
  '1':
  - type: heading
    content: SINA
  - type: text
    content: 'Sambatra ny mahitsy lalana,Izay mandeha araka ny lalàn''i Jehovah. '
  '10':
  - type: text
    content: 'Tamin''ny foko rehetra no nitadiavako Anao; Aza avela hivily hiala amin''ny didinao aho. '
  '100':
  - type: text
    content: 'Hendry noho ny anti-panahy aho, Satria ny didinao no notandremako. '
  '101':
  - type: text
    content: 'Efa narovako ny tongotro tsy ho amin''izay lalàn-dratsy, Mba hitandremako ny teninao. '
  '102':
  - type: text
    content: 'Tsy mba miala amin''ny fitsipikao aho; Fa Hianao no mampianatra ahy. '
  '103':
  - type: text
    content: 'Endrey ny hamamin''ny teninao, raha andramako! Mihoatra noho ny tantely ato am-bavako aza! '
  '104':
  - type: text
    content: Ny didinao no nahazoako fahalalana; Izany no ankahalako ny lalam-pitaka rehetra.
  '105':
  - type: text
    content: 'Fanilon''ny tongotro Sy fanazavana ny lalako ny teninao. '
  '106':
  - type: text
    content: 'Efa nianiana aho fa hitandrina ny fitsipikao marina, Ka nefaiko izany. '
  '107':
  - type: text
    content: 'Ampahorina indrindra aho; Jehovah ô, velomy aho araka ny teninao. '
  '108':
  - type: text
    content: 'Jehovah ô, aoka anie mba hankasitrahanao ny fanati-tsitrapo aloaky ny vavako, Ary ampianaro ahy ny fitsipikao. '
  '109':
  - type: text
    content: An-tenda
  - type: note
    content: Heb. An-tanako
  - type: text
    content: ' ihany ny aiko mandrakariva; Kanefa tsy manadino ny lalànao aho. '
  '11':
  - type: text
    content: 'Ato am-poko no iraketako ny teninao, Mba tsy hanotako aminao. '
  '110':
  - type: text
    content: 'Ny ratsy fanahy mamela-pandrika haningotra ahy; Kanefa tsy mania miala amin''ny didinao aho. '
  '111':
  - type: text
    content: 'Efa noraisiko ho lovako mandrakizay ny teni-vavolombelonao, Satria fifalian''ny foko izany. '
  '112':
  - type: text
    content: Apetrako ny foko hankatò ny didinao Mandrakizay hatramin'ny farany.
  '113':
  - type: text
    content: 'Halako ny mpiroa saina; Fa ny lalànao no tiako. '
  '114':
  - type: text
    content: 'Fiereko sy ampingako Hianao; Ny teninao no andrasako. '
  '115':
  - type: text
    content: 'Mialà amiko ianareo mpanao ratsy, Mba hitandremako ny didin''Andriamanitro. '
  '116':
  - type: text
    content: 'Tohàny aho araka ny teninao, mba ho velona, Ary aoka tsy ho menatra amin''ny fanantenako aho. '
  '117':
  - type: text
    content: 'Tohàny aho mba ho voavonjy, Ka ho faly hijery ny didinao mandrakariva. '
  '118':
  - type: text
    content: 'Ataonao tsinontsinona izay rehetra mania amin''ny didinao; Fa famitahan-tena ihany ny laingany. '
  '119':
  - type: text
    content: 'Efa nataonao fanary tain-drendrika ny ratsy fanahy rehetra amin''ny tany; Izany no itiavako ny teni-vavolombelonao. '
  '12':
  - type: text
    content: 'Isaorana anie Hianao, Jehovah ô; Ampianaro ahy ny didinao. '
  '120':
  - type: text
    content: Mipararetra ny nofoko ny fahatahorana Anao, Ary matahotra ny fitsaranao aho.
  '121':
  - type: text
    content: 'Manaraka ny fitsipika sy ny fahamarinana aho; Aza manolotra ahy ho amin''ny mpampahory ahy. '
  '122':
  - type: text
    content: 'Iantohy mba ho soa ny mpanomponao; Aza avela hampahory ahy ny mpirehareha. '
  '123':
  - type: text
    content: 'Pahina ny masoko miandry ny famonjenao. Sy ny tenin''ny fahamarinanao. '
  '124':
  - type: text
    content: 'Ataovy amin''ny mpanomponao araka ny famindram-ponao; Ary ampianaro ahy ny didinao. '
  '125':
  - type: text
    content: 'Mpanomponao aho, ka ampianaro, Mba ho fantatro ny teni-vavolombelonao. '
  '126':
  - type: text
    content: Efa andro tokony hampisehoan'i Jehovah ny heriny
  - type: note
    content: Heb. hiasan'i Jehovah
  - type: text
    content: ' izao; Fa nandika ny lalànao ny olona. '
  '127':
  - type: text
    content: 'Izany no itiavako ny didinao mihoatra noho ny volamena, Eny, noho ny tena volamena aza. '
  '128':
  - type: text
    content: Izany no iheverako ny didy rehetra ho marina avokoa; Halako ny lalam-pitaka rehetra;
  '129':
  - type: text
    content: 'Mahagaga ny teni-vavolombelonao, Ka dia mitandrina azy ny fanahiko. '
  '13':
  - type: text
    content: 'Ny molotro no nentiko nilaza Ny fitsipika rehetra naloaky ny vavanao. '
  '130':
  - type: text
    content: 'Mahazava ny famoahana ny hevitry ny teninao Ka manome fahalalana ho an''ny kely saina. '
  '131':
  - type: text
    content: 'Mitanatana vava aho ka mihanahana, Fa ny didinao no iriko. '
  '132':
  - type: text
    content: 'Todiho aho, ka mamindrà fo amiko, Araka ny tokony ho anjaran''izay tia ny anaranao. '
  '133':
  - type: text
    content: 'Ampitoero eo amin''ny teninao ny diako; Ary aza avela hanapaka ahy izay mety ho faharatsiana. '
  '134':
  - type: text
    content: 'Vonjeo amin''ny fampahorian''ny olona Dia hitandrina ny didinao. '
  '135':
  - type: text
    content: 'Ampamirapirato amin''ny mpanomponao ny tavanao; Ary ampianaro ahy ny didinao. '
  '136':
  - type: text
    content: Rano mandriaka no mijononoka amin'ny masoko Noho ny tsi-fitandreman'ny olona ny lalànao.
  '137':
  - type: text
    content: 'Marina Hianao, Jehovah ô, Ary mahitsy ny fitsipikao. '
  '138':
  - type: text
    content: 'Efa voadidinao amin''ny fahamarinana Sy ny fahatokiana indrindra ny teni-vavolombelonao. '
  '139':
  - type: text
    content: 'Efa maharitra aina ahy ny fahasaro-piaroko, Satria nanadino ny teninao ny mpandrafy ahy. '
  '14':
  - type: text
    content: 'Ny lalan''ny teni-vavolombelonao no ifaliako, Tahaka ny ifaliako amin''ny harena rehetra. '
  '140':
  - type: text
    content: 'Voazaha toetra tamin''ny memy ny teninao, Ka dia tian''ny mpanomponao. '
  '141':
  - type: text
    content: 'Kely aho ka natao ho tsinontsinona; Nefa tsy hadinoiko ny didinao. '
  '142':
  - type: text
    content: 'Ny fahamarinanao dia fahamarinana mandrakizay, Ary marina ny lalànao. '
  '143':
  - type: text
    content: 'Fahoriana sy fahaterena no nahazo ahy; Ny didinao no firavoravoako. '
  '144':
  - type: text
    content: Ny fahamarinan'ny teni-vavolombelonao dia mandrakizay; Ampianaro aho, mba ho velona.
  '145':
  - type: text
    content: 'Ny foko rehetra no nentiko nitaraina hoe: Valio aho, Jehovah ô; Ny didinao no hotandremako; '
  '146':
  - type: text
    content: 'Nitaraina taminao aho nanao hoe Vonjeo aho, Dia hitandrina ny didinao. '
  '147':
  - type: text
    content: 'Raha mbola tsy nazavaratsy aza ny andro, dia nitaraina aho; Ny teninao no andrasako. '
  '148':
  - type: text
    content: 'Nialoha ny fiambenana amin''ny alina ny masoko, Mba hisaintsainako ny teninao. '
  '149':
  - type: text
    content: 'Henoy ny feoko araka ny famindram-ponao, Jehovah ô, Velomy aho araka ny fitsipikao. '
  '15':
  - type: text
    content: 'Ny didinao no hosaintsainiko, Ary hodinihiko ny lalanao. '
  '150':
  - type: text
    content: 'Efa mby akaiky izay fatra-panaraka ny ratsy, Dia izay manalavitra ny lalànao. '
  '151':
  - type: text
    content: 'Akaiky Hianao, Jehovah ô; Ary marina ny didinao rehetra. '
  '152':
  - type: text
    content: Efa fantatro ela tamin'ny teni-vavolombelonao Fa nampitoerinao ho mandrakizay ireny.
  '153':
  - type: text
    content: 'Jereo ny fahoriako, ka vonjeo aho; Fa ny lalànao tsy mba hadinoiko. '
  '154':
  - type: text
    content: 'Soloy vava aho, ka vonjeo; Velomy aho araka ny teninao. '
  '155':
  - type: text
    content: 'Lavitra ny ratsy fanahy ny famonjena, Satria ny didinao tsy tadiaviny. '
  '156':
  - type: text
    content: 'Lehibe ny antranao, Jehovah ô; Velomy aho araka ny fitsipikao. '
  '157':
  - type: text
    content: 'Maro ny mpanenjika sy mpandrafy ahy; Tsy mba niala tamin''ny teni-vavolombelonao aho. '
  '158':
  - type: text
    content: 'Mijery ny mpivadika aho, ka maharikoriko ahy ireny, Dia izay tsy nitandrina ny teninao. '
  '159':
  - type: text
    content: 'He ny fitiavako ny didinao! Jehovah ô, velomy aho araka ny famindram-ponao. '
  '16':
  - type: text
    content: 'Ny didinao no hiravoravoako: Tsy hohadinoiko ny teninao.'
  '160':
  - type: text
    content: Fahamarinana no tontalin-kevitry ny teninao; Ary mandrakizay ny fitsipikao marina rehetra.
  '161':
  - type: text
    content: 'Na dia ny mpanapaka aza dia nanenjika ahy tsy ahoan-tsy ahoana; Nefa ny teninao no atahoran''ny foko. '
  '162':
  - type: text
    content: 'Faly aho noho ny teninao Tahaka ny mahazo babo be. '
  '163':
  - type: text
    content: 'Halako ny lainga ka ataoko ho fahavetavetana; Ny lalànao no tiako. '
  '164':
  - type: text
    content: 'Impito isan''andro no iderako Anao Noho ny fitsipikao marina. '
  '165':
  - type: text
    content: 'Be fiadanana izay tia ny lalànao, Ary tsy misy mahatafintohina azy. '
  '166':
  - type: text
    content: 'Miandry ny famonjenao aho, Jehovah ô, Ka mankatò ny didinao. '
  '167':
  - type: text
    content: 'Mitandrina ny teni-vavolombelonao ny fanahiko, Ka tiako indrindra izy. '
  '168':
  - type: text
    content: Mitandrina ny didinao sy ny teni-vavolombelonao aho; Fa ny lalan-kalehako rehetra dia eo anatrehanao.
  '169':
  - type: text
    content: 'Aoka anie ho tonga eo anatrehanao ny fitarainako, Jehovah ô; Ampianaro aho araka ny teninao. '
  '17':
  - type: text
    content: 'Asio soa aho mpanomponao, mba ho velona Ka hitandrina ny teninao. '
  '170':
  - type: text
    content: 'Aoka anie ho tonga eo anatrehanao ny fifonako; Vonjeo aho araka ny teninao. '
  '171':
  - type: text
    content: 'Aoka hiboiboika fiderana ny molotro, Fa ampianarinao ahy ny didinao. '
  '172':
  - type: text
    content: 'Hihira ny teninao ny lelako, Fa marina ny didinao rehetra. '
  '173':
  - type: text
    content: 'Aoka anie hamonjy ahy ny tananao; Fa efa nifidy ny didinao aho. '
  '174':
  - type: text
    content: 'Efa manina ny famonjenao aho, Jehovah ô; Ary ny lalànao no firavoravoako. '
  '175':
  - type: text
    content: 'Aoka anie ho velona ny fanahiko ka hidera Anao; Ary aoka anie hamonjy ahy ny fitsaranao. '
  '176':
  - type: text
    content: Efa nania aho; tadiavo ny mpanomponao toy ny fitady ondry very; Fa ny didinao tsy mba hadinoiko.
  '18':
  - type: text
    content: 'Ampahirato ny masoko, mba hahitako Zava-mahagaga ao amin''ny lalànao. '
  '19':
  - type: text
    content: 'Vahiny etỳ an-tany aho; Aza afeninao ahy ny didinao. '
  '2':
  - type: text
    content: 'Sambatra izay mitandrina ny teni-vavolombelony Ka mitady Azy amin''ny fo rehetra; '
  '20':
  - type: text
    content: 'Torotoro ny fanahiko noho ny faniriany Ny fitsipikao mandrakariva. '
  '21':
  - type: text
    content: 'Voateninao mafy ny mpirehareha, dia ny olom-boaozona, Izay mania miala amin''ny didinao. '
  '22':
  - type: text
    content: 'Esory amiko ny fahafaham-baraka sy ny fanamavoana: Fa efa nitandrina ny teni-vavolombelonao aho. '
  '23':
  - type: text
    content: 'Na dia ny mpanapaka aza dia mipetraka, ka iokoany aho; Izaho mpanomponao misaintsaina ny didinao. '
  '24':
  - type: text
    content: Ny teni-vavolombelonao koa no firavoravoako, Eny, mpanolo-tsaina ahy izany.
  '25':
  - type: text
    content: 'Miraikitra amin''ny vovoka ny fanahiko; Velomy aho araka ny teninao. '
  '26':
  - type: text
    content: 'Ny lalako no nolazaiko, ary namaly ahy Hianao: Ampianaro ahy ny didinao. '
  '27':
  - type: text
    content: 'Ampahalalao ahy ny lalan''ny didinao; Dia hoheveriko ny fahagagana nataonao. '
  '28':
  - type: text
    content: 'Mipotrapotra-dranomaso aho noho ny alaheloko; Ampaherezo aho araka ny teninao. '
  '29':
  - type: text
    content: 'Ny lalan''ny lainga no esory amiko: Ary ny lalànao no anasoavy ahy. '
  '3':
  - type: text
    content: 'Eny, Izay tsy manao ratsy. Fa mandeha araka ny lalany. '
  '30':
  - type: text
    content: 'Ny lalàn''ny fahamarinanao no fidiko; Apetrako eo anatrehako ny fitsipikao. '
  '31':
  - type: text
    content: 'Mifikitra amin''ny teni-vavolombelonao aho; Jehovah ô, aza avela ho azon-kenatra aho; '
  '32':
  - type: text
    content: Ny lalan'ny didinao no ihazakazahako, Fa
  - type: note
    content: 'Na: Raha'
  - type: text
    content: ' ampahalalahinao ny foko.'
  '33':
  - type: text
    content: 'Jehovah ô, toroy ny lalan''ny didinao aho; Dia hotandremako hatramin''ny farany izany. '
  '34':
  - type: text
    content: 'Omeo fahalalana aho mba hitandrina ny lalànao; Eny, hitandrina azy amin''ny foko rehetra aho. '
  '35':
  - type: text
    content: 'Ampandehano amin''ny lalan''ny didinao aho; Fa izany no sitrako. '
  '36':
  - type: text
    content: 'Amporisiho ny foko ho amin''ny teni-vavolombelonao, Fa tsy ho amin''ny fieremana. '
  '37':
  - type: text
    content: 'Avilio ny masoko tsy hijery zava-poana; Velomy amin''ny lalanao aho. '
  '38':
  - type: text
    content: Tovy ny teninao amin'ny mpanomponao, Izay matahotra Anao indrindra
  - type: note
    content: Tovy amin'ny mpanomponao ny teninao, Izay mahatonga ny fahatahorana Anao
  - type: text
    content: '. '
  '39':
  - type: text
    content: 'Esory ny fahafaham-baraka. izay atahorako; Fa tsara ny fitsipikao. '
  '4':
  - type: text
    content: 'Hianao namoaka ny didinao Mba hotandremana tsara. '
  '40':
  - type: text
    content: Indro, manina ny didinao aho, Velomy amin'ny fahamarinanao.
  '41':
  - type: text
    content: 'Aoka ho tonga amiko ny famindram-ponao, Jehovah ô, Dia ny famonjenao, araka ny teninao. '
  '42':
  - type: text
    content: 'Dia hamaly izay miteny ratsy ahy aho, Satria matoky ny teninao. '
  '43':
  - type: text
    content: 'Ary aza dia esorina amin''ny vavako ny teny marina; Fa miandry ny fitsaranao aho. '
  '44':
  - type: text
    content: 'Dia hitandrina ny lalinao mandrakariva aho, Dia mandrakizay doria. '
  '45':
  - type: text
    content: 'Ary handeha amin''ny malalaka aho; Fa ny didinao no tadiaviko. '
  '46':
  - type: text
    content: 'Hilaza ny teni-vavolombelonao eo anatrehan''ireo mpanjaka aho Ka tsy ho menatra. '
  '47':
  - type: text
    content: 'Ary hiravoravo amin''ny didinao aho Satria tiako ireny. '
  '48':
  - type: text
    content: 'Hasandratro ny tanako ho amin''ny didinao satria tiako ireny: Hosaintsainiko ny didinao.'
  '49':
  - type: text
    content: Tsarovy ny teny natao tamiko mpanomponao Izay nampanantenanao ahy
  - type: note
    content: 'Na: Satria nampanantenainao aho'
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Enga anie ka ho tafatoetra ny lalako Hitandremako ny didinao! '
  '50':
  - type: text
    content: 'Izao no mampionona ahy amin''ny fahoriako; Ny teninao no mamelona ahy. '
  '51':
  - type: text
    content: 'Ny mpirehareha maniratsira ahy: Tsy mba mivily miala amin''ny lalànao aho. '
  '52':
  - type: text
    content: 'Mahatsiaro ny fitsipikao izay hatramin''ny taloha aho, Jehovah ô, Dia mionona aho. '
  '53':
  - type: text
    content: 'Fahatezerana mirehitra no nahazo ahy Noho ny amin''ny ratsy fanahy izay mahafoy ny lalànao. '
  '54':
  - type: text
    content: 'Ny didinao no ataoko an-kira Ao amin''ny trano fivahiniako. '
  '55':
  - type: text
    content: 'Mahatsiaro ny anaranao nony alina aho, Jehovah ô, Ka mitandrina ny lalànao. '
  '56':
  - type: text
    content: 'Izao no ahy: Mitandrina ny didinao aho.'
  '57':
  - type: text
    content: 'Anjarako Jehovah; Minia mitandrina ny teninao aho. '
  '58':
  - type: text
    content: 'Mifona aminao amin''ny foko rehetra aho: Mamindrà fo amiko araka ny teninao. '
  '59':
  - type: text
    content: 'Mihevitra ny lalako aho Ka mamerina ny tongotro ho amin''ny teni-vavolombelonao. '
  '6':
  - type: text
    content: 'Dia tsy ho menatra aho, Raha mandinika ny didinao rehetra. '
  '60':
  - type: text
    content: 'Mandeha faingana aho ka tsy mitaredretra, Amin''ny fitandremana ny didinao. '
  '61':
  - type: text
    content: 'Nihodidina tamiko ny famato-ran''ny ratsy fanahy; Tsy mba nanadino ny lalànao aho. '
  '62':
  - type: text
    content: 'Mamatonalina no hifohazako hidera Anao Noho ny fitsipikao marina. '
  '63':
  - type: text
    content: 'Naman''izay rehetra matahotra Anao aho Sy naman''izay mitandrina ny didinao. '
  '64':
  - type: text
    content: Jehovah ô, henika ny famindram-ponao ny tany; Ampianaro ahy ny didinao.
  '65':
  - type: text
    content: 'Jehovah ô, efa nasianao soa ny mpanomponao, Araka ny teninao. '
  '66':
  - type: text
    content: 'Ampianaro fahafantarana tsara sy fahalalana aho, Fa matoky ny didinao aho. '
  '67':
  - type: text
    content: 'Fony tsy mbola azom-pahoriana aho, dia naniasia; Fa ankehitriny dia mitandrina ny teninao aho. '
  '68':
  - type: text
    content: 'Sady tsara Hianao no Mpanao ny tsara; Ampianaro ahy ny didinao. '
  '69':
  - type: text
    content: 'Namoron-dainga hamelezana ahy ny mpirehareha; Amin''ny foko rehetra no itandremako ny didinao. '
  '7':
  - type: text
    content: 'Hidera Anao amin''ny hitsim-po aho Amin''ny ianarako ny fitsipikao marina. '
  '70':
  - type: text
    content: 'Matavy tahaka ny menaka ny fony; Fa izaho kosa, dia ny lalànao no iravoravoako. '
  '71':
  - type: text
    content: 'Soa ihany aho nampahorina, Mba hianarako ny didinao. '
  '72':
  - type: text
    content: Ny lalàn'ny vavanao no mahatsara ahy Mihoatra noho ny volamena sy ny volafotsy tsy omby arivo.
  '73':
  - type: text
    content: 'Ny tananao nanao ahy sy namboatra ahy; Ampianaro aho, mba hianarako ny didinao. '
  '74':
  - type: text
    content: 'Izay matahotra Anao hahita ahy ka ho faly; Fa ny teninao no andrasako. '
  '75':
  - type: text
    content: 'Fantatro, Jehovah ô, fa marina ny fitsaranao. Ary ny fahamarinanao no nampahorianao ahy. '
  '76':
  - type: text
    content: 'Ny famindram-ponao anie no hampiononana ahy Araka ny teninao tamin''ny mpanomponao. '
  '77':
  - type: text
    content: 'Aoka ho tonga amiko ny fiantranao, mba ho velona aho; Fa ny lalànao no firavoravoako. '
  '78':
  - type: text
    content: Aoka ho menatra ny mpirehareha, fa nampahory ahy tsy ahoan-tsy ahoana
  - type: note
    content: 'Na: nanoloky ahy tamin''ny lainga'
  - type: text
    content: ' izy; Izaho hisaintsaina ny didinao. '
  '79':
  - type: text
    content: 'Aoka hiverina amiko izay matahotra Anao Sy izay mahalala ny teni-vavolombelonao. '
  '8':
  - type: text
    content: Ny didinao no hotandremako; Aza dia mahafoy ahy Hianao.
  '80':
  - type: text
    content: Aoka ho marina tsara ny foko amin'ny fitanana ny didinao, Mba tsy ho menatra aho.
  '81':
  - type: text
    content: 'Ritra ny aiko, satria manina ny famonjenao aho; Ny teninao no andrasako. '
  '82':
  - type: text
    content: 'Pahina ny masoko miandry ny teninao, Ka hoy izaho: Rahoviana no hampionona ahy Hianao? '
  '83':
  - type: text
    content: 'Fa tahaka ny siny hoditra ao amin''ny setroka aho. Nefa ny didinao tsy mba hadinoiko. '
  '84':
  - type: text
    content: 'Hoatrinona no andron''ny mpanomponao? Rahoviana no hanao fitsarana amin''izay manenjika ahy Hianao? '
  '85':
  - type: text
    content: 'Efa nanao longoa hianjerako ny mpirehareha, Dia izay tsy manaraka ny lalànao. '
  '86':
  - type: text
    content: 'Marina ny didinao rehetra; Manenjika ahy tsy ahoan-tsy ahoana ireny; vonjeo aho. '
  '87':
  - type: text
    content: 'Saiky laniny teo amin''ny tany aho, Kanefa tsy mba mahafoy ny didinao. '
  '88':
  - type: text
    content: Velomy aho araka ny famindram-ponao; Dia hitandrina ny teni-vavolombelona naloaky ny vavanao aho.
  '89':
  - type: text
    content: 'Ho mandrakizay, Jehovah ô, No nanorenanao any an-danitra ny teninao. '
  '9':
  - type: text
    content: 'Inona no hiarovan''ny zatovo ny lalan-kalehany tsy ho voaloto? Ny fitandremana araka ny teninao. '
  '90':
  - type: text
    content: 'Hihatra amin''ny taranaka fara-mandimby ny fahamarinanao; Efa nampitoetra ny tany Hianao, ka, indro, mitoetra izy. '
  '91':
  - type: text
    content: Hanefa ny fitsaranao
  - type: note
    content: 'Na: Araka ny nanendrenao azy'
  - type: text
    content: ' no itoerany mandraka androany; Fa mpanomponao ny zavatra rehetra. '
  '92':
  - type: text
    content: 'Raha tsy ny lalànao no niravoravoako, Dia maty tamin''ny fahoriako aho. '
  '93':
  - type: text
    content: 'Tsy hohadinoiko mandrakizay ny didinao; Fa ireny no amelomanao ahy. '
  '94':
  - type: text
    content: 'Anao aho, vonjeo aho; Fa ny didinao no tadiaviko. '
  '95':
  - type: text
    content: 'Miandry ahy ny ratsy fanahy mba hahafaty ahy; Mandinika ny teni-vavolombelonao aho '
  '96':
  - type: text
    content: Efa hitako fa manam-pahataperana avokoa ny tanteraka rehetra; Malalaka indrindra ny didinao.
  '97':
  - type: text
    content: 'Endrey ny fitiavako ny lalànao! Fisaintsainako mandrakariva izany. '
  '98':
  - type: text
    content: 'Ny didinao mampahahendry ahy mihoatra noho ny fahavaloko, Satria ato amiko mandrakizay ireny. '
  '99':
  - type: text
    content: 'Hendry noho ny mpampianatra ahy rehetra aho, Satria ny teni-vavolombelonao no fisaintsainako. '
