document_id: ISA.6,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanendrena an'Isaia ho mpaminany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin''ny taona nahafatesan''i Ozia mpanjaka no nahitako ny Tompo nipetraka teo ambonin''ny seza fiandrianana avo sady manerinerina, ary ny ebaneban''akanjony nahafeno ny tempoly. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ataovy adala ny fon''ity firenena ity, Ary ataovy lalodalovana ny sofiny, Ary ataovy mikimpy ny masony, Fandrao hahita ny masony, Sy handre ny sofiny, Ary hahalala ny fony, Dia hibebaka izy ka ho sitrana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary hoy izaho: Tompo ô, mandra-pahoviana anefa? Dia hoy Izy: Mandra-pahafoanan''ny tanàna, ka tsy hisy mponina, Ary ny trano tsy hisy olona, Ary ny tany ho lao tokoa; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary Jehovah hampandeha lavitra ny olona, Ka ho be ny lao ao amin''ny tany; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ary na dia misy ampahafolony aza sisa, Dia mbola hosimbana ihany koa izany Kanefa kosa tahaka ny hazo terebinta sy ny ôka, Izay mbola misy fotony ihany na dia voakapa aza, Dia toy izany no mbola hisiana taranaka masina ho fotony.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nisy serafima nitsangana teo amboniny, samy nanana elatra enina avy; ny roa nanaronany ny tavany, ny roa nanaronany ny tongony, ary ny roa nanidinany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nanandratra ny feony izy ka nifamaly hoe: Masina, masina, masina Jehovah, Tompon''ny maro; Henika ny voninahiny ny tany rehetra'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Voninahiny avokoa ny eran''ny tany'
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia nihorohoro ny fanambanin''ny tokonana noho ny feon''ireo nanandratra ny feony; ary feno setroka ny trano. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia hoy izaho: Lozako! maty aho! fa lehilahy maloto molotra, sady ato amin''ny firenena maloto molotra no itoerako, fa ny mpanjaka, dia Jehovah, Tompon''ny maro, no efa hitan''ny masoko. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Dia nanidina nanatona ahy ny serafima anankiray nitondra vain'afo
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: vato mahamay'
      marker-yv: yv-n
    - type: text
      text: ' teny an-tànany, izay nalainy tamin''ny ny tandra avy teo amin''ny alitara. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary natehiny ny vavako izany, ka hoy izy: Indro, efa nitehika tamin''ny molotrao io; ka dia afaka ny helokao, ary voavela ny fahotanao. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary nandre ny feon''ny Tompo aho nanao hoe: Iza no hirahiko, ary iza no handeha ho irakay? Dia hoy izaho: Inty aho, iraho aho. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary hoy Izy: Mandehana, ka lazao amin''ity firenena ity hoe: Mandrenesa mandrakariva ihany ianareo, nefa aza mahalala; Ary mijere mandrakariva ihany ianareo, nefa aza mahafantatra. '
