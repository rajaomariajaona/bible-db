document_id: ISA.6,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanendrena an'Isaia ho mpaminany
  - type: text
    content: 'Tamin''ny taona nahafatesan''i Ozia mpanjaka no nahitako ny Tompo nipetraka teo ambonin''ny seza fiandrianana avo sady manerinerina, ary ny ebaneban''akanjony nahafeno ny tempoly. '
  '10':
  - type: text
    content: 'Ataovy adala ny fon''ity firenena ity, Ary ataovy lalodalovana ny sofiny, Ary ataovy mikimpy ny masony, Fandrao hahita ny masony, Sy handre ny sofiny, Ary hahalala ny fony, Dia hibebaka izy ka ho sitrana. '
  '11':
  - type: text
    content: 'Ary hoy izaho: Tompo ô, mandra-pahoviana anefa? Dia hoy Izy: Mandra-pahafoanan''ny tanàna, ka tsy hisy mponina, Ary ny trano tsy hisy olona, Ary ny tany ho lao tokoa; '
  '12':
  - type: text
    content: 'Ary Jehovah hampandeha lavitra ny olona, Ka ho be ny lao ao amin''ny tany; '
  '13':
  - type: text
    content: Ary na dia misy ampahafolony aza sisa, Dia mbola hosimbana ihany koa izany Kanefa kosa tahaka ny hazo terebinta sy ny ôka, Izay mbola misy fotony ihany na dia voakapa aza, Dia toy izany no mbola hisiana taranaka masina ho fotony.
  '2':
  - type: text
    content: 'Nisy serafima nitsangana teo amboniny, samy nanana elatra enina avy; ny roa nanaronany ny tavany, ny roa nanaronany ny tongony, ary ny roa nanidinany. '
  '3':
  - type: text
    content: 'Ary nanandratra ny feony izy ka nifamaly hoe: Masina, masina, masina Jehovah, Tompon''ny maro; Henika ny voninahiny ny tany rehetra'
  - type: note
    content: 'Na: Voninahiny avokoa ny eran''ny tany'
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Dia nihorohoro ny fanambanin''ny tokonana noho ny feon''ireo nanandratra ny feony; ary feno setroka ny trano. '
  '5':
  - type: text
    content: 'Dia hoy izaho: Lozako! maty aho! fa lehilahy maloto molotra, sady ato amin''ny firenena maloto molotra no itoerako, fa ny mpanjaka, dia Jehovah, Tompon''ny maro, no efa hitan''ny masoko. '
  '6':
  - type: text
    content: Dia nanidina nanatona ahy ny serafima anankiray nitondra vain'afo
  - type: note
    content: 'Na: vato mahamay'
  - type: text
    content: ' teny an-tànany, izay nalainy tamin''ny ny tandra avy teo amin''ny alitara. '
  '7':
  - type: text
    content: 'Ary natehiny ny vavako izany, ka hoy izy: Indro, efa nitehika tamin''ny molotrao io; ka dia afaka ny helokao, ary voavela ny fahotanao. '
  '8':
  - type: text
    content: 'Ary nandre ny feon''ny Tompo aho nanao hoe: Iza no hirahiko, ary iza no handeha ho irakay? Dia hoy izaho: Inty aho, iraho aho. '
  '9':
  - type: text
    content: 'Ary hoy Izy: Mandehana, ka lazao amin''ity firenena ity hoe: Mandrenesa mandrakariva ihany ianareo, nefa aza mahalala; Ary mijere mandrakariva ihany ianareo, nefa aza mahafantatra. '
