document_id: 2CH.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanambazan'i Asa an'i Beni-hadada, mpanjakan'i Syria, hanampy azy hiady amin'i Basa, mpanjakan'ny Isiraely, sy ny nananaran'i Sanany mpaminany azy noho izany, ary ny nahafatesan'i Asa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin''ny taona fahenina amby telo-polo nanjakan''i Asa dia niakatra Basa, mpanjakan''ny Isiraely, hamely ny Joda, ka nanamboatra an''i Rama izy mba tsy hisy hahazo hivoaka na hiditra ho an''i Asa, mpanjakan''ny Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Asa namoaka volafotsy sy volamena avy tamin''ny rakitry ny tranon''i Jehovah sy ny tranon''ny mpanjaka, dia nampitondra azy tany amin''i Beni-hadada, mpanjakan''i Syria, izay nitoetra tany Damaskosy, ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Misy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Aoka hisy'
    marker-yv: yv-n
  - type: text
    text: ' fanekena amiko sy aminao, dia ilay tamin''ny raiko sy ny rainao; koa, indro, mampanatitra volafotsy sy volamena ho anao aho, ka andeha, tsoahy ny fanekenao amin''i Basa, mpanjakan''ny Isiraely, mba hialany amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Beni-hadada nanaiky ny tenin''i Asa mpanjaka ka naniraka ireo komandin''ny miaramilany hamely ny tanànan''ny Isiraely; dia nandrava an''Iona sy Dana sy Abela-maima ary ny trano fitehirizana rehetra izay teny amin''ny tanànan''ny Naftaly izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nony ren''i Basa izany, dia nitsahatra tsy nanamboatra an''i Rama intsony izy, fa natsahany ny asany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Asa mpanjaka namory ny Joda rehetra; ary dia nesorin''ny olona ny vato sy ny hazo tao Rama, izay naorin''i Basa, ka nentiny nanamboatra an''i Geba sy Mizpa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary tamin''izany andro izany dia nankeo amin''i Asa, mpanjakan''ny Joda, Hanany mpahita ka nanao taminy hoe: Noho ny niankinanao tamin''ny mpanjakan''i Syria fa tsy niankina tamin''i Jehovah Andriamanitrao ianao, dia afa-nandositra ny tananao ny miaramilan''ny mpanjakan''i Syria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tsy maro be va ny Etiopiana sy ny Lobita, ary tsy maro be koa va ny kalesiny sy ny mpitaingin-tsoavaliny? Nefa noho ny niankinanao tamin''i Jehovah, dia natolony teo an-tananao ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa ny mason''i Jehovah mijery eny tontolo eny eran''ny tany rehetra, mba hisehoany aman-kery hamonjy izay manana fo mahitsy aminy. Adala ianao tamin''izany, ka dia hisy ady hahazo anao hatramin''izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia tezitra tamin'ilay mpahita Asa ka nanao azy tao an-trano-maizina; fa nisafoaka aminy indrindra izy noho izany. Ary ny olona sasany koa dia nampahorin'i Asa tamin'izay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary, indro, ny tantaran''i Asa, na ny voalohany na ny farany, dia efa voasoratra ao amin''ny bokin''ny mpanjakan''ny Joda sy ny Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tamin''ny taona fahasivy amby telo-polo nanjakan''i Asa dia narary tamin''ny tongony izy, ka nihamafy indrindra ny aretiny; nefa na dia narary aza izy, dia tsy nitady an''i Jehovah, fa ny mpanao fanafody ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary Asa lasa nodi-mandry any amin''ny razany; maty izy tamin''ny taona fahiraika amby efa-polo nanjakany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia nalevina tao amin'ny fasany ihany izy, izay nolavahany tao an-Tanànan'i Davida, ka nampandrina teo amin'ny fandriana efa nofenoina zava-manitra samy hafa voaharoharo araka ny fanaon'ny mpangaroharo zava-manitra, ary nandoroany zavatra betsaka ho fisaonana azy.
