document_id: JAS.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fananarana ny tia ady sy ny mpisintaka sy ny manendrikendrika ary ny tsy manaiky ny fitondran'Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Avy aiza ny ady, ary avy aiza ny fifandirana eo aminareo? Tsy izao va no ihaviany, dia ny filanareo izay miady ao anatin''ny momba ny tenanareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mila ianareo, nefa tsy manana ihany; mamono sy mitsiriritra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mialona'
    marker-yv: yv-n
  - type: text
    text: ' ianareo, nefa tsy mahazo ihany; mifanditra sy miady ianareo; tsy manana ianareo, satria tsy mangataka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mangataka ianareo, nefa tsy mahazo ihany, satria diso fangataka, mba holaninareo amin''ny filanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ry mpisintaka mijangajanga, tsy fantatrareo va fa fandrafiana an''Andriamanitra ny fisakaizana amin''izao tontolo izao? Koa na iza na iza te-ho sakaizan''izao tontolo izao, dia fahavalon''Andriamanitra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ataonareo va fa miteny foana ny Soratra Masina
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny Soratra Masina hoe'
    marker-yv: yv-n
  - type: text
    text: '? Ny fanahy, izay nampitoeriny ato anatintsika'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: izay mitoetra ato anatintsika'
    marker-yv: yv-n
  - type: text
    text: ' dia iriny amin''ny fahasaro-piaro'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ny Fanahy, Izay nampitoeriny ato anatintsika, dia maniry amin''ny fahasaro-piaro; na: Ny fanahy, izay nampitoeriny ato anatintsika, dia maniry amin''ny fialonana'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nefa manome fahasoavana bebe kokoa Izy. Koa hoy izy: "Andriamanitra manohitra ny mpiavonavona, fa manome fahasoavana ho an''ny manetry tena" (Oha. 3.34). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ka dia maneke an Andriamanitra ianareo; ary manohera ny devoly, dia handositra anareo izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Manatòna an''Andriamanitra, dia hanatona anareo Izy. Diovy ny tananareo, ry mpanota; ary ataovy madio ny fonareo, ry mpiroa saina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Oria, sy mitomania, ary midradradradrà; aoka hody fitomaniana ny fihomehezanareo, ary hody fanjoretana ny fifalianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Manetre tena eo anatrehan''ny Tompo, dia hanandratra anareo Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Aza mifanaratsy, ry rahalahy. Izay manaratsy rahalahy na mitsara ny rahalahiny dia manaratsy ny lalàna sy mitsara ny lalàna; fa raha mitsara ny lalàna ianao, dia tsy mpankatò ny lalàna, fa mpitsara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Iray ihany no Mpanome lalàna sy Mpitsara, dia Ilay mahavonjy sy mahavery; fa iza moa ianao, no mitsara ny namanao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He! ianareo izay manao hoe: Anio na ampitso dia hankany Ananona izahay ary hitoetra any herintaona ka hividy sy hivarotra ary hahazo tombom-barotra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'kanefa tsy mahalala ny ho ampitso ianareo. Inona moa ny ainareo? Fa zavona ihany ianareo, izay miseho vetivety, dia levona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa aleo manao izao: Raha sitrapon''ny Tompo, ka velona izahay, dia hataonay izao na izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa izao dia mirehareha amin''ny fahasahianareo ianareo; ratsy ny fireharehana rehetra toy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Koa izay mahalala hanao soa, nefa tsy manao, dia heloka ho azy izany.
