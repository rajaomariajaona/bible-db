document_id: 2CH.20,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Filazana fohifohy ny amin'ny nanjakan'i Josafata
  - type: text
    content: Ary nony afaka izany, dia avy hiady tamin'i Josafata ny taranak'i Moaba sy ny taranak'i Amona mbamin'ny any ankoatry ny Amonita
  - type: note
    content: 'Na: mbamin''ny Meonita; izahao xxxvi. 7'
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Koa indreo ny taranak''i Amona sy Moaba ary ny avy any an-tendrombohitra, Seira, dia ilay tsy navelanao hotafihin''ny Isiraely, fony izy nivoaka avy tany amin''ny tany Egypta, ka nivily fa tsy nandringana azy; '
  '11':
  - type: text
    content: 'nefa indreo izy mamaly ratsy anay ka avy handroaka anay amin''ny lova nomenao anay. '
  '12':
  - type: text
    content: 'Ry Andriamanitray ô, tsy hitsara azy va Hianao? Fa izahay dia tsy manan-kery hanohitra ireo olona betsaka ireo, izay avy hamely anay, koa tsy hitanay izay hataonay; fa Hianao no andrandrain''ny masonay. '
  '13':
  - type: text
    content: 'Ary ny Joda rehetra mbamin''ny vadiny aman-janany koa dia samy nitsangana teo anatrehan''i Jehovah. '
  '14':
  - type: text
    content: 'Ary Jahaziela, zanak''i Zakaria, zanak''i Benaia, zanak''i Jeiela, zanak''i Matania, Levita amin''ny taranak''i Asafa, dia voatsindrin''ny Fanahin''i Jehovah teo amin''ny fiangonana '
  '15':
  - type: text
    content: 'ka nanao hoe: Mihainoa ianareo, ry Joda rehetra sy ry mponina any Jerosalema, ary ianao, ry Josafata mpanjaka: Izao no lazain''i Jehovah aminareo: Aza matahotra na mivadi-po ny amin''ireo olona betsaka ireo, fa tsy anareo ny ady, fa an''Andriamanitra. '
  '16':
  - type: text
    content: 'Rahampitso dia midìna hiady aminy ianareo; fa, indreo, hiakatra amin''ny fiakarana Ziza izy; ary ianareo hahita azy eo amin''ny faran''ny lohasahan-driaka tandrifin''ny efitr''i Jeroela. '
  '17':
  - type: text
    content: 'Tsy ianareo anefa no hiady amin''ity; mijanòna tsara, fa ho hitanareo ny hamonjen''i Jehovah anareo, ry Joda sy Jerosalema. Aza matahotra na mivadi-po, fa rahampitso dia mivoaha hiady aminy; fa Jehovah no momba anareo. '
  '18':
  - type: text
    content: 'Dia niankohoka tamin''ny tany Josafata; ary ny Joda sy ny mponina rehetra tany Jerosalema niankohoka teo anatrehan''i Jehovah koa ka nivavaka. '
  '19':
  - type: text
    content: Dia nitsangana ny Levita, taranaky ny Kehatita sy taranaky ny Koraita, mba hidera an'i Jehovah, Andriamanitry ny Isiraely, tamin'ny feo mahery indrindra.
  '2':
  - type: text
    content: 'Ary nisy tonga ka nanambara tamin''i Josafata hoe: Indreo, misy olona betsaka avy any an-dafin''ny ranomasina, dia avy any Syria, ho avy hiady aminao; ary indreo izy ao Hazezon-tamara (Enjedy izany). '
  '20':
  - type: text
    content: 'Ary nifoha maraina koa izy, dia niainga nankany an-efitr''i Tekoa; ary nony nivoaka izy, dia nitsangana teo Josafata ka nanao hoe: Mihainoa ahy, ry Joda, sy ianareo, ry mponina eto Jerosalema: Minoa an''i Jehovah Andriamanitrareo, dia ho tafatoetra ianareo; minoa ny mpaminaniny, dia hambinina ianareo. '
  '21':
  - type: text
    content: 'Ary rehefa niara-nihevitra tamin''ny olona izy, dia nanendry mpihira ho an''i Jehovah hidera amin''ny fihaingoana masina, raha mivoaka eo anoloan''ny olona efa voaomana hiady, ka hanao hoe: Miderà an''i Jehovah, fa mandrakizay ny famindram-pony. '
  '22':
  - type: text
    content: 'Ary raha vao nanomboka nihoby sy nidera ireo, dia nasian''i Jehovah otrika hamely ny taranak''i Amona sy Moaba sy ny avy any an-tendrombohitra Seira, izay avy hamely ny Joda, ka dia resy ireo. '
  '23':
  - type: text
    content: 'Dia nitsangana ny taranak''i Amona sy Moaba namely ny avy any an-tendrombohitra Seira ka namono sy nandringana azy; ary nony voaringany ny mponina tany Seira, dia nifandringana kosa izy samy izy ihany. '
  '24':
  - type: text
    content: 'Ary nony tonga teo amin''ilay fitazanana any an-efitra ny Joda, dia nijery ireo olona betsaka ireo izy, koa, indreo, nisy faty niampatrampatra tamin''ny tany, fa tsy nisy afa-nandositra. '
  '25':
  - type: text
    content: Ary avy hamabo azy Josafata sy ny vahoakany, dia nahita harena betsaka sy faty
  - type: note
    content: 'Na: fitafiana'
  - type: text
    content: ' ary fanaka sarobidy teo izy, ka dia namabo mihoatra noho izay zakany ho entina; ary hateloana no nanangonany ny babo, fa be dia be ireny. '
  '26':
  - type: text
    content: Ary tamin'ny andro fahefatra dia nivory tao amin'ny lohasaha Beraka
  - type: note
    content: Beraka = Fisaorana
  - type: text
    content: ' izy, fa tany no nisaorany an''i Jehovah; koa izany no nanaovany izany tany izany hoe Lohasaha Beraka mandraka androany. '
  '27':
  - type: text
    content: 'Koa dia niverina ny lehilahy rehetra amin''ny Joda sy Jerosalema, ary Josafata nitarika azy hankany Jerosalema indray tamin''ny fifaliana, fa Jehovah nampifaly azy ny amin''ny fahavalony. '
  '28':
  - type: text
    content: 'Ary tonga tany Jerosalema izy nitondra valiha sy lokanga ary trompetra ka nankao an-tranon''i Jehovah. '
  '29':
  - type: text
    content: 'Ary ny fahatahorana an''Andriamanitra nahazo ny fanjakana rehetra manodidina, nony efa reny fa Jehovah no niady tamin''ny fahavalon''ny Isiraely. '
  '3':
  - type: text
    content: 'Dia natahotra Josafata ka nanatrika tsara hitady an''i Jehovah sady niantso andro fifadian-kanina ho an''ny tanin''ny Joda rehetra. '
  '30':
  - type: text
    content: Ary nandry fahizay ny fanjakan'i Josafata; fa nomen'Andriamaniny fiadanana tamin'ny manodidina izy.
  '31':
  - type: text
    content: 'Ary Josafata nanjaka tamin''ny Joda; dimy amby telo-polo taona izy, fony vao nanjaka, ary dimy amby roa-polo taona no nanjakany tany Jerosalema, Ary ny anaran-dreniny dia Azoba, zanakavavin''i Sily. '
  '32':
  - type: text
    content: 'Ary nandeha tamin''ny lalana nalehan''i Asa rainy izy ka tsy niala tamin''izany, fa nanao izay mahitsy eo imason''i Jehovah. '
  '33':
  - type: text
    content: 'Kanefa ny fitoerana avo tsy mba noravana; fa ny olona tsy mbola nampiomana ny fony hitady an''Andriamanitry ny razany. '
  '34':
  - type: text
    content: 'Ary ny tantaran''i Josafata sisa, na ny voalohany na ny farany, indro, efa voasoratra ao amin''ny tenin''i Jeho, zanak''i Hanany, izay nakambana ao amin''ny bokin''ny mpanjakan''ny Isiraely, izany. '
  '35':
  - type: text
    content: 'Nefa nony afaka izany, Josafata, mpanjakan''ny Joda, nikambana tamin''i Ahazia, mpanjakan''ny Isiraely, izay nanao ratsy; '
  '36':
  - type: text
    content: 'ary nikambana taminy hanao sambo hankany Tarsisy izy, ka tao Ezion-gebera no nanaovany azy. '
  '37':
  - type: text
    content: 'Ary Eliezera, zanak''i Dodavaho, avy any Maresa, naminany ny amin''i Josafata hoe: Noho ny nikambananao tamin''i Ahazia dia horavan''i Jehovah ny asanao. Ary nahavakiana ny sambo ka tsy nahazo nankany Tarsisy.'
  '4':
  - type: text
    content: 'Dia niangona ny Joda hangataka famonjena amin''i Jehovah; eny, avy tamin''ny tanànan''ny Joda rehetra hitady an''i Jehovah izy. '
  '5':
  - type: text
    content: 'Ary Josafata nitsangana teo amin''ny fiangonan''ny Joda sy Jerosalema, Tao amin''ny tranon''i Jehovah, teo anoloan''ny kianja vaovao, '
  '6':
  - type: text
    content: 'ka nanao hoe: Ry Jehovah ô, Andriamanitry ny razanay, tsy Hianao va no Andriamanitra any an-danitra? Eny, Hianao no manapaka amin''ny fanjakan''ny jentilisa rehetra, ary eo an-tananao ny hery sy ny fahefana, ka tsy misy mahasakana Anao. '
  '7':
  - type: text
    content: 'Ry Andriamanitray ô, tsy Hianao va no nandroaka ny mponina tamin''ity tany ity hiala teo anoloan''ny Isiraely olonao ka nanome azy mandrakizay ho an''ny taranak''i Abrahama sakaizanao? '
  '8':
  - type: text
    content: 'Ary nonina tatỳ izy ka nanao fitoerana masina teto ho an''ny anaranao sady nanao hoe: '
  '9':
  - type: text
    content: 'Raha manjo anay ny loza, na sabatra, na famaliana, na areti-mandringana, na mosary, ary hitsangana manatrika ity trano ity sy eto anatrehanao izahay (fa ny anaranao no amin''ity trano ity) ka hitaraina aminao amin''ny fahorianay, dia hihaino Hianao ka hamonjy. '
