document_id: JDG.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny niadian'ny Zanak'Isiraely tamin'ny Kananita taorian'ny nahafatesan'i Josoa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary rehefa maty Josoa, dia nanontany tamin''i Jehovah ny Zanak''Isiraely hoe: Iza no hiakatra voalohany hiady amin''ny Kananita ho anay? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hoy Jehovah: Joda no hiakatra; indro, efa nanolotra ny tany ho eo an-tànany Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy Joda tamin''i Simeona rahalahiny: Andeha hiara-miakatra amiko ianao ho any amin''ny lovako, ka aoka isika hiady amin''ny Kananita; ary izaho kosa dia handeha hiaraka aminao ho any amin''ny lovanao. Ary Simeona dia nandeha niaraka taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia niakatra Joda, ary natolotr''i Jehovah teo an-tànany ny Kananita sy ny Perizita, ka nahafaty iray alin-dahy tany Bezeka izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nahita an''i Adoni-bezeka tany Bezeka izy, dia niady taminy ka naharesy ny Kananita sy ny Perizita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nefa nandositra Adoni-bezeka;ary nanenjika azy izy ireto ka nisambotra azy, dia nanapaka ny ankihiben-tànany sy ny ankihiben-tongony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy Adoni-bezeka: Mpanjaka fito-polo voatapaka ny ankihiben-tànany sy ny ankihiben-tongony no nitsindroka hanina teo ambanin''ny latabatro; ka mba tahaka ny nataoko ihany lahy ity no navalin''Andriamanitra ahy! Ary nentin''ireo ho any Jerosalema izy ka maty tany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary namely an''i Jerosalema ny taranak''i Joda, ka nahafaka azy, dia namely azy tamin''ny lelan-tsabatra ka nandoro ny tanàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary rehefa afaka izany, dia nidina ny taranak'i Joda hiady amin'ny Kananita izay nonina tany amin'ny tany havoana sy tany amin'ny tany atsimo ary tany amin'ny tany lemaka amoron-tsiraka
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sefela
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nandeha Joda hiady amin''ny Kananita, izay nonina tany Hebrona (Kiriat-arba no anaran''i Hebrona taloha), ka namono an''i Sesay sy Ahimana ary Talmay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia niala tao izy ka nandeha hiady amin''ny mponina any Debira (Kiriata-sefera no anaran''i Debira taloha). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy Kaleba: Izay mamely an''i Kiriata-sefera ka mahafaka azy dia homeko azy Aksa zanako-vavy ho vadiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary Otniela, zanakalahin''i Kenaza, zandrin''i Kaleba, no nahafaka azy; ka dia nomeny azy Aksa zananivavy ho vadiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary rehefa voampakatra ravehivavy, dia nanome vava ny lahy hangataka saha tamin-drainy; dia niala faingana tamin''ny borikiny izy, ka hoy Kaleba taminy: Inona moa no ilainao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy izy: Omeo tso-drano aho; fa tany tsy misy rano no nomenao ahy ka mba omeo loharano koa aho. Dia nomen''i Kaleba azy ny loharano ambony sy ny loharano ambany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary ny taranak'ilay Kenita, zaodahin
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: rafozan'''
    marker-yv: yv-n
  - type: text
    text: '''i Mosesy dia niara-niakatra tamin''ny taranak''i Joda niala tao amin''ny tanàna be rofia'
  - type: usfm
    marker: x
    children:
    - type: text
      text: palma
    marker-yv: yv-n
  - type: text
    text: ' hankany an-efitr''i Joda, atsimon''i Arada nandeha ireo ka nonina teo amin''ny Isiraely.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary Joda nandeha niaraka tamin'i Simeona rahalahiny, dia namely ny Kananita, izay nonina tany Zefata, ka nataony ringana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. herema
    marker-yv: yv-n
  - type: text
    text: ' ireo, ary ny anaran''ny tanàna nataony hoe Horma'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Horma = Herema
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia afak''i Joda Gaza sy ny sisin-taniny an Askelona sy ny sisin-taniny ary Ekrona sy ny sisin-taniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary Jehovah nomba an''i Joda, ka dia azony ny tany havoana; nefa tsy naharoaka ny mponina teny amin''ny tany lemaka izy, satria nanana kalesy vy ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary Hebrona dia nomeny an'i Kaleba, araka izay efa nolazain'i Mosesy, ka noroahin'i Kaleba niala tao izy telo lahy, taranaky ny Anakita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary ny taranak'i Benjamina tsy nandroaka ny Jebosita, izay mponina any Jerosalema; fa ny Jebosita dia miara-monina amin'ny taranak'i Benjamina any Jerosalema ihany mandraka androany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny taranak''i Josefa dia niakatra koa hamely an''i Betela; ary Jehovah nomba azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia naniraka hisafo an''i Betela ny taranak''i Josefa (Lozy no anaran''ny tanàna taloha); '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ary nahita lehilahy anankiray nivoaka avy tao an-tanàna ny mpisafo ka nanao taminy hoe: Mba atoroy kely anay ny fidirana mankao an-tanàna, dia hamindra fo aminao izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia natoron-dralehilahy azy ny fidirana mankao an-tanàna, ka dia nasiany tamin''ny lelan-tsabatra ny tanàna; fa ralehilahy sy ny mpianakaviny rehetra dia navelany handeha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary nandeha ho any amin'ny tanin'ny Hetita ralehilahy, ka nanorina tanàna izy, ary ny anarany dia nataony hoe Lozy, ary mbola izany ihany no anarany mandraka androany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary Manase tsy nahafaka an''i Beti-sana sy ny zana-bohiny, na Tanaka sy ny zana-bohiny, sady tsy naharoaka ny mponina tany Dora sy ny zana-bohiny, na ny mponina tany Ibleama sy ny zana-bohiny, na ny mponina tany Megido sy ny zana-bohiny, satria tian''ny Kananita hitoerana indrindra izany tany izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa rehefa nihahery kosa ny Isiraely, dia nampanaoviny fanompoana ny Kananita. fa tsy nandroaka azy rehetra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary Efraima tsy nandroaka ny Kananita. izay nonina tany Gazera; fa nonina teo aminy tany Gazera ny Kananita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Zebolona tsy nandroaka ny mponina tany Kitrona, na ny mponina tany Nahalola; fa nonina teo aminy ny Kananita ka nampanaovina fanompoana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Asera tsy nandroaka ny mponina tany Ako, na ny mponina tany Sidona, na ny tany Alaba, na ny tany Akziba, na ny tany Helba, na ny tany Afika. na ny tany Rehoba; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'fa nonina teo amin''ny Kananita tompon-tany ny taranak''i Asera, fa tsy nandroaka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Naftaly tsy nandroaka ny mponina tany Beti-semesy, na ny mponina tany Bet-anata; fa nonina teo amin''ny Kananita tompon-tany izy, kanefa nampanaoviny fanompoana ny mponina tany Beti-semesy sy Bet-anata. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary ny Amorita nanesika ny taranak''i Dana ho any amin''ny tany havoana, fa tsy namela azy hidina ho any amin''ny tany lemaka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'fa tian''ny Amorita hitoerana indrindra ny tendrombohitra Heresa sy ny tany Aialona sy Salbima; nefa nahery ny tanan''ny taranak''i Josefa, ka dia nampanaovina fanompoana ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ary ny fari-tanin'ny Amorita dia hatramin'ny fiakarana Akrabima ka hatramin'ilay harambato no ho mankany.
