document_id: PSA.132
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vavaka ho an'ny tranon'Andriamanitra sy ny ankohonan'i Davida
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fihirana fiakarana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Fihirana misy hevitra ambaratonga'
    marker-yv: yv-n
  - type: text
    text: '. Jehovah ô, tsarovy Davida Noho ny fiahiany rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia ilay nianiana tamin''i Jehovah Sy nivoady tamin''ny Maherin''i Jakoba hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tsy mba hiditra ao an-daiko aho, Na hiakatra amin''ny farafara fandriako, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tsy mba havelako hatory ny masoko, Na ho rendrehana ny hodimasoko, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mandra-pahitako fitoerana ho an'i Jehovah. Dia fonenana ho an'ny Maherin'i Jakoba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Indro, nandre azy tany Efrata isika; Nahita azy tao amin'ny saha anaty ala
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tany an-tsahan''i Jara'
    marker-yv: yv-n
  - type: text
    text: ' isika. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aoka hiditra any amin''ny fonenany isika Ka hivavaka eo amin''ny fitoeran-tongony. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mitsangàna, Jehovah ô, ho amin''ny fitsaharanao, Dia Hianao sy ny fiaran''ny herinao. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aoka ny mpisoronao hirafy fahamarinana Ary aoka ny olonao masina hihoby. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Noho ny amin'i Davida mpanomponao Dia aza mampiala maina ny tavan'ny voahosotrao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jehovah efa nianiana tamin''i Davida, Ary marina izany ka tsy hitsoahany Ny ateraky ny kibonao no hapetrako eo ambonin''ny seza fiandriananao. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Raha hotandreman'ny zanakao ny fanekeko Sy ny teny vavolombeloko izay hampianariko azy, Dia hipetraka eo ambonin'ny seza fiandriananao mandrakizay doria kosa ny zanany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa Jehovah efa nifidy an''i Ziona. Ary naniry azy ho fonenany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ity, hoy Izy, no fitsaharako mandrakizay doria; Eto no honenako, fa efa niriko ity. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hotahiko tokoa ny fihinana ao; Hovokisako hanina ny malahelo ao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny mpisorona ao dia hampitafiko famonjena; Ary hihoby tokoa ny olo-masina ao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ao no hampitsimohako tandroka ho an''i Davida Sy hanamboarako jiro ho an''ny voahosotro. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny fahavalony hampitafiko henatra; Fa eo aminy kosa no hamirapiratra ny satro-boninahiny.
