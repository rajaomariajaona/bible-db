document_id: NUM.31,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tafika namaliana ny Midianita
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny tanànany rehetra izay teo amin''ny fonenany sy ny tobiny rehetra dia nodorany tamin''ny afo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nalainy avokoa ny babo rehetra, na olona na biby fiompy, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia nentiny tany amin''i Mosesy sy Eleazara mpisorona ary ny fiangonan''ny Zanak''Isiraely teo an-toby, teo Arbota-moaba, izay eo amoron''i Jordana tandrifin''i Jeriko. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Mosesy sy Eleazara mpisorona ary ny lohan''ny fiangonana rehetra nivoaka hitsena azy teo ivelan''ny toby. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tezitra tamin''ny mpifehy ny miaramila Mosesy, dia tamin''ny mpifehy arivo sy ny mpifehy zato, izay avy tany an-tafika, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka hoy izy taminy: Nahoana no novelominareo ny vehivavy rehetra? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo ihany no nampahadiso ny Zanak''Isiraely tamin''i Jehovah ny amin''i Peora, araka ny tenin''i Balama, ka nahazo ny fiangonan''i Jehovah ny areti-mandringana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ankehitriny, vonoy ny zazalahy madinika rehetra, ary vonoy koa ny vehivavy rehetra izay efa nahalala lahy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny zazavavy rehetra izay tsy mbola nahalala lahy dia velomy ho anareo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary mitobia eo ivelan''ny toby hafitoana; ary izay nahafaty olona na nikasika faty dia samia manadio ny tenany, na ianareo, na ny sambotrareo amin''ny andro fahatelo sy ny andro fahafito. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Valio ny Midianita noho ny nataony tamin''ny Zanak''Isiraely; ary rehefa afaka izany, dia hangonina any amin''ny razanao ianao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fitafiana rehetra, na ny fanaka hoditra, na ny fanaka volon''osy, na ny fanaka hazo, dia diovy avokoa. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Eleazara mpisorona tamin''ny mpanafika, izay efa tany amin''ny ady: Izao no lalàna hotandremana, izay nandidian''i Jehovah''an i Mosesy: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny volamena sy ny volafotsy sy ny varahina sy ny vy sy ny vifotsy ary ny firaka, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia ny zavatra rehetra izay maharitra afo, dia ataovy ao amin''ny afo, dia hadio, kanefa hodiovina amin''ny rano fanadiovana koa izy; ary izay rehetra tsy maharitra afo kosa dia ataovy ao amin''ny rano ihany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary sasao ny fitafianareo amin''ny andro fahafito, dia hadio ianareo; ary rehefa afaka izany, dia mahazo miditra eo amin''ny toby ianareo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alaonao sy Eleazara mpisorona sy ny lohan''ny fianakaviana amin''ny fiangonana ny isan''ny babo izay azo, na olona, na biby fiompy; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary sasaho ny babo ho an''izay niady, dia izay efa tany an-tafika, sy ho an''ny fiangonana rehetra; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'kanefa makà anjara ho an''i Jehovah avy amin''ny mpanafika izay nivoaka ho any an-tafika, dia iray isan-diman-jato, na olona, na omby, na boriky, na ondry aman''osy; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny antsasany izay azy no hanalanao izany ka homenao an''i Eleazara mpisorona ho fanatitra alaina ho an''i Jehovah. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny tamin''ny olona Mosesy ka nanao hoe: Miomàna ho any an-tafika ny sasany aminareo, ary aoka izy hanafika ny Midianita, hahatanteraka ny famalian''i Jehovah azy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny antsasany an''ny Zanak''Isiraely kosa dia analao iray isan-dimam-polo, na olona, na omby, na boriky, na ondry aman''osy, dia ny biby fiompy rehetra, ka omeo ho an''ny Levita, izay mitandrina ny anjara-raharaha momba ny tabernakelin''i Jehovah. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nataon''i Mosesy sy Eleazara mpisorona izany, araka izay efa nandidian''i Jehovah an''i Mosesy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny babo sisa afa-tsy izay azon''ny mpanafika, dia ondry aman''osy dimy arivo amby fito alina sy enina hetsy, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy omby roa arivo amby fito alina, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy boriky arivo amby enina alina, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary olona, dia ny zazavavy izay tsy mbola nahalala lahy, roa arivo amby telo alina. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny antsasany izay anjaran''ny efa tany an-tafika dia izao: ny isan''ny ondry aman''osy dia diman-jato amby fito arivo sy telo alina sy telo hetsy; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny anjaran''i Jehovah avy tamin''ny ondry aman''osy dia dimy amby fito-polo sy enin-jato. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny omby dia enina arivo amby telo alina; ary ny anjaran''i Jehovah avy tamin''ireo dia roa amby fito-polo. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny boriky dia diman-jato amby telo alina; ary ny anjaran''i Jehovah avy tamin''ireo dia iraika amby enim-polo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Arivo lahy avy isam-pirenena amin''ny firenen''Isiraely no hampandehaninareo ho any an-tafika. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny zazavavy dia enina arivo amby iray alina; ary ny anjaran''i Jehovah avy tamin''ireo dia roa amby telo-polo. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nomen''i Mosesy an''i Eleazara mpisorona ny anjara izay nalaina ho an''i Jehovah, araka izay efa nandidian''i Jehovah an''i Mosesy. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary avy tamin''ny antsasany an''ny Zanak''Isiraely, izay nozarain''i Mosesy avy tamin''ny mpanafika '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(fa ny antsasany an''ny fiangonana dia ondry aman''osy dimanjato amby fito arivo sy telo alina sy telo hetsy, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy omby enina arivo amby telo alina, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy boriky diman-jato amby telo alina, '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary olona enina arivo amby iray alina), '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ny antsasany an''ny Zanak''Isiraely dia nanalan''i Mosesy iray isan-dimam-polo, na olona, na biby fiompy, ka nomeny ho an''ny Levita mpitandrina ny anjara-raharaha momha ny tabernakelin''i Jehovah izany, araka izay efa nandidian''i Jehovah an''i Mosesy. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpifehy, izay nifehy ny miaramila, dia ny mpifehy arivo sy ny mpifehy zato, dia nanatona an''i Mosesy '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nanao taminy hoe: Ny mpanomponao efa naka ny isan''ny mpanafika izay nofehezinay, ka tsy misy diso isa aminay na dia lehilahy iray akory aza; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia navahana tamin''ny firenen''Isiraely ny arivo isam-pirenena, dia roa arivo amby iray alina, samy voaomana hiady. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa nitondra fanatitra ho an''i Jehovah izahay, dia ny firavaka volamena efa azonay avy, dia fehin-tanana sy haba sy peratra fanombohan-kase sy kavina ary voavola, hanaovana fanavotana ho an''ny ainay eo anatrehan''i Jehovah. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia noraisin''i Mosesy sy Eleazara mpisorona taminy ny volamena, dia firavaka voatefy avokoa. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny volamena rehetra tamin''ny fanatitra nalain''ny mpifehy arivo sy ny mpifehy zato ho an''i Jehovah, dia sekely dimam-polo amby fiton-jato sy enina arivo sy iray alina '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(fa ny mpanafika samy namabo ho an''ny tenany). '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia noraisin'i Mosesy sy Eleazara mpisorona ny volamena nomen'ny mpifehy arivo sy ny mpifehy zato ka nentiny tao amin'ny trano-lay fihaonana ho fahatsiarovana ho an'ny Zanak'Isiraely eo anatrehan'i Jehovah.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nampandehanin''i Mosesy ho any an-tafika ireo arivo lahy isam-pirenena ireo sy Finehasa, zanak''i Eleazara mpisorona, izay nitondra ny fanaka masina teny an-tànany, dia ny trompetra avo feo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niady tamin''ny Midianita ireo, araka izay efa nandidian''i Jehovah an''i Mosesy; ary namono ny lehilahy rehetra izy '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny mpanjakan''i Midiana dimy lahy dia matiny niaraka tamin''ireny koa, dia Evy sy Rekema sy Zora sy Hora ary Reba; ary Balama, zanak''i Beora, koa dia novonoiny tamin''ny sabatra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny Zanak''Isiraely namabo ny vehivavy Midianita sy ny zanany madinika; ary nobaboiny avokoa ny biby fiompiny rehetra sy ny omby aman''ondriny rehetra ary ny fananany rehetra. '
