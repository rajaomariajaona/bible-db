document_id: PSA.75
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahakaikin'ny Mpitsara, sy ny kapoaky ny fahatezerany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an'ny mpiventy hira. Al-tasheth. Salamo nataon'i Asafa. Tonon-kira. Hisaoranay Hianao, Andriamanitra ô; eny, hisaoranay Hianao; fa akaiky ny anaranao; mitory ny fahagagana ataonao ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa ho avy tokoa amin''ny fotoana Aho; eny, Izaho no hitsara marina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mihorohoro ny tany sy ny mponina rehetra eo aminy, nefa Izaho no nanorina ny andriny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hoy izaho tamin''ny mpirehareha: aza mirehareha'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Hoy izaho tamin''ny adala: Aza manao adala'
    marker-yv: yv-n
  - type: text
    text: ', ary tamin''ny ratsy fanahy: aza manandra-tandroka; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Aza manandratra ny tandrokareo ho avo; ary aza miteny sahisahy amin''ny fahamafian-katoka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa tsy avy any atsinanana, na avy any andrefana, na avy any atsimo, ny fisandratana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Na avy amin''ny efitra ny tendrombohitra no ihavian''ny fitsarana'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa Andriamanitra no Mpitsara; mampietry ny anankiray Izy ary manandratra ny anankiray kosa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa misy kapoaka eo an-tànan'i Jehovah, feno divay mandroatra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mena'
    marker-yv: yv-n
  - type: text
    text: ' miharoharo zavatra iny, ka ampisotroany; eny, ny ratsy fanahy rehetra amin''ny tany dia hitroka ny faikany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa izaho hanambara izany mandrakizay, ka hankalaza an''Andriamanitr''i Jakoba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary ny tandroky ny ratsy fanahy rehetra hotapahiko; fa ny tandroky ny marina kosa no hasandratra.
