document_id: PSA.75,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahakaikin'ny Mpitsara, sy ny kapoaky ny fahatezerany
  - type: text
    content: Ho an'ny mpiventy hira. Al-tasheth. Salamo nataon'i Asafa. Tonon-kira. Hisaoranay Hianao, Andriamanitra ô; eny, hisaoranay Hianao; fa akaiky ny anaranao; mitory ny fahagagana ataonao ny olona.
  '10':
  - type: text
    content: Ary ny tandroky ny ratsy fanahy rehetra hotapahiko; fa ny tandroky ny marina kosa no hasandratra.
  '2':
  - type: text
    content: 'Fa ho avy tokoa amin''ny fotoana Aho; eny, Izaho no hitsara marina. '
  '3':
  - type: text
    content: Mihorohoro ny tany sy ny mponina rehetra eo aminy, nefa Izaho no nanorina ny andriny.
  '4':
  - type: text
    content: 'Hoy izaho tamin''ny mpirehareha: aza mirehareha'
  - type: note
    content: 'Na: Hoy izaho tamin''ny adala: Aza manao adala'
  - type: text
    content: ', ary tamin''ny ratsy fanahy: aza manandra-tandroka; '
  '5':
  - type: text
    content: 'Aza manandratra ny tandrokareo ho avo; ary aza miteny sahisahy amin''ny fahamafian-katoka. '
  '6':
  - type: text
    content: Fa tsy avy any atsinanana, na avy any andrefana, na avy any atsimo, ny fisandratana
  - type: note
    content: 'Na: Na avy amin''ny efitra ny tendrombohitra no ihavian''ny fitsarana'
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Fa Andriamanitra no Mpitsara; mampietry ny anankiray Izy ary manandratra ny anankiray kosa. '
  '8':
  - type: text
    content: Fa misy kapoaka eo an-tànan'i Jehovah, feno divay mandroatra
  - type: note
    content: 'Na: mena'
  - type: text
    content: ' miharoharo zavatra iny, ka ampisotroany; eny, ny ratsy fanahy rehetra amin''ny tany dia hitroka ny faikany.'
  '9':
  - type: text
    content: 'Fa izaho hanambara izany mandrakizay, ka hankalaza an''Andriamanitr''i Jakoba. '
