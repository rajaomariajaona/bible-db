document_id: ACT.22,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandaharan'i Paoly teny teo anatrehan'ny Synedriona
  - type: text
    content: 'Ry rahalahy sy ianareo ray henoy ny teny halahatro aminareo ankehitriny hanala tsiny ny tenako. '
  '10':
  - type: text
    content: 'Ary hoy izaho: Tompoko, inona no hataoko? Dia hoy ny Tompo tamiko: Mitsangana, ka mandehana ho any Damaskosy; fa any no holazaina aminao izay rehetra voatendry hataonao. '
  '11':
  - type: text
    content: 'Ary raha tsy nahajery aho noho ny famirapiratan''izany mazava izany, dia notantanan''ireo niaraka tamiko aho, ka dia tonga tany Damaskosy. '
  '12':
  - type: text
    content: 'Ary ny lehilahy anankiray atao hoe Ananiasy, mpivavaka manaraka ny lalàna sady tsara laza teo amin''ny Jiosy rehetra izay nonina teo, '
  '13':
  - type: text
    content: 'dia nanatona ahy ary nitsangana ka nanao tamiko hoe: Ry Saoly rahalahy, mahirata. Ary tamin''izany ora izany dia nahiratra aho ka nahita azy. '
  '14':
  - type: text
    content: 'Ary hoy izy: Andriamanitry ny razantsika efa nanendry anao hahafantatra ny sitrapony sy hahita ny Iray Marina ary hihaino ny teny aloaky ny vavany; '
  '15':
  - type: text
    content: 'fa ho vavolombelony amin''ny olona rehetra ianao ny amin''izay efa hitanao sy renao. '
  '16':
  - type: text
    content: 'Ary ankehitriny inona no mampijanona anao? Mitsangàna, miantsoa ny anarany, ary aoka hatao batisa ianao ka hosasana ho afaka amin''ny fahotanao. '
  '17':
  - type: text
    content: 'Ary rehefa tonga tany Jerosalema indray aho ka nivavaka teo an-kianjan''ny tempoly, dia azon-tsindrimandry '
  '18':
  - type: text
    content: 'ka nahita Azy milaza amiko hoe: Maladia ianao, ka mivoaha faingana an''i Jerosalema; fa tsy handray ny fanambaranao Ahy izy. '
  '19':
  - type: text
    content: 'Dia hoy izaho: Tompoko, izy ireo mahalala fa ny mino Anao dia nataoko tao an-tranomaizina sady nokapohiko tao amin''ny synagoga rehetra; '
  '2':
  - type: text
    content: 'Ary nony ren''ny olona fa teny Hebreo no nitenenany taminy, dia mainka nangina izy; ary hoy Paoly: '
  '20':
  - type: text
    content: 'ary raha nalatsaka ny ran''i Stefana martioranao, izaho koa dia mba nitsangana teo ka nanaiky sady nitandrina ny fitafian''izay namono azy. '
  '21':
  - type: text
    content: 'Ary hoy Izy tamiko: Mandehana, fa Izaho haniraka anao handeha lavitra any amin''ny jentilisa. '
  '22':
  - type: text
    content: 'Ary ny olona nihaino azy hatramin''izany teny izany, dia nanandratra ny feony ka nanao hoe: Esory amin''ny tany ilehio, fa tsy tokony hovelomina izy! '
  '23':
  - type: text
    content: 'Ary raha niantso sy niala lamba ary nanipy vovoka ho amin''ny rivotra izy, '
  '24':
  - type: text
    content: 'dia nasain''ny mpifehy arivo ho entina any anati-rova Paoly, ary nasainy hadinina amin''ny kapoka, mba hahafantarany izay fototry ny nanakoran''ny olona azy toy izany. '
  '25':
  - type: text
    content: 'Ary raha namatotra azy tamin''ny kofehy hoditra izy, dia hoy Paoly tamin''ny kapiteny izay hitsangana teo: Mety aminareo va ny mikapoka lehilahy Romana izay tsy mbola nohelohina? '
  '26':
  - type: text
    content: 'Ary ny kapiteny, nony nahare, dia lasa nilaza tamin''ny mpifehy arivo ka nanao hoe: Inona izao hataonao izao? fa Romana io lehilahy io. '
  '27':
  - type: text
    content: 'Dia nankeo aminy ny mpifehy arivo ka nanao taminy hoe: Lazao amiko: Romana va ianao? Dia hoy izy: Eny. '
  '28':
  - type: text
    content: 'Ary ny mpifehy arivo namaly hoe: Vola be no nahazoako izany voninahitra izany. Fa hoy Paoly: Izaho kosa efa nanana izany hatry ny fony vao teraka. '
  '29':
  - type: text
    content: Dia nandao azy faingana ireo olona efa hanadina azy; ary ny mpifehy arivo natahotra koa, rehefa nahalala azy fa Romana, satria efa nampamatotra azy izy.
  '3':
  - type: text
    content: 'Izaho lehilahy Jiosy, teraka tany Tarsosy any Kilikia, fa teto amin''ity tanàna ity no nahabe ahy teo anilan''ny tongotr''i Gamaliela, dia nampianarina tsara ny lalàna avy tamin''ny razana aho, ary nazoto indrindra ho an''Andriamanitra tahaka anareo rehetra ankehitriny. '
  '30':
  - type: text
    content: Ary nony ampitso, satria ta-hahafantatra marina izay niampangan'ny Jiosy azy ny mpifehy arivo, dia namaha azy, ary nasainy niangona ny lohan'ny mpisorona sy ny Synedriona rehetra, ary Paoly nentiny nidina ka nampitoeriny teo anatrehany.
  '4':
  - type: text
    content: Nanenjika izay nanaiky izany fampianarana
  - type: note
    content: Gr. lalana
  - type: text
    content: ' izany aho hatramin''ny mahafaty azy aza, dia namatotra azy, na lahy na vavy, ka nanolotra azy hatao an-tranomaizina; '
  '5':
  - type: text
    content: 'ary ny mpisoronabe sy ny loholona rehetra no vavolombeloko, sady izy no nandraisako taratasy ho amin''ny rahalahy, dia nankany Damaskosy aho, mba ho entiko am-patorana hankany Jerosalema koa izay hita teo, mba hampijalina. '
  '6':
  - type: text
    content: 'Ary raha nandeha aho ka mby teo akaiky an''i Damaskosy, tamin''ilay antoandrobe iny, dia nisy mazava lehibe nanelatrelatra tampoka avy tany an-danitra manodidina ahy; '
  '7':
  - type: text
    content: 'dia lavo tamin''ny tany aho ka nandre feo nilaza tamiko hoe: Saoly, Saoly, nahoana ianao no manenjika Ahy? '
  '8':
  - type: text
    content: 'Ary izaho namaly hoe: Iza moa Hianao, Tompoko? Dia hoy Izy tamiko: Izaho no Jesosy avy any Nazareta, Izay enjehinao. '
  '9':
  - type: text
    content: 'Ary izay niaraka tamiko dia nahita ny mazava; nefa tsy mba nahare ny feon''izay niteny tamiko izy. '
