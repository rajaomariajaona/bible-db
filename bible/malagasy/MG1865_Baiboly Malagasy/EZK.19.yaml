document_id: EZK.19
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary manaova hira fahalahelovana ny amin''ireo andrianan''ny Isiraely ianao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka ataovy hoe: Nahoana ny liom-bavy reninareo no namitsaka'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Inona moa reninareo? Liom-bavy izy. Namitsaka'
    marker-yv: yv-n
  - type: text
    text: ' tao amin''ny liom-bavy. Ary nitaiza ny zanany tao amin''ny liona tanora? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nahalehibe ny zanany anankiray izy, dia tonga liona tanora io ka nianatra hamiravira haza sady nihinana olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nahare ny lazany ny firenena, dia namandrika azy tamin''ny lavaka, ka nasiany masom-by ny orony, dia nentiny ho any amin''ny tany Egypta izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nony hitan''ny liom-bavy fa foana sy levona ny fanantenany, dia nangalany indray ny zanany ka notezainy ho tonga liona tanora. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nivoivoy teny amin''ny liom-bavy iny, dia tonga liona tanora ka nianatra hamiravira haza sady nihinana olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary nisavika ny mpitondratenan'ireny izy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ary fantany ny lapan''ireny'
    marker-yv: yv-n
  - type: text
    text: ' sady nandrava ny tanànany, ka lao ny tany mbamin''izay rehetra tao aminy. Noho ny feon''ny fierony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny jentilisa manodidina, izay avy any amin''ny fanjakana samy hafa, dia nanamboatra sy namelatra ny fandrika haratony taminy, ka dia voafandrika tamin''ny lavaka izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nataony tamin''ny vata izy, sady nasiany masom-by ny orony, ka nentiny ho any amin''ny mpanjakan''i Babylona izy, nentiny ho ao amin''ny fiarovana izy, mba tsy ho re eny amin''ny tendrombohitry ny Isiraely intsony ny feony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny reninao dia tahaka ny voalobota voavoly teo amoron-drano Tamin'ny andro niadananao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Fony tamin''ny rànao ianao; izahao xvi. 6; na: Eny, tahaka ny tenanao'
    marker-yv: yv-n
  - type: text
    text: ': Vokatra sady nanaroka izy azon''ny rano be, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ka nisy rantsany mafy azo natao tehim-panjakana ho an''izay manapaka, dia tonga avo izy ka nitehika tamin''ny rahona matevina, ary niseho tamin''ny hahavony izy noho ny hamaroan''ny rantsany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nefa nongotana tamin''ny fahavinirana izy ka nazera ho amin''ny tany, ary ny rivotra avy any atsinanana no nahamaina ny voany; Ny rantsany mafy dia tapaka ka maina; Levon''ny afo ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ankehitriny voavoly any an-efitra, dia ao amin''ny tany maina karankaina izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary afo no mivoaka avy amin'ny sampany misy tehina ka mandevona ny voany, dia tsy misy rantsany mafy azo atao tehim-panjakana ho fanapahana intsony izy. Hira fahalahelovana izany sady mbola ho hira fahalahelovana ihany.
