document_id: EZK.19,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary manaova hira fahalahelovana ny amin''ireo andrianan''ny Isiraely ianao, '
  '10':
  - type: text
    content: Ny reninao dia tahaka ny voalobota voavoly teo amoron-drano Tamin'ny andro niadananao
  - type: note
    content: 'Na: Fony tamin''ny rànao ianao; izahao xvi. 6; na: Eny, tahaka ny tenanao'
  - type: text
    content: ': Vokatra sady nanaroka izy azon''ny rano be, '
  '11':
  - type: text
    content: 'Ka nisy rantsany mafy azo natao tehim-panjakana ho an''izay manapaka, dia tonga avo izy ka nitehika tamin''ny rahona matevina, ary niseho tamin''ny hahavony izy noho ny hamaroan''ny rantsany. '
  '12':
  - type: text
    content: 'Nefa nongotana tamin''ny fahavinirana izy ka nazera ho amin''ny tany, ary ny rivotra avy any atsinanana no nahamaina ny voany; Ny rantsany mafy dia tapaka ka maina; Levon''ny afo ireny. '
  '13':
  - type: text
    content: 'Ary ankehitriny voavoly any an-efitra, dia ao amin''ny tany maina karankaina izy. '
  '14':
  - type: text
    content: Ary afo no mivoaka avy amin'ny sampany misy tehina ka mandevona ny voany, dia tsy misy rantsany mafy azo atao tehim-panjakana ho fanapahana intsony izy. Hira fahalahelovana izany sady mbola ho hira fahalahelovana ihany.
  '2':
  - type: text
    content: 'ka ataovy hoe: Nahoana ny liom-bavy reninareo no namitsaka'
  - type: note
    content: 'Na: Inona moa reninareo? Liom-bavy izy. Namitsaka'
  - type: text
    content: ' tao amin''ny liom-bavy. Ary nitaiza ny zanany tao amin''ny liona tanora? '
  '3':
  - type: text
    content: 'Ary nahalehibe ny zanany anankiray izy, dia tonga liona tanora io ka nianatra hamiravira haza sady nihinana olona. '
  '4':
  - type: text
    content: 'Nahare ny lazany ny firenena, dia namandrika azy tamin''ny lavaka, ka nasiany masom-by ny orony, dia nentiny ho any amin''ny tany Egypta izy. '
  '5':
  - type: text
    content: 'Ary nony hitan''ny liom-bavy fa foana sy levona ny fanantenany, dia nangalany indray ny zanany ka notezainy ho tonga liona tanora. '
  '6':
  - type: text
    content: 'Ary nivoivoy teny amin''ny liom-bavy iny, dia tonga liona tanora ka nianatra hamiravira haza sady nihinana olona. '
  '7':
  - type: text
    content: Ary nisavika ny mpitondratenan'ireny izy
  - type: note
    content: 'Na: Ary fantany ny lapan''ireny'
  - type: text
    content: ' sady nandrava ny tanànany, ka lao ny tany mbamin''izay rehetra tao aminy. Noho ny feon''ny fierony. '
  '8':
  - type: text
    content: 'Ary ny jentilisa manodidina, izay avy any amin''ny fanjakana samy hafa, dia nanamboatra sy namelatra ny fandrika haratony taminy, ka dia voafandrika tamin''ny lavaka izy. '
  '9':
  - type: text
    content: 'Ary nataony tamin''ny vata izy, sady nasiany masom-by ny orony, ka nentiny ho any amin''ny mpanjakan''i Babylona izy, nentiny ho ao amin''ny fiarovana izy, mba tsy ho re eny amin''ny tendrombohitry ny Isiraely intsony ny feony. '
