document_id: JOB.32
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny teny nataon'i Eliho
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nitsahatra tsy namaly intsony izy telo lahy ireo, satria nanamarin-tena Joba. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nirehitra kosa ny fahatezeran''i Eliho, zanak''i Barakela, Bozita, avy amin''ny fokon''i Rama; eny, tamin''i Joba no nirehetan''ny fahatezerany, satria nanao ny tenany ho marina noho Andriamanitra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary tamin'ny sakaizany telo lahy koa no nirehetan'ny fahatezerany, satria tsy nahita teny havaliny izy ireo, kanefa nanameloka an'i Joba
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: teny havaliny an''i Joba hanamelohany azy'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Eliho mbola niandry an-dr''i Joba aloha vao niteny, fa ireo no ela niainana kokoa noho izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary rehefa hitany fa tsy nanan-kavaly izy telo lahy, dia nirehitra ny fahatezerany; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ka dia niteny Eliho, zanak''i Barakela, Bozita, ka nanao hoe: Mbola tanora aho, fa ianareo kosa efa fotsy volo, koa dia niaoriandriana aho aloha, fa tsy sahy nanambara aminareo izay fantatro.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hoy izaho: Aoka ny fahanterana no hiteny, ary aoka ny hamaroan''ny taona no hampianatra fahendrena.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Kanefa ny fanahy izay ao anatin'ny zanak'olombelona sy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Dia'
    marker-yv: yv-n
  - type: text
    text: ' ny fofonoin''ny Tsitoha no mahahendry azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tsy dia ny fahalehibiazana no mahahendry, ary tsy dia ny fahanterana no ahalalana ny rariny;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary noho izany dia hoy izaho: Aoka samy hihaino ahy; Izaho koa mba hanambara izay fantatro.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Indro, niandry ny teninareo aho, ary nandinika ny teny nalahatrareo, mandra-pihevitrareo izay holazaina;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eny, nihaino dia nihaino anareo aho, fa he! tsy nisy naharesy lahatra an'i Joba ianareo, na nahavaly ny teniny akory;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fandrao ianareo hanao hoe: Hitanay ny fotony'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. fahendrena
    marker-yv: yv-n
  - type: text
    text: ': Andriamanitra no maharesy azy, fa tsy olona.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tsy nandaha-teny hamely ahy anefa izy; Ary tsy araka ny teninareo no havaliko azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Very hevitra terỳ izy ireo, ka tsy namaly intsony; Efa nanalavitra azy ny teny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hangina va aho, raha tsy miteny izy ireo, fa mijanona foana izy ka tsy mamaly intsony?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Anjarako kosa izao, koa dia hamaly aho; Eny, izaho hanambara izay fantatro;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa feno teny ny foko; Manery ahy ny fanahy ato anatiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Endrey! ny ato anatiko dia efa tahaka ny divay izay tsy misy hiainana, efa ho triatra tahaka ny siny hoditra vaovao izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Hiteny aho mba hisy hiainako tsara; Hiloa-bava aho ka hamaly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Aoka tsy hizaha tavan'olona akory aho, ary aoka tsy handrobo olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa tsy mba mahay mandrobo aho; Raha izany, dia halain'ny Mpanao ahy faingana aho.
