document_id: JER.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tsy hahafahan'ny olona amin'ny loza, na dia efa nifonan'i Jeremia tamin'Andriamanitra aza izy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny tenin'i Jehovah izay tonga tamin'i Jeremia ny amin'ny mosary.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Misaona ny Joda, ary mitanondrika ny vavahadiny; Mitafy lamba fioriana izy ka mipetraka amin''ny tany; Ary miakatra ny fitarainan''i Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny lehibeny maniraka ny madinika hantsaka rano; Dia tonga any amin''ny lavaka famorian-drano ireny, nefa tsy mahita rano ka miverina mitondra loha mody; Menatra sy mangaihay izy ka misaron-doha. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Noho ny fangentan
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: satria tora-kovitra'
    marker-yv: yv-n
  - type: text
    text: '''ny tany, noho ny tsy nilatsahan''ny ranonorana taminy, dia menatra ny mpiasa ka misaron-doha. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary na dia ny dieravavy any an-tsaha aza, raha miteraka, dia mahafoy noho ny tsi-fisian''ny ahi-maitso. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary ny borikidia mijanona eny an-tendrombohitra mangadihady, mihanahana maniry ny rivotra toy ny amboadia
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: jakala'
    marker-yv: yv-n
  - type: text
    text: ' izy; Manjambena ny masony noho ny tsi-fisian''ny ahitra. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ry Jehovah ô, na dia miampanga anay aza ny helokay, miasà ihany Hianao noho ny anaranao; Fa be ny fiodinanay, taminao no nanotanay. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ry Fanantenan''ny Isiraely ô, Mpamonjy azy amin''ny andro fahoriana! Nahoana Hianao no dia toy ny vahiny amin''ny tany ary toy ny mpandeha izay manorin-day handry indray alina monja? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nahoana Hianao no dia toy ny olona ankona ary toy ny lehilahy mahery tsy mahavonjy? Nefa mbola ato aminay ihany Hianao, Jehovah ô, ary ny anaranao dia efa nantsoina taminay; Aza dia mandao anay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izao no lazain''i Jehovah amin''ity firenena ity: Te-hirenireny toy izao izy, ka tsy mahajanona ny tongony; Tsy sitrak''i Jehovah izy, Ankehitriny dia tsaroany ny helony, ary valiany ny fahotany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy Jehovah tamiko: Aza mivavaka ho an''ity firenena ity hahasoa azy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa na dia mifady hanina aza izy, dia tsy hihaino ny fitarainany Aho; Ary na dia manatitra fanatitra dorana sy fanatitra hohanina aza izy, dia tsy hankasitraka azy Aho, fa haripako amin''ny sabatra sy ny mosary ary ny areti-mandringana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy izaho: Indrisy, Jehovah Tompo ô! Indreo ny mpaminany manao aminy hoe: Tsy hiharan''ny sabatra ianareo, ary tsy ho mosarena; Fa homeko fiadanana maharitra eto amin''ity tany ity ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy Jehovah tamiko: Ireo mpaminany ireo dia maminany lainga amin''ny anarako; Tsy naniraka azy Aho, na nandidy azy, na niteny taminy; Fa fahitana mandainga sy faminaniana tsy marina ary tsinotsinona sy fitaky ny fony no aminaniany aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Koa izao no lazain''i Jehovah ny amin''ireo mpaminany izay maminany amin''ny Anarako ireo nefa tsy nirahiko tsinona ka milaza fa tsy hisy sabatra sy mosary eto amin''ity tany ity: Ny sabatra sy ny mosary indrindra no handringanana ireo mpaminany ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ny firenena izay aminanian''ireo koa dia hiely faty eny an-dalamben''i Jerosalema noho ny mosary sy ny sabatra, ka tsy hisy mpandevina ireny, na ny tenany, na ny vadiny, na ny zananilahy, na ny zananivavy, fa haidiko ao aminy ny faharatsiany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa lazao aminy izao teny izao: Ny ranomasoko hijononoka andro aman''alina ka tsy hitsahatra; Fa ny oloko, zanakavavy virijina, naratra mafy dia mafy tamin''ny kapoka maharary indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Raha mivoaka any an-tsaha aho, dia indreny ny matin-tsabatra! Ary raha miditra ao an-tanàna kosa aho, dia indreo ny anan'ny mosary! Eny, ny mpaminany sy ny mpisorona dia mirenireny mankamin'ny tany tsy fantany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ka tsy mahalala'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Efa narianao tokoa va Joda? Efa naharikoriko ny fanahinao va Ziona? Nahoana no dia mamely anay Hianao, ka efa tsy mety sitrana izahay? Nanantena fiadanana izahay, kanjo tsy nahita asa, ary andro fanasitranana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fahafinaretana'
    marker-yv: yv-n
  - type: text
    text: ', fa indro fampitahorana. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jehovah ô, tsaroanay ny faharatsianay sy ny heloky ny razanay; Fa efa nanota taminao izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Noho ny amin''ny anaranao dia aza arianao izahay; Aza atao ho tsinontsinona ny seza fiandrianan''ny voninahitrao; Tsarovy, ka aza tsoahanao ny fanekenao taminay. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Mba misy mahalatsaka ranonorana va ireny sampin
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. zava-poanan'
    marker-yv: yv-n
  - type: text
    text: '''ny jentilisa ireny? Na mahay mandatsaka ranonorana mivatravatra va ny lanitra? Fa tsy Hianao ihany va no Izy, ry Jehovah Andriamanitray ô? Koa manantena Anao izahay, satria Hianao no nanao ireo zavatra rehetra ireo.'
