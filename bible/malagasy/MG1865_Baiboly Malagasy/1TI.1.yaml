document_id: 1TI.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiarahabana sy anatra ny amin'ny mpampianatra sandoka, ary filazana ny amin'ny lalàna sy ny filazantsara ary ny fahasoavan'Andriamanitra tamin'i Paoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paoly, Apostolin''i Kristy Jesosy araka ny didin''Andriamanitra, Mpamonjy antsika, sy Kristy Jesosy fanantenantsika, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mamangy an''i Timoty, tena zanako amin''ny finoana: fahasoavana, famindram-po, fiadanana avy amin''Andriamanitra Ray sy Kristy Jesosy Tompontsika. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Toy ny nangatahako anao hitoetra any Efesosy, rehefa hankany Makedonia aho, mba handidianao ny sasany tsy hanao fampianarana hafahafa, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'na hitandrina ny anganongano sy ny tantaram-pirazanana tsy hita lany izay mahatonga ady hevitra, fa tsy mampandroso ny fitondrana araka an''Andriamanitra amin''ny finoana, dia toy izany koa no ataoko ankehitriny. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa ny anton''ny didy dia fitiavana avy amin''ny fo madio sy ny fieritreretana tsara ary ny finoana tsy mihatsaravelatsihy, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'izay nivilian''ny sasany, ka nania ho amin''ny taria foana izy, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia olona izay te-ho mpampiana-dalàna, kanefa tsy fantany akory izay lazainy na izay itompoany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nefa fantatsika fa tsara ny lalàna, raha entin''ny olona araka izay antony, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ka fantany fa tsy ny olona marina no nanaovana ny lalàna, fa ny mpandika lalàna sy ny maditra, dia ny tsy matahotra an''Andriamanitra sy ny mpanota, ny olona tsy manaja izay masina sy ny olona vetaveta, ny mpamono ray sy ny mpamono reny, ny mpamono olona, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ny mpijangajanga, ny sodomita, ny mpangalatra olona, ny mpandainga, ny mpianian-tsy tò, ary na inona na inona manohitra ny fampianarana tsy misy kilema
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. salama
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'araka ny filazantsaran''ny voninahitr''Andriamanitra finaritra, izay natolotra ho adidiko. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Misaotra an''i Kristy Jesosy Tompontsika aho, Izay nampahery ahy, fa nataony mahatoky aho ka notendreny ho amin''ny fanompoana, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: dia izaho, izay mpiteny ratsy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. mpanao blasfemia; izahao Mat. 9,3
    marker-yv: yv-n
  - type: text
    text: ' fahiny sady mpanenjika sy mpampahory; kanefa nahazo famindram-po aho, satria tamin''ny tsi-fahalalana no nanaovako izany noho ny tsi-finoana. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa be indrindra ny fahasoavan''ny Tompontsika tamin''ny finoana sy ny fitiavana, izay ao amin''i Kristy Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mahatoky ka tokony hekena amin''ny fankasitrahana rehetra izao teny izao: tonga tetỳ ambonin''ny tany Kristy Jesosy hamonjy ny mpanota, ary amin''ireny izaho no lohany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Kanefa izao no namindrana fo tamiko, dia ny mba hasehon''i Jesosy Kristy eo amiko, izay lohany, ny fahari-po rehetra ho fianarana ho an''izay hino Azy hahazoana fiainana mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ho an''ny Mpanjaka tsy manan-taloha, tsy mety maty, tsy hita, dia ho an''Andriamanitra tokana ihany anie ny laza sy ny voninahitra mandrakizay mandrakizay. Amena. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Izao didy izao no omeko anao, ry Timoty zanako, araka ireo faminaniana natao fahiny ny aminao ireo, mba ho entinao miady ny ady tsara ireo, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'amin''ny itananao ny finoana sy ny fieritreretana tsara, izay efa narian''ny sasany, ka toy ny olona vaky sambo izy ny amin''ny finoana; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: naman'ireny Hymeneo sy Aleksandro, izay natolotro ho an'i Satana mba hofaizana tsy hiteny ratsy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. hanao blasfemia, izahao Mat. 9,3
    marker-yv: yv-n
  - type: text
    text: .
