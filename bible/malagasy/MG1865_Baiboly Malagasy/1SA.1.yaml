document_id: 1SA.1,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahaterahan'i Samoela, sy ny nanolorana azy ho an'i Jehovah
  - type: text
    content: 'Ary nisy lehilahy Efraimita anankiray tany Ramataima-zofima any amin''ny tany havoan''i Efraima, Elkana no anarany zanak''i Jerohama, zanak''i Eliho, zanak''i Toho, zanak''i Zofa. '
  '10':
  - type: text
    content: 'Ary Hana dia nalahelo fanahy indrindra, ka nivavaka tamin''i Jehovah izy sady nitomany dia nitomany. '
  '11':
  - type: text
    content: 'Ary nivoady izy ka nanao hoe: Jehovah, Tompon''ny maro, raha mba hitsinjo tokoa ny alahelon''ny ankizivavinao Hianao ka hahatsiaro ahy ary tsy hanadino ny ankizivavinao, fa hanome ahy zazalahy, dia homeko ho an''i Jehovah kosa izy amin''ny andro rehetra hiainany, ka tsy hokasihin-kareza ny lohany.'
  '12':
  - type: text
    content: 'Ary raha mbola naharitra nivavaka teo anatrehan''i Jehovah izy, dia nodinihin''i Ely ny vavany. '
  '13':
  - type: text
    content: 'Fa niteny anakampo Hana, ka ny molony ihany no nihetsiketsika, fa ny feony tsy re akory; ka dia nataon''i Ely fa mamo izy. '
  '14':
  - type: text
    content: 'Dia hoy Ely taminy: Mandrapahoviana no ho mamo ianao? Esory aminao ny divainao. '
  '15':
  - type: text
    content: 'Dia namaly Hana ka nanao hoe: Tsia, tompoko; vehivavy malahelo fanahy aho, fa tsy nisotro divay na toaka tsy akory, fa mamoaka ny ato am-poko eto anatrehan''i Jehovah aho. '
  '16':
  - type: text
    content: 'Aza mba atao ho vehivavy tena ratsy fanahy ny ankizivavinao; fa ny haben''ny fahoriako sy ny alaheloko no nitenenako mandraka ankehitriny. '
  '17':
  - type: text
    content: 'Dia namaly Ely ka nanao hoe: Mandehana soa aman-tsara; ary homen''Andriamanitry ny Isiraely anao anie izay nangatahinao taminy. '
  '18':
  - type: text
    content: 'Ary hoy izy: Aoka hahita fitia eo imasonao ny ankizivavinao. Dia lasa nandeha ravehivavy, ary nihinana izy ka tsy nalahelo tarehy intsony. '
  '19':
  - type: text
    content: 'Ary nifoha maraina koa izy ireo ka nivavaka teo anatrehan''i Jehovah, dia lasa nody ka tonga tao an-tranony tany Rama; ary Elkana nahalala an''i Hana vadiny, ary Jehovah nahatsiaro azy. '
  '2':
  - type: text
    content: 'Ary namporafy izy, Hana no anaran''ny vadiny anankiray, ary Penina no anaran''ny anankiray; ary Penina nanan-janaka, fa Hana kosa tsy mba nanana. '
  '20':
  - type: text
    content: Ary tamin'ny fahatanterahan'ny andro dia nanan'anaka Hana ka nitera-dahy, ary ny anarany nataony hoe Samoela
  - type: note
    content: Samoela = Nohenoin'Andriamanitra (?)
  - type: text
    content: ', fa hoy izy: Tamin''i Jehovah no nangatahako azy. '
  '21':
  - type: text
    content: 'Ary ralehilahy Elkana sy ny ankohonany rehetra niakatra hamono zavatra mba hanaterany ny fanatitra fanao isan-taona ho an''i Jehovah sy ny fanalam-boadiny. '
  '22':
  - type: text
    content: 'Fa Hana kosa tsy mba niakatra; fa hoy izy tamin''ny vadiny: Aoka aloha mandra-panoty ny zaza, fa amin''izay aho vao hitondra azy hiseho eo anatrehan''i Jehovah, ka hitoetra ao mandrakizay izy. '
  '23':
  - type: text
    content: 'Ary hoy Elkana vadiny taminy: Ataovy ary izay tianao; mitoera ihany mandra-panotinao azy; ary hefain''i Jehovah anie ny teniny. Dia nitoetra ravehivavy ka nampinono ny zanany mandra-panotiny azy. '
  '24':
  - type: text
    content: Ary nony efa maoty ny zaza, vao nentiny niakatra niaraka taminy izy mbamin'ny vantotr'ombilahy telo
  - type: note
    content: 'Na: (izay efa telo taona)'
  - type: text
    content: ' sy koba iray efaha ary divay iray tavoara'
  - type: note
    content: 'Na: siny hoditra'
  - type: text
    content: ', ka nentiny ho ao an-tranon''i Jehovah tao Silo izy; ary mbola kely ny zaza. '
  '25':
  - type: text
    content: 'Dia novonoiny ny vantotr''ombilahy iray, ary nentiny ho ao amin''i Ely ny zaza. '
  '26':
  - type: text
    content: 'Ary hoy Hana: Tompoko ô, raha velona koa ny ainao, tompoko, izaho ilay vehivavy nitsangana teto anilanao ka nivavaka tamin''i Jehovah. '
  '27':
  - type: text
    content: 'Ny hahazoako ity zazalahy ity no nivavahako; dia nomen''i Jehovah ahy izay nangatahiko taminy. '
  '28':
  - type: text
    content: 'Koa atolotro ho an''i Jehovah kosa izy: eny, amin''ny andro rehetra hiainany dia voatolotra ho an''i Jehovah izy. Dia nivavaka tamin''i Jehovah izy.'
  '3':
  - type: text
    content: 'Ary ralehilahy niakatra isan-taona niala tamin''ny tanànany hivavaka sy hamono zavatra hatao fanatitra ho an''i Jehovah, Tompon''ny maro, tao Silo. Ary tao izy mirahalahy, zanak''i Ely, dia Hofinia sy Finehasa, mpisoron''i Jehovah. '
  '4':
  - type: text
    content: 'Ary tamin''ny andro namonoan''i Elkana zavatra hatao fanatitra dia samy nomeny anjara iray avy Penina vadiny sy ny zananilahy ary ny zananivavy rehetra. '
  '5':
  - type: text
    content: 'Fa Hana kosa nomeny anjaran-droa, satria izy no tiany, nefa nataon''i Jehovah momba. '
  '6':
  - type: text
    content: 'Ary ny rafiny dia nanorisory azy mba hampalahelo azy mafy noho ny nanaovan''i Jehovah azy momba. '
  '7':
  - type: text
    content: 'Ary izany no fanaon''i Elkana isan-taona, raha niakatra ho any an-tranon''i Jehovah Hana, ary izany koa no nanorisoren''ny rafiny azy, koa nitomany izy sady tsy nety nihinan-kanina. '
  '8':
  - type: text
    content: 'Fa Elkana vadiny nanao taminy hoe: Ry Hana, nahoana no mitomany ianao? ary nahoana no tsy mety mihinan-kanina ianao? ary nahoana no malahelo fo ianao? Tsy tsara lavitra aminao mihoatra noho ny zanaka folo mirahalahy va aho?'
  '9':
  - type: text
    content: 'Ary rehefa nihinana sy nisotro tao Silo izy, dia nitsangana Hana. Ary Ely mpisorona nipetraka tamin''ny sezany teo anilan''ny tolam-baravaran''ny tempolin''i Jehovah. '
