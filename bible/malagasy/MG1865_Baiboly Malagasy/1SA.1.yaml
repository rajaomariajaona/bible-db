document_id: 1SA.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahaterahan'i Samoela, sy ny nanolorana azy ho an'i Jehovah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nisy lehilahy Efraimita anankiray tany Ramataima-zofima any amin''ny tany havoan''i Efraima, Elkana no anarany zanak''i Jerohama, zanak''i Eliho, zanak''i Toho, zanak''i Zofa. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary namporafy izy, Hana no anaran''ny vadiny anankiray, ary Penina no anaran''ny anankiray; ary Penina nanan-janaka, fa Hana kosa tsy mba nanana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ralehilahy niakatra isan-taona niala tamin''ny tanànany hivavaka sy hamono zavatra hatao fanatitra ho an''i Jehovah, Tompon''ny maro, tao Silo. Ary tao izy mirahalahy, zanak''i Ely, dia Hofinia sy Finehasa, mpisoron''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary tamin''ny andro namonoan''i Elkana zavatra hatao fanatitra dia samy nomeny anjara iray avy Penina vadiny sy ny zananilahy ary ny zananivavy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa Hana kosa nomeny anjaran-droa, satria izy no tiany, nefa nataon''i Jehovah momba. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny rafiny dia nanorisory azy mba hampalahelo azy mafy noho ny nanaovan''i Jehovah azy momba. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary izany no fanaon''i Elkana isan-taona, raha niakatra ho any an-tranon''i Jehovah Hana, ary izany koa no nanorisoren''ny rafiny azy, koa nitomany izy sady tsy nety nihinan-kanina. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa Elkana vadiny nanao taminy hoe: Ry Hana, nahoana no mitomany ianao? ary nahoana no tsy mety mihinan-kanina ianao? ary nahoana no malahelo fo ianao? Tsy tsara lavitra aminao mihoatra noho ny zanaka folo mirahalahy va aho?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary rehefa nihinana sy nisotro tao Silo izy, dia nitsangana Hana. Ary Ely mpisorona nipetraka tamin''ny sezany teo anilan''ny tolam-baravaran''ny tempolin''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Hana dia nalahelo fanahy indrindra, ka nivavaka tamin''i Jehovah izy sady nitomany dia nitomany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nivoady izy ka nanao hoe: Jehovah, Tompon''ny maro, raha mba hitsinjo tokoa ny alahelon''ny ankizivavinao Hianao ka hahatsiaro ahy ary tsy hanadino ny ankizivavinao, fa hanome ahy zazalahy, dia homeko ho an''i Jehovah kosa izy amin''ny andro rehetra hiainany, ka tsy hokasihin-kareza ny lohany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary raha mbola naharitra nivavaka teo anatrehan''i Jehovah izy, dia nodinihin''i Ely ny vavany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa niteny anakampo Hana, ka ny molony ihany no nihetsiketsika, fa ny feony tsy re akory; ka dia nataon''i Ely fa mamo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hoy Ely taminy: Mandrapahoviana no ho mamo ianao? Esory aminao ny divainao. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia namaly Hana ka nanao hoe: Tsia, tompoko; vehivavy malahelo fanahy aho, fa tsy nisotro divay na toaka tsy akory, fa mamoaka ny ato am-poko eto anatrehan''i Jehovah aho. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Aza mba atao ho vehivavy tena ratsy fanahy ny ankizivavinao; fa ny haben''ny fahoriako sy ny alaheloko no nitenenako mandraka ankehitriny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia namaly Ely ka nanao hoe: Mandehana soa aman-tsara; ary homen''Andriamanitry ny Isiraely anao anie izay nangatahinao taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy izy: Aoka hahita fitia eo imasonao ny ankizivavinao. Dia lasa nandeha ravehivavy, ary nihinana izy ka tsy nalahelo tarehy intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary nifoha maraina koa izy ireo ka nivavaka teo anatrehan''i Jehovah, dia lasa nody ka tonga tao an-tranony tany Rama; ary Elkana nahalala an''i Hana vadiny, ary Jehovah nahatsiaro azy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary tamin'ny fahatanterahan'ny andro dia nanan'anaka Hana ka nitera-dahy, ary ny anarany nataony hoe Samoela
  - type: usfm
    marker: x
    children:
    - type: text
      text: Samoela = Nohenoin'Andriamanitra (?)
    marker-yv: yv-n
  - type: text
    text: ', fa hoy izy: Tamin''i Jehovah no nangatahako azy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ralehilahy Elkana sy ny ankohonany rehetra niakatra hamono zavatra mba hanaterany ny fanatitra fanao isan-taona ho an''i Jehovah sy ny fanalam-boadiny. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa Hana kosa tsy mba niakatra; fa hoy izy tamin''ny vadiny: Aoka aloha mandra-panoty ny zaza, fa amin''izay aho vao hitondra azy hiseho eo anatrehan''i Jehovah, ka hitoetra ao mandrakizay izy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary hoy Elkana vadiny taminy: Ataovy ary izay tianao; mitoera ihany mandra-panotinao azy; ary hefain''i Jehovah anie ny teniny. Dia nitoetra ravehivavy ka nampinono ny zanany mandra-panotiny azy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary nony efa maoty ny zaza, vao nentiny niakatra niaraka taminy izy mbamin'ny vantotr'ombilahy telo
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (izay efa telo taona)'
    marker-yv: yv-n
  - type: text
    text: ' sy koba iray efaha ary divay iray tavoara'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: siny hoditra'
    marker-yv: yv-n
  - type: text
    text: ', ka nentiny ho ao an-tranon''i Jehovah tao Silo izy; ary mbola kely ny zaza. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia novonoiny ny vantotr''ombilahy iray, ary nentiny ho ao amin''i Ely ny zaza. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary hoy Hana: Tompoko ô, raha velona koa ny ainao, tompoko, izaho ilay vehivavy nitsangana teto anilanao ka nivavaka tamin''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ny hahazoako ity zazalahy ity no nivavahako; dia nomen''i Jehovah ahy izay nangatahiko taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Koa atolotro ho an''i Jehovah kosa izy: eny, amin''ny andro rehetra hiainany dia voatolotra ho an''i Jehovah izy. Dia nivavaka tamin''i Jehovah izy.'
