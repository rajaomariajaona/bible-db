document_id: JOB.38,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny teny navalin'i Jehovah an'i Joba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary teo anatin''ny tafio-drivotra Jehovah dia namaly an''i Joba ka nanao hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nandidy ny ho fetrany sady nanisy hidy sy varavarana
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka nanao hoe: Hatreto no azonao androsoana ka tsy hihoatra, ary eto no hampijanonana ny fisafoaky ny onjanao?'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hatrizay niainanao moa mba efa nandidy ny maraina va ianao? Efa notoroanao ny fitoerany va ny fipoak'andro,
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mba horaisiny ny sisin'ny tany. Ka hakopakopany hiala ny ratsy fanahy?
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hiova tahaka ny tanimanga tombohin-kase ny endriny, ka hiseho tahaka ny lamba misoratra
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. fitafiana
      marker-yv: yv-n
    - type: text
      text: ' ny tarehiny,'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hosakanana ny fahazavan'ny ratsy fanahy, ka ho tapaka ny sandry naingaina.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moa efa niditra hatrany amin'ny loharanon-dranomasina va ianao, ary efa nandehandeha tany amin'ny fanambanin'ny lalina?
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moa efa naharihary taminao va ny vavahadin'ny fahafatesana? Ary efa hitanao va ny vavahadin'ny aloky ny fahafatesana?
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moa efa voadinikao ny hatrany amin'ny fahalalahan'ny tany? Ambarao ary, raha fantatrao izany rehetra izany.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aiza ary no lalana ho any amin'ny fonenan'ny mazava? Ary aiza no fitoeran'ny maizina?
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Iza moa izato manao izay hahamaizina ny fisainana amin'ny teny tsy misy fahalalana?
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mba hitondranao izany ho amin'ny faran'ny alehany, ary ho fantatrao ny lalana ho any an-tranony.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, fantatrao mantsy izany, satria efa teraka ianao tamin'izay, ary maro ny isan'ny andronao!
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moa efa niditra tany amin'ny firaketana ny oram-panala va ianao? Ary efa hitanao va ny firaketana ny havandra,
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay voatahiriko ho amin'ny andro fahoriana, dia ny andro misy ady sy tafika?
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aiza moa no lalana izarazarana ny mazava sy ielezan'ny rivotra avy any atsinanana ho etỳ ambonin'ny tany?
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Iza moa no nihady lalan-drano ho an'ny ranonorana mirotsaka be, sy lalan-kaleha ho an'ny helatry ny kotrokorana,
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Handatsaka ranonorana ambonin'ny tany izay tsy itoeran'olona, dia any amin'ny efitra tsy misy mponina,
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mba hahavonto ny efitra sy ny tany foana, ary hampitsimoka ny ahitra vao mitsiry?
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manan-dray va ny ranonorana? Ary iza kosa no miteraka ny ranon'ando?
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kibon'iza moa no nihavian'ny ranomandry? Ary ny vongam-panala avy amin'ny lanitra, iza no niteraka azy?
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Misikina ary tahaka ny lehilahy; Fa hanadina anao Aho, ka valio:'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tonga mafy toy ny vato ny rano, Ary mitambatra ny fanambonin'ny lalina.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mahavona ny kofehin'ny Ikotokelimiadilaona va ianao, ary mahavaha ny Telonohorefy?
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mahavoaka ny Mazarota
    - type: usfm
      marker: x
      children:
      - type: text
        text: Anaran-kintana; ny Zôdiaka(?)
      marker-yv: yv-n
    - type: text
      text: ' amin''ny fotoany va ianao? Ary mahatondra ny Bera mbamin''ny zanany va ianao?'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fantatrao va ny lalàn'ny lanitra? Ary manendry ny fanapahan'ireny ny tany va ianao?
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mahasandratra ny feonao ho amin'ny rahona matevina va ianao, Mba hanafotra anao ny rano mandriaka?
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahay mandefa ny helatra va ianao, ka ho avy ireo hilaza aminao hoe: Indreto izahay?'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Iza moa no nanao ny rahona matevina ho fitoeram-pahendrena, Ary irery miseho erỳ an-danitra ho fampisehoana ny fahalalana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Iza no nanisy fahalalana ao am-pon''ny olona? Ary iza no nanome fahalalana ho ao an-tsaina?'
      marker-yv: yv-n
    - type: text
      text: '?'
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Iza moa no manam-pahendrena mahisa ny rahom-potsy manify? Ary iza no mahatankina ny fitoeran-dranon
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. siny hoditra
      marker-yv: yv-n
    - type: text
      text: '''ny lanitra,'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hitambaran'ny vovoka ho dilatra sy hivonganany ho bainga?
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mahay mihaza toha ho an'ny liom-bavy va ianao, sy mahafaka ny fahalianan'ny liona tanora,
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Taiza ary ianao, fony Aho nanorina ny tany? Ambarao, raha hainao.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha mamitsaka ao amin'ny fitoerany izy ary manotrika ao amin'ny kirihitrala?
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Iza moa no manome hanina ny goaika, raha mitaraina amin'Andriamanitra ny zanany ka mirenireny tsy mahita hanina?
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Iza ary no nandidy izay ho refiny, raha fantatrao? Ary iza no nanenjana ny famolaina teo aminy?
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Teo amin'inona no nanorenana ny vodi-andriny, ary iza no nametraka ny vato fehizorony,
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha niara-nihira ny kintan'ny maraina, ary nihoby avokoa ireo zanak'Andriamanitra?
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary iza no nanao varavarana misakana ny ranomasina, raha nibosesika nivoaka avy tany am-bohoka izy,
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha nanao ny rahona ho fitafiany Aho ary ny aizim-pito ho fonony,
