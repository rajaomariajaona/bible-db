document_id: LAM.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitarainana amin'Andriamanitra sy fangatahana ny hodian'ny soa nananana fahiny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Jehovah ô, tsarovy izay nanjo anay; Hevero sy diniho ny latsa mahazo anay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny lovanay dia afindra ho an'ny vahiny ary ny tranonay ho an'ny hafa firenena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Efa kamboty izahay ka tsy manan-dray, ny reninay dia toy ny mpitondra-tena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Na dia ny loharanonay aza dia andoavanay vola vao azonay isotroana, ary ny kitay hazonay dia vidinay vao azo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Rambondrambonan'ny mpanenjika amin'ny hatokay izahay; Reraka izahay fa tsy manam-pitsaharana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nanolo-tanana tamin'ny Egyptiana sy ny Asyriana izahay mba ho voky hanina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nanota ny razanay tsy etỳ intsony izy; Ary izahay no mivesatra ny helony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Andevo no manapaka anay; Tsy misy manafaka anay amin'ny tànany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Noho ny sabatra mamely any an-efitra dia manao vy very ny ainay izahay vao mahazo hanina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mahamay toy ny fatana ny hodi-tray noho ny fahamaimaizana avy amin'ny mosary.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nosavihina ny vehivavy tao Ziona ary ny virijina tao amin'ny tanànan'ny Joda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nahantona tamin'ny tànany ny lehibe; Ary ny antitra tsy mba nohajaina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny zatovo nitondra ny fikosoham-bary; Ary ny ankizy madinika nivembena nitondra ny hazo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny loholona tsy misy eo am-bavahady, ary ny zatovo tsy mitendry zava-maneno intsony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny hafalian'ny fonay dia nitsahatra, ary ny dihinay niova ho fitomaniana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Efa afaka ny satro-boninahitra tamin'ny lohanay; Idiran-doza izahay, fa efa nanota!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary noho izany dia reraka ny fonay, eny, noho izany dia maizina ny masonay,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Noho ny amin'ny tendrombohitra Ziona, izay efa lao sady ikarenjen'ny amboahaolo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Jehovah ô, ianao no mipetraka mandrakizay, eny, ny seza fiandriananao no maharitra hatramin'ny taranaka fara mandimby.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ahoana no dia anadinoanao anay mandrakizay sy ahafoizanao anay andro lava ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Jehovah ô, ampivereno aminao izahay, mba hiverenanay; Havaozy ho toy ny fahiny ny andronay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Moa dia nandà anay tokoa va Hianao sy tezitra aminay indrindra?
