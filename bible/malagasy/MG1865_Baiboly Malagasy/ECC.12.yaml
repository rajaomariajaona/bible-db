document_id: ECC.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Teny farany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tsarovy ny Mpanao anao amin''ny andro fahatanoranao, dieny tsy mbola tonga ny andro mahory, ary tsy mbola mihatra ny taona izay hanaovanao hoe; Tsy sitrako izao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dieny tsy mbola maizina ny masoandro sy ny fahazavana sy ny volana sy ny kintana, ary tsy mbola mitambatra indray ny rahona, rehefa latsaka ny ranonorana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'fa amin''izay dia hangovitra ny mpiandry trano, ary hanjoko ny lehilahy matanjaka, ary hitsahatra ny ankizivavy mpitoto, satria efa vitsy ireo, ary ho maizina ny vehivavy mitsirika eo am-baravarankely, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ary hirindrina ny varavarana kopa-droa mankeny an-dalambe, rehefa malemy ny feon'ny fikosoham-bary; ary ho taitra ny olona, raha vao maneno ny voronkely
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ka tsy mafy noho ny an''ny voron-kely aza ny feony'
    marker-yv: yv-n
  - type: text
    text: ', ary halemy feo ny zazavavy mpihira rehetra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ary koa, hatahotra ny fiakarana izy, ary toa hisy zava-mahatahotra eny an-dalana; ary hamony ny hazo amygdala, ary ny valala aza ho tonga mavesatra, ary ny voan-tsimperifery aza tsy hanan-kery intsony
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hitsaha-panirian-javatra izy'
    marker-yv: yv-n
  - type: text
    text: ' fa mandroso ho any amin''ny tranony mandrakizay ny olona, ary ny mpisaona mandehandeha eny an-dalambe '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'dieny tsy mbola mivaha ny kofehy volafotsy, ary tsy mbola vaky ny vilia volamena fitoeran-diloilo, ary tsy mbola rava ny barika eo an-doharano, ary tsy mbola tapaka ny kodia eo an-davaka famorian-drano, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ka ny vovoka dia hiverina amin''ny tany ho toy ny teo, fa ny fanahy kosa hiverina amin''Andriamanitra, Izay nanome iny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Zava-poana dia zava-poana, hoy Mpitoriteny, eny, zava-poana ny zavatra rehetra!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary koa, satria hendry Mpitoriteny, dia nampianatra ny olona fahalalana izy; eny, nandinika sy nieritreritra ary nandahatra ohabolana maro izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mpitoriteny nitady hahita teny mahafinaritra; ary izay mahitsy no voasorany, dia tenin'ny fahamarinana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny tenin''ny hendry dia toy ny fanindronan-omby sy toy ny hombo voatsatoka, ry mpanangona, omen''ny mpiandry iray izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ary he koa, anaka! minoa anatra ianao; fa tsy misy farany ny manao boky maro, ary manasatra ny tena ny fianarana be. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary rehefa re izany rehetra izany, dia izao no faran''ny teny: Andriamanitra no atahory, ary ny didiny no tandremo, fa izany no tokony hataon''ny olona rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Fa ny atao rehetra dia ho entin'Andriamanitra ho amin'ny fitsarana ny
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mbamin''ny'
    marker-yv: yv-n
  - type: text
    text: ' zava-miafina rehetra, na soa na ratsy.'
