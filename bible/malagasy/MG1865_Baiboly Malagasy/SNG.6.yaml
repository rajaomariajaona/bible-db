document_id: SNG.6,96
type_code: plt
verses:
  '1':
  - type: text
    content: Nankaiza ny malalanao, ry tsara tarehy amin'ny vehivavy? Nivily nankaiza ny malalanao? Mba hiarahanay aminao hitady azy.
  '10':
  - type: text
    content: Iza moa io vehivavy mitsidika toy ny maraina, izay tsara tarehy tahaka ny volana, madio toy ny masoandro sady mahatahotra toy ny antokon'ny miaramila mitondra faneva?
  '11':
  - type: text
    content: Lasa nidina nantany an-tsaha tsara hazo
  - type: note
    content: Heb. an-tanin'egoza
  - type: text
    content: ' aho, hijerijery ny zava-maitso an-dohasaha, hizaha raha mitsimoka ny voaloboka sy mamony ny ampongaben-danitra. '
  '12':
  - type: text
    content: Tsy nampoiziko ny nanandratan'ny fanahiko ahy ho eo amin'ny kalesin'ny fireneko be voninahitra.
  '2':
  - type: text
    content: 'Lasa nidina ho any an-tsahany ny malalako, dia any amin''ny tanim-boninkazo misy zava-manitra eo an-tsaha, hiandry ny ondriny eny amin''ny tanimboly sy hioty ny lilia. '
  '3':
  - type: text
    content: An'ny malalako aho, ary ahy ny malalako, dia ilay miandry ny ondry andiany eny amin'ny lilia.
  '4':
  - type: text
    content: 'Tsara tarehy tahaka an''i Tirza ianao, ry tompokovavy havako, eny, tsara tarehy tahaka an''i Jerosalema, mahatahotra toy ny antokon''ny miaramila mitondra faneva. '
  '5':
  - type: text
    content: 'Avilio ny masonao tsy hijery ahy, Fa mampiontanontana ny foko izy; Ny volonao dia tahaka ny osy andiany, izay mandriandry eny ankilan''i Gileada. '
  '6':
  - type: text
    content: 'Ny nifinao dia tahaka ny ondrivavy andiany, izay miakatra avy eo amin''ny fampandroana; Samy kambana avy ireo. Fa tsy misy tsy mana-manana, '
  '7':
  - type: text
    content: Tahaka ny hasin'ampongaben-danitra ny takolakao eo amin'ny fisalobonanao
  - type: note
    content: 'Na : ny volonao milantolanto'
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Misy mpanjakavavy enim-polo sy vaditsindrano valo-polo ary zatovovavy tsy hita isa. '
  '9':
  - type: text
    content: Fa iray monja kosa no voromailalako, dia ilay ahy tsy misy kilema, vavy tokan-dreniny sady tsongaina amin'izay naterany. Ny zazavavy nahita azy ka nanao azy ho sambatra, eny, ny mpanjakavavy sy ny vaditsindrano, ka nidera azy.
