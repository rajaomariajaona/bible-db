document_id: SNG.6
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nankaiza ny malalanao, ry tsara tarehy amin'ny vehivavy? Nivily nankaiza ny malalanao? Mba hiarahanay aminao hitady azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lasa nidina ho any an-tsahany ny malalako, dia any amin''ny tanim-boninkazo misy zava-manitra eo an-tsaha, hiandry ny ondriny eny amin''ny tanimboly sy hioty ny lilia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: An'ny malalako aho, ary ahy ny malalako, dia ilay miandry ny ondry andiany eny amin'ny lilia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tsara tarehy tahaka an''i Tirza ianao, ry tompokovavy havako, eny, tsara tarehy tahaka an''i Jerosalema, mahatahotra toy ny antokon''ny miaramila mitondra faneva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Avilio ny masonao tsy hijery ahy, Fa mampiontanontana ny foko izy; Ny volonao dia tahaka ny osy andiany, izay mandriandry eny ankilan''i Gileada. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny nifinao dia tahaka ny ondrivavy andiany, izay miakatra avy eo amin''ny fampandroana; Samy kambana avy ireo. Fa tsy misy tsy mana-manana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tahaka ny hasin'ampongaben-danitra ny takolakao eo amin'ny fisalobonanao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na : ny volonao milantolanto'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Misy mpanjakavavy enim-polo sy vaditsindrano valo-polo ary zatovovavy tsy hita isa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa iray monja kosa no voromailalako, dia ilay ahy tsy misy kilema, vavy tokan-dreniny sady tsongaina amin'izay naterany. Ny zazavavy nahita azy ka nanao azy ho sambatra, eny, ny mpanjakavavy sy ny vaditsindrano, ka nidera azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Iza moa io vehivavy mitsidika toy ny maraina, izay tsara tarehy tahaka ny volana, madio toy ny masoandro sady mahatahotra toy ny antokon'ny miaramila mitondra faneva?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Lasa nidina nantany an-tsaha tsara hazo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. an-tanin'egoza
    marker-yv: yv-n
  - type: text
    text: ' aho, hijerijery ny zava-maitso an-dohasaha, hizaha raha mitsimoka ny voaloboka sy mamony ny ampongaben-danitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tsy nampoiziko ny nanandratan'ny fanahiko ahy ho eo amin'ny kalesin'ny fireneko be voninahitra.
