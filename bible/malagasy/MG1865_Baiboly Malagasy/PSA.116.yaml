document_id: PSA.116
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fisaorana nataon'izay saiky maty, nefa novonjen'Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izaho tia an''i Jehovah, satria efa nandre Ny feon''ny fifonako Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Satria efa nanongilana ny sofiny tamiko Izy, Dia hiantso aho, raha mbola velona koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nihodidina tamiko ny famatoran'ny fahafatesana, Ary nahazo ahy ny fahorian'ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: '; Nahita fahoriana sy alahelo aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia niantso ny anaran''i Jehovah hoe aho: Jehovah ô, mifona aminao aho, vonjeo ny fanahiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mamindra fo sy marina Jehovah Eny, miantra Andriamanitsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Miaro ny kely saina Jehovah; Reraka aho, dia namonjy ahy Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Miverena ho amin''ny fitsaharanao, ry fanahiko, Fa Jehovah efa nanisy soa anao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia namonjy ny fanahiko tamin''ny fahafatesana Hianao Sy ny masoko tamin''ny ranomaso Ary ny tongotro tamin''ny fahatafintohinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Handeha eo anatrehan''i Jehovah Eo amin''ny tanin''ny velona aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nino aho; hiteny tokoa aho
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fa hiteny aho'
    marker-yv: yv-n
  - type: text
    text: '; Mahantra indrindra aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hoy izaho tamin''ny fahatairako; Mpandainga ny olona rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Inona no havaliko an''i Jehovah Noho ny soa rehetra nataony tamiko? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Handray ny kapoaky ny famonjena aho Ka hiantso ny anaran''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hanefa ny voadiko amin''i Jehovah aho. Eny, eo anatrehan''ny olony rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Zava-dehibe eo imason'i Jehovah Ny fahafatesan'ny olony masina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Indrisy! Jehovah ô, mpanomponao tokoa aho, Eny, mpanomponao sady zanaky ny ankizivavinao; Namaha ny fatorako Hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hianao no haterako fanati-pisaorana, Ary ny anaran''i Jehovah no hantsoiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hanefa ny voadiko amin''i Jehovah aho, Eny, eo anatrehan''ny olony rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia eo an-kianjan'ny tranon'i Jehovah, Eo afovoanao, ry Jerosalema ô. Haleloia.
