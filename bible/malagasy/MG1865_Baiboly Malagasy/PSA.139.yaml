document_id: PSA.139
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fankalazana an'Andriamanitra, Izay mahalala ny zavatra rehetra sady manerana izao rehetra izao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Salamo nataon''i Davida. Jehovah ô, efa nandinika ahy Hianao ka mahalala ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hianao no mahalala ny fipetrako sy ny fitsangako Sady mahafantatra ny hevitro eny lavitra eny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Voadinikao ny toetro, na mandeha aho, na mandry; Ary fantatrao tsara ny alehako rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa, indro, tsy misy teny tsy fantatrao eo amin''ny lelako, Jehovah ô. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Manodidina ahy eo ivohoko sy eo anatrehako Hianao, Ary apetrakao amiko ny tananao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fahalalana mahagaga ahy loatra izany, Eny, avo loatra ka tsy tratro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aiza no hialako amin''ny Fanahinao? Aiza no handosirako tsy ho eo anatrehanao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Na dia miakatra any an-danitra aza aho dia any Hianao; Ary na dia manao ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: ' ho fandriako aza aho, indro, any Hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Na dia maka ny elatry ny maraina aza aho, Mba hitoetra any am-paran''ny ranomasina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia mbola entin''ny tananao ihany aho, na dia izany aza, Sy hazonin''ny tananao ankavanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary na dia hoy izaho aza: Aoka ny maizina hanarona ahy, Ary aoka ny mazava manodidina ahy ho tonga alina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tsia
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Na dia hoy izaho aza: Hanarona ahy tokoa ny maizina, Dia ny alina aza no ho mazava manodidina ahy; Eny, etc'
    marker-yv: yv-n
  - type: text
    text: ', fa ny maizina aza tsy mahamaizina aminao; Fa ny alina dia mahazava toy ny andro ihany, Ka sahala ny mazava sy ny maizina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa Hianao no nahary ny voako; Namolavola ahy tao an-kibon-dreniko Hianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hidera Anao aho; fa mahatahotra sy mahatalanjona ny nanaovana ahy; Mahagaga ny asanao; Ary fantatry ny fanahiko marimarina izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny tenako tsy niafina taminao, Fony natao tao amin''ny miafina aho, Ka noforoninao hisy endrika tany ambanin''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny masonao efa nahita ahy na dia fony tsy mbola ary fady aza aho; Voasoratra teo amin''ny bokinao avokoa ny andro voatendry, Fony tsy mbola nisy na dia iray akory aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Endrey, zava-tsoa amiko indrindra ny hevitrao, Andriamanitra ô! Akory ny hamaron''ny isany! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Raha hanisa azy aho, dia maro isa lavitra noho ny fasika izy; Raha mifoha aho, dia mbola aminao ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Haringanao mihitsy ny ratsy fanahy, Andriamanitra ô
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Haringanao mihitsy anie ny ratsy fanahy, Andriamanitra ô'
    marker-yv: yv-n
  - type: text
    text: ', Ary mialà amiko, ianareo mpandatsa-drà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia izay manonona Anao ho enti-mamitaka, Jehovah ô, Eny, ny fahavalonao izay manonona Anao foana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy hankahala izay mankahala Anao va aho, Jehovah ô, Sy ho tezitra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ho maloiloy
    marker-yv: yv-n
  - type: text
    text: ' amin''izay mitsangana hanohitra Anao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Halako dia halako marina tokoa ireny; Efa fahavaloko ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Diniho aho, Andriamanitra ô, ary fantaro ny foko; Izahao toetra aho, ary fantaro ny eritreritro; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary izahao na misy lalana mampahory ato anatiko, Dia tariho amin'ny lalana mandrakizay aho.
