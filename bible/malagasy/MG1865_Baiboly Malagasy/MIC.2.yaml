document_id: MIC.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny heloky ny Isiraely, sy ny hampijaliana azy, ary ny mbola hampodiana azy indray
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lozan''izay mamoron-keloka sy misaintsain-dratsy ao am-pandriany! Ary nony maraina ny andro, dia manatanteraka izany izy, Satria manan-kery ny tànany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary mitsiriritra saha izy ka maka izany an-keriny, Sy trano koa ka mahalasa azy; Ary mampahory olona mbamin''ny ankohonany izy, Dia ny olona mbamin''ny lovany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa izao no lazain''i Jehovah: Indro, mamorona loza hamelezana ity firenena ity Aho, Izay tsy hahazoanareo hanafaka ny vozonareo, Ka tsy handeha miandranandrana ianareo, Satria andro mampahory izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Amin''izany andro izany no hanaovana oha-teny handatsana anareo, Ka hitomaniana sy hidradradradrana hoe: Efa levona izao! Eny, hiteny izy hoe: Fongana tokoa isika; Ataony fanakalo zavatra ny anjaran''ny oloko; Endrey! afindrany hiala amiko izany! Samy zarainy ho an''ny mpiodina avy ny tanintsika! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Koa tsy hisy aminao hanenjana famolaina akory hanaovana filokana Ao amin''ny fiangonan''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aza miteniteny
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mampitete
    marker-yv: yv-n
  - type: text
    text: ' ianareo, hoy ny fiteniteniny'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mampitete
    marker-yv: yv-n
  - type: text
    text: ; Aoka tsy hiteniteny
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mampitete
    marker-yv: yv-n
  - type: text
    text: ' ny amin''ireto izy, Tsy hita lany'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: raha tsy miteniteny amin''ireto izy, dia tsy ho afaka'
    marker-yv: yv-n
  - type: text
    text: ' ny fanalam-baraka ataony! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He! izany teny izany! Ry taranak
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: he!ianao izay atao hoe taranak''i'
    marker-yv: yv-n
  - type: text
    text: '''i Jakoba, Malaky tezitra va ny Fanahin''i Jehovah? Ireto va no asa fanaony? Tsy mahasoa izay mandeha mahitsy va ny teniko? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Vao omaly no omaly no nitsanganan''ny oloko ho fahavalo; Hendahanareo hiala eo amin''ny lamba ny kapôtin''izay mandeha tsy manana ahiahy, Dia izay tsy tia ady. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny vehivavy eo amin''ny oloko dia roahinareo hiala amin''ny tranony mahafinaritra; Esorinareo hiala mandrakizay amin''ny zanany madinika ny voninahitro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mitsangàna, ka mialà (Fa tsy eto no fitsaharana), Satria misy fahalotoana mahatonga fandringanana eto, eny, fandringanana mafy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Raha misy manaraka ny rivotra sy ny lainga ka mandainga hoe: Hitori-teny'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hampitete
    marker-yv: yv-n
  - type: text
    text: ' aminao ny amin''ny divay sy ny zava-mahamamo aho, Dia izy no ho mpitori-tenin'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mpampiteten'
    marker-yv: yv-n
  - type: text
    text: '''ity firenena ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hamory anareo rehetra tokoa Aho, ry Jakoba, Ary hanangona ny sisa amin'ny Isiraely tokoa, Hakambako toy ny ondry any amin'ny vala
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: any Bozra'
    marker-yv: yv-n
  - type: text
    text: ' izy, Toy ny ondry andiany ao amin''ny tany fiandrasana; Hitabataba izy noho ny hamaroan''ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny mpanabanga miakatra eo alohany, Manabanga izy ka mandroso ho eo amin'ny vavahady, Dia mivoaka eo aminy; Ny mpanjakany mandroso eo alohany, Ary Jehovah no mitarika azy.
