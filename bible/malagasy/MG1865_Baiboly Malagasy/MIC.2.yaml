document_id: MIC.2,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny heloky ny Isiraely, sy ny hampijaliana azy, ary ny mbola hampodiana azy indray
  - type: text
    content: 'Lozan''izay mamoron-keloka sy misaintsain-dratsy ao am-pandriany! Ary nony maraina ny andro, dia manatanteraka izany izy, Satria manan-kery ny tànany. '
  '10':
  - type: text
    content: 'Mitsangàna, ka mialà (Fa tsy eto no fitsaharana), Satria misy fahalotoana mahatonga fandringanana eto, eny, fandringanana mafy. '
  '11':
  - type: text
    content: 'Raha misy manaraka ny rivotra sy ny lainga ka mandainga hoe: Hitori-teny'
  - type: note
    content: Heb. hampitete
  - type: text
    content: ' aminao ny amin''ny divay sy ny zava-mahamamo aho, Dia izy no ho mpitori-tenin'
  - type: note
    content: Heb. mpampiteten'
  - type: text
    content: '''ity firenena ity. '
  '12':
  - type: text
    content: Hamory anareo rehetra tokoa Aho, ry Jakoba, Ary hanangona ny sisa amin'ny Isiraely tokoa, Hakambako toy ny ondry any amin'ny vala
  - type: note
    content: 'Na: any Bozra'
  - type: text
    content: ' izy, Toy ny ondry andiany ao amin''ny tany fiandrasana; Hitabataba izy noho ny hamaroan''ny olona. '
  '13':
  - type: text
    content: Ny mpanabanga miakatra eo alohany, Manabanga izy ka mandroso ho eo amin'ny vavahady, Dia mivoaka eo aminy; Ny mpanjakany mandroso eo alohany, Ary Jehovah no mitarika azy.
  '2':
  - type: text
    content: 'Ary mitsiriritra saha izy ka maka izany an-keriny, Sy trano koa ka mahalasa azy; Ary mampahory olona mbamin''ny ankohonany izy, Dia ny olona mbamin''ny lovany. '
  '3':
  - type: text
    content: 'Koa izao no lazain''i Jehovah: Indro, mamorona loza hamelezana ity firenena ity Aho, Izay tsy hahazoanareo hanafaka ny vozonareo, Ka tsy handeha miandranandrana ianareo, Satria andro mampahory izany. '
  '4':
  - type: text
    content: 'Amin''izany andro izany no hanaovana oha-teny handatsana anareo, Ka hitomaniana sy hidradradradrana hoe: Efa levona izao! Eny, hiteny izy hoe: Fongana tokoa isika; Ataony fanakalo zavatra ny anjaran''ny oloko; Endrey! afindrany hiala amiko izany! Samy zarainy ho an''ny mpiodina avy ny tanintsika! '
  '5':
  - type: text
    content: 'Koa tsy hisy aminao hanenjana famolaina akory hanaovana filokana Ao amin''ny fiangonan''i Jehovah. '
  '6':
  - type: text
    content: Aza miteniteny
  - type: note
    content: Heb. mampitete
  - type: text
    content: ' ianareo, hoy ny fiteniteniny'
  - type: note
    content: Heb. mampitete
  - type: text
    content: ; Aoka tsy hiteniteny
  - type: note
    content: Heb. mampitete
  - type: text
    content: ' ny amin''ireto izy, Tsy hita lany'
  - type: note
    content: 'Na: raha tsy miteniteny amin''ireto izy, dia tsy ho afaka'
  - type: text
    content: ' ny fanalam-baraka ataony! '
  '7':
  - type: text
    content: He! izany teny izany! Ry taranak
  - type: note
    content: 'Na: he!ianao izay atao hoe taranak''i'
  - type: text
    content: '''i Jakoba, Malaky tezitra va ny Fanahin''i Jehovah? Ireto va no asa fanaony? Tsy mahasoa izay mandeha mahitsy va ny teniko? '
  '8':
  - type: text
    content: 'Vao omaly no omaly no nitsanganan''ny oloko ho fahavalo; Hendahanareo hiala eo amin''ny lamba ny kapôtin''izay mandeha tsy manana ahiahy, Dia izay tsy tia ady. '
  '9':
  - type: text
    content: 'Ny vehivavy eo amin''ny oloko dia roahinareo hiala amin''ny tranony mahafinaritra; Esorinareo hiala mandrakizay amin''ny zanany madinika ny voninahitro. '
