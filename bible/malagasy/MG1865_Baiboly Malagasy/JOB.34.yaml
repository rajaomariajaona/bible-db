document_id: JOB.34,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary mbola niteny ihany Eliho ka nanao hoe:'
  '10':
  - type: text
    content: 'Koa amin''izany mihainoa ahy, ianareo manam-panahy: Lavitra an''Andriamanitra ny hanao ratsy! Ary lavitra ny Tsitoha ny hanao meloka!'
  '11':
  - type: text
    content: Fa ny nataon'ny olona ihany no ampanodiaviny azy, ka mamaly ny olona rehetra araka ny lalany avy Izy.
  '12':
  - type: text
    content: Eny tokoa, Andriamanitra tsy manao ratsy mihitsy, ary ny Tsitoha tsy mba mamadika ny rariny.
  '13':
  - type: text
    content: Iza moa no nanendry Azy ho Mpiadidy ny tany? Ary iza no nanorina izao tontolo izao?
  '14':
  - type: text
    content: Raha tàhiny ny tenany ihany no heveriny, ka hangoniny ho ao aminy ny fanahiny sy ny fofonainy,
  '15':
  - type: text
    content: Dia hiala avokoa ny ain'ny nofo rehetra, ary hiverina amin'ny vovoka ny olona.
  '16':
  - type: text
    content: Raha manam-pahalalana ianao, dia mandrenesa izao, ka mihainoa ny teniko
  '17':
  - type: text
    content: Moa mahay mifehy va izay tsy tia rariny? Ary Ilay marina sady mahery va no hohelohinao?
  '18':
  - type: text
    content: '(Mety va ny miteny amin''ny mpanjaka hoe: Olom-poana ianao! Ary amin''ny zanak''andriana: Ry ilay ratsy!),'
  '19':
  - type: text
    content: Dia Ilay tsy mizaha ny tavan'ny lehibe, ary tsy manaja ny ambony mihoatra noho ny ambany, satria samy asan'ny tànany avokoa izy rehetra.
  '2':
  - type: text
    content: Mandrenesa ny teniko, ianareo olon-kendry; Ary mihainoa ahy, ianareo manam-pahalalana.
  '20':
  - type: text
    content: Maty amin'ny indray mipi-maso monja amin'ny mamatonalina ireny; Eny, ringana ny olona ka tsy ao intsony; Ary ny mahery dia lasa tsy esorin-tanana.
  '21':
  - type: text
    content: Fa ny mason'Andriamanitra dia mijery ny alehan'ny olona, ary mahita ny diany rehetra Izy.
  '22':
  - type: text
    content: Tsy misy aizina na alim-pito, Izay hieren'ny mpanao ratsy.
  '23':
  - type: text
    content: Fa Andriamanitra tsy mba miandry aloha vao mandinika ny olona Izay tonga hotsaraina eo anatrehany.
  '24':
  - type: text
    content: Manorotoro ny olona mahery Izy, na dia tsy manadina aza, ka manangana olon-kafa hisolo azy.
  '25':
  - type: text
    content: Koa hita amin'izany fa fantany ny asan'ireo, ka dia mamono azy amin'ny alina ho torotoro Izy.
  '26':
  - type: text
    content: Tehafiny tanana tahaka ny fanao amin'ny ratsy fanahy ireo
  - type: note
    content: 'Na: Mamely azy toy ny famely ny ratsy fanahy Izy'
  - type: text
    content: ' eo imason''ny vahoaka.'
  '27':
  - type: text
    content: Izao no nialan'ireo tamin'Andriamanitra ka tsy nitandremany ny lalany akory,
  '28':
  - type: text
    content: Dia ny mba hahatonga ny fitarainan'ny malahelo eo anatrehany ka hampandre Azy ny fitarainan'ny ory.
  '29':
  - type: text
    content: Mangina
  - type: note
    content: 'Na: Manome fiadanana'
  - type: text
    content: ' Izy, ka iza no mahay manameloka? Ary manafin-tava Izy (ka iza no mahajery Azy?), na amin''ny firenena, na amin''ny olona tsirairay,'
  '3':
  - type: text
    content: Fa ny sofina no mamantatra teny, Ary ny vava
  - type: note
    content: Heb. lanilany
  - type: text
    content: ' no manandrana hanina.'
  '30':
  - type: text
    content: Mba tsy hanjakan'ny ratsy fanahy, ary tsy ho voafandrika ny vahoaka.
  '31':
  - type: text
    content: 'Fa moa mba efa nisy niteny tamin''Andriamanitra va nanao hoe: Efa nanandra-tena'
  - type: note
    content: 'Na: nijaly'
  - type: text
    content: ' aho ka tsy hanao ratsy intsony;'
  '32':
  - type: text
    content: Izay tsy hitako mba ampianaro ahy; Raha nanao ratsy aho, dia tsy hanao intsony?
  '33':
  - type: text
    content: Moa araka ny hevitrao va no hamaliany ny ataon'ny olona, no efa nandà ianao? Fa ianao no mifidy, fa tsy izaho
  - type: note
    content: 'Na: Moa araka ny hevitrao va no hamaliany ny olona Fa efa nandà, ka dia ianao no tsy maintsy mifidy, fa tsy izaho'
  - type: text
    content: ', koa izay fantatrao no ambarao.'
  '34':
  - type: text
    content: 'Ny olona manam-panahy hilaza amiko, ary ny olon-kendry izay mihaino ahy hanao hoe:'
  '35':
  - type: text
    content: Miteny tsy amim-pahalalana Joba, ary ny teniny tsy amim-pahendrena.
  '36':
  - type: text
    content: Enga anie ka hizahan-toetra mandrakariva Joba noho ny famaliana ataony araka ny fanaon'ny ratsy fanahy!
  '37':
  - type: text
    content: Fa ampiany fihaikana koa ny fahotany; Miteha-tanana eto amintsika izy ka manao teny maro ho enti-miady amin'Andriamanitra.
  '4':
  - type: text
    content: Koa aoka izay rariny no hodinihintsika, ary aoka hiara-mamantatra izay tsara isika.
  '5':
  - type: text
    content: 'Fa Joba efa nanao hoe: Marina aho, saingy nesorin''Andriamanitra tamiko ny rariny;'
  '6':
  - type: text
    content: Marina ny ahy, nefa ampandaingainy aho; Mahafaty ny zana-tsipìka mitsatoka amiko, na dia tsy manam-pahadisoana aza aho.
  '7':
  - type: text
    content: Aiza moa no misy lehilahy tahaka an'i Joba, izay manaram-po amin'ny famingavingana toy ny fisotro rano.
  '8':
  - type: text
    content: Ary tonga naman'ny mpanao ratsy sady miara-mandeha amin'ny ratsy fanahy?
  '9':
  - type: text
    content: 'Fa hoy izy: Tsy mahasoa ny olona ny mihavana amin''Andriamanitra.'
