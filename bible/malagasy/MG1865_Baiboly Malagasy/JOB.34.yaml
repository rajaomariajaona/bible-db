document_id: JOB.34
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary mbola niteny ihany Eliho ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mandrenesa ny teniko, ianareo olon-kendry; Ary mihainoa ahy, ianareo manam-pahalalana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa ny sofina no mamantatra teny, Ary ny vava
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lanilany
    marker-yv: yv-n
  - type: text
    text: ' no manandrana hanina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Koa aoka izay rariny no hodinihintsika, ary aoka hiara-mamantatra izay tsara isika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa Joba efa nanao hoe: Marina aho, saingy nesorin''Andriamanitra tamiko ny rariny;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Marina ny ahy, nefa ampandaingainy aho; Mahafaty ny zana-tsipìka mitsatoka amiko, na dia tsy manam-pahadisoana aza aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aiza moa no misy lehilahy tahaka an'i Joba, izay manaram-po amin'ny famingavingana toy ny fisotro rano.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary tonga naman'ny mpanao ratsy sady miara-mandeha amin'ny ratsy fanahy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa hoy izy: Tsy mahasoa ny olona ny mihavana amin''Andriamanitra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa amin''izany mihainoa ahy, ianareo manam-panahy: Lavitra an''Andriamanitra ny hanao ratsy! Ary lavitra ny Tsitoha ny hanao meloka!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa ny nataon'ny olona ihany no ampanodiaviny azy, ka mamaly ny olona rehetra araka ny lalany avy Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eny tokoa, Andriamanitra tsy manao ratsy mihitsy, ary ny Tsitoha tsy mba mamadika ny rariny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Iza moa no nanendry Azy ho Mpiadidy ny tany? Ary iza no nanorina izao tontolo izao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Raha tàhiny ny tenany ihany no heveriny, ka hangoniny ho ao aminy ny fanahiny sy ny fofonainy,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia hiala avokoa ny ain'ny nofo rehetra, ary hiverina amin'ny vovoka ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Raha manam-pahalalana ianao, dia mandrenesa izao, ka mihainoa ny teniko
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Moa mahay mifehy va izay tsy tia rariny? Ary Ilay marina sady mahery va no hohelohinao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '(Mety va ny miteny amin''ny mpanjaka hoe: Olom-poana ianao! Ary amin''ny zanak''andriana: Ry ilay ratsy!),'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dia Ilay tsy mizaha ny tavan'ny lehibe, ary tsy manaja ny ambony mihoatra noho ny ambany, satria samy asan'ny tànany avokoa izy rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Maty amin'ny indray mipi-maso monja amin'ny mamatonalina ireny; Eny, ringana ny olona ka tsy ao intsony; Ary ny mahery dia lasa tsy esorin-tanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa ny mason'Andriamanitra dia mijery ny alehan'ny olona, ary mahita ny diany rehetra Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tsy misy aizina na alim-pito, Izay hieren'ny mpanao ratsy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa Andriamanitra tsy mba miandry aloha vao mandinika ny olona Izay tonga hotsaraina eo anatrehany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Manorotoro ny olona mahery Izy, na dia tsy manadina aza, ka manangana olon-kafa hisolo azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Koa hita amin'izany fa fantany ny asan'ireo, ka dia mamono azy amin'ny alina ho torotoro Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tehafiny tanana tahaka ny fanao amin'ny ratsy fanahy ireo
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Mamely azy toy ny famely ny ratsy fanahy Izy'
    marker-yv: yv-n
  - type: text
    text: ' eo imason''ny vahoaka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izao no nialan'ireo tamin'Andriamanitra ka tsy nitandremany ny lalany akory,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dia ny mba hahatonga ny fitarainan'ny malahelo eo anatrehany ka hampandre Azy ny fitarainan'ny ory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Mangina
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Manome fiadanana'
    marker-yv: yv-n
  - type: text
    text: ' Izy, ka iza no mahay manameloka? Ary manafin-tava Izy (ka iza no mahajery Azy?), na amin''ny firenena, na amin''ny olona tsirairay,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mba tsy hanjakan'ny ratsy fanahy, ary tsy ho voafandrika ny vahoaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa moa mba efa nisy niteny tamin''Andriamanitra va nanao hoe: Efa nanandra-tena'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: nijaly'
    marker-yv: yv-n
  - type: text
    text: ' aho ka tsy hanao ratsy intsony;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Izay tsy hitako mba ampianaro ahy; Raha nanao ratsy aho, dia tsy hanao intsony?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Moa araka ny hevitrao va no hamaliany ny ataon'ny olona, no efa nandà ianao? Fa ianao no mifidy, fa tsy izaho
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Moa araka ny hevitrao va no hamaliany ny olona Fa efa nandà, ka dia ianao no tsy maintsy mifidy, fa tsy izaho'
    marker-yv: yv-n
  - type: text
    text: ', koa izay fantatrao no ambarao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ny olona manam-panahy hilaza amiko, ary ny olon-kendry izay mihaino ahy hanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Miteny tsy amim-pahalalana Joba, ary ny teniny tsy amim-pahendrena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Enga anie ka hizahan-toetra mandrakariva Joba noho ny famaliana ataony araka ny fanaon'ny ratsy fanahy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Fa ampiany fihaikana koa ny fahotany; Miteha-tanana eto amintsika izy ka manao teny maro ho enti-miady amin'Andriamanitra.
