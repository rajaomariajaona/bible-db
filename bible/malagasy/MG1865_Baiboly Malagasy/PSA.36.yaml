document_id: PSA.36
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny maharatsy ny miala amin'Andriamanitra, ary ny mahatsara ny mihavana aminy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an'ny mpiventy hira. Nataon'i Davida, mpanompon'i Jehovah. Ny ota milaza ato am-poko ny amin'ny ratsy fanahy hoe
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Misy filazana ny ao am-pon''ny ratsy fanahy manao hoe:'
    marker-yv: yv-n
  - type: text
    text: ': tsy misy fahatahorana an''Andriamanitra ao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa miarahaba tena izy ny amin''ny tsy hahitana ny helony ka hankahalana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny tenin''ny vavany dia faharatsiana sy fitaka; efa nihadala izy ka nitsahatra tsy hanao soa. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Faharatsiana no saintsaininy eo am-pandriany; mitsangana eo amin'ny lalana tsy mety izy; ny ratsy tsy mba laviny akory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jehovah ô, mipaka amin''ny lanitra ny famindram-ponao; mihatra amin''ny rahona ny fahamarinanao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny fahamarinanao dia tahaka ny tendrombohitra avo dia avo
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Heb: tendrombohitr''Andriamanitra'
    marker-yv: yv-n
  - type: text
    text: '; ny fitsaranao dia toy ny lalina indrindra; ny olona sy ny biby dia samy vonjenao, Jehovah ô, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Endrey ny hatsaran''ny famindram-ponao, Andriamanitra ô! ka mialoka eo amin''ny aloky ny elatrao ny zanak''olombelona. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Voky ny matavy ao an-tranonao izy; ary ny ony fampifalianao no ampisotroanao azy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa ao aminao no misy loharanon''aina; ny fahazavanao no hahitanay fahazavana. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ampahareto amin''izay mahalala Anao ny famindram-ponao, ary ny fahamarinanao amin''ny mahitsy fo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Aoka tsy hanitsaka ahy ny tongotry ny mpiavonavona, na hampandositra ahy ny tanan''ny ratsy fanahy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Indreo! efa lavo ny mpanao ratsy; naripaka izy ka tsy maharina.
