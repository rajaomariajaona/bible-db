document_id: PSA.36,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny maharatsy ny miala amin'Andriamanitra, ary ny mahatsara ny mihavana aminy
  - type: text
    content: Ho an'ny mpiventy hira. Nataon'i Davida, mpanompon'i Jehovah. Ny ota milaza ato am-poko ny amin'ny ratsy fanahy hoe
  - type: note
    content: 'Na: Misy filazana ny ao am-pon''ny ratsy fanahy manao hoe:'
  - type: text
    content: ': tsy misy fahatahorana an''Andriamanitra ao aminy. '
  '10':
  - type: text
    content: 'Ampahareto amin''izay mahalala Anao ny famindram-ponao, ary ny fahamarinanao amin''ny mahitsy fo. '
  '11':
  - type: text
    content: 'Aoka tsy hanitsaka ahy ny tongotry ny mpiavonavona, na hampandositra ahy ny tanan''ny ratsy fanahy. '
  '12':
  - type: text
    content: Indreo! efa lavo ny mpanao ratsy; naripaka izy ka tsy maharina.
  '2':
  - type: text
    content: 'Fa miarahaba tena izy ny amin''ny tsy hahitana ny helony ka hankahalana azy. '
  '3':
  - type: text
    content: 'Ny tenin''ny vavany dia faharatsiana sy fitaka; efa nihadala izy ka nitsahatra tsy hanao soa. '
  '4':
  - type: text
    content: Faharatsiana no saintsaininy eo am-pandriany; mitsangana eo amin'ny lalana tsy mety izy; ny ratsy tsy mba laviny akory.
  '5':
  - type: text
    content: 'Jehovah ô, mipaka amin''ny lanitra ny famindram-ponao; mihatra amin''ny rahona ny fahamarinanao. '
  '6':
  - type: text
    content: Ny fahamarinanao dia tahaka ny tendrombohitra avo dia avo
  - type: note
    content: 'Heb: tendrombohitr''Andriamanitra'
  - type: text
    content: '; ny fitsaranao dia toy ny lalina indrindra; ny olona sy ny biby dia samy vonjenao, Jehovah ô, '
  '7':
  - type: text
    content: 'Endrey ny hatsaran''ny famindram-ponao, Andriamanitra ô! ka mialoka eo amin''ny aloky ny elatrao ny zanak''olombelona. '
  '8':
  - type: text
    content: 'Voky ny matavy ao an-tranonao izy; ary ny ony fampifalianao no ampisotroanao azy. '
  '9':
  - type: text
    content: 'Fa ao aminao no misy loharanon''aina; ny fahazavanao no hahitanay fahazavana. '
