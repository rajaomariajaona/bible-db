document_id: 1CO.1,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Anatra noho ny fifampiandanian'ny fiangonana tao Korinto, sy filazana ny amin'ny nitorian'Paoly ny filazantsara
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paoly, voantso ho Apostolin''i Jesosy Kristy noho ny sitrapon''Andriamanitra, ary Sostena rahalahy, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary mananatra anareo aho, ry rahalahy, amin''ny anaran''i Jesosy Kristy Tompontsika, mba hiray teny ianareo rehetra, ka tsy hisy fisarahana eo aminareo, fa mba ho tafakambana tsara ianareo hiray saina sy hevitra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa efa voalazan''ny avy amin''ny ankohonan''i Kloa tamiko ny amin''ny toetrareo, ry rahalahiko, fa misy fifampiandaniana eo aminareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao anefa no anaovako izany: Hianareo samy manao hoe: Izaho an''i Paoly, na: Izaho an''i Apolosy, na: Izaho an''i Kefasy, na: Izaho an''i Kristy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voazarazara va Kristy? Paoly va no voahombo tamin''ny hazo fijaliana hamonjy anareo, sa ho amin''ny anaran''i Paoly no nanaovam-batisa anareo? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Misaotra an''Andriamanitra aho fa tsy nisy nataoko batisa ianareo afa-tsy Krispo sy Gaio, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fandrao misy milaza fa efa natao batisa ho amin''ny anarako ianareo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa mba efa nanao batisa ny ankohonan''i Stefanasy koa aho; afa-tsy ireo dia tsy hitako izay nataoko batisa. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Kristy tsy naniraka ahy hanao batisa, fa hitory ny filazantsara, tsy tamin''ny teny fahendrena, fandrao ho foana ny hazo fijalian''i Kristy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny teny ny amin''ny hazo fijaliana dia fahadalana amin''izay ho very, fa herin''Andriamanitra kosa amintsika izay hovonjena. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa voasoratra hoe: Hofoanako ny fahendren''ny hendry, Ary holaviko ny fahalalan''ny mahalala (Isa. 29. 14). '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mamangy ny fiangonan''Andriamanitra any Korinto, dia izay nohamasinina ao amin''i Kristy Jesosy, olona voantso sady masina, mbamin''izay rehetra miantso ny anaran''i Jesosy Kristy Tompontsika eny amin''ny tany rehetra, dia azy sy antsika: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aiza ny hendry? Aiza ny mpanora-dalàna? Aiza ny mpiady hevitra avy amin''izao tontolo izao? Tsy nampodin''Andriamanitra ho fahadalana va ny fahendren''izao tontolo izao? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa satria, na dia naseho aza ny fahendren'Andriamanitra
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Fa noho ny fahendren''Andriamanitra'
      marker-yv: yv-n
    - type: text
      text: ', ny fahendrena dia tsy nahatonga izao tontolo izao hahalala an''Andriamanitra, ka dia ny fahadalan''ny fitorian-teny no sitrak''Andriamanitra hamonjeny izay mino; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa ny Jiosy mila famantarana, ary ny jentilisa
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. Grika
      marker-yv: yv-n
    - type: text
      text: ' mitady fahendrena, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa izahay kosa mitory an'i Kristy voahombo tamin'ny hazo fijaliana, dia fahatafintohinana amin'ny Jiosy ary fahadalana amin'ny jentilisa
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. Grika
      marker-yv: yv-n
    - type: text
      text: ', '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa amin'izay voantso kosa, na Jiosy na jentilisa
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. Grika
      marker-yv: yv-n
    - type: text
      text: ', dia Kristy, Izay herin''Andriamanitra sy fahendren''Andriamanitra. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny fahadalan''Andriamanitra dia hendry noho ny olona; ary ny fahalemen''Andriamanitra mahery noho ny olona. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hevero ny fiantsoana anareo, ry rahalahy, fa tsy firy no olon-kendry araka ny nofo, tsy firy no olona mahery, tsy firy no avo razana; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa ny adala amin''izao tontolo izao no nofidin''Andriamanitra hampahamenatra ny hendry; ary ny malemy amin''izao tontolo izao no nofidin''Andriamanitra hampahamenatra ny mahery; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny iva razana amin''izao tontolo izao sy izay fanevateva no nofidin''Andriamanitra, dia ny atao ho tsy misy aza, mba hahafoana ny misy, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba tsy hisy nofo hahazo mirehareha eo anatrehan''Andriamanitra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ho aminareo anie ny fahasoavana sy ny fiadanana avy amin''Andriamanitra Raintsika sy Jesosy Kristy Tompo. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa avy aminy no nanaovana anareo ho ao amin''i Kristy Jesosy, Izay nataon''Andriamanitra fahendrena sy fahamarinana sy fahamasinana ary fanavotana ho antsika, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba ho araka ny voasoratra hoe: Izay mirehareha, aoka Jehovah no ho reharehany (Jery. 9. 23).'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Misaotra an''Andriamanitro mandrakariva ny aminareo aho noho ny fahasoavan''Andriamanitra izay nomena anareo ao amin''i Kristy Jesosy, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia ny nampananana harena anareo ao aminy amin''ny zavatra rehetra, na ny teny rehetra, na ny fahalalana rehetra, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'araka ny niorenan''ny filazana an''i Kristy teo aminareo, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka dia tsy latsaka amin''ny fanomezam-pahasoavana rehetra ianareo, miandry ny fisehoan''i Jesosy Kristy Tompontsika, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay hampiorina anareo koa hatramin''ny farany, ka dia tsy hanan-tsiny ianareo amin''ny andron''i Jesosy Kristy Tompontsika. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mahatoky Andriamanitra, Izay nahatonga ny fiantsoana anareo hanananareo firaisana amin'ny Zanany, dia Jesosy Kristy Tompontsika.
