document_id: 1CO.1,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Anatra noho ny fifampiandanian'ny fiangonana tao Korinto, sy filazana ny amin'ny nitorian'Paoly ny filazantsara
  - type: text
    content: 'Paoly, voantso ho Apostolin''i Jesosy Kristy noho ny sitrapon''Andriamanitra, ary Sostena rahalahy, '
  '10':
  - type: text
    content: 'Ary mananatra anareo aho, ry rahalahy, amin''ny anaran''i Jesosy Kristy Tompontsika, mba hiray teny ianareo rehetra, ka tsy hisy fisarahana eo aminareo, fa mba ho tafakambana tsara ianareo hiray saina sy hevitra. '
  '11':
  - type: text
    content: 'Fa efa voalazan''ny avy amin''ny ankohonan''i Kloa tamiko ny amin''ny toetrareo, ry rahalahiko, fa misy fifampiandaniana eo aminareo. '
  '12':
  - type: text
    content: 'Izao anefa no anaovako izany: Hianareo samy manao hoe: Izaho an''i Paoly, na: Izaho an''i Apolosy, na: Izaho an''i Kefasy, na: Izaho an''i Kristy. '
  '13':
  - type: text
    content: 'Voazarazara va Kristy? Paoly va no voahombo tamin''ny hazo fijaliana hamonjy anareo, sa ho amin''ny anaran''i Paoly no nanaovam-batisa anareo? '
  '14':
  - type: text
    content: 'Misaotra an''Andriamanitra aho fa tsy nisy nataoko batisa ianareo afa-tsy Krispo sy Gaio, '
  '15':
  - type: text
    content: 'fandrao misy milaza fa efa natao batisa ho amin''ny anarako ianareo. '
  '16':
  - type: text
    content: 'Nefa mba efa nanao batisa ny ankohonan''i Stefanasy koa aho; afa-tsy ireo dia tsy hitako izay nataoko batisa. '
  '17':
  - type: text
    content: 'Fa Kristy tsy naniraka ahy hanao batisa, fa hitory ny filazantsara, tsy tamin''ny teny fahendrena, fandrao ho foana ny hazo fijalian''i Kristy. '
  '18':
  - type: text
    content: 'Fa ny teny ny amin''ny hazo fijaliana dia fahadalana amin''izay ho very, fa herin''Andriamanitra kosa amintsika izay hovonjena. '
  '19':
  - type: text
    content: 'Fa voasoratra hoe: Hofoanako ny fahendren''ny hendry, Ary holaviko ny fahalalan''ny mahalala (Isa. 29. 14). '
  '2':
  - type: text
    content: 'mamangy ny fiangonan''Andriamanitra any Korinto, dia izay nohamasinina ao amin''i Kristy Jesosy, olona voantso sady masina, mbamin''izay rehetra miantso ny anaran''i Jesosy Kristy Tompontsika eny amin''ny tany rehetra, dia azy sy antsika: '
  '20':
  - type: text
    content: 'Aiza ny hendry? Aiza ny mpanora-dalàna? Aiza ny mpiady hevitra avy amin''izao tontolo izao? Tsy nampodin''Andriamanitra ho fahadalana va ny fahendren''izao tontolo izao? '
  '21':
  - type: text
    content: Fa satria, na dia naseho aza ny fahendren'Andriamanitra
  - type: note
    content: 'Na: Fa noho ny fahendren''Andriamanitra'
  - type: text
    content: ', ny fahendrena dia tsy nahatonga izao tontolo izao hahalala an''Andriamanitra, ka dia ny fahadalan''ny fitorian-teny no sitrak''Andriamanitra hamonjeny izay mino; '
  '22':
  - type: text
    content: fa ny Jiosy mila famantarana, ary ny jentilisa
  - type: note
    content: Gr. Grika
  - type: text
    content: ' mitady fahendrena, '
  '23':
  - type: text
    content: fa izahay kosa mitory an'i Kristy voahombo tamin'ny hazo fijaliana, dia fahatafintohinana amin'ny Jiosy ary fahadalana amin'ny jentilisa
  - type: note
    content: Gr. Grika
  - type: text
    content: ', '
  '24':
  - type: text
    content: fa amin'izay voantso kosa, na Jiosy na jentilisa
  - type: note
    content: Gr. Grika
  - type: text
    content: ', dia Kristy, Izay herin''Andriamanitra sy fahendren''Andriamanitra. '
  '25':
  - type: text
    content: 'Fa ny fahadalan''Andriamanitra dia hendry noho ny olona; ary ny fahalemen''Andriamanitra mahery noho ny olona. '
  '26':
  - type: text
    content: 'Fa hevero ny fiantsoana anareo, ry rahalahy, fa tsy firy no olon-kendry araka ny nofo, tsy firy no olona mahery, tsy firy no avo razana; '
  '27':
  - type: text
    content: 'fa ny adala amin''izao tontolo izao no nofidin''Andriamanitra hampahamenatra ny hendry; ary ny malemy amin''izao tontolo izao no nofidin''Andriamanitra hampahamenatra ny mahery; '
  '28':
  - type: text
    content: 'ary ny iva razana amin''izao tontolo izao sy izay fanevateva no nofidin''Andriamanitra, dia ny atao ho tsy misy aza, mba hahafoana ny misy, '
  '29':
  - type: text
    content: 'mba tsy hisy nofo hahazo mirehareha eo anatrehan''Andriamanitra. '
  '3':
  - type: text
    content: 'ho aminareo anie ny fahasoavana sy ny fiadanana avy amin''Andriamanitra Raintsika sy Jesosy Kristy Tompo. '
  '30':
  - type: text
    content: 'Fa avy aminy no nanaovana anareo ho ao amin''i Kristy Jesosy, Izay nataon''Andriamanitra fahendrena sy fahamarinana sy fahamasinana ary fanavotana ho antsika, '
  '31':
  - type: text
    content: 'mba ho araka ny voasoratra hoe: Izay mirehareha, aoka Jehovah no ho reharehany (Jery. 9. 23).'
  '4':
  - type: text
    content: 'Misaotra an''Andriamanitro mandrakariva ny aminareo aho noho ny fahasoavan''Andriamanitra izay nomena anareo ao amin''i Kristy Jesosy, '
  '5':
  - type: text
    content: 'dia ny nampananana harena anareo ao aminy amin''ny zavatra rehetra, na ny teny rehetra, na ny fahalalana rehetra, '
  '6':
  - type: text
    content: 'araka ny niorenan''ny filazana an''i Kristy teo aminareo, '
  '7':
  - type: text
    content: 'ka dia tsy latsaka amin''ny fanomezam-pahasoavana rehetra ianareo, miandry ny fisehoan''i Jesosy Kristy Tompontsika, '
  '8':
  - type: text
    content: 'Izay hampiorina anareo koa hatramin''ny farany, ka dia tsy hanan-tsiny ianareo amin''ny andron''i Jesosy Kristy Tompontsika. '
  '9':
  - type: text
    content: Mahatoky Andriamanitra, Izay nahatonga ny fiantsoana anareo hanananareo firaisana amin'ny Zanany, dia Jesosy Kristy Tompontsika.
