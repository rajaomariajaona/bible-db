document_id: 1CH.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny taranak'i Simeona sy ny fonenany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny zanakalahin''i Joda dia Fareza sy Hezrona sy Karmy sy Hora ary Sobala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Reaia, zanakalahin''i Sobala, niteraka an''i Jahata; ary Jahata niteraka an''i Ahomay sy Lahada. Ireo no fokon''ny Zoraita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary izao no avy amin''ny rain''i Etama: Jezirela sy Jisma ary Jidbasy, ary Hazelelpony no anaran''ny anabaviny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ary Penoela, rain''i Gedora, sy Ezera, rain''i Hosa. Ireo no zanak''i Hora, lahimatoan''i Efrata, razamben''ny any Betlehema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Asora, razamben''ny any Tekoa, namporafy, dia Hela sy Nara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Nara niteraka an''i Ahozama sy Hafera sy Temeny ary Hahastary. Ireo no zanakalahin''i Nara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny zanakalahin''i Hela dia Zareta sy Jizara ary Etnana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary Hakoza niteraka an''i Anoba sy Zobeba ary ny fokon''i Aharela, zanakalahin''i Haroma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Jabeza dia nalaza noho ny rahalahiny; ary ny reniny nanao ny anarany hoe Jabeza, fa hoy izy: Ory aho, raha niteraka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Jabeza niantso an''Andriamanitry ny Isiraely hoe: Enga anie ka hotahinao tokoa aho, ka hohalalahinao ny fari-taniko, ary ho amiko ny tananao, ka harovanao amin''ny ratsy aho, mba tsy hampahory ahy izany. Ary dia nomen''Andriamanitra azy ny nangatahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Keloba, rahalahin''i Soha, niteraka an''i Mehira, rain''i Estona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ary Estona niteraka an''i Betirafa sy Pasea ary Tehina, rain''Ir-nahasa. Ireo dia mponina tao Reka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny zanakalahin''i Kenaza dia Otniela sy Seraia; ary ny zanakalahin''i Otniela dia Hatata. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Meonotahy niteraka an''i Ofra; ary Seraia niteraka an''i Joaba, razamben''ny ao an-dohasahan''ny mpiasa; fa mpiasa ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ny zanakalahin''i Kaleba, zanakalahin''i Jefone, dia Iro sy Elaha sy Nama; ary ny zanakalahin''i Elaha dia Kenaza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ny zanakalahin''i Jehalalila dia Zifa sy Zifaha sy Tiria ary Asarela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny zanakalahin''i Ezra dia Jatera sy Mareda sy Efera ary Jalona; ary izy niteraka an''i Miriama sy Samay ary Jisba, razamben''ny any Estemoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary Jehodia vadiny niteraka an''i Jareda, razamben''ny any Gedora, sy Hebera, razamben''ny any Soko, ary Jakotiela, razamben''ny any Zanoa. Ireo no zanakalahin''i Bitia, zanakavavin''i Farao, izay novadin''i Mareda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ny zanakalahin''i Hodia vadiny, izay anabavin''i Nahama, dia ny razamben''ny an''i Keila Garmita sy Estemoa Makatita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ny zanakalahin''i Simona dia Amnona sy Rina sy Ben-hanana ary Tilona. Ary ny zanakalahin''i Jisy dia Zoheta sy Ben-zoheta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny zanakalahin''i Sela, zanak''i Joda, dia Era, rain''i Leka, sy Lada, rain''i Maresa, sy ny fokon''ny mpanao rongony fotsy madinika amin''ny ankohonan''i Asbea; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ary Jokima sy ny mponina tao Kozeba ary Joasy sy Sarafa, izay samy nanapaka tany Moaba, ary Jasobi-lehema. Ary efa ela izany zavatra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ireo no mpanefy vilany sy mponina tany Netaima sy Gadera; tany no nitoerany tamin'ny mpanjaka hanao ny asany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny zanakalahin''i Simeona dia Nemoela sy Jamina sy Jariba sy Zera ary Saoly, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'dia Saloma no zanakalahin''i Saoly, Mibsama no zanakalahin''i Saloma, Misma no zanakalahin''i Mibsama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary ny zanakalahin''i Misma dia Hamoela, ary Zakora no zanakalahin''i Hamoela, Simey no zanakalahin''i Zakora. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary Simey nanan-janaka enina ambin''ny folo lahy sy enim-bavy; fa ny rahalahiny tsy nanan-janaka maro, sady tsy nihamaro tahaka ny taranak''i Joda ny fokony rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary izy nonina tao Beri-sheba sy Molada sy Hazara-soala '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'sy Bila sy Ezema sy Tolada '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'sy Betoela sy Horma sy Ziklaga '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'sy Beti-markabota sy Hazora-sosima sy Beti-biry ary Saraima. Ireo no tanàna nonenany mandra-panjakan''i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary ny zana-bohiny dia Etama sy Aina sy Rimona sy Tokena ary Asana, tanana dimy ireo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'ary ny zana-bohiny rehetra koa izay manodina izany tanàna izany hatrany Bala. Ireo no fonenany sady nanana fitantaram-pirazanana manokana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary Mesobaba sy Jamleka sy Josa, zanak''i Amazia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'ary Joela sy Jeho, zanak''i Josibia, zanak''i Seraia, zanak''i Asiela, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'ary Elioenay sy Jakoba sy Jesohaia sy Asaia sy Adiela sy Jesimiela sy Benaia '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'sy Ziza, zanak''i Sify, zanak''i Alona, zanak''i Jedaia, zanak''i Simry, zanak''i Semaia; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ireo voalaza anarana ireo dia samy lohany tamin''ny fotony avy; ary efa nihamaro indrindra ny fianakaviany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary nankany amin''ny fidirana ho any Gedora izy, dia hatramin''ny ilany atsinanana amin''ny lohasaha, hitady ahitra ho an''ny ondriny aman''osiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary nahita ahitra maitso sady tsara izy, ary malalaka ny tany sady nandry fahizay; nefa ny taranak''i Hama no nonina tany taloha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ary ireo voasoratra anarana ireo dia tonga tao tamin'ny andron'i Hezekia, mpanjakan'ny Joda, ka namely ny lay sy ny fonenana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: sy ny Meonita'
    marker-yv: yv-n
  - type: text
    text: ' hitany tao sy nandringana'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. nanao azy ho herema
    marker-yv: yv-n
  - type: text
    text: ' azy rehetra mandraka ankehitriny, dia nonina nisolo azy; fa nisy ahitra ho an''ny ondriny aman''osiny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary nisy lehilahy dimam-jato tamin''ny taranak''i Simeona nankany amin''ny tendrombohitra Seira ka nanana an''i Peletia sy Nearia sy Refaia ary Oziela, zanakalahin''i Jisy, ho mpifehy azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ary namely ny sisa afaka tamin'ny Amalekita izy, ka dia monina ao mandraka androany.
