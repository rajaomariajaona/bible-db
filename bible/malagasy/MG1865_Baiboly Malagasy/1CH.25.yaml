  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nizarana ny mpihira ho efatra amby roa-polo toko
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ary ny
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ny asany amin''ny'
      marker-yv: yv-n
    - type: text
      text: ' taranak''i Asafa sy Hemana ary Jedotona dia natokan''i Davida sy ireo komandin''ny miaramila ho amin''ny fanompoana mba haminany amin''ny lokanga sy ny valiha ary ny kipantsona; ary izao no isan''ny mpanao araka ny fanompoany avy: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'ny fahatelo an''i Zakora, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
