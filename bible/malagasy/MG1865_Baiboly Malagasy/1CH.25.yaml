    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'ny fahatelo ambin''ny folo an''i Sobaela, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'ny fahefatra ambin''ny folo an''i Matitia, izy mbamin''ny zanany sy ny rahalahiny dia roa ambin''ny folo; '
