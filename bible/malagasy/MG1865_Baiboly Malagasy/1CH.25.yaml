  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'ny fahiraika amby roa-polo an''i Hotira, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'ny faharoa amby roa-polo an''i Gidalty, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tamin''i Jedotona, ny zanany dia Gedalia sy Zery sy Jesaia sy Hasabia ary Matitia, enin-dahy ireo ka nofehezin''i Jedotona rainy, izay naminany tamin''ny lokanga hidera sy hisaotra an''i Jehovah. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'ny fahatelo amby roa-polo an''i Mahaziota, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ny fahefatra amby roa-polo an'i Romamti-ezera, izy mbamin'ny zanany sy ny rahalahiny, dia roa ambin'ny folo.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tamin''i Hemana, ny zanany dia Bokia, Matania, Oziela, Seboela sy Jerimota, Hanania, Hanany, Eliata, Gidalty sy Romamti-ezera sy Josbekasa sy Maloty sy Hotira ary Mahaziota. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ireo rehetra ireo no zanak''i Hemana, mpahitan''ny mpanjaka ny amin''ny tenin''Andriamanitra, hanandratra ny tandroka. Ary Hemana dia efa nomen''Andriamanitra zazalahy efatra ambin''ny folo sy zazavavy telo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ireo rehetra ireo no fehin''ny rainy tamin''ny hira natao tao an-tranon''i Jehovah tamin''ny kipantsona sy ny valiha sy ny lokanga hanaovana ny fanompoana ao an-tranon''Andriamanitra; Asafa sy Jedotona ary Hemana dia nofezehin''ny mpanjaka. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary ny isany mbamin''ny rahalahiny, izay efa nianatra ny hira ho an''i Jehovah izay rehetra nahay dia valo amby valo-polo amby roan-jato. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary nanao filokana ny amin''ny anjara-raharahany avy izy, na ny kely na ny lehibe, na ny mpampianatra na ny mpianatra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary ny loka voalohany dia azon''i Josefa avy amin''ny taranak''i Asafa; ny faharoa an''i Gedalia, izy mbamin''ny rahalahiny sy ny zanany, dia roa ambin''ny folo; '
