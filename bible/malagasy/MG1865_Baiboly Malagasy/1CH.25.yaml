    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'ny faharoa ambin''ny folo an''i Hasabia, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Tamin''ny zanakalahin''i Asafa dia Zakora sy Josefa sy Netania ary Asarela, zanak''i Asafa, nofehezin''i Asafa, izay naminany araka izay nifehezan''ny mpanjaka azy. '
  '20':
  - type: usfm
    marker: p
