document_id: 1CH.25
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nizarana ny mpihira ho efatra amby roa-polo toko
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary ny
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny asany amin''ny'
    marker-yv: yv-n
  - type: text
    text: ' taranak''i Asafa sy Hemana ary Jedotona dia natokan''i Davida sy ireo komandin''ny miaramila ho amin''ny fanompoana mba haminany amin''ny lokanga sy ny valiha ary ny kipantsona; ary izao no isan''ny mpanao araka ny fanompoany avy: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tamin''ny zanakalahin''i Asafa dia Zakora sy Josefa sy Netania ary Asarela, zanak''i Asafa, nofehezin''i Asafa, izay naminany araka izay nifehezan''ny mpanjaka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tamin''i Jedotona, ny zanany dia Gedalia sy Zery sy Jesaia sy Hasabia ary Matitia, enin-dahy ireo ka nofehezin''i Jedotona rainy, izay naminany tamin''ny lokanga hidera sy hisaotra an''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tamin''i Hemana, ny zanany dia Bokia, Matania, Oziela, Seboela sy Jerimota, Hanania, Hanany, Eliata, Gidalty sy Romamti-ezera sy Josbekasa sy Maloty sy Hotira ary Mahaziota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ireo rehetra ireo no zanak''i Hemana, mpahitan''ny mpanjaka ny amin''ny tenin''Andriamanitra, hanandratra ny tandroka. Ary Hemana dia efa nomen''Andriamanitra zazalahy efatra ambin''ny folo sy zazavavy telo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ireo rehetra ireo no fehin''ny rainy tamin''ny hira natao tao an-tranon''i Jehovah tamin''ny kipantsona sy ny valiha sy ny lokanga hanaovana ny fanompoana ao an-tranon''Andriamanitra; Asafa sy Jedotona ary Hemana dia nofezehin''ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny isany mbamin''ny rahalahiny, izay efa nianatra ny hira ho an''i Jehovah izay rehetra nahay dia valo amby valo-polo amby roan-jato. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nanao filokana ny amin''ny anjara-raharahany avy izy, na ny kely na ny lehibe, na ny mpampianatra na ny mpianatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny loka voalohany dia azon''i Josefa avy amin''ny taranak''i Asafa; ny faharoa an''i Gedalia, izy mbamin''ny rahalahiny sy ny zanany, dia roa ambin''ny folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ny fahatelo an''i Zakora, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ny fahefatra an''i Jizry, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ny fahadimy an''i Netania, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ny fahenina an''i Bokia, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ny fahafito an''i Jesarela, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ny fahavalo an''i Jesaia, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ny fahasivy an''i Matania, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ny fahafolo an''i Simey, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ny fahiraika ambin''ny folo an''i Azarela, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ny faharoa ambin''ny folo an''i Hasabia, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ny fahatelo ambin''ny folo an''i Sobaela, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ny fahefatra ambin''ny folo an''i Matitia, izy mbamin''ny zanany sy ny rahalahiny dia roa ambin''ny folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ny fahadimy ambin''ny folo an''i Jeremota, izy mbamin''ny zanany sy ny rahalahiny dia roa ambin''ny folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ny fahenina ambin''ny folo an''i Hanania, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ny fahafito ambin''ny folo an''i Josbekasa, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'ny fahavalo ambin''ny folo an''i Hanany, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ny fahasivy ambin''ny folo an''i Maloty, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ny faharoa-polo an''i Eliata, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ny fahiraika amby roa-polo an''i Hotira, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ny faharoa amby roa-polo an''i Gidalty, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ny fahatelo amby roa-polo an''i Mahaziota, izy mbamin''ny zanany sy ny rahalahiny, dia roa ambin''ny folo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ny fahefatra amby roa-polo an'i Romamti-ezera, izy mbamin'ny zanany sy ny rahalahiny, dia roa ambin'ny folo.
