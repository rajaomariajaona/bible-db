document_id: LUK.9
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jesosy niantso ny roa ambin''ny folo lahy hankeo aminy ka nanome azy hery sy fahefana hamoaka ny demonia rehetra sy hahasitrana aretina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Izy naniraka ireo handeha hitory ny fanjakan''Andriamanitra sy hahasitrana ny marary. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy izy taminy: Aza mitondra zavatra ho amin''ny alehanareo, na tehina, na kitapom-batsy, na mofo, na vola, ary aza misy mitondra akanjo roa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary izay trano hidiranareo, dia ao no itoero, ary avy ao indray no ialao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary izay tsy mampandroso, anareo, raha miala amin''izany tanàna izany ianareo, dia ahintsano ny vovoka ho afaka amin''ny tongotrareo ho vavolombelona miampanga azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia lasa nandeha izy ireo ka nitety vohitra nitory ny filazantsara sy nahasitrana teny tontolo eny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary Heroda mpanapaka nandre izay rehetra natao; dia very hevitra izy noho ny filazan''ny olona; fa hoy ny sasany: Jaona no efa nitsangana tamin''ny maty; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary hoy ny sasany: Elia no efa niseho; fa hoy kosa ny sasany: Ny anankiray amin''ny mpaminany fahiny no efa nitsangana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa hoy Heroda: Raha Jaona, dia izaho no efa nanapaka ny lohany; fa iza indray moa Izao, izay reko fa manao izany zavatra izany? Ary izy nitady hahita Azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary rehefa niverina ny Apostoly, dia nanambara tamin''i Jesosy izay efa nataony. Ary Izy nitondra azy ka nandeha nitokana nankany amin''ny tanàna atao hoe Betsaida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny vahoaka, nony nahalala, dia nanaraka Azy; ary Izy nandray azy tsara ka nilaza taminy ny amin''ny fanjakan''Andriamanitra; ary izay marary dia nositraniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nony efa ho hariva ny andro, dia nanatona ny roa ambin''ny folo lahy ka nanao taminy hoe: Ravao ny vahoaka mba hankanesany eny amin''ny vohitra manodidina sy any an-tsaha handry sy hitady hanina; fa atỳ an-tany foana isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa hoy Izy taminy: Omeonareo hanina izy. Ary hoy ireo: Tsy manana mihoatra noho ny mofo dimy sy hazandrano roa izahay, raha tsy handeha hividy hanina ho an''ireo olona rehetra ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa tokony ho dimy arivo lahy izy. Ary hoy Izy tamin''ny mpianany: Asaovy mipetraka an-tokony izy ka tokony ho dimam-polo avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nataony izany, ka nampipetraka azy rehetra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary rehefa noraisin'i Jesosy ny mofo dimy sy ny hazandrano roa, dia niandrandra ny lanitra Izy, ka nanaovany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: nasiany'
    marker-yv: yv-n
  - type: text
    text: ' fisaorana ireo, dia novakiny ka natolony ny mpianany harosony eny anoloan''ny vahoaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nihinana izy rehetra ka voky; ary nangonina izay sombintsombiny sisa tsy lany, ka nisy roa ambin''ny folo harona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary raha nivavaka tao amin''ny mangingina Jesosy, sady teo aminy ny mpianany, dia nanontany azy Izy ka nanao hoe: Ataon''ny olona ho iza moa Aho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia namaly ireo ka nanao hoe: Jaona Mpanao-batisa; nefa ny sasany kosa manao Anao ho Elia, ary ny sasany indray manao hoe: Ny anankiray amin''ny mpaminany fahiny no efa nitsangana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa hoy Izy taminy: Fa ianareo kosa manao Ahy ho iza? Dia namaly Petera ka nanao hoe: Ny Kristin''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary Izy niteny mafy azy sady nandrara azy mba tsy hilazalaza izany amin''olona '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ka nanao hoe: Ny Zanak''olona tsy maintsy hijaly mafy ka holavin''ny loholona sy ny lohan''ny mpisorona mbamin''ny mpanora-dalàna sady hovonoiny; ary amin''ny andro fahatelo dia hatsangana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary hoy koa Jesosy tamin''izy rehetra: Raha misy ta-hanaraka Ahy, aoka izy handà ny tenany, dia hitondra ny hazo fijaliany isan''andro ka hanaraka Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa na iza na iza no ta-hamonjy ny ainy dia hahavery izany; ary na iza na iza no hahavery ny ainy noho ny amiko, dia izy no hamonjy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fa inona no soa azon'ny olona, raha mahazo izao tontolo izao aza, kanefa very ny ainy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny fanahiny'
    marker-yv: yv-n
  - type: text
    text: ', na matiantoka, izany izy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa na iza na iza no ho menatra Ahy sy ny teniko, dia ho menatra azy kosa ny Zanak''olona, raha avy amin''ny voninahiny sy ny an''ny Rainy ary ny an''ny anjely masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa lazaiko aminareo tokoa: Misy ny sasany eto izay tsy mba hanandrana fahafatesana mandra-pahitany ny fanjakan''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary rehefa tokony ho havaloana taorian''izany teny izany, dia nitondra an''i Petera sy Jaona ary Jakoba Izy ka niakatra tany an-tendrombohitra hivavaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary raha mbola nivavaka Izy, dia niova ny toetry ny tarehiny, ary ny fitafiany dia tonga fotsy sady nanelatrelatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary, indreo, nisy roa lahy niresaka taminy, dia Mosesy sy Elia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'izay niseho tamin-boninahitra ka nilaza ny fialany, izay efa hefainy any Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary efa navesatry ny tory ny mason'i Petera sy ny namany; nefa nahari-tory ihany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Nony nahatsiaro tsara'
    marker-yv: yv-n
  - type: text
    text: ' izy, dia nahita ny voninahitr''i Jesosy sy izy roa lahy izay teo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary tamin''ny nisarahan''izy roa lahy taminy dia hoy Petera tamin''i Jesosy: Tompoko, tsara raha mitoetra eto isika; ary aoka izahay hanao tranolay telo: ny anankiray ho Anao, ny anankiray ho an''i Mosesy, ary ny anankiray ho an''i Elia; nefa tsy fantany izay nolazainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary raha mbola niteny izany izy, dia nisy rahona niseho nanarona azy ireo; ary raha niditra tao anatin''ny rahona ireo, dia raiki-tahotra ny mpianatra telo lahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary nisy feo avy tao amin''ny rahona nanao hoe: Ity no Zanako voafidiko; Izy no henoy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary rehefa nitsahatra ny feo, dia Jesosy irery ihany no hita. Ary nangina izy ireo ka tsy nilazalaza tamin''olona na dia iray akory aza tamin''izany andro izany ny amin''izay zavatra efa hitany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary nony ampitson''iny, raha nidina avy teo an-tendrombohitra izy ireo, dia nisy vahoaka betsaka nitsena an''i Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary, indro, nisy lehilahy anankiray avy teo amin''ny vahoaka nitaraina mafy hoe: Mpampianatra ô, masina Hianao, mamindrà fo amin''ny zanako! fa zanako-lahy tokana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary, indro, misy fanahy mahazo azy, ka miantsoantso tampoka izy, ary ny fanahy mampifanintontsintona ny tenany sy mampandoa vory azy, ary sarotra ny fialany aminy ka mahatorotorovana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary nangataka tamin''ny mpianatrao aho mba hamoaka izany, fa tsy afany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary Jesosy namaly ka nanao hoe: Ry taranaka sady tsy mino no efa nivadika, mandra-pahoviana no hitoerako aminareo sy handeferako aminareo? Ento etỳ ny zanakao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary raha mbola nanatona izy, dia nampihinjitrinjitra sy nampifanintontsintona azy ny demonia. Ary Jesosy niteny mafy ny fanahy maloto ka nahasitrana ny zazalahy; dia natolony tamin-drainy indray izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Dia talanjona izy rehetra noho ny fiandrianan''Andriamanitra. Ny nilazan''i Jesosy fanindroany ny hahafatesany sy ny hitsanganany indray. Fa raha talanjona izy rehetra tamin''izay rehetra nataon''i Jesosy, dia hoy Izy tamin''ny mpianany:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ampidironareo ao amin''ny sofinareo izany teny izany; fa ny Zanak''olona efa hatolotra eo an-tànan''ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Nefa tsy azon''ny mpianatra io teny io sady nafenina azy izany mba tsy ho fantany; ary natahotra hanontany Azy ny amin''io teny io izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Dia nisy fisainana niseho tao am-pony ny amin''izay ho lehibe ao aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary Jesosy nahalala ny fisainan''ny fony, dia nandray zaza anankiray ka nametraka azy teo anoloany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'ary hoy Izy tamin''ireo: Na zovy na zovy no mandray io zaza io noho ny anarako dia mandray Ahy; ary na zovy na zovy no mandray Ahy dia mandray Izay naniraka Ahy; fa izay kely indrindra ao aminareo rehetra, dia izy no lehibe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Ary Jaona namaly ka nanao hoe: Tompoko, izahay nahita anankiray namoaka demonia tamin''ny anaranao, ka noraranay izy, satria tsy manaraka antsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Fa hoy Jesosy taminy: Aza raràna, fa izay tsy manohitra anareo dia momba anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Ary rehefa ho tonga ny fotoana hampiakarana an''i Jesosy, dia niatrika hankany Jerosalema Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Ary nandefa iraka hialoha Azy Izy; dia nandeha ireo ka niditra tao amin''ny vohitra anankiray izay an''ny Samaritana hamboatra ho Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Fa tsy nandray Azy ny olona, satria nandroso toa ho any Jerosalema Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Ary raha hitan''i Jakoba sy Jaona mpianany izany, dia hoy izy: Tompoko, tianao va raha hiteny izahay mba hisy afo milatsaka avy any an-danitra handevona azy'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ampio hoe: toy ny nataon''i Elia'
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: Fa Izy nitodika, dia niteny mafy azy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ampio hoe: ka nanao hoe: Tsy fantatrareo ny toetry ny fanahy izay anareo. Fa ny Zanak''olona tsy tonga hahavery ny ain''olona, fa hamonjy azy'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Dia nankany amin''ny vohitra hafa Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Ary nony nandroso teny an-dalana izy, dia nisy anankiray nanao tamin''i Jesosy hoe: Hanaraka Anao aho na aiza na aiza halehanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Fa hoy Jesosy taminy: Ny amboahaolo'
  - type: usfm
    marker: x
    children:
    - type: text
      text: volpa
    marker-yv: yv-n
  - type: text
    text: ' manan-davaka, ary ny voro-manidina manana fialofana; fa ny Zanak''olona tsy mba manana izay hipetrahan''ny lohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Ary hoy Izy tamin''ny anankiray koa: Manaraha Ahy. Fa hoy kosa izy: Tompoko, aoka aho aloha handeha handevina ny raiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Fa hoy Jesosy taminy: Aoka ny maty handevina ny maty ao aminy; fa ianao kosa mandehana, ka mitoria ny fanjakan''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Ary hoy ny anankiray koa: Tompoko, hanaraka Anao ihany aho; fa aoka aho aloha handeha hanao veloma ny ao an-tranoko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Fa hoy Jesosy taminy: Tsy misy olona mitana fangady tarihina ary miherika ka miendrika ho ao amin''ny fanjakan''Andriamanitra.'
