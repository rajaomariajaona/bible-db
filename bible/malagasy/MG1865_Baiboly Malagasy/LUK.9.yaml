document_id: LUK.9,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary Jesosy niantso ny roa ambin''ny folo lahy hankeo aminy ka nanome azy hery sy fahefana hamoaka ny demonia rehetra sy hahasitrana aretina. '
  '10':
  - type: text
    content: 'Ary rehefa niverina ny Apostoly, dia nanambara tamin''i Jesosy izay efa nataony. Ary Izy nitondra azy ka nandeha nitokana nankany amin''ny tanàna atao hoe Betsaida. '
  '11':
  - type: text
    content: 'Ary ny vahoaka, nony nahalala, dia nanaraka Azy; ary Izy nandray azy tsara ka nilaza taminy ny amin''ny fanjakan''Andriamanitra; ary izay marary dia nositraniny. '
  '12':
  - type: text
    content: 'Ary nony efa ho hariva ny andro, dia nanatona ny roa ambin''ny folo lahy ka nanao taminy hoe: Ravao ny vahoaka mba hankanesany eny amin''ny vohitra manodidina sy any an-tsaha handry sy hitady hanina; fa atỳ an-tany foana isika. '
  '13':
  - type: text
    content: 'Fa hoy Izy taminy: Omeonareo hanina izy. Ary hoy ireo: Tsy manana mihoatra noho ny mofo dimy sy hazandrano roa izahay, raha tsy handeha hividy hanina ho an''ireo olona rehetra ireo. '
  '14':
  - type: text
    content: 'Fa tokony ho dimy arivo lahy izy. Ary hoy Izy tamin''ny mpianany: Asaovy mipetraka an-tokony izy ka tokony ho dimam-polo avy. '
  '15':
  - type: text
    content: 'Dia nataony izany, ka nampipetraka azy rehetra izy. '
  '16':
  - type: text
    content: Ary rehefa noraisin'i Jesosy ny mofo dimy sy ny hazandrano roa, dia niandrandra ny lanitra Izy, ka nanaovany
  - type: note
    content: 'Na: nasiany'
  - type: text
    content: ' fisaorana ireo, dia novakiny ka natolony ny mpianany harosony eny anoloan''ny vahoaka. '
  '17':
  - type: text
    content: 'Dia nihinana izy rehetra ka voky; ary nangonina izay sombintsombiny sisa tsy lany, ka nisy roa ambin''ny folo harona. '
  '18':
  - type: text
    content: 'Ary raha nivavaka tao amin''ny mangingina Jesosy, sady teo aminy ny mpianany, dia nanontany azy Izy ka nanao hoe: Ataon''ny olona ho iza moa Aho? '
  '19':
  - type: text
    content: 'Dia namaly ireo ka nanao hoe: Jaona Mpanao-batisa; nefa ny sasany kosa manao Anao ho Elia, ary ny sasany indray manao hoe: Ny anankiray amin''ny mpaminany fahiny no efa nitsangana. '
  '2':
  - type: text
    content: 'Ary Izy naniraka ireo handeha hitory ny fanjakan''Andriamanitra sy hahasitrana ny marary. '
  '20':
  - type: text
    content: 'Fa hoy Izy taminy: Fa ianareo kosa manao Ahy ho iza? Dia namaly Petera ka nanao hoe: Ny Kristin''Andriamanitra. '
  '21':
  - type: text
    content: 'Ary Izy niteny mafy azy sady nandrara azy mba tsy hilazalaza izany amin''olona '
  '22':
  - type: text
    content: 'ka nanao hoe: Ny Zanak''olona tsy maintsy hijaly mafy ka holavin''ny loholona sy ny lohan''ny mpisorona mbamin''ny mpanora-dalàna sady hovonoiny; ary amin''ny andro fahatelo dia hatsangana. '
  '23':
  - type: text
    content: 'Ary hoy koa Jesosy tamin''izy rehetra: Raha misy ta-hanaraka Ahy, aoka izy handà ny tenany, dia hitondra ny hazo fijaliany isan''andro ka hanaraka Ahy. '
  '24':
  - type: text
    content: 'Fa na iza na iza no ta-hamonjy ny ainy dia hahavery izany; ary na iza na iza no hahavery ny ainy noho ny amiko, dia izy no hamonjy izany. '
  '25':
  - type: text
    content: Fa inona no soa azon'ny olona, raha mahazo izao tontolo izao aza, kanefa very ny ainy
  - type: note
    content: 'Na: ny fanahiny'
  - type: text
    content: ', na matiantoka, izany izy? '
  '26':
  - type: text
    content: 'Fa na iza na iza no ho menatra Ahy sy ny teniko, dia ho menatra azy kosa ny Zanak''olona, raha avy amin''ny voninahiny sy ny an''ny Rainy ary ny an''ny anjely masina. '
  '27':
  - type: text
    content: 'Fa lazaiko aminareo tokoa: Misy ny sasany eto izay tsy mba hanandrana fahafatesana mandra-pahitany ny fanjakan''Andriamanitra. '
  '28':
  - type: text
    content: 'Ary rehefa tokony ho havaloana taorian''izany teny izany, dia nitondra an''i Petera sy Jaona ary Jakoba Izy ka niakatra tany an-tendrombohitra hivavaka. '
  '29':
  - type: text
    content: 'Ary raha mbola nivavaka Izy, dia niova ny toetry ny tarehiny, ary ny fitafiany dia tonga fotsy sady nanelatrelatra. '
  '3':
  - type: text
    content: 'Ary hoy izy taminy: Aza mitondra zavatra ho amin''ny alehanareo, na tehina, na kitapom-batsy, na mofo, na vola, ary aza misy mitondra akanjo roa. '
  '30':
  - type: text
    content: 'Ary, indreo, nisy roa lahy niresaka taminy, dia Mosesy sy Elia, '
  '31':
  - type: text
    content: 'izay niseho tamin-boninahitra ka nilaza ny fialany, izay efa hefainy any Jerosalema. '
  '32':
  - type: text
    content: Ary efa navesatry ny tory ny mason'i Petera sy ny namany; nefa nahari-tory ihany
  - type: note
    content: 'Na: Nony nahatsiaro tsara'
  - type: text
    content: ' izy, dia nahita ny voninahitr''i Jesosy sy izy roa lahy izay teo aminy. '
  '33':
  - type: text
    content: 'Ary tamin''ny nisarahan''izy roa lahy taminy dia hoy Petera tamin''i Jesosy: Tompoko, tsara raha mitoetra eto isika; ary aoka izahay hanao tranolay telo: ny anankiray ho Anao, ny anankiray ho an''i Mosesy, ary ny anankiray ho an''i Elia; nefa tsy fantany izay nolazainy. '
  '34':
  - type: text
    content: 'Ary raha mbola niteny izany izy, dia nisy rahona niseho nanarona azy ireo; ary raha niditra tao anatin''ny rahona ireo, dia raiki-tahotra ny mpianatra telo lahy. '
  '35':
  - type: text
    content: 'Ary nisy feo avy tao amin''ny rahona nanao hoe: Ity no Zanako voafidiko; Izy no henoy. '
  '36':
  - type: text
    content: 'Ary rehefa nitsahatra ny feo, dia Jesosy irery ihany no hita. Ary nangina izy ireo ka tsy nilazalaza tamin''olona na dia iray akory aza tamin''izany andro izany ny amin''izay zavatra efa hitany. '
  '37':
  - type: text
    content: 'Ary nony ampitson''iny, raha nidina avy teo an-tendrombohitra izy ireo, dia nisy vahoaka betsaka nitsena an''i Jesosy. '
  '38':
  - type: text
    content: 'Ary, indro, nisy lehilahy anankiray avy teo amin''ny vahoaka nitaraina mafy hoe: Mpampianatra ô, masina Hianao, mamindrà fo amin''ny zanako! fa zanako-lahy tokana izy. '
  '39':
  - type: text
    content: 'Ary, indro, misy fanahy mahazo azy, ka miantsoantso tampoka izy, ary ny fanahy mampifanintontsintona ny tenany sy mampandoa vory azy, ary sarotra ny fialany aminy ka mahatorotorovana azy. '
  '4':
  - type: text
    content: 'Ary izay trano hidiranareo, dia ao no itoero, ary avy ao indray no ialao. '
  '40':
  - type: text
    content: 'Ary nangataka tamin''ny mpianatrao aho mba hamoaka izany, fa tsy afany. '
  '41':
  - type: text
    content: 'Ary Jesosy namaly ka nanao hoe: Ry taranaka sady tsy mino no efa nivadika, mandra-pahoviana no hitoerako aminareo sy handeferako aminareo? Ento etỳ ny zanakao. '
  '42':
  - type: text
    content: 'Ary raha mbola nanatona izy, dia nampihinjitrinjitra sy nampifanintontsintona azy ny demonia. Ary Jesosy niteny mafy ny fanahy maloto ka nahasitrana ny zazalahy; dia natolony tamin-drainy indray izy. '
  '43':
  - type: text
    content: 'Dia talanjona izy rehetra noho ny fiandrianan''Andriamanitra. Ny nilazan''i Jesosy fanindroany ny hahafatesany sy ny hitsanganany indray. Fa raha talanjona izy rehetra tamin''izay rehetra nataon''i Jesosy, dia hoy Izy tamin''ny mpianany:'
  '44':
  - type: text
    content: 'Ampidironareo ao amin''ny sofinareo izany teny izany; fa ny Zanak''olona efa hatolotra eo an-tànan''ny olona. '
  '45':
  - type: text
    content: 'Nefa tsy azon''ny mpianatra io teny io sady nafenina azy izany mba tsy ho fantany; ary natahotra hanontany Azy ny amin''io teny io izy. '
  '46':
  - type: text
    content: 'Dia nisy fisainana niseho tao am-pony ny amin''izay ho lehibe ao aminy. '
  '47':
  - type: text
    content: 'Ary Jesosy nahalala ny fisainan''ny fony, dia nandray zaza anankiray ka nametraka azy teo anoloany; '
  '48':
  - type: text
    content: 'ary hoy Izy tamin''ireo: Na zovy na zovy no mandray io zaza io noho ny anarako dia mandray Ahy; ary na zovy na zovy no mandray Ahy dia mandray Izay naniraka Ahy; fa izay kely indrindra ao aminareo rehetra, dia izy no lehibe. '
  '49':
  - type: text
    content: 'Ary Jaona namaly ka nanao hoe: Tompoko, izahay nahita anankiray namoaka demonia tamin''ny anaranao, ka noraranay izy, satria tsy manaraka antsika. '
  '5':
  - type: text
    content: 'Ary izay tsy mampandroso, anareo, raha miala amin''izany tanàna izany ianareo, dia ahintsano ny vovoka ho afaka amin''ny tongotrareo ho vavolombelona miampanga azy. '
  '50':
  - type: text
    content: 'Fa hoy Jesosy taminy: Aza raràna, fa izay tsy manohitra anareo dia momba anareo. '
  '51':
  - type: text
    content: 'Ary rehefa ho tonga ny fotoana hampiakarana an''i Jesosy, dia niatrika hankany Jerosalema Izy. '
  '52':
  - type: text
    content: 'Ary nandefa iraka hialoha Azy Izy; dia nandeha ireo ka niditra tao amin''ny vohitra anankiray izay an''ny Samaritana hamboatra ho Azy. '
  '53':
  - type: text
    content: 'Fa tsy nandray Azy ny olona, satria nandroso toa ho any Jerosalema Izy. '
  '54':
  - type: text
    content: 'Ary raha hitan''i Jakoba sy Jaona mpianany izany, dia hoy izy: Tompoko, tianao va raha hiteny izahay mba hisy afo milatsaka avy any an-danitra handevona azy'
  - type: note
    content: 'Ampio hoe: toy ny nataon''i Elia'
  - type: text
    content: '? '
  '55':
  - type: text
    content: Fa Izy nitodika, dia niteny mafy azy
  - type: note
    content: 'Ampio hoe: ka nanao hoe: Tsy fantatrareo ny toetry ny fanahy izay anareo. Fa ny Zanak''olona tsy tonga hahavery ny ain''olona, fa hamonjy azy'
  - type: text
    content: '. '
  '56':
  - type: text
    content: 'Dia nankany amin''ny vohitra hafa Izy. '
  '57':
  - type: text
    content: 'Ary nony nandroso teny an-dalana izy, dia nisy anankiray nanao tamin''i Jesosy hoe: Hanaraka Anao aho na aiza na aiza halehanao. '
  '58':
  - type: text
    content: 'Fa hoy Jesosy taminy: Ny amboahaolo'
  - type: note
    content: volpa
  - type: text
    content: ' manan-davaka, ary ny voro-manidina manana fialofana; fa ny Zanak''olona tsy mba manana izay hipetrahan''ny lohany. '
  '59':
  - type: text
    content: 'Ary hoy Izy tamin''ny anankiray koa: Manaraha Ahy. Fa hoy kosa izy: Tompoko, aoka aho aloha handeha handevina ny raiko. '
  '6':
  - type: text
    content: 'Dia lasa nandeha izy ireo ka nitety vohitra nitory ny filazantsara sy nahasitrana teny tontolo eny. '
  '60':
  - type: text
    content: 'Fa hoy Jesosy taminy: Aoka ny maty handevina ny maty ao aminy; fa ianao kosa mandehana, ka mitoria ny fanjakan''Andriamanitra. '
  '61':
  - type: text
    content: 'Ary hoy ny anankiray koa: Tompoko, hanaraka Anao ihany aho; fa aoka aho aloha handeha hanao veloma ny ao an-tranoko. '
  '62':
  - type: text
    content: 'Fa hoy Jesosy taminy: Tsy misy olona mitana fangady tarihina ary miherika ka miendrika ho ao amin''ny fanjakan''Andriamanitra.'
  '7':
  - type: text
    content: 'Ary Heroda mpanapaka nandre izay rehetra natao; dia very hevitra izy noho ny filazan''ny olona; fa hoy ny sasany: Jaona no efa nitsangana tamin''ny maty; '
  '8':
  - type: text
    content: 'ary hoy ny sasany: Elia no efa niseho; fa hoy kosa ny sasany: Ny anankiray amin''ny mpaminany fahiny no efa nitsangana. '
  '9':
  - type: text
    content: 'Fa hoy Heroda: Raha Jaona, dia izaho no efa nanapaka ny lohany; fa iza indray moa Izao, izay reko fa manao izany zavatra izany? Ary izy nitady hahita Azy.'
