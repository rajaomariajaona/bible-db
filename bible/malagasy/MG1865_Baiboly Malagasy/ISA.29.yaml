document_id: ISA.29
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny loza hanjo an'i Jerosalema, sy ny mbola hamonjena azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lozan'i Ariela
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ariela = Fatan''Andriamanitra, na: Lionan''Andriamanitra'
    marker-yv: yv-n
  - type: text
    text: ', lozan''i Ariela, Tanàna nitoeran'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. nitobian'
    marker-yv: yv-n
  - type: text
    text: '''i Davida! Ampio taona ny taona, aoka ho tafatsingeringerina ny andro firavoravoana; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hampahory an''i Ariela Aho, ka hisy fisentoana sy fitarainana ao aminy; Ary ho tonga Ariela tokoa amiko izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hanao fahiranao anao Aho, ka hasiako miaramila hanemitra anao, ary hananganako manda hamelezana anao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia haetry ianao ka hiteny ao amin''ny tany, ary ao amin''ny vovoka no hibitsibitsihanao, eny, ny feonao hivoaka avy amin''ny tany tahaka ny an''ny manao azy ho tsindrian-javatra, ary avy ao amin''ny vovoka no ikiakiahan''ny teninao. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Kanefa ny fahavalonao betsaka ho tonga tahaka ny vovoka madinika, ary ny olon-dozabe maro ho tahaka ny akofa indaosina; Eny, ho avy tampoka dia tampoka izany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Avy amin''i Jehovah, Tompon''ny maro, no hihavian''ny famaliana, dia kotrokorana sy horohoron-tany ary rohondrohona mafy, tadio sy tafio-drivotra ary lelafo mandevona. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ho tahaka ny fahitana eo amin''ny nofy amin''ny alina Ireo firenena betsaka rehetra ireo, izay mivory hamely an''i Ariela, dia izay rehetra mivory hamely azy sy ny mandany ka hampahatahotra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ho tahaka ny olona noana manonofy, fa, indro, mihinana izy; kanjo nony mahatsiaro, dia noana ihany izy; Na ho tahaka ny olona mangetaheta manonofy, fa, indro, misotro izy; kanjo nony mahatsiaro, indro, ana ihany izy, ary ny fanahiny mbola maniry ihany: Dia ho tahaka izany ireo firenena betsaka rehetra ireo Izay mivory hamely ny tendrombohitra Ziona. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mijanona ianareo, ka mitalanjona, Tampeno ny masonareo, koa aoka ho jamba ianareo! Mamo ireo, nefa tsy tamin''ny divay; Mivembena izy, nefa tsy tamin''ny toaka. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa Jehovah efa nampidina fanahy mahasondrian-tory ao aminareo, ary efa nakimpiny ny masonareo (dia ny mpaminany izany), ary efa nosaronany ny lohanareo (dia ny mpahita izany). '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny fahitana ny amin''izany rehetra izany raha aminareo dia tahaka ny teny amin''ny taratasy voaisy tombo-kase, izay atolotra olona mahavaky teny ka atao hoe: Masìna ianao, vakio ity; Fa hoy izy: Tsy azoko vakina, fa efa voaisy tombo-kase izy; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa raha atolotra izay tsy mahavaky teny kosa izany ka atao hoe: Masìna ianao, vakio ity, dia hoy izy: Tsy mahavaky teny aho. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy ny Tompo: Satria manatona Ahy amin''ny vavany ity firenena ity ary mankalaza Ahy amin''ny molony, nefa ampanalaviriny Ahy kosa ny fony, ka ny fahatahorany Ahy dia didin''olombelona ampianarina azy ihany, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia, indro koa, mbola hanao zava-mahagaga amin''ity firenena ity Aho, dia zava-mahagaga sy mahatalanjona; Ka ho foana ny fahendrena kendriny, ary tsy ho hita ny fahalalan''ny mazava sainany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Lozan''izay manafina lalina ny saina ataony mba tsy ho hitan''i Jehovah, sady ao amin''ny maizina ny asany, ka dia hoy izy: Iza no mahita antsika, ary iza no mahalala antsika? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Endrey izato fahadalanareo! Moa ny mpanefy tanimanga va no hoheverina ho tahaka ny tanimanga, ka ny natao va hilaza izay nanao azy hoe: Tsy nanao ahy izy? Na ny zavatra voaforona va hilaza izay namorona azy hoe: Tsy manam-pahalalana izy? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tsy vetivety foana va dia hovana ho saha mahavokatra Libanona, Ary ny saha mahavokatra hoheverina ho ala? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Amin''izany andro izany dia ho ren''ny marenina ny tenin''ny taratasy, ary na dia ao amin''ny aizina sy ny aizim-pito aza dia hahita ihany ny mason''ny jamba. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny mpandefitra hitombo hafaliana amin''i Jehovah; Ary ny malahelo ao amin''ny olona hifaly amin''ny Iray Masin''ny Isiraely, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa lasa ny olon-dozabe, tsy ao intsony ny mpaniratsira; Ary fongotra izay rehetra miari-torin-tsaina amin''ny ratsy, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia ireo manameloka olona amin''ny teny ary mamandrika izay mananatra eo am-bavahady sy mamadika ny marina amin''ny lainga foana. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa ny amin''ny taranak''i Jakoba dia izao no lazain''i Jehovah, Izay nanavotra an''i Abrahama: Tsy ho menatra intsony Jakoba, ary tsy hivaloarika intsony ny tavany. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa raha ny zanany mahita ny asan''ny tanako ao aminy, Dia hanamasina ny anarako izy, eny, hanamasina ny Iray Masin''i Jakoba izy ary hangovitra eo anatrehan''Andriamanitry ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary izay mivily fanahy dia mbola hahazo fahalalana; Ary izay mimonomonona dia mbola hianatra fahendrena.
