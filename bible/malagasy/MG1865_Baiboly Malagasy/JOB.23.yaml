document_id: JOB.23,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny navalin'i Joba
  - type: text
    content: 'Dia namaly Joba ka nanao hoe:'
  '10':
  - type: text
    content: Fa mahalala ny lalana falehako Izy; Raha hizahany toetra aho, dia hivoaka tahaka ny volamena.
  '11':
  - type: text
    content: Ny tongotro nifikitra tamin'ny lalany; Eny, ny lalany no nizorako tsara, ka tsy nivily aho.
  '12':
  - type: text
    content: Ny didin'ny molony tsy mba nialako; Ny tenin'ny vavany noraketiko mihoatra noho ny faniriako
  - type: note
    content: 'Na: anjara-haniko'
  - type: text
    content: .
  '13':
  - type: text
    content: Nefa tsy miova saina Izy, iza no mahasakana Azy? Fa na inona na inona irin'ny fanahiny dia ataony.
  '14':
  - type: text
    content: Eny, manatanteraka izay voatendry ho ahy Izy; Ary zavatra maro toy izany no ao aminy;
  '15':
  - type: text
    content: Roa Izany no mampangovitra ahy eo anatrehany; Raha misaintsaina izany aho, dia matahotra Azy.
  '16':
  - type: text
    content: Fa Andriamanitra no mandrerakany foko, ary ny Tsitoha no mampangovitra ahy;
  '17':
  - type: text
    content: Fa tsy ny fahamaizinana no maharesy ahy, na ny maizim-pito izay manarona ny tavako
  - type: note
    content: 'Na: Satria tsy nalaina aho, dieny tsy mbola avy ny maizina, Ary tsy nanafina ny maizim-pito amin''ny tavako Izy'
  - type: text
    content: .
  '2':
  - type: text
    content: Mbola atao ho fikomianao
  - type: note
    content: 'Na: mangidy'
  - type: text
    content: ' ihany ny fitarainako; Ny tanana mamely ahy dia mitambesatra amin''ny fisentoako.'
  '3':
  - type: text
    content: Enga anie ka ho fantatro izay hahitako Azy ka ho tonga any amin'ny fitoerany aza!
  '4':
  - type: text
    content: Dia handahatra ny teniko eo anatrehany aho. Ka hofenoiko ny teny alahatro ny vavako;
  '5':
  - type: text
    content: Ary hahalala izay teny havaliny ahy aho sy hamantatra izay holazainy amiko.
  '6':
  - type: text
    content: Hery lehibe va no handaharany teny amiko? Tsia, fa Izy indrindra no hihaino ahy
  '7':
  - type: text
    content: Fa amin'izany dia olona marina no ho nifandahatra taminy; Ka dia ho nanan-drariny mihitsy aho tamin'ny Mpitsara ahy.
  '8':
  - type: text
    content: Indro, miantsinanana aho, fa tsy any Izy; Ary miankandrefana aho, fa tsy hitako Izy;
  '9':
  - type: text
    content: Mianavaratra amin'izay iasany aho, fa tsy tazako Izy; Mivily any atsimo Izy, ka tsy hitako.
