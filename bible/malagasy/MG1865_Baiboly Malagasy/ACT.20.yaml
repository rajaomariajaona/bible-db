document_id: ACT.20,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny anatra nataon'i Paoly tamin'ny loholon'ny fiangonana tao Efesosy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nitsahatra ny tabataba, dia nampaka ny mpianatra Paoly ka nananatra azy sy nanao veloma azy, dia lasa nankany Makedonia izy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Paoly nidina, dia niankohoka taminy sy nanohona azy ka nanao hoe: Aza mihorikorika ianareo, fa mbola misy aina ihany izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niakatra Paoly, dia namaky ny mofo, ary rehefa nihinana sy niresaka ela ambara-pahamarain''ny andro izy, dia lasa nandeha. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitondra ilay zatovo efa velona izy ireo ka faly dia faly. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izahay nialoha ho any an-tsambo, dia niondrana nankany Aso, fa eo no handraisana an'i Paoly, satria eo no fotoana nataony, fa nikasa handeha an-tanety
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: handeha tongotra'
      marker-yv: yv-n
    - type: text
      text: ' izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nihaona taminay tany Aso izy, dia noraisinay, ary dia lasa nankany Mitylena izahay. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa niondrana an-tsambo niala teo izahay, dia tonga tandrifin'i Kio nony ampitso; ary nony ampitso indray dia niantsona tao Samo; ka
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Ampio hoe: (rehefa nitoetra any Trogilio, dia)'
      marker-yv: yv-n
    - type: text
      text: ' tonga tany Mileto izahay nony ampitson''iny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa Paoly efa nikasa handeha an-tsambo handalo any Efesosy mba tsy hitoerany ela any Asia; fa maika izy, raha azony hatao, hamonjy ny andro Pentekosta any Jerosalema.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha tany Mileto Paoly, dia naniraka hankany Efesosy izy ka nampaka ny loholon
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. presbytera
      marker-yv: yv-n
    - type: text
      text: '''ny fiangonana'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. eklesia
      marker-yv: yv-n
    - type: text
      text: ' hankeo aminy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony tonga teo aminy ireo, dia hoy izy taminy: Fantatrareo hatramin''ny andro voalohany nahatongavako teto Asia izay toetry ny fitondran-tenako taminareo tamin''izany andro rehetra izany, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia ny nanompoako ny Tompo tamin''ny fanetren-tena rehetra sy ny ranomaso ary ny fakam-panahy izay nanjo ahy tamin''ny fanotrehan''ny Jiosy, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nitety izany tany izany sy nananatra ny olona tamin''ny teny maro izy, dia tonga tany Grisia. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka tsy mba nafeniko izay mahasoa, fa nambarako sy nampianariko anareo teo imason''ny olona ary tao amin''ny isan-trano; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary nambarako tamin'ny Jiosy sy ny jentilisa
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. Grika
      marker-yv: yv-n
    - type: text
      text: ' koa ny fibebahana amin''Andriamanitra sy ny finoana an''i Jesosy Kristy Tompontsika. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ankehitriny, indro, tery
    - type: usfm
      marker: x
      children:
      - type: text
        text: mifatotra
      marker-yv: yv-n
    - type: text
      text: ' am-panahy hankany Jerosalema aho, nefa tsy fantatro izay hanjo ahy any, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afa-tsy izay ambaran''ny Fanahy Masina amiko amin''ny isan-tanàna, fa hisy famatorana sy fahoriana hanjo ahy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa tsy ataoko ho zavatra akory ny aiko, mba hahavita ny alehako, dia ny fanompoana izay noraisiko tamin''i Jesosy Tompo hanambara ny filazantsaran''ny fahasoavan''Andriamanitra. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary, indro, ankehitriny fantatro fa tsy hahita ny tavako intsony ianareo rehetra izay nalehako nitoriako ny fanjakana. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa manambara aminareo aho anio fa afaka amin''ny ranareo rehetra aho. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy nafeniko anareo, fa notoriko taminareo avokoa ny saina rehetra natolotr''Andriamanitra. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tandremo ny tenanareo sy ny ondry rehetra izay nanaovan'ny Fanahy Masina anareo ho mpitandrina
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. episkopo
      marker-yv: yv-n
    - type: text
      text: ', hiandrasanareo ny fiangonan'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. eklesia'
      marker-yv: yv-n
    - type: text
      text: '''Andriamanitra'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ny fiangonan''ny Tompo'
      marker-yv: yv-n
    - type: text
      text: ', izay novidiny tamin''ny ràny. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fantatro fa rehefa lasa aho dia hisy amboadia
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. lopa
      marker-yv: yv-n
    - type: text
      text: ' masiaka hiditra eo aminareo izay tsy hiantra ny ondry. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony efa nitoetra telo volana teo izy ka efa hiondrana an-tsambo hankany Syria, ary nisy Jiosy nanotrika azy, dia niova hevitra izy ka lasa niverina namaky an''i Makedonia. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary avy aminareo no hiposahan''ny olona sasany mitory teny tsy marina hitaona ny mpianatra hanaraka azy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa miambena, ary tsarovy fa telo taona mipaka aho tsy nitsahatra nananatra anareo rehetra andro aman''alina tamin''ny ranomaso. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ankehitriny izaho manolotra anareo ho amin''Andriamanitra sy ho amin''ny tenin''ny fahasoavany, izay mahay mampandroso sy manome lova anareo eo amin''izay rehetra nohamasinina. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy mba naniry volafotsy na volamena na lamban''olona aho. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa fantatrareo ihany fa ireto tanako ireto no niasa mba hahazoako sy ny niaraka tamiko izay nilainay. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nasehoko anareo tamin''ny zavatra rehetra fa tokony hiasa toy izany koa ianareo, mba hiantra ny mahantra ka hahatsiaro ny tenin''i Jesosy Tompo, izay manao hoe: Mahasambatra kokoa ny manome noho ny mandray. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa niteny izany izy, dia nandohalika teo ka niara-nivavaka tamin''izy rehetra. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitomany mafy izy rehetra, dia namihina ny vozon''i Paoly ka nanoroka azy, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: sady nalahelo loatra noho ny nilazany fa tsy hahita ny tavany intsony izy. Dia nanatitra azy teny an-tsambo izy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niaraka taminy hatrany Asia Sopatera, zanak''i Pyro, avy any Beria, ary Aristarko sy Sekondo avy any Tesalonika, ary Gaio avy any Derbe, ary Timoty, ary Tykiko sy Trofimo avy any Asia. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo dia efa nialoha ka niandry anay tany Troasy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niondrana an-tsambo niala tany Filipy izahay, rehefa tapitra ny andro fihinanana ny mofo tsy misy masirasira, dia nankany aminy tany Troasy izahay nony afaka hadimiana; ary tany no nitoeranay hafitoana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin''ny andro voalohany amin''ny herinandro, rehefa niangona hamaky mofo izahay, Paoly dia nitori-teny taminy, fa nikasa handeha maraina izy; dia naharitra nitori-teny mandra-paha-mamatonalina izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy jiro maro teo an-trano ambony izay niangonanay. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy zatovo anankiray atao hoe Eotyka nipetraka teo am-baravarankely ka sondrian-tory; ary raha naharitra ela ny toritenin''i Paoly, dia niraika noho ny torimaso ilay zatovo ka nianjera tamin''ny tany avy eny amin''ny rihana intelo mifanongoa, ary nony narenina izy, dia indro fa efa maty. '
