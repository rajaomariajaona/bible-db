document_id: MRK.13,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary nony niala teo an-kianjan''ny tempoly Jesosy, dia hoy ny mpianany anankiray taminy: Mpampianatra ô, akory re ireto vato sy rafitra ireto! '
  '10':
  - type: text
    content: 'Ary ny firenena rehetra tsy maintsy hitoriana ny filazantsara aloha. '
  '11':
  - type: text
    content: 'Koa raha mitondra anareo hatolotra izy, dia aza manahy rahateo izay holazainareo; fa izay teny homena anareo''amin''izany ora izany no holazainareo; fa tsy ianareo no hiteny, fa ny Fanahy Masina. '
  '12':
  - type: text
    content: 'Ary ny rahalahy hanolotra ny rahalahiny ho amin''ny fahafatesana, ary ny ray hanolotra ny zanany; ary ny zanaka hitsangana hanohitra ny rainy aman-dreniny ka hahafaty azy. '
  '13':
  - type: text
    content: 'Ary ho halan''ny olona rehetra ianareo noho ny anarako: fa izay maharitra hatramin''ny farany no hovonjena. '
  '14':
  - type: text
    content: 'Fa raha hitanareo mitsangana amin''izay tsy mety hitsanganany ny fahavetavetan''ny fandravana (Dan. 12. 11; 9. 27) (aoka hisaina izay mamaky izany), dia aoka handositra ho any an-tendrombohitra izay olona any Jodia. '
  '15':
  - type: text
    content: 'Ary izay ao an-tampon-trano aoka tsy hidina na hiditra haka zavatra ao an-tranony. '
  '16':
  - type: text
    content: 'Ary izay any an-tsaha aoka tsy hiverina haka ny lambany. '
  '17':
  - type: text
    content: 'Ary lozan''ny bevohoka sy ny mitaiza kely amin''izany andro izany! '
  '18':
  - type: text
    content: 'Fa mivavaha ianareo mba tsy ho amin''ny ririnina izany. '
  '19':
  - type: text
    content: 'Fa amin''izany andro izany dia hisy fahoriana izay tsy mbola nisy toy izany hatrizay nanaovan''Andriamanitra izao tontolo izao ka mandraka izao ankehitriny izao, sady tsy hisy intsony. '
  '2':
  - type: text
    content: 'Ary Jesosy nanao taminy hoe: Hitanao va ireto rafitra lehibe ireto? Tsy havela hisy vato hifanongoa eto ka tsy horavana. '
  '20':
  - type: text
    content: 'Ary raha tsy nohafohezin''ny Tompo izany andro izany, dia tsy nisy nofo hovonjena; fa noho ny olom-boafidy, izay nofidiny, dia nohafoheziny izany andro izany. '
  '21':
  - type: text
    content: 'Ary amin''izay raha tàhiny misy olona manao aminareo hoe: Indro, etỳ Kristy, na: Indro, erỳ ; aza mino ianareo. '
  '22':
  - type: text
    content: Fa hisy Kristy sandoka sy mpaminany sandoka hitsangana
  - type: note
    content: 'Na: hatsangana'
  - type: text
    content: ', ka haneho famantarana sy fahagagana hamitahany na dia ny olom-boafidy aza, raha azo atao izany. '
  '23':
  - type: text
    content: 'Fa mitandrema kosa ianareo; indro, efa voalazako taminareo raha-teo ny zavatra rehetra. '
  '24':
  - type: text
    content: 'Fa amin''izany andro izany, raha afaka izany fahoriana izany, ny masoandro hohamaizinina, ary ny volana tsy haneho fahazavana, '
  '25':
  - type: text
    content: 'ary ny kintana hiraraka avy eny amin''ny lanitra, ary hohozongozonina ny hery izay ao amin''ny lanitra. '
  '26':
  - type: text
    content: 'Ary amin''izay ny Zanak''olona dia ho hita avy eo amin''ny rahona amin''ny hery lehibe sy ny voninahitra. '
  '27':
  - type: text
    content: Ary amin'izay dia haniraka ny anjely Izy, ary hanangona ny olom-boafidiny avy amin'ny vazan-tany efatra
  - type: note
    content: Gr. rivotra
  - type: text
    content: ' hatramin''ny faran''ny tany ka hatramin''ny faran''ny lanitra. '
  '28':
  - type: text
    content: 'Ary mianara ny fanoharana ny amin''ny aviavy: Raha vao manaroka ny rantsany ka mandravina, dia fantatrareo fa efa akaiky ny lohataona. '
  '29':
  - type: text
    content: Dia tahaka izany koa ianareo, raha vao hitanareo fa tonga izany zavatra izany, dia aoka ho fantatrareo fa efa akaiky eo am-baravarana Izy
  - type: note
    content: 'Na: izany'
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Ary raha nipetraka teo amin''ny tendrombohitra Oliva tandrifin''ny tempoly Izy, dia nanontany Azy mangingina Petera sy Jakoba sy Jaona ary Andrea hoe: '
  '30':
  - type: text
    content: Lazaiko aminareo marina tokoa fa tsy mba ho lany
  - type: note
    content: Gr. handalo
  - type: text
    content: ' ity taranaka ity'
  - type: note
    content: 'Na: ity firenena ity'
  - type: text
    content: ' mandra-pahatongan''izany rehetra izany. '
  '31':
  - type: text
    content: 'Ny lanitra sy ny tany ho levona, fa ny teniko tsy mba ho levona. '
  '32':
  - type: text
    content: 'Fa ny amin''izany andro na ora izany dia tsy misy mahalala, na dia ny anjely any an-danitra, ary na dia ny Zanaka aza, afa-tsy ny Ray ihany. '
  '33':
  - type: text
    content: Mitandrema, miambena
  - type: note
    content: Gr. miareta tory
  - type: text
    content: ', ka mivavaha; fa tsy fantatrareo izay hihavian''ny fotoana. '
  '34':
  - type: text
    content: 'Izany dia tahaka ny olona nandeha hivahiny, izay nandao ny tranony ka nanome fahefana ny mpanompony, ka samy notolorany ny raharahany avy, ary ny mpiandry varavarana dia nasainy niambina tsara; '
  '35':
  - type: text
    content: 'Koa miambena ianareo, fa tsy fantatrareo izay andro hihavian''ny tompon-trano, na ho hariva, na ho mamatonalina, na ho maneno akoho, na ho maraina, '
  '36':
  - type: text
    content: 'fandrao avy tampoka izy ka mahita anareo matory. '
  '37':
  - type: text
    content: Ary izay lazaiko aminareo dia lazaiko amin'ny olona rehetra
  '4':
  - type: text
    content: 'Lazao aminay: Rahoviana no hisy izany? ary inona no ho famantarana, rehefa ho tonga izany rehetra izany? '
  '5':
  - type: text
    content: 'Ary Jesosy nilaza taminy hoe: Mitandrema, fandrao hisy hamitaka anareo. '
  '6':
  - type: text
    content: 'Fa maro no ho avy amin''ny anarako hanao hoe: Izaho no Izy, ka maro no ho voafitany. '
  '7':
  - type: text
    content: 'Ary raha mandre ady sy filazana ady ianareo, dia aza matahotra; tsy maintsy hisy izany, nefa tsy mbola tonga ny farany. '
  '8':
  - type: text
    content: Fa hisy firenena hitsangana hamely firenena, ary hisy fanjakana hitsangana hamely fanjakana; ary hisy horohorontany any amin'ny tany samy hafa, sady hisy mosary; izany no fiandohan'ny fahoriana
  - type: note
    content: Gr. faharariam-piterahana
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Fa mitandrema ianareo, fa hatolotra amin''ny Synedriona sy hokapohina ao amin''ny synagoga ary hitsangana eo anatrehan''ny mpanapaka sy ny mpanjaka noho ny amiko ianareo ho vavolombelona aminy. '
