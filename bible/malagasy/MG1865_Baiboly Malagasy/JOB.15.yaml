document_id: JOB.15,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny fanindroany nataon'i Elifaza
  - type: text
    content: 'Dia namaly Elifaza Temanita ka nanao hoe:'
  '10':
  - type: text
    content: Ny anti-panahy sy ny fotsy volo dia misy ato aminay, eny, olona ela niainana noho ny rainao aza.
  '11':
  - type: text
    content: Ataonao ho tsinontsinona va ny fampiononana avy amin'Andriamanitra sy ny teny natao aminao amin'ny fahalemem-panahy?
  '12':
  - type: text
    content: Nahoana no dia entin'ny fonao ianao? Ary nahoana no mipipy foana ny masonao,
  '13':
  - type: text
    content: Ka miefonefona amin'Andriamanitra ianao, sady miteniteny foana ny vavanao?
  '14':
  - type: text
    content: Inona ny zanak'olombelona no mba hadio izy? Ary izay tera-behivavy no mba ho marina?
  '15':
  - type: text
    content: Indro, ireo anjeliny
  - type: note
    content: Heb. masina
  - type: text
    content: ' aza tsy mahatoky Azy, ary ny lanitra aza tsy madio eo imasony;'
  '16':
  - type: text
    content: Koa mainka fa izay vetaveta sy tena ratsy, dia ny olona izay misotro heloka toa rano!
  '17':
  - type: text
    content: Hanambara aminao aho, ka mihainoa ahy fa izay efa hitako no holazaiko,
  '18':
  - type: text
    content: Dia zavatra notorin'ny olon-kendry, fa tsy nafeniny, dia izay azony avy tamin'ny razany;
  '19':
  - type: text
    content: Ireny ihany no nomena ny tany, ary tsy nisy olona hafa firenena nisisika teo aminy.
  '2':
  - type: text
    content: Tokony handahatra hevi-dravina va ny olon-kendry, ka hameno ny kibony amin'ny rivotra avy any atsinanana va,
  '20':
  - type: text
    content: Ny ratsy fanahy mijalijaly amin'ny androny rehetra, dia amin'ny taona rehetra voatendry ho an'ny lozabe.
  '21':
  - type: text
    content: Feo mampitahotra no ren'ny sofiny; Ary na dia miadana aza izy, dia avy hamely azy ihany ny mpandroba.
  '22':
  - type: text
    content: Tsy manantena ho afaka amin'ny maizina izy; Andrasan'ny sabatra izy.
  '23':
  - type: text
    content: 'Mirenireny hitady izay hohaniny izy ka manao hoe: Aiza re? Fantany fa antomotra azy ny andro maizina.'
  '24':
  - type: text
    content: Fahoriana sy fahaporitana
  - type: note
    content: 'Na: Alahelo sy ahiahy'
  - type: text
    content: ' no mampitahotra azy; Mandresy azy ireo tahaka ny mpanjaka efa vonona ho amin''ny ady,'
  '25':
  - type: text
    content: Satria naninjitra ny tanany hanohitra an'Andriamanitra izy Ary nirehareha hanohitra ny Tsitoha.
  '26':
  - type: text
    content: Mimaona amin'ny fahamafian-katoka hamely Azy izy, dia amin'ny foitran'ampingany matevina,
  '27':
  - type: text
    content: Satria efa matavitavy tarehy izy, ary mivalon-kotraka ny valahany;
  '28':
  - type: text
    content: Ary monina ao an-tanana rava izy, dia ao an-trano tokony tsy hitoeran'olona, izay efa voatendry ho korontam-bato.
  '29':
  - type: text
    content: Tsy hanan-karena izy, sady tsy haharitra ny heriny, ka tsy ho vokatra
  - type: note
    content: Heb. hilonjehitra amin'ny tany toy ny vary efa vokatra
  - type: text
    content: ' ambonin''ny tany ny fananany.'
  '3':
  - type: text
    content: Ary hamaly amin'ny teny tsy mahasoa sy ny teny tsy mahatsara?
  '30':
  - type: text
    content: Tsy ho afaka amin'ny maizina izy; ny solofony hikainkona azon'ny lelafo; ho levon'ny fofonain'Andriamanitra izy.
  '31':
  - type: text
    content: Aoka tsy ho voafitaka hatoky zava-poana izy; fa zava-poana no ho valiny homena azy.
  '32':
  - type: text
    content: Raha mbola tsy tonga aza ny androny, dia manjo azy izany, ary tsy ho maitso ny sampany.
  '33':
  - type: text
    content: Ho tahaka ny voaloboka manintsana ny voany manta izy ary ho tahaka ny hazo oliva mampiraraka ny voniny.
  '34':
  - type: text
    content: Fa tsy ho vanona ny ankohonan'ny mpihatsaravelatsihy
  - type: note
    content: 'Na: ratsy fanahy'
  - type: text
    content: ', ary ho lanin''ny afo ny tranon''ny mpitoroka.'
  '35':
  - type: text
    content: Torontoronina fampahoriana izy ka miteraka fandozana, ary ny kibony mamorom-pitaka.
  '4':
  - type: text
    content: Eny, foananao ny fahatahorana an'Andriamanitra, ary tampenanao
  - type: note
    content: 'Na: hamavoinao'
  - type: text
    content: ' ny fivavahana eo anatrehany;'
  '5':
  - type: text
    content: Fa ny helokao no manesika ny vavanao, ary mianatra ny lelan'ny fetsy ianao
  - type: note
    content: 'Na: Tsy maneho ny helokao va ny vavanao, Na dia mianatra ny lelan''ny fetsy aza ianao?'
  - type: text
    content: .
  '6':
  - type: text
    content: Ny vavanao ihany no manameloka anao, fa tsy izaho; Ary ny molotrao ihany no mamely anao.
  '7':
  - type: text
    content: Hianao va no voalohany izay nateraka ho olombelona? Na naloaky ny kibo talohan'ny tendrombohitra va ianao?
  '8':
  - type: text
    content: Isan'ny mpihevitra teo amin'Andriamanitra va ianao, ka voarombakao ho anao irery ny fahendrena?
  '9':
  - type: text
    content: Inona no fantatrao, ka tsy mba fantatray koa, na saina azonao, ka tsy ato aminay koa?
