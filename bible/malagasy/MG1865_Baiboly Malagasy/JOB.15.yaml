document_id: JOB.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny teny fanindroany nataon'i Elifaza
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia namaly Elifaza Temanita ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tokony handahatra hevi-dravina va ny olon-kendry, ka hameno ny kibony amin'ny rivotra avy any atsinanana va,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary hamaly amin'ny teny tsy mahasoa sy ny teny tsy mahatsara?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Eny, foananao ny fahatahorana an'Andriamanitra, ary tampenanao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hamavoinao'
    marker-yv: yv-n
  - type: text
    text: ' ny fivavahana eo anatrehany;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa ny helokao no manesika ny vavanao, ary mianatra ny lelan'ny fetsy ianao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Tsy maneho ny helokao va ny vavanao, Na dia mianatra ny lelan''ny fetsy aza ianao?'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny vavanao ihany no manameloka anao, fa tsy izaho; Ary ny molotrao ihany no mamely anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hianao va no voalohany izay nateraka ho olombelona? Na naloaky ny kibo talohan'ny tendrombohitra va ianao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Isan'ny mpihevitra teo amin'Andriamanitra va ianao, ka voarombakao ho anao irery ny fahendrena?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Inona no fantatrao, ka tsy mba fantatray koa, na saina azonao, ka tsy ato aminay koa?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny anti-panahy sy ny fotsy volo dia misy ato aminay, eny, olona ela niainana noho ny rainao aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ataonao ho tsinontsinona va ny fampiononana avy amin'Andriamanitra sy ny teny natao aminao amin'ny fahalemem-panahy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nahoana no dia entin'ny fonao ianao? Ary nahoana no mipipy foana ny masonao,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ka miefonefona amin'Andriamanitra ianao, sady miteniteny foana ny vavanao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Inona ny zanak'olombelona no mba hadio izy? Ary izay tera-behivavy no mba ho marina?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Indro, ireo anjeliny
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. masina
    marker-yv: yv-n
  - type: text
    text: ' aza tsy mahatoky Azy, ary ny lanitra aza tsy madio eo imasony;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Koa mainka fa izay vetaveta sy tena ratsy, dia ny olona izay misotro heloka toa rano!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hanambara aminao aho, ka mihainoa ahy fa izay efa hitako no holazaiko,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Dia zavatra notorin'ny olon-kendry, fa tsy nafeniny, dia izay azony avy tamin'ny razany;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ireny ihany no nomena ny tany, ary tsy nisy olona hafa firenena nisisika teo aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny ratsy fanahy mijalijaly amin'ny androny rehetra, dia amin'ny taona rehetra voatendry ho an'ny lozabe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Feo mampitahotra no ren'ny sofiny; Ary na dia miadana aza izy, dia avy hamely azy ihany ny mpandroba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tsy manantena ho afaka amin'ny maizina izy; Andrasan'ny sabatra izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mirenireny hitady izay hohaniny izy ka manao hoe: Aiza re? Fantany fa antomotra azy ny andro maizina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fahoriana sy fahaporitana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Alahelo sy ahiahy'
    marker-yv: yv-n
  - type: text
    text: ' no mampitahotra azy; Mandresy azy ireo tahaka ny mpanjaka efa vonona ho amin''ny ady,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Satria naninjitra ny tanany hanohitra an'Andriamanitra izy Ary nirehareha hanohitra ny Tsitoha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Mimaona amin'ny fahamafian-katoka hamely Azy izy, dia amin'ny foitran'ampingany matevina,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Satria efa matavitavy tarehy izy, ary mivalon-kotraka ny valahany;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary monina ao an-tanana rava izy, dia ao an-trano tokony tsy hitoeran'olona, izay efa voatendry ho korontam-bato.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tsy hanan-karena izy, sady tsy haharitra ny heriny, ka tsy ho vokatra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hilonjehitra amin'ny tany toy ny vary efa vokatra
    marker-yv: yv-n
  - type: text
    text: ' ambonin''ny tany ny fananany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tsy ho afaka amin'ny maizina izy; ny solofony hikainkona azon'ny lelafo; ho levon'ny fofonain'Andriamanitra izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Aoka tsy ho voafitaka hatoky zava-poana izy; fa zava-poana no ho valiny homena azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Raha mbola tsy tonga aza ny androny, dia manjo azy izany, ary tsy ho maitso ny sampany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ho tahaka ny voaloboka manintsana ny voany manta izy ary ho tahaka ny hazo oliva mampiraraka ny voniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Fa tsy ho vanona ny ankohonan'ny mpihatsaravelatsihy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ratsy fanahy'
    marker-yv: yv-n
  - type: text
    text: ', ary ho lanin''ny afo ny tranon''ny mpitoroka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Torontoronina fampahoriana izy ka miteraka fandozana, ary ny kibony mamorom-pitaka.
