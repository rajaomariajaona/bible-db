document_id: PSA.67,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanirian'ny olo-marina mba hanaiky an'Andriamanitra avokoa ny firenena rehetra
  - type: text
    content: 'Ho an''ny mpiventy hira. Hampiarahina amin''ny valiha. Salamo. Tonon-kira. Andriamanitra anie hamindra fo aminay sy hitahy anay; hampamirapiratra ny tavany aminay anie Izy; '
  '2':
  - type: text
    content: Mba ho fantatra etỳ ambonin'ny tany ny lalanao sy ny famonjenao any amin'ny jentilisa rehetra.
  '3':
  - type: text
    content: 'Hidera Anao ny firenena, Andriamanitra ô; eny, hidera Anao ny firenena rehetra. '
  '4':
  - type: text
    content: Hifaly sy hihoby ny firenentsamy hafa, Satria mitsara marina ny firenena Hianao; ny firenen-tsamy hafa ambonin'ny tany dia entinao;
  '5':
  - type: text
    content: 'Hidera Anao ny firenena, Andriamanitra ô; eny, hidera Anao ny firenena rehetra. '
  '6':
  - type: text
    content: 'Ny tany efa nahavokatra; mitahy antsika Andriamanitra, dia Andriamanitsika. '
  '7':
  - type: text
    content: Mitahy antsika Andriamanitra; ary hatahotra Azy ny vazan-tany rehetra.
