document_id: PSA.67
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fanirian'ny olo-marina mba hanaiky an'Andriamanitra avokoa ny firenena rehetra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Hampiarahina amin''ny valiha. Salamo. Tonon-kira. Andriamanitra anie hamindra fo aminay sy hitahy anay; hampamirapiratra ny tavany aminay anie Izy; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mba ho fantatra etỳ ambonin'ny tany ny lalanao sy ny famonjenao any amin'ny jentilisa rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hidera Anao ny firenena, Andriamanitra ô; eny, hidera Anao ny firenena rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hifaly sy hihoby ny firenentsamy hafa, Satria mitsara marina ny firenena Hianao; ny firenen-tsamy hafa ambonin'ny tany dia entinao;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hidera Anao ny firenena, Andriamanitra ô; eny, hidera Anao ny firenena rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny tany efa nahavokatra; mitahy antsika Andriamanitra, dia Andriamanitsika. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mitahy antsika Andriamanitra; ary hatahotra Azy ny vazan-tany rehetra.
