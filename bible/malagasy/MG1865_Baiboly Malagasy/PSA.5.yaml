document_id: PSA.5,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Salamo hatao amin'ny maraina, milaza ny amin'ny olona mahazo manatona an'Andriamanitra, sy ny hitsarana ny ratsy fanahy
  - type: text
    content: 'Ho an''ny mpiventy hira. Hampiarahina amin''ny sodina. Salamo nataon''i Davida. Jehovah ô, henoy ny teniko; fantaro ny eritreritro. '
  '10':
  - type: text
    content: 'Helohy izy, Andriamanitra ô; Aoka ho lavon''ny saina ataony izy; Roahy izy noho ny haben''ny fahotany, satria efa niodina taminao. '
  '11':
  - type: text
    content: 'Dia hifaly izay rehetra mialoka aminao, hihoby mandrakariva izy, koa miarova azy Hianao; ka dia ho ravoravo aminao izay tia ny anaranao. '
  '12':
  - type: text
    content: Fa Hianao, Jehovah ô, mitahy ny marina; fankasitrahana no ataonao manodidina azy toy ny ampinga lehibe.
  '2':
  - type: text
    content: Henoy ny feon'ny fitarainako, ry Mpanjakako sy Andriamanitro ô;fa Hianao no ivavahako.
  '3':
  - type: text
    content: Jehovah ô, maraina no handrenesanao ny feoko; maraina no hivavahako
  - type: note
    content: 'Heb: handaharako'
  - type: text
    content: ' aminao, ka hanandrandra aho. '
  '4':
  - type: text
    content: 'Fa tsy Andriamanitra mankasitraka izay ratsy Hianao; tsy hitoetra aminao ny ratsy. '
  '5':
  - type: text
    content: 'Tsy hahazo mijanona eo imasonao ny mpirehareha; halanao ny mpanao ratsy rehetra. '
  '6':
  - type: text
    content: 'Haringanao ny mpiteny lainga;ny olona mpandatsa-drà sy mpamitaka dia ataon''i Jehovah ho zava-betaveta. '
  '7':
  - type: text
    content: Fa izaho kosa noho ny haben'ny famindram-ponao dia hiditra ao an-tranonao; hiankohoka manatrika ny lapanao masina amin'ny fahatahorana anao aho.
  '8':
  - type: text
    content: 'Jehovah ô, tariho amin''ny fahamarinanao aho noho ny amin''ny mpampahory ahy; ataovy marina eo anoloako ny lalanao. '
  '9':
  - type: text
    content: Fa tsy misy azo itokiana ny aloaky ny vavany; ny ao anatiny dia tena faharatsiana
  - type: note
    content: 'Na: lavaka mitanatana'
  - type: text
    content: ; fasana misokatra ny tendany. Mandambolambo ny lelany izy.
