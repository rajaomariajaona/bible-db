document_id: PSA.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salamo hatao amin'ny maraina, milaza ny amin'ny olona mahazo manatona an'Andriamanitra, sy ny hitsarana ny ratsy fanahy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Hampiarahina amin''ny sodina. Salamo nataon''i Davida. Jehovah ô, henoy ny teniko; fantaro ny eritreritro. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Henoy ny feon'ny fitarainako, ry Mpanjakako sy Andriamanitro ô;fa Hianao no ivavahako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Jehovah ô, maraina no handrenesanao ny feoko; maraina no hivavahako
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Heb: handaharako'
    marker-yv: yv-n
  - type: text
    text: ' aminao, ka hanandrandra aho. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa tsy Andriamanitra mankasitraka izay ratsy Hianao; tsy hitoetra aminao ny ratsy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsy hahazo mijanona eo imasonao ny mpirehareha; halanao ny mpanao ratsy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Haringanao ny mpiteny lainga;ny olona mpandatsa-drà sy mpamitaka dia ataon''i Jehovah ho zava-betaveta. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa izaho kosa noho ny haben'ny famindram-ponao dia hiditra ao an-tranonao; hiankohoka manatrika ny lapanao masina amin'ny fahatahorana anao aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jehovah ô, tariho amin''ny fahamarinanao aho noho ny amin''ny mpampahory ahy; ataovy marina eo anoloako ny lalanao. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa tsy misy azo itokiana ny aloaky ny vavany; ny ao anatiny dia tena faharatsiana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: lavaka mitanatana'
    marker-yv: yv-n
  - type: text
    text: ; fasana misokatra ny tendany. Mandambolambo ny lelany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Helohy izy, Andriamanitra ô; Aoka ho lavon''ny saina ataony izy; Roahy izy noho ny haben''ny fahotany, satria efa niodina taminao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hifaly izay rehetra mialoka aminao, hihoby mandrakariva izy, koa miarova azy Hianao; ka dia ho ravoravo aminao izay tia ny anaranao. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa Hianao, Jehovah ô, mitahy ny marina; fankasitrahana no ataonao manodidina azy toy ny ampinga lehibe.
