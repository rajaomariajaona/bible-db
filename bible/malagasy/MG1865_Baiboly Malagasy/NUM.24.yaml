document_id: NUM.24,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary rehefa hitan''i Balama fa sitrak''i Jehovah ny hitahy ny Isiraely, dia tsy nandeha tahaka ny teo hanao sikidy intsony izy, fa nitodika nanatrika ny efitra fotsiny. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia nirehitra tamin''i Balama ny fahatezeran''i Balaka, ka niteha-tanana izy; dia hoy izy tamin''i Balama: Hanozona ny fahavaloko no niantsoako anao, kanjo efa nitso-drano azy intelo ianao izao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Koa ankehitriny, mandosira ho any amin''ny fonenanao ianao. Hoy izaho teo: Hanome voninahitra anao tokoa aho; fa, indro, Jehovah efa nisakana anao tsy hahazo voninahitra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia hoy Balama tamin''i Balaka: Moa tsy efa nilaza tamin''ny irakao izay nirahinao tamiko va aho ka nanao hoe: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Na dia homen''i Balaka volafotsy sy volamena eran''ny tranony aza aho, dia tsy mahazo manoatra ny didin''i Jehovah, na hanao soa, na hanao ratsy, avy amin''ny saiko; izay holazain''i Jehovah ihany no holazaiko? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary ankehitriny, indro, efa handeha ho any amin''ny fireneko aho, dia aoka hananatra anao aho ny amin''izay hataon''ity firenena ity amin''ny vahoakanao any am-parany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia nanao oha-teny izy ka nilaza hoe: Hoy Balama, zanak''i Beora, dia ny lehilahy izay voakimpy ny masony;'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Izay mandre ny tenin''Andriamanitra sady mahalala ny fahalalan''ny Avo Indrindra, izay mahita fahitana avy amin''ny Tsitoha, torana, kanefa voahiratra ny masony:'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Hitako Izy, nefa tsy ankehitriny; tazako Izy, nefa tsy akaiky; misy kintana miseho avy amin'i Jakoba sy tehim-panjakana miposaka avy amin'Isiraely ka mandrava ny sisin-tanin'i Moaba Ary mandringana ny mpitabataba rehetra.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Edoma sy Seïra fahavalony dia samy lasany ho azy, ary ny Isiraely mandroso amin-kery.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ary avy amin'i Jakoba no isehoan'Izay hanapaka ka handringana izay sisa avy ao an-tanàna.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia natopin''i Balama ny masony, ka nahita ny Isiraely mitoby araka ny fireneny izy; ary ny Fanahin''Andriamanitra tonga tamin''i Balama. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary nahita ny Amalekita izy, dia nanao oha-teny hoe: Voalohany tamin''ny jentilisa Amaleka, fa ho lany ringana no hiafarany.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary nahita ny Kenita izy, dia nanao oha-teny hoe: Mafy orina ny fonenanao, ary atao ao amin''ny vatolampy ny akaninao.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Kanefa ho ringana Kaina, alohan'ny hamaboan'i Asyra anao.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia nanao oha-teny koa izy ka nilaza hoe: Indrisy! iza no ho velona, raha manao izany Andriamanitra?'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ary hisy sambo avy any amin'ny tany Kitima, dia hampietry an'i Asyra sy Ebera, ka ho lany ringana no hiafarany.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Dia niainga Balama ka lasa nody tany amin'ny fonenany; fa Balaka kosa nandeha tany amin'izay nalehany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia nanao oha-teny izy ka nilaza hoe: Hoy Balama, zanak''i Beora, dia ny lehilahy izay voakimpy ny masony'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Izay mandre ny tenin''Andriamanitra sady mahita fahitana avy amin''ny Tsitoha, torana, kanefa voahiratra ny masony:'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Endrey ny hatsaran'ny lainao, ry Jakoba ô! sy ny lasinao, ry Isiraely ô!
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tahaka ny lohasaha malalaka, tahaka ny saha ao amoron'ony, tahaka ny hazo manitra nambolen'i Jehovah, tahaka ny hazo sedera ao amoron-drano.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Hisy rano mandeha avy eo amin'ny sininy, ary ny taranany ho any amoron'ny renirano maro. Hisandratra noho Agaga ny mpanjakany, ary handroso voninahitra ny fanjakany.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Nentin'Andriamanitra nivoaka avy tany Egypta izy. Ary manan-kery toy ny ombimanga; Handany ny jentilisa fahavalony izy, ka hotapatapahiny ny taolany, ary haripany amin'ny zana-tsipìkany.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mamitaka izy, mandry toy ny liona, ary toy ny liom-bavy, ka iza no hanaitra azy? Hohasoavina anie izay manisy soa anao, ary ho voaozona anie izay manozona anao!
