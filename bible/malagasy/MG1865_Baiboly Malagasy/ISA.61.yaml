document_id: ISA.61
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny Voahosotr'i Jehovah, Izay hanavotra ny Isiraely sy hampody ny voninahiny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny Fanahin'i Jehovah Tompo no ato amiko, satria Jehovah efa nanosotra Ahy hitory teny soa mahafaly amin'ny mpandefitra, efa naniraka Ahy hahasitrana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hamehy
    marker-yv: yv-n
  - type: text
    text: ' ny torotoro fo Izy, ary hitory fanafahana amin''ny babo sy hamoaka ny ao an-trano-maizina ho amin''ny mazava, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hitory taona ankasitrahan''i Jehovah sy andro famalian''Andriamanitsika, hampionona ny malahelo rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hanolotra ho an''ny malahelo ao Ziona, eny, hanome azy namama ho solon''ny lavenona, sy diloilo fifaliana ho solon''ny fahalahelovana, ary fitafiana fiderana ho solon''ny fanahy reradreraka, mba hanaovana azy hoe Hazon''ny fahamarinana, nambolen''i Jehovah ho fampisehoam-boninahitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Koa hatsangana ny efa rava hatry ny fony fahagola, ary hamboarina ny efa lao hatramin''ny fahiny, dia hohavaozina indray ny tanàna rava, Izay efa lao hatramin''ny taranaka lasa ela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny vahiny honina ao ka hiandry ny ondry aman''osinareo, ary ny hafa firenena ho mpiasa tany sy ho mpamboatra tanim-boaloboka ho anareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa ianareo kosa no hatao hoe mpisoron'i Jehovah, Mpanao fanompoam-pivavahana ho an'Andriamanitsika no hilazana anareo ho lasanareo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Hohaninareo
    marker-yv: yv-n
  - type: text
    text: ' ny haren''ny firenena, ary handimby voninahitra azy ianareo'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ary ho reharehanareo sy voninahiny'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny henatrareo hosoloana avy roa heny, ary ny tondromaso hosoloana hoby amin''ny anjara-lovany; ary noho izany dia hahazo indroa heny ao amin''ny taniny izy, fifaliana mandrakizay no ho azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa Izaho Jehovah dia tia rariny; halako ny fandrombahana amin'ny faharatsiana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Halako ny halatra atao fanatitra odorana'
    marker-yv: yv-n
  - type: text
    text: '; homeko ny valin''asany amin''ny fahamarinana izy, ary fanekena mandrakizay no hataoko aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny taranany ho fantatra any amin''ny jentilisa ary ny terany any amin''ny firenena; Izay rehetra mahita azy dia hahafantatra azy ho taranaka notahin''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hifaly dia hifaly amin''i Jehovah aho, ny fanahiko ho ravoravo amin''Andriamanitro; fa notafiany fitafiana famonjena aho, ary nakanjoiny akanjo fahamarinana, toy ny mpampakatra misatroka hamama tahaka ny mpisorona, ary toy ny ampakarina miravaka ny firàvany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa tahaka ny tany mampitsimoka izay ao aminy, ary tahaka ny tanimboly mampaniry izay nafafy tao aminy, dia toy izany no hampisehoan'i Jehovah Tompo fahamarinana sy fiderana eo anatrehan'ny firenena rehetra.
