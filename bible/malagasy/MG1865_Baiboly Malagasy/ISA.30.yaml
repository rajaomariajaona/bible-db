document_id: ISA.30
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hanjo ny Isiraely noho ny nanaovany fihavanana tamin'i Egypta, sy ny mbola hamindrana fo aminy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lozan'ny zaza maditra, izay maka saina, nefa tsy avy amiko, hoy Jehovah, ary manao fanekena
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb.mandrary harato
    marker-yv: yv-n
  - type: text
    text: ', nefa tsy avy amin''ny Fanahiko, mba hanampy ota amin''ny ota, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia izay mandeha hidina any Egypta, nefa tsy nanadina tamin''ny vavako, handositra ho any amin''ny fiarovana mafin''i Farao sy hialokaloka ao amin''ny alokalok''i Egypta. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Kanjo ho tonga henatra ho azy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. anareo
    marker-yv: yv-n
  - type: text
    text: ' ny fiarovana mafin''i Farao, ary ho fanalam-baraka azy'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. anareo
    marker-yv: yv-n
  - type: text
    text: ' ny fialokalofany'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. fialokalofanareo
    marker-yv: yv-n
  - type: text
    text: ' ao amin''ny alokalok''i Egypta. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa tonga any Zoana ireo lehibeny, ary tonga any Hanesa ny irany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izy rehetra dia samy hahazo henatra noho ny amin''ny firenena tsy mahasoa azy, dia izay tsy mahavonjy na mahasoa, fa tonga henatra sy latsa kosa. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Faminaniana ny amin'ny behemota
  - type: usfm
    marker: x
    children:
    - type: text
      text: hipopotamosy
    marker-yv: yv-n
  - type: text
    text: ' any amin''ny tany atsimo. Any amin''ny tany mampahory sy mahaporiporitra, izay ihavian''ny liom-bavy sy ny lion-dahy ary ny menarana sy ny menaran''afo manidina, no nitondrany ny hareny teny an-damosin''ny boriky tanora ary ny fananany teo amin''ny trafon''ny rameva ho any amin''ny firenena tsy mahasoa azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nefa zava-poana sy tsinontsinona ny famonjen''ny Egyptiana; Koa izany no nanaovako azy hoe: Ilay be rehaka tsy mety manao na inona na inona'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Rehareha foana ireny, ka aoka izay!'
    marker-yv: yv-n
  - type: text
    text: '! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mandehana ankehitriny soraty amin''ny fàfana eo anatrehany izany, ary soraty amin''ny taratasy mba haharitra amin''ny andro any aoriana mandrakizay doria izany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa firenena maditra izy, zaza mandainga, dia zaza izay tsy mety mihaino ny lalàn''i Jehovah, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izay manao amin''ny mpahita hoe: Aza mahita, ary amin''ny mpaminany: Aza maminany zavatra marina aminay: Manaova vava malefaka aminay, maminania fitaka, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mialà amin''ny lalana, mivilia amin''ny aleha; Atsaharo ny Iray Masin''ny Isiraely tsy ho eo anoloanay intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa izao no lazain''ny Iray Masin''ny Isiraely: Satria mandà izany teny izany ianareo ary matoky ny fanaovana an-keriny sy ny fiolakolahana ka miankina amin''izany, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia ho aminareo ity heloka ity, tahaka izay mivava efa mila hianjera sy izay mibohitra amin''ny manda avo, ka ho tampoka dia tampoka no haharavany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hovakivakina izy tahaka ny fahavakivakin''ny vilanin''ny mpanefy tanimanga, raha montsamontsaniny ka tsy itondrany roa; Koa rehefa montsamontsana izy, dia tsy hisy vakiny ho azo atao fangalana afo ao am-patana, na ho azo atao fangalan-drano ao an-davaka famorian-drano aza. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa izao no lazain''ny Tompo, dia Jehovah, ny Iray Masin''ny Isiraely: Amin''ny fiverenana sy ny fitsaharana no hamonjena anareo, amin''ny fanginana sy ny fahatokiana no hisian''ny herinareo; Nefa tsy nety ianareo; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa hoy kosa ianareo: Tsia, fa handositra mitaingin-tsoavaly izahay; Koa noho izany dia handositra tokoa ianareo; Ary hoy ianareo: Hitaingina ny faingan-tongotra izahay; Ka dia ho faingan-tongotra koa ny manenjika anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny arivo handositra, raha rahonan'ny anankiray, eny, handositra ianareo, raha rahonan'ny dimy, Mandra-pahatongan'ny sisa aminareo ho tahaka ny to-kazo avo any an-tampon'ny tendrombohitra sy tahaka ny faneva any amin'ny havoana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa Jehovah dia mbola hiandry mandra-pamindrany fo aminareo, ary mbola hitoetra any amin''ny avo Izy mandra-piantrany anareo, fa Andriamanitry ny fahamarinana Jehovah; Sambatra izay rehetra miandry Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa ianao, ry firenena mitoetra ao Ziona any Jerosalema, dia tsy hitomany intsony; Fa hamindra fo aminao tokoa Izy, raha reny ny fitarainanao; Eny, raha vao reny izany, dia hamaly anao Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary homen''ny Tompo mofo fahoriana sy ny rano fahalahelovana ianao; Ary tsy hiery intsony ny mpampianatra anao; Ny masonao hahita ny mpampianatra anao; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa na mivily ho amin''ny an-kavanana ianao, na mivily ho amin''ny ankavia, ny sofinao dia handre teny ao ivohonao manao hoe: Ity no lalana, ka andehano. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary holotoinao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb.holotoinareo
    marker-yv: yv-n
  - type: text
    text: ' ny takela-bolafotsy voapetaka amin''ny sampinao voasokitra sy ny takela-bolamena voapetaka amin''ny sampinao an-idina, ka harianao tahaka ny lamba maloto izany; Mialà amiko! no teny hataonao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary dia hanome ranonorana ho an''ny voa nafafinao any an-tsaha Izy, sy mofo vokatry ny tany sady tsara no vokatra; Ary amin''izany andro izany ny ombinao dia hihinana eny amin''ny tany malalaka; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny omby sy ny boriky tanora, izay miasa ny tany, dia hihinana vilona voaisy sira, izay voatsikerakera amin''ny sahiratsy sy ny fikororohana. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary any amin''ny tendrombohitra avo rehetra sy ny havoana andrandraina rehetra dia hisy ony sy ranovelona amin''ny andro lehibe famonoana, dia amin''ny andro hianjeran''ny tilikambo. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary ny fahazavan''ny volana dia ho tahaka ny fahazavan''ny masoandro, ary ny fahazavan''ny masoandro dia ho avy fito heny, ka ho tahaka ny fahazavan''ny hafitoana, Amin''ny andro hamehezan''i Jehovah ny fahatorotoroan''ny olony sy hanasitranany ny fery tamin''ny namelezana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Indro, avy any lavitra any ny anaran''i Jehovah, mirehitra amin''ny fahatezerany Izy Sady midonaka amin''ny setroka be; Ny molony dia feno fahatezerana, ary ny lelany dia tahaka ny afo mandevona; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary ny fofonainy tahaka ny riaka manafotra havozona, hanasivana ny firenena amin''ny sivana fandevonana, ary hisy lamboridy mampivily eo amin''ny valanoranon''ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary ny hira hataonao dia ho tahaka ny amin'ny alina fitandremana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. fanamasinana
    marker-yv: yv-n
  - type: text
    text: ' ny andro firavoravoana, ary ny hafalian''ny fo dia ho tahaka ny olona mandeha omban''ny feon-tsodina ho any an-tendrombohitr''i Jehovah, dia any amin''ny Vatolampin''ny Isiraely; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary Jehovah hanandratra ny feon''ny fiandrianany sy hampiseho ny fiantefan''ny sandriny amin''ny firehetan''ny fahatezerana sy ny lelafo mandevona sy ny ranonoram-baratra sy ny orana mifafy ary ny havandra vaventy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa ny feon''i Jehovah dia haharaiki-tahotra ny Asyriana; Hasiany amin''ny tsorakazo ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary na aiza na aiza no amelezan''ny tsorakazo voatendry, izay amelin''i Jehovah azy, dia harahina ampongatapaka sy lokanga izany; Ary amin''ny ady hamelezany mafy no hiadiany aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Fa efa voavoatra fahataloha Tofeta; Eny, efa nataony vonona ho an'ny mpanjaka izany; Efa nataony lalina sady malalaka izy; Ny antontany dia misy afo sy kitay betsaka; Ary ny fofonain'i Jehovah, izay tahaka ny renirano solifara, no mampirehitra azy.
