document_id: ISA.19,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faminaniana ny amin'ny loza hanjo an'i Egypta
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indro, Jehovah mitaingina rahona miriotra mafy ka mankany Egypta; Ary ny andriamani-tsi-izy any Egypta dia mangorohoro eo anatrehany
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: mandositra azy'
      marker-yv: yv-n
    - type: text
      text: ', ary ny fon''i Egypta dia ketraka ao anatiny.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny andrin
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fanorenan'''
      marker-yv: yv-n
    - type: text
      text: '''ny tany ho torotoro, ary ny mpikarama rehetra halahelo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa adala mihitsy ny mpanapaka any Zoana; Hevi-poana no avoak''izay hendry indrindra amin''ny mpanolotsain''i Farao; Ahoana no ilazanareo amin''i Farao hoe: Zanak''olon-kendry aho sady taranak''ireo mpanjaka fahagola? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aiza ary ireo olon-kendrinao ireo? Aoka hanambara aminao izy, ary aoka ho fantany izay nokasain''i Jehovah, Tompon''ny maro, hatao amin''i Egypta. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Efa adala ny mpanapaka any Zoana, efa voafitaka ny mpanapaka any Memfisa
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Nofa
      marker-yv: yv-n
    - type: text
      text: '; Ary efa nampivembena an''i Egypta ireo fehizoron''ny fireneny. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehovah efa nampidina
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. nangaroharo
      marker-yv: yv-n
    - type: text
      text: ' fanahy mampandraingiraingy teo Egypta; ka efa nampivembena azy tamin''ny asany rehetra ireo, dia tahaka ny olona mamo miraingiraingy sady mandoa. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samy tsy hahatontosa ny asany ny Egyptiana, na ny loha na ny rambo, na ny sampan-drofia
    - type: usfm
      marker: x
      children:
      - type: text
        text: palma
      marker-yv: yv-n
    - type: text
      text: ' na ny zozoro. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin''izany andro izany dia ho tahaka ny vehivavy Egypta ka ho toran-kovitra sy ho raiki-tahotra noho ny faninjitr''i Jehovah, Tompon''ny maro, ny tànany, izay ahinjiny hamelezany azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny tanin''ny Joda dia ho fahatahoran''i Egypta, ka na oviana na oviana no misy miresaka izany aminy dia ho raiki-tahotra izy noho ny fikasan''i Jehovah, Tompon''ny maro, izay kasainy ny amin''ny hamelezana azy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amin'izany andro izany dia hisy tanana dimy amin'ny tany Egypta samy hiteny ny fitenin'i Kanana sy hianiana ho an'i Jehovah, Tompon'ny maro; Ny anankiray hatao hoe Ira-haresa
    - type: usfm
      marker: x
      children:
      - type: text
        text: Ira-haresa = Tanàna haringana, na Tanànan'ny masoandro
      marker-yv: yv-n
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin''izany andro izany dia hisy alitara ho an''i Jehovah eo amin''ny tany Egypta sy tsangam-bato eo an-tsisiny ho an''i Jehovah. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hamporisihiko hiady izy samy Egyptiana, ka samy hiady amin''ny rahalahiny avy sy amin''ny namany avy izy; Ny tanàna hiady amin''ny tanàna, ary ny fanjakana amin''ny fanjakana. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ho famantarana sy vavolombelona ho an'i Jehovah, Tompon'ny maro, ao amin'ny tany Egypta izany; Fa hitaraina
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ary izao no ho famantarana sy vavolombelona, etc.: Raha mitaraina'
      marker-yv: yv-n
    - type: text
      text: ' amin''i Jehovah noho ny mpampahory izy, ary haniraka mpamonjy sy mpiaro ho ao aminy Izy ka hamonjy azy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah hanao izay hahafantaran''ny Egyptiana Azy, ary ny Egyptiana kosa hahalala an''i Jehovah amin''izany andro izany; Dia hanompo Azy amin''ny fanatitra alatsa-drà sy amin''ny fanatitra hohanina izy ka hivoady amin''i Jehovah sady hanefa ny voadiny. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah hamely ny Egyptiana, eny, fa sady hamely Izy no hanasitrana; Dia hiverina ho any amin''i Jehovah ireo, ka hekeny ny fangatahany, ary hositraniny izy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amin'izany andro izany dia hisy lalambe avy any Egypta mankany Asyria, koa ny Asyriana dia hankany Egypta, ary ny Egyptiana kosa hankany Asyria, ary ny Egyptiana sy ny Asyriana hiara-mivavaka
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. hiara-manompo
      marker-yv: yv-n
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin''izany andro izany ny Isiraely no ho fahatelony amin''i Egypta sy Asyria ho fitahiana eo amin''ny tany; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hotahin''i Jehovah, Tompon''ny maro, ireo ka hataony hoe: Hotahina anie Egypta oloko, sy Asyria, asan''ny tanako, ary Isiraely lovako.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ho very hevitra ny Egyptiana; Eny, hofoanako ny saina ataony; Ary hila saina amin''ny andriamani-tsi-izy sy amin''ny mpibitsibitsika amin''ny odiny izy sy amin''ny manao azy ho tsindrian-javatra ary amin''ny mpanao sikidy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Egypta dia hatolotro hogiazana amin''izay fitondrana mafy, ary mpanjaka masiaka no hanjaka aminy, hoy Jehovah, Tompon''ny maro. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny rano amin''ny ranomasina ho tankina, ary ny ony ho ritra ka ho maina; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho maimbo ny sampantsampan'ny ony; Ary ny lahin-dranon'i Egypta
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Mazora
      marker-yv: yv-n
    - type: text
      text: ' hihena ka ho maina; Ny volotara sy ny zozoro halazo; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny tany eny amoron''i Neily sy ny tanimbary rehetra eny amoron''i Neily samy ho maina sy hanjary vovoka ka tsy ho eo intsony. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hitomany ny mpaka hazan-drano, ary hisaona ny mpamintana rehetra ao Neily, Ary ho reraka ny mpandatsaka
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb; mpamelatra
      marker-yv: yv-n
    - type: text
      text: ' harato amin''ny rano. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho very fanantenana izay mandraotra rongony amin''ny fihogo sy izay manenona hariry. '
