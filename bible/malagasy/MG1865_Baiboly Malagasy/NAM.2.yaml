document_id: NAM.2,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Injany! any an-tendrombohitra ny tongotry ny mitondra teny soa mahafaly Sady mitory fiadanana! Tandremo ny andro firavoravoanao, ry Joda, Efao ny voadinao; Fa tsy handeha hamaky eo aminao intsony ilay tena ratsy fanahy, Indray ripaka izy rehetra. '
  '10':
  - type: text
    content: Mamaboa volafotsy, Mamaboa volamena! Fa tsy hita lany ny rakitra soa, Dia ny habetsahan'ny fanaka mahafinaritra rehetra.
  '11':
  - type: text
    content: 'Indrisy! foana, eny, foana sady lao! Kivy ny fo, miady ny lohalika, Manaintaina ny valahany rehetra, Mivaloarika ny tarehiny rehetra. '
  '12':
  - type: text
    content: 'Aiza ilay lavaky ny liona sy firemben''ny liona tanora ? Ilay nandehanan''ny liona sy ny liom-bavy mbamin''ny zana-diona, Ka tsy nisy nanaitaitra azy, '
  '13':
  - type: text
    content: Dia ilay liona namotipotika izay ampy ho an'ny zanany Ary nanenda ho an'ny liombaviny Sady nameno haza ny lavany Sy toha ny fonenany. Indro, hamely anao Aho, hoy Jehovah, Tompon'ny maro, Holevoniko ho setroka ny kalesinao
  - type: note
    content: Heb; kalesiny
  - type: text
    content: ' Ary hovonoiko sabatra ny liona tanoranao; Hofonganako amin''ny tany ny hazanao; Ka tsy ho re intsony ny feon''ny irakao.'
  '2':
  - type: text
    content: 'Misy mpanorotoro miakatra hamely anao Ambeno ny manda, Tazano ny lalana, Hatanjaho ny valahanao, Hetseho mafy ny herinao! '
  '3':
  - type: text
    content: Fa Jehovah efa mampody ny voninahitr
  - type: note
    content: 'Na: miverina ho amin''ilay reharehany'
  - type: text
    content: '''i Jakoba, Toy ny ampodiany ny voninahitr'
  - type: note
    content: 'Na: toy ny amin''ny reharehany'
  - type: text
    content: '''Isiraely; Fa ny mpandroba efa nandroba azy Ary nanimba ny sampam-boalobony. '
  '4':
  - type: text
    content: 'Nomenaina ny ampingan''ny lehilahy maheriny, Mitafy jaky ny miaramilany, Ny kalesiny dia misy vy mahery, mamirapiratra toy ny afo, amin''ny andro fiomanany, Ary antsodina ny lefona. '
  '5':
  - type: text
    content: 'Ampiezahina eny an-dalambe ny kalesy Ka mifanaretsadretsaka eny an-kalalahana; Tahaka ny harendrina no fijery azy, Mitsoriaka tahaka ny helatra izy. '
  '6':
  - type: text
    content: 'Tsaroany ny lehilahy malazany, Kanjo tafintohina eny am-pandehanana ireny; Mihazakazaka ho any amin''ny manda ireny, Kanjo efa voatsangana sahady ny hamelezana azy. '
  '7':
  - type: text
    content: Vohana ny vavahadin-drenirano, Ary reraka
  - type: note
    content: 'Heb: miempo'
  - type: text
    content: ' ny lapa. '
  '8':
  - type: text
    content: 'Izao no voatendry: ampitanjahina izy, dia'
  - type: note
    content: 'Na: Hozaba dia nampitanjahina ka'
  - type: text
    content: ' lasan-ko babo, Ary ny ankizivavy mitoloko azy manao feom-boromailala Sady miteha-tratra. '
  '9':
  - type: text
    content: 'Fa Ninive dia tahaka ny farihy hatrizay nisiany; Nefa handositra ihany ireny, Mijanòna, mijanòna e! Nefa tsy misy miherika. '
