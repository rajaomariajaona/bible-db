document_id: NAM.2
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Injany! any an-tendrombohitra ny tongotry ny mitondra teny soa mahafaly Sady mitory fiadanana! Tandremo ny andro firavoravoanao, ry Joda, Efao ny voadinao; Fa tsy handeha hamaky eo aminao intsony ilay tena ratsy fanahy, Indray ripaka izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Misy mpanorotoro miakatra hamely anao Ambeno ny manda, Tazano ny lalana, Hatanjaho ny valahanao, Hetseho mafy ny herinao! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa Jehovah efa mampody ny voninahitr
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: miverina ho amin''ilay reharehany'
    marker-yv: yv-n
  - type: text
    text: '''i Jakoba, Toy ny ampodiany ny voninahitr'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: toy ny amin''ny reharehany'
    marker-yv: yv-n
  - type: text
    text: '''Isiraely; Fa ny mpandroba efa nandroba azy Ary nanimba ny sampam-boalobony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nomenaina ny ampingan''ny lehilahy maheriny, Mitafy jaky ny miaramilany, Ny kalesiny dia misy vy mahery, mamirapiratra toy ny afo, amin''ny andro fiomanany, Ary antsodina ny lefona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ampiezahina eny an-dalambe ny kalesy Ka mifanaretsadretsaka eny an-kalalahana; Tahaka ny harendrina no fijery azy, Mitsoriaka tahaka ny helatra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsaroany ny lehilahy malazany, Kanjo tafintohina eny am-pandehanana ireny; Mihazakazaka ho any amin''ny manda ireny, Kanjo efa voatsangana sahady ny hamelezana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Vohana ny vavahadin-drenirano, Ary reraka
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Heb: miempo'
    marker-yv: yv-n
  - type: text
    text: ' ny lapa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izao no voatendry: ampitanjahina izy, dia'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Hozaba dia nampitanjahina ka'
    marker-yv: yv-n
  - type: text
    text: ' lasan-ko babo, Ary ny ankizivavy mitoloko azy manao feom-boromailala Sady miteha-tratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa Ninive dia tahaka ny farihy hatrizay nisiany; Nefa handositra ihany ireny, Mijanòna, mijanòna e! Nefa tsy misy miherika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mamaboa volafotsy, Mamaboa volamena! Fa tsy hita lany ny rakitra soa, Dia ny habetsahan'ny fanaka mahafinaritra rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Indrisy! foana, eny, foana sady lao! Kivy ny fo, miady ny lohalika, Manaintaina ny valahany rehetra, Mivaloarika ny tarehiny rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Aiza ilay lavaky ny liona sy firemben''ny liona tanora ? Ilay nandehanan''ny liona sy ny liom-bavy mbamin''ny zana-diona, Ka tsy nisy nanaitaitra azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia ilay liona namotipotika izay ampy ho an'ny zanany Ary nanenda ho an'ny liombaviny Sady nameno haza ny lavany Sy toha ny fonenany. Indro, hamely anao Aho, hoy Jehovah, Tompon'ny maro, Holevoniko ho setroka ny kalesinao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb; kalesiny
    marker-yv: yv-n
  - type: text
    text: ' Ary hovonoiko sabatra ny liona tanoranao; Hofonganako amin''ny tany ny hazanao; Ka tsy ho re intsony ny feon''ny irakao.'
