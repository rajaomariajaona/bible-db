document_id: JOS.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny zara-tanin'ny taranak'i Josefa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny faritry ny tany azon''ny taranak''i Josefa tamin''ny filokana dia hatrany Jordana tandrifin''i Jeriko, dia tao amin''ny ranon''i Jeriko atsinanana, ka hatramin''ny efitra izay fiakarana avy any Jeriko, mamaky ny tany havoan''i Betela, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia hatrany Betela ka hatrany Lozy, ka nandroso hatramin''ny fari-tanin''ny Arkita hatrany Atarota, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'dia nidina niankandrefana nahazo ny tanin''ny Jafletita ka hatramin''ny fari-tanin''i Bedhorona ambany sy Gazera ka dia nihatra tamin''ny ranomasina. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dia azon'i Manase sy Efraima, taranak'i Josefa, ny lovany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny amin''ny fari-tanin''ny taranak''i Efraima araka ny fokony, ny fari-taniny atsinanana amin''ny lovany dia hatrany Atarot-adara ka hatrany Beti-horona ambony. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny fari-taniny dia nandroso niankandrefana hatrany avaratr''i Mikmeta, dia niolaka niantsinanana hatrany Tanata-silo ka nihoatra eo atsinanany hatrany Janoha, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia nidina hatrany Janoha ka hatrany Atarota sy Narata, dia nipaka tamin''i Jeriko ary dia nihatra tany Jordana. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hatrany Tapoa dia niankandrefana ny fari-tany hatramin''ny lohasahan-driak''i Kana, ka dia nihatra tamin''ny ranomasina. Izany no lovan''ny firenena taranak''i Efraima araka ny fokony, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'mbamin''ny tanàna natokana ho an''ny taranak''i Efraima teo amin''ny lovan''ny taranak''i Manase koa, dia ny tanàna rehetra mbamin''ny zana-bohiny. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary tsy nandroaka ny Kananita izay nonina tany Gazera izy; fa monina eo amin'i Efraima ny Kananita mandraka androany ka ampanaovina fanompoana.
