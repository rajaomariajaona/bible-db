document_id: PSA.95,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiantsoana hivavaka amin'Andriamanitra sy hankatò ny teniny
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Avia, aoka isika hihoby ho an''i Jehovah; Aoka isika hanao feo fifaliana ho an''ny Vatolampy famonjena antsika. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Efa-polo taona no nahamonamonaina Ahy tamin''izany taranaka izany, Ka hoy Izaho: Olona maniasia amin''ny fony izy Ka tsy mahalala ny lalako; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ka dia nianiana tamin''ny fahatezerako Aho hoe: Tsy hiditra amin''ny fitsaharako mihitsy izy.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Aoka hankeo anatrehany amin''ny fiderana isika; Aoka hanao feo fifaliana ho Azy amin''ny fihirana isika. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa Andriamanitra lehibe Jehovah, Ary Mpanjaka lehibe ambonin''ny andriamanitra rehetra Izy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Eo an-tànany ny fitoerana lalina amin''ny tany; Ary Azy ny tendrombohitra avo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Azy ny ranomasina, fa Izy no nanao azy, Ary ny tany maina dia noforonin'ny tànany.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Avia, ka aoka hiondrika sy hiankohoka isika; Aoka isika handohalika eo anatrehan''i Jehovah, Mpanao antsika; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa Izy no Andriamanitsika; Ary olona fiandriny sy ondry tandremany isika. Enga anie ka hohenoinareo anio ny feony manao hoe: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Aza
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Anio raha hihaino ny feony ianareo, dia aza'
      marker-yv: yv-n
    - type: text
      text: ' manamafy ny fonareo tahaka ny tao Meriba, Sy tahaka ny tamin''ny andro tao Masa fony tany an-efitra, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Izay nakan''ny razanareo fanahy Ahy, Sy nizahany toetra Ahy, na dia efa hitany aza ny asako. '
