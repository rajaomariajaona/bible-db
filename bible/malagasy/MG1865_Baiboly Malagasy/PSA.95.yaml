document_id: PSA.95,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoana hivavaka amin'Andriamanitra sy hankatò ny teniny
  - type: text
    content: 'Avia, aoka isika hihoby ho an''i Jehovah; Aoka isika hanao feo fifaliana ho an''ny Vatolampy famonjena antsika. '
  '10':
  - type: text
    content: 'Efa-polo taona no nahamonamonaina Ahy tamin''izany taranaka izany, Ka hoy Izaho: Olona maniasia amin''ny fony izy Ka tsy mahalala ny lalako; '
  '11':
  - type: text
    content: 'Ka dia nianiana tamin''ny fahatezerako Aho hoe: Tsy hiditra amin''ny fitsaharako mihitsy izy.'
  '2':
  - type: text
    content: 'Aoka hankeo anatrehany amin''ny fiderana isika; Aoka hanao feo fifaliana ho Azy amin''ny fihirana isika. '
  '3':
  - type: text
    content: 'Fa Andriamanitra lehibe Jehovah, Ary Mpanjaka lehibe ambonin''ny andriamanitra rehetra Izy. '
  '4':
  - type: text
    content: 'Eo an-tànany ny fitoerana lalina amin''ny tany; Ary Azy ny tendrombohitra avo. '
  '5':
  - type: text
    content: Azy ny ranomasina, fa Izy no nanao azy, Ary ny tany maina dia noforonin'ny tànany.
  '6':
  - type: text
    content: 'Avia, ka aoka hiondrika sy hiankohoka isika; Aoka isika handohalika eo anatrehan''i Jehovah, Mpanao antsika; '
  '7':
  - type: text
    content: 'Fa Izy no Andriamanitsika; Ary olona fiandriny sy ondry tandremany isika. Enga anie ka hohenoinareo anio ny feony manao hoe: '
  '8':
  - type: text
    content: Aza
  - type: note
    content: 'Na: Anio raha hihaino ny feony ianareo, dia aza'
  - type: text
    content: ' manamafy ny fonareo tahaka ny tao Meriba, Sy tahaka ny tamin''ny andro tao Masa fony tany an-efitra, '
  '9':
  - type: text
    content: 'Izay nakan''ny razanareo fanahy Ahy, Sy nizahany toetra Ahy, na dia efa hitany aza ny asako. '
