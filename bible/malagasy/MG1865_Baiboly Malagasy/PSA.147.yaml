document_id: PSA.147,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Haleloia ho an'ny Mpanohana izao rehetra izao, Izay nampody ny fahatsaran'i Jerosalema
  - type: text
    content: Haleloia; Fa tsara ny mihira ho an'Andriamanitsika; Eny, mamy sady mendrika ny fiderana.
  '10':
  - type: text
    content: 'Tsy ny herin''ny soavaly no mahafinaritra Azy, Ary tsy ny tongotry ny olona no sitrany. '
  '11':
  - type: text
    content: Jehovah mankasitraka izay matahotra Azy, Dia izay manantena ny famindram-pony.
  '12':
  - type: text
    content: 'Mankalazà an''i Jehovah, ry Jerosalema ô; Miderà an''Andriamanitrao, ry Ziona ô. '
  '13':
  - type: text
    content: 'Fa manamafy ny hidim-bavahadinao Izy, Sady mitahy ny zanakao eo afovoanao. '
  '14':
  - type: text
    content: 'Mahatonga ny fari-taninao ho fiadanana Izy; Vokisany vary tsara indrindra ianao. '
  '15':
  - type: text
    content: 'Mampandeha ny didiny ho amin''ny tany Izy; Miely faingana dia faingana ny teniny. '
  '16':
  - type: text
    content: Mandatsaka oram-panala tahaka ny landihazo
  - type: note
    content: Heb. volon'ondry
  - type: text
    content: ' Izy; Mampiely fanala tahaka ny lavenona Izy. '
  '17':
  - type: text
    content: 'Mandatsaka ny havandrany ta-haka ny sombintsombin-javatra Izy; Iza no maharitra ny hatsiakany? '
  '18':
  - type: text
    content: 'Mamoaka ny teniny Izy ka mampiempo ireny; Mampifofofofo ny rivony Izy, dia mandriaka ny rano. '
  '19':
  - type: text
    content: 'Milaza ny teniny amin''i Jakoba Izy Ary ny didiny sy ny fitsipiny amin''Isiraely. '
  '2':
  - type: text
    content: 'Manangana an''i Jerosalema Jehovah; Mamory ny Isiraely voaroaka Izy. '
  '20':
  - type: text
    content: Tsy nanao toy izany tamin'izay firenena hafa Izy; Ary ny fitsipiny tsy mba fantatr'ireny. Haleloia.
  '3':
  - type: text
    content: 'Mahasitrana ny torotoro fo Izy Sy mamehy ny feriny. '
  '4':
  - type: text
    content: 'Milaza ny isan''ny kintana Izy: Samy tononiny amin''ny anarany ireny rehetra ireny. '
  '5':
  - type: text
    content: 'Lehibe ny Tompontsika sady be hery; Tsy hita lany ny fahalalany. '
  '6':
  - type: text
    content: Manandratra ny mpandefitra Jehovah, Fa mampietry ny ratsy fanahy hatramin'ny tany.
  '7':
  - type: text
    content: 'Mihirà fiderana ho an''i Jehovah; Mankalazà an''Andriamanitsika amin''ny lokanga, '
  '8':
  - type: text
    content: 'Izay manaron-drahona ny lanitra, Izay mamboatra ranonorana ho amin''ny tany, Izay mampaniry ahitra ny tendrombohitra, '
  '9':
  - type: text
    content: 'Manome hanina ho an''ny biby Izy Sy ho an''ny zana-goaika izay mitaraina. '
