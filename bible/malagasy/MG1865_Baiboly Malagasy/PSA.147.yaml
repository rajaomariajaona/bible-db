document_id: PSA.147
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Haleloia ho an'ny Mpanohana izao rehetra izao, Izay nampody ny fahatsaran'i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Haleloia; Fa tsara ny mihira ho an'Andriamanitsika; Eny, mamy sady mendrika ny fiderana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Manangana an''i Jerosalema Jehovah; Mamory ny Isiraely voaroaka Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mahasitrana ny torotoro fo Izy Sy mamehy ny feriny. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Milaza ny isan''ny kintana Izy: Samy tononiny amin''ny anarany ireny rehetra ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Lehibe ny Tompontsika sady be hery; Tsy hita lany ny fahalalany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Manandratra ny mpandefitra Jehovah, Fa mampietry ny ratsy fanahy hatramin'ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mihirà fiderana ho an''i Jehovah; Mankalazà an''Andriamanitsika amin''ny lokanga, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izay manaron-drahona ny lanitra, Izay mamboatra ranonorana ho amin''ny tany, Izay mampaniry ahitra ny tendrombohitra, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Manome hanina ho an''ny biby Izy Sy ho an''ny zana-goaika izay mitaraina. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tsy ny herin''ny soavaly no mahafinaritra Azy, Ary tsy ny tongotry ny olona no sitrany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Jehovah mankasitraka izay matahotra Azy, Dia izay manantena ny famindram-pony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mankalazà an''i Jehovah, ry Jerosalema ô; Miderà an''Andriamanitrao, ry Ziona ô. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa manamafy ny hidim-bavahadinao Izy, Sady mitahy ny zanakao eo afovoanao. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mahatonga ny fari-taninao ho fiadanana Izy; Vokisany vary tsara indrindra ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mampandeha ny didiny ho amin''ny tany Izy; Miely faingana dia faingana ny teniny. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mandatsaka oram-panala tahaka ny landihazo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. volon'ondry
    marker-yv: yv-n
  - type: text
    text: ' Izy; Mampiely fanala tahaka ny lavenona Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mandatsaka ny havandrany ta-haka ny sombintsombin-javatra Izy; Iza no maharitra ny hatsiakany? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mamoaka ny teniny Izy ka mampiempo ireny; Mampifofofofo ny rivony Izy, dia mandriaka ny rano. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Milaza ny teniny amin''i Jakoba Izy Ary ny didiny sy ny fitsipiny amin''Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsy nanao toy izany tamin'izay firenena hafa Izy; Ary ny fitsipiny tsy mba fantatr'ireny. Haleloia.
