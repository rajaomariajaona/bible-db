document_id: AMO.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hamaliana ny Isiraely noho ny fahotany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Henoy izao teny izao, izay lazain''i Jehovah ny aminareo, ry Zanak''Isiraely, dia ny amin''io taranaka rehetra nentiko niakatra avy tany amin''ny tany Egypta io: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hianareo ihany no fantatro tamin''ny firenena rehetra ambonin''ny tany, koa noho izany dia hovaliako ianareo noho ny helokareo rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ho tafara-dalana va ny roa, raha tsy efa nifanaiky? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mierona any an''ala va ny liona, raha tsy mahita toha? Manerona ao an-davany va ny liona tanora, raha tsy mahazo zavatra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Voan''ny fandrika etỳ an-tany va ny vorona, raha tsy nisy tadivavarana? Mikatona va ny fandrika, raha tsy mahavoa zavatra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsofina va ao an-tanàna ny anjomara, ka tsy hatahotra ny vahoaka? Misy loza ao an-tanàna va, raha tsy Jehovah no nahatonga izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tsy manao na inona na inona tokoa Jehovah Tompo, raha tsy milaza ny heviny amin''ny mpaminany mpanompony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny liona no mierona, ka iza no tsy hatahotra? Jehovah Tompo no miteny, ka iza no tsy haminany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ambarao ao an-tranoben''i Asdoda sy ao an-tranobe any amin''ny tany Egypta, ka ataovy hoe: Miangona any an-tendrombohitr''i Samaria ianareo, ary jereo ny tabataba be ao aminy sy ny fampahoriana'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny ampahorina'
    marker-yv: yv-n
  - type: text
    text: ' ao anatiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa tsy mahalala hanao ny marina izy ireo, hoy Jehovah, dia ireo izay mitahiry fandozana sy roba ao an-tranobeny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa izao no lazain''i Jehovah Tompo: He, misy fahavalo manodidina ny tany! Hazerany ho afaka aminao ny herinao, ary hobaboina ny tranobenao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izao no lazain''i Jehovah: Toy ny famonjin''ny mpiandry ondry ny tongotr''ondry roa na ny sombin-tsofina eny am-bavan''ny liona, dia toy izany no ho famonjy ny Zanak''Isiraely, izay mipetraka ao Samaria, eo an-jorom-parafara sy eo amin''ny lamba fandriandriana avy any Damaskosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Henoinareo, ka ambarao hamelezana ny taranak''i Jakoba, hoy ny Tompo, Jehovah, Andriamanitry ny maro: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Amin''ny andro hamaliako ny Isiraely noho ny fahotana ao aminy no hamaliako ny alitara ao Betela dia hokapaina ny tandroky ny alitara ka hianjera amin''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Hamely ny trano ririnina sy ny trano fahavaratra Aho; Ary ho rava ny trano ivory, sady ho fongana ny trano maro, hoy Jehovah.
