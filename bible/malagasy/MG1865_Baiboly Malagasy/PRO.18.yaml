document_id: PRO.18,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mitokana ho azy dia mitady ny mahafinaritra ny tenany ihany, Misafoaka manohitra izay hevitra mahasoa rehetra izy.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny anaran'i Jehovah dia tilikambo mafy; Ny marina miezaka ho ao aminy ka voavonjy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. atao amin'ny avo
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny haren'ny manan-karena no vohiny mafy, Ary raha araka ny fiheviny, dia toa manda avo izany.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fireharehan'ny fon'ny olona mialoha ny fahasimbana; Fa ny fanetren-tena kosa mialoha ny voninahitra.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mamaly teny mbola tsy re, Dia hadalana sy henatra ho azy izany.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny faharariany dia zakan''ny fanahin''ny olona ihany; Fa ny fanahy kivy, iza no mahazaka izany? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fon'ny manan-tsaina mahazo fahalalana; Ary ny sofin'ny hendry mitady izany.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fanomezan'ny olona dia mahalalaka ny alehany, Hahatonga azy eo anatrehan'ny lehibe.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mandahatra aloha no toa marina; Fa nony avy kosa ny an-daniny, dia mamaly ny teniny.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny filokana mampitsahatra ady Ary mampisaraka ny samy mahery.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny mampionona ny rahalahy voaisy ratsy dia sarotra noho ny manafaka vohitra mafy, Ary ny fifandirana aminy dia tahaka ny hidin'ny lapan'ny mpanjaka.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny adala tsy mba finaritra amin'ny fahalalana, Fa ta-haneho izay ao am-pony.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny vokatry ny vavan'ny olona no mahavoky soa azy; Eny, ny vokatry ny molony no mahavoky azy.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny mahafaty sy ny mahavelona samy hain'ny lela, Koa izay manarana azy dia hihinana ny vokany.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay lehilahy mahazo vady dia mahazo zava-tsoa Sady mahita sitraka amin'i Jehovah.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fitarainana no ataon'ny malahelo; Nefa ny manan-karena kosa dia mamaly mahery.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay maro sakaiza tsy maintsy tra-pahoriana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: tsy maintsy hita fa ratsy'
      marker-yv: yv-n
    - type: text
      text: ; Fa misy sakaiza tia, izay mifikitra noho ny rahalahy aza.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha avy ny ratsy fanahy, dia avy ny fanamavoana; Ary miaraka amin'ny fahafaham-baraka ny henatra.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rano lalina ny teny aloaky ny vavan'ny olona, Ary rano miboiboika ny loharanon'ny fahendrena,
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy mety raha manohana ny ratsy fanahy Handresy ny marina amin'ny fitsarana.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny molotry ny adala manatona ny fifandirana, Ary ny vavany mihantsy kapoka.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny vavan'ny adala no fandringanana azy, Ary ny molony ihany no fandriky ny fanahiny.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny tenin''ny mpifosafosa dia toy ny hanim-py Ka mikorotsaka ao anaty kibo indrindra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary izay malaina amin'ny asany Dia rahalahin'ny mpanimba.
