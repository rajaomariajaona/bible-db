document_id: 2CH.18
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nikambanan'i Josafata sy Ahaba hiady tamin'ny Syriana sy ny nakany hevitra tamin'ny mpaminany, ary ny nahafatesan'i Ahaba, sy ny niverenan'i Josafata nankany Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Josafata nanana harena sy voninahitra be; ary ny zananilahy dia nampanambadiny ny zanakavavin''i Ahaba. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Koa nony ela dia nidina nankany amin''i Ahaba tany Samaria izy. Ary Ahaba namono ondry aman''osy sy omby betsaka ho azy sy ho an''ny olona nanaraka azy, dia nitaona azy hiakatra ho any Ramota-gileada. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy Ahaba, mpanjakan''ny Isiraely, tamin''i Josafata, mpanjakan''ny Joda: Mba hiaraka amiko ho any Ramota-gileada va ianao? Dia hoy izy taminy: Eny fa tahaka ny tenanao ihany aho, ka ny oloko dia olonao; koa hiaraka aminao ho any an-tafika izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy Josafata tamin''ny mpanjakan''ny Isirady; Masìna ianao, anontanio aloha ny tenin''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny mpanjakan''ny Isiraely dia nanangona ny mpaminany efajato lahy ka nanao taminy hoe: Handeha hanafika an''i Ramota-gileada va isika, sa hijanona ihany aho ? Dia hoy ireo: Mandehana, fa hatolotr''Andriamanitra eo an-tananao izy, ry mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy kosa Josafata: Moa tsy misy mpaminanin''i Jehovah koa va eto mba hanontaniantsika? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy ny mpanjakan''ny Isiraely tamin''i Josafata: Mbola misy lehilahy iray ihany ahazoantsika manontany amin''i Jehovah, saingy halako izy, satria tsy mbola naminany soa ho ahy izy, fa loza ihany mandrakariva; Mitaia, zanak''i Jimla, no anarany. Dia hoy Josafata: Aza dia manao izany, ry mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary ny mpanjakan'ny Isiraely niantso ny tandapa
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ionoka
    marker-yv: yv-n
  - type: text
    text: ' anankiray ka nanao taminy hoe: Alao faingana Mikaia, zanak''i Jimla. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny mpanjakan''ny Isiraely sy Josafata, mpanjakan''ny Joda, samy nipetraka teo amin''ny seza fiandrianany avy teo amin''ny famoloana eo anoloan''ny vavahadin''i Samaria, sady samy efa niakanjo ny akanjony avy; ary ny mpaminany rehetra naminany teo anatrehany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Zedekia, zanak''i Kenana, dia nanao tandroby ka nanao hoe: Izao no lazain''i Jehovah: Ireto no hanotoanao ny Syriana mandra-paharingany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny mpaminany rehetra naminany toy izao koa hoe: Mandehana ho any Ramota-gileada, dia hambinina ianao; fa hotolotr''i Jehovah eo an-tananao izy, ry mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ilay iraka izay nandeha naka an''i Mikaia niteny taminy hoe: Indro. fa efa iray teny avokoa izao ny mpaminany, ka samy milaza soa ho an''ny mpanjaka: masìna ianao, aoka re ny teninao mba ho tahaka ny an''ny anankiray amin''ireo, ka mba mitenena soa koa. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy Mikaia: Raha velona koa Jehovah, izay lazain''Andriamanitro ihany no hambarako. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nankany amin''ny mpanjaka izy. Ary hoy ny mpanjaka taminy: Ry Mikaia, handeha hanafika an''i Ramota-gileada va isika, sa hijanona ihany aho? Ary izy namaly azy hoe: Mandehana, dia hambinina ianareo, fa hatolotra eo an-tananareo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy ny mpanjaka taminy: Impiry no hampianianako anao mba tsy hilaza na inona na inona amiko amin''ny anaran''i Jehovah afa-tsy izay marina ihany? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hoy Mikaia: Hitako fa indreny ny Isiraely rehetra niely teny an-tendrombohitra toy ny ondry tsy misy mpiandry, ary hoy Jehovah: Ireto efa tsy manan-tompo, ka aoka izy samy hody soa aman-tsara any an-tranony avy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy ny mpanjakan''ny Isiraely tamin''ny Josafata: Tsy efa voalazako taminao va fa tsy mba mety maminany soa ho ahy izy, fa loza ihany?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy Mikaia: Henoy ary ny tenin''i Jehovah: Nahita an''i Jehovah nipetraka teo amin''ny seza fiandrianany aho, ary ireo maro be rehetra any an-danitra nitsangana teo amin''ny ankavanany sy teo amin''ny ankaviany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy Jehovah: Iza no hitaona an''i Ahaba, mpanjakan''ny Isiraely, handeha ho any Ramota-gileada ka ho lavo any? Ary ny anankiray niteny toy izao, ary ny anankiray kosa niteny toy izao. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nandroso ny fanahy ka nitsangana teo anatrehan''i Jehovah ary nanao hoe: Izaho no hitaona azy. Ary hoy Jehovah taminy: Amin''inona anefa? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy izy: Hivoaka aho ka ho tonga fanahy mandainga ao am-bavan''ny mpaminaniny rehetra. Dia hoy indray Jehovah: Ho voataonanao ihany izy, ka hahatanteraka ianao; mivoaka ary, ka ataovy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Koa, indro, Jehovah efa nanisy fanahy mandainga ao am-bavan''ireto mpaminaninao ireto, ary Izy koa efa nilaza ny loza hanjo anao. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa Zedekia, zanak''i Kenana, nanatona, dia namely ny takolak''i Mikaia sady nanao hoe: Taiza no lalana nialan''ny Fanahin''i Jehovah tamiko hiteny aminao? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia hoy Mitaia: Indro, ho hitanao izany amin''ny andro hidiranao ao amin''ny efi-trano anatiny'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hitsofotsofohanao amin''ny efi-trano'
    marker-yv: yv-n
  - type: text
    text: ' hierenao. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hoy ny mpanjakan''ny Isiraely: Raiso Mikaia, ka ento miverina izy ho any amin''i Amona, komandin''ny tanana, sy ho any amin''i Joasy, zanaky ny mpanjaka, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ka lazao hoe: Izao no lazain''ny mpanjaka: Ataovy ao an-trano-maizina ilehity, ka fahano mofom-pahoriana sy ranom-pahoriana izy mandra-pahatongako soa aman-tsara. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa hoy Mikaia: Raha tahìny ho tafaverina soa aman-tsara ianao, dia tsy nampitenenin''i Jehovah aho tsy akory. Ary hoy koa izy: Samia mihaino izany, ry firenena rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia niatatra nankany Ramota-gileada ny mpanjakan''ny Isiraely sy Josafata, mpanjakan''ny Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary hoy ny mpanjakan''ny Isiraely tamin''i Josafata: Hody olon-kafa aho ka hitsarapaka any anatin''ny ady, fa ianao kosa dia miakanjoa ny akanjonao ihany. Dia nody olon-kafa ny mpanjakan''ny Isiraely ka nitsarapata tany anatin''ny ady. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa ny mpanjakan''i Syria efa nandidy Ireo komandin''ny kalesiny nanao hoe: Aza miady na amin''ny kely na amin''ny lehibe, afa-tsy amin''ny mpanjakan''ny Isiraely ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary nony nahita an''i Josafata ireo komandin''ny kalesy, dia hoy izy: Iny mihitsy no mpanjakan''ny Isiraely. Dia nohodidininy hasiany izy, ka dia niantsoantso Josafata, ary Jehovah namonjy azy; eny, Andriamanitra nampiala ireo teo aminy; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ary rehefa hitan'ireo komandin'ny kalesy fa tsy ny mpanjakan'ny Isiraely izy, dia niverina niala taminy ireo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary nisy lehilahy anankiray nandefa zana-tsipìka kitoatoa ka nahavoa ny mpanjakan''ny Isiraely teo anelenalen''ny fiarovan-tratrany sy ny eo ambaniny, ka dia hoy izy tamin''ny mpampandeha ny kalesiny: Ahodino, ka ento miala eto amin''ny mpiady aho, fa voa. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary nihamafy ny ady tamin'izany andro izany; ary ny mpanjakan'ny Isiraely nihafy nitsangana teo amin'ny kalesiny tandrifin'ny Syriana mandra-paharivan'ny andro; fa nony efa hilentika ny masoandro, dia maty izy.
