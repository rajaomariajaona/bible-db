document_id: 1SA.26
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nilazan'ny Zifita tamin'i Saoly fanindroany izay hahazoany an'i Davida, sy ny tsy netezan'i Davida hahafaty an'i Saoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny Zifita tonga tao amin''i Saoly tany Gibea ka nanao hoe: Tsy miery any amin''ny havoana Hakila manandrify ny efitra va Davida? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia niainga Saoly nidina nankany an-efitr''i Zifa, nitondra telo arivo lahy voafantina tamin''ny Isiraely hanaraka azy hitady an''i Davida any an-efitr''i Zifa. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nitoby tao amin''ny havoana Hakila manandrify ny efitra teo amoron-dalana izy. Fa Davida kosa nitoetra tany an-efitra, ary hitany fa tonga nanaraka azy tany an-efitra Saoly. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia naniraka mpisafo Davida, ka fantany fa tonga tokoa Saoly. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia niainga Davida ka tonga teo amin''ny nitobian''i Saoly; ary hitan''i Davida izay nandrian''i Saoly sy Abnera, zanak''i Nera, komandin''ny miaramilany; fa Saoly nandry teo anatin''ny sehatra-sariety, sady nitoby nanodidina azy ny vahoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy Davida tamin''i Ahimeleka Hetita sy Abisay, zanak''i Zeroia, rahalahin''i Joaba; Iza no hidina hiaraka amiko ho any amin''i Saoly any an-toby? Dia hoy Abisay: Izaho hidina hiaraka aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary tonga tao amin''ny vahoaka Davida sy Abisay nony alina; ary, indro, Saoly nandry ka natory teo anatin''ny sehatra-sariety, ary ny lefony nitsatoka amin''ny tany teo anilan''ny lohany; fa Abnera sy ny vahoaka nandry manodidina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy Abisay tamin''i Davida: Efa voahidin''Andriamanitra eo an-tananao ny fahavalonao izao; koa, masìna ianao, aoka holefoniko indray mandeha monja hataoko miboroaka amin''ny tany izy, fa tsy hamely azy indroa akory aho. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa hoy Davida tamin''i Abisay: Aza mamono azy; fa iza no maninjitra ny tànany tamin''ny voahosotr''i Jehovah ka tsy nanan-tsiny? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy koa Davida: Raha velona koa Jehovah, dia aoka Jehovah no hamely azy; na ho tonga ny androny, ka ho faty izy; na hirotsaka ho amin''ny ady izy, ka any no hahafaty azy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Sanatria amiko eo anatrehan''i Jehovah, raha haninjitra ny tanako hamely ny voahosotr''i Jehovah aho; fa masìna ianao, ny lefona eo anilan''ny lohany sy ny tavoara fitondran-drano no alao, dia andeha isika handeha. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia nalain'i Davida ny lefona sy ny tavoara izay teo anilan'ny lohan'i Saoly ka dia lasa izy, ary tsy nisy olona nahita, na nahalala, na nahatsiaro; fa natory izy rehetra, satria nataon'i Jehovah renoky ny torimaso izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nita nankeny an-dafin-tsaha Davida ka nijanona teo an-tampon''ny tendrombohitra lavidavitra (lavidavitra ihany ny elanelan''izy roa tonta); '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary Davida niantso ny olona sy Abnera, zanak''i Nera, hoe: Tsy mamaly va ianao, ry Abnera? Ary Abnera dia namaly hoe: Iza moa ianao, no miantso ho re eto anatrehan''ny mpanjaka? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy Davida tamin''i Abnera: Tsy lehilahy mahery va ianao, ary iza no tahaka anao amin''ny Isiraely? Koa nahoana ianao no tsy miambina ny mpanjaka tomponao? fa nisy anankiray tamin''ny olona tonga teo hamono ny mpanjaka tomponao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tsy mety izany nataonao izany. Raha velona koa Jehovah, dia tokony ho faty ianareo, satria tsy miambina ny tomponareo, ilay voahosotr''i Jehovah Ary izahao ange, fa aiza moa ny lefon''ny mpanjaka sy ny tavoara fitondran-drano teo anilan''ny lohany? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary fantatr''i Saoly ny feon''i Davida ka hoy izy: Feonao moa izany, ry Davida zanako? Ary hoy Davida: Feoko tokoa, ry mpanjaka tompoko. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy koa izy: Nahoana ny tompoko no manenjika ny mpanompony? Inona no nataoko, ary inona no ratsy amin''ny tanako? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ankehitriny masìna ianao, ry mpanjaka tompoko, mihainoa ny tenin''ny mpanomponao. Raha Jehovah no nanesika anao hamely ahy, dia aoka handray fanatitra mani-pofona Izy; fa raha zanak''olona kosa, dia aoka ho voaozona eo anatrehan''i Jehovah izy, satria efa nandroaka ahy androany tsy hanana anjara amin''ny lova nomen''i Jehovah izy ka nanao hoe: Mandehana, manompoa andriamani-kafa. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Koa aza avela ho latsaka amin''ny tany lavitra an''i Jehovah ny rako; fa ny mpanjakan''ny Isiraely nivoaka nitady parasy iray, tahaka ny manenjika tsipoy eny an-tendrombohitra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy Saoly: Efa nanota aho: miverena, ry Davida zanako, fa tsy hanisy ratsy anao intsony aho, fa soa teo imasonao ny aiko androany; indro, efa nanao adala aho ka diso indrindra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary Davida namaly hoe: Indro ny lefon''ny mpanjaka! koa asaovy misy zatovo anankiray mankety haka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ny lehilahy izay nanoloran''i Jehovah anao teo an-tànany androany dia hovaliany araka ny fahitsiany sy ny fahamarinany, fa tsy nety naninjitra ny tanako hamely ny voahosotr''i Jehovah aho. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary, indro, fa tahaka ny nanaovako ny aina ho lehibe androany no mba hanaovan''i Jehovah ny aiko ho lehibe kosa ka hanafahany ahy amin''ny fahoriana rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy Saoly tamin''i Davida: Hotahina anie ianao, ry Davida zanako; hanao dia hanao ianao sady hahatontosa. Dia lasa Davida, fa Saoly kosa nitodi-doha hiverina.'
