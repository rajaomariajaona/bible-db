document_id: EST.3,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahasosoran'i Hamana tamin'i Mordekay, sy ny hevitra nataony handringanana ny Jiosy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rehefa afaka izany zavatra izany, dia nasandratr''i Ahasoerosy mpanjaka Hamana, zanak''i Hamedota Agagita, ka nomeny voninahitra, ary ny sezany nataony teo alohan''ny an''ny mpanapaka rehetra izay teo aminy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nesorin''ny mpanjaka tamin''ny tànany ny peratra fanombohany ka nomeny an''i Hamana, zanak''i Hamedota Agagita, fahavalon''ny Jiosy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjaka tamin''i Hamana: Homena anao ihany ny volafotsy sy ny olona koa hanaovanao azy araka izay sitrakao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nantsoina ny mpanoratry ny mpanjaka tamin''ny andro fahatelo ambin''ny folo tamin''ny volana voalohany, ka nosoratana izany araka izay rehetra nandidian''i Hamana ho an''ny solo-mpanjaka sy ny governora tamin''ny isan-tokony ary ny mpanapaka ny firenena rehetra, ho any amin''ny isan-tokony araka ny sorany avy, ary ho amin''ny isam-pirenena araka ny fiteniny avy; dia tamin''ny anaran''i Ahasoerosy mpanjaka no nanoratany azy ka notombohiny tamin''ny peratra fanombohan''ny mpanjaka. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny taratasy dia nampitondrainy ny tsimandoa ho any amin''ny isan-tokony amin''ny fanjakan''ny mpanjaka mba hampandringana sy hampamono ary hampandripaka ny Jiosy rehetra, na tanora na antitra hatramin''ny zaza amim-behivavy aza, amin''ny indray andro monja, dia tamin''ny andro fahatelo ambin''ny folo tamin''ny volana faharoa ambin''ny folo (volana Adara izany), ary handroba ny fananany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny kopen'ny teny izay natao didy ho amin'ny isan-tokony amin'ny fanjakana dia nisokatra mba ho hitan
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: dia novakina tamin'''
      marker-yv: yv-n
    - type: text
      text: '''ny olona rehetra hampiomana azy ho amin''izany andro izany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nivoaka ny tsimandoa, ka nododonan'ny tenin'ny mpanjaka; ary nantsoina tany Sosana renivohitra koa ny lalàna. Ary ny mpanjaka sy Hamana nipetraka hisotro; fa ny tao an-tanàna Sosana kosa dia very hevitra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpanompon''ny mpanjaka rehetra izay teo am-bavahadin''ny mpanjaka dia nandohalika sy niankohoka teo anatrehan''i Hamana; fa izany no didin''ny mpanjaka. Fa Mordekay kosa tsy mba nety nandohalika na niankohoka. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny mpanompon''ny mpanjaka izay teo am-bavahadin''ny mpanjaka tamin''i Mordekay: Nahoana ianao no mandika ny didin''ny mpanjaka? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa na dia niteny taminy isan''andro aza ireo, dia tsy mba nihaino azy izy, ka nolazain''Ireo tamin''i Hamana, mba hizahany na haharitra amin''ny teniny ihany Mordekay, na tsia; fa efa nilaza tamin''ireo izy fa Jiosy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa hitan''i Hamana fa Mordekay tsy mba nety nandohalika na niankohoka teo anatrehany, dia tezitra loatra izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nataon''i Hamana ho zavatra kely loatra ny haninji-tanana hamely an''i Mordekay irery ihany (fa efa nambara azy ny firenen''i Mordekay), ka dia nitady handringana ny Jiosy rehetra eran''ny fanjakan''i Ahasoerosy koa izy, dia ny firenen''i Mordekay. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin''ny volana voalohany (volana Nisana izany) tamin''ny taona faharoa ambin''ny folo nanjakan''i Ahasoerosy mpanjaka, nisy nanao pora (filokana izany) teo anatrehan''i Hamana ny amin''ny isan''andro isan''andro sy ny isam-bolana isam-bolana hatramin''ny volana faharoa ambin''ny folo (volana Adara izany) '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Hamana tamin''i Ahasoerosy mpanjaka: tsisy firenena iray efa miely sy mihahaka eny amin''ny firenena samy hafa isan-tokony eran''ny fanjakanao; ary hafa lalàna noho ny firenena rehetra ireny sady tsy mba mankatò ny lalàn''ny mpanjaka; ary tsy mendrika amin''ny mpanjaka ny hamela azy ho eny; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'koa raha sitraky ny mpanjaka, aoka hosoratana mba haringana ireny, dia handoa talenta volafotsy iray alina ho eo an-tànan''ny mpanao raharaha aho ho entina ao an-trano firaketan''ny mpanjaka. '
