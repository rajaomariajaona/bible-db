document_id: 1PE.4,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fananarana mba hiaritra, raha enjehina noho ny fahamarinana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Koa satria niaritra tamin'ny nofo Kristy, dia alao mba ho fiadianareo izany saina izany; fa izay niaritra tamin'ny nofo dia efa afaka
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr.nampitsaharina
      marker-yv: yv-n
    - type: text
      text: ' tamin''ny ny ota; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Samia mifanompo araka ny fanomezam-pahasoavana izay noraisinareo, dia tahaka ny mpitandrina tsara ny fahasoavana maro samy hafa izay an''Andriamanitra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Rana misy olona miteny, dia aoka izy hiteny toy ny milaza tenin'Andriamanitra, raha misy olona manompo, dia aoka izy hanao izany araka ny hery izay omen'Andriamanitra azy; mba hankalazana an'Andriamanitra amin'ny zavatra rehetra amin'ny alalan'i Jesosy Kristy; fa Azy ny voninahitra sy ny fanjakana mandrakizay mandrakizay. Amena,
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ry malala, aza gaga noho ny fizahan-toetra mahamay izay mahazo anareo ho fitsapan-toetra, ary aza atao ho zavatra mahagaga manjo anareo izany, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'fa araka ny iombonanareo fijaliana amin''i Kristy, dia mifalia, mba hiravoravoanareo indrindra amin''ny fisehoan''ny voninahiny koa. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Sambatra ianareo, raha haratsina noho ny anaran''i Kristy, fa ny Fanahin''ny voninahitra, dia ny Fanahin''Andriamanitra, mipetraka ao aminareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa aoka tsy hisy aminareo hijaly satria mpamono olona, na mpangalatra, na mpanao ratsy, na mpiraharaha ny an''olona. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa raha misy mijaly satria Kristiana, dia aoka tsy ho menatra izy; fa aoka hankalaza an''Andriamanitra amin''izany anarana izany izy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa tonga ny andro hiantombohan'ny fitsarana hatrao amin'ny ankohonan
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. tranony
      marker-yv: yv-n
    - type: text
      text: '''Andriamanitra; ary raha miantomboka amintsika izany, dia hanao ahoana kosa no hiafaran''izay tsy manaiky ny filazantsaran''Andriamanitra? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary "raha saiky tsy voavonjy ny marina, aiza no hisehoan ny ratsy fanahy sy sy ny mpanota? (Oha 11. 31). '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Koa izay mitondra fahoriana araka ny sitrapon'Andriamanitra, dia aoka ny fanaovan-tsoa no hanolorany ny fanahiny ho an'ilay mahatoky, dia ny Mpanao azy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'mba tsy handanianareo ny andro sisa iainanareo amin''ny nofo araka ny filan''ny olona intsony, fa araka ny sitrapon''Andriamanitra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa ampy izay ny andro lasa ho nanaovana ny fanaon''ny jentilisa tamin''ny nandehanana tamin''ny fijejojejoana sy ny fanirian-dratsy sy ny fimamoana sy ny filalaovan-dratsy sy ny fisotroan-toaka ary ny fanompoan-tsampy izay fady indrindra; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'ary amin''izany dia gaga izy ireo, satria tsy miara-mihazakazaka aminy ianareo amin''izany fanaranam-po amin''ny ratsy izany, ka dia teneniny ratsy; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'nefa hampamoahin''ilay efa vonona hitsara ny velona sy ny maty '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa noho izany no nitoriana ny filazantsara tamin''izay maty aza; mba hotsaraina araka ny olona amin''ny nofo izy fa ho velona araka an''Andriamanitra amin''ny fanahy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa antomotra ny faran''ny zavatra rehetra; koa hendre ka mahonòna tena ho amin''ny fivavahana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary mihoatra noho ny zavatra rehetra, mifankatiava tsara; fa "ny fitiavana manarona fahotana maro" (Oha 10.12) '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mifampiantranoa, ka aza mimonomonona. '
