document_id: PSA.78,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Famaranana nalaina tamin'ny tantaran'ny Isiraely hatramin'i Mosesy ka hatramin'i Davida
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Maskila nataon''i Asafa. Henoy ny lalàko, ry oloko; atongilano ny sofinareo amin''ny tenin''ny vavako. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Tsy nitandrina ny fanekena amin''Andriamanitra izy, ary tsy nety nandeha araka ny lalàny; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nanadino ny asany izy sy ny fahagagana izay nampahitàny azy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Teo anatrehan''ny razany no nanaovany fahagagana tany amin''ny tany Egypta, dia tany amin''ny tany lemak''i Zoana. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nampisaraka ny ranomasina Izy ka nitondra azy nita, dia nampijanona ny rano ho toy ny antontan-javatra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary ny rahona no nitondrany azy raha antoandro, sy afo mahazava nony alina. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Namaky vatolampy tany an-efitra Izy, ka nampisotro azy nanaram-po tahaka ny amin''ny rano lalina. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary nampivoaka rano mandriaka avy tamin'ny harambato Izy ka nampirotsaka rano ho tahaka ny ony.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Kanjo mbola nandroso nanota taminy ihany izy ireo, ka nampahatezitra ny Avo Indrindra tany an-efitra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia naka fanahy an''Andriamanitra tam-pony izy, tamin''ny nilàny hanina araka ny nahaliana azy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia niteny nanohitra an''Andriamanitra izy ka nanao hoe: mahavelatra latabatra atỳ an-efitra va Andriamanitra? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Hiloa-bava hilaza fanoharana aho; hanonona teny saro-pantarina fony taloha aho. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Indro, namely ny vatolampy Izy, dia nigororoana ny rano ka nandriaka; mahay manome mofo koa va Izy? Mahatonga hena ho an'ny olony va Izy?
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Koa nony ren''i Jehovah izany, dia tezitra Izy; ary nisy afo nirehitra tamin''i Jakoba, sady nisy fahatezerana namely ny Isiraely, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Satria tsy nino an''Andriamanitra izy ireo ka tsy natoky ny famonjeny. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Kanefa nandidy ny rahona tany ambony Izy, ary ny varavaran''ny lanitra no novohàny, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Dia nandatsaka mana teny aminy hohaniny Izy, ary varin''ny lanitra no nomeny azy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ny fihinan'ny mahery no nohanin'ny olona; nanaterany hanina hahavoky azy izy.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Nampandeha ny rivotra avy any atsinanana teny amin''ny lanitra Izy ary ny heriny no nitondrany ny rivotra avy any atsimo. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Dia nampilatsahany hena betsaka hoatra ny vovoka izy sy voro-manidina hoatra ny fasiky ny ranomasina, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ka nalatsany teny afovoan''ny tobiny, manodidina ny fitoerany. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Dia nihinana izy ireo ka voky tsara, ary izay nilainy dia nomeny azy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Izay efa rentsika sy fantatsika,ary nambaran''ny razantsika tamintsika, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Nefa tsy niala tamin''ny filàny izy, ary mbola teo am-bavany ihany ny haniny; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Dia nirehitra taminy ny fahatezeran'Andriamanitra, ka nahafatesany ny tremalahy teo aminy, ary naripany ny zatovolahin'ny Isiraely.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Fa na dia izany rehetra izany aza, dia mbola nanota ihany izy ireo ka tsy nino ny fahagagana nataony. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Dia nampahalevona ny androny toy ny fofonaina Izy, ary ny taonany tamin''ny fampitahorana. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Raha novonoiny izy ireo, dia nitady hahalala an''Andriamanitra izy, ary niverina nikatsaka Azy. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Dia nahatsiaro izy fa Andriamanitra no Vatolampiny, ary Andriamanitra Avo Indrindra no Mpanavotra azy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Kanefa nanao vava malefaka taminy ireo, ary ny lelany no nandaingàny taminy. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary ny fony tsy niorina taminy; eny tsy nitana ny fanekeny izy. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Nefa Andriamanitra kosa be famindram-po, dia mamela heloka ka tsy mandringana; eny nahatsindry fo tokoa Izy, ka tsy nofohaziny avokoa ny fahavinirany, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Fa nahatsiaro Izy fa nofo ihany ireo, dia rivotra izay mandalo ka tsy miverina intsony.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Dia tsy mba hafenintsika amin'ny zanany; fa hambarantsika amin'ny taranaka ho avy ny fiderana an'i Jehovah sy ny heriny ary ny fahagagana izay efa nataony.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Impiry akory izy ireo no efa niodina taminy tany an-efitra, ka nampalahelo Azy tany amin''ny tany foana! '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Naka fanahy an''Andriamanitra mandrakariva izy, ka nampalahelo ny Iray Masin''ny Isiraely. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Tsy mba nahatsiaro ny tànany izy, dia ny andro izay nanavotany azy tamin''ny fahavalo, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Izay nanaovany famantarana tany Egypta, sy fahagagana tany an-tany lemak''i Zoana: '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Nampody ny oniny ho rà Izy, ary ny reniranony tsy azony nisotroana. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Nandefa lalitra betsaka
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fihitra, na kalalao'
      marker-yv: yv-n
    - type: text
      text: ' hamely azy Izy, ka nandany azy ireny, ary sahona, ka nanimba azy ireny. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Dia nanome ny vokatry ny taniny ho an''ny sompanga Izy, ary ny sasany ho an''ny valala. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Namono ny voalobony tamin''ny havandra Izy, ary ny aviaviny tamin''ny havandra vaventy. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Dia nanolotra ny biby fiompiny ho an''ny havandra Izy, ary ny omby aman''ondriny ho an''ny varatra. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Nandatsaka ny fahatezerany mirehitra taminy Izy: eny, fahavinirana sy fahatezerana ary fampahoriana, dia anjely andiany mitondra loza. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa nanorina teni-vavolombelona teo amin''i Jakoba Izy, ary teo amin''Isiraely no nametrahany lalàna, izay nandidiany ny razantsika, hampahafantariny ny zanany; '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Namboatra lalana ho an''ny fahatezerany Izy, ary tsy niaro ny fanahin''ireo tamin''ny fahafatesana, fa nanolotra ny ainy ho lanin''ny areti-mandringana; '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Ary namely ny lahimatoa rehetra tany Egypta Izy, dia ny voalohan''ainy tany an-dain''i Hama; '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Fa namindra toerana ny olony toy ny ondry Izy, ary nitondra azy tany an-efitra toy ny ondry andiany. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'Nentiny soa aman-tsara izy ireo ka tsy mba natahotra; fa ny fahavalony kosa voasaron''ny ranomasina. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'Ary nitondra azy ho any amin''ny tany misy ny fitoerany masina Izy, dia ny tendrombohitra izay azon''ny tànany ankavanana. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: Ary nandroaka ny jentilisa teo anoloany Izy, ka nanome ny tanin'ireny ho lova nozaraina tamin'ny famolaina, dia nampitoetra ny firenen'Isiraely tao an-dainy.
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'Nefa naka fanahy an''Andriamanitra Avo Indrindra izy ka niodina taminy, ary ny teni-vavolombelony tsy notandremany. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'Ary nihemotra izy ka nivadika tahaka ny razany. Dia nania tahaka ny tsipìka manjiona. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: 'Ary nampahatezitra Azy tamin''ny fitoerana avony izy, sady nahasaro-piaro Azy tamin''ny sarin-javatra voasokitra. '
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: 'Ary nandre izany Andriamanitra, dia tezitra Izy ka nolaviny mihitsy ny Isiraely, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mba hahafantatra izany ny taranaka ho avy - dia ny zaza mbola hateraka - ka hitsangana hitory izany amin''ny zanany kosa, '
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: 'Sady nahafoy ny tabernakeliny tao Silo Izy, dia ny lay izay naoriny teo amin''ny olona; '
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: 'Dia natolony ho babo ny heriny ary ny voninahiny ho eo an-tànan''ny fahavalo. '
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: 'Dia nanolotra ny olony ho an''ny sabatra Izy; ary tezitra Indrindra tamin''ny lovany Izy. '
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: 'Ny zatovolahiny dia lanin''ny afo; ary ny zatovovaviny tsy mba nanaovana hiram-panambadiana. '
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: Ny mpisorony lavon-tsabatra, nefa ny mpitondratenan'ireo tsy nisaona.
  '65':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: 'Dia nifoha ny Tompo tahaka ny anankiray avy natory, tahaka ny lehilahy mahery izay miantsoantso azon''ny divay. '
  '66':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: 'Dia namely ny fahavalony hiamboho Izy ka nahafa-baraka azy mandrakizay. '
  '67':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '67'
    - type: text
      text: 'Dia nanary ny lain''i Josefa Izy, ary ny firenen''i Efraima tsy nofidiny. '
  '68':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '68'
    - type: text
      text: 'Fa nifidy ny firenen''i Joda kosa Izy, dia ny tendrombohitra Ziona izay tiany. '
  '69':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '69'
    - type: text
      text: 'Dia nanao ny fitoerany masina ho tahaka ny havoana Izy, tahaka ny tany izay naoriny ho mandrakizay. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Mba hametraka ny fanantenany amin''Andriamanitra, ka tsy hanadino ny asany, fa hitandrina ny didiny; '
  '70':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '70'
    - type: text
      text: 'Dia nifidy an''i Davida mpanompony ka naka azy avy tany am-balan''ondry; '
  '71':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '71'
    - type: text
      text: 'Tany amin''ny fiandrasany ny ondry ampianahana no nakàny azy, mba hiandry an''i Jakoba olony sy Isiraely lovany; '
  '72':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '72'
    - type: text
      text: Dia niandry ireo araka ny hitsin'ny fony izy, ka nitondra azy araka ny fahaizan'ny tànany.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mba tsy ho tahaka ny razany, izay taranaka maditra sy miodina, izy, dia taranaka izay tsy nampiomana ny fony, sady tsy marina tamin'Andriamanitra ny fanahiny.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
