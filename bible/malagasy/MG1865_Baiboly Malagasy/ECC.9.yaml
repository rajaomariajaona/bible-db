document_id: ECC.9,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ohabolana samy hafa ny amin'ny tsi-fitovian'ny fahendrena sy ny fahadalana, ary ny amin'ny fanaovan-tsoa sy ny fahazotoana ary ny fahamarinana
  - type: text
    content: 'Fa ireto dia nalatsako tato am-poko sady nodinihiko avokoa: ny marina sy ny hendry mbamin''ny asany dia samy eo an-tànan''Andriamanitra avokoa; ary koa, na ho fitiavana, na ho fankahalana, dia samy tsy fantatry ny olombelona; fa zavatra mbola ho avy aminy avokoa izany rehetra izany. '
  '10':
  - type: text
    content: Izay rehetra azon'ny tananao atao dia ataovy amin'ny herinao; fa tsy misy asa, na hevitra, na fahalalana, na fahendrena, any amin'ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola
  - type: text
    content: ' izay alehanao.'
  '11':
  - type: text
    content: 'Ary hitako atỳ ambanin''ny masoandro indray fa tsy ho an''ny haingan-tongotra ny fihoarana, ary tsy ho an''ny mahery ny ady, ary tsy ho an''ny hendry ny hanina, ary tsy ho an''ny mazava saina ny harena, ary tsy ho an''ny manam-pahalalana ny fitia; fa ny fotoana sy ny sampona dia samy mahazo azy rehetra. '
  '12':
  - type: text
    content: Fa tsy fantatry ny olona ny androny; fa toy ny hazandrano azon'ny harato fahitan-doza izy, ary toy ny voron-kely izay voan'ny fandrika, dia voafandrika toy izany ny zanak'olombelona amin'ny andro mahory, raha mahavoa azy tampoka izany.
  '13':
  - type: text
    content: 'Izao koa no fahendrena efa hitako tatỳ ambanin''ny masoandro, ka dia nataoko ho lehibe izany: '
  '14':
  - type: text
    content: 'Nisy vohitra kely sady vitsy olona, dia avy ny mpanjaka lehibe anankiray ka namely sy nanao fahirano azy ary nanao manda lehibe hamelezany azy. '
  '15':
  - type: text
    content: 'Ary nisy lehilahy malahelo hendry hita teo, koa nahavonjy ny tanàna tamin''ny fahendreny ralehilahy, nefa tsy nisy olona mba nahatsiahy ilay malahelo. '
  '16':
  - type: text
    content: 'Koa hoy izaho: Aleo fahendrena toy izay hery; kanjo hamavoina ny fahendren''ny malahelo, ary ny teniny tsy mba henoina.'
  '17':
  - type: text
    content: 'Ny tenin''ny hendry izay re amin''ny mangingina dia mahery noho ny fitreron''izay mpanapaka adala. '
  '18':
  - type: text
    content: Aleo fahendrena toy izay fiadiana; ary ny mpanota iray mahasimba ny soa be.
  '2':
  - type: text
    content: 'Mitovy avokoa ny manjo ny olombelona rehetra; eny, zavatra iray ihany no manjo ny marina sy ny meloka, ny tsara fanahy sy ny madio ary ny tsy madio, ny mamono zavatra hatao fanatitra sy ny tsy mamono zavatra hatao fanatitra; mitovy ihany ny amin''ny tsara fanahy sy ny amin''ny mpanota, ary ny amin''ny mianiana sy ny amin''izay tsy sahy hianiana. '
  '3':
  - type: text
    content: 'Izao no fahoriana amin''izay rehetra atao atỳ ambanin''ny masoandro: Zavatra iray ihany no manjo ny olombelona rehetra, sady feno ratsy ny fon''ny zanak''olombelona, ka fahadalana no ao am-pony amin''ny andro iainany, ary nony afaka izany, dia ho any amin''ny maty izy. '
  '4':
  - type: text
    content: Fa izay rehetra isan'ny velona dia mbola hantenaina
  - type: note
    content: 'Na: Fa iza no ho afaka? Ny amin''ny velona rehetra dia mbola misy hantenaina'
  - type: text
    content: '; fa ny amboa velona no tsara noho ny liona maty. '
  '5':
  - type: text
    content: 'Fa fantatry ny velona fa ho faty izy; fa ny maty kosa tsy mba mahalala na inona na inona, ary tsy manana valim-pitia intsony izy; fa hadino ny fahatsiarovana azy. '
  '6':
  - type: text
    content: Na ny fitiavany, na ny fankahalany, na ny fialonany, dia samy efa levona ela sady tsy manana anjara intsony mandrakizay amin'izay atao atỳ ambanin'ny masoandro izy.
  '7':
  - type: text
    content: 'Mandehana, hano amin''ny fifaliana ny haninao, ary sotroy amin''ny fo falifaly ny divainao, fa efa nankasitrahan''Andriamanitra ela ny asanao. '
  '8':
  - type: text
    content: 'Aoka ho fotsy mandrakariva ny fitafianao, ary aoka tsy ho diso menaka ny lohanao. '
  '9':
  - type: text
    content: 'Miravoravoa amin''ny vady malalanao amin''ny andronao rehetra mandalo foana, izay efa nomeny anao atỳ ambanin''ny masoandro, dia ny andronao rehetra mandalo foana; fa izany no anjaranao amin''ny andro iainanao sy amin''ny fisasarana izay isasaranao atỳ ambanin''ny masoandro. '
