document_id: GAL.1,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fananarana ny Galatiana noho ny fivadibadihany, sy ny fanambarana ny mah'Apostoly an'i Paoly
  - type: text
    content: 'Paoly Apostoly - tsy avy tamin''olona, na tamin''ny alalan''olona, fa tamin''ny alalan''i Jesosy Kristy sy Andriamanitra Ray, Izay nanangana Azy tamin''ny maty - '
  '10':
  - type: text
    content: 'Ary ankehitriny, olona va no ilako fitia, sa Andriamanitra? Sa mila sitraka amin''olona aho? Raha mbola mila sitraka amin''olona aho, dia tsy mpanompon''i Kristy. '
  '11':
  - type: text
    content: 'Fa ampahafantariko anareo, ry rahalahy, ny amin''ny filazantsara izay notoriko, fa tsy araka ny fanaon''ny olona izany. '
  '12':
  - type: text
    content: 'Fa izaho tsy nandray azy tamin''olona, ary tsy mba nampianarina aho, fa tamin''ny fanambaran''i Jesosy Kristy ihany. '
  '13':
  - type: text
    content: Fa efa renareo ny toetro fahiny tamin'ny fivavahan'ny Jiosy, fa nanenjika ny fiangonan
  - type: note
    content: Gr. eklesia
  - type: text
    content: '''Andriamanitra efa izay tsy izy aho ka nandrava azy; '
  '14':
  - type: text
    content: 'ary nandroso tamin''ny fivavahan''ny Jiosy mihoatra noho ny maro izay indray mihira amiko eo amin''ny fireneko aho ka fatra-pitana ny fampianarana voatolotry ny razako indrindra. '
  '15':
  - type: text
    content: 'Fa raha sitrak''Andriamanitra, Izay nanokana ahy hatrany an-kibon''ineny ny niantso ahy tamin''ny fahasoavany, '
  '16':
  - type: text
    content: 'ny nampiseho ny Zanany tato anatiko, mba hitoriako Azy any amin''ny jentilisa, niaraka tamin''izay dia tsy naka saina tamin''ny nofo aman-drà aho, '
  '17':
  - type: text
    content: 'ary tsy niakatra tany Jerosalema ho any amin''izay Apostoly talohako aho, fa lasa nankany Arabia, dia niverina ho any Damaskosy indray. '
  '18':
  - type: text
    content: 'Ary rehefa afaka telo taona, dia niakatra tany Jerosalema hamangy an''i Kefasy aho ka nitoetra tao aminy dimy ambin''ny folo andro. '
  '19':
  - type: text
    content: Nefa ny Apostoly sasany dia tsy nisy hitako afa-tsy Jakoba
  - type: note
    content: 'Na: fa Jakoba kosa'
  - type: text
    content: ', rahalahin''ny Tompo. '
  '2':
  - type: text
    content: mbamin'ny rahalahy rehetra izay ato amiko, mamangy ny fiangonana
  - type: note
    content: Gr. eklesia
  - type: text
    content: ' atỳ Galatia: '
  '20':
  - type: text
    content: 'Ary izay zavatra soratako aminareo, indro, eo anatrehan''Andriamanitra fa tsy mandainga aho. '
  '21':
  - type: text
    content: 'Rehefa afaka izany, dia tonga tany amin''ny tany Syria sy Kilikia aho; '
  '22':
  - type: text
    content: ary tsy mbola fantatry ny fiangonana
  - type: note
    content: Gr. eklesia
  - type: text
    content: ' any Jodia, izay ao amin''i Kristy, ny tarehiko. '
  '23':
  - type: text
    content: 'Fa nandre ihany izy hoe: Ilay mpanenjika antsika fahiny, indro izy ankehitriny mitory ny finoana izay noravany fahiny . '
  '24':
  - type: text
    content: Ary dia nankalazany an'Andriamanitra aho.
  '3':
  - type: text
    content: 'ho aminareo anie ny fahasoavana sy ny fiadanana avy amin''Andriamanitra Ray sy Jesosy Kristy Tompontsika, '
  '4':
  - type: text
    content: Izay nanolotra ny tenany noho ny fahotantsika, hanafahany antsika amin'izao miara-belona ratsy fanahy izao
  - type: note
    content: 'Na: izao andro ratsy izao'
  - type: text
    content: ', araka ny sitrapon''Andriamanitra Raintsika; '
  '5':
  - type: text
    content: ho Azy anie ny voninahitra mandrakizay mandrakizay. Amena.
  '6':
  - type: text
    content: 'Gaga aho, raha mifindra faingana toy izao ianareo hiala amin''izay efa niantso anareo tamin''ny fahasoavan''i Kristy ho amin''ny filazantsara hafa, '
  '7':
  - type: text
    content: izay tsy filazantsara akory
  - type: note
    content: Gr. anankiray koa
  - type: text
    content: ', fa saingy misy ny sasany mampitabataba anareo ka ta-hamadika ny filazantsaran''i Kristy. '
  '8':
  - type: text
    content: Fa na izahay, na anjely avy any an-danitra aza, no mitory filazantsara hafa aminareo afa-tsy
  - type: note
    content: 'Na: manohitra'
  - type: text
    content: ' izay efa notorinay taminareo, aoka ho voaozona'
  - type: note
    content: Gr. anatema
  - type: text
    content: ' izy. '
  '9':
  - type: text
    content: 'Araka ny voalazanay fahiny no lazaiko indray ankehitriny: Raha misy olona mitory filazantsara hafa aminareo, afa-tsy izay efa noraisinareo, aoka ho voaozona'
  - type: note
    content: Gr. anatema
  - type: text
    content: ' izy, '
