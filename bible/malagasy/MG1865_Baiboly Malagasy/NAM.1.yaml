document_id: NAM.1,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny handravana an'i Ninive noho ny fandozany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faminaniana ny amin''ny loza hanjo an''i Ninive, dia ny bokin''ny fahitan''i Nahoma Elkosita. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa na dia miforiporitra toy ny tsilo aza ireny Sady vonton'ny divay mahery fibobohany, Dia ho levona tokoa toy ny vodivary maina
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: dia ho levona toy ny vodivary karankaina'
      marker-yv: yv-n
    - type: text
      text: ' izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy tao aminao no nivoahan''ny anankiray izay misain-dratsy ho enti-manohitra an''i Jehovah Sady mamoron-kevi-dratsy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain''i Jehovah: Na dia tsy latsaka isa ka mbola maro aza ireny, Dia hofongorana ihany izy ka ho levona Fa efa nampahory anao Aho, Ka tsy hampahory anao intsony. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ankehitriny hotapahiko ny ziogany ho afaka aminao, Ary hotosako ny famatorana anao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah efa nandidy ny aminao hoe: Tsy ho velo-maso intsony ny anaranao; Hataoko tapaka tsy ho ao an-tranon''ny andriamanitrao ny sarin-javatra voasokitra sy ny sarin-javatra an-idina; Hanao ny fasana ho anjaranao Aho, satria hita fa latsa-danja ianao.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Andriamanitra saro-piaro sy mamaly heloka Jehovah; Jehovah dia Mpamaly heloka sady be fahatezerana; Jehovah dia Mpamaly ny rafilahiny Ary mitahiry fahatezerana hamelezany ny fahavalony.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahari-po Jehovah sady be hery Ary tsy mety manamarina ny meloka; Amin''ny tadio sy ny tafio-drivotra no lalan''i Jehovah. Ary rahona no vovoky ny tongony. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miteny mafy ny ranomasina izy ka mahatankina azy Ary mandritra ny ony rehetra; Malazo Basana sy Karmela. Ary malazo koa ny vonin''i Libanona. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mihorohoro eo anatrehany ny tendrombohitra, Sady miempo ny havoana, Ary mientanentana eo anatrehany ny tany, Dia ny tany onenana sy ny mponina rehetra ao aminy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Iza no mahatoetra eo anoloan'ny fahavinirany? Ary iza no mahatanty ny firehitry ny fahatezerany? Aidina toy ny afo ny fahatezerany, Ary mirodana eo anoloany ny vatolampy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsara Jehovah, fiarovana mafy amin''ny andro fahoriana,Ka mahalala izay mialoka aminy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa amin'ny riaka manafotra no anafoanany ny fitoerany, Ary ny fahavalony dia henjehiny ho any amin'ny
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: henjehin''ny; na henjehiny amin''ny'
      marker-yv: yv-n
    - type: text
      text: ' maizina. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Inona no heverinareo ho enti-manohitra an
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ahoana no hevitrareo ny amin''i'
      marker-yv: yv-n
    - type: text
      text: '''i Jehovah ? Fahafonganana no hataony, Tsy hiverina fanindroany ny fahoriana. '
