document_id: PSA.52
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny loza hanjo izay tsy miambim-bava
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Maskila nataon''i Davida, fony tonga Doega Edomita ka nilaza tamin''i Saoly hoe: Davida dia efa tonga ao an-tranon''i Ahimeleka. Nahoana no mandoka tena amin''ny haratsiana ianao, ry ilay mahery? Ny famindram-pon''Andriamanitra maharitra mandrakariva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Loza no heverin''ny lelanao, tahaka ny hareza maranitra, ry mpanao fitaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Efa tia ny ratsy noho ny tsara ianao, ary ny lainga noho ny miteny ny marina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny teny mandripaka rehetra no tianao, ry lela mamitaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Andriamanitra kosa hanimba
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hanongana'
    marker-yv: yv-n
  - type: text
    text: ' anao mandrakizay; hisambotra anao sy hanongotra anao hiala ao an-day Izy, ary hamongotra anao tsy ho eo amin''ny tanin''ny velona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny marina hijery, dia hatahotra ka hihomehy azy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Indro, ny lehilahy izay tsy nanao an''Andriamanitra ho heriny; fa natoky ny haben''ny hareny ka nikikitra tamin''ny faharatsiany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa izaho dia tahaka ny hazo oliva maitso ao an-tranon''Andriamanitra. Matoky ny famindram-pon''Andriamanitra mandrakizay doria aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hidera Anao mandrakizay aho, fa efa nataonao izany; ary hiandry ny anaranao eo anatrehan'ny olonao masina aho, fa tsara izany.
