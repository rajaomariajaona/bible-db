document_id: JER.33,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Teny anankiray koa ny amin'ny mbola hampodiana sy ny Isiraely sy ny voninahitra mbola ho azony
  - type: text
    content: 'Ary tonga fanindroany tamin''i Jeremia ny tenin''i Jehovah, raha mbola voahazona teo an-kianjan''ny trano fiambenana ihany izy, nanao hoe: '
  '10':
  - type: text
    content: 'Izao no lazain''i Jehovah: Mbola ho re indray eto amin''ity tany ity, izay ataonareo hoe Rava, ka tsy misy olona na biby fiompy intsony dia eto amin''ny tanànan''ny Joda sy ao amin''ny lalamben''i Jerosalema izay efa lao, ka tsy misy olona na mponina na biby fiompy '
  '11':
  - type: text
    content: 'Ny feo mifaly sy ny feo miravoravo, dia ny feon''ny mpampakatra sy ny feon''ny ampakarina ary ny feon''izay manao hoe: Miderà an''i Jehovah, Tompon''ny maro, fa tsara Izy, fa mandrakizay ny famindram-pony, dia izay mitondra fanati-pisaorana ho ao an-tranon''i Jehovah; Fa hataoko tonga tahaka ny tany aloha ny fahatsarany'
  - type: note
    content: Heb. hampodiko avy amin'ny fahababoana
  - type: text
    content: ', hoy Jehovah. '
  '12':
  - type: text
    content: 'Izao no lazain''i Jehovah, Tompon''ny maro: Eto amin''ity tany efa lao tsy misy olona na biby fiompy ity sy amin''ny tanànany rehetra dia mbola hisy fonenan''ny mpiandry ondry hampandriany ny ondry aman''osiny, '
  '13':
  - type: text
    content: 'Dia amin''ny tanàna any amin''ny tany havoana sy amin''ny tanàna any amin''ny tany lemaka amoron-tsiraka, ary amin''ny tanana any amin''ny tany atsimo sy amin''ny tanin''ny Benjamina sy amin''ny manodidina an''i Jerosalema ary amin''ny tanànan''ny Joda, ary ny ondry aman''osy mbola handroso araka ny fitondran''ny mpanisa azy, hoy Jehovah. '
  '14':
  - type: text
    content: 'Indro, avy ny andro, hoy Jehovah, Izay hanatanterahako ny teny soa, izay nolazaiko ny amin''ny aranak''Isiraely sy ny taranak''i Joda. '
  '15':
  - type: text
    content: Amin'izany andro izany sy amin'izany fotoana izany dia hampaniry Rantsana
  - type: note
    content: 'Na: Solofo'
  - type: text
    content: ' marina ho an''i Davida Aho; Ary hanao fitsarana sy fahamarinana amin''ny tany Izy. '
  '16':
  - type: text
    content: 'Amin''izany andro izany dia hovonjena ny Joda, ary Jerosalema handry fahizay; Ary izao no hanononana azy: Jehovah Fahamarinantsika. '
  '17':
  - type: text
    content: 'Fa izao no lazain''i Jehovah: Davida tsy ho diso zanakalahy Hipetraka eo amin''ny seza fiandrianan''ny taranak''Isiraely; '
  '18':
  - type: text
    content: Ary ny Levita mpisorona tsy ho diso zanakalahy ho eo anatrehako, Mba hanaterany mandrakariva fanatitra dorana sy fanatitra hohanina
  - type: note
    content: 'Na: sy handoroany fanatitra hohanina'
  - type: text
    content: ' ary fanatitra hafa alatsa-drà.'
  '19':
  - type: text
    content: 'Ary tonga tamin''i Jeremia ny tenin''i Jehovah nanao hoe: '
  '2':
  - type: text
    content: 'Izao no lazain''i Jehovah, Mpanao izany, dia Jehovah Izay namorona izany mba hampitoetra azy; Jehovah no anarany; '
  '20':
  - type: text
    content: 'Izao no lazain''i Jehovah: Raha mahafoana ny fanekeko ny amin''ny andro sy ny fanekeko ny amin''ny alina ianareo, mba tsy hisy andro sy alina amin''ny fotoany, '
  '21':
  - type: text
    content: 'Dia ho azo foanana koa ny fanekeko tamin''i Davida mpanompoko, tsy hananany zanakalahy hanjaka eo amin''ny seza fiandrianany, sy ny amin''ny Levita mpisorona, mpanompoko. '
  '22':
  - type: text
    content: 'Toy ny hamaroan''ny kintana eny amin''ny lanitra, izay tsy azo isaina, ary toy ny fasika any amin''ny ranomasina, izay tsy azo afàtra, dia toy izany no hanamaroako ny taranak''i Davida mpanompoko sy ny Levita, izay manao fanompoam-pivavahana ho Ahy. '
  '23':
  - type: text
    content: 'Ary tonga tamin''i Jeremia ny tenin''i Jehovah nanao hoe: '
  '24':
  - type: text
    content: 'Tsy hitanao va izay nolazain''ity firenena ity hoe: Ny fianakaviana roa izay nofidin''i Jehovah dia efa nariany; Toy izany no anamavoany ny oloko, ka dia tsy vanon-ko firenena eo imasony intsony izy. '
  '25':
  - type: text
    content: 'Izao no lazain''i Jehovah: Raha tsy amin''ny andro sy ny alina ny fanekeko, ary raha tsy notendreko ny lalàna fitondrana ny lanitra sy ny tany, '
  '26':
  - type: text
    content: Dia hariako ny taranak'i Jakoba sy Davida mpanompoko, ka ny taranany tsy mba hanalako ho mpanapaka ny taranak'i Abrahama sy Isaka ary Jakoba; Fa hampodiko avy amin'ny fahababoana izy ka hamindrako fo.
  '3':
  - type: text
    content: 'Antsoy Aho, dia hovaliako ianao ka hampisehoako zavatra lehibe sy saro-pantarina izay tsy fantatrao. '
  '4':
  - type: text
    content: 'Fa izao no lazain''i Jehovah, Andriamanitry ny Isiraely; Ny amin''ny trano amin''ity tanàna ity sy ny amin''ny lapan''ny mpanjakan''ny Joda, izay noravana noho ny tovon-tany sy ny sabatra, '
  '5':
  - type: text
    content: 'Raha mandroso hiady amin''ny Kaldeana izy ka mameno ny trano amin''ny fatin''olona, izay novonoiko tamin''ny fahatezerako sy ny fahavinirako, sady nanafenako ny tavako tamin''ity tanàna ity noho ny faharatsiany rehetra: '
  '6':
  - type: text
    content: 'Dia, indro, hotanterahiko tokoa ny fanasitranana azy, eny, hositraniko izy, ary hasehoko aminy ny haren''ny fiadanana sy ny fahamarinana. '
  '7':
  - type: text
    content: 'Ary ny Joda sy ny Isiraely dia hampodiko avy amin''ny fahababoany, ka haoriko ho toy ny taloha izy. '
  '8':
  - type: text
    content: 'Ary hodioviko ho afaka amin''ny helony rehetra izy, izay nanotany tamiko; Ka havelako ny helony rehetra, izay nanotany sy niodinany tamiko. '
  '9':
  - type: text
    content: 'Ary ho anarana mahafaly Ahy izany sady ho dera sy voninahitra ho an''ny firenena rehetra ambonin''ny tany, izay handre ny soa rehetra ataoko aminy; Dia hatahotra sy hangovitra izy noho ny soa rehetra sy noho ny fiadanana rehetra izay hataoko aminy. '
