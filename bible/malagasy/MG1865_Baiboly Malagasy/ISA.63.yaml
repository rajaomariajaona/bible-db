document_id: ISA.63,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fivavahana sy fiaiken-keloka ary fiderana noho ny famonjen'Andriamanitra hatramin'ny taloha
  - type: text
    content: 'Iza moa Ity avy any Edoma, dia avy any Bozra, ka mena mangatrakatraka ny fitafiany, dia Ity Izay mareva-pitafiana sy miandranandrana amin''ny haben ny heriny? Izaho Izay mitory fahamarinana sady manan-kery hamonjy. '
  '10':
  - type: text
    content: Fa ireo kosa dia niodina ka nanome alahelo ny Fanahy Masiny; dia tonga fahavalony Izy ka niady taminy.
  '11':
  - type: text
    content: 'Ary ny olony dia nahatsiaro ny andro taloha ela, dia ny tamin''i Mosesy. Aiza Ilay nitondra azy mbamin''ny mpiandry ondriny niakatra avy tamin''ny ranomasina? Aiza Ilay nametraka ny Fanahy Masiny tao aminy, '
  '12':
  - type: text
    content: 'Dia Ilay nampandeha ny sandriny be voninahitra teo ankavanan''i Mosesy ka nampisaraka ny ranomasina teo anoloany, mba hanaovany anarana mandrakizay ho Azy, '
  '13':
  - type: text
    content: 'Dia Ilay nitondra azy nita ny rano lalina, tahaka ny fandehan''ny soavaly eny an-tany lemaka, ka tsy tafintohina izy? '
  '14':
  - type: text
    content: 'Tahaka ny fidinan''ny biby fiompy ho any an-dohasaha no nanomezan''ny Fanahin''i Jehovah fitsaharana ho azy: Tahaka izany no nitondranao ny olonao, Mba hanaovana anarana be voninahitra ho Anao. '
  '15':
  - type: text
    content: 'Mitsinjova eny an-danitra, ary mijere eny amin''ny fonenan''ny fahamasinanao sy ny voninahitrao; aiza ny fahasaro-piaronao sy ny asanao lehibe? Ny fandevilevin''ny kibonao sy ny famindram-ponao dia voasakana tsy ho amiko. '
  '16':
  - type: text
    content: 'Kanefa Hianao no Rainay, fa Abrahama tsy mahalala anay, Ary Isiraely tsy mahafantatra anay, Jehovah ô, Hianao no Rainay, ary Mpanavotra anay no anaranao hatrizay hatrizay. '
  '17':
  - type: text
    content: 'Jehovah ô, nahoana no nampiala anay tamin''ny lalanao Hianao ka nampaniasia anay sady nanamafy ny fonay tsy hatahotra Anao? Miverena noho ny amin''ny mpanomponao, dia ny firenena lovanao. '
  '18':
  - type: text
    content: 'Vetivety foana no nananan''ny olonao masina ny tany; ny fahavalonay efa nanitsaka ny fitoeranao masina. '
  '19':
  - type: text
    content: Efa tonga hoatra izay tsy notapahinao hatrizay hatrizay izahay sady tsy mba nantsoina tamin'ny anaranao akory. Enga anie ka hotriarinao ny lanitra mba hidinanao, ka hihorohoro
  - type: note
    content: 'Na: hiempo'
  - type: text
    content: ' eo anoloanao ny tendrombohitra,'
  '2':
  - type: text
    content: 'Nahoana no mena ny fitafianao, ary ny akanjonao no tahaka ny an''izay manosihosy ny famiazam-boaloboka? '
  '3':
  - type: text
    content: 'Nanosihosy ny famiazam-boaloboka irery Aho; fa tsy mba nisy niaraka tamiko ny avy tamin''ny firenena na dia iray akory aza; nanitsaka ireny tamin''ny fahatezerako Aho sy nanosihosy azy tamin''ny fahavinirako, dia nipitipitihan''ny ràny ny fitafiako, ka voalotoko ny akanjoko rehetra. '
  '4':
  - type: text
    content: 'Fa efa ato am-poko ny andro hamaliako, ary tonga ny taonan''ny voavotro. '
  '5':
  - type: text
    content: 'Nitsinjo Aho, nefa tsy nisy hamonjy, ary talaniona Aho, satria tsy nisy hanohana, ka dia ny sandriko ihany no nanao famonjena ho Ahy, ary ny fahavinirako no nanohana Ahy. '
  '6':
  - type: text
    content: Nanitsaka firenena tamin'ny fahatezerako Aho sady nampahaleony azy tamin'ny fahavinirako ary nandatsaka ny ràny tamin'ny tany.
  '7':
  - type: text
    content: 'Ny famindram-pon''i Jehovah no hambarako, dia ny fiderana an''i Jehovah araka izay rehetra nataony tamintsika sy ny haben''ny fahasoavana tamin''ny taranak''Isiraely. Izay nomeny azy araka ny fiantrany sy araka ny haben''ny famindram-pony. '
  '8':
  - type: text
    content: 'Fa hoy Izy: Oloko tokoa ireo, dia zanaka tsy mba handainga; ka dia tonga Mpamonjy azy Izy. '
  '9':
  - type: text
    content: 'Tamin''ny fahoriany rehetra dia niory koa Izy, ary Ilay Anjelin''ny tavany no namonjy ireo; ny fitiavany sy ny famindram-pony no nanavotany azy sy nivimbinany azy ary nitondrany azy tamin''ny andro taloha ela rehetra. '
