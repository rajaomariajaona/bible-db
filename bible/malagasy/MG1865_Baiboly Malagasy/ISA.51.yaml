document_id: ISA.51
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiposahan'ny famonjena, sy ny fanesorana ny kapoaky ny fahatezeran'i Jehovah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mihanoa Ahy, ianareo izay miezaka mitady fahamarinana, dia izay mitady an''i Jehovah: Tsarovy'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Jereo
    marker-yv: yv-n
  - type: text
    text: ' ny vatolampy izay nakana anareo sy ny ati-lavaka izay nihadiana anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Eny, tsarovy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Jereo
    marker-yv: yv-n
  - type: text
    text: ' Abrahama rainareo sy Saraha, izay niteraka anareo; fa fony mbola tokana izy, dia nantsoiko sy notahiko ary nohamaroiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa Jehovah mampionona an''i Ziona; Eny, mampionona izay rava rehetra ao Izy Ka manao ny efitra ao ho tahaka an''i Edena. Ary ny tany foana ao ho tahaka ny sahan''i Jehovah; Hafaliana sy haravoana no hita ao mbamin''ny fisaorana sy ny feo fiderana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mihainea Ahy, ry vahoakako, ary atongilano amiko ny sofinareo, ry oloko; fa hisy lalàna hivoaka avy amiko, ary ny fitsipiko dia hampitoeriko ho fanazavana ny firenena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Akaiky ny fahamarinako, efa nivoaka ny famonjeko, ary ny sandriko no hitsara ny firenena; izaho no hantenain''ny nosy, ary ny sandriko no andrasany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Andrandrao ho amin'ny lanitra ny masonareo, ary jereo ny tany ambany; fa ny lanitra ho levona tahaka ny setroka, ary tany ho tahaky ny lamba mangarahara, ary ny mponina ao dia ho faty tampoka
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tahaka ny fahafatin''ny moka'
    marker-yv: yv-n
  - type: text
    text: '; fa ny famonjena kosa haharitra mandrakizay, ary ny fahamarinako tsy mba ho rava. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mihainoa ahy, ianareo izay mahalala ny fahamarinana, dia ianao, ry firenena izay manana ny lalàko ao am-ponao; aza matahotra ny latsa ataon''ny zanak''olombelona, na manahy noho ny faharatsiany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa ny kalalao hihinana azy tahaka ny fihinan-damba, ary lolo fotsy hihinana azy tahaka ny fihinam-bolon'ondry; fa ny fahamarinako haharitra mandrakizay, ary famonjena hihatra amin'ny taranaka fara-mandimby.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mifohaza, mifohaza, ry sandrin'i Jehovah, mitafia hery! Mifohaza tahaka ny tamin'ny andro fahiny! dia tamin'ny taranaka lasa ela. Tsy Hianao va Ilay nitetitetika an-dRahaba sy nitomboka ny dragona
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mamba; izahao Ezek. xxix. 3'
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tsy Hianao va Ilay nahamaina ny ranomasina, dia ny rano ao amin''ny lalina indrindra, ka nanao ny ranomasina lalina ho lalana halehan''ny navotana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Eny, ny navotan''i Jehovah hiverina ka hankany Ziona amin''ny fihobiana, ary ny fifaliana mandrakizay no ho eny an-dohany; hahazo fifaliana mandrakizay no ho eny an-dohany; hahazo fifaliana faharavoravoana izy, ka dia handositra ny alahelo sy ny fisentoana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izaho dia Izaho no mpampionona anareo, koa nahoana ianao no dia matahotra ny zanak''olombelona mety maty sy ny zanak''olona hatao tahaka ny ahitra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ka manadino an''i Jehovah, Mpanao anao, izay namelatra ny lanitra sy nanorina ny tany, sady matahotra lalandava mandritra ny andro ianao noho ny fahatezeran''ny mpampahory, raha mikendry hamono izy? Fa aiza intsony izay fahatezeran''ny mpampahory? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izay mitanondrika dia ho afaka faingana; Tsy ho faty havarina ao an-davaka izy ary tsy ho diso hanina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa Izaho Jehovah no Andriamanitrao, Izay mampanonja ny ranomasina, ka dia mirohondrohona ny onjany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Izay mampitsahatra ny rano, raha mirohondrohona ny onjany'
    marker-yv: yv-n
  - type: text
    text: ; Jehovah, Tompon'ny maro, no anarako
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. anarany
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary nataoko eo am-bavanao ny teniko, ary ao amin'ny aloky ny tanako no nanaronako anao, hanao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Hamboly
    marker-yv: yv-n
  - type: text
    text: ' ny lanitra sy hanorina ny tany Aho ary hanao an''i Ziona hoe: Oloko ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mifohaza, mifohaza, mitsangana, ry Jerosalema ô, izay efa nisotro ny kapoaky ny fahatezerana avy tamin''ny tànan''i Jehovah; eny, ny kapoaka gobilia mampiraikiraiky dia efa nisotroanao, ka notrohinao mbamin''ny faikany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tsy misy mitondra azy ny zananilahy rehetra izay naterany; ary tsy misy mitantana azy ny zananilahy rehetra izay notezainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Izao zavatra roa Izao no hanjo anao (Iza no hanony ny alahelonao?): Fandravana sy fandringanana ary mosary sy sabatra, koa hataoko ahoana no fampionona anao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny zanakao-lahy efa reraka, ka miapokapoka eny an-joron-dalambe rehetra eny izy, tahaka ny diera ao anatin''ny fandrika harato eny, tahaka ny olona rakotry ny fahatezeran''i Jehovah sy ny teny mafy ataon''Andriamanitrao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Koa mihainoa izao, ianao ry ilay ory sady mamo tsy amin-divay: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Izao no lazain''i Jehovah Tomponao, dia Andriamanitrao, Izay mandaha-teny ho an''ny olony: Indro, esoriko eny an-tananao ny kapoaka mampiraikiraiky, dia ny kapoaka gobilian''ny fahatezerako; Tsy hisotroanao intsony iny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa hataoko eo an-tànan''izay mampahory anao kosa, dia izay efa nilaza taminao hoe: Miankohofa mba hohitsahinay, ka dia nataonao ho tahaka ny tany ny tenanao sy ho tahaka ny lalambe ho an''izay mandeha eo.'
