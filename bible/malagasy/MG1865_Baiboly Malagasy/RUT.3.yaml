document_id: RUT.3,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nangatahan'i Rota an'i Boaza hitondra loloha azy araka ny hevitra natoron'i Naomy
  - type: text
    content: 'Dia hoy Naomy rafozani-vavy taminy: Tsy hitady izay tokan-trano hahitanao fiadanana va aho, anaka, mba hahasoa anao? '
  '10':
  - type: text
    content: 'Dia hoy izy: Hotahin''i Jehovah anie ianao, anaka; efa nanao soa be lavitra tamin''ny ato aoriana ianao noho ny tamin''ny voalohany, noho ny tsy nanarahanao ny zatovo, na ny malahelo, na ny manan-karena. '
  '11':
  - type: text
    content: 'Koa ankehitriny anaka, aza matahotra; hataoko aminao izay rehetra angatahinao; fa fantatr''izay rehetra ao an-tanànan''ny fireneko fa vehivavy tsara ianao. '
  '12':
  - type: text
    content: 'Ary ankehitriny marina izany, fa havana mahavotra aho; nefa misy havana mahavotra akaiky kokoa noho izaho. '
  '13':
  - type: text
    content: Mitoera ihany atỳ anio alina, ary rehefa maraina, raha hitondra loloha anao izy, dia tsara izany, aoka izy no hitondra loloha anao; fa raha tàhiny kosa tsy hanao izany izy, dia ho entiko loloha ihany ianao, raha velona koa Jehovah, mitoera ihany atỳ mandra-pahamarain'ny andro.
  '14':
  - type: text
    content: 'Dia nandry teo an-tongony mandra-pahamarain''ny andro Rota, ary nifoha, raha mbola maizimaizina, ilay mbola tsy ahitana tarehy iny. Fa hoy ralehilahy: Aza avela ho fantatr''olona fa tatỳ am-pamoloana ravehivavy. '
  '15':
  - type: text
    content: 'Dia hoy koa izy: Ento etỳ ny lamba itafianao, ka hazòny izy. Ary rehefa nataony izany, dia namatra vary hordea inenin''ny famarana Boaza, ka nampitondrainy azy izany. Dia lasa nankany an-tanàna Boaza. '
  '16':
  - type: text
    content: 'Ary rehefa tonga tany amin''ny rafozani-vavy Rota, dia hoy Naomy: Nanao ahoana izay tany, anaka? Dia nambarany azy izay rehetra nataon-dralehilahy taminy. '
  '17':
  - type: text
    content: 'Ary hoy koa izy: Ireto vary hordea inenin''ny famarana ireto dia nomeny ahy; fa hoy izy tamiko: Aza mandeha tsy mitondra zavatra ho any amin''ny rafozanao-vavy. '
  '18':
  - type: text
    content: 'Dia hoy izy: Mitoera ihany, anaka, mandra-pahafantatrao izay hiantefan''ny raharaha; fa tsy hijanona ralehilahy, fa hovitainy anio ihany ny raharaha.'
  '2':
  - type: text
    content: 'Ary ankehitriny tsy isan''ny havantsika va Boaza, tompon''ny ankizivavy izay niarahanao? Indro, mikororoka vary hordea eo am-pamoloana izy anio alina. '
  '3':
  - type: text
    content: 'Koa mandroa sy mihosora diloilo ary miakanjoa, dia midìna any am-pamoloana; nefa aza atao fanta-dralehilahy akory ianao, raha tsy efa avy nihinana sy nisotro izy. '
  '4':
  - type: text
    content: 'Ary rehefa mandry izy, dia fantaro izay andriany, ary midìra, ka songay ny lamba eo an-tongony, dia mandria eo ianao; ary holazainy aminao izay hataonao. '
  '5':
  - type: text
    content: 'Dia hoy izy taminy: Eny, fa hataoko izay rehetra lazainao amiko.'
  '6':
  - type: text
    content: 'Dia nidina tany am-pamoloana izy ka nanao araka izay rehetra nandidian''ny rafozani-vavy azy. '
  '7':
  - type: text
    content: 'Ary rehefa avy nihinana sy nisotro Boaza, ka faly ny fony, dia nandeha handry teo amin''ny faran''ny antontam-bary izy; fa nandeha nitsaitsaika kosa Rota, dia nanonga ny lamba teo an-tongony ka nandry teo. '
  '8':
  - type: text
    content: 'Ary nony namatonalina, dia taitra ralehilahy ka niarina hitsapa, ary, indro, nisy vehivavy nandry teo an-tongony. '
  '9':
  - type: text
    content: 'Dia hoy izy: Iza moa izato? Ary hoy kosa ravehivavy: Rota zatovovavinao aho; mba rakofy ny lambanao ny zatovovavinao, fa havana mahavotra ianao. '
