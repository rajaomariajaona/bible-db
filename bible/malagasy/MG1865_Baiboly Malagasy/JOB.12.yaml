document_id: JOB.12,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny navalin'i Joba
  - type: text
    content: 'Dia namaly Joba ka nanao hoe:'
  '10':
  - type: text
    content: Izay mitana ny ain'ny zava-manan'aina rehetra sy ny fofonain'ny olombelona rehetra?
  '11':
  - type: text
    content: Moa tsy ny sofina va no mamantatra ny teny? Ary tsy ny vava va no manandrana ny hanina?
  '12':
  - type: text
    content: Ao amin'ny fotsy volo ny fahendrena, ary ny fahela-velona no ahazoam-pahalalana.
  '13':
  - type: text
    content: Ao amin'Andriamanitra kosa no misy fahendrena sy hery; Izy no manana hevitra sy fahalalana.
  '14':
  - type: text
    content: Indro, mandrava Izy, ka tsy hatsangana intsony; Manidy ny olona Izy, ka tsy hovohana.
  '15':
  - type: text
    content: Indro, manampina ny rano Izy, ka dia ritra iny; Ary alefany indray ka mahasimba ny tany.
  '16':
  - type: text
    content: Izy no manana hery sy tena fahendrena; Samy eo an-tanany avokoa ny voafitaka sy ny mpamitaka.
  '17':
  - type: text
    content: Alany voninahitra ny mpanolo-tsaina, dia entiny. Ary asehony ny fahadalan'ny mpitsara.
  '18':
  - type: text
    content: Vahany ny fifehezan'ny mpanjaka, ka feheziny mahazaka ny valahany.
  '19':
  - type: text
    content: Alàny voninahitra ny mpisorona, dia entiny, ary ny mafy orina ela dia ravany.
  '2':
  - type: text
    content: Marina ary fa ianareo ihany tokoa olombelona! Ary hiara-maty aminareo ny fahendrena!
  '20':
  - type: text
    content: Koroiny ny laha-tenin'ny mahay, ary ny fahazavan-tsain'ny anti-panahy dia esoriny.
  '21':
  - type: text
    content: Mandatsaka fanamavoana amin'ny andriandahy Izy, ary ketrahiny ny fehin-kibon'ny matanjaka.
  '22':
  - type: text
    content: Manala rakotra izay lalina Izy mba tsy ho maizina ary mitondra ny aloky ny fahafatesana ho eo amin'ny mazava.
  '23':
  - type: text
    content: Mahalehibe ny firenena Izy, nefa mandringana azy koa, mampihahaka ny firenena Izy, nefa mitondra azy hody indray.
  '24':
  - type: text
    content: Mahavery saina ny loholona amin'ny tany Izy ary mampirenireny azy any an-efitra tsy misy lalana;
  '25':
  - type: text
    content: Mitsapatsapa amin'ny maizina tsy misy mavaza ireo; ary mampivembena azy tahaka ny olona mamo Izy.
  '3':
  - type: text
    content: Kanefa izaho mba manan-tsaina tahaka anareo ihany koa; Tsy latsaka noho ianareo aho; Fa iza moa no tsy nahalala izay zavatra toy izany?
  '4':
  - type: text
    content: Tonga fihomehezan'ny sakaizako aho. Dia izaho izay niantso an'Andriamanitra ka novaliany; Eny, tonga fihomehezana ny olona marina tsy manan-tsiny.
  '5':
  - type: text
    content: Endrehin-datsa ny ozoim-pahoriana, raha araka ny hevitry ny miadana, eny, vonona ho amin'izay ela mangozohozo ny latsa
  - type: note
    content: 'Na: Fanilo milopilony ny ozoim-pahoriana, raha araka ny hevitry ny miadana, ka tandrifiny ho an''izay efa ho tafintohina ihany'
  - type: text
    content: .
  '6':
  - type: text
    content: Mandry fahizay ny lain'ny mpitohatoha, Ary mitoetra tsy manahy izay sahy mampahatezitra an'Andriamanitra, dia izay mitondra ny herin'ny tànany ho andriamaniny
  '7':
  - type: text
    content: Kanefa anontanio ange ny biby, fa hampianatra anao izy, ary ny voro-manidina, fa hanambara aminao izy;
  '8':
  - type: text
    content: Ary makà saina
  - type: note
    content: 'Na: amin''ny hazo madinika'
  - type: text
    content: ' amin''ny tany, dia hampianatra anao izy. Ary ny hazandrano any an-dranomasina hampahalala anao.'
  '9':
  - type: text
    content: Iza no tsy mahalala, raha mandinika ireny rehetra ireny
  - type: note
    content: 'Na: Iza amin''ireny rehetra ireny no tsy mahalala'
  - type: text
    content: ', fa ny nanao izany dia ny tanan''i Jehovah,'
