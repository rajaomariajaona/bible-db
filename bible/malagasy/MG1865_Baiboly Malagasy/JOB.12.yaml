document_id: JOB.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny teny navalin'i Joba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia namaly Joba ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Marina ary fa ianareo ihany tokoa olombelona! Ary hiara-maty aminareo ny fahendrena!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Kanefa izaho mba manan-tsaina tahaka anareo ihany koa; Tsy latsaka noho ianareo aho; Fa iza moa no tsy nahalala izay zavatra toy izany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tonga fihomehezan'ny sakaizako aho. Dia izaho izay niantso an'Andriamanitra ka novaliany; Eny, tonga fihomehezana ny olona marina tsy manan-tsiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Endrehin-datsa ny ozoim-pahoriana, raha araka ny hevitry ny miadana, eny, vonona ho amin'izay ela mangozohozo ny latsa
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Fanilo milopilony ny ozoim-pahoriana, raha araka ny hevitry ny miadana, ka tandrifiny ho an''izay efa ho tafintohina ihany'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mandry fahizay ny lain'ny mpitohatoha, Ary mitoetra tsy manahy izay sahy mampahatezitra an'Andriamanitra, dia izay mitondra ny herin'ny tànany ho andriamaniny
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Kanefa anontanio ange ny biby, fa hampianatra anao izy, ary ny voro-manidina, fa hanambara aminao izy;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary makà saina
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: amin''ny hazo madinika'
    marker-yv: yv-n
  - type: text
    text: ' amin''ny tany, dia hampianatra anao izy. Ary ny hazandrano any an-dranomasina hampahalala anao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Iza no tsy mahalala, raha mandinika ireny rehetra ireny
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Iza amin''ireny rehetra ireny no tsy mahalala'
    marker-yv: yv-n
  - type: text
    text: ', fa ny nanao izany dia ny tanan''i Jehovah,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izay mitana ny ain'ny zava-manan'aina rehetra sy ny fofonain'ny olombelona rehetra?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Moa tsy ny sofina va no mamantatra ny teny? Ary tsy ny vava va no manandrana ny hanina?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ao amin'ny fotsy volo ny fahendrena, ary ny fahela-velona no ahazoam-pahalalana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ao amin'Andriamanitra kosa no misy fahendrena sy hery; Izy no manana hevitra sy fahalalana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Indro, mandrava Izy, ka tsy hatsangana intsony; Manidy ny olona Izy, ka tsy hovohana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Indro, manampina ny rano Izy, ka dia ritra iny; Ary alefany indray ka mahasimba ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izy no manana hery sy tena fahendrena; Samy eo an-tanany avokoa ny voafitaka sy ny mpamitaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Alany voninahitra ny mpanolo-tsaina, dia entiny. Ary asehony ny fahadalan'ny mpitsara.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Vahany ny fifehezan'ny mpanjaka, ka feheziny mahazaka ny valahany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Alàny voninahitra ny mpisorona, dia entiny, ary ny mafy orina ela dia ravany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Koroiny ny laha-tenin'ny mahay, ary ny fahazavan-tsain'ny anti-panahy dia esoriny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mandatsaka fanamavoana amin'ny andriandahy Izy, ary ketrahiny ny fehin-kibon'ny matanjaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Manala rakotra izay lalina Izy mba tsy ho maizina ary mitondra ny aloky ny fahafatesana ho eo amin'ny mazava.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mahalehibe ny firenena Izy, nefa mandringana azy koa, mampihahaka ny firenena Izy, nefa mitondra azy hody indray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mahavery saina ny loholona amin'ny tany Izy ary mampirenireny azy any an-efitra tsy misy lalana;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mitsapatsapa amin'ny maizina tsy misy mavaza ireo; ary mampivembena azy tahaka ny olona mamo Izy.
