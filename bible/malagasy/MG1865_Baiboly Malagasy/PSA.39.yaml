document_id: PSA.39,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahatsinontsinon'izao fiainana izao
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ho an''ny mpiventy hira. Ho an''i Jedotona Salamo nataon''i Davida. Hoy izaho: hitandrina ny lalako aho ka tsy hanota amin''ny lelako; hasiako fehim-bava ny vavako, raha mbola eo anatrehako ny ratsy fanahy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Aoka hitsahatra ny fikapohanao ahy; reraka aho azon''ny famelin''ny tananao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Anatra noho ny fahadisoany no ananaranao ny olona, ka manimba ny hatsaran-tarehiny tahaka ny kalalao ianao; zava-poana tokoa ny olona rehetra.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mandrenesa ny fivavako Jehovah ô,ary mihainoa ny fitarainako; aza mangina amin''ny ranomasoko fa vahiny aminao aho sy mpivahiny tahaka ny razako rehetra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Aza atrehinao aho aloha, dia ho miramirana indray, dieny aho tsy mbola lasa ka tsy ho eto intsony.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nangina mihitsy aho, namihim-bava ka tsy nilaza na dia ny tsara aza
    - type: usfm
      marker: x
      children:
      - type: text
        text: Na; na dia teo anatrehan'ny tsara fanahy aza
      marker-yv: yv-n
    - type: text
      text: ', dia nihetsika mafy ny fanaintainan''ny aretiko. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nafana ny foko tato anatiko; raha nieritreritra aho, dia nisy afo nirehitra, ka niteny tamin''ny lelako aho. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Jehovah ô,ampahafantaro ny farako aho sy izay ohatry ny androko; aoka ho fantatro fa olon-kandalo aho. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Indro efa nataonao vodivoam-pelatanana ny androko, ary ny fiainako toy ny tsinontsinona eo anatrehanao. Zava-poana ihany tokoa ny olon-drehetra, na dia matanjaka aza
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Natao ho zava-poana ihany tokoa ny olona rehetra'
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Aloka tokoa no fandehandehan'ny olona; zava-poana tokoa no itabatabàny; mihary harena izy nefa tsy fantany izay ho tompon'izany.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary ankehitriny, inona no andrasako Tompo ô? Hianao no antenaiko. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Manafaha ahy amin''ny fahadisoako rehetra; aza manao ahy ho fanakoran''ny adala. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mangina aho ka tsy miloa-bava fa ianao no nanao izao. '
