document_id: PSA.39,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahatsinontsinon'izao fiainana izao
  - type: text
    content: 'Ho an''ny mpiventy hira. Ho an''i Jedotona Salamo nataon''i Davida. Hoy izaho: hitandrina ny lalako aho ka tsy hanota amin''ny lelako; hasiako fehim-bava ny vavako, raha mbola eo anatrehako ny ratsy fanahy. '
  '10':
  - type: text
    content: 'Aoka hitsahatra ny fikapohanao ahy; reraka aho azon''ny famelin''ny tananao. '
  '11':
  - type: text
    content: Anatra noho ny fahadisoany no ananaranao ny olona, ka manimba ny hatsaran-tarehiny tahaka ny kalalao ianao; zava-poana tokoa ny olona rehetra.
  '12':
  - type: text
    content: 'Mandrenesa ny fivavako Jehovah ô,ary mihainoa ny fitarainako; aza mangina amin''ny ranomasoko fa vahiny aminao aho sy mpivahiny tahaka ny razako rehetra. '
  '13':
  - type: text
    content: Aza atrehinao aho aloha, dia ho miramirana indray, dieny aho tsy mbola lasa ka tsy ho eto intsony.
  '2':
  - type: text
    content: Nangina mihitsy aho, namihim-bava ka tsy nilaza na dia ny tsara aza
  - type: note
    content: Na; na dia teo anatrehan'ny tsara fanahy aza
  - type: text
    content: ', dia nihetsika mafy ny fanaintainan''ny aretiko. '
  '3':
  - type: text
    content: 'Nafana ny foko tato anatiko; raha nieritreritra aho, dia nisy afo nirehitra, ka niteny tamin''ny lelako aho. '
  '4':
  - type: text
    content: 'Jehovah ô,ampahafantaro ny farako aho sy izay ohatry ny androko; aoka ho fantatro fa olon-kandalo aho. '
  '5':
  - type: text
    content: Indro efa nataonao vodivoam-pelatanana ny androko, ary ny fiainako toy ny tsinontsinona eo anatrehanao. Zava-poana ihany tokoa ny olon-drehetra, na dia matanjaka aza
  - type: note
    content: 'Na: Natao ho zava-poana ihany tokoa ny olona rehetra'
  - type: text
    content: '. '
  '6':
  - type: text
    content: Aloka tokoa no fandehandehan'ny olona; zava-poana tokoa no itabatabàny; mihary harena izy nefa tsy fantany izay ho tompon'izany.
  '7':
  - type: text
    content: 'Ary ankehitriny, inona no andrasako Tompo ô? Hianao no antenaiko. '
  '8':
  - type: text
    content: 'Manafaha ahy amin''ny fahadisoako rehetra; aza manao ahy ho fanakoran''ny adala. '
  '9':
  - type: text
    content: 'Mangina aho ka tsy miloa-bava fa ianao no nanao izao. '
