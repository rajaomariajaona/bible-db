document_id: PSA.90,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiankinan'ny olo-marina amin'Andriamanitra, na dia mandalo faingana aza ny androny sady isehoan'ny fahatezeran'Andriamanitra
  - type: text
    content: Fivavak'i Mosesy, lehilahin'Andriamanitra. Tompo ô, efa fonenanay hatramin'ny taranaka rehetra Hianao.
  '10':
  - type: text
    content: 'Fito-polo taona no andron''ny taonanay Ary raha tàhiny mateza aza, dia valo-polo taona, Nefa fahasasarana sy zava-poana ny voninahiny, Fa mihelina faingana izany, ka lasa manidina izahay. '
  '11':
  - type: text
    content: 'Iza no mahafantatra ny herin''ny fahatezeranao sy ny fahaviniranao Araka izay tokony ho fahatahorana Anao? '
  '12':
  - type: text
    content: Mampianara anay hanisa ny andronay, Hahazoanay fo hendry.
  '13':
  - type: text
    content: 'Miverena, Jehovah ô! Mandra-pahoviana? Ary mba aneneno ny amin''ny mpanomponao. '
  '14':
  - type: text
    content: 'Vokiso ny famindram-ponao nony maraina izahay, Mba hihobianay sy hifalianay amin''ny andro rehetra hiainanay. '
  '15':
  - type: text
    content: 'Mampifalia anay araka ny andro nampahorianao anay Sy ny taona nahitanay loza. '
  '16':
  - type: text
    content: 'Aoka hiseho amin''ny mpanomponao ny asanao, Ary ny voninahitrao amin''ny zanany. '
  '17':
  - type: text
    content: Ary aoka ho aminay ny fahasoavan'ny Tompo Andriamanitray; Ary ampitoero aminay ny asan'ny tananay; Eny, ny asan'ny tananay, ampitoero izy.
  '2':
  - type: text
    content: 'Fony tsy mbola ary ny tendrombohitra, Na voaforonao ny tany sy izao rehetra izao, Dia Andriamanitra Hianao hatramin''ny taloha indrindra ka mandrakizay. '
  '3':
  - type: text
    content: Mamerina ny olona ho amin'ny vovoka
  - type: note
    content: Heb. fahatorotoroana
  - type: text
    content: ' Hianao Ka manao hoe: Miverena, ry zanak''olombelona. '
  '4':
  - type: text
    content: 'Fa eo imasonao ny arivo taona dia toy ny fandalon''ny omaly, Ary tahaka ny fotoam-piambenana iray amin''ny alina. '
  '5':
  - type: text
    content: 'Manindao azy tahaka ny riaka Hianao torimaso izy; Amin''ny maraina tahaka ny ahitra mora miova izy. '
  '6':
  - type: text
    content: Amin'ny maraina mamony izy, nefa mora miova
  - type: note
    content: 'Na: Amin''ny maraina dia tahaka ny kolokolon''ahitra izy'
  - type: text
    content: ; Amin'ny hariva voajinja izy ka maina.
  '7':
  - type: text
    content: 'Fa lanin''ny fahatezeranao izahay, Ary raiki-tahotra noho ny fahaviniranao. '
  '8':
  - type: text
    content: 'Ny helokay efa nataonao teo anatrehanao, Ary ny fahotanay miafina teo amin''ny fahazavan''ny tavanao. '
  '9':
  - type: text
    content: 'Fa ny androanay rehetra efa lasa amin''ny fahatezeranao; Efa laninay toy ny eritreritra ny taonanay. '
