document_id: ROM.7,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy fantatrareo, va, ry rahalahy (fa miteny amin''izay mahalala ny lalàna aho), fa ny lalàna dia manapaka ny olona, raha mbola velona izy? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny didy izay natao hahazoana fiainana, dia hitako fa nahatonga fahafatesana tamiko kosa. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa io didy io dia nentin'ny ota namitaka sy nahafaty ahy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka dia masina tokoa ny lalàna, ary masina ny didy sady marina no tsara. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ny tsara va no nahafaty ahy? Sanatria izany! Fa ny ota no nahafaty ahy, mba hiseho ho ota; fa ny tsara no nentiny nahafaty ahy, mba ho tonga ota indrindra ny ota noho ny nataon''ny lalàna. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa fantatsika fa araka ny fanahy ny lalàna; fa izaho kosa nofo, namidy ho andevon''ny ota. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izay ataoko dia tsy fantatro; fa tsy izay sitrako no ataoko; fa izay halako no ataoko. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha manao ny tsy sitrako aho, dia manaiky fa tsara ny lalàna. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin''izany tsy izaho intsony no manao izany, fa ny ota izay mitoetra ato anatiko. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa fantatro fa tsy misy zavatra tsara mitoetra ato amiko, dia ato amin''ny nofoko; fa ato anatiko ihany ny fikasana, saingy ny hahatanteraka ny tsara no tsy ato. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa tsy ny tsara izay sitrako no ataoko; fa ny ratsy izay tsy sitrako no ataoko. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny vehivavy izay manambady dia fehezin''ny lalàna ho an''ny lahy, raha mbola velona ny lahy; fa raha maty kosa ny lahy, dia afaka amin''ny lalàn''ny lahy izy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha ny tsy sitrako no ataoko, dia tsy izaho intsony no manao izany, fa ny ota izay mitoetra ato amiko. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa hitako izao lalàna izao: raha ta-hanao ny marina aho'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: koa hitako fa raha ta-hanaraka ny lalàna aho hanaovako ny marina'
      marker-yv: yv-n
    - type: text
      text: ', dia ato amiko ihany ny ratsy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa mankasitraka ny lalàn''Andriamanitra aho araka ny toetra anaty; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nefa mahita lalàna hafa amin''ny momba ny tenako aho, miady amin''ny lalàn''ny saiko ka mamabo ahy ho an''ny lalàn''ny ota izay ao amin''ny momba ny tenako. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indrisy! olo-mahantra aho! Iza no hanafaka ahy amin''ny tenan''ity fahafatesana ity? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Misaotra an'Andriamanitra aho amin'ny alalan'i Jesosy Kristy Tompontsika. Koa raha ny amiko, dia mankatò ny lalàn'Andriamanitra aho amin'ny saiko, fa ny lalàn'ny ota kosa amin'ny nofoko.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa raha mbola velona ny lahy, ka manambady olon-kafa ravehivavy, dia hatao hoe mpijangajanga izy; fa raha maty kosa ny lahy, dia afaka amin''izany lalàna izany izy ka tsy mba mpijangajanga, na dia manambady olon-kafa aza. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin''izany ianareo koa, ry rahalahiko, dia efa natao maty ny amin''ny lalàna noho ny tenan''i Kristy, mba ho vadin''ny hafa ianareo, dia Izay natsangana tamin''ny maty, mba hahavokarantsika ho an''Andriamanitra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa fony tao amin''ny nofo isika, dia ny filan''ny ota, izay nohetsehin''ny lalàna, no niasa tao amin''ny momba ny tenantsika hahavokatra ho amin''ny fahafatesana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ankehitriny dia efa afaka tamin''ny lalàna isika, satria maty ny amin''izay nihazonana antsika, ka dia manompo amin''ny havaozam-panahy isika, fa tsy amin''ny hahelan-tsoratra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Inona ary no holazaintsika? Ota va ny lalàna? Sanatria izany! Kanefa tsy nahalala ny ota aho, raha tsy tamin''ny lalàna, satria tsy fantatro akory ny fitsiriritana, raha tsy ny lalàna no nanao hoe: Aza mitsiriritra (Eks. 20. 17). '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa io didy io dia nentin''ny ota nampihetsika ny fitsiriritana rehetra tato anatiko; fa maty ny ota, raha tsy misy lalàna. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izaho dia velona tsy nanan-dalàna fahiny; fa rehefa tonga kosa ny didy, dia velona indray ny ota, ka dia maty aho. '
