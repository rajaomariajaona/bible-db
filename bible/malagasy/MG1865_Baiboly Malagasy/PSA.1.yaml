document_id: PSA.1,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tsi-fitovian'ny tsara fanahy sy ny ratsy fanahy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Sambatra ny olona izay tsy mandeha eo amin''ny fisainan''ny ratsy fanahy, ary tsy mijanona eo amin''ny lalana falehan''ny mpanota, ary tsy mipetraka eo amin''ny fipetrahan''ny mpaniratsira; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa ny lalàn''i Jehovah no sitrany; eny ny lalàny no saintsaininy andro aman''alina. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Dia tahaka ny hazo ambolena eo amoron'ny rano velona izy, izay mamoa amin'ny fotoany, ny raviny koa tsy mba malazo; ary ny asany rehetra dia ataony lavorary avokoa.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa tsy mba toy izany ny ratsy fanahy fa toy ny akofa aelin''ny rivotra izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary noho izany ny ratsy fanahy dia tsy hahajanona eo amin''ny fitsarana, na ny mpanota eo amin''ny fiangonan''ny marina. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa fantatr'i Jehovah ny lalan'ny marina, fa ny lalan'ny ratsy fanahy kosa dia mankany amin'ny fahaverezana.
