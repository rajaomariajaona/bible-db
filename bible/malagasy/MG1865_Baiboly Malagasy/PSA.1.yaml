document_id: PSA.1,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tsi-fitovian'ny tsara fanahy sy ny ratsy fanahy
  - type: text
    content: 'Sambatra ny olona izay tsy mandeha eo amin''ny fisainan''ny ratsy fanahy, ary tsy mijanona eo amin''ny lalana falehan''ny mpanota, ary tsy mipetraka eo amin''ny fipetrahan''ny mpaniratsira; '
  '2':
  - type: text
    content: 'Fa ny lalàn''i Jehovah no sitrany; eny ny lalàny no saintsaininy andro aman''alina. '
  '3':
  - type: text
    content: Dia tahaka ny hazo ambolena eo amoron'ny rano velona izy, izay mamoa amin'ny fotoany, ny raviny koa tsy mba malazo; ary ny asany rehetra dia ataony lavorary avokoa.
  '4':
  - type: text
    content: 'Fa tsy mba toy izany ny ratsy fanahy fa toy ny akofa aelin''ny rivotra izy. '
  '5':
  - type: text
    content: 'Ary noho izany ny ratsy fanahy dia tsy hahajanona eo amin''ny fitsarana, na ny mpanota eo amin''ny fiangonan''ny marina. '
  '6':
  - type: text
    content: Fa fantatr'i Jehovah ny lalan'ny marina, fa ny lalan'ny ratsy fanahy kosa dia mankany amin'ny fahaverezana.
