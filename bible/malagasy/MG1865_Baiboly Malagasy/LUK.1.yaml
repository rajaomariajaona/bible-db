document_id: LUK.1
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Satria maro no efa nanoratra nandahatra tantara ny amin'ny zavatra izay efa tanteraka
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: inoana tokoa amintsika'
    marker-yv: yv-n
  - type: text
    text: ' tamintsika tokoa '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: araka izay efa noraisintsika natolotry ny vavolombelona izay sady nahita maso no efa mpitory
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. mpanompo
    marker-yv: yv-n
  - type: text
    text: ' ny teny hatramin''ny voalohany: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: dia sitrako koa, rehefa nofotorako tsara ny zavatra rehetra hatramin'ny niandohany, ny hanoratra izany aminao araka ny filaharany, ry Teofilo tsara indrindra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. mahery indrindra; teny fanajana ny lehibe izany
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'mba hahafantaranao tsara fa mafy orina ny teny izay nampianarina anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tamin''ny andron''i Heroda, mpanjakan''i Jodia, nisy mpisorona anankiray atao hoe Zakaria, isan''ny antokon''i Abia; ary ny vadiny dia avy tamin''ny taranak''i Arona, Elizabeta no anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary samy marina teo anatrehan''Andriamanitra izy mivady sady nitondra tena tsy nanan-tsiny araka ny didy sy ny fitsipika rehetra nomen''ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary tsy nanan-janaka izy, fa momba Elizabeta; ary samy efa antitra izy mivady. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nony nanao raharaham-pisoronana teo anatrehan''Andriamanitra Zakaria araka ny fifandimbiasan''ny antokony, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'araka ny fanao amin''ny fisoronana, dia anjarany araka ny filokana ny hiditra ao amin''ny tempolin''ny Tompo ka handoro ditin-kazo manitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny vahoaka rehetra nitoetra teo ivelany nivavaka tamin''ny ora fandoroana ny ditin-kazo manitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nisy anjelin''ny Tompo niseho taminy teo an-kavanan''ny alitara fandoroana ny ditin-kazo manitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nony nahita azy Zakaria, dia taitra loatra izy ka raiki-tahotra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa hoy ilay anjely taminy: Aza matahotra, ry Zakaria; fa efa nohenoina ny fangatahanao, ka Elizabeta vadinao dia hiteraka zazalahy aminao, ary Jaona no hataonao anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ho faly sy ho ravoravo ianao; ary maro no hifaly amin''ny hahaterahany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa ho lehibe eo anatrehan''ny Tompo izy ary tsy hisotro divay na toaka sady hofenoina ny Fanahy Masina hatrany an-kibon-dreniny aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary maro amin''ny Zanak''isiraely no hampodiny amin''i Jehovah Andriamaniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary izy handeha eo alohany amin''ny fanahy sy ny herin''i Elia mba hampody ny fon''ny ray ho amin''ny zanaka, ary ny tsy manoa ho amin''ny fahendren''ny marina, hamboatra firenena voaomana ho an''ny Tempo (Mal. 3. 23, 24). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy Zakaria tamin''ilay anjely: Inona no hahafantarako izany? fa izaho efa antitra, ary efa antitra koa ny vadiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ilay anjely namaly ka nanao taminy hoe: Izaho no Gabriela, izay mitsangana eo anatrehan''Andriamanitra; ary nirahina hiteny aminao aho ka hilaza aminao izany teny mahafaly izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Koa, indro, ho moana ianao ka tsy hahay miteny ambara-pahatongan''ny andro hisehoan''izany zavatra izany, ho valin''ny tsy ninoanao ny teniko, izay ho tanteraka amin''ny fotoany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny olona dia niandry an''i Zakaria ka gaga noho izy naharitra ela tao amin''ny tempoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Kanjo rehefa nivoaka izy, dia tsy nahay niteny taminy; ary dia fantatry ny olona fa efa nahita fahitana tao amin''ny tempoly izy; ary izy nanao baikon''ny moana taminy, ary dia mbola moana ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary rehefa tapitra ny andro nanaovany fanompoam-pivavahana, dia lasa nody tany an-tranony izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary taorian''izany andro izany dia nitoe-jaza Elizabeta vadiny, dia niery dimy volana izy ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Izao no nataon'ny Tompo tamiko tamin'ny andro izay nitsinjovany hahafa-tondromaso ahy amin'ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary tamin''ny fahenim-bolana dia nirahin''Andriamanitra ny anjely Gabriela ho any an-tanàna anankiray any Galilia atao hoe Nazareta, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ho any amin''ny virijina anankiray, izay voafofo ho vadin''ny lehilahy atao hoe Josefa, avy tamin''ny taranak''i Davida; ary ny anaran''ny virijina dia Maria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary nony niditra tao aminy ilay anjely, dia nanao hoe: Arahaba, ry ilay nohasoavina, ny Tompo momba anao'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ampio hoe: voatahy samy vehivavy ianao'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary taitra loatra izy noho ny teniny ka nieritreritra izay tokony ho hevitr''izany fiarahabana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary hoy ilay anjely taminy: Aza matahotra, ry Maria, fa efa nahita fitia tamin''Andriamanitra ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary, indro, hitoe-jaza ianao ka hiteraka zazalahy, ary ny anarany dia hataonao hoe Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Izy ho lehibe ka hatao hoe Zanaky ny Avo Indrindra; ary Jehovah Andriamanitra hanome Azy ny seza fiandrianan''i Davida rainy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'ary hanjaka amin''ny taranak''i Jakoba mandrakizay Izy; ary ny fanjakany tsy hanam-pahataperana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary hoy Maria tamin''ilay anjely: Hanao ahoana re no hahatanteraka izany, fa tsy mahalala lahy aho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary ilay anjely namaly ka nanao taminy hoe: Ny Fanahy Masina ho tonga ao aminao, ary hisy herin''ny Avo Indrindra hanaloka anao; koa ny Masina Izay hateraka'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: haterakao'
    marker-yv: yv-n
  - type: text
    text: ' dia hatao hoe Zanak''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary, indro, Elizabeta havanao dia efa mitoe-jaza koa, na dia efa antitra aza; ary efa mandray enina izy izao, izay natao hoe momba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Fa tsy hisy tsy ho tanteraka ny teny rehetra ataon''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia hoy Maria: Inty ny ankizivavin''ny Tompo; aoka anie ho tonga amiko araka ny teninao. Dia nandao azy ilay anjely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary Maria niainga tamin''izany andro izany ka nandeha faingana ho any amin''ny tany havoana, ho ao an-tanàna anankiray any Joda; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'ary niditra tao an-tranon''i Zakaria izy ka niarahaba an''i Elizabeta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ary rehefa ren'i Elizabeta ny fiarahaban'i Maria, dia nibitaka
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: niantsambotra'
    marker-yv: yv-n
  - type: text
    text: ' ny zaza tao an-kibony; ary nofenoina ny Fanahy Masina Elizabeta, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'dia niantso tamin''ny feo mahery hoe izy: Voatahy samy vehivavy ianao, ary voatahy ny hateraky ny kibonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Avy aiza no ahatongavan''izao amiko, no mba vangian''ny renin''ny Tompoko aho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Fa, indro, raha vao ren''ny sofiko ny feon''ny fiarahabanao, dia nibitaka noho ny hafaliana ny zaza ao an-kiboko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Ary sambatra ianao izay nino; fa hefaina izay zavatra nampilazain'ny Tompo taminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary hoy Maria: Ny foko mankalaza ny Tompo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary ny fanahiko efa ravoravo tamin''Andriamanitra, Mpamonjy ahy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Fa efa nijery ny fahambani-toetry ny ankizivaviny Izy. Fa, indro, hatramin''ny ankehitriny dia hataon''ny taranaka rehetra ho sambatra aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Fa ny Mahery efa nanao zavatra lehibe tamiko; Ary masina ny anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Ary ny famindram-pony dia amin''izay matahotra Azy hatramin''ny taranaka fara mandimby. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Nanao asa lehibe tamin''ny sandriny Izy; Nampihahaka ny mpiavonavona tamin''ny fiheveran''ny fony Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Nampiala ny lehibe tamin''ny seza fiandrianany Izy, Ary nanandratra ny ambany kosa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Ny noana novokisany soa; Fa ny manan-karena kosa nampialainy maina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Niahy an''isiraely mpanompony Izy, fa nahatsiaro ny famindram-pony '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: '(Araka ny voalazany tamin''ny razantsika), tamin''i Abrahama sy ny taranany mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Ary Maria nitoetra teo amin''i Elizabeta tokony ho telo volana vao nody tany an-tranony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Ary tonga ny andro hahaveloman''i Elizabeta, dia niteraka zazalahy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Ary ny niara-monina taminy sy ny havany nandre fa efa nohalehibiazin''ny Tompo ny famindram-pony taminy; dia niara-nifaly taminy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Ary tamin''ny andro fahavalo dia tonga hamora ny zaza izy, ka efa saiky hataony hoe Zakaria araka ny anaran-drainy ny anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Fa ny reniny namaly ka nanao hoe: Tsy izany, fa hatao hoe Jaona izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Fa hoy izy ireo taminy: Tsy misy na dia iray akory aza amin''ny havanao izay manana izany anarana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Ary nanao baikon''ny moana tamin''ny rainy iry ireo, izay tokony ho tiany hatao anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Ary nangataka fàfana izy ka nanoratra hoe: Jaona no anarany. Dia gaga avokoa izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Ary dia nisokatra niaraka tamin''izay ny vavany, ka afaka niteny ny lelany; dia niteny izy ka nidera an''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Dia raiki-tahotra izay rehetra niara-monina taminy; ary niely teny amin''ny tany havoan''i Jodia rehetra ny lazan''izany rehetra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Ary izay rehetra nandre dia nandatsaka izany tam-pony ka nanao hoe: Ho zaza hanao ahoana re io? Fa ny tanan''ny Tompo nomba azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Ary dia feno ny Fanahy Masina Zakaria rainy ka naminany hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'Isaorana anie ny Tompo Andriamanitry ny Isiraely; Fa nitsinjo ny olony Izy ka nanao fanavotana ho azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: 'Ary nanangana tandro-pamonjena ho antsika Amin''ny taranak''i Davida mpanompony Izy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: '(Araka izay nampilazainy ny mpaminaniny masina hatramin''ny fahagola), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: 'Dia famonjena antsika amin''ny fahavalontsika, sy amin''ny tànan''izay rehetra mankahala antsika; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: 'Manefa famindram-po amin''ny razantsika Izy Sady mahatsiaro ny fanekeny masina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: 'Dia ny fianianana izay nianianany tamin''i Abrahama razantsika, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: 'Hanao izay hahazoantsika hanompo Azy tsy amin-tahotra, Satria afaka amin''ny fahavalontsika isika, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: 'Amin''ny fahamasinana sy ny fahamarinana eo anatrehany amin''ny andro rehetra hiainantsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '76'
  - type: text
    text: 'Ary ianao, ry zaza, dia hatao hoe mpaminanin''ny Avo Indrindra; Fa hialoha eo anatrehan''ny Tompo ianao hamboatra ny lalany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '77'
  - type: text
    text: 'Hanome ny olony ny fahalalam-pamonjena amin''ny famelana ny helony, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '78'
  - type: text
    text: Noho ny halehiben'ny famindram-pon'Andriamanitsika, izay hiposahan
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: niposahan'''
    marker-yv: yv-n
  - type: text
    text: '''ny mazava avy any amin''ny avo ho antsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '79'
  - type: text
    text: 'Hamirapiratra amin''izay mipetraka ao amin''ny maizina sy ao amin''ny aloky ny fahafatesana, Hanitsy ny diantsika ho amin''ny lalam-piadanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '80'
  - type: text
    text: Ary ny zazakely nitombo ka nihahery tam-panahy; ary nitoetra tany an-efitra izy ambara-pahatongan'ny andro nisehoany tamin'ny Isiraely.
