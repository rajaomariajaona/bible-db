document_id: LUK.1,96
type_code: plt
verses:
  '1':
  - type: text
    content: Satria maro no efa nanoratra nandahatra tantara ny amin'ny zavatra izay efa tanteraka
  - type: note
    content: 'Na: inoana tokoa amintsika'
  - type: text
    content: ' tamintsika tokoa '
  '10':
  - type: text
    content: 'Ary ny vahoaka rehetra nitoetra teo ivelany nivavaka tamin''ny ora fandoroana ny ditin-kazo manitra. '
  '11':
  - type: text
    content: 'Ary nisy anjelin''ny Tompo niseho taminy teo an-kavanan''ny alitara fandoroana ny ditin-kazo manitra. '
  '12':
  - type: text
    content: 'Ary nony nahita azy Zakaria, dia taitra loatra izy ka raiki-tahotra. '
  '13':
  - type: text
    content: 'Fa hoy ilay anjely taminy: Aza matahotra, ry Zakaria; fa efa nohenoina ny fangatahanao, ka Elizabeta vadinao dia hiteraka zazalahy aminao, ary Jaona no hataonao anarany. '
  '14':
  - type: text
    content: 'Ary ho faly sy ho ravoravo ianao; ary maro no hifaly amin''ny hahaterahany. '
  '15':
  - type: text
    content: 'Fa ho lehibe eo anatrehan''ny Tompo izy ary tsy hisotro divay na toaka sady hofenoina ny Fanahy Masina hatrany an-kibon-dreniny aza. '
  '16':
  - type: text
    content: 'Ary maro amin''ny Zanak''isiraely no hampodiny amin''i Jehovah Andriamaniny. '
  '17':
  - type: text
    content: 'Ary izy handeha eo alohany amin''ny fanahy sy ny herin''i Elia mba hampody ny fon''ny ray ho amin''ny zanaka, ary ny tsy manoa ho amin''ny fahendren''ny marina, hamboatra firenena voaomana ho an''ny Tempo (Mal. 3. 23, 24). '
  '18':
  - type: text
    content: 'Ary hoy Zakaria tamin''ilay anjely: Inona no hahafantarako izany? fa izaho efa antitra, ary efa antitra koa ny vadiko. '
  '19':
  - type: text
    content: 'Ary ilay anjely namaly ka nanao taminy hoe: Izaho no Gabriela, izay mitsangana eo anatrehan''Andriamanitra; ary nirahina hiteny aminao aho ka hilaza aminao izany teny mahafaly izany. '
  '2':
  - type: text
    content: araka izay efa noraisintsika natolotry ny vavolombelona izay sady nahita maso no efa mpitory
  - type: note
    content: Gr. mpanompo
  - type: text
    content: ' ny teny hatramin''ny voalohany: '
  '20':
  - type: text
    content: 'Koa, indro, ho moana ianao ka tsy hahay miteny ambara-pahatongan''ny andro hisehoan''izany zavatra izany, ho valin''ny tsy ninoanao ny teniko, izay ho tanteraka amin''ny fotoany. '
  '21':
  - type: text
    content: 'Ary ny olona dia niandry an''i Zakaria ka gaga noho izy naharitra ela tao amin''ny tempoly. '
  '22':
  - type: text
    content: 'Kanjo rehefa nivoaka izy, dia tsy nahay niteny taminy; ary dia fantatry ny olona fa efa nahita fahitana tao amin''ny tempoly izy; ary izy nanao baikon''ny moana taminy, ary dia mbola moana ihany. '
  '23':
  - type: text
    content: 'Ary rehefa tapitra ny andro nanaovany fanompoam-pivavahana, dia lasa nody tany an-tranony izy. '
  '24':
  - type: text
    content: 'Ary taorian''izany andro izany dia nitoe-jaza Elizabeta vadiny, dia niery dimy volana izy ka nanao hoe: '
  '25':
  - type: text
    content: Izao no nataon'ny Tompo tamiko tamin'ny andro izay nitsinjovany hahafa-tondromaso ahy amin'ny olona.
  '26':
  - type: text
    content: 'Ary tamin''ny fahenim-bolana dia nirahin''Andriamanitra ny anjely Gabriela ho any an-tanàna anankiray any Galilia atao hoe Nazareta, '
  '27':
  - type: text
    content: 'ho any amin''ny virijina anankiray, izay voafofo ho vadin''ny lehilahy atao hoe Josefa, avy tamin''ny taranak''i Davida; ary ny anaran''ny virijina dia Maria. '
  '28':
  - type: text
    content: 'Ary nony niditra tao aminy ilay anjely, dia nanao hoe: Arahaba, ry ilay nohasoavina, ny Tompo momba anao'
  - type: note
    content: 'Ampio hoe: voatahy samy vehivavy ianao'
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Ary taitra loatra izy noho ny teniny ka nieritreritra izay tokony ho hevitr''izany fiarahabana izany. '
  '3':
  - type: text
    content: dia sitrako koa, rehefa nofotorako tsara ny zavatra rehetra hatramin'ny niandohany, ny hanoratra izany aminao araka ny filaharany, ry Teofilo tsara indrindra
  - type: note
    content: Gr. mahery indrindra; teny fanajana ny lehibe izany
  - type: text
    content: ', '
  '30':
  - type: text
    content: 'Ary hoy ilay anjely taminy: Aza matahotra, ry Maria, fa efa nahita fitia tamin''Andriamanitra ianao. '
  '31':
  - type: text
    content: 'Ary, indro, hitoe-jaza ianao ka hiteraka zazalahy, ary ny anarany dia hataonao hoe Jesosy. '
  '32':
  - type: text
    content: 'Izy ho lehibe ka hatao hoe Zanaky ny Avo Indrindra; ary Jehovah Andriamanitra hanome Azy ny seza fiandrianan''i Davida rainy; '
  '33':
  - type: text
    content: 'ary hanjaka amin''ny taranak''i Jakoba mandrakizay Izy; ary ny fanjakany tsy hanam-pahataperana. '
  '34':
  - type: text
    content: 'Ary hoy Maria tamin''ilay anjely: Hanao ahoana re no hahatanteraka izany, fa tsy mahalala lahy aho? '
  '35':
  - type: text
    content: 'Ary ilay anjely namaly ka nanao taminy hoe: Ny Fanahy Masina ho tonga ao aminao, ary hisy herin''ny Avo Indrindra hanaloka anao; koa ny Masina Izay hateraka'
  - type: note
    content: 'Na: haterakao'
  - type: text
    content: ' dia hatao hoe Zanak''Andriamanitra. '
  '36':
  - type: text
    content: 'Ary, indro, Elizabeta havanao dia efa mitoe-jaza koa, na dia efa antitra aza; ary efa mandray enina izy izao, izay natao hoe momba. '
  '37':
  - type: text
    content: 'Fa tsy hisy tsy ho tanteraka ny teny rehetra ataon''Andriamanitra. '
  '38':
  - type: text
    content: 'Dia hoy Maria: Inty ny ankizivavin''ny Tompo; aoka anie ho tonga amiko araka ny teninao. Dia nandao azy ilay anjely. '
  '39':
  - type: text
    content: 'Ary Maria niainga tamin''izany andro izany ka nandeha faingana ho any amin''ny tany havoana, ho ao an-tanàna anankiray any Joda; '
  '4':
  - type: text
    content: 'mba hahafantaranao tsara fa mafy orina ny teny izay nampianarina anao. '
  '40':
  - type: text
    content: 'ary niditra tao an-tranon''i Zakaria izy ka niarahaba an''i Elizabeta. '
  '41':
  - type: text
    content: Ary rehefa ren'i Elizabeta ny fiarahaban'i Maria, dia nibitaka
  - type: note
    content: 'Na: niantsambotra'
  - type: text
    content: ' ny zaza tao an-kibony; ary nofenoina ny Fanahy Masina Elizabeta, '
  '42':
  - type: text
    content: 'dia niantso tamin''ny feo mahery hoe izy: Voatahy samy vehivavy ianao, ary voatahy ny hateraky ny kibonao. '
  '43':
  - type: text
    content: 'Avy aiza no ahatongavan''izao amiko, no mba vangian''ny renin''ny Tompoko aho? '
  '44':
  - type: text
    content: 'Fa, indro, raha vao ren''ny sofiko ny feon''ny fiarahabanao, dia nibitaka noho ny hafaliana ny zaza ao an-kiboko. '
  '45':
  - type: text
    content: Ary sambatra ianao izay nino; fa hefaina izay zavatra nampilazain'ny Tompo taminao.
  '46':
  - type: text
    content: 'Ary hoy Maria: Ny foko mankalaza ny Tompo, '
  '47':
  - type: text
    content: 'Ary ny fanahiko efa ravoravo tamin''Andriamanitra, Mpamonjy ahy; '
  '48':
  - type: text
    content: 'Fa efa nijery ny fahambani-toetry ny ankizivaviny Izy. Fa, indro, hatramin''ny ankehitriny dia hataon''ny taranaka rehetra ho sambatra aho. '
  '49':
  - type: text
    content: 'Fa ny Mahery efa nanao zavatra lehibe tamiko; Ary masina ny anarany. '
  '5':
  - type: text
    content: 'Tamin''ny andron''i Heroda, mpanjakan''i Jodia, nisy mpisorona anankiray atao hoe Zakaria, isan''ny antokon''i Abia; ary ny vadiny dia avy tamin''ny taranak''i Arona, Elizabeta no anarany. '
  '50':
  - type: text
    content: 'Ary ny famindram-pony dia amin''izay matahotra Azy hatramin''ny taranaka fara mandimby. '
  '51':
  - type: text
    content: 'Nanao asa lehibe tamin''ny sandriny Izy; Nampihahaka ny mpiavonavona tamin''ny fiheveran''ny fony Izy. '
  '52':
  - type: text
    content: 'Nampiala ny lehibe tamin''ny seza fiandrianany Izy, Ary nanandratra ny ambany kosa. '
  '53':
  - type: text
    content: 'Ny noana novokisany soa; Fa ny manan-karena kosa nampialainy maina. '
  '54':
  - type: text
    content: 'Niahy an''isiraely mpanompony Izy, fa nahatsiaro ny famindram-pony '
  '55':
  - type: text
    content: '(Araka ny voalazany tamin''ny razantsika), tamin''i Abrahama sy ny taranany mandrakizay. '
  '56':
  - type: text
    content: 'Ary Maria nitoetra teo amin''i Elizabeta tokony ho telo volana vao nody tany an-tranony. '
  '57':
  - type: text
    content: 'Ary tonga ny andro hahaveloman''i Elizabeta, dia niteraka zazalahy izy. '
  '58':
  - type: text
    content: 'Ary ny niara-monina taminy sy ny havany nandre fa efa nohalehibiazin''ny Tompo ny famindram-pony taminy; dia niara-nifaly taminy ireo. '
  '59':
  - type: text
    content: 'Ary tamin''ny andro fahavalo dia tonga hamora ny zaza izy, ka efa saiky hataony hoe Zakaria araka ny anaran-drainy ny anarany. '
  '6':
  - type: text
    content: 'Ary samy marina teo anatrehan''Andriamanitra izy mivady sady nitondra tena tsy nanan-tsiny araka ny didy sy ny fitsipika rehetra nomen''ny Tompo. '
  '60':
  - type: text
    content: 'Fa ny reniny namaly ka nanao hoe: Tsy izany, fa hatao hoe Jaona izy. '
  '61':
  - type: text
    content: 'Fa hoy izy ireo taminy: Tsy misy na dia iray akory aza amin''ny havanao izay manana izany anarana izany. '
  '62':
  - type: text
    content: 'Ary nanao baikon''ny moana tamin''ny rainy iry ireo, izay tokony ho tiany hatao anarany. '
  '63':
  - type: text
    content: 'Ary nangataka fàfana izy ka nanoratra hoe: Jaona no anarany. Dia gaga avokoa izy rehetra. '
  '64':
  - type: text
    content: 'Ary dia nisokatra niaraka tamin''izay ny vavany, ka afaka niteny ny lelany; dia niteny izy ka nidera an''Andriamanitra. '
  '65':
  - type: text
    content: 'Dia raiki-tahotra izay rehetra niara-monina taminy; ary niely teny amin''ny tany havoan''i Jodia rehetra ny lazan''izany rehetra izany. '
  '66':
  - type: text
    content: 'Ary izay rehetra nandre dia nandatsaka izany tam-pony ka nanao hoe: Ho zaza hanao ahoana re io? Fa ny tanan''ny Tompo nomba azy. '
  '67':
  - type: text
    content: 'Ary dia feno ny Fanahy Masina Zakaria rainy ka naminany hoe: '
  '68':
  - type: text
    content: 'Isaorana anie ny Tompo Andriamanitry ny Isiraely; Fa nitsinjo ny olony Izy ka nanao fanavotana ho azy, '
  '69':
  - type: text
    content: 'Ary nanangana tandro-pamonjena ho antsika Amin''ny taranak''i Davida mpanompony Izy '
  '7':
  - type: text
    content: 'Ary tsy nanan-janaka izy, fa momba Elizabeta; ary samy efa antitra izy mivady. '
  '70':
  - type: text
    content: '(Araka izay nampilazainy ny mpaminaniny masina hatramin''ny fahagola), '
  '71':
  - type: text
    content: 'Dia famonjena antsika amin''ny fahavalontsika, sy amin''ny tànan''izay rehetra mankahala antsika; '
  '72':
  - type: text
    content: 'Manefa famindram-po amin''ny razantsika Izy Sady mahatsiaro ny fanekeny masina, '
  '73':
  - type: text
    content: 'Dia ny fianianana izay nianianany tamin''i Abrahama razantsika, '
  '74':
  - type: text
    content: 'Hanao izay hahazoantsika hanompo Azy tsy amin-tahotra, Satria afaka amin''ny fahavalontsika isika, '
  '75':
  - type: text
    content: 'Amin''ny fahamasinana sy ny fahamarinana eo anatrehany amin''ny andro rehetra hiainantsika. '
  '76':
  - type: text
    content: 'Ary ianao, ry zaza, dia hatao hoe mpaminanin''ny Avo Indrindra; Fa hialoha eo anatrehan''ny Tompo ianao hamboatra ny lalany. '
  '77':
  - type: text
    content: 'Hanome ny olony ny fahalalam-pamonjena amin''ny famelana ny helony, '
  '78':
  - type: text
    content: Noho ny halehiben'ny famindram-pon'Andriamanitsika, izay hiposahan
  - type: note
    content: 'Na: niposahan'''
  - type: text
    content: '''ny mazava avy any amin''ny avo ho antsika. '
  '79':
  - type: text
    content: 'Hamirapiratra amin''izay mipetraka ao amin''ny maizina sy ao amin''ny aloky ny fahafatesana, Hanitsy ny diantsika ho amin''ny lalam-piadanana. '
  '8':
  - type: text
    content: 'Ary nony nanao raharaham-pisoronana teo anatrehan''Andriamanitra Zakaria araka ny fifandimbiasan''ny antokony, '
  '80':
  - type: text
    content: Ary ny zazakely nitombo ka nihahery tam-panahy; ary nitoetra tany an-efitra izy ambara-pahatongan'ny andro nisehoany tamin'ny Isiraely.
  '9':
  - type: text
    content: 'araka ny fanao amin''ny fisoronana, dia anjarany araka ny filokana ny hiditra ao amin''ny tempolin''ny Tompo ka handoro ditin-kazo manitra. '
