document_id: JER.52,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tantaran'ny nahafahana an'i Jerosalema sy ny zavatra nanjo tamin'izany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Iraika amby roa-polo taona Zedekia, fony izy vao nanjaka, ary iraika ambin''ny folo taona no nanjakany tany Jerosalema; ary ny anaran-dreniny dia Hamotala, zanakavavin''i Jeremia avy any Libna. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary ny mpanjakan''i Babylona namono ny zanakalahin''i Zedekia teo imason-drainy; ary ny mpanapaka ny Joda rehetra koa dia novonoiny tao Ribla. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary nopotsiriny ny mason''i Zedekia, dia nafatotry ny mpanjakan''i Babylona tamin''ny gadra varahina izy ka nentiny nankany Babylona ary nataony tao an-trano-maizina mandra-pahafatiny. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary tamin'ny andro fahafolo tamin'ny volana fahadimy tamin'ny taona fahasivy ambin'ny folo nanjakan'i Nebokadnezara, mpanjakan'i Babylona, dia tonga tany Jerosalema Nebozaradana, lehiben'ny mpiambina, mpanompon
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. izay nitsangana teo anatrehan'
      marker-yv: yv-n
    - type: text
      text: '''ny mpanjakan''i Babylona, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'ka nandoro ny tranon''i Jehovah sy ny tranon''ny mpanjaka mbamin''ny trano rehetra tany Jerosalema: ny trano lehibe rehetra dia nodorany tamin''ny afo avokoa. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary ny manda rehetra manodidina an''i Jerosalema dia noravan''ny miaramilan''ny Kaldeana rehetra, izay nanaraka ny lehiben''ny mpiambina. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary ny sasany tamin''ny olona malahelo mbamin''ny olona sisa tao an-tanàna sy izay efa nandositra nanatona ny mpanjakan''i Babylona mbamin''ny vahoaka maro be sisa dia nentin''i Nebozaradana, lehiben''ny mpiambina, ho babo avokoa. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Nefa ny olona malahelo dia namelan''i Nebozaradana, lehiben''ny mpiambina, ihany mba ho mpamboatra tanim-boaloboka sy ho mpiasa tany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary ireo andry varahina teo amin'ny tranon'i Jehovah sy ny fitoeran-tavin-drano sy ny tavin-drano varahina lehibe
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ranomasina
      marker-yv: yv-n
    - type: text
      text: ', izay teo amin''ny tranon''i Jehovah, dia novakivakin''ny Kaldeana, ka nentiny ho any Babylona ny varahina rehetra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary nentiny koa ny vilany fandraofan-davenona sy ny sotron''afo sy ny antsy sy ny lovia famafazana sy ny lovia kely mbamin''ny fanaka varahina rehetra izay nenti-nanao fanompoam-pivavahana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary nentin''ny lehiben''ny mpiambina koa ny lovia sy ny fitoeran-davenon-jiro sy ny lovia famafazana sy ny fandraofan-davenona sy ny fanaovan-jiro sy ny lovia kely sy ny kapoaka na ny volamena na ny volafotsy dia samy nentin''ny lehiben''ny mpanapaka avokoa, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary nanao izay ratsy eo imason''i Jehovah izy, araka izay rehetra nataon''i Joiakima. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'ary ny andry roa sy ny tavin-drano lehibe iray atỳ ny omby varahina roa ambin''ny folo, Izay teo ambanin''ny fitoeran-tavin-drano, izay nataon''i Solomona mpanjaka ho an''ny tranon''i Jehovah; ny varahina tamin''izany fanaka rehetra izany dia tsy hita lanja. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fa ny andry, dia valo ambin''ny folo hakiho no hahavony, ary roa ambin''ny folo hakiho ny manodidina azy; ary ny hateviny dia voantondro efatra, fa poakaty izy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary nisy kapitaly varahina teo aminy; dimy hakiho no hahavon''ny kapitaly anankiray, ka nisy harato sy ampongabendanitra manodidina ny kapitaly, samy varahina avokoa izy. Ny andry faharoa koa sy ny ampongabendanitra dia mba tahaka izany ihany koa. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary nisy ampongabendanitra enina amby sivi-folo teo ivelany; ary ny ampongabendanitra rehetra manodidina ny harato dia zato. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary ny lehiben''ny mpiambina nisambotra an''i Seraia mpisoronabe sy Zefania mpisorona manarakaraka ary mpiandry varavarana telo lahy; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'ary tao an-tanàna no nisamborany ny tandapa anankiray, mpifehy ny miaramila, ary fito lahy tamin''izay mpitoetra eo anatrehan''ny mpanjaka, izay hita tao an-tanàna, ary ny mpanoratry ny komandin''ny miaramila, izay mpandamina ny ho miaramila, sy ny olona tompon-tany enim-polo lahy izay hita teo an-tanàna, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'dia nosamborin''i Nebozaradana, lehiben''ny mpiambina, ireo ka nentiny ho any amin''ny mpanjakan''i Babylona tao Ribla. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Dia novonoin''ny mpanjakan''i Babylona tao Ribla any amin''ny tany Hamata ireo. Toy izany no nitondrana ny Joda ho babo niala tamin''ny taniny. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Izao no olona izay nentin''i Nebokadnezara ho babo tamin''ny taona fahafito, Jiosy telo amby roa-polo sy telo arivo; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'tamin''ny taona fahavalo ambin''ny folo nanjakan''i Nebokadnezara dia roa amby telo-polo amby valon-jato no olona nentiny ho babo avy tany Jerosalema; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa ny fahatezeran''i Jehovah no nahatongavan''izany tamin''i Jerosalema sy ny Joda ambara-pandroakany azy tsy ho eo anatrehany. Ary Zedekia niodina tamin''ny mpanjakan''i Babylona. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: tamin'ny taona fahatelo amby roa-polo nanjakan'i Nebokadnezara dia Jiosy dimy amby efa-polo amby fiton-jato no nentin'i Nebozaradana, lehiben'ny mpiambina, ho babo. Ny tontalin'izy rehetra dia enin-jato amby efatra arivo.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ary tamin'ny andro fahadimy amby roa-polo tamin'ny volana faharoa ambin'ny folo tamin'ny taona fahafito amby telo-polo taorian'ny namaboana an'i Joiakina, mpanjakan'ny Joda, tamin'ny taona vao nanjakan'i Evila-merodaka, mpanjakan'i Babylona, dia nasandrany
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. nasandrany ny lohany
      marker-yv: yv-n
    - type: text
      text: ' hiala tao an-trano-maizina Joiakina, mpanjakan''ny Joda. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Dia nitenenany soa izy, ka ny seza fiandrianany dia nataony ambony noho ny seza fiandrianan''ireo mpanjaka namany tao Babylona. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ka dia novan''i Joiakina ny fitafiany fony izy mbola tao an-trano-maizina; ary nihinan-kanina teo anatrehany mandrakariva izy tamin''ny andro niainany rehetra. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Ary ny hanina nohaniny dia hanina homena avy amin'ny mpanjakan'i Babylona, araka ny tokony ho anjarany isan'andro isan'andro tamin'ny andro rehetra niainany mandra-pahafatiny.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary tamin''ny andro fahafolo tamin''ny volana fahafolo tamin''ny taona fahasivy nanjakan''i Zedekia, dia tonga Nebokadnezara, mpanjakan''i Babylona, sy ny miaramilany rehetra, hamely an''i Jerosalema, ka nitoby tandrifiny sady nanao tilikambo manodidina azy izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary ny tanàna dia nataony fahirano hatramin''ny fahiraika ambin''ny folo taona nanjakan''i Zedekia mpanjaka. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary tamin''ny andro fahasivy tamin''ny volana fahefatra dia mafy ny mosary tao an-tanàna, fa tsy nisy hanina ho an''ny olona tompon-tany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary nisy voabanga ny tanàna, dia nandositra alina ny miaramila rehetra ka niala tao an-tanàna tamin'ny lalana mankamin'ny vavahady tanelanelan'ny manda roa, izay eo anilan'ny sahan'ny mpanjaka (fa ny Kaldeana nanodidina ny tanàna), ka nandeha tamin'ny lalana mankeny amin'ny tani-hay
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Arabà
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary ny miaramilan''ny Kaldeana nanenjika ny mpanjaka ka nahatratra an''i Zedekia teny amin''ny tani-hay any Jeriko; dia nipariaka nandao azy ny miaramilany rehetra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary voasambotra ny mpanjaka ka nentiny niakatra ho any amin''ny mpanjakan''i Babylona tao Ribla any amin''ny tany Hamata, ka dia notsaraina tao izy. '
