document_id: LEV.19,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Didy maro samy hafa
  - type: text
    content: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  '10':
  - type: text
    content: 'Ary aza otazana avokoa ny eo amin''ny sahanao, ary aza tsimponina izay latsaka eo amin''ny sahanao; fa avelao ho an''ny malahelo sy ny vahiny izany: Izaho no Jehovah Andriamanitrareo.'
  '11':
  - type: text
    content: 'Aza mangalatra, aza mamitaka, aza mifandainga. '
  '12':
  - type: text
    content: 'Aza mianian-tsy tò amin''ny anarako, na manamavo ny anaran''Andriamanitrao: Izaho no Jehovah. '
  '13':
  - type: text
    content: Aza manao an-keriny amin'ny zavatry ny namanao na mampahory azy; ny karaman'izay nokaramainao aoka tsy hitoetra ao aminao miloaka alina.
  '14':
  - type: text
    content: 'Aza miteny ratsy ny marenina na manisy zavatra mahatafintohina eo anoloan''ny jamba; fa matahora an''Andriamanitrao: Izaho no Jehovah. '
  '15':
  - type: text
    content: 'Aza manao izay tsy marina amin''ny fitsarana; aza miandany foana amin''ny malahelo, na mena-maso ny lehibe; fahamarinana no hitsaranao ny namanao. '
  '16':
  - type: text
    content: 'Aza mandehandeha manaratsy eo amin''ny firenenao; aza mitsangana handatsaka ny ran''ny namanao: Izaho no Jehovah. '
  '17':
  - type: text
    content: 'Aza mankahala ny rahalahinao amin''ny fonao; mananara dia mananara ny namanao, mba tsy hahazoanao heloka noho ny aminy. '
  '18':
  - type: text
    content: 'Aza mamaly ratsy na manao lolompo amin''izay iray firenena aminao: fa tiava ny namanao tahaka ny tenanao: Izaho no Jehovah. '
  '19':
  - type: text
    content: 'Tandremo ny didiko: Aza avela hilomy amin''ny hafa karazana noho izy ny biby fiompinao; aza fafazanao voan-javatra roa karazana mifangaroharo ny taninao; ary aza mitafy lamba natao amin''ny zavatra roa samy hafa karazana mifamahofaho.'
  '2':
  - type: text
    content: 'Mitenena amin''ny fiangonana, dia ny Zanak''Isiraely rehetra, hoe: Aoka ho masina ianareo, satria masina Aho, Jehovah Andriamanitrareo.'
  '20':
  - type: text
    content: 'Ary raha misy mandry amin''ny andevovavy izay voafofon''olona ho vadiny, ka tsy voavotra na voavotsotra ho olom-potsy ravehivavy, dia hofaizana izy roroa, fa tsy hatao maty, satria tsy olompotsy ravehivavy. '
  '21':
  - type: text
    content: 'Ary ho entin-dralehilahy ny fanati-panonerany ho an''i Jehovah ho eo anoloan''ny varavaran''ny trano-lay fihaonana, dia ondrilahy iray hatao fanati-panonerana; '
  '22':
  - type: text
    content: 'ary ny mpisorona hanao fanavotana ho azy amin''ilay ondrilahy hatao fanati-panonerana, eo anatrehan''i Jehovah, noho ny fahotana izay nataony; dia havela izany fahotany izany. '
  '23':
  - type: text
    content: 'Ary raha tonga any amin''ny tany ianareo ka mamboly hazo fihinam-boa, dia hataonareo ho toy ny tsy voafora ny voany; telo taona no hataonareo ho toy ny tsy voafora izy ka tsy hohanina; '
  '24':
  - type: text
    content: 'ary amin''ny taona fahefatra dia ho masina ny voany rehetra ka hatao fanatitra hiderana an''i Jehovah; '
  '25':
  - type: text
    content: 'fa amin''ny taona fahadimy vao hihinana ny voany ianareo, mba hitomboan''ny fahavokarany ho anareo: Izaho no Jehovah Andriamanitrareo.'
  '26':
  - type: text
    content: 'Aza homana zavatra misy rà; aza manao sikidy na manandro. '
  '27':
  - type: text
    content: 'Aza manety ny sisim-bolon-dohanareo, ary aza manaratra ny vaokanao. '
  '28':
  - type: text
    content: 'Ary aza mitetika ny tenanareo noho ny maty, na manao tombo-kavatsa amin''ny tenanareo: Izaho no Jehovah. '
  '29':
  - type: text
    content: 'Aza mampijangajanga ny zanakao-vavy hampahaloto azy, fandrao hijangajanga ny tany ka ho feno fahavetavetana. '
  '3':
  - type: text
    content: 'Samia matahotra ny reninareo sy ny rainareo, ary tandremo ny Sabatako: Izaho no Jehovah Andriamanitrareo.'
  '30':
  - type: text
    content: 'Tandremo ny Sabatako, ary hajao ny fitoerako masina: Izaho no Jehovah. '
  '31':
  - type: text
    content: 'Aza mivily hanaraka izay manao azy ho tsindrian-javatra, na mitady saina amin''ny mpanao hatsarana, hahaloto anareo aminy: Izaho no Jehovah Andriamanitrareo. '
  '32':
  - type: text
    content: 'Mitsangàna raha eo anatrehan''ny fotsy volo ianao, ka manajà ny tavan''ny anti-panahy, ary matahora an''Andriamanitrao: Izaho no Jehovah. '
  '33':
  - type: text
    content: 'Ary raha misy mivahiny aminao eo amin''ny taninareo, aza manao sarotra aminy. '
  '34':
  - type: text
    content: 'Ny vahiny eo aminareo dia hataonareo tahaka ny tompon-tany aminareo ihany ka ho tianao tahaka ny tenanano; fa efa mba vahiny tany amin''ny tany Egypta ianareo: Izaho no Jehovah Andriamanitrareo. '
  '35':
  - type: text
    content: 'Aza manao izay tsy marina amin''ny fitsarana, na amin''ny fandrefesana, na amin''ny fandanjana, na amin''ny famarana. '
  '36':
  - type: text
    content: 'Mizana marina, vato marina, efaha marina, hina marina, no hotananareo: Izaho no Jehovah Andriamanitrareo, Izay nitondra anareo nivoaka avy tany amin''ny tany Egypta. '
  '37':
  - type: text
    content: 'Ary tandremo ny didiko rehetra sy ny fitsipiko rehetra, ka araho izany: Izaho no Jehovah.'
  '4':
  - type: text
    content: 'Aza mivily hanaraka ny andriamani-tsi-izy, ary aza manao andriamanitra an-idina ho anareo: Izaho no Jehovah Andriamanitrareo.'
  '5':
  - type: text
    content: 'Ary raha mamono zavatra hatao fanati-pihavanana ho an''i Jehovah ianareo, dia ataovy amin''izay hankasitrahana anareo izany. '
  '6':
  - type: text
    content: 'Amin''izay andro amonoanareo zavatra hatao fanatitra sy amin''ny ampitson''ny no hihinananareo azy; fa raha mbola misy sisa tratry ny andro fahatelo, dia hodorana amin''ny afo izany. '
  '7':
  - type: text
    content: 'Ary raha hanina amin''ny andro fahatelo izany, dia ho fahavetavetana ka tsy hankasitrahana; '
  '8':
  - type: text
    content: 'fa izay mihinana izany dia ho meloka, satria nanamavo ny zava-masin''i Jehovah izy, ka dia hofongorana tsy ho amin''ny fireneny izany olona izany. '
  '9':
  - type: text
    content: 'Ary raha mijinja ny vokatry ny tanimbarinareo ianareo, dia aza jinjana avokoa ny eny an-tsisiny; ary aza tsimponina izay latsaka avy amin''ny vokatrao. '
