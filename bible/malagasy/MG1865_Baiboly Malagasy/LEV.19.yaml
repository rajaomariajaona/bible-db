document_id: LEV.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Didy maro samy hafa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mitenena amin''ny fiangonana, dia ny Zanak''Isiraely rehetra, hoe: Aoka ho masina ianareo, satria masina Aho, Jehovah Andriamanitrareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Samia matahotra ny reninareo sy ny rainareo, ary tandremo ny Sabatako: Izaho no Jehovah Andriamanitrareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aza mivily hanaraka ny andriamani-tsi-izy, ary aza manao andriamanitra an-idina ho anareo: Izaho no Jehovah Andriamanitrareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary raha mamono zavatra hatao fanati-pihavanana ho an''i Jehovah ianareo, dia ataovy amin''izay hankasitrahana anareo izany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Amin''izay andro amonoanareo zavatra hatao fanatitra sy amin''ny ampitson''ny no hihinananareo azy; fa raha mbola misy sisa tratry ny andro fahatelo, dia hodorana amin''ny afo izany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary raha hanina amin''ny andro fahatelo izany, dia ho fahavetavetana ka tsy hankasitrahana; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'fa izay mihinana izany dia ho meloka, satria nanamavo ny zava-masin''i Jehovah izy, ka dia hofongorana tsy ho amin''ny fireneny izany olona izany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary raha mijinja ny vokatry ny tanimbarinareo ianareo, dia aza jinjana avokoa ny eny an-tsisiny; ary aza tsimponina izay latsaka avy amin''ny vokatrao. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary aza otazana avokoa ny eo amin''ny sahanao, ary aza tsimponina izay latsaka eo amin''ny sahanao; fa avelao ho an''ny malahelo sy ny vahiny izany: Izaho no Jehovah Andriamanitrareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Aza mangalatra, aza mamitaka, aza mifandainga. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Aza mianian-tsy tò amin''ny anarako, na manamavo ny anaran''Andriamanitrao: Izaho no Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Aza manao an-keriny amin'ny zavatry ny namanao na mampahory azy; ny karaman'izay nokaramainao aoka tsy hitoetra ao aminao miloaka alina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Aza miteny ratsy ny marenina na manisy zavatra mahatafintohina eo anoloan''ny jamba; fa matahora an''Andriamanitrao: Izaho no Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Aza manao izay tsy marina amin''ny fitsarana; aza miandany foana amin''ny malahelo, na mena-maso ny lehibe; fahamarinana no hitsaranao ny namanao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Aza mandehandeha manaratsy eo amin''ny firenenao; aza mitsangana handatsaka ny ran''ny namanao: Izaho no Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Aza mankahala ny rahalahinao amin''ny fonao; mananara dia mananara ny namanao, mba tsy hahazoanao heloka noho ny aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Aza mamaly ratsy na manao lolompo amin''izay iray firenena aminao: fa tiava ny namanao tahaka ny tenanao: Izaho no Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tandremo ny didiko: Aza avela hilomy amin''ny hafa karazana noho izy ny biby fiompinao; aza fafazanao voan-javatra roa karazana mifangaroharo ny taninao; ary aza mitafy lamba natao amin''ny zavatra roa samy hafa karazana mifamahofaho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary raha misy mandry amin''ny andevovavy izay voafofon''olona ho vadiny, ka tsy voavotra na voavotsotra ho olom-potsy ravehivavy, dia hofaizana izy roroa, fa tsy hatao maty, satria tsy olompotsy ravehivavy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ho entin-dralehilahy ny fanati-panonerany ho an''i Jehovah ho eo anoloan''ny varavaran''ny trano-lay fihaonana, dia ondrilahy iray hatao fanati-panonerana; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ary ny mpisorona hanao fanavotana ho azy amin''ilay ondrilahy hatao fanati-panonerana, eo anatrehan''i Jehovah, noho ny fahotana izay nataony; dia havela izany fahotany izany. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary raha tonga any amin''ny tany ianareo ka mamboly hazo fihinam-boa, dia hataonareo ho toy ny tsy voafora ny voany; telo taona no hataonareo ho toy ny tsy voafora izy ka tsy hohanina; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ary amin''ny taona fahefatra dia ho masina ny voany rehetra ka hatao fanatitra hiderana an''i Jehovah; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'fa amin''ny taona fahadimy vao hihinana ny voany ianareo, mba hitomboan''ny fahavokarany ho anareo: Izaho no Jehovah Andriamanitrareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Aza homana zavatra misy rà; aza manao sikidy na manandro. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Aza manety ny sisim-bolon-dohanareo, ary aza manaratra ny vaokanao. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary aza mitetika ny tenanareo noho ny maty, na manao tombo-kavatsa amin''ny tenanareo: Izaho no Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Aza mampijangajanga ny zanakao-vavy hampahaloto azy, fandrao hijangajanga ny tany ka ho feno fahavetavetana. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Tandremo ny Sabatako, ary hajao ny fitoerako masina: Izaho no Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Aza mivily hanaraka izay manao azy ho tsindrian-javatra, na mitady saina amin''ny mpanao hatsarana, hahaloto anareo aminy: Izaho no Jehovah Andriamanitrareo. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Mitsangàna raha eo anatrehan''ny fotsy volo ianao, ka manajà ny tavan''ny anti-panahy, ary matahora an''Andriamanitrao: Izaho no Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary raha misy mivahiny aminao eo amin''ny taninareo, aza manao sarotra aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ny vahiny eo aminareo dia hataonareo tahaka ny tompon-tany aminareo ihany ka ho tianao tahaka ny tenanano; fa efa mba vahiny tany amin''ny tany Egypta ianareo: Izaho no Jehovah Andriamanitrareo. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Aza manao izay tsy marina amin''ny fitsarana, na amin''ny fandrefesana, na amin''ny fandanjana, na amin''ny famarana. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Mizana marina, vato marina, efaha marina, hina marina, no hotananareo: Izaho no Jehovah Andriamanitrareo, Izay nitondra anareo nivoaka avy tany amin''ny tany Egypta. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary tandremo ny didiko rehetra sy ny fitsipiko rehetra, ka araho izany: Izaho no Jehovah.'
