document_id: PSA.97,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fisehoan'ny fanjakan'Andriamanitra amin'ny hery izay maharava ny sampy, fa mahasoa ny mpanompon'Andriamanitra kosa
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Jehovah no Mpanjaka, aoka ho faly ny tany; Aoka ho ravoravo ny nosy maro.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Hianareo izay tia an''i Jehovah, mankahalà ny ratsy; Miaro ny fanahin''ny olony masina Izy Ary mamonjy azy amin''ny tanan''ny ratsy fanahy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ny fahazavana no voafafy ho an'ny marina, Ary ny fifafiana ho an'ny mahitsy fo.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mifalia amin'i Jehovah, ry olo-marina, Ary miderà ny anarany masina
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ny fahatsiarovana ny fahamasinany'
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Rahona sy aizim-pito no manodidina Azy Fahamarinana sy fitsarana no fanorenan''ny seza fiandrianany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Misy afo mialoha Azy ka mandevona ny fahavalony manodidina. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mahazava izao tontolo izao ny helany; Mahita izany ny tany ka mihorohoro. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ny tendrombohitra miempo tahaka ny savoka eo anatrehan''i Jehovah, Dia eo anatrehan''ny Tompon''ny tany rehetra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ny lanitra maneho ny fahamarinany, Ary ny firenena rehetra mahita ny voninahiny. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Aoka ho menatra izay rehetra manompo sarin-javatra voasokitra sy miarahaba tena ny amin''ny andriamani-tsi-izy; Miankohofa eo anoloan''i Jehovah ianareo andriamanitra rehetra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ziona mandre ka faly; Ary ravoravo ny zanakavavin''i Joda Noho ny fitsaranao, Jehovah ô. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Fa Hianao, Jehovah ô, no avo indrindra ambonin'ny tany rehetra; Efa avo ambonin'ny andriamanitra rehetra Hianao.
