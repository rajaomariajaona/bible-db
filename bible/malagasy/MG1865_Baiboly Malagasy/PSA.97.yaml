document_id: PSA.97,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fisehoan'ny fanjakan'Andriamanitra amin'ny hery izay maharava ny sampy, fa mahasoa ny mpanompon'Andriamanitra kosa
  - type: text
    content: Jehovah no Mpanjaka, aoka ho faly ny tany; Aoka ho ravoravo ny nosy maro.
  '10':
  - type: text
    content: 'Hianareo izay tia an''i Jehovah, mankahalà ny ratsy; Miaro ny fanahin''ny olony masina Izy Ary mamonjy azy amin''ny tanan''ny ratsy fanahy. '
  '11':
  - type: text
    content: Ny fahazavana no voafafy ho an'ny marina, Ary ny fifafiana ho an'ny mahitsy fo.
  '12':
  - type: text
    content: Mifalia amin'i Jehovah, ry olo-marina, Ary miderà ny anarany masina
  - type: note
    content: 'Na: ny fahatsiarovana ny fahamasinany'
  - type: text
    content: .
  '2':
  - type: text
    content: 'Rahona sy aizim-pito no manodidina Azy Fahamarinana sy fitsarana no fanorenan''ny seza fiandrianany. '
  '3':
  - type: text
    content: 'Misy afo mialoha Azy ka mandevona ny fahavalony manodidina. '
  '4':
  - type: text
    content: 'Mahazava izao tontolo izao ny helany; Mahita izany ny tany ka mihorohoro. '
  '5':
  - type: text
    content: 'Ny tendrombohitra miempo tahaka ny savoka eo anatrehan''i Jehovah, Dia eo anatrehan''ny Tompon''ny tany rehetra. '
  '6':
  - type: text
    content: 'Ny lanitra maneho ny fahamarinany, Ary ny firenena rehetra mahita ny voninahiny. '
  '7':
  - type: text
    content: 'Aoka ho menatra izay rehetra manompo sarin-javatra voasokitra sy miarahaba tena ny amin''ny andriamani-tsi-izy; Miankohofa eo anoloan''i Jehovah ianareo andriamanitra rehetra. '
  '8':
  - type: text
    content: 'Ziona mandre ka faly; Ary ravoravo ny zanakavavin''i Joda Noho ny fitsaranao, Jehovah ô. '
  '9':
  - type: text
    content: Fa Hianao, Jehovah ô, no avo indrindra ambonin'ny tany rehetra; Efa avo ambonin'ny andriamanitra rehetra Hianao.
