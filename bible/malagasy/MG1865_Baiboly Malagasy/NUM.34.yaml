document_id: NUM.34,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny anaran'ny lehilahy roa ambin'ny folo notendrena hizara ny tany
  - type: text
    content: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  '10':
  - type: text
    content: 'Ary ny ho fari-taninareo atsinanana dia ampifanitsio amin''i Hazar-enana ka hatrany Sefama, '
  '11':
  - type: text
    content: 'dia hidina hatrany Sefama ka hatrany Ribla any atsinanan''i Aina, dia mbola hidina ihany koa ka hipaka amin''ny Ranomasin''i Kinereta atsinanana, '
  '12':
  - type: text
    content: 'dia hidina ihany indray hatrany Jordana, ka dia hihatra amin''ny Ranomasin-tsira. Izany no ho taninareo araka ny fari-taniny manodidina. '
  '13':
  - type: text
    content: 'Ary Mosesy nandidy ny Zanak''Isiraely ka nanao hoe: Izany no tany izay hozarainareo araka ny filokana, dia izay andidian''i Jehovah homena ny firenena sivy sy sasany; '
  '14':
  - type: text
    content: 'fa ny firenena taranak''i Robena araka ny fianakaviany sy ny firenena taranak''i Gada araka ny fianakaviany dia efa nandray ny zara-taniny, ary ny antsasaky ny firenen''i Manase koa dia efa nandray ny zara-taniny; '
  '15':
  - type: text
    content: dia ny firenena roa sy sasany samy efa nandray ny zara-taniny atỳ an-dafy atsinanan'i Jordana, hitsin'i Jeriko, tandrifin'ny fiposahan'ny masoandro.
  '16':
  - type: text
    content: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  '17':
  - type: text
    content: 'Izao no anaran''ny lehilahy izay hizara ny tany ho anareo: Eleazara mpisorona sy Josoa, zanak''i Nona. '
  '18':
  - type: text
    content: 'Ary loholona iray avy amin''ny isam-pirenena koa no halainareo hizara ny tany. '
  '19':
  - type: text
    content: 'Ary izao no anaran''ireo lehilahy ireo: ny avy amin''ny firenen''i Joda dia Kaleba, zanak''i Jefone; '
  '2':
  - type: text
    content: 'Mandidia ny Zanak''Isiraely hoe: Raha tonga any amin''ny tany Kanana ianareo, dia izao no tany izay ho azonareo ho lova, dia ny tany Kanana araka izay fari-taniny.'
  '20':
  - type: text
    content: 'ary ny avy amin''ny firenena taranak''i Simeona dia Semoela, zanak''i Amihoda; '
  '21':
  - type: text
    content: 'ary ny avy amin''ny firenen''i Benjamina dia Elidada, zanak''i Kislona; '
  '22':
  - type: text
    content: 'ary ny lohan''ny firenena taranak''i Dana dia Boky, zanak''i Jogly; '
  '23':
  - type: text
    content: 'ary ny avy amin''ny taranak''i Josefa: ny lohan''ny firenena taranak''i Manase dia Haniela, zanak''i Efoda; '
  '24':
  - type: text
    content: 'ary ny lohan''ny firenena taranak''i Efraima dia Kemoela, zanak''i Siftana; '
  '25':
  - type: text
    content: 'ary ny lohan''ny firenena taranak''i Zebolona dia Elizafana, zanak''i Parnaka; '
  '26':
  - type: text
    content: 'ary ny lohan''ny firenena taranak''Isakara dia Paltiela, zanak''i Azana; '
  '27':
  - type: text
    content: 'ary ny lohan''ny firenena taranak''i Asera dia Ahihoda, zanak''i Selomy; '
  '28':
  - type: text
    content: 'ary ny lohan''ny firenena taranak''i Naftaly dia Pedahela, zanak''i Amihoda. '
  '29':
  - type: text
    content: Ireo no nodidian'i Jehovah hizara ny tany Kanana ho an'ny Zanak'Isiraely.
  '3':
  - type: text
    content: 'Ary ny lafiny atsimo amin''ny taninareo dia hatramin''ny efitra Zina, izay mifanolotra amin''i Edoma. Ary ny fari-taninareo atsimo dia hatramin''ny faran''ny Ranomasin-tsira any atsinanana, '
  '4':
  - type: text
    content: 'dia miolaka eo atsimon''ny fiakarana Akrabima, dia mandroso hatrany Zina, dia mahazo any atsimon''i Kadesibarnea, dia mahazo an''i Hazar-adara ka mandroso hatrany Azmona, '
  '5':
  - type: text
    content: 'ary miolaka hatrany Azmona ka hatramin''ny lohasahan-driak''i Egypta, ka dia mihatra amin''ny ranomasina. '
  '6':
  - type: text
    content: Ary ny amin'ny fari-tany andrefana, dia indro ny Ranomasina Lehibe sy ny amorony, ka hatreo no ho fari-taninareo andrefana.
  '7':
  - type: text
    content: 'Ary izao no ho fari-taninareo avaratra: hatramin''ny Ranomasina Lehibe dia aoka ny tendrombohitra Hora no hotandrifinareo; '
  '8':
  - type: text
    content: 'ary hatramin''ny tendrombohitra Hora dia aoka ny lalana mankany Hamata no hotandrifinareo, ary aoka ny fari-tany hahazo an''i Zedada, '
  '9':
  - type: text
    content: dia hahazo an'i Zifrona, ka dia hihatra an'i Hazar-enana; izany no ho faritaninareo avaratra.
