document_id: PSA.12
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitarainana noho ny tsi-fahamarinan'ny maro
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ho an'ny mpiventy hira. Al-hasheminith. Salamo nataon'i Davida. Vonjeo, Jehovah ô, fa efa lany ny tsara fanahy; eny, tsy misy mahatoky intsony eo amin'ny zanak'olombelona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Samy milaza lainga amin''ny namany amin''ny molotra mandrobo izy; fo mamorom-pitaka no itenenany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Holevonin''i Jehovah anie ny molotra mandrobo rehetra sy ny lela miteny avonavona, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izay manao hoe: hampahery anay ny lelanay;miandany aminay ny molotray; iza no tomponay? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Noho ny fampahoriana ny ory sy ny fisentoan'ny malahelo, dia hitsangana Aho ankehitriny, hoy Jehovah; hovonjeko izay vingavingain'ny sasany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Hataoko mahita ny famonjena iriny izy'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny tenin''i Jehovah dia teny madio, tahaka ny volafotsy voarendrika tao anatin''ny memy ka mitsoriaka amin''ny tany eny, voadio impito. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hianao, Jehovah ô, no hiaro azy, Hianao no hiambina azy mandrakizay tsy ho azon'ity taranaka ity.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Raha avy izay isandratan'ny tsinontsinona eo amin'ny zanak'olombelona, dia mieboebo ombieniombieny ny ratsy fanahy. Fitarainana ataon'izay azom-pahoriana mafy loatra.
