document_id: PSA.12,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainana noho ny tsi-fahamarinan'ny maro
  - type: text
    content: Ho an'ny mpiventy hira. Al-hasheminith. Salamo nataon'i Davida. Vonjeo, Jehovah ô, fa efa lany ny tsara fanahy; eny, tsy misy mahatoky intsony eo amin'ny zanak'olombelona.
  '2':
  - type: text
    content: 'Samy milaza lainga amin''ny namany amin''ny molotra mandrobo izy; fo mamorom-pitaka no itenenany. '
  '3':
  - type: text
    content: 'Holevonin''i Jehovah anie ny molotra mandrobo rehetra sy ny lela miteny avonavona, '
  '4':
  - type: text
    content: 'Izay manao hoe: hampahery anay ny lelanay;miandany aminay ny molotray; iza no tomponay? '
  '5':
  - type: text
    content: Noho ny fampahoriana ny ory sy ny fisentoan'ny malahelo, dia hitsangana Aho ankehitriny, hoy Jehovah; hovonjeko izay vingavingain'ny sasany
  - type: note
    content: 'Na: Hataoko mahita ny famonjena iriny izy'
  - type: text
    content: .
  '6':
  - type: text
    content: 'Ny tenin''i Jehovah dia teny madio, tahaka ny volafotsy voarendrika tao anatin''ny memy ka mitsoriaka amin''ny tany eny, voadio impito. '
  '7':
  - type: text
    content: Hianao, Jehovah ô, no hiaro azy, Hianao no hiambina azy mandrakizay tsy ho azon'ity taranaka ity.
  '8':
  - type: text
    content: Raha avy izay isandratan'ny tsinontsinona eo amin'ny zanak'olombelona, dia mieboebo ombieniombieny ny ratsy fanahy. Fitarainana ataon'izay azom-pahoriana mafy loatra.
