document_id: EZK.1,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahitan'i Ezekiela ny voninahitr'i Jehovah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary tamin''ny andro fahadimy tamin''ny volana fahefatra tamin''ny taona fahatelo-polo, raha teo amin''ny babo teo amoron''ny ony Kebara aho, dia nisokatra ny lanitra, ka nahita fahitana avy tamin''Andriamanitra aho. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary ny toetry ny tarehiny dia tahaka ny tarehin''olona; ary tamin''ny ankavanany dia samy nanana ny tarehin''ny liona izy efatra, ary tamin''ny ankaviany dia samy nanana ny tarehin''omby, ary samy nanana ny tarehin''ny voromahery koa izy efatra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary ny tarehiny sy ny elany dia nisaraka hatreo ambony: samy nisy roa nifanendry tamin''ny an''ny namany, ary ny roa nanarona ny tenany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia samy nizotra tamin''izay hitsiny avy izy, ka na aiza na aiza no tian''ny fanahy ho nalehany dia nalehany: tsy niherika izy raha nandeha. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary tahaka ny vainafo mirehitra ny fijery ny zava-manan''aina, dia tahaka ny fijery ny fanilo; nivoivoy teny anelanelan''ny zava-manan''aina ny afo; ary namirapiratra ny afo, sady nisy helatra nivoaka avy tao aminy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary ny zava-manan'aina nifanaresaka nankary nankatsy toy ny helatra mifelopeloka.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary hitako ny zava-manan''aina, fa, indro, nisy kodia iray avy teo ambonin''ny tany, teo anilan''ny zava-manan''aina teo anoloan''ny tarehiny efatra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ny tarehin''ny kodia sy ny rafiny dia tahaka ny volon''ny krysolita, ary nitovy endrika izy efatra, ary ny tarehiny sy ny rafiny dia toy ny kodia anatin''ny kodia. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Raha nandeha izy, dia nandeha tamin''izay hitsin''ny lafiny efatra: tsy niherika izy raha nandeha. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary ny boriboriny manodidina azy dia avo sy mahatahotra, sady feno maso manodidina izy efatra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary raha nandeha ny zava-manan''aina, dia nandeha teo anilany koa ny kodia; ary raha niainga tsy nipaka tamin''ny tany ireo zava-manan''aina, dia mba niainga koa ny kodia. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Tamin''ny andro fahadimy tamin''ny volana (taona fahadimy taorian''ny namaboana an''i Joiakina mpanjaka izany) '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Na aiza na aiza no tian''ny fanahy ho naleha dia nalehan''ireo koa; fa any koa no mba tian''ny fanahy haleha, ary ny kodia dia niainga teo anilany; fa teo amin''ny kodia ny fanahin''ny zava-manan''aina. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Raha nandeha ireny, dia mba nandeha koa ireto; ary raha nijanona ireny, dia mba nijanona koa ireto; ary raha niainga tsy nipaka tamin'ny tany ireny, dia mba niainga teo anilany koa ny kodia; fa ny fanahin'ny zava-manan'aina dia tao amin'ny kodia.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary teo ambonin''ny lohan''ny zava-manan''aina dia nisy toa endriky ny eloelo, toy ny volon''ny krystaly mahatahotra, mivelatra eo ambonin''ny lohany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary nivelatra mahitsy sady nifanendry ny elany teo ambanin''ny eloelo: samy nanan-droa avy izy rehetra, izay nanaronany ny tenany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary raha nandeha izy, dia nahare ny fikopakopaky ny elany aho, toy ny firohondrohon''ny rano be, dia tahaka ny feon''ny Tsitoha, dia feo toy ny fireondreon''ny miaramila mitoby; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary nisy feo avy teo ambonin''ny eloelo izay teo ambonin''ny lohany; nony nijanona izy, dia namihina ny elany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary teo ambonin''ny eloelo, izay teo ambonin''ny lohany, dia nisy endriky ny seza fiandrianana mitovy volo amin''ny vato safira; ary teo ambonin''ny endriky ny seza fiandrianana dia nisy hoatra ny endrik''olona. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary nahita toy ny volon''ny metaly mamirapiratra aho, dia hoatra ny tarehin''ny afo manodidina azy; ary hatramin''ny valahany no ho miakatra ka hatramin''ny valahany no ho midina dia hitako tahaka ny afo, ka nisy namirapiratra manodidina azy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Toy ny tarehin'avana amin'ny rahona amin'ny andro nisy ranon'orana no tarehin'ny namirapiratra manodidina. Izany no fijery ny endriky ny voninahitr'i Jehovah. Ary nony nahita izany aho, dia nikarapoka nihohoka ka nandre ny feon'ny anankiray niteny.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'dia tonga tamin''i Ezekiela mpisorona, zanak''i Bozy, ny tenin''i Jehovah tany amin''ny tanin''ny Kaldeana, teo amoron''ny ony Kebara; ary ny tànan''i Jehovah dia taminy teo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary hitako fa, indro, nisy tafio-drivotra avy tany avaratra, dia rahona lehibe sy afo mifandrambondrambona, sady nisy namirapiratra manodidina azy; ary avy teo amin''ny afo dia nisy toy ny volon''ny metaly mamirapiratra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary teo aminy koa nisy toa endriky ny zava-manan''aina efatra. Ary ny fikery azy dia hoatra ny endrik''olona. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary samy nanana tarehy efatra sy elatra efatra avy izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary mahitsy ny tongony; ary ny faladiany dia tahaka ny faladian''ny ombilahy kely; ary mamirapiratra toy ny volon''ny varahina manganohano izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary nisy tanan''olona teo ambanin''ny elany teo amin''ny lafiny efatra, ary samy nanana ny tarehiny sy ny elany avy izy efatra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nifanendry ny elany; tsy niherika izy raha nandeha, fa samy nizotra tamin''izay hitsiny avy izy rehetra. '
