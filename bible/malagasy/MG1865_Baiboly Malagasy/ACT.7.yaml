document_id: ACT.7,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary hoy ny mpisoronabe: Moa izany tokoa va? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'ka nahafaka azy tamin''ny fahoriany rehetra sady nanome azy fahasoavana sy fahendrena teo imason''i Farao, mpanjakan''i Egypta; ary izy nanendry azy ho mpanapaka any Egypta mbamin''izay rehetra tao an-dapany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary nisy mosary eran''i Egypta sy Kanana rehetra, ka mafy ny fahoriana; ary tsy nahita hanina ny razantsika. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa nony nandre Jakoba fa nisy vary tany Egypta, dia naniraka ny razantsika izy tamin''ny voalohany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary tamin''ny fanindroany dia fantatr''izy mirahalahy avy Josefa, ary dia fantatr''i Farao koa ny havan''i Josefa. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary Josefa naniraka ka nampaka an''i Jakoba rainy mbamin''ny mpianakaviny rehetra, dia olona dimy amby fito-polo izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary Jakoba nidina nankany Egypta, dia maty izy sy ny razantsika; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ary nentina ho any Sekema izy ka nalevina tao amin''ny fasana izay novidin''i Abrahama vola tamin''ny zanak''i Hamora tany Sekema. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa rehefa ho tonga ny fotoana hahatanterahana ny teny fikasana, izay nataon''Andriamanitra tamin''i Abrahama, dia nitombo sy nihamaro ny olona tany Egypta, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'mandra-pitsangan''ny mpanjaka hafa tany Egypta, izay tsy nahalala an''i Josefa. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ary izy nanao hafetsena tamin'ny razantsika, dia nampahory azy, ka dia samy nanary ny zanany vao teraka mba tsy ho velona izy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'fa hoy Stefana: Mihainoa, ry rahalahy sy ianareo ray: Andriamanitry ny voninahitra niseho tamin''i Abrahama razantsika, raha tany Mesopotamia izy, fony tsy mbola nonina tany Harana, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Tamin''izany andro izany no nahaterahan''i Mosesy, ary tsara teo anatrehan''Andriamanitra izy ka notezaina telo volana tao an-tranon''ny rainy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fa rehefa nariana izy, dia nalain''ny zanakavavin''i Farao ka notezainy ho zanany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary Mosesy nampianarina ny fahendrena rehetra nananan''ny Egyptiana, ary nahery tamin''ny teniny sy ny asany izy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary rehefa ho efa-polo taona izy, dia velona tao am-pony ny hamangy ny Zanak''isiraely, rahalahiny '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary raha nahita ny anankiray nampahorina maina izy, dia namaly ka namono ilay Egyptiana ary namonjy ilay nampahorina. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary nataony fa ho fantatry ny rahalahiny fa ny tànany no hamonjen''Andriamanitra azy; kanjo tsy fantany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary nony ampitson''iny dia niseho tamin''ireo izay niady Mosesy ary nanao izay hampihavana azy ka nanao hoe: Raondriana, mirahalahy ianareo, koa nahoana ianareo no miady? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Fa ilay namely maina ny namany dia nanosika azy ka nanao hoe: Iza no nanendry an''ialahy ho mpanapaka sy mpitsara anay? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Moa ta-hamono ahy koa va ialahy tahaka ny namonoan''ialahy ilay Egyptiana omaly? (Eks. 2. 13, 14.) '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary tamin''izany teny izany dia nandositra Mosesy ka nivahiny tany amin''ny tany Midiana, ary tany no niterahany zanaka roa lahy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ka nanao taminy hoe: Mialà amin''ny taninao sy ny havanao, ka andeha ho any amin''ny tany izay hasehoko anao (Gen. 12. 1). '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary rehefa afaka efa-polo taona, dia nisy anjely niseho taminy tany an-efitry ny tendrombohitra Sinay teo anaty lelafo teo amin''ny voaroy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary Mosesy, nony nahita, dia gaga noho ny fahitana; nefa nony nanatona handinika izy, dia tonga ny feon''ny Tompo nanao hoe: '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Izaho no Andriamanitry ny razanao, dia Andriamanitr''i Abrahama sy Isaka ary Jakoba (Eks. 3. 6). Dia tora-kovitra Mosesy ka tsy sahy nandinika. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary hoy Jehovah taminy: Esory ny kapa amin''ny tongotrao; fa masina io tany ijanonanao io. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Hitako tokoa ny fahorian''ny oloko any Egypta, ary reko ny fitarainany, dia nidina hamonjy azy Aho. Koa andeha ankehitriny, dia hirahiko ho any Egypta ianao (Eks. 3. 5-10). '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Izany Mosesy izany dia nolaviny ka nataony hoe: Iza no nanendry an''ialahy ho mpanapaka sy mpitsara? (Eks. 2. 14) kanjo izy ihany no nirahin''Andriamanitra ho mpanapaka sy mpanavotra nomban''ny tanan''ny Anjely, Ilay niseho taminy teo amin''ny voaroy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Izy no nitondra ny olona nivoaka sady nanao fahagagana sy famantarana tany Egypta sy teo amin''ny Ranomasina Mena ary tany an-efitra efa-polo taona. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Izany no Mosesy izay nilaza tamin''ny Zanak''isiraely hoe: Mpaminany no hatsangan''Andriamanitra ho anareo avy amin''ny rahalahinareo, tahaka ahy (Deo. 18. 15). '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Izy ilay teo amin''ny fiangonana tany an-efitra mbamin''ny Anjely izay niteny taminy tany an-tendrombohitra Sinay sy tamin''ny razantsika, ka izy no nandray teny velona mba homeny antsika. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Nefa ny razantsika tsy nety nanaiky azy, fa nandà, dia manina an''i Egypta ny fony, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia niala tamin''ny tanin''ny Kaldeana izy ka nonina tany Harana; ary rehefa maty ny rainy, dia nafindran''Andriamanitra niala teo izy hankany amin''ny tany izay onenanareo ankehitriny. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'ka hoy izy tamin''i Arona: Anaovy andriamanitra izahay, hitarika antsika eo aloha; fa ilay Mosesy iny, izay nitondra antsika nivoaka avy tany amin''ny tany Egypta, dia tsy fantatray izay nanjo azy (Eks. 32. 1). '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Ary dia nanao ombilahy kely izy tamin''izany andro izany, dia nanatitra fanatitra tamin''ny sampy ka niravoravo tamin''ny asan''ny tànany. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Fa Andriamanitra nihodina, dia nanolotra azy hanompo izay eny amin''ny lanitra; araka ny voasoratra eo amin''ny bokin''ny mpaminany hoe: Moa nanatitra zavatra voavono sy fanatitra ho Ahy efa-polo taona tany an-efitra va ianareo, ry taranak''isiraely? '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Tsia, fa nobetainareo ny tranolain''i Moloka sy ny kintan''ny andriamanitra atao hoe Refana, Dia ny endri-javatra izay nataonareo hivavahana, Ka dia hamindra anareo ho any ankoatr''i Babylona Aho (Amo. 5. 25-27). '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Ny trano-lain''ny Vavolombelona dia teo amin''ny razantsika tany an-efitra, tahaka ny voatendrin''izay niteny tamin''i Mosesy mba hanaovany azy araka ny endrika izay efa hitany. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Izany koa dia noraisin''ny razantsika izay nandimby ireo, ka nentiny niditra niaraka tamin''i Josoa tamin''ny nahazoany ny tanin''ny firenena izay noroahin''Andriamanitra hiala teo anoloan''ny razantsika hatramin''ny andron''i Davida; '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'izy nahita fitia anatrehan''Andriamanitra ka nangataka hahita trano ho an''Andriamanitr''i Jakoba. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Fa Solomona kosa no nanao trano ho Azy. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Kanefa ny Avo Indrindra tsy mitoetra ao amin''izay nataon-tànan''olona; araka ny nolazain''ny mpaminany hoe: '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Ny lanitra no seza fiandrianako, Ary ny tany no fitoeran-tongotro; Koa trano manao ahoana no hataonareo ho Ahy? hoy Jehovah, Ary manao ahoana no ho fitoerana fitsaharako? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary tsy nomeny lova teto izy, na dia eram-paladia akory aza; kanefa nampanantenainy izy fa homeny azy sy ny taranany mandimby azy ho lovany izany, na dia tsy mbola nanan-janaka akory aza izy. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Tsy ny tanako va no nanao izao zavatra rehetra izao? (Isa. 66. 1, 2.) '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Ry olona mafy hatoka sady tsy voafora fo sy sofina, ianareo manohitra ny Fanahy Masina mandrakariva; tahaka ny nataon''ny razanareo ihany no ataonareo koa. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Iza no mpaminany izay tsy nenjehin''ny razanareo? Eny, novonoiny aza izay naminany ny fihavian''ilay Marina; ary ankehitriny dia efa tonga mpamadika sy mpamono Azy ianareo, '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'dia olona izay nahazo ny lalàna tamin''ny nandaharan''anjely azy, nefa tsy nankato izany. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'Ary nony nandre izany izy ireo, dia lotika ny fony, ka nihidy vazana taminy izy. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'Fa Stefana, feno ny Fanahy Masina, dia nibanjina ny lanitra ka nahita ny voninahitr''Andriamanitra sy Jesosy nitsangana teo ankavanan''Andriamanitra, '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'dia nanao hoe: Indro, hitako ny lanitra misokatra ary ny Zanak''olona mitsangana eo ankavanan''Andriamanitra.'
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'Ary ny olona niantso tamin''ny feo mahery sady nanentsin-tadiny ka indray nirodona taminy, '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: 'dia nandroaka azy ho eny ivelan''ny tanàna ka nitora-bato azy; ary ireo vavolombelona dia nametraka ny fitafiany teo anilan''ny tongotry ny zatovo anankiray atao hoe Saoly. '
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: 'Ary ny olona nitora-bato an''i Stefana, izay niantso hoe: Ry Jesosy Tompo ô, raiso ny fanahiko. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary nolazain''Andriamanitra fa ny taranany hivahiny any amin''ny tanin''ny firenena hafa ary handevoziny sy hampahoriny efa-jato taona. '
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: Dia nandohalika izy ka niantso tamin'ny feo mahery hoe Tompo ô, aza atao ho helony anie izao ota izao. Ary rehefa nilaza izany izy, dia nodi-mandry.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nefa ny firenena izay hotompoiny dia hotsaraiko kosa, hoy Andriamanitra; ary rehefa afaka izany, dia hivoaka izy ka hanompo Ahy eto amin''ity tany ity (Gen. 15. 13, 14). '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary nomeny fanekena amin''ny famorana izy. Ary dia niteraka an''isaka izy ka namora azy tamin''ny andro fahavalo; ary Isaka niteraka an''i Jakoba, ary Jakoba niteraka ny patriarka roa ambin''ny folo lahy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary nialona an''i Josefa ny patriarka ka nivarotra azy ho any Egypta; nefa Andriamanitra nomba azy '
