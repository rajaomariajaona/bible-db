document_id: NUM.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny lalàna ny amin'ny vantotr'ombivavy mena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy sy Arona ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lalàna hotandremana, izay efa nandidian''i Jehovah: Lazao amin''ny Zanak''Isiraely mba hitondrany vantotr''ombivavy mena, izay tsy misy kilema na tsiny sady tsy mbola nasiana zioga. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary omeo ho an''i Eleazara mpisorona iny, dia hasaina ho entina eny ivelan''ny toby ka hovonoina eo anatrehany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hanalan''i Eleazara mpisorona amin''ny fanondrony ny ràny ka hafafiny impito manandrify ny trano-lay fihaonana. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hodorana eo imasony ilay vantotr''ombivavy: ny hodiny sy ny henany ary ny ràny mbamin''ny tain-drorohany dia hodorana avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny mpisorona dia haka hazo sedera sy hysopa ary jaky ka hanipy azy eo afovoan''ny afo andoroana ny vantotr''ombivavy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hosasan''ny mpisorona ny fitafiany, ary handro amin''ny rano izy, ary rehefa afaka izany, dia hankeo amin''ny toby izy; ary haloto mandra-paharivan''ny andro ny mpisorona. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary izay mandoro ilay ombivavy dia hanasa ny fitafiany sady handro amin''ny rano, ary haloto mandra-paharivan''ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hangonin''izay lehilahy madio anankiray ny lavenon''ilay vantotr''ombivavy ka hapetrany eo ivelan''ny toby eo amin''izay fitoerana madio anankiray, dia hotehirizina ho an''ny fiangonan''ny Zanak''Isiraely izany ho rano fanadiovana: fanatitra noho ny ota izany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary ilay nanangona ny lavenon'ny vantotr'ombivavy dia hanasa ny fitafiany, ary haloto mandra-paharivan'ny andro; ary ho lalàna mandrakizay ho an'ny Zanak'Isiraely sy ny vahiny eo aminy izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izay mikasika fatin''olona dia haloto hafitoana. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hanadio ny tenany amin''izany rano izany izy amin''ny andro fahatelo, ary amin''ny andro fahafito dia hadio izy; fa raha tsy manadio ny tenany amin''ny andro fahatelo kosa izy, dia tsy hadio amin''ny andro fahafito. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izay rehetra mikasika fatin''olona ka tsy manadio ny tenany dia mandoto ny tabernakelin''i Jehovah ka hofongorana tsy ho amin''ny Isiraely; satria tsy nofafazana ny rano fanadiovana izy, dia haloto: ny fahalotoany mbola eo aminy ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izao no lalàna, raha misy olona maty ao an-day: Izay rehetra miditra ao an-day sy izay rehetra ao anatin''ny lay dia haloto hafitoana. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ny fanaka rehetra misokatra izay tsy misy rakotra voafehy aminy, dia haloto. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary izay rehetra mikasika izay matin-tsabatra any an-tsaha, na fatin''olona, na taolan''olona, na fasana, dia haloto hafitoana. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hangalana ho an''ny maloto ny lavenon''ilay nodorana teo ho fanatitra noho ny ota, ary hasiany rano nalaina tamin''ny rano mandeha izany eo am-bilia. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia haka hysopa ny lehilahy madio anankiray ka hanoboka azy eo amin''ny rano, dia hafafiny amin''ny lay mbamin''ny fanaka rehetra sy ny olona izay eo ary ilay nikasika ny taolana, na ny novonoina, na ny matin''aretina, na ny fasana. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ny maloto dia hofafazan''ilay olona madio amin''ny andro fahatelo sy ny fahafito; dia hanadio ny tenany amin''ny andro fahafito izy ka hanasa ny fitafiany sy handro amin''ny rano, dia hadio rehefa hariva. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa ny olona izay naloto ka tsy nanadio ny tenany dia hofongorana tsy ho amin''ny fiangonana, satria nandoto ny fitoera-masin''i Jehovah izy; ny rano fanadiovana tsy nafafy taminy: maloto izy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia ho lalàna mandrakizay aminy izany, fa izay mamafy ny rano fanadiovana dia hanasa ny fitafiany; ary izay mikasika ny rano fanadiovana dia haloto mandra-paharivan''ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary ny zavatra rehetra izay voakasiky ny maloto dia haloto; ary ny olona izay mikasika azy dia haloto mandra- paharivan'ny andro.
