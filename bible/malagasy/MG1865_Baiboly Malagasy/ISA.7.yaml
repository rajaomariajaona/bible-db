document_id: ISA.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny hahaterahan'Imanoela, sy ny amin'ny handravana ny fanjakan'i Siria sy Efraima
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin''ny andron''i Ahaza, zanak''i Jotama, zanak''i Ozia, mpanjakan''ny Joda, no niakaran-dRezina, mpanjakan''i Syria, sy Pelza, zanak''i Remalia, mpanjakan''ny Isiraely, hanafika an''i Jerosalema, nefa tsy nahafaka azy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nambara tamin''ny taranak''i Davida hoe: Injao ny Syriana efa mitoby any amin''ny Efraima. Ary nirondrona ny fony sy ny fon''ny vahoakany toy ny firondronan''ny hazo any an''ala, raha asian''ny rivotra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy Jehovah tamin''Isaia: Mivoaha ianao sy Seara-jasoba'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Seara-jasoba = Hisy sisa hiverina
    marker-yv: yv-n
  - type: text
    text: ' zanakao hitsena an''i Ahaza eo amin''ny faran''ny lakan-drano amin''ny kamory ambony, eo amin''ny lalambe mankamin''ny sahan''ny mpamotsy lamba, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ka lazao aminy hoe: Mitandrema, ka aza taitaitra foana; Aza matahotra, ary aoka tsy ho ketraka ny fonao Noho ireto tapa-porohana roa midonaka ireto, Dia ny firehetan''ny fahatezeran-dRezina sy Syria ary ny zanak''i Remalia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Satria efa nanao saina hampidi-doza aminao Syria sy Efraima ary ny zanak''i Remalia ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Andeha isika hananika an''i Joda ka hampaharaiki-tahotra azy Ary hanafaka azy ho antsika ka hanangana ny zanak''i Tabeala ho mpanjaka ao afovoany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia izao no lazain''i Jehovah Tompo: Tsy ho tanteraka izany, Ary tsy hisy izany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa ny lohan''i Syria dia Damaskosy, Ary ny lohan''i Damaskosy dia Rezina (Ary ao anatin''ny dimy amby enim-polo taona dia ho rava ny Efraima ka tsy ho vanon-ko firenena intsony), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny lohan''i Efraima dia Samaria, Ary ny lohan''i Samaria dia ny zanak''i Remalia. Raha tsy mety mino ianareo, Dia tsy ho tafatoetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Jehovah mbola niteny tamin''i Ahaza ihany ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mangataha famantarana amin''i Jehovah Andriamanitrao; eny, mangataha na ho avy amin''ny lalina ambany, na ho avy amin''ny avo ambony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa hoy Ahaza: Tsy hangataka aho, fa tsy haka fanahy an''i Jehovah '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy Isaia: Mihainoa ary, ny taranak''i Davida: Ataonareo ho zavatra kely foana moa ny hanasatra ny olona, No dia hanasatra an''Andriamanitro koa ianareo ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary noho izany dia ny Tompo no hanome famantarana ho anareo: Indro, hanan''anaka ny virijina'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: zazavavy'
    marker-yv: yv-n
  - type: text
    text: ' ka hiteraka zazalahy, ary ny anarany hataony hoe Imanoela'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Imanoela = Amintsika Andriamanitra'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Rehefa mahalala handà ny ratsy sy hifidy ny tsara izy, Dia rononomandry sy tantely no ho fihinany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa raha tsy mbola mahalala handà ny ratsy sy hifidy ny tsara izany zaza izany, Dia ho lao ny tanin''ireo mpanjaka roa maharaiki-tahotra anao ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jehovah hahatonga aminao sy ny olonao ary ny mpianakavin-drainao Izay andro tsy mbola nisy toa azy Hatramin''ny andro nialan''i Efraima tamin''ny Joda (Dia ny mpanjakan''i Asyria); '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary amin''izany andro izany Jehovah hisiaka hiantso ny lalitra, izay any amin''ny faran''ny onin''i Egypta, sy ny renitantely, izay any amin''ny tany Asyria; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia ho avy ireo, ka samy hipetraka amin''ny lohasaha lao, sy eny an-tsefatsefaky ny harambato, sy eny amin''ny fefy tsilo rehetra, ary eny amin''ny saha fiandrasana rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Amin'izany andro izany koa ny Tompo hanaratra ny loha sy ny volon-tongotra Amin'ny hareza nohofana any amoron'ny Ony
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eofrata
    marker-yv: yv-n
  - type: text
    text: ' (Dia ny mpanjakan''i Asyria); Ary ny volom-bava hokakasana amin''iny koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary amin''izany andro izany Dia samy hiompy ombivavy kely sy ondry roa ny olona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary noho ny haben''ny ronono azo avy amin''ireo dia hihinana rononomandry izy; Fa rononomandry sy tantely no ho fihinan''ny olona sisa rehetra ao amin''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary amin''Izany andro izany dia ho rakotry ny hery sy ny tsilo Ny tany rehetra izay nisy voaloboka arivo nahazo sekely arivo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Zana-tsipìka sy tsipìka no ho entin''izay miditra ao, satria rakotry ny hery sy ny tsilo ny tany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary ny tanety rehetra izay nohevoina tamin'ny angady dia tsy ho azonao diavina noho
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Dia tsy halehan'''
    marker-yv: yv-n
  - type: text
    text: ' ny fahatahorana ny hery sy ny tsilo; Fa ho falehan''ny omby sy ho voahitsakitsaky ny ondry aman''osy izany.'
