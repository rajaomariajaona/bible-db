document_id: ISA.7,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny hahaterahan'Imanoela, sy ny amin'ny handravana ny fanjakan'i Siria sy Efraima
  - type: text
    content: 'Ary tamin''ny andron''i Ahaza, zanak''i Jotama, zanak''i Ozia, mpanjakan''ny Joda, no niakaran-dRezina, mpanjakan''i Syria, sy Pelza, zanak''i Remalia, mpanjakan''ny Isiraely, hanafika an''i Jerosalema, nefa tsy nahafaka azy izy. '
  '10':
  - type: text
    content: 'Ary Jehovah mbola niteny tamin''i Ahaza ihany ka nanao hoe: '
  '11':
  - type: text
    content: 'Mangataha famantarana amin''i Jehovah Andriamanitrao; eny, mangataha na ho avy amin''ny lalina ambany, na ho avy amin''ny avo ambony. '
  '12':
  - type: text
    content: 'Fa hoy Ahaza: Tsy hangataka aho, fa tsy haka fanahy an''i Jehovah '
  '13':
  - type: text
    content: 'Dia hoy Isaia: Mihainoa ary, ny taranak''i Davida: Ataonareo ho zavatra kely foana moa ny hanasatra ny olona, No dia hanasatra an''Andriamanitro koa ianareo ? '
  '14':
  - type: text
    content: 'Ary noho izany dia ny Tompo no hanome famantarana ho anareo: Indro, hanan''anaka ny virijina'
  - type: note
    content: 'Na: zazavavy'
  - type: text
    content: ' ka hiteraka zazalahy, ary ny anarany hataony hoe Imanoela'
  - type: note
    content: 'Na: Imanoela = Amintsika Andriamanitra'
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'Rehefa mahalala handà ny ratsy sy hifidy ny tsara izy, Dia rononomandry sy tantely no ho fihinany. '
  '16':
  - type: text
    content: 'Fa raha tsy mbola mahalala handà ny ratsy sy hifidy ny tsara izany zaza izany, Dia ho lao ny tanin''ireo mpanjaka roa maharaiki-tahotra anao ireo. '
  '17':
  - type: text
    content: 'Jehovah hahatonga aminao sy ny olonao ary ny mpianakavin-drainao Izay andro tsy mbola nisy toa azy Hatramin''ny andro nialan''i Efraima tamin''ny Joda (Dia ny mpanjakan''i Asyria); '
  '18':
  - type: text
    content: 'Ary amin''izany andro izany Jehovah hisiaka hiantso ny lalitra, izay any amin''ny faran''ny onin''i Egypta, sy ny renitantely, izay any amin''ny tany Asyria; '
  '19':
  - type: text
    content: 'Dia ho avy ireo, ka samy hipetraka amin''ny lohasaha lao, sy eny an-tsefatsefaky ny harambato, sy eny amin''ny fefy tsilo rehetra, ary eny amin''ny saha fiandrasana rehetra. '
  '2':
  - type: text
    content: 'Dia nambara tamin''ny taranak''i Davida hoe: Injao ny Syriana efa mitoby any amin''ny Efraima. Ary nirondrona ny fony sy ny fon''ny vahoakany toy ny firondronan''ny hazo any an''ala, raha asian''ny rivotra. '
  '20':
  - type: text
    content: Amin'izany andro izany koa ny Tompo hanaratra ny loha sy ny volon-tongotra Amin'ny hareza nohofana any amoron'ny Ony
  - type: note
    content: Eofrata
  - type: text
    content: ' (Dia ny mpanjakan''i Asyria); Ary ny volom-bava hokakasana amin''iny koa. '
  '21':
  - type: text
    content: 'Ary amin''izany andro izany Dia samy hiompy ombivavy kely sy ondry roa ny olona; '
  '22':
  - type: text
    content: 'Ary noho ny haben''ny ronono azo avy amin''ireo dia hihinana rononomandry izy; Fa rononomandry sy tantely no ho fihinan''ny olona sisa rehetra ao amin''ny tany. '
  '23':
  - type: text
    content: 'Ary amin''Izany andro izany dia ho rakotry ny hery sy ny tsilo Ny tany rehetra izay nisy voaloboka arivo nahazo sekely arivo. '
  '24':
  - type: text
    content: 'Zana-tsipìka sy tsipìka no ho entin''izay miditra ao, satria rakotry ny hery sy ny tsilo ny tany rehetra. '
  '25':
  - type: text
    content: Ary ny tanety rehetra izay nohevoina tamin'ny angady dia tsy ho azonao diavina noho
  - type: note
    content: 'Na: Dia tsy halehan'''
  - type: text
    content: ' ny fahatahorana ny hery sy ny tsilo; Fa ho falehan''ny omby sy ho voahitsakitsaky ny ondry aman''osy izany.'
  '3':
  - type: text
    content: 'Ary hoy Jehovah tamin''Isaia: Mivoaha ianao sy Seara-jasoba'
  - type: note
    content: Seara-jasoba = Hisy sisa hiverina
  - type: text
    content: ' zanakao hitsena an''i Ahaza eo amin''ny faran''ny lakan-drano amin''ny kamory ambony, eo amin''ny lalambe mankamin''ny sahan''ny mpamotsy lamba, '
  '4':
  - type: text
    content: 'ka lazao aminy hoe: Mitandrema, ka aza taitaitra foana; Aza matahotra, ary aoka tsy ho ketraka ny fonao Noho ireto tapa-porohana roa midonaka ireto, Dia ny firehetan''ny fahatezeran-dRezina sy Syria ary ny zanak''i Remalia. '
  '5':
  - type: text
    content: 'Satria efa nanao saina hampidi-doza aminao Syria sy Efraima ary ny zanak''i Remalia ka nanao hoe: '
  '6':
  - type: text
    content: 'Andeha isika hananika an''i Joda ka hampaharaiki-tahotra azy Ary hanafaka azy ho antsika ka hanangana ny zanak''i Tabeala ho mpanjaka ao afovoany, '
  '7':
  - type: text
    content: 'Dia izao no lazain''i Jehovah Tompo: Tsy ho tanteraka izany, Ary tsy hisy izany; '
  '8':
  - type: text
    content: 'Fa ny lohan''i Syria dia Damaskosy, Ary ny lohan''i Damaskosy dia Rezina (Ary ao anatin''ny dimy amby enim-polo taona dia ho rava ny Efraima ka tsy ho vanon-ko firenena intsony), '
  '9':
  - type: text
    content: 'Ary ny lohan''i Efraima dia Samaria, Ary ny lohan''i Samaria dia ny zanak''i Remalia. Raha tsy mety mino ianareo, Dia tsy ho tafatoetra. '
