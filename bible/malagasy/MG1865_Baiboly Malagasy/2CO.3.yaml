document_id: 2CO.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny voninahitra momba ny raharaha nanendrena ny Apostoly, sy ny fihoaran'izay noho ny voninahitry ny lalàna
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moa midera tena indray va izahay, sa toy ny sasany ka mila epistily filazan-tsoa anay ho aminareo, na avy aminareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hianareo no epistilinay voasoratra ato am-ponay sady fantatry sy vakin''ny olona rehetra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: eny, aseho ho epistilin'i Kristy izay entinay
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: soratanay; Gr. anompoanay'
    marker-yv: yv-n
  - type: text
    text: ' ianareo, tsy nosoratana tamin''ny ranomainty anefa, fa tamin''ny Fanahin''Andriamanitra velona, tsy teo amin''izay tena vato fisaka, fa teo amin''izay vato fisaka nofo, dia ny fo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary manana izany fahatokiana izany ny amin''Andriamanitra izahay amin''ny alalan''i Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Kanefa tsy mihambo hanana fahaleovana avy aminay hihevitra na amin''inona na amin''inona izahay; fa ny fahaleovanay dia avy amin''Andriamanitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izay efa nampahaleo anay koa ho mpanompo amin''izay fanekena vaovao, nefa tsy amin''ny soratra, fa amin''ny Fanahy; fa ny soratra mahafaty, fa ny Fanahy no mahavelona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa raha ny fanompoana nitondra fahafatesana aza, izay voasoratra teo amin''ny vato, no nisy voninahitra, ka ny Zanak''Isiraely tsy nahabanjina ny tavan''i Mosesy noho ny voninahitry ny tavany izay nihalevona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'tsy mainka hisy voninahitra ny fanompoana omban''ny Fanahy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa raha nisy voninahitra ny fanompoana nitondra ny fanamelohana, mainka hanan-tombom-boninahitra ny fanompoana mitondra ny fahamarinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary izay nisy voninahitra aza dia tsy manana voninahitra kosa amin''izao noho ny voninahitra izay manan-tombo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa raha ny nilevona aza nisy voninahitra, mainka fa ny mitoetra no misy voninahitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa amin''izany, satria manana izany fanantenana izany izahay, dia sahy tokoa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ary tsy tahaka an''i Mosesy, izay nanarona ny tavany tamin''ny fisalobonana, mba tsy hibanjinan''ny Zanak''Isiraely ny faran''izay nihalevona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'fa efa donto ny sainy; fa ambaraka androany dia mbola tsy nesorina ihany izany fisalobonana izany, raha vakina ny tenin''ny fanekena taloha, satria ao amin''i Kristy ihany no anesorana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa misy fisalobonana manarona ny fony ambaraka androany, raha vakina ny tenin''i Mosesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Kanefa raha miverina amin''ny Tompo izy, dia hesorina ihany ny fisalobonana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny Tompo izany Fanahy izany; ary izay itoeran''ny Fanahin''ny Tompo no itoeran''ny fahafahana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa isika rehetra kosa amin'ny tava tsy misarona dia mijery ny voninahitry ny Tompo toy ny amin'ny fitaratra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Dia tahaka ny fitaratra tarafin''ny voninahitry ny Tompo'
    marker-yv: yv-n
  - type: text
    text: ', ka ovana hahazo izany endrika izany indrindra avy amin''ny voninahitra ka ho amin''ny voninahitra, toy ny avy amin''ny Tompo, dia ny Fanahy.'
