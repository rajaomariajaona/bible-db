document_id: PSA.63,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hetahetan'ny fanahy maniry an'Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Salamo nataon''i Davida, fony tany an-efitr''i Joda izy. ANDRIAMANITRA ô, Andriamanitro Hianao; mitady Anao fatratra aho; mangetaheta Anao ny fanahiko, maniry Anao ny nofoko, eto amin''ny tany maina sy mangentana tsy misy rano; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Hatolotra ho amin'ny herin'ny sabatra izy; ho anjaran'ny amboahaolo
    - type: usfm
      marker: x
      children:
      - type: text
        text: volpa
      marker-yv: yv-n
    - type: text
      text: ' izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa ny mpanjaka hifaly amin'Andriamanitra; ho ravoravo izay rehetra mianiana aminy; fa hakombona ny vavan'izay rehetra mandainga.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Toy izany no nijereko Anao tao amin''ny fitoerana masina, hahitako ny herinao sy ny voninahitrao. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa tsara noho ny aina ny famindram-ponao; ny molotro hidera Anao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Toy izany no hisaorako Anao, raha mbola velona koa aho; amin''ny anaranao no hanandratako ny tanako. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Toy ny voky tsoka sy tavy no hahavokisan''ny fanahiko; ary amin''ny molotra falifaly no hideran''ny vavako Anao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Raha mahatsiaro Anao eo am-pandriako aho, dia mieritreritra Anao amin''ny fiambenan''alina. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa efa namonjy ahy Hianao, ary ao ambanin'ny aloky ny elatrao no hihobiako.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mifikitra amiko ny fanahiko; manohana ahy ny tananao ankavanana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa ireny dia mitady ny aiko ka mampidi-doza amin''ny tenany; hiditra any ambanin''ny tany izy; '
