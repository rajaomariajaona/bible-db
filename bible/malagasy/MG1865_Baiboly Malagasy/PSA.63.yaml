document_id: PSA.63,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hetahetan'ny fanahy maniry an'Andriamanitra
  - type: text
    content: 'Salamo nataon''i Davida, fony tany an-efitr''i Joda izy. ANDRIAMANITRA ô, Andriamanitro Hianao; mitady Anao fatratra aho; mangetaheta Anao ny fanahiko, maniry Anao ny nofoko, eto amin''ny tany maina sy mangentana tsy misy rano; '
  '10':
  - type: text
    content: Hatolotra ho amin'ny herin'ny sabatra izy; ho anjaran'ny amboahaolo
  - type: note
    content: volpa
  - type: text
    content: ' izy. '
  '11':
  - type: text
    content: Fa ny mpanjaka hifaly amin'Andriamanitra; ho ravoravo izay rehetra mianiana aminy; fa hakombona ny vavan'izay rehetra mandainga.
  '2':
  - type: text
    content: 'Toy izany no nijereko Anao tao amin''ny fitoerana masina, hahitako ny herinao sy ny voninahitrao. '
  '3':
  - type: text
    content: 'Fa tsara noho ny aina ny famindram-ponao; ny molotro hidera Anao. '
  '4':
  - type: text
    content: 'Toy izany no hisaorako Anao, raha mbola velona koa aho; amin''ny anaranao no hanandratako ny tanako. '
  '5':
  - type: text
    content: 'Toy ny voky tsoka sy tavy no hahavokisan''ny fanahiko; ary amin''ny molotra falifaly no hideran''ny vavako Anao. '
  '6':
  - type: text
    content: 'Raha mahatsiaro Anao eo am-pandriako aho, dia mieritreritra Anao amin''ny fiambenan''alina. '
  '7':
  - type: text
    content: Fa efa namonjy ahy Hianao, ary ao ambanin'ny aloky ny elatrao no hihobiako.
  '8':
  - type: text
    content: 'Mifikitra amiko ny fanahiko; manohana ahy ny tananao ankavanana. '
  '9':
  - type: text
    content: 'Fa ireny dia mitady ny aiko ka mampidi-doza amin''ny tenany; hiditra any ambanin''ny tany izy; '
