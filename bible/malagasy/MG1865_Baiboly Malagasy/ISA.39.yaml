document_id: ISA.39
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandraisan'i Hezekia ny iraky ny mpanjakan'i Babylona, sy ny teny nolazain'Isaia noho izany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin''izany andro izany no nampitondran''i Merodaka-baladana, zanak''i Baladana, mpanjakan''i Babylona, taratasy sy fanomezana ho an''i Hezekia; fa efa reny fa narary izy ka sitrana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary dia faly Hezekia noho izany ka nampiseho azy ny trano fitehirizany zava-tsoa, dia volafotsy sy volamena sy zava-manitra ary menaka tsara, sy ny trano fitehirizana ny fiadiany rehetra mbamin'izay rehetra tao amin'ny firaketany; tsy nisy zavatra tsy nasehon'i Hezekia azy, na ny tao an-tranony, na ny tao amin'ny fanjakany rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nankany amin''i Hezekia mpanjaka mpaminany ka nanao taminy hoe: Ahoana no nolazain''ireo olona ireo, ary avy taiza nihaviany hankatỳ aminao? Ary hoy Hezekia: Nankaty amiko avy tany an-tany lavitra izy, dia avy tany Babylona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy izy: Ka inona avy anefa no hitany tato ananonao? Ary hoy Hezekia: Izay rehetra an-tranoko dia efa hitany avokoa; tsy nisy zavatra tsy nasehoko azy ny ao amin''ny firaketako rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy Isaia tamin''i Hezekia: Henoy ny tenin''i Jehovah, Tompon''ny maro: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Indro, avy ny andro, ka ho entina ho any Babylona izay rehetra ao an-tranonao sy izay rehetra noharin''ny razanao ka voatahiry mandraka androany; eny, tsy hisy sisa hijanona inona na inona, hoy Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary na dia terakao aza dia hisy ho entiny koa, ka ho tandonaka
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ionoka
    marker-yv: yv-n
  - type: text
    text: ' any amin''ny lapan''ny mpanjakan''i Babylona ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy Hezekia tamin''Isaia: Tsara ny tenin''i Jehovah izay nolazainao. Ary hoy koa izy: Eny, hisy fiadanana amin''ny androko handry fahizay.'
