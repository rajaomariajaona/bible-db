document_id: ISA.39,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandraisan'i Hezekia ny iraky ny mpanjakan'i Babylona, sy ny teny nolazain'Isaia noho izany
  - type: text
    content: 'Tamin''izany andro izany no nampitondran''i Merodaka-baladana, zanak''i Baladana, mpanjakan''i Babylona, taratasy sy fanomezana ho an''i Hezekia; fa efa reny fa narary izy ka sitrana. '
  '2':
  - type: text
    content: Ary dia faly Hezekia noho izany ka nampiseho azy ny trano fitehirizany zava-tsoa, dia volafotsy sy volamena sy zava-manitra ary menaka tsara, sy ny trano fitehirizana ny fiadiany rehetra mbamin'izay rehetra tao amin'ny firaketany; tsy nisy zavatra tsy nasehon'i Hezekia azy, na ny tao an-tranony, na ny tao amin'ny fanjakany rehetra.
  '3':
  - type: text
    content: 'Dia nankany amin''i Hezekia mpanjaka mpaminany ka nanao taminy hoe: Ahoana no nolazain''ireo olona ireo, ary avy taiza nihaviany hankatỳ aminao? Ary hoy Hezekia: Nankaty amiko avy tany an-tany lavitra izy, dia avy tany Babylona. '
  '4':
  - type: text
    content: 'Dia hoy izy: Ka inona avy anefa no hitany tato ananonao? Ary hoy Hezekia: Izay rehetra an-tranoko dia efa hitany avokoa; tsy nisy zavatra tsy nasehoko azy ny ao amin''ny firaketako rehetra. '
  '5':
  - type: text
    content: 'Ary hoy Isaia tamin''i Hezekia: Henoy ny tenin''i Jehovah, Tompon''ny maro: '
  '6':
  - type: text
    content: 'Indro, avy ny andro, ka ho entina ho any Babylona izay rehetra ao an-tranonao sy izay rehetra noharin''ny razanao ka voatahiry mandraka androany; eny, tsy hisy sisa hijanona inona na inona, hoy Jehovah. '
  '7':
  - type: text
    content: Ary na dia terakao aza dia hisy ho entiny koa, ka ho tandonaka
  - type: note
    content: Heb. ionoka
  - type: text
    content: ' any amin''ny lapan''ny mpanjakan''i Babylona ireo. '
  '8':
  - type: text
    content: 'Dia hoy Hezekia tamin''Isaia: Tsara ny tenin''i Jehovah izay nolazainao. Ary hoy koa izy: Eny, hisy fiadanana amin''ny androko handry fahizay.'
