document_id: LEV.7,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary izao no lalàna ny amin''ny fanati-panonerana: masina dia masina izany. '
  '10':
  - type: text
    content: Fa ny fanatitra hohanina rehetra, izay voaharo diloilo, na ny maina, dia ho an'ny zanak'i Arona rehetra kosa, ka hiara-misalahy izy.
  '11':
  - type: text
    content: 'Ary izao no lalàna ny amin''ny fanati-pihavanana izay haterina ho an''i Jehovah: '
  '12':
  - type: text
    content: 'Raha misy manatitra izany ho fanati-pisaorana, dia izao no hateriny ho fanampiny: mofo izay tsy misy masirasira sady voaharo diloilo sy mofo manify tsy misy masirasira sady voahoso-diloilo ary mofo atao amin''ny koba tsara toto voaendy sady voaharo diloilo. '
  '13':
  - type: text
    content: 'Ary miaraka amin''ny mofo tsy misy masirasira dia mofo misy masirasira kosa no hateriny ho fanampin''ny fanati-pihavanana izay ataony ho fanati-pisaorana. '
  '14':
  - type: text
    content: 'Ary hangalany iray avy ny isam-panatitra ho fanatitra asandratra ho an''i Jehovah; ho an''ilay mpisorona manopy ny ran''ny fanati-pihavanana izany. '
  '15':
  - type: text
    content: 'Ary ny henan''ny fanati-pihavanana izay ataony ho fanati-pisaorana dia hohanina amin''ny andro anaterana azy; tsy hisy havela ho tra-maraina. '
  '16':
  - type: text
    content: 'Fa raha fanati-panalamboady na fanati-tsitrapo kosa no ateriny, dia amin''ny andro anaterany ny fanatiny no hihinanana azy, ary ampitson''iny no hihinanana izay ambiny. '
  '17':
  - type: text
    content: 'Fa ny sisa amin''ny henan''ny fanatitra dia hodorana amin''ny afo amin''ny andro fahatelo. '
  '18':
  - type: text
    content: 'Ary raha tahìny hihinanana amin''ny andro fahatelo ny henan''ny fanati-pihavanana, na dia kely aza, dia tsy horaisina na hisaina ho an''izay manatitra azy izany, fa fahavetavetana; ary ny olona izay mihinana amin''izany dia ho meloka. '
  '19':
  - type: text
    content: 'Ary na ny hena izay mikasika zava-maloto aza dia tsy hohanina, fa hodorana amin''ny afo; ary ny amin''ny hena, dia izay madio rehetra no mahazo mihinana azy; '
  '2':
  - type: text
    content: 'Eo amin''izay famonoana ny fanatitra dorana no hamonoana ny fanati-panonerana; ary ny rà dia hatopiny manodidina amin''ny lafin''ny alitara. '
  '20':
  - type: text
    content: 'fa ny olona izay misy fahalotoana, nefa mihinana hena avy amin''ny fanati-pihavanana, izay an''i Jehovah, dia hofongorana tsy ho amin''ny fireneny. '
  '21':
  - type: text
    content: 'Ary ny olona izay mikasika zava-maloto, na fahalotoan''olona, na biby maloto, na izay zava-betaveta maloto, ka mihinana amin''ny henan''ny fanati-pihavanana izay an''i Jehovah, dia hofongorana tsy ho amin''ny fireneny. '
  '22':
  - type: text
    content: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  '23':
  - type: text
    content: 'Mitenana amin''ny Zanak''Isiraely hoe: Aza mihinana sabora akory ianareo, na ny an''ny omby, na ny an''ny ondry, nany an''ny osy. '
  '24':
  - type: text
    content: 'Ary ny saboran''ny biby izay maty ho azy sy ny saboran''izay noviraviraim-biby dila azo atao amin''ny zavatra hafa ihany, fa aza mihinana azy ianareo. '
  '25':
  - type: text
    content: 'Fa izay rehetra mihinana saboran''ny biby fiompy, izay fanao fanatitra, atao amin''ny afo ho an''i Jehovah, dia hofongorana tsy ho amin''ny fireneny. '
  '26':
  - type: text
    content: 'Ary aza mihinana rà eny amin''izay rehetra itoeranareo, na ny an''ny vorona, na ny an''ny biby fiompy. '
  '27':
  - type: text
    content: Izay rehetra mihinana rà dia hofongorana tsy ho amin'ny fireneny.
  '28':
  - type: text
    content: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  '29':
  - type: text
    content: 'Mitenena amin''ny Zanak''Isiraely hoe: Izay manatitra ny fanati-pihavanany ho an''i Jehovah dia hitondra ny fanatiny ho an''i Jehovah avy amin''ny fanati-pihavanany. '
  '3':
  - type: text
    content: 'Ary dia hateriny avokoa ny hofany sy ny saborany rehetra, dia ny safodrorohany sy ny saboran-tsinainy '
  '30':
  - type: text
    content: 'Ny tànany ihany no hitondra ny fanatitra atao amin''ny afo ho an''i Jehovah; ny saborany mbamin''ny tratrany no ho entiny, ka ny tratrany dia hahevaheva ho fanatitra ahevaheva eo anatrehan''i Jehovah. '
  '31':
  - type: text
    content: 'Ary hodoran''ny mpisorona ho fofona eo ambonin''ny alitara ny saborany; fa ny tratrany kosa dia ho an''i Arona sy ireo zanany. '
  '32':
  - type: text
    content: 'Ary ny soroka ankavanana dia homenareo ny mpisorona ho fanatitra asandratra avy amin''ny fanati-pihavananareo. '
  '33':
  - type: text
    content: 'Ny anankiray amin''ny zanak''i Arona izay manatitra ny ran''ny fanati-pihavanana sy ny saborany no hanana ny soroka ankavanana ho anjarany. '
  '34':
  - type: text
    content: 'Fa ny tratra ahevaheva sy ny soroka asandrata dia efa nalaiko tamin''ny Zanak''Isiraely avy amin''ny fanati-pihavanany, ary nomeko ho an''i Arona mpisorona sy ny zanany, ho anjarany mandrakizay avy amin''ny Zanak''Isiraely. '
  '35':
  - type: text
    content: 'Izany no anjaran''i Arona sy ny zanany avy amin''ny fanatitra atao amin''ny afo ho an''i Jehovah, amin''ilay andro ampanakekeny azy mba ho mpisorona ho an''i Jehovah, '
  '36':
  - type: text
    content: 'dia izay nandidian''i Jehovah homena azy avy amin''ny Zanak''Isiraely amin''ilay andro anosorana azy, ho anjarany mandrakizay amin''ny taranany hatramin''ny fara mandimby. '
  '37':
  - type: text
    content: 'Izany no lalàna ny amin''ny fanatitra dorana sy ny fanatitra hohanina sy ny fanatitra noho ny ota sy ny fanati-panonerana sy ny fanati-panokanana ary ny fanati-pihavanana, '
  '38':
  - type: text
    content: izay nandidian'i Jehovah an'i Mosesy tao amin'ny tendrombohitra Sinay, tamin'ny andro izay nandidiany ny Zanak'Isiraely hanatitra ny fanatiny ho an'i Jehovah, tany an-efitr'i Sinay.
  '4':
  - type: text
    content: 'ary ny voany roa mbamin''ny fonom-boany, izay eo amin''ny takibany, ary ny ila-atiny lehibe; hatao indray manala amin''ny voany no fanaisony izany. '
  '5':
  - type: text
    content: 'Ary hodoran''ny mpisorona ho fofona eo ambonin''ny alitara ireo ho fanatitra atao amin''ny afo ho an''i Jehovah; dia fanati-panonerana izany. '
  '6':
  - type: text
    content: 'Ny lehilahy rehetra amin''ny mpisorona no mahazo mihinana izany; eo amin''izay fitoerana masina no hihinanany azy: masina dia masina izany. '
  '7':
  - type: text
    content: 'Ho tahaka ny fanatitra noho ny ota ny fanati-panonerana, ka lalàna iray no ho amin''izy roa: ho an''ny mpisorona izay manao fanavotana aminy izany. '
  '8':
  - type: text
    content: 'Ary ilay mpisorona manatitra ny fanatitra dorana izay aterin''ny olona dia hahazo ny hoditr''izany fanatitra dorana nateriny izany. '
  '9':
  - type: text
    content: 'Ary ny fanatitra hohanina rehetra izay voaendy am in''ny fanendasa-mofo sy izay rehetra atao amin''ny vilany fandrahoana, na amin''ny lapoely, dia ho an''ilay mpisorona manatitra azy. '
