document_id: PSA.114,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny horohoron'ny tany aman-danitra tamin'ny nanavotan'Andriamanitra ny olony tany Egypta
  - type: text
    content: 'Fony nivoaka avy tany Egypta ny Isiraely, Dia ny taranak''i Jakoba avy tany amin''ny firenena hafa fiteny, '
  '2':
  - type: text
    content: Joda no fitoerany masina, Isiraely no fanjakany.
  '3':
  - type: text
    content: 'Ny ranomasina nahita ka nandositra; Ary niorika Jordana. '
  '4':
  - type: text
    content: Ny tendrombohitra dia nifalihavanja tahaka ny ondrilahy, Ary ny havoana tahaka ny zanak'ondry.
  '5':
  - type: text
    content: 'Inona izato mahazo anao, ry ranomasina, no mandositra ianao? Ary ianao, ry Jordana, no miorika ianao? '
  '6':
  - type: text
    content: 'Ary ianareo tendrombohitra, no mifalihavanja tahaka ny ondrilahy; Ary ianareo havoana, tahaka ny zanak''ondry? '
  '7':
  - type: text
    content: 'Mihorohoroa eo anatrehan''ny Tompo, ry tany, Dia eo anatrehan''Andriamanitr''i Jakoba. '
  '8':
  - type: text
    content: Izay mampody ny vatolampy ho rano monina Ary ny afovato ho loharano.
