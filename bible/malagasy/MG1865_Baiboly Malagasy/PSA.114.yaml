document_id: PSA.114
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny horohoron'ny tany aman-danitra tamin'ny nanavotan'Andriamanitra ny olony tany Egypta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fony nivoaka avy tany Egypta ny Isiraely, Dia ny taranak''i Jakoba avy tany amin''ny firenena hafa fiteny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Joda no fitoerany masina, Isiraely no fanjakany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny ranomasina nahita ka nandositra; Ary niorika Jordana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny tendrombohitra dia nifalihavanja tahaka ny ondrilahy, Ary ny havoana tahaka ny zanak'ondry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Inona izato mahazo anao, ry ranomasina, no mandositra ianao? Ary ianao, ry Jordana, no miorika ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ianareo tendrombohitra, no mifalihavanja tahaka ny ondrilahy; Ary ianareo havoana, tahaka ny zanak''ondry? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mihorohoroa eo anatrehan''ny Tompo, ry tany, Dia eo anatrehan''Andriamanitr''i Jakoba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay mampody ny vatolampy ho rano monina Ary ny afovato ho loharano.
