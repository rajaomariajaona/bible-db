document_id: PSA.109,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'ny loza hanjo ny manao teny ratsy sy tia ozona
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho an''ny mpiventy hira. Salamo nataon''i Davida. RY Andriamanitra fidèrako ô, aza mangina Hianao, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka hirenireny mangataka ny zanany, Ary aoka hiremby lavitra ny tranony efa rava izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka ny mpampanàna vola hamandrika izay rehetra ananany; Ary aoka ny olon-kafa hifaoka ny vokatry ny asany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka tsy hisy haharitra hamindra fo aminy, Na hiantra ny zanany kamboty. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka ho fongora ny taranany; Ary aoka hovonoina amin''ny taranaka mandimby ny anarany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka hotsarovan''i Jehovah ny helo-drainy; Ary aoka tsy hovonoina ny helo-dreniny. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka ho eo anatrehan''i Jehovah mandrakariva izany, Ary hofoanany tsy ho eo ambonin''ny tany anie ny fahatsiarovana azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satria tsy mba nahatsiaro hamindra fo izy, Fa nanenjika ny ory sy ny malahelo Ary ny reraka am-po mba hahafaty azy; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tia ozona izy, ka nanody azy izany; Tsy tia indrafo izy, ka nanalavitra azy izany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nitafy ozona tahaka ny lambany izy, Ka niditra tao an-kibony tahaka ny rano izany, Ary tao amin''ny taolany tahaka ny diloilo; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia aoka ho tahaka ny lamba itafiany izany, Ary ho fisikinana isikinany mandrakariva. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nisoka-bava ny ratsy fanahy sy ny mpamitaka hamely ahy; Niteny ahy tamin''ny lela mandainga izy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany no famaliana avy amin'i Jehovah ho an'ny mpanohitra ahy, Dia izay manendrikendrika ahy.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Hianao, Jehovah Tompo ô, miasà ho ahy noho ny anaranao; Vonjeo aho, fa tsara ny famindram-ponao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa mahantra sy malahelo aho, Ary ny foko dia voatsindrona ato anatiko. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lasa tahaka ny aloka mihelina aho; Roahina tahaka ny valala aho. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa malemy ny lohaliko noho ny fifadian-kanina; Ary efa mihena ny hatavin''ny nofoko. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izaho dia tonga fandatsan''ireny; Mijery ahy izy ka mihifikifi-doha. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ampio aho Jehovah Andriamanitro ô; Vonjeo araka ny famindram-ponao aho; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary aoka ho fantany fa tananao izany; Hianao, Jehovah ô, no nanao izany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manozona izy ireo, fa Hianao kosa mitahy; Mitsanga-menatra izy, fa mifaly kosa ny mpanomponao. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mitafy henatra ny fahavaloko Ka misaron-kenatra tahaka ny lamba.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teny fankahalana no nanodidinany ahy; Ary niady tamiko tsy ahoan-tsy ahoana izy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hidera an''i Jehovah indrindra amin''ny vavako aho; Eny, eo amin''ny olona maro no hiderako Azy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa mitsangana eo an-kavanan'ny malahelo Izy Mba hamonjy azy amin'izay manameloka ny fanahiny.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fitiavako dia valiany fandrafiana; Fa izaho kosa dia mivavaka. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny soa nataoko novaliany ratsy, Ary ny fitiavako novaliany fankahalana.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Anendreo olona ratsy fanahy hanapaka azy; Ary aoka hisy mpanohitra
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: aoka Satana'
      marker-yv: yv-n
    - type: text
      text: ' hitsangana eo an-kavanany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha hotsaraina izy, dia aoka ho meloka, Ary aoka ny fivavahany ho tonga fahotana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka ho vitsy ny androny; Ary aoka ho lasan''olon-kafa ny anjara raharahany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka ho kamboty ny zanany; Ary aoka ho mpitondratena ny vadiny '
