document_id: 1SA.22,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nirenirenen'i Davida tany Joda sy Moaba, ary ny namonoan'i Saoly ny mpisorona maro
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary Davida niala teo ka nandositra nankany amin''ny zohin''i Adolama; ary nony nandre izany ny rahalahiny sy ny mpianakavin-drainy, dia nidina tany aminy ireo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary Ahimeleka nanontany ho azy tamin''i Jehovah sady nanome azy vatsy; ary nomeny azy koa ny sabatr''i Goliata Filistina. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary ny mpanjaka dia naniraka naka an''i Ahimeleka mpisorona, zanak''i Ahitoba, sy ny tarana-drainy rehetra, izay mpisorona, tao Noba; ka dia tonga tany amin''ny mpanjaka izy rehetra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary hoy Saoly: Mba mihainoa ianao, ry zanak''i Ahitoba. Ary izy namaly hoe: Inty aho, tompoko. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary hoy Saoly taminy: Nahoana ianareo no niray tetika hanohitra ahy, dia ianao sy ny zanak''i Jese, tamin''ilay nanomezanao azy mofo sy sabatra ary nanontanianao ho azy tamin''Andriamanitra hahatongavany ho mpanotrika ahy tahaka ny amin''izao anio izao? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary Ahimeleka namaly ny mpanjaka hoe: Iza moa amin''ny mpanomponao rehetra no mba mahatoky tahaka an''i Davida, izay vinanton''ny mpanjaka sady mpanolo-tsaina anao sy malaza ao an-tranonao? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary vao izay va no nanontaniako ho azy tamin''Andriamanitra? Sanatria ahy izany! Aoka ny mpanjaka tsy hanome tsiny ny mpanompony na ny tarana-draiko rehetra; fa ny mpanomponao tsy nahalala na inona na inona ny amin''izany rehetra izany, na kely na be. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa hoy ny mpanjaka: Hatao maty tokoa ianao, ry Ahimeleka, dia ianao sy ny tarana-drainao rehetra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary hoy ny mpanjaka tamin'ny mpiambina
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. mpihazakazaka
      marker-yv: yv-n
    - type: text
      text: ' izay teo anoloany: Mihodina, ka vonoy ny mpisoron''i Jehovah; fa ny tànan''ireo koa momba an''i Davida, satria fantany ihany fa nandositra izy, nefa tsy nambarany tamiko izany. Fa ny mpanompon''ny mpanjaka tsy nety naninjitra ny tànany hamely ny mpisoron''i Jehovah. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary hoy ny mpanjaka tamin''i Doega: Mihodina ianao, ka asio ny mpisorona. Ary Doega Edomita nihodina ka namely ny mpisorona, dia nahafaty olona dimy amby valo-polo izay nisalotra efoda rongony fotsy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Dia nasiany tamin'ny lelan-tsabatra koa Noba, tanànan'ny mpisorona, dia ny lehilahy sy ny vehivavy, ny ankizy madinika sy ny zaza minono, ny omby sy ny boriky ary ny ondry aman'osy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary izay mahantra rehetra sy izay mpitrosa rehetra ary izay manana alahelo am-po rehetra dia nivory tao aminy, ary izy no tonga mpifehy azy; ka dia tonga tokony ho efa-jato lahy ny tao aminy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary ny anankiray tamin''ny zanak''i Ahimeleka, zanak''i Ahitoba, Abiatara no anarany, dia afa-nandositra ka nanaraka an''i Davida. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary Abiatara nanambara tamin''i Davida ny namonoan''i Saoly ny mpisoron''i Jehovah. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary hoy Davida tamin''i Abiatara: Fantatro androtr''iny ihany fa tao Doega Edomita ka hilaza amin''i Saoly tokoa; koa izaho no anton''ny nahafaty ny olona rehetra tamin''ny tarana-drainao. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Tomoera etỳ amiko, ka aza matahotra; fa izay mikatsaka ny aiko no mikatsaka ny ainao koa; fa eto amiko no hahavoavonjy anao.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary Davida niala tao nankany Mizpa any Moaba ka nanao tamin''ny mpanjakan''i Moaba hoe: Masìna ianao, avelao ny raiko sy ny reniko ho avy atỳ hitoetra etỳ aminao ambara-pahafantatro izay hataon''Andriamanitra amiko. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary dia nentiny ho eo anatrehan''ny mpanjakan''i Moaba izy ireo ka nonina teo aminy tamin''ny andro rehetra nitoeran''i Davida tao amin''ny batery fiarovana. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary hoy Gada mpaminany tamin''i Davida: Aza mitoetra ao amin''ny batery fiarovana; fa mialà, ka mankanesa any amin''ny tanin''ny Joda. Dia nandeha Davida ka tonga tany an''ala Hareta. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary ren''i Saoly fa hita Davida sy ny olona nanaraka azy (nipetraka tao Gibea teo ambanin''ny hazo tamariska teo an-kavoana Saoly tamin''izay, sady nisy lefona teny an-tànany, ary ny mpanompony rehetra nitsangana teo anoloany), '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'dia hoy Saoly tamin''ny mpanompony izay teo anoloany: Henoy kely, ry taranak''i Benjamina: Moa ianareo rehetra koa mba homen''ny zanak''i Jese saha sy tanim-boaloboka, ary mba hataony mpifehy arivo sy mpifehy zato ianareo rehetra, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'no dia miray tetika hanohitra ahy ianareo rehetra, ka tsy nisy nanambara tamiko fa ny zanako nanao fanekena tamin''ny zanak''i Jese, ary tsy nisy nalahelo ahy akory ianareo, na nanambara tamiko fa ny zanako efa nanome fo ny mpanompoko ho mpanotrika ahy tahaka ny amin''izao anio izao? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary Doega Edomita, mpifehy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: izay nitsangana teo amin'''
      marker-yv: yv-n
    - type: text
      text: ' ny mpanompon''i Saoly, namaly ka nanao hoe: Nahita ny zanak''i Jese tonga tany Noba aho tany amin''i Ahimeleka, zanak''i Ahitoba. '
