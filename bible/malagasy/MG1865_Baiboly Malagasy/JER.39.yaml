document_id: JER.39,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanafahana an'i Jerosalema, sy ny nanjo an'i Zedekia, ary ny nanesorana an'i Jeremia tao an-davaka, sy ny teny nasain'Andriamanitra nolazainy tamin'i Ebeda-meleka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa afaka Jerosalema (tamin''ny volana fahafolo tamin''ny taona fahasivy nanjakan''i Zedekia, mpanjakan''ny Joda, no nahatongavan''i Nebokadnezara, mpanjakan''i Babylona, sy ny miaramilany rehetra hamely an''i Jerosalema ka nanao fahirano azy; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa ny olona malahelo izay tsy nanana na inona na inona kosa dia nisy ihany navelan''i Nebozaradana, lehiben''ny mpiambina, tao amin''ny tanin''ny Joda sady nomeny tanim-boaloboka sy tanimboly tamin''izany andro izany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Nebokadnezara, mpanjakan''i Babylona, nanome teny an''i Nebozaradana, lehiben''ny mpiambina, ny amin''i Jeremia nanao hoe: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ento izy, ka tandremo tsara, fa aza asian-dratsy fa araka izay lazainy aminao no ataovy aminy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Nebozaradana, lehiben''ny mpiambina, sy Nebosazbana, Raba-sarisa, sy Nergala-sarezera, Raba-magy, ary ny mpanapaky ny mpanjakan''i Babylona rehetra '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia naniraka haka an''i Jeremia teo amin''ny kianjan''ny trano fiambenana, ka natolony an''i Gedalia, zanak''i Ahikama, zanak''i Safana, mba ho entiny any an-trano izy, ka dia nitoetra tao amin''ny olona. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga tamin''i Jeremia ny tenin''i Jehovah, fony izy mbola voahazona tao amin''ny kianjan''ny trano fiambenana ihany, nanao hoe: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mandehana, ka lazao amin''i Ebeda-meleka Etiopiana hoe: Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Indro, hotoviko amin''ity tanàna ity ny teniko hahatonga loza, fa tsy soa; ary ho tanteraka eo imasonao izany amin''izany andro izany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa hovonjeko ianao amin''izany andro izany, hoy Jehovah, fa tsy mba hatolotra eo an-tànan''ny olona izay atahoranao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa hovonjeko tokoa ianao ka tsy holavon-tsabatra; eny, ny ainao no ho babonao, satria efa natoky Ahy, hoy Jehovah.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary nony tamin''ny andro fahasivy tamin''ny volana fahefatra tamin''ny taona fahiraika ambin''ny folo nanjakan''i Zedekia, dia nisy voabanga ny tanàna), '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia niditra ny mpanapaky ny mpanjakan''i Babylona rehetra ka nipetraka teo amin''ny vavahady ampovoany, dia Nergala-sarezera sy Samgarnebo sy Sarsekima. Raba-sarisa, sy Nergala-sarezera Raba-magy, mbamin''ny sisa rehetra amin''ny mpanapaky ny mpanjakan''i Babylona. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nahita ireo Zedekia, mpanjakan''ny Joda, sy ny miaramila rehetra, dia nandositra izy ka lasa nandeha alina niala tao an-tanàna, nahazo ny lalana mankamin''ny sahan''ny mpanjaka, tamin''ny vavahady eo anelanelan''ny manda roa; ary lasa nivoaka nankany amin''ny lalana mankeny amin''ny tani-hay izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny miaramilan''ny Kaldeana nanenjika azy ka nahatratra an''i Zedekia teny amin''ny tani-hay any Jeriko; ary nony azony izy, dia nentiny niakatra ho any amin''i Nebokadnezara, mpanjakan''i Babylona, tao Ribla tao amin''ny tany Hamata; ka dia notsarainy tao izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny zanakalahin''i Zedekia dia novonoin''ny mpanjakan''i Babylona tao Ribla teo imason-drainy; ary ny manan-kaja rehetra tamin''ny Joda koa dia novonoin''ny mpanjakan''i Babylona. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nopotsiriny ny mason''i Zedekia, dia nafatony tamin''ny gadra varahina izy ho entiny any Babylona. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nodoran''ny Kaldeana tamin''ny afo ny tranon''ny mpanjaka sy ny tranon''ny vahoaka, ary ny mandan''i Jerosalema noravany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny olona sisa tao an-tanàna sy izay efa nanatona azy ary ny vahoaka sisa koa dia nentin''i Nebozaradana, lehiben''ny mpiambina, ho babo tany Babylona. '
