document_id: EPH.4,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fananarana enti-mamporisika azy mba hadio fitondran-tena, ary tsy hanan-tsiny amin'ny toetry ny tokan-tranony
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ary noho izany izaho, mpifatotra noho ny amin
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. ao amin'
      marker-yv: yv-n
    - type: text
      text: '''ny Tompo, dia mangataka aminareo mba handeha miendrika ny fiantsoana izay niantsoana anareo, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Izay nidina, dia Izy koa no Ilay niakatra any ambonin''ny lanitra rehetra, hamenoany ny zavatra rehetra.) '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary Izy no nanome ny sasany ho Apostoly, ary ny sasany ho mpaminany, ary ny sasany ho evanjelista, ary ny sasany ho mpiandry sy mpampianatra, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ho fanatanterahana ny olona masina, ho amin'ny asan'ny fanompoana amin'ny fiangonana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. eklesia
      marker-yv: yv-n
    - type: text
      text: ', ho amin''ny fampandrosoana ny tenan''i Kristy, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'mandra-pahatongantsika rehetra ho amin''ny firaisan''ny finoana sy ny fahalalana tsara ny Zanak''Andriamanitra, ka ho lehilahy lehibe, mahatratra ny ohatry ny halehiben''ny fahafenoan''i Kristy; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'mba tsy ho zaza intsony isika, ka ahilangilana sy ampitambolimbolenin''ny rivotry ny fampianarana samy hafa rehetra amin''ny saim-petsy ataon''ny olona sy ny fihendreny hahatanteraka ny hevitry ny famitahana; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'fa mba hanaraka ny marina amin''ny fitiavana ka hitombo amin''ny ny zavatra rehetra ho amin''izay Loha, dia Kristy; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Izy no itomboan'ny tena rehetra (izay akambana sy ampiarahina tsara) noho ny fifanompoan'ny isan-tonony, araka ny fiàsan'izay rehetra momba azy amin'izay mety ho anjara-asany avy ka hampandrosoany ny tenany amin'ny fitiavana.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Koa izao no lazaiko sady ambarako ao amin''ny Tompo: ny tsy mba handehananareo intsony tahaka ny fandehan''ny jentilisa amin''ny fahafoanan''ny sainy; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'fa efa tonga maizin-tsaina sy olon-ko azy amin''ny fiainan''Andriamanitra ireny noho ny tsi-fahalalana ny anatiny, noho ny hamafin''ny fony, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'dia olona tsy mahalala henatra intsony ka nanolo-tena ho amin''ny fijejojejoana hanao izay fahalotoana rehetra amin''ny fieremana. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'amin''ny fanetren-tena rehetra sy ny fahalemem-panahy, amin''ny fahari-po mifandefitra amin''ny fitiavana, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa ianareo kosa, dia tsy mba toy izany no nianaranareo an''i Kristy, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'raha Izy tokoa no renareo ka tao aminy no nampianarana anareo, araka ny fahamarinana izay ao amin''i Jesosy, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: mba hialanareo ny toetrareo
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. olonareo
      marker-yv: yv-n
    - type: text
      text: ' taloha araka ny fitondran-tenanareo fahiny, izay mihasimba araka ny filan''ny fitaka; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'fa mba hohavaozina kosa ianareo amin''ny fanahin''ny sainareo, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ary mba hotafinareo ny toetra
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. olona
      marker-yv: yv-n
    - type: text
      text: ' vaovao, izay noforonina araka an''Andriamanitra amin''ny fahitsiana sy ny fahamasinana momba ny fahamarinana. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Koa esory ny lainga, ka samia milaza ny marina amin''ny namany avy ianareo rehetra; fa samy isan''ny momba ny tenan''ny namantsika avokoa isika. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Tezera, fa aza manota; ary aoka tsy ho tratry ny masoandro milentika ny fahatezeranareo. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Aza manome fitoerana ho an''ny devoly. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Aoka izay nangalatra tsy hangalatra intsony; fa aleo hikely aina ka hiasa izay tsara amin''ny tànany, mba hisy homeny izay tsy manana. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Aoka tsy haloaky ny vavanareo izay teny maloto, fa izay tsara ho fampandrosoana, araka izay tokony hanaovana, mba hahazoan''ny mihaino fahasoavana. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'mazoto mitana ny firaisana avy amin''ny Fanahy amin''ny fehim-pihavanana. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary aza mampalahelo ny Fanahy Masin''Andriamanitra, Izay nanisiana tombo-kase anareo ho amin''ny andro fanavotana. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Esory aminareo ny fo-lentika
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. fangidiana
      marker-yv: yv-n
    - type: text
      text: ' rehetra sy ny fahavinirana sy ny fahatezerana sy ny fitabatabana sy ny fitenenan-dratsy ary ny lolompo rehetra; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ary aoka samy halemy fanahy amin'ny namany avy ianareo, ka hifampiantra sy hifamela heloka, tahaka ny namelan'Andriamanitra ny helokareo ao amin'i Kristy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Iray ny tena, ary iray ny Fanahy, dia toy ny niantsoana anareo ho amin''ny fanantenana iray momba ny fiantsoana anareo; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'iray ny Tompo, iray ny finoana, iray ny batisa, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'iray Andriamanitra sady Rain''izy rehetra, Izay ambonin''izy rehetra sy manerana azy rehetra ary ao amin''izy rehetra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa samy nomena ny fahasoavana araka ny ohatry ny fanomezan''i Kristy avy isika rehetra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Koa izany no ilazany hoe: Raha niakatra ho any amin''ny avo Izy, dia nitondra olona maro ho babo Ka nanome fanomezana ho an''ny olona (Sal. 68. 18). '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: (Ary ny amin'ny hoe niakatra, inona moa izany, afa-tsy ny efa nidina
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: (nidina aloha)'
      marker-yv: yv-n
    - type: text
      text: ' ho any ambanin''ny tany koa? '
