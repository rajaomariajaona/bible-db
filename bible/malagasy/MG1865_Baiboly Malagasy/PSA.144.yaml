document_id: PSA.144,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an'Andriamanitra noho ny nanambinany ny mpanjaka, ary filazana ny mahatsinontsinona ny olombelona sy ny soa hitan'ny mpanompon'Andriamanitra
  - type: text
    content: 'Nataon''i Davida. Isaorana anie Jehovah Vatolampiko, Izay mampianatra ny tanako hamely Sy ny rantsan-tanako hiady, '
  '10':
  - type: text
    content: 'Izay manome famonjena ho an''ireo mpanjaka, Sady mamonjy an''i Davida mpanompony tsy ho voan''ny sabatra mandratra. '
  '11':
  - type: text
    content: 'Afaho aho, ka vonjeo amin''ny tanan''ny hafa firenena, Izay miteny zava-poana amin''ny vavany, Ary ny tànany ankavanana dia tanana ankavanana mamitaka; '
  '12':
  - type: text
    content: 'Mba ho tahaka ny zava-maniry maroroka ny zanakai-lahy, Ary ho tahaka ny vato fehizoro voasoratra tsara toy ny fomban''ny lapan''andriana ny zanakai-vavy. '
  '13':
  - type: text
    content: 'Ho feno ny trano fitehirizanay, ka hisy vokatra betsaka samy hafa karazana; Hiteraka arivoarivo sy alinalina ny ondrinay any an-tsahanay; '
  '14':
  - type: text
    content: 'Hahazaka be ny ombinay, Ary tsy hisy ho rava, na ho lasan-ko babo, Sady tsy hisy fitarainana any an-dalambenay. '
  '15':
  - type: text
    content: Sambatra ny firenena izay tahaka izany; Eny, sambatra ny firenena izay manana an'i Jehovah ho Andriamaniny.
  '2':
  - type: text
    content: Izay Mpiantra sy batery fiarovana ho ahy sady fiarovana avo sy Mpanafaka ahy, Ary ampingako sy fialofako, Izay mahafolaka ny vahoakako hanoa ahy
  '3':
  - type: text
    content: Jehovah ô, inona ny olona, no iahianao
  - type: note
    content: Heb. ahafantaranao
  - type: text
    content: ' azy? Ary ny zanak''olombelona, no iheveranao azy? '
  '4':
  - type: text
    content: 'Ny olona dia tahaka ny zava-poana, Ny androny dia tahaka ny aloka mihelina. '
  '5':
  - type: text
    content: 'Jehovah ô, aondreho ny lanitrao, ka midina; Tendreo ny tendrombohitra, dia hidonaka ireny. '
  '6':
  - type: text
    content: 'Ampitselatselaro ny helatra, ka ampielezo ireo; Alefao ny zana-tsipìkanao, ka ampifanaritaho ireo; '
  '7':
  - type: text
    content: 'Ahinjiro avy any ambony ny tananao; Afaho aho, ka vonjeo amin''ny rano be, Dia amin''ny tanan''ny hafa firenena, '
  '8':
  - type: text
    content: Izay miteny zava-poana amin'ny vavany, Ary ny tànany ankavanana dia tanana ankavanana mamitaka.
  '9':
  - type: text
    content: 'Andriamanitra ô, hihira fihiram-baovao ho Anao aho; Amin''ny valiha tory folo no hankalazako Anao, '
