document_id: ZEC.11,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny hihavian'ny loza, ary ny hahafoizana ny ondrin'i Jehovah noho ny fandavany Azy, sy ny hanolorana ireny ho amin'ny mpiandry adala,
  - type: text
    content: 'Vohay ny varavaranao, ry Libanona ô! Handevonan''ny afo ny sederanao '
  '10':
  - type: text
    content: 'Ary noraisiko ny tehiko Fahasoavana ka notapahiko, mba hanafoanako ny fanekena izay efa nataoko tamin''ny firenena rehetra. '
  '11':
  - type: text
    content: 'Ary tapaka tamin''izany andro izany iny, ka dia fantatry ny ondry mahantra, izay nitandrina ny teniko, fa tenin''i Jehovah izany. '
  '12':
  - type: text
    content: 'Dia hoy izaho taminy: Raha tsara eo imasonareo, dia omeo ahy ny karamako; fa raha tsy izany, dia aoka ihany. Ary dia nolanjainy ny karamako, ka sekely volafotsy telo-polo. '
  '13':
  - type: text
    content: 'Ary hoy Jehovah tamiko: Atsipazo amin''ny mpanefy tanimanga izany vola be nanombanany Ahy izany! Dia noraisiko ny sekely volafotsy telo-polo ka natsipiko tamin''ny mpanefy tanimanga tao an-tranon''i Jehovah. '
  '14':
  - type: text
    content: 'Dia notapahiko koa ilay tehiko anankiray Fikambanana, hanafoanako ny firahalahian''i Joda sy Isiraely. '
  '15':
  - type: text
    content: 'Ary hoy Jehovah tamiko: Alao ho anao koa ny tehin''ny mpiandry ondry adala. '
  '16':
  - type: text
    content: Fa, indro, Izaho hanangana mpiandry amin'ny tany, izay tsy hamangy ny naringana, na hitady ny niely, na hanasitrana ny naratra, na hiandry izay mbola matanjaka
  - type: note
    content: heb. mijoro tsara
  - type: text
    content: '; fa hohaniny ny nofon''ny matavy sady helakelahiny ny kitrony. '
  '17':
  - type: text
    content: Lozan'ny mpiandry ondry tsy mahomby izay mandao ny ondry! Ny sabatra no hanely ny sandriny sy ny masony ankavanana; halazo tokoa ny sandriny, ary ho jamba tokoa ny masony ankavanana.
  '2':
  - type: text
    content: 'Midradradradra, ry hazo kypreso! Fa efa nianjera ny sedera, Eny, fongotra ireo avo be; Midradradradrà, ianareo ôka any Basana! Fa ripaka ny ala mikirindro '
  '3':
  - type: text
    content: Injay! fidradradradran'ny mpiandry ondry! Fa rava ny voninahiny; Injay! fieron'ny liona tanora! Fa rava ny kirihitrala eny amoron
  - type: note
    content: heb. reharehany
  - type: text
    content: '''i Jordana'
  '4':
  - type: text
    content: 'Izao no lazain''i Jehovah Andriamanitra: Andraso ny ondry izay hovonoina, '
  '5':
  - type: text
    content: dia ireo vonoin'ny tompony
  - type: note
    content: 'na: izay nividy azy'
  - type: text
    content: ' nefa tsy ananany heloka'
  - type: note
    content: 'na: nefa tsy atao ho meloka ireny'
  - type: text
    content: '; ary ny mivarotra azy manao hoe: Isaorana anie Jehovah, fa manan-karena aho; ary ny mpiandry azy koa dia tsy miantra azy '
  '6':
  - type: text
    content: 'Fa tsy hiantra ny mponina amin''ny tany intsony Aho, hoy Jehovah; fa, indro, Izaho dia hanolotra ny olona samy ho eo an-tànan''ny namany sy samy ho eo an-tanan''ny mpanjakany avy; ary hamely ny tany ireo, nefa tsy mba hanafaka amin''ny tànany Aho. '
  '7':
  - type: text
    content: 'Ary niandry ny ondry izay hovonoina Aho, dia izay ondry mahantra. Ary naka tehina roa ho Ahy Aho, ny iray nataoko hoe Fahasoavana, ary ny iray kosa nataoko hoe Fikambanana; ary nandrasako ny ondry. '
  '8':
  - type: text
    content: Ary nandringana ny mpiandry ondry telo
  - type: note
    content: 'na: telo amin''ireo mpiandry ireo'
  - type: text
    content: ' Aho tamin''ny iray volana, fa tsy nahatsindry fo taminy intsony, sady tofoka Ahy ny fanahiny. '
  '9':
  - type: text
    content: 'Dia hoy Izaho: Tsy hiandry anareo Aho: izay ho faty dia aoka ho faty, ary izay ho ringana dia aoka ho ringana, ary ny sisa dia aoka samy hihinana ny nofon''ny namany avy. '
