document_id: PSA.126,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fifalian'ny efa nampodin'i Jehovah, sy fifonana ho an'izay mbola babo
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fihirana fiakarana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Fihirana misy hevitra ambaratonga'
      marker-yv: yv-n
    - type: text
      text: '. Fony Jehovah nampody an''i Ziona avy tamin''ny fahababoany, Dia tahaka izay nanonofy isika. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fahizay dia feno hehy ny vavantsika Sy fihobiana ny lelantsika; Dia natao tany amin''ny Jentilisa hoe: Zava-dehibe no nataon''i Jehovah ho an''ireny. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, zava-dehibe no nataon'i Jehovah ho antsika, Ka dia faly isika.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tanteraho, Jehovah ô, ny ham-podiana anay avy amin''ny fahababoana, Tahaka ny fiverenan''ny riaka any amin''ny tany atsimo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay mamafy am-pitomaniana Dia hijinja am-pifaliana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mandeha mitomany mitondra ny voa afafiny izy, Fa hiverina mitondra ny amboarany amin'ny fihobiana kosa.
