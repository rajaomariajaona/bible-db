document_id: PSA.126,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fifalian'ny efa nampodin'i Jehovah, sy fifonana ho an'izay mbola babo
  - type: text
    content: Fihirana fiakarana
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga'
  - type: text
    content: '. Fony Jehovah nampody an''i Ziona avy tamin''ny fahababoany, Dia tahaka izay nanonofy isika. '
  '2':
  - type: text
    content: 'Fahizay dia feno hehy ny vavantsika Sy fihobiana ny lelantsika; Dia natao tany amin''ny Jentilisa hoe: Zava-dehibe no nataon''i Jehovah ho an''ireny. '
  '3':
  - type: text
    content: Eny, zava-dehibe no nataon'i Jehovah ho antsika, Ka dia faly isika.
  '4':
  - type: text
    content: 'Tanteraho, Jehovah ô, ny ham-podiana anay avy amin''ny fahababoana, Tahaka ny fiverenan''ny riaka any amin''ny tany atsimo. '
  '5':
  - type: text
    content: 'Izay mamafy am-pitomaniana Dia hijinja am-pifaliana. '
  '6':
  - type: text
    content: Mandeha mitomany mitondra ny voa afafiny izy, Fa hiverina mitondra ny amboarany amin'ny fihobiana kosa.
