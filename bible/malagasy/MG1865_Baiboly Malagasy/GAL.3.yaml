document_id: GAL.3,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny famonjena sy ny fahafahan'ny mino an'i Kristy ampitahaina amin'ny fahamelohana sy ny fahandevozan'izay miankina amin'ny lalàna
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ry Galatiana adala, iza no nanimba
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. mamosavy
      marker-yv: yv-n
    - type: text
      text: ' anareo; kanefa teo imasonareo indrindra no nanehoana marimarina an''i Jesosy Kristy voahombo tamin''ny hazo fijaliana? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izay rehetra amin''ny asan''ny lalàna dia eo ambanin''ny fanozonana; fa voasoratra hoe: Voaozona izay rehetra tsy maharitra mankatò ny zavatra rehetra voasoratra ao amin''ny bokin''ny lalàna (Deo. 27. 26). '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hita marimarina fa amin'ny lalàna dia tsy misy olona hamarinina eo anatrehan'Andriamanitra ; fa ny marina amin'ny finoana no ho velona
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ny marina ho velon''ny finoana'
      marker-yv: yv-n
    - type: text
      text: ' (Hab. 2. 4). '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny lalàna tsy araka ny finoana; fa izay mahatandrina izany no ho velona aminy (Lev. 18. 5). '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kristy nanavotra anay tamin''ny ozon''ny lalàna, satria tonga voaozona hamonjy anay Izy; fa voasoratra hoe : Voaozona izay rehetra mihantona amin''ny hazo (Deo. 21. 23), '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba ho tonga amin''ny jentilisa ny fitahiana an''i Abrahama ao amin''i Kristy Jesosy, ary mba horaisintsika amin''ny finoana ny teny fikasana ny amin''ny Fanahy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ry rahalahy - miteny araka ny fanaon'ny olona aho - na dia ny fanekena
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: didim-pananana'
      marker-yv: yv-n
    - type: text
      text: ' ataon''olona ihany aza, rehefa vita mafy, dia tsy fanao ny manatsoaka na manampy izany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin''i Abrahama sy ny taranany no nilazana ny teny fikasana. Tsy lazainy hoe: Ary ho an''ny taranaka, toy ny milaza ny maro; fa toy ny milaza ny anankiray, ary ho an''ny taranakao (Gen. 22. 18), dia Kristy izany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no lazaiko: Ny fanekena izay nataon''Andriamanitra mafy fahiny dia tsy tsoahan''ny lalàna, izay vao natao telo-polo amby efa-jato taona tato aoriana, hahafoana ny teny fikasana.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha avy amin'ny lalàna ny lova, dia tsy avy amin'ny teny fikasana intsony; nefa tamin'i Abrahama dia teny fikasana no nanomezan'Andriamanitra azy.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Inona ary ny lalàna ? Nanampy noho ny fahadisoana izy ambara-pihavin''ny taranaka izay nomena ny teny fikasana; ary nalahatr''anjely teo an-tànan''ny mpanalalana izany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao ihany no tiako holazainareo amiko: Moa ny asan''ny lalàna va no nandraisanareo ny Fanahy, sa ny fitoriana ny finoana'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fandrenesana amin''ny finoana'
      marker-yv: yv-n
    - type: text
      text: '? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpanalalana dia tsy an''ny irery, fa Andriamanitra dia iray ihany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka moa manohitra ny teny fikasan''Andriamanitra va ny lalàna? Sanatria izany! Fa raha nisy lalàna mahavelona nomena, dia avy tamin''ny lalàna tokoa ny fahamarinana '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny Soratra Masina efa nanidy azy rehetra teo amin''ny fahotana, mba homena ny mino ny teny fikasana noho ny finoana an i Jesosy Kristy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa fony tsy mbola tonga ny finoana, dia voambina tao ambanin''ny lalàna isika ka voahidy ho amin''ny finoana izay efa haseho ato aoriana. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ny lalàna dia mpitaiza antsika ho amin''i Kristy, mba hohamarinina noho ny finoana isika. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa rehefa tonga ny finoana, dia tsy fehezin''izay mpitaiza intsony isika. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ianareo rehetra dia zanak''Andriamanitra amin''ny finoana an''i Kristy Jesosy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa na iza na iza ianareo no natao batisa ho an''i Kristy dia nitafy an''i Kristy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy misy intsony na Jiosy na Grika, na andevo na tsy andevo, na lahy sy vavy; fa iray ihany ianareo rehetra ao amin''i Kristy Jesosy. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha an'i Kristy ianareo, dia taranak'i Abrahama sy mpandova araka ny teny fikasana.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Adala toy izany va ianareo? Rehefa nanomboka tamin''ny Fanahy ianareo, dia hahatanteraka amin''ny nofo va ankehitriny? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa izany zavatra be izany dia efa niaretanareo foana, raha dia foana tokoa izany? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Izay manome anareo ny Fanahy sy mahavita asa lehibe eo aminareo, moa avy amin'ny asan'ny lalàna va izany, sa avy amin'ny fitoriana ny finoana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fandrenesana amin''ny finoana'
      marker-yv: yv-n
    - type: text
      text: '? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tahaka an''i Abrahama nino an''Andriamanitra, ka dia nasaina ho fahamarinany izany (Gen. 15. 6). '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa fantaro fa izay amin''ny finoana no zanak''i Abrahama. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary satria hitan''ny Soratra Masina rahateo fa amin''ny finoana no anamarinan''Andriamanitra ny jentilisa, dia nitory ny filazantsara tamin''i Abrahama rahateo izy, nanao hoe: Aminao no hitahiana ny firenena rehetra (Gen. 12. 3); '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka dia izay amin''ny finoana notahina mbamin''i Abrahama mpino. '
