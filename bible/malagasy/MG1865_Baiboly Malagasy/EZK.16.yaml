document_id: EZK.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nivadihan'i Jerosalema, sy ny nahafoizany an'i Jehovah, ary ny hamaliany azy amin'izany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tonga tamiko indray ny tenin''i Jehovah nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry zanak''olona, ampahafantaro an''i Jerosalema ny fahavetavetany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka ataovy hoe: Izao no lazain''i Jehovah Tompo amin''i Jerosalema: Ny tany Kanana no nahaterahanao sy nahabe anao; Amorita no rainao, ary Hetita no reninao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny amin''ny nahaterahanao, dia tsy voatapaka akory ny tadim-poitrao tamin''ny andro nahaterahanao, ary tsy voampandro tamin''ny rano ianao, na voahosotra sira, na voahodidina lamban-jaza akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tsy nisy maso niantra anao hanao izany aminao, na dia iray akory amin'ireo zavatra ireo aza, mba hamindra fo aminao; fa nariana tany an-tsaha ianao, satria natao ho zava-maharikoriko ianao tamin'ny andro nahaterahanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary raha nandalo Aho ka nahita anao nihosinkosina teo amin''ny rànao, dia hoy Izaho taminao, raha mbola tamin''ny rànao ianao: Ho velona anie ianao; eny, hoy Izaho taminao, raha mbola tamin''ny rànao ianao: Ho velona anie ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Efa nataoko alinalina, toy ny zava-maniry any an-tsaha, ny isanao, ka nitombo sy nihalehibe ary tonga tsara tarehy tokoa ianao; naniry nono ianao sady naniry volo, nefa mbola nitanjaka sy nihanjahanja ihany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary raha nandalo Aho ka nijery anao, dia hitako fa izay no fotoanao, dia ny fotoam-pitiavana: ary narakotro anao ny lambako, ka nosaronako ny fitanjahanao; eny, nianiana taminao Aho ka nanao fanekena taminao, hoy Jehovah Tompo, ka dia efa Ahy ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nampandroiko rano ianao, eny, nosasako tsara ho afaka tamin''ny rànao, dia nohosorako diloilo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Notafiako lamba misoratsoratra koa ianao sy nokiraroako hoditakasy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Hoditra voasoka ho menamena. na hodi-biby tsy fantatra
    marker-yv: yv-n
  - type: text
    text: ', ary nampisikiniko rongony fotsy madinika sy notafiako amparasily. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Noravahako firavaka koa ianao, ka nasiako haba ny tananao ary rojo ny vozonao '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nasiako kavina ny oronao sy ny sofinao ary satro-boninahitra tsara tarehy ny lohanao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ka dia niravaka volamena sy volafotsy ianao, ary rongony fotsy madinika sy amparasily ary lamba misoratsoratra ny fitafianao; koba tsara toto sy tantely ary diloilo no fihinanao; ary efa nihatsara tarehy dia nihatsara tarehy ianao sady nambinina ho miendrik''andriana '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary dia niely tany amin''ny jentilisa aza ny lazanao noho ny hatsaran-tarehinao; fa tanteraka izany noho ny voninahitro izay nataoko taminao, hoy Jehovah Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: kanjo natoky ny hatsaran-tarehinao ianao ka nijangajanga noho ny lazanao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb, anarana
    marker-yv: yv-n
  - type: text
    text: ' sady nanaram-po nijangajanga tamin''ny mpandalo rehetra, ka nafoy ho azy izany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nangalanao ny fitafianao, dia nanaovanao fitoerana avo ho anao ka noravahanao sora-damba, ka nijangajanga teo aminy ianao; dia zavatra izay tsy tokony hiseho na hisy akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nalainao koa ny firavakao tamin''ny volamenako sy ny volafotsiko, izay nomeko anao, dia nataonao sarin-dehilahy ho anao ka nijangajanganao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'nalainao koa ny fitafianao misoratsoratra ka natatinao ireo; ary ny diloiloko sy ny ditin-kazo manitro dia napetrakao teo anoloany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ny haniko izay nomeko anao koa, dia ny koba tsara toto sy ny diloilo ary ny tantely, izay nafahako anao, dia napetrakao teo anoloan''ireo ho hanitra ankasitrahana; teo tokoa izany, hoy Jehovah Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nentinao ny zanakao-lahy sy ny zanakao-vavy, izay naterakao ho Ahy, dia novonoinao ho fanatitra ho an''ireo mba hohanina. Moa zavatra kely va izany fijangajanganao izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary novonoinao ny zanakao, fa natolotrao ka nampandehaninao namaky ny afo ho an''ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary tamin''ny fahavetavetanao sy ny fijangajanganao rehetra dia tsy nahatsiaro ny andro fahakelezanao ianao, fony ianao nitanjaka sy nihanjahanja sady nihosinkosina teo amin''ny rànao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary rehefa vitanao izany faharatsianao rehetra izany (lozanao! lozanao! hoy Jehovah Tompo), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'dia nanao trano fijangajangana ho anao ianao sady nanao fitoerana avo ho anao teny an-kalalahana rehetra teny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary teny an-tsampanan-dalana rehetra no nanaovanao ny fitoerana avonao, ary novetavetainao ny hatsaran-tarehinao, ka nabahanao ho amin''ny mpandalo rehetra ny tongotrao, ary nampitomboinao ny fijangajanganao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Hianao efa nijangajanga tamin''ny zanak''i Egypta be nofo izay mifanila fonenana aminao; ary nampitomboinao ny fijangajanganao ka nampahatezitra Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary, indro, nahinjitro taminao ny tanako. ka nahenako ny anjara-haninao, ary natolotro ho amin''ny sitrapon''izay mankahala anao ianao, dia ny zanakavavin''ny Filistina, izay menatra noho ny fahavetavetana fanaonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary nijangajanga tamin''ny zanak''i Asyria koa ianao noho ny tsi-fahafaham-ponao; eny, nijangajanga taminy ianao, nefa mbola tsy afa-po ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary mbola nampandrosoinao ihany ny fijangajanganao hatrany amin'ny tanin'ny mpandranto
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Heb tany Kanana: izaho xxvv 4'
    marker-yv: yv-n
  - type: text
    text: '. Dia hatrany Kaldea; fa na tia tamin''izany aza dia mbola tsy afa-po ihany ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Akory ny fahamaimain''ny fonao! hoy Jehovah Tompo, tamin''ny nanaovanao ireo rehetra ireo, dia ny fanaon''ny janga tsivalahara! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Tamin''ny nanaovanao ny trano fijangajanganao teny an-tsampanan-dalana rehetra sy ny nanaovanao ny fitoerana avonao teny an-kalalahana rehetra dia tsy mba tahaka ny vehivavy janga ianao. satria tsy nahoanao akory izay tangy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ny vadin''olona mijangajanga dia maka olon-kafa ho solon''ny vadiny! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Sy vehivavy janga rehetra dia omen-tangy; fa ianao kosa manangy ireo lehilahinao rehetra sady manome azy fanambatambazana hanatonan''ny ny manodidina rehetra anao mba hijangajangany aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary hafa noho ny amin''ny vehivavy sasany mihitsy ny fanaonao tamin''ny fijangajanganao, fa tsy nisy nanaraka anao hijangajanga taminao; eny, satria nanome tangy ianao, fa tsy mba nomena, dia izany indrindra no mahahafa anao '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Koa mihainoa ny tenin''i Jehovah. ry kala janga: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Izao no lazain''i Jehovah Tompo: Noho ny nandanianao volabe'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. nanidinanao varahina
    marker-yv: yv-n
  - type: text
    text: ' sy ny nampisehoana ny fitanjahanao tamin''ny nijangajanganao tamin''ireny lehilahinao sy ny sampinao rehetra. izay fahavetavetanao. ary noho ny ran''ny zanakao izay naterinao ho an''ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'dia, indro, hovoriko ireny lehilahinao rehetra ireny, izay mankamany anao sy izay tianao rehetra mbamin''ireny rehetra izay halanao koa, eny hovoriko avy amin''ny manodidina ireny mba hamely anao, ka hampisehoiko aminy ny fitanjahanao, dia hahita ny fitanjahanao rehetra izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ary hotsaraiko ianao araka ny fitsara vehivavy mijangajanga sy izay mandatsa-drà, ka halatsako ny rànao noho ny fahatezerana sy ny fahasaro-piaro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia hatolotro ho eny an-tànan''ireny ianao, ka harodany ny trano fijangajanganao, ary horavany ny fitoerana avonao; dia hendahany koa ny fitafianao, ary hesoriny ny firavakao soa, ka havelany hitanjaka sy hiboridana ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia hitondra vahoaka maro be hiakatra hamely anao koa izy ka hotorahany vato sady hotetitetehiny amin''ny sabany ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary hodorany amin''ny afo ny tranonao, ka hotanterahiny eo imason''ny vehivavy maro ny famaliana anao ary hatsahatro tsy hijangajanga ianao ka tsy hanangy intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Toy izany no hialako fo aminao, ary ho afaka ny fahasaro-piaroko aminao, dia hionona Aho ka tsy ho tezitra intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Noho ny tsy nahatsiarovanao ny andro fahakelezanao, fa niempo nanohitra Ahy tamin'ireo rehetra ireo ianao, dia; indro, ny nataonao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lalanao
    marker-yv: yv-n
  - type: text
    text: ' ihany no hatsingeriko ho eo an-dohanao, hoy Jehovah Tompo. Ary tsy nanao izany ratsy izany ho fanampin''ny fahavetavetanao rehetra va ianao'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Fa raha tsy izany, dia Izao indray no hanao ratsy miohatra noho ny fahavetavetanao rehetra'
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Indro, ny mpanao ohabolana rehetra dia hamely anao amin''izao ohabolana izao hoe: Manahaka an-dreniny ihany ny zananivavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Hianao dia zanakavavin-dreninao, izay mahafoy ny vadiny aman-janany; ary ianao dia rahavavin''ireo rahavavinao, izay nahafoy ny vadiny aman-janany; Hetita no reninareo, ary Amorita no rainareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Samaria no zokinao-vavy, dia izy sy ny zananivavy izay monina eo an-kavianao; ary ny zandrinao vavy, izay monina amin''ny an-kavananao, dia Sodoma sy ny zananivavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Nefa tsy araka ny alehan''ireo ihany no nalehanao, ary tsy araka ny fahavetavetan''ireo ihany no nataonao; fa hoatra ny zavatra kely loatra izany, ka dia nanao ratsy mihoatra noho ireo indray ianao tamin''ny nalehanao rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Raha velona koa Aho, hoy Jehovah Tompo, na dia Sodoma rahavavinao sy ny zananivavy aza tsy mba nanao tahaka ny nataonao sy ny zanakao-vavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Indro, izao no helok''i Sodoma rahavavinao: Avonavona sy fahabetsahan-kanina ary fahatokiam-poana no tao aminy sy tao amin''ny zananivavy, ary tsy mba nitantana ny malahelo sy ny mahantra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Niavonavona izy ka nanao fahavetavetana teo anatrehako; ary nony nahita izany Aho, dia nanaisotra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Ary tsy ampy antsasaky ny fahotanao ny nataon''i Samaria; fa ianao efa nampitombo ny fahavetavetanao mihoatra noho izy, ary nampiseho ny rahavavinao ho toa marina indray tamin''ny fahavetave-tanao rehetra izay nataonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Hianao koa dia aoka hitondra ny henatrao araka ny efa nitsaranao ny rahavavinao. Noho ny fahotanao izay nahatonga anao ho vetaveta mihoatra noho ireo, ka dia miseho ho toa marina noho ianao izy, eny, menara koa ianao, ka mitondrà ny henatrao noho ny nampisehoanao ny rahavavinao ho toa marina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Ary hampodiko avy amin''ny fahababoana ireny, dia Sodoma sy ny zananivavy, ary Samaria sy ny zananivavy mbamin''izay olonao voababo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: mba hitondranao ny henatrao sy hangaihaizanao noho izay rehetra nataonao amin'ny hampiononanao azy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tamin''ny nampiononanao azy'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Ary ny rahavavinao, dia Sodoma sy ny zananivavy, dia hody amin''ny toetrany taloha, ary Samaria sy ny zananivavy dia hody amin''ny toetrany taloha, ary ianao sy ny zanakaovavy dia hody amin''ny toetrareo taloha koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Nefa tsy mbola mba notononin''ny vavanao akory ny nanjo an''i Sodoma rahavavinao tamin''ny andro niavonavonanao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'fony tsy mbola niseho ny faharatsianao, toy ny tamin''ny andro nandatsan''ny zanakavavin''i Syria sy izay rehetra manodidina azy ary ny zanakavavin''ny Filistina, izay namingavinga anao manodidina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Ny faharatsianao sy ny fahavetavetanao no ho entinao, hoy Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Fa izao no lazain''i Jehovah Tompo: Araka ny nataonao ihany no hataoko aminao, izay namingavinga ny fianianana ka nivadika ny fanekena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Nefa hotsarovako ny fanekena nataoko taminao, tamin''ny andro fahakelezanao, ka hanorina fanekena mandrakizay aminao Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Dia hotsarovanao ny nalehanao, ka ho menatra ianao, raha mandray ireo rahavavinao, dia ny zokinao sy ny zandrinao; ka homeko ho zanakao-vavy ireo, na dia tsy mba isan''ilay nanaovako fanekena taminao aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Izaho hanorina ny fanekeko aminao, ka dia ho fantatrao fa Izaho no Jehovah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: mba hahatsiarovanao sy hangaihainao ary tsy hiloahanao vava intsony noho ny henatrao, raha mamela ny helokao ny amin'ny nataonao rehetra Aho, hoy Jehovah Tompo.
