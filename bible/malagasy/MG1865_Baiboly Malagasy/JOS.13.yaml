document_id: JOS.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandidian'Andriamanitra an'i Josoa hizara ny tany ary filazana ny anjara efa nomena ny firenena roa sy sasany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Josoa dia efa zoki-olona sady nandroso fahanterana, dia hoy Jehovah taminy: Efa zoki-olona ianao ka mandroso fahanterana, ary be dia be ny tany sisa tsy mbola azo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no tany sisa tsy mbola azo: Ny tany rehetra an''ny Filistina sy ny Gesorita rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'hatrany Sihora, izay atsinanan''i Egypta, ka hatramin''ny fari-tanin''i Elzrona eo avaratra, izay atao ho an''ny Kananita, ireo andriana dimy amin''ny Filistina dia ny Gazita sy ny Asdodita sy ny Askelonita sy ny Gatita sy ny Ekronita ary ny Avita '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'any atsimo, dia ny tanin''ny Kananita rehetra sy Meara, izay an''ny Sidoniana, hatrany Afeka ka hatramin''ny fari-tanin''ny Amorita, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary ny tanin''ny Gebalita sy Libanona rehetra any atsinanana, hatrany Bala-gada eo ambodin''ny tendrombohitra Hermona ka hatrany akaikin''i Hamata, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary ny mponina rehetra any amin''ny tany havoana hatrany Libanona ka hatrany Misrefota-maima. dia ny Sidoniana rehetra, Izaho no handroaka kanefa zarao amin''ny filokana ho lovan''ny Zanak''Isiraely izy araka izay efa nandidiako anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ankehitriny zarao izao tany izao ho lovan''ny firenena sivy sy ny antsasaky ny firenen''i Manase. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary niaraka tamin''ireo koa no nahazoan''ny Robenita sy ny Gadita ny lovany, dia ilay nomen''i Mosesy azy any an-dafy atsinanan''i Jordana, araka izay nomen''i Mosesy, mpanompon''i Jehovah, azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'dia hatrany Aroera, izay eo amoron''ny lohasahan-driaka Arnona, ary ny tanàna izay eo afovoan''ny lohasaha sy ny tany lemaka rehetra any Medeba ka hatrany Dibona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ary ny tanàna rehetra izay an''i Sihona, mpanjakan''ny Amorita, izay nanjaka tany Hesbona, hatramin''ny faritanin''ny taranak''i Amona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ary Gileada sy ny tanin''ny Gesorita sy ny Makatita sy ny tendrombohitra Hermona rehetra ary Basana rehetra hatrany Saleka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia ny fanjakana rehetra an''i Oga tany Basana, izay nanjaka tany Astarta sy Edrehy (izy ihany no sisa tamin''ny Refaita); fa resin''i Mosesy ireny ka noroahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Kanefa tsy mba noroahin''ny Zanak''Isiraely ny Gesorita sy ny Makatita; fa mitoetra eo amin''ny Zanak''Isiraely mandraka androany ny Gesorita sy ny Makatita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny firenen''i Levy ihany no tsy nomeny lova; ny fanatitra atao amin''ny afo ho an''i Jehovah, Andriamanitry ny Isiraely, no lovany araka izay nolazainy taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nomen''i Mosesy lova ny firenena taranak''i Robena araka ny fokony '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ny fari-taniny dia hatrany Aroera, izay eo amoron''ny lohasahan-driaka Arnona, ary ny tanàna izay eo afovoan''ny lohasaha sy ny tany lemaka rehetra any Medeba, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'dia Hesbona sy ny tanànany rehetra, izay eo amin''ny tany lemaka, sy Dibona sy Bamotabala sy Beti-bala-meona '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'sy Jahaza sy Kedemota sy Mefata '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'sy Kiria-taima sy Sibma sy Zareta-sahara amin''ny tendrombohitra ao an-dohasaha, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'sy Beti-peora sy ny ao am-bodin''i Pisga ary Beti-jesimota '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ary ny tanàna rehetra any amin''ny tany lemaka sy ny fanjakana rehetra an''i Sihona, mpanjakan''ny Amorita, izay nanjaka tany Hesbona fa resin''i Mosesy izy sy ireo andrianan''ny Midianita, dia Evy sy Rekema sy Zora sy Hora ary Reba, andriana izay nanoa an''i Sihona ka nitoetra teo amin''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary Balama, mpanao fankatovana, zanak''i Beora, dia novonoin''ny Zanak''Isiraely tamin''ny sabatra niaraka tamin''izay novonoiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary ny fari-tanin'ny taranak'i Robena dia ny amoron'i Jordana. Izay no lovan'ny taranak'i Robena araka ny fokony, dia ny tanàna sy ny zana-bohiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nomen''i Mosesy koa ny firenen''i Gada, dia ny taranak''i Gada araka ny fokony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ny faritaniny dia Jazera sy ny tanàna rehetra any Gileada ary ny antsasaky ny tanin''ny taranak''i Amona, hatrany Aroera, izay tandrifin''i Raba, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ary hatrany Hesbona ka hatrany Ramatamizpa sy Betonima ary hatrany Mahanaima ka hatramin''ny faritanin''i Debira; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ary teo amin''ny lohasaha Beti-harama sy Beti-nimra sy Sokota sy Zafona ary ny sisa tamin''ny fanjakan''i Sihona, mpanjakan''i Hesbona, sy ny amoron''i Jordana hatramin''ny amoron''ny Ranomasina Kinereta an-dafy atsinanan''i Jordana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Izany no lovan'ny taranak'i Gada araka ny fokony, dia ny tanàna sy ny zana-bohiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary nomen''i Mosesy koa ny antsasaky ny firenen''i Manase; ary izao no an''ny antsasaky ny firenena taranak''i Manase araka ny fokony: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ny fari-taniny hatrany Mahanaima, dia Basana rehetra, izay fanjakana rehetra an''i Oga, mpanjakan''i Basana, ary ny tanàna madinika rehetra an''i Jaira, izay any Basana, dia tanàna enim-polo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary ny antsasak''i Gileada sy Astarta ary Edrehy, tanàna amin''ny fanjakan''i Oga any Basana, dia an''ny taranak''i Makira, zanak''i Manase, dia ho an''ny antsasaky ny taranak''i Makira araka ny fokony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ireo no voazaran'i Mosesy ho lova tany Arbota-moaba an-dafy atsinanan'i Jordana tandrifin'i Jeriko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary ny firenen'i Levy tsy mba nomen'i Mosesy lova; fa Jehovah, Andriamanitry ny Isiraely, no lovany, araka izay efa nolazainy taminy.
