document_id: JOS.13,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandidian'Andriamanitra an'i Josoa hizara ny tany ary filazana ny anjara efa nomena ny firenena roa sy sasany
  - type: text
    content: 'Ary Josoa dia efa zoki-olona sady nandroso fahanterana, dia hoy Jehovah taminy: Efa zoki-olona ianao ka mandroso fahanterana, ary be dia be ny tany sisa tsy mbola azo. '
  '10':
  - type: text
    content: 'ary ny tanàna rehetra izay an''i Sihona, mpanjakan''ny Amorita, izay nanjaka tany Hesbona, hatramin''ny faritanin''ny taranak''i Amona, '
  '11':
  - type: text
    content: 'ary Gileada sy ny tanin''ny Gesorita sy ny Makatita sy ny tendrombohitra Hermona rehetra ary Basana rehetra hatrany Saleka, '
  '12':
  - type: text
    content: 'dia ny fanjakana rehetra an''i Oga tany Basana, izay nanjaka tany Astarta sy Edrehy (izy ihany no sisa tamin''ny Refaita); fa resin''i Mosesy ireny ka noroahiny. '
  '13':
  - type: text
    content: 'Kanefa tsy mba noroahin''ny Zanak''Isiraely ny Gesorita sy ny Makatita; fa mitoetra eo amin''ny Zanak''Isiraely mandraka androany ny Gesorita sy ny Makatita. '
  '14':
  - type: text
    content: 'Ny firenen''i Levy ihany no tsy nomeny lova; ny fanatitra atao amin''ny afo ho an''i Jehovah, Andriamanitry ny Isiraely, no lovany araka izay nolazainy taminy. '
  '15':
  - type: text
    content: 'Ary nomen''i Mosesy lova ny firenena taranak''i Robena araka ny fokony '
  '16':
  - type: text
    content: 'Ary ny fari-taniny dia hatrany Aroera, izay eo amoron''ny lohasahan-driaka Arnona, ary ny tanàna izay eo afovoan''ny lohasaha sy ny tany lemaka rehetra any Medeba, '
  '17':
  - type: text
    content: 'dia Hesbona sy ny tanànany rehetra, izay eo amin''ny tany lemaka, sy Dibona sy Bamotabala sy Beti-bala-meona '
  '18':
  - type: text
    content: 'sy Jahaza sy Kedemota sy Mefata '
  '19':
  - type: text
    content: 'sy Kiria-taima sy Sibma sy Zareta-sahara amin''ny tendrombohitra ao an-dohasaha, '
  '2':
  - type: text
    content: 'Izao no tany sisa tsy mbola azo: Ny tany rehetra an''ny Filistina sy ny Gesorita rehetra, '
  '20':
  - type: text
    content: 'sy Beti-peora sy ny ao am-bodin''i Pisga ary Beti-jesimota '
  '21':
  - type: text
    content: 'ary ny tanàna rehetra any amin''ny tany lemaka sy ny fanjakana rehetra an''i Sihona, mpanjakan''ny Amorita, izay nanjaka tany Hesbona fa resin''i Mosesy izy sy ireo andrianan''ny Midianita, dia Evy sy Rekema sy Zora sy Hora ary Reba, andriana izay nanoa an''i Sihona ka nitoetra teo amin''ny tany. '
  '22':
  - type: text
    content: 'Ary Balama, mpanao fankatovana, zanak''i Beora, dia novonoin''ny Zanak''Isiraely tamin''ny sabatra niaraka tamin''izay novonoiny. '
  '23':
  - type: text
    content: Ary ny fari-tanin'ny taranak'i Robena dia ny amoron'i Jordana. Izay no lovan'ny taranak'i Robena araka ny fokony, dia ny tanàna sy ny zana-bohiny.
  '24':
  - type: text
    content: 'Ary nomen''i Mosesy koa ny firenen''i Gada, dia ny taranak''i Gada araka ny fokony. '
  '25':
  - type: text
    content: 'Ary ny faritaniny dia Jazera sy ny tanàna rehetra any Gileada ary ny antsasaky ny tanin''ny taranak''i Amona, hatrany Aroera, izay tandrifin''i Raba, '
  '26':
  - type: text
    content: 'ary hatrany Hesbona ka hatrany Ramatamizpa sy Betonima ary hatrany Mahanaima ka hatramin''ny faritanin''i Debira; '
  '27':
  - type: text
    content: 'ary teo amin''ny lohasaha Beti-harama sy Beti-nimra sy Sokota sy Zafona ary ny sisa tamin''ny fanjakan''i Sihona, mpanjakan''i Hesbona, sy ny amoron''i Jordana hatramin''ny amoron''ny Ranomasina Kinereta an-dafy atsinanan''i Jordana. '
  '28':
  - type: text
    content: Izany no lovan'ny taranak'i Gada araka ny fokony, dia ny tanàna sy ny zana-bohiny.
  '29':
  - type: text
    content: 'Ary nomen''i Mosesy koa ny antsasaky ny firenen''i Manase; ary izao no an''ny antsasaky ny firenena taranak''i Manase araka ny fokony: '
  '3':
  - type: text
    content: 'hatrany Sihora, izay atsinanan''i Egypta, ka hatramin''ny fari-tanin''i Elzrona eo avaratra, izay atao ho an''ny Kananita, ireo andriana dimy amin''ny Filistina dia ny Gazita sy ny Asdodita sy ny Askelonita sy ny Gatita sy ny Ekronita ary ny Avita '
  '30':
  - type: text
    content: 'Ny fari-taniny hatrany Mahanaima, dia Basana rehetra, izay fanjakana rehetra an''i Oga, mpanjakan''i Basana, ary ny tanàna madinika rehetra an''i Jaira, izay any Basana, dia tanàna enim-polo. '
  '31':
  - type: text
    content: 'Ary ny antsasak''i Gileada sy Astarta ary Edrehy, tanàna amin''ny fanjakan''i Oga any Basana, dia an''ny taranak''i Makira, zanak''i Manase, dia ho an''ny antsasaky ny taranak''i Makira araka ny fokony. '
  '32':
  - type: text
    content: Ireo no voazaran'i Mosesy ho lova tany Arbota-moaba an-dafy atsinanan'i Jordana tandrifin'i Jeriko.
  '33':
  - type: text
    content: Ary ny firenen'i Levy tsy mba nomen'i Mosesy lova; fa Jehovah, Andriamanitry ny Isiraely, no lovany, araka izay efa nolazainy taminy.
  '4':
  - type: text
    content: 'any atsimo, dia ny tanin''ny Kananita rehetra sy Meara, izay an''ny Sidoniana, hatrany Afeka ka hatramin''ny fari-tanin''ny Amorita, '
  '5':
  - type: text
    content: 'ary ny tanin''ny Gebalita sy Libanona rehetra any atsinanana, hatrany Bala-gada eo ambodin''ny tendrombohitra Hermona ka hatrany akaikin''i Hamata, '
  '6':
  - type: text
    content: 'ary ny mponina rehetra any amin''ny tany havoana hatrany Libanona ka hatrany Misrefota-maima. dia ny Sidoniana rehetra, Izaho no handroaka kanefa zarao amin''ny filokana ho lovan''ny Zanak''Isiraely izy araka izay efa nandidiako anao. '
  '7':
  - type: text
    content: 'Ary ankehitriny zarao izao tany izao ho lovan''ny firenena sivy sy ny antsasaky ny firenen''i Manase. '
  '8':
  - type: text
    content: 'Ary niaraka tamin''ireo koa no nahazoan''ny Robenita sy ny Gadita ny lovany, dia ilay nomen''i Mosesy azy any an-dafy atsinanan''i Jordana, araka izay nomen''i Mosesy, mpanompon''i Jehovah, azy, '
  '9':
  - type: text
    content: 'dia hatrany Aroera, izay eo amoron''ny lohasahan-driaka Arnona, ary ny tanàna izay eo afovoan''ny lohasaha sy ny tany lemaka rehetra any Medeba ka hatrany Dibona, '
