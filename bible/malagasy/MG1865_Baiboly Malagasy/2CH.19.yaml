document_id: 2CH.19,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nataon'i Josafata hahatsara ny fitondram-panjakana
  - type: text
    content: 'Ary Josafata, mpanjakan''ny Joda, niverina soa aman-tsara ho any an-tranony tany Jerosalema. '
  '10':
  - type: text
    content: 'Na inona na inona no ady avy amin''ny rahalahinareo izay monina amin''ny tanànany, na ny amin''ny mahafaty aina, na ny amin''ny hevitry ny lalàna sy ny didy ary ny fitsipika samy hafa, dia anaro izy mba tsy ho meloka amin''i Jehovah, fandrao iharan''ny fahatezerana ianareo sy ny rahalahinareo; izany no ataovy, dia tsy ho meloka ianareo. '
  '11':
  - type: text
    content: Ary, indro, Amaria mpisoronabe no ho lehibenareo amin'ny raharahan'i Jehovah rehetra; ary Zebadia, zanak'Isimaela, mpanapaka ny taranak'i Joda, ho lehibenareo amin'ny raharahan'ny mpanjaka rehetra kosa; ary ny Levita ho mpifehy hanampy anareo. Mahereza, ka mahefà; ary Jehovah anie homba izay tsara.
  '2':
  - type: text
    content: 'Ary nivoaka hitsena azy Jeho, zanak''i Hanany mpahita, ka nanao tamin''i Josafata mpanjaka hoe: Moa ny ratsy fanahy va no tokony hampiana, ary izay mankahala an''i Jehovah va no tokony ho tianao? Koa noho izany dia tezitra aminao Jehovah. '
  '3':
  - type: text
    content: Nefa mba misy fahatsaram-panahy hita ihany aminao, fa noravanao tsy ho eo amin'ny tany ny Aseraha, sady nampiomana ny fonao hitady an'Andriamanitra ianao.
  '4':
  - type: text
    content: 'Ary Josafata nitoetra tany Jerosalema; ary nandeha hitety ny olona indray izy hatrany Beri-sheba ka hatrany amin''ny tany havoan''i Efraima ary nampiverina ny olona ho amin''i Jehovah, Andriamanitry ny razany. '
  '5':
  - type: text
    content: 'Ary nanendry mpitsara tamin''ny tany izy, dia tamin''ny isan-tanàna mimanda eran''i Joda, '
  '6':
  - type: text
    content: 'ka nanao taminy hoe: Tandremo izay hataonareo; fa tsy ho an''olona no hitsaranareo, fa ho an''i Jehovah, sady momba anareo ao amin''ny fitsarana Izy. '
  '7':
  - type: text
    content: 'Koa aoka ho ao aminareo ny tahotra an''i Jehovah; tandremo ka ataovy izany, fa tsy mba misy heloka amin''i Jehovah Andriamanitsika, na fizahan-tavan''olona, na fandraisana kolikoly. '
  '8':
  - type: text
    content: 'Ary tany Jerosalema koa no nanendren''i Josafata ny sasany tamin''ny Levita sy ny mpisorona ary ny lohan''ny fianakaviana tamin''ny Isiraely ho amin''ny fitsaran''i Jehovah sy ny adin''olona (fa efa tafaverina tany Jerosalema izy tamin''izay) '
  '9':
  - type: text
    content: 'ka dia nandidy azy hoe: Izao no hataonareo amin''ny fahatahorana an''i Jehovah sy amin''ny fahamarinana ary amin''ny fo mahitsy: '
