document_id: 2CH.19
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nataon'i Josafata hahatsara ny fitondram-panjakana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Josafata, mpanjakan''ny Joda, niverina soa aman-tsara ho any an-tranony tany Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nivoaka hitsena azy Jeho, zanak''i Hanany mpahita, ka nanao tamin''i Josafata mpanjaka hoe: Moa ny ratsy fanahy va no tokony hampiana, ary izay mankahala an''i Jehovah va no tokony ho tianao? Koa noho izany dia tezitra aminao Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nefa mba misy fahatsaram-panahy hita ihany aminao, fa noravanao tsy ho eo amin'ny tany ny Aseraha, sady nampiomana ny fonao hitady an'Andriamanitra ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Josafata nitoetra tany Jerosalema; ary nandeha hitety ny olona indray izy hatrany Beri-sheba ka hatrany amin''ny tany havoan''i Efraima ary nampiverina ny olona ho amin''i Jehovah, Andriamanitry ny razany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nanendry mpitsara tamin''ny tany izy, dia tamin''ny isan-tanàna mimanda eran''i Joda, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ka nanao taminy hoe: Tandremo izay hataonareo; fa tsy ho an''olona no hitsaranareo, fa ho an''i Jehovah, sady momba anareo ao amin''ny fitsarana Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa aoka ho ao aminareo ny tahotra an''i Jehovah; tandremo ka ataovy izany, fa tsy mba misy heloka amin''i Jehovah Andriamanitsika, na fizahan-tavan''olona, na fandraisana kolikoly. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary tany Jerosalema koa no nanendren''i Josafata ny sasany tamin''ny Levita sy ny mpisorona ary ny lohan''ny fianakaviana tamin''ny Isiraely ho amin''ny fitsaran''i Jehovah sy ny adin''olona (fa efa tafaverina tany Jerosalema izy tamin''izay) '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ka dia nandidy azy hoe: Izao no hataonareo amin''ny fahatahorana an''i Jehovah sy amin''ny fahamarinana ary amin''ny fo mahitsy: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Na inona na inona no ady avy amin''ny rahalahinareo izay monina amin''ny tanànany, na ny amin''ny mahafaty aina, na ny amin''ny hevitry ny lalàna sy ny didy ary ny fitsipika samy hafa, dia anaro izy mba tsy ho meloka amin''i Jehovah, fandrao iharan''ny fahatezerana ianareo sy ny rahalahinareo; izany no ataovy, dia tsy ho meloka ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary, indro, Amaria mpisoronabe no ho lehibenareo amin'ny raharahan'i Jehovah rehetra; ary Zebadia, zanak'Isimaela, mpanapaka ny taranak'i Joda, ho lehibenareo amin'ny raharahan'ny mpanjaka rehetra kosa; ary ny Levita ho mpifehy hanampy anareo. Mahereza, ka mahefà; ary Jehovah anie homba izay tsara.
