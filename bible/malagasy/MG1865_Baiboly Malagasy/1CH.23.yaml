document_id: 1CH.23
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanendrena an'i Solomona ho mpanjaka, sy ny nandaminana ny raharahan'ny Levita
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary nony efa ela niainana sy tratrantitra tsara
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. voky andro, na afa-pon'ny miaina
    marker-yv: yv-n
  - type: text
    text: ' Davida, dia Solomona zanany no nataony mpanjaka tamin''ny Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary novoriny ny lehiben''ny Isiraely rehetra mbamin''ny mpisorona sy ny Levita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nisaina ny Levita hatramin''ny telo-polo taona no ho miakatra, ka valo arivo amby telo alina no isan''ny lehilahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy Davida: Ny efatra arivo amby roa alina amin''ireo dia ataoko ho tonian''ny asa ao an-tranon''i Jehovah, ary ny enina arivo ataoko mpifehy sy mpitsara, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ary ny efatra arivo ho mpiandry varavarana, ary ny efatra arivo ho mpidera an'i Jehovah amin'ny zavatra namboariko hiderana Azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nozarazarain''i Davida ho antokony ireo araka ny zanakalahin''i Levy, dia Gersona sy Kehata sy Merary:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tamin''ny Gersonita dia Ladana sy Simey. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny zanakalahin''i Ladana dia Jehiela lohany sy Zetama ary Joela; telo izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny zanakalahin''i Simey dia Selomota sy Haziela ary Harana; telo izy. Ireo no lohany tamin''ny fianakavian''i Ladana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny zanakalahin''i Simey dia Jahata sy Zina sy Jeosy ary Beria; izy efa-dahy ireo no zanakalahin''i Simey. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Jahata no lohany, ary Ziza no faharoany; fa Jeosy sy Beria tsy nanana zanakalahy maro, ka dia nisaina ho fianakaviana iray sy antokony iray izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny zanakalahin''i Kehata dia Amrama sy Jizara sy Hebrona ary Oziela; efatra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny zanakalahin''i Amrama dia Arona sy Mosesy. Ary Arona natokana ka nohamasinina ho masina indrindra, dia izy sy ny taranany mandrakizay, handoro ditin-kazo manitra eo anatrehan''i Jehovah sy hanao fanompoam-pivavahana ho Azy ary hitso-drano amin''ny anarany mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nefa ny amin''i Mosesy, lehilahin''Andriamanitra, dia nisaina tamin''ny firenen''i Levy ihany ny zanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny zanakalahin''i Mosesy dia Gersona sy Eliezera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tamin''ny zanakalahin''i Gersona dia Seboela no lohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary tamin''ny zanakalahin''i Eliezera dia Rehabia no lohany (Eliezera anefa tsy nanan-janaka hafa); fa ny zanak''i Rehabia dia maro indrindra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tamin''ny zanakalahin''i Jizara dia Selomota no lohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny zanakalahin''i Hebrona, dia Jeria no lahimatoa, Amaria no lahiaivo, Jahaziela no fahatelo, ary Jekameama no faralahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny zanakalahin'i Oziela, dia Mita no lahimatoa, ary Jisia no faralahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ny zanakalahin''i Merary dia Maly sy Mosy. Ny zanakalahin''i Maly dia Eleazara sy Kisy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary maty Eleazara ka tsy nanan-janakalahy, fa vavy avokoa; ary ireny zanakalahin''i Kisy havany no nanambady ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny zanakalahin'i Mosy dia Maly sy Edera ary Jeremota; telo izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ireo no zanakalahin''i Levy araka ny fianakaviany, dia ny lohan''ny fianakaviana tamin''ny antokony avy araka ny nanisana ny anarany tsirairay, dia izay nanao ny fanompoana tao an-tranon''i Jehovah, hatramin''ny roa-polo taona no ho miakatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa hoy Davida: Jehovah, Andriamanitry ny Isiraely, efa nanome fitsaharana ho an''ny olony sady mitoetra eto Jerosalema mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary ny Levita kosa dia tsy hitondra ny tabernakely na ny fanaka enti-manompo ao aminy intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa araka ny fara-tenin''i Davida dia nisaina hatramin''ny roa-polo taona no ho miakatra ny Levita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary ny raharahany dia ny hanampy ny taranak''i Arona amin''ny fanompoana ao an-tranon''i Jehovah amin''ireo kianja sy efi-trano tao ary amin''ny fanadiovana ny zavatra masina rehetra sy ny fanompoana ao an-tranon''Andriamanitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ary amin''ny mofo aseho sy ny koba tsara toto ho fanatitra hohanina sy amin''ny mofo manify tsy misy masirasira sy amin''izay endasina amin''ny lapoely sy amin''izay vonton-diloilo ary amin''ny famarana sy ny fandrefesana rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ary ny hitsangana isa-maraina hisaotra sy hidera an''i Jehovah, ary toy izany koa amin''ny hariva, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'ary ny hanatitra ny fanatitra dorana rehetra ho an''i Jehovah na amin''ny Sabata, na amin''ny voaloham-bolana, na amin''ny fotoam-pivavahana hafa dia araka ny isany avy, sy araka ny fanao voatendry hanaovana azy mandrakariva eo anatrehan''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Aoka ho toy izany no hitandremany ny anjara-raharahany ny amin'ny trano-lay fihaonana sy ny anjara-raharahany ny amin'ny fitoerana masina ary ny anjara-raharahany ny amin'ny taranak'i Arona rahalahiny ho fanompoana ao an-tranon'i Jehovah.
