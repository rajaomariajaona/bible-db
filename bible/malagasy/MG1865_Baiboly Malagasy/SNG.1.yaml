document_id: SNG.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mpanjaka sy ny ampakarina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny tonon-kira tsara indrindra, izay nataon'i Solomona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Enga anie ka hanoroka ahy amin''ny fanorohan''ny vavany izy! Fa tsara noho ny divay ny fitiavanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mani-pofona ny menakao tsara, menaka manitra voaidina ny anaranao, koa izany no itiavan''ny zatovovavy anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Taomy aho, dia hihazakazaka hanaraka anao izahay; Nentin''ny mpanjaka ho ao an-efi-tranony aho. Hifaly sy hiravoravo aminao izahay; Hankalazainay mihoatra noho ny divay ny fitiavanao; Fitiavana marina no itiavany anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mivalomainty aho, nefa tsara tarehy, ry zanakavavin''i Jerosalema, toy ny lain''i Kedara, toy ny ambain-dain''i Solomona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Aza mibanjina ahy, fa mivalomainty aho, satria efa azon''ny hainandro; Tezitra tamiko ny zanak''ineny; Notendreny ho mpiandry ny tanim-boalobony aho; Nefa ny tanim-boaloboko kosa, dia ny an''ny tenako, tsy mba nandrasako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Lazao amiko, ry ilay tian'ny fanahiko, izay iandrasanao ny ondrinao, sy izay ampandrianao azy raha antoandro; Fa nahoana no ho tahaka izay mivezivezy foana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: misarona fisalobonana'
    marker-yv: yv-n
  - type: text
    text: ' aho Eny amin''ny andian''ny namanao?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Raha tsy fantatrao, ry tsara tarehy indrindra amin'ny vehivavy, dia mandehana hanaraka ny andian'ny ondry aman'osy, ary andraso eny amin'ny lain'ny mpiandry ondry ny zanak'osinao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ry tompokovavy havako, ianao dia ampitahaiko amin''ny soavalivaviko mitarika ny kalesin''i Farao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mahatsara ny tarehinao ireo voahangy voatohy; Manendrika ny vozonao ireo rado. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nefa rojo volamena misy voavola mibontsimbontsina kosa no hataonay ho anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Raha mipetraka amin''ny latabany ny mpanjaka, dia mamerovero tsara ny nardako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny malalako dia miora am-pehezana madinika mandry eo an-tratrako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny malalako dia tahaka ny vonin'ny kofera amiko, any an-tanimbolin'i En-jedy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Indro, tsara tarehy ianao, ry tompokovavy havako; Indro, tsara tarehy ianao; Voromailala ny masonao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Manana masom-boromailala ianao'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Indro, tsara tarehy ianao, ry malalako, eny, mahafinaritra; Maitso ny fandriantsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Sedera ny sakamandimbin'ny tranontsika, ary kypreso ny peta-drindrintsika.
