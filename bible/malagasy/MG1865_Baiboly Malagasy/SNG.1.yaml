document_id: SNG.1,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny mpanjaka sy ny ampakarina
  - type: text
    content: Ny tonon-kira tsara indrindra, izay nataon'i Solomona.
  '10':
  - type: text
    content: 'Mahatsara ny tarehinao ireo voahangy voatohy; Manendrika ny vozonao ireo rado. '
  '11':
  - type: text
    content: Nefa rojo volamena misy voavola mibontsimbontsina kosa no hataonay ho anao.
  '12':
  - type: text
    content: 'Raha mipetraka amin''ny latabany ny mpanjaka, dia mamerovero tsara ny nardako. '
  '13':
  - type: text
    content: 'Ny malalako dia miora am-pehezana madinika mandry eo an-tratrako. '
  '14':
  - type: text
    content: Ny malalako dia tahaka ny vonin'ny kofera amiko, any an-tanimbolin'i En-jedy.
  '15':
  - type: text
    content: Indro, tsara tarehy ianao, ry tompokovavy havako; Indro, tsara tarehy ianao; Voromailala ny masonao
  - type: note
    content: 'Na: Manana masom-boromailala ianao'
  - type: text
    content: .
  '16':
  - type: text
    content: 'Indro, tsara tarehy ianao, ry malalako, eny, mahafinaritra; Maitso ny fandriantsika. '
  '17':
  - type: text
    content: Sedera ny sakamandimbin'ny tranontsika, ary kypreso ny peta-drindrintsika.
  '2':
  - type: text
    content: 'Enga anie ka hanoroka ahy amin''ny fanorohan''ny vavany izy! Fa tsara noho ny divay ny fitiavanao. '
  '3':
  - type: text
    content: 'Mani-pofona ny menakao tsara, menaka manitra voaidina ny anaranao, koa izany no itiavan''ny zatovovavy anao. '
  '4':
  - type: text
    content: 'Taomy aho, dia hihazakazaka hanaraka anao izahay; Nentin''ny mpanjaka ho ao an-efi-tranony aho. Hifaly sy hiravoravo aminao izahay; Hankalazainay mihoatra noho ny divay ny fitiavanao; Fitiavana marina no itiavany anao. '
  '5':
  - type: text
    content: 'Mivalomainty aho, nefa tsara tarehy, ry zanakavavin''i Jerosalema, toy ny lain''i Kedara, toy ny ambain-dain''i Solomona. '
  '6':
  - type: text
    content: 'Aza mibanjina ahy, fa mivalomainty aho, satria efa azon''ny hainandro; Tezitra tamiko ny zanak''ineny; Notendreny ho mpiandry ny tanim-boalobony aho; Nefa ny tanim-boaloboko kosa, dia ny an''ny tenako, tsy mba nandrasako. '
  '7':
  - type: text
    content: Lazao amiko, ry ilay tian'ny fanahiko, izay iandrasanao ny ondrinao, sy izay ampandrianao azy raha antoandro; Fa nahoana no ho tahaka izay mivezivezy foana
  - type: note
    content: 'Na: misarona fisalobonana'
  - type: text
    content: ' aho Eny amin''ny andian''ny namanao?'
  '8':
  - type: text
    content: Raha tsy fantatrao, ry tsara tarehy indrindra amin'ny vehivavy, dia mandehana hanaraka ny andian'ny ondry aman'osy, ary andraso eny amin'ny lain'ny mpiandry ondry ny zanak'osinao.
  '9':
  - type: text
    content: 'Ry tompokovavy havako, ianao dia ampitahaiko amin''ny soavalivaviko mitarika ny kalesin''i Farao. '
