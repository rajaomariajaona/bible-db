document_id: NEH.12
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny mpisorona sy ny Levita izay niara-niakatra tamin''i Zerobabela, zanak''i Sealtiela, sy Jesoa dia Seraia, Jeremia, Ezra, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Amaria, Maloka, Hatosy, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Sekania, Rehoma, Meremota, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ido, Ginetoy, Abia, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Miamina, Madia, Bilga, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Semaia, Joiariba, Jedaia, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Salo, Amoka, Hilkia ary Jedaia. Ireo no lohan'ny mpisorona sy ny rahalahiny tamin'ny andron'i Jesoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny Levita kosa dia izao: Jesoa, Binoy, Kadmiela, Serebia, Joda ary Matania, dia izy ireo sy ny rahalahiny no tonian''ny fiderana. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Bakbokia sy Ono, rahalahin''ireo, dia nifanandrify tamin''ny anjara-raharahany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Jesoa niteraka an''i Joiakima; ary Joiakima niteraka an''i Eliasiba; ary Eliasiba niteraka an''i Joiada; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ary Joiada niteraka an'i Jonatana; ary Jonatana niteraka an'i Jadoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary tamin''ny andron''i Joiakima dia nisy mpisorona, lohan''ny fianakaviana, dia izao: Ny avy tamin''i Seraia dia Meraia; ny avy tamin''i Jeremia dia Hanania; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ny avy tamin''i Ezra dia Mesolama; ny avy tamin''i Amaria dia Johanana; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ny avy tamin''i Meliko dia Jonatana; ny avy tamin''i Sebania dia Josefa; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ny avy tamin''i Hadma dia Adna; ny avy tamin''i Meraiota dia Helkay; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ny avy tamin''Ido dia Zakaria; ny avy tamin''i Ginetona dia Mesolama; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ny avy tamin''i Abia dia Zikry; ny avy tamin''i Miniamina, avy tamin''i Moadia, dia Piltahy; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ny avy tamin''i Bilga dia Samoa; ny avy tamin''i Semaia dia Jonatana; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ny avy tamin''i Joariba dia Matenay; ny avy tamin''i Jedaia dia Ozy; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ny avy tamin''i Salay dia Kalay; ny avy tamin''i Amoka dia Ebera; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ny avy tamin''i Hilkia dia Hasabia; ny avy tamin''i Jedaia dia Netanela. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tamin'ny andron'i Eliasiba sy Joiada sy Johanana ary Jadoa ny Levita dia voasoratra ho lohan'ny fianakaviany; ary toy izany koa ny mpisorona, hatramin'ny nanjakan'i Dariosy Persiana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ny taranak''i Levy, lohan''ny fianakaviana, dia voasoratra ao amin''ny bokin''ny tantara hatramin''ny andron''i Johanana, zanak''i Eliasiba. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ny lohan''ny Levita dia Hasabia sy Serebia sy Jesoa, zanak''i Kadmiela, mbamin''ny rahalahin''ireo izay nifanandrify taminy, mba hidera sy hisaotra araka ny didin''i Davida, lehilahin''Andriamanitra, nifanandrify isan-tokony. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Matania, Bakbokia, Obadia, Mesolama, Talmona sy Akoba no mpiandry varavarana ka nitandrina ny fiambenana amin''ny trano firaketana. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ireo no tamin''ny andron''i Joiakima, zanak''i Jesoa, zanak''i Jozadaka, sy tamin''ny andron''i Nehemia governora sy Ezra mpisorona sady mpanora-dalàna. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary rehefa hitokanana ny mandan''i Jerosalema, dia nitady ny Levita avy tamin''ny fonenany rehetra izy mba ho entina any Jerosalema hanao ny fitokanana amin''ny fifaliana sy ny fiderana ary ny hira mbamin''ny kipantsona sy ny valiha ary ny lokanga. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia niangona ny mpihira avy tamin''ny tany lemaka manodidina an''i Jerosalema sy ny avy tamin''ny vohitry ny Netofatita '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'sy Beti-gilgala ary ny sahan''i Geba sy Azmaveta; fa efa nanao vohitra ho azy manodidina an''i Jerosalema ny mpihira. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary ny mpisorona sy ny Levita samy nanadio ny tenany, ary nodioviny koa ny olona sy ny vavahady ary ny manda. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia nasaiko niakatra eo ambonin''ny manda ny mpanapaka ny Joda, ary nanendry mpanao fiderana roa tonta aho handeha milahatra tsara. Ny irai-dia nandeha tamin''ny ankavanana teo ambonin''ny manda ho amin''ny vavahadin-jezika; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'ary nandeha nanarakaraka azy Hosaia sy ny antsasaky ny andriandahin''ny Joda, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'dia Azaria sy Ezra sy Mesolama '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'sy Joda sy Benjamina sy Semaia ary Jeremia, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'ary ny sasany tamin''ny taranaky ny mpisorona nitondra trompetra, dia Zakaria, zanak''i Jonatana, zanak''i Semaia, zanak''i Matania, zanak''i Mikaia, zanak''i Zakora, zanak''i Asafa, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'mbamin''ny rahalahiny, dia Semaia sy Azarela, Milalay, Gilalay, May, Netanela sy Joda ary Hanany, nitondra ny zava-manenon''i Davida, lehilahin''Andriamanitra; ary Ezra mpanora-dalàna nandeha teo alohan''ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ary hatreo amin'ny vavahadin-doharano dia nizotra izy ka niakatra tamin'ny ambaratongan'ny Tanànan'i Davida, tamin'ny fiakarana amin'ny manda eo ambonin'ny tranon'i Davida ka hatramin'ny vavahadin-drano eo atsinanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary ny mpanao fiderana irai-dia kosa dia nandeha nifanandrify taminy sady narahiko sy ny antsasaky ny olona teo ambonin''ny manda hatreo ambonin''ny tilikambo misy ny fatana fandoroana ka hatramin''ny manda lehibe, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ary hatreo ambonin'ny vavahadin'i Efraima ay teo ambanin'ny vavahady taloha ary teo ambonin'ny vavahadin-kazandrano sy ny tilikambo Hananela sy ny tilikambo Hamea, dia hatramin'ny vavahadin'ondry; ary nilanona teo amin'ny vavahadin-trano-maizina izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia nijanona tao an-tranon''Andriamanitra izy roa tonta, ary izaho koa sy ny antsasaky ny mpanapaka izay niaraka tamiko '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'ary ny mpisorona, dia Eliakima, Mahaseia, Miniamina, Mikaia, Elioenay, Zakaria ary Hanania, nitondra trompetra, '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'ary Mahaseia sy Semaia sy Eleazara sy Ozy sy Johanana sy Malkia sy Elama ary Ezera. Ary nihira mafy ny mpihira sy Jizrahia, mpifehy azy. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Dia namono zavatra betsaka hatao fanatitra tamin''izany andro izany izy sady nifaly, fa Andriamanitra nampifaly azy indrindra; ary ny vadiny aman-janany nifaly koa; ka dia re lavitra ny fifaliana tany Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary tamin''izany andro izany dia nisy olona notendrena hitandrina ny efi-trano fitehirizana ny rakitra sy ny fanatitra asandratra sy ny voaloham-bokatra ary ny fahafolon-karena, mba hangonina ao izay anjara voadidy ho an''ny mpisorona sy ny Levita avy amin''ny saha manodidina ny isan-tanana; fa nifalian''ny Joda ireo mpisorona sy Levita izay nanompo ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Dia nitandrina izay nasaina hotandremany ny amin''Andriamaniny sy ny amin''ny fanadiovana izy; ary toy izany koa ny mpihira sy ny mpiandry varavarana, araka ny didin''i Davida sy Solomona zanany. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Fa fahiny tamin''ny andron''i Davida sy Asafa aza dia efa nisy lohan''ny mpihira sy hira fiderana ary fisaorana an''Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Ary ny Isiraely rehetra tamin'ny andron'i Zerobabela sy Nehemia nanome ny anaran'ny mpihira sy ny mpiandry varavarana, dia ny anjarany isan'andro; ary nanokana izay ho an'ny Levita izy; ary ny Levita kosa nanokana izay ho an'ny taranak'i Arona.
