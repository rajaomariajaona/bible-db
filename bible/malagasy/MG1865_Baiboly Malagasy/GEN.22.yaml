document_id: GEN.22
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny taranak'i Nahora
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary rehefa afaka izany zavatra izany, dia nizahan''Andriamanitra toetra Abrahama, ka hoy Izy taminy: Ry Abrahama ô! ary hoy izy; Inty aho. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy Izy: Ento ny zanakao, ny lahitokanao izay tianao, dia Isaka ka mankanesa any amin''ny tany Moria; ary atero any izy ho fanatitra dorana ao amin''ny tendrombohitra anankiray izay holazaiko aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nifoha maraina koa Abrahama dia nanisy lasely ny borikiny ka nitondra zatovony roa lahy koa niaraka taminy sy Isaka zanany ary namaky ny hazo hataina amin''ny fanatitra dorana izy dia niainga ka nankany amin''ny tany izay efa nolazain''Andriamanitra taminy, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nony tamin''ny andro fahatelo Abrahama dia nanopy ny masony ka nahatazana ny tany terỳ lavitra erỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy Abrahama tamin''ny zatovony: Mijanòna eto amin''ny boriky ianareo, fa izaho sy ny zazalahy handeha hankerỳ; ary hivavaka izahay dia hiverina eto aminareo indray. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nalain''i Abrahama ny hazo hataina amin''ny fanatitra dorana ka natataony an''Isaka zanany; fa izy kosa nitondra ny afo sy ny antsy teny an-tànany; ary dia niara-nandeha izy mianaka. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary Isaka niteny tamin''i Abrahama rainy ka nanao hoe: Ry ikaky ô! dia hoy izy: Inty aho, anaka. Ary hoy izy: Indreto ny afo sy ny kitay; fa aiza kosa izay ondry hatao fanatitra dorana? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hoy Abrahama: Anaka. Andriamanitra no hahita izay ondry hatao fanatitra dorana; dia niara-nandeha izy mianaka. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary rehefa tonga teo amin''ny tany izay efa nolazain''Andriamanitra taminy izy, dia nanorina ny alitara teo Abrahama ka nandahatra ny kitay; dia namatotra an''i Isaka zanany izy ka nametraka azy tambonin''ny alitara teo ambonin''ny kitay. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Abrahama naninjitra ny tànany ka nandray ny antsy mba hamonoany ny zanany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa niantso azy Ilay Anjelin''i Jehovah tany an-danitra ka nanao hoe: Ry Abrahama, ry Abrahama ô! ary hoy kosa izy: Inty aho. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy Izy: Aza maninjitra ny tananao amin''ny zazalahy, ary aza maninona azy akory ianao; fa hitako izao fa matahotra an''Andriamanitra ianao, ka tsy narovanao tamiko ny zanakao, dia ny lahitokanao. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary Abrahama niherika nijery ka, indro, nisy ondrilahy teo ivohony, voasangazotry ny kirihitrala ny tandrony; dia lasa Abrahama ka naka ny ondrilahy ary nanatitra azy ho fanatitra dorana ho solon''ny zanany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny anaran''izany tany izany dia nataon''i Abrahama hoe Jehovah-jire; dia izany no anaovana mandraka ankehitriny ny hoe: Any an-tendrombohitra no hisehoan''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia niantso an''i Abrahama fanindroany tany an-danitra Ilay Anjelin''i Jehovah '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ka nanao hoe: Ny tenako no nianianako, hoy Jehovah: Satria nanao izany zavatra izany ianao ka tsy niaro ny zanakao, ilay lahitokanao, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'dia hitahy anao tokoa Aho ary hahamaro dia hahamaro ny taranakao, ho tahaka ny kintana eny amin''ny lanitra sy ho tahaka ny fasika izay any amoron-dranomasina; ary ny taranakao hahazo ny vavahadin''ny fahavalony; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary amin''ny taranakao no hitahiana ny firenena rehetra ambonin''ny tany, satria nanaiky ny teniko ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary Abrahama dia niverina nankeny amin'ny zatovony; dia niainga izy ka niaraka nankany Beri-sheba; ary Abrahama dia nonina tany Beri-sheba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary rehefa afaka izany, dia nisy nanambara tamin''i Abrahama hoe: Indro, efa niteraka zazalahy koa Milka tamin''i Nahora rahalahinao, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'dia Oza lahimatoany sy Boza lahiaivo ary Kemoela, rain''i Arama, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ary Kaseda sy Hazo sy Pildasy sy Jidiafa ary Betoela. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary Betoela niteraka an-dRebeka. Ireo valo ireo no naterak''i Milka tamin''i Nahora, rahalahin''i Abrahama. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary ny vaditsindranony, izay atao hoe Reoma, izy koa dia niteraka an'i Teba sy Gahama sy Tahasy ary Meaka.
