document_id: JOB.21
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny teny navalin'i Joba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia namaly Joba ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mihainoa dia mihainoa ny teniko, Ary aoka izany no ho fampiononanareo ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mandefera amiko ianareo, fa mba hiteny kosa aho izao; Ary rehefa tapitra ny teniko, dia mandatsalatsà ihany indray ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Raha ny amiko, moa ny ataon'ny olona va no itarainako? Ary raha izany, nahoana no hahalefitra ny fanahiko?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jereo aho, dia aoka ho talanjona ianareo, ary mitampena vava.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Eny, raha mahatsiaro izany aho, dia raiki-tahotra, sady toran-kovitra ny tenako:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nahoana no velona ny ratsy fanahy ka sady tratrantitra no be hery?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny zanany koa mitomoetra tsara eo anatrehany, ary ny zafiny eo anoloany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny ankohonany miadana ka tsy manan-tahotra, ary ny tsorakazon'Andriamanitra tsy mamely azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny ombilahiny mampiteraka ka mahavanona; Ny ombivaviny miteraka ka tsy mamotsotra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mamoaka ny zanany madinika toy ny ondry aman'osy izy, ka mikoriana ny zanany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mihoby mitondra ampongatapaka sy lokanga izy ary mifaly amin'ny feon-tsodina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mandany ny androny amin'ny fahafinaretana izy; Amin'ny indray mipi-maso monja no idinany any amin'ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Kanefa anie ireo no manao amin''Andriamanitra hoe: Mialà aminay! Fa tsy mba irinay ny hahalala ny lalanao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Zinona izay Tsitoha, no hotompoinay? Ary inona no soa ho azonay, raha mivavaka aminy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Indro, tsy avy amin'ny tenany
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. tsy eo an-tànany
    marker-yv: yv-n
  - type: text
    text: ' ihany ny fahafinaretany! Ho lavitra ahy anie ny fisainan''ny ratsy fanahy!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Indraindray foana no mba maty ny jiron'ny ratsy fanahy, sy tonga ny loza manjo azy. Ary amelaran'Andriamanitra fandrika ireny
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: izaran''Andriamanitra fahoriana ho an''ireny'
    marker-yv: yv-n
  - type: text
    text: ' noho ny fahatezerany,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ka tonga tahaka ny mololo voatetika indaosin'ny rivotra izy sy tahaka ny akofa entin'ny tafio-drivotra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Andriamanitra, hoy ianareo, mbola hampijaly ny zanany noho ny helodrainy! Tsia; fa ny tenan'ireny ihany no aoka hovaliany, mba hahalalany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Aoka ny masony ihany no hahita ny loza manjo azy, ary aoka ny tenany ihany no hisotro ny fahatezeran'ny Tsitoha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa mampaninona azy moa ny amin'ny taranany mandimby azy, raha tapaka ny isan'ny androny?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Moa Andriamanitra va no hampianarim-pahalalana, nefa Izy no mitsara ny any an-danitra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. avo
    marker-yv: yv-n
  - type: text
    text: ' aza?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Maty ny anankiray, raha tsy mbola mihena ny fahatanjahany, sady miadana tokoa ka tsy manana ahiahy;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Feno ronono ny fitoeran-drononony
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Manotraka ny kibony'
    marker-yv: yv-n
  - type: text
    text: ', ary vonton-tsoka ny taolany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary ny anankiray maty amin'ny fahorian'ny fanahiny kosa ka tsy mba nanandrana soa akory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Samy mandry ao amin'ny vovoka izy roa tonta, ka feno olitra ny tenany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Indro, fantatro ny hevitrareo sy ny saim-petsy amelezanareo ahy;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa hoy ianareo: Aiza ny tranon''ny mpitohatoha'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Manotraka ny kibony'
    marker-yv: yv-n
  - type: text
    text: '? Ary aiza ny lay fitoeran''ny ratsy fanahy?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Kanefa tsy mba nanontany tamin'ny mpandeha amin'ny tany lavitra va ianareo? Ary tsy heverinareo va ny zava-mahagaga
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. famantarana
    marker-yv: yv-n
  - type: text
    text: ', ambaran''Ireo hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Amin'ny andro hahitan-doza dia voaaro ihany ny ratsy fanahy, ary amin'ny andro fahatezerana dia enti-miala izy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Iza no hanambara ny lalany eo anatrehany? Ary raha misy zavatra nataony, iza no sahy hamaly azy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Azy'
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary ho entina ho eny an-tany fandevonana izy ka mbola hitazana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mbola misy miambina'
    marker-yv: yv-n
  - type: text
    text: ' ao am-pasana;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ho mamy aminy ny bainga any an-dohasaha, ary ny olona rehetra hanaraka azy, toy ny nandehanan'ny maro tany alohany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Endrey! ity ianareo mba mampionona ahy foana! Ary ny famalianareo anefa, raha voasana tsara, dia lainga ihany!
