document_id: GEN.10,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny taranak'izy telo lahy zanak'i Noa, sy ny nielezany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no taranaky ny zanakalahin''i Noa, dia Sema sy Hama ary Jafeta: Samy niteraka zazalahy avy izy taorian''ny safo-drano.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny niandohan''ny fanjakany dia Babela sy Ereka sy Akada ary Kalne tany amin''ny tany Sinara. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nivoaka avy tamin''izany tany izany izy ka nankany Asyria, dia nanorina an''i Ninive mbamin''i Rehobot-ira sy Kala '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary Resena teo anelanelan''i Ninive sy Kala, dia ilay tanàna lehibe izany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Mizraima niteraka ny Lodita sy ny Anamita sy ny Lehabita sy ny Naftohita '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy ny Patrosita sy ny Kaslohita izay nihavian''ny Filistina ary ny Kaftorita. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Kanana niteraka an''i Sidona lahimatoany sy Heta, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny Jebosita , sy ny Amorita sy ny Girgasita '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy ny Hivita sy ny Arkita sy ny Sinita '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy ny Arvadita sy ny Zemarita ary ny Hamatita; ary nony taoriana dia niely ny firenen''ny Kananita. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fari-tanin''ny Kananita dia hatrany Sidona ka hatrany Gaza ao akaikin''i Gerara, ka hatrany Lesa ao akaikin''i Sodoma sy Gomora sy Adma ary Zeboima. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin''i Jafeta dia Gomera sy Magoga sy Maday sy Javana sy Tobala sy Maseka ary Tirasa. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo no zanak''i Hama, araka ny mpianakaviny, araka ny fiteniny, amin''ny taniny, amin''ny fireneny. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteraka koa Sema, rain''ny zanak''i Ebera rehetra rahalahin''i Jafeta, izay zokiny. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanakalahin''i Sema dia Elama sy Asyra sy Arpaksada sy Loda ary Arama. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny zanakalahin''i Arama dia Oza sy Hola sy Gatera ary Masy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Arpaksada niteraka an''i Sela; ary Sela niteraka an''i Ebera. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Ebera niteraka roa lahy: ny anaran''ny iray natao hoe Palega, satria tamin''ny androny no nizarana ny tany; ary Joktana no anaran''ny rahalahiny. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Joktana niteraka an''i Almodada sy Salefa sy Hazarmaveta sy Jera '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Hadorama sy Ozala sy Dikla '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Obala sy Abimaela sy Sheba '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Ofira sy Havila ary Jobaba; ireo rehetra ireo no zanakalahin''i Joktana. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny zanakalahin''i Gomera dia Askenaza sy Rifata ary Togarma. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fonenan''ireo dia hatrany Mesa ao akaikin''i Sefara, tendrombohitra atsinanana. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo no zanak''i Sema, araka ny mpianakaviny, araka ny fiteniny, amin''ny taniny, araka ny fireneny. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no mpianakavin'ny zanak'i Noa, araka ny taranany, amin'ny fireneny; ary avy tamin'ireo no niavakavahan'ny firenena tambonin'ny tany taorian'ny safo-drano.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny zanakalahin''i Javana dia Elisaha sy Tarsisy sy ny Kitima sy ny Dodanita. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy tamin''ireo no niavakavahan''ny nosin''ny firenena tany amin''ny taniny, dia samy araka ny fiteniny avy, araka ny mpianakaviny avy, tamin''ny fireneny avy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny zanakalahin''i Hama dia Kosy sy Mizraima sy Pota ary Kanana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny zanakalahin''i Kosy dia Seba sy Havila sy Sabta sy Ragama ary Sabteka; ary ny zanakalahin''i Ragama dia Seba sy Dedana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Kosy niteraka an''i Nimroda; izy no voalohany izay tonga olona mahery tambonin''ny tany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy dia mpihaza mahery teo anatrehan''i Jehovah, ka izany no nanaovan''ny olona hoe: Tahaka an''i Nimroda, mpihaza mahery eo anatrehan''i Jehovah. '
