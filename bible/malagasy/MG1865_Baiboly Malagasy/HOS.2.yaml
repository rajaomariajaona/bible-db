document_id: HOS.2,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hamaizana ny Isiraely, sy ny mbola hampodian'i Jehovah azy
  - type: text
    content: 'Kanefa, na dia izany aza, ny isan''ny Zanak''Isiraely dia ho betsaka toy ny fasika amin''ny ranomasina, izay tsy azo afatra sady tsy tambo isaina; ary any amin''ny tany izay nilazana taminy hoe: Tsy oloko ianareo, dia any no hanaovana aminy hoe: Zanak''Andriamanitra velona ianareo. '
  '10':
  - type: text
    content: Ary tsy fantany fa Izaho no nanome azy ny vary sy ny ranom-boaloboka sy ny diloilo, sady nataoko be ny volafotsiny sy ny volamenany, izay nolaniny ho an
  - type: note
    content: 'Na: nataony ho'
  - type: text
    content: '''i Bala, '
  '11':
  - type: text
    content: 'Koa dia halaiko indray ny variko amin''ny androny sy ny ranom-boaloboko amin''ny taonany, ary haoriko ny volon''ondriko sy ny rongoniko, izay nomena hasarony ny fitanjahany. '
  '12':
  - type: text
    content: 'Ary ankehitriny hasehoko eo imason''ireo lehilahiny ny fahamenarany, ka tsy hisy hahafaka azy amin''ny tanako. '
  '13':
  - type: text
    content: Ary hatsahatro ny fifaliany rehetra, dia ny andro firavoravoany sy ny voaloham-bolany ary ny Sabatany, eny, ny fotoam-pivavahany rehetra.
  '14':
  - type: text
    content: 'Ary hofongorako ny voalobony sy ny aviaviny, izay nataony hoe: Tangiko avy tamin''ireo lehilahiko ireto, ary hataoko ho tonga ala ireny ka hohanin''ny bibidia. '
  '15':
  - type: text
    content: 'Ary hovaliako izy noho ny andron''ireo Bala, izay efa nandoroany ditin-kazo manitra sady niravahany ny kaviny sy ny firavany, ka nanaraka ireo lehilahiny izy; Fa Izaho kosa nohadinoiny, hoy Jehovah. '
  '16':
  - type: text
    content: 'Koa, indro, Izaho dia hitaona azy ka hitondra azy ho any an-efitra ary hanao teny malefaka hahafinaritra azy. '
  '17':
  - type: text
    content: Ary hatrany dia homeko azy ny tanim-boalobony sy ny lohasaha Akora ho varavaram-panantenana; Ary any no hamaliany
  - type: note
    content: 'Na: hihirany'
  - type: text
    content: ' toy ny tamin''ny andro fahatanorany, dia toy ny tamin''ny andro niakarany avy tany amin''ny tany Egypta. '
  '18':
  - type: text
    content: Ary raha mby amin'izany andro izany, hoy Jehovah, dia hataonao hoe Aho Vadiko, fa tsy hataonao intsony hoe Balako
  - type: note
    content: Balako = Tompoko
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Fa hesoriko amin''ny vavany ny anaran''ireo Bala, ka tsy hotsarovana amin''ny anarany intsony ireo. '
  '2':
  - type: text
    content: 'Dia hiara-mivory ny taranak''i Joda sy ny taranak''Isiraely ka hifidy anankiray ho lohany izy, dia hiakatra hiala amin''ny tany, fa ho lehibe ny andron''i Jezirda. '
  '20':
  - type: text
    content: 'Ary raha mby amin''izany andro izany, Izaho dia hanao fanekena ho azy amin''ny bibidia sy amin''ny voro-manidina ary amin''ny biby mandady sy mikisaka amin''ny tany; Ary hotapatapahiko tsy hisy amin''ny tany intsony ny tsipìka sy ny sabatra ary ny fiadiana, dia hataoko mandry fahizay izy; '
  '21':
  - type: text
    content: 'Ary hofofoiko ho vadiko mandrakizay ianao, eny, hofofoiko ho vadiko amin''ny rariny sy ny hitsiny ary amin''ny fitiavana sy ny indrafo ianao; '
  '22':
  - type: text
    content: 'Eny, hofofoiko ho vadiko amin''ny fahamarinana ianao. Ka dia hahalala an''i Jehovah. '
  '23':
  - type: text
    content: Ary amin'izany andro izany dia hihaino
  - type: note
    content: 'Na: hamaly'
  - type: text
    content: ' Aho, hoy Jehovah, eny, hihainoa ny lanitra Aho, ary izy kosa hihaino ny tany; Ary ny tany kosa hihaino ny vary sy ny ranom-boaloboka ary ny diloilo; Ary ireo kosa dia hihaino an''i Jezirela, Dia hafafiko ho Ahy amin''ny tany izy; Ary hamindra fo amin''i Lò-rohama'
  - type: note
    content: Izahao i. 6
  - type: text
    content: ' Aho sady hanao amin''i Lò-amy hoe: Oloko ianao; Ary izy kosa hanao hoe: Andriamanitro Hianao.'
  '3':
  - type: text
    content: 'Manaova amin''ny rahalahinareo hoe: Amy'
  - type: note
    content: Amy = Oloko
  - type: text
    content: ', ary amin''ny anabavinareo hoe: Rohama'
  - type: note
    content: Rohama = Namindrana fo
  - type: text
    content: .
  '4':
  - type: text
    content: 'Mifandahara amin-dreninareo, eny, mifandahara fa izy tsy vadiko, ary Izaho tsy vadiny, ary aoka hesoriny ny fijejojejoany hiala eo amin''ny tavany sy ny fijangajangany tsy ho eo an-tratrany; '
  '5':
  - type: text
    content: 'Fandrao hampihanjahanjaiko izy ka hataoko toy ny tamin''ny andro nahaterahany, ary hataoko toy ny efitra sy ny tany karankaina izy, eny, hataoko matin-ketaheta izy. '
  '6':
  - type: text
    content: 'Ary tsy hamindrako fo ny zanany, Satria zanaky ny fijangajangana ireny. '
  '7':
  - type: text
    content: 'Fa efa nijangajanga ny reniny, eny, ilay torontoronina azy efa nanao izay mahamenatra; Fa hoy izy: Hanaraka ireo lehilahiko ihany aho, Izay manome ahy ny hanin-kohaniko sy ny rano hosotroiko, sy ny volon''ondriko sy ny rongoniko sy ny diloiloko ary ny fisotroko. '
  '8':
  - type: text
    content: 'Koa, indro, hotampenako tsilo ny lalanao sady hasiako fefy, ary tsy hahita izay lalan-kalehany izy. '
  '9':
  - type: text
    content: 'Ary hiezaka hanenjika ireo lehilahiny izy, nefa tsy hahatratra azy; Eny, hitady ireo izy, nefa tsy hahita; Dia hanao hoe izy: Handeha hody amin''ny vadiko taloha aho; Fa niadana aho tamin''izay noho ny ankehitriny. '
