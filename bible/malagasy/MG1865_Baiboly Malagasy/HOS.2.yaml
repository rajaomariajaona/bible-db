document_id: HOS.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hamaizana ny Isiraely, sy ny mbola hampodian'i Jehovah azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Kanefa, na dia izany aza, ny isan''ny Zanak''Isiraely dia ho betsaka toy ny fasika amin''ny ranomasina, izay tsy azo afatra sady tsy tambo isaina; ary any amin''ny tany izay nilazana taminy hoe: Tsy oloko ianareo, dia any no hanaovana aminy hoe: Zanak''Andriamanitra velona ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia hiara-mivory ny taranak''i Joda sy ny taranak''Isiraely ka hifidy anankiray ho lohany izy, dia hiakatra hiala amin''ny tany, fa ho lehibe ny andron''i Jezirda. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Manaova amin''ny rahalahinareo hoe: Amy'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Amy = Oloko
    marker-yv: yv-n
  - type: text
    text: ', ary amin''ny anabavinareo hoe: Rohama'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rohama = Namindrana fo
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mifandahara amin-dreninareo, eny, mifandahara fa izy tsy vadiko, ary Izaho tsy vadiny, ary aoka hesoriny ny fijejojejoany hiala eo amin''ny tavany sy ny fijangajangany tsy ho eo an-tratrany; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fandrao hampihanjahanjaiko izy ka hataoko toy ny tamin''ny andro nahaterahany, ary hataoko toy ny efitra sy ny tany karankaina izy, eny, hataoko matin-ketaheta izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary tsy hamindrako fo ny zanany, Satria zanaky ny fijangajangana ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa efa nijangajanga ny reniny, eny, ilay torontoronina azy efa nanao izay mahamenatra; Fa hoy izy: Hanaraka ireo lehilahiko ihany aho, Izay manome ahy ny hanin-kohaniko sy ny rano hosotroiko, sy ny volon''ondriko sy ny rongoniko sy ny diloiloko ary ny fisotroko. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa, indro, hotampenako tsilo ny lalanao sady hasiako fefy, ary tsy hahita izay lalan-kalehany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hiezaka hanenjika ireo lehilahiny izy, nefa tsy hahatratra azy; Eny, hitady ireo izy, nefa tsy hahita; Dia hanao hoe izy: Handeha hody amin''ny vadiko taloha aho; Fa niadana aho tamin''izay noho ny ankehitriny. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary tsy fantany fa Izaho no nanome azy ny vary sy ny ranom-boaloboka sy ny diloilo, sady nataoko be ny volafotsiny sy ny volamenany, izay nolaniny ho an
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: nataony ho'
    marker-yv: yv-n
  - type: text
    text: '''i Bala, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa dia halaiko indray ny variko amin''ny androny sy ny ranom-boaloboko amin''ny taonany, ary haoriko ny volon''ondriko sy ny rongoniko, izay nomena hasarony ny fitanjahany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ankehitriny hasehoko eo imason''ireo lehilahiny ny fahamenarany, ka tsy hisy hahafaka azy amin''ny tanako. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary hatsahatro ny fifaliany rehetra, dia ny andro firavoravoany sy ny voaloham-bolany ary ny Sabatany, eny, ny fotoam-pivavahany rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hofongorako ny voalobony sy ny aviaviny, izay nataony hoe: Tangiko avy tamin''ireo lehilahiko ireto, ary hataoko ho tonga ala ireny ka hohanin''ny bibidia. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hovaliako izy noho ny andron''ireo Bala, izay efa nandoroany ditin-kazo manitra sady niravahany ny kaviny sy ny firavany, ka nanaraka ireo lehilahiny izy; Fa Izaho kosa nohadinoiny, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa, indro, Izaho dia hitaona azy ka hitondra azy ho any an-efitra ary hanao teny malefaka hahafinaritra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary hatrany dia homeko azy ny tanim-boalobony sy ny lohasaha Akora ho varavaram-panantenana; Ary any no hamaliany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hihirany'
    marker-yv: yv-n
  - type: text
    text: ' toy ny tamin''ny andro fahatanorany, dia toy ny tamin''ny andro niakarany avy tany amin''ny tany Egypta. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary raha mby amin'izany andro izany, hoy Jehovah, dia hataonao hoe Aho Vadiko, fa tsy hataonao intsony hoe Balako
  - type: usfm
    marker: x
    children:
    - type: text
      text: Balako = Tompoko
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa hesoriko amin''ny vavany ny anaran''ireo Bala, ka tsy hotsarovana amin''ny anarany intsony ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary raha mby amin''izany andro izany, Izaho dia hanao fanekena ho azy amin''ny bibidia sy amin''ny voro-manidina ary amin''ny biby mandady sy mikisaka amin''ny tany; Ary hotapatapahiko tsy hisy amin''ny tany intsony ny tsipìka sy ny sabatra ary ny fiadiana, dia hataoko mandry fahizay izy; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hofofoiko ho vadiko mandrakizay ianao, eny, hofofoiko ho vadiko amin''ny rariny sy ny hitsiny ary amin''ny fitiavana sy ny indrafo ianao; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Eny, hofofoiko ho vadiko amin''ny fahamarinana ianao. Ka dia hahalala an''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary amin'izany andro izany dia hihaino
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hamaly'
    marker-yv: yv-n
  - type: text
    text: ' Aho, hoy Jehovah, eny, hihainoa ny lanitra Aho, ary izy kosa hihaino ny tany; Ary ny tany kosa hihaino ny vary sy ny ranom-boaloboka ary ny diloilo; Ary ireo kosa dia hihaino an''i Jezirela, Dia hafafiko ho Ahy amin''ny tany izy; Ary hamindra fo amin''i Lò-rohama'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Izahao i. 6
    marker-yv: yv-n
  - type: text
    text: ' Aho sady hanao amin''i Lò-amy hoe: Oloko ianao; Ary izy kosa hanao hoe: Andriamanitro Hianao.'
