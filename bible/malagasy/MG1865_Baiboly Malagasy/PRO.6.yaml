document_id: PRO.6,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fananarana hankatò tsara ny ana-dray aman-dreny mba hifady ny fifangajangana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Anaka, raha niantoka ny namanao ianao Ary nandray tanana hiantoka ny hafa, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mbola hatory kely ihany, mbola ho renoka kely ihany, Ary mbola hanohon-tanana kely hatory, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia ho tonga toy ny lehilahy mimaona hamely ny alahelonao, Ary ny fahantranao ho toy ny jiolahy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ny olona tena ratsy fanahy sy mpanao ratsy Dia ilay mandehandeha manao vava ratsy, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Izay mami-maso sy manao famantarana amin''ny tongony Ary manao baiko amin''ny rantsan-tànany; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fahafetsena no ao am-pony, Mihevi-dratsy mandrakariva izy Sady mamafy ady. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary noho izany dia ho avy tampoka kosa ny loza hanjo azy; Ho torotoro tampoka izy, ka tsy hisy fahasitranana.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Izao enina izao no halan''i Jehovah, Eny, fito no ataony ho fahavetavetana: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ny maso miavonavona, ny lela fandainga, Ary ny tanana mandatsa-drà marina, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ny fo mamoron-tsain-dratsy, Ny tongotra malaky mihazakazaka hanao ratsy, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ny mamoaka lainga ho vavolombelona tsy marina, Ary ny mamafy ady ao amin'ny rahalahy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ka voafandriky ny teny naloaky ny vavanao ianao Sady voasingotry ny teny naloaky ny vavanao, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Anaka, tandremo ny didin-drainao, Ary aza mahafoy ny lalàn-dreninao. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Afatory amin''ny fonao mandrakariva ireo, Ary afehezo eo am-bozonao, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Raha mandeha ianao, dia hitari-dalana anao ireo; Raha mandry ianao, dia hiambina anao; Ary raha mifoha ianao, dia hamelona eritreritra anao. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fa jiro ny didy, ary fanazavana ny lalàna, Ary lalan''aina ny anatra famaizana, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Hiarovana anao amin'ny vehivavy ratsy fanahy, Ary amin'ny fandroboan'ny lelan'ny vahiny janga
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. lelam-bahiny
      marker-yv: yv-n
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Aoka ny fonao tsy haniry ny hatsaran-tarehiny; Ary aoka tsy hahazo anao amin''ny hodimasony izy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fa noho ny vehivavy mpijangajanga no mila tsy hananan''ny lehilahy sombi-mofo, Ary ny amin''ny vadin''ny olona no mihaza ny aina soa. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Mahatondra afo ao an-tratran''akanjony va ny olona, Ka tsy ho may ny akanjony? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Misy mahadia vain''afo va, Ka tsy ho may ny tongony? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Dia toy izany izay mankamin''ny vadin''ny namany; Tsy maintsy hampijalina izay mikasika azy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia izao no ataovy, anaka, ka afaho ny tenanao (Satria efa mby eo an-tanan''ny namanao ianao): Andeha mihohoka sy mifona mafy amin''ny namanao. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Tsy avelan''ny olona ho afa-maina ny mpangalatra, Raha maka zavatra hahavoky ny tenany izy, na dia noana aza; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Fa
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Ny olona tsy manome tsiny ny mpangalatra, noana; Nefa'
      marker-yv: yv-n
    - type: text
      text: ' raha azo izy, dia hampanoneriny fito heny Ka hanome ny fananana rehetra ao an-tranony. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Izay mijangajanga amin''ny vehivavy dia tsy ampy saina; Izay ta-hanimba tena no manao izany. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Voakapoka sy afa-baraka izy Ary tsy ho afaka amin''ny tondro-molotra. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Fa ny fahasaro-piaro dia mampirehitra ny fahatezeran-dehilahy, Koa tsy hamindra fo izy amin''ny andro hamaliany. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Tsy handray vola ho enti-manalady
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. avotra
      marker-yv: yv-n
    - type: text
      text: ' akory izy, Ary tsy hety, na dia omenao fanambatambazana be aza.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Aza avela hatory akory ny masonao, Ary aza avela hilondolondo ny hodimasonao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Afaho ny tenanao toy ny gazela
    - type: usfm
      marker: x
      children:
      - type: text
        text: Izahao 2 Sam. ii.18
      marker-yv: yv-n
    - type: text
      text: ' miala amin''izay mihazona azy, Ary toy ny voron-kely miala amin''ny tanan''ny mpamandrika.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mandehana any amin''ny vitsika, ry ilay malaina; Diniho ny fanaony, ka mba hendre; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Tsy manana komandy ireny, Na mpifehy, na mpanapaka, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Nefa mamory ny haniny raha fahavaratra izy, Ary manangona ny fihinany amin''ny fararano. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mandra-pahoviana no mbola handry ihany ianao, ry ilay malaina? Rahoviana no hifoha amin''ny torimasonao ianao? '
