document_id: PRO.6,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fananarana hankatò tsara ny ana-dray aman-dreny mba hifady ny fifangajangana
  - type: text
    content: 'Anaka, raha niantoka ny namanao ianao Ary nandray tanana hiantoka ny hafa, '
  '10':
  - type: text
    content: 'Mbola hatory kely ihany, mbola ho renoka kely ihany, Ary mbola hanohon-tanana kely hatory, '
  '11':
  - type: text
    content: 'Dia ho tonga toy ny lehilahy mimaona hamely ny alahelonao, Ary ny fahantranao ho toy ny jiolahy. '
  '12':
  - type: text
    content: 'Ny olona tena ratsy fanahy sy mpanao ratsy Dia ilay mandehandeha manao vava ratsy, '
  '13':
  - type: text
    content: 'Izay mami-maso sy manao famantarana amin''ny tongony Ary manao baiko amin''ny rantsan-tànany; '
  '14':
  - type: text
    content: 'Fahafetsena no ao am-pony, Mihevi-dratsy mandrakariva izy Sady mamafy ady. '
  '15':
  - type: text
    content: Ary noho izany dia ho avy tampoka kosa ny loza hanjo azy; Ho torotoro tampoka izy, ka tsy hisy fahasitranana.
  '16':
  - type: text
    content: 'Izao enina izao no halan''i Jehovah, Eny, fito no ataony ho fahavetavetana: '
  '17':
  - type: text
    content: 'Ny maso miavonavona, ny lela fandainga, Ary ny tanana mandatsa-drà marina, '
  '18':
  - type: text
    content: 'Ny fo mamoron-tsain-dratsy, Ny tongotra malaky mihazakazaka hanao ratsy, '
  '19':
  - type: text
    content: Ny mamoaka lainga ho vavolombelona tsy marina, Ary ny mamafy ady ao amin'ny rahalahy.
  '2':
  - type: text
    content: 'Ka voafandriky ny teny naloaky ny vavanao ianao Sady voasingotry ny teny naloaky ny vavanao, '
  '20':
  - type: text
    content: 'Anaka, tandremo ny didin-drainao, Ary aza mahafoy ny lalàn-dreninao. '
  '21':
  - type: text
    content: 'Afatory amin''ny fonao mandrakariva ireo, Ary afehezo eo am-bozonao, '
  '22':
  - type: text
    content: 'Raha mandeha ianao, dia hitari-dalana anao ireo; Raha mandry ianao, dia hiambina anao; Ary raha mifoha ianao, dia hamelona eritreritra anao. '
  '23':
  - type: text
    content: 'Fa jiro ny didy, ary fanazavana ny lalàna, Ary lalan''aina ny anatra famaizana, '
  '24':
  - type: text
    content: Hiarovana anao amin'ny vehivavy ratsy fanahy, Ary amin'ny fandroboan'ny lelan'ny vahiny janga
  - type: note
    content: Heb. lelam-bahiny
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'Aoka ny fonao tsy haniry ny hatsaran-tarehiny; Ary aoka tsy hahazo anao amin''ny hodimasony izy. '
  '26':
  - type: text
    content: 'Fa noho ny vehivavy mpijangajanga no mila tsy hananan''ny lehilahy sombi-mofo, Ary ny amin''ny vadin''ny olona no mihaza ny aina soa. '
  '27':
  - type: text
    content: 'Mahatondra afo ao an-tratran''akanjony va ny olona, Ka tsy ho may ny akanjony? '
  '28':
  - type: text
    content: 'Misy mahadia vain''afo va, Ka tsy ho may ny tongony? '
  '29':
  - type: text
    content: 'Dia toy izany izay mankamin''ny vadin''ny namany; Tsy maintsy hampijalina izay mikasika azy. '
  '3':
  - type: text
    content: 'Dia izao no ataovy, anaka, ka afaho ny tenanao (Satria efa mby eo an-tanan''ny namanao ianao): Andeha mihohoka sy mifona mafy amin''ny namanao. '
  '30':
  - type: text
    content: 'Tsy avelan''ny olona ho afa-maina ny mpangalatra, Raha maka zavatra hahavoky ny tenany izy, na dia noana aza; '
  '31':
  - type: text
    content: Fa
  - type: note
    content: 'Na: Ny olona tsy manome tsiny ny mpangalatra, noana; Nefa'
  - type: text
    content: ' raha azo izy, dia hampanoneriny fito heny Ka hanome ny fananana rehetra ao an-tranony. '
  '32':
  - type: text
    content: 'Izay mijangajanga amin''ny vehivavy dia tsy ampy saina; Izay ta-hanimba tena no manao izany. '
  '33':
  - type: text
    content: 'Voakapoka sy afa-baraka izy Ary tsy ho afaka amin''ny tondro-molotra. '
  '34':
  - type: text
    content: 'Fa ny fahasaro-piaro dia mampirehitra ny fahatezeran-dehilahy, Koa tsy hamindra fo izy amin''ny andro hamaliany. '
  '35':
  - type: text
    content: Tsy handray vola ho enti-manalady
  - type: note
    content: Heb. avotra
  - type: text
    content: ' akory izy, Ary tsy hety, na dia omenao fanambatambazana be aza.'
  '4':
  - type: text
    content: 'Aza avela hatory akory ny masonao, Ary aza avela hilondolondo ny hodimasonao. '
  '5':
  - type: text
    content: Afaho ny tenanao toy ny gazela
  - type: note
    content: Izahao 2 Sam. ii.18
  - type: text
    content: ' miala amin''izay mihazona azy, Ary toy ny voron-kely miala amin''ny tanan''ny mpamandrika.'
  '6':
  - type: text
    content: 'Mandehana any amin''ny vitsika, ry ilay malaina; Diniho ny fanaony, ka mba hendre; '
  '7':
  - type: text
    content: 'Tsy manana komandy ireny, Na mpifehy, na mpanapaka, '
  '8':
  - type: text
    content: 'Nefa mamory ny haniny raha fahavaratra izy, Ary manangona ny fihinany amin''ny fararano. '
  '9':
  - type: text
    content: 'Mandra-pahoviana no mbola handry ihany ianao, ry ilay malaina? Rahoviana no hifoha amin''ny torimasonao ianao? '
