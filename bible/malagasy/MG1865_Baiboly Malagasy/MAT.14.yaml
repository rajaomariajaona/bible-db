document_id: MAT.14
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin''izany andro izany Heroda mpanapaka nandre ny lazan''i Jesosy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka hoy izy tamin''ny mpanompony: Jaona Mpanao-batisa izay; efa nitsangana tamin''ny maty izy, koa izany no ananany hery hanao izany asa lehibe izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa Heroda efa nisambotra an''i Jaona, dia namatotra azy ka nanao azy tao an-tranomaizina, noho ny tamin''i Herodiasy, vadin''i Filipo rahalahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa Jaona efa nilaza taminy hoe: Diso ianao, raha manambady azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Heroda naniry hamono azy, saingy natahotra ny vahoaka izy, satria nataon''ireo ho mpaminany Jaona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa nony tonga ny fitsingerenan''ny taona nahaterahan''i Heroda, dia nandihy teo anatrehany ny zanakavavin''i Herodiasy ka nahafaly an''i Heroda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary noho izany dia nianiana izy fa hanome azy izay hangatahiny na inona na inona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary rehefa nomen-dreniny saina razazavavy, dia nanao hoe: Omeo ahy eto an-dovia ny lohan''i Jaona Mpanao-batisa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nalahelo ny mpanjaka; kanefa noho ny fianianany sy ny olona izay niara-nipetraka nihinana teo aminy, dia nandidy ihany izy mba homena izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary dia naniraka hanapaka ny lohan''i Jaona tao an-tranomaizina izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia nentina an-dovia ny lohany ka nomena ilay zazavavy; ary izy nitondra azy ho ao amin-dreniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary avy ny mpianany, dia naka ny faty ka nandevina azy; ary dia lasa izy ka nilaza tamin''i Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary nony nandre izany Jesosy, dia niondrana an-tsambokely niala teo handeha hitokana any an-tany foana; ary raha nandre izany ny vahoaka, dia niala teny amin'ny tanàna maro izy ka nandeha an-tanety
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: nandeha tongotra'
    marker-yv: yv-n
  - type: text
    text: ' nanaraka Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nony nivoaka Jesosy, dia nahita vahoaka betsaka, ary onena azy ka nahasitrana ny marariny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nony hariva ny andro, dia nanatona Azy ny mpianatra ka nanao hoe: Tany foana ity, ary efa hariva ny andro izao; ravao ny vahoaka, mba hankanesany eny amin''ny vohitra hividy hanina ho azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa hoy Jesosy taminy: Tsy tokony handeha izy; omeonareo hanina izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa hoy ny mpianany taminy: Tsy misy atỳ aminay, afa-tsy mofo dimy sy hazandrano roa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy Izy: Ento eto amiko izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia nasainy nipetraka teny ambonin''ny ahitra ny vahoaka, ary noraisiny ny mofo dimy sy ny hazandrano roa, dia niandrandra ny lanitra Izy ka nisaotra; ary nony efa novakiny ny mofo, dia natolony ny mpianatra, ary ny mpianatra kosa nanolotra ho an''ny vahoaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nihinana avokoa izy rehetra, ka dia voky; ary nangoniny ny sombintsombiny sisa tsy lany, ka dia nahafeno harona roa ambin''ny folo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary izay nihinana dia tokony ho dimy arivo lahy, afa-tsy ny zaza amim-behivavy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary niaraka tamin''izay dia nanery ny mpianatra hiondrana an-tsambokely Jesosy ka hita eo alohany ho eny am-pita mandra-pandràvany ny vahoaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary rehefa noravany ny vahoaka, dia niakatra tao an-tendrombohitra Izy mba hitokana hivavaka; ary nony hariva ny andro, dia nitoetra irery teo Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary efa mby teo ampovoan''ny ranomasina ny sambokely tamin''izay, dia natopatopan''ny alon-drano izy, fa notohain''ny rivotra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary tamin''ny fiambenana fahefatra amin''ny alina dia nankeny amin''ny mpianany Jesosy, nitsangantsangana teny ambonin''ny ranomasina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary nony nahita Azy nitsangantsangana tambonin''ny ranomasina ny mpianatra, dia raiki-tahotra ka nanao hoe: Matoatoa io; dia niantso izy noho ny tahotra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary Jesosy niteny taminy niaraka tamin''izay hoe: Matokia, fa Izaho ihany, aza matahotra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary Petera namaly Azy ka nanao hoe: Tompoko, raha Hianao ihany, dia asaovy manatona Anao eny ambonin''ny rano aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary hoy Izy: Manatona. Dia nidina niala tamin''ny sambokely Petera ka nandeha tambonin''ny rano hanatona an''i Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Fa raha nahita ny rivotra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (rivotra mahery)'
    marker-yv: yv-n
  - type: text
    text: ' izy, dia natahotra, ary raha vao nilentika izy, dia niantso hoe: Tompo ô, vonjeo aho! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary naninjitra ny tànany niaraka tamin''izay Jesosy, dia nandray azy ka nanao taminy hoe: Ry kely finoana, nahoana no niahanahana ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary rehefa niakatra teo an-tsambokely izy, dia nitsahatra ny rivotra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary izay teo an-tsambokely dia niankohoka teo anatrehany ka nanao hoe: Zanak''Andriamanitra tokoa Hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary nony tafita izy, dia tonga teo an-tanety, any Genesareta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary nony nahafantatra Azy ny tompon-tany teo, dia naniraka tany amin''ny tany rehetra manodidina izy ka nitondra ny marary rehetra ho eo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ary nangataka taminy ireo mba hamela azy hanendry na dia ny somotraviavin-dambany ihany aza; koa na iza na iza no nanendry dia sitrana tokoa.
