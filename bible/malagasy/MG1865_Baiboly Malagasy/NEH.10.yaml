document_id: NEH.10,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary noho izany rehetra izany dia manao fanekena mafy izahay, ka soratanay izany ary manisy tombo-kase eo aminy ny mpanapaka anay sy ny Levitanay ary ny mpisoronay. '
  '10':
  - type: text
    content: 'Ary ny Levita kosa dia Jesoa, zanak''i Azania, Binoy isan''ny zanak''i Henadada, ary Kadmiela; '
  '11':
  - type: text
    content: 'ary ny rahalahin''ireo dia Sebania, Hodia, Kelita, Pelaia, Hanana, '
  '12':
  - type: text
    content: 'Mika, Rehoba, Hasabia, '
  '13':
  - type: text
    content: 'Zakora, Serebia, Sebania, '
  '14':
  - type: text
    content: 'Hodia, Bany Benino. '
  '15':
  - type: text
    content: 'Ary ny loholona kosa dia Parosy, Pahata-moaba, Elama, Zato, Bany, '
  '16':
  - type: text
    content: 'Bony, Azgada, Bebay, '
  '17':
  - type: text
    content: 'Adonia, Bigvay, Adina, '
  '18':
  - type: text
    content: 'Atera, Hezekia, Azora, '
  '19':
  - type: text
    content: 'Hodia, Hasoma, Bezay, '
  '2':
  - type: text
    content: 'Ary ny nanisy tombo-kase dia Nehemia governora, zanak''i Hakalia, sy Zedekia, '
  '20':
  - type: text
    content: 'Harifa, Anatota, Nebay, '
  '21':
  - type: text
    content: 'Magpiasy, Mesolama, Hezira, '
  '22':
  - type: text
    content: 'Mesezabela, Zadoka, Jadoa, '
  '23':
  - type: text
    content: 'Pelatia, Hanana, Anaia, '
  '24':
  - type: text
    content: 'Hosea, Hanania, Hasoba, '
  '25':
  - type: text
    content: 'Halohesy, Pila, Sobeka, '
  '26':
  - type: text
    content: 'Rehoma, Hasabna, Mahaseia, '
  '27':
  - type: text
    content: 'Ahia, Hanana, Anana, '
  '28':
  - type: text
    content: 'Maloka, Harima, Bana. '
  '29':
  - type: text
    content: 'Ary ny olona sisa, dia ny mpisorona sy ny Levita sy ny mpiandry varavarana sy ny mpihira sy ny Netinima, ary izay rehetra efa niavaka tamin''ny tompon-tany hanaraka ny lalàn''Andriamanitra mbamin''ny vadin''ireo sy ny zananilahy ary ny zananivavy, izay rehetra efa nahahaino, '
  '3':
  - type: text
    content: 'ary Seraia, Azaria, Jeremia, '
  '30':
  - type: text
    content: 'dia samy nikambana tsara tamin''ny andriandahy rahalahiny ka niozona sy nianiana hanaraka ny lalan''Andriamanitra, izay nampilazaina an''i Mosesy, mpanompon''Andriamanitra, ary hitandrina sy hankatò ny didy rehetra izay nataon''i Jehovah Tompontsika mbamin''ny fitsipika sy ny lalàny; '
  '31':
  - type: text
    content: 'ary tsy hanome ny zananivavy ho vadin''ny tompon-tany, na haka ny zananivavy ho vadin''ny zanakai-lahy; '
  '32':
  - type: text
    content: 'tsy hividy zavatra amin''ny andro Sabata, na amin''izay andro masina, raha misy entana na vary entin''ny tompon-tany hamidy amin''ny andro Sabata, ary tsy hamboly zavatra amin''ny taona fahafito sady hamoy izay trosa rehetra. '
  '33':
  - type: text
    content: 'Ary nanao lalàna ho anay koa izahay handoa ny ampahatelon-tsekely isan-taona hanaovana ny fanompoana momba ny tranon''Andriamanitsika: '
  '34':
  - type: text
    content: 'dia ho amin''ny mofo aseho sy ny fanatitra hohanina mandrakariva sy ny fanatitra dorana mandrakariva, ary ho amin''ny Sabata sy ny voaloham-bolana sy ny fotoam-pivavahana, ary ho amin''ny zava-masina sy ny fanatitra noho ny ota hanaovana fanavotana ho an''ny Isiraely, dia hanaovana ny raharaha rehetra momba ny tranon''Andriamanitsika. '
  '35':
  - type: text
    content: 'Ary nanao filokana izahay ny amin''ny hanateran''ny mpisorona sy ny Levita sy ny olona ny kitay hazo, hitondranay azy ho ao an-tranon''Andriamanitra araka ny fianakavianay avy amin''ny fotoan''andro isan-taona, handoroana eo ambonin''ny alitaran''i Jehovah Andriamanitsika araka izay voasoratra ao amin''ny lalàna, '
  '36':
  - type: text
    content: 'ary mba hitondranay ny voaloham-bokatry ny taninay sy ny voaloham-bokatry ny hazo mamoa rehetra ho ao an-tranon''i Jehovah isan-taona isan-taona; '
  '37':
  - type: text
    content: 'ary ny lahimatoanay sy ny voalohan-teraky ny biby fiompinay, araka izay voasoratra ao amin''ny lalàna, ary ny voalohan-teraky ny ombinay sy ny ondry aman''osinay dia nekenay hohentina ho an-tranon''i Jehovah Andriamanitsika, ho an''ny mpisorona izay manao fanompoam-pivavahana ao an-tranon''Andriamanitsika; '
  '38':
  - type: text
    content: 'ary mba hitondranay ho an''ny mpisorona koa ny voalohan''ny kobanay voafetafeta sy ny fanatitra asandratray sy ny voaloham-bokatry ny hazo rehetra sy ny ranom-boaloboka ary ny diloilo ho amin''ny efi-trano ao an-tranon''Andriamanitsika, ary ny ampahafolon''ny vokatry ny taninay ho an''ny Levita; fa ny Levita no mpandray ny fahafolon-karena eny an-tanàna rehetra akaikin''ny fambolenay. '
  '39':
  - type: text
    content: Ary hisy mpisorona anankiray, taranak'i Arona, hiaraka amin'ny Levita, raha mandray ny fahafolon-karena izy; ary ny ampahafolon'ny fahafolon-karena dia ho entin'ny Levita miakatra ho ao an-tranon'Andriamanitsika, ho ao amin'ny efi-trano ao an-trano fitehirizan-drakitra. Fa ho ao amin'ireo efi-trano ireo no hitondran'ny Zanak'Isiraely sy ny Levita ny fanatitra asandratra, dia vary sy ranom-boaloboka ary diloilo, dia ho ao amin'ilay itoeran'ny fanaky ny fitoerana masina sy ny mpisorona izay manao fanompoam-pivavahana sy ny mpiandry varavarana ary ny mpihira; ary tsy hahafoy ny tranon'Andriamanitsika izahay.
  '4':
  - type: text
    content: 'Pasora, Amaria, Malkia, '
  '5':
  - type: text
    content: 'Hatosy, Sebania, Maloka, '
  '6':
  - type: text
    content: 'Harima, Meremota, Obadia, '
  '7':
  - type: text
    content: 'Daniela, Ginetona, Baroka, '
  '8':
  - type: text
    content: 'Mesolama, Abia, Miamina, '
  '9':
  - type: text
    content: 'Mazia, Bilgay, Semaia; samy mpisorona ireo. '
