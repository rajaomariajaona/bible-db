document_id: 2SA.4,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny namonoana an'Isboseta, sy ny namalian'i Davida ireo namono azy kosa
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary nony ren''ny zanakalahin''i Saoly fa maty tany Hebrona Abnera, dia niraviravy tanana izy, ary raiki-tahotra ny Isiraely rehetra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'ilay nanambara tamiko hoe: Indro, maty Saoly, ka nanao ny tenany ho mpitondra teny mahafaly, dia nohazoniko ka novonoiko tao Ziklaga. hanomezako azy ny valin'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: dia olona nampoizina homeko valim-pitia noho'
      marker-yv: yv-n
    - type: text
      text: '''ny teny mahafaly nentiny; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'koa mainka raha misy olon-dratsy mamono lehilahy marina ao an-tranony eo am-pandriany; koa tsy hadiniko eo an-tananareo va ny ràny, ary tsy hofongorako tsy ho amin''ny tany intsony va ianareo '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary Davida nandidy ny zatovony, dia namono azy ireo, ka notapahiny ny tanany sy ny tongony, dia nahantony teo anilan'ny kamory tao Hebrona. Fa ny lohan'Isboseta kosa dia nentina ka nalevina tao am-pasan'i Abnera tao Hebrona.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary nisy roa lahy, lehiben''ny mpitohan''ny zanakalahin''i Saoly, Bana no anaran''ny iray, ary Rekaba no anaran''ny iray, samy zanak''i Rimona Berotita tamin''ny taranak''i Benjamina (fa Berota koa natao ho isan''ny an''i Benjamina; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ary ny Berotita nandositra nankany Gitaima, dia nivahiny tany mandraka androany).
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary Jonatana, zanak''i Saoly, nanan-janakalahy malemy tongotra. Dimy taona izy, fony tonga avy tany Jezirela ny filazana ny amin''i Saoly sy Jonatana; ary nentin''ny mpitaiza azy nandositra izy; ary raha nentiny nandositra tamin''ny fahatairana izy, dia nianjera ka tonga malemy tongotra, Mefiboseta no anarany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary Rekaba sy Bana, zanak''i Rimona Berotita, nandeha; ka rehefa nafana ny andro, dia tonga tao an-tranon''Isboseta, tamin''ilay izy nandriandry tamin''ny antoandro iny. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary niditra tao anaty trano Rekaba sy Bana rahalahiny haka vary, ka namely azy tamin''ny kibony, dia lasa nandositra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa raha niditra tao an-trano izy roa lahy, ary Isboseta nandry teo amin'ny fandriany tao amin'ny trano fandriany dia namely azy izy roa lahy ka nahafaty azy, dia notapahiny ny lohany ka nentiny; ary nandeha mandritra ny alina namaky ny tani-hay
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Arabà
      marker-yv: yv-n
    - type: text
      text: ' izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary nitondra ny lohan''Isboseta tany amin''i Davida tao Hebrona izy ka nanao tamin''ny mpanjaka hoe: Indro ny lohan''Isboseta, zanak''i Saoly fahavalonao, izay nitady ny ainao; fa Jehovah efa namaly an''i Saoly sy ny taranany androany noho ny amin''ny mpanjaka tompoko. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary hoy Davida tamin''i Rekaba sy Bana rahalahiny, zanak''i Rimona Berotita: Raha velona koa Jehovah, Izay namonjy ahy tamin''ny fahoriana rehetra, '
