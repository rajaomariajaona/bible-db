document_id: EZR.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny alahelon'i Ezra, raha nahare fa ny Jiosy efa nifanambady tamin'ny firenena hafa, ary ny nibebahan'ny olona tamin'izany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary rehefa vita izany rehetra izany, dia nanatona ahy ny mpanapaka ka nanao hoe: Ny Isiraely sy ny mpisorona ary ny Levita dia tsy mbola miavaka amin''ny olona tompon-tany, fa manao araka ny fahavetavetan''ny Kananita sy ny Hetita sy ny Perizita sy ny Jebosita sy ny Amonita sy ny Moabita sy ny Egyptiana ary ny Amorita ihany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa efa naka tamin''ny zanakavavin''ireo ho vadiny sy ho vadin''ny zananilahy izy, ka efa miharoharo amin''ny olona tompon-tany ny taranaka masina; eny, ny lehibe sy ny mpanapaka aza no nitari-dalana tamin''izany fahadisoana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nony nandre izany zavatra izany aho, dia nandriatra ny lambako sy ny akanjoko sady nandrompotra ny volon-dohako sy ny somotro, dia nipetraka tahaka ilay torana iny aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nivory teo amiko izay rehetra nangovitra noho ny tenin''Andriamanitry ny Isiraely ny amin''ny fahadisoan''ny olona izay efa niverina avy tamin''ny fahababoana; ary izaho mbola nipetraka tahaka ilay torana iny ihany hatramin''ny fotoan''ny fanatitra hariva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nony tamin''ny fotoan''ny fanatitra hariva dia nody ny aiko, ka nitsangana aho, sady nandriatra ny lambako sy ny akanjoko indray, dia nandohalika nanandratra ny tanako ho amin''i Jehovah Andriamanitro aho '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ka nanao hoe: Andriamanitro ô, menatra sy mangaihay aho, raha miandrandra aminao, ry Andriamanitro ô; fa efa nihamaro mihoatra ny lohanay ny helokay, ary ny fahotanay dia lehibe manakatra ny lanitra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'fa hatramin''ny andron''ny razanay ka mandraka androany dia lehibe ny helokay; ary ny helokay no nanolorana anay sy ny mpanjakanay ary ny mpisoronay ho eo an-tànan''ny mpanjakan''ny tany hafa, hovonoin-tsabatra sy ho babo sy ho voaroba ary hangaihay tahaka ny amin''izao anio izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Koa ankehitriny vao niseho vetivety ny fahasoavana avy tamin'i Jehovah Andriamanitray tamin'ny namelany anay ho nisy sisa afaka sy tamin'ny nanomezany anay fihantonana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Izahao Isa. xxii. 23
    marker-yv: yv-n
  - type: text
    text: ' eo amin''ny fitoerany masina, mba hohazavain''Andriamanitray ny masonay ka homena famelombelomana kely amin''ny fahandevozanay izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa andevo izahay, nefa tsy nafoin''Andriamanitray, na dia tamin''ny fahandevozanay aza, fa nataony nahazo famindram-po eto imason''ireo mpanjakan''i Persia ihany hanomezany anay famelombelomana, hanangananay ny tranon''Andriamanitray sy hanamboaranay ny rava eo, ary hanomezany anay manda any Joda sy Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa ankehitriny, ry Andriamanitray ô, ahoana no holazainay amin''izany? Fa efa nahafoy ny didinao izahay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'dia ilay nampilazainao ny mpaminany mpanomponao hoe: Ny tany izay efa hidiranareo holovana dia tany maloto noho ny fahalotoan''ny tompon-tany sy ny fahavetavetany, izay efa nataony manenika azy noho ny fahalotoany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'koa aza manome ny zanakareo-vavy ho vadin''ny zananilahy, na maka ny zananivavy ho vadin''ny zanakareo-lahy; aza mitady izay hiadanany na izay hahasoa azy mandrakizay, mba hahery ianareo ka hihinana ny soa avy amin''ny tany, dia hamela izany ho lovan''ny taranakareo mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary na dia efa nanjo anay aza izany rehetra izany noho ny asa ratsinay sy ny fahadisoanay betsaka, dia tsy nampijaly anay araka ny helokay Hianao Andriamanitray, fa efa namela anay ho nisy sisa afaka toy izao ihany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'fa raha handika ny didinao indray izahay ka hifanambady amin''ireny olom-betaveta ireny, moa tsy ho tezitra aminay mandra-pahalany ritranay va Hianao, ka tsy hisy sisa afaka akory? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Jehovah, Andriamanitry ny Isiraely ô, marina Hianao, fa izahay no hany sisa afaka tahaka ny amin'izao anio izao; indreto izahay eto anatrehanao amin'ny fahadisoanay, fa noho izany dia tsy mahajanona eto anatrehanao izahay.
