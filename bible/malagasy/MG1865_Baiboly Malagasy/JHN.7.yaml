document_id: JHN.7,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa afaka izany, dia nandeha tany Galilia Jesosy; fa nalain-kandeha tany Jodia Izy, satria nitady hahafaty Azy ny Jiosy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa rehefa lasa niakatra ho amin''ny andro firavoravoana ny rahalahiny, dia niakatra koa Izy, nefa tsy mba nisehoseho, fa toa niafinafina. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny Jiosy dia nitady Azy tamin''ny andro firavoravoana ka nanao hoe: Aiza Izy? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitakoritsika Azy be ihany ny vahoaka. Hoy ny sasany: Tsara fanahy Izy; fa hoy kosa ny sasany; Tsia; fa mamitaka ny vahoaka Izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa tsy nisy sahy niresaka Azy miharihary noho ny fahatahorany ny Jiosy.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nisasaka ny andro firavoravoana, dia niakatra teo an-kianjan''ny tempoly Jesosy ka nampianatra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia gaga ny Jiosy ka nanao hoe: Ahoana no nahaizan''ilehity soratra, nefa tsy mba nianatra Izy? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly azy Jesosy ka nanao hoe: Tsy Ahy ny fampianarako, fa an''izay naniraka Ahy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha misy olona ta-hanao ny sitrapony, dia hahalala ny amin''ny fampianarana izy, na avy amin''Andriamanitra izany, na miteny ho Ahy Aho. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay miteny ho azy dia mitady ny voninahitry ny tenany; fa izay mitady ny voninahitr''izay naniraka azy no marina, ary tsy misy tsi-fahamarinana ao aminy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy Mosesy va no nanome anareo ny lalàna? nefa tsy misy eo aminareo mankatò ny lalàna. Nahoana ianareo no mitady hamono Ahy? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary efa akaiky ny andro firavoravoan''ny Jiosy, dia ny amin''ny Tabernakely, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vahoaka namaly hoe: Manana demonia Hianao; iza no mitady hamono Anao? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesosy namaly ka nanao taminy hoe: Asa iray loha ihany no nataoko, ka gaga avokoa ianareo rehetra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no nanomezan''i Mosesy anareo ny famorana: tsy noho izy avy tamin''i Mosesy, fa noho izy avy tamin''ny razana, ka na dia amin''ny Sabata aza dia mamora olona ihany ianareo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha amin''ny Sabata aza no amorana olona, mba tsy hahafoana ny lalàn''i Mosesy, dia tezitra amiko va ianareo, satria nisy olona anankiray nataoko sitrana avokoa ny tenany rehetra tamin''ny Sabata. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mitsara araka ny miseho, fa mba mitsarà marina. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mponina sasany tany Jerosalema dia nanao hoe: Tsy Ilehity va Ilay tadiaviny hovonoina? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary indro Izy miteny miharihary, nefa tsy misy miteny Azy akory. Sao efa fantatry ny mpanapaka anie fa Io no Kristy? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa fantatsika izay nihavian''ilehio, fa raha avy Kristy, tsy misy mahalala izay hihaviany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niantso teo an-kianjan''ny tempoly Jesosy, raha nampianatra, ka nanao hoe: Izaho dia fantatrareo, sady fantatrareo koa izay nihaviako; ary tsy avy ho Ahy Aho, fa marina ny naniraka Ahy, Izay tsy fantatrareo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho mahalala Azy; fa Izy no nihaviako, ka Izy no naniraka Ahy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka hoy ny rahalahiny taminy: Mialà eto, ka mandehana ho any Jodia, mba ho hitan''ny mpianatrao koa ny asa izay ataonao; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitady hisambotra Azy ny olona; kanefa tsy nisy naninji-tanana taminy, satria tsy mbola tonga ny fotoany. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary maro ny vahoaka no nino Azy ka nanao hoe: Raha tonga Kristy, moa hanao famantarana maro mihoatra noho ny nataon''ity Lehilahy ity va Izy? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny Fariseo nandre ny vahoaka nitakoritsika izany zavatra izany ny aminy; ary ny lohan''ny mpisorona sy ny Fariseo dia naniraka mpiandry raharaha mba hisambotra Azy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jesosy: Kely foana no itoerako aminareo, dia hankany amin''izay naniraka Ahy Aho. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hitady Ahy ianareo, fa tsy hahita; ary izay itoerako dia tsy azonareo haleha. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niresaka hoe ny Jiosy: Hankaiza moa no halehan''ilehity, no tsy ho hitantsika? Hankany amin''izay miely any amin''ny Grika va Izy ka hampianatra ny Grika? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahoana re izao teny nolazainy izao hoe: Hitady Ahy ianareo, fa tsy hahita; ary izay itoerako tsy azonareo haleha? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin''ny andro farany, izay andro lehibe tamin''ny andro firavoravoana, dia nitsangana Jesosy ka niantso nanao hoe: Raha misy olona mangetaheta, aoka izy hanatona Ahy ka hisotro. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay mino Ahy, dia hisy onin''ny rano velona miboiboika avy ao an-kibony, araka ny voalazan''ny Soratra Masina. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny Fanahy, Izay efa horaisin'ny mino Azy, no nolazainy tamin'izany; fa ny Fanahy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Fanahy Masina'
      marker-yv: yv-n
    - type: text
      text: ' tsy mbola nomena, satria Jesosy tsy mbola niditra tamin''ny voninahiny. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa tsy misy olona manao zavatra amin'ny takona, nefa ny tenany mitady ho hita miharihary
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: mitady ho hita fa matoky'
      marker-yv: yv-n
    - type: text
      text: '; raha manao izany zavatra izany Hianao, dia misehoa amin''izao tontolo izao. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny sasany tamin''ny vahoaka, raha nandre izany teny izany, dia nanao hoe: Ity tokoa no Ilay Mpaminany. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy ny sasany: Ity no Kristy. Fa hoy kosa ny sasany: Avy any Galilia va no ihavian''i Kristy? '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy voalazan''ny Soratra Masina va fa Kristy dia avy amin''ny taranak''i Davida, sady avy ao Betlehema, vohitra nonenan''i Davida (Mik. 5. 1)? '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nisara-tsaina ny amin''i Jesosy ny vahoaka. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny sasany nitady hisambotra Azy; kanefa tsy nisy naninji-tanana taminy. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpiandry raharaha nankeo amin''ny lohan''ny mpisorona sy ny Fariseo, ka hoy izy ireo taminy: Nahoana ianareo no tsy nitondra Azy? '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpiandry raharaha namaly hoe: Tsy mbola nisy olona niteny tahaka izany. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny Fariseo namaly azy hoe: Hianareo koa va voafitaka? '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa misy mpanapaka na Fariseo mba nino Azy? '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa voaozona ireto vahoaka ireto, izay tsy mahalala ny lalàna. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa na dia ny rahalahiny aza tsy nino Azy. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Nikodemosy, anankiray teo aminy, dia ilay nankeo amin''i Jesosy teo aloha, dia nanao taminy hoe: '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa manameloka olona va ny lalàntsika, raha tsy mbola mihaino azy aloha ka mahafantatra izay nataony? '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy ireo namaly ka nanao taminy hoe: Hianao koa angaha mba avy any Galilia? Diniho, dia ho hitanao fa tsy mba misy mpaminany avy any Galilia. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '[Dia samy lasa nody ho any an-tranony avy izy rehetra;]'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jesosy taminy: Tsy mbola tonga ny fotoako; fa ny fotoanareo dia vonona lalandava. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy mahazo mankahala anareo izao tontolo izao; fa Izaho no halany, satria milaza fa ratsy ny asany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miakara ho amin''ny andro firavoravoana ianareo; fa Izaho tsy mbola miakatra ho amin''ity andro firavoravoana ity; satria tsy mbola tonga ny fotoako. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa nilaza izany teny izany taminy Izy, dia mbola nitoetra tany Galilia ihany.
