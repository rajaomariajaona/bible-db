document_id: PSA.62
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiantombenan'ny fanahy izay manantena an'Andriamanitra, na dia mafy aza ny famelin'ny fahavalo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Al-jedotona. Salamo nataon''i Davida. Andriamanitra tokoa no iantombenan''ny fanahiko; avy aminy ny famonjena ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izy tokoa no vatolampiko sy famonjena ahy, dia fiarovana avo ho ahy ka tsy hangozohozo loatra aho. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mandra-pahoviana no hirohotanareo hamely olona sy handrodananareo rehetra azy toy ny manda mirona sy ny rova mihozongozona; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Misaina hanongana azy hiala amin'ny voninahiny ireny; lainga no ifaliany, misaotra amin'ny vavany izy, fa manozona amin'ny fony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Miantombena amin''Andriamanitra tokoa ianao, ry fanahiko; fa Izy no antenaiko. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izy tokoa no vatolampiko sy famonjena ahy, dia fiarovana avo ho ahy, ka tsy mba hangozohozo aho. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Andriamanitra no iankinan''ny famonjena ahy sy ny voninahitro; ny vatolampiko mafy sy ny aroko dia ao amin''Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Matokia Azy mandrakariva ianareo, ry olona; loary eo anatrehany ny fonareo; Andriamanitra no aro ho antsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Zava-poana tokoa ny ambany, ary lainga ny ambony; raha hatao amin''ny mizana izy, dia maivana; zava-poana mihitsy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Aza matoky ny fanaovana an-keriny, ary aza miantehitra amin''ny halatra; raha mitombo ny harena, dia aza anorenana ny fonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Indray mandeha no nitenenan''Andriamanitra; indroa no nandrenesako hoe: an''Andriamanitra ny hery. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary Anao koa, ry Tompo ô, ny famindram-po, fa Hianao no mamaly ny olona rehetra araka ny asany avy.
