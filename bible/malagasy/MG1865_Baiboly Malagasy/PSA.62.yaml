document_id: PSA.62,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantombenan'ny fanahy izay manantena an'Andriamanitra, na dia mafy aza ny famelin'ny fahavalo
  - type: text
    content: 'Ho an''ny mpiventy hira. Al-jedotona. Salamo nataon''i Davida. Andriamanitra tokoa no iantombenan''ny fanahiko; avy aminy ny famonjena ahy. '
  '10':
  - type: text
    content: 'Aza matoky ny fanaovana an-keriny, ary aza miantehitra amin''ny halatra; raha mitombo ny harena, dia aza anorenana ny fonareo. '
  '11':
  - type: text
    content: 'Indray mandeha no nitenenan''Andriamanitra; indroa no nandrenesako hoe: an''Andriamanitra ny hery. '
  '12':
  - type: text
    content: Ary Anao koa, ry Tompo ô, ny famindram-po, fa Hianao no mamaly ny olona rehetra araka ny asany avy.
  '2':
  - type: text
    content: 'Izy tokoa no vatolampiko sy famonjena ahy, dia fiarovana avo ho ahy ka tsy hangozohozo loatra aho. '
  '3':
  - type: text
    content: 'Mandra-pahoviana no hirohotanareo hamely olona sy handrodananareo rehetra azy toy ny manda mirona sy ny rova mihozongozona; '
  '4':
  - type: text
    content: Misaina hanongana azy hiala amin'ny voninahiny ireny; lainga no ifaliany, misaotra amin'ny vavany izy, fa manozona amin'ny fony.
  '5':
  - type: text
    content: 'Miantombena amin''Andriamanitra tokoa ianao, ry fanahiko; fa Izy no antenaiko. '
  '6':
  - type: text
    content: 'Izy tokoa no vatolampiko sy famonjena ahy, dia fiarovana avo ho ahy, ka tsy mba hangozohozo aho. '
  '7':
  - type: text
    content: 'Andriamanitra no iankinan''ny famonjena ahy sy ny voninahitro; ny vatolampiko mafy sy ny aroko dia ao amin''Andriamanitra. '
  '8':
  - type: text
    content: Matokia Azy mandrakariva ianareo, ry olona; loary eo anatrehany ny fonareo; Andriamanitra no aro ho antsika.
  '9':
  - type: text
    content: 'Zava-poana tokoa ny ambany, ary lainga ny ambony; raha hatao amin''ny mizana izy, dia maivana; zava-poana mihitsy izy. '
