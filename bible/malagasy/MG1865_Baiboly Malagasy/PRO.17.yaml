document_id: PRO.17
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Tsara ny sombi-mofo maina misy fiadanana Noho ny trano feno hena misy fifandirana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny mpanompo hendry dia hanapaka ny zanaka manao izay mahamenatra Sady hizara lova amin'ny mpirahalahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny memy ho an'ny volafotsy, ary ny fatana fandrendrehana ho an'ny volamena; Fa Jehovah ihany no Mpamantatra ny fo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny mpanao ratsy mampandry sofina amin'ny molotra mandainga; Ary ny mpandainga mihaino ny lela mampidi-doza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izay mihomehy ny malahelo manala baraka ny Mpanao azy; Ary izay faly amin''ny fahorian''ny sasany dia tsy maintsy hampijalina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Satroboninahitry ny antitra ny zafiny; Ary voninahitry ny zanaka ny rainy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny teny jadona tsy tandrifiny halahatry ny adala, Koa mainka fa tsy tokony ho an''ny zanak''andriana ny molotra mandainga. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny kolikoly dia toy ny vato soa eo imason''izay mahazo azy, Ka na aiza na aiza alehany dia ambinina ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay te-ho be fitiavana dia manaron-keloka; Fa izay mamohafoha teny mampisaraka ny tena mpisakaiza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny anatra dia manan-kery kokoa amin''ny hendry Noho ny kapoka injato amin''ny adala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny maditra dia fatra-pitady ny ratsy, Ka dia iraka lozabe no irahina hamely azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aleo mifanena amin'ny bera very anaka Toy izay amin'ny adala feno hadalana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izay mamaly ratsy ny soa, Ny ratsy tsy hiala ao an-tranony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny fiandohan'ny ady dia toy ny manata-drano, Koa ilaozy ny fifandirana, dieny tsy mbola mifandramatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izay manamarina ny meloka, na izay manameloka ny marina,Dia samy fahavetavetana eo imason'i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Hatao inona re ity vola an-tànan'ny adala? Hamidy fahendrena va? tsy manan-tsaina izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay tena sakaiza tokoa dia tia amin'ny andro rehetra, Sady miseho
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ateraka
    marker-yv: yv-n
  - type: text
    text: ' ho rahalahy hamonjy amin''ny fahoriana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Olona tsy ampy saina izay mifandray tanana Hiantoka eo anatrehan'ny sakaizany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Izay tia ady dia tia heloka; Ary izay manao vavahady avo mitady fahasimbana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izay madi-po tsy hahita soa; Ary izay manana lela mandainga hivarina any amin'ny loza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izay miteraka adala hahazo alahelo; Ary ny rain'ny adala tsy ho faly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny fo ravoravo mahasalama tsara; Fa ny fanahy kivy mahamaina ny taolana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny ratsy fanahy mandray kolikoly avy any anaty lamba Ho entiny mamadika ny rariny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Eo anoloan'ny manan-tsaina ny fahendrena; Fa ny mason'ny adala dia mibirioka any amin'ny faran'ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ny zanaka adala mampalahelo ny rainy Sady fahoriana mangidy amin''ny reniny niteraka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tsy mety raha mampijaly ny marina, Na mamely ny manan-kaja noho ny fahamarinany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tsy amin''ny rariny'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izay mahafihim-bava no manam-pahalalana; Ary izay mahatsindry fo no manan-tsaina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Na ny adala aza, raha tsy miteny, dia atao ho hendry, Ary izay mahafihim-bava dia toa manan-tsaina.
