document_id: PRO.17,96
type_code: plt
verses:
  '1':
  - type: text
    content: Tsara ny sombi-mofo maina misy fiadanana Noho ny trano feno hena misy fifandirana.
  '10':
  - type: text
    content: 'Ny anatra dia manan-kery kokoa amin''ny hendry Noho ny kapoka injato amin''ny adala. '
  '11':
  - type: text
    content: Ny maditra dia fatra-pitady ny ratsy, Ka dia iraka lozabe no irahina hamely azy.
  '12':
  - type: text
    content: Aleo mifanena amin'ny bera very anaka Toy izay amin'ny adala feno hadalana.
  '13':
  - type: text
    content: Izay mamaly ratsy ny soa, Ny ratsy tsy hiala ao an-tranony.
  '14':
  - type: text
    content: Ny fiandohan'ny ady dia toy ny manata-drano, Koa ilaozy ny fifandirana, dieny tsy mbola mifandramatra.
  '15':
  - type: text
    content: Izay manamarina ny meloka, na izay manameloka ny marina,Dia samy fahavetavetana eo imason'i Jehovah.
  '16':
  - type: text
    content: Hatao inona re ity vola an-tànan'ny adala? Hamidy fahendrena va? tsy manan-tsaina izy.
  '17':
  - type: text
    content: Izay tena sakaiza tokoa dia tia amin'ny andro rehetra, Sady miseho
  - type: note
    content: Heb. ateraka
  - type: text
    content: ' ho rahalahy hamonjy amin''ny fahoriana.'
  '18':
  - type: text
    content: Olona tsy ampy saina izay mifandray tanana Hiantoka eo anatrehan'ny sakaizany.
  '19':
  - type: text
    content: Izay tia ady dia tia heloka; Ary izay manao vavahady avo mitady fahasimbana.
  '2':
  - type: text
    content: Ny mpanompo hendry dia hanapaka ny zanaka manao izay mahamenatra Sady hizara lova amin'ny mpirahalahy.
  '20':
  - type: text
    content: Izay madi-po tsy hahita soa; Ary izay manana lela mandainga hivarina any amin'ny loza.
  '21':
  - type: text
    content: Izay miteraka adala hahazo alahelo; Ary ny rain'ny adala tsy ho faly.
  '22':
  - type: text
    content: Ny fo ravoravo mahasalama tsara; Fa ny fanahy kivy mahamaina ny taolana.
  '23':
  - type: text
    content: Ny ratsy fanahy mandray kolikoly avy any anaty lamba Ho entiny mamadika ny rariny.
  '24':
  - type: text
    content: Eo anoloan'ny manan-tsaina ny fahendrena; Fa ny mason'ny adala dia mibirioka any amin'ny faran'ny tany.
  '25':
  - type: text
    content: 'Ny zanaka adala mampalahelo ny rainy Sady fahoriana mangidy amin''ny reniny niteraka azy. '
  '26':
  - type: text
    content: Tsy mety raha mampijaly ny marina, Na mamely ny manan-kaja noho ny fahamarinany
  - type: note
    content: 'Na: tsy amin''ny rariny'
  - type: text
    content: .
  '27':
  - type: text
    content: Izay mahafihim-bava no manam-pahalalana; Ary izay mahatsindry fo no manan-tsaina.
  '28':
  - type: text
    content: Na ny adala aza, raha tsy miteny, dia atao ho hendry, Ary izay mahafihim-bava dia toa manan-tsaina.
  '3':
  - type: text
    content: Ny memy ho an'ny volafotsy, ary ny fatana fandrendrehana ho an'ny volamena; Fa Jehovah ihany no Mpamantatra ny fo.
  '4':
  - type: text
    content: Ny mpanao ratsy mampandry sofina amin'ny molotra mandainga; Ary ny mpandainga mihaino ny lela mampidi-doza.
  '5':
  - type: text
    content: 'Izay mihomehy ny malahelo manala baraka ny Mpanao azy; Ary izay faly amin''ny fahorian''ny sasany dia tsy maintsy hampijalina. '
  '6':
  - type: text
    content: Satroboninahitry ny antitra ny zafiny; Ary voninahitry ny zanaka ny rainy.
  '7':
  - type: text
    content: 'Ny teny jadona tsy tandrifiny halahatry ny adala, Koa mainka fa tsy tokony ho an''ny zanak''andriana ny molotra mandainga. '
  '8':
  - type: text
    content: 'Ny kolikoly dia toy ny vato soa eo imason''izay mahazo azy, Ka na aiza na aiza alehany dia ambinina ihany. '
  '9':
  - type: text
    content: Izay te-ho be fitiavana dia manaron-keloka; Fa izay mamohafoha teny mampisaraka ny tena mpisakaiza.
