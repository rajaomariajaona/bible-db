document_id: DEU.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny fitsarana sy ny fifidianana mpanjaka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tandremo ny volana Abiba, ka ataovy ny Paskan''i Jehovah Andriamanitrao fa tamin''ny volana Abiba no nitondran''i Jehovah Andriamanitrao anao nivoaka avy tany Egypta tamin''ny alina. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary vonoy ny Paskan''i Jehovah Andriamanitrao, dia ondry aman''osy sy omby, eo amin''ny tany izay hofidin''i Jehovah hampitoerany ny anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aza ny mofo misy masirasira no haninao aminy; hafitoana no hihinananao mofo tsy misy masirasira, dia mofom-pahoriana, fa tampoka no nivoahanao avy tany amin''ny tany Egypta, mba hotsarovanao amin''ny andro rehetra hiainanao ny andro izay nivoahanao avy tany amin''ny tany Egypta. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary aoka tsy hisy masirasira eo aminao ao anatin''ny fari-taninao rehetra hafitoana; ary aoka tsy hisy hitoetra miloaka alina ny henan''ny fanatitra izay novonoinao tamin''ny harivan''ny andro voalohany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsy hisy azonao hamonoana ny Paska ny tanànanao rehetra izay omen''i Jehovah Andriamanitrao anao; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'fa eo amin''ny fitoerana izay hofidin''i Jehovah Andriamanitrao hampitoerany ny anarany no hamonoanao azy rehefa hariva tokony ho maty masoandro, dia tahaka izay nivoahanao avy tany Egypta. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary atsatsiho amin''ny afo izy, ka hano eo amin''ny tany izay hofidin''i Jehovah Andriamanitrao; ary miverena nony maraina, ka modia any amin''ny lainao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Henemana no hihinananao mofo tsy misy masirasira; fa ny andro fahafito dia fara-fivoriana ho an'i Jehovah Andriamanitrao, ka tsy hanao raharaha ianao amin'izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Herinandro fito no hisainao ho anao: hatramin''ny andro iandohan''ny fijinjam-bary no hanisanao azy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary mitandrema andro firavoravoana manarakaraka ireo herinandro ho an''i Jehovah Andriamanitrao, ka manatera fanati-tsitrapo, izay homenao araka izay itahian''i Jehovah Andriamanitrao anao; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ary mifalia eo anatrehan''i Jehovah Andriamanitrao ianao sy ny zanakao-lahy sy ny zanakao-vavy ary ny ankizilahinao sy ny ankizivavinao ary ny Levita izay ao an-tanànanao mbamin''ny vahiny sy ny kamboty ary ny mpitondratena izay eo aminao, dia eo amin''ny tany izay hofidin''i Jehovah Andriamanitrao hampitoerany ny anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary tsarovy fa andevo tany Egypta ianao; koa tandremo sy araho ireo didy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tandremo hafitoana ny andro firavoravoana fitoerana amin''ny trano rantsan-kazo, rehefa nangoninao ny avy amin''ny famoloanao sy ny famiazanao. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary mifalia amin''ny andro firavoravoanao ianao sy ny zanakao-lahy sy ny zanakao-vavy sy ny ankizilahinao sy ny ankizivavinao ary ny Levita mbamin''ny vahiny sy ny kamboty ary ny mpitondratena izay ao an-tanànanao. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hafitoana no itandremanao andro firavoravoana ho an''i Jehovah Andriamanitrao eo amin''ny tany izay hofidin''i Jehovah, satria hitahy anao Jehovah Andriamanitrao amin''ny vokatrao rehetra sy ny asan-tananao rehetra, ka dia hifaly tokoa ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Intelo isan-kerintaona ny lehilahy rehetra aminao no hiseho eo anatrehan''i Jehovah Andriamanitrao, eo amin''ny tany izay hofidiny, dia amin''ny andro firavoravoana fihinanana mofo tsy misy masirasira sy ny andro firavoravoana manarakaraka ireo herinandro ary ny andro firavoravoana fitoerana amin''ny trano rantsan-kazo. Ary aoka tsy hisy hiseho foana tsy mitondra fanatitra eo anatrehan''i Jehovah; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: fa aoka samy hanatitra izay zakany avy, araka ny fitahian'i Jehovah Andriamanitrao, izay omeny anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mifidiana mpitsara sy mpifehy ho anao ao an-tanànanao rehetra, izay omen''i Jehovah Andriamanitrao anao, araka ny firenenao; dia hitsara ny olona amin''ny fitsarana marina ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Aza manao fitsarana miangatra, aza mizaha tavan''olona, ary aza mandray kolikoly; fa ny kolikoly mahajamba ny mason''ny hendry ary mamadika ny tenin''ny marina. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny marina dia marina no harahinao, mba ho velona ianao ka handova ny tany izay omen''i Jehovah Andriamanitrao anao. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Aza manangana hazo ho Aseraha ho anao eo anilan''ny alitaran''i Jehovah Andriamanitrao, izay ataonao ho anao. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary aza manao tsangam-baton-tsampy ho anao; fa halan'i Jehovah Andriamanitrao izany.
