document_id: JER.17,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'ny hanamasinana ny Sabata
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ny fahotan'ny Joda dia voasoratra tamin'ny fanoratana sy tamin'ny diamondra fanoratana; voasoratra ao am-pony tahaka ny amin'ny vato fisaka sy eo amin'ny tandroky ny alitarany
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. alitaranareo
      marker-yv: yv-n
    - type: text
      text: ' izany, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Izaho Jehovah no Mpandinika ny fo sy Mpamantatra ny voa, mba hanome ny olona rehetra araka ny alehany avy, dia araka ny vokatry ny asany '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Toy ny tsipoy mikotrika izay tsy atodiny, dia toy izany izay mahazo harena tsy amin''ny rariny: Handao azy amin''ny an-tenatenan''androny izany'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Hilaozan''izany eo an-tenatenan''androny izy'
      marker-yv: yv-n
    - type: text
      text: ', ka ho adala no farany.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Seza fiandrianana be voninahitra sady avo hatramin''ny voalohany ny fitoera-masintsika. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ry Jehovah, Fanantenan'ny Isiraely ô! Ho menatra izay rehetra mahafoy Anao, ary hosoratana amin'ny vovoka izay miala aminao
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. amiko
      marker-yv: yv-n
    - type: text
      text: ', satria izy efa nahafoy an''i Jehovah, loharano velona. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Jehovah ô, sitrano aho, dia ho sitrana; Vonjeo aho, dia ho voavonjy; Fa Hianao no fiderako. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Indro, ireo dia manao amiko hoe: Aiza ny tenin''i Jehovah? Aoka ho tanteraka izany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa izaho tsy nihifikifika niala tsy ho mpiandry manaraka Anao; Ary ny andro hihavian''ny loza dia tsy nohaikaiko, eny, fantatrao izany; Izay efa nivoaka tamin''ny molotro dia miharihary eo anatrehanao. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Enga anie ka tsy ho fampitahorana ahy Hianao! Aroko amin''ny andro fahoriana Hianao! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Aoka ho menatra izay manenjika ahy, fa izaho kosa aoka tsy mba ho menatra; Aoka hivadi-po ireo, fa izaho kosa aoka tsy mba hivadi-po; Ataovy tonga aminy ny andro fahoriana, ary ny fahatorotoroana roa heny no anorotoroy azy.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Izao no nolazain''i Jehovah tamiko: Mandehana ka mitsangàna eo amin''ny vavahadim-bahoaka, dia ilay fandehanan''ny mpanjakan''ny Joda miditra sy mivoaka, ary eo amin''ny vavahady rehetra eto Jerosalema '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Dia amin'izay hahatsiarovan'ny zanany ny alitarany sy ny Aserahany
    - type: usfm
      marker: x
      children:
      - type: text
        text: Anaran'andriamani-tsi-izy, na ny sariny
      marker-yv: yv-n
    - type: text
      text: ', akaikin''ny hazo maitso, ambonin''ny havoana andrandraina. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'ka lazao amin''ny olona hoe: Henoinareo ny tenin''i Jehovah ry mpanjakan''ny Joda sy ry Joda rehetra ary ianareo mponina rehetra eto Jerosalema, izay miditra amin''ireto vavahady ireto. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Izao no lazain''i Jehovah: Tandremo ny fanahinareo, ka aza mitondrantana amin''ny andro Sabata, ary aza mampiditra entana: amin''ny vavahadin''i Jerosalema; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'ary aza mitondra entana mivoaka avy amin''ny tranonareo amin''ny andro Sabata, na manao raharaha akory; fa hamasino ny andro Sabata araka izay efa nandidiako ny razanareo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Nefa tsy nihevitra izy, na nanongilana ny sofiny, fa nanamafy ny hatony mba tsy hihaino na hino anatra. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary raha mihaino Ahy tokoa ianareo hoy Jehovah, ka tsy mampiditra entana amin''ny vavahadin''ity tanàna ity amin''ny andro Sabata, ka tsy manao raharaha amin''izany, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'izay mpanjaka sy mpanapaka mipetraka eo amin''ny seza fiandrianan''i Davida dia hiditra amin''ny vavahadin''ity tanàna ity mitaingina kalesy sy soavaly, dia izy sy ny mpanapaka sy ny Joda ary ny mponina eto Jerosalema, ka honenana mandrakizay ity tanàna ity. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ary ho avy ny olona avy amin'ny tanànan'ny Joda sy ny manodidina an'i Jerosalema sy ny tanin'ny Benjamina sy ny tany lemaka amoron-tsiraka
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Sefela
      marker-yv: yv-n
    - type: text
      text: ' sy ny tany havoana ary ny tany atsimo ka hitondra fanatitra dorana sy fanatitra hafa alatsa-drà ary fanatitra hohanina sy ditin-kazo mani-pofona ary hitondra fanati-pisaorana ho ao an-tranon''i Jehovah. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Fa raha tsy mihaino Ahy kosa ianareo ka tsy manamasina ny andro Sabata, fa mitondra entana miditra amin'ny vavahadin'i Jerosalema ihany amin'ny andro Sabata, dia handrehitra afo tsy mety maty eo am-bavahadiny Aho handevonana ny tranobe eto Jerosalema.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ry tendrombohitro any an-tsaha, ny fanananao sy ny rakitrao rehetra dia hatolotro ho babo, eny, na dia ny fitoerana avonao koa aza noho ny fahotana tao anatin''ny faritaninao rehetra. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary avy amin'ny tenanao ihany no mahatonga ny hamoizanao ny lovanao izay nomeko anao; Ary hampanompoiko ny fahavalonao any amin'ny tany izay tsy fantatrao ianao; Fa narehitrareo ny afon'ny fahatezerako
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. fa misy afo narehitrareo tamin'ny fahatezerako
      marker-yv: yv-n
    - type: text
      text: ', izay hirehitra mandrakizay.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Izao no lazain''i Jehovah: ho voaozona izay olona matoky olona sy manao ny nofo ho sandriny, ka miala amin''i Jehovah ny fony. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa ho tahaka ny olona mahantra any
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ny anjavidy'
      marker-yv: yv-n
    - type: text
      text: ' an-tani-hay izy ka tsy mba hahita, na dia avy aza ny soa; Fa honina any amin''ny tany karankaina any an-efitra, dia any amin''ny tany sira izay tsy onenana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Hotahina izay olona matoky an''i Jehovah, dia izay manana an''i Jehovah ho tokiny. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa ho toy ny hazo ambolena eo amoron-drano izy, izay mamaka eo anilan''ny rano mandeha, ka tsy hatahotra, na dia avy aza ny hainandro, sady ho maitso ny raviny, ka tsy hanahy izy, na dia mihantona aza ny andro, fa tsy hitsahatra ny famoany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ny fo dia mamitaka mihoatra noho ny zavatra rehetra sady manana aretina tsy azo sitranina; Iza moa no mahafantatra ny aminy? '
