document_id: PSA.98
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fifaliana amin'Andriamanitra noho ny nanehoany ny famonjeny sy ny fahamarinany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fihirana. Mihirà fihiram-baovao ho an''i Jehovah; Fa efa nanao fahagagana Izy; Ny tanany ankavanana sy ny sandriny masina no nahavitany famonjena. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jehovah efa nampahafantatra ny famonjeny; Teo imason''ny jentilisa no nanehoany ny fahamarinany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Efa nahatsiaro ny famindram-pony sy ny fahamarinany tamin'ny taranak'i Isiraely Izy; Efa nahita ny famonjen'Andriamanitsika ny vazan-tany rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mihobia ho an''i Jehovah, ry tany rehetra, Velomy ny hoby, ka mihirà. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mankalazà an''i Jehovah amin''ny lokanga, Dia amin''ny lokanga sy ny feo fihirana, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Amin''ny trompetra sy ny fitsofana ny anjomara, Ka mihobia eo anatrehan''i Jehovah Mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aoka hirohondrohona ny ranomasina sy izay rehetra ao aminy, Izao rehetra izao sy ny mponina eo aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aoka hiteha-tanana ny riaka; Aoka hiara-mihoby aminy koa ny tendrombohitra '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Eo anatrehan'i Jehovah, fa avy hitsara ny tany Izy; Hitsara izao rehetra izao amin'ny fahamarinana Izy Ary ny firenena amin'ny fahitsiana.
