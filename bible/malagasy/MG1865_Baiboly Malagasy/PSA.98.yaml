document_id: PSA.98,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fifaliana amin'Andriamanitra noho ny nanehoany ny famonjeny sy ny fahamarinany
  - type: text
    content: 'Fihirana. Mihirà fihiram-baovao ho an''i Jehovah; Fa efa nanao fahagagana Izy; Ny tanany ankavanana sy ny sandriny masina no nahavitany famonjena. '
  '2':
  - type: text
    content: 'Jehovah efa nampahafantatra ny famonjeny; Teo imason''ny jentilisa no nanehoany ny fahamarinany. '
  '3':
  - type: text
    content: Efa nahatsiaro ny famindram-pony sy ny fahamarinany tamin'ny taranak'i Isiraely Izy; Efa nahita ny famonjen'Andriamanitsika ny vazan-tany rehetra.
  '4':
  - type: text
    content: 'Mihobia ho an''i Jehovah, ry tany rehetra, Velomy ny hoby, ka mihirà. '
  '5':
  - type: text
    content: 'Mankalazà an''i Jehovah amin''ny lokanga, Dia amin''ny lokanga sy ny feo fihirana, '
  '6':
  - type: text
    content: 'Amin''ny trompetra sy ny fitsofana ny anjomara, Ka mihobia eo anatrehan''i Jehovah Mpanjaka. '
  '7':
  - type: text
    content: 'Aoka hirohondrohona ny ranomasina sy izay rehetra ao aminy, Izao rehetra izao sy ny mponina eo aminy. '
  '8':
  - type: text
    content: 'Aoka hiteha-tanana ny riaka; Aoka hiara-mihoby aminy koa ny tendrombohitra '
  '9':
  - type: text
    content: Eo anatrehan'i Jehovah, fa avy hitsara ny tany Izy; Hitsara izao rehetra izao amin'ny fahamarinana Izy Ary ny firenena amin'ny fahitsiana.
