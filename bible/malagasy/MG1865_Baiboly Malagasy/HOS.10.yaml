document_id: HOS.10,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ary ny mpisorony mangovitra noho ny aminy, dia noho ny amin'ny voninahiny, fa lasan-ko babo izany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voaloboka misandrahaka Isiraely, mamoa ho azy izy; Araka ny habetsahan''ny voany no nanaovany alitara betsaka, araka ny hatsaran''ny taniny no nanaovany tsangam-baton-tsampy tsara tarehy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Araka ny sitrako no hamaizako azy; Ary hovorina hamely azy ny firenena, amin''ny hamatorana azy noho ny helony roa loha. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Efraima dia tahaka ny ombivavy kely efa voafolaka ka faly hively vary; Ary hasiako zioga
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. hihoarako
      marker-yv: yv-n
    - type: text
      text: ' ny vozony tsara tarehy; Hampandehaniko Efraima; Joda hiasa tany, ary Jakoba handravona. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mamafaza ho anareo araka ny fahamarinana, mijinjà araka ny fitiavana, hevoy ny tombam-borakareo
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Miasà tany vaovao ho anareo'
      marker-yv: yv-n
    - type: text
      text: ; Fa izao no andro hitadiavana an'i Jehovah ambara-pihaviny sy handatsahany fahamarinana aminareo
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: hampianarany anareo ny fahamarinana'
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Niasa faharatsiana ianareo, ka fahadisoana no nojinjanareo; Nihinana ny vokatry ny lainga ianareo fa nitoky tamin'ny alehanareo sy ny habetsahan'ny lehilahy maherinareo
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. alehanareo, maherinao, ianao, olonao, tanànanao
      marker-yv: yv-n
    - type: text
      text: ' ianareo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hisy tabataba hamelezana ny olonareo
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. alehanareo, maherinao, ianao, olonao, tanànanao
      marker-yv: yv-n
    - type: text
      text: ', ka horavana ny tanànareo'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. alehanareo, maherinao, ianao, olonao, tanànanao
      marker-yv: yv-n
    - type: text
      text: ' mimanda rehetra, toy ny nandravan''i Salamana an''i Bet-arbela tamin''ny andro niadiana, ka torotoro avokoa ny reniny mbamin''ny zanany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toy izany no hataon'i Betela
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Toy izany no hatao aminareo, ry Betela'
      marker-yv: yv-n
    - type: text
      text: ' aminareo, noho ny haben''ny faharatsianareo; Raha maraina ny andro, dia ho levona mihitsy ny mpanjakan''ny Isiraely.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mamitaka
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Malambolambo
      marker-yv: yv-n
    - type: text
      text: ' ny fony, koa dia hovaliana izy izao noho ny helony; Jehovah no hanimba ny alitarany sy handrava ny tsangam-baton-tsampiny '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin''izany dia hiteny izy hoe: Tsy mana-mpanjaka isika; Fa tsy natahorantsika Jehovah, koa hahavita inona ho antsika moa izay mpanjaka? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niteniteny foana izy tamin''ny nianianany tsy tò sy ny nanaovany fanekena; Ka nitrebona toy ny zava-mangidy eny am-bavasa eny an-tsaha ny rariny. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny mponina any Samaria matahotra noho ny amin'ny ombivavy kely ao Betavena; Fa ny olony mitomany azy,
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Iny koa ho entina any Asyria ho fanomezana ho an''i Jareba mpanjaka; Ho afa-baraka Efraima, eny, hangaihay Isiraely noho ny saina nataony. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho rava Samaria, ny mpanjakany dia ho tonga toy ny sombin-javatra eny ambonin''ny rano. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ho rava koa ny fitoerana avo ho Avena, izay anotan''Isiraely; Ho rakotry ny tsilo sy ny ahitra ratsy ny alitarany; Ary izy hanao amin''ny tendrombohitra hoe: sarony izahay, ary amin''ny havoana hoe: Mianjerà aminay. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hatramin''ny andro fony tany Gibea no efa nanotanao, ry Isiraely; Nikikitra tany izy; Tsy nahatratra azy tany Gibea ny ady namelezana ny zanaky ny faharatsiana. '
