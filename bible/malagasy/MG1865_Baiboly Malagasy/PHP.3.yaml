document_id: PHP.3,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Anatra nataon'i Paoly mba tsy haneken'ny Filipiana izay mpampianatra sandoka, fa hitady handroso amin'ny fitondran-tena tsara rehetra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Farany, ry rahalahy, mifalia
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: veloma'
      marker-yv: yv-n
    - type: text
      text: ' ao amin''ny Tompo. Tsy manahirana ahy ny manoratra teny averina, fa mahatsara anareo izany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'eny, mba ho fantatro Izy sy ny herin''ny fitsanganany tamin''ny maty ary ny fiombonana amin''ny fijaliany ka hampitovina amin''ny endriky ny fahafatesany, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'raha mba misy hahatratrarako ny fitsanganana amin''ny maty. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy toy ny efa nahazo sahady aho, na efa tanteraka sahady; fa miezaka aho hihazona izay nihazonan''i Kristy Jesosy ahy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ry rahalahy, tsy mbola ataoko
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: (tsy nataoko)'
      marker-yv: yv-n
    - type: text
      text: ' fa efa nahazo ny tenako; fa zavatra iray loha no ataoko; manadino izay zavatra ao aoriana ka miezaka hanatratra izay zavatra eo aloha, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: eny, miezaka hanatratra ny marika aho hahazoako ny lokan'ny fiantsoan'Andriamanitra any ambony
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ho any ambony'
      marker-yv: yv-n
    - type: text
      text: ' ao amin''i Kristy Jesosy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa aoka isika rehetra izay tanteraka hihevitra izany; fa hasehon''Andriamanitra aminareo izany, raha sendra manana sain-kafa ianareo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa aoka ho amin''ilay efa azontsika sahady no mbola hizorantsika. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry rahalahy, aoka samy hanahaka ahy ianareo, ka diniho izay mandeha tahaka ny anananareo anay ho marika. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa maro no mandeha, izay efa nolazaiko taminareo matetika, sady mbola lazaiko aminareo amin''ny fitomaniana koa ankehitriny, fa fahavalon''ny hazo fijalian''i Kristy ireny; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fahaverezana no hiafarany, ny kibony no andriamaniny, ny fahamenarany no voninahiny, fa misaina ny amin''ny tany izy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tandremo ny tenanareo amin''ny amboa, tandremo ny tenanareo amin''ny mpanao ratsy, tandremo ny tenanareo amin''ny voakilema. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny fanjakantsika dia any an-danitra, ary avy any koa no iandrasantsika Mpamonjy, dia Jesosy Kristy Tompo, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay hanova ny tenan'ny fietren-tenantsika ka hitovy endrika amin'ny tenan'ny voninahiny, araka ny fiàsan'ny heriny, izay ahaizany hampanaiky ny zavatra rehetra ho Azy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa isika no voafora, izay manompo amin''ny Fanahin''Andriamanitra ary manao an''i Kristy Jesosy ho reharehantsika ka tsy mitoky amin''ny nofo; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'kanefa mba manana izay hitokiako amin''ny nofo ihany aho. Raha misy olona hafa manao hitoky amin''ny nofo, mainka fa izaho; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa voafora tamin''ny andro fahavalo aho, avy amin''ny fototr''isiraely, dia avy amin''ny firenen''i Benjamina; Hebreo sady avy amin''ny Hebreo aho; araka ny lalàna, dia Fariseo; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: araka ny zotom-po, dia nanenjika ny fiangonana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. eklesia
      marker-yv: yv-n
    - type: text
      text: '; araka ny fahamarinana avy amin''ny lalàna, dia tsy nanan-tsiny. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa izay azoko ho tombony dia nataoko fatiantoka kosa noho ny amin''i Kristy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny tokoa, fa ataoko ho fatiantoka avokoa ny zavatra rehetra noho ny fihoaran''ny hatsaran''ny fahalalana an''i Kristy Jesosy Tompoko, Izay niaretako ny fatiantoka ny zavatra rehetra, ka ataoko ho taimboraka ireny mba hahazoako an''i Kristy; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary mba ho hita ao aminy aho tsy manana ny fahamarinako, izay avy amin''ny lalàna, fa izay avy amin''ny finoana an''i Kristy, dia ny fahamarinan''Andriamanitra amin''ny finoana; '
