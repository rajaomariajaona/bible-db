document_id: DAN.9,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny vavaka nataon'i Daniela, sy ny teny nolazaina taminy ny amin'ny herinandro fito-polo
  - type: text
    content: 'Tamin''ny taona voalohany nanjakan''i Dariosa, zanak''i Ahasoerosy, avy amin''ny taranaky ny Mediana, izay nampanjakaina tamin''ny fanjakan''ny Kaldeana, '
  '10':
  - type: text
    content: 'ka tsy nihaino ny feon''i Jehovah Andriamanitray, mba handeha araka ny lalàny izay nasainy napetraky ny mpaminany mpanompony teo anoloanay. '
  '11':
  - type: text
    content: 'Eny, ny Isiraely rehetra efa nandika ny lalànao ka niala, fa tsy nihaino ny feonao, ka dia naidina taminay ny ozona sy ny fianianana izay voasoratra ao amin''ny lalàn''i Mosesy, mpanompon''Andriamanitra, satria efa nanota taminy izahay. '
  '12':
  - type: text
    content: 'Ary notanterahiny ny teniny, izay nolazainy hamelezana anay sy ny mpitsaranay izay nitsara anay, ka nataony niharan-doza lehibe izahay, fa tetỳ ambanin''ny lanitra rehetra dia tsy mbola nisy natao tahaka izay natao tany Jerosalema. '
  '13':
  - type: text
    content: 'Araka ny voasoratra ao amin''ny lalàn''i Mosesy no nahatongavan''izao loza rehetra izao taminay; nefa tsy nifona teo anatrehan''i Jehovah Andriamanitray izahay hialanay amin''ny helokay sy hahafantaranay ny fahamarinanao. '
  '14':
  - type: text
    content: 'Koa izany no nitehirizan''i Jehovah ny loza, ka nataony mihatra aminay, fa marina Jehovah Andriamanitray amin''ny asany rehetra izay efa nataony; fa izahay no tsy nihaino ny feony. '
  '15':
  - type: text
    content: 'Koa ankehitriny, Tompo Andriamanitray ô, Izay nitondra ny olonao nivoaka avy tany amin''ny tany Egypta tamin''ny tanana mahery ka nanao anarana ho Anao tahaka ny amin''izao anio izao, efa nanota izahay, efa nanao ratsy izahay. '
  '16':
  - type: text
    content: 'Tompo ô, mifona aminao aho, araka ny fahamarinanao rehetra, aoka re hionona ny fahatezeranao sy ny fahaviniranao amin''i Jerosalema tanànanao, tendrombohitrao masina, fa ny helokay sy ny fahotan''ny razanay no nahatonga an''i Jerosalema sy ny olonao ho latsa amin''izay rehetra manodidina anay. '
  '17':
  - type: text
    content: 'Fa ankehitriny, ry Andriamanitray ô, henoy ny fivavaky ny mpanomponao sy ny fifonany, ary ampamirapirato ny tavanao amin''ny fitoeranao masina izay efa foana, satria Tompo Hianao. '
  '18':
  - type: text
    content: 'Andriamanitra ô, atongilano ny sofinao, ka mihainoa; ahirato ny masonao, ka jereo ny fahafoananay sy ny tanàna izay nantsoina amin''ny anaranao; fa tsy amin''ny fahamarinanay no andoaranay ny fifonanay eto anatrehanao, fa amin''ny halehiben''ny indrafonao. '
  '19':
  - type: text
    content: 'Tompo ô, mandrenesa, Tompo ô, mamelà heloka; Tompo ô, mihainoa, ka miasà; aza ela Hianao, ry Andriamanitro ô noho ny aminao; fa ny tanànanao sy ny olonao dia nantsoina amin''ny anaranao. '
  '2':
  - type: text
    content: 'tamin''ny taona voalodany nanjakany, izaho Daniela nahalala tamin''ny boky ny isan''ny taona nampahafantarin''ny tenin''i Jehovah an''i Jeremia mpaminany, izay hahataperan''ny fito-polo taona amin''ny hahafoanan''i Jerosalema. '
  '20':
  - type: text
    content: 'Ary raha mbola niteny sy nivavaka sy niaiky ny fahotako mbamin''ny fahotan''ny Isiraely fireneko aho ka nandoatra ny fifonako teo anatrehan''i Jehovah Andriamanitro ho an''ny tendrombohitra masin''Andriamanitro, '
  '21':
  - type: text
    content: 'eny, raha mbola niteny nivavaka aho, dia, indro, ilay lehilahy Gabriela izay hitako tamin''ny fahitana voalohany, dia nampanidinina faingana ka nanatona ahy tokony ho tamin''ny fotoan''ny fanatitra hariva. '
  '22':
  - type: text
    content: 'Ary izy nampahalala ahy sy niresaka tamiko ka nanao hoe: Ry Daniela ô, avy hampahazava saina anao aho. '
  '23':
  - type: text
    content: 'Tamin''ny niantombohan''ny fivavakao dia nisy teny nivoaka, ka dia tonga hanambara aminao aho, satria malala indrindra ianao; koa diniho ny teny, ary aoka ho fantatrao ny fahitana. '
  '24':
  - type: text
    content: Fito-polo herinandro no voatendry ho an'ny firenenao sy ny tanànanao masina, hahatapaka ny fahadisoana sy hanampina
  - type: note
    content: Heb. hanisy tombo-kase
  - type: text
    content: ' ny fahotana, ary hanao fanavotana noho ny heloka sy hampiditra fahamarinana mandrakizay, ary hanisy tombo-kase ny fahitana sy ny faminaniana'
  - type: note
    content: Heb. mpaminany
  - type: text
    content: ' sy hanosotra izay masina indrindra. '
  '25':
  - type: text
    content: Koa aoka ho fantatrao sy ho azonao fa hatramin'ny hivoahan'ny didy hanavaozana sy hanamboarana an'i Jerosalema ka hatramin'i Mesia Andriana
  - type: note
    content: 'Na: ilay andriana voahosotra'
  - type: text
    content: ' dia ho fito herinandro sy roa amby enim-polo herinandro'
  - type: note
    content: 'Na: ary amin''ny herinandro roa amby enim-polo, dia etc'
  - type: text
    content: '; hamboarina indray ny lalana sy ny hady, dia amin''izay andro mampahory. '
  '26':
  - type: text
    content: Ary rehefa afaka ny roa amby enim-polo herinandro, dia hovonoina ny Mesia
  - type: note
    content: 'Na: ilay voahosotra'
  - type: text
    content: ' ka tsy hanana; ary ny vahoaky ny mpanjaka izay ho avy dia handrava ny tanana sy ny fitoerana masina; ary ny farany dia hisy safotra, ary hatramin''ny farany dia hisy ady sy fandravana voatendry. '
  '27':
  - type: text
    content: Ary hanorina fanekena ho herinandro amin'ny maro izy ary hampitsahatra ny fanatitra alatsa-drà sy ny fanatitra hafa hatramin'ny antsasaky ny herinandro, ary amin'ny elatry
  - type: note
    content: 'Na: eo an-tampon'''
  - type: text
    content: ' ny fahavetavetana no nihavian''ny mpandrava, hatramin''ny fahafonganana voatendry, izay haidina amin''ny mpandrava'
  - type: note
    content: 'Na: ny efa lao'
  - type: text
    content: .
  '3':
  - type: text
    content: Ary nampanatrehiko an'Andriamanitra Tompo ny tavako hitady izay hivavahana sy hifonana amin'ny fifadian-kanina ny lamba fisaonana
  - type: note
    content: Heb. lamba malailay
  - type: text
    content: ' ary ny lavenona. '
  '4':
  - type: text
    content: 'Ary nivavaka tamin''i Jehovah Andriamanitro aho ka nitsotra hoe: Indrisy! Tompo ô, Andriamanitra lehibe sy mahatahotra, mitandrina ny fanekena sy ny famindram-po ho amin''izay tia Azy sy mitandrina ny didiny, '
  '5':
  - type: text
    content: 'efa nanota izahay sady nanao meloka ary nanao ratsy sy niodina, eny, efa niala tamin''ny didinao sy ny fitsipikao izahay, '
  '6':
  - type: text
    content: 'ary tsy nohenoinay ny mpaminany mpanomponao, izay niteny tamin''ny anaranao tamin''ny mpanjakanay sy ny mpanapaka anay sy ny razanay ary ny vahoaka rehetra. '
  '7':
  - type: text
    content: 'Anao ny fahamarinana, Tompo ô, fa anay kosa ny fangaihaizana, tahaka ny amin''izao anio izao, dia an''ny Joda sy ny mponina any Jerosalema ary ny Isiraely rehetra, na ny akaiky na ny lavitra, dia any amin''ny tany rehetra izay efa nandroahanao azy noho ny fahadisoany izay nandisoany taminao; '
  '8':
  - type: text
    content: 'eny, anay ny fangaihaizana, Tompo ô, dia an''ny mpanjakanay sy ny mpanapaka anay ary ny razanay, satria efa nanota taminao izahay. '
  '9':
  - type: text
    content: 'An''ny Tompo Andriamanitray kosa ny famindram-po sy ny famelan-keloka, satria efa niodina taminy izahay '
