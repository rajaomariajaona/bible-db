document_id: DAN.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny vavaka nataon'i Daniela, sy ny teny nolazaina taminy ny amin'ny herinandro fito-polo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin''ny taona voalohany nanjakan''i Dariosa, zanak''i Ahasoerosy, avy amin''ny taranaky ny Mediana, izay nampanjakaina tamin''ny fanjakan''ny Kaldeana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'tamin''ny taona voalodany nanjakany, izaho Daniela nahalala tamin''ny boky ny isan''ny taona nampahafantarin''ny tenin''i Jehovah an''i Jeremia mpaminany, izay hahataperan''ny fito-polo taona amin''ny hahafoanan''i Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary nampanatrehiko an'Andriamanitra Tompo ny tavako hitady izay hivavahana sy hifonana amin'ny fifadian-kanina ny lamba fisaonana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lamba malailay
    marker-yv: yv-n
  - type: text
    text: ' ary ny lavenona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nivavaka tamin''i Jehovah Andriamanitro aho ka nitsotra hoe: Indrisy! Tompo ô, Andriamanitra lehibe sy mahatahotra, mitandrina ny fanekena sy ny famindram-po ho amin''izay tia Azy sy mitandrina ny didiny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'efa nanota izahay sady nanao meloka ary nanao ratsy sy niodina, eny, efa niala tamin''ny didinao sy ny fitsipikao izahay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary tsy nohenoinay ny mpaminany mpanomponao, izay niteny tamin''ny anaranao tamin''ny mpanjakanay sy ny mpanapaka anay sy ny razanay ary ny vahoaka rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Anao ny fahamarinana, Tompo ô, fa anay kosa ny fangaihaizana, tahaka ny amin''izao anio izao, dia an''ny Joda sy ny mponina any Jerosalema ary ny Isiraely rehetra, na ny akaiky na ny lavitra, dia any amin''ny tany rehetra izay efa nandroahanao azy noho ny fahadisoany izay nandisoany taminao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'eny, anay ny fangaihaizana, Tompo ô, dia an''ny mpanjakanay sy ny mpanapaka anay ary ny razanay, satria efa nanota taminao izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'An''ny Tompo Andriamanitray kosa ny famindram-po sy ny famelan-keloka, satria efa niodina taminy izahay '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ka tsy nihaino ny feon''i Jehovah Andriamanitray, mba handeha araka ny lalàny izay nasainy napetraky ny mpaminany mpanompony teo anoloanay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Eny, ny Isiraely rehetra efa nandika ny lalànao ka niala, fa tsy nihaino ny feonao, ka dia naidina taminay ny ozona sy ny fianianana izay voasoratra ao amin''ny lalàn''i Mosesy, mpanompon''Andriamanitra, satria efa nanota taminy izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary notanterahiny ny teniny, izay nolazainy hamelezana anay sy ny mpitsaranay izay nitsara anay, ka nataony niharan-doza lehibe izahay, fa tetỳ ambanin''ny lanitra rehetra dia tsy mbola nisy natao tahaka izay natao tany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Araka ny voasoratra ao amin''ny lalàn''i Mosesy no nahatongavan''izao loza rehetra izao taminay; nefa tsy nifona teo anatrehan''i Jehovah Andriamanitray izahay hialanay amin''ny helokay sy hahafantaranay ny fahamarinanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa izany no nitehirizan''i Jehovah ny loza, ka nataony mihatra aminay, fa marina Jehovah Andriamanitray amin''ny asany rehetra izay efa nataony; fa izahay no tsy nihaino ny feony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Koa ankehitriny, Tompo Andriamanitray ô, Izay nitondra ny olonao nivoaka avy tany amin''ny tany Egypta tamin''ny tanana mahery ka nanao anarana ho Anao tahaka ny amin''izao anio izao, efa nanota izahay, efa nanao ratsy izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tompo ô, mifona aminao aho, araka ny fahamarinanao rehetra, aoka re hionona ny fahatezeranao sy ny fahaviniranao amin''i Jerosalema tanànanao, tendrombohitrao masina, fa ny helokay sy ny fahotan''ny razanay no nahatonga an''i Jerosalema sy ny olonao ho latsa amin''izay rehetra manodidina anay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa ankehitriny, ry Andriamanitray ô, henoy ny fivavaky ny mpanomponao sy ny fifonany, ary ampamirapirato ny tavanao amin''ny fitoeranao masina izay efa foana, satria Tompo Hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Andriamanitra ô, atongilano ny sofinao, ka mihainoa; ahirato ny masonao, ka jereo ny fahafoananay sy ny tanàna izay nantsoina amin''ny anaranao; fa tsy amin''ny fahamarinanay no andoaranay ny fifonanay eto anatrehanao, fa amin''ny halehiben''ny indrafonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tompo ô, mandrenesa, Tompo ô, mamelà heloka; Tompo ô, mihainoa, ka miasà; aza ela Hianao, ry Andriamanitro ô noho ny aminao; fa ny tanànanao sy ny olonao dia nantsoina amin''ny anaranao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary raha mbola niteny sy nivavaka sy niaiky ny fahotako mbamin''ny fahotan''ny Isiraely fireneko aho ka nandoatra ny fifonako teo anatrehan''i Jehovah Andriamanitro ho an''ny tendrombohitra masin''Andriamanitro, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'eny, raha mbola niteny nivavaka aho, dia, indro, ilay lehilahy Gabriela izay hitako tamin''ny fahitana voalohany, dia nampanidinina faingana ka nanatona ahy tokony ho tamin''ny fotoan''ny fanatitra hariva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary izy nampahalala ahy sy niresaka tamiko ka nanao hoe: Ry Daniela ô, avy hampahazava saina anao aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tamin''ny niantombohan''ny fivavakao dia nisy teny nivoaka, ka dia tonga hanambara aminao aho, satria malala indrindra ianao; koa diniho ny teny, ary aoka ho fantatrao ny fahitana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Fito-polo herinandro no voatendry ho an'ny firenenao sy ny tanànanao masina, hahatapaka ny fahadisoana sy hanampina
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hanisy tombo-kase
    marker-yv: yv-n
  - type: text
    text: ' ny fahotana, ary hanao fanavotana noho ny heloka sy hampiditra fahamarinana mandrakizay, ary hanisy tombo-kase ny fahitana sy ny faminaniana'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mpaminany
    marker-yv: yv-n
  - type: text
    text: ' sy hanosotra izay masina indrindra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Koa aoka ho fantatrao sy ho azonao fa hatramin'ny hivoahan'ny didy hanavaozana sy hanamboarana an'i Jerosalema ka hatramin'i Mesia Andriana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ilay andriana voahosotra'
    marker-yv: yv-n
  - type: text
    text: ' dia ho fito herinandro sy roa amby enim-polo herinandro'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ary amin''ny herinandro roa amby enim-polo, dia etc'
    marker-yv: yv-n
  - type: text
    text: '; hamboarina indray ny lalana sy ny hady, dia amin''izay andro mampahory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary rehefa afaka ny roa amby enim-polo herinandro, dia hovonoina ny Mesia
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ilay voahosotra'
    marker-yv: yv-n
  - type: text
    text: ' ka tsy hanana; ary ny vahoaky ny mpanjaka izay ho avy dia handrava ny tanana sy ny fitoerana masina; ary ny farany dia hisy safotra, ary hatramin''ny farany dia hisy ady sy fandravana voatendry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary hanorina fanekena ho herinandro amin'ny maro izy ary hampitsahatra ny fanatitra alatsa-drà sy ny fanatitra hafa hatramin'ny antsasaky ny herinandro, ary amin'ny elatry
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: eo an-tampon'''
    marker-yv: yv-n
  - type: text
    text: ' ny fahavetavetana no nihavian''ny mpandrava, hatramin''ny fahafonganana voatendry, izay haidina amin''ny mpandrava'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny efa lao'
    marker-yv: yv-n
  - type: text
    text: .
