document_id: 2CO.9,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny amin'ny fiantrana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. fanompoana
      marker-yv: yv-n
    - type: text
      text: ' ho an''ny olona masina, dia tsy misy tokony hanoratako aminareo; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Izay manome voa ho an''ny mpamafy sy mofo hohanina dia hanome sy hahabe ny voa afafinareo ary hampitombo ny vokatry ny fahamarinanareo, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia hanan-karena amin'ny zavatra rehetra ianareo ka handroso amin'ny hitsim-po
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fahafoizana'
      marker-yv: yv-n
    - type: text
      text: ',izay mahatonga ny fisaoranay an''Andriamanitra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny fanaovana izany fanompoam-pivavahana izany dia tsy mahafaka ny alahelon''ny olona masina ihany, fa mahabe ny fisaoran''ny maro an''Andriamanitra koa, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria ny fizahan-toetra anareo amin''izany fanompoana izany no ankalazany an''Andriamanitra noho ny fitananareo tsara ny fanekenareo ny filazantsaran''i Kristy sy noho ny fahazotoanareo amin''ny fiantrana ho azy sy ho an''ny olona rehetra; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary amin''ny fangatahany ho anareo dia manina anareo izy noho ny haben''ny fahasoavan''Andriamanitra aminareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Isaorana anie Andriamanitra noho ny fanomezany tsy azo tononina.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa fantatro ny fahazotoanareo, izay ataoko rehareha ny aminareo amin''ny Makedoniana hoe : Efa vonona hatry ny taon-itsy Akaia, ary ny zotom-ponareo dia namporisika ny maro. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa naniraka ireo rahalahy ireo ihany aho, fandrao dia ho foana ny reharehanay ny aminareo amin''izany zavatra izany, mba ho vonona ianareo araka izay nolazaiko, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fandrao, raha tàhiny hisy hiaraka amiko ny avy eto Makedonia ka hahita anareo tsy mbola vonona, dia ho menatra izahay (mba tsy hanaovanay hoe, ianareo) noho izany fahatokiana izany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nataoko fa tsy maintsy mangataka ny rahalahy handeha hialoha ho any aminareo aho ka hahavita rahateo ny fiantranareo izay nokasainareo teo aloha, mba hovitaina toy ny fiantrana izany, fa tsy toy ny fahihirana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao no lazaiko: Izay mamafy kely, dia kely no hojinjany; fa izay mamafy be, dia be kosa no hojinjany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka ny olona rehetra samy hanao araka izay inian''ny fony avy, tsy amin''ny alahelo, na amin''ny faneriterena; fa ny mpanome amin''ny fifaliana no tian''Andriamanitra (Oha. 22. 8, LXX.). '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Andriamanitra mahay mampitombo ny fahasoavana rehetra aminareo, mba hanananareo ny onony rehetra mandrakariva amin''ny zavatra rehetra, ka hitombo amin''ny asa tsara rehetra; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'araka ny voasoratra hoe: Namafy izy, eny, nanome ho an''ny malahelo; Ny fahamarinany maharitra mandrakizay (Sal. 112. 9). '
