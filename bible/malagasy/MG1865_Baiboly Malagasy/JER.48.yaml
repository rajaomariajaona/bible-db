document_id: JER.48
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faminaniana ny amin'i Moaba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny amin''i Moaba. Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Nidiran-doza Nebo, fa rava! Mangaihay Kiriataima, fa afaka; Mangaihay Misgaba'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny fiarovana avo'
    marker-yv: yv-n
  - type: text
    text: ' sady raiki-tahotra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tsy misy ho reharehan''i Moaba intsony; Tao Hesbona no niheverany hampididoza aminy hoe: Andeha horavantsika tsy ho firenena izy. Ho ringana koa ianao, ry Madmena, Hanenjika anao ny sabatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Injay! misy feo fitarainana ao Horonaima hoe: Fandravana sy fandringanana be! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Rava Moaba, ny madinika ao dia mamoaka fitarainana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa miakatra mitomany lalandava eny amin''ny fiakarana Lohita izy; Ary amin''ny fidinana mankany Horonaima no andrenesana fitarainana mafy noho ny fandringanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mandosira, vonjeo ny ainareo. Ary aoka ho tahaka ny olona mahantra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny anjavidy'
    marker-yv: yv-n
  - type: text
    text: ' any an-efitra ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa noho ny nitokianao tamin''ny asanao sy ny rakitrao dia ho voasambotra koa ianao; Ary Kemosy ho lasan-ko babo, dia ny mpisorony sy ny mpanapaka rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny mpandringana ho tonga ao amin''ny tanàna rehetra, ka tsy hisy tanàna tsy ho afaka; Ny lohasaha koa ho simba, ary ny tany lemaka ho rava, araka izay nolazain''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Omeo elatra Moaba, fa hanidina izy ka ho lasa; Ary ho lao ny tanànanay, ka tsy hisy mponina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ho voaozona anie Izay manao tsirambina foana ny asa asain''i Jehovah atao! Eny, ho voaozona anie izay mihazona ny sabany tsy handatsa-drà! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Moaba nandry fahizay hatry ny fony izy mbola kely ka niotrika tao amin''ny faikany, fa tsy naidina nafindrafindra siny, ary tsy mbola lasan-ko babo izy; koa izany no aharetan''ny tsirony ao aminy sy tsy iovan''ny fofony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa, indro, avy ny andro hanirahako mpanohoka ho any aminy, hoy Jehovah, Izay hanohoka azy ka hahafoana ny fitoeran-divainy sady hanorotoro ny sininy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary Moaba ho menatra noho ny amin''i Kemosy toy ny nahamenaran''ny taranak''Isiraely noho ny amin''i Betela tokiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ahoana no anaovanareo hoe: Lehilahy matanjaka sady mahery an''ady izahay? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Rava Moaba, fa ny tanànany dia efa nanihina
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: efa levon-ko setroka'
    marker-yv: yv-n
  - type: text
    text: '. Ary ny zatovony voafantina efa nidina ho any amin''ny famonoana. Hoy ny Mpanjaka, Jehovah, Tompon''ny maro, no anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Efa antomotra ny loza hanjo an''i Moaba, ary mimaona ny fahoriany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mitomania azy, ianareo rehetra izay manodidina azy sy ianareo rehetra izay mahalala ny anarany! Eny, manaova hoe: Indrisy! tapaka ny tehina mafy sy ny tsorakazo tsara tarehy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ry Dibona, zanakavavy mponina, midina miala amin''ny voninahitrao, ka mitoera ao amin''ny tany mangentana, fa ilay mandringana an''i Moaba dia miakatra mamely anao sady mandrava ny fiarovanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ry mponina any Aroera, mijanòna eny an-dalambe, ka mitazàna, ary izay mandositra, na lehilahy na vehivavy, dia anontanio hoe: Nozoin''inona ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Afa-baraka Moaba, eny, raiki-tahotra izy; Midradradradra sy mitaraina, ka ambaraonareo ao Arnona fa rava Moaba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny fitsarana dia miakatra ao amin''ny tany lemaka, dia ao Holona sy Jahaza sy Mefata '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Sy Dibona sy Nebo sy Beti-diblataima '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Sy Kiriataima sy Beti-gamola sy Beti-meona '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Sy Keriota ary Bozra, eny, ny tanànan''i Moaba rehetra, na ny lavitra na ny akaiky. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Voakapa ny tandrok''i Moaba, ary tapaka koa ny sandriny, hoy Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ataovy leony izy, fa niavonavona tamin''i Jehovah; Moaba hihosinkosina amin''ny loany sady mba ho tonga fihomehezana kosa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa tsy efa nataonao ho fihomehezana va ny Isiraely? Moa hita fa naman''ny mpangalatra va izy, no dia mihifikifika ianao isaky ny milaza azy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ry mponina any Moaba! ilaozy ny tanàna, ka mitoera ao amin''ny harambato, ary aoka ho tahaka ny voromailala izay manao ny akaniny erỳ am-pitan''ny hantsana ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ffa renay ny fiavonavonan''i Moaba fatra-piavonavona loatra izy dia ny fireharehany sy ny fiavonavonany sy ny fiaingitrainginy ary ny avonavon''ny fony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Izaho mahalala ny fihoa-bavany sy ny fibedibediny foana, hoy Jehovah; Tsinontsinona ny ataony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Koa hidradradradra noho ny amin''i Moaba aho; Eny, hitomany noho ny amin''i Moaba rehetra aho, ary hitsetra noho ny amin''ny mponina ao Kira-haresa ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Mihoatra noho ny fitomanian
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fitomaniana an'''
    marker-yv: yv-n
  - type: text
    text: '''i Jazera no hitomaniako anao, ry voalobok''i Sibma, tafita ny ranomasina ny rantsanao ary tonga hatrany amin''ny ranomasin''i Jazera; Ny mpandripaka dia tonga handripaka ny voankazonao masaka fahavaratra sy ny voalobokao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary ny hafaliana sy ny faharavoravoana nesorina tamin''ny saha nahavokatra sy tamin''ny tany Moaba, ary nataoko tankina ny divay tamin''ny vata fanantazana ranom-boaloboka, tsy hisy hihoby amin''ny fanitsakitsahana; Ny fihobiana dia tsy fihobiana akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ny fitarainan'i Hesbona dia re hatrany Elale sy Jahaza. Hatrany Zoara ka hatrany Horonaima sy Eglata-selisia
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ilay ombivavy kely telo taona'
    marker-yv: yv-n
  - type: text
    text: '; Fa na dia ny ranon''i Nimrima aza dia ho ritra koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary hatsahatro ao Moaba koa Izay miakatra hanatitra amin''ny fitoerana avo sy izay mandoro ditin-kazo manitra ho an''ny andriamaniny, hoy Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary noho izany ny foko dia mitomany manao feon-tsodina noho ny amin''i Moaba, ary ny foko mitomany manao feon-tsodina noho ny amin''ny mponina ao Kira-haresa. Eny, noho izany dia levona ny harena be izay nohariny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Fa mibory ny loha rehetra. Ary voaharatra ny somotra rehetra, misy tetika amin''ny tanana rehetra sy lamba fisaonana amin''ny valahana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Eny, amin''ny tampon-trano rehetra any Moaba sy eny an-kalalahana dia misy fisaonana avokoa; Satria torotoroiko toy ny fanaka tsy mahafinaritra intsony Moaba, hoy Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Indrisy! raiki-tahotra izy! Midradradradrà! Indrisy! efa miamboho Moaba, mangaihay Izy, ka dia tonga fihomehezana sy fampitahorana ho an''izay rehetra manodidina azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Fa izao no lazain''i Jehovah: Indro, hanidina toy ny voromahery izy ka hamelatra ny elany hipaoka an''i Moaba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Afaka ny tanàna
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: keriota'
    marker-yv: yv-n
  - type: text
    text: ', ka azo ny batery fiarovana, ary amin''izany andro izany ny fon''ny lehilahy maherin''i Moaba dia ho tahaka ny fon''ny vehivavy mihetsi-jaza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary horavana tsy ho firenena intsony Moaba. Satria niavonavona tamin''i Jehovah izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Tahotra sy lavaka ary fandrika no mahazo anao, ry mponina any Moaba, hoy Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Izay mandositra ny tahotra dia ho latsaka any an-davaka; Ary izay miakatra avy any an-davaka dia ho voan''ny fandrika; Fa hataoko tonga amin''i Moaba ny taona hamaliana azy, hoy Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ao amin''ny alokalok''i Hesbona no ijanonan''ny mpandositra, satria lany hery ireny; Kanjo misy afo mivoaka avy any Hesbona, ary lelafo avy any Sihona, ka mandevona ny sisin''i Moaba sy ny tampon-dohan''ny mpitabataba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Idiran-doza ianao, ry Moaba! Ringana ny olon''i Kemosy! Fa ho babo ny zanakao-lahy, ary ho sambotra ny zanakao-vavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Nefa mbola hampodiko avy amin'ny fahababoana ihany Moaba any amparany, hoy Jehovah. Hatreto ny amin'ny fitsarana an'i Moaba.
