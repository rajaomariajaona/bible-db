document_id: PSA.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahatokiana an'Andriamanitra, Izay fototry ny soa, na dia tonga aza ny fahoriana sy ny fahafatesana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Miktama nataon'i Davida. Arovy aho, Andriamanitra ô, fa mialoka aminao aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hoy izaho ny amin''i Jehovah: Tompoko Hianao; tsy misy soa ananako azo oharina aminao; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary ny amin'ny olona masina ambonin'ny tany, ireo no olona tsara laza izay sitrako indrindra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Dia izaho sy ny olona ambonin''ny tany, Ary ny olona tsara laza izay sitrako indrindra'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ho be ny fahorian''izay manova an''Andriamanitra hatakalony ny hafa. Tsy mba hanatitra ny fanati-drà aidiny aho, ary tsy mba hotononin''ny molotro ny anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jehovah no anjara lovako sy kapoakako; Hianao no mampaharitra ny anjarako. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny voafaritra ho anjarako dia eo amin''ny tany mahafinaritra; eny, manan-dova tsara aho. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hisaotra an'i Jehovah Izay manome saina ahy aho; ary na amin'ny alina aza dia mananatra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mamporisika'
    marker-yv: yv-n
  - type: text
    text: ' ahy ny foko'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Heb: voako'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ataoko eo anatrehako mandrakariva Jehovah, fa eo an-kavanako Izy, ka dia tsy hangozohozo aho. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izany no ifalian'ny foko sy iravoravoan'ny fanahiko
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Heb: voninahitro'
    marker-yv: yv-n
  - type: text
    text: '; eny, ny nofoko aza hitoetra tsy manana ahiahy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa tsy ho foinao ho any amin'ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Heb: Sheola'
    marker-yv: yv-n
  - type: text
    text: ' ny aiko; tsy hamela ny Iray Masinao ho latsaka ao amin''ny'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Heb: hahita'
    marker-yv: yv-n
  - type: text
    text: ' lavaka'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ho tratry ny lò'
    marker-yv: yv-n
  - type: text
    text: ' Hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Hampahafantatra ahy ny lalan'aina Hianao; fa havokisam-pifaliana no eo anatrehanao, ary fahafinaretana no eo an-tananao an-kavanana mandrakizay.
