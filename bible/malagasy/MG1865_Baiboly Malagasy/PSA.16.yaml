document_id: PSA.16,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahatokiana an'Andriamanitra, Izay fototry ny soa, na dia tonga aza ny fahoriana sy ny fahafatesana
  - type: text
    content: Miktama nataon'i Davida. Arovy aho, Andriamanitra ô, fa mialoka aminao aho.
  '10':
  - type: text
    content: Fa tsy ho foinao ho any amin'ny fiainan-tsi-hita
  - type: note
    content: 'Heb: Sheola'
  - type: text
    content: ' ny aiko; tsy hamela ny Iray Masinao ho latsaka ao amin''ny'
  - type: note
    content: 'Heb: hahita'
  - type: text
    content: ' lavaka'
  - type: note
    content: 'Na: ho tratry ny lò'
  - type: text
    content: ' Hianao. '
  '11':
  - type: text
    content: Hampahafantatra ahy ny lalan'aina Hianao; fa havokisam-pifaliana no eo anatrehanao, ary fahafinaretana no eo an-tananao an-kavanana mandrakizay.
  '2':
  - type: text
    content: 'Hoy izaho ny amin''i Jehovah: Tompoko Hianao; tsy misy soa ananako azo oharina aminao; '
  '3':
  - type: text
    content: Ary ny amin'ny olona masina ambonin'ny tany, ireo no olona tsara laza izay sitrako indrindra
  - type: note
    content: 'Na: Dia izaho sy ny olona ambonin''ny tany, Ary ny olona tsara laza izay sitrako indrindra'
  - type: text
    content: .
  '4':
  - type: text
    content: 'Ho be ny fahorian''izay manova an''Andriamanitra hatakalony ny hafa. Tsy mba hanatitra ny fanati-drà aidiny aho, ary tsy mba hotononin''ny molotro ny anarany. '
  '5':
  - type: text
    content: 'Jehovah no anjara lovako sy kapoakako; Hianao no mampaharitra ny anjarako. '
  '6':
  - type: text
    content: 'Ny voafaritra ho anjarako dia eo amin''ny tany mahafinaritra; eny, manan-dova tsara aho. '
  '7':
  - type: text
    content: Hisaotra an'i Jehovah Izay manome saina ahy aho; ary na amin'ny alina aza dia mananatra
  - type: note
    content: 'Na: mamporisika'
  - type: text
    content: ' ahy ny foko'
  - type: note
    content: 'Heb: voako'
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Ataoko eo anatrehako mandrakariva Jehovah, fa eo an-kavanako Izy, ka dia tsy hangozohozo aho. '
  '9':
  - type: text
    content: Izany no ifalian'ny foko sy iravoravoan'ny fanahiko
  - type: note
    content: 'Heb: voninahitro'
  - type: text
    content: '; eny, ny nofoko aza hitoetra tsy manana ahiahy. '
