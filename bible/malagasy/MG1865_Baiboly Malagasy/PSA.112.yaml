document_id: PSA.112,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salamo abidy. Ny toetry ny olona marina sy ny mahasambatra azy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Haleloia. Sambatra ny olona izay matahotra an''i Jehovah Sady mankasitraka ny didiny indrindra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny ratsy fanahy hahita ka ho sosotra; Hihidy vazana izy ka ho levona; Ho foana ny fanirian'ny ratsy fanahy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Hahery ambonin''ny tany ny zanany; Hotahina ny taranaky ny marina. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fananana sy harena no ao an-tranony; Ary ny fahamarinany haharitra mandrakizay.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ao amin'ny maizina no iposahan'ny mazava ho an'ny mahitsy; Mamindra fo sy miantra ary marina ireny
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Izy'
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Sambatra ny olona izay miantra ka mampisambotra; Tsy mba ho resy eo am-pitsarana izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa tsy hangozohozo mandrakizay izy; Hotsarovana mandrakizay ny marina. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Tsy mba manahinahy hahare loza izy; Tafatoetra matoky an''i Jehovah ny fony. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Voatohana ny fony, ka tsy hatahotra izy, Mandra-pifaliny mahita ny amin''ny mpandrafy azy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Namafy izy, eny, nanome ho an'ny malahelo; Ny fahamarinany maharitra mandrakizay; Hisandratra amim-boninahitra ny tandrony.
