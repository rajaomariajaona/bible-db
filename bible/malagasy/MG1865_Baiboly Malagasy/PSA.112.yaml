document_id: PSA.112,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Salamo abidy. Ny toetry ny olona marina sy ny mahasambatra azy
  - type: text
    content: 'Haleloia. Sambatra ny olona izay matahotra an''i Jehovah Sady mankasitraka ny didiny indrindra. '
  '10':
  - type: text
    content: Ny ratsy fanahy hahita ka ho sosotra; Hihidy vazana izy ka ho levona; Ho foana ny fanirian'ny ratsy fanahy.
  '2':
  - type: text
    content: 'Hahery ambonin''ny tany ny zanany; Hotahina ny taranaky ny marina. '
  '3':
  - type: text
    content: Fananana sy harena no ao an-tranony; Ary ny fahamarinany haharitra mandrakizay.
  '4':
  - type: text
    content: Ao amin'ny maizina no iposahan'ny mazava ho an'ny mahitsy; Mamindra fo sy miantra ary marina ireny
  - type: note
    content: 'Na: Izy'
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Sambatra ny olona izay miantra ka mampisambotra; Tsy mba ho resy eo am-pitsarana izy. '
  '6':
  - type: text
    content: 'Fa tsy hangozohozo mandrakizay izy; Hotsarovana mandrakizay ny marina. '
  '7':
  - type: text
    content: 'Tsy mba manahinahy hahare loza izy; Tafatoetra matoky an''i Jehovah ny fony. '
  '8':
  - type: text
    content: 'Voatohana ny fony, ka tsy hatahotra izy, Mandra-pifaliny mahita ny amin''ny mpandrafy azy. '
  '9':
  - type: text
    content: Namafy izy, eny, nanome ho an'ny malahelo; Ny fahamarinany maharitra mandrakizay; Hisandratra amim-boninahitra ny tandrony.
