document_id: ISA.11,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny famonjena hataon'Ilay Solofon'i Davida, sy ny hira fiderana hatao amin'izany
  - type: text
    content: 'Ary hisy Solofo mitsimoka eo amin''ny fototr''i Jese, ary hisy mitrebona avy eo amin''ny fakany; '
  '10':
  - type: text
    content: 'Ary amin''izany andro izany ny solofon''i Jese, Izay hitsangana ho fanevan''ny firenena, dia Izy no hotadiavin''ny jentilisa; Ary ny fitoerany dia ho voninahitra. '
  '11':
  - type: text
    content: 'Ary amin''izany andro izany ny Tompo dia mbola haninjitra ny tànany fanindroany hanavotra ny olony, izay mbola sisa, avy any Syria sy Egypta sy Patrosa sy Etiopia sy Elama sy Sinara sy Hamata Ary ny avy any amin''ny moron-dranomasina. '
  '12':
  - type: text
    content: 'Dia hanangana faneva ho an''ny jentilisa Izy ka hamory ny Isiraely izay voaroaka sy hanangona ny Joda izay voaely Avy any amin''ny vazan-tany efatra. '
  '13':
  - type: text
    content: Ary hitsahatra ny fialonan'i Efraima, ary hofongorana ny fandrafiana
  - type: note
    content: 'Na: mpandrafy'
  - type: text
    content: ' an'
  - type: note
    content: 'Na: ao amin''ny'
  - type: text
    content: '''i Joda: Efraima tsy hialona an''i Joda, Ary Joda tsy handrafy an''i Efraima. '
  '14':
  - type: text
    content: 'Fa hipaoka ny tanin''ny Filistina any andrefana ireo sy hiara-mamabo ny zanaky ny atsinanana; amin''i Edoma sy Moaba no haninjirany ny tanany, ary ny taranak''i Amona hanoa azy. '
  '15':
  - type: text
    content: Ary Jehovah handritra
  - type: note
    content: 'Na: hanao azy ho herema'
  - type: text
    content: ' ny sakeli-dranomasina Egyptiana ary haninjitra ny tànany amin''ny ony'
  - type: note
    content: Eofrata
  - type: text
    content: ' ka hamely azy amin''ny rivony mahamay Ka hampisaraka azy hisampana fito Ary hahatafita ny olona tsy miala kapa. '
  '16':
  - type: text
    content: Ary hisy lalana voavoatra halehan'ny olony sisa, izay sisa avy any Asyria, dia toy ny ho an'ny Isiraely tamin'ny andro niakarany avy tany amin'ny tany Egypta.
  '2':
  - type: text
    content: 'Ary ny fanahin''i Jehovah hitoetra ao aminy, dia ny Fanahin''ny fahendrena sy ny fahazavan-tsaina; Ny Fanahin''ny fanoloran-tsaina sy ny faherezana; Ny Fanahin''ny fahalalana sy ny fahatahorana an''i Jehovah; '
  '3':
  - type: text
    content: 'Ary ho hanitra ankasitrahana aminy ny fahatahorana an''i Jehovah, ka tsy hitsara araka ny hitan''ny masony izy, na hampiaiky araka ny ren''ny sofiny; '
  '4':
  - type: text
    content: 'Fa hotsarainy amin''ny fahamarinana ny malahelo; Ary homeny rariny ny mpandefitra amin''ny tany; hamely ny tany amin''ny tsorakazon''ny vavany Izy, ary ny fofonain''ny molony no hamonoany ny ratsy fanahy. '
  '5':
  - type: text
    content: 'Fahamarinana no ho fisikinany, ary fanahy mahatoky no ho fehin-kibony '
  '6':
  - type: text
    content: Ary ny amboadia
  - type: note
    content: lopa
  - type: text
    content: ' hiara-mitoetra amin''ny zanak''ondry; Ny leoparda hiara-mandry amin''ny zanak''osy; Ary ny zanak''omby sy ny liona tanora sy ny ombikely mifahy hiray toerana, Ary ny zazakely no hiroaka azy. '
  '7':
  - type: text
    content: 'Ary ny ombivavy sy ny bera hiara-komana; Ny zanany hiara-mandry; Ary ny liona hihina-mololo tahaka ny omby; '
  '8':
  - type: text
    content: Ny zaza minono hilalao amin'ny lavaky ny vipera, ary ny zaza mitsaha-nono haninjitra ny tànany ao amin'ny lavaky
  - type: note
    content: 'Na: voamason'''
  - type: text
    content: ' ny menarana. '
  '9':
  - type: text
    content: 'Ary tsy handratra na hanimba eran''ny tendrombohitro masina izy; Fa ny tany ho henika ny fahalalana an''i Jehovah, tahaka ny anaronan''ny rano ny fanambanin''ny ranomasina. '
