document_id: ISA.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny famonjena hataon'Ilay Solofon'i Davida, sy ny hira fiderana hatao amin'izany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hisy Solofo mitsimoka eo amin''ny fototr''i Jese, ary hisy mitrebona avy eo amin''ny fakany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ny fanahin''i Jehovah hitoetra ao aminy, dia ny Fanahin''ny fahendrena sy ny fahazavan-tsaina; Ny Fanahin''ny fanoloran-tsaina sy ny faherezana; Ny Fanahin''ny fahalalana sy ny fahatahorana an''i Jehovah; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ho hanitra ankasitrahana aminy ny fahatahorana an''i Jehovah, ka tsy hitsara araka ny hitan''ny masony izy, na hampiaiky araka ny ren''ny sofiny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa hotsarainy amin''ny fahamarinana ny malahelo; Ary homeny rariny ny mpandefitra amin''ny tany; hamely ny tany amin''ny tsorakazon''ny vavany Izy, ary ny fofonain''ny molony no hamonoany ny ratsy fanahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fahamarinana no ho fisikinany, ary fanahy mahatoky no ho fehin-kibony '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary ny amboadia
  - type: usfm
    marker: x
    children:
    - type: text
      text: lopa
    marker-yv: yv-n
  - type: text
    text: ' hiara-mitoetra amin''ny zanak''ondry; Ny leoparda hiara-mandry amin''ny zanak''osy; Ary ny zanak''omby sy ny liona tanora sy ny ombikely mifahy hiray toerana, Ary ny zazakely no hiroaka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny ombivavy sy ny bera hiara-komana; Ny zanany hiara-mandry; Ary ny liona hihina-mololo tahaka ny omby; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny zaza minono hilalao amin'ny lavaky ny vipera, ary ny zaza mitsaha-nono haninjitra ny tànany ao amin'ny lavaky
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: voamason'''
    marker-yv: yv-n
  - type: text
    text: ' ny menarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary tsy handratra na hanimba eran''ny tendrombohitro masina izy; Fa ny tany ho henika ny fahalalana an''i Jehovah, tahaka ny anaronan''ny rano ny fanambanin''ny ranomasina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary amin''izany andro izany ny solofon''i Jese, Izay hitsangana ho fanevan''ny firenena, dia Izy no hotadiavin''ny jentilisa; Ary ny fitoerany dia ho voninahitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary amin''izany andro izany ny Tompo dia mbola haninjitra ny tànany fanindroany hanavotra ny olony, izay mbola sisa, avy any Syria sy Egypta sy Patrosa sy Etiopia sy Elama sy Sinara sy Hamata Ary ny avy any amin''ny moron-dranomasina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hanangana faneva ho an''ny jentilisa Izy ka hamory ny Isiraely izay voaroaka sy hanangona ny Joda izay voaely Avy any amin''ny vazan-tany efatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary hitsahatra ny fialonan'i Efraima, ary hofongorana ny fandrafiana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mpandrafy'
    marker-yv: yv-n
  - type: text
    text: ' an'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ao amin''ny'
    marker-yv: yv-n
  - type: text
    text: '''i Joda: Efraima tsy hialona an''i Joda, Ary Joda tsy handrafy an''i Efraima. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa hipaoka ny tanin''ny Filistina any andrefana ireo sy hiara-mamabo ny zanaky ny atsinanana; amin''i Edoma sy Moaba no haninjirany ny tanany, ary ny taranak''i Amona hanoa azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary Jehovah handritra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hanao azy ho herema'
    marker-yv: yv-n
  - type: text
    text: ' ny sakeli-dranomasina Egyptiana ary haninjitra ny tànany amin''ny ony'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eofrata
    marker-yv: yv-n
  - type: text
    text: ' ka hamely azy amin''ny rivony mahamay Ka hampisaraka azy hisampana fito Ary hahatafita ny olona tsy miala kapa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary hisy lalana voavoatra halehan'ny olony sisa, izay sisa avy any Asyria, dia toy ny ho an'ny Isiraely tamin'ny andro niakarany avy tany amin'ny tany Egypta.
