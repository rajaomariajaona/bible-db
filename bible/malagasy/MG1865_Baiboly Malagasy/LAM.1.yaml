document_id: LAM.1,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Alahelo noho ny nanjo ny :Joda sy Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indrisy, mitoetra manirery izao ilay tanàna feno olona! Efa tonga toy ny mpitondratena izy! Ilay nalaza tamin'ny firenena sy andriambavy tamin'ny tany samy hafa dia efa miankin-doha kosa izao!
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fahavalo naninjitra ny tànany naka ny zava-tsoany rehetra; Fa ny jentilisa, izay noraranao tsy hiditra amin'ny fiangonanao, dia hitany tafiditra ao amin'ny fitoerany masina.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Misento ny olony rehetra, mitady hanina; Eny, atakalony hanina ny zava-tsoany hamelombelona ny ainy; Jehovah ô, jereo ka diniho, fa vingavingaina aho.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moa tsy mampaninona anareo va, ry mpandalo rehetra? Jereo sy izahao raha mba misy fahoriana toy ny fahoriako, izay namelezany ahy, dia ilay nampahorian'i Jehovah ahy tamin'ny andro firehetan'ny fahatezerany.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avy tany amin'ny avo no nandatsahany afo ho amin'ny taolako handoroany azy; Namela-pandrika harato haningorana ny tongotro Izy ka nampihemotra ahy; Nampahalao sy nampahareraka ahy mandritra ny andro Izy.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny ziogan'ny fahotako nofehezin'ny tànany; Voaolana ireny ka tonga eo an-katoko; noketrahiny ny heriko; Natolotry ny Tompo ho eo an-tànan izay tsy leoko aho.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nataon'ny Tompo tsinontsinona ny maheriko rehetra; Nanendry fotoana hamelezana ahy Izy, handringanana ny zatovoko; Ny Tompo nanosihosy an'i Joda zanakavavy virijina toy ny eo amin'ny famiazam-boaloboka.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany zavatra izany no mampitomany ahy; e! ny masoko, ny masoko mamarin-dranomaso, fa lavitra ahy ny mpampionona izay tokony hamelombelona ny fanahiko; Ringana ny zanako, fa mahery ny fahavalo.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ziona mananty tanana, nefa tsy misy mampionona azy; Jehovah nandidy ny amin'i Jakoba mba ho tonga fahavalony ny manodidina azy; Jerosalema dia tonga fahavetavetana eo afovoan'ireo.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Marina Jehovah, fa efa nandà ny teniny aho; Ry firenena rehetra, masìna ianareo, mba jereo ny fahoriako; Lasan-ko babo ny virijinako sy ny zatovoko.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nantsoiko ireo tia ahy, fa nofitahiny aho; Ny mpisoroko sy ny loholoko niala aina tao an-tanana, Tamin'ny nitadiavany hanina hamelombelona ny ainy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mitomany dia mitomany izy nony alina, ary ny ranomasony dia eny an-takolany; Izay rehetra tia azy dia tsy misy mampionona azy; Ny sakaizany rehetra efa nivadika taminy ka tonga fahavalony.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izahao, Jehovah ô, fa azom-pahoriana aho, mandevilevy ny foko; Miontana ato anatiko ny foko, fa naditra dia naditra aho; Eny ivelany dia ny sabatra no mahafoana anaka, ary ao an-trano dia toa misy fahafatesana kosa.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Reny fa misento aho; tsy misy mampionona ahy; Ny fahavaloko rehetra nandre ny fahoriako, ka faly izy, satria Hianao no nanao izany; Hahatonga izay andro nantsoinao Hianao, ka dia ho tonga tahaka ahy koa ireo.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aoka ho tonga eo anatrehanao ny faharatsiany rehetra, ary mba ataovy aminy kosa tahaka izay nataonao tamiko noho ny fahotako rehetra; Fa imbetsaka ny fisentoako, ka reraka ny foko.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lasan-ko babo
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Lasa nivahiny'
      marker-yv: yv-n
    - type: text
      text: ' ny Joda noho ny fahoriana sy ny haben''ny fanompoana; Mipetraka ao amin''ny jentilisa izy, nefa tsy mahita fitsaharana; Izay rehetra nanenjika azy dia nahatratra azy teo an-ketena.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo lalana mankany Ziona dia mitomany, satria tsy misy miakatra ho amin'ny fotoam-pivavahana; Lao
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Rava'
      marker-yv: yv-n
    - type: text
      text: ' ny vavahadiny rehetra, misento ny mpisorony; Ory ny virijinany, ary Ziona dia efa azon''ny fahoriana mangidy.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny rafiny no mpanapaka
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. loha
      marker-yv: yv-n
    - type: text
      text: ', ny fahavalony no miadana, Satria Jehovah no efa nampahory azy noho ny hamaroan''ny fahotany; Ny zanany madinika dia lasan-ko babo eo anoloan''ny fahavalony,'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny voninahitr'i Ziona zanakavavy rehetra dia efa tsy ananany intsony; Ny mpanapaka azy dia toy ny diera tsy mahita ahitra, Ary mandeha reraka eo anoloan'ny mpanenjika azy izy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsaroan'i Jerosalema amin'ny andro fahoriany sy fanjenjenany ny zava-tsoa rehetra izay nananany hatry ny ela; Fa nony naripaky ny fahavalo ny olony, ka tsy nisy namonjy azy, dia nahita azy ny fahavalo ka nihomehy ny faharavany
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. fitsaharany
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Efa nanota dia nanota Jerosalema. ka izany no nahatonga azy ho fahavetavetana; izay rehetra nanaja azy dia mamingavinga azy, satria efa nahita ny fitanjahany ireny; Eny, na ny tenany aza dia miferinaina sady miamboho.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny lotony dia teo amin'ny moron-tongotr'akanjony, tsy nitsapa farany izy; Dia mahagaga ny fietreny, tsy misy mampionona azy. Jehovah ô, jereo ny fahoriako, fa mirehareha ny fahavalo.
