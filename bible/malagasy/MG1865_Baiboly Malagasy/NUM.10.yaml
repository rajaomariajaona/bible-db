document_id: NUM.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny niaingan'ny Zanak'Isiraely niala tany an-efitr'i Sinay, sy ny teny nataon'i Mosesy tamin i Hobaba.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Manaova trompetra volafotsy roa ho anao; voasana no hanaovanao azy; dia ho fiantsoanao ny fiangonana sy ho fampiainganao ny toby ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary raha tsofina avokoa ireo, dia hivory eo aminao, eo anoloan''ny varavaran''ny trano-lay fihaonana, ny fiangonana rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa raha ny iray ihany no tsofina, dia ny lohan''ny firenena, izay mpifehy arivo amin''ny Isiraely, ihany no hivory eo aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa raha mitsoka ho fampitairana ianareo, dia hiainga ny toby izay mitoetra eo atsinanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary raha mitsoka ho fampitairana fanindroany ianareo, dia hiainga ny toby izay mitoetra eo atsimo; fampitairana no hatao fiaingany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa raha hampivory ny fiangonana kosa ianareo, dia hitsoka fotsiny, fa tsy hanao fampitairana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ireo mpisorona, zanak''i Arona, no hitsoka ny trompetra; dia ho lalàna mandrakizay ho anareo hatramin''ny taranakareo fara mandimby izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary raha misy ady eo amin''ny taninareo, ka mandeha hiady amin''ny fahavalo izay mampahory anareo ianareo, dia hitsoka ireo trompetra ireo ho fampitairana, dia hotsarovana eo anatrehan''i Jehovah Andriamanitrareo ianareo ka hovonjena amin''ny fahavalonareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary amin''ny andro fifalianareo, sy amin''ny fotoam-pivavahanareo, ary amin''ny voaloham-bolanareo no hitsofanareo ny trompetra, raha manao ny fanatitra doranareo sy ny fanati-pihavananareo; dia ho fahatsiarovana ho anareo izany eo anatrehan''Andriamanitrareo: Izaho Jehovah no Andriamanitrareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary tamin''ny andro faharoa-polo tamin''ny volana faharoa, tamin''ny taona faharoa, no niakaran''ny rahona niala teo ambonin''ny tabernakelin''ny Vavolombelona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia niainga tany an-efitr''i Sinay ny Zanak''Isiraely ka nandroso, ary ny rahona nijanona tany an-efitra Parana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia izany no niaingany voalohany araka ny didin''i Jehovah izay nampitondrainy an''i Mosesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny fanevan''ny tobin''ny taranak''i Joda no niainga voalohany araka ny antokony, ary Nasona, zanak''i Aminadaba, no mpifehy ny antokony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary Netanela, zanak''i Zoara, no mpifehy ny antokon''ny firenena taranak''Isakara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary Eliaba, zanak''i Helona, no mpifehy ny antokon''ny firenena taranak''i Zebolona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nahorona ny tabernakely, ka niainga ny taranak''i Gersona sy ny taranak''i Merary, nitondra ny tabernakely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia niainga ny fanevan''ny tobin''i Robena araka ny antokony; ary Elizora, zanak''i Sedeora, no mpifehy ny antokony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary Selomiela, zanak''i Zorisaday, no mpifehy ny antokon''ny firenena taranak''i Simeona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Eliasafa, zanak''i Doela, no mpifehy ny antokon''ny firenena taranak''i Gada. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia niainga ny Kehatita, mitondra ny zava-masina; ary nisy nanangana ny tabernakely mandra-pihaviny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia niainga ny fanevan''ny tobin''ny taranak''i Efraima, araka ny antokony; ary Elisama, zanak''i Amihoda, no mpifehy ny antokony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary Gamaliela, zanak''i Pedazora, no mpifehy ny antokon''ny firenena taranak''i Manase. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary Abidana, zanak''i Gideony, no mpifehy ny firenena taranak''i Benjamina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia niainga ny fanevan''ny tobin''ny taranak''i Dana, izay vodi-lalan''ny toby rehetra, araka ny antokony; ary Ahiezera, zanak''i Amisaday, no mpifehy ny antokony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary Pagiela, zanak''i Okrana, no mpifehy ny antokon''ny firenena taranak''i Asera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary Ahira, zanak''i Enana, no mpifehy ny antokon''ny firenena taranak''i Naftaly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Izany no fandehan''ny Zanak''Isiraely, araka ny antokony avy, raha niainga izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia hoy Mosesy tamin''i Hobaba, zanak''i Regoela Midianita, rafozan''i Mosesy: Izahay izao dia mandeha hankany amin''ny tany izay nolazain''i Jehovah hoe: Homeko anareo izy; andeha hiaraka aminay ianao, dia hasianay soa; fa Jehovah efa nilaza soa ny amin''ny Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa hoy kosa izy taminy: Tsy handeha aho; fa hody any amin''ny taniko sy ny havako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia hoy Mosesy: Aza dia ilaozanao izahay; fa fantatrao izay tokony hitobianay atỳ an-efitra, ka dia ho masonay ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary raha hiaraka aminay ianao, dia izay soa hataon''i Jehovah aminay no mba hataonay aminao kosa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia niainga niala tany an-tendrombohitr''i Jehovah lalan-kateloana izy; ary ny fiaran''ny faneken''i Jehovah nandroso nialoha azy lalan-kateloana hitady fialan-tsasatra ho an''ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary ny rahon''i Jehovah dia teo amboniny nony andro tamin''ny niaingany niala tamin''ny nitobiany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary raha niainga ny fiara, dia hoy Mosesy: Mitsangàna, Jehovah ô, ka aoka hiely ny fahavalonao; ary aoka handositra ny tavanao izay mankahala Anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary raha nijanona kosa ny fiara, dia hoy izy: Miverena, Jehovah ô, ho amin''ny Isiraely tsy omby alinalina.'
