document_id: PSA.55,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainana nataon'izay navadiky ny sakaizany nahatoky azy
  - type: text
    content: 'Ho an''ny mpiventy hira. Hampiarahina amin''ny valiha. Maskila nataon''i Davida. Mihainoa ny fivavako, Andriamanitra ô, ary aza miery amin''ny fitarainako. '
  '10':
  - type: text
    content: 'Hodidininy andro aman''alina eny ambonin ny mandany io; ary heloka sy fampahoriana no ao aminy; '
  '11':
  - type: text
    content: Ratsy no ao anatiny; ary ny fitaka sy ny fanangolena tsy mba miala amin'ny lalàmbeny.
  '12':
  - type: text
    content: 'Fa tsy fahavalo no nanaratsy ahy,- fa raha izany, dia niaritra ihany aho; tsy olona nankahala ahy no nanandra-tena namely ahy, fa raha izany, dia niery azy aho; '
  '13':
  - type: text
    content: 'Fa ianao, lehilahy mitovy saranga amiko, namako sy sakaizako indrindra, '
  '14':
  - type: text
    content: 'Dia isika izay nifankamamy resaka ka niara-nandeha tamin''ny maro ho ao an-tranon''Andriamanitra. '
  '15':
  - type: text
    content: Aoka hanampoka azy ny fahafatesana
  - type: note
    content: 'Na: Aoka hahazo azy ny fandringanana'
  - type: text
    content: . Aoka hidina velona any amin'ny fiainan-tsi-hita
  - type: note
    content: 'Heb: Sheola'
  - type: text
    content: ' izy; fa ratsy no ao amin''ny fonenany, dia ao afovoany'
  - type: note
    content: 'Na: Fa hevi-dratsy ny ao amin''ny firaketany, dia ao am-pony'
  - type: text
    content: .
  '16':
  - type: text
    content: 'Raha izaho, dia Andriamanitra no hantsoiko; ary Jehovah no hamonjy ahy. '
  '17':
  - type: text
    content: 'Hariva sy maraina ary mitatao vovonana no hitarainako sy hitolokoako; dia hihaino ny feoko Izy, '
  '18':
  - type: text
    content: Ka hanavotra ny fanahiko ho amin'ny fiadanana hahafahako amin'ny adin'ireny amiko, fa maro no miady amiko.
  '19':
  - type: text
    content: Hihaino Andriamanitra, Izay mipetraka hatramin'ny taloha, ka hamaly ireo olona tsy miova toetra, sady tsy matahotra an'Andriamanitra.
  '2':
  - type: text
    content: 'Henoy aho, ka valio; miriorio ny eritreritro, ka mitoloko aho, '
  '20':
  - type: text
    content: 'Efa naninjitra ny tànany hamely izay nihavana taminy izy; namadika ny fanekeny izy. '
  '21':
  - type: text
    content: Malambo noho ny rononomandry ny vavany, kanjo ady no ao am-pony; malemy noho ny diloilo ny teniny, kanjo sabatra voatsoaka ireny.
  '22':
  - type: text
    content: 'Apetraho amin''i Jehovah ny entanao, ary Izy no hanohana anao; tsy havelany hangozohozo mandrakizay ny marina. '
  '23':
  - type: text
    content: Fa Hianao, Andriamanitra ô, no hampidina ireo any an-davaka fanimbana; ny mpandatsa-drà sy mpamitaka tsy hahatratra ny an-tsasaky ny androny; fa izaho kosa dia hatoky Anao.
  '3':
  - type: text
    content: Noho ny feon'ny fahavalo sy ny fampahorian'ny ratsy fanahy; fa mampianjera loza amiko ireny, ary amin'ny fahatezerana no ankahalany ahy.
  '4':
  - type: text
    content: 'Mangorohoro ato anatiko ny foko, ary mamely ahy ny tahotra ny fahafatesana. '
  '5':
  - type: text
    content: 'Tahotra sy hovitra no mahazo ahy, ary manafotra ahy ny horohoro. '
  '6':
  - type: text
    content: 'Ka hoy izaho: enga anie ka manana elatra tahaka ny voromailala aho, dia handositra aho ka hahita izay hitoerako; '
  '7':
  - type: text
    content: 'Eny, handositra lavitra aho ka hitoetra any an-efitra. '
  '8':
  - type: text
    content: Handeha faingana aho hamonjy fialofana, mba tsy ho azon'ny tafio-drivotra sy ny ranonoram-baratra.
  '9':
  - type: text
    content: 'Aringano izy, ary akoroy ny fiteniny, Tompo ô; fa mahita loza sy ady ao an-tanàna aho. '
