document_id: PSA.55
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitarainana nataon'izay navadiky ny sakaizany nahatoky azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Hampiarahina amin''ny valiha. Maskila nataon''i Davida. Mihainoa ny fivavako, Andriamanitra ô, ary aza miery amin''ny fitarainako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Henoy aho, ka valio; miriorio ny eritreritro, ka mitoloko aho, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Noho ny feon'ny fahavalo sy ny fampahorian'ny ratsy fanahy; fa mampianjera loza amiko ireny, ary amin'ny fahatezerana no ankahalany ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mangorohoro ato anatiko ny foko, ary mamely ahy ny tahotra ny fahafatesana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tahotra sy hovitra no mahazo ahy, ary manafotra ahy ny horohoro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ka hoy izaho: enga anie ka manana elatra tahaka ny voromailala aho, dia handositra aho ka hahita izay hitoerako; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Eny, handositra lavitra aho ka hitoetra any an-efitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Handeha faingana aho hamonjy fialofana, mba tsy ho azon'ny tafio-drivotra sy ny ranonoram-baratra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aringano izy, ary akoroy ny fiteniny, Tompo ô; fa mahita loza sy ady ao an-tanàna aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hodidininy andro aman''alina eny ambonin ny mandany io; ary heloka sy fampahoriana no ao aminy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ratsy no ao anatiny; ary ny fitaka sy ny fanangolena tsy mba miala amin'ny lalàmbeny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa tsy fahavalo no nanaratsy ahy,- fa raha izany, dia niaritra ihany aho; tsy olona nankahala ahy no nanandra-tena namely ahy, fa raha izany, dia niery azy aho; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa ianao, lehilahy mitovy saranga amiko, namako sy sakaizako indrindra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia isika izay nifankamamy resaka ka niara-nandeha tamin''ny maro ho ao an-tranon''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aoka hanampoka azy ny fahafatesana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Aoka hahazo azy ny fandringanana'
    marker-yv: yv-n
  - type: text
    text: . Aoka hidina velona any amin'ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Heb: Sheola'
    marker-yv: yv-n
  - type: text
    text: ' izy; fa ratsy no ao amin''ny fonenany, dia ao afovoany'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Fa hevi-dratsy ny ao amin''ny firaketany, dia ao am-pony'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Raha izaho, dia Andriamanitra no hantsoiko; ary Jehovah no hamonjy ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hariva sy maraina ary mitatao vovonana no hitarainako sy hitolokoako; dia hihaino ny feoko Izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ka hanavotra ny fanahiko ho amin'ny fiadanana hahafahako amin'ny adin'ireny amiko, fa maro no miady amiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Hihaino Andriamanitra, Izay mipetraka hatramin'ny taloha, ka hamaly ireo olona tsy miova toetra, sady tsy matahotra an'Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Efa naninjitra ny tànany hamely izay nihavana taminy izy; namadika ny fanekeny izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Malambo noho ny rononomandry ny vavany, kanjo ady no ao am-pony; malemy noho ny diloilo ny teniny, kanjo sabatra voatsoaka ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Apetraho amin''i Jehovah ny entanao, ary Izy no hanohana anao; tsy havelany hangozohozo mandrakizay ny marina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa Hianao, Andriamanitra ô, no hampidina ireo any an-davaka fanimbana; ny mpandatsa-drà sy mpamitaka tsy hahatratra ny an-tsasaky ny androny; fa izaho kosa dia hatoky Anao.
