document_id: 2CH.34,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahazotoan'i Josia hanangana indray ny fivavahana amin'i Jehovah sy hampitandrina ny olona ny Paska, ary ny niadiany tamin'ny Egyptiana sy ny nahafatesany
  - type: text
    content: 'Valo taona Josia, fony izy vao nanjaka, ary iraika amby telo-polo taona no nanjakany tany Jerosalema. '
  '10':
  - type: text
    content: 'Ary natolony ho eo an-tanan''ny lehiben''ny mpiasa izay voatendry hitandrina ny amin''ny tranon''i Jehovah izany, ary natolotr''ireo kosa ho an''ny mpiasa izay niasa tao an-tranon''i Jehovah hanamboarana sy hanamafiana ny trano; '
  '11':
  - type: text
    content: 'dia nomeny ho an''ny mpandrafitra sy ry mpandatsa-bato hamidy vato voapaika sy hazo hatao sakamandimby sy lampihazo ho amin''ny trano izay nosimban''ny mpanjakan''ny Joda. '
  '12':
  - type: text
    content: 'Ary ny olona dia nanao ny asa araka izay mety hatao; ary ny voatendry hifehy azy dia lahata sy Obadia Levita, avy tamin''ny taranak''i Merary, ary Zakaria sy Mesolama, avy tamin''ny taranaky ny Kehatita, ary ny Levita rehetra izay nahay ny zava-maneno isan-karazany, '
  '13':
  - type: text
    content: 'dia ireo no tonian''ny mpitondra entana sady nifehy izay rehetra nanao raharaha tamin''ny tao-zavatra samy hafa rehetra; ary avy tamin''ny Levita koa nisy mpanoratra sy mpifehy ary mpiandry varavarana. '
  '14':
  - type: text
    content: 'Ary raha namoaka ny vola izay nampidirina tao an-tranon''i Jehovah izy, Hilkia mpisorona dia nahita ny bokin''ny lalàn''i Jehovah, ilay nampilazaina an''i Mosesy. '
  '15':
  - type: text
    content: 'Ary niteny Hilkia ka nanao tamin''i Safana mpanoratra hoe: Ny bokin''ny lalàna dia hitako tao an-tranon''i Jehovah. Dia natolotr''i Hilkia an''i Safana ny boky. '
  '16':
  - type: text
    content: 'Ary Safana nitondra ny boky ho any amin''ny mpanjaka sady nilaza taminy hoe: Izay rehetra nasaina nataon''ny mpanomponao dia nataony avokoa. '
  '17':
  - type: text
    content: 'Ary narotsany ny vola izay azo tao an-tranon''i Jehovah ka natolony teo an-tànan''ny olona voatendry sy teo an-tànan''ny mpiasa. '
  '18':
  - type: text
    content: 'Ary Safana mpanoratra nilaza koa tamin''ny mpanjaka hoe: Misy boky nomen''i Hilkia mpisorona ahy. Dia novakin''i Safana teo anatrehan''ny mpanjaka ny boky. '
  '19':
  - type: text
    content: 'Ary rehefa ren''ny mpanjaka ny tenin''ny lalàna, dia nandriatra ny fitafiany izy '
  '2':
  - type: text
    content: 'Ary nanao izay mahitsy eo imason''i Jehovah izy ka nandeha tamin''ny lalan''i Davida rainy, fa tsy mba nivily na ho amin''ny ankavanana na ho amin''ny ankavia. '
  '20':
  - type: text
    content: 'sady nandidy an''i Hilkia sy Ahikama, zanak''i Safana, sy Abdona, zanak''i Mika, sy Safana mpanoratra ary Asaia, mpanompon''andriana, ka nanao hoe: '
  '21':
  - type: text
    content: 'Andeha manontany amin''i Jehovah ho ahy sy izay sisa amin''ny Isiraely sy ny Joda ny amin''ny tenin''io boky vao hita; fa mafy ny fahatezeran''i Jehovah naidiny amintsika noho ny tsy nitandreman''ny razantsika ny tenin''i Jehovah hanao araka izay rehetra voasoratra amin''io boky io. '
  '22':
  - type: text
    content: Ary Hilkia sy izay notendren'ny mpanjaka dia nankany amin'i Holda mpaminanivavy, vadin'i Saloma, zanak'i Tokehata, zanak'i Hasra, mpitahiry ny fitafiana (fa nitoetra tany Jerosalema tao amin'ny tanàna ambany ravehivavy) ary niresaka izany taminy izy ireo.
  '23':
  - type: text
    content: 'Dia hoy ravehivavy taminy: Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Lazao amin''izay lehilahy naniraka anareo tatỳ amiko hoe: '
  '24':
  - type: text
    content: 'Izao no lazain''i Jehovah: Indro, Izaho hahatonga loza amin''ity tanàna ity sy amin''ny mponina eto, dia ny ozona rehetra izay voasoratra ao amin''ilay boky efa novakina teo anatrehan''ny mpanjakan''ny Joda. '
  '25':
  - type: text
    content: 'Satria nahafoy Ahy izy ka nandoro ditin-kazo manitra ho an''ireny andriamani-kafa sady nampahatezitra Ahy amin''izay rehetra nataon''ny tànany, dia haidina amin''ity tanana ity ny fahatezerako ka tsy hosakanana. '
  '26':
  - type: text
    content: 'Fa ny amin''ny mpanjakan''ny Joda kosa izay naniraka anareo hanontany amin''i Jehovah, dia ambarao aminy hoe: Izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Ny amin''ny teny izay efa novakinao, '
  '27':
  - type: text
    content: 'satria nino anatra ianao ka nanetry tena teo anatrehan''Andriamanitra, raha nandre ny teniny ny amin''ity tanàna ity sy ny mponina eto, eny, satria nanetry tena teo anatrehako ianao ka nandriatra ny fitafianao sady nitomany teo anatrehako, dia Izaho efa nihaino, hoy Jehovah. '
  '28':
  - type: text
    content: Koa, indro, hangoniko any amin'ny razanao ianao ary hangonina any amin'ny fasanao amin'ny fiadanana, ka ny masonao dia tsy mba hahita izay loza rehetra ho entiko mamely ity tanàna ity sy ny mponina eto. Dia nitondra valiny ho any amin'ny mpanjaka izy ireo.
  '29':
  - type: text
    content: 'Ary ny mpanjaka naniraka olona ka nampivory ny loholon''ny Joda sy Jerosalema rehetra. '
  '3':
  - type: text
    content: 'Fa tamin''ny taona fahavalo nanjakany, raha mbola zatovolahy izy, dia niantomboka nitady an''Andriamanitr''i Davida rainy; ary tamin''ny taona faharoa ambin''ny folo kosa dia niantomboka nanadio an''i Joda sy Jerosalema izy mba tsy hisy fitoerana avo, na Aseraha, na sarin-javatra voasokitra, na sarin-javatra anidina intsony. '
  '30':
  - type: text
    content: 'Dia niakatra ho ao an-tranon''i Jehovah ny mpanjaka sy ny lehilahy rehetra tamin''ny Joda sy ny mponina tany Jerosalema mbamin''ny mpisorona sy ny Levita ary ny vahoaka rehetra, na lehibe na kely; dia novakiny teo anatrehany ny teny rehetra teo amin''ny bokin''ny fanekena, izay hita tao an-tranon''i Jehovah. '
  '31':
  - type: text
    content: 'Ary ny mpanjaka nitsangana teo amin''ny fitoeran''andriana, dia nanao fanekena teo anatrehan''i Jehovah hanaraka Azy sy hitandrina ny lalàny sy ny teni-vavolombelony ary ny didiny amin''ny fony rehetra sy ny fanahiny rehetra, hankatò ny tenin''ny fanekena izay voasoratra ao amin''izany boky izany, '
  '32':
  - type: text
    content: 'sady nampifikiriny tsara koa ny olona rehetra tany Jerosalema sy ny Benjamina. Ary ny mponina tany Jerosalema dia nanao araka ny faneken''Andriamanitra, dia Andriamanitry ny razany '
  '33':
  - type: text
    content: Ary Josia nanaisotra ny fahavetavetana rehetra tamin'ny tany rehetra izay an'ny Zanak'isiraely sady nandidy izay rehetra teo amin'ny Isiraely hanompo an'i Jehovah Andriamaniny. Tamin'ny andro rehetra niainan'i Josia dia tsy mba niala tamin'ny fanarahana an'i Jehovah, Andriamanitry ny razany, ny olona.
  '4':
  - type: text
    content: Ary noravan'ny olona teo anatrehan'i Josia ny alitaran'ireo Bala; ary ny tsangan-kazo
  - type: note
    content: 'Na: tsangam-bato'
  - type: text
    content: ' ho an''ny masoandro izay teo amboniny dia nokapainy; ary ny Aseraha sy ny sarin-javatra voasokitra mbamin''ny sarin-javatra an-idina dia novakivakiny sy notorotoroiny ho vovoka ka nafafiny teny amin''ny fasan''ireo efa namono zavatra hatao fanatitra ho azy. '
  '5':
  - type: text
    content: 'Ary nandoro ny taolan''ny mpisorona teo ambonin''ny alitarany izy, ka dia nanadio an''i Joda sy Jerosalema. '
  '6':
  - type: text
    content: 'Ary tany amin''ny tanànan''ny Manase sy ny Efraima ary ny Simeona hatrany amin''ny Naftaly, dia tao an-tanànany izay rava, '
  '7':
  - type: text
    content: dia noravany koa ny alitara sy ny Aseraha; ary ny sarin-javatra voasokitra nomongomongoiny ho vovoka; ary ny tsangan-kazo
  - type: note
    content: 'Na: tsangam-bato'
  - type: text
    content: ' ho an''ny masoandro eran''ny tanin''ny Isiraely rehetra dia nokapainy; ary dia niverina ho any Jerosalema izy. '
  '8':
  - type: text
    content: 'Ary tamin''ny taona fahavalo ambin''ny folo nanjakany, rehefa voadiony ny tany sy ny trano, dia naniraka an''i Safana, zanak''i Azalia, sy Mahaseia, komandin''ny tanàna, ary Joa, zanak''i Joahaza, mpitadidy ny raharaham-panjakana, izy mba hamboatra ny tranon''i Jehovah Andriamaniny. '
  '9':
  - type: text
    content: 'Ary rehefa tonga teo amin''i Hilkia mpisoronabe izy, dia natolony ny vola izay nampidirina tao an-tranon''Andriamanitra, izay efa nangonin''ny Levita, mpiandry varavarana, tamin''ny Manase sy ny Efraima sy ny sisa rehetra tamin''ny Isiraely, ary tamin''ny Joda sy ny Benjamina rehetra sy ny mponina tany Jerosalema. '
