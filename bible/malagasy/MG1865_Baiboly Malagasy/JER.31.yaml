document_id: JER.31
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny famindram-po ho an'ny firenen'Isiraely, sy ny fanekena hatao aminy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Amin''izany andro izany, hoy Jehovah, dia ho Andriamanitry ny isam-pianakavian''ny Isiraely Aho, ary izy ho oloko. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain''i Jehovah: Hahita'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Nahita'
    marker-yv: yv-n
  - type: text
    text: ' fitia any an-efitra ny olona izay sisa tsy matin''ny sabatra; Handeha Aho ka hanome'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Nandeha Aho ka nanome'
    marker-yv: yv-n
  - type: text
    text: ' fitsaharana ho an''ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tany lavitra any
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Tamin''ny fahiny'
    marker-yv: yv-n
  - type: text
    text: ' no nisehoan''i Jehovah tamiko ka nanao hoe: Fitiavana mandrakizay no nitiavako anao, koa izany no nampaharetako famindram-po ho anao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mbola hanorina anao indray Aho, ka dia hiorina ianao, ry Isiraely virijina! Ary mbola hiravaka mitondra ny ampongatapakao ianao ka hivoaka amin''ny dihin''ny mifaly. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mbola hanao tanim-boaloboka ao amin''ny tendrombohitr''i Samaria ianao; Ny mpamboly dia hamboly sady hihinana ny vokatra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa mbola hisy andro hiantsoan''ny mpitazana any amin''ny tany havoan''i Efraima hoe: Mitsangana ianareo, ka andeha isika hiakatra any Ziona, Ho any amin''i Jehovah Andriamanitsika. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa izao no lazain''i Jehovah: Mihobia amin''ny fifaliana noho ny amin''i Jakoba, ary mifalia noho ny amin''ny lohan''ny firenena, torionareo, deraonareo, ka ataovy hoe: Jehovah ô, vonjeo ny olonao, dia ny sisa amin''ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Indro, hitondra azy avy any amin''ny tany avaratra Aho sy hanangona azy avy any amin''ny faran''ny tany, ka dia samy ho eny aminy avokoa na ny jamba na ny mandringa, na izay manan''anaka na izay mihetsi-jaza; Irai-dia marenina no hiverina atỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Amin''ny fitomaniana no hihaviany, ary amin''ny fifonany no hitondrako azy; Ary ho entiko ho eny amoron''ny renirano izy, amin''ny lalana mahitsy izay tsy hahatafintohina azy; Fa Rain''Isiraely Aho, ary Efraima no lahimatoako. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mihainoa ny tenin''i Jehovah, ianareo jentilisa, ary torio any amin''ny tany amoron-tsiraka any lavitra any izany, ka atao hoe: Izay nampiely ny Isiraely no hanangona azy indray sady hitandrina azy toy ny fitandrin''ny mpiandry ondry ny ondriny. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa Jehovah efa nanavotra an''i Jakoba sy efa nanafaka azy tamin''ny tanan''ny mahery noho izy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ka dia ho avy ireny ka hihoby ao amin''ny havoan''i Ziona, dia hitanjozotra ho any amin''ny zava-tsoan''i Jehovah, dia ny vary sy ny ranom-boaloboka sy ny diloilo sy ny zanak''ondry ary ny zanak''omby; Ary ny fanahiny ho toy ny tanimboly vonton-drano, ka tsy hihamalazo intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary amin''izany dia ho faly amin''ny fandihizana ny virijina mbamin''ny zatovo sy ny antitra koa; Fa hampodiko ho fifaliana ny fitomaniany, ka hampiononiko sy hampifaliko izy ho afaka alahelo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia hovokisako zava-matavy ny fanahin''ny mpisorona, ary ny oloko ho voky ny zava-tsoako, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izao no lazain''i Jehovah: Nisy feo re tao Rama, dia fidradradradrana sy fitomaniana fatratra; Rahely nitomany ny zanany, ary tsy azo nampiononina izy noho ny amin''ny zanany, satria lany ritra ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izao no lazain''i Jehovah: Atsaharo ny fitomanianao sy ny fandatsahanao ranomaso; Fa hisy valiny tokoa ny ataonao, hoy Jehovah, ary hody avy any amin''ny tanin''ny fahavalo ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary misy fanantenana ho anao any amparany, hoy Jehovah; Fa ny zaza dia hiverina ho any amin'ny taniny indray.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Efa reko tokoa Efraima nitomany ny tenany hoe: Nofaizanao aho, eny, nofaizana toy ny ombilahy kely tsy voafolaka; Avereno aho, dia ho tafaverina, fa Hianao no Jehovah Andriamanitro. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nony efa niverina tokoa aho, dia vao nahalala fanenenana; Ary rehefa nampahafantarina ny toe-tenako aho, dia niteha-tratra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. niteha-pe
    marker-yv: yv-n
  - type: text
    text: '; Menatra sady mangaihay aho, fa latsain''ny tsinin''ny fahatanorako. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Zanako mahafinaritra va Efraima, zaza malalako va izy, no dia fatra-pahatsiaro azy isaky ny mitezitra azy Aho? Noho izany dia onena azy ny foko
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. maneno ny tsinaiko
    marker-yv: yv-n
  - type: text
    text: '; Hamindra fo aminy tokoa Aho, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Manangàna famantaran-dalana ho anao ianao, manorena tsangam-bato; Saino tsara ny lalana efa voavoatra, dia ilay lalana efa nalehanao; Miverena indray, ry Isiraely virijina, miverena indray ho amin''ireto tanànanao ireto. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mandra-pahoviana no hirioriovanao, ry zanakavavy mpiodina? Fa Jehovah efa namorona zava-baovao amin''ny tany: Vehivavy no hanodidina lehilahy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Mbola holavina indray ao amin''ny tanin''ny Joda sy ao amin''ny tanànany izao teny izao, raha hampodiko avy amin''ny fahababoany izy: Hotahin''i Jehovah anie ianao, ry fonenan''ny fahamarinana, sy ry tendrombohitry ny fahamasinana! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ny Joda sy ny tanànany rehetra dia hiara-monina ao aminy ho mpiasa tany sy ho mpilasy mitondra ny andian''ny ondry aman''osiny. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa ny fanahy ana dia hampisotroiko, ary ny fanahy mihaosa rehetra dia hovokisako. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary tamin''izay dia nahatsiaro aho ka nahita; Ary mamiko ny torimasoko. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Indro, avy ny andro, hoy Jehovah, ka hafafiko eo amin''ny taranak''Isiraely sy ny taranak''i Joda Ny taranak''olombelona sy ny taranaky ny biby fiompy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary toy ny niambenako azy hongotana sy hazera sy harodana sy horavana ary hampahorina, dia ho toy izany no hiambenako azy Haorina sy hambolena kosa, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Amin''izany andro izany izy dia tsy hanao intsony hoe: ny ray no nihinana voaloboka maharikivy, ka ny nifin''ny zanany no madilo. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Fa ny olona rehetra samy ho fatin'ny helony avy; Izay rehetra homana ny voaloboka maharikivy. Dia izy ihany no hadilo nify.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Indro, avy ny andro, hoy Jehovah, Izay hanaovako fanekena vaovao amin''ny taranak''Isiraely sy ny taranak''i Joda, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Nefa tsy araka ny fanekena nataoko tamin'ny razany tamin'ny andro nitantanako azy nitondra azy nivoaka avy tany amin'ny tany Egypta; Fa izy ireny dia nivadika ny fanekeko, Nefa Izaho no vadiny
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tompony'
    marker-yv: yv-n
  - type: text
    text: ',hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa izao no fanekena havoko amin''ny taranak''Isiraely. Rehefa afaka izany andro izany, hoy Jehovah: Dia hataoko ao an-tsainy ny lalàko sady hosoratako ao am-pony; Ary Izaho ho Andriamaniny, ary izy ho oloko. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary samy tsy hampianatra ny namany sy ny rahalahiny avy intsony izy hoe: Mahalalà an''i Jehovah; Fa samy hahalala Ahy avokoa izy rehetra. Hatramin''ny kely indrindra ka hatramin''ny lehibe indrindra, hoy Jehovah; Fa havelako ny helony, ary tsy hotsarovako intsony ny fahotany. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Izao no lazain''i Jehovah, Izay manome ny masoandro ho fahazavana amin''ny antoandro ary ny filahatry ny volana sy ny kintana ho fahazavana amin''ny alina, Izay mampanonja ny ranomasina, ka dia mirohondrohona ny onjany, Jehovah, Tompon''ny maro, no anarany: '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Raha miova eo anoloako izany filahatra izany, hoy Jehovah, dia hitsahatra tsy ho firenena eo anatrehako mandrakizay kosa ny taranak''Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Izao no lazain''i Jehovah: Raha misy maharefy ny lanitra ambony, na mahafantatra ny fanorenan''ny tany ambany, dia Izaho kosa hanary ny taranak''Isiraely rehetra noho izay rehetra nataony, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Indro, avy ny andro, hoy Jehovah, Izay hanorenana ity tanàna ity indray ho an''i Jehovah hatramin''ny tilikambon''i Hananela ka hatramin''ny vavahady an-jorony. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary ny famolaina dia mbola hohenjaniko mahitsy hatreo an-tampon''ny tendrombohitra Gareba, dia hasangodina ho any Goa; '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Ary ny lohasaham-paty sy lavenona rehetra sy ny saha rehetra hatramin'ny Lohasahan-driaka Kidrona ka hatramin'ny zoron'ny vavahadin-tsoavaly atsinanana dia ho masina ho an'i Jehovah; Tsy hongotana na horavana intsony izy mandrakizay.
