document_id: DEU.24,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Didy samy hafa ny amin'ny fisaoram-bady sy ny tsi-fanaovana izay hampahory ny sasany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Raha misy lehilahy maka vady ka mampakatra azy, ary tsy tiany intsony ravehivavy noho ny ahitany fahalotoana eo aminy, dia aoka hanoratra taratasy fisaoram-bady ho an-dravehivavy Izy ary hanolotra izany eo an-tànany ka hampiala azy ao an-tranony. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Raha mampisambo-javatra ny namanao ianao, dia aza miditra ao an-tranony handray ny antoka aminy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Mijanòna eo ala-trano, ary ny lehilahy izay nampisamborinao no hamoaka ny antoka ho aminao eo ala-trano. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary raha malahelo ralehilahy, dia aza tananao miloaka alina ny antoka, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: fa tsy maintsy haverinao aminy mihitsy, rehefa tokony ho maty masoandro, mba hirakofany ny lambany, ka hisaorany anao; dia ho fahamarinana ho anao eo anatrehan'i Jehovah Andriamanitrao izany.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Aza manao fitondrana sarotra amin''ny mpikarama izay mahantra sy malahelo, na rahalahinao, na vahiny ao amin''ny taninao sy ao an-tanànanao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Fa andro anaovany ihany no hanomezanao azy ny karamany, raha mbola tsy milentika ny masoandro, fa malahelo izy, ka izany no irin'ny fony; fandrao hitaraina amin'i Jehovah noho ny nataonao izy, dia ho fahotana aminao izany.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny ray tsy hatao maty amin'ny ataon'ny zanany, ary ny zanaka tsy hatao maty amin'ny ataon'ny rainy; fa samy hatao maty amin'ny fahotany avy ihany ny olona.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Aza manao fitsarana miangatra amin''ny vahiny sy ny kamboty; ary aza maka ny fitafian''ny mpitondratena ho tsatòka. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Fa tsarovy fa andevo tany Egypta ianao, ary Jehovah Andriamanitrao efa nanavotra anao ho afaka tany; koa izany no andidiako anao hanao izany zavatra izany.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Raha mijinja ny varinao any an-tsaha ianao, ka misy amboara hadinonao any, dia aza miverina haka azy; fa aoka ho an''ny vahiny sy ny kamboty ary ny mpitondratena izany; mba hotahin''i Jehovah Andriamanitrao ianao amin''ny asa rehetra ataon''ny tananao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary rehefa miala ao an-tranony ravehivavy, dia mahazo mandeha ka manambady olon-kafa. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Raha manintsana ny hazo olivanao ianao, dia aza miverina hitsimpona izay sisa; fa aoka ho an''ny vahiny sy ny kamboty ary ny mpitondratena izany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Raha mioty ny voalobokao ianao, dia aza miverina hitsimpona izay sisa; fa aoka ho an''ny vahiny sy ny kamboty ary ny mpitondratena izany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary tsarovy fa andevo tany amin'ny tany Egypta ianao; koa izany no andidiako anao hanao izany zavatra izany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary raha tsy tia an-dravehivavy ilay vao manambady azy ka manoratra taratasy fisaoram-bady koa ary manolotra izany eo an-tànany ka mampiala azy ao an-tranony, na maty ilay nanambady azy taoriana: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ilay nanambady azy taloha ka nisaotra azy dia tsy mahazo manambady azy intsony, rehefa voaloto izy; fa fahavetavetana eo imason'i Jehovah izany; ary aza mampiditra heloka amin'ny tany, izay omen'i Jehovah Andriamanitrao ho lovanao.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Raha misy lehilahy vao nampaka-bady, dia tsy handeha hiantafika izy, ary tsy hampanaovina fanompoana akory, fa havela hitoetra ao an-tranony herintaona ka hampifaly ny vadiny izay vao nampakariny.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Aza misy olona maka ny fikosoham-bary ho tsatòka, na ny vatony ambony aza; fa maka aina ho tsatòka izany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Raha misy olona hita mangalatra ny anankiray amin'ny Zanak'Isiraely rahalahiny ka manandevo azy, dia hatao maty izany mpangalatra izany; hofongoranao tsy ho eo aminao ny fanao ratsy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mitandrema ny amin''ny habokana, ka araho tsara izay rehetra hatoron''ireo Levita mpisorona anareo; araka izay nandidiako azy no hotandremanareo harahina. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tsarovy izay nataon'i Jehovah Andriamanitrao tamin'i Miriama teny an-dalana tamin'ny nandehananareo avy tany Egypta.
