document_id: EXO.34,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanavaozan'Andriamanitra ny fanekena
  - type: text
    content: 'Ary hoy Jehovah tamin''i Mosesy: Manamboara ho anao vato fisaka roa tahaka ilay teo, dia hosoratako amin''ireo vato fisaka ireo ny teny izay tamin''ilay vato fisaka teo, izay novakivakinao; '
  '10':
  - type: text
    content: 'Ary hoy Izy: Indro, manao fanekena Aho, ka eo anatrehan''ny olonao rehetra no hanaovako zava-mahagaga, izay tsy mbola nisy natao tany amin''ny tany rehetra sy tany amin''ny firenena rehetra; ary ny olona rehetra izay itoeranao dia hahita ny asan''i Jehovah, fa mahatahotra izay zavatra efa hataoko amin''ny fiombako anao. '
  '11':
  - type: text
    content: 'Tandremo izay andidiako anao anio; indro, efa horoahiko hiala eo anatrehanao ny Amorita sy ny Kananita sy ny Hetita sy ny Perizita sy ny Hivita ary ny Jebosita. '
  '12':
  - type: text
    content: 'Koa mitandrema, fandrao hanao fanekena amin''ny mponina eo amin''ny tany izay halehanao ianao, ka ho fandrika eo afovoanao izany. '
  '13':
  - type: text
    content: 'Fa ravao ny alitarany, ary torotoroy ny tsangam-baton-tsampiny, ary jinjao ny Aserahany. '
  '14':
  - type: text
    content: 'Fa tsy hiankohoka eo anatrehan''izay andriamani-kafa ianao; fa Jehovah, dia saro-piaro no anarany, satria Andriamanitra saro-piaro Izy, '
  '15':
  - type: text
    content: 'fandrao ianao hanao fanekena amin''ny mponina eo amin''ny tany, ka hijangajanga hanaraka ny andriamaniny sy hamono zavatra hatao fanatitra ho an''ny andriamaniny izy, ary hasainy ianao ka hihinana amin''ny fanatiny; '
  '16':
  - type: text
    content: 'ary andrao koa haka amin''ny zananivavy ho vadin''ny zanakao-lahy ianao, ary hijangajanga hanaraka ny andriamaniny ny zananivavy ka hampandeha ny zanakao-lahy hijangajanga hanaraka ny andriamaniny. '
  '17':
  - type: text
    content: 'Aza manao andriamanitra anidina ho anao. '
  '18':
  - type: text
    content: 'Tandremo ny andro firavoravoana, dia ny andro fihinanana ny mofo tsy misy masirasira. Hafitoana no hihinananao ny mofo tsy misy masirasira, araka izay nandidiako anao, amin''ny fotoan''andro amin''ny volana Abiba, fa tamin''ny volana Abiba no nivoahanao avy tany Egypta. '
  '19':
  - type: text
    content: 'Izay voalohan-teraka rehetra no Ahy, dia ny lahy amin''ny voalohan-teraky ny bibinao, na omby na ondry aman''osy; '
  '2':
  - type: text
    content: 'ary aoka hivonona ianao mandra-pahamaraina; dia miakara raha maraina ho ao amin''ny tendrombohitra Sinay, ka mitsangana eo anatrehako ao an-tampon''ny tendrombohitra. '
  '20':
  - type: text
    content: 'fa ny voalohan-teraky ny boriky kosa dia hosoloanao zanak''ondry; ary raha tsy hanolo azy ianao, dia hofolahinao ny vozony; ary ny lahimatoa rehetra amin''ny zanakao dia havotanao. Ary aoka tsy hisy hiseho foana tsy mitondra fanatitra eo anatrehako. '
  '21':
  - type: text
    content: 'Henemana no hiasanao, fa amin''ny andro fahafito dia hitsahatra ianao: na dia amin''ny taom-pamafazana sy amin''ny taom-pijinjana aza dia hitsahatra ihany ianao. '
  '22':
  - type: text
    content: 'Ary tandremo ny andro firavoravoana manarakaraka ireo herinandro amin''ny fanaterana ny voaloham-bokatra, raha mijinja ny vary tritika, sy ny andro firavoravoana amin''ny fanangonana amin''ny fitsingerenan''ny taona. '
  '23':
  - type: text
    content: 'Intelo isan-kerintaona ny lehilahy rehetra aminao no hiseho eo anatrehan''i Jehovah Tompo, Andriamanitry ny Isiraely. '
  '24':
  - type: text
    content: 'Fa handroaka firenena eo alohanao Aho ka hanitatra ny fari-taninao; ary tsy hisy olona haniry ny taninao, raha miakatra hiseho eo anatrehan''i Jehovah Andriamanitrao intelo isan-kerintaona ianao. '
  '25':
  - type: text
    content: 'Aza manatitra ny ran''ny zavatra vonoina hatao fanatitra ho Ahy ianao, raha mbola misy masirasira ao aminao; ary aza avela ho tra-maraina ny zavatra vonoina hatao fanatitra ho Ahy amin''ny andro firavoravoana amin''ny Paska. '
  '26':
  - type: text
    content: 'Ny santatra amin''ny voaloham-bokatry ny taninao dia haterinao ho ao an-tranon''i Jehovah Andriamanitrao. Aza mahandro zanak''osy amin''ny rononon-dreniny. '
  '27':
  - type: text
    content: 'Ary hoy Jehovah tamin''i Mosesy: Soraty ireo teny ireo, fa araka ireo teny ireo no nanaovako fanekena aminao sy amin''ny Isiraely. '
  '28':
  - type: text
    content: Dia teo amin'i Jehovah efa-polo andro sy efa-polo alina izy sady, tsy nihinan-kanina na nisotro rano. Ary nosoratan'i Jehovah tamin'ny vato fisaka ny tenin'ny fanekena, dia ny Didy Folo.
  '29':
  - type: text
    content: 'Ary Mosesy nidina avy tao an-tendrombohitra Sinay, ary teny an-tànany ny vato roa izay nisy ny Vavolombelona tamin''izy nidina avy teo an-tendrombohitra, ary tsy fantany ho namirapiratra ny hoditry ny tavany noho ny nitenenany taminy. '
  '3':
  - type: text
    content: 'Ary aoka tsy hisy olona hiakatra afa-tsy ianao, ary aoka tsy hisy olona ho hita eny amin''ny tendrombohitra Sinay rehetra; ary ny ondry aman''osy koa sy ny omby dia aoka tsy hisy handrasana eny akaikin''izany tendrombohitra izany '
  '30':
  - type: text
    content: 'Ary nony hitan''i Arona sy ny Zanak''Isiraely rehetra Mosesy, ka, indro, namirapiratra ny hoditry ny tavany, dia natahotra azy izy. '
  '31':
  - type: text
    content: 'Ary Mosesy niantso azy, dia niverina Arona sy ny lohan''ny fiangonana rehetra ho eo aminy; ary Mosesy niteny taminy. '
  '32':
  - type: text
    content: 'Ary rehefa afaka izany, dia nanakaiky koa ny Zanak''Isiraely rehetra; ary Mosesy nandidy azy araka izay rehetra nolazain''i Jehovah taminy tao amin''ny tendrombohitra Sinay. '
  '33':
  - type: text
    content: 'Ary rehefa vita ny teny nataon''i Mosesy taminy, dia nasiany fisalobonana ny tavany. '
  '34':
  - type: text
    content: 'Ary raha niditra teo anatrehan''i Jehovah Mosesy hiteny aminy, dia nanaisotra ny fisalobonana izy mandra-pivoakany. Dia nivoaka izy ka nilaza tamin''ny Zanak''Isiraely izay efa nandidiana azy. '
  '35':
  - type: text
    content: Ary hitan'ny Zanak'Isiraely ny tavan'i Mosesy, fa, indro, namirapiratra ny hoditry ny tavany; dia nasaron'i Mosesy ny tavany indray ny fisalobonana mandra-pidiny hiteny aminy indray.
  '4':
  - type: text
    content: 'Dia nanamboatra vato fisaka roa tahaka ilay teo Mosesy, ary nifoha maraina koa izy ka niakatra tao amin''ny tendrombohitra Sinay, araka izay nandidian''i Jehovah azy; ary nentiny teny an-tànany ny vato fisaka roa. '
  '5':
  - type: text
    content: 'Ary Jehovah nidina tao anatin''ny rahona ka nijanona teo aminy, dia nanonona ny anaran''i Jehovah. '
  '6':
  - type: text
    content: 'Ary Jehovah nandalo teo anatrehany ka niantso hoe: Jehovah, Jehovah, Andriamanitra mamindra fo sy miantra, mahari-po sady be famindram-po sy fahamarinana, '
  '7':
  - type: text
    content: 'mitahiry famindram-po ho an''ny olona arivo mandimby, mamela heloka sy fahadisoana ary fahotana, kanefa tsy mety manamarina ny meloka, fa mamaly ny heloky ny ray amin''ny zanaka sy ny zafy hatramin''ny zafiafy sy ny zafindohalika. '
  '8':
  - type: text
    content: 'Ary Mosesy dia niondrika faingana tamin''ny tany ka niankohoka; '
  '9':
  - type: text
    content: 'dia hoy izy: Tompo ô, raha mba mahita fitia eo imasonao aho, aoka Hianao, Tompo ô, handeha ao afovoanay (fa firenena mafy hatoka izy), ka mamelà ny helokay sy ny fahotanay ary raiso ho lovanao izahay. '
