document_id: JOB.37,96
type_code: plt
verses:
  '1':
  - type: text
    content: Eny, izany no mampitepotepo ny foko ka mampiemponempona azy hiala amin'ny fitoerany.
  '10':
  - type: text
    content: Ny fofonain'Andriamanitra mahamisy ranomandry, ka voageja ny rano malalaka.
  '11':
  - type: text
    content: Ny rahona matevina tambesarany rano, ary ny rahon'ny helatra
  - type: note
    content: Heb. fahazavany
  - type: text
    content: ' dia ampieleziny;'
  '12':
  - type: text
    content: Dia mihodinkodina araka ny fitarihany azy ireo hanatanteraka izay rehetra andidiany azy eny ambonin'ny tany eran'izao tontolo izao
  - type: note
    content: 'Na: Eny ambonin''izao tontolo izao ho amin''ny tany'
  - type: text
    content: ','
  '13':
  - type: text
    content: Na alatsany ho famaizana raha tokony ho an'ny taniny izany na ho famindram-po kosa
  - type: note
    content: 'Na: alatsany ho famaizana, na hahasoa ny taniny, na ho famindram-po'
  - type: text
    content: .
  '14':
  - type: text
    content: Mihainoa izany, ry Joba; Mijanona, ka mba diniho ny fahagagana ataon'Andriamanitra.
  '15':
  - type: text
    content: Fantatrao va ny fanamboaran'Andriamanitra ireny sy ny fampitselatselany ny helatry
  - type: note
    content: Heb. fahazavany
  - type: text
    content: ' ny rahony?'
  '16':
  - type: text
    content: Fantatrao va ny fihevahevan'ny rahona matevina, dia ny fahagagana avon'Ilay tanteraka amin'ny fahalalana?
  '17':
  - type: text
    content: Hianao izay mahatsiaro ny fitafianao ho mafana, raha migaingaina ny andro azon'ny rivotra avy any atsimo,
  '18':
  - type: text
    content: Moa ianao niara-nanao taminy va, raha namelatra ny habakabaka Izy, izay mitoetra mafy toy ny zavatra manganohano natao an-idina?
  '19':
  - type: text
    content: Mba ampianaro anay ary izay holazainay aminy; Fa tsy hitanay izay halahatray noho ny aizina,
  '2':
  - type: text
    content: Mihainoa dia mihainoa ny fikotrokotroky ny feony sy ny rohona izay mivoaka avy amin'ny vavany.
  '20':
  - type: text
    content: Holazaina aminy va, raha miteny aho? Moa misy olona maniry ho levona
  - type: note
    content: Heb. miteny ta-hatelina
  - type: text
    content: ' tokoa va?'
  '21':
  - type: text
    content: 'Tsy hita ankehitriny ny mazava, Izay mamirapiratra any amin''ny rahona: Nefa raha mandalo ny rivotra, dia mampisava azy ihany izany.'
  '22':
  - type: text
    content: Avy any avaratra no ihavian'ny mazava mitarehim-bolamena
  - type: note
    content: Heb. ihavian'ny volamena
  - type: text
    content: ; Ao amin'Andriamanitra ny voninahitra mahatahotra.
  '23':
  - type: text
    content: Ny Tsitoha, tsy mahita Azy isika; Izay lehibe amin'ny hery sy ny fitsarana mbamin'ny fahamarinana tanteraka dia tsy mba mampahory
  - type: note
    content: 'Na: mamaly'
  - type: text
    content: .
  '24':
  - type: text
    content: Koa izany no atahoran'ny olona Azy; Tsy mety mijery izay manao azy ho hendry
  - type: note
    content: 'Heb. ny hendry am-po; na: Tsy misy mahita Azy ny hendry am-po rehetra'
  - type: text
    content: ' Izy.'
  '3':
  - type: text
    content: Mandefa izany ho eny ambanin'ny lanitra rehetra Izy, ary ny helatra
  - type: note
    content: Heb. fahazavany
  - type: text
    content: ' hatramin''ny faran''ny tany.'
  '4':
  - type: text
    content: Manarakaraka izany, dia misy feo mirohondrohona; Mampikotrokotroka ny feon'ny fahalehibiazany Izy, ka rehefa re ny feony, dia tsy sakanany ny helatra.
  '5':
  - type: text
    content: Mahagaga ny fikotrokotrok'Andriamanitra amin'ny feony; Manao zava-dehibe tsy takatry ny saintsika Izy.
  '6':
  - type: text
    content: 'Fa ny oram-panala baikoiny hoe: Milatsaha eny ambonin''ny tany ianao; Ary toy izany koa ny ranonorana mivatravatra, eny, dia ny ranonorany mivatravatra mafy.'
  '7':
  - type: text
    content: Mampiohona
  - type: note
    content: Heb. manisy tombo-kase
  - type: text
    content: ' ny tanan''ny olona rehetra Izy, mba samy hahalala izany ny olona rehetra izay nataony;'
  '8':
  - type: text
    content: Ary miditra ao am-piereny koa ny bibidia ka mamitsaka ao an-davany.
  '9':
  - type: text
    content: Avy any atsimo
  - type: note
    content: Heb. efi-trano
  - type: text
    content: ' ny tadio, ary entin''ny rivotra avy any avaratra'
  - type: note
    content: Heb. avy amin'ireo mpanahakahaka
  - type: text
    content: ' ny hatsiaka.'
