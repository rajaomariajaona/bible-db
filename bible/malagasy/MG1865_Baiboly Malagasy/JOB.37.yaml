document_id: JOB.37
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Eny, izany no mampitepotepo ny foko ka mampiemponempona azy hiala amin'ny fitoerany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mihainoa dia mihainoa ny fikotrokotroky ny feony sy ny rohona izay mivoaka avy amin'ny vavany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mandefa izany ho eny ambanin'ny lanitra rehetra Izy, ary ny helatra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. fahazavany
    marker-yv: yv-n
  - type: text
    text: ' hatramin''ny faran''ny tany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Manarakaraka izany, dia misy feo mirohondrohona; Mampikotrokotroka ny feon'ny fahalehibiazany Izy, ka rehefa re ny feony, dia tsy sakanany ny helatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mahagaga ny fikotrokotrok'Andriamanitra amin'ny feony; Manao zava-dehibe tsy takatry ny saintsika Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa ny oram-panala baikoiny hoe: Milatsaha eny ambonin''ny tany ianao; Ary toy izany koa ny ranonorana mivatravatra, eny, dia ny ranonorany mivatravatra mafy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mampiohona
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. manisy tombo-kase
    marker-yv: yv-n
  - type: text
    text: ' ny tanan''ny olona rehetra Izy, mba samy hahalala izany ny olona rehetra izay nataony;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary miditra ao am-piereny koa ny bibidia ka mamitsaka ao an-davany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Avy any atsimo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. efi-trano
    marker-yv: yv-n
  - type: text
    text: ' ny tadio, ary entin''ny rivotra avy any avaratra'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. avy amin'ireo mpanahakahaka
    marker-yv: yv-n
  - type: text
    text: ' ny hatsiaka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny fofonain'Andriamanitra mahamisy ranomandry, ka voageja ny rano malalaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny rahona matevina tambesarany rano, ary ny rahon'ny helatra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. fahazavany
    marker-yv: yv-n
  - type: text
    text: ' dia ampieleziny;'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia mihodinkodina araka ny fitarihany azy ireo hanatanteraka izay rehetra andidiany azy eny ambonin'ny tany eran'izao tontolo izao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Eny ambonin''izao tontolo izao ho amin''ny tany'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Na alatsany ho famaizana raha tokony ho an'ny taniny izany na ho famindram-po kosa
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: alatsany ho famaizana, na hahasoa ny taniny, na ho famindram-po'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mihainoa izany, ry Joba; Mijanona, ka mba diniho ny fahagagana ataon'Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fantatrao va ny fanamboaran'Andriamanitra ireny sy ny fampitselatselany ny helatry
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. fahazavany
    marker-yv: yv-n
  - type: text
    text: ' ny rahony?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fantatrao va ny fihevahevan'ny rahona matevina, dia ny fahagagana avon'Ilay tanteraka amin'ny fahalalana?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hianao izay mahatsiaro ny fitafianao ho mafana, raha migaingaina ny andro azon'ny rivotra avy any atsimo,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Moa ianao niara-nanao taminy va, raha namelatra ny habakabaka Izy, izay mitoetra mafy toy ny zavatra manganohano natao an-idina?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mba ampianaro anay ary izay holazainay aminy; Fa tsy hitanay izay halahatray noho ny aizina,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Holazaina aminy va, raha miteny aho? Moa misy olona maniry ho levona
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. miteny ta-hatelina
    marker-yv: yv-n
  - type: text
    text: ' tokoa va?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tsy hita ankehitriny ny mazava, Izay mamirapiratra any amin''ny rahona: Nefa raha mandalo ny rivotra, dia mampisava azy ihany izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Avy any avaratra no ihavian'ny mazava mitarehim-bolamena
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ihavian'ny volamena
    marker-yv: yv-n
  - type: text
    text: ; Ao amin'Andriamanitra ny voninahitra mahatahotra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny Tsitoha, tsy mahita Azy isika; Izay lehibe amin'ny hery sy ny fitsarana mbamin'ny fahamarinana tanteraka dia tsy mba mampahory
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mamaly'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Koa izany no atahoran'ny olona Azy; Tsy mety mijery izay manao azy ho hendry
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Heb. ny hendry am-po; na: Tsy misy mahita Azy ny hendry am-po rehetra'
    marker-yv: yv-n
  - type: text
    text: ' Izy.'
