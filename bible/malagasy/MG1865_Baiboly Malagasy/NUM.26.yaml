document_id: NUM.26,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nandaminana ny Isiraely fanindroany, teo Arbota-moaba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa afaka ny areti-mandringana, dia hoy Jehovah tamin''i Mosesy sy Eleazara, zanak''i Arona mpisorona: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary nisokatra ny tany ka nitelina azy mbamin''i Kora, tamin''ny nahafatesan''izany antokony izany, ary levon''ny afo koa ny dimam-polo amby roan-jato lahy ka tonga fananarana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa ny zanak''i Kora tsy mba maty. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny taranak''i Simeona, araka ny fokony, dia izao: avy tamin''i Nemoela ny fokon''ny Nemoelita; avy tamin''i Jamina ny fokon''ny Jaminita; avy tamin''i Jakina ny fokon''ny Jakinita; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avy tamin''i Zera ny fokon''ny Zerita; avy tamin''i Saoly ny fokon''ny Saolita. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no fokon'ny Simeonita, dia roanjato amby roa arivo sy roa alina.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny taranak''i Gada, araka ny fokony, dia izao: avy tamin''i Zefona ny fokon''ny Zefonita; avy tamin''i Hagy ny fokon''ny Hagita; avy tamin''i Sony ny fokon''ny Sonita; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avy tamin''i Ozny ny fokon''ny Oznita; avy tamin''i Erỳ ny fokon''ny Erita; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avy tamin''i Aroda ny fokon''ny Arodita; avy tamin''i Arely ny fokon''ny Arelita. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo no fokon''ny zanak''i Gada, araka izay voalamina taminy, dia diman-jato amby efatra alina '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanak''i Joda dia Era sy Onana; kanefa Era sy Onana dia maty tany amin''ny tany Kanana ihany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alao isa ny fiangonana, dia ny Zanak''Isiraely rehetra, hatramin''ny roa-polo taona no ho miakatra, araka ny fianakaviany avy, dia izay rehetra amin''ny Isiraely azo halefa hanafika. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny taranak''i Joda, araka ny fokony, dia izao: avy tamin''i Sela ny fokon''ny Selita; avy tamin''i Fareza ny fokon''ny Farezita; avy tamin''i Zera ny fokon''ny Zerita. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny taranak''i Fareza dia izao: avy tamin''i Hezrona ny fokon''ny Hezronita; avy tamin''i Hamola ny fokon''ny Hamolita. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no fokon'i Joda, araka izay voalamina taminy, dia diman-jato amby enina arivo sy fito alina.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny taranak''Isakara, araka ny fokony, dia izao: avy tamin''i Tola ny fokon''ny Tolita; avy tamin''i Pova ny fokon''ny Povita; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avy tamin''i Jasoba ny fokon''ny Jasobita; avy tamin''i Simrona ny fokon''ny Simronita, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no fokon'Isakara, araka izay voalamina taminy, dia telon-jato amby efatra arivo sy enina alina.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny taranak''i Zebolona, araka ny fokony, dia izao: avy tamin''i Sereda ny fokon''ny Seredita; avy tamin''i Elona ny fokon''ny Elonita; avy tamin''i Jahalela ny fokon''ny Jahalelita. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no fokon'ny Zebolonita, araka izay voalamina taminy. dia diman-jato amby enina alina.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanak''i Josefa, araka ny fokony, dia Manase sy Efraima. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny taranak''i Manase dia izao: avy tamin''i Makira ny fokon''ny Makirita; ary Makira niteraka an''i Gileada; avy tamin''i Gileada ny fokon''ny Gileadita. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Mosesy sy Eleazara mpisorona dia nilaza taminy teo Arbota-moaba, teo amoron''i Jordana tandrifin''i Jeriko, ka nanao hoe: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no taranak''i Gileada: avy tamin''i Jezera ny fokon''ny Jezerita; avy tamin''i Heleka ny fokon''ny Helekita; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary avy tamin''i Äsriela ny fokon''ny Asrielita; ary avy tamin''i Sekema ny fokon''ny Sekemita; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary avy tamin''i Semida ny fokon''ny Semidita; ary avy tamin''i Hefera ny fokon''ny Heferita. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Zelofada, zanak''i Hefera, tsy mba nanan-janakalahy, fa zanakavavy ihany; ary ny anaran''ny zanakavavin''i Zelofada dia Mahala sy Noa sy Hogla sy Milka ary Tirza. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo no fokon''i Manase; ary izay voalamina taminy dia fiton-jato amby roa arivo amby dimy alina. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no taranak''i Efraima, araka ny fokony: avy tamin''i Sotela ny fokon''ny Sotelita; avy tamin''i Bekera ny fokon''ny Bekerita; avy tamin''i Tahana ny fokon''ny Tahanita. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no taranak''i Sotela: avy tamin''i Erana ny fokon''ny Eranita. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no fokon'ny taranak'i Efraima, araka izay voalamina taminy, dia diman-jato amby roa arivo sy telo alina. Ireo no taranak'i Josefa araka ny fokony.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny taranak''i Benjamina, araka ny fokony, dia izao: avy tamin''i Bela ny fokon''ny Belita; avy tamin''i Asibela ny fokon''ny Asibelita; avy tamin''i Ahirama ny fokon''ny Ahiramita; '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avy tamin''i Sefofama ny fokon''ny Sefofamita; avy tamin''i Hofama ny fokon''ny Hofamita. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny hatramin'ny roa-polo taona no ho miakatra no alao isa; araka izay nandidian'i Jehovah an'i Mosesy sy ny Zanak'Isiraely izay nivoaka avy tany amin'ny tany Egypta.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny taranak''i Bela dia Arda sy Namana; dia ny fokon''ny Ardita; ary avy tamin''i Namana ny fokon''ny Namanita. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no taranak'i Benjamina araka ny fokony; ary izay voalamina taminy dia enin-jato amby dimy arivo sy efatra alina.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no taranak''i Dana, araka ny fokony: avy tamin''i Sohama ny fokon''ny Sohamita. Ireo no fokon''i Dana, araka ny fokony. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fokon'ny Sohamita rehetra, araka izay voalamina taminy, dia efa-jato amby efatra arivo sy enina alina.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny taranak''i Asera, araka ny fokony dia izao: avy tamin''i Jimna ny fokon''ny Jimnita; avy tamin''i Jisvy ny fokon''ny Jisvita; avy tamin''i Bena ny fokon''ny Berita; '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avy tamin''ny zanak''i Bena dia izao: avy tamin''i Hebera ny fokon''ny Heberita; avy tamin''i Malkiela ny fokon''ny Malkielita. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny anaran''ny zanakavavin''i Asera dia Sera. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no fokon'ny taranak'i Asera, araka izay voalamina taminy, dia efa-jato amby telo arivo sy dimy alina.
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny taranak''i Naftaly, araka ny fokony, dia izao: avy tamin''i Jaziela ny fokon''ny Jazielita; avy tamin''i Gony ny fokon''ny Gonita; '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avy tamin''i Jezera ny fokon''ny Jezerita; avy tamin''i Silema ny fokon''ny Silemita. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Robena, lahimatoan''Isiraely; ary ny zanak''i Robena dia Hanoka sy ny fokon''ny Hanokita; avy tamin''i Palo ny fokon''ny Paloita; '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no fokon'i Naftaly araka ny fokony; ary izay voalamina taminy dia efa-jato amby dimy arivo sy efatra alina.
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no voalamina tamin'ny Zanak'Isiraely, dia telo-polo amby fiton-jato sy arivo sy enina hetsy.
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo no hizarana ny tany ho lovany, araka ny isany. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny maro isa homenao zara-tany bebe kokoa, ary ny vitsy isa homenao kelikely kokoa; samy araka ny voalamina taminy no hanomezana ny zara-taniny. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa filokana no hizarana ny tany; araka ny anaran''ny firenen''ny razany no hahazoany zara-tany. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia filokana no hizarana ny tany ho lovany, na ny ho an'ny maro, na ny ho an'ny vitsy.
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no voalamina tamin''ny taranak''i Levy, araka ny fokony: avy tamin''i Gersona ny fokon''ny Gersonita; avy tamin''i Kehata ny fokon''ny Kehatita; avy tamin''i Merary ny fokon''ny Merarita. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no fokon''i Levy: ny fokon''ny Libnita, ny fokon''ny Hebronita, ny fokon''ny Mahalita, ny fokon''ny Mosita, ny fokon''ny Koralta. Ary Kehata niteraka an''i Amrama. '
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny anaran''ny vadin''i Amrama dia Jokebeda, zanakavavin''i Levy, izay naterany tany Egypta; dia niteraka an''i Arona sy Mosesy ary Miriama anabaviny tamin''i Amrama izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avy tamin''i Hezrona ny fokon''ny Hezronita; avy tamin''i Karmy ny fokon''ny Karmita. '
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny naterak''i Arona dia Nadaba sy Abiho sy Eleazara ary Itamara. '
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa maty Nadaba sy Abiho tamin''izy nanatitra afo tsy izy teo anatrehan''i Jehovah. '
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izay voalamina taminy dia telo arivo amby roa alina, dia ny lahy rehetra hatramin''ny iray volana no ho miakatra; fa tsy niaraka nalamina tamin''ny Zanak''Isiraely izy, satria tsy mba nomena zara-tany teo amin''ny Zanak''Isiraely. '
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo no voalamin''i Mosesy sy Eleazara mpisorona, izay nandamina ny Zanak''Isiraely teo Arbota-moaba, teo amoron''i Jordana tandrifin''i Jeriko. '
  '64':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin''ireo dia tsy nisy olona avy tamin''izay efa voalamin''i Mosesy sy Arona mpisorona tamin''izy nandamina ny Zanak''Isiraely tany an-efitr''i Sinay. '
  '65':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Jehovah efa nilaza azy hoe: Ho faty any an-efitra tokoa ireo. Koa dia tsy nisy olona sisa tamin''ireny afa-tsy Kaleba, zanak''i Jefone, sy Josoa, zanak''i Nona, ihany.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo no fokon''ny Robenita; ary izay voalamina taminy dia telo-polo amby fiton-jato sy telo arivo sy efatra alina. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny zanak''i Palo dia Eliaba. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny zanak''i Eliaba dia Nemoela sy Datana ary Abìrama. Ireo dia ilay Datana sy Abìrama, olom-boafidin''ny fiangonana, izay nila ady tamin''i Mosesy sy Arona, teo amin''ny antokon''i Kora, raha nila ady tamin''i Jehovah izy, '
