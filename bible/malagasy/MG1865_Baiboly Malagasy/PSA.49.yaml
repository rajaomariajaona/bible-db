document_id: PSA.49
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahafoanan'ny harena amam-boninahitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Nataon''ny Koraita. Salamo. Mandrenesa izao, ry firenena rehetra; mihainoa, ry mponina rehetra amin''izao tontolo izao: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Na ny ambany, na ny ambony, na ny manan-karena, na ny malahelo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny vavako hiteny fahendrena; ary ny fieritreretan''ny foko dia fahalalana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hanongilana ny sofiko hihaino oha-teny aho, ary hanonona teny saro-pantarina ampiarahiko amin-dokanga.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nahoana no hatahotra amin''ny andro fahoriana aho, nony manodidina ahy ny haratsian''ny mpamingana ahy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia izay matoky ny hareny, Sy mirehareha amin''ny haben''ny fananany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tsy misy mahavotra ny rahalahiny akory, na mahazo manome an''Andriamanitra izay avony, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '(Fa sarotra avotra ny ainy ka tsy azo atao mandrakizay), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mba ho velona mandrakizay izy, ka tsy ho latsaka ao amin'ny lavaka
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ho tratry no lò'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa hita fa maty ihany ny olon-kendry; ary ny adala sy ny ketrina samy levona, ka mamela ny fananany ho an''ny hafa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Araka ny heviny dia ataony fa ho mandrakizay ny tranony, ary ny fonenany hahatratra ny taranaka fara mandimby; araka ny anarany no anononany ny taniny
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ankalazaina ny anarany eny amin''ny tany maro'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nefa na dia manana voninahitra aza ny olona, dia tsy maharitra izy; tahaka ny biby izay samy tsy maintsy ho faty izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izany no falehan''ny olona adala; ary ny taranany mandimby azy mankasitraka ny teniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tahaka ny fanangona ondry no fanangona azy any amin'ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Heb: Sheola'
    marker-yv: yv-n
  - type: text
    text: ; ny fahafatesana no mpiandry azy; ary hanapaka azy ny mahitsy nony maraina; ary ny bikany ho levona any amin'ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Heb: Sheola'
    marker-yv: yv-n
  - type: text
    text: ', ka tsy hisy fonenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa Andriamanitra kosa hamonjy ny aiko amin'ny herin'ny fiainan-tsi-hita,3 satria handray ahy Izy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Rehefa azony aho'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Aza matahotra ianao, raha misy olona tonga manan-karena, ka mitombo ny voninahitry ny tranony; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa tsy hitondra na inona na inona izy, raha maty; tsy mba hidina hanaraka azy ny voninahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Na dia miarahaba tena aza izy, raha mbola velona - Fa hidera anao ny olona, raha manisy soa ny tenanao ianao - '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hankany amin''ny razany izy, tsy hahita ny mazava intsony mandrakizay ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Izay olona manana voninahitra, nefa tsy manan-tsaina, dia tahaka ny biby izay samy tsy maintsy ho faty.
