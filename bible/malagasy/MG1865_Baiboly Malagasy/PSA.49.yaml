document_id: PSA.49,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahafoanan'ny harena amam-boninahitra
  - type: text
    content: 'Ho an''ny mpiventy hira. Nataon''ny Koraita. Salamo. Mandrenesa izao, ry firenena rehetra; mihainoa, ry mponina rehetra amin''izao tontolo izao: '
  '10':
  - type: text
    content: 'Fa hita fa maty ihany ny olon-kendry; ary ny adala sy ny ketrina samy levona, ka mamela ny fananany ho an''ny hafa. '
  '11':
  - type: text
    content: Araka ny heviny dia ataony fa ho mandrakizay ny tranony, ary ny fonenany hahatratra ny taranaka fara mandimby; araka ny anarany no anononany ny taniny
  - type: note
    content: 'Na: Ankalazaina ny anarany eny amin''ny tany maro'
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Nefa na dia manana voninahitra aza ny olona, dia tsy maharitra izy; tahaka ny biby izay samy tsy maintsy ho faty izy. '
  '13':
  - type: text
    content: 'Izany no falehan''ny olona adala; ary ny taranany mandimby azy mankasitraka ny teniny. '
  '14':
  - type: text
    content: Tahaka ny fanangona ondry no fanangona azy any amin'ny fiainan-tsi-hita
  - type: note
    content: 'Heb: Sheola'
  - type: text
    content: ; ny fahafatesana no mpiandry azy; ary hanapaka azy ny mahitsy nony maraina; ary ny bikany ho levona any amin'ny fiainan-tsi-hita
  - type: note
    content: 'Heb: Sheola'
  - type: text
    content: ', ka tsy hisy fonenany. '
  '15':
  - type: text
    content: Fa Andriamanitra kosa hamonjy ny aiko amin'ny herin'ny fiainan-tsi-hita,3 satria handray ahy Izy
  - type: note
    content: 'Na: Rehefa azony aho'
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Aza matahotra ianao, raha misy olona tonga manan-karena, ka mitombo ny voninahitry ny tranony; '
  '17':
  - type: text
    content: 'Fa tsy hitondra na inona na inona izy, raha maty; tsy mba hidina hanaraka azy ny voninahiny. '
  '18':
  - type: text
    content: 'Na dia miarahaba tena aza izy, raha mbola velona - Fa hidera anao ny olona, raha manisy soa ny tenanao ianao - '
  '19':
  - type: text
    content: 'Dia hankany amin''ny razany izy, tsy hahita ny mazava intsony mandrakizay ireny. '
  '2':
  - type: text
    content: 'Na ny ambany, na ny ambony, na ny manan-karena, na ny malahelo. '
  '20':
  - type: text
    content: Izay olona manana voninahitra, nefa tsy manan-tsaina, dia tahaka ny biby izay samy tsy maintsy ho faty.
  '3':
  - type: text
    content: 'Ny vavako hiteny fahendrena; ary ny fieritreretan''ny foko dia fahalalana. '
  '4':
  - type: text
    content: Hanongilana ny sofiko hihaino oha-teny aho, ary hanonona teny saro-pantarina ampiarahiko amin-dokanga.
  '5':
  - type: text
    content: 'Nahoana no hatahotra amin''ny andro fahoriana aho, nony manodidina ahy ny haratsian''ny mpamingana ahy, '
  '6':
  - type: text
    content: 'Dia izay matoky ny hareny, Sy mirehareha amin''ny haben''ny fananany? '
  '7':
  - type: text
    content: 'Tsy misy mahavotra ny rahalahiny akory, na mahazo manome an''Andriamanitra izay avony, '
  '8':
  - type: text
    content: '(Fa sarotra avotra ny ainy ka tsy azo atao mandrakizay), '
  '9':
  - type: text
    content: Mba ho velona mandrakizay izy, ka tsy ho latsaka ao amin'ny lavaka
  - type: note
    content: 'Na: ho tratry no lò'
  - type: text
    content: '. '
