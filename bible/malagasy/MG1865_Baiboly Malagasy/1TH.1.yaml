document_id: 1TH.1,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiarahabana ny Tesaloniana, sy fisaorana an'Andriamanitra noho ny nandraisan'ireo ny filazantsara sy ny nandrosoany tamin'ny finoana sy ny fitiavana
  - type: text
    content: 'Paoly sy Silasy ary Timoty mamangy ny fiangonan''ny Tesaloniana, izay ao amin''Andriamanitra Ray sy Jesosy Kristy Tompo: ho aminareo anie ny fahasoavana sy ny fiadanana.'
  '10':
  - type: text
    content: ary mba hiandry ny Zanany avy any an-danitra, Izay natsangany tamin'ny maty, dia Jesosy, izay Mpanafaka antsika amin'ny fahatezerana ho avy.
  '2':
  - type: text
    content: 'Misaotra an''Andriamanitra mandrakariva izahay ny aminareo rehetra ka manonona anareo amin''ny fivavahanay, '
  '3':
  - type: text
    content: 'sady tsy mitsahatra mahatsiaro ny asanareo amin''ny finoana sy ny fikelezanareo aina amin''ny fitiavana ary ny faharetanareo amin''ny fanantenana an i Jesosy Kristy Tompontsika eo imason''Andriamanitra Raintsika; '
  '4':
  - type: text
    content: 'fa fantatray, ry rahalahy malalan''Andriamanitra, ny fifidianana anareo, '
  '5':
  - type: text
    content: 'fa ny filazantsaranay tsy tonga teo aminareo tamin''ny teny ihany, fa tamin''ny hery koa sy ny Fanahy Masina ary ny fahatokiana be, araka ny ahafantaranareo izay toetry ny fitondran-tenanay teo aminareo noho ny aminareo. '
  '6':
  - type: text
    content: 'Ary ianareo efa nanahaka anay sy ny Tompo, satria nandray ny teny tamin''ny fahoriana be mbamin''ny hafaliana avy amin''ny Fanahy Masina, '
  '7':
  - type: text
    content: 'ka dia tonga fianarana ho an''ny mino rehetra any Makedonia sy Akaia ianareo. '
  '8':
  - type: text
    content: 'Fa avy taminareo no nanenoan''ny tenin''ny Tompo, tsy tany Makedonia sy Akaia ihany, fa teny tontolo eny no nielezan''ny lazan''ny finoanareo an''Andriamanitra, ka dia tsy misy holazainay intsony. '
  '9':
  - type: text
    content: 'Fa ireny ihany no milaza ny aminay, dia izay fidirana azonay ho atỳ aminareo sy ny nialanareo tamin''ny sampy hiverenana amin''Andriamanitra mba hanompo an''Andriamanitra velona sy marina, '
