document_id: 1KI.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny varotra nataon'i Solomona mbamin'ny hareny sy ny voninahiny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny mpanjakavavin''i Sheba, rehefa nahare ny lazan''i Solomona ny amin''ny anaran''i Jehovah. dia avy hizaha toetra azy amin''ny fanontaniana sarotra, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka tonga tany Jerosalema izy mbamin''ny mpanaraka maro be sy ny rameva izay nitondra zava-manitra sy volamena sesehena ary vato soa; ary rehefa tonga tany amin''i Solomona izy, dia nilaza taminy izay rehetra tao ampony. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary voavalin'i Solomona izy tamin'izay rehetra nanontaniany azy; tsy nisy zavatra niafina tamin'ny mpanjaka, ka dia nambarany azy avokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary rehefa hitan''ilay mpanjakavavin''i Sheba ny fahendren''i Solomona rehetra sy ny trano izay nataony '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: sy ny fihinany teo amin'ny latabany sy ny fipetrahan'ny tandapany sy ny fitoeran'ny mpanompony mbamin'ny fitafian'ireo sy ny mpitondra kapoakany ary ny ambaratonga izay niakarany ho ao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny fanatitra odorany izay nateriny tao'
    marker-yv: yv-n
  - type: text
    text: ' an-tranon''i Jehovah, dia talanjona terỳ izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ka hoy izy tamin''ny mpanjaka: Marina ny teny efa reko tany amin''ny taniko ny amin''ny teninao sy ny fahendrenao. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'kanefa tsy nino ny filazana aho, raha tsy tonga atỳ, ka ny masoko no mahita, kanjo hay! na dia ny antsasany aza tsy voalaza tamiko akory: fa, indro, ny fahendrenao sy ny voninahitrao dia mihoatra lavitra noho izay laza efa reko. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Sambatra lahy ny olonao, ary sambatra ireto tandapanao ireto, izay mijanona eto anatrehanao mandrakariva ka mandre ny fahendrenao '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Isaorana anie Jehovah Andriamanitrao, Izay tia anao ka nametraka anao amin''ny seza fiandrianan''ny Isiraely; fa noho ny fitiavan''i Jehovah, izay itiavany ny Isiraely mandrakizay, no nanaovany anao ho mpanjaka mba hanao fitsarana sy fahamarinana. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary izy nanome talenta volamena roa-polo amby zato sy zava-manitra sesehena ary vato soa ho an''ny mpanjaka; tsy nisy intsony zava-manitra be indrindra tonga tahaka ilay nomen''ny mpanjakavavin''i Sheba ho an''i Solomona mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny sambon''i Hirama koa, izay naka volamena avy any Ofira, dia nitondra hazo almoga be indrindra sy vato soa avy any Ofira. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny hazo almoga dia nataon''ny mpanjaka arofanina tamin''ny tranon''i Jehovah sy ny lapan''andriana ary nataony lokanga sy valiha ho an''ny mpihira kosa; tsy nisy hazo almoga tonga tany na hita toy izany intsony mandraka androany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary Solomona mpanjaka nanome ny mpanjakavavin'i Sheba kosa izay rehetra niriny, na inona na inona nangatahiny, afa-tsy izay nomeny azy araka ny fanomen'i Solomona mpanjaka; ka dia niverina izy, ary lasa nody tany amin'ny taniny izy mbamin'ny mpanompony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny lanjan''ny volamena izay tonga tao amin''i Solomona isan-taona dia talenta volamena enina amby enim-polo amby enin-jato, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'afa-tsy izay azony tamin''ny mpandranto.sy ny tamin''ny varotry ny mpivarotra ary tamin''ny mpanjakan''ny firenena samy hafa rehetra sy tamin''ny mpanapaka ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary Solomona mpanjaka nanao ampinga volamena lehibe roan-jato tamin''ny volamena voafisaka, ka takela-bolamena sekely enin-jato no napetaka tamin''ny ampinga lehibe iray. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nanao ampinga volamena telonjato koa izy tamin''ny volamena voafisaka, ka takela-bolamena telo mane no napetaka tamin''ny ampinga iray. Dia napetraky ny mpanjaka tao amin''ny trano Alan''i Libanona ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny mpanjaka dia nanao seza fiandrianana ivory lehibe, ka nopetahany takela-bolamena tsara indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nisy ambaratonga enina tamin''ny seza fiandrianana; ary ny lohan''ny seza fiandrianana, dia boribory ny eo an damosiny; ary nisy fitehenan-tanana teo an-daniny roa amin''ny fipetrahana; ary nisy sarin-diona roa teo an-danin''ny fitehenan-tanana. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nisy sarin-diona roa ambin''ny folo teo an-daniny roa teo amin''ny ambaratonga enina. Tsy nisy natao tahaka izany tany amin''ny fanjakana rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny fisotroan''i Solomona mpanjaka dia volamena, ary ny fanaka rehetra tao amin''ny trano Alan''i Libanona koa dia volamena tsara avokoa; tsy nisy volafotsy ireo; fa nataony toy ny tsinontsinona izany tamin''ny andron''i Solomona. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa ny mpanjaka nanana sambon'i Tarsisy mbamin'ny sambon'i Hirama teny ambonin'ny ranomasina; ary indray mandeha amin'ny telo taona no nihavian'ny sambon'i Tarsisy nitondra volamena sy volafotsy sy ivory sy rajako ary vorombola
  - type: usfm
    marker: x
    children:
    - type: text
      text: pavo
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary Solomona mpanjaka dia nanankarena sady hendry noho ny mpanjaka rehetra ambonin''ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ny tany rehetra nitady hahita ny tavan''i Solomona mba hihaino ny fahendrena izay nataon''Andriamanitra tao am-pony. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary izy rehetra dia samy nahatonga ny anjarany avy isan-taona, dia fanaka volafotsy sy fanaka volamena sy fitafiana sy fiadiana sy zava-manitra sy soavaly ary ampondra. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary Solomona nanangona kalesy sy mpitaingin-tsoavaly; ary nanana kalesy efajato amby arivo izy sy mpitaingin-tsoavaly roa arivo amby iray alina, izay nataony tao amin''ireo tanàna fitoeran''ny kalesy sy tao amin''ny mpanjaka tany Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary nataon'ny mpanjaka tahaka ny vato ny habetsaky ny volafotsy tany Jerosalema, ary ny hazo sedera nataony toy ny aviavy eny amin'ny tany lemaka amoron-tsiraka
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sefela
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary avy any Egypta no nahazoan''i Solomona soavaly; ary ny iray toko tamin''ny mpandranton''ny mpanjaka dia naka ny andiany iray araka izay vidiny voatendry. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary ny vidin'ny kalesy iray nentiny niakatra avy tany Egypta dia sekely volafotsy enin-jato, ary ny soavaly dia dimam-polo amby zato avy; ary toy izany kosa no nitondrany ho an'ny mpanjakan'ny Hetita sy ny mpanjakan'ny Syriana.
