document_id: ZEP.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hamaliana ny firenena rehetra noho ny ratsy nataony, indrindra fa ny Joda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny tenin'i Jehovah, izay tonga tamin'i Zefania, zanak'i Kosy, zanak'i Gedalia, zanak'i Amaria, zanak'i Hezekia, tamin'ny andro nanjakan'i Josia, zanak'i Amona, mpanjakan'ny Joda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hakifako tokoa ny zavatra rehetra tsy ho eny ambonin''ny tany, hoy Jehovah; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Eny, hakifako ny olona sy ny biby; Hakifako ny vorona eny amin''ny habakabaka sy ny hazandrano any an-dranomasina. Ary ny zavatra mahatafintohina mbamin''ny ratsy fanahy, Haringako tsy ho amin''ny tany ny olona, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hahinjitro ny tanako hamely ny Joda sy ny mponina rehetra any Jerosalema; Dia haringako tsy ho eo amin''ity tany ity ny sisa amin''i Bala, Sy ny anaran''ny mpisorona amin''ny andriamani-tsi-izy mbamin''ny tena mpisorona, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Sy izay mivavaka any an-tampon-trano amin'izay eny amin'ny lanitra,Ary izay miankohoka sy mianiana ho an'i Jehovah Sady mianiana amin'i Malkama
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny mpanjakany'
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary izay nihemotra niala tamin''i Jehovah, Sy izay tsy nitady an''i Jehovah na nanontany taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mangina eo anatrehan''i Jehovah Tompo! Fa efa antomotra ny andron''i Jehovah; Fa Jehovah efa niomana hamono zavatra hatao fanatitra Ka efa nanamasina ny olona nasainy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary raha mby amin''ny andro hamonoan''i Jehovah zavatra hatao fanatitra, Dia hovaliako ny lehibe sy ny zanak''andriana Mbamin''izay rehetra mitafy ny fitafin''ny firenena hafa. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary amin''izany andro izany dia hovaliako izay rehetra miezaka mihoatra ny tokonana, Dia ireo mameno loza sy fitaka ny tranon''ny tompony. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary amin''izany andro izany, hoy Jehovah, Dia hisy feo re mitaraina any am-bavahadin-kazandrano, Sy fidradradradrana ao amin''ny tanàna ambany, Ary fidarabohana miezinezina any amin''ny havoana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Midradradradrà, ianareo mponina ao Maktesy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Maktesy = Laona
    marker-yv: yv-n
  - type: text
    text: ; Fa ringana avokoa ny mpandranto
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: vahoakan''i Kanana'
    marker-yv: yv-n
  - type: text
    text: ' rehetra, Eny, lany ringana izay rehetra nivesatra volafotsy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary amin''izany andro izany dia hotsiloviko amin''ny jiro Jerosalema, Ka hovaliako ny olona izay efa lefy ao amin''ny faikany, Dia izay manao anakampo hoe: Sady tsy hanao soa Jehovah no tsy hanao ratsy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ka dia ho tonga babo ny fananan''ireny, Ary ho lao ny tranony; Dia hanao trano izy, nefa tsy hitoetra ao, Hamboly voaloboka izy, nefa tsy hisotro ny divay avy aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Efa antomotra ny andro lehiben''i Jehovah; Eny, efa antomotra sady mihafaingana indrindra, Injay! feon''ny andron''i Jehovah! Ny lehilahy mahery dia mitomany mafy any. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Andro fahatezerana izany andro izany, Andro fahoriana sy fahalahelovana, Andro fandravana sy fanafoanana, Andro maizina sy manjombona, Andro mandrahona sy maizim-pito. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Andro fahaveloman''ny anjomara sy ny akora, Hamelezana ny tanàna mimanda sy ny tilikambo avo eny amin''ny zorony. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hampahory ny olona Aho, Handehanany toy ny jamba, Satria efa nanota tamin''i Jehovah izy; Ny ràny dia haidina toy ny vovoka, Ary ny nofony ho toy ny zezika. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Na ny volafotsiny na ny volamenany dia samy tsy hahavonjy azy amin'ny andro fahatezeran'i Jehovah, Fa holevonin'ny afon'ny  fahasaro-piarony ny tany rehetra; Fa fahafonganana, eny, fahafonganana tampoka
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mahatsiravina'
    marker-yv: yv-n
  - type: text
    text: ' tokoa no hataony amin''ny mponina amin''ny tany.'
