document_id: GEN.29
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanompoan'i Jakoba an'i Labana hahazoany an'i Lea sy Rahely ho vadiny, sy ny nahaterahan'ny zanany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia niainga Jakoba ka nankany amin''ny tanin''ny zanaky ny atsinanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nijery izy, ka, indro, nisy lavaka fantsakana tany an-tsaha, ary, indro, nisy ondry aman''osy telo, dia nandry teo anilany; fa teo amin''izany lavaka fantsakana izany no fampisotroan''ny olona ny andian''ny ondry aman''osy; ary lehibe ny vato teo am-bavan''ny fantsakana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nangonina teo ny andian''ny ondry aman''osy rehetra, dia nakodian''ny olona ny vato hiala amin''ny vavan''ny lavaka fantsakana, ka nampisotroiny ny ondry aman''osy; ary dia naveriny indray ny Vato ho eo am-bavan''ny lavaka fantsakana ho amin''ny fitoerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy Jakoba tamin''ny olona: Ry rahalahiko, avy aiza moa ianareo? Ary hoy ireo: Avy any Harana izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy izy taminy: Moa mba fantatrareo va Labana, zanakalahin''i Nahora? Dia hoy izy: Fantatray ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy izy taminy: Tsara ihany va izy? Dia hoy izy: Tsara ihany izy; ary, indro, tamy Rahely zananivavy mitondra ny ondry aman''osy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy izy: Indro, mbola antoandrobe ny andro, ka tsy mbola mby amin''ny fotoana famoriana ny omby aman''ondry; ampisotroy ny ondry aman''osy, dia andeha, andraso. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy izy: Tsy azonay hatao izany, raha tsy efa tafangona avokoa ny andian''ny ondry aman''osy rehetra, ka hakodian''ny olona ny vato hiala amin''ny vavan''ny lavaka fantsakana; dia vao hampisotro ny ondry aman''osy izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Raha mbola niteny taminy izy; dia, indro, tamy Rahely nitondra ny ondry aman''osin-drainy; fa mpiandry ondry izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary rehefa hitan''i Jakoba Rahely, zanakavavin''i Labana anadahin-dreniny, sy ny ondry aman''osin''i Labana anadahin-dreniny, dia nanatona izy ka nanakodia ny vato hiala tamin''ny vavan''ny lavaka fantsakana, dia nampisotro ny ondry aman''osin''i Labana anadahin-dreniny izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Jakoba nanoroka an-dRahely, dia nanandrata ny feony ka nitomany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nambaran''i Jakoba tamin-dRahely fa havan-drainy sy zana-dRebeka izy; dia nihazakazaka Rahely nanambara izany tamin-drainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary rehefa ren''i Labana ny filazany an''i Jakoba, zanak''anabaviny, dia nihazakazaka nitsena azy izy ka namihina azy sy nanoroka azy ary nitondra azy ho any an-tranony. Dia nambaran''i Jakoba tamin''i Labana izany rehetra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy Labana taminy: Taolako sy nofoko tokoa ianao. Ary rehefa nitoetra tao aminy andro iray volana Jakoba,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'dia hoy Labana taminy: Moa na dia rahalahiko aza ianao, dia hano­mpo ahy maina va ? Lazao amiko izay ho karamanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary Labana nanan-janaka roa vavy: Lea no anaran''ny zokiny, ary Rahely no anaran''ny zandriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Lea nalemy maso; fa Rahely bikàna sady tsara tarehy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary Jakoba tia an-dRahely ka nanao hoe: Hanompo anao fito taona aho hahazoako an-dRahely, zanakao faravavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy Labana: Aleoko homena anao izy, toy izay homena lehilahy hafa; tomoera eto amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia nanompo an'i Labana fito taona Jakoba hahazoany an-dRahely; ary toa andro vitsy foana teo imasony izany noho ny fitiavany azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy Jakoba tamin''i Labana: Aiza ny vadiko, mba hanambadiako azy? fa efa tapitra ny fetr''androko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary nampamory ny tompon-tany rehetra Labana ka nanao fanasana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Kanjo nony hariva dia naka an''i Lea zananivavy izy ka nitondra azy ho any amin''i Jakoba; dia nanambady azy Jakoba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nomen''i Labana an''i Lea zananivavy Zilpa ankizivaviny hanompo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary nony efa maraina ny andro, indro fa Lea izy; dia hoy Jakoba tamin''i Labana: Ahoana izao nataonao tamiko izao? Moa tsy Rahely va no nanompoako anao? Ka nahoana no nofitahinao aho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia hoy Labana: Tsy fanao atỳ amin''ny taninay ny mamoaka ny zandriny alohan''ny zokiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tanteraho ny herinandron''ity anankiray ity, dia homenay anao koa ny anankiray noho ny fanompoana izay mbola hanompoanao ahy fito taona indray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia nataon''i Jakoba izany, ka notanterahiny ny herinandrony; dia nomen''i Labana azy koa Rahely zananivavy ho vadiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary nomen''i Labana an-dRahely zananivavy kosa Bila ankizivaviny hanompo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia novadin''i Jakoba koa Rahely; ary izy no tiany mihoatra noho Lea; dia nanompo an''i Labana fito taona indray izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary rehefa hitan''i Jehovah fa nankahalaina Lea, dia nampanan''anaka azy Izy; fa momba kosa Rahely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia nanan''anaka Lea ka niteraka zazalahy, ary ny anarany dia na­taony hoe Robena; fa hoy izy: Efa nitsinjo ny fahoriako Jehovah, fa ankehitriny dia ho tian''ny vadiko aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia nanan''anaka indray izy ka niteraka zazalahy; ary hoy izy: Satria ren''i Jehovah fa efa nankalahaina aho, dia nomeny ahy koa ity; dia nataony hoe Simeona ny anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia nanan''anaka indray izy ka niteraka zazalahy; ary hoy izy: Ankehitriny izao dia hikambana amiko ny vadiko, fa efa niteraka zazalahy telo ho azy aho; izany no nanaovana ny anarany hoe Levy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia nanan''anaka indray izy ka niteraka zazalahy; ary hoy izy: Ankehitriny dia hidera an''i Jehovah aho; izany no nanaovany ny anarany hoe Joda; dia nitsaha-jaza izy.'
