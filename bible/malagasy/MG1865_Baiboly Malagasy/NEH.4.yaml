document_id: NEH.4
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary rehefa ren''i Sanbala sy Tobia sy ny Arabo sy ny Amonita ary ny Asdodita fa voatsangana ny mandan''i Jerosalema, ka efa ho voavoatra izay rava, dia nirehitra mafy ny fahatezerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary niray tetika izy rehetra handeha hamely an''i Jerosalema ka hanimba ny asa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nivavaka tamin''Andriamanitra izahay ka nametraka mpiambina hiandry azy andro aman''alina noho ny fahatahoranay azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy ny Joda: Mihena ny herin''ny mpitondra entana, ary be ny korontam-bato sy ny tany; ka dia tsy maharafitra ny manda izahay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy kosa ny fahavalonay: Tsy hahalala izy, na hahita, raha tsy tonga eo afovoany isika ka mahafaty azy ary mampitsahatra ny asa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary rehefa tonga ny Jiosy izay nonina teo akaikin''ireo ka nanao taminay im-polo hoe: Na avy aiza na avy aiza ianareo, dia miverena atỳ aminay, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia nasiako olona teo amin''ny fitoerana ambany, teo ivelan''ny manda sy teo an-karihary; eny, nalahatro ny olona araka ny fokony avy, samy nitàna sabatra sy lefona ary tsipìka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia nijery aho sady nitsangana ka nilaza tamin''ny manan-kaja sy ny mpanapaka mbamin''ny vahoaka sisa hoe: Aza matahotra azy ianareo; ny Tompo lehibe sy mahatahotra no tsarovy, ka miadia hiaro ny rahalahinareo sy ny zanakareo-lahy sy ny zanakareo-vavy sy ny vadinareo ary ny tranonareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nony ren''ny fahavalontsika fa efa fantatray izany, sady efa nofoanan''Andriamanitra ny heviny, dia niverina ho amin''ny manda izahay rehetra, samy ho amin''ny asany avy indray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hatramin''izay andro izay ny antsasaky ny zatovoko dia nanao ny asa, ary ny antsasany kosa nitàna lefona aman''ampinga sy tsipìka ary akanjo fiarovan-tratra; ary ny mpanapaka dia teo ivohon''ny fianakaviana rehetra amin''ny Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary izay nandrafitra ny manda sy ny mpitondra entana izay nanangona ny korontam-bato sy ny tany dia samy niasa tamin''ny tànany anankiray, ary nitan-defona kosa ny tànany anankiray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny mpandrafitra rehetra dia samy nanana ny sabany voafehy tamin''ny valahany avy, ka dia nandrafitra. Ary ny mpitsoka ny anjomara dia teo anilako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hoy izaho tamin''ny manan-kaja sy ny mpanapaka ary ny vahoaka sisa: Be sady malalaka ny asa, ka dia misaratsaraka eny ambonin''ny manda isika ka mifanalavitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa eo amin''izay fitoerana andrenesanareo ny feon''ny anjomara dia mivoria ho any aminay ianareo; fa Andriamanitsika no hiady ho antsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nanao ny asa izahay, ary ny antsasany kosa nitan-defona hatramin''ny mazavaratsy ka mandra-piposaky ny kintana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary tamin''izany andro izany dia hoy koa aho tamin''ny olona: Samia mitoetra ato Jerosalema ianareo mbamin''ny zatovonareo, mba hiambina antsika raha alina ireo ary hiasa raha antoandro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa izaho sy ny rahalahiko mbamin'ny zatovoko sy ny mpiambina, izay nanaraka ahy, dia samy tsy niala akanjo, sady tsy nisy nandro akory.
