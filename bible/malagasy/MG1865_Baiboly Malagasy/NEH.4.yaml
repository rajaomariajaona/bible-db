document_id: NEH.4,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary rehefa ren''i Sanbala sy Tobia sy ny Arabo sy ny Amonita ary ny Asdodita fa voatsangana ny mandan''i Jerosalema, ka efa ho voavoatra izay rava, dia nirehitra mafy ny fahatezerany. '
  '10':
  - type: text
    content: 'Ary hatramin''izay andro izay ny antsasaky ny zatovoko dia nanao ny asa, ary ny antsasany kosa nitàna lefona aman''ampinga sy tsipìka ary akanjo fiarovan-tratra; ary ny mpanapaka dia teo ivohon''ny fianakaviana rehetra amin''ny Joda. '
  '11':
  - type: text
    content: 'Ary izay nandrafitra ny manda sy ny mpitondra entana izay nanangona ny korontam-bato sy ny tany dia samy niasa tamin''ny tànany anankiray, ary nitan-defona kosa ny tànany anankiray. '
  '12':
  - type: text
    content: 'Ary ny mpandrafitra rehetra dia samy nanana ny sabany voafehy tamin''ny valahany avy, ka dia nandrafitra. Ary ny mpitsoka ny anjomara dia teo anilako. '
  '13':
  - type: text
    content: 'Ary hoy izaho tamin''ny manan-kaja sy ny mpanapaka ary ny vahoaka sisa: Be sady malalaka ny asa, ka dia misaratsaraka eny ambonin''ny manda isika ka mifanalavitra. '
  '14':
  - type: text
    content: 'Koa eo amin''izay fitoerana andrenesanareo ny feon''ny anjomara dia mivoria ho any aminay ianareo; fa Andriamanitsika no hiady ho antsika. '
  '15':
  - type: text
    content: 'Dia nanao ny asa izahay, ary ny antsasany kosa nitan-defona hatramin''ny mazavaratsy ka mandra-piposaky ny kintana. '
  '16':
  - type: text
    content: 'Ary tamin''izany andro izany dia hoy koa aho tamin''ny olona: Samia mitoetra ato Jerosalema ianareo mbamin''ny zatovonareo, mba hiambina antsika raha alina ireo ary hiasa raha antoandro. '
  '17':
  - type: text
    content: Fa izaho sy ny rahalahiko mbamin'ny zatovoko sy ny mpiambina, izay nanaraka ahy, dia samy tsy niala akanjo, sady tsy nisy nandro akory.
  '2':
  - type: text
    content: 'Ary niray tetika izy rehetra handeha hamely an''i Jerosalema ka hanimba ny asa. '
  '3':
  - type: text
    content: 'Dia nivavaka tamin''Andriamanitra izahay ka nametraka mpiambina hiandry azy andro aman''alina noho ny fahatahoranay azy. '
  '4':
  - type: text
    content: 'Ary hoy ny Joda: Mihena ny herin''ny mpitondra entana, ary be ny korontam-bato sy ny tany; ka dia tsy maharafitra ny manda izahay. '
  '5':
  - type: text
    content: 'Ary hoy kosa ny fahavalonay: Tsy hahalala izy, na hahita, raha tsy tonga eo afovoany isika ka mahafaty azy ary mampitsahatra ny asa. '
  '6':
  - type: text
    content: 'Ary rehefa tonga ny Jiosy izay nonina teo akaikin''ireo ka nanao taminay im-polo hoe: Na avy aiza na avy aiza ianareo, dia miverena atỳ aminay, '
  '7':
  - type: text
    content: 'dia nasiako olona teo amin''ny fitoerana ambany, teo ivelan''ny manda sy teo an-karihary; eny, nalahatro ny olona araka ny fokony avy, samy nitàna sabatra sy lefona ary tsipìka. '
  '8':
  - type: text
    content: 'Dia nijery aho sady nitsangana ka nilaza tamin''ny manan-kaja sy ny mpanapaka mbamin''ny vahoaka sisa hoe: Aza matahotra azy ianareo; ny Tompo lehibe sy mahatahotra no tsarovy, ka miadia hiaro ny rahalahinareo sy ny zanakareo-lahy sy ny zanakareo-vavy sy ny vadinareo ary ny tranonareo. '
  '9':
  - type: text
    content: 'Ary nony ren''ny fahavalontsika fa efa fantatray izany, sady efa nofoanan''Andriamanitra ny heviny, dia niverina ho amin''ny manda izahay rehetra, samy ho amin''ny asany avy indray. '
