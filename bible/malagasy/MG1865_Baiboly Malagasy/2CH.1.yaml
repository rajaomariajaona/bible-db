document_id: 2CH.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny niomanan'i Solomona hanao ny tempoly
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Solomona, zanak''i Davida, dia nitombo hery tamin''ny fanjakany, ary Jehovah Andriamaniny nomba azy ka nanandratra azy indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Solomona nandidy Isiraely rehetra, dia mpifehy arivo sy mpifehy zato sy mpitsara ary loham-pirenena rehetra tamin''ny Isiraely, dia lohan''ny fianakaviana, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka dia niara-niakatra ho any amin''ny fitoerana avo tao Gibeona Solomona sy fiangonana rehetra; fa tao trano-lay fihaonana izay an''Andriamanitra, ilay nataon''i Mosesy, mpanompon''i Jehovah, tany an-efitra. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa fiaran''Andriamanitra efa nampakarin''i Davida avy ta Kiriata-jearima ho ao amin''izay efa namboariny ho azy; fa efa nanorina lay ho azy tany Jerosalema izy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary alitara varahina izay nataon'i Bezalila, zanak'i Ory zanak'i Hora, dia teo anoloan'ny tabernakelin'i Jehovah; ary Solomona sy fiangonana nitady Azy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: azy'
    marker-yv: yv-n
  - type: text
    text: ' tao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary Solomona nanatitra fanatitra teo amin'ny alitara varahina teo anatrehan'i Jehovah, izay momba ny trano-lay fihaonana; fanatitra dorana arivo no nateriny teo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tamin''ny alin''iny no nisehoan''Andriamanitra tamin''i Solomona, ka hoy Izy taminy: Angataho izay tianao homeko anao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia hoy Solomona tamin''Andriamanitra: Hianao efa naneho fahasoavana lehibe tamin''i Davida raiko ary nampanjaka ahy handimby azy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa ankehitriny, ry Jehovah Andriamanitra ô. aoka ho tanteraka teninao tamin''i Davida raiko; fa Hianao efa nampanjaka ahy tamin''ny vahoaka maro be tahaka ny vovo-tany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa omeo fahendrena sy fahalalana aho hitarihako ireto vahoaka ireto mivoaka sy miditra; fa iza no hahay mitsara izao olonao betsaka izao? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy Andriamanitra tamin''i Solomona: Satria tao am-ponao izany ka tsy nangataka vola aman-karena ianao, na voninahitra, na ain''ny fahavalonao, ary tsy nangataka ho ela velona aza, fa nangataka fahendrena sy fahalalana hitsaranao ny oloko izay nampanjakako anao, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia omena anao ny fahendrena sy fahalalana; ary homeko vola aman-karena sy voninahitra koa ianao, mihoatra noho izay nananan''ny mpanjaka rehetra na iza na iza tany alohanao, ary tsy hisy hanana tahaka izany ny any aorianao. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary tonga tany Jerosalema Solomona avy teo amin'ny fitoerana avo tao Gibeona, dia teo anoloan'ny trano-lay fihaonana; ary nanjaka tamin'ny Isiraely izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Solomona nanangona kalesy sy mpitaingin-tsoavaly ka nanana kalesy efa-jato amby arivo sy mpitaingin-tsoavaly roa arivo sy iray alina, izay nataony tany amin''ireny tanàna fitoeran''ny kalesy ary tao amin''ny mpanjaka tany Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary nataon'ny mpanjaka ho tahaka ny vato ny habetsaky ny volafotsy sy ny volamena tany Jerosalema, ary ny hazo sedera nataony toy ny aviavy eny amin'ny tany lemaka amoron-tsiraka
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sefela
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Avy tany Egypta no nahazoan''i Solomona soavaly; ary ny iray toko tamin''ny mpandranton''ny mpanjaka dia naka andiany iray araka izay vidiny voatendry. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary ny vidin'ny kalesy iray nentiny niakatra avy tany Egypta dia sekely volafotsy enin-jato, ary ny soavaly dia dimam-polo amby zato avy; ary toy izany koa no nitondrany ho an'ny mpanjakan'ny Hetita sy ny mpanjakan'ny Syriana. Ary Solomona nilaza fa hanao trano ho an'ny anaran'i Jehovah sy lapa ho an'ny tenany.
