document_id: ISA.42,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny Mpanompon'i Jehovah, mpitondra famonjena ho an'ny Isiraely sy ny firenena rehetra
  - type: text
    content: 'Indro ny Mpanompoko, Izay tantanako, dia Ilay voafidiko sady sitraky ny foko Napetrako tao aminy ny Fanahiko; Hamoaka fitsipika ho an''ny jentilisa Izy. '
  '10':
  - type: text
    content: 'Hianareo izay midina any amin''ny ranomasina sy ny ao aminy rehetra, dia ianareo nosy sy ny mponina ao aminy, samia mihira fihiram-baovao ho an''i Jehovah, dia ny fiderana Azy hatramin''ny faran''ny tany. '
  '11':
  - type: text
    content: Aoka ny efitra sy ireo tanàna eny aminy hanandratra ny feony, dia ny vohitra izay onenan'i Kedara; Aoka hihoby ny mponina any Sela
  - type: note
    content: 'Na: any amin''ny harambato'
  - type: text
    content: '; Ary aoka hanao feo avo any an-tampon''ny tendrombohitra izy. '
  '12':
  - type: text
    content: 'Aoka hanome voninahitra an''i Jehovah izy Ary hitory ny fiderana Azy any amin''ny nosy. '
  '13':
  - type: text
    content: Jehovah mivoaka tahaka ny lehilahy mahery, tahaka ny fanaon'ny mpiady no amohazany ny fahatezerany
  - type: note
    content: 'Na: fahasaro-piarony'
  - type: text
    content: '; Miantsoantso Izy, eny, mihiaka mafy; Mampiseho hery haharesy ny fahavalony Izy. '
  '14':
  - type: text
    content: 'Efa tsy niteny Aho hatrizay hatrizay, nangina ihany Aho ka nanindry fo; Fa izao Aho dia mitaraina tahaka ny vehivavy raha miteraka, eny, miehakehaka tsy avy miaina. '
  '15':
  - type: text
    content: 'Hataoto mariry ny tendrombohitra sy ny havoana, hataoko maina ny ahitra rehetra ao aminy, ary ny ony ho tonga nosy, Ary hataoko tankina ny farihy. '
  '16':
  - type: text
    content: 'Hitarika ny jamba amin''izay lalana tsy fantany Aho; ary amin''ny lalana tsy fantany no hitondrako azy; Ny maizina dia hataoko mazava eo anoloany, ary ny mikitoantoana halamako tsara; Izany zavatra izany no hataoko aminy ka tsy hamelako. '
  '17':
  - type: text
    content: 'Hihemotra sady ho menatra tokoa izay matoky ny sarin-javatra voasokitra, dia izay manao amin''ny sarin-javatra an-idina hoe: Hianareo no andriamanitray. '
  '18':
  - type: text
    content: 'Mihainoa ianareo, ry marenina; Ary mijere, ry jamba, mba hahita. '
  '19':
  - type: text
    content: 'Iza no jamba, afa-tsy ny mpanompoko? Ary iza no marenina tahaka ny iraka izay irahiko? Iza no jamba tahaka ny sakaizan''i Jehovah, ary jamba tahaka ny mpanompony? '
  '2':
  - type: text
    content: 'Tsy hiantsoantso Izy, na hanandratra ny feony, na hanao izay handrenesana ny feony eny an-dalana. '
  '20':
  - type: text
    content: 'Mahita zavatra maro ianao, nefa tsy mitandrina; Manongilana ny sofiny izy, nefa tsy mihaino. '
  '21':
  - type: text
    content: 'Sitrak''i Jehovah noho ny fahamarinany ny hahalehibe ny lalàna sy ny hahabe voninahitra azy. '
  '22':
  - type: text
    content: 'Kanefa ity dia firenena nobaboina sy norobaina; Voafandrika ao an-davaka avokoa izy rehetra ary voàfina ao an-trano-maizina; Voababo izy, ka tsy misy mamonjy; Voasambotra izy, ka tsy misy manao hoe: Ampodio. '
  '23':
  - type: text
    content: 'Iza aminareo no hihaino iza-ny? Iza no handre, dia hitandrina izany amin''ny andro ho avy? '
  '24':
  - type: text
    content: 'Iza no nanolotra an''i Jakoba hosamborina, ary Isiraely ho an''ny mpamabo? Tsy Jehovah, Izay efa nanotantsika va? Satria tsy nety nandeha tamin''ny lalany ireo, sady tsy nety nihaino ny lalàny; '
  '25':
  - type: text
    content: Ka dia nalatsany taminy ny firehitry ny fahatezerany sy ny halozan'ny ady; Dia nampirehitra azy manodidina izany nefa tsy fantany; Ary nandoro azy, nefa tsy noheverin'ny fony
  '3':
  - type: text
    content: 'Tsy hotapahiny ny volotara torotoro, ary tsy hovonoiny ny lahin-jiro manetona; Hamoaka izay tena rariny tokoa Izy. '
  '4':
  - type: text
    content: 'Tsy ho reraka na ho kivy Izy, Mandra-panoriny ny rariny amin''ny tany, ary ny nosy hiandry ny lalàny. '
  '5':
  - type: text
    content: 'Izao no lazain''i Jehovah Andriamanitra, Izay nahary ny lanitra sy nanenjana azy, Izay namelatra ny tany sy ny vokatra avy aminy, Izay manome fofonaina ny olona eo aminy sy fanahy ho an''izay mandeha eo aminy: '
  '6':
  - type: text
    content: 'Izaho Jehovah efa niantso Anao tamin''ny fahamarinana sy nitantana ny tananao, Ary hiaro Anao Aho ka hanome Anao ho fanekena ho an''ny olona, Ho fanazavana ny jentilisa, '
  '7':
  - type: text
    content: 'Hampahiratra ny mason''ny jamba, hamoaka ny mpifatotra hiala ao an-trano-maizina ary izay mipetraka ao amin''ny maizina hiala ao an-trano famatorana. '
  '8':
  - type: text
    content: 'Izaho no Jehovah, izany no anarako, ka ny voninahitro tsy homeko ny hafa, na ny fiderana Ahy ho an''ny sarin-javatra voasokitra. '
  '9':
  - type: text
    content: 'Ny amin''ny zavatra taloha, dia indreo, efa miseho; Ary zava-baovao kosa no toriko izao; Na dia tsy mbola miposaka aza ireny, dia ambarako aminareo. '
