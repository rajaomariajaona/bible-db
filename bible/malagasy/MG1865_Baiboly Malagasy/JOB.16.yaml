document_id: JOB.16,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny teny navalin'i Joba
  - type: text
    content: 'Dia namaly Joba ka nanao hoe:'
  '10':
  - type: text
    content: Nisanasana vava tamiko ny olona; Latsa no nentiny namely ny takolako; Mitambatra hamely ahy izy.
  '11':
  - type: text
    content: Efa voatolotr'Andriamanitra ho amin'ny ratsy fanahy aho, ary natsipiny ho eo an-tànan'ny mpanota.
  '12':
  - type: text
    content: Tamin'ilay izaho tsy nanana ahiahy iny, dia nanorotoro ahy Izy; Nosamboriny tamin'ny hatoko aho ka nomontsaniny, sady natsangany ho marika hokendreny.
  '13':
  - type: text
    content: Manodidina ahy ny mpandefa zana-tsipìkany; Mamaky ny voako Izy ka tsy miantra ary manidina ny aferoko ho amin'ny tany.
  '14':
  - type: text
    content: Bangabangainy lalandava aho, ka miroatra hamely ahy tahaka ny lehilahy mahery Izy.
  '15':
  - type: text
    content: Lamba fisaonana
  - type: note
    content: Heb. lamba malailay
  - type: text
    content: ' no voazaitrako hanarona ny hoditro, ary nalàko baraka tamin''ny vovoka ny tandroko.'
  '16':
  - type: text
    content: Ny tavako tera-menan'ny fitomaniana, ary eo amin'ny hodi-masoko ny aloky ny fahafatesana;
  '17':
  - type: text
    content: Kanefa tsy misy eto an-tanako izay mba nalaina an-keriny; Ary madio ny fivavako.
  '18':
  - type: text
    content: Ry tany ô, aza manarona ny rako, ary aoka tsy ho voahazona ny fitarainako!
  '19':
  - type: text
    content: Fa na dia ankehitriny aza, indro, any an-danitra ny Vavolombeloko, eny, ny Vavolombeloko dia any amin'ny avo.
  '2':
  - type: text
    content: Efa nandre zavatra maro toy izany aho; Mpampionona mahasorisorena foana ianareo rehetra.
  '20':
  - type: text
    content: Na dia mihomehy ahy aza ny sakaizako, dia mamarin-dranomaso eo anatrehan'Andriamanitra kosa aho,
  '21':
  - type: text
    content: Mba hanamarina ahy olombelona eo anatrehany Izy sy hanafa-tsiny ahy zanak'olombelona amin'ny sakaizako
  - type: note
    content: Heb. sakaizany
  - type: text
    content: .
  '22':
  - type: text
    content: Fa rehefa lasa ny taona vitsy, dia handeha any amin'ny lalana izay tsy hiverenako intsony aho.
  '3':
  - type: text
    content: Efa tapitra va izay ny bedibedy foana? Sa mbola misy manesika anao hamaly ahy ihany?
  '4':
  - type: text
    content: Izaho kosa mba mahazo miteny tahaka anareo, raha mba tonga tahaka ahy ianareo; eny, mahazo manamboatra teny ho enti-mamely anareo aho ary mahazo mihifikifi-doha aminareo;
  '5':
  - type: text
    content: Mahazo mampahery anareo amin'ny Vavako aho, ary mahazo mampitony ny alahelonareo ny fampiononana ataon'ny molotro.
  '6':
  - type: text
    content: Na dia miteny aza aho, dia tsy mitsahatra ny alaheloko; Ary na dia mangina aza aho, dia tsy misy mihena izany.
  '7':
  - type: text
    content: Fa ankehitriny efa nandreraka ahy Izy; Naringanao ny ankohonako rehetra.
  '8':
  - type: text
    content: Ary efa nampifezaka ny tenako Hianao
  - type: note
    content: 'Na: nosamborinao aho'
  - type: text
    content: ', ka dia vavolombelona amiko izany. Ary mitsangana hiampanga ahy ny fahahiazako, ka dia tondromaso akaiky izany.'
  '9':
  - type: text
    content: Amin'ny fahatezerany no amiravirany sy andrafiany ahy, mihidy vazana amiko Izy; Eny, miseho ho fahavaloko Izy ka mampivandravandra ny masony amiko;
