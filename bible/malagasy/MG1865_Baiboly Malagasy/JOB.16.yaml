document_id: JOB.16
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny teny navalin'i Joba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia namaly Joba ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Efa nandre zavatra maro toy izany aho; Mpampionona mahasorisorena foana ianareo rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Efa tapitra va izay ny bedibedy foana? Sa mbola misy manesika anao hamaly ahy ihany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izaho kosa mba mahazo miteny tahaka anareo, raha mba tonga tahaka ahy ianareo; eny, mahazo manamboatra teny ho enti-mamely anareo aho ary mahazo mihifikifi-doha aminareo;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mahazo mampahery anareo amin'ny Vavako aho, ary mahazo mampitony ny alahelonareo ny fampiononana ataon'ny molotro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Na dia miteny aza aho, dia tsy mitsahatra ny alaheloko; Ary na dia mangina aza aho, dia tsy misy mihena izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa ankehitriny efa nandreraka ahy Izy; Naringanao ny ankohonako rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary efa nampifezaka ny tenako Hianao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: nosamborinao aho'
    marker-yv: yv-n
  - type: text
    text: ', ka dia vavolombelona amiko izany. Ary mitsangana hiampanga ahy ny fahahiazako, ka dia tondromaso akaiky izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Amin'ny fahatezerany no amiravirany sy andrafiany ahy, mihidy vazana amiko Izy; Eny, miseho ho fahavaloko Izy ka mampivandravandra ny masony amiko;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nisanasana vava tamiko ny olona; Latsa no nentiny namely ny takolako; Mitambatra hamely ahy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Efa voatolotr'Andriamanitra ho amin'ny ratsy fanahy aho, ary natsipiny ho eo an-tànan'ny mpanota.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tamin'ilay izaho tsy nanana ahiahy iny, dia nanorotoro ahy Izy; Nosamboriny tamin'ny hatoko aho ka nomontsaniny, sady natsangany ho marika hokendreny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Manodidina ahy ny mpandefa zana-tsipìkany; Mamaky ny voako Izy ka tsy miantra ary manidina ny aferoko ho amin'ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Bangabangainy lalandava aho, ka miroatra hamely ahy tahaka ny lehilahy mahery Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Lamba fisaonana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lamba malailay
    marker-yv: yv-n
  - type: text
    text: ' no voazaitrako hanarona ny hoditro, ary nalàko baraka tamin''ny vovoka ny tandroko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny tavako tera-menan'ny fitomaniana, ary eo amin'ny hodi-masoko ny aloky ny fahafatesana;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Kanefa tsy misy eto an-tanako izay mba nalaina an-keriny; Ary madio ny fivavako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ry tany ô, aza manarona ny rako, ary aoka tsy ho voahazona ny fitarainako!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa na dia ankehitriny aza, indro, any an-danitra ny Vavolombeloko, eny, ny Vavolombeloko dia any amin'ny avo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Na dia mihomehy ahy aza ny sakaizako, dia mamarin-dranomaso eo anatrehan'Andriamanitra kosa aho,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mba hanamarina ahy olombelona eo anatrehany Izy sy hanafa-tsiny ahy zanak'olombelona amin'ny sakaizako
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. sakaizany
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa rehefa lasa ny taona vitsy, dia handeha any amin'ny lalana izay tsy hiverenako intsony aho.
