document_id: EZK.31,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanetrena an'i Asyria atao fananarana an'i Egypta
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary tamin''ny andro voalohany tamin''ny volana fahatelo tamin''ny taona fahiraika ambin''ny folo dia tonga tamiko ny tenin''i Jehovah nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Koa izany no nanaovan''i Jehovah Tompo hoe: Satria nijoroaka avo izy'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ianao
      marker-yv: yv-n
    - type: text
      text: ' ka nanandratra ny lohany teo amin''ny rahona matevina, ary nirehareha ny fony noho ny hahavony, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia hatolotro eo an-tànan''ilay mahery amin''ny firenena izy; Hamely azy tokoa io; Noho ny faharatsiany no nandroahako azy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary izay fahavalo masiaka indrindra amin''ny firenena no nanapaka azy sady nanary azy; Teny an-tendrombohitra sy teny amin''ny lohasaha rehetra no nihahafan''ny sampany, ary notapatapahina teny amoron''ny ony rehetra amin''ny tany ny rantsany; Ary nidina niala tamin''ny alokalony ny firenena rehetra ka nahafoy avy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Mipetraka eo amin''ny vatany nianjera ny voro-manidina rehetra, ary eny amin''ny sampany ny bibi-dia rehetra, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mba tsy hisy hiavonavona intsony noho ny hahavony ny hazo rehetra eny amoron''ny rano, na hanandratra ny lohany ho eo amin''ny rahona matevina, sady tsy hisy hitoky amin''ny hahavony intsony ny hazo mifo-drano rehetra; Fa voatolotra ho faty izy rehetra ho any ambanin''ny tany, ho ao amin''ny zanak''olombelona, dia any amin''izay midina any an-davaka. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Izao no lazain''i Jehovah Tompo: Tamin''ny andro nidinany ho any amin''ny fiainan-tsi-hita'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. sheola
      marker-yv: yv-n
    - type: text
      text: ' dia nampanao fisaonana Aho: Nanarona ny rano lalina noho ny aminy Aho sady nanampina ny ony avy aminy, ka dia najanona ny rano maro; Nampisaoniko Libanona noho ny aminy, ka nalazo noho izany ny hazo rehetra tany an-tsaha. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tamin'ny fiezinezin'ny fianjerany dia nampihorohoroiko ny firenena, raha nampidiniko ho any amin'ny fiainan-tsi-hita
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. sheola
      marker-yv: yv-n
    - type: text
      text: ' izy, ho naman''izay midina any an-davaka; Ary ny hazo rehetra any Edena, dia ny nojobonina sady soa indrindra any Libanona, dia izay mifo-drano rehetra, samy nampionona ny tenany any ambanin''ny tany, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ireo koa dia niara-nidina taminy ho any amin'ny fiainan-tsi-hita
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. sheola
      marker-yv: yv-n
    - type: text
      text: ', ho any amin''izay voatrabaky ny sabatra, mbamin''ireo izay efa sandriny teo, ka nipetraka teo ambanin''ny alokalony teo amin''ny firenena. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Tahaka an'iza amin'ny hazo any Edena moa ianao amin'izao voninahitra sy fahalehibiazana izao? Hampidinina ho any ambanin'ny tany miaraka amin'ny hazo any Edena ianao; Eo amin'ny tsy voafora no hiamparanao, dia eo amin'izay voa-trabaky ny sabatra. Farao sy ny vahoakany maro be rehetra izany, hoy Jehovah Tompo.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ry zanak''olona, ataovy amin''i Farao, mpanjakan''i Egypta, sy amin''ny vahoakany maro be hoe: Tahaka an''iza moa ianao amin''ny fahalehibiazanao ? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Indro, Asyria dia sedera tsara rantsana any Libanona ary misandrahaka manalokaloka sady mijoroaka avo, ka mitehika amin''ny rahona matevina ny tendrony. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ny rano no nahalehibe azy, eny, ny rano lalina no nampijoroaka azy, ary ny ranovelona no nandeha manodidina ny tany nambolena azy ka nampandeha ny lakan-dranony hankamin''ny hazo rehetra any an-tsaha. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Koa dia nijoroaka ho avo noho ny hazo rehetra any an-tsaha izy, ary nihamaro ny sampany sady nihalava ny rantsany noho ny habetsahan''ny rano tamin''ny fisandrahany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Teo amin''ny sampany no nanaovan''ny voro-manidina rehetra akany; Ary teo ambanin''ny rantsany no niterahan''ny bibi-dia rehetra; Sady teo amin''ny alokalony no nitoeran''ny firenena malaza rehetra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ka dia tsara tarehy tamin''ny fahalehibiazany sy ny halavan''ny sampany izy; Fa tany amin''ny rano maro ny fakany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tsy nahatakona azy ny sedera tao amin''ny sahan''Andriamanitra; Tsy mba nahatoraka ny sampany ny hazo kypreso, tsy mba nanana rantsana tahaka azy ny hazo platana; Ary tsy nisy tsara tarehy tahaka azy ny hazo rehetra tany amin''ny sahan''Andriamanitra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nohatsaraiko tamin''ny haben''ny rantsany ny tarehiny; Ka dia nialona azy ny hazo rehetra tany Edena, dia ireo tany amin''ny sahan''Andriamanitra. '
