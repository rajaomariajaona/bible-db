document_id: JOB.17,96
type_code: plt
verses:
  '1':
  - type: text
    content: Efa ho ritra ny aiko; Efa milopilopy ny androko; Efa miandry ahy ny fasana.
  '10':
  - type: text
    content: Avia avokoa indray ary ianareo rehetra tsy mahita izay olon-kendry eo aminareo aho.
  '11':
  - type: text
    content: Mihelina ny androko, voaongotra ny fikasako. Dia izay hevitra fikirin'ny foko indrindra;
  '12':
  - type: text
    content: Ny alina ataon'ireny ho antoandro, ary ny mazava ho efa akaiky, nefa tamy ihany ny maizina.
  '13':
  - type: text
    content: Raha mbola misy antenaiko, dia ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola
  - type: text
    content: ' fonenako ihany; Ao amin''ny maizina no hamelarako ny fandriako.'
  '14':
  - type: text
    content: Ny fasana
  - type: note
    content: 'Na: Ny fahalòvana'
  - type: text
    content: ' no nantsoiko hoe: Raiko ianao; Ary ny kankana: Reniko sy anabaviko ianao.'
  '15':
  - type: text
    content: Fa aiza ary ny fanantenako? Ary iza no mahita azy?
  '16':
  - type: text
    content: Midina any amin'ny vavahadin'ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola
  - type: text
    content: ' izany, raha mba hahita fitsaharana ao amin''ny vovoka aho.'
  '2':
  - type: text
    content: Eny, fanesoana tokoa no manodidina ahy, ary tsy maintsy mijery ny filany ady amiko aho.
  '3':
  - type: text
    content: Masina Hianao, aoka ny tenanao ihany no hiantoka ahy aminao; Fa iza moa no hety hiantoka ahy?
  '4':
  - type: text
    content: Fa ny fon'ireto dia voahidinao tsy hidiran'ny fahalalana; koa izany no tsy hanandratanao azy.
  '5':
  - type: text
    content: Izay manolotra ny sakaizany ho babo, dia ho pahina kosa ny mason'ny zanany.
  '6':
  - type: text
    content: Ary efa nanao ahy ho ambentinteny amin'ny firenena Izy, ka rorany mandrakariva ny tavako.
  '7':
  - type: text
    content: Efa pahina ny masoko noho ny alahelo; Ary efa toy ny aloka ny momba ny tenako rehetra.
  '8':
  - type: text
    content: Ankona noho izany ny olona mahitsy, ary ny tsy manan-tsiny mihendratra mahita ny mpihatsaravela-tsihy.40
  '9':
  - type: text
    content: Fa ny marina mifikitra tsara amin'ny halehany, ary izay madio tanana no hitombo hery.
