document_id: JOB.17
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Efa ho ritra ny aiko; Efa milopilopy ny androko; Efa miandry ahy ny fasana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Eny, fanesoana tokoa no manodidina ahy, ary tsy maintsy mijery ny filany ady amiko aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Masina Hianao, aoka ny tenanao ihany no hiantoka ahy aminao; Fa iza moa no hety hiantoka ahy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa ny fon'ireto dia voahidinao tsy hidiran'ny fahalalana; koa izany no tsy hanandratanao azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izay manolotra ny sakaizany ho babo, dia ho pahina kosa ny mason'ny zanany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary efa nanao ahy ho ambentinteny amin'ny firenena Izy, ka rorany mandrakariva ny tavako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Efa pahina ny masoko noho ny alahelo; Ary efa toy ny aloka ny momba ny tenako rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ankona noho izany ny olona mahitsy, ary ny tsy manan-tsiny mihendratra mahita ny mpihatsaravela-tsihy.40
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa ny marina mifikitra tsara amin'ny halehany, ary izay madio tanana no hitombo hery.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Avia avokoa indray ary ianareo rehetra tsy mahita izay olon-kendry eo aminareo aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mihelina ny androko, voaongotra ny fikasako. Dia izay hevitra fikirin'ny foko indrindra;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny alina ataon'ireny ho antoandro, ary ny mazava ho efa akaiky, nefa tamy ihany ny maizina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Raha mbola misy antenaiko, dia ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: ' fonenako ihany; Ao amin''ny maizina no hamelarako ny fandriako.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny fasana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ny fahalòvana'
    marker-yv: yv-n
  - type: text
    text: ' no nantsoiko hoe: Raiko ianao; Ary ny kankana: Reniko sy anabaviko ianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa aiza ary ny fanantenako? Ary iza no mahita azy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Midina any amin'ny vavahadin'ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: ' izany, raha mba hahita fitsaharana ao amin''ny vovoka aho.'
