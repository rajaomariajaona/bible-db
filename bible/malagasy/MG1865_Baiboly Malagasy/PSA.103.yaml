document_id: PSA.103
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiderana an'Andriamanitra noho ny fahatsarany sy ny famindram-pony
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nataon''i Davida Misaora an''i Jehovah, ry fanahiko; Ary izay rehetra ato anatiko, misaora ny anarany masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Misaora an''i Jehovah, ry fanahiko; Ary aza misy hadinoinao ny fitahiany rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izay mamela ny helokao rehetra, Izay manasitrana ny aretinao rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izay manavotra ny ainao tsy hidina any an-davaka, Izay manarona famindram-po sy fiantrana anao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izay mahavoky soa ny vavanao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fanahinao, na fahanteranao'
    marker-yv: yv-n
  - type: text
    text: ; Ny fahatanoranao mody indray toy ny an'ny voromahery
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ho toy ny voromahery'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jehovah manao fahamarinana Sy fitsarana amin''izay rehetra ampahorina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Efa nampahafantatra an''i Mosesy ny lalan-kalehany Izy; Ny Zanak''Isiraely nampahafantariny ny asany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mamindra fo sy miantra Jehovah, Mahari-po sady be famindram-po. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tsy mandaha-teny mandrakariva Izy, Na mitahiry fahatezerana mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tsy mba manao amintsika araka ny fahotantsika Izy, Na mamaly antsika araka ny helotsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa tahaka ny hahavon''ny lanitra ambonin''ny tany No haben''ny famindram-pony amin''izay matahotra Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tahaka ny halavitry ny atsinanana amin'ny andrefana No halavitry ny anesorany ny fahotantsika amintsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tahaka ny fiantràn''ny ray ny zanany No fiantran''i Jehovah izay matahotra Azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa Izy mahalala ny toetsika Ka mahatsiaro fa vovoka isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tahaka ny ahitra ny andron''ny zanak''olombelona; Tahaka ny vonin-javatra any an-tsaha ny famoniny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Satria tsofin''ny rivotra izy ka lasa, Ary tsy mahalala azy intsony ny fitoerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa ny famindram-pon''i Jehovah dia hatramin''ny taloha indrindra ka ho mandrakizay amin''izay matahotra Azy Ary ny fahamarinany mihatra amin''ny taranaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Dia amin'izay mitandrina ny fanekeny Sy mahatsiaro hankatò ny didiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jehovah efa nampitoetra ny seza fiandrianany any an-danitra; Ary ny fanjakany manapaka izao tontolo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Misaora an''i Jehovah, ianareo anjeliny, Dia ianareo izay mahery indrindra sady mankatò ny didiny Ary mihaino ny feon''ny teniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Misaora an''i Jehovah, ny miaramilany rehetra, Dia ny mpanompony izay manao ny sitrapony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Misaora an'i Jehovah, ny asany rehetra eran'ny fanjakany; Misaora an'i Jehovah, ry fanahiko.
