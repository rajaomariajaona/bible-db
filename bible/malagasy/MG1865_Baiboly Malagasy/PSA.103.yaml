document_id: PSA.103,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an'Andriamanitra noho ny fahatsarany sy ny famindram-pony
  - type: text
    content: 'Nataon''i Davida Misaora an''i Jehovah, ry fanahiko; Ary izay rehetra ato anatiko, misaora ny anarany masina. '
  '10':
  - type: text
    content: 'Tsy mba manao amintsika araka ny fahotantsika Izy, Na mamaly antsika araka ny helotsika. '
  '11':
  - type: text
    content: 'Fa tahaka ny hahavon''ny lanitra ambonin''ny tany No haben''ny famindram-pony amin''izay matahotra Azy. '
  '12':
  - type: text
    content: Tahaka ny halavitry ny atsinanana amin'ny andrefana No halavitry ny anesorany ny fahotantsika amintsika.
  '13':
  - type: text
    content: 'Tahaka ny fiantràn''ny ray ny zanany No fiantran''i Jehovah izay matahotra Azy; '
  '14':
  - type: text
    content: 'Fa Izy mahalala ny toetsika Ka mahatsiaro fa vovoka isika. '
  '15':
  - type: text
    content: 'Tahaka ny ahitra ny andron''ny zanak''olombelona; Tahaka ny vonin-javatra any an-tsaha ny famoniny, '
  '16':
  - type: text
    content: 'Satria tsofin''ny rivotra izy ka lasa, Ary tsy mahalala azy intsony ny fitoerany. '
  '17':
  - type: text
    content: 'Fa ny famindram-pon''i Jehovah dia hatramin''ny taloha indrindra ka ho mandrakizay amin''izay matahotra Azy Ary ny fahamarinany mihatra amin''ny taranaka. '
  '18':
  - type: text
    content: Dia amin'izay mitandrina ny fanekeny Sy mahatsiaro hankatò ny didiny.
  '19':
  - type: text
    content: 'Jehovah efa nampitoetra ny seza fiandrianany any an-danitra; Ary ny fanjakany manapaka izao tontolo izao. '
  '2':
  - type: text
    content: 'Misaora an''i Jehovah, ry fanahiko; Ary aza misy hadinoinao ny fitahiany rehetra, '
  '20':
  - type: text
    content: 'Misaora an''i Jehovah, ianareo anjeliny, Dia ianareo izay mahery indrindra sady mankatò ny didiny Ary mihaino ny feon''ny teniny. '
  '21':
  - type: text
    content: 'Misaora an''i Jehovah, ny miaramilany rehetra, Dia ny mpanompony izay manao ny sitrapony. '
  '22':
  - type: text
    content: Misaora an'i Jehovah, ny asany rehetra eran'ny fanjakany; Misaora an'i Jehovah, ry fanahiko.
  '3':
  - type: text
    content: 'Izay mamela ny helokao rehetra, Izay manasitrana ny aretinao rehetra, '
  '4':
  - type: text
    content: 'Izay manavotra ny ainao tsy hidina any an-davaka, Izay manarona famindram-po sy fiantrana anao, '
  '5':
  - type: text
    content: Izay mahavoky soa ny vavanao
  - type: note
    content: 'Na: fanahinao, na fahanteranao'
  - type: text
    content: ; Ny fahatanoranao mody indray toy ny an'ny voromahery
  - type: note
    content: 'Na: ho toy ny voromahery'
  - type: text
    content: .
  '6':
  - type: text
    content: 'Jehovah manao fahamarinana Sy fitsarana amin''izay rehetra ampahorina. '
  '7':
  - type: text
    content: 'Efa nampahafantatra an''i Mosesy ny lalan-kalehany Izy; Ny Zanak''Isiraely nampahafantariny ny asany. '
  '8':
  - type: text
    content: 'Mamindra fo sy miantra Jehovah, Mahari-po sady be famindram-po. '
  '9':
  - type: text
    content: 'Tsy mandaha-teny mandrakariva Izy, Na mitahiry fahatezerana mandrakizay. '
