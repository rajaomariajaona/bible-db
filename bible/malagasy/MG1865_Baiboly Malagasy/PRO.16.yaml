document_id: PRO.16,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ny fikasan''ny fo no amin''ny olona; Fa ny famalian''ny lela dia avy amin''i Jehovah. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ny teny marina dia eo amin''ny molotry ny mpanjaka, Ary tsy diso teny izy, raha mitsara. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: An'i Jehovah ny fandanjana sy ny mizana marina, Avy aminy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Asany
      marker-yv: yv-n
    - type: text
      text: ' avokoa ireo vato rehetra an-kitapo.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Fahavetavetana eo imason'ny mpanjaka ny fanaovan-dratsy; Fa fahamarinana no iorenan'ny seza fiandrianana.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Sitraky ny mpanjaka ny molotra marina, Ary izay miteny mahitsy no tiany.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny fahatezeran'ny mpanjaka dia iraky ny fahafatesana. Fa ny olon-kendry mampionona izany.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Amin'ny fahamiramiranan'ny tarehin'ny mpanjaka dia misy fiainana, Ary ny fankasitrahany dia toy ny rahona amin'ny fararano.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tsara ny mahazo fahendrena noho ny volamena, Ary tsara ny mahazo fahalalana noho ny volafotsy.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ny manalavitra ny ratsy no lalamben'ny marina, Ary izay mitandrina ny alehany no miaro ny ainy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fanahiny'
      marker-yv: yv-n
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny fiavonavonana mialoha ny fahasimbana, Ary ny fanahy mirehareha mialoha ny fahalavoana.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tsara ny malemy fanahy ao amin'izay manetry tena Noho ny mizara babo amin'izay miavonavona.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ataon'ny olona ho madio avokoa ny lalana rehetra alehany; Fa Jehovah ihany no mpandanja ny fanahy.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Izay mandinika ny teny no hahita soa; Ary izay matoky an''i Jehovah no ho sambatra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Izay hendry am-po dia lazaina hoe manan-tsaina, Ary ny hamamian'ny molotra mampandroso fahendrena.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Loharanon'aina ny fahazavan-tsaina amin'izay manana izany; Fa ny famaizana ataon'ny adala dia fahadalana ihany.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ny fon'ny hendry mahahendry ny vavany Sady manampy fahendrena eo amin'ny molony.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Toho-tantely ny teny mahafinaritra, Ka sady mamin'ny fanahy no mahatsara ny taolana.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Misy lalana ataon'ny olona ho mahitsy, Kanjo lalana mivarina any amin'ny fahafatesana no iafarany.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ny fahanoanan'ny mpiasa dia mampiasa azy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. miasa ho azy
      marker-yv: yv-n
    - type: text
      text: ', Fa ny tendany'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. vavany
      marker-yv: yv-n
    - type: text
      text: ' no manesika azy.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ny ratsy fanahy mihady lavaka fanimbana, Sady misy toy ny afo mahamay eo amin'ny molony.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ny mpivadibadika mamafy ady; Ary ny mpibitsibitsika mampisaraka ny tena mpisakaiza.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ny lozabe mitaona ny namany Ka mitarika azy amin'ny lalana tsy tsara.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ankino amin'i Jehovah ny asanao, Dia ho lavorary izay kasainao.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Izay manakimpy ny masony hieritreritra ny ratsy Sady manaikitraiki-molotra dia efa mikasa hanao ratsy.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Satroboninahitra tsara tarehy ny volofotsy, Ao amin'ny lalan'ny fahamarinana no ahazoana azy.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Tsara ny mahatsindry fo noho ny mahery, Ary izay mahazaka ny fanahiny noho izay mahafa-bohitra.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ny filokana dia atsipy ao am-pofoany; Fa avy amin'i Jehovah ihany no isehoan'ny fitsarany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ny zavatra rehetra nataon'i Jehovah dia samy misy antony avokoa; Eny, ny ratsy fanahy koa aza dia nataony ho amin'ny andro hahitan-doza.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Fahavetavetana eo imason'i Jehovah izay rehetra miavonavona am-po, Azo itompoana tokoa fa
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Heb. Azo ifandraisan-tanana; na: Hatramin''ny taranaka fara mandimby dia'
      marker-yv: yv-n
    - type: text
      text: ' tsy maintsy hampijalina izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny famindram-po sy ny fahamarinana no avotra amin'ny heloka; Ary ny fahatahorana an'i Jehovah no analavirana ny ratsy.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Raha sitrak'i Jehovah ny alehan'ny olona, Na dia ny fahavalony aza dia hampihavaniny aminy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Aleo ny kely omban'ny fahamarinana Toy izay ny harem-bevava azo amin'ny tsy rariny.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ny fon'ny olona mihevitra tsara ny halehany; Fa Jehovah ihany no mahalavorary ny diany.
