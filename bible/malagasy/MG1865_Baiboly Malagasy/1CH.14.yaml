document_id: 1CH.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandresen'i Davida ny Filistina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Hirama, mpanjakan''i Tyro, naniraka olona tany amin''i Davida sady nampanatitra hazo sedera ary nandefa mpanao trano vato sy mpandrafitra hanao trano ho azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia fantatr''i Davida fa Jehovah efa nampitoetra azy ho mpanjakan''ny Isiraely, ka voasandratra ny fanjakany noho ny amin''ny Isiraely olony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Davida nampaka-bady koa tany Jerosalema ka niteraka zazalahy sy zazavavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary izao no anaran''ny zanany naterany tany Jerosalema: Samoa sy Sobaba sy Natana sy Solomona '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'sy Jibara sy Elisoa sy Elipeleta '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'sy Noga sy Nafega sy Jafia '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: sy Elisama sy Seliada ary Elifeleta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa nony ren''ny Filistina fa efa nohosorana ho mpanjakan''ny Isiraely rehetra Davida, dia niakatra hitady azy ny Filistina rehetra. Koa raha ren''i Davida izany, dia nivoaka hiady taminy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary dia tonga ny Filistina ka nihahakahaka teny amin''ny Lohasahan''ny Refaita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Davida nanontany tamin''Andriamanitra hoe: Hiakatra hamely ny Filistina va aho? Hatolotrao eo an-tanako va izy? Dia hoy Jehovah taminy: Miakara, fa hatolotro eo an-tananao izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia niakatra nankao Bala-perazima Davida ka namely azy teo; dia hoy izy: Ny tanako no namakian''Andriamanitra ny fahavaloko hipariaka toy ny rano vaky; koa izany no nanaovany ny anaran''izany tany izany hoe Bala-perazima'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Bala-perazima = Tany nahavakiana
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia nilaozan''ireny teo ireo andriamaniny, ka dia nasain''i Davida nodorana tamin''ny afo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary tonga indray ny Filistina ka nihahakahaka teny an-dohasaha indray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nanontany tamin''Andriamanitra indray Davida ka novaliany hoe: Aza mandeha hanenjika azy; fa mivilia azy, dia mandehana, fa ho tonga eo aminy ianao eo amin''ny tandrifin''ny hazo balsama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary raha toa mahare fingadongadon''olona eny amin''ny tendron''ny hazo balsama ianao, dia miaingà amin''izay hiady; fa amin''izay no efa miainga mialoha anao Andriamanitra hamely ny miaramilan''ny Filistina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary dia nanao araka izay nandidian''Andriamanitra azy Davida, ka dia namely ny miaramilan''ny Filistina hatrany Gibeona ka hatrany Gazera izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary ny lazan'i Davida niely teny amin'ny tany rehetra; ary nataon'i Jehovah nahazo ny firenena rehetra ny tahotra an'i Davida.
