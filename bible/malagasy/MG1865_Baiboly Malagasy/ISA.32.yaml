document_id: ISA.32,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Anatra mafy tamin'ny vehivavy tao Jerosalema
  - type: text
    content: 'Indro, fa araka ny fahamarinana no hanjakan''ny mpanjaka, ary ny lehibe hanaraka araka ny rariny. '
  '10':
  - type: text
    content: 'Raha afaka herintaona mahery dia ho raiki-tahotra ianareo, ry vehivavy matokitoky foana; Fa hanjahitra ny taom-piotazam-boaloboka, ary tsy hisy ny fanangonam-boankazo '
  '11':
  - type: text
    content: 'Mangovita, ry vehivavy miadana, mangorohoroa, ry vehivavy matokitoky foana; Endaho ny akanjonao, ka mitanjaha, ary misikìna lamba fisaonana. '
  '12':
  - type: text
    content: 'Miteha-tratra izy, fa malahelo ny saha nahafinaritra sy ny voaloboka vokatra. '
  '13':
  - type: text
    content: 'Ho rakotry ny tsilo sy ny hery ny tanin''ny oloko, eny, na dia ny ao amin''ny trano mahafaly rehetra ao an-tanàna ravoravo aza; '
  '14':
  - type: text
    content: Fa ho foana ny lapan'ny mpanjaka; Hitsahatra ny fihorikoriky ny tanàna; Ofela
  - type: note
    content: 'Na: Ny havoana'
  - type: text
    content: ' sy ny tilikambo fitazanana ho tonga naman''ny zohy ho mandrakizay, dia fikarenjen''ny boriki-dia sy fiandrasana ny andian''ny ondry aman''osy, '
  '15':
  - type: text
    content: 'Mandra-pandatsaka ny fanahy avy amin''ny avo ho amintsika, ka ny efitra ho tonga saha mahavokatra, ary ny saha mahavokatra hoheverina ho ala. '
  '16':
  - type: text
    content: 'Ary hitoetra any an-efitra ny rariny, Ary ny fahamarinana honina ao amin''ny saha mahavokatra. '
  '17':
  - type: text
    content: 'Ny asan''ny fahamarinana ho fiadanana; Ary ny vokatry ny fahamarinana dia ho fiadanana sy fahatokiana mandrakizay; '
  '18':
  - type: text
    content: 'Ary ny oloko hitoetra ao amin''ny fonenana mandry fahizay sy ao amin''ny fitoerana mahatoky ary ao amin''ny fialan-tsasatra feno fiadanam-po; '
  '19':
  - type: text
    content: 'Nefa hilatsaka ny havandra, rehefa aripaka ny ala, ary halamaka dia halamaka ny tanàna. '
  '2':
  - type: text
    content: Ary hisy lehilahy
  - type: note
    content: 'Na: Ary samy'
  - type: text
    content: ' ho fierena amin''ny rivotra sy ho fialofana amin''ny ranonoram-baratra; Ho ranovelona ao amin''ny tany karankaina izy, ho alo-batolampy lehibe amin''ny tany mahana. '
  '20':
  - type: text
    content: Sambatra izay mamafy eny amoron'ny rano rehetra sady mampiriaria ny omby sy ny boriky.
  '3':
  - type: text
    content: 'Ary tsy hikimpy ny mason''izay mahita, ary ny sofin''izay mandre dia hihaino. '
  '4':
  - type: text
    content: 'Ny fon''izay maimaika hahazo fahalalana, ary ny lelan''izay mikodedidedy hahay miteny mahitsy. '
  '5':
  - type: text
    content: Ny adala tsy holazaina intsony hoe mitoetr'andriana, ary ny mpifetsy tsy holazaina hoe mahafoy be
  - type: note
    content: Heb. mpanankarena
  - type: text
    content: '. '
  '6':
  - type: text
    content: Fa ny adala mbola miteny fahadalana ihany, ary ny fony mamoron-keloka, mba hanaovany fihatsaram-belatsihy
  - type: note
    content: 'Na: ratsy'
  - type: text
    content: ' sy hitenenany hevi-diso ny amin''i Jehovah ary hanaovany izay tsy hahazoan''ny noana hanina sy izay tsy hahazoan''ny mangetaheta rano hosotroina. '
  '7':
  - type: text
    content: Ary ratsy ny hafetsen
  - type: note
    content: Heb. fiasan'
  - type: text
    content: '''ny mpifetsy; Mamoron-tsain-dratsy izy hanimbany ny ory amin''ny teny lainga, na dia miteny manan-drariny aza ny malahelo; '
  '8':
  - type: text
    content: Fa ny mitoetr'andriana kosa dia mamoron-tsaina araka izay mahamendrika andriana, ary izay mahamendrika andriana no ifikirany.
  '9':
  - type: text
    content: 'Mitsangàna, ry vehivavy miadana, ka mandrenesa ny feoko; Ry zazavavy matokitoky foana, mihainoa ny teniko. '
