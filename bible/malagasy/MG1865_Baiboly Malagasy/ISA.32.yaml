document_id: ISA.32,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Anatra mafy tamin'ny vehivavy tao Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Indro, fa araka ny fahamarinana no hanjakan''ny mpanjaka, ary ny lehibe hanaraka araka ny rariny. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Raha afaka herintaona mahery dia ho raiki-tahotra ianareo, ry vehivavy matokitoky foana; Fa hanjahitra ny taom-piotazam-boaloboka, ary tsy hisy ny fanangonam-boankazo '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Mangovita, ry vehivavy miadana, mangorohoroa, ry vehivavy matokitoky foana; Endaho ny akanjonao, ka mitanjaha, ary misikìna lamba fisaonana. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Miteha-tratra izy, fa malahelo ny saha nahafinaritra sy ny voaloboka vokatra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ho rakotry ny tsilo sy ny hery ny tanin''ny oloko, eny, na dia ny ao amin''ny trano mahafaly rehetra ao an-tanàna ravoravo aza; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Fa ho foana ny lapan'ny mpanjaka; Hitsahatra ny fihorikoriky ny tanàna; Ofela
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Ny havoana'
      marker-yv: yv-n
    - type: text
      text: ' sy ny tilikambo fitazanana ho tonga naman''ny zohy ho mandrakizay, dia fikarenjen''ny boriki-dia sy fiandrasana ny andian''ny ondry aman''osy, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mandra-pandatsaka ny fanahy avy amin''ny avo ho amintsika, ka ny efitra ho tonga saha mahavokatra, ary ny saha mahavokatra hoheverina ho ala. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary hitoetra any an-efitra ny rariny, Ary ny fahamarinana honina ao amin''ny saha mahavokatra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ny asan''ny fahamarinana ho fiadanana; Ary ny vokatry ny fahamarinana dia ho fiadanana sy fahatokiana mandrakizay; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary ny oloko hitoetra ao amin''ny fonenana mandry fahizay sy ao amin''ny fitoerana mahatoky ary ao amin''ny fialan-tsasatra feno fiadanam-po; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Nefa hilatsaka ny havandra, rehefa aripaka ny ala, ary halamaka dia halamaka ny tanàna. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ary hisy lehilahy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Ary samy'
      marker-yv: yv-n
    - type: text
      text: ' ho fierena amin''ny rivotra sy ho fialofana amin''ny ranonoram-baratra; Ho ranovelona ao amin''ny tany karankaina izy, ho alo-batolampy lehibe amin''ny tany mahana. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Sambatra izay mamafy eny amoron'ny rano rehetra sady mampiriaria ny omby sy ny boriky.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary tsy hikimpy ny mason''izay mahita, ary ny sofin''izay mandre dia hihaino. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ny fon''izay maimaika hahazo fahalalana, ary ny lelan''izay mikodedidedy hahay miteny mahitsy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny adala tsy holazaina intsony hoe mitoetr'andriana, ary ny mpifetsy tsy holazaina hoe mahafoy be
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. mpanankarena
      marker-yv: yv-n
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa ny adala mbola miteny fahadalana ihany, ary ny fony mamoron-keloka, mba hanaovany fihatsaram-belatsihy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ratsy'
      marker-yv: yv-n
    - type: text
      text: ' sy hitenenany hevi-diso ny amin''i Jehovah ary hanaovany izay tsy hahazoan''ny noana hanina sy izay tsy hahazoan''ny mangetaheta rano hosotroina. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary ratsy ny hafetsen
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. fiasan'
      marker-yv: yv-n
    - type: text
      text: '''ny mpifetsy; Mamoron-tsain-dratsy izy hanimbany ny ory amin''ny teny lainga, na dia miteny manan-drariny aza ny malahelo; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fa ny mitoetr'andriana kosa dia mamoron-tsaina araka izay mahamendrika andriana, ary izay mahamendrika andriana no ifikirany.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mitsangàna, ry vehivavy miadana, ka mandrenesa ny feoko; Ry zazavavy matokitoky foana, mihainoa ny teniko. '
