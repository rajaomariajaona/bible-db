document_id: 1CH.11,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'ny lehilahy maherin'i Davida izay niady hampanjaka azy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary dia nivory teo amin''i Davida tao Hebrona ny Isiraely rehetra ka nanao hoe: Indreto izahay, fa taolanao sy nonao. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary izao no lohan''ny lehilahy maherin''i Davida izay nifikitra mafy taminy tamin''ny fanjakany, mbamin''ny Isiraely rehetra hampanjaka azy araka ny tenin''i Jehovah ny amin''ny Isiraely. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia izao no isan''ny lehilahy maherin''i Davida: Jasobeama, zanak''i Hakmony, lehiben''ny mpanafika malaza; izy no namely telon-jato lahy tamin''ny lefona ka naharingana azy tamin''ny ady indray mandeha monja. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary ny manarakaraka azy dia Eleazara, zanak''i Dodo Ahohita, anankiray amin''izy telo lahy mahery. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Izy dia teo amin''i Davida tao Efesa-damima, raha vory teo ny Filistina hiady, ary ny tany nisy vary hordea maniry, ary ny olona nandositra ny Filistina. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa nijanona teo afovoan''io tany io kosa Eleazara ka nahazo io ary namono ny Filistina, ka dia nanao famonjena lehibe Jehovah. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary nisy telo lahy malaza tamin''ny telo-polo nidina nankeo amin''ny vatolampy ho any amin''i Davida tamin''ny zohin''i Adolama; ary ny miaramilan''ny Filistina nitoby tao amin''ny Lohasahan''ny Refaita. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary Davida dia tao amin''ny batery fiarovana tamin''izay, ary ny miaramilan''ny Filistina kosa dia tao Betlehema. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary Davida naniry ka nanao hoe: Enga anie ka hisy hampisotro rano ahy avy amin''ny fantsakana ao Betlehema, ilay ao akaikin''ny vavahady. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary izy telo lahy ireo namaky teo amin''ny miaramilan''ny Filistina ka nanovo rano tao amin''ny fantsakana tao Betlehema, ilay tao akaikin''ny vavahady, dia nentiny ho any amin''i Davida. Kanjo tsy nety nisotro izy, fa naidiny ho an''i Jehovah. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa hoy izy: Sanatria amiko eo anatrehan''Andriamanitra raha hanao izany; hisotro ny ran''ireto olona nanao vi-very ny ainy ireto va aho? fa nanao vi-very ny ainy izy ireo tamin''ny nakany ity. Ka dia tsy nety nisotro izy. Izany zavatra izany no nataon''ireo telo lahy mahery ireo.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Hatry ny fahiny ihany koa, fony Saoly mbola nanjaka aza, dia ianao ihany no mpitarika ny Isiraely nivoaka sy niditra; ary hoy Jehovah Andriamanitrao taminao; Hianao no ho mpiandry ny Isiraely oloko, ary ianao no ho mpanapaka azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary Abisay, rahalahin''i Joaba, no lehibe tamin''izy telo lahy; fa izy koa namely telonjato lahy tamin''ny lefona ka nahafaty azy, ka dia izy no nalaza tamin''izy telo lahy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Eny, tamin'izy telo lahy dia izy no nanana voninahitra mihoatra noho ny azy roa lahy, fa izy no lehibeny; nefa tsy nahomby azy telo lahy teo izy.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary Benaia, zanak'i Joiada, zanaky ny lehilahy mahay tany Kabzela, izay nahavita asa be, izy no nahafaty ny roa lahy mahery
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. lionan'Andriamanitra
      marker-yv: yv-n
    - type: text
      text: ' tany Moaba; ary izy koa no nidina namono ny liona tao anatin''ny lavaka fantsakana tamin''ilay andro nisy oram-panala iny. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary izy koa no namono ilay Egyptiana makadiry, izay dimy hakiho ny halavany, nefa teny an-tànan''ilay Egyptiana nisy lefona tahaka ny vodi-tenon''ny mpanenona; nefa namorotsahan''i Benaia tamin''ny tehiny ihany izy, dia nosarihany ny lefona teny an-tànan''ilay Egyptiana, ka iny lefony iny ihany no namonoany azy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Izany zavatra izany no nataon''i Benaia, zanak''i Joiada, ary tamin''izy telo lahy mahery dia izy no nalaza. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Indro fa be voninahitra tamin''ny telo-polo lahy izy, nefa tsy nahomby azy telo lahy teo; ary Davida nanao azy ho isan''ny mpanolo-tsaina azy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary ny lehilahy mahery dia Asahela, rahalahin''i Joaba, sy Elanana, zanak''i Dodo, avy any Betlehema, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'sy Samota Harorita sy Haleza Pelonita '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'sy Ira, zanak''Ikesy Tekoita, sy Abiezera Anatotita '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'sy Sibekay Hosatita sy Ely Ahohita '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Eny, tonga tao amin'ny mpanjaka tao Hebrona ny loholon'ny Isiraely rehetra; ary Davida nanao fanekena taminy tao Hebrona teo anatrehan'i Jehovah; ary dia nanosotra an'i Davida ho mpanjakan'ny Isiraely izy araka ny tenin'i Jehovah izay nampilazainy an'i Samoela.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'sy Maharay Netofatita sy Heleda, zanak''i Bana Netofatita, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'sy Itahy, zanak''i Ribay avy any Gibean''ny taranak''i Benjamina, sy Benaia Piratonita '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'sy Horay, any amin''ny lohasahan-driak''i Gasy, sy Abiela Arbatita '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'sy Azmaveta Baharomita sy Eliaba Salbonita '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'sy ny zanak''i Hasema Gizonita sy Jonatana, zanak''i Sage Hararita, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'sy Ahiama, zanak''i Sakara Hararita, sy Elifala, zanak''i Ora, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'sy Hefera Mekeratita sy Ahia Pelonita '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'sy Hezro Karmelita sy Naray, zanak''i Ezbay, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'sy Joela, rahalahin''i Natana, sy Mibara, zanak''i Hagry. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'sy Zaleta Amonita sy Naharay Berotita, mpitondra ny fiadian''i Joaba, zanak''i Zeroia, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary Davida sy ny Isiraely rehetra nankany Jerosalema (Jebosa izany); ary tao ny Jebosita tompon-tany. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'sy Ira Jitrita sy Gareba Jitrita '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'sy Oria Hetita sy Zabada, zanak''i Ahelay, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'sy Adina, zanak''i Siza Robenita, mpifehy ny Robenita, ary ny namany telo-polo lahy koa, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'sy Hanana, zanak''i Maka, sy Josafata Mitnita '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'sy Ozia Astartita ary Sama sy Jeiela, zanak''i Hotama Aroerita, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'sy Jediaela, zanak''i Simry, sy Joha Tizita rahalahiny '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'sy Eliala Mahavita sy Jeribay sy Josavia, zanak''i Elnama, sy Jitma Moabita '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: sy Eliala sy Obeda ary Jasiela Mezobaita.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary hoy ny mponina tao Jebosa tamin''i Davida: Tsy ho tafiditra eto ianao. Kanjo afak''i Davida ihany ny batery fiarovana, dia Ziona (Tanànan''i Davida izany). '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary hoy Davida: Na iza na iza no hamely voalohany ny Jebosita, dia izy no ho lohany sy ho komandy. Ary Joaba, zanak''i Zeroia, no niakatra voalohany, ka dia izy no lohany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia nitoetra tao anatin''ny batery fiarotana Davida, ka izany no nanaovana ny anarany hoe Tanànan''i Davida '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary nandrafitra ny manodidina ny tanàna hatrany Milo
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. fiarovana
      marker-yv: yv-n
    - type: text
      text: ' izy; ary Joaba nampamboatra ny sisa tamin''ny tanàna. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Koa dia nandroso nihalehibe Davida; fa Jehovah, Tompon'ny maro, no nomba azy.
