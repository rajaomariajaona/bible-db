document_id: 1TH.4,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hihavian'i Kristy sy ny toetry ny Kristiana izay modi-mandry
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary farany, ry rahalahy, mangataka aminareo sy mananatra anareo ao amin''i Jesosy Tompo izahay, mba ho araka ny nandraisanareo taminay izay mety handehananareo sy hanaovanareo ny sitrapon''Andriamanitra - dia araka ny andehananareo ihany - no hitomboanareo bebe kokoa. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa manao izany ihany ianareo amin''ny rahalahy rehetra eran''i Makedonia; nefa mananatra anareo ihany izahay, ry rahalahy, mba hitombo bebe kokoa, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'ary mba hokendrenareo ny ho tafatoetra tsara sy hitandrina ny raharahanareo ary hiasa amin''ny tananareo araka ny nandidianay anareo, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: mba handehananareo amin'izay fitondran-tena mahamendrika amin'ny eo ivelany, ary mba tsy hanan-java-mahory ianareo.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa tsy tianay tsy ho fantatrareo, ry rahalahy, ny amin''izay modi-mandry, mba tsy hahalahelovanareo tahaka ny sasany izay tsy manana fanantenana. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Fa raha inoantsika fa efa maty Jesosy sady efa nitsangana indray, dia toy izany koa no hitondran'Andriamanitra izay efa nodi-mandry tao amin'i Jesosy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: tamin''ny alalan''i Jesosy'
      marker-yv: yv-n
    - type: text
      text: ' hiaraka aminy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa izao no lazainay aminareo amin''ny tenin''ny Tompo: isika, izay velona ka mbola mitoetra mandra-pihavin''ny Tompo, dia tsy mba hialoha izay efa nodi-mandry tsy akory. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa ny tenan''ny Tompo no hidina avy any an-danitra amin''ny fiantsoana sy ny feon''ny arikanjely ary ny trompetran''Andriamanitra, ka izay maty ao amin i Kristy no hitsangana aloha; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'ary rehefa afaka izany, dia isika izay velona ka mbola mitoetra no hakarina hiaraka aminy ho eny amin''ny rahona hitsena ny Tompo any amin''ny habakabaka; dia ho any amin''ny Tompo mandrakariva isika. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Koa dia mifampionòna ianareo amin'izany teny izany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa fantatrareo ny didy nomenay anareo avy tamin''i Jesosy Tompo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa izao no sitrapon''Andriamanitra, dia ny hanamasinana anareo, hifadianareo ny fijangajangana, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'mba samy hahafantatra izay hahazoanareo ny fanaky ny tenanareo avy, amin''ny fahamasinana sy ny voninahitra, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'tsy amin''ny filàna fotsiny, tahaka ny jentilisa izay tsy mahalala an''Andriamanitra, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: mba tsy hisy hanao saina hifetsy ny rahalahiny amin'izany
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: amin''ny raharaha'
      marker-yv: yv-n
    - type: text
      text: '; fa ny Tompo no mpamaly ny amin''izany zavatra rehetra izany, toy ny nolazainay sy nambaranay taminareo rahateo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa Andriamanitra tsy niantso antsika ho amin''ny fahalotoana, fa amin''ny fahamasinana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Koa izay mandà, dia tsy olona no laviny, fa Andriamanitra, Izay manome anareo ny Fanahiny Masina.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa ny amin''ny fifankatiavan''ny mpirahalahy, dia tsy misy tokony hosoratako aminareo, satria ny tenanareo dia ampianarin''Andriamanitra hifankatia. '
