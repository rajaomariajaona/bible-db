document_id: LUK.6,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ary tamin'ny Sabata anankiray
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: faharoa manaraka ny voalohany'
      marker-yv: yv-n
    - type: text
      text: ' dia nandeha namaky ny tanimbary Jesosy, ary ny mpianany nanoty ny salohim-bary, ka rehefa nokosokosohiny tamin''ny tànany, dia nohaniny. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary nijery azy rehetra manodidina Izy, dia nanao tamin-dralehilahy hoe: Ahinjiro ny tananao. Dia nataony izany, ka sitrana ny tànany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Dia safotry ny hatezerana izy ireo ka nioko ny amin'izay hanaovany an'i Jesosy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary tamin''izany andro izany dia lasa nankany an-tendrombohitra Jesosy mba hivavaka; ary naharitra nivavaka tamin''Andriamanitra nandritra ny alina Izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary nony maraina ny andro,dia nantsoiny hanatona Azy ny mpianany, ka nifidianany roa ambin''ny folo lahy, izay nataony hoe Apostoly, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'dia Simona, izay nataony hoe koa Petera, sy Andrea rahalahiny, sy Jakoba sy Jaona sy Filipo sy Bartelemeo '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'sy Matio sy Tomasy sy Jakoba, zanak''i Alfeo, sy Simona, izay atao hoe Zelota, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: sy Jodasy, zanak'i
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: rahalahin''i'
      marker-yv: yv-n
    - type: text
      text: ' Jakoba, ary Jodasy Iskariota, izay tonga namadika. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary Jesosy niara-nidina tamin''ireo, dia nijanona teo an-kamarenana Izy sy ny mpianany maro mbamin''ny vahoaka betsaka avy tany Jodia rehetra sy Jerosalema, ary avy tany amoron-dranomasina any Tyro sy Sidona, izay tonga mba hihaino Azy sy hositranina amin''ny aretiny; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ary izay nampahorin''ny fanahy maloto dia nositranina. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary ny vahoaka rehetra nitady hanendry Azy, satria nisy hery niala taminy ka nahasitrana azy rehetra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa ny Fariseo sasany nanao hoe: Nahoana ianareo no manao izay tsy mety hatao amin''ny Sabata? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary Jesosy dia nanopy ny masony tamin''ny mpianany ka nanao hoe: Sambatra ianareo malahelo, fa anareo ny fanjakan''Andriamanitra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Sambatra ianareo noana ankehitriny, fa hovokisana ianareo. Sambatra ianareo mitomany ankehitriny, fa hihomehy ianareo. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Sambatra ianareo, raha halan''ny olona ka ariany sy haratsiny, ary laviny toy ny zava-dratsy ny anaranareo, noho ny amin''ny Zanak''olona. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Mifalia ianareo amin'izany andro izany, ka mibitaha
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: miantsambora'
      marker-yv: yv-n
    - type: text
      text: '; fa, indro, lehibe ny valim-pitianareo any an-danitra; fa izany no nataon''ny razany tamin''ny mpaminany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Fa lozanareo izay manan-karena kosa! fa efa azonareo izay mahafa-po anareo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Lozanareo izay voky ankehitriny! fa mbola ho noana ianareo. Lozanareo izay mihomehy ankehitriny fa mbola be ory sy hitomany ianareo. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Lozanareo, raha milaza soa anareo ny olona rehetra! fa izany no nataon''ny razany tamin''ny mpaminany sandoka. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Kanefa hoy Izaho aminareo izay mihaino: Tiava ny fahavalonareo; manaova soa amin''izay mankahala anareo; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'misaora izay manozona anareo, ary mivavaha ho an''izay manisy ratsy anareo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Raha misy mamely ny takolakao anankiray, dia atolory azy koa ny anankiray; ary raha misy maka ny lambanao, aza lavinao na dia ny akanjonao aza. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary Jesosy namaly azy ka nanao hoe: Tsy mbola novakinareo va ny teny milaza ilay nataon''i Davida, raha noana izy mbamin''izay nanaraka azy, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Omeo izay rehetra mangataka aminao; ary raha misy maka ny anananao, dia aza manaraka izany aminy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary araka izay tianareo hataon''ny olona aminareo, dia mba ataovy aminy kosa. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Fa raha izay tia anareo ihany no tianareo, inona moa no soa tokony ho azonareo? fa na dia ny mpanota koa aza mba tia izay tia azy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary raha izay manisy soa anareo ihany no asianareo soa, inona moa no soa tokony ho azonareo? fa na dia ny mpanota aza mba manao izany ihany. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ary raha mampisambotra izay antenainareo fa mbola hanonitra ianareo, inona moa no soa tokony ho azonareo? fa na dia ny mpanota aza mba mampisambotra ny mpanota, handraisany toraka izany indray. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Fa tiava ny fahavalonareo, ary manaova soa, dia mampisambora, fa aza kivy na amin'inona na amin'inona
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: aza manantena valiny'
      marker-yv: yv-n
    - type: text
      text: ', dia ho lehibe ny valim-pitianareo, ary ho zanaky ny Avo Indrindra ianareo; fa Izy mora fanahy amin''izay tsy misaotra sy ny ratsy fanahy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Aoka ho mpamindra fo ianareo mba ho tahaka ny Rainareo, Mpamindra fo. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary aza mitsara, dia tsy hotsaraina ianareo; aza manameloka, dia tsy hohelohina ianareo; mamelà, dia mba havela ianareo; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'omeo, dia mba homena ianareo; fatra tsara sady ahintsana no afatratra ka mihoatra no homeny ho ao am-pofoanareo. Fa izay fatra ataonareo no hamarana ho anareo kosa. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Ary Jesosy nanao fanoharana taminy koa hoe: Ny jamba va mahatari-dalana ny jamba? Tsy hianjera any an-kady va izy roa? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'fa niditra tao an-tranon''Andriamanitra izy ka nandray ny mofo aseho ary nihinana sady nanome he an''izay nanaraka azy koa, nefa mahadiso raha misy homana izany, afa-tsy ny mpisorona ihany? '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Ny mpianatra tsy mihoatra noho ny mpampianatra; fa izay rehetra tanteraka dia ho tahaka ny mpampianatra azy ihany. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Ary nahoana ianao no mijery ny sombin-kazo izay eo amin''ny mason''ny rahalahinao, nefa ny andry izay eo amin''ny masonao dia tsy mba tsaroanao akory? '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Ary ahoana no ilazanao amin''ny rahalahinao hoe: Ry rahalahy, aoka hesoriko ny sombin-kazo eo amin''ny masonao, nefa tsy mba hitanao ny andry eo amin''ny masonao? Ry mpihatsaravelatsihy, esory aloha ny andry eo amin''ny masonao, ary amin''izany dia ho hitanao tsara ny hanesoranao ny sombin-kazo eo amin''ny maso''ny rahalahinao. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Fa tsy misy hazo tsara mamoa voa ratsy na hazo ratsy mamoa voa tsara. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Fa samy fantatra amin'ny voany avy ny hazo rehetra; fa tsy misy manoty aviavy
    - type: usfm
      marker: x
      children:
      - type: text
        text: aviavimbazaha
      marker-yv: yv-n
    - type: text
      text: ' amin''ny tsilo, na voaloboka amin''ny voaroy. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Ny olona tsara fanahy dia mamoaka ny tsara avy amin''ny rakitra tsaran''ny fony; ary ny ratsy fanahy kosa dia mamoaka ny ratsy; fa amin''ny haben''ny ao am-pony no itenenan''ny vavany. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Ary nahoana ianareo no miantso Ahy hoe: Tompoko, Tompoko, nefa tsy manao izay lazaiko? '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Izay rehetra manatona Ahy sy mandre ny teniko ka mankatò azy, dia hasehoko aminareo izay tahaka azy: '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: Tahaka ny olona nanao trano izy, izay nihady lalina ary nanisy fanorenana teo ambonin'ny vatolampy; ary nony tondraka ny rano, dia namely mafy izany trano izany ny riaka, nefa tsy nahahozongozona azy, satria tsara fanorenana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: naorina teo ambonin''ny vatolampy izy'
      marker-yv: yv-n
    - type: text
      text: ' izy. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Fa izay mandre, fa tsy mankatò, dia tahaka ny olona izay nanao trano teo ambonin'ny tany, fa tsy nanisy fanorenana; dia namely azy mafy ny riaka, ka dia nirodana niaraka tamin'izay izy; ary loza ny naharavan'izany trano izany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary hoy Izy taminy: Tompon''ny Sabata ny Zanak''olona. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ary nony tamin'ny Sabata hafa koa niditra tao amin'ny synagoga Jesosy ka nampianatra; ary nisy lehilahy anankiray maty
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. efa maina, na malazo
      marker-yv: yv-n
    - type: text
      text: ' tanana tao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary ny mpanora-dalàna sy ny Fariseo nizaha taratra Azy, na hahasitrana amin''ny Sabata Izy, na tsia, mba hahitany izay hiampangana Azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa Jesosy nahalala ny hevitr''ireo, ka dia niteny tamin-dralehilahy maty tanana hoe: Mitsangàna, ka mijoroa etsy afovoany. Dia nitsangana izy ka nijoro. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary hoy Jesosy tamin''ireo: Manontany anareo Aho: Moa ny manao soa va no mety hatao amin''ny Sabata, sa ny manao ratsy? ny mamonjy aina va, sa ny mahavery aina? '
