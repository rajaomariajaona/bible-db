document_id: LUK.6,96
type_code: plt
verses:
  '1':
  - type: text
    content: Ary tamin'ny Sabata anankiray
  - type: note
    content: 'Na: faharoa manaraka ny voalohany'
  - type: text
    content: ' dia nandeha namaky ny tanimbary Jesosy, ary ny mpianany nanoty ny salohim-bary, ka rehefa nokosokosohiny tamin''ny tànany, dia nohaniny. '
  '10':
  - type: text
    content: 'Ary nijery azy rehetra manodidina Izy, dia nanao tamin-dralehilahy hoe: Ahinjiro ny tananao. Dia nataony izany, ka sitrana ny tànany. '
  '11':
  - type: text
    content: Dia safotry ny hatezerana izy ireo ka nioko ny amin'izay hanaovany an'i Jesosy.
  '12':
  - type: text
    content: 'Ary tamin''izany andro izany dia lasa nankany an-tendrombohitra Jesosy mba hivavaka; ary naharitra nivavaka tamin''Andriamanitra nandritra ny alina Izy. '
  '13':
  - type: text
    content: 'Ary nony maraina ny andro,dia nantsoiny hanatona Azy ny mpianany, ka nifidianany roa ambin''ny folo lahy, izay nataony hoe Apostoly, '
  '14':
  - type: text
    content: 'dia Simona, izay nataony hoe koa Petera, sy Andrea rahalahiny, sy Jakoba sy Jaona sy Filipo sy Bartelemeo '
  '15':
  - type: text
    content: 'sy Matio sy Tomasy sy Jakoba, zanak''i Alfeo, sy Simona, izay atao hoe Zelota, '
  '16':
  - type: text
    content: sy Jodasy, zanak'i
  - type: note
    content: 'Na: rahalahin''i'
  - type: text
    content: ' Jakoba, ary Jodasy Iskariota, izay tonga namadika. '
  '17':
  - type: text
    content: 'Ary Jesosy niara-nidina tamin''ireo, dia nijanona teo an-kamarenana Izy sy ny mpianany maro mbamin''ny vahoaka betsaka avy tany Jodia rehetra sy Jerosalema, ary avy tany amoron-dranomasina any Tyro sy Sidona, izay tonga mba hihaino Azy sy hositranina amin''ny aretiny; '
  '18':
  - type: text
    content: 'ary izay nampahorin''ny fanahy maloto dia nositranina. '
  '19':
  - type: text
    content: 'Ary ny vahoaka rehetra nitady hanendry Azy, satria nisy hery niala taminy ka nahasitrana azy rehetra. '
  '2':
  - type: text
    content: 'Fa ny Fariseo sasany nanao hoe: Nahoana ianareo no manao izay tsy mety hatao amin''ny Sabata? '
  '20':
  - type: text
    content: 'Ary Jesosy dia nanopy ny masony tamin''ny mpianany ka nanao hoe: Sambatra ianareo malahelo, fa anareo ny fanjakan''Andriamanitra. '
  '21':
  - type: text
    content: 'Sambatra ianareo noana ankehitriny, fa hovokisana ianareo. Sambatra ianareo mitomany ankehitriny, fa hihomehy ianareo. '
  '22':
  - type: text
    content: 'Sambatra ianareo, raha halan''ny olona ka ariany sy haratsiny, ary laviny toy ny zava-dratsy ny anaranareo, noho ny amin''ny Zanak''olona. '
  '23':
  - type: text
    content: Mifalia ianareo amin'izany andro izany, ka mibitaha
  - type: note
    content: 'Na: miantsambora'
  - type: text
    content: '; fa, indro, lehibe ny valim-pitianareo any an-danitra; fa izany no nataon''ny razany tamin''ny mpaminany. '
  '24':
  - type: text
    content: 'Fa lozanareo izay manan-karena kosa! fa efa azonareo izay mahafa-po anareo. '
  '25':
  - type: text
    content: 'Lozanareo izay voky ankehitriny! fa mbola ho noana ianareo. Lozanareo izay mihomehy ankehitriny fa mbola be ory sy hitomany ianareo. '
  '26':
  - type: text
    content: 'Lozanareo, raha milaza soa anareo ny olona rehetra! fa izany no nataon''ny razany tamin''ny mpaminany sandoka. '
  '27':
  - type: text
    content: 'Kanefa hoy Izaho aminareo izay mihaino: Tiava ny fahavalonareo; manaova soa amin''izay mankahala anareo; '
  '28':
  - type: text
    content: 'misaora izay manozona anareo, ary mivavaha ho an''izay manisy ratsy anareo. '
  '29':
  - type: text
    content: 'Raha misy mamely ny takolakao anankiray, dia atolory azy koa ny anankiray; ary raha misy maka ny lambanao, aza lavinao na dia ny akanjonao aza. '
  '3':
  - type: text
    content: 'Ary Jesosy namaly azy ka nanao hoe: Tsy mbola novakinareo va ny teny milaza ilay nataon''i Davida, raha noana izy mbamin''izay nanaraka azy, '
  '30':
  - type: text
    content: 'Omeo izay rehetra mangataka aminao; ary raha misy maka ny anananao, dia aza manaraka izany aminy. '
  '31':
  - type: text
    content: 'Ary araka izay tianareo hataon''ny olona aminareo, dia mba ataovy aminy kosa. '
  '32':
  - type: text
    content: 'Fa raha izay tia anareo ihany no tianareo, inona moa no soa tokony ho azonareo? fa na dia ny mpanota koa aza mba tia izay tia azy. '
  '33':
  - type: text
    content: 'Ary raha izay manisy soa anareo ihany no asianareo soa, inona moa no soa tokony ho azonareo? fa na dia ny mpanota aza mba manao izany ihany. '
  '34':
  - type: text
    content: 'Ary raha mampisambotra izay antenainareo fa mbola hanonitra ianareo, inona moa no soa tokony ho azonareo? fa na dia ny mpanota aza mba mampisambotra ny mpanota, handraisany toraka izany indray. '
  '35':
  - type: text
    content: Fa tiava ny fahavalonareo, ary manaova soa, dia mampisambora, fa aza kivy na amin'inona na amin'inona
  - type: note
    content: 'Na: aza manantena valiny'
  - type: text
    content: ', dia ho lehibe ny valim-pitianareo, ary ho zanaky ny Avo Indrindra ianareo; fa Izy mora fanahy amin''izay tsy misaotra sy ny ratsy fanahy. '
  '36':
  - type: text
    content: 'Aoka ho mpamindra fo ianareo mba ho tahaka ny Rainareo, Mpamindra fo. '
  '37':
  - type: text
    content: 'Ary aza mitsara, dia tsy hotsaraina ianareo; aza manameloka, dia tsy hohelohina ianareo; mamelà, dia mba havela ianareo; '
  '38':
  - type: text
    content: 'omeo, dia mba homena ianareo; fatra tsara sady ahintsana no afatratra ka mihoatra no homeny ho ao am-pofoanareo. Fa izay fatra ataonareo no hamarana ho anareo kosa. '
  '39':
  - type: text
    content: 'Ary Jesosy nanao fanoharana taminy koa hoe: Ny jamba va mahatari-dalana ny jamba? Tsy hianjera any an-kady va izy roa? '
  '4':
  - type: text
    content: 'fa niditra tao an-tranon''Andriamanitra izy ka nandray ny mofo aseho ary nihinana sady nanome he an''izay nanaraka azy koa, nefa mahadiso raha misy homana izany, afa-tsy ny mpisorona ihany? '
  '40':
  - type: text
    content: 'Ny mpianatra tsy mihoatra noho ny mpampianatra; fa izay rehetra tanteraka dia ho tahaka ny mpampianatra azy ihany. '
  '41':
  - type: text
    content: 'Ary nahoana ianao no mijery ny sombin-kazo izay eo amin''ny mason''ny rahalahinao, nefa ny andry izay eo amin''ny masonao dia tsy mba tsaroanao akory? '
  '42':
  - type: text
    content: 'Ary ahoana no ilazanao amin''ny rahalahinao hoe: Ry rahalahy, aoka hesoriko ny sombin-kazo eo amin''ny masonao, nefa tsy mba hitanao ny andry eo amin''ny masonao? Ry mpihatsaravelatsihy, esory aloha ny andry eo amin''ny masonao, ary amin''izany dia ho hitanao tsara ny hanesoranao ny sombin-kazo eo amin''ny maso''ny rahalahinao. '
  '43':
  - type: text
    content: 'Fa tsy misy hazo tsara mamoa voa ratsy na hazo ratsy mamoa voa tsara. '
  '44':
  - type: text
    content: Fa samy fantatra amin'ny voany avy ny hazo rehetra; fa tsy misy manoty aviavy
  - type: note
    content: aviavimbazaha
  - type: text
    content: ' amin''ny tsilo, na voaloboka amin''ny voaroy. '
  '45':
  - type: text
    content: 'Ny olona tsara fanahy dia mamoaka ny tsara avy amin''ny rakitra tsaran''ny fony; ary ny ratsy fanahy kosa dia mamoaka ny ratsy; fa amin''ny haben''ny ao am-pony no itenenan''ny vavany. '
  '46':
  - type: text
    content: 'Ary nahoana ianareo no miantso Ahy hoe: Tompoko, Tompoko, nefa tsy manao izay lazaiko? '
  '47':
  - type: text
    content: 'Izay rehetra manatona Ahy sy mandre ny teniko ka mankatò azy, dia hasehoko aminareo izay tahaka azy: '
  '48':
  - type: text
    content: Tahaka ny olona nanao trano izy, izay nihady lalina ary nanisy fanorenana teo ambonin'ny vatolampy; ary nony tondraka ny rano, dia namely mafy izany trano izany ny riaka, nefa tsy nahahozongozona azy, satria tsara fanorenana
  - type: note
    content: 'Na: naorina teo ambonin''ny vatolampy izy'
  - type: text
    content: ' izy. '
  '49':
  - type: text
    content: Fa izay mandre, fa tsy mankatò, dia tahaka ny olona izay nanao trano teo ambonin'ny tany, fa tsy nanisy fanorenana; dia namely azy mafy ny riaka, ka dia nirodana niaraka tamin'izay izy; ary loza ny naharavan'izany trano izany.
  '5':
  - type: text
    content: 'Ary hoy Izy taminy: Tompon''ny Sabata ny Zanak''olona. '
  '6':
  - type: text
    content: Ary nony tamin'ny Sabata hafa koa niditra tao amin'ny synagoga Jesosy ka nampianatra; ary nisy lehilahy anankiray maty
  - type: note
    content: Gr. efa maina, na malazo
  - type: text
    content: ' tanana tao. '
  '7':
  - type: text
    content: 'Ary ny mpanora-dalàna sy ny Fariseo nizaha taratra Azy, na hahasitrana amin''ny Sabata Izy, na tsia, mba hahitany izay hiampangana Azy. '
  '8':
  - type: text
    content: 'Fa Jesosy nahalala ny hevitr''ireo, ka dia niteny tamin-dralehilahy maty tanana hoe: Mitsangàna, ka mijoroa etsy afovoany. Dia nitsangana izy ka nijoro. '
  '9':
  - type: text
    content: 'Ary hoy Jesosy tamin''ireo: Manontany anareo Aho: Moa ny manao soa va no mety hatao amin''ny Sabata, sa ny manao ratsy? ny mamonjy aina va, sa ny mahavery aina? '
