document_id: JER.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fivadihan'ny Isiraely ampitahaina amin'ny tsi-fiovan'ny fitiavan'Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tonga tamiko ny tenin''i Jehovah hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mandehana, ka miantsoa eo anatrehan''i Jerosalema hoe: Izao no lazain''i Jehovah: Tsaroako ny niraiketan''ny fonao tamiko, fony ianao mbola tanora, sy ny fitiavanao, fony ianao vao nampakarina, dia ilay nanarahanao Ahy tany an-efitra, teny amin''ny tany tsy mbola nifafy zavatra; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Masina ho an''i Jehovah ny Isiraely sady santatra amin''ny vokany; Izay rehetra nihinana azy dia nohelohina, ny loza no nanjo ireny, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mihainoa ny tenin''i Jehovah, ry taranak''i Jakoba, sy ianareo, ry fokony rehetra amin''ny taranak''Isiraely! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izao no lazain''i Jehovah: Inona moa no tsy marina hitan''ny razanareo tamiko, no dia nanalavitra Ahy izy sady nanaraka ny zava-poana, ka dia tonga zava-poana koa izy? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary izy tsy nanao hoe: Aiza Jehovah Izay nitondra antsika niakatra avy tany amin''ny tany Egypta sady nitarika antsika tany an-efitra, dia ilay tany foana sady be lavaka, tany karankaina sady aloky ny fahafatesana, tany izay tsy mba nalehan''olona akory na nonenan''olona? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nitondra anareo niditra ho any amin''ny tany mahavokatra Aho, mba hihinananareo ny vokatra sy ny zavatra tsara eo aminy; Kanjo nony tafiditra ianareo, dia nolotoinareo ny taniko, sady novetavetainareo ny lovako. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny mpisorona tsy nanao hoe: Aiza Jehovah? Ary ny mpiadidy ny lalàna tsy nahalala Ahy; Ny mpitondra'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mpiandry ondry
    marker-yv: yv-n
  - type: text
    text: ' koa nanota tamiko, ary ny mpaminany naminany tamin''ny anaran''i Bala ka nanaraka ireny tsy mahasoa. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa mbola hifandahatra aminareo Aho, hoy Jehovah, sy hiady amin''ny zafinareo koa. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa mità ho any amin''ny moron-dranomasin''i Kitima, ka izahao, ary maniraha ho any Kedara, ka diniho tsara, dia aoka ho hitanareo na mba efa nisy toy izao, na tsia: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Moa nisy firenena efa nanova ny andriamaniny va? Nefa ireny dia tsy Andriamanitra akory. Fa ny oloko kosa efa nanakalo ny voninahiny tamin''ireny tsy mahasoa ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Talanjona amin''izany ry lanitra! Ary matahora, ka mangorohoroa indrindra, ianareo! hoy Jehovah; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa zava-dratsy roa loha no nataon''ny oloko: Efa nahafoy Ahy, loharanon''aina, izy ka nihady lavaka famorian-drano ho an''ny tenany, nefa lavaka mitriatriatra tsy mahatan-drano. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Moa mpanompo va Isiraely? Ompikely va izy? Koa nahoana no voababo izy? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hamely azy no ampieronan''ny liona tanora sy amoahany feo ka mahatonga ny taniny ho lao nodorana ny tanànany, ka tsy nisy mponina. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny mponina tao Memfisa
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Nofa
    marker-yv: yv-n
  - type: text
    text: ' sy Tapanesa aza efa nampangadihady ny tampon-dohanao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Moa tsy ny nahafoizanao an''i Jehovah Andriamanitrao tamin''ny andro nitondrany anao teny an-dalana va no nahatonga izany taminao? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Koa inona no anton'ny ankanesanao amin'ny lalana mankany Egypta Hisotro ny ranon'i Sihora
  - type: usfm
    marker: x
    children:
    - type: text
      text: Neily
    marker-yv: yv-n
  - type: text
    text: '? Ary inona no anton''ny ankanesanao amin''ny lalana mankany Asyria hisotro ny rano amin''ny Ony'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eofrata
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny haratsianao no anafaizana anao, ary ny fihodinanao no ananarana anao; Koa fantaro sy hevero fa ratsy sady mangidy ny nahafoizanao an''i Jehovah Andriamanitrao sy ny tsy nisian''ny tahotrao Ahy, hoy Jehovah, Tompon''ny maro. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa hatramin''ny ela no efa nanapahanao ny zioga taminao sy efa nanitosanao ny fatoranao, ka hoy ianao: Tsy hety hanompo aho; Nefa teny amin''ny havoana andrandraina sy teny ambanin''ny hazo maitso rehetra no nandrianao nijangajanganao. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa Izaho namboly anao ho karazam-boaloboka tsara indrindra, dia rantsana tsara avokoa; Ka ahoana no nanjary sampany ratsy ianao ho voaloboka hafa? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa na dia misasa sirahazo aza ianao ka maka lavenona betsaka hanadiovana anao, ny helokao dia mbola voasoratra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: maloto'
    marker-yv: yv-n
  - type: text
    text: ' eo anatrehako ihany, hoy Jehovah Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ahoana no anaovanao hoe: Tsy nanao izay nahaloto ahy aho, tsy nanaraka ireo Bala aho? Hevero ny nalehanao tany amin''ilay lohasaha, fantaro izay nataonao, ry ramevavavy haingam-pandeha mivezivezy amin''ny alehany, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Sy ry borikivavi-dia tamàna any an-efitra, izay manimbolo ny rivotra noho ny faniriany; Ary ny fahamaimaizany iza no mahasakana azy? Izay rehetra mitady azy dia tsy ho sasa-poana; Fa amin''ny volany no hahitany azy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Aza esorina ny kapa amin''ny tongotrao; Ary aoka tsy ho maina ny tendanao; Nefa hoy ianao: Tsy misy fanantenana; Tsia! fa ny hafa no tiako, ka dia hanaraka azy aho. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Toy ny fangaihain''ny mpangalatra, raha azo, dia toy izany ny fangaihain''ny taranak''Isiraely, eny, izy sy ny mpanjakany sy ny lehibeny sy ny mpisorony ary ny mpaminaniny, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia izay manao amin''ny tapa-kazo hoe: Raiko ianao, ary amin''ny vato hoe: Hianao no niteraka ahy; Fa efa niamboho Ahy izy ka tsy nanatrika Ahy; Nefa amin''ny andro fahoriany kosa dia vao hanao hoe izy: Mitsangàna, ka vonjeo izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa aiza ireny andriamanitrao izay nataonao ho anao? Aoka hitsangana ireny, raha mahavonjy anao amin''ny andro fahorianao fa araka ny isan''ny tanànanao, ry Joda, no isan''ny andriamanitrao. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Nahoana no mifandahatra amiko ianareo? Fa samy efa niodina tamiko ianareo rehetra, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Foana ny namelezako ny zanakareo, fa tsy zaka nanarina izy; Ny sabatrareo nandringana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. nihinana
    marker-yv: yv-n
  - type: text
    text: ' ny mpaminaninareo, toy ny liona mamiravira.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ry taranaka, dinihonareo ny tenin'i Jehovah! Moa efa nanjary tany efitra ho an'ny Isiraely va Aho, na tany maizim-pito
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tany misy aizim-pito avy amin''i Jehovah'
    marker-yv: yv-n
  - type: text
    text: '? Nahoana ny oloko no manao hoe: Afaka mikarenjy izahay ka tsy hankany aminao intsony? '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Hanadino ny firàvany va ny virijina, na hanadino ny fehin-kibony misy haingony va ny ampakarina? Nefa tsy hita isa ny andro nanadinoan''ny oloko Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Kanto izany fandehanao hitady fitia izany, ka zarinao ho amin'ny ratsy ny dianao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ka na dia ny vehivavy ratsy fanahy aza dia ampianarinao ny fombanao'
    marker-yv: yv-n
  - type: text
    text: '! '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary koa eo an-tsisin-dambanao no ahitana ny ran''ny olona malahelo izay tsy manan-tsiny, tsy tamin''ny tami-trano no nahazoanao azy, fa tamin''izany rehetra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Nefa hoy ianao: Tsy manan-tsiny aho, efa afaka amiko tokoa ny fahatezerany. Indro, hifandahatra aminao Aho noho ny anaovanao hoe: Tsy nanota aho. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Nahoana ianao no maika hanova ny alehanao? Fa ho menatra noho ny amin''i Egypta koa ianao, toy ny nahamenaranao noho ny amin''i Asyria. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Izany koa dia hialanao, ka hiloloha tanana ianao; Fa nolavin'i Jehovah ny tokinao, ka tsy hambinina amin'ireo ianao.
