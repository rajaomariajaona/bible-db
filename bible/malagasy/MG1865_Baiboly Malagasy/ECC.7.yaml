document_id: ECC.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ohabolana samy hafa ny amin'ny mahasoa ny olombelona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tsara ny laza soa noho ny menaka manitra; ary ny andro ahaterahana tsy mahaleo ny andro ahafatesana. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tsara ny mankamin''ny trano misy fisaonana noho ny mankamin''ny trano misy fanasana; fa ho amin''iny no hiafaran''ny olombelona rehetra, ary ny velona handatsaka am-po izany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsara ny alahelo noho ny hehy; fa na dia malahelo aza ny tarehy, mety tsara
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: faly'
    marker-yv: yv-n
  - type: text
    text: ' ihany ny fo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny fon''ny hendry dia ao amin''ny trano misy fisaonana; fa ny fon''ny adala kosa dia ao amin''ny trano misy fifaliana. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsara ny mihaino ny anatra mafy ataon''ny hendry noho ny mihaino ny hiran''ny adala. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Toy ny firefodrefotry ny tsilo eo ambanin''ny vilany, dia tahaka izany ny fihomehezan''ny adala; zava-poana koa izany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa ny fampahoriana dia mahavery saina ny hendry; ary ny kolikoly mahasimba ny fo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tsara ny iafaran''ny raharaha noho ny iandohany; tsara ny mahari-po noho ny miavanavom-panahy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aoka tsy halaky tezitra ny fanahinao; fa ny fahatezerana mitoetra ao an-tratran''ny adala. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Aza manao hoe: Ahoana no nahatsara ny andro taloha noho ny ankehitriny? fa tsy avy amin''ny fahendrena no anontanianao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tsara tahaka ny lova ny fahendrena, sady zava-mahasoa ho an''izay mahita masoandro izany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa fialokalofana ny fahendrena, ary fialokalofana ny vola; ary ny mahatsara ny fahalalana dia izao: Maharo ny ain''ny manana azy ny fahendrena. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Saino ny asan''Andriamanitra; fa iza moa no mahahitsy izay nataony ho meloka? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Amin''ny andro mahafaly dia mifalia; ary amin''ny andro mahory mieritrereta; fa nampitanandrifin''Andriamanitra ireo, mba tsy hahitan''ny olona akory izay ho avy any aoriany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izao rehetra izao dia efa hitako tamin''ny androko mandalo foana: misy marina maty amin''ny hamarinany; ary misy meloka ela velona amin''ny haratsiany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Aza marina loatra, ary aza miseho ho hendry loatra; nahoana noho simbanao ny tenanao? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Aza ratsy loatra ianao, ary aza adala; nahoana no ho faty ianao, raha tsy efa tonga ny andronao? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tsara raha mitana iroa ianao, nefa aza mampiala ny tananao amin'itsy; fa izay matahotra an'Andriamanitra dia ho afaka amin'izany rehetra izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny fahendrena no maharo ny hendry mihoatra noho ny mpanapaka folo ao an-tanàna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa tsy misy olona marina ambonin''ny tany izay manao tsara ka tsy manota. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Aza mihainohaino ny teny rehetra tenenina, fandrao handre ny mpanomponao manozona anao ianao; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'fa fantatry ny fonao fa na dia ny tenanao aza dia mba efa nanozona ny sasany matetika ihany koa. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Izany rehetra izany dia notsapaiko tamin''ny fahendrena. Hoy izaho: Ho hendry aho; kanjo lavitra ahy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Eny, izay rehetra lavitra sady lalina dia lalina, iza no mahatakatra azy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nitodika aho, ka nampiasaiko ny foko hahalala sy handinika ary hitady fahendrena sy izay anton-javatra ary hahafantatra ny faharatsiana ho fahadalana, ary ny fahadalana ho fahaverezan-tsaina; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ka hitako fa mangidy noho ny fahafatesana ny vehivavy, izay fandrika sy harato ny fony, sady famatorana ny tànany; nefa izay ankasitrahan''Andriamanitra dia ho afa-mandositra azy, fa ny mpanota ihany no ho azony. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Indro, izany no hitako, hoy Mpitoriteny, raha nandinidinika ny zavatra tsirairay aho mba hahitana izay antony. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Izay notadiaviko koa, fa tsy hitako, dia izao: lehilahy iray no hitako ho marina tao amin''ny arivo; fa tao amin''ny vehivavy arivo'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. teo amin'ireo dia tsy nisy vehivavy hitako,etc
    marker-yv: yv-n
  - type: text
    text: ' dia tsy nisy hitako na dia iray akory aza. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Indro, izao ihany no hitako: nataon''Andriamanitra mahitsy ny olona, kanjo namorona sain-kafa maro izy.'
