document_id: JDG.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nampahorian'i Jabina ny Isiraely, sy ny namonjen'i Debora mpaminanivavy azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny Zanak''Isiraely nanao izay ratsy eo imason''i Jehovah indray, rehefa maty Ehoda. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Jehovah nivarotra azy ho eo an-tànan''i Jabina, mpanjakan''i Kanana, izay nanjaka tany Hazora, ary Sisera, izay nonina tany Harosetan''ny Jentilisa, no komandin''ny miaramilany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nitaraina tamin''i Jehovah ny Zanak''Isiraely; fa nanana kalesy vy sivin-jato Jabina, ary nampahory fatratra ny Zanak''Isiraely roa-polo taona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Debora mpaminanivavy, vadin''i Lapidota, no nitsara ny Isiraely tamin''izany andro izany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary izy nipetraka teo ambanin'ny hazo rofian
  - type: usfm
    marker: x
    children:
    - type: text
      text: Palma
    marker-yv: yv-n
  - type: text
    text: '''i Debora, teo anelanelan''i Rama sy Betela, tany amin''ny tany havoan''i Efraima; ary niakatra ho any aminy ny Zanak''Isiraely hatsaraina. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Debora naniraka ka niantso an''i Baraka, zanak''i Abinoama, tany Kadesi-naftaly, ka nanao taminy hoe: Moa tsy efa nandidy va Jehovah, Andriamanitry ny Isiraely, nanao hoe: Mandehana, ka mankanesa any an-tendrombohitra Tabara, ary mitondrà iray alin-dahy amin''ny taranak''i Naftaly sy Zebolona hiaraka aminao? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia ho entiko ho eo aminao, eo amoron''ny ony Kisona, Sisera, komandin''ny miaramilan''i Jabina, mbamin''ny kalesiny sy ny vahoakany maro be; dia hanolotra azy eo an-tananao Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy Baraka taminy: Raha handeha hiaraka amiko ianao, dia handeha aho; fa raha tsy handeha hiaraka amiko kosa ianao, dia tsy handeha aho. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy kosa izy: handeha hiaraka aminao ihany aho; kanefa tsy ho voninahitrao izao halehanao izao, satria ho eo an-tanam-behivavy no hivarotan''i Jehovah an''i Sisera. Dia niainga Debora ka nandeha niaraka tamin''i Baraka hankany Kadesy '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nantsoin''i Baraka ho any Kadesy ny Zebolona sy ny Naftaly; dia nisy iray alin-dahy niakatra nanaraka azy; ary Debora niara-niakatra taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary Hebera Kenita efa nisaraka tamin'ny Kenita izay avy amin'ny taranak'i Hobaba, zaodahin
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: rafozan'''
    marker-yv: yv-n
  - type: text
    text: '''i Mosesy, ary nilasy ambara-pahatongany teo amin''ny hazo terebinta ao Zananima, izay eo anilan''i Kadesy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nisy nilaza tamin''i Sisera fa Baraka, zanak''i Abinoama, niakatra any an-tendrombohitra Tabara. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nangonin''i Sisera ny kalesiny rehetra, dia kalesy vy sivin-jato, sy ny vahoaka rehetra izay niaraka taminy avy tany Harosetan''ny Jentilisa, hankany amin''ny ony Kisona. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy Debora tamin''i Baraka: Miakara, fa anio no andro hanoloran''i Jehovah an''i Sisera eo an-tananao; tsy mivoaka eo anoloanao va Jehovah? Dia nidina Baraka sy ny olona iray alina nanaraka azy, avy tany an-tendrombohitra Tabara. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nampifanaritahin''i Jehovah tamin''ny lelan-tsabatra Sisera teo anoloan''i Baraka sy ny kalesy rehetra ary ny miaramila rehetra; dia nidina niala tamin''ny kalesy Sisera ka nandositra nandeha tongotra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary Baraka nanenjika nanaraka ny kalesy sy ny miaramila hatrany Haroseta; dia lavon''ny lelan-tsabatra avokoa ny miaramilan''i Sisera rehetra; tsy nisy niangana na dia iray akory aza. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Sisera nandositra nandeha tongotra ho any amin''ny lain''i Jaela, vadin''i Hebera Kenita; fa nihavana Jabina, mpanjakan''i Hazora, sy ny mpianakavin''i Hebera Kenita. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nivoaka Jaela hitsena an''i Sisera ka nanao taminy hoe: Miakara, tompokolahy, miakara atỳ amiko; aza matahotra. Ary rehefa niakatra ho ao aminy ao an-day izy, dia norakofany ny lamba firakotra. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy Sisera taminy: Masìna ianao, omeo rano kely hosotroiko, fa mangetaheta aho izany. Dia nanokatra ny siny hoditra nisy ronono izy ka nomeny hosotroiny; ary dia norakofany indray izy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hoy izy taminy: Mitsangàna eo am-baravaran''ny lay, ka raha tàhiny misy avy ka manontany anao hoe: Misy olona va ato? dia ataovy hoe: Tsia. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia naka tsima-day Jaela, vadin''i Hebera, sady nitondra tantanana teny an-tànany ka nitsaitsaika nankeo aminy; dia natsatony tamin''ny fihirifany ny tsima-day, ka nihatra tamin''ny tany fa efa renoky ny torimaso Sisera, satria sasatra ka dia maty izy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary nony, indro, avy Baraka manenjika an''i Sisera, dia nivoaka hitsena azy Jaela ka nanao taminy hoe; Avia atỳ, fa hasehoko anao ny lehilahy izay tadiavinao. Ary rehefa tonga tao aminy izy, dia indro, ny fatin''i Sisera niampatra teo, ary ny tsima-day teo amin''ny fihirifany. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia naetrin''Andriamanitra teo anoloan''ny Zanak''Isiraely tamin''izany andro izany Jabina, mpanjakan''i Kanana. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary ny tanan'ny Zanak'Isiraely nihahery tamin'i Jabina, mpanjakan'i Kanana, mandra-pandringany azy.
