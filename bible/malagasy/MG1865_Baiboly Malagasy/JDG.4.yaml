document_id: JDG.4,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nampahorian'i Jabina ny Isiraely, sy ny namonjen'i Debora mpaminanivavy azy
  - type: text
    content: 'Ary ny Zanak''Isiraely nanao izay ratsy eo imason''i Jehovah indray, rehefa maty Ehoda. '
  '10':
  - type: text
    content: 'Ary nantsoin''i Baraka ho any Kadesy ny Zebolona sy ny Naftaly; dia nisy iray alin-dahy niakatra nanaraka azy; ary Debora niara-niakatra taminy. '
  '11':
  - type: text
    content: Ary Hebera Kenita efa nisaraka tamin'ny Kenita izay avy amin'ny taranak'i Hobaba, zaodahin
  - type: note
    content: 'Na: rafozan'''
  - type: text
    content: '''i Mosesy, ary nilasy ambara-pahatongany teo amin''ny hazo terebinta ao Zananima, izay eo anilan''i Kadesy. '
  '12':
  - type: text
    content: 'Ary nisy nilaza tamin''i Sisera fa Baraka, zanak''i Abinoama, niakatra any an-tendrombohitra Tabara. '
  '13':
  - type: text
    content: 'Dia nangonin''i Sisera ny kalesiny rehetra, dia kalesy vy sivin-jato, sy ny vahoaka rehetra izay niaraka taminy avy tany Harosetan''ny Jentilisa, hankany amin''ny ony Kisona. '
  '14':
  - type: text
    content: 'Ary hoy Debora tamin''i Baraka: Miakara, fa anio no andro hanoloran''i Jehovah an''i Sisera eo an-tananao; tsy mivoaka eo anoloanao va Jehovah? Dia nidina Baraka sy ny olona iray alina nanaraka azy, avy tany an-tendrombohitra Tabara. '
  '15':
  - type: text
    content: 'Dia nampifanaritahin''i Jehovah tamin''ny lelan-tsabatra Sisera teo anoloan''i Baraka sy ny kalesy rehetra ary ny miaramila rehetra; dia nidina niala tamin''ny kalesy Sisera ka nandositra nandeha tongotra. '
  '16':
  - type: text
    content: 'Ary Baraka nanenjika nanaraka ny kalesy sy ny miaramila hatrany Haroseta; dia lavon''ny lelan-tsabatra avokoa ny miaramilan''i Sisera rehetra; tsy nisy niangana na dia iray akory aza. '
  '17':
  - type: text
    content: 'Ary Sisera nandositra nandeha tongotra ho any amin''ny lain''i Jaela, vadin''i Hebera Kenita; fa nihavana Jabina, mpanjakan''i Hazora, sy ny mpianakavin''i Hebera Kenita. '
  '18':
  - type: text
    content: 'Dia nivoaka Jaela hitsena an''i Sisera ka nanao taminy hoe: Miakara, tompokolahy, miakara atỳ amiko; aza matahotra. Ary rehefa niakatra ho ao aminy ao an-day izy, dia norakofany ny lamba firakotra. '
  '19':
  - type: text
    content: 'Ary hoy Sisera taminy: Masìna ianao, omeo rano kely hosotroiko, fa mangetaheta aho izany. Dia nanokatra ny siny hoditra nisy ronono izy ka nomeny hosotroiny; ary dia norakofany indray izy. '
  '2':
  - type: text
    content: 'Ary Jehovah nivarotra azy ho eo an-tànan''i Jabina, mpanjakan''i Kanana, izay nanjaka tany Hazora, ary Sisera, izay nonina tany Harosetan''ny Jentilisa, no komandin''ny miaramilany. '
  '20':
  - type: text
    content: 'Dia hoy izy taminy: Mitsangàna eo am-baravaran''ny lay, ka raha tàhiny misy avy ka manontany anao hoe: Misy olona va ato? dia ataovy hoe: Tsia. '
  '21':
  - type: text
    content: 'Dia naka tsima-day Jaela, vadin''i Hebera, sady nitondra tantanana teny an-tànany ka nitsaitsaika nankeo aminy; dia natsatony tamin''ny fihirifany ny tsima-day, ka nihatra tamin''ny tany fa efa renoky ny torimaso Sisera, satria sasatra ka dia maty izy. '
  '22':
  - type: text
    content: 'Ary nony, indro, avy Baraka manenjika an''i Sisera, dia nivoaka hitsena azy Jaela ka nanao taminy hoe; Avia atỳ, fa hasehoko anao ny lehilahy izay tadiavinao. Ary rehefa tonga tao aminy izy, dia indro, ny fatin''i Sisera niampatra teo, ary ny tsima-day teo amin''ny fihirifany. '
  '23':
  - type: text
    content: 'Dia naetrin''Andriamanitra teo anoloan''ny Zanak''Isiraely tamin''izany andro izany Jabina, mpanjakan''i Kanana. '
  '24':
  - type: text
    content: Ary ny tanan'ny Zanak'Isiraely nihahery tamin'i Jabina, mpanjakan'i Kanana, mandra-pandringany azy.
  '3':
  - type: text
    content: 'Dia nitaraina tamin''i Jehovah ny Zanak''Isiraely; fa nanana kalesy vy sivin-jato Jabina, ary nampahory fatratra ny Zanak''Isiraely roa-polo taona izy. '
  '4':
  - type: text
    content: 'Ary Debora mpaminanivavy, vadin''i Lapidota, no nitsara ny Isiraely tamin''izany andro izany. '
  '5':
  - type: text
    content: Ary izy nipetraka teo ambanin'ny hazo rofian
  - type: note
    content: Palma
  - type: text
    content: '''i Debora, teo anelanelan''i Rama sy Betela, tany amin''ny tany havoan''i Efraima; ary niakatra ho any aminy ny Zanak''Isiraely hatsaraina. '
  '6':
  - type: text
    content: 'Ary Debora naniraka ka niantso an''i Baraka, zanak''i Abinoama, tany Kadesi-naftaly, ka nanao taminy hoe: Moa tsy efa nandidy va Jehovah, Andriamanitry ny Isiraely, nanao hoe: Mandehana, ka mankanesa any an-tendrombohitra Tabara, ary mitondrà iray alin-dahy amin''ny taranak''i Naftaly sy Zebolona hiaraka aminao? '
  '7':
  - type: text
    content: 'Dia ho entiko ho eo aminao, eo amoron''ny ony Kisona, Sisera, komandin''ny miaramilan''i Jabina, mbamin''ny kalesiny sy ny vahoakany maro be; dia hanolotra azy eo an-tananao Aho. '
  '8':
  - type: text
    content: 'Ary hoy Baraka taminy: Raha handeha hiaraka amiko ianao, dia handeha aho; fa raha tsy handeha hiaraka amiko kosa ianao, dia tsy handeha aho. '
  '9':
  - type: text
    content: 'Ary hoy kosa izy: handeha hiaraka aminao ihany aho; kanefa tsy ho voninahitrao izao halehanao izao, satria ho eo an-tanam-behivavy no hivarotan''i Jehovah an''i Sisera. Dia niainga Debora ka nandeha niaraka tamin''i Baraka hankany Kadesy '
