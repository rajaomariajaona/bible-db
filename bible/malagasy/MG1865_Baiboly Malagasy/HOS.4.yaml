document_id: HOS.4,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fananarana ny Isiraely noho ny helony
  - type: text
    content: 'Mihainoa ny tenin''i Jehovah, ianareo Zanak''Isiraely! Fa Jehovah manana ady amin''ny mponina amin''ny tany, satria tsy misy fahamarinana, na fitiavana, na fahalalana an''Andriamanitra eo amin''ny tany, '
  '10':
  - type: text
    content: 'Ka dia hihinana izy, nefa tsy ho voky, hijangajanga izy, nefa tsy hihabetsaka, satria Jehovah efa tsy nahoany intsony. '
  '11':
  - type: text
    content: 'Fijangajangana sy divay ary ranom-boaloboka no mahalasa ny saina. '
  '12':
  - type: text
    content: 'Ny oloko dia mila saina amin''ny tapa-kazony, ary ny tehiny no manambara aminy; Fa ny fanahim-pijangajangana no nampania azy, ary lasan-ko janga izy ka tsy manaiky an''Andriamaniny. '
  '13':
  - type: text
    content: 'Eny an-tampon''ny tendrombohitra no amonoany zavatra hatao fanatitra, ary eny amin''ny havoana no andoroany ditin-kazo manitra, dia eny ambanin''ny hazo ôka sy ny popola ary ny terebinta, satria tsara alokaloka ireny; Koa izany no ijejojejoan''ny zanakavavinareo sy ijangajangan''ny vinantovavinareo. '
  '14':
  - type: text
    content: Tsy hamaly ny zanakavavinareo Aho, raha mijejojejo izy, na ny vinantovavinareo, raha mijangajanga izy; Fa ny tenanareo
  - type: note
    content: Heb. ireny
  - type: text
    content: ' aza dia miavaka hankamin''ny mpijangajanga sady mamono zavatra hatao fanatitra miaraka amin''ireo vehivavy mpanolotena hijangajanga ho fanompoan-tsampy, ka dia ho lavo ny firenena tsy misaina. '
  '15':
  - type: text
    content: 'Na dia mijangajanga aza ianao, ry Isiraely. Aoka ny Joda tsy mba hanota; Ary aza mankany Gilgala na miakatra any Betavena ianareo; Ary aza mianiana hoe: Raha velona koa Jehovah! '
  '16':
  - type: text
    content: 'Fa ny Isiraely dia maditra toy ny vantotr''ombivavy maditra; Ankehitriny dia handrasan''i Jehovah toy ny zanak''ondry eny amin''ny malalaka izy. '
  '17':
  - type: text
    content: 'Tafaraikitra amin''ny sampy Efraima; Aoka izy ho eo. '
  '18':
  - type: text
    content: Efa lefy ny divainy; Mahery mijangajanga izy
  - type: note
    content: 'Na: Rehefa mitsahatra ny fibobohany, dia mahery mijangajanga izy'
  - type: text
    content: ; Fatra-pitia henatra ireo mpanapaka azy
  - type: note
    content: Heb. ampingany
  - type: text
    content: '. '
  '19':
  - type: text
    content: Voapaoky ny elatry ny rivotra izy ka ho menatra noho ny zavatra novonoiny hatao fanatitra.
  '2':
  - type: text
    content: Fa fianianana sy lainga sy vonoana sy halatra sy fijangajangana kosa, eny, manao an-keriny izy
  - type: note
    content: 'Na: Fa ny fianianana sy ny lainga sy ny vonoana sy ny halatra ary ny fijangajangana no mihabetsaka'
  - type: text
    content: ' ka mifanontona ny fandatsahan-drà. '
  '3':
  - type: text
    content: Ary noho izany dia mitomany ny tany ary reraka izay rehetra mitoetra ao aminy, dia
  - type: note
    content: 'Na: Mbamin'''
  - type: text
    content: ' ny bibi-dia sy ny voro-manidina; Eny, na dia ny hazandrano any anaty ranomasina aza dia ringana koa.'
  '4':
  - type: text
    content: 'Kanefa aza misy mandahatra, na mananatra; Fa ny oloko dia efa tahaka ny mifanditra amin''ny mpisorona. '
  '5':
  - type: text
    content: Ka dia ho tafintohina antoandro ianao, ary ny mpaminany hiara-tafintohina aminao koa amin'ny alina, ary hovonoiko ny reninao.
  '6':
  - type: text
    content: 'Ringana ny oloko noho ny tsi-fisian''ny fahalalana. Satria ianao efa nandà ny fahalalana, dia mba holaviko kosa tsy ho mpisoroko intsony; Ary efa nanadino ny lalan''Andriamanitrao ianao, ka dia mba hohadinoiko kosa ny zanakao. '
  '7':
  - type: text
    content: 'Araka ny nitomboany no nanotany tamiko, ka dia hampodiko ho henatra kosa ny voninahiny. '
  '8':
  - type: text
    content: 'Ny fanatitra noho ny ota izay aterin''ny oloko dia haniny ka satriny ihany ny ho diso ireny. '
  '9':
  - type: text
    content: 'Ary ho sahala ihany ny hanjo ny olona sy ny mpisorona; Dia hovaliako izy noho ny lalany, ary ny ataony dia hatsingeriko aminy. '
