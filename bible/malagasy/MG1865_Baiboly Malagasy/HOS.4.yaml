document_id: HOS.4,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fananarana ny Isiraely noho ny helony
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mihainoa ny tenin''i Jehovah, ianareo Zanak''Isiraely! Fa Jehovah manana ady amin''ny mponina amin''ny tany, satria tsy misy fahamarinana, na fitiavana, na fahalalana an''Andriamanitra eo amin''ny tany, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka dia hihinana izy, nefa tsy ho voky, hijangajanga izy, nefa tsy hihabetsaka, satria Jehovah efa tsy nahoany intsony. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fijangajangana sy divay ary ranom-boaloboka no mahalasa ny saina. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny oloko dia mila saina amin''ny tapa-kazony, ary ny tehiny no manambara aminy; Fa ny fanahim-pijangajangana no nampania azy, ary lasan-ko janga izy ka tsy manaiky an''Andriamaniny. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny an-tampon''ny tendrombohitra no amonoany zavatra hatao fanatitra, ary eny amin''ny havoana no andoroany ditin-kazo manitra, dia eny ambanin''ny hazo ôka sy ny popola ary ny terebinta, satria tsara alokaloka ireny; Koa izany no ijejojejoan''ny zanakavavinareo sy ijangajangan''ny vinantovavinareo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy hamaly ny zanakavavinareo Aho, raha mijejojejo izy, na ny vinantovavinareo, raha mijangajanga izy; Fa ny tenanareo
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ireny
      marker-yv: yv-n
    - type: text
      text: ' aza dia miavaka hankamin''ny mpijangajanga sady mamono zavatra hatao fanatitra miaraka amin''ireo vehivavy mpanolotena hijangajanga ho fanompoan-tsampy, ka dia ho lavo ny firenena tsy misaina. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na dia mijangajanga aza ianao, ry Isiraely. Aoka ny Joda tsy mba hanota; Ary aza mankany Gilgala na miakatra any Betavena ianareo; Ary aza mianiana hoe: Raha velona koa Jehovah! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny Isiraely dia maditra toy ny vantotr''ombivavy maditra; Ankehitriny dia handrasan''i Jehovah toy ny zanak''ondry eny amin''ny malalaka izy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tafaraikitra amin''ny sampy Efraima; Aoka izy ho eo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Efa lefy ny divainy; Mahery mijangajanga izy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Rehefa mitsahatra ny fibobohany, dia mahery mijangajanga izy'
      marker-yv: yv-n
    - type: text
      text: ; Fatra-pitia henatra ireo mpanapaka azy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ampingany
      marker-yv: yv-n
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voapaoky ny elatry ny rivotra izy ka ho menatra noho ny zavatra novonoiny hatao fanatitra.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa fianianana sy lainga sy vonoana sy halatra sy fijangajangana kosa, eny, manao an-keriny izy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Fa ny fianianana sy ny lainga sy ny vonoana sy ny halatra ary ny fijangajangana no mihabetsaka'
      marker-yv: yv-n
    - type: text
      text: ' ka mifanontona ny fandatsahan-drà. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary noho izany dia mitomany ny tany ary reraka izay rehetra mitoetra ao aminy, dia
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Mbamin'''
      marker-yv: yv-n
    - type: text
      text: ' ny bibi-dia sy ny voro-manidina; Eny, na dia ny hazandrano any anaty ranomasina aza dia ringana koa.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa aza misy mandahatra, na mananatra; Fa ny oloko dia efa tahaka ny mifanditra amin''ny mpisorona. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ka dia ho tafintohina antoandro ianao, ary ny mpaminany hiara-tafintohina aminao koa amin'ny alina, ary hovonoiko ny reninao.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ringana ny oloko noho ny tsi-fisian''ny fahalalana. Satria ianao efa nandà ny fahalalana, dia mba holaviko kosa tsy ho mpisoroko intsony; Ary efa nanadino ny lalan''Andriamanitrao ianao, ka dia mba hohadinoiko kosa ny zanakao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Araka ny nitomboany no nanotany tamiko, ka dia hampodiko ho henatra kosa ny voninahiny. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fanatitra noho ny ota izay aterin''ny oloko dia haniny ka satriny ihany ny ho diso ireny. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ho sahala ihany ny hanjo ny olona sy ny mpisorona; Dia hovaliako izy noho ny lalany, ary ny ataony dia hatsingeriko aminy. '
