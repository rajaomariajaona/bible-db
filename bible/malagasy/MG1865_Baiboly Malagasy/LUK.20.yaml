document_id: LUK.20
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin''ny andro anankiray, raha nampianatra ny olona teo an-kianjan''ny tempoly Jesosy ka nitory ny filazantsara, dia nanatona ny lohan''ny mpisorona sy ny mpanora-dalàna ary ny loholona '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka niteny taminy hoe: Lazao aminay: Fahefana manao ahoana no anaovanao izao zavatra izao? ary iza no nanome Anao izany fahefana izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Jesosy namaly ka nanao taminy hoe: Izaho kosa mba hanontany anareo zavatra iray loha, ka lazao amiko: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny batisan''i Jaona avy tany an-danitra va, sa avy tamin''ny olona? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia niara-nisaina izy ka nanao hoe: Raha holazaintsika hoe mantsy: Avy tany an-danitra, dia hataony hoe: Nahoana no tsy nino azy ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa raha holazaintsika hoe kosa: Avy tamin''ny olona, dia hitora-bato antsika ny vahoaka rehetra, satria inoany ho mpaminany Jaona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia namaly ireo fa tsy fantany izay nihaviany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary Jesosy nanao taminy hoe: Izaho kosa tsy hilaza aminareo izay fahefana anaovako izao zavatra izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nilaza izao fanoharana izao tamin''ny olona Izy ka nanao hoe: Nisy lehilahy anankiray nanao tanim-boaloboka, ka nahofany tamin''olona mpiasa tany izany, dia nandeha nitoetra ela tany an-tany hafa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary tamin''ny fotoana dia naniraka mpanompo hankany amin''ny mpiasa tany izy mba handray amin''ny vokatry ny tanim-boaloboka; fa ny mpiasa tany nikapoka azy ka nampandeha azy maina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia naniraka mpanompo anankiray koa izy; ary nokapohiny mafy koa iny sady nalany baraka ka nampandehaniny maina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia naniraka anankiray koa izy; ary iny koa dia nataony naratra ka noroahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy ny tompon''ny tanim-boaloboka: Inona re no hataoko? Haniraka ny zanako malalako aho; angamba hanaja azy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa raha nahita iny ny mpiasa tany, dia niara-nisaina izy ka nanao hoe: Ity no mpandova; andeha hovonointsika io, mba ho antsika ny lova. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia namoaka azy tany ivelan''ny tanim-boaloboka izy ka namono azy. Hataon''ny tompon''ny tanim-boaloboka ahoana moa izy amin''izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hankany izy, dia hamono ireo mpiasa tany ireo, ka homeny olon-kafa ny tanim-boaloboka. Ary raha nahare izany ireo, dia hoy izy: Sanatria izany! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary Jesosy nijery azy ka nanao hoe: Ahoana moa izao voasoratra izao: Ny vato izay nolavin''ny mpanao trano, Dia izy no efa natao fehizoro? (Sal. 118. 22). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Izay rehetra potraka amin'izany vato izany dia ho torotoro; fa na iza na iza no ianjerany dia ho mongomongo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary tamin''izany ora izany dia nitady hisambotra Azy ny mpanora-dalàna sy ny lohan''ny mpisorona; nefa natahotra ny olona izy, satria fantany fa izy no nolazainy tamin''izany fanoharana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nizaha taratra an''i Jesosy izy ka naniraka mpitsikilo, izay nody ho marina, mba hamandrika Azy amin''ny teniny, hanolorany Azy ho amin''ny hery sy ny fahefan''ny governora. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ireo nanontany Azy ka nanao hoe: Mpampianatra ô, fantatray fa miteny sy mampianatra marina Hianao ka tsy mizaha tavan''olona, fa mampianatra marina ny lalan''Andriamanitra: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mety va raha mandoa vola hetra ho an''i Kaisara izahay, sa tsia? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa Jesosy nahafantatra ny fihendreny ka nanao taminy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mampisehoa denaria amiko. An''iza moa io sary sy soratra eo aminy io? Hoy ireo: An''i Kaisara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hoy Jesosy taminy: Aloavy ho an''i Kaisara ary izay an''i Kaisara, ary ho an''Andriamanitra izay an''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary tsy sahiny nitanana Azy teo anatrehan''ny olona izany teny izany sady gaga izy noho ny famaliny ka nangina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary ny sasany tamin''ny Sadoseo, izay milaza fa tsy misy fitsanganan''ny maty, dia nanatona ka nanontany Azy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mpampianatra ô, Mosesy nanoratra ho antsika hoe: Raha misy manan-drahalahy maty momba, ka mbola velona ny vadin''ny maty, dia aoka ny rahalahiny hampakatra an-dravehivavy ka hiteraka hamelo-maso ny rahalahiny (Deo. 25. 5). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Koa nisy fito mirahalahy; ary ny zokiny nampaka-bady, dia maty momba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary ny faharoa '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'sy ny fahatelo koa nampakatra azy; ary tahaka izany avokoa no nataon''izy fito mirahalahy; nefa maty momba avokoa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary farany dia maty koa ravehivavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Koa amin''ny fitsanganan''ny maty ho vadin''iza moa ravehivavy? fa samy efa nanambady azy avokoa izy fito mirahalahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary Jesosy nanao taminy hoe: Ny zanak''izao fiainana izao dia mampaka-bady sady avoaka hampakarina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'fa izay atao miendrika hahazo izany fiainana izany sy ny fitsanganana amin''ny maty kosa dia tsy raha mampaka-bady, na avoaka hampakarina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'ary tsy mety maty intsony izy, fa mitovy amin''ny anjely sady zanak''Andriamanitra, satria zanaky ny fitsanganana amin''ny maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary Mosesy aza nanambara teo amin''ilay teny milaza ny Voaroy fa hatsangana ny maty, raha nilaza an''i Jehovah hoe Andriamanitr''i Abrahama sy Andriamanitr''isaka ary Andriamanitr''i Jakoba (Eks. 3. 6). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Fa Izy tsy mba Andriamanitry ny maty, fa an''ny velona; fa velona ho an''Andriamanitra avokoa izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary ny mpanora-dalàna sasany namaly ka nanao hoe: Mpampianatra ô, marina izay nolazainao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Fa tsy nisy sahy nanontany Azy intsony ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary hoy Jesosy taminy: Ahoana no lazaina fa Kristy no Zanak''i Davida? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Fa Davida ihany no milaza eo amin''ny bokin''ny Salamo hoe: Jehovah nilaza tamin''ny Tompoko hoe: Mipetraha eo an-tanako ankavanana '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ambara-panaoko ny fahavalonao ho fitoeran''ny tongotrao (Sal. 110. 1). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Davida amin'izany manao Azy hoe Tompo; koa ahoana no maha-Zanany Azy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary hoy Jesosy tamin''ny mpianany teo anatrehan''ny olona rehetra: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Mitandrema ny amin''ny mpanora-dalàna, izay mazoto mandehandeha miakanjo akanjo lava, ary te-hoharabain''ny olona eny an-tsena, sady tia ny fipetrehana aloha eo amin''ny synagoga sy ny fitoerana aloha eo amin''ny fanasana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ary mandany ny tranon'ny mpitondratena sy manao vavaka lavareny mba ho fiolahana; ireo dia hahazo fahamelohana mafimafy kokoa.
