document_id: LUK.20,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary tamin''ny andro anankiray, raha nampianatra ny olona teo an-kianjan''ny tempoly Jesosy ka nitory ny filazantsara, dia nanatona ny lohan''ny mpisorona sy ny mpanora-dalàna ary ny loholona '
  '10':
  - type: text
    content: 'Ary tamin''ny fotoana dia naniraka mpanompo hankany amin''ny mpiasa tany izy mba handray amin''ny vokatry ny tanim-boaloboka; fa ny mpiasa tany nikapoka azy ka nampandeha azy maina. '
  '11':
  - type: text
    content: 'Dia naniraka mpanompo anankiray koa izy; ary nokapohiny mafy koa iny sady nalany baraka ka nampandehaniny maina. '
  '12':
  - type: text
    content: 'Dia naniraka anankiray koa izy; ary iny koa dia nataony naratra ka noroahiny. '
  '13':
  - type: text
    content: 'Dia hoy ny tompon''ny tanim-boaloboka: Inona re no hataoko? Haniraka ny zanako malalako aho; angamba hanaja azy izy. '
  '14':
  - type: text
    content: 'Fa raha nahita iny ny mpiasa tany, dia niara-nisaina izy ka nanao hoe: Ity no mpandova; andeha hovonointsika io, mba ho antsika ny lova. '
  '15':
  - type: text
    content: 'Dia namoaka azy tany ivelan''ny tanim-boaloboka izy ka namono azy. Hataon''ny tompon''ny tanim-boaloboka ahoana moa izy amin''izany? '
  '16':
  - type: text
    content: 'Hankany izy, dia hamono ireo mpiasa tany ireo, ka homeny olon-kafa ny tanim-boaloboka. Ary raha nahare izany ireo, dia hoy izy: Sanatria izany! '
  '17':
  - type: text
    content: 'Ary Jesosy nijery azy ka nanao hoe: Ahoana moa izao voasoratra izao: Ny vato izay nolavin''ny mpanao trano, Dia izy no efa natao fehizoro? (Sal. 118. 22). '
  '18':
  - type: text
    content: Izay rehetra potraka amin'izany vato izany dia ho torotoro; fa na iza na iza no ianjerany dia ho mongomongo.
  '19':
  - type: text
    content: 'Ary tamin''izany ora izany dia nitady hisambotra Azy ny mpanora-dalàna sy ny lohan''ny mpisorona; nefa natahotra ny olona izy, satria fantany fa izy no nolazainy tamin''izany fanoharana izany. '
  '2':
  - type: text
    content: 'ka niteny taminy hoe: Lazao aminay: Fahefana manao ahoana no anaovanao izao zavatra izao? ary iza no nanome Anao izany fahefana izany? '
  '20':
  - type: text
    content: 'Ary nizaha taratra an''i Jesosy izy ka naniraka mpitsikilo, izay nody ho marina, mba hamandrika Azy amin''ny teniny, hanolorany Azy ho amin''ny hery sy ny fahefan''ny governora. '
  '21':
  - type: text
    content: 'Ary ireo nanontany Azy ka nanao hoe: Mpampianatra ô, fantatray fa miteny sy mampianatra marina Hianao ka tsy mizaha tavan''olona, fa mampianatra marina ny lalan''Andriamanitra: '
  '22':
  - type: text
    content: 'Mety va raha mandoa vola hetra ho an''i Kaisara izahay, sa tsia? '
  '23':
  - type: text
    content: 'Fa Jesosy nahafantatra ny fihendreny ka nanao taminy hoe: '
  '24':
  - type: text
    content: 'Mampisehoa denaria amiko. An''iza moa io sary sy soratra eo aminy io? Hoy ireo: An''i Kaisara. '
  '25':
  - type: text
    content: 'Dia hoy Jesosy taminy: Aloavy ho an''i Kaisara ary izay an''i Kaisara, ary ho an''Andriamanitra izay an''Andriamanitra. '
  '26':
  - type: text
    content: 'Ary tsy sahiny nitanana Azy teo anatrehan''ny olona izany teny izany sady gaga izy noho ny famaliny ka nangina. '
  '27':
  - type: text
    content: 'Ary ny sasany tamin''ny Sadoseo, izay milaza fa tsy misy fitsanganan''ny maty, dia nanatona ka nanontany Azy hoe: '
  '28':
  - type: text
    content: 'Mpampianatra ô, Mosesy nanoratra ho antsika hoe: Raha misy manan-drahalahy maty momba, ka mbola velona ny vadin''ny maty, dia aoka ny rahalahiny hampakatra an-dravehivavy ka hiteraka hamelo-maso ny rahalahiny (Deo. 25. 5). '
  '29':
  - type: text
    content: 'Koa nisy fito mirahalahy; ary ny zokiny nampaka-bady, dia maty momba. '
  '3':
  - type: text
    content: 'Ary Jesosy namaly ka nanao taminy hoe: Izaho kosa mba hanontany anareo zavatra iray loha, ka lazao amiko: '
  '30':
  - type: text
    content: 'Ary ny faharoa '
  '31':
  - type: text
    content: 'sy ny fahatelo koa nampakatra azy; ary tahaka izany avokoa no nataon''izy fito mirahalahy; nefa maty momba avokoa izy. '
  '32':
  - type: text
    content: 'Ary farany dia maty koa ravehivavy. '
  '33':
  - type: text
    content: 'Koa amin''ny fitsanganan''ny maty ho vadin''iza moa ravehivavy? fa samy efa nanambady azy avokoa izy fito mirahalahy. '
  '34':
  - type: text
    content: 'Ary Jesosy nanao taminy hoe: Ny zanak''izao fiainana izao dia mampaka-bady sady avoaka hampakarina; '
  '35':
  - type: text
    content: 'fa izay atao miendrika hahazo izany fiainana izany sy ny fitsanganana amin''ny maty kosa dia tsy raha mampaka-bady, na avoaka hampakarina; '
  '36':
  - type: text
    content: 'ary tsy mety maty intsony izy, fa mitovy amin''ny anjely sady zanak''Andriamanitra, satria zanaky ny fitsanganana amin''ny maty. '
  '37':
  - type: text
    content: 'Ary Mosesy aza nanambara teo amin''ilay teny milaza ny Voaroy fa hatsangana ny maty, raha nilaza an''i Jehovah hoe Andriamanitr''i Abrahama sy Andriamanitr''isaka ary Andriamanitr''i Jakoba (Eks. 3. 6). '
  '38':
  - type: text
    content: 'Fa Izy tsy mba Andriamanitry ny maty, fa an''ny velona; fa velona ho an''Andriamanitra avokoa izy rehetra. '
  '39':
  - type: text
    content: 'Ary ny mpanora-dalàna sasany namaly ka nanao hoe: Mpampianatra ô, marina izay nolazainao. '
  '4':
  - type: text
    content: 'Ny batisan''i Jaona avy tany an-danitra va, sa avy tamin''ny olona? '
  '40':
  - type: text
    content: 'Fa tsy nisy sahy nanontany Azy intsony ireo. '
  '41':
  - type: text
    content: 'Ary hoy Jesosy taminy: Ahoana no lazaina fa Kristy no Zanak''i Davida? '
  '42':
  - type: text
    content: 'Fa Davida ihany no milaza eo amin''ny bokin''ny Salamo hoe: Jehovah nilaza tamin''ny Tompoko hoe: Mipetraha eo an-tanako ankavanana '
  '43':
  - type: text
    content: 'Ambara-panaoko ny fahavalonao ho fitoeran''ny tongotrao (Sal. 110. 1). '
  '44':
  - type: text
    content: Davida amin'izany manao Azy hoe Tompo; koa ahoana no maha-Zanany Azy?
  '45':
  - type: text
    content: 'Ary hoy Jesosy tamin''ny mpianany teo anatrehan''ny olona rehetra: '
  '46':
  - type: text
    content: 'Mitandrema ny amin''ny mpanora-dalàna, izay mazoto mandehandeha miakanjo akanjo lava, ary te-hoharabain''ny olona eny an-tsena, sady tia ny fipetrehana aloha eo amin''ny synagoga sy ny fitoerana aloha eo amin''ny fanasana, '
  '47':
  - type: text
    content: ary mandany ny tranon'ny mpitondratena sy manao vavaka lavareny mba ho fiolahana; ireo dia hahazo fahamelohana mafimafy kokoa.
  '5':
  - type: text
    content: 'Dia niara-nisaina izy ka nanao hoe: Raha holazaintsika hoe mantsy: Avy tany an-danitra, dia hataony hoe: Nahoana no tsy nino azy ianareo? '
  '6':
  - type: text
    content: 'Fa raha holazaintsika hoe kosa: Avy tamin''ny olona, dia hitora-bato antsika ny vahoaka rehetra, satria inoany ho mpaminany Jaona. '
  '7':
  - type: text
    content: 'Dia namaly ireo fa tsy fantany izay nihaviany. '
  '8':
  - type: text
    content: 'Ary Jesosy nanao taminy hoe: Izaho kosa tsy hilaza aminareo izay fahefana anaovako izao zavatra izao. '
  '9':
  - type: text
    content: 'Dia nilaza izao fanoharana izao tamin''ny olona Izy ka nanao hoe: Nisy lehilahy anankiray nanao tanim-boaloboka, ka nahofany tamin''olona mpiasa tany izany, dia nandeha nitoetra ela tany an-tany hafa izy. '
