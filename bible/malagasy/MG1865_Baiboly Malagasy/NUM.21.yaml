document_id: NUM.21,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nandehanan'ny Isiraely nanodidina ny tany Edoma sy Moaba, ary ny nandreseny an'i Sihona sy Oga
  - type: text
    content: 'Ary raha ren''ilay Kananita, mpanjakan''i Arada, izay nonina teo amin''ny tany atsimo, fa efa mandeha amin''ny lalana mankany Atarima ny Isiraely, dia niady taminy izy, ka nentiny ho babo ny sasany tamin''ny Isiraely. '
  '10':
  - type: text
    content: 'Ary ny Zanak''Isiraely nifindra ka nitoby tao Obota. '
  '11':
  - type: text
    content: 'Ary nony niala tao Obota, izy, dia nitoby tao Ie-abarima, tany amin''ny efitra izay mifanolotra amin''i Moaba, tandrifin''ny fiposahan''ny masoandro. '
  '12':
  - type: text
    content: 'Ary nony niala tao izy, dia nitoby tao amin''ny lohasahan-driaka Zareda. '
  '13':
  - type: text
    content: 'Ary nony niala tao izy, dia nitoby tao an-dafin''i Arnona, izay any an-efitra sady avy amin''ny fari-tanin''ny Amorita; fa Arnona no fari-tanin''ny Moabita, eo anelanelan''ny Moabita sy ny Amorita. '
  '14':
  - type: text
    content: 'Koa izany no ilazana eo amin''ny Bokin''ny Adin''i Jehovah hoe: Vaheba any Sofa sy ny lohasahan-driaka Arnona,'
  '15':
  - type: text
    content: Ary ny tany kisolosolo amin'ny lohasahan-driaka, izay mandroso mankeo amin'ny tanin'i Ara ka mipaka amin'ny fari-tanin'i Moaba.
  '16':
  - type: text
    content: 'Ary niala tao izy hankany Bera, dia ilay lavaka fantsakana nilazan''i Jehovah tamin''i Mosesy hoe: Angony ny olona, fa homeko rano izy. '
  '17':
  - type: text
    content: 'Dia nihira izao fihirana izao ny Isiraely: Miboiboiha, ry lavaka fantsakana! Ataovinareo an-kira izy;'
  '18':
  - type: text
    content: Lavaka fantsakana izay nohadin'ireo mpanao lalàna, ary nolavahan'ireo manan-kaja amin'ny firenena. Tamin'ny tehiny, dia ny tehina fanapahana. Ary nony niala tany an-efitra izy, dia nankao Matana.
  '19':
  - type: text
    content: 'Ary nony niala tao Matana izy, dia nankao Nahaliela; ary nony niala tao Nahaliela izy, dia nankao Bamota; '
  '2':
  - type: text
    content: 'Dia nivoady tamin''i Jehovah ny Isiraely ka nanao hoe: Raha hatolotrao eo an-tananay tokoa ity firenena ity, dia hataonay levona avokoa ny tanànany. '
  '20':
  - type: text
    content: 'ary nony niala tao Bamota izy, dia nankany an-dohasaha izay ao amin''ny tany Moaba, ao an-tampon''i Pisga, izay manatrika ny efitra. '
  '21':
  - type: text
    content: 'Ary ny Isiraely naniraka olona ho any amin''i Sihona, mpanjakan''ny Amorita, hanao hoe: '
  '22':
  - type: text
    content: 'Aoka mba handeha hamaky ny taninao izahay, fa tsy hania ho amin''ny saha na ho amin''ny tanim-boaloboka izahay, ary tsy hisotro ny rano amin''ny lavaka fantsakana; ny lalan''andriana ihany no halehanay mandra-pahafakay ny fari-taninao. '
  '23':
  - type: text
    content: 'Nefa Sihona tsy namela ny Isiraely handeha hamaky ny taniny, fa nanangona ny vahoakany rehetra izy ka nivoaka avy tany an-efitra hihaona amin''ny Isiraely, dia nankany Jahaza; ary niady tamin''ny Isiraely teo izy. '
  '24':
  - type: text
    content: 'Ary ny Isiraely namely azy tamin''ny lelan-tsabatra ka nahazo ny taniny hatrany Amona ka hatrany Jaboka, dia hatramin''ny taranak''i Amona; fa mafy ny fari-tanin''ny taranak''i Amona. '
  '25':
  - type: text
    content: 'Dia nalain''ny Isiraely izany tanàna rehetra izany; ary nonenany ny tanànan''ny Amorita rehetra, dia Hesbona sy ny zana-bohiny rehetra. '
  '26':
  - type: text
    content: 'Hesbona no tanànan''i Sihona, mpanjakan''ny Amorita, izay efa nanafika ny mpanjakan''i Moaba taloha, ka efa nalainy taminy avokoa ny taniny rehetra hatrany Arnona. '
  '27':
  - type: text
    content: 'Izany no nanaovan''ny mpanao oha-teny hoe: Midira ao Hesbona ianareo; aoka hamboarina sy hatao mafy ny tanànan''i Sihona;'
  '28':
  - type: text
    content: Fa nisy afo nivoaka avy tao Hesbona, sy lelafo avy tao an-tanànan'i Sihona, Ka nandevona an'i Aran'i Moaba sy ny tompon'ny havoan'i Arnona.
  '29':
  - type: text
    content: Lozanao, ry Moaba! Ringana ianao, ry olon'i Kemosy! Foiny handositra ny zananilahy, ary navelany ho babo ny zananivavy, ho an'i Sihona, mpanjakan'ny Amorita.
  '3':
  - type: text
    content: 'Ary Jehovah nihaino ny feon''ny Isiraely ka dia natolony azy ny Kananita: ary dia nataon''ny Isiraely levona izy sy ny tanànany; koa ny anaran''izany tany izany dia natao hoe Horma.'
  '30':
  - type: text
    content: Notifirintsika izy; ringana Hesbona hatrany Dibona; nofoanantsika izy hatrany Nofa, izay mipaka an'i Medeba.
  '31':
  - type: text
    content: 'Dia nitoetra tao amin''ny tanin''ny Amorita ny Isiraely. '
  '32':
  - type: text
    content: 'Ary Mosesy naniraka olona hisafo an''i Jazera; ary ny Isiraely dia nahafaka ny zana-bohiny ka nandroaka ny Amorita izay tany. '
  '33':
  - type: text
    content: 'Ary niverina ny olona ka niakatra tamin''ny lalana mankany Basana; dia nivoaka Oga, mpanjakan''i Basana, hihaona aminy, dia izy sy ny vahoakany rehetra, hiady tao Edrehy. '
  '34':
  - type: text
    content: 'Dia hoy Jehovah tamin''i Mosesy: Aza matahotra azy ianao, fa efa natolotro eo an-tananao izy sy ny vahoakany rehetra ary ny taniny; ary ianao hanao aminy araka izay nataonao tamin''i Sihona, mpanjakan''ny Amorita, izay nitoetra tao Hesbona. '
  '35':
  - type: text
    content: Dia namely azy sy ny zananilahy ary ny vahoakany rehetra izy, ka tsy nasiany niangana na dia iray akory aza; dia nahazo ny taniny izy.
  '4':
  - type: text
    content: 'Ary niala tany an-tendrombohitra Hora izy ka nahazo ny lalana mankany amin''ny Ranomasina Mena hanodidina ny tany Edoma; dia kivy ny fanahin''ny olona noho ny lalana. '
  '5':
  - type: text
    content: 'Ary niteny nanome tsiny an''Andriamanitra sy Mosesy ny olona ka nanao hoe: Nahoana no nentinao niakatra avy tany Egypta amin''ny lalan''ny mpisafo-tany izahay ho faty atỳ an-efitra? fa tsy misy mofo na rano atỳ ary mahamonamonaina ny fanahinay itony mofomofo foana itony. '
  '6':
  - type: text
    content: 'Ary Jehovah dia nampandeha ny menaran''afo teny amin''ny olona, ka nanaikitra ny olona ireny; dia nahafatesana be ny olona Isiraely. '
  '7':
  - type: text
    content: 'Dia nankeo amin''i Mosesy ny olona ka nanao hoe: Efa nanota izahay, fa efa niteny nanome tsiny an''i Jehovah sy ianao. Ifony amin''i Jehovah izahay mba hanesorany ny menarana aminay. Dia nifona ho an''ny olona Mosesy. '
  '8':
  - type: text
    content: 'Ary hoy Jehovah taminy: Manaova menaran''afo, ka ahantòny amin''ny hazo lava, ary izay rehetra voakaikitra dia ho velona, raha mijery izany. '
  '9':
  - type: text
    content: Dia nanao menarana varahina Mosesy ka nanantona azy tamin'ny hazo lava; ary izay olona voakaikitry ny menarana ka nijery ilay menarana varahina dia velona.
