document_id: ECC.6,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fahantran'ny sasany noho ny tsy ahitany soa amin'ny zavatra ananany
  - type: text
    content: 'Misy ratsy efa hitako atỳ ambanin''ny masoandro, ary mitambesatra amin''ny olona izany: '
  '10':
  - type: text
    content: 'Izay efa teo dia voalaza anarana hatry ny fony ela, ary fantatra fa ny olona dia tsy mahazo mifandahatra amin''izay mahery noho izy. '
  '11':
  - type: text
    content: 'Fa maro ny zavatra mahabe ny zava-poana, koa inona no soa azon''ny olona? '
  '12':
  - type: text
    content: Fa iza no mahalala izay mahasoa ny olona amin'izao fiainana izao, dia ny andro vitsy mandalo foana izay laniny toy ny fihelin'ny aloka? Fa iza no hahalaza amin'ny olona izay zavatra ho avy any aoriany atỳ ambanin'ny masoandro?
  '2':
  - type: text
    content: 'dia olona izay omen''Andriamanitra vola aman-karena sy voninahitra, ka tsy misy tsy ananany na inona na inona iriny, nefa tsy omen''Andriamanitra fahefana hihinana amin''izany izy, fa olon-kafa no homana azy; zava-poana sy ratsy mahory koa izany. '
  '3':
  - type: text
    content: 'Na dia misy miteraka zaza zato aza sady tratrantitra, ka efa maro ny andro niainany, nefa tsy mba voky soa ny fanahiny, sady tsy mba alevina akory ny fatiny, dia hoy izaho: Ny tsy tonga volana dia tsara kokoa noho izy. '
  '4':
  - type: text
    content: 'Fa toa zava-poana no nihavian''io, ary mandeha ao amin''ny maizina izy, sady ho voasaron''ny aizina ny anarany, '
  '5':
  - type: text
    content: 'ary koa, tsy nahita na nahalala ny masoandro akory izy, mahita fitsaharana bebe kokoa noho ilay teo izy. '
  '6':
  - type: text
    content: 'Eny, na dia tratra arivo taona indroa aza izy, nefa tsy nahita soa, tsy ho any amin''ny fitoerana iray ihany va no alehan''izy rehetra? '
  '7':
  - type: text
    content: 'Ny fisasarana rehetra ataon''ny olona dia ho an''ny vavany ihany, nefa tsy mety afa-po ny faniriany. '
  '8':
  - type: text
    content: 'Fa inona no soa azon''ny hendry noho ny adala? Inona no azon''ny malahelo izay mahay mitondra tena eo imason''ny velona? '
  '9':
  - type: text
    content: Ny fahitan'ny maso dia mahafinaritra noho ny firenirenin'ny faniriana. Zava-poana sy misambo-drivotra
  - type: note
    content: 'Na: Homan-drivotra'
  - type: text
    content: ' foana koa izany. '
