document_id: PSA.141,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitarainana ataon'izay alaim-panahy sy enjehina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Salamo nataon''i Davida. Jehovah ô, mitaraina aminao aho, faingàna hankatỳ amiko; Henoy ny feoko amin''ny fiantsoako Anao. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Aoka ny ratsy fanahy ho latsaka eo anatin'ny fandriny ihany, Fa izaho kosa handalo fotsiny.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Aoka hankeo anatrehanao mandrakariva toy ny ditin-kazo manitra ny fivavako, Ary ho toy ny fanatitra hariva ny fanandratako ny tanako.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jehovah ô, asio fiambenana eo anoloan''ny vavako; Ambeno ny varavaran''ny molotro. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Aza avela hirona ho amin''ny zava-dratsy ny foko, Hiray raharaha amin''ny olona mpanao ratsy hanao izay asa tsy mety; Ary aoka tsy hihinana ny zava-piny aho. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Aoka ny marina hamely ahy amin''ny fahalemen-panahy ka hananatra ahy, Fa diloilo ahosotra ny lohako izany, ary aoka tsy handà izany ny lohako; Fa ny hany heriko dia ny mbola hivavaka ihany noho ny faharatsian''ireny. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Havarina amin'ny hantsam-bato ny mpitsara azy, Dia hankasitraka ny teniko ny olona.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Toy ny fiasa sy ny fihevo ny tany No nanelezana ny taolanay teo am-bavan'ny fiainan-tsi-hita
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Sheola
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa Hianao no andrandrain''ny masoko, Jehovah Tompo ô; Hianao no ialofako, aza mandatsaka ny aiko. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Arovy aho amin''ny fandrika amandrihany ahy Sy amin''ny tadivavaran''ny mpanao ratsy. '
