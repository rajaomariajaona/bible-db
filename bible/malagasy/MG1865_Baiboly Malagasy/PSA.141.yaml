document_id: PSA.141,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainana ataon'izay alaim-panahy sy enjehina
  - type: text
    content: 'Salamo nataon''i Davida. Jehovah ô, mitaraina aminao aho, faingàna hankatỳ amiko; Henoy ny feoko amin''ny fiantsoako Anao. '
  '10':
  - type: text
    content: Aoka ny ratsy fanahy ho latsaka eo anatin'ny fandriny ihany, Fa izaho kosa handalo fotsiny.
  '2':
  - type: text
    content: Aoka hankeo anatrehanao mandrakariva toy ny ditin-kazo manitra ny fivavako, Ary ho toy ny fanatitra hariva ny fanandratako ny tanako.
  '3':
  - type: text
    content: 'Jehovah ô, asio fiambenana eo anoloan''ny vavako; Ambeno ny varavaran''ny molotro. '
  '4':
  - type: text
    content: 'Aza avela hirona ho amin''ny zava-dratsy ny foko, Hiray raharaha amin''ny olona mpanao ratsy hanao izay asa tsy mety; Ary aoka tsy hihinana ny zava-piny aho. '
  '5':
  - type: text
    content: 'Aoka ny marina hamely ahy amin''ny fahalemen-panahy ka hananatra ahy, Fa diloilo ahosotra ny lohako izany, ary aoka tsy handà izany ny lohako; Fa ny hany heriko dia ny mbola hivavaka ihany noho ny faharatsian''ireny. '
  '6':
  - type: text
    content: Havarina amin'ny hantsam-bato ny mpitsara azy, Dia hankasitraka ny teniko ny olona.
  '7':
  - type: text
    content: Toy ny fiasa sy ny fihevo ny tany No nanelezana ny taolanay teo am-bavan'ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Fa Hianao no andrandrain''ny masoko, Jehovah Tompo ô; Hianao no ialofako, aza mandatsaka ny aiko. '
  '9':
  - type: text
    content: 'Arovy aho amin''ny fandrika amandrihany ahy Sy amin''ny tadivavaran''ny mpanao ratsy. '
