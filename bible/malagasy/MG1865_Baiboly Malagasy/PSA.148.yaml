document_id: PSA.148
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiantsoana izao rehetra izao hidera an'Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Haleloia. Miderà an''i Jehovah, ry any an-danitra; Miderà Azy any ambony. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Miderà Azy, ry anjeliny rehetra; Miderà Azy, ry miaramilany rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Miderà Azy, ry masoandro amam-bolana; Miderà Azy, ry kintana mazava rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Miderà Azy, ry lanitry ny lanitra, Ary ianareo rano ambonin''ny lanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Aoka hidera ny anaran''i Jehovah ireo; Fa Izy no nandidy, dia ary ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nampitoetra ireo ho mandrakizay doria Izy; Nomen-dalàna ireo ka tsy mba mihoatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Midera an''i Jehovah etỳ an-tany, Hianareo dragona sy ianareo rano lalina rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny afo sy ny havandra, ny oram-panala sy ny zavona, Ny rivotra mahery izay mankatò ny teniny, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny tendrombohitra sy ny havoana rehetra, Ny hazo fihinam-boa sy ny sedera rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny bibi-dia sy ny biby fiompy rehetra, Ny biby mandady na mikisaka ary ny voro-manidina, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny mpanjaka amin''ny tany sy ny vahoaka rehetra, Ny mpanapaka sy ny mpitsara rehetra amin''ny tany, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Na ny zatovolahy, na ny zatovovavy, Na ny antitra, na ny tanora, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Samia midera ny anaran'i Jehovah avokoa, Fa ny anarany ihany no misandratra; Ambonin'ny tany sy ny lanitra ny voninahiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary manandratra tandroka ho an'ny olony Izy, Dia fiderana ho an'ny olony masina rehetra, Eny, ho an'ny Zanak'Isiraely, firenena akaiky Azy. Haleloia.
