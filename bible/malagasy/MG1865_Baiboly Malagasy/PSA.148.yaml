document_id: PSA.148,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoana izao rehetra izao hidera an'Andriamanitra
  - type: text
    content: 'Haleloia. Miderà an''i Jehovah, ry any an-danitra; Miderà Azy any ambony. '
  '10':
  - type: text
    content: 'Ny bibi-dia sy ny biby fiompy rehetra, Ny biby mandady na mikisaka ary ny voro-manidina, '
  '11':
  - type: text
    content: 'Ny mpanjaka amin''ny tany sy ny vahoaka rehetra, Ny mpanapaka sy ny mpitsara rehetra amin''ny tany, '
  '12':
  - type: text
    content: 'Na ny zatovolahy, na ny zatovovavy, Na ny antitra, na ny tanora, '
  '13':
  - type: text
    content: Samia midera ny anaran'i Jehovah avokoa, Fa ny anarany ihany no misandratra; Ambonin'ny tany sy ny lanitra ny voninahiny.
  '14':
  - type: text
    content: Ary manandratra tandroka ho an'ny olony Izy, Dia fiderana ho an'ny olony masina rehetra, Eny, ho an'ny Zanak'Isiraely, firenena akaiky Azy. Haleloia.
  '2':
  - type: text
    content: 'Miderà Azy, ry anjeliny rehetra; Miderà Azy, ry miaramilany rehetra. '
  '3':
  - type: text
    content: 'Miderà Azy, ry masoandro amam-bolana; Miderà Azy, ry kintana mazava rehetra. '
  '4':
  - type: text
    content: 'Miderà Azy, ry lanitry ny lanitra, Ary ianareo rano ambonin''ny lanitra. '
  '5':
  - type: text
    content: 'Aoka hidera ny anaran''i Jehovah ireo; Fa Izy no nandidy, dia ary ireo. '
  '6':
  - type: text
    content: Nampitoetra ireo ho mandrakizay doria Izy; Nomen-dalàna ireo ka tsy mba mihoatra.
  '7':
  - type: text
    content: 'Midera an''i Jehovah etỳ an-tany, Hianareo dragona sy ianareo rano lalina rehetra, '
  '8':
  - type: text
    content: 'Ny afo sy ny havandra, ny oram-panala sy ny zavona, Ny rivotra mahery izay mankatò ny teniny, '
  '9':
  - type: text
    content: 'Ny tendrombohitra sy ny havoana rehetra, Ny hazo fihinam-boa sy ny sedera rehetra, '
