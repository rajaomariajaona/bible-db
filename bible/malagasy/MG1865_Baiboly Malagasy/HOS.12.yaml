document_id: HOS.12,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fananarana ny Isiraely noho ny helony
  - type: text
    content: 'Efraima manodidina Ahy amin''ny lainga, ary ny taranak''Isiraely amin''ny fitaka; Ary Joda mbola mikarenjy tsy manatona an''Andriamanitra, dia ny Iray Masina sy Mahatoky. '
  '10':
  - type: text
    content: 'Nefa Izaho no Jehovah Andriamanitrao hatrany amin''ny tany Egypta; Ary mbola hampiditra anao an-day indray Aho tahaka ny tamin''ny fotoam-pivavahana. '
  '11':
  - type: text
    content: 'Efa niteny tamin''ny mpaminany koa Aho, sady Izaho no nahabetsaka ny fahitana, ary ny mpaminany dia nampilazaiko ohatra. '
  '12':
  - type: text
    content: 'Raha tena heloka Gileada, dia ho tonga zava-poana tokoa izy; Tany Gilgala no namonoany omby betsaka ho fanatitra, koa ny alitarany dia ho toy ny korontam-bato eny am-bavasa any an-tsaha. '
  '13':
  - type: text
    content: 'Jakoba nandositra ho any amin''ny tany Syria, Isiraely nanompo hahazoany vady, eny, ny hahazoany vady no niandrasany ondry aman''osy. '
  '14':
  - type: text
    content: Mpaminany no nentin'i Jehovah nitondra ny Isiraely nivoaka avy tany Egypta, ary mpaminany koa no nentina niahy azy Nanao izay nahatezitra indrindra Efraima, ka dia havelan'ny Tompony ho eo aminy ny ràny, ary hatsingeriny aminy ny vava ratsy nataony.
  '2':
  - type: text
    content: 'Efraima homan-drivotra sady manenjika ny rivotra avy any atsinanana, mandritra ny andro dia ataony betsaka ny lainga sy ny fandozana; Manao fanekena amin''ny Asyriana izy, ary diloilo no entina ho any Egypta. '
  '3':
  - type: text
    content: 'Manana ady amin''i Joda koa Jehovah ary tsy maintsy mamaly an''i Jakoba araka ny alehany, ka hatsingeriny aminy ny nataony. '
  '4':
  - type: text
    content: 'Fony mbola tany am-bohoka dia nihazona ny ombelahin-tongotry ny rahalahiny izy, ary rehefa lehibe izy, dia nitolona tamin''Andriamanitra; '
  '5':
  - type: text
    content: 'Eny, nitolona tamin''Ilay Anjely izy ka nahery; Nitomany izy sady nifona taminy; Nahita azy tao Betela Izy, ary tao no niresahany tamintsika; '
  '6':
  - type: text
    content: 'Jehovah, Andriamanitry ny maro, Jehovah no hahatsiarovana Azy. '
  '7':
  - type: text
    content: 'Koa miverena amin''Andriamanitrao ianao; Tandremo ny famindram-po sy ny rariny. Ary miandrasa an''Andriamanitrao mandrakariva. '
  '8':
  - type: text
    content: Kanana
  - type: note
    content: 'Na: Mpandranto izy'
  - type: text
    content: ' eny an-tànany misy mizana miangatra, ny manambaka no tiany. '
  '9':
  - type: text
    content: 'Fa hoy Efraima: Fiharian-karena ihany no efa nataoko, nahazo fananana aho; Ny asako rehetra tsy misy hahatonga fahotana na heloka amiko. '
