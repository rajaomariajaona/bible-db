document_id: HOS.12,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fananarana ny Isiraely noho ny helony
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Efraima manodidina Ahy amin''ny lainga, ary ny taranak''Isiraely amin''ny fitaka; Ary Joda mbola mikarenjy tsy manatona an''Andriamanitra, dia ny Iray Masina sy Mahatoky. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Nefa Izaho no Jehovah Andriamanitrao hatrany amin''ny tany Egypta; Ary mbola hampiditra anao an-day indray Aho tahaka ny tamin''ny fotoam-pivavahana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Efa niteny tamin''ny mpaminany koa Aho, sady Izaho no nahabetsaka ny fahitana, ary ny mpaminany dia nampilazaiko ohatra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Raha tena heloka Gileada, dia ho tonga zava-poana tokoa izy; Tany Gilgala no namonoany omby betsaka ho fanatitra, koa ny alitarany dia ho toy ny korontam-bato eny am-bavasa any an-tsaha. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Jakoba nandositra ho any amin''ny tany Syria, Isiraely nanompo hahazoany vady, eny, ny hahazoany vady no niandrasany ondry aman''osy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Mpaminany no nentin'i Jehovah nitondra ny Isiraely nivoaka avy tany Egypta, ary mpaminany koa no nentina niahy azy Nanao izay nahatezitra indrindra Efraima, ka dia havelan'ny Tompony ho eo aminy ny ràny, ary hatsingeriny aminy ny vava ratsy nataony.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Efraima homan-drivotra sady manenjika ny rivotra avy any atsinanana, mandritra ny andro dia ataony betsaka ny lainga sy ny fandozana; Manao fanekena amin''ny Asyriana izy, ary diloilo no entina ho any Egypta. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Manana ady amin''i Joda koa Jehovah ary tsy maintsy mamaly an''i Jakoba araka ny alehany, ka hatsingeriny aminy ny nataony. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fony mbola tany am-bohoka dia nihazona ny ombelahin-tongotry ny rahalahiny izy, ary rehefa lehibe izy, dia nitolona tamin''Andriamanitra; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Eny, nitolona tamin''Ilay Anjely izy ka nahery; Nitomany izy sady nifona taminy; Nahita azy tao Betela Izy, ary tao no niresahany tamintsika; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Jehovah, Andriamanitry ny maro, Jehovah no hahatsiarovana Azy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Koa miverena amin''Andriamanitrao ianao; Tandremo ny famindram-po sy ny rariny. Ary miandrasa an''Andriamanitrao mandrakariva. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Kanana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Mpandranto izy'
      marker-yv: yv-n
    - type: text
      text: ' eny an-tànany misy mizana miangatra, ny manambaka no tiany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa hoy Efraima: Fiharian-karena ihany no efa nataoko, nahazo fananana aho; Ny asako rehetra tsy misy hahatonga fahotana na heloka amiko. '
