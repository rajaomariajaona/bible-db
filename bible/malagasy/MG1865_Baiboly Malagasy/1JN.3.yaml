document_id: 1JN.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahazotoan'ny zanak'Andriamanitra hanao ny sitrapon'ny Ramy sy hifankatia amin'ny namany, ary ny fahatokiana ananany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Endrey! manao ahoana ny fitiavana nasehon
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. nomen'
    marker-yv: yv-n
  - type: text
    text: '''ny Ray ho antsika, dia ny niantsoana antsika hoe zanak''Andriamanitra, sady izany tokoa isika! Koa noho izany dia tsy mahalala antsika izao tontolo izao, satria tsy nahalala Ary izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry malala, ankehitriny aza dia zanak''Andriamanitra isika, nefa tsy mbola naseho izay ho toetsika rahatrizay. Fantatsika fa raha hiseho Izy, dia ho tahaka Azy isika, fa ho hitantsika Izy, dia izay tena endriny tokoa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary izay rehetra manana izany fanantenana miorina aminy izany dia manadio ny tenany mba hadio tahaka Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izay rehetra manota no mandika ny lalàna; fa ny ota no fandikana ny lalàna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary fantatrareo fa Izy no naseho hanaisotra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hitondra'
    marker-yv: yv-n
  - type: text
    text: ' ny ota; ary tsy mba misy ota ao aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izay rehetra mitoetra ao aminy dia tsy manota; izay rehetra manota dia tsy nahita na nahalala Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Anaka, aza avela hisy hamitaka anareo: izay manao ny marina no marina; eny, marina tahaka Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izay manota dia avy amin''ny devoly, satria ny devoly manota hatramin''ny voalohany. Izao no nisehoan''ny Zanak''Andriamanitra, dia ny handrava ny asan''ny devoly. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izay rehetra naterak''Andriamanitra no tsy manota, satria ny voany mitoetra ao anatiny, ary tsy mahay manota izy, satria naretak''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izany no mampiseho miharihary izay Zanak''Andriamanitra sy izay zanaky ny devoly. Tsy mba avy amin''Andriamanitra izay rehetra tsy manao ny marina sy izay tsy tia ny rahalahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa izao no teny nampitondraina izay efa renareo hatramin''ny voalohany: tsy maintsy mifankatia isika,- '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'tsy mba tahaka an''i Kaina, izay avy tamin''ilay ratsy ka namono ny rahalahiny. Ary nahoana no namono azy izy? Satria ratsy ny asany, fa marina ny an''ny rahalahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Aza gaga, ry rahalahy, raha halan''izao tontolo izao ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fantatsika fa efa tafafindra niala tamin''ny fahafatesana ho amin''ny fiainana isika satria tia ny rahalahy. Izay tsy tia dia mitoetra ao amin''ny fahafatesana ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izay rehetra mankahala ny rahalahiny dia mpamono olona; ary fantatrareo fa tsy mba misy mpamono olona manana fiainana mandrakizay mitoetra ao anatiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izao no ahafantarantsika ny fitiavana, satria Izy no nanolotra ny ainy hamonjy antsika; ary isika kosa mba tokony hanolotra ny aintsika hamonjy ny rahalahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary izay rehetra manam-pananana amin''izao fiainana izao, ary mahita ny fahantran''ny rahalahiny ka mihirim-belona aminy, ahoana no itoeran''ny fitiavana an''Andriamanitra ao anatiny? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Anaka, aoka tsy ho tia amin''ny teny na amin''ny lela isika, fa amin''ny asa sy amin''ny marina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Izany no hahafantarantsika fa avy amin''ny marina isika sy hampahatokiantsika ny fontsika eo anatrehany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'na amin''inona na amin''inona no anamelohan''ny fontsika antsika, satria Andriamanitra lehibe noho ny fontsika ka mahalala ny zavatra rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ry malala, raha tsy mba manameloka antsika ny fontsika, dia manana fahasahiana eo anatrehan''Andriamanitra isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary na inona na inona no angatahintsika dia raisintsika aminy, satria mitandrina ny didiny sy manao izay ankasitrahana eo imasony isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary izao no didiny, dia ny hinoantsika ny anaran''i Jesosy Kristy Zanany sy ny hifankatiavantsika araka ny didy nomeny antsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary izay mitandrina ny didiny no mitoetra ao aminy, ary Izy kosa ao aminy. Ary izao no ahafantarantsika fa mitoetra ao amintsika Izy, dia ny Fanahy Izay nomeny antsika.
