document_id: PRO.31,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fankalazana ny vehivavy izay sady tsara no mazoto
  - type: text
    content: Ny tenin
  - type: note
    content: 'Na: Ny teny ho an'''
  - type: text
    content: '''i Lemoela mpanjaka, dia ny teny mavesa-danja izay'
  - type: note
    content: 'Na: Lemoela, mpanjakan''i Masa, dia ilay'
  - type: text
    content: ' nananaran-dreniny azy.'
  '10':
  - type: text
    content: Iza no mahita vehivavy tsara
  - type: note
    content: 'Na: mahay'
  - type: text
    content: '? Fa ny tombany dia mihoatra lavitra noho ny voahangy'
  - type: note
    content: 'Na: perla'
  - type: text
    content: '. '
  '11':
  - type: text
    content: Matoky azy ny fon'ny lahy, Ary tsy mitsahatra ny fanambinana azy.
  '12':
  - type: text
    content: Soa no ataon-dravehivavy aminy, fa tsy ratsy, Amin'ny andro rehetra iainany.
  '13':
  - type: text
    content: Mizaha volon'ondry sy rongony izy Ary mazoto miasa amin'ny tànany.
  '14':
  - type: text
    content: Toy ny sambon'ny mpandranto izy, Ka avy any amin'ny lavitra no itondrany ny haniny.
  '15':
  - type: text
    content: 'Mifoha izy, raha mbola alina, Ka manome hanina ho an''ny ankohonany Sy anjara ho an''ny ankizivaviny. '
  '16':
  - type: text
    content: Mihevitra saha izy ka mahazo azy; Ny vokatry ny tànany no anaovany tanim-boaloboka.
  '17':
  - type: text
    content: Misikina hery izy, Ary hatanjahiny ny sandriny.
  '18':
  - type: text
    content: Hitany fa tsara ny tombom-barony, Ary tsy maty jiro mandritra ny alina izy.
  '19':
  - type: text
    content: Mandray ny fihazonam-bohavoha izy, Ary ny tànany mihazona ny ampela.
  '2':
  - type: text
    content: 'Ahoana, anaka? Ary ahoana, ry zanako naterako? Ary ahoana, ry zanaky ny voadiko? '
  '20':
  - type: text
    content: 'Manatsotra ny tànany amin''ny ory izy, Eny, mamelatra ny tànany amin''ny mahantra. '
  '21':
  - type: text
    content: Tsy manahy ny oram-panala ho amin'ny ankohonany izy, Fa ny ankohonany rehetra samy voatafy volon'ondry mena avokoa.
  '22':
  - type: text
    content: Manao firakotra ho azy izy; Ny fitafiany dia rongony fotsy madinika sy lamba volomparasy.
  '23':
  - type: text
    content: Ny lahy dia hajaina eo am-bavahady, Raha miara-mipetraka eo amin'ny loholona.
  '24':
  - type: text
    content: Manao akanjo hariry madinika ravehivavy ka mivarotra izany, Ary fehin-kibo no amidiny amin'ny mpandranto
  - type: note
    content: Heb. Kananita
  - type: text
    content: '. '
  '25':
  - type: text
    content: Hery sy voninahitra no fitafiany, Ary ny andro ho avy dia ihomehezany.
  '26':
  - type: text
    content: Manokatra ny vavany amin'ny fahendrena izy; Ary ny lalàn'ny famindram-po no eo amin'ny lelany.
  '27':
  - type: text
    content: Mitandrina tsara ny ataon'ny ankohonany izy Ary tsy homana ny mofon'ny fahalainana.
  '28':
  - type: text
    content: 'Ny zanany mitsangana ka midera azy hoe sambatra; Ny lahy koa mitsangana ka midera azy hoe:'
  '29':
  - type: text
    content: Maro no zazavavy nanao soa
  - type: note
    content: 'Na: nahavory harena'
  - type: text
    content: ', Fa ianao manoatra noho izy rehetra.'
  '3':
  - type: text
    content: Aza omena ny vehivavy ny herinao, Na ny fombam-piainanao
  - type: note
    content: Heb. lalanao
  - type: text
    content: ' ho an''izay'
  - type: note
    content: 'Na: izay zavatra'
  - type: text
    content: ' manimba mpanjaka.'
  '30':
  - type: text
    content: Fitaka ny fahatsaram-bika, ary zava-poana ny fahatsaran-tarehy; Fa ny vehivavy matahotra an'i Jehovah ihany no hoderaina.
  '31':
  - type: text
    content: Omeo azy ny avy amin'ny vokatry ny tànany; Ary aoka ny asany hidera azy eo am-bavahady.
  '4':
  - type: text
    content: 'Tsy mety amin''ny mpanjaka, ry Lemoela, Eny; tsy mety amin''ny mpanjaka ny misotro divay, Na amin''ny mpanapaka ny ho fatra-paniry toaka; '
  '5':
  - type: text
    content: 'Fandrao, raha misotro izy, dia manadino ny lalàna Ka mamily ny fitsarana ny zanaky ny fahoriana. '
  '6':
  - type: text
    content: 'Omeo toaka izay efa ho faty, Eny, divay ho an''izay malahelo azon''ny fangidiam-panahy; '
  '7':
  - type: text
    content: Aoka hisotro izy mba hanadinoany ny alahelony, Ary tsy hahatsiarovany ny fahoriany intsony.
  '8':
  - type: text
    content: Sokafy ny vavanao hisolo ny moana, Hahazoan'ny kamboty ny rariny;
  '9':
  - type: text
    content: Sokafy ny vavanao, ka tsarao marina, Ary omeo rariny ny ory sy ny malahelo.
