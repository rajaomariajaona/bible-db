document_id: PRO.31
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fankalazana ny vehivavy izay sady tsara no mazoto
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny tenin
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ny teny ho an'''
    marker-yv: yv-n
  - type: text
    text: '''i Lemoela mpanjaka, dia ny teny mavesa-danja izay'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Lemoela, mpanjakan''i Masa, dia ilay'
    marker-yv: yv-n
  - type: text
    text: ' nananaran-dreniny azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ahoana, anaka? Ary ahoana, ry zanako naterako? Ary ahoana, ry zanaky ny voadiko? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aza omena ny vehivavy ny herinao, Na ny fombam-piainanao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lalanao
    marker-yv: yv-n
  - type: text
    text: ' ho an''izay'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: izay zavatra'
    marker-yv: yv-n
  - type: text
    text: ' manimba mpanjaka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tsy mety amin''ny mpanjaka, ry Lemoela, Eny; tsy mety amin''ny mpanjaka ny misotro divay, Na amin''ny mpanapaka ny ho fatra-paniry toaka; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fandrao, raha misotro izy, dia manadino ny lalàna Ka mamily ny fitsarana ny zanaky ny fahoriana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Omeo toaka izay efa ho faty, Eny, divay ho an''izay malahelo azon''ny fangidiam-panahy; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Aoka hisotro izy mba hanadinoany ny alahelony, Ary tsy hahatsiarovany ny fahoriany intsony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Sokafy ny vavanao hisolo ny moana, Hahazoan'ny kamboty ny rariny;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Sokafy ny vavanao, ka tsarao marina, Ary omeo rariny ny ory sy ny malahelo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Iza no mahita vehivavy tsara
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mahay'
    marker-yv: yv-n
  - type: text
    text: '? Fa ny tombany dia mihoatra lavitra noho ny voahangy'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: perla'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Matoky azy ny fon'ny lahy, Ary tsy mitsahatra ny fanambinana azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Soa no ataon-dravehivavy aminy, fa tsy ratsy, Amin'ny andro rehetra iainany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mizaha volon'ondry sy rongony izy Ary mazoto miasa amin'ny tànany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Toy ny sambon'ny mpandranto izy, Ka avy any amin'ny lavitra no itondrany ny haniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mifoha izy, raha mbola alina, Ka manome hanina ho an''ny ankohonany Sy anjara ho an''ny ankizivaviny. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mihevitra saha izy ka mahazo azy; Ny vokatry ny tànany no anaovany tanim-boaloboka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Misikina hery izy, Ary hatanjahiny ny sandriny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Hitany fa tsara ny tombom-barony, Ary tsy maty jiro mandritra ny alina izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mandray ny fihazonam-bohavoha izy, Ary ny tànany mihazona ny ampela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Manatsotra ny tànany amin''ny ory izy, Eny, mamelatra ny tànany amin''ny mahantra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy manahy ny oram-panala ho amin'ny ankohonany izy, Fa ny ankohonany rehetra samy voatafy volon'ondry mena avokoa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Manao firakotra ho azy izy; Ny fitafiany dia rongony fotsy madinika sy lamba volomparasy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny lahy dia hajaina eo am-bavahady, Raha miara-mipetraka eo amin'ny loholona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Manao akanjo hariry madinika ravehivavy ka mivarotra izany, Ary fehin-kibo no amidiny amin'ny mpandranto
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Kananita
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Hery sy voninahitra no fitafiany, Ary ny andro ho avy dia ihomehezany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Manokatra ny vavany amin'ny fahendrena izy; Ary ny lalàn'ny famindram-po no eo amin'ny lelany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Mitandrina tsara ny ataon'ny ankohonany izy Ary tsy homana ny mofon'ny fahalainana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ny zanany mitsangana ka midera azy hoe sambatra; Ny lahy koa mitsangana ka midera azy hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Maro no zazavavy nanao soa
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: nahavory harena'
    marker-yv: yv-n
  - type: text
    text: ', Fa ianao manoatra noho izy rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Fitaka ny fahatsaram-bika, ary zava-poana ny fahatsaran-tarehy; Fa ny vehivavy matahotra an'i Jehovah ihany no hoderaina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Omeo azy ny avy amin'ny vokatry ny tànany; Ary aoka ny asany hidera azy eo am-bavahady.
