document_id: ISA.2,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny voninahitra marina voatendry ho an'ny Isiraely, sy ny hanafoanana ny voninahiny tsy izy
  - type: text
    content: Ny teny izay hitan'Isaia, zanak'i Amoza, ny amin'ny Joda sy Jerosalema.
  '10':
  - type: text
    content: 'Midira ao amin''ny vatolampy, Ary miere ao amin''ny vovoka Noho ny tahotra avy amin''i Jehovah Sy ny voninahitry ny fahalehibiazany. '
  '11':
  - type: text
    content: Ny fiandranandran'ny mason'ny zanak'olombelona dia haetry, Ary ny fiavonavonan'ny olona hatao mitanondrika; Fa Jehovah ihany no hisandratra amin'izany andro izany.
  '12':
  - type: text
    content: 'Fa misy andron''i Jehovah, Tompon''ny maro, Hitsarana izay avo sy ambony toetra rehetra Ary izay misandratra rehetra, Ka dia haetry ireny, '
  '13':
  - type: text
    content: 'Dia ny sedera rehetra any Libanona, izay avo sady andrandraina, Sy ny hazo ôka rehetra any Basana '
  '14':
  - type: text
    content: 'Sy ny tendrombohitra avo rehetra Sy ny havoana andrandraina '
  '15':
  - type: text
    content: 'Sy ny tilikambo miringiringy rehetra Sy ny manda mafy rehetra '
  '16':
  - type: text
    content: 'Sy ny sambon''i Tarsisy rehetra Sy ny tao-zavatra tsara tarehy rehetra; '
  '17':
  - type: text
    content: 'Ary ny fireharehan''ny zanak''olombelona hatao mitanondrika, Ary ny fiavonavonan''ny olona haetry; Fa Jehovah ihany no hisandratra amin''izany andro izany. '
  '18':
  - type: text
    content: 'Ary ny andriamani-tsi-izy dia ho foana avokoa. '
  '19':
  - type: text
    content: 'Ary hiditra ao amin''ny zohy sy ny lava-bato ny olona Noho ny tahotra avy amin''i Jehovah sy ny voninahitry ny fahalehibiazany, Rehefa mitsangana hampihorohoro ny tany Izy. '
  '2':
  - type: text
    content: 'Ary izao no ho tonga any am-parany: Ny tendrombohitra misy ny tranon''i Jehovah dia haorina eo an-tampon''ny tendrombohitra Ary hasandratra ho avo noho ny havoana; Ary ny jentilisa rehetra hitanjozotra hankany. '
  '20':
  - type: text
    content: 'Amin''izany andro izany dia harian''ny olona Ho an''ny voalavo sy ny manavy Ny andriamani-bolafotsiny sy ny andriamani-bolamenany Izay nataony hiankohofany eo anatrehany '
  '21':
  - type: text
    content: 'Mba hidirany eo amin''ny fitriatry ny vatolampy sy eo an-tsefatsefaky ny harambato Noho ny tahotra avy amin''i Jehovah Sy ny voninahitry ny fahalehibiazany, Rehefa mitsangana hampihorohoro ny tany Izy. '
  '22':
  - type: text
    content: Mitsahara, fa aza mitoky amin'ny olona; Fa fofonaina foana no eo am-bavorony, Ka hatao zinona izy?
  '3':
  - type: text
    content: 'Eny, maro ny firenena no hiainga ka hanao hoe: Andeha isika hiakatra any an-tendrombohitr''i Jehovah, Ho any an-tranon''Andriamanitr''i Jakoba, Mba hampianarany antsika ny amin''ny lalany, Ka handehanantsika amin''ny atorony; Fa avy any Ziona no hivoahan''ny lalàna, Ary avy any Jerosalema ny tenin''i Jehovah. '
  '4':
  - type: text
    content: 'Ary hitsara ny adin''ny jentilisa Izy Ka hampiaiky firenena maro; Dia hanefy ny sabany ho fangady ireny, Ary ny lefony ho fanetezam-boaloboka; Ny firenena tsy hanainga sabatra hifamely Na hianatra ady intsony '
  '5':
  - type: text
    content: Ry taranak'i Jakoba, Avia, ary aoka isika handeha amin'ny fahazavan'i Jehovah.
  '6':
  - type: text
    content: Fa efa nanary ny taranak'i Jakoba olonao Hianao, Satria feno ny fanao avy any atsinanana izy Ary efa mpanandro tahaka ny Filistina Sady efa be
  - type: note
    content: Na sady efa nanao fanekena tamin'ny
  - type: text
    content: ' zana-bahiny. '
  '7':
  - type: text
    content: 'Ary ny taniny dia feno volafotsy sy volamena. Sady tsy hita lany ny hareny; Ary ny taniny dia feno soavaly, Sady tsy hita isa ny kalesiny; '
  '8':
  - type: text
    content: 'Ny taniny dia feno andriamani-tsi-izy koa; Eo anatrehan''ny asan''ny tanany no iankohofany, Dia izay nataon''ny rantsan-tanany; '
  '9':
  - type: text
    content: 'Koa ny zanak''olombelona hatao mitanondrika, Ary ny olona haetry, Ary aza mamela ny helony Hianao! '
