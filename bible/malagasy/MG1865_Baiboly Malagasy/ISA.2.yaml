document_id: ISA.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny voninahitra marina voatendry ho an'ny Isiraely, sy ny hanafoanana ny voninahiny tsy izy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny teny izay hitan'Isaia, zanak'i Amoza, ny amin'ny Joda sy Jerosalema.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary izao no ho tonga any am-parany: Ny tendrombohitra misy ny tranon''i Jehovah dia haorina eo an-tampon''ny tendrombohitra Ary hasandratra ho avo noho ny havoana; Ary ny jentilisa rehetra hitanjozotra hankany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Eny, maro ny firenena no hiainga ka hanao hoe: Andeha isika hiakatra any an-tendrombohitr''i Jehovah, Ho any an-tranon''Andriamanitr''i Jakoba, Mba hampianarany antsika ny amin''ny lalany, Ka handehanantsika amin''ny atorony; Fa avy any Ziona no hivoahan''ny lalàna, Ary avy any Jerosalema ny tenin''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hitsara ny adin''ny jentilisa Izy Ka hampiaiky firenena maro; Dia hanefy ny sabany ho fangady ireny, Ary ny lefony ho fanetezam-boaloboka; Ny firenena tsy hanainga sabatra hifamely Na hianatra ady intsony '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ry taranak'i Jakoba, Avia, ary aoka isika handeha amin'ny fahazavan'i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa efa nanary ny taranak'i Jakoba olonao Hianao, Satria feno ny fanao avy any atsinanana izy Ary efa mpanandro tahaka ny Filistina Sady efa be
  - type: usfm
    marker: x
    children:
    - type: text
      text: Na sady efa nanao fanekena tamin'ny
    marker-yv: yv-n
  - type: text
    text: ' zana-bahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny taniny dia feno volafotsy sy volamena. Sady tsy hita lany ny hareny; Ary ny taniny dia feno soavaly, Sady tsy hita isa ny kalesiny; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny taniny dia feno andriamani-tsi-izy koa; Eo anatrehan''ny asan''ny tanany no iankohofany, Dia izay nataon''ny rantsan-tanany; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa ny zanak''olombelona hatao mitanondrika, Ary ny olona haetry, Ary aza mamela ny helony Hianao! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Midira ao amin''ny vatolampy, Ary miere ao amin''ny vovoka Noho ny tahotra avy amin''i Jehovah Sy ny voninahitry ny fahalehibiazany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny fiandranandran'ny mason'ny zanak'olombelona dia haetry, Ary ny fiavonavonan'ny olona hatao mitanondrika; Fa Jehovah ihany no hisandratra amin'izany andro izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa misy andron''i Jehovah, Tompon''ny maro, Hitsarana izay avo sy ambony toetra rehetra Ary izay misandratra rehetra, Ka dia haetry ireny, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia ny sedera rehetra any Libanona, izay avo sady andrandraina, Sy ny hazo ôka rehetra any Basana '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Sy ny tendrombohitra avo rehetra Sy ny havoana andrandraina '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Sy ny tilikambo miringiringy rehetra Sy ny manda mafy rehetra '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Sy ny sambon''i Tarsisy rehetra Sy ny tao-zavatra tsara tarehy rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny fireharehan''ny zanak''olombelona hatao mitanondrika, Ary ny fiavonavonan''ny olona haetry; Fa Jehovah ihany no hisandratra amin''izany andro izany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny andriamani-tsi-izy dia ho foana avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hiditra ao amin''ny zohy sy ny lava-bato ny olona Noho ny tahotra avy amin''i Jehovah sy ny voninahitry ny fahalehibiazany, Rehefa mitsangana hampihorohoro ny tany Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Amin''izany andro izany dia harian''ny olona Ho an''ny voalavo sy ny manavy Ny andriamani-bolafotsiny sy ny andriamani-bolamenany Izay nataony hiankohofany eo anatrehany '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mba hidirany eo amin''ny fitriatry ny vatolampy sy eo an-tsefatsefaky ny harambato Noho ny tahotra avy amin''i Jehovah Sy ny voninahitry ny fahalehibiazany, Rehefa mitsangana hampihorohoro ny tany Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Mitsahara, fa aza mitoky amin'ny olona; Fa fofonaina foana no eo am-bavorony, Ka hatao zinona izy?
