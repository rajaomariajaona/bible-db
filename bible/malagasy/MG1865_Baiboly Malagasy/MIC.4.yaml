document_id: MIC.4,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hampodian'i Jehovah ny voninahitr'i Ziona, rehefa avy nampahorina izy
  - type: text
    content: 'Ary izao no ho tonga any am-parany: Ny tendrombohitra misy ny tranon''i Jehovah dia haorina eo an-tampon''ny tendrombohitra Ary hasandratra ho avo noho ny havoana; Ary ny firenena hitanjozotra hankany. '
  '10':
  - type: text
    content: 'Ry Ziona zanakavavy, mararia, ka manezaha, Toy ny vehivavy raha miteraka! Fa ankehitriny dia hivoaka avy any an-tanàna ianao Ka hipetraka any an-tsaha, Ary dia ho tonga hatrany Babylona aza; Any no hamonjena anao, Eny, any no hanavotan''i Jehovah anao ho afaka amin''ny tanan''ny fahavalonao. '
  '11':
  - type: text
    content: 'Ary ankehitriny dia tafangona hamely anao ny firenena maro, Izay manao hoe: Aoka halam-baraka'
  - type: note
    content: Heb. holotoina
  - type: text
    content: ' Ziona, Ary aoka ny masontsika ho faly mijery azy. '
  '12':
  - type: text
    content: 'Kanjo tsy fantatr''ireny ny hevitr''i Jehovah, Na azony ny fisainany; Fa efa nanangona azy toy ny amboara ho ao am-pamoloana Izy. '
  '13':
  - type: text
    content: Mitsangàna, ka miveleza, ry Ziona zanakavavy, Fa ny tandrokao hataoko vy, Ary ny kitronao hataoko varahina, Ka hanorotoro firenena maro ianao; Dia hatolotrao
  - type: note
    content: Heb. hataoko herema
  - type: text
    content: ' ho an''i Jehovah ny hareny, Ary ho an''ny Tompon''ny tany rehetra ny fananany. Koa mivory ho andiany ianao, ry zanakavavin''ny andiany! Manao fahirano antsika izy, Mamely tsorakazo ny takolaky ny mpitsaran''ny Isiraely izy.'
  '2':
  - type: text
    content: 'Eny, maro ny jentilisa no hiainga ka hanao hoe: Andeha Isika hiakatra any an-tendrombohitr''i Jehovah, Ho any an-tranon''Andriamanitr''i Jakoba, Mba hampianarany antsika ny amin''ny lalany, Ka handehanantsika amin''ny atorony; Fa avy any Ziona no hivoahan''ny lalàna, Ary avy any Jerosalema ny tenin''i Jehovah. '
  '3':
  - type: text
    content: 'Ary hitsara ny adin''ny firenena maro Izy Ka hampiaiky ny firenena mahery hatrany amin''ny lavitra; Dia hanefy ny sabany ho fangady ireny Ary ny lefony ho fanetezam-boaloboka; Ny firenena tsy hanainga sabatra hifamely; Na hianatra ady intsony. '
  '4':
  - type: text
    content: 'Fa samy hipetraka eny ambanin''ny voalobony sy ny aviaviny izy, Ary tsy hisy hanaitaitra azy; Fa ny vavan''i Jehovah, Tompon''ny maro, no efa niteny. '
  '5':
  - type: text
    content: 'Fa ny firenena rehetra samy mandeha amin''ny anaran''ny andriamaniny avy; Fa isika kosa handeha amin''ny anaran''i Jehovah Andriamanitsika mandrakizay doria. '
  '6':
  - type: text
    content: 'Amin''izany andro izany, hoy Jehovah, No hanangonako ny mandringa Sy hamoriako izay noroahina Mbamin''izay nampahoriko; '
  '7':
  - type: text
    content: 'Ary ny mandringa no hapetrako ho sisa, Ary izay noroahina lavitra ho firenena mahery; Ary Jehovah hanjaka aminy ao an-tendrombohitra Ziona Hatramin''izany ka ho mandrakizay. '
  '8':
  - type: text
    content: Ary ianao, ry tilikambon'ny andiany
  - type: note
    content: 'Na: tilikambon''i Edera'
  - type: text
    content: . Tendrombohitr'i Ziona
  - type: note
    content: 'Na: Ofelan''i Ziona'
  - type: text
    content: ' zanakavavy, Aminao no ho tonga izany, eny, ho tonga ny fanapahana voalohany, Dia ny fanjakan'
  - type: note
    content: 'Na: hanjakana aminy'
  - type: text
    content: ''' i Jerosalema zanakavavy. '
  '9':
  - type: text
    content: 'Koa nahoana no mitaraina mafy ianao? Moa tsy misy mpanjaka va ao aminao, Sa lany ringana avokoa ny mpanolotsainao, No dia azon''ny fanaintainana ianao, toy ny vehivavy raha miteraka? '
