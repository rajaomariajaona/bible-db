document_id: MIC.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hampodian'i Jehovah ny voninahitr'i Ziona, rehefa avy nampahorina izy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary izao no ho tonga any am-parany: Ny tendrombohitra misy ny tranon''i Jehovah dia haorina eo an-tampon''ny tendrombohitra Ary hasandratra ho avo noho ny havoana; Ary ny firenena hitanjozotra hankany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Eny, maro ny jentilisa no hiainga ka hanao hoe: Andeha Isika hiakatra any an-tendrombohitr''i Jehovah, Ho any an-tranon''Andriamanitr''i Jakoba, Mba hampianarany antsika ny amin''ny lalany, Ka handehanantsika amin''ny atorony; Fa avy any Ziona no hivoahan''ny lalàna, Ary avy any Jerosalema ny tenin''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hitsara ny adin''ny firenena maro Izy Ka hampiaiky ny firenena mahery hatrany amin''ny lavitra; Dia hanefy ny sabany ho fangady ireny Ary ny lefony ho fanetezam-boaloboka; Ny firenena tsy hanainga sabatra hifamely; Na hianatra ady intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa samy hipetraka eny ambanin''ny voalobony sy ny aviaviny izy, Ary tsy hisy hanaitaitra azy; Fa ny vavan''i Jehovah, Tompon''ny maro, no efa niteny. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa ny firenena rehetra samy mandeha amin''ny anaran''ny andriamaniny avy; Fa isika kosa handeha amin''ny anaran''i Jehovah Andriamanitsika mandrakizay doria. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Amin''izany andro izany, hoy Jehovah, No hanangonako ny mandringa Sy hamoriako izay noroahina Mbamin''izay nampahoriko; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny mandringa no hapetrako ho sisa, Ary izay noroahina lavitra ho firenena mahery; Ary Jehovah hanjaka aminy ao an-tendrombohitra Ziona Hatramin''izany ka ho mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary ianao, ry tilikambon'ny andiany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tilikambon''i Edera'
    marker-yv: yv-n
  - type: text
    text: . Tendrombohitr'i Ziona
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ofelan''i Ziona'
    marker-yv: yv-n
  - type: text
    text: ' zanakavavy, Aminao no ho tonga izany, eny, ho tonga ny fanapahana voalohany, Dia ny fanjakan'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hanjakana aminy'
    marker-yv: yv-n
  - type: text
    text: ''' i Jerosalema zanakavavy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa nahoana no mitaraina mafy ianao? Moa tsy misy mpanjaka va ao aminao, Sa lany ringana avokoa ny mpanolotsainao, No dia azon''ny fanaintainana ianao, toy ny vehivavy raha miteraka? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ry Ziona zanakavavy, mararia, ka manezaha, Toy ny vehivavy raha miteraka! Fa ankehitriny dia hivoaka avy any an-tanàna ianao Ka hipetraka any an-tsaha, Ary dia ho tonga hatrany Babylona aza; Any no hamonjena anao, Eny, any no hanavotan''i Jehovah anao ho afaka amin''ny tanan''ny fahavalonao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ankehitriny dia tafangona hamely anao ny firenena maro, Izay manao hoe: Aoka halam-baraka'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. holotoina
    marker-yv: yv-n
  - type: text
    text: ' Ziona, Ary aoka ny masontsika ho faly mijery azy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Kanjo tsy fantatr''ireny ny hevitr''i Jehovah, Na azony ny fisainany; Fa efa nanangona azy toy ny amboara ho ao am-pamoloana Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mitsangàna, ka miveleza, ry Ziona zanakavavy, Fa ny tandrokao hataoko vy, Ary ny kitronao hataoko varahina, Ka hanorotoro firenena maro ianao; Dia hatolotrao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hataoko herema
    marker-yv: yv-n
  - type: text
    text: ' ho an''i Jehovah ny hareny, Ary ho an''ny Tompon''ny tany rehetra ny fananany. Koa mivory ho andiany ianao, ry zanakavavin''ny andiany! Manao fahirano antsika izy, Mamely tsorakazo ny takolaky ny mpitsaran''ny Isiraely izy.'
