document_id: ISA.33,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hampijaliana an'i Asyria, sy ny soa ho hitan'i Ziona kosa
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lozanao, ry ilay mandroba, nefa tsy norobaina ianao! Ary mamitaka, nefa tsy nofitahina ianao! Rehefa mitsahatra ny mandrava ianao, dia vao horavana kosa; Ary rehefa mitsahatra ny mamitaka ianao, dia vao hofitahina kosa. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ankehitriny dia hitsangana Aho, hoy Jehovah; Ankehitriny dia ho any amin''ny avo Aho; Ankehitriny dia hisandratra Aho. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Torontoronina bozaka ianareo ka miteraka vodivary; Ny fofonainareo dia tahaka ny afo handevona anareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny firenena ho tahaka ny fandoroan-tsokay, eny, ho tahaka ny tsilo notombohina izay mirehitra amin''ny afo izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mihainoa ny amin''izay efa nataoko, ianareo izay lavitra, ary aoka hahafantatra ny heriko ianareo izay akaiky. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raiki-tahotra ny mpanota ao Ziona; Horohoro no nahazo ny mpihatsaravela-tsihy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ratsy fanahy'
      marker-yv: yv-n
    - type: text
      text: '. Iza amintsika no hahatoetra amin''ny afo mandevona? Iza amintsika moa no hahatoetra amin''ny lelafo mandrakizay? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay mandeha amin''ny fahamarinana sady miteny zava-mahitsy, izay tsy mety mandray harena amin''ny fanaovana an-keriny fa manifikifika ny tanany mba tsy handray kolikoly, izay manentsin-tadiny mba tsy handrenesany ny amin''ny fandatsahan-drà sady manakimpy ny masony mba tsy hahita ny ratsy; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy no honina ao amin''ny avo; Ny fitoerana avony dia ny fiarovana any amin''ny harambato; Izay hohaniny dia homena azy, ary ny rano hosotroiny tsy ho diso. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny masonao hahita ny mpanjaka amin''ny hatsaran-tarehiny sady hahatsinjo tany malalaka dia malalaka. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hotsaroan''ny fonao ilay nahatahotra: Aiza ny mpanoratra ? Aiza ny mpandanja? Aiza ny mpanisa ny tilikambo? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny firenena misetaseta dia tsy ho hitanao intsony, dia ilay olona miboediboedi-piteny ka tsy fantatra, na ny lela mikodedidedy ka tsy azo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehovah ô, mamindrà fo aminay; Hianao no antenainay
    - type: usfm
      marker: x
      children:
      - type: text
        text: heb. sandriny
      marker-yv: yv-n
    - type: text
      text: ; Aoka ho sandrinay isa-maraina ianao sy ho famonjena anay amin'ny andro fahoriana.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsiniovy Ziona, dia ilay tanàna fihaonantsika tamin''ny fotoam-pivavahana; Ny masonao hahita an''i Jerosalema ho fonenana mandry fahizay, dia lay izay tsy hafindra, ny tsimatra aminy tsy hongotana mandrakizay, ary tsy hisy hotapahina ny kofehiny. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Jehovah dia mahery ho antsika any, tany be ony sy lahin-drano lehibe any, nefa sy halehan''ny sambo voizina, na hovakin''ny sambo lehibe. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Jehovah no Mpitsara antsika; Jehovah no mpanome lalàna antsika; Jehovah no mpanjakantsika; Izy no hamonjy antsika. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mivaha ny mahazakan-tsambonao; Tsy mahahazona mafy ny fiorenan''andry izy, na mahavelatra ny lay; Fa amin''izay kosa dia hozaraina ny zavatra be voababo; Na dia ny mandringa aza dia mba hahazo babo ihany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy hisy amin''ny mponina ao hilaza hoe: Marary aho; Ny olona izay mitoetra ao dia voavela heloka.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny feon''ny fitabatabana no mampandositra ny firenena; Raha misandratra Hianao, dia mipariaka ny jentilisa. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ireny handevona ny babonareo tahaka ny fandevon'ny valala, tahaka ny fifanaretsaky ny kalalao no fifanaretsany eo aminy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manerinarina Jehovah, fa mitoetra any amin''ny avo Izy; Nofenoiny rariny sy fahamarinana Ziona. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hisy andro tsy manam-piovana ho anao, eny, haren'ny famonjena sy ny fahendrena ary ny fahalalana; Ny fahatahorana an'i Jehovah no rakitrao
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. rakiny
      marker-yv: yv-n
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indreo, ny lehilahy maheriny mitaraina eny ivelany; Ny iraka nitady fihavanana dia mitomany mafy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maty ny lalambe; Tsy misy ny mpandeha; Nofoanany ny fanekena; Nalany baraka ny tanàna; Tsy nanaja olona izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Misaona ny tany ka milofika; Menatra Libanona ka malazo; Efa tonga tahaka ny tani-hay Sarôna, Ary manintsana Basana sy Karmela. '
