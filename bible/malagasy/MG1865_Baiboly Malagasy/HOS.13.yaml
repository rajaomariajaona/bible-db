document_id: HOS.13
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny loza nanjo ny Isiraely noho ny fahotany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Raha niteny Efraima, dia nampangorohoro, ka nisandratra tao amin''ny Isiraely izy. Dia nanota ny amin''i Bala izy ka maty; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ankehitriny dia mandroso manota izy, fa ny volafotsiny no anaovany sarin-javatra an-idina ho azy, dia sampy araka ny fahaizany, izay asan''ny mpiasa avokoa; Ireny dia lazainy hoe: Aoka hanoroka ny ombilahy kely izay olona mamono zavatra hatao fanatitra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa ho toy ny rahona maraina izy sy ho toy ny ando izay levona, raha mbola maraina ny andro, sy ho toy ny akofa izay paohin''ny rivotra hiala amin''ny fa noloana, ary ho toy ny setroka avy amin''ny varavarana makarakara. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa Izaho no Jehovah Andriamanitrao hatrany amin''ny tany Egypta, ary tsy mahalala Andriamanitra afa-tsy Izaho ianao, sady tsy misy mpamonjy afa-tsy Izaho. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Izaho dia nahalala anao tany an-efitra, dia tany amin''ny tany mampangetaheta. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Araka ny ahitra teny aminy no nahavoky azy; Eny, voky izy, ka niavonavona ny fony; Koa izany no nanadinoany Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ka dia tonga toy ny liona aminy Aho, toy ny leoparda amoron-dalana no famitsako. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mamely azy toy ny famelin''ny bera very anaka Aho, ka mandriatra ny sarom-pony, eny, any no andrapahako azy toy ny fandrapaky sy liom-bavy; Ny bibi-dia no hamiravira azy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izao no maharingana anao, ry Isiraely ô; Manohitra Ahy Izay famonjena anao ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Aiza ary izay mpanjakanao, Mba hamonjy anao ao an-tanànanao rehetra? Ary aiza ireo andriambaventinao, izay nantsoinao hoe: Omeo mpanjaka sy mpanapaka aho? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nomeko mpanjaka ianao tamin'ny fahatezerako, ary nesoriko izy tamin'ny fahavinirako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Voafehy ny helok''i Efraima, voatahiry ny fahotany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fanaintainana tahaka ny vehivavy raha miteraka no mahazo azy; Zazalahy tsy hendry izy, fa raha tonga ny fotoana, dia tsy mba mandroso ho eo amin''ny fiterahan-jaza izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Havotako tsy ho azon'ny herin'ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: ' izy; Hovonjeko ho afaka amin''ny fahafatesana Izy; Ry fahafatesana ô, aiza ny aretina fandripahanao? Ry fiainan-tsi-hita ô, aiza ny fandringananao? Afenina tsy ho hitan''ny masoko ny nenina. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa Efraima dia hahavokatra eo amin'ny rahalahy; Nefa ho avy ny rivotra avy any atsinanana, dia ny rivotr'i Jehovah miakatra avy any an-efitra, ka dia ho ritra ny loharanony, ary ho tankina ny fantsakany; Hobaboina ny rakitra, dia ny fanaka tsara rehetra.
