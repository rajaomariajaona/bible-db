document_id: 2SA.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanjakan'i Davida tamin'ny Joda, sy ny nanjakan'Isboseta tamin'ny Isiraely, ary ny niadian'izy roa tonta tao Gibeona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary rehefa afaka izany, Davida dia nanontany tamin''i Jehovah hoe: Hiakatra ho any amin''ny tanànan''ny Joda anankiray va aho? Dia hoy Jehovah taminy: Miakara. Ary hoy Davida: Any aninona no hiakarako? Dia hoy Izy: Any Hebrona. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia niakatra nankany Davida mbamin''ny vadiny roa, dia Ahinoama Jezirelita sy Abigaila, ilay novinadin''i Nabala Karmelita. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ny olona izay tao amin''i Davida mbamin''ny ankohonan''ireo dia samy nentiny niakatra koa, ka nonina tao amin''ny tanàna momba an''i Hebrona izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary dia avy ny lehilahy amin''ny Joda ka nanosotra an''i Davida tao mba ho mpanjaka amin''ny taranak''i Joda. Ary nisy nanambara tamin''i Davida hoe: Ny olona any Jabesi-gileada no nandevina an''i Saoly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Davida dia naniraka olona hankany amin''ny mponina any Jabesi-gileada hanao aminy hoe: Hotahin''i Jehovah anie ianareo noho ny soa nataonareo tamin''i Saoly tomponareo tamin''ny nandevenanareo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Koa haneho famindram-po sy fahamarinana aminareo anie Jehovah, sady izaho koa efa manao izao soa izao aminareo noho ny nanaovanareo izany zavatra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary ankehitriny, aoka hampaherezina anie ny tananareo, ary aoka hatanjaka ianareo; fa maty Saoly tomponareo, ary izaho no nohosoran'ny firenen'i Joda ho mpanjakany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa Abnera, zanak''i Nera, komandin''ny miaramilan''i Saoly, efa naka an''Isboseta, zanakalahin''i Saoly, ka nitondra azy nankany Mahanaima, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: dia nampanjaka azy tamin'i Gileada sy ny Asorita
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (Gesorita)'
    marker-yv: yv-n
  - type: text
    text: ' sy Jezirela sy ny Efraima sy ny Benjamina ary ny Isiraely rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '(Ary efa-polo taona no nahaveloman''Isboseta, zanak''i Saoly, fony izy vao nanjaka amin''ny Isiraely, ary roa taona no nanjakany.) Fa ny firenen''i Joda nomba an''i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny andro nanjakan''i Davida tao Hebrona tamin''ny taranak''i Joda dia fito taona sy enim-bolana. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Abnera, zanak''i Nera, sy ny mpanompon''Isboseta, zanak''i Saoly, niala tao Mahanaima ka nankany Gibeona. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary Joaba, zanak''i Zeroia, sy ny mpanompon''i Davida nivoaka ka nihaona tamin''ireo teo amoron''ny kamory tao Gibeona; ary samy nipetraka teo amin''ny lafin''ny kamory avy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy Abnera tamin''i Joaba: Masìna ianao, aoka hitsangana ny zatovo hanao kilalao eto anatrehantsika. Ary hoy Joaba; Aoka ary izy hitsangana. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nisy nitsangana ka nita, dia roa ambin''ny folo lahy tamin''ny Benjamina, izay an''Isboseta, zanak''i Saoly, ary roa ambin''ny folo lahy koa tamin''ny mpanompon''i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary izy rehetra samy nifanavika nifampihazon-doha ka nifandefon-tehezana tamin'ny sabatra, dia niara-nikarapoka; koa izany no nanaovana izany fitoerana ao Gibeona izany hoe Helkata-hazorima
  - type: usfm
    marker: x
    children:
    - type: text
      text: Helkata-hazorima = Tamin'ny sabatra maranitra
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary mafy ny ady tamin''izany andro izany; ary dia resy teo anoloan''ny mpanompon''i Davida Abnera sy ny lehilahy amin''ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary mba teo koa izy telo lahy zanak'i Zeroia, dia Joaba sy Abisay ary Asahela; ary Asahela dia haingan-tongotra tahaka ny gazela
  - type: usfm
    marker: x
    children:
    - type: text
      text: Izahao i. and. 19
    marker-yv: yv-n
  - type: text
    text: ' any an-efitra. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary Asahela nanenjika an''i Abnera, ka ny fandehany nanenjika an''i Abnera dia tsy nivily akory na tamin''ny ankavanana na tamin''ny ankavia. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Abnera niherika ka nanao hoe: Hianao moa izany, no Asahela? Dia hoy izy: Izaho ity. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy Abnera taminy: Mivilia ianao, na ho amin''ny ankavanana, na ho amin''ny ankavia, ary zatovo anankiray no sambory, ka baboy ho anao izay eny aminy rehetra. Fa Asahela tsy nety nivily, fa nanenjika azy ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy indray Abnera tamin''i Asahela: Mivilia ianao, fa aza manenjika ahy; fa hataoko inona moa izay hamely anao hikarapoka amin''ny tany, ary hataoko ahoana no fijery an''i Joaba rahalahinao? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nefa tsy nety nivily ihany izy, ka dia nasian''i Abnera ny antsedefona ny kibony, ka dia niboroaka teo an-damosiny ny lefona, ary nikarapoka teo izy ka maty niaraka tamin''izay. Ary izay rehetra tonga teo amin''ilay nikarapohan''i Asahela sy nahafatesany dia nijanona. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary Joaba sy Abisay dia nanenjika an'i Abnera; ka nony tonga teo amin'ny havoana Ama izy, izay tandrifin'i Gia amin'ny lalana mankany amin'ny efitr'i Gibeona, dia maty ny masoandro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ny taranak''i Benjamina niangona teo amin''i Abnera ka nifoko ho iray toko ary nijanona teo an-tampon''ny havoana anankiray. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary Abnera niantso an''i Joaba hoe: Handany mandrakizay va ny sabatra? Tsy fantatrao va fa hangidy ny hiafaran''izany? Koa mandra-pahoviana no tsy hampivereninao ny olona tsy hanenjika ny rahalahiny? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary hoy Joaba: Raha velona koa Andriamanitra, raha tsy ilay teninao'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Izaho and. 14
    marker-yv: yv-n
  - type: text
    text: ', dia efa lasa nody any naraina avokoa ny olona ka tsy nanenjika ny rahalahiny akory. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia nitsoka ny anjomara Joaba, ka dia nijanona ny olona rehetra, ary tsy nanenjika ny Isiraely intsony na niady taminy intsony izy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary Abnera sy ny olony nandeha mandritra ny alina namaky ny tani-hay
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Arabà
    marker-yv: yv-n
  - type: text
    text: ', dia nita an''i Jordana sy namaky an''i Bitrona rehetra, ka dia tonga tao Mahanaima izy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary rehefa niverina Joaba avy nanenjika an''i Abnera, dia novoriny ny olona rehetra, ary sivy ambin''ny folo lahy ihany mbamin''i Asahela no tsy teo ny mpanompon''i Davida. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa ny mpanompon''i Davida efa nahafaty enim-polo sy telon-jato lahy tamin''ny Benjamita sy ny olon''i Abnera. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary Asahela dia nentiny ka naleviny tao amin'ny fasan-drainy, izay tao Betlehema. Ary Joaba sy ny olony nandeha mandritra ny alina, dia tonga tao Hebrona raha vao nazava ratsy ny andro.
