document_id: ISA.54
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hanitarana ny Fiangonana, sy ny voninahitra ho azony
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mihobia, ry momba, ianao izay tsy niteraka, eny, velomy ny hoby, ka manandrata feo, ianao izay tsy mba nihetsi-jaza; fa ny zanaky ny mpitondra tena dia maro noho ny zanaky ny manambady, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Halalaho ny itoeran''ny lainao, ary aoka hohenjanina ny ambain-dainao, ka aza avela hisy hiketrona; halavao ny kofehinao, ary aoreno mafy ny tsima-dainao; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa hitatra any amin''ny ankavanana sy any amin''ny ankavia ianao, ary ny taranakao hahazo ny jentilisa, ka dia hasiany mponina ny tanàna lao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aza matahotra, fa tsy ho menatra ianao; ary aza mangaihay, fa tsy havela ho afa-baraka ianao; fa ho hadinonao ny henatry ny fahatanoranao, ary tsy ho tsaroanao intsony ny tondromasonao fony mpitondratena. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa ny Mpanao anao no Vadinao, Jehovah, Tompon''ny maro, no anarany; Ary ny Iray Masin''ny Isiraely no Mpanavotra anao, Andriamanitry ny tany rehetra no anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa Jehovah efa nampody
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb.niantso
    marker-yv: yv-n
  - type: text
    text: ' anao, izay tahaka ny vady efa nafoy ka ory am-panahy, ary tahaka ny vady efa novadina hatry ny fony mbola tanora, fa efa napetraka, hoy Andriamanitrao. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Indray mipi-maso monja no nahafoizako anao; fa amin''ny indrafo lehibe kosa no ampodiako anao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tamin''ny firehetan''ny fahatezerako no nanafenako ny tavako taminao indray mipi-maso monja, fa amin''ny famindram-po mandrakizay kosa no amindrako fo aminao, hoy Jehovah, Mpanavotra anao. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa amiko izany dia tahaka ilay ranon''i Noa, ka toy ny nianianako fa tsy hanafotra ny tany intsony ilay ranon''i Noa. Dia toy izany no ianianako fa tsy ho tezitra aminao na hiteny mafy anao intsony Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa na dia hifindra aza ny tendrombohitra ary na dia hihetsika aza ny havoana, tsy mba hiala aminao ny famindram-peko, ary tsy hitsoaka ny faneken'ny fihavanako, hoy Jehovah, Mpamindra fo aminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hianao, ry ory izay afotofoton''ny tafiodrivotra sady tsy manana fampiononana, indro, Izaho handatsaka ny vatonao amin''ny antimony sy hanorina ny fanambaninao amin''ny safira, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hataoko robina ny tilikambo madinikao, sy karbonkolo ny vavahadinao, ary vato soa ny faritaninao manodidina. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny zanakao rehetra dia ho samy efa nampianarin''i Jehovah, ka dia ho be ny fiadanan''ny zanakao. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Amin'ny fahamarinana no hampiorenana anao; aza manahy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Manalavira
    marker-yv: yv-n
  - type: text
    text: ' ny fampahoriana, fa tsy hatahotra ianao, na ny fampahatahorana, fa tsy hanakaiky anao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Na dia misy miara-mioko aza, dia tsy avy amiko izany; ary na iza na iza miara-mioko hamely anao dia ho tonga hiandany aminao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ho lavo noho ny aminao'
    marker-yv: yv-n
  - type: text
    text: ' kosa. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Indro, Izaho no nahary ny mpanefy izay mifofotra ny afo amin'ny arina ka mahavita fiasana hanaovany ny asany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fiadiana araka ny asany'
    marker-yv: yv-n
  - type: text
    text: '; Ary Izaho koa no nahary ny mpandringana mba handringana. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny fiadiana rehetra izay voaforona hamelezana anao dia tsy hisy hambinina, ary ny lela rehetra izay miady aminao dia horesenao lahatra. Izany no lovan'ny mpanompon'i Jehovah sy fahamarinany avy amiko, hoy Jehovah.
