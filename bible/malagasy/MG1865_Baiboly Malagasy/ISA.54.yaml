document_id: ISA.54,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hanitarana ny Fiangonana, sy ny voninahitra ho azony
  - type: text
    content: 'Mihobia, ry momba, ianao izay tsy niteraka, eny, velomy ny hoby, ka manandrata feo, ianao izay tsy mba nihetsi-jaza; fa ny zanaky ny mpitondra tena dia maro noho ny zanaky ny manambady, hoy Jehovah. '
  '10':
  - type: text
    content: Fa na dia hifindra aza ny tendrombohitra ary na dia hihetsika aza ny havoana, tsy mba hiala aminao ny famindram-peko, ary tsy hitsoaka ny faneken'ny fihavanako, hoy Jehovah, Mpamindra fo aminao.
  '11':
  - type: text
    content: 'Hianao, ry ory izay afotofoton''ny tafiodrivotra sady tsy manana fampiononana, indro, Izaho handatsaka ny vatonao amin''ny antimony sy hanorina ny fanambaninao amin''ny safira, '
  '12':
  - type: text
    content: 'Hataoko robina ny tilikambo madinikao, sy karbonkolo ny vavahadinao, ary vato soa ny faritaninao manodidina. '
  '13':
  - type: text
    content: 'Ary ny zanakao rehetra dia ho samy efa nampianarin''i Jehovah, ka dia ho be ny fiadanan''ny zanakao. '
  '14':
  - type: text
    content: Amin'ny fahamarinana no hampiorenana anao; aza manahy
  - type: note
    content: Heb. Manalavira
  - type: text
    content: ' ny fampahoriana, fa tsy hatahotra ianao, na ny fampahatahorana, fa tsy hanakaiky anao izany. '
  '15':
  - type: text
    content: Na dia misy miara-mioko aza, dia tsy avy amiko izany; ary na iza na iza miara-mioko hamely anao dia ho tonga hiandany aminao
  - type: note
    content: 'Na: ho lavo noho ny aminao'
  - type: text
    content: ' kosa. '
  '16':
  - type: text
    content: Indro, Izaho no nahary ny mpanefy izay mifofotra ny afo amin'ny arina ka mahavita fiasana hanaovany ny asany
  - type: note
    content: 'Na: fiadiana araka ny asany'
  - type: text
    content: '; Ary Izaho koa no nahary ny mpandringana mba handringana. '
  '17':
  - type: text
    content: Ny fiadiana rehetra izay voaforona hamelezana anao dia tsy hisy hambinina, ary ny lela rehetra izay miady aminao dia horesenao lahatra. Izany no lovan'ny mpanompon'i Jehovah sy fahamarinany avy amiko, hoy Jehovah.
  '2':
  - type: text
    content: 'Halalaho ny itoeran''ny lainao, ary aoka hohenjanina ny ambain-dainao, ka aza avela hisy hiketrona; halavao ny kofehinao, ary aoreno mafy ny tsima-dainao; '
  '3':
  - type: text
    content: 'Fa hitatra any amin''ny ankavanana sy any amin''ny ankavia ianao, ary ny taranakao hahazo ny jentilisa, ka dia hasiany mponina ny tanàna lao. '
  '4':
  - type: text
    content: 'Aza matahotra, fa tsy ho menatra ianao; ary aza mangaihay, fa tsy havela ho afa-baraka ianao; fa ho hadinonao ny henatry ny fahatanoranao, ary tsy ho tsaroanao intsony ny tondromasonao fony mpitondratena. '
  '5':
  - type: text
    content: 'Fa ny Mpanao anao no Vadinao, Jehovah, Tompon''ny maro, no anarany; Ary ny Iray Masin''ny Isiraely no Mpanavotra anao, Andriamanitry ny tany rehetra no anarany. '
  '6':
  - type: text
    content: Fa Jehovah efa nampody
  - type: note
    content: Heb.niantso
  - type: text
    content: ' anao, izay tahaka ny vady efa nafoy ka ory am-panahy, ary tahaka ny vady efa novadina hatry ny fony mbola tanora, fa efa napetraka, hoy Andriamanitrao. '
  '7':
  - type: text
    content: 'Indray mipi-maso monja no nahafoizako anao; fa amin''ny indrafo lehibe kosa no ampodiako anao. '
  '8':
  - type: text
    content: 'Tamin''ny firehetan''ny fahatezerako no nanafenako ny tavako taminao indray mipi-maso monja, fa amin''ny famindram-po mandrakizay kosa no amindrako fo aminao, hoy Jehovah, Mpanavotra anao. '
  '9':
  - type: text
    content: 'Fa amiko izany dia tahaka ilay ranon''i Noa, ka toy ny nianianako fa tsy hanafotra ny tany intsony ilay ranon''i Noa. Dia toy izany no ianianako fa tsy ho tezitra aminao na hiteny mafy anao intsony Aho. '
