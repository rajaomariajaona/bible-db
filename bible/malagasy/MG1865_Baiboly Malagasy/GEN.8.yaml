document_id: GEN.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nataon'izy telo mirahalahy, zanak'i Noa, sy ny teny naminanian-drainy azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Andriamanitra nahatsiaro an''i Noa mbamin''ny bibi-dia rehetra ary ny biby fiompy rehetra, izay niara-nitoetra taminy tao anatin''ny sambo-fiara; ary Andriamanitra nampandeha rivotra eran''ny tany, ka dia nihena ny rano. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary tampina ny loharanon''ny lalina sy ny varavaran''ny lanitra, ka nitsahatra ilay ranonorana nivatravatra avy tany an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nihena niandalana niala tamin''ny tany ny rano; ary rehefa afaka dimam-polo amby zato andro, dia efa nihena ny rano. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nipetraka teo amin''ny tendrombohitra any Ararata ny sambo-fiara tamin''ny andro fahafito ambin''ny folo tamin''ny volana fahafito. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny rano dia mbola nihena niandalana hatramin''ny volana fahafolo; tamin''ny andro voalohany tamin''ny volana fahafolo dia niseho ny tampon''ny tendrombohitra. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary rehefa afaka efa-polo andro, dia novohan''i Noa ny varavarankelin''ny sambo-fiara izay efa nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia namoaka goaika anankiray izy, ary niverimberina mandra-paharitry ny rano tamin''ny tany iny. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia namoaka voromailala anankiray izay teo aminy izy, hizahany na efa kely ny rano tambonin''ny tany, na tsia. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa tsy hitan''ilay voromailala izay hipetrahan''ny faladiany, dia niverina tamin''i Noa tao anatin''ny sambo-fiara izy, satria mbola nisy rano tambonin''ny tany rehetra; ary Noa naninjitra ny tànany ka nandray sy nampiditra azy ho ao aminy tao anatin''ny sambo-fiara. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary mbola niandry hafitoana koa izy; dia namoaka ilay voromailala tamin''ny sambo-fiara indray izy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia niditra teo aminy ilay voromailala nony hariva ny andro; ary, indro, nisy ravin''oliva maitso teo am-bavany; izany no nahafantaran''i Noa fa efa kely ny rano tambonin''ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary mbola niandry hafitoana indray izy, dia namoaka ilay voromailala; ary tsy niverina teo aminy intsony iny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary tamin''ny andro voalohany tamin''ny volana voalohany tamin''ny taona fahiraika amby enin-jato, dia ritra ny rano teo ambonin''ny tany; ary nanaisotra ny tafon''ny sambo-fiara Noa ka nijery, ary, indro, efa maina ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary tamin''ny andro fahafito amby roa-polo tamin''ny volana faharoa, dia maina ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary Andriamanitra dia niteny tamin''i Noa ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mivoaha amin''ny sambo-fiara ianao sy ny vadinao aman-janakao ary ny vinantonao vavy miaraka aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary ny zava-manan'aina rehetra, izay eo aminao, avy tamin'ny nofo rehetra, dia ny vorona sy ny biby fiompy sy ny biby rehetra izay mandady na mikisaka amin'ny tany, dia ento mivoaka miaraka aminao; ary aoka hiteraka be eny ambonin'ny tany sy ho maro anaka ary hihabetsaka eny ambonin'ny tany ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia nivoaka Noa mbamin''ny vadiny aman-janany ary ny vinantonivavy niaraka taminy; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny zava-manan''aina rehetra sy ny biby rehetra izay mandady na mikisaka ary ny vorona rehetra mbamin''izay rehetra mihetsiketsika eny ambonin''ny tany dia samy nivoaka avy tao amin''ny sambo-fiara araka ny karazany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Noa dia nanorina alitara ho an''i Jehovah; ary ny biby madio rehetra sy ny vorona madio rehetra dia nanalany ka nataony fanatitra odorana teo ambonin''ny alitara. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia nandre ny hanitra ankasitrahana Jehovah, ka hoy Izy tam-pony: Tsy mba hanozona ny tany intsony noho ny amin''ny olona Aho; fa ny fisainan''ny fon''ny olona dia ratsy hatramin''ny fahazazany; ary tsy mba handringana ny velona rehetra intsony Aho tahaka izay nataoko. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Raha mbola maharitra koa ny tany, dia tsy hanam-pitsaharana ny taom-pamafazana sy ny taom-pijinjana, ary ny hatsiaka sy ny hafanana ary ny fahavaratra sy ny ririnina,ary ny andro sy ny alina.
