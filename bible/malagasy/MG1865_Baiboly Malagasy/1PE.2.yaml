document_id: 1PE.2,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fananarana hamporisika mba hadio fitondran-tena amin'ny olona rehetra, ary filazana ny mety hataon'ny mpianakavy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Koa esory ny lolompo rehetra sy ny ny fihatsaram-belatsihy sy ny fialonana ary ny fanaratsiana rehetra, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: dia ianareo izay tsy firenena akory fahiny, fa ankehitriny efa olon'Andriamanitra; izay tsy namindrana fo, fa ankehitriny efa namindrana fo (Hos. 2.25).
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ry malala, mananatra anareo aho, satria vahiny sy mpivahiny ianareo, fadio ny filan''ny nofo, fa miady amin''ny fanahy ireny; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'ary aoka ho tsara ny fitondran-tenanareo eo amin''ny jentilisa, mba hankalazany an''Andriamanitra amin''ny andro famangiana noho ny ahitany ny asa tsara ataonareo, dia izay anendrikendrehany anareo ho mpanao ratsy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary noho ny Tompo dia maneke izay rehetra voatendrin''ny olona, na ny mpanjaka, satria ambony izy, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'na ny mpanapaka, satria nirahiny hamaly izay manao ratsy izy, fa ho mpidera izay manao tsara. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa toy izany no sitrapon''Andriamanitra, hampanginanareo ny tsi-fahalalan''ny olona adala amin''ny fanaovan-tsoa; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'fa olona afaka ianareo, nefa aza mitondra ny fahafahanareo ho fanaronana ny ratsy, fa ho toy ny mpanompon Andriamanitra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Manajà ny olona rehetra. Tiava ny rahalahy. Matahora an'Andriamanitra. Manajà ny mpanjaka.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Hianareo mpanompo, maneke ny tomponareo amin''ny fahatahorana rehetra, tsy ny tsara sy ny malemy fanahy ihany, fa ny saro-po koa. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa izao no ankasitrahana: raha misy olona mitondra alahelo ka mandefitra ny tsy marina noho ny fieritreretana ny amin''Andriamanitra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'fa tahaka ny zaza vao teraka dia maniria ny rononom-panahy tsy misy fitaka, mba hitomboanareo amin''izany ho amin''ny famonjena, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa inona no laza, raha tàhiny kapohina noho ny fahadisoana ianareo ka mandefitra amin''izany? Fa raha tàhiny manao soa kosa ianareo ka mitondra fahoriana sy mandefitra, dia izany no sitrak''Andriamanitra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fa ho amin''izany no niantsoana anareo; fa Kristy aza efa nijaly hamonjy anareo ka namela fianarana ho anareo, mba hanarahanareo ny diany; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '"Izay tsy nanota akory, sady tsy nisy fitaka teo am-bavany" (Isa. 53.9); '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: raha notevatevaina Izy, dia tsy mba nanevateva; raha nijaly, dia tsy nandrahona, fa nanolotra ny adiny
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ny tenany'
      marker-yv: yv-n
    - type: text
      text: ' ho amin''ny Mpitsara marina; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'ary Izy nitondra ny fahotantsika (Isa. 53. 12) tamin''ny tenany teo ambonin''ny hazo, mba ho faty ny amin''ny ota isika, fa ho velona ny amin''ny fahamarinana; ary "ny dian-kapoka taminy no nahasitranana anareo" (Isa. 53.5). '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Fa efa nania toy ny ondry ianareo (Isa. 53.6), nefa ankehitriny dia efa niverina ho amin'ny Mpiandry sy Mpitandrina
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. Episkopo
      marker-yv: yv-n
    - type: text
      text: ' ny fanahinareo.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'raha tàhiny "nanandrana ianareo fa tsara ny Tompo;" '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Izay hatoninareo toy ny vato velona, "nolavin''ny olona, fa voafidin''Andriamanitra sady soa," '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'ka dia atsangana koa ianareo tahaka ny vato velona ho trano fanahy, ho fisoronana masina, hanatitra fanati-panahy sitrak''Andriamanitra amin''ny alalan''i Jesosy Kristy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa misy teny ao amin''ny Soratra Masina manao hoe: "Indro, mametraka fehizoro ao Ziona Aho, dia vato voafidy sady tsara; Ary izay mino Azy tsy ho menatra" (Isa. 28.16). '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Koa ny fahatsarana dia ho anareo izay mino; fa amin''izay tsy mino kosa "Ny vato izay nolavin''ny mpanao trano No efa tonga fehizoro" (Sal. 118.22), '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '"Ary vato mahatafintohina sy vatolampy mahasolafaka" (Isa 8.14); ary satria tsy nanaiky ireo, dia tafintohina tamin''ny teny izy, sady izany koa no nanendrena azy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa ianareo kosa dia taranaka voafidy, "fanjaka-mpisorona, firenena masina" (Eks. 19.6), olona nalain''Andriamanitra ho an''ny tenany mba hilazanareo ny hatsaran''ilay niantso anareo hiala tamin''ny maizina ho amin''ny fahazavany mahagaga; '
