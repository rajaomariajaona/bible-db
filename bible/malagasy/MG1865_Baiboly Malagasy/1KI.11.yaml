document_id: 1KI.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nivilian'i Solomona namporafy maro, sy ny nanompoany sampy, ary ny namalian'Andriamanitra azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa Solomona mpanjaka tia vehivavy maro hafa firenena, fa tsy ilay zanakavavin''i Farao ihany, dia vehivavy Moabita sy Amonita sy Edomita sy Sidoniana ary Hetita, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia vehivavy avy amin''ny firenena izay nolazain''i Jehovah tamin''ny Zanak''Isiraely hoe: Tsy hanambady azy ianareo, ary izy tsy hanambady anareo, fa hampivily ny fonareo hanaraka ny andriamaniny tokoa izy; kanjo tamin''ireo no niraiketan''ny fitiavan''i Solomona. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary dia nanana vady andriambavy fiton-jato sy vaditsindrano telonjato izy, ka nampivily ny fony ireo vadiny ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa nony efa antitra Solomona, dia navilin''ny vadiny ny fony hanaraka andriamani-kafa, ka ny fony tsy mba nahitsy tamin''i Jehovah Andriamaniny tahaka ny fon''i Davida rainy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa Solomona nanaraka an''i Astarta, andriamani-bavin''ny Sidoniana, sy Milkoma, fahavetavetan''ny Amonita. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Solomona nanao izay ratsy eo imason''i Jehovah, ka tsy mba tanteraka tamin''ny fanarahana Azy tahaka an''i Davida rainy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary tamin''izany Solomona dia nanao fitoerana avo ho an''i Kemosy, fahavetavetan''i Moaba, teo amin''ny havoana tandrifin''i Jerosalema, ary ho an''i Moloka, fahavetavetan''ny taranak''i Amona. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary toy izany koa no nataony ho an''izay vadiny hafa firenena rehetra, izay nandoro ditin-kazo manitra sy namono zavatra hatao fanatitra ho an''ny andriamaniny. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Jehovah tezitra tamin''i Solomona noho ny nivilian''ny fony niala tamin''i Jehovah, Andriamanitry ny Isiraely, Izay efa niseho taminy indroa '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'sady efa nandidy azy ny amin''izany zavatra izany tsy hanaraka andriamani-kafa; nefa tsy nitandrina izay nandidian''i Jehovah izy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ka dia hoy Jehovah tamin''i Solomona: Satria efa tonga ao am-ponao izao, ka tsy notandremanao ny fanekeko sy ny didiko izay nandidiako anao, dia hendahako ho afaka aminao tokoa ny fanjakana ka homeko ny mpanomponao. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Kanefa kosa tsy hataoko amin''ny andronao izany noho ny amin''i Davida rainao; fa rehefa mby amin''ny zanakao vao hendahako aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nefa tsy dia hendahako avokoa ny fanjakana rehetra, fa mba homeko firenena iray ihany ny zanakao noho ny amin''i Davida mpanompoko sy Jerosalema izay nofidiko. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary Jehovah nanangana fahavalo hanohitra an''i Solomona, dia Hadada Edomita, tamingan''ny mpanjakan''i Edoma. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa rehefa nanafika an''i Edoma Davida, ary Joaba, komandin''ny miaramila, niakatra handevina ny maty ary efa namono ny lehilahy rehetra tany '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '(fa enim-bolana no nitoeran''i Joaba sy ny Isiraely rehetra tany Edoma mandra-pandringany ny lehilahy rehetra tany), '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'dia nandositra Hadada sy ny Edomita, sasany mpanompon-drainy izay nanaraka azy ka nankany Egypta; fa mbola zazalahy kely Hadada tamin''izay. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary niainga niala tany Midiana ireo ka tonga tany Parana; dia naka olona avy tany Parana homba azy izy ka nankany Egypta ho any amin''i Farao, mpanjakan''i Egypta, izay nanome azy trano sy tany sady nilaza hanome hanina azy koa. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary Hadada nahita fitia fatratra teo imason''i Farao, ka dia ny rahavavin''i Tapanesa, vadin''ny mpanjaka, no nomeny ho vadiny. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ny rahavavin''i Tapanesa niteraka zazalahy tamin''i Hadada, dia Genobata, izay notazan''i Tapanesa tao an-tranon''i Farao; ary Genobata niara-nitoetra tamin''ny zanakalahin''i Farao tao an-dapa. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary rehefa ren''i Hadada tany Egypta fa Davida lasa nody mandry any amin''ny razany, sady maty koa Joaba, komandin''ny miaramila, dia hoy izy tamin''i Farao: Alefaso aho hody any amin''ny tanin-drazako. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa hoy Farao taminy: Fa inona moa no zavatra mahory anao atỳ amiko, no dia mitady hody any amin''ny tanin-drazanao indray ianao? Ary hoy ny navaliny: Tsy misy mahory ahy tsy akory; nefa alefaso ihany aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary Andriamanitra nanangana fahavalo koa hanohitra an''i Solomona, dia Rezona, zanak''i Eliada, izay efa nandositra an''i Hadadezera tompony, mpanjakan''i Zoba. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia namory olona maro ho ao aminy izy ka tonga kapiteniny tamin''ny namonoan''i Davida ny olona tany Zoba; ary nankany Damaskosy izy sy ny namany ka nitoetra sy nanjaka tao. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary izy koa dia fahavalon'ny Isiraely tamin'ny andron'i Solomona rehetra ka nanampy ny ratsy izay nataon'i Hadada; eny, nankahala ny Isiraely izy ary nanjaka tany Syria.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary Jerobeama, zanak''i Nebata, Efraimita avy any Zareda, mpanompon''i Solomona (Zeroa no anaran-dreniny, vehivavy mpitondratena), dia nanainga tanàna hikomy tamin''ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary izao no fototry ny nanaingany tanàna hikomy tamin''ny mpanjaka: Solomona nanorina an''i Milo'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. fiarovana
    marker-yv: yv-n
  - type: text
    text: ' ary nanampina ny lohasaha tao an-Tanànan''i Davida rainy; '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ary Jeroboama dia lehilahy mahay; koa nony hitan''i Solomona fa zatovo mahavita raharaha izy, dia nataony mpifehy ny taranak''i Josefa tamin''ny fanompoany rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary tamin''izany andro izany, raha nivoa: ka avy tany Jerosalema Jeroboama, dia nahita azy teny an-dalana Ahia Silonita mpaminany; ary Ahia nitafy lamba vaovao, ary izy roa lahy ihany no tany an-tsaha. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia noraisin''i Ahia ny lamba vaovao-izay notafiny, ka notriatriariny ho roa ambin''ny folo. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary hoy izy tamin''i Jeroboama: Raiso ho anao ny tapatapany folo; fa izao no lazain''i Jehovah, Andriamanitry ny Isiraely: Indro, Izaho efa hanendaka ny fanjakana ho afaka amin''ny tànan''i Solomona, ary homeko anao ny firenena folo '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '(nefa ny firenena iray dia i mbola havela ho azy ihany noho ny amin''i Davida mpamompoko sy Jerosalema, tanàna izay nofidiko tamin''ny firenen''Isiraely), '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'satria efa nahafoy Ahy izy ka niankohoka teo anatrehan''i Astarta, andriamani-bavin''ny Sidoniana, sy Kemosy andriamanitr''i Moaba, ary Milkoma, andriamanitry ny taranak''i Amona, fa tsy nandeha tamin''ny lalako hanao izay mahitsy eo imasoko sy hitandrina ny didiko sy ny fitsipiko tahaka an''i Davida rainy. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Nefa tsy hesoriko eo an-tanany avokoa ny fanjakana rehetra; fa hampitoeriko ho mpanjaka ihany izy amin''ny andro rehetra hiainany noho ny amin''i Davida mpanompoko izay nofidiko, satria izy nitandrina ny lalàko sy ny didiko; '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'fa hesoriko eo an-tànan''ny zanany kosa ny fanjakana ka homeko anao, nefa ny firenena folo ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Fa firenena iray no homeko ny zanany, mba hisy fanilo ho an''i Davida mpanompoko eo anatrehako mandrakariva any Jerosalema, tanàna izay nofidiko ho Ahy hametrahana ny anarako. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary ianao no halaiko, ka hanjaka amin''izay rehetra irin''ny fanahinao ary ho mpanjaka amin''ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ary raha mihaino izay rehetra andidiako anao ianao ka mandeha amin'ny lalako ary manao izay mahitsy eo imasoko ka mitandrina ny didiko sy ny lalàko tahaka izay nataon'i Davida mpanompoko, dia ho aminao Aho ka hampaharitra ny taranakao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hanao trano maharitra ho anao
    marker-yv: yv-n
  - type: text
    text: ', tahaka izay nataoko ho an''i Davida, ary homeko anao ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary hampietry ny taranak''i Davida kosa Aho noho izany, nefa tsy ho mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary Solomona nitady hamono an''i Jeroboama. Fa Jeroboama niainga, dia nandositra nankany Egypta ho any amin''i Sisaka, mpanjakan''i Egypta, ka nitoetra tany mandra-pahafatin''i Solomona. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary ny tantaran''i Solomona sisa mbamin''izay rehetra nataony ary ny fahendreny, tsy voasoratra ao amin''ny bokin''ny tantaran''i Solomona va izany? '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary ny andro nanjakan''i Solomona tamin''ny Isiraely rehetra tany Jerosalema dia efa-polo taona. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ary Solomona lasa nodi-mandry any amin'ny razany, dia nalevina tao an-Tanànan'i Davida rainy izy; ary Rehoboama zanany no nanjaka nandimby azy.
