document_id: EZK.17,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'ny nanetrena ny taranak'i Dasida, sy ny mbola hanandratana azy indray
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Koa, indro, na dia voavoly aza izy, moa ho vanona va? Tsy halazo tokoa va izy, raha asian''ny rivotra avy any atsinanana? Eny, halazo eo amin''ny tany voafaritra naniriany izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Lazao amin''ny taranaka maditra hoe: Tsy fantatrareo va ny hevitr''ireto zavatra ireto? Lazao aminy hoe: Indro, efa tonga tany Jerosalema ny mpanjakan''i Babylona ka naka ny mpanjaka sy ny mpanapaka tao, dia nitondra azy ho any aminy any Babylona. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary naka ny anankiray tamin''ny taranaky ny mpanjaka izy, dia nanao fanekena taminy ka nampianiana azy, ary ny lehilahy mahery tamin''ny tany dia nentiny nandeha, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'mba hietry ny fanjakana ka tsy hiarina, mba hotandremana ny fanekeny ka haharitra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa niodina taminy izy ka naniraka olona hankany Egypta, mba hanome soavaly sy olona maro azy ireo. Moa hambinina va izy? Ho afa-mandositra va izay manao toy izany? Nivadika ny fanekena izy, ka ho afa-mandositra va? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Raha velona koa Aho, hoy Jehovah Tompo, dia any amin''ny tanin''ilay mpanjaka nampanjaka azy sady nampianiana azy nefa nohamavoiny ny fianianana, ary nivadihany ny fanekeny eny, any amin''io, any Babylona, no hahafatesany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary amin''ny hanandratan''ireo tovon-tany sy ny hanaovany tilikambo handringanana olona maro, dia tsy hanampy azy amin''ny ady akory Farao, na dia manana miaramila maro sy vahoaka betsaka aza. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa efa nanamavo ny fianianana izy tamin''ny nivadihany ny fanekena, fa he! efa nanolotra ny tànany izy, kanjo nanao izany rehetra izany ihany, dia tsy ho afa-mandositra izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Koa izao no lazain''i Jehovah Tompo: Raha velona koa Aho, ny fampianianako izay nohamavoiny ary ny fanekeko izay nivadihany dia hatsingeriko ho eo an-dohany tokoa. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ry zanak''olona, manaova fampanonona, ary milazà fanoharana amin''ny taranak''Isiraely, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary ny fandrika haratoko dia hovelariko aminy, ka ho voan''ny fandriko izy, ary ho entiko any Babylona ka hotsaraiko any noho ny nivadihany tamiko. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary ny miaramilany rehetra izay afa-mandositra dia ho lavon''ny sabatra, ary izay sisa dia haely ho amin''ny rivotra rehetra, ka dia ho fantatrareo fa Izaho Jehovah no niteny izany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Izao no lazain''i Jehovah Tompo: Izaho dia haka amin''ny rantsana avo indrindra amin''ny sedera avo, ka hamboleko izany; holaingosako ny tendron''ny laingony milenodenoka, ka hamboleko ao amin''ny tendrombohitra avo sy milangalanga izany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ao amin''ny tendrombohitra avon''ny Isiraely no hamboleko azy; ary handrantsana sy hamoa izy ka ho tonga sedera tsara indrindra, ary ny vorona samy hafa rehetra hitoetra ao aminy; ao amin''ny alokaloky ny rantsany no hitoerany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ary ho fantatry ny hazo rehetra any an-tsaha fa Izaho Jehovah no efa nanetry ny hazo avo ka nanandratra ny hazo iva ary nandazo ny hazo maitso ka nampaniry ny hazo maina; Izaho Jehovah no niteny sady nanao izany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ka ataovy hoe: Izao no lazain''i Jehovah Tompo: Nisy voromahery lehibe nanana elatra lehibe, sady lava ny volon''elany, ary nisoratsoratra avokoa ny volony rehetra; dia tonga tao Libanona izy ka naka izay avo indrindra amin''ny rantsan''ny sedera; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ny tendron'ny tarony dia nolaingosany ka nentiny ho any amin'ny tany fandrantoana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Kanana; izahao xxvi. 29
      marker-yv: yv-n
    - type: text
      text: '; eny, tao an-tanànan''ny mpandranto no namboleny azy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nangalany koa ny voan-javatra tamin''ny tany ka namboleny tao amin''ny tany lonaka; nentiny ho eo amoron''ny rano be iny ka nataony araka ny fanao amin''ny hazomalahelo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia naniry iny ka tonga voaloboka iva misandrahaka, mba hitodihan''ny rantsany ho eo aminy ary ny fakany ho ao ambaniny; ka dia tonga voaloboka izy ka nandrantsana sy nanaroka. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary nisy voromahery lehibe hafa koa nanana elatra lehibe sady be volo, ary, indro, manina azy izany voaloboka izany ka nampanatona ny fakany hankany aminy sady nampanaroka ny rantsany avy tamin''ny tany voafaritra nambolena azy mba hankany aminy koa mba holemany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Voavoly tao amin''ny saha tsara teo amoron''ny rano be izy mba handrantsana sy hamoa ka ho voaloboka tsara indrindra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ataovinao hoe: Izao no lazain''i Jehovah Tompo: Ho vanona va izy? Tsy hongotana va ny fakany, ary hotazana ny voany, mba halazo izy? Halazo ny raviny rehetra, raha vao mitsimoka, ka na dia ny sandry mahery sy ny vahoaka betsaka aza tsy hahay mampaniry azy avy amin''ny fakany intsony'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: na dia tsy misy sandry mahery na vahoaka betsaka manongotra azy amin''ny fakany aza'
      marker-yv: yv-n
    - type: text
      text: '. '
