document_id: ISA.35,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ravoravo ny efitra sy ny tany karankaina, ary ny tani-hay mifaly sy mamony tahaka ny lilia. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Eny, ny navotan'i Jehovah hiverina ka hankany Ziona amin'ny fihobiana, ary ny fifaliana mandrakizay no ho eny an-dohany; Hahazo fifaliana sy faharavoravoana izy, ka dia handositra ny alahelo sy ny fisentoana.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mamony be dia be izy, eny, mifaly mihoby izy, ny voninahitr''i Libanona dia homena azy mbamin''ny hatsaran-tarehin''i Karmela sy Sarôna, dia hahita ny voninahitr''i Jehovah izy sy ny famirapiratan''Andriamanitsika. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ampaherezonareo ny tanana miraviravy, ary hatanjaho ny lohalika malemy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Lazao amin'izay reraka
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. maimaika
      marker-yv: yv-n
    - type: text
      text: ' am-po: Mahereza, aza matahotra, indro, Andriamanitrareo ho avy mitondra famaliana, dia ny famalian''Andriamanitra, eny, Izy tokoa no ho avy ka hamonjy anareo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia hampahiratina ny mason''ny jamba, ary hampahaladina ny sofin''ny marenina. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia hitsambikina tahaka ny diera ny mandringa, ary hihoby ny lelan''ny moana; Fa hiboiboika any an-efitra ny rano, ary hisy renirano any amin''ny tany karankaina. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ny alonalona mitarehin-drano
    - type: usfm
      marker: x
      children:
      - type: text
        text: ny miraja
      marker-yv: yv-n
    - type: text
      text: ' dia ho tonga farihy tokoa, ary ny tany mangentana ho loharano miboiboika; Ny fonenana izay amitsahan''ny amboadia'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: jakala'
      marker-yv: yv-n
    - type: text
      text: ' dia haniry volotara sy zozoro. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary hisy lalambe any dia lalana voavoatra, izay hatao hoe Làlan'ny fahamasinana; Tsy mba handia izany ny tsy madio, fa Jehovah homba azy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Fa ho an''ireo izy'
      marker-yv: yv-n
    - type: text
      text: ' ka izay mandeha amin''ny lalana dia tsy ho diso any, na dia ny adala aza. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Any tsy hisy liona sady tsy hiakaran''ny biby masiaka, tsy ho hita ao ireny; Fa ny navotana no handia azy. '
