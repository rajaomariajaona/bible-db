document_id: ISA.35,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ravoravo ny efitra sy ny tany karankaina, ary ny tani-hay mifaly sy mamony tahaka ny lilia. '
  '10':
  - type: text
    content: Eny, ny navotan'i Jehovah hiverina ka hankany Ziona amin'ny fihobiana, ary ny fifaliana mandrakizay no ho eny an-dohany; Hahazo fifaliana sy faharavoravoana izy, ka dia handositra ny alahelo sy ny fisentoana.
  '2':
  - type: text
    content: 'Mamony be dia be izy, eny, mifaly mihoby izy, ny voninahitr''i Libanona dia homena azy mbamin''ny hatsaran-tarehin''i Karmela sy Sarôna, dia hahita ny voninahitr''i Jehovah izy sy ny famirapiratan''Andriamanitsika. '
  '3':
  - type: text
    content: 'Ampaherezonareo ny tanana miraviravy, ary hatanjaho ny lohalika malemy. '
  '4':
  - type: text
    content: Lazao amin'izay reraka
  - type: note
    content: Heb. maimaika
  - type: text
    content: ' am-po: Mahereza, aza matahotra, indro, Andriamanitrareo ho avy mitondra famaliana, dia ny famalian''Andriamanitra, eny, Izy tokoa no ho avy ka hamonjy anareo. '
  '5':
  - type: text
    content: 'Dia hampahiratina ny mason''ny jamba, ary hampahaladina ny sofin''ny marenina. '
  '6':
  - type: text
    content: 'Dia hitsambikina tahaka ny diera ny mandringa, ary hihoby ny lelan''ny moana; Fa hiboiboika any an-efitra ny rano, ary hisy renirano any amin''ny tany karankaina. '
  '7':
  - type: text
    content: Ny alonalona mitarehin-drano
  - type: note
    content: ny miraja
  - type: text
    content: ' dia ho tonga farihy tokoa, ary ny tany mangentana ho loharano miboiboika; Ny fonenana izay amitsahan''ny amboadia'
  - type: note
    content: 'Na: jakala'
  - type: text
    content: ' dia haniry volotara sy zozoro. '
  '8':
  - type: text
    content: Ary hisy lalambe any dia lalana voavoatra, izay hatao hoe Làlan'ny fahamasinana; Tsy mba handia izany ny tsy madio, fa Jehovah homba azy
  - type: note
    content: 'Na: Fa ho an''ireo izy'
  - type: text
    content: ' ka izay mandeha amin''ny lalana dia tsy ho diso any, na dia ny adala aza. '
  '9':
  - type: text
    content: 'Any tsy hisy liona sady tsy hiakaran''ny biby masiaka, tsy ho hita ao ireny; Fa ny navotana no handia azy. '
