document_id: EZK.5,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ianao, ry zanak''olona, dia makà sabatra maranitra ho toy ny harezan''ny mpanala volombava, ka anarato ny lohanao sy ny somotrao, dia makà mizana, ka zarao ny volo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ny ray dia hihinana ny zanany eo aminao, ary ny zanaka kosa hihinana ny rainy; ary hanao fitsarana eo aminao Aho, ary izay sisa rehetra aminao dia haeliko ho amin''ny rivotra rehetra; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'eny, raha velona koa Aho, hoy Jehovah Tompo, noho ny nandotoanao ny fitoerako masina tamin''ny zava-dratsinao rehetra sy tamin''ny fahavetavetanao rehetra, Izaho kosa dia hampiala ny masoko, fa tsy hiantra; eny, Izaho dia tsy hamindra fo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny ampahatelony eo aminao dia ho fatin''ny areti-mandringana na ho ringan''ny mosary eo aminao; ary ny ampahatelony dia ho lavon''ny sabatra manodidina anao; ary ny ampahatelony dia haeliko ho amin''ny rivotra rehetra, ary hanatsoaka sabatra ho entiko manenjika azy Aho. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ho tanteraka amin''izany ny fahatezerako, sady hampariko aminy ny fahatezerako, ka hialako fo izy; dia ho fantany fa Izaho Jehovah no niteny izany tamin''ny  fahasaro-piaroko, rehefa notanterahiko taminy ny fahatezerako. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hataoko lao sy fandatsa eny amin''ny firenena izay manodidina anao ianao eo imason''izay rehetra mandalo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka dia hisy latsa sy fitenenan-dratsy sy famaizana sy figagana avy amin''ny jentilisa manodidina anao, rehefa manao fitsarana aminao Aho amin''ny fahatezerana sy ny fahavinirana ary amin''ny fananarana mafy Izaho Jehovah no niteny izany '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'raha alefako ho fandringanana azy ny mosary dia ny zana-tsipìka ratsy izay halefako handringana anareo, sady hampitomboiko ny mosary eo aminareo, ka hotapahiko ny mofonareo, izay tohan''aina. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia haterako mosary sy biby masiaka eo aminareo, izay hahalany fara anareo; ary handroso eo aminao ny areti-mandringana sy ny fandatsahan-drà, ary hataoko mihatra aminao ny sabatra. Izaho Jehovah no niteny izany
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny ampahatelony dia dory amin''ny afo ao an-tanàna, rehefa tapitra ny andron''ny fahirano; ary alao koa ny ampahatelony, ka asio ny sabatra manodidina; ary ny ampahatelony dia aelezo ho amin''ny rivotra; ary hanatsoaka sabatra ho enti-manenjika azy Aho. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary analao vitsivitsy ireo, ka fonosy ao amin''ny sisin-dambanao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireny indray dia mbola analao koa, dia atsipazo eo anaty afo izany, ka dory eo fa hisy afo hivoaka avy aminy ho amin''ny taranak''Isiraely rehetra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izao no lazain''i Jehovah Tompo: Ity Jerosalema ity dia nataoko eo afovoan''ny jentilisa, ka voahodidin''ireny tany ireny izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanao ditra tsy nanaraka ny fitsipiko sy ny didiko izy, fa nanao ratsy mihoatra noho ny jentilisa sy ny tany manodidina azy; eny, nanao ditra tsy nanaraka ny fitsipiko sy ny didiko izy ka tsy nandeha araka izany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izao no lazain''i Jehovah Tompo: Satria ianareo nitabataba mihoatra noho ny firenena manodidina anareo ka tsy nandeha araka ny didiko na nanaraka ny fitsipiko sady tsy nanaraka ny fitsipiky ny firenena izay manodidina anareo aza, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia izao no lazain''i Jehovah Tompo: Indro, Izaho dia Izaho no mamely anao ka hanao fitsarana eo aminao eo imason''ny firenena. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary noho ny fahavetavetanao rehetra dia hataoko aminao izay tsy mbola nataoko, sady tsy hataoko tahaka izany intsony. '
