document_id: 2CO.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Teny nentin'i Paoly namaly izay nanohitra sy nanevateva ny fahefany ka azy tsy ho Apostoly marina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny tenako, izaho Paoly, dia mananatra anareo amin''ny hamoram-panahy sy ny fandeferan''i Kristy, dia izaho, izay manetry tena, hono, raha eo anatrehanareo, fa sahy aminareo kosa, raha tsy eo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia mangataka aho mba tsy ho sahy, rehefa tonga, amin''ny fahatokiana izay kasaiko hahasahiana amin''ny sasany, izay manao anay ho mandeha araka ny nofo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa na dia velona amin''ny nofo aza izahay, dia tsy mba miady araka ny nofo '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '(fa tsy avy amin''ny nofo ny fiadian''ny tafikay, fa mahery amin''Andriamanitra handrava fiarovana mafy); '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'fa mandrava ny fisainana sy ny zavatra avo rehetra izay atsangana hanohitra ny fahalalana an''Andriamanitra izahay ka mamabo ny hevitra rehetra hanaiky an''i Kristy, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary vonona hamaly ny tsi-fanarahana rehetra izahay, rehefa tanteraka ny fanarahanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mijery zavatra araka ny fisehony ihany va ianareo
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Mijery zavatra araka ny fisehony ihany ianareo'
    marker-yv: yv-n
  - type: text
    text: '? Raha misy olona matoky ny tenany fa an''i Kristy, aoka izay hisaintsaina izao indray, fa tahaka ny mah''an''i Kristy azy no mah''an''i Kristy anay koa. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa na dia bebe ihany aza ny fireharehako ny amin''ny fahefanay izay nomen''i Kristy anay hananganana, fa tsy handravana anareo, dia tsy hahazo henatra aho, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'mba tsy hisehoako toy ny ta-hampitahotra anareo amin''ny epistily. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa ny epistiliny, hoy izy, dia mavesatra sy mahery; fa malemy kosa ny fanatrehan''ny tenany, ary tsinontsinona ny teniny. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Aoka izany olona izany hihevitra izao, fa tahaka ny fiteninay amin''ny epistily, raha tsy eo izahay, dia ho tahaka izany koa ny asanay rehefa tonga izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa izahay tsy sahy hanao ny tenanay ho isan''ny sasany izay midera tena, na hampitaha ny tenanay aminy; fa tsy hendry ireny, satria manohatra ny tenanay amin''ny tenany sy mampitaha ny tenany amin''ny tenanay. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa izahay tsy mba hirehareha tsy amin''ohatra, fa araka ny ohatry ny voafaritr''Andriamanitra ho anjaranay, dia ohatra mihatra aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa tsy toy izay tsy mihatra aminareo izahay ka mihoatra ny faritry ny anjaranay; fa tonga hatrany aminareo aza izahay amin''ny filazantsaran''i Kristy; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'tsy mirehareha tsy amin''ohatra amin''izay nisasaran''ny sasany izahay, fa manana fanantenana izahay fa rehefa mitombo ny finoanareo, dia hohalehibiazina ao aminareo izahay araka ny voafaritra ho anjarany, sady mbola handroso ihany '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ka hitory ny filazantsara amin''ny tany any ankoatranareo, ary tsy hirehareha amin''izay efa vonona rahateo ao anatin''ny voafaritra ho an''ny sasany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa izay mirehareha, dia aoka Jehovah no ho reharehany (Jery. 9, 23) '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa tsy izay midera tena no ankasitrahana, fa izay derain'ny Tompo.
