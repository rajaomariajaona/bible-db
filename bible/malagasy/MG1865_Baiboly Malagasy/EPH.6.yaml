document_id: EPH.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny adim-panahin'ny Kristiana, sy ny fiadiana atolotr'Andriamanitra azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Anaka, maneke ny ray sy ny reninareo ao amin''ny Tompo, fa marina izany. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Manajà ny ray sy ny reninao (fa izany no didy voalohany misy teny fikasana), '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'mba hahita soa ianao sy ho maro andro ambonin''ny tany (Deo. 5. 16). '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary ianareo ray, aza mampahatezitra ny zanakareo, fa tezao amin'ny famaizana sy ny fananaran'ny Tompo izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hianareo mpanompo, maneke ny tomponareo araka ny nofo amin''ny fahatahorana sy ny fangovitana, amin''ny fahatsoran''ny fonareo, toy ny fanekena an''i Kristy ihany, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'tsy amin''ny fanompoana eo imaso, tahaka ny mpila sitraka amin''olona, fa tahaka ny mpanompon''i Kristy manao izay sitrapon''Andriamanitra amin''ny fo, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'amin''ny sitrapo manao fanompoana toy ny amin''ny Tompo, fa tsy amin''olona, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'satria fantatrareo fa izay soa ataon''ny olona rehetra no horaisiny amin''ny Tompo, na andevo na tsy andevo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary ianareo tompo, manaova toy izany aminy kosa, ka atsaharo ny fandrahonana, satria fantatrareo fa ny Tompony sady Tomponareo koa dia any an-danitra; ary tsy misy fizahan-tavan'olona aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Farany, mahereza ao amin''ny Tompo sy amin''ny herin''ny faherezany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tafio avokoa ny fiadian''Andriamanitra, mba hahazoanareo hifahatra amin''ny fanangolen''ny devoly. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa isika tsy mitolona amin'ny nofo aman-drà, fa amin'ny fanapahana sy amin'ny fanjakana sy amin'ny mpanjakan'izao fahamaizinana izao, dia amin'ny fanahy ratsy eny amin'ny rivotra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. lanitra
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary noho izany, dia raiso avokoa ny fiadian''Andriamanitra, mba hahazoanareo hanohitra amin''ny andro mahory; ary rehefa vitanareo avokoa, dia hahafahatra ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mifahara ary, ka sikino fahamarinana ny valahanareo, ary mitafia ny rariny ho fiarovan-tratra, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ary kiraroy ny fahavononam-panahy avy amin''ny filazantsaran''ny fihavanana ny tongotrareo; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ary ho fanampin''izany rehetra izany dia tano ny finoana ho ampinga, izay hahazoanareo hamono ny zana-tsipìka mirehitra rehetra izay alefan''ilay ratsy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary raiso ny famonjena ho fiarovan-doha sy ny tenin''Andriamanitra ho sabatry ny Fanahy; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary mivavaha mandrakariva ao amin''ny Fanahy amin''ny fivavahana rehetra sy ny fangatahana, ka miambena amin''izany amin''ny faharetana sy ny fangatahana rehetra ho an''ny olona masina rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ary ho ahy koa mba homena ahy ny hiloa-bava amin''ny fahasahiana hampahafantatra ny zava-miafina momba ny filazantsara '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: (iraka
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. ambasadôra
    marker-yv: yv-n
  - type: text
    text: ' migadra noho izany aho), mba hiteny izany amin''ny fahasahiana aho, toy izay mety hoteneniko. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa mba ho fantatrareo koa izay toetro, dia Tykiko, rahalahy malala sady mpanompo mahatoky ao amin''ny Tompo, no hampahalala anareo ny zavatra rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'izy no nirahiko hilaza izany zavatra izany indrindra aminareo, mba ho fantatrareo ny toetray, ary mba hamporisihiny ny fonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fiadanana anie ho an''ny rahalahy ary fitiavana mbamin''ny finoana avy amin''Andriamanitra Ray sy Jesosy Kristy Tompo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny fahasoavana anie ho amin'izay rehetra tia an'i Jesosy Kristy Tompontsika amin'ny fitiavana tsy mety levona. Amena.
