document_id: ZEC.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fahitana voalohany: ny amin''ny mpitaingin-tsoavaly eny amin''ny rotra'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin''ny volana fahavalo tamin''ny taona faharoa nanjakan''i Dariosa no nahatongavan''ny tenin''i Jehovah tamin''i Zakaria mpaminany, zanak''i Berekia, zanak''Ido, nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tezitra indrindra tamin''ny razanareo Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa lazao aminy hoe: Izao no lazain''i Jehovah, Tompon''ny maro: Miverena amiko ianareo, hoy Jehovah, Tompon''ny maro, dia mba hiverina ho aminareo kosa Aho, hoy Jehovah, Tompon''ny maro. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aza mba toy ny razanareo, izay nantsoin''ny mpaminany fahiny hoe: Izao no lazain''i Jehovah, Tompon''ny maro: Mialà amin''ny lalanareo ratsy ianareo sy amin''ny ratsy fanaonareo; nefa tsy nitandrina izy, na nihaino Ahy, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny razanareo - aiza moa ireny izao ? Ary ny mpaminany - moa velona mandrakizay va ireny? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa ny teniko sy ny didiko, izay nandidiako ny mpaminany mpanompoko, tsy nahatratra ny razanareo va izany? Ary izy nitodika ka nanao hoe: Araka izay nosainin''i Jehovah, Tompon''ny maro, hatao amintsika, araka ny alehantsika sy ny ataontsika, dia araka izany no nataony tamintsika.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tamin''ny andro fahefatra amby roa-polo tamin''ny volana fahiraika ambin''ny folo (volana Sebata izany) tamin''ny taona faharoa nanjakan''i Dariosa dia tonga tamin i Zakaria mpaminany, zanak''i Berekia, zanak''Ido, ny tenin''i Jehovah nanao,hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nahita tamin'ny alina aho fa, indro, nisy lehilahy nitaingina soavaly mena ka nijanona teny amin'ny rotra
  - type: usfm
    marker: x
    children:
    - type: text
      text: myrta
    marker-yv: yv-n
  - type: text
    text: ' teny an-dohasaha'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: amin''ny alokaloka'
    marker-yv: yv-n
  - type: text
    text: ', ary teo aoriany nisy soavaly mena sy mavo ary fotsy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy izaho: Tompoko ô, inona moa ireo? Ary ilay anjely niresaka tamiko dia nanao tamiko hoe: Izaho haneho anao ny amin''ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary ralehilahy izay nijanona teny amin'ny rotra
  - type: usfm
    marker: x
    children:
    - type: text
      text: myrta
    marker-yv: yv-n
  - type: text
    text: ' dia namaly hoe: Ireo dia nirahin''Jehovah hivoivoy eny amin''ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary namaly Ilay Anjelin'i Jehovah nijanona teny amin'ny rotra
  - type: usfm
    marker: x
    children:
    - type: text
      text: myrta
    marker-yv: yv-n
  - type: text
    text: ' ireo ka nanao hoe: Efa nivoivoy teny amin''ny tany izahay, ary, indro, ny tany rehetra dia miadana sy mandry fahizay. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Ilay Anjelin''i Jehovah namaly hoe: He, Jehovah, Tompon''ny maro ô! mandra-pahoviana no tsy hamindranao fo amin''i Jerosalema sy amin''ny tanànan''ny Joda, izay efa nahatezitra Anao fito-polo taona izay. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia novalian''i Jehovah teny tsara sy mampionona ilay anjely niresaka tamiko. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ilay anjely niresaka tamiko dia nanao tamiko hoe: Miantsoa hoe: Izao no lazain''i Jehovah, Tompon''ny maro: Saro-piaro dia saro-piaro an''i Jerosalema sy Ziona Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary tezitra indrindra Aho amin''ireo firenena miadana; satria Izaho dia tezitra kely ihany, fa ireo kosa dia nampitombo ny fahoriana. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa izao no lazain''i Jehovah: Efa tafaverina eto Jerosalema amin''ny indrafo Aho; ny tranoko haorina eto, hoy Jehovah, Tompon''ny maro, ary ny famolaina hohenjanina eto Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Miantsoa indray hoe: Izao no lazain''i Jehovah, Tompon''ny maro: Hihoa-pampana ny fanambinana ny tanànako; ary Jehovah hampionona an''i Ziona ary mbola hifidy an''i Jerosalema indray.'
