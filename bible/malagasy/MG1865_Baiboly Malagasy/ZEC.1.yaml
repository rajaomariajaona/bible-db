document_id: ZEC.1,96
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Fahitana voalohany: ny amin''ny mpitaingin-tsoavaly eny amin''ny rotra'
  - type: text
    content: 'Tamin''ny volana fahavalo tamin''ny taona faharoa nanjakan''i Dariosa no nahatongavan''ny tenin''i Jehovah tamin''i Zakaria mpaminany, zanak''i Berekia, zanak''Ido, nanao hoe: '
  '10':
  - type: text
    content: Ary ralehilahy izay nijanona teny amin'ny rotra
  - type: note
    content: myrta
  - type: text
    content: ' dia namaly hoe: Ireo dia nirahin''Jehovah hivoivoy eny amin''ny tany. '
  '11':
  - type: text
    content: Ary namaly Ilay Anjelin'i Jehovah nijanona teny amin'ny rotra
  - type: note
    content: myrta
  - type: text
    content: ' ireo ka nanao hoe: Efa nivoivoy teny amin''ny tany izahay, ary, indro, ny tany rehetra dia miadana sy mandry fahizay. '
  '12':
  - type: text
    content: 'Ary Ilay Anjelin''i Jehovah namaly hoe: He, Jehovah, Tompon''ny maro ô! mandra-pahoviana no tsy hamindranao fo amin''i Jerosalema sy amin''ny tanànan''ny Joda, izay efa nahatezitra Anao fito-polo taona izay. '
  '13':
  - type: text
    content: 'Dia novalian''i Jehovah teny tsara sy mampionona ilay anjely niresaka tamiko. '
  '14':
  - type: text
    content: 'Ary ilay anjely niresaka tamiko dia nanao tamiko hoe: Miantsoa hoe: Izao no lazain''i Jehovah, Tompon''ny maro: Saro-piaro dia saro-piaro an''i Jerosalema sy Ziona Aho. '
  '15':
  - type: text
    content: 'Ary tezitra indrindra Aho amin''ireo firenena miadana; satria Izaho dia tezitra kely ihany, fa ireo kosa dia nampitombo ny fahoriana. '
  '16':
  - type: text
    content: 'Koa izao no lazain''i Jehovah: Efa tafaverina eto Jerosalema amin''ny indrafo Aho; ny tranoko haorina eto, hoy Jehovah, Tompon''ny maro, ary ny famolaina hohenjanina eto Jerosalema. '
  '17':
  - type: text
    content: 'Miantsoa indray hoe: Izao no lazain''i Jehovah, Tompon''ny maro: Hihoa-pampana ny fanambinana ny tanànako; ary Jehovah hampionona an''i Ziona ary mbola hifidy an''i Jerosalema indray.'
  '2':
  - type: text
    content: 'Tezitra indrindra tamin''ny razanareo Jehovah. '
  '3':
  - type: text
    content: 'Koa lazao aminy hoe: Izao no lazain''i Jehovah, Tompon''ny maro: Miverena amiko ianareo, hoy Jehovah, Tompon''ny maro, dia mba hiverina ho aminareo kosa Aho, hoy Jehovah, Tompon''ny maro. '
  '4':
  - type: text
    content: 'Aza mba toy ny razanareo, izay nantsoin''ny mpaminany fahiny hoe: Izao no lazain''i Jehovah, Tompon''ny maro: Mialà amin''ny lalanareo ratsy ianareo sy amin''ny ratsy fanaonareo; nefa tsy nitandrina izy, na nihaino Ahy, hoy Jehovah. '
  '5':
  - type: text
    content: 'Ny razanareo - aiza moa ireny izao ? Ary ny mpaminany - moa velona mandrakizay va ireny? '
  '6':
  - type: text
    content: 'Fa ny teniko sy ny didiko, izay nandidiako ny mpaminany mpanompoko, tsy nahatratra ny razanareo va izany? Ary izy nitodika ka nanao hoe: Araka izay nosainin''i Jehovah, Tompon''ny maro, hatao amintsika, araka ny alehantsika sy ny ataontsika, dia araka izany no nataony tamintsika.'
  '7':
  - type: text
    content: 'Tamin''ny andro fahefatra amby roa-polo tamin''ny volana fahiraika ambin''ny folo (volana Sebata izany) tamin''ny taona faharoa nanjakan''i Dariosa dia tonga tamin i Zakaria mpaminany, zanak''i Berekia, zanak''Ido, ny tenin''i Jehovah nanao,hoe: '
  '8':
  - type: text
    content: Nahita tamin'ny alina aho fa, indro, nisy lehilahy nitaingina soavaly mena ka nijanona teny amin'ny rotra
  - type: note
    content: myrta
  - type: text
    content: ' teny an-dohasaha'
  - type: note
    content: 'Na: amin''ny alokaloka'
  - type: text
    content: ', ary teo aoriany nisy soavaly mena sy mavo ary fotsy. '
  '9':
  - type: text
    content: 'Dia hoy izaho: Tompoko ô, inona moa ireo? Ary ilay anjely niresaka tamiko dia nanao tamiko hoe: Izaho haneho anao ny amin''ireo. '
