document_id: PRO.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiantsoana sy fananarana ataon'ny fahendrena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny Ohabolan''i Solomona, zanak''i Davida, mpanjakan''ny Isiraely: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hahalalana fahendrena sy fananarana, Ary hahafantarana ny tenin''ny fahalalana; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hahazoana fananarana mampahahendry, Dia fahamarinana sy rariny ary fahitsiana; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Hanomezam-pahendrena ho an''ny kely saina, Ary fahalalana sy fisainana mazava ho an''ny zatovo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Aoka ny hendry hihaino ka hitombo saina; Ary aoka ny manam-panahy hahazo fitarihana tsara; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hahafantarana ohabolana sy fanoharana, Ary ny tenin''ny hendry sy ny teny saro-pantarina ataony. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny fahatahorana an'i Jehovah no fiandoham-pahalalana; Fa ny adala manamavo ny fahendrena sy ny famaizana. Fananarana tsy hikambana amin'ny mpanao ratsy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Anaka, mihainoa ny ana-drainao, Ary aza mahafoy ny lalàn-dreninao; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa fehiloha tsara tarehy amin'ny lohanao izany, Ary rado amin'ny vozonao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Anaka, raha taomin''ny mpanota ianao, Aza manaiky. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Raha hoy izy: Andeha hiaraka isika, Aoka isika hanotrika handatsa-drà; Andeha hamitsahantsika tsy ahoan-tsy ahoana ny tsy manan-tsiny; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aoka isika hitelina azy velona tahaka ny fitelin'ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: ' Ary hanao azy teli-moka toy ny latsaka any an-davaka; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia ho azontsika ny fananana sarobidy rehetra, Ka hofenointsika babo ny tranontsika; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Avia mba hiara-miloka eto aminay; Aoka ho iray ihany ny kitapom-bolantsika rehetra: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Anaka, aza miara-dalana aminy ianao; Arovy ny tongotrao tsy hankamin''ny alehany; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa ny tongony mihazakazaka ho amin''ny ratsy Sady faingana handatsa-drà. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa velarim-poana ny fandrika, Raha hitan''ny vorona. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa ireny dia manotrika handatsaka ny ran''ny tenany ihany; Mamitsaka hahafaty ny tenany ihany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Toy izany no iafaran'izay rehetra fatra-pila harena; Fa hipaoka ny ain'izay fatra-pila azy izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny fahendrena miantso mafy eny ivelany; Manandratra ny feony eny an-kalalahana izy; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mitory ao amin''izay fivorian''ny maro be mireondreona izy; Eo anoloan''ny vavahady sy ao an-tanàna no ilazany ny teniny hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ry kely saina, mandra-pahoviana no hitiavanareo ny fahadalana, Sy hifalian''ny mpaniratsira amin''ny faniratsirana, Ary hankahalan''ny adala ny fahalalana? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Miverena ianareo hihaino ny fananarako; Indro, haidiko aminareo ny fanahiko, Ary hampahafantariko anareo ny teniko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Satria efa niantso Aho, fa nandà ianareo; Efa naninjitra ny tanako Aho, fa tsy nisy nitandrina; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa nolavinareo ny saina rehetra natolotro, Sady tsy nety nanaiky ny anatro ianareo: '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Izaho kosa hihomehy, raha tonga ny fandringanana anareo; Handatsa Aho, raha tonga ny mahatahotra anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Raha tonga ny zava-mahatahotra anareo tahaka ny rivo-doza Ary ny fandringanana anareo toy ny tadio, Ka manjo anareo ny fahoriana sy ny fangirifiriana, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia vao hiantso Ahy izy, fa tsy hamaly Aho; Dia vao hitady Ahy fatratra izy, fa tsy ho hitany Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Satria nankahala ny fahalalana izy Ary tsy nifidy ny fahatahorana an''i Jehovah, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Tsy nekeny ny saina natolotro, Notsiratsirainy avokoa ny anatro rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia hihinana ny vokatry ny alehany izy Ka ho voky ny fihendreny. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa ny fihemoran''ny kely saina hahafaty azy, Ary ny fiadanan''ny adala handringana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Fa izay mihaino Ahy kosa hitoetra tsy manana ahiahy, Eny, handry fahizay izy ka tsy hatahotra ny ratsy.
