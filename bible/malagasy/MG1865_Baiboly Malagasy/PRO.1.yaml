document_id: PRO.1,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoana sy fananarana ataon'ny fahendrena
  - type: text
    content: 'Ny Ohabolan''i Solomona, zanak''i Davida, mpanjakan''ny Isiraely: '
  '10':
  - type: text
    content: 'Anaka, raha taomin''ny mpanota ianao, Aza manaiky. '
  '11':
  - type: text
    content: 'Raha hoy izy: Andeha hiaraka isika, Aoka isika hanotrika handatsa-drà; Andeha hamitsahantsika tsy ahoan-tsy ahoana ny tsy manan-tsiny; '
  '12':
  - type: text
    content: Aoka isika hitelina azy velona tahaka ny fitelin'ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola
  - type: text
    content: ' Ary hanao azy teli-moka toy ny latsaka any an-davaka; '
  '13':
  - type: text
    content: 'Dia ho azontsika ny fananana sarobidy rehetra, Ka hofenointsika babo ny tranontsika; '
  '14':
  - type: text
    content: 'Avia mba hiara-miloka eto aminay; Aoka ho iray ihany ny kitapom-bolantsika rehetra: '
  '15':
  - type: text
    content: 'Anaka, aza miara-dalana aminy ianao; Arovy ny tongotrao tsy hankamin''ny alehany; '
  '16':
  - type: text
    content: 'Fa ny tongony mihazakazaka ho amin''ny ratsy Sady faingana handatsa-drà. '
  '17':
  - type: text
    content: 'Fa velarim-poana ny fandrika, Raha hitan''ny vorona. '
  '18':
  - type: text
    content: 'Fa ireny dia manotrika handatsaka ny ran''ny tenany ihany; Mamitsaka hahafaty ny tenany ihany izy. '
  '19':
  - type: text
    content: Toy izany no iafaran'izay rehetra fatra-pila harena; Fa hipaoka ny ain'izay fatra-pila azy izany.
  '2':
  - type: text
    content: 'Hahalalana fahendrena sy fananarana, Ary hahafantarana ny tenin''ny fahalalana; '
  '20':
  - type: text
    content: 'Ny fahendrena miantso mafy eny ivelany; Manandratra ny feony eny an-kalalahana izy; '
  '21':
  - type: text
    content: 'Mitory ao amin''izay fivorian''ny maro be mireondreona izy; Eo anoloan''ny vavahady sy ao an-tanàna no ilazany ny teniny hoe: '
  '22':
  - type: text
    content: 'Ry kely saina, mandra-pahoviana no hitiavanareo ny fahadalana, Sy hifalian''ny mpaniratsira amin''ny faniratsirana, Ary hankahalan''ny adala ny fahalalana? '
  '23':
  - type: text
    content: Miverena ianareo hihaino ny fananarako; Indro, haidiko aminareo ny fanahiko, Ary hampahafantariko anareo ny teniko.
  '24':
  - type: text
    content: 'Satria efa niantso Aho, fa nandà ianareo; Efa naninjitra ny tanako Aho, fa tsy nisy nitandrina; '
  '25':
  - type: text
    content: 'Fa nolavinareo ny saina rehetra natolotro, Sady tsy nety nanaiky ny anatro ianareo: '
  '26':
  - type: text
    content: 'Izaho kosa hihomehy, raha tonga ny fandringanana anareo; Handatsa Aho, raha tonga ny mahatahotra anareo. '
  '27':
  - type: text
    content: 'Raha tonga ny zava-mahatahotra anareo tahaka ny rivo-doza Ary ny fandringanana anareo toy ny tadio, Ka manjo anareo ny fahoriana sy ny fangirifiriana, '
  '28':
  - type: text
    content: 'Dia vao hiantso Ahy izy, fa tsy hamaly Aho; Dia vao hitady Ahy fatratra izy, fa tsy ho hitany Aho. '
  '29':
  - type: text
    content: 'Satria nankahala ny fahalalana izy Ary tsy nifidy ny fahatahorana an''i Jehovah, '
  '3':
  - type: text
    content: 'Hahazoana fananarana mampahahendry, Dia fahamarinana sy rariny ary fahitsiana; '
  '30':
  - type: text
    content: 'Tsy nekeny ny saina natolotro, Notsiratsirainy avokoa ny anatro rehetra, '
  '31':
  - type: text
    content: 'Dia hihinana ny vokatry ny alehany izy Ka ho voky ny fihendreny. '
  '32':
  - type: text
    content: 'Fa ny fihemoran''ny kely saina hahafaty azy, Ary ny fiadanan''ny adala handringana azy. '
  '33':
  - type: text
    content: Fa izay mihaino Ahy kosa hitoetra tsy manana ahiahy, Eny, handry fahizay izy ka tsy hatahotra ny ratsy.
  '4':
  - type: text
    content: 'Hanomezam-pahendrena ho an''ny kely saina, Ary fahalalana sy fisainana mazava ho an''ny zatovo. '
  '5':
  - type: text
    content: 'Aoka ny hendry hihaino ka hitombo saina; Ary aoka ny manam-panahy hahazo fitarihana tsara; '
  '6':
  - type: text
    content: 'Hahafantarana ohabolana sy fanoharana, Ary ny tenin''ny hendry sy ny teny saro-pantarina ataony. '
  '7':
  - type: text
    content: Ny fahatahorana an'i Jehovah no fiandoham-pahalalana; Fa ny adala manamavo ny fahendrena sy ny famaizana. Fananarana tsy hikambana amin'ny mpanao ratsy.
  '8':
  - type: text
    content: 'Anaka, mihainoa ny ana-drainao, Ary aza mahafoy ny lalàn-dreninao; '
  '9':
  - type: text
    content: Fa fehiloha tsara tarehy amin'ny lohanao izany, Ary rado amin'ny vozonao.
