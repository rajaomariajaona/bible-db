document_id: PSA.128,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hatsaran'ny tokan-tranon'ny olona matahotra an'Andriamanitra
  - type: text
    content: Fihirana fiakarana
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga'
  - type: text
    content: '. Sambatra izay rehetra matahotra an''i Jehovah, Dia izay mandeha amin''ny lalany. '
  '2':
  - type: text
    content: 'Fa hohaninao tokoa ny asan''ny tananao; Sambatra sady ambinina ianao. '
  '3':
  - type: text
    content: 'Ny vadinao dia tahaka ny voaloboka mahavokatra Ao anatin''ny tranonao; Ny zanakao dia tahaka ny zanak''oliva Manodidina ny latabatrao. '
  '4':
  - type: text
    content: 'Indro, fa toy izany no hitahiana Izay lehilahy matahotra an''i Jehovah. '
  '5':
  - type: text
    content: 'Hitahy anao avy any Ziona anie Jehovah; Ary ho faly hahita ny fahasoavan''i Jerosalema anie ianao Amin''ny andro rehetra hiainanao. '
  '6':
  - type: text
    content: Eny, hahita ny zafinao anie ianao; Fiadanana anie ho amin'ny Isiraely.
