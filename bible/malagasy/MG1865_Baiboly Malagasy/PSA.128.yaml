document_id: PSA.128,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hatsaran'ny tokan-tranon'ny olona matahotra an'Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fihirana fiakarana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Fihirana misy hevitra ambaratonga'
      marker-yv: yv-n
    - type: text
      text: '. Sambatra izay rehetra matahotra an''i Jehovah, Dia izay mandeha amin''ny lalany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hohaninao tokoa ny asan''ny tananao; Sambatra sady ambinina ianao. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vadinao dia tahaka ny voaloboka mahavokatra Ao anatin''ny tranonao; Ny zanakao dia tahaka ny zanak''oliva Manodidina ny latabatrao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, fa toy izany no hitahiana Izay lehilahy matahotra an''i Jehovah. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hitahy anao avy any Ziona anie Jehovah; Ary ho faly hahita ny fahasoavan''i Jerosalema anie ianao Amin''ny andro rehetra hiainanao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, hahita ny zafinao anie ianao; Fiadanana anie ho amin'ny Isiraely.
