document_id: 1JN.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fananarana mba tsy ho tia izao tontolo izao, na hofitahin'ny antikristy, fa mba hiorina tsara ao amin'i Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Anaka, izany zavatra izany no soratako ny aminareo mba tsy hanotanareo. Ary raha misy manota, dia manana Solovava
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. parakleto; izahao Jao. xiv. 16
    marker-yv: yv-n
  - type: text
    text: ' ao amin''ny Ray isika, dia Jesosy Kristy, Ilay Marina; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ary Izy no avotra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fanatitra fampiononam-pahatezerana; izahao Rom. iii, 25'
    marker-yv: yv-n
  - type: text
    text: ' noho ny fahotantsika, ary tsy noho ny antsika ihany, fa noho ny an''izao tontolo izao koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary izao no ahafantarantsika fa mahalala Azy isika, dia ny fitandremana ny didiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izay manao hoe: Fantatro Izy, nefa tsy mitandrina ny didiny, dia mpandainga, ary ny marina tsy ao anatiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa na iza na iza mitandrina ny teniny, dia tanteraka ao aminy marina tokoa ny fitiavana an'Andriamanitra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny fitiavan''Andriamanitra'
    marker-yv: yv-n
  - type: text
    text: ' izany no ahafantarantsika fa ao aminy isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izay
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Izao no ahafantarantsika fa ao aminy isika: Izay etc'
    marker-yv: yv-n
  - type: text
    text: ' milaza fa mitoetra ao aminy izy, dia tsy maintsy mandeha toy izay nandehanany koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ry malala, tsy didy vaovao no soratako aminareo, fa didy ela, izay nanananareo hatramin''ny voalohany. Ny didy ela dia izay teny efa renareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary koa, didy vaovao no soratako aminareo, dia zavatra marina eo aminy sy eo aminareo, satria miala ny maizina, ary ny mazava marina no mahazava ankehitriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izay milaza fa ao amin''ny mazava izy, kanefa mankahala ny rahalahiny, dia mbola ao amin''ny maizina ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izay tia ny rahalahiny no mitoetra ao amin''ny mazava, ka tsy misy fahatafintohinana ao aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa izay mankahala ny rahalahiny dia ao amin'ny maizina ary mandeha ao amin'ny maizina ka tsy mahalala izay alehany, satria ny maizina no efa nahajamba ny masony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Manoratra aminareo zanaka aho, satria voavela ny helokareo noho ny anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Manoratra aminareo ray aho, satria efa mahalala Ilay hatramin'ny voalohany ianareo. Manoratra aminareo zatovo aho, satria efa naharesy ilay ratsy ianareo. Nanoratra taminareo ankizy madinika aho satria efa mahalala ny Ray ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Nanoratra taminareo ray aho, satria efa nahalala Ilay hatramin'ny voalohany ianareo. Nanoratra taminareo zatovo aho, satria mahery ianareo, ary mitoetra ao anatinareo ny tenin'Andriamanitra, sady efa naharesy ilay ratsy ianareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Aza tia izao tontolo izao, na izay zavatra eo amin''izao tontolo izao. Raha misy olona tia izao tontolo izao dia tsy ao anatiny ny fitiavana ny Ray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa ny zavatra rehetra eo amin''izao tontolo izao, dia ny filan''ny nofo sy ny filan''ny maso ary ny rehaka momba izao fiainana izao, dia tsy avy amin''ny Ray, fa avy amin''izao tontolo izao ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary mandalo izao fiainana izao sy ny filany; fa izay manao ny sitrapon''Andriamanitra no maharitra mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Rankizy, izao no ora farany, ary tahaka ny efa renareo fa ho avy ny
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ilay'
    marker-yv: yv-n
  - type: text
    text: ' antikristy, sady maro no antikristy efa tonga sahady; koa izany no ahafantarantsika fa izao no ora farany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Avy tamintsika ihany no niala ireo, nefa tsy mba namantsika izy; fa raha tàhiny namantsika izy, dia ho nitoetra tamintsika ihany; fa efa niala izy, mba haseho fa tsy isantsika izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa ianareo kosa manana hosotra avy amin''ilay Masina ka mahalala ny zavatra rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tsy noho ny tsy ahafantaranareo ny marina no nanoratako taminareo, fa noho ny ahafantaranareo izany sy noho ny tsi-fisiana lainga avy amin''ny marina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Iza no mpandainga, afa-tsy ilay mandà an'i Jesosy tsy ho Kristy? Izy no antikristy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ilay antikristy'
    marker-yv: yv-n
  - type: text
    text: ', dia izay mandà ny Ray sy ny Zanaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Izay rehetra mandà ny Zanaka no tsy manana ny Ray koa; izay manaiky ny Zanaka no manana ny Ray koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ny aminareo, dia izay efa renareo hatramin''ny voalohany no aoka hitoetra ao anatinareo. Raha mitoetra ao anatinareo izay efa renareo hatramin''ny voalohany, dia hitoetra ao amin''ny Zanaka sy ny Ray kosa ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary izao no teny fikasana izay nataony tamintsika, dia ny fiainana mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Izany zavatra izany no voasoratro taminareo ny amin''ny mamitaka anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary ny aminareo, dia ilay hosotra noraisinareo taminy no mitoetra ao aminareo, ka tsy mila hampianarin''olona ianareo; fa satria ny hosotra avy aminy no mampianatra anareo ny zavatra rehetra, sady marina, fa tsy lainga izany, dia tomoera ao aminy ianareo, araka ny nampianarany anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary ankehitriny, anaka, tomoera ao aminy, mba hananantsika fahasahiana, raha hiseho Izy, ka tsy ho menatra eo anatrehany amin''ny fihaviany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Raha fantatrareo fa marina Izy, dia fantaro fa izay rehetra manao ny marina no zanany naterany.
