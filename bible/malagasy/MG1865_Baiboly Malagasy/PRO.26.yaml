document_id: PRO.26,96
type_code: plt
verses:
  '1':
  - type: text
    content: Toy ny oram-panala amin'ny lohataona, Ary toy ny ranonorana amin'ny taom-pijinjana, Dia toy izany ny voninahitra tsy tandrifiny ho an'ny adala.
  '10':
  - type: text
    content: Ny mpiasa mahay dia mahavita ny zavatra isan-karazany; Fa izay manakarama ny adala dia toy ny manakarama izay sendra mandalo
  - type: note
    content: 'Na: Toy ny mpandefa zana-tsipìka mahavoa ny olona rehetra, Dia toy izany ny manakarama ny adala sy manakarama izay sendra mandalo'
  - type: text
    content: '. '
  '11':
  - type: text
    content: Toy ny amboa miverina amin'ny loany, Dia toy izany ny adala miverina amin'ny hadalany.
  '12':
  - type: text
    content: Hitanao va ny olona manao azy ho hendry? Ny adala misy hantenaina kokoa noho izy.
  '13':
  - type: text
    content: 'Hoy ny malaina: Misy liona any an-dalana, Misy liona atsy an-dalambe.'
  '14':
  - type: text
    content: Toy ny varavarana mihodina amin'ny saviliny, Dia toy izany ny kamo eo amin'ny fandriany,
  '15':
  - type: text
    content: Ny malaina mangarona ny eo an-doviany, Nefa ny hampakatra azy ho amin'ny vavany dia mahasasatra azy.
  '16':
  - type: text
    content: Ny kamo manao ny tenany ho hendry mihoatra noho ny olona fito izay mahavaly tsara.
  '17':
  - type: text
    content: Izay mandalo ka mitsaraingona amin'ny ady tsy azy Dia mandroritra amboa amin'ny sofiny.
  '18':
  - type: text
    content: 'Toy ny adala izay manely afo sy zana-tsipìka ary fahafatesana, '
  '19':
  - type: text
    content: 'Dia toy izany ny olona mamitaka ny namany ka manao hoe: Tsy vosobosotra ihany va no ataoko?'
  '2':
  - type: text
    content: 'Toy ny vorona mivezivezy sy ny sidintsidina manidina, Dia toy izany ny fanozonam-poana: tsy mba hihatra izany.'
  '20':
  - type: text
    content: Raha tsy misy kitay intsony, dia maty ny afo; Ary raha tsy misy mpifosafosa intsony, dia mitsahatra ny fifandirana.
  '21':
  - type: text
    content: Toy ny arina atao amin'ny vainafo sy ny kitay hazo atao amin'ny afo, Dia toy izany, ny olona tia ady mandrehitra fifandirana.
  '22':
  - type: text
    content: 'Ny tenin''ny mpifosafosa dia toy ny hanim-py ka mikorotsaka ao anaty kibo indrindra. '
  '23':
  - type: text
    content: Tavim-bilany misy ankosotra taim-bolafotsy ny molotra mihatsaravelatsihy
  - type: note
    content: Heb. mirehitra
  - type: text
    content: ' sy ny fo ratsy.'
  '24':
  - type: text
    content: 'Ny mpandrafy dia mody ho hafa amin''ny molony Sady manafim-pitaka ao am-pony; '
  '25':
  - type: text
    content: 'Koa na dia miteny soa aza izy, aza mino azy; Fa fahavetavetana fito no ao am-pony. '
  '26':
  - type: text
    content: Ny lolompo dia miafina ao amin'ny fitaka; Nefa ny haratsiany dia haharihary eo am-pahibemaso.
  '27':
  - type: text
    content: Izay mihady lavaka no ho latsaka ao, Ary izay manakodiadia vato no hikodiavany kosa.
  '28':
  - type: text
    content: Halan'ny lela mandainga izay efa nampahoriny, Ary ny vava mandrobo dia mampidi-doza.
  '3':
  - type: text
    content: Ny karavasy ho amin'ny soavaly ny lamboridy ho amin'ny boriky, Ary ny tsorakazo kosa ho amin'ny lamosin'ny adala.
  '4':
  - type: text
    content: Aza mamaly ny adala araka ny hadalany, Fandrao mba adala tahaka azy koa ianao.
  '5':
  - type: text
    content: Valio ny adala araka ny hadalany, Fandrao dia manao azy ho hendry izy
  '6':
  - type: text
    content: 'Manapaka ny tongony sady misotro loza Izay mampitondra teny ny adala. '
  '7':
  - type: text
    content: Mikepikepika ny tongotry ny malemy tongotra, Dia toy izany ny ohabolana eo am-bavan'ny adala.
  '8':
  - type: text
    content: 'Toy ny manisy vato eo amin''ny antsamotady, Dia toy izany ny manome voninahitra ny adala. '
  '9':
  - type: text
    content: Toy ny tsilo eny an-tànan'ny olona mamo, Dia toy izany ny ohabolana eo am-bavan'ny adala.
