document_id: JHN.13,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary talohan''ny andro firavoravoana tamin''ny Paska, satria fantatr''i Jesosy fa tonga ny fotoana hialany amin''izao tontolo izao ho any amin''ny Ray, ary efa tia ny Azy izay amin''izao tontolo izao Izy, dia tia azy hatramin''ny farany. '
  '10':
  - type: text
    content: 'Fa hoy Jesosy taminy: Izay efa nandro tsy mila hosasana, afa-tsy ny tongotra ihany, fa efa madio avokoa; ary ianareo dia madio, nefa tsy ianareo rehetra. '
  '11':
  - type: text
    content: 'Fa fantany ilay efa hamadika Azy; koa izany no nilazany hoe: Tsy madio avokoa ianareo rehetra. '
  '12':
  - type: text
    content: 'Ary rehefa voasasany ny tongony, dia nandray ny lambany Izy ka nipetraka indray, dia nanao taminy hoe: Fantatrareo va izay nataoko taminareo? '
  '13':
  - type: text
    content: 'Hianareo manao Ahy hoe Mpampianatra sy Tompo; ary marina ny filazanareo, fa izany tokoa Aho. '
  '14':
  - type: text
    content: 'Koa raha Izaho, Tompo sy Mpampianatra aza, no nanasa ny tongotrareo, ianareo kosa mba tokony hifanasa tongotra. '
  '15':
  - type: text
    content: 'Fianarana no nomeko anareo, mba hanaovanareo araka izay nataoko taminareo. '
  '16':
  - type: text
    content: 'Lazaiko aminareo marina dia marina tokoa: Ny andevo tsy lehibe noho ny tompony, na ny iraka noho ny maniraka azy. '
  '17':
  - type: text
    content: 'Raha fantatrareo izany, dia sambatra ianareo, raha manao izany. '
  '18':
  - type: text
    content: 'Tsy milaza anareo rehetra Aho; fa fantatro izay nofidiko; fa mba hahatanteraka ny Soratra Masina hoe: Izay homana ny mofoko'
  - type: note
    content: 'Na: miara-komana amiko'
  - type: text
    content: ' no nanangana ny ombelahin-tongony hamely Ahy (Sal. 41. 9). '
  '19':
  - type: text
    content: 'Hatramin''izao dia milaza aminareo Aho, raha tsy mbola tonga izany, mba hinoanareo, rehefa tonga, fa Izaho no Izy. '
  '2':
  - type: text
    content: 'Ary raha mbola teo amin''ny fisakafoana hariva, ary Jodasy Iskariota, zanak''i Simona, efa nomen''ny devoly saina rahateo mba hamadika Azy, '
  '20':
  - type: text
    content: 'Lazaiko aminareo marina dia marina tokoa: Izay mandray izay hirahiko dia mandray Ahy; ary izay mandray Ahy dia mandray izay naniraka Ahy. '
  '21':
  - type: text
    content: 'Rehefa nilaza izany Jesosy, dia nangorohoro ny fanahiny, ka nanambara hoe Izy: Lazaiko aminareo marina dia marina tokoa fa ny anankiray aminareo no hamadika Ahy. '
  '22':
  - type: text
    content: 'Dia nifampijerijery ny mpianatra ka nieritreritra izay iray nolazainy. '
  '23':
  - type: text
    content: 'Ary nisy mpianatra anankiray nipetraka nihinana teo anilan''i Jesosy, dia ilay tian''i Jesosy. '
  '24':
  - type: text
    content: 'Simona Petera nanatsika azy ka nanao taminy hoe: Lazao izay izy. '
  '25':
  - type: text
    content: 'Ary raha mbola nipetraka tahaka izany izy, dia niraika ho amin''ny tratran''i Jesosy ka nanao taminy hoe: Tompoko, iza moa izany? '
  '26':
  - type: text
    content: 'Dia namaly Jesosy ka nanao hoe: Ilay homeko ny sombin-kanina lemako no izy. Ary rehefa nolemany ny sombin-kanina, dia noraisiny ka nomeny an''i Jodasy, zanak''i Simona Iskariota. '
  '27':
  - type: text
    content: 'Ary manaraka izany no nidiran''i Satana tao aminy, ka hoy Jesosy taminy: Izay ataonao dia ataovy faingana. '
  '28':
  - type: text
    content: 'Fa tsy nisy tamin''izay nipetraka nihinana nahalala ny anton''ny nilazany izany taminy. '
  '29':
  - type: text
    content: 'Fa nataon''ny sasany fa satria Jodasy no nitondra ny kitapo, no nilazan''i Jesosy taminy hoe: Vidio ny zavatra ilaintsika amin''ny andro firavoravoana, na mba hanome zavatra ho an''ny malahelo. '
  '3':
  - type: text
    content: 'sady fantatr''i Jesosy koa fa ny Ray efa nanolotra ny zavatra rehetra ho eo an-tànany, ary Andriamanitra no nihaviany, sady Andriamanitra koa no hiverenany, '
  '30':
  - type: text
    content: 'Ary rehefa nandray ny sombin-kanina izy, dia nivoaka niaraka tamin''izay; ary efa alina ny andro. '
  '31':
  - type: text
    content: 'Ary tamin''izay, nony efa nivoaka izy, dia hoy Jesosy: Ankehitriny dia efa ankalazaina ny Zanak''olona; ary Andriamanitra no ankalazaina eo aminy. '
  '32':
  - type: text
    content: 'Ary Andriamanitra kosa hankalaza Azy amin''ny tenany; eny, hankalaza Azy miaraka amin''izay Izy. '
  '33':
  - type: text
    content: 'Anaka, vetivety foana no sisa hitoerako eto aminareo. Hitady Ahy ianareo, ary araka ny voalazako tamin''ny Jiosy hoe: Izay alehako tsy azonareo haleha, dia toy izany koa no lazaiko aminareo ankehitriny. '
  '34':
  - type: text
    content: 'Didy vaovao no omeko anareo, dia ny mba hifankatiavanareo; eny, aoka ho tahaka ny fitiavako anareo no mba hifankatiavanareo kosa. '
  '35':
  - type: text
    content: 'Izany no hahafantaran''ny olona rehetra fa mpianatro ianareo, raha mifankatia. '
  '36':
  - type: text
    content: 'Hoy Simona Petera taminy: Tompoko, hankaiza moa Hianao? Jesosy namaly hoe: Izay alehako, dia tsy azonao anarahana Ahy ankehitriny fa hanaraka Ahy ihany ianao rahatrizay. '
  '37':
  - type: text
    content: 'Hoy Petera taminy: Tompoko, nahoana no tsy mahazo manaraka Anao ankehitriny aho? Na ny aiko aza dia hafoiko noho ny aminao. '
  '38':
  - type: text
    content: 'Jesosy namaly hoe: Ny ainao va no hafoinao noho ny amiko? Lazaiko aminao marina dia marina tokoa: Tsy mbola hisy akoho haneno mandra-pandànao Ahy intelo.'
  '4':
  - type: text
    content: 'dia nitsangana niala teo am-pihinanana Izy ka nametraka ny lambany ary naka lamba famaohana, ka nisikinany; '
  '5':
  - type: text
    content: 'ary rehefa vita izany, dia nampidina rano tamin''ny tavy Izy ka nanomboka nanasa ny tongotry ny mpianatra sy namaoka azy tamin''ny lamba famaohana izay nisikinany. '
  '6':
  - type: text
    content: 'Dia nankeo amin''i Simona Petera Izy; fa hoy Petera taminy: Tompoko, Hianao va hanasa ny tongotro? '
  '7':
  - type: text
    content: 'Jesosy namaly ka nanao taminy hoe: Izay ataoko dia tsy fantatrao ankehitriny, fa ho fantatrao rahatrizay. '
  '8':
  - type: text
    content: 'Fa hoy Petera taminy: Sanatria raha hanasa ny tongotro Hianao. Jesosy namaly azy hoe: Raha tsy hosasako ianao, dia tsy manana anjara amiko. '
  '9':
  - type: text
    content: 'Dia hoy Simona Petera taminy: Tompoko, tsy ny tongotro ihany ary, fa ny tanako sy ny lohako koa. '
