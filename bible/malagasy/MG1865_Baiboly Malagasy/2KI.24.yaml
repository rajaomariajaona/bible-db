document_id: 2KI.24,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanjakan'i Zedekia, sy ny nandravana an'i Jerosalema, ary ny toetry ny olona sisa sy Joiakina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin''ny andro nanjakan''i Joiakima no niakaran''i Nebokadnezara, mpanjakan''i Babylona, ary nanoa azy telo taona Joiakima, dia nivadika ka niodina taminy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Tamin''izany andro izany no niakaran''ny mpanompon''i Nebokadnezara. mpanjakan''i Babylona, hamely an''i Jerosalema, ary nataony fahirano ny tanàna. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia tonga koa Nebokadnezera, mpanjakan''i Babylona, hamely ny tanàna, raha mbola nanao fahirano azy ny mpanompony. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary Joiakina, mpanjakan'ny Joda, nivoaka nankany amin'ny mpanjakan'i Babylona, dia izy sy ny reniny ary ny mpanompony sy ny mpanapaka mbamin'ny tandapany
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ionoka
      marker-yv: yv-n
    - type: text
      text: '; ary nentin''ny mpanjakan''i Babylona izy tamin''ny taona fahavalo nanjakany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary navoakan''i Nebokadnezara avy tao ny rakitra rehetra tao an-tranon''i Jehovah sy tao an-tranon''ny mpanjaka, dia nendahany ny volamena rehetra izay nataon''i Solomona, mpanjakan''ny Isiraely, tao amin''ny tempolin''i Jehovah, araka izay nolazain''i Jehovah. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary nentiny ho babo ny tao Jerosalema rehetra sy ny mpanapaka rehetra sy ny lehilahy mahery rehetra, dia olona iray alina, mbamin''ny mahay tao-zavatra rehetra sy ny mpanefy koa, ka tsy nisy sisa navelany afa-tsy izay tompon-tany faraidina. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary nitondra an'i Joiakina koa ho babo any Babylona izy; ary ny renin'ny mpanjaka sy ny vadin'ny mpanjaka sy ny tandapa
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ionoka
      marker-yv: yv-n
    - type: text
      text: ' sy ny lehilahy mahery amin''ny tany dia nentiny ho babo avy tany Jerosalema ho any Babylona. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary ny lehilahy mahery rehetra, dia fito arivo, ary ny mahay tao-zavatra sy ny mpanefy arivo lahy, izay samy mahery sy mahay miady, dia nentin''ny mpanjakan''i Babylona ho babo tany Babylona avokoa. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary Matania, rahalahin-drainy, no notendren'ny mpanjakan'i Babylona ho mpanjaka hisolo an'i Joiakina, ka novany hoe Zedekia no anarany.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Iraika amby roa-polo taona Zedekia, fony izy vao nanjaka, ary iraika ambin''ny folo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Hamotala, zanakavavin''i Jeremia, avy any Libna. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary nanao izay ratsy eo imason''i Jehovah izy, tahaka izay rehetra nataon''i Joiakima. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary Jehovah nampandeha ny miaramilan''ny Kaldeana sy ny miaramilan''ny Syriana sy ny miaramilan''i Moaba ary ny miaramilan''ny taranak''i Amona hiady aminy: dia nampandehaniny hiady amin''ny Joda ireo mba handrava azy araka ny tenin''i Jehovah, izay nampilazainy ny mpaminany mpanompony. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Fa ny fahatezeran'i Jehovah no nahatongavan'izany tamin'i Jerosalema sy ny Joda ambara-pandroakany azy tsy ho eo anatrehany. Ary Zedekia niodina tamin'ny mpanjakan'i Babylona.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia araka ny tenin''i Jehovah ihany no nahatongavan''izany tamin''ny Joda, hanesorany azy tsy ho eo imasony noho ny fahotan''i Manase tahaka izay rehetra nataony '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: sy noho ny rà marina izay nalatsany koa; fa nofenoiny rà marina Jerosalema; koa izany no tsy netezan'i Jehovah hamela ny helony.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary ny tantaran''i Joiakima sisa mbamin''izay rehetra nataony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary Joiakima lasa nodimandry any amin''ny razany, ka Joiakina zanany no nanjaka nandimby azy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ary ny mpanjakan'i Egypta tsy nivoaka avy tany amin'ny taniny intsony; fa lasan'ny mpanjakan'i Babylona izay rehetra an'ny mpanjakan'i Egypta hatramin'ny lohasahan-driak'i Egypta ka hatramin'ny ony Eofrata.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Valo ambin''ny folo taona Joiakina, fony izy vao nanjaka, ary telo volana no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Nehosta, zanakavavin''i Elnatana, avy any Jerosalema. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary nanao izay ratsy eo imason''i Jehovah izy tahaka izay rehetra nataon-drainy. '
