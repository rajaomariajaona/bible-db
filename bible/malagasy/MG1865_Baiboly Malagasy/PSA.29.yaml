document_id: PSA.29,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiderana an'Andriamanitra noho ny heriny sy ny fiandrianany izay miseho amin'ny kotrokorana
  - type: text
    content: 'Salamo nataon''i Davida. Manomeza an''i Jehovah, ry zanak''Andriamanitra, eny, manomeza voninahitra sy hery ho an''i Jehovah. '
  '10':
  - type: text
    content: 'Jehovah nipetraka teo ambonin''ny safo-drano; eny, Jehovah mipetraka ho Mpanjaka mandrakizay. '
  '11':
  - type: text
    content: Jehovah hanome hery ny olony; Jehovah hitahy ny olony amin'ny fiadanana.
  '2':
  - type: text
    content: Omeo an'i Jehovah ny voninahitry ny anarany; miankohofa eo anatrehan'i Jehovah amin'ny fihaingoana masina.
  '3':
  - type: text
    content: 'Ny feon''i Jehovah no eny ambonin''ny rano be; Andriamanitry ny voninahitra no mampikotrokorana; Jehovah no eny ambonin''ny rano be. '
  '4':
  - type: text
    content: 'Ny feon''i Jehovah be hery; Ny feon''i Jehovah be voninahitra. '
  '5':
  - type: text
    content: 'Ny feon''i Jehovah manorotoro ny hazo sedera; eny, Jehovah manorotoro ny hazo sedera any Libanona. '
  '6':
  - type: text
    content: 'Dia mampitsambikina azy tahaka ny zanak''omby Izy, Libanona sy Siriona dia tahaka ny zanaky ny ombimanga. '
  '7':
  - type: text
    content: 'Ny feon''i Jehovah mampisaraka ny lelafo; '
  '8':
  - type: text
    content: 'Ny feon''i Jehovah mampihorohoro ny efitra; Jehovah mampihorohoro ny efitr''i Kadesy. '
  '9':
  - type: text
    content: 'Ny feon''i Jehovah mampiteraka ny dieravavy, ary mivofy ny ala be; ary ny ao an-tempoliny samy manao hoe: Voninahitra e!'
