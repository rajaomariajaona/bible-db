document_id: PSA.29
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiderana an'Andriamanitra noho ny heriny sy ny fiandrianany izay miseho amin'ny kotrokorana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Salamo nataon''i Davida. Manomeza an''i Jehovah, ry zanak''Andriamanitra, eny, manomeza voninahitra sy hery ho an''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Omeo an'i Jehovah ny voninahitry ny anarany; miankohofa eo anatrehan'i Jehovah amin'ny fihaingoana masina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny feon''i Jehovah no eny ambonin''ny rano be; Andriamanitry ny voninahitra no mampikotrokorana; Jehovah no eny ambonin''ny rano be. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny feon''i Jehovah be hery; Ny feon''i Jehovah be voninahitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny feon''i Jehovah manorotoro ny hazo sedera; eny, Jehovah manorotoro ny hazo sedera any Libanona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia mampitsambikina azy tahaka ny zanak''omby Izy, Libanona sy Siriona dia tahaka ny zanaky ny ombimanga. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny feon''i Jehovah mampisaraka ny lelafo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny feon''i Jehovah mampihorohoro ny efitra; Jehovah mampihorohoro ny efitr''i Kadesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny feon''i Jehovah mampiteraka ny dieravavy, ary mivofy ny ala be; ary ny ao an-tempoliny samy manao hoe: Voninahitra e!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jehovah nipetraka teo ambonin''ny safo-drano; eny, Jehovah mipetraka ho Mpanjaka mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Jehovah hanome hery ny olony; Jehovah hitahy ny olony amin'ny fiadanana.
