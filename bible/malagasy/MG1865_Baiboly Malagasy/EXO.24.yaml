document_id: EXO.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny namonoana fanatitra hanamafiana ny fanekena, sy ny nahitan'i Mosesy mbamin'ny loholon'ny Isiraely an'Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hoy Izy tamin''i Mosesy: Miakara ao amin''i Jehovah ianao sy Arona sy Nadaba sy Abiho ary fito-polo lahy amin''ny loholon''ny Isiraely; ka miankohofa eny lavitra eny ianareo; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: nefa Mosesy ihany no hanakaiky an'i Jehovah, fa ireo tsy mba hanakaiky; ary ny olona tsy hiakatra homba azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia tonga Mosesy ka nanambara tamin''ny olona ny teny rehetra izay nataon''i Jehovah sy ny fitsipika rehetra. Ary namaly indray miredona ny olona rehetra ka nanao hoe: Ny teny rehetra izay nolazain''i Jehovah dia hataonay. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Mosesy nanoratra ny teny rehetra nataon''i Jehovah, dia nifoha maraina koa ka nanorina alitara teo am-bodin''ny tendrombohitra sy tsangam-bato roa ambin''ny folo, araka ny firenen''Isiraely roa ambin''ny folo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny zatovo amin''ny Zanak''Isiraely nirahiny, dia nitondra fanatitra dorana ireo ka namono vantotr''ombilahy hatao fanati-pihavanana ho an''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nalain''i Mosesy ny antsasaky ny rà ka nataony teo anaty lovia, ary ny antsasaky ny rà kosa natopiny teo amin''ny alitara. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia naka ny bokin''ny fanekena izy ka namaky teny teo anatrehan''ny olona. Ary hoy ny olona: Izay rehetra nolazain''i Jehovah dia hataonay sy hekenay. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nalain''i Mosesy ny rà ka natopiny tamin''ny olona, dia hoy izy: Indro ny ran''ny fanekena izay nataon''i Jehovah taminareo ny amin''izany teny rehetra izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia niakatra Mosesy sy Arona sy Nadaba sy Abiho ary fito-polo lahy tamin''ny loholon''ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia nahita an''Andriamanitry ny Isiraely izy; koa ny teo ambanin''ny tongony dia toy ny fanganohanon''ny vato safira voavoatra, ary toy ny tenan''ny lanitra ny famirapirany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary tsy naninjitra ny tànany tamin''ireo lehiben''ny Zanak''Isiraely Izy; dia nahita an''Andriamanitra izy ireo, ary nihinana sy nisotro. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy Jehovah tamin''i Mosesy: Miakara eto amiko eto an-tendrombohitra ka mitoera eto, dia homeko anao ny vato fisaka izay misy ny lalàna sy ny didy, izay nosoratako hampianarina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia niainga Mosesy sy Josoa mpanompony; ary Mosesy dia niakatra tao an-tendrombohitr''Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hoy izy tamin''ny loholona: Miandrasa anay eto mandra-piverinay eto aminareo; ary, indro, Arona sy Hora dia eto aminareo, koa raha misy olona manana ady, aoka hankeo amin''izy roa lahy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia niakatra tao amin''ny tendrombohitra Mosesy, ary ny rahona nanarona ny tendrombohitra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ny voninahitr''i Jehovah nitoetra teo ambonin''ny tendrombohitra Sinay, ary ny rahona nanarona azy henemana; dia niantso an''i Mosesy tamin''ny andro fahafito teo afovoan''ny rahona Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny fijery ny voninahitr''i Jehovah teo an-tampon''ny tendrombohitra dia tahaka ny afo mandevona teo imason''ny Zanak ''Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Dia niditra tao afovoan'ny rahona Mosesy ka niakatra tao amin'ny tendrombohitra; ary nitoetra tao amin'ny tendrombohitra efa-polo andro sy efa-polo alina Mosesy.
