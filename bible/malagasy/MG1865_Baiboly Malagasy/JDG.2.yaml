document_id: JDG.2,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny toetry ny Isiraely tamin'ny andron'ny Mpitsara, ary ny anaran'ny firenena sisa mbola tsy resiny
  - type: text
    content: 'Ary Ilay Anjelin''i Jehovah niakatra avy tany Gilgala ka nankany Bokima, dia nanao hoe: Nitondra anareo niakatra avy tany Egypta Aho ka nampiditra anareo eto amin''ny tany izay nianianako tamin''ny razanareo homena azy, ka hoy Izaho: Tsy hanatsoaka ny fanekeko taminareo Aho mandrakizay; '
  '10':
  - type: text
    content: 'Ary izany taranaka rehetra izany koa dia voangona any amin''ny razany; ary taranaka hafa, izay tsy nahalala an''i Jehovah na ny asa efa nataony ho an''ny Isiraely, no nitsangana nandimby azy. '
  '11':
  - type: text
    content: 'Ary nanao izay ratsy eo imason''i Jehovah ny Zanak''Isiraely, fa nanompo ireo Bala '
  '12':
  - type: text
    content: 'ka nahafoy an''i Jehovah, Andriamanitry ny razany, Izay nitondra azy nivoaka avy tany amin''ny tany Egypta, ka nanaraka andriamani-kafa amin''ny andriamanitry ny firenena manodidina azy, dia niankohoka teo anatrehany ka nampahatezitra an''i Jehovah. '
  '13':
  - type: text
    content: 'Eny, nahafoy an''i Jehovah izy ka nanampo an''i Bala sy Astarta. '
  '14':
  - type: text
    content: 'Dia nirehitra tamin''ny Isiraely ny fahatezeran''i Jehovah, ka natolony teo an-tànan''ny mpamabo izay namabo azy izy, ary namidiny ho eo an-tànan''ny fahavalony manodidina azy ka tsy nahajanona teo anoloan''ny fahavalony intsony. '
  '15':
  - type: text
    content: 'Na taiza na taiza nivoahany, dia namely azy ny tanan''i Jehovah ka nampahory azy, araka izay efa nolazain''i Jehovah sy araka izay efa nianianany taminy; ka dia ory indrindra izy. '
  '16':
  - type: text
    content: 'Kanefa Jehovah nanangana mpitsara izay namonjy azy tamin''ny tànan''ireo namabo azy. '
  '17':
  - type: text
    content: 'Fa na dia ny mpitsara azy aza dia tsy mba nohenoiny, fa nandeha nijangajanga nanaraka andriamani-kafa izy ka niankohoka teo anatrehany; nivily faingana niala tamin''ny lalana izay nandehanan''ny razany nanaraka ny didin''i Jehovah izy, fa tsy mba nanaraka izany. '
  '18':
  - type: text
    content: 'Ary rehefa nanangana mpitsara ho azy Jehovah, dia nomba izany mpitsara izany Izy ka namonjy ny olona tamin''ny tanan''ny fahavalony tamin''ny andro rehetra niainan''izany mpitsara izany; fa nalahelo azy Jehovah amin''ny fitarainany noho ireo nampahory sy nampalahelo azy. '
  '19':
  - type: text
    content: 'Kanjo nony maty ilay mpitsara, dia nanao ratsy indray izy mihoatra noho ny nataon''ny razany, fa nanaraka andriamani-kafa sy nanompo azy ary niankohoka teo anatrehany izy; tsy nitsahatra tàmin''ny fanaony na tamin''ny lalana nanaovany ditra izy. '
  '2':
  - type: text
    content: 'koa aza manao fanekena amin''ny tompon-tany ianareo, fa ravao ny alitarany; kanefa tsy nihaino ny feoko ianareo; koa inona moa izao nataonareo izao? '
  '20':
  - type: text
    content: 'Dia nirehitra tamin''ny Isiraely ny fahatezeran''i Jehovah, ka hoy Izy: Satria nivadika ny fanekeko izay nandidiako ny razany ity firenena ity ka tsy nihaino ny feoko, '
  '21':
  - type: text
    content: 'dia tsy handroaka olona eo anoloany intsony Aho amin''ny firenena izay tsy mbola resy hatramin''ny andro nahafatesan''i Josoa, '
  '22':
  - type: text
    content: 'mba hizahako toetra ny Isiraely amin''ireny, na hitandrina ny lalan''i Jehovah ka handeha amin''izany araka izay nitandreman''ny razany izany izy, na tsia. '
  '23':
  - type: text
    content: Dia navelan'i Jehovah ireny firenena ireny ka tsy noroahiny faingana; sady tsy voatolony teo an-tànan'i Josoa ireny.
  '3':
  - type: text
    content: 'Ary hoy Izaho indray: Tsy handroaka azy eo anoloanareo Aho; fa ho tsilo eo amin''ny tehezanareo sy ho fandrika aminareo ny andriamaniny. '
  '4':
  - type: text
    content: 'Ary nony niteny izany teny izany tamin''ny Zanak''Isiraely rehetra Ilay Anjelin''i Jehovah, dia nanandratra ny feony ny vahoaka ka nitomany. '
  '5':
  - type: text
    content: Ary ny anaran'izany tany izany dia nataony hoe Bokima
  - type: note
    content: Bokima = Mitomany
  - type: text
    content: ; ary namono zavatra teo izy hatao fanatitra ho an'i Jehovah.
  '6':
  - type: text
    content: 'Ary rehefa nampodin''i Josoa ny vahoaka, dia nandeha ho any amin''ny lovany avy ny Zanak''Isiraely rehetra handova ny tany. '
  '7':
  - type: text
    content: 'Ary nanompo an''i Jehovah ny vahoaka tamin''ny andro rehetra niainan''i Josoa sy tamin''ny andro rehetra niainan''ny loholona izay velona taorian''i Josoa, dia ireo izay efa nahita ny asa lehibe rehetra nataon''i Jehovah ho an''ny Isiraely. '
  '8':
  - type: text
    content: 'Ary maty Josoa, zanak''i Nona, mpanompon''i Jehovah, rehefa folo amby zato taona ny androny. '
  '9':
  - type: text
    content: 'Dia nalevina tao anatin''ny fari-tanin''ny lovany izy, dia tao Timnata-heresa, any amin''ny tany havoan''i Efraima, avaratry ny tendrombohitra Gasa. '
