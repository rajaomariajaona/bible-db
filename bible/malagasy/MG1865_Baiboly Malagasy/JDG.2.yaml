document_id: JDG.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny toetry ny Isiraely tamin'ny andron'ny Mpitsara, ary ny anaran'ny firenena sisa mbola tsy resiny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Ilay Anjelin''i Jehovah niakatra avy tany Gilgala ka nankany Bokima, dia nanao hoe: Nitondra anareo niakatra avy tany Egypta Aho ka nampiditra anareo eto amin''ny tany izay nianianako tamin''ny razanareo homena azy, ka hoy Izaho: Tsy hanatsoaka ny fanekeko taminareo Aho mandrakizay; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'koa aza manao fanekena amin''ny tompon-tany ianareo, fa ravao ny alitarany; kanefa tsy nihaino ny feoko ianareo; koa inona moa izao nataonareo izao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy Izaho indray: Tsy handroaka azy eo anoloanareo Aho; fa ho tsilo eo amin''ny tehezanareo sy ho fandrika aminareo ny andriamaniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nony niteny izany teny izany tamin''ny Zanak''Isiraely rehetra Ilay Anjelin''i Jehovah, dia nanandratra ny feony ny vahoaka ka nitomany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ny anaran'izany tany izany dia nataony hoe Bokima
  - type: usfm
    marker: x
    children:
    - type: text
      text: Bokima = Mitomany
    marker-yv: yv-n
  - type: text
    text: ; ary namono zavatra teo izy hatao fanatitra ho an'i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary rehefa nampodin''i Josoa ny vahoaka, dia nandeha ho any amin''ny lovany avy ny Zanak''Isiraely rehetra handova ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nanompo an''i Jehovah ny vahoaka tamin''ny andro rehetra niainan''i Josoa sy tamin''ny andro rehetra niainan''ny loholona izay velona taorian''i Josoa, dia ireo izay efa nahita ny asa lehibe rehetra nataon''i Jehovah ho an''ny Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary maty Josoa, zanak''i Nona, mpanompon''i Jehovah, rehefa folo amby zato taona ny androny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nalevina tao anatin''ny fari-tanin''ny lovany izy, dia tao Timnata-heresa, any amin''ny tany havoan''i Efraima, avaratry ny tendrombohitra Gasa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary izany taranaka rehetra izany koa dia voangona any amin''ny razany; ary taranaka hafa, izay tsy nahalala an''i Jehovah na ny asa efa nataony ho an''ny Isiraely, no nitsangana nandimby azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nanao izay ratsy eo imason''i Jehovah ny Zanak''Isiraely, fa nanompo ireo Bala '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ka nahafoy an''i Jehovah, Andriamanitry ny razany, Izay nitondra azy nivoaka avy tany amin''ny tany Egypta, ka nanaraka andriamani-kafa amin''ny andriamanitry ny firenena manodidina azy, dia niankohoka teo anatrehany ka nampahatezitra an''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Eny, nahafoy an''i Jehovah izy ka nanampo an''i Bala sy Astarta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nirehitra tamin''ny Isiraely ny fahatezeran''i Jehovah, ka natolony teo an-tànan''ny mpamabo izay namabo azy izy, ary namidiny ho eo an-tànan''ny fahavalony manodidina azy ka tsy nahajanona teo anoloan''ny fahavalony intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Na taiza na taiza nivoahany, dia namely azy ny tanan''i Jehovah ka nampahory azy, araka izay efa nolazain''i Jehovah sy araka izay efa nianianany taminy; ka dia ory indrindra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Kanefa Jehovah nanangana mpitsara izay namonjy azy tamin''ny tànan''ireo namabo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa na dia ny mpitsara azy aza dia tsy mba nohenoiny, fa nandeha nijangajanga nanaraka andriamani-kafa izy ka niankohoka teo anatrehany; nivily faingana niala tamin''ny lalana izay nandehanan''ny razany nanaraka ny didin''i Jehovah izy, fa tsy mba nanaraka izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary rehefa nanangana mpitsara ho azy Jehovah, dia nomba izany mpitsara izany Izy ka namonjy ny olona tamin''ny tanan''ny fahavalony tamin''ny andro rehetra niainan''izany mpitsara izany; fa nalahelo azy Jehovah amin''ny fitarainany noho ireo nampahory sy nampalahelo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Kanjo nony maty ilay mpitsara, dia nanao ratsy indray izy mihoatra noho ny nataon''ny razany, fa nanaraka andriamani-kafa sy nanompo azy ary niankohoka teo anatrehany izy; tsy nitsahatra tàmin''ny fanaony na tamin''ny lalana nanaovany ditra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nirehitra tamin''ny Isiraely ny fahatezeran''i Jehovah, ka hoy Izy: Satria nivadika ny fanekeko izay nandidiako ny razany ity firenena ity ka tsy nihaino ny feoko, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'dia tsy handroaka olona eo anoloany intsony Aho amin''ny firenena izay tsy mbola resy hatramin''ny andro nahafatesan''i Josoa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'mba hizahako toetra ny Isiraely amin''ireny, na hitandrina ny lalan''i Jehovah ka handeha amin''izany araka izay nitandreman''ny razany izany izy, na tsia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Dia navelan'i Jehovah ireny firenena ireny ka tsy noroahiny faingana; sady tsy voatolony teo an-tànan'i Josoa ireny.
