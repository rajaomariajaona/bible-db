document_id: DAN.4
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Izaho Nebokadnezara niadana tao an-tranoko ary faly finaritra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ar. maitso
    marker-yv: yv-n
  - type: text
    text: ' tao an-dapako. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nanonofy zavatra nahatahotra aho ka nieritreritra teo am-pandriako, ary ny fahitan''ny lohako dia naharaiki-tahotra ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ka dia nandidy aho mba ho entina eo anatrehako ny olon-kendrin''i Babylona rehetra hilaza amiko ny hevitry ny nofy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia niditra ny ombiasy sy ny mpisikidy sy ny Kaldeana ary ny mpanandro; ary nambarako teo anatrehany ny nofy, kanjo tsy nahalaza ny heviny tamiko ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa nony farany dia niditra teo anatrehako kosa Daniela, izay atao hoe Beltesazara, araka ny anaran''andriamanitro, sady misy fanahin''ireo andriamanitra masina ao anatiny; ary ny nofy dia nambarako teo anatrehany hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ry Beltesazara, lehiben''ny ombiasy, fantatro fa misy fanahin''ireo andriamanitra masina ao anatinao, ary tsy misy zava-miafina manahirana anao, koa ambarao ahy ny fahitana izay hitako tamin''ny nofy mbamin''ny heviny. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa izao no fahitan''ny lohako teo am-pandriako: Nijery aho, ka, indro, nisy hazo teo afovoan''ny tany, ary fatratra ny hahavony. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nihalehibe sy nihahery io hazo io, ary ny hahavony nipaka tamin'ny lanitra, ary ny fijery azy dia hatrany amin'ny faran'ny tany rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tsara tarehy ny raviny, ary betsaka ny voany, sady teo aminy no nisy hanina ho an''ny rehetra; teny ambaniny no nialokalofan''ny bibidia, ary teny amin''ny sampany no nitoeran''ny voro-manidina, ary ny nofo rehetra nahazo hanina avy aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nijery tamin''ny fahitan''ny lohako teo am-pandriako aho, ka, indro, nisy mpiambina masina anankiray nidina avy tany an-danitra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Niantso mafy izy ka nanao hoe: Kapao io hazo io, dia rantsano; ahintsano ny raviny, ary aelezo ny voany; aoka ny biby hipariaka avy eo ambaniny, ary ny vorona hiboridana avy eny amin''ny rantsany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nefa avelao amin''ny tany ao amin''ny ahitra maitso any an-tsaha ihany ny fotony, ka asio fehy vy sy varahina; ary aoka ho kotsan''ny andon''ny lanitra izy, ary aoka ny anjarany ho amin''ny biby any amin''ny ahitra amin''ny tany; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'aoka hovana ny fony tsy ho fon''olombelona, ary aoka ho fom-biby no ho ao aminy; ary aoka ho fetr''andro fito no holanina aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Didin''ny mpiambina izany zavatra izany; eny, avy amin''ny tendrin''ireo masina izany zavatra izany, hahafantaran''ny velona fa ny Avo Indrindra no manapaka amin''ny fanjakan''ny olona ka manome izany ho an''izay tiany, ary olona ambany toetra no ampanapahiny azy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izany no nofy izay hitako, izaho Nebokadnezara. Ary ianao kosa, ry Beltesazara, milazà ny heviny, fa ny olon-kendry rehetra amin''ny fanjakako tsy nisy nahay nampahafantatra ahy ny hevitr''izany; fa ianao no mahay azy, satria misy fanahin''ireo andriamanitra masina no anatinao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia gaga vetivety Daniela, izay atao hoe Beltesazara, ary ny eritreriny naharaiki-tahotra azy. Ary niteny ny mpanjaka nanao hoe: Ry Beltesazara ô, aoka tsy haharaiki-tahotra anao ny nofy na ny heviny. Beltesazara namaly ka nanao hoe: Tompokolahy ô, ny nofy anie ho an''izay mankahala anao, ary ny heviny ho an''izay fahavalonao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Io hazo hitanao io, dia ilay nihalehibe sy nihahery, ka ny hahavony nipaka tamin''ny lanitra, ary ny fijery azy hatramin''ny tany rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ny raviny dia tsara tarehy, sady betsaka ny voany, ary teo aminy nisy hanina ho an'ny rehetra, teny ambaniny no nitoeran'ny bibi-dia, ary teny amin'ny rantsany no nitoeran'ny voro-manidina,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ianao indrindra izany, ry mpanjaka ô; ianao dia nihalehibe sy nihahery; fa ny halehibiazanao efa nitombo ka mipaka amin''ny lanitra, ary ny fanapahanao hatramin''ny faran''ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ny nahitan''ny mpanjaka ny mpiambina masina anankiray nidina avy tany an-danitra nanao hoe: Kapao io hazo io, ary simbao; nefa avelao amin''ny tany ao amin''ny ahitra maitso any an-tsaha ihany ny fotony, fa asio fehy vy sy varahina, ary aoka ho kotsan''ny andon''ny lanitra izy, ary aoka ny anjarany ho ao amin''ny bibi-dia, ambara-pahalanin''ny fetr''andro fito aminy, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'izao no heviny, ry mpanjaka, ary izao no tendrin''ny Avo Indrindra, izay mihatra amin''itompokolahy mpanjaka: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Horoahina hiala amin''ny olona ianao, ary ny fonenanao ho any amin''ny bibi-dia ary hampihinanina ahitra toy ny omby ianao ary ho kotsan''ny andon''ny lanitra, ary fetr''andro fito no holanina aminao, ambara-pahafantatrao fa ny Avo Indrindra no manapaka amin''ny fanjakan''ny olona ka manome izany ho an''izay tiany. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny nasainy namelana ny fotony: ny fanjakanao mbola hampodina ho anao tokoa, rehefa fantatrao fa ny lanitra no manapaka. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Koa aoka hankasitrahanao ny anatro, ry mpanjaka, ka dia ny fahamarinana no ento mampitsahatra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ar. anapaho
    marker-yv: yv-n
  - type: text
    text: ' ny fahotanao,ary ny fiantrana ny mahantra no ento mampitsahatra'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ar. anapaho
    marker-yv: yv-n
  - type: text
    text: ' ny helokao, fandrao mba hampaharetina ahay ny fiadananao. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Izany rehetra izany no nanjo an''i Nebokadnezara mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary nony afaka roa ambin''ny folo volana, dia nitsangantsangana teo an-tampon''ny tranony tao Babylona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary ny mpanjaka niteny ka nanao hoe: Tsy ity va no Babylona lehibe, izay nataoko ho lapan''ny fanjakana tamin''ny haben''ny heriko mba ho voninahitry ny fahalehibiazako?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Raha mbola teo am-bavan''ny mpanjaka ihany ny teny, dia nisy feo latsaka avy tany an-danitra nanao hoe: Ry Nebokadnezara mpanjaka, ianao indrindra no anaovana hoe: Ny fanjakana niala taminao. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa horoahina hiala amin''ny olona ianao, ka ho any amin''ny bibi-dia ny fonenanao; hampihinanina ahitra toy ny omby ianao, ary fetr''andro fito no holanina aminao ambara-pahafantatrao fa ny Avo Indrindra no manapaka amin''ny fanjakan''ny olona ka manome izany ho an''izay tiany. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Tamin''izay indrindra no nahatanterahan''izany tamin''i Nebokadnezara; fa noroahina niala tamin''ny olona izy ka nihinana ahitra toy ny omby, ary ny tenany dia kotsan''ny andon''ny lanitra ambara-panirin''ny volony ho toy ny an''ny voromahery, ary ny hohony ho toy ny an''ny vorona. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary rehefa tapitra ny andro, izaho Nebokadnezara nanandrandra ny masoko tamin''ny lanitra, ary nody tamiko indray ny saiko, ka dia nisaotra ny Avo Indrindra aho ary nidera sy nankalaza Izay velona mandrakizay, ny fanapahany dia fanapahana mandrakizay, ary ny fanjakany hahatratra ny taranaka fara mandimby; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'ary ny mponina rehetra etỳ an-tany hatao tsinontsinona; ary manao izay sitrapony amin''ireo maro be any an-danitra sy amin''ny mponina etỳ an-tany Izy; ary tsy misy mahasakana Azy, na manao aminy hoe: Inona no ataonao? '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Tamin'izay dia nody tamiko ny saiko, ary nody tamiko koa ny fahalehibiazako sy ny voninahitro ho tabihan'ny fanjakako, ary ny mpanolotsaiko sy ny andriandahiko nikatsaka ahy, ka nampitoerina teo amin'ny fanjakako aho, sady nanampy ho ahy ny fahalehibiazana malaza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Koa amin'izany, izaho Nebokadnezara midera sy manandratra ary mankalaza ny Mpanjakan'ny lanitra; marina avokoa ny asany rehetra, ary araka ny rariny ny lalany; ary izay mandeha amin'ny fiavonavonana dia hainy aetry.
