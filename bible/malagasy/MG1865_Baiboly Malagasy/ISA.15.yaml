document_id: ISA.15,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin'ny loza hanjo an'i Moaba
  - type: text
    content: 'Faminaniana ny amin''ny loza hanjo an''i Moaba. Fa tamin''ny indray alina no nandravana an''i Ara-moaba, ka fongotra izy; Fa tamin''ny indray alina no nandravana an''i Kira-moaba, ka fongotra izy; '
  '2':
  - type: text
    content: Miakatra ho ao amin'ny tempoly
  - type: note
    content: 'Na: ho ao Baita'
  - type: text
    content: ' sy ho ao Dibona ny olona, dia ao amin''ny fitoerana avo, mba hitomany; any Nebo sy Medeba no idradradradran''i Moaba; Mibory ny loha rehetra; Voaharatra ny somotra rehetra. '
  '3':
  - type: text
    content: 'Eny an-dalambe dia misikina lamba fisaonana izy; eny an-tampon-tranony sy eny an-kalalahana dia midradradradra avokoa izy, eny, mijohy ny ranomasony. '
  '4':
  - type: text
    content: Ary mitaraina Hesbona sy Elale, ka re hatrany Jahaza ny feony, ary noho izany dia miantso mafy ny miaramilan
  - type: note
    content: Heb. voaomany
  - type: text
    content: '''i Moaba, Mangovitra ny fanahiny ao anatiny. '
  '5':
  - type: text
    content: Ny foko mitaraina noho ny amin'i Moaba; Ny mandositra avy ao dia tonga hatrany Zoara
  - type: note
    content: 'Na: ny hidiny (na: ny fiarovana azy) dia hatrany Zoara'
  - type: text
    content: ' sy Egleta-selisia'
  - type: note
    content: 'Na: Dia ilay ombivavy kely telo taona'
  - type: text
    content: '; fa miakatra mitomany ao amin''ny fiakarana Lohita izy sy midradradradra amin''ny famoizam-po eny an-dalana mankany Horonaima. '
  '6':
  - type: text
    content: 'Fa Nimrima tsara rano dia tonga karankaina; maina ny ahitra, malazo ny zava-maniry, ka tsy misy zava-maitso intsony. '
  '7':
  - type: text
    content: 'Ary amin''izany ny harena be izay nohariny ny entany izay mbola voatahiriny dia entiny ho any am-pitan''ny lohasahan-driaky ny hazomalahelo. '
  '8':
  - type: text
    content: 'Fa ny fitarainany manodidina ny sisin''i Moaba, re hatrany Eglaima ny fidradradradrany Eny, re hatrany Ber-elima ny fidradradradrany. '
  '9':
  - type: text
    content: Fa ny ranon'i Dimona dia feno rà; fa mbola hampiako ny loza manjo an'i Dimona, dia liona handrapaka izay efa mandositra avy any Moaba, sy handany izay sisa amin'ny tany.
