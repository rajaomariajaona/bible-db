document_id: ISA.15,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Faminaniana ny amin'ny loza hanjo an'i Moaba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faminaniana ny amin''ny loza hanjo an''i Moaba. Fa tamin''ny indray alina no nandravana an''i Ara-moaba, ka fongotra izy; Fa tamin''ny indray alina no nandravana an''i Kira-moaba, ka fongotra izy; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Miakatra ho ao amin'ny tempoly
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ho ao Baita'
      marker-yv: yv-n
    - type: text
      text: ' sy ho ao Dibona ny olona, dia ao amin''ny fitoerana avo, mba hitomany; any Nebo sy Medeba no idradradradran''i Moaba; Mibory ny loha rehetra; Voaharatra ny somotra rehetra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eny an-dalambe dia misikina lamba fisaonana izy; eny an-tampon-tranony sy eny an-kalalahana dia midradradradra avokoa izy, eny, mijohy ny ranomasony. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary mitaraina Hesbona sy Elale, ka re hatrany Jahaza ny feony, ary noho izany dia miantso mafy ny miaramilan
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. voaomany
      marker-yv: yv-n
    - type: text
      text: '''i Moaba, Mangovitra ny fanahiny ao anatiny. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny foko mitaraina noho ny amin'i Moaba; Ny mandositra avy ao dia tonga hatrany Zoara
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ny hidiny (na: ny fiarovana azy) dia hatrany Zoara'
      marker-yv: yv-n
    - type: text
      text: ' sy Egleta-selisia'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Dia ilay ombivavy kely telo taona'
      marker-yv: yv-n
    - type: text
      text: '; fa miakatra mitomany ao amin''ny fiakarana Lohita izy sy midradradradra amin''ny famoizam-po eny an-dalana mankany Horonaima. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Nimrima tsara rano dia tonga karankaina; maina ny ahitra, malazo ny zava-maniry, ka tsy misy zava-maitso intsony. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin''izany ny harena be izay nohariny ny entany izay mbola voatahiriny dia entiny ho any am-pitan''ny lohasahan-driaky ny hazomalahelo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny fitarainany manodidina ny sisin''i Moaba, re hatrany Eglaima ny fidradradradrany Eny, re hatrany Ber-elima ny fidradradradrany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny ranon'i Dimona dia feno rà; fa mbola hampiako ny loza manjo an'i Dimona, dia liona handrapaka izay efa mandositra avy any Moaba, sy handany izay sisa amin'ny tany.
