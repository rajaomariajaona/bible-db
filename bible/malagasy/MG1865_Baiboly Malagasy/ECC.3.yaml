document_id: ECC.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny filaharan'ny zavatra samy amin'ny fotoany avy, sy ny mbola hitsaran'Andriamanitra ny ratsy fanahy, ary ny anton'ny nanaovana ny olombelona ho faty toy ny biby
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ny zavatra rehetra samy manana ny fotoany avy, ary samy manana ny androny avy ny raharaha rehetra atỳ ambanin''ny lanitra: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ao ny andro ahaterahana, ary ao ny andro ahafatesana; Ao ny andro ambolena, ary ao ny andro anongotana na nambolena; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ao ny andro amonoana, ary ao ny andro anasitranana; Ao ny andro andravana, ary ao ny andro ananganana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ao ny andro itomaniana, ary ao ny andro ihomehezana; Ao ny andro isaonana, ary ao ny andro andihizana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ao ny andro anariam-bato, ary ao ny andro anangonam-bato; Ao ny andro anohonana, ary ao ny andro ifadiana tsy hanohona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ao ny andro itadiavana, ary ao ny andro ahaverezana; Ao ny andro itehirizana, ary ao ny andro anariana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ao ny andro andriarana, ary ao ny andro anjairana; Ao ny andro anginana, ary ao ny andro itenenana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ao ny andro itiavana, ary ao ny andro ankahalana; Ao ny andro iadiana, ary ao ny andro ihavanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Inona no soa azon''ny miasa amin''izay isasarany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Efa hitako ny asa mampahory izay nomen''Andriamanitra ny zanak''olombelona hisasarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny zavatra rehetra samy nataony ho mendrika amin'ny fotoany avy; ary ny mandrakizay
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'na: izao tontolo izao'
    marker-yv: yv-n
  - type: text
    text: ' dia efa nataony tao am-pony, kanefa tsy hitan''ny olona ny asan''Andriamanitra hatramin''ny voalohany ka hatramin''ny farany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fantatro fa tsy misy tsara amin'ny olombelona afa-tsy ny mifaly sy ny manao tsara
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mahazo soa'
    marker-yv: yv-n
  - type: text
    text: ', raha mbola velona koa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary koa, raha mihinana sy misotro ary finaritra amin''ny fisasarany rehetra ny olombelona, dia fanomezan''Andriamanitra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fantatro fa izay rehetra ataon''Andriamanitra dia haharitra mandrakizay; tsy azo ampiana ary tsy azo analana izany; ka dia ataon''Andriamanitra matahotra eo imasony ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Izay atao izao dia efa natao fahiny; ary izay mbola ho avy dia efa nisy fahiny ihany koa; ary mbola tadiavin'Andriamanitra indray izay efa lasa
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. voaroaka
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary izao koa no efa hitako atỳ ambanin''ny masoandro: ny fitoeran''ny fitsarana nisy faharatsiana tao; ary ny fitoeran''ny fahamarinana nisy faharatsiana koa tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hoy izaho anakampo: Samy hotsarain''Andriamanitra na ny marina na ny meloka; fa any dia samy manana ny androny avy ny zavatra rehetra sy ny asa rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hoy izaho anakampo: Noho ny amin''ny zanak''olombelona izany, mba hizahan''Andriamanitra toetra'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hanadiovan''Andriamanitra'
    marker-yv: yv-n
  - type: text
    text: ' azy, ka ho hitany fa raha ny tenany ihany, dia biby izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa zavatra sendrasendra foana ny zanak'olombelona, ary zavatra sendrasendra foana koa ny biby
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Fa izay manjo ny zanak''olombelona dia manjo ny biby koa'
    marker-yv: yv-n
  - type: text
    text: ', mitovy ihany ny mihatra amin''izy roa tonta; fa toy ny ahafatesan''ny iray no ahafatesan''ny iray koa; eny, iray ihany no fofonaina ananan''izy rehetra; ary tsy misy ihoaran''ny olona noho ny biby; fa samy zava-poana izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Izy rehetra samy mankamin''ny fitoerana iray: avy tamin''ny vovoka izy rehetra, ary hiverina ho amin''ny'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hody'
    marker-yv: yv-n
  - type: text
    text: ' vovoka indray izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Iza no mahalala ny fanahin'ny olombelona, na miakatra any ambony izy, na tsia, ary ny fanahin'ny biby, na midina amin'ny tany izy, na tsia
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Iza no mahalala ny fanahin''ny olombelona izay miakatra any ambony, na ny fanahin''ny biby izay midina amin''ny tany?'
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia efa hitako fa tsy misy tsara noho ny ifalian'ny olona amin'ny asany, satria izany no anjarany; fa iza no hampahalala azy izay ho avy any aoriany?
