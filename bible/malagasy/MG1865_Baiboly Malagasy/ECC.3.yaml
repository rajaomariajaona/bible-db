document_id: ECC.3,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny filaharan'ny zavatra samy amin'ny fotoany avy, sy ny mbola hitsaran'Andriamanitra ny ratsy fanahy, ary ny anton'ny nanaovana ny olombelona ho faty toy ny biby
  - type: text
    content: 'Ny zavatra rehetra samy manana ny fotoany avy, ary samy manana ny androny avy ny raharaha rehetra atỳ ambanin''ny lanitra: '
  '10':
  - type: text
    content: 'Efa hitako ny asa mampahory izay nomen''Andriamanitra ny zanak''olombelona hisasarany. '
  '11':
  - type: text
    content: Ny zavatra rehetra samy nataony ho mendrika amin'ny fotoany avy; ary ny mandrakizay
  - type: note
    content: 'na: izao tontolo izao'
  - type: text
    content: ' dia efa nataony tao am-pony, kanefa tsy hitan''ny olona ny asan''Andriamanitra hatramin''ny voalohany ka hatramin''ny farany. '
  '12':
  - type: text
    content: Fantatro fa tsy misy tsara amin'ny olombelona afa-tsy ny mifaly sy ny manao tsara
  - type: note
    content: 'Na: mahazo soa'
  - type: text
    content: ', raha mbola velona koa izy. '
  '13':
  - type: text
    content: 'Ary koa, raha mihinana sy misotro ary finaritra amin''ny fisasarany rehetra ny olombelona, dia fanomezan''Andriamanitra izany. '
  '14':
  - type: text
    content: 'Fantatro fa izay rehetra ataon''Andriamanitra dia haharitra mandrakizay; tsy azo ampiana ary tsy azo analana izany; ka dia ataon''Andriamanitra matahotra eo imasony ny olona. '
  '15':
  - type: text
    content: Izay atao izao dia efa natao fahiny; ary izay mbola ho avy dia efa nisy fahiny ihany koa; ary mbola tadiavin'Andriamanitra indray izay efa lasa
  - type: note
    content: Heb. voaroaka
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Ary izao koa no efa hitako atỳ ambanin''ny masoandro: ny fitoeran''ny fitsarana nisy faharatsiana tao; ary ny fitoeran''ny fahamarinana nisy faharatsiana koa tao. '
  '17':
  - type: text
    content: 'Hoy izaho anakampo: Samy hotsarain''Andriamanitra na ny marina na ny meloka; fa any dia samy manana ny androny avy ny zavatra rehetra sy ny asa rehetra. '
  '18':
  - type: text
    content: 'Hoy izaho anakampo: Noho ny amin''ny zanak''olombelona izany, mba hizahan''Andriamanitra toetra'
  - type: note
    content: 'Na: hanadiovan''Andriamanitra'
  - type: text
    content: ' azy, ka ho hitany fa raha ny tenany ihany, dia biby izy. '
  '19':
  - type: text
    content: Fa zavatra sendrasendra foana ny zanak'olombelona, ary zavatra sendrasendra foana koa ny biby
  - type: note
    content: 'Na: Fa izay manjo ny zanak''olombelona dia manjo ny biby koa'
  - type: text
    content: ', mitovy ihany ny mihatra amin''izy roa tonta; fa toy ny ahafatesan''ny iray no ahafatesan''ny iray koa; eny, iray ihany no fofonaina ananan''izy rehetra; ary tsy misy ihoaran''ny olona noho ny biby; fa samy zava-poana izy rehetra. '
  '2':
  - type: text
    content: 'Ao ny andro ahaterahana, ary ao ny andro ahafatesana; Ao ny andro ambolena, ary ao ny andro anongotana na nambolena; '
  '20':
  - type: text
    content: 'Izy rehetra samy mankamin''ny fitoerana iray: avy tamin''ny vovoka izy rehetra, ary hiverina ho amin''ny'
  - type: note
    content: 'Na: hody'
  - type: text
    content: ' vovoka indray izy rehetra. '
  '21':
  - type: text
    content: Iza no mahalala ny fanahin'ny olombelona, na miakatra any ambony izy, na tsia, ary ny fanahin'ny biby, na midina amin'ny tany izy, na tsia
  - type: note
    content: 'Na: Iza no mahalala ny fanahin''ny olombelona izay miakatra any ambony, na ny fanahin''ny biby izay midina amin''ny tany?'
  - type: text
    content: '? '
  '22':
  - type: text
    content: Dia efa hitako fa tsy misy tsara noho ny ifalian'ny olona amin'ny asany, satria izany no anjarany; fa iza no hampahalala azy izay ho avy any aoriany?
  '3':
  - type: text
    content: 'Ao ny andro amonoana, ary ao ny andro anasitranana; Ao ny andro andravana, ary ao ny andro ananganana; '
  '4':
  - type: text
    content: 'Ao ny andro itomaniana, ary ao ny andro ihomehezana; Ao ny andro isaonana, ary ao ny andro andihizana; '
  '5':
  - type: text
    content: 'Ao ny andro anariam-bato, ary ao ny andro anangonam-bato; Ao ny andro anohonana, ary ao ny andro ifadiana tsy hanohona; '
  '6':
  - type: text
    content: 'Ao ny andro itadiavana, ary ao ny andro ahaverezana; Ao ny andro itehirizana, ary ao ny andro anariana; '
  '7':
  - type: text
    content: 'Ao ny andro andriarana, ary ao ny andro anjairana; Ao ny andro anginana, ary ao ny andro itenenana; '
  '8':
  - type: text
    content: Ao ny andro itiavana, ary ao ny andro ankahalana; Ao ny andro iadiana, ary ao ny andro ihavanana.
  '9':
  - type: text
    content: 'Inona no soa azon''ny miasa amin''izay isasarany? '
