document_id: DEU.22
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Didy ny amin'ny fanamasinana ny fanambadiana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Raha hitanao mania ny omby na ny ondrin''ny rahalahinao, dia aza atao tsy ho raharahanao izany, fa avereno any amin''ny rahalahinao mihitsy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary raha tsy akaiky anao, na tsy fantatrao, ny rahalahinao, dia ento mody any aminao ilay nania, ary aoka hitoetra aminao mandra-pitadin''ny rahalahinao azy, dia haverinao any aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary toy izany koa no hataonao amin''ny borikiny, na ny fitafiany, na ny zavatry ny rahalahinao, na inona na inona izay very ka hitanao; fa aza atao tsy ho raharahanao izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary raha hitanao ny borikin''ny rahalahinao, na ny ombiny, potraka any an-dalana, dia aza atao tsy ho raharahanao izany; fa manampia ny rahalahinao hanarina azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Aoka ny vehivavy tsy hitafy ny fitafian-dehilahy; ary aoka ny lehilahy tsy hitafy ny fitafiam-behivavy; fa fahavetavetana eo imason''i Jehovah Andriamanitrao izay rehetra manao izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Raha sendra mahita akanim-borona eo anoloanao eny an-dalana ianao, na amin''ny efa foy, na mbola atodiny, ary ny reniny manomba ny efa foy, na mikotrika ny atodiny, dia aza maka ny reniny mbamin''ny zanany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Alefaso mihitsy ny reniny, fa ny zanany ihany no alao ho anao, mba hahita soa ianao ka ho maro andro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Raha manao trano vaovao ianao, dia asio aro-fanina ny tampony, fandrao hisy olona hianjera eny, ka hahatonga heloka ny amin'ny rà ho ao an-tranonao ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aza fafazana voan-javatra roa karazana mifangaroharo ny taninao, fandrao samy ho lasa ho sazy ny vokatry ny voan-javatra nafafinao sy ny vokatry ny tanim-boalobokao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Aza mampikambana omby sy boriky hiasa tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Aza mitafy lamba volon''ondry sy rongony mifamahofaho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Asio somotraviaviny ny zorony efatra amin'ny lambanao izay itafianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Raha misy lehilahy mampaka-bady ary mandry aminy, ka tsy tiany indray ravehivavy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'dia haratsiny sy alàny baraka ka ataony hoe: Efa nampakatra ity vehivavy ity aho, nefa raha nandry taminy, dia tsy hitako ny famantarana azy ho virijina: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'dia halain''ny ray aman-drenin-drazazavavy ny famantarana azy ho virijina ka ho entiny ho eo amin''ny loholona amin''ny tanàna eo am-bavahady. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hiteny amin''ny loholona ny rain-drazazavavy hoe: Ny zanako-vavy nomeko ho vadin''io lehilahy io, kanefa tsy tiany indray izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ary indro fa efa noharatsiny izy ka nataony hoe: Tsy hitako ny famantarana ny zanakao-vavy ho virijina; kanefa indreto ny famantarana ny zanakao-vavy ho virijina. Dia hamelatra ny lamba eo anatrehan''ny loholona amin''ny tanàna izy mivady. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary halain''ny loholona amin''ny tanàna izany lehilahy izany ka hofaizany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hosaziny sekely volafotsy zato koa izy, ka homeny ny rain-drazazavavy izany, satria nahafa-baraka ny virijina anankiray tamin''ny Isiraely ralehilahy; nefa dia ho vadiny ihany razazavavy ka tsy azony hisaorana amin''ny andro rehetra hiainany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa raha marina kosa izany lazainy izany, ka tsy hita ny famantarana an-drazazavavy ho virijina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'dia ho entiny mivoaka ho eo anoloan''ny varavaran''ny tranon-drainy razazavavy ka hotorahan''ny mponina amin''ny tanànany vato ho faty, satria nanao izay fady indrindra teo amin''ny Isiraely izy ka nijangajanga tao an-tranon-drainy; ka dia hofongoranao tsy ho eo aminao ny fanao ratsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Raha misy lehilahy azo mandry amim-behivavy vadin''olona, dia samy hatao maty izy roroa, na ralehilahy izay nandry tamin-dravehivavy, na ravehivavy koa; ka dia hofongoranao tsy ho eo amin''ny Isiraely ny fanao ratsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Raha misy zazavavy virijina voafofo ho vadin''olona, ary misy lehilahy mahita azy eo an-tanàna ka mandry aminy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'dia ho entinareo mivoaka ho eo amin''ny vavahadin''izany tanàna izany izy roroa ka hotorahanareo vato ho faty: razazavavy moa, satria tsy niantso, nefa tao an-tanàna ihany; ary ralehilahy koa, satria nandry tamin''ny vadin''ny namany; ka dia hofongoranao tsy ho eo aminao ny fanao ratsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa raha any an-tsaha kosa no ahitan-dralehilahy an-drazazavavy voafofo ho vadin''olona, ary misavika azy ralehilahy ka mandry aminy, dia ralehilahy izay nandry taminy ihany no hatao maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa ravehivavy dia tsy hasianao na inona na inona; fa tsy misy ota tokony hahafaty azy; fa tahaka ny olona mitsangana hamely ny namany ka mahafaty azy no hevitr''izany zavatra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa tany an-tsaha no nahitany azy; ary niantso ihany razazavavy voafofo ho vadin''olona, nefa tsy nisy hamonjy azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Raha misy lehilahy mahita zazavavy virijina, izay tsy voafofo ho vadin''olona, ka misavika azy sady mandry aminy, koa hita izy roroa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: dia hanome sekely volafotsy dimam-polo ho an'ny rain-drazazavavy ralehilahy izay nandry taminy; ary hovadiny izy, satria efa nosavihiny sady nandriany; ary tsy azony hisaorana izy amin'ny andro rehetra hiainany.
