document_id: PSA.60,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiantsoan'ny efa resim-pahavalo, mba hotsarovan'Andriamanitra ny teniny
  - type: text
    content: Ho an'ny mpiventy hira Al-sho-shanedoth. Miktama nataon'i Davida hampianarana, fony izy nanafika an'i Mesopotamia
  - type: note
    content: Arama-naharaima
  - type: text
    content: ' sy Arama-zoba tamin''ny niverenan''i Joaba ka namelezany ny Edomita roa arivo amby iray alin-dahy teo amin''ny lohasahan-tsira. Andriamanitra ô, efa nanary sy nampihahaka anay Hianao; efa tezitra Hianao, velombelomy izahay. '
  '10':
  - type: text
    content: Tsy Hianao va, Izay efa nanary anay
  - type: note
    content: 'Na: Tsy efa nanary anay va Hianao'
  - type: text
    content: ', Andriamanitra ô. Sady tsy nivoaka niaraka tamin''ny antokon''ny miaramilanay, Andriamanitra ô? '
  '11':
  - type: text
    content: 'Vonjeo amin''ny mpandrafy izahay; fa zava-poana ny famonjena ataon''ny olona. '
  '12':
  - type: text
    content: Andriamanitra no haherezantsika; fa Izy no hanitsakitsaka ny fahavalontsika.
  '2':
  - type: text
    content: 'Efa nampihorohoro ny tany Hianao ka namaky azy; amboary izay rava aminy, fa mihozongozona izy. '
  '3':
  - type: text
    content: Efa nampahita ny olonao zava-tsarotra Hianao, ary efa nampisotro anay divay mampiraikiraiky.
  '4':
  - type: text
    content: 'Efa notoloranao faneva ny matahotra Anao, hatsangany noho ny fahamarinana. '
  '5':
  - type: text
    content: Mba hahafahan'ny malalanao, dia vonjeo amin'ny tananao ankavanana aho, ka valio.
  '6':
  - type: text
    content: 'Andriamanitra niteny tamin''ny fahamasinany hoe: hifaly Aho ka hizara an''i Sekema; ary ny lohasahan''i Sokota horefesiko; '
  '7':
  - type: text
    content: 'Ahy Gileada, Ahy koa Manase; ary aron''ny lohako Efraima tehim-panjakako Joda; '
  '8':
  - type: text
    content: Tavin-dranoko fanasana Moaba; Edoma no anipazako ny kapako; mihobia noho ny amiko, ry Filistia.
  '9':
  - type: text
    content: 'Iza no hitondra ahy ho any an-tanàna mafy? iza no hitarika ahy ho any Edoma? '
