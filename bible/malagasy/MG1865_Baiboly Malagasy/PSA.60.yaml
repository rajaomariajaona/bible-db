document_id: PSA.60,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiantsoan'ny efa resim-pahavalo, mba hotsarovan'Andriamanitra ny teniny
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho an'ny mpiventy hira Al-sho-shanedoth. Miktama nataon'i Davida hampianarana, fony izy nanafika an'i Mesopotamia
    - type: usfm
      marker: x
      children:
      - type: text
        text: Arama-naharaima
      marker-yv: yv-n
    - type: text
      text: ' sy Arama-zoba tamin''ny niverenan''i Joaba ka namelezany ny Edomita roa arivo amby iray alin-dahy teo amin''ny lohasahan-tsira. Andriamanitra ô, efa nanary sy nampihahaka anay Hianao; efa tezitra Hianao, velombelomy izahay. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy Hianao va, Izay efa nanary anay
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Tsy efa nanary anay va Hianao'
      marker-yv: yv-n
    - type: text
      text: ', Andriamanitra ô. Sady tsy nivoaka niaraka tamin''ny antokon''ny miaramilanay, Andriamanitra ô? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vonjeo amin''ny mpandrafy izahay; fa zava-poana ny famonjena ataon''ny olona. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Andriamanitra no haherezantsika; fa Izy no hanitsakitsaka ny fahavalontsika.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nampihorohoro ny tany Hianao ka namaky azy; amboary izay rava aminy, fa mihozongozona izy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Efa nampahita ny olonao zava-tsarotra Hianao, ary efa nampisotro anay divay mampiraikiraiky.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa notoloranao faneva ny matahotra Anao, hatsangany noho ny fahamarinana. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mba hahafahan'ny malalanao, dia vonjeo amin'ny tananao ankavanana aho, ka valio.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Andriamanitra niteny tamin''ny fahamasinany hoe: hifaly Aho ka hizara an''i Sekema; ary ny lohasahan''i Sokota horefesiko; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahy Gileada, Ahy koa Manase; ary aron''ny lohako Efraima tehim-panjakako Joda; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tavin-dranoko fanasana Moaba; Edoma no anipazako ny kapako; mihobia noho ny amiko, ry Filistia.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Iza no hitondra ahy ho any an-tanàna mafy? iza no hitarika ahy ho any Edoma? '
