document_id: PSA.34,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salamo abidy. Fisaorana sy anatra nataon'izay efa novonjena tamin'ny fahoriana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nataon''i Davida tamin''izy nody adala teo anatrehan''i Abimeleka, dia noroahiny ka lasa nandeha. Hisaotra an''i Jehovah lalandava aho; ho eo am-bavako mandrakariva ny fiderana Azy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Na dia ny liona tanora aza tsy ampy hanina ka noana. Fa izay mitady an'i Jehovah kosa dia tsy ho orin-java-tsoa akory.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Avia, anaka, mihainoa ahy; ny fahatahorana an''i Jehovah no hampianariko anareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Na iza na iza ianao no maniry fiainana ka tia andro maro hahitana ny soa, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia arovy ny lelanao amin''ny ratsy ary ny molotrao mba tsy hiteny fitaka. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Halaviro ny ratsy, manaova soa; mitadiava fihavanana, ka araho izany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ny mason''i Jehovah dia mitsinjo ny marina, ary ny sofiny mihaino ny fitarainany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ny tavan''i Jehovah tezitra amin''ny mpanao ratsy kosa, mba hofongorany tsy ho eo amin''ny tany ny fahatsiarovana azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Mitaraina ny marina, ary mihaino azy Jehovah ka mamonjy azy amin''ny fahoriany rehetra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Akaikin'izay manana fo mangorakoraka Jehovah, ary mamonjy izay torororo fanahy.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Maro ny fahorian''ny marina; nefa Jehovah manafaka azy amin''izany rehetra izany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Jehovah no reharehan''ny fanahiko; hahare izany ny mpandefitra ka ho fay. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Miaro ny taolany rehetra izy; tsy hisy ho tapaka ireny na dia iray akory aza. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Hahafaty ny ratsy fanahy ny fahoriana; ary ny mankahala ny olo-marina hohelohina. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Fa Jehovah manavotra ny fanahin'ny mpanompony, ka tsy mba hisy hohelohina izay rehetra mialoka aminy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Miaraha mankalaza an'i Jehovah amiko; ary aoka hiara-manandratra ny anarany isika.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mitady an''i Jehovah aho, dia mamaly ahy Izy ka manafaka ahy amin''ny tahotro rehetra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mijery Azy ireo ka miramirana, sady tsy mangaihay ny tavany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ity olo-mahantra ity niantso, dia nihaino Jehovah ka namonjy azy tamin'ny fahoriany rehetra.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ny Anjelin''i Jehovah mitoby manodidina izay matahotra Azy ka mamonjy azy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Andramo ka izahao fa tsara Jehovah; sambatra izay olona mialoka aminy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Matahora an''i Jehovah, ianareo olony masina;fa tsy hanan-java-mahory izay matahotra Azy. '
