document_id: JER.22,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Anatra mafy noho ny faharatsian'ny mpanjakan'ny Joda
  - type: text
    content: 'Izao no lazain''i Jehovah: Midina any amin''ny tranon''ny mpanjakan''ny Joda, ka lazao any izao teny izao hoe: '
  '10':
  - type: text
    content: 'Aza mitomany ny maty ianareo, na misaona azy; Mitomania dia mitomania noho ilay efa lasan-ko babo; Fa tsy hiverina intsony izy, na hahita ny tany nahaterahany. '
  '11':
  - type: text
    content: 'Fa izao no lazain''i Jehovah ny amin''i Saloma, zanak''i Josia, mpanjakan''ny Joda, dia ilay nanjaka nandimby an''i Josia rainy, saingy efa niala tamin''ity tany ity: Tsy hiverina atỳ intsony izy, '
  '12':
  - type: text
    content: 'Fa ho faty any amin''ny tany izay nitondrana azy ho babo ka tsy hahita ity tany ity intsony. '
  '13':
  - type: text
    content: 'Lozan''izay manorina ny tranony amin''ny tsy rariny sy ny ati-tranony ambony amin''ny fitaka ka mampiasa maina ny namany, fa tsy mandoa ny karamany, '
  '14':
  - type: text
    content: 'Sady manao hoe: Hanao trano lehibe ho ahy aho sy ati-trano ambony malalaka, ary holoahany hisy varavarankely sady hasiany valin-drihana sedera sy hohosorana loko mena. '
  '15':
  - type: text
    content: 'Moa dia ho mpanjaka ianao, saingy ataonao be sedera noho ny an''ny sasany ny tranonao? Tsy efa nihinana sy nisotro va rainao sady nanao fitsarana sy fahamarinana? Tamin''izany dia nambinina izy. '
  '16':
  - type: text
    content: 'Nitsara ny tenin''ny ory sy ny malahelo izy; Tamin''izany dia nambinina izy. Tsy izany va no fahalalana Ahy? hoy Jehovah. '
  '17':
  - type: text
    content: 'Nefa tsy misy alehan''ny masonao sy ny eritreritrao afa-tsy ny filan-karena ihany sy ny fandatsahana rà marina ary ny fampahoriana sy ny fanaovana an-keriny. '
  '18':
  - type: text
    content: 'Ary noho izany dia izao no lazain''i Jehovah ny amin''i Joiakima, zanak''i Josia, mpanjakan''ny Joda: Ny olona tsy hisaona azy hoe: Indrisy, tompokolahy! na: Indrisy, tompokovavy! Ny olona tsy hitomany azy hoe: Indrisy, tompoko! na: Indrisy ny voninahiny! '
  '19':
  - type: text
    content: 'Halevina toy ny fandevina boriky izy, ka hotaritarihina sy hariana any ivelan''ny vavahadin''i Jerosalema. '
  '2':
  - type: text
    content: 'Henoy ny tenin''i Jehovah, ry mpanjakan''ny Joda, izay mipetraka amin''ny seza fiandrianan''i Davida, dia ianao sy ny mpanomponao ary ny vahoakanao izay miditra amin''ireto vavahady ireto: '
  '20':
  - type: text
    content: 'Miakara any Libanona, ka mitaraina; Dia asandrato any Basana ny feonao, ary mitaraina any Abarima; Fa ringana avokoa ireo tia anao. '
  '21':
  - type: text
    content: 'Efa niteny taminao Aho, fony ianao mbola nipetraka tsy nanana ahiahy; Nefa hoy ianao: Izaho tsy hihaino. Fanaonao hatry ny fony ianao mbola tanora ny tsy mihaino ny teniko. '
  '22':
  - type: text
    content: Ny mpitondra
  - type: note
    content: Heb. mpiandry ondry
  - type: text
    content: ' anao rehetra ho paohin''ny rivotra, ary ireo tia anao ho lasan-ko babo, eny, ho menatra sy hangaihay tokoa ianao noho ny haratsianao rehetra. '
  '23':
  - type: text
    content: Ry ilay mponina any Libanona, izay manao ny akaninao eny amin'ny sedera, indrisy ny fisentoanao
  - type: note
    content: 'Na: fahantranao'
  - type: text
    content: ', raha iharan''ny faharariana ianao, toy ny fanaintainan''ny vehivavy raha miteraka! '
  '24':
  - type: text
    content: 'Raha velona koa Aho, hoy Jehovah, na dia ho peratra fanombohan-kase amin''ny tanako ankavanana aza ianao, ry Jekonia, zanak''i Joiakima, mpanjakan''ny Joda, dia hotsoahako hiala eo ianao, '
  '25':
  - type: text
    content: 'Ka hatolotro eo an-tànan''izay mitady ny ainao sy eo an-tànan''izay atahoranao, dia eo an-tànan''i Nebokadnezara, mpanjakan''i Babylona, sy eo amin''ny tanan''ny Kaldeana. '
  '26':
  - type: text
    content: 'Ary ianao sy ny reninao niteraka anao dia hariako any an-tany hafa izay tsy nahaterahanareo, ka any no hahafatesanareo. '
  '27':
  - type: text
    content: 'Fa ny tany iriny hiverenana dia tsy hiverenany. '
  '28':
  - type: text
    content: 'Moa ity lehilahy Jekonia ity dia vilany vingavingaina sy efa hotorotoroina ary fanaka tsy mahafinaritra va? Koa nahoana no nariana izy sy ny taranany ka natsipy any amin''ny tany tsy fantany? '
  '29':
  - type: text
    content: 'Ry tany! ry tany! ry tany! Henoy ny tenin''i Jehovah. '
  '3':
  - type: text
    content: 'Izao no lazain''i Jehovah: Manaova fitsarana sy fahamarinana ianareo, ka afaho amin''ny tanan''ny mpampahory ny olona voaroba; ary aza mampahory na mampidi-doza amin''ny vahiny sy ny kamboty ary ny mpitondratena, ary aza mandatsaka rà marina amin''ity fitoerana ity. '
  '30':
  - type: text
    content: Izao no lazain'i Jehovah Soratanareo ho tsy manam-para ity lehilahy ity, dia lehilahy tsy hambinina amin'ny androny; Fa tsy hisy amin'ny taranany izay hambinina Hipetraka eo amin'ny seza fiandrianan'i Davida, na hanapaka ao amin'ny Joda intsony
  '4':
  - type: text
    content: 'Fa raha mankatò izany teny izany tokoa ianareo, dia hisy mpanjaka mipetraka eo amin''ny seza fiandrianan''i Davida hiditra amin''ity vavahady ity mitaingin-kalesy sy soavaly, dia izy sy ny mpanompony ary ny vahoakany. '
  '5':
  - type: text
    content: 'Fa raha tsy hihaino izany teny izany kosa ianareo, dia ny tenako no ianianako, hoy Jehovah, fa ho lao tokoa ity trano ity. '
  '6':
  - type: text
    content: 'Fa izao no lazain''i Jehovah ny amin''ny mpanjakan''ny Joda sy ny mpianakaviny: Tahaka an''i Gileada sy ny tampon''i Libanona amiko ianao, nefa hataoko tonga efitra sy tanàna tsy onenana. '
  '7':
  - type: text
    content: Ary hanendry
  - type: note
    content: heb. hanamasina
  - type: text
    content: ' mpandrava hamely anao Aho, Izay samy hitondra ny fiadiany avy; Dia hokapain''ireo ny sederanao voafantina ka hariany ao anaty afo. '
  '8':
  - type: text
    content: 'Ary firenena maro no handalo ity tanàna ity, ka samy hanao amin''ny namany avy hoe: Nahoana Jehovah no dia nanao izao tamin''ity tanàna lehibe ity? '
  '9':
  - type: text
    content: 'Dia hovaliana hoe: Noho ny nahafoizany ny faneken''i Jehovah Andriamaniny sy ny nivavahany tamin''andriamani-kafa sy ny nanompoany ireny.'
