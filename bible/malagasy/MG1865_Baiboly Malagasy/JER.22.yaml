document_id: JER.22
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Anatra mafy noho ny faharatsian'ny mpanjakan'ny Joda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no lazain''i Jehovah: Midina any amin''ny tranon''ny mpanjakan''ny Joda, ka lazao any izao teny izao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Henoy ny tenin''i Jehovah, ry mpanjakan''ny Joda, izay mipetraka amin''ny seza fiandrianan''i Davida, dia ianao sy ny mpanomponao ary ny vahoakanao izay miditra amin''ireto vavahady ireto: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izao no lazain''i Jehovah: Manaova fitsarana sy fahamarinana ianareo, ka afaho amin''ny tanan''ny mpampahory ny olona voaroba; ary aza mampahory na mampidi-doza amin''ny vahiny sy ny kamboty ary ny mpitondratena, ary aza mandatsaka rà marina amin''ity fitoerana ity. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa raha mankatò izany teny izany tokoa ianareo, dia hisy mpanjaka mipetraka eo amin''ny seza fiandrianan''i Davida hiditra amin''ity vavahady ity mitaingin-kalesy sy soavaly, dia izy sy ny mpanompony ary ny vahoakany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa raha tsy hihaino izany teny izany kosa ianareo, dia ny tenako no ianianako, hoy Jehovah, fa ho lao tokoa ity trano ity. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa izao no lazain''i Jehovah ny amin''ny mpanjakan''ny Joda sy ny mpianakaviny: Tahaka an''i Gileada sy ny tampon''i Libanona amiko ianao, nefa hataoko tonga efitra sy tanàna tsy onenana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary hanendry
  - type: usfm
    marker: x
    children:
    - type: text
      text: heb. hanamasina
    marker-yv: yv-n
  - type: text
    text: ' mpandrava hamely anao Aho, Izay samy hitondra ny fiadiany avy; Dia hokapain''ireo ny sederanao voafantina ka hariany ao anaty afo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary firenena maro no handalo ity tanàna ity, ka samy hanao amin''ny namany avy hoe: Nahoana Jehovah no dia nanao izao tamin''ity tanàna lehibe ity? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hovaliana hoe: Noho ny nahafoizany ny faneken''i Jehovah Andriamaniny sy ny nivavahany tamin''andriamani-kafa sy ny nanompoany ireny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Aza mitomany ny maty ianareo, na misaona azy; Mitomania dia mitomania noho ilay efa lasan-ko babo; Fa tsy hiverina intsony izy, na hahita ny tany nahaterahany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa izao no lazain''i Jehovah ny amin''i Saloma, zanak''i Josia, mpanjakan''ny Joda, dia ilay nanjaka nandimby an''i Josia rainy, saingy efa niala tamin''ity tany ity: Tsy hiverina atỳ intsony izy, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa ho faty any amin''ny tany izay nitondrana azy ho babo ka tsy hahita ity tany ity intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Lozan''izay manorina ny tranony amin''ny tsy rariny sy ny ati-tranony ambony amin''ny fitaka ka mampiasa maina ny namany, fa tsy mandoa ny karamany, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Sady manao hoe: Hanao trano lehibe ho ahy aho sy ati-trano ambony malalaka, ary holoahany hisy varavarankely sady hasiany valin-drihana sedera sy hohosorana loko mena. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Moa dia ho mpanjaka ianao, saingy ataonao be sedera noho ny an''ny sasany ny tranonao? Tsy efa nihinana sy nisotro va rainao sady nanao fitsarana sy fahamarinana? Tamin''izany dia nambinina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nitsara ny tenin''ny ory sy ny malahelo izy; Tamin''izany dia nambinina izy. Tsy izany va no fahalalana Ahy? hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nefa tsy misy alehan''ny masonao sy ny eritreritrao afa-tsy ny filan-karena ihany sy ny fandatsahana rà marina ary ny fampahoriana sy ny fanaovana an-keriny. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary noho izany dia izao no lazain''i Jehovah ny amin''i Joiakima, zanak''i Josia, mpanjakan''ny Joda: Ny olona tsy hisaona azy hoe: Indrisy, tompokolahy! na: Indrisy, tompokovavy! Ny olona tsy hitomany azy hoe: Indrisy, tompoko! na: Indrisy ny voninahiny! '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Halevina toy ny fandevina boriky izy, ka hotaritarihina sy hariana any ivelan''ny vavahadin''i Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Miakara any Libanona, ka mitaraina; Dia asandrato any Basana ny feonao, ary mitaraina any Abarima; Fa ringana avokoa ireo tia anao. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Efa niteny taminao Aho, fony ianao mbola nipetraka tsy nanana ahiahy; Nefa hoy ianao: Izaho tsy hihaino. Fanaonao hatry ny fony ianao mbola tanora ny tsy mihaino ny teniko. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny mpitondra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mpiandry ondry
    marker-yv: yv-n
  - type: text
    text: ' anao rehetra ho paohin''ny rivotra, ary ireo tia anao ho lasan-ko babo, eny, ho menatra sy hangaihay tokoa ianao noho ny haratsianao rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ry ilay mponina any Libanona, izay manao ny akaninao eny amin'ny sedera, indrisy ny fisentoanao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fahantranao'
    marker-yv: yv-n
  - type: text
    text: ', raha iharan''ny faharariana ianao, toy ny fanaintainan''ny vehivavy raha miteraka! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Raha velona koa Aho, hoy Jehovah, na dia ho peratra fanombohan-kase amin''ny tanako ankavanana aza ianao, ry Jekonia, zanak''i Joiakima, mpanjakan''ny Joda, dia hotsoahako hiala eo ianao, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ka hatolotro eo an-tànan''izay mitady ny ainao sy eo an-tànan''izay atahoranao, dia eo an-tànan''i Nebokadnezara, mpanjakan''i Babylona, sy eo amin''ny tanan''ny Kaldeana. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary ianao sy ny reninao niteraka anao dia hariako any an-tany hafa izay tsy nahaterahanareo, ka any no hahafatesanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa ny tany iriny hiverenana dia tsy hiverenany. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Moa ity lehilahy Jekonia ity dia vilany vingavingaina sy efa hotorotoroina ary fanaka tsy mahafinaritra va? Koa nahoana no nariana izy sy ny taranany ka natsipy any amin''ny tany tsy fantany? '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ry tany! ry tany! ry tany! Henoy ny tenin''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Izao no lazain'i Jehovah Soratanareo ho tsy manam-para ity lehilahy ity, dia lehilahy tsy hambinina amin'ny androny; Fa tsy hisy amin'ny taranany izay hambinina Hipetraka eo amin'ny seza fiandrianan'i Davida, na hanapaka ao amin'ny Joda intsony
