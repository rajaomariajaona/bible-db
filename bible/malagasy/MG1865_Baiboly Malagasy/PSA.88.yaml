document_id: PSA.88,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vavaka nataon'izay nasian'ny fahoriana mafy ka toa foin'Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tonon-kira. Salamo nataon''ny Koraita. Ho an''ny mpiventy hira. Almahalath-leanoth. Maskila nataon''i Hemana Ezrahita. Jehovah ô, Andriamanitry ny famonjena ahy, Andro aman''alina no itarainako eo anatrehanao; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Haneho fahagagana amin''ny maty va Hianao? Ny matoatoa va no hitsangana hidera Anao? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hotorina any am-pasana va ny famindram-ponao, Ary ny fahamarinanao any amin''ny fandringanana? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ho fantatra ao amin''ny maizina va ny fahagagana ataonao, Ary ny fahamarinanao ao amin''ny tany fanadinoana? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa raha izaho, dia Hianao no itarainako, Jehovah ô; Ary ny fivavako tonga eo anatrehanao nony maraina. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Jehovah ô, nahoana no manary ny fanahiko Hianao Ka manafina ny tavanao amiko? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ory aho ka efa ho faty hatramin''ny fahazazako; Raha itambesa-ran''ny fampitahoranao aho, dia very hevitra; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Manafotra ahy ny fahatezeranao; Matin''ny fampitahoranao aho; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Mandifotra ahy mandrakariva tahaka ny rano ireny; Miara-manodidina ahy izy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Efa nampanalavirinao ahy ny olona tia ahy sy ny sakaizako; Ireo nahazatra ahy dia fahamaizinana.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Aoka ny fivavako ho tonga eo anatrehanao; Atongilano amin''ny fitarainako ny sofinao; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa diboka ny fahoriana ny fanahiko; Ary ny aiko manakaiky ny fiainan-tsi-hita
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Sheola
      marker-yv: yv-n
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Natao ho isan''izay midina any an-davaka aho Ary efa tahaka izay tsy manan-kery; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Efa nafoy ho any amin'ny maty aho
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Ny fandriako dia any amin''ny maty'
      marker-yv: yv-n
    - type: text
      text: ', Tahaka izay voavono, mandry ao am-pasana, Izay tsy tsarovanao intsony, Fa voafongotry ny tananao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Efa nametraka ahy any an-davaka ambany indrindra Hianao, Ao amin''ny maizina, dia ao amin''ny lalina. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ny fahatezeranao manindry ahy mafy, Ary ny alon-dranonao rehetra azeranao amiko. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Efa nampanalavirinao ahy ny olona nahazatra ahy; Efa nataonao. fahavetavetana eo imasony aho; Voahidy aho ka tsy afa-mivoaka. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ny masoko efa pahina noho ny fahoriana; Jehovah ô, miantso Anao isan'andro aho, Mamefy tanana aminao aho.
