document_id: PSA.88,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavaka nataon'izay nasian'ny fahoriana mafy ka toa foin'Andriamanitra
  - type: text
    content: 'Tonon-kira. Salamo nataon''ny Koraita. Ho an''ny mpiventy hira. Almahalath-leanoth. Maskila nataon''i Hemana Ezrahita. Jehovah ô, Andriamanitry ny famonjena ahy, Andro aman''alina no itarainako eo anatrehanao; '
  '10':
  - type: text
    content: 'Haneho fahagagana amin''ny maty va Hianao? Ny matoatoa va no hitsangana hidera Anao? '
  '11':
  - type: text
    content: 'Hotorina any am-pasana va ny famindram-ponao, Ary ny fahamarinanao any amin''ny fandringanana? '
  '12':
  - type: text
    content: 'Ho fantatra ao amin''ny maizina va ny fahagagana ataonao, Ary ny fahamarinanao ao amin''ny tany fanadinoana? '
  '13':
  - type: text
    content: 'Fa raha izaho, dia Hianao no itarainako, Jehovah ô; Ary ny fivavako tonga eo anatrehanao nony maraina. '
  '14':
  - type: text
    content: 'Jehovah ô, nahoana no manary ny fanahiko Hianao Ka manafina ny tavanao amiko? '
  '15':
  - type: text
    content: 'Ory aho ka efa ho faty hatramin''ny fahazazako; Raha itambesa-ran''ny fampitahoranao aho, dia very hevitra; '
  '16':
  - type: text
    content: 'Manafotra ahy ny fahatezeranao; Matin''ny fampitahoranao aho; '
  '17':
  - type: text
    content: 'Mandifotra ahy mandrakariva tahaka ny rano ireny; Miara-manodidina ahy izy. '
  '18':
  - type: text
    content: Efa nampanalavirinao ahy ny olona tia ahy sy ny sakaizako; Ireo nahazatra ahy dia fahamaizinana.
  '2':
  - type: text
    content: 'Aoka ny fivavako ho tonga eo anatrehanao; Atongilano amin''ny fitarainako ny sofinao; '
  '3':
  - type: text
    content: Fa diboka ny fahoriana ny fanahiko; Ary ny aiko manakaiky ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Natao ho isan''izay midina any an-davaka aho Ary efa tahaka izay tsy manan-kery; '
  '5':
  - type: text
    content: Efa nafoy ho any amin'ny maty aho
  - type: note
    content: 'Na: Ny fandriako dia any amin''ny maty'
  - type: text
    content: ', Tahaka izay voavono, mandry ao am-pasana, Izay tsy tsarovanao intsony, Fa voafongotry ny tananao. '
  '6':
  - type: text
    content: 'Efa nametraka ahy any an-davaka ambany indrindra Hianao, Ao amin''ny maizina, dia ao amin''ny lalina. '
  '7':
  - type: text
    content: 'Ny fahatezeranao manindry ahy mafy, Ary ny alon-dranonao rehetra azeranao amiko. '
  '8':
  - type: text
    content: 'Efa nampanalavirinao ahy ny olona nahazatra ahy; Efa nataonao. fahavetavetana eo imasony aho; Voahidy aho ka tsy afa-mivoaka. '
  '9':
  - type: text
    content: Ny masoko efa pahina noho ny fahoriana; Jehovah ô, miantso Anao isan'andro aho, Mamefy tanana aminao aho.
