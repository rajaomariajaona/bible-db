document_id: JOS.23,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fananarana nataon'i Josoa
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary rehefa ela, taorian''ny nanomezan''i Jehovah fitsaharana ho an''ny Isiraely ho afaka amin''ny fahavalony rehetra manodidina, ary Josoa dia efa zoki-olona sady nandroso fahanterana, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ny lehilahy iray aminareo manenjika ny arivo; fa Jehovah Andriamanitrareo, Izy no miady ho anareo, araka izay nolazainy taminareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia tandremo tsara ny fanahinareo mba ho tia an''i Jehovah Andriamanitrareo. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa raha mihemotra ianareo ka miray aminareo ireo firenena sisa eo aminareo ireo ary mifanambady aminy ka miditra ao aminy, ary izy kosa ao aminareo, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'dia ho fantatrareo tokoa fa tsy handroaka ireo firenena ireo eo anoloanareo intsony Jehovah Andriamanitrareo; fa ho fandrika sy tonta aminareo ireo, ary ho fanindronana amin''ny tehezanareo, sy ho tsilo eo amin''ny masonareo, mandra-pahalany ritranareo tsy ho eo amin''ity tany soa nomen''i Jehovah Andriamanitrareo anareo ity. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary, indro, efa handeha ho amin''ny lalana falehan''ny tany rehetra aho izao; ary fantatrareo ao amin''ny fonareo rehetra sy ny fanahinareo rehetra fa tsy misy latsaka na dia zavatra iray akory aza ny zava-tsoa rehetra izay nilazan''i Jehovah Andriamanitrareo anareo; efa tanteraka taminareo avokoa izy rehetra: tsy nisy latsaka izy na dia zavatra iray akory aza. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary tahaka ny efa nanatanterahana taminareo ny zava-tsoa rehetra, izay nolazain''i Jehovah Andriamanitrareo taminareo, no hanatanterahan''i Jehovah aminareo kosa ny loza rehetra mandra-paharingany anareo tsy ho eo amin''ity tany soa nomen''i Jehovah Andriamanitrareo anareo ity. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Amin'izay hivadihanareo ny faneken'i Jehovah Andriamanitrareo, izay nandidiany anareo, sy handehananareo hanompo ireo andriamani-kafa ary hiankohofanareo eo anatrehany, dia hirehitra aminareo ny fahatezeran'i Jehovah, ary ho lany ringana faingana ianareo tsy ho eo amin'ny tany soa nomeny anareo.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'dia nantsoin''i Josoa ny Isiraely rehetra, dia ny loholony sy ny lehibeny sy ny mpitsara azy ary ny mpifehy azy, ka hoy izy taminy: Efa zoki-olona aho izao ka mandroso fahanterana, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ary ianareo efa nahita izay rehetra nataon''i Jehovah Andriamanitrareo tamin''ireo firenena rehetra ireo teo anoloanareo; fa Jehovah Andriamanitrareo no niady ho anareo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Indreo, efa voazarako ho lovan''ny firenenareo tamin''ny filokana ireo firenena sisa ireo, hatrany Jordana, mbamin''ny firenena rehetra izay nofongorako, ka hatramin''ny Ranomasina Lehibe andrefana. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary Jehovah Andriamanitrareo, Izy no handroaka ireny eo anoloanareo, dia hampiala azy eo anoloanareo; ary handova ny taniny ianareo araka izay nolazain''i Jehovah Andriamanitrareo taminareo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia mahereza tsara ianareo hitandrina sy hanao izay rehetra voasoratra ao amin''ny bokin''ny lalàn''i Mosesy, mba tsy hivilianareo hiala aminy na ho amin''ny ankavanana, na ho amin''ny ankavia, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'mba tsy hankanesanareo any amin''ireo firenena sisa eo aminareo ireo; ny anaran''ny andriamaniny dia aoka tsy hotononinareo na hampianiananareo akory, ary aza manompo azy na miankohoka eo anatrehany; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'fa Jehovah Andriamanitrareo ihany no ifikiro, araka ny nataonareo mandraka androany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa nandroaka firenena lehibe sy mahery teo anoloanareo Jehovah; ary dia tsy nisy olona nahajanona teo anoloanareo mandraka androany. '
