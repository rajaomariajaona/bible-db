document_id: SNG.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Teny nataon'ny ampakarina sy ny mpanjaka ary ny zanakavavin'i Jerosalema
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Efa tonga eto an-tsahako aho, ry havako ampakariko; Mioty ny miorako mbamin'ny zava-manitro aho; Efa homana ny toho-tanteliko mbamin'ny tanteliko aho, ary efa misotro ny divaiko mbamin'ny rononoko; Homàna ianareo, ry sakaizako, misotroa, eny, mivokisa divay, ry malala.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Natory aho, nefa nahatsiaro ihany ny foko; Injay! ny feon''ny malalako, izay mandondòna ka manao hoe: Vohay aho, ry havako'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ampakariko
    marker-yv: yv-n
  - type: text
    text: ' ampakariko, Ry voromailalako, ilay ahy tsy misy kilema; Fa vonton''ando ny lohako, Ny voloko milantolanto dia kotsan''ny andon''ny alina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa hoy izaho: Efa niala akanjo aho, ka hataoko ahoana indray no fiakanjo? Efa nioza tongotra aho, ka hataoko ahoana no fandoto azy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nampiditra ny tànany teo amin''ny loaka ilay malalako, dia nangorakoraka azy ny foko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nitsangana hamoha varavarana ny malalako ihany aho, ary nitete miora ny tanako, eny, ny rantsan-tanako nitete ranon''ny miora teo amin''ny famohana ny hidin-trano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Namoha varavarana ny malalako aho, kanjo efa nihodina izy ka lasa; Very hevitra aho tamin''ny nitenenany; Nitady azy aho, fa tsy nahita; Niantso azy aho, fa tsy novaliany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nahita ahy ny antily izay mandehandeha eny an-tanàna, dia nikapoka ka nandratra ahy; Ny mpiambina ny manda nanala ny lamba fisaronako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mampianiana anareo aho, ry zanakavavin''i Jerosalema: Raha mba hitanareo re ny malalako, dia ahoana no holazainareo aminy? Lazao fa mararim-pitia aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Inona ny malalanao mihoatra noho ny malala sasany, ry tsara tarehy amin'ny vehivavy? Inona ny malalanao mihoatra noho ny malala sasany, no dia mampianiana anay toy izao ianao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny malalako dia sady fotsy mangatsakatsaka no mena, notsongaina tamin''ny alinalina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny lohany dia toy ny tena volamena tsara; Ny volony dia milantolanto sady mangilohilo toy ny goaika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ny masony dia tahaka ny voromailala eo anilan''ny sakeli-drano, mandro amin''ny ronono sady tahaka ny vato soa alatsaka an-tranontranony izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny takolany dia tahaka ny tanim-boninkazo misy zava-manitra eo an-tsaha, dia tahaka ny tany navosaina
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. tilikambo
    marker-yv: yv-n
  - type: text
    text: ' misy voninkazo manitra. Ny molony dia tahaka ny lilia sady mitete ranon''ny miora. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny tenany dia tahaka ny anja-bolamena voaisy krysolita; Ny tenany dia tahaka ny ivory voarafitra tsara sady misarona safira; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny ranjony dia tahaka ny andry vatosanga
  - type: usfm
    marker: x
    children:
    - type: text
      text: marmora fotsy
    marker-yv: yv-n
  - type: text
    text: ' miorina amin''ny faladia tena volamena; Ny tarehiny dia tahaka an''i Libanona, tsara toy ny sedera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mamy dia mamy ny vavany
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lanilaniny
    marker-yv: yv-n
  - type: text
    text: ', eny, maha-te-ho-tia avokoa izy. Toy izany ny malalako, ary toy izany ny sakaizako, ry zanakavavin''i Jerosalema!'
