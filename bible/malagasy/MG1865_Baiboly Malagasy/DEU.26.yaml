document_id: DEU.26,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Teny farany hampahazoto ny Isiraely hatoky ny fahasoavan'i Jehovah sy mpanaraka Azy
  - type: text
    content: 'Ary rehefa tonga ao amin''ny tany izay omen''i Jehovah Andriamanitrao ho lovanao ianao ka mandova azy ary monina ao, '
  '10':
  - type: text
    content: 'Ary ankehitriny, Jehovah ô, indro, efa nentiko ny voaloham-bokatra amin''ny tany izay nomenao ahy. Dia avelao eo anatrehan''i Jehovah Andriamanitrao ny zavatra, ary mivavaha eo anatrehan''i Jehovah Andriamanitrao. '
  '11':
  - type: text
    content: 'Ary mifalia amin''ny soa rehetra izay nomen''i Jehovah Andriamanitrao anao sy ny ankohonanao ianao sy ny Levita mbamin''ny vahiny eo aminao. '
  '12':
  - type: text
    content: 'Rehefa voangonao ny fahafolon-karena rehetra avy amin''ny vokatrao amin''ny taona fahatelo, izay taona fanangonana ny fahafolon-karena, dia omeo ny Levita sy ny vahiny sy ny kamboty ary ny mpitondratena izany, mba hohaniny ao an-tanànanao, ka ho voky izy, '
  '13':
  - type: text
    content: 'ary dia lazao eo anatrehan''i Jehovah Andriamanitrao hoe: Efa navoakako avokoa ny zava-masina tao an-tranoko ka nomeko ny Levita sy ny vahiny sy ny kamboty ary ny mpitondratena, araka ny lalànao rehetra izay nandidianao ahy; tsy nandika ny didinao aho na nanadino azy. '
  '14':
  - type: text
    content: 'Tsy nisy nohaniko teo amin''ny fisaonako, na nentiko nivoaka teo amin''ny fahalotoako, na nataoko fahan-kanina noho ny maty; fa efa nihaino ny feon''i Jehovah Andriamanitro aho ka nanao araka izay rehetra nandidianao ahy. '
  '15':
  - type: text
    content: Tsinjovy ao amin'ny fonenanao masina any an-danitra, ka tahio ny Isiraely olonao sy ny tany izay nomenao anay araka izay nianiananao tamin'ny razanay, dia tany tondra-dronono sy tantely.
  '16':
  - type: text
    content: 'Anio no andidian''i Jehovah Andriamanitrao anao hanaraka ireo didy sy fitsipika ireo; koa tandremo sy araho amin''ny fonao rehetra sy ny fanahinao rehetra ireo. '
  '17':
  - type: text
    content: 'Efa nampiteny an''i Jehovah ianao androany fa ho Andriamanitrao Izy, ka handeha amin''ny lalany sy hitandrina ny lalàny sy ny didiny ary ny fitsipiny ianao ary hihaino ny feony. '
  '18':
  - type: text
    content: 'Ary Jehovah kosa efa nampiteny anao androany fa firenena rakitra soa ho Azy ianao, araka izay nolazainy taminao, mba hitandremanao ny didiny rehetra, '
  '19':
  - type: text
    content: sy hanandratany anao ho ambonin'ny firenena rehetra izay nataony, ho fiderana sy ho anarana ary ho voninahitra ary mba ho firenena masina ho an'i Jehovah Andriamanitrao ianao, araka izay nolazainy.
  '2':
  - type: text
    content: 'dia analao ny voaloham-bokatra rehetra amin''ny tany, izay alainao avy amin''ny taninao, izay omen''i Jehovah Andriamanitrao anao, ka ataovy an-karona; ary mankanesa ho any amin''ny tany izay hofidin''i Jehovah Andriamanitrao hampitoerany ny anarany; '
  '3':
  - type: text
    content: 'dia mankanesa amin''ny mpisorona amin izany andro izany, ka lazao aminy hoe: Manambara amin''i Jehovah Andriamanitrao aho anio fa tonga eto amin''ny tany izay nianianan''i Jehovah tamin''ny razantsika homeny antsika. '
  '4':
  - type: text
    content: 'Dia horaisin''ny mpisorona eny an-tananao ny harona ka hapetrany eo anoloan''ny alitaran''i Jehovah Andriamanitrao. '
  '5':
  - type: text
    content: 'Dia hiteny eo anatrehan''i Jehovah Andriamanitrao ianao ka hanao hoe: Syriana mpanjenjena no raiko, ka nidina tany Egypta izy, dia nivahiny tany mbamin''ny olom-bitsy; ary tany izy no tonga firenena lehibe sy mahery sady maro isa. '
  '6':
  - type: text
    content: 'Ary nanao ratsy tamintsika ny Egyptiana ka nampahory antsika sy nampanao antsika fanompoana mafy. '
  '7':
  - type: text
    content: 'Dia nitaraina tamin''i Jehovah, Andriamanitry ny razantsika, isika, ka nihaino ny feontsika Izy ary nijery ny alahelontsika sy ny asantsika ary ny fahoriantsika; '
  '8':
  - type: text
    content: 'ary tanana mahery sy sandry nahinjitra sy fampahatahorana lehibe sy famantarana ary fahagagana no nitondran''i Jehovah antsika nivoaka avy tany Egypta, '
  '9':
  - type: text
    content: 'dia nitondra antsika niditra teto amin''ity tany ity Izy ka nanome antsika ity tany ity, dia tany tondra-dronono sy tantely. '
