document_id: ISA.20,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fanoharana ny amin'ny handravana an'i Etiopia sy Egypta
  - type: text
    content: 'Tamin''ny taona nankanesan''i Tartana tany Asdoda, raha nirahin''i Sargona, mpanjakan''i Asyria, izy ka namely an''i Asdoda ary nahafaka azy, '
  '2':
  - type: text
    content: 'tamin''izany andro izany no nampitondran''i Jehovah teny an''Isaia, zanak''i Amoza, hoe: Andeha, borahy ny lamba fisaonana ho afaka amin''ny valahanao, ary esory ny kiraronao hiala amin''ny tongotrao. Dia nanao izany izy ka nandeha tsy nitafy sady tsy nikiraro. '
  '3':
  - type: text
    content: 'Ary hoy Jehovah: Tahaka ny nandehanan''Isaia mpanompoko telo taona sady tsy nitafy no tsy nikiraro mba ho famantarana sy ho fahagagana ny amin''i Egypta sy Etiopia, '
  '4':
  - type: text
    content: 'dia ho toy izany no hitondran''ny mpanjakan''i Asyria ny Egyptiana ho babo sy ny Etiopiana ho sambotra, na tanora na antitra, samy tsy hitafy sady tsy hikiraro no tsy hisarom-pe, ho henatr''i Egypta. '
  '5':
  - type: text
    content: Ary ho raiki-tahotra sy ho menatra ny Isiraely
  - type: note
    content: Heb. izy
  - type: text
    content: ' noho ny amin''i Etiopia fanantenany sy Egypta reharehany. '
  '6':
  - type: text
    content: 'Ary amin''izany andro izany ny mponina etỳ amoron-dranomasina dia hanao hoe: He! ity manjo ilay nantenaintsika sady nandosirantsika ho famonjena antsika ho afaka amin''ny mpanjakan''i Asyria! Aiza intsony re no handosirantsika?'
