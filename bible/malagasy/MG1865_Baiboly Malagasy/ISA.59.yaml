document_id: ISA.59
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny ota, izay efitra fisarahana, sy ny fandravana azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Indro, ny tànan''i Jehovah tsy fohy, fa mahavonjy, ary ny sofiny tsy lalodalovana, fa mahare; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa ny helokareo no efitra mampisaraka anareo amin''Andriamanitrareo, ary ny fahotanareo no mampiafina ny tavany aminareo, ka dia tsy mihaino Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa ny tananareo dia voaloto amin''ny rà, ary ny rantsan-tananareo amin''ny heloka; ny molotrareo miteny lainga, ny lelanareo mibedibedy faharatsiana. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tsy misy mitory olona araka ny fahamarinana, na mandahatra ny rariny araka izay mahatoky; matoky ny tsy izy sy miteny zava-poana izy; Torontoronina fampahoriana izy ka miteraka fandozana. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mikotrika ny atodin''ny menarana izy ary manenona ny tranon-kala; Izay homana ny atodin''ireny dia ho faty, fa raha poritra iny, dia menarana no miporitsaka avy ao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny tranon-kalany tsy azo atao fitafiana, ary ny asany tsy mahatafy azy; ny asany dia asa fampahoriana, ary asan-doza no eo an-tànany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny tongony miriotra ho amin''ny ratsy sy mimaona handatsaka rà marina; ny fisainany dia fisainana fampahoriana, fandravana sy fandringanana no eo amin''ny alehany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny lalan''ny fiadanana tsy fantany; ary tsy misy rariny ao amin''ny alehany; lalana miolakolaka ny lalany, ka na iza na iza mandia izany dia tsy mahita fiadanana. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary noho izany dia lavitra antsika ny rariny, ary ny fahamarinana tsy mahatratra antsika; miandry ny mazava isika, nefa indro ny maizina, ary fahazavana, fa mbola ao amin''ny aizim-pito ihany no andehanantsika. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mitsapatsapa manara-drindrina tahaka ny jamba isika eny, mitsapatsapa tahaka ny tsy mana-maso; tafintohina amin'ny mitataovovonana tahaka ny amin'ny maizimaizina isika, ary eo amin'ny matanjaka
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: any an-efitra'
    marker-yv: yv-n
  - type: text
    text: ' dia tahaka ny maty isika. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Isika rehetra mampierona tahaka ny bera ary mitoloko tokoa tahaka ny voromailala; miandry ny rariny isika, nefa tsy misy, ary ny famonjena, nefa lavitra antsika izany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa efa betsaka eo anatrehanao ny fiodinanay, ary ny fahotanay miampanga anay; eny, tsaroanay ny fahadisoanay, ary ny helokay dia fantatray, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia ny miodina sy ny mandà an'i Jehovah, ary ny miala amin'ny fanarahana an'Andriamanitray, ny miteny fampahoriana sy fikomiana, ary ny mamorona
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. torontoronina
    marker-yv: yv-n
  - type: text
    text: ' sy mamoaka teny lainga avy ao am-po. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nahemotra ny rariny, ary mijanon-davitra ny hitsiny; fa tafintohina eny an-kalalahana ny fahamarinana, ary ny hitsim-po tsy mahazo miditra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Eny, tsy eo ny fahamarinana; ary izay mifady ny ratsy dia hoatra ny manolo-tena hobabom''ny sasany. Ary hitan''i Jehovah ny tsi-fisian''ny rariny, ka nataony fa ratsy izany; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Eny, hitany fa tsy nisy olona, sady talanjona Izy, satria tsy nisy mpanalalana, ka dia ny sandriny ihany no nanao famonjena ho Azy, ary ny fahamarinany no nanohana Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Niakanjo fahamarinana tahaka ny akanjo fiarovan-tratra Izy, ary fiarovan-doha famonjena no teo amin''ny lohany; ary niakanjo ny akanjo famaliana Izy eny, nandray ny fahasaro-piaro ho akanjo ivelany Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Araka ny asa natao no hamaliany, dia fahatezerana mirehitra ho an''ny fahavalony, famaliana ho an''ny rafiny; ary ny nosy dia hovaliany tokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary hatrany andrefana dia hatahotra ny anaran'i Jehovah ny olona ary ny voninahiny hatramin'ny fiposahan'ny masoandro; ary ny fihaviny dia ho toy ny rano maria, Ampandehanin'ny Fanahin'i Jehovah
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Fa raha avy toy ny ony ny fahavalo. Ny Fanahin''i Jehovah hanangana faneva hisakana azy'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hisy Mpanavotra ho tonga any Ziona, Ho amin''ny Jakoba izay miala amin''ny fahadisoana, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Raha Izaho, dia izao no fanekeko aminy, hoy Jehovah: Ny Fanahiko Izay ao aminao sy ny teniko izay nataoko teo am-bavanao dia tsy hiala amin''ny vavanao, na amin''ny vavan''ny taranakao, na amin''ny vavan''ny taranaky ny taranakao, hatramin''izao ka ho mandrakizay, hoy Jehovah.'
