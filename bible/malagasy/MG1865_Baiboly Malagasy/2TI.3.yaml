document_id: 2TI.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famporisihana an'i Timoty handroso tsara araka ny efa nataony ihany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa aoka ho fantatrao izao: fa any am-parany any dia hisy andro mahory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa ny olona ho tia tena, ho tia vola, ho mpandoka tena, mpiavonavona, miteny ratsy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. manao blasfemia; izahao Mat. 9,3
    marker-yv: yv-n
  - type: text
    text: ', tsy manoa ray sy reny, tsy misaotra, tsy manaja izay masina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'tsy manam-pitiavana, mpanontolo fo, mpanendrikendrika, tsy mahonom-po, lozabe, tsy tia ny tsara, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'mpamadika, kirina, mpieboebo, tia ny fahafinaretana mihoatra noho ny fitiavany an''Andriamanitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'manana ny endriky ny toe-panahy araka an''Andriamanitra, nefa nandà ny heriny; ireny koa dia halaviro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa isan''ireny izay misokosoko miditra any an-tranon''ny sasany ka mahalasa ho babo ny vehivavy adaladala, vesaran''ny fahotana, entin''ny filàna maro, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'mianatra mandrakariva, nefa tsy mahatratra ny fahalalana ny marina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary tahaka ny nanoheran''i Jana sy Jambra an''i Mosesy no anoheran''ireo koa ny fahamarinana, dia olona maloto saina sady tsy manam-pinoana marina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Kanefa tsy handroso intsony izy; fa ny hadalany dia haseho amin'ny olona rehetra, tahaka ny an'ireo koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa ianao kosa dia efa nanaraka tsara ny fampianarako, ny fitondran-tenako, ny fisainako, ny finoako, ny fandeferako, ny fitiavako, ny faharetako, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ny nanenjehana ahy, ny fahoriana izay nanjo ahy tany Antiokia, tany Ikonioma, tany Lystra, dia ny fanenjehana izay niaretako; ary ny Tompo nahafaka ahy tamin''izany rehetra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Eny, izay rehetra te-ho velona amin''ny toe-panahy araka an''Andriamanitra, izay ao amin''i Kristy Jesosy, dia henjehina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa ny ratsy fanahy sy ny mpanoloky kosa dia handroso hiharatsiratsy kokoa sady mamitaka no fitahina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa ianao kosa dia mahareta amin''izay zavatra nianaranao sy nampinoana anao, satria fantatrao izay nampianatra anao izany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'fa hatry ny fony vao zaza ianao dia efa nahalala ny Soratra Masina, izay mampahahendry anao ho amin''ny famonjena amin''ny finoana izay ao amin''i Kristy Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izay soratra rehetra nomen''ny tsindrimandrin''Andriamanitra dia mahasoa koa ho fampianarana, ho fandresen-dahatra, ho fanitsiana izay diso, ho fitaizana amin''ny fahamarinana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: mba ho tanteraka ny olon'Andriamanitra, ho vonona tsara ho amin'ny asa tsara rehetra.
