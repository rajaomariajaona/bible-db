document_id: PSA.138,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiderana an'Andriamanitra noho ny famindram-pony sy ny fahamarinany, izay mbola heken'ny mpanjaka rehetra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nataon''i Davida. Hidera Anao amin''ny foko rehetra aho; Eo anatrehan''ireo andriamanitra no hankalazako Anao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hivavaka manandrify ny tempolinao masina aho Ka hidera ny anaranao noho ny famindram-ponao sy ny fahamarinanao; Fa efa nomenao voninahitra ny teninao ho ambonin'ny anaranao rehetra.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tamin''ny andro nitarainako dia namaly ahy Hianao; Nomenao fahasahiana aho ka nisy hery ny fanahiko. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Jehovah ô, hidera Anao ny mpanjaka rehetra amin''ny tany, Fa handre ny tenin''ny vavanao izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Eny hihira ny amin'ny lalan'i Jehovah izy; Fa lehibe ny voninahitr'i Jehovah.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fa na dia avo aza Jehovah dia
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Fa avo Jehovah ka'
      marker-yv: yv-n
    - type: text
      text: ' mijery ny ambany toetra, Ary ny mpiavonavona fantany eny lavitra eny. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Na dia handeha eo amin''ny fahoriana aza aho dia hamelona ahy Hianao; Haninjitra ny tananao hanohitra ny fahatezeran''ny fahavaloko Hianao Ary hamonjy ahy ny tananao ankavanana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Jehovah no hahatanteraka ny amiko; Jehovah ô, mandrakizay ny famindram-ponao; Aza mahafoy ny asan'ny tananao.
