document_id: AMO.7,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny natao tamin'i Amosa tao Betela, sy ny teny nataony tamin'izany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Izao no nasehon''i Jehovah Tompo tamiko: Indro, nanao ny valala tamin''ny voalohan''ny nitsimohan''ny kolokolon''ahitra Izy; ary, indro, kolokolon''izay nojinjana ho an''ny mpanjaka izany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia naniraka tany amin''i Jeroboama, mpanjakan''ny Isiraely, Amazia, ilay mpisorona tao Betela, nanao hoe: Amosa efa nanao tetika hikomy aminao teo amin''ny taranak''Isiraely, ary tsy zakan''ny tany ny teniny rehetra, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'satria hoy Amosa: Ho fatin-tsabatra Jeroboama, ary hobaboina hiala amin''ny taniny tokoa ny Isiraely. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary hoy Amazia tamin''i Amosa: Ry mpahita! andeha mandositra mankany amin''ny tanin''ny Joda ianao, ka mihinàna hanina any, ary maminania any; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: fa aza maminany eto Betela intsony; fa fitoera-masin'ny mpanjaka sy tranom-panjakana ity.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia namaly Amosa ka nanao tamin''i Amazia hoe: Tsy mba mpaminany aho, na zanaka ny mpaminany; fa mpiandry ondry sy mpioty'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: mpandraotra'
      marker-yv: yv-n
    - type: text
      text: ' aviavy'
    - type: usfm
      marker: x
      children:
      - type: text
        text: sykomora
      marker-yv: yv-n
    - type: text
      text: ' ihany aho, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'saingy nalain''i Jehovah tany ampiandrasana ondry ka nataony hoe: Mandehana, ka maminania amin''ny Isiraely oloko. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ka mba henoy ny tenin''i Jehovah: Hianao manao hoe: Aza maminany ny hamelezana ny Isiraely, ary aza milaza ny hamelezana ny taranak''Isaka; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Koa izao no lazain''i Jehovah: Ny vadinao hijangajanga ao an-tanàna, ary ny zanakao-lahy sy ny zanakao-vavy ho lavon-tsabatra, Ary ny taninao hozaraina amin''ny famolaina; Ary ny tenanao ho faty any amin''ny tany maloto; Ary ny Isiraely hobaboina hiala amin''ny taniny tokoa.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary nony efa laniny avokoa ny zava-maniry amin''ny tany, dia hoy izaho: Jehovah Tompo, mifona aminao aho mamelà heloka! Hataon''i Jakoba ahoana no fahajanona? Fa kely izy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nanenenan''i Jehovah izany; Tsy hisy izany, hoy Jehovah. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Izao no nasehon''i Jehovah Tompo tamiko: Indro, Jehovah Tompo miantso hifandahatra hamely amin''ny afo, ka nandevona ny lalina lehibe sy nila handany ny zara-lova izany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia hoy izaho: Jehovah Tompo, Mifona aminao aho, mitsahara! Hataon''i Jakoba ahoana no fahajanona? Fa kely izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Nanenenan''i Jehovah izany; Tsy hisy izany, hoy Jehovah Tompo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Izao no nasehony ahy: Indro, ny Tompo nitsangana teo ambonin''ny manda natao amin''ny pilao, sady nisy pilao teny an-tànany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia hoy Jehovah tamiko: Inona no hitanao, ry Amosa? Ary hoy izaho: Pilao. Dia hoy ny Tompo: Indro, hanisy pilao eo amin''ny Isiraely oloko Aho, fa tsy handefitra aminy'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. handalo azy
      marker-yv: yv-n
    - type: text
      text: ' intsony; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Dia ho foana ny fitoerana avon'Isaka, ary ho rava ny fitoera-masin'Isiraely; Ary hitsangana Aho ka hamely sabatra ny taranak'i Jeroboama.
