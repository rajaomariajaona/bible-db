document_id: 1CO.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Anatra noho ny tsy nanesorany ilay lehilahy nanao fitondran-tena vetaveta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Efa re marina fa misy fijangajangana atỳ aminareo, eny, dia fijangajangana izay tsy misy tahaka azy na dia amin''ny jentilisa asa, fa misy anankiray manambady ny vadin-drainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ianareo indray va no mirehareha, ka tsy nampalahelo anareo akory izany, mba hesorina tsy ho ao aminareo ilay nanao izany zavatra izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa izaho, na dia tsy teo aza ny tenako, nefa teo ihany ny fanahiko, dia efa nitsara sahady an''ilay nanao toy izany, tahaka ny teo ihany aho: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'amin''ny anaran''i Jesosy Tompontsika - rehefa tafangona ianareo sy ny fanahiko omban''ny herin''i Jesosy Tompontsika - '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'hanolotra izany anankiray izany ho an''i Satana hanimbana ny nofo, mba hamonjena ny fanahy amin''ny andron''i Jesosy Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy mety ny fireharehanareo. Tsy fantatrareo va fa ny masirasira kely dia mahazo ny vongana rehetra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Esory ny masirasira ela, mba ho vongana vaovao ianareo, araka izay tsy maha-misy masirasira anareo. Fa voavono Kristy, Paska ho antsika; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ka dia aoka isika hanao andro firavoravoana, tsy amin''ny masirasira ela, na amin''ny masirasira lolompo sy faharatsiana, fa amin''ny mofo tsy misy masirasira, dia ny fahadiovam-po sy ny fahamarinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nanoratra taminareo teo amin''ny epistily aho mba tsy hiharoharoanareo amin''izay mpijangajanga; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'nefa tsy ny mpijangajanga rehetra amin''izao tontolo izao, na ny mpierina sy ny mpanao an-keriny, na ny mpanompo sampy; fa raha izany, dia tsy maintsy miala amin''izao tontolo izao ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa ny nanoratako taminareo, dia ny mba tsy hiharoharoanareo aminy, raha misy atao hoe rahalahy, nefa mpijangajanga, na mpierina, na mpanompo sampy, na mpanaratsy, na mpimamo, na mpanao an-keriny, dia aza miara-mihinana akory amin''ny toy izany ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa ahoako ny hitsara ny any ivelany? Tsy ny ao anatiny va no tsarainareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa ny any ivelany dia tsarain'Andriamanitra. Esory aminareo ilay mpanao ratsy.
