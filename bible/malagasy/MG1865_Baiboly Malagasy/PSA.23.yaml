document_id: PSA.23,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny Mpiandry Tsara
  - type: text
    content: 'Salamo nataon''i Davida. Jehovah no Mpiandry ahy, tsy hanan-java-mahory aho, '
  '2':
  - type: text
    content: 'Mampandry ahy amin''ny ahi-maitso Izy; mitondra ahy eo amoron''ny rano fialan-tsasatra Izy. '
  '3':
  - type: text
    content: Mamelombelona ny fanahiko Izy; mitarika ahy amin'ny lalan'ny fahamarinana noho ny anarany Izy.
  '4':
  - type: text
    content: 'Eny, na dia mandeha mamaky ny lohasaha aloky ny fahafatesana aza aho, dia tsy hatahotra ny loza aho, fa Hianao no amiko; ny tsorakazonao sy ny tehinao, ireo no mahafa-tahotra ahy. '
  '5':
  - type: text
    content: Mamelatra latabatra eo anoloako eo imason'ny fahavaloko Hianao; manosotra diloilo ny lohako Hianao; ny kapoakako feno dia feno.
  '6':
  - type: text
    content: Eny tokoa, fahasoavana sy famindram-po no hanaraka ahy amin'ny andro rehetra hiainako, dia hitoetra ao an-tranon'i Jehovah andro lava aho.
