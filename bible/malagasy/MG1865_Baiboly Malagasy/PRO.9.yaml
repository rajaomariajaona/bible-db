document_id: PRO.9,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fiantsoan'ny fahendrena sy ny fahadalana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fahendrena efa nanao ny tranony; Efa nipaika ny andriny fito izy; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fahatahorana an''i Jehovah no fiandoham-pahendrena; Ary ny fahafantarana ny Iray Masina no fahazavan-tsaina. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izaho no hampitomboana ny andronao Sy hanamaroana ny taona hiainanao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha hendry ianao, dia hendry ho an''ny tenanao ihany; Fa raha maniratsira kosa ianao, dia ianao ihany no hiharan''izany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fahadalana dia toy ny vehivavy vavàna; Kely saina izy ka tsy mahalala na inona na inona. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa mipetraka eo am-baravaran''ny tranony izy, Ary amin''ny seza eny amin''ny fitoerana avo eo an-tanàna, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mba hiantso ny mpandalo Izay mizotra amin''ny alehany, ka manao hoe: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka hivily atỳ izay kely saina; Ary amin''izay tsy ampy saina dia hoy izy: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mamy ny rano angalarina, Ary fy ny mofo hanina amin''ny fiafenana, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa tsy fantany fa ny maty no ao, Ary any amin'ny halalin'ny fiainan-tsi-hita
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Heb: Shoela'
      marker-yv: yv-n
    - type: text
      text: ' ny olona nasainy.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa namono ny bibiny sy nangaroharo ny divainy izy Ary efa namelatra ny latabany koa; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary efa naniraka ny ankizivaviny izy; Miantso eny an-tampon''ny fitoerana avo any an-tanàna izy ka manao hoe: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay kely saina, dia aoka izy hankatỳ; Ary amin''izany tsy ampy saina dia hoy izy: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avia, hano ny mofoko, Ary sotroy ny divay voaharoharoko. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ilaozy ny
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Mitsahara, ry'
      marker-yv: yv-n
    - type: text
      text: ' kely saina, dia ho velona ianao, Ary mizora amin''ny lalan''ny fahalalana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay mananatra ny mpaniratsira dia afa-baraka; Ary izay mananatra ny ratsy fanahy dia hahazo tsiny. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza mananatra ny mpaniratsira ianao, fandrao halany; Ny hendry no anaro, dia ho tiany ianao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toroy ny hendry, dia hihahendry izy; Ampianaro ny marina, dia hitombo saina izy. '
