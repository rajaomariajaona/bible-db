document_id: PRO.12,96
type_code: plt
verses:
  '1':
  - type: text
    content: Izay tia fananarana no tia fahalalana; Fa izay mandà anatra dia biby.
  '10':
  - type: text
    content: Ny marina mitsimbina ny ain'ny bibiny; Fa fahasiahana kosa no famindram-pon'ny ratsy fanahy;
  '11':
  - type: text
    content: Izay miasa ny taniny dia ho voky hanina; Fa izay manaraka ny olom-poana
  - type: note
    content: 'Na: ny zava-poana'
  - type: text
    content: ' dia tsy ampy saina.'
  '12':
  - type: text
    content: Ny mpanota maniry ny hazan
  - type: note
    content: 'Na: ny fandriky'
  - type: text
    content: '''ny ratsy fanahy; Fa ny fakan''ny marina mitrebona'
  - type: note
    content: 'Na: Fa ny marina ataon''Andriamanitra miorim-paka'
  - type: text
    content: .
  '13':
  - type: text
    content: Amin'ny fahotan'ny molotra dia misy fandrika ahitan-doza; Fa ny marina ho afaka amin'ny fahoriana.
  '14':
  - type: text
    content: Ny vokatry ny vavan'ny olona no mahavoky soa azy, Ary ny asan'ny tànany hitsingerina aminy.
  '15':
  - type: text
    content: Ny lalan'ny adala dia mahitsy eo imasony; Fa izay mino anatra no hendry.
  '16':
  - type: text
    content: Ny fahasosoran'ny adala dia fantatra miaraka amin'izay; Fa izay mahatsindry fo amin'ny fanalam-baraka no hendry.
  '17':
  - type: text
    content: Izay olona mahatoky dia manambara ny rariny; Fa ny vavolombelona mandainga kosa miteny fitaka.
  '18':
  - type: text
    content: Misy mandefalefa teny tsy tsaroana ka tonga toy ny fanindron'ny sabatra; Fa ny lelan'ny marina dia fanasitranana kosa.
  '19':
  - type: text
    content: Ny molotra marina ampitoerina ho mandrakizay; Fa ny lela mandainga dia indray mipi-maso monja.
  '2':
  - type: text
    content: Ny tsara fanahy mahazo sitraka amin'i Jehovah; Fa ny mamoron-tsain-dratsy hohelohiny.
  '20':
  - type: text
    content: Fitaka no ao am-pon'izay mamoron-tsain-dratsy; Fa hafaliana no amin'izay misaina fiadanana.
  '21':
  - type: text
    content: Tsy misy ratsy manjo ny marina; Fa heni-doza
  - type: note
    content: Heb. henika ny ratsy
  - type: text
    content: ' ny ratsy fanahy. '
  '22':
  - type: text
    content: Fahavetavetana eo imason'i Jehovah ny molotra mandainga; Fa izay olona mahatoky no ankasitrahany.
  '23':
  - type: text
    content: Ny olon-kendry tsy mba mampideradera fahalalana foana
  - type: note
    content: Heb. manafina fahalalana
  - type: text
    content: ; Fa ny fon'ny adala mamoaka fahadalana.
  '24':
  - type: text
    content: Ny tanan'ny mazoto no hanapaka; Fa izay miraviravy tanana dia hampanompoina.
  '25':
  - type: text
    content: Ny alahelo ao am-pon'ny olona dia mampitanondrika azy; Fa ny teny soa no mahafaly azy.
  '26':
  - type: text
    content: Ny marina dia mitari-dalana ny namany; Fa ny alehan'ny ratsy fanahy kosa no mampivily azy.
  '27':
  - type: text
    content: Ny kamo tsy mety mihaza
  - type: note
    content: 'Na: tsy mahatono izay nohazainy'
  - type: text
    content: ; Fa fananana soa ho an'ny olona ny zoto.
  '28':
  - type: text
    content: Amin'ny lalan'ny fahamarinana no misy fiainana, Ary ny tsi-fahafatesana no lalan-kalehany.
  '3':
  - type: text
    content: Tsy maha-tafatoetra ny olona ny haratsiana; Fa ny fakan'ny marina tsy mba hihetsika.
  '4':
  - type: text
    content: 'Ny vehivavy tsara dia satro-boninahitry ny lahy; Fa ny vehivavy manao izay mahamenatra kosa dia tahaka ny lò ao anatin''ny taolana. '
  '5':
  - type: text
    content: 'Rariny ny hevitry ny marina; Fa fitaka ny fisainan''ny ratsy fanahy. '
  '6':
  - type: text
    content: Ny tenin'ny ratsy fanahy dia otrika ho enti-mandatsa-drà; Fa ny vavan'ny marina hamonjy azy.
  '7':
  - type: text
    content: Haringana ny ratsy fanahy ka tsy ho ao intsony
  - type: note
    content: 'Na: Vetivety foana dia tsy ao intsony ny ratsy fanahy'
  - type: text
    content: ; Fa ny mpianakavin'ny marina haharitra.
  '8':
  - type: text
    content: Araka ny fahendren'ny olona no hiderana azy; Fa izay meloka am-po dia hatao tsinontsinona.
  '9':
  - type: text
    content: Aleo ambany toetra, nefa manana mpanompo iray, Toy izay mihambo ho be voninahitra, nefa tsy manan-kohanina akory.
