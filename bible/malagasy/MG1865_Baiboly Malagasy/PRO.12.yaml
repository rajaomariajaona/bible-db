document_id: PRO.12
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Izay tia fananarana no tia fahalalana; Fa izay mandà anatra dia biby.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny tsara fanahy mahazo sitraka amin'i Jehovah; Fa ny mamoron-tsain-dratsy hohelohiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tsy maha-tafatoetra ny olona ny haratsiana; Fa ny fakan'ny marina tsy mba hihetsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny vehivavy tsara dia satro-boninahitry ny lahy; Fa ny vehivavy manao izay mahamenatra kosa dia tahaka ny lò ao anatin''ny taolana. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rariny ny hevitry ny marina; Fa fitaka ny fisainan''ny ratsy fanahy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny tenin'ny ratsy fanahy dia otrika ho enti-mandatsa-drà; Fa ny vavan'ny marina hamonjy azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Haringana ny ratsy fanahy ka tsy ho ao intsony
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Vetivety foana dia tsy ao intsony ny ratsy fanahy'
    marker-yv: yv-n
  - type: text
    text: ; Fa ny mpianakavin'ny marina haharitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Araka ny fahendren'ny olona no hiderana azy; Fa izay meloka am-po dia hatao tsinontsinona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aleo ambany toetra, nefa manana mpanompo iray, Toy izay mihambo ho be voninahitra, nefa tsy manan-kohanina akory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny marina mitsimbina ny ain'ny bibiny; Fa fahasiahana kosa no famindram-pon'ny ratsy fanahy;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izay miasa ny taniny dia ho voky hanina; Fa izay manaraka ny olom-poana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny zava-poana'
    marker-yv: yv-n
  - type: text
    text: ' dia tsy ampy saina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny mpanota maniry ny hazan
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny fandriky'
    marker-yv: yv-n
  - type: text
    text: '''ny ratsy fanahy; Fa ny fakan''ny marina mitrebona'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Fa ny marina ataon''Andriamanitra miorim-paka'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Amin'ny fahotan'ny molotra dia misy fandrika ahitan-doza; Fa ny marina ho afaka amin'ny fahoriana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny vokatry ny vavan'ny olona no mahavoky soa azy, Ary ny asan'ny tànany hitsingerina aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ny lalan'ny adala dia mahitsy eo imasony; Fa izay mino anatra no hendry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny fahasosoran'ny adala dia fantatra miaraka amin'izay; Fa izay mahatsindry fo amin'ny fanalam-baraka no hendry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay olona mahatoky dia manambara ny rariny; Fa ny vavolombelona mandainga kosa miteny fitaka.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Misy mandefalefa teny tsy tsaroana ka tonga toy ny fanindron'ny sabatra; Fa ny lelan'ny marina dia fanasitranana kosa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny molotra marina ampitoerina ho mandrakizay; Fa ny lela mandainga dia indray mipi-maso monja.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fitaka no ao am-pon'izay mamoron-tsain-dratsy; Fa hafaliana no amin'izay misaina fiadanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy misy ratsy manjo ny marina; Fa heni-doza
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. henika ny ratsy
    marker-yv: yv-n
  - type: text
    text: ' ny ratsy fanahy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fahavetavetana eo imason'i Jehovah ny molotra mandainga; Fa izay olona mahatoky no ankasitrahany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny olon-kendry tsy mba mampideradera fahalalana foana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. manafina fahalalana
    marker-yv: yv-n
  - type: text
    text: ; Fa ny fon'ny adala mamoaka fahadalana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny tanan'ny mazoto no hanapaka; Fa izay miraviravy tanana dia hampanompoina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny alahelo ao am-pon'ny olona dia mampitanondrika azy; Fa ny teny soa no mahafaly azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ny marina dia mitari-dalana ny namany; Fa ny alehan'ny ratsy fanahy kosa no mampivily azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ny kamo tsy mety mihaza
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tsy mahatono izay nohazainy'
    marker-yv: yv-n
  - type: text
    text: ; Fa fananana soa ho an'ny olona ny zoto.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Amin'ny lalan'ny fahamarinana no misy fiainana, Ary ny tsi-fahafatesana no lalan-kalehany.
