document_id: 2CO.4,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary amin''izany, satria manana izany fanompoana izany izahay, araka ny nahazoanay famindram-po, dia tsy ketraka. '
  '10':
  - type: text
    content: mitondra ny fahafatesan
  - type: note
    content: Gr. ny famonoanana an'
  - type: text
    content: '''i Jesosy mandrakariva ao amin''ny tena izahay, mba haseho ao amin''ny tenanay koa ny fiainan''i Jesosy. '
  '11':
  - type: text
    content: 'Fa izahay izay velona dia atolotra ho amin''ny fahafatesana mandrakariva noho ny amin''i Jesosy, mba haseho ao amin''ny nofonay mety maty koa ny fiainan''i Jesosy. '
  '12':
  - type: text
    content: 'Koa ny fahafatesana no miasa ao aminay, fa ny fiainana kosa ao aminareo. '
  '13':
  - type: text
    content: 'Ary satria manana izany fanahin''ny finoana izany indrindra izahay, araka ny voasoratra hoe: Nino aho, ka dia niteny (Sal. 116. 10), dia mino koa izahay ka miteny; '
  '14':
  - type: text
    content: 'fa fantatray fa Izay nanangana an''i Jesosy Tompo no hanangana anay koa miaraka aminareo. '
  '15':
  - type: text
    content: 'Fa ny zavatra rehetra dia natao noho ny aminareo, mba hitomboan''ny fisaorana ho voninahitr''Andriamanitra noho ny fitombon''ny fahasoavana amin''ny maro. '
  '16':
  - type: text
    content: Ary tsy ketraka izahay; fa na dia mihalevona aza ny toetray ivelany, dia havaozina isan'andro isan'andro kosa ny toetray
  - type: note
    content: Ny olonay
  - type: text
    content: ' anatiny. '
  '17':
  - type: text
    content: 'Fa ny fahorianay maivana, izay vetivety foana, dia mainka miasa fatratra indrindra ka mahatanteraka voninahitra mavesatra maharitra mandrakariva ho anay, '
  '18':
  - type: text
    content: raha tsy mijery ny hita izahay, fa ny tsy hita; fa ny hita dia ho vetivety foana, fa ny tsy hita no haharitra mandrakizay.
  '2':
  - type: text
    content: 'Fa efa nolavinay ny zavatra takona mahamenatra, ka tsy mandeha amin''ny fihendrena, na manatsatso ny tenin''Andriamanitra izahay; fa amin''ny fanehoana ny marina no ideranay tena amin''ny fieritreretan''ny olona rehetra eo imason''Andriamanitra. '
  '3':
  - type: text
    content: 'Fa raha miafina ny filazantsaranay, dia miafina amin''izay ho very izany, '
  '4':
  - type: text
    content: 'izay nohajambain''ny andriamanitr''izao tontolo izao, dia ny sain''ny tsy mino, mba tsy hiposahan''ny fahazavan''ny filazantsaran''ny voninahitr''i Kristy, Izay endrik''Andriamanitra. '
  '5':
  - type: text
    content: 'Fa tsy ny tenanay no torinay, Fa Kristy Jesosy Tompo, ary izahay mpanomponareo noho ny amin''i Jesosy. '
  '6':
  - type: text
    content: 'Fa Andriamanitra, izay nandidy hoe: Aoka ny mazava hahazava ao amin''ny maizina, no nampahazava ny fonay ho amin''ny fahazavan'
  - type: note
    content: 'Na: hampisehoana'
  - type: text
    content: '''ny fahalalana ny voninahitr''Andriamanitra eo amin''ny tavan''i Jesosy Kristy. '
  '7':
  - type: text
    content: 'Fa manana izao rakitra izao amin''ny vilany tany izahay, mba ho an''Andriamanitra ny halehiben''ny hery, fa tsy ho avy aminay. '
  '8':
  - type: text
    content: 'Voageja manodidina izahay, nefa tsy tery; very hevitra, nefa tsy mamoy fo; '
  '9':
  - type: text
    content: 'enjehina, nefa tsy nafoy, potraka, nefa tsy maty; '
