document_id: JER.23
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faminaniana ny amin'ny mpaminany sandoka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lozan''ireo mpiandry izay manimba sy mampihahaka ny ondry fiandriko, hoy Jehovah '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Koa izao no lazain''i Jehovah, Andriamanitry ny Isiraely, ny amin''ireo mpiandry izay miandry ny oloko: Hianareo efa nampihahaka ny ondriko sy nandronjindronjina azy, fa tsy nanolokolo azy; Koa, indro, hovaliako ianareo noho ny faharatsian''ny ataonareo, hoe Jehovah '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Izaho hanangona ny ondriko sisa avy any amin''ny tany rehetra izay nandroahako azy ka hampodiko ho any amin''ny saha niandrasana azy, dia hitombo sy hihamaro izy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hanendry mpiandry ho azy Aho, ka dia hiandry azy ireo; Ka tsy hatahotra na hivadi-po intsony izy, sady tsy hisy tsy ho voavory, hoy Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Indro, avy ny andro, hoy Jehovah, izay hananganako Rantsana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Solofo'
    marker-yv: yv-n
  - type: text
    text: ' marina ho an''i Davida, ka hanjaka Izy sady ho hendry ary hanao fitsarana sy fahamarinana amin''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Amin''ny androny no hamonjena ny Joda, sy handrian''ny Isiraely fahizay, ary izao no anarany izay hanononana Azy: Jehovah Fahamarinantsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa, indro, avy ny andro, hoy Jehovah, Izay tsy hanaovana intsony hoe: Raha velona koa Jehovah, Izay nitondra ny Zanak''Isiraely niakatra avy tany amin''ny tany Egypta; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa izao kosa: Raha velona koa Jehovah, Izay nitondra ny taranak''Isiraely niakatra sady nitarika azy avy tany amin''ny tany avaratra sy avy tany amin''ny tany rehetra izay nandroahako azy; Dia honina ao amin''ny taniny izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny amin''ireo mpaminany. Montsamotsana ato anatiko ny foko, mangozohozo ny taolako rehetra, toy ny olona mamo aho, ary toy ny lehilahy leon-divay, noho ny amin''i Jehovah sy noho ny teniny masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa feno mpijangajanga ny tany; Ary noho ny ozona no isaonan'ny tany, efa maina ny kijana any an-efitra; Ary efa ratsy ny fanaon
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lalan'
    marker-yv: yv-n
  - type: text
    text: '''ny olona, sady ny tsi-fahamarinana no heriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa na mpaminany na mpisorona dia samy mpihatsaravelatsihy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ratsy fanahy'
    marker-yv: yv-n
  - type: text
    text: ' avokoa; Na dia tao an-tranoko aza dia mbola hitako ihany ny haratsiany, hoy Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa dia ho toy ny lala-malama amin''ny aizim-pito ny lalany; Haronjina izy, ka dia ho potraka ao; Fa hahatonga loza aminy Aho amin''ny taona hamaliana azy, hoy Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary tamin''ny mpaminanin''i Samaria no nahitako zavatra mahaloiloy: Naminany tamin''i Bala izy ka nampivily ny Isiraely oloko, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary tamin''ny mpaminanin''i Jerosalema koa no nahitako zavatra mahatsiravina; Mijangajanga sy mandeha araka ny lainga izy sady mampahery ny tanan''ny mpanao ratsy, ka samy tsy miala amin''ny faharatsiany; Eny, izy rehetra dia tonga tahaka an''i Sodoma raha amiko, ary ny mponina ao dia tonga tahaka an''i Gomora. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Koa izao no lazain''i Jehovah, Tompon''ny maro, ny amin''ireo mpaminany ireo: Indro, hofahanako zava-mahafaty izy sy hampisotroiko rano mangidy, satria avy tamin''ny mpaminanin''i Jerosalema no nivoahan''ny faharatsiana ho any amin''ny tany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Aza mihaino ny tenin''ny mpaminany izay maminany aminareo, fa manadala anareo ireo; Ny fahitana avy ao am-pony ihany no lazainy, fa tsy izay aloaky ny vavan''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Milaza mandrakariva amin''izay manamavo Ahy izy hoe: Jehovah nanao hoe: Hahita fiadanana ianareo, ary amin''izay rehetra mandeha araka ny ditry ny fony hoe: Tsy hisy loza hanjo anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa iza moa no efa isan''ny mpihevitra teo amin''i Jehovah ka nahita sy nandre ny teniny? Iza no nanongilana ny sofiny taminy ka nihaino ny teniny? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'He! ny tadion''i Jehovah! Mivoaka ny fahatezerana sy ny tadio mitambolimbolina ka miantonta amin''ny lohan''ny ratsy fanahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny fahatezeran''i Jehovah tsy ho afaka ambara-panefany sy ambara-panatanterany ny hevitry ny fony; Mbola ho fantatrareo marimarina izany any am-parany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tsy naniraka ireo mpaminany ireo Aho, kanefa nidodododo ihany izy, tsy niteny taminy Aho, kanefa naminany ihany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa raha isan''ny mpihevitra teo amiko izy, dia ho nitory ny teniko tamin''ny oloko izy ka namerina azy hiala tamin''ny lalany ratsy sy tamin''ny faharatsian''ny nataony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Moa Andriamanitra etỳ akaiky ihany va Aho? hoy Jehovah. Fa tsy Andriamanitra any lavitra any koa? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Moa misy olona mahafin-tena ao amin''ny fierena va ka tsy ho hitako? hoy Jehovah. Tsy manerana ny lanitra sy ny tany va Aho? hoy Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Efa reko ny nolazain''ny mpaminany, Izay naminany lainga tamin''ny anarako hoe: Nanonofy aho, nanonofy aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mandra-pahoviana? Moa ao am-pon''ireo mpaminany izay maminany lainga sy maminany araka ny fitaky ny fony va? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ny hampanadino ny oloko ny anarako amin''ny nofiny izay lazainy amin''ny namany avy, toy ny nanadinoan''ny razany ny anarako noho ny amin''i Bala? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ny mpaminany izay manonofy dia aoka hilaza nofy, ary izay manana ny teniko dia aoka hanambara marina ny teniko. Fa moa inona izay mololo, raha oharina amin''ny vary? hoy Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tsy tahaka ny afo va ny teniko? hoy Jehovah, ary tsy tahaka ny kanonta manorotoro ny vatolampy va?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Koa, indro, fa hasiako ny mpaminany, hoy Jehovah, izay samy mangalatra ny teniko amin''ny namany avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Indro, hoy Jehovah, hasiako ny mpaminany, izay mampiteny ny lelany hoe: Hoy Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Indro, hasiako izay maminany nofy lainga, hoy Jehovah, ary milaza izany ka mampivily ny oloko amin''ny laingany sy ny fandokafany tena; Nefa Izaho tsy naniraka azy na nandidy azy tsinona, ka dia tsy mahasoa ity firenena ity akory izy, hoy Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary raha manontany anao ity firenena ity, na ny mpaminany, na ny mpisorona, ka manao hoe: Inona no entan'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: faminaniana ny loza'
    marker-yv: yv-n
  - type: text
    text: '''i Jehovah? Dia ataovy aminy hoe: Ny amin''ny entana hariako ianareo, hoy Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary ny mpaminany sy ny mpisorona mbamin''ny vahoaka, izay manao hoe: Ny entan''i Jehovah. Dia hovaliako izany olona izany mbamin''ny ankohonany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Samia manontany amin''ny namany sy ny rahalahiny avy ianareo hoe: Ahoana no navalin''i Jehovah? Ary ahoana no nolazain''i Jehovah? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Fa ny hoe: Ny entan''i Jehovah dia tsy hotononinareo intsony; Fa ny tenin''ny olona avy ihany no ho entan''ny tenany, satria efa navadikareo ny tenin''Andriamanitra velona, dia Jehovah, Tompon''ny maro, Andriamanitsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Izao no hanontanianareo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hanontanianao
    marker-yv: yv-n
  - type: text
    text: ' amin''ny mpaminany; Ahoana no navalin''i Jehovah anao? Ary ahoana no nolazain''i Jehovah? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Fa raha hoy ianareo: Entan''i Jehovah, Dia izao no lazain''i Jehovah: Noho ny nilazanareo ny teny hoe: Ny entan''i Jehovah, nefa efa nanirahako ihany ianareo nataoko hoe: Aza manao hoe: Ny entan''i Jehovah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Dia, indro, hanadino anareo tokoa Aho sady hanary anareo mbamin''ny tanàna izay nomeko anareo sy ny razanareo tsy ho eo anatrehako; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Ary hataoko mihatra aminareo ny fahafaham-baraka mandrakizay sy ny fahamenarana mandrakizay izay tsy hohadinoina.
