document_id: PSA.131,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fiononam-po sy fiankinana amin'Andriamanitra
  - type: text
    content: Fihirana fiakarana
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga'
  - type: text
    content: '. Nataon''i Davida. Jehovah ô, tsy nirehareha ny foko, ary tsy niandranandrana ny masoko: Ary tsy nisaintsaina izay zavatra ambony loatra aho, Na izay saro-pantarina tsy takatro. '
  '2':
  - type: text
    content: 'Fa nampionona sy nampangina ny fanahiko aho; Tahaka ny zaza efa maoty eo amin-dreniny. Dia tahaka Izany ny fanahiko ato anatiko. '
  '3':
  - type: text
    content: Ry Isiraely ô, manantenà an'i Jehovah Hatramin'izao ka ho mandrakizay.
