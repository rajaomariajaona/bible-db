document_id: EZK.30,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hahafoanan'i Nebokadnezara ny herin'Farao
  - type: text
    content: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  '10':
  - type: text
    content: 'Izao no lazain''i Jehovah Tompo: Ny tànan''i Nebokadnezara, mpanjakan''i Babylona, no ho entiko mahafoana ny horakorak'
  - type: note
    content: Na. mandevona ny hareny
  - type: text
    content: '''i Egypta. '
  '11':
  - type: text
    content: 'Izy sy ny vahoakany manaraka azy, dia ireo masiaka indrindra amin''ny firenena, no ho entina handrava ny tany; Ary hanatsoaka ny sabany hamely an''i Egypta ireny, ka ho feno faty ny tany. '
  '12':
  - type: text
    content: 'Hahatankina an''i Neily sy hivarotra ny tany ho eo an-tànan''ny ratsy fanahy Aho, ary ny tanan''ny fahavalo no ho entiko mandrava ny tany mbamin''izay rehetra ao aminy; Izaho Jehovah no niteny izany. '
  '13':
  - type: text
    content: 'Izao no lazain''i Jehovah Tompo: Horavako koa ny sampy, ary hatsahatro ny andriamani-tsi-izy ao Memfisa'
  - type: note
    content: Heb. Nofa
  - type: text
    content: '; ary tsy hisy mpanjaka intsony amin''ny tany Egypta; '
  '14':
  - type: text
    content: 'Handrava an''i Patrosa Aho sy hampirehitra afo any Zoana, ary hotanterahiko ny fitsarana an''i No; '
  '15':
  - type: text
    content: 'Hampidina ny fahatezerako amin''i Sina, fiarovana mafy any Egypta, Aho, ary hofongorako ny vahoaka be any No. '
  '16':
  - type: text
    content: Hampirehitra afo any Egypta Aho; Hiolanolana fatratra Sina noho ny faharariany; Ho banga No, ary Memifisa
  - type: note
    content: Heb. Nofa
  - type: text
    content: ' dia hasian''ny fahavalo antoandro. '
  '17':
  - type: text
    content: 'Ny zatovon''i Avena sy Pi-beseta ho lavon-tsabatra, sady ho lasan-ko babo ny ao. '
  '18':
  - type: text
    content: 'Any Tapanesa dia ho maizina ny andro, raha tapahiko any ny ziogan''i Egypta, ary hitsahatra ny fiavonavonan''ny heriny; Ho voasaron''ny rahona izy, sady ho lasan-ko babo ny zananivavy. '
  '19':
  - type: text
    content: Toy izany no hanatanterahako ny fitsarana an'i Egypta; Ka dia ho fantatra fa Izaho no Jehovah.
  '2':
  - type: text
    content: 'Ry zanak''olona, maminania, ka ataovy hoe: Izao no lazain''i Jehovah Tompo: Midradradradrà ianareo! Indrisy ny andro! '
  '20':
  - type: text
    content: 'Ary tamin''ny andro fahafito tamin''ny volana voalohany tamin''ny taona fahiraika ambin''ny folo dia tonga tamiko ny tenin''i Jehovah nanao hoe: '
  '21':
  - type: text
    content: 'Ry zanak''olona, ny sandrin''i Farao, mpanjakan''i Egypta, dia efa notorotoroiko, ary he! tsy noharatoina mba ho sitrana izy, na nofehezina lamba, mba hanatanjaka azy hahatan-tsabatra. '
  '22':
  - type: text
    content: 'Koa izany no nanaovan''i Jehovah Tompo hoe: Indro, efa hamely an''i Farao, mpanjakan''i Egypta, Aho, ka hotorotoroiko ny sandriny, na ny mbola matanjaka, na ny efa torotoro; Ary hampilatsaka ny sabatra eny an-tànany Aho. '
  '23':
  - type: text
    content: 'Dia haeliko ho any amin''ny firenena samy hafa ny Egyptiana, ka hahahako any amin''ny tany samy hafa. '
  '24':
  - type: text
    content: 'Fa hampahatanjahiko kosa ny sandrin''ny mpanjakan''i Babylona, ka hataoko eny an-tànany ny sabatro; Fa hotorotoroiko ny sandrin''i Farao, dia hitrona eo anatrehany toy ny fitronan''ny voatrabaka izy. '
  '25':
  - type: text
    content: 'Eny, hampahatanjahiko ny sandrin''ny mpanjakan''i Babylona, dia hiraviravy ny sandrin''i Farao: Ka dia ho fantatra fa Izaho no Jehovah, raha hataoko eny an-tànan''ny mpanjakan''i Babylona ny sabatro, ka haingainy hamelezana ny tany Egypta. '
  '26':
  - type: text
    content: Dia haeliko ho any amin'ny firenena samy hafa ny Egyptiana ka hahahako any amin'ny tany samy hafa; Ka dia ho fantatra fa Izaho no Jehovah.
  '3':
  - type: text
    content: 'Fa efa antomotra ny andro, eny, antomotra ny andron''i Jehovah, dia andro mandrahona sy fotoana hamaliana ny jentilisa izany. '
  '4':
  - type: text
    content: 'Ary hisy sabatra tonga any Egypta sy fangorohoroana fatratra any Etiopia, raha miampatrampatra any Egypta ny voatrabaka; Ary ho lasa ny hareny, sady ho rava ny fanorenany. '
  '5':
  - type: text
    content: Etiopia sy Libya
  - type: note
    content: Heb. Pota
  - type: text
    content: ' sy Lydia'
  - type: note
    content: Heb. Loda
  - type: text
    content: ' sy ny olona samy hafa firenena rehetra sy ny Kobiana sy ny zanaky ny tany vita fanekena dia hiaraka ho lavon-tsabatra aminy. '
  '6':
  - type: text
    content: 'Izao no lazain''i Jehovah: Ho lavo koa izay manohana an''i Egypta, ary hietry ny fiavonavonan''ny heriny; Hatrany Migdola ka hatrany Syena no ho lavon-tsabatra izy, hoy Jehovah Tompo. '
  '7':
  - type: text
    content: Ho rava dia ho rava
  - type: note
    content: Heb. rava ao amin'ny tany rava
  - type: text
    content: ' izy, ary ny tanànany ho lao dia ho lao'
  - type: note
    content: Heb. lao ao amin'ny tanàna lao
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Ka dia ho fantatra fa Izaho no Jehovah, raha mampirehitra afo any Egypta Aho, ka torotoro izay rehetra manampy azy. '
  '9':
  - type: text
    content: 'Amin''izany andro izany dia hisy iraka mivoaka avy amiko handeha an-tsambo hampahatahotra ny Etiopiana izay mitoetra tsy manahinahy, ka dia hangorohoro tahaka ny tamin''ny andro namelezana an''i Egypta izy; Fa, indro, avy izany. '
