document_id: EZK.30,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny hahafoanan'i Nebokadnezara ny herin'Farao
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Izao no lazain''i Jehovah Tompo: Ny tànan''i Nebokadnezara, mpanjakan''i Babylona, no ho entiko mahafoana ny horakorak'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Na. mandevona ny hareny
      marker-yv: yv-n
    - type: text
      text: '''i Egypta. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Izy sy ny vahoakany manaraka azy, dia ireo masiaka indrindra amin''ny firenena, no ho entina handrava ny tany; Ary hanatsoaka ny sabany hamely an''i Egypta ireny, ka ho feno faty ny tany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Hahatankina an''i Neily sy hivarotra ny tany ho eo an-tànan''ny ratsy fanahy Aho, ary ny tanan''ny fahavalo no ho entiko mandrava ny tany mbamin''izay rehetra ao aminy; Izaho Jehovah no niteny izany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Izao no lazain''i Jehovah Tompo: Horavako koa ny sampy, ary hatsahatro ny andriamani-tsi-izy ao Memfisa'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Nofa
      marker-yv: yv-n
    - type: text
      text: '; ary tsy hisy mpanjaka intsony amin''ny tany Egypta; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Handrava an''i Patrosa Aho sy hampirehitra afo any Zoana, ary hotanterahiko ny fitsarana an''i No; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Hampidina ny fahatezerako amin''i Sina, fiarovana mafy any Egypta, Aho, ary hofongorako ny vahoaka be any No. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Hampirehitra afo any Egypta Aho; Hiolanolana fatratra Sina noho ny faharariany; Ho banga No, ary Memifisa
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Nofa
      marker-yv: yv-n
    - type: text
      text: ' dia hasian''ny fahavalo antoandro. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ny zatovon''i Avena sy Pi-beseta ho lavon-tsabatra, sady ho lasan-ko babo ny ao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Any Tapanesa dia ho maizina ny andro, raha tapahiko any ny ziogan''i Egypta, ary hitsahatra ny fiavonavonan''ny heriny; Ho voasaron''ny rahona izy, sady ho lasan-ko babo ny zananivavy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Toy izany no hanatanterahako ny fitsarana an'i Egypta; Ka dia ho fantatra fa Izaho no Jehovah.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ry zanak''olona, maminania, ka ataovy hoe: Izao no lazain''i Jehovah Tompo: Midradradradrà ianareo! Indrisy ny andro! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary tamin''ny andro fahafito tamin''ny volana voalohany tamin''ny taona fahiraika ambin''ny folo dia tonga tamiko ny tenin''i Jehovah nanao hoe: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ry zanak''olona, ny sandrin''i Farao, mpanjakan''i Egypta, dia efa notorotoroiko, ary he! tsy noharatoina mba ho sitrana izy, na nofehezina lamba, mba hanatanjaka azy hahatan-tsabatra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Koa izany no nanaovan''i Jehovah Tompo hoe: Indro, efa hamely an''i Farao, mpanjakan''i Egypta, Aho, ka hotorotoroiko ny sandriny, na ny mbola matanjaka, na ny efa torotoro; Ary hampilatsaka ny sabatra eny an-tànany Aho. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia haeliko ho any amin''ny firenena samy hafa ny Egyptiana, ka hahahako any amin''ny tany samy hafa. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Fa hampahatanjahiko kosa ny sandrin''ny mpanjakan''i Babylona, ka hataoko eny an-tànany ny sabatro; Fa hotorotoroiko ny sandrin''i Farao, dia hitrona eo anatrehany toy ny fitronan''ny voatrabaka izy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Eny, hampahatanjahiko ny sandrin''ny mpanjakan''i Babylona, dia hiraviravy ny sandrin''i Farao: Ka dia ho fantatra fa Izaho no Jehovah, raha hataoko eny an-tànan''ny mpanjakan''i Babylona ny sabatro, ka haingainy hamelezana ny tany Egypta. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Dia haeliko ho any amin'ny firenena samy hafa ny Egyptiana ka hahahako any amin'ny tany samy hafa; Ka dia ho fantatra fa Izaho no Jehovah.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa efa antomotra ny andro, eny, antomotra ny andron''i Jehovah, dia andro mandrahona sy fotoana hamaliana ny jentilisa izany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary hisy sabatra tonga any Egypta sy fangorohoroana fatratra any Etiopia, raha miampatrampatra any Egypta ny voatrabaka; Ary ho lasa ny hareny, sady ho rava ny fanorenany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Etiopia sy Libya
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Pota
      marker-yv: yv-n
    - type: text
      text: ' sy Lydia'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Loda
      marker-yv: yv-n
    - type: text
      text: ' sy ny olona samy hafa firenena rehetra sy ny Kobiana sy ny zanaky ny tany vita fanekena dia hiaraka ho lavon-tsabatra aminy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Izao no lazain''i Jehovah: Ho lavo koa izay manohana an''i Egypta, ary hietry ny fiavonavonan''ny heriny; Hatrany Migdola ka hatrany Syena no ho lavon-tsabatra izy, hoy Jehovah Tompo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ho rava dia ho rava
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. rava ao amin'ny tany rava
      marker-yv: yv-n
    - type: text
      text: ' izy, ary ny tanànany ho lao dia ho lao'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. lao ao amin'ny tanàna lao
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ka dia ho fantatra fa Izaho no Jehovah, raha mampirehitra afo any Egypta Aho, ka torotoro izay rehetra manampy azy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Amin''izany andro izany dia hisy iraka mivoaka avy amiko handeha an-tsambo hampahatahotra ny Etiopiana izay mitoetra tsy manahinahy, ka dia hangorohoro tahaka ny tamin''ny andro namelezana an''i Egypta izy; Fa, indro, avy izany. '
