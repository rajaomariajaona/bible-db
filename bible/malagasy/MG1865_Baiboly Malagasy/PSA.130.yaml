document_id: PSA.130
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitarainana ataon'izay latsaka amin'ny fahoriana lalina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fihirana fiakarana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Fihirana misy hevitra ambaratonga'
    marker-yv: yv-n
  - type: text
    text: '. Tao amin''ny lalina no niantsoako Anao, Jehovah ô, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tompo ô, henoy ny feoko; Aoka ny sofinao hihaino tsara ny feon''ny fifonako. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Raha mandinika heloka Hianao, Jehovah ô, Iza no hahajanona, Tompo ô? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa eo aminao no misy ny famelan-keloka, Mba hatahorana Anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Niandry an''i Jehovah aho; eny, niandry Azy ny fanahiko, Ary ny teniny no nanantenako. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny fanahiko miandry ny Tompo Mihoatra noho ny fiandrin''ny mpiambina ny maraina, Dia ny fiandrin''ny mpiambina ny maraina. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Manantenà an''i Jehovah, ry Isiraely; Fa eo amin''i Jehovah no misy famindram-po sy fanavotana be; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary Izy no hanavotra ny Isiraely Ho afaka amin'ny helony rehetra.
