document_id: PSA.130,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitarainana ataon'izay latsaka amin'ny fahoriana lalina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fihirana fiakarana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Fihirana misy hevitra ambaratonga'
      marker-yv: yv-n
    - type: text
      text: '. Tao amin''ny lalina no niantsoako Anao, Jehovah ô, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tompo ô, henoy ny feoko; Aoka ny sofinao hihaino tsara ny feon''ny fifonako. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mandinika heloka Hianao, Jehovah ô, Iza no hahajanona, Tompo ô? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa eo aminao no misy ny famelan-keloka, Mba hatahorana Anao.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Niandry an''i Jehovah aho; eny, niandry Azy ny fanahiko, Ary ny teniny no nanantenako. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fanahiko miandry ny Tompo Mihoatra noho ny fiandrin''ny mpiambina ny maraina, Dia ny fiandrin''ny mpiambina ny maraina. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manantenà an''i Jehovah, ry Isiraely; Fa eo amin''i Jehovah no misy famindram-po sy fanavotana be; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Izy no hanavotra ny Isiraely Ho afaka amin'ny helony rehetra.
