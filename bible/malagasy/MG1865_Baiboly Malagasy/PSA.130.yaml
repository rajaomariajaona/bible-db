document_id: PSA.130,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainana ataon'izay latsaka amin'ny fahoriana lalina
  - type: text
    content: Fihirana fiakarana
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga'
  - type: text
    content: '. Tao amin''ny lalina no niantsoako Anao, Jehovah ô, '
  '2':
  - type: text
    content: 'Tompo ô, henoy ny feoko; Aoka ny sofinao hihaino tsara ny feon''ny fifonako. '
  '3':
  - type: text
    content: 'Raha mandinika heloka Hianao, Jehovah ô, Iza no hahajanona, Tompo ô? '
  '4':
  - type: text
    content: Fa eo aminao no misy ny famelan-keloka, Mba hatahorana Anao.
  '5':
  - type: text
    content: 'Niandry an''i Jehovah aho; eny, niandry Azy ny fanahiko, Ary ny teniny no nanantenako. '
  '6':
  - type: text
    content: 'Ny fanahiko miandry ny Tompo Mihoatra noho ny fiandrin''ny mpiambina ny maraina, Dia ny fiandrin''ny mpiambina ny maraina. '
  '7':
  - type: text
    content: 'Manantenà an''i Jehovah, ry Isiraely; Fa eo amin''i Jehovah no misy famindram-po sy fanavotana be; '
  '8':
  - type: text
    content: Ary Izy no hanavotra ny Isiraely Ho afaka amin'ny helony rehetra.
