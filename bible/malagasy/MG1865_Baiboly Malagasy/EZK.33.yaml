document_id: EZK.33
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nisokafan'ny vavan'i Ezekiela taorian'ny nandravana an'i Jerosalema haminany izay mbola hanjo ny Isiraely noho ny tsi-fibebahany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry zanak''olona, mitenena amin''ny zanaky ny firenenao, ka lazao aminy hoe: Raha mahatonga sabatra amin''ny tany anankiray Aho, ary ny tompon-tany maka lehilahy anankiray ao aminy ka manendry azy ho mpitily, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ary hitan-dralehilahy fa, indro, avy ny sabatra, ka mitsoka ny anjomara hampitaitra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hananatra
    marker-yv: yv-n
  - type: text
    text: ' ny olona izy, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'nefa tsy mety taitr izay mandre ny feon''ny anjomara, dia tonga ny sabatra ka mandripaka azy, dia ho eo an-dohany ihany ny ràny. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nandre ny feon'ny anjomara ihany izy, nefa tsy nety taitra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. tsy nino anatra
    marker-yv: yv-n
  - type: text
    text: '; ho ao aminy ihany ny ràny; fa raha nety taitra izy, dia ho nahavonjy ny ainy ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa raha hitan''ilay mpitily kosa fa, indro, avy ny sabatra, nefa tsy nitsoka ny anjomara izy, ka tsy notairina ny olona, ary tonga ny sabatra ka mandringana olona ao aminy, dia matin''ny helony ihany iny; nefa ny ràny dia hadiniko amin''ny tànan''ilay mpitily. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa ianao, ry zanak''olona, dia efa notendreko ho mpitily ho an''ny taranak''Isiraely, ka raha mandre ny teny aloaky ny vavako ianao, dia izany no ho entinao mananatra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Raha hoy Izaho amin''ny ratsy fanahy: He! ry ilay ratsy fanahy, ho faty tokoa ianao! nefa tsy mety mananatra azy ianao hiala amin''ny alehany, dia ho fatin''ny helony ihany izany ratsy fanahy izany, fa ny ràny dia hadiniko amin''ny tananao. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa raha mananatra ny ratsy fanahy ihany kosa ianao hiala amin'ny lalany ratsy; fa izy no tsy mety miala amin'izany, dia ho fatin'ny helony ihany izy, nefa voavonjinao ny ainao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ianao, ry zanak''olona, mitenena amin''ny taranak''Isiraely hoe: Izao no fiteninareo: Eto aminay ny fahadisoanay sy ny fahotanay, ka mihalevona amin''izany izahay, dia nahoana no mbola velona izahay? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lazao aminy hoe: Raha velona koa Aho, hoy Jehovah Tompo, dia tsy sitrako ny hahafatesan''ny ratsy fanahy, fa ny hialan''ny ratsy fanahy amin''ny lalany, mba ho velona izy. Mialà, mialà amin''ny lalan-dratsinareo, fa nahoana moa no te-ho faty ianareo, ry taranak''Isiraely? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ianao, ry zanak''olona''lazao amin''ny zanaky ny firenenao hoe: Ny fahamarinan''ny marina tsy hahavonjy azy, raha mby amin''ny andro ahadisoany; ary ny faharatsian''ny ratsy fanahy tsy hahavoa azy, raha mby amin''ny andro ialany amin''ny faharatsiany; ary ny marina tsy ho velona noho ny fahamarinany, raha mby amin''ny andro anotany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Raha lazaiko amin''ny marina hoe: Ho velona tokoa ianao'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. izy
    marker-yv: yv-n
  - type: text
    text: ', nefa izy mitoky amin''ny fahamarinany ka manao meloka, dia tsy hotsarovana ny fahamarinana rehetra izay nataony, fa ny heloka nataony no hahafaty azy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary koa, raha hoy Izaho kosa amin''ny ratsy fanahy: Ho faty tokoa ianao'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. izy
    marker-yv: yv-n
  - type: text
    text: ', nefa miala amin''ny fahotany izy sady manao izay marina sy mahitsy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ka mamerina ny natao tsatòka sady mampody izay nangalariny ary mandeha araka ny didy mahavelona ka tsy manao meloka, dia ho velona tokoa izy, fa tsy ho faty. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ny fahotana rehetra izay nataony dia tsy hotsarovana aminy intsony; manao izay marina sy mahitsy izy, ka dia ho velona tokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Kanefa, hoy ny zanaky ny firenenao: Tsy marina ny fitondran'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lalan'
    marker-yv: yv-n
  - type: text
    text: '''ny Tompo; nefa ny fitondran'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lalan'
    marker-yv: yv-n
  - type: text
    text: '''ny tenany no tsy marina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Raha ny marina miala amin''ny fahamarinany ka manao meloka, dia ho faty amin''izany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary raha ny ratsy fanahy miala amin''ny faharatsiany ka manao izay marina sy mahitsy, dia ho velona amin''izany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Kanefa, hoy ianareo: Tsy marina ny fitondran'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lalan'
    marker-yv: yv-n
  - type: text
    text: '''ny Tompo. He! ry taranak''Isiraely, samy hotsaraiko araka ny alehany avy ianareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nony tamin''ny andro fahadimy tamin''ny volana fahafolo tamin''ny taona faharoa ambin''ny folo taorian''ny namaboana antsika, dia nisy olona efa nandositra avy tany Jerosalema tonga tao amiko ka nanao hoe: Afaka ny tanàna. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia efa tonga tamiko ny tànan'i Jehovah tamin'ny omaly harivan'ny andro nahatongavan'ilay nandositra izay tonga tao amiko, ka nosokafany ny vavako mandra-pahatongan'ilay nandositra, izay tonga tao amiko nony maraina; dia efa nisokatra ny vavako, ka tsy moana intsony aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia tonga tamiko ny tenin''i Jehovah nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ry zanak''olona, ny monina amin''ireny rava amin''ny tanin''ny Isiraely ireny dia manao hoe: Ireny ihany Abrahama, nefa nandova ny tany izy, fa isika kosa dia maro, ary omena antsika ny tany ho lovantsika '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Koa lazao aminy hoe: Izao no lazain''i Jehovah Tompo: Homan-javatra misy rà sady miandrandra ny sampinareo ianareo ary mandatsa-drà, moa hahazo handova ny tany va ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mitoky amin''ny sabatrareo ianareo sady manao fahavetavetana, ka samy mandoto ny vadin''ny namany avy; koa hahazo handova ny tany va ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Izao no holazainao aminy: Izao no lazain''i Jehovah Tompo: Raha velona koa Aho, dia tsy maintsy ho lavon''ny sabatra izay ao amin''ny tanàna rava, ary izay any an-tsaha dia homeko ho rembin''ny bibi-dia, ary izay ao amin''ny harambato'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. fiarovana
    marker-yv: yv-n
  - type: text
    text: ' sy amin''ny lava-tany dia ho fatin''ny areti-mandringana. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa hataoko rava sy lao ny tany, ary hitsahatra ny fiavonavonan''ny heriny; ho lao ny tendrombohitry ny Isiraely, ka tsy hisy mpandia azy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia ho fantany fa Izaho no Jehovah, raha hataoko rava sy lao ny tany noho ny fahavetavetana nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary ianao, ry zanak''olona, ny zanaky ny firenenao dia miresaka anao eny am-bodirindrina sy eo am-baravaran''ny tranony, ka samy manao amin''ny rahalahiny hoe: Andeha isika, ary aoka handre izay teny avy amin''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Dia mankao aminao tahaka ny fihavin'ny olona izy ka mipetraka eo anatrehanao toa oloko ary mahare ny teninao, nefa tsy mety mankatò azy; fa, indro, teny mamy no lazain'ny vavany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: izay mamy am-bavany no lazainy; na: kalokalo no ataon''ny vavany'
    marker-yv: yv-n
  - type: text
    text: ', nefa ny fony dia lasa manaraka ny filan-karena. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Koa, indro, ianao dia ataony ho tahaka ny mpanao hira mahafinaritra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: kalokalo'
    marker-yv: yv-n
  - type: text
    text: ', izay tsara feo sady mahay mitendry; fa mandre ny teninao izy, nefa tsy mety mankatò azy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary nony tanteraka izany (indro, efa ho tanteraka ihany), dia ho fantany fa efa nisy mpaminany tokoa tao aminy.
