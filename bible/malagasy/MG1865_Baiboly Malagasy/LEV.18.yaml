document_id: LEV.18,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lalàna ny amin'ny hanamasinana ny fanambadiana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Aza mandry amin''ny zanakavavin''ny zanakao-lahy, na ny zanakavavin''ny zanakao-vavy; fa avy aminao no nihavian''izy roa. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Aza mandry amin''ny zanakavavin''ny renikelinao, izay teraky ny rainao; fa anabavinao izy; aza mandry aminy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Aza mandry amin''ny anabavin-drainao; fa havan-drainao akaiky izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Aza mandry amin''ny rahavavin-dreninao; fa havan-dreninao akaiky izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Aza mandry amin''izay nandrian''ny rahalahin-drainao; aza mila ny vadiny fa vadin''ny rahalahin-drainao izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Aza mandry amin''ny vinantovavinao; fa vadin''ny zanakao-lahy izy, koa aza mandry aminy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Aza mandry amin''ny vadin-drahalahinao; fa nandrian''ny rahalahinao izy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Aza mandry amin''ny vehivavy sy ny zananivavy; aza maka ny zanakavavin''ny zananilahy, na ny zanakavavin''ny zananivavy, handry aminy; havany akaiky ireo, ka fahavetavetana izany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary aza mampakatra vehivavy ho rafin''ny rahavaviny izay mbola velona. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary aza mila vehivavy mararin''ny fadim-bolany handry aminy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mitenena amin''ny Zanak''Isiraely hoe: Izaho no Jehovah Andriamanitrareo: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary aza mandry amin'ny vadin'ny namanao, handoto ny tenanao aminy.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary aza misy ampandehaninao hamaky ny afo ho an''i Moloka ny zanakao; ary aza manamavo ny anaran''Andriamanitrao: Izaho no Jehovah. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Aza mandry amin''ny lehilahy tahaka ny fandry amin''ny vehivavy; fa fahavetavetana izany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary aza mandry amin''ny biby handoto ny tenanao aminy; ary aoka tsy hisy vehivavy hety handrian''ny biby; fa zavatra fady indrindra izany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Aza mandoto ny tenanareo amin''izany zavatra izany akory; fa izany rehetra izany no nandotoan''ny jentilisa ny tenany, izay efa horoahiko eo anoloanareo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary efa maloto ny tany, ka dia hamaly azy Aho noho ny helony, ary haloan''ny tany ny mponina eo. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fa mitandrema ny didiko sy ny fitsipiko ianareo, ka aza misy ataonareo izany fahavetavetana izany, na ny tompon-tany, na ny vahiny eo aminareo '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '(fa izany fahavetavetana rehetra izany no nataon''ny tompon-tany izay talohanareo, ka dia naloto ny tany), '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'mba tsy handotoanareo ny tany ka tsy handoavany anareo, tahaka ny nandoavany ny firenena izay talohanareo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Fa izay rehetra manao izany fahavetavetana izany na dia iray aza dia hofongorana tsy ho amin''ny fireneny. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Aza manao araka ny fanaon''ny tany Egypta, izay nonenanareo; ary aza manao araka ny fanaon''ny tany Kanana, izay ampidirako anareo, ary aza manaraka ny fombany. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Koa dia tandremo izay asaiko tandremana, mba tsy hisy hataonareo akory izany fanao vetaveta izany, izay nataon''ny olona talohanareo, ka aza mandoto ny tenanareo amin''izany: Izaho no Jehovah Andriamanitrareo.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ny fitsipiko no harahinareo, ary ny didiko no hotandremanareo, hanarahanareo azy: Izaho no Jehovah Andriamanitrareo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary tandremo ny didiko sy ny fitsipiko; fa raha mahatandrina izany ny olona, dia ho velona amin''izany izy: Izaho no Jehovah. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Aza misy mila izay havany akaiky handry aminy ianareo: Izaho. no Jehovah. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Aza mandry amin''izay nandrian''ny rainao; fa reninao izy, ka aza mandry aminy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Aza mandry amin''ny renikelinao; fa nandrian''ny rainao izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Aza mandry amin''ny anabavinao, zanaky ny rainao, na zanaky ny reninao, na teraka tao an-trano, na teraka tany ivelany; aza mandry aminy. '
