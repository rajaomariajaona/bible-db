document_id: PSA.4,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fivavaky ny azom-pahoriana, sy fanantenany an'Andriamanitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho an'ny mpiventy hira. Hampiarahina amin'ny valiha. Salamo nataon'i Davida. Raha miantso aho, mamalia ahy, ry Andriamanitry ny fahamarinako ô; Raha tao an-katerena aho, dia nohalalahinao toerana; Mamindrà fo amiko, ka henoy ny fivavako.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry lehibe, mandra-pahoviana no hataonareo ho henatra ny voninahitro, ary ho tia zava-poana sy hamoron-dainga ianareo? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa aoka ho fantatrareo fa efa navahan'i Jehovah ho Azy ny tsara fanahy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fa efa nomen''i Jehovah voninahitra ny olo-masiny'
      marker-yv: yv-n
    - type: text
      text: '; Jehovah hihaino, raha miantso Azy aho. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tezera
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Mangovita'
      marker-yv: yv-n
    - type: text
      text: ', fa aza manota; mieritrereta eo am-pandrianareo, ka mangina. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manatera fanati-pahamarinana,ary matokia an'i Jehovah.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maro no niteny hoe: iza no haneho soa antsika? Asandrato aminay ny fahazavan''ny tavanao, Jehovah ô. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nasianao fifaliana ny foko mihoatra noho ny tamin''ny taona nahabetsahan''ny variny sy ny ranom-boalobony. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Handry amin'ny fiadanana aho, ka dia hatory miaraka amin'izay, satria Hianao, Jehovah ô, no mampitoetra ahy mitokana irery tsy manana ahiahy.
