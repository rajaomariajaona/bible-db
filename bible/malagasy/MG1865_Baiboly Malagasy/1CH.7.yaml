document_id: 1CH.7,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny taranak'Isakara sy Benjamina sy Naftaly sy ny antsasaky ny firenen'i Manase sy Efraima ary Asera
  - type: text
    content: 'Ary ny zanakalahin''Isakara dia Tola sy Poa sy Jasoba ary Simrona; efatra izy. '
  '10':
  - type: text
    content: 'Ny zanakalahin''i Jediaela dia Bilana; ary ny zanakalahin''i Bilana dia Jeosy sy Benjamina sy Ehoda sy Kenana sy Zetana sy Tarsisy ary Ahisahara '
  '11':
  - type: text
    content: 'Ireo zanakalahin''i Jediaela rehetra ireo, araka ny lohan''ny fianakaviany, dia roan-jato amby fito arivo sy iray alina no isan''ny lehilahy mahery azo nalefa hanafika. '
  '12':
  - type: text
    content: Sopima koa sy Hopima, zanakalahin'Iry, ary Hosima, zanakalahin'i Ahera.
  '13':
  - type: text
    content: Ny zanakalahin'i Naftaly dia Jaziela sy Gony sy Jezera sy Saloma, samy zanakalahin'i Bila ireo.
  '14':
  - type: text
    content: Ny zanakalahin'i Manase dia Asriela, Izay naterany; fa ilay Syriana
  - type: note
    content: Heb. Aramiana
  - type: text
    content: ' vaditsindranony kosa no niteraka an''i Matira, rain''i Gileada. '
  '15':
  - type: text
    content: 'Ary Makira naka vady ho an''i Hopima sy Sopima; ny anaran''ny rahavaviny dia Imaka; ary ny anaran''ny manarakaraka dia Zelofada; ary Zelofada nanan-janakavavy. '
  '16':
  - type: text
    content: 'Ary Imaka, vadin''i Makira, niteraka zaza, ahy, ka Paresy no nataony anarany; ary Saresy no anaran''ny rahalahiny; ary ny anaran''ny zananilahy dia Olama sy Rakema. '
  '17':
  - type: text
    content: 'Ary ny zanakalahin''i Olama dia Bedana. Ireo no zanakalahin''i Gileada, zanakalahin''i Makira, zanakalahin''i Manase. '
  '18':
  - type: text
    content: 'Ary Hamoleketa anabaviny niteraka an''Isehoda sy Abiezera ary Mahala. '
  '19':
  - type: text
    content: Ary ny zanakalahin'i Semida dia Ahiana sy Sekema sy Liky ary Aniama.
  '2':
  - type: text
    content: 'Ary ny zanakalahin''i Tola dia Ozy sy Refaia sy Jeriela sy Jamay sy Jibsama ary Samoela, samy lohan''ny fianakaviany avy, dia zanak''i Tola sady samy lehilahy mahery tamin''ny fokony avy ireo; enin-jato amby roa arivo sy roa alina no isany tamin''ny andron''i Davida. '
  '20':
  - type: text
    content: 'Ary ny zanakalahin''i Efraima dia Sotela (Bareda no zanakalahin''i Sotela, Tahata no zanakalahin''i Bareda, Elada no zanakalahin''i Tahata, Tahata no zanakalahin''i Elada, '
  '21':
  - type: text
    content: 'Zabada no zanakalahin''i Tahata, Sotela no zanakalahin''i Zabada) ary Ezera sy Elada, izay novonoin''ny tompon-tany tao Gata, satria nidina hangalatra ny ombiny aman''ondriny izy. '
  '22':
  - type: text
    content: 'Ary Efraima, rainy nisaona azy ela, dia avy ny rahalahiny hampionona azy. '
  '23':
  - type: text
    content: 'Ary nony niray tamin''ny vadiny izy, dia nanan''anaka ravehivavy ka niteraka zazalahy, ary ny anarany nataony hoe Beria, satria nisy fahoriana tao an-tranony tamin''izany. '
  '24':
  - type: text
    content: '(Ary ny zananivavy dia Sera, izay nanorina an''i Beti-horona ambany sy ambony sy Ozena-sera). '
  '25':
  - type: text
    content: 'Ary Refa sy Rasefa no zanakalahin''i Beria, Tela no zanakalahin''i Rasefa, Tahana no zanakalahin''i Tela, '
  '26':
  - type: text
    content: 'Ladana no zanakalahin''i Tahana, Amihoda no zanakalahin''i Ladana, Elisama no zanakalahin''i Amihoda. '
  '27':
  - type: text
    content: Nona no zanakalahin'i Elisama, Josoa no zanakalahin'i Nona.
  '28':
  - type: text
    content: Ary ny taniny sy ny fonenany dia Betela sy ny zana-bohiny, ary any atsinanana dia Narana, ary any andrefana dia Gazera sy ny zana-bohiny ary Sekema sy ny zana-bohiny hatrany Gaza sy ny zana-bohiny;
  '29':
  - type: text
    content: ary teo amin'ny sisin-tanin'ny taranak'i Manase dia Beti-sana sy ny zana-bohiny, Tanaka sy ny zana-bohiny, Megido sy ny zana-bohiny, Dora sy ny zana-bohiny Tamin'ireo no nonenan'ny taranak'i Josefa, zanak'Isiraely.
  '3':
  - type: text
    content: 'Ary ny zanakalahin''i Ozy dia Jizrahia. Ary ny zanakalahin''i Jizrahia dia Mikaela sy Obadia sy Joela ary Jisia; dimy izy; loholona avokoa izy rehetra ireo. '
  '30':
  - type: text
    content: 'Ny zanakalahin''i Asera dia Jimna sy Jisva sy Jisvy sy Beria; ary Sera no anabavin''ireo. '
  '31':
  - type: text
    content: 'Ary ny zanakalahin''i Beria dia Hebera sy Malkiela, rain''i Birzavita. '
  '32':
  - type: text
    content: 'Ary Hebera niteraka an''i Jafleta sy Somera sy Hotama; ary Soha no anabavin''ireo. '
  '33':
  - type: text
    content: 'Ary ny zanakalahin''i Jafleta dia Pasaka sy Bimala ary Asvata. Ireo no zanakalahin''i Jafleta. '
  '34':
  - type: text
    content: 'Ary ny zanakalahin''i Samera dia Ahaia sy Rohaga sy Hoba ary Arama. '
  '35':
  - type: text
    content: 'Ary ny zanakalahin''i Helema rahalahiny dia Zofa sy Jimna sy Selesy ary Amala. '
  '36':
  - type: text
    content: 'Ny zanakalahin''i Zofa dia Soha sy Harnefera sy Soala sy Bery sy Jimra '
  '37':
  - type: text
    content: 'sy Bazera sy Hoda sy Sama sy Silsa sy Jitrana ary Bera. '
  '38':
  - type: text
    content: 'Ary ny zanakalahin''i Jatera dia Jefone sy Pispa ary Ara. '
  '39':
  - type: text
    content: 'Ary ny zanakalahin''i Ola dia Ara sy Haniela ary Rizia. '
  '4':
  - type: text
    content: 'Ary nanana miaramila antokotokony izy araka ny fireneny sy ny fianakaviany avy, dia enina arivo amby telo alina; fa maro ny vady aman-janak''ireo. '
  '40':
  - type: text
    content: Ireo zanakalahin'i Asera rehetra ireo dia samy lohan'ny fianakaviany, olom-boafidy sady mahery ary lehiben'ny loham-pireneny avy. Ary ny nanisana azy, araka ny firazanany, dia enina arivo amby roa alina no isan'ny azo nalefa hanafika.
  '5':
  - type: text
    content: Ary ny rahalahiny ao amin'ny fokon'ny Isakara rehetra, izay samy lehilahy mahery, ny isan'izy rehetra araka ny firazanany avy dia fito arivo amby valo alina.
  '6':
  - type: text
    content: 'Ny zanakalahin''i Benjamina dia Bela sa Bakera ary Jediaela; telo izy. '
  '7':
  - type: text
    content: 'Ary ny zanakalahin''i Bela dia Ezbona sy Ozy sy Oziela sy Jerimota ary Iry; dimy izy, ary samy lohan''ny fianakaviany avy sady lehilahy mahery avokoa; ary ny Isany araka ny firazanany dia efatra amby telo-polo amby roa arivo sy roa alina. '
  '8':
  - type: text
    content: 'Ary ny zanakalahin''i Bakera dia Zemira sy Joasy sy Eliezera sy Elioenay sy Omry sy Jerimota sy Abia sy Anatota ary Alameta. Ireo rehetra ireo no zanakalahin''i Bakera. '
  '9':
  - type: text
    content: 'Ary ny isany araka ny firazanany amin''ny fireneny, izay samy lohan''ny fianakaviany avy sady lehilahy mahery, dia roanjato sy roa alina. '
