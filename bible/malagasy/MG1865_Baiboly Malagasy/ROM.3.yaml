document_id: ROM.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanamarinan'Andriamanitra maimaimpoana ny mino an'i Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Koa inona ary no tombony ananan''ny Jiosy, ary inona koa no soa avy amin''ny famorana? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Be ihany amin''ny zavatra rehetra: voalohany, izy no notolorana ny tenin''Andriamanitra ho adidiny. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa ahoana kosa ary? Raha tsy nino ny sasany, moa ny tsi-finoanay va hahafoana ny fahamarinan''Andriamanitra? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Sanatria izany! Aoka Andriamanitra no ho marina, fa ny olona rehetra kosa ho mpandainga; araka ny voasoratra hoe: Mba hohamarinina amin''ny teninao Hianao, Ary hahery, rehefa manana ady'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tsaraina'
    marker-yv: yv-n
  - type: text
    text: ' (Sal. 51. 4). '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa raha ny tsi-fahamarinantsika no mampiseho ny fahamarinan''Andriamanitra, ahoana ary no holazaintsika? Tsy marina angaha Andriamanitra Izay mandatsaka ny fahatezerany! - miteny araka ny fanaon''ny olona aho - '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Sanatria izany! Fa raha izany, hataon''Andriamanitra ahoana no fitsara izao tontolo izao? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa raha ny fahamarinan''Andriamanitra kosa no nitombo tamin''ny laingako ho voninahiny, nahoana aho no mbola tsaraina ho mpanota indray? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nahoana no tsy hanao ratsy hihavian''ny soa isika,- araka ny anendrikendrehana anay sy ny filazan''ny sasany anay. Marina ny fanamelohana ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ahoana ary? Manan-kavaly
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Latsaka noho ireny va isika?'
    marker-yv: yv-n
  - type: text
    text: ' va isika? Tsia tsy akory; fa efa voalazantsika rahateo ho mpanota avokoa na ny Jiosy na ny jentilisa'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. Grika
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'araka ny voasoratra hoe: Tsy misy marina na dia iray akory aza; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tsy misy izay mahafantatra, Tsy misy izay mitady an''Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Samy nania avokoa izy rehetra, Samy tsy mahasoa avokoa izy rehetra; Tsy misy izay manao ny tsara na dia iray akory aza (Sal. 14. 1-3). '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fasana misokatra ny tendany; Ny lelany no anaovany fitaka (Sal. 5. 9); Ny poizin''ny menarana no ao ambanin''ny molony (Sal. 140. 3); '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Feno ozona sy fangidiana ny vavany (Sal. 10. 7); '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ny tongony mimaona handatsa-drà; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fandravana sy fandringanana no eo amin''ny alehany; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny lalan''ny fiadanana dia tsy fantany (Isa. 59. 7, 8); '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tsy misy fahatahorana an''Andriamanitra eo anoloan''ny masony (Sal. 36. 1). '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary fantatsika fa izay zavatra lazain''ny lalàna dia lazainy amin''izay manana ny lalàna, mba ho voatampina avokoa ny vava rehetra, ka hiharan''ny fitsaran''Andriamanitra izao tontolo izao, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: satria tsy misy nofo hohamarinina amin'ny asan'ny lalàna eo anatrehany; fa ny lalàna no ahazoana ny fahalalana marina ny amin'ny ota.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa ankehitriny dia efa naharihary ny fahamarinana avy amin''Andriamanitra, tsy amin''ny lalàna anefa, fa ambaran''ny lalàna sy ny mpaminany, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: dia ny fahamarinana avy amin'Andriamanitra amin'ny finoana an'i Jesosy Kristy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ampio hoe: (ho an''ny olona rehetra sy)'
    marker-yv: yv-n
  - type: text
    text: ' ho an''izay rehetra mino; fa tsy misy hafa, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'fa samy efa nanota izy rehetra ka tsy manana ny voninahitra avy amin''Andriamanitra, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'nefa hamarinina maimaimpoana amin''ny fahasoavany izy noho ny fanavotana izay ao amin''i Kristy Jesosy, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Izay nasehon'Andriamanitra tamin'ny ràny ho fanavotana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fanatitra fampiononam-pahatezerana'
    marker-yv: yv-n
  - type: text
    text: ' amin''ny finoana, hanehoana ny fahamarinany amin''ny tsy namalian''Andriamanitra ny fahotana lasa tamin''ny nandeferany, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'mba hanehoana ny fahamarinany ankehitriny, mba ho marina Izy sady hanamarina izay manana finoana an''i Jesosy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Aiza ary ny fireharehana? Efa foana izany. Amin''ny lalàna manao ahoana? amin''ny lalàn''ny asa va? Tsia; fa amin''ny lalàn''ny finoana. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Koa amin''izany dia ataontsika fa finoana no anamarinana ny olona, fa tsy ny asan''ny lalàna. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Andriamanitry ny Jiosy ihany va Izy? fa tsy mba an''ny jentilisa koa? Eny, an''ny jentilisa koa; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'fa iray ihany Andriamanitra, Izay hanamarina ny voafora noho ny finoana, ary ny tsy voafora amin''ny finoana. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Koa mahafoana ny lalàna amin'ny finoana va isika? Sanatria izany! fa mampiorina tsara ny lalàna isika.
