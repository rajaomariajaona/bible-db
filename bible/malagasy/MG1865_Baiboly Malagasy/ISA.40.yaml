document_id: ISA.40,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Teny mahafaly, fampiononana ny Isiraely
  - type: text
    content: 'Ampionony, ampionony ny oloko, Hoy Andriamanitrareo; '
  '10':
  - type: text
    content: 'Indro, Jehovah Tompo ho avy amin''ny heriny, ka ny sandriny ihany no hanapaka; indro, ny valim-pitia hatolony dia eny aminy, ary ny valin''asa homeny dia eo anoloany. '
  '11':
  - type: text
    content: 'Hiandry ny ondriny tahaka ny mpiandry ondry Izy; Ny sandriny no hanangonany ny zanak''ondry, ka hotrotroiny eo an-tratrany ireny, ary horoahiny miadana ny ampianahany. '
  '12':
  - type: text
    content: Iza no namatra ny rano teo am-pelatanany, ary nanjehy ny lanitra tamin'ny zehiny, sy namory ny vovo-tany tamin'ny vata
  - type: note
    content: Heb. ampahatelon'ny efaha
  - type: text
    content: ', ary nandanja ny tendrombohitra tamin''ny fandanjana sy ny havoana tamin''ny mizana? '
  '13':
  - type: text
    content: 'Iza no nanome hevitra ny Fanahin''i Jehovah, ary iza no mpanolo-tsaina nampianatra Azy? '
  '14':
  - type: text
    content: 'Iza no nidinihany ka nanome saina Azy sy nanoro Azy ny lalan''ny fitsarana ary nampianatra fahalalana Azy sy nampahafantatra Azy ny lalan''ny fahendrena ? '
  '15':
  - type: text
    content: Indro, ny firenena dia tahaka ny rano indray mitete avy amin'ny siny ary atao ho tahaka ny vovoka madiniKa amin'ny mizana; Indro, ny nosy dia tsintsininy tahaka ny zavatra bitika indrindra
  - type: note
    content: 'Na: tahaka ny vovoka madinika paohin''ny rivotra'
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Ary Libanona aza tsy ampy hataina, ary ny biby ao tsy ampy ho fanatitra dorana. '
  '17':
  - type: text
    content: 'Ny firenena rehetra dia tahaka ny tsinontsinona eo anatrehany, ka ataony ho naman''ny tsinontsinona sy ny zava-poana izy. '
  '18':
  - type: text
    content: 'Koa ampitovinareo amin''iza moa Andriamanitra ? Ary endrik''inona no ampanahafinareo Azy ? '
  '19':
  - type: text
    content: 'Ny mpiasa manao sarin-javatra an-idina, ary ny mpanefy volamena mametaka takela-bolamena aminy sy manao tongalika volafotsy an-idina. '
  '2':
  - type: text
    content: Mitoria teny soa mahafaly amin'i Jerosalema, ka lazao aminy fa vita ny adiny
  - type: note
    content: 'Na: tapitra ny fe-taom-panompoany'
  - type: text
    content: ', sady voavela ny helony, ary efa nandray indroa heny tamin''ny tànan''i Jehovah izy ho valin''ny fahotana rehetra nataony. '
  '20':
  - type: text
    content: 'Izay malahelo ka tsy manan-katerina dia mifidy hazo tsy mety ho lò ary mitady mpiasa mahay zavatra mba hamorona sarin-javatra voasokitra izay tsy hihezongozona. '
  '21':
  - type: text
    content: 'Tsy fantatrareo va? Tsy efa renareo va? Tsy efa nambara taminareo fony taloha va? Tsy efa azonareo an-tsaina va ny amin''ny fanorenan''ny tany? '
  '22':
  - type: text
    content: 'Izy no mipetraka amin''ny habakabaka ambonin''ny tany, ary ny mponina etỳ dia tahaka ny valala; Izy no mamelatra ny lanitra tahaka ny lamba manify kararavina ary manenjana azy tahaka ny lay hitoerana; '
  '23':
  - type: text
    content: 'Izy no mahatsinontsinona ny mpanapaka sy mahatonga ny mpitsara amin''ny tany ho tahaka ny zava-poana. '
  '24':
  - type: text
    content: 'Vao nambolena vetivety ireo, vao nafafy ireo, vao namaka tao amin''ny tany ny fotony, dia notsofin''Andriamanitra ireo, ka dia nalazo, ary nindaosin''ny tafio-drivotra tahaka ny vodivary izy. '
  '25':
  - type: text
    content: 'Koa ampitovinareo amin''iza moa Aho, hitahako aminy? Hoy ny Iray Masina. '
  '26':
  - type: text
    content: 'Asandrato ny masonareo, ka mijere; Iza no nahary ireny? Izy no mamoaka ny antokony araka ny isany sy miantso azy rehetra amin''ny anarany avy noho ny haben''ny fahatanjahany sy ny heriny tsy toha, ka tsy misy diso ireny na dia iray akory aza. '
  '27':
  - type: text
    content: 'Nahoana no miteny ianao, ry Jakoba ô, ary milaza ianao, ry Isiraely ô, hoe: Miafina tsy hitan''i Jehovah ny lalako, ary mihelina tsy hitan''Andriamanitro ny rariny tokony ho ahy? '
  '28':
  - type: text
    content: 'Tsy fantatrao va? Tsy efa renao va fa Andriamanitra mandrakizay Jehovah, izay namorona ny faran''ny tany? Tsy mba mety ho reraka na sasatra Izy; Tsy takatry ny saina ny fahalalany. '
  '29':
  - type: text
    content: 'Mampahatanjaka ny reraka Izy, ary izay kely hery dia omeny hery be. '
  '3':
  - type: text
    content: 'Injany! misy feon''ny miantso hoe: Manamboara lalana any an-efitra ho an''i Jehovah, manaova lalambe any an-tany foana ho an''Andriamanitsika. '
  '30':
  - type: text
    content: 'Na dia ny tanora fanahy aza dia ho reraka sy ho sasatra, ary na dia ny zatovo aza dia mety ho tafintohina mafy; '
  '31':
  - type: text
    content: Fa izay miandry an'i Jehovah dia mandroso hery kosa; Elatra no hiakarany tahaka ny voromahery; Hihazakazaka izy, nefa tsy ho sasatra; Handeha izy, nefa tsy ho reraka.
  '4':
  - type: text
    content: 'Aoka hasandratra ny lohasaha rehetra, Aoka haetry ny tendrombohitra sy ny havoana rehetra; Aoka ny be havoana ho tonga lembalemba, ary ny tany saro-dalana ho tonga lemaka; '
  '5':
  - type: text
    content: 'Dia hiseho ny voninahitr''i Jehovah, ary ny nofo rehetra hiara-mahita izany; Fa ny vavan''i Jehovah no efa niteny. '
  '6':
  - type: text
    content: 'Injany! misy miteny hoe: Miantsoa. Ary hoy izy: Ahoana anefa no antso hataoko? Ahitra ny nofo rehetra, ary ny hatsaran-tarehiny rehetra dia tahaka ny vonin-javatra any an-tsaha; '
  '7':
  - type: text
    content: 'Maina ny ahitra, malazo ny voniny, satria tsofin''ny fofonain''i Jehovah ireny; Eny, ahitra tokoa ny olona. '
  '8':
  - type: text
    content: 'Maina ny ahitra, malazo ny voniny; Fa ny tenin''Andriamanitsika dia haharitra mandrakizay. '
  '9':
  - type: text
    content: Ry Ziona, izay mitondra teny soa mahafaly ô
  - type: note
    content: 'Na: Ry ilay mitondra teny soa mahafaly ho an''i Ziona'
  - type: text
    content: ', miakara any an-tendrombohitra avo; Ry Jerosalema izay mitondra teny soa mahafaly ô'
  - type: note
    content: 'Na: Ry ilay mitondra teny soa mahafaly ho an''i Jerosalema'
  - type: text
    content: ', Asandrato mafy ny feonao, asandrato, fa aza matahotra; Lazao amin''ny tanànan''ny Joda hoe. Indro Andriamanitrareo! '
