document_id: ISA.40
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Teny mahafaly, fampiononana ny Isiraely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ampionony, ampionony ny oloko, Hoy Andriamanitrareo; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mitoria teny soa mahafaly amin'i Jerosalema, ka lazao aminy fa vita ny adiny
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tapitra ny fe-taom-panompoany'
    marker-yv: yv-n
  - type: text
    text: ', sady voavela ny helony, ary efa nandray indroa heny tamin''ny tànan''i Jehovah izy ho valin''ny fahotana rehetra nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Injany! misy feon''ny miantso hoe: Manamboara lalana any an-efitra ho an''i Jehovah, manaova lalambe any an-tany foana ho an''Andriamanitsika. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Aoka hasandratra ny lohasaha rehetra, Aoka haetry ny tendrombohitra sy ny havoana rehetra; Aoka ny be havoana ho tonga lembalemba, ary ny tany saro-dalana ho tonga lemaka; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hiseho ny voninahitr''i Jehovah, ary ny nofo rehetra hiara-mahita izany; Fa ny vavan''i Jehovah no efa niteny. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Injany! misy miteny hoe: Miantsoa. Ary hoy izy: Ahoana anefa no antso hataoko? Ahitra ny nofo rehetra, ary ny hatsaran-tarehiny rehetra dia tahaka ny vonin-javatra any an-tsaha; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Maina ny ahitra, malazo ny voniny, satria tsofin''ny fofonain''i Jehovah ireny; Eny, ahitra tokoa ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Maina ny ahitra, malazo ny voniny; Fa ny tenin''Andriamanitsika dia haharitra mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ry Ziona, izay mitondra teny soa mahafaly ô
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ry ilay mitondra teny soa mahafaly ho an''i Ziona'
    marker-yv: yv-n
  - type: text
    text: ', miakara any an-tendrombohitra avo; Ry Jerosalema izay mitondra teny soa mahafaly ô'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ry ilay mitondra teny soa mahafaly ho an''i Jerosalema'
    marker-yv: yv-n
  - type: text
    text: ', Asandrato mafy ny feonao, asandrato, fa aza matahotra; Lazao amin''ny tanànan''ny Joda hoe. Indro Andriamanitrareo! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Indro, Jehovah Tompo ho avy amin''ny heriny, ka ny sandriny ihany no hanapaka; indro, ny valim-pitia hatolony dia eny aminy, ary ny valin''asa homeny dia eo anoloany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Hiandry ny ondriny tahaka ny mpiandry ondry Izy; Ny sandriny no hanangonany ny zanak''ondry, ka hotrotroiny eo an-tratrany ireny, ary horoahiny miadana ny ampianahany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Iza no namatra ny rano teo am-pelatanany, ary nanjehy ny lanitra tamin'ny zehiny, sy namory ny vovo-tany tamin'ny vata
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ampahatelon'ny efaha
    marker-yv: yv-n
  - type: text
    text: ', ary nandanja ny tendrombohitra tamin''ny fandanjana sy ny havoana tamin''ny mizana? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Iza no nanome hevitra ny Fanahin''i Jehovah, ary iza no mpanolo-tsaina nampianatra Azy? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Iza no nidinihany ka nanome saina Azy sy nanoro Azy ny lalan''ny fitsarana ary nampianatra fahalalana Azy sy nampahafantatra Azy ny lalan''ny fahendrena ? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Indro, ny firenena dia tahaka ny rano indray mitete avy amin'ny siny ary atao ho tahaka ny vovoka madiniKa amin'ny mizana; Indro, ny nosy dia tsintsininy tahaka ny zavatra bitika indrindra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tahaka ny vovoka madinika paohin''ny rivotra'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary Libanona aza tsy ampy hataina, ary ny biby ao tsy ampy ho fanatitra dorana. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny firenena rehetra dia tahaka ny tsinontsinona eo anatrehany, ka ataony ho naman''ny tsinontsinona sy ny zava-poana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa ampitovinareo amin''iza moa Andriamanitra ? Ary endrik''inona no ampanahafinareo Azy ? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny mpiasa manao sarin-javatra an-idina, ary ny mpanefy volamena mametaka takela-bolamena aminy sy manao tongalika volafotsy an-idina. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Izay malahelo ka tsy manan-katerina dia mifidy hazo tsy mety ho lò ary mitady mpiasa mahay zavatra mba hamorona sarin-javatra voasokitra izay tsy hihezongozona. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tsy fantatrareo va? Tsy efa renareo va? Tsy efa nambara taminareo fony taloha va? Tsy efa azonareo an-tsaina va ny amin''ny fanorenan''ny tany? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Izy no mipetraka amin''ny habakabaka ambonin''ny tany, ary ny mponina etỳ dia tahaka ny valala; Izy no mamelatra ny lanitra tahaka ny lamba manify kararavina ary manenjana azy tahaka ny lay hitoerana; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Izy no mahatsinontsinona ny mpanapaka sy mahatonga ny mpitsara amin''ny tany ho tahaka ny zava-poana. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Vao nambolena vetivety ireo, vao nafafy ireo, vao namaka tao amin''ny tany ny fotony, dia notsofin''Andriamanitra ireo, ka dia nalazo, ary nindaosin''ny tafio-drivotra tahaka ny vodivary izy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Koa ampitovinareo amin''iza moa Aho, hitahako aminy? Hoy ny Iray Masina. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Asandrato ny masonareo, ka mijere; Iza no nahary ireny? Izy no mamoaka ny antokony araka ny isany sy miantso azy rehetra amin''ny anarany avy noho ny haben''ny fahatanjahany sy ny heriny tsy toha, ka tsy misy diso ireny na dia iray akory aza. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Nahoana no miteny ianao, ry Jakoba ô, ary milaza ianao, ry Isiraely ô, hoe: Miafina tsy hitan''i Jehovah ny lalako, ary mihelina tsy hitan''Andriamanitro ny rariny tokony ho ahy? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tsy fantatrao va? Tsy efa renao va fa Andriamanitra mandrakizay Jehovah, izay namorona ny faran''ny tany? Tsy mba mety ho reraka na sasatra Izy; Tsy takatry ny saina ny fahalalany. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Mampahatanjaka ny reraka Izy, ary izay kely hery dia omeny hery be. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Na dia ny tanora fanahy aza dia ho reraka sy ho sasatra, ary na dia ny zatovo aza dia mety ho tafintohina mafy; '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fa izay miandry an'i Jehovah dia mandroso hery kosa; Elatra no hiakarany tahaka ny voromahery; Hihazakazaka izy, nefa tsy ho sasatra; Handeha izy, nefa tsy ho reraka.
