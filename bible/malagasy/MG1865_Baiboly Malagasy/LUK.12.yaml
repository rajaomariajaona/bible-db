document_id: LUK.12
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin''izany, raha niangona ny vahoaka betsaka tsy hita isa ka nifanitsaka, Jesosy dia niteny tamin''ny mpianany aloha ka nanao hoe: Mitandrema'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: niteny tamin''ny mpianany ka nanao hoe: Ambony indrindra, mitandrema'
    marker-yv: yv-n
  - type: text
    text: ' ianareo, fandrao azon''ny masirasiran''ny Fariseo, dia ny fihatsaram-belatsihy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa tsy misy nafenina izay tsy haseho, na takona izay tsy ho fantatra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Koa na inona na inona teneninareo ao amin''ny maizina dia ho re eo amin''ny mazava; ary izay bitsihinareo mangingina ao amin''ny efi-trano dia hotorina eo amin''ny tampon-trano. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary lazaiko aminareo sakaizako hoe: Aza matahotra izay mamono ny tena, nefa nony afaka izany, dia tsy mahay manao mihoatra noho izany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa hasehoko anareo izay hatahoranareo: Matahora Izay manam-pahefana hanary any amin''ny helo'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. Gehena
    marker-yv: yv-n
  - type: text
    text: ', rehefa novonoiny; eny, hoy Izaho aminareo: Matahora Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy eranambatry va no vidin''ny tsintsina dimy? nefa tsy misy hadinoina eo anatrehan''Andriamanitra ireny na dia iray akory aza. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa na dia ny volon-dohanareo aza dia voaisa avokoa. Aza matahotra; fa mihoatra noho ny tsintsina maro ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa lazaiko aminareo: Na zovy na zovy no manaiky Ahy eo anatrehan''ny olona, dia heken''ny Zanak''olona kosa izy eo anatrehan''ny anjelin''Andriamanitra; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa izay mandà Ahy eo anatrehan''ny olona, dia holavina kosa izy eo anatrehan''ny anjelin''Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa na zovy na zovy no hanao teny hanohitra ny Zanak'olona dia hahazo famelan-keloka; fa izay miteny ratsy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. manao blasfemia; izahao Mat.9.3
    marker-yv: yv-n
  - type: text
    text: ' ny Fanahy Masina dia tsy mba hahazo famelan-keloka. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary raha mitondra anareo ho ao amin''ny synagoga sy ny mpanapaka ary ny manam-pahefana izy, dia aza manahy izay havalinareo, na izay holazainareo; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'fa ny Fanahy Masina no hampianatra anareo amin''izany ora izany izay mety holazainareo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nisy anankiray teo amin''ny vahoaka nanao tamin''i Jesosy hoe: Mpampianatra ô, teneno ny rahalahiko mba hizara lova amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa hoy Izy taminy: Ralehilahy, iza no nanendry Ahy ho mpitsara na mpizara ao aminareo? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy Izy tamin''ny olona: Mitandrema, ka miarova tena mba tsy ho azon''ny fieremana ianareo; fa ny ain''ny olona tsy miankina amin''ny habetsahan''ny zavatra ananany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nanao fanoharana taminy Izy ka nanao hoe: Ny tanin''ny lehilahy manan-karena anankiray nahavokatra be. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary izy nihevitra tao am-pony hoe: Ahoana no hataoko, fa tsy manana fitoerana hamoriako ny vokatro aho? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy izy: Izao no hataoko: handrava ny trano fitehirizako aho ka hanao izay lehibebe kokoa, ary ao no hamoriako ny variko rehetra sy ny fananako. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hilaza amin''ny fanahiko hoe aho: Ry fanahy ô, manana fananana be voatahiry ho amin''ny taona maro ianao; mitsahara, mihinàna, misotroa, mifalia. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa Andriamanitra kosa nanao taminy hoe: Ry adala, anio alina no halaina aminao ny fanahinao, ka ho an''iza izay zavatra noharinao? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Toy izany izay mihary harena ho an''ny tenany ihany, nefa tsy mba manan-karena ny amin''Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy Jesosy tamin''ny mpianany: Noho izany dia lazaiko aminareo hoe: Aza manahy ny amin''ny ainareo, izay hohaninareo, na ny amin''ny tenanaren, izay hotafinareo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa ny aina mihoatra noho ny hanina, ary ny tena noho ny fitafiana. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hevero ny goaika; fa tsy mba mamafy na mijinja ireny; ary tsy manana fitoeran-javatra na trano fitehirizana, nefa Andriamanitra mamelona azy; tsy mihoatra lavitra noho ny vorona va ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary iza moa ao aminareo, na dia manahy aza, no mahay manampy ny andro iainany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny halavan''ny tenany'
    marker-yv: yv-n
  - type: text
    text: ', na dia kely monja'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. hakiho iray
    marker-yv: yv-n
  - type: text
    text: ' aza? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Koa raha ny kely indrindra aza tsy hainareo, nahoana ianareo no manahy ny amin''ny sisa? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Hevero ny fanirin'ny voninkazo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Karazan'ny lilia
    marker-yv: yv-n
  - type: text
    text: '; tsy mba miasa na mamoly ireny; nefa lazaiko aminareo: Na dia Solomona teo amin''ny voninahiny rehetra aza tsy mba nitafy tahaka ny anankiray amin''ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary raha ny ahitra izay any an-tsaha anio, nefa hatao ao am-patana rahampitso, no ampitafin''Andriamanitra toy izany, tsy mainka va ianareo ry kely finoana? '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Koa aza mitady izay hohaninareo na izay hosotroinareo ianareo, ary aza miahanahana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: aza aingaingain''ny fanantenana foana'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa ny jentilisa amin''izao tontolo izao dia fatra-pitady izany rehetra izany; fa ny Rainareo mahalala fa tokony ho anareo izany zavatra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Kanefa katsaho ny fanjakany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (ny fanjakan''Andriamanitra)'
    marker-yv: yv-n
  - type: text
    text: '; dia hanampy ho anareo izany zavatra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Aza matahotra, ry ondry vitsy, fa efa sitraky ny Rainareo ny hanome anareo ny fanjakana. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Amidio ny fanananareo, ka manaova fiantrana; manaova kitapom-bola tsy mety ho tonta ho anareo, dia harena any an-danitra tsy mety ho lany, izay tsy azon''ny mpangalatra, sady tsy misy kalalao manimba. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Fa izay itoeran''ny harenareo, dia ho any koa ny fonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Aoka hisikina ny valahanareo sy hirehitra ny jironareo; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'ary aoka ianareo ho tahaka ny olona izay miandry ny tompony, raha mody avy amin''ny fampakaram-bady izy, ka nony tonga sy mandondòna izy, dia vohany miaraka amin''izay. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Sambatra ny mpanompo izay ho hitan''ny tompony miambina, raha avy izy. Lazaiko aminareo marina tokoa fa hisikina ny tompony, dia hampipetraka azy hihinana, dia ho avy ka hanompo azy. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary na avy amin''ny fiambenana faharoa amin''ny alina izy, na avy amin''ny fiambenana fahatelo, ka mahita toy izany, dia sambatra ireo mpanompo ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary fantaro izao, fa raha fantatry ny tompon-trano izay ora hihavian''ny mpangalatra, dia ho niambina izy ka tsy namela ny tranony hotamina. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Dia miomàna koa ianareo; fa ho avy ny Zanak''olona amin''izay ora tsy ampoizinareo. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary hoy Petera: Tompoko, izahay va no ilazanao izany fanoharana izany, sa ny olona rehetra? '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary hoy ny Tompo: Iza moa no mpitandri-draharaha mahatoky sy manan-tsaina, izay hotendren''ny tompony hifehy ny mpanompony mba hanome azy anjara hanina amin''ny fotoana? '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Sambatra ny mpanompo Izay ho hitan''ny tompony fa, indreo, manao toy izany, raha avy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Lazaiko aminareo marina fa hotendreny ho mpanapaka ny fananany rehetra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Fa raha manao anakampo kosa izany mpanompo izany hoe: Maharitra ela ny tompoko vao ho avy, ka dia mikapoka ny ankizilahy sy ny ankizivavy izy sady mihinana sy misotro ka mamo, '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: dia ho avy ny tompon'izany mpanompo izany amin'ny andro izay tsy ampoiziny sy amin'ny ora izay tsy fantany, dia hotapahiny roa
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hokapohiny mafy'
    marker-yv: yv-n
  - type: text
    text: ' izy ka homeny anjara any amin''ny tsy mahatoky. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Fa ilay mpanompo izay mahalala ny sitrapon''ny tompony ihany ka tsy miomana na manao izay sitraky ny fony dia hokapohina be. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Fa izay tsy nahalala kosa ka nanao izay zavatra tokony hikapohana azy dia hokapohina kely. Fa izay nomena be, dia be no hotadiavina aminy; ary izay nampitehirizina be, dia bebe kokoa no hadinina aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Tonga hanipy afo etỳ ambonin'ny tany Aho, ka manao ahoana ny faniriako mba hirehetan'izany sahady
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ary inona intsony no iriko, raha mirehitra sahady izany?'
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Ary manana batisa hanaovana Ahy batisa Aho, ka manao ahoana ny fahoriako ambara-pahatanterahany! '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Ataonareo va fa tonga hanome fihavanana ambonin''ny tany Aho? Tsia, hoy Izaho aminareo, fa fampisarahana. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Fa hatramin''izao dia hisy dimy hisara-tsaina ao an-trano iray, ny telo hanohitra ny roa, ary ny roa hanohitra ny telo. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Hisara-tsaina ireo, ka ny ray hanohitra ny zananilahy, ary ny zanakalahy hanohitra ny rainy; ny reny hanohitra ny zananivavy, ary ny zanakavavy hanohitra ny reniny; ny rafozam-bavy hanohitra ny vinantoni-vavy, ary ny vinantovavy hanohitra ny rafozani-vavy. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Ary hoy Jesosy tamin''ny vahoaka: Raha mahita rahona miposaka any andrefana ianareo, miaraka amin''izay dia hoy ianareo: Ho avy ny ranonorana; dia tonga izany. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Ary raha avy any atsimo ny rivotra, dia hoy ianareo: Hafana ny andro; dia tonga izany. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Hianareo mpihatsaravelatsihy, ny tarehin''ny tany sy ny lanitra dia hainareo fantarina; fa ahoana kosa no tsy ahaizanareo mamantatra izao andro izao? '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Nahoana ianareo no tsy mahalala mitsara araka ny marina
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Nahoana ianareo no tsy mahay mitsara marina avy ao am-ponareo ihany?'
    marker-yv: yv-n
  - type: text
