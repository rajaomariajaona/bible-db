document_id: PSA.47
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fihobiana noho ny niakaran'ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Nataon''ny Koraita. Salamo. Mitehafa tanana, ry firenena rehetra; mihobia ho an''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa Jehovah no avo indrindra ka tokony hatahorana; Mpanjaka lehibe ambonin''ny tany rehetra Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mandresy firenena maro Izy ho ambanintsika ,ary firenen-tsamy hafa ho ambanin''ny tongotsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mifidy ny lovantsika ho antsika Izy, dia ny voninahitr'i Jakoba izay tiany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Efa niakatra tamin''ny fihobiana Andriamanitra, Jehovah niakatra tamin''ny fitsofana ny anjomara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mankalazà an''Andriamanitra, eny mankalazà; mankalazà ny Mpanjakantsika, eny, mankalazà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa Mpanjaka amin''ny tany rehetra Andriamanitra; mahaiza mankalaza tsara ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Andriamanitra manjaka amin''ny firenen-tsamy hafa; Andriamanitra mipetraka eo ambonin''ny seza fiandrianany masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny mpanapaka ny firenen-tsamy hafa miangona ho olon'Andriamanitr'i Abrahama; fa an'Andriamanitra ny ampingan'ny tany; Avo indrindra Izy.
