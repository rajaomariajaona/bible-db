document_id: PSA.47,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fihobiana noho ny niakaran'ny Tompo
  - type: text
    content: 'Ho an''ny mpiventy hira. Nataon''ny Koraita. Salamo. Mitehafa tanana, ry firenena rehetra; mihobia ho an''Andriamanitra. '
  '2':
  - type: text
    content: 'Fa Jehovah no avo indrindra ka tokony hatahorana; Mpanjaka lehibe ambonin''ny tany rehetra Izy. '
  '3':
  - type: text
    content: 'Mandresy firenena maro Izy ho ambanintsika ,ary firenen-tsamy hafa ho ambanin''ny tongotsika. '
  '4':
  - type: text
    content: Mifidy ny lovantsika ho antsika Izy, dia ny voninahitr'i Jakoba izay tiany.
  '5':
  - type: text
    content: 'Efa niakatra tamin''ny fihobiana Andriamanitra, Jehovah niakatra tamin''ny fitsofana ny anjomara. '
  '6':
  - type: text
    content: 'Mankalazà an''Andriamanitra, eny mankalazà; mankalazà ny Mpanjakantsika, eny, mankalazà. '
  '7':
  - type: text
    content: 'Fa Mpanjaka amin''ny tany rehetra Andriamanitra; mahaiza mankalaza tsara ianareo. '
  '8':
  - type: text
    content: 'Andriamanitra manjaka amin''ny firenen-tsamy hafa; Andriamanitra mipetraka eo ambonin''ny seza fiandrianany masina. '
  '9':
  - type: text
    content: Ny mpanapaka ny firenen-tsamy hafa miangona ho olon'Andriamanitr'i Abrahama; fa an'Andriamanitra ny ampingan'ny tany; Avo indrindra Izy.
