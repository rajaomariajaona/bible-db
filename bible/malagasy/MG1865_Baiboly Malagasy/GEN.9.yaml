document_id: GEN.9
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Andriamanitra nitso-drano an''i Noa sy ny zanany hoe; Maroa fara sy mihabetsaha ary mamenoa ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ny tahotra sy horohoro anareo hahazo ny bibi-dia rehetra sy ny voro-manidina rehetra; ireny mbamin''izay rehetra mandady na mikisaka amin''ny tany sy ny hazandrano rehetra ao amin''ny ranomasina dia efa natolotra eo an-tananareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny biby mihetsiketsika rehetra izay miaina dia ho fihinana ho anareo; dia efa nomeko anareo toy ny zava-maitso izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Kanefa ny nofo izay mbola misy aina dia ny ràny no aza haninareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa ny ranareo kosa dia hadiniko, satria ainareo izany; eo amin''ny tanan''ny manan''aina rehetra no hanadinako azy; ary eo amin''ny tanan''ny olona, dia eo amin''ny tanan''ny olona avy, no hanadinako ny ain''ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izay mandatsaka ny ran''olona, dia mba halatsak''olona kosa ny ràny, satria tahaka ny endrik''Andriamanitra no nanaovany ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa ny aminareo, dia maroa fara sy mihabetsaha; miteraha be eny ambonin''ny tany sy mihabetsaha eny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary Andriamanitra niteny tamin''i Noa sy tamin''ny zanany, izay niaraka taminy, ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Indro, Izaho efa manorina ny fanekeko aminareo sy amin''ny taranakareo mandimby anareo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'sy amin''ny zava-manan''aina rehetra eo aminareo, na ny vorona, na ny biby fiompy, na ny bibi-dia rehetra eo aminareo: izay rehetra nivoaka avy tao anatin''ny sambo-fiara, dia ny biby samy hafa rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia aoriko ny fanekeko aminareo, ka tsy haringako amin''ny safo-drano intsony ny nofo rehetra, ary tsy hisy safo-drano hanimba ny tany intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy Andriamanitra: Izao no famantarana ny fanekena izay ataoko ho amiko sy ho aminareo mbamin''ny zava-manan''aina rehetra eo aminareo hatramin''ny taranaka fara mandimby: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny avako efa napetrako eo amin''ny rahona ho famantarana ny fanekena ho amiko sy ho amin''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary raha mampiangona rahona eo ambonin''ny tany Aho, ka hita eo amin''ny rahona ny avana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'dia hotsarovako ny fanekeko izay ho amiko sy ho aminareo mbamin''ny zava-manan''aina, dia ny nofo rehetra; ary tsy hisy safo-drano, handringana ny nofo rehetra intsony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ho eo amin''ny rahona ny avana; ary hitsinjo azy Aho hahatsiarovako ny fanekena mandrakizay izay ho amin''Andriamanitra sy ho amin''ny zava-manan''aina rehetra, dia ny nofo rehetra ambonin''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy Andriamanitra tamin''i Noa: Izany no famantarana ny fanekena izay naoriko ho amiko sy ho amin''ny nofo rehetra ambonin''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny zanakalahin''i Noa izay izay nivoaka avy tamin''ny sambo-fiara dia Sema sy Hama ary Jafeta; ary i Hama no rain''i Kanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ireo telo lahy ireo no zanak''i Noa; ary avy tamin''ireo no nielezan''ny olona tambonin''ny tany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary vao tonga mpiasa tany Noa ka nanao tanim-boaloboka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nisotro tamin''ny divay izy ka mamo; dia nanary lamba izy ka nitanjaka tao anatin''ny lainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hitan''i Hama, rain''i Kanana ny fitanjahan''ny rainy, dia nambarany tamin''ny rahalahiny roa lahy teo ivelany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nalain''i Sema sy Jafeta ny lamba ka nentin''izy mirahalahy teo an-tsorony, dia nanao dia mianotra izy ka nandrakotra ny fitanjahan''ny rainy; ary ny tavany tsy nanatrika, ka dia tsy hitany ny fitanjahan''ny rainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nahatsiaro Noa, rehefa afaka ny hamamoany, ka nahafantatra izay efa nataon''ny zanany faralahy taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hoy izy: Ho voaozona anie Kanana; Ho tena andevon''ny rahalahiny izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary hoy koa izy: Isaorana anie Jehovah, Andriamanitr''i Sema; Ary aoka Kanana ho andevony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hataon''Andriamanitra malalaka anie Jafeta; Ary aoka honina ao an-dain''i Sema izy; Ary aoka Kanana ho andevony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary ny andro niainan''i Noa taorian''ny safo-drano dia dimam-polo amby telon-jato taona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary ny andro rehetra niainan'i Noa dia dimam-polo amby sivin-jato taona; dia maty izy.
