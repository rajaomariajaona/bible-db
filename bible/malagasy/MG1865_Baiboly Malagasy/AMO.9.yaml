document_id: AMO.9,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahitana ny amin'ny handravana ny fanjakana be ota, sy ny hananganana indray ny tabernakelin'i Davida
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Nahita ny Tompo nitsangana teo anilan
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ambonin'''
      marker-yv: yv-n
    - type: text
      text: '''ny alitara aho, ka hoy Izy: Asio ny kapitaly hihetsiketsehan''ny tokonana, ary torotoroy hianjera amin''ny lohan''izy rehetra, ka izay sisa aminy dia hovonoiko amin''ny sabatra; Ary tsy hisy afa-mandositra izy, sady tsy hisy izay sisa ho afaka akory. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Sabatra no hamonoana ny mpanota rehetra amin''ny oloko, dia ireo izay manao hoe: Ny loza tsy hanakaiky na hahatratra anay. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Amin''izany andro izany dia hatsangako indray ny trano-bongon''i Davida izay efa nianjera, ary hotampenako ny efa banga ao; Ary hamboariko izay efa rava aminy, ka hataoko tahaka ny taloha izy, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mba hananany izay sisa amin'i Edoma sy amin'ny jentilisa rehetra, izay hantsoina amin'ny anarako, hoy Jehovah, Izay manao izany.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Indro, avy ny andro, hoy Jehovah, Izay hahatraran''ny mpiasa tany ny mpijinja, ary ny mpanosihosy voaloboka hahatratra ny mpamafy; Ny tendrombohitra hipoipoitra ranom-boaloboka, ary ny havoana rehetra hiempo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary hampodiko ny Isiraely avy amin''ny fahababoana, dia hanangana ny tanàna efa rava izy ka honina ao, ary hanao tanim-boaloboka izy ka hisotro ny divay avy aminy; Hanao saha koa izy ka hihinana ny vokatra. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Eny, hamboleko ao amin'ny taniny izy, ka tsy hongotana amin'ny taniny izay nomeko azy intsony izy, Hoy Jehovah Andriamanitrao.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Na dia mibosesika ho any amin'ny fiainan-tsi-hita
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Sheola
      marker-yv: yv-n
    - type: text
      text: ' aza izy, dia any no hanalan''ny tanako azy; Ary na dia miakatra ho any an-danitra aza izy, dia avy any no hampidinako azy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary na dia miery any an-tampon''i Karmela aza izy, dia any no hitadiavako sy hangalako azy; Ary na dia manafin-tena any ambanin''ny ranomasina aza izy, mba tsy ho hitan''ny masoko, dia any no handidiako ny menarana, ka hanaikitra azy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary na dia lasan-ko babo eo anoloan''ny fahavalony aza izy, dia any no handidiako ny sabatra, ka hamono azy; Ary hampanandriniko azy ny masoko hahatonga ny loza aminy, fa tsy ny soa. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary Jehovah, Tompon''ny maro, no manendry ny tany, ka dia miempo izany, ka misaona ny mponina rehetra ao aminy; Ary dia hihatondraka tahaka an''i Neily avokoa Izany, ary hihena indray izy toy ny Neilin''i Egypta, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary manao ny tranony ambony any an-danitra Izy, sady manorina ny andohalambony eny ambonin''ny tany; Ary miantso ny rano eny an-dranomasina ka mampilatsaka azy eny amin''ny tany, Jehovah no anarany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Moa tsy toy ny taranaky ny Etiopiana va ianareo raha amiko, ry Zanak''Isiraely? hoy Jehovah. Tsy ny Isiraely va no nentiko nivoaka avy tany amin''ny tany Egypta. Ary ny Filistina avy tany Kaftora, Ary ny Syriana avy tany Kira? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Indro, ny mason''i Jehovah Tompo no manandrina ity fanjakana feno ota ity, ka dia hofongorako tsy ho eo ambonin''ny tany izy; Kanefa tsy dia hofongorako avokoa ny taranak''i Jakoba, hoy Jehovah. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa, indro, Izaho no handidy, ka hosivaniko any amin''ny firenena rehetra ny taranak''Isiraely, tahaka ny fanasivana vary amin''ny sivana; Nefa tsy hisy voam-bary ho latsaka amin''ny tany na dia iray akory aza. '
