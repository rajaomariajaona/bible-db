document_id: EPH.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny famindram-pon'Andriamanitra amin'ny jentilisa amin'ny andraisany azy ho ao amin'ny fiangonana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ianareo dia efa novelominy, fony mbola matin''ny fahadisoanareo sy ny fahotanareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'izay nalehanareo fahiny, araka ny fomban''izao tontolo izao, araka ny mpanapaka ny fanjakana eny amin''ny rivotra, dia ny fanahy izay miasa ankehitriny ao anatin''ny zanaky ny tsi-fanarahana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'teo amin''ireo no nitondrantsika rehetra tena koa fahiny tamin''ny filan''ny nofontsika, ka nanaovantsika ny danin''ny nofo sy ny saina; ary araka ny toetsika dia zanaky ny fahatezerana toy ny sasany koa isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa Andriamanitra, Izay manan-karena amin''ny famindram-po, noho ny halehiben''ny fitiavany izay nitiavany antsika, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'na dia fony mbola matin''ny fahadisoana aza isika, dia nahavelona antsika niaraka tamin''i Kristy (fahasoavana no namonjena anareo); '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary niara-natsangany isika ka niara-napetrany any an-danitra ao amin''i Kristy Jesosy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'mba hasehony amin''ny andro ho avy ny haben''ny haren''ny fahasoavany amin''ny fahamoram-panahiny amintsika ao amin''i Kristy Jesosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa fahasoavana no namonjena anareo amin''ny finoana; ary tsy avy aminareo izany, fa fanomezana avy amin''Andriamanitra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'tsy avy amin''ny asa, fandrao hisy hirehareha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa asany isika, voaforona tao amin'i Kristy Jesosy mba hanao asa tsara, izay namboarin'Andriamanitra rahateo mba handehanantsika eo aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa tsarovy fa fahiny ianareo izay jentilisa araka ny nofo, ka nolazain''ny voaforan-tanana teo amin''ny nofo hoe tsy voafora - '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'eny, tsarovy fa tamin''izany andro izany dia tsy nanana an''i Kristy ianareo, fa olon-ko azy tamin''ny fanjakan''ny Isiraely ary vahiny tamin''ireo faneken''ny teny fikasana, dia tsy nanana fanantenana sady tsy nanana an''Andriamanitra teo amin''izao tontolo izao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'fa ankehitriny kosa, ao amin''i Kristy Jesosy, ianareo izay lavitra fahiny dia efa nampanakeken''ny ran''i Kristy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa Izy no fihavanantsika, Izay nahiray antsika roa tonta ka nandrava ny efitry ny fisarahana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'fa tao amin''ny nofony no nandravany ny fandrafiana, dia ny lalàna nisy didy natao hotandremana, mba hanakambanany antsika roa tonta ao amin''ny tenany ho olom-baovao iray, ka hanaovany fihavanana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ary hampihavana antsika roa tonta ho tena iray amin''Andriamanitra noho ny hazo fijaliana, izay namonoany ny fandrafiana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary tonga Izy ka nitory teny soa mahafaly milaza fihavanana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fiadanana; izahao Isa. 57.19'
    marker-yv: yv-n
  - type: text
    text: ' taminareo izay lavitra ary fihavanana'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fiadanana; izahao Isa. 57.19'
    marker-yv: yv-n
  - type: text
    text: ' tamin''izay akaiky koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa Izy no ananantsika roa tonta fanatonana amin''ny Fanahy iray ho any amin''ny Ray. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa dia tsy mba vahiny sy mpivahiny intsony ianareo, fa tompon-tany, mpiray fanjakana amin''ny olona masina sady ankohonan''Andriamanitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'natsangana teo ambonin''ny fanorenan''ny Apostoly sy ny mpaminany, ary Kristy Jesosy no fehizoro indrindra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ao aminy no irafetan''ny rafitra rehetra, mitombo tsara ho tempoly masina ao amin''ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary ao aminy no miaraka aorina koa ianareo ho fonenan'Andriamanitra amin'ny Fanahy.
