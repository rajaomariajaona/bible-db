document_id: JOB.10
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Maharikoriko ahy ny aiko; Hamoaka ny fitarainako aho sy hiteny noho ny fangidian'ny fanahiko
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hanao amin''Andriamanitra hoe aho: Aza manameloka ahy; Mba ampahalalao izay anton''ny iadianao amiko aho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mahafaly Anao va ny hampahory sy hanary ny efa nisasaranao ka hamirapiratra amin'ny fisainan'ny ratsy fanahy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Manana maso nofo va Hianao? Na mijery tahaka ny fijerin'ny zanak'olombelona?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tahaka ny andron'ny zanak'olombelona va ny andronao? Na tahaka ny taonan'ny olombelona ny taonanao,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: No dia mikaroka izay heloko Hianao sy mikatsaka izay fahotako,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Na dia fantatrao aza fa tsy mba ratsy fanahy aho, ary tsy misy mahavonjy amin'ny tananao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny tananao ihany no namorona ahy ka nanisy endrika izao tenako rehetra izao, kanjo levoninao indray aho izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Masina Hianao, tsarovy fa notefenao toy ny tanimanga aho, ka hamerina ahy amin'ny vovoka indray Hianao!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tsy naidinao toy ny ronono va aho ka nampandrinao toy ny ronono-mandry?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Eny, notafianao hoditra sy nofo aho ary norarinao tamin'ny taolana sy ny ozatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aina sy famindram-po no nomenao ahy; Ary ny fiahianao no niaro ny aiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Saingy izao no nafeninao tao am-ponao, eny, fantatro fa tao aminao izao:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Raha manota aho, dia mamantatra ahy Hianao ka tsy manafaka ahy amin'ny heloko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Raha meloka aho, dia lozako! Ary na dia marina aza aho, dia tsy ho sahy miandrandra, satria feno henatra sady mahatsiaro fahoriana aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa raha sahy miandrandra aho, dia hihaza ahy tahaka ny liona masiaka Hianao; Ary hiverina indray Hianao, ka ho mahagaga ny famelinao ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mbola hanangana vavolombelona vaovao mandrakariva hanameloka ahy Hianao sy hampitombo ny fahatezeranao amiko; Fahavalo mifanontona no mamely ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ka nahoana no namoaka ahy foana avy tany am-bohoka Hianao? Fa raha tsy izany, dia ho niala aina aho, ka tsy mba nisy maso nahita ahy akory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary efa toy ny tsy ary aho. Ka nentina avy tany an-kibo ho any am-pasana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tsy vitsy va ny androko? Koa mitsahara Hianao, mihataha mba hakako aina kely,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dieny tsy mbola lasa tsy hiverina aho, dia ho any amin'ny tanin'ny aizina sy ny aloky ny fahafatesana,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ho any amin'ny tany maizim-pito, dia ny an'ny aloky ny fahafatesana sy ny fikorontanana, sady maizim-pito ny famirapiratana any.
