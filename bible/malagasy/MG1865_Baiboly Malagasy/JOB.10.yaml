document_id: JOB.10,96
type_code: plt
verses:
  '1':
  - type: text
    content: Maharikoriko ahy ny aiko; Hamoaka ny fitarainako aho sy hiteny noho ny fangidian'ny fanahiko
  '10':
  - type: text
    content: Tsy naidinao toy ny ronono va aho ka nampandrinao toy ny ronono-mandry?
  '11':
  - type: text
    content: Eny, notafianao hoditra sy nofo aho ary norarinao tamin'ny taolana sy ny ozatra.
  '12':
  - type: text
    content: Aina sy famindram-po no nomenao ahy; Ary ny fiahianao no niaro ny aiko.
  '13':
  - type: text
    content: 'Saingy izao no nafeninao tao am-ponao, eny, fantatro fa tao aminao izao:'
  '14':
  - type: text
    content: Raha manota aho, dia mamantatra ahy Hianao ka tsy manafaka ahy amin'ny heloko.
  '15':
  - type: text
    content: Raha meloka aho, dia lozako! Ary na dia marina aza aho, dia tsy ho sahy miandrandra, satria feno henatra sady mahatsiaro fahoriana aho.
  '16':
  - type: text
    content: Fa raha sahy miandrandra aho, dia hihaza ahy tahaka ny liona masiaka Hianao; Ary hiverina indray Hianao, ka ho mahagaga ny famelinao ahy.
  '17':
  - type: text
    content: Mbola hanangana vavolombelona vaovao mandrakariva hanameloka ahy Hianao sy hampitombo ny fahatezeranao amiko; Fahavalo mifanontona no mamely ahy.
  '18':
  - type: text
    content: Ka nahoana no namoaka ahy foana avy tany am-bohoka Hianao? Fa raha tsy izany, dia ho niala aina aho, ka tsy mba nisy maso nahita ahy akory.
  '19':
  - type: text
    content: Ary efa toy ny tsy ary aho. Ka nentina avy tany an-kibo ho any am-pasana.
  '2':
  - type: text
    content: 'Hanao amin''Andriamanitra hoe aho: Aza manameloka ahy; Mba ampahalalao izay anton''ny iadianao amiko aho.'
  '20':
  - type: text
    content: Tsy vitsy va ny androko? Koa mitsahara Hianao, mihataha mba hakako aina kely,
  '21':
  - type: text
    content: Dieny tsy mbola lasa tsy hiverina aho, dia ho any amin'ny tanin'ny aizina sy ny aloky ny fahafatesana,
  '22':
  - type: text
    content: Ho any amin'ny tany maizim-pito, dia ny an'ny aloky ny fahafatesana sy ny fikorontanana, sady maizim-pito ny famirapiratana any.
  '3':
  - type: text
    content: Mahafaly Anao va ny hampahory sy hanary ny efa nisasaranao ka hamirapiratra amin'ny fisainan'ny ratsy fanahy?
  '4':
  - type: text
    content: Manana maso nofo va Hianao? Na mijery tahaka ny fijerin'ny zanak'olombelona?
  '5':
  - type: text
    content: Tahaka ny andron'ny zanak'olombelona va ny andronao? Na tahaka ny taonan'ny olombelona ny taonanao,
  '6':
  - type: text
    content: No dia mikaroka izay heloko Hianao sy mikatsaka izay fahotako,
  '7':
  - type: text
    content: Na dia fantatrao aza fa tsy mba ratsy fanahy aho, ary tsy misy mahavonjy amin'ny tananao?
  '8':
  - type: text
    content: Ny tananao ihany no namorona ahy ka nanisy endrika izao tenako rehetra izao, kanjo levoninao indray aho izao.
  '9':
  - type: text
    content: Masina Hianao, tsarovy fa notefenao toy ny tanimanga aho, ka hamerina ahy amin'ny vovoka indray Hianao!
