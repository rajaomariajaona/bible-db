document_id: PSA.86
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vavaka nataon'ny mpanompon'Andriamanitra, fony nenjehin'ny mpirehareha izy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fivavak''i Davida. Atongilano ny sofinao, Jehovah ô, ka valio aho, Fa ory sy malahelo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Arovy ny fanahiko, fa masina aho; Andriamanitro ô, vonjeo ny mpanomponao, Izay matoky Anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tompo ô, mamindrà fo amiko; Fa Hianao no itarainako mandrakariva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ampifalio ny fanahin''ny mpanomponao; Fa Hianao, Tompo ô, no ananganako ny fanahiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa Hianao, Tompo ô, no tsara sady mamela heloka Ary be famindram-po amin'izay rehetra miantso Anao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mandrenesa ny fivavako, Jehovah ô, Ary henoy ny feon''ny fifonako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Amin''ny andro fahoriako dia miantso Anao aho, Fa mamaly ahy Hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tsy misy tahaka Anao, Tompo ô, amin''ireo andriamanitra; Ary tsy misy tahaka ny asanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ny firenena rehetra nataonao dia ho avy hiankohoka eo anatrehanao, Tompo ô, Ka hanome voninahitra ny anaranao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa lehibe Hianao ka manao zava-mahagaga; Hianao irery ihany no Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ampianaro ny lalanao aho, Jehovah ô, Dia handeha amin''ny fahamarinanao aho; Ampiraiso ny foko hatahotra ny anaranao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hidera Anao amin''ny foko rehetra aho, Andriamanitro Tompo ô Hanome voninahitra ny anaranao mandrakizay aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Fa lehibe ny famindram-ponao amiko; Ary efa novonjenao ny fanahiko tsy ho any amin'ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Shoela
    marker-yv: yv-n
  - type: text
    text: ' ambany indrindra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Andriamanitra ô, ny mpirehareha mitsangana hanohitra ahy, Ary ny antokon''ny lozabe mitady ny aiko; Ary tsy mba heveriny fa eo anatrehany Hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa Hianao, Tompo ô, dia Andriamanitra mamindrà fo sy miantra, Mahari-po sady be famindram-po sy fahamarinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Todiho aho ka amindrao fo; Omeo ny herinao ny mpanomponao, Ary vonjeo ny zanaky ny ankizivavinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Anehoy famantarana ny ho soa aho, Mba ho hitan'izay mankahala ahy, ka ho menatra izy; Fa Hianao Jehovah ô, no namonjy sy nampionona ahy.
