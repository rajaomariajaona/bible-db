document_id: PSA.86,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Vavaka nataon'ny mpanompon'Andriamanitra, fony nenjehin'ny mpirehareha izy
  - type: text
    content: 'Fivavak''i Davida. Atongilano ny sofinao, Jehovah ô, ka valio aho, Fa ory sy malahelo. '
  '10':
  - type: text
    content: Fa lehibe Hianao ka manao zava-mahagaga; Hianao irery ihany no Andriamanitra.
  '11':
  - type: text
    content: 'Ampianaro ny lalanao aho, Jehovah ô, Dia handeha amin''ny fahamarinanao aho; Ampiraiso ny foko hatahotra ny anaranao. '
  '12':
  - type: text
    content: 'Hidera Anao amin''ny foko rehetra aho, Andriamanitro Tompo ô Hanome voninahitra ny anaranao mandrakizay aho. '
  '13':
  - type: text
    content: Fa lehibe ny famindram-ponao amiko; Ary efa novonjenao ny fanahiko tsy ho any amin'ny fiainan-tsi-hita
  - type: note
    content: Heb. Shoela
  - type: text
    content: ' ambany indrindra.'
  '14':
  - type: text
    content: 'Andriamanitra ô, ny mpirehareha mitsangana hanohitra ahy, Ary ny antokon''ny lozabe mitady ny aiko; Ary tsy mba heveriny fa eo anatrehany Hianao. '
  '15':
  - type: text
    content: 'Fa Hianao, Tompo ô, dia Andriamanitra mamindrà fo sy miantra, Mahari-po sady be famindram-po sy fahamarinana. '
  '16':
  - type: text
    content: 'Todiho aho ka amindrao fo; Omeo ny herinao ny mpanomponao, Ary vonjeo ny zanaky ny ankizivavinao. '
  '17':
  - type: text
    content: Anehoy famantarana ny ho soa aho, Mba ho hitan'izay mankahala ahy, ka ho menatra izy; Fa Hianao Jehovah ô, no namonjy sy nampionona ahy.
  '2':
  - type: text
    content: 'Arovy ny fanahiko, fa masina aho; Andriamanitro ô, vonjeo ny mpanomponao, Izay matoky Anao. '
  '3':
  - type: text
    content: 'Tompo ô, mamindrà fo amiko; Fa Hianao no itarainako mandrakariva. '
  '4':
  - type: text
    content: 'Ampifalio ny fanahin''ny mpanomponao; Fa Hianao, Tompo ô, no ananganako ny fanahiko. '
  '5':
  - type: text
    content: Fa Hianao, Tompo ô, no tsara sady mamela heloka Ary be famindram-po amin'izay rehetra miantso Anao.
  '6':
  - type: text
    content: 'Mandrenesa ny fivavako, Jehovah ô, Ary henoy ny feon''ny fifonako. '
  '7':
  - type: text
    content: 'Amin''ny andro fahoriako dia miantso Anao aho, Fa mamaly ahy Hianao. '
  '8':
  - type: text
    content: 'Tsy misy tahaka Anao, Tompo ô, amin''ireo andriamanitra; Ary tsy misy tahaka ny asanao. '
  '9':
  - type: text
    content: 'Ny firenena rehetra nataonao dia ho avy hiankohoka eo anatrehanao, Tompo ô, Ka hanome voninahitra ny anaranao. '
