document_id: PSA.45,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tonon-kiram-panambadiana, fiderana ny mpanjaka be voninahitra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ho an'ny mpiventy hira. Al-shoshanim. Nataon'ny Koraita. Maskila. Tonon-kiram-pitiavana. Mampiboiboika teny tsara ny foko; miteny aho, ka ny hilaza ny mpanjaka no teny ataoko; fanoratan'ny faingan-tsoratra ny lelako.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Henoy, razazavavy, dia jereo, ka atongilano ny sofinao, ary hadinoy ny firenenao sy ny tranon-drainao; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Raha irin''ny mpanjaka ny hatsaran-tarehinao - fa izy no tomponao - dia miankohofa eo anatrehany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary ny zanakavavin''i Tyro hitondra fanatitra; eny, ny manan-karena amin''ny vahoaka hila sitraka aminao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Be voninahitra ny zanakavavin''ny mpanjaka ao anaty trano; tenona misy volamena no fitafiany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mitafy lamba misoratsoratra izy ka entina ho ao amin''ny mpanjaka: ny zazavavy sakaizany izay manaraka azy dia entina ao aminao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Entina amin'ny fifaliana sy ny firavoravoana ireny; hiditra ao an-dapan'ny mpanjaka izy.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ho solon-drainao ny zanakao, hotendrenao ho mpanapaka eny amin''ny tany rehetra izy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Hampahatsiaro ny anaranao hatramin'ny taranaka fara mandimby aho. Izany rehetra izany no hideran'ny firenena anao mandrakizay doria.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Tsara tarehy noho ny zanak''olombelona ianao; fahasoavana no naidina tamin''ny molotrao; izany no nitahian''Andriamanitra anao mandrakizay. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fehezo eo am-balahanao ny sabatrao, ry ilay mahery, dia ny fiandriananao sy ny voninahitrao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary mitangena handroso soa aman-tsara amin''ny voninahitrao, noho ny teny marina ny fahalemem-panahim-pahamamarinana; ary hampianatra anao zava-mahatsiravina ny tananao ankavanana. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny zana-tsipìkanao dia voaranitra - Firenena maro no ringana ka hitsakitsahinao - ka mitsatoka ao am-pon'ny fahavalon'ny mpanjaka.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ny seza fiandriananao, Andriamanitra ô, dia mandrakizay doria; tehim-pahamarinana ny tehim-panjakanao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tianao ny fahamarinana, fa halanao ny heloka; koa Andriamanitra, dia Andriamanitrao, efa nanoso-diloilo fifaliana anao mihoatra noho ny namanao.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Miora sy hazo manitra
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Heb: ahalota'
      marker-yv: yv-n
    - type: text
      text: ' ary kasia ny fitafianao rehetra, zava-maneno avy ao amin''ny lapa ivory no mampifaly anao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Zanakavavin''andriamanjaka no isan''ny malalanao; eo ankavananao no itoeran''ny vadin''ny mpanjaka, miravaka volamena avy any Ofira. '
