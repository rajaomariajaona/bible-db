document_id: PSA.40,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fisaorana noho ny famonjena efa azo sy fanolorana ny tena hankatò ny tenin'Andriamanitra, ary fangatahana ho amin'ny andro sisa
  - type: text
    content: 'Ho an''ny mpiventy hira. Salamo nataon''i Davida. Niandry dia niandry an''i Jehovah aho; ary nitodika nitsinjo ahy Izy ka nandre ny fitarainako. '
  '10':
  - type: text
    content: 'Ny fahamarinanao tsy mba nafeniko tato am-poko; ny fahamarinanao sy ny famonjenao no nambarako; tsy nanafina ny famindram-ponao sy ny fahamarinanao tamin''ny fiangonana lehibe aho. '
  '11':
  - type: text
    content: 'Hianao, Jehovah ô, aza miaro ny antranao tsy ho amiko; aoka ny famindram-ponao sy ny fahamarinanao hiaro ahy mandrakariva. '
  '12':
  - type: text
    content: 'Fa nanodidina ahy ny fahoriana tsy tambo isaina; nahazo ahy ny heloko, ka tsy mahay mijery aho; maro noho ny volon-dohako ireny, ka reraka ny foko. '
  '13':
  - type: text
    content: 'Aoka ho sitraky ny fonao, Jehovah ô, ny hanafaka ahy; Jehovah ô, faingàna hamonjy ahy. '
  '14':
  - type: text
    content: 'Aoka ho indray menatra sy mangaihay izay mitady hanimba ny aiko; aoka hiamboho sy ho menatra izay mankasitraka ahy ho ory. '
  '15':
  - type: text
    content: 'Aoka ho ankona noho ny fahamenarany ireny manao amiko hoe: Hià! sakoa izay! '
  '16':
  - type: text
    content: 'Aoka ho faly sy ho ravoravo aminao izay rehetra mitady Anao; aoka izay rehetra tia ny famonjenao hanao mandrakariva hoe: hankalazaina anie Jehovah. '
  '17':
  - type: text
    content: Fa na dia ory sy malahelo aza aho, ny Tompo no mihevitra ahy; Mpamonjy sy Mpanafaka ahy Hianao; aza ela, Andriamanitro ô.
  '2':
  - type: text
    content: 'Dia nampakatra ahy avy tao amin''ny lavaka fandringanana Izy, eny, tamin''ny fotaka mandrevo; ary nampitoetra ny tongotro teo ambony vatolampy Izy ka nampijoro ahy. '
  '3':
  - type: text
    content: Ary nanisy fihiram-baovao teo am-bavako Izy, dia fideràna an'Andriamanitsika; maro no hahita sy hatahotra ary hatoky an'i Jehovah.
  '4':
  - type: text
    content: 'Sambatra izay olona manao an''i Jehovah ho tokiny, ka tsy mivily ho naman''ny mpiavonavona na ny mpivadika ho amin''ny lainga. '
  '5':
  - type: text
    content: 'Nohamaroinao ny fahagaganao sy ny hevitrao izay nataonao ho anay, Jehovah Andriamanitra ô. Tsy misy azo ampitahaina aminao Raha tiako hambara sy holazaina ireny, dia, indro, maro loatra izy ka tsy tambo isaina. '
  '6':
  - type: text
    content: Ny fanatitra alatsa-drà sy ny fanatitra hohanina tsy mba sitrakao ny sofiko nataonao malady
  - type: note
    content: 'Heb: Ny sofiko no nohadinao'
  - type: text
    content: ' ny fanatitra dorana sy ny fanatitra noho ny ota tsy mba nilainao; '
  '7':
  - type: text
    content: 'Dia hoy izaho:inty aho tonga ao amin''ny horonam-boky no nanoratana ahy. '
  '8':
  - type: text
    content: 'Ny hanao ny sitraponao, Andriamanitra ô, no sitrako; ary ny lalanao no ato anatiko. '
  '9':
  - type: text
    content: 'Efa nilaza teny mahafaly ny amin''ny fahamarinana teo amin''ny fiangonana lehibe aho; indro ny molotro tsy mba nakomboko; Jehovah ô, Hianao no mahalala. '
