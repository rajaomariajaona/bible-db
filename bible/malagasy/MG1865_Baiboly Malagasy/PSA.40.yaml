document_id: PSA.40,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fisaorana noho ny famonjena efa azo sy fanolorana ny tena hankatò ny tenin'Andriamanitra, ary fangatahana ho amin'ny andro sisa
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ho an''ny mpiventy hira. Salamo nataon''i Davida. Niandry dia niandry an''i Jehovah aho; ary nitodika nitsinjo ahy Izy ka nandre ny fitarainako. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ny fahamarinanao tsy mba nafeniko tato am-poko; ny fahamarinanao sy ny famonjenao no nambarako; tsy nanafina ny famindram-ponao sy ny fahamarinanao tamin''ny fiangonana lehibe aho. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hianao, Jehovah ô, aza miaro ny antranao tsy ho amiko; aoka ny famindram-ponao sy ny fahamarinanao hiaro ahy mandrakariva. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa nanodidina ahy ny fahoriana tsy tambo isaina; nahazo ahy ny heloko, ka tsy mahay mijery aho; maro noho ny volon-dohako ireny, ka reraka ny foko. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Aoka ho sitraky ny fonao, Jehovah ô, ny hanafaka ahy; Jehovah ô, faingàna hamonjy ahy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Aoka ho indray menatra sy mangaihay izay mitady hanimba ny aiko; aoka hiamboho sy ho menatra izay mankasitraka ahy ho ory. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Aoka ho ankona noho ny fahamenarany ireny manao amiko hoe: Hià! sakoa izay! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Aoka ho faly sy ho ravoravo aminao izay rehetra mitady Anao; aoka izay rehetra tia ny famonjenao hanao mandrakariva hoe: hankalazaina anie Jehovah. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa na dia ory sy malahelo aza aho, ny Tompo no mihevitra ahy; Mpamonjy sy Mpanafaka ahy Hianao; aza ela, Andriamanitro ô.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia nampakatra ahy avy tao amin''ny lavaka fandringanana Izy, eny, tamin''ny fotaka mandrevo; ary nampitoetra ny tongotro teo ambony vatolampy Izy ka nampijoro ahy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ary nanisy fihiram-baovao teo am-bavako Izy, dia fideràna an'Andriamanitsika; maro no hahita sy hatahotra ary hatoky an'i Jehovah.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Sambatra izay olona manao an''i Jehovah ho tokiny, ka tsy mivily ho naman''ny mpiavonavona na ny mpivadika ho amin''ny lainga. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nohamaroinao ny fahagaganao sy ny hevitrao izay nataonao ho anay, Jehovah Andriamanitra ô. Tsy misy azo ampitahaina aminao Raha tiako hambara sy holazaina ireny, dia, indro, maro loatra izy ka tsy tambo isaina. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny fanatitra alatsa-drà sy ny fanatitra hohanina tsy mba sitrakao ny sofiko nataonao malady
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Heb: Ny sofiko no nohadinao'
      marker-yv: yv-n
    - type: text
      text: ' ny fanatitra dorana sy ny fanatitra noho ny ota tsy mba nilainao; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia hoy izaho:inty aho tonga ao amin''ny horonam-boky no nanoratana ahy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ny hanao ny sitraponao, Andriamanitra ô, no sitrako; ary ny lalanao no ato anatiko. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Efa nilaza teny mahafaly ny amin''ny fahamarinana teo amin''ny fiangonana lehibe aho; indro ny molotro tsy mba nakomboko; Jehovah ô, Hianao no mahalala. '
