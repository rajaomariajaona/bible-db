document_id: EZK.42
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia nentiny nivoaka nianavaratra ho any amin''ny kianja ivelany aho, ary nampidiriny ho ao amin''ny efi-trano tandrifin''ny kianja voatokana sady tandrifin''ny trano eo amin''ny avaratra, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia ho eo anoloan''ilay lavany zato hakiho izay nisy ny varavarana avaratra, ary ny sakany dimam-polo hakiho. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tandrifin''ny roa-polo hakiho amin''ny kianja anatiny sady tandrifin''ny lampivato amin''ny kianja ivelany dia nisy lalan-tsarany nifanandrify teo amin''ny trano fahatelo ambony indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary teo anoloan'ny efi-trano dia nisy lalana, folo hakiho ny sakany, mankao anatiny, ary lalana iray
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (zato)'
    marker-yv: yv-n
  - type: text
    text: ' hakiho izany; ary nanatrika ny avaratra ny varavarany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nohakelezina ny efi-trano ambony, fa nangalana ho lalantsarany, ka izany no nahakely azy noho ny ambany sy ny an-tenatenany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa nifanongoa telo ireo, fa tsy nisy andry tahaka ny andrin''ny kianja, ka izany no nahakely azy noho ny ao ambany sy ny ao an-tenatenany hatreny an-tany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nisy ampiantany teo ivelany, tandrifin''ny efi-trano, nanatrika ny kianja ivelany, teo anoloan''ny efi-trano, ka dimam-polo hakiho ny lavany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa ny lavan''ireo efi-trano izay teo amin''ny kianja ivelany dia dimam-polo hakiho; ary, indro, ny teo anoloan''ny ati-trano lehibe dia zato hakiho. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary teo ambanin''ireo efi-trano ireo dia nisy fidirana avy eo atsinanana, raha miditra amin''ireo avy eo amin''ny kianja ivelany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nisy efi-trano koa teo amin''ny sakan''ny ampiantanin''ny kianja teo amin''ny atsinanana, tandrifin''ny kianja voatokana sady tandrifin''ny trano. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nisy lalana teo anoloany, ary tahaka ny tarehin''ny efi-trano teo amin''ny avaratra ny tarehiny, sady mitovy amin''ny an''ireo avokoa ny lavany sy ny sakany ary ny fivoahana avy ao aminy mbamin''ny fombafombany rehetra sy ny varavarany; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ary tahaka ny varavaran''ny efi-trano eo amin''ny atsimo dia nisiana varavarana koa teo amin''ny fiandohan''ny lalana, dia ilay lalana eo anoloan''ny ampiantany mifanolotra aminy, dia ny lalana avy eo amin''ny atsinanana, raha miditra ao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy izy tamiko; Ny efi-trano avaratra sy ny efi-trano atsimo, izay eo anoloan''ny kianja voatokana, dia efi-trano masina, hihinanan''ny mpisorona izay manatona an''i Jehovah ny zavatra masina indrindra; any no hametrahany izay zavatra masina indrindra, dia ny fanatitra hohanina sy ny fanatitra noho ny ota ary ny fanati-panonerana: fa masina io fitoerana io. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Raha miditra ao ny mpisorona, dia tsy hiala amin'ny fitoerana masina ho any amin'ny kianja ivelany izy, fa ao no hamelany ny fitafiana masina izay nentiny nanao fanompoam-pivavahana, satria masina ireo; ary hitafy fitafiana hafa izy vao manatona ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nony vita ny nandrefesany ny trano anatiny, dia nentiny nivoaka nankany amin''ny vavahady izay manatrika ny atsinanana aho, ka norefesiny ny manodidina. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Norefesiny tamin''ny volotara fandrefasana ny lafiny atsinanana, ka indiman-jaton''ny volotara manodidina, raha amin''ny volatara fandrefesana. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Norefesiny koa ny lafiny avaratra, ka indiman-jaton''ny volotara manodidina, raha amin''ny volotara fandrefesana. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Norefesiny koa ny lafiny atsimo, ka indiman-jaton''ny volotara, raha amin''ny volotara fandrefesana. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nitodika nankany amin''ny lafiny andrefana izy ka nandrefy indiman-jaton''ny volotara tamin''ny volotara fandrefesana. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Norefesiny avokoa ny lafiny efatra. Nisy ampiantany manodidina, indiman-jaton'ny volotara ny lavany, ary indiman-jatony koa ny sakany, hampiavaka ny masina sy ny tsy masina.
