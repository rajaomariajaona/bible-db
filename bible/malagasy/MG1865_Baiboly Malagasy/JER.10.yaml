document_id: JER.10,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny mahatsinontsinona ny sampy, ary ny fampisehoana ny voninahitr'i Jehovah sy ny fahatezerany
  - type: text
    content: 'Henoy ny teny izay lazain''i Jehovah aminareo, ry taranak''Isiraely! '
  '10':
  - type: text
    content: 'Fa Jehovah no Andriamanitra tokoa, eny, Izy no Andriamanitra velona sy Mpanjaka mandrakizay. Izay mampihorohoro ny tany amin''ny fahatezerany, ka tsy tantin''ny firenena ny fahavinirany '
  '11':
  - type: text
    content: '(Izao no holazainareo amin''ireny; Ny amin''ny andriamanitra izay tsy mba nanao ny lanitra sy ny tany, dia ho levona tsy ho amin''ny tany na ho atỳ ambanin''ny lanitra ireny) '
  '12':
  - type: text
    content: 'Dia Ilay nanao ny tany tamin''ny heriny sy nampiorina izao tontolo izao tamin''ny fahendreny ary namelatra ny lanitra tamin''ny fisainany. '
  '13':
  - type: text
    content: 'Raha mampirohondrohona ny rano any an-danitra Izy, dia mampiakatra fofona avy any amin''ny faran''ny tany; Manao ny helatra ho amin''ny ranonorana Izy sady mamoaka ny rivotra avy amin''ny firaketany. '
  '14':
  - type: text
    content: 'Efa ketrina avokoa ny olona rehetra ka tsy manam-pahalalana; Menarina noho ny sarin-javatra voasokitra ny mpanefy volamena rehetra; Fa fitaka ny sarin-javatra an-idina, sady tsy misy fofon''aina ao aminy. '
  '15':
  - type: text
    content: 'Zava-poana ireny, dia asa mahatsikaiky foana; Amin''ny andro hamaliana azy dia ho levona izy. '
  '16':
  - type: text
    content: 'Tsy mba tahaka ireo ny Anjaran''i Jakoba; Fa Mpamorona ny zavatra rehetra Izy; Ary ny Isiraely no firenena lovany; Jehovah, Tompon''ny maro, no anarany. '
  '17':
  - type: text
    content: 'Angony ny korontan''entanao, ka ento hiala amin''ny tany, ry ilay mipetraka ao amin''ny haterena! '
  '18':
  - type: text
    content: 'Fa izao no lazain''i Jehovah: Indro, hatorako ho indray misidina toy ny vaton''antsamotady ny mponina amin''ny tany, ary hataoko tery izy mba hahitany. '
  '19':
  - type: text
    content: 'Mahita loza aho, fa torotoro! Tsy azo sitranina ny feriko; Nefa hoy Izaho: Anjara-fahoriako izao, ka dia hozakaiko ihany. '
  '2':
  - type: text
    content: 'Izao no lazain''i Jehovah: Aza mianatra ny fanaon'
  - type: note
    content: Heb. didin'
  - type: text
    content: '''ny jentilisa; Ary aza matahotra ireo famantarana eny amin''ny lanitra; Fa ny jentilisa no matahotra izany. '
  '20':
  - type: text
    content: 'Rava ny laiko, ary tapaka avokoa ny kofehin-daiko; Lasa ny zanako, ka tsy misy intsony, eny, tsy misy hamelatra ny laiko intsony na hanantona ny ambain-daiko. '
  '21':
  - type: text
    content: 'Fa efa ketrina ny mpiandry ondry ka tsy mitady an''i Jehovah; Izany no tsy mahahendry azy, ka dia miely ny ondry andrasany rehetra. '
  '22':
  - type: text
    content: 'Injany! misy siosion-teny hoe: Indro, tamy izy amin''ny fihorakorahana be avy any amin''ny tany avaratra mba hahatonga ny tanànan''ny Joda ho lao sy ho fonenan''ny amboadia. '
  '23':
  - type: text
    content: 'Jehovah ô, fantatro fa tsy an''ny olombelona ny lalan-kalehany, na an''ny mpandeha ny hahalavorary ny diany '
  '24':
  - type: text
    content: 'Jehovah ô, anaro aho, nefa araka ny antonony ihany, fa tsy amin''ny fahatezeranao, fandrao hataonao tonga tsinontsinona aho. '
  '25':
  - type: text
    content: Aidino amin'ny jentilisa izay tsy mahalala Anao ny fahatezeranao, dia amin'ny taranaka Izay tsy miantso ny anaranao. Fa efa nihinana an'i Jakoba ireo, eny, nihinana sy nahalevona azy ary nahalao ny fonenany.
  '3':
  - type: text
    content: 'Fa ny fanaon''ny firenena dia zava-poana; Fa hazo nokapaina tany an''ala ireny, dia asan-tànan''ny mpiasa amin''ny famaky; '
  '4':
  - type: text
    content: 'Volafotsy sy volamena no an-dravahany azy, ary hombo sy tantanana no entiny manamafy azy, mba tsy hihetsiketehany. '
  '5':
  - type: text
    content: Toy ny hazo voasana ho sari-drofia
  - type: note
    content: palma
  - type: text
    content: ' izy, fa tsy mahateny; Ary entina ihany izy, fa tsy mba afa-mandeha; Aza matahotra azy, fa tsy mahatonga loza izy sady tsy mahay manisy soa. '
  '6':
  - type: text
    content: 'Tsy misy tokoa izay tahaka Anao, Jehovah ô; Lehibe Hianao, ary lehibe amin''ny hery ny anaranao. '
  '7':
  - type: text
    content: 'Iza no tsy hatahotra Anao, ry Mpanjakan''ny firenena! Fa Hianao no iendrehan''izany, eny, amin''ny hendry rehetra amin''ny firenena sy amin''ny fanjakany rehetra dia tsy misy tahaka Anao. '
  '8':
  - type: text
    content: 'Fa ketrina sy adala avokoa izy rehetra; He! fananaram-poana! fa tapa-kazo ihany. '
  '9':
  - type: text
    content: 'Volafotsy voafisaka nalaina avy tany Tarsisy sy volamena avy tany Ofaza Izany, asan-tanan''ny mpiasa sy ny mpanefy volamena; Lamba manga sy volomparasy ny fitafiany; Asan''ny mahay zavatra izy rehetra. '
