document_id: JER.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny mahatsinontsinona ny sampy, ary ny fampisehoana ny voninahitr'i Jehovah sy ny fahatezerany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Henoy ny teny izay lazain''i Jehovah aminareo, ry taranak''Isiraely! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain''i Jehovah: Aza mianatra ny fanaon'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. didin'
    marker-yv: yv-n
  - type: text
    text: '''ny jentilisa; Ary aza matahotra ireo famantarana eny amin''ny lanitra; Fa ny jentilisa no matahotra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa ny fanaon''ny firenena dia zava-poana; Fa hazo nokapaina tany an''ala ireny, dia asan-tànan''ny mpiasa amin''ny famaky; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Volafotsy sy volamena no an-dravahany azy, ary hombo sy tantanana no entiny manamafy azy, mba tsy hihetsiketehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Toy ny hazo voasana ho sari-drofia
  - type: usfm
    marker: x
    children:
    - type: text
      text: palma
    marker-yv: yv-n
  - type: text
    text: ' izy, fa tsy mahateny; Ary entina ihany izy, fa tsy mba afa-mandeha; Aza matahotra azy, fa tsy mahatonga loza izy sady tsy mahay manisy soa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy misy tokoa izay tahaka Anao, Jehovah ô; Lehibe Hianao, ary lehibe amin''ny hery ny anaranao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Iza no tsy hatahotra Anao, ry Mpanjakan''ny firenena! Fa Hianao no iendrehan''izany, eny, amin''ny hendry rehetra amin''ny firenena sy amin''ny fanjakany rehetra dia tsy misy tahaka Anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa ketrina sy adala avokoa izy rehetra; He! fananaram-poana! fa tapa-kazo ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Volafotsy voafisaka nalaina avy tany Tarsisy sy volamena avy tany Ofaza Izany, asan-tanan''ny mpiasa sy ny mpanefy volamena; Lamba manga sy volomparasy ny fitafiany; Asan''ny mahay zavatra izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa Jehovah no Andriamanitra tokoa, eny, Izy no Andriamanitra velona sy Mpanjaka mandrakizay. Izay mampihorohoro ny tany amin''ny fahatezerany, ka tsy tantin''ny firenena ny fahavinirany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '(Izao no holazainareo amin''ireny; Ny amin''ny andriamanitra izay tsy mba nanao ny lanitra sy ny tany, dia ho levona tsy ho amin''ny tany na ho atỳ ambanin''ny lanitra ireny) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia Ilay nanao ny tany tamin''ny heriny sy nampiorina izao tontolo izao tamin''ny fahendreny ary namelatra ny lanitra tamin''ny fisainany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Raha mampirohondrohona ny rano any an-danitra Izy, dia mampiakatra fofona avy any amin''ny faran''ny tany; Manao ny helatra ho amin''ny ranonorana Izy sady mamoaka ny rivotra avy amin''ny firaketany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Efa ketrina avokoa ny olona rehetra ka tsy manam-pahalalana; Menarina noho ny sarin-javatra voasokitra ny mpanefy volamena rehetra; Fa fitaka ny sarin-javatra an-idina, sady tsy misy fofon''aina ao aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Zava-poana ireny, dia asa mahatsikaiky foana; Amin''ny andro hamaliana azy dia ho levona izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tsy mba tahaka ireo ny Anjaran''i Jakoba; Fa Mpamorona ny zavatra rehetra Izy; Ary ny Isiraely no firenena lovany; Jehovah, Tompon''ny maro, no anarany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Angony ny korontan''entanao, ka ento hiala amin''ny tany, ry ilay mipetraka ao amin''ny haterena! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa izao no lazain''i Jehovah: Indro, hatorako ho indray misidina toy ny vaton''antsamotady ny mponina amin''ny tany, ary hataoko tery izy mba hahitany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mahita loza aho, fa torotoro! Tsy azo sitranina ny feriko; Nefa hoy Izaho: Anjara-fahoriako izao, ka dia hozakaiko ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Rava ny laiko, ary tapaka avokoa ny kofehin-daiko; Lasa ny zanako, ka tsy misy intsony, eny, tsy misy hamelatra ny laiko intsony na hanantona ny ambain-daiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa efa ketrina ny mpiandry ondry ka tsy mitady an''i Jehovah; Izany no tsy mahahendry azy, ka dia miely ny ondry andrasany rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Injany! misy siosion-teny hoe: Indro, tamy izy amin''ny fihorakorahana be avy any amin''ny tany avaratra mba hahatonga ny tanànan''ny Joda ho lao sy ho fonenan''ny amboadia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jehovah ô, fantatro fa tsy an''ny olombelona ny lalan-kalehany, na an''ny mpandeha ny hahalavorary ny diany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Jehovah ô, anaro aho, nefa araka ny antonony ihany, fa tsy amin''ny fahatezeranao, fandrao hataonao tonga tsinontsinona aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Aidino amin'ny jentilisa izay tsy mahalala Anao ny fahatezeranao, dia amin'ny taranaka Izay tsy miantso ny anaranao. Fa efa nihinana an'i Jakoba ireo, eny, nihinana sy nahalevona azy ary nahalao ny fonenany.
