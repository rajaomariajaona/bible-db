document_id: 1CH.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny taranak'i Levy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny zanakalahin''i Robena, lahimatoan''Isiraely (fa izy no lahimatoa; saingy ny nandotoany ny farafaran-drainy no nanomezana ny fizokiany ho an''ny zanak''i Josefa, zanak''Isiraely; nefa tsy voasoratra ho zokiny amin''ny fitantaram-pirazanana ireo; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'fa Joda nisandratra noho ny rahalahiny, ary izy no nihavian''ny mpanapaka; nefa ny fizokiana kosa dia an''i Josefa ihany), '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ny zanakalahin''i Robena, lahimatoan''Isiraely, dia Hanoka sy Palo sy Hezrona ary Karmy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny zanakalahin''i Joela dia Semaia, ary Goga no zanakalahin''i Semaia, Sirney no zanakalahin''i Goga, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mika no zanakalahin''i simey, Reaia no zanakalahin''i Mika, Bala no zanakalahin''i Reaia, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Bera no zanakalahin''i Bala, izay nobaboin''i Tiglato-pilesera, mpanjakan''i Asyria; izy no loham-pirenen''ny Robenita. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny rahalahiny araka ny fokony avy, raha nisaina ny firazanan''ny fireneny, dia Jeiela lohany sy Zakaria '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary Bela, zanak''i Azaza, zanak''i Sema, zanak''i Joela, izay nonina tao Aroera hatrany Nebo sy Balameona. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nonina tany atsinanana hatrany akaikin''ny efitra ka hatramin''ny ony Eofrata izy; fa ny ombiny aman''ondriny nihamaro teny amin''ny tany Gileada. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary tamin'ny andron'i Saoly dia niady tamin'ny Hagarita izy ka naharesy azy; ary nonina an-day eran'ny ilany atsinanana rehetra amin'i Gileada
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tany antsinanan''i Gileada'
    marker-yv: yv-n
  - type: text
    text: ' izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny taranak''i Gada nonina tandrifiny, teny amin''ny tany Basana hatrany Saleka; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Joela no lohany, dia Safama no manarakaraka, dia Janay sy Safata tany Basana. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny rahalahiny araka ny fianakaviany avy dia Mikaela sy Mesolama sy Seba sy Joray sy Jakana sy Zia ary Ebera; fito izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ireo no zanakalahin''i Abihaila, zanak''i Hory, zanak''i Jaroa, zanak''i Gileada, zanak''i Mikaela, zanak''i Jesisay, zanak''i Jado, zanak''i Boza; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ahia, zanak''i Abdiela, zanak''i Gony, no lohan''ny fianakaviany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nonina tany Gileada sy tany Basana sy tamin''ny zana-bohiny ary tamin''ny tany rehetra an-tsisin''i Sardna manodidina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ireo rehetra ireo dia nisaina araka ny firazanany tamin''ny andron''i Jotama, mpanjakan''ny Joda, sy tamin''ny andron''i Jeroboama, mpanjakan''ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny taranak''i Robena sy ny Gadita ary ny antsasaky ny firenen''i Manase, izay isan''ny lehilahy mahery, ka lehilahy mahatana ampinga sy sabatra ary mahahenjana tsipìka sady zatra ny miady, dia enim-polo amby fiton-jato amby efatra arivo sy efatra alina no isan''ny azo nalefa hanafika. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary niady tamin''ny Hagarita sy tamin''i Jetora sy Nafisy ary Nodaba izy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nombana hamely ireo izy, ka dia voatolotra teo an-tànany ny Hagarita mbamin''izay rehetra nomba azy, satria nitaraina tamin''Andriamanitra teo amin''ny ady izy, ary nekeny ny fangatahany noho ny fahatokiany Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nobaboiny ny bibiny, dia rameva dimy alina sy ondry aman''osy dimy alina amby roa hetsy sy boriky roa arivo ary olona iray hetsy; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: fa maro ny faty niampatrampatra, satria avy tamin'Andriamanitra ny ady. Ary nonina nandimby ireo izy mandra-pahatongan'ny namaboana azy kosa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny taranaky ny antsasaky ny firenen''i Manase dia nonina tamin''ny tany; ary nihamaro izy hatrany Basana ka hatrany Bala-hermona sy Senira ary hatramin''ny tendrombohitra Hermona. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary izao no lohan''ny fianakaviany: Efera sy Jisy sy Eliala sy Azriela sy Jeremia sy Hodavia ary Jadiela; lehilahy mahery ireo ary malaza sady samy lohan''ny fianakaviany avy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary nivadika tamin''Andriamanitry ny razany ireo, fa nijangajanga nanaraka ny andriamanitry ny tompon-tany, izay naringan''Andriamanitra tsy ho eo anoloany. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary Andriamanitry ny Isiraely namporisika an'i Pola, mpanjakan'i Asyria, sy Tiglato-pilesera mpanjakan'i Asyria, ka dia nobaboin'ireo ny Robenita sy ny Gadita sy ny antsasaky ny firenen'i Manase ka nentiny tany Hala sy Habora sy Hara ary tany amoron'ny ony Gozana ambaraka androany. Ny zanakalahin'i Levy dia Gersona sy Kehata ary Merary. Ary ny zanakalahin'i Kehata dia Amrama sy Jizara sy Hebrona ary Oziela. Ary ny zanak'i Amrama dia Arona sy Mosesy ary Miriama. Ny zanakalahin'i Arona dia Nadaba sy Abiho sy Eleazara ary Itamara. Eleazara niteraka an'i Finehasa; ary Finehasa niteraka an'i Abisoa; ary Abisoa niteraka an'i Boky; ary Boky niteraka an'i Ozy; ary Ozy niteraka an'i Zerahia; ary Zerahia niteraka an'i Meraiota; ary Meraiota niteraka an'i Amaria; ary Amaria niteraka an'i Ahitoba; ary Ahitoba niteraka an'i Zadoka; ary Zadoka niteraka an'i Ahimaza; ary Ahimaza niteraka an'i Azaria; ary Azaria niteraka an'i Johanana; ary Johanana niteraka an'i Azaria (ilay nanao fisoronana tao amin'ny trano nataon'i Solomona tany Jerosalema); ary Azaria niteraka an'i Amaria; ary Amaria niteraka an'i Ahitoba; ary Ahitoba niteraka an'i Zadoka; ary Zadoka niteraka an'i Saloma; ary Saloma niteraka an'i Hilkia; ary Hilkia niteraka an'i Azaria; ary Azaria niteraka an'i Seraia; ary Seraia niteraka an'i Jozadaka; ary dia lasan-ko babo Jozadaka, nony voatolotr'i Jehovah ho babon'i Nebokadnezara ny Joda sy Jerosalema.
