document_id: GEN.36
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny taranak'i Esao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary izao no taranak''i Esao (Edoma izany): '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Esao naka vady tamin''ny zanakavavin''ny Kananita, dia Ada, zanak''i Elona Hetita, sy Oholibama, zanak''i Ana, zanakavavin''i Zibona Hivita, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary Basemata, zanakavavin''Isimaela sady anabavin''i Nebaiota. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Ada niteraka an''i Elifaza tamin''i Esao; ary Basemata niteraka an''i Regoela; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary Oholibama niteraka an''i Jeosy sy Jalama ary Kora. Ireo no zanak''i Esao, izay naterany tany amin''ny tany Kanana. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia nentin''i Esao ny vadiny sy ny zananilahy sy ny zananivavy sy ny olona rehetra tao an-tranony sy ny omby aman''ondriny sy ny biby fiompiny rehetra, mbamin''ny fananany rehetra izay efa nohariny tany amin''ny tany Kanana, ka dia lasa nankany amin''izay tany hialana eo anatrehan''i Jakoba rahalahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa samy be loatra ny haren''izy mirahalahy, ka tsy mba nahazo niray monina izy; ary tsy omby azy ny tany fivahiniany, noho ny omby aman ondriny. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa nonina tany an-tendrombohitra Seira Esao. (Edoma izany). '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary izao no taranak''i Esao, rain''ny Edomita any an-tendrombohitra Seira: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny anaran''ny zanakalahin''i Esao dia izao: Elifaza, zanak''i Ada, vadin''i Esao, sy Regoela, zanak''i Basemata, vadin''i Esao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny zanakalahin''i Elifaza dia Temana sy Omara sy Zefo sy Gatama ary Kenaza. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Timna no vaditsindranon''i Elifaza, zanakalahin''i Esao; ary niteraka an''i Amaleka tamin''i Elifaza izy. Ireo no zanakalahin''i Ada, vadin''i Esao. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary izao no zanakalahin''i Regoela: Nahata sy Zera sy Sama ary Miza; ireo no zanakalahin''i Basemata, vadin''i Esao. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary izao no zanakalahin''i Oholibama, zanakavavin''i Ana, zanakavavin''i Zibona, vadin''i Esao: niteraka an''i Jeosy sy Jalama ary Kora tamin''i Esao izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izao no loham-pirenena tamin''ny taranak''i Esao: ny zanakalahin''i Elifaza, lahimatoan''i Esao, dia Temana loham-pireneny sy Omara loham-pireneny sy Zefo loham-pireneny sy Kenaza loham-pireneny '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'sy Kora loham-pireneny sy Gatama loham-pireneny ary Amaleka loham-pireneny. Ireo no loham-pireneny avy tamin''i Elifaza tany amin''ny tany Edoma; ireo no zanak''i Ada. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary izao no zanakalahin''i Regoela, zanak''i Esao: Nahata loham-pireneny sy Zera loham-pireneny sy Sama loham-pireneny sy Miza loham-pireneny. Ireo no loham-pirenena avy tamin''i Regoela tany amin''ny tany Edoma; ireo no zanak''i Basemata, vadin''i Esao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary izao no zanakalahin''i Oholibama, vadin''i Esao: Jeosy loham-pireneny sy Jalama loham-pireneny sy Kora loham-pireneny. Ireo no loham-pirenena avy tamin''i Oholibama, zanakavavin''i Ana, vadin''i Esao. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ireo no zanak''i Esao, izay atao hoe koa Edoma, ary ireo no loham-pireneny. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary izao no zanakalahin''i Seïra Horita, izay nonina tany amin''ny tany: Lotana sy Sobala sy Zibona sy Ana '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'sy Disona sy Ezera ary Disana. Ireo no loham-pirenena tamin''ny Horita, dia ny taranak''i Seïra, tany amin''ny tany Edoma. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny zanakalahin''i Lotana dia Hory sy Hemana; ary Timna no anabavin''i Lotana. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary izao no zanakalahin''i Sobala: Alvana sy Manahata sy Ebala sy Sefo ary Onama. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary izao no zanakalahin''i Zibona: Aia sy Ana (izany Ana izany ilay nahita ny ranomafana tany an-efitra, raha niandry ny borikin''i Zibona rainy izy). '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary izao no zanak''i Ana: Disona sy Oholibama, zanakavavin''i Ana. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary izao no zanakalahin''i Disona: Hemdana sy Esbana sy Jitrana ary Kerana. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary izao no zanak''i Ezera: Bilana sy Zavana ary Akana. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary izao no zanak''i Disana: Oza sy Arana. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary izao no loham-pirenena tamin''ny Horita: Lotana loham-pireneny sy Sobala loham-pireneny sy Zibona loham-pireneny sy Ana loham-pireneny '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: sy Disona loham-pireneny sy Ezera loham-pireneny ary Disana loham-pireneny. Ireo no loham-pirenena tamin'ny Horita, dia ny loham-pireneny tany amin'ny tany Seïra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary izao no mpanjaka izay nanjaka tany amin''ny tany Edoma, fony tsy mbola nisy mpanjaka nanjaka tamin''ny Zanak''Isiraely: '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nanjaka tany Edoma Bela, zanak''i Beora; ary Dinaba no anaran''ny tanànany. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary maty Bela, dia nanjaka nandimby azy Jobaba, zanak''i Zera avy tany Bozra. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary maty Jobaba, dia nanjaka nandimby azy Hosama avy tamin''ny tanin''ny Temanita. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary maty Hosama, dia nanjaka nandimby azy Hadada, zanak''i Bedada, izay namely ny Midianita tany amin''ny tany Moaba; ary Avita no anaran''ny tanànany. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary maty Hadada, dia nanjaka nandimby azy Samla avy tany Masreka. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary maty Samla, dia nanjaka nandimby azy Saoly avy tany Rehobota eo amoron''ny Ony. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary maty Saoly, dia nanjaka nandimby azy Bala-hanana, zanak''i Akbora. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary maty Bala-hanana, zanak''i Akbora; dia nanjaka nandimby azy Hadara; ary Pao no anaran''ny tanànany; ary ny anaran''ny vadiny dia Mehetabela, zanakavavin''i Matreda, zanakavavin''i Me-zahaba. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary izao no anaran''ny loham-pirenena tamin''ny taranak''i Esao, araka ny mpianakaviny, araka ny fonenany sy araka ny anarany: Timna loham-pireneny sy Alva loham-pireneny sy Jeteta loham-pireneny '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'sy Oholibama loham-pireneny sy Elaha loham-pireneny sy Pinona loham-pireneny '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'sy Kenaza loham-pireneny sy Temana loham-pireneny sy Mibzara loham-pireneny '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: sy Magdiela loham-pireneny ary Irama loham-pireneny. Ireo no loham-pirenena tamin'ny Edomita, araka ny fonenany, tany amin'ny taniny avy. Izany no Esao, rain'ny Edomita.
