document_id: PSA.149
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Haleloia ho an'i Jehovah, Izay aherezan'ny olony
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Haleloia. Mihirà fihiram-baovao ho an''i Jehovah, Ny fiderana Azy eo amin''ny fiangonan''ny olona masina. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Aoka ny Isiraely hifaly amin''ny Mpanao azy; Aoka ho finaritra amin''ny Mpanjakany ny zanak''i Ziona. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aoka hidera ny anarany amin''ny dihy izy Sy hankalaza Azy amin''ny ampongatapaka sy ny lokanga. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa sitrak'i Jehovah ny olony; Ravahany famonjena ny mpandefitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Aoka ny olona masina hifaly amin''ny voninahitra; Aoka hihoby tsara eo am-pandriany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Aoka hisy fanandratana an''Andriamanitra eo am-bavany Sy sabatra roa lela eny an-tànany, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hamaliany ny Jentilisa Sy hamaizany ny firenena maro, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hamatorany ireo mpanjakany amin''ny gadra, Sy ny olo-malazany amin''ny gadra vy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mba hanaovany ny fitsarana voasoratra: Voninahitry ny olony masina rehetra Izany. Haleloia.'
