document_id: PSA.149,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Haleloia ho an'i Jehovah, Izay aherezan'ny olony
  - type: text
    content: 'Haleloia. Mihirà fihiram-baovao ho an''i Jehovah, Ny fiderana Azy eo amin''ny fiangonan''ny olona masina. '
  '2':
  - type: text
    content: 'Aoka ny Isiraely hifaly amin''ny Mpanao azy; Aoka ho finaritra amin''ny Mpanjakany ny zanak''i Ziona. '
  '3':
  - type: text
    content: 'Aoka hidera ny anarany amin''ny dihy izy Sy hankalaza Azy amin''ny ampongatapaka sy ny lokanga. '
  '4':
  - type: text
    content: Fa sitrak'i Jehovah ny olony; Ravahany famonjena ny mpandefitra.
  '5':
  - type: text
    content: 'Aoka ny olona masina hifaly amin''ny voninahitra; Aoka hihoby tsara eo am-pandriany izy. '
  '6':
  - type: text
    content: 'Aoka hisy fanandratana an''Andriamanitra eo am-bavany Sy sabatra roa lela eny an-tànany, '
  '7':
  - type: text
    content: 'Hamaliany ny Jentilisa Sy hamaizany ny firenena maro, '
  '8':
  - type: text
    content: 'Hamatorany ireo mpanjakany amin''ny gadra, Sy ny olo-malazany amin''ny gadra vy. '
  '9':
  - type: text
    content: 'Mba hanaovany ny fitsarana voasoratra: Voninahitry ny olony masina rehetra Izany. Haleloia.'
