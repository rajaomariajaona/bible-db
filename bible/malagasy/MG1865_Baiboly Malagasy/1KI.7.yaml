document_id: 1KI.7,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanaovan'i Solomona ny fanaka momba ny tempoly
  - type: text
    content: 'Ary telo ambin''ny folo taona no nanaovan''i Solomona ny lapany, dia vita. '
  '10':
  - type: text
    content: 'Ary vato tsara sady lehibe ny fanorenany, dia vato folo hakiho sy valo hakiho. '
  '11':
  - type: text
    content: 'Ary teo ambony nisy vato tsara voapaika araka ny marika sy hazo sedera; '
  '12':
  - type: text
    content: ary manodidina ny kianja lehibe dia nasiany vato voapaika telo andalana sy hazo sedera iray andalana, tahaka ny amin'ny kianja anatiny amin'ny tranon'i Jehovah sy amin'ny lavarangana fidirana amin'ny trano.
  '13':
  - type: text
    content: 'Ary Solomona mpanjaka naniraka haka an''i Hirama avy tany Tyro. '
  '14':
  - type: text
    content: 'Zanaky ny vehivavy mpitondra-tena tamin''ny firenen''i Naftaly izy, nefa rainy dia lehilahy Tyriana, mpiasa varahina; feno fahendrena sy fahiratan-tsaina ary fahaizana izy hahavitany ny asa varahina rehetra. Dia tonga tao amin''i Solomona mpanjaka Hirama ka nanao izay asa rehetra tao aminy. '
  '15':
  - type: text
    content: 'Dia nanao ny andry varahina roa izy: valo ambin''ny folo hakiho avy ny hahavony, ary roa ambin''ny folo hakiho ny manodidina azy'
  - type: note
    content: Heb. ny faharoa
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Ary nanao kapitaly varahina roa anidina izy hatao eo amin''ny tampon''ny andry: dimy hakiho avy ny hahavony, '
  '17':
  - type: text
    content: 'ary harato sy fesitona miolana amin''ny kapitaly izay teo amin''ny tampon''ny andry avy: fito amin''ny kapitaly iray, ary fito koa amin''ny kapitaly iray. '
  '18':
  - type: text
    content: 'Ary nanao ny andry izy, ary nisy roa andalana manodidina tamin''ny asa harato iray, hafono ny kapitaly izay teo an-tampon''ny andry; ary toy izany koa no nataony tamin''ny kapitaly iray. '
  '19':
  - type: text
    content: 'Ary ny kapitaly izay teo an-tampon''ny andry dia nataony mitarehim-boninkazo lilia tahaka ny amin''ny lavarangana fidirana, ary efatra hakiho ny hahavony; '
  '2':
  - type: text
    content: 'Fa nanao ilay trano Alan''i Libanona izy: zato hakiho ny lavany, dimam-polo hakiho ny sakany, ary telo-polo hakiho ny hahavony, teo ambonin''ny andry sedera efatra andalana mbamin''ny sedera rairainy teo ambonin''ny andry. '
  '20':
  - type: text
    content: 'ary ny kapitaly teo an-tampon''ny andry roa dia teo ambony koa, teo akaikin''ny kibony izay anatin''ny harato; ary nisy sarin''ampongabendanitra roan-jato nifanandalana nanodidina ny kapitaly avy. '
  '21':
  - type: text
    content: 'Ary ny andry dia natsangany teo amin''ny lavarangana fidirana amin''ny efitra lehibe: ny andry ankavanana natsangany, ka ny anarany nataony hoe Jakina'
  - type: note
    content: Jakina = Hampiorina izy
  - type: text
    content: ; ary ny andry ankavia natsangany koa, ka ny anarany nataony hoe Boaza
  - type: note
    content: Boaza = Ao aminy no misy hery (?)
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Ary nisy natao mitarehim-boninkazo lilia teo an-tampon''ny andry. Toy izany no nahavitany ny asa tamin''ny andry. '
  '23':
  - type: text
    content: Ary nanao ny tavin-drano
  - type: note
    content: Heb. ranomasina
  - type: text
    content: ' an-idina boribory lehibe izy, ka folo hakiho no halehiben''ny vavany ary dimy hakiho ny hahavony, ary telo-polo hakiho ny manodidina azy. '
  '24':
  - type: text
    content: Ary tambanin'ny molotry ny tavin-drano lehibe
  - type: note
    content: Heb. ranomasina
  - type: text
    content: ' manodidina nisy sarim-boantango manodidina azy, folo amin''ny iray hakiho manodidina ny tavin-drano lehibe'
  - type: note
    content: Heb. ranomasina
  - type: text
    content: ', ary naidiny ho roa andalana ny sarim-boantango sady niara-nataony an-idina tamin''ny tavin-drano. '
  '25':
  - type: text
    content: Ary ny tavin-drano dia nipetraka tambonin'ny sarin'omby roa ambin'ny folo; ny telo nanatrika ny avaratra, ny telo nanatrika ny andrefana, ny telo nanatrika ny atsimo, ary ny telo nanatrika ny atsinanana; ary ny tavin-drano lehibe
  - type: note
    content: Heb. ranomasina
  - type: text
    content: ' dia teo ambonin''ireo, ary niady vody izy rehetra. '
  '26':
  - type: text
    content: 'Ary ny hateviny dia vodivoam-pelatanana, ary ny molony nataony tahaka ny molotry ny kapoaka, dia tahaka ny vonin''ny lilia; ary nahalany roa arivo bata izy. '
  '27':
  - type: text
    content: 'Ary nanao ny fitoeran-tavin-drano varahina folo izy: efatra hakiho ny lavan''ny anankiray, ary efatra hakiho koa ny sakany, ary telo hakiho ny hahavony. '
  '28':
  - type: text
    content: 'Ary toy izao ny asa amin''ireo fitoeran-tavin-drano ireo: nisy kobany izy, ary ireo kobany ireo dia teo anatin''ny sisiny; '
  '29':
  - type: text
    content: 'ary tamin''ny kobany izay nohodidinin''ny sisiny dia nisy sarin-diona sy omby ary kerobima; ary teo ambonin''ny sisiny koa nisy faladiany; ary teo ambanin''ny sarin-diona sy omby nisy fesitona mihantona. '
  '3':
  - type: text
    content: 'Ary ireo efi-trano teo ambonin''ny andry notafoany hazo sedera; ary ny isany dia dimy ambin''ny folo isan''andalana, ka dimy amby efa-polo izy rehetra. '
  '30':
  - type: text
    content: Ary isan'ireo fitoeran-tavin-drano ireo nisy kodia varahina efatra sy tanan-kodia varahina, ary ny tongony efatra nisy sorony; teo ambanin'ny tavin-drano no nisy ny sorony
  - type: note
    content: 'Na: ary ny tongony efatra dia tonga sorony'
  - type: text
    content: ' anidina manandrify ny fesitona tsirairay. '
  '31':
  - type: text
    content: 'Ary ny vavan''ny fitoeran-tavin-drano dia teo anatin''ny kapitaliny, ary mbola nisy iray hakiho teo ambonin''io; ary ny vavany dia hakiho iray sy tapany sady boribory tahaka ny amin''ny faladia, ary tamin''ny vavany koa nisy soratra, ary ny kobany teo aminy dia efajoro, fa tsy boribory. '
  '32':
  - type: text
    content: 'Ary ny kodia efatra dia teo ambanin''ny kobany; ary ny fihazonana ny tanan-kodia dia nikambana tamin''ny fitoeran-tavin-drano ihany; ary hakiho iray sy tapany ny hahavon''ny kodia. '
  '33':
  - type: text
    content: 'Ary ny fomban''ny kodia dia tahaka ny amin''ny kodian-kalesy: ny tànany sy ny boriboriny manodidina azy sy ny tanamasoandrony ary ny foitrany dia nataony an-idina avokoa. '
  '34':
  - type: text
    content: 'Ary nisy sorony efatra tamin''ny zorony efatra amin''ny fitoeran-tavin-drano iray, sady nitranga avy teo amin''ny fitoeran-tavin-drano ireo. '
  '35':
  - type: text
    content: 'Ary teo an-tampon''ny fitoeran-tavin-drano dia nisy boribory manodidina, irain-jehy ny hahavony; ary teo an-tampon''ny fitoeran-tavin-drano koa ny fitombenany sy ny kobany dia natao an-idina iray aminy. '
  '36':
  - type: text
    content: Fa ny koban'ny sorony sy ny kobany hafa nosoratany nasiany sarin'ny kerobima sy liona ary hazo rofia
  - type: note
    content: palma
  - type: text
    content: ', araka izay nahafeno azy avy, sady nasiany fesitona manodidina. '
  '37':
  - type: text
    content: 'Tahaka izany no nanaovany ny fitoeran-tavin-drano folo: samy natao an-idina avokoa, ary nitovy halehibe sy nitovy tarehy izy. '
  '38':
  - type: text
    content: 'Ary nanao tavin-drano varahina folo koa izy; ny tavin-drano samy nahalany efa-polo bata avy; ary samy efatra hakiho avy ny tavin-drano; ary tavin-drano iray avy no tamin''ny fitoerany folo. '
  '39':
  - type: text
    content: Ary nametraka ny fitoeran-tavin-drano dimy teo ankavanan'ny trano izy, ary ny dimy teo ankavian'ny trano, ary ilay tavin-drano lehibe
  - type: note
    content: Heb. ranomasina
  - type: text
    content: ' nataony teo ankavanan''ny trano, dia teo atsimo-atsinanana. '
  '4':
  - type: text
    content: 'Ary ny rairainy dia telo andalana, ary ny varavarankely dia nifanandrify intelo. '
  '40':
  - type: text
    content: 'Ary Hirama nanao ny tavin-drano sy ny sotron''afo ary ny lovia famafazana; ka dia vitan''i Hirama ny asa rehetra izay nataony ho an''i Solomona mpanjaka ho amin''ny tranon''i Jehovah:'
  '41':
  - type: text
    content: 'dia ny andry roa sy ny boriboriny roa amin''ny kapitaly izay teny an-tampon''ny andry roa, sy ny harato roa izay hafono ny boriboriny roa amin''ny kapitaly izay teo an-tampon''ny andry avy, '
  '42':
  - type: text
    content: 'ary ny sarin''ampongabendanitra efa-jato ho amin''ny harato roa, ampongabendanitra roa andalana ho amin''ny harato iray hafono ny boriboriny roa amin''ny kapitaly izay teny an-tampon''ny andry avy, '
  '43':
  - type: text
    content: 'ary ny fitoeran-tavin-drano folo sy ny tavin-drano folo ho eo ambonin''ny fitoerany '
  '44':
  - type: text
    content: ary ny tavin-drano lehibe
  - type: note
    content: Heb. ranomasina
  - type: text
    content: ' iray sy ny sarin''omby roa ambin''ny folo teo ambaniny. '
  '45':
  - type: text
    content: 'ary ny vilany fandraofan-davenona sy ny sotron''afo ary ny lovia famafazana. Ary ireo fanaka rehetra ireo, izay nataon''i Hirama ho an''i Solomona mpanjaka ho amin''ny tranon''1 Jehovah, dia varahina manganohano avokoa. '
  '46':
  - type: text
    content: 'Teo amin''ny tany amoron''i Jordana no nanaovan''ny mpanjaka an-idina azy tamin''ny tanimanga teo anelanelan''i Sokota sy Zaretana. '
  '47':
  - type: text
    content: 'Ary tsy nolanjain''i Solomona ny fanaka rehetra, satria be loatra izy; ary tsy nozahana izay lanjan''ny varahina. '
  '48':
  - type: text
    content: 'Ary Solomona nanao ny fanaka rehetra izay ao amin''ny tranon''i Jehovah: ny alitara volamena sy ny latabatra volamena, izay fitoeran''ny mofo aseho, '
  '49':
  - type: text
    content: 'ary ny fanaovan-jiro, dimy amin''ny ankavanana ary dimy amin''ny ankavia, teo anoloan''ny efitra anatiny, dia samy volamena tsara; ary ny voniny sy ny lela fanaovan-jiro ary ny hetin-jiro dia volamena koa; '
  '5':
  - type: text
    content: 'Ary ny varavarana rehetra sy ny tolana dia natao efa-joro; ary ny varavarankely nifanandrify intelo. '
  '50':
  - type: text
    content: 'ary ny vilia sy ny antsy sy ny lovia famafazana sy ny lovia kely sy ny fitoeran-davenon-jiro dia volamena tsara; ary ny vavin-tsavily ho amin''ny lela-varavaran''ny efitra anatiny, dia ny fitoerana masina indrindra, sy ho amin''ny lela-varavaran''ny efi-trano lehibe dia volamena avokoa. '
  '51':
  - type: text
    content: Toy izany no nahavitana ny asa nataon'i Solomona mpanjaka ho amin'ny tranon'i Jehovah; ary nampidirin'i Solomona ny zavatra izay efa nohamasinin'i Davida rainy, dia ny volafotsy sy ny volamena ary ny fanaka, sa nataony tao amin'ny rakitry ny tranon'i Jehovah.
  '6':
  - type: text
    content: 'Ary dia nataony koa ny lavarangana maro andry; dimam-polo hakiho ny lavany, ary telo-polo hakiho ny sakany; nisy koa ny lavarangana fidirana teo anoloany; ary nisy andry sy tokonana koa teo anoloan''io. '
  '7':
  - type: text
    content: Ary nataony koa ny lavarangana hitoeran'ny seza fiandrianana izay hitsarany, dia ny lavarangana fitsarana; ary nataony hazo sedera avokoa ny gorodona rehetra
  - type: note
    content: 'Na: na ny gorodony, na ny rihana'
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Ary ny tranony izay nitoerany teo amin''ny kianja hafa tao anatinatiny kokoa noho ny lavarangana fidirana dia nitovy rafitra tamin''io koa. Ary Solomona nanao trano tahaka izany lavarangana fidirana izany koa ho an''ny zanakavavin''i Farao, izay efa nampakariny ho vady. '
  '9':
  - type: text
    content: 'Izany rehetra izany dia vato tsara avokoa voapaika araka ny marika, sady voatsofa ny atiny sy ny ivelany, hatramin''ny fanambaniny ka hatramin''ny tongolany, ary teo ivelany koa hatramin''ny kianja lehibe. '
