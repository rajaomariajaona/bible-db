document_id: 1KI.3,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nisehoan'ny fahendren'i Solomona tamin'ny nitsarany azy roa vavy ny amin'ilay zaza maty
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Solomona tonga vinanton''i Farao, mpanjakan''i Egypta, fa nanambady ny zanakavavin''i Farao izy ka nitondra azy ho any an-Tanànan''i Davida, mandra-pahavitany ny tranony sy ny tranon''i Jehovah ary ny màndan''i Jerosalema manodidina. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary sitraky ny Tompo ny nangatahan''i Solomona izany zavatra izany; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka dia hoy Andriamanitra taminy: Satria nangataka izany zavatra izany ianao, fa tsy ny ho ela velona, na harena, na ny ain''ny fahavalonao, fa fahaizana hitsara no nangatahinao, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia, indro, efa nanao araka ny teninao Aho, ka indro, efa nanome anao saina hendry sady mahiratra, ka tsy nisy tahaka anao ny teo alohanao, ary tsy hisy ho tahaka anao ny ato aorianao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary na izay tsy nangatahinao aza dia efa nomeko anao koa, dia harena sy voninahitra, ka tsy hisy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: nisy'
      marker-yv: yv-n
    - type: text
      text: ' mpanjaka tahaka anao amin''ny andronao rehetra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha handeha amin''ny lalako ianao ka hitandrina ny lalàko sy ny didiko tahaka ny nandehanan''i Davida rainao, dia hataoko ho ela velona ianao. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary dia nahatsiaro Solomona, ka indro fa nofy izany. Ary nony tonga tany Jerosalema izy, dia nitsangana teo anoloan'ny fiaran'ny faneken'i Jehovah ka nanatitra fanatitra odorana sy fanati-pihavanana, ary dia nanao fanasana ho an'ny mpanompony rehetra izy.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin''izany dia nisy vehivavy janga roa nankao amin''ny mpanjaka ka nitsangana teo anatrehany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ilay vehivavy anankiray: Trarantitra ianao, tompokolahy, izaho sy ity vehivavy ity miray trano; ary teraka tao an-trano aho, sady tao koa izy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony efa velona hateloana aho, dia mba velona koa izavavy ity; ary izahay roa vavy ihany no tao; tsy nisy olon-kafa tao aminay tao an-trano, fa izahay roa vavy ihany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary maty tamin''ny alina ny zanak''izavavy ity, fa voatsindriny. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa ny olona mbola namono zavatra hatao fanatitra teny amin''ny fitoerana avo ihany, fa tsy mbola nisy trano vita ho an''ny anaran''i Jehovah hatramin''izany andro izany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nifoha mamatonalina izy ka naka ny zanako teo amiko tamin''ilay natory iny aho ankizivavinao, dia nampandriny teo an-tratrany, fa ny azy maty napetrany teo an-tratrako. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nifoha maraina hampinono ny zanako aho, indro fa maty izy; kanjo rehefa nofantariko sy nony maraina, dia indro fa tsy ny zanako naerako. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy kosa ilay anankiray: Tsia, fa ny velona no zanako, ary ny maty no zanakao. Fa hoy indray ny anankiray: Tsia, fa ny maty no zanakao, ary ny velona no zanako. izany no teniny teo anatrehan''ny mpanjaka. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjaka: Ny anankiray manao hoe: Ity velona no zanako. ary ny maty no zanakao; ary hoy kosa ny anankiray: Tsia, fa ny maty no zanakao, ary ny velona no zanako. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa itondray sabatra aho, hoy ny mpanjaka. Ary nentiny ny sabatra ho eo anatrehan''ny mpanjaka. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy ny mpanjaka: Sasaho ny zaza velona, ka omeo ny anankiray ny antsasany, ary ho an''ny anankiray kosa ny antsasany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa niteny tamin''ny mpanjaka ravehivavy, renin''ny zaza velona satria nandevilevy ny fony noho ny amin''ny zanany ka nanao hoe: Tompokolahy ô, trarantitra ianao, omeo azy ihany ary ny zaza velona, fa aza dia vonoina re! Fa hoy kosa ny iray: Aoka tsy ho ahy tsy ho anao, fa zarao mihitsy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly ny mpanjaka ka nanao hoe: Omeo itsy ny zaza velona, fa aoka tsy hovonoina; fa io mihitsy no reniny. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha ren'ny Isiraely rehetra izany fitsarana nataon'ny mpanjaka izany, dia natahotra ny mpanjaka izy, satria hitany fa misy fahendren'Andriamanitra ao am-pony ho entiny mitsara.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Solomona tia an'i Jehovah ka nizotra araka ny dian'i Davida rainy; nefa kosa izy mbola namono zavatra hatao fanatitra sy nandoro ditin-kazo manitra teny amin'ny fitoerana avo ihany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny mpanjaka nankany Gibeona hamono zavatra hatao fanatitra any, fa izany ilay fitoerana avo malaza
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. lehibe
      marker-yv: yv-n
    - type: text
      text: ; ka fanatitra dorana arivo no naterin'i Solomona teo amin'izany alitara izany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tao Gibeona no nisehoan''i Jehovah tamin''i Solomona tamin''ny nofy nony alina; ary hoy Andriamanitra: Angataho izay tianao homeko anao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Solomona: Hianao efa naneho fahasoavana lehibe tamin''i Davida raiko mpanomponao, araka ny nandehanany teo anatrehanao tamin''ny tsi-fivadihana sy ny fahamarinana ary ny fahitsian''ny fony taminao, ary Hianao efa nitahiry izao fahasoavana lehibe izao ho azy, dia ny nanomezanao azy zanakalahy hipetraka eo amin''ny seza fiandrianany tahaka ny amin''izao anio izao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ankehitriny, Jehovah Andriamanitro ô, Hianao efa nampanjaka ahy mpanomponao handimby an''i Davida raiko; nefa izaho dia mbola zaza ihany, ka tsy fantatro akory izay fivoaka sy fiditra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izaho mpanomponao koa dia ao amin''ny olonao izay nofidinao, sady olona betsaka tsy tambo isaina ary tsy hita isa noho ny hamaroany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa omeo ahy mpanomponao saina malady
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. fo mihaino
      marker-yv: yv-n
    - type: text
      text: ' ho entiko mitsara ny olonao hahaizako manavaka ny soa sy ny ratsy; fa iza moa no mahay mitsara izao olonao betsaka izao? '
