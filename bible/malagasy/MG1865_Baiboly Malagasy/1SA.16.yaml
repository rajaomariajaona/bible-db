document_id: 1SA.16,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanosorana an'i Davida ho mpanjakan'ny Isiraely
  - type: text
    content: 'Ary hoy Jehovah tamin''i Samoela: Mandra-pahoviana no hahalahelovanao an''i Saoly, nefa Izaho efa nandà azy tsy ho mpanjakan''ny Isiraely? fenoy diloilo ny tandrokao, ka mandehana, fa hirahiko ho any amin''i Jese Betlehemita ianao; fa efa nahita mpanjaka ho Ahy ao amin''ny zanany Aho. '
  '10':
  - type: text
    content: 'Ary Jese nampandalo fito lahy tamin''ny zanany teo anatrehan''i Samoela. Fa hoy Samoela tamin''i Jese: Tsy nofidin''i Jehovah ireto.'
  '11':
  - type: text
    content: 'Ary hoy Samoela tamin''i Jese: Tapitra eto avokoa va ny zanakao-lahy rehetra? Dia hoy izy: Ny faralahy no sisa, fa miandry ondry izy. Ary hoy Samoela tamin''i Jese: Maniraha haka azy, fa tsy hipetraka hihinana isika ambara-pahatongany eto. '
  '12':
  - type: text
    content: Dia naniraka izy ka nitondra azy hiditra. Ary mena volo
  - type: note
    content: 'Na: tendron-tava'
  - type: text
    content: ' izy sady bary maso no tsara tarehy. Ary hoy Jehovah: Mitsangàna, hosory izy, fa io no izy. '
  '13':
  - type: text
    content: 'Ary Samoela nandray ny tandroka feno diloilo ka nanosotra azy teo amin''ny rahalahiny; ary ny Fanahin''i Jehovah dia nilatsaka tamin''i Davida hatramin''iny andro iny. Dia nitsangana Samoela ka nankany Rama. '
  '14':
  - type: text
    content: 'Fa ny Fanahin''i Jehovah efa niala tamin''i Saoly, ary nisy fanahy ratsy avy tany amin''i Jehovah nampahatahotra azy. '
  '15':
  - type: text
    content: 'Ary hoy ny mpanompon''i Saoly taminy: Indro, ankehitriny misy fanahy ratsy avy any amin''Andriamanitra mampahatahotra anao. '
  '16':
  - type: text
    content: 'Aoka ny tomponay ankehitriny handidy anay mpanomponao izay eto anatrehanao, dia hitady olona mahay mitendry lokanga izahay; ary rehefa misy fanahy ratsy avy any amin''Andriamanitra tonga aminao, dia hitendry amin''ny tànany izy, ka dia ho tsara ihany ianao. '
  '17':
  - type: text
    content: 'Ary hoy Saoly tamin''ny mpanompony: Mizahà ary olona izay mahay mitendry tsara, ka ento etỳ amiko. '
  '18':
  - type: text
    content: 'Dia namaly ny anankiray amin''ny zatovony ka nanao hoe: Indro, ny anankiray amin''ny zanak''i Jese Betlehemita no hitako mahay mitendry, sady lehilahy mahery sy mpanafika izy ary mahay mandaha-teny sy lehilahy tsara tarehy, ary Jehovah momba azy. '
  '19':
  - type: text
    content: 'Ary Saoly dia naniraka tany amin''i Jese ka nanao hoe: Iraho hankatỳ amiko Davida zanakao izay miandry ondry. '
  '2':
  - type: text
    content: 'Fa hoy Samoela: Hataoko ahoana no fandeha; fa raha ren''i Saoly izany, moa tsy hovonoiny va aho? Ary hoy Jehovah: Mitondrà ombivavy kely ianao, ka lazao hoe: Avy hamono zavatra hatao fanatitra ho an''i Jehovah aho. '
  '20':
  - type: text
    content: 'Ary Jese naka mofo tokony ho zakan''ny boriky iray sy divay iray siny hoditra sy zanak''osy, ka nampitondrainy an''i Davida zanany ho an''i Saoly ireo. '
  '21':
  - type: text
    content: 'Ary Davida tonga tany amin''i Saoly ka nitoetra teo anatrehany; ary tiany indrindra izy, ka dia tonga mpitondra ny fiadiany. '
  '22':
  - type: text
    content: 'Ary Saoly naniraka tany amin''i Jese nanao hoe: Masìna ianao, avelao Davida hitoetra eo anatrehako, fa efa mahita fitia amiko izy. '
  '23':
  - type: text
    content: Ary raha nisy fanahy avy tany amin'Andriamanitra tonga tao amin'i Saoly, dia noraisin'i Davida ny lokanga ka notendren'ny tànany; ka dia velombelona sady nanaritra Saoly, ary ny fanahy ratsy niala taminy.
  '3':
  - type: text
    content: 'Ary antsoy Jese mba ho any amin''ny fanatitra, ary Izaho no hampahafantatra anao izay hataonao; ka dia hohosoranao ho Ahy izay holazaiko aminao. '
  '4':
  - type: text
    content: 'Ary Samoela nanao izay nolazain''i Jehovah, dia tonga tao Betlehema. Ary nitsena azy amin-kovitra ny loholona teo an-tanàna ka nanao hoe: Fihavanana va no ihavianao? '
  '5':
  - type: text
    content: 'Ary hoy izy: Fihavanana; avy hamono zavatra hatao fanatitra ho an''i Jehovah aho; hamasino ny tenanareo, ary andeha hiaraka amiko ho any amin''ny fanatitra. Dia nohamasininy Jese sy ny zanany ka nasainy ho any amin''ny fanatitra. '
  '6':
  - type: text
    content: 'Ary nony tonga ireo, dia nijery an''i Eliaba izy ka nanao hoe: Ny voahosotr''i Jehovah tokoa ity eto anatrehany. '
  '7':
  - type: text
    content: 'Fa hoy Jehovah tamin''i Samoela: Aza mijery ny tarehiny na ny hahavon''ny tsanganany, fa efa nolaviko izy; fa tsy mba toy ny fijerin''ny olona no fijerin''i Jehovah; fa ny olona mijery ny miseho eo ivelany, fa Jehovah kosa mijery ny fo. '
  '8':
  - type: text
    content: 'Ary Jese niantso an''i Abinadaba ka nampandalo azy teo anatrehan''i Samoela. Fa hoy izy: Tsy ity no nofidin''i Jehovah. '
  '9':
  - type: text
    content: 'Ary Jese dia nampandalo an''i Sama indray. Fa hoy izy: Tsy ity no nofidin''i Jehovah. '
