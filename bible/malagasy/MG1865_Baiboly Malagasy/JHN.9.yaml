document_id: JHN.9
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary raha nandalo Jesosy, dia nahita lehilahy jamba hatry ny fony vao teraka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ny mpianany nanontany Azy hoe: Raby ô, iza moa no nanota, io lehilahy io va, sa ny ray aman-dreniny, no dia teraka jamba izy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jesosy namaly hoe: Tsy io lehilahy io no nanota, na ny ray aman-dreniny, fa ny hanehoana ny asan''Andriamanitra eo aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Isika tsy maintsy manao ny asan''izay naniraka Ahy, raha mbola antoandro; avy ny alina, ka tsy mahazo miasa ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Raha amin''izao tontolo izao Aho, dia fahazavan''izao tontolo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Rehefa nilaza izany Izy, dia nandrora tamin''ny tany ka nanao feta tamin''ny rora, dia nahosony ny mason''ilay jamba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy Izy taminy: Andeha, sasao ny masonao any amin''ny farihy Siloama (izay atao hoe, raha adika, Nirahina). Dia lasa izy ka nanasa, dia niverina nahiratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Koa izay nifanolotra taminy sy izay nahita azy fa mpangataka izy taloha dia nanao hoe: Tsy ity va ilay nipetraka nangataka? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hoy ny sasany: Izy ity, fa hoy ny sasany: Tsia, fa tahaka azy ihany; ary hoy kosa izy: Izaho no izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy ny olona taminy: Ahoana no nahiratan''ny masonao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary izy namaly ka nanao hoe: Ilay Lehilahy atao hoe Jesosy no nanao feta, dia nanosotra ny masoko ka nanao tamiko hoe: Mankanesa any Siloama, ka sasao ny masonao; koa nandeha aho, dia nanasa azy, ka dia nahiratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy ny olona taminy: Aiza moa izany Lehilahy izany? Hoy ralehilahy: Tsy fantatro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ilay jamba taloha dia nentiny tany amin''ny Fariseo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary tamin''ny andro Sabata no nanaovan''i Jesosy ny feta sy nampahiratany ny mason-dralehilahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ny Fariseo koa nanontany azy izay nahiratan''ny masony. Dia hoy izy taminy: Nasiany feta ny masoko, dia nosasako, ka nahiratra aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy ny Fariseo sasany: Tsy avy amin''Andriamanitra izany Lehilahy izany, satria tsy mitandrina ny Sabata Izy. Hoy ny sasany: Hataon''ny lehilahy mpanota ahoana no fahay manao fahagagana toy izany? Dia nisara-tsaina izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy indray izy tamin''ilay jamba: Ahoana no ilazanao Azy, fa nampahiratra ny masonao Izy? Dia hoy izy: Mpaminany Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary amin''izany ny Jiosy tsy nino azy ho efa jamba ka nahiratra, ambara-piantsony ny ray aman-drenin''ilay nahiratra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ka nanontaniany hoe: Zanakareo moa ity, izay lazainareo fa teraka jamba? Koa nanao ahoana ary no nahiratany izao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny ray aman-dreniny namaly ka nanao hoe: Fantatray fa zanakay ity sady teraka jamba; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'fa tsy fantatray izay nahiratany izao; ary tsy fantatray izay nampahiratra ny masony; izy ihany no anontanio; efa lehibe izy, aoka izy no hilaza ny amin''ny tenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Izany teny izany no nolazain''ny ray aman-dreniny, satria natahotra ny Jiosy izy; fa efa nifanaiky rahateo ny Jiosy fa raha misy manaiky Azy ho Kristy dia horoahina hiala amin''ny synagoga. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Izany no nilazan''ny ray aman-dreniny hoe: Efa lehibe izy, koa izy no anontanio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia niantso ilay jamba teo aloha indray izy ka nanao taminy hoe: Omeo voninahitra Andriamanitra; izahay mahalala fa mpanota izany Lehilahy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa izy namaly hoe. Tsy fantatro na mpanota Izy, na tsia; zavatra iray loha ihany no fantatro: jamba aho teo aloha, fa mahiratra aho izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia hoy izy taminy: Inona no nataony taminao? Nanao ahoana ange no nampahiratany ny masonao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia namaly azy hoe izy: Efa voalazako taminareo rahateo, fa tsy nihaino ianareo; nahoana no te-hihaino indray ianareo? Moa te-ho mpianany koa va ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia nanevateva azy izy ka nanao hoe: Ialahy no mpianany; fa izahay mpianatr''i Mosesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Izahay mahalala fa Mosesy no nitenenan''Andriamanitra; fa ny amin''izany Lehilahy izany, dia tsy fantatray izay nihaviany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ralehilahy namaly azy hoe: Mba mahagaga tokoa lahy izany! fa tsy fantatrareo ny nihaviany, nefa nampahiratra ny masoko Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fantatsika fa Andriamanitra tsy mihaino ny mpanota; fa izay mivavaka aminy sy manao ny sitrapony no henoiny.. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Hatrizay hatrizay dia tsy mbola re fa nisy nampahiratra ny mason''izay teraka jamba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Raha tsy avy amin''Andriamanitra izany Lehilahy izany, dia tsy mahefa na inona na inona Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary namaly ireo ka nanao taminy hoe: Tena teraka tamin''ny ota ialahy, ka ialahy indray va mampianatra anay? Dia noroahiny izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jesosy nandre fa efa noroahiny ralehilahy; ary rehefa nahita azy Izy, dia nanao hoe: Mino ny Zanak-Andriamanitra va ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ralehilahy namaly ka nanao hoe: Iza moa no Izy, Tompoko, mba hinoako Azy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Hoy Jesosy taminy: Efa nahita Azy ianao, sady Izay miresaka aminao izao no Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary hoy izy: Tompoko, mino aho. Dia niankohoka teo anatrehany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary hoy Jesosy: Ho fitsarana no nahatongavako amin''izao tontolo izao, mba hahiratra ny tsy mahiratra, ary mba ho tonga jamba kosa ny mahiratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary ny Fariseo sasany izay teo aminy, nony nandre izany, dia nanao taminy hoe: Izahay koa va mba jamba? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Hoy Jesosy taminy: Raha jamba ianareo, dia tsy ho nanan-keloka; nefa hoy ianareo ankehitriny: Mahiratra izahay; dia tsy afaka ny helokareo.'
