document_id: PRO.14,96
type_code: plt
verses:
  '1':
  - type: text
    content: Ny vehivavy hendry
  - type: note
    content: Heb. fahendren'ny vehivavy
  - type: text
    content: ' dia samy manao ny tranony; Fa ny adala'
  - type: note
    content: Heb. fahadalana
  - type: text
    content: ' kosa mandrava ny tranony amin''ny tànany.'
  '10':
  - type: text
    content: Ny fo no mahalala ny fangidian'ny alahelony; Ary tsy raharahan'ny olon-kafa ny hafaliany.
  '11':
  - type: text
    content: Ravana ny tranon'ny ratsy fanahy; Fa ambinina ny lain'ny marina.
  '12':
  - type: text
    content: Misy lalana ataon'ny olona ho mahitsy, Kanjo lalana mivarina any amin'ny fahafatesana no iafarany.
  '13':
  - type: text
    content: Na dia mihomehy aza, dia ory ihany ny fo, Ary ny faran'ny hafaliana dia alahelo.
  '14':
  - type: text
    content: Ny mihemotra am-po dia ho voky ny alehany; Fa ny tsara fanahy kosa ho voky ny azy ihany.
  '15':
  - type: text
    content: Ny kely saina mino ny teny rehetra; Fa ny mahira-tsaina mandinika ny diany.
  '16':
  - type: text
    content: Ny hendry matahotra ka mivily tsy ho amin'ny ratsy; Fa ny adala fatra-pirehareha
  - type: note
    content: 'Na: misafoaka'
  - type: text
    content: ' ka matokitoky foana. '
  '17':
  - type: text
    content: Izay malaky tezitra dia manao adaladala; Ary ny olona mamoron-tsain-dratsy dia ankahalaina.
  '18':
  - type: text
    content: Ny kely saina dia handova fahadalana; Fa ny mahira-tsaina mahazo ny fahalalana ho satro-boninahiny
  - type: note
    content: 'Na: mandray fahalalana'
  - type: text
    content: .
  '19':
  - type: text
    content: Ny ratsy fanahy miondrika eo anatrehan'ny tsara fanahy, Ary ny meloka dia eo am-bavahadin'ny marina.
  '2':
  - type: text
    content: Mandeha mahitsy izay matahotra an'i Jehovah; Fa mivily lalana kosa izay maniratsira Azy.
  '20':
  - type: text
    content: Ny malahelo dia halan'ny havany aza; Fa ny manan-karena no tian'ny maro.
  '21':
  - type: text
    content: 'Izay manao tsinontsinona ny namany dia manota; Fa endrey ny fahasambaran''izay mamindra fo amin''ny ory! '
  '22':
  - type: text
    content: Tsy mivily va izay manao asa
  - type: note
    content: 'Na: misaina ny'
  - type: text
    content: ' ratsy? Fa famindram-po sy fahamarinana no ho an''izay manao asa'
  - type: note
    content: Na. misaina ny
  - type: text
    content: ' tsara. '
  '23':
  - type: text
    content: Ny fisasarana rehetra misy valiny avokoa; Fa ny molotra mibedibedy foana tsy mba ahazoana na inona na inona.
  '24':
  - type: text
    content: Satroboninahitry ny hendry ny hareny; Fa ny fahadalan'ny adala dia fahadalana ihany.
  '25':
  - type: text
    content: Ny vavolombelona marina mamonjy ain'olona; Fa izay mamoaka lainga dia tena fitaka.
  '26':
  - type: text
    content: 'Ny fahatahorana an''i Jehovah dia fiarovana mahatoky, Ary ny zanany hahazo fialofana. '
  '27':
  - type: text
    content: Ny fahatahorana an'i Jehovah no loharanon'aina, Hanalavirana ny fandriky ny fahafatesana.
  '28':
  - type: text
    content: Ny fahabetsahan'ny vahoaka no voninahitry ny mpanjaka; Fa ny havitsiany kosa no fietreny.
  '29':
  - type: text
    content: Be saina izay mahatsindry fo; Fa ny malaky tezitra mampiseho ny fahadalany.
  '3':
  - type: text
    content: Eo am-bavan'ny adala misy tsorakazon'ny fiavonavonana; Fa ny molotry ny hendry miaro ny tenany.
  '30':
  - type: text
    content: Ny fo mionona no fiainan'ny nofo; Fa ny fahamaimaizan-tsaina dia mahalò ny taolana.
  '31':
  - type: text
    content: 'Izay mampahory ny mahantra dia manala baraka ny Mpanao azy; Fa ny mamindra fo aminy kosa dia manome voninahitra Azy. '
  '32':
  - type: text
    content: Ny ratsy fanahy azera
  - type: note
    content: 'Na: roahina'
  - type: text
    content: ' noho ny haratsiany; Fa ny marina matoky, na dia mby ao amin''ny fahafatesana aza.'
  '33':
  - type: text
    content: Mandry tsara ao am-pon'ny manan-tsaina ny fahendrena; Fa ny an'ny adala kosa dia miharihary.
  '34':
  - type: text
    content: Ny fahamarinana manandratra ny firenena; Fa ny ota kosa dia fahafaham-baraka amin'ny olona
  '35':
  - type: text
    content: Ny fankasitrahan'ny mpanjaka dia amin'ny mpanompo hendry; Fa ny fahatezerany kosa amin'ny manao izay mahamenatra.
  '4':
  - type: text
    content: Raha tsy misy omby, dia foana
  - type: note
    content: Heb. madio
  - type: text
    content: ' ny fihinanam-bilona; Fa be ny fitomboan-karena azo amin''ny herin''ny omby.'
  '5':
  - type: text
    content: Ny vavolombelona mahatoky tsy mba mety mandainga; Fa mamoaka lainga kosa ny vavolombelona tsy mahatoky.
  '6':
  - type: text
    content: Ny mpaniratsira mba mitady fahendrena, fa tsy mahita; Fa ny manan-tsaina mora mahazo fahalalana.
  '7':
  - type: text
    content: 'Mialà eo anatrehan''ny olona adala, Fa tsy ho hitanao aminy ny molotry ny fahalalana. '
  '8':
  - type: text
    content: Ny mitandrina ny alehany no fahendren'ny mahira-tsaina; Fa fitaka ny hadalan'ny adala.
  '9':
  - type: text
    content: Ny adala ihomehezan'ny fanati-panonerana
  - type: note
    content: 'Na: Ihomehezan''ny adala ny heloka'
  - type: text
    content: '; Fa ao amin''ny marina no misy fankasitrahana. '
