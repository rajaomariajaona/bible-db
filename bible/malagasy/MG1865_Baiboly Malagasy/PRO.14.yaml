document_id: PRO.14,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ny vehivavy hendry
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. fahendren'ny vehivavy
      marker-yv: yv-n
    - type: text
      text: ' dia samy manao ny tranony; Fa ny adala'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. fahadalana
      marker-yv: yv-n
    - type: text
      text: ' kosa mandrava ny tranony amin''ny tànany.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny fo no mahalala ny fangidian'ny alahelony; Ary tsy raharahan'ny olon-kafa ny hafaliany.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ravana ny tranon'ny ratsy fanahy; Fa ambinina ny lain'ny marina.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Misy lalana ataon'ny olona ho mahitsy, Kanjo lalana mivarina any amin'ny fahafatesana no iafarany.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Na dia mihomehy aza, dia ory ihany ny fo, Ary ny faran'ny hafaliana dia alahelo.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ny mihemotra am-po dia ho voky ny alehany; Fa ny tsara fanahy kosa ho voky ny azy ihany.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ny kely saina mino ny teny rehetra; Fa ny mahira-tsaina mandinika ny diany.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ny hendry matahotra ka mivily tsy ho amin'ny ratsy; Fa ny adala fatra-pirehareha
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: misafoaka'
      marker-yv: yv-n
    - type: text
      text: ' ka matokitoky foana. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Izay malaky tezitra dia manao adaladala; Ary ny olona mamoron-tsain-dratsy dia ankahalaina.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ny kely saina dia handova fahadalana; Fa ny mahira-tsaina mahazo ny fahalalana ho satro-boninahiny
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: mandray fahalalana'
      marker-yv: yv-n
    - type: text
      text: .
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ny ratsy fanahy miondrika eo anatrehan'ny tsara fanahy, Ary ny meloka dia eo am-bavahadin'ny marina.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Mandeha mahitsy izay matahotra an'i Jehovah; Fa mivily lalana kosa izay maniratsira Azy.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ny malahelo dia halan'ny havany aza; Fa ny manan-karena no tian'ny maro.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Izay manao tsinontsinona ny namany dia manota; Fa endrey ny fahasambaran''izay mamindra fo amin''ny ory! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Tsy mivily va izay manao asa
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: misaina ny'
      marker-yv: yv-n
    - type: text
      text: ' ratsy? Fa famindram-po sy fahamarinana no ho an''izay manao asa'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Na. misaina ny
      marker-yv: yv-n
    - type: text
      text: ' tsara. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ny fisasarana rehetra misy valiny avokoa; Fa ny molotra mibedibedy foana tsy mba ahazoana na inona na inona.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Satroboninahitry ny hendry ny hareny; Fa ny fahadalan'ny adala dia fahadalana ihany.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ny vavolombelona marina mamonjy ain'olona; Fa izay mamoaka lainga dia tena fitaka.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ny fahatahorana an''i Jehovah dia fiarovana mahatoky, Ary ny zanany hahazo fialofana. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ny fahatahorana an'i Jehovah no loharanon'aina, Hanalavirana ny fandriky ny fahafatesana.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ny fahabetsahan'ny vahoaka no voninahitry ny mpanjaka; Fa ny havitsiany kosa no fietreny.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Be saina izay mahatsindry fo; Fa ny malaky tezitra mampiseho ny fahadalany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Eo am-bavan'ny adala misy tsorakazon'ny fiavonavonana; Fa ny molotry ny hendry miaro ny tenany.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ny fo mionona no fiainan'ny nofo; Fa ny fahamaimaizan-tsaina dia mahalò ny taolana.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Izay mampahory ny mahantra dia manala baraka ny Mpanao azy; Fa ny mamindra fo aminy kosa dia manome voninahitra Azy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Ny ratsy fanahy azera
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: roahina'
      marker-yv: yv-n
    - type: text
      text: ' noho ny haratsiany; Fa ny marina matoky, na dia mby ao amin''ny fahafatesana aza.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Mandry tsara ao am-pon'ny manan-tsaina ny fahendrena; Fa ny an'ny adala kosa dia miharihary.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Ny fahamarinana manandratra ny firenena; Fa ny ota kosa dia fahafaham-baraka amin'ny olona
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Ny fankasitrahan'ny mpanjaka dia amin'ny mpanompo hendry; Fa ny fahatezerany kosa amin'ny manao izay mahamenatra.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Raha tsy misy omby, dia foana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. madio
      marker-yv: yv-n
    - type: text
      text: ' ny fihinanam-bilona; Fa be ny fitomboan-karena azo amin''ny herin''ny omby.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ny vavolombelona mahatoky tsy mba mety mandainga; Fa mamoaka lainga kosa ny vavolombelona tsy mahatoky.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ny mpaniratsira mba mitady fahendrena, fa tsy mahita; Fa ny manan-tsaina mora mahazo fahalalana.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Mialà eo anatrehan''ny olona adala, Fa tsy ho hitanao aminy ny molotry ny fahalalana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ny mitandrina ny alehany no fahendren'ny mahira-tsaina; Fa fitaka ny hadalan'ny adala.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ny adala ihomehezan'ny fanati-panonerana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Ihomehezan''ny adala ny heloka'
      marker-yv: yv-n
    - type: text
      text: '; Fa ao amin''ny marina no misy fankasitrahana. '
