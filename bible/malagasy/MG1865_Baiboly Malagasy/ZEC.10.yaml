document_id: ZEC.10,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Mangataha ranonorana amin''i Jehovah ianareo amin''ny andro fara-orana, Dia amin''i Jehovah, Izay manao ny helatra; Ranonorana mivatravatra no homeny azy, Eny, samy homeny ny zava-maitso any an-tsaha ireny. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia hampody azy avy any amin''ny tany Egypta Aho sy hanangona azy avy any Asyria; Ary ho any amin''ny tany- Gileada sy Libanona no hitondrako azy, Ka tsy ho omby azy izany '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia hamaky ny ranomasim-pahoriana izy ka hamely ny onjan-dranomasina, Ho ritra ny rano lalin''i Neily rehetra, Haetry ny avonavon''i Asyria, Ary hiala ny tehina fanapahan''i Egypta. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Dia hampahereziko ao amin'i Jehovah izy, Ka ny anarany no handehanany, hoy Jehovah.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fa ny sampy
    - type: usfm
      marker: x
      children:
      - type: text
        text: heb. terafima
      marker-yv: yv-n
    - type: text
      text: ' niteny zava-poana, Ary ny mpanao fankatovana nahita lainga Ka nilaza nofy lainga, Foana ny nampiononany; Koa izany no naniavany toy ny ondry Ory izy, satria tsy misy mpiandry. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Amin''ny mpiandry ondry no irehetan''ny fahatezerako, Ary ireo osilahy no hovaliako; Fa Jehovah, Tompon''ny maro, efa namangy ny taranak''i Joda ondriny Ka manao azy toy ny soavaliny miravaka eo amin''ny ady. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Avy ao aminy no hihavian''ny fehizoro, Avy ao aminy no hihavian''ny fihantonan-javatra, Avy ao aminy no hihavian''ny tsipìka fiadiana, Avy ao aminy no hihavian''ny mpampahory rehetra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary ho toy ny lehilahy mahery ireo, Izay manitsaka ny fotaka eny an-dalana amin''ny ady, Hiady izy, satria Jehovah no momba azy; Ary homenarina ny mpitaingin-tsoavaly. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Hampahery ny taranak'i Joda Aho, Ary ny taranak'i Josefa hovonjeko ka hampodiko
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'na: hamponeniko'
      marker-yv: yv-n
    - type: text
      text: ', Satria mamindra fo aminy Aho, Ka ho toy izay tsy nariako izy; Fa Izaho no Jehovah Andriamaniny ka hihaino azy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ho toy ny lehilahy mahery Efraima, Ary hifaly toy ny azon''ny divay ny fony; Ny zanany hahita ka ho faly; Hifaly amin''i Jehovah ny fony. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Hisiaka hiantso azy Aho ka hanangona azy, Fa efa nanavotra azy Aho; Ka dia mbola hihamaro toy ny efa nihamaroany ihany izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary hafafiko any amin'ny firenena izy, Ka any amin'ny tany lavitra no hahatsiarovany Ahy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'na: ary na dia hafafiko any amin''ny firenena aza izy , dia hahatsiaro Ahy any amin''ny tany lavitra'
      marker-yv: yv-n
    - type: text
      text: '; Ary samy ho velona izy mbamin''ny zanany ka hiverina '
