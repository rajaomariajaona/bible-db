document_id: REV.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny lovia fito nisy ny loza fito, izay nentin'ny anjely fito ka naidiny tamin'ny tany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary hitako fa, indro, nisy famantarana iray koa tany an-danitra, sady lehibe mahagaga, dia anjely fito izay nanana ny Ioza fito farany, Satria ireny no enti-mahatanteraka ny fahatezeran'Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary nahita aho fa, indro, toa ranomasina fitaratra miharo afo, ary izay naharesy ka afaka tamin'ny bibi-dia sy ny sariny ary ny isan'ny anarany dia nitsangana teo amoron
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tao amin'
    marker-yv: yv-n
  - type: text
    text: '''ny ranomasina fitaratra, nitana lokangan''Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary mihira ny fihiran''i Mosesy, mpanompon''Andriamanitra, sy ny fihiran''ny Zanak''ondry izy manao hoe: Lehibe sy mahatalanjona ny asanao, Tompo Ô, Andriamanitra Tsitoha; Mahitsy sy marina ny lalanao, Ry Mpanjaka mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Iza no tsy hatahotra? Ary iza no tsy hankalaza ny anaranao, Tompo ô? Fa Hianao ihany no masina, ary ny firenena rehetra ho avy hiankohoka eo anatrehanao; Fa efa naharihary ny fitsarana marina nataonao. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary rehefa afaka izany, dia nahita aho fa, indro, novohana ny tempoly, dia
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tao amin'''
    marker-yv: yv-n
  - type: text
    text: ' ny tabernakelin''ny vavolombelona'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Dia ny Didy Folo
    marker-yv: yv-n
  - type: text
    text: ' tany an-danitra; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ary ny anjely fito izay nanana ny loza fito dia nivoaka avy tao amin'ny tempoly, ary niravaka vato soa madio sy mamirapiratra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (niakanjo rongony fotsy sady madio no mangatsakatsaka)'
    marker-yv: yv-n
  - type: text
    text: ' izy sady nisikina fisikinam-bolamena teo amin''ny tratrany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny anankiray tamin''ny zava-manan''aina efatra nanome ny anjely fito lovia volamena fito, feno ny fahatezeran''Andriamanitra, Izay velona mandrakizay mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary ny tempoly dia feno setroka avy tamin'ny voninahitr'Andriamanitra sy ny heriny, ka tsy nisy nahazo niditra tao amin'ny tempoly mandra-pahatanteraky ny loza fito nentin'ny anjely fito.
