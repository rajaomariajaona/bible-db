document_id: MAT.5,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary Jesosy, nony nahita ny vahoaka, dia niakatra teo an-tendrombohitra; ary rehefa tafapetraka Izy, dia nanatona Azy ny mpianany. '
  '10':
  - type: text
    content: 'Sambatra izay enjehina noho ny fahamarinana; fa azy ny fanjakan''ny lanitra. '
  '11':
  - type: text
    content: 'Sambatra ianareo, raha haratsin''ny olona sy enjehiny ary asiany izay teny ratsy rehetra hitenenany lainga anareo noho ny amiko. '
  '12':
  - type: text
    content: 'Mifalia sy miravoravoa ianareo, fa lehibe ny valim-pitianareo any an-danitra; fa toy izany ihany no nanenjehany ny mpaminany izay talohanareo. '
  '13':
  - type: text
    content: 'Hianareo no fanasin''ny tany; fa raha ny fanasina no tonga matsatso, inona indray no hahasira azy? Tsy misy heriny hanaovana na inona na inona intsony izy, fa hariana any ivelany ka hohitsahin''ny olona. '
  '14':
  - type: text
    content: 'Hianareo no fahazavan''izao tontolo izao. Tsy azo afenina izay tanàna miorina eo an-tampon-tendrombohitra. '
  '15':
  - type: text
    content: 'Ary koa, tsy misy olona mandrehitra jiro ka mametraka azy ao ambanin''ny vata famarana, fa apetrany eo amin''ny fanaovan-jiro, ka dia mazava amin''izay rehetra ao an-trano izany. '
  '16':
  - type: text
    content: 'Aoka hazava eo imason''ny olona toy izany koa ny fahazavanareo, mba hahitany ny asa soa ataonareo ka hankalazany ny Rainareo Izay any an-danitra. '
  '17':
  - type: text
    content: 'Aza ataonareo fa tonga Aho handrava ny lalàna na ny mpaminany; tsy tonga Aho handrava, fa hanatanteraka. '
  '18':
  - type: text
    content: 'Fa lazaiko aminareo marina tokoa: Mandra-pahafoan''ny lanitra sy ny tany, dia tsy hisy ho foana akory amin''ny lalàna, na dia litera'
  - type: note
    content: Dia yod, izay litera kely indrindra amin'ny Abidy Hebreo
  - type: text
    content: ' iray na tendron-tsoratra iray aza, mandra-pahatanterak''izy rehetra. '
  '19':
  - type: text
    content: 'Ary amin''izany na zovy na zovy no mamaha ny anankiray amin''ireo didy madinika indrindra ireo ka mampianatra ny olona toy izany, dia hatao hoe kely indrindra amin''ny fanjakan''ny lanitra izy. Fa na zovy na zovy no mankatò sy mampianatra ireo dia izy no hatao hoe lehibe amin''ny fanjakan''ny lanitra. '
  '2':
  - type: text
    content: 'Dia niloa-bava Izy ka nampianatra azy hoe: '
  '20':
  - type: text
    content: 'Fa lazaiko aminareo: Raha tsy mihoatra noho ny an''ny mpanora-dalàna sy ny Fariseo ny fahamarinanareo, dia tsy hiditra amin''ny fanjakan''ny lanitra mihitsy ianareo. '
  '21':
  - type: text
    content: 'Efa renareo fa voalaza tamin''ny ntaolo hoe: Aza mamono olona (Eks. 20. 13); ary izay mamono olona dia miendrika hohelohina amin''ny fitsarana. '
  '22':
  - type: text
    content: 'Fa Izaho kosa milaza aminareo hoe: Izay rehetra tezitra'
  - type: note
    content: 'Na: tezitra foana'
  - type: text
    content: ' amin''ny rahalahiny dia miendrika hohelohina amin''ny fitsarana; ary na zovy na zovy no hanao amin''ny rahalahiny hoe: Olom-poana ianao, dia miendrika hohelohina amin''ny Synedriona; ary na zovy na zovy no hanao hoe: Foka ialahy, dia miendrika ho ao amin''ny helo'
  - type: note
    content: Gr. Gehena
  - type: text
    content: ' mirehitra afo. '
  '23':
  - type: text
    content: 'Ary amin''izany, raha mitondra ny fanatitrao ho eo amin''ny alitara ianao, ary eo no mahatsiaro fa ny rahalahinao manana alahelo aminao, '
  '24':
  - type: text
    content: 'dia avelao eo anoloan''ny alitara ny fanatitrao, ka mandehana aloha, ataovy izay hihavananao amin''ny rahalahinao, ary rehefa miverina, dia vao atero ny fanatitrao. '
  '25':
  - type: text
    content: 'Mihavàna faingana amin''ilay manana ady aminao, raha mbola miara-dia aminy ianao, fandrao ilay manana ady aminao hanolotra anao amin''ny mpitsara, ary ny mpitsara kosa hanolotra anao amin''ny mpamatotra, ka hatao ao an-tranomaizina ianao. '
  '26':
  - type: text
    content: 'Lazaiko aminao marina tokoa: Tsy ho afaka ao mihitsy ianao, ambara-pandoanao ny variraiventy farany indrindra. '
  '27':
  - type: text
    content: 'Efa, renareo fa voalaza hoe: Aza mijangajanga (Eks. 20. 14). '
  '28':
  - type: text
    content: 'Fa Izaho kosa milaza aminareo fa izay rehetra mijery vehivavy hila azy dia efa nijangajanga taminy tam-pony sahady. '
  '29':
  - type: text
    content: Fa raha ny masonao ankavanana no manafintohina
  - type: note
    content: Ny teny Grika adika hoe manafintohina amin'ny Testamenta Vaovao, dia mamandrika no tena dikany
  - type: text
    content: ' anao, dia esory hiala iny, ka ario ho afaka aminao; fa mahasoa anao na dia very aza ny iray momba ny tenanao, ka tsy ny tenanao rehetra no hariana any amin''ny helo. '
  '3':
  - type: text
    content: 'Sambatra ny malahelo am-panahy; fa azy ny fanjakan''ny lanitra. '
  '30':
  - type: text
    content: 'Ary raha ny tananao ankavanana no manafintohina anao, dia tapaho Izy, ka ario ho afaka aminao; fa mahasoa anao na dia very aza ny iray momba ny tenanao, ka tsy ny tenanao rehetra no ho lasa ho any amin''ny helo. '
  '31':
  - type: text
    content: 'Ary voalaza hoe: Na zovy na zovy no misaotra ny vadiny, dia aoka izy hanome an-dravehivavy taratasy fisaoram-bady (Deo. 24. 1). '
  '32':
  - type: text
    content: 'Fa Izaho kosa milaza aminareo hoe: Izay rehetra misaotra ny vadiny afa-tsy noho ny fijangajangana ihany dia mampijangajanga azy; ary na zovy na zovy no manambady izay voasaotra, dia mijangajanga. '
  '33':
  - type: text
    content: 'Ary koa, efa renareo fa voalaza tamin''ny ntaolo hoe: Aza mianian-tsy tò, fa efao amin''i Jehovah ny fianiananao (Lev. 19. 12). '
  '34':
  - type: text
    content: 'Fa Izaho kosa milaza aminareo hoe: Aza mianiana akory na amin''ny lanitra, fa seza fiandrianan''Andriamanitra izany; '
  '35':
  - type: text
    content: 'na amin''ny tany, fa fitoeran-tongony izany; na amin''i Jerosalema, fa tanànan''ny Mpanjaka lehibe izany. '
  '36':
  - type: text
    content: 'Aza mianiana amin''ny lohanao; fa tsy mahay mahafotsy na mahamainty na dia singam-bolo iray akory aza ianao. '
  '37':
  - type: text
    content: Fa aoka ny teninareo ho Eny, eny; Tsia, tsia; fa izay mihoatra noho izany dia avy amin'ny ratsy
  - type: note
    content: Na amin'ilay ratsy
  - type: text
    content: '. '
  '38':
  - type: text
    content: 'Efa renareo fa voalaza hoe: Maso solon''ny maso, ary nify solon''ny nify (Eks. 21. 24). '
  '39':
  - type: text
    content: 'Fa Izaho kosa milaza aminareo hoe: Aza manohitra izay manisy ratsy anareo; fa na zovy na zovy no mamely tahamaina ny takolakao ankavanana, atolory azy koa ny anankiray. '
  '4':
  - type: text
    content: 'Sambatra ny ory; fa izy no hampifalina. '
  '40':
  - type: text
    content: 'Ary izay te hiady aminao ka tahaka ny akanjonao, dia avelao ho azy koa ny lambanao. '
  '41':
  - type: text
    content: Ary na zovy na zovy no hanery anao handeha maily
  - type: note
    content: 'Na: kilometatra'
  - type: text
    content: ' iray, mandehana miaraka aminy maily roa. '
  '42':
  - type: text
    content: 'Omeo izay mangataka aminao; ary aza ilaoza-mihodina izay te hisambotra aminao. '
  '43':
  - type: text
    content: 'Efa renareo fa voalaza hoe: Tiava ny namanao (Lev. 19. 18), ary mankahalà ny fahavalonao. '
  '44':
  - type: text
    content: 'Fa Izaho kosa milaza aminareo hoe: Tiava ny fahavalonareo, ary mivavaha ho an''izay manenjika anareo, '
  '45':
  - type: text
    content: 'mba ho tonga zanaky ny Rainareo Izay any an-danitra ianareo; fa Izy mampiposaka ny masoandrony amin''ny ratsy fanahy sy ny tsara fanahy ary mampilatsaka ny ranonorana amin''ny marina sy ny tsy marina. '
  '46':
  - type: text
    content: 'Fa raha izay tia anareo ihany no tianareo, inona no valim-pitia azonareo? Moa na dia ny mpamory hetra aza tsy mba manao izany koa va? '
  '47':
  - type: text
    content: 'Ary raha ny rahalahinareo ihany no arahabainareo, inona no ataonareo mihoatra noho ny sasany? Moa na dia ny jentilisa aza tsy mba manao toy izany ihany va? '
  '48':
  - type: text
    content: Koa amin izany aoka ho tanteraka ianareo toy ny fahatanterahan'ny Rainareo Izay any an-danitra.
  '5':
  - type: text
    content: 'Sambatra ny malemy fanahy; fa izy no handova ny tany (Sal. 37. 11). '
  '6':
  - type: text
    content: 'Sambatra ny noana sy mangetaheta ny fahamarinana; fa izy no hovokisana. '
  '7':
  - type: text
    content: 'Sambatra ny miantra; fa izy no hiantrana. '
  '8':
  - type: text
    content: 'Sambatra ny madio am-po; fa izy no hahita an''Andriamanitra, '
  '9':
  - type: text
    content: 'Sambatra ny mpampihavana; fa izy no hatao hoe zanak''Andriamanitra. '
