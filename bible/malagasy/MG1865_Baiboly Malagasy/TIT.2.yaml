document_id: TIT.2,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny mety hataon'ny anti-panahy sy ny tanora fanahy sy ny mpanompon'olona, ary fananarana sy hafatra samy hafa
  - type: text
    content: Fa ianao kosa dia milazà izay miendrika ny fampianarana tsy misy kilema
  - type: note
    content: Gr. salama
  - type: text
    content: '; '
  '10':
  - type: text
    content: 'tsy hangala-tetỳ, fa haneho izay toe-panahy mahatoky indrindra, mba hampahamendrika ny fampianaran''Andriamanitra, Mpamonjy antsika, amin''ny zavatra rehetra. '
  '11':
  - type: text
    content: 'Fa efa miseho ny fahasoavan''Andriamanitra, izay famonjena ny olona rehetra, '
  '12':
  - type: text
    content: 'mampianatra antsika handà izay toe-panahy tsy araka an''Andriamanitra sy ny filan''izao tontolo izao ary ho velona amin''ny onony sy ny marina ary ny toe-panahy araka an''Andriamanitra amin''izao fiainana ankehitriny izao, '
  '13':
  - type: text
    content: miandry ny fanantenana mahafinaritra sy ny fisehoan'ny voninahitr'Andriamanitra lehibe sady Mpamonjy antsika, dia Jesosy Kristy
  - type: note
    content: 'Na: Andriamanitra lehibe sy Jesosy Kristy, Mpamonjy antsika'
  - type: text
    content: ', '
  '14':
  - type: text
    content: 'Izay nanolotra ny tenany hamonjy antsika, mba hanavotany antsika ho afaka amin''ny ota rehetra, sy hanadiovany izay olona ho an''ny tenany, sady ho mazoto indrindra amin''ny asa tsara izany. '
  '15':
  - type: text
    content: Izany no lazao sy ananaro ary andrarao amin'ny fahefana rehetra. Aza avela hisy hanao tsinontsinona anao.
  '2':
  - type: text
    content: ny lehilahy anti-panahy anaro hahonon-tena, ho maotona, ho hendry, hatanjaka
  - type: note
    content: Gr. salama
  - type: text
    content: ' amin''ny finoana, amin''ny fitiavana, amin''ny faharetana. '
  '3':
  - type: text
    content: 'Ny vehivavy anti-panahy koa anaro hitondra tena toy izay miendrika ny olona masina, tsy ho mpanendrikendrika, tsy ho andevozin''ny divay be, ho mpampianatra ny zavatra tsara, '
  '4':
  - type: text
    content: 'mba hampianarany ny vehivavy tanora fanahy ho tia ny vadiny, ho tia ny zanany, '
  '5':
  - type: text
    content: hahonon-tena, ho madio toe-panahy, hiasa ao an-tranony, ho tsara fanahy, hanaiky ny vadiny, mba tsy hitenenana ratsy
  - type: note
    content: Gr. hanaovana blasfemia; izahao Mat. 9,3
  - type: text
    content: ' ny tenin''Andriamanitra. '
  '6':
  - type: text
    content: 'Ny lehilahy tanora fanahy koa anaro hahonon-tena; '
  '7':
  - type: text
    content: 'ka amin''ny zavatra rehetra dia asehoy ny tenanao ho fianarana ny asa tsara, amin''ny fampianaranao maneho ny tsi-faharatsiana, ny fahamaotinana, '
  '8':
  - type: text
    content: ny teny tsy misy kilema
  - type: note
    content: Gr. salama
  - type: text
    content: ', izay tsy azo tsinina, mba ho menatra izay manohitra; satria tsy hisy ratsy hitenenany anareo. '
  '9':
  - type: text
    content: 'Ny mpanompo koa dia anaro hanaiky ny tompony ka hanao izay sitrapony amin''ny zavatra rehetra, fa tsy hamalivaly, '
