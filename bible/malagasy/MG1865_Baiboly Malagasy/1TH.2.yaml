document_id: 1TH.2,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Fa ny tenanareo, ry rahalahy, dia mahalala fa tsy foana ny fidiranay tatỳ aminareo; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Hianareo no vavolombelona ary Andriamanitra koa fa masina sy marina ary tsy nanan-tsiny tokoa ny fitondran-tenanay teo imasonareo izay mino, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'toy ny fantatrareo fa tahaka ny ray amin''ny zanaka no namporisihanay sy nampiononanay anareo isam-batana sy nananaranay mafy anareo, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'mba handehananareo miendrika an''Andriamanitra, Izay miantso anareo ho amin''ny fanjakany sy ny voninahiny. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary noho izany izahay koa dia tsy mitsahatra misaotra an''Andriamanitra, satria rehefa nandray ny tenin''Andriamanitra izay notorinay ianareo, dia tsy noraisinareo ho tenin''olona, fa araka izay marina, dia ny tenin''Andriamanitra, izay miasa anatinareo izay mino koa. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa ianareo, ry rahalahy, dia efa tahaka ny fiangonan''Andriamanitra any Jodia izay amin''i Kristy Jesosy; fa ny nanjo anareo noho ny nataon''ny iray firenena aminareo dia sahafa amin''ny nanjo ireo koa noho ny nataon''ny Jiosy taminy, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'izay namono an''i Jesosy Tompo sy ny mpaminany koa ary nandroaka anay sady tsy manao ny sitrapon''Andriamanitra ary manohitra ny olona rehetra, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ka mandrara anay tsy hitory amin''ny jentilisa mba tsy hamonjena ireny, mba hameno ny fahotan''ny tenany mandrakariva; kanjo efa niharan''ny fahatezerana hatramin''ny farany izy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary izahay, ry rahalahy, rehefa tafasaraka taminareo vetivety foana tamin''ny fanatrehana, fa tsy tamin''ny fo, dia vao mainka nitady sy naniry fatratra hahita ny tavanareo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Koa naniry hankany aminareo indray mandeha amana indroa izahay, dia izaho Paoly; nefa nosakanan''i Satana izahay. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa inona moa no fanantenanay, na fifalianay, na satro-boninahitra reharehanay? Moa tsy ianareo eo anatrehan''i Jesosy Tompontsika amin''ny fihaviany va? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'fa rehefa nampahorina sy nisetrasetrana tany Filipy izahay teo aloha, tahaka ny fantatrareo ihany, dia sahy tao amin''Andriamanitray izahay hiteny taminareo ny filazantsaran''Andriamanitra, na dia be aza ny fanoherana. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Fa ianareo no voninahitray sy fifalianay.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa ny fananaranay dia tsy avy amin''ny fitaka, na ny fahalotoana, na ny soloky. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Fa tahaka ny nankasitrahan''Andriamanitra anay, ka notolorana ny filazantsara ho adidinay izahay, dia araka izany koa no itenenanay, tsy toy ny mila sitraka amin''olona, fa amin''Andriamanitra, Izay mizaha toetra ny fonay. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Fa tsy nanao teny mandrobo akory izahay na oviana na oviana, tahaka ny fantatrareo ihany, na nihatsaravelatsihy hanafina fieremana (Andriamanitra no vavolombelona); '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'ary tsy nitady voninahitra tamin''olona izahay, na taminareo, na tamin''ny sasany, na dia nanam-pahefana hahavaky tratra aza izahay, araka izay mah''Apostolin''i Kristy anay,. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa nalemy fanahy teo aminareo izahay, tahaka ny reny mitaiza ny zanany naterany, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'dia toy izany no nahazoto anay, noho ny fitiavanay anareo indrindra; hanome anareo, tsy ny filazantsaran''Andriamanitra ihany, fa ny ainay koa aza, satria efa malalanay ianareo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa tsaroanareo, ry rahalahy, ny fikelezanay aina sy ny fisasaranay; fa niasa andro aman''alina, mba tsy hahavaky tratra na dia olona iray akory taminareo aza, no nitorianay ny filazantsaran''Andriamanitra taminareo. '
