document_id: 2SA.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandresen'i Davida ny Filistina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia tonga tao amin''i Davida tao Hebrona ny firenen''Isiraely rehetra ka nanao hoe: Indreto izahay, fa taolanao sy nofonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa hatry ny fony fahiny ihany koa, raha mbola nanjaka taminay aza Saoly, dia ianao no mpitarika ny Isiraely nivoaka sy niditra; ary Jehovah efa nilaza taminao hoe: Hianao no ho mpiandry ny Isiraely oloko, ary ianao no ho mpanapaka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Eny, tonga tao amin''ny mpanjaka tao Hebrona ny loholon''ny Isiraely rehetra, ary Davida mpanjaka nanao fanekena taminy tao Hebrona teo anatrehan''i Jehovah; ary dia nanosotra an''i Davida ho mpanjakan''ny Isiraely izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Telo-polo taona Davida fony izy vao nanjaka, ary nanjaka efa-polo taona izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tao Hebrona no nanjakany tamin'ny Joda fito taona sy enim-bolana; ary tany Jerosalema no nanjakany tamin'ny Isiraely sy ny Joda rehetra telo amby telo-polo taona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny mpanjaka sy ny olony nankany Jerosalema hiady amin''ny Jebosita tompon-tany, ary hoy izy ireo tamin''i Davida: Tsy ho tafiditra eto ianao; fa na dia ny jamba ny mandringa aza dia hahasakana anao ka hanao hoe'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ary ny heviny tamin''izany dia toy ny manao hoe:'
    marker-yv: yv-n
  - type: text
    text: ': Tsy ho tafiditra eto Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Kanjo afak''i Davida ihany ny batery fiarovana, dia Ziona (Tanànan''i Davida izany). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy Davida tamin''izany andro izany: Izay mamely ny Jebosita, dia aoka hananika ho eo amin''ny riana ka hamely, ny mandringa sy ny jamba izay halan''ny fon''i Davida. Koa dia mby am-pitenenana hoe: Izay jamba mandringa tsy ho tafiditra ao an-trano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia nitoetra tao anatin''ny batery fiarovana Davida, ary ny anarany nataony hoe: Tanànan''i Davida. Ary narafitr''i Davida ny manodidina hatrany Milo'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. fiarovana
    marker-yv: yv-n
  - type: text
    text: ' mbamin''ny ao anatiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Koa dia nandroso sy nihalehibe Davida, fa Jehovah, Andriamanitry ny maro, no nomba azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Hirama, mpanjakan''i Tyro, naniraka olona tany amin''i Davida nampanatitra hazo sedera ary nandefa mpandrafitra sy tambato; dia nanao trano ho an''i Davida ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia fantatr''i Davida fa Jehovah efa nampitoetra azy ho mpanjakan''ny Isiraely ka nanandratra ny fanjakany noho ny amin''ny Isiraely olony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary Davida mbola naka vaditsindrano sy vady koa tany Jerosalema, rehefa tonga avy tany Hebrona izy; ary dia nisy zanakalahy sy zanakavavy koa naterak''i Davida. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary izao no anaran''ny naterany tany Jerosalema: Samoa sy Sobaba sy Natana sy Solomona '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'sy Jibara sy Elisoa sy Nafega sy Jafia '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: sy Elisama sy Eliada ary Elifeleta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa nony ren''ny Filistina fa efa nohosoran''ny olona ho mpanjakan''ny Isiraely Davida, dia niakatra hitady azy ny Filistina rehetra; fa raha ren''i Davida izany dia nidina tao amin''ny batery fiarovana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary dia tonga ny Filistina ka nihahakahaka teny amin''ny Lohasahan''ny Refaita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary Davida nanontany tamin''i Jehovah hoe: Hiakatra hamely ny Filistina va aho? Hatolotrao eo an-tanako va izy? Dia hoy Jehovah tamin''i Davida: Miakara, fa hatolotro eo an-tananao tokoa ny Filistina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary Davida tonga tao Bala-perazima
  - type: usfm
    marker: x
    children:
    - type: text
      text: Bala-perazima = Tany nahavakiana
    marker-yv: yv-n
  - type: text
    text: ' ka namely ireo tao, dia hoy izy: Jehovah efa namaky ny fahavaloko teo anoloako hipariaka toy ny rano vaky; koa izany no nanaovany ny anaran''izany tany izany hoe Bala-perazima. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nilaozany tao ny sampiny, ka dia lasan''i Davida sy ny olony ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary niakatra indray ny Filistina ka nihahakahaka teny amin''ny Lohasahan''ny Refaita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nanontany tamin''i Jehovah Davida, ka novaliany hoe: Aza mandeha; fa hodidino avy eo aoriana izy, ka ho tonga eo aminy ianao eo amin''ny tandrifin''ny hazo balsama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary raha toa mahare fingadongadon''olona eny amin''ny tendron''ny hazo balsama ianao, dia faingàna; fa amin''izay no efa miainga mialoha anao Jehovah hamely ny miaramilan''ny Filistina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary dia nanao araka ny nandidian'i Jehovah azy Davida ka dia namely ny Filistina hatrany Geba ka hatrao akaikin'i Gazera izy.
