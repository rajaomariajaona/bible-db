document_id: JOB.33,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa, masìna ianao, ry Joba; mihainoa ny alahatro, ary mandrenesa ny teniko rehetra.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He! mitady izay handrafiany ahy Andriamanitra, ary ataony fahavalony aho;
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mampiditra ny tongotro eo amin'ny boloky hazo Izy ary mitsikilo ny diako rehetra.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He! izany no tsy mahamarina anao, hoy izaho; Fa Andriamanitra dia lehibe loatra ka tsy leon'ny zanak'olombelona.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa nahoana no manome tsiny Azy ianao noho ny tsy nampisehoany izay antony amin'ny ataony
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Noho ny tsy amaliany ny tenin''olombelona?'
      marker-yv: yv-n
    - type: text
      text: '?'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Kanefa misy fanao iray itenenan'Andriamanitra, eny, fanao roa aza, nefa tsy tandreman'ny olona izany,
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia ny nofy sy ny tsindrimandry amin'ny alina, raha sondrian-tory ny olona ka renoka eo am-pandriana,
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia manokatra ny sofin'ny olona Izy ka manisy tombo-kase ny fananarany azy,
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mba hampiala ny olona amin'ny fanaony, sy hampifady azy ny fireharehana.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Miaro ny fanahiny tsy ho any an-davaka Izy, ary ny ainy mba tsy ho voan'ny fiadiana.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Anarina amin'ny fanaintainana eo ampandriany koa izy sy amin'ny fikotrankotran'ny taolany lalandava;
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indro, fa efa niloa-bava aho, Miteny ato am-bavako ny lelako.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny ainy marikorikon-kanina, eny, na dia ny hanim-py aza tsy tian'ny fanahiny.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mihena ny nofony ka tsy hita, ary mitranitrany ny taolany izay tsy hita teo;
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia manakaiky ny lavaka ny fanahiny, ary ny ainy manatona ny mpaka aina.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha misy Anjely ho Mpanalalana ho azy, iray amin'ny arivo, hanoro izay tokony halehan'ny olona,
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Dia'
      marker-yv: yv-n
    - type: text
      text: ' hamindra fo aminy ka nanao hoe: Vonjeo izy mba tsy hidina any an-davaka, fa efa nahita avotra Aho,'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia ho tsara noho ny an'ny tanora ny nofony, hody ho toy ny tamin'ny andro nahatanorany izy;
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hivavaka amin'Andriamanitra izy ka hankasitrahany ary hahita ny havany amin'ny hafaliana, fa hampodiny amin'ny zanak'olombelona ny fahamarinany
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: hamaly ny olona araka ny fahamarinany Izy'
      marker-yv: yv-n
    - type: text
      text: .
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hihira izy hilaza amin''ny olona hoe: Efa nanota aho, fa nanao ny rariny ho heloka, kanefa tsy novaliana araka ny nataoko;'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa navotany ny fanahiko mba tsy hivarina any an-davaka, ary mifaly ny aiko amin'ny fahitana ny mazava.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indro, izany rehetra izany no ataon'Andriamanitra indroa amin'ny olona, eny, intelo aza,
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny hitsim-poko no hiseho amin'ny teniko; Ary ny fahalalan'ny molotro no holazaina tsy hasiana fitaka.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mba hamerina ny fanahiny tsy ho
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: hiala'
      marker-yv: yv-n
    - type: text
      text: ' any an-davaka, mba hihazavany amin''ny fahazavan''aina.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tandremo, ry Joba, ka mihainoa ahy; Mangina kely aloha ianao, fa izaho mbola hiteny.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha manan-kavaly ianao, dia mamalia ahy ihany; Mitenena, fa ta-hanamarina anao aho;
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha tsy manan-kavaly ianao, dia mihainoa ahy kosa; Mangina tsara, fa hampianariko fahendrena ianao.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny Fanahin'Andriamanitra no efa nanao ahy, ary ny fofonain'ny Tsitoha no mamelona ahy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha hainao, valio ary aho, miomàna ianao, ka miatreha tsara.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, izaho koa mba an''Andriamanitra: tahaka anao ihany; Eny, izaho koa mba nosombinana avy tamin''ny tanimanga.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Indro, ny fampahatahorako tsy dia hampahatahotra anao, ary ny vesatra avy amiko tsy dia hitambesatra aminao.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nilaza teo anatrehako mihitsy ianao, ary efa reko ihany ny feon''ny teninao hoe:'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Madio tsy manam-pahadisoana aho, ary tsy manan-tsiny aman-keloka;
