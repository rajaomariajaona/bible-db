document_id: JOB.33,96
type_code: plt
verses:
  '1':
  - type: text
    content: Kanefa, masìna ianao, ry Joba; mihainoa ny alahatro, ary mandrenesa ny teniko rehetra.
  '10':
  - type: text
    content: He! mitady izay handrafiany ahy Andriamanitra, ary ataony fahavalony aho;
  '11':
  - type: text
    content: Mampiditra ny tongotro eo amin'ny boloky hazo Izy ary mitsikilo ny diako rehetra.
  '12':
  - type: text
    content: He! izany no tsy mahamarina anao, hoy izaho; Fa Andriamanitra dia lehibe loatra ka tsy leon'ny zanak'olombelona.
  '13':
  - type: text
    content: Koa nahoana no manome tsiny Azy ianao noho ny tsy nampisehoany izay antony amin'ny ataony
  - type: note
    content: 'Na: Noho ny tsy amaliany ny tenin''olombelona?'
  - type: text
    content: '?'
  '14':
  - type: text
    content: Kanefa misy fanao iray itenenan'Andriamanitra, eny, fanao roa aza, nefa tsy tandreman'ny olona izany,
  '15':
  - type: text
    content: Dia ny nofy sy ny tsindrimandry amin'ny alina, raha sondrian-tory ny olona ka renoka eo am-pandriana,
  '16':
  - type: text
    content: Dia manokatra ny sofin'ny olona Izy ka manisy tombo-kase ny fananarany azy,
  '17':
  - type: text
    content: Mba hampiala ny olona amin'ny fanaony, sy hampifady azy ny fireharehana.
  '18':
  - type: text
    content: Miaro ny fanahiny tsy ho any an-davaka Izy, ary ny ainy mba tsy ho voan'ny fiadiana.
  '19':
  - type: text
    content: Anarina amin'ny fanaintainana eo ampandriany koa izy sy amin'ny fikotrankotran'ny taolany lalandava;
  '2':
  - type: text
    content: Indro, fa efa niloa-bava aho, Miteny ato am-bavako ny lelako.
  '20':
  - type: text
    content: Ary ny ainy marikorikon-kanina, eny, na dia ny hanim-py aza tsy tian'ny fanahiny.
  '21':
  - type: text
    content: Mihena ny nofony ka tsy hita, ary mitranitrany ny taolany izay tsy hita teo;
  '22':
  - type: text
    content: Dia manakaiky ny lavaka ny fanahiny, ary ny ainy manatona ny mpaka aina.
  '23':
  - type: text
    content: Raha misy Anjely ho Mpanalalana ho azy, iray amin'ny arivo, hanoro izay tokony halehan'ny olona,
  '24':
  - type: text
    content: Ary
  - type: note
    content: 'Na: Dia'
  - type: text
    content: ' hamindra fo aminy ka nanao hoe: Vonjeo izy mba tsy hidina any an-davaka, fa efa nahita avotra Aho,'
  '25':
  - type: text
    content: Dia ho tsara noho ny an'ny tanora ny nofony, hody ho toy ny tamin'ny andro nahatanorany izy;
  '26':
  - type: text
    content: Hivavaka amin'Andriamanitra izy ka hankasitrahany ary hahita ny havany amin'ny hafaliana, fa hampodiny amin'ny zanak'olombelona ny fahamarinany
  - type: note
    content: 'Na: hamaly ny olona araka ny fahamarinany Izy'
  - type: text
    content: .
  '27':
  - type: text
    content: 'Dia hihira izy hilaza amin''ny olona hoe: Efa nanota aho, fa nanao ny rariny ho heloka, kanefa tsy novaliana araka ny nataoko;'
  '28':
  - type: text
    content: Fa navotany ny fanahiko mba tsy hivarina any an-davaka, ary mifaly ny aiko amin'ny fahitana ny mazava.
  '29':
  - type: text
    content: Indro, izany rehetra izany no ataon'Andriamanitra indroa amin'ny olona, eny, intelo aza,
  '3':
  - type: text
    content: Ny hitsim-poko no hiseho amin'ny teniko; Ary ny fahalalan'ny molotro no holazaina tsy hasiana fitaka.
  '30':
  - type: text
    content: Mba hamerina ny fanahiny tsy ho
  - type: note
    content: 'Na: hiala'
  - type: text
    content: ' any an-davaka, mba hihazavany amin''ny fahazavan''aina.'
  '31':
  - type: text
    content: Tandremo, ry Joba, ka mihainoa ahy; Mangina kely aloha ianao, fa izaho mbola hiteny.
  '32':
  - type: text
    content: Raha manan-kavaly ianao, dia mamalia ahy ihany; Mitenena, fa ta-hanamarina anao aho;
  '33':
  - type: text
    content: Fa raha tsy manan-kavaly ianao, dia mihainoa ahy kosa; Mangina tsara, fa hampianariko fahendrena ianao.
  '4':
  - type: text
    content: Ny Fanahin'Andriamanitra no efa nanao ahy, ary ny fofonain'ny Tsitoha no mamelona ahy.
  '5':
  - type: text
    content: Raha hainao, valio ary aho, miomàna ianao, ka miatreha tsara.
  '6':
  - type: text
    content: 'Indro, izaho koa mba an''Andriamanitra: tahaka anao ihany; Eny, izaho koa mba nosombinana avy tamin''ny tanimanga.'
  '7':
  - type: text
    content: Indro, ny fampahatahorako tsy dia hampahatahotra anao, ary ny vesatra avy amiko tsy dia hitambesatra aminao.
  '8':
  - type: text
    content: 'Efa nilaza teo anatrehako mihitsy ianao, ary efa reko ihany ny feon''ny teninao hoe:'
  '9':
  - type: text
    content: Madio tsy manam-pahadisoana aho, ary tsy manan-tsiny aman-keloka;
