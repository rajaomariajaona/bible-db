document_id: PSA.2,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny mpikomy amin'Andriamanitra sy ny Mesiany
  - type: text
    content: 'Nahoana no mitabataba ny jentilisa, ary misaina anoano foana ny firenena? '
  '10':
  - type: text
    content: 'Ary amin''izany dia hendre ianareo, ry mpanjaka; minoa anatra ianareo, ry mpitsaran''ny tany. '
  '11':
  - type: text
    content: 'Manompoa an''i Jehovah amin''ny fahatahorana, ary mifalia amin''ny fangovitana. '
  '12':
  - type: text
    content: Manoroha ny zanaka, fandrao ho tezitra izy, ka ho very eny an-dalana ianareo; fa vetivety dia hirehitra ny fahatezerany. Sambatra izay rehetra mialoka aminy.
  '2':
  - type: text
    content: 'Ireo mpanjakan''ny tany mitsangana, Ary ny mpanapaka miara-mioko hanohitra an''i Jehovah sy ny Mesiany ka manao hoe: '
  '3':
  - type: text
    content: '"Aoka hotosantsika ny famatorany, ka hariantsika hiala amintsika ny famehezany."'
  '4':
  - type: text
    content: 'Izay mipetraka any an-danitra mihomehy, ny Tompo maneso ireo. '
  '5':
  - type: text
    content: 'Dia hiteny azy amin''ny fahavinirany Izy ka hampangorohoro azy amin''ny fahatezerany hoe: '
  '6':
  - type: text
    content: '"Izaho kosa efa nanendry ny Mpanjakako Tambonin''i Ziona, tendrombohitro masina."'
  '7':
  - type: text
    content: '"Hilaza zava-boatendry Aho; Jehovah nilaza tamiko hoe: Zanako Hianao, Izaho niteraka anao androany. '
  '8':
  - type: text
    content: 'Mangataha amiko, dia homeko ho lovanao ny jentilisa ary ny faran''ny tany ho fanananao. '
  '9':
  - type: text
    content: 'Hotorotoroinao amin''ny tehim-by izy: toy ny famaky vilany tany no hanamontsamontsananao azy."'
