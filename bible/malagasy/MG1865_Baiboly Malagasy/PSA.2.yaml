document_id: PSA.2,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny mpikomy amin'Andriamanitra sy ny Mesiany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nahoana no mitabataba ny jentilisa, ary misaina anoano foana ny firenena? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary amin''izany dia hendre ianareo, ry mpanjaka; minoa anatra ianareo, ry mpitsaran''ny tany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Manompoa an''i Jehovah amin''ny fahatahorana, ary mifalia amin''ny fangovitana. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Manoroha ny zanaka, fandrao ho tezitra izy, ka ho very eny an-dalana ianareo; fa vetivety dia hirehitra ny fahatezerany. Sambatra izay rehetra mialoka aminy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ireo mpanjakan''ny tany mitsangana, Ary ny mpanapaka miara-mioko hanohitra an''i Jehovah sy ny Mesiany ka manao hoe: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '"Aoka hotosantsika ny famatorany, ka hariantsika hiala amintsika ny famehezany."'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Izay mipetraka any an-danitra mihomehy, ny Tompo maneso ireo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia hiteny azy amin''ny fahavinirany Izy ka hampangorohoro azy amin''ny fahatezerany hoe: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '"Izaho kosa efa nanendry ny Mpanjakako Tambonin''i Ziona, tendrombohitro masina."'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '"Hilaza zava-boatendry Aho; Jehovah nilaza tamiko hoe: Zanako Hianao, Izaho niteraka anao androany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mangataha amiko, dia homeko ho lovanao ny jentilisa ary ny faran''ny tany ho fanananao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Hotorotoroinao amin''ny tehim-by izy: toy ny famaky vilany tany no hanamontsamontsananao azy."'
