document_id: EZK.40
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahitana naseho tamin'i Ezekiela ny amin'ny tempoly vaovao
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin''ny taona fahadimy amby roa-polo taorian''ny namaboana antsika, tamin''ny niandohan''ny taona, dia tamin''ny andro fahafolo tamin''ny volana, tamin''ny taona fahefatra ambin''ny folo taorian''ny namelezana ny tanàna, tamin''izany andro izany dia tamiko ny tànan''i Jehovah, ka nitondra ahy ho any Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fahitana avy amin''Andriamanitra no nitondrany ahy ho any amin''ny tanin''ny Isiraely, ka napetrany teo an-tendrombohitra avo dia avo aho, ary nisy nitarehin-tanàna teo amin''ny ilany atsimo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nentiny nankao aho, ka, indro, nisy lehilahy izay nitarehim-barahina, nitondra tady rongony teny an-tànany sy volotara fandrefesana, ary nitsangana teo am-bavahady izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy ralehilahy tamiko: Ry zanak''olona, mijere amin''ny masonao, ary mihainoa amin''ny sofinao, ary aoka ny fonao handinika izay rehetra hasehoko anao; fa ny hanehoako anao izao no nitondrana anao eto. Ambarao amin''ny taranak''Isiraely izay rehetra hitanao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary, indro, nisy ampiantany vato manodidina teny ivelan'ny trano, ary eny an-tanan-dralehilahy nisy volotara fandrefesana, enina hakiho ny halavany, kanefa isaky ny hakiho iray dia nihoatra vodivoam-pelatanana noho ny fanao; ka dia norefesiny ny hatevin'ny ampiantany, ka eran'ny volotara. ary ny hahavony dia eran'ny volotara koa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia tonga teo amin'ny vavahady manatrita ny atsinanana izy ka niakatra tamin'ny ambaratongany dia nandrefy ny tokonam-bavahady, ka eran'ny volotara ny sakany, dia ny tokonana voalohany izany, ka eran'ny volotara ny sakany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ary eran''ny volotara ny sakan''ny tokonana iray koa'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny trano fiambenana, dia eran''ny volotara ny lavany, ary eran''ny volotara koa ny sakany; ary ny elanelan''ny trano fiambenana dia dimy hakiho; ary ny tokonam-bavahady eo anilan''ny lavarangan''ny vavahady anatiny dia eran''ny volotara. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia norefesiny koa ny lavarangan''ny vavahady, ka eran''ny volotara koa. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary norefesiny ny lavarangan''ny vavahady, ka valo hakiho; ary ny tongo-batony dia roa hakiho; ary ny lavarangan''ny vavahady dia teo anatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny trano fiambenana teo amin''ny vavahady atsinanana dia telo avy no teo an-daniny; mitovy ohatra izy telo, ary mitovy ohatra koa ny tongo-bato teo amin''ny lafiny roa. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary norefesiny koa ny haben''ny vavahady, ka folo hakiho; ary ny lavan''ny vavahady dia telo ambin''ny folo hakiho. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary nisy nifefy teo anoloan''ny trano fiambenana, ka iray hakiho avy no teo an-daniny roa; ary ny trano fiambenana, dia enina hakiho ny tamin''ny lafiny iray, ary enina hakiho koa ny tamin''ny lafiny iray. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia norefesiny koa ny vavahady hatramin''ny tafon''ny trano fiambenana iray ka hatramin''ny tafon''ny iray koa, ka dimy amby roa-polo hakiho ny sakany, ary mifanatrika ny varavarana. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny tongo-bato dia noheveriny ho enim-polo hakiho, ary nihatra tamin''ny tongo-bato ny kianja manodidina ny vavahady. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hatreo anoloan''ny vavahady fidirana ka hatreo anoloan''ny lavarangan''ny vavahady anatiny dia dimam-polo hakiho. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary nisy varavarankely makarakara tsy mivoha manodidina, na ao amin'ny trano fiambenana, na amin'ny tongo-bato ao anatin'ny vavahady
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: sady manodidina azy ny vavahady'
    marker-yv: yv-n
  - type: text
    text: ; ary toy izany koa amin'ny tohany; ary ny ao anatiny dia nisy varavarankely manodidina; ary teo amin'ny tongo-bato rehetra dia samy nisy sarin'ny hazo rofia
  - type: usfm
    marker: x
    children:
    - type: text
      text: palma
    marker-yv: yv-n
  - type: text
    text: ' avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nentiny ho any amin''ny kianja ivelany aho, ary, indro, nisy efi-trano madinika sy lampivato teny amin''ny kianja manodidina: nisy efi-trano telo-polo teny amin''ny lampivato. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny lampivato dia teo anilan''ny vavahady, sady nifanerana tamin''ny lavan''ny vavahady: lampivato ambany io. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia norefesiny koa ny sakany hatreo anoloan''ny vavahady ambany ka hatreo anoloan''ny kianja anatiny, dia hatreo amin''ny ivelany, ka zato hakiho, dia teo atsinanana sy teo avaratra. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'An norefesiny koa ny lavany sy ny sakan''ny vavahadin''ny kianja ivelany, izay nanatrika ny avaratra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny trano fiambenany dia telo avy no teo an-daniny; ary ny tongo-batony sy ny tohany dia nitovy ohatra tamin''ny vavahady voalohany, ka dimam-polo hakiho ny lavany, ary dimy amby roa-polo hakiho ny sakany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary ny varavarankeliny sy ny tohany an ny sarin'ny hazo rofia
  - type: usfm
    marker: x
    children:
    - type: text
      text: palma
    marker-yv: yv-n
  - type: text
    text: ' taminy dia nitovy ohatra tamin''ny ireo amin''ny vavahady atsinanana, ary nisy ambaratonga fito ho fiakarana ao; ary ny tohany dia tandrifin''ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary nisy vavahadin'ny kianja anatiny, tandrifin'ny vavahady fidirana manatrika ny avaratra sy ny atsinanana; ka dia norefesiny hatramin'ny vavahady anankiray ka hatramin'ny anankiray, ka zato hakiho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nentiny nianatsimo aho, ka, indro, nisy vavahady teo atsimo; ka norefesiny ny tongo-batony sy ny tohany, ka araka ireo ohatra ireo ihany koa. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary nisy varavarankely teo aminy sy teo amin''ny tohany manodidina, dia tahaka ireo varavarankely ireo ihany koa, ka dimam-polo hakiho ny lavany, ary dimy amby roa-polo hakiho ny sakany. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary nisy ambaratonga fito ho fiakarana ao, ary ny tohany dia tandrifin'ireo; ary nisy sarin'ny hazo rofia
  - type: usfm
    marker: x
    children:
    - type: text
      text: palma
    marker-yv: yv-n
  - type: text
    text: ' iray tamin''ny lafiny iray, ary iray koa tamin''ny lafiny iray teo amin''ny tongo-batony. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary nisy vavahady fidirana amin''ny kianja anatiny teo atsimo, dia norefesiny teo atsimo hatramin''ny vavahady anankiray ka hatramin''ny anankiray, ka zato hakiho koa. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary nentiny niditra tamin''ny vavahady atsimo ho any amin''ny kianja anatiny aho; dia norefesiny ny vavahady atsimo, ka araka ireo ohatra ireo ihany koa; '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ary ny trano fiambenany sy ny tongo-batony ary ny tohany dia araka ireo ohatra ireo ihany koa; ary nisy varavarankely teo aminy sy teo amin''ny tohany manodidina, dimam-polo hakiho ny lavany, ary dimy amby roa-polo hakiho ny sakany. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary nisy tohany manodidina, dia dimy amby roa-polo hakiho ny lavany, ary dimy hakiho ny sakany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary ny tohany dia nanatrika ny kianja ivelany; ary nisy sarin'ny hazo rofia
  - type: usfm
    marker: x
    children:
    - type: text
      text: palma
    marker-yv: yv-n
  - type: text
    text: ' teo amin''ny tongo-batony, ary nisy ambaratonga valo ho fiakarana ao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia nentiny niantsinanana aho ho any amin''ny kianja anatiny, dia norefesiny ny vavahady, ka araka ireo ohatra ireo ihany koa. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary ny trano fiambenany sy ny tongo-batony ary ny tohany dia araka ireo ohatra ireo ihany koa; ary nisy varavarankely teo aminy sy teo amin''ny tohany manodidina, dimam-polo hakiho ny lavany, ary dimy amby-roa-polo hakiho ny sakany. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary nanatrika ny kianja ivelany ny tohany; ary nisy sarin'ny hazo rofia
  - type: usfm
    marker: x
    children:
    - type: text
      text: palma
    marker-yv: yv-n
  - type: text
    text: ' teo amin''ny tongo-batony andaniny roa, ary nisy ambaratonga valo ho fiakarana ao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary nentiny ho any amin''ny vavahady avaratra aho, dia norefesiny, ka araka ireo ohatra ireo ihany koa, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'ary ny trano fiambenany sy ny tongo-batony ary ny tohany, ary nisy varavarankely teo aminy manodidina, dia dimam-polo hakiho ny lavany, ary dimy amby roa-polo hakiho ny sakany. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ary nanatrika ny kianja ivelany ny tongo-batony; nisy sarin'ny hazo rofia
  - type: usfm
    marker: x
    children:
    - type: text
      text: palma
    marker-yv: yv-n
  - type: text
    text: ' teo amin''ny tongo-batony andaniny roa; ary ambaratonga valo no fiakarana ao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary nisy efi-trano misy varavarana teo anilan''ny tongo-bato teo am-bavahady, izay nanakobahany ny fanatitra dorana. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary teo amin''ny lavarangan''ny vavahady dia nisy latabatra roa avy tamin''ny lafiny roa hamonoana ny fanatitra dorana sy ny fanatitra noho ny ota ary ny fanati-panonerana. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary teo anilany eo ivelany amin''ny fiakarana hiditra eo amin''ny vavahady avaratra dia nisy latabatra roa, ary teo anilany anankiray koa teo amin''ny lavarangan''ny vavahady, dia nisy latabatra roa koa. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Nisy latabatra efatra teo amin''ny ilany iray amin''ny vavahady ary latabatra efatra koa teo amin''ny ilany iray, dia latabatra valo izay famonoana. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary nisy latabatra efatra natao tamin''ny vato voapaika ho amin''ny fanatitra dorana, iray hakiho sy sasany ny lavany, ary iray hakiho sy sasany koa ny sakany, ary iray hakiho ny hahavony; teo no nametrahany ny zavatra famonoana ny fanatitra dorana sy ny fanatitra hafa. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ary nisy fihantonana roa rantsana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: nisy filirany'
    marker-yv: yv-n
  - type: text
    text: ', vodivoam-pelatanana ny halavany'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny habeny'
    marker-yv: yv-n
  - type: text
    text: ', naorina manodidina eny amin''ny rindrina; ary natao teo ambonin''ny latabatra ny hena fanatitra. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary teo ivelan''ny vavahady anatiny, teo anilan''ny vavahady avaratra ka manatrika ny atsimo, dia nisy ireo efi-trano ho an''ny mpihira teo amin''ny kianja anatiny, ary nisy iray koa teo anilan''ny vavahady atsinanana ka nanatrika ny avaratra. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary hoy izy tamiko: Ity efi-trano manatrika ny atsimo ity dia ho an''ny mpisorona izay mitandrina ny anjara-raharahany amin''ny trano. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary ny efi-trano manatrika ny avaratra kosa dia ho an''ny mpisorona izay mitandrina ny anjara-raharaha ny amin''ny alitara, ireo dia taranak''i Zadoka, izay isan''ny taranak''i Levy, ka manatona an''i Jehovah hanao fanompoam-pivavahana ho Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Dia norefesiny ny kianja, ka zato hakiho ny lavany, ary zato hakiho koa ny sakany, dia efa-joro sokera izy; ary ny alitara dia teo anoloan'ny trano.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ary nentiny ho any amin''ny lavarangan''ny trano aho, dia norefesiny ny tongo-batony amin''ny lavarangana fidirana, ka dimy hakiho ny tamin''ny lafiny iray, ary dimy hakiho koa ny tamin''ny lafiny iray, ary ny sakan''ny vavahady dia telo hakiho ny tamin''ny lafiny iray, ary telo hakiho koa ny tamin''ny lafiny iray. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Roa-polo hakiho ny lavan'ny lavarangana fidirana, ary iraika ambin'ny folo hakiho ny satany; ary ambaratonga no fiakarana ao; ary nisy tongo-bato teo anilan'ny tolana, iray tamin'ny lafiny iray, ary iray tamin'ny lafiny iray koa.
