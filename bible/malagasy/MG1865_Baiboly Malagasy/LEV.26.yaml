document_id: LEV.26
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitahiana sy ozona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'AZA manao andriamani-tsi-izy; ary aza manangana sarin-javatra voasokitra, na manao tsangambaton-tsampy na manorina vato soratana hiankohofana eo amin''ny taminareo: fa Izaho no Jehovah Andriamanitrareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tandremo ny Sabatako, ary hajao ny fitoerako masina: Izaho no Jehovah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Raha manaraka ny lalàko sy mitandrina ny didiko ianareo ka mankatò izany, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia hanome anareo ranonorana amin''ny fotoany Aho, ka hahavoka-javatra ny tany, ary hamoa ny hazo any an-tsaha. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny taom-pivelezanareo dia ho tratry ny taom-piotazam-boaloboka, ary ny taom-piotazam-boaloboka dia ho tratry ny taom-pamafazana dia hihinana ianareo ka ho voky; ary handry fahizay eo amin''ny taninareo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Any homeko fiadanana eo amin''ny tany ianareo ka handry fahizay, ary tsy hisy hanaitaitra, fa hofongorako ny biby masiaka amin''ny tany, ary tsy hotetezin-tsabatra ny taninareo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hanenjika ny fahavalonareo ianareo, ka ho lavon-tsabatra eo anoloanareo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny dimy aminareo hanenjika ny zato, ary ny zato aminareo hanenjika ny iray alina; any ny fahavalonareo ho lavon-tsabatra eo anoloanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Any hijery anareo Aho ka hahamaro ny taranakareo sy hampitombo anareo, ary hanonina ny fanekeko aminareo Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Any hihinana ny tranainy ianareo, sady hamoaka ny tranainy hasiana ny vao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny tabernakeliko dia hataoko eo aminareo; ary tsy ho halan''ny fanahiko ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary handeha eo aminareo Aho ka ho Andriamanitrareo; ary ianareo ho oloko. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izaho no Jehovah Andriamanitrareo, Izay nitondra anareo nivoaka avy tany amin''ny tany Egypta, mba tsy ho andevony ianareo; ary nanapaka ny zioga izay teo aminareo Aho ka nampandeha anareo mijoro, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa raha tsy mihaino Ahy kosa ianareo ka tsy mankatò ireo didy rehetra ireo, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ary hamavoinareo ny didiko, na halan''ny fanahinareo ny fitsipiko, ka tsy ankatoavinareo ny didiko rehetra, fa ivadihanareo ny fanekeko, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izaho kosa dia hanao izao aminareo hanisy fampitahorana aminareo Aho, dia areti-mahasahozanina sy tazo mahamay, izay manimba ny maso sy mandany ny aina; ary hafafinareo foana ny voan-javatrareo, fa ny fahavalonareo no hihinana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dia hanandrina anareo ny Tavako, ka ho resy eo anoloan'ny fahavalonareo ianareo; ary izay mankahala anareo no hanapaka anareo; dia handositra ianareo, na dia tsy misy manenjika aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary raha mbola tsy mihaino Ahy ihany ianareo amin''izany rehetra izany, dia mbola hampijaly anareo impito Aho noho ny fahotanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary horavako ny reharehan''ny herinareo, ka hataoko toy ny vy ny lanitrareo, ary toy ny varahina ny taninareo; ary ny herinareo ho lany foana; '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: fa tsy hahavoka-javatra ny taninareo, any tsy hamoa ny hazo amin'ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary raha mbola manohitra Ahy ihany ianareo, ka tsy mety mihaino Ahy, dia hasiako kapoka impito koa ianareo araka ny fahotanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary hampandehaniko eo aminareo ny bibi-dia, ka handany ny zanakareo sy handringana ny biby fiompinareo ireny ka hahavitsy isa anareo; ary ny lalambenareo ho tonga efitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Any raha tsy mandray ny anatro amin''izany ianareo, fa mbola manohitra Ahy ihany, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izaho dia Izaho kosa no hamely anareo ka hampijaly anareo impito indray noho ny fahotanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hampiditra sabatra aminareo Aho ho valin''ny nivadihanareo ny fanekena; ary rehefa tafangona eo anatin''ny tanànanareo ianareo, dia hanatitra areti-mandringana aminareo Aho; ary hatolotra eo an-tànan''ny fahavalo ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Raha tapahiko ny vary, izay tohan''ainareo, dia fanendasa-mofo iray ihany no hanendasan''ny vehivavy folo ny mofonareo, ary an-danjany no hizarany azy, dia hihinana ianareo, fa tsy ho voky. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary raha mbola tsy mihaino Ahy amin''izany indray ianareo, fa mbola manohitra Ahy ihany, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'dia hamely anareo amin''ny fahatezerana kosa Aho; ary Izaho dia Izaho no hampijaly anareo impito indray noho ny fahotanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Dia hihinana ny nofon''ny zanakareo-lahy sy ny zanakareo-vavy ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary horavako ny fitoerana avonareo, sy hokapaiko ny tsangan-kazonareo ho an''ny masoandro, ary ny fatinareo dia hariako eo ambonin''ny fatin''ny sampinareo, ary ho halan''ny fanahiko ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary horavako ny tanànanareo, ka hatao lao ny fitoera-masinareo, ary tsy hamboloiko ny hanitrareo ankasitrahana. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary hataoko lao ny tany, ka ho talanjona amin''izany ny fahavalonareo izay monina eo. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary ianareo dia haeliko any amin''ny jentilisa, any hanatsoaka sabatra ho enti-manenjika anareo Aho; ary ny taninareo ho lao, any ny tanànanareo ho rava. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary amin''izany ny tany dia hanonitra ny sabatany amin''ny andro rehetra izay hahafoanany, raha any amin''ny tanin''ny fahavalonareo ianareo; dia hitsahatra ny tany ka hanonitra ny sabatany; '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'amin''ny andro hahafoanany rehetra no hitsaharany ho solon''izay tsy nitsaharany tamin''ny sabatanareo, raha mbola nonina teo ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary ny amin''ny sisa aminareo any amin''ny tanin''ny fahavalony, dia hampiditra faharerahana ao am-pony Aho, ka na dia ny feon''ny ravin-kazo voapaoka aza dia hampandositra azy; ary handositra tahaka ny mandosi-tsabatra izy ka ho lavo, na dia tsy misy manenjika aza. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary ho lavo mifanindry toy ny mandosi-tsabatra izy, na dia tsy misy manenjika aza; ka dia tsy hahajanona eo anoloan''ny fahavalonareo ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Any dia ho lany ringana any amin''ny jentilisa ianareo, any ho lanin''ny tanin''ny fahavalonareo ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary ny sisa eo aminareo dia ho levona any amin''ny tanin''ny fahavalonareo noho ny helony sy ny heloky ny razany koa. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Fa raha hiaiky ny helony sy ny heloky ny razany izy, dia ny fahadisoany izay nandisoany tamiko tamin''ny nanoherany Ahy, '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'ary Izaho kosa namely azy ka nitondra azy ho any amin''ny tanin''ny fahavalony, raha hietry amin''izany ny fony tsy voafora, any hanonitra ny amin''ny helony izy, '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'dia hotsarovako ny fanekeko tamin''i Jakoba sy ny fanekeko tamin''Isaka ary ny fanekeko tamin''i Abrahama; ary hotsarovako koa ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ary ny tany hilaozan''ny olona ka hanonitra ny sabatany, raha mitoetra foana tsy misy olona izy; ary ny olona hanonitra ny amin''ny helony, satria nandà ny fitsipiko Izy, ary halan''ny fanahiny ny didiko. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary na dia izany rehetra izany aza, raha any amin''ny tanin''ny fahavalony izy, dia tsy holaviko ary tsy ho halako, fandrao lany ringana izy rehetra, ka rava ny fanekeko taminy; fa Izaho no Jehovah Andriamaniny. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Fa ny hitahiako azy no hahatsiarovako ny fanekena tamin''ny razany, izay nentiko nivoaka avy tany amin''ny tany Egypta teo Imason''ny jentilisa, mba ho Andriamaniny Aho: Izaho no Jehovah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: lreo no didy sy fitsipika ary lalàna izay nataon'i Jehovah ho aminy sy amin'ny Zanak Isiraely, teo an-tendrombohitra Sinay ka nampilazainy an'i Mosesy.
