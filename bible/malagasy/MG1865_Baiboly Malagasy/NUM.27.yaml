document_id: NUM.27
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny hahafatesan'i Mosesy, sy ny nanendrena an'i Josoa ho mpandimby azy.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary avy ny zanakavavin''i Zelofada, zanakalahin''i Hefera, zanak''i Gileada, zanak''i Makira, zanak''i Manase, avy tamin''ny fokon''i Manase, zanak i Josefa (ary izao no anarany: Mahala sy Noa sy Hogla sy Milka ary Tirza), '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia nitsangana teo anatrehan''i Mosesy sy Eleazara mpisorona ary ny lohan''ny fiangonana sy ny fiangonana rehetra, teo anoloan''ny varavaran''ny trano-lay fihaonana izy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny rainay dia maty tany an-efitra, kanefa tsy mba isan''ny antokon''i Kora izay niangona hiodina tamin''i Jehovah tsy akory; fa matin''ny fahotany ihany izy, nefa tsy nanan-janakalahy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nahoana ny rainay no ho fati-maso eo amin''ny fokony, na dia tsy nanan-janakalahy aza izy? mba omeo zara-tany eo amin''ny rahalahin''ny rainay izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nalahatr''i Mosesy teo anatrehan''i Jehovah ny tenin''ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Marina ny tenin''ny zanakavavin''i Zelofada: omeo zara-tany eo amin''ny rahalahin-drainy tokoa izy; dia ampandovay ny zara-tanin-drainy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary lazao amin''ny Zanak''Isiraely hoe: Raha misy lehilahy maty ka tsy manan-janakalahy, dia ny zananivavy no hampandovainareo ny zara-taniny. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary raha tsy manan-janakavavy izy, dia ny rahalahiny no homenareo ny zara-taniny. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary raha tsy manan-drahalahy izy, dia ny rahalahin-drainy no homenareo ny zara-taniny. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary raha tsy manan-drahalahy ny rainy, dia ny havany akaiky azy amin''ny fokony no homenareo ny zara-taniny, ka izy no handova azy: ho lalàna hitondrana ny Zanak''Isiraely izany araka izay nandidian''i Jehovah an''i Mosesy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy Jehovah tamin''i Mosesy: Miakara amin''ity tendrombohitra Abarima ity, ka tazano ny tany izay omeko ny Zanak''Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary rehefa hitanao izany, dia hangonina any amin''ny razanao koa ianao, tahaka izay nanangonana an''i Arona rahalahinao; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'fa nandà ny teniko ianareo tany an-efitra Zina, tamin''ilay nilan''ny fiangonana ady, ka tsy nanamasina Ahy teo amin''ny rano teo imasony. (Izany no ranon''i Meriba any Kadesy any an-efitra Zina.) '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary Mosesy niteny tamin''i Jehovah hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Aoka Jehovah, Andriamanitry ny fanahin''ny nofo rehetra, hanendry lehilahy izay hitandrina ny fiangonana '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ka hivoaka sy hiditra eo alohany ary hitarika azy hivoaka sy hiditra, mba tsy ho tahaka ny ondry tsy misy mpiandry ny fiangonan''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy Jehovah tamin''i Mosesy: Alao ho anao Josoa, zanak''i Nona, lehilahy izay manam-panahy, ka ametraho ny tananao izy; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ary asaovy mijoro eo anatrehan''i Eleazara mpisorona sy ny fiangonana rehetra izy, ka mandidia azy eo imasony ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia anomezo azy ny voninahitrao, mba hihainoan''ny fiangonana, dia ny Zanak''Isiraely rehetra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary Josoa hijanona eo anatrehan''i Eleazara mpisorona, izay hanadina amin''ny fitsaran''i Orima eo anatrehan''i Jehovah ho azy; araka ny teniny no hivoahany, ary araka ny teniny no hidirany, dia izy sy ny Zanak''Isiraely rehetra, dia ny fiangonana rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary nataon''i Mosesy araka izay efa nandidian''i Jehovah azy; dia naka an''i Josoa izy ka nampijoro azy teo anatrehan''i Eleazara mpisorona sy ny fiangonana rehetra '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ka nametraka ny tànany taminy ary nandidy azy, araka ny tenin'i Jehovah izay nampitondrainy an'i Mosesy.
