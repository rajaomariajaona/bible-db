document_id: ACT.13,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nandefasana an'i Barnabasy sy Saoly ho misionera, sy ny nampianarany tao Kyprosy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary teo amin''ny fiangonana tany Antiokia nisy mpaminany sy mpampianatra: Barnabasy sy Simeona, izay atao hoe Nigera, sy Losio Kyreniana sy Menahema (izay niolonono tamin''i Heroda mpanapaka) ary Saoly. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nanao hoe: Ialahy feno ny fitaka rehetra sy ny fahafetsena rehetra, ialahy zanaky ny devoly sady fahavalon''ny fahamarinana rehetra, tsy hitsahatra tsy hamily ny lala-mahitsin''ny Tompo va ialahy? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary, indro, ankehitriny ny tanan''ny Tompo hamely an''ialahy, dia ho jamba ialahy ka tsy hahita masoandro aloha. Dia latsaka tao aminy niaraka tamin''izay ny mampanjambena sy ny aizina, ary niraparapa nitady olona hitantana azy izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny governora, nony nahita izay efa natao, dia nino sady talanjona tamin''ny fampianaran''ny Tompo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Paoly sy ny namany, rehefa niondrana an-tsambo niala avy tany Pafo, dia tonga tany Peryga any Pamfyha; fa Jaona nandao azy ka niverina nankany Jerosalema. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa niala tany Peryga izy ireo, dia nandroso nankany Antiokia any Pisidia, dia niditra tao amin''ny synagoga tamin''ny andro Sabata ka nipetraka teo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa vita ny famakiana ny lalàna sy ny mpaminany, ny mpanapaka ny synagoga dia nampilaza taminy ka nanao hoe: Ry rahalahy, raha misy fananarana hataonareo amin''ny olona, dia ataovy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Paoly nitsangana, dia nanofa tanana azy ka nanao hoe: Ry lehilahy Isiraely sy ianareo izay matahotra an''Andriamanitra, mihainoa; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Andriamanitr''izao olona Isiraely izao efa nifidy ny razantsika ka nanandratra ny olona, raha nivahiny tany amin''ny tany Egypta izy, ary sandry avo no nitondrany azy nivoaka avy tany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Izy nandefitra tamin'ny nataony
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: (nitondra azy tahaka ny fitondran''ny olona ny zanany; izahao Deo. 1.31)'
      marker-yv: yv-n
    - type: text
      text: ' tany an-efitra tokony ho efa-polo taona. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nandrava firenena fito tany amin''ny tany Kanana Izy, dia nampandovainy ny tanin''ireny izy '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha nanao fanompoam-pivavahana ho an''ny Tompo sy nifady hanina ireo, dia hoy ny Fanahy Masina: Atokàny ho Ahy Barnabasy sy Saoly hanao ny asa izay efa niantsoako azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tokony ho dimam-polo amby efa-jato taona; ary rehefa afaka izany, dia nomeny mpitsara izy hatramin''i Samoela mpaminany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa afaka indray izany, dia nangataka mpanjaka izy; ka dia nomen''Andriamanitra azy efa-polo taona Saoly, zanak''i Kisy, lehilahy avy tamin''ny firenen''i Benjamina. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nanaisotra an''i Saoly Izy, dia nanandratra an''i Davida ho mpanjakany sady nanambara azy hoe: Izaho nahita an''i Davida, zanak''i Jese, lehilahy araka ny foko, izay hanao ny sitrapoko rehetra (1 Sam. 13. 14; Sal. 89. 20). '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Avy tamin''ny taranak''izany lehilahy izany no nitondran''Andriamanitra an''i Jesosy araka ny teny fikasana ho Mpamonjy ny Isiraely, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'rehefa notorin''i Jaona tamin''ny olona Isiraely rehetra aloha ny batisan''ny fibebahana, fony tsy mbola tonga Izy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jaona, rehefa nadiva no nahatanteraka ny nalehany, dia nanao hoe: Ataonareo ho iza moa aho? Tsy Izy aho; fa, indro, misy Anankiray avy ao aoriako, ka izaho tsy miendrika hamaha ny kapa eo an-tongony akory. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry rahalahy, taranak''i Abrahama, sy izay rehetra eo aminareo matahotra an''Andriamanitra, dia ho amintsika no nampitondrana ny tenin''izao famonjena izao. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izay monina any Jerosalema sy ny loholony, satria tsy mba nahafantatra Azy, na ny feon''ny mpaminany izay vakina isan-tSabata, dia nahatanteraka izany tamin''ny nanamelohany Azy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary na dia tsy hitany aza izay tokony hanamelohana Azy ho faty, dia nangataka tamin''i Pilato ihany izy hamonoana Ary. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nahatanteraka izay rehetra voasoratra ny amin''i Jesosy izy, dia nanaisotra Azy tamin''ny hazo ka nandevina Azy tao am-pasana. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nifady hanina sy nivavaka ary nametra-tanana taminy izy, dia nandefa azy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Andriamanitra kosa nanangana Azy tamin''ny maty. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Izy niseho andro maro tamin''izay niara-niakatra taminy avy tany Galilia ho any Jerosalema, ka dia ireo no vavolombelony amin''ny olona ankehitriny. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izahay mitory ny filazantsara aminareo, dia ilay teny fikasana nolazaina tamin''ny razana, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia ny nahatanterahan''Andriamanitra izany tamin''ny zanatsika, raha nanangana an''i Jesosy Izy, araka ny voasoratra eo amin''ny Salamo faharoa hoe: Zanako Hianao, Izaho niteraka Anao androany (Sal. 2. 7). '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny amin''ny nananganany Azy tamin''ny maty, ka tsy hiverina ho amin''ny lò intsony Izy, dia izao no voalazany: Homeko anareo ny famindram-po mahatoky nampanantenaina an''i Davida (Isa. 55. 3). '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Izy ao amin''ny Salamo hafa koa: Tsy hamela ny Iray Masinao ho tratry ny lò Hianao (Sal. 16. 10). '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa Davida, rehefa nahatanteraka ny sitrapon'Andriamanitra hahasoa ny olona niara-belona taminy, dia nodi-mandry
    - type: usfm
      marker: x
      children:
      - type: text
        text: Na. Fa Davida, rehefa nanompo ny olona niara-belona taminy, dia nodi-mandry araka ny sitrapon'Andriamanitra
      marker-yv: yv-n
    - type: text
      text: ' ka nangonina ho any amin''ny razany izy ary tratry ny lò; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa Izay natsangan''Andriamanitra no tsy mba tratry ny lò. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary aoka ho fantatrareo, ry rahalahy, fa izany Lehilahy izany no itoriana famelan-keloka aminareo; '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ao aminy no anamarinana izay rehetra mino ho afaka amin''ny heloka rehetra izay tsy azo nanamarinana anareo tamin''ny lalàn''i Mosesy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nirahin''ny Fanahy Masina izy roa lahy, dia nidina nankany Seleokia izy ka niondrana an-tsambo teo hankany Kyprosy. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa tandremo fandrao hihatra izay voalaza eo amin''ny mpaminany hoe: '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izahaonareo mpamotsifotsy, dia gagà, ka levona; Fa Izaho manao asa amin''ny andronareo, Dia asa izay tsy hinoanareo akory, na dia hisy hilaza aminareo aza (Hab. 1. 5) '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nivoaka izy, dia nangatahiny holazaina aminy indray izany teny izany amin''ny Sabata manaraka. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nirava ny fiangonana, dia maro tamin''ny Jiosy sy ny proselyta izay nanompo an''Andriamanitra no nanaraka an''i Paoly sy Barnabasy, izay niteny taminy ka namporisika azy haharitra amin''ny fahasoavan''Andriamanitra. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony tamin''ny Sabata manaraka, dia saiky tafangona avokoa ny tao an-tanàna hihaino ny tenin''Andriamanitra. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nefa ny Jiosy kosa, raha nahita ny vahoaka betsaka, dia feno fialonana ka nanohitra ny teny nolazain'i Paoly, sady niteny ratsy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. nanao blasfemia, izahao Mat. 9.3
      marker-yv: yv-n
    - type: text
      text: '. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Paoly sy Barnabasy dia niteny tamin''ny fahasahiana ka nanao hoe: Hianareo no tsy maintsy nitoriana ny tenin''Andriamanitra aloha; fa rehefa mandà izany ianareo ka manao ny tenanareo ho tsy miendrika hahazo fiainana mandrakizay, dia indro, mitodika mankany amin''ny jentilisa izahay; '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa izao no nandidian''ny Tompo anay: Efa nanendry Anao ho fahazavan''ny jentilisa Aho, Mba ho famonjena hatrany amin''ny faran''ny tany Hianao (Isa. 49. 6). '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa nandre izany ny jentilisa, dia faly izy ka nankalaza ny tenin'Andriamanitra
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ny tenin''ny Tompo'
      marker-yv: yv-n
    - type: text
      text: '; ary izay voalahatra ho amin''ny fiainana mandrakizay dia nino. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny tenin''ny Tompo dia naely eran''izany tany rehetra izany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony tonga tany Salamisy izy, dia nitory ny tenin''Andriamanitra teny amin''ny synagogan''ny Jiosy; ary nitondra an''i Jaona koa ho mpanampy azy izy. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny Jiosy nampitaitra ny vehivavy manan-kaja izay nivavaka sy ny lehibe tao an-tanàna, dia nahatonga fanenjehana tamin''i Paoly sy Barnabasy ireny ka nandroaka azy niala tamin''ny taniny. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izy roa lahy kosa nanintsana ny vovoka tamin''ny tongony hiampanga ireo, dia nankany Ikonioma. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary dia feno fifaliana sy ny Fanahy Masina ny mpianatra.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa namaky ny nosy ka tonga tany Pafo izy, dia nahita Jiosy anankiray atao hoe Barjesosy, mpanao ody sady mpaminany sandoka, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izay nitoetra tao amin''i Serygio Paolo, governoran''ny tany sady lehilahy hendry; ary izy nampaka an''i Barnabasy sy Saoly hankao aminy ka naniry mba hahare ny tenin''Andriamanitra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Elyma, mpanao ody (fa izany no anarany, raha adika), nanohitra azy roa lahy sady nitady hampivily ny governora tsy hanaiky ny finoana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Saoly kosa, izay atao hoe koa Paoly, feno ny Fanahy Masina, dia nibanjina azy '
