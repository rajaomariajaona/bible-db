document_id: DEU.33
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tso-drano nataon'i Mosesy tamin'ny firenen'Isiraely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary izao no tso-drano nataon''i Mosesy, lehilahin''Andriamanitra, tamin''ny Zanak''Isiraely, rehefa nadiva ho faty izy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Hoy izy: Jehovah avy tao Sinay, Ary niseho taminy avy tany Seïra; Niposaka namirapiratra avy tany an-tendrombohitra Parana Izy; Ary avy tao amin''ny masiny tsy omby alinalina; Ary teo ankavanany nisy lalàn''afo ho an''ireo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Eny, tia ireo firenena Izy; Eo an-tananao avokoa ny masiny rehetra; Miandry eo anilan'ny tongotrao ireo Ka samy mandray amin'ny teninao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Lalàna no nandidian'i Mosesy antsika Ho lovan'ny fiangonan'i Jakoba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary tonga mpanjakan'i Jesorona Izy, Rehefa tafangona ny lehiben'ny vahoaka Sy ny firenen'Isiraely rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aoka ho velona ROBENA, fa tsy ho faty, Nefa aoka ho vitsy olona izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny amin''i JODA dia izao, hoy izy: Jehovah ô, mihainoa ny feon''i Joda, Ka ento ho amin''ny olony izy. Ny tanany no hiadiany ho azy, Ka manampia azy Hianao hamelezany ny mpandrafy azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny amin''i LEVY dia hoy izy: Ny Tomimanao sy ny Orimanao dia amin''ny olonao masina. Izay nizahanao toetra tao Masa Sy nifamalianao tao amin''ny ranon''i Meriba,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izay nilaza ny rainy sy ny reniny hoe: Tsy mahita azy aho, Sady tsy nahalala izay rahalahiny izy, Ary izay zanany aza dia tsy fantany; Fa nitandrina ny teninao izy Ka nitana ny fanekenao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Jakoba no hampianariny ny fitsipikao, Ary Isiraely ny lalànao; Hametraka ditin-kazo manitra eo anatrehanao'izy Sy fanatitra dorana eo ambonin'ny alitaranao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Jehovah ô, tahio ny heriny, Ary aoka ho sitrakao ny asan'ny tànany; Asio mafy ny valahan'izay mitsangana hiady aminy, Ka aoka tsy hiarina intsony izay mankahala azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary ny amin''i BENJAMINA dia hoy izy: Ny malalan''i Jehovah honina fahizay eo aminy, Dia halofany mandrakariva, Ary hobabeny eo an-damosiny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny amin''i JOSEFA dia hoy izy: Hotahin''i Jehovah anie ny taniny Amin''ny zava-tsoan''ny lanitra, dia amin''ny ando, Ary amin''ny rano lalina mamitsaka any ambany,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary amin'ny zava-tsoa vokatry ny masoandro Sy ny voan-javatra soa vokatry ny volana,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary amin'ny zava-malaza avy amin'ny tendrombohitra fahagola Sy ny zava-tsoa avy amin'ny havoana mandrakizay
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mbamin'ny zava-tsoan'ny tany sy izay rehetra eo aminy Sy ny fankasitrahan'Izay nitoetra tao amin'ilay roimemy; Ary aoka ho tonga eo an-dohan'i Josefa izany, Dia eo an-tampon-dohan'ilay nalaza tamin'ny rahalahiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny voalohan-teraky ny ombiny dia malaza, Tandrok'ombimanga ny tandrony; Izany no hanotoany ny firenena rehetra, Dia ny faran'ny tany; Ireo no alinalin'i Efraima Sy arivoarivon'i Manase.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny amin''i ZEBOLONA dia hoy izy: Mifalia, ry Zebolona, amin''izay alehanao, Ary ianao, ry ISAKARA, ao an-dainao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Firenena no antsoiny hankao an-tendrombohitra, Ary ao no hamonoany zavatra ho fanati-pahamarinana; Fa hitsentsitra ny haren'ny ranomasina izy Sy ny zava-tsoa miafina ao amin'ny fasika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ary ny amin'i GADA dia hoy Izy; Isaorana anie Izay manome malalaka ho an'i Gada; Mamitsaka tahaka ny liom-bavy izy Ka mamiravira ny sandry mbamin'ny tampon-doha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nizaha izay tsara indrindra ho an'ny tenany izy, Fa teo ny anaran'ny mpanao lalàna no efa voatokana. Niaraka tamin'ny lohan'ny firenena izy, Ary araka ny fahamarinan'i Jehovah ny nataony, Sy araka ny fitsipiny izay iombonany amin'ny Isiraely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ny amin''DANA dia hoy izy: Dana dia zana-diona; Miantsampy avy ao Basana izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny amin''i NAFTALY dia hoy izy: Ry Naftaly, voky fankasitrahana Ka feno ny fitahian''i Jehovah, Mandovà ny andrefana sy ny atsimo anie ianao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ny amin''i ASERA dia hoy izy: Aoka hotahina mihoatra noho ny zaza maro Asera, Ary hankasitrahana mihoatra noho ny rahalahiny izy Ka hanoboka ny tongony amin''ny diloilo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ho vy sy varahina ny hidinao; Ary hifamatra amin'ny andronao ny fiadananao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ry Jesorona, tsy misy tahaka an'Andriamanitra, Izay mitaingina ny lanitra hamonjy anao, Sady mandia ny rahona amin'ny voninahiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ny Andriamanitra hatrizay hatrizay no fonenana, Ary ny sandry mandrakizay no eto ambany. Mandroaka ny fahavalo eo anoloanao Izy Ka manao hoe: Aringano.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary mandry fahizay Isiraely, Mitokana irery ny loharanon'i Jakoba Ao amin'ny tany be vary sy ranom-boaloboka, Eny, mampilatsaka ando ny lanitra eo amboniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Sambatra ianao, ry Isiraely; Iza no tahaka anao, ry olona voavonjin'i Jehovah, Ampingan'ny famonjena anao sy sabatry ny voninahitrao! Hikoy anao ny fahavalonao. Ary ianao handia ny fitoerany avo.
