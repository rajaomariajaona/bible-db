document_id: DEU.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny fandoavana ny fahafolon-karena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Zanak''i Jehovah Andriamanitrareo ianareo, koa aza mitetika ny tenanareo, na manaratra ny eo ambonin''ny handrinareo noho ny amin''ny maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa firenena masina ho an'i Jehovah Andriamanitrao ianao ka voafidiny ho rakitra soa ho Azy mihoatra noho ny firenena rehetra ambonin'ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aza mihinana izay fahavetavetana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izao no biby izay ho fihinanareo: Ny omby sy ny ondry sy ny osy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'sy ny diera, ny gazela, ny kapreola, ny osi-dia, ny pygarga, ny antilopa ary ny ropikapra: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'izay biby rehetra mivaky kitro, ka misaraka tsara ny kitrony sady mandinika, no ho fihinanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nefa amin''izay mandinika na mivaky kitro dia izao ihany kosa no tsy ho fihinanareo: Ny rameva sy ny rà bitro ary ny hyraka, satria mandinika ihany izy, fa tsy mivaky kitro; maloto aminareo izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ary ny kisoa koa, satria mivaky kitro izy, fa tsy mandinika, maloto aminareo izy; ny henan ireny tsy ho fihinanareo, ary ny fatiny tsy hokasihinareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary amin''izay rehetra ao anatin''ny rano dia izao no ho fihinanareo: izay rehetra misy vombony sy kirany no ho fihinanareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'fa izay rehetra tsy misy vombony sy kirany kosa dia tsy ho fihinanareo; maloto aminareo izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny vorona madio rehetra no ho fihinanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nefa izao kosa no tsy ho fihinanareo: ny voltora sy ny gypa sy ny ankoay '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'ary ny papango sy ny voromahery sy ny papango mainty, samy araka ny karazany, avy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ary ny goaika rehetra, samy araka ny karazany avy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ary ny ostritsa sy ny tararaka sy ny vorondriaka ary ny hitsikitsika, samy araka ny karazany avy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ary ny vorondolo sy ny vorondolo lehibe sy ny ibisa '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ary ny sama sy ny voltora madinika sy ny manarana '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary ny vano sy ny vanobe, samy araka ny karazany avy, ary ny takidara sy ny manavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ny zava-mandady rehetra izay manana elatra dia haloto aminareo ka tsy ho fihinanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny zava-manana elatra izay madio no ho fihinanareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Aza homana izay maty ho azy, fa omeo ho an'ny vahiny izay ao an-tanànanao izany mba hohaniny, na amidio amin'ny olona hafa firenena; fa firenena masina ho an'i Jehovah Andriamanitrao ianao. Aza mahandro zanak'osy amin'ny rononon-dreniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Aloavy tsara ny ampahafolon''ny vokatra rehetra avy amin''ny voa nafafinao, dia ny vokatra any an-tsaha isan-taona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'dia aoka ho eo anatrehan''i Jehovah Andriamanitrao eo amin''ny tany izany hofidiny hampitoerany ny anarany no hihinananao ny ampahafolon''ny varinao sy ny ranom-boalobokao sy ny diloilonao ary ny voalohan-teraky ny ombinao sy ny ondry aman''osinao, mba hianaranao hatahotra an''i Jehovah Andriamanitrao mandrakariva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa raha lavitra loatra ny lalana halehanao ka tsy mahatondra izany zavatra izany ianao, satria lavitra anao loatra ny tany izay hofidin''i Jehovah Andriamanitrao hampitoerany ny anarany, raha notahin''i Jehovah Andriamanitrao ianao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'dia hamidinao vola izany, ary hofonosinao ny vola ka ho entinao eo an-tananao hankany amin''ny tany izay hofidin''i Jehovah Andriamanitrao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ary ny vola dia amidio izay rehetra tian''ny fanahinao, na omby, na ondry, na osy, na divay, na toaka, na izay zavatra hafa tian''ny fanahinao; ary aoka ho eo anatrehan''i Jehovah Andriamanitrao no hihinananao izany sy hifalianao mbamin''ny ankohonanao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ary ny Levita izay ao an-tanànanao dia aza foinao; fa tsy manana anjara na lova eo aminao izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary isan-telo taona dia alao ny ampahafolon''ny vokatrao rehetra amin''izany taona izany, ka ataovy ao an-tanànanao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ary dia aoka ho avy ny Levita (satria tsy mba manana anjara na lova eo aminao izy) sy ny vahiny sy ny kamboty ary ny mpitondratena izay ao an-tanànanao, dia hihinana izy ka ho voky, mba hotahin'i Jehovah Andriamanitrao ianao amin'ny asan-tananao rehetra izay ataonao.
