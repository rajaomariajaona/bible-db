document_id: AMO.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny handravana ny fanjakan'Isiraely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Henoinareo izao teny izao, izay entiko milaza anareo, dia hira fahalahelovana, ry taranak''Isiraely; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lavo Isiraely virijina ka tsy hahatsangana intsony; Nazera tamin''ny taniny izy, ka tsy misy mangana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa izao no lazain''i Jehovah Tompo: Izay tanàna namoaka arivo, dia, indreo, zato monja no sisa: ary izay namoaka zato, dia, indreo, folo monja no sisa ho an''ny taranak''Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa izao no lazain''i Jehovah amin''ny taranak''Isiraely; Tadiavo Aho, dia ho velona ianareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa aza mitady an''i Betela, na mankany Gilgala, ary aza mandroso ho any Beri-sheba; Fa ho babo tokoa Gilgala, ary Betela dia ho tonga tsinontsinona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mitadiava an''i Jehovah, dia ho velona ianareo; Fandrao hilatsaka toy ny afo mandevona amin''ny taranak''i Josefa Izy, ary Betela tsy hanana izay hahafaty ny afo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia ianareo izay mamadika ny rariny ho zava-mahafaty ary mampiongana ny fahamarinana ho eo amin''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ilay nanao an''Ikotokelimiadilaona sy ny Telonohorefy, ary mampody ny aloky ny fahafatesana ho maraina sy manamaizina ny andro ho alina, dia ilay miantso ny rano ao an-dranomasina ka mandatsaka azy amin''ny tany: Jehovah no anarany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia Ilay mampitselatra fandravana hamely ny mahery, ka dia mihatra amin''ny tanàna mimanda ny fandravana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Halany eo am-bavahady izay mananatra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Halany izay mananatra eo am-bavahady'
    marker-yv: yv-n
  - type: text
    text: ',11 ary ataony ho fahavetavetana izay miteny ny marina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa noho ny fanitsakitsahanareo ny mahantra sy ny nampandoavanareo vary azy, dia mba nanao trano vato voapaika ihany ianareo, nefa tsy hitoetra ao aminy; Namboly tanim-boaloboka mahafinaritra ihany ianareo, nefa tsy hisotro ny divay avy aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa fantatro fa be ny helokareo, ary fatratra ny fahotanareo: Mampahory ny marina sy mandray kolikoly'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. avotra
    marker-yv: yv-n
  - type: text
    text: ' ianareo ary mamadika ny malahelo eo am-bavahady. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Koa izay manan-tsaina dia hangina amin''izao andro izao, fa andro mampahory izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny tsara no tadiavo, fa aza ny ratsy, mba ho velona ianareo; Ka dia homba anareo Jehovah, Andriamanitry ny maro, araka izay efa nolazainareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ankahalao ny ratsy, ka tiavo ny tsara, ary aoreno eo am-pitsarana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. am-bavahady
    marker-yv: yv-n
  - type: text
    text: ' ny rariny; Angamba Jehovah, Andriamanitry ny maro, hamindra fo amin''izay sisa amin''i Josefa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa izao no lazain''i Jehovah Tompo, Andriamanitry ny maro: Eny an-kalalahana rehetra dia hisy fisaonana, ary eny an-dalambe rehetra dia hisy hanao hoe: Indrisy! Indrisy! Ary hiantso ny mpiasa tany hitomany izy, ary izay mahay hira fisaonana dia hantsoiny hanao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary any amin'ny tanim-boaloboka rehetra dia hisy fisaonana; Fa handeha hamaky eo aminao Aho, hoy Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lozan''izay maniry ny andron''i Jehovah! Hataonareo inona moa ny andron''i Jehovah? Dia aizina, fa tsy fahazavana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tahaka ny olona mandositra ny liona ka sendra ny bera, ary rehefa tafiditra ao an-trano ka mitehin- tanana amin''ny rindrina, dia kekerin''ny menarana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Moa tsy aizina va ny andron''i Jehovah, fa tsy fahazavana? Tsy aizim-pito tsy misy mangirana akory va izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Halako, eny, laviko ny andro firavoravoanareo, ary tsy ho hanitra ankasitrahana amiko ny fivorianareo masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Na dia ateranareo fanatitra dorana sy fanatitra hohanina aza Aho, dia tsy sitrako izany; Ny zanak''omby mifahy aterinareo ho fanati-pihavanana dia tsy hojereko akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Atsaharo ny finaonaonan'ny hiranareo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Hiranao, lokanganao
    marker-yv: yv-n
  - type: text
    text: ', fa maharenina Ahy; Fa tsy hihaino ny fanenon''ny lokanganareo'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Hiranao, lokanganao
    marker-yv: yv-n
  - type: text
    text: ' Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary aoka ny fitsarana hanalonalona toy ny rano, ary ny fahamarinana toy ny renirano tsy mety ritra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Moa efa nanatitra fanatitra hohanina sy fanatitra alatsa-drà ho Ahy tany an-efitra efa-polo taona va ianareo, ry taranak''i Isiraely? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tsia, fa ny nitondra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Dia ho entinareo'
    marker-yv: yv-n
  - type: text
    text: ' ny tabernakelin''ny mpanjakanareo sy ny fipetrahan''ny sampinareo ihany no nataonareo'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Tsia fa ny mitondra an''i Sikota, mpanjakanareo, sy Kiona, sampinareo, no nataonareo'
    marker-yv: yv-n
  - type: text
    text: ', dia ny kintan''ny andriamanitrareo, izay nataonareo ho anareo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ka dia ho entiko ho babo any ankoatr'i Damaskosy ianareo, hoy Jehovah, Andriamanitry ny maro no anarany.
