document_id: AMO.5,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny handravana ny fanjakan'Isiraely
  - type: text
    content: 'Henoinareo izao teny izao, izay entiko milaza anareo, dia hira fahalahelovana, ry taranak''Isiraely; '
  '10':
  - type: text
    content: Halany eo am-bavahady izay mananatra
  - type: note
    content: 'Na: Halany izay mananatra eo am-bavahady'
  - type: text
    content: ',11 ary ataony ho fahavetavetana izay miteny ny marina. '
  '11':
  - type: text
    content: 'Koa noho ny fanitsakitsahanareo ny mahantra sy ny nampandoavanareo vary azy, dia mba nanao trano vato voapaika ihany ianareo, nefa tsy hitoetra ao aminy; Namboly tanim-boaloboka mahafinaritra ihany ianareo, nefa tsy hisotro ny divay avy aminy. '
  '12':
  - type: text
    content: 'Fa fantatro fa be ny helokareo, ary fatratra ny fahotanareo: Mampahory ny marina sy mandray kolikoly'
  - type: note
    content: Heb. avotra
  - type: text
    content: ' ianareo ary mamadika ny malahelo eo am-bavahady. '
  '13':
  - type: text
    content: 'Koa izay manan-tsaina dia hangina amin''izao andro izao, fa andro mampahory izao. '
  '14':
  - type: text
    content: 'Ny tsara no tadiavo, fa aza ny ratsy, mba ho velona ianareo; Ka dia homba anareo Jehovah, Andriamanitry ny maro, araka izay efa nolazainareo. '
  '15':
  - type: text
    content: Ankahalao ny ratsy, ka tiavo ny tsara, ary aoreno eo am-pitsarana
  - type: note
    content: Heb. am-bavahady
  - type: text
    content: ' ny rariny; Angamba Jehovah, Andriamanitry ny maro, hamindra fo amin''izay sisa amin''i Josefa. '
  '16':
  - type: text
    content: 'Koa izao no lazain''i Jehovah Tompo, Andriamanitry ny maro: Eny an-kalalahana rehetra dia hisy fisaonana, ary eny an-dalambe rehetra dia hisy hanao hoe: Indrisy! Indrisy! Ary hiantso ny mpiasa tany hitomany izy, ary izay mahay hira fisaonana dia hantsoiny hanao. '
  '17':
  - type: text
    content: Ary any amin'ny tanim-boaloboka rehetra dia hisy fisaonana; Fa handeha hamaky eo aminao Aho, hoy Jehovah.
  '18':
  - type: text
    content: 'Lozan''izay maniry ny andron''i Jehovah! Hataonareo inona moa ny andron''i Jehovah? Dia aizina, fa tsy fahazavana, '
  '19':
  - type: text
    content: 'Tahaka ny olona mandositra ny liona ka sendra ny bera, ary rehefa tafiditra ao an-trano ka mitehin- tanana amin''ny rindrina, dia kekerin''ny menarana. '
  '2':
  - type: text
    content: 'Lavo Isiraely virijina ka tsy hahatsangana intsony; Nazera tamin''ny taniny izy, ka tsy misy mangana azy. '
  '20':
  - type: text
    content: 'Moa tsy aizina va ny andron''i Jehovah, fa tsy fahazavana? Tsy aizim-pito tsy misy mangirana akory va izany? '
  '21':
  - type: text
    content: 'Halako, eny, laviko ny andro firavoravoanareo, ary tsy ho hanitra ankasitrahana amiko ny fivorianareo masina. '
  '22':
  - type: text
    content: 'Na dia ateranareo fanatitra dorana sy fanatitra hohanina aza Aho, dia tsy sitrako izany; Ny zanak''omby mifahy aterinareo ho fanati-pihavanana dia tsy hojereko akory. '
  '23':
  - type: text
    content: Atsaharo ny finaonaonan'ny hiranareo
  - type: note
    content: Heb. Hiranao, lokanganao
  - type: text
    content: ', fa maharenina Ahy; Fa tsy hihaino ny fanenon''ny lokanganareo'
  - type: note
    content: Heb. Hiranao, lokanganao
  - type: text
    content: ' Aho. '
  '24':
  - type: text
    content: 'Ary aoka ny fitsarana hanalonalona toy ny rano, ary ny fahamarinana toy ny renirano tsy mety ritra. '
  '25':
  - type: text
    content: 'Moa efa nanatitra fanatitra hohanina sy fanatitra alatsa-drà ho Ahy tany an-efitra efa-polo taona va ianareo, ry taranak''i Isiraely? '
  '26':
  - type: text
    content: Tsia, fa ny nitondra
  - type: note
    content: 'Na: Dia ho entinareo'
  - type: text
    content: ' ny tabernakelin''ny mpanjakanareo sy ny fipetrahan''ny sampinareo ihany no nataonareo'
  - type: note
    content: 'Na: Tsia fa ny mitondra an''i Sikota, mpanjakanareo, sy Kiona, sampinareo, no nataonareo'
  - type: text
    content: ', dia ny kintan''ny andriamanitrareo, izay nataonareo ho anareo '
  '27':
  - type: text
    content: Ka dia ho entiko ho babo any ankoatr'i Damaskosy ianareo, hoy Jehovah, Andriamanitry ny maro no anarany.
  '3':
  - type: text
    content: 'Fa izao no lazain''i Jehovah Tompo: Izay tanàna namoaka arivo, dia, indreo, zato monja no sisa: ary izay namoaka zato, dia, indreo, folo monja no sisa ho an''ny taranak''Isiraely. '
  '4':
  - type: text
    content: 'Fa izao no lazain''i Jehovah amin''ny taranak''Isiraely; Tadiavo Aho, dia ho velona ianareo; '
  '5':
  - type: text
    content: 'Fa aza mitady an''i Betela, na mankany Gilgala, ary aza mandroso ho any Beri-sheba; Fa ho babo tokoa Gilgala, ary Betela dia ho tonga tsinontsinona. '
  '6':
  - type: text
    content: 'Mitadiava an''i Jehovah, dia ho velona ianareo; Fandrao hilatsaka toy ny afo mandevona amin''ny taranak''i Josefa Izy, ary Betela tsy hanana izay hahafaty ny afo, '
  '7':
  - type: text
    content: 'Dia ianareo izay mamadika ny rariny ho zava-mahafaty ary mampiongana ny fahamarinana ho eo amin''ny tany. '
  '8':
  - type: text
    content: 'Ilay nanao an''Ikotokelimiadilaona sy ny Telonohorefy, ary mampody ny aloky ny fahafatesana ho maraina sy manamaizina ny andro ho alina, dia ilay miantso ny rano ao an-dranomasina ka mandatsaka azy amin''ny tany: Jehovah no anarany, '
  '9':
  - type: text
    content: 'Dia Ilay mampitselatra fandravana hamely ny mahery, ka dia mihatra amin''ny tanàna mimanda ny fandravana. '
