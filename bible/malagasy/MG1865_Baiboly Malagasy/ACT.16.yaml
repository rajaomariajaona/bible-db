document_id: ACT.16,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny niantsoan'Andriamanitra an'i Paoly hankany Makedonia, sy ny nataon'i Paoly tao Filipy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia tonga tany Derbe sy Lystra koa izy; ary, indro, nisy mpianatra anankiray teo atao hoe Timoty - zanaky ny vehivavy Jiosy izay nino, fa jentilisa
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. Grika
      marker-yv: yv-n
    - type: text
      text: ' rainy - '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nahita ny fahitana izy, dia nitady handeha niaraka tamin''izay hankany Makedonia izahay, satria nataonay fa Andriamanitra no efa niantso anay hitory ny filazantsara amin''ny olona any. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony niondrana an-tsambo niala tany Troasy izahay, dia nizotra nankany Samotrakia; ary nony ampitso dia nankany Neapolia. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nony niala teo izahay, dia nankany Filipy, izay tanàna voalohany amin'izany zara-tanin'i Makedonia izany sady zana-panjakana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. kolonia
      marker-yv: yv-n
    - type: text
      text: '; ary nitoetra teo amin''izany tanàna izany andro vitsivitsy izahay. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin''ny andro Sabata dia nivoaka teo ivelan''ny vavahady izahay nankeny amoron''ony, izay nataonay fa nisy fitoerana fivavahana; ary nipetraka teo izahay ka niresaka tamin''ny vehivavy vory teo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy vehivavy atao hoe Lydia, mpivarotra lamba volomparasy, avy any an-tanàna Tyatira, izay nivavaka tamin''Andriamanitra, dia nihaino izy, ary ny Tompo nanokatra ny fony hitandrina ny teny izay nolazain''i Paoly. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa natao batisa ravehivavy mbamin''ny ankohonany, dia nangataka izy nanao hoe: Raha ataonareo ho mahatoky amin''ny Tompo aho, dia midìra ao an-tranoko ka mitoera ao. Dia nanery anay izy.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha nandeha ho any amin''ilay fitoerana fivavahana izahay, dia nisy ankizivavy anankiray nanam-panahy mahavaly nifanena taminay, ary ny faminaniana nataony no nahazoan''ny tompony harena be. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izy nanaraka an''i Paoly sy izahay ka niantso hoe: Ireo lehilahy ireo dia mpanompon''Andriamanitra Avo Indrindra, izay manoro anareo lalam-pamonjena. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nataony tamin''ny andro maro izany. Ary sosotra Paoly, dia nitodika ka nanao tamin''ny fanahy hoe: Mandidy anao amin''ny anaran''i Jesosy Kristy aho hivoaka aminy. Dia nivoaka tamin''izany ora izany indrindra izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony hitan''ireo tompony fa very ny fanantenany hahazoany harena, dia nisambotra an''i Paoly sy Silasy izy ka nitondra azy ho any an-tsena any amin''ny lehibe; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary tsara laza teo amin''ny rahalahy tany Lystra sy Ikonioma izy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary rehefa nentiny tany amin''ireo governora izy roa lahy, dia nolazainy hoe: Ireto lehilahy Jiosy ireto mampitabataba ny tanànantsika loatra '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka mampianatra fanao tsy mety horaisintsika na hataontsika, fa Romana isika. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny vahoaka niara-nitsangana hamely azy; ary ireo governora nanaisotra ny lambany, ka nasainy nokapohina tamin''ny hazo izy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony efa nokapohiny mafy dia mafy izy, dia nataony tao an-tranomaizina, ka nasainy niambina azy tsara ny mpiandry tranomaizina. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nahazo teny toy izany ralehilahy, dia nataony tao amin''ny tranomaizina anatiny indrindra izy, ary ny tongony nobolokiny mafy tamin''ny boloky hazo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony mamatonalina, dia nivavaka sy nihira fiderana an''Andriamanitra Paoly sy Silasy; ary nihaino azy ny mpifatotra. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy horohorontany mafy dia mafy avy tampoka, ka nihozongozona ny fanorenan''ny tranomaizina; dia nivoha niaraka tamin''izay ny varavarana rehetra, ary nivaha avokoa ny fatoran''izy rehetra. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nahatsiaro ny mpiandry tranomaizina ka nahita ny varavaran''ny tranomaizina nivoha, dia nanatsoaka ny sabany izy ka saiky hamono tena, satria nataony fa efa nandositra ny mpifatotra. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Paoly niantso tamin''ny feo mahery ka nanao hoe: Aza mamono tena, fa ato ihany izahay rehetra. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izy niantso jiro, dia nikaretsaka niditra sady tora-kovitra ka niankohoka teo anatrehan''i Paoly sy Silasy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa tian'i Paoly ho entiny miaraka aminy izy; dia nalainy izy ka noforany noho ny Jiosy tany amin'izany tany izany, satria fantatr'izy rehetra fa jentilisa
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. Grika
      marker-yv: yv-n
    - type: text
      text: ' rainy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nentiny nivoaka izy roa lahy, dia hoy izy: Tompoko, inona no mety hataoko, mba hovonjena aho? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy roa lahy: Minoa an''i Jesosy Tompo, dia hovonjena ianao sy ny ankohonanao. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izy roa lahy nitory ny tenin''ny Tompo taminy sy tamin''izay rehetra tao an-tranony. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandray azy roa lahy izy tamin''izany ora amin''ny alina izany ka nanasa ny dian-kapoka; ary natao batisa tamin''izay izy mbamin''izay azy rehetra. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nentiny niakatra ho ao an-trano izy roa lahy, dia norosoany hanina teo anoloany, dia nifaly indrindra izy mbamin''izay rehetra tao an-tranony, satria efa nino an''Andriamanitra. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa maraina ny andro, ireo governora dia naniraka ny mpitan-defona ka nanao hoe: Alefaso ireo olona ireo. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpiandry tranomaizina nilaza izany teny izany tamin''i Paoly hoe: Ireo governora efa naniraka handefa anareo, koa ankehitriny mivoaha ianareo ka mandehana soa aman-tsara. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Paoly taminy: Efa nokapohiny tsy voatsara teo amin''ny miharihary izahay, kanefa Romana izahay, ka nataony tao an-tranomaizina, ary ankehitriny moa mamoaka anay mangingina va izy? Tsia, fa aoka izy ihany ho hankatỳ hamoaka anay. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpitan-defona nilaza izany teny izany tamin''ireo governora; dia natahotra izy, raha nahare fa Romana izy roa lahy. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia tonga izy ka nanony azy sady nitondra azy nivoaka ary nangataka azy handeha hiala ao an-tanàna. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha nandeha nitety ny tanàna tao izy, dia natolony hotandreman'ny olona ireo didy navoaky ny Apostoly sy ny loholona
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr.presbytera
      marker-yv: yv-n
    - type: text
      text: ' tany Jerosalema. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niala tao an-tranomaizina izy ka niditra tao an-tranon'i Lydia; ary rehefa nahita ny rahalahy izy, dia nananatra azy ka lasa nandeha.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nihanahery finoana ny fiangonana sady nihamaro isan'andro.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa noraran''ny Fanahy Masina tsy hitory ny teny tany Asia izy, dia nandeha namaky ny tany Frygia sy Galatia '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka efa tonga tany an-tsisin''i Mysia, dia nitady hankany Bitynia izy, fa tsy navelan''ny Fanahin''i Jesosy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nandalo an''i Mysia izy, dia nidina nankany Troasy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony alina dia nisy fahitana niseho tamin''i Paoly, koa, indro, nisy lehilahy Makedoniana nitsangana teo ka nangataka azy hoe: Mità mankaty Makedonia, ka vonjeo izahay! '
