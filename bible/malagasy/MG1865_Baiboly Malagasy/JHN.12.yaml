document_id: JHN.12,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary rehefa henemana no sisa tsy tonga ny Paska, Jesosy dia tonga tao Betania, izay nitoeran''i Lazarosy, ilay natsangany tamin''ny maty. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa nihendry hahafaty an''i Lazarosy koa ny lohan''ny mpisorona, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: satria izy no nialan'ny maro tamin'ny Jiosy ka ninoany an'i Jesosy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary nony ampitson''iny ny vahoaka betsaka, izay tonga ho amin''ny andro firavoravoana, rehefa nahare fa hankany Jerosalema Jesosy, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'dia naka sampan-drofia ka nivoaka hitsena Azy sady niantso hoe: Hosana! Isaorana anie ny Mpanjakan''ny Isiraely, Ilay avy amin''ny anaran''i Jehovah (Sal. 118, 26). '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary Jesosy nahita zana-boriky anankiray, dia nitaingina azy, araka ny voasoratra hoe: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Aza matahotra, ry Ziona zanakavavy; indro, avy ny Mpanjakanao mitaingina zana-boriky (Zak. 9. 9). '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Izany zavatra izany dia tsy fantatry ny mpianany tamin''ny voalohany; fa rehefa niditra tamin''ny voninahiny Jesosy, dia vao nahatsiaro izy fa voasoratra hilaza Azy izany zavatra izany, ary efa nataony taminy izany. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary nanambara Azy ny vahoaka izay teny aminy, fony Izy niantso an''i Lazarosy hivoaka tamin''ny fasana ka nanangana azy tamin''ny maty. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary izany koa no nitsenan''ny vahoaka Azy, satria efa reny fa nanao izany famantarana izany Izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary tamin''izany ny Fariseo dia nifampilaza hoe: Hitanareo fa tsy mahefa na inona na inona akory ianareo; indro, efa lasa manaraka Azy avokoa izao tontolo izao. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dia nanao fanasana ho an''i Jesosy tao izy; ary Marta no nanompo; fa Lazarosy no anankiray tamin''izay niara-nipetraka nihinana taminy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary nisy Grika sasany tamin''izay niakatra hivavaka tamin''ny andro firavoravoana, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'ary izy ireo nankany amin''i Filipo avy any Betsaida any Galilia, dia nangataka taminy ka nanao hoe: Tompoko, mba ta-hahita an''i Jesosy izahay. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia lasa Filipo nilaza tamin''i Andrea; ary Andrea sy Filipo lasa nilaza tamin''i Jesosy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary Jesosy namaly azy hoe: Tonga ny fotoana hankalazana ny Zanak''olona. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Lazaiko aminareo marina dia marina tokoa: Raha tsy latsaka ao amin''ny tany ny voambary ka maty, dia mitoetra foana izy; fa raha maty kosa izy, dia hahavokatra be. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Izay tia ny ainy no mahavery izany; fa izay mankahala ny ainy amin''izao fiainana izao no hiaro izany ho amin''ny fiainana mandrakizay. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Raha misy olona manompo Ahy, dia aoka izy hanaraka Ahy, ary izay itoerako, dia ao koa no hitoeran''ny mpanompoko; raha misy olona manompo Ahy, dia hankalaza azy ny Ray. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ankehitriny mangorohoro ny fanahiko; ary ahoana no holazaiko: Ray ô, vonjeo Aho ho afaka amin''ity ora ity? nefa izao no nihaviako ho amin''ity ora ity; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ray ô, mankalazà ny anaranao. Dia nisy feo avy tany an-danitra nanao hoe: Efa nankalaza azy Aho, ary hankalaza azy indray. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary ny vahoaka izay nitsangana teo ka nahare dia nanao hoe: Kotrokorana izany. Hoy ny sasany: Anjely no niteny taminy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary Maria, rehefa naka menaka manitra nisy narda sady tsara no saro-bidy, lanjan''iray livatra, dia nanosotra ny tongotr''i Jesosy sy namaoka ny tongony tamin''ny volondohany; ary feno ny hanitry ny menaka ny trano. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Jesosy namaly ka nanao hoe: Tsy noho Izaho no nahatongavan''izany feo izany, fa noho ianareo. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Tonga ankehitriny ny fitsarana izao tontolo izao; ankehitriny ny andrianan''izao tontolo izao no horoahina. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary Izaho, raha asandratra hiala amin''ny tany, dia hitaona ny olona rehetra hanatona Ahy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Izany no nolazainy hanambara izay fahafatesana efa hiaretany. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Dia namaly Azy ny vahoaka ka nanao hoe: Efa renay tamin''ny lalàna fa Kristy haharitra mandrakizay; koa ahoana no ilazanao hoe: Tsy maintsy hasandratra ny Zanak''olona? Iza moa izany Zanak''olona izany? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Dia hoy Jesosy taminy: Mbola kely ihany no hitoeran''ny mazava aminareo. Mandehana, raha mbola manana ny mazava ianareo, mba tsy hahatratra anareo ny maizina; fa izay mandeha amin''ny maizina dia tsy mahalala izay alehany. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Raha mbola manana ny mazava ianareo, dia minoa ny mazava, mba ho tonga zanaky ny mazava. Rehefa nilaza izany Jesosy, dia niala Izy ka niery azy. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Nefa na dia efa nanao izany famantarana betsaka izany teo anatrehany aza Izy, dia tsy mba nino Azy ireo, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'mba hahatanteraka ny teny nataon''Isaia mpaminany hoe: Tompoko, iza no nino ny teny nampitondraina anay? Ary iza no nampisehoana ny sandrin''i Jehovah? (Isa. 53. 1.) '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Izany no tsy nahaizany nino, satria hoy koa Isaia: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary hoy Jodasy Iskariota, anankiray tamin''ny mpianany, ilay efa hamadika Azy: '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Efa nanajamba ny masony sy nanamafy ny fony Izy, Mba tsy hahita ny masony, na hahalala ny fony, Dia tsy hibebaka izy, Ka tsy hahasitrana azy Aho (Isa. 6. 10). '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Izany teny izany no nolazain''Isaia, satria nahita ny voninahiny izy ka nilaza Azy. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Kanefa maro tamin''ny mpanapaka aza no nino Azy; nefa noho ny Fariseo dia tsy nanaiky ireo, fandrao havoaka hiala amin''ny synagoga. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Fa tia ny voninahitra avy amin''ny olona izy ireo, fa tsy ny voninahitra avy amin''Andriamanitra. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Ary Jesosy niantso ka nanao hoe: Izay mino Ahy, dia tsy Izaho no inoany, fa Izay naniraka Ahy. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Ary izay mahita Ahy dia mahita Izay naniraka Ahy. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Izaho tonga amin''izao tontolo izao ho fahazavana, mba tsy hitoetra ao amin''ny maizina izay rehetra mino Ahy. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Ary raha misy mandre ny teniko ka tsy mitandrina, Izaho tsy mitsara azy; fa tsy tonga hitsara izao tontolo izao Aho, fa hamonjy izao tontolo izao. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Izay manda Ahy ka tsy mandray ny teniko, dia manana izay mitsara azy: ny teny izay nolazaiko, izany ihany no hitsara azy amin''ny andro farany, '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'satria Izaho tsy niteny ho Ahy, fa ny Ray Izay naniraka Ahy, Izy no nandidy Ahy izay holazaiko sy izay hotoriko. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nahoana io menaka io no tsy namidy denaria telon-jato ka nomena ny malahelo? '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Ary fantatro fa fiainana mandrakizay ny didiny; koa izay lazaiko dia lazaiko araka izay nolazain'ny Ray tamiko.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary izy no nilaza izany, tsy noho ny fiahiany ny malahelo, fa satria mpangalatra izy sady nitondra ny kitapo ka naka izay tao anatiny. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia hoy Jesosy: Avelao izy, mba hotehiriziny ho amin''ny andro hanamboarany Ahy halevina io. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa ny malahelo dia etỳ aminareo mandrakariva; fa Izaho tsy mba ho etỳ aminareo mandrakariva. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary ny vahoaka betsaka tamin''ny Jiosy nahalala fa teo Izy, dia tonga teo, nefa tsy noho Jesosy ihany, fa mba hahita an''i Lazarosy koa, ilay natsangany tamin''ny maty. '
