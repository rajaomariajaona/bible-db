document_id: GEN.48
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tso-drano nataon'i Jakoba tamin'i Manase sy Efraima, zanakalahin'i Josefa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary rehefa afaka izany, dia nisy nilaza tamin''i Josefa, hoe: Indro marary ny rainao. Dia nentiny niaraka taminy Manase sy Efraima, zanany mirahalahy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nisy nilaza tamin''i Jakoba ka nanao hoe: Indro, Josefa zanakao tamy ho etỳ aminao; dia nanatanja-tena Isiraely ka niarina teo ambonin''ny farafara. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy Jakoba tamin i Josefa: Andriamanitra Tsitoha efa niseho tamiko tany Lozy any amin''ny tany Kanana ary nitahy ahy ka nanao tamiko hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Indro, Izaho hahamaro ny taranakao, dia hampitombo anao sy hanao anao ho firenena maro; dia homeko ny taranakao mandimby anao ity tany ity ho lovany mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ankehitriny, ny zanakao mirahalahy, izay efa naterakao tatỳ amin''ny tany Egypta, fony tsy mbola tonga tatỳ aminao eto Egypta aho, dia ho ahy ireo: eny, Efraima sy Mariase dia ho ahy, tahaka an''i Robena sy Simeona. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa ny zanakao izay haterakao aorian''izy mirahalahy dia ho anao kosa, ary ny anarany hatao araka ny an''ny rahalahiny eo amin''ny zara-taniny. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary izaho, raha niala tany Mesopotamia aho, dia maty teo anatrehako Rahely tany amin''ny tany Kanana, tany an-dalana, rehefa kely foana no sisa tsy nahatongavana tao Efrata, ary nandevina azy aho teo amoron''ny lalana mankany Efrata (Betlehema izany). '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary rehefa hitan''Isiraely ny zanak''i Josefa, dia hoy izy: Iza moa ireo? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy Josefa tamin-drainy: Zanako ireto, izay nomen''Andriamanitra ahy tatỳ. Ary hoy izy : Masìna ianao, ento eto amiko izy, dia hotsofiko rano. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary efa pahina ny mason''Isiraely noho ny fahanterany, ka tsy nahita izy; dia nentin''i Josefa nanatona azy izy mirahalahy; ary Isiraely nanoroka sy namihina azy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy Isiraely tamin''i Josefa; Tsy nanampo izay hahita ny tavanao intsony aho; kanjo, indro, Andriamanitra efa nampahita ahy ny zanakao koa aza. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Josefa nampiala azy mirahalahy teo anelanelan''ny lohalik''Isiraely, dia niankohoka tamin''ny tany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia notantanan''i Josefa izy mirahalahy: Efraima tamin''ny ankavanany ho eo amin''ny ankavian''Isiraely, ary Manase tamin''ny ankaviany ho eo amin''ny ankavanan''Isiraely, ka nentiny nanatona azy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nahinjitr''Isiraely ny tanany ankavanana ka napetrany tamin''ny lohan''i Efraima, nefa izy no zandriny, fa ny tànany ankavia kosa teo amin''ny lohan''i Manase; fa niniany natao toy izany ny tànany, nefa Manase no lahimatoa. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia nitso-drano an''i Josefa izy ka nanao hoe: Andriamanitra, Izay nandehanan''i Abrahama sy Isaka razako teo anatrehany, Andriamanitra, Izay Mpiandry ahy hatrizay niainako ka mandraka androany, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ny Anjely Izay Mpamonjy ahy tamin''ny loza rehetra: Izy anie hitahy ireto zaza ireto; ary aoka ny anarako sy ny anaran''i Abrahama sy Isaka raiko no hanononana azy, ary hitombo ho maro dia maro eo amin''ny tany anie izy. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary rehefa hitan''i Josefa fa ny rainy nametraka ny tànany ankavanana teo amin''ny lohan''i Efraima, dia tsy sitrany izany; ka noraisiny ny tanan''ny rainy, mba hampiala azy amin''ny lohan''i Efraima ho amin''ny lohan''i Manase, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ka hoy Josefa tamin''ny rainy: Tsy izao no izy, ry ikaky; fa ity no lahimatoa, ka apetraho eo amin''ny lohany ny tananao ankavanana. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa tsy nety ny rainy, fa nanao hoe: Fantatro ihany, anaka, fantatro ihany, izy koa ho tonga firenena, ary izy koa ho lehibe; kanefa ny zandriny ho lehibe noho izy, ary ny taranany ho firenena maro. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nitso-drano azy tamin''izany andro izany izy ka nanao hoe: Hianao no hitsofan''ny Isiraely rano hoe: Hataon''Andriamanitra tahaka an''i Efraima sy tahaka an''i Manase anie ianao. Ary Efraima no nataony alohan''i Manase. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy Isiraely tamin''i Josefa: Indro, ho faty aho, nefa Andriamanitra homba anareo ka hampody anareo indray ho any amin''ny tanindrazanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary izaho manome anao zara-tany iray ho tombon-dahinao amin'ny rahalahinao, izay nalaiko tamin'ny sabatro sy ny tsipikako teo an-tànan'ny Amorita.
