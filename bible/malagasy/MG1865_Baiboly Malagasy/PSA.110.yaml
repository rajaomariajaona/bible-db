document_id: PSA.110,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny haherezan'ny Mpanjakan'i Ziona, Izay sady Mpanjaka no Mpisorona
  - type: text
    content: 'Salamo nataon''i Davida. Izao no lazain''i Jehovah amin''ny Tompoko: Mipetraha eo an-tanako ankavanana Ambara-panaoko ny fahavalonao ho fitoeran-tongotrao.'
  '2':
  - type: text
    content: 'Ny tehin''ny herinao Havoak''i Jehovah avy ao Ziona; Manapaha eo amin''ny fahavalonao Hianao. '
  '3':
  - type: text
    content: Ny olonao dia mazoto manolo-tena amin'ny andro anafihanao
  - type: note
    content: 'Na: andron''ny herinao'
  - type: text
    content: '; Amin''ny fihaingoana masina, tahaka ny ando ateraky ny maraina ho Anao ny zatovonao. '
  '4':
  - type: text
    content: 'Efa nianiana Jehovah ka tsy hanenina: Hianao no Mpisorona mandrakizay Araka ny fanaon''i Melkizedeka.'
  '5':
  - type: text
    content: 'Ny Tompo eo an-kavananao Dia handripaka ny mpanjaka maro amin''ny andron''ny fahatezerany '
  '6':
  - type: text
    content: Hitsara any amin'ny jentilisa Izy ka hampiampatrampatra faty any; Handripaka loholona
  - type: note
    content: Heb. loha
  - type: text
    content: ' any amin''ny tany malalaka Izy. '
  '7':
  - type: text
    content: Hisotro amin'ny ony any an-dalana Izy, Ka izany no hitrakan'ny lohany.
