document_id: PSA.110
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny haherezan'ny Mpanjakan'i Ziona, Izay sady Mpanjaka no Mpisorona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Salamo nataon''i Davida. Izao no lazain''i Jehovah amin''ny Tompoko: Mipetraha eo an-tanako ankavanana Ambara-panaoko ny fahavalonao ho fitoeran-tongotrao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny tehin''ny herinao Havoak''i Jehovah avy ao Ziona; Manapaha eo amin''ny fahavalonao Hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny olonao dia mazoto manolo-tena amin'ny andro anafihanao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: andron''ny herinao'
    marker-yv: yv-n
  - type: text
    text: '; Amin''ny fihaingoana masina, tahaka ny ando ateraky ny maraina ho Anao ny zatovonao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Efa nianiana Jehovah ka tsy hanenina: Hianao no Mpisorona mandrakizay Araka ny fanaon''i Melkizedeka.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny Tompo eo an-kavananao Dia handripaka ny mpanjaka maro amin''ny andron''ny fahatezerany '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hitsara any amin'ny jentilisa Izy ka hampiampatrampatra faty any; Handripaka loholona
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. loha
    marker-yv: yv-n
  - type: text
    text: ' any amin''ny tany malalaka Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hisotro amin'ny ony any an-dalana Izy, Ka izany no hitrakan'ny lohany.
