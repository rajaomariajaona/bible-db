document_id: ZEC.9,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny handravana ny firenena maro, sy ny voninahitra ho azon'i Ziona kosa
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Teny faminaniana avy tamin'i Jehovah ny amin'ny loza hanjo ny tany Hadraka, Ary Damaskosy no hiharany - Fa ny mason'i Jehovah mandinika ny olombelona
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'na: fa mijery an''i Jehovah ny mason''ny olombelona'
      marker-yv: yv-n
    - type: text
      text: ' Mbamin''ny firenena rehetra amin''ny Isiraely - '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary hofoanako tsy hisy kalesy intsony Efraima, Na soavaly any Jerosalema, Hofoanana koa ny tsipìka fiadiana, Ary hiteny fiadanana amin'ny jentilisa Izy; Ny fanapahany dia hatramin'ny ranomasina ka hatramin'ny ranomasina Ary hatramin'ny Ony
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eofrata
      marker-yv: yv-n
    - type: text
      text: ' ka hatramin''ny faran''ny tany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ny aminao koa, noho ny ran''ny fanekena taminao No efa namoahako ny mpifatotrao avy tao an-davaka tsy misy rano. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Miverena ho amin''ny fiarovana mafy, ianareo mpifatotra manana ny fanantenana! Anio no hanambarako hoe: Hanonitra roa heny ho anao Aho. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa nohenjaniko ho Ahy Joda, Efraima nataoko zana-tsipìka; Ary hotairiko ny zanakao, ry Ziona, hiady amin''ny zanakao, ry Grisia, Ary hataoko toy ny sabatry ny lehilahy mahery ianao, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary Jehovah hiseho ao aminy, Ka handeha toy ny helatra ny zana-tsipìkany, Jehovah Tompo hitsoka anjomara Ka handeha amin''ny tafio-drivotra any atsimo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary Jehovah, Tompon''ny maro, no hiaro ireny; Dia hihinana ireny ka hanitsakitsaka vaton''antsamotady; Ary hisotro ireny ka hihorakoraka tahaka ny azon''ny divay, Ary ho feno toy ny lovia famafazana ireny, dia toy ny zoron''ny alitara. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary hovonjen''i Jehovah Andriamaniny ireny amin''izany andro izany Toy ny olona izay ondriny; Fa ho toy ny vaton-tsatro-boninahitra Mamirapiratra eny amin''ny taniny ireny. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Fa akory ny hasoany! ary akory ny hatsaran-tarehiny! Vary no hampaharoroka
    - type: usfm
      marker: x
      children:
      - type: text
        text: heb. hampitsimoka
      marker-yv: yv-n
    - type: text
      text: ' ny zatovo, Ary ranom-boaloboka kosa ny zazavavy.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Sy Hamata koa, izay mifanolotra aminy, Ary Tyro sy Sidona koa, satria hendry izy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary Tyro nanao manda mafy ho azy Ka nanangona volafotsy hoatra ny vovoka Sy volamena tsara hoatra ny fotaka eny an-dalambe. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Indro, hofoanan''ny Tompo ny fananany, Sady hasiany koa ny heriny ao amin''ny ranomasina; Ary ny tenany ho levon''ny afo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Askelona hahita izany ka ho raiki-tahotra, Gaza koa, ka ho toran-kovitra indrindra, Ary Ekrona, fa ho tonga henatra ny fanantenany; Tsy hisy mpanjaka intsony ao Gaza, Ary Askelona tsy honenana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Zazasary no ho mpanjaka ao Asdoda, Ary hofoanako ny reharehan''ny Filistina. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Hesoriko eny am-bavany ny ràny, Sy ny fahavetavetany tsy ho eny anelanelan''ny nifiny; Ary izy koa ho sisa ho an''Andriamanitsika Sy ho toy ny lohany amin''ny firenen''i Joda, Ary Ekrona ho toy ny Jebosita. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ary hitoby Aho hiaro ny tranoko noho ny miaramila betsaka, Dia noho izay mandroso sy miverina; Ary
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'na: mba tsy hisy mandroso na miverina, ka'
      marker-yv: yv-n
    - type: text
      text: ' tsy hisy mpampahory handeha hamaky eo aminy intsony, Fa ankehitriny dia efa hitan''ny masoko. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mifalia indrindra, ry Ziona zanakavavy; Manaova feo fifaliana, ry Jerosalema zanakavavy; Indro, ny Mpanjakanao avy ho anao
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'na: ho atỳ aminao'
      marker-yv: yv-n
    - type: text
      text: ; Marina Izy sady manam-pamonjena
    - type: usfm
      marker: x
      children:
      - type: text
        text: heb. voavonjy
      marker-yv: yv-n
    - type: text
      text: ', Malemy fanahy sady mitaingina boriky Dia zana-boriky tanora. '
