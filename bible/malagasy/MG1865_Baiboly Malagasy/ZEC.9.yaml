document_id: ZEC.9,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny handravana ny firenena maro, sy ny voninahitra ho azon'i Ziona kosa
  - type: text
    content: Teny faminaniana avy tamin'i Jehovah ny amin'ny loza hanjo ny tany Hadraka, Ary Damaskosy no hiharany - Fa ny mason'i Jehovah mandinika ny olombelona
  - type: note
    content: 'na: fa mijery an''i Jehovah ny mason''ny olombelona'
  - type: text
    content: ' Mbamin''ny firenena rehetra amin''ny Isiraely - '
  '10':
  - type: text
    content: Ary hofoanako tsy hisy kalesy intsony Efraima, Na soavaly any Jerosalema, Hofoanana koa ny tsipìka fiadiana, Ary hiteny fiadanana amin'ny jentilisa Izy; Ny fanapahany dia hatramin'ny ranomasina ka hatramin'ny ranomasina Ary hatramin'ny Ony
  - type: note
    content: Eofrata
  - type: text
    content: ' ka hatramin''ny faran''ny tany. '
  '11':
  - type: text
    content: 'Ny aminao koa, noho ny ran''ny fanekena taminao No efa namoahako ny mpifatotrao avy tao an-davaka tsy misy rano. '
  '12':
  - type: text
    content: 'Miverena ho amin''ny fiarovana mafy, ianareo mpifatotra manana ny fanantenana! Anio no hanambarako hoe: Hanonitra roa heny ho anao Aho. '
  '13':
  - type: text
    content: 'Fa nohenjaniko ho Ahy Joda, Efraima nataoko zana-tsipìka; Ary hotairiko ny zanakao, ry Ziona, hiady amin''ny zanakao, ry Grisia, Ary hataoko toy ny sabatry ny lehilahy mahery ianao, '
  '14':
  - type: text
    content: 'Ary Jehovah hiseho ao aminy, Ka handeha toy ny helatra ny zana-tsipìkany, Jehovah Tompo hitsoka anjomara Ka handeha amin''ny tafio-drivotra any atsimo. '
  '15':
  - type: text
    content: 'Ary Jehovah, Tompon''ny maro, no hiaro ireny; Dia hihinana ireny ka hanitsakitsaka vaton''antsamotady; Ary hisotro ireny ka hihorakoraka tahaka ny azon''ny divay, Ary ho feno toy ny lovia famafazana ireny, dia toy ny zoron''ny alitara. '
  '16':
  - type: text
    content: 'Ary hovonjen''i Jehovah Andriamaniny ireny amin''izany andro izany Toy ny olona izay ondriny; Fa ho toy ny vaton-tsatro-boninahitra Mamirapiratra eny amin''ny taniny ireny. '
  '17':
  - type: text
    content: Fa akory ny hasoany! ary akory ny hatsaran-tarehiny! Vary no hampaharoroka
  - type: note
    content: heb. hampitsimoka
  - type: text
    content: ' ny zatovo, Ary ranom-boaloboka kosa ny zazavavy.'
  '2':
  - type: text
    content: 'Sy Hamata koa, izay mifanolotra aminy, Ary Tyro sy Sidona koa, satria hendry izy. '
  '3':
  - type: text
    content: 'Ary Tyro nanao manda mafy ho azy Ka nanangona volafotsy hoatra ny vovoka Sy volamena tsara hoatra ny fotaka eny an-dalambe. '
  '4':
  - type: text
    content: 'Indro, hofoanan''ny Tompo ny fananany, Sady hasiany koa ny heriny ao amin''ny ranomasina; Ary ny tenany ho levon''ny afo. '
  '5':
  - type: text
    content: 'Askelona hahita izany ka ho raiki-tahotra, Gaza koa, ka ho toran-kovitra indrindra, Ary Ekrona, fa ho tonga henatra ny fanantenany; Tsy hisy mpanjaka intsony ao Gaza, Ary Askelona tsy honenana. '
  '6':
  - type: text
    content: 'Zazasary no ho mpanjaka ao Asdoda, Ary hofoanako ny reharehan''ny Filistina. '
  '7':
  - type: text
    content: 'Hesoriko eny am-bavany ny ràny, Sy ny fahavetavetany tsy ho eny anelanelan''ny nifiny; Ary izy koa ho sisa ho an''Andriamanitsika Sy ho toy ny lohany amin''ny firenen''i Joda, Ary Ekrona ho toy ny Jebosita. '
  '8':
  - type: text
    content: Ary hitoby Aho hiaro ny tranoko noho ny miaramila betsaka, Dia noho izay mandroso sy miverina; Ary
  - type: note
    content: 'na: mba tsy hisy mandroso na miverina, ka'
  - type: text
    content: ' tsy hisy mpampahory handeha hamaky eo aminy intsony, Fa ankehitriny dia efa hitan''ny masoko. '
  '9':
  - type: text
    content: Mifalia indrindra, ry Ziona zanakavavy; Manaova feo fifaliana, ry Jerosalema zanakavavy; Indro, ny Mpanjakanao avy ho anao
  - type: note
    content: 'na: ho atỳ aminao'
  - type: text
    content: ; Marina Izy sady manam-pamonjena
  - type: note
    content: heb. voavonjy
  - type: text
    content: ', Malemy fanahy sady mitaingina boriky Dia zana-boriky tanora. '
