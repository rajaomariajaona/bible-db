document_id: ISA.60
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny ho voninahitr'i Jerosalema amin'ny andro ho avy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mitsangàna, mihazavà, fa tonga ny fahazavanao, ary ny voninahitr''i Jehovah efa miposaka aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa, indro, ny aizina manarona ny tany, ary ny aizim-pito manarona ny firenena; fa aminao kosa no iposahan''i Jehovah, ary aminao no isehoan''ny voninahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ny firenena manatona ny fahazavanao, ary ny mpanjaka mankeo amin''ny famirapiratan''ny fiposahanao. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Atopazy manodidina ny masonao ka jereo! Izy rehetra dia mivory ka mankaty aminao; Ny zanakao-lahy dia avy lavitra, ny zanakao-vavy dia sakelehina. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hahita izany ianao ka ho miramirana, dia hiemponempona sady hohalehibiazina ny fonao; fa ho entina ho anao ny haren''ny ranomasina, ary hafindra ho anao ny fananan''ny firenena. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ho feno ny rameva betsaka ao aminao, dia ny rameva tanora avy any Midiana sy Efaha, samy avy any Sheba izy rehetra; volamena sy ditin-kazo mani-pofona no ho entiny, ary ny fiderana an''i Jehovah no teny mahafaly hambarany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny ondry aman''osy rehetra any kedara dia hangonina ho ao aminao, ary ny ondrilahin''i Nebaiota hanompo anao; hiakatra amin''ny fankasitrahana ho eo ambonin''ny alitarako ireo, ary hataoko be voninahitra ny tranon''ny voninahitro. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Iza moa ireto manidina tahaka ny rahona ary tahaka ny voromailala ho amin''ny varavarankeliny? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa Izaho no andrasan''ny nosy, ary ny sambon''i Tarsisy ho loha-lalana, Hitondra ny zanakao avy lavitra mbamin''ny volafotsiny sy ny volamenany, ho an''ny anaran''i Jehovah Andriamanitrao sy ho an''ny Iray Masin''ny Isiraely, Satria efa nanome voninahitra anao Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ny hafa firenena no hanangana ny mandanao, ary ny mpanjakany hanompo anao; fa tamin''ny fahatezerako no namelezako anao. Ary amin''ny fitiavako kosa no amindrako fo aminao, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary hidanadana mandrakariva ny vavahadinao, tsy hirindrina izy na andro na alina, hampidirana ny haren'ny firenena sy ny mpanjakany izay efa voababo ho ao aminao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa ho levona izay firenena sy fanjakana tsy hanompo anao; eny, ireny firenena ireny hofongorana tokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny voninahitr''i Libanona ho tonga aminao, ny hazo kypreso sy ny pina ary ny bokso koa handravahana ny fitoerako masina, ary hasiako voninahitra ny fitoeran-tongotro. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny zanak''izay nampahory anao dia handeha hiondrika eo anatrehanao, ary hiankohoka amin''ny faladianao izay rehetra nanamavo anao; ary izy hanao anao hoe Tanànan''i Jehovah, Zionan''ny Iray Masin''ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ho solon''ny nahafoizana anao sy ny nankahalana anao ary ny tsy nandehanan''olona namaky anao, dia hasandratro ho rehareha mandrakizay ianao, eny, ho fifaliana hatramin''ny taranaka fara mandimby. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hinono amin''ny jentilisa ianao sady hinono amin''ny mpanjaka; ka dia ho fantatrao fa Izaho Jehovah no Mpamonjy anao, ary Ilay Maherin''i Jakoba no Mpanavotra anao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Hahatonga volamena Aho ho solom-barahina, ary hahatonga volafotsy ho solom-by, ary varahina ho solon-kazo, ary vy ho solom-bato; ny fiadanana no hataoko fanapahana anao, ary ny fahamarinana no ho mpampiasa anao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Hataoko fiadanana ny fanapahana anao ary fahamarinana ny mpampiasa anao'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ny fampahoriana tsy ho re eo amin''ny taninao intsony, na ny fandravana sy ny fandringanana ao anatin''ny fari-taninao; ny mandanao dia hataonao hoe Famonjena, ary ny vavahadinao hataonao hoe Fiderana. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tsy ny masoandro intsony no ho fanazavana anao nony andro; ary tsy ny fangarangaran''ny volana no hanazava anao; fa Jehovah no ho fanazavana anao mandrakizay, ary Andriamanitrao no ho voninahitrao. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tsy hilentika intsony ny masoandronao, ary ny volanao tsy hisoka; fa Jehovah no ho fanazavana anao mandrakizay, ary ho tapitra ny andro fahalahelovanao. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny olonao rehetra ho marina avokoa; hanana ny tany ho mandrakizay izy, eny, ho voly maitso eo amin''ny sahako. Asan''ny tanako ho fampisehoam-boninahitra. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny kely ho tonga arivo, ary ny malemy ho tonga firenena mahery; Izaho Jehovah no hanafaingana izany amin'ny fotoany.
