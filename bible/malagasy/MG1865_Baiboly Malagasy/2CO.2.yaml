document_id: 2CO.2,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Fa ninia toy izao tato am-poko aho, dia ny tsy hankatỳ aminareo indray amin''alahelo. '
  '10':
  - type: text
    content: Fa izay avelanareo heloka dia mba avelako heloka koa; ary izaho anefa,raha nisy heloka navelako, dia noho ny aminareo no namelako azy teo imason
  - type: note
    content: 'Na: nisolo anay'
  - type: text
    content: '''i Kristy, '
  '11':
  - type: text
    content: 'fandrao ho resin''ny fitak''i Satana isika, fa fantatsika ny hafetseny. '
  '12':
  - type: text
    content: 'Ary rehefa tonga tany Troasy hitory ny filazantsaran''i Kristy aho, ka novohana varavarana ao amin''ny Tompo, '
  '13':
  - type: text
    content: 'dia tsy tafandry ny fanahiko, satria tsy nahita an''i Titosy rahalahiko aho; fa nanao veloma ny olona aho, dia niala teo nankany Makedonia. '
  '14':
  - type: text
    content: 'Fa isaorana anie Andriamanitra, Izay mitondra anay mandrakariva ao amin''i Kristy toy ny fanaon''izay avy nandresy, ka dia ampisehoany ny hanitry ny fahalalana Azy eny tontolo eny izahay. '
  '15':
  - type: text
    content: 'Fa hanitr''i Kristy ho an''Andriamanitra izahay amin''izay hovonjena sy izay ho very: '
  '16':
  - type: text
    content: 'amin''ny sasany dia hanitra avy amin''ny fahafatesana ho amin''ny fahafatesana; fa amin''ny sasany kosa dia hanitra avy amin''ny fiainana ho amin''ny fiainana. Koa iza moa no antonona ho amin''izany zavatra izany? '
  '17':
  - type: text
    content: Fa tsy mba toy ny maro izay manatsatso ny tenin'Andriamanitra hahazoam-bola izahay; fa toy ny amin'ny fahadiovam-po kosa, dia avy amin'Andriamanitra sady eo anatrehan'Andriamanitra no itenenanay ao amin'i Kristy.
  '2':
  - type: text
    content: 'Fa raha mampalahelo anareo aho, iza moa no mampifaly ahy, afa-tsy ilay nampalaheloviko ihany? '
  '3':
  - type: text
    content: 'Ary nanoratra izany indrindra aho, fandrao, rehefa tonga aho, dia hahazo alahelo amin''izay tokony hifaliako, satria matoky anareo rehetra aho, fa ny fifaliako dia anareo rehetra koa. '
  '4':
  - type: text
    content: 'Fa tamin''ny haben''ny fahoriana sy ny alahelon''ny foko no nanoratako taminareo tamin''ny ranomaso be, tsy ny hampalahelovana anareo, fa ny mba hahafantaranareo ny fitiavana izay itiavako anareo indrindra. '
  '5':
  - type: text
    content: 'Fa raha nisy efa nampalahelo, dia tsy nampalahelo ahy ihany izy (nefa tsy ta-hanao teny mafy loatra aho), fa mba nampalahelo anareo rehetra koa. '
  '6':
  - type: text
    content: 'Ampy ho amin''izany olona izany ny fampijaliana nataon''ny maro, '
  '7':
  - type: text
    content: ka dia aleo mamela heloka sy mampifaly azy kosa ianareo, fandrao dia resin
  - type: note
    content: Gr. atelin'
  - type: text
    content: '''ny fitomboan''alahelo izany olona izany. '
  '8':
  - type: text
    content: 'Koa mananatra anareo aho mba hekenareo horaisina tsara amin''ny fitiavana izy. '
  '9':
  - type: text
    content: 'Fa izany koa no nanoratako, mba ho fantatro izay toetrareo, na manaiky amin''ny zavatra rehetra ianareo,na tsia. '
