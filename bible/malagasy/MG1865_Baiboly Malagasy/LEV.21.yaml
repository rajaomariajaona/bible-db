document_id: LEV.21,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lalàna ny amin'ny fahamasinan'ny mpisorona
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: Mitenena amin''ireo mpisorona, zanak''i Arona, hoe: Aoka ianareo tsy hisy hiditra am-paty eo amin''ny fireneny, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpisoronabe, izay nalaina tamin''ny rahalahiny, ka nanidinana ny diloilo fanosorana ny lohany, sady natokana hitafy ny fitafiana, dia aoka tsy hirakaraka volo, na handriatra ny fitafiany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary aoka tsy hiditra am-paty akory izy, ka tsy handoto ny tenany na dia amin''ny rainy aman-dreniny aza. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary aoka tsy hivoaka avy amin''ny fitoerana masina izy, na handoto ny fitoera-masin''Andriamaniny; fa ny diademany, dia ny diloilo fanosoran''Andriamaniny azy, no eo an-dohany: Izaho no Jehovah. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary aoka hampakatra izay vehivavy mbola virijina izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny maty vady, na ny efa nisaorana, na ny voaloto tamin''ny fijangajangana, dia tsy azony hampakarina, fa virijina avy amin''ny fireneny ihany no hampakariny. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary aoka tsy hanao izay hahaloto ny taranany eo amin''ny fireneny izy; fa Izaho Jehovah no manamasina azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitenena amin''i Arona hoe: Izay rehetra misy kilema amin''ny zanakao, amin''ny taranany hatramin''ny fara mandimby, dia aoka tsy hanakaiky fanatitra ny hanin''Andriamaniny; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izay rehetra misy kilema dia tsy mahazo manakaiky hanao izany na ny jamba, na ny mandringa, na ny petaka orona, na ny manana amby, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'na ny tapa-tongotra, na ny tapa-tanana, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afa-tsy amin''ny tahaka ny tenany, dia ny reniny sy ny rainy sy ny zananilahy sy ny zananivavy ary ny rahalahiny; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'na ny vokoka, na ny sahozanina, na ny misy pentimpentina eo amin''ny masony, na ny hatenina, na ny tsingaohina, na ny torotoro vihy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny olona rehetra amin''ny zanak''i Arona mpisorona izay misy kilema dia tsy mahazo manakaiky hanatitra ny fanatitra atao amin''ny afo ho an''i Jehovah; misy kilema izy ka tsy mahazo manakaiky hanatitra ny hanin''Andriamaniny. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny hanin''Andriamaniny, izay avy amin''ny zavatra masina indrindra sy ny zavatra masina, dia azony hanina ihany; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'kanefa tsy mahazo miditra ao anatin''ny efitra lamba na manakaiky ny alitara izy, satria misy kilema, mba tsy handoto ny fitoerako masina izy, fa Izaho Jehovah no manamasina azy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Mosesy dia nilaza izany tamin'i Arona sy ny zanany ary ny Zanak'Isiraely rehetra.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary amin''ny fatin''ny anabaviny, izay tahaka ny tenany ihany koa sady tsy mbola manam-bady fa virijina, no ahazoany mandoto ny tenany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy hiditra am-paty hametaveta ny tenany izy, satria andriana eo amin''ny fireneny izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy hanasola ny lohany izy, na hanaratra ny vaokany, na hitetika ny tenany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho masina ho an''Andriamaniny izy ka tsy hanamavo ny anaran''Andriamaniny; fa mpanatitra ny fanatitra atao amin''ny afo ho an''i Jehovah izy, dia ny hanin''Andriamaniny, ka dia tokony ho masina. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aoka tsy hanambady izay vehivavy mpijangajanga ka voaloto izy, ary aoka tsy hanambady vehivavy izay efa nisaoran''ny lahy; fa masina ho an''Andriamaniny ny mpisorona. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hamasino izy, fa ny hanin''Andriamanitrao no ateriny; ho masina aminao izy, fa masina Aho Jehovah, Izay manamasina anareo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha ny zanakavavin''ny mpisorona mandoto ny tenany amin''ny fijangajangana, dia efa manamavo ny rainy izy ka hodorana amin''ny afo. '
