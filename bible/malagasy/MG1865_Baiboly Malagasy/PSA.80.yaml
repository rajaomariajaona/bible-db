document_id: PSA.80,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fivavahana ho an'ny Isiraely, voalobok'i Jehovah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ho an''ny mpiventy hira. Al-shoshanim-edoth. Salamo nataon''i Asafa. Ry Mpiandry ny Isiraely ô, mihainoa, Hianao Izay mitondra an''i Josefa toy ny ondry; Hianao, Izay mipetraka amin''ny kerobima, mamirapiratra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Nanaloka ny tendrombohitra ny alokalony, ary ny sampany nanaloka ny sedera andrian-kazo
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Heb: sederan''Andriamanitra'
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Nampisandrahaka ny rantsany hatramin'ny ranomasina izy, ary ny sakeliny hatramin'ny Ony
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eofrata
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Nahoana no noravànao ny fefiny ka anotazan''izay rehetra mandalo eny an-dalana izy? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ny lambo avy any an''ala mitrongy azy; ary izay bibi-dia any an-tsaha mandàny azy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ry Andriamanitry ny maro ô, miverena, ka tsilovy any an-danitra, ary jereo, ka vangio ity voaloboka ity. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Arovy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Dia'
      marker-yv: yv-n
    - type: text
      text: ' izay nambolen''ny tananao ankavanana sy ny zanaka izay nampaherezinao ho Anao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Voadotry ny afo izy sady voakapa; fongotry ny fananaran'ny tavanao izy.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Aoka ny tananao ho amin''ny lehilahin''ny tananao ankavanana, dia amin''ny zanak''olombelona izay nampaherezinao ho Anao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia tsy hihemotra hiala aminao izahay; velomy izahay, dia hiantso ny anaranao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ry Jehovah, Andriamanitry ny maro ô, ampodio izahay; ampamirapirato ny tavanao, ary aoka hovonjena Izahay.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fohazy ny herinao eo anoloan''i Efraima sy Benjamina ary Manase, ka avia hamonjy anay. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Andriamanitra ô, ampodio izahay, ka ampamirapirato ny Tavanao, ary aoka hovonjena izahay.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Jehovah, Andriamanitry ny maro ô, mandra-pahoviana no hanetroka amin'ny fivavaky ny olonao
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: na dia mivavaka aza ny olonao'
      marker-yv: yv-n
    - type: text
      text: ' ny fahatezeranao? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mampihinana azy mofo len-dranomaso Hianao, ary mampisotro azy ranomaso tovozina. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ataonao ho fifandirana amin''ny mifanila fonenana aminay izahay; ary ny fahavalonay mifaly handatsa. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Andriamanitry ny maro ô, ampodio izahay, ka ampamirapirato ny tavanao, ary aoka hovonjena izahay.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Nisy voaloboka nafindranao avy tany Egypta; nandroaka ny jentilisa Hianao ka namboly azy kosa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nitevy teo alohany Hianao, dia namaka lalina izy ka nameno ny tany. '
