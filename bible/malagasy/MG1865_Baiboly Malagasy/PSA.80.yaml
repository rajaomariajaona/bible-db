document_id: PSA.80,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fivavahana ho an'ny Isiraely, voalobok'i Jehovah
  - type: text
    content: 'Ho an''ny mpiventy hira. Al-shoshanim-edoth. Salamo nataon''i Asafa. Ry Mpiandry ny Isiraely ô, mihainoa, Hianao Izay mitondra an''i Josefa toy ny ondry; Hianao, Izay mipetraka amin''ny kerobima, mamirapiratra. '
  '10':
  - type: text
    content: Nanaloka ny tendrombohitra ny alokalony, ary ny sampany nanaloka ny sedera andrian-kazo
  - type: note
    content: 'Heb: sederan''Andriamanitra'
  - type: text
    content: '. '
  '11':
  - type: text
    content: Nampisandrahaka ny rantsany hatramin'ny ranomasina izy, ary ny sakeliny hatramin'ny Ony
  - type: note
    content: Eofrata
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Nahoana no noravànao ny fefiny ka anotazan''izay rehetra mandalo eny an-dalana izy? '
  '13':
  - type: text
    content: 'Ny lambo avy any an''ala mitrongy azy; ary izay bibi-dia any an-tsaha mandàny azy. '
  '14':
  - type: text
    content: 'Ry Andriamanitry ny maro ô, miverena, ka tsilovy any an-danitra, ary jereo, ka vangio ity voaloboka ity. '
  '15':
  - type: text
    content: Arovy
  - type: note
    content: 'Na: Dia'
  - type: text
    content: ' izay nambolen''ny tananao ankavanana sy ny zanaka izay nampaherezinao ho Anao. '
  '16':
  - type: text
    content: Voadotry ny afo izy sady voakapa; fongotry ny fananaran'ny tavanao izy.
  '17':
  - type: text
    content: 'Aoka ny tananao ho amin''ny lehilahin''ny tananao ankavanana, dia amin''ny zanak''olombelona izay nampaherezinao ho Anao. '
  '18':
  - type: text
    content: 'Dia tsy hihemotra hiala aminao izahay; velomy izahay, dia hiantso ny anaranao. '
  '19':
  - type: text
    content: Ry Jehovah, Andriamanitry ny maro ô, ampodio izahay; ampamirapirato ny tavanao, ary aoka hovonjena Izahay.
  '2':
  - type: text
    content: 'Fohazy ny herinao eo anoloan''i Efraima sy Benjamina ary Manase, ka avia hamonjy anay. '
  '3':
  - type: text
    content: Andriamanitra ô, ampodio izahay, ka ampamirapirato ny Tavanao, ary aoka hovonjena izahay.
  '4':
  - type: text
    content: Jehovah, Andriamanitry ny maro ô, mandra-pahoviana no hanetroka amin'ny fivavaky ny olonao
  - type: note
    content: 'Na: na dia mivavaka aza ny olonao'
  - type: text
    content: ' ny fahatezeranao? '
  '5':
  - type: text
    content: 'Mampihinana azy mofo len-dranomaso Hianao, ary mampisotro azy ranomaso tovozina. '
  '6':
  - type: text
    content: 'Ataonao ho fifandirana amin''ny mifanila fonenana aminay izahay; ary ny fahavalonay mifaly handatsa. '
  '7':
  - type: text
    content: Andriamanitry ny maro ô, ampodio izahay, ka ampamirapirato ny tavanao, ary aoka hovonjena izahay.
  '8':
  - type: text
    content: 'Nisy voaloboka nafindranao avy tany Egypta; nandroaka ny jentilisa Hianao ka namboly azy kosa. '
  '9':
  - type: text
    content: 'Nitevy teo alohany Hianao, dia namaka lalina izy ka nameno ny tany. '
