document_id: MAT.7,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Aza mitsara, mba tsy hotsaraina ianareo. '
  '10':
  - type: text
    content: 'ary raha angatahany hazandrano, no hanome azy menarana? '
  '11':
  - type: text
    content: 'Koa raha ianareo, na dia ratsy aza, mahalala hanome zava-tsoa ho an''ny zanakareo, tsy mainka va ny Rainareo Izay any an-danitra no hanome zava-tsoa ho an''izay mangataka aminy? '
  '12':
  - type: text
    content: Koa amin'izany na inona na inona tianareo hataon'ny olona aminareo, dia mba ataovy aminy kosa tahaka izany; fa izany no lalàna sy mpaminany.
  '13':
  - type: text
    content: 'Midira amin''ny vavahady èty ianareo; fa lehibe ny vavahady, ary malalaka ny lalana izay mankany amin''ny fahaverezana, ka maro ny miditra any. '
  '14':
  - type: text
    content: Fa èty ny vavahady, ary tery ny lalana izay mankany amin'ny fiainana, ka vitsy ny mahita azy.
  '15':
  - type: text
    content: Mitandrema ianareo, fandrao ho voafitaky ny mpaminany sandoka, izay mankao aminareo amin'ny fitafian'ny ondry, fa ao anatiny dia amboadia
  - type: note
    content: lopa
  - type: text
    content: ' mitoha izy. '
  '16':
  - type: text
    content: 'Ny voany no hahafantaranareo azy. Manoty voaloboka amin''ny tsilo va ny olona, na aviavy amin''ny songosongo? '
  '17':
  - type: text
    content: 'Dia toy izany, ny hazo tsara rehetra dia mamoa voa tsara; fa ny hazo ratsy rehetra dia mamoa voa ratsy. '
  '18':
  - type: text
    content: 'Ny hazo tsara tsy mety mamoa voa ratsy, ary ny hazo ratsy tsy mety mamoa voa tsara. '
  '19':
  - type: text
    content: 'Ny hazo rehetra izay tsy mamoa voa tsara dia hokapaina ka hatsipy any anaty afo. '
  '2':
  - type: text
    content: 'Fa araka ny fitsarana ataonareo no hitsarana anareo; ary araka ny ohatra ataonareo no hanoharana ho anareo. '
  '20':
  - type: text
    content: Ka dia ny voany no hahafantaranareo azy.
  '21':
  - type: text
    content: 'Tsy izay rehetra manao amiko hoe: Tompoko, Tompoko, no hiditra amin''ny fanjakan''ny lanitra, fa izay manao ny sitrapon''ny Raiko Izay any an-danitra. '
  '22':
  - type: text
    content: 'Maro no hanao amiko amin''izany andro izany hoe: Tompoko, Tompoko, tsy efa naminany tamin''ny anaranao va izahay? ary tsy efa namoaka demonia'
  - type: note
    content: Demonia = fanahy ratsy, na anjely ratsy
  - type: text
    content: ' tamin''ny anaranao va izahay? Ary tsy efa nanao asa lehibe maro tamin''ny anaranao va izahay? '
  '23':
  - type: text
    content: 'Ary dia hambarako aminy marimarina hoe: Tsy mba fantatro akory ianareo hatrizay hatrizay; mialà amiko, ianareo mpanao meloka.'
  '24':
  - type: text
    content: 'Koa amin''izany na zovy na zovy no mandre izany teniko izany ka mankatò azy, dia hoharina amin''ny lehilahy manan-tsaina izy, izay nanorina ny tranony teo ambonin''ny vatolampy. '
  '25':
  - type: text
    content: 'Ary latsaka ny ranonorana, ka nisy riaka be, sady nifofofofo ny rivotra ka namely izany trano izany; nefa tsy nianjera izy, satria efa naorina teo ambonin''ny vatolampy. '
  '26':
  - type: text
    content: 'Fa izay rehetra mandre izany teniko izany, nefa tsy mankatò azy, dia hoharina amin''ny lehilahy adala, izay nanorina ny tranony teo ambonin''ny fasika. '
  '27':
  - type: text
    content: Ary latsaka ny ranonorana, ka nisy riaka be, sady nifofofofo ny rivotra ka namely izany trano izany; dia nianjera izy, ka loza ny fianjerany.
  '28':
  - type: text
    content: 'Ary nony efa vitan''i Jesosy izany teny izany, dia talanjona ny vahoaka noho ny fampianarany, '
  '29':
  - type: text
    content: satria nampianatra azy toy izay manana fahefana Izy, fa tsy tahaka ny mpanora-dalàna teo aminy.
  '3':
  - type: text
    content: 'Ary nahoana ianao no mijery ny sombin-kazo eo amin''ny mason''ny rahalahinao, fa ny andry eo amin''ny masonao dia tsy mba tsaroanao? '
  '4':
  - type: text
    content: 'Ary ahoana no hilazanao amin''ny rahalahinao hoe: Aoka aho hanaisotra ny sombin-kazo eo amin''ny masonao; nefa, indro, ny andry eo amin''ny masonao? '
  '5':
  - type: text
    content: Ry mpihatsaravelatsihy, esory aloha ny andry eo amin'ny masonao, ary amin'izay vao ho hitanao tsara ny hanesoranao ny sombin-kazo eo amin'ny mason'ny rahalahinao.
  '6':
  - type: text
    content: Aza omena ny alika izay masina; ary aza atsipy eo anoloan'ny kisoa ny vato soanareo
  - type: note
    content: perilanareo
  - type: text
    content: ', fandrao hanitsaka azy izy, dia hifotitra ka hamiravira anareo.'
  '7':
  - type: text
    content: 'Mangataha, dia homena ianareo; mitadiava, dia hahita ianareo; dondony, dia hovohana ianareo. '
  '8':
  - type: text
    content: 'Fa izay rehetra mangataka no mahazo; ary izay mitady no mahita; ary izay mandondòna no hovohana. '
  '9':
  - type: text
    content: 'Ary iza moa aminareo, raha angatahan''ny zanany mofo, no hanome azy vato? '
