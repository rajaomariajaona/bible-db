document_id: PSA.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fivavaky ny olona anarin'Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Nampiarahina amin''ny valiha. Al-hasheminith. Salamo nataon''i Davida. Jehovah ô, aza ny fahatezeranao no ananaranao ahy, ary aza ny fahaviniranao no amaizanao ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mamindrà fo amiko, Jehovah ô, fa reraka aho; sitrano aho, Jehovah ô, fa mihozohozo ny taolako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny fanahiko koa dia mangovitra loatra; fa Hianao, Jehovah ô, mandra-pahoviana?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Miverena, Jehovah ô, afaho ny fanahiko; Vonjeo aho noho ny famindram-ponao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa tsy misy fahatsiarovana Anao any amin'ny fahafatesana, any amin'ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: ' iza no hidera Anao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Efa sasatry ny misento aho; mampitsinkafona ny farafarako isan''alina aho sady mahampo-dranomaso ny fandriako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Lanin'alahelo ny masoko; efa pahina izy amin'ny ataon'ny mpampahory ahy rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mialà amiko, ianareo mpanao ratsy rehetra; fa Jehovah efa nandre ny feon''ny fitomaniako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jehovah efa nandre ny fangatahako; Jehovah no handray ny fivavahako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ho menatra sy hangovitra indrindra ny fahavaloko rehetra; hihodina izy ka ho menatra tampoka.
