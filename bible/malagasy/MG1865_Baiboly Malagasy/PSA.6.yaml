document_id: PSA.6,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fivavaky ny olona anarin'Andriamanitra
  - type: text
    content: 'Ho an''ny mpiventy hira. Nampiarahina amin''ny valiha. Al-hasheminith. Salamo nataon''i Davida. Jehovah ô, aza ny fahatezeranao no ananaranao ahy, ary aza ny fahaviniranao no amaizanao ahy. '
  '10':
  - type: text
    content: Ho menatra sy hangovitra indrindra ny fahavaloko rehetra; hihodina izy ka ho menatra tampoka.
  '2':
  - type: text
    content: 'Mamindrà fo amiko, Jehovah ô, fa reraka aho; sitrano aho, Jehovah ô, fa mihozohozo ny taolako. '
  '3':
  - type: text
    content: Ny fanahiko koa dia mangovitra loatra; fa Hianao, Jehovah ô, mandra-pahoviana?
  '4':
  - type: text
    content: 'Miverena, Jehovah ô, afaho ny fanahiko; Vonjeo aho noho ny famindram-ponao. '
  '5':
  - type: text
    content: Fa tsy misy fahatsiarovana Anao any amin'ny fahafatesana, any amin'ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola
  - type: text
    content: ' iza no hidera Anao? '
  '6':
  - type: text
    content: 'Efa sasatry ny misento aho; mampitsinkafona ny farafarako isan''alina aho sady mahampo-dranomaso ny fandriako. '
  '7':
  - type: text
    content: Lanin'alahelo ny masoko; efa pahina izy amin'ny ataon'ny mpampahory ahy rehetra.
  '8':
  - type: text
    content: 'Mialà amiko, ianareo mpanao ratsy rehetra; fa Jehovah efa nandre ny feon''ny fitomaniako. '
  '9':
  - type: text
    content: 'Jehovah efa nandre ny fangatahako; Jehovah no handray ny fivavahako. '
