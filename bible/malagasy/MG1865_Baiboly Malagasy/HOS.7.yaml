document_id: HOS.7,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Raha ta-hanasitrana ny Isiraely Aho, dia miseho ny helok''i Efraima sy ny faharatsian''i Samaria, fa manao fitaka izy; Miditra ny mpangalatra, ary ny jiolahy manao andiany dia mandehandeha eny ivelany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary ny avonavon
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ny reharehany'
      marker-yv: yv-n
    - type: text
      text: '''Isiraely dia vavolombelona manameloka azy; Nefa, na dia izany rehetra izany aza, dia tsy miverina amin''i Jehovah Andriamaniny ihany izy, na mitady Azy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary Efraima dia efa tonga tahaka ny voromailala adaladala tsy manan-tsaina; Efa miantso an''i Egypta izy ary efa mankany Asyria. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Raha vao mandeha izy, dia hovelariko aminy ny fandrika haratoko, ka hampidiniko ao toy ny voro-manidina izy; Hofaizako izy araka izay efa nambara tamin'ny fiangonany.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Lozan''ireny! satria nandositra Ahy izy, haringana izy! satria niodina tamiko; Izaho ta-hanavotra azy, fa izy kosa dia lainga no entiny milaza Ahy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary tsy mitaraina amiko ao am-pony izy, fa midradradradra foana ao am-pandriany; Mitangorona hitady vary sy ranom-boaloboka izy, dia miodina miala amiko. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary Izaho no nampianatra sy nanatanjaka ny sandriny, nefa izy kosa dia misaintsain-dratsy Ahy, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Miverina ihany izy, nefa tsy ho amin'ny Avo; Tonga tahaka ny tsipìka manjiona izy; Ho lavon-tsabatra ny mpanapaka azy noho ny firehitry ny lelany; Izany no ho latsany any amin'ny tany Egypta.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ary tsy heveriny ao am-po
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ataony hoe
      marker-yv: yv-n
    - type: text
      text: ' fa tsarovako ny faharatsiany rehetra; Ankehitriny dia gejan''ny nataony izy, efa tonga eo anatrehako izany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Amin''ny faharatsiany no ampifaliany ny mpanjaka, ary amin''ny laingany ny mpanapaka. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Samy mpaka vadin''olona avokoa izy rehetra ka toy ny fatana voafanan''ny mpanendy mofo, izay mitsahatra tsy misorona afo hatramin''ny ametafetany ny koba ka ambara-pitombony. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tamin''ny andron''ny mpanjakantsika dia nankarary tena tamin''ny fanafanan''ny herin''ny divay ny mpanapaka; Nifandray tanana tamin''ny mpaniratsira ny mpanjaka. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa entin''ireo ho ao am-panotrehana ny fony, toy ny ho ao amin''ny fatana; Mandritra ny alina dia matory ihany ny mpanendy azy, ary nony maraina dia toy ny lelafo mirehitra ny fatana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Samy mahamay toy ny fatana izy rehetra ka mandevona ny andriambaventiny; Efa lavo avokoa, ny mpanjakany, tsy misy miantso Ahy izy rehetra.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Efraima dia miharoharo amin''ireo firenena; Efraima dia efa tonga ampempa tsy voavadika. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Lanin''ny vahiny ny heriny, nefa tsy fantany akory izany; Eny, efa mipi-bolo ihany izy, saingy tsy fantany. '
