document_id: JER.42
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nangatahan'ny Jiosy an'i Jeremia haka hevitra amin'i Jehovah, ary ny anatra nataon'i Jeremia tamin'ny Jiosy kosa noho ny tsy nanekeny ny saina avy tamin'i Jehovah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny mpifehy ny miaramila rehetra sy Johanana, zanak''i Karea, sy Jazania, zanak''i Hosaia, mbamin''ny vahoaka rehetra, na kely na lehibe, dia nanatona '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka niteny tamin''i Jeremia mpaminany hoe: Masìna ianao, aoka hoborahina eto anatrehanao ny fifonanay, ary mba ivavaho amin''i Jehovah Andriamanitrao re izahay, dia ireto sisa rehetra ireto (fa vitsy izahay no sisa, na dia maro aza fahiny, dia araka izao hitan''ny masonao izao), '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'mba hambaran''i Jehovah Andriamanitrao anay izay lalana mety halehanay sy izay zavatra tokony hataonay. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia hoy Jeremia mpaminany taminy: Efa reko izany; koa, indro, hivavaka amin''i Jehovah Andriamanitrareo ary aho araka ny teninareo; ary ny teny rehetra Izay havalin''i Jehovah anareo dia hambarako anareo, fa tsy hisy hafeniko. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy izy tamin''i Jeremia: Jehovah no aoka ho vavolombelona marina sy mahatoky amintsika, raha tsy manao araka ny teny rehetra izay anirahan''i Jehovah Andriamanitrao anao aminay izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Na ho soa, na ho ratsy, dia hohenoinay ny feon''i Jehovah Andriamanitray, izay nanirahanay anao, mba hahasoa anay, raha mihaino ny feon''i Jehovah Andriamanitray izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nony afaka hafoloana, dia tonga tamin''i Jeremia ny tenin''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary izy niantso an''i Johanana, zanak''i Karea, sy ny mpifehy ny miaramila rehetra izay teo aminy mbamin''ny olona rehetra, na kely na lehibe, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ka nanao taminy hoe: Izao no lazain''i Jehovah, Andriamanitry ny Isiraely, Izay efa nanirahanareo ahy mba hoborahiko'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hampiankohoka
    marker-yv: yv-n
  - type: text
    text: ' eo anatrehany ny fifonanareo: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Raha mbola honina amin''ity tany ity ihany ianareo, dia haoriko ianareo, fa tsy horavako, ary hamboleko ianareo, fa tsy hongotako, fa manenina Aho ny amin''ny loza namelezako anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Aza matahotra ny mpanjakan''i Babylona izay atahoranareo; eny, aza matahotra azy, hoy Jehovah, fa momba anareo Aho hamonjy sy hanafaka anareo amin''ny tànany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hataoko mahita famindram-po ianareo, dia hamindra fo aminareo izy ka hampody anareo ho any amin''ny taninareo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa raha hoy kosa ianareo: Tsy honina amin''ity tany ity izahay, ka tsy hihaino ny feon''i Jehovah Andriamanitrareo ianareo, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'fa manao hoe: Tsia; fa hankany amin''ny tany Egypta izahay, fa any no tsy hahitanay ady, na handrenesanay ny feon''ny anjomara na hahitanay mosary, ka dia any no honenanay, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'dia mihainoa ny tenin''i Jehovah ankehitriny ianareo izay sisa amin''ny Joda: Izao no lazain''i Jehovah. Tompon''ny maro, Andriamanitry ny Isiraely: Raha dia mikiry hankany Egypta ihany ianareo ka mandeha hivahiny any, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'dia hahatratra anareo any amin''ny tany Egypta ny sabatra izay atahoranareo, ary ny mosary izay ahinareo no hanjohy anareo any amin''ny tany Egypta, ary any no hahafaty anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny olona rehetra izay mikiry hankany Egypta hivahiny any dia ho fatin''ny sabatra sy ny mosary ary ny areti-mandringana any; ary tsy hisy sisa ho afa-mandositra ny loza izay hataoko mihatra aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa izao no lazain''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Toy ny nanidinana ny fahatezerako sy ny fahavinirako tamin''ny mponina any Jerosalema, dia toy izany no hanidinana ny fahatezerako aminareo, raha mankany Egypta ianareo; ary ho fianianana sy ho figagana sy ho fanozonana ary ho fandatsa ianareo, sady tsy hahita ity tany ity intsony. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jehovah efa nilaza ny aminareo, ry sisa amin''ny Joda, hoe: Aza mankany Egypta ianareo; aoka ho fantatrareo tokoa fa efa nanariko androany ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Kanjo efa nivily ianareo ka nahavoa ny ainareo tamin''ny nanirahanareo ahy ho amin''i Jehovah Andriamanitrareo hanao hoe: Mba ivavaho amin''i Jehovah Andriamanitsika re izahay, ary izay rehetra holazain''i Jehovah Andriamanitsika dia ambarao aminay, fa hataonay. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary efa nambarako taminareo androany; nefa tsy nihaino ny feon''i Jehovah Andriamanitrareo ianareo ny amin''izay zavatra nanirahany ahy ho aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Koa aoka ho fantatrareo marimarina fa ho fatin-tsabatra sy mosary ary areti-mandringana ianareo any amin'ny tany izay tianareo hivahiniana.
