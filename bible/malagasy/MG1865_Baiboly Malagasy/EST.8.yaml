document_id: EST.8,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nanandratana an'i Mordekay, sy ny nahazoan'i Estera teny avy amin'ny mpanjaka ka hamela ny Jiosy hiaro tena
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin''izany andro izany dia nomen''i Ahasoerosy mpanjaka ho an''i Estera, vadin''ny mpanjaka, ny tranon''i Hamana, fahavalon''ny Jiosy. Ary Mordekay nankeo anatrehan''ny mpanjaka, fa efa voalazan''i Estera fa rainy izy '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanoratra taratasy tamin''ny anaran''i Ahasoerosy mpanjaka izy ka notombohiny tamin''ny peratra fanombohan''ny mpanjaka, ary ny taratasy dia nampitondrainy ny tsimandoa mitaingin-tsoavaly sy soavaly haingam-pandeha ary ampondra, zanaky ny soavalivavy; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka ny Jiosy izay teny amin''ny isan-tanàna dia navelan''ny mpanjaka hivory hiaro ny ainy ary handringana sy hamono ka handripaka ny herin''ny firenena sy ny tany rehetra izay te-hiady aminy, mbamin''ny vady aman-janak''ireny ary handroba ny fananany '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'amin''ny andro iray ihany any amin''ny isan-tokony eran''ny fanjakan''i Ahasoerosy mpanjaka, dia amin''ny andro fahatelo ambin''ny folo amin''ny volana faharoa ambin''ny folo (volana Adara izany). '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny kopen''ny teny natao didy ho amin''ny isan-tokony eran''ny fanjakana dia nantsoina tamin''ny olona rehetra mba hampiomana ny Jiosy ho amin''izany andro izany hamaliany ny fahavalony. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia lasa ny tsimandoa izay nitaingina soavaly haingam-pandeha sy ampondra, ka nohafainganina sy nododonan''ny tenin''ny mpanjaka izy. Ary nantsoina tany Sosana renivohitra koa ny lalàna. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin''ny nialan''i Mordekay teo anatrehan''ny mpanjaka dia niakanjo akanjo fiandrianana manga sy fotsy izy sady nisatroka satro-boninahitra volamena lehibe sy niakanjo akanjo lava rongony fotsy madinika sy volomparasy; ary faly sy ravo ny tanana Sosana. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny Jiosy dia nahazo fahazavana sy faharavoravoana sy fifaliana ary voninahitra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary teo amin'ny isan-tokony eran'ny fanjakana sy teny an-tanàna rehetra izay nahatongavan'ny didin'ny mpanjaka sy ny teniny dia nahazo hafaliana sy faharavoravoana ny Jiosy sady nanao fanasana sy andro mahafaly. Ary maro ny olona tompon-tany no tonga Jiosy, satria nahazo azy ny fahatahorana ny Jiosy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nesorin''ny mpanjaka ny peratra fanombohany, izay efa nalainy tamin''i Hamana, ka nomeny an''i Mordekay. Ary Mordekay dia notendren''i Estera hanapaka ny tranon''i Hamana. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia niteny teo anatrehan''ny mpanjaka indray Estera sady niankohoka tamin''ny tongony ka nitomany sy nifona taminy mba hahafoana ny ratsy nataon''i Hamana Agagita sy ny hevitra nataony hamelezany ny Jiosy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpanjaka nanondro an''i Estera tamin''ny tehim-bolamena. Dia nitsangana Estera ka nijanona teo anatrehan''ny mpanjaka '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary nanao hoe: Raha sitraky ny mpanjaka, ary mahita fitia eto imasony aho, sady ataon''ny mpanjaka ho mety izany, ka mahita sitraka eto imasony aho, dia aoka hisy soratra hanova ireny taratasy voahevitr''i Hamana, zanak''i Hamedota Agagita, ireny izay nosoratany hampandringana ny Jiosy amin''ny isan-tokony eran''ny fanjakan''ny mpanjaka; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa hataoko ahoana no fijery ny loza hanjo ny fireneko? Ary hataoko ahoana no fijery ny fandringanana ny havako? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Ahasoerosy mpanjaka tamin''i Estera, vadin''ny mpanjaka sy tamin''i Mordekay Jiosy: Indro, ny tranon''i Hamana efa nomeko an''i Estera, ary izy dia efa nahantona tamin''ny hazo, satria naninjitra ny tànany hamely ny Jiosy; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ianareo kosa dia manorata amin''ny anaran''ny mpanjaka izay sitrakareo hamonjy ny Jiosy, ka tombohy amin''ny peratra fanombohan''ny mpanjaka izany; fa tsy misy mahavadika ny soratra izay efa voasoratra tamin''ny anaran''ny mpanjaka sy efa voatomboka tamin''ny peratra fanombohan''ny mpanjaka '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nantsoina tamin''izay ny mpanoratry ny mpanjaka, tamin''ny andro fahatelo amby roa-polo tamin''ny volana fahatelo (volana Sivana izany); ary nosoratana araka izay rehetra nandidian''i Mordekay izany ho any amin''ny Jiosy sy ny solo-mpanjaka sy ny governora ary ny mpanapaka amin''ny isan-tokony hatrany India ka hatrany Etiopia, dia fito amby roa-polo amby zato toko, ny isan-tokony araka ny sorany avy, ary ny isam-pireneny araka ny fiteniny avy, ary ny Jiosy araka ny sorany sy araka ny fiteniny. '
