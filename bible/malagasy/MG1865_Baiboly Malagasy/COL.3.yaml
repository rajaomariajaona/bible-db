document_id: COL.3,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tokony hanariana ny asan'ny nofo sy ny hitondran-tena miendrika ny filazantsara
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Koa raha niara-natsangana tamin''i Kristy ianareo, dia katsaho ny zavatra any ambony, any amin''ny itoeran''i Kristy, Izay mipetraka eo an-tanana ankavanan''Andriamanitra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ary efa notafinareo ny toetra
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. olona
      marker-yv: yv-n
    - type: text
      text: ' vaovao, izay havaozina ho amin''ny fahalalana tsara araka ny endrik''izay nahary azy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Fa amin'izany dia tsy misy jentilisa
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. Grika
      marker-yv: yv-n
    - type: text
      text: ' sy Jiosy, na voafora sy tsy voafora, na barbariana sy Skytiana, na andevo sy tsy andevo, fa Kristy no zavatra rehetra sady amin''ny rehetra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Koa mitafia famindram-po sy fiantrana,, fahamoram-panahy, fanetren-tena, fahalemem-panahy, fandeferana, araka ny olom-boafidin''Andriamanitra sady masina no malala. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Mifandefera,ka mifamelà heloka ianareo, raha misy manana alahelo amin'ny sasany; tahaka ny namelan'ny Tompo
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: (Kristy)'
      marker-yv: yv-n
    - type: text
      text: ' ny helokareo no aoka mba hamelanareo heloka kosa. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary aoka ho ambonin''izany rehetra izany ny fitiavana, fa fehin''ny fahatanterahana izany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary aoka hanapaka ao am-ponareo ny fiadanan''i Kristy, fa ho amin''izany no niantsoana anareo ho tena iray; ary aoka ho feno fisaorana ianareo. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Aoka ny tenin''i Kristy hitoetra betsaka ao aminareo amin''ny fahendrena rehetra, dia mifampianara ka mifananara amin''ny salamo sy ny fihirana ary ny tonon-kiram-panahy, mihira amin''ny fahasoavana ao am-ponareo ho an''Andriamanitra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary na inona na inona no ataonareo, na amin''ny teny, na amin''ny asa, dia ataovy amin''ny anaran''i Jesosy Tompo izany, ka misaora Andriamanitra Ray amin''ny alalany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Hianareo vehivavy, maneke ny vadinareo araka izay mety hatao ao amin''ny Tompo. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Hianareo lehilahy, tiava ny vadinareo. ary aza sosotra
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. mangidy
      marker-yv: yv-n
    - type: text
      text: ' aminy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Saino ny zavatra any ambony, fa tsy ny zavatra etỳ an-tany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Hianareo zanaka, maneke ny ray aman-dreninareo amin''ny zavatra rehetra; fa ankasitrahana ao amin''ny Tompo izany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Hianareo ray, aza mampahasosotra ny zanakareo, fandrao mamoy fo izy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Hianareo mpanompo, maneke ny tomponareo araka ny nofo amin''ny zavatra rehetra, tsy amin''ny fanompoana eo imaso, tahaka ny mpila sitraka amin''olona, fa amin''ny fahatsoram-po, matahotra ny Tompo; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'ary na inona na inona no ataonareo, dia ataovy amin''ny fo, tahaka ny ho an''ny Tompo, fa tsy ho an''olona, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'satria fantatrareo fa ny Tompo no handraisanareo ny lova ho valiny; fa manompo an''i Kristy Tompo ianareo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Fa izay manao ny tsy marina dia handray araka ny tsy marina nataony; fa tsy misy fizahan-tavan'olona,
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa efa maty ianareo, ary ny fiainanareo miara-miafina amin''i Kristy ao amin''Andriamanitra. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Raha hiseho Kristy fiainantsika, dia hiara-miseho aminy koa amin''ny voninahitra ianareo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Koa vonoy ny momba ny tenanareo izay etỳ an-tany, dia fijangajangana, fahalotoana, firehetam-po, fanirian-dratsy ary fieremana, dia fanompoan-tsampy izany; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'fa izany zavatra izany no mahatonga ny fahatezeran''Andriamanitra amin''ny zanaky ny tsi-fanarahana; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'izany koa no nalehanareo fahiny, fony mbola velona taminy ianareo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa ankehitriny, esory koa izao rehetra izao, dia fahatezerana, fiafonafonana, lolompo, fitenenan-dratsy, teny mahamenatra avy amin''ny vavanareo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Aza mifandainga ianareo, fa efa narianareo ny toetra
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. olona
      marker-yv: yv-n
    - type: text
      text: ' taloha mbamin''ny asany; '
