document_id: EZK.43
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny alitaran'ny fanatitra odorana sy ny fanokanana azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nentiny ho any amin''ny vavahady aho, dia ilay vavahady manatrika ny atsinanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary, indro, tamy ny voninahitr''Andriamanitry ny Isiraely avy tany atsinanana; ary ny feony dia tahaka ny firohondrohon''ny rano be; ary ny tany dia namirapiratra azon''ny voninahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary ny tarehin''ny zavatra hitako dia tahaka ny an''ilay efa hitako, fony aho tonga handrava ny tanàna; ary nisy tahaka ny tarehin''ilay efa hitako teo amoron''ny ony Kebara ihany; ka dia nikarapoka nihohoka aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny voninahitr''i Jehovah dia niditra tamin''ny vavahady manatrika ny atsinanana ho ao an-trano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia nisy fanahy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: rivotra'
    marker-yv: yv-n
  - type: text
    text: ' nanainga ahy ka nitondra ahy niditra ho ao amin''ny kianja anatiny; ary, indro, feno ny voninahitr''i Jehovah ny trano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia reko fa nisy niteny tamiko tao an-trano; ary nisy lehilahy nitsangana teo anilako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy Izy tamiko: Ry zanak''olona, eto no hitoeran''ny seza fiandrianako sy hitoeran''ny faladiako, izay honenako mandrakizay eto amin''ny zanak''Isiraely; ary tsy holotoin''ny taranak''Isiraely, na izy na ny mpanjakany, amin''ny fijangajangany sy amin''ny sampin'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. fatin'
    marker-yv: yv-n
  - type: text
    text: '''ny mpanjakany ao amin''ny fitoerany avo intsony ny anarako masina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'tamin''ny nametrahany ny tokonam-baravaran''ireny teo anilan''ny tokonam-baravarako sy ny tolan''ireny teo anilan''ny tolako, rindrina ihany no teo anelanelako sy ireny, dia nolotoiny tamin''ny fahavetavetana nataony ny anarako masina; ka dia nahalany ringana azy tamin''ny fahatezerako Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa amin'izao kosa dia aoka hariany lavitra Ahy ny fijangajangany sy ny sampin
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. fatin'
    marker-yv: yv-n
  - type: text
    text: ''' ny mpanjakany, ka dia honina ao aminy mandrakizay Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hianao, ry zanak''olona, asehoy amin''ny taranak''Isiraely ny trano mba hahamenatra azy ny amin''ny helony, ka dia horefesiny ny mari-trano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary raha menatra ny amin''izay rehetra efa nataony izy, dia asehoy azy ny endriky ny trano mbamin''ny fombafombany sy ny fivoahana avy ao aminy sy ny fidirana ho ao aminy ary ny endriny rehetra sy ny didy rehetra aminy, eny, ny endriny rehetra ary ny lalàna rehetra aminy; koa soraty eo imasony izany, hitandremany ny endriny rehetra ary ny lalàny rehetra ka hanatanterahany izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izao no lalàna amin''ny trano: Ho masina dia ho masina avokoa izay rehetra voafaritra ho azy eo an-tampon''ny tendrombohitra. Eny, izany no lalana amin''ny trano.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary izao no mariky ny alitara araka ny hakiho, nefa isaky ny hakiho iray dia mihoatra vodivoam-pelatanana noho ny fanao: Ny fara-vodiny dia iray hakiho, ary iray hakiho koa ny sakany, ary ny koronosiny manodidina dia irain-jehy; ireo no fiorenan''ny alitara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hatramin''ny fara-vodiny eo amin''ny tany ka hatramin''ny rindriny ambany dia roa hakiho, ary ny sakany dia iray hakiho; ary hatramin''ny rindriny iva ka hatramin''ny rindriny avo dia efatra hakiho; ary ny sakany dia iray hakiho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary ny fanambonin'ny alitara
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Harela = tendrombohitr'Andriamanitra
    marker-yv: yv-n
  - type: text
    text: ' dia ho efatra hakiho, ary eo ambonin''ny fatana'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Ariela = fatan'Andriamanitra, na lion'Andriamanitra, ka tokony ho anaran'ny momba ny fanambonin'ny alitara ireo
    marker-yv: yv-n
  - type: text
    text: ' dia hisy tandroka efatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Roa ambin''ny folo hakiho ny lavan''ny fatana,4 ary roa ambin''ny folo hakiho koa ny sakany, ary efa-joro sokera izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny rindriny dia efatra ambin''ny folo hakiho ny lavany, sy efatra ambin''ny folo hakiho koa ny sakany, amin''ny lafiny efatra; ary ny koronosiny manodidina dia antsasaky ny hakiho; ary ny fara-vodiny dia iray hakiho manodidina; ary ny ambaratongany dia manatrika ny atsinanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy izy tamiko: Ry zanak''olona, izao no lazain''i Jehovah Tompo: Izao no didy ny amin''ny alitara amin''izay andro hanaovana azy, hanaterana fanatitra dorana sy hanopazana rà aminy: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny Levita mpisorona, taranak''i zadoka, izay manatona Ahy hanao fanompoam-pivavahana ho Ahy, dia homenao vantotr''ombilahy iray hatao fanatitra noho ny ota, hoy Jehovah Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia hangalanao ny ràny ka hatentinao amin'ny tandrony efatra sy amin'ny zorony efatra amin'ny rindriny ary amin'ny koronosiny manodidina; izany no hanadiovanao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ny dikan'ny teny Hebreo amin'ireo dia manafaka ota azy; Lev. viii. 15
    marker-yv: yv-n
  - type: text
    text: ' azy sy hanaovanao fanavotana ho azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Halainao koa ny vantotr''ombilahy hatao fanatitra noho ny ota ka hodorana ao amin''ny fitoerana voatendry ao amin''ny trano ivelan''ny fitoerana masina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary amin'ny andro faharoa no hanateranao osilahy tsy misy kilema hatao fanatitra noho ny ota; ary hodioviny
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ny dikan'ny teny Hebreo amin'ireo dia manafaka ota azy; Lev. viii. 15
    marker-yv: yv-n
  - type: text
    text: ' ny alitara tahaka ny nanadiovany'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ny dikan'ny teny Hebreo amin'ireo dia manafaka ota azy; Lev. viii. 15
    marker-yv: yv-n
  - type: text
    text: ' azy tamin''ny vantotr''ombilahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary rehefa vita ny anadiovanao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ny dikan'ny teny Hebreo amin'ireo dia manafaka ota azy; Lev. viii. 15
    marker-yv: yv-n
  - type: text
    text: ' azy, dia hanatitra vantotr''ombilahy tsy misy kilema sy ondrilahy tsy misy kilema ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary haterinao eo anatrehan''i Jehovah ireo, ary ny mpisorona handraraka sira eo aminy, dia hanatitra azy ho fanatitra dorana ho an''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Hafitoana no hanateranao osilahy isan''andro hatao fanatitra noho ny ota sy vantotr''ombilahy sy ondrilahy izay tsy misy kilema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Hafitoana no hanaovany fanavotana ho an'ny alitara sy hanadiovany azy ary hanokanany
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hamenoana ny tànany
    marker-yv: yv-n
  - type: text
    text: ' azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary rehefa tapitra izany andro izany, dia hiantomboka amin'ny andro fahavalo ny hanateran'ny mpisorona ny fanatitra doranareo ao amin'ny alitara sy ny fanati-pihavananareo; ary dia hankasitrahako ianareo, hoy Jehovah Tompo.
