document_id: MIC.7,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny faharatsian'ny Isiraely, sy ny hanjo azy, ary ny hibebahany, sy ny hamindran'Andriamanitra fo aminy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Lozako! fa efa tonga toy ny fiotazam-boankazo aho Sy toy ny fitsimponam-boaloboka, Tsy misy salohy hohanina, Na aviavy mialin-taona, izay irin''ny fanahiko, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia hahita izany ilay fahavaloko ka hosaronan-kenatra, Dia ilay nanao tamiko hoe: Aiza Izay Jehovah Andriamanitrao? Ho faly mahita azy ny masoko; Ankehitriny dia ho fanitsakitsaka toy ny fotaka eny an-dalambe izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: He ny andro hananganana ny mandanao! Amin'izany andro izany dia hitarina ny faritra
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ho lavitra ny didy'
      marker-yv: yv-n
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Amin'izany andro izany koa dia hanatona anao ny olona Avy any Asyria sy avy any amin'ny tanànan'i Egypta
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Mazora
      marker-yv: yv-n
    - type: text
      text: ', Eny, hatrany Egypta'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Mazora
      marker-yv: yv-n
    - type: text
      text: ' ka hatramin''ny Ony'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Eofrata
      marker-yv: yv-n
    - type: text
      text: ', Ary hatramin''ny ranomasina ka hatramin''ny ranomasina, Ary hatramin''ny tendrombohitra ka hatramin''ny tendrombohitra. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nefa ho lao ny tany noho ny amin''ny mponina eo aminy, Dia noho ny vokatry ny asany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ny tehinao no ento miandry ny olonao, Dia ny ondry lovanao, Izay monina mitokana, dia any an''ala ao an-tampon''i Karmela; Aoka handrasana any Basana sy Gileada ireny Toy ny tamin''ny andro taloha ela. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Toy ny tamin''ny andro nivoahanao avy tany amin''ny tany Egypta No hanehoako azy zava-mahagaga. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Hahita izany ny jentilisa, Ka hahamenatra azy ny heriny rehetra; Hitampim-bava izy, Ho tonga marenina ny sofiny. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Hilelaka ny vovoka toy ny menarana izy; Hiala amin-kovitra avy ao amin''ny fiarovany mafy tahaka ny biby mikisaka amin''ny tany izy; Jehovah Andriamanitsika dia hohatoniny amin-kovitra, Eny, hatahotra Anao izy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Iza no Andriamanitra tahaka Anao, Izay mamela heloka Sady mandalo ny fahadisoan''ny sisa amin''ny lovany? Tsy mitana ny fahatezerany ho mandrakizay Izy, Fa tia famindram-po. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Hamindra fo amintsika indray Izy Ka hanitsakitsaka ny fahotantsika, Eny, harianao ho any amin''ny ranomasina lalina ny fahotany rehetra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Lany tsy misy amin''ny tany intsony ny tsara fanahy; Eny, tsy misy olo-marina ao amin''ny olombelona; Samy manotrika handatsa-drà avokoa izy, Eny, mihaza ny rahalahiny amin''ny harato izy rehetra. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Hanefa fahamarinana ho an'i Jakoba Hianao Sy famindram-po ho an'i Abrahama, Dia ilay nianiananao tamin'ny razanay hatramin'ny andro taloha ela.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Vonona hanao ratsy ny tànany; Mila ny mpanapaka, Azon-kolikoly ny mpitsara, Ary ny lehibe milaza ny fitsiriritan''ny fanahiny, Koa izany no entiny mandrarirary azy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Na dia ny tsara indrindra ao aminy aza dia toy ny roy, Ary na dia ny mahitsy indrindra ao aminy aza dia ratsy noho ny fefy tsilo; Avy ny andron'ny tilinao, izay hamaliana anao; Amin'izany dia vao ho very hevitra ianao
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. izy
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Aza matoky namana ianareo, Aza mahazo am-po izay sakaiza mahazatra; Fa ambeno ny varavaran''ny vavanao na dia amin''izay andefimandrinao aza. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa ny zanakalahy manamavo ny rainy, Ny zanakavavy mitsangan-kanohitra ny reniny, Ary ny vinantovavy hanohitra ny rafozani-vavy; Ary ny ankohonan''ny olona ihany no fahavalony. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa izaho kosa dia hanandrandra an''i Jehovah, Eny, hiandry an''Andriamanitry ny famonjena ahy aho; Andriamanitro no hihaino ahy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Aza mifaly ahy, ry fahavaloko, Fa na dia lavo aza aho, mbola hiarina ihany; Raha mitoetra ao amin''ny maizina aho, Dia Jehovah no fahazavana ho ahy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ny fahatezeran''i Jehovah dia hiaretako ihany, Fa efa nanota taminy aho, Ambara-pandahany ny teniko Sy hanomezany rariny ho ahy; Hamoaka ahy ho amin''ny mazava Izy, Ka ho faly aho mahita ny fahamarinany. '
