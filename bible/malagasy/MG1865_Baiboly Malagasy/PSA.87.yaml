document_id: PSA.87,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny tanànan'i Jehovah, izay hahaterahan'ny firenena maro ho isan'ny Isiraely
  - type: text
    content: 'Salamo nataon''ny Koraita. Tonon-kira. Ny naorin''i Jehovah dia ao an-tendrombohitra masina; '
  '2':
  - type: text
    content: Ny vavahadin'i Ziona dia tian'i Jehovah mihoatra noho ny fonenana rehetra izay an'i Jakoba.
  '3':
  - type: text
    content: 'Zava-malaza no anambarana anao Ry tanànan''Andriamanitra '
  '4':
  - type: text
    content: Hanonona an-dRahaba
  - type: note
    content: 'Na: Egypta'
  - type: text
    content: ' sy Babylona Aho ho isan''izay mahalala ahy; Indro Filistia sy Tyro mbamin''i Etiopia, Ity no efa teraka teo. '
  '5':
  - type: text
    content: 'Ary Ziona hilazana hoe: Ireto sy ireroa samy efa teraka teo; Ary ny Avo Indrindra no mampitoetra azy. '
  '6':
  - type: text
    content: 'Jehovah hanisa, raha manoratra ny firenena Izy: Ity no efa teraka teo. '
  '7':
  - type: text
    content: 'Hoy izay mihira sy mandihy: Ny loharanoko rehetra dia ao aminao.'
