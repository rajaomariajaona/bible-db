document_id: PSA.87
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny tanànan'i Jehovah, izay hahaterahan'ny firenena maro ho isan'ny Isiraely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Salamo nataon''ny Koraita. Tonon-kira. Ny naorin''i Jehovah dia ao an-tendrombohitra masina; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny vavahadin'i Ziona dia tian'i Jehovah mihoatra noho ny fonenana rehetra izay an'i Jakoba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Zava-malaza no anambarana anao Ry tanànan''Andriamanitra '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hanonona an-dRahaba
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Egypta'
    marker-yv: yv-n
  - type: text
    text: ' sy Babylona Aho ho isan''izay mahalala ahy; Indro Filistia sy Tyro mbamin''i Etiopia, Ity no efa teraka teo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Ziona hilazana hoe: Ireto sy ireroa samy efa teraka teo; Ary ny Avo Indrindra no mampitoetra azy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jehovah hanisa, raha manoratra ny firenena Izy: Ity no efa teraka teo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hoy izay mihira sy mandihy: Ny loharanoko rehetra dia ao aminao.'
