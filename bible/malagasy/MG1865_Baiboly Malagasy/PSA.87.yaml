document_id: PSA.87,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny tanànan'i Jehovah, izay hahaterahan'ny firenena maro ho isan'ny Isiraely
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Salamo nataon''ny Koraita. Tonon-kira. Ny naorin''i Jehovah dia ao an-tendrombohitra masina; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ny vavahadin'i Ziona dia tian'i Jehovah mihoatra noho ny fonenana rehetra izay an'i Jakoba.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Zava-malaza no anambarana anao Ry tanànan''Andriamanitra '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Hanonona an-dRahaba
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Egypta'
      marker-yv: yv-n
    - type: text
      text: ' sy Babylona Aho ho isan''izay mahalala ahy; Indro Filistia sy Tyro mbamin''i Etiopia, Ity no efa teraka teo. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary Ziona hilazana hoe: Ireto sy ireroa samy efa teraka teo; Ary ny Avo Indrindra no mampitoetra azy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Jehovah hanisa, raha manoratra ny firenena Izy: Ity no efa teraka teo. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Hoy izay mihira sy mandihy: Ny loharanoko rehetra dia ao aminao.'
