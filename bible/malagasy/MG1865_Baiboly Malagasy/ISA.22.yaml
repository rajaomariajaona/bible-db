document_id: ISA.22,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny nanonganana an'i Sebna sy ny nanendrena an'i Eliakima ho solony
  - type: text
    content: Faminaniana ny amin'ny lohasahan'ny Fahitana. Inona re izato manjo anareo
  - type: note
    content: Heb. anao
  - type: text
    content: ', no dia miakatra eny an-tampon-trano avokoa ianareo'
  - type: note
    content: Heb. ianao
  - type: text
    content: ','
  '10':
  - type: text
    content: 'Isainareo ny trano any Jerosalema, ka dia ravanareo ny trano ho enti-manamafy ny manda. '
  '11':
  - type: text
    content: 'Mihady lavaka famorian-drano eo anelanelan''ny manda roa ianareo halenan ny rano avy amin''ny kamory ela; Kanefa tsy mijery Izay efa nanomana izao zavatra izao ianareo, na mahita Izay nikasa azy hatry ny fony ela. '
  '12':
  - type: text
    content: 'Ary amin''izany andro izany Jehovah, Tompon''ny maro, Hiantso fitomaniana sy fioriana sy fiharatana ary fisikinana lamba fisaonana. '
  '13':
  - type: text
    content: 'Kanjo he izato hafaliana sy halavoravoana! Sy famonoana omby sy ondry aman''osy ary fihinanan-kena sy fisotroan-divay! Aoka isika hihinana sy hisotro, fa rahampitso dia ho faty. '
  '14':
  - type: text
    content: 'Dia nambaran''i Jehovah, Tompon''ny maro, teo an-tsofiko izao: Tsy havela mihitsy ambara-pahafatinareo izao helokareo izao, hoy Jehovah, Tompon''ny maro.'
  '15':
  - type: text
    content: 'Izao no lazain''i Jehovah, Tompon''ny maro: Andeha mankao amin''ilay mpanolo-tsaina io, dia ao amin''i Sebna, lehiben''ny ao an-dapa, ka ataovy hoe: '
  '16':
  - type: text
    content: Manao inona etỳ ianao, ary inonao moa no etỳ, No manao fasana etỳ ianao, dia manao fasana ho anao
  - type: note
    content: Heb. ho azy
  - type: text
    content: ' etỳ amin''ny hantsana sy mandoaka fonenana ho anao'
  - type: note
    content: Heb. ho azy
  - type: text
    content: ' etỳ amin''ny harambato? '
  '17':
  - type: text
    content: Indro, Jehovah hanipy mafy
  - type: note
    content: 'Na: hosaronany'
  - type: text
    content: ' anao, eny, hofiazany mafy ianao, '
  '18':
  - type: text
    content: 'Dia hovolavolainy toy ny kodiarana ka hahodiadiany ho any amin''ny tany malalaka; Dia any no hahafaty anao, ary ho any koa ny kalesin''ny voninahitrao ry ilay henatry ny mpianakavin''ny tomponao. '
  '19':
  - type: text
    content: Ary horoahiko hiala amin'ny fitoeranao ianao sy haongako
  - type: note
    content: Heb. haongany
  - type: text
    content: ' hiala amin''ny raharahanao '
  '2':
  - type: text
    content: 'Ry ilay be horakoraka, tanàna be tabataba, vohitra miravoravo? Ny faty eo aminao dia tsy mba novonoin-tsabatra, na maty an''ady. '
  '20':
  - type: text
    content: 'Ary amin''izany andro izany dia hantsoiko kosa Eliakima mpanompoko, zanak''i Hilkia; '
  '21':
  - type: text
    content: 'Ary hampiakanjoiko azy ny akanjonao, sady hosikinako amin''ny fehin-kibonao izy; Ka dia hatolotro eo an-tànany ny fanapahanao, ary dia ho tonga rain''ny mponina eto Jerosalema sy ny taranak''i Joda izy. '
  '22':
  - type: text
    content: 'Ary hapetrako eo an-tsorony ny fanala hidin''ny tranon''i Davida; Dia hamoha izy, ka tsy hisy handrindrina; Ary handrindrina izy, ka tsy hisy hamoha. '
  '23':
  - type: text
    content: 'Ary hatsatoko toy ny fihantonan-javatra eo amin''ny fitoerana mafy izy ka ho sezam-boninahitra ho an''ny mpianakavin-drainy. '
  '24':
  - type: text
    content: 'Ary hahantona eo aminy ny havesatry ny voninahitry ny mpianakavin-drainy rehetra, izay zanaka sy tera-drainy rehetra, dia ny fanaka madinita rehetra hatramin''ny lovia ka hatramin''ny siny samy hafa rehetra. '
  '25':
  - type: text
    content: Amin'izany andro izany, hoy Jehovah, Tompon'ny maro, Dia hiala ilay fihantonan-javatra voatsatoka teo amin'ny fitoerana mafy; Eny, hokapaina izy ka hianjera, dia ho simba ny entana izay nihantona teo aminy; Fa Jehovah no efa niteny.
  '3':
  - type: text
    content: Niara-nandositra ny lehibenao, nafatotra tsy amin-tsipìka
  - type: note
    content: 'Na: Nafatotry ny mpandefa zana-tsipìka'
  - type: text
    content: ' izy; Izay rehetra hita tao aminao dia niara-nafatotra, na dia nitady handositra lavitra aza. '
  '4':
  - type: text
    content: 'Koa izany no anaovako hoe: Mihodina tsy hijery ahy, fa hitomany mafy dia mafy aho; Aza dia fatra-pampionona ahy noho ny fandringanana ny oloko zanakavavy '
  '5':
  - type: text
    content: 'Fa ao amin''ny lohasahan''ny fahitana dia misy andron''i Jehovah, Tompon''ny maro, andro fitabatabana sy fanosihosena sy fahaverezan-kevitra, ary fandravana ny manda sy fidradradradrana manako hatrany an-tendrombohitra '
  '6':
  - type: text
    content: 'Ary Elama mitondra ny tranon-jana-tsipìka mbamin''ny kalesy misy olona sy ny mpitaingin-tsoavaly; Ary Kira manaisotra ny fonon''ampinga '
  '7':
  - type: text
    content: 'Izay tsara indrindra amin''ny lohasahanao dia feno kalesy, ary ny mpitaingin-tsoavaly milahatra eo am-bavahady '
  '8':
  - type: text
    content: 'Dia alana ny fisalobonan''i Joda, ary mijery ny fiadiana ao an-Tranoala ianao amin''izany andro izany. '
  '9':
  - type: text
    content: 'Ary hilanareo fa banga be ihany ny tanànan''i Davida; Ary mamory ny rano avy amin''ny kamory ambany ianareo. '
