document_id: ISA.22
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny nanonganana an'i Sebna sy ny nanendrena an'i Eliakima ho solony
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Faminaniana ny amin'ny lohasahan'ny Fahitana. Inona re izato manjo anareo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. anao
    marker-yv: yv-n
  - type: text
    text: ', no dia miakatra eny an-tampon-trano avokoa ianareo'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ianao
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ry ilay be horakoraka, tanàna be tabataba, vohitra miravoravo? Ny faty eo aminao dia tsy mba novonoin-tsabatra, na maty an''ady. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Niara-nandositra ny lehibenao, nafatotra tsy amin-tsipìka
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Nafatotry ny mpandefa zana-tsipìka'
    marker-yv: yv-n
  - type: text
    text: ' izy; Izay rehetra hita tao aminao dia niara-nafatotra, na dia nitady handositra lavitra aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Koa izany no anaovako hoe: Mihodina tsy hijery ahy, fa hitomany mafy dia mafy aho; Aza dia fatra-pampionona ahy noho ny fandringanana ny oloko zanakavavy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa ao amin''ny lohasahan''ny fahitana dia misy andron''i Jehovah, Tompon''ny maro, andro fitabatabana sy fanosihosena sy fahaverezan-kevitra, ary fandravana ny manda sy fidradradradrana manako hatrany an-tendrombohitra '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Elama mitondra ny tranon-jana-tsipìka mbamin''ny kalesy misy olona sy ny mpitaingin-tsoavaly; Ary Kira manaisotra ny fonon''ampinga '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izay tsara indrindra amin''ny lohasahanao dia feno kalesy, ary ny mpitaingin-tsoavaly milahatra eo am-bavahady '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia alana ny fisalobonan''i Joda, ary mijery ny fiadiana ao an-Tranoala ianao amin''izany andro izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hilanareo fa banga be ihany ny tanànan''i Davida; Ary mamory ny rano avy amin''ny kamory ambany ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Isainareo ny trano any Jerosalema, ka dia ravanareo ny trano ho enti-manamafy ny manda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mihady lavaka famorian-drano eo anelanelan''ny manda roa ianareo halenan ny rano avy amin''ny kamory ela; Kanefa tsy mijery Izay efa nanomana izao zavatra izao ianareo, na mahita Izay nikasa azy hatry ny fony ela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary amin''izany andro izany Jehovah, Tompon''ny maro, Hiantso fitomaniana sy fioriana sy fiharatana ary fisikinana lamba fisaonana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Kanjo he izato hafaliana sy halavoravoana! Sy famonoana omby sy ondry aman''osy ary fihinanan-kena sy fisotroan-divay! Aoka isika hihinana sy hisotro, fa rahampitso dia ho faty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nambaran''i Jehovah, Tompon''ny maro, teo an-tsofiko izao: Tsy havela mihitsy ambara-pahafatinareo izao helokareo izao, hoy Jehovah, Tompon''ny maro.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Andeha mankao amin''ilay mpanolo-tsaina io, dia ao amin''i Sebna, lehiben''ny ao an-dapa, ka ataovy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Manao inona etỳ ianao, ary inonao moa no etỳ, No manao fasana etỳ ianao, dia manao fasana ho anao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ho azy
    marker-yv: yv-n
  - type: text
    text: ' etỳ amin''ny hantsana sy mandoaka fonenana ho anao'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ho azy
    marker-yv: yv-n
  - type: text
    text: ' etỳ amin''ny harambato? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Indro, Jehovah hanipy mafy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hosaronany'
    marker-yv: yv-n
  - type: text
    text: ' anao, eny, hofiazany mafy ianao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hovolavolainy toy ny kodiarana ka hahodiadiany ho any amin''ny tany malalaka; Dia any no hahafaty anao, ary ho any koa ny kalesin''ny voninahitrao ry ilay henatry ny mpianakavin''ny tomponao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary horoahiko hiala amin'ny fitoeranao ianao sy haongako
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. haongany
    marker-yv: yv-n
  - type: text
    text: ' hiala amin''ny raharahanao '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary amin''izany andro izany dia hantsoiko kosa Eliakima mpanompoko, zanak''i Hilkia; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hampiakanjoiko azy ny akanjonao, sady hosikinako amin''ny fehin-kibonao izy; Ka dia hatolotro eo an-tànany ny fanapahanao, ary dia ho tonga rain''ny mponina eto Jerosalema sy ny taranak''i Joda izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hapetrako eo an-tsorony ny fanala hidin''ny tranon''i Davida; Dia hamoha izy, ka tsy hisy handrindrina; Ary handrindrina izy, ka tsy hisy hamoha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary hatsatoko toy ny fihantonan-javatra eo amin''ny fitoerana mafy izy ka ho sezam-boninahitra ho an''ny mpianakavin-drainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary hahantona eo aminy ny havesatry ny voninahitry ny mpianakavin-drainy rehetra, izay zanaka sy tera-drainy rehetra, dia ny fanaka madinita rehetra hatramin''ny lovia ka hatramin''ny siny samy hafa rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Amin'izany andro izany, hoy Jehovah, Tompon'ny maro, Dia hiala ilay fihantonan-javatra voatsatoka teo amin'ny fitoerana mafy; Eny, hokapaina izy ka hianjera, dia ho simba ny entana izay nihantona teo aminy; Fa Jehovah no efa niteny.
