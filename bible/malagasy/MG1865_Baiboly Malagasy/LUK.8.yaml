document_id: LUK.8
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary taoriana kelin''izany, dia lasa Jesosy nitety ny tanàna sy ny vohitra nitory ny filazantsaran''ny fanjakan''Andriamanitra; ary ny roa ambin''ny folo lahy nanaraka Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'mbamin''ny vehivavy sasany, izay nositraniny tamin''ny fanahy ratsy sy ny aretina, dia Maria atao hoe Magdalena, izay efa nivoahan''ny demonia fito, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: sy Johana, vadin'i Koza, mpitandrina ny fananan'i Heroda, ary Sosana mbamin'ny maro hafa koa, izay nanompo azy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Azy'
    marker-yv: yv-n
  - type: text
    text: ' tamin''ny fananany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nisy vahoaka betsaka niangona, ka nanatona Azy ny olona avy tamin''ny isan-tanàna, dia nanao fanoharana hoe Izy: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nivoaka ny mpamafy hamafy ny voa; ary raha namafy izy, ny sasany dia voafafy teny amoron-dalana ka voahitsakitsaka, ary dia lanin''ny voro-manidina. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny sasany dia voafafy teny ambonin''ny vatolampy; ary raha vao naniry izy, dia nalazo; satria tsy nisy mandomando. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny sasany dia voafafy teny amin''ny tsilo; ary ny tsilo niara-naniry taminy, dia nangeja azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny sasany dia voafafy teny amin''ny tany tsara, dia naniry ka namoa zato heny. Ary rehefa nilaza izany Izy, dia niantso hoe: Izay manan-tsofina ho enti-mihaino, aoka izy hihaino. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny mpianany nanontany Azy ny amin''izay hevitr''izany fanoharana izany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy Izy: Hianareo no navela'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. nomena
    marker-yv: yv-n
  - type: text
    text: ' hahalala ny zava-miafina ny amin''ny fanjakan''Andriamanitra; fa amin''ny olon-kafa dia fanoharana no atao, mba hijery izy, fa tsy hahita, ary hahare, fa tsy hahafantatra (Isa. 6. 9). '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Koa izao no hevitry ny fanoharana: Ny voa dia ny tenin''Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ireo teny amoron-dalana dia izay mandre, nefa avy ny devoly ka manaisotra ny teny ao am-pony, fandrao hino izy ka hovonjena. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ireo teny ambonin''ny vatolampy dia izay mandre sady mandray ny teny amin''ny hafaliana; nefa tsy manam-paka ireo, fa mino vetivety ihany, koa amin''izay andro isehoan''ny fakam-panahy dia mihemotra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ireo teny amin''ny tsilo dia izay mandre, fa nony mandeha izy, dia voagejan''ny fiahiahiana sy ny harena ary ny fahafinaretan''izao fiainana izao ka tsy mahavanom-boa. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa ireo teny amin''ny tany tsara kosa dia izay mandre ny teny amin''ny fo sady marina no tsara, dia mitana azy ka mamoa amin''ny faharetana. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tsy misy olona mampirehitra jiro ka manarona azy, na nametraka azy ao ambanin''ny farafara; fa ataony eo amin''ny fanaovan-jiro izy, mba ho hitan''izay miditra ny mazava. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa tsy misy takona izay tsy ho hita, na miafina izay tsy ho fantatra sy tsy haseho. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa tandremo ny fihainonareo; fa izay manana dia homena; ary izay tsy manana kosa, na dia izay ataony ho ananany aza dia halaina aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary renin''i Jesosy sy ny rahalahiny nanatona Azy, fa tsy nahazo nihaona taminy, satria nifanety ny vahoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nisy nilaza taminy hoe: Ny reninao sy ny rahalahinao mijanona ato ala-trano ta-hahita Anao. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa namaly Izy ka nanao taminy hoe: Ny reniko sy ny rahalahiko dia ireto izay mandre ny tenin''Andriamanitra ka mankatò azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary tamin''ny andro anankiray dia niondrana an-tsambokely Jesosy sy ny mpianany; ary hoy Izy taminy: Andeha isika hankeny am-pitan''ny farihy; dia lasa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nony nandeha ny sambokely, dia azon''ny torimaso Jesosy; ary nisy tafio-drivotra nidina tamin''ny farihy, ka nila ho feno rano ny sambo, ary saiky nahita loza izy ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nanatona izy, dia namoha Azy ka nanao hoe: Tompoko, Tompoko, maty izahay! Dia nitsangana Izy, ka noteneniny mafy ny rivotra sy ny onjan-drano. Ary dia nitsahatra izany, ka tonga tony tsara ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy Izy taminy: Aiza ny finoanareo? Ary natahotra izy ireo sady gaga ka niresaka hoe: Iza moa Ity, no mandidy ny rivotra sy ny rano Izy, ka manaiky Azy izany! '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Dia nitody tany amin'ny tanin'ny Gerasena
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (Gadarena)'
    marker-yv: yv-n
  - type: text
    text: ' izay tandrifin''i Galilia izy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary raha niala nankeny an-tanety Jesosy, dia nifanena taminy ny lehilahy anankiray avy tao an-tanàna, izay efa nanana demonia, ary efa ela izy no tsy nitafy lamba sady tsy nitoetra tao an-trano, fa teny amin''ny fasana. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa nony nahita an''i Jesosy izy, dia niantso mafy sady niankohoka teo anatrehany ka niteny tamin''ny feo mahery hoe: Moa mifaninona akory Hianao, Jesosy, Zanak''Andriamanitra Avo Indrindra ô? masina Hianao, aza mampijaly ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa Izy nandidy ny fanahy maloto hivoaka tamin-dralehilahy. Fa efa nahazo azy ela izany; ary efa nafatotra tamin''ny gadra, na ny tànany, na ny tongony, ka nambenana izy; nefa notapahiny ny fatorana, ka dia nentin''ny demonia niriotra nankany an-efitra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary Jesosy nanontany azy ka nanao hoe: Iza moa no anaranao? Dia hoy izy: Legiona; fa demonia maro no efa niditra tao anatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary nifona taminy izy mba tsy handidiany azy hankany amin''ny lavaka tsy hita noanoa. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary nisy kisoa maro andiany iray nandrasana teny an-tendrombohitra, ary ny demonia nifona taminy mba havelany hiditra ao anatiny. Dia nekeny. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ary ny demonia, rehefa nivoaka tamin-dralehilahy, dia niditra tao anatin'ny kisoa; ary ireo kisoa andiany ireo nitratrevatreva tamin'ny hantsana ho any amin'ny farihy, ka dia maty
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. kenda
    marker-yv: yv-n
  - type: text
    text: ' tany. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary nony hitan''ny mpiandry izany natao izany, dia nandositra izy ka nilaza izany tao an-tanàna sy tany an-tsaha. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dia nivoaka ny olona mba hizaha izany natao izany; ary tonga tany amin''i Jesosy izy, dia nahita an-dralehilahy izay efa nivoahan''ny demonia, fa indro izy nipetraka teo anilan''ny tongotr''i Jesosy nitafy lamba sady ary saina; dia raiki-tahotra ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary izay efa nahita dia nanambara tamin''ny olona ny namonjena an''ilay demoniaka. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ary ny olona rehetra tany amin'ny tanin'ny Gerasena
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Gadarena'
    marker-yv: yv-n
  - type: text
    text: ' manodidina dia nangataka an''i Jesosy hiala aminy, satria raiki-tahotra indrindra izy; ary Jesosy niondrana an-tsambokely ka niverina. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary ny lehilahy izay efa nivoahan''ny demonia dia nangataka mba hitoetra ao aminy; nefa nampodin''i Jesosy izy ka nataony hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Modia ihany any an-tranonao, ka ambarao ny zavatra lehibe nataon''Andriamanitra taminao. Dia nandeha izy ka nitory eran''ny tanàna izay zavatra lehibe nataon''i Jesosy taminy. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary nony tafaverina Jesosy, dia nandray Azy tsara ny vahoaka, fa niandry Azy avokoa izy rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary, indro, dia tonga ny lehilahy atao hoe Jairo, mpanapaka ny synagoga; dia niankohoka tamin''ny tongotr''i Jesosy izy ka niangavy taminy hiditra ao an-tranony. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Fa nanana zanakavavy tokana tokony ho roa ambin''ny folo taona izy, ary efa ho faty razazavavy. Ary raha nandeha Jesosy, dia nanety lalana Azy ny vahoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ary nisy vehivavy anankiray narary
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. narary nandeha rà
    marker-yv: yv-n
  - type: text
    text: ' roa ambin''ny folo taona, izay efa nandany ny fananany rehetra tamin''ny mpanao fanafody, nefa tsy nisy nahasitrana azy akory. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Dia nankao ivohon'i Jesosy ravehivavy ka nanendry ny somotraviavin-dambany, ary niaraka tamin'izay dia nijanona ny aretiny
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. fandehanan'ny ràny
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary hoy Jesosy: Iza moa no nanendry Ahy? Ary rehefa samy nandà izy rehetra, dia hoy Petera sy ny namany: Tompoko, ny vahoaka betsaka mifanety ka manizina Anao. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Fa hoy Jesosy: Nisy olona nanendry Ahy; fa fantatro fa nisy hery nivoaka avy tamiko. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary rehefa hitan-dravehivavy fa tsy takona Azy izy, dia nangovitra izy ka nankeo aminy sady niankohoka teo anatrehany, dia nanambara teo anatrehan''ny vahoaka rehetra izay anton''ny nanendreny Azy sy izay nahasitranany niaraka tamin''izay. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ary hoy Jesosy taminy: Anaka, ny finoanao no nahasitrana'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. nahavonjy
    marker-yv: yv-n
  - type: text
    text: ' anao; mandehana soa aman-tsara. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Ary raha mbola niteny Jesosy, dia tonga ny anankiray avy tany amin''ilay mpanapaka ny synagoga ka nanao hoe: Maty ny zanakao-vavy; aza manahirana ny Mpampianatra. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Fa Jesosy, raha nahare, dia namaly azy ka nanao hoe: Aza matahotra; minoa fotsiny ihany, dia ho velona'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. voavonjy
    marker-yv: yv-n
  - type: text
    text: ' izy. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Ary raha tonga tao an-trano Izy, dia tsy nisy olona navelany hiara-miditra taminy, afa-tsy Petera sy Jaona ary Jakoba mbamin''ny ray aman-drenin-drazazavavy. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Ary ny olona rehetra nitomany sy nisaona azy; fa Jesosy nanao hoe: Aza mitomany; fa tsy maty izy, fa matory. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Dia nihomehy Azy fatratra ny olona satria fantany fa efa maty razazavavy. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Ary Jesosy dia nandray ny tànany ka niantso hoe: Ry zazavavy, miarena. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Dia nody indray ny ainy, ka niarina niaraka tamin''izay izy; ary nasainy nomena hanina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Ary dia talanjona ny ray aman-dreniny; fa Jesosy nandrara ary tsy hilazalaza amin'olona ny zavatra efa natao.
