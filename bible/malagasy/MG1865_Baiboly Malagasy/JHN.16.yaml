document_id: JHN.16
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izany teny izany dia efa nolazaiko taminareo, mba tsy hahatafintohina anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Handroaka anareo hiala amin'ny synagoga izy; eny, ho avy ny andro
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. ora
    marker-yv: yv-n
  - type: text
    text: ', ka hataon''izay rehetra mamono anareo fa manatitra fanompoam-pivavahana ho an''Andriamanitra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary izany no hataony, satria tsy fantany ny Ray na Izaho. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa izany teny izany efa nolazaiko taminareo, mba hotsaroanareo, raha tonga ny fotoan''androny, fa Izaho efa nilaza izany taminareo. Ary tsy mba nolazaiko taminareo hatramin''ny voalohany izany, satria mbola tatỳ aminareo ihany Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa ankehitriny mankany amin''izay naniraka Ahy Aho, ary tsy misy aminareo manontany Ahy hoe: Hankaiza Hianao? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa satria nilaza izany taminareo Aho, dia vonton''alahelo ny fonareo. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa Izaho milaza ny marina aminareo; mahatsara anareo ny fialàko; fa raha tsy hiala Aho, dia tsy ho avy aminareo ny Mpananatra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Izahao 14.16
    marker-yv: yv-n
  - type: text
    text: '; fa raha handeha Aho, dia hirahiko hoy aminareo Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary raha tonga Izy, dia hampiaiky izao tontolo izao ny fahotana sy ny fahamarinana ary ny fitsarana: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ny fahotana, satria tsy mino Ahy izy; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ny fahamarinana, satria mankany amin''ny Ray Aho, ka tsy mahita Ahy intsony ianareo; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ny fitsarana, satria ny andrianan''izao tontolo izao dia efa voatsara. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mbola manana zavatra maro holazaina aminareo Aho, nefa tsy zakanareo ankehitriny. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa raha tonga ny Fanahin''ny fahamarinana, dia Izy no hitari-dalana anareo ho amin''ny marina rehetra; fa tsy hiteny ho Azy Izy, fa izay ho reny dia holazainy avokoa; ary ny zavatra ho avy aza dia hambarany aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izy hankalaza Ahy; fa handray avy amin''ny Ahy Izy ka hanambara izany aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Izay rehetra ananan''ny Ray dia Ahy avokoa, koa izany no nilazako fa mandray avy amin''ny Ahy Izy ka hanambara izany aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Vetivety foana dia tsy hahita Ahy intsony ianareo; ary vetivety foana indray dia hahita Ahy ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny mpianany sasany niresaka hoe: Inona izany nolazainy tamintsika hoe: Vetivety foana dia tsy hahita Ahy ianareo; ary vetivety foana indray dia hahita Ahy ianareo, ary, satria mankany amin''ny Ray Aho? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy koa ireo: Inona izany lazainy hoe vetivety foana izany? Tsy fantatsika izay lazainy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary Jesosy nahalala fa ta-hanontany Azy ireo, dia hoy Izy taminy: Mifanontany va ianareo, satria hoy Izaho: Vetivety foana dia tsy hahita Ahy ianareo, ary vetivety foana indray dia hahita Ahy ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Lazaiko aminareo marina dia marina tokoa: Hitomany sy hisaona ianareo, fa izao tontolo izao kosa hifaly; ary ianareo halahelo, nefa ny alahelonareo hody fifaliana. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Manam-pahoriana ny vehivavy raha miteraka, satria tonga ny fotoany; fa rehefa velon-jaza izy, dia tsy tsaroany intsony ilay fahoriany, noho ny fifaliany fa misy zaza nateraka ho ambonin''ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ianareo dia manana alahelo ankehitriny; fa hahita anareo indray Aho, dia ho faly ny fonareo, ary tsy misy olona manaisotra ny fifalianareo aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary amin''izany andro izany dia tsy hanontany Ahy na inona na inona ianareo; lazaiko aminareo marina dia marina tokoa fa na inona na inona hangatahinareo amin''ny Ray dia homeny anareo amin''ny anarako izany. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mandraka ankehitriny dia tsy mbola nangataka na inona na inona tamin''ny anarako ianareo; mangataha, dia hahazo ianareo, mba ho tanteraka ny fifalianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fanoharana no nilazako izany zavatra izany taminareo; fa ho avy ny andro
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. ora
    marker-yv: yv-n
  - type: text
    text: ' izay tsy hilazako fanoharana aminareo intsony, fa hambarako tsotra aminareo ny amin''ny Ray. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Amin''izany andro izany dia hangataka amin''ny anarako ianareo; ary tsy milaza aminareo Aho fa Izaho no hangataka amin''ny Ray ho anareo; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'fa ny Ray dia tia anareo satria ianareo efa tia Ahy, ary efa nino fa nivoaka avy tamin''ny Ray Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Eny, nivoaka avy tamin''ny Ray Aho ka tonga amin''izao tontolo izao; ary hiala amin''izao tontolo izao indray Aho ka hankany amin''ny Ray. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Hoy ny mpianany: Indro, milaza tsotra Hianao ankehitriny, fa tsy manao fanoharana akory. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ankehitriny dia fantatray fa mahalala ny zavatra rehetra Hianao ka tsy mitady olona hanontany Anao; izany no inoanay fa nivoaka avy tamin''Andriamanitra Hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jesosy namaly azy hoe: Mino va ianareo ankehitriny? '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Indro, avy ny andro
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr ora
    marker-yv: yv-n
  - type: text
    text: ', eny, efa tonga, izay hielezanareo samy ho any amin''ny azy avy, ary hilaozanareo ho irery Aho; kanefa tsy irery Aho, fa ny Ray no ato amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Izany teny izany efa nolazaiko taminareo mba hanananareo fiadanana amiko. Atỳ amin'izao tontolo izao no ahitanareo fahoriana; nefa matokia; Izaho efa naharesy izao tontolo izao.
