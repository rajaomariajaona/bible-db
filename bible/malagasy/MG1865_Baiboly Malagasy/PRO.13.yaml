document_id: PRO.13,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny zanaka hendry mihaino ny fananaran-drainy; Fa ny mpaniratsira tsy mety mihaino, na dia anarina mafy aza. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fifandirana ihany no vokatry ny fiavonavonana; Fa ao amin'ny mino anatra no misy fahendrena.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny harena azoazo foana dia mihena lalandava; Fa izay mahavatra mitsimpona no mampitombo.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fanantenana tsy azo vetivety dia mankarary am-bavafo; Fa hazon'aina ny faniriana tanteraka.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay manamavo ny teny ho voasingony
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: mahavery tena'
      marker-yv: yv-n
    - type: text
      text: '; Fa izay matahotra ny didy no hahazo valim-pitia. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fampianaran'ny hendry dia loharanon'aina Ka mampivily tsy ho ao amin'ny fandriky ny fahafatesana.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fahendrena tsara dia ahazoam-pitia; Fa sarotra ny lalan'ny mpivadika.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny mahira-tsaina, rehetra miasa amin'ny fahalalana; Fa ny adala kosa mampiseho hadalana;
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny iraka ratsy fanahy idiran-doza; Fa ny iraka mahatoky dia famelombelomana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fanasitranana'
      marker-yv: yv-n
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fahalahelovana sy henatra no ho an''izay mandà famaizana; Fa izay manaiky anatra no homem-boninahitra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mamin'ny fo ny faniriana tanteraka
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: efa mitranga'
      marker-yv: yv-n
    - type: text
      text: ; Fa fahavetavetana eo imason'ny adala ny hiala amin'ny ratsy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vokatry ny vavan''ny olona no ahazoany soa; Fa ny hampidi-doza no mahafaly ny mpivadika. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay miara-dia amin'ny hendry dia ho hendry; Fa izay misakaiza amin'ny adala dia hidiran-doza
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ho ratsy'
      marker-yv: yv-n
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny mpanota dia enjehin''ny loza: Fa hovalian-tsoa ny marina.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tsara fanahy mahenina lova ny zafiny, Fa ny haren'ny mpanota kosa voatahiry ho an'ny marina.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny tanin''ny malahelo izay voasa dia ahazoana hanina be; Fa maro no ringana noho ny fanaovan''izay tsy rariny. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mitsitsy ny tsorakazony dia tsy tia ny zanany; Fa izay tia zanaka dia manafay azy, raha mbola kely.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny marina mihinana ka voky tsara; Fa noana ny kibon'ny ratsy fanahy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mahambim-bava no miaro ny ainy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ny fanahiny'
      marker-yv: yv-n
    - type: text
      text: ; Fa izay vavàna dia haringana.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fanahin'ny kamo maniry, fa tsy mba mahazo; Fa ny fanahin'ny mazoto hohatavezina.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny lainga dia halan'ny marina; Fa ny ratsy fanahy manao izay maharikoriko sy mahamenatra.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fahamarinana miaro izay mandeha tsy misy tsiny; Fa ny haratsiana mamotraka ny mpanota. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Misy mihambo ho manan-karena, nefa tsy manana na inona na inona; Misy kosa mody malahelo, nefa manana harena be.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny haren''ny olona dia avotry ny ainy; Fa ny levilevy tsy mampiraika ny malahelo akory. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fahazavan'ny marina dia tsara firehitra
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. mifaly
      marker-yv: yv-n
    - type: text
      text: ; Fa ny jiron'ny ratsy fanahy ho faty.
