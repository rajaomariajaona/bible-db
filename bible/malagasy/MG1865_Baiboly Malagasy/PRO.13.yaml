document_id: PRO.13,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ny zanaka hendry mihaino ny fananaran-drainy; Fa ny mpaniratsira tsy mety mihaino, na dia anarina mafy aza. '
  '10':
  - type: text
    content: Fifandirana ihany no vokatry ny fiavonavonana; Fa ao amin'ny mino anatra no misy fahendrena.
  '11':
  - type: text
    content: Ny harena azoazo foana dia mihena lalandava; Fa izay mahavatra mitsimpona no mampitombo.
  '12':
  - type: text
    content: Ny fanantenana tsy azo vetivety dia mankarary am-bavafo; Fa hazon'aina ny faniriana tanteraka.
  '13':
  - type: text
    content: Izay manamavo ny teny ho voasingony
  - type: note
    content: 'Na: mahavery tena'
  - type: text
    content: '; Fa izay matahotra ny didy no hahazo valim-pitia. '
  '14':
  - type: text
    content: Ny fampianaran'ny hendry dia loharanon'aina Ka mampivily tsy ho ao amin'ny fandriky ny fahafatesana.
  '15':
  - type: text
    content: Ny fahendrena tsara dia ahazoam-pitia; Fa sarotra ny lalan'ny mpivadika.
  '16':
  - type: text
    content: Ny mahira-tsaina, rehetra miasa amin'ny fahalalana; Fa ny adala kosa mampiseho hadalana;
  '17':
  - type: text
    content: Ny iraka ratsy fanahy idiran-doza; Fa ny iraka mahatoky dia famelombelomana
  - type: note
    content: 'Na: fanasitranana'
  - type: text
    content: .
  '18':
  - type: text
    content: 'Fahalahelovana sy henatra no ho an''izay mandà famaizana; Fa izay manaiky anatra no homem-boninahitra. '
  '19':
  - type: text
    content: Mamin'ny fo ny faniriana tanteraka
  - type: note
    content: 'Na: efa mitranga'
  - type: text
    content: ; Fa fahavetavetana eo imason'ny adala ny hiala amin'ny ratsy.
  '2':
  - type: text
    content: 'Ny vokatry ny vavan''ny olona no ahazoany soa; Fa ny hampidi-doza no mahafaly ny mpivadika. '
  '20':
  - type: text
    content: Izay miara-dia amin'ny hendry dia ho hendry; Fa izay misakaiza amin'ny adala dia hidiran-doza
  - type: note
    content: 'Na: ho ratsy'
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Ny mpanota dia enjehin''ny loza: Fa hovalian-tsoa ny marina.'
  '22':
  - type: text
    content: Ny tsara fanahy mahenina lova ny zafiny, Fa ny haren'ny mpanota kosa voatahiry ho an'ny marina.
  '23':
  - type: text
    content: 'Ny tanin''ny malahelo izay voasa dia ahazoana hanina be; Fa maro no ringana noho ny fanaovan''izay tsy rariny. '
  '24':
  - type: text
    content: Izay mitsitsy ny tsorakazony dia tsy tia ny zanany; Fa izay tia zanaka dia manafay azy, raha mbola kely.
  '25':
  - type: text
    content: Ny marina mihinana ka voky tsara; Fa noana ny kibon'ny ratsy fanahy.
  '3':
  - type: text
    content: Izay mahambim-bava no miaro ny ainy
  - type: note
    content: 'Na: ny fanahiny'
  - type: text
    content: ; Fa izay vavàna dia haringana.
  '4':
  - type: text
    content: Ny fanahin'ny kamo maniry, fa tsy mba mahazo; Fa ny fanahin'ny mazoto hohatavezina.
  '5':
  - type: text
    content: Ny lainga dia halan'ny marina; Fa ny ratsy fanahy manao izay maharikoriko sy mahamenatra.
  '6':
  - type: text
    content: 'Ny fahamarinana miaro izay mandeha tsy misy tsiny; Fa ny haratsiana mamotraka ny mpanota. '
  '7':
  - type: text
    content: Misy mihambo ho manan-karena, nefa tsy manana na inona na inona; Misy kosa mody malahelo, nefa manana harena be.
  '8':
  - type: text
    content: 'Ny haren''ny olona dia avotry ny ainy; Fa ny levilevy tsy mampiraika ny malahelo akory. '
  '9':
  - type: text
    content: Ny fahazavan'ny marina dia tsara firehitra
  - type: note
    content: Heb. mifaly
  - type: text
    content: ; Fa ny jiron'ny ratsy fanahy ho faty.
