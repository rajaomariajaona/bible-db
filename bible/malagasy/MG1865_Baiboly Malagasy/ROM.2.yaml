document_id: ROM.2,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny tsi-fahamarinan'ny Jiosy sy ny tsy ahazoany fahamarinana avy amin'ny lalàna
  - type: text
    content: Koa amin'izany dia tsy manan-kalahatra ianao, ralehilahy
  - type: note
    content: Gr. olona
  - type: text
    content: ', na zovy na zovy ianao izay mitsara; fa izay itsaranao ny sasany no anamelohanao ny tenanao koa, fa ianao izay mitsara aza dia mba manao izany ihany koa. '
  '10':
  - type: text
    content: fa voninahitra sy laza ary fiadanana kosa ho an'ny olona rehetra izay manao ny tsara, amin'ny Jiosy aloha, dia vao amin'ny jentilisa
  - type: note
    content: Gr. Grika
  - type: text
    content: ' koa. '
  '11':
  - type: text
    content: 'Fa tsy misy fizahan-tavan''olona amin''Andriamanitra. '
  '12':
  - type: text
    content: 'Fa izay nanota tsy nanana ny lalàna dia ho very tsy manana ny lalàna; fa izay nanota nanana ny lalàna kosa dia hotsaraina araka ny lalàna. '
  '13':
  - type: text
    content: 'Fa tsy ny mpandre ny lalàna no marina eo anatrehan''Andriamanitra, fa ny mpankatò ny lalàna no hohamarinina; '
  '14':
  - type: text
    content: 'fa na oviana na oviana ireo jentilisa tsy manana ny lalàna ireo no misy manao izay nandidian''ny lalàna araka ny nahim-pony, na dia tsy manana ny lalàna aza ireo, dia lalàn-tenany ihany; '
  '15':
  - type: text
    content: 'fa ireo maneho ny asan''ny lalàna ho voasoratra ao am-pony, sady ny fieritreretany no vavolombelony, ary ny fisainany mifampiampanga, nefa mba mifanafaka ihany koa aza,- '
  '16':
  - type: text
    content: 'amin''ny andro izay hitsaran''Andriamanitra ny zavatra takona ataon''ny olona, araka ny filazantsarako amin''ny alalan''i Jesosy Kristy. '
  '17':
  - type: text
    content: 'Fa raha saingy atao hoe Jiosy ianao ka mitoky amin''ny lalàna sy manao an''Andriamanitra ho reharehanao '
  '18':
  - type: text
    content: ary mahalala ny sitrapony sady mamantatra ny zavatra tsara indrindra
  - type: note
    content: 'Na: samy hafa'
  - type: text
    content: ', satria efa nampianarina ny lalàna ianao '
  '19':
  - type: text
    content: 'ary matoky ny tenanao ho mpitarika ny jamba, fanazavana ny ao amin''ny maizina, '
  '2':
  - type: text
    content: 'Nefa fantatsika fa ny fitsaran''Andriamanitra dia araka ny marina amin''izay manao toy izany. '
  '20':
  - type: text
    content: 'mpananatra ny adala, mpampianatra ny bodo, satria ianao manana ny lalàna ho mariky ny fahalalana sy ny fahamarinana: '
  '21':
  - type: text
    content: 'ka moa ianao izay mampianatra ny sasany, tsy mba mampianatra ny tenanao koa va? Hianao izay mitory hoe: Aza mangalatra, mba mangalatra ihany va ianao? '
  '22':
  - type: text
    content: 'Hianao izay manao hoe: Aza mijangajanga, mba mijangajanga ihany va ianao? Hianao izay mametaveta ny sampy, mba mandroba tempoly ihany va ianao? '
  '23':
  - type: text
    content: 'Hianao izay manao ny lalàna ho reharehanao, mba manala voninahitra an''Andriamanitra ihany va ianao amin''ny andikanao ny lalàna? '
  '24':
  - type: text
    content: Fa araka ny voasoratra, dia ianareo no itenenana ratsy
  - type: note
    content: Gr. anaovana blasfemia; izahao Mat. 9, 3
  - type: text
    content: ' ny anaran''Andriamanitra any amin''ny jentilisa (Isa. 52. 5). '
  '25':
  - type: text
    content: 'Fa ny famorana mahasoa tokoa, raha mankatò ny lalàna ianao; fa raha mpandika ny lalàna kosa ianao, dia efa tonga toy ny tsy voafora, na dia efa voafora aza. '
  '26':
  - type: text
    content: 'Ary raha mankatò ny fitsipiky ny lalàna ny tsy voafora, tsy hatao ho isan''ny voafora va izy, na dia tsy voafora aza? '
  '27':
  - type: text
    content: 'Ary tsy hohelohin''ny tsy mifora izay mankatò ny lalàna va ianao, izay mpandika ny lalàna, na dia manana ny soratra sy ny famorana aza ianao? '
  '28':
  - type: text
    content: 'Fa tsy izay araka ny miseho no Jiosy, ary tsy izay miseho eo amin''ny nofo no famorana; '
  '29':
  - type: text
    content: fa izay araka ny miafina no Jiosy, ary ny famorana dia amin'ny fo, amin'ny fanahy, fa tsy amin'ny soratra; ny fiderana ireny tsy avy amin'ny olona, fa avy amin'Andriamanitra.
  '3':
  - type: text
    content: Ary ianao, ralehilahy
  - type: note
    content: Gr. olona
  - type: text
    content: ', izay mitsara ny manao izany, kanefa manao izany koa ny tenanao, moa ataonao va fa ho afa-mandositra ny fitsaran''Andriamanitra ianao? '
  '4':
  - type: text
    content: 'Sa hamavoinao ny haren''ny fahamoram-panahiny sy ny fandeferany ary ny fahari-pony, satria tsy fantatrao fa ny fahamoram-panahin''Andriamanitra dia mitaona anao hibebaka? '
  '5':
  - type: text
    content: 'Fa ny ditranao sy ny fonao tsy mibebaka no irakatenao fahatezerana ho anao amin''ny andro fahatezerana sy fampisehoana ny fitsarana marin''Andriamanitra, '
  '6':
  - type: text
    content: 'Izay hamaly ny olona rehetra araka ny asany avy: '
  '7':
  - type: text
    content: 'ho an''izay maharitra manao soa mandrakariva ka mitady voninahitra sy laza ary tsi-fahafatesana, dia fiainana mandrakizay; '
  '8':
  - type: text
    content: 'fa ho an''izay mitady ny ho an''ny tenany ihany kosa sady tsy manaraka ny marina, fa manaraka ny tsy marina, dia fahavinirana sy fahatezerana, '
  '9':
  - type: text
    content: 'eny, fahoriana sy fahantrana ho an''ny fanahin''ny olona rehetra izay manao ratsy, amin''ny Jiosy aloha, dia vao amin''ny jentilisa koa; '
