document_id: ISA.25,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Hira fisaorana an'Andriamanitra noho ny soa nataony ho an'ny olony sy ny nampijaliany ny fahavalony kosa
  - type: text
    content: 'Jehovah ô, Andriamanitro Hianao; Hanandratra Anao sy hidera ny anaranao aho, fa efa nanao zava-mahagaga Hianao, dia zavatra efa voakasa hatramin''ny ela sady mahatoky no marina indrindra. '
  '10':
  - type: text
    content: 'Fa hipetraka amin''ity tendrombohitra ity ny tànan''i Jehovah, ary Moaba hohosihosena ao amin''izay itoerany, dia tahaka ny fanosihosena ny mololo miavosa amin''ny rano ao am-pahitra; '
  '11':
  - type: text
    content: Ary ireo dia hamelatra ny tanany eo ampovoan'izany, tahaka ny famelatry ny mpilomano ny tanany raha milomano; Fa Jehovah
  - type: note
    content: Heb. Izy
  - type: text
    content: ' kosa hampietry ny fiavonavonany, na dia kanto aza ny fahamailamailaky ny tànany. '
  '12':
  - type: text
    content: Ary ny mandanao mafy sy avo dia harodany ka haetriny sy hofongorany hatramin'ny tany, dia hatramin'ny vovoka.
  '2':
  - type: text
    content: Fa efa nataonao tonga korontam-bato ny tanàna; Ny tanàna mimanda dia rava tokoa; Ny lapan'ny fahavalo
  - type: note
    content: Heb. hafa firenena
  - type: text
    content: ' dia nataonao tsy vanon-ko tanàna; Tsy hatsangana intsony mandrakizay iny; '
  '3':
  - type: text
    content: 'Ka dia hankalaza Anao ny firenena masiaka, Hatahotra Anao ny tanànan''ny firenena lozabe. '
  '4':
  - type: text
    content: 'Fa fiarovana mafy ho an''ny reraka Hianao, eny, fiarovana mafy ho an''ny malahelo amin''ny fahoriany, fierena amin''ny ranonoram-baratra, fialokalofana amin''ny hainandro, fa ny rivotry ny mahery dia tahaka ny ranonorana mifafy mamely ny ampiantany. '
  '5':
  - type: text
    content: 'Tahaka ny fandresinao ny hainandro izay mamely ny tany karankaina no andresenao ny fitabataban''ny firenena hafa; Eny, tahaka ny amin''ny hainandro resin''ny aloky ny rahona matevina no andresena ny fanakoran''ny olon-dozabe. '
  '6':
  - type: text
    content: 'Ary Jehovah, Tompon''ny maro, dia hanao fanasana ho an''ny firenena rehetra eto amin''ity tendrombohitra ity, dia fanasana amin''ny zavatra matavy, fanasana amin''ny divay efa niotrika ela, zavatra matavy be tsoka, divay efa niotrika ela sady voadio tsara. '
  '7':
  - type: text
    content: 'Ary hofoanany eto amin''ity tendrombohitra ity, ny sarona izay manarona ny olona rehetra sy ny rakotra izay arakotra ny firenena rehetra. '
  '8':
  - type: text
    content: 'Hofoanany tsy hisy mandrakizay ny fahafatesana; Ary Jehovah Tompo hamafa ny ranomaso amin''ny tava rehetra sady hanafa-tondromaso ny olony eny amin''ny tany rehetra, fa Jehovah no efa niteny. '
  '9':
  - type: text
    content: 'Ary holazaina amin''izany andro izany hoe: Indro Andriamanitsika, izay nandrasantsika hamonjy antsika; Indro Jehovah, Izay nandrasan-tsika, koa dia aoka ho faly sy ho ravoravo amin''ny famonjeny isika. '
