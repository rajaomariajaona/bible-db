document_id: 2TH.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hafalian'i Paoly noho ny faharetan'ny Kristiana tao Tesalonika sy ny finoany ary ny fitiavany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paoly sy Silasy ary Timoty mamangy ny fiangonan''ny Tesaloniana, izay ao amin''Andriamanitra Raintsika sy Jesosy Kristy Tompo: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ho aminareo anie ny fahasoavana sy ny fiadanana avy amin''Andriamanitra Ray sy Jesosy Kristy Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tsy maintsy misaotra an''Andriamanitra mandrakariva izahay noho ny aminareo. ry rahalahy, fa mahamendrika isany, satria mitombo fatratra ny finoanareo, ary be ny fifankatiavanareo rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ka reharehan'ny tenanay ianareo eny amin'ny fiangonan
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. eklesia
    marker-yv: yv-n
  - type: text
    text: '''Andriamanitra noho ny faharetanareo sy ny finoanareo amin''ny fanenjehana rehetra izay manjo anareo sy ny fahoriana izay iaretanareo- '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'famantarana ny fitsarana marin''Andriamanitra izany - mba hatao ho miendrika ny fanjakan''Andriamanitra ianareo, sady izany koa no iaretanareo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'fa zavatra marina amin''Andriamanitra ny hamaly fahoriana izay mampahory anareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary ny hanome fitsaharana anareo izay ampahorina kosa mbamin''ny tenanay, raha hiseho Jesosy Tompo, avy any an-danitra mbamin''ny anjelin''ny heriny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'amin''ny afo midedadeda, hamaly izay tsy mahalala an''Andriamanitra sy izay tsy manaiky ny filazantsaran''i Jesosy Tompontsika, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'dia olona izay hiharan''ny famaliana marina dia fahaverezana mandrakizay avy amin''ny fanatrehan''ny Tompo sy ny voninahitry ny heriny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'raha tonga Izy mba hankalazaina eo amin''ny olony masina sy higagana eo amin''izay rehetra mino amin izany andro izany, satria ninoana ny fanambaranay taminareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary izany no angatahinay mandrakariva ny aminareo, mba hataon''Andriamanitsika ho miendrika ny fiantsoana ianareo, ary hotanterahiny amin''ny hery ny fankasitrahana tsara rehetra sy ny asan''ny finoana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: mba hankalazaina ao aminareo ny anaran'i Jesosy Tompontsika, ary ianareo ao aminy kosa, araka ny fahasoavan'Andriamanitsika sy Jesosy Kristy Tompo.
