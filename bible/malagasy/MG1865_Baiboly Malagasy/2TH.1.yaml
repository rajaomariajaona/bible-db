document_id: 2TH.1,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny hafalian'i Paoly noho ny faharetan'ny Kristiana tao Tesalonika sy ny finoany ary ny fitiavany
  - type: text
    content: 'Paoly sy Silasy ary Timoty mamangy ny fiangonan''ny Tesaloniana, izay ao amin''Andriamanitra Raintsika sy Jesosy Kristy Tompo: '
  '10':
  - type: text
    content: 'raha tonga Izy mba hankalazaina eo amin''ny olony masina sy higagana eo amin''izay rehetra mino amin izany andro izany, satria ninoana ny fanambaranay taminareo. '
  '11':
  - type: text
    content: 'Ary izany no angatahinay mandrakariva ny aminareo, mba hataon''Andriamanitsika ho miendrika ny fiantsoana ianareo, ary hotanterahiny amin''ny hery ny fankasitrahana tsara rehetra sy ny asan''ny finoana, '
  '12':
  - type: text
    content: mba hankalazaina ao aminareo ny anaran'i Jesosy Tompontsika, ary ianareo ao aminy kosa, araka ny fahasoavan'Andriamanitsika sy Jesosy Kristy Tompo.
  '2':
  - type: text
    content: 'ho aminareo anie ny fahasoavana sy ny fiadanana avy amin''Andriamanitra Ray sy Jesosy Kristy Tompo. '
  '3':
  - type: text
    content: 'Tsy maintsy misaotra an''Andriamanitra mandrakariva izahay noho ny aminareo. ry rahalahy, fa mahamendrika isany, satria mitombo fatratra ny finoanareo, ary be ny fifankatiavanareo rehetra, '
  '4':
  - type: text
    content: ka reharehan'ny tenanay ianareo eny amin'ny fiangonan
  - type: note
    content: Gr. eklesia
  - type: text
    content: '''Andriamanitra noho ny faharetanareo sy ny finoanareo amin''ny fanenjehana rehetra izay manjo anareo sy ny fahoriana izay iaretanareo- '
  '5':
  - type: text
    content: 'famantarana ny fitsarana marin''Andriamanitra izany - mba hatao ho miendrika ny fanjakan''Andriamanitra ianareo, sady izany koa no iaretanareo '
  '6':
  - type: text
    content: 'fa zavatra marina amin''Andriamanitra ny hamaly fahoriana izay mampahory anareo, '
  '7':
  - type: text
    content: 'ary ny hanome fitsaharana anareo izay ampahorina kosa mbamin''ny tenanay, raha hiseho Jesosy Tompo, avy any an-danitra mbamin''ny anjelin''ny heriny, '
  '8':
  - type: text
    content: 'amin''ny afo midedadeda, hamaly izay tsy mahalala an''Andriamanitra sy izay tsy manaiky ny filazantsaran''i Jesosy Tompontsika, '
  '9':
  - type: text
    content: 'dia olona izay hiharan''ny famaliana marina dia fahaverezana mandrakizay avy amin''ny fanatrehan''ny Tompo sy ny voninahitry ny heriny, '
