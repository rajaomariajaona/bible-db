document_id: EXO.3,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary Mosesy niandry ny ondry aman''osin''i Jetro rafozany, mpisorona tao Midiana, dia nitondra ny ondry aman''osy tany ankoatry ny efitra ka nankany Horeba, tendrombohitr''Andriamanitra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Koa avia ankehitriny ianao hirahiko ho any amin''i Farao hitondra ny Zanak''Isiraely oloko hivoaka avy any Egypta. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa hoy Mosesy tamin''Andriamanitra: Iza moa aho no hankany amin''i Farao sy hitondra ny Zanak''Isiraely hivoaka avy any Egypta? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary hoy Izy: Homba anao tokoa Aho; ary izao no famantarana ho anao fa Izaho no efa naniraka anao; rehefa entinao mivoaka avy any Egypta ny olona, dia hanompo an''Andriamanitra eto amin''ity tendrombohitra ity ianareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary hoy Mosesy tamin''Andriamanitra: Indro, rehefa tonga any amin''ny Zanak''Isiraely aho ka manao aminy hoe: Andriamanitry ny razanareo no efa naniraka ahy ho atỳ aminareo, ary hanao amiko hoe kosa izy: Iza moa no anarany? dia ahoana no havaliko azy? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary hoy Andriamanitra tamin''i Mosesy: IZAHO, IZAY IZY HATRIZAY HATRIZAY KA HO MANDRAKIZAY. Ary hoy koa Izy: Izao no holazainao amin''ny Zanak''Isiraely: IZAHO IZAY Izy no efa naniraka ahy ho atỳ aminareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary hoy koa Andriamanitra tamin''i Mosesy: Izao no holazainao amin''ny Zanak''Isiraely: Jehovah, Andriamanitry ny razanareo, dia Andriamanitr''i Abrahama sy Andriamanitr''i Isaka ary Andriamanitr''i Jakoba, no efa naniraka ahy ho atỳ aminareo; izany no anarako mandrakizay, ary izany no hahatsiarovana Ahy hatramin''ny taranaka fara mandimby. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Mandehana, dia angòny ny loholon''ny Isiraely, ka lazao aminy hoe: Efa niseho tamiko Jehovah, Andriamanitry ny razanareo, dia Andriamanitr''i Abrahama sy Isaka ary Jakoba, ka nanao hoe: Efa namangy anareo tokoa Aho ka nahita ny anaovana anareo atỳ Egypta; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'ary hoy Izaho: Hitondra anareo hiakatra Aho ho afaka amin''ny fahoriana atỳ Egypta ho any amin''ny tanin''ny Kananita sy ny Hetita sy ny Amorita sy ny Perizita sy ny Hivita ary ny Jebosita, ho any amin''izay tany tondra-dronono sy tantely. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia hihaino ny feonao izy; ary hankao amin''ny mpanjakan''i Egypta ianao sy ny loholon''ny Isiraely ka hilaza aminy hoe: Jehovah, Andriamanitry ny Hebreo, efa nihaona taminay; ary ankehitriny, trarantitra ianao, aoka handeha lalan-kateloana any an-efitra izahay mba hamono zavatra hatao fanatitra ho an''i Jehovah Andriamanitray. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Kanefa Izaho mahalala fa tsy havelan''ny mpanjakan''i Egypta handeha ianareo, tsia, na dia amin''ny tanana mahery aza. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary Ilay Anjelin''i Jehovah niseho taminy teo anaty lelafo teo amin''ny roimemy anankiray; dia nijery izy, ka, indro, nirehitra afo ny roimemy, kanefa tsy nahalevonana. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia haninjitra ny tanako Aho ka hamely an''i Egypta amin''ny fahagagana rehetra izay hataoko eo aminy; ary rehefa afaka izany, dia vao handefa anareo izy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary hataoko mahita fitia eo imason''ny Egyptiana ity firenena ity, ka raha handeha ianareo, dia tsy mba handeha maina; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: fa ny vehivavy samy hangataka firavaka volafotsy sy volamena ary fitafiana amin'ny miray monina aminy sy amin'izay mivahiny ao an-tranony; dia hataonareo amin'ny zanakareo-lahy sy ny zanakareo-vavy izany, ka dia hofoananareo ny Egyptiana.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary hoy Mosesy: Hivily kely aho ka hizaha io fahitana lehibe io, hahafantarako izay tsy ahalevonan''ny roimemy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary rehefa hitan''i Jehovah fa nivily hizaha izy, dia niantso azy tao afovoan''ny roimemy Andriamanitra ka nanao hoe: Ry Mosesy, ry Mosesy! Dia hoy izy: Inty aho. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary hoy Izy: Aza manakaiky etỳ; esory ny kapanao amin''ny tongotrao, fa tany masina io ijanonanao io. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia hoy koa Izy: Izaho no Andriamanitry ny razanao, dia Andriamanitr''i Abrahama sy Andriamanitr''Isaka ary Andriamanitr''i Jakoba. Dia nisaron-tava Mosesy, fa natahotra hijery an''Andriamanitra izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary hoy Jehovah: Efa hitako tokoa ny fahorian''ny oloko izay any Egypta, ary efa reko ny fitarainany noho ny ataon''ny mpampiasa azy; eny, fantatro ny alahelony; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'dia efa nidina Aho izao hamonjy azy amin''ny tanan''ny Egyptiana ka hitondra azy hiakatra hiala amin''izany tany izany ho any amin''izay tany soa sy malalaka, dia any amin''izay tany tondra-dronono sy tantely, any amin''ny tanin''ny Kananita sy ny Hetita sy ny Amorita sy ny Perizita sy ny Hivita ary ny Jebosita. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary ankehitriny, indro, ny fitarainan''ny Zanak''Isiraely dia efa mby atỳ amiko, sady efa hitako koa ny fahoriana izay ampahorian''ny Egyptiana azy. '
