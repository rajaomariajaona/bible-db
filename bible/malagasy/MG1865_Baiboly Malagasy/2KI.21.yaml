document_id: 2KI.21
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanjakan'i Manase sy Amona
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Roa ambin''ny folo taona Manase, fony izy vao nanjaka, ary dimy amby dimam-polo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Hefziba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nanao izay ratsy eo imason''i Jehovah izy tahaka ny fahavetavetan''ny firenena izay noroahin''i Jehovah tsy ho eo anoloan''ny Zanak''Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa namboariny indray ny fitoerana avo, izay noravan''i Hezekia rainy, ka nanangana alitara ho an''i Bala izy sady nanao Aseraha, tahaka izay nataon''i Ahaba, mpanjakan''ny Isiraely; ary niankohoka teo anatrehan''izay rehetra eny amin''ny lanitra izy ka nanompo ireny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'sady nanao alitara tao an-tranon''i Jehovah koa izy, dia tao amin''izay nolazain''i Jehovah hoe: Ao Jerosalema no hasiako ny anarako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa nanao alitara teo anatin''ny kianja roa tamin''ny tranon''i Jehovah ho an''izay rehetra eny amin''ny lanitra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny zanany nampamakiny ny afo, sady nanandro sy nanao sikidy izy ary naka ny manao azy ho tsindrian-javatra sy ny mpanao hatsarana, ary nahery nanao izay ratsy eo imason''i Jehovah izy ka nampahatezitra Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny sarin''i Astarta izay nataony dia napetrany tao amin''ny trano nolazain''i Jehovah tamin''i Davida sy Solomona zanany hoe: Ato amin''ity trano ity sy eto Jerosalema, izay nofidiko tamin''ny firenen''Isiraely rehetra, no hasiako ny anarako mandrakizay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary tsy hampandeha ny tongotry ny Isiraely intsony hiala amin''ny tany izay nomeko ny razany Aho, raha mba hitandrina ka hanao araka izay rehetra nandidiako azy sy araka ny lalàna rehetra izay nandidian''i Mosesy mpanompoko azy ihany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nefa tsy nihaino izy; fa Manase nitaona azy hanao ratsy mihoatra noho ny nataon''ny jentilisa, izay naringan''i Jehovah tsy ho eo anoloan''ny Zanak''Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Jehovah nampilaza ny mpaminany mpanompony hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Satria Manase, mpanjakan''ny Joda, nanao izao fahavetavetana izao ka nanao ratsy mihoatra noho izay rehetra nataon''ny Amorita izay teo alohany sady nampanota ny Joda tamin''ny sampiny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia izao kosa no lazain''i Jehovah, Andriamanitry ny Isiraely: Indro, hahatonga loza amin''i Jerosalema sy ny Joda Aho, ka izay rehetra mandre izany dia hangintsingintsina ny sofiny roa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary hohenjaniko ato Jerosalema ny famolainan''i Samaria sy ny pilaon''ny taranak''i Ahaba; ary hamaoka an''i Jerosalema Aho, toy ny olona mamaoka lovia ka sady mamaoka no manohoka azy koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary hafoiko ny lovako sisa ka hatolotro ho eo an-tànan''ny fahavalony; dia ho sambotra sy ho babon''ny fahavalony rehetra izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: satria efa nanao izay ratsy eo imasoko izy ka nampahatezitra Ahy hatramin'ny andro nivoahan'ny razany avy any Egypta ka mandraka androany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary na dia ny rà marina aza dia nalatsak'i Manase be dia be mandra-pamenony an'i Jerosalema rehetra, ho fanampin'ny ota izay nampanotany ny Joda tamin'ny nanaovany izay ratsy eo imason'i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny tantaran''i Manase sisa mbamin''izay rehetra nataony sy ny fahotana izay nataony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary Manase lasa nodi-mandry any amin'ny razany, dia nalevina teo an-tanimboly eo ala-tranony amin'ny sahan'i Oza; ary Amona zanany no nanjaka nandimby azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Roa amby roa-polo taona Amona, fony izy vao nanjaka, ary roa taona no nanjakany tany Jerosalema, Ary ny anaran-dreniny dia Mesolemeta, zanakavavin''i Haroza, avy any Jotba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nanao izay ratsy eo imason''i Jehovah koa izy tahaka ny nataon''i Manase rainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa nandeha tamin''ny lalana rehetra izay efa nalehan-drainy izy ka nanompo ny sampy izay notompoin-drainy sady niankohoka teo anatrehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary nahafoy an''i Jehovah, Andriamanitry ny razany, izy, fa tsy nandeha tamin''ny lalan''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny mpanompon''i Amona mpanjaka nikomy taminy ka namono azy tao an-tranony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ny vahoaka namono izay rehetra nikomy tamin''i Amona mpanjaka, dia nampanjaka an''i Josia zanany hisolo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary ny tantaran''i Amona sisa, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary nalevina tao amin'ny fasany tao amin'ny sahan'i Oza izy; ary Josia zanany no nanjaka nandimby azy.
