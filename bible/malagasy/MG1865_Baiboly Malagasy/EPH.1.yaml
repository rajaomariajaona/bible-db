document_id: EPH.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fivavahana ho an'ny Kristiana tao Efesosy mba handrosoany hahalala ny hatsaran'ny famonjena, sy fampahatsiarovana azy ny halehiben'ny fitiavan'Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Paoly, Apostolin'i Kristy Jesosy noho ny sitrapon'Andriamanitra, mamangy ny olona masina any Efesosy, izay mahatoky
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mino an'''
    marker-yv: yv-n
  - type: text
    text: ' ao amin''i Kristy Jesosy: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ho aminareo anie ny fahasoavana sy ny fiadanana avy amin'Andriamanitra Raintsika sy Jesosy Kristy Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Isaorana anie Andriamanitra, Rain''i Jesosy Kristy Tompontsika, Izay nitahy antsika tao amin''i Kristy amin''ny fitahiam-panahy rehetra any an-danitra, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'araka ny nifidianany antsika tao aminy, fony tsy mbola ary ny fanorenan''izao tontolo izao, mba ho masina sady tsy misy tsiny eo anatrehany isika, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: rehefa notendreny rahateo amin'ny fitiavana isika mba ho Azy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: amin''ny fitiavana, rehefa notendreny rahateo ho Azy isika'
    marker-yv: yv-n
  - type: text
    text: ' amin''ny fananganan''anaka amin''ny alalan''i Jesosy Kristy, araka izay ankasitrahan''ny fony, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ho fiderana ny voninahitry ny fahasoavany, izay nanasoavany antsika maimaimpoana ao amin''ny Malala. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Izy no ananantsika fanavotana amin''ny ràny, dia ny famelana ny fahadisoantsika, araka ny haren''ny fahasoavany, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'izay nataony be ho antsika tamin''ny fahendrena sy ny fisainana rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'rehefa nampahafantariny ny zava-miafina ny amin''ny sitrapony isika, araka ny safidiny izay nokasain''ny tenany, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: hahatanterahany ny fitondrana hatao mandra-pahatapitry ny andro voatendry, hanangonany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hanangonany indray'
    marker-yv: yv-n
  - type: text
    text: ' ny zavatra rehetra ho iray ao amin''i Kristy, na ny any an-danitra, na ny etỳ an-tany, dia ho ao aminy; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ao aminy koa no nanaovana antsika ho lovany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: no nandraisantsika ny lova'
    marker-yv: yv-n
  - type: text
    text: ', rehefa notendrena rahateo isika araka ny fikasan''izay mahefa ny zavatra rehetra araka ny ankasitrahan''ny fony, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'mba ho fiderana ny voninahiny izahay, izay nanantena an''i Kristy rahateo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ao aminy koa ianareo, rehefa renareo ny tenin''ny fahamarinana, dia ny filazantsara famonjena anareo,- eny, ao aminy koa ianareo, rehefa nino, no nasiana tombo-kase tamin''ny Fanahy Masina araka ny teny fikasana. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Izany Fanahy izany no santatry ny lovantsika ho amin'ny fanavotana ny olona izay nahiny ho an'ny tenany, ho fiderana ny voninahiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary noho izany izaho koa, rehefa nandre ny finoanareo an'i Jesosy Tompo izay hitan
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (ny finoanareo an''i Jesosy Tompo sy ny fitiavanareo)'
    marker-yv: yv-n
  - type: text
    text: '''ny olona masina rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'dia tsy mitsahatra misaotra noho ny aminareo ka mahatsiaro anareo amin''ny fivavahako, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'mba homen''Andriamanitr''i Jesosy Kristy Tompontsika, Rain''ny voninahitra, ho anareo ny fanahin''ny fahendrena sy ny fanambarana amin''ny fahalalana Azy tsara, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary mba hampahiratina ny mason''ny sainareo, mba ho fantatrareo izay fanantenana avy amin''ny fiantsoany sy izay haren''ny voninahitry ny lovany eo amin''ny olona masina, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ary ny fihoaran''ny halehiben''ny heriny ho antsika izay mino, araka ny fiàsan''ny herin''ny faherezany, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'izay nataony tao amin''i Kristy tamin''ny nananganany Azy tamin''ny maty sy ny nampitoerany Azy eo amin''ny tànany ankavanana any an-danitra, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ambony lavitra noho ny fanapahana rehetra sy ny fahefana sy ny hery sy ny fanjakana ary ny anarana rehetra izay tononina, tsy amin''izao fiainana izao ihany, fa amin''ny ho avy koa, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: dia nampanaiky ny zavatra rehetra ho eo ambanin'ny tongony Izy ka nanao Azy ho Lohany manapaka ny zavatra rehetra ho an'ny fiangonana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. eklesia
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: izay tenany, dia ny fahafenoan'izay mameno izao zavatra rehetra izao amin'ny rehetra.
