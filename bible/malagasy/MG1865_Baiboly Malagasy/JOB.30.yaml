document_id: JOB.30
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fa ankehitriny kosa dia mihomehy ahy na dia izay tokon-jandriko aza, dia zanak'ireo izay nolaviko tsy ho isan'ny amboa miandry ny ondriko akory aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Eny, mampaninona ahy ny herin'ny tànan'ireo. Izay efa very fahatanjahana?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Manjenjena
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ana, na Kaozatra, na Tsy manan-janaka'
    marker-yv: yv-n
  - type: text
    text: ' noho ny tsi-fisian-kanina sy ny mosary izy; Homankomana foana any an-tany karankaina izy, dia eo an-katoky ny loza sy ny fandringanana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mitsongo anambodihena eo amin'ny kirihitrala izy, ary ny fakan'ny anjavidy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. rotema; izahao 1 Mpan. xix. 4
    marker-yv: yv-n
  - type: text
    text: ' no fihinany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Roahina tsy ho eo amin'ny olona izy sady akoraina toy ny mpangalatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Any an-dohasaha mahatsiravina no tsy maintsy itoerany, dia ao an-dava-tany sy an-dava-bato.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Minananana eny amin'ny kirihitrala izy ary mitangorona eo ambanin'ny amiana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Zanaky ny adala izy sady zanaky ny tsy manan-kaja, ka roahina tsy ho eo amin'ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary ankehitriny efa ataony an-kira aho. Eny, efa ambentinteniny aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ataony toy ny zava-betaveta aho ka halaviriny, ary tsy menatra handrora ny tavako izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Fa noketrahin'Andriamanitra ny kofehiko, ka nampietreny aho; Ka dia mba nesorin'iretsy kosa teo anatrehako ny lamboridiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Misy androvolahy mitsangana eo ankavanako; Manosika ny tongotro hiala izy ary manandratra tovon-tany hampidirany loza amiko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mandrava ny lalako sy manararaotra ny andravana ahy izy, nefa ny tenany tsy manan-kamonjy,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Toy ny fiditra eo amin'ny banga lehibe no fihaviny, ka avy ao amin'ny voarava no imaonany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Raha mbola miezinezina, dia mimaona izy'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voatodika hamely ahy ny fampitahorana: Manenjika ny voninahitro tahaka ny rivotra izy, ka levona tahaka ny rahona ny famonjena ahy'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary ankehitriny, raraka ato anatiko ny fanahiko. Fenjàn'ny andro fahoriana aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ny alina mampahalò
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. manindrona
    marker-yv: yv-n
  - type: text
    text: ' ny taolako ho afaka amiko, ary tsy mitsahatra ireo manotahota ahy ireo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Noho ny haben'ny hery dia tonga tsy antonona ny akanjoko, manenda ahy tahaka ny vozon-dobaka izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Eny, nanary ahy teo amin'ny fotaka Izy, ka efa tahaka ny vovoka sy ny lavenona aho
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mitaraina aminao aho, nefa tsy mihaino ahy Hianao; Mijoro eo aho, nefa ierenao foana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Efa manjary lozabe amiko Hianao; Ny herin'ny tananao no andrafianao ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Aingainao ho eny amin'ny rivotra aho ka alefanao handeha, ary levoninao amin'ny tafio-drivotra mifofofofo ho tsinontsinona aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Fa fantatro fa hampodinao any amin'ny fahafatesana aho, dia any amin'ny trano fivorian'ny olombelona rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Kanefa tsy manainga ny tànany va ny olona, raha ianjeran'ny rava
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: raha mila ho potraka izy'
    marker-yv: yv-n
  - type: text
    text: '? Ary tsy mitaraina va izy, raha tratry ny loza?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tsy nitomany ny ory va aho? Tsy nangorakoraka ny malahelo va ny fanahiko?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fa niandry ny soa aho, kanjo tonga ny ratsy; Ary nanantena ny mazava aho, kanjo avy ny maizina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Nandevilevy ny tsinaiko ka tsy nanam-pitsaharana; Nitsena ahy ny andro fahoriana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Mitsaitsaika mitafy lamba fisaonana aho sady tsy mahita masoandro
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Efa mainty aho, fa tsy avy amin''ny hain''andro'
    marker-yv: yv-n
  - type: text
    text: ; Mitsangana aho ka mitaraina eo ampivorian'ny olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Rahalahin'ny amboadia
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: jakala'
    marker-yv: yv-n
  - type: text
    text: ' aho Ary naman''ny ostritsa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Efa mainty ny hoditro sady miendakendaka, ary efa karankaina noho ny hafanana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. fahamainana
    marker-yv: yv-n
  - type: text
    text: ' ny taolako.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Nanjary fisaonana ny lokangako. Ary feon'ny mitomany ny sodiko.
