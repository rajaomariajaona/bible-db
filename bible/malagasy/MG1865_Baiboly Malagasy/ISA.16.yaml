document_id: ISA.16
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Atero ny zanak''ondrin''ny mpanapaka ny tany, dia miala an''i Sela ka mamaky ny efitra hatramin''ny tendrombohitr''i Ziona zanakavavy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary tahaka ny vorona notairina niala tamin''ny akaniny ka mirenireny foana, dia ho toy izany ny zanakavavin''i Moaba ao amin''ny fitàna any Arnona. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Manolora saina, manomeza rariny ataovy tahaka ny alina ny alokao, na dia amin''ilay andro mitataovovonana iny aza; Afeno izay voaroaka, Ary aza aseho izay mandositra! '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aoka hitoetra ao aminao izay oloko voaroaka; Ary aoka ho fieren'i Moaba ianao
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Aoka ho fereny ianao ry Moaba'
    marker-yv: yv-n
  - type: text
    text: ', mba tsy ho azon''ny mpandringana izy; Fa tsy misy intsony ny mpampahory, tapitra ny loza, tsy misy amin''ny tany intsony ny mpanosihosy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hisy seza fiandrianana hampitoerina amin''ny famindram-po, ka hisy hipetraka eo aminy amin''ny fahamarinana ao an-dain''i Davida, ary hitsara sy handinika izay marina izy, sady ho faingam-pamoaka ny rariny. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Efa renay ny fiavonavonan''i Moaba fatra-piavonavona loatra izy dia ny fireharehany sy ny fiavonavonany sy ny fihoa-bavany ary ny fibedibediny foana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary noho izany dia ho indray midradradradra Moaba, eny, samy hidradradradra avokoa izy rehetra; Fa hitomany ny ampempam-boalobok
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: faharavany'
    marker-yv: yv-n
  - type: text
    text: '''i Kira-haresa ianareo ka ho ory indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fa malazo avokoa ny sahan'i Hesbona sy ny voalobok'i Sibma, norantsanan'ny andrian'ny firenena ny sakeliny
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Dia ireo izay nankaleo ny andrianan''ny firenena ny sakeliny'
    marker-yv: yv-n
  - type: text
    text: ', tonga hatrany Jazera sy nisandrahaka tany an-efitra izy, ny sampany nandadilady ka tafita ny ranomasina. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Koa izany no hitomaniako ny voalobok'i Sibma, toy ny fitomanian
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fitomaniana an''i'
    marker-yv: yv-n
  - type: text
    text: '''i Jazera, handena anao amin''ny ranomasoko aho, ry Hesbona sy Elale; fa mihatra amin''ny vokatrao lohataona sy ny fararanonao ny fanakorana. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny hafaliana sy ny haravoravoana efa nesorina tamin''ny saha mahavokatra, ka tsy hisy hoby na horakoraka ao amin''ny tanim-boaloboka; Ny mpanosihosy tsy hanosihosy divay intsony ao amin''ny famiazana; Efa natsahatro ny fihobiana amin''ny fararano. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary noho izany ny tsinaiko dia mitaraina manao feon-dokanga noho ny amin''i Moaba, ary ny ato anatiko noho ny amin''i Kira-haresa. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary rehefa miseho Moaba ka sasatra ao amin''ny fitoerana avo. Ary mankao amin''ny fitoerany masina mba hivavaka, dia tsy hahazo na inona na inona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Izany no tenin''i Jehovah nataony fahiny ny amin''i Moaba. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ankehitriny koa Jehovah miteny hoe: Amin''ny telo taona, tahaka ny taonan''ny mpikarama, dia ho tsinontsinona ny voninahitr''i Moaba, na dia betsaka aza ny vahoakany'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny hareny'
    marker-yv: yv-n
  - type: text
    text: ; ary izay sisa dia ho vitsy, eny, ho vitsy foana, fa tsy ho maro.
