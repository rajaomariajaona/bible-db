document_id: ISA.16,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Atero ny zanak''ondrin''ny mpanapaka ny tany, dia miala an''i Sela ka mamaky ny efitra hatramin''ny tendrombohitr''i Ziona zanakavavy. '
  '10':
  - type: text
    content: 'Ny hafaliana sy ny haravoravoana efa nesorina tamin''ny saha mahavokatra, ka tsy hisy hoby na horakoraka ao amin''ny tanim-boaloboka; Ny mpanosihosy tsy hanosihosy divay intsony ao amin''ny famiazana; Efa natsahatro ny fihobiana amin''ny fararano. '
  '11':
  - type: text
    content: 'Ary noho izany ny tsinaiko dia mitaraina manao feon-dokanga noho ny amin''i Moaba, ary ny ato anatiko noho ny amin''i Kira-haresa. '
  '12':
  - type: text
    content: 'Ary rehefa miseho Moaba ka sasatra ao amin''ny fitoerana avo. Ary mankao amin''ny fitoerany masina mba hivavaka, dia tsy hahazo na inona na inona izy. '
  '13':
  - type: text
    content: 'Izany no tenin''i Jehovah nataony fahiny ny amin''i Moaba. '
  '14':
  - type: text
    content: 'Ary ankehitriny koa Jehovah miteny hoe: Amin''ny telo taona, tahaka ny taonan''ny mpikarama, dia ho tsinontsinona ny voninahitr''i Moaba, na dia betsaka aza ny vahoakany'
  - type: note
    content: 'Na: ny hareny'
  - type: text
    content: ; ary izay sisa dia ho vitsy, eny, ho vitsy foana, fa tsy ho maro.
  '2':
  - type: text
    content: 'Ary tahaka ny vorona notairina niala tamin''ny akaniny ka mirenireny foana, dia ho toy izany ny zanakavavin''i Moaba ao amin''ny fitàna any Arnona. '
  '3':
  - type: text
    content: 'Manolora saina, manomeza rariny ataovy tahaka ny alina ny alokao, na dia amin''ilay andro mitataovovonana iny aza; Afeno izay voaroaka, Ary aza aseho izay mandositra! '
  '4':
  - type: text
    content: Aoka hitoetra ao aminao izay oloko voaroaka; Ary aoka ho fieren'i Moaba ianao
  - type: note
    content: 'Na: Aoka ho fereny ianao ry Moaba'
  - type: text
    content: ', mba tsy ho azon''ny mpandringana izy; Fa tsy misy intsony ny mpampahory, tapitra ny loza, tsy misy amin''ny tany intsony ny mpanosihosy. '
  '5':
  - type: text
    content: 'Ary hisy seza fiandrianana hampitoerina amin''ny famindram-po, ka hisy hipetraka eo aminy amin''ny fahamarinana ao an-dain''i Davida, ary hitsara sy handinika izay marina izy, sady ho faingam-pamoaka ny rariny. '
  '6':
  - type: text
    content: 'Efa renay ny fiavonavonan''i Moaba fatra-piavonavona loatra izy dia ny fireharehany sy ny fiavonavonany sy ny fihoa-bavany ary ny fibedibediny foana. '
  '7':
  - type: text
    content: Ary noho izany dia ho indray midradradradra Moaba, eny, samy hidradradradra avokoa izy rehetra; Fa hitomany ny ampempam-boalobok
  - type: note
    content: 'Na: faharavany'
  - type: text
    content: '''i Kira-haresa ianareo ka ho ory indrindra. '
  '8':
  - type: text
    content: Fa malazo avokoa ny sahan'i Hesbona sy ny voalobok'i Sibma, norantsanan'ny andrian'ny firenena ny sakeliny
  - type: note
    content: 'Na: Dia ireo izay nankaleo ny andrianan''ny firenena ny sakeliny'
  - type: text
    content: ', tonga hatrany Jazera sy nisandrahaka tany an-efitra izy, ny sampany nandadilady ka tafita ny ranomasina. '
  '9':
  - type: text
    content: Koa izany no hitomaniako ny voalobok'i Sibma, toy ny fitomanian
  - type: note
    content: 'Na: fitomaniana an''i'
  - type: text
    content: '''i Jazera, handena anao amin''ny ranomasoko aho, ry Hesbona sy Elale; fa mihatra amin''ny vokatrao lohataona sy ny fararanonao ny fanakorana. '
