document_id: 2CH.22
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanjakan'i Atalia, sy ny namonoana azy, ary ny nampanjakana an'i Joasy handimby azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny mponina tany Jerosalema nampanjaka an''i Ahazia, faralahin''i Jehorama, handimby azy; fa ny zokiny rehetra efa matin''ny mpitoha ady izay nanaraka ny Arabo hatrany an-toby avokoa. Koa Ahazia, zanak''i Jehorama, mpanjakan''ny Joda, no nanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Roa amby efa-polo
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Roa amby roa-polo; izahao 2 Mpan. viii. 26'
    marker-yv: yv-n
  - type: text
    text: ' taona Ahazia, fony izy vao nanjaka, ary herintaona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Atalia, zanak''i Omry. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nandeha tamin''ny lalan''ny taranak''i Ahaba koa izy; fa ny reniny no nanome saina azy hanao ratsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ka dia nanao izay ratsy eo imason''i Jehovah toy ny taranak''i Ahaba izy; fa ireny no nanome saina azy taorian''ny nahafatesan''ny rainy ka nampidi-doza taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny saina nomen''ireo azy no narahiny, ka niara-nandeha tamin''i Jorama, zanak''i Ahaba, mpanjakan''ny Isiraely, izy hiady tamin''i Hazaela, mpanjakan''i Syria, teo Ramota-gileada; ary ny Syriana nahavoa an''i Jorama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dia niverina mba hotsaboina tao Jezirela izy amin'ny feriny tamin'ny nahavoazana azy tao Rama, fony izy niady tamin'i Hazaela, mpanjakan'i Syria. Ary Azaria
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ahazia; izahao and. 1'
    marker-yv: yv-n
  - type: text
    text: ', zanak''i Jehorama, mpanjakan''ny Joda, nidina mba hamangy an''i Jorama, zanak''i Ahaba, tao Jezirela, satria marary izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary avy tamin''Andriamanitra ny loza nanjo an''i Ahazia tamin''ny nankanesany tany amin''i Jorama, fa nony tonga izy, dia niara-nivoaka tamin''i Jorama mba hitsena an''i Jeho, zanak''i Nimsy, izay nohosoran''i Jehovah handringana ny taranak''i Ahaba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary tamin''ny namalian''i Jeho ny taranak''i Ahaba dia hitany ireo mpanapaka ny Joda sy ny zana-drahalahin''i Ahazia, izay nanompo an''i Ahazia, ka novonoiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nitady an''i Ahazia koa izy; koa nisy nahita azy, raha mbola niery tany Samaria izy, dia nitondra azy ho any amin''i Jeho, ary namono azy ny olona ka nandevina azy; fa hoy ireo: Zanak''i Josafata, ilay nitady an''i Jehovah tamin''ny fony rehetra, ity. Ka dia tsy nahatana ny fanjakana ny terak''i Ahazia.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nony hitan''i Atalia, renin''i Ahazia, fa maty ny zanany, dia nitsangana izy ka nandringana ny zanak''andriana rehetra tamin''ny taranak''i Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa Joseba, zanakavavin''ny mpanjaka, dia naka an''i Joasy, zanak''i Ahazia, ka namonjy azy avy teo amin''ny zanaky ny mpanjaka izay novonoina, dia nampiditra azy sy ny mpitaiza azy ho ao an-trano fitehirizam-pandriana. Ary nafenin''i Joseba, zanakavavin''i Jehorama mpanjaka, vadin''i Joiada mpisorona, izy (fa anabavin''i Ahazia ravehivavy) mba tsy ho hitan''i Atalia, ka dia tsy mba voavonony izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ary niery enin-taona tao aminy tao an-tranon'Andriamanitra izy. Ary Atalia no nanjaka tamin'ny tany
