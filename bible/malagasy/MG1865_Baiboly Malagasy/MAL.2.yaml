document_id: MAL.2,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'ny andron'i Jehovah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ankehitriny, ry mpisorona, dia ho aminareo izao didy izao:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy mpiombon-dray va isika rehetra? Tsy Andriamanitra iray ihany va no nahary antsika ? Koa nahoana no samy mivadika amin''ny rahalahintsika avy isika ka mamadika ny fanekena tamin''ny razantsika? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny Joda efa namitaka, ary misy fahavetavetana atao ao amin''ny Isiraely sy ao Jerosalema; fa ny Joda efa nandoto ny fitoera-masin''i Jehovah, izay tiany, sady efa nanambady ny zanaka-vavin''ny andriamani-kafa. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Enga anie ka hofongoran'i Jehovah hiala amin'ny lain'i Jakoba ny lehilahy izay manao izany, na iza na iza
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. na ny mpiambina, na ny mpamaly
      marker-yv: yv-n
    - type: text
      text: ', sy izay manatitra fanatitra ho an''i Jehovah, Tompon''ny maro. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary faharoan''izany, dia izao koa no ataonareo: Saronanareo ranomaso sy fitomaniana ary fisentoana ny alitaran''i Jehovah, ka tsy mba jereny intsony ny fanatitra, ary tsy handray fankasitrahana avy amin''ny tananareo Izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa hoy ianareo: Nahoana? Satria Jehovah no vavolombelona ny aminao sy ny vadin''ny fahatanoranao izay nofitahinao, na dia namanao sady vady efa vita fanekena taminao aza izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moa tsy nisy anankiray nanao izany va, nefa mbola nanam-panahy ihany ? Fa inona andrefa no notadiavin'ilay anankiray? Taranaka araka an'Andriamanitra
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: moa tsy iray va no nataony? Nefa nanana fanahy sisa ihany Izy. Ary nahoana no iray? Nitady taranaka araka an''Andriamanitra Izy'
      marker-yv: yv-n
    - type: text
      text: '. Koa dia tandremo ny fanahinareo, ary aoka tsy hisy hamitaka ny vadin''ny fahatanorany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa halako ny fisaoram-bady, hoy Jehovah, Andriamanitry ny Isiraely, sy ny fanosenana fampahoriana amin'ny fitafiany, hoy Jehovah, Tompon'ny maro; koa tandremo ny fanahinareo, ary aza mamitaka ianareo.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa manasatra an''i Jehovah amin''ny teninareo ianareo. Nefa hoy ianareo: Amin''inona moa no anasaranay Azy ? Amin''ny fanaovanareo hoe: Izay rehetra manao ratsy dia tsara eo imason''i Jehovah ka ankasitrahany, na amin''ny hoe: Aiza Andriamanitry ny fitsarana ?'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha tsy hihaino na handatsaka am-po ka hanome voninahitra ny anarako ianareo, hoy Jehovah, Tompon''ny maro, dia halefako hamely anareo ny ozona, ka hozoniko ny tso-drano ataonareo; eny, efa voaozoko sahady izany, satria tsy nandatsaka am-po ianareo. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, hasiako teny mafy ny voa afafinareo, ary hofafazako tain-droroha ny tavanareo, dia ny tain-droroha avy amin''ny andro firavoravoanareo; ary hailika miaraka aminy ianareo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia ho fantatrareo fa nampitondra izany didy izany ho aminareo Aho, mba haharetan'ny fanekeko amin'i Levy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: mba ho fanekeko amin''ny Levy zanany'
      marker-yv: yv-n
    - type: text
      text: ', hoy Jehovah, Tompon''ny maro. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fanekeko taminy dia fiainana sy fiadanana; ary nomeko azy ho fahatahorana izany, ka dia natahotra Ahy sy nangovitra teo anatrehan''ny anarako izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny lalàn''ny fahamarinana no teo am-bavany, ary tsy mba nisy tsi-fahamarinana teo amin''ny molony; tamin''ny fiadanana sy ny fahitsiana no niarahany nandeha tamiko, ary maro no nampialainy tamin''ny heloka. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny molotry ny mpisorona tokony hitahiry fahalalana, ary ny lalàna hotadiavina eo am-bavany, satria irak''i Jehovah, Tompon''ny maro, izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ianareo kosa dia efa nivily lalana sady nampahatafintohina olona maro ny amin''ny lalàna ary namadika ny fanekena amin''i Levy, hoy Jehovah; Tompon''ny maro. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Izaho kosa dia efa nanolotra anareo ho fanazimbazimba sy ho fanao tsinontsinona eo anatrehan'ny vahoaka rehetra, noho ny tsy nitandremanareo ny lalako sy ny nizahanareo tavan'olona ny amin'ny lalàna.
