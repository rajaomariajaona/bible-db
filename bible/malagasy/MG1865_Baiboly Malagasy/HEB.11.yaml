document_id: HEB.11,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Filazan-tantara mampiseho ny herin'ny finoana sy ny valiny
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny finoana no fahatokiana ny amin''ny zavatra antenaina, fanehoana ny zavatra tsy hita. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa nanantena hahazo ny tanàna misy fanorenana izy, Andriamanitra no Tompo-marika sy Mpanao izany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary na Saraha aza, dia finoana koa no nandraisany hery hanan''anaka, rehefa nitsaha-jaza izy, satria nataony fa mahatoky Ilay efa nanome ny teny fikasana. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa dia avy tamin''ny anankiray, izay efa toy ny maty, no nihavian''ny maro toy ny kintana eny amin''ny lanitra sy toy ny fasika eny amoron-dranomasina, izay tsy hita isa. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo rehetra ireo dia maty tamin''ny finoana, kanefa tsy mbola nahazo ny teny fikasana; fa nahatazana azy eny lavitra eny izy ka ravoravo niarahaba azy, dia nanaiky fa vahiny sy mpivahiny tetỳ ambonin''ny tany izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izay milaza izany zavatra izany dia maneho marimarina fa mitady izay ho taniny izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha tàhiny nahatsiaro ny tany nialany izy, dia ho nahita andro hiverenany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa amin''izany ny tsara lavitra no iriny, dia ny any an-danitra; ary noho izany Andriamanitra dia tsy menatra hatao hoe Andriamaniny, satria efa nanamboatra tanàna ho an''ireo Izy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finoana no nanateran i Abrahama an''isaka, raha nizahan-toetra izy; eny, ny zananilahy tokana no naterin''ilay efa nandray tsara ny teny fikasana, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia ilay nilazana hoe: "Avy amin''Isaka no hantsoina izay taranaka ho anao" (Gen. 21.12). '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nihevitra izy fa Andriamanitra dia mahay manangana ny maty aza; ary hoatra ny avy tamin''izany no nandraisany azy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izany no nahatsara laza ny ntaolo. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finoana no nitsofan''isaka rano an''i Jakoba sy Esao ny amin''ny zavatra ho avy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finoana no nitsofan''i Jakoba rano ny zanak''i Josefa roa lahy, rehefa ho faty izy, ka nivavaka izy, niankina tamin''ny lohan''ny tehiny. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finoana no nilazan''i Josefa ny fialan''ny Zanak''isiraely, rehefa ho faty izy, sy nanafarany ny amin''ny taolany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finoana no nanafenan''ny ray aman-drenin''i Mosesy azy telo volana, raha vao teraka izy, satria hitany fa zaza tsara izy, ary tsy natahorany ny didin''ny mpanjaka. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finoana no nandavan''i Mosesy tsy hatao hoe zanaky ny zanakavavin''i Farao, rehefa lehibe izy,- '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nifidy mantsy hiara-mitondra fahoriana amin''ny olon''Andriamanitra toy izay hanana fifaliana vetivety amin''ny fahotana, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'nanao ny fanaratsiana an''i Kristy ho harena be lavitra noho ny zava-tsoan''i Egypta, satria nijery ny famalian-tsoa izy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finoana no nandaovany an''i Egypta, ka tsy natahorany ny fahatezeran''ny mpanjaka; fa naharitra toy ny mahita Izay tsy hita izy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Finoana no nitandremany
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: nanendreny'
      marker-yv: yv-n
    - type: text
      text: ' ny Paska sy ny famafazana ny rà, fandrao hahatratra ny azy ilay nandringana ny lahimatoa. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finoana no nitana ny Ranomasina Mena toy ny mandia tany maina, izay mba nandraman''ny Egyptiana, ka dia voatelina izy. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finoana no ahafantarantsika fa ny tenin''Andriamanitra no nanaovana izao tontolo izao, ka dia tsy izay zavatra miseho no nanaovana izao zavatra hita izao. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finoana no nampirodana ny màndan''i Jeriko, rehefa nohodidinina hafitoana. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finoana no tsy nahafaty an-dRahaba janga niaraka tamin''ny tsy nino, satria nandray ny mpisafo-tany tamin''ny fihavanana izy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary inona koa no holazaiko? Fa ho lany ny andro, raha milaza an''i Gideona sy Baraka sy Samsona ary Jefta aho, Davida koa sy Samoela ary ny mpaminany, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izay nandresy fanjakana tamin''ny finoana, niasa fahamarinana; nahazo teny fikasana, nanakombona ny vavan''ny liona, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'namono ny fidedadedan''afo, afaka tamin''ny lelan-tsabatra, raha nalemy dia nampahatanjahina, tonga nahery tamin''ny ady, dia nampandositra ny miaramilan''ny firenena hafa. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny vehivavy nandray ny azy efa maty, fa natsangana ho velona indray; ary ny sasany nampijalijalina ho faty, nefa tsy mety nanao izay hahafahany, mba hahazoany fitsanganana tsara lavitra; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ny sasany niaritra fanesoana sy kapoka mafy ary fatorana sy tranomaizina koa; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'notoraham-bato izy, notsofana, nalaim-panahy, novonoina tamin''ny sabatra, dia nirenireny nitafy hoditr''ondry sy hoditr''osy; efa lao, ory, fadiranovana '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(nefa izao tontolo izao tsy miendrika ho nitoerany akory) dia nirenireny tany an-efitra sy tany an''tendrombohitra sy tany an-johy ary tao an-dava-tany izy. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ireo rehetra ireo, na dia efa nahazo laza tsara noho ny finoana aza, dia tsy mba nandray ny teny fikasana, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finoana no nanateran''i Abela ho an''Andriamanitra fanatitra tsara noho ny an''i Kaina, ka izany no nanambarana azy fa marina, satria Andriamanitra no nanambara ny amin''ny fanatitra nataony: ary amin''izany, na dia maty aza izy, dia mbola miteny ihany. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: fa Andriamanitra efa namboatra izay tsara lavitra ho antsika, mba tsy hatao tanteraka ireo raha tsy efa mby eo koa isika.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finoana no namindrana an''i Enoka tsy hiharan''ny fahafatesana; ka dia tsy hita izy, satria nafindran''Andriamanitra; fa talohan''ny namindrana azy dia nambara fa nankasitrahan''Andriamanitra izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha tsy amin''ny finoana, dia tsy misy azo atao hahazoana sitraka aminy; fa izay manatona an''Andriamanitra dia tsy maintsy mino fa misy Izy sady Mpamaly soa izay mazoto mitady Azy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finoana no nanamboaran''i Noa sambo fiara hamonjena ny ankohonany, fa natahotra izy, rehefa notoroan''Andriamanitra hevitra ny amin''ny zavatra tsy mbola hita; koa izany no nanamelohany izao tontolo izao sy nahatongavany ho mpandova ny fahamarinana araka ny finoana. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finoana no naneken''i Abrahama, rehefa nantsoina, hiainga hankany amin''izay tany ho azony ho lova; ka dia niainga izy, nefa tsy fantany izay halehany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Finoana no nivahiniany tany amin''ny tany nolazain''ny teny fikasana, toy ny any an-tanin''olona, mitoetra an-day, mbamin''isaka sy Jakoba, mpiara-mandova izany teny fikasana izany aminy; '
