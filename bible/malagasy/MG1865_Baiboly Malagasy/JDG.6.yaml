document_id: JDG.6
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandresen'i Gideona ny Midiana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nanao izay ratsy eo imason''i Jehovah ny Zanak''Isiraely, ka dia natolotr''i Jehovah ho eo an-tànan''ny Midiana fito taona izy; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ary ny tanan''ny Midiana dia nahery tamin''ny Isiraely, ka ny tahony ny Midiana no nanamboaran''ny Zanak''Isiraely ireo fierena any an-tendrombohitra sy ireo zohy mbamin''ny fiarovana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary rehefa namafy voa ny Isiraely, dia avy ny Midiana sy ny Amalekita ary ny zanaky ny atsinanana ka niakatra hanafika azy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia nitoby tandrifiny ireny ka nanimba ny vokatry ny tany hatrany akaikin''i Gaza; ary tsy nisy zavatra navelany hiveloman''ny Isiraely, na ondry aman''osy, na omby, na boriky; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'fa niakatra izy nitondra ny omby aman''ondriny sy ny lainy, ka ny fihaviny dia tahaka ny valala ny hamarony, ary tsy hita isa izy sy ny ramevany; dia niditra tamin''ny tany izy handrava azy '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary dia nahantra indrindra ny Isiraely noho ny Midiana, ka nitaraina tamin''i Jehovah izy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary raha nitaraina tamin''i Jehovah ny Zanak''Isiraely noho ny Midiana, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jehovah dia naniraka mpaminany anankiray ho any amin''ny zanak''Isiraely, izay nilaza taminy hoe: Izao no lazain''i Jehovah Andriamanitry ny Isiraely Izaho no nitondra anareo niakatra avy tany Egypta sady nitondra anareo nivoaka avy tany amin''ny trano nahandevozana '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ary namonjy anareo tamin''ny tanan''ny Egyptiana sy ny tànan''izay rehetra nampahory anareo, dia nandroaka ireny teo anoloanareo Aho, ka nomeko anareo ny taniny; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ary hoy Izaho taminareo: Izaho no Jehovah Andriamanitrareo; aza matahotra ny andriamanitry ny Amorita, izay tompon''ny tany onenanareo; nefa tsy nihaino ny feoko ianareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia tonga Ilay Anjelin''i Jehovah ka nipetraka teo ambanin''ny hazo terebinta teo Ofra, izay an''i Joasy Abiezrita; ary Gideona zanany nively vary tamin''ny fantàka teo anilan''ny famiazam-boaloboka mba hafeniny amin''ny Midiana. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Ilay Anjelin''i Jehovah niseho taminy ka nanao taminy hoe: Jehovah no momba anao, ry lehilahy mahery. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa hoy Gideona taminy: Indrisy, Tompoko, raha momba anay Jehovah, nahoana no ozoin''izao rehetra izao izahay? Ary aiza ny fahagagana rehetra nataony, izay nolazain''ny razanay taminay hoe: Tsy nitondra anay niakatra avy tany Egypta va Jehovah? Fa ankehitriny efa nahafoy anay mihitsy Jehovah ka nanolotra anay eo an-tànan''ny Midiana. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nitodika nijery azy Jehovah ka nanao hoe: Mandehana amin''izao herinao izao, ka vonjeo ny Isiraely amin''ny tanan''ny Midiana; tsy efa naniraka anao va Aho? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa hoy izy taminy: Indrisy, Tompo ô, hataoko ahoana no famonjy ny Isiraely? He! ny mpianakaviko no malahelo indrindra eo amin''ny Manase, ary izaho no kely indrindra amin''ny ankohonan''ny raiko. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia hoy Jehovah taminy: Homba anao tokoa Aho, ka hamely ny Midiana toy ny famely olona iray monja ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy izy taminy: Masina Hianao, raha mahita fitia eto imasonao ary aho, dia anehoy famantarana fa Hianao no miteny amiko. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Masina Hianao, aza miala eto mandra-pihaviko eto aminao hitondra ny fanatitra hohanina, ka hapetrako eto anatrehanao. Dia hoy Izy: Eny, Izaho hiandry mandra-piverinao. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary Gideona lasa niditra ka namboatra zanak''osy sy mofo tsy misy masirasira tamin''ny koba iray efaha, ka ny hena nataony tao anatin''ny harona, ary ny ron-kena nataony tao anatin''ny vilany, dia nentiny ho eo aminy, teo ambanin''ilay hazo terebinta ka natolony Azy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy Ilay Anjelin''Andriamanitra taminy: Raiso ny hena sy ny mofo tsy misy masirasira, ka apetraho eo ambonin''ity harambato ity, ary aidino ny ron-kena. Dia nataony izany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary naroson''Ilay Anjelin''i Jehovah ny lohan''ny tehina izay teny an-tànany ka natendriny ny hena sy ny mofo tsy misy masirasira; dia nisy afo nivoaka avy tamin''ny vatolampy ka nandevona ny hena sy ny mofo tsy misy masirasira. Ary Ilay Anjelin''i Jehovah dia lasa niala teo imasony. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia hitan''i Gideona fa Anjelin''i Jehovah Izy, ka hoy izy: Adray, Jehovah Tompo ô! fa nahita Ilay Anjelin''i Jehovah nifanatrika aho. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa hoy Jehovah taminy: Fiadanana anie ho anao; aza matahotra; tsy ho faty ianao tsy akory. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ary Gideona nanorina alitara teo ho an'i Jehovah-saloma
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jehovah-saloma = Jehovah no fiadanana
    marker-yv: yv-n
  - type: text
    text: '; mbola ao Ofran''ny Abiezrita izany mandraka androany. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary tamin''izany alina izany dia hoy Jehovah taminy: Alao ny ombilain-drainao, dia'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: sy'
    marker-yv: yv-n
  - type: text
    text: ' ilay ombilahy faharoa, izay efa fito taona, ka ravao ny alitaran''i Bala, izay an''ny rainao, ary kapao ny Aseraha'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Anaran'andriamani-tsi-izy, na ny sariny
    marker-yv: yv-n
  - type: text
    text: ' eo anilany; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: dia manorena alitara eto an-tampon'ity fiarovana ity ho an'i Jehovah Andriamanitrao, ka amboary tsara izy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: amin''ny zavatra vonona eo'
    marker-yv: yv-n
  - type: text
    text: ', ary alao ilay ombilahy faharoa, ka atero ho fanatitra dorana amin''ny hazon''ny Aseraha izay hokapainao. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary Gideona naka folo lahy tamin''ny mpanompony ka nanao araka izay efa nolazain''i Jehovah taminy; ary satria natahotra ny fianakavian-drainy sy ny lehilahy tao an-tanàna izy dia tsy nanao izany tamin''ny antoandro, fa tamin''ny alina no nanaovany azy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa nony nifoha maraina koa ny lehilahy tao an-tanàna, ka indro, efa rava ny alitaran''i Bala, sady voakapa ny Aseraha teo anilany, ary ilay ombilahy faharoa dia efa naterina teo ambonin''ny alitara izay natao, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'dia nifanontany hoe izy: Iza re no nanao izany zavatra izany e? Ary raha nifanontany sy nifamoaka teo izy, dia hoy izy: Gideona, zanak''i Joasy, no nanao izany zavatra izany. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia hoy ny lehilahy tao an-tanàna tamin''i Joasy: Avoahy ny zanakao mba hovonoina, satria efa nandrava ny alitaran''i Bala izy sady efa nikapa ny Aseraha teo anilany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary hoy Joasy tamin''izay rehetra nitsangana teo anatrehany: Moa ianareo handahatra ho an''i Bala va? Hianareo va no hamonjy azy? Izay handahatra ho an''i Bala dia hatao maty, raha mbola maraina'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mandra-pahamarain'''
    marker-yv: yv-n
  - type: text
    text: ' ny andro: raha andriamanitra Bala, aoka izy handahatra ho an''ny tenany, fa nisy nandrava ny alitarany. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ary tamin'izany andro izany ny anaran'ny Gideona dia nataony hoe Jerobala
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jerobala = Aoka Bala no handahatra
    marker-yv: yv-n
  - type: text
    text: ', fa hoy izy: Aoka Bala no hifandahatra aminy, satria noravany ny alitarany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary ny Midiana rehetra sy ny Amalekita ary ny zanaky ny atsinanana nivory, dia nita ka nitoby teny amin''ny tany lemaka Jezirela. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary notsindrian''ny Fanahin''i Jehovah Gideona, dia nitsoka anjomara izy, ka nivory nanaraka azy ny Abiezrita. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary naniraka olona nankany amin''ny Manase rehetra izy, dia nivory nanaraka azy ireo; ary naniraka olona tany amin''ny Asera sy ny Zebolona ary ny Naftaly izy; dia niakatra nitsena azy koa ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary hoy Gideona tamin''Andriamanitra: Raha ny tanako no hamonjenao ny Isiraely araka izay efa nolazainao, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'indro, hapetrako eo amin''ny famoloana ity volon''ondry iray manontolo ity, ka raha ny volon''ondry ihany no lenan''ny ando, fa maina ny tany rehetra, dia ho fantatro fa ny tanako no hamonjenao ny Isiraely araka izay efa nolazainao. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary dia nisy izany; fa nifoha, maraina koa izy, ka nofiazany ny volon''ondry, ary nisy ranon''ando eran''ny lovia. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary hoy koa Gideona tamin''Andriamanitra: Aoka tsy hirehitra amiko ny fahatezeranao, fa hiteny izao indray mandeha izao monja aho; aoka mba hizahako izao indray mandeha izao monja amin''ny volon''ondry: aoka ny volon''ondry ihany no ho maina, fa ny tany rehetra kosa no ho lenan''ny ando. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Dia nataon'Andriamanitra izany tamin'ny alin'iny, ka ny volon'ondry ihany no maina, fa ny tany rehetra kosa dia lenan'ny ando.
