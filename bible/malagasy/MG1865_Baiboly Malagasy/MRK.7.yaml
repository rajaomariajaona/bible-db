document_id: MRK.7,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niangona teo aminy ny Fariseo sy ny mpanora-dalàna sasany, izay avy tany Jerosalema '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Mosesy: Manajà ny rainao sy ny reninao (Eks. 20. 12), ary koa: Izay miteny ratsy ny rainy sy ny reniny dia hatao maty tokoa (Eks. 21. 17). '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy kosa ianareo: Raha misy olona milaza amin''ny rainy na amin''ny reniny hoe: Efa korbana (izany hoe, fanatitra ho an''Andriamanitra) izay rehetra tokony hahazoanao soa avy amiko, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: dia voafehin''ny voadiny izy. Ary dia etc'
      marker-yv: yv-n
    - type: text
      text: ' tsy avelanareo hanao na inona na inona ho an''ny rainy sy ny reniny intsony izy, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka dia foananareo ny tenin''Andriamanitra amin''ny fampianarana voatolotra anareo, izay nasainareo hotandremana; ary zavatra maro mifanahatahaka amin''izany koa no ataonareo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niantso ny vahoaka hankeo aminy indray Izy ka nanao taminy hoe: Mihainoa Ahy ianareo rehetra, ka mahafantara. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy ny zavatra avy eo ivelany izay miditra ao anatin'ny olona no mahaloto azy; fa izay mivoaka avy ao anatin'ny olona no mahaloto azy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Ampio hoe: (16) Raha misy manan-tsofina ho enti-mihaino, aoka izy hihaino'
      marker-yv: yv-n
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa niala teo amin''ny vahoaka Izy ka niditra tao an-trano, dia nanontany Azy ny mpianany ny amin''izany fanoharana izany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy taminy: Hay! ianareo koa aza mba tsy mahafantatra! Tsy fantatrareo va fa izay rehetra eo ivelan''ny olona ka miditra ao anatiny dia tsy mahaloto azy, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria tsy miditra ao am-pony izany, fa ao an-kibony ihany, ka dia mivoaka ao amin''ny fivoahana; izany no nolazainy mba hahadio ny hanina rehetra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nahita ny mpianatra sasany fa nihinan-kanina tamin''ny tanana tsy madio, izany hoe, tsy voasasa. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Izy: Izay mivoaka avy ao amin''ny olona, dia izany no mahaloto azy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa avy ao anatin''ny olona dia avy ao am-pony, no ivoahan''ny sain-dratsy, dia ny fijangajangana, ny halatra, ny vonoan-olona, ny fakam-badin''olona, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny fieremana, ny lolom-po, ny fitaka, ny fijejojejoana, ny maso ratsy, ny fitenenan-dratsy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. blasfemia; izahao Mat. 9. 3
      marker-yv: yv-n
    - type: text
      text: ', ny avonavona, ny fahadalana: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'izany zava-dratsy rehetra izany no mivoaka avy ao anatin''ny olona ka mahaloto azy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niala teo Jesosy ka lasa nankany amin''ny sisin-tanin''i Tyro sy Sidona; dia niditra tao an-trano Izy, ary tiany tsy ho fantatry ny olona izany; kanefa tsy nahazo niery Izy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa niaraka tamin''izay dia nisy vehivavy anankiray nandre ny aminy (ny zananivavy tanora dia azom-panahy maloto), dia nankao ka niankohoka tamin''ny tongony. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary jentilisa ravehivavy, avy amin''ny firenena Syro-foinika; dia nangataka taminy izy mba hamoaka ny demonia amin''ny zananivavy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Jesosy taminy: Aoka ho voky aloha ny zaza; fa tsy mety raha maka ny mofon-jaza ka manipy azy ho an''ny amboakely. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ravehivavy namaly ka nanao taminy hoe: Eny, Tompoko; kanefa na dia ny amboakely ao ambanin''ny latabatra aza dia mba mihinana ny sombintsombin''ny mofon-jaza ihany. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jesosy taminy: Noho izany teny izany mandehana ianao; efa nivoaka tamin''ny zanakao-vavy ny demonia. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: (Fa ny Fariseo sy ny Jiosy rehetra tsy mba mihinana, raha tsy efa manasa tsara
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. sasàny amin'ny totohondry
      marker-yv: yv-n
    - type: text
      text: ' ny tànany, satria mitàna ny fampianarana voatolotry ny razana izy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha tonga tao an-tranony ravehivavy, dia hitany nandry teo ambonin''ny farafara ny zananivavy, ary ny demonia efa nivoaka taminy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy niala indray tamin''ny sisin-tanin''i Tyro, dia namaky an''i Sidona sy ny tany Dekapolisy ka nankany amoron''ny Ranomasin''i Galilia. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy marenina sady raiki-dela anankiray nentiny tany aminy, ka nangataka taminy ireo mba hametrahany tanana. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitondra an-dralehilahy nitanila niala teo amin''ny vahoaka Izy, dia nangarona ny sofiny tamin''ny rantsan-tànany, dia nandrora ka nanendry ny lelany; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary niandrandra ny lanitra Izy, dia nisento ka nanao taminy hoe: Efata, izany hoe: Maladia. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nalady ny sofiny, sady voavaha ny fatoran''ny lelany, ka dia nahateny tsara izy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandrara ny olona teo Jesosy mba tsy hilazalaza na amin''iza na amin''iza; fa na dia norarany aza izy, dia vao mainka nampiely izany bebe kokoa. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia talanjona indrindra ny olona ka nanao hoe: Tsara ny nanaovany ny zavatra rehetra; fa sady mampahalady ny marenina Izy no mampiteny ny moana.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary raha avy any an-tsena, dia tsy mihinana izy, raha tsy misasa aloha. Ary misy fomba maro koa izay noraisiny hotanana, dia ny manasa kapoaka sy famarana
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. sekstaria
      marker-yv: yv-n
    - type: text
      text: ' mbamin''izay fanaka varahina'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'ampio hoe: ary farafara'
      marker-yv: yv-n
    - type: text
      text: '.) '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nanontany Azy ny Fariseo sy ny mpanora-dalàna hoe: Nahoana ny mpianatrao no tsy manaraka ny fampianarana voatolotry ny razana, fa mihinan-kanina amin''ny tanana tsy misasa izy? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Jesosy nanao taminy hoe: Marina ny naminanian''Isaia anareo mpihatsaravelatsihy, araka ny voasoratra hoe: Ity firenena ity manaja Ahy amin''ny molony, Fa ny fony kosa lavitra Ahy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa foana ny ivavahan''ireo amiko, Raha mampianatra ny didin''olombelona ho fampianarana izy. (Isa. 29. 13). '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahafoy ny didin''Andriamanitra ianareo ka mitana ny fanaon''ny olona. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa Izy taminy: Hay! tsara ny nahafoizanareo ny didin''Andriamanitra mba hitandremanareo ny fampianarana voatolotra anareo! '
