document_id: COL.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny naman'i Paoly, sy fanaovam-beloma ny sakaizany tao Kolosia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Hianareo tompo, ataovy amin'ny mpanomponareo izay marina sy izay mety, satria fantatrareo fa ianareo koa mba manana Tompo any an-danitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mahareta amin''ny fivavahana, ka miambena amin''izany amin''ny fisaorana, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ary mangataha koa ho anay, mba hamohan''Andriamanitra varavarana ho an''ny teny hilazanay ny zava-niafina izay an''i Kristy, sady izany no namatorana ahy, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: mba haharihariko tsara izany tahaka izay tokony hitenenako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mandehana amin''ny fahendrena amin''izay ao ivelany, hararaoty ny andro azo anaovan-tsoa. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aoka ny fiteninareo ho amin'ny fahasoavana mandrakariva, ho mamy sira, mba ho fantatrareo izay tokony havalinareo ny olona rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny toetro rehetra dia holazain''i Tykiko aminareo, dia ilay rahalahy malala sy mpanompo mahatoky ary namako manompo ao amin''ny Tompo; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ny anton''ny nanirahako azy ho atỳ aminareo indrindra dia ny hahafantaranareo ny toetray, sy ny mba hamporisihany ny fonareo; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ary Onesimosy, rahalahy mahatoky sy malala izay avy aminareo, dia nirahiko koa. Izy roa lahy hampahafantatra anareo ny zavatra rehetra atỳ . '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Manao-veloma anareo Aristarko, mpiara-mifatotra amiko, sy Marka, havan''i Barnabasy (ny aminy dia efa nandidiana anareo, ka raha tonga atỳ aminareo izy, dia raiso), '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ary Jesosy, izay atao hoe Josto, avy amin''ny voafora ireo. Ireo ihany no mpiara-miasa amiko hampandroso ny fanjakan''Andriamanitra sady tonga fampiononana ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Manao veloma anareo Epafra, ilay anankiray avy aminareo sady mpanompon'i Kristy Jesosy ary mikely aina mandrakariva amin'ny fangatahana ho anareo, mba hitoeranareo marina, ka hatoky tsara
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ho tanteraka'
    marker-yv: yv-n
  - type: text
    text: ' amin''izay rehetra mety ho sitrapon''Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa vavolombelony aho fa mikely aina fatratra ho anareo sy ho an''ny any Laodikia ary ho an''ny any Hierapolia izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Manao veloma anareo Lioka malala, mpanao fanafody, sy Demasy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Manaova veloma ny rahalahy any Laodikia ary Nymfa sy ny fiangonana ao an- tranony. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ary rehefa voavaky atỳ aminareo ity epistily ity, dia asaovy hovakina ao amin'ny fiangonan
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. eklesia
    marker-yv: yv-n
  - type: text
    text: '''ny Laodikiana koa; ary vakionareo kosa ilay avy amin''ny Laodikiana. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary lazao amin''i Arkipo hoe: Tandremo ny fanompoana izay noraisinao tao amin''ny Tompo mba hahatanterahanao izany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ity no veloma ataon'ny tanako, izaho Paoly. Tsarovy ny fifatorako. Ho aminareo anie ny fahasoavana.
