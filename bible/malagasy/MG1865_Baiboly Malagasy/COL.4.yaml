document_id: COL.4,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny naman'i Paoly, sy fanaovam-beloma ny sakaizany tao Kolosia
  - type: text
    content: Hianareo tompo, ataovy amin'ny mpanomponareo izay marina sy izay mety, satria fantatrareo fa ianareo koa mba manana Tompo any an-danitra.
  '10':
  - type: text
    content: 'Manao-veloma anareo Aristarko, mpiara-mifatotra amiko, sy Marka, havan''i Barnabasy (ny aminy dia efa nandidiana anareo, ka raha tonga atỳ aminareo izy, dia raiso), '
  '11':
  - type: text
    content: 'ary Jesosy, izay atao hoe Josto, avy amin''ny voafora ireo. Ireo ihany no mpiara-miasa amiko hampandroso ny fanjakan''Andriamanitra sady tonga fampiononana ahy. '
  '12':
  - type: text
    content: Manao veloma anareo Epafra, ilay anankiray avy aminareo sady mpanompon'i Kristy Jesosy ary mikely aina mandrakariva amin'ny fangatahana ho anareo, mba hitoeranareo marina, ka hatoky tsara
  - type: note
    content: 'Na: ho tanteraka'
  - type: text
    content: ' amin''izay rehetra mety ho sitrapon''Andriamanitra. '
  '13':
  - type: text
    content: 'Fa vavolombelony aho fa mikely aina fatratra ho anareo sy ho an''ny any Laodikia ary ho an''ny any Hierapolia izy. '
  '14':
  - type: text
    content: 'Manao veloma anareo Lioka malala, mpanao fanafody, sy Demasy. '
  '15':
  - type: text
    content: 'Manaova veloma ny rahalahy any Laodikia ary Nymfa sy ny fiangonana ao an- tranony. '
  '16':
  - type: text
    content: Ary rehefa voavaky atỳ aminareo ity epistily ity, dia asaovy hovakina ao amin'ny fiangonan
  - type: note
    content: Gr. eklesia
  - type: text
    content: '''ny Laodikiana koa; ary vakionareo kosa ilay avy amin''ny Laodikiana. '
  '17':
  - type: text
    content: 'Ary lazao amin''i Arkipo hoe: Tandremo ny fanompoana izay noraisinao tao amin''ny Tompo mba hahatanterahanao izany. '
  '18':
  - type: text
    content: Ity no veloma ataon'ny tanako, izaho Paoly. Tsarovy ny fifatorako. Ho aminareo anie ny fahasoavana.
  '2':
  - type: text
    content: 'Mahareta amin''ny fivavahana, ka miambena amin''izany amin''ny fisaorana, '
  '3':
  - type: text
    content: 'ary mangataha koa ho anay, mba hamohan''Andriamanitra varavarana ho an''ny teny hilazanay ny zava-niafina izay an''i Kristy, sady izany no namatorana ahy, '
  '4':
  - type: text
    content: mba haharihariko tsara izany tahaka izay tokony hitenenako.
  '5':
  - type: text
    content: 'Mandehana amin''ny fahendrena amin''izay ao ivelany, hararaoty ny andro azo anaovan-tsoa. '
  '6':
  - type: text
    content: Aoka ny fiteninareo ho amin'ny fahasoavana mandrakariva, ho mamy sira, mba ho fantatrareo izay tokony havalinareo ny olona rehetra.
  '7':
  - type: text
    content: 'Ny toetro rehetra dia holazain''i Tykiko aminareo, dia ilay rahalahy malala sy mpanompo mahatoky ary namako manompo ao amin''ny Tompo; '
  '8':
  - type: text
    content: 'ny anton''ny nanirahako azy ho atỳ aminareo indrindra dia ny hahafantaranareo ny toetray, sy ny mba hamporisihany ny fonareo; '
  '9':
  - type: text
    content: 'ary Onesimosy, rahalahy mahatoky sy malala izay avy aminareo, dia nirahiko koa. Izy roa lahy hampahafantatra anareo ny zavatra rehetra atỳ . '
