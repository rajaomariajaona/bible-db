document_id: JUD.1,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fananarana ny amin'ny mpampianatra sandoka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Joda, mpanompon''i Jesosy Kristy sady rahalahin''i Jakoba, mamangy izay olona voantso, malala ao amin''Andriamanitra Ray sy voatahiry ho an''i Jesosy Kristy; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fa ireo kosa dia miteny ratsy izay zavatra rehetra tsy fantany akory; ary izay zavatra fantany fotsiny, tahaka ny fahalalan'ny biby tsy manan-tsaina kosa, no animbany
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: andotoany'
      marker-yv: yv-n
    - type: text
      text: ' ny tenany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Hahita loza izy! fa efa nandeha tamin''ny lalan''i Kama, sady efa nimaona fatratra hanaraka ny fahadisoan''i Balama hahazoany tamby, ary efa ringana tamin''ny fiodinan''i Kora izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ireo no harambato voasaron-drano
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Ireo no pentimpentina'
      marker-yv: yv-n
    - type: text
      text: ' eo amin''ny fanasam-pifankatiavanareo, raha miara-mihinana aminareo izy, dia mpiandry mamahan-tena, nefa tsy matahotra; rahona tsy misy rano, entin''ny rivotra, ireo; hazo fararano, nefa tsy misy voany, indroa maty, voafongotra; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'onjan-dranomasina mitopatopa mamorivory ny fahamenarany; kintana mifindrafindra, ka voatahiry ho azy mandrakizay ny fahamaintisan''ny maizina. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary Enoka koa, ilay fahafito nandimby an''i Adama, dia efa naminany ny amin''ireny olona ireny ka nanao hoe: "Indro, tonga Jehovah mbamin''ny masiny tsy omby alinalina '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'hitsara ny olona rehetra sy hampiaiky ny olona ratsy fanahy rehetra ny asan''ny haratsiam-panahy rehetra, izay nataony tamin''ny haratsiam-panahiny sy ny teny sarotra rehetra izay nitenenan''ny mpanota ratsy fanahy hanohitra Azy." '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ireo dia mpimonomonona sy mpimoimoy, mandeha araka ny filany (ary ny vavany manao teny miavonavona loatra) ka mandoka olona mba hahazoany zavatra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Fa tsarovinareo, ry malala, ny teny voalazan''ny Apostolin''i Jesosy Kristy Tompontsika fahiny; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'fa efa nilaza taminareo hoe izy: Amin''ny andro farany dia hisy mpaniratsira, mandeha araka ny filan''ny haratsiam-panahiny. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ireo no mahatonga fisarahana, dia olona araka ny nofo ihany, fa tsy mba manana ny Fanahy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: tsy mba manana fanahy'
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'hampitomboina ho anareo anie ny famindram-po sy ny fiadanana ary ny fitiavana. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Fa ianareo kosa, ry malala, dia ataovy izay handrosoanareo amin''ny finoanareo masina indrindra, ka mivavaha ao amin''ny Fanahy Masina; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'ary tehirizo ny tenanareo ao amin''ny fitiavan''Andriamanitra, miandry ny famindram-pon''i Jesosy Kristy Tompontsika ho fiainana mandrakizay. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ary amindrao fo ny sasany izay miahanahana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: raha miady aminareo izy'
      marker-yv: yv-n
    - type: text
      text: '; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'ary ny sasany kosa sariho avy amin''ny afo no famonjy azy; ary ny sasany indray amindrao fo amin-tahotra, ka mankahalà na dia ny akanjo voapentimpentin''ny nofo aza. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary ho an''izay maharo anareo mba tsy ho tafintohina, ary hametraka anareo tsy hanan-tsiny eo anoloan''ny voninahiny amin''ny firavoravoana, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ho an'Andriamanitra tokana, Mpamonjy antsika, amin'ny alalan i Jesosy Kristy Tompontsika anie, ny voninahitra sy ny fahalehibiazana, ny fanjakana sy ny fahefana hatramin'ny taloha indrindra sy ankehitriny ary mandrakizay. Amena.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ry malala, raha manao izay zotom-po rehetra hanoratra aminareo aho hilaza ny amin''ny famonjena iombonantsika, dia nisy nahatery ahy hanoratra aminareo, hananatra mba hiezahanareo mafy hiaro ny finoana izay efa voatolotra indray mandeha monja ho an''ny olona masina. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Fa misy olona sasany efa niditra misokosoko, izay voasoratra fahiny ho amin'izany fahamelohana izany, dia olona ratsy fanahy izay mamadika ny fahasoavan'Andriamanitsika ho fijejojejoana sady nandà ny Andrian-tokana, dia Jesosy Kristy Tompontsika
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: mandà ny Andrian-tokana sy Jesosy Kristy Tompontsika'
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary ta-hampahatsiaro anareo aho, na dia efa fantatrareo rahateo aza ny zavatra rehetra, fa rehefa novonjen''ny Tompo ho afaka tany Egypta ny olona, dia naringany ihany tao aorian''izany izay tsy nino. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary ny anjely izay tsy nitana ny anjara-fanapahany, fa nandao ny fonenany, dia voahazony amin''ny fatorana mandrakizay ao amin''ny maizina ho amin''ny andro fitsarana lehibe. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary toy izany koa, Sodoma sy Gomora mbamin''ny tanàna nanodidina azy, izay nijangajanga tahaka azy koa ka lasa nanaraka nofo hafa, dia aseho ho fananarana amin''ny iaretany fijaliana amin''ny afo maharitra mandrakizay. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Kanefa toy izany koa, ireo dia manonofy ka mandoto ny nofo sady mandà ny manana fahalehibiazana ary miteny ratsy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. manao blasfemia; izahao Mat. IX 3
      marker-yv: yv-n
    - type: text
      text: ' ny manana voninahitra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa Mikaela arikanjely aza, raha niady tamin''ny devoly ka nifanditra ny amin''ny fatin''i Mosesy, dia tsy sahy niteny ratsy hahameloka azy, fa hoy izy: "Hananatra anao anie Jehovah". '
