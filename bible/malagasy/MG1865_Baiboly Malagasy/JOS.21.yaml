document_id: JOS.21,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nahatanterahana ny teny rehetra nataon'Andriamanitra tamin'ny Isiraely
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary ny lohan''ny fianakaviana tamin''ny Levita dia nanatona an''i Eleazara mpisorona sy Josoa, zanak''i Nona, ary ny lohan''ny fianakaviana tamin''ny firenen''ny Zanak''Isiraely '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'izay azon''ny taranak''i Arona, isam-pokon''ny taranak''i Kehata. amin''ny taranak''i Levy; fa azy ny loka voalohany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Dia nomeny azy ny tanànan'i Arba
    - type: usfm
      marker: x
      children:
      - type: text
        text: Kiriat-arba; izahao XV. 54
      marker-yv: yv-n
    - type: text
      text: ', rain''i Anàka (Hebrona izany), any amin''ny tany havoan''i Joda, mbamin''ny tany manodidina azy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa ny saha momba ny tanàna sy ny zana-bohiny dia nomeny ho lovan''i Kaleba, zanak''i Jefone. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia nomeny ny taranak''i Arona mpisorona Hebrona sy ny tany manodidina azy, ho tanàna fandosirana ho an''izay nahafaty olona, ary Libna sy ny tany manodidina azy '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ary Jatira sy ny tany manodidina azy ary Estemoa sy ny tany manodidina azy, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'ary Holona sy ny tany manodidina azy ary Debira sy ny tany manodidina azy, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ary Aina sy ny tany manodidina azy ary Jota sy ny tany manodidina azy ary Beti-semesy sy ny tany manodidina azy: tanàna sivy avy tamin''ireo firenena roa ireo; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'ary avy tamin''ny firenen''i Benjamina dia Gibeona sy ny tany manodidina azy ary Geba sy ny tany manodidina azy '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ary Anatota sy ny tany manodidina azy ary Almona sy ny tany manodidina azy, dia tanàna efatra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ny tanàna rehetra an'ny mpisorona, taranak'i Arona, dia telo ambin'ny folo ary ny tany manodidina azy avy.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'ka niteny taminy tao Silo tao amin''ny tany Kanana hoe: Jehovah efa nampandidy an''i Mosesy mba homena tanàna hitoerana izahay sy tany manodidina azy ho an''ny biby fiompinay. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary ny amin''ny taranak''i Rehata, dia ny Levita sisa tamin''ny taranak''i Kehata, ny tanàna azony tamin''ny filokana dia avy tamin''ny firenen''i Efraima. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia nomeny azy Sekema sy ny tany manodidina azy any amin''ny tany havoan''i Efraima, ho tanàna fandosirana ho an''izay nahafaty olona, ary Gazera sy ny tany manodidina azy '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'ary Kibzaima sy ny tany manodidina azy ary Beti-horona sy ny tany manodidina azy: tanàna efatra; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'ary avy tamin''ny firenen''i Dana dia Elteke sy ny tany manodidina azy ary Gibetona sy ny tany manodidina azy. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'ary Aialona sy ny tany manodidina azy ary Gata-rimona sy ny tany manodidina azy: tanàna efatra; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'ary avy tamin''ny antsasaky ny firenen''i Manase dia Tanaka sy ny tany manodidina azy ary Gata-rimona sy ny tany tany manodidina azy: tanàna roa. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ny tanàna rehetra azon'ny fokon'ny taranak'i Kehata sisa dia folo ary ny tany manodidina azy avy.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary izao no azon''ny taranak''i Gersona isan''ny fokon''ny Levita; avy tamin''ny antsasaky ny firenen''i Manase dia Golana any Basana sy ny tany manodidina azy, ho tanàna fandosirana ho an''izay nahafaty olona, ary Bestera sy ny tany manodidina azy, dia tanàna roa; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'ary avy tamin''ny firenen''Isakara dia Kisiona sy ny tany manodidina azy ary Daberata sy ny tany manodidina azy, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'ary Jarmota sy ny tany manodidina azy ary Enganima sy ny tany manodidina azy, dia tanàna efatra; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Dia avy tamin'ny lovany no nanomezan'ny Zanak'Isiraely ny Levita izao tanàna izao sy ny tany manodidina azy avy araka ny didin'i Jehovah.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'ary avy tamin''ny firenen''i Asera dia Misala sy ny tany manodidina azy ary Abdona sy ny tany manodidina azy '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'ary Helkata sy ny tany manodidina azy ary Rehoba sy ny ràny manodidina azy, dia tanàna efatra; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'ary avy tamin''ny firenen''i Naftaly dia Kadesy any Galilia sy ny tany manodidina azy, ho tanàna fandosirana ho an''izay nahafaty olona, ary Hamota dora sy ny tany manodidina azy ary Kanana sy ny tany manodidina azy. dia tanàna telo. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ny tanàna rehetra an'ny Gersonita isam-potony dia telo ambin'ny folo ary ny tany manodidina azy avy.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ary izao no azon''ny fokon''ny taranak''i Merary, izay Levita sisa: avy tamin''ny firenen''i Zebolona dia Jokneama sy ny tany manodidina azy ary Karta sy ny tany manodidina azy, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'ary Dimna sy ny tany manodidina azy ary Nahalola sy ny tany manodidina azy, dia tanàna efatra; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'ary avy tamin''ny firenen''i Robena dia Bezera sy ny tany manodidina azy ary Jahaza sy ny tany manodidina azy, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'ary Kedemota sy ny tany manodidina azy ary Mefata sy ny tany manodidina azy, dia tanàna efatra; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'ary avy tamin''ny firenen''i Gada dia Ramota any Gileada sy ny tany manodidina azy, ho tanàna fandosirana ho an''izay nahafaty olona, ary Mahanaima sy ny tany manodidina azy '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'ary Hesbona sy ny tany manodidina azy ary Jazera sy ny tany manodidina azy, dia tanàna efatra izy rehetra. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia nahazo loka ny fokon''ny Kehatita; ary ny loka azon''ny taranak''i Arona mpisorona isan''ny Levita dia tanàna telo ambin''ny folo, avy tamin''ny firenen''i Joda sy ny firenen''i Simeona ary ny firenen''i Benjamina. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Ny tanàna rehetra an'ny taranak'i Merary araka ny fokony, izay sisa tamin'ny fokon'ny Levita, dia tanàna roa ambin'ny folo no loka azony.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Ny tanàna rehetra an''ny Levita teo anatin''ny lovan''ny Zanak''Isiraely dia valo amby efa-polo sy ny tany manodidina azy avy. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Ireo tanàna ireo samy manana ny taniny manodidina azy avy; tahaka izany avokoa ireo tanàna rehetra ireo.
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Dia nomen''i Jehovah ny Isiraely ny tany rehetra izay efa nianianany homena ny razany; ary nandova izany izy ireo ka nonina teo, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Dia nomen''i Jehovah fitsaharana amin''ny manodidina izy, araka izay rehetra nianiananany tamin''ny razany, ka tsy nisy lehilahy tamin''ny fahavalony rehetra nahajanona teo anoloany; fa natolotr''i Jehovah teo an-tànany avokoa ny fahavalony rehetra. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Tsy nisy latsata na dia kely akory aza ny zava-tsoa rehetra izay nolazain'i Jehovah tamin'ny taranak'Isiraely; fa tanteraka avokoa izany rehetra izany.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary ny loka azon''ny taranak''i Kehata sisa dia tanàna folo, avy tamin''ny fokon''ny firenen''i Efraima sy ny firenen''i Dana ary ny antsasaky ny firenen''i Manase. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary ny loka azon''ny taranak''i Gersona dia tanàna telo ambin''ny folo, avy tamin''ny fokon''ny firenen''Isakara sy ny firenen''i Asera sy ny firenen''i Naftaly ary tamin''ny antsasaky ny firenen''i Manase any Basana. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary ny loka azon''ny taranak''i Merary isam-pokony dia tanàna roa ambin''ny folo, avy tamin''ny firenen''i Robena sy ny firenen''i Gada ary ny firenen''i Zebolona. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dia nomen'ny Zanak'Isiraely ny Levita tamin'ny filokana ireo tanàna ireo sy ny tany manodidina azy avy, araka izay nasain'i Jehovah nandidian'i Mosesy.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia nomeny avy tamin''ny firenena taranak''i Joda sy ny firenena taranak''i Simeona ireto tanàna hotononina ireto, '
