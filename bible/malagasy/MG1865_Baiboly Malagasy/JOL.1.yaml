document_id: JOL.1,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Filazana ny loza nanjo, ary fitarainana sy anatra noho izany
  - type: text
    content: Ny tenin'i Jehovah, izay tonga tamin'i Joela, zanak'i Petoela.
  '10':
  - type: text
    content: Mariry ny saha, misaona ny tany fambolena; Fa simba ny vary, ritra ny ranom-boaloboka, mihena
  - type: note
    content: Heb. Malazo
  - type: text
    content: ' ny diloilo. '
  '11':
  - type: text
    content: 'Aoka ho menatra ianareo mpiasa tany; midradradradrà, ianareo mpamboatra tanim-boaloboka, noho ny vary tritika sy ny vary hordea; Fa majifa ny vokatry ny saha; '
  '12':
  - type: text
    content: Maina ny voaloboka, malazo ny aviavy, ary malazo koa ny ampongaben-danitra sy ny rofia
  - type: note
    content: palma
  - type: text
    content: ' ary ny poma aza, dia ny hazo rehetra any an-tsaha; Eny, malazo ny fifalian''ny zanak''olombelona. '
  '13':
  - type: text
    content: Misikina sy mitomania, ianareo mpisorona; midradradradrà, ianareo mpanao fanompoam-pivavahana eo amin'ny alitara; Andeha mandry amin'ny lamba fisaonana
  - type: note
    content: Heb. lamba malailay
  - type: text
    content: ' mandritra ny alina, ianareo mpanao fanompoam-pivavahana ho an''Andriamanitro, fa tapaka tsy ho ao amin''ny tranon''Andriamanitra ny fanatitra hohanina sy ny fanatitra aidina. '
  '14':
  - type: text
    content: Manamasina andro fifadian-kanina, miantsoa fivoriana masina, angòny ny loholona sy ny mponina rehetra amin'ny tany ho ao an-tranon'i Jehovah Andriamanitrareo, koa andeha mitaraina amin'i Jehovah.
  '15':
  - type: text
    content: 'Indrisy ny andro! Fa efa antomotra ny andron''i Jehovah, ka tahaka ny loza tsy toha avy amin''ny Tsitoha no fihaviny. '
  '16':
  - type: text
    content: 'Moa tsy efa tapaka teo imasontsika va ny hanina, eny, ny fifaliana sy ny faharavoravoana tsy ho ao an-tranon''Andriamanitsika? '
  '17':
  - type: text
    content: 'Matimaso ao ambanin''ny baingan-tany ny vary nafafy, foana ny sompitra, mirodana ny trano fitehirizam-bary; Fa nalazo ny vary. '
  '18':
  - type: text
    content: 'Indrisy, ny fitoreon''ny biby! Very hevitra ny omby andiany, satria tsy misy ahitra ho azy; Eny, na dia ny andian''ny ondry aman''osy aza dia mijaly noho ny heloka. '
  '19':
  - type: text
    content: 'Jehovah ô, Hianao no itarainako, fa efa levon''ny afo ny kijana any an-efitra, ary nisy lelafo efa nandoro ny hazo rehetra any an-tsaha. '
  '2':
  - type: text
    content: 'Henoy izao, ry anti-panahy! Ary mandrenesa, ianareo mponina rehetra amin''ny tany! Moa mba efa nisy tamin''ny andronareo na tamin''ny andron''ny razanareo, va izao? '
  '20':
  - type: text
    content: Na dia ny biby any an-tsaha aza dia mihanahana miandrandra Anao, satria ritra ny renirano, ary efa levon'ny afo ny kijana any an-efitra.
  '3':
  - type: text
    content: 'Lazao amin''ny zanakareo izao, ary aoka ny zanakareo hilaza amin''ny zanany kosa, ary ny zanak''ireo kosa indray amin''ny taranaka mandimby azy. '
  '4':
  - type: text
    content: Izay sisan'ny kijeja
  - type: note
    content: Heb. mpikiky
  - type: text
    content: ' dia nohanin''ny koraika; Ary izay sisan''ny koraika dia nohanin''ny valalavao'
  - type: note
    content: Heb. mpilelaka
  - type: text
    content: ': Ary izay sisan''ny valalavao dia nohanin''ny sompanga'
  - type: note
    content: Heb. mpandany
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Mifohaza, ianareo mpimamo, ka mitomania, eny, midradradradrà, ianareo mpisotro divay rehetra, noho ny ranom-boaloboka, satria tapaka tsy ho amin''ny vavanareo izany. '
  '6':
  - type: text
    content: 'Fa misy firenena mahery sady tsy hita isa miakatra hamely ny taniko; Ny nifiny dia nifin-diona, ary ny vazany dia vazan''ny liom-bavy. '
  '7':
  - type: text
    content: 'Nataony simba tokoa ny voaloboko, ary notapatapahiny ny aviaviko; Nataony nakiky tokoa ireny ka nariany, eny, tonga fotsy ny rantsany. '
  '8':
  - type: text
    content: Midradradradrà toy ny virijina misikindamba fisaonana
  - type: note
    content: Heb. lamba malailay
  - type: text
    content: ' noho ny amin''ny vadin''ny fahatanorany. '
  '9':
  - type: text
    content: 'Efa tapaka tsy ho ao amin''ny tranon''i Jehovah ny fanatitra hohanina sy ny fanatitra aidina; Mitomany ny mpisorona, mpanao fanompoam-pivavahana ho an''i Jehovah. '
