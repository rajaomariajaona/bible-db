document_id: JOL.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Filazana ny loza nanjo, ary fitarainana sy anatra noho izany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny tenin'i Jehovah, izay tonga tamin'i Joela, zanak'i Petoela.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Henoy izao, ry anti-panahy! Ary mandrenesa, ianareo mponina rehetra amin''ny tany! Moa mba efa nisy tamin''ny andronareo na tamin''ny andron''ny razanareo, va izao? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Lazao amin''ny zanakareo izao, ary aoka ny zanakareo hilaza amin''ny zanany kosa, ary ny zanak''ireo kosa indray amin''ny taranaka mandimby azy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izay sisan'ny kijeja
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mpikiky
    marker-yv: yv-n
  - type: text
    text: ' dia nohanin''ny koraika; Ary izay sisan''ny koraika dia nohanin''ny valalavao'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mpilelaka
    marker-yv: yv-n
  - type: text
    text: ': Ary izay sisan''ny valalavao dia nohanin''ny sompanga'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mpandany
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mifohaza, ianareo mpimamo, ka mitomania, eny, midradradradrà, ianareo mpisotro divay rehetra, noho ny ranom-boaloboka, satria tapaka tsy ho amin''ny vavanareo izany. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa misy firenena mahery sady tsy hita isa miakatra hamely ny taniko; Ny nifiny dia nifin-diona, ary ny vazany dia vazan''ny liom-bavy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nataony simba tokoa ny voaloboko, ary notapatapahiny ny aviaviko; Nataony nakiky tokoa ireny ka nariany, eny, tonga fotsy ny rantsany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Midradradradrà toy ny virijina misikindamba fisaonana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lamba malailay
    marker-yv: yv-n
  - type: text
    text: ' noho ny amin''ny vadin''ny fahatanorany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Efa tapaka tsy ho ao amin''ny tranon''i Jehovah ny fanatitra hohanina sy ny fanatitra aidina; Mitomany ny mpisorona, mpanao fanompoam-pivavahana ho an''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mariry ny saha, misaona ny tany fambolena; Fa simba ny vary, ritra ny ranom-boaloboka, mihena
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Malazo
    marker-yv: yv-n
  - type: text
    text: ' ny diloilo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Aoka ho menatra ianareo mpiasa tany; midradradradrà, ianareo mpamboatra tanim-boaloboka, noho ny vary tritika sy ny vary hordea; Fa majifa ny vokatry ny saha; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Maina ny voaloboka, malazo ny aviavy, ary malazo koa ny ampongaben-danitra sy ny rofia
  - type: usfm
    marker: x
    children:
    - type: text
      text: palma
    marker-yv: yv-n
  - type: text
    text: ' ary ny poma aza, dia ny hazo rehetra any an-tsaha; Eny, malazo ny fifalian''ny zanak''olombelona. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Misikina sy mitomania, ianareo mpisorona; midradradradrà, ianareo mpanao fanompoam-pivavahana eo amin'ny alitara; Andeha mandry amin'ny lamba fisaonana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lamba malailay
    marker-yv: yv-n
  - type: text
    text: ' mandritra ny alina, ianareo mpanao fanompoam-pivavahana ho an''Andriamanitro, fa tapaka tsy ho ao amin''ny tranon''Andriamanitra ny fanatitra hohanina sy ny fanatitra aidina. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Manamasina andro fifadian-kanina, miantsoa fivoriana masina, angòny ny loholona sy ny mponina rehetra amin'ny tany ho ao an-tranon'i Jehovah Andriamanitrareo, koa andeha mitaraina amin'i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Indrisy ny andro! Fa efa antomotra ny andron''i Jehovah, ka tahaka ny loza tsy toha avy amin''ny Tsitoha no fihaviny. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Moa tsy efa tapaka teo imasontsika va ny hanina, eny, ny fifaliana sy ny faharavoravoana tsy ho ao an-tranon''Andriamanitsika? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Matimaso ao ambanin''ny baingan-tany ny vary nafafy, foana ny sompitra, mirodana ny trano fitehirizam-bary; Fa nalazo ny vary. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Indrisy, ny fitoreon''ny biby! Very hevitra ny omby andiany, satria tsy misy ahitra ho azy; Eny, na dia ny andian''ny ondry aman''osy aza dia mijaly noho ny heloka. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jehovah ô, Hianao no itarainako, fa efa levon''ny afo ny kijana any an-efitra, ary nisy lelafo efa nandoro ny hazo rehetra any an-tsaha. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Na dia ny biby any an-tsaha aza dia mihanahana miandrandra Anao, satria ritra ny renirano, ary efa levon'ny afo ny kijana any an-efitra.
