document_id: 1CO.7,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'ny fanambadiana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary ny amin''ireo zavatra nosoratanareo, dia tsara amin''ny lehilahy raha tsy mikasi-behivavy akory. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary ny manam-bady dia didiako, nefa tsy izaho, fa ny Tompo: Aoka tsy hiala amin''ny lahy ny vavy, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '(nefa raha misy efa niala, dia aoka hitoetra tsy manam-bady, na aoka hody amin''ny lahy); ary ny lahy aoka tsy hiala amin''ny vavy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa amin''ny sisa, dia hoy izaho, fa tsy ny Tompo: Raha misy rahalahy manam-bady tsy mino, ary mety mitoetra aminy ihany ny vavy, dia aoka tsy hialany izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary raha misy vehivavy manam-bady tsy mino, ka mety mitoetra aminy ihany ny lahy, dia aoka tsy hialany izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa ny lahy tsy mino dia efa masina ao amin''ny vavy ary ny vavy tsy mino dia efa masina ao amin''ny rahalahy; raha tsy izany kosa, dia tsy madio ny zanakareo; fa raha izany, dia masina izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa raha ny tsy mino no miala, aoka hiala izy. Na rahalahy na anabavy dia tsy voafehy amin''izany; fa Andriamanitra efa niantso antsika amin''ny fihavanana. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa ahoana moa no ahafantaranao, ravehivavy, na hovonjenao ny vadinao, na tsia? Ary ahoana no ahafantaranao, ralehilahy, na hovonjenao ny vadinao, na tsia? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Kanefa aoka ny olona rehetra samy handeha araka izay anjarany nomen''ny Tompo azy sy araka ny niantsoan''Andriamanitra azy avy. Ary izany no andidiako ao amin''ny fiangonana rehetra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Misy nantsoina voafora va? Aoka izy tsy hovana ho tsy voafora. Misy antsoina tsy voafora va? Aoka izy tsy hoforana. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tsinontsinona ny famorana, ary tsinontsinona ny tsi-famorana; fa ny mitandrina ny didin''Andriamanitra no izy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Anefa noho ny fijangajangana dia aoka ny lehilahy rehetra samy hanana ny vadiny avy, ary aoka koa ny vehivavy rehetra samy hanana ny vadiny avy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Aoka ny olona rehetra samy hitoetra eo amin''izay toetra efa niantsoana azy ihany. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Nantsoina va ianao raha mbola mpanompo? Aoka tsy hampaninona anao izany; nefa raha misy hahafahanao, aleo izany
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fa na dia misy hahafahanao, dia aleo manompo ihany'
      marker-yv: yv-n
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fa ny andevo izay voantso ao amin''ny Tompo dia olona afaka an''ny Tompo; toy izany koa, ny olona afaka izay voantso dia mpanompon''i Kristy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fa olom-boavidy ianareo, ka aza mety ho andevon''olona. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ry rahalahy, aoka ny olona rehetra samy hitoetra amin'Andriamanitra ao amin'izay niantsoana azy avy.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fa ny amin''ny virijina dia tsy manana didy avy amin''ny Tompo aho; nefa ataoko izay hevitro tahaka izay niantran''ny Tompo ahy ho mahatoky. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Koa izao no ataoko fa tsara amin''ny olona noho ny fahoriana miseho ankehitriny, dia ny mitoetra toy izao ihany. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Manam-bady va ianao? Aza mitady izay hisarahana. Tsy manam-bady va ianao? Aza mitady vady. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Nefa na dia hanam-bady aza ianao, dia tsy manota tsy akory; ary na dia hanam-bady aza ny virijina, dia tsy manota izy. Kanefa kosa hanam-pahoriana amin''ny nofo ireny; fa izaho miantra anareo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Fa izao no lazaiko, ry rahalahy: Efa fohy'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. nohafohezina
      marker-yv: yv-n
    - type: text
      text: ' ny andro, mba ho toy ny tsy manam-bady ny manana amin''izao sisa izao; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Aoka ny lahy hanao izay mety hatao amin''ny vavy; ary mba toy izany koa ny vavy amin''ny lahy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'ary mba ho toy izay tsy mitomany ny mitomany; ary mba ho toy izay tsy mifaly ny mifaly; ary mba ho toy izay tsy mahazo ny mividy; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'ary mba ho toy izay tsy mahavatra izao fiainana izao loatra ny mahavatra azy, fa mandalo ny fanaon''izao fiainana izao. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Fa tiako tsy ho maro ahina ianareo. Izay tsy manam-bady dia miahy ny an''ny Tompo mba hahafaly ny Tompo. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Fa izay manam-bady kosa miahy ny an''izao fiainana izao mba hahafaly ny vavy. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ary tsy mitovy koa ny vehivavy manam-bady sy ny virijina. Ny vehivavy tsy manam-bady mitandrina ny an''ny Tompo, mba ho samy masina avokoa ny tenany sy ny fanahiny; fa izay manam-bady kosa dia mitandrina ny an''izao fiainana izao mba hahafaly ny lahy. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ary miteny izany aho mba hahasoa anareo, fa tsy haningotra anareo amin''ny tadivavarana, fa mba hanaovanareo izay miendrika sy hitoeranareo tsara amin''ny Tompo, ka tsy hivezivezen''ny sainareo. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Fa raha misy mihevitra fa tsy mety ny fitondrany ny zananivavy virijina, satria mihoatra noho ny taona tokony anambadian'ny zanany, ka tsy maintsy hisy izany, dia aoka izy hanao izay sitrapony, tsy manota izy; aoka hanam-bady izy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. aoka hivady ireo
      marker-yv: yv-n
    - type: text
      text: '. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Fa raha misy kosa efa mikasa tsara ao am-pony, sady tsy misy mahatery azy, fa mahazo manaraka ny safidiny ka ninia tao am-pony hiaro ny zananivavy virijina, dia hanao tsara izy. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Ka izay manome ny zanany virijina hampakarina dia manao tsara, ary izay tsy manome azy hampakarina no manao tsaratsara kokoa. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Ny vavy voafehin''ny lalàna, raha mbola velona ny lahy; fa raha maty kosa ny lahy, dia afaka hanam-bady izay tiany izy, nefa ao amin''ny Tompo ihany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ny vavy tsy manam-pahefana amin''ny tenany, fa ny lahy; ary mba toy izany koa ny lahy tsy manam-pahefana amin''ny tenany, fa ny vavy. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Nefa raha araka ny hevitro, sambatra kokoa izy raha mitoetra toy izao ihany; ary ataoko fa izaho koa manana ny Fanahin'Andriamanitra.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Aza misara-pandriana ianareo, raha tsy amin''izay andro sasany ifanekenareo ho andro hivavahana, nefa mbola hiraisanareo fandriana indray, mba tsy hakan''i Satana fanahy anareo noho ny tsi-faharetanareo. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fandeferana anefa no anaovako izany, fa tsy mandidy aho. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa tiako ho tahaka ahy ny olona rehetra; kanefa samy manana izay fanomezam-pahasoavana nomen''Andriamanitra ary avy, ka ny anankiray toy izao, ary ny anankiray toy izao kosa. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa hoy izaho amin''ny tsy manam-bady sy ny mpitondratena kosa: Tsara aminy raha mitoetra tahaka ahy izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nefa raha tsy maharitra izy, dia aoka hanam-bady ihany; fa tsara ny manam-bady noho ny ho maimay. '
