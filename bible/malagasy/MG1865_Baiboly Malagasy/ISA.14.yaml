document_id: ISA.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faminaniana ny loza hanjo an'i Filistia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa Jehovah hamindra fo amin''i Jakoba, ary mbola hifidy ny Isiraely indray ka hamponina azy ao amin''ny taniny; ary ny vahiny hikambana aminy, ary ny taranak''i Jakoba ho namany '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dia haka azy ny firenena ka hanatitra azy hody; ary ny taranak'Isiraely hanana azy ho ankizilahiny sy ankizivaviny ao amin'ny tanin'i Jehovah; dia ho tonga mpamabo izay namabo azy izy; ary hampanompo izay nampahory azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary amin''ny andro hanomezan''i Jehovah fitsaharana anao ho afaka amin''ny fahorianao sy ny fitebitebin''ny fonao ary ny fanompoana mafy izay nampanompoana anao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'dia hataonao izao oha-teny ny amin''ny mpanjakan''i Babylona izao: Hià! mitsahatra ilay mpampahory! Eny. tsy ao intsony ilay tanàna volamena'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mampandoa hetra'
    marker-yv: yv-n
  - type: text
    text: '! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jehovah efa nanapatapaka ny tehin''ny ratsy fanahy. Dia ny tehina fanapahan''ny mpanapaka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izay namely firenena tamin''ny fahatezerana, tamin''ny famelezana tsy nanam-pitsaharana, sady nampanompo firenena tamin''ny fahatezerana, tamin''ny fanenjehana tsy misy antra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Miadana ka mandry fahizay ny tany rehetra; Velominy ao ny hoby, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Eny, ny hazo kypreso sy ny sedera any Libanona hifaly anao hoe: Hatrizay niambohoanao izay dia tsy nisy mpikapa niakatra tatỳ aminay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Taitra ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: ' any ambany noho ny aminao mba hitsena anao amin''ny fihavianao; Mamoha ny matoatoa hitsena anao izy, dia ireny bibilahy'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. osilahy
    marker-yv: yv-n
  - type: text
    text: ' rehetra tambonin''ny tany; Aingainy hiala amin''ny seza fiandrianana ny mpanjakan''ny firenena rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izy rehetra samy hiteny aminao hoe: Hay! ianao koa mba efa osa tahaka anay! Efa tonga tahaka anay ianao! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Efa navarina ho etỳ amin'ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: ' ny tabihanao mbamin''ny feon''ny valihanao; Kankana no ilafihanao, ary olitra no mandrakotra anao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Endrey! latsaka avy tany an-danitra ianao, ry ilay fitarik''andro, zanaky ny maraina; Voakapa hianjera amin''ny tany ianao, ry ilay mpandripaka firenena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ianao efa nanao anakampo hoe: Any an-danitra no hiakarako, ary ambonin''ny kintan''Andriamanitra no hanandratako ny seza fiandrianako; Dia hipetraka eo an-tendrombohitra; fivoriana any am-parany avaratra aho; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hiakatra ho any ambonin''ny havoan''ny rahona aho ka ho tahaka ny Avo Indrindra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Kanjo hampidinina hatrany amin'ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: ' ho any ampara-vodilavaka ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Izay mahita anao hibanjina anao sy hihevitra anao hoe: Moa io va ilay lehilahy nampihorohoro ny tany sy nampihozongozona ny fanjakana '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nanao izao tontolo izao ho efitra sy nandrava ny tanànany Ary tsy nandefa ny mpifatotra hody? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny mpanjaka rehetra amin'ny firenena samy mandry amin'ny voninahitra avokoa, ary samy ao am-pasany
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. tranony
    marker-yv: yv-n
  - type: text
    text: ' avy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa ianao kosa dia nariana niala lavitra ny fasanao, tahaka ny solofon-kazo ratsy izay ariana, sady voatsindrin''ny fatin''ny voavono ianao, dia ireo voatrabaky ny sabatra, ka midina ho ao amin''ny vato ao an-davaka, tahaka ny faty hitsakitsahin''ny tongotra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tsy halevina tahaka ireny ianao, satria efa nanimba ny taninao sady efa namono ny olonao; tsy hotononina mandrakizay ny taranaky ny mpanao ratsy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Manamboara famonoana hamelezana ny zanany noho ny heloky ny razany; tsy hitsangana hanana ny tany izy, Na hanorina tanana eran''izao tontolo izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa hitsangana hamely azy aho, hoy Jehovah, Tompon''ny maro, ary hofoanako ny anaran''i Babylona sy izay sisa ao mbamin''ny zanany sy ny taranany, hoy Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ary hataoko fonenan'ny sokina sy fihandronan'ny rano izy, ary hofafako kifafa fandringanana izy, hoy Jehovah, Tompon'ny maro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Jehovah, Tompon''ny maro, efa nianiana hoe: Araka izay noheveriko no hatao aminy ary araka izay nokasaiko no hotovina aminy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia ny hanorotoro ny Asyriana ao amin''ny taniko, ary ny hanitsakitsaka azy eny an-tendrombohitro; ny zioga fitondrany dia hiala amin''ireo, ary ny entany ho afaka amin''ny sorony '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Izany no fikasana ny amin''ny tany rehetra, ary izany no tanana ahinjitra amin''ny firenena rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Fa Jehovah, Tompon'ny maro, no efa nikasa, ka iza indray no hahafoana izany? Ary ny tànany dia voahinjitra, ka iza no hampihemotra izany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tamin''ny taona nahafatesan''i Ahaza mpanjaka no nisy izao faminaniana ny loza hanjo izao: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Aza mifaly, ry Filistia rehetra, saingy tapaka ny tsorakazo namely anao; fa avy ao an-kibon
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. fakan'
    marker-yv: yv-n
  - type: text
    text: '''ny bibilava no hihavian''ny menarana, ary ny aterany ho tonga menaran''afo'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. sarafa
    marker-yv: yv-n
  - type: text
    text: ' manidina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ny faraidina indrindra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. matoan'ny mahantra
    marker-yv: yv-n
  - type: text
    text: ' hihinana, ary ny mahantra handry fahizay; Fa hataoko maty mosary kosa izay tsy ringana aminao'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ny fakanao
    marker-yv: yv-n
  - type: text
    text: ', eny, izay sisa aminao ho matiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Midradradradrà, ry vavahady, ary mitaraina, ry tanàna; Aoka ho ketraka avokoa ianao, ry Filistia! Fa misy setroka mitranga avy any avaratra, ary tsy misy miala amin''ny laharany akory ny miaramilany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary inona moa no valiny ho entin''ny iraky ny jentilisa? Izao: Jehovah efa nanorina an''i Ziona, ary ao no hialofan''izay olony ory.'
