document_id: ISA.14,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny loza hanjo an'i Filistia
  - type: text
    content: 'Fa Jehovah hamindra fo amin''i Jakoba, ary mbola hifidy ny Isiraely indray ka hamponina azy ao amin''ny taniny; ary ny vahiny hikambana aminy, ary ny taranak''i Jakoba ho namany '
  '10':
  - type: text
    content: 'Izy rehetra samy hiteny aminao hoe: Hay! ianao koa mba efa osa tahaka anay! Efa tonga tahaka anay ianao! '
  '11':
  - type: text
    content: Efa navarina ho etỳ amin'ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola
  - type: text
    content: ' ny tabihanao mbamin''ny feon''ny valihanao; Kankana no ilafihanao, ary olitra no mandrakotra anao.'
  '12':
  - type: text
    content: 'Endrey! latsaka avy tany an-danitra ianao, ry ilay fitarik''andro, zanaky ny maraina; Voakapa hianjera amin''ny tany ianao, ry ilay mpandripaka firenena. '
  '13':
  - type: text
    content: 'Ary ianao efa nanao anakampo hoe: Any an-danitra no hiakarako, ary ambonin''ny kintan''Andriamanitra no hanandratako ny seza fiandrianako; Dia hipetraka eo an-tendrombohitra; fivoriana any am-parany avaratra aho; '
  '14':
  - type: text
    content: 'Hiakatra ho any ambonin''ny havoan''ny rahona aho ka ho tahaka ny Avo Indrindra; '
  '15':
  - type: text
    content: Kanjo hampidinina hatrany amin'ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola
  - type: text
    content: ' ho any ampara-vodilavaka ianao. '
  '16':
  - type: text
    content: 'Izay mahita anao hibanjina anao sy hihevitra anao hoe: Moa io va ilay lehilahy nampihorohoro ny tany sy nampihozongozona ny fanjakana '
  '17':
  - type: text
    content: 'Ary nanao izao tontolo izao ho efitra sy nandrava ny tanànany Ary tsy nandefa ny mpifatotra hody? '
  '18':
  - type: text
    content: Ny mpanjaka rehetra amin'ny firenena samy mandry amin'ny voninahitra avokoa, ary samy ao am-pasany
  - type: note
    content: Heb. tranony
  - type: text
    content: ' avy; '
  '19':
  - type: text
    content: 'Fa ianao kosa dia nariana niala lavitra ny fasanao, tahaka ny solofon-kazo ratsy izay ariana, sady voatsindrin''ny fatin''ny voavono ianao, dia ireo voatrabaky ny sabatra, ka midina ho ao amin''ny vato ao an-davaka, tahaka ny faty hitsakitsahin''ny tongotra. '
  '2':
  - type: text
    content: Dia haka azy ny firenena ka hanatitra azy hody; ary ny taranak'Isiraely hanana azy ho ankizilahiny sy ankizivaviny ao amin'ny tanin'i Jehovah; dia ho tonga mpamabo izay namabo azy izy; ary hampanompo izay nampahory azy.
  '20':
  - type: text
    content: 'Tsy halevina tahaka ireny ianao, satria efa nanimba ny taninao sady efa namono ny olonao; tsy hotononina mandrakizay ny taranaky ny mpanao ratsy! '
  '21':
  - type: text
    content: 'Manamboara famonoana hamelezana ny zanany noho ny heloky ny razany; tsy hitsangana hanana ny tany izy, Na hanorina tanana eran''izao tontolo izao. '
  '22':
  - type: text
    content: 'Fa hitsangana hamely azy aho, hoy Jehovah, Tompon''ny maro, ary hofoanako ny anaran''i Babylona sy izay sisa ao mbamin''ny zanany sy ny taranany, hoy Jehovah. '
  '23':
  - type: text
    content: Ary hataoko fonenan'ny sokina sy fihandronan'ny rano izy, ary hofafako kifafa fandringanana izy, hoy Jehovah, Tompon'ny maro.
  '24':
  - type: text
    content: 'Jehovah, Tompon''ny maro, efa nianiana hoe: Araka izay noheveriko no hatao aminy ary araka izay nokasaiko no hotovina aminy, '
  '25':
  - type: text
    content: 'Dia ny hanorotoro ny Asyriana ao amin''ny taniko, ary ny hanitsakitsaka azy eny an-tendrombohitro; ny zioga fitondrany dia hiala amin''ireo, ary ny entany ho afaka amin''ny sorony '
  '26':
  - type: text
    content: 'Izany no fikasana ny amin''ny tany rehetra, ary izany no tanana ahinjitra amin''ny firenena rehetra. '
  '27':
  - type: text
    content: Fa Jehovah, Tompon'ny maro, no efa nikasa, ka iza indray no hahafoana izany? Ary ny tànany dia voahinjitra, ka iza no hampihemotra izany?
  '28':
  - type: text
    content: 'Tamin''ny taona nahafatesan''i Ahaza mpanjaka no nisy izao faminaniana ny loza hanjo izao: '
  '29':
  - type: text
    content: Aza mifaly, ry Filistia rehetra, saingy tapaka ny tsorakazo namely anao; fa avy ao an-kibon
  - type: note
    content: Heb. fakan'
  - type: text
    content: '''ny bibilava no hihavian''ny menarana, ary ny aterany ho tonga menaran''afo'
  - type: note
    content: Heb. sarafa
  - type: text
    content: ' manidina. '
  '3':
  - type: text
    content: 'Ary amin''ny andro hanomezan''i Jehovah fitsaharana anao ho afaka amin''ny fahorianao sy ny fitebitebin''ny fonao ary ny fanompoana mafy izay nampanompoana anao, '
  '30':
  - type: text
    content: Ny faraidina indrindra
  - type: note
    content: Heb. matoan'ny mahantra
  - type: text
    content: ' hihinana, ary ny mahantra handry fahizay; Fa hataoko maty mosary kosa izay tsy ringana aminao'
  - type: note
    content: Heb. ny fakanao
  - type: text
    content: ', eny, izay sisa aminao ho matiny. '
  '31':
  - type: text
    content: 'Midradradradrà, ry vavahady, ary mitaraina, ry tanàna; Aoka ho ketraka avokoa ianao, ry Filistia! Fa misy setroka mitranga avy any avaratra, ary tsy misy miala amin''ny laharany akory ny miaramilany. '
  '32':
  - type: text
    content: 'Ary inona moa no valiny ho entin''ny iraky ny jentilisa? Izao: Jehovah efa nanorina an''i Ziona, ary ao no hialofan''izay olony ory.'
  '4':
  - type: text
    content: 'dia hataonao izao oha-teny ny amin''ny mpanjakan''i Babylona izao: Hià! mitsahatra ilay mpampahory! Eny. tsy ao intsony ilay tanàna volamena'
  - type: note
    content: 'Na: mampandoa hetra'
  - type: text
    content: '! '
  '5':
  - type: text
    content: 'Jehovah efa nanapatapaka ny tehin''ny ratsy fanahy. Dia ny tehina fanapahan''ny mpanapaka, '
  '6':
  - type: text
    content: 'Izay namely firenena tamin''ny fahatezerana, tamin''ny famelezana tsy nanam-pitsaharana, sady nampanompo firenena tamin''ny fahatezerana, tamin''ny fanenjehana tsy misy antra. '
  '7':
  - type: text
    content: 'Miadana ka mandry fahizay ny tany rehetra; Velominy ao ny hoby, '
  '8':
  - type: text
    content: 'Eny, ny hazo kypreso sy ny sedera any Libanona hifaly anao hoe: Hatrizay niambohoanao izay dia tsy nisy mpikapa niakatra tatỳ aminay. '
  '9':
  - type: text
    content: Taitra ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola
  - type: text
    content: ' any ambany noho ny aminao mba hitsena anao amin''ny fihavianao; Mamoha ny matoatoa hitsena anao izy, dia ireny bibilahy'
  - type: note
    content: Heb. osilahy
  - type: text
    content: ' rehetra tambonin''ny tany; Aingainy hiala amin''ny seza fiandrianana ny mpanjakan''ny firenena rehetra. '
