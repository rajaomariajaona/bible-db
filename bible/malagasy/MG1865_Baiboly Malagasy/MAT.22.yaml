document_id: MAT.22,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy namaly, dia nilaza fanoharana taminy indray ka nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nivoaka ho any amin''ny lalana ireny mpanompo ireny ka namory izay rehetra hitany, na ny ratsy, na ny tsara; ary dia feno mpihinana ny fampakaram-bady. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony efa niditra ny mpanjaka hizaha ny mpihinana, dia nahita lehilahy anankiray izay tsy niakanjo ny akanjo fitondra amin''ny fampakaram-bady. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy taminy: Ry sakaiza, ahoana no idiranao eto, nefa ianao tsy miakanjo ny akanjo fitondra amin''ny fampakaram-bady? Dia sina izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia hoy ny mpanjaka tamin''ny mpanompony: Afatory ny tongony aman-tànany, dia ario any amin''ny maizina any ivelany izy; any no hisy ny fitomaniana sy ny fikitroha-nify. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa maro no antsoina, nefa vitsy no fidina.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin''izay dia lasa ny Fariseo ka niara-nisaina mba hamandrika Azy amin''ny teniny. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naniraka ny mpianany mbamin''ny Herodiana hankeo aminy izy ka nanao hoe: Mpampianatra ô, fantatray fa marina Hianao ka mampianatra marina ny lalan''Andriamanitra ary tsy manahy olona, satria tsy mba mizaha tavan''olona. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa lazao aminay ary izay hevitrao: Moa mety va ny mandoa vola hetra ho an''i Kaisara, sa tsia? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Jesosy nahalala ny faharatsiany, dia nanao hoe: Nahoana no maka fanahy Ahy ianareo, ry mpihatsaravelatsihy? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Asehoy Ahy ny farantsakely fandoa amin''ny hetra. Dia nitondrany denaria Izy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fanjakan''ny lanitra dia tahaka ny mpanjaka, izay nanao fanasana fampakaram-bady ho an''ny zananilahy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jesosy taminy: An''iza ity sary sy soratra ity? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy izy taminy: An''i Kaisara. Dia hoy Jesosy taminy: Aloavy ho an''i Kaisara ary izay an''i Kaisara, ary ho an''Andriamanitra izay an''Andriamanitra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nahare izy, dia gaga, ary dia nandao Azy ka lasa nandeha. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamin''izany andro izany dia nankeo amin''i Jesosy ny Sadoseo sasany, izay milaza fa tsy misy fitsanganan''ny maty, ka nanontany Azy hoe: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mpampianatra ô, Mosesy nilaza hoe: Raha misy maty momba, aoka ny rahalahiny hampakatra ny vadiny ka hiteraka hamelo-maso ny rahalahiny (Deo. 25. 5). '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa nisy fito mirahalahy tetỳ aminay; ary ny zokiny nampaka-bady, dia maty, ary satria tsy nanan-janaka iry, dia navelany ho an''ny rahalahiny ny vadiny; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary toy izany koa ny faharoa sy ny fahatelo, hatramin''ny fahafito. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa faran''izy rehetra dia maty koa ravehivavy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary amin''ny fitsanganan''ny maty, ho vadin''iza amin''izy fito mirahalahy moa ravehivavy? satria efa samy nanambady azy avokoa izy rehetra. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy namaly ka nanao taminy hoe: Mahadiso hevitra anareo ny tsi-fahafantaranareo ny Soratra Masina na ny herin''Andriamanitra. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izy naniraka ny mpanompony hiantso izay efa nasaina mba hankao amin''ny fampakaram-bady; fa tsy nety ho avy ireo. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa amin'ny fitsanganan'ny maty dia tsy mba hisy hampaka-bady, na havoaka hampakarina, fa ho tahaka ny anjely
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: (anjelin''Andriamanitra)'
      marker-yv: yv-n
    - type: text
      text: ' any an-danitra izy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny amin''ny fitsanganan''ny maty, moa tsy mbola novakinareo va ny teny nataon''Andriamanitra taminareo manao hoe: '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho no Andriamanitr''i Abrahama sy Andriamanitr''isaka ary Andriamanitr''i Jakoba (Eks. 3. 6)? Andriamanitra tsy an''ny maty, fa an''ny velona. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny vahoaka, raha nandre, dia talanjona tamin''ny fampianarany. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny Fariseo, nony nandre fa nampahasina ny Sadoseo Izy, dia niangona. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny anankiray tamin''ireo, izay mpahay lalàna, nanontany naka fanahy Azy ka nanao hoe: '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mpampianatra ô, ny didy manao ahoana moa no lehibe ao amin''ny lalàna? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jesosy taminy: Tiava an''i Jehovah Andriamanitrao amin''ny fonao rehetra sy ny fanahinao rehetra ary ny sainao rehetra (Deo. 6. 5). '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany no didy lehibe sady voalohany. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny faharoa, izay tahaka azy ihany, dia izao: Tiava ny namanao tahaka ny tenanao (Lev. 19. 18). '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naniraka mpanompo hafa koa indray izy ka nanao hoe: Lazao amin''ny efa nasaina hoe: Indro, efa voavoatra ny nahandroko; efa voavono ny ombiko sy ny nafahiko, ka efa voavoatra avokoa ny zavatra rehetra; koa mankanesa atỳ amin''ny fampakaram-bady ianareo. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izany didy roa izany no ihantonan'ny lalàna rehetra sy ny mpaminany.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tafangona ny Fariseo, dia nanontany azy Jesosy ka nanao hoe: '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahoana no hevitrareo ny amin''i Kristy? Zanak''iza moa Izy? Hoy izy taminy: Zanak''i Davida. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hoy Jesosy taminy: Koa nahoana ary Davida amin''ny Fanahy no manao Azy hoe Tompo, ka manao hoe: '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehovah nilaza tamin''ny Tompoko hoe: Mipetraha eo an-tanako ankavanana Ambara-panaoko ny fahavalonao ho eo ambanin''ny tongotrao (Sal. 110. 1)? '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa raha Davida ary manao Azy hoe Tompo, ahoana no maha-zanany Azy? '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia tsy nisy nahavaly Azy na dia teny iray akory aza; ary hatramin'izay andro izay dia tsy nisy sahy nanontany Azy intsony.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa tsy nahoany akory izany, fa samy lasa nandeha izy, ny anankiray ho any amin''ny sahany, ary ny anankiray ho any amin''ny varony. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny sisa nisambotra ny mpanompony, dia nisetrasetra taminy ka namono azy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia tezitra ilay mpanjaka ka naniraka ny miaramilany, dia nandringana izany mpamono olona izany sady nandoro ny tanànany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy izy tamin''ny mpanompony: Efa voavoatra ny fampakaram-bady, fa ny efa nasaina no tsy miendrika. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa mankanesa ianareo any amin''ny sampanan-dalana, ary izay hitanareo, dia asao ho ao amin''ny fampakaram-bady. '
