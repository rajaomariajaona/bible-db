document_id: LUK.10,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary nony afaka izany, ny Tompo nanendry olona hafa koa, dia fito-polo lahy, ka naniraka azy tsiroaroa hialoha Azy any amin''ny tanàna sy ny tany rehetra izay efa halehany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa izay tanàna iakaranareo, ka tsy mandray anareo kosa ny olona, dia mankanesa eo amin''ny lalambe, ka lazao hoe: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ny vovoky ny tanànanareo aza, izay miraikitra amin''ny tongotray, dia fafànay hiampanga anareo; nefa aoka ho fantatrareo fa efa mby akaiky anareo ny fanjakan''Andriamanitra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Lazaiko aminareo fa ho moramora kokoa ny ho amin''i Sodoma amin''izany andro izany noho ny ho amin''izany tanàna izany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Lozanao, ry Korazina! lozanao, ry Betsaida! fa raha mba tany Tyro sy Sidona no natao ny asa lehibe izay natao teo aminareo, dia ho nibebaka ela izy ka nitafy lamba fisaonana sy nipetraka amin''ny lavenona. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa ho moramora kokoa ny ho amin''i Tyro sy Sidona amin''ny andro fitsarana noho ny ho aminareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ary ianao, ry Kapernaomy, hasandratra hatrany an-danitra va ianao? Haetry hatrany amin'ny fiainan-tsi-hita
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. Hadesy
      marker-yv: yv-n
    - type: text
      text: ' ianao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Izay mihaino anareo dia mihaino Ahy; ary izay mandà anareo dia mandà Ahy; ary izay mandà Ahy dia mandà Izay naniraka Ahy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary ny fito-polo lahy niverina tamin''ny fifaliana ka nanao hoe: Tompo ô, na dia ny demonia aza dia manaiky anay noho ny anaranao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa hoy Jesosy taminy: Izaho nahita an''i Satana latsaka avy tany an-danitra tahaka ny varatra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Indro, efa nomeko fahefana hanitsaka menarana sy maingoka sy handresy ny hery rehetra ananan''ny fahavalo ianareo, ka tsy hisy hampaninona anareo akory. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary hoy Izy taminy: Be ny vokatra, fa ny mpiasa no vitsy; koa amin''izany mangataha amin''ny Tompon''ny vokatra mba hampandehanany mpiasa hamory ny vokatra. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Kanefa aza mifaly ianareo, satria manaiky anareo ny fanahy; fa mifalia, satria voasoratra any an-danitra ny anaranareo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary tamin''izany ora izany dia ravoravo tamin''ny Fanahy Masina Jesosy ka nanao hoe: Midera Anao Aho, Raiko ô, Tompon''ny lanitra sy ny tany, fa efa nafeninao tamin''ny hendry sy ny manan-tsaina izany ka nasehonao tamin''ny zaza madinika; eny, Raiko, fa izany no sitrakao. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ny zavatra rehetra dia efa natolotry ny Raiko Ahy; ary tsy misy mahalala ny Zanaka afa-tsy ny Ray, ary ny Ray afa-tsy ny Zanaka sy izay tian''ny Zanaka hanehoana Azy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary nitodika tamin''ny mpianany Izy, dia nilaza taminy manokana hoe: Sambatra ny maso mahita izay hitanareo. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Fa lazaiko aminareo fa mpaminany sy mpanjaka maro no naniry hahita izay hitanareo, fa tsy nahita, ary naniry nahare izay renareo, fa tsy nahare. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary, indro, nisy mpahay lalàna anankiray nitsangana ka naka fanahy an''i Jesosy hoe: Mpampianatra ô, inona no hataoko handovako fiainana mandrakizay? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary hoy Izy taminy: Inona no voasoratra ao amin''ny lalàna? Manao ahoana no famakinao azy? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary izy namaly ka nanao hoe: Tiava an''i Jehovah Andriamanitrao amin''ny fonao rehetra sy ny fanahinao rehetra sy ny herinao rehetra ary ny sainao rehetra (Deo. 6. 5); ary, Tiava ny namanao tahaka ny tenanao (Lev. 19. 18). '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary hoy Jesosy taminy: Marina ny navalinao; ataovy izany, dia ho velona ianao. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Fa izy ta-hanamarina ny tenany ka nanao tamin''i Jesosy hoe: Iza ary no namako? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Mandehana; indro, Izaho maniraka anareo tahaka ny zanak'ondry eo ampovoan'ny amboadia
    - type: usfm
      marker: x
      children:
      - type: text
        text: lopa
      marker-yv: yv-n
    - type: text
      text: '. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary Jesosy namaly ka nanao hoe: Nisy lehilahy anankiray nidina avy tany Jerosalema hankany Jeriko ka azon''ny jiolahy, dia nendahany ny lambany, sady nokapohiny izy, dia nilaozany, rehefa saiky maty. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary sendra nisy mpisorona anankiray nidina tamin''izany lalana izany; ary raha nahita an-dralehilahy izy, dia nandalo azy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ary toy izany koa ny Levita anankiray, izay tonga teo, dia nahita azy, nefa nandalo koa. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Fa nisy kosa Samaritana anankiray nandeha tamin''ny nalehany ka tonga teo aminy, ary nony nahita azy, dia onena. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Dia nanatona izy, ka nofeheziny ny feriny, sady nasiany diloilo sy divay; dia nampitaingeniny tamin''ny bibiny izy, ka nentiny ho any amin''ny tranom-bahiny, dia notsaboiny. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ary nony ampitson''iny, dia naka denaria roa izy, ka nomeny ny tompon''ny tranom-bahiny, sady nanao taminy hoe: Tsaboy izy; ary na hoatrinona na hoatrinona no laninao mihoatra noho ireto dia honerako, rehefa miverina aho. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Iza moa amin''izy telo lahy no ataonao ho naman''ilay azon''ny jiolahy? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary hoy izy: Ilay niantra azy. Dia hoy Jesosy taminy: Mandehana ianao, ka mba manaova toy izany koa. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Ary raha nandeha izy ireo, dia niditra teo amin''ny vohitra anankiray Jesosy; ary nisy vehivavy anankiray atao hoe Marta nampiantrano Azy ho ao an-tranony. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Ary izy nanana rahavavy atao hoe Maria, izay nipetraka teo anilan''ny tongotry ny Tompo ka nihaino ny teniny. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Aza mitondra kitapom-bola, na kitapom-batsy, na kapa; ary aza miarahaba olona akory eny an-dalana. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Fa Marta sahirana tamin''ny fanompoana be; dia avy izy ka nanao hoe: Tompoko, moa tsy mampaninona Anao va ny amelan''ny rahavaviko ahy hanompo irery? koa mba asaovy manampy ahy izy. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Fa ny Tompo namaly ka nanao taminy hoe: Marta, Marta, maro ahina sy maro herehina ianao; '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: nefa zavatra iray loha no ilaina; fa Maria no efa nifidy ny anjara tsara, izay tsy halaina aminy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary izay trano idiranareo, dia lazao aloha hoe: Fiadanana ho amin''ity trano ity. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary raha misy zanaky ny fiadanana ao, dia hitoetra ao aminy ny fiadanana tononinareo; fa raha tsy izany, dia hiverina ho aminareo ihany izany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary mitoera ao amin''izany trano izany, ka mihinàna sy misotroa izay zavatra omeny; fa ny mpiasa miendrika hahazo ny karamany. Aza mifindrafindra trano. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary izay tanàna iakaranareo, ka mandray anareo ny olona, dia hano izay zavatra aroso eo anoloanareo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary sitrano izay marary ao, ka lazao amin''ny olona hoe: Efa mby akaiky anareo ny fanjakan''Andriamanitra. '
