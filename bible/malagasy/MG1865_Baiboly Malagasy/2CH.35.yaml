document_id: 2CH.35,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary Josia nitandrina ny Paska tany Jerosalema ho an''i Jehovah; dia namono ny Paska ny olona tamin''ny andro fahefatra ambin''ny folo tamin''ny volana voalohany. '
  '10':
  - type: text
    content: 'Koa dia vonona ny zavatra; ary ny mpisorona nitsangana teo amin''ny fitoerany avy, ary ny Levita araka ny antokony avy, araka ny didin''ny mpanjaka. '
  '11':
  - type: text
    content: 'Dia novonoin''ny olona ny Paska, ary natopin''ny mpisorona ny rà teny an-tànany, dia vao nohodiran''ny Levita kosa. '
  '12':
  - type: text
    content: 'Dia natokany ny fanatitra dorana homen''ny olona araka ny fizaran''ny fianakaviany, mba hateriny ho an''i Jehovah araka izay voasoratra ao amin''ny bokin''i Mosesy. Ary toy izany koa tamin''ny omby. '
  '13':
  - type: text
    content: 'Ary ny Paska natsatsika tamin''ny afo araka ny fanao; fa ny zava-masina kosa nandrahoiny tao anaty vilany sy vilanibe ary kasiteronina, dia nozarainy faingana tamin''ny olona rehetra izany. '
  '14':
  - type: text
    content: 'Ary rehefa afaka izany, dia nanamboatra io an''ny tenany sy ny mpisorona izy; fa ny mpisorona, taranak''i Arona, nanatitra ny fanatitra dorana sy ny saborany mandra-pahalin''ny andro; fa ny Levita kosa nanamboatra ny Paska ho an''ny tenany sy ny mpisorona, taranak''i Arona. '
  '15':
  - type: text
    content: 'Ary ny mpihira, taranak''i Asafa, nitoetra teo amin''ny fitoerany, araka ny didin''i Davida sy Asafa sy Hemana ary Jedotona, mpahitan''ny mpanjaka, ary ny mpiandry varavarana dia teo amin''ny isam-bavahady; fa tsy afaka niala tamin''ny fanompoany ireo, ka ny Levita rahalahiny no nanamboatra ho azy. '
  '16':
  - type: text
    content: 'Ary dia vonona androtrizay avokoa ny hatao fanompoana an''i Jehovah amin''ny hitandremana ny Paska sy ny hanaterana ny fanatitra dorana eo ambonin''ny alitaran''i Jehovah araka ny tenin''i Josia mpanjaka. '
  '17':
  - type: text
    content: 'Ary ny Zanak''isiraely izay vory teo dia nitandrina ny paska fahizay sy ny andro firavoravoana hafitoana fihinanana ny mofo tsy misy masirasira. '
  '18':
  - type: text
    content: 'Fa tsy nisy Paska notandremana toy izany teo amin''ny Isiraely na dia hatramin''ny andron''i Samoela mpaminany aza; ary ny mpanjakan''ny Isiraely rehetra tsy nisy nitandrina ny Paska tahaka izay nataon''i Josia sy ny mpisorona sy ny Levita ary ny Joda rehetra sy ny Isiraely izay vory teo ary ny mponina tany Jerosalema. '
  '19':
  - type: text
    content: Tamin'ny taona fahavalo ambin'ny folo nanjakan'i Josia no nitandremana izany Paska izany.
  '2':
  - type: text
    content: 'Ary Josia nanendry ny mpisorona ho amin''ny anjara-raharahany avy ka namporisika azy hanao ny fanompoana ao an-tranon''i Jehovah. '
  '20':
  - type: text
    content: 'Ary rehefa afaka izany rehetra izany, nony efa namboarin''i Josia ny tempoly, dia niakatra Neko, mpanjakan''i Egypta, hiady tany Karkemisy eo amoron''i Eofrata; ary Josia nivoaka hiady aminy. '
  '21':
  - type: text
    content: 'Fa Neko naniraka olona ho any aminy hanao hoe: Moa mifaninona akory izaho sy ianao, ry mpanjakan''ny Joda? Tsy ady aminao izao anio izao, fa amin''ny fahavaloko, sady nasain''Andriamanitra handeha faingana aho; koa aza manohitra an''Andriamanitra Izay momba ahy, fandrao matiny ianao. '
  '22':
  - type: text
    content: 'Fa Josia tsy nety nihodina niala taminy, fa nody olon-kafa mba hiady taminy ka tsy nety nihaino ny tenin''i Neko, izay nampilazain''Andriamanitra azy, fa nandeha hiady taminy ihany teo amin''ny lohasahan''i Megido. '
  '23':
  - type: text
    content: 'Ary ny mpandefa tsipìka nahavoa an''i Josia mpanjaka; dia hoy ny mpanjaka tamin''ny mpanompony: Ento miala eto aho; fa voa mafy aho. '
  '24':
  - type: text
    content: 'Dia nesorin''ny mpanompony tamin''izany kalesy izany izy, ka napetrany teo amin''ny kalesiny faharoa ary nentiny ho any Jerosalema; dia maty izy ka nalevina tao am-pasan-drazany. Ary ny Joda sy Jerosalema rehetra dia nisaona an''i Josia. '
  '25':
  - type: text
    content: 'Ary Jeremia dia nanao hira fisaonana an''i Josia, ary ny mpihiralahy sy ny mpihiravavy rehetra dia mahatsiahy an''i Josia mandraka androany, raha manao hira fisaonana, ka nataony fanao teo amin''ny Isiraely izany; ary, indro, efa voasoratra ao amin''ny fihirana fisaonana izany. '
  '26':
  - type: text
    content: 'Ary ny tantaran''i Josia sisa mbamin''ny soa nataony, araka izay efa voasoratra ao amin''ny lalàn''i Jehovah, '
  '27':
  - type: text
    content: dia ny asany voalohany sy farany, indro, efa voasoratra ao amin'ny bokin'ny mpanjakan'ny Isiraely sy ny Joda izany.
  '3':
  - type: text
    content: 'Ary hoy izy tamin''ny Levita izay mpampianatra ny Isiraely rehetra sady efa masina ho an''i Jehovah: Apetraho ao an-trano nataon''i Solomona, zanak''i Davida, mpanjakan''ny Isiraely, ny fiara masina; fa izao dia efa tsy milanja azy intsony ianareo; koa manompoa an''i Jehovah Andriamanitrareo sy ny Isiraely olony; '
  '4':
  - type: text
    content: 'ary samia miomana araka ny fianakavianareo avy ianareo, dia araka ny antokonareo, araka ny voasoratr''i Davida, mpanjakan''ny Isiraely, sy araka ny voasoratr''i Solomona zanany koa. '
  '5':
  - type: text
    content: 'Ary mitsangàna eo amin''ny fitoerana masina araka ny fizaran''ny fianakavian''ny rahalahinareo amin''ny vahoaka sy araka ny fizaran''ny fianakavian''ny Levita. '
  '6':
  - type: text
    content: 'Dia vonoy ny Paska, sady hamasino ny tenanareo, ka manamboara ho an''ny rahalahinareo, hanaovana araka ny tenin''i Jehovah izay nampilazainy an''i Mosesy. '
  '7':
  - type: text
    content: 'Ary ny vahoaka izay vory teo dia nomen''i losia zanak''ondry sy zanak''osy, telo alina no isany hatao Paska avokoa ireo sy omby telo arivo; avy tamin''ny fananan''ny mpanjaka ireo. '
  '8':
  - type: text
    content: 'Ary ny mpanapaka nanome an-tsitrapo ho an''ny olona sy ho an''ny mpisorona sy ny Levita. Ary Hilkia sy Zakaria sy Jehiela, mpanapaka ny tranon''Andriamanitra, nanome ondry aman''osy enin-jato amby roa arivo ho an''ny mpisorona hatao Paska ary omby telon-jato. '
  '9':
  - type: text
    content: 'Ary Konania sy Semaia sy Netanela rahalahiny ary Hasabia sy Jeiela sy Jozabada, lehiben''ny Levita, nanome ondry aman''osy dimy arivo ho an''ny Levita hatao Paska ary omby dimam-jato. '
