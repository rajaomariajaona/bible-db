document_id: 2CH.35
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Josia nitandrina ny Paska tany Jerosalema ho an''i Jehovah; dia namono ny Paska ny olona tamin''ny andro fahefatra ambin''ny folo tamin''ny volana voalohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Josia nanendry ny mpisorona ho amin''ny anjara-raharahany avy ka namporisika azy hanao ny fanompoana ao an-tranon''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy izy tamin''ny Levita izay mpampianatra ny Isiraely rehetra sady efa masina ho an''i Jehovah: Apetraho ao an-trano nataon''i Solomona, zanak''i Davida, mpanjakan''ny Isiraely, ny fiara masina; fa izao dia efa tsy milanja azy intsony ianareo; koa manompoa an''i Jehovah Andriamanitrareo sy ny Isiraely olony; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ary samia miomana araka ny fianakavianareo avy ianareo, dia araka ny antokonareo, araka ny voasoratr''i Davida, mpanjakan''ny Isiraely, sy araka ny voasoratr''i Solomona zanany koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary mitsangàna eo amin''ny fitoerana masina araka ny fizaran''ny fianakavian''ny rahalahinareo amin''ny vahoaka sy araka ny fizaran''ny fianakavian''ny Levita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia vonoy ny Paska, sady hamasino ny tenanareo, ka manamboara ho an''ny rahalahinareo, hanaovana araka ny tenin''i Jehovah izay nampilazainy an''i Mosesy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny vahoaka izay vory teo dia nomen''i losia zanak''ondry sy zanak''osy, telo alina no isany hatao Paska avokoa ireo sy omby telo arivo; avy tamin''ny fananan''ny mpanjaka ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny mpanapaka nanome an-tsitrapo ho an''ny olona sy ho an''ny mpisorona sy ny Levita. Ary Hilkia sy Zakaria sy Jehiela, mpanapaka ny tranon''Andriamanitra, nanome ondry aman''osy enin-jato amby roa arivo ho an''ny mpisorona hatao Paska ary omby telon-jato. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Konania sy Semaia sy Netanela rahalahiny ary Hasabia sy Jeiela sy Jozabada, lehiben''ny Levita, nanome ondry aman''osy dimy arivo ho an''ny Levita hatao Paska ary omby dimam-jato. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa dia vonona ny zavatra; ary ny mpisorona nitsangana teo amin''ny fitoerany avy, ary ny Levita araka ny antokony avy, araka ny didin''ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia novonoin''ny olona ny Paska, ary natopin''ny mpisorona ny rà teny an-tànany, dia vao nohodiran''ny Levita kosa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia natokany ny fanatitra dorana homen''ny olona araka ny fizaran''ny fianakaviany, mba hateriny ho an''i Jehovah araka izay voasoratra ao amin''ny bokin''i Mosesy. Ary toy izany koa tamin''ny omby. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary ny Paska natsatsika tamin''ny afo araka ny fanao; fa ny zava-masina kosa nandrahoiny tao anaty vilany sy vilanibe ary kasiteronina, dia nozarainy faingana tamin''ny olona rehetra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary rehefa afaka izany, dia nanamboatra io an''ny tenany sy ny mpisorona izy; fa ny mpisorona, taranak''i Arona, nanatitra ny fanatitra dorana sy ny saborany mandra-pahalin''ny andro; fa ny Levita kosa nanamboatra ny Paska ho an''ny tenany sy ny mpisorona, taranak''i Arona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ny mpihira, taranak''i Asafa, nitoetra teo amin''ny fitoerany, araka ny didin''i Davida sy Asafa sy Hemana ary Jedotona, mpahitan''ny mpanjaka, ary ny mpiandry varavarana dia teo amin''ny isam-bavahady; fa tsy afaka niala tamin''ny fanompoany ireo, ka ny Levita rahalahiny no nanamboatra ho azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary dia vonona androtrizay avokoa ny hatao fanompoana an''i Jehovah amin''ny hitandremana ny Paska sy ny hanaterana ny fanatitra dorana eo ambonin''ny alitaran''i Jehovah araka ny tenin''i Josia mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny Zanak''isiraely izay vory teo dia nitandrina ny paska fahizay sy ny andro firavoravoana hafitoana fihinanana ny mofo tsy misy masirasira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa tsy nisy Paska notandremana toy izany teo amin''ny Isiraely na dia hatramin''ny andron''i Samoela mpaminany aza; ary ny mpanjakan''ny Isiraely rehetra tsy nisy nitandrina ny Paska tahaka izay nataon''i Josia sy ny mpisorona sy ny Levita ary ny Joda rehetra sy ny Isiraely izay vory teo ary ny mponina tany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tamin'ny taona fahavalo ambin'ny folo nanjakan'i Josia no nitandremana izany Paska izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary rehefa afaka izany rehetra izany, nony efa namboarin''i Josia ny tempoly, dia niakatra Neko, mpanjakan''i Egypta, hiady tany Karkemisy eo amoron''i Eofrata; ary Josia nivoaka hiady aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa Neko naniraka olona ho any aminy hanao hoe: Moa mifaninona akory izaho sy ianao, ry mpanjakan''ny Joda? Tsy ady aminao izao anio izao, fa amin''ny fahavaloko, sady nasain''Andriamanitra handeha faingana aho; koa aza manohitra an''Andriamanitra Izay momba ahy, fandrao matiny ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa Josia tsy nety nihodina niala taminy, fa nody olon-kafa mba hiady taminy ka tsy nety nihaino ny tenin''i Neko, izay nampilazain''Andriamanitra azy, fa nandeha hiady taminy ihany teo amin''ny lohasahan''i Megido. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny mpandefa tsipìka nahavoa an''i Josia mpanjaka; dia hoy ny mpanjaka tamin''ny mpanompony: Ento miala eto aho; fa voa mafy aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nesorin''ny mpanompony tamin''izany kalesy izany izy, ka napetrany teo amin''ny kalesiny faharoa ary nentiny ho any Jerosalema; dia maty izy ka nalevina tao am-pasan-drazany. Ary ny Joda sy Jerosalema rehetra dia nisaona an''i Josia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary Jeremia dia nanao hira fisaonana an''i Josia, ary ny mpihiralahy sy ny mpihiravavy rehetra dia mahatsiahy an''i Josia mandraka androany, raha manao hira fisaonana, ka nataony fanao teo amin''ny Isiraely izany; ary, indro, efa voasoratra ao amin''ny fihirana fisaonana izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary ny tantaran''i Josia sisa mbamin''ny soa nataony, araka izay efa voasoratra ao amin''ny lalàn''i Jehovah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: dia ny asany voalohany sy farany, indro, efa voasoratra ao amin'ny bokin'ny mpanjakan'ny Isiraely sy ny Joda izany.
