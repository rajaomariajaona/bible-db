document_id: JON.3,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nitorian'i Jona teny tao Ninive
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary tonga fanindroany tamin''i Jona ny tenin''i Jehovah nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary rehefa hitan'Andriamanitra ny nataon'ireo ny amin'ny nialany tamin'ny lalan-dratsiny, dia nanenina Izy ny amin'ny loza izay nolazainy hamelezany azy, ka tsy nataony izany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mitsangàna, ka mankanesa any Ninive, ilay tanàna lehibe; ary torio aminy ny teny izay lazaiko aminao. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dia nitsangana Jona ka nankany Ninive araka ny tenin''i Jehovah. Ary Ninive dia tanàna lehibe teo anatrehan''Andriamanitra, dia lalana hateloana. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ary Jona niantomboka nandeha
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. niditra
      marker-yv: yv-n
    - type: text
      text: ' tao an-tanàna lalana indray andro ka nitory hoe: Rehefa afaka efa-polo andro, dia horavana Ninive. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia nino an''Andriamanitra ny mponina tao Ninive ka niantso fifadian-kanina sady nitafy lamba fisaonana hatramin''ny lehibe ka hatramin''ny kely. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary nony efa ren''ny mpanjakan''i Ninive izany, dia nitsangana niala tamin''ny seza fiandrianany izy, ka nanaisotra ny akanjom-boninahiny, dia nisarona lamba fisaonana sady nipetraka tamin''ny lavenona. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary nasaina nantsoina sy nambara eran''i Ninive araka ny didin''ny mpanjaka sy ny mpanapaka hoe: Aza avela hisy hanendry hanina akory, na olona, na biby fiompy; dia ny ondry aman''osy sy ny omby; eny, aza avela hisy hihinana na hisotro rano akory ireo. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Fa aoka samy hisarona lamba fisaonana ny olona sy ny biby fiompy, ary aoka hitaraina mafy amin''Andriamanitra izy, ary aoka samy hahafoy ny lalany ratsy sy ny fandozana eny an-tanany avy izy rehetra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa angamba hiverina ihany Andriamanitra ka hanenina ary hiala amin''ny fahatezerany mirehitra, mba tsy ho lany ritra isika? '
