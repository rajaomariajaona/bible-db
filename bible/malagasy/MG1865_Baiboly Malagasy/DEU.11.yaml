document_id: DEU.11,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tiava an''i Jehovah Andriamanitrao, ka tandremo mandrakariva Izay asainy hotandremana, dia ny lalàny sy ny fitsipiny ary ny didiny. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny tany izay efa hidiranao holovana dia tsy mba tahaka ny tany Egypta, izay nivoahanareo, izay namafazanao ny voan-javatrao sy nandeman''ny tongotrao rano azy tahaka ny fambolen''anana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny tany izay efa halehanareo holovana dia tany be tendrombohitra sy lohasaha sady mifoka rano avy amin''ny ranonoran-danitra, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia tany izay tandreman''i Jehovah Andriamanitrao; ny mason''i Jehovah Andriamanitrao mitsinjo azy mandrakariva hatramin''ny fiandohan''ny taona ka hatramin''ny fiafarany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha hihaino tsara ny didiko izay andidiako anareo anio ianareo ka ho tia an''i Jehovah Andriamanitrareo sy hanompo Azy amin''ny fonareo rehetra sy ny fanahinareo rehetra, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia halatsako eo amin''ny taninareo ny ranonorana amin''ny fotoany, dia ny loha-orana sy ny fara-orana, mba hanangonanao ny varinao sy ny ranom-boalobokao ary ny diloilonao; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary hampaniriko ahitra ny sahanao ho an'ny biby fiompinao, ary hihinan-kanina ianao ka ho voky.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa mitandrema ianareo, fandrao ho voafitaka ny fonareo, ka hivily hanompo andriamani-kafa sy hiankohoka eo anatrehany ianareo; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary dia hirehitra aminareo ny fahatezeran''i Jehovah, dia hanampina ny lanitra Izy, ka tsy hisy ranonorana, ary tsy hahavokatra ny tany; dia ho lany ringana faingana ianareo tsy ho eo amin''ny tany soa izay omen''i Jehovah anareo. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa alatsaho ao amin''ny fonareo sy ao amin''ny fanahinareo izao teniko izao, ary fehezo ho famantarana eo amin''ny tananareo izy, ka aoka ho fehy fampahatsiarovana eo ambonin''ny handrinareo; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ampianaro ny zanakareo izany, ka resaho, na mipetraka ao an-tranonao ianao, na mandeha an-dalana, na mandry, na mifoha; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary aoka ho fantatrao anio, fa izaho tsy miteny amin''ny zanakareo izay tsy nahalala na nahita ny famaizan''i Jehovah Andriamanitrareo sy ny fahalehibiazany sy ny tànany mahery sy ny sandriny nahinjitra '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary soraty eo amin''ny tolam-baravaran''ny tranonao sy eo amin''ny vavahadinao izy; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mba ho maro ny andronareo sy ny andron''ny taranakareo eo amin''ny tany izay nianianan''i Jehovah tamin''ny razanareo homena azy, toy ny faharetan''ny lanitra ambonin''ny tany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha hitandrina tsara izao lalàna rehetra izao izay andidiako anareo ianareo ka manaraka azy ary ho tia an''i Jehovah Andriamanitrareo sy handeha eo amin''ny lalany rehetra sy hifikitra aminy, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia horoahin''i Jehovah eo anoloanareo ireo firenena rehetra ireo, ary ianareo haharesy firenena maro, izay lehibe sy mahery noho ianareo. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny tany rehetra izay hodiavin''ny faladian''ny tongotrareo dia ho anareo: hatramin''ny efitra sy Libanona ary hatramin''ny ony Eofrata ka hatramin''ny ranomasina andrefana no ho fari-taninareo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy hisy olona hahajanona eo anoloanareo, fa hataon''i Jehovah Andriamanitrareo ho azon''ny tahotra sy horohoro anareo ny tany rehetra izay hodiavinareo, araka izay nolazainy taminareo. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, Izaho mametraka fitahiana sy ozona eo anoloanareo anio: '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fitahiana, raha hohenoinareo ny didin''i Jehovah Andriamanitrareo, izay andidiako anareo anio; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary ozona kosa, raha tsy hohenoinareo ny didin''i Jehovah Andriamanitrareo, fa hivily hiala amin''ny lalana izay andidiako anareo anio mba haleha ianareo ka hanaraka andriamani-kafa izay tsy fantatrareo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa entin''i Jehovah Andriamanitrao ianao ka tafiditra any amin''ny tany izay alehanao holovana, dia ny fitahiana no hotononinao eo an-tendrombohitra Gerizinia, ary ny fanozonana kosa eo an-tendrombohitra Ebala. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy ny famantarany sy ny asany, izay nataony tany Egypta tamin''i Farao, mpanjakan''i Egypta, sy ny taniny rehetra, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy any an-dafin''i Jordana va izy roa, any ankoatry ny lalana andrefana, amin''ny tanin''ny Kananita, izay monina eo amin''ny tani-hay tandrifin''i Gilgaly, eo anilan''ny hazo terebintan''i More? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ianareo efa handeha hita an''i Jordana ka hiditra sy handova ny tany izay omen''i Jehovah Andriamanitrareo anareo, ary handova azy ianareo ka honina eo; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: koa tandremo mba harahinareo ny didy rehetra sy ny fitsipika izay ataoko eo anoloanareo anio.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy izay nataony tamin''ny miaramilan''ny Egyptiana sy ny soavaliny ary ny kalesiny, dia ny nanasaforany azy tao amin''ny Ranomasina Mena, raha nanenjika anareo Izy, dia voaringan''i Jehovah mandraka androany, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary izay nataony taminareo tany an-efitra, hatramin''ny nahatongavanareo teto amin''ity tany ity, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary izay nataony tamin''i Datana sy Abìrama, zanak''i Eliaba, zanak''i Robena, teo amin''ny Isiraely rehetra, dia izay nisokafan''ny tany sy nitelemany azy mbamin''ny ankohonany sy ny lainy ary ny zava-manan''aina izay nomba azy; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa ny masonareo efa nahita ny asa lehibe rehetra izay nataon''i Jehovah. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa tandremo ny lalàna rehetra izay andidiako anareo anio, mba hahery ianareo, dia hiditra handova ny tany izay efa halehanareo holovana; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary, mba ho maro andro ianareo amin''ny tany izay nianianan''i Jehovah tamin''ny razanareo homena azy sy ny taranany, dia tany izay tondra-dronono sy tantely. '
