document_id: 1CH.19,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahatonga ny niadian'i Davida tamin'ny Syriana sy ny Amonita, ary ny nahareseny azy
  - type: text
    content: 'Ary rehefa afaka izany, dia maty Nahasy, mpanjakan''ny taranak''i Amona, ary ny zanany no nanjaka nandimby azy. '
  '10':
  - type: text
    content: 'Ary rehefa hitan''i Joaba fa sady teo anoloany no teo ivohony ny fahavalo, dia nifidy olona tamin''ireo voafantina tamin''ny Isiraely rehetra izy, ka nalahany hiady tamin''ny Syriana. '
  '11':
  - type: text
    content: 'Ary ny olona sisa kosa nomeny ho entin''i Abisay rahalahiny, ka dia nilahatra hiady amin''ny taranak''i Amona ireo. '
  '12':
  - type: text
    content: 'Ary hoy Joaba: Raha tsy tohako ny Syriana, dia vonjeo aho; fa raha tsy tohanao kosa ny taranak''i Amona, dia hovonjeko ianao; '
  '13':
  - type: text
    content: 'mahereza, ary aoka hitombandahy isika ho an''ny firenentsika sy ireo tanànan''Andriamanitsika; ary aoka Jehovah hanao izay sitrapony. '
  '14':
  - type: text
    content: 'Ary nandroso hiady tamin''ny Syriana Joaba sy ny olona nanaraka azy; ka dia nandositra niala teo anoloany ireo. '
  '15':
  - type: text
    content: Ary nony hitan'ny taranak'i Amona fa nandositra ny Syriana, dia mba nandositra niala teo anoloan'i Abisay, rahalahin'i Joaba, koa izy ka niditra tao an-tanàna. Ary dia tonga tany Jerosalema Joaba.
  '16':
  - type: text
    content: Ary nony hitan'ny Syriana fa resy teo anoloan'ny Isiraely izy, dia naniraka olona izy haka ny Syriana izay tany an-dafin'ny Ony
  - type: note
    content: Eofrata
  - type: text
    content: '; ary Sobaka, komandin''ny miaramilan''i Hadarezera, no nitarika azy. '
  '17':
  - type: text
    content: 'Ary nony nambara tamin i Davida izany, dia namory ny Isiraely rehetra izy ka lasa nita an''i Jordana, dia tonga teo aminy ka nilahatra hiady aminy. Ary nony nilahatra hiady amin''ny Syriana Davida, dia niady taminy ireo. '
  '18':
  - type: text
    content: 'Fa vaky nandositra teo anoloan''ny Isiraely ny Syriana, ka nahafaty ny teo amin''ny kalesy fito arivo sy miaramila an-tongotra efatra alina tamin''ny Syriana Davida; ary matiny koa Sobaka, komandin''ny miaramila. '
  '19':
  - type: text
    content: Ary nony hitan'ireo nanoa an'i Hadarezera fa resy teo anoloan'ny Isiraely izy, dia nanao fihavanana tamin'i Davida izy ka nanompo azy; ary tsy nety nanampy ny taranak'i Amona intsony ny Syriana.
  '2':
  - type: text
    content: 'Ary hoy Davida: Hanisy soa an''i Hanona, zanak''i Nahasy, aho, fa soa no nataon''ny rainy tamiko. Ary Davida naniraka olona hitsapa alahelo azy noho ny amin-drainy. Ary tonga tany amin''i Hanona tany amin''ny tanin''ny Amonita ny mpanompon''i Davida hitsapa alahelo azy. '
  '3':
  - type: text
    content: 'Ary hoy ireo mpanapaka ny taranak''i Amona tamin''i Hanona: Moa ataonao ho fanajana ny rainao no anirahan''i Davida hitsapa alahelo anao? Fa tsy hizaha sy handrava ary hisafo ny tany va no nalehan''ireo mpanompony ireo atỳ aminao? '
  '4':
  - type: text
    content: 'Dia nosamborin''i Hanona ny mpanompon''i Davida ka noharatany, sady nofolonany hatreo amin''ny foto-peny ny akanjony, ka dia nalefany hody izy. '
  '5':
  - type: text
    content: Ary dia nisy lasa nanambara tamin'i Davida izay natao tamin'ireo lehilahy ireo; ary izy naniraka hitsena azy, fa afa-baraka
  - type: note
    content: 'Na: menatra'
  - type: text
    content: ' loatra izy, ka dia hoy ny mpanjaka: Mitoera any Jeriko aloha ambara-panirin''ny somotrareo, vao mody ianareo.'
  '6':
  - type: text
    content: 'Ary nony hitan''ny taranak''i Amona fa efa nanao izay nampangidy hoditra azy tamin''i Davida izy, dia naniraka nampanatitra talenta volafotsy arivo hakaramany kalesy sy mpitaingin-tsoavaly any Mesopotamia sy Syriamaka ary Zoba Hanona sy ny taranak''i Amona. '
  '7':
  - type: text
    content: 'Dia nanakarama kalesy roa arivo amby telo alina mbamin''ny mpanjakan''i Maka sy ny olony izy; ary tonga ireo ka nitoby tandrifin''i Medeba. Ary nivory ny taranak''Amona niala tany amin''ny tanànany avy ka tamy hiady. '
  '8':
  - type: text
    content: 'Ary nony ren''i Davida izany, dia naniraka an''i Joaba sy ny miaramila rehetra izy, dia ny lehilahy mahery. '
  '9':
  - type: text
    content: 'Ary ny taranak''i Amona nivoaka ka nilahatra hiady teo anoloan''ny vavahadin''ny tanàna; fa ireo mpanjaka tonga ireo kosa dia nitokana teny an-tsaha. '
