document_id: 2SA.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nodian'i Absaloma, sy ny nampihavanana ny rainy taminy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary Joaba, zanak'i Zeroia, nahalala fa ny fon'ny mpanjaka nalahelo an
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mbola tezitra tamin'''
    marker-yv: yv-n
  - type: text
    text: '''i Absaloma ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Koa naniraka tany Tekoa nampaka vehivavy hendry tany Joaba ka nanao taminy hoe: Masìna ianao, modia misaona, ka miakanjoa akanjo fisaonana, ary aza mihoso-diloilo ianao, fa manaova tahaka ny vehivavy efa nisaona ela ny maty; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: dia mankanesa ao amin'ny mpanjaka, ka lazao aminy araka izao. Dia nomen'i Joaba teny izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nony niteny tamin''ny mpanjaka ravehivavy avy any Tekoa, dia niankohoka tamin''ny tany izy ary nitsaoka ka nanao hoe: Vonjeo, ary mpanjaka ô. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy ny mpanjaka taminy: Inona no nanjo anao? Dia hoy izy: Vehivavy mpitondra tena tokoa aho, fa maty vady. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary izaho mpanompovavinao nanan-janaka roa lahy, ary nifanditra tany an-tsaha izy mirahalahy, ka tsy nisy nampisaraka azy, ary ny anankiray namely ny rahalahiny ka nahafaty azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary, indreo, ny mpianakavy rehetra nanangana ady tamiko mpanompovavinao ka nanao hoe: Atolory ilay namely ny rahalahiny, fa hataonay maty izy noho ny ain''ny rahalahiny izay novonoiny ka dia hovonoinay koa ny mpandova; ka hovonoiny koa ny vainafoko sisa, ka tsy hamelany anarana na zanaka ho an''ny vadiko etỳ ambonin''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy ny mpanjaka tamin-dravehivavy: Modia ianao; fa izaho no handidy ny amin''izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary hoy ravehivavy avy any Tekoa tamin''ny mpanjaka: Ry mpanjaka tompoko ô, aoka ho amiko ny heloka sy ho amin''ny ankohonan''ny raiko; fa ny mpanjaka sy ny seza fiandrianany dia aoka tsy hanan-tsiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy ny mpanjaka: Na zovy na zovy manisy teny anao, ento etỳ amiko, dia tsy haninona anao intsony izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary hoy ravehivavy: Trarantitra ianao, ry mpanjaka ô, aoka ianao hahatsiaro an''i Jehovah Andriamanitrao, ary aoka ny mpamaly ratsy hamono intsony, fandrao mamono ny zanako izy. Dia hoy ny mpanjaka: Raha velona koa Jehovah, tsy hisy ho latsaka amin''ny tany na dia singam-bolo iray akory aza amin''ny zanakao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy ravehivavy: Trarantitra ianao, aoka kely ny mpanompovavinao hanao teny indraim-bava monja amin''ny mpanjaka tompoko. Ary hoy izy: Lazao ary. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hoy ravehivavy: Nahoana ianao no nihevitra toy izany hamely ny olon''Andriamanitra? Fa amin''ny, itenenan''ny mpanjaka izany zavatra izany, dia toa mahavoa ny tenany ihany izy noho ny tsi-fampodian''ny mpanjaka ilay noroahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa tsy maintsy maty isika ka ho tahaka ny rano raraka amin''ny tany, izay tsy azo raofina intsony; ary Andriamanitra tsy manala ain''olona, fa mihevitra izay tsy hanariany ilay noroahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa izaho no tonga hilaza izany zavatra izany amin''ny mpanjaka tompoko, ny olona no nampitahotra ahy: ary hoy izaho mpanompovavinao: mba holazaiko amin''ny mpanjaka izany; fa angamba ny mpanjaka hanao izay angatahin''ny mpanompovaviny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Eny, ny mpanjaka hihaino ka hamonjy ny mpanompovaviny ho afaka amin''ny tanan''ny lehilahy izay ta-hamongotra ahy mbamin''ny zanako hiala amin''ny lova nomen''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia hoy ny mpanompovavinao: Hahazoako fiononana anie ny tenin''ny mpanjaka tompoko; fa ta-haka Ilay Anjelin''Andriamanitra ny mpanjaka tompoko ka mandinika izay soa sy ratsy; koa Jehovah Andriamanitrao anie ho aminao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary ny mpanjaka namaly an-dravehivavy hoe: Aza dia afenina ahy izay zavatra hanontaniako anao. Dia hoy ravehivavy: Aoka hiteny ny mpanjaka tompoko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy ny mpanjaka: Moa saina nomen''i Joaba va izany rehetra lazainao izany'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Moa ny tànan'i Joaba va no aminao amin'izany rehetra izany?
    marker-yv: yv-n
  - type: text
    text: '? Dia hoy ny navalin-dravehivavy: Raha velona koa ny ainao, ry mpanjaka tompoko, tsy misy mivily izay rehetra nolazain''ny mpanjaka tompoko na ho amin''ny ankavanana na ho amin''ny ankavia; fa Joaba mpanomponao tokoa no nandidy ahy sy nanome izany teny rehetra izany ny mpanompovavinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny hampiova tarehy ny raharaha no nanaovan''i Joaba mpanomponao izany zavatra izany; fa hendry tahaka Ilay Anjelin''Andriamanitra tompoko ka mahalala ny zavatra rehetra etỳ ambonin''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary hoy ny mpanjaka tamin''i Joaba: Indro fa efa nekeko izany zavatra izany: koa andeha, alao hody Absaloma zatovo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia niankohoka tamin''ny tany Joaba ka nitsaoka sy nisaotra ny mpanjaka; ary hoy Joaba: Anio no ahafantaran''ny mpanomponao fa efa mahita fitia eo imasonao aho, ry mpanjaka tompoko, amin''ny nanaovan''ny mpanjaka araka ny nangatahin''ny mpanompony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia niainga Joaba nankany Gesora, ka nentiny nankany Jerosalema Absaloma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary hoy ny mpanjaka: Aoka hody any an-tranony izy, fa aza avela hahita ny tavako. Ary Absaloma nankany an-tranony, ka dia tsy nahita ny tavan''ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary tsy nisy lehilahy tsara tarehy noderaina fatratra tahaka an''i Absaloma teo amin''ny Isiraely rehetra, fa hatrany am-paladiany ka hatrany an-tampon-dohany dia tsy nisy tsiny izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary raha nanaratra ny lohany izy (fa isaky ny fitsingerenan''ny taona no nanaratany azy; fa nanavesatra azy ka noharatany), dia nolanjainy ny volon-dohany, ka sekely roan-jato no lanjany, araka ny fandanjan''ny mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary Absaloma niteraka zanaka telo mirahalahy sy vavy iray, atao hoe Tamara, ary vehivavy tsara tarehy izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary Absaloma nitoetra roa taona ngarangidina tany Jerosalema, nefa tsy mbola nahita ny tavan''ny mpanjaka ihany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary Absaloma dia naniraka tany amin''i Joaba, mba hanirahany azy ho any amin''ny mpanjaka, fa tsy nety nankany aminy izy; ary mbola naniraka fanindroany indray Absaloma, fa mbola tsy nety nankany ihany Joaba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Koa dia hoy izy tamin''ny mpanompony: Indro, ny tanimbarin''i Joaba mifanolotra amin''ny ahy, ary manana vary hordea ao izy; andeha, dory amin''ny afo izany. Ary ny mpanompon''i Absaloma dia nandoro ny tanimbary. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary Joaba niainga nankany amin''i Absaloma tao an-tranony ka nanao taminy hoe: Nahoana ny mpanomponao no nandoro ny tanimbariko tamin''ny afo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa hoy Absaloma tamin''i Joaba: Indro, naniraka tany aminao aho ka nanao hoe: Mankanesa atỳ hirahiko ho any amin''ny mpanjaka hanao hoe: Nahoana no niala tany Gesora aho? Tsara amiko raha nitoetra tany ihany mandraka ankehitriny. Koa ankehitriny, aoka re mba hahita ny tavan''ny mpanjaka aho, ka raha manan-keloka aho, dia aoka hovonoiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary Joaba nankany amin''ny mpanjaka ka nanambara izany taminy: ary dia nampanalain''ny mpanjaka Absaloma, dia nankao aminy izy ka niondrika tamin''ny tany teo anatrehan''ny mpanjaka; ary dia nanoroka an''i Absaloma ny mpanjaka.'
