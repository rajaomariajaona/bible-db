document_id: ISA.8
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny hahaterahan'ny zanaky ny mpaminanivavy, sy ny handresen'i Asyria ny Joda, ary ny toky ho azon'ny tena Isiraely noho ny nahaterahan'ny Zaza Mahagaga
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hoy Jehovah tamiko: Mangalà fafana lehibe, ka soraty aminy araka ny fanoratry ny olona hoe: "Ho an'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: amin'''
    marker-yv: yv-n
  - type: text
    text: '''i Mahera-salala-hasi-baza'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Mahera-salala-hasi-baza = Avy faingana ny famaboana, mimaona ny fandrobana
    marker-yv: yv-n
  - type: text
    text: '." '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary haka vavolombelona mahatoky Aho, dia Oria mpisorona sy Zakaria, zanakalahin''i Jeberekia. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nankany amin''ny mpaminanivavy, aho; dia nanan''anaka izy ka niteraka zazalahy. Ary hoy Jehovah tamiko: Aoka ny anarany hataonao hoe Mahera-salala-hasi-baza'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Mahera-salala-hasi-baza = Avy faingana ny famaboana, mimaona ny fandrobana
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa raha tsy mbola mahatonona hoe Idada na Ineny io zazalahy io, dia hobaboina eo anatrehan''ny mpanjakan''i Asyria ny haren''i Damaskosy sy ny fananan''i Samaria. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Jehovah dia mbola niteny tamiko indray hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Satria ity firenena ity mandà ny rano Siloa izay misononoka Ary mifaly amin-dRezina sy ny zanak''i Remalia, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia, indro, hampiakarin'ny Tompo hanafotra azy ny rano be sady manonja amin'ny Ony
  - type: usfm
    marker: x
    children:
    - type: text
      text: Eofrata
    marker-yv: yv-n
  - type: text
    text: ' (Dia ny mpanjakan''i Asyria sy ny voninahiny rehetra); Ary ny masondranony rehetra ho tondraka, Ary ny morony rehetra hihoarany; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia himaona fatratra izy ka hihatra amin'ny Joda Ary hanafotra sady mbola hisondrotra ihany Mandra-pahatongany havozona; Ary ny fipasany eny an-daniny roa
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. fampivelatra ny elany
    marker-yv: yv-n
  - type: text
    text: ' dia hanenika ny taninao, ry Imanoela ô.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Misafoaha ihany ianareo, ry firenena ô, nefa mbola ho ringana mihitsy ianareo; Ary mihainoa ihany, ry tany lavitra rehetra, misikìna ihany ianareo, nefa mbola ho ringana mihitsy; Eny, misikìna ihany ianareo, nefa mbola ho ringana mihitsy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Makà saina ihany ianareo, nefa mbola hofoanana izany; Milazà ihany ny teny, nefa tsy ho tanteraka izany tsy akory; Fa aminay Andriamanitra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Imanoela; izahao and. 8
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa izao no nolazain''i Jehovah tamiko, raha nanindry ahy mafy ny tànany, Ka nanariny tsy handeha amin''ny falehan''ity firenena ity aho: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Aza mba lazainareo ho tetika fikomiana izay lazain''ity firenena ity ho tetika fikomiana; Ary aza matahotra izay atahorany na mangovitra ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jehovah, Tompon''ny maro, no hasino; Ary aoka Izy ihany no hatahoranareo, Ary Izy ihany no hangovitanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia ho fitoerana masina ho anareo Izy, Fa ho vato mahatafintohina sy vatolampy mahasolafaka kosa Amin''ny firenena roa amin''ny Isiraely, sady ho fandrika sy tonta Amin''ny mponina any Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary maro ao aminy no ho tafintohina sady ho lavo sy ho ringana Ary ho voafandrika sy ho voasambotra. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fehezo ny teni-vavolombelona, Ary asio tombo-kase ny lalàna eo amin''ny mpianatro. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hiandry an''i Jehovah aho Izay manafina ny tavany amin''ny taranak''i Jakoba, Ka hanantena Azy ihany aho. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Indreto, izaho sy ireo zaza nomen''i Jehovah ahy dia famantarana sy fahagagana ao amin''ny Isiraely Avy amin''i Jehovah, Tompon''ny maro, Izay monina ao an-tendrombohitra Ziona. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary raha lazainy aminareo hoe: Milà saina amin''ny manao azy ho tsindrian-javatra sy ny mpanao sikidy, izay mitsiatsiaka sy miboeriboerika, Moa tsy Andriamaniny va no tokony hilan''ny olona saina? Fa hila saina amin''ny maty ho an''ny velona va izy? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ho amin'ny lalàna sy ny teni-vavolombelona ihany! Raha tsy miteny araka izany teny izany izy, Dia olona izay tsy hiposahan'ny fahazavan'ny maraina
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Eny, izany no holazain''ny olona izay tsy iposahan''ny fahazavan''ny maraina'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dia samy hivezivezy amin'ny tany izy rehetra sady mahantra no mosarena; Ary rehefa mosarena izy, dia ho sosotra ka hanozona
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hanozona amin''ny anaran'''
    marker-yv: yv-n
  - type: text
    text: ' ny mpanjakany sy Andriamaniny'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny andriamaniny'
    marker-yv: yv-n
  - type: text
    text: ', ary dia hiandrandra; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary hijery ny tany izy, ka indro fahoriana sy fahamaizinana ary manjombona mahafadiranovana, Ary horoahina ho any amin'ny aizim-pito izy. Fa tsy hanjombona mandrakariva ilay efa nozoim-pahoriana. Tamin'ny taloha dia nataony tsinontsinona ny tany Zebolona sy ny tany Naftaly; Fa amin'ny aoriana kosa dia homeny voninahitra ny lalana eo amoron-dranomasina, any an-dafin'i Jordana, Dia Galilia, tanin'ny jentilisa.
