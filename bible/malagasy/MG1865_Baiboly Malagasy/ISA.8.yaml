document_id: ISA.8,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny hahaterahan'ny zanaky ny mpaminanivavy, sy ny handresen'i Asyria ny Joda, ary ny toky ho azon'ny tena Isiraely noho ny nahaterahan'ny Zaza Mahagaga
  - type: text
    content: 'Ary hoy Jehovah tamiko: Mangalà fafana lehibe, ka soraty aminy araka ny fanoratry ny olona hoe: "Ho an'
  - type: note
    content: 'Na: amin'''
  - type: text
    content: '''i Mahera-salala-hasi-baza'
  - type: note
    content: Mahera-salala-hasi-baza = Avy faingana ny famaboana, mimaona ny fandrobana
  - type: text
    content: '." '
  '10':
  - type: text
    content: Makà saina ihany ianareo, nefa mbola hofoanana izany; Milazà ihany ny teny, nefa tsy ho tanteraka izany tsy akory; Fa aminay Andriamanitra
  - type: note
    content: Heb. Imanoela; izahao and. 8
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Fa izao no nolazain''i Jehovah tamiko, raha nanindry ahy mafy ny tànany, Ka nanariny tsy handeha amin''ny falehan''ity firenena ity aho: '
  '12':
  - type: text
    content: 'Aza mba lazainareo ho tetika fikomiana izay lazain''ity firenena ity ho tetika fikomiana; Ary aza matahotra izay atahorany na mangovitra ianareo. '
  '13':
  - type: text
    content: 'Jehovah, Tompon''ny maro, no hasino; Ary aoka Izy ihany no hatahoranareo, Ary Izy ihany no hangovitanareo. '
  '14':
  - type: text
    content: 'Dia ho fitoerana masina ho anareo Izy, Fa ho vato mahatafintohina sy vatolampy mahasolafaka kosa Amin''ny firenena roa amin''ny Isiraely, sady ho fandrika sy tonta Amin''ny mponina any Jerosalema. '
  '15':
  - type: text
    content: 'Ary maro ao aminy no ho tafintohina sady ho lavo sy ho ringana Ary ho voafandrika sy ho voasambotra. '
  '16':
  - type: text
    content: 'Fehezo ny teni-vavolombelona, Ary asio tombo-kase ny lalàna eo amin''ny mpianatro. '
  '17':
  - type: text
    content: 'Ary hiandry an''i Jehovah aho Izay manafina ny tavany amin''ny taranak''i Jakoba, Ka hanantena Azy ihany aho. '
  '18':
  - type: text
    content: 'Indreto, izaho sy ireo zaza nomen''i Jehovah ahy dia famantarana sy fahagagana ao amin''ny Isiraely Avy amin''i Jehovah, Tompon''ny maro, Izay monina ao an-tendrombohitra Ziona. '
  '19':
  - type: text
    content: 'Ary raha lazainy aminareo hoe: Milà saina amin''ny manao azy ho tsindrian-javatra sy ny mpanao sikidy, izay mitsiatsiaka sy miboeriboerika, Moa tsy Andriamaniny va no tokony hilan''ny olona saina? Fa hila saina amin''ny maty ho an''ny velona va izy? '
  '2':
  - type: text
    content: 'Ary haka vavolombelona mahatoky Aho, dia Oria mpisorona sy Zakaria, zanakalahin''i Jeberekia. '
  '20':
  - type: text
    content: Ho amin'ny lalàna sy ny teni-vavolombelona ihany! Raha tsy miteny araka izany teny izany izy, Dia olona izay tsy hiposahan'ny fahazavan'ny maraina
  - type: note
    content: 'Na: Eny, izany no holazain''ny olona izay tsy iposahan''ny fahazavan''ny maraina'
  - type: text
    content: '. '
  '21':
  - type: text
    content: Dia samy hivezivezy amin'ny tany izy rehetra sady mahantra no mosarena; Ary rehefa mosarena izy, dia ho sosotra ka hanozona
  - type: note
    content: 'Na: hanozona amin''ny anaran'''
  - type: text
    content: ' ny mpanjakany sy Andriamaniny'
  - type: note
    content: 'Na: ny andriamaniny'
  - type: text
    content: ', ary dia hiandrandra; '
  '22':
  - type: text
    content: Ary hijery ny tany izy, ka indro fahoriana sy fahamaizinana ary manjombona mahafadiranovana, Ary horoahina ho any amin'ny aizim-pito izy. Fa tsy hanjombona mandrakariva ilay efa nozoim-pahoriana. Tamin'ny taloha dia nataony tsinontsinona ny tany Zebolona sy ny tany Naftaly; Fa amin'ny aoriana kosa dia homeny voninahitra ny lalana eo amoron-dranomasina, any an-dafin'i Jordana, Dia Galilia, tanin'ny jentilisa.
  '3':
  - type: text
    content: 'Ary nankany amin''ny mpaminanivavy, aho; dia nanan''anaka izy ka niteraka zazalahy. Ary hoy Jehovah tamiko: Aoka ny anarany hataonao hoe Mahera-salala-hasi-baza'
  - type: note
    content: Mahera-salala-hasi-baza = Avy faingana ny famaboana, mimaona ny fandrobana
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Fa raha tsy mbola mahatonona hoe Idada na Ineny io zazalahy io, dia hobaboina eo anatrehan''ny mpanjakan''i Asyria ny haren''i Damaskosy sy ny fananan''i Samaria. '
  '5':
  - type: text
    content: 'Ary Jehovah dia mbola niteny tamiko indray hoe: '
  '6':
  - type: text
    content: 'Satria ity firenena ity mandà ny rano Siloa izay misononoka Ary mifaly amin-dRezina sy ny zanak''i Remalia, '
  '7':
  - type: text
    content: Dia, indro, hampiakarin'ny Tompo hanafotra azy ny rano be sady manonja amin'ny Ony
  - type: note
    content: Eofrata
  - type: text
    content: ' (Dia ny mpanjakan''i Asyria sy ny voninahiny rehetra); Ary ny masondranony rehetra ho tondraka, Ary ny morony rehetra hihoarany; '
  '8':
  - type: text
    content: Dia himaona fatratra izy ka hihatra amin'ny Joda Ary hanafotra sady mbola hisondrotra ihany Mandra-pahatongany havozona; Ary ny fipasany eny an-daniny roa
  - type: note
    content: Heb. fampivelatra ny elany
  - type: text
    content: ' dia hanenika ny taninao, ry Imanoela ô.'
  '9':
  - type: text
    content: 'Misafoaha ihany ianareo, ry firenena ô, nefa mbola ho ringana mihitsy ianareo; Ary mihainoa ihany, ry tany lavitra rehetra, misikìna ihany ianareo, nefa mbola ho ringana mihitsy; Eny, misikìna ihany ianareo, nefa mbola ho ringana mihitsy. '
