document_id: HEB.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fampitahana an'i Kristy sy ny anjely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa nampitenenin''Andriamanitra tamin''ny razana fahiny ny mpaminany tamin''ny andro samy hafa sy ny fanao samy hafa; '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia amin''izao andro farany izao kosa no nampitenenany tamintsika ny Zanany, Izay voatendriny ho Mpandova ny zavatra rehetra; Izy no nahariany izao tontolo izao, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Izy koa no famirapiratan''ny voninahiny sy endriky ny tenany indrindra ary mihazona ny zavatra rehetra amin''ny herin''ny teniny; ary rehefa nanao fanadiovana hahafaka ny fahotana Izy, dia nipetraka teo amin''ny tanana ankavanan''ny Lehibe any amin''ny avo '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ka natao tsara noho ny anjely, araka ny nandovany anarana tsara noho ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa anjely iza no mba nilazany hoe: "Zanako Hianao, Izaho niteraka Anao androany"? (Sal.2.7). Ary koa: "Izaho ho Rainy, Ary Izy ho Zanako"? (2 Sam. 7.14.) '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary raha mitondra ny Lahimatoa ho amin''izao fiainana izao indray, dia hoy Izy: "Ary aoka ny anjelin''Andriamanitra rehetra hiankohoka eo anoloany" (Sal. 97.7). '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny anjely dia ilazany hoe: "Izy manao ny anjeliny ho rivotra, Ary ny mpanompony ho lelafo" (Sal.104. 4). '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa ny Zanaka kosa dia nilazany hoe: "Ny seza fiandriananao, Andriamanitra ô, dia mandrakizay doria; Ary ny tehim-pahitsiana no tehim-panjakanao; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tianao ny fahamarinana, fa halanao ny heloka; Koa Andriamanitra, dia Andriamanitrao, efa nanoso-diloilo fifaliana Anao Mihoatra noho ny namanao" (Sal. 45.6, 7). '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary izao koa: "Hianao, Jehovah ô, tany aloha no nanorenanao ny tany, Ary asan''ny tananao ny lanitra; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ireo dia ho levona, fa Hianao no maharitra; Ary izy rehetra ho rovitra toy ny fitafiana, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary toy ny lamba no hamalonanao azy, Dia toy ny fitafiana, ka hovana izy; Fa Hianao no tsy miova, Ary ny taonanao no tsy ho tapitra" (Sal 102.25-27). '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa anjely iza no mba nilazany hoe: "Mipetraha eo an-tanako ankavanana, Ambara-panaoko ny fahavalonao ho fitoeran-tongotrao"? (Sal. 110. 1.) '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tsy fanahy manompo
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: manao fanompoam-pivavahana'
    marker-yv: yv-n
  - type: text
    text: ' va izy rehetra, nirahina hanao fanompoana ho an''izay handova famonjena?'
