document_id: PRO.7,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Anaka, tandremo ny teniko, Ary raketo ao aminao ny didiko. '
  '10':
  - type: text
    content: 'Dia, indro, nisy vehivavy nitsena azy Sady manao fitafin''ny janga no mifetsy am-po, '
  '11':
  - type: text
    content: 'Sady vavàna no maditra, Tsy mahajanona ao an-tranony ny tongony; '
  '12':
  - type: text
    content: 'Fa vetivety mby eny an-dalam-be izy, ary vetivety mby eny an-tsena, Ary mamitsaka eny an-joron-trano rehetra eny izy. '
  '13':
  - type: text
    content: 'Ka dia nisavika ilay tovolahy izy ka nanoroka azy Sady nisolantsolana taminy ka nilaza hoe: '
  '14':
  - type: text
    content: 'Efa nivoady hanatitra fanati-pihavanana aho; Ary androany no nanefako ny voadiko. '
  '15':
  - type: text
    content: 'Koa dia nivoaka hitsena anao aho, Mba hitady fatratra ny tarehinao, ka dia nahita anao tokoa. '
  '16':
  - type: text
    content: 'Ny fandriako efa nasiako firakotra tsara, Dia lambam-pandriana misoratsoratra voafoly hatrany Egypta. '
  '17':
  - type: text
    content: Efa norarahako zava-manitra ny fandriako, Dia miora sy hazomanitra
  - type: note
    content: Heb. ahalima
  - type: text
    content: ' ary havozo manitra. '
  '18':
  - type: text
    content: 'Andeha, aoka isika hivoky fitia ambara-pahamarain''ny andro, Aoka ho feno fahafinaretana amin''ny fitiavana isika. '
  '19':
  - type: text
    content: 'Fa tsy ao an-trano ny lehilahy, Fa lasa nivahiny lavitra izy; '
  '2':
  - type: text
    content: 'Tandremo ny didiko, dia ho velona ianao; Ary tandremo toy ny anakandriamasonao ny lalàko. '
  '20':
  - type: text
    content: 'Ny kitampom-bola dia nentiny any an-tànany, Ka tsy mbola hody izy mandra-pahafenon''ny volana. '
  '21':
  - type: text
    content: 'Tamin''ny teny maro no nampanekeny azy, Tamin''ny fandroboan''ny molony no nitaomany azy, '
  '22':
  - type: text
    content: Ka dia nandeha nanaraka azy niaraka tamin'izay ilay zatovo
  - type: note
    content: 'Na: Na iza na iza mandeha manaraka azy dia'
  - type: text
    content: ', Tahaka ny omby entina hovonoina, Ary tahaka ny adala hogadrana'
  - type: note
    content: Heb. tahaka ny gadra ho famaizana ny adala
  - type: text
    content: ', '
  '23':
  - type: text
    content: 'Ambara-piboroaky ny lefom-pohy amin''ny atiny, Ary tahaka ny vorona mipaoka ny fandrika, Fa tsy fantany hahafaty ny ainy izany. '
  '24':
  - type: text
    content: 'Koa mihainoa ahy ianareo, anaka, Ary tandremo ny teny aloaky ny vavako. '
  '25':
  - type: text
    content: 'Aoka tsy hivily ho any amin''ny lalany ny fonareo, Ary aza mania ho amin''ny alehany. '
  '26':
  - type: text
    content: 'Fa betsaka no naripany ka maty; Ary maro be no efa matiny. '
  '27':
  - type: text
    content: Ny tranony dia lalana mankany amin'ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola
  - type: text
    content: ', Eny, midina ho any amin''ny efi-tranon''ny fahafatesana.'
  '3':
  - type: text
    content: 'Afehezo eo amin''ny rantsan-tananao izy, Soraty ao amin''ny fonao tahaka ny amin''ny vato fisaka izy. '
  '4':
  - type: text
    content: 'Ny fahendrena dia ilazao hoe: Anabaviko ianao; Ary ny fahafantarana dia antsoy hoe: Sakaiza mahazatra ianao; '
  '5':
  - type: text
    content: Mba hiarovana anao amin'ny vehivavy jejo
  - type: note
    content: Heb. vehivavy tsy vadinao
  - type: text
    content: ', Dia amin''ny vahiny janga izay manao teny mandrobo.'
  '6':
  - type: text
    content: 'Fa teo amin''ny varavarankelin''ny tranoko, Dia teo amin''ny makarakara, no nitsirihako, '
  '7':
  - type: text
    content: 'Ka nahita anankiray tamin''ny kely saina aho, Eny, nandinika ny tovolahy aho ka nahita zazalahy anankiray tsy ampy saina, '
  '8':
  - type: text
    content: 'Izay nandeha tamin''ny lalana akaikin''ny zoron-tranon''ny vehivavy janga Sy nizotra nankany an-tranony, '
  '9':
  - type: text
    content: 'Nony takariva ilay somambisamby iny Sy tamin''ny alina efa maizina dia maizina. '
