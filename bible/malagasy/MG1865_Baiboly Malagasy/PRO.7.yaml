document_id: PRO.7,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Anaka, tandremo ny teniko, Ary raketo ao aminao ny didiko. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia, indro, nisy vehivavy nitsena azy Sady manao fitafin''ny janga no mifetsy am-po, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Sady vavàna no maditra, Tsy mahajanona ao an-tranony ny tongony; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa vetivety mby eny an-dalam-be izy, ary vetivety mby eny an-tsena, Ary mamitsaka eny an-joron-trano rehetra eny izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ka dia nisavika ilay tovolahy izy ka nanoroka azy Sady nisolantsolana taminy ka nilaza hoe: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Efa nivoady hanatitra fanati-pihavanana aho; Ary androany no nanefako ny voadiko. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Koa dia nivoaka hitsena anao aho, Mba hitady fatratra ny tarehinao, ka dia nahita anao tokoa. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ny fandriako efa nasiako firakotra tsara, Dia lambam-pandriana misoratsoratra voafoly hatrany Egypta. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Efa norarahako zava-manitra ny fandriako, Dia miora sy hazomanitra
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ahalima
      marker-yv: yv-n
    - type: text
      text: ' ary havozo manitra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Andeha, aoka isika hivoky fitia ambara-pahamarain''ny andro, Aoka ho feno fahafinaretana amin''ny fitiavana isika. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Fa tsy ao an-trano ny lehilahy, Fa lasa nivahiny lavitra izy; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Tandremo ny didiko, dia ho velona ianao; Ary tandremo toy ny anakandriamasonao ny lalàko. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ny kitampom-bola dia nentiny any an-tànany, Ka tsy mbola hody izy mandra-pahafenon''ny volana. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Tamin''ny teny maro no nampanekeny azy, Tamin''ny fandroboan''ny molony no nitaomany azy, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ka dia nandeha nanaraka azy niaraka tamin'izay ilay zatovo
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Na iza na iza mandeha manaraka azy dia'
      marker-yv: yv-n
    - type: text
      text: ', Tahaka ny omby entina hovonoina, Ary tahaka ny adala hogadrana'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. tahaka ny gadra ho famaizana ny adala
      marker-yv: yv-n
    - type: text
      text: ', '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ambara-piboroaky ny lefom-pohy amin''ny atiny, Ary tahaka ny vorona mipaoka ny fandrika, Fa tsy fantany hahafaty ny ainy izany. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Koa mihainoa ahy ianareo, anaka, Ary tandremo ny teny aloaky ny vavako. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Aoka tsy hivily ho any amin''ny lalany ny fonareo, Ary aza mania ho amin''ny alehany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fa betsaka no naripany ka maty; Ary maro be no efa matiny. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ny tranony dia lalana mankany amin'ny fiainan-tsi-hita
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Sheola
      marker-yv: yv-n
    - type: text
      text: ', Eny, midina ho any amin''ny efi-tranon''ny fahafatesana.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Afehezo eo amin''ny rantsan-tananao izy, Soraty ao amin''ny fonao tahaka ny amin''ny vato fisaka izy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ny fahendrena dia ilazao hoe: Anabaviko ianao; Ary ny fahafantarana dia antsoy hoe: Sakaiza mahazatra ianao; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mba hiarovana anao amin'ny vehivavy jejo
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. vehivavy tsy vadinao
      marker-yv: yv-n
    - type: text
      text: ', Dia amin''ny vahiny janga izay manao teny mandrobo.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa teo amin''ny varavarankelin''ny tranoko, Dia teo amin''ny makarakara, no nitsirihako, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ka nahita anankiray tamin''ny kely saina aho, Eny, nandinika ny tovolahy aho ka nahita zazalahy anankiray tsy ampy saina, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Izay nandeha tamin''ny lalana akaikin''ny zoron-tranon''ny vehivavy janga Sy nizotra nankany an-tranony, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Nony takariva ilay somambisamby iny Sy tamin''ny alina efa maizina dia maizina. '
