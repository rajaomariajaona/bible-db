document_id: EST.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanonganana an'i Hamana sy ny namonoana azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny mpanjaka sy Hamana dia nankao amin''i Estera, vadin''ny mpanjaka, ho ao amin''ny fanasana '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy indray ny mpanjaka tamin''i Estera teo am-pisotroan-divay tamin''ny andro faharoa inona no angatahinao, ry Estera, vadin''ny mpanjaka? Fa homena anao izany. Ary inona ange no tadiavinao? Fa na dia hatramin''ny antsasaky ny fanjakana aza dia hotovina izany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia namaly Estera, vadin''ny mpanjaka, ka nanao hoe: Raha mahita fitia eto imasonao ary aho, ry mpanjaka, ka sitraky ny mpanjaka, dia aoka homena ahy ny aiko araka ny fifonako ary ny fireneko araka ny fangatahako; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'fa namidy izahay, dia izaho sy ny fireneko, mba haringana sy hovonoina ary haripaka; fa raha tahìny namidy ho andevolahy sy ho andevovavy izahay, dia ho nangina ihany aho; kanefa anie tsy mahonitra ny fatiantoky ny mpanjaka tsinona ilay fahavalo e. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia namaly Ahasoerosy mpanjaka ka nanao tamin''i Estera, vadin''ny mpanjaka, hoe: Iza moa izany, ary aiza no hisy hasesiky ny fony hanao izany akory? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa hoy Estera: Io Hamana ratsy fanahy io no rafilahy sy fahavalo! Dia raiki-tahotra teo anatrehan''ny mpanjaka sy ny vadin''ny mpanjaka Hamana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary tezitra dia tezitra ny mpanjaka, dia nitsangana niala teo am-pisotroan-divay ho eny an-tanimbolin''ny trano; ary Hamana kosa nitsangana hangataka ny ainy tamin''i Estera, vadin''ny mpanjaka, satria hitany fa misy loza hamelin''ny mpanjaka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny mpanjaka niverina avy teo an-tanimbolin''ny trano ho ao amin''ilay efa nisotroany divay teo, ary Hamana sendra niapoka tamin''ny farafara nandrian''i Estera. Dia hoy ny mpanjaka: Moa hisavika ny vadin''ny mpanjaka eto anatrehako eto an-trano va io? Raha vantany vao naloaky ny vavan''ny mpanjaka izany teny izany, dia nisy nanarona ny tavan''i Hamana '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary Harbona, tsindranolahy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ionoka
    marker-yv: yv-n
  - type: text
    text: ' anankiray, izay teo anatrehan''ny mpanjaka, dia nilaza hoe Indro miorina eo akaikin''ny tranon''i Hamana ny hazo, dimam-polo hakiho ny hahavony, izay nataon''i Hamana hanantonany an''i Mordekay, ilay niteny soa ho an''ny mpanjaka. Dia hoy ny mpanjaka ahantòny amin''io izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary Hamana dia nahantony tamin'ilay hazo efa natsangany hanantonana an'i Mordekay. Dia vao izay no nionona ny hatezeran'ny mpanjaka.
