document_id: PSA.73
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny tsy hahaketraka ny olon'Andriamanitra, raha mahita ny ratsy fanahy ambinina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Salamo nataon'i Asafa. Andriamanitra mahasoa ny Isiraely tokoa, dia ny madio fo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa izaho, dia saiky nibolasitra ny tongotro; saiky solafaka ny diako, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Satria nialona ny mpirehareha aho, raha nahita ny fiadanan''ny ratsy fanahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa tsy misy fanaintainana amin''ny fahafatesany, ary fatratra ny heriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsy mba misy manavesatra azy, tahaka ny olona sasany, ary tsy mba azom-pahoriana tahaka ny olon-kafa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia izany no iambozonany rehareha toy ny rojo, sy itafiany fahalozàna tahaka ny lamba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Bongon-tavy ny masony; miloatra ny hevitry ny fony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Manazimbazimba izy ka miresaka fampahoriana an-dolom-po; avo vava izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Manao vava manakatra ny lanitra izy, ary ny lelany mandeha mitety ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izany no itodihan''ny olony hankany aminy; ary rano be no gohin''ireny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ka hoy izy: Hataon''Andriamanitra ahoana no fahalala? ary manam-pahalalana va ny Avo Indrindra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Indro, ireny dia olona ratsy fanahy; miadana mandrakariva izy ka mitombo harena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Foana mihitsy ny nanadiovako ny foko sy ny nanasàko ny tanako tamin''ny fahamarinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Azom-pahoriana mandritra ny andro aho, ary faizana isa-maraina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Raha tahìny aho nanao hoe: Hiteny izany aho, dia ho namitaka ireo zanakao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nieritreritra ta-hahalala izany zavatra izany aho, kanjo sarotra teo imasoko izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mandra-piditro tao amin''ny fitoera-masin''Andriamanitra ka nihevitra izay ho farany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Eo amin''izay mahasolafaka tokoa no ametrahanao azy, ary aripakao ho ringana izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hià! rava indray mipi-maso izy! levona izy, matin-java-mahatahotra izy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tahaka ny anaovan'ny olona ny nofiny ho tsinontsinona, dia tahaka izany, Tompo ô, no anaovanao ny endrik'ireny ho tsinontsinona, raha mifoha Hianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Raha lotika ny foko, ka voatsindrona ny voako, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dia ketrina aho ka tsy nahalala; eny, biby
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hipopotamosy'
    marker-yv: yv-n
  - type: text
    text: ' teo anatrehanao aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nefa izaho dia eo aminao ihany mandrakariva, mihazona ny tanako ankavanana Hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ny saina omenao no hitondranao ahy, ary rehefa afaka izany, dia horaisinao ho amin''ny voninahitra aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Iza no ahy any an-danitra? ary tsy misy etỳ ambonin''ny tany iriko tahaka Anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Na dia levona aza ny nofoko sy ny foko, dia mbola vatolampin'ny foko sy anjarako mandrakizay Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa, indro, very izay lavitra Anao; aringanao izay rehetra mijangajanga mahafoy Anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Fa, izaho, dia ny ho akaikin'Andriamanitra no mahatsara ahy; Hianao, Jehovah Tompo ô, no nataoko aroko, mba hilaza ny asanao rehetra aho.
