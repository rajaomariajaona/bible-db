document_id: PSA.73,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny tsy hahaketraka ny olon'Andriamanitra, raha mahita ny ratsy fanahy ambinina
  - type: text
    content: Salamo nataon'i Asafa. Andriamanitra mahasoa ny Isiraely tokoa, dia ny madio fo.
  '10':
  - type: text
    content: 'Izany no itodihan''ny olony hankany aminy; ary rano be no gohin''ireny; '
  '11':
  - type: text
    content: 'Ka hoy izy: Hataon''Andriamanitra ahoana no fahalala? ary manam-pahalalana va ny Avo Indrindra? '
  '12':
  - type: text
    content: Indro, ireny dia olona ratsy fanahy; miadana mandrakariva izy ka mitombo harena.
  '13':
  - type: text
    content: 'Foana mihitsy ny nanadiovako ny foko sy ny nanasàko ny tanako tamin''ny fahamarinana. '
  '14':
  - type: text
    content: 'Azom-pahoriana mandritra ny andro aho, ary faizana isa-maraina. '
  '15':
  - type: text
    content: 'Raha tahìny aho nanao hoe: Hiteny izany aho, dia ho namitaka ireo zanakao. '
  '16':
  - type: text
    content: 'Dia nieritreritra ta-hahalala izany zavatra izany aho, kanjo sarotra teo imasoko izany. '
  '17':
  - type: text
    content: 'Mandra-piditro tao amin''ny fitoera-masin''Andriamanitra ka nihevitra izay ho farany. '
  '18':
  - type: text
    content: 'Eo amin''izay mahasolafaka tokoa no ametrahanao azy, ary aripakao ho ringana izy. '
  '19':
  - type: text
    content: 'Hià! rava indray mipi-maso izy! levona izy, matin-java-mahatahotra izy! '
  '2':
  - type: text
    content: 'Fa izaho, dia saiky nibolasitra ny tongotro; saiky solafaka ny diako, '
  '20':
  - type: text
    content: Tahaka ny anaovan'ny olona ny nofiny ho tsinontsinona, dia tahaka izany, Tompo ô, no anaovanao ny endrik'ireny ho tsinontsinona, raha mifoha Hianao.
  '21':
  - type: text
    content: 'Raha lotika ny foko, ka voatsindrona ny voako, '
  '22':
  - type: text
    content: Dia ketrina aho ka tsy nahalala; eny, biby
  - type: note
    content: 'Na: hipopotamosy'
  - type: text
    content: ' teo anatrehanao aho. '
  '23':
  - type: text
    content: 'Nefa izaho dia eo aminao ihany mandrakariva, mihazona ny tanako ankavanana Hianao. '
  '24':
  - type: text
    content: 'Ny saina omenao no hitondranao ahy, ary rehefa afaka izany, dia horaisinao ho amin''ny voninahitra aho. '
  '25':
  - type: text
    content: 'Iza no ahy any an-danitra? ary tsy misy etỳ ambonin''ny tany iriko tahaka Anao. '
  '26':
  - type: text
    content: Na dia levona aza ny nofoko sy ny foko, dia mbola vatolampin'ny foko sy anjarako mandrakizay Andriamanitra.
  '27':
  - type: text
    content: 'Fa, indro, very izay lavitra Anao; aringanao izay rehetra mijangajanga mahafoy Anao. '
  '28':
  - type: text
    content: Fa, izaho, dia ny ho akaikin'Andriamanitra no mahatsara ahy; Hianao, Jehovah Tompo ô, no nataoko aroko, mba hilaza ny asanao rehetra aho.
  '3':
  - type: text
    content: 'Satria nialona ny mpirehareha aho, raha nahita ny fiadanan''ny ratsy fanahy. '
  '4':
  - type: text
    content: 'Fa tsy misy fanaintainana amin''ny fahafatesany, ary fatratra ny heriny. '
  '5':
  - type: text
    content: 'Tsy mba misy manavesatra azy, tahaka ny olona sasany, ary tsy mba azom-pahoriana tahaka ny olon-kafa izy. '
  '6':
  - type: text
    content: 'Dia izany no iambozonany rehareha toy ny rojo, sy itafiany fahalozàna tahaka ny lamba. '
  '7':
  - type: text
    content: 'Bongon-tavy ny masony; miloatra ny hevitry ny fony. '
  '8':
  - type: text
    content: 'Manazimbazimba izy ka miresaka fampahoriana an-dolom-po; avo vava izy. '
  '9':
  - type: text
    content: 'Manao vava manakatra ny lanitra izy, ary ny lelany mandeha mitety ny tany. '
