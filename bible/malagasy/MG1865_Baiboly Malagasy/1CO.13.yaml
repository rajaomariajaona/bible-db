document_id: 1CO.13,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Na dia miteny amin''ny fitenin''ny olona sy ny anjely aza aho, kanefa tsy manana fitiavana, dia tonga varahina maneno sy kipantsona mikarantsana aho. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'fa rehefa tonga ny tanteraka, dia tsy hisy sombintsombiny intsony. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fony mbola zaza aho, dia niteny toy ny zaza, nihevitra toy ny zaza, nisaina toy ny zaza; fa nony efa lehibe aho, dia nariako ny fahazazana. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa ankehitriny isika mizaha ao amin''ny fitaratra ka tsy mahita marina; fa rahatrizay dia mifanatrika; ankehitriny sombintsombiny no fantatro; fa rahatrizay dia ho fantatro tsara toy izay nahafantarana ahy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary ankehitriny dia ireto telo ireto no mitoetra: ny finoana, ny fanantenana, ny fitiavana: fa ny fitiavana no lehibe amin''ireo.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary na dia manana faminaniana aza aho ka mahalala ny zava-miafina rehetra sady manana ny fahalalana rehetra, ary na dia manana ny finoana rehetra aza aho ka mahafindra tendrombohitra, kanefa tsy manana fitiavana, dia tsinontsinona aho. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary na dia omeko hohanin''ny malahelo aza ny fananako rehetra, ary na dia atolotro hodorana aza ny tenako, kanefa tsy manana fitiavana aho, dia tsy mahasoa ahy akory izany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ny fitiavana mahari-po sady mora fanahy; ny fitiavana tsy mialona, tsy mirehareha, tsy mieboebo, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'tsy manao izay tsy mahamendrika, tsy mitady ny azy, tsy mora sosotra, tsy manao otri-po, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'tsy mifaly amin''ny tsi-fahamarinana, fa miara-mifaly amin''ny fahamarinana kosa, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: mandefitra
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: manarona'
      marker-yv: yv-n
    - type: text
      text: ' ny zavatra rehetra, mino ny zavatra rehetra, manantena ny zavatra rehetra, maharitra ny zavatra rehetra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ny fitiavana tsy ho levona mandrakizay; fa raha ny faminaniana, dia ho levona; na ny fiteny tsy fantatra, dia hitsahatra; na ny fahalalana, dia ho foana. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa sombintsombiny ny fahalalantsika, ary sombintsombiny ny faminaniantsika; '
