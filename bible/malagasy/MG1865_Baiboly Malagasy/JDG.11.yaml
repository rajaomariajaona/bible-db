document_id: JDG.11,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jefta Gileadita dia lehilahy mahery sy zanaky ny vehivavy janga; ary Gileada no rainy niteraka azy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny loholon''i Gileada tamin''i Jefta: Jehovah no ho vavolombelona amintsika, raha tsy hataonay araka izany teninao izany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha Jefta niaraka tamin''ny loholon''i Gileada, ka dia nasandratry ny vahoaka ho lohany sy ho mpitarika azy izy; ary Jefta nilaza ny teniny rehetra teo anatrehan''i Jehovah tao Mizpa. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naniraka olona Jefta nankamin''ny mpanjakan''ny taranak''i Amona hanao hoe: Moa mifaninona akory izaho sy ianao, no tonga atỳ amiko hiady amin''ny taniko ianao? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny mpanjakan''ny taranak''i Amona tamin''ny irak''i Jefta: Satria nalain''ny Isiraely ny taniko hatrany Arnona ka hatrany Jaboka ary hatrany Jordana, fony niakatra avy tany Egypta izy; koa avereno amin''ny fihavanana ary izany ankehitriny. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jefta naniraka olona indray nankany amin''ny mpanakan''ny taranak''i Amona '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka nanao taminy hoe: Izao no lazain''i Jefta: Ny Isiraely tsy naka ny tanin''i Moaba na ny tanin''ny taranak''i Amona. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa fony niakatra avy tany Egypta ny Isiraely, dia nandeha nitety ny efitra hatramin''ny Ranomasina Mena izy ka tonga tany Kadesy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naniraka olona ny Isiraely nankany amin''ny mpanjakan''i Edoma ka nanao hoe: Aoka mba handeha hamaky ny taninao aho; fa tsy nety nihaino izany ny mpanjakan''i Edoma. Ary naniraka tany amin''ny mpanjakan''i Moaba koa izy; fa tsy nety koa izy; dia nitoetra tany Kadesy ny Isiraely. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha nitety ny efitra izy ka nanodidina ny tany Edoma sy ny tany Moaba, dia tonga teo atsinanan''i Moaba, ka nitoby teo an-dafin''i Arnona, fa tsy niditra teo anatin''ny faritanin''i Moaba; fa Arnona no fari-tanin''i Moaba. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny Isiraely dia naniraka olona tany amin''i Sihona, mpanjakan''ny Amorita, izay mpanjakan''i Hesbona; ary hoy ny Isiraely taminy: Aoka mba handeha hamaky ny taninao izahay hankany amin''ny fonenanay. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny vadin''i Gileada dia niteraka zazalahy maro taminy; ary nony efa lehibe ireo zana-badiny ireo, dia nandroaka an''i Jefta ka nanao taminy hoe: Tsy handova eto amin''ny taranaky ny rainay ianao, fa zanaky ny vehivavy hafa. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Sihona tsy natoky ny Isiraely hamaky ny fari-taniny, fa namory ny vahoakany rehetra izy, dia nitoby tany Jahaza ka niady tamin''ny Isiraely. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah, Andriamanitry ny Isiraely, nanolotra an''i Sihona sy ny vahoakany rehetra teo an-tànan''ny Isiraely, ka namely azy ireo; dia azon''ny Isiraely ny tanin''ny Amorita rehetra, mponina tany amin''izany tany izany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nahazo ny tanin''ny Amorita rehetra izy hatrany Arnona, ka hatrany Jaboka ary hatramin''ny efitra ka hatrany Jordana. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa ankehitriny, Jehovah, Andriamanitry ny Isiraely, efa nandroaka ny Amorita teo anoloan''ny Isiraely olony: ary ianao kosa va tahaka ny tany? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa tsy hotananao izay tany omen''i Kemosy andriamanitrao anao va? Atỳ izay tany rehetra omen''i Jehovah Andriamanitray anay dia mba hotananay kosa. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa tsara noho Balaka, zanak''i Zipora, mpanjakan''i Moaba, va ianao? Nety nanohitra ny Isiraely na niady taminy akory va izy? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha ny Isiraely nitoetra telon-jato taona tany Hesboala sy ny zana-bohiny ary tany Aroera sy ny zana-bohiny ary tany amin''ny tanàna rehetra eny amoron''i Arnona, nahoana no tsy nalainareo ny tany tamin''izany andro izany? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izaho tsy nanota taminao, fa ianao no manisy ratsy ahy, fa miady amiko;
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa tsy nohenoin''ny mpanjakan''ny taranak''i Amona ny tenin''i Jefta, izay nampitondrainy tany aminy. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary tonga tao amin'i Jefta ny Fanahin'i Jehovah, dia nandeha nitety an'i Gileada sy Manase izy; ka dia nitety an'i Mizpa any Gileada koa izy ka niala tany Mizpa any Gileada, dia nandroso nankany amin'ny taranak'i Amona.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jefta nandositra ny rahalahiny ka nonina tany amin''ny tany Toba; dia nisy olom-poana nivory teo amin''i Jefta ka niaraka taminy. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jefta nivoady tamin''i Jehovah ka nanao hoe: Raha hatolotrao eo an-tanako tokoa ny taranak''i Amona, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: dia ho an'i Jehovah Izay mivoaka amin'ny varavaran'ny tranoko hitsena ahy, rehefa miverina soa aman-tsara avy any amin'ny taranak'i Amona aho, ary hateriko ho fanatitra dorana izany.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandeha Jefta nankany amin''ny taranak''i Amona hiady aminy: ary natolotr''i Jehovah teo an-tànany ireo. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namely azy izy hatrany Aroera ka hatrany akaikin''i Minita sy hatrany Abela-keramima, dia tanàna roa-polo, ka be dia be no maty. Dia resy teo anoloan''ny Zanak''Isiraely ny taranak''i Amona. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jefta tonga tany Mizpa ho any an-tranony, ary, indro, nivoaka ny zananivavy nitondra ampongatapaka sy mpandihy hitsena azy; ary vavy tokany io, fa tsy nanana zanakalahy na zanakavavy afa-tsy io izy. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa rehefa nahita azy Jefta, dia nandriatra ny fitafiany ka nanao hoe: Indrisy, ry zanako-vavy! Efa nampitanondrika ahy indrindra ianao, ary ianao no tonga nampidi-doza tamiko; fa izaho efa niloa-bava tamin''i Jehovah, ka tsy azoko afody intsony. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy ny zananivavy taminy: Ry dada ô, raha niloa-bava tamin''i Jehovah ary ianao, dia ataovy amiko araka izay naloaky ny vavanao, satria Jehovah efa namaly ny taranak''i Amona fahavalonao ho anao. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy koa izy tamin''ny rainy: Aoka izao no hatao amiko: aza maninona ahy aloha hatramin''ny roa volana mba handehandehanako hankeny amin''ny havoana hitomaniako, izaho sy ny namako, noho izaho mbola tsy nanambady akory. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy kosa rainy: Mandehana ary. Dia nampandeha azy roa volana izy; ary dia nandeha razazavavy sy ny namany ka nitomany teny amin''ny havoana noho izy mbola tsy nanam-bady akory. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa tapitra ny roa volana, dia niverina tany amin''ny rainy izy; ary nataony taminy araka ny voadiny izay nataony; ary tsy mbola nahalala lahy izy. Ary tonga fanao tamin''ny Isiraely '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony ela, dia nanafika ny Zanak''Isiraely ny taranak''i Amona. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ny fandehanan'ny zazavavin'ny Isiraely isan-taona hankalaza
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: hitomany'
      marker-yv: yv-n
    - type: text
      text: ' ny zanakavavin''i Jefta Gileadita hefarana isan-taona.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa nanafika ny Isiraely ny taranak''i Amona, dia nandeha ny loholon''i Gileada haka an''i Jefta hiala any amin''ny tany Toba. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy ireo taminy: Avia ho mpitarika anay ianao, hiadiantsika amin''ny taranak''i Amona. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa hoy Jefta tamin''ny loholon''i Gileada: Tsy efa nankahala ahy va ianareo ka nandroaka ahy hiala tao an-tranon''ny raiko? Koa nahoana no mankaty amiko indray ianareo ankehitriny, nony azom-pahoriana? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy ny loholon''i Gileada tamin''i Jefta: Izany no iverenanay atỳ aminao ankehitriny, mba handehananao miaraka aminay, sy hiadianao amin''ny taranak''i Amona, ka dia ho lohany aminay mponina rehetra any Gileada ianao. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jefta tamin''ny loholon''i Gileada: Raha ho entinareo mody indray aho mba hiady amin''ny taranak''i Amona, ka hatolotr''i Jehovah eo anoloako ireny, dia izaho hoe no ho lohany aminareo? '
