document_id: JOS.14,96
type_code: plt
verses:
  '1':
  - type: heading
    content: 'Ny nanombohan''i Josoa ny nizarany ny tany: ny anjaran''i Kaleba'
  - type: text
    content: 'Ary izao no nolovan''ny Zanak''Isiraely teo amin''ny tany Kanana, izay nampandovain''i Eleazara mpisorona sy Josoa, zanak''i Nona, ary ny loholon''ny firenen''i Zanak''Isiraely; '
  '10':
  - type: text
    content: 'Ary ankehitriny indro, efa namelona ahy Jehovah, araka izay nolazainy hatramin''ny dimy amby efa-polo taona lasa izay, dia hatramin''ny nilazan''i Jehovah izany teny izany tamin''i Mosesy no ho mankaty, raha mbola nandehandeha tany an-efitra ny Isiraely; ary ankehitriny, indro, efa dimy amby valo-polo taona aho izao. '
  '11':
  - type: text
    content: 'Nefa mbola matanjaka ihany aho izao tahaka ny tamin''ny andro nanirahan''i Mosesy ahy: tahaka ny tanjako tamin''izany ihany no mbola tanjako ankehitriny mba hiady, na hivoaka, na hiditra.Jos 14: '
  '12':
  - type: text
    content: 'Ary ankehitriny omeo ahy iry tendrombohitra iry, izay nolazain''i Jehovah tamin''izany andro izany; fa efa renao tamin''izany andro izany fa nitoetra teo ny Anakita, sady nisy tanàna lehibe mimanda; angamba homba ahy Jehovah, dia haharoaka azy aho, araka izay nolazain''i Jehovah. '
  '13':
  - type: text
    content: 'Dia nitso-drano azy Josoa ka nanome an''i Hebrona ho lovan''i Kaleba, zanak''i Jefone. '
  '14':
  - type: text
    content: 'Izany no nahatongavan''i Hebrona ho lovan''i Kaleba, zanak''i Jefone, Kenizita, mandraka androany satria tanteraka tamin''ny fanarahana an''i Jehovah, Andriamanitry ny Isiraely, izy. '
  '15':
  - type: text
    content: Ary tanànan'Arba
  - type: note
    content: 'Na: Kiriat-arba; izahao Jos. xv. 54'
  - type: text
    content: ' no anaran''i Hebrona taloha; ilay lehilahy vaventy tamin''ny Anakita izany Arba izany. Dia nandry ny tany ka tsy nisy ady intsony.'
  '2':
  - type: text
    content: 'tamin''ny filokana no nahazoany ny lovany, araka izay efa nandidian i Jehovah an''i Mosesy ny amin''ny firenena sivy sy sasany. '
  '3':
  - type: text
    content: 'Fa efa nomen''i Mosesy lova tany an-dafin''i Jordana ny firenena roa sy sasany; fa ny taranak''i Levy tsy mba nomeny lova teo aminy. '
  '4':
  - type: text
    content: 'Fa firenena roa ny taranak''i Josefa, dia Manase sy Efraima; ary tsy mba nomeny anjara teo amin''ny tany ny taranak''i Levy, afa-tsy ny tanàna honenany sy ny tany manodidina ny tanànany ho an''ny omby aman''ondriny sy ny fananany. '
  '5':
  - type: text
    content: Araka izay efa nandidian'i Jehovah an'i Mosesy no nataon'ny Zanak'Isiraely, ka dia nizara ny tany izy.
  '6':
  - type: text
    content: 'Dia nankany amin''i Josoa tany Gilgala ny taranak''i Joda; ary Kaleba, zanak''i Jefone, Kenizita, nanao taminy hoe: Fantatrao ny teny izay nolazain''i Jehovah tamin''i Mosesy, lehilahin''Andriamanitra, ny amiko sy ianao tany Kadesi-barnea. '
  '7':
  - type: text
    content: 'Efa-polo taona no andro niainako, fony aho nirahin''i Mosesy, mpanompon''i Jehovah, niala tany Kadesi-barnea hisafo ny tany; dia niverina aho nitondra teny taminy araka izay tao am-poko. '
  '8':
  - type: text
    content: 'Kanefa ireo rahalahiko izay niara-niakatra tamiko dia nanaketraka ny fon''ny olona; fa izaho kosa dia tanteraka tamin''ny fanarahana an''i Jehovah Andriamanitrao. '
  '9':
  - type: text
    content: 'Dia nianiana tamin''izany andro izany Mosesy ka nanao hoe: Ny tany izay nodiavin''ny tongotrao dia ho lovanao sy ny taranakao tokoa mandrakizay, satria tanteraka tamin''ny fanarahana an''i Jehovah Andriamanitro ianao. '
