document_id: PSA.150
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Haleloia farany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Haleloia. Miderà an''Andriamanitra eo amin''ny fitoerany masina. Miderà Azy eo amin''ny habakabaky ny heriny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Midera Azy noho ny asany lehibe; Miderà Azy araka ny haben''ny voninahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Miderà Azy amin''ny fitsofana ny anjomara; Miderà Azy amin''ny valiha sy ny lokanga. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Miderà Azy amin''ny ampongatapaka sy ny dihy; Miderà Azy amin''ny zava-maneno tendrena sy ny sodina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Miderà Azy amin''ny kipantsona maneno; Miderà Azy amin''ny kipantsona tsara feo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Aoka izay rehetra manam-pofonaina samy hidera an'i Jehovah. Haleloia.
