document_id: PSA.150,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Haleloia farany
  - type: text
    content: 'Haleloia. Miderà an''Andriamanitra eo amin''ny fitoerany masina. Miderà Azy eo amin''ny habakabaky ny heriny. '
  '2':
  - type: text
    content: 'Midera Azy noho ny asany lehibe; Miderà Azy araka ny haben''ny voninahiny. '
  '3':
  - type: text
    content: 'Miderà Azy amin''ny fitsofana ny anjomara; Miderà Azy amin''ny valiha sy ny lokanga. '
  '4':
  - type: text
    content: 'Miderà Azy amin''ny ampongatapaka sy ny dihy; Miderà Azy amin''ny zava-maneno tendrena sy ny sodina. '
  '5':
  - type: text
    content: 'Miderà Azy amin''ny kipantsona maneno; Miderà Azy amin''ny kipantsona tsara feo. '
  '6':
  - type: text
    content: Aoka izay rehetra manam-pofonaina samy hidera an'i Jehovah. Haleloia.
