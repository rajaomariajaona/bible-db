document_id: LEV.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fanatitra noho ny ota
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mitenena amin''ny Zanak''Isiraely hoe: Raha misy olona manota tsy nahy ny didin''i Jehovah amin''izay tsy tokony hatao ka mandika ny anankiray amin''ireny: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'raha ny mpisorona voahosotra no manota ka mahameloka ny olona, dia aoka hanatitra vantotr''ombilahy tsy misy kilema izy noho ny fahotany izay nataony, dia fanatitra noho ny ota ho an''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hitondra ny vantotr''ombilahy ho eo anoloan''ny varavaran''ny trano-lay fihaonana izy ho eo anatrehan''i Jehovah; ary hametraka ny tànany amin''ny lohan''ny vantotr''ombilahy izy ka hamono azy eo anatrehan''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hangalan''ny mpisorona voahosotra ny ran''ny vantotr''ombilahy ka ho entiny ho ao amin''ny trano-lay fihaonana; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary ny mpisorona hanoboka ny fanondrony eo amin''ny rà, ka hafafiny impito eo anatrehan''i Jehovah, eo anoloan''ny efitra lamba ao amin''ny fitoerana masina; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ary hotentenan''ny mpisorona rà ny tandroky ny alitara fandoroana ditin-kazo manitra eo anatrehan''i Jehovah, izay ao amin''ny trano-lay fihaonana; ary ny rà sisa rehetra avy amin''ny vantotr''ombilahy dia haidiny eo am-bodin''ny alitara fandoroana ny fanatitra dorana, izay eo anoloan''ny varavaran''ny trano-lay fihaonana. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary halainy avokoa ny saborany rehetra amin''ny vantotr''ombilahy izay atao fanatitra noho ny ota, dia ny safodrorohany sy ny saboran-tsinainy, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'ary ny voany roa mbamin''ny fonom-boany, izay eo amin''ny takibany, sy ny ila-atiny lehibe;''hataony indray manala amin''ny voany no fanaisony izany, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'tahaka ny fanalana azy amin''ny omby izay atao fanati-pihavanana; ary ny mpisorona handoro azy ho fofona eo ambonin''ny alitara fandoroana ny fanatitra dorana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa ny hoditry ny vantotr''ombilahy sy ny henany rehetra mbamin''ny lohany sy ny tongony ary ny taovany sy ny tain-drorohany, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'dia ny tenan''ny vantotr''ombilahy rehetra, no havoakany avokoa ho eny ivelan''ny toby ho amin''izay fitoerana madio fanariana ny lavenona; ary handoro azy eo ambonin''ny kitay amin''ny afo izy; eo amin''ny fanariana ny lavenona no handoroana azy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary raha ny fiangonana, dia ny Isiraely rehetra, kosa no manota tsy nahy, fa misy tsy hitan''ny mason''ny fiangonana, ary mandika ny anankiray amin''ny didin''i Jehovah amin''izay tsy tokony hatao izy ka meloka, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'rehefa fantatra ny ota izay nataony, dia hanatitra vantotr''ombilahy ny fiangonana ho fanatitra noho ny ota ka hitondra azy ho eo anoloan''ny trano-lay fihaonana. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ny loholon''ny fiangonana hametraka ny tànany amin''ny lohan''ny vantotr''ombilahy eo anatrehan''i Jehovah; ary ny vantotr''ombilahy dia hovonoina eo anatrehan''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hangalan''ny mpisorona voahosotra ny ran''ny vantotr''ombilahy ka ho entiny ho ao amin''ny trano-lay fihaonana, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ary ny mpisorona hanoboka ny fanondrony amin''ny rà, ka hafafiny impito eo anatrehan''i Jehovah, dia eo anoloan''ny efitra lamba. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hangalany koa ny rà ka hatentiny eo amin''ny tandroky ny alitara izay eo anatrehan''i Jehovah, dia ilay ao anatin''ny trano-lay fihaonana, ary ny rà sisa rehetra dia haidiny eo ambodin''ny alitara fandoroana ny fanatitra dorana, izay eo am-baravaran''ny trano-lay fihaonana. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia hanaisotra ny saborany rehetra izy ka handoro azy ho fofona eo ambonin''ny alitara. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ny vantotr''ombilahy dia hataony tahaka ny efa nataony tamin''ny vantotr''ombilahy izay natao fanatitra noho ny ota, toy izany no hanaovany azy; ary ny mpisorona hanao fanavotana ho an''ny olona, dia havela ny helony. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary ny vantotr'ombilahy dia havoakany ho eny ivelan'ny toby ka hodorany tahaka ny efa nandoroany ny vantotr'ombilahy voalohany; dia fanatitra noho ny ota ho an'ny fiangonana izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary raha misy mpanapaka manota tsy nahy ka mandika ny anankiray amin''ny didin''i Jehovah Andriamaniny amin''izay tsy tokony hatao ka meloka, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ary misy mampahafantatra azy ny fahotany izay nataony, dia hitondra osilahy tsy misy kilema ho fanatiny izy; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ary hametraka ny tànany amin''ny lohan''ny osilahy izy, dia hamono azy eo amin''ny famenoana ny fanatitra dorana eo anatrehan''i Jehovah; dia fanatitra noho ny ota izany. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hangalan''ny mpisorona amin''ny fanondrony ny ran''ny fanatitra noho ny ota ka hatentiny eo amin''ny tandroky ny alitara fandoroana ny fanatitra dorana, ary ny rà sisa dia haidiny eo am-bodin''ny alitara fandoroana ny fanatitra dorana; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ary ny saborany rehetra dia hodorany ho fofona eo ambonin''ny alitara, tahaka ny saboran''ny fanati-pihavanana ary ny mpisorona hanao fanavotana ho azy noho ny fahotany, dia havela ny helony. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary raha misy amin''ny vahoaka manota tsy nahy ka mandika ny anankiray amin''ny didin''i Jehovah amin''izay tsy tokony hatao ka meloka, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'ary misy mampahafantatra azy ny fahotany izay nataony, dia hitondra osivavy tsy misy kilema ho fanatiny izy noho''ny fahotany izay nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary hametraka ny tànany amin''ny lohan''ny fanatitra noho ny ota izy, dia hamono azy eo amin''ny fitoeran''ny fanatitra dorana. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary hangalan''ny mpisorona amin''ny fanondrony ny rà ka hatentiny eo amin''ny tandroky ny alitara fandoroana ny fanatitra dorana, ary ny rà sisa rehetra dia haidiny eo am-bodin''ny alitara. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary hesoriny avokoa ny saborany rehetra, tahaka ny fanesorana ny saboran''ny fanati-pihavanana; ary ny mpisorona handoro azy ho fofona eo ambonin''ny alitara ho hanitra ankasitrahana ho an''i Jehovah; ary ny mpisorona hanao fanavotana ho azy, dia havela ny helony. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary raha zanak''ondry no entiny ho fanatitra noho ny ota, dia ny vavy tsy misy kilema no ho entiny; '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'ary hametraka ny tànany amin''ny lohan''ny fanatitra noho ny ota izy, dia hamono azy ho fanatitra noho ny ota eo amin''ny famonoana ny fanatitra dorana. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary hangalan''ny mpisorona amin''ny fanondrony ny ran''ny fanatitra noho ny ota ka hatentiny eo amin''ny tandroky ny alitara fandoroana ny fanatitra dorana, ary ny rà sisa rehetra dia haidiny eo am-bodin''ny alitara. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ary hesoriny avokoa ny saborany rehetra, tahaka ny fanesorana ny saboran'ny zanak'ondry izay natao fanati-pihavanana, ary ny mpisorona handoro azy ho fofona eo ambonin'ny alitara, ambonin'ny fanatitra atao amin'ny afo ho an'i Jehovah; ary ny mpisorona hanao fanavotana ho azy noho ny fahotany izay nataony, dia havela ny helony.
