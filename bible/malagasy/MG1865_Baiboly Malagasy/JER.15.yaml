document_id: JER.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitarainan'i Jeremia tamin'Andriamanitra, sy ny teny fampiononana navaliny azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hoy Jehovah tamiko: Na dia Mosesy sy Samoela aza no mitsangana eto anatrehako, dia tsy hankasitraka ity firenena ity ny fanahiko; roahy tsy ho eo anatrehako izy, eny, aoka hiala izy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary raha tàhiny izy manao aminao hoe: Hiala hankaiza izahay? dia ataovy aminy hoe: Izao no lazain''i Jehovah: Izay ho amin''ny areti-mandringana'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. fahafatesana
    marker-yv: yv-n
  - type: text
    text: ' dia ho amin''ny areti-mandringana, ary izay ho amin''ny sabatra dia ho amin''ny sabatra, ary izay ho amin''ny mosary dia ho amin''ny mosary, ary izay ho amin''ny fahababoana dia ho amin''ny fahababoana. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary manendry zavatra efatra karazana Aho hamelezana azy, hoy Jehovah: Dia ny sabatra hamono sy ny amboa hamiravira ary ny voro-manidina sy ny bibi-dia hihinana sy handany; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary manolotra azy ho mpanjenjena any amin'ny fanjakana rehetra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ho fampangovitana ny fanjakana rehetra'
    marker-yv: yv-n
  - type: text
    text: ' amin''ny tany Aho noho ny amin''i Manase, zanak''i Hezekia, mpanjakan''ny Joda, dia noho izay nataony tany Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa iza no hangoraka anao, ry Jerosalema? Ary iza no hitsapa alahelo anao? Ary iza no hivily hanantsafa anao? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hianao efa nahafoy Ahy sady efa nihemotra, hoy Jehovah, ka dia ahinjitro kosa ny tanako hamely anao, ka efa mandringana anao Aho, fa efa sasatra ny mandefitra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. manenina
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary kororohiko amin''ny fikororohana izy ho any amin''ny vava-tany; Ary foanako anaka ny oloko, eny, aringako izy tsy mety miala amin''ny fanaony mba hiverina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny mpitondratenany mihamaro eo imasoko mihoatra noho ny fasika any an-dranomasina; Mitondra mpandringana ho ao aminy Aho handripaka ny renin''ny zatovo, na dia mitataovovonana aza ny andro; Ataoko tonga tampoka aminy ny fanaintainana sy ny tahotra. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay niteraka fito dia mihaosa, miala aina izy, milentika mbola antoandro ny masoandrony, menarina sy mangaihay izy; Ary izay sisa aminy dia hatolotro ho voan'ny sabatra eo anoloan'ny fahavalony, hoy Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Lozako, ry neny, ny niterahanao ahy, Izay lehilahy ilana ady sy fifandirana eny amin''ny tany rehetra! Tsy nampanàna vola aho, ary tsy nisy nanàna vola tamiko, nefa ozonin''ny olona rehetra ihany aho. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hoy Jehovah: Nahafaka anao Aho hahasoa anao'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny hahasoa anao ihany no nisehoako ho fahavalonao'
    marker-yv: yv-n
  - type: text
    text: '; Hataoko tonga mifona aminao tokoa ny fahavalo amin''ny andro ahitan-doza sy amin''izay andro mahory. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mety tapaka va ny vy, dia ny vy avy any avaratra, na ny varahina? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny fanananao sy ny rakitrao ao anatin''ny fari-taninao rehetra dia hatolotro ho babo maimaimpoana noho ny fahotana rehetra izay nataonao; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary hampitondraiko ny fahavalonao ho any amin'ny tany tsy fantatrao izany; Fa arehitra ny afon'ny fahatezerako
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Fa misy afo arehitra amin'ny fahatezerako
    marker-yv: yv-n
  - type: text
    text: ', ka handoro anareo no irehetany. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hianao no mahalala, Jehovah ô; Tsarovy aho, ka vangio, ary valio izay manenjika ahy; Aza dia mandefitra aminy Hianao, fandrao ho afaka ny aiko; Aoka ho fantatrao fa noho ny aminao no nitondrako latsa. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hitako ny teninao ka nohaniko, ary ny teninao no fifaliako sy firavoravoan''ny foko; Fa nantsoina tamin''ny anaranao aho, Jehovah, Andriamanitry ny maro ô. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Izaho tsy nipetraka na nifaly teo amin''ny fivorian''ny mpikorana, nitoetra irery aho noho ny fihazonan''ny tananao ahy, fa nofenoinao fahatezerana aho. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nahoana re no dia tsy mety mitsahatra ny faharariako, ary fatratra ny feriko ka tsy mety sitrana? Ho tonga amiko tahaka ny rano-trambo va Hianao, dia rano tsy azo itokiana? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koa izao no lazain''i Jehovah: Raha hiverina ianao, dia horaisiko indray'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hampivereniko
    marker-yv: yv-n
  - type: text
    text: ', ka dia hitsangana eo anatrehako ianao; Ary raha manavaka ny zava-tsoa hiala amin''ny zava-poana ianao, dia ho solom-bavako; Hanatona anao indray ireny; Fa tsy ianao no hanatona azy, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hataoko manda varahina mirova ho amin''ity firenena ity ianao: Hiady aminao izy, nefa tsy hahaleo anao; Fa momba anao hamonjy sy hanafaka anao Aho, hoy Jehovah; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary hanafaka anao amin'ny tanan'ny ity ratsy fanahy Aho sy hanavotra anao amin'ny tanan'ny mpampahory.
