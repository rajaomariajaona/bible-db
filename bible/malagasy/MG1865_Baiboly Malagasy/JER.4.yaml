document_id: JER.4
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hanjo ny Joda sy Jerosalema, raha tsy mibebaka izy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Raha hiverina ianao, ry Isiraely, hoy Jehovah, dia ho amiko no hiverenanao, ary raha hanaisotra ny fahavetavetanao tsy ho eo imasoko ianao, dia tsy hivezivezy foana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa hianiana amin''ny hitsiny sy ny rariny ary ny fahamarinana hoe: Raha velona koa Jehovah, dia Izy no holazain''ny firenena ho fahasambarany, ary Izy no ho reharehany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa izao no lazain''i Jehovah amin''ny Joda sy Jerosalema: Hevoy ny tombamborakareo'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Miasà tany vaovao ho anareo'
    marker-yv: yv-n
  - type: text
    text: ', fa aza mamafy amin''ny tsilo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Miforà ho an'i Jehovah ianareo, eny, forao ny fonareo, ry Joda sy ry mponina any Jerosalema! Fandrao hiseho toy ny afo ny fahatezerako noho ny faharatsian'ny ataonareo ka hirehitra, sady tsy hisy hamono azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ambaraonareo ao amin''ny Joda, ary torio ao Jerosalema, ka ataovy hoe: Tsofy ao amin''ny tany ny anjomara; Miantsoantsoa mafy, ka ataovy hoe: Mivoria ianareo, ka andeha isika hiditra amin''ny tanàna mimanda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Manangàna faneva manandrify an''i Ziona; Mandosira faingana, aza mijanona; Fa Izaho hahatonga loza sy fandringanana be avy any avaratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Misy liona miakatra avy any anaty kirihitrala, ary ilay mpanimba ny firenena dia efa miainga, efa mivoaka avy amin''ny fitoerany hahafoana ny taninao, ary hahalao ny tanànanao, ka tsy hisy mponina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary noho izany dia misikìna lamba fisaonana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb; lamba malailay
    marker-yv: yv-n
  - type: text
    text: ' ianareo, ka mitomania sy midradradradrà; Fa ny firehetan''ny fahatezeran''i Jehovah tsy afaka amintsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary amin'izany andro izany, hoy Jehovah, dia ho very hevitra ny mpanjaka sy ny lehibe, ary ho kepoka ny mpisorona, sy ho gaga ny mpaminany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy izaho: Indrisy, Jehovah Tompo ô! Efa nofitahinao tokoa ity firenena ity sy Jerosalema tamin''ny nanaovanao hoe: Hisy fiadanana ho anareo; Kanjo mihatra amin''ny aina ny sabatra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Amin''izany andro izany dia holazaina amin''ity firenena ity sy Jerosalema hoe: Hisy rivo-mahamay avy any an-tendrombohitra mangadihady any an-efitra hankamin''ny oloko zanakavavy'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ny lalàn''ny oloko zanakavavy dia rivotra mahamay, etc'
    marker-yv: yv-n
  - type: text
    text: ', kanefa tsy hikororohana na hanadiovana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dia ho tonga avy amiko izay rivotra mahery noho ireny
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Dia ho tonga etỳ amiko ny rivotra mahery izay avy amin''ireny'
    marker-yv: yv-n
  - type: text
    text: '; Ary ankehitriny Izaho kosa hifandahatra aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Indro, avy toy ny rahona izy, Ary tahaka ny tadio ny kalesiny, faingana noho ny voromahery ny soavaliny; Lozantsika! fa lany ringana isika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ry Jerosalema, sasao ny fonao ho afaka amin''ny ratsy, mba hovonjena ianao! Mandra-pahoviana no hitoeran''ny hevi-dratsinao ao am-ponao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa injany! misy feo manambara avy any Dana sy filazam-pahoriana avy amin''ny tany havoan''i Efraima, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lazaonareo amin''ny firenena, torio amin''i Jerosalema hoe: Misy mpanao fahirano avy any an-tany lavitra ka manakora hamely ny tanànan''ny Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Manodidina azy ireo toy ny fanaon''ny mpiandry saha, fa efa niodina tamiko izy, hoy Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny alehanao sy ny asanao no nahatonga izany taminao; Izany no faharatsianao, eny, mangidy izany sady mihatra amin'ny ainao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Endrey ny kiboko! Endrey izany kiboko! Manaintaina aho; Endrey! mila ho triatra izany ny foko
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Endrey ny rindrin'ny foko!
    marker-yv: yv-n
  - type: text
    text: '! Mitoloko ny foko, ka tsy mahay mangina aho; Fa ny feon''anjomara sy ny akoran''ady dia renao, ry fanahiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fandravana mifanontona no ambara, rava ny tany rehetra; Rava tampoka ny laiko, eny, rava indray mipi-maso monja ny ambain-daiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mandra-pahoviana re no mbola hijereko ny faneva sy handrenesako ny feon'anjomara?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa adala ny oloko, Izaho tsy mba fantany; Zaza tsy misy saina izy sady tsy manam-pahalalana; Raha ny hanao ratsy, dia hendry izy; Fa ny hanao soa kosa tsy fantany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Nojereko ny tany, ka, indro, tsy nisy endrika izy sady foana, ary ny lanitra koa, ka, indro, tsy nanam-pahazavana izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Nojereko ny tendrombohitra, ka, indro, nihorohoro izy, ary ny havoana rehetra nihozongozona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Nojereko, ka, indro, tsy nisy olona, ary ny voro-manidina rehetra efa nandositra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Nojereko, ka, indro, ny saha mahavokatra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: karmela'
    marker-yv: yv-n
  - type: text
    text: ' aza efa tonga efitra, ary ny tanànany rehetra dia rava teo anatrehan''i Jehovah, dia teo anoloan''ny firehetan''ny fahatezerany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa izao no lazain''i Jehovah: Ho lao ny tany rehetra, nefa tsy dia holevoniko avokoa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Noho izany dia hisaona ny tany, ary ho tonga mainty ny lanitra ambony, satria efa niteny izany Aho, sady efa nikasa izany ka tsy hanenina na hanatsoaka izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Noho ny fihorakoraky ny mpitaingin-tsoavaly sy ny mpandefa tsipìka dia efa mandositra avokoa ny tanàna rehetra; Mitsofoka any anatin'ny kirihitrala
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. rahona
    marker-yv: yv-n
  - type: text
    text: ' sy mananika ny vatolampy izy; Lao avokoa ny tanàna rehetra, ka tsy misy mponina intsony ao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary hanao ahoana ianao, ry ilay rava? Na dia miakanjo jaky aza ianao, na dia miravaka volamena aza ianao, na dia hosoranao loko mainty aza ny masonao, foana ny itadiavanao hahatsara tarehy anao; Hanifika anao ireo lehilahy tia anao, ka ny ainao aza no hotadiaviny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa efa nandre feo Aho tahaka ny vehivavy raha miteraka sy fidridridridriana tahaka ny vehivavy izay vao miteraka ny matoany, dia ny feon''i Ziona zanakavavy, izay misefosefo sady mamelatra ny tànany ka manao hoe: Lozako! Fa reraka ny aiko azon''ireo mpamono olona.'
