document_id: 2CH.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny niodinan'ny firenena folo tsy hanaiky an-dRehoboama
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Rehoboama nankany Sekema, fa tany no efa nalehan''ny Isiraely rehetra hampanjaka azy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Koa raha nandre izany Jeroboama, zanak''i Nebata, izay efa nandositra nankany Egypta niala teo anatrehan''i Solomona mpanjaka, dia niverina avy tany Egypta izy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary naniraka naka azy ny olona. Dia tonga Jeroboama sy ny Isiraely rehetra ka niteny tamin-dRehoboama hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Rainao dia nampitondra zioga mavesatra anay; fa inty kosa mby aminao ka mba hamaivano ny fanompoana mafy tamin-drainao sy ny zioga mavesatra izay nataony taminay, dia hanompo anao izahay. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa hoy kosa izy taminy: Rehefa afaka hateloana, dia mankanesa atỳ amiko indray. Dia lasa ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Rehoboama mpanjaka naka saina tamin''ny zoki-olona izay nitoetra teo anatrehan''i Solomona rainy fony fahavelony ka nanao hoe: Ahoana no hevitra omenareo havaly ny vahoaka? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia hoy ireo taminy: Raha ho mora amin''ny vahoaka ianao ka hankasitraka azy sy hanao teny mora aminy, dia ho mpanomponao mandrakizay izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nefa nolavin-dRehoboama ny saina nomen''ireo zoki-olona azy, dia naka hevitra tamin''ny tovolahy izay indray nihira taminy sady efa nitoetra teo anatrehany izy ka nanao taminy hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ahoana kosa no mba hevitra omenareo havalintsika ny vahoaka izay niteny tamiko hoe: Hamaivano ny zioga izay nataon-drainao taminay ? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ireo tovolahy indray nihira taminy nanao taminy hoe: Izao no lazao amin''ny vahoaka izay niteny taminao hoe: Rainao nampitondra zioga mavesatra anay; fa inty kosa mby aminao, ka mba hamaivano aminay izany, izao no lazao aminy. Ny ankihikeliko dia lehibe noho ny valahan''ny raiko; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'koa raha nampitondra zioga mavesatra anareo ny raiko, izaho kosa dia mainka hanampy ny zioga ho entinareo; kotopia no namaizan''ny raiko anareo, fa maingoka fikapohana kosa no hamaizako anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Jeroboama sy ny vahoaka rehetra dia nankany amin-dRehoboama tamin''ny andro fahatelo, araka ilay nolazain''ny mpanjaka hoe: Mankanesa atỳ amiko indray amin''ny andro fahatelo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary Rehoboama mpanjaka nanao teny mafy tamin''ny olona, fa nandà ny hevitra nomen''ireo zoki-olona azy '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ka niteny taminy araka ny hevitra nomen''ireo tovolahy hoe: Nampitondra zioga mavesatra anareo ny raiko, fa izaho kosa mainka hanampy izany; kotopia no namaizan''ny raiko anareo, fa maingoka fikapohana kosa hamaizako anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ka dia tsy nihaino ny olona ny mpanjaka, fa avy tamin''Andriamanitra izany zavatra izany hahatanteraka ny teniny izay nampilazainy an''i Ahia Silonita tamin''i Jeroboama,zanak''i Nebata. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nony hitan''ny Isiraely rehetra fa tsy nihaino azy ny mpanjaka, dia namaly ny mpanjaka ny vahoaka ka nanao hoe: Inona moa no anjaranay amin''i Davida ? Tsy manana lova amin''ny zanak''i Jese izahay. Samia mody any an-dainy avy, ry Isiraely e! ankehitriny tandremo ny taranakao, ry Davida ô. Dia samy nody ho any an-dainy avy ny Isiraely rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa ny Zanak''isiraely izay nonina tany an-tanànan''ny Joda ihany no nanjakan-dRehoboama. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary dia naniraka an''i Adorama, komandin''ny mpanao fanompoana, Rehoboama mpanjaka, nefa ny Zanak''isiraely nitora-bato azy, ka maty izy. Dia niezaka faingana nankeo amin''ny kalesiny Rehoboama mpanjaka handositra ho any Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ka dia niodina tamin'ny taranak'i Davida ny Isiraely mandraka androany.
