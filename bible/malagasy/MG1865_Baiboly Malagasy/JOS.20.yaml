document_id: JOS.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nifidianana ny tanàna fandosirana ho an'izay nahafaty olona tsy nahy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Josoa ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lazao amin''ny Zanak''Isiraely hoe: Fidio ny tanàna fandosirana izay nasaiko nolazain''i Mosesy taminareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'handosiran''izay nahafaty olona tsy nahy; dia ho fandosirana ho anareo izany mba tsy ho azon''ny mpamaly rà '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary raha misy mandositra ho ao amin''ny anankiray amin''ireo tanàna ireo ka mijanona eo anoloan''ny vavahady ary mandahatra ny teniny eo anatrehan''ny loholona amin''izany tanàna izany, dia hampidiriny ho ao an-tanàna izy ka homeny toerana, mba hitoetra ao aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary raha manenjika azy ny mpamaly rà, dia tsy hanolotra ilay nahafaty olona ho eo an-tànany izy, satria nahafaty tsy nahy ny namany, fa tsy dia nankahala azy teo aloha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hitoetra ao amin''izany tanàna izany izy mandra-pisehony eo anatrehan''ny fiangonana hotsaraina, sy mandra-pahafatin''izay mpisoronabe amin''izany andro izany; dia hiverina ilay nahafaty olona ka hody any an-tanànany sy any an-tranony, dia any amin''ny tanàna izay nialany fony izy nandositra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nanokana an''i Kadesy any Galilia any amin''ny tany havoan''i Naftaly izy sy Sekema any amin''ny tany havoan''i Efraima ary Kiriat-arba (Hebrona izany) any amin''ny tany havoan''i Joda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary dia nifidy an''i Bezera any an-efitra amin''ny tany lemaka izay an''ny firenen''i Robena izy, ary Ramota izay any Gileada, an''ny firenen''i Gada, ary Golana any Basana, izay an''ny firenen''i Manase, any an-dafy atsinanan''i Jordana, tandrifin''i Jeriko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ireo no tanàna voafidy ho an'ny Zanak'Isiraely rehetra sy ny vahiny eo aminy handosiran'izay rehetra nahafaty olona tsy nahy, mba tsy ho fatin'ny tanan'ny mpamaly rà izy mandra-pisehony eo anatrehan'ny fiangonana.
