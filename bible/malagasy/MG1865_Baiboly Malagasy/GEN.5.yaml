document_id: GEN.5,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny taranak'i Adama tamin'i Seta ka hatramin'i Noa
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ity no boky milaza ny taranak''i Adama: Tamin''ny andro namoronan''Andriamanitra ny olona dia tahaka ny tarehin''Andriamanitra no nanaovany azy; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary ny andro niainan''i Enosy taorian''ny niterahany an''i Kenana dia dimy ambin''ny folo amby valon-jato taona; ary niteraka zazalahy sy zazavavy izy; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ary ny andro rehetra niainan'i Enosy dia dimy amby sivin-jato taona; dia maty izy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary rehefa fito-polo taona ny andro niainan''i Kenana, dia niteraka an''i Mahalalila izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary ny andro niainan''i Kenana taorian''ny niterahany an''i Mahalalila dia efa-polo amby valon-jato taona; ary niteraka zazalahy sy zazavavy izy. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ary ny andro rehetra niainan'i Kenana dia folo amby sivin-jato taona; dia maty izy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary rehefa dimy amby enim-polo taona ny andro niainan''i Mahalalila, dia niteraka an''i Jareda izy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary ny andro niainan''i Mahalalila taorian''ny niterahany an''i Jareda dia telo-polo amby valon-jato taona; ary niteraka zazalahy sy zazavavy izy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ary ny andro rehetra niainan'i Mahalalila dia dimy amby sivi-folo amby valon-jato taona; dia maty izy.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary rehefa roa amby enim-polo amby zato taona ny andro niainan''i Jareda dia niteraka an''1 Enoka izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary ny andro niainan''i Jareda taorian''ny niterahany niterahany an''i Enoka dia valon-jato taona; ary niteraka zazalahy sy zazavavy izy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'lahy sy vavy no namoronany azy; dia nitahy azy Izy ka nanao ny anarany hoe Adama tamin''ny andro namoronany azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary ny andro rehetra niainan''i Jareda dia roa amby enim-polo amby sivin-jato taona; dia maty izy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary rehefa dimy amby enim-polo taona ny andro niainan''i Enoka, dia niteraka an''i Metosela izy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary niara-nandeha tamin''Andriamanitra telon-jato taona Enoka taorian''ny niterahany an''i Metosela; ary niteraka zazalahy sy zazavavy izy. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ary ny andro rehetra niainan''i Enoka dia dimy amby enim-polo amby telon-jato taona. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ary niara-nandeha tamin'Andriamanitra Enoka; ka tsy hita izy, fa nentin'Andriamanitra.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary rehefa fito amby valo-polo amby zato taona ny andro niainan''i Metosela, dia niteraka an''i Lameka izy. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary ny andro niainan''i Metosela taorian''ny niterahany an''i Lameka dia roa amby valo-polo amby fiton-jato taona; ary niteraka zazalahy sy zazavavy izy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ary ny andro rehetra niainan'i Metosela dia sivy amby enim-polo amby sivin-jato taona; dia maty izy.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary rehefa roa amby valo-polo amby zato taona ny andro niainan''i Lameka, dia niteraka zazalahy izy; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'ary ny anarany nataony hoe Noa, fa hoy izy: Ity no hampionona antsika amin''ny asantsika sy ny fisasaran''ny tanantsika noho ny tany izay voaozon''i Jehovah. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary rehefa telo-polo amby zato taona ny andro niainan''i Adama, dia niteraka tahaka ny tarehiny, araka ny endriny izy; ary ny anarany nataony hoe Seta. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary ny andro niainan''i Lameka taorian''ny niterahany an''i Noa dia dimy amby sivi-folo amby diman-jato taona; ary niteraka zazalahy sy zazavavy izy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary ny andro rehetra niainan''i Lameka dia fito amby fito-polo amby fiton-jato taona; dia maty izy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Ary rehefa diman-jato taona Noa, dia niteraka an'i Sema sy Hama ary Jafeta izy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary ny andron''i Adama taorian''ny niterahany an''i Seta dia valon-jato taona; ary niteraka zazalahy sy zazavavy izy. '
  '5':
  - type: usfm
