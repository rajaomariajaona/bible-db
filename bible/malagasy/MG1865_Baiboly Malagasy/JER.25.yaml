document_id: JER.25,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny handravan'i Babylona ny Joda sy ny firenena manodidina, ary ny loza hanelezana an'i Babylona sy ny firenena hafa rehetra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Izao no teny tonga tamin''i Jeremia ny amin''ny Joda rehetra tamin''ny taona fahefatra nanjakan''i Joiakima, zanak''i Josia, mpanjakan''ny Joda dia ny taona voalohany nanjakan''i Nebokadnezara, mpanjakan''i Babylona '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary hatsahatro eo aminy ny feo mifaly sy ny feo miravoravo, dia ny feon''ny mpampakatra sy ny feon''ny ampakarina, ny feon''ny vato fikosoham-bary ary ny fahazavan''ny jiro. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary ity tany rehetra ity dia ho foana sy lao, ary ireto firenena rehetra ireto hanompo ny mpanjakan''i Babylona fito-polo taona. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary rehefa tapitra ny fito-polo taona, hoy Jehovah, dia hovaliako kosa ny mpanjakan''i Babylona sy izany firenena izany noho ny helony, ary ny tanin''ny Kaldeana koa dia hataoko rava mandrakizay. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary hotoviko amin''izany tany izany ny teniko rehetra, izay efa nambarako hamelezana azy, dia izay rehetra voasoratra ato amin''ity boky ity, izay novinanin''i Jeremia hamely ny firenena rehetra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa ireo kosa indray dia hampanompoin''ny firenena maro sy ny mpanjaka lehibe, ary hovaliako araka ny ataony sy araka ny asan''ny tànany avy izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fa izao no nolazain''i Jehovah, Andriamanitry ny Isiraely, tamiko: Raiso etỳ an-tanako ity kapoaky ny divay fahatezerana mirehitra ity, ka ampisotroy ny firenena rehetra izay anirahako anao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary hisotro izy ka hirepirepy sy ho very saina noho ny sabatra izay hampameleziko azy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dia noraisiko ny kapoaka teny an-tànan''i Jehovah, ka nampisotroako ny firenena rehetra izay nanirahan''i Jehovah ahy, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'dia Jerosalema sy ny tanànan''ny Joda sy ny mpanjakany ary ny mpanapaka, mba hanao azy ho tany lao sy ho figagana sy zavatra mampisitrisitra ary fanozonana tahaka ny amin''izao anio izao; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'ary Farao, mpanjakan''i Egypta, sy ny mpanompony sy ny mpanapaka mbamin''ny vahoakany rehetra, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'dia izay nolazain''i Jeremia mpaminany tamin''ny Joda rehetra sy tamin''ny mponina rehetra tany Jerosalema hoe: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'ary ny olona samy hafa firenena rehetra sy ny mpanjaka rehetra amin''ny tany Oza sy ny mpanjaka rehetra amin''ny tanin''ny Filistina sy Askelona sy Gaza sy Ekrona ary ny sisa any Asdoda; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'ary Edoma sy Moaba sy ny taranak''i Amona, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ary ny mpanjaka rehetra any Tyro sy ny mpanjaka rehetra any Sidona ary ny mpanjakan'ny nosy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: amoron-tsiraka'
      marker-yv: yv-n
    - type: text
      text: ' any an-dafin''ny ranomasina; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'ary Dedana sy Tema sy Boza ary izay rehetra voahety sisim-bolo, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'ary ny mpanjaka rehetra any Arabia sy ny mpanjaka rehetra amin''ny firenena maro samy hafa izay monina any an-efitra; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'ary ny mpanjaka rehetra any Zimry sy ny mpanjaka rehetra any Elama ary ny mpanjaka rehetra any Media, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ary ny mpanjaka rehetra any avaratra, na ny lavitra na ny akaiky, na iza na iza, ary ny fanjakana rehetra amin'izao tontolo izao, izay etỳ ambonin'ny tany; ary ny mpanjakan'i Sesaka
    - type: usfm
      marker: x
      children:
      - type: text
        text: Sesaka = Babela
      marker-yv: yv-n
    - type: text
      text: ' koa dia hisotro manaraka ireo. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Koa lazao aminy hoe: Izao no lazain''i Jehovah, Tompon''ny maro. Andriamanitry ny Isiraely: Misotroa ianareo, ka mimamoa, sy mandoava, ary mianjerà, ka aza miarina intsony noho ny sabatra izay hampameleziko anareo. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary raha tsy mety mandray ny kapoaka eny an-tananao hosotroiny izy, dia ataovy aminy hoe: Izao no lazain''i Jehovah, Tompon''ny maro: Tsy maintsy misotro ianareo. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Fa, indro, ao amin''ny tanàna izay efa niantsoana ny anarako aza no nanombohako ny fahatongavana loza, ka ho afaka va ianareo? Tsy ho afaka mihitsy ianareo, fa hiantso sabatra Aho hamelezana ny mponina rehetra amin''ny tany, hoy Jehovah, Tompon''ny maro. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Hatramin''ny taona fahatelo ambin''ny folo nanjakan''i Josia, zanak''i Amona, mpanjakan''ny Joda, ka mandraka androany, dia mandritra ny telo amby roa-polo taona izao, no nahatongavan''ny tenin''i Jehovah tamiko, ary nolazaiko taminareo, eny, nifoha maraina koa aho ka nilaza; nefa tsy nihaino ianareo. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Koa maminania aminy ianao araka izao teny rehetra izao, ka ataovy hoe: Jehovah hierona any ambony ary hanandratra ny feony any amin''ny fitoerany masina, eny, hierona mafy amin''ny sahany fiandrasan-ondry Izy ka hanakora toy ny mpanosihosy voaloboka, hamelezana ny mponina rehetra amin''ny tany. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Mihatra amin''ny faran''ny tany ny fihorakorahana; Fa Jehovah manana ady amin''ny firenena; Mifandahatra amin''ny nofo rehetra Izy, ka ny ratsy fanahy dia atolony ho an''ny sabatra, hoy Jehovah. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Indro, hisy loza hivoaka hitety ny firenena samy hafa, ary hisy tafio-drivotra mahery hiposaka any amin''ny faran''ny tany; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ary amin'izany andro izany Ny voavonon'i Jehovah, dia hiampatrampatra hatramin'ny faran'ny tany anankiray ka hatramin'ny farany koa; Tsy hisaonana, na hangonina, na halevina ireny, fa ho zezika eny ambonin'ny tany.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Midradradradrà, ianareo mpiandry ondry, ary mitaraina; Eny, mihosinkosena, ianareo zokiny amin''ny ondry! Fa tonga ny andro hamonoana anareo, ary hampieleziko ianareo ka hianjera toy ny fanaka tsara. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ny mpiandry ondry tsy hanam-pandosirana, ary ny zokiny amin''ny ondry tsy hanam-pahafahana. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Injany! misy feo fitarainan''ny mpiandry ondry sy fidradradradran''ny zokiny aminy! Satria efa nosimban''i Jehovah ny saha fiandrasana azy, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary efa tonga lao ny kijana niadanana noho ny firehetan''ny fahatezeran''i Jehovah. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Nandao ny fiereny toy ny liona tanora izy; Fa efa lao ny taniny noho ny fahasiahan'ny mpampahory sy noho ny firehetan'ny fahatezerany.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary Jehovah naniraka ny mpaminany mpanompony rehetra ho any aminareo, eny, nifoha maraina koa Izy ka naniraka nefa tsy nihaino ianareo, na nanongilan-tsofina hihaino hoe: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Samia miala amin''ny lalan-dratsinareo avy ianareo sy amin''ny ratsy fanaonareo, ka dia honina any amin''ny tany izay nomen''i Jehovah anareo sy ny razanareo hatrizay ka ho mandrakizay. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary aza manaraka andriamani-kafa hanompo azy sy hiankohoka eo anatrehany, ary aza mampahatezitra Ahy amin''ny asan''ny tananareo, fandrao hahatonga loza aminareo Aho. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Nefa tsy nihaino Ahy ianareo, hoy Jehovah, mba hampahatezeranareo Ahy tamin''ny asan''ny tananareo hahitanareo loza. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Koa izao no lazain''i Jehovah, Tompon''ny maro: Noho ny tsy nihainoanareo ny teniko, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: dia, indro, hampanalaiko ny firenena rehetra any avaratra sy Nebokadnezara, mpanjakan'i Babylona, mpanompoko, hoy Jehovah, ary ho entiko hamely ity lany ity sy ny mponina eto mbamin'ireto firenena manodidina rehetra ireto izy, ary haringako tokoa
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. hataoko herema
      marker-yv: yv-n
    - type: text
      text: ' ireo ka hataoko ho figagana sy zavatra mampisitrisitra sady ho rava mandrakizay. '
