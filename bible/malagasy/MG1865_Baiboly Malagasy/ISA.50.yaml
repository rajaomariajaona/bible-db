document_id: ISA.50,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'ny nisaorana ny Isiraely, sy ny amin'ny Mpanompon'i Jehovah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Izao no lazain''i Jehovah: Aiza izay taratasy fisaoram-bady nisaorako an-dreninareo? Ary iza amin''izay manan-trosa amiko no nivarotako anareo? Tsia, fa noho ny helokareo ihany no nivarotana anareo, ary noho ny fahadisoanareo ihany no nisaorana an-dreninareo.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Iza aminareo no matahotra an'i Jehovah ka mihaino ny feon'ny Mpanompony? Na iza na iza mandeha amin'ny maizina ka tsy manana fahazavana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Na dia mandeha amin''ny maizina aza izy ka tsy misy famirapiratana'
      marker-yv: yv-n
    - type: text
      text: ', aoka izy hatoky ny anaran''i Jehovah sy hiankina amin''Andriamaniny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'He! ianareo rehetra izay mampirehitra afo sy mifehy kilalaon''afo manodidina anareo, mandehana amin''ny lelafonareo sy amin''ny zana-tsipìka misy afo, izay narehitrareo. Izao no hanjo anareo avy amin''ny tanako: Handry amin''ny fahoriana ianareo.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nahoana no tsy nisy olona, fony tonga Aho, ary tsy nisy namaly, fony niantso Aho? Moa fohy tokoa va ny tanako ka tsy mahavonjy, ary moa tsy manan-kery ho enti-manafaka va Aho? Indro, amin''ny teny mafy ataoko no andritako ny ranomasina sy anaovako ny ony ho efitra; ary maimbo ny hazandranony noho ny tsi-fisian''ny rano sady matin-ketaheta. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tafiako fahamaintisana ny lanitra, ary lamba fisaonana no ataoko fisaronany. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Jehovah Tompo nanome Ahy ny lelan'ny efa mahay
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb.efa nampianarina
      marker-yv: yv-n
    - type: text
      text: ', mba hahaizako manao teny hampahatanjaka izay reraka; ampandrenesiny isa-maraina isa-maraina, eny, ampandrenesiny ny sofiko hihaino tahaka ny efa mahay'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb.efa nampianarina
      marker-yv: yv-n
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Jehovah Tompo nanokatra ny sofiko, ary Izaho tsy naditra na nihemotra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ny lamosiko natolotro ho amin''ny mpikapoka, ary ny takolako ho amin''izay manongobaoka; ny tavako tsy nafeniko tamin''ny henatra sy ny rora. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa Jehovah Tompo no hamonjy Ahy, ka dia tsy resin-kenatra Aho; Ary efa nohamafisiko ho tahaka ny afovato ny tavako, ka fantatro fa tsy ho menatra Aho. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Efa akaiky Izay manamarina Ahy: Iza no hiady amiko? Andeha hiara-mitsangana isika; iza no manana ady amiko? Aoka izy ho avy amiko. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Indro, Jehovah Tompo no hamonjy ahy; koa iza no hanameloka ahy? Indro, izy rehetra ho tonga tahaka ny lamba mangarahara, ho lanin''ny kalalao izy. '
