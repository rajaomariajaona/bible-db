document_id: PSA.27
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fahatokiana an'i Jehovah, Mpiaro sy Mpitahy ny olony
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Nataon'i Davida Jehovah no fahazavako sy famonjena ahy; iza no hatahorako? Jehovah no fiarovana mafy ho an'ny aiko; iza no hangovitako?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Raha manatona ahy hihinana ny nofoko ny ratsy fanahy, izay fahavaloko sy rafilahiko, dia izy ihany no tafintohina ka lavo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Na dia misy antokony mitoby hiady amiko aza, tsy hatahotra ny foko; na dia misy ady mihatra amiko aza, dia hatoky ihany aho. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Zavatra iray loha no nangatahiko tamin''i Jehovah, izany no hotadiaviko, dia ny hitoetra ao an-tranon''i Jehovah amin''ny andro rehetra hiainako, mba ho faly mijery ny fahasoavan''i Jehovah sy mandinika ny tempoliny. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa hanafina ahy ao an-trano fialofany amin''ny andro fahoriana Izy; hampiery ahy amin''ny fierena ao an-dainy Izy; hanandratra ahy ho eny ambony vatolampy Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Koa dia hisandratra ambonin'ny fahavaloko manodidina ahy ny lohako, ka hanatitra fanatitra hihobiana ao an-dainy aho; hihira sy hankalaza an'i Jehovah aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mihainoa, Jehovah ô, fa mitaraina mafy aho; ary mamindrà fo amiko, ka valio aho. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Raha hoy Hianao: tadiavonareo ny tavako, dia hoy ny navalin''ny foko: Eny, ny tavanao no tadiaviko, Jehovah ô; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aza manafina ny tavanao amiko, aza mandroaka ny mpanomponao an-katezerana; efa famonjena ahy Hianao; aza manary na mahafoy ahy, ry Andriamanitry ny famonjena ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Fa ny raiko aman-dreniko efa nahafoy ahy; fa Jehovah kosa no mandray ahy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Fa na dia mahafoy ahy aza ny ray aman-dreniko, dia ho-raisin''i Jehovah aho'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ampianaro ny lalanao aho, Jehovah ô; ary tariho amin''ny lalana marina aho noho ny fahavaloko. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Aza manolotra ahy ho amin''ny sitrapon''ny mpampahory ahy; fa vavolombelona mandainga sy izay mifofofofo loza no mitsangana hiampanga ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Raha izay re aho no tsy nanantena hahita ny fahasoavan'i Jehovah amin'ny tanin'ny velona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Miandrasa an'i Jehovah ianao; matokia, ary aoka hahery ny fonao; eny, miandrasa an'i Jehovah.
