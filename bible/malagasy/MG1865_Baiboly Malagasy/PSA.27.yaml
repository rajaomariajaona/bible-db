document_id: PSA.27,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahatokiana an'i Jehovah, Mpiaro sy Mpitahy ny olony
  - type: text
    content: Nataon'i Davida Jehovah no fahazavako sy famonjena ahy; iza no hatahorako? Jehovah no fiarovana mafy ho an'ny aiko; iza no hangovitako?
  '10':
  - type: text
    content: Fa ny raiko aman-dreniko efa nahafoy ahy; fa Jehovah kosa no mandray ahy
  - type: note
    content: 'Na: Fa na dia mahafoy ahy aza ny ray aman-dreniko, dia ho-raisin''i Jehovah aho'
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Ampianaro ny lalanao aho, Jehovah ô; ary tariho amin''ny lalana marina aho noho ny fahavaloko. '
  '12':
  - type: text
    content: 'Aza manolotra ahy ho amin''ny sitrapon''ny mpampahory ahy; fa vavolombelona mandainga sy izay mifofofofo loza no mitsangana hiampanga ahy. '
  '13':
  - type: text
    content: Raha izay re aho no tsy nanantena hahita ny fahasoavan'i Jehovah amin'ny tanin'ny velona.
  '14':
  - type: text
    content: Miandrasa an'i Jehovah ianao; matokia, ary aoka hahery ny fonao; eny, miandrasa an'i Jehovah.
  '2':
  - type: text
    content: 'Raha manatona ahy hihinana ny nofoko ny ratsy fanahy, izay fahavaloko sy rafilahiko, dia izy ihany no tafintohina ka lavo. '
  '3':
  - type: text
    content: 'Na dia misy antokony mitoby hiady amiko aza, tsy hatahotra ny foko; na dia misy ady mihatra amiko aza, dia hatoky ihany aho. '
  '4':
  - type: text
    content: 'Zavatra iray loha no nangatahiko tamin''i Jehovah, izany no hotadiaviko, dia ny hitoetra ao an-tranon''i Jehovah amin''ny andro rehetra hiainako, mba ho faly mijery ny fahasoavan''i Jehovah sy mandinika ny tempoliny. '
  '5':
  - type: text
    content: 'Fa hanafina ahy ao an-trano fialofany amin''ny andro fahoriana Izy; hampiery ahy amin''ny fierena ao an-dainy Izy; hanandratra ahy ho eny ambony vatolampy Izy. '
  '6':
  - type: text
    content: Koa dia hisandratra ambonin'ny fahavaloko manodidina ahy ny lohako, ka hanatitra fanatitra hihobiana ao an-dainy aho; hihira sy hankalaza an'i Jehovah aho.
  '7':
  - type: text
    content: 'Mihainoa, Jehovah ô, fa mitaraina mafy aho; ary mamindrà fo amiko, ka valio aho. '
  '8':
  - type: text
    content: 'Raha hoy Hianao: tadiavonareo ny tavako, dia hoy ny navalin''ny foko: Eny, ny tavanao no tadiaviko, Jehovah ô; '
  '9':
  - type: text
    content: 'Aza manafina ny tavanao amiko, aza mandroaka ny mpanomponao an-katezerana; efa famonjena ahy Hianao; aza manary na mahafoy ahy, ry Andriamanitry ny famonjena ahy. '
