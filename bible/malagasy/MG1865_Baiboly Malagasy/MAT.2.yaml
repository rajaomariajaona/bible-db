document_id: MAT.2
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary rehefa teraka Jesosy tao Betlehema an'i Jodia, tamin'ny andron'i Heroda mpanjaka, indreo, nisy Magy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Magy = olon-kendry
    marker-yv: yv-n
  - type: text
    text: ' avy tany atsinanana tonga tany Jerosalema ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Aiza Ilay teraka ho Mpanjakan''ny Jiosy? fa nahita ny kintany teny atsinanana izahay ka tonga mba hiankohoka eo anatrehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nony nandre izany Heroda mpanjaka, dia nangorohoro izy mbamin''i Jerosalema rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia namory ny lohan''ny mpisorona rehetra sy ny mpanora-dalàna tamin''ny vahoaka izy ka nanontany ary hoe: Aiza mba no hahaterahan''i Kristy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy ireo taminy: Ao Betlehema an''i Jodia; fa izao no voasoratry ny mpaminany: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary ianao, ry Betlehema, tanin'ny Joda, tsy dia kely indrindra ao amin'ny andrianan'ny Joda ianao tsy akory; Fa avy ao aminao no hivoahan'izay anankiray ho Mpanapaka, Ka Izy no ho Mpiandry ny Isiraely oloko (Mik. 5.1).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nampaka ny Magy mangingina Heroda ka namototra fatratra taminy izay andro nisehoan''ilay kintana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia naniraka azy hankany Betlehema izy ka nanao hoe: Andeha, fotory tsara ny amin''ilay Zazakely; koa rehefa hitanareo Izy, dia ambarao amiko, mba hankanesako any koa hiankohoka eo anatrehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary rehefa nandre ny tenin''ny mpanjaka izy ireo, dia lasa; ary, indro, ilay kintana hitany teny atsinanana nialoha azy mandra-pijanony teo ambonin''izay nitoeran''ny Zazakely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nony nahita ny kintana izy, dia nifaly indrindra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary rehefa tafiditra tao an-trano izy, dia nahita ny Zazakely sy Maria reniny ka niankohoka teo anatrehany; ary nony efa nosokafany ny fitehirizan-drakiny, dia nanolotra zavatra ho Azy izy, dia volamena sy zava-manitra ary miora. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary rehefa notoroan''Andriamanitra hevitra tamin''ny nofy izy tsy hiverina any amin''i Heroda, dia lalana hafa no nalehany nody ho any amin''ny fonenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nony efa lasa nandeha ireo, indro, nisy anjelin''ny Tompo niseho tamin''i Josefa tamin''ny nofy ka nanan hoe: Mifohaza ianao, ka ento ny Zazakely sy ny reniny, dia mandosira any Egypta, ary mitoera any ambara-pilazako aminao; fa Heroda efa hitady ny Zazakely hovonoiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia nifoha izy ka nitondra ny Zazakely sy ny reniny, raha mbola alina, dia lasa nankany Egypta; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ary nitoetra tany izy ambara-pahafatin''i Heroda, mba hahatanteraka izay nampilazain''i Jehovah ny mpaminany hoe: Nantsoiko hiala tany Egypta ny zanako (Hos. 11. 1). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nony efa fantatr''i Heroda fa voafitaky ny Magy izy, dia tezitra indrindra izy ka naniraka namono ny zazalahy rehetra hatramin''ny roa taona no ho midina, izay tao Betlehema sy tamin''ny manodidina rehetra, araka ny andro izay nofotorany fatratra tamin''ny Magy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia tanteraka izay nampilazaina an''i Jeremia mpaminany hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nisy feo re tao Rama, dia fidradradradrana sy fitomaniana fatratra; Rahely nitomany ny zanany, Ary tsy azo nampiononina izy, satria lany ritra ireny (Jer. 31. 15). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary rehefa maty Heroda, indro, nisy anjelin''ny Tompo niseho tamin''i Josefa tany Egypta tamin''ny nofy ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mifohaza ianao, ka ento ny Zazakely sy ny reniny, dia mankanesa any amin''ny tanin''ny Isiraely; fa efa maty izay nitady ny ain''ny Zazakely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia nifoha izy ka nitondra ny Zazakely sy ny reniny, dia tonga tany amin''ny tanin''ny Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa rehefa reny fa Arkelaosy no nanjaka tany Jodia nandimby an''i Heroda rainy, dia natahotra hankany izy; ary rehefa notoroan''Andriamanitra hevitra tamin''ny nofy izy, dia lasa nankany amin''ny tany Galilia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary nony tonga tany izy, dia nonina tao amin''ny tanàna atao hoe Nazareta, mba hahatanteraka izay nampilazaina ny mpaminany hoe: Hatao hoe Nazarena Izy.'
