document_id: JER.3,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny nanariana ny Isiraely, sy ny mbola handraisana azy indray
  - type: text
    content: Fa hoy Izy
  - type: note
    content: 'Na: hoy ny olona'
  - type: text
    content: ': Raha misy lehilahy misao-bady, ary efa miala ravehivavy ka vadin''olon-kafa, moa mahazo miverina aminy indray va ralehilahy? Tsy haloto tokoa va izany tany izany? Fa ianao dia efa nijangajanga tamin-tsakaiza maro, ka moa hahazo miverina amiko va ianao? hoy Jehovah. '
  '10':
  - type: text
    content: 'Fa na dia izany rehetra izany aza dia tsy nety niverina tamiko tamin''ny fony rehetra Joda mpivadika rahavaviny, fa tamin''ny fihatsaram-belatsihy ihany, hoy Jehovah. '
  '11':
  - type: text
    content: 'Ary hoy Jehovah tamiko: Isiraely mpiodina dia hita fa marimarina kokoa noho Joda mpivadika. '
  '12':
  - type: text
    content: 'Mandehana, ka torio manatrika ny avaratra izao teny izao hoe: Miverena ianao, ry Isiraely mpiodina, hoy Jehovah; Tsy hampanjombona ny tavako aminareo Aho; Fa mamindra fo Aho, hoy Jehovah, ka tsy hitahiry fahatezerana mandrakizay. '
  '13':
  - type: text
    content: 'Kanefa kosa ekeo ny helokao, fa tamin''i Jehovah Andriamanitrao no niodinanao, ary nivezivezy nankany amin''ny hafa ianao. Teny ambanin''ny hazo maitso rehetra, fa tsy mba nihaino ny feoko ianareo, hoy Jehovah. '
  '14':
  - type: text
    content: 'Miverena, ry zaza mpiodina, hoy Jehovah, fa Izaho ihany no vadinareo; Ary hangalako iray isan-tanàna ianareo Sy roa isam-pokony, ka ho entiko ho any Ziona ianareo; '
  '15':
  - type: text
    content: Dia homeko mpitondra
  - type: note
    content: Heb. mpiandry ondry
  - type: text
    content: ' araka ny sitrapoko ianareo. Izay hitondra'
  - type: note
    content: Heb. hiandry
  - type: text
    content: ' anareo amin''ny fahalalana sy ny fahendrena.'
  '16':
  - type: text
    content: 'Koa rehefa mitombo sy mihamaro amin''ny tany ianareo, dia amin''izany andro izany, hoy Jehovah, no tsy hanaovany intsony hoe: Ny fiaran''ny faneken''i Jehovah; Ary tsy hosaintsaininy akory izany, sady tsy hahatsiaro na ho manina izany izy, na hanao fiara intsony. '
  '17':
  - type: text
    content: 'Amin''izany andro izany no hanononana an''i Jerosalema hoe Seza fiandrianan''i Jehovah; Ary hivory any ny jentilisa rehetra noho ny anaran''i Jehovah any Jerosalema, ary izy tsy handeha intsony araka ny ditry ny fo ratsiny. '
  '18':
  - type: text
    content: 'Amin''izany andro izany ny taranak''i Joda sy ny taranak''Isiraely dia hiara-mandeha, ka hiara-tonga avy any amin''ny tany avaratra izy ho any amin''ny tany nomeko ny razanareo ho lovany. '
  '19':
  - type: text
    content: 'Ary Izaho efa nanao hoe: He! fa hataoko isan-janako ianao ka homeko tany mahafinaritra, dia lova izay tena endriky ny firenena. Eny, hoy Izaho: Hianao hanao Ahy hoe Raiko, ka tsy hiala amin''ny fanarahana Ahy. '
  '2':
  - type: text
    content: 'Andrandrao amin''ny tendrombohitra mangadihady ny masonao, ka jereo. Taiza no tsy nandrian''olona taminao? Teny an-dalambe no niandrasanao azy toy ny Arabo any an-efitra; Ary ny fijangajanganao sy ny faharatsianao no nandotoanao ny tany, '
  '20':
  - type: text
    content: Kanefa toy ny vehivavy misintaka miala amin'ny lahy
  - type: note
    content: Heb. sakaizany
  - type: text
    content: ', dia toy izany tokoa no nisintahanareo niala tamiko, ry taranak''Isiraely, hoy Jehovah. '
  '21':
  - type: text
    content: 'Injay! feo re any an-tendrombohitra mangadihady, dia fitomaniana amam-pitarainan''ny Zanak''Isiraely; Fa nivilivily tamin''ny nalehany izy ary nanadino an''i Jehovah Andriamaniny. '
  '22':
  - type: text
    content: 'Miverena ianao, ry zaza mpiodina, fa hositraniko ny fiodinanareo. Indreto, manatona Anao izahay, fa Hianao Jehovah no Andriamanitray. '
  '23':
  - type: text
    content: Foana tokoa ny horakoraka any amin'ny tendrombohitra sy ny havoana
  - type: note
    content: 'Na: Foana tokoa ny fihorakorahana any amin''ny havoana'
  - type: text
    content: '; Marina fa ao amin''i Jehovah Andriamanitray ny famonjena ny Isiraely. '
  '24':
  - type: text
    content: 'Fa lanin''ilay mampahamenatra hatramin''ny fahazazanay ny zavatra efa nisasaran''ny razanay, dia ny ondry aman''osiny sy ny ombiny, ny zananilahy sy ny zananivavy. '
  '25':
  - type: text
    content: Aoka handry ao amin'ny henatray izahay. Ary aoka hanarona anay ny fahafaham-boninahitray, satria tamin'i Jehovah Andriamanitray no efa nanotanay dia izahay sy ny razanay, hatramin'ny fahazazanay ka ambaraka androany sady tsy nihaino ny feon'i Jehovah Andriamanitray izahay.
  '3':
  - type: text
    content: 'Ka dia voasakana ny orana mivatravatra, sady tsy tonga ny fara-orana; Ary ny handrinao dia handrin''ny vehivavy janga ka tsy manan-kenatra. '
  '4':
  - type: text
    content: 'Moa tsy hitaraina amiko va ianao amin''izao sisa izao hoe: Ry Raiko ô, Hianao no nahazatra ahy, hatry ny fony aho mbola tanora? '
  '5':
  - type: text
    content: Ho tezitra mandrakizay va Izy? Hitahiry fahatezerana hatamin'ny farany va Izy? Indro, efa niteny toy izany ianao, nefa nanao izany ratsy izany ihany ka nahatanteraka izany.
  '6':
  - type: text
    content: 'Ary hoy Jehovah tamiko tamin''ny andro nanjakan''i Josia mpanjaka: Moa efa hitanao va izay nataon''Isiraely mpiodina? Niakatra ho eny amin''ny tendrombohitra avo rehetra sy ho eny ambanin''ny hazo maitso rehetra izy ka nijangajanga teny. '
  '7':
  - type: text
    content: 'Ary nataoko fa rehefa nanao izany rehetra izany izy, dia hiverina amiko. Kanjo tsy niverina izy. Ary Joda mpivadika rahavaviny dia nahita izany. '
  '8':
  - type: text
    content: 'Ary hitako fa na dia efa nisaorako aza Isiraely mpiodina ka nomeko taratasy fisaorana noho ny fijangajangana, dia tsy nety natahotra Joda mpivadika rahavaviny na dia izany aza, fa nandeha nijangajanga koa izy. '
  '9':
  - type: text
    content: Ary tamin'ny fihorakorahan'ny fijangajangany
  - type: note
    content: 'Na: Noho ny fijejojejoany sy ny fijangajangany'
  - type: text
    content: ' no nandotoany ny tany, ary nijangajanga tamin''ny vato sy ny hazo izy. '
