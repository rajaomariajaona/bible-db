document_id: ISA.21
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faminaniana ny amin'ny loza hanjo an'i Arabia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Faminaniana ny amin'ny loza hanjo ny Efitra Ranobe
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Ranomasina
    marker-yv: yv-n
  - type: text
    text: . Tahaka ny firimorimon'ny tadio any atsimo no fihaviny avy any an-efitra, dia avy any amin'ny tany mahatahotra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Misy fahitana mampahory naseho tamiko: Ny mpamitaka mamitaka, ary ny mpandringana mandringana. Iakaro, ry Elama ô! ekeo, ry Media ô! Hatsahatro ny fisentoana rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary raha nahita izany aho, dia feno fanaintainana ny valahako; Fijalijaliana no nahazo ahy tahaka ny fijalijalian''ny vehivavy raha miteraka; Niolanolana fatratra aho ka tsy nandre izany; Toran-kovitra aho ka tsy nahita izany. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Niemponempona ny foko, nampahatahotra ahy ny horohoro; Ny hariva fahafinaretako nampodiny ho fangovitako. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Velarina ny latabatra, miambina
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: velarina ny tsihy'
    marker-yv: yv-n
  - type: text
    text: ' ny mpiambina, mihinana sy misotro ny olona mitsangàna, ianareo lehibe, ka hosory ny ampinga! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa izao no nolazain''i Jehovah tamiko: Mandehana, manendre tily; Ka izay hitany no aoka holazainy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia nahita izy ka indreo mpitaingina manao andiany mandeha tsiroaroa sy boriky andiany ary rameva andiany. Ary nihaino izy, eny, nihaino dia nihaino; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dia niantso nanao feon-diona izy ka nanao hoe: Tompo ô! izaho mijanona mandrakariva eto ambonin''ny fitazanako nony antoandro, Ary mitoetra eto amin''ny fiambenako aho mandritra ny alina; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Koa, indreo, avy ny olona an-diany, mpitaingina mandeha tsiroaroa; Ary nanandratra ny feony izy ka nanao hoe: Rava, rava Babylona! Ary ny sarin'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. sarin-javatra voasokitra
    marker-yv: yv-n
  - type: text
    text: '''ny andriamaniny rehetra dia voatorotoro miraraka amin''ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ry ahy voavely toy ny vary teo am-pamoloako ô
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. zanaky ny famoloako
    marker-yv: yv-n
  - type: text
    text: '! Izay efa reko tamin''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely, no nambarako taminareo.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Faminaniana ny amin'ny loza hanjo an'i Edoma
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Doma
    marker-yv: yv-n
  - type: text
    text: '. Misy miantso ahy any Seira manao hoe: Ry mpiambina ô, toy inona alina moa izao ? Ry mpiambina ô, toy inona alina moa izao?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy ny mpiambina: Avy ny maraina, avy koa ny alina; Raha mbola ta-hanontany ianareo, dia manontania ihany; ka avia, miverena'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: avia indray'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Faminaniana ny amin'ny loza hanjo an'i Arabia. Any an'ala any Arabia no andrianareo, ry andian'ny Dedanita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Itondrana rano ny mangetaheta; Ny mponina amin''ny tany Tema mitsena hanina ny mandositra; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa mandositra ny sabatra ireo, dia ny sabatra voatsoaka sy ny tsipìka voahenjana ary ny havesatry ny ady. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa izao no nolazain''i Jehovah tamiko: Ato anatin''ny herintaona, tahaka ny taonan''ny mpikarama, dia ho levona avokoa ny voninahitr''i Kedara; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary ny tsipìka sisa izay; an'ny lehilahy mahery, taranak'i Kedara, dia ho vitsy foana, fa Jehovah Andriamanitry ny Isiraely, ao efa niteny.
