document_id: ISA.21,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Faminaniana ny amin'ny loza hanjo an'i Arabia
  - type: text
    content: Faminaniana ny amin'ny loza hanjo ny Efitra Ranobe
  - type: note
    content: Heb. Ranomasina
  - type: text
    content: . Tahaka ny firimorimon'ny tadio any atsimo no fihaviny avy any an-efitra, dia avy any amin'ny tany mahatahotra.
  '10':
  - type: text
    content: Ry ahy voavely toy ny vary teo am-pamoloako ô
  - type: note
    content: Heb. zanaky ny famoloako
  - type: text
    content: '! Izay efa reko tamin''i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely, no nambarako taminareo.'
  '11':
  - type: text
    content: Faminaniana ny amin'ny loza hanjo an'i Edoma
  - type: note
    content: Heb. Doma
  - type: text
    content: '. Misy miantso ahy any Seira manao hoe: Ry mpiambina ô, toy inona alina moa izao ? Ry mpiambina ô, toy inona alina moa izao?'
  '12':
  - type: text
    content: 'Dia hoy ny mpiambina: Avy ny maraina, avy koa ny alina; Raha mbola ta-hanontany ianareo, dia manontania ihany; ka avia, miverena'
  - type: note
    content: 'Na: avia indray'
  - type: text
    content: .
  '13':
  - type: text
    content: Faminaniana ny amin'ny loza hanjo an'i Arabia. Any an'ala any Arabia no andrianareo, ry andian'ny Dedanita.
  '14':
  - type: text
    content: 'Itondrana rano ny mangetaheta; Ny mponina amin''ny tany Tema mitsena hanina ny mandositra; '
  '15':
  - type: text
    content: 'Fa mandositra ny sabatra ireo, dia ny sabatra voatsoaka sy ny tsipìka voahenjana ary ny havesatry ny ady. '
  '16':
  - type: text
    content: 'Fa izao no nolazain''i Jehovah tamiko: Ato anatin''ny herintaona, tahaka ny taonan''ny mpikarama, dia ho levona avokoa ny voninahitr''i Kedara; '
  '17':
  - type: text
    content: Ary ny tsipìka sisa izay; an'ny lehilahy mahery, taranak'i Kedara, dia ho vitsy foana, fa Jehovah Andriamanitry ny Isiraely, ao efa niteny.
  '2':
  - type: text
    content: 'Misy fahitana mampahory naseho tamiko: Ny mpamitaka mamitaka, ary ny mpandringana mandringana. Iakaro, ry Elama ô! ekeo, ry Media ô! Hatsahatro ny fisentoana rehetra. '
  '3':
  - type: text
    content: 'Ary raha nahita izany aho, dia feno fanaintainana ny valahako; Fijalijaliana no nahazo ahy tahaka ny fijalijalian''ny vehivavy raha miteraka; Niolanolana fatratra aho ka tsy nandre izany; Toran-kovitra aho ka tsy nahita izany. '
  '4':
  - type: text
    content: 'Niemponempona ny foko, nampahatahotra ahy ny horohoro; Ny hariva fahafinaretako nampodiny ho fangovitako. '
  '5':
  - type: text
    content: Velarina ny latabatra, miambina
  - type: note
    content: 'Na: velarina ny tsihy'
  - type: text
    content: ' ny mpiambina, mihinana sy misotro ny olona mitsangàna, ianareo lehibe, ka hosory ny ampinga! '
  '6':
  - type: text
    content: 'Fa izao no nolazain''i Jehovah tamiko: Mandehana, manendre tily; Ka izay hitany no aoka holazainy. '
  '7':
  - type: text
    content: 'Dia nahita izy ka indreo mpitaingina manao andiany mandeha tsiroaroa sy boriky andiany ary rameva andiany. Ary nihaino izy, eny, nihaino dia nihaino; '
  '8':
  - type: text
    content: 'Dia niantso nanao feon-diona izy ka nanao hoe: Tompo ô! izaho mijanona mandrakariva eto ambonin''ny fitazanako nony antoandro, Ary mitoetra eto amin''ny fiambenako aho mandritra ny alina; '
  '9':
  - type: text
    content: 'Koa, indreo, avy ny olona an-diany, mpitaingina mandeha tsiroaroa; Ary nanandratra ny feony izy ka nanao hoe: Rava, rava Babylona! Ary ny sarin'
  - type: note
    content: Heb. sarin-javatra voasokitra
  - type: text
    content: '''ny andriamaniny rehetra dia voatorotoro miraraka amin''ny tany. '
