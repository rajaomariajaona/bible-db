document_id: NUM.32
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahazoan'ny firenen'i Robena sy Gada ary ny antsasaky ny firenen'i Manase zara-tany tao an-dafy atsinanan'i Jordana
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary nanana omby aman''ondry be indrindra ny taranak''i Robena sy ny taranak''i Gada; ary rehefa nahita ny tany Jazera sy ny tany Gileada izy, fa tany tsara ho fiandrasana omby aman''ondry io, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia avy ny taranak''i Gada sy ny taranak''i Robena ka niteny tamin''i Mosesy sy Eleazara mpisorona sy tamin''ny lohan''ny fiangonana ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Atarota sy Dibona sy Jazera sy Nimra sy Hesbona sy Elale sy Sebama sy Nebo ary Beona, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ireo tany noresen''i Jehovah teo anoloan''ny fiangonan''ny Isiraely, dia tany tsara ho fiandrasana omby aman''ondry, ary ny mpanomponao manana omby aman''ondry; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'dia hoy koa izy: Raha mahita fitia eo imasonao izahay; aoka homena anay mpanomponao ho zara-taninay io tany io; fa aza ampitaina an''i Jordana izahay.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dia hoy Mosesy tamin''ny taranak''i Gada sy ny taranak''i Robena: Ny rahalahinareo handeha hanafika, ka ianareo kosa hijanona eto va? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nahoana ianareo no mampiketraka ny fon''ny Zanak''Isiraely, mba tsy handehanany ho any amin''ny tany izay nomen''i Jehovah azy? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Izany no nataon''ny rainareo, fony nirahiko avy tao Kadesi-barnea hisafo ny tany izy; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'fa raha niakatra hatrany an-dohasaha Eskola izy ka nahita ny tany, dia nampiketraka ny fon''ny Zanak''Isiraely izy, mba tsy handehanany ho any amin''ny tany izay efa nomen''i Jehovah azy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nirehitra ny fahatezeran''i Jehovah tamin''izay andro izay, dia nianiana Izy ka nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny olona izay niakatra avy tany Egypta, hatramin''ny roa-polo taona no ho miakatra, dia tsy hisy hahita ny tany izay efa nianianako tamin''i Abrahama sy Isaka ary Jakoba homena azy, satria tsy tanteraka tamin''ny fanarahana Ahy izy; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'afa-tsy Kaleba, zanak''i Jefone Kenizita, sy Josoa, zanak''i Nona, izay tanteraka tamin''ny fanarahana an''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nirehitra tamin''ny Isiraely ny fahatezeran''i Jehovah, ka nampirenireny azy tany an-efitra efa-polo taona Izy mandra-pahalany ritra ny taranaka rehetra izay nanao ratsy teo imason''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary, indreto, ianareo mitsangana hisolo ny rainareo, ho taranaka mbola mpanota, hampitombo ny firehetan''ny fahatezeran''i Jehovah amin''ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa raha miala amin'ny fanarahana Azy ianareo dia hamela azy any an-efitra Indray Izy; ka dia ianareo no handringana izao olona rehetra izao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary dia nanatona azy izy ireo ka nanao hoe: Hanao vala eto izahay ho an''ny omby aman''ondrinay sy tanàna koa ho an''ny zanakay madinika; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'fa ny tenanay dia hiomana faingana handroso eo alohan''ny Zanak''Isiraely mandra-pitondranay azy ho any amin''ny taniny; ary ny zanakay madinika dia hitoetra amin''ny tanàna mimanda noho ny mponina amin''ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tsy hody any an-tranonay izahay, mandra-pahazon''ny Zanak''Isiraely ny zara-taniny avy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa tsy hiara-mandray zara-tany aminy izahay hatrany an-dafin'i Jordana no ho miankandrefana, satria efa azonay atỳ an-dafy atsinanan'i Jordana atỳ ny zara-taninay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia hoy Mosesy taminy: Raha hanao izany zavatra izany ianareo ka hiomana eo anatrehan''i Jehovah ho any an-tafika, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'ary rehefa samy efa voaomana hiady, dia hita ho any an-dafin''i Jordana eo anatrehan''i Jehovah, mandra-pandroakany ny fahavalony hiala eo anoloany, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'ka ho resy eo anatrehan''i Jehovah ny tany; ary rehefa vita izany, dia hody ianareo ka tsy hanan-tsiny, na amin''i Jehovah, na amin''ny Isiraely; ary ity tany ity ho zara-taninareo eo anatrehan''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa raha tsy hanao izany kosa ianareo, dia manota amin''i Jehovah; ary aoka ho fantatrareo fa hanody anareo ny fahotanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Manaova tanàna ho an''ny zanakareo madinika sy vala ho an''ny ondry aman''osinareo, ka ataovy izay naloaky ny vavanareo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia niteny tamin''i Mosesy ny taranak''i Gada sy ny taranak''i Robena ka nanao hoe: Ny mpanomponao dia hanao araka izay andidianao, tompoko: '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ny zanakay madinika sy ny vadinay sy ny ondry aman''osinay ary ny biby fiompinay rehetra dia hitoetra ato amin''ny tanànan''i Gileada; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: fa ny mpanomponao handeha hita, samy efa voaomana hiady eo anatrehan'i Jehovah, ho any an-tafika, araka izay nolazainao, tompoko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary Mosesy dia nandidy an''i Eleazara mpisorona sy Josoa, zanak''i Nona, ary ny lohan''ny fianakaviana tamin''ny firenen''ny Zanak''Isiraely ny amin''ireo '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'ka nanao taminy hoe: Raha handeha hita an''i Jordana hiaraka aminareo ny taranak''i Gada sy ny taranak''i Robena, samy efa voaomana hiady eo anatrehan''i Jehovah, ka ho resy ny tany eo anoloanareo, dia homenareo azy ny tany Gileada ho zara-taniny; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'fa raha tsy mandeha samy efa voaomana hiady miaraka aminareo Izy, dia eo aminareo amin''ny tany Kanana ihany no hahazoany zara-tany. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia namaly ny taranak''i Gada sy ny taranak''i Robena ka nanao hoe: Araka izay nolazain''i Jehovah tamin''ny mpanomponao no hataonay: '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Izabay handeha hita eo anatrehan'i Jehovah ho any amin'ny tany Kanana samy efa voaomana hiady, kanefa etỳ an-dafin'i Jordana etỳ ihany no hahazoanay zara-tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia nomen''i Mosesy ho an''ny taranak''i Gada sy ny taranak''i Robena ary ny an-tsasaky ny firenen''i Manase, zanak''i Josefa, ny fanjakan''i Sihona, mpanjakan''ny Amorka, sy ny fanjakan''i Oga, mpanjakan''i Basana dia ny tany mbamin''ny tanànany ao amin''ny fari-tany, dia ny tanàna eny amin''ny tany manodidina. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary ny taranak''i Gada nanao an''i Dibona sy Atarota sy Aroera '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'sy Atrota-sofana sy Jazera ary Jogbeha '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'sy Beti-nimra sy Beti-harana, tanàna mimanda, ary vala ho an''ny ondry. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary ny taranak''i Robena nanao an''i Hesbona sy Elale sy Kiriataima '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'sy Nebo sy Bala-meona (nefa novana ny anaran''ireo) ary Sibma; ary nasiany anarana vaovao ny tanàna izay nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary ny taranak''i Makira, zanak''i Manase, nankany Gileada ka nahafaka azy, dia nandroaka ny Amorita izay nonina teo. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary Gileada dia nomen''i Mosesy an''i Makira, zanak''i Manase, ka nonina tao izy. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary Jaira, zanak''i Manase, nandeha ka nahafaka ny tanàna madinika teo, ary ny anarany nataony hoe Havota-jaira. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ary Noba nandeha ka nahafaka an'i Kenata sy ny zana-bohiny, dia nataony hoe Noba, araka ny anarany izy.
