document_id: EXO.6,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanirahan'Andriamanitra an'i Mosesy sy Arona hihaona amin'i Farao indray, sy ny famantarana nataon'izy roa lahy teo anatrehany
  - type: text
    content: 'Ary hoy Jehovah tamin''i Mosesy: Ankehitriny ho hitanao izay hataoko amin''i Farao; fa ny tanako mahery no handefasany azy, ary ny tanako mahery no handroahany azy amin''ny taniny.'
  '10':
  - type: text
    content: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  '11':
  - type: text
    content: 'Mankanesa ao amin''i Farao, mpanjakan''i Egypta, ka mitenena aminy mba handefasany ny Zanak''Isiraely hiala amin''ny taniny. '
  '12':
  - type: text
    content: 'Ary Mosesy niteny teo anatrehan''i Jehovah ka nanao hoe: Indro, ny Zanak''Isiraely aza tsy nihaino ahy, ka ahoana no hihainoan''i Farao ahy, fa izaho tsy voafora molotra? '
  '13':
  - type: text
    content: Ary Jehovah niteny tamin'i Mosesy sy Arona ka nanome teny azy ho entiny ho any amin'ny Zanak'Isiraely sy ho amin'i Farao, mpanjakan'i Egypta, mba hitondra ny Zanak'Isiraely hivoaka avy amin'ny tany Egypta.
  '14':
  - type: text
    content: 'Izao no lohan''ny fianakaviany: Ny zanakalahin-dRobena, lahimatoan''Isiraely, dia Hanoka sy Palo sy Hezrona sy Karmy; ireo no fokom-pirenen-dRobena. '
  '15':
  - type: text
    content: Ary ny zanakalahin'i Simeona dia Jemoela sy Jaminasy Ohada sy Jakinasy Zohara ary Saoly, zanakalahin'ny vehivavy Kananita; ireo no fokom-pirenen'i Simeona.
  '16':
  - type: text
    content: 'Ary izao no anaran''ny zanakalahin''i Levy, araka ny taranany, dia Gersona sy Kehata ary Merary; ary ny andro niainan''i Levy dia fito amby telo-polo amby zato taona. '
  '17':
  - type: text
    content: 'Ny zanakalahin''i Hersona dia Libny sy Simey, araka ny fokom-pireneny. '
  '18':
  - type: text
    content: 'Ary ny zanakalahin''i Kehata dia Amrama sy Jizara sy Hebrona ary Oziela; ary ny andro niainan''i Kehata dia telo amby telo-polo amby zato taona. '
  '19':
  - type: text
    content: Ary ny zanakalahin'i Merary dia Maly sy Mosy. Ireo no fokom-pirenen'ny Levita, araka ny taranany.
  '2':
  - type: text
    content: 'Ary Andriamanitra niteny tamin''i Mosesy ka nanao hoe: Izaho no Jehovah; '
  '20':
  - type: text
    content: 'Ary Amrama naka an''i Jokebeda anabavin-drainy ho vadiny, dia niteraka an''i Arona sy Mosesy taminy izy; ary ny andro niainan''i Amrama dia fito amby telo-polo amby zato taona. '
  '21':
  - type: text
    content: 'Ary ny zanakalahin''i Jizara dia Kora sy Nafega ary Zikry. '
  '22':
  - type: text
    content: 'Ary ny zanakalahin''i Oziela dia Misaela sy Elzafana ary Sitry. '
  '23':
  - type: text
    content: 'Ary Arona naka an''i Eliseba, zanakavavin''i Aminadaba sady anabavin''i Nasona, ho vadiny; dia niteraka an''i Nadaba sy Abiho sy Eleazara ary Itamara taminy izy. '
  '24':
  - type: text
    content: 'Ary ny zanakalahin''i Kora dia Asira sy Elkana ary Abiasafa; ireo no fokom-pirenen''ny Korana. '
  '25':
  - type: text
    content: Ary Eleazara, zanakalahin'i Arona, naka vady avy tamin'ny zanakavavin'i Potiela, dia niteraka an'i Finehasa taminy izy. Ireo no lohan'ny fianakavian'ny Levita, araka ny fokom-pireneny.
  '26':
  - type: text
    content: 'Ireo no Arona sy Mosesy, izay nilazan''i Jehovah hoe: Ento ny Zanak''Isiraely hivoaka avy any amin''ny tany Egypta araka ny antokony. '
  '27':
  - type: text
    content: Ireo no niteny tamin'i Farao, mpanjakan'i Egypta, mba hitondra ny Zanak'Isiraely hivoaka avy any Egypta; ireo no Mosesy sy Arona.
  '28':
  - type: text
    content: 'Ary tamin''ny andro izay nitenenan''i Jehovah tamin''i Mosesy teo amin''ny tany Egypta, '
  '29':
  - type: text
    content: 'dia hoy Jehovah tamin''i Mosesy: Izaho no Jehovah; koa lazao amin''i Farao, mpanjakan''i Egypta, izay rehetra lazaiko aminao. '
  '3':
  - type: text
    content: 'ary tamin''ny anarako hoe ANDRIAMANITRA TSITOHA no nisehoako tamin''i Abrahama sy Isaka ary Jakoba, fa ny anarako hoe JEHOVAH tsy mbola nahafantarany Ahy, '
  '30':
  - type: text
    content: 'Ary Mosesy niteny teo anatrehan''i Jehovah ka nanao hoe: Indro, tsy voafora molotra aho, ka aiza no hihainoan''i Farao ahy!'
  '4':
  - type: text
    content: 'Ary naoriko taminy koa ny fanekeko hanomezako azy ny tany Kanana, dia ny tany fivahiniany izay efa nivahiniany. '
  '5':
  - type: text
    content: 'Ary koa, Izaho efa nandre ny fitarainan''ny Zanak''Isiraely, izay ampanompoin''ny Egyptiana, ka dia tsaroako ny fanekeko. '
  '6':
  - type: text
    content: 'Koa lazao amin''ny Zanak''Isiraely hoe: Izaho no Jehovah, ary hitondra anareo hivoaka ho afaka amin''ny fanompoana mafy ampanaovin''ny Egyptiana anareo Aho ka hanafaka anareo amin''ny fanompoana azy; ary sandry ahinjitra sy fitsarana lehibe no hamonjeko anareo. '
  '7':
  - type: text
    content: 'Dia halaiko ho Ahy ianareo ho oloko, ary ho Andriamanitrareo Aho; dia ho fantatrareo fa Izaho no Jehovah Andriamanitrareo, Izay mitondra anareo mivoaka ho afaka amin''ny fanompoana mafy ampanaovin''ny Egyptiana anareo. '
  '8':
  - type: text
    content: 'Ary Izaho hampiditra anareo any amin''ny tany izay nananganako tanàna homena an''i Abrahama sy Isaka ary Jakoba; dia homeko ho lovanareo izany: Izaho no Jehovah. '
  '9':
  - type: text
    content: 'Ary Mosesy nilaza izany tamin''ny Zanak''Isiraely; nefa izy tsy nihaino an''i Mosesy noho ny fahoriam-panahy sy ny fanompoana mafy. '
