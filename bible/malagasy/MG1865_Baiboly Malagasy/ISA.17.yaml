document_id: ISA.17,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny handringanana ny Asyriana
  - type: text
    content: Indro, Damaskosy, dia rava tsy ho tanàna intsony, eny, tonga korontam-bato izy.
  '10':
  - type: text
    content: 'Fa nanadino an''Andriamanitry ny famonjena anao ianao ary tsy nahatsiaro ny vatolampy fiarovana mafy ho anao, ka dia nanao voly mahafinaritra ianao ary zana-boaloboka avy amin''ny firenena hafa no nambolenao teo; '
  '11':
  - type: text
    content: Tamin'ny andro nambolenao azy dia nofefenao izy, ary nony maraina dia nampitsimohinao ilay nambolenao; nefa ho vokatra miavosa izany ho amin'ny andro fangirifiriana
  - type: note
    content: 'Na: Nefa ho levona ny vokatra amin''ny andro hahazoana azy'
  - type: text
    content: ' sy fanaintainana tsy azo sitranina.'
  '12':
  - type: text
    content: 'Indrisy ny fihahohahon''ny firenena maro! Izay mihahohaho tahaka ny feon''ny ranomasina! Indrisy ny firohondrohon''ny olona maro be! Tahaka ny firohondrohon''ny rano manonja ny firohondrohony! '
  '13':
  - type: text
    content: 'Eny, mirohondrohona tahaka ny firohondrohon''ny rano be ny firenena; kanefa hotezerana mafy izy, ka dia handositra lavitra ary ho lasa tahaka ny akofa eny an-tendrombohitra, raha paohin''ny rivotra, sy tahaka ny fakom-bary mitambolimbolina entin''ny tadio. '
  '14':
  - type: text
    content: Raha hariva ny andro, dia, injao, fampahatahorana; ary raha tsy mbola maraina akory aza, dia tsy ao intsony ireny. Izany no anjaran'izay mamabo antsika sy tambin'izay mandroba antsika.
  '2':
  - type: text
    content: 'Efa lao ny tanànan''i Aroera ka ho an''ny andian''ny ondry aman''osy, handry ao ireo, ka tsy hisy hanaitaitra azy, '
  '3':
  - type: text
    content: Ary tsy hisy tanàna mimanda intsony any Efraima, na fanjakana ao Damaskosy; Ary izay sisa amin'i Syria dia hitovy voninahitra amin'ny Zanak'Isiraely; Hoy Jehovah, Tompon'ny maro.
  '4':
  - type: text
    content: 'Ary amin''izany andro izany dia hihena ny voninahitr''i Jakoba, ary hihena ny hataviny. '
  '5':
  - type: text
    content: 'Ary ho tahaka ny fanangon''ny olona ny vary an-tahony amin''ny fararano izany, ka tangosan''ny sandriny ny salohim-bary; Eny, ho tahaka ny fanangon''ny olona salohim-bary eny amin''ny lohosahan''ny Refaita; '
  '6':
  - type: text
    content: 'Kanefa hisy sisa hotsimponina ihany izy tahaka ny amin''ny fikapohana ny hazo oliva: Hisy voany roa na telo ao an-tendrony ambony indrindra, efatra na dimy ao amin''ny rantsan''ny hazo mahavokatra, hoy Jehovah, Andriamanitry ny Isiraely. '
  '7':
  - type: text
    content: 'Amin''izany andro izany dia hanandrandra ny Mpanao azy ny olona, ary ny masony hijery ny Iray Masin''ny Isiraely, '
  '8':
  - type: text
    content: Fa tsy hanandrandra ny alitara, asan'ny tànany, intsony izy. Ary ny nataon'ny rantsan-tànany tsy hahoany, na ny Aseraha
  - type: note
    content: Anaran'andriamani-tsi-izy, na ny sariny
  - type: text
    content: ', na ny tsangankazo'
  - type: note
    content: 'Na: tsangam-bato'
  - type: text
    content: ' ho an''ny masoandro. '
  '9':
  - type: text
    content: 'Amin''izany andro izany ny tanànany mafy, dia ho tahaka ny tany lao any an''ala na any an-tampon-tendrombohitra Izay nilaozan''ny olona teo anoloan''ny Zanak''Isiraely, ka dia ho foana ny tany. '
