document_id: ISA.26,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin''izany andro izany dia hohiraina eto amin''ny tanin''ny Joda izao fihirana izao: Manana tanàna mafy isika; Famonjena no hotendren''i Jehovah ho manda sy fiarovana.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na dia asiana soa aza ny ratsy fanahy, tsy mety mianatra fahamarinana izy; Eny, na dia ao amin''ny tanin''ny fahamarinana aza izy, mbola manao meloka ihany ka tsy mety mijery ny fahalehibiazan''i Jehovah. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehovah ô, avo ny tananao, nefa tsy jeren'ireo; Tsy maintsy hojereny ihany anefa ny  fahasaro-piaronao amin'ny olonao
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Hijery ihany anefa izy ka ho menatra noho ny fialonany ny olonao'
      marker-yv: yv-n
    - type: text
      text: ', ka ho menatra izy; Eny, afo no handevona ny fahavalonao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehovah ô, manorina fiadanana ho anay Hianao: Fa ny asanay rehetra dia tanterahinao ho anay. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehovah Andriamanitray ô, tsy Hianao ihany no efa nampanompo anay, fa tompo hafa koa; Nefa Hianao irery ihany no ahazoanay mankalaza ny anaranao. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny maty tsy ho velona intsony, ny matoatoa tsy mba hitsangana; Fa novalianao izy ka naringanao, sady nolevoninao avokoa ny fahatsiarovana azy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nampitombo ny firenena Hianao, Jehovah ô, Eny, nampitombo ny firenena Hianao ka nahazo voninahitra ho Anao; Nitarinao halalaka avokoa ny faritry ny tany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehovah ô, nony azom-pahoriana izy, dia nitady Anao; Nony niharan''ny famaizanao izy, dia nanao vavaka anakampo. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tahaka izay bevohoka efa madiva hiteraka ka miolanolana sy mitaraina noho ny faharariany, dia tahaka izany izahay teo imasonao, Jehovah ô, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa bevohoka izahay, efa nihetsi-jaza izahay, Efa tahaka ny nitera-drivotra izahay; Tsy nahavita famonjena ho an''ny tany izahay, ka tsy niteraka ny mponina amin''izao tontolo izao. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho velona indray ny olonao izay efa maty, ny fatin'ny oloko hitsangana; Koa mifohaza sy mihobia, ianareo izay mandry ao amin'ny vovoka; Fa ny andonao dia tahaka ny andon'ny fahazavana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ando amin''ny anana'
      marker-yv: yv-n
    - type: text
      text: ', ary ny tany hiteraka ny maty'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. ny matoatoa
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vohay ny vavahady, mba hidiran''ny firenena marina, izay mitana ny fahamarinana. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mandehana, ry oloko, midìra ao amin''ny efi-tranonao, ary mirindrina varavarana ianao, ka miere kely indray mipi-maso monja Mandra-pahalasan''ny fahatezerana. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa, indro, Jehovah mivoaka avy amin'ny fitoerany hamaly ny mponina amin'ny tany noho ny helony; Ary ny tany hampiseho ny rà izay nofohiny ka tsy hanafina intsony izay novonoina teo aminy.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny saina tsy miovaova dia harovanao ao amin''ny fiadanana tanteraka, satria matoky Anao izy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Matokia an''i Jehovah mandrakizay, fa Jehovah Tompo no Vatolampy mandrakizay. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa naetriny ny mponina avo toerana; Ny tanàna avo dia arodany, eny, arodany ho amin''ny tany ka :azerany ho amin''ny vovoka. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hitsahin''ny tongotra izy, dia ny tongotry ny ory sy ny faladian''ny mahantra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voaravona ny lalan''ny marina: Eny, aravonao ho marina indrindra'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Hianao, Izay mahitsy, no manamarina'
      marker-yv: yv-n
    - type: text
      text: ' ny alehan''ny marina. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa amin''ny lalan''ny fitsaranao, Jehovah ô, no iandrasanay Anao, ny anaranao sy ny fahatsiarovana Anao no irin''ny fanahinay. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin''ny fanahiko no aniriako Anao nony alina; Eny, ny saiko ato anatiko no itadiavako Anao fatratra; Fa raha mamely ny tany ny fitsaranao, dia mianatra fahamarinana ny mponina amin''izao tontolo izao. '
