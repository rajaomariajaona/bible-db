document_id: ISA.38,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nahararian'i Hezekia, sy ny nanalavan'Andriamanitra ny androny, ary ny fiderana nataony amin'izany
  - type: text
    content: 'Ary tamin''izany andro izany dia narary saiky maty Hezekia; ary Isaia mpaminany zanak''i Amoza, nankao aminy ka nilaza taminy hoe: Izao no lazain''i Jehovah: Hafaro ny ankohonanao, fa ho faty ianao, fa tsy ho velona. '
  '10':
  - type: text
    content: 'Hoy izaho: Amin''izao andro mbola iadanako izao no tsy maintsy idirako amin''ny vavahadin''ny fiainan-tsi-hita'
  - type: note
    content: Heb. Sheola
  - type: text
    content: '; nesorina tamiko ny androko sisa. '
  '11':
  - type: text
    content: 'Hoy izaho: Tsy mba hahita an''i Jehovah intsony aho. Eny, tsy mba hahita an''i Jehovah ao amin''ny velona intsony aho; Tsy mba hahita olona intsony aho, fa ho isan''ny mponina any amin''ny fiainan-tsi-hita'
  - type: note
    content: Heb. Sheola
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Ny fonenako nesorina ka nafindra tsy ho amiko, tahaka ny lain''ny mpiandry ondry; Ahoroko tahaka ny tenona ny androko, fa efa hotapahiny ho afaka amin''ny haraka izy; Indray andro monja no anaperanao ny aiko. '
  '13':
  - type: text
    content: 'Nampionona ny foko aho mandra-pahamarain''ny andro; Tahaka ny fanapatapaky ny liona no anapatapahany ny taolako rehetra; Indray andro monja no anaperanao ny aiko. '
  '14':
  - type: text
    content: 'Ka dia mikoraraika tahaka ny sidintsidina sy ny vano aho. Ary mitolokoloko tahaka ny voromailala. Pahina ny masoko noho ny faniriako ho any amin''ny avo; Jehovah ô, ory loatra aho, aoka hiantoka ahy Hianao. '
  '15':
  - type: text
    content: Ahoana no holazaiko? Sady nilaza tamiko Izy no nahatanteraka koa; Handeha mijoretra aho amin'ny taonako sisa rehetra noho
  - type: note
    content: 'Na: rehefa afaka'
  - type: text
    content: ' ny fangidian''ny aiko. '
  '16':
  - type: text
    content: 'Tompo ô, izany no iveloman''ny olona, ary amin''izany tokoa no iainan''ny fanahiko, ka dia mahasitrana sy mahavelona ahy Hianao. '
  '17':
  - type: text
    content: 'Indro, tonga fiadanana ilay fahoriana mangidy dia mangidy nanjo ahy, ary ny fitiavanao no namonjenao ny fanahiko tsy hankany amin''ny lavaka fahalevonana; Fa narianao teo ivohonao ny fahotako rehetra. '
  '18':
  - type: text
    content: Fa ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola
  - type: text
    content: ' tsy mba mahasaotra Anao, ny fahafatesana tsy mahadera Anao; Fa izay midina any an-davaka dia tsy mahazo manantena ny fahamarinanao. '
  '19':
  - type: text
    content: 'Ny velona dia ny velona ihany no hidera Anao, tahaka izao izaho anio izao; Ny ray hampahalala ny zanany ny fahamarinanao. '
  '2':
  - type: text
    content: 'Dia nitodika nankany amin''ny rindrina Hezekia ka nivavaka tamin''i Jehovah '
  '20':
  - type: text
    content: 'Jehovah efa vonona hamonjy Ahy, Ka dia hitendry ny lokangako ao an-tranon''i Jehovah izahay Amin''ny andro rehetra iainanay. '
  '21':
  - type: text
    content: 'Ary hoy Isaia: Makà ampempan''aviavy, ary apetaho amin''ny vay izany, mba ho sitrana izy. '
  '22':
  - type: text
    content: 'Ary hoy Hezekia: Inona no famantarana fa hiakatra ao an-tranon''i Jehovah aho?'
  '3':
  - type: text
    content: 'hoe: Jehovah ô, enga anie ka hotsarovanao ny nandehanako teo anatrehanao tamin''ny fahamarinana sy tamin''ny foko rehetra ary ny nanaovako izay tsara eo imasonao Dia nitomany mafy dia mafy izy.'
  '4':
  - type: text
    content: 'Dia tonga tamin''Isaia ny tenin''i Jehovah nanao hoe: '
  '5':
  - type: text
    content: 'Mandehana, ka lazao amin''i Hezekia hoe: Izao no lazain''i Jehovah, Andriamanitr''i Davida rainao: Efa nohenoiko ny fitarainanao, ary efa hitako ny ranomasonao; indro, hampiako dimy ambin''ny folo taona ny andronao, '
  '6':
  - type: text
    content: 'sady hamonjy anao sy ity tanàna ity amin''ny tanan''ny mpanjakan''i Asyria Aho; ary hiaro ity tanàna ity Aho. '
  '7':
  - type: text
    content: 'Ary izao no ho famantarana ho anao avy amin''i Jehovah, hahalalanao fa Jehovah hanao izay zavatra nolazainy: '
  '8':
  - type: text
    content: Indro, hampiverina ny aloka hàdiny
  - type: note
    content: Heb. ambaratonga
  - type: text
    content: ' folo Aho araka ny nampidinan''ny masoandro azy teo amin''ny dialin'
  - type: note
    content: Heb. ambaratonga
  - type: text
    content: ''' i Ahaza. Ka dia niverina hàdiny'
  - type: note
    content: Heb. ambaratonga
  - type: text
    content: ' folo ny masoandro, dia ilay efa nidinany.'
  '9':
  - type: text
    content: 'Ny teny nosoratan''i Hezekia, mpanjakan''ny Joda, raha narary izy ka sitrana tamin''ny aretiny:'
