document_id: ISA.18,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny haneken'ny Etiopiana an'i Jehovah noho ny handrenesany ny nandringanana ny Asyriana
  - type: text
    content: 'Indrisy ny tany be fibiziziokan''elatra! Izay any an-dafin''ny onin''i Etiopia, '
  '2':
  - type: text
    content: 'Izay mampandeha iraka eny ambonin''ny ranomasina, ao anaty lakan-jozoro ambonin''ny rano, ka manafatra azy hoe: Mandehana, ry iraka faingam-pandeha, ho any amin''ny firenena lava tsanganana'
  - type: note
    content: 'Na: ela fiainana'
  - type: text
    content: ' sady mandimandina, any amin''ny olona mahatahotra hatreto ka hatrany hatrany'
  - type: note
    content: 'Na: hatramin''ny niandohany ka mandraka ankehitriny'
  - type: text
    content: ', dia firenena mpanao teny tsy valiana'
  - type: note
    content: 'Na: matanjaka indindra; na: mahery mamaritra tany ho azy'
  - type: text
    content: ' sady maherisetra'
  - type: note
    content: Heb. manitsakitsaka
  - type: text
    content: ', izay vakin''ny ony maro ny taniny. '
  '3':
  - type: text
    content: 'Ry mponina rehetra amin''izao tontolo izao sy mpitoetra etỳ ambonin''ny tany! Raha misy faneva atsangana eo an-tampon-tendrombohitra, dia mijere ianareo, ary raha misy anjomara tsofina, dia mihainoa. '
  '4':
  - type: text
    content: Fa izao no nolazain'i Jehovah tamiko hangina Aho aloha ka hijery eto amin'ny fitoerako, raha mbola mipoaka tsara ny hainandro, ary misy
  - type: note
    content: 'Na: Toy ny hainandro mipoaka tsara sy ny'
  - type: text
    content: ' zavona'
  - type: note
    content: Heb; rahon'ando
  - type: text
    content: ' amin''ny hainandro fararano. '
  '5':
  - type: text
    content: 'Fa raha mbola tsy tonga ny fararano, rehefa tapitra ny fitsimohany, ka efa mby am-boany ny voniny, dia horantsanany amin''ny fanetezam-boaloboka ny rantsany, ary hotapahiny sy hesoriny ny sakeliny. '
  '6':
  - type: text
    content: 'Dia hafoy avokoa izy ho an''ny vorona mpihaza eny an-tendrombohitra sy ho an''ny biby eny ambonin''ny tany; ary ny vorona mpihaza handany fahavaratra any; Ary ny biby rehetra ambonin''ny tany handany ririnina any. '
  '7':
  - type: text
    content: Amin'izany andro izany dia hisy fanomezana ho entina ho an'i Jehovah, Tompon'ny maro, dia firenena lava tsanganana
  - type: note
    content: 'Na: ela fiainana'
  - type: text
    content: ' sady mandimandina, ary avy amin''ny firenena mahatahotra hatreto ka hatrany'
  - type: note
    content: 'Na: hatramin''ny niandohany ka mandraka ankehitriny'
  - type: text
    content: ' hatrany dia firenena mpanao teny tsy valiana'
  - type: note
    content: 'Na: matanjaka indrindra; na: mahary mamaritra tany ho azy'
  - type: text
    content: ' sady maherisetra'
  - type: note
    content: Heb. manitsakitsaka
  - type: text
    content: ', Izay vakin''ny ony maro ny taniny ho ao amin''ny fitoeran''ny anaran''i Jehovah, Tompon''ny maro, dia ny tendrombohitra Ziona.'
