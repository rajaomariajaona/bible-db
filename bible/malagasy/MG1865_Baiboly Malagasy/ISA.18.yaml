document_id: ISA.18,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny haneken'ny Etiopiana an'i Jehovah noho ny handrenesany ny nandringanana ny Asyriana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indrisy ny tany be fibiziziokan''elatra! Izay any an-dafin''ny onin''i Etiopia, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay mampandeha iraka eny ambonin''ny ranomasina, ao anaty lakan-jozoro ambonin''ny rano, ka manafatra azy hoe: Mandehana, ry iraka faingam-pandeha, ho any amin''ny firenena lava tsanganana'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ela fiainana'
      marker-yv: yv-n
    - type: text
      text: ' sady mandimandina, any amin''ny olona mahatahotra hatreto ka hatrany hatrany'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: hatramin''ny niandohany ka mandraka ankehitriny'
      marker-yv: yv-n
    - type: text
      text: ', dia firenena mpanao teny tsy valiana'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: matanjaka indindra; na: mahery mamaritra tany ho azy'
      marker-yv: yv-n
    - type: text
      text: ' sady maherisetra'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. manitsakitsaka
      marker-yv: yv-n
    - type: text
      text: ', izay vakin''ny ony maro ny taniny. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ry mponina rehetra amin''izao tontolo izao sy mpitoetra etỳ ambonin''ny tany! Raha misy faneva atsangana eo an-tampon-tendrombohitra, dia mijere ianareo, ary raha misy anjomara tsofina, dia mihainoa. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa izao no nolazain'i Jehovah tamiko hangina Aho aloha ka hijery eto amin'ny fitoerako, raha mbola mipoaka tsara ny hainandro, ary misy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Toy ny hainandro mipoaka tsara sy ny'
      marker-yv: yv-n
    - type: text
      text: ' zavona'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb; rahon'ando
      marker-yv: yv-n
    - type: text
      text: ' amin''ny hainandro fararano. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha mbola tsy tonga ny fararano, rehefa tapitra ny fitsimohany, ka efa mby am-boany ny voniny, dia horantsanany amin''ny fanetezam-boaloboka ny rantsany, ary hotapahiny sy hesoriny ny sakeliny. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hafoy avokoa izy ho an''ny vorona mpihaza eny an-tendrombohitra sy ho an''ny biby eny ambonin''ny tany; ary ny vorona mpihaza handany fahavaratra any; Ary ny biby rehetra ambonin''ny tany handany ririnina any. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amin'izany andro izany dia hisy fanomezana ho entina ho an'i Jehovah, Tompon'ny maro, dia firenena lava tsanganana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ela fiainana'
      marker-yv: yv-n
    - type: text
      text: ' sady mandimandina, ary avy amin''ny firenena mahatahotra hatreto ka hatrany'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: hatramin''ny niandohany ka mandraka ankehitriny'
      marker-yv: yv-n
    - type: text
      text: ' hatrany dia firenena mpanao teny tsy valiana'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: matanjaka indrindra; na: mahary mamaritra tany ho azy'
      marker-yv: yv-n
    - type: text
      text: ' sady maherisetra'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. manitsakitsaka
      marker-yv: yv-n
    - type: text
      text: ', Izay vakin''ny ony maro ny taniny ho ao amin''ny fitoeran''ny anaran''i Jehovah, Tompon''ny maro, dia ny tendrombohitra Ziona.'
