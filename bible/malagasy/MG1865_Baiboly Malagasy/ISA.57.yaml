document_id: ISA.57,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Maty ny marina, nefa tsy misy misaina izany, ary alaina ny olona tsara fanahy, nefa tsy misy mihevitra fa ny marina dia alaina tsy ho azon'ny loza hanjo
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: noho ny ratsy'
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho ny halavitry ny nalehanao dia sasatra ianao, nefa ianao tsy niteny hoe: kivy aho izany! Nahazo aina ny tananao, ka dia tsy nahatsiaro reraka ianao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary iza no nahinao sy natahoranao, no dia nandainga ianao ka tsy nahatsiaro ahy na nandatsaka am-po? Moa tsy efa nangina va Aho hatrizay hatrizay? Ka dia tsy natahotra Ahy ianao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izaho no hanambara ny fahamarinanao ary ny asanao dia tsy hahasoa anao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mitaraina ianao, dia aoka ireo maronao no hamonjy anao, nefa hongahan''ny rivotra avokoa ireo sy ho lasan''ny tso-drivotra malemilemy aza; Fa izay mialoka amiko kosa no hanana ny tany sy handova ny tendrombohitro masina. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Izy hilaza hoe: Manandrata, eny, manandrata ka manamboara lalana, esory izay mahatafintohina eny amin''ny alehan''ny oloko. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izao no lazain''ny Iray avo sy manerinerina, izay monina mandrakizay, masina no anarany: Ao amin''ny fitoerana avo sy masina no onenako, ary ao amin''ny torotoro fo sy ny manetry tena, hamelombelona ny fanahin''ny manetry tena sy hamelombelona ny fon''ny torotoro fo; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy hifandahatra mandrakariva Aho ary tsy ho tezitra mandrakizay; Fandrao ho reraka eo anatrehako ny fanahy, dia ny aina
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. fofonaina
      marker-yv: yv-n
    - type: text
      text: ' izay nataoko. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny helony noho ny fieremany no nahatezitra Ahy ka namelezako azy; fa niery Aho, satria tezitra, nefa niodina izy ka mbola nandroso tamin''ny lalana tian''ny fony ihany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nahita ny lalany Aho, nefa hahasitrana azy ihany, dia hitari-dalana azy Aho ka hampody ny fiononana ho aminy sy ho amin''ny malahelo ao aminy, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia Izaho Izay mahary ny vokatry ny molotra: Fiadanana, fiadanana ho an''izay lavitra sy ho an''izay akaiky! hoy Jehovah, ka dia hahasitrana azy Aho. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Miditra amin'ny fiadanana izy, mandry amin'ny fandriany avy izy, dia izay rehetra mizotra amin'ny hitsiny.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny ratsy fanahy dia tahaka ny ranomasina misamboaravoara, eny, tsy mety tafatoetra izy, ka ny ranony dia mamoaka loto sy fotaka. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy misy fiadanana ho an'ny ratsy fanahy, hoy Andriamanitro.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ianareo kosa dia mankanesa etỳ, ry zanaky ny mpanandro, ianareo taranaky ny mpaka vadin''olona sy ny mpijangajanga. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Iza no ihomehezanareo? Iza no isanasananareo vava sy itrangatranganareo lela? Tsy taranaky ny fiodinana va ianareo sady taranaky ny lainga
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: zanaky ny fijangajangana'
      marker-yv: yv-n
    - type: text
      text: '? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia ianareo izay mahamaimay ny fonareo amin'ny hazo terebinta
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: amin''ny sampy'
      marker-yv: yv-n
    - type: text
      text: ' eny ambanin''ny hazo maitso rehetra, ka mamono zaza eny an-dohasahan-driaka eny ambanin''ny tsefatsefaky ny harambato. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ao amin''ny vato kilonjy any an-dohasahan-driaka no anjaranao, eny, ireny ihany no anjaranao; ireny koa no nanidinanao fanatitra aidina sy nanateranao fanatitra hohanina. Hahatsindry fo amin''izany va Aho? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teo an-tampon''ny tendrombohitra avo sy manerinerina no nametrahanao ny fandrianao, ka tany no niakaranao hamono zavatra natao fanatitra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Teo ivohon'ny varavarana sy ny tolam-baravarana no nametrahanao ny fampahatsiarovana anao; fa lavitra Ahy no nitanjahanao sy niakaranao, eny, nataonao malalaka ny fandrianao, ary nanao fanekena ny amin'izay hataon'ireny ianao; tia ny fandriana aminy ianao ka nizaha toerana ho anao
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Ary nojerenao ny famantarana (Heb. tanana)'
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nivezivezy nankany amin'ny mpanjaka ianao nitondra
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: nihosotra'
      marker-yv: yv-n
    - type: text
      text: ' diloilo, ary nataonao betsaka ny zava-manitrao, sady nampandehanina hatrany lavitra any ny irakao, ka nidina'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: nietry'
      marker-yv: yv-n
    - type: text
      text: ' hatrany amin''ny fiainan-tsi-hita'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Sheola
      marker-yv: yv-n
    - type: text
      text: ' ianao. '
