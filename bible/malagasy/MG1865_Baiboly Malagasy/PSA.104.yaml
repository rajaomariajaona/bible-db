document_id: PSA.104,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fiderana an'Andriamanitra, Mpamorona sy Mpiahy izao rehetra izao
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Misaora an''i Jehovah, ry fanahiko. Jehovah Andriamanitro ô, lehibe indrindra Hianao, Famirapiratana sy voninahitra no fitafinao, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mampandeha loharano eny amin''ny lohasaha Izy; Eny anelanelan''ny tendrombohitra no alehan''ireny, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka isotroan''ny bibi-dia rehetra, Sy analan''ny boriki-dia ny hetahetany; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eo amboniny no itoeran''ny voro-manidina; Ary eo amin''ny ran-tsan-kazo no anenoany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manondra-drano ny tendrombohitra avy amin'ny tranony ambony Izy; Ny vokatry ny asanao no mahavoky ny tany.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mampaniry ahitra ho an''ny biby fiompy Izy Sy anana hahasoa ny olona. Ary mamoaka hanina avy amin''ny tany. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary divay izay mampifaly ny olona, ka mampinendonendo ny tavany mihoatra noho ny diloilo, Ary mofo hanohanana ny ain''ny olona. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voky ny hazon''i Jehovah, Dia ny sederan''i Libanona, izay namboleny; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay anaovan''ny voron-kely ny akaniny; Ary ny vano, dia ao amin''ny kypreso no anaovany ny tranony. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny tendrombohitra avo dia ho an'ny osi-dia; Ny harambato no fiarovana ho an'ny hyraka.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanao ny volana ho fotoana Izy, Ary ny masoandro mahalala ny filentehany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitafy ny mazava tahaka ny lamba Izy Ary mamelatra ny lanitra tahaka ny lay, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahatonga aizina Hianao, dia tonga ny alina, Ka mivezivezy ny biby rehetra any an''ala; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny liona tanora mierona maniry toha Ka mitady ny haniny avy amin''Andriamanitra. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miposaka ny masoandro, dia miverina ireny, Ary ao an-davany no amitsahany. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny olona kosa mivoaka ho any amin'ny taozavany, Sy ny asany mandra-paharivan'ny andro.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Endrey ny hamaroan'ny asanao, Jehovah ô! Fahendrena no nanaovanao azy rehetra; Henika ny zavatra nataonao
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ny harenao'
      marker-yv: yv-n
    - type: text
      text: ' ny tany.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro ny ranomasina sady lehibe no malalaka, Any no misy zava-mihetsiketsika tsy tambo isaina, Dia zava-miaina, na kely na lehibe. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Any no alehan'ny sambo Sy ny trozona, izay noforoninao hilaolao any
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: holaolaovinao'
      marker-yv: yv-n
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ireo rehetra ireo miandry Anao, Mba homenao ny haniny amin''ny fotoany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manome Hianao, dia manangona izy; Manokatra ny tananao Hianao, dia voky ny soa izy; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manafina ny tavanao Hianao, dia raiki-tahotra izy; Alainao indray ny ainy, dia maty izy Ka mody any amin''ny vovoka nanalana azy, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary mametraka ny rairain-drihan''ny tranony amin''ny rano, Sady manao ny rahona matevina ho kalesiny ka mandeha amin''ny elatry ny rivotra, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Maniraka ny Fanahinao Hianao, dia ary izy, Ary manavao ny tarehin'ny tany Hianao.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho mandrakizay anie ny voninahitr''i Jehovah; Aoka Jehovah hifaly amin''ny asany. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jereny ny tany, dia mihorohoro; Tendren''ny tànany ny tendrombohitra, dia midonaka. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hihira ho an''i Jehovah aho, raha mbola velona koa; Hankalaza an''Andriamanitro aho, raha mbola miaina. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho maminy anie ny fisainako Azy; Izaho no hifaly amin''i Jehovah. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho lany ringana tsy ho etỳ amin'ny tany ny mpanota, Ary ny ratsy fanahy tsy ho etỳ intsony. Misaora an'i Jehovah, ry fanahiko. Haleloia.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary manao ny rivotra ho irany Sy ny lelafo ho mpanompony
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Manao ny anjeliny ho rivotra Ary ny mpanompony ho lelafo'
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanorina ny tany tambonin''ny fanorenany Izy, Mba tsy hihetseha-ny mandrakizay doria. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny rano lalina no nasaronao azy tahaka ny lamba; Nandifotra ny tendrombohitra aza ireny. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho ny teny mafy nataonao dia nandositra ny tendrombohitra, Noho ny feon''ny kotrokoranao dia nirifatra izy '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisondrotra ny tendrombohitra, nietry ny lohasaha ho any amin''izay namboarinao hitoerany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nasianao fetra tsy hihoarany izy Mba tsy hiverina hanarona ny tany. '
