document_id: ISA.58,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fivavahana marina, sy ny fivavahana tsy izy
  - type: text
    content: 'Ezaho ny fiantsonao, fa aza atao malemy, Asandrato ny feonao ho tahaka ny an''ny anjomara, ka ambarao amin''ny oloko ny fahadisoany Ary amin''ny taranak''i Jakoba ny fahotany; '
  '10':
  - type: text
    content: 'Ary afoinao ho an''ny noana izay hanina tianao, ka mahavoky ny ory ianao, dia hiposaka ao amin''ny maizina ny fahazavanao, ary ny aizim-pitonao ho tahaka ny mitataovovonana; '
  '11':
  - type: text
    content: 'Ary Jehovah hitari-dalana anao mandrakariva sady hahavoky ny fanahinao ao amin''ny tany karankaina aza sy hampahatanjaka ny taolanao; dia ho tahaka ny saha vonton-drano ianao sy ho tahaka ny loharanao miboiboika izay tsy mety ritra. '
  '12':
  - type: text
    content: 'Ary izay taranakao no hanangana ny efa rava ela, ary ny naorina hatry ny fony fahagola no hamboarinao; ary ianao dia hatao hoe mpamboatra ny rava, mpamelon-dalana honenana amin''ny tany. '
  '13':
  - type: text
    content: Raha miaro ny tongotrao amin'ny Sabata ianao ka tsy manao izay tianao amin'ny androko masina, ary manao ny Sabata hoe Fahafinaretana, ary ny nohamasinin'i Jehovah hoe mendrika hohajaina, ka manome voninahitra azy
  - type: note
    content: 'Na: Azy'
  - type: text
    content: ' ary tsy mandeha amin''ny lalanao, na manao izay tianao, na miteniteny foana, '
  '14':
  - type: text
    content: Dia hiravoravo amin'i Jehovah ianao, ary hasandratro ao amin'ny havoana amin'ny tany ianao, sy hofahanako amin'ny lovan'i Jakoba rainao; Fa ny vavan'i Jehovah no efa niteny.
  '2':
  - type: text
    content: Nefa Izaho mbola tadiaviny ihany isan'andro isan'andro, ary ny hahalala ny lalako no sitrany. Tahaka ny firenena efa nanao ny marina ka tsy nahafoy ny fitsipik'Andriamaniny no fanontaniany amiko ny fitsipiky ny fahamarinana, sy aniriany ny hihavian
  - type: note
    content: 'Na: Sy fifaliany hanakaiky an'''
  - type: text
    content: '''Andriamanitra. '
  '3':
  - type: text
    content: Nahoana izahay no mifady, hoy izy, nefa tsy hitanao ? Ary nahoana izahay no mampahory ny tenanay, nefa tsy ahoanao? Indro fa amin'ny andro fifadianareo aza dia mbola ny tianareo
  - type: note
    content: Heb. hitanareo
  - type: text
    content: ' ihany no ataonareo, ary ny mpiasa rehetra ao aminareo dia ampahorinareo'
  - type: note
    content: 'Na: Ary mbola arosonareo fatratra ihany sy asanareo'
  - type: text
    content: .
  '4':
  - type: text
    content: 'Indro, ny hiady sy ny hifanditra no anton''ny ifadianareo ary ny hamely amin''ny totohondrin''ny faharatsiana; Izao fifadianareo izao dia tsy andrenesana ny feonareo any amin''ny avo. '
  '5':
  - type: text
    content: 'Moa fifadiana toy izany va no ankasitrahako? Dia andro hampahorian''ny olona tena? Ny hampiondrika ny lohany tahaka ny zozoro sy ny hamelatra lamba fisaonana rarahan-davenona ho fandriany, moa izany va no ataonao hoe fifadiana sy andro ankasitrahan''i Jehovah? '
  '6':
  - type: text
    content: 'Tsy izao va no fifadiana izay ankasitrahako: Dia ny hamaha ny famatoran''ny faharatsiana, sy hanaboraka ny fehin''ny zioga, sy handefa ny ampahorina ho afaka, ary hanapatapaka ny zioga rehetra? '
  '7':
  - type: text
    content: Moa tsy ny hizara ny mofonao ho an'ny noana va, sy ny hampiantrano ny ory manjenjena, ary mba hanafianao izay hitanao mitanjaka, ka tsy hihirim-belona amin'ny namanao
  - type: note
    content: Heb. hiery ny nofonao
  - type: text
    content: ' ianao? '
  '8':
  - type: text
    content: 'Fa raha izany, dia hiposaka tahaka ny fahazavan''ny maraina ny fahazavanao, ary ho tonga faingana ny fahasitrananao; ny fahamarinanao ho loha-lalanao, ary ny voninahitr''i Jehovah ho vodi-lalanao '
  '9':
  - type: text
    content: 'Ary amin''izany dia hiantso ianao, ary Jehovah hamaly; Eny, hanandratra ny feonao ianao, ary Izy hanao hoe: Inty Aho. Raha esorinao tsy ho eo aminao ny zioga sy ny fanondroan''ny fanondro sy ny fitenenan-dratsy, '
