document_id: ISA.58
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fivavahana marina, sy ny fivavahana tsy izy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ezaho ny fiantsonao, fa aza atao malemy, Asandrato ny feonao ho tahaka ny an''ny anjomara, ka ambarao amin''ny oloko ny fahadisoany Ary amin''ny taranak''i Jakoba ny fahotany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Nefa Izaho mbola tadiaviny ihany isan'andro isan'andro, ary ny hahalala ny lalako no sitrany. Tahaka ny firenena efa nanao ny marina ka tsy nahafoy ny fitsipik'Andriamaniny no fanontaniany amiko ny fitsipiky ny fahamarinana, sy aniriany ny hihavian
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Sy fifaliany hanakaiky an'''
    marker-yv: yv-n
  - type: text
    text: '''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nahoana izahay no mifady, hoy izy, nefa tsy hitanao ? Ary nahoana izahay no mampahory ny tenanay, nefa tsy ahoanao? Indro fa amin'ny andro fifadianareo aza dia mbola ny tianareo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hitanareo
    marker-yv: yv-n
  - type: text
    text: ' ihany no ataonareo, ary ny mpiasa rehetra ao aminareo dia ampahorinareo'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ary mbola arosonareo fatratra ihany sy asanareo'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Indro, ny hiady sy ny hifanditra no anton''ny ifadianareo ary ny hamely amin''ny totohondrin''ny faharatsiana; Izao fifadianareo izao dia tsy andrenesana ny feonareo any amin''ny avo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Moa fifadiana toy izany va no ankasitrahako? Dia andro hampahorian''ny olona tena? Ny hampiondrika ny lohany tahaka ny zozoro sy ny hamelatra lamba fisaonana rarahan-davenona ho fandriany, moa izany va no ataonao hoe fifadiana sy andro ankasitrahan''i Jehovah? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy izao va no fifadiana izay ankasitrahako: Dia ny hamaha ny famatoran''ny faharatsiana, sy hanaboraka ny fehin''ny zioga, sy handefa ny ampahorina ho afaka, ary hanapatapaka ny zioga rehetra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Moa tsy ny hizara ny mofonao ho an'ny noana va, sy ny hampiantrano ny ory manjenjena, ary mba hanafianao izay hitanao mitanjaka, ka tsy hihirim-belona amin'ny namanao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hiery ny nofonao
    marker-yv: yv-n
  - type: text
    text: ' ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa raha izany, dia hiposaka tahaka ny fahazavan''ny maraina ny fahazavanao, ary ho tonga faingana ny fahasitrananao; ny fahamarinanao ho loha-lalanao, ary ny voninahitr''i Jehovah ho vodi-lalanao '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary amin''izany dia hiantso ianao, ary Jehovah hamaly; Eny, hanandratra ny feonao ianao, ary Izy hanao hoe: Inty Aho. Raha esorinao tsy ho eo aminao ny zioga sy ny fanondroan''ny fanondro sy ny fitenenan-dratsy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary afoinao ho an''ny noana izay hanina tianao, ka mahavoky ny ory ianao, dia hiposaka ao amin''ny maizina ny fahazavanao, ary ny aizim-pitonao ho tahaka ny mitataovovonana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary Jehovah hitari-dalana anao mandrakariva sady hahavoky ny fanahinao ao amin''ny tany karankaina aza sy hampahatanjaka ny taolanao; dia ho tahaka ny saha vonton-drano ianao sy ho tahaka ny loharanao miboiboika izay tsy mety ritra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary izay taranakao no hanangana ny efa rava ela, ary ny naorina hatry ny fony fahagola no hamboarinao; ary ianao dia hatao hoe mpamboatra ny rava, mpamelon-dalana honenana amin''ny tany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Raha miaro ny tongotrao amin'ny Sabata ianao ka tsy manao izay tianao amin'ny androko masina, ary manao ny Sabata hoe Fahafinaretana, ary ny nohamasinin'i Jehovah hoe mendrika hohajaina, ka manome voninahitra azy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Azy'
    marker-yv: yv-n
  - type: text
    text: ' ary tsy mandeha amin''ny lalanao, na manao izay tianao, na miteniteny foana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia hiravoravo amin'i Jehovah ianao, ary hasandratro ao amin'ny havoana amin'ny tany ianao, sy hofahanako amin'ny lovan'i Jakoba rainao; Fa ny vavan'i Jehovah no efa niteny.
