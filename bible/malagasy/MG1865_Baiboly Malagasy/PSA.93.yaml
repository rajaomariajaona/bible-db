document_id: PSA.93
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiandrianan'Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jehovah no Mpanjaka mitafy voninahitra Izy; Jehovah mitafy, eny, misikina hery Izy; Ary izao rehetra izao nampitoerina ka tsy hihetsika. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ny seza fiandriananao nampitoerina hatramin''ny fahagola; Hatrizay hatrizay Hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mamandra-peo ny riaka, Jehovah ô, Eny, manandra-peo ny riaka; Mampirohondrohona ny feony ny riaka. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mihoatra noho ny rano sady be no mahery, Eny, mihoatra noho ny onjan-dranomasina lehibe, Ny voninahitr''i Jehovah any amin''ny avo. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny teni-vavolombelonao dia marina indrindra; Fahamasinana no mendrika ny tranonao mandritra ny andro maro, Jehovah ô.
