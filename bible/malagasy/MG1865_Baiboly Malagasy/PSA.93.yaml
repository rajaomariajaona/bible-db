document_id: PSA.93,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiandrianan'Andriamanitra
  - type: text
    content: 'Jehovah no Mpanjaka mitafy voninahitra Izy; Jehovah mitafy, eny, misikina hery Izy; Ary izao rehetra izao nampitoerina ka tsy hihetsika. '
  '2':
  - type: text
    content: 'Ny seza fiandriananao nampitoerina hatramin''ny fahagola; Hatrizay hatrizay Hianao. '
  '3':
  - type: text
    content: 'Mamandra-peo ny riaka, Jehovah ô, Eny, manandra-peo ny riaka; Mampirohondrohona ny feony ny riaka. '
  '4':
  - type: text
    content: 'Mihoatra noho ny rano sady be no mahery, Eny, mihoatra noho ny onjan-dranomasina lehibe, Ny voninahitr''i Jehovah any amin''ny avo. '
  '5':
  - type: text
    content: Ny teni-vavolombelonao dia marina indrindra; Fahamasinana no mendrika ny tranonao mandritra ny andro maro, Jehovah ô.
