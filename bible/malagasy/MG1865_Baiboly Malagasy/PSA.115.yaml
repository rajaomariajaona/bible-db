document_id: PSA.115,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fampitahana an'Andriamanitry ny Isiraely sy ny sampin'ny Jentilisa
  - type: text
    content: Jehovah ô, aza izahay, aza izahay no omena voninahitra, Fa ny anaranao ihany, Noho ny famindram-ponao sy ny fahamarinanao.
  '10':
  - type: text
    content: 'Ry taranak''i Arona ô, matokia an''i Jehovah; Heriny sy ampingany Izy. '
  '11':
  - type: text
    content: Hianareo izay matahotra an'i Jehovah, matokia an'i Jehovah; Heriny sy ampingany Izy.
  '12':
  - type: text
    content: 'Jehovah mahatsiaro ka mitahy antsika; Hitahy ny taranak''i Isiraely Izy; Hitahy ny taranak''i Arona Izy; '
  '13':
  - type: text
    content: 'Hotahiny izay matahotra an''i Jehovah, Na ny kely na ny lehibe. '
  '14':
  - type: text
    content: 'Jehovah anie hampitombo anareo, Dia ianareo mbamin''ny zanakareo. '
  '15':
  - type: text
    content: Hitahy anareo anie Jehovah, Mpanao ny lanitra sy ny tany.
  '16':
  - type: text
    content: 'Ny lanitra dia an''i Jehovah: fa ny tany nomeny ho an''ny zanak''olombelona. '
  '17':
  - type: text
    content: 'Ny maty tsy mba hidera an''i Jehovah. Na izay midina any amin''ny mangingina; '
  '18':
  - type: text
    content: Fa izahay hisaotra an'i Jehovah Hatramin'izao ka ho mandrakizay. Haleloia.
  '2':
  - type: text
    content: 'Nahoana ny jentilisa no manao hoe: Aiza izay Andriamaniny? '
  '3':
  - type: text
    content: 'Nefa any an-danitra Andriamanitsika; Efa nanao izay sitrapony rehetra Izy. '
  '4':
  - type: text
    content: 'Volafotsy sy volamena ny sampin''ireny, Asan''ny tanan''olona: '
  '5':
  - type: text
    content: 'Manam-bava izy. fa tsy miteny; Mana-maso izy, fa tsy mahita; '
  '6':
  - type: text
    content: 'Manan-tsofina izy, fa tsy mandre; Manana orona izy, fa tsy manimbolo: '
  '7':
  - type: text
    content: 'Manan-tanana izy, fa tsy mandray; Manan-tongotra izy, fa tsy mandeha; Ary tsy mahaloa-peo ny tendany. '
  '8':
  - type: text
    content: Ho tahaka azy izay manao azy Sy izay rehetra matoky azy.
  '9':
  - type: text
    content: 'Ry Isiraely ô, matokia an''i Jehovah; Heriny sy ampingany Izy. '
