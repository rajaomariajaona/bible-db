document_id: PSA.115,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fampitahana an'Andriamanitry ny Isiraely sy ny sampin'ny Jentilisa
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Jehovah ô, aza izahay, aza izahay no omena voninahitra, Fa ny anaranao ihany, Noho ny famindram-ponao sy ny fahamarinanao.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ry taranak''i Arona ô, matokia an''i Jehovah; Heriny sy ampingany Izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Hianareo izay matahotra an'i Jehovah, matokia an'i Jehovah; Heriny sy ampingany Izy.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Jehovah mahatsiaro ka mitahy antsika; Hitahy ny taranak''i Isiraely Izy; Hitahy ny taranak''i Arona Izy; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Hotahiny izay matahotra an''i Jehovah, Na ny kely na ny lehibe. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Jehovah anie hampitombo anareo, Dia ianareo mbamin''ny zanakareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Hitahy anareo anie Jehovah, Mpanao ny lanitra sy ny tany.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ny lanitra dia an''i Jehovah: fa ny tany nomeny ho an''ny zanak''olombelona. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ny maty tsy mba hidera an''i Jehovah. Na izay midina any amin''ny mangingina; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Fa izahay hisaotra an'i Jehovah Hatramin'izao ka ho mandrakizay. Haleloia.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Nahoana ny jentilisa no manao hoe: Aiza izay Andriamaniny? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Nefa any an-danitra Andriamanitsika; Efa nanao izay sitrapony rehetra Izy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Volafotsy sy volamena ny sampin''ireny, Asan''ny tanan''olona: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Manam-bava izy. fa tsy miteny; Mana-maso izy, fa tsy mahita; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Manan-tsofina izy, fa tsy mandre; Manana orona izy, fa tsy manimbolo: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Manan-tanana izy, fa tsy mandray; Manan-tongotra izy, fa tsy mandeha; Ary tsy mahaloa-peo ny tendany. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ho tahaka azy izay manao azy Sy izay rehetra matoky azy.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ry Isiraely ô, matokia an''i Jehovah; Heriny sy ampingany Izy. '
