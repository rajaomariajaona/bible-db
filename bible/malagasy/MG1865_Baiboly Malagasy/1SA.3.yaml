document_id: 1SA.3,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny niantsoana an'i Samoela ho mpaminanin'Jehovah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Samoela zaza nanao fanompoam-pivavahana tamin''i Jehovah teo anatrehan''i Ely. Ary tamin''izany andro izany efa nahàlana ny tenin''i Jehovah: tsy nisy fahitana niseho loatra.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary avy Jehovah, dia nitsangana ka niantso toy ny teo ihany hoe: Ry Samoela, ry Samoela ô! Dia namaly Samoela hoe: Mitenena, fa mihaino ny mpanomponao. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Jehovah tamin''i Samoela: Indro, Izaho hanao zavatra eo amin''ny Isiraely, ka izay rehetra mandre izany, dia hangintsingintsina ny sofiny roa. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amin''izany andro izany dia hotanterahiko amin''i Ely izay zavatra rehetra voalazako ny amin''ny taranany: hatomboko izany, ka dia hotanterahiko. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa efa nambarako taminy fa hotsaraiko mandrakizay ny taranany noho ny heloka izay fantany, satria ny zanany nahatonga ozona ho an''ny tenany, nefa tsy nosakanany. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izany no nianianako ny amin''ny taranak''i Ely fa tsy hisy fanatitra hahafaka ny helony mandrakizay. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nandry Samoela mandra-pahamarain''ny andro, dia namoha ny varavaran''ny tranon''i Jehovah izy. Ary Samoela natahotra hilaza ny fahitana tamin''i Ely. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Ely niantso an''i Samoela ka nanao hoe: Ry Samoela, zanako! Dia hoy izy: Inty aho. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy izy: Inona no zavatra nolazain''i Jehovah taminao? masìna ianao, aza afeninao ahy; hataon''Andriamanitra aminao anie izany, eny, mihoatra noho izany aza, raha nisy afeninao ahy ny zavatra rehetra nolazainy taminao. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nambaran''i Samoela azy avokoa ny zavatra rehetra, ka tsy nisy nafeniny azy. Dia hoy Ely: Izy no Jehovah, aoka Izy hanao izay sitraky ny fony.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nitombo Samoela, sady nomba azy Jehovah, ka tsy nisy navelany ho raraka an-tany ny teniny. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin''izany andro izany, raha nandry tao amin''ny fandriany Ely (efa pahina ny masony, ka tsy nahita izy), '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny Isiraely rehetra hatrany Dana ka hatrany Beri-sheba nahalala fa efa mpaminanin''i Jehovah tokoa Samoela. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niseho tao Silo indray Jehovah; fa niseho tamin'i Samoela tao Silo Jehovah tamin'ny teniny.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady tsy mbola maty ny jiron''Andriamanitra, ary Samoela efa nandry tao amin''ny tempolin''i Jehovah, izay nisy ny fiaran''Andriamanitra, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia niantso an''i Samoela Jehovah, ary izy namaly hoe: Inty aho. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nihazakazaka nankeo amin''i Ely izy ka nanao hoe: Inty aho, fa niantso ahy ianao. Fa hoy Ely: Tsy niantso aho, andeha mandry ihany. Dia lasa nandry izy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah niantso azy indray hoe: Ry Samoela! Dia nifoha Samoela ka nankao amin''i Ely ary nanao hoe: Inty aho, fa niantso ahy ianao. Fa hoy izy: Tsy niantso aho, anaka; andeha mandry ihany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary Samoela tsy mbola nahalala an'i Jehovah, sady tsy mbola nanehoana ny tenin'i Jehovah izy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jehovah niantso an''i Samoela indray fanintelony. Dia nifoha izy ka nankao amin''i Ely ary nanao hoe: Inty aho, fa niantso ahy ianao. Dia fantatr''i Ely fa Jehovah no niantso ny zaza. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy Ely tamin''i Samoela: Andeha mandry ihany; ary raha tàhiny miantso anao Izy, dia valio hoe: Mitenena, Jehovah ô; fa mihaino ny mpanomponao. Dia lasa Samoela nandry tao amin''ny fandriany. '
