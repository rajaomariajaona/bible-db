document_id: PSA.54
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fangataham-pamonjena amin'Andriamanitra sy fahatokiana Azy, na dia be aza ny fahavalo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Hampiarahina amin''ny valiha. Maskila nataon''i Davida, fony tonga ny Zifita ka nanao tamin''i Saoly hoe: Tsy miery any aminay va Davida? Vonjeo amin''ny anaranao aho, Andriamanitra ô, ary omeo rariny aho araka ny herinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Andriamanitra ô, henoy ny fivavako; mihainoa ny tenin''ny vavako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa olona hafa firenena no mitsangana hamely ahy, ary olon-dozabe no mitady ny aiko; tsy mihevitra an'Andriamanitra ho eo anatrehany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Indro, Andriamanitra no Mpamonjy ahy; ny Tompo no Mpanohana ny fanahiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hamaly ny ratsy ataon''ny mpampahory ahy Izy; aoka ny fahamarinanao no handringananao azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Sitrapoko ihany no hanaterako fanatitra ho Anao; hidera ny anaranao aho, Jehovah ô, fa tsara izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fa efa namonjy ahy ho afaka tamin'ny fahoriana rehetra Izy; ary ny masoko dia faly mijery ny amin'ny fahavaloko.
