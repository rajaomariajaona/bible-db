document_id: PSA.74,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainana tamin'Andriamanitra, satria mafy ny fanenjehana, sady nosimbàna ny tempoly
  - type: text
    content: 'Maskila nataon''i Asafa. Andriamanitra ô, nahoana no nanary anay mandrakizay Hianao, sady manetroka amin''ny ondry fiandrinao ny fahatezeranao? '
  '10':
  - type: text
    content: 'Mandra-pahoviana, Andriamanitra ô, no hanaratsian''ny mpandrafy? Hanamavo ny anaranao mandrakizay va ny fahavalo? '
  '11':
  - type: text
    content: Nahoana no mampihemotra ny tananao, dia ny tananao ankavanana, Hianao? mampialà azy amin'ny tratranao, ka mandringàna.
  '12':
  - type: text
    content: 'Fa Andriamanitra no Mpanjakako hatrizay hatrizay; manao famonjena eny amin''ny tany Izy. '
  '13':
  - type: text
    content: 'Nampisaraka ny ranomasina tamin''ny herinao Hianao; efa namakivaky ny lohan''ny dragona tao anaty rano Hianao. '
  '14':
  - type: text
    content: 'Hianao nanorotoro ny lohan''ny mamba ka nanome azy hohanin''izay firenena any an-efitra. '
  '15':
  - type: text
    content: 'Hianao namaky ny vatolampy hamoaka loharano sy ony; Hianao nahatankina ny ony tsy mety ritra. '
  '16':
  - type: text
    content: 'Anao ny andro, Anao koa ny alina; Hianao namboatra ny fanazavana, indrindra fa ny masoandro. '
  '17':
  - type: text
    content: Hianao nametra ny faritry ny tany rehetra; ny fahavaratra sy ny ririnina, dia Hianao no nanao azy.
  '18':
  - type: text
    content: 'Tsarovy izao: Manaratsy an''i Jehovah ny fahavalo, ary ny olona adala manamavo ny anaranao. '
  '19':
  - type: text
    content: 'Aza manolotra ny ain''ny voromailalanao ho an''ny bibi-dia; ary aza manadino mandrakizay ny ain''ny olo-mahantranao. '
  '2':
  - type: text
    content: 'Tsarovy ny fiangonanao izay efa azonao fahiny, ilay navotanao ho firenena lovanao, dia ny tendrom-bohitra Ziona izay nonenanao. '
  '20':
  - type: text
    content: 'Hevero ny fanekena; fa feno fonenan''ny fandozana ny fitoera-maizina amin''ny tany. '
  '21':
  - type: text
    content: Aoka tsy hiverina amin-kenatra ny mahantra; aoka ny ory sy ny malahelo hidera ny anaranao.
  '22':
  - type: text
    content: 'Mitsangàna, Andriamanitra ô, efao ny adinao; tsarovy ny fanaratsian''ny adala Anao isan''andro. '
  '23':
  - type: text
    content: Aza manadino ny feon'ny rafinao, dia ny fitabataban'ny mpanohitra Anao, izay miakatra mandrakariva.
  '3':
  - type: text
    content: 'Aingao ny tongotrao, ka miakara ho amin''ny voarava mandrakizay; ny zavatra rehetra tao amin''ny fitoerana masina dia simban''ny fahavalo avokoa. '
  '4':
  - type: text
    content: 'Nierona tao anatin''ny fiangonanao ny mpandrafy anao; nanangana ny sainany ho famantarana izy. '
  '5':
  - type: text
    content: 'Ny fijery azy dia tahaka ny olona manainga famaky hijinja ny ala mikitroka; '
  '6':
  - type: text
    content: 'Ary amin''izao ny rafitra misoratra rehetra ao dia asiany ny famaky sy ny kanonta. '
  '7':
  - type: text
    content: Efa nandoro ny fitoeranao masina tamin'ny afo izy; nolotoiny sy nazerany tamin'ny tany
  - type: note
    content: 'Heb: Nolotoiny hatramin''ny tany'
  - type: text
    content: ' ny fonenan''ny anaranao. '
  '8':
  - type: text
    content: 'Hoy izy tam-pony: aoka hampahorintsika avokoa izy. Efa nandoro ny tranon''Andriamanitra eran''ny tany rehetra izy. '
  '9':
  - type: text
    content: 'Tsy hitanay ny famantaranay tsy misy mpaminany intsony ary tsy misy aminay mahalala izay mbola haharetan''izao. '
