document_id: OBA.1,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahitan'i Obadia ny amin'ny handravana an'i Edoma mbamin'ny jentilisa sasany noho ny ratsy nataony tamin'ny Isiraely, ary ny hampiorenana ny fanjakan'i Jehovah any Ziona
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fahitan''i Obadia. Izao no lazain''i Jehovah Tompo ny amin''i Edoma: Nahare filazana avy tamin''i Jehovah izahay, Ary nisy iraka nalefa ho any amin''ny jentilisa hanao hoe: Mitsangàna, aoka isika hitsangana hanafika azy! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Noho ny fampahoriana an''i Jakoba rahalahinao dia ho voasaron-kenatra ianao Ka ho fongotra mandrakizay. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tamin'ilay andro namitsahanao
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. nijanonanao
      marker-yv: yv-n
    - type: text
      text: ' teny am-pita, Tamin''ny andro namaboan''ny vahiny ny fananany, Sy nidiran''ny hafa firenena teo amin''ny vavahadiny, Ary nanaovany loka an''i Jerosalema, Dia mba toy ny anankiray tamin''ireny koa ianao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza finaritra mijery ny andron''ny rahalahinao amin''ny andro ahitany loza izay tsy misy toa izany; Ary aza mifaly ny amin''ny taranak''i Joda amin''ny andro andringanana azy; Ary aza manao teny miavonavona amin''ny andro fahoriana '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aza miditra amin''ny vavahadin''ny oloko amin''ny andro ahitany loza; Aza finaritra mijery ny fahantrany amin''ny andro ahitany loza ianao, Ary aza maninji-tàna haka ny fananany amin''ny andro ahitany loza '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aza mamitsaka
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. mijanona
      marker-yv: yv-n
    - type: text
      text: ' eo amin''ny sampanan-dalana hamono izay afa-nandositra ianao; Ary aza manolotra izay sisa aminy amin''ny andro fahoriana. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa efa antomotra amin''ny jentilisa rehetra ny andron''i Jehovah; Toy ny nataonao no mba hatao aminao kosa; Eny, hitsingerina ho eo an-dohanao ny nataonao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa toy ny nisotroanareo teo an-tendrombohitra masina, Dia toy izany koa no hisotroan''ny firenena rehetra mandrakariva, Eny, hisotro izy ka hitelina, Ary ho toy ny tsy ary izy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ao an-tendrombohitra Ziona dia hisy izay sisa afaka, Ary ho masina izy; Ary ny taranak''i Jakoba hahalasa ny fananany. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny taranak''i Jakoba ho afo, Ary ny taranak''i Josefa ho lelafo, Fa ny taranak''i Esao kosa ho vodivary, Ary harehitr''ireny izy ka holevoniny; Ary tsy hisy sisa afaka ny taranak''i Esao, Fa Jehovah no efa niteny. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny any amin'ny tany atsimo no hahalasa ny tendrombohitr'i Esao;Ary ny any amin'ny tany lemaka amoron-tsiraka
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. sefela
      marker-yv: yv-n
    - type: text
      text: ' no hahalasa ny Filistina; Hahalasa ny tanin''ny Efraima sy ny tany Samaria izy; Ary Benjamina hahalasa an''i Gileada. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, hataoko tsinontsinona eo amin''ny firenena ianao, Eny, ho fanazimbazimba indrindra ianao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ny babo amin'izao Zanak'Isiraely maro be izao hahalasa ny Kananita hatrany Zarefata, Ary ny babo
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: marobe izao, izay any amin''ny Kananita hatrany Zerefata, sy ny babo, etc..'
      marker-yv: yv-n
    - type: text
      text: ' tany Jerosalema, izay any Sefarada, dia hahalasa ny tanàna any amin''ny tany atsimo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hisy mpamonjy miakatra ho ao an-tendrombohitra Ziona Hitsara ny tendrombohitr'i Esao; Ary ho an'i Jehovah Jon 1:1
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny avonavon''ny fonao no namitaka anao, Ry ilay monina ao an-tsefatsefaky ny harambato, Any amin''ny fonenana avo, Sady manao anakampo hoe: Iza no hampivarina ahy ho eny an-tany? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Na dia miakatra tahaka ny voromahery aza ianao Ka mametraka ny akaninao eny amin''ny kintana, Dia havariko avy eny ianao, hoy Jehovah. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha, tahìny misy mpangalatra, na jiolahy alina, tonga ao aminao, (Indrisy, fongotra ianao!) Moa tsy izay hahafa-po azy ihany va no hangalariny ? Raha tahìny misy mpioty voaloboka tonga ao aminao, Moa tsy hamela voaloboka sisa hotsimponina va izy? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Endrey ny fitady ny an''i Esao! Endrey ny fikatsaka ny hareny miafina! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny olona rehetra izay vita fanekena taminao no nampandeha anao hatramin''ny sisin-tany; Izay tsara fihavanana aminao no namitaka ka naharesy anao; Izay mihinana ny haninao no namela-pandrika ao ambaninao Tsy misy fahalalana ao aminy! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa tsy amin''izany andro izany va, hoy Jehovah, no hamongorako ny olon-kendry ao Edoma, Sy ny manan-tsaina ao an-tendrombohitr''i Esao? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ho raiki-tahotra ny lehilahy maherinao, ry Temana, Mba haringana amin''ny vonoana ho foana ny any an-tendrombohitr''i Esao. '
