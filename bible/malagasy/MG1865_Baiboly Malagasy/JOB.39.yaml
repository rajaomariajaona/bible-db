document_id: JOB.39
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fantatrao va ny fotoana fiterahan'ny osi-dia any amin'ny harambato? Voahevitrao va ny fiterahan'ny dieravavy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mahisa ny andro ahatanterahany
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ny volana taperiny
    marker-yv: yv-n
  - type: text
    text: ' va ianao? Ary fantatrao va ny fotoana fiterahany?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Miondrika izy ka teraka, sady alefany ny faharariany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Donga ny zanany, mihalehibe any an-efitra ireny; Mivoaka izy ka tsy mety miverina intsony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Iza moa no nandefa ny boriki-dia ho karenjy? Ary iza no namaha ny fatoran'ny boriki-dia,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Izay nomeko ny tani'hay ho fitoerany ary ny tanin-tsira ho fonenany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ihomehezany ny fitabatabana ao an-tanàna; Tsy ahoany akory ny fiantsoantson'ny mpampandeha;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Any an-tendrombohitra rehetra any no fihinanany, ary mitady ny zava-maitso rehetra izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mba mety manompo anao va ny ombimanga na handry ao am-pahitrao amin'ny alina?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mahafatotra ny ombimanga amin'ny mahazaka ho ao am-bavasanao va ianao? Na mety manaraka anao handravona bainga any an-dohasaha va izy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Azonao itokiana va izy satria lehibe ny heriny? Ary havelanao hataony va ny asanao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Azonao itokiana hitondra ny varinao mody va izy sy hanangona izany ho eo am-pamoloanao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mikopakopaka noho ny fifaliana ny elatry ny ostritsa; Nefa mahalemy fanahy azy va ny elany sy ny volony?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tsia, fa mandao ny atodiny ao amin'ny tany izy ka mamela azy ho afanain'ny vovoka,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary tsy ahiny izay ho voaporitry ny tongotra ireo. Na ho voahitsaky ny bibi-dia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tsy tia ny zanany izy fa ataony hoatra ny tsy azy ireny; Efa very foana izay nisasarany, nefa tsy ahoany akory izany;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa efa nampanadinoin'Andriamanitra ny fahendrena izy, ary Tsy nomeny anjara fahalalana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Raha mikopakopak'elatra toa hanidina izy, dia ihomehezany ny soavaly sy ny mpitaingina azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Moa manome hery ny soavaly va ianao, na manarona vombo mihofahofa ny vozony?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mahay mampitsipika azy tahaka ny valala va ianao? Mahatsiravina ny hamafin'ny fiefonefony!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mihehy ao amin'ny lohasaha izy ka mifalifaly noho ny heriny; Mandroso hanetra ny ady
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. fiadiana
    marker-yv: yv-n
  - type: text
    text: ' izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Mihomehy ny tahotra izy, fa tsy mety mivadi-po. Ary tsy mianotra amin'ny sabatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mifioka eny amboniny ny zana-tsipìka
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. tranon-jana-tsipìka
    marker-yv: yv-n
  - type: text
    text: ' sy ny lefona manelatselatra ary ny lefom-pohy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Miriotra mafy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Mitelina ny tany
    marker-yv: yv-n
  - type: text
    text: ' amin''ny fahavinirana sy ny fahatezerana izy ka tsy mety mijanona intsony, rehefa maneno ny anjomara'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Tsy mino izy fa feon''ny anjomara izany'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Na oviana na oviana no anenoan'ny anjomara dia mihiaka izy. Ary manimbolo ny ady izy, raha mbola lavitra, dia ny akoralava sy ny fitabataban'ny manamboninahitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ny fahendrenao va no mampanidina ny hitsikitsika sy mampamelatra ny elany hianatsimo?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Noho ny didinao va no iakaran'ny voromahery sy anaovany ny akaniny eny an-dringiringy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Eny amin'ny harambato no itoerany sy anaovany ny akaniny, dia eo an-tampon'ny harambato sy ao amin'ny fiarovana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Any no itazanany remby; Mahatsinjo lavitra ny masony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mitsentsitra rà ny zanany, ary izay itoeran'ny faty dia any izy.
