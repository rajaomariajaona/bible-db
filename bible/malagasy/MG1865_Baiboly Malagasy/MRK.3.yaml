document_id: MRK.3,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niditra tao amin''ny synagoga indray Jesosy: ary nisy lehilahy anankiray maty'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. efa maina, na malazo
      marker-yv: yv-n
    - type: text
      text: ' tanana teo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa efa nahasitrana olona maro Izy, ka dia nifanety taminy mba hanendry Azy izay rehetra nanana aretina
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. kapoka
      marker-yv: yv-n
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny fanahy maloto, raha nahita Azy dia niankohoka teo anatrehany ka niantso hoe: Hianao no Zanak''Andriamanitra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nandrara azy mafy Izy tsy hanao izay hahafantarana Azy.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niakatra teo an-tendrombohitra Jesosy ka niantso izay tiany hankeo aminy; dia nankeo aminy ireo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanendry roa ambin''ny folo lahy Izy ho ao aminy sy hirahiny hitori-teny '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sady hanana fahefana hamoaka ny demonia. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Simona dia nomeny anarana hafa koa hoe Petera; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary Jakoba, zanak''i Zebedio, sy Jaona, rahalahin''i Jakoba; izy mirahalahy dia nomeny anarana hafa koa hoe Boaneryjesy, izany hoe Zana-baratra; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary Andrea sy Filipo sy Bartolomeo sy Matio sy Tomasy sy Jakoba, zanak'i Alfeo, sy Tadeo sy Simona Kananeana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Zelota, izahao Lio.6.15'
      marker-yv: yv-n
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary Jodasy Iskariota, ilay namadika Azy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nizaha taratra Azy ny olona, na hahasitrana io amin''ny Sabata Izy na tsia, mba hiampanganany Azy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary niditra tao an-trano Izy, dia niangona indray ny vahoaka, ka dia tsy nahazo nihinan-kanina akory Izy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny havany, raha nandre, dia nivoaka hihazona Azy; fa hoy ireo: Efa very saina Izy. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny mpanora-dalàna izay nidina avy tany Jerosalema dia nanao hoe: Manana an''i Belzeboba Izy, sy hoe: Ny lohan''ny demonia no amoahany ny demonia. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa niantso ireo hankeo aminy Izy, dia nanao fanoharana taminy hoe: Hataon''i Satana ahoana no famoaka an''i Satana? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha misy fanjakana miady an-trano, dia tsy haharitra izany fanjakana izany. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha misy mpiray trano miady an-trano, dia tsy haharitra izany mpiray trano izany. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha Satana no mitsangana hanohitra ny tenany ka miady an-trano, dia tsy haharitra izy, fa ho rava ny heriny. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa tsy misy olona afaka miditra ao an-tranon''ny mahery ka handroba ny entany, raha tsy afatony aloha ilay mahery, dia vao robainy ny ao an-tranony. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lazaiko aminareo marina tokoa: Hahazo famelan-keloka ny zanak''olombelona amin''ny ota rehetra sy ny fitenenan-dratsy'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr.blasfemia; izahao Mat. 9.3
      marker-yv: yv-n
    - type: text
      text: ' rehetra izay ataony; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa izay miteny ratsy ny Fanahy Masina kosa dia tsy mahazo famelan-keloka mandrakizay, fa miendrika hohelohina ny amin''ny ota mandrakizay izy; izany no nolazainy, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hoy Jesosy tamin''ilay lehilahy maty tanana: Mitsangàna etsy afovoany. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'satria ny olona nanao hoe: Azom-panahy maloto Izy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary avy ny reniny mbamin''ny rahalahiny ka nijanona teo ala-trano, dia naniraka tao aminy hiantso Azy. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny vahoaka nipetraka manodidina Azy ka nanao taminy hoe: Indreo, ato ala-trano ny reninao sy ny rahalahinao mitady Anao. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Izy namaly azy ka nanao hoe: Iza no reniko sy rahalahiko? '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nijery izay nipetraka manodidina Azy Izy, dia hoy Izy: Indreo ny reniko sy ny rahalahiko! '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa na iza na iza no manao ny sitrapon'Andriamanitra, dia izy no rahalahiko sy anabaviko ary reniko.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy koa Izy tamin''ny olona: Inona moa no mety hatao amin''ny Sabata, ny manao soa va, sa ny manao ratsy? ny mamonjy aina va, sa ny mahafaty? Fa tsy nety niteny ny olona. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nijerijery azy tamin''ny fahatezerana Izy sady nalahelo noho ny hamafin''ny fony, dia hoy Izy tamin-dralehilahy: Ahinjiro ny tananao. Dia nahinjiny, ka sitrana ny tànany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary lasa nivoaka ny Fariseo, ka niaraka tamin''izay dia niray tetika tamin''ny Herodiana izy hanohitra an''i Jesosy mba hahafaty Azy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Jesosy mbamin''ny mpianany niala teo ka nankany amin''ny ranomasina; ary nisy olona maro avy tany Galilia nanaraka Azy; ary nisy olona maro koa avy tany Jodia '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sy Jerosalema sy Edoma sy tany an-dafin''i Jordana ary tamin''ny tany manodidina an''i Tyro sy Sidona nandre izay zavatra nataony, dia nankeo aminy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Izy nilaza tamin''ny mpianany mba hanisy sambokely hiandry Azy noho ny habetsahan''ny vahoaka, fandrao mifanety aminy ireo. '
