document_id: 2SA.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanaovana fahirano an'i Raba, sy ny nakan'i Davida ny vadin'i Oria
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary rehefa niherina ny taona, ka mby amin''ny andro fandehanan''ny mpanjaka hiady, dia naniraka an''i Joaba sy ny mpanompony ary ny Isiraely rehetra Davida, ka nandringana ny taranak''i Amona ireo sady nanao fahirano an''i Raha; fa Davida kosa nijanona tany Jerosalema ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nony harivariva, dia niala tao ampandriany Davida ka nitsangantsangana teo an-tampon''ny lapa; ary raha teo izy dia nahatazana vehivavy mandro; ary ravehivavy dia tsara tarehy maha-te-hijery. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Davida dia naniraka hanontany ny amin-dravehivavy. Ary nisy nanao hoe: Tsy iny va no Batseba, zanakavavin''i Eliama, sady vadin''i Oria Hetita? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Davida naniraka olona ka nampaka azy; dia tonga tao aminy izy ka nandriany. Ary ravehivavy nanamasina ny tenany ho afaka tamin''ny halotoany, dia nody tany an-tranony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary nanan''anaka ravehivavy ka naniraka hilaza tamin''i Davida hoe: Manan''anaka aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Davida naniraka tany amin''i Joaba hanao hoe: Asaovy mankaty amiko kely Oria Hetita. Dia nasain''i Joaba nankany amin''i Davida Oria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nony tonga teo amin''i Davida izy, dia nanontaniany ny toetr''i Joaba sy ny olona ary ny toetry ny ady. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy Davida tamin''i Oria: Andeha ary mody, ka sasao ny tongotrao. Ary Oria niala tao an-tranon''ny mpanjaka, ary dia nampanarahina nahandro avy tao amin''ny mpanjaka izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nefa Oria nandry teo am-baravarana ny tranon''ny mpanjaka, teo amin''ny mpanompon''ny tompony rehetra, fa tsy nidina nody tany an-tranony izy tsy akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nisy nanambara tamin''i Davida hoe: Tsy nidina nody tany an-tranony Oria. Dia hoy Davida tamin''i Oria: Tsy avy lavitra va ianao? koa nahoana ianao no tsy midina mody any an-tranonao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa hoy Oria tamin''i Davida: Ny fiara sy ny Isiraely ary ny Joda mitoetra amin''ny trano rantsan-kazo; ary Joaba tompoko sy ny mpanompon''ny tompoko mitoby any an-tsaha, ka izaho kosa va hody any an-tranoko hihinana sy hisotro ary handry amin''ny vadiko? Raha velona koa ianao, ary raha velona koa ny ainao, tsy hanao izany aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary hoy Davida tamin''i Oria: Mitoera ihany ary atỳ anio, fa rahampitso dia halefako ianao. Dia nitoetra tany Jerosalema androtrizay sy ny ampitson''iny Oria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nasain''i Davida izy, dia nihinana sy nisotro teo anatrehany, ka nomamoiny, ary nony hariva dia nivoaka izy ka nandry teo amin''ilay nandriany teo amin''ny mpanompon''ny tompony ihany, fa tsy nidina nody tany an-tranony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nony maraina, Davida dia nanoratra taratasy ho any amin''i Joaba, ka nampitondrainy an''i Oria izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary izao no soratra nataony tao amin''ny taratasy: Arosoinareo amin''ny ady mafy Oria; dia ilaozy izy mba hasiany ho faty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary raha mbola nanao fahirano ny tanàna Joaba, dia nanendry an''i Oria ho eo amin''izay hitany misy lehilahy mahery. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary ny mponina tao an-tanàna nivoaka hiady amin'i Joaba, ka nahafatesana ny mpanompon'i Davida, ary maty koa Oria Hetita.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary Joaba naniraka hilaza tsara any amin''i Davida ny toetry ny ady; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'ary nandidy ilay iraka izy hoe: Rehefa voalazanao tsara amin''ny mpanjaka ny toetry ny ady, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ka tezitra ny mpanjaka ary manao aminao hoe: Nahoana no nanakaiky ny tanàna toy izany ianareo raha niady? Tsy fantatrareo va fa hitifitra eo amin''ny manda izy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Fa iza no namely an'i Abimeleka, zanak'i Jerobeseta? Moa tsy vehivavy va no nanjera vato fikosoham-bary
  - type: usfm
    marker: x
    children:
    - type: text
      text: vato amboniny
    marker-yv: yv-n
  - type: text
    text: ' taminy avy teo amin''ny manda, ka dia maty tao Tebeza izy? Koa nahoana no nanakaiky ny manda ianareo? dia ataovy hoe: Oria Hetita mpanomponao mba maty koa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary nandeha ilay iraka, dia tonga tamin''i Davida ka nanambara taminy izay rehetra nanirahan''i Joaba azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary hoy ny iraka tamin''i Davida: Nahery noho izahay ireny, ary nivoahany tany an-tsaha izahay, ka dia nenjehinay hatreo anoloan''ny vavahady kosa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary ny mpitifitra teo amin''ny manda nitifitra ny mpanomponao; ary nahafatesana ny mpanompon''ny mpanjaka, ary Oria Hetita mpanomponao mba maty koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia hoy Davida tamin''ny iraka: Izao no holazainao amin''i Joaba: Aza malahelo amin''izany ianao, fa ny sabatra tsy mifidy hasiana; herezo ihany ny adinao amin''ny tanàna, ka ravao izy. Ary omeo toky Joaba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary nony ren''ny vadin''i Oria fa maty ny lahy, dia nisaona azy izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary rehefa afa-tsaona izy, dia nampanalain'i Davida ho any an-tranony, ary dia novadiny izy ka niteraka zazalahy taminy. Nefa tsy sitrak'i Jehovah izany nataon'i Davida izany.
