document_id: PSA.56,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fangataham-pamonjena amin'Andriamanitra sy fahatokiana Azy any am-pandosirana
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho an''ny mpiventy hira. Al-jonathelem-rehokim. Miktama nataon''i Davida, fony nisambotra azy tany Gata ny Filistina. Mamindrà fo amiko, Andriamanitra ô, fa misafoaka manenjika ahy ny olona; miady amiko mandrakariva izy ka mampahory ahy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Andriamanitra no iderako ny teniny; Jehovah no iderako ny teniny. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Andriamanitra no itokiako; ka tsy mba hatahotra aho; inona no hataon'ny olona amiko?
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nivoady taminao aho, Andriamanitra ô, dia hanatitra fanati-pisaorana ho Anao. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa efa nanafaka ny fanahiko tamin'ny fahafatesana Hianao; eny, nanafaka ny tongotro Hianao mba tsy ho solafaka. Handehanako eo anatrehan'Andriamanitra amin'ny fahazavan'ny velona
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fahazavan''aina'
      marker-yv: yv-n
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Misafoaka manenjika mandrakariva ny mpampahory ahy; maro tokoa no mirehareha miady amiko. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amin'ny andro atahorako no itokiako Anao.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Andriamanitra no iderako ny teniny; Andriamanitra no itokiako, ka tsy mba hatahotra aho; inona no hataon'ny nofo amiko?
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manimba ny raharahako mandra-kariva ireny
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Mamily ny teniko mandrakariva ireny'
      marker-yv: yv-n
    - type: text
      text: '; ny heviny rehetra dia ny hanisy ratsy ahy ihany. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Miangona izy, miery izy, mitsongo-dia ahy izy, satria mikendry ny aiko. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amin'izany faharatsiany izany moa hisy hahafahany va
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Ny faharatsiana no atao-ny ho famonjena azy'
      marker-yv: yv-n
    - type: text
      text: '? Aripaho amin''ny fahatezeranao ny firenena. Andriamanitra ô. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manisa ny firenireneko Hianao; ataovy ao an-tavoahanginao ny ranomasoko; tsy eo amin''ny bokinao va ireny? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Amin'izay dia hiamboho ny fahavaloko amin'ny andro hiantsoako Anao; izao dia fantatro, fa momba ahy Andriamanitra.
