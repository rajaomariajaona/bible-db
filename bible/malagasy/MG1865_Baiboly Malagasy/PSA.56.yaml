document_id: PSA.56,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fangataham-pamonjena amin'Andriamanitra sy fahatokiana Azy any am-pandosirana
  - type: text
    content: 'Ho an''ny mpiventy hira. Al-jonathelem-rehokim. Miktama nataon''i Davida, fony nisambotra azy tany Gata ny Filistina. Mamindrà fo amiko, Andriamanitra ô, fa misafoaka manenjika ahy ny olona; miady amiko mandrakariva izy ka mampahory ahy. '
  '10':
  - type: text
    content: 'Andriamanitra no iderako ny teniny; Jehovah no iderako ny teniny. '
  '11':
  - type: text
    content: Andriamanitra no itokiako; ka tsy mba hatahotra aho; inona no hataon'ny olona amiko?
  '12':
  - type: text
    content: 'Nivoady taminao aho, Andriamanitra ô, dia hanatitra fanati-pisaorana ho Anao. '
  '13':
  - type: text
    content: Fa efa nanafaka ny fanahiko tamin'ny fahafatesana Hianao; eny, nanafaka ny tongotro Hianao mba tsy ho solafaka. Handehanako eo anatrehan'Andriamanitra amin'ny fahazavan'ny velona
  - type: note
    content: 'Na: fahazavan''aina'
  - type: text
    content: .
  '2':
  - type: text
    content: 'Misafoaka manenjika mandrakariva ny mpampahory ahy; maro tokoa no mirehareha miady amiko. '
  '3':
  - type: text
    content: Amin'ny andro atahorako no itokiako Anao.
  '4':
  - type: text
    content: Andriamanitra no iderako ny teniny; Andriamanitra no itokiako, ka tsy mba hatahotra aho; inona no hataon'ny nofo amiko?
  '5':
  - type: text
    content: Manimba ny raharahako mandra-kariva ireny
  - type: note
    content: 'Na: Mamily ny teniko mandrakariva ireny'
  - type: text
    content: '; ny heviny rehetra dia ny hanisy ratsy ahy ihany. '
  '6':
  - type: text
    content: 'Miangona izy, miery izy, mitsongo-dia ahy izy, satria mikendry ny aiko. '
  '7':
  - type: text
    content: Amin'izany faharatsiany izany moa hisy hahafahany va
  - type: note
    content: 'Na: Ny faharatsiana no atao-ny ho famonjena azy'
  - type: text
    content: '? Aripaho amin''ny fahatezeranao ny firenena. Andriamanitra ô. '
  '8':
  - type: text
    content: 'Manisa ny firenireneko Hianao; ataovy ao an-tavoahanginao ny ranomasoko; tsy eo amin''ny bokinao va ireny? '
  '9':
  - type: text
    content: Amin'izay dia hiamboho ny fahavaloko amin'ny andro hiantsoako Anao; izao dia fantatro, fa momba ahy Andriamanitra.
