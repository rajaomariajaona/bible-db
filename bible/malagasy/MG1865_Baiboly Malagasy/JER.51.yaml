document_id: JER.51
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Izao no lazain''i Jehovah: Indro, hamporisihiko ny fanahin''ny mpandringana hamely an''i Babylona sy izay monina ao Leba-kamay'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Leba-kamay = Kaldea
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary haniraka olona hafa firenena ho any Babylona Aho, izay hikororoka azy ka hahafoana ny taniny; Fa hamely azy manodidina amin''ny andro fahoriana ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Izay manenjana tsipìka mbamin'izay miandranandrana amin'ny akanjo fiarovan-tenany, dia aoka samy hasian'izay manenjana tsipìka; Aza tsitsinareo ny zatovony, aringano
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Ataovy herema
    marker-yv: yv-n
  - type: text
    text: ' avokoa ny miaramilany rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mba hiampatrampatra any amin''ny tanin''ny Kaldeana ny faty, ary izay voatrobaka dia hiampatrampatra any an-dalambeny. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely sy ny Joda, dia tsy hahafoy azy ho mpitondratena, na dia henika ny fahotany amin''ny Iray Masin''ny Isiraely aza ny taniny. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mandosira hiala an''i Babylona ianareo, ary samia mamonjy ny ainareo avy; Aoka tsy ho voaringana noho ny fahotany ianareo; Fa izao no andro famalian''i Jehovah, Izy no hamaly azy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Babylona dia kapoaka volamena teny an-tànan''i Jehovah, Izay nahamamo ny tany rehetra; Ny divainy efa nisotroan''ny firenena, koa izany no nahavery saina ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tampoka no naharavan''i Babylona sy nahatorotoroany; Idradradradrao izy; Makà balsama hatao amin''ny feriny maharary azy, fa angamba ho sitrana ihany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nitady hanasitrana an''i Babylona izahay, nefa tsy nety sitrana izy; Afoizo izy, ka andeha isika samy handeha ho any amin''ny tanintsika avy; Fa mahatakatra ny lanitra ny helony ary mitehika amin''ny rahona. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nasehon''i Jehovah ny fahamarinantsika; Andeha, ka aoka hotorintsika ao Ziona ny asan''i Jehovah Andriamanitsika. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lambolamboy ny zana-tsipìka, tano ny ampinga; Jehovah efa namporisika ny fanahin''ny mpanjakan''ny Mediana; Fa ny hamely an''i Babylona no nosaininy, mba handringanana azy; Fa famalian''i Jehovah izany, eny, famaliana noho ny tempoliny. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Manangàna faneva eo akaikin''ny mandan''i Babylona; Ataovy mafy ny fiambenana; Alatsaho ny mpiambina, alamino ny Otrika; Fa Jehovah sady efa nisaina no nahatanteraka izay nolazainy ny amin''ny mponina any Babylona. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hianao izay monina eny amoron''ny rano be sady be rakitra, tonga ny fiafaranao, ka tsy hisy intsony ny filanao harena. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jehovah, Tompon''ny maro, nianiana tamin''ny tenany hoe: Hofenoiko olona maro toy ny valala tokoa ianao, ary ireny dia'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: na dia hofenoiko olona maro toy ny valala aza ianao, dia ireny no'
    marker-yv: yv-n
  - type: text
    text: ' hanakora hamely anao, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dia Ilay nanao ny tany tamin''ny heriny sy nampiorina izao tontolo izao tamin''ny fahendreny ary namelatra ny lanitra tamin''ny fisainany. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Raha nampirohondrohona ny rano any an-danitra Izy, dia nampiakatra zavona avy tany amin''ny faran''ny tany; Manao ny helatra ho an''ny ranonorana Izy sady mamoaka ny rivotra avy amin''ny firaketany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Efa ketrina avokoa ny olona rehetra ka tsy manam-pahalalana; Menarina ny mpanefy volamena rehetra noho ny amin''ny sarin-javatra voasokitra; Fa fitaka ny sarin-javatra an-idina, satria tsy misy aina ao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Zava-poana ireny, dia asa mahatsikaiky foana; Amin''ny andro hamaliana azy dia ho levona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tsy mba tahaka ireo ny Anjaran''i Jakoba, fa Mpamorona ny zavatra rehetra Izy; Ary ny Isiraely no firenena lovany; Jehovah, Tompon''ny maro, no anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Langilangiko sy fiadiako ianao; Fa ianao no ho entiko manorotoro firenena, ary ianao no ho entiko mandringana fanjakana, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ianao no ho entiko manorotoro soavaly sy ny mpitaingina azy, ary ianao no ho entiko manorotoro ny kalesy sy ny mpitaingina azy; '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hianao koa no ho entiko manorotoro ny lehilahy sy ny vehivavy, ary ianao no ho entiko manorotoro ny antitra sy ny tanora, ary ianao no ho entiko manorotoro ny zatovo sy ny virijina; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hianao koa no ho entiko manorotoro ny mpiandry ondry sy ny ondry andiany, ary ianao no ho entiko manorotoro ny mpiasa tany sy ny ombiny roa mizioga, ary ianao no ho entiko manorotoro ny governora sy ny lefiny. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary hampanodiaviko an''i Babylona sy ny mponina rehetra any Kaldea ny ratsy rehetra izay efa nataony tao Ziona teo imasonareo, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Indro mamely anao Aho, ry tendrombohitra ahitan-doza. Izay mandringana ny tany rehetra, hoy Jehovah; Ary hahinjitro ny tanako hamelezana anao, dia hakodiako hianjera amin''ny harambato ianao ka hataoko tendrombohitra mirehitra. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary tsy mba hakana vato hatao fehizoro ianao, na hatao vato fanorenana; Fa ho lao mandrakizay ianao, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Manangana faneva eny amin'ny tany; Mitsofa anjomara any amin'ny firenena; Manendre
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Manamasina
    marker-yv: yv-n
  - type: text
    text: ' firenena hamely azy; Antsoy ny fanjakan''i Ararata sy Miny ary Askenaza hamely azy; Asio mpifehy hamely azy; Mampiakara soavaly toy ny valala volovoloina'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mahatsiravina'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Manendre firenena sy ireo mpanjakan''ny Mediana hamely azy, ny governora sy ny lefiny rehetra ary ny tany rehetra anjakany. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Mihorohoro sy mangovitra ny tany; Fa tanterahina amin''i Babylona ny fikasan''i Jehovah rehetra, mba hahatonga ny tany Babylona ho lao tsy misy mponina. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Nitsahatra tamin''ny ady ny lehilahy maherin''i Babylona, nitoetra tao amin''ny batery fiarovana izy, lany ny heriny; Tonga toy ny vehivavy izy; Nodorana ny fonenany, tapaka ny hidiny. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Mifamoivoy be ihany ny iraka mpihazakazaka, ary mifamoivoy be ihany ny mpitondra teny, mba hanambara amin''ny mpanjakan''i Babylona Fa afaka ny tanànany manontolo. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary efa azo ny fitàna, ary nodorany tamin''ny afo ny heniheny, sady toran-kovitra ny miaramila. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa izao no lazain i Jehovah, Tompon''ny maro, Andriamanitry ny Isiraely: Babylona zanakavavy dia tahaka ny famoloana amin''ny andro anosena azy; Ary raha mbola tsy toy inona dia ho avy ny andro hijinjana azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Efa lanin''i Nebokadnezara, mpanjakan''i Babylona, izahay; Naringany izahay; Napetrany toy ny vata tsy misy entana izahay; Nateliny toy ny fitelin''ny mamba izahay; Nivokisan''ny kibony ny zava-piko, ka dia nandroaka ahy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Aoka ny mponina ao Ziona hanao hoe: Hanody an''i Babylona anie ny loza nanjo ahy sy ny nofoko! Ary aoka Jerosalema hanao hoe: Hanody ny mponina any Kaldea anie ny rako! '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Koa izao no lazain''i Jehovah: Indro, hisolo vava anao amin''ny adinao Aho sady hanao famaliana ho anao, ary horitiko ny ranomasiny, sy hataoko tankina ny loharanony. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary Babylona ho tonga korontam-bato, ho fonenan''ny amboadia, ho figagana sy ho zavatra mampisitrisitra, ka tsy hisy mponina. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Hiara-mierona toy ny liona tanora izy; Hikaonkaona toy ny zana-diona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Raha mbola liana izy, dia hanaovako fanasana ho azy, ka hataoko mamo izy mba hiravoravo, dia hatory amin''ny torimaso mandrakizay izy ka tsy hifoha intsony, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Hampidiniko ho any amin''ny famonoana toy ny zanak''ondry izy, sy toy ny ondrilahy mbamin''ny osilahy. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Endrey! afaka Sesaka
  - type: usfm
    marker: x
    children:
    - type: text
      text: Sesaka = Babela
    marker-yv: yv-n
  - type: text
    text: '! Ary azo ilay fidèran''ny tany rehetra, Endrey! tonga figagana any amin''ny firenena Babylona. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ny ranomasina nanafotra an''i Babylona; Voasaron''ny habetsahan''ny onjany izy. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ny tanànany dia lao sy karankaina ary tani-hay, dia tany tsy onenan''olona sady tsy misy zanak''olombelona mamaky eo. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ary Bela dia hampijaliko any Babylona, ka hasaiko haloany izay nateliny; Ary ny firenena tsy hitanjozotra hankany aminy intsony; Ny mandan''i Babylona dia hirodana. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Mivoaha avy ao afovoany ianareo, ry oloko, ary samia mamonjy ny ainareo avy ianareo, mba tsy ho azon''ny firehetan''ny fahatezeran''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary fandrao ketraka ny fonareo, ka matahotra ianareo noho ny tsaho miely amin''ny tany; Fa amin''ny iray taona dia hisy tsaho, ary amin''ny taona manaraka indray dia mbola hisy tsaho ihany koa sy loza amin''ny tany, dia mpanapaka mamely mpanapaka. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'koa, indro, avy ny andro hamaliako ny sarin-javatr''i Babylona; Ho menatra ny taniny rehetra; Ary ny fatiny rehetra dia hiampatrampatra eo aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ny lanitra sy ny tany sy izay rehetra ao aminy dia hihoby noho ny amin''i Babylona, satria tonga ao aminy avy any avaratra ireo mpandringana, hoy Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Toy ny nampiampatramparan''i Babylona ny faty tamin''ny Isiraely, dia ho toy izany no hiampatramparan''ny faty amin''ny tany rehetra noho ny amin''i Babylona. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Hianareo izay tsy voan''ny sabatra, mialà, fa aza mijanona; Tsarovy Jehovah, raha mbola lavitra ianareo. Ary aoka ho mby an-tsainareo Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Menatra izahay, fa efa nandre latsa; Manarona ny atrehinay ny henatra; Fa ny hafa firenena no niditra teo amin''ny fitoerana masina amin''ny tranon''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Koa, indro, avy ny andro, hoy Jehovah, izay hamaliako ny sarin-javatra voasokitra ao koa; Ary hitoloko eran''ny taniny rehetra ny voatrobaka. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Na dia miakatra any an-danitra aza Babylona, ary na dia ataony mafy aza ny fitoerana avo izay heriny, dia avy amiko no hihavian''ny mpandringana azy, hoy Jehovah; '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Injany! misy feo mitaraina avy any Babylona sy fandringanana be avy any amin''ny tanin''ny Kaldeana! '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Fa Jehovah no mandrava an''i Babylona sy mampitsahatra ny fihorakorahana eo aminy, ary hirohondrohona toy ny rano be ny onjany, eny, re tokoa ny feon''ny firohondrohony. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Fa tonga ao aminy, dia ao Babylona, ny mpandringana, ary voasambotra ny lehilahy maheriny; Tapatapaka avokoa ny tsipìkany Satria Jehovah dia Andriamanitry ny famaliana ka hamaly tokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Ary hataoko mamo ny mpanapaka azy sy ny olon-kendriny, ny governorany sy ny lefiny ary ny olo-maheriny; Ary hatory amin''ny torimaso mandrakizay izy ka tsy hifoha intsony, hoy ny Mpanjaka, Jehovah, Tompon''ny maro, no anarany. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Ny manda malalaka any Babylona dia horavana tokoa hatramin''ny fanorenany, ary ny vavahadiny avo hodorana amin''ny afo. Ka dia ho nisasatra foana ny firenena, ary ny olona ho nisasatra ho an''ny afo ka ho reraka. '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Ny teny izay nandidian''i Jeremia mpaminany an''i Seraia, zanak''i Neria, zanak''i Mahaseia, fony izy nandeha niaraka tamin''i Zedekia, mpanjakan''ny Joda, ho any Babylona tamin''ny taona fahefatra nanjakany. Fa Seraia no lehiben''ny mpanorin-dasy. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Ary nosoratan''i Jeremia teo amin''ny boky iray ny loza rehetra izay hanjo an''i Babylona, dia ireo teny rehetra ireo, izay voasoratra ny amin''i Babylona. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Ary hoy Jeremia tamin''i Seraia: Rehefa tonga any Babylona ianao, dia tandremo tsara mba hovakinao ireo teny rehetra ireo, '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'ka manaova hoe: Jehovah ô, Hianao no niteny hamely ity tany ity handringana azy, ka tsy hisy hitoetra eto, na olona na biby, fa ho tany lao mandrakizay izy. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Ary rehefa tapitra ny famakianao ity boky ity, dia asio vato afehy aminy, ary atsipazo ao Eofrata izy. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'ka ataovy hoe: Toy izao no hilentehan''i Babylona ka tsy hifongarany intsony noho ny loza hataoko mihatra aminy, ka dia ho reraka izy. Hatreto no tenin''i Jeremia.'
