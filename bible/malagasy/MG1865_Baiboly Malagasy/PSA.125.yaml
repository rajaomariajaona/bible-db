document_id: PSA.125
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fiarovana mahafinaritra hitan'izay matoky an'Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Fihirana fiakarana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Fihirana misy hevitra ambaratonga'
    marker-yv: yv-n
  - type: text
    text: . Izay matoky an'i Jehovah dia tahaka ny tendrombohitra Ziona, izay tsy mihetsika, fa mitoetra mandrakizay.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tahaka ny tendrombohitra manodidina an''i Jerosalema No anodidinan''i Jehovah ny olony Hatramin''izao ka ho mandrakizay '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa tsy hitoetra eo amin'ny anjaran'ny marina ny tehim-panjakan'ny ratsy fanahy, Fandrao ny marina haninjitra ny tànany hanendry zava-dratsy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jehovah ô, manaova soa amin''ny tsara Sy ny mahitsy fo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa izay mivily ho amin'ny sakeli-dalana mivilivily Dia horoahin'i Jehovah miaraka amin'ny mpanao ratsy anie. Fiadanana anie ho amin'ny Isiraely.
