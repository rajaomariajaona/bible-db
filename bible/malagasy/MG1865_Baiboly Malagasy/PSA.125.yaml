document_id: PSA.125,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fiarovana mahafinaritra hitan'izay matoky an'Andriamanitra
  - type: text
    content: Fihirana fiakarana
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga'
  - type: text
    content: . Izay matoky an'i Jehovah dia tahaka ny tendrombohitra Ziona, izay tsy mihetsika, fa mitoetra mandrakizay.
  '2':
  - type: text
    content: 'Tahaka ny tendrombohitra manodidina an''i Jerosalema No anodidinan''i Jehovah ny olony Hatramin''izao ka ho mandrakizay '
  '3':
  - type: text
    content: Fa tsy hitoetra eo amin'ny anjaran'ny marina ny tehim-panjakan'ny ratsy fanahy, Fandrao ny marina haninjitra ny tànany hanendry zava-dratsy.
  '4':
  - type: text
    content: 'Jehovah ô, manaova soa amin''ny tsara Sy ny mahitsy fo. '
  '5':
  - type: text
    content: Fa izay mivily ho amin'ny sakeli-dalana mivilivily Dia horoahin'i Jehovah miaraka amin'ny mpanao ratsy anie. Fiadanana anie ho amin'ny Isiraely.
