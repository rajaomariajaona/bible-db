document_id: JAS.2,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny fahafoanan'ny finoana tsy misy asa
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ry rahalahiko, aoka tsy hasiana fizahan-tavan''olona ny finoanareo ny Tompontsika, dia Jesosy Kristy, Tompon''ny voninahitra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Fa na iza na iza mitandrina ny lalàna rehetra, nefa diso amin''ny iray loha dia meloka amin''izy rehetra. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa Ilay nanao hoe: "Aza mijangajanga" no nanao hoe koa: "Aza mamono olona" (Eks. 20.13, 14). Fa raha tahìny tsy mijangajanga ianao, kanefa mamono olona ihany, dia mpandika ny lalàna ianao. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Aoka ianareo hiteny sy hanao araka izay mahamendrika anareo, izay olona hotsarain''ny lalàn''ny fahafahana. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Fa fitsarana tsy misy famindram-po no ho anjaran'izay tsy mamindra fo; ary ny famindram-po kosa dia faly, fa tsy mba matahotra ny fitsarana.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Inona moa no soa azo, ry rahalahiko, raha misy milaza fa manam-pinoana izy, nefa tsy manana asa? Ny finoana va mahavonjy azy? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Raha misy rahalahy na anabavy tsy manan-kitafy sady tsy manan-kohanina isan''andro, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'ka misy aminareo manao aminy hoe: Mandehana amin''ny fiadanana, mamindroa, mivokisa, kanefa tsy omenareo azy tsinona izay tandrifiny ho an''ny tenany, inona moa no soa azo amin''izany? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary mba toy izany koa ny finoana, raha tsy misy asa, dia maty mihitsy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa angamba hisy hanao hoe: Hianao manam-pinoana, ary izaho manana asa; asehoy amiko tsy amin''ny asa ny finoanao, ary izaho kosa haneho aminao ny finoako amin''ny asako. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Hianao manao fa iray ihany no Andriamanitra; koa tsara izany ataonao izany,- ny demonia koa mba mino izany ka dia mangovitra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa raha misy olona miditra eo amin''ny synagoganareo misy peratra volamena amin''ny rantsan-tànany sady miakanjo tsara, ary mba miditra kosa izay olona malahelo miakanjo ratsy, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Moa tsy fantatrao va, ry olom-poana, fa tsy vanona ny finoana tsy misy asa? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Tsy nohamarinina tamin''ny asa va Abrahama razantsika tamin''ny nanaterany an''isaka zanany teo ambonin''ny alitara? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Hitanao fa niara-niasa tamin''ny finoana ny asany, ary ny finoana dia notanterahina tamin''ny asa; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'ary tanteraka ny Soratra Masina manao hoe: "Ary Abrahama nino an''Andriamanitra, ka nisaina ho fahamarinany izany" (Gen. 25.6), ary natao hoe "Sakaizan''Andriamanitra" izy (Isa. 41.8). '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Koa dia hitanareo fa hamarinina amin''ny asa ny olona, fa tsy amin''ny finoana ihany. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary toy izany koa Rahaba janga, tsy nohamarinina tamin''ny asa va izy tamin''ny nandraisany ireny iraka ireny sy ny nampandehanany azy tamin''ny lalan-kafa? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Fa maty ny tena, raha tsy misy fanahy, ary maty toy izany koa ny finoana, raha tsy misy asa.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'koa mijery ilay miakanjo tsara ianareo ka manao hoe: Mipetraha eto amin''ny fitoerana aloha ianao; ary manao amin''ilay malahelo kosa hoe: Mitoera eroa ianao, na: Mipetraha etsy amin''ny fitoeran-tongotro,- '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: moa tsy miangatra
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: miahanahana'
      marker-yv: yv-n
    - type: text
      text: ' va ianareo amin''izany ka efa mpitsara manan-kevi-dratsy? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mihainoa, ry rahalahy malalako: Tsy efa nofidin''Andriamanitra va ny malahelo amin''izao fiainana izao ho mpanankarena amin''ny finoana sy ho mpandova ny fanjakana nolazainy homena izay tia Azy? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa ianareo efa nanala-baraka ny malahelo. Moa tsy ny mpanankarena va no mampahory anareo? Ary tsy izy va no mitarika anareo ho eo amin''ny fitsarana? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tsy izy koa va no miteny ratsy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. manao blasfemia; izahao Mat.9.3
      marker-yv: yv-n
    - type: text
      text: ' ny anarana tsara izay niantsoana anareo? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Kanefa raha mankatò ilay didy ambony indrindra
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. andriana
      marker-yv: yv-n
    - type: text
      text: ' ianareo, araka ny Soratra Masina hoe: "Tiava ny namanao tahaka ny tenanao" (Lev. 29.18), dia manao tsara ianareo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Fa raha mizaha tavan''olona kosa ianareo, dia manota ka helohin''ny lalàna ho mpanota. '
