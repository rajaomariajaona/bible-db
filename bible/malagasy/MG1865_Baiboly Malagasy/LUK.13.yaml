document_id: LUK.13
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin''izany andro izany nisy ny sasany teo izay nanambara tamin''i Jesosy ny nanjo ny Galiliana, izay naharoharon''i Pilato tamin''ny fanatiny ny ràny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa Jesosy namaly ka nanao taminy hoe: Ataonareo va fa ireny Galiliana ireny no mpanota mihoatra noho ny Galiliana rehetra, satria nozoin''izany zavatra izany izy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tsia, hoy Izaho aminareo; fa raha tsy mibebaka ianareo, dia ho ringana tahaka azy koa ianareo rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ireny valo ambin''ny folo ireny, izay nianjeran''ny tilikambo tao Siloama ka maty, ataonareo va fa mpanota mihoatra noho ny olona rehetra izay monina ao Jerosalema ireny? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsia, hoy Izaho aminareo; fa raha tsy mibebaka ianareo, dia ho ringana tahaka azy koa ianareo rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary nanao ity fanoharana ity Izy hoe: Nisy olona nanana aviavy nambolena teo an-tanim-boalobony; dia nankeo izy nitady voa taminy, fa tsy nahita. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ka dia hoy izy tamin''ny mpamboatra ny tanim-boaloboka; Indro, efa telo taona izay aho no tonga nitady voa tamin''ity aviavy ity, fa tsy nahita; kapao io; nahoana io no manimba ny tany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa ny mpamboatra namaly ka nanao taminy hoe: Tompoko, avelao ihany izy amin''ity taona ity mandra-pihadiko manodidina azy, ka hasiako zezika; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: angamba mbola hamoa izy; fa raha tsy izany, dia hokapainao ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nampianatra tao amin''ny synagoga anankiray Jesosy tamin''ny Sabata. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary, indro, nisy vehivavy izay nanana fanahy mahafarofy valo ambin''ny folo taona, ary nanjoko izy ka tsy nahatraka akory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary rehefa nahita azy Jesosy, dia niantso azy ka nanao taminy hoe: Ravehivavy, afaka amin''ny rofinao ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia nametraka ny tànany taminy Izy; ary niaraka tamin''izay dia nitraka ravehivavy sady nankalaza an''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ny mpanapaka ny synagoga dia tezitra, satria Jesosy nahasitrana tamin''ny Sabata, dia namaly ka nanao tamin''ny vahoaka hoe: Henemana no azo anaovan-draharaha; koa avia hositranina amin''izany, fa tsy amin''ny andro Sabata. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa namaly azy ny Tompo ka nanao hoe: Ry mpihatsaravelatsihy, moa tsy samy mamaha ny ombiny na ny borikiny hiala amin''ny fihinanam-bilona amin''ny Sabata va ianareo ka mitondra azy hisotro rano? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koa ity vehivavy zanak''i Abrahama ity, izay efa nafatotr''i Satana izao valo ambin''ny folo taona izao, moa tsy tokony hovahana ho afaka amin''izany fatorana izany amin''ny andro Sabata va? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary raha nilaza izany Izy, dia nangaihay izay rehetra nanohitra Azy; fa ny vahoaka rehetra nifaly noho ny zavatra malaza rehetra nataony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dia hoy Jesosy: Tahaka ny inona ny fanjakan''Andriamanitra? ary inona no hanoharako azy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tahaka ny voan-tsinapy izy, izay nalain'olona ka namboleny tao an-tanimboly, ary naniry ka tonga haro; ary ny voro-manidina nitoetra tao amin'ny rantsany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary hoy koa Jesosy: Inona no hanoharako ny fanjakan''Andriamanitra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tahaka ny masirasira izy, izay nalain'ny vehivavy anankiray ka nataony
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. nafeniny
    marker-yv: yv-n
  - type: text
    text: ' tao amin''ny koba intelon''ny famarana, mandra-pahazon''ny masirasira azy rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary Jesosy nandeha nitety ny tanàna sy ny vohitra nampianatra sady nandroso hankany Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia hoy ny anankiray taminy; Tompoko, moa vitsy va no hovonjena? Ary hoy Izy tamin''ny olona: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Miseseha hiditra amin''ny varavarana etỳ ianareo; fa hoy Izaho aminareo: Maro no hitady hiditra, fa tsy ho afaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Rehefa mitsangana ny tompon-trano ka manidy ny varavarana, ary ianareo mijanona eo ala-trano mandondòna ny varavarana ka manao hoe: Tompoko, vohay izahay, dia hamaly Izy ka hanao aminareo hoe: Tsy fantatro na avy taiza na avy taiza ianareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ary amin''izay ianareo dia hanao hoe: Nihinana sy nisotro teo anatrehanao izahay, ary nampianatra teny an-dalambenay Hianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Fa Izy hiteny hoe: Lazaiko aminareo: Tsy fantatro na avy taiza na avy taiza ianareo; mialà amiko, ianareo rehetra mpanao meloka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Any no hisy ny fitomaniana sy ny fikitroha-nify, raha mahita an''i Abrahama sy Isaka sy Jakoba ary ny mpaminany rehetra eo amin''ny fanjakan''Andriamanitra ianareo, fa ny tenanareo kosa dia voaroaka any ivelany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary ho tonga avy any atsinanana sy avy any andrefana ary avy any avaratra sy avy any atsimo ireny ka hipetraka hihinana eo amin''ny fanjakan''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary, indro, misy ny aoriana ho aloha, ary misy ny aloha ho aoriana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Tamin''izany ora izany indrindra dia nisy Fariseo sasany nankeo amin''i Jesosy ka nanao taminy hoe: Mandehana Hianao, ka mialà eto; fa ta-hamono Anao Heroda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa hoy Izy taminy: Mandehana, lazao amin''izany amboahaolo'
  - type: usfm
    marker: x
    children:
    - type: text
      text: volpa
    marker-yv: yv-n
  - type: text
    text: ' izany hoe: Indro, mamoaka demonia sy mahasitrana Aho anio sy ampitso, ary raha afaka ampitso dia hotanterahina ny amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Kanefa tsy maintsy mandeha ihany Aho anio sy ampitso sy raha afaka ampitso; fa ny mpaminany tsy azo vonoina, raha tsy any Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ry Jerosalema, ry Jerosalema, izay mamono ny mpaminany sy mitora-bato izay nirahina any aminao, impiry Aho no ta-hanangona ny zanakao tahaka ny fanomban''ny akoho ny zanany ao ambanin''ny elany, fa tsy nety ianareo! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Indro, avela ho anareo ny tranonareo. ary lazaiko aminareo: Tsy hahita Ahy intsony ianareo mandra-pilazanareo hoe: Isaorana anie Izay avy amin''ny anaran''i Jehovah (Sal. 118. 26).'
