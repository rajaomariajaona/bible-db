document_id: JOB.35
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary mbola niteny ihany Eliho ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ataonao va fa marina ny nanaovanao hoe: Ny fahamarinako mihoatra noho ny an''Andriamanitra?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa hoy ianao: Mahasoa ahy'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. anao
    marker-yv: yv-n
  - type: text
    text: ' manao ahoana moa? Ary inona no soa azoko mihoatra noho ny avy amin''ny fahotako?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Izaho no hiteny hamaly anao Mbamin'ny namanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jereo ary ny lanitra ka izahao; Ary tsinjovy iry habakabaka, avo loatra iny ka tsy takatrao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Raha manota ianao, moa mahefa inona aminy? Ary raha maro ny fahotanao, mampaninona Azy moa izany?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Raha marina ianao, dia hahazoany inona moa izany? Na inona no horaisiny avy amin'ny tananao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mihatra amin'ny olona tahaka anao ihany ny ratsy ataonao; Ary mihatra amin'ny olombelona ihany ny fahamarinanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Noho ny habiazan'ny fampahoriana no itarainan'ny olona; Eny, minananana izy noho ny sandrin'ny mahery,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nefa tsy misy manao hoe: Aiza Andriamanitra, Mpanao ahy, Izay mahatonga fiderana amin''ny alina,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Izay manome fahalalana antsika mihoatra noho ny an'ny biby ambonin'ny tany, dia Izay manome fahendrena antsika mihoatra noho ny an'ny voro-manidina?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eny, mitaraina mafy ireo (fa tsy mamaly Izy) noho ny fireharehan'ny ratsy fanahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny fitarainam-poana dia tsy mba henoin'Andriamanitra, ary ny Tsitoha tsy mandinika izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Na dia lazainao fa tsy mahita azy aza ianao, efa mby eo anatrehany ny ady, koa tsy maintsy miandry Azy ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Koa raha saingy tsy mihatra ny fahatezerany, moa dia tsy fantany tsara koa va ny fihaikana?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mba miloa-bava foana anefa Joba ary manao teny maro tsy amim-pahalalana.
