document_id: PRO.15
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny famaliana mora dia mampianina ny fahatezerana mafy; Fa ny teny maharary mahatonga fahasosorana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ny lelan'ny hendry mampiseho fahalalana tsara; Fa ny vavan'ny adala miboiboika fahadalana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ny mason'i Jehovah amin'izao rehetra izao, Mijery ny ratsy fanahy sy ny tsara fanahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny teny
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lela
    marker-yv: yv-n
  - type: text
    text: ' malemy dia hazon''aina; Fa ny vava ratsy mandratra ny fanahy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny adala maniratsira ny famaizan-drainy; Fa izay mitandrina ny fananarana no hita ho hendry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ao an-tranon'ny marina misy harena be; Fa ny fitomboan'ny haren'ny ratsy fanahy dia misy loza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny molotry ny hendry mampiely fahendrena; Fa tsy mba toy izany ny fon'ny adala.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ny fanatitry ny ratsy fanahy dia fahavetavetana eo imason'i Jehovah; Fa ny fivavaky ny marina no sitrany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fahavetavetana eo imason'i Jehovah ny lalan'ny ratsy fanahy; Fa izay fatra-panaraka ny fahamarinana no tiany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Famaizana mafy no hihatra amin''izay mivily lalana. Eny, izay mankahala anatra dia ho faty. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: ' sy ny fandringanana aza dia miharihary eo anatrehan''i Jehovah, Koa mainka ny fon''ny zanak''olombelona! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tsy tian'ny mpaniratsira izay mananatra azy, Ary tsy mety manatona ny hendry izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ny fo ravoravo mahamiramirana ny tarehy; Fa ny alahelon'ny fo mahareraka ny fanahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny fon'ny manan-tsaina mitady fahendrena; Fa ny vavan'ny adala mankamamy ny fahadalana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ratsy avokoa ny andron'ny ory; Fa ny faharavoravoam-po dia fanasana mandrakariva.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Aleo ny kely misy ny fahatahorana an'i Jehovah Toy izay harena be misy ahiahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aleo sakafo anana ampian-tsetsetra
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. fitiavana
    marker-yv: yv-n
  - type: text
    text: ' Toy izay omby mifahy asian-dromoromo'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. fankahalana
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Izay malaky tezitra manetsika ady; Fa izay mahatsindry fo mampitsahatra fifandirana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ny lalan'ny malaina dia toy ny fefy tsilo Fa ny lalamben'ny marina dia voalamina tsara.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny zanaka hendry mahafaly ny rainy; Fa ny adala manao tsinontsinona an-dreniny. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ny fahadalana dia fifalian'ny tsy ampy saina; Fa ny manan-tsaina kosa mizotra mahitsy
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ho foana ny fikasana, raha tsy misy mpisaina; Fa raha maro ny mpanolo-tsaina, dia tanteraka izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Faly ny olona, raha mahavaly tsara ny vavany, Ary endrey ny hatsaran'ny teny atao amin'izay andro mahamety azy!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Làlan'aina ho any ambony no alehan'ny hendry, Hanalavirany ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: ' any ambany,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ravan'i Jehovah ny tranon'ny mpiavonavona; Fa ny fari-tanin'ny mpitondra-tena aoriny mafy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Fahavetavetana eo imason'i Jehovah ny hevi-dratsy; Fa madio ny
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Fa ny madio manao'
    marker-yv: yv-n
  - type: text
    text: ' teny mahafinaritra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Izay fatra-pila harena dia mampidi-doza amin'ny ankohonany; Fa izay mankahala kolikoly no ho velona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ny fon'ny marina mihevitra vao mamaly; Fa ny vavan'ny ratsy fanahy kosa miboiboika faharatsiana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Jehovah dia lavitra ny ratsy fanahy; Fa ny fivavaky ny marina no henoiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ny tarehy miramirana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Ny fahazavan'ny maso
    marker-yv: yv-n
  - type: text
    text: ' mahafaly ny fo; Ary ny filazan-tsoa mamelombelona ny taolana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ny sofina izay mihaino anatra mahavelona Dia miara-mitoetra amin'ny hendry.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Izay mandà anatra dia manary tena; Fa izay mihaino ny fananarana no mahazo fahalalana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Ny fahatahorana an'i Jehovah dia fananarana mampahahendry; Ary ny fanetren-tena mialoha ny fisandratana.
