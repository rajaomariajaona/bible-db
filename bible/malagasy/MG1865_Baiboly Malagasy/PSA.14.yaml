document_id: PSA.14,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny faharatsian'ny olona, sy ny fanirian'ny sasany famonjena
  - type: text
    content: 'Ho an''ny mpiventy hira. Nataon''i Davida. Ny adala manao anakampo hoe: tsy misy Andriamanitra. Manao izay ratsy sy vetaveta izy; tsy misy manao ny tsara.'
  '2':
  - type: text
    content: 'Eny an-danitra Jehovah miondrika mijery ny zanak''olombelona, mba hizaha na misy hendry mitady an''Andriamanitra. '
  '3':
  - type: text
    content: Samy efa nivily izy rehetra ka tonga vetaveta avokoa; tsy misy manao ny tsara, na dia iray akory aza.
  '4':
  - type: text
    content: 'Tsy mahalala va ny mpanao ratsy rehetra, izay mihinana ny oloko toy ny fihinan-kanina, ary Jehovah tsy antsoiny? '
  '5':
  - type: text
    content: 'Indreo, matahotra dia matahotra izy, satria Andriamanitra no eo amin''ny taranaka marina. '
  '6':
  - type: text
    content: Na dia foananareo aza ny fisainan'ny ory, Jehovah kosa no arony.
  '7':
  - type: text
    content: Enga anie ka hivoaka avy ao Ziona ny famonjena ny Isiraely! Raha ampodin'i Jehovah avy amin'ny fahababoana ny olony, dia ho faly Jakoba, ary ho ravoravo Isiraely.
