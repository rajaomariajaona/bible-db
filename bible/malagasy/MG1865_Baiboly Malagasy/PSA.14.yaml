document_id: PSA.14
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny faharatsian'ny olona, sy ny fanirian'ny sasany famonjena
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Nataon''i Davida. Ny adala manao anakampo hoe: tsy misy Andriamanitra. Manao izay ratsy sy vetaveta izy; tsy misy manao ny tsara.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Eny an-danitra Jehovah miondrika mijery ny zanak''olombelona, mba hizaha na misy hendry mitady an''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Samy efa nivily izy rehetra ka tonga vetaveta avokoa; tsy misy manao ny tsara, na dia iray akory aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tsy mahalala va ny mpanao ratsy rehetra, izay mihinana ny oloko toy ny fihinan-kanina, ary Jehovah tsy antsoiny? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Indreo, matahotra dia matahotra izy, satria Andriamanitra no eo amin''ny taranaka marina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Na dia foananareo aza ny fisainan'ny ory, Jehovah kosa no arony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Enga anie ka hivoaka avy ao Ziona ny famonjena ny Isiraely! Raha ampodin'i Jehovah avy amin'ny fahababoana ny olony, dia ho faly Jakoba, ary ho ravoravo Isiraely.
