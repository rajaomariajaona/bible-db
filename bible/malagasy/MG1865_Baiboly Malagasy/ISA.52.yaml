document_id: ISA.52,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny Mpanompon'i Jehovah, dia ny zava-mahagaga nataony, sy ny nandavan'ny maro Azy, sy ny fahoriana nentiny, sy ny avotra vitany, ary ny voninahitra homena Azy
  - type: text
    content: 'Mifohaza, mifohaza, tafio ny herinao, ry Ziona ô; tafio ny fitafianao tsara tarehy, ry Jerosalema ô, tanàna masina; fa tsy hiditra any aminao intsony ny tsy voafora sy ny maloto. '
  '10':
  - type: text
    content: Jehovah efa nampiseho
  - type: note
    content: Heb. nampitanjaka
  - type: text
    content: ' ny sandriny masina teo imason''ny firenena rehetra; ary ny faran''ny tany rehetra hahita ny famonjen''Andriamanitsika. '
  '11':
  - type: text
    content: 'Mialà, mialà ianareo, mivoaha, aza mikasika izay maloto, mivoaha avy eo aminy; madiova, ianareo izay mitondra ny fanak''i Jehovah. '
  '12':
  - type: text
    content: Fa tsy tampoka no hivoahanareo, ary tsy lositra no handehananareo; fa Jehovah no hitarika anareo eo aloha, ary Andriamanitry ny Isiraely no ho vodi-lalanareo.
  '13':
  - type: text
    content: Indro, ny Mpanompoko ho hita ho hendry
  - type: note
    content: Heb. hambinina
  - type: text
    content: ', hisandratra sy ho ambony Izy ka ho avo indrindra. '
  '14':
  - type: text
    content: 'Fa toy ny nigagan''ny maro Anao (Ny tarehiny dia simba ka hoatra ny tsy tarehin''olombelona akory, ary ny endriny hoatra ny tsy endriky ny zanak''olombelona), '
  '15':
  - type: text
    content: Dia toy izany no hampihendratrendratany
  - type: note
    content: Heb. hanafànany
  - type: text
    content: ' ny firenena maro; ny mpanjaka hitampim-bava aminy; fa izay tsy mbola nolazaina tamin''ireny no ho hitany, ary izay tsy mbola reny akory no hosaintsaininy.'
  '2':
  - type: text
    content: 'Ahintsano ny vovoka hiala amin''ny tenanao, ka mitsangàna, ary mipetraha, ry Jerosalema ô; vahao ny fatorana amin''ny tendanao, ry Ziona, zanakavavy babo. '
  '3':
  - type: text
    content: 'Fa izao no lazain''i Jehovah: Tsy vola tsy harena no nivarotana anareo, ka dia tsy vola tsy harena koa no hanavotana anareo. '
  '4':
  - type: text
    content: 'Fa izao no lazain''i Jehovah Tompo: Tany Egypta no nidinan''ny oloko tamin''ny voalohany mba hivahiny tany; Ary ny Asyriana koa nampahory azy tsy ahoan-tsy ahoana. '
  '5':
  - type: text
    content: 'Ary ankehitriny inona no hataoko eto? hoy Jehovah, fa nobaboina tsy ahoan-tsy ahoana ny oloko; ny mpanapaka azy dia manakora, hoy Jehovah; ary mandrakariva dia hamavoina mandritra ny andro ny anarako. '
  '6':
  - type: text
    content: Koa ny oloko dia hahalala ny anarako; Eny, amin'izany andro izany
  - type: note
    content: 'Na: Eny, ho fantany amin''izany andro izany Aho'
  - type: text
    content: ' dia ho fantany fa Izaho no miteny hoe: Inty Aho. '
  '7':
  - type: text
    content: 'Akory ny hatsaran''ny tongotr''iry mitondra teny soa mahafaly erỳ an-tendrombohitra sady mitory fiadanana! Dia izay mitondra teny soa mahafaly sady mitory famonjena, eny, izay manao amin''i Ziona hoe: Mpanjaka Andriamanitrao! '
  '8':
  - type: text
    content: 'Injany ny feon''ny mpitilinao! Manandratra ny feony izy ka miara-mihoby; fa ho faly izy mahita mifanatri-maso ny hodian''i Jehovah ho any Ziona. '
  '9':
  - type: text
    content: 'Velomy ny hoby, ry fitoeran-drava any Jerosalema; Fa Jehovah efa nampionona ny olony sady efa nanavotra an''i Jerosalema. '
