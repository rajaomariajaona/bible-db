document_id: ISA.52
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny Mpanompon'i Jehovah, dia ny zava-mahagaga nataony, sy ny nandavan'ny maro Azy, sy ny fahoriana nentiny, sy ny avotra vitany, ary ny voninahitra homena Azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mifohaza, mifohaza, tafio ny herinao, ry Ziona ô; tafio ny fitafianao tsara tarehy, ry Jerosalema ô, tanàna masina; fa tsy hiditra any aminao intsony ny tsy voafora sy ny maloto. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ahintsano ny vovoka hiala amin''ny tenanao, ka mitsangàna, ary mipetraha, ry Jerosalema ô; vahao ny fatorana amin''ny tendanao, ry Ziona, zanakavavy babo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa izao no lazain''i Jehovah: Tsy vola tsy harena no nivarotana anareo, ka dia tsy vola tsy harena koa no hanavotana anareo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa izao no lazain''i Jehovah Tompo: Tany Egypta no nidinan''ny oloko tamin''ny voalohany mba hivahiny tany; Ary ny Asyriana koa nampahory azy tsy ahoan-tsy ahoana. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ankehitriny inona no hataoko eto? hoy Jehovah, fa nobaboina tsy ahoan-tsy ahoana ny oloko; ny mpanapaka azy dia manakora, hoy Jehovah; ary mandrakariva dia hamavoina mandritra ny andro ny anarako. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Koa ny oloko dia hahalala ny anarako; Eny, amin'izany andro izany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Eny, ho fantany amin''izany andro izany Aho'
    marker-yv: yv-n
  - type: text
    text: ' dia ho fantany fa Izaho no miteny hoe: Inty Aho. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Akory ny hatsaran''ny tongotr''iry mitondra teny soa mahafaly erỳ an-tendrombohitra sady mitory fiadanana! Dia izay mitondra teny soa mahafaly sady mitory famonjena, eny, izay manao amin''i Ziona hoe: Mpanjaka Andriamanitrao! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Injany ny feon''ny mpitilinao! Manandratra ny feony izy ka miara-mihoby; fa ho faly izy mahita mifanatri-maso ny hodian''i Jehovah ho any Ziona. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Velomy ny hoby, ry fitoeran-drava any Jerosalema; Fa Jehovah efa nampionona ny olony sady efa nanavotra an''i Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Jehovah efa nampiseho
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. nampitanjaka
    marker-yv: yv-n
  - type: text
    text: ' ny sandriny masina teo imason''ny firenena rehetra; ary ny faran''ny tany rehetra hahita ny famonjen''Andriamanitsika. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mialà, mialà ianareo, mivoaha, aza mikasika izay maloto, mivoaha avy eo aminy; madiova, ianareo izay mitondra ny fanak''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Fa tsy tampoka no hivoahanareo, ary tsy lositra no handehananareo; fa Jehovah no hitarika anareo eo aloha, ary Andriamanitry ny Isiraely no ho vodi-lalanareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Indro, ny Mpanompoko ho hita ho hendry
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hambinina
    marker-yv: yv-n
  - type: text
    text: ', hisandratra sy ho ambony Izy ka ho avo indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa toy ny nigagan''ny maro Anao (Ny tarehiny dia simba ka hoatra ny tsy tarehin''olombelona akory, ary ny endriny hoatra ny tsy endriky ny zanak''olombelona), '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia toy izany no hampihendratrendratany
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. hanafànany
    marker-yv: yv-n
  - type: text
    text: ' ny firenena maro; ny mpanjaka hitampim-bava aminy; fa izay tsy mbola nolazaina tamin''ireny no ho hitany, ary izay tsy mbola reny akory no hosaintsaininy.'
