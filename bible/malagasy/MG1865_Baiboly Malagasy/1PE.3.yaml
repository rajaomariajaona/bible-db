document_id: 1PE.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Famporisihana mba hitondra tena marina sy hiaritra tahaka ny niaretan'i Kristy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary toy izany koa, ianareo vehivavy, maneke ny vadinareo, mba ho voataonan''ny fitondran-tenan''ny vavy izy, na dia tsy amin''ny teny aza (raha tàhiny misy tsy manaiky ny teny), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'rehefa hitany ny fahadiovan''ny fitondran-tenanareo amin''ny fahatahorana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary aoka ny firavahanareo tsy ho zavatra eny ivelany, toy ny firandranam-bolo sy ny firava-bolamena na ny fiakanjoana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'fa aoka ho toetra miafina ao am-po, izay tsy mety ho lò, dia ny fanahy malemy sady miadana, izay soa indrindra eo imason''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa tahaka izany no niravahan''ny vehivavy masina fahiny, izay nanantena an''Andriamanitra sady nanaiky ny vadiny; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'dia tahaka an''i Saraha, izay nanaiky an''i Abrahama ka nanao azy hoe "tompoko"; dia zanany ianareo, raha mba manao soa ka tsy matahotra izay fampitahorana na inona na inona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary toy izany koa, ianareo lehilahy, miaraha mitoetra aminy araka ny marina, manaja ny vavy, tahaka ny mety hatao amin'ny fanaka malemilemy kokoa sady mpiara-mandova ny fahasoavan'ny fiainana,- mba tsy ho voasakana ny fivavahanareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Farany, miraisa saina ianareo rehetra. ka miaraha ory, mifankatiava tahaka ny mpirahalahy, mifamindrà fo, manetre tena, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'tsy mamaly ratsy ny ratsy, na fanaratsiana ny fanaratsiana; fa aoka hisaotra kosa, satria ho amin''izany no niantsoana anareo mba handova fitahiana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '"Fa na iza na iza maniry fiainana sy ta-hahita andro soa, Aoka izy hiaro ny lelany amin''ny ratsy Ary ny molony mba tsy hiteny fitaka; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary aoka izy hiala amin''ny ratsy ka hanao soa; Aoka izy hitady fihavanana sy hanaraka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa ny mason''ny Tompo dia mitsinjo ny marina, Ary ny sofiny mihaino ny fitarainany, Fa ny tavan''ny Tompo dia tezitra amin''ny mpanao ratsy" (Sal. 34.12-16). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary iza no hanisy ratsy anareo, raha mazoto amin''izay tsara ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa raha tàhiny mitondra fahoriana noho ny fahamarinana ianareo, dia sambatra; ary aza matahotra tahaka azy, ary aza mangorohoro ianareo; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'fa manamasìna an i''Kristy ho Tompo ao am-ponareo (Isa. 8.12, 13); ary aoka ho vonona mandrakariva ianareo hamaly izay manontany anareo ny amin''ny anton''ny fanantenana ao anatinareo, nefa amin''ny fahalemem-panahy sy ny fanajana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ka manàna fieritreretana tsara, mba ho menatra izay manaratsy ny fitondran-tenanareo tsara ao amin''i Kristy, dia izay anendrikendrehana anareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa raha sitrapon''Andriamanitra, dia tsaratsara kokoa ny hitondra fahoriana amin''ny fanaovan-tsoa noho ny amin''ny fanaovan-dratsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa Kristy koa aza efa nijaly indray mandeha noho ny ota, ny Marina hamonjy ny tsy marina, mba hitondra antsika ho amin''Andriamanitra, ka novonoina tamin''ny nofo, fa novelomina tamin''ny fanahy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'izay nandehanany sy nitoriany teny tamin''ireo fanahy tao an-tranomaizina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'dia izay tsy nanaiky fahiny, fony niandry ny fahari-pon''Andriamanitra tamin''ny andron''i Noa, raha mbola namboarina ny sambo-fiara, izay nidiran''ny olona vitsy, dia izy valo mianaka, ka dia namonjena azy ny rano, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: izay mamonjy anareo koa ankehitriny, dia ny batisa, izay tenan'io tandindona io,- tsy ny fanesorana ny fahalotoan'ny nofo anefa, fa ny fitadiavana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fanontanian'''
    marker-yv: yv-n
  - type: text
    text: ' ny fieritreretana tsara eo anatrehan'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: amin'''
    marker-yv: yv-n
  - type: text
    text: '''Andriamanitra'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny fitadiavan''ny fieritreretana tsara an''Andriamanitra'
    marker-yv: yv-n
  - type: text
    text: ', amin''ny nitsanganan''i Jesosy Kristy tamin''ny maty. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Izay eo amin'ny tanana ankavanan'Andriamanitra; fa efa lasa ho any an-danitra Izy ka efa nampanekena Azy ny anjely sy ny fahefana ary ny hery.
