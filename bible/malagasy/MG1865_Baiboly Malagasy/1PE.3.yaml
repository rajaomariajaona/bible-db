document_id: 1PE.3,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Famporisihana mba hitondra tena marina sy hiaritra tahaka ny niaretan'i Kristy
  - type: text
    content: 'Ary toy izany koa, ianareo vehivavy, maneke ny vadinareo, mba ho voataonan''ny fitondran-tenan''ny vavy izy, na dia tsy amin''ny teny aza (raha tàhiny misy tsy manaiky ny teny), '
  '10':
  - type: text
    content: '"Fa na iza na iza maniry fiainana sy ta-hahita andro soa, Aoka izy hiaro ny lelany amin''ny ratsy Ary ny molony mba tsy hiteny fitaka; '
  '11':
  - type: text
    content: 'Ary aoka izy hiala amin''ny ratsy ka hanao soa; Aoka izy hitady fihavanana sy hanaraka azy. '
  '12':
  - type: text
    content: 'Fa ny mason''ny Tompo dia mitsinjo ny marina, Ary ny sofiny mihaino ny fitarainany, Fa ny tavan''ny Tompo dia tezitra amin''ny mpanao ratsy" (Sal. 34.12-16). '
  '13':
  - type: text
    content: 'Ary iza no hanisy ratsy anareo, raha mazoto amin''izay tsara ianareo? '
  '14':
  - type: text
    content: 'Fa raha tàhiny mitondra fahoriana noho ny fahamarinana ianareo, dia sambatra; ary aza matahotra tahaka azy, ary aza mangorohoro ianareo; '
  '15':
  - type: text
    content: 'fa manamasìna an i''Kristy ho Tompo ao am-ponareo (Isa. 8.12, 13); ary aoka ho vonona mandrakariva ianareo hamaly izay manontany anareo ny amin''ny anton''ny fanantenana ao anatinareo, nefa amin''ny fahalemem-panahy sy ny fanajana, '
  '16':
  - type: text
    content: 'ka manàna fieritreretana tsara, mba ho menatra izay manaratsy ny fitondran-tenanareo tsara ao amin''i Kristy, dia izay anendrikendrehana anareo. '
  '17':
  - type: text
    content: 'Fa raha sitrapon''Andriamanitra, dia tsaratsara kokoa ny hitondra fahoriana amin''ny fanaovan-tsoa noho ny amin''ny fanaovan-dratsy. '
  '18':
  - type: text
    content: 'Fa Kristy koa aza efa nijaly indray mandeha noho ny ota, ny Marina hamonjy ny tsy marina, mba hitondra antsika ho amin''Andriamanitra, ka novonoina tamin''ny nofo, fa novelomina tamin''ny fanahy, '
  '19':
  - type: text
    content: 'izay nandehanany sy nitoriany teny tamin''ireo fanahy tao an-tranomaizina, '
  '2':
  - type: text
    content: 'rehefa hitany ny fahadiovan''ny fitondran-tenanareo amin''ny fahatahorana. '
  '20':
  - type: text
    content: 'dia izay tsy nanaiky fahiny, fony niandry ny fahari-pon''Andriamanitra tamin''ny andron''i Noa, raha mbola namboarina ny sambo-fiara, izay nidiran''ny olona vitsy, dia izy valo mianaka, ka dia namonjena azy ny rano, '
  '21':
  - type: text
    content: izay mamonjy anareo koa ankehitriny, dia ny batisa, izay tenan'io tandindona io,- tsy ny fanesorana ny fahalotoan'ny nofo anefa, fa ny fitadiavana
  - type: note
    content: 'Na: fanontanian'''
  - type: text
    content: ' ny fieritreretana tsara eo anatrehan'
  - type: note
    content: 'Na: amin'''
  - type: text
    content: '''Andriamanitra'
  - type: note
    content: 'Na: ny fitadiavan''ny fieritreretana tsara an''Andriamanitra'
  - type: text
    content: ', amin''ny nitsanganan''i Jesosy Kristy tamin''ny maty. '
  '22':
  - type: text
    content: Izay eo amin'ny tanana ankavanan'Andriamanitra; fa efa lasa ho any an-danitra Izy ka efa nampanekena Azy ny anjely sy ny fahefana ary ny hery.
  '3':
  - type: text
    content: 'Ary aoka ny firavahanareo tsy ho zavatra eny ivelany, toy ny firandranam-bolo sy ny firava-bolamena na ny fiakanjoana; '
  '4':
  - type: text
    content: 'fa aoka ho toetra miafina ao am-po, izay tsy mety ho lò, dia ny fanahy malemy sady miadana, izay soa indrindra eo imason''Andriamanitra. '
  '5':
  - type: text
    content: 'Fa tahaka izany no niravahan''ny vehivavy masina fahiny, izay nanantena an''Andriamanitra sady nanaiky ny vadiny; '
  '6':
  - type: text
    content: 'dia tahaka an''i Saraha, izay nanaiky an''i Abrahama ka nanao azy hoe "tompoko"; dia zanany ianareo, raha mba manao soa ka tsy matahotra izay fampitahorana na inona na inona. '
  '7':
  - type: text
    content: Ary toy izany koa, ianareo lehilahy, miaraha mitoetra aminy araka ny marina, manaja ny vavy, tahaka ny mety hatao amin'ny fanaka malemilemy kokoa sady mpiara-mandova ny fahasoavan'ny fiainana,- mba tsy ho voasakana ny fivavahanareo.
  '8':
  - type: text
    content: 'Farany, miraisa saina ianareo rehetra. ka miaraha ory, mifankatiava tahaka ny mpirahalahy, mifamindrà fo, manetre tena, '
  '9':
  - type: text
    content: 'tsy mamaly ratsy ny ratsy, na fanaratsiana ny fanaratsiana; fa aoka hisaotra kosa, satria ho amin''izany no niantsoana anareo mba handova fitahiana. '
