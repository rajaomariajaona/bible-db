document_id: DAN.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nofy nananaran'Andriamanitra an'i Nebokadnezara, sy ny nahatanterahan'izany nofy izany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nebokadnezara mpanjaka nanao sariolona volamena, enim-polo hakiho ny hahavony, ary enina hakiho ny sakany; dia natsangany teo amin''ny tany lemaka Dora tamin''ny fehin''i Babylona izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Nebokadnezara mpanjaka naniraka nampamory ny solom-panjaka sy ny mpanapaka sy ny governora sy ny andriambaventy sy ny mpitahiry ny volam-panjakana sy ny mpahay lalàna sy ny mpitsara ary ny komandy isan-tokony mba hanamasina ilay sariolona efa natsangan''i Nebokadnezara mpanjaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia nivory hanamasina ny sariolona izay efa natsangan''i Nebokadnezara mpanjakan''ny solom-panjaka sy ny mpanapaka sy ny governora sy ny andriambaventy sy ny mpitahiry ny volam-panjakana sy ny mpahay lalàna sy ny mpitsara ary ny komandy isan-tokony, ka dia nitsangana tandrifin''ny sariolona izay efa natsangan''i Nebokadnezara ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary dia nisy mpikabary niantso mafy hoe: Izao no lazaina aminareo, ry fokom-pirenena, ry firenena sy samy hafa fiteny: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rehefa mandre ny fanenon''ny anjomara sy ny sobaba sy ny lokanga sy ny samboka sy ny valiha sy ny symponia ary ny zava-maneno isan-karazany ianareo, dia miankohofa, ka mivavaha amin''ny sariolona volamena izay efa natsangan''i Nebokadnezara mpanjaka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary na iza na iza no tsy miankohoka sy tsy mivavaka dia hatsipy miaraka amin''izay ho ao anatin''ny lafaoro misy afo mirehitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Koa tamin'ny fotoana nandrenesan'ny fokom-pirenena rehetra ny fanenon'ny anjomara sy ny sobaba sy ny lokanga sy ny samboka sy ny valiha ary ny zava-maneno isan-karazany, dia niankohoka sy nivavaka tamin'ny sariolona volamena izay efa natsangan'i Nebokadnezara mpanjaka ny fokom-pirenena sy ny firenena ary ny samy hafa fiteny rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary tamin'izay dia nisy Kaldeana sasany nanatona ka niampanga
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ar. nihinana ny nofon'
    marker-yv: yv-n
  - type: text
    text: ' ny Jiosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia niteny izy ka nanao tamin''i Nebokadnezara mpanjaka hoe: Ry mpanjaka ô, ho velona mandrakizay anie ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ry mpanjaka ô, ianao efa nanao lalàna fa ny olona rehetra izay mandre ny fanenon''ny anjomara sy ny sobaba sy ny lokanga sy ny samboka sy ny valiha sy ny symponia ary ny zava-maneno isan-karazany dia hiankohoka hivavaka amin''ny sariolona volamena; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'fa izay tsy miankohoka sy tsy mivavaka kosa dia hatsipy ao anatin''ny lafaoro misy afo mirehitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Koa misy Jiosy izay nataonao ho tonian''ny raharaha amin''i Babylona sy ny fehiny, dia Sadraka sy Mesaka ary Abednego; ireo lehilahy ireo tsy mba manaiky ny teninao akory, ry mpanjaka ô: tsy mba manompo ny andriamanitrao izy, na mivavaka amin''ny sariolona volamena izay efa natsanganao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia niteny tamin''ny fahavinirana sy ny fahatezerana Nebokadnezara, ka nasainy nalaina Sadraka sy Mesaka ary Abednego. Dia nentiny teo anatrehan''ny mpanjaka ireo lehilahy ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia niteny Nebokadnezara ka nanao taminy hoe: Moa fanahy ninianareo va, ry Sadraka sy Mesaka sy Abednego, no tsy mba anompoanareo ny andriamanitro, na ivavahanareo amin''ny sariolona volamena izay natsangako? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ankehitriny raha miomana ianareo amin''izay handrenesanareo ny fanenon''ny anjomara sy ny samboka sy ny valiha sy ny symponia sy ny Sobaba sy ny lokanga ary ny zava-maneno isan-karazany ka miankohoka sy mivavaka amin''ny sariolona izay nataoko, dia tsara izany; fa raha tsy mety mivavaka kosa ianareo, dia hatsipy miaraka amin''izay ho ao anatin''ny lafaoro misy afo mirehitra; ary iza moa izany Andriamanitra hahavonjy anareo amin''ny tanako izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia namaly Sadraka sy Mesaka ary Abednego ka nanao tamin''ny mpanjaka hoe: Ry Nebokadnezara, tsy misy antony tokony hamalianay anao akory ny amin''izany zavatra izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Indro, Andriamanitra Izay tompoinay dia mahavonjy anay amin''ny lafaoro misy afo mirehitra sady hamonjy anay amin''ny tananao, ry mpanjaka ô. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary na dia tsy izany aza, aoka ho fantatrao, ry mpanjaka ô, fa ny andriamanitrao dia tsy hotompoinay, ary ny sariolona volamena efa natsanganao dia tsy hivavahanay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Dia feno fahatezerana Nebokadnezara, ka niova ny tarehiny tamin''i Sadraka sy Mesaka ary Abednego, dia nasainy nafanaina ho impito mihoatra noho ny famana azy ny lafaoro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary izay lehilahy matanjaka indrindra tamin''ny miaramilany no nasainy namatotra an''i Sadraka sy Mesaka ary Abednego sy nanipy azy tao anatin''ny lafaoro nisy afo mirehitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia nafatotra ireo lehilahy ireo, nefa mbola teny aminy ihany ny lobany sy ny akanjony ary ny kapitiny mbamin''ny fitafiany hafa koa, ka dia natsipy teo anatin''ny lafaoro nisy afo mirehitra izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ary satria mafy ny tenin'ny mpanjaka, ka natao mahamay indrindra ny lafaoro, dia matin'ny lelafo ireny lehilahy izay nanipy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Ar. nampiakatra
    marker-yv: yv-n
  - type: text
    text: ' an''i Sadraka sy Mesaka sy Abednego. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary izy telo lahy ireo, Sadraka sy Mesaka sy Abednego, dia voatsipy am-patorana teo anatin''ny lafaoro nisy afo mirehitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia talanjona Nebokadnezara mpanjaka ary nitsangana faingana izy ka niteny tamin''ny mpanolo- tsainy hoe: Moa tsy telo lahy mifatotra va no natsipintsika tao anatin''ny afo? Dia namaly ny mpanjaka ireo ka nanao hoe: Marina izany, ry mpanjaka ô. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy izy: Ka no indro aho mahita efa-dahy tsy mifatotra, mandehandeha eo anaty afo, nefa tsy maninona tsy maninona akory izy; ary ny fijery ilay fahefatra dia toa zanak''ireo andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia nanatona ny varavaran''ny lafaoro nisy afo mirehitra Nebokadnezara ka niantso hoe: Ry Sadraka sy Mesaka sy Abednego, mpanompon''Andriamanitra Avo Indrindra, mivoaha, ka avia atỳ. Dia nivoaka avy teo anatin''ny afo Sadraka sy Mesaka ary Abednego. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia nifanatona ny solo-mpanjaka sy ny mpanapaka sy ny governora ary ny mpanolotsain''ny mpanjaka ka nahita ireo lehilahy ireo, fa tsy nanan-kery hampaninona ny tenany akory ny afo, na nisy singam-bolo nikainkona tamin''ny lohany, na niova ny lobany, ary tsy nisy fofon''afo akory taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nebokadnezara niteny ka nanao hoe: Isaorana anie Andriamanitr''i Sadraka sy Mesaka sy Abednego, Izay naniraka ny anjeliny hamonjy ny mpanompony izay natoky Azy ka nandika ny tenin''ny mpanjaka ary nanolotra ny tenany tsy hanompo na hivavaka amin''izay andriamani-kafa, afa-tsy Andriamaniny ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ka dia manao lalàna aho fa ny fokom-pirenena sy ny firenena sy ny samy hafa fiteny rehetra izay manao teny tsy mety ny amin''Andriamanitr''i Sadraka sy Mesaka sy Abednego dia hotetitetehina, ary hatao trano fivoahana ny tranony; fa tsy misy andriamani-kafa mahavonjy tahaka izao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary Sadraka sy Mesaka sy Abednego dia nasandratry ny mpanjaka tamin''i Babylona sy ny fehiny. Nebokadnezara mpanjaka nampitondra teny ho any amin''ny fokom-pirenena sy ny firenena ary ny samy hafa fiteny rehetra, izay monina amin''ny tany rehetra, nanao hoe: Hitombo anie ny fiadananareo. Sitrako ny hanambara ny famantarana sy ny fahagagana izay nataon''Andriamanitra Avo Indrindra tamiko. Akory ny halehiben''ny famantarany! Ny fanjakany dia fanjakana mandrakizay, ary ny fanapahany dia hahatratra ny taranaka fara mandimby.'
