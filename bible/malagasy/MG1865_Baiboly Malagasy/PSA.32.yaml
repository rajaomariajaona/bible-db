document_id: PSA.32
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny famelan-keloka
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nataon''i Davida. Maskila. Sambatra ny olona izay voavela ny helony sy voasarona ny fahotany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sambatra ny olona izay tsy isain'i Jehovah heloka, ary tsy misy fitaka ny fanahiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Raha nangina aho, dia nihalany ny taolako rehetra, noho ny fitarainako mandrakariva, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa efa navesatra tamiko andro aman'alina ny tananao; niova ny fahatanjahako toy ny azon'ny fahamainana amin'ny lohataona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny fahotako nambarako taminao, ary ny heloko tsy mba nafeniko. Hoy izaho: hiaiky ny fahadisoako amin''i Jehovah aho; ary Hianao dia namela ny heloky ny fahotako. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izany no aoka hivavahan''ny tsara tsara fanahy rehetra aminao amin''izay andro hahitana Anao; eny tokoa, na dia tondraka aza ny rano be, tsy hahatratra azy izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hianao no fiereko, miaro ahy tsy ho azon'ny fahoriana Hianao; fihobiam-pamonjena no ahodidinao ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hanome saina anao sy hampianatra anao izay lalan-kalehanao Aho; hitsinjo anao ny masoko ka hanolo-tsaina anao Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aza manahaka ny soavaly na ny ampondra tsy manan-tsaina; vy sy lamboridy no haingo hihazonana azy, fa tsy mety manakaiky anao izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Be ny fanaintainan'ny ratsy fanahy, fa izay matoky an'i Jehovah kosa dia ho hodidinin'ny famindram-po.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mifalia amin'i Jehovah, ary ravoravoa, ianareo olo-marina, ary mihobia, ianareo mahitsy fo rehetra.
