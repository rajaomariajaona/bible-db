document_id: PSA.32,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny famelan-keloka
  - type: text
    content: 'Nataon''i Davida. Maskila. Sambatra ny olona izay voavela ny helony sy voasarona ny fahotany. '
  '10':
  - type: text
    content: Be ny fanaintainan'ny ratsy fanahy, fa izay matoky an'i Jehovah kosa dia ho hodidinin'ny famindram-po.
  '11':
  - type: text
    content: Mifalia amin'i Jehovah, ary ravoravoa, ianareo olo-marina, ary mihobia, ianareo mahitsy fo rehetra.
  '2':
  - type: text
    content: Sambatra ny olona izay tsy isain'i Jehovah heloka, ary tsy misy fitaka ny fanahiny.
  '3':
  - type: text
    content: 'Raha nangina aho, dia nihalany ny taolako rehetra, noho ny fitarainako mandrakariva, '
  '4':
  - type: text
    content: Fa efa navesatra tamiko andro aman'alina ny tananao; niova ny fahatanjahako toy ny azon'ny fahamainana amin'ny lohataona.
  '5':
  - type: text
    content: 'Ny fahotako nambarako taminao, ary ny heloko tsy mba nafeniko. Hoy izaho: hiaiky ny fahadisoako amin''i Jehovah aho; ary Hianao dia namela ny heloky ny fahotako. '
  '6':
  - type: text
    content: 'Izany no aoka hivavahan''ny tsara tsara fanahy rehetra aminao amin''izay andro hahitana Anao; eny tokoa, na dia tondraka aza ny rano be, tsy hahatratra azy izany. '
  '7':
  - type: text
    content: Hianao no fiereko, miaro ahy tsy ho azon'ny fahoriana Hianao; fihobiam-pamonjena no ahodidinao ahy.
  '8':
  - type: text
    content: 'Hanome saina anao sy hampianatra anao izay lalan-kalehanao Aho; hitsinjo anao ny masoko ka hanolo-tsaina anao Aho. '
  '9':
  - type: text
    content: Aza manahaka ny soavaly na ny ampondra tsy manan-tsaina; vy sy lamboridy no haingo hihazonana azy, fa tsy mety manakaiky anao izy.
