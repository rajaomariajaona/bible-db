document_id: 2SA.22
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hira fisaorana nataon'i Davida noho ny nandreseny ny fahavalony rehetra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Davida nanao izao fihirana izao ho an''i Jehovah tamin''ny andro namonjen''i Jehovah azy tamin''ny tanan''ny fahavalony rehetra, indrindra fa tamin''ny tànan''i Saoly, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'ka hoy izy: Jehovah no harambatoko sy batery fiarovana ho ahy ary Mpamonjy ahy,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Andriamanitra vatolampiko, Izy no ialofako, Ampingako sy tandroko famonjena Izy ary fiarovana avo ho ahy sy fandosirako; Ry Mpamonjy ahy, mahafaka ahy amin'ny fampahoriana Hianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Miantso an'i Jehovah Izay mendrika hoderaina aho, Ka dia vonjena ho afaka amin'ny fahavaloko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fa nihodidina tamiko ny onjan'ny fahafatesana. Ary ny riaky ny faharatsiana nampahatahotra ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny famatoran'ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: ' nihodidina tamiko, nisakana ahy ny fandriky ny fahafatesana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Fony azom-pahoriana aho, dia niantso an'i Jehovah, eny, Andriamanitro no nitarainako; nihaino ny feoko tao an-tempoliny Izy, ary ny fitarainako dia efa tonga eo an-tsofiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dia nihozongozona sy nihorohoro ny tany, ary ny fiorenan'ny lanitra nihorohoro, eny, nihozongozona ireo, satria tezitra Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nisy setroka nisavoana teo am-bavorony, ary afo avy teo am-bavany no nandevona ka nisy vainafo nidedadeda teo aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dia naondriny ny lanitra, ka nidina Izy; Ary aizim-pito no teo ambanin'ny tongony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dia nitaingina kerobima Izy ka nanidina, eny, niseho teo amin'ny ela-drivotra Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Efa nanao ny maizina ho tranony manodidina Azy Izy, dia fivorian-drano sy rahona matevina
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary avy teo amin'ny famirapiratana teo anatrehany nisy vainafo nidedadeda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia nampikotroka tany an-danitra Jehovah, ny Avo Indrindra niloa-peo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dia nandefa zana-tsipìka Izy ka nampiely ny fahavaloko, ary nampandeha helatra ka nampifanaritaka azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dia hita ny fitoeran-dranomasina, ary niseho ny fanambanin'ny tany, noho ny teny mafy nataon'i Jehovah, noho ny fifofofofon'ny fofonain'ny vavorony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Naninjitra ny tànany avy tany ambony Izy ka nandray ahy; nanintona ahy niala tamin'ny rano be Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Namonjy ahy tamin'ny fahavaloko mahery Izy sy tamin'izay nankahala ahy, satria tsy leoko ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nisakana ahy tamin'ny andro nahitako loza ireny, nefa Jehovah no niseho ho Mpanohana ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Dia nitondra ahy ho any amin'ny malalaka Izy; namonjy ahy Izy, satria tiany aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nanisy soa ahy araka ny fahamarinako Jehovah; Araka ny fahadiovan'ny tanako no namaliany ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa nitandrina ny lalan'i Jehovah aho ka tsy mba nanao ratsy hialana tamin'Andriamanitro;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ny fitsipiny rehetra dia teo anatrehako, ary ny lalàny tsy mba nialako;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Tsy nanan-tsiny taminy aho sady niaro tena tsy ho azon'ny fahotako;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Koa namaly ahy araka ny fahamarinako Jehovah, dia araka ny fahadiovako teo imasony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ny olona tsara no isehoanao fa tsara; Ny tena olo-marina no isehoanao fa marina;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ny madio no isehoanao fa madio; Ary ny mpiolakolaka kosa no isehoanao fa lalin-tsaina
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. miolakolaka
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Fa ny olona ory dia vonjenao; Fa ny masonao manandrina ny mpiavonavona, ka aetrinao ireny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Fa Hianao no jiroko, Jehovah ô; Jehovah mampahazava ny fahamaizinako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Fa Hianao no ahazoako mitsarapaka hamely ny miaramila iray toko; Ary Andriamanitro no ahazoako mitsambikina mihoatra ny manda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Raha ny amin'Andriamanitra, dia marina ny lalany; Ny tenin'i Jehovah dia voazaha toetra amin'ny memy; Jehovah no ampingan'izay rehetra mialoka aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Fa iza no Andriamanitra afa-tsy Jehovah? Ary iza no vatolampy afa-tsy Andriamanitsika?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Izany Andriamanitra izany no fiarovana mafy ho ahy; Mitondra ny marina amin'ny lalany Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary manao ny tongony ho tahaka ny an'ny dieravavy Izy; Mampitoetra ahy eo amin'ny fitoerako avo Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Mampianatra ny tanako hiady Izy, ka mahahenjana tsipìka varahina ny sandriko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Omenao ahy ny ampingan'ny famonjenao; Ary ny fahamoram-panahinao no mahalehibe ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Halalahinao ny lalana hodiaviko, ka tsy mangovitra ny hato-tongotro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Manenjika ny fahavaloko aho ka mandripaka azy; Ary tsy mba miverina aho mandra-pahalany ritrany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Mandringana sy mandripaka azy aho, ka tsy maharina izy; Lavo eo ambanin'ny tongotro izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Hianao mampisikina ahy hery hiady; Aripakao ho ambaniko izay mitsangana hamely ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ary ataonao miamboho ahy ny fahavaloko; Ka aringako izay mankahala ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Miherikerika izy, fa tsy misy mpamonjy, eny, maniry an'i Jehovah izy, fa tsy mamaly azy Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Torotoroiko madinika tahaka ny vovo-tany izy; Hoseko tahaka ny fotaka eny an-dalana izy ka apariako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Mamonjy ahy amin'ny fifanoheran'ny oloko Hianao sy miaro ahy ho lohan'ny firenen-tsamy hafa; ny firenena tsy fantatro aza dia manompo ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Ny hafa firenena mikoy ahy; Raha vao mahare ny lazako fotsiny ihany aza izy, dia manoa ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Ny hafa firenena dia mihaketraka ka miala amin-kovitra avy ao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Izahao Sal. xviii.46. Ny dikan'ny teny Hebreo eto dia misikina avy ao, etc
    marker-yv: yv-n
  - type: text
    text: ' amin''ny fiarovany mafy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Velona Jehovah; isaorana anie ny Vatolampiko; Asandratra anie Andriamanitry ny vatolampy famonjena ahy,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Dia Andriamanitra, Izay manao famaliana ho ahy ka mampanaiky ny firenena ahy,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Dia Ilay mitondra ahy ho afaka amin'ny fahavaloko; eny, manandratra ahy ho ambonin'izay mitsangana hanohitra ahy Hianao ary mamonjy ahy amin'ny olon-dozabe;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Koa Izany no hiderako Anao eny amin'ny firenen-tsamy hafa, Jehovah ô, sy hankalazako ny anaranao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Manao famonjen-dehibe ho an'ny mpanjaka voatendriny Izy ary mamindra fo amin'ny voahosony, dia amin'i Davida sy ny taranany mandrakizay.
