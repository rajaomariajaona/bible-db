document_id: 2SA.22,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Hira fisaorana nataon'i Davida noho ny nandreseny ny fahavalony rehetra
  - type: text
    content: 'Ary Davida nanao izao fihirana izao ho an''i Jehovah tamin''ny andro namonjen''i Jehovah azy tamin''ny tanan''ny fahavalony rehetra, indrindra fa tamin''ny tànan''i Saoly, '
  '10':
  - type: text
    content: Dia naondriny ny lanitra, ka nidina Izy; Ary aizim-pito no teo ambanin'ny tongony.
  '11':
  - type: text
    content: Dia nitaingina kerobima Izy ka nanidina, eny, niseho teo amin'ny ela-drivotra Izy.
  '12':
  - type: text
    content: Efa nanao ny maizina ho tranony manodidina Azy Izy, dia fivorian-drano sy rahona matevina
  '13':
  - type: text
    content: Ary avy teo amin'ny famirapiratana teo anatrehany nisy vainafo nidedadeda.
  '14':
  - type: text
    content: Dia nampikotroka tany an-danitra Jehovah, ny Avo Indrindra niloa-peo.
  '15':
  - type: text
    content: Dia nandefa zana-tsipìka Izy ka nampiely ny fahavaloko, ary nampandeha helatra ka nampifanaritaka azy.
  '16':
  - type: text
    content: Dia hita ny fitoeran-dranomasina, ary niseho ny fanambanin'ny tany, noho ny teny mafy nataon'i Jehovah, noho ny fifofofofon'ny fofonain'ny vavorony.
  '17':
  - type: text
    content: Naninjitra ny tànany avy tany ambony Izy ka nandray ahy; nanintona ahy niala tamin'ny rano be Izy.
  '18':
  - type: text
    content: Namonjy ahy tamin'ny fahavaloko mahery Izy sy tamin'izay nankahala ahy, satria tsy leoko ireny.
  '19':
  - type: text
    content: Nisakana ahy tamin'ny andro nahitako loza ireny, nefa Jehovah no niseho ho Mpanohana ahy.
  '2':
  - type: text
    content: 'ka hoy izy: Jehovah no harambatoko sy batery fiarovana ho ahy ary Mpamonjy ahy,'
  '20':
  - type: text
    content: Dia nitondra ahy ho any amin'ny malalaka Izy; namonjy ahy Izy, satria tiany aho.
  '21':
  - type: text
    content: Nanisy soa ahy araka ny fahamarinako Jehovah; Araka ny fahadiovan'ny tanako no namaliany ahy.
  '22':
  - type: text
    content: Fa nitandrina ny lalan'i Jehovah aho ka tsy mba nanao ratsy hialana tamin'Andriamanitro;
  '23':
  - type: text
    content: Ny fitsipiny rehetra dia teo anatrehako, ary ny lalàny tsy mba nialako;
  '24':
  - type: text
    content: Tsy nanan-tsiny taminy aho sady niaro tena tsy ho azon'ny fahotako;
  '25':
  - type: text
    content: Koa namaly ahy araka ny fahamarinako Jehovah, dia araka ny fahadiovako teo imasony.
  '26':
  - type: text
    content: Ny olona tsara no isehoanao fa tsara; Ny tena olo-marina no isehoanao fa marina;
  '27':
  - type: text
    content: Ny madio no isehoanao fa madio; Ary ny mpiolakolaka kosa no isehoanao fa lalin-tsaina
  - type: note
    content: Heb. miolakolaka
  - type: text
    content: .
  '28':
  - type: text
    content: Fa ny olona ory dia vonjenao; Fa ny masonao manandrina ny mpiavonavona, ka aetrinao ireny.
  '29':
  - type: text
    content: Fa Hianao no jiroko, Jehovah ô; Jehovah mampahazava ny fahamaizinako.
  '3':
  - type: text
    content: Andriamanitra vatolampiko, Izy no ialofako, Ampingako sy tandroko famonjena Izy ary fiarovana avo ho ahy sy fandosirako; Ry Mpamonjy ahy, mahafaka ahy amin'ny fampahoriana Hianao.
  '30':
  - type: text
    content: Fa Hianao no ahazoako mitsarapaka hamely ny miaramila iray toko; Ary Andriamanitro no ahazoako mitsambikina mihoatra ny manda.
  '31':
  - type: text
    content: Raha ny amin'Andriamanitra, dia marina ny lalany; Ny tenin'i Jehovah dia voazaha toetra amin'ny memy; Jehovah no ampingan'izay rehetra mialoka aminy.
  '32':
  - type: text
    content: Fa iza no Andriamanitra afa-tsy Jehovah? Ary iza no vatolampy afa-tsy Andriamanitsika?
  '33':
  - type: text
    content: Izany Andriamanitra izany no fiarovana mafy ho ahy; Mitondra ny marina amin'ny lalany Izy.
  '34':
  - type: text
    content: Ary manao ny tongony ho tahaka ny an'ny dieravavy Izy; Mampitoetra ahy eo amin'ny fitoerako avo Izy.
  '35':
  - type: text
    content: Mampianatra ny tanako hiady Izy, ka mahahenjana tsipìka varahina ny sandriko.
  '36':
  - type: text
    content: Omenao ahy ny ampingan'ny famonjenao; Ary ny fahamoram-panahinao no mahalehibe ahy.
  '37':
  - type: text
    content: Halalahinao ny lalana hodiaviko, ka tsy mangovitra ny hato-tongotro.
  '38':
  - type: text
    content: Manenjika ny fahavaloko aho ka mandripaka azy; Ary tsy mba miverina aho mandra-pahalany ritrany.
  '39':
  - type: text
    content: Mandringana sy mandripaka azy aho, ka tsy maharina izy; Lavo eo ambanin'ny tongotro izy.
  '4':
  - type: text
    content: Miantso an'i Jehovah Izay mendrika hoderaina aho, Ka dia vonjena ho afaka amin'ny fahavaloko.
  '40':
  - type: text
    content: Hianao mampisikina ahy hery hiady; Aripakao ho ambaniko izay mitsangana hamely ahy.
  '41':
  - type: text
    content: Ary ataonao miamboho ahy ny fahavaloko; Ka aringako izay mankahala ahy.
  '42':
  - type: text
    content: Miherikerika izy, fa tsy misy mpamonjy, eny, maniry an'i Jehovah izy, fa tsy mamaly azy Izy.
  '43':
  - type: text
    content: Torotoroiko madinika tahaka ny vovo-tany izy; Hoseko tahaka ny fotaka eny an-dalana izy ka apariako.
  '44':
  - type: text
    content: Mamonjy ahy amin'ny fifanoheran'ny oloko Hianao sy miaro ahy ho lohan'ny firenen-tsamy hafa; ny firenena tsy fantatro aza dia manompo ahy.
  '45':
  - type: text
    content: Ny hafa firenena mikoy ahy; Raha vao mahare ny lazako fotsiny ihany aza izy, dia manoa ahy.
  '46':
  - type: text
    content: Ny hafa firenena dia mihaketraka ka miala amin-kovitra avy ao
  - type: note
    content: Izahao Sal. xviii.46. Ny dikan'ny teny Hebreo eto dia misikina avy ao, etc
  - type: text
    content: ' amin''ny fiarovany mafy.'
  '47':
  - type: text
    content: Velona Jehovah; isaorana anie ny Vatolampiko; Asandratra anie Andriamanitry ny vatolampy famonjena ahy,
  '48':
  - type: text
    content: Dia Andriamanitra, Izay manao famaliana ho ahy ka mampanaiky ny firenena ahy,
  '49':
  - type: text
    content: Dia Ilay mitondra ahy ho afaka amin'ny fahavaloko; eny, manandratra ahy ho ambonin'izay mitsangana hanohitra ahy Hianao ary mamonjy ahy amin'ny olon-dozabe;
  '5':
  - type: text
    content: Fa nihodidina tamiko ny onjan'ny fahafatesana. Ary ny riaky ny faharatsiana nampahatahotra ahy.
  '50':
  - type: text
    content: Koa Izany no hiderako Anao eny amin'ny firenen-tsamy hafa, Jehovah ô, sy hankalazako ny anaranao.
  '51':
  - type: text
    content: Manao famonjen-dehibe ho an'ny mpanjaka voatendriny Izy ary mamindra fo amin'ny voahosony, dia amin'i Davida sy ny taranany mandrakizay.
  '6':
  - type: text
    content: Ny famatoran'ny fiainan-tsi-hita
  - type: note
    content: Heb. Sheola
  - type: text
    content: ' nihodidina tamiko, nisakana ahy ny fandriky ny fahafatesana.'
  '7':
  - type: text
    content: Fony azom-pahoriana aho, dia niantso an'i Jehovah, eny, Andriamanitro no nitarainako; nihaino ny feoko tao an-tempoliny Izy, ary ny fitarainako dia efa tonga eo an-tsofiny.
  '8':
  - type: text
    content: Dia nihozongozona sy nihorohoro ny tany, ary ny fiorenan'ny lanitra nihorohoro, eny, nihozongozona ireo, satria tezitra Jehovah.
  '9':
  - type: text
    content: Nisy setroka nisavoana teo am-bavorony, ary afo avy teo am-bavany no nandevona ka nisy vainafo nidedadeda teo aminy.
