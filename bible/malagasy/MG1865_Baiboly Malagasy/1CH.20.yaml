document_id: 1CH.20,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nataon'ny lehilahy maherin'i Davida tamin'ny niadiany tamin'ny Filistina
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa niherina ny taona, ka mby amin''ny andro fandehanan''ny mpanjaka hiady, dia nitondra ny miaramila rehetra Joaba ka nandrava ny tanin''ny taranak''i Amona, dia tonga izy ka nanao fahirano an''i Raba; fa Davida kosa nijanona tany Jerosalema ihany. Ary Joaba nahafaka an''i Raba, ka dia nandrava azy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nesorin'i Davida ny satro-boninahitr'ilay mpanjaka
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Malkama;'
      marker-yv: yv-n
    - type: text
      text: 'teo an-dohany, ka hitany fa talenta volamena iray no lanjany, sady nisy vato soa, ary dia nisatrohan''i Davida. Ary navoakany ny babo azo tao an-tanàna ka be dia be. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary dia navoakany koa ny olona izay tao, ka nasiany
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. notsofiny
      marker-yv: yv-n
    - type: text
      text: ' tamin''ny tsofa sy tamin''ny fangao-by lehibe sy ny famaky; toy izany no nataon''i Davida tamin''ny tanànan''ny taranak''i Amona rehetra. Ary Davida sy ny vahoaka rehetra dia niverina nankany Jerosalema.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony afaka izany, dia nisy ady tamin''ny Filistina tao Gazera; tamin''izany no namonoan''i Sibekay Hosatita an''i Sipay, izay isan''ny taranaky ny Refaita, ka dia naetriny ny Filistina. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia nisy ady tamin''ny Filistina indray ary Elanana, zanak''i Jaira, namono an''i Lamy, rahalahin''i Goliata Gatita, izay nanan-jaran-defona tahaka ny vodi-tenon''ny mpanenona. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nisy ady indray tao Gata; ary tao nisy lehilahy vaventibe izay enin-drantsana, ka dia efatra amby roa-polo no isan''ny rantsan-tànany sy ny rantsan-tongony; ary izy koa mba isan''ny taranaky ny Refaita. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony nihaika ny Isiraely izy, dia nahafaty azy Jonatana, zanak''i Simea, rahalahin''i Davida. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ireo no taranaky ny Refaita tao Gata, ka matin'ny tànan'i Davida sy ny tanan'ny mpanompony ireo.
