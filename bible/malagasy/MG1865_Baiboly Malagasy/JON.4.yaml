document_id: JON.4,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nimonomononan'i Jona, sy ny nananaran'Andriamanitra azy
  - type: text
    content: 'Fa tsy sitrak''i Jona indrindra izany, ka nirehitra ny fahatezerany. '
  '10':
  - type: text
    content: 'Dia hoy Jehovah: Hianao malahelo ny tanantanamanga izay tsy nisasaranao na nampanirinao, dia ilay naniry indray alina monja ary maty indray alina koa; '
  '11':
  - type: text
    content: ka moa Izaho tsy mba halahelo an'i Ninive, ilay tanàna lehibe va. izay misy olona tsy omby roa alina sy iray hetsy, izay tsy mahafantatra ny havanany sy ny haviany, sady be biby fiompy koa?
  '2':
  - type: text
    content: 'Dia nivavaka tamin''i Jehovah izy ka nanao hoe: Mifona aminao aho, Jehovah ô, tsy izao ihany va no efa nolazaiko fony aho mbola tany amin''ny taniko? Fa ny andrao hisy toy izao no nandosirako ho any Tarsisy, satria fantatro fa Hianao dia Andriamanitra mamindra fo sy miantra, mahari-po sady be famindram-po ary manenina ny amin''ny loza. '
  '3':
  - type: text
    content: 'Koa mifona aminao aho ankehitriny, Jehovah ô, esory ny aiko; fa aleoko ho faty toy izay ho velona. '
  '4':
  - type: text
    content: 'Fa hoy Jehovah: Moa mety va izao firehitry ny fahatezeranao izao?'
  '5':
  - type: text
    content: Dia nivoaka ny tanàna Jona
  - type: note
    content: 'Na: ary Jona efa nivoaka ny tanàna'
  - type: text
    content: ' ka nipetraka teo atsinanan-tanàna; ary nanao trano rantsan-kazo ho azy teo izy ka nipetraka teo ambanin''ny alokalony ambara-pahitany izay hiafaran''ny tanàna. '
  '6':
  - type: text
    content: 'Ary Jehovah Andriamanitra nanomana tanantanamanga, ka nampaniriny hanalokaloka an''i Jona izany ho alokaloky ny lohany, hanafaka ny alahelony. Ka dia nahafaly an''i Jona indrindra ny tanantanamanga. '
  '7':
  - type: text
    content: 'Kanjo nony ampitso maraina dia nanomana fositra koa Andriamanitra, ka namely ilay tanantanamanga iny, dia nalazo io. '
  '8':
  - type: text
    content: 'Ary nony niposaka ny masoandro, Andriamanitra dia nanomana rivotra mahamay avy any atsinanana, ary dia namely ny lohan''i Jona ny masoandro, dia ana izy ka nangataka ny ho faty, nanao hoe: Aleoko ho faty toy izay ho velona. '
  '9':
  - type: text
    content: 'Fa hoy Andriamanitra tamin''i Jona: Moa mety va izao firehitry ny fahatezeranao ny amin''ny tanantanamanga izao ? Ary hoy izy: Mety ny hahatezerako na dia mandra-pahafatiko aza. '
