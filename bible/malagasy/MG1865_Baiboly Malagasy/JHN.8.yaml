document_id: JHN.8,96
type_code: plt
verses:
  '1':
  - type: text
    content: '[fa Jesosy kosa nankany an-tendrombohitra Oliva '
  '10':
  - type: text
    content: 'Ary rehefa nitraka Jesosy, dia hoy Izy taminy; Ravehivavy, aiza ireny? Tsy nisy nanameloka anao va? '
  '11':
  - type: text
    content: 'Ary hoy izy: Tsy misy, Tompoko. Dia hoy Jesosy: Izaho koa dia tsy manameloka anao; mandehana, ary amin''izao sisa izao dia aza manota intsony] '
  '12':
  - type: text
    content: 'Ary Jesosy niteny tamin''ny olona indray ka nanao hoe: Izaho no fahazavan''izao tontolo izao; izay manaraka Ahy tsy mba handeha amin''ny maizina, fa hanana ny fahazavan''aina. '
  '13':
  - type: text
    content: 'Ary hoy ny Fariseo taminy: Hianao manambara ny tenanao, koa tsy marina ny fanambaranao. '
  '14':
  - type: text
    content: 'Jesosy namaly ka nanao taminy hoe: Na dia manambara ny tenako aza Aho, dia marina ny fanambarako, satria fantatro izay nihaviako sy izay alehako; fa ianareo kosa tsy mahalala izay ihaviako, na izay alehako. '
  '15':
  - type: text
    content: 'Hianareo mitsara araka ny nofo; Izaho tsy mitsara olona na dia iray akory aza. '
  '16':
  - type: text
    content: 'Ary na dia mitsara aza Aho, dia marina ny fitsarako, satria tsy irery Aho, fa Izaho sy ny Ray Izay naniraka Ahy. '
  '17':
  - type: text
    content: 'Ary voasoratra ao amin''ny lalànareo fa marina ny fanambaran''ny olona roa lahy (Deo. 19. 15). '
  '18':
  - type: text
    content: 'Izaho no manambara ny tenako, ary ny Ray Izay naniraka Ahy dia manambara Ahy koa. '
  '19':
  - type: text
    content: 'Dia hoy ireo taminy: Aiza izay Rainao? Jesosy namaly hoe: Samy tsy fantatrareo, na Izaho, na ny Raiko; raha nahalala Ahy ianareo, dia ho nahalala ny Raiko koa. '
  '2':
  - type: text
    content: 'Ary nony maraina koa dia nankeo an-kianjan''ny tempoly indray Jesosy, ary ny vahoaka rehetra nanatona Azy, dia nipetraka Izy ka nampianatra azy '
  '20':
  - type: text
    content: 'Izany teny izany no nolazain''i Jesosy teo akaikin''ny fandatsahan-drakitra, raha nampianatra teo an-kianjan''ny tempoly Izy; ary tsy nisy olona nisambotra Azy, satria tsy mbola tonga ny fotoany. '
  '21':
  - type: text
    content: 'Ary hoy indray Jesosy taminy: Handeha Aho, ary hitady Ahy ianareo, ary ho faty amin''ny fahotanareo; izay alehako tsy azonareo haleha. '
  '22':
  - type: text
    content: 'Dia hoy ny Jiosy: Hamono tena va Izy, no manao hoe: Izay alehako tsy azonareo haleha? '
  '23':
  - type: text
    content: 'Fa hoy Izy taminy; Hianareo avy atỳ ambany; Izaho avy any ambony; ianareo avy amin''izao tontolo izao; Izaho tsy mba avy amin''izao tontolo izao; '
  '24':
  - type: text
    content: 'koa izany no nilazako taminareo fa ho faty amin''ny fahotanareo ianareo; fa raha tsy mino ianareo fa Izaho no Izy, dia ho faty amin''ny fahotanareo ianareo. '
  '25':
  - type: text
    content: 'Dia hoy ireo taminy: Iza moa Hianao? Hoy Jesosy taminy: Ilay nolazaiko taminareo hatramin''ny voalohany'
  - type: note
    content: 'Na: Ilay lazaiko aminareo indrindra'
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'Manana zavatra maro hilazana sy hitsarana anareo Aho, satria marina Izay naniraka Ahy; ary izay zavatra efa reko taminy no lazaiko amin''izao tontolo izao. '
  '27':
  - type: text
    content: 'Tsy fantany fa ny Ray no nolazainy taminy, '
  '28':
  - type: text
    content: 'ka dia hoy Jesosy: Rehefa asandratrareo ny Zanak''olona, dia ho fantatrareo fa Izaho no Izy, ary tsy manao na inona na inona ho Ahy Aho, fa araka ny nampianarin''ny Raiko Ahy no ilazako izany zavatra izany. '
  '29':
  - type: text
    content: 'Ary izay naniraka Ahy dia eto amiko; tsy nandao Ahy ho irery Izy, satria Izaho manao izay sitrany mandrakariva. '
  '3':
  - type: text
    content: 'Ary nisy vehivavy anankiray azo nijangajanga nentin''ny mpanora-dalàna sy ny Fariseo; ary rehefa napetrany teo afovoany izy, '
  '30':
  - type: text
    content: 'Raha nanao izany teny izany Jesosy, dia maro no nino Azy. '
  '31':
  - type: text
    content: 'Dia hoy Jesosy tamin''ny Jiosy izay nino Azy: Raha maharitra amin''ny teniko ianareo, dia ho mpianatro tokoa; '
  '32':
  - type: text
    content: 'ka ho fantatrareo ny marina, ary ny marina hahafaka anareo tsy ho andevo. '
  '33':
  - type: text
    content: 'Ary ireo dia namaly Azy ka nanao hoe: Taranak''i Abrahama izahay, fa tsy mba andevon''olona hatrizay ela izay; koa nahoana no ataonao hoe: Ho afaka ianareo? '
  '34':
  - type: text
    content: 'Jesosy namaly azy hoe: Lazaiko aminareo marina dia marina tokoa fa izay rehetra manota dia andevon''ny ota. '
  '35':
  - type: text
    content: Fa ny andevo tsy mitoetra ao an-trano mandrakariva
  - type: note
    content: Gr. mandrakizay
  - type: text
    content: ; fa ny zanaka no mitoetra mandrakariva
  - type: note
    content: Gr. mandrakizay
  - type: text
    content: '. '
  '36':
  - type: text
    content: 'Koa raha ny Zanaka no hahafaka anareo, dia ho afaka tokoa ianareo. '
  '37':
  - type: text
    content: 'Fantatro ihany fa taranak''i Abrahama ianareo, nefa mitady hamono Ahy, satria ny teniko tsy mitombo ao anatinareo. '
  '38':
  - type: text
    content: 'Izay efa hitako tamin''ny Ray no lazaiko, ary ianareo kosa manao izay renareo tamin''ny rainareo. '
  '39':
  - type: text
    content: 'Dia namaly ireo ka nanao taminy hoe: Abrahama no rainay. Hoy Jesosy taminy: Raha zanak''i Abrahama ianareo, dia ny asan''i Abrahama no hataonareo. '
  '4':
  - type: text
    content: 'dia hoy ireo taminy: Mpampianatra ô, ity vehivavy ity azo olan-tanana nijangajanga '
  '40':
  - type: text
    content: 'Fa ankehitriny ianareo mitady hamono Ahy, Izay Lehilahy nilaza ny marina taminareo, dia izay efa reko tamin''Andriamanitra; tsy mba nanao izany Abrahama. '
  '41':
  - type: text
    content: 'Hianareo manao ny asan''ny rainareo. Hoy ireo taminy: Tsy mba teraka avy tamin''ny fijangajangana izahay; iray Ray izahay, dia Andriamanitra ihany. '
  '42':
  - type: text
    content: 'Hoy Jesosy taminy: Raha Andriamanitra no Rainareo, dia ho tia Ahy ianareo, satria avy tamin''Andriamanitra no nivoahako sy nankanesako atỳ ; fa Izaho tsy tonga ho Ahy, fa Izy no naniraka Ahy. '
  '43':
  - type: text
    content: 'Nahoana no tsy azonareo ny teniko? satria tsy mahay mihaino ny teniko ianareo. '
  '44':
  - type: text
    content: Hianareo avy tamin'ny devoly rainareo, ka izay sitraky ny rainareo no tianareo hatao. Izy dia mpamono olona hatramin'ny taloha, ary tsy nitoetra tamin
  - type: note
    content: 'Na: (mitoetra amin'')'
  - type: text
    content: '''ny marina, satria tsy misy marina aminy. Raha mandainga izy, dia ny azy no lazainy, satria mpandainga izy sady rain''ny lainga. '
  '45':
  - type: text
    content: 'Fa satria milaza ny marina Aho, dia tsy inoanareo. '
  '46':
  - type: text
    content: 'Iza moa aminareo no mampiseho Ahy ho nanota? Raha ny marina no lazaiko, nahoana ianareo no tsy mino Ahy? '
  '47':
  - type: text
    content: 'Izay avy amin''Andriamanitra dia mihaino ny tenin''Andriamanitra; izany no tsy ihainoanareo, satria tsy mba avy amin''Andriamanitra ianareo. '
  '48':
  - type: text
    content: 'Dia namaly ny Jiosy ka nanao taminy hoe: Tsy marina va ny filazanay fa Samaritana Hianao sady manana demonia? '
  '49':
  - type: text
    content: 'Jesosy namaly hoe: Izaho tsy manana demonia, fa mankalaza ny Raiko, ary ianareo kosa mahafa-boninahitra Ahy. '
  '5':
  - type: text
    content: 'Ary ao amin''ny lalàna Mosesy dia nandidy antsika fa hotoraham-bato izay vehivavy manao toy izany (Deo. 22. 22-24); fa ahoana kosa hoy Hianao? '
  '50':
  - type: text
    content: 'Fa Izaho tsy mitady ny voninahitro; misy Iray mitady sy mitsara. '
  '51':
  - type: text
    content: 'Lazaiko aminareo marina dia marina tokoa: Raha misy olona mitandrina ny teniko, dia tsy mba hahita fahafatesana izy mandrakizay. '
  '52':
  - type: text
    content: 'Dia hoy ny Jiosy taminy: Fantatray ankehitriny fa manana demonia Hianao. Efa maty Abrahama sy ny mpaminany; nefa hoy Hianao: Raha misy olona mitandrina ny teniko, dia tsy mba hanandrana fahafatesana izy mandrakizay. '
  '53':
  - type: text
    content: 'Moa Hianao va lehibe noho Abrahama rainay izay efa maty? sady efa maty koa ny mpaminany; manao Anao ho iza moa Hianao? '
  '54':
  - type: text
    content: 'Jesosy namaly hoe: Raha mankalaza ny tenako Aho, dia tsinontsinona ny lazako; ny Raiko, Izay ataonareo fa Andriamanitrareo, Izy no mankalaza Ahy. '
  '55':
  - type: text
    content: 'Tsy fantatrareo Izy, fa Izaho no mahalala Azy; ary raha hoy Izaho: Tsy fantatro Izy, dia mba mpandainga tahaka anareo koa Aho; nefa mahalala Azy Aho ka mitandrina ny teniny. '
  '56':
  - type: text
    content: 'Ravoravo Abrahama rainareo hahita ny androko; ary nahita izy ka faly. '
  '57':
  - type: text
    content: 'Dia hoy ny Jiosy taminy: Tsy mbola dimam-polo taona akory Hianao, ka dia efa nahita an''i Abrahama va? '
  '58':
  - type: text
    content: 'Hoy Jesosy taminy: Lazaiko aminareo marina tokoa: Fony tsy mbola ary Abrahama, dia Izy Aho. '
  '59':
  - type: text
    content: Dia naka vato hitoraka Azy ny olona; fa Jesosy niery ka niala teo an-kianjan'ny tempoly
  - type: note
    content: 'Ampio hoe: ary namaky teo afovoan''ny olona ka lasa'
  - type: text
    content: .
  '6':
  - type: text
    content: 'Izany no nolazainy hakany fanahy Azy, mba hahazoany izay hiampangany Azy. Fa Jesosy niondrika ka nanoratra teo amin''ny tany tamin''ny rantsan-tànany '
  '7':
  - type: text
    content: 'Ary raha naharitra nanontany Azy ireo, dia nitraka Izy ka nanao taminy hoe: Izay tsy nanota eo aminareo no aoka hitora-bato azy voalohany '
  '8':
  - type: text
    content: 'Dia niondrika indray Izy ka nanoratra teo amin''ny tany tamin''ny rantsan-tànany '
  '9':
  - type: text
    content: 'Ary raha nandre izany izy, dia nivoaka tsirairay hatramin''ny zokinjokiny ka hatramin''ny zandrinjandriny; ary Jesosy irery ihany no sisa teo sy ilay vehivavy teo '
