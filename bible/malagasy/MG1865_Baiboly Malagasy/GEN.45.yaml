document_id: GEN.45
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Josefa tsy nahatsindry ny fangorakoraky ny fony intsony teo anatrehan''izay rehetra teo aminy; dia niantso izy ka nanao hoe: Avoahy ny olona rehetra hiala eto amiko. Ary dia tsy nisy olona na dia iray aza nijanona teo amin''i Josefa, raha nanao izay hahafantaran''ny rahalahiny azy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dia nitomany mafy izy, ka ren''ny Egyptiana, ary ren''ny tao an-tranon''i Farao koa. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy Josefa tamin''ny rahalahiny: Izaho no Josefa; mbola velona ihany va ikaky? Ary tsy nahavaly azy ny rahalahiny; fa toran-kovitra teo anatrehany ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary hoy Josefa tamin''ny rahalahiny: Avia, manatòna ahy ianareo. Dia nanatona ireo. Ary hoy Josefa: Izaho no Josefa rahalahinareo, ilay namidinareo ho atỳ Egypta. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ankehitriny, aza malahelo na tezitra amin''ny tenanareo noho ny nivarotanareo ahy ho atỳ; fa hamonjy aina no nampandehanan''Andriamanitra ahy hialoha anareo atỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa roa taona izao no efa nisian''ny mosary teto amin''ny tany; ary mbola misy dimy taona koa, izay tsy hisy hiasan-tany na hijinjana. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary Andriamanitra efa nampandeha ahy hialoha anareo, mba tsy hahalany taranaka anareo amin''ny tany, fa hamelona anareo amin''ny famonjena lehibe. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary amin''izany, tsy ianareo no nampandeha ahy ho atỳ, fa Andriamanitra; ary Izy nanao ahy ho rain''i Farao, sy ho tompon''ny ao an-tranony rehetra, ary ho mpanapaka ny tany Egypta rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Andeha miakatra faingana ianareo ho any amin''ikaky, ka lazao aminy hoe: Izao no tenin''i Josefa zanakao: Efa nataon''Andriamanitra ho tompon''i Egypta rehetra aho; ka midìna hankatỳ amiko, fa aza mijanona; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'dia honina eo amin''ny tany Gosena ianao, ka ho eo akaikiko ianao sy ny zanakao sy ny zafinao ary ny ondry aman''osinao sy ny ombinao mbamin''izay rehetra anananao. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia hamelona anao eo aho (fa mbola haharitra dimy taona ny mosary), fandrao ho lany harena ianao sy ny ankohonanao ary izay rehetra anananao. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary, indro, hitan''ny masonareo sy ny mason''i Benjamina rahalahiko izao fa ny vavako no miteny aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dia hambaranareo amin''ikaky ny voninahitro rehetra atỳ Egypta sy izay rehetra efa hitanareo; koa mandehana faingana ianareo, ka ento midina atỳ ikaky. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia namihina ny vozon''i Benjamina rahalahiny izy ka nitomany; ary Benjamina koa dia mba nitomany teo amin''ny vozony. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary dia nanoroka ny rahalahiny rehetra izy ka nitomany teo am-pamihinany azy; ary rehefa afaka izany, dia niresaka taminy ireo rahalahiny. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary re tao an-tranon''i Farao ny teny hoe: Tonga ny rahalahin''i Josefa; dia sitrak''i Farao sy ny mpanompony izany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary hoy Farao tamin''i Josefa: Lazao amin''ny rahalahinao: Izao no ataovy: atai­ngeno ny entana ho entin''ny bibinareo, ka mankanesa any amin''ny tany Kanana; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ary alao ny rainareo sy ny ankohonanareo, ka mankanesa atỳ amiko; ary dia homeko anareo ny tsara eto amin''ny tany Egypta, ka hihinana ny matavy eto amin''ny tany ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary ankehitriny efa nomena teny ianao, ka izao no ataovy: makà sariety amin''ny tany Egypta hitondranareo ny vady aman-janakareo, ary ento ny rainareo, ka mankanesa atỳ. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Aza malahelo ny amin''ny fanakareo; fa anareo izay tsara eto amin''ny tany Egypta rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary nataon''ny zanak''Isiraely izany, ka dia nomen''i Josefa sariety izy, araka ny tenin''i Farao; ary nomeny vatsy koa ho entiny eny an-dalana izy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary izy rehetra samy nomeny akanjo indray miova avy; fa Benjami­na kosa nomeny sekely volafotsy telon-jato sy akanjo indimy miova. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary izao kosa no nampitondrainy ho an-drainy: borikilahy folo nitondra zava-tsoa avy tany Egypta, sy borikivavy folo nitondra vary sy mofo, ary vatsy ho an''ny rainy ho entiny eny an-dalana. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nampandehaniny ny rahalahiny, ka lasa nandeha izy ireo; ary hoy Josefa taminy: Aza mifanditra eny an-dalana ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia niakatra avy tany Egypta izy ireo ka tonga tany amin''i Jakoba rainy tany amin''ny tany Kanana. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia nilaza taminy izy ka nanao hoe: Mbola velona ihany Josefa, ary izy no mpanapaka ny tany Egypta rehetra, kanefa nangatsiaka ihany ny fon''i Jakoba, fa tsy nino azy izy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia nolazain''izy ireo ny teny rehetra izay efa nolazain''i Josefa taminy: ary rehefa hitany ny sariety izay efa nampitondrain''i Josefa hitondrana azy, dia izay vao velona indray ny fanahin''i Jakoba rainy '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary hoy Isiraely: Aoka ary, fa mbola velona ihany Josefa zanako; handeha aho ka hahita azy, dieny tsy mbola maty aho.'
