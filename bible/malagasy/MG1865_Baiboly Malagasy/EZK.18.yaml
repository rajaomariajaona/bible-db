document_id: EZK.18,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny famalian'Andriamanitra ny olona araka ny asany avy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha miteraka zazalahy mpanao an-keriny sy mpandatsa-drà izy, ka manao na dia iray ihany amin''ireo zavatra ireo aza iny '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(nefa tsy nanao ireo zavatra ireo akory ny tenany), na mihinana eny an-tendrombohitra, na mandoto ny vadin''ny namany, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'na mampahory ny malahelo sy ny mahantra, na mandroba, na tsy mamerina ny natao tsatòka, na manandratra ny masony ho amin''ny sampy ka manao izay fahavetavetana, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: na mampanana vola, na maka tombony moa ho velona va izy? Tsy ho velona izy; nanao ireo fahavetavetana rehetra ireo izy; ho faty tokoa izy, ary ny ràny dia ho aminy ihany.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary, indro, raha iny kosa indray miteraka zazalahy, izay mahita ny fahotana rehetra nataon-drainy, nefa nony mahita izany izy, dia tsy mba manao tahaka izany, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ka tsy mihinana eny an-tendrombohitra, na manandratra ny masony ho amin''ny sampin''ny taranak''Isiraely, na mandoto ny vadin''ny namany, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'na mampahory olona, na maka tsatòka, na mandroba, fa manome ny haniny ho an''ny noana ary manafy lamba ny mitanjaka, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'miaro ny tànany tsy hampahory ny mahantra, tsy mampanana vola, na maka tombony, fa manaraka ny fitsipiko sy mandeha araka ny lalàko, dia tsy ho faty noho ny helo-drainy izy; ho velona tokoa izy. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny amin'ny rainy, noho ny nanaovany an-keriny sy ny nandrobany ny rahalahiny ary ny nanaovany izay tsy mety tao amin'ny fireneny, dia, indro, ho faty noho ny helony izy.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa, hoy ianareo: Nahoana moa ny zanaka no tsy mba hitondra ny helo-drainy? Raha ny zanaka manao izay marina sy mahitsy sy mitandrina ny didiko rehetra ka mankatò azy, dia ho velona tokoa izy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nahoana no manao izao ohabolana izao ao amin''ny tanin''ny Isiraely ianareo: Ny ray no mihinana voaloboka maharikivy, ka ny nifin''ny zanany no madilo? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fanahy izay manota no ho faty. Ny zanaka tsy mba hitondra ny heloky ny rainy, ary ny ray tsy mba hitondra ny heloky ny zanany; ny fahamarinan'ny marina ho aminy ihany ary ny faharatsian'ny ratsy fanahy kosa ho aminy ihany.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha ny ratsy fanahy miala amin''ny fahotana rehetra izay nataony ka mitandrina ny didiko rehetra ary manao izay marina sy mahitsy, dia ho velona tokoa izy, fa tsy ho faty. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny fahadisoany rehetra izay nataony tsy hotsarovana aminy intsony; ho velona izy noho ny fahamarinana izay nataony.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa sitrako akory va ny fahafatesan''ny ratsy fanahy, hoy Jehovah Tompo, fa tsy ny hialany amin''ny alehany mba ho velona izy ? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha ny marina no miala amin''ny fahamarinany ka manao meloka ary manaraka ny fahavetavetana rehetra izay nataon''ny ratsy fanahy, ho velona va izy? Ny fahamarinany rehetra izay nataony dia tsy hotsarovana; noho ny fahadisoana izay nandisoany sy ny fahotana izay nanotany dia ho faty izy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa hoy ianareo: Tsy marina ny fitondran'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. lalana
      marker-yv: yv-n
    - type: text
      text: '''ny Tompo. Mihainoa ange, ry taranak''Isiraely: Moa ny fitondrako'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. lalana
      marker-yv: yv-n
    - type: text
      text: ' va no tsy marina ? Tsy ny fitondranareo'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. lalana
      marker-yv: yv-n
    - type: text
      text: ' va no tsy marina? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha ny marina miala amin''ny fahamarinany ary manao meloka ka maty amin''izany, dia maty noho ny heloka nataony ihany izy. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary raha ny ratsy fanahy miala amin''ny faharatsiana nataony ka manao izay marina sy mahitsy, dia hovelominy ny fanahiny. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha mahita izy ka miala amin''ny fahadisoana rehetra izay nataony, dia ho velona tokoa izy, fa tsy ho faty. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nefa hoy ny taranak''Isiraely: Tsy marina ny fitondran'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. lalana
      marker-yv: yv-n
    - type: text
      text: '''ny Tompo. Ry taranak''Isiraely, ny fitondrako'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. lalana
      marker-yv: yv-n
    - type: text
      text: ' va no tsy marina? Tsy ny fitondranareo'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. lalana
      marker-yv: yv-n
    - type: text
      text: ' va no tsy marina? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rana velona koa Aho, hoy Jehovah Tompo, tsy hisy hanaovanareo izany ohabolana izany ao amin''ny Isiraely intsony. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa samy hotsaraiko araka ny ataonareo avy ianareo, ry taranak''Isiraely, hoy Jehovah Tompo. Mitodiha, ka mibebaha amin''ny fahadisoanareo rehetra, dia tsy ho tonga fahatafintohinana mahameloka anareo intsony izany. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esory ho afaka aminareo ny fahadisoanareo rehetra izay nataonareo, ka manaova fo vaovao sy fanahy vaovao ho anareo; fa nahoana no ho faty ianareo, ry taranak''Isiraely? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy sitrako ny fahafatesan'izay maty, hoy Jehovah Tompo. Koa mibebaha ianareo mba ho velona. Hira fahalahelovana ny amin'ireo lehiben'ny Isiraely.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indro, Ahy ny fanahy rehetra: toy ny fanahin''ny ray, dia toy izany koa ny fanahin''ny zanany; samy Ahy ireny; ny fanahy izay manota no ho faty. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa raha marina ny olona ka manao izay marina sy mahitsy, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'fa tsy mihinana eny an-tendrombohitra, na manandratra ny masony ho amin''ny sampin''ny taranak''Isiraely, na mandoto ny vadin''ny namany, na manakaiky ny vehivavy izay mararin''ny fadim-bolana, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'na mampahory olona, fa mamerina ny natao tsatòka, ary tsy mandroba, fa manome ny haniny ho an''ny noana ary manafy lamba ny matanjaka, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tsy mampanàna vola, na maka tombony akory, fa miaro ny tanany tsy hanao ratsy ary manao fitsarana marina amin''ny miady, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary mandeha araka ny lalàko sy ny mitandrina ny fitsipiko ka manao izay marina, dia marina izy ka ho velona tokoa, hoy i; Jehovah Tompo. '
