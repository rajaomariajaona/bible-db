document_id: 1CO.11
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'ny Fanasan'ny Tompo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Aoka hanahaka ahy ianareo, dia tahaka ny anahafako an'i Kristy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary midera anareo aho, satria mahatsiaro ahy amin''ny zavatra rehetra ianareo sady mitana tsara ny fampianarana natolotra, araka ny nanolorako azy taminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary tiako ho fantatrareo fa Kristy no lohan''ny lehilahy rehetra; ary ny lehilahy kosa no lohan''ny vehivavy; ary Andriamanitra no lohan''i Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ny lehilahy rehetra, raha mivavaka na maminany ka misaron-doha, dia mahafa-boninahitra ny lohany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa ny vehivavy rehetra kosa, raha mivavaka na maminany ka tsy misaron-doha, dia mahafa-boninahitra ny lohany, satria toy ny voaharatra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa raha tsy misaron-doha ny vehivavy, dia aoka hohetezana izy; fa raha mahamenatra ny vehivavy ny hohetezana na ny hoharatana, dia aoka hisaron-doha izy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ny lehilahy dia tokony tsy hisaron-doha, satria endrika sy voninahitr''Andriamanitra izy; fa ny vehivavy kosa no voninahitry ny lehilahy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa tsy ny vehivavy no nihavian''ny lehilahy; fa ny lehilahy no nihavian''ny vehivavy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa tsy ny lehilahy no natao ho an''ny vehivavy, fa ny vehivavy no ho an''ny lehilahy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Izany no mahamety ny vehivavy hisaron-doha
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. hanana fahefana eo amin'ny lohany
    marker-yv: yv-n
  - type: text
    text: ' noho ny amin''ny anjely. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Kanefa ao amin''ny Tompo tsy misy vehivavy raha tsy misy lehilahy, ary tsy misy lehilahy raha tsy misy vehivavy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa toy ny nihavian''ny vehivavy avy tamin''ny lehilahy, dia toy izany koa no nihavian''ny lehilahy avy tamin''ny vehivavy; fa Andriamanitra kosa no ihavian''ny zavatra rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Hevero ao am-ponareo: Mendrika va raha mivavaka amin''Andriamanitra ka tsy misaron-doha ny vehivavy? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tsy mampianatra anareo va izao fomban''ny zavatra rehetra izao fa raha lava volo ny lehilahy, dia mahafa-boninahitra azy izany? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa raha lava volo kosa ny vehivavy, dia voninahitra ho azy izany fa ny volo no nomena azy ho fisaronana. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa raha misy olona toa tia ady, dia tsy manana izany fanao izany isika, na ny fiangonan'Andriamanitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary raha manao izao didy izao aho, dia tsy midera anareo tsy akory, satria tsy miangona hihatsara ianareo, fa hiharatsy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa voalohany indrindra, raha miangona ao am-piangonana ianareo, dia reko fa misy fisarahana eo aminareo; ary mba misy inoako ihany izany. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa tsy maintsy misy fitokoana eo aminareo, mba haseho eo aminareo izay olona ankasitrahana. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Koa raha miangona ianareo, dia tsy misy hihinanana ny Fanasan''ny Tompo akory. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa raha mihinana ianareo, dia samy homana ny sakafony avy aloha ianareo; koa ny anankiray dia noana, fa ny anankiray kosa mamo. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Moa tsy manan-trano hihinanana sy hisotroana va ianareo? Sa manao tsinontsinona ny fiangonan''Andriamanitra ka manome henatra ny tsy manana? Inona no holazaiko aminareo? Hidera anareo va aho? Tsy hidera anareo amin''izany aho. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa izaho efa nandray tamin''ny Tompo izay natolotro anareo kosa, fa Jesosy Tompo tamin''iny alina iny izay namadihana Azy, dia nandray mofo, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ary rehefa nisaotra Izy, dia novakiny, ka hoy Izy: Ity no tenako'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ampio hoe: izay vakina'
    marker-yv: yv-n
  - type: text
    text: ' ho anareo; izao no ataovy ho fahatsiarovana Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dia araka izany koa ny kapoaka, rehefa nihinana, dia hoy Izy: Ity kapoaka ity no ilay fanekena vaovao amin''ny rako; izao no ataovy ho fahatsiarovana Ahy, na oviana na oviana no misotro ianareo. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa na oviana na oviana ianareo no mihinana itony mofo itony sy misotro amin''ny kapoaka, dia manambara ny fahafatesan''ny Tompo ianareo mandra-pihaviny. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Koa na zovy an zovy no mihinana ny mofo sy misotro amin''ny kapoaky ny Tompo amin''ny fanahy tsy mendrika, dia ho meloka ny amin''ny tena sy ny ran''ny Tompo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa aoka ny olona hamantatra ny tenany, dia aoka izy hihinana ny mofo sy hisotro amin''ny kapoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa izay rehetra mihinana sy misotro dia mihinana sy misotro fanamelohana ho an''ny tenany, raha tsy mamantatra ny tena izy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Noho izany dia betsaka no marary sy marofy eo aminareo, ary maro ihany no efa nodi-mandry. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Fa raha mba mamantatra ny tenantsika isika, dia tsy mba hotsaraina. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa raha tsaraina isika, dia faizan''ny Tompo mba tsy hohelohina miaraka amin''izao tontolo izao. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Koa raha miangona hihinana ianareo, ry rahalahy, dia mifampiandrasa
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mifampizarà'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Ary raha misy olona noana, aoka izy hihinana no an-tranony, mba tsy hiangonanareo ho fahamelohana. Ary ny zavatra sisa dia halahatro, rehefa tonga aho.
