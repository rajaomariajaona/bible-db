document_id: REV.16,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary nahare feo mahery avy tao amin''ny tempoly aho nanao tamin''ny anjely fito hoe: Mandehana, aidino amin''ny tany ny ao amin''ny lovia fito feno ny fahatezeran''Andriamanitra.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary ny fahadimy nampidina ny tao an-doviany tamin''ny seza fiandrianan''ilay bibi-dia; dia tonga maizina ny fanjakany, ary ny olona nitsakotsako ny lelany noho ny fanaintainana, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: dia niteny ratsy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. nanao blasfemia; izahao Mat. IX. 3
      marker-yv: yv-n
    - type: text
      text: ' an''Andriamanitry ny lanitra izy noho ny fanaintainany sy ny vainy sady tsy nibebaka tamin''ny asany.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary ny fahenina nampidina ny tao an-doviany tamin''i Eofrata, ony lehibe; dia ritra ny ranony hanamboarana ny lalan''ireny mpanjaka avy any amin''ny fiposahan''ny masoandro. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ary nahita aho fa indreo fanahy maloto telo tahaka ny sahona avy tamin''ny vavan''ilay dragona sy tamin''ny vavan''ilay bibi-dia ary tamin''ny vavan''ilay mpaminany sandoka. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa fanahin''ny demonia ireo ka manao famantarana sady mankany amin''ny mpanjaka amin''izao tontolo izao, mba hanangona ary ho amin''ny adin''ilay andro lehiben''Andriamanitra Tsitoha. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: (Indro, avy toy ny mpangalatra Aho. Sambatra izay miambina
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. miari-tory
      marker-yv: yv-n
    - type: text
      text: ' ka miaro ny fitafiany, fandrao mandeha mitanjaka izy, ka hita ny fahamenarany.) '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary nangoniny ho any amin''ny tany atao amin''ny teny Hebreo hoe Hara-magedona ireny. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary ny fahafito dia nampidina ny tao an-doviany tamin''ny rivotra; dia nisy feo mahery nivoaka avy tao amin''ny tempoly, teo amin''ny seza fiandrianana, nanao hoe: Vita. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia nisy helatra sy feo sy kotrokorana, ary nisy horohorontany mafy, izay tsy mbola nisy toy izany hatrizay nisian''olona tetỳ ambonin''ny tany, eny, tsy mbola nisy horohorontany mafy sy lehibe toy izany. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary ny tanàna lehibe dia vaky ho telo toko, ary rava ny tanànan''ny firenena maro; ary Babylona lehibe dia notsarovana teo anatrehan''Andriamanitra, mba homena azy ny kapoaky ny divain''ny firehetan''ny fahatezerany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ary ny voalohany nandeha, dia nampidina ny tao an-doviany tamin'ny tany; dia nisy vay ratsy sady mampahory tamin'ny olona izay nanana ny mariky ny bibi-dia sy niankohoka teo anatrehan'ny sariny.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary ny nosy rehetra nandositra, ary ny tendrombohitra tsy hita intsony. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ary nisy havandra vaventy nilatsaka avy tany an-danitra ho amin'ny olona, tokony ho lanjan-talenta iray avy; ary niteny ratsy an'Andriamanitra ny olona noho ny loza avy tamin'ny havandra; fa lehibe loatra izany loza izany.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary ny faharoa nampidina ny tao an-doviany tamin''ny ranomasina; dia nody rà tahaka ny ran''ny olona maty ny ranomasina: ary maty ny zava-manan''aina rehetra tao aminy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary ny fahatelo nampidina ny tao an-doviany tamin''ny ony sy ny loharano; dia nody rà ireny. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary nahare ny anjelin''ny rano aho nanao hoe: Marina Hianao, ilay ankehitriny sy taloha, dia ny Iray Masina, satria efa nitsara toy izany Hianao; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'fa ny ran''ny olona masina sy ny mpaminany no nalatsany, ka dia rà kosa no nomenao hosotromy; ary tandrifiny ho azy irany. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary reko ny alitara nanao hoe: Eny, Tompo ô, Andriamanitra Tsitoha, marina sy mahitsy ny fitsaranao.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary ny fahelatra nampidina ny tao an-doviany tamin''ny masoandro; dia nasaina nandoro ny olona tamin''ny afo izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ary main'ny hafanana be ny olona, dia niteny ratsy
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. nanao blasfemia; izahao Mat. IX. 3
      marker-yv: yv-n
    - type: text
      text: ' ny anaran''Andriamanitra, Izay manam-pahelana amin''ireny loza ireny, izy sady tsy nibebaka mba hanome voninahitra Azy.'
