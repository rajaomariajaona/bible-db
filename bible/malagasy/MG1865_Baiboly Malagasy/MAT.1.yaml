document_id: MAT.1,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny filazana ny razan'i Jesosy Kristy
  - type: text
    content: Ny filazana ny razan'i Jesosy Kristy, zanak'i Davida zanak'i Abrahama.
  '10':
  - type: text
    content: ary Hezekia niteraka an'i Manase; ary Manase niteraka an'i Amona
  - type: note
    content: Gr. Amosa
  - type: text
    content: ; ary Amona
  - type: note
    content: Gr. Amosa
  - type: text
    content: ' niteraka an''i Josia; '
  '11':
  - type: text
    content: 'ary Josia niteraka an''i Jekonia mirahalahy avy, tamin''ny nifindrana tany Babylona. '
  '12':
  - type: text
    content: Ary taorian'ny nifindrana tany Babylona Jekonia dia niteraka an'i Sealtiela
  - type: note
    content: Gr. Salatiela
  - type: text
    content: ; ary Sealtiela
  - type: note
    content: Gr. Salatiela
  - type: text
    content: ' niteraka an''i Zerobabela; '
  '13':
  - type: text
    content: 'ary Zerobabela niteraka an''i Abihoda; ary Abihoda niteraka an''i Eliakima; ary Eliakima niteraka an''i Azora; '
  '14':
  - type: text
    content: 'ary Azora niteraka an''i Zadoka; ary Zadoka niteraka an''i Akima; ary Akima niteraka an''i Elihoda; '
  '15':
  - type: text
    content: 'ary Elihoda niteraka an''i Eleazara; ary Eleazara niteraka an''i Matana; ary Matana niteraka an i Jakoba; '
  '16':
  - type: text
    content: ary Jakoba niteraka an'i Josefa, vadin'i Maria; ary Maria niteraka an'i Jesosy, Izay atao hoe Kristy.
  '17':
  - type: text
    content: Ary ny taranaka rehetra hatramin'i Abrahama ka hatramin'i Davida dia taranaka efatra ambin'ny folo; ary hatramin'i Davida ka hatramin'ny nifindrana tany Babylona dia taranaka efatra ambin'ny folo; ary hatramin'ny nifindrana tany Babylona ka hatramin'i Kristy dia taranaka efatra ambin'ny folo.
  '18':
  - type: text
    content: 'Ary ny nahaterahan''i Jesosy Kristy dia toy izao: Rehefa nanaiky Maria, renin''i Jesosy, ho fofombadin''i Josefa, raha tsy mbola nivady izy, dia hita fa nitoe-jaza avy tamin''ny Fanahy Masina izy. '
  '19':
  - type: text
    content: 'Ary Josefa vadiny, izay lehilahy marina sady tsy ta-hanala baraka azy, dia nikasa hametraka azy mangingina. '
  '2':
  - type: text
    content: 'Abrahama niteraka an''i Isaka; ary Isaka niteraka an''i Jakoba; ary Jakoba niteraka an''i Joda mirahalahy avy; '
  '20':
  - type: text
    content: 'Fa raha mbola nisaina izany izy, indro, nisy anjelin''ny Tompo niseho taminy tamin''ny nofy ka nanao hoe: Ry Josefa, zanak''i Davida, aza matahotra hampakatra an''i Maria vadinao; fa ny Zaza ao an-kibony dia avy amin''ny Fanahy Masina, '
  '21':
  - type: text
    content: ka hiteraka Zazalahy izy, ary ny anarany hataonao hoe Jesosy
  - type: note
    content: Jesosy = Jehovah no Mpamonjy
  - type: text
    content: '; fa Izy no hamonjy ny olony ho afaka amin''ny fahotany. '
  '22':
  - type: text
    content: Ary izany rehetra izany dia tonga mba hahatanteraka izay nampilazain'ny Tompo ny mpaminany
  - type: note
    content: Gr. profeta dia olona voafidin'Andriamanitra ho mpilaza ny teniny
  - type: text
    content: ' hoe: '
  '23':
  - type: text
    content: 'Indro, ny virijina hitoe-jaza ka hiteraka zazalahy; Ary ny anarany hataon''ny olona hoe Imanoela (Isa. 7. 14), izany hoe, raha adika: Amintsika Andriamanitra. '
  '24':
  - type: text
    content: 'Ary Josefa, rehefa nahatsiaro tamin''ny torimasony, dia nanao araka izay nandidian''ny anjelin''ny Tompo ary ka nampakatra ny vadiny. '
  '25':
  - type: text
    content: Ary tsy nahalala azy izy mandra-piterany Zazalahy; ary ny anarany nataony hoe Jesosy.
  '3':
  - type: text
    content: ary Joda niteraka an'i Fareza sy Zara tamin'i Tamara; ary Fareza niteraka an'i Hezrona; ary Hezrona niteraka an-dRama
  - type: note
    content: Gr. Arama
  - type: text
    content: '; '
  '4':
  - type: text
    content: ary Rama
  - type: note
    content: Gr. Arama
  - type: text
    content: ' niteraka an''i Aminadaba; ary Aminadaba niteraka an''i Nasona; ary Nasona niteraka an''i Salmona; '
  '5':
  - type: text
    content: 'ary Salmona niteraka an''i Boaza tamin-dRahaba; ary Boaza niteraka an''i Obeda tamin-dRota; ary Obeda niteraka an''i Jese; '
  '6':
  - type: text
    content: 'ary Jese niteraka an''i Davida mpanjaka. Ary Davida niteraka an''i Solomona tamin''ny vadin''i Oria; '
  '7':
  - type: text
    content: ary Solomona niteraka an-dRehoboama; ary Rehoboama niteraka an'i Abia; ary Abia niteraka an'i Asa
  - type: note
    content: Gr. Asafa
  - type: text
    content: '; '
  '8':
  - type: text
    content: ary Asa
  - type: note
    content: Gr. Asafa
  - type: text
    content: ' niteraka an''i Josafata; ary Josafata niteraka an''i Jorama; ary Jorama niteraka an''i Ozia; '
  '9':
  - type: text
    content: 'ary Ozia niteraka an''i Jotama; ary Jotama niteraka an''i Ahaza; ary Ahaza niteraka an''i Hezekia; '
