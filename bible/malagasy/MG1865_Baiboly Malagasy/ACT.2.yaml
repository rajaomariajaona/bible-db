document_id: ACT.2,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nilatsahan'ny Fanahy Masina tamin'ny Andro Pentekosta, sy ny tori-teny nataon'i Petera tamin'izany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary nony tonga ny Andro Pentekosta, dia teo amin''ny fitoerana iray izy rehetra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'sy Frygia sy Pamfylia, sy Egypta sy ny tany Libya izay manodidina an''i Kyrena, ary vahiny avy any Roma, na Jiosy na proselyta, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Kretana sy Arabo - koa ahoana no andrenesantsika ireo miteny amin''ny fitenintsika avy ny asa lehibe ataon''Andriamanitra? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dia talanjona izy rehetra ka niahanahana sady niresaka hoe: Ahoana no tokony ho hevitr''izany? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa ny sasany nihomehy ka nanao hoe: Leon-divay mamy ireo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa nitsangana Petera sy ny iraika ambin''ny folo lahy, dia nanandra-peo izy ka nanao taminy hoe: Ry lehilahy Jiosy sy izay rehetra monina eto Jerosalema, aoka ho fantatrareo izao, ka henoy ny teniko: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Tsy mamo araka ny hevitrareo tsy akory ireo, fa vao ora fahatelo ihany izao ny andro. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa izao ilay nampilazaina an''i Joela mpaminany hoe: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary amin''ny andro farany, hoy Andriamanitra, No handatsahako ny Fanahiko amin''ny nofo rehetra; Ary ny zanakalahinareo sy ny zanakavavinareo haminany, Ary ny zatovonareo hahita fahitana, Ary ny lahiantitrareo hanonofy; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ary ny mpanompoko, na lahy na vavy, Dia handatsahako ny Fanahiko amin''izany andro izany, Ka dia haminany izy; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary hanisy fahagagana eny amin''ny lanitra ambony Aho sy famantarana amin''ny tany ambany, Dia rà sy afo ary zavon''ny setroka; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary nisy feo tonga tampoka avy tany an-danitra, toy ny rivotra mahery mifofofofo, ka nanenika ilay trano niangonany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ny masoandro hampodina ho aizina, Ary ny volana ho rà, Alohan''ny hahatongavan''ny andron''i Jehovah, Dia ilay sady lehibe no malaza; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary na zovy na zovy no hiantso ny anaran''i Jehovah dia hovonjena (Joela 3. 1-5). '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ry lehilahy Isiraely, mihainoa izao teny izao: Jesosy avy any Nazareta, lehilahy nasehon''Andriamanitra teo aminareo tamin''ny asa lehibe sy ny fahagagana ary ny famantarana izay nampanaovin''Andriamanitra Azy teo aminareo, tahaka ny fantatrareo ihany, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Izy efa natolotra araka ny saina niniana sy ny fahalalan''Andriamanitra rahateo, dia nohomboanareo sy novonoinareo tamin''ny tanan''ny olona tsy tan-dalàna; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'fa Andriamanitra nanangana Azy, rehefa nahafaka ny fanaintainan''ny fahafatesana, satria tsy laitr''izany hohazonina Izy. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fa Davida milaza Azy hoe: Nijery an''i Jehovah teo anatrehako mandrakariva aho; Satria eo ankavanako Izy, mba tsy hangozohozo aho, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia izany no nifalian''ny foko sy niravoravoan''ny lelako; Ny nofoko koa hitoetra amin''ny fanantenana; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Fa tsy ho foinao ho any amin'ny fiainan-tsi-hita
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. Hadesy
      marker-yv: yv-n
    - type: text
      text: ' ny aiko; Ary tsy hamela ny Iray Masinao ho tratry ny lò Hianao; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Nampahafantatra ahy ny lalan''aina Hianao; Hampifaly ahy indrindra amin''ny tavanao (Sal. 16. 8-11). '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ry rahalahy, aoka aho mba hilaza aminareo marimarina ny amin''i Davida patriarka, fa efa maty izy ka nalevina koa, ary ny fasany eto amintsika mandraka androany. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ary nisy lela maro mitarehin''afo niseho taminy, izay nizarazara; ary nipetraka tamin''izy rehetra isan-olona izany. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ary satria mpaminany izy ka nahalala fa Andriamanitra efa nanao fianianana taminy fa izay hateraky ny kibony no hipetraka
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: hapetrany'
      marker-yv: yv-n
    - type: text
      text: ' eo ambonin''ny seza fiandrianany, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: koa raha nahita rahateo izy, dia nilaza ny fitsanganan'i Kristy, fa tsy nafoy ho any amin'ny fiainan-tsi-hita
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. Hadesy
      marker-yv: yv-n
    - type: text
      text: ' Izy, ary ny nofony tsy tratry ny lò. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Izany Jesosy izany dia efa natsangan''Andriamanitra, ary vavolombelon''izany izahay rehetra. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ary rehefa nasandratry ny tanana ankavanan'Andriamanitra
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ho eo an-tanana ankavanan''Andriamanitra'
      marker-yv: yv-n
    - type: text
      text: ' Izy, ary nandray tamin''ny Ray ny Fanahy Masina Izay nokasainy, dia efa nampilatsaka izao hitanareo sy renareo izao Izy. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Fa tsy Davida no niakatra tany an-danitra; fa hoy izy: Jehovah nilaza tamin''ny Tompoko hoe: Mipetraha eo an-tanako ankavanana '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ambara-panaoko ny fahavalonao ho fitoeran-tongotrao (Sal. 110. 1). '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Koa aoka ho fantatry ny taranak''isiraely rehetra marimarina fa iny Jesosy nohomboanareo tamin''ny hazo fijaliana iny dia efa nataon''Andriamanitra ho Tompo sy Kristy. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ary raha nandre izany ny olona, dia voatsindrona tam-pony ka nanao tamin''i Petera sy ny Apostoly namany hoe: Ry rahalahy, inona no hataonay? '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Ary hoy Petera taminy: Mibebaha, ary aoka samy hatao batisa amin''ny anaran''i Jesosy Kristy ianareo rehetra mba hahazo famelana ny helokareo; ary ianareo handray ny fanomezana, dia ny Fanahy Masina; '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'fa ny teny fikasana dia ho anareo sy ny zanakareo ary ho an''izay rehetra lavitra, na iza na iza hantsoin''i Jehovah Andriamanitsika hanatona Azy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary samy feno ny Fanahy Masina izy rehetra, ka dia niteny tamin''ny fiteny maro samy hafa, araka ny nampitenenan''ny Fanahy Masina azy. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Ary nanambara sy nananatra azy tamin''ny teny maro hafa koa izy ka nanao hoe: Aoka hovonjena ho afaka amin''ity taranaka maditra ity ianareo. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Ary izay nandray tsara ny teniny dia natao batisa; ary tokony ho telo arivo no olona nanampy ho isany tamin''izany andro izany. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Ary izy ireo naharitra tamin''ny fampianaran''ny Apostoly sy ny fiombonana sy ny famakiana ny mofo ary ny fivavahana. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Dia raiki-tahotra ny olona rehetra teo, ary fahagagana sy famantarana maro no nataon''ny Apostoly. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Ary izay rehetra nino dia niray toerana, sady niombonany avokoa ny fananany rehetra, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'ary namidiny ny taniny sy ny fananany ka nozarainy tamin''izy rehetra araka izay nilainy avy. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Ary dia niray saina isan''andro izy ka nazoto nankeo an-kianjan''ny tempoly ary namaky mofo tao an-trano ka nihinan-kanina tamin''ny fifaliana sy ny fahatsaram-po, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: nidera an'Andriamanitra sady nahita fitia tamin'ny vahoaka rehetra. Ary ny olom-bonjena dia nanampin'ny Tompo isan'andro ho isan'ireo.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary nisy Jiosy, mpivavaka tsara, nitoetra tany Jerosalema, avy tany amin''ny firenena samy hafa rehetra ambanin''ny lanitra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary nony re izany feo izany, dia niangona ny olona maro ka very hevitra, fa samy nahare azy ireo niteny tamin''ny fiteniny avy izy rehetra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia talanjona sady gaga izy rehetra ka nanao hoe: Indreo, tsy Galiliana va ireo rehetra miteny ireo? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Koa ahoana no andrenesantsika amin''ny fitenintsika avy izay nahabe antsika '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '- dia Partiana sy Mediana sy Elamita, ary mponina any Mesopotamia, sy Jodia sy Kapadokia sy Ponto sy Asia '
