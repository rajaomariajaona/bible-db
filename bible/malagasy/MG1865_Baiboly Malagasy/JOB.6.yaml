document_id: JOB.6,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny teny navalin'i Joba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia namaly Joba ka nanao hoe:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia hahita fiononana amin'izany aho ka hiravoravo na dia amin'ny fangirifiriana tsy mifaditrovana aza, satria tsy nandà ny tenin'ny Iray Masina aho.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Inona moa ny heriko, no hanantena aho? Ary hanao ahoana moa ny farako, no hanindry fo
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: hanalava ny androko'
      marker-yv: yv-n
    - type: text
      text: ' aho?'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Herim-bato va ny heriko? Na varahina va ny nofoko?
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsy efa foana va ny hery ho entiko mamonjy tena, ary tsy efa nakifika hiala amiko va ny faharetana?
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay efa mivarahontsana dia tokony hiantran'ny sakaizany. Fandrao mahafoy ny fahatahorana ny Tsitoha izy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny rahalahiko mampihambo manana ahy tahaka ny ranotrambo, dia tahaka ny mason-drano any an-dohasahan-driaka, izay malaky ritra,
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Izay mainty azon'ny ranomandry Sady iafenan'ny oram-panala;
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa raha taninin'ny hainandro izy, dia levona; raha maina ny andro, dia ritra eo amin'ny fitoerany izy;
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mivilivily no fandehany tankina izy ka levona.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny antokon'i Tema mitazana, ny andian'i Sheba manantena azy;
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Enga anie ka holanjaina tokoa ny fahasosorako, ka hampifandaniaina amin'ny mizana izy sy ny fahoriako!
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Very hevitra ireo, satria samy nanampo; tonga teo izy, kanjo nangaihay.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ankehitriny efa tsinontsinona ianareo; Nahita ny fahoriana ianareo ka raiki-tahotra.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moa aho va efa nanao hoe: Omeo aho, ka mahafoiza zavatra ho ahy amin''ny fanananareo,'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary vonjeo amin'ny tanan'ny fahavalo aho, ka afaho amin'ny tanan'ny mpitohatoha?
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mampianara ahy, dia hangina aho; Ary ampahafantaro izay nahadisoako aho.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Endrey ny herin'ny teny marina! Fa mba mahavoa inona kosa moa ny anatra ataonareo?
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny amin'ny teniko ihany va no ananaranareo ahy? Fa ho amin'ny rivotra ny tenin'ny olona mamoy fo.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eny, fa na dia ny kamboty aza dia ataonareo loka, ary ny sakaizanareo dia ataonareo varotra.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ankehitriny, masìna ianareo, mba atreho kely aho, dia ho hitanareo fa tsy handainga tsy akory aho.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Masìna ianareo, diniho indray aho, ary aoka tsy hisy fitsarana tsy marina; eny, diniho indray aho, fa mbola ao ihany ny fahamarinako.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ankehitriny mavesatra noho ny fasika any an-dranomasina ny fahoriako, koa dia nirediredy aho.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moa misy heloka va eo amin'ny lelako?
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa ny zana-tsipiky ny Tsitoha mitsatoka amiko, ka mifoka ny poizina avy aminy ny fanahiko; Ary ny fampitahorana Andriamanitra milahatra hamely ahy.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Maneno va ny boriki-dia, raha eo amin'ny vilona? Na mimàmà va ny omby, raha eo amin'ny fihinany?
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Azo hanina va ny matsatso, raha tsy asian-tsira? Na mba misy tsirony va ny tafotsin'atody
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ranon-tsikobonkobon-danitra'
      marker-yv: yv-n
    - type: text
      text: '?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny zavatra izay nolaviko tsy hotendrena, dia ireny no tsy maintsy haniko, na dia maharikoriko ahy aza.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Enga anie ka ho azoko izay angatahiko, ary homen'Andriamanitra ahy anie izay iriko!
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ka ho sitrak'Andriamanitra anie ny hanorotoro ahy! Eny, halefany anie ny tànany ka hahamaito ny aiko,
