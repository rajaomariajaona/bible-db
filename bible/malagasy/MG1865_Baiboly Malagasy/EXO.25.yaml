document_id: EXO.25
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandidian'Andriamanitra an'i Mosesy ny amin'ny hanaovana ny Tabernakely sy ny fanaka momba azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Jehovah niteny tamin''i Mosesy ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mitenena amin''ny Zanak''Isiraely mba hitondra fanatitra ho Ahy izy; dia avy amin''ny olona rehetra izay amporisihin''ny fony no handraisanareo ny fanatitra ho Ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary izao no fanatitra izay horaisinareo aminy: volamena sy volafotsy sy vara­hina, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'sy manga sy volomparasy sy mena sy rongony fotsy madinika sy volon''osy,'' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'sy hoditr''ondrilahy efa nomen''aina sy hodi-takasy sy hazo akasia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'sy diloilo hatao fanazavana sy zava-manitra ho amin''ny diloilo fanosorana sy ho ditin-kazo mani-pofona, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'sy vato beryla sy vato halatsaka an-tranontranony amin''ny efoda sy amin''ny saron-tratra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary asaovy manao fitoerana masina ho Ahy izy, dia honina eo aminy Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Araka izay rehetra asehoko aminao, dia ny endriky ny tabernakely sy ny endriky ny fanaka rehetra momba azy, dia araka izany no hanaovanao azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary asaovy manao fiara hazo akasia izy: roa hakiho sy sasany ny lavany; ary iray hakiho sy sasany ny sakany, ary iray hakiho sy sasany ny hahavony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary petaho takela-bolamena tsara izy: ny atiny sy ny ivelany dia samy hopetahanao takela-bolamena avokoa; ary asio koronosy volamena manodidina eo amboniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary mandrendreha vava volamena efatra hatao aminy, ka ataovy eo amin''ny tongony efatra; dia vava volamena roa eo amin''ny lafiny iray, ary vava volamena roa eo amin''ny lafiny iray koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary manaova bao hazo akasia, ka petaho takela-bolamena. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary ampidiro ny bao ho eo amin''ny vava volamena, izay eo amin''ny lafin''ny fiara, hilanjana azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Eo amin''ny vava volan''ny fiara no hitoeran''ny bao, ka tsy hesorina eo izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ataovy ao anatin''ny fiara ny Vavolombelona izay homeko anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary manaova rakotra fanaovam-panavotana amin''ny volamena tsara: roa hakiho sy sasany ny lavany, ary iray hakiho sy sasany ny sakany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary manaova kerobima volamena roa; voasana no hanaovanao azy roa ho eo amin''ny sakany roa amin''ny rakotra fanaovam-panavotana '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ny kerobima iray ataovy indray mivofy amin''ny sakany anankiray, ary ny kerobima iray kosa amin''ny sakany anankiray: indray mivofy amin''ny rakotra fanaovam-panavotana no hanaovanareo ny kerobima roa, dia amin''ny sakany roa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary aoka hivelatra eo ambony ny elatry ny kerobima, mba hanalofan''ny elany ny rakotra fanaovam-panavotana; ary ny tavany hifanatrika, sady hanatrika ny rakotra fanaovam-panavotana koa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary apetraho eo ambonin''ny fiara ny rakotra fanaovam-panavotana; ary ao anatin''ny fiara no asio ny Vavolombelona izay homeko anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ao no hihaona aminao Aho, ka ao ambonin''ny rakotra fanaovam-panavotana no hitenenako aminao, dia ao anelanelan''ny kerobima roa, izay eo ambonin''ny fiaran''ny Vavolombelona, ka holazaiko izay rehetra handidiako anao holazainao amin''ny Zanak''Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary manaova latabatra hazo akasia: roa hakiho ny lavany, ary iray hakiho ny sakany, ary iray hakiho sy sasany ny hahavony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary petaho takela-bolamena tsara izy, sady asio koronosy volamena manodidina azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary asio sisiny vodivoam-pelatanana manodidina azy, ary asio koronosy volamena ny sisiny manodidina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary manaova vava volamena efatra hatao aminy, ka ataovy eo amin''ny zorony efatra izay eo amin''ny tongony efatra ireo: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'eo akaikin''ny sisiny no hasiana ny vava volamena ho fitoeran''ny bao hilanjana ny latabatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary hazo akasia no anaovy ny bao, ka petaho takela-bolamena; ary amin''ireo no hilanjana ny latabatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary manaova ny loviany sy ny lovia keliny ary ny fitoeran-divainy sy ny kapoakany ho fanidinam-panatitra; volamena tsara no hanaovanao ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary asio mofo aseho eo ambonin''ny latabatra ho eo anatrehako mandrakariva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary manaova ny fanaovan-jiro volamena tsara; voasana no hanaovanao ny fanaovan-jiro, hatao indray mivofy ihany ny faladiany sy ny tahony sy ny vodi-voniny sy ny kiboriny ary ny voniny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ary hisy sampany enina amin''ny ankilany roa: dia sampany telo amin''ny fanaovan-jiro eo amin''ny ankilany iray, ary sampany telo amin''ny fanaovan-jiro eo amin''ny ankilany iray koa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'dia vodi-voniny telo atao tahaka ny vonin''ny amygdala, mbamin''ny kiboriny sy ny voniny, eo amin''ny sampany anankiray; ary vodi-voniny telo koa atao tahaka ny vonin''ny amygdala, mbamin''ny kiboriny sy ny voniny, eo amin''ny sampany anankiray koa; dia toy izany avokoa amin''ny sampany enina izay amin''ny fanaovan-jiro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary eo amin''ny fanaovan-jiro dia hisy vodi-voniny efatra atao tahaka ny vonin''ny amygdala, mbamin''ny kiboriny sy ny voniny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'dia kiboriny iray eo ambanin''ny sampany roa sady miray aminy, ary kiboriny iray koa eo ambanin''ny sampany roa sady miray aminy, ary kiboriny iray koa eo ambanin''ny sampany roa sady miray aminy; dia amin''ny sampany enina izay miray amin''ny fanaovan-jiro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ny kiboriny sy ny sampany dia hiray avokoa; hatao indray mivofy aminy amin''ny volamena tsara izy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary manaova lela fanaovan-jirony fito, ka ampireheto eo aminy ireo mba hanazava ny anoloany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary ny hetin-jirony Sy ny fitoeran-davenon-jirony dia ataovy volamena tsara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Volame­na tsara talenta iray no hanaovana azy mbamin''ireny fanaka rehetra ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Ary tandremo mba hataonao araka ny endriny izay naseho taminao tao an-tendrombohitra izy.
