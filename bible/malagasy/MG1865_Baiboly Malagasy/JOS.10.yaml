document_id: JOS.10
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nandresen'ny Isiraely ny mpanjaka dimy lahy, sy ny nahazoany an'i Kanana Atsimo rehetra.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary rehefa ren'i Adoni-zedeka, mpanjakan'i Jerosalema, fa afak'i Josoa Ay ka noravany
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. nataony herema
    marker-yv: yv-n
  - type: text
    text: ' (fa araka izay nataony tamin''i Jeriko sy ny mpanjakany no nataony tamin''Ay sy ny mpanjakany), sady nanao fihavanana tamin''ny Isiraely ny mponina tany Gibeona ka tomoetra eo aminy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia raiki-tahotra indrindra izy, satria tanàna lehibe Gibeona tahaka ny anankiray amin''ny tanàna misy andriana, sady lehibe noho Ay, ary nahery ny lehilahy rehetra teo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia naniraka olona Adoni-zedeka, mpanjakan''i Jerosalema, ho any amin''i Hohama mpanjakan''i Hebrona, sy Pirama, mpanjakan''i Jarmota, sy Jafia, mpanjakan''i Lakisy, ary Debira, mpanjakan''i Eglona, ka nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Miakara atỳ amiko, ka manampia ahy, hamelezantsika an''i Gibeona; fa efa nanao fihavanana tamin''i Josoa sy ny Zanak''Isiraely izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia niangona ireo mpanjaka dimy tamin''ny Amorita ireo, dia ny mpanjakan''i Jerosalema, ny mpanjakan''i Hebrona, ny mpanjakan''i Jarmota, ny mpanjakan''i Lakisy, ary ny mpanjakan''i Eglona, ka niakatra izy sy ny miaramilany rehetra, ary nitoby tandrifin''i Gibeona ka namely azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny mponina tao Gibeona dia naniraka olona ho any amin''i Josoa teo an-toby tany Gilgala hanao hoe: Aza mampiketraka ny tananao tsy hamonjy ny mpanomponao; miakara faingana ho atỳ aminay, ary vonjeo sy ampio izahay; fa miangona hamely anay ny mpanjaka rehetra amin''ny Amorita izay monina any amin''ny tany havoana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia niakatra niala tany Gilgala Josoa sy ny mpanafika rehetra teo aminy, dia ny lehilahy mahery rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy Jehovah tamin''i Josoa: Aza matahotra azy, fa efa natolotra eo an-tananao izy, ka tsy hisy hahajanona eo anoloanao izy na dia iray akory aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary tonga tampoka tamin''ireo Josoa; fa nanao lava alina-avy tany Gilgala izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Jehovah nampifanaritaka ireo teo anoloan''ny Isiraely; ary namely ireo tany Gibeona izy ka nahafaty maro be, sady nanenjika azy tamin''ny fiakarana mankany Beti-horona izy ka namely azy hatrany Azeka ka hatrany Makeda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary nony nandositra teo anoloan'ny Isiraely teo am-pidinan'i Beti-horona izy, Jehovah dia nandatsaka havandra vaventy taminy avy tany an-danitra hatrany Azeka ka nahafaty azy; ary be lavitra ny matin'ny havandra noho izay novonoin'ny Zanak'Isiraely tamin'ny sabatra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary tamin''izany Josoa dia niteny tamin''i Jehovah tamin''ny andro nanoloran''i Jehovah ny Amorita teo anoloan''ny Zanak''Isiraely ka nanao teo imason''ny Zanak''Isiraely hoe: Ry masoandro, mijanòna'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mangina
    marker-yv: yv-n
  - type: text
    text: ' eo ambonin''i Gibeona; Ary, ianao kosa, ry volana, any an-dohasahan''i Aialona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dia nijanona ny masoandro, ary nijanona
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mangina
    marker-yv: yv-n
  - type: text
    text: ' koa ny volana, Mandra-pamalin''ny olona ny fahavalony. Tsy efa voasoratra eo amin''ny Bokin''i Jasara'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jasara = Ilay mahitsy
    marker-yv: yv-n
  - type: text
    text: ' va izany? Dia nijanona teo afovoan''ny lanitra ny masoandro ka tsy nandroso hilentika tokony ho indray andro maninjitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary tsy nisy andro tahaka izany, na tany alohany, na tato aoriany, izay nihainoan''i Jehovah ny feon''olona; fa Jehovah niady ho an''ny Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary Josoa sy ny Isiraely rehetra dia niverina nankany an-toby tany Gilgala.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nandositra ny mpanjaka dimy ka niery tao anatin''ilay zohy any Makeda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nolazaina tamin''i Josoa hoe: Indreo, miery ao anatin''ilay zohy any Makeda ny mpanjaka dimy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy Josoa: Manakodiava vato lehibe hatampina ny vavan''ny zohy, ary asio olona eo anoloany hiambina azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'fa ianareo aza mijanona, fa manenjeha ny fahavalonareo, ka mameleza ny vodi-lalana; aza avela ho tafiditra any an-tanànany ireny, fa efa natolotr''i Jehovah Andriamanitrareo eo an-tananareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary rehefa voaringan''i Josoa sy ny Zanak''Isiraely mihitsy ireny mandra-pahalany ritrany, ka izay afa-nandositra no lasa niditra tany amin''ny tanàna mimanda, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: dia niverina soa aman-tsara ho any amin'i Josoa teo an-toby tany Makeda ny vahoaka rehetra; ary tsy nisy sahy nanao vava ratsy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. nandranitra ny lelany
    marker-yv: yv-n
  - type: text
    text: ' tamin''ny Zanak''Isiraely intsony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Dia hoy Josoa: Sokafy ny vavan''ny zohy, ka avoahy ao an-johy ireo mpanjaka dimy ireo hankatỳ amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia nataon''ny olona izany, ka namoaka ireo mpanjaka dimy ireo avy tao an-johy izy ho eo aminy, dia ny mpanjakan''i Jerosalema, ny mpanjakan''i Hebrona, ny mpanjakan''i Jarmota, ny mpanjakan''i Lakisy, ary ny mpanjakan''i Eglona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary rehefa navoaka ireo mpanjaka ireo ka nentina ho eo amin''i Josoa, dia niantso ny lehilahy rehetra amin''ny Isiraely Josoa ka nanao tamin''ny mpitarika ny mpiady izay teo aminy hoe: Manatona, ka ataovy eo amin''ny vozon''ireto mpanjaka ireto ny tongotrareo. Dia nanatona izy ka nanao ny tongony teo amin''ny vozon''ireo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy Josoa taminy: Aza matahotra na mivadi-po ; mahereza sy matanjaha; fa toy izao no hataon''i Jehovah amin''ny fahavalonareo rehetra izay iadianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary rehefa afaka izany, dia namely ireo Josoa ka nahafaty azy, ary nahantony tamin''ny hazo dimy ny fatiny; ka dia nihantona tamin''ny hazo izy mandra-paharivan''ny andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary tamin'ny nilentehan'ny masoandro dia nasain'i Josoa nesorina tamin'ny hazo izy ireo ka nariana tao anatin'ilay zohy niereny, ary nasiana vato lehibe teo amin'ny vavan'ny zohy, ka mbola ao izany mandraka androany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ary Makeda dia afak'i Josoa tamin'izany andro izany, ka nasiany tamin'ny lelan-tsabatra izy sy ny mpanjakany; ary ny olona rehetra tao dia naringany
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. nataony herema; izahao Lev. XXII. 28
    marker-yv: yv-n
  - type: text
    text: ' avokoa ka tsy nasiany niangana na dia iray akory aza; ary tahaka izay efa nataony tamin''ny mpanjakan''i Jeriko, no nataony tamin''ny mpanjakan''i Makeda koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary Josoa sy ny Isiraely rehetra teo aminy dia niala tany Makeda ka nankany Libna ary namely azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'dia natolotr''i Jehovah teo an-tànan''ny Isiraely koa izy sy ny mpanjakany, ka nasiany tamin''ny lelan-tsabatra izy mbamin''ny olona rehetra tao; tsy nasiany niangana na dia iray akory aza; ary tahaka izay efa nataony tamin''ny mpanjakan''i Jeriko no nataony tamin''ny mpanjakany koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Dia niala tany Libna Josoa sy ny Isiraely rehetra teo aminy ka nankany Lakisy, dia nitoby tandrifiny ka namely azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia natolotr''i Jehovah teo an-tànan''ny Isiraely koa Lakisy, ka afany tamin''ny andro faharoa izy; dia nasiany tamin''ny lelan-tsabatra izy sy ny olona rehetra tao, tahaka izay rehetra efa nataony tamin''i Libna koa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia niakatra Horama, mpanjakan''i Gazera, hamonjy an''i Lakisy; dia nasian''i Josoa izy sy ny vahoakany mandra-paha-tsy nisy niangana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia niala tany Lakisy Josoa sy ny Isiraely rehetra teo aminy ka nankany Eglona, dia nitoby tandrifiny ka namely azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: dia afany tamin'izany andro izany koa izy ka nasiany tamin'ny lelan-tsabatra; ary ny olona rehetra tao dia naringany
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. nataony herema; izahao Lev. XXII. 28
    marker-yv: yv-n
  - type: text
    text: ' tamin''izany andro izany, tahaka izay rehetra efa nataony tamin''i Lakisy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dia niakatra niala tany Eglona Josoa sy ny Isiraely rehetra teo aminy ka nankany Hebrona ary namely azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: dia afany koa izy, ka nasiany tamin'ny lelan-tsabatra izy sy ny mpanjakany sy ny tanànany rehetra ary ny olona rehetra tao; tsy nasiany niangana na dia iray akory aza, tahaka izay rehetra efa nataony tamin'i Eglona; fa naringany
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. nataony herema; izahao Lev. XXII. 28
    marker-yv: yv-n
  - type: text
    text: ' avokoa izy sy ny olona rehetra tao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dia niverina Josoa sy ny Isiraely rehetra teo aminy ka nankany Debira ary namely azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: dia azony koa izy sy ny mpanjakany ary ny tanànany rehetra; ary nasiany tamin'ny lelan-tsabatra Izy, ka naringany
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. nataony herema; izahao Lev. XXII. 28
    marker-yv: yv-n
  - type: text
    text: ' avokoa ny olona rehetra tao; fa tsy nasiany niangana na dia iray akory aza; tahaka izay efa nataony tamin''i Hebrona, dia toy izany koa no nataony tamin''i Debira sy ny mpanjakany, ary tahaka izay efa nataony tamin''i Libna sy ny mpanjakany koa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Dia nasian'i Josoa ny tany rehetra sy ny mpanjakany rehetra, dia ny tany havoana sy ny tany atsimo sy ny tany lemaka amoron-tsiraka
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sefela
    marker-yv: yv-n
  - type: text
    text: ' ary ny any ambodin''ny tendrombohitra; tsy nasiany niangana ireny, fa naringany avokoa ny olo-miaina rehetra, araka ny didin''i Jehovah. Andriamanitry ny Isiraely, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Dia nasian''i Josoa izy hatrany Kadesi-barnea ka hatrany Gaza, ary ny tany Gosena rehetra hatrany Gibeona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary ireo mpanjaka rehetra ireo sy ny taniny dia azon''i Josoa indray mandeha, satria Jehovah, Andriamanitry ny Isiraely, no niady ho an''ny Isiraely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Dia niverina Josoa sy ny Isiraely rehetra teo aminy ho any an-toby tany Gilgala.
