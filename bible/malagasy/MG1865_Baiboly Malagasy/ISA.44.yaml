document_id: ISA.44
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny amin'i Kyrosy, izay voahosotr'i Jehovah ho mpanafaka ny Isiraely
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fa ankehitriny dia mihainoa, ry Jakoba, mpanompoko, sy ry Isiraely, izay nofidiko; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Izao no lazain''i Jehovah Izay nahary anao sy namorona anao hatrany am-bohoka sady mamonjy anao: Aza matahotra, ry Jakoba mpanompoko, Ary ianao, ry Jesorona'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jesorona dia anaran'ny Isiraely
    marker-yv: yv-n
  - type: text
    text: ', izay nofidiko; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fa handatsaka rano amin''izay mangetaheta Aho, ary riaka ho amin''izay tany karankaina; Eny, handatsaka ny Fanahiko amin''ny taranakao Aho, ary ny fitahiako ho amin''ny terakao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia haniry eny amin''ny ahitra tahaka ny hazomalahelo eny anilan''ny rano mandeha ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny anankiray hilaza hoe: An''i Jehovah aho: Ary ny anankiray koa hankalaza ny anarana hoe Jakoba; Ary ny anankiray koa indray hanoratra amin'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: eo amin'''
    marker-yv: yv-n
  - type: text
    text: '''ny tànany hoe: An''i Jehovah, Ary ny anarana hoe Isiraely dia hotononiny amim-panajana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izao no lazain''i Jehovah, Mpanjakan''ny Isiraely, dia Jehovah, Tompon''ny maro, Mpanavotra azy: Izaho no voalohany, ary Izaho no farany: Ka tsy misy Andriamanitra afa-tsy Izaho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary iza moa no mba mahantso tahaka Ahy (Aoka hanambara sy handahatra izany amiko izy) hatrizay nampitoerako ny firenena fony fahagola? Ary ny zavatra ho avy sy ny mbola ho tonga, dia aoka hambarany koa izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aza matahotra na mangovitra ianareo; Tsy efa nampandre anareo hatramin''ny fahiny va Aho ka nanambara taminareo? Eny, ianareo no vavolombeloko; Misy Andriamanitra afa-tsy Izaho va? Tsia, tsy misy Vatolampy, tsy hitako izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izay mamorona sarin-javatra voasokitra dia zava-poana avokoa; Ary ny zavatra tiany indrindra dia tsy mahasoa; Ny vavolombelon''ireny dia tsy mahita na mahalala, mba hahamenatra azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Iza no namorona andriamanitra, na nanao sarin-javatra an-idina izay tsy mahasoa akory? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Indro, ho menatra ny namany rehetra; Fa ny mpiasa dia olona ihany; Aoka hivory izy rehetra ka handroso; Aoka ho raiki-tahotra sy ho menatra avokoa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny mpanefy manamboatra
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: manasa'
    marker-yv: yv-n
  - type: text
    text: ' fiasana; Miasa amin''ny arina izy ary manamboatra azy amin''ny tantanana sy miasa azy amin''ny sandriny matanjaka; Eny, noana izy, ka ketraka ny heriny; Tsy misotro rano izy ka reraka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ny mpandrafitra manenjana ny kofehy sy manamarika azy amin''ny fitsipihana; Manamboatra azy amin''ny vankona izy, dia manamarika azy amin''ny kompà ary mahavita azy ho tahaka ny endrik''olona, dia tahaka ny hatsaran-tarehin''ny olona, Mba hampitoerina ao an-trano. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tsy maintsy mijinja ny sedera izy ary maka ny hazo ileksa sy ôka Ary mifidy hazo any an''ala; Mamboly ny hazo orno izy, ka ampanirin''ny ranonorana izany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary dia anaovan''ny olona kitay izany ka analany hamindroany; Eny, ampirehetiny izany mba hanendasany mofo; Anaovany andriamanitra izany, ka dia ivavahany; Eny, anaovany sarin-javatra voasokitra koa izany, ka dia iankohofany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny sasany dorany amin'ny afo, eny, ny sasany ahandroany
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ihinanany
    marker-yv: yv-n
  - type: text
    text: ' hena; Manatsatsika hena izy, ka dia voky; Eny, mamindro izy ka manao hoe: Aha! mafana aho izany! nahita afo aho lahy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ny sisan''izany dia amboariny ho andriamanitra, ho sarin-javatra voasokitra, Ary miondrika sy miankohoka eo anatrehany izy ka mivavaka aminy hoe: Vonjeo aho, fa andriamanitro ianao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tsy mahalala na mahafantatra ireny; Fa voatampina ny masony ka tsy mahita, Ary ny fony, ka tsy mahalala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tsy misy mieritreritra ao am-pony, na mba manana fahalalana na saina akory hanao hoe: Ny sasany mantsy nodorako tamin''ny afo; Eny, efa nanendy mofo tamin''ny vainafony aho: Efa nanatsatsika hena aho ka nihinana; Koa ny sisa va hataoko fahavetavetana, Hiankohofako eo anatrehan''izay vatan-kazo'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: vokatry ny hazo'
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Homan-davenona izy; Voafitaka ny fony ka nampivily azy, ka dia tsy mahavonjy ny fanahiny izy na mahalaza hoe: Moa tsy lainga va no eto an-tanako ankavanana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tsarovy izany, ry Jakoba, dia ianao, ry Isiraely, fa mpanompoko ianao; Noforoniko ianao ka mpanompoko; Tsy hohadinoiko ianao, ry Isiraely ô, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Izaho efa nandevona ny fahadisoanao tahaka ny fandevona ny zavona, ary ny fahotanao tahaka ny rahona; Koa miverena amiko, fa efa nanavotra anao Aho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mihobia, ry lanitra; Fa Jehovah no nanao izany; Manaova feo fifaliana ianareo, ry fitoerana lalina any ambanin'ny tany; Velomy ny hoby, ry tendrombohitra, ary ianao, ry ala mbamin'izay hazo rehetra ao; Fa Jehovah efa nanavotra an'i Jakoba sy mampiseho ny voninahiny eo amin'Isiraely.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izao no lazain''i Jehovah, izay nanavotra anao sady namorona anao hatrany am-bohoka: Izaho no Jehovah Izay manao ny zavatra rehetra, Izaho irery no manenjana ny lanitra; Ny tenako ihany no mamelatra ny tany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Izaho mahafoana ny famantarana lazain''ny mpibedibedy sy mampahavery saina ny mpanao fankatovana ary mampihemotra ny olon-kendry ka mampody ny fahalalany ho fahadalana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ary mahatò ny tenin'ny mpanompoko
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. mpanompony
    marker-yv: yv-n
  - type: text
    text: ' sy mahatanteraka ny saina atolotry ny irako'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. irany
    marker-yv: yv-n
  - type: text
    text: ', ary manao amin''i Jerosalema hoe: Honenana ianao, sy amin''ny tanànan''ny Joda hoe: Hatsangana ianareo, ka hamboariko izay rava eo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary milaza amin''ny rano lalina hoe: Tankina, Fa hataoko tankina ny oninao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary milaza an''i Kyrosy hoe: Izy no mpiandry ondriko, ka izay sitrako rehetra dia hotanterahiny; Ary izy hanao amin''i Jerosalema hoe: Hatsangana ianao, ary amin''ny tempoly hoe: Haorina indray ny fanorenanao.'
