document_id: ISA.44,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'i Kyrosy, izay voahosotr'i Jehovah ho mpanafaka ny Isiraely
  - type: text
    content: 'Fa ankehitriny dia mihainoa, ry Jakoba, mpanompoko, sy ry Isiraely, izay nofidiko; '
  '10':
  - type: text
    content: 'Iza no namorona andriamanitra, na nanao sarin-javatra an-idina izay tsy mahasoa akory? '
  '11':
  - type: text
    content: 'Indro, ho menatra ny namany rehetra; Fa ny mpiasa dia olona ihany; Aoka hivory izy rehetra ka handroso; Aoka ho raiki-tahotra sy ho menatra avokoa izy. '
  '12':
  - type: text
    content: Ny mpanefy manamboatra
  - type: note
    content: 'Na: manasa'
  - type: text
    content: ' fiasana; Miasa amin''ny arina izy ary manamboatra azy amin''ny tantanana sy miasa azy amin''ny sandriny matanjaka; Eny, noana izy, ka ketraka ny heriny; Tsy misotro rano izy ka reraka. '
  '13':
  - type: text
    content: 'Ny mpandrafitra manenjana ny kofehy sy manamarika azy amin''ny fitsipihana; Manamboatra azy amin''ny vankona izy, dia manamarika azy amin''ny kompà ary mahavita azy ho tahaka ny endrik''olona, dia tahaka ny hatsaran-tarehin''ny olona, Mba hampitoerina ao an-trano. '
  '14':
  - type: text
    content: 'Tsy maintsy mijinja ny sedera izy ary maka ny hazo ileksa sy ôka Ary mifidy hazo any an''ala; Mamboly ny hazo orno izy, ka ampanirin''ny ranonorana izany; '
  '15':
  - type: text
    content: 'Ary dia anaovan''ny olona kitay izany ka analany hamindroany; Eny, ampirehetiny izany mba hanendasany mofo; Anaovany andriamanitra izany, ka dia ivavahany; Eny, anaovany sarin-javatra voasokitra koa izany, ka dia iankohofany. '
  '16':
  - type: text
    content: Ny sasany dorany amin'ny afo, eny, ny sasany ahandroany
  - type: note
    content: Heb. ihinanany
  - type: text
    content: ' hena; Manatsatsika hena izy, ka dia voky; Eny, mamindro izy ka manao hoe: Aha! mafana aho izany! nahita afo aho lahy! '
  '17':
  - type: text
    content: 'Ary ny sisan''izany dia amboariny ho andriamanitra, ho sarin-javatra voasokitra, Ary miondrika sy miankohoka eo anatrehany izy ka mivavaka aminy hoe: Vonjeo aho, fa andriamanitro ianao. '
  '18':
  - type: text
    content: 'Tsy mahalala na mahafantatra ireny; Fa voatampina ny masony ka tsy mahita, Ary ny fony, ka tsy mahalala. '
  '19':
  - type: text
    content: 'Tsy misy mieritreritra ao am-pony, na mba manana fahalalana na saina akory hanao hoe: Ny sasany mantsy nodorako tamin''ny afo; Eny, efa nanendy mofo tamin''ny vainafony aho: Efa nanatsatsika hena aho ka nihinana; Koa ny sisa va hataoko fahavetavetana, Hiankohofako eo anatrehan''izay vatan-kazo'
  - type: note
    content: 'Na: vokatry ny hazo'
  - type: text
    content: '? '
  '2':
  - type: text
    content: 'Izao no lazain''i Jehovah Izay nahary anao sy namorona anao hatrany am-bohoka sady mamonjy anao: Aza matahotra, ry Jakoba mpanompoko, Ary ianao, ry Jesorona'
  - type: note
    content: Jesorona dia anaran'ny Isiraely
  - type: text
    content: ', izay nofidiko; '
  '20':
  - type: text
    content: 'Homan-davenona izy; Voafitaka ny fony ka nampivily azy, ka dia tsy mahavonjy ny fanahiny izy na mahalaza hoe: Moa tsy lainga va no eto an-tanako ankavanana? '
  '21':
  - type: text
    content: 'Tsarovy izany, ry Jakoba, dia ianao, ry Isiraely, fa mpanompoko ianao; Noforoniko ianao ka mpanompoko; Tsy hohadinoiko ianao, ry Isiraely ô, '
  '22':
  - type: text
    content: 'Izaho efa nandevona ny fahadisoanao tahaka ny fandevona ny zavona, ary ny fahotanao tahaka ny rahona; Koa miverena amiko, fa efa nanavotra anao Aho. '
  '23':
  - type: text
    content: Mihobia, ry lanitra; Fa Jehovah no nanao izany; Manaova feo fifaliana ianareo, ry fitoerana lalina any ambanin'ny tany; Velomy ny hoby, ry tendrombohitra, ary ianao, ry ala mbamin'izay hazo rehetra ao; Fa Jehovah efa nanavotra an'i Jakoba sy mampiseho ny voninahiny eo amin'Isiraely.
  '24':
  - type: text
    content: 'Izao no lazain''i Jehovah, izay nanavotra anao sady namorona anao hatrany am-bohoka: Izaho no Jehovah Izay manao ny zavatra rehetra, Izaho irery no manenjana ny lanitra; Ny tenako ihany no mamelatra ny tany; '
  '25':
  - type: text
    content: 'Izaho mahafoana ny famantarana lazain''ny mpibedibedy sy mampahavery saina ny mpanao fankatovana ary mampihemotra ny olon-kendry ka mampody ny fahalalany ho fahadalana, '
  '26':
  - type: text
    content: Ary mahatò ny tenin'ny mpanompoko
  - type: note
    content: Heb. mpanompony
  - type: text
    content: ' sy mahatanteraka ny saina atolotry ny irako'
  - type: note
    content: Heb. irany
  - type: text
    content: ', ary manao amin''i Jerosalema hoe: Honenana ianao, sy amin''ny tanànan''ny Joda hoe: Hatsangana ianareo, ka hamboariko izay rava eo, '
  '27':
  - type: text
    content: 'Ary milaza amin''ny rano lalina hoe: Tankina, Fa hataoko tankina ny oninao, '
  '28':
  - type: text
    content: 'Ary milaza an''i Kyrosy hoe: Izy no mpiandry ondriko, ka izay sitrako rehetra dia hotanterahiny; Ary izy hanao amin''i Jerosalema hoe: Hatsangana ianao, ary amin''ny tempoly hoe: Haorina indray ny fanorenanao.'
  '3':
  - type: text
    content: 'Fa handatsaka rano amin''izay mangetaheta Aho, ary riaka ho amin''izay tany karankaina; Eny, handatsaka ny Fanahiko amin''ny taranakao Aho, ary ny fitahiako ho amin''ny terakao; '
  '4':
  - type: text
    content: 'Dia haniry eny amin''ny ahitra tahaka ny hazomalahelo eny anilan''ny rano mandeha ireny. '
  '5':
  - type: text
    content: 'Ny anankiray hilaza hoe: An''i Jehovah aho: Ary ny anankiray koa hankalaza ny anarana hoe Jakoba; Ary ny anankiray koa indray hanoratra amin'
  - type: note
    content: 'Na: eo amin'''
  - type: text
    content: '''ny tànany hoe: An''i Jehovah, Ary ny anarana hoe Isiraely dia hotononiny amim-panajana.'
  '6':
  - type: text
    content: 'Izao no lazain''i Jehovah, Mpanjakan''ny Isiraely, dia Jehovah, Tompon''ny maro, Mpanavotra azy: Izaho no voalohany, ary Izaho no farany: Ka tsy misy Andriamanitra afa-tsy Izaho. '
  '7':
  - type: text
    content: 'Ary iza moa no mba mahantso tahaka Ahy (Aoka hanambara sy handahatra izany amiko izy) hatrizay nampitoerako ny firenena fony fahagola? Ary ny zavatra ho avy sy ny mbola ho tonga, dia aoka hambarany koa izany. '
  '8':
  - type: text
    content: 'Aza matahotra na mangovitra ianareo; Tsy efa nampandre anareo hatramin''ny fahiny va Aho ka nanambara taminareo? Eny, ianareo no vavolombeloko; Misy Andriamanitra afa-tsy Izaho va? Tsia, tsy misy Vatolampy, tsy hitako izany. '
  '9':
  - type: text
    content: 'Izay mamorona sarin-javatra voasokitra dia zava-poana avokoa; Ary ny zavatra tiany indrindra dia tsy mahasoa; Ny vavolombelon''ireny dia tsy mahita na mahalala, mba hahamenatra azy. '
