document_id: 2KI.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahararian'i Ahazia, sy ny nilazan'i Elia fa ho faty izy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ary Moaba niodina tamin'ny Isiraely, rehefa maty Ahaba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Ahazia nianjera avy teo amin''ny makarakara teo amin''ny efi-trano ambony tao Samaria ka narary; dia naniraka olona izy ka nanao taminy hoe: Mandehana, anontanio amin''i Bala-zeboba, andriamanitr''i Ekrona, na ho sitrana ihany aho amin''ity aretiko ity, na tsia. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary Ilay Anjelin''i Jehovah niteny tamin''i Elia Tisbira hoe: Miaingà, miakara hihaona amin''ny iraky ny mpanjakan''i Samaria, ka manaova aminy hoe: Izao no lazain''i Jehovah: Moa ataonareo fa tsy misy Andriamanitra eo amin''ny Isiraely va, no mandeha hanontany amin''i Bala-zeboba, andriamanitr''i Ekrona, ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Koa noho izany dia tsy hidina hiala amin'ny farafara izay niakaranao ianao, fa ho faty tokoa. Ary dia lasa Elia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia niverina tany amin''ny mpanjaka ny iraka, ka hoy izy taminy: Nahoana re no niverina ianareo? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy ireo taminy: Nisy lehilahy niakatra nitsena anay ka nanao taminay hoe: Mandehana miverina any amin''ny mpanjaka izay naniraka anareo, ka lazao aminy hoe: Izao no lazain''i Jehovah: Moa ataonareo fa tsy misy Andriamanitra eo amin''ny Isiraely va, no maniraka hanontany amin''i Bala-zeboba, andriamanitr''i Ekrona, ianareo? Koa noho izany dia tsy hidina hiala amin''ny farafara izay niakaranao ianao, fa ho faty tokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy izy taminy: Lehilahy toy inona izay niakatra nitsena anareo izay ka nilaza izany teny izany taminareo? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ireo namaly azy hoe: Lehilahy mitafy volom-biby izy, sady nisy fehin-kibo hoditra tamin''ny valahany. Dia hoy izy: Elia Tisbita izay. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny mpanjaka naniraka mpifehy dimam-polo anankiray mbamin''ny dimam-polo fehiny hankany aminy. Dia niakatra tany aminy izy; ka indro izy nipetraka teo an-tampon''ny tendrombohitra; ary niteny taminy ralehilahy hoe: Ry lehilahin''Andriamanitra ô, midìna ianao, antsoin''ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa Elia namaly ka nanao tamin''ny mpifehy dimam-polo hoe: Raha lehilahin''Andriamanitra tokoa aho, dia aoka hisy afo milatsaka avy any an-danitra handevona anao sy ny dimam-polo fehinao. Ary dia nisy afo nilatsaka avy tany an-danitra ka nandevona azy mbamin''ny dimam-polo fehiny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia naniraka mpifehy dimam-polo anankiray mbamin''ny dimam-polo fehiny hankany aminy koa ny mpanjaka. Dia niteny izy ka nanao taminy hoe: Ry lehilahin''Andriamanitra ô, midìna faingana ianao, antsoin''ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa namaly Elia ka nanao taminy hoe: Raha lehilahin''Andriamanitra tokoa aho, dia aoka hisy afo milatsaka avy any an-danitra ka handevona anao mbamin''ny dimam-polo fehinao. Ary dia nisy afon''Andriamanitra nilatsaka avy tany an-danitra ka nandevona azy mbamin''ny dimam-polo fehiny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary dia naniraka mpifehy dimam-polo anankiray koa indray mbamin''ny dimam-polo fehiny izy. Dia niakatra ilay mpifehy dimam-polo ka tonga, ary nandohalika teo anatrehan''i Elia ka nifona taminy nanao hoe: Masìna ianao, ry lehilahin''Andriamanitra ô, aoka ho zava-tsoa eo imasonao ny aiko sy ny ain''ireto mpanomponao dimam-polo ireto. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Indro, efa nisy afo nilatsaka avy tany an-danitra ka nandevona ireo roa lahy mpifehy dimam-polo ireo mbamin''ny dimam-polo fehiny avy; fa aoka kosa ho zava-tsoa eo imasonao ny aiko ankehitriny. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary hoy Ilay Anjelin''i Jehovah tamin''i Elia: Midina ihany hiaraka aminy ianao; fa aza matahotra azy. Ary dia niainga izy ka nidina niaraka taminy ho any amin''ny mpanjaka. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary hoy izy tamin''ny mpanjaka: Izao no lazain''i Jehovah: Satria naniraka olona hanontany amin''i Bala-zeboba, andriamanitr''i Ekrona, ianao, hoatra ny tsy misy Andriamanitra eo amin''ny Isiraely, dia tsy hidina hiala amin''ny farafara izay niakaranao ianao fa ho faty tokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ka dia maty izy araka ny tenin''i Jehovah izay nolazain''i Elia. Ary satria tsy nanan-janaka izy, dia Jorama no nanjaka nandimby azy tamin''ny taona faharoa nanjakan''i Jehorama, zanak''i Josafata, mpanjakan''ny Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ary ny asan'i Ahazia sisa izay nataony, tsy efa voasoratra ao amin'ny bokin'ny tantaran'ny mpanjakan'ny Isiraely va izany?
