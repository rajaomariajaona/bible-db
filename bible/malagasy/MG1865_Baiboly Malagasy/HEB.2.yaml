document_id: HEB.2,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary amin''izany dia tokony hotandremantsika mafimafy kokoa izay efa rentsika, fandrao hindaosina hiala aminy isika. '
  '10':
  - type: text
    content: 'Fa miendrika Izay anton''ny nanaovana ny zavatra rehetra sady nahariana ny zavatra rehetra, raha mitondra zanaka maro ho any amin''ny voninahitra, ny hahatanteraka ny Tompon''ny famonjena ireo amin''ny fahoriana. '
  '11':
  - type: text
    content: 'Fa iray no nihavian''izy roroa, na Izay manamasina, na izay hamasinina; koa izany no tsy mahamenatra Azy hanao ireo hoe "rahalahy" '
  '12':
  - type: text
    content: 'ka manao hoe: "Hitory ny anaranao amin''ny rahalahiko Aho; Eo amin''ny fiangonana'
  - type: note
    content: Gr. eklesia
  - type: text
    content: ' no hiderako Anao" (Sal 22.22). '
  '13':
  - type: text
    content: 'Ary koa: "Izaho hatoky Azy". Ary indray koa: "Indreto Izaho sy ireo zaza nomen''Andriamanitra Ahy" (Isa. 8.27,18). '
  '14':
  - type: text
    content: 'Koa satria manana nofo aman-drà ny zaza, dia mba nandray izany koa Izy, mba handringanany amin''ny fahafatesana ilay manana ny herin''ny fahafatesana, dia ny devoly, '
  '15':
  - type: text
    content: 'ary mba hanafahany izay rehetra nandany ny fiainany rehetra tamin''ny fahandevozana noho ny tahotra ny fahafatesana. '
  '16':
  - type: text
    content: 'Fa hita marina fa tsy anjely no vonjeny, fa ny taranak''i Abrahama no vonjeny. '
  '17':
  - type: text
    content: 'Koa amin''izany dia miendrika mba hatao tahaka ny rahalahiny amin''ny zavatra rehetra Izy, mba ho Mpisoronabe mamindra fo sy mahatoky ny amin''Andriamanitra, mba hanaovany fanavotana noho ny heloky ny olona. '
  '18':
  - type: text
    content: Fa satria nalaim-panahy ny tenany tamin'ny fahoriana nentiny
  - type: note
    content: 'Na: satria nijaly ny tenany, raha nalaim-panahy izy'
  - type: text
    content: ', dia mahavonjy izay alaim-panahy koa Izy.'
  '2':
  - type: text
    content: 'Fa raha mafy ny teny izay nampilazaina ny anjely, ka samy voavaly marina avokoa ny fahadisoana rehetra mbamin''ny fahotana, '
  '3':
  - type: text
    content: 'hataontsika ahoana no fandositra, raha tsy mitandrina izao famonjena lehibe izao isika? dia ilay nampilazaina ny Tompo tamin''ny voalohany, ary nohamafin''izay nandre tamintsika kosa, '
  '4':
  - type: text
    content: 'sady Andriamanitra koa no niara-nanambara taminy tamin''ny famantarana sy ny fahagagana ary tamin''ny asa lehibe samy hafa sy ny fanomezana ny Fanahy Masina nozarazarainy araka ny sitrapony. '
  '5':
  - type: text
    content: 'Fa tsy anjely no nampanekeny ny fiainana ho avy, izay lazainay. '
  '6':
  - type: text
    content: 'Fa ny anankiray nanambara eo amin''ny teny iray hoe: "Inona ny olona, no ahatsiarovanao azy? Ary ny zanak''olombelona, no amangianao azy? '
  '7':
  - type: text
    content: Nataonao ambany kely
  - type: note
    content: 'Na: vetivety'
  - type: text
    content: ' noho ny anjely izy; Efa nosatrohanao voninahitra sy fiandrianana izy, Ary nampanjakainao amin''ny asan''ny tananao; '
  '8':
  - type: text
    content: 'Ny zavatra rehetra dia efa nanapanekenao ho eo ambanin''ny tongony" (Sal. 8.4-6). Fa tamin''ny nampanekeny azy ny zavatra rehetra, dia tsy nisy izay tsy nampanekeny azy. Nefa ankehitriny tsy mbola hitantsika fa efa ampanekena azy ny zavatra rehetra. '
  '9':
  - type: text
    content: Fa Ilay natao ambany kely
  - type: note
    content: 'Na: vetivety'
  - type: text
    content: ' noho ny anjely no hitantsika, dia Jesosy, ary noho ny fitondrany ny fahafatesana dia voasatroka voninahitra aman-daza Izy, mba hanandrana fahafatesana hamonjy ny olona rehetra noho ny fahasoavan''Andriamanitra. '
