document_id: HEB.2
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary amin''izany dia tokony hotandremantsika mafimafy kokoa izay efa rentsika, fandrao hindaosina hiala aminy isika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Fa raha mafy ny teny izay nampilazaina ny anjely, ka samy voavaly marina avokoa ny fahadisoana rehetra mbamin''ny fahotana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'hataontsika ahoana no fandositra, raha tsy mitandrina izao famonjena lehibe izao isika? dia ilay nampilazaina ny Tompo tamin''ny voalohany, ary nohamafin''izay nandre tamintsika kosa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'sady Andriamanitra koa no niara-nanambara taminy tamin''ny famantarana sy ny fahagagana ary tamin''ny asa lehibe samy hafa sy ny fanomezana ny Fanahy Masina nozarazarainy araka ny sitrapony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa tsy anjely no nampanekeny ny fiainana ho avy, izay lazainay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa ny anankiray nanambara eo amin''ny teny iray hoe: "Inona ny olona, no ahatsiarovanao azy? Ary ny zanak''olombelona, no amangianao azy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nataonao ambany kely
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: vetivety'
    marker-yv: yv-n
  - type: text
    text: ' noho ny anjely izy; Efa nosatrohanao voninahitra sy fiandrianana izy, Ary nampanjakainao amin''ny asan''ny tananao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ny zavatra rehetra dia efa nanapanekenao ho eo ambanin''ny tongony" (Sal. 8.4-6). Fa tamin''ny nampanekeny azy ny zavatra rehetra, dia tsy nisy izay tsy nampanekeny azy. Nefa ankehitriny tsy mbola hitantsika fa efa ampanekena azy ny zavatra rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Fa Ilay natao ambany kely
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: vetivety'
    marker-yv: yv-n
  - type: text
    text: ' noho ny anjely no hitantsika, dia Jesosy, ary noho ny fitondrany ny fahafatesana dia voasatroka voninahitra aman-daza Izy, mba hanandrana fahafatesana hamonjy ny olona rehetra noho ny fahasoavan''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa miendrika Izay anton''ny nanaovana ny zavatra rehetra sady nahariana ny zavatra rehetra, raha mitondra zanaka maro ho any amin''ny voninahitra, ny hahatanteraka ny Tompon''ny famonjena ireo amin''ny fahoriana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa iray no nihavian''izy roroa, na Izay manamasina, na izay hamasinina; koa izany no tsy mahamenatra Azy hanao ireo hoe "rahalahy" '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ka manao hoe: "Hitory ny anaranao amin''ny rahalahiko Aho; Eo amin''ny fiangonana'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. eklesia
    marker-yv: yv-n
  - type: text
    text: ' no hiderako Anao" (Sal 22.22). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary koa: "Izaho hatoky Azy". Ary indray koa: "Indreto Izaho sy ireo zaza nomen''Andriamanitra Ahy" (Isa. 8.27,18). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Koa satria manana nofo aman-drà ny zaza, dia mba nandray izany koa Izy, mba handringanany amin''ny fahafatesana ilay manana ny herin''ny fahafatesana, dia ny devoly, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'ary mba hanafahany izay rehetra nandany ny fiainany rehetra tamin''ny fahandevozana noho ny tahotra ny fahafatesana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa hita marina fa tsy anjely no vonjeny, fa ny taranak''i Abrahama no vonjeny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa amin''izany dia miendrika mba hatao tahaka ny rahalahiny amin''ny zavatra rehetra Izy, mba ho Mpisoronabe mamindra fo sy mahatoky ny amin''Andriamanitra, mba hanaovany fanavotana noho ny heloky ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa satria nalaim-panahy ny tenany tamin'ny fahoriana nentiny
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: satria nijaly ny tenany, raha nalaim-panahy izy'
    marker-yv: yv-n
  - type: text
    text: ', dia mahavonjy izay alaim-panahy koa Izy.'
