document_id: MRK.12,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary niteny taminy Izy ka nanao fanoharana hoe: Nisy lehilahy anankiray nanao tanim-boaloboka ka namefy azy manodidina sy nihady famiazana ary nanao tilikambo, ka nahofany tamin''olona mpiasa tany izany, dia lasa nankany an-tany hafa izy. '
  '10':
  - type: text
    content: 'Ary tsy mbola novakinareo va izao Soratra Masina izao: Ny vato izay nolavin''ny mpanao trano, Dia izy no efa natao fehizoro; '
  '11':
  - type: text
    content: 'Avy tamin''i Jehovah izao Ka mahagaga eo imasontsika? (Sal. 118. 22, 23.) '
  '12':
  - type: text
    content: 'Ary nitady hisambotra Azy izy ireo, nefa natahotra ny vahoaka izy, satria fantany fa ny tenany no nolazainy tamin''izany fanoharana izany; dia nandao an''i Jesosy ny olona ka lasa. '
  '13':
  - type: text
    content: 'Ary nirahiny hankeo amin''i Jesosy ny sasany avy tamin''ny Fariseo sy ny Herodiana hamandrika Azy amin''ny teniny. '
  '14':
  - type: text
    content: 'Ary rehefa tonga izy ireo, dia nanao taminy hoe: Mpampianatra ô, fantatray fa marina Hianao, ka tsy mampaninona Anao ny hevitry ny olona, fa tsy mba mizaha tavan''olona Hianao, fa mampianatra marina ny lalan''Andriamanitra. Mety va ny mandoa vola hetra ho an''i Kaisara, sa tsia? '
  '15':
  - type: text
    content: 'Handoa va izahay, sa tsy handoa? Fa Izy nahalala ny fihatsaram-belatsihiny, ka dia nanao taminy hoe: Nahoana no maka fanahy Ahy ianareo? Itondray denaria etỳ amiko hizahako azy. '
  '16':
  - type: text
    content: 'Dia nitondrany Izy. Ary hoy Izy taminy: An''iza io sary sy soratra io? Ary hoy izy taminy: An''i Kaisara. '
  '17':
  - type: text
    content: 'Dia hoy Jesosy taminy: Aloavy ho an''i Kaisara izay an''i Kaisara, ary ho an''Andriamanitra izay an''Andriamanitra. Dia gaga taminy ireny. '
  '18':
  - type: text
    content: 'Ary ny Sadoseo, izay milaza fa tsy misy fitsanganan''ny maty, dia nisy sasany tonga teo aminy ka nanontany Azy hoe: '
  '19':
  - type: text
    content: 'Mpampianatra ô, Mosesy nanoratra ho antsika hoe: Raha misy manan-drahalahy maty momba, ka mbola velona ny vadin''ny maty, dia aoka ny rahalahiny hampakatra azy hiteraka hamelo-maso ny rahalahiny (Deo. 25. 5). '
  '2':
  - type: text
    content: 'Ary nony tonga ny fotoana, dia naniraka mpanompo anankiray izy hankany amin''ny mpiasa tany handray amin''ny vokatry ny tanim-boaloboka. '
  '20':
  - type: text
    content: 'Nisy fito mirahalahy; ary ny zokiny nampaka-bady, dia maty momba. '
  '21':
  - type: text
    content: 'Ary ny faharoa nampakatra an-dravehivavy, dia maty momba koa; ary ny fahatelo dia toy izany ihany koa. '
  '22':
  - type: text
    content: 'Ary izy fito mirahalahy dia samy maty momba avokoa. Koa faran''izy rehetra dia maty koa ravehivavy. '
  '23':
  - type: text
    content: 'Koa amin''ny fitsanganan''ny maty, ho vadin''iza moa ravehivavy, satria efa samy nanambady azy avokoa izy fito mirahalahy? '
  '24':
  - type: text
    content: 'Ary hoy Jesosy taminy: Tsy izao tsi-fahafantaranareo ny Soratra Masina sy ny herin''Andriamanitra izao va no mahadiso hevitra anareo? '
  '25':
  - type: text
    content: 'Fa amin''ny hitsanganana amin''ny maty dia tsy hisy hampaka-bady na havoaka hampakarina; fa tahaka ny anjely any an-danitra izy. '
  '26':
  - type: text
    content: 'Ka ny amin''ny hananganana ny maty, tsy mbola novakinareo va ny eo amin''ny bokin''i Mosesy, eo amin''ilay teny milaza ny Voaroy, dia ny nanaovan''Andriamanitra taminy hoe: Izaho no Andriamanitr''i Abrahama sy Andriamanitr''isaka ary Andriamanitr''i Jakoba? (Eks. 3. 6.) '
  '27':
  - type: text
    content: 'Tsy Andriamanitry ny maty Izy, fa an''ny velona; koa diso indrindra ianareo. '
  '28':
  - type: text
    content: 'Dia nanatona an''i Jesosy ny mpanora-dalàna anankiray, izay efa nahare ny niadiany hevitra tamin''ny Sadoseo ka nahalala fa namaly azy tsara Izy, dia nanontany Azy hoe: Ny didy manao ahoana no voalohany amin''izy rehetra? '
  '29':
  - type: text
    content: 'Ary Jesosy namaly hoe: Ny voalohany dia izao: Mihainoa, ry Isiraely: Jehovah Andriamanitsika dia Jehovah iray ihany; '
  '3':
  - type: text
    content: 'Fa ireo nisambotra ilay mpanompo sady nikapoka azy ka nampiala azy maina. '
  '30':
  - type: text
    content: 'koa tiava an''i Jehovah Andriamanitrao amin''ny fonao rehetra sy ny fanahinao rehetra sy ny sainao rehetra ary ny herinao rehetra (Deo. 6. 4, 5). '
  '31':
  - type: text
    content: 'Ary ny faharoa dia izao: Tiava ny namanao tahaka ny tenanao (Lev. 19. 18). Tsy misy didy hafa lehibe noho ireo. '
  '32':
  - type: text
    content: 'Ary hoy ilay mpanora-dalàna taminy: Marina izany, Tompoko; tsara ny nilazanao fa iray ihany Andriamanitra, ary tsy misy afa-tsy Izy. '
  '33':
  - type: text
    content: 'Ary ny ho tia Azy amin''ny fo rehetra sy ny saina rehetra sy ny hery rehetra, ary ny ho tia ny namana tahaka ny tena, dia mihoatra lavitra noho ny fanatitra hodorana sy ny fanatitra hafa rehetra izany. '
  '34':
  - type: text
    content: 'Ary raha hitan''i Jesosy fa namaly tamim-pahendrena izy, dia hoy Izy taminy: Tsy lavitra ny fanjakan''Andriamanitra ianao. Ary tsy nisy sahy nanontany Azy intsony. '
  '35':
  - type: text
    content: 'Ary Jesosy, raha nampianatra teo an-kianjan''ny tempoly, dia namaly ka nanao hoe: Ahoana no lazain''ny mpanora-dalàna fa Kristy no Zanak''i Davida? '
  '36':
  - type: text
    content: 'Kanefa ny tenan''i Davida dia nampilazain''ny Fanahy Masina hoe: Jehovah nilaza tamin''ny Tompoko hoe: Mipetraha eo an-tanako ankavanana Ambara-panaoko ny fahavalonao ho fitoeran-tongotrao (Sal. 110. 1). '
  '37':
  - type: text
    content: Ny tenan'i Davida manao Azy hoe Tompo, koa ahoana no maha-Zanany Azy? Ary ny vahoaka betsaka nihaino Azy tamin'ny hafaliana.
  '38':
  - type: text
    content: 'Ary hoy Izy amin''ny fampianarany: Mitandrema ny amin''ny mpanora-dalàna izay mazoto mandehandeha miakanjo akanjo lava sy te-hoharabain''olona eny an-tsena, '
  '39':
  - type: text
    content: 'ary tia ny fipetrahana aloha ao amin''ny synagoga sy ny fitoerana aloha ao amin''ny fanasana, '
  '4':
  - type: text
    content: 'Ary izy naniraka mpanompo anankiray koa ho any aminy indray, fa io koa, dia noratrainy ny lohany, ka nalany baraka izy. '
  '40':
  - type: text
    content: ary mandany ny tranon'ny mpitondratena ka manao vavaka lavareny mba ho fiolahana; ireo no hahazo fahamelohana mafimafy kokoa.
  '41':
  - type: text
    content: 'Ary raha nipetraka tandrifin''ny fandatsahan-drakitra Jesosy, dia nijery ny fandatsaky ny vahoaka tao; ary maro ny mpanankarena nandatsaka be tao. '
  '42':
  - type: text
    content: Fa nisy mpitondratena malahelo anankiray kosa tonga teo, ka nandatsaka farantsakely
  - type: note
    content: Gr. lepta roa, dia farantsakely varahina izany = kodranta iray = tokony ho variroaventy
  - type: text
    content: ' roa an-kevitry ny variroaventy avy. '
  '43':
  - type: text
    content: 'Ary Jesosy niantso ny mpianany hanatona Azy ka nanao taminy hoe: Lazaiko aminareo marina tokoa fa io mpitondratena malahelo io no efa nandatsaka be noho izay rehetra nandatsaka tao amin''ny fandatsahan-drakitra. '
  '44':
  - type: text
    content: Fa ireo rehetra ireo, dia tamin'ny haben'ny fananany ho nandatsahany tao; fa izy kosa, tamin'ny alahelony no nandatsahany tao izay rehetra nananany, dia ny fivelomany rehetra.
  '5':
  - type: text
    content: 'Ary naniraka anankiray koa izy, fa io kosa indray dia novonoiny ho faty; ary maro koa no nirahiny, fa ny sasany nokapohiny, ary ny sasany novonoiny ho faty. '
  '6':
  - type: text
    content: 'Ary mbola nanana anankiray izy, dia ny zananilahy malalany, ka nony farany dia naniraka azy hankany aminy izy ka nanao hoe: Hanaja ny zanako izy. '
  '7':
  - type: text
    content: 'Fa izany mpiasa tany izany niresaka hoe: Ity no mpandova; andeha hovonointsika izy, dia ho antsika ny lova. '
  '8':
  - type: text
    content: 'Ary rehefa nisambotra azy izy, dia nahafaty azy sy namoaka azy teo ivelan''ny tanim-boaloboka. '
  '9':
  - type: text
    content: 'Koa ahoana no hataon''ny tompon''ny tanim-boaloboka amin''izany? Ho avy izy, dia handringana ny mpiasa tany, ka homeny olon-kafa ny tanim-boaloboka. '
