document_id: 1PE.5,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fananarana ny loholona mba ho malemy fanahy sy ho mahatoky, ary fananarana ny olona rehetra mba hanetry tena sy hitandrina. Vavaka farany sy fanaovam-beloma
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Koa ny amin'ny loholona
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. presbytera
      marker-yv: yv-n
    - type: text
      text: ' izay eo aminareo, izaho, izay naman ny loholona'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. presbytera
      marker-yv: yv-n
    - type: text
      text: ' sy vavolombelon''ny fijalian''i Kristy ary mpiombona ny voninahitra efa haseho koa, dia mananatra azy hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Andriamanitry ny fahasoavana rehetra, Izay efa niantso anareo ho any amin''ny voninahiny mandrakizay ao amin''i Kristy, rehefa niaritra fahoriana vetivety ianareo, dia Izy no hahatanteraka sy hampiorina ary hampitoetra anareo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho Azy anie ny fanjakana mandrakizay mandrakizay. Amena. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa manoratra teny fohifohy ho aminareo aho hampitondraina an''i Silasy, izay ataoko ho rahalahy mahatoky, dia mananatra anareo aho ka manambara fa izany no tena fahasoavan''Andriamanitra,- tomoera tsara amin''izany ianareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izay any Babylona, voafidy ho namanareo, manao veloma anareo, ary Marka zanako koa. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mifanaova veloma amin'ny fanoroham-pitiavana. Ho aminareo rehetra izay ao amin'i Kristy anie ny fiadanana.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Andraso ny ondrin'Andriamanitra izay eo aminareo
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: izay andraikitrareo'
      marker-yv: yv-n
    - type: text
      text: ', mitandrina azy tsy an-tery, fa amin''ny sitrapo,[araka an''Andriamanitra]; tsy amin''ny fitiavana harena maloto, fa amin''ny zotom-panahy; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tsy ho mpanjakazaka, amin''ny anjara-fiandrasana, fa ho fianaran''ny ondry. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary rehefa miseho ny Lohan'ny mpiandry, dia hahazo ny satro-boninahitra tsy mety simba ianareo,
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary ianareo izay mbola tanora fanahy kosa, dia maneke ny loholona
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. presbytera
      marker-yv: yv-n
    - type: text
      text: '. Eny, samia misikina fanetren-tena ianareo ka mifanompoa; fa "Andriamanitra manohitra ny miavonavona, fa manome fahasoavana ho an''ny manetry tena" (Oha. 3.34). '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa amin''izany manetre tena ambanin''ny tàna-maherin''Andriamanitra, mba hanandratany anareo amin''ny fotoan''andro; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary apetraho aminy ny fanahianareo rehetra; fa Izy no miahy anareo (Sal. 55.22). '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mahonòna tena, miambena: fa ny devoly fahavalonareo mandehandeha tahaka ny liona mierona mitady izay harapany; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tohero izy, ka miorena tsara amin''ny finoana ianareo, satria fantatrareo fa izany fahoriana izany dia manjo ny rahalahinareo rehetra eran''izao tontolo izao. '
