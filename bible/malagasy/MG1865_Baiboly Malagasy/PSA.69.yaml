document_id: PSA.69,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fitarainan'izay nenjehina sy nampahorina noho ny amin'Andriamanitra
  - type: text
    content: 'Ho an''ny mpiventy hira. Al-shoshanim. Nataon''i Davida. Vonjeo aho, Andriamanitra ô; fa efa mihatra amin''ny aiko ny rano. '
  '10':
  - type: text
    content: 'Nitomany sady nifady hanina aho, dia natao latsa ho ahy izany. '
  '11':
  - type: text
    content: 'Lamba fisaonana no nataoko fitafiako, dia efa ambentin-teny tamin''ireny aho. '
  '12':
  - type: text
    content: 'Miresaka ahy izay mipetraka eo am-bavahady; ary ataon''ny mpisotro toaka an-kira aho. '
  '13':
  - type: text
    content: 'Fa izaho hivavaka aminao amin''ny andro fankasitrahana, Jehovah ô, dia aminao , Andriamanitra ô noho ny haben''ny famindram-ponao; valio aho araka ny hamarinan''ny famonjenao. '
  '14':
  - type: text
    content: 'Afaho amin''ny fotaka aho, ka aza avela hilentika; vonjeo aho amin''izay mankahala ahy sy amin''ny rano lalina. '
  '15':
  - type: text
    content: 'Aza avela hanafotra ahy ny rano mandriaka, na hitelina ahy ny lalina; ary aza avela hikatom-bava amiko ny lavaka fantsakana. '
  '16':
  - type: text
    content: 'Valio aho, Jehovah ô, fa tsara ny famindram-ponao; todiho aho araka ny haben''ny fiantranao. '
  '17':
  - type: text
    content: 'Ary aza manafina ny tavanao amin''ny mpanomponao; fa azom-pahoriana aho, koa faingàna hamaly ahy Hianao. '
  '18':
  - type: text
    content: 'Hatony ny fanahiko, avoty izy; Eny, vonjeo aho noho ny ataon''ny fahavaloko. '
  '19':
  - type: text
    content: Hianao no mahalala ny latsa mihatra amiko ary ny fahamenarako sy ny fahafaham-boninahitro; Eo anatrehanao ny mpandrafy ahy rehetra.
  '2':
  - type: text
    content: 'Milentika amin''ny fotaka mandrevo aho, ka tsy misy hifaharana; efa miditra amin''ny rano lalina aho, ka mandifotra ahy ny riaka. '
  '20':
  - type: text
    content: 'Ny latsa dia nanorotoro ny foko ka reraka indrindra aho; ary niandry antra aho, fa tsy nisy, sy mpanony fa tsy nahita. '
  '21':
  - type: text
    content: 'Fa zava-mangidy no nomeny ho haniko; ary vinaingitra no natolony ahy hosotroina, raha nangetaheta aho. '
  '22':
  - type: text
    content: 'Aoka ho fandrika ho azy ny latabany eo anoloany; eny, ho tonta ho an''ny tsy manana ahiahy. '
  '23':
  - type: text
    content: 'Aoka ho jamba ny masony mba tsy hahita; ary ampangozohozoy mandrakariva ny valahany. '
  '24':
  - type: text
    content: 'Aidino aminy ny fahatezeranao; ary aoka hahatratra azy ny firehetan''ny fahaviniranao. '
  '25':
  - type: text
    content: 'Aoka ho foana ny tobiny; aza avela hisy hitoetra ao an-dainy. '
  '26':
  - type: text
    content: 'Fa izay nasianao no nenjehiny; Ary ny fahararian''ny voatsindronao dia lazalazainy. '
  '27':
  - type: text
    content: 'Aoka hiampy ny helony; ary aoka tsy hiditra amin''ny fahamarinanao izy. '
  '28':
  - type: text
    content: 'Aoka hovonoina tsy ho eo amin''ny bokin''ny velona ny anarany, ary aoka tsy hosoratana eo amin''ny marina. '
  '29':
  - type: text
    content: 'Fa izaho dia ory sy mahantra, Andriamanitra ô; aoka ny famonjenao no hanandratra ahy. '
  '3':
  - type: text
    content: 'Sasatry ny mitaraina aho, maimay ny tendako; pahina ny masoko, raha miandry an''Andriamanitro aho. '
  '30':
  - type: text
    content: 'Hankalaza ny anaran''Andriamanitra amin''ny fihirana aho, ary hidera Azy amin''ny fisaorana. '
  '31':
  - type: text
    content: Fa ho sitrak'i Jehovah Izany mihoatra noho ny vantotr'ombilahy, izay manan-tandroka sady mivaky kitro.
  '32':
  - type: text
    content: 'Hahita izany ny mpandefitra ka ho faly; aoka ho velona ny fonareo, ry mpitady an''Andriamanitra. '
  '33':
  - type: text
    content: 'Fa mihaino ny malahelo Jehovah, ary ny olony mifatotra tsy mba hamavoiny. '
  '34':
  - type: text
    content: 'Aoka hidera Azy ny lanitra sy ny tany, ny ranomasina sy izay rehetra mihetsika ao aminy. '
  '35':
  - type: text
    content: 'Fa Andriamanitra hamonjy an''i Ziona sady hanangana ny tanànan''ny Joda; ary hitoetra ao ny olony ka ho tompony; '
  '36':
  - type: text
    content: Dia handova azy ny taranaky ny mpanompony; ary hitoetra ao izay tia ny anarany.
  '4':
  - type: text
    content: Maro noho ny volon-dohako ny isan'izay mankahala ahy tsy ahoan-tsy ahoana; mahery izay ta-hahafaty ahy, dia ny fahavaloko tsy ahoan-tsy ahoana; mampanonitra ahy izay tsy nalaiko izy.
  '5':
  - type: text
    content: 'Andriamanitra ô, Hianao mahalala ny hadalako; ary ny heloko tsy mba miafina aminao. '
  '6':
  - type: text
    content: 'Aoka tsy ho menatra noho ny amiko izay miandry Anao, Jehovah, Tompon''ny maro ô; aoka tsy ho very hevitra noho ny amiko izay mitady Anao, ry Andriamanitry ny Isiraely ô. '
  '7':
  - type: text
    content: 'Fa noho ny aminao no itondrako latsa; safotry ny henatra ny tavako. '
  '8':
  - type: text
    content: 'Efa vahiny amin''ny rahalahiko aho; eny, efa olon-ko azy amin''ny zanak''ineny aho. '
  '9':
  - type: text
    content: 'Fa ny firehetako ny amin''ny tranonao no naharitra aina ahy; ary ny latsa nataon''izay nandatsa Anao dia nihatra tamiko. '
