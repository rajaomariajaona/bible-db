document_id: PSA.69
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fitarainan'izay nenjehina sy nampahorina noho ny amin'Andriamanitra
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Al-shoshanim. Nataon''i Davida. Vonjeo aho, Andriamanitra ô; fa efa mihatra amin''ny aiko ny rano. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Milentika amin''ny fotaka mandrevo aho, ka tsy misy hifaharana; efa miditra amin''ny rano lalina aho, ka mandifotra ahy ny riaka. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Sasatry ny mitaraina aho, maimay ny tendako; pahina ny masoko, raha miandry an''Andriamanitro aho. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Maro noho ny volon-dohako ny isan'izay mankahala ahy tsy ahoan-tsy ahoana; mahery izay ta-hahafaty ahy, dia ny fahavaloko tsy ahoan-tsy ahoana; mampanonitra ahy izay tsy nalaiko izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Andriamanitra ô, Hianao mahalala ny hadalako; ary ny heloko tsy mba miafina aminao. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Aoka tsy ho menatra noho ny amiko izay miandry Anao, Jehovah, Tompon''ny maro ô; aoka tsy ho very hevitra noho ny amiko izay mitady Anao, ry Andriamanitry ny Isiraely ô. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fa noho ny aminao no itondrako latsa; safotry ny henatra ny tavako. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Efa vahiny amin''ny rahalahiko aho; eny, efa olon-ko azy amin''ny zanak''ineny aho. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa ny firehetako ny amin''ny tranonao no naharitra aina ahy; ary ny latsa nataon''izay nandatsa Anao dia nihatra tamiko. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nitomany sady nifady hanina aho, dia natao latsa ho ahy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lamba fisaonana no nataoko fitafiako, dia efa ambentin-teny tamin''ireny aho. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Miresaka ahy izay mipetraka eo am-bavahady; ary ataon''ny mpisotro toaka an-kira aho. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa izaho hivavaka aminao amin''ny andro fankasitrahana, Jehovah ô, dia aminao , Andriamanitra ô noho ny haben''ny famindram-ponao; valio aho araka ny hamarinan''ny famonjenao. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Afaho amin''ny fotaka aho, ka aza avela hilentika; vonjeo aho amin''izay mankahala ahy sy amin''ny rano lalina. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Aza avela hanafotra ahy ny rano mandriaka, na hitelina ahy ny lalina; ary aza avela hikatom-bava amiko ny lavaka fantsakana. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Valio aho, Jehovah ô, fa tsara ny famindram-ponao; todiho aho araka ny haben''ny fiantranao. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary aza manafina ny tavanao amin''ny mpanomponao; fa azom-pahoriana aho, koa faingàna hamaly ahy Hianao. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hatony ny fanahiko, avoty izy; Eny, vonjeo aho noho ny ataon''ny fahavaloko. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Hianao no mahalala ny latsa mihatra amiko ary ny fahamenarako sy ny fahafaham-boninahitro; Eo anatrehanao ny mpandrafy ahy rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ny latsa dia nanorotoro ny foko ka reraka indrindra aho; ary niandry antra aho, fa tsy nisy, sy mpanony fa tsy nahita. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa zava-mangidy no nomeny ho haniko; ary vinaingitra no natolony ahy hosotroina, raha nangetaheta aho. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Aoka ho fandrika ho azy ny latabany eo anoloany; eny, ho tonta ho an''ny tsy manana ahiahy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Aoka ho jamba ny masony mba tsy hahita; ary ampangozohozoy mandrakariva ny valahany. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Aidino aminy ny fahatezeranao; ary aoka hahatratra azy ny firehetan''ny fahaviniranao. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Aoka ho foana ny tobiny; aza avela hisy hitoetra ao an-dainy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fa izay nasianao no nenjehiny; Ary ny fahararian''ny voatsindronao dia lazalazainy. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Aoka hiampy ny helony; ary aoka tsy hiditra amin''ny fahamarinanao izy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Aoka hovonoina tsy ho eo amin''ny bokin''ny velona ny anarany, ary aoka tsy hosoratana eo amin''ny marina. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa izaho dia ory sy mahantra, Andriamanitra ô; aoka ny famonjenao no hanandratra ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Hankalaza ny anaran''Andriamanitra amin''ny fihirana aho, ary hidera Azy amin''ny fisaorana. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Fa ho sitrak'i Jehovah Izany mihoatra noho ny vantotr'ombilahy, izay manan-tandroka sady mivaky kitro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Hahita izany ny mpandefitra ka ho faly; aoka ho velona ny fonareo, ry mpitady an''Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fa mihaino ny malahelo Jehovah, ary ny olony mifatotra tsy mba hamavoiny. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Aoka hidera Azy ny lanitra sy ny tany, ny ranomasina sy izay rehetra mihetsika ao aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Fa Andriamanitra hamonjy an''i Ziona sady hanangana ny tanànan''ny Joda; ary hitoetra ao ny olony ka ho tompony; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Dia handova azy ny taranaky ny mpanompony; ary hitoetra ao izay tia ny anarany.
