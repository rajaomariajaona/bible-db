document_id: PRO.24
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Aza mialona ny olona ratsy fanahy, Na maniry ho namany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fa fandravana no saintsainin'ny fony, Ary fampahoriana notenenin'ny molony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fahendrena no anaovana trano; Ary fahalalinan-tsaina no mampaharitra azy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Sady fahalalana no hamenoana ny efi-trano Amin'izay harena soa sy mahafinaritra rehetra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Be hery ny lehilahy hendry, Eny, mitombo hery ny olona manam-pahalalana; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa ny fahaizana mandamina tsara no entonao miady, Ary raha maro ny mpanolo-tsaina, dia misy famonjena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Avo tsy takatry ny adala ny fahendrena
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ataon''ny adala ho haingohaingo foana ny fahendrena'
    marker-yv: yv-n
  - type: text
    text: ', Tsy mba mahaloa-bava eo am-bavahady izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Izay misaintsaina hanao ratsy Dia atao hoe mpamoron-tsain-dratsy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ota ny fikasan'ny hadalana; Ary fahavetavetana eo imason'ny olona ny mpaniratsira.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Raha reraka amin''ny andro fahoriana ianao, Dia kely ny herinao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Vonjeo izay entina hovonoina, Ary enga anie ka mba harovanao izay mangozohozo efa ho mby eo am-pamonoana! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Raha hoy ianao: Tsia, tsy mahalala izany'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: io'
    marker-yv: yv-n
  - type: text
    text: ' izahay, Moa Izay mandanja ny fo tsy hihevitra izany va? Ary Izay mandinika ny fanahinao tsy hahalala izany va? Eny, hovaliany araka ny ataony avy ny olona rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Anaka, homàna tantely, fa tsara izany, Ary ny toho-tantely, fa ho mamy eo am-bavanao
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb.lanilaninao
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary aoka ho toy izany no hianaranao fahendrena ho an'ny fanahinao; Fa raha azonao izany, dia hisy hiafarana, Ka tsy ho foana ny fanantenanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Aza manotrika ao akaikin''ny tranon''ny marina ianao, ry ilay ratsy, Aza ravanao ny fonenany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa potraka im-pito ny marina, nefa tafarina ihany; Ary ny ratsy fanahy kosa solafaka, raha azom-pahoriana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ka idiran-doza'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Aza faly, raha lavo ny fahavalonao, Ary aza ravoravo ny fonao, raha tafintohina izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fandrao hitan'i Jehovah izany ka ataony ho ratsy, Ary ampialainy aminy ny fahatezerany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Aoka tsy hirehitra ny fahatezeranao noho ny amin''ny mpanao ratsy, Ary aza mialona ny ratsy fanahy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fa tsy hisy fanantenana
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. farany
    marker-yv: yv-n
  - type: text
    text: ' ho an''ny ratsy; Eny, ho faty ny jiron''ny ratsy fanahy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Anaka, matahora an'i Jehovah sy ny mpanjaka; Ary aza mikambana amin'izay miovaova
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: hafa saina noho izany'
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Fa ho tampoka no hitrangan'izay hanjo ireny; Ary iza no mahalala izay loza hiseho amin'ny androny
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. taonany
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Izao koa no tenin''ny hendry: Tsy mety raha mizaha tavan''olona amin''ny fitsarana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izay manao amin''ny meloka hoe: Marina ianao, Dia hozonin''ny olona sady ho halan''ny firenena; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa izay mitsara marina kosa no hahita soa sy hahazo fitahiana tsara. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Izay mahavoa tsara amin'ny famaliana dia manoroka ny molotra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Amboary ny asanao any ivelany, Ary ataovy lavorary ny any an-tsaha; Ka rehefa vita izany, dia mahazo manao ny tranonao ianao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Aza mety ho vavolombelona foana hanameloka ny namanao; Moa hamitaka amin'ny molotrao va ianao?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Aza manao hoe: Araka izay nataony tamiko no mba hataoko aminy kosa, Hovaliako ny olona araka izay nataony.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Nandalo ny sahan''ny kamo Sy ny tanim-boaloboky ny tsy ampy saina aho; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary, indro, feno sampivato izy Sady voasaron''ny amiana, Ary nirodana ny ampiantany vatony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia nojereko ka noheveriko tsara, Eny, hitako ka nahazoako anatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Mbola hatory kely ihany, mbola ho renoka kely ihany. Mbola hanohon-tanana kely hatory; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Dia ho tonga toy ny mimaona hamely ny alahelonao, Ary ny fahantranao ho toy ny jiolahy.
