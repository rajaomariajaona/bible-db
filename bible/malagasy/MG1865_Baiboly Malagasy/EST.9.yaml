document_id: EST.9,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanendrena ny andro firavoravoana Porima, sy ny fahalehibiazan'i Mordekay
  - type: text
    content: 'Ary tamin''ny andro fahatelo ambin''ny folo tamin''ny volana faharoa ambin''ny folo (volana Adara izany), rehefa akaiky ny andro hanatanterahana ny tenin''ny mpanjaka sy ny didiny, dia ny andro izay efa nantenain''ny fahavalon''ny Jiosy haharesena azy indrindra (kanjo navadika izany, ka ny Jiosy kosa no naharesy izay nankahala azy), '
  '10':
  - type: text
    content: izy folo lahy, zanak'i Hamana, zanak'i Hamedota, fahavalon'ny Jiosy, dia novonoiny koa; kanefa ny fananany tsy mba norobainy tsy akory.
  '11':
  - type: text
    content: 'Androtrizay ihany dia nambara tamin''ny mpanjaka ny isan''ny voavono tany Sosana renivohitra. '
  '12':
  - type: text
    content: 'Ary hoy ny mpanjaka tamin''i Estera, vadin''ny mpanjaka: Teto Sosana renivohitra aza ny Jiosy efa nahavono sy naharingana diman-jato lahy mbamin''izy folo lahy, zanak''i Hamana; koa nanao ahoana kosa no nataony tamin''ny isan-tokony eran''ny fanjakan''ny mpanjaka! Dia inona koa no angatahinao? Fa hatao izany. Ary inona no mbola tadiavinao? Fa homena izany. '
  '13':
  - type: text
    content: 'Dia hoy Estera: Raha sitraky ny mpanjaka, dia aoka ny Jiosy izay eto Sesana havela hanao toy ny natao androany ihany koa rahampitso, ary aoka hahantona amin''ny hazo koa izy folo lahy, zanak''i Hamana. '
  '14':
  - type: text
    content: 'Dia nasain''ny mpanjaka natao izany; ary nantsoina tany Sosana ny teny, ka dia nahantona izy folo lahy, zanak''i Hamana. '
  '15':
  - type: text
    content: 'Dia nivory indray ny Jiosy izay tany Sosana tamin''ny andro fahefatra ambin''ny folo tamin''ny volana Adara ka namono olona telon-jato lahy tany Sosana; kanefa ny fananany tsy mba norobainy tsy akory. '
  '16':
  - type: text
    content: 'Ary ny Jiosy sasany isan-tokony tamin''ny fanjakan''ny mpanjaka dia nivory hiaro ny ainy, ka afaka tamin''ny fahavalony izy, ary dimy arivo amby fito alina no matiny (kanefa ny fananany tsy mba norobainy) '
  '17':
  - type: text
    content: 'tamin''ny andro fahatelo ambin''ny folo tamin''ny volana Adara; ary nitsahatra izy tamin''ny andro fahefatra ambin''ny folo, ka nataony ho andro fanasana sy firavoravoana izany. '
  '18':
  - type: text
    content: 'Fa ny Jiosy izay tany Sosana kosa nivory tamin''ny andro fahatelo ambin''ny folo tamin''io ihany sy tamin''ny andro fahefatra ambin''ny folo koa; ary nitsahatra tamin''ny andro fahadimy ambin''ny folo izy, ka dia io no nataony andro fanasana sy firavoravoana. '
  '19':
  - type: text
    content: Koa noho izany ny Jiosy tany ambanivohitra, izay nitoetra tamin'ny vohitra madinika, dia nanao ny andro fahefatra ambin'ny folo amin'ny volana Adara ho firavoravoana sy fanasana sy andro mahafaly ary fifanateran-javatra.
  '2':
  - type: text
    content: 'dia nivory tany an-tanànany avy ny Jiosy, tany amin''ny isan-tokony eran''ny fanjakan''i Ahasoerosy mpanjaka, mba hamely izay nividy hanisy ratsy azy; ary tsy nisy olona nahajanona teo anoloany, fa efa nahazo ny olona rehetra ny fahatahorana azy. '
  '20':
  - type: text
    content: 'Ary Mordekay nanoratra ny amin''izany zavatra izany sady nampitondra taratasy ho any amin''ny Jiosy rehetra izay tany amin''ny isan-tokony eran''ny fanjakan''i Ahasoerosy mpanjaka, na ny akaiky na ny lavitra, '
  '21':
  - type: text
    content: 'mba hampitandrina azy ny andro fahefatra ambin''ny folo sy ny fahadimy ambin''ny folo amin''ny volana Adara isan-taona, '
  '22':
  - type: text
    content: dia araka ny andro nahafahan'ny Jiosy tamin'ny fahavalony, sy ny volana izay nampodiana ny alahelony ho fifaliana ary ny fitomaniany ho andro mahafaly, mba hatao ho andro fanasana sy fifaliana sy fifanateran-javatra ary fanomezan-javatra ho an'ny mahantra izany.
  '23':
  - type: text
    content: 'Ary ny Jiosy nanaiky hanao araka izay vao nataony, dia araka izay efa nosoratan''i Mordekay taminy, '
  '24':
  - type: text
    content: 'satria Hamana, zanak''i Hamedota Agagita, fahavalon''ny Jiosy rehetra, efa nihevitra handringana ny Jiosy ka efa nanao pora (filokana izany) handreseny sy handringanany azy; '
  '25':
  - type: text
    content: 'fa raha nankeo anatrehan''ny mpanjaka izany, dia nampanoratra taratasy handidy mba hatsingerina ho eo amin''ny lohany ihany ny hevi-dratsy nokasain''i Hamana hatao amin''ny Jiosy, ary mba hahantona amin''ny hazo izy sy ny zananilahy. '
  '26':
  - type: text
    content: Izany no nanaovana ireo andro ireo hoe Porima, dia araka ny anarana hoe Pora
  - type: note
    content: Pora = Filokana
  - type: text
    content: '. Ary araka ny teny rehetra tamin''izany taratasy izany sy izay hitany ny amin''izany zavatra efa nanjo azy izany '
  '27':
  - type: text
    content: 'dia nanao lalàna tsy azo ovana ny Jiosy ka nanaiky fa izy sy ny taranany ary izay rehetra miray aminy dia hitandrina izany andro roa izany araka ny voasoratra sy araka ny fotoany isan-taona; '
  '28':
  - type: text
    content: 'ary mba hotsarovana sy hotandremana ireo andro ireo amin''ny taranany rehetra sy ny fokony rehetra sy ny isan-tokony eran''ny fanjakana rehetra sy amin''ny isan-tanàna; ary mba tsy ho tapaka amin''ny Jiosy ireo andro Porima ireo, ka tsy hitsahatra ny fahatsiarovana izany amin''ny taranany. '
  '29':
  - type: text
    content: 'Ary Estera, vadin''ny mpanjaka, sady zanakavavin''i Abihaila sy Mordekay Jiosy, dia nanoratra tamin''ny fahefana rehetra hanamafy izany taratasy faharoa milaza ny Porima izany. '
  '3':
  - type: text
    content: 'Ary ny mpanapaka rehetra isan-tokony tamin''ny fanjakana sy ny solo-mpanjaka sy ny governora mbamin''ny mpanao raharahan''ny mpanjaka dia nanampy ny Jiosy, satria azon''ny fahatahorana an''i Mordekay izy. '
  '30':
  - type: text
    content: 'Ary nampitondra taratasy ho any amin''ny Jiosy rehetra izy dia ho any amin''ny toko fito amby roa-polo amby zato amin''ny fanjakan''i Ahasoerosy, manao teny fiadanana sy fahamarinana, '
  '31':
  - type: text
    content: 'mba hampitandrina azy Ireo andro Porima ireo amin''ny fotoany, araka izay nandidian''i Mordekay Jiosy sy Estera, vadin''ny mpanjaka. azy sy araka izay efa nekeny ho an''ny tenany sy ny taranany koa ny amin''ny fifadian-kaniny sy ny fitarainany. '
  '32':
  - type: text
    content: Ary ny tenin'i Estera dia nanamafy izany teny milaza ny Porima izany; ary voasoratra tao amin'ny boky izany.
  '4':
  - type: text
    content: 'Fa Mordekay dia lehibe tao an-tranon''ny mpanjaka, ary ny lazany niely tany amin''ny isan-tokony eran''ny fanjakana; fa nitombo sy nisandratra ihany io lehilahy Mordekay io. '
  '5':
  - type: text
    content: 'Ary nasian''ny Jiosy ny fahavalony rehetra ka nokapainy sabatra sy novonoiny ary naringany, fa nahazo nanao araka izay sitraky ny fony tamin''izay nankahala azy izy. '
  '6':
  - type: text
    content: 'Ary tany Sosana renivohitra aza ny Jiosy dia nahavono sy naharingana diman-jato lahy; '
  '7':
  - type: text
    content: 'ary Parsandata sy Dalfona sy Aspata '
  '8':
  - type: text
    content: 'sy Porata sy Adalia sy Aridata '
  '9':
  - type: text
    content: 'sy Parmasta sy Arisay sy Ariday ary Vaizata, '
