document_id: REV.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny niarovana ny Isiraely marina mba tsy hosimban'ny loza ho avy, sy ny fahasambaran'ny tonga any an-danitra ka afaka amin'ny fahoriana lehibe
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa afaka izany, dia hitako fa, indreo, nisy anjely efatra nitsangana teo amin''ny vazan-tany efatra, nihazona ny rivotra efatra amin''ny tany, mba tsy nisy rivotra hitsoka amin''ny tany, na amin''ny ranomasina, na amin''ny hazo akory aza. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hitako fa, indro, nisy anjely hafa koa niakatra avy tany amin''ny fiposahan''ny masoandro, nanana ny fanombohan-kasen''Andriamanitra velona; ary iry niantso ny anjely efatra izay navela hanimba ny tany sy ny ranomasina tamin''ny feo mahery nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Aza manimba ny tany, na ny ranomasina, na ny hazo, mandra-panisinay tombo-kase eo anin''ny handrin''ny mpanompon''Andriamanitsika. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nahare ny isan''izay voaisy tombo-kase aho: efatra arivo amby efatra alina amby iray hetsy no voaisy tombo-kase avy tamin''ny firenen''ny Zanak''isiraely rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Avy tamin''ny firenen''i Joda roa arivo amby iray alina no voaisy tombo-kase. Avy tamin''ny firenen''i Robena roa arivo amby iray alina. Avy tamin''ny firenen''i Gada roa arivo amby iray alina. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Avy tamin''ny firenen''i Asera roa arivo amby iray alina. Avy tamin''ny firenen''i Naftaly roa arivo amby iray alina. Avy tamin''ny firenen''i Manase roa arivo amby iray alina. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Avy tamin''ny firenen''i Simeona roa arivo amby iray alina. Avy tamin''ny firenen''i Levy roa arivo amby iray alina. Avy tamin''ny firenen''Isakara roa arivo amby iray alina. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Avy tamin''ny firenen''i Zebolona roa arivo amby iray alina. Avy tamin''ny firenen''i Josefa roa arivo amby iray alina. Avy tamin''ny firenen''i Benjamina roa arivo amby iray alina no voaisy tombo-kase. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Rehefa afaka izany dia hitako fa, indreo, nisy olona betsaka tsy tambo isaina avy tamin''ny firenena rehetra sy ny fokom-pirenena sy ny olona ary ny samy hafa fiteny nitsangana teo anoloan''ny seza fiandrianana sy teo anatrehan''ny Zanak''ondry, niakanjo akanjo fotsy lava sady nitana sampan-drofia teny an-tànany, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'dia niantso tamin''ny feo mahery izy nanao hoe: Ny famonjena anie ho an''Andriamanitsika, Izay mipetraka eo ambonin''ny seza fiandrianana, sy ho an''ny Zanak''ondry. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary ny anjely rehetra nitsangana manodidina ny seza fiandrianana mbamin'ny loholona
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. presbytera
    marker-yv: yv-n
  - type: text
    text: ' sy ny zava-manan''aina efatra, dia niankohoka teo anoloan''ny seza fiandrianana izy ka nivavaka tamin''Andriamanitra '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'nanao hoe: Amena! Ny saotra sy ny voninahitra sy ny fahendrena sy ny fisaorana sy ny haja sy ny hery ary ny faherezana anie Ho an''Andriamanitsika mandrakizay mandrakizay. Amena.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary ny anankiray tamin'ny loholona
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. presbytera
    marker-yv: yv-n
  - type: text
    text: ' namaly ka nanao tamiko hoe: Iza moa ireo miakanjo akanjo fotsy lava? Ary avy taiza izy? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa hoy iraho taminy: Tompoko, ianao no mahalala. Dia hoy iry tamiko: Ireo no avy tamin''ny fahoriana lehibe, ary ny akanjony nosasany sy nofotsiany tamin''ny ran''ny Zanak''ondry. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary noho izany ny akanjony nosasany sy mitoetra eo anoloan''ny seza fiandrianan''Andriamanitra izy ka manompo Azy andro aman''alina eo amin''ny tempoliny; ary Ilay mipetraka eo ambonin''ny seza fiandrianana dia hamelatra ny trano-lainy handrakotra ary. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tsy ho noana na hangetaheta intsony ireo; ary tsy haninona azy ny masoandro na izay hafanana akory. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa ny Zanak'ondry Izay eo afovoan'ny seza fiandrianana no ho Mpiandry azy ka hitondra azy ho amin'ny loharanon'ny ranon'aina; ary hofafan'Andriamanitra ny ranomaso rehetra amin'ny masony (Isa. 25. 8).
