document_id: EZK.29,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny babo azon'i Nebokadnezara tany Egypta ho karaman'ny miaramilany noho ny fahasasarany tany Tyro
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tamin''ny andro faharoa ambin''ny folo tamin''ny volana fahafolo tamin''ny taona fahafolo dia tonga tamiko ny tenin''i Jehovah nanao hoe: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dia, indro, avy hamely anao sy ny Neilinao Aho, ary ny tany Egypta hataoko lao tokoa, eny, sady ho lao no ho rava, hatrany Migdola ka hatrany Syena, dia hatramin''ny sisin''i Etiopia. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tsy hodiavin-tongotr''olona ny tany, ary ny tongo-biby aza tsy handia azy, sady tsy honenana efa-polo taona izy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ary hataoko tany rava dia rava
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. rava ao amin'ny tany rava
      marker-yv: yv-n
    - type: text
      text: ' ny tany Egypta, ary ho lao dia ho lao'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. lao amin'ny tanàna lao
      marker-yv: yv-n
    - type: text
      text: ' efa-polo taona ny tanànany; Eny, haeliko ho any amin''ny firenena samy hafa ny Egyptiana, ary hahahako any amin''ny tany samy hafa.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Fa izao no lazain''i Jehovah Tompo: Rehefa afaka efa-polo taona, dia hangoniko avy any amin''ny firenena izay nielezany ny Egyptiana: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary haveriko avy amin''ny fahababoany izy, ka hampodiko any amin''ny tany Patrosa, tany nihaviany, izy; Ary ho fanjakana ambany Egypta; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Eny, ho ambany noho ny fanjakana hafa izy ka tsy hisandratra ambonin''ny firenena hafa intsony; Fa hohakeleziko izy ka tsy hampanompo ny firenena intsony. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Dia tsy ho tokin'ny taranak'Isiraely intsony izy ho fampahatsiarovana ny helony amin'ny andehanan'ireo hanaraka azy; Ka dia ho fantatra fa Izaho no Jehovah Tompo.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary tamin''ny andro voalohany tamin''ny volana voalohany tamin''ny taona fahafito amby roa-polo dia tonga tamiko ny tenin''i Jehovah nanao hoe: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ry zanak''olona, mafy ny fanompoana izay nampanaovin''i Nebokadnezara, mpanjakan''1 Babylona, ny miaramilany tamin''ny namelezany an''i Tyro, ka efa samy tonga sola avokoa ny lohany, sady niendaka ny sorony, nefa tsy nahazo karama avy tany Tyro izy sy ny miaramilany noho ny fanompoana izay nataony tamin''ny namelezany azy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Koa izao no lazain''i Jehovah Tompo: Indro, homeko an''i Nebokadnezara, mpanjakan''i Babylona, ny tany Egypta, dia halainy ny hareny, ary hobaboiny izay hita ao, ka hataony sambotra izay azo ao, koa izany no ho karaman''ny miaramilany. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ry zanak''olona, manandrifia an''i Farao, mpanjakan''i Egypta, ka maminania ny hamelezana azy mbamin''i Egypta rehetra. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ho valin''ny fanompoana nataony tany Tyro no nanomezako azy ny tany Egypta, satria nataony ho Ahy izany, hoy Jehovah Tompo. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Amin'izany andro izany dia hampitsimoka tandroka ho an'ny taranak'Isiraely Aho, ary hampiloahiko vava eo aminy ianao; ka dia ho fantatra fa Izaho no Jehovah.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Mitenena, ka ataovy hoe: Izao no lazain''i Jehovah Tompo: Indro, avy hamely anao Aho, ry Farao, mpanjakan''i Egypta, ilay dragona'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: mamba'
      marker-yv: yv-n
    - type: text
      text: ' makadiry mamitsaka ao amin''ny Neiliny, dia ilay efa nanao hoe: Ahy ny Neiliko, fa izaho no namorona azy ho an''ny tenako. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary hasiako farango ny valanoranonao, sady hampiraiketiko amin''ny kiranao ny hazandrano ao amin''ny Neilinao, dia hampiakariko avy eo afovoan''ny Neilinao ianao, ary ny hazandrano rehetra amin''ny Neilinao dia hiraikitra amin''ny kiranao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary hariako any an-efitra ianao, dia ianao sy ny hazandrano rehetra avy amin''ny Neilinao; hitsitsitra eny an-tanety ianao ka tsy hovorina na hangonina; Efa nomeko hohanin''ny bibi-dia sy ny voro-manidina ianao. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'dia ho fantatry ny mponina rehetra any Egypta fa Izaho no Jehovah, satria efa tehina volotara ho an''ny taranak''Isiraely izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '(Nony mandray anao amin''ny tànany izy, dia folaka ianao, ka voatsindronao ny helik''izy rehetra; Ary nony mitehina aminao izy, dia tapaka ianao ka mampilefidefitra ny valahan''izy rehetra.) '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia izao no lazain''i Jehovah Tompo: Indro, hahatonga sabatra hamely anao Aho, ka hofongorako tsy ho aminao ny olona sy ny biby. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary ny tany Egypta ho rava sy lao; Ka dia ho fantatra fa Izaho no Jehovah. Satria hoy izy: Ahy Neily, ary izaho no nanao azy, '
