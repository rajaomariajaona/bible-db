document_id: 2JN.1,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Anatra ny amin'ny faharetana amin'ny marina, sy ny tsy handraisana ny mpampianatra sandoka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Izaho loholona
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. Ny presbytera
      marker-yv: yv-n
    - type: text
      text: ' mamangy an''itompokovavy'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: an''i Kyria'
      marker-yv: yv-n
    - type: text
      text: ' voafidy sy ny zanany, izay tiako amin''ny fahamarinana (ary tsy izaho ihany, fa izay rehetra mahalala ny marina koa) '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Raha misy olona mankeo aminareo ka tsy mitondra izao fampianarana izao, aza mampiantrano azy na miarahaba azy akory; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'fa izay miarahaba azy dia miombona amin''ny ratsy ataony. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Manana zavatra maro hosoratana aminareo aho, nefa tsy tiako hatao amin''ny taratasy sy ny ranomainty izany; fa manantena ho tonga atỳ aminareo aho ka hiteny mifanatrika, mba ho tanteraka ny fifalianareo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ny zanaky ny rahavavinao voafidy manao veloma anao.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'noho ny fahamarinana izay mitoetra ato anatintsika sady ho ato amintsika mandrakizay: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ho amintsika ny fahasoavana sy ny famindram-po ary ny fiadanana avy amin'Andriamanitra Ray sy Jesosy Kristy, Zanaky ny Ray, amin'ny fahamarinana sy ny fitiavana.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Faly indrindra aho, satria misy hitako ny zanakao sasany mandeha amin''ny fahamarinana araka ny nandraisantsika didy tamin''ny Ray. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ary mangataka aminao aho ankehitriny, tompokovavy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ry Kyria'
      marker-yv: yv-n
    - type: text
      text: ', tsy toy ny manoratra didy vaovao aminao, fa ilay nananantsika hatramin''ny voalohany ihany, dia aoka hifankatia isika. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ary izao no fitiavana, dia ny handehanantsika araka ny didiny. Izany no didy, tahaka ny efa renareo hatramin''ny taloha ihany, dia ny handehananareo aminy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Fa maro ny mpamitaka efa lasa any amin''izao tontolo izao, dia ireny tsy manaiky fa efa tonga tamin''ny nofo Jesosy Kristy. Izy no mpamitaka sy antikristy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mitandrema ianareo, fandrao mahavery izay namonoanay tena, fa mba handraisanareo valim-pitia tanteraka. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Izay rehetra mitarika nefa tsy mitoetra ao amin''ny fampianaran''i Kristy, dia tsy manana an Andriamanitra. Izay mitoetra ao amin''ny fampianarana, dia izy no manana ny Ray sy ny Zanaka. '
