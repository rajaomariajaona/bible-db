document_id: PRO.2,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny soa hitan'izay mandray ny fahendrena
  - type: text
    content: 'Anaka, raha raisinao ny teniko, Ary raketinao ao am-ponao ny didiko, '
  '10':
  - type: text
    content: Raha latsaka ao am-ponao ny fahendrena, Ary
  - type: note
    content: 'Na: Fa ho tafiditra ao am-ponao ny fahendrena, Ka ho'
  - type: text
    content: ' mamin''ny fanahinao ny fahalalana, '
  '11':
  - type: text
    content: Dia hiaro anao ny fisainana mazava, Ary hiambina anao ny fahalalana,
  '12':
  - type: text
    content: 'Ka hamonjy anao amin''ny lalan-dratsy Sy amin''ny lehilahy izay miteny fitaka, '
  '13':
  - type: text
    content: 'Izay mahafoy ny lalan''ny fahamarinana Mba hizorany amin''ny lalan''ny fahamaizinana, '
  '14':
  - type: text
    content: 'Dia izay faly hanao ratsy Sy finaritra amin''ny fitaky ny ratsy, '
  '15':
  - type: text
    content: Dia izay melo-dalana Sy maniasia amin'ny alehany;
  '16':
  - type: text
    content: Ary hamonjy anao amin'ny vehivavy jejo
  - type: note
    content: Heb. vehivavy tsy vadinao
  - type: text
    content: ' koa izany, Dia amin''ny vahiny janga izay mandrobo amin''ny teniny, '
  '17':
  - type: text
    content: Izay mahafoy ny vadin
  - type: note
    content: Heb. sakaizan'
  - type: text
    content: '''ny fahatanorany Sy manadino ny fanekeny teo amin''Andriamaniny. '
  '18':
  - type: text
    content: 'Fa ny tranony milentika ho amin''ny fahafatesana, Ary ny alehany mankany amin''ny maty. '
  '19':
  - type: text
    content: 'Tsy misy afa-miverina izay mankany aminy, Na mihazo amin''ny lalan''aina, '
  '2':
  - type: text
    content: 'Ka atongilanao amin''ny fahendrena ny sofinao, Ary ampitandremanao fahalalana ny fonao; '
  '20':
  - type: text
    content: 'Handehananao amin''ny lalan''ny tsara fanahy Sy hitandremanao ny alehan''ny marina. '
  '21':
  - type: text
    content: 'Fa ny olona mahitsy no honina amin''ny tany, Ary ny tsy manan-tsiny ihany no ho sisa mitoetra ao; '
  '22':
  - type: text
    content: Fa ny ratsy fanahy kosa hofongorana amin'ny tany, Ary ny mpivadika hongotana.
  '3':
  - type: text
    content: 'Eny, raha miantso ny fahalalana ianao Ary manandratra ny feonao hahazo saina, '
  '4':
  - type: text
    content: 'Raha mitady azy toy ny fitady volafotsy ianao Ary mikatsaka azy toy ny fikatsaka harena afenina: '
  '5':
  - type: text
    content: 'Dia ho fantatrao marina ny fahatahorana an''i Jehovah, Ary ho hitanao ny fahalalana an''Andriamanitra. '
  '6':
  - type: text
    content: 'Fa Jehovah no manome fahendrena; Avy amin''ny vavany no ihavian''ny fahalalana sy ny fahazavan-tsaina. '
  '7':
  - type: text
    content: Izy mitahiry fanambinana
  - type: note
    content: 'Na: tena fahendrena'
  - type: text
    content: ' ho an''ny mahitsy Sady ampingan''izay mandeha tsy misy tsiny; '
  '8':
  - type: text
    content: 'Ka dia mitandrina ny lalan''ny fahamarinana Izy Ary miambina ny lalan''ny olony masina. '
  '9':
  - type: text
    content: 'Ary amin''izay dia ho fantatrao ny fahamarinana sy ny rariny Ary ny hitsiny, dia ny lalana tsara rehetra. '
