document_id: PRO.2,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny soa hitan'izay mandray ny fahendrena
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Anaka, raha raisinao ny teniko, Ary raketinao ao am-ponao ny didiko, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Raha latsaka ao am-ponao ny fahendrena, Ary
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Fa ho tafiditra ao am-ponao ny fahendrena, Ka ho'
      marker-yv: yv-n
    - type: text
      text: ' mamin''ny fanahinao ny fahalalana, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Dia hiaro anao ny fisainana mazava, Ary hiambina anao ny fahalalana,
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ka hamonjy anao amin''ny lalan-dratsy Sy amin''ny lehilahy izay miteny fitaka, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Izay mahafoy ny lalan''ny fahamarinana Mba hizorany amin''ny lalan''ny fahamaizinana, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Dia izay faly hanao ratsy Sy finaritra amin''ny fitaky ny ratsy, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Dia izay melo-dalana Sy maniasia amin'ny alehany;
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ary hamonjy anao amin'ny vehivavy jejo
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. vehivavy tsy vadinao
      marker-yv: yv-n
    - type: text
      text: ' koa izany, Dia amin''ny vahiny janga izay mandrobo amin''ny teniny, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Izay mahafoy ny vadin
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. sakaizan'
      marker-yv: yv-n
    - type: text
      text: '''ny fahatanorany Sy manadino ny fanekeny teo amin''Andriamaniny. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Fa ny tranony milentika ho amin''ny fahafatesana, Ary ny alehany mankany amin''ny maty. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tsy misy afa-miverina izay mankany aminy, Na mihazo amin''ny lalan''aina, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ka atongilanao amin''ny fahendrena ny sofinao, Ary ampitandremanao fahalalana ny fonao; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Handehananao amin''ny lalan''ny tsara fanahy Sy hitandremanao ny alehan''ny marina. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fa ny olona mahitsy no honina amin''ny tany, Ary ny tsy manan-tsiny ihany no ho sisa mitoetra ao; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Fa ny ratsy fanahy kosa hofongorana amin'ny tany, Ary ny mpivadika hongotana.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Eny, raha miantso ny fahalalana ianao Ary manandratra ny feonao hahazo saina, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Raha mitady azy toy ny fitady volafotsy ianao Ary mikatsaka azy toy ny fikatsaka harena afenina: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia ho fantatrao marina ny fahatahorana an''i Jehovah, Ary ho hitanao ny fahalalana an''Andriamanitra. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa Jehovah no manome fahendrena; Avy amin''ny vavany no ihavian''ny fahalalana sy ny fahazavan-tsaina. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Izy mitahiry fanambinana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: tena fahendrena'
      marker-yv: yv-n
    - type: text
      text: ' ho an''ny mahitsy Sady ampingan''izay mandeha tsy misy tsiny; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ka dia mitandrina ny lalan''ny fahamarinana Izy Ary miambina ny lalan''ny olony masina. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary amin''izay dia ho fantatrao ny fahamarinana sy ny rariny Ary ny hitsiny, dia ny lalana tsara rehetra. '
