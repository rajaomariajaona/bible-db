document_id: MAT.9,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary niondrana an-tsambokely Izy, dia nita ka tonga tao an-tanànany. '
  '10':
  - type: text
    content: 'Ary raha nipetraka nihinana tao an-trano Izy, indreo, nisy mpanota sy mpamory hetra maro tonga ka niara-nipetraka tamin''i Jesosy mbamin''ny mpianany. '
  '11':
  - type: text
    content: 'Ary ny Fariseo, raha nahita izany, dia niteny tamin''ny mpianatra hoe: Nahoana kosa ny Mpampianatra anareo no miara-komana amin''ny mpamory hetra sy ny mpanota? '
  '12':
  - type: text
    content: 'Ary raha nahare izany Jesosy, dia nanao hoe: Tsy ny finaritra no mila mpanao fanafody, fa ny marary. '
  '13':
  - type: text
    content: 'Fa mandehana ka mianara izay hevitry ny teny hoe: Famindram-po no sitrako, fa tsy fanatitra alatsa-drà (Hos 6:6); fa tsy tonga hiantso ny marina Aho, fa ny mpanota. '
  '14':
  - type: text
    content: 'Dia nankany amin''i Jesosy ny mpianatr''i Jaona ka nanao hoe: Nahoana izahay sy ny Fariseo no mifady hanina matetika, fa ny mpianatrao kosa tsy mba mifady? '
  '15':
  - type: text
    content: 'Ary hoy Jesosy taminy: Moa mahay misaona va ny havan''ny mpampakatra, raha mbola ao aminy ihany ny mpampakatra? fa ho avy ny andro izay hanesorana ny mpampakatra hiala aminy, dia amin''izay vao hifady izy. '
  '16':
  - type: text
    content: 'Ary tsy misy olona manampina lamba tonta amin''ny tapa-damba tsy mbola voalòna; fa ny vaovao izay natampina dia handrovitra ny lamba, ka hitatra ny triatra. '
  '17':
  - type: text
    content: 'Ary tsy misy manisy divay vaovao ao anaty siny hoditra tonta; raha izany, dia ho triatra ny siny hoditra, ka ho raraka ny divay, sady ho simba ny siny hoditra; fa ny siny hoditra vaovao no asian''ny olona divay vaovao, dia miara-maharitra izy roroa. '
  '18':
  - type: text
    content: 'Raha mbola nilaza izany taminy Izy, indro, tonga ny mpanapaka anankiray, dia niankohoka teo anatrehany ka nanao hoe: Maty ankehitriny izao ny zanako-vavy; fa andeha re, mametraha ny tananao aminy, dia ho velona izy. '
  '19':
  - type: text
    content: 'Dia nitsangana nanaraka azy Jesosy mbamin''ny mpianany. '
  '2':
  - type: text
    content: 'Ary, indro, nisy lehilahy anankiray mararin''ny paralysisa nandry tamin''ny fandriana nentin''ny olona teo aminy; ary Jesosy, nony nahita ny finoan''ireo, dia nanao tamin''ilay mararin''ny paralysisa hoe: Matokia, anaka; voavela ny helokao.'
  '20':
  - type: text
    content: Ary, indro, nisy vehivavy anankiray, izay efa narary
  - type: note
    content: Gr. narary nandeha rà
  - type: text
    content: ' roa ambin''ny folo taona, nankeo ivohony ka nanendry ny somotraviavin-dambany. '
  '21':
  - type: text
    content: 'Fa hoy izy anakampony: Na dia ny lambany ihany aza no ho voatendriko, dia ho sitrana'
  - type: note
    content: 'Na: voavonjy'
  - type: text
    content: ' aho. '
  '22':
  - type: text
    content: 'Ary Jesosy nihodina ka nahita azy, dia nanao hoe: Matokia, ry zanako-vavy, ny finoanao no efa nahasitrana'
  - type: note
    content: 'Na: namonjy'
  - type: text
    content: ' anao. Dia sitrana'
  - type: note
    content: 'Na: voavonjy'
  - type: text
    content: ' ilay vehivavy tamin''izay ora izay. '
  '23':
  - type: text
    content: 'Ary Jesosy, nony niditra tao an-tranon''ilay mpanapaka ka nahita ny mpitsoka sodina sy ny vahoaka nitabataba, '
  '24':
  - type: text
    content: 'dia nanao hoe: Mivoaha; fa tsy maty razazavavy, fa matory. Dia nihomehy Azy fatratra ny olona. '
  '25':
  - type: text
    content: 'Ary nony efa navoaka ny olona, dia niditra Jesosy ka nandray ny tànan-drazazavavy, dia nitsangana izy. '
  '26':
  - type: text
    content: 'Ary ny lazan''izany dia niely tamin''izany tany rehetra izany. '
  '27':
  - type: text
    content: 'Ary nony niala teo Jesosy, dia nisy jamba roa lahy nanaraka Azy sady niantsoantso hoe: Mamindrà fo aminay, ry Zanak''i Davida ô! '
  '28':
  - type: text
    content: 'Ary rehefa niditra tao an-trano Izy, dia nanatona Azy ireo jamba; ary hoy Jesosy taminy: Mino va ianareo fa mahay manao izany Aho? Hoy izy taminy: Eny, Tompoko. '
  '29':
  - type: text
    content: 'Dia nanendry ny masony Izy ka nanao hoe: Tongava aminareo araka ny finoanareo. '
  '3':
  - type: text
    content: 'Ary, indreo, ny mpanora-dalàna sasany nanao anakampo hoe: Miteny ratsy'
  - type: note
    content: Gr. manao blasfemia, dia miteny ratsy, indrindra fa ny amin'Andriamanitra, na mihambo hanana izay fomban'Andriamanitra
  - type: text
    content: ' ity Lehilahy ity. '
  '30':
  - type: text
    content: 'Dia nahiratra ny masony; ary Jesosy namepetra azy mafy ka nanao hoe: Tandremo mba tsy ho fantatr''olona izao. '
  '31':
  - type: text
    content: Kanjo nony niala teo izy roa lahy, dia nampiely ny lazany tamin'izany tany rehetra izany.
  '32':
  - type: text
    content: 'Ary rehefa nivoaka ireo, dia indro, nisy lehilahy moana anankiray izay demoniaka nentin''ny olona tany amin''i Jesosy. '
  '33':
  - type: text
    content: 'Ary rehefa navoaka ny demonia, dia niteny ilay moana; ary gaga ny vahoaka ka nanao hoe: Tsy mbola nisy niseho toy izao tamin''ny Isiraely. '
  '34':
  - type: text
    content: 'Fa ny Fariseo kosa nanao hoe: Ny lohan''ny demonia no amoahany ny demonia.'
  '35':
  - type: text
    content: Ary Jesosy nandeha nitety ny tanàna rehetra sy ny vohitra, nampianatra tao amin'ny synagoga sy nitory ny filazantsaran'ny fanjakana ary nahasitrana ny aretina rehetra mbamin'ny rofy rehetra.
  '36':
  - type: text
    content: 'Ary nony nahita ny vahoaka Jesosy, dia nahonena Azy ny fijeriny ireo, satria nampahantraina ireo ka nafoy toy ny ondry tsy misy mpiandry. '
  '37':
  - type: text
    content: 'Dia hoy Izy tamin''ny mpianany: '
  '38':
  - type: text
    content: Be ny vokatra, fa ny mpiasa no vitsy; koa amin'izany mangataha amin'ny Tompon'ny vokatra mba hampandehanany mpiasa hamory ny vokatra.
  '4':
  - type: text
    content: 'Fa Jesosy nahafantatra ny eritreriny, dia nanao hoe: Nahoana ianareo no mieritreri-dratsy ao am-ponareo? '
  '5':
  - type: text
    content: 'Fa iza moa no moramora kokoa, ny manao hoe va: Voavela ny helokao, sa ny manao hoe: Mitsangàna, ka mandehana? '
  '6':
  - type: text
    content: 'Fa mba ho fantatrareo fa ny Zanak''olona manana fahefana eto ambonin''ny tany hamela heloka (dia hoy Izy tamin''ilay mararin''ny paralysisa): Mitsangàna, betao ny fandrianao, ka modia any an-tranonao. '
  '7':
  - type: text
    content: 'Dia nitsangana izy ka lasa nody tany an-tranony. '
  '8':
  - type: text
    content: 'Ary ny vahoaka, raha nahita izany, dia raiki-tahotra ka nankalaza an''Andriamanitra, Izay nanome ny olona fahefana toy izany. '
  '9':
  - type: text
    content: Ary nony niala teo Jesosy, dia nahita lehilahy atao hoe Matio nipetraka teo am-pamorian-ketra
  - type: note
    content: Dia ny hetra sy ny fadin-tseranana, etc
  - type: text
    content: ', ka hoy Izy taminy; Andeha hanaraka Ahy. Dia nitsangana Matio ka nanaraka Azy. '
