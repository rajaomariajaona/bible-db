document_id: JER.20,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny fitarainana nataon'i Jeremia
  - type: text
    content: 'Ary Pasora, zanak''i Imera, mpisorona sady mpiandraikitra ny tranon''i Jehovah, raha nandre an''i Jeremia naminany izany zavatra izany, '
  '10':
  - type: text
    content: 'Fa reko ny endrikendriky ny maro, misy fampangorohoroana manodidina. Torio, eny, hotorintsika koa izy; Izay rehetra tsara fihavanana amiko dia miandry izay hahalavoako ka manao hoe: Angamba ho voataona Izy, dia horesentsika sy hovaliantsika. '
  '11':
  - type: text
    content: Kanefa Jehovah momba ahy toy ny lehilahy mahery mahatahotra, ary noho izany dia ho tafintohina ny mpanenjika ahy ka tsy haharesy; Ho menatra indrindra izy, satria tsy hendry
  - type: note
    content: 'Na: tsy ambinina'
  - type: text
    content: '. Fahamenarana mandrakizay izay tsy hohadinoina izany! '
  '12':
  - type: text
    content: 'Fa Hianao, Jehovah, Tompon''ny maro ô, Izay mamantatra ny marina ka mizaha toetra ny voa sy ny fo ho hitako ny famalianao azy, fa aminao no efa nanankinako ny adiko. '
  '13':
  - type: text
    content: 'Mihirà ho an''i Jehovah, miderà an''i Jehovah; Fa Izy namonjy ny fanahin''ny malahelo tamin''ny tanan''ny mpanao ratsy. '
  '14':
  - type: text
    content: 'Ho voaozona anie ny andro izay nahaterahako! Aoka tsy hotahina anie ny andro izay niterahan''ineny ahy! '
  '15':
  - type: text
    content: 'Ho voaozona anie ny olona izay nitondra teny mahafaly tamin''ikaky nanao hoe: Tera-dahy ianao! Ka nahafaly azy indrindra. '
  '16':
  - type: text
    content: 'Aoka Izany lehilahy izany ho toy ny tanàna izay noravan''i Jehovah ka tsy nanenenany; Ary aoka izy handre fitarainana nony maraina sy akoralava nony mitataovovonana, '
  '17':
  - type: text
    content: 'Satria tsy nahafaty ahy tany an-kibo izy, hahatonga an''Ineny ho fasako, ka hivesatra ahy mandrakariva ny kibony. '
  '18':
  - type: text
    content: Nahoana re aho no nivoaka avy tany an-kibo mba hahita fahoriana sy alahelo, ka ho lany aman-kenatra ny androko!
  '2':
  - type: text
    content: 'dia namely an''i Jeremia mpaminany sady namatotra azy tamin''ny boloky hazo izay teo am-bavahadin''i Benjamina, dia ilay eo ambony, eo anilan''ny tranon''i Jehovah. '
  '3':
  - type: text
    content: 'Ary nony ampitso, dia nesorin''i Pasora tamin''ny boloky hazo Jeremia. Dia hoy Jeremia taminy: Tsy nataon''i Jehovah hoe Pasora'
  - type: note
    content: Pasora = fiadanana manodidina(?)
  - type: text
    content: ' ny anaranao, fa Magora-misabiba'
  - type: note
    content: Magora-misabiba = Fampangorohoroana manodidina
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Fa izao no lazain''i Jehovah: Indro, hataoko fampangorohoroana ho an''ny tenanao sy ny sakaizanao rehetra ianao, ary ho lavon''ny sabatry ny fahavalony ireo, dia ho hitan''ny masonao izany; ary ny Joda rehetra hatolotro eo an-tànan''ny mpanjakan''i Babylona, dia ho entiny ho babo any Babylona izy ka hovonoiny amin''ny sabatra. '
  '5':
  - type: text
    content: 'Ary ny harena rehetra amin''ity tanàna ity sy ny vokatry ny fisasarany rehetra sy ny zava-tsoany rehetra ary ny rakitry ny mpanjakan''ny Joda rehetra dia samy hatolotro eo an-tànan''ny fahavalony, ka dia hamabo sy haka azy ireny ary hitondra azy ho any Babylona. '
  '6':
  - type: text
    content: Ary ianao, ry Pasora, sy izay rehetra mitoetra ao an-tranonao dia ho lasan-ko babo; ary ho tonga any Babylona ianao, ka any no hahafatesanao, ary any koa no handevenana anao mbamin'ny sakaizanao rehetra izay efa naminanianao lainga.
  '7':
  - type: text
    content: 'Jehovah ô, notaominao aho ka voataona; Nosamborinao aho ka resinao; Tonga fihomehezana mandritra ny andro aho; Izy rehetra dia maneso ahy. '
  '8':
  - type: text
    content: 'Fa na oviana na oviana no itenenako, dia tsy maintsy mitaraina aho, eny, miantso aho hoe: Loza sy fandravana! Fa ny tenin''i Jehovah dia atao fanakorana sy fihomehezana ahy isan''andro. '
  '9':
  - type: text
    content: 'Dia hoy izaho: Tsy hanonona Azy aho na hiteny intsony amin''ny anarany. Nefa izany dia tonga toy ny afo mirehitra ato am-poko, voahidy ato amin''ny taolako; Ary sasatra ny niaritra aho ka tsy mahazaka. '
