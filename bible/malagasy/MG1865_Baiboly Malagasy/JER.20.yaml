document_id: JER.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fitarainana nataon'i Jeremia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Pasora, zanak''i Imera, mpisorona sady mpiandraikitra ny tranon''i Jehovah, raha nandre an''i Jeremia naminany izany zavatra izany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia namely an''i Jeremia mpaminany sady namatotra azy tamin''ny boloky hazo izay teo am-bavahadin''i Benjamina, dia ilay eo ambony, eo anilan''ny tranon''i Jehovah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nony ampitso, dia nesorin''i Pasora tamin''ny boloky hazo Jeremia. Dia hoy Jeremia taminy: Tsy nataon''i Jehovah hoe Pasora'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Pasora = fiadanana manodidina(?)
    marker-yv: yv-n
  - type: text
    text: ' ny anaranao, fa Magora-misabiba'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Magora-misabiba = Fampangorohoroana manodidina
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fa izao no lazain''i Jehovah: Indro, hataoko fampangorohoroana ho an''ny tenanao sy ny sakaizanao rehetra ianao, ary ho lavon''ny sabatry ny fahavalony ireo, dia ho hitan''ny masonao izany; ary ny Joda rehetra hatolotro eo an-tànan''ny mpanjakan''i Babylona, dia ho entiny ho babo any Babylona izy ka hovonoiny amin''ny sabatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny harena rehetra amin''ity tanàna ity sy ny vokatry ny fisasarany rehetra sy ny zava-tsoany rehetra ary ny rakitry ny mpanjakan''ny Joda rehetra dia samy hatolotro eo an-tànan''ny fahavalony, ka dia hamabo sy haka azy ireny ary hitondra azy ho any Babylona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary ianao, ry Pasora, sy izay rehetra mitoetra ao an-tranonao dia ho lasan-ko babo; ary ho tonga any Babylona ianao, ka any no hahafatesanao, ary any koa no handevenana anao mbamin'ny sakaizanao rehetra izay efa naminanianao lainga.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jehovah ô, notaominao aho ka voataona; Nosamborinao aho ka resinao; Tonga fihomehezana mandritra ny andro aho; Izy rehetra dia maneso ahy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa na oviana na oviana no itenenako, dia tsy maintsy mitaraina aho, eny, miantso aho hoe: Loza sy fandravana! Fa ny tenin''i Jehovah dia atao fanakorana sy fihomehezana ahy isan''andro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dia hoy izaho: Tsy hanonona Azy aho na hiteny intsony amin''ny anarany. Nefa izany dia tonga toy ny afo mirehitra ato am-poko, voahidy ato amin''ny taolako; Ary sasatra ny niaritra aho ka tsy mahazaka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa reko ny endrikendriky ny maro, misy fampangorohoroana manodidina. Torio, eny, hotorintsika koa izy; Izay rehetra tsara fihavanana amiko dia miandry izay hahalavoako ka manao hoe: Angamba ho voataona Izy, dia horesentsika sy hovaliantsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Kanefa Jehovah momba ahy toy ny lehilahy mahery mahatahotra, ary noho izany dia ho tafintohina ny mpanenjika ahy ka tsy haharesy; Ho menatra indrindra izy, satria tsy hendry
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: tsy ambinina'
    marker-yv: yv-n
  - type: text
    text: '. Fahamenarana mandrakizay izay tsy hohadinoina izany! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa Hianao, Jehovah, Tompon''ny maro ô, Izay mamantatra ny marina ka mizaha toetra ny voa sy ny fo ho hitako ny famalianao azy, fa aminao no efa nanankinako ny adiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mihirà ho an''i Jehovah, miderà an''i Jehovah; Fa Izy namonjy ny fanahin''ny malahelo tamin''ny tanan''ny mpanao ratsy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ho voaozona anie ny andro izay nahaterahako! Aoka tsy hotahina anie ny andro izay niterahan''ineny ahy! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ho voaozona anie ny olona izay nitondra teny mahafaly tamin''ikaky nanao hoe: Tera-dahy ianao! Ka nahafaly azy indrindra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Aoka Izany lehilahy izany ho toy ny tanàna izay noravan''i Jehovah ka tsy nanenenany; Ary aoka izy handre fitarainana nony maraina sy akoralava nony mitataovovonana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Satria tsy nahafaty ahy tany an-kibo izy, hahatonga an''Ineny ho fasako, ka hivesatra ahy mandrakariva ny kibony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Nahoana re aho no nivoaka avy tany an-kibo mba hahita fahoriana sy alahelo, ka ho lany aman-kenatra ny androko!
