document_id: 2CH.3
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanaovana ny tempoly sy ny fanaka momba azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Solomona nanomboka nanao ny tranon''i Jehovah tany Jerosalema, tao an-tendrombohitra Moria, ilay nisehoan''i Jehovah tamin''i Davida rainy, dia ilay namboarina teo amin''ny fitoerana nofidin''i Davida teo amin''ny famoloan''i Araona Jebosita. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nanomboka nanao ny trano izy tamin''ny andro faharoa tamin''ny volana faharoa tamin''ny taona fahefatra nanjakany. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary toy izao no nanorenan''i Solomona ny tranon''Andriamanitra: Ny lavany, raha araka ny hakiho taloha, dia enim-polo hakiho, ary ny sakany roa-polo hakiho. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary ny amin''ny lavarangana fidirana izay teo anoloany, ny lavany dia roa-polo hakiho, dia araka ny sakan''ny trano ihany, ary ny hahavony dia roa-polo amby zato hakiho; ary nopetahany takela-bolamena tsara ny ao anatiny. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ary ny ati-trano lehibe nopetahany hazo kypreso, dia vao nopetahany takela-bolamena tsara ireo ary noravahany hazo rofia
  - type: usfm
    marker: x
    children:
    - type: text
      text: palma
    marker-yv: yv-n
  - type: text
    text: ' sy tongalika. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary noravahany vato soa koa ny trano; ary ny volamena dia volamena avy any Parvaima. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary nopetahany takela-bolamena ny trano, dia ny rairainy sy ny tokonany sy ny rindriny ary ny lela-varavarany; ary nosoratany nasiany sarin''ny kerobima ny rindrina. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nanao ny efi-trano masina indrindra izy: ny lavany dia roa-polo hakiho mifanerana amin''ny sakan''ny trano, ary roa-polo hakiho koa ny sakany; ary nopetahany takela-bolamena tsara talenta enin-jato izy '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny lanjan''ny hombo volamena dia sekely dimam-polo. Ary ny efi-trano ambony nopetahany volamena koa. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary tao amin''ny efi-trano masina indrindra dia nasiany sarin''ny kerobima roa, ary nosokiriny no nanaovany azy, dia nopetahany takela-bolamena. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ny halavan''ny elatry ny kerobima dia roa-polo hakiho: ny elatry ny anankiray dia dimy hakiho, mipaka amin''ny rindrina; ary ny elany iray koa dimy hakiho sady mifanendry amin''ny elatry ny kerobima anankiray; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ary ny elatry ny kerobima anankiray koa dia dimy hakiho, mipaka amin''ny rindrina; ary ny elany iray koa dimy hakiho sady mifanendry amin''ny elatry ny kerobima anankiray. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nivelatra ny elatr''ireo kerobima Ireo. ka roa-polo hakiho ny halavany; nijoro tamin''ny tongony, tarehiny nanatrika ny trano. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ary izy nanao ny efitra lamba tamin'ny manga sy volomparasy sy jaky sy rongony fotsy madinika; ary nataony sarin'ny kerobima ny sorany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nanao andry roa teo anoloan''ny trano izy; dimy amby telo-polo hakiho ny hahavony, ary ny kapitaly teo an-tampony dia dimy hakiho ary. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary nanao tongalika tao amin''ny efitra anatiny izy, ka nataony teo an-tampon''ny andry ireo; ary nanao sarin''apongaben-danitra zato izy, ka nataony teo amin''ny tongalika ireo. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ary ny andry natsangany teo anoloan'ny tempoly, ny iray tamin'ny ankavanana, ary ny iray tamin'ny ankavia; ary ny anaran'ny teo amin'ny ankavanana nanao ny hoe Jakina
  - type: usfm
    marker: x
    children:
    - type: text
      text: Jakina = Hampiorina izy
    marker-yv: yv-n
  - type: text
    text: ', ary ny anaran''ny teo amin''ny ankavia kosa natao hoe Boaza'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Boaza = Ao aminy no misy hery (?)
    marker-yv: yv-n
  - type: text
    text: .
