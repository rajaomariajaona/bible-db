document_id: 2CH.3,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanaovana ny tempoly sy ny fanaka momba azy
  - type: text
    content: 'Ary Solomona nanomboka nanao ny tranon''i Jehovah tany Jerosalema, tao an-tendrombohitra Moria, ilay nisehoan''i Jehovah tamin''i Davida rainy, dia ilay namboarina teo amin''ny fitoerana nofidin''i Davida teo amin''ny famoloan''i Araona Jebosita. '
  '10':
  - type: text
    content: 'Ary tao amin''ny efi-trano masina indrindra dia nasiany sarin''ny kerobima roa, ary nosokiriny no nanaovany azy, dia nopetahany takela-bolamena. '
  '11':
  - type: text
    content: 'Ny halavan''ny elatry ny kerobima dia roa-polo hakiho: ny elatry ny anankiray dia dimy hakiho, mipaka amin''ny rindrina; ary ny elany iray koa dimy hakiho sady mifanendry amin''ny elatry ny kerobima anankiray; '
  '12':
  - type: text
    content: 'ary ny elatry ny kerobima anankiray koa dia dimy hakiho, mipaka amin''ny rindrina; ary ny elany iray koa dimy hakiho sady mifanendry amin''ny elatry ny kerobima anankiray. '
  '13':
  - type: text
    content: 'Nivelatra ny elatr''ireo kerobima Ireo. ka roa-polo hakiho ny halavany; nijoro tamin''ny tongony, tarehiny nanatrika ny trano. '
  '14':
  - type: text
    content: Ary izy nanao ny efitra lamba tamin'ny manga sy volomparasy sy jaky sy rongony fotsy madinika; ary nataony sarin'ny kerobima ny sorany.
  '15':
  - type: text
    content: 'Ary nanao andry roa teo anoloan''ny trano izy; dimy amby telo-polo hakiho ny hahavony, ary ny kapitaly teo an-tampony dia dimy hakiho ary. '
  '16':
  - type: text
    content: 'Ary nanao tongalika tao amin''ny efitra anatiny izy, ka nataony teo an-tampon''ny andry ireo; ary nanao sarin''apongaben-danitra zato izy, ka nataony teo amin''ny tongalika ireo. '
  '17':
  - type: text
    content: Ary ny andry natsangany teo anoloan'ny tempoly, ny iray tamin'ny ankavanana, ary ny iray tamin'ny ankavia; ary ny anaran'ny teo amin'ny ankavanana nanao ny hoe Jakina
  - type: note
    content: Jakina = Hampiorina izy
  - type: text
    content: ', ary ny anaran''ny teo amin''ny ankavia kosa natao hoe Boaza'
  - type: note
    content: Boaza = Ao aminy no misy hery (?)
  - type: text
    content: .
  '2':
  - type: text
    content: 'Ary nanomboka nanao ny trano izy tamin''ny andro faharoa tamin''ny volana faharoa tamin''ny taona fahefatra nanjakany. '
  '3':
  - type: text
    content: 'Ary toy izao no nanorenan''i Solomona ny tranon''Andriamanitra: Ny lavany, raha araka ny hakiho taloha, dia enim-polo hakiho, ary ny sakany roa-polo hakiho. '
  '4':
  - type: text
    content: 'Ary ny amin''ny lavarangana fidirana izay teo anoloany, ny lavany dia roa-polo hakiho, dia araka ny sakan''ny trano ihany, ary ny hahavony dia roa-polo amby zato hakiho; ary nopetahany takela-bolamena tsara ny ao anatiny. '
  '5':
  - type: text
    content: Ary ny ati-trano lehibe nopetahany hazo kypreso, dia vao nopetahany takela-bolamena tsara ireo ary noravahany hazo rofia
  - type: note
    content: palma
  - type: text
    content: ' sy tongalika. '
  '6':
  - type: text
    content: 'Ary noravahany vato soa koa ny trano; ary ny volamena dia volamena avy any Parvaima. '
  '7':
  - type: text
    content: 'Ary nopetahany takela-bolamena ny trano, dia ny rairainy sy ny tokonany sy ny rindriny ary ny lela-varavarany; ary nosoratany nasiany sarin''ny kerobima ny rindrina. '
  '8':
  - type: text
    content: 'Ary nanao ny efi-trano masina indrindra izy: ny lavany dia roa-polo hakiho mifanerana amin''ny sakan''ny trano, ary roa-polo hakiho koa ny sakany; ary nopetahany takela-bolamena tsara talenta enin-jato izy '
  '9':
  - type: text
    content: 'Ary ny lanjan''ny hombo volamena dia sekely dimam-polo. Ary ny efi-trano ambony nopetahany volamena koa. '
