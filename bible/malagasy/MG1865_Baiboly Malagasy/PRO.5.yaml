document_id: PRO.5
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fananarana tsy hijejojejo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Anaka, tandremo ny fahendreko, Ary atongilano ny sofinao ho amin''ny fahalalako, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hiheveranao tsara ny fisainana mazava Sy hitandreman'ny molotrao ny fahalalana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Fa ny molotry ny vehivavy jejo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. vehivavy tsy vadiny
    marker-yv: yv-n
  - type: text
    text: ' dia mitete toy ny tantely avy amin''ny tohotra, Ary ny vavany dia malama noho ny diloilo; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nefa ny farany mangidy tahaka ny hazo mahafaty Ary maranitra hoatra ny sabatra roa lela. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny tongony midina ho any amin'ny fahafatesana, Ary ny diany mizotra ho any amin'ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tsy mahazo mandia ny lalan''aina mihitsy izy, Fa manjenjena, ka tsy fantany akory izay halehany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa mihainoa ahy, ry zanaka, Ary aza miala amin''ny teny aloaky ny vavako. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ampanalaviro azy ny alehanao, Ary aza manakaiky ny varavaran''ny tranony; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fandrao omenao ho an''ny sasany ny voninahitrao, Ary ny taonanao ho an''izay lozabe; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fandrao hivokisan''ny vahiny ny fanananao; Ary izay nisasaranao ho tonga ao an-tranon''ny vahiny; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ka dia hitoloko ianao any am-parany, Raha mihalevona ny nofonao sy ny tenanao; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hanao hoe ianao: Nahoana re no nankahala famaizana aho? Ary nahoana no naniratsira fanaranana ny foko, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ka tsy nihaino ny tenin''ny mpanoro hevitra ahy, Ary tsy nanongilana ny sofiko hihaino ny mpampianatra ahy? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Efa saiky azon'ny ratsy rehetra aho Tao amin'ny fiangonana sy ny fivoriana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Misotroa rano avy amin''ny lavaka famorian-dranonao ihany Sy rano miboiboika avy amin''ny fantsakanao. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hipasaka eny ivelany va ny rano avy amin''ny loharanonao, Ary eny an-dalambe ny rano velonao? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Aoka ho anao irery ihany izany, Fa aza iombonana amin''ny hafa. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Aoka hotahina ny loharanonao, Ary mifalia amin''ny vadin''ny fahatanoranao. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa dieravavy mahate-ho-tia sy osi-dia tsara bika izy, Dia aoka ny tratrany no hahafeno fifaliana anao mandrakariva, Ary aoka ho feno faharavoravoana lalandava amin''ny fitiavany ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Nahoana ianao, anaka, no ho renoka amin'ny fitiavana vehivavy jejo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. vehivavy tsy vadiny
    marker-yv: yv-n
  - type: text
    text: ' Ka hanohona ny tratran''ny vahiny janga?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa eo imason''i Jehovah ny alehan''ny olona, Ary ny diany rehetra dia dinihiny avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ny heloky ny ratsy fanahy dia mahazo ny tenany ihany, Ary ny kofehin''ny fahotany no itanana azy '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Maty noho ny tsi-fahazoany famaizana izy, Eny, mikorapaka noho ny haben'ny fahadalany.
