document_id: PSA.9,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salamo abidy. Fiderana an'Andriamanitra, Mpitsara marina, sy fahatokiana Azy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho an''ny mpiventy hira, Almoth-laben. Salamo nataon''i Davida. Hidera an''i Jehovah amin''ny foko rehetra aho; hanambara ny fahagaganao rehetra aho. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary hatoky Anao izay mahalala ny anaranao; fa tsy foinao izay mitady Anao, Jehovah ô.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mankalazà an''i Jehovah,Izay mitoetra any Ziona; ambarao any amin''ny firenena ny asany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa izay manadin-drà dia mahatsiaro ny ory; tsy manadino ny fitarainany Izy. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mamindrà fo amiko, Jehovah ô; mitsinjova ny fahoriako avy amin''izay mankahala ahy, Ry Mpanandratra ahy ho afaka amin''ny vavahadin''ny fahafatesana, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mba holazaiko avokoa ny fideràna Anao rehetra; eo am-bavahadin'i Ziona zanakavavy no hifaliako amin'ny famonjenao.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny jentilisa efa latsaka tamin''ny lavaka izay nohadiny, ny fandrika harato izay nafeniny efa nahazo ny tongony, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehovah efa nanao izay mampiseho ny tenany ho Mpitsara; namandrika ny ratsy fanahy tamin''ny asan''ny tànany Izy. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hiverina ho any amin'ny fiainan-tsi-hita
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. Sheola
      marker-yv: yv-n
    - type: text
      text: ' ny ratsy fanahy, dia ny jentilisa rehetra izay manadino an''Andriamanitra. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa tsy ho mandrakizay no hanadinoana ny malahelo; ary tsy ho very mandrakizay ny fanantenan'ny mahantra.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitsangàna, Jehovah ô, aoka tsy hahery ny olona; aoka hotsaraina eo anatrehanao ny jentilisa. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ho faly sy ho ravoravo aminao aho; hankalaza ny anaranao aho ry Avo Indrindra ô,
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Asio fampahatahorana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: fampianarana'
      marker-yv: yv-n
    - type: text
      text: ' izy, Jehovah ô; aoka ho fantatry ny jentilisa fa olona ihany izy.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satria lasa nihodina ny fahavaloko, nirepirepy izy ka ringana tsy ho eo anatrehanao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa efa nitsara ahy Hianao ka nanome ahy ny rariny; mipetraka eo amin''ny seza fitsaranao Hianao ho Mpitsara marina. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Efa nanarinao mafy ny jentilisa, efa naringanao ny ratsy fanahy, ny anarany efa nokosehinao ho faty mandrakizay doria. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny amin'ny fahavalo, dia tanteraka ho mandrakizay ny fandravàna azy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Ry fahavalo tanteraka ho mandrakizay ny fandravana'
      marker-yv: yv-n
    - type: text
      text: '; ary izay tanàna efa noravanao, dia very na dia ny fahatsiarovana azy aza. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Kanefa Jehovah mitoetra mandrakizay, efa nametraka ny sezany hitsarany Izy, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Izy hitsara izao tontolo izao amin''ny fahamarinana, eny hitsara ny firenena amin''ny fahitsiana Izy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ka dia Jehovah no ho fiarovana avo ho an''ny mahantra, ho fiarovana avo amin''ny andro fahoriana Izy. '
