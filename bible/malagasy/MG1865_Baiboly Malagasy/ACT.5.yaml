document_id: ACT.5,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny namatorana ny Apostoly rehetra, sy ny nitondrana azy teo anatrehan'ny Synedriona
  - type: text
    content: 'Fa nisy kosa lehilahy atao hoe Ananiasy sy Safira vadiny nivarotra tany, '
  '10':
  - type: text
    content: 'Dia nikarapoka teo anoloan''ny tongony niaraka tamin''izay koa izy, ka afaka ny ainy; ary raha niditra ny zatovo, dia hitany fa maty, ary nentiny nivoaka ka naleviny teo anilan''ny lahy. '
  '11':
  - type: text
    content: Dia raiki-tahotra indrindra ny fiangonana rehetra sy izay rehetra nandre izany.
  '12':
  - type: text
    content: 'Ary ny tanan''ny Apostoly no nanaovana famantarana sy fahagagana maro teo amin''ny vahoaka; ary izy rehetra niray saina teo amin''ny Fialofan''i Solomona; '
  '13':
  - type: text
    content: 'ary tsy nisy tamin''ny olona sisa rehetra sahy niray taminy; nefa nankalaza azy ny vahoaka. '
  '14':
  - type: text
    content: 'Ary vao mainka nisy olona maro koa na lahy na vavy izay nino ny Tompo nanampy ho isany; '
  '15':
  - type: text
    content: 'ka dia nentiny teny an-dalambe aza ny marary ka napetrany teny ambony farafara sy fandriana, mba hisy ho azon''ny tandindon''i Petera ahay, raha mandalo izy. '
  '16':
  - type: text
    content: Ary ny olona maro avy tamin'ny vohitra manodidina an'i Jerosalema dia nivory koa, nitondra ny marary sy izay nampahorin'ny fanahy maloto; dia sitrana avokoa izy rehetra.
  '17':
  - type: text
    content: 'Ary nitsangana ny mpisoronabe mbamin''ny namany rehetra (izay antokon''ny Sadoseo), fa feno fialonana izy, '
  '18':
  - type: text
    content: 'dia nisambotra ny Apostoly izy ka nanao azy tao an-tranomaizina. '
  '19':
  - type: text
    content: 'Fa nisy anjelin''ny Tompo namoha ny varavaran''ny tranomaizina nony alina, dia nitondra azy nivoaka ka nanao hoe: '
  '2':
  - type: text
    content: 'ka nanafenany ho azy ny vola vidiny, ary ny vavy koa nahalala izany; dia nentiny ny vola sasany vidiny ka napetrany teo anoloan''ny tongotry ny Apostoly. '
  '20':
  - type: text
    content: 'Mandehana, ka mitsangàna, ary mitoria amin''ny vahoaka eo an-kianjan''ny tempoly ny teny rehetra milaza izany fiainana izany. '
  '21':
  - type: text
    content: 'Ary rehefa nandre izany izy, dia niditra maraina koa teo an-kianjan''ny tempoly ka nampianatra. Ary rehefa tonga ny mpisoronabe sy ny namany, dia nampiangona ny Synedriona sy ny loholona rehetra tamin''ny Zanak''isiraely izy ka naniraka nankao amin''ny tranomaizina haka ny Apostoly. '
  '22':
  - type: text
    content: 'Fa nony tonga ny mpiandry raharaha, dia tsy nahita azy tao an-tranomaizina; dia niverina izy ka nilaza hoe: '
  '23':
  - type: text
    content: 'Ny tranomaizina dia hitanay mihidy tsara, ary ny mpiambina mitsangana eo am-baravarana; kanefa nony novohanay, dia tsy nahita olona tao izahay. '
  '24':
  - type: text
    content: 'Ary ny lehiben''ny mpiambina ny tempoly sy ny lohan''ny mpisorona, rehefa nandre izany teny izany, dia niroahana ny amin''izay ho faran''izany. '
  '25':
  - type: text
    content: 'Dia nisy tonga ka nilaza taminy hoe: Ireny lehilahy izay nataonareo tao an-tranomaizina ireny, dia indreo izy mitsangana eo an-kianjan''ny tempoly ka mampianatra ny olona. '
  '26':
  - type: text
    content: 'Dia lasa ny lehiben''ny mpiambina sy ny mpiandry raharaha ka nitondra azy, nefa tsy nanao mahery, satria natahotra ny vahoaka izy, fandrao hotorahany vato. '
  '27':
  - type: text
    content: 'Ary rehefa nentiny, dia napetrany teo anatrehan''ny Synedriona ireo, ary ny mpisoronabe nanontany azy '
  '28':
  - type: text
    content: 'ka nanao hoe: Efa noraranay mafy dia mafy ianareo tsy hampianatra amin''izany anarana izany; kanjo, indro, efa nofenoinareo ny fampianaranareo Jerosalema, ka tianareo hankinina aminay ny ran''izany Lehilahy izany. '
  '29':
  - type: text
    content: 'Fa Petera sy ny Apostoly namaly ka nanao hoe: Andriamanitra no tokony hekena mihoatra noho ny olona. '
  '3':
  - type: text
    content: 'Ary hoy Petera: Ry Ananiasy, nahoana Satana no nameno ny fonao handainga amin''ny Fanahy Masina ka hanafina ny vola sasany vidin''ny tany? '
  '30':
  - type: text
    content: 'Andriamanitry ny razantsika efa nanangana an''i Jesosy, Izay novonoin''ny tananareo nahantonareo teo amin''ny hazo. '
  '31':
  - type: text
    content: Izy nasandratry ny tanana ankavanan'Andriamanitra
  - type: note
    content: 'Na: nasandratra ho eo an-tanana ankavanan''Andriamanitra'
  - type: text
    content: ' ho Tompo sy Mpamonjy, hanome fibebahana sy famelan-keloka ho an''ny Isiraely. '
  '32':
  - type: text
    content: 'Ary izahay dia vavolombelon''izany zavatra izany, ary ny Fanahy Masina koa, Izay efa nomen''Andriamanitra ny manaiky Azy. '
  '33':
  - type: text
    content: 'Ary raha nandre izany izy, dia lotika ny fony, ka nihendry hamono azy izy. '
  '34':
  - type: text
    content: 'Dia nitsangana teo amin''ny Synedriona ny Fariseo anankiray atao hoe Gamaliela, mpampiana-dalàna, izay nalaza teo amin''ny olona rehetra, ary nasainy navoaka kely ireo olona ireo. '
  '35':
  - type: text
    content: 'Dia hoy izy tamin''ny namany: Ry lehilahy Isiraely, tandremo tsara izay hataonareo amin''ireo olona ireo. '
  '36':
  - type: text
    content: 'Fa nitsangana fahiny Teodasy ka nanao ny tenany ho zavatra; tokony ho efa-jato no isan''ny lehilahy izay niandany taminy; fa novonoina izy ka nihahaka izay rehetra nanaiky azy ka tonga tsinontsinona. '
  '37':
  - type: text
    content: 'Ary nanarakaraka azy indray, tamin''ny andro nanoratana ny vahoaka, dia nitsangana Jodasy avy any Galilia; ary izy nitaona olona hikomy hanaraka azy; dia novonoina koa izy, ka nihahaka izay rehetra nanaiky azy. '
  '38':
  - type: text
    content: 'Ary ankehitriny dia lazaiko aminareo: Mandefera amin''ireo olona ireo, ka avelao ihany izy; fa raha avy amin''olona izao saina na asa izao, dia ho foana; '
  '39':
  - type: text
    content: 'fa raha avy amin''Andriamanitra kosa izao, dia tsy ho azonareo foanana, sao dia miseho ho mpiady amin''Andriamanitra ianareo. '
  '4':
  - type: text
    content: 'Fony tsy namidy, tsy anao ihany va izy? Ary rehefa namidy, tsy anao hanaovanao izay sitraponao koa va? Nahoana no nisaina izany tao am-ponao ianao? Tsy nandainga tamin''olona ianao, fa tamin''Andriamanitra. '
  '40':
  - type: text
    content: 'Dia nanaiky azy izy; ary rehefa niantso ny Apostoly izy, dia nikapoka azy sady nandrara azy tsy hiteny amin''ny anaran''i Jesosy intsony, ary dia nandefa azy handeha. '
  '41':
  - type: text
    content: 'Ary ireo dia niala teo anatrehan''ny Synedriona, sady faly, satria natao miendrika hitondra fahafaham-baraka ho voninahitr''izany anarana izany. '
  '42':
  - type: text
    content: Ary tsy nitsahatra nampianatra sy nitory an'i Jesosy ho Kristy isan'andro teo an-kianjan'ny tempoly sy tao an-trano izy.
  '5':
  - type: text
    content: 'Ary Ananiasy, nony nandre izany teny izany, dia nikarapoka, ka afaka ny ainy; dia raiki-tahotra loatra izay rehetra nandre izany. '
  '6':
  - type: text
    content: 'Ary nitsangana ny zatovo, dia nofonosiny ny faty ka nentiny nivoaka, dia naleviny. '
  '7':
  - type: text
    content: 'Fa rehefa afaka tokony ho ora telo, dia niditra koa ny vavy, nefa tsy fantany izay efa nanjo teo. '
  '8':
  - type: text
    content: 'Ary hoy Petera taminy: Lazao amiko: Izany ihany va no vola vidin''ny taninareo? Dia hoy izy: Eny, izany ihany. '
  '9':
  - type: text
    content: 'Ary hoy Petera taminy: Nahoana ianareo no niray tetika haka fanahy ny Fanahin''ny Tompo? Indro, eo am-baravarana ny tongotr''izay nandevina ny vadinao, ary hitondra anao hivoaka koa izy. '
