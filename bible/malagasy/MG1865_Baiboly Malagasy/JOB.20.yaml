document_id: JOB.20
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny teny fanindroany nataon'i Zofara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia namaly Zofara Namatita ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Noho izany dia mamaly ahy ny eritreritro, eny, noho
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ary izany no mahatonga'
    marker-yv: yv-n
  - type: text
    text: ' ny fihetsiketsiky ny saiko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Reko lalandava ny anatra mampahamenatra ahy; Ary ny fanahiko mamaly ahy avy amin'ny fahalalako.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tsy fantatrao va fa hatramin'ny ela, eny, hatrizay nampitoerana ny olona tetỳ ambonin'ny tany,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Dia vetivety foana ny firavoravoan'ny ratsy fanahy, ary indray mipi-maso monja ny fifalian'ny mpihatsaravelatsihy?44
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fa na dia mipaka amin'ny lanitra aza ny hahavony, ka mitehika amin'ny rahona ny lohany,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dia ho very mandrakizay toy ny dikiny
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ny tain''omby atainy'
    marker-yv: yv-n
  - type: text
    text: ' ihany izy; Izay nahita azy dia hanao hoe: Aiza izy?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Manidina tahaka ny nofy izy ka tsy ho hita; Eny, ampandosirina tahaka ny tsindrimandry amin'ny alina izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny maso izay mijery, dia indray mitopy ihany no ahitany azy; Ary dia tsy hahita azy intsony ny fitoerany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny zanany hitambitamby amin'ny malahelo, ary ny tànany ihany no hampody ny hareny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ny taolany dia feno ny herin'ny fahatanorana
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ota tsy fantatra'
    marker-yv: yv-n
  - type: text
    text: ', Nefa hiara-mandry aminy eo amin''ny vovoka izany.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Na dia mamy ao am-bavany aza ny ratsy, ka afeniny ao ambanin'ny lelany,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ary tsitsiny ka tsy foiny, fa tehiriziny ao amin'ny lanilaniny ihany,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Dia miova ny haniny ao an-kibony, ka aferon'ny vipera no ao anatiny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Harena no nateliny, nefa aloany indray; Loaran'Andriamanitra hiala ao an-kibony izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny poizin'ny vipera no hotsentsefiny; Hahafaty azy ny lelan'ny menarana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tsy ho faly mahita renirano izy, dia ony sy riaky ny tantely sy ronono.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tsy azony atelina izay nikelezany aina, fa tsy maintsy hampodiny; Na dia be aza ny hareny, dia tsy ho araka izany ny hafaliany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa nampahory sy nahafoy ny reraka izy ka naka trano an-keriny, fa tsy hahatontosa azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Satria tsy mahalala mionona ny kibony, dia tsy hahavonjy ny tenany mbamin'ny tiany indrindra izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tsy misy tsy tratry ny fieremany; Ka dia tsy haharitra ny fiadanany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ho poriporitra izy, na dia mihoa-pampana aza ny fananany; Ny tanan'ny ory no hamely azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Halefan'Andriamanitra ny fahatezerany mirehitra hameno ny kibony; Eny, halatsany aminy toy ny ranonorana izany ho hanina ho azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Raha mandositra ny vy fiadiana izy, dia hahavoa azy miboroaka ny tsipìka varahina;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tsoahany izany, ka mivoaka avy amin'ny tenany; Eny, ny manelatselatra dia mivoaka avy amin'ny aferony; Lasa izy azon'ny fahatahorana mafy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ny aizim-pito no voarakitra ho amin'ny raki-malalany; Afo tsy tsofina no handoro azy sady handevona izay sisa ao amin'ny lainy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Hambaran'ny lanitra ny helony, Ary ny tany hitsangana hiampanga azy,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ho lasa ny harena tafiditra ao an-tranony; Eny, ho levona izany amin'ny andro fahatezerany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Izany no anjaran'ny ratsy fanahy avy amin'Andriamanitra, sy lova voatendrin'Andriamanitra ho azy.
