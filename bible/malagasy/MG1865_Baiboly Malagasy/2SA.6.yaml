document_id: 2SA.6,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny namindrana ny fiaran'i Jehovah nankany Jerosalema
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary novorin''i Davida indray ny lehilahy voafantina rehetra tamin''ny Isiraely, dia telo alina. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Davida dia tsy nety namindra ny fiaran''i Jehovah ho ao aminy ao an-Tanànan''i Davida; fa naviliny ho ao an-tranon''i Obed-edoma Gatita. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nipetraka telo volana tao an-tranon''i Obed-edoma Gatita ny fiaran''i Jehovah; ka dia notahin''i Jehovah Obed-edoma sy ny ankohonany rehetra. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nambara tamin''i Davida mpanjaka hoe: Jehovah efa nitahy ny ankohonan''i Obed-edoma sy izay nananany rehetra noho ny fiaran''Andriamanitra. Dia nandeha Davida ka nampakatra ny fiaran''Andriamanitra tamim-pifaliana avy tao an-tranon''i Obed-edoma ho any an-Tanànan''i Davida. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary rehefa namindra inenina ny mpitondra ny fiaran''i Jehovah, dia namono omby sy zanak''omby mifahy izy hatao fanatitra. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Davida nitsinjaka mafy dia mafy teo anatrehan''i Jehovah sady nisalotra efoda rongony fotsy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Davida sy ny taranak''i Isiraely rehetra nampakatra ny fiaran''i Jehovah tamin''ny hoby sy ny feon''ny anjomara. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nony tonga teo an-Tanànan'i Davida ny fiaran'i Jehovah, dia nitsirika teo am-baravarankely Mikala, zanakavavin'i Saoly, ka nahita an'i Davida mpanjaka nibitaka sy nitsinjaka teo anatrehan'i Jehovah; ka dia nikizaka azy tao am-pony izy.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nampiditra ny fiaran''i Jehovah ny olona ka nametraka azy teo amin''ny fitoerany tao amin''ny lay izay naorin''i Davida hitoerany; ary Davida nanatitra fanatitra dorana sy fanati-pihavanana teo anatrehan''i Jehovah. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony voatitr''i Davida ny fanatitra dorana sy ny fanati-pihavanana, dia nitso-drano ny vahoaka tamin''ny anaran''i Jehovah, Tompon''ny maro, izy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia nomeny mofo iray sy hena iray didy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: divay eran''ny kapoaka'
      marker-yv: yv-n
    - type: text
      text: ' ary ampempam-boaloboka iray avy ny olona rehetra, dia ny Isiraely rehetra, na lahy na vavy. Ary dia samy nody tany an-tranony avy ny olona rehetra. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dia niainga Davida sy ny olona rehetra izay nanaraka azy ka niala tany Bala-joda hampakatra ny fiaran'Andriamanitra izay niantsoana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: izay nantsoina tamin'''
      marker-yv: yv-n
    - type: text
      text: ' ny anaran''i Jehovah, Tompon''ny maro, Izay mipetraka amin''ny kerobima. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Davida koa mba nody hitso-drano ny ankohonany. Fa Mikala, zanakavavin''i Saoly, nivoaka hitsena an''i Davida ka nanao hoe: Akory ity voninahitry ny mpanjakan''ny Isiraely androany! ilay nanary lamba anikeheo teo imason''ny zanakavavin''ny mpanompony, tahaka ny adala manary lamba ka tsy manan-kenatra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary hoy kosa Davida tamin''i Mikala: Teo anatrehan''i Jehovah, Izay nifidy ahy noho ny rainao sy ny ankohonany rehetra ka nanendry ahy ho mpanapaka ny Isiraely, olon''i Jehovah, eny, teo anatrehan''i Jehovah no nitsinjahako. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary mbola hivazina kokoa noho izany aza aho, ka hataoko tsinontsinona ny tenako; nefa hiaraka hanam-boninahitra amin''ireo tovovavy nantsoinao ireo kosa aho. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ka dia tsy nanan-janaka intsony mandra-pahafatiny Mikala, zanakavavin'i Saoly.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary nataony teo amin'ny sariety vaovao ny fiaran'Andriamanitra ka nentiny avy tao an-tranon'i Abinadaba teo an-kavoana
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Gibea'
      marker-yv: yv-n
    - type: text
      text: '; ary Oza sy Ahio, zanak''i Abinadaba, no nampandeha ny sariety vaovao. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary dia nentiny niala tao an-tranon''i Abinadaba teo ankavoana niaraka tamin''ny fiaran''Andriamanitra izany; ary Ahio nandeha teo alohan''ny fiara. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Davida sy ny taranak''Isiraely rehetra nitsinjaka teo anatrehan''i Jehovah tamin''ny karazan''ny zava-maneno rehetra natao tamin''ny hazo kypreso, dia tamin''ny lokanga sy ny valiha sy ny ampongatapaka sy ny korintsana ary ny kipantsona. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony tonga teo amin''ny famoloan''i Nakona izy, dia naninjitra ny tanany tamin''ny fiaran''Andriamanitra Oza ka nihazona azy, satria nazeran''ny omby ny fiara. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nirehitra tamin''i Oza ny fahatezeran''i Jehovah; ary namely azy teo Andriamanitra noho ny fahadisoany, ka dia maty teo anilan''ny fiaran''Andriamanitra izy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ary dia tezitra
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: nalahelo'
      marker-yv: yv-n
    - type: text
      text: ' Davida noho ny namelezan''i Jehovah an''i Oza, ka dia nataony hoe Perez-oza'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Perez-oza = Famelezana an'i Oza
      marker-yv: yv-n
    - type: text
      text: ' ny anaran''izany tany izany mandraka androany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Davida natahotra an''i Jehovah tamin''izany andro izany ka nanao hoe: Nahoana no ho entina atỳ amiko ny fiaran''i Jehovah? '
