document_id: JDG.18,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny nandehandehanan'ny firenen'i Dana nizaha tany hitoerany
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary tamin''izany andro izany dia tsy nisy mpanjaka teo amin''ny Isiraely; ary tamin''izany andro izany kosa ny firenen''i Dana nitady lova mba honenany, satria na dia hatramin''izany andro izany aza dia tsy mbola nahazo lova ho azy teo amin''ny firenen''Isiraely izy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Raha mandeha ianareo, dia ho tonga any amin'ny olona tsy manana ahiahy sy any amin'ny tany malalaka; fa efa natolotr'Andriamanitra ho eo an-tananareo izany; dia tany tapi-javatra irina atỳ ambonin'ny tany.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia nisy niainga avy tamin''ny fokon''i Dana, avy tany Zora sy Estaola, dia enin-jato lahy efa voaomana tamin''ny fiadiany. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary niakatra ireo ka nitoby tany Kiriata-jearima any Joda (izany no nanaovana ny anaran''izany tany izany hoe mandraka androany Mahane-dana; indro, eo andrefan''i Kiriata-jearima izany). '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia niala tao izy ka nandroso nantany amin''ny tany havoan''i Efraima, dia tonga tao an-tranon''i Mika. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary niteny izy dimy lahy, izay nandeha hisafo ny tany Laisy, ka nanao tamin''ny rahalahiny hoe: Fantatrareo va fa ato amin''ireto trano ireto misy efoda sy terafima ary sarin-javatra voasokitra sy sarin-javatra anidina? koa hevero izay hataonareo. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dia nivily tao izy ka tonga tao an-tranon''ilay Levita zatovo, dia tao an-tranon''i Mika, ka niarahaba azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary ny enin-jato lahy efa voaomana tamin''ny fiadiany, izay avy tamin''ny taranak''i Dana, dia nijanona teo anoloan''ny vavahady. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary niakatra izy dimy lahy, izay nandeha hisafo ny tany, dia niditra ka naka ny sarin-javatra voasokitra sy ny efoda sy ny terafima ary ny sarin-javatra an-idina; ary ny mpisorona mbamin''ny enin-jato lahy efa voaomana tamin''ny fiadiany nijanona teo anoloan''ny vavahady. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia niditra tao an-tranon''i Mika ireo ka naka ny sarin-javatra voasokitra sy ny efoda sy ny terafima ary ny sarin-javatra an-idina. Ary hoy ny mpisorona taminy: Maninona ianareo? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dia hoy ireo taminy: Mangina ianao, tampeno ny tananao ny vavanao, ka andeha hiaraka aminay, dia ho rainay sy mpisoronay ianao; moa tsara ho anao va ny ho mpisorona ho an''ny olona iray trano noho ny ho mpisorona amin''ny firenena iray sy ny foko iray amin''ny Isiraely? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary ny taranak''i Dana naniraka dimy lahy nofantenany avy amin''ny fokony rehetra, dia lehilahy mahery, avy tany Zora sy Estaola, mba hisafo ny tany sy hizaha ny toetrany; ary hoy izy taminy: Mandehana izahao ny toetry ny tany. Ary tonga tany amin''ny tany havoan''i Efraima tao an-tranon''i Mika izy, dia nandry tao. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Dia faly ny fon'ilay mpisorona, ka nalainy ny efoda sy ny terafima ary ny sarin-javatra voasokitra, ary nandeha voahodidin'ny olona izy.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dia nihodina izy ireo ka lasa nandeha; ary ny zaza amim-behivavy sy ny omby aman''ondry mbamin''ny entany tsara dia nataony teo alohany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary rehefa lasa lavitra ny tranon''i Mika izy, dia nivory ny lehilahy nifanolo-bodirindrina tamin''i Mika ka nahatratra ny taranak''i Dana. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Dia niantso ny taranak''i Dana izy. Ary niherika ireo ka nanao tamin''i Mika hoe: Haninona ianao, no nanangona olona maro toy izao? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary hoy Izy: Ny andriamanitro izay nataoko sy ny mpisorona koa dia nalainareo, ka lasa ianareo; koa inona intsony no mba ho ahy? Ary ahoana no anaovanareo amiko hoe: Haninona ianao? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia hoy ny taranak''i Dana taminy: Aoka tsy ho re eto aminay intsony ny feonao, fandrao hisy olo-masiaka hamely anareo, ka dia hanao izay hahafaty ny tenanao sy ny ankohonanao ianao.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Dia nandeha tamin''ny nalehany ny taranak''i Dana; ary rehefa hitan''i Mika fa ireo dia nahery noho izy, dia niverina izy ka nody tany an-tranony. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ary izy ireo naka izay zavatra efa nataon''i Mika sy ny mpisorona izay tao aminy, dia nankany Laisy ho any amin''ny olona mandry fahizay ka tsy manana ahiahy, dia namely azy tamin''ny lelan-tsabatra ireo; ary ny tanàna nodorany tamin''ny afo. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary tsy nisy namonjy, satria lavitra an''i Sidona izany, ary tsy nanan-draharaha tamin''olona akory izy, sady teo amin''ny lohasaha izay any Beti-rehoba izany. Dia nanorina ny tanàna izy ireo ka nonina tao. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary ny anaran''ny tanàna nataony hoe Dana, araka ny anaran''i Dana rainy, izay naterak''Isiraely; kanefa Laisy no anaran''ny tanàna taloha. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Rehefa mby teo akaikin''ny tranon''i Mika izy, dia fantany ny feon''ilay Levita zatovo; dia nivily teo izy ka nanao taminy hoe: Iza no nitondra anao tatỳ? ary maninona atỳ ianao? ary inona no anananao atỳ? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Dia natsangan'ny taranak'i Dana ilay sarin-javatra voasokitra; ary Jonatana, zanak'i Gersoma, zanak'i Mosesy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Manase'
      marker-yv: yv-n
    - type: text
      text: ', sy ny zanany, no mpisorona ho an''ny firenen''i Dana hatramin''ny andro namaboana ny tany. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ary nampitoeriny ho azy ilay sarin-javatra voasokitra nataon'i Mika mandritra ny andro rehetra niorenan'ny tranon'Andriamanitra tao Silo.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dia hoy kosa izy taminy: Izany ka izany no nataon''i Mika tamiko, ary efa nanamby ahy izy, ka efa mpisorony aho izao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Dia hoy izy ireo taminy: Masìna ianao, manontania amin''Andriamanitra mba ho fantatray na hambinina amin''ny lalana alehanay izahay, na tsia. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Dia hoy ilay mpisorona taminy: Mandehana soa aman-tsara; fa eo anatrehan''i Jehovah izao lalana alehanareo izao. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Dia nandeha izy dimy lahy ka tonga tany Laisy, ary hitany ny olona tao, fa nonina tsy nanana ahiahy tahaka ny fanaon'ny Sidoniana izy, dia nandry fahizay ka tsy nanana ahiahy, sady tsy nisy mpanapaka hampahory
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: hahamena-maso'
      marker-yv: yv-n
    - type: text
      text: ' azy teo amin''ny tany na amin''inona na amin''inona; ary lavitra ny Sidoniana izy sady tsy nanan-draharaha tamin''olona akory. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia nandeha ho any amin''ny rahalahiny any Zora sy Estaola ireo; ary hoy ny rahalahiny taminy: Naninona moa ianareo? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia hoy izy: Mitsangàna, ka aoka isika hiakatra hamely azy; fa efa nahita ny tany izahay, fa, indro, tsara indrindra izany; moa mbola mijanonjanona ihany va ianareo? aza malain-kandeha hiditra handova ny tany. '
