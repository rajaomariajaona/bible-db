document_id: PRO.21
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Rano velona eo an-tànan'i Jehovah ny fon'ny mpanjaka, Ka tarihiny amin'izay tiany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ataon'ny olona ho marina avokoa ny lalana rehetra alehany; Fa Jehovah ihany no Mpandanja ny fo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ny hanao izay marina sy mahitsy No sitrak''i Jehovah mihoatra noho ny fanatitra alatsa-drà. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny fiandranandran'ny maso sy ny fiavonavon'ny fo Izay jiron
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: asan'''
    marker-yv: yv-n
  - type: text
    text: '''ny ratsy fanahy dia ota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ny hevitry ny mazoto dia mampanan-karena; Fa ny maimaika rehetra dia halahelo ihany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ny fahazoan-karena amin''ny lela mandainga Dia fofonaina mihelina ho an''izay mitady fahafatesana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ny fitohatohan'ny ratsy fanahy hamongotra azy, Satria mandà tsy hanao izay marina izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Miolikolika ny lalan'ny mavesa-keloka; Fa mahitsy ny ataon'ny madio.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aleo mitoetra eo an-joron'ny tampon-trano Toy izay hiray trano amin'ny vehivavy tia ady.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ny fanahin'ny ratsy fanahy maniry ny ratsy, Ka na dia ny havany aza tsy mahita fitia eo imasony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Raha ampijalina ny mpaniratsira, dia ho hendry ny kely saina; Ary raha toroan-kevitra ny hendry, dia hahazo fahalalana izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny Iray Marina no mandinika ny tranon'ny ratsy fanahy Ka mamarina azy ho amin'ny loza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Izay manentsin-tadiny amin'ny fitarainan'ny malahelo, Dia mba hitaraina kosa izy, fa tsy hohenoina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ny fanomezana mangingina mampionona ny fahatezerana, Ary ny kolikoly amin'ny takona mampitsahatra ny fahavinirana mafy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fifalian''ny marina ny hanao araka ny rariny; Fa zava-mahatahotra ny mpanao ratsy kosa izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ny olona izay mivily miala amin'ny lalan'ny fahendrena Dia hitoetra ao amin'ny fivorian'ny fanahin'ny maty.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Izay tia fanaranam-po dia olona halahelo, Eny, izay tia divay sy diloilo tsy mba hanan-karena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ny ratsy fanahy dia ho avotry ny marina, Ary ny mpivadika ho solon'ny mahitsy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Aleo mitoetra any an-efitra Toy izay amin'ny vehivavy tia ady sady foizina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Harena mahafinaritra sy diloilo no ao amin''ny tranon''ny hendry; Fa ny adala mandany azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Izay fatra-panaraka fahamarinana sy famindram-po Dia hahazo fiainana sy fahamarinana ary voninahitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ny hendry mananika ny vohitry ny mahery Ka mandrodana ny fiarovana mafy izay itokiany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Izay miambina ny vavany sy ny lelany Dia miaro ny fanahiny tsy ho azom-pahoriana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izay mirehareha sy miavonavona no atao hoe mpaniratsira, Dia izay olona fatra-piavonavona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny fanirian'ny malaina hahafaty azy, Satria ny tànany tsy mety miasa tsinona;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Maniry fatratra mandritra ny andro izy; Fa ny marina kosa manome ka tsy mba mahihitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ny fanatitry ny ratsy fanahy dia fahavetavetana, Ka indrindra raha amin'ny sain-dratsy no itondrany azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ho faty ny vavolombelona mandainga; Fa izay mihaino dia hiteny mandrakariva.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ny ratsy fanahy mampiseho ny fahasahisahiany amin''ny tarehiny; Fa ny marina kosa dia mihevitra izay halehany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tsy misy fahendrena, na fahalalana, Na fisainana mahaleo an'i Jehovah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Voaomana ny soavaly ho amin'ny andro iadiana; Fa an'i Jehovah ihany ny fandresena.
