document_id: PSA.134,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Hira ho fisaorana an'i Jehovah amin'ny alina
  - type: text
    content: Fihirana fiakarana
  - type: note
    content: 'Na: Fihirana misy hevitra ambaratonga'
  - type: text
    content: . Andeha, misaora an'i Jehovah
  - type: note
    content: 'Na: misaora an''i Jehovah amin''ny alina'
  - type: text
    content: ', ianareo rehetra mpanompon''i Jehovah, Izay mitoetra alina ao an-tranon''i Jehovah. '
  '2':
  - type: text
    content: Manandrata ny tananareo ho amin'ny fitoerana masina
  - type: note
    content: 'Na: amin''ny fahamasinana'
  - type: text
    content: ', Ka misaora an''i Jehovah. '
  '3':
  - type: text
    content: Hitahy anao avy ao Ziona anie Jehovah Mpanao ny lanitra sy ny tany.
