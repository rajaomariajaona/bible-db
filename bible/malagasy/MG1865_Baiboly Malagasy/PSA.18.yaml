document_id: PSA.18,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fitantaran'i Davida ny namonjen'Andriamanitra azy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ho an''ny mpiventy hira. Nataon''i Davida, mpanompon''i Jehovah, izay nilaza tamin''i Jehovah ny tenin''ity fihirana ity tamin''ny andro namonjen''i Jehovah azy tamin''ny tanan''ny fahavalony rehetra, indrindra fa tamin''ny tanan''i Saoly; dia hoy izy: mamiko indrindra Hianao, Jehovah Heriko ô. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitaingina kerobima Izy ka nanidina; eny, nanidina faingana tamin''ny ela-drivotra Izy. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Efa nanao ny maizina ho fiereny sy tranony manodidina Azy Izy, dia rahona ngalingaly
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Heb: aizin-drano'
      marker-yv: yv-n
    - type: text
      text: ' rahona matevina. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary teo amin''ny famirapiratana teo anatrehany dia nandalo ny rahony matevina havandra sy vainafo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nampikotroka tany an-danitra Jehovah, ny Avo Indrindra niloa-peo. Havandra sy vainafo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nandefa ny zana-tsipìkany Izy ka nampiely ny fahavaloko. Ary nampandeha helatra be ka nampifanaritaka azy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia hita ny mason-drano, ary niseho ny fanambanin''ny tany noho ny teny mafy nataonao, Jehovah ô, noho ny fifofofofon''ny fofonain''ny vavoronao. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naninjitra ny tanany avy tany ambony Izy ka nandray ahy; nanintona ahy niala tamin''ny rano be Izy; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Namonjy ahy tamin''ny fahavaloko mahery Izy sy tamin''izay nankahala ahy, satria tsy leoko ireny '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nisakana ahy tamin'ny andro nahitako loza ireny, nefa Jehovah no niseho ho Mpanohana ahy.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nitondra ahy ho any amin''ny malalaka Izy; namonjy ahy Izy, satria tiany aho. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehovah no harambatoko sy batery fiarovana ho ahy ary Mpamonjy ahy; Andriamanitro, vatolampy ialofako, sy ampingako ary tandroka famonjena ahy sy fiarovana avo ho ahy. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nanisy soa ahy araka ny fahamarinako Jehovah; araka ny fahadiovan''ny tanako no namaliany ahy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa nitandrina ny lalan''i Jehovah aho, ka tsy mba nanao ratsy hialana tamin''Andriamanitro; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny fitsipiny rehetra dia teo anatrehako, ary ny lalàny tsy mba nampialaiko tamiko; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsy nanan-tsiny taminy aho sady niaro tena tsy ho azon''ny fahotako; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa namaly ahy araka ny fahamarinako Jehovah, dia araka ny fahadiovan''ny tanako teo imasony. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ny olona tsara no isehoanao fa tsara; ny tena olo-marina no isehoanao fa marina; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny madio no isehoanao fa madio; ary ny mpiolakolaka kosa no isehoanao fa lalin-tsaina
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Heb: miolakolaka'
      marker-yv: yv-n
    - type: text
      text: '. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Hianao mamonjy ny olona ory; ary ny maso miandranandrana kosa aetrinao. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa Hianao mampirehitra ny jiroko; Jehovah Andriamanitro no mampahazava ny fahamaizinako. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fa Hianao no ahazoako mitsarapaka hamely ny miaramila iray toko; ary Andriamanitro no ahazoako mitsambikina mihoatra ny manda.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Miantso an'i Jehovah izay mendrika hoderaina aho, ka dia vonjena ho afaka amin'ny fahavaloko.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Raha ny amin''Andriamanitra, dia marina ny lalany; ny tenin''i Jehovah dia voazaha toetra amin''ny memy; Jehovah no ampingan''izay rehetra mialoka aminy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa iza no Andriamanitra afa-tsy Jehovah? ary iza no vatolampy afa-tsy Andriamanitsika? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Izany Andriamanitra izany no mampisikina hery ahy sy manamarina ny alehako. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manao ny tongotro ho tahaka ny an''ny dieravavy Izy ka mampitoetra ahy eo amin''ny fitoerako avo. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mampianatra ny tanako hiady Izy, ka mahahenjana tsipìka varahina ny sandriko. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Omenao ahy ny ampingan''ny famonjenao; ny tananao ankavanana no manohana ahy, ary ny fahamoram-panahinao no mahalehibe ahy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Halalahinao ny lalana hodiaviko, ka tsy mangovitra ny hato-tongotro. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Manenjika ny fahavaloko aho ka mahatratra azy; ary tsy mba miverina aho mandra-pahalàny ritrany. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mamely mafy azy aho, ka tsy mahaleo izy; lavo eo ambanin''ny tongotro izy. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hianao mampisikina ahy hery hiady; aripakao ho ambaniko izay mitsangana hamely ahy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nihodidina tamiko ny famatoram-pahafatesana, ary ny riaky ny faharatsiana nampahatahotra ahy. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ataonao miamboho ahy ny fahavaloko; ka aringako izay mankahala ahy. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mitaraina izy, fa tsy misy mpamonjy, dia amin''i Jehovah, fa tsy mamaly azy Izy. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Torotoroiko madinika tahaka ny vovoka entin'ny rivotra izy; Tahaka ny fanary fotaka eny an-dalambe no fanariko azy.
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mamonjy ahy amin''ny fifanoheran''ny olona Hianao. Sy manandratra ahy ho lohan''ny firenen-tsamy hafa; ny firenena tsy fantatro aza dia manompo ahy. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Raha vao mahare ny lazako fotsiny ihany aza izy, dia manoa ahy; Ny hafa firenena mikoy ahy
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Ny olona re laza ihany aza, dia hafa firenena, mikoy ahy'
      marker-yv: yv-n
    - type: text
      text: '. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny hafa firenena dia mihaketraka, ka miala amin-kovitra avy ao amin'ny fiarovany mafy.
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Velona Jehovah; isaorana anie ny Vatolampiko; asandratra anie Andriamanitry ny famonjena ahy, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia Andriamanitra, Izay manao famaliana ho ahy ka mampanaiky ny firenena ahy. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mamonjy ahy amin''ny fahavaloko Izy; eny, manandratra ahy ho ambonin''izay mitsangana hanohitra ahy Hianao, ary mamonjy ahy amin''ny olon-dozabe. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Koa izany no hiderako Anao eny amin''ny firenen-tsamy hafa, Jehovah ô, sy hankalazako ny anaranao. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ny famatoran'ny fiainan-tsi-hita
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Heb: Sheola'
      marker-yv: yv-n
    - type: text
      text: ' nihodidina tamiko; nisakana ahy ny fandriky ny fahafatesana. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Manao famonjen-dehibe ho an'ny mpanjaka voatendriny Izy, ary mamindra fo amin'ny voahosony, dia amin'i Davida sy ny taranany mandrakizay.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fony azom-pahoriana aho, dia niantso an'i Jehovah, eny, Andriamanitro no nitarainako; nihaino ny feoko tao an-tempoliny Izy, ary ny fitarainako teo anatrehany dia efa tonga teo an-tsofiny.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia nihozongozona sy nihorohoro ny tany, ary ny fanambanin''ny tendrombohitra nihorohoro; eny, nihozongozona ireo, satria tezitra Jehovah. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nisy setroka nisavoana teo am-bavorony, ary afo avy teo am-bavany no nandevona ka nisy vainafo nidedadeda teo aminy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dia naondriny ny lanitra, ka nidina Izy; ary aizim-pito no teo ambanin''ny tongony. '
