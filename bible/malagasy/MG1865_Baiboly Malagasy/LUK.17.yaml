document_id: LUK.17,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary hoy Jesosy tamin''ny mpianany: Tsy maintsy ho avy ny fahatafintohinana; nefa lozan''izay olona mahatonga izany! '
  '10':
  - type: text
    content: 'Dia tahaka izany koa ianareo, rehefa vitanareo izay rehetra nandidiana anareo, dia ataovy hoe: Mpanompo ny mahasoa izahay; ny tokony ho nataonay ihany no efa nataonay. '
  '11':
  - type: text
    content: Ary raha niakatra ho any Jerosalema Jesosy, dia nandeha namaky an'i
  - type: note
    content: 'Na: Teny anelanelan''i'
  - type: text
    content: ' Samaria sy Galilia. '
  '12':
  - type: text
    content: 'Ary raha niditra tao amin''ny vohitra anankiray Izy, dia nisy boka folo lahy nifanena taminy, izay nijanona teny lavitra eny. '
  '13':
  - type: text
    content: 'Ary izy ireo niantso mafy nanao hoe: Ry Jesosy Tompo ô, mamindrà fo aminay. '
  '14':
  - type: text
    content: 'Ary raha hitany ireo, dia hoy Izy taminy: Mandehana, misehoa amin''ny mpisorona. Ary rehefa lasa izy ireo, dia nadio teny am-pandehanana. '
  '15':
  - type: text
    content: 'Ary ny anankiray tamin''ireo, raha nahita fa sitrana izy, dia niverina ka nankalaza an''Andriamanitra tamin''ny feo mahery '
  '16':
  - type: text
    content: 'sady niankohoka tamin''ny tongotr''i Jesosy ka nisaotra Azy; ary Samaritana iny lehilahy iny. '
  '17':
  - type: text
    content: 'Dia namaly Jesosy ka nanao hoe: Tsy efa voadio avokoa va izy folo lahy? fa aiza ny sivy? '
  '18':
  - type: text
    content: 'Moa tsy nisy hita niverina hanome voninahitra an''Andriamanitra afa-tsy ity olona hafa firenena ity ihany va? '
  '19':
  - type: text
    content: 'Ary hoy Izy taminy: Mitsangàna, mandehana; ny finoanao no efa nahavonjy anao. '
  '2':
  - type: text
    content: Aleo anantonana vato lehibe
  - type: note
    content: 'Na: ahodim-boriky'
  - type: text
    content: ' fikosoham-bary ny vozony, ka atsipy any an-dranomasina izy, toy izay hahatafintohina na dia ny anankiray amin''ireo madinika ireo aza. '
  '20':
  - type: text
    content: 'Ary Jesosy, nony nanontanian''ny Fariseo izay andro hihavian''ny fanjakan''Andriamanitra, dia namaly azy hoe: Tsy misehoseho no fihavin''ny fanjakan''Andriamanitra. '
  '21':
  - type: text
    content: 'Ary ny olona tsy hanao hoe: Indro, etỳ! na erỳ ! fa, indro, ny fanjakan''Andriamanitra dia ao anatinareo'
  - type: note
    content: 'Na: efa eo aminareo'
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Ary hoy Izy tamin''ny mpianatra: Ho avy ny andro hanirianareo hahita ny anankiray amin''ny andron''ny Zanak''olona, nefa tsy hahita ianareo. '
  '23':
  - type: text
    content: 'Ary ny olona hilaza aminareo hoe: Indro, erỳ ! na: Indro, etỳ! nefa aza mandeha ianareo, na manaraka azy. '
  '24':
  - type: text
    content: 'Fa tahaka ny helatra manelatra hatramin''ny faravodilanitra ka mahazava hatramin''ny farany koa, dia ho toy izany ny Zanak''olona amin''ny androny, '
  '25':
  - type: text
    content: 'Fa tsy maintsy mijaly mafy Izy aloha ka holavin''ity taranaka ity. '
  '26':
  - type: text
    content: 'Ary tahaka ny tamin''ny andron''i Noa, dia hisy toy izany koa amin''ny andron''ny Zanak''olona: '
  '27':
  - type: text
    content: 'nihinana izy, nisotro izy, nampaka-bady izy, navoaka hampakarina izy, mandra-pihavin''ny andro izay nidiran''i Noa tao amin''ny sambo-fiara, dia tonga ny Safo-drano ka nandringana azy rehetra. '
  '28':
  - type: text
    content: 'Ary tahaka ny tamin''ny andron''i Lota koa: nihinana izy, nisotro izy, nivarotra izy, namboly izy, nanao trano izy; '
  '29':
  - type: text
    content: 'fa tamin''ny andro izay nivoahan''i Lota avy tao Sodoma, dia nisy afo sy solifara nilatsaka avy tany an-danitra ka nandringana azy rehetra. '
  '3':
  - type: text
    content: 'Mitandrema ianareo; fa raha manota ny rahalahinao, dia teneno mafy izy, ka raha mibebaka izy, dia mamelà ny helony. '
  '30':
  - type: text
    content: 'Dia ho tahaka izany koa amin''ny andro hisehoan''ny Zanak''olona. '
  '31':
  - type: text
    content: 'Amin''izany andro izany izay eo an-tampon-trano, ary ny entany ao an-trano, dia aoka tsy hidina haka izany; ary toy izany koa izay any an-tsaha, aoka tsy hiverina amin''izay efa nilaozany izy. '
  '32':
  - type: text
    content: 'Tsarovy ny vadin''i Lota. '
  '33':
  - type: text
    content: 'Na zovy na zovy mitady hamonjy ny ainy dia hahavery azy; ary na zovy na zovy no hahavery ny ainy dia hahazo izany. '
  '34':
  - type: text
    content: 'Lazaiko aminareo fa amin''izany alina izany hisy roa lahy miray fandriana; ny anankiray horaisina, ary ny anankiray havela. '
  '35':
  - type: text
    content: Hisy roa vavy miara-mitoto vary; ny anankiray horaisina, ary ny anankiray havela
  - type: note
    content: 'Ampio hoe: (36) Hisy roa lahy any an-tsaha; ny anankiray horaisina, ary ny anankiray havela'
  - type: text
    content: '. '
  '37':
  - type: text
    content: 'Dia namaly izy ireo ka nanao taminy hoe: Aiza, Tompoko? Ary hoy Izy taminy: Izay itoeran''ny faty, dia any koa no hiangonan''ny voromahery.'
  '4':
  - type: text
    content: 'Ary raha manota aminao impito indray andro izy, ary mivalo aminao impito kosa manao hoe; Mibebaka aho, dia mamelà ny helony. '
  '5':
  - type: text
    content: 'Ary hoy ny Apostoly tamin''ny Tompo: Ampitomboy ny finoanay. '
  '6':
  - type: text
    content: 'Fa hoy ny Tompo: Raha manana finoana na dia hoatra ny voan-tsinapy iray aza ianareo, dia azonareo lazaina amin''io vorihazo io hoe: Miongota, ary aoka hambolena ao anatin''ny ranomasina, dia hanaiky anareo izy. '
  '7':
  - type: text
    content: 'Ary iza moa aminareo no manana mpanompo miasa tany, na miandry ondry, ka raha tonga avy tany an-tsaha ilay mpanompo, dia hanao aminy hoe: Avia faingana, ka mipetraha hihinana? '
  '8':
  - type: text
    content: 'Fa tsy hilaza aminy kosa hoe va izy: Manamboara izay hisakafoako, ary misikìna, ka manompoa ahy ambara-pihinako sy hisotroako; fa rehefa vita izany, dia vao mahazo mihinana sy misotro ianao? '
  '9':
  - type: text
    content: 'Moa misaotra izany mpanompo izany va izy, satria nataony izay nandidiany? '
