document_id: LUK.17
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary hoy Jesosy tamin''ny mpianany: Tsy maintsy ho avy ny fahatafintohinana; nefa lozan''izay olona mahatonga izany! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aleo anantonana vato lehibe
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: ahodim-boriky'
    marker-yv: yv-n
  - type: text
    text: ' fikosoham-bary ny vozony, ka atsipy any an-dranomasina izy, toy izay hahatafintohina na dia ny anankiray amin''ireo madinika ireo aza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mitandrema ianareo; fa raha manota ny rahalahinao, dia teneno mafy izy, ka raha mibebaka izy, dia mamelà ny helony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary raha manota aminao impito indray andro izy, ary mivalo aminao impito kosa manao hoe; Mibebaka aho, dia mamelà ny helony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy ny Apostoly tamin''ny Tompo: Ampitomboy ny finoanay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa hoy ny Tompo: Raha manana finoana na dia hoatra ny voan-tsinapy iray aza ianareo, dia azonareo lazaina amin''io vorihazo io hoe: Miongota, ary aoka hambolena ao anatin''ny ranomasina, dia hanaiky anareo izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary iza moa aminareo no manana mpanompo miasa tany, na miandry ondry, ka raha tonga avy tany an-tsaha ilay mpanompo, dia hanao aminy hoe: Avia faingana, ka mipetraha hihinana? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa tsy hilaza aminy kosa hoe va izy: Manamboara izay hisakafoako, ary misikìna, ka manompoa ahy ambara-pihinako sy hisotroako; fa rehefa vita izany, dia vao mahazo mihinana sy misotro ianao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Moa misaotra izany mpanompo izany va izy, satria nataony izay nandidiany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia tahaka izany koa ianareo, rehefa vitanareo izay rehetra nandidiana anareo, dia ataovy hoe: Mpanompo ny mahasoa izahay; ny tokony ho nataonay ihany no efa nataonay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary raha niakatra ho any Jerosalema Jesosy, dia nandeha namaky an'i
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Teny anelanelan''i'
    marker-yv: yv-n
  - type: text
    text: ' Samaria sy Galilia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary raha niditra tao amin''ny vohitra anankiray Izy, dia nisy boka folo lahy nifanena taminy, izay nijanona teny lavitra eny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary izy ireo niantso mafy nanao hoe: Ry Jesosy Tompo ô, mamindrà fo aminay. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary raha hitany ireo, dia hoy Izy taminy: Mandehana, misehoa amin''ny mpisorona. Ary rehefa lasa izy ireo, dia nadio teny am-pandehanana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary ny anankiray tamin''ireo, raha nahita fa sitrana izy, dia niverina ka nankalaza an''Andriamanitra tamin''ny feo mahery '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'sady niankohoka tamin''ny tongotr''i Jesosy ka nisaotra Azy; ary Samaritana iny lehilahy iny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia namaly Jesosy ka nanao hoe: Tsy efa voadio avokoa va izy folo lahy? fa aiza ny sivy? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Moa tsy nisy hita niverina hanome voninahitra an''Andriamanitra afa-tsy ity olona hafa firenena ity ihany va? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary hoy Izy taminy: Mitsangàna, mandehana; ny finoanao no efa nahavonjy anao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Jesosy, nony nanontanian''ny Fariseo izay andro hihavian''ny fanjakan''Andriamanitra, dia namaly azy hoe: Tsy misehoseho no fihavin''ny fanjakan''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny olona tsy hanao hoe: Indro, etỳ! na erỳ ! fa, indro, ny fanjakan''Andriamanitra dia ao anatinareo'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: efa eo aminareo'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary hoy Izy tamin''ny mpianatra: Ho avy ny andro hanirianareo hahita ny anankiray amin''ny andron''ny Zanak''olona, nefa tsy hahita ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary ny olona hilaza aminareo hoe: Indro, erỳ ! na: Indro, etỳ! nefa aza mandeha ianareo, na manaraka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa tahaka ny helatra manelatra hatramin''ny faravodilanitra ka mahazava hatramin''ny farany koa, dia ho toy izany ny Zanak''olona amin''ny androny, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fa tsy maintsy mijaly mafy Izy aloha ka holavin''ity taranaka ity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary tahaka ny tamin''ny andron''i Noa, dia hisy toy izany koa amin''ny andron''ny Zanak''olona: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'nihinana izy, nisotro izy, nampaka-bady izy, navoaka hampakarina izy, mandra-pihavin''ny andro izay nidiran''i Noa tao amin''ny sambo-fiara, dia tonga ny Safo-drano ka nandringana azy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary tahaka ny tamin''ny andron''i Lota koa: nihinana izy, nisotro izy, nivarotra izy, namboly izy, nanao trano izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'fa tamin''ny andro izay nivoahan''i Lota avy tao Sodoma, dia nisy afo sy solifara nilatsaka avy tany an-danitra ka nandringana azy rehetra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia ho tahaka izany koa amin''ny andro hisehoan''ny Zanak''olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Amin''izany andro izany izay eo an-tampon-trano, ary ny entany ao an-trano, dia aoka tsy hidina haka izany; ary toy izany koa izay any an-tsaha, aoka tsy hiverina amin''izay efa nilaozany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tsarovy ny vadin''i Lota. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Na zovy na zovy mitady hamonjy ny ainy dia hahavery azy; ary na zovy na zovy no hahavery ny ainy dia hahazo izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Lazaiko aminareo fa amin''izany alina izany hisy roa lahy miray fandriana; ny anankiray horaisina, ary ny anankiray havela. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Hisy roa vavy miara-mitoto vary; ny anankiray horaisina, ary ny anankiray havela
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ampio hoe: (36) Hisy roa lahy any an-tsaha; ny anankiray horaisina, ary ny anankiray havela'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Dia namaly izy ireo ka nanao taminy hoe: Aiza, Tompoko? Ary hoy Izy taminy: Izay itoeran''ny faty, dia any koa no hiangonan''ny voromahery.'
