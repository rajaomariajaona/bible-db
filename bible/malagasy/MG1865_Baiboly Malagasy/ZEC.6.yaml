document_id: ZEC.6,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny satro-boninahitra teo an-dohan'i Josoa
  - type: text
    content: 'Ary natopiko indray ny masoko ka hitako fa, indreo, nisy kalesy efatra nivoaka avy teo anelanelan''ny tendrombohitra roa; ary tendrombohitra varahina ireo tendrombohitra ireo. '
  '10':
  - type: text
    content: 'Mandraisa avy amin''ny babo, dia amin''i Helday sy Tobia ary Jedaia, eny, mandehana amin''izany andro izany ihany ianao, ka midìra ao an-tranon''i Josia, zanak''i Zefania, izay novantaniny nony vao tonga avy tany Babylona izy, '
  '11':
  - type: text
    content: 'eny, mandraisa volafotsy sy volamena, ka ataovy satro-boninahitra, dia apetraho eo an-dohan''i Josoa, zanak''i Jozadaka, mpisoronabe; '
  '12':
  - type: text
    content: 'dia lazao aminy hoe: Izao no lazain''i Jehovah, Tompon''ny maro: Indro Lehilahy atao hoe Rantsana'
  - type: note
    content: 'na: solofo'
  - type: text
    content: ; ary hitsimoka eo am-pitoerany ihany Izy
  - type: note
    content: 'na: ary hisy hitsimoka eo ambaniny'
  - type: text
    content: ' sady hanao ny tempolin''i Jehovah. '
  '13':
  - type: text
    content: Eny, Izy no hanao ny tempolin'i Jehovah, ary Izy no hitondra voninahitra ka hipetraka sy hanapaka eo amin'ny seza fiandrianany; ary ho mpisorona eo amin'ny seza fiandrianany Izy
  - type: note
    content: 'na: ary hisy mpisorona eo amin''ny seza fiandrianany'
  - type: text
    content: '; ary hisy fisainam-pihavanana amin''izy roroa. '
  '14':
  - type: text
    content: 'Ary ny satro-boninahitra dia ho an''i Helema sy Tobia sy Jedaia ary Hena, zanak''i Zefania, ho fampahatsiarovana ao amin''ny tempolin''i Jehovah. '
  '15':
  - type: text
    content: Ary izay lavitra dia ho avy ka hanao ao amin'ny tempolin'i Jehovah, ka dia ho fantatrareo fa Jehovah, Tompon'ny maro, no naniraka ahy ho aminareo. Dia ho tonga izany, raha hazoto hihaino ny feon'i Jehovah Andriamanitrareo ianareo.
  '2':
  - type: text
    content: 'Tamin''ny kalesy voalohany dia nisy soavaly mena; tamin''ny kalesy faharoa dia soavaly mainty; '
  '3':
  - type: text
    content: tamin'ny kalesy fahatelo dia soavaly fotsy; ary tamin'ny kalesy fahefatra dia soavaly sadamena
  - type: note
    content: 'na: sada sady matanjaka'
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Dia nanontany tamin''ilay anjely niresaka tamiko aho ka nanao hoe: Inona moa ireo, tompoko? '
  '5':
  - type: text
    content: 'Ary ilay anjely namaly ka nilaza tamiko hoe: Ireo no rivotra efatry ny lanitra, izay mivoaka avy nitsangana teo anatrehan''ny Tompon''ny tany. rehetra. '
  '6':
  - type: text
    content: 'Io misy ny soavaly mainty dia mivoaka mankamin''ny tany avaratra; ary ny fotsy nivoaka nanaraka azy; ary ny sada nivoaka nankamin''ny tany atsimo. '
  '7':
  - type: text
    content: Ary ny mena
  - type: note
    content: 'na: matanjaka'
  - type: text
    content: ' dia nivoaka ka nitady handeha hivoivoy eny amin''ny tany; dia hoy izy: Mandehana ianareo, mivoivoiza eny amin''ny tany. Ka dia nandeha nivoivoy teny amin''ny tany izy. '
  '8':
  - type: text
    content: 'Dia nitaraina mafy tamiko izy ka niteny tamiko hoe: Indro, ireo izay mivoaka mankamin''ny tany avaratra dia nampionona ny fanahiko tany amin''ny tany avaratra.'
  '9':
  - type: text
    content: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
