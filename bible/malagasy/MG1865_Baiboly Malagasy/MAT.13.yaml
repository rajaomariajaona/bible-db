document_id: MAT.13,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary tamin''izany andro izany dia nivoaka avy tao an-trano Jesosy ka nipetraka teo amoron''ny ranomasina. '
  '10':
  - type: text
    content: 'Ary dia nanatona ny mpianany ka nanao taminy hoe: Nahoana no fanoharana no itenenanao aminy? '
  '11':
  - type: text
    content: 'Ary namaly Izy ka nanao taminy hoe: Satria ianareo no navela'
  - type: note
    content: Gr. nomena
  - type: text
    content: ' hahalala ny zava-miafina ny amin''ny fanjakan''ny lanitra, fa ireny kosa tsy mba navela'
  - type: note
    content: Gr. nomena
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Fa izay manana no homena, ka hanana be dia be izy; fa izay tsy manana kosa, na izay ananany aza dia hesorina aminy. '
  '13':
  - type: text
    content: 'Ary noho izany dia fanoharana no itenenako aminy: satria mijery izy, fa tsy mahita; ary mandre izy, fa tsy mihaino, na mahalala. '
  '14':
  - type: text
    content: 'Dia tanteraka aminy ny faminanian''Isaia, izay manao hoe: Handre mandrakariva ihany ianareo, fa tsy hahafantatra: Ary hijery mandrakariva ihany ianareo, fa tsy hahita; '
  '15':
  - type: text
    content: 'Fa efa adala ny fon''izao olona izao. Ary efa lalodalovana ny sofiny, Ary efa nakimpiny ny masony, Fandrao hahita ny masony, Sy handre ny sofiny, Ka hahalala ny fony, Dia hibebaka izy, Ka hahasitrana azy Aho. (Isa. 6. 9, 10). '
  '16':
  - type: text
    content: 'Fa sambatra ny masonareo, fa mahita, ary ny sofinareo, fa mandre. '
  '17':
  - type: text
    content: 'Fa lazaiko aminareo marina tokoa fa maro ny mpaminany sy ny olona marina naniry hahita izay hitanareo, nefa tsy mba nahita; ary naniry handre izay renareo, nefa tsy mba nandre. '
  '18':
  - type: text
    content: 'Koa amin''izany dia henoinareo ny fanoharana ny amin''ny mpamafy: '
  '19':
  - type: text
    content: 'Raha misy mandre ny tenin''ny fanjakana, fa tsy mahalala, dia avy ilay ratsy ka manaisotra izay nafafy tao am-pony. Dia izany no ilay nafafy teny amoron-dalana. '
  '2':
  - type: text
    content: 'Ary nisy vahoaka betsaka tafangona teo aminy, dia niditra teo an-tsambokely Izy ka nipetraka; ary ny vahoaka rehetra kosa dia teny amoron-dranomasina. '
  '20':
  - type: text
    content: 'Fa ilay nafafy teny amin''ny tany marivo ambony vatolampy dia izay mandre ny teny ka malaky mandray azy amin''ny hafaliana; '
  '21':
  - type: text
    content: 'nefa tsy manam-paka ao anatiny izy, fa maharitra vetivety foana; koa raha avy izay fahoriana na fanenjehana noho ny teny, dia malaky tafintohina izy. '
  '22':
  - type: text
    content: 'Ary ilay nafafy teny amin''ny tsilo dia izay mandre ny teny ary ny fiahiahiana izao fiainana izao sy ny fitaky ny harena mangeja ny teny, ka dia tsy mamoa izy. '
  '23':
  - type: text
    content: 'Fa ilay nafafy teny amin''ny tany tsara kosa dia izay mandre ny teny ka mahalala; dia izy no mamoa ka vokatra: ny sasany avy zato heny ary ny sasany avy enim-polo heny, ary ny sasany avy telo-polo heny. '
  '24':
  - type: text
    content: 'Ary nanao fanoharana hafa koa taminy Izy ka nanao hoe: Ny fanjakan''ny lanitra dia tahaka ny lehilahy anankiray izay namafy voa tsara tany an-tanimbariny; '
  '25':
  - type: text
    content: 'fa raha natory ny olona, dia avy ny fahavalony ka namafy voan-tsimparifary teny amin''ny vary, dia lasa nandeha. '
  '26':
  - type: text
    content: 'Ary rehefa naniry ny vary ka niteraka dia niposaka koa ny tsimparifary. '
  '27':
  - type: text
    content: 'Dia avy ny mpanompon-dralehilahy ka nanao taminy hoe: Tompoko, tsy voa tsara va no nafafinao tany an-tanimbarinao? koa avy taiza kosa ny tsimparifary? Dia hoy izy taminy: '
  '28':
  - type: text
    content: 'Fahavalo no nanao izany. Ary ny mpanompony nanao taminy hoe: Koa tianao va handehananay hanongotra sy hanangona azy? '
  '29':
  - type: text
    content: 'Fa hoy izy: Tsia, fandrao, raha manongotra ny tsimparifary ianareo, dia hongotanareo miaraka aminy koa ny vary. '
  '3':
  - type: text
    content: 'Ary nilaza zavatra maro taminy tamin''ny fanoharana Izy ka nanao hoe: Indro, nivoaka ny mpamafy mba hamafy; '
  '30':
  - type: text
    content: 'Aoka ihany hiara-maniry izy roroa ambara-pihavin''ny fararano; ary amin''ny fararano dia holazaiko amin''ny mpijinja hoe: Angony aloha ny tsimparifary, ka ataovy amboarany mba hodorana; fa ny vary dia taomy ho any an-tsompitro.'
  '31':
  - type: text
    content: 'Ary nanao fanoharana hafa koa taminy Izy ka nanao hoe: Ny fanjakan''ny lanitra dia tahaka ny voan-tsinapy izay nalain''olona ka nafafiny tany an-tsahany; '
  '32':
  - type: text
    content: fa kely noho ny voa rehetra izy, kanefa rehefa maniry, dia lehibe noho ny anana ka tonga hazo, dia avy ny voro-manidina ka mitoetra ao amin'ny rantsany.
  '33':
  - type: text
    content: 'Ary nanao fanoharana hafa koa taminy Izy hoe: Ny fanjakan''ny lanitra dia tahaka ny masirasira, izay nalain''ny vehivavy anankiray ka nataony'
  - type: note
    content: Gr. nafeniny
  - type: text
    content: ' tao amin''ny koba intelon''ny famarana, mandra-pahazon''ny masirasira azy rehetra.'
  '34':
  - type: text
    content: 'Fanoharana no nilazan''i Jesosy izany zavatra rehetra izany tamin''ny vahoaka, ary tsy nisy nolazainy taminy, afa-tsy tamin''ny fanoharana, '
  '35':
  - type: text
    content: 'mba hahatanteraka izay nampilazaina ny mpaminany hoe: Hiloa-bava hilaza fanoharana Aho; Hanambara zavatra izay nafenina hatrizay nanorenana izao tontolo izao Aho (Sal. 78. 2).'
  '36':
  - type: text
    content: 'Ary rehefa nampody ny vahoaka Jesosy, dia niditra tao an-trano Izy, ary ny mpianany nankao aminy ka nanao hoe: Lazao aminay ny hevitry ny fanoharana ny amin''ny tsimparifary tany an-tanimbary. '
  '37':
  - type: text
    content: 'Ary namaly Izy ka nanao hoe: Ny mpamafy ny voa tsara dia ny Zanak''olona; '
  '38':
  - type: text
    content: 'ny tanimbary dia izao tontolo izao; ny voa tsara dia ny zanaky ny fanjakana; ny tsimparifary dia ny zanak''ilay ratsy; '
  '39':
  - type: text
    content: 'ny fahavalo izay namafy izany dia ny devoly; ny fararano dia ny fahataperan''izao tontolo izao; ary ny mpijinja dia anjely. '
  '4':
  - type: text
    content: 'ary raha namafy izy, ny sasany dia voafafy teny amoron-dalana; dia avy ny vorona ka nandany azy. '
  '40':
  - type: text
    content: 'Koa tahaka ny anangonana ny tsimparifary sy andoroana azy amin''ny afo, dia toy izany no hatao amin''ny fahataperan''izao tontolo izao. '
  '41':
  - type: text
    content: 'Ny Zanak''olona haniraka ny anjeliny, ary ireny dia hanangona ka hamoaka amin''ny fanjakany ny zavatra mahatafintohina rehetra mbamin''izay manao meloka, '
  '42':
  - type: text
    content: 'dia hanipy azy any amin''ny fandoroana lehibe mirehitra afo izy; any no hisy ny fitomaniana sy ny fikitroha-nify. '
  '43':
  - type: text
    content: Ary amin'izany ny marina dia hamirapiratra tahaka ny masoandro any amin'ny fanjakan'ny Rainy. Izay manan-tsofina
  - type: note
    content: 'Na: (Izay manan-tsofina ho enti-mihaino)'
  - type: text
    content: ', aoka izy hihaino. '
  '44':
  - type: text
    content: Ary ny fanjakan'ny lanitra dia tahaka ny harena nafenina tany an-tsaha, izay hitan'olona, ka dia nafeniny; ary noho ny hafaliany dia lasa nandeha izy ka nivarotra ny fananany rehetra, dia nividy izany saha izany.
  '45':
  - type: text
    content: Ary koa, ny fanjakan'ny lanitra dia tahaka ny mpandranto anankiray izay nikatsaka vato soa
  - type: note
    content: Gr.perila
  - type: text
    content: '; '
  '46':
  - type: text
    content: ary rehefa nahita vato soa
  - type: note
    content: Gr. perila
  - type: text
    content: ' iray saro-bidy izy, dia lasa nivarotra ny fananany rehetra ka nividy azy.'
  '47':
  - type: text
    content: 'Ary koa, ny fanjakan''ny lanitra dia tahaka ny harato-tarihina, izay nalatsaka tao amin''ny ranomasina ka nahavory ny samy hafa karazana rehetra; '
  '48':
  - type: text
    content: 'ary rehefa feno izany, dia notarihiny ho eny an-tanety, dia nipetraka ny olona ka nifantina ny tsara hataony ao an-karona, fa ny ratsy nariany. '
  '49':
  - type: text
    content: 'Dia tahaka izany no hatao amin''ny fahataperan''izao tontolo izao; hivoaka ny anjely ka hanavaka ny ratsy fanahy hisaraka amin''ny marina, '
  '5':
  - type: text
    content: 'Ary ny sasany dia voafafy teny amin''ny tany marivo ambony vatolampy; dia nalaky nitrebona ireny, satria tsy nisy tany lalina. '
  '50':
  - type: text
    content: 'dia hatsipiny any amin''ny fandoroana lehibe mirehitra afo izy; any no hisy ny fitomaniana sy ny fikitroha-nify. '
  '51':
  - type: text
    content: 'Efa azonareo va izany rehetra izany? Hoy ireo taminy: Eny. '
  '52':
  - type: text
    content: 'Dia hoy Izy taminy: Koa amin''izany ary ny mpanora-dalàna rehetra izay nampianarina ho amin''ny fanjakan''ny lanitra dia samy tahaka ny tompon-trano, izay mamoaka avy amin''ny firaketany zava-baovao sy ela. '
  '53':
  - type: text
    content: 'Ary rehefa vitan''i Jesosy ireo fanoharana ireo, dia niala teo Izy. '
  '54':
  - type: text
    content: 'Ary nony tonga tany amin''ny taniny Izy, dia nampianatra ny olona tao amin''ny synagoga, ary talanjona ny olona ka nanao hoe: Avy taiza re no nahazoan''ilehity izany fahendrena sy asa lehibe izany? '
  '55':
  - type: text
    content: 'Tsy Ilehity va ilay Zanaky ny mpandrafitra? Tsy Maria va no anaran''ny reniny? Ary tsy Jakoba sy Josefa sy Simona ary Jodasy va no rahalahiny? '
  '56':
  - type: text
    content: 'Ary ny anabaviny, moa tsy eto amintsika avokoa va izy? Koa avy taiza no nahazoan''ilehity izany zavatra rehetra izany? '
  '57':
  - type: text
    content: 'Ary tafintohina taminy izy. Fa hoy Jesosy taminy: Tsy misy mpaminany tsy hajaina, afa-tsy amin''ny taniny sy ny mpianakaviny ihany. '
  '58':
  - type: text
    content: Ary tsy nanao asa lehibe maro teo Izy noho ny tsi-finoan'ireo.
  '6':
  - type: text
    content: 'Fa rehefa niposaka ny masoandro, dia nalazo ireny, ary satria tsy nanam-paka, dia maty izy. '
  '7':
  - type: text
    content: 'Ary ny sasany dia voafafy teny amin''ny tsilo; ary ny tsilo naniry ka nangeja azy. '
  '8':
  - type: text
    content: 'Ary ny sasany dia voafafy teny amin''ny tany tsara, dia namoa: ny sasany avy zato heny, ary ny sasany avy enim-polo heny, ary ny sasany avy telo-polo heny. '
  '9':
  - type: text
    content: Izay manan-tsofina
  - type: note
    content: 'Na: (Izay manan-tsofina ho enti-mihaino)'
  - type: text
    content: ', aoka izy hihaino. '
