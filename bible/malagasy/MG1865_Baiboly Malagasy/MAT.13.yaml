document_id: MAT.13
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin''izany andro izany dia nivoaka avy tao an-trano Jesosy ka nipetraka teo amoron''ny ranomasina. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary nisy vahoaka betsaka tafangona teo aminy, dia niditra teo an-tsambokely Izy ka nipetraka; ary ny vahoaka rehetra kosa dia teny amoron-dranomasina. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nilaza zavatra maro taminy tamin''ny fanoharana Izy ka nanao hoe: Indro, nivoaka ny mpamafy mba hamafy; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'ary raha namafy izy, ny sasany dia voafafy teny amoron-dalana; dia avy ny vorona ka nandany azy. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary ny sasany dia voafafy teny amin''ny tany marivo ambony vatolampy; dia nalaky nitrebona ireny, satria tsy nisy tany lalina. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa rehefa niposaka ny masoandro, dia nalazo ireny, ary satria tsy nanam-paka, dia maty izy. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary ny sasany dia voafafy teny amin''ny tsilo; ary ny tsilo naniry ka nangeja azy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny sasany dia voafafy teny amin''ny tany tsara, dia namoa: ny sasany avy zato heny, ary ny sasany avy enim-polo heny, ary ny sasany avy telo-polo heny. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Izay manan-tsofina
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (Izay manan-tsofina ho enti-mihaino)'
    marker-yv: yv-n
  - type: text
    text: ', aoka izy hihaino. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary dia nanatona ny mpianany ka nanao taminy hoe: Nahoana no fanoharana no itenenanao aminy? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary namaly Izy ka nanao taminy hoe: Satria ianareo no navela'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. nomena
    marker-yv: yv-n
  - type: text
    text: ' hahalala ny zava-miafina ny amin''ny fanjakan''ny lanitra, fa ireny kosa tsy mba navela'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. nomena
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa izay manana no homena, ka hanana be dia be izy; fa izay tsy manana kosa, na izay ananany aza dia hesorina aminy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary noho izany dia fanoharana no itenenako aminy: satria mijery izy, fa tsy mahita; ary mandre izy, fa tsy mihaino, na mahalala. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dia tanteraka aminy ny faminanian''Isaia, izay manao hoe: Handre mandrakariva ihany ianareo, fa tsy hahafantatra: Ary hijery mandrakariva ihany ianareo, fa tsy hahita; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa efa adala ny fon''izao olona izao. Ary efa lalodalovana ny sofiny, Ary efa nakimpiny ny masony, Fandrao hahita ny masony, Sy handre ny sofiny, Ka hahalala ny fony, Dia hibebaka izy, Ka hahasitrana azy Aho. (Isa. 6. 9, 10). '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fa sambatra ny masonareo, fa mahita, ary ny sofinareo, fa mandre. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa lazaiko aminareo marina tokoa fa maro ny mpaminany sy ny olona marina naniry hahita izay hitanareo, nefa tsy mba nahita; ary naniry handre izay renareo, nefa tsy mba nandre. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Koa amin''izany dia henoinareo ny fanoharana ny amin''ny mpamafy: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Raha misy mandre ny tenin''ny fanjakana, fa tsy mahalala, dia avy ilay ratsy ka manaisotra izay nafafy tao am-pony. Dia izany no ilay nafafy teny amoron-dalana. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa ilay nafafy teny amin''ny tany marivo ambony vatolampy dia izay mandre ny teny ka malaky mandray azy amin''ny hafaliana; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'nefa tsy manam-paka ao anatiny izy, fa maharitra vetivety foana; koa raha avy izay fahoriana na fanenjehana noho ny teny, dia malaky tafintohina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary ilay nafafy teny amin''ny tsilo dia izay mandre ny teny ary ny fiahiahiana izao fiainana izao sy ny fitaky ny harena mangeja ny teny, ka dia tsy mamoa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fa ilay nafafy teny amin''ny tany tsara kosa dia izay mandre ny teny ka mahalala; dia izy no mamoa ka vokatra: ny sasany avy zato heny ary ny sasany avy enim-polo heny, ary ny sasany avy telo-polo heny. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nanao fanoharana hafa koa taminy Izy ka nanao hoe: Ny fanjakan''ny lanitra dia tahaka ny lehilahy anankiray izay namafy voa tsara tany an-tanimbariny; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'fa raha natory ny olona, dia avy ny fahavalony ka namafy voan-tsimparifary teny amin''ny vary, dia lasa nandeha. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary rehefa naniry ny vary ka niteraka dia niposaka koa ny tsimparifary. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia avy ny mpanompon-dralehilahy ka nanao taminy hoe: Tompoko, tsy voa tsara va no nafafinao tany an-tanimbarinao? koa avy taiza kosa ny tsimparifary? Dia hoy izy taminy: '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fahavalo no nanao izany. Ary ny mpanompony nanao taminy hoe: Koa tianao va handehananay hanongotra sy hanangona azy? '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa hoy izy: Tsia, fandrao, raha manongotra ny tsimparifary ianareo, dia hongotanareo miaraka aminy koa ny vary. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Aoka ihany hiara-maniry izy roroa ambara-pihavin''ny fararano; ary amin''ny fararano dia holazaiko amin''ny mpijinja hoe: Angony aloha ny tsimparifary, ka ataovy amboarany mba hodorana; fa ny vary dia taomy ho any an-tsompitro.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary nanao fanoharana hafa koa taminy Izy ka nanao hoe: Ny fanjakan''ny lanitra dia tahaka ny voan-tsinapy izay nalain''olona ka nafafiny tany an-tsahany; '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: fa kely noho ny voa rehetra izy, kanefa rehefa maniry, dia lehibe noho ny anana ka tonga hazo, dia avy ny voro-manidina ka mitoetra ao amin'ny rantsany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ary nanao fanoharana hafa koa taminy Izy hoe: Ny fanjakan''ny lanitra dia tahaka ny masirasira, izay nalain''ny vehivavy anankiray ka nataony'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. nafeniny
    marker-yv: yv-n
  - type: text
    text: ' tao amin''ny koba intelon''ny famarana, mandra-pahazon''ny masirasira azy rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Fanoharana no nilazan''i Jesosy izany zavatra rehetra izany tamin''ny vahoaka, ary tsy nisy nolazainy taminy, afa-tsy tamin''ny fanoharana, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'mba hahatanteraka izay nampilazaina ny mpaminany hoe: Hiloa-bava hilaza fanoharana Aho; Hanambara zavatra izay nafenina hatrizay nanorenana izao tontolo izao Aho (Sal. 78. 2).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary rehefa nampody ny vahoaka Jesosy, dia niditra tao an-trano Izy, ary ny mpianany nankao aminy ka nanao hoe: Lazao aminay ny hevitry ny fanoharana ny amin''ny tsimparifary tany an-tanimbary. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary namaly Izy ka nanao hoe: Ny mpamafy ny voa tsara dia ny Zanak''olona; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ny tanimbary dia izao tontolo izao; ny voa tsara dia ny zanaky ny fanjakana; ny tsimparifary dia ny zanak''ilay ratsy; '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'ny fahavalo izay namafy izany dia ny devoly; ny fararano dia ny fahataperan''izao tontolo izao; ary ny mpijinja dia anjely. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Koa tahaka ny anangonana ny tsimparifary sy andoroana azy amin''ny afo, dia toy izany no hatao amin''ny fahataperan''izao tontolo izao. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ny Zanak''olona haniraka ny anjeliny, ary ireny dia hanangona ka hamoaka amin''ny fanjakany ny zavatra mahatafintohina rehetra mbamin''izay manao meloka, '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'dia hanipy azy any amin''ny fandoroana lehibe mirehitra afo izy; any no hisy ny fitomaniana sy ny fikitroha-nify. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ary amin'izany ny marina dia hamirapiratra tahaka ny masoandro any amin'ny fanjakan'ny Rainy. Izay manan-tsofina
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (Izay manan-tsofina ho enti-mihaino)'
    marker-yv: yv-n
  - type: text
    text: ', aoka izy hihaino. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Ary ny fanjakan'ny lanitra dia tahaka ny harena nafenina tany an-tsaha, izay hitan'olona, ka dia nafeniny; ary noho ny hafaliany dia lasa nandeha izy ka nivarotra ny fananany rehetra, dia nividy izany saha izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Ary koa, ny fanjakan'ny lanitra dia tahaka ny mpandranto anankiray izay nikatsaka vato soa
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr.perila
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: ary rehefa nahita vato soa
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. perila
    marker-yv: yv-n
  - type: text
    text: ' iray saro-bidy izy, dia lasa nivarotra ny fananany rehetra ka nividy azy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary koa, ny fanjakan''ny lanitra dia tahaka ny harato-tarihina, izay nalatsaka tao amin''ny ranomasina ka nahavory ny samy hafa karazana rehetra; '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'ary rehefa feno izany, dia notarihiny ho eny an-tanety, dia nipetraka ny olona ka nifantina ny tsara hataony ao an-karona, fa ny ratsy nariany. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Dia tahaka izany no hatao amin''ny fahataperan''izao tontolo izao; hivoaka ny anjely ka hanavaka ny ratsy fanahy hisaraka amin''ny marina, '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'dia hatsipiny any amin''ny fandoroana lehibe mirehitra afo izy; any no hisy ny fitomaniana sy ny fikitroha-nify. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Efa azonareo va izany rehetra izany? Hoy ireo taminy: Eny. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Dia hoy Izy taminy: Koa amin''izany ary ny mpanora-dalàna rehetra izay nampianarina ho amin''ny fanjakan''ny lanitra dia samy tahaka ny tompon-trano, izay mamoaka avy amin''ny firaketany zava-baovao sy ela. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Ary rehefa vitan''i Jesosy ireo fanoharana ireo, dia niala teo Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Ary nony tonga tany amin''ny taniny Izy, dia nampianatra ny olona tao amin''ny synagoga, ary talanjona ny olona ka nanao hoe: Avy taiza re no nahazoan''ilehity izany fahendrena sy asa lehibe izany? '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Tsy Ilehity va ilay Zanaky ny mpandrafitra? Tsy Maria va no anaran''ny reniny? Ary tsy Jakoba sy Josefa sy Simona ary Jodasy va no rahalahiny? '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Ary ny anabaviny, moa tsy eto amintsika avokoa va izy? Koa avy taiza no nahazoan''ilehity izany zavatra rehetra izany? '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Ary tafintohina taminy izy. Fa hoy Jesosy taminy: Tsy misy mpaminany tsy hajaina, afa-tsy amin''ny taniny sy ny mpianakaviny ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
