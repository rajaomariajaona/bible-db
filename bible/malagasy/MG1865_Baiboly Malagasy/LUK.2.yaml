document_id: LUK.2
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin''izany andro izany dia nisy didy navoak''i Aogosto Kaisara hampanoratra ny anaran''ny vahoaka rehetra amin''ny fanjakany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: (Izany no fanoratana voalohany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Ny tena fanoratana voalohany anefa dia'
    marker-yv: yv-n
  - type: text
    text: ' natao fony Kyrenio nanapaka tany Syria.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Dia samy nankany amin''ny tanànany avy izy rehetra mba hosoratana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Josefa koa niakatra avy tany Galilia, dia avy tao an-tanàna Nazareta, hankany Jodia, ho ao an-tanànan''i Davida, iza atao hoe Betlehema (satria avy tamin''ny taranak''i Davida sy ny mpianakaviny), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'mba hosoratana izy sy Maria fofom-badiny, izay efa bevohoka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary raha nitoetra teo Izy, dia tonga ny andro hahavelomany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary niteraka ny Lahimatoany izy, dia nohodidininy lamban-jaza ka nampandriny teo amin''ny fihinanam-bilona; fa tsy nisy nitoerany tao an-tranom-bahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary nisy mpiandry ondry tamin''izany tany izany nitoetra tany an-tsaha nitandrina ny ondriny tamin''ny alina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nisy anjelin''ny Tompo nitsangana teo anilany, ary ny voninahitry ny Tompo nanelatrelatra manodidina azy, ka raiki-tahotra indrindra izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary hoy ny anjely taminy: Aza matahotra; fa, indro, milaza teny soa mahafaly aminareo aho, dia fifaliana lehibe izay ho an''ny olona rehetra; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'fa Mpamonjy no teraka ho anareo anie ao an-tanànan''i Davida, dia Kristy Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary izao no ho famantarana ho anareo: ianareo hahita Zazakely voahodidina lamban-jaza sady mandry ao am-pihinanam-bilona; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary nisy anjely maro be avy any an-danitra niseho tampoka niaraka tamin''ilay anjely teo ka nidera an''Andriamanitra nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Voninahitra any amin'ny avo Indrindra ho an'Andriamanitra! Ary fiadanana ho etỳ ambonin'ny tany amin'ny olona ankasitrahany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Fankasitrahana ho amin''ny olona'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary tamin''izany rehefa niala teo aminy ireo anjely ireo ka nankany an- danitra, dia niresaka ireo lehilahy mpiandry ondry ka nanao hoe: Andeha isika hankany Betlehema ka hizaha izany zavatra vao tonga izany, izay nampahafantarin''ny Tompo antsika. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dia nandeha faingana izy ka nahita an''i Maria sy Josefa, ary ny Zazakely nandry teo am-pihinanam-bilona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary nony efa nahita izy, dia nampiely izay teny nolazaina taminy ny amin''izany Zaza izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary izay rehetra nandre dia gaga tamin''izay zavatra nolazain''ny mpiandry ondry taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fa Maria kosa nitadidy izany teny rehetra izany ka nieritreritra azy tao am-pony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary ny mpiandry ondry niverina nankalaza ny nidera an''Andriamanitra noho ny zavatra rehetra izay reny ny hitany, araka izay nolazaina taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ary rehefa tapitra ny havaloana, ka hoforana ny Zaza, dia nataony hoe Jesosy ny anarany, araka ilay nataon'ny anjely, fony tsy mbola torontoronina tao an-kibo Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary rehefa tapitra ny andro fidiovany, araka ny lalàn''i Mosesy, dia nitondra Azy niakatra tany Jerosalema izy mba hatolotra ho an''ny Tompo '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'araka ny voasoratra ao amin''ny lalàn''ny Tompo hoe: Ny lahy voalohan-teraka rehetra hatao hoe masina ho an''i Jehovah. (Eks. 13. 2) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'ary mba hanatitra fanatitra araka izay voalaza ao amin''ny lalàn''ny Tompo hoe: domohina roa, na zana-boromailala roa (Lev. 12. 8). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary, indro, nisy lehilahy atao hoe Simeona tao Jerosalema; ary marina sady mpivavaka tsara izany lehilahy izany ka niandry ny fampiononana ny Isiraely; ary ny Fanahy Masina dia tao aminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary efa nambaran''ny Fanahy Masina taminy fa tsy hahita fahafatesana izy mandra-pahitany ny Kristin''ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ary nentin''ny Fanahy Masina niditra teo an-kianjan''ny tempoly izy; ary rehefa nampidirin''ny ray aman-dreniny Jesosy zaza mba hanaovany araka ny fomban''ny lalàna ny amin''ny zaza, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'dia nitrotro Azy izy ka nidera an''Andriamanitra nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tompo ô, ankehitriny ny mpanomponao dia alefanao amin''ny fiadanana Araka ny teninao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Fa ny masoko efa nahita ny famonjenao, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Izay namboarinao teo anatrehan''ny firenena rehetra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia fahazavana hahazava ny firenena sady voninahitry ny Isiraely olonao. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia gaga ny ray aman-dreniny noho ny teny nilazana Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary Simeona nitso-drano azy ireo ka nanao tamin''i Maria, renin''ny Zaza, hoe: Indro, Ity Zaza ity no voatendry ho fandavoana sy ho fananganana ny maro ao amin''ny Isiraely ary ho famantarana holavina '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'ary ny fanahinao aza dia hotsatohana sabatra - mba haseho ny hevitry ny fo maro. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary nisy mpaminanivavy anankiray, dia Ana, zanakavavin''i Fanoela, avy tamin''ny firenen''i Asera; efa anti-panahy tokoa izy ary efa nitoetra tamin''ny vadiny fito taona taorian''ny naha-virijina azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'ary efa mpitondratena tokony ho efatra amby valo-polo taona; ary tsy niala teo an-kianjan''ny tempoly izy, fa nanompo tamin''ny fifadian-kanina sy ny fivavahana andro aman''alina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ary nony niditra tamin''izany ora izany izy, dia nisaotra an''Andriamanitra ka nilaza Azy tamin''izay rehetra niandry ny fanavotana tao Jerosalema. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary rehefa vitany ny zavatra rehetra araka ny lalàn''ny Tompo, dia niverina tany Galilia izy, dia tao Nazareta tanànany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Ary ny Zaza dia nitombo ka nihahery sady feno fahendrena; ary ny fahasoavan'Andriamanitra no tao aminy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ary ny ray aman-dreniny nankany Jerosalema isan-taona, raha avy ny andro firavoravoana amin''ny Paska. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary rehefa roa ambin''ny folo taona Jesosy, dia niakatra izy ireo, araka ny fanao amin''ny andro firavoravoana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ary rehefa tapitra izany andro izany, ka nody izy, Jesosy zaza dia mbola nitoetra tany Jerosalema ihany, nefa tsy fantatry ny ray aman-dreniny izany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'ary satria nataony fa niaraka tamin''ny niara-dia taminy Izy, dia nandeha lalana indray andro izy vao nitady Azy tamin''ny havany sy ny olom-pantany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary nony tsy nahita Azy izy, dia niverina ho any Jerosalema nitady Azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Ary rehefa afaka hateloana, dia hitany teo an-kianjan''ny tempoly Izy nipetraka teo afovoan''ny mpampianatra ka nihaino sady nanontany azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Ary talanjona izay rehetra nandre Azy noho ny fahalalany sy ny famaliany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Ary raha nahita Azy izy, dia talanjona, ka hoy ny reniny taminy: Anaka, nahoana no nanao toy izay taminay Hianao? He! izato alahelon-drainao sy izaho nitady Anao! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Fa hoy Izy taminy: Nahoana no nitady Ahy ianareo? tsy fantatrareo va fa tsy maintsy ho eto an-tranon'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: eto amin''ny raharahan'''
    marker-yv: yv-n
  - type: text
    text: '''ny Raiko Aho? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Nefa tsy azon''ireo ny teny izay nolazainy taminy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Ary niara-nidina taminy nankany Nazareta Izy ka nanoa azy. Ary ny reniny nitahiry izany teny rehetra izany tao am-pony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Ary Jesosy nitombo saina sy tena
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: taona'
    marker-yv: yv-n
  - type: text
    text: ' sady nandroso fitia tamin''Andriamanitra sy ny olona.'
