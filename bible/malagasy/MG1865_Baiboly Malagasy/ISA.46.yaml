document_id: ISA.46
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny fahatsinontsinon'ny sampin'i Babylona, sy fanomezan-toky ny Isiraely hifikitra amin'i Jehovah, ary ny hery sy ny fahalalan'i Jehovah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mangozohozo Bela, efa miraika Nebo, ny sampiny dia nampitondraina ny biby folahina sy ny biby fiompy; Ny zavatra fitondranareo dia asampy ka tonga enta-mavesatra entin''ireo biby reraka. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Miraika sy mangozohozo avokoa izy, ka tsy mahavonjy ny entana akory; Fa na dia ny tenany aza dia lasan-ko babo koa. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mihainoa Ahy, ry taranak''i Jakoba sy izay sisa rehetra amin''ny taranak''Isiraely, izay nobabena hatrany an-kibo sy nentina hatrany am-bohoka: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Na dia mandra-pahantitrareo aza, dia tsy miova Aho, ary mandra-pahafotsy volonareo, dia Izaho ihany no hisahirana mitondra anareo. Izaho no nanao, ka Izaho ihany no hitrotro, eny, izaho no hitondra sy hanafaka. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hampitovinareo amin''iza moa Aho, sy amin''iza no hanoharanareo Ahy ary iza no hataonareo ho tahaka Ahy mba hitahany amiko? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Izay mandraraka volamena avy ao an-kitapo sy mandania volafotsy amin''ny mizana dia manakarama mpanefy volamena mba hanao izany ho andriamanitra, hiankohofany sy hivavahany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dia betainy ho eny an-tsorony iny ka entiny ary apetrany eo amin''ny fitoerany iny, ka dia mitoetra eo; Tsy mahay miala eo amin''ny fitoerany iny; ary na dia misy mitaraina aminy aza, dia tsy mahay mamaly izy, na mahavonjy azy amin''ny fahoriany. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tsarovy izany ka mahereza
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: misehoa ho lehilahy'
    marker-yv: yv-n
  - type: text
    text: ' ianareo eritrereto tsara izany, ry mpiodina. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tsarovy ny zavatra taloha izay efa lasa ela; Fa Izaho no Andriamanitra, ka tsy misy hafa; Izaho no Andriamanitra, ka tsy misy tahaka Ahy, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Izay manambara ny farany hatramin''ny voalohany, ary nanambara hatramin''ny ela izay tsy mbola natao akory, dia ilay manao hoe: Ho tò ny fikasako, ary hefaiko ny sitrapoko rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Izay miantso vorona mpihaza avy any atsinanana, dia lehilahy avy any an-tany lavitra hahefa ny fikasako; sady efa niteny izany Aho no hahatanteraka azy koa, sady nikasa Aho no hahefa azy. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mihainoa Ahy ianareo madi-po izay lavitra ny fahamarinana: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Hampanatoniko ny fahamarinako, ka tsy ho lavitra intsony; ary ny famonjeko tsy hitaredretra; fa hametraka famonjena ao Ziona Aho sy ny voninahitro ho an'ny Isiraely.
