document_id: PSA.21,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fisaorana atao rehefa miverina avy any an-tafika ny mpanjaka
  - type: text
    content: 'Ho an''ny mpiventy hira. Salamo nataon''i Davida. Jehovah ô, ny herinao no hifalian''ny mpanjaka; ary endrey ny haben''ny hiravoravoany amin''ny famonjenao! '
  '10':
  - type: text
    content: Ny zanany
  - type: note
    content: 'Heb: vokany'
  - type: text
    content: ' haringanao tsy ho eo amin''ny tany, ary ny taranany tsy ho eo amin''ny zanak''olombelona; '
  '11':
  - type: text
    content: 'Fa nikasa hanisy ratsy anao izy, ka namoron-kevi-dratsy fa tsy nahefa. '
  '12':
  - type: text
    content: 'Fa hampiamboho azy ianao; ny tsipìkanao no ikendrenao ny tavany. '
  '13':
  - type: text
    content: Misandrata amin'ny herinao, Jehovah ô, hihira sy hankalaza ny herinao izahay.
  '2':
  - type: text
    content: 'Ny nirin''ny fony dia nomenao azy, ary ny nangatahin''ny molony tsy mba nolavinao. '
  '3':
  - type: text
    content: 'Fa notsenainao fitahiana soa izy; teo an-dohany nasianao satro-boninahitra tena volamena. '
  '4':
  - type: text
    content: 'Aina no nangatahiny taminao, dia nomenao azy izany, dia andro lava mandrakizay doria. '
  '5':
  - type: text
    content: 'Lehibe ny voninahiny amin''ny famonjenao; Laza sy voninahitra no nataonao taminy. '
  '6':
  - type: text
    content: 'Fa nataonao ho fitahiana mandrakizay izy; ampifalinao indrindra amin''ny tavanao izy. '
  '7':
  - type: text
    content: Fa ny mpanjaka matoky an'i Jehovah, ary noho ny famindram-pon'ny Avo Indrindra dia tsy hangozohozo izy.
  '8':
  - type: text
    content: 'Ho azon''ny tananao ny fahavalonao rehetra; eny, ho azon''ny tananao ankavanana ny mankahala anao; '
  '9':
  - type: text
    content: 'Hataonao tahaka ny fatana misy afo mirehitra izy amin''ny andro hisehoanao, Jehovah handany azy amin''ny fahatezerany, ary handevona azy ny afo. '
