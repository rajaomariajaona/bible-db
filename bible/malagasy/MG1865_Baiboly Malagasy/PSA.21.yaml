document_id: PSA.21,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fisaorana atao rehefa miverina avy any an-tafika ny mpanjaka
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ho an''ny mpiventy hira. Salamo nataon''i Davida. Jehovah ô, ny herinao no hifalian''ny mpanjaka; ary endrey ny haben''ny hiravoravoany amin''ny famonjenao! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny zanany
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Heb: vokany'
      marker-yv: yv-n
    - type: text
      text: ' haringanao tsy ho eo amin''ny tany, ary ny taranany tsy ho eo amin''ny zanak''olombelona; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa nikasa hanisy ratsy anao izy, ka namoron-kevi-dratsy fa tsy nahefa. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Fa hampiamboho azy ianao; ny tsipìkanao no ikendrenao ny tavany. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Misandrata amin'ny herinao, Jehovah ô, hihira sy hankalaza ny herinao izahay.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ny nirin''ny fony dia nomenao azy, ary ny nangatahin''ny molony tsy mba nolavinao. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Fa notsenainao fitahiana soa izy; teo an-dohany nasianao satro-boninahitra tena volamena. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Aina no nangatahiny taminao, dia nomenao azy izany, dia andro lava mandrakizay doria. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Lehibe ny voninahiny amin''ny famonjenao; Laza sy voninahitra no nataonao taminy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa nataonao ho fitahiana mandrakizay izy; ampifalinao indrindra amin''ny tavanao izy. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Fa ny mpanjaka matoky an'i Jehovah, ary noho ny famindram-pon'ny Avo Indrindra dia tsy hangozohozo izy.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ho azon''ny tananao ny fahavalonao rehetra; eny, ho azon''ny tananao ankavanana ny mankahala anao; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Hataonao tahaka ny fatana misy afo mirehitra izy amin''ny andro hisehoanao, Jehovah handany azy amin''ny fahatezerany, ary handevona azy ny afo. '
