document_id: 2PE.2
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny hahafantarana ny mpampianatra sandoka, sy faminaniana ny handringanana azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Efa nisy mpaminany sandoka teo amin'ny olona Isiraely, ary hisy koa mpampianatra sandoka tahaka izany eo aminareo, izay hahatonga mangingina sain-diso
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: fitokoana'
    marker-yv: yv-n
  - type: text
    text: ' mahavery ary handà ny Tompo Izay nividy azy aza ka hahatonga fahaverezana tampoka ho amin''ny tenany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary maro no hanaraka ny fijejojejoany; ka ireny no hitenenan-dratsy
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. hanaovana blasfemia, izahao Mat.9.3
    marker-yv: yv-n
  - type: text
    text: ' ny lalan''ny fahamarinana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary amin''ny hafatratry ny fitiavany harena no hanaovany varotra anareo amin''ny teny mamitaka; efa ela izay no tsy nijanonjanona ny fitsarana ireny, ary tsy rendremana ny fahaverezany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fa raha tsy navelan'Andriamanitra ny anjely fony nanota, fa noroahiny ho any amin'ny helo ka natolony ho ao an-davaka maizina
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (nafatony tamin''ny gadra fahamaizinana)'
    marker-yv: yv-n
  - type: text
    text: ' mba hotehirizina ho amin''ny fitsarana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ary raha tsy namela izao rehetra izao taloha Izy, fa namonjy an''i Noa, mpitory ny fahamarinana, sy ireo fito, fony nahatonga ny safo-drano tamin''ny ratsy fanahy teo amin''izao tontolo izao,- '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ary raha nataony nanjary lavenona ny tanàna Sodoma sy Gomora ka nohelohiny horavana ary nataony fananarana ho an''izay ratsy fanahy ato aoriana,- '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'fa Lota marina, izay ory dia ory noho ny fijejojejoan''ny olona ratsy fanahy, no novonjeny ho afaka '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '(fa izany lehilahy marina izany, raha nitoetra teo aminy, dia nahory loatra ny fanahiny marina isan''andro isan''andro noho ny nahitany sy ny nandrenesany ny fandikan''ireo ny lalàna): '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'dia fantatry ny Tompo izay hamonjeny ny tsara fanahy amin''ny fakam-panahy sy ny hitehirizany ny olona tsy marina amin''ny fijaliana ho amin''ny andro fitsarana,- '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'indrindra fa izay mandeha araka ny fitarihan''ny nofo hila zava-mahaloto ka manamavo ny manana fahalehibiazana. Ireo efa olona sahisahy, mitompo teny fantatra sady tsy matahotra hiteny ratsy ny manana voninahitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa ny anjely aza, izay mihoatra amin''ny tanjaka sy ny hery, tsy mitondra fiampangana hitenenan-dratsy azy eo anatrehan''ny Tompo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa ireo kosa izay miteny ratsy ny zavatra tsy fantany (tahaka ny biby tsy manan-tsaina, fa zava-manan''aina fotsiny ihany, izay teraka ho fisambotra sy ho famono) dia haringana tokoa amin''ny fahalotoany, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ary hiharan'ny ratsy ho valin'ny faharatsiany izy. Ataony ho zava-mahafinaritra ny velona vetivety amin'ny fy, ka be pentimpentina sy tsiny izy sady velona amin'ny fy eo amin'ny fanasam-pifankatiavany
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: amin''ny famitahany'
    marker-yv: yv-n
  - type: text
    text: ', raha miara-mihinana aminareo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'manana maso feno fijangajangana, izay tsy mety mitsahatra amin''ny fahotana: dia mamitaka ny tsy miorina tsara izy; ary mampaharatra ny fony amin''ny hafatratry ny fitiavany harena, dia zanaky ny fanozonana izy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: efa niala tamin'ny lalana mahitsy izy ka nivily nanaraka ny lalan'i Balama, zanak'i Beora
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Bosora'
    marker-yv: yv-n
  - type: text
    text: ', izay tia ny tambin''ny tsi-fahamarinana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'nefa voanatra izy noho ny fahotany: ny boriky moana efa nanao feon''olona ka nisakana ny hadalan''ilay mpaminany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ireo efa loharano ritra, zavona entin''ny tafio-drivotra, ka efa tehirizina ho azy ny fahamaintisan''ny maizina. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Fa mandoka fatratra ny zava-poana ireo, ka ny filan'ny nofo, dia ny fijejojejoana, no entiny mamitaka ny olona izay saiky afaka tsy ho naman'ny velona eo amin'ny fahadisoana intsony
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Satria velona amin''ny filan''ny nofo ireo, dia ny fandokafany fatratra ny zava-poana no entiny mitaona ny olona izay saiky afaka tsy ho naman''ny velona eo amin''ny fahadisoana intsony ho amin''ny fijejojejoana'
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'fahafahana no ampanantenainy ireny, kanjo ny tenany aza dia andevon''ny fahalotoana; efa izay maharesy ny olona dia mahandevo avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa raha misy efa afaka amin''ny fahalotoan''izao tontolo izao noho ny fahalalana tsara an''i Jesosy Kristy, Tompo sy Mpamonjy, nefa voasingotr''izany indray ka resy, ny farany dia ratsy noho ny voalohany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa tsara aminy raha tsy nahalala ny lalan''ny fahamarinana toy izay hiala amin''ny didy masina natolotra azy, rehefa nahalala izany izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Efa mihatra aminy ny ohabolana marina hoe: "Ny amboa miverina indray amin''ny loany" (Oha. 26. 11), ary: "Ny kisoavavy efa nisasa dia mihosim-potaka indray."'
