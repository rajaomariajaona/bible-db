document_id: ROM.4,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Inona ary no holazaintsika ho efa azon''i Abrahama, razantsika araka ny nofo? '
  '10':
  - type: text
    content: 'Ary ahoana no nanisana izany? Tamin''izy efa voafora va, sa fony izy tsy mbola voafora? Tsy tamin''izy efa voafora tsy akory, fa fony izy tsy mbola voafora. '
  '11':
  - type: text
    content: 'Ary ny famorana, izay famantarana, dia noraisiny ho tombo-kasen''ny fahamarinana amin''ny finoana izay nananany fony izy tsy mbola voafora, mba ho rain''ny olona rehetra izay mino izy, na dia ny tsy voafora aza, mba hisaina ho an''ireny ny fahamarinana, '
  '12':
  - type: text
    content: 'ary ho rain''ny voafora, dia tsy izay voafora ihany, fa izay mandeha araka ny dian''ny finoan''i Abrahama razantsika koa, izay nananany fony izy tsy mbola voafora. '
  '13':
  - type: text
    content: 'Fa tsy lalàna, fa fahamarinana amin''ny finoana, no nahazoan''i Abrahama sy ny taranany ny teny fikasana ho mpandova izao tontolo izao izy. '
  '14':
  - type: text
    content: 'Fa raha izay amin''ny lalàna no mpandova, dia efa foana ny finoana, ary efa tsinontsinona ny teny fikasana; '
  '15':
  - type: text
    content: 'fa ny lalàna mahatonga fahatezerana; fa raha tsy misy lalàna, dia tsy misy fandikan-dalàna. '
  '16':
  - type: text
    content: 'Koa finoana no andovana, mba ho araka ny fahasoavana, hahatò ny teny fikasana ho an''ny taranaka rehetra,- tsy ho an''izay amin''ny lalàna ihany, fa ho an''izay amin''ny finoan''i Abrahama koa, dia ilay razantsika rehetra - '
  '17':
  - type: text
    content: 'araka ny voasoratra hoe: Nataoko ho rain''ny firenena maro ianao (Gen. 17. 5) - teo anatrehan''izay ninoany, dia Andriamanitra Izay mamelona ny maty sy miantso ny tsy misy toy ny misy. '
  '18':
  - type: text
    content: 'Ary na dia efa tsy nisy fanantenana aza, dia nanantena ihany izy ka nino, mba ho rain''ny firenena maro; araka ny voalaza hoe: Ho tahaka izany ny taranakao (Gen. 15. 5). '
  '19':
  - type: text
    content: 'Ary satria tsy mba nalemy finoana izy, dia nihevitra ny tenany izay efa hoatra ny maty (fa efa tokony ho zato taona izy) sy ny fahafatesan''ny kibon''i Saraha, '
  '2':
  - type: text
    content: 'Fa raha asa no nanamarinana an''i Abrahama, dia misy hireharehany ihany, nefa tsy amin''Andriamanitra. '
  '20':
  - type: text
    content: 'ary tsy niahanahana ny amin''ny teny fikasan''Andriamanitra tamin''ny tsi-finoana izy, fa nampaherezin''ny finoana ka nanome voninahitra an''Andriamanitra '
  '21':
  - type: text
    content: 'ary natoky indrindra fa izay nolazainy dia hainy hatao koa. '
  '22':
  - type: text
    content: 'Dia nisaina ho fahamarinany izany. '
  '23':
  - type: text
    content: 'Nefa tsy ho azy ihany no nanoratana fa nisaina ho azy izany, '
  '24':
  - type: text
    content: 'fa ho antsika izay hanisana izany koa, dia isika izay mino Ilay nanangana an''i Jesosy Tompontsika tamin''ny maty, '
  '25':
  - type: text
    content: Izay natolotra noho ny fahadisoantsika ka natsangana indray ho fanamarinana antsika.
  '3':
  - type: text
    content: 'Fa ahoana hoy ny Soratra Masina? Ary Abrahama nino an''Andriamanitra, ka dia nisaina ho fahamarinany izany (Gen. 15. 6). '
  '4':
  - type: text
    content: 'Ary ho an''izay miasa, dia tsy isaina ho fahasoavana ny karama, fa ho trosa. '
  '5':
  - type: text
    content: 'Fa ho an''izay tsy miasa kosa, fa mino Izay manamarina ny ratsy fanahy, dia ny finoany no isaina ho fahamarinana. '
  '6':
  - type: text
    content: 'Dia araka izany koa no ilazan''i Davida fa sambatra ny olona izay isain''Andriamanitra fahamarinana tsy amin''ny asa, hoe: '
  '7':
  - type: text
    content: 'Sambatra izay voavela ny helony sy voasarona ny fahotany. '
  '8':
  - type: text
    content: 'Sambatra izay olona tsy hisain''i Jehovah heloka (Sal. 32. 1, 2). '
  '9':
  - type: text
    content: 'Koa izany fahasambarana izany moa an''ny voafora ihany va, sa an''ny tsy voafora koa? fa lazaintsika fa ny finoana no nisaina ho fahamarinan''i Abrahama. '
