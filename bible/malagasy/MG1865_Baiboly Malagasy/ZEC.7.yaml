document_id: ZEC.7
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Valin'ny fanontanian'ny avy any Betela ny amin'ny andro fifadiana, ary filazana ny loza hamelezan'i Jehovah ny olony, sy ny mbola hitahiany azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary tamin''ny taona fahefatra nanjakan''i Dariosa no nahatongavan''ny tenin''i Jehovah tamin''i Zakaria, tamin''ny andro fahefatra tamin''ny volana fahasivy (Kisleva izany); '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ary Betela efa naniraka an'i Serezera sy Regema-meleka sy ny olony
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'na: ary ny any Betela, dia Serezera... efa naniraka'
    marker-yv: yv-n
  - type: text
    text: ' hifona amin''i Jehovah '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ka hiteny amin''ny mpisoron''ny tranon''i Jehovah, Tompon''ny maro, sy amin''ny mpaminany hoe: Hitomany amin''ny volana fahadimy va aho ka hifady toy ny fanaoko tamin''ny taon-dasa ela? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia tonga tamiko ny tenin''i Jehovah, Tompon''ny maro, nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Lazao amin''ny vahoaka rehetra amin''ny tany sy amin''ny mpisorona hoe: Raha nifady hanina sy nitomany tamin''ny volana fahadimy sy ny fahafito tamin''izao fito-polo taona izao, ianareo moa nifady ho Ahy va ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary raha mihinana sy misotro ianareo. moa tsy mihinana sy misotro ho an'ny tenanareo ihany va ianareo
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'na: moa tsy ianareo ihany va no mihinana sy misotro'
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Moa tsy tokony ho nihaino ny teny izay nasain'i Jehovah nantsoin'ny mpaminany fahiny va ianareo, fony mbola nonenana sy nandry fahizay Jerosalema sy ny zana-bohiny manodidina azy, sady nonenana koa ny tany atsimo sy ny tany lemaka amoron-tsiraka
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'na: sefela'
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary tonga tamin''i Zakaria ny tenin''i Jehovah nanao hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Izao no lazain''i Jehovah, Tompon''ny maro: Manaova fitsarana marina, ary samia mifampiantra sy mifamindra fo amin''ny rahalahiny avy; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ary aza mampahory ny mpitondratena na ny kamboty, na ny vahiny, na ny mahantra; ary aza misy mihevitra ao am-ponareo hanisy ratsy ny rahalahinareo ianareo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nefa tsy nety nihaino ireny, fa nampihemotra ny sorony, ary nataony lalodalovana ny sofiny; mba tsy handre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Eny, nanao ny fony ho mafy,toy ny diamondra Izy, mba tsy hihaino ny lalàna sy ny teny izay nampitondrain''ny Fanahin''i Jehovah, Tompon''ny maro, holazain''ny mpaminany fahiny, ka dia tonga izay fahatezerana mafy avy tamin''i Jehovah, Tompon''ny maro, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Koa toy ny niantsoan''ireny, fa tsy nohenoiny, dia ho toy izany no hiantsoany kosa, fa tsy hohenoiko, hoy Jehovah, Tompon''ny maro; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: fa haeliko amin'ny tafio-drivotra ho any amin'ny firenena rehetra izay tsy fantany izy. Toy izany no nahalao ny tany tao aoriany, ka tsy nisy olona nandroso na niverina; fa nahatonga ny tany mahafinaritra ho tany lao izy.
