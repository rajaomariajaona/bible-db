document_id: ZEC.7,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Valin'ny fanontanian'ny avy any Betela ny amin'ny andro fifadiana, ary filazana ny loza hamelezan'i Jehovah ny olony, sy ny mbola hitahiany azy
  - type: text
    content: 'Ary tamin''ny taona fahefatra nanjakan''i Dariosa no nahatongavan''ny tenin''i Jehovah tamin''i Zakaria, tamin''ny andro fahefatra tamin''ny volana fahasivy (Kisleva izany); '
  '10':
  - type: text
    content: 'ary aza mampahory ny mpitondratena na ny kamboty, na ny vahiny, na ny mahantra; ary aza misy mihevitra ao am-ponareo hanisy ratsy ny rahalahinareo ianareo. '
  '11':
  - type: text
    content: 'Nefa tsy nety nihaino ireny, fa nampihemotra ny sorony, ary nataony lalodalovana ny sofiny; mba tsy handre. '
  '12':
  - type: text
    content: 'Eny, nanao ny fony ho mafy,toy ny diamondra Izy, mba tsy hihaino ny lalàna sy ny teny izay nampitondrain''ny Fanahin''i Jehovah, Tompon''ny maro, holazain''ny mpaminany fahiny, ka dia tonga izay fahatezerana mafy avy tamin''i Jehovah, Tompon''ny maro, '
  '13':
  - type: text
    content: 'Koa toy ny niantsoan''ireny, fa tsy nohenoiny, dia ho toy izany no hiantsoany kosa, fa tsy hohenoiko, hoy Jehovah, Tompon''ny maro; '
  '14':
  - type: text
    content: fa haeliko amin'ny tafio-drivotra ho any amin'ny firenena rehetra izay tsy fantany izy. Toy izany no nahalao ny tany tao aoriany, ka tsy nisy olona nandroso na niverina; fa nahatonga ny tany mahafinaritra ho tany lao izy.
  '2':
  - type: text
    content: ary Betela efa naniraka an'i Serezera sy Regema-meleka sy ny olony
  - type: note
    content: 'na: ary ny any Betela, dia Serezera... efa naniraka'
  - type: text
    content: ' hifona amin''i Jehovah '
  '3':
  - type: text
    content: 'ka hiteny amin''ny mpisoron''ny tranon''i Jehovah, Tompon''ny maro, sy amin''ny mpaminany hoe: Hitomany amin''ny volana fahadimy va aho ka hifady toy ny fanaoko tamin''ny taon-dasa ela? '
  '4':
  - type: text
    content: 'Dia tonga tamiko ny tenin''i Jehovah, Tompon''ny maro, nanao hoe: '
  '5':
  - type: text
    content: 'Lazao amin''ny vahoaka rehetra amin''ny tany sy amin''ny mpisorona hoe: Raha nifady hanina sy nitomany tamin''ny volana fahadimy sy ny fahafito tamin''izao fito-polo taona izao, ianareo moa nifady ho Ahy va ianareo? '
  '6':
  - type: text
    content: Ary raha mihinana sy misotro ianareo. moa tsy mihinana sy misotro ho an'ny tenanareo ihany va ianareo
  - type: note
    content: 'na: moa tsy ianareo ihany va no mihinana sy misotro'
  - type: text
    content: '? '
  '7':
  - type: text
    content: Moa tsy tokony ho nihaino ny teny izay nasain'i Jehovah nantsoin'ny mpaminany fahiny va ianareo, fony mbola nonenana sy nandry fahizay Jerosalema sy ny zana-bohiny manodidina azy, sady nonenana koa ny tany atsimo sy ny tany lemaka amoron-tsiraka
  - type: note
    content: 'na: sefela'
  - type: text
    content: '? '
  '8':
  - type: text
    content: 'Ary tonga tamin''i Zakaria ny tenin''i Jehovah nanao hoe: '
  '9':
  - type: text
    content: 'Izao no lazain''i Jehovah, Tompon''ny maro: Manaova fitsarana marina, ary samia mifampiantra sy mifamindra fo amin''ny rahalahiny avy; '
