document_id: HEB.13,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Anatra sy fanaovam-beloma
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Aoka haharitra ny fitiavana ny rahalahy. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Isika manana alitara, izay tsy ananan''ny mpanompo ny tabernakely fahefana hihinanana. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Fa rehefa nentin''ny mpisoronabe niditra ho ao amin''ny fitoerana masina ho fanatitra noho ny ota ny ran''ny biby, dia nodorana teny ivelan''ny toby ny fatiny. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary amin''izany Jesosy koa dia niaritra teny ivelan''ny vavahady mba hahamasina ny olona amin''ny ràny. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Koa aoka isika hivoaka hankeo aminy eo ivelan''ny toby, mitondra ny latsa izay nentiny. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Fa etỳ isika tsy manana tanàna maharitra, fa mitady ny ho avy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Koa aoka isika hanatitra ny fanati-piderana amin''ny alalany ho an''Andriamanitra mandrakariva, dia ny vokatry ny molotra izay manaiky ny anarany. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Fa aza manadino hanao soa sy hiantra; fa fanatitra toy izany no sitrak''Andriamanitra. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Manekè ny mpitondra anareo, ka manoava azy; fa izy miambina ny fanahinareo araka izay tokony hataon'ny olona mbola hampamoahina, mba hanaovany izany amin'ny fifaliana, ta tsy amin'ny fisentoana; fa tsy hahasoa anareo izany.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Mivavaha ho anay; fa matoky izahay fa manana fieritreretana tsara ka te-hitondra tena tsara amin''ny zavatra rehetra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Nefa mainka mangataka anareo hanao izany aho, mba hampodina faingampaingana kokoa ho aminareo.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Aza manadino ny fampiantranoam-bahiny; fa tamin''izany dia nampiantrano anjely ny sasany, nefa tsy fantany. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ary Andriamanitry ny fiadanana, Izay nitondra an'i Jesosy Tompontsika, Mpiandry ondry lehibe, hiala amin'ny maty, mitondra ny ran'ny fanekena mandrakizay
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Mpiandry ondry lehibe amin''ny ran''ny fanekena mandrakizay hiala amin''ny maty'
      marker-yv: yv-n
    - type: text
      text: ', '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Izy anie hahatanteraka anareo amin'ny tsara
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: asa tsara'
      marker-yv: yv-n
    - type: text
      text: ' rehetra hanao ny sitrapony ka hiasa ao anatinareo'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: (anatintsika)'
      marker-yv: yv-n
    - type: text
      text: ' izay ankasitrahana eo imasony amin''ny alalan''i Jesosy Kristy; ho Azy anie ny voninahitra mandrakizay mandrakizay. Amena. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary mangataka aminareo aho, ry rahalahy, zakao ny teny fananarana; fa efa nanoratra epistily fohifohy ihany ho aminareo aho. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Aoka ho fantatrareo fa efa afaka Timoty rahalahintsika; koa raha tàhiny handeha faingana izy, dia hiaraka aminy hamangy anareo aho. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Manaova veloma amin''izay rehetra mpitondra anareo sy ny olona masina rehetra. Izay an''Italia dia manao veloma anareo. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ho aminareo rehetra anie ny fahasoavana. Amena.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tsarovy izay mifatotra, ho toy ny miara-mifatotra aminy ianareo, ary izay ampahorina, satria mbola eo amin''ny tena koa ianareo. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Aoka hanan-kaja amin''ny olona rehetra ny fanambadiana, ary aoka tsy ho voaloto ny fandriana; fa ny mpijangajanga sy ny mpaka vadin''olona dia hohelohin''Andriamanitra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Aoka tsy ho amin''ny fitiavam-bola ny toe-tsainareo, fa mianina amin''izay anananareo; fa hoy Izy: "Izaho tsy handao anao mihitsy na hahafoy anao akory" (Jos. 1.5). '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ka dia sahy manao hoe isika: "Jehovah no Mpamonjy ahy, ka tsy hatahotra aho; Inona no azon''ny olona atao amiko?" (Sal 118. 6). '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tsarovy ny mpitondra anareo, izay efa nitory ny tenin'Andriamanitra taminareo; hevero ny niafaran'ny fiainany, ka araho ny finoany.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Jesosy Kristy no tsy miova omaly sy anio ary mandrakizay. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Aza mety havilin''izay fampianarana maro hafahafa ianareo. Fa tsara raha ampiorenina amin''ny fahasoavana ny fo, fa tsy amin''ny hanina, izay tsy mahasoa ny mahavatra azy. '
