document_id: PSA.46,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Fahatokiana an'Andriamanitra fiarovana mafy
  - type: text
    content: 'Ho an''ny mpiventy hira. Nataon''ny Koraita; At-alamoth; Tonon-kira. Andriamanitra no aro sy hery ho antsika; Mpamonjy mora azo indrindra amin''ny fahoriana Izy. '
  '10':
  - type: text
    content: Mitsahara, ka aoka ho fantatrareo fa Izaho no Andriamanitra; hisandratra amin'ny firenen-tsamy hafa Aho, hisandratra amin'ny tany Aho.
  '11':
  - type: text
    content: Jehovah, Tompon'ny maro, no momba antsika; Andriamanitr'i Jakoba no aro ho antsika.
  '2':
  - type: text
    content: 'Koa izany no tsy hatahorantsika, na dia ho levona aza ny tany, na mifindra ho ao anatin''ny ranomasina aza ny tendrombohitra, '
  '3':
  - type: text
    content: Na mirohondrohona sy misamboaravoara aza ny onjany, ka mihorohoro ny tendrombohitra noho ny fisafoakany.
  '4':
  - type: text
    content: 'Misy ony, koa ny sampany dia mampifaly ny tanànan''Andriamanitra, Fonena-masin''ny Avo Indrindra. '
  '5':
  - type: text
    content: 'Andriamanitra no eo afovoany, ka tsy mba hihetsika izy; Andriamanitra no hamonjy azy, rehefa madiva ho maraina ny andro. '
  '6':
  - type: text
    content: 'Nitabataba ny firenen-tsamy hafa, nikotrankotrana ny fanjakana maro; nanonona ny feony Izy, ka niempo ny tany. '
  '7':
  - type: text
    content: Jehovah, Tompon'ny maro, no momba antsika; Andriamanitr'i Jakoba no fiarovana avo ho antsika.
  '8':
  - type: text
    content: 'Avia, jereo ny asan''i Jehovah, izay mahatonga faharavana etỳ an-tany; '
  '9':
  - type: text
    content: Mampitsahatra ady hatramin'ny faran'ny tany Izy; manapaka ny tsipìka sy manito ny lefona Izy, ary mandoro ny sariety amin'ny afo.
