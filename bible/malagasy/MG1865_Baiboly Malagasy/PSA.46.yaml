document_id: PSA.46
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fahatokiana an'Andriamanitra fiarovana mafy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ho an''ny mpiventy hira. Nataon''ny Koraita; At-alamoth; Tonon-kira. Andriamanitra no aro sy hery ho antsika; Mpamonjy mora azo indrindra amin''ny fahoriana Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Koa izany no tsy hatahorantsika, na dia ho levona aza ny tany, na mifindra ho ao anatin''ny ranomasina aza ny tendrombohitra, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Na mirohondrohona sy misamboaravoara aza ny onjany, ka mihorohoro ny tendrombohitra noho ny fisafoakany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Misy ony, koa ny sampany dia mampifaly ny tanànan''Andriamanitra, Fonena-masin''ny Avo Indrindra. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Andriamanitra no eo afovoany, ka tsy mba hihetsika izy; Andriamanitra no hamonjy azy, rehefa madiva ho maraina ny andro. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nitabataba ny firenen-tsamy hafa, nikotrankotrana ny fanjakana maro; nanonona ny feony Izy, ka niempo ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Jehovah, Tompon'ny maro, no momba antsika; Andriamanitr'i Jakoba no fiarovana avo ho antsika.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Avia, jereo ny asan''i Jehovah, izay mahatonga faharavana etỳ an-tany; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mampitsahatra ady hatramin'ny faran'ny tany Izy; manapaka ny tsipìka sy manito ny lefona Izy, ary mandoro ny sariety amin'ny afo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mitsahara, ka aoka ho fantatrareo fa Izaho no Andriamanitra; hisandratra amin'ny firenen-tsamy hafa Aho, hisandratra amin'ny tany Aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Jehovah, Tompon'ny maro, no momba antsika; Andriamanitr'i Jakoba no aro ho antsika.
