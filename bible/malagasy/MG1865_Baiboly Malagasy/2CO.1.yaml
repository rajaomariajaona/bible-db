document_id: 2CO.1
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fiarahabana sy fisaorana nataon'i Paoly noho ny nampiononan'Andriamanitra azy. Ny amin'ny nahasampona an'i Paoly tsy hankany Makedonia, sy hafatra ny amin'ny handraisana ilay efa nesorina, ary fisaoran'i Paoly an'Andriamanitra noho ny nitahiany ny tori-teniny
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paoly, Apostolin''i Kristy Jesosy noho ny sitrapon''Andriamanitra, ary Timoty rahalahy, mamangy ny fiangonan''Andriamanitra izay any Korinto mbamin''ny olona masina rehetra eran''i Akaia: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ho aminareo anie ny fahasoavana sy ny fiadanana avy amin'Andriamanitra Raintsika sy Jesosy Kristy Tompo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Isaorana anie Andriamanitra, Rain''i Jesosy Kristy Tompontsika, Rain''ny famindram-po sady Andriamanitry ny fampiononana rehetra, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izay mampionona anay amin''ny fahorianay rehetra mba hahaizanay mampionona izay rehetra mitondra fahoriana kosa, anin''ny fampiononana izay ampiononan''Andriamanitra anay. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fa araka ny haben''ny fijalian''i Kristy mihatra aminay no haben''ny fampiononana anay kosa amin''ny alalan''i Kristy. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary raha ampahorina izahay, dia ho fampiononana sy famonjena anareo izany; ary raha ampiononina izahay, dia ho fampiononana anareo izany, ka miasa amin''ny fiaretanareo fahoriana mitovy indrindra amin''izay entinay. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary miorina tsara ny fanantenanay anareo, satria fantatray fa tahaka ny iombonanareo ny fahoriana no iombonanareo ny fampiononana koa. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa tsy tianay tsy ho fantatrareo, ry rahalahy, ny amin''ny fahoriana izay nanjo anay tany Asia, fa novesarana indrindra mihoatra noho ny zakanay izahay, ka dia efa nafoinay na dia ny ainay aza; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'eny, tsy nanampo izay ho velona intsony izahay, mba tsy hitokianay amin''ny tenanay, fa amin''Andriamanitra, Izay manangana ny maty ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Izy no nahafaka anay tamin''izao fahafatesana lehibe izao, ary mbola hanafaka ihany; eny, Izy no antenainay fa mbola hanafaka anay koa, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'satria ianareo koa miara-miasa ho anay amin''ny fivavahanareo mba hisaoran''ny maro ny aminay noho ny fahasoavana azonay tamin''ny nataon''ny maro. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Fa izao no ataonay ho voninahitray: ny fieritreretanay no vavolombelona fa tamin''ny fahamasinana sy ny fahadiovam-po avy amin''Andriamanitra, tsy tamin''ny fahendren''ny nofo, fa tamin''ny fahasoavan''Andriamanitra, no nitondranay tena teo amin''izao tontolo izao, mainka fa teo aminareo. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa tsy manoratra teny hafa aminareo izahay, afa-tsy izay vakinareo na izay fantatrareo; ary manantena aho fa mbola ho fantatrareo ihany hatramin''ny farany aza, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'toy ny efa fantapantatrareo ihany fa voninahitrareo izahay, dia tahaka anareo kosa no voninahitray amin''ny andron''i Jesosy Tompontsika. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary tamin''izao fahatokiana izao dia nikasa hankatỳ aminareo aloha aho (mba hahazoanareo soa fanindroany), '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ary hankany Makedonia aho, raha avy atỳ aminareo, ary dia vao hiverina ho atỳ aminareo indray raha avy any Makedonia, ary mba haterinareo ho any Jodia. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Koa raha nikasa izany aho, moa nanao kitoatoa va aho? Ary izay zavatra kasaiko, moa kasaiko araka ny nofo va, mba hanaovako eny eny foana, sy tsia tsia foana? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fa raha mahatoky koa Andriamanitra, ny teninay taminareo dia tsy eny sy tsia; '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'fa ny Zanak''Andriamanitra, dia Jesosy Kristy, Izay notorinay teo aminareo, dia izaho sy Silasy ary Timoty, dia tsy eny sy tsia, fa ao aminy dia eny ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fa na firy na firy ny teny fikasan''Andriamanitra, dia ao aminy ny eny, ary amin''ny alalany koa ny Amena, ho voninahitr''Andriamanitra amin''ny ataonay. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fa Izay mampitoetra anay mbaminareo ao amin''i Kristy sady nanosotra antsika dia Andriamanitra, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Izay nanisy tombo-kase antsika koa ka nanome ny Fanahy ho santatra ato am-pontsika. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary izaho miantso an''Andriamanitra ho vavolombelona ny amin''ny fanahiko, fa ny fialàko nenina aminareo ihany no tsy mbola nankanesako tatỳ Korinto. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Kanefa tsy mihambo ho tompon'ny finoanareo izahay, fa mpiara-miasa hampandroso ny fifalianareo, satria finoana no itoeranareo.
