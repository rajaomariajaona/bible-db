document_id: JOB.25
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny teny fanintelony nataon'i Bilidada
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dia namaly Bildada Sohita ka nanao hoe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fanapahana sy fampahatahorana no ao aminy, manao fihavanana any amin'ny avo Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Azo isaina va ny miaramilany? Ary fahazavan'iza no tsy ihoaran'ny Azy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: Amin''iza no tsy iposahan''ny fahazavany?'
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ary aiza no hahamarina ny zanak'olombelona eo anatrehan'Andriamanitra? Ary aiza no hadio izay tera-behivavy?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Indro, ny volana aza tsy mangarangarana, ary ny kintana aza tsy madio eo imasony;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Koa mainka fa ny olombelona, izay kankana, ary ny zanak'olombelona, izay olitra.
