document_id: NEH.1
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ny tantaran'i Nehemia, zanak'i Hakalia. Tamin'ny volana Kisleo tamin'ny taona faharoa-polo, raha tany an-dapa any Sosana aho,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'dia tonga Hanany, anankiray amin''ny rahalahiko, mbamin''ny lehilahy sasany avy tany Joda; ary nanontaniako azy ny amin''ny Jiosy efa afaka, izay sisa tamin''ny fahababoana, ary ny amin''i Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ka hoy no navaliny ahy: Ny sisa tamin''ny fahababoana izay any amin''ny tany any dia mitondra fahoriana be sy latsa; ary voarodana ny mandan''i Jerosalema sady nodoran''ny afo ny vavahadiny. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary rehefa nandre izany teny izany aho, dia nipetraka nitomany sady niferinaina andro maro ary nifady hanina sy nivavaka teo anatrehan''Andriamanitry ny lanitra '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ka nanao hoe: Indrisy! ry Jehovah, Andriamanitry ny lanitra, Andriamanitra lehibe sy mahatahotra, Izay mitandrina fanekena sy famindram-po amin''izay tia Azy sy mitandrina ny didiny, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'aoka hihaino ny sofinao ary hihiratra ny masonao, mba hohenoinao ny vavaky ny mpanomponao, izay ataoko eto anatrehanao ankehitriny andro aman''alina ho an''ny Zanak''Isiraely mpanomponao sy izay anekeko ny fahotan''ny Zanak''Isiraely, izay efa nanotanay taminao; fa izaho sy ny mpianakavin-draiko dia samy efa nanota avokoa. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Efa nanao izay ratsy indrindra taminao izahay ka tsy nitandrina ny didy, na ny lalàna, na ny fitsipika, izay nandidianao an''i Mosesy mpanomponao. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hotsarovanao anie ilay teny nandidianao an''i Mosesy mpanomponao hoe: Raha manao izay mahadiso ianareo, dia hampiely anareo any amin''ny firenena maro Aho; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'nefa raha miverina amiko kosa ianareo ka mitandrina ny didiko sy mankatò azy, na dia hisy voaroaka hatrany am-paravodilanitra aza ianareo, dia avy any no hanangonako azy, ka ho entiko ho ao amin''ny fitoerana izay nofidiko hampitoerako ny anarako izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ireo dia mpanomponao sy olonao, izay navotanao tamin''ny herinao lehibe sy ny tananao mahery. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Koa mitaraina aminao aho, ry Jehovah ô, mihainoa ny fivavaky ny mpanomponao sy ny fivavaky ny mpanomponao rehetra izay faly amin'ny fahatahorana ny anaranao; ary hambinina anie ny mpanomponao anio, ary aoka hahazo famindram-po eo imason'io lehilahy io aho. Fa mpitondra kapoaky ny mpanjaka aho.
