document_id: MAT.19
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary rehefa vitan''i Jesosy izany teny izany, dia niala tany Galilia Izy ka nihazo ny lalana teny an-dafin''i Jordana, dia tonga tany amin''ny sisin''i Jodia. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ary nisy vahoaka betsaka nanaraka Azy, dia nahasitrana azy teo Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ary nisy Fariseo nanatona Azy
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (Ary nanatona Azy ny Fariseo)'
    marker-yv: yv-n
  - type: text
    text: ', dia naka fanahy Azy hoe: Mahazo misaotra ny vadiny va ny lehilahy noho izay rehetra entiny iampangany azy na inona na inona? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary Izy namaly ka nanao hoe: Tsy mbola novakinareo va ny teny, fa Izay nahary azy tamin''ny voalohany dia nahary azy ho lahy sy vavy (Gen. 1. 27), ka dia nanao hoe: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary noho izany ny lehilahy dia handao ny rainy sy ny reniny ka hikambana amin''ny vadiny; ary dia ho nofo iray ihany izy roroa. (Gen. 2. 24)? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'ka dia tsy roa intsony izy, fa nofo iray ihany. Koa amin''izany, izay nampiraisin''Andriamanitra dia aoka tsy hampisarahin''olona. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hoy ireo taminy: Nahoana ary Mosesy no nandidy hanome taratasy fisaoram-bady sy hisaotra azy? (Deo. 24. 1). '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary hoy Jesosy taminy: Ny hamafin''ny fonareo no namelan''i Mosesy anareo hisao-bady; fa tamin''ny voalohany dia tsy mba toy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa lazaiko aminareo: Na zovy na zovy no misaotra ny vadiny, afa-tsy noho ny fijangajangana ihany, ka mampakatra ny hafa, dia mijangajanga; ary izay mampakatra ny voasaotra dia mijangajanga koa. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dia hoy ny mpianatra taminy: Raha izany no toetry ny lehilahy amin''ny vadiny, dia aleo tsy manambady. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Fa hoy Izy taminy: Tsy ny olona rehetra no mahay mandray izany teny izany, fa izay nomena ihany; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'fa misy ionoka, izay teraka ionoka hatrany an-kibon-dreniny; ary misy ionoka, izay nataon''ny olona ionoka; ary misy ionoka, izay nanao ny tenany ionoka noho ny fanjakan''ny lanitra. Aoka handray izany izay mahay mandray. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary tamin''izany dia nisy zazakely nentina teo amin''i Jesosy mba hametrahany ny tànany sy hivavahany ho azy; fa ny mpianany niteny mafy ireny. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nefa Jesosy kosa nanao hoe: Avelao ny zaza, ary aza raràna tsy hanatona Ahy; fa an''ny toa azy ny fanjakan''ny lanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary nony nametraka ny tànany taminy Izy, dia niala teo. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary, indro, nisy anankiray nanatona Azy ka nanao hoe: Mpampianatra ô'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (Mpampianatra tsara ô)'
    marker-yv: yv-n
  - type: text
    text: ', inona no tsara hataoko hahazoako fiainana mandrakizay? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fa hoy Jesosy taminy: Nahoana Aho no anontanianao ny amin''izay tsara? Iray no tsara'
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: (Nahoana Aho no ataonao tsara? Tsy misy tsara afa-tsy iray ihany dia Andriamanitra.)'
    marker-yv: yv-n
  - type: text
    text: '; fa raha te-hiditra any amin''ny fiainana ianao, tandremo ny didy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hoy ralehilahy taminy: Inona avy moa? Dia hoy Jesosy: Ny hoe: Aza mamono olona, Aza mijangajanga, Aza mangalatra, Aza mety ho vavolombelona mandainga, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Manajà ny rainao sy ny reninao (Eks. 20:12-16), ary: Tiava ny namanao tahaka ny tenanao (Lev. 19:18). '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hoy ilay zatovo taminy: Izany rehetra izany efa voatandriko avokoa; fa inona no tsy mbola mahatanteraka ahy? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dia hoy Jesosy taminy: Raha tia ho tanteraka ianao, mandehana, amidio ny fanananao, ka omeo ny malahelo, dia hanana rakitra any an-danitra ianao; ary avia hanaraka Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fa nony nandre izany teny izany ilay zatovo, dia niala tamin''alahelo izy, satria nanana fananana be. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia hoy Jesosy tamin''ny mpianany: Lazaiko aminareo marina tokoa fa sarotra ny hidiran''ny manan-karena amin''ny fanjakan''ny lanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary hoy Izaho aminareo indray: Ho moramora kokoa ny hidiran''ny rameva amin''ny vodi-fanjaitra noho ny hidiran''ny manan-karena amin''ny fanjakan''Andriamanitra. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary nony nandre izany ny mpianatra, dia talanjona indrindra ka nanao hoe: Iza indray no azo hovonjena? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary Jesosy nijery azy ka nanao taminy hoe: Tsy hain''ny olona izany, fa hain''Andriamanitra ny zavatra rehetra.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia namaly Petera ka nanao taminy hoe: Indro, izahay efa nahafoy ny zavatra rehetra ka nanaraka Anao; koa inona ary no ho azonay? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa hoy Jesosy taminy: Lazaiko aminareo marina tokoa fa rehefa mby amin''ny fanavaozana'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr.fiteraham-baovao
    marker-yv: yv-n
  - type: text
    text: ', ka hipetraka amin''ny seza fiandrianan''ny voninahiny ny Zanak''olona, ianareo koa, izay nanaraka Ahy, dia hipetraka amin''ny seza fiandrianana roa ambin''ny folo ka hitsara ny firenen''isiraely roa ambin''ny folo. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ary izay rehetra efa nahafoy trano, na rahalahy, na anabavy, na ray, na reny
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Ampio hoe: (na vady.)'
    marker-yv: yv-n
  - type: text
    text: ', na zanaka, na tany, noho ny anarako, dia handray zato heny ka handova fiainana mandrakizay. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Nefa maro izay voalohany no ho farany, ary izay farany no ho voalohany.
