document_id: MAT.19,96
type_code: plt
verses:
  '1':
  - type: text
    content: 'Ary rehefa vitan''i Jesosy izany teny izany, dia niala tany Galilia Izy ka nihazo ny lalana teny an-dafin''i Jordana, dia tonga tany amin''ny sisin''i Jodia. '
  '10':
  - type: text
    content: 'Dia hoy ny mpianatra taminy: Raha izany no toetry ny lehilahy amin''ny vadiny, dia aleo tsy manambady. '
  '11':
  - type: text
    content: 'Fa hoy Izy taminy: Tsy ny olona rehetra no mahay mandray izany teny izany, fa izay nomena ihany; '
  '12':
  - type: text
    content: 'fa misy ionoka, izay teraka ionoka hatrany an-kibon-dreniny; ary misy ionoka, izay nataon''ny olona ionoka; ary misy ionoka, izay nanao ny tenany ionoka noho ny fanjakan''ny lanitra. Aoka handray izany izay mahay mandray. '
  '13':
  - type: text
    content: 'Ary tamin''izany dia nisy zazakely nentina teo amin''i Jesosy mba hametrahany ny tànany sy hivavahany ho azy; fa ny mpianany niteny mafy ireny. '
  '14':
  - type: text
    content: 'Nefa Jesosy kosa nanao hoe: Avelao ny zaza, ary aza raràna tsy hanatona Ahy; fa an''ny toa azy ny fanjakan''ny lanitra. '
  '15':
  - type: text
    content: 'Ary nony nametraka ny tànany taminy Izy, dia niala teo. '
  '16':
  - type: text
    content: 'Ary, indro, nisy anankiray nanatona Azy ka nanao hoe: Mpampianatra ô'
  - type: note
    content: 'Na: (Mpampianatra tsara ô)'
  - type: text
    content: ', inona no tsara hataoko hahazoako fiainana mandrakizay? '
  '17':
  - type: text
    content: 'Fa hoy Jesosy taminy: Nahoana Aho no anontanianao ny amin''izay tsara? Iray no tsara'
  - type: note
    content: 'Na: (Nahoana Aho no ataonao tsara? Tsy misy tsara afa-tsy iray ihany dia Andriamanitra.)'
  - type: text
    content: '; fa raha te-hiditra any amin''ny fiainana ianao, tandremo ny didy. '
  '18':
  - type: text
    content: 'Hoy ralehilahy taminy: Inona avy moa? Dia hoy Jesosy: Ny hoe: Aza mamono olona, Aza mijangajanga, Aza mangalatra, Aza mety ho vavolombelona mandainga, '
  '19':
  - type: text
    content: 'Manajà ny rainao sy ny reninao (Eks. 20:12-16), ary: Tiava ny namanao tahaka ny tenanao (Lev. 19:18). '
  '2':
  - type: text
    content: Ary nisy vahoaka betsaka nanaraka Azy, dia nahasitrana azy teo Izy.
  '20':
  - type: text
    content: 'Hoy ilay zatovo taminy: Izany rehetra izany efa voatandriko avokoa; fa inona no tsy mbola mahatanteraka ahy? '
  '21':
  - type: text
    content: 'Dia hoy Jesosy taminy: Raha tia ho tanteraka ianao, mandehana, amidio ny fanananao, ka omeo ny malahelo, dia hanana rakitra any an-danitra ianao; ary avia hanaraka Ahy. '
  '22':
  - type: text
    content: 'Fa nony nandre izany teny izany ilay zatovo, dia niala tamin''alahelo izy, satria nanana fananana be. '
  '23':
  - type: text
    content: 'Dia hoy Jesosy tamin''ny mpianany: Lazaiko aminareo marina tokoa fa sarotra ny hidiran''ny manan-karena amin''ny fanjakan''ny lanitra. '
  '24':
  - type: text
    content: 'Ary hoy Izaho aminareo indray: Ho moramora kokoa ny hidiran''ny rameva amin''ny vodi-fanjaitra noho ny hidiran''ny manan-karena amin''ny fanjakan''Andriamanitra. '
  '25':
  - type: text
    content: 'Ary nony nandre izany ny mpianatra, dia talanjona indrindra ka nanao hoe: Iza indray no azo hovonjena? '
  '26':
  - type: text
    content: 'Ary Jesosy nijery azy ka nanao taminy hoe: Tsy hain''ny olona izany, fa hain''Andriamanitra ny zavatra rehetra.'
  '27':
  - type: text
    content: 'Dia namaly Petera ka nanao taminy hoe: Indro, izahay efa nahafoy ny zavatra rehetra ka nanaraka Anao; koa inona ary no ho azonay? '
  '28':
  - type: text
    content: 'Fa hoy Jesosy taminy: Lazaiko aminareo marina tokoa fa rehefa mby amin''ny fanavaozana'
  - type: note
    content: Gr.fiteraham-baovao
  - type: text
    content: ', ka hipetraka amin''ny seza fiandrianan''ny voninahiny ny Zanak''olona, ianareo koa, izay nanaraka Ahy, dia hipetraka amin''ny seza fiandrianana roa ambin''ny folo ka hitsara ny firenen''isiraely roa ambin''ny folo. '
  '29':
  - type: text
    content: Ary izay rehetra efa nahafoy trano, na rahalahy, na anabavy, na ray, na reny
  - type: note
    content: 'Ampio hoe: (na vady.)'
  - type: text
    content: ', na zanaka, na tany, noho ny anarako, dia handray zato heny ka handova fiainana mandrakizay. '
  '3':
  - type: text
    content: Ary nisy Fariseo nanatona Azy
  - type: note
    content: 'Na: (Ary nanatona Azy ny Fariseo)'
  - type: text
    content: ', dia naka fanahy Azy hoe: Mahazo misaotra ny vadiny va ny lehilahy noho izay rehetra entiny iampangany azy na inona na inona? '
  '30':
  - type: text
    content: Nefa maro izay voalohany no ho farany, ary izay farany no ho voalohany.
  '4':
  - type: text
    content: 'Ary Izy namaly ka nanao hoe: Tsy mbola novakinareo va ny teny, fa Izay nahary azy tamin''ny voalohany dia nahary azy ho lahy sy vavy (Gen. 1. 27), ka dia nanao hoe: '
  '5':
  - type: text
    content: 'Ary noho izany ny lehilahy dia handao ny rainy sy ny reniny ka hikambana amin''ny vadiny; ary dia ho nofo iray ihany izy roroa. (Gen. 2. 24)? '
  '6':
  - type: text
    content: 'ka dia tsy roa intsony izy, fa nofo iray ihany. Koa amin''izany, izay nampiraisin''Andriamanitra dia aoka tsy hampisarahin''olona. '
  '7':
  - type: text
    content: 'Hoy ireo taminy: Nahoana ary Mosesy no nandidy hanome taratasy fisaoram-bady sy hisaotra azy? (Deo. 24. 1). '
  '8':
  - type: text
    content: 'Ary hoy Jesosy taminy: Ny hamafin''ny fonareo no namelan''i Mosesy anareo hisao-bady; fa tamin''ny voalohany dia tsy mba toy izany. '
  '9':
  - type: text
    content: 'Fa lazaiko aminareo: Na zovy na zovy no misaotra ny vadiny, afa-tsy noho ny fijangajangana ihany, ka mampakatra ny hafa, dia mijangajanga; ary izay mampakatra ny voasaotra dia mijangajanga koa. '
