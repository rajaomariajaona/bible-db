document_id: MAT.21
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary raha nanakaiky an''i Jerosalema izy ka tonga tao Betifaga any an-tendrombohitra Oliva, dia naniraka mpianatra roa lahy Jesosy ka nanao taminy hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mankanesa amin''iroa vohitra tandrifinareo iroa, ary miaraka amin''izay dia hahita boriky mifatotra sy ny zanany eo aminy ianareo; vahao izy, dia ento etỳ amiko. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary raha misy miteny anareo, dia lazao hoe: Misy raharaha analan''ny Tompo azy; ary dia havelany ho entina miaraka amin''izay izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Izany dia tonga mba hahatanteraka izay nampilazaina ny mpaminany hoe: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Lazao amin'i Ziona zanakavavy; Indro, ny Mpanjakanao avy ho anao, Malemy fanahy sady mitaingina boriky, Dia zanaky ny boriky miasa
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. mitondra zioga
    marker-yv: yv-n
  - type: text
    text: ' (Zak. 9. 9). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary dia nandeha ny mpianatra ka nanao araka izay nandidian''i Jesosy azy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'dia nentiny ny boriky sy ny zanany ary nataony teo amboniny ny lambany, ary Jesosy dia nitaingina azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary ny ankabiazan''ny vahoaka dia namelatra ny lambany teny an-dalana; ary ny sasany nanapaka rantsan-kazo, dia nahahany teny an-dalana koa izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary ny vahoaka izay nialoha Azy sy izay nanaraka dia niantso hoe: Hosana'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Hosana = vonjeo re!
    marker-yv: yv-n
  - type: text
    text: ' ho an''ny Zanak''i Davida! Isaorana anie Izay avy amin''ny anaran''i Jehovah! Hosana'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Hosana = vonjeo re!
    marker-yv: yv-n
  - type: text
    text: ' any amin''ny avo indrindra (Sal. 118. 26). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary nony efa tafiditra tany Jerosalema Izy, dia nihorakoraka ny tanàna rehetra ka nanao hoe: Iza moa izao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny vahoaka nilaza hoe: Izao no Jesosy mpaminany Izay avy any Nazareta any Galilia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ary Jesosy niditra teo an-kianjan''ny tempolin''Andriamanitra, dia nandroaka izay rehetra nivarotra sy nividy teo an-kianjan''ny tempoly ka nanjera ny latabatry ny mpanakalo vola sy ny fipetrahan''ny mpivarotra ny voromailala; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'dia hoy Izy taminy: Efa voasoratra hoe: Ny tranoko hatao hoe trano fivavahana (Isa. lvi. 7); fa ianareo kosa manao azy ho zohy fieren''ny jiolahy (Jer. 7. 11). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ary nisy jamba sy mandringa nanatona Azy teo an-kianjan''ny tempoly, dia nahasitrana azy Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa nony hitan''ny lohan''ny mpisorona sy ny mpanora-dalàna ny zavatra mahagaga izay nataony sy ny ankizy madinika miantso eo an-kianjan''ny tempoly ka manao hoe: Hosana ho an''ny Zanak''i Davida! - dia tezitra izy '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'ka nanao taminy hoe: Renao va izay lazain''ireo? Dia hoy Jesosy taminy: Eny; tsy mbola novakinareo va ny teny manao hoe: Avy amin''ny vavan''ny ankizy madinika sy ny zaza minono no nanamboaranao fiderana (Sal. 8. 2)? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dia nandao azy Izy ka niala tao an-tanàna hankany Betania; ary dia nitoetra tao mandritra ny alina Izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nony niverina maraina hankany an-tanàna Izy, dia noana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ary nahita hazo aviavy
  - type: usfm
    marker: x
    children:
    - type: text
      text: aviavimbazaha
    marker-yv: yv-n
  - type: text
    text: ' anankiray teo amoron-dalana Izy, dia nankeo aminy, kanjo tsy nahita na inona na inona teo aminy, afa-tsy ravina ihany; dia hoy Izy taminy: Aza misy voa avy aminao intsony mandrakizay. Dia maina vetivety foana ilay hazo aviavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nony hitan''ny mpianatra izany, dia gaga izy ka nanao hoe: Nanao ahoana re no dia nahamaina vetivety io aviavy io? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary Jesosy namaly ka nanao taminy hoe: Lazaiko aminareo marina tokoa: Raha manam-pinoana ianareo ka tsy miahanahana, dia tsy izao natao tamin''ny aviavy izao ihany no ho vitanareo, fa raha hiteny amin''ity tendrombohitra ity aza ianareo ka hanao hoe: Mifindrà ianao, ka mianjerà any an-dranomasina, dia ho tonga izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ary na inona na inona no angatahinareo amin'ny fivavahana atao amin'ny finoana dia ho azonareo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary rehefa tafiditra teo an-kianjan''ny tempoly Jesosy ka nampianatra, dia nanatona Azy ny lohan''ny mpisorona sy ny loholona ka nanao hoe: Fahefana manao ahoana no anaovanao izao? Ary iza no nanome Anao izao fahefana izao? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary Jesosy namaly ka nanao taminy hoe: Izaho kosa hanontany anareo zavatra iray loha, ary raha hovalianareo izany, Izaho kosa dia hilaza aminareo izay fahefana anaovako izany: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny batisan'i Jaona, avy taiza moa izany? Avy tany an-danitra va, sa avy tamin'ny olona? Ary izy ireo niara-nisaina
  - type: usfm
    marker: x
    children:
    - type: text
      text: Na:nieritreritra
    marker-yv: yv-n
  - type: text
    text: ' ka nanao hoe: Raha holazaintsika hoe mantsy: Avy tany an-danitra, dia hovaliany hoe isika: Ka nahoana no tsy nino azy ianareo? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary raha holazaintsika hoe kosa: Avy tamin''ny olona, dia matahotra ny vahoaka isika, satria ataon''izy rehetra ho mpaminany Jaona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dia namaly an''i Jesosy izy ka nanao hoe: Tsy fantatray. Dia hoy Jesosy taminy: Izaho kosa tsy hilaza aminareo izay fahefana anaovako izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fa ahoana kosa no hevitrareo? Nisy lehilahy nanana zanaka roa lahy; dia nankeo amin''ny lahimatoa izy ka nanao hoe: Anaka, andeha miasa any amin''ny tanim-boaloboko anio. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Fa namaly izy ka nanao hoe: Tsy handeha aho; nefa nony afaka izany, dia nanenina izy ka nandeha ihany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Dia nankeo amin''ny faralahy izy ka niteny toy izany koa. Ary izy namaly ka nanao hoe: Handeha aho, tompoko; kanjo tsy nandeha izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ka iza moa amin''izy mirahalahy no nanao ny sitrapon''ny rainy? Hoy izy: Ny lahimatoa. Dia hoy Jesosy taminy: Lazaiko aminareo marina tokoa fa ny mpamory hetra sy ny vehivavy janga efa mialoha anareo ho amin''ny fanjakan''Andriamanitra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fa Jaona nankany aminareo tamin''ny lalan''ny fahamarinana, nefa tsy nino azy ianareo; fa ny mpamory hetra sy ny vehivavy janga no nino azy; fa ianareo kosa, na dia efa nahita izany aza, dia mbola tsy nanenina mba hinoanareo azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Mihainoa fanoharana hafa koa: Nisy lehilahy tompon-trano nanao tanim-boaloboka, dia namefy azy manodidina dia nihady famiazana teo anatiny, dia nanao tilikambo, ary dia nahofany tamin''olona mpiasa tany izany, ka nandeha ho any amin''ny tany hafa izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary rehefa mby akaiky ny taom-pahavokarana, dia naniraka ny mpanompony izy hankany amin''ny mpiasa tany handray ny vokatra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Fa ny mpiasa tany nisambotra ny mpanompony, ka ny anankiray nokapohiny, ary ny anankiray novonoiny, ary ny anankiray notorahany vato. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dia naniraka mpanompo hafa koa indray izy, maro noho ny teo; fa nataony toy izany koa ireny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary nony farany dia naniraka ny zanany hankany aminy izy ka nanao hoe: Hanaja ny zanako izy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Kanjo ny mpiasa tany, nony nahita ny zanaka, dia niresaka hoe: Ity no mpandova; andeha hovonointsika izy, dia ho lasantsika ny lovany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary nisambotra azy izy ka namoaka azy teo ivelan''ny tanim-boaloboka, dia namono azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Koa raha tonga ny tompon''ny tanim-boaloboka, hataony ahoana moa izany mpiasa tany izany? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Hoy izy taminy: Hataony loza tokoa ny handringanany izany olon-doza izany, ary ny tanim-boaloboka dia hahofany amin''ny mpiasa tany sasany izay hanome azy ny vokatra amin''ny fotoany avy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Hoy Jesosy taminy: Tsy mbola novakinareo va ny teny ao amin''ny Soratra Masina hoe: Ny vato izay nolavin''ny mpanao trano, Dia izy no efa natao fehizoro; Avy tamin''i Jehovah izao Ka mahagaga eo imasontsika? (Sal. 118. 22-23). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ary noho izany dia lazaiko aminareo hoe: Hesorina aminareo ny fanjakan''Andriamanitra ka homena izay firenena mahavokatra ny voany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Ary izay potraka amin'ity vato ity dia ho torotoro, fa na zovy na zovy no hianjerany, dia ho mongomongo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. haely toy ny vovoka
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary rehefa ren''ny lohan''ny mpisorona sy ny Fariseo ny fanoharana nataon''i Jesosy, dia fantany fa ny tenany no nolazainy amin''izany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Dia nitady hisambotra Azy izy, saingy natahotra ny vahoaka, satria nataon'ny vahoaka ho mpaminany Jesosy.
