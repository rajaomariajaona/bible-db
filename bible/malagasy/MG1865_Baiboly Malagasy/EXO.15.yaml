document_id: EXO.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nahatongavan'ny Zanak'Isiraely tao Elima, sy ny nimonomononany tany an-efitr'i Sinay noho ny tsi-fisian-kanina, ary ny nanomezan'Andriamanitra azy mana sy papelika hohaniny.
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Mosesy sy ny Zanak''Isiraely dia nihira izao fihirana izao ho an''i Jehovah ka nanao hoe: Hihira ho an''i Jehovah aho, fa avo indrindra Izy; ny soavaly sy ny mpitaingina azy efa nariany ao amin''ny ranomasina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Jehovah no heriko sy fiderako, fa efa famonjena ahy Izy; izao no Andriamanitro, ka hankalaza Azy aho, dia Andriamanitry ny razako, ka hanandratra Azy aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Jehovah dia mpiady mahery, Jehovah no anarany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ny kalesin'i Farao sy ny miaramilany natsipiny ao amin'ny ranomasina; ary ny kapiteny voafantina nasitrika ao amin'ny Ranomasina Mena.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ny lalina nanarona azy: Nilentika tany ambany indrindra tahaka ny vato izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ny tananao ankavanana, Jehovah ô, efa malaza amin'ny hery; ny tananao ankavanana, Jehovah ô, manorotoro ny fahavalo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Amin'ny halehiben'ny voninahitrao no andringananao izay nitsangana hanohitra Anao; alefanao ny fahatezeranao mirehitra, izay mandevona azy toy ny mololo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ary ny fofonain'ny vavoronao no nanangonanao ny rano; nivongovongo toy ny antontan-javatra ny rano maria; nandry teo afovoan'ny ranomasina ny lalina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Hoy ny fahavalo: Hanenjika aho, hahatratra aho, hizara babo aho ka hanao izay sitraky ny foko aminy, hotsoahako ny sabatra, ka hamongotra azy ny tanako.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ny fofonainao no nitsofanao, dia nanarona azy ny ranomasina: nilentika tahaka ny firaka ao amin''ny rano mahery izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Jehovah ô, iza moa no tahaka Anao amin'izay andriamanitra? Iza moa no tahaka Anao, Izay ankalazaina amin'ny fahamasinana, deraina amin'ny fahatahorana, Mpanao fahagagana?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Nahinjitrao ny tananao ankavanana, dia nitelina ireo ny tany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tarihinao amin'ny famindram-ponao ny firenena izay navotanao, ka entinao amin'ny herinao ho any amin'ny fonenanao masina izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mandre ny firenena ka raiki-tahotra; Hovitra no mahazo ny mponina any Filistia;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Toran-kovitra ny loham-pirenen'i Edoma; azon-korohoro ny lehilahy maherin'i Moaba; reraka ny fon'izay rehetra monina any Kanana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mahazo azy ny tahotra sy ny hovitra; Noho ny halehiben'ny sandrinao dia mangina tahaka ny vato izy. mandra-pandalon'ny olonao, Jehovah ô, mandra-pandalon'ny olona izay navotanao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Dia hampiditra azy Hianao ka hamponina azy ao amin'ny tendrombohitra lovanao, ao amin'ny fitoerana nataonao hitoeranao, Jehovah ô, dia ao amin'ny fitoerana masina naorin'ny tananao, Tompo ô.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Jehovah hanjaka mandrakizay doria.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fa niditra teo amin'ny ranomasina ny soavalin'i Farao sy ny kalesiny ary ny mpitaingin-tsoavaliny, ary Jehovah nampikatona ny ranomasina taminy; fa ny Zanak'Isiraely kosa nandeha tamin'ny tany maina teo afovoan'ny ranomasina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary Miriama mpaminanivavy, anabavin''i Arona, dia nitondra ny ampongatapaka teny an-tànany; ary nivoaka nanaraka azy ny vehivavy rehetra nitondra ampongatapaka sady nandihy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary Miriama namaly ireo lehilahy ireo ka nihira hoe: Mihira ho an''i Jehovah, fa avo indrindra Izy; ny soavaly sy ny mpitaingina azy nariany ao amin''ny ranomasina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary Mosesy nitondra ny Isiraely nifindra avy teo amoron''ny Ranomasina Mena, dia nandroso ho any amin''ny efitra Sora izy; ary nandeha hateloana tany an-efitra izy fa tsy nahita rano. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dia tonga tao Mara izy, fa tsy nahasotro ny rano tao Mara, satria nangidy izany; koa izany no nanaovany ny anarany hoe Mara '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dia nimonomonona tamin''i Mosesy ny olona ka nanao hoe: Inona no hosotroinay? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary dia nitaraina tamin''i Jehovah izy, ka dia nanehoan''i Jehovah hazo anankiray, ary rehefa natsipiny tao anatin''ny rano izany, dia tonga mamy ny rano. Tao no nanomezan''i Jehovah lalàna sy fitsipika ho azy, ary tao no nizaha ny toetra azy, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ka hoy Izy: Raha hazoto hihaino ny feon''i Jehovah Andriamanitrao ianao ka hanao izay mahitsy eo imasony sy hihaino ny lalàny ary hitandrina ny didiny rehetra, dia tsy hisy hataoko aminao ireny aretina rehetra ireny, izay nataoko tamin''ny Egyptiana; fa Izaho no Jehovah Izay mahasitrana anao.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary tonga tao Elima izy; ary tao nisy loharano roa ambin'ny folo sy hazo rofia fito-polo, dia nitoby teo anilan'ny rano izy.
