document_id: 2KI.15
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanjakan'i Jotama tamin'ny Joda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tamin''ny taona fahafito amby roa-polo nanjakan''i Jeroboama, mpanjakan''ny Isiraely, no vao nanjakan''i Azaria, zanak''i Amazia, mpanjakan''ny Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Enina ambin''ny folo taona izy, fony vao nanjaka, ary roa amby dimam-polo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Jekolia, avy any Jerosalema. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary nanao izay mahitsy eo imason''i Jehovah izy tahaka izay rehetra nataon''i Amazia rainy; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'kanefa ny fitoerana avo tsy mba noravana; fa mbola namono zavatra hatao fanatitra sady nandoro ditin-kazo manitra teny amin''ny fitoerana avo ihany ny olona. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary Jehovah namely ny mpanjaka, ka dia boka mandra-pahafatiny izy ka nitoetra tao an-trano nitokana. Ary Jotama, zanakalahin''ny mpanjaka, no nanapaka tao an-dapa sy nitsara ny vahoaka. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary ny tantaran''i Azaria sisa mbamin''izay rehetra nataony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ary Azaria dia lasa nodimandry any amin'ny razany, ka nalevina tao amin'ny razany tao an-tanànan'i Davida izy; ary Jotama zanany no nanjaka nandimby azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tamin''ny taona fahavalo amby telo-polo nanjakan''i Azaria, mpanjakan''ny Joda, no nanjakan''i Zakaria, zanak''i Jeroboama, tamin''ny Isiraely, ary nanjaka enim-bolana tao Samaria izy. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary nanao izay ratsy eo imason''i Jehovah tahaka ny nataon''ny razany izy, fa tsy niala tamin''ny fahotan''i Jeroboama, zanak''i Nebata, Izay nampanotany ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary Saloma, zanak''i Jabesy, nikomy taminy, dia namely azy teo anatrehan''ny olona ka nahafaty azy ary nanjaka nandimby azy. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary ny tantaran''i Zakaria sisa, indro fa efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely izany. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Izany no ilay tenin''i Jehovah nolazainy tamin''i Jeho hoe: Ny taranakao hatramin''ny zafindohalika dia hipetraka amin''ny seza fiandrianan''ny Isiraely. Ka dia tanteraka izany. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary Saloma, zanak''i Jabesy, dia vao nanjaka tamin''ny taona fahasivy amby telo-polo nanjakan''i Ozia, mpanjakan''ny Joda; ary nanjaka andro iray volana tany Samaria izy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fa Menahema, zanak''i Gady, niakatra avy tany Tirza ka nankany Samaria, dia namely an''i Saloma, zanak''i Jabesy, tany Samaria ka nahafaty azy ary nanjaka nandimby azy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ary ny tantaran'i Saloma sisa mbamin'ny nikomiany, indro fa efa voasoratra ao amin'ny bokin'ny tantaran'ny mpanjakan'ny Isiraely izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tamin''izany Menahema dia niala tany Tirza ka namely an''i Tifsa mbamin''izay rehetra tao hatramin''ny sisin-taniny; fa tsy namoha vavahady azy Tifsa, ka dia nasiany, ary izay bevohoka rehetra tao notatahany. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tamin''ny taona fahasivy amby telo-polo nanjakan''i Azaria, mpanjakan''ny Joda, no vao nanjakan''i Menahema, zanak''i Gady, tamin''ny Isiraely, ary nanjaka folo taona tao Samaria izy. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary nanao izay ratsy eo imason''i Jehovah izy, fa tamin''ny androny rehetra dia tsy niala tamin''ny fahotan''i Jeroboama, zanak''i Nebata, izay nampanotany ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary Pola, mpanjakan''i Asyria, dia avy hananika ny tany; ary Menahema nanome an''i Pola talenta volafotsy arivo mba hampitoetra ny fanjakana eo an-tànan''i Menahema. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary nampandoavin''i Menahema io vola io ny mpanankarena rehetra tamin''ny Isiraely, dia sekely volafotsy dimam-polo avy isan-olona, homeny ny mpanjakan''i Asyria. Ka dia niverina ny mpanjakan''i Asyria, fa tsy nitoetra tao amin''ny tany. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ny tantaran''i Menahema sisa mbamin''izay rehetra nataony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely va izany? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary Menahema lasa nodi-mandry any amin''ny razany, ary Pekahia zanany no nanjaka nandimby azy. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tamin''ny taona fahadimam-polo nanjakan''i Azaria, mpanjakan''ny Joda, no vao nanjakan''i Pekahia, zanak''i Menahema, tamin''ny Isiraely tao Samaria, ary nanjaka roa taona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary nanao izay ratsy eo imason''i Jehovah izy, fa tsy niala tamin''ny fahotan''i Jeroboama, zanak''i Nebata, izay nampanotany ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary Peka, zanak''i Remalia, lefiny, dia nikomy taminy ka namely an''i Pekahia mbamin''i Argoba sy Aria teo Samaria, tao amin''ny trano-avo amin''ny lapa, ary teo amin''Peka nisy olona dimam-polo lahy tamin''ny taranak''i Gileada; koa namono azy izy, dia nanjaka nandimby azy. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ary ny tantaran''i Pekahia sisa mbamin''izay rehetra nataony, indro fa efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Isiraely izany. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tamin''ny taona faharoa amby dimam-polo nanjakan''i Azaria, mpanjakan''ny Joda, no vao nanjakan''i Peka, zanak''i Remalia, tamin''ny Isiraely tao Samaria, ary nanjaka roa-polo taona izy. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ary nanao izay ratsy eo imason''i Jehovah izy, fa tsy niala tamin''ny fahotan''i Jeroboama, zanak''i Nebata, izay nampanotany ny Isiraely. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tamin''ny andron''i Peka, mpanjakan''ny Isiraely, dia tonga Tiglato-pilesera, mpanjakan''i Asyria, ka nahafaka an''Iona sy Abela-beti-maka sy Janoa sy Kadesy sy Hazora sy Gileada ary Galilia, dia ny tanin''ny Naftaly rehetra, ary nitondra ny olona ho babo tany Asyria izy. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary Hosea, zanak''i Elaha, nikomy tamin''i Peta, Zanak''i Remalia, dia namely azy ho faty ka nanjaka nandimby azy tamin''ny taona faharoa-polo nanjakan''i Jotama, zanak''i Ozia. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ary ny tantaran'i Peka sisa mbamin'izay rehetra nataony, indro fa efa voasoratra ao amin'ny bokin'ny tantaran'ny mpanjakan'ny Isiraely izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tamin''ny taona faharoa nanjakan''i Peka, zanak''i Remalia, mpanjakan''ny Isiraely, no vao nanjakan''i Jotama, zanak''i Ozia, mpanjakan''ny Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dimy amby roa-polo taona izy, fony vao nanjaka, ary enina ambin''ny folo taona no nanjakany tany Jerosalema. Ary ny anaran-dreniny dia Jerosa, zanakavavin''i Zadoka. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ary nanao izay mahitsy eo imason''i Jehovah izy; tahaka izay rehetra nataon''i Ozia rainy no nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Kanefa ny fitoerana avo tsy mba noravana; fa mbola namono zavatra hatao fanatitra sady nandoro ditin-kazo manitra teny amin''ny fitoerana avo ihany ny olona. Izy no nanao ny vavahady ambony amin''ny tranon''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary ny tantaran''i Jotama sisa mbamin''Izay rehetra nataony, tsy efa voasoratra ao amin''ny bokin''ny tantaran''ny mpanjakan''ny Joda va izany? '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Tamin''izany andro Izany no vao nampandehanan''i Jehovah an''i Rezina, mpanjakan''i Syria, sy Peka, zanak''i Remalia, hanafika an''i Joda. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Ary Jotama lasa nodi-mandry any amin'ny razany, dia nalevina tao amin'ny razany tao an-Tanànan'i Davida rainy izy; ary Ahaza zanany no nanjaka nandimby azy.
