document_id: GEN.24
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nampakan'i Abrahama vady ho an'Isaka avy tany amin'ny tanin'ny havany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary Abrahama dia efa zokiolona sady nandroso fahanterana; ary Jehovah efa nitahy an''i Abrahama tamin''ny zavatra rehetra. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary hoy Abrahama tamin''ilay lehiben''ny mpanompony tao an-tranony, izay mpanapaka ny nananany rehetra: Mba ataovy ato ambanin''ny feko ny tananao; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'fa hampianianiko amin''i Jehovah, Andriamanitry ny lanitra sy ny tany, ianao, fa tsy haka vady ho an''ny zanako avy amin''ny zanakavavin''ny Kananita izay iraisako monina ianao; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'fa any amin''ny tanin-drazako sy amin''ny havako no halehanao haka vady ho an''Isaka zanako. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ary hoy ilay mpanompony taminy: Angamba tsy hety hiaraka amiko ho amin''ity tany ity ny vehivavy; moa tsy maintsy hitondra ny zanakao hiverina ho any amin''ny tany izay nialanao va aho? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy Abrahama taminy: Tandremo mba tsy ho entinao miverina any ny zanako. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jehovah, Andriamanitry ny lanitra, Izay naka ahy niala tamin''ny tranon''ny raiko sy tamin''ny tany nahaterahako, sady niteny tamiko sy nianiana tamiko hoe: Ny taranakao no homeko ity tany ity, dia Izy no haniraka Ilay Anjeliny eo alohanao, ka any no hakanao vady ho an''ny zanako. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ary raha tsy hety hiaraka aminao ny vehivavy, dia ho afaka amin''izao fampianianako anao izao ianao; fa izao ihany: aza entinao miverina any mihitsy ny zanako '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ary nataon'ilay mpanompo tambanin'ny fen'i Abrahama tompony ny tanany, ka nianiana taminy ny amin'izany zavatra izany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ary ilay mpanompo naka rameva folo tamin''ny ramevan''ny tompony ka lasa, ary izay zava-tsoa nananan''ny tompony dia samy nitondrany avokoa; dia nandeha izy ka nankany Mesopotamia ho any an-tanànan''i Nahora. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary nampandohalehiny teo ivelan''ny tanàna tanilan''ny lavaka fantsakan-drano ny rameva, rehefa harivariva ny andro, dia tamin''ilay fandehanan''ny vehivavy mpantsaka iny '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dia hoy izy: Jehovah ô, Andriamanitr''i Abrahama tompoko, ambino aho anio, ary asio soa Abrahama tompoko. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Indro, mijanona eto anilan''ny fantsakana aho; ary ny zanakavavin''ny mponina ao an-tanàna mivoaka hantsaka rano; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'koa izay zazavavy hilazako hoe: Mba areno kely ny sininao hisotroako, ka hamaly hoe izy: Misotroa, sady hampisotro ny ramevanao koa aho : dia izy ihany no aoka ho voatendrinao ho an''Isaka mpanomponao; ary izany no hahafantarako fa nasianao soa ny tompoko. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary raha tsy mbola nitsaha-niteny izy, dia, indro, tamy Rebeka, izay naterak''i Betoela, zanakalahin''i Milka, vadin''i Nahpra, rahalahin''i Abrahama, nilanja ny sininy teny an-tsorony. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ary ilay zazavavy dia tsara tarehy indrindra sady virijina, ka tsy mbola nisy lehilahy nahalala azy; ary nidina nankeo amin''ny fantsakana izy ka nameno ny sininy, dia niakatra. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ary ilay mpanompo dia nihazakazaka nitsena azy ka nanao taminy hoe: Mba ampisotroy rano kely avy amin''ny sininao aho. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ary hoy razazavavy: Misotroa, tompokolahy; dia nampidininy faingana ny sininy ho eo an-tànany, ka nampisotroiny ralehilahy. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary rehefa nampisotro azy izy, dia hoy koa izy: Ny ramevanao koa andeha hantsakako hosotroiny ambara-pahatapiny misotro. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ary dia naidiny faingana ny rano teo an-tsininy ho eo amin''ny tavy fisotroana, dia nihazakazaka indray izy nankeo amin''ny lavaka fantsakana hantsaka; ary nantsaka ho an''ny ramevany rehetra izy. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ary ralehilahy nandinika azy tsara sady nangina, mba hahafantarany na efa nambinin''i Jehovah ny nalehany, na tsia. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ary rehefa tapi-nisotro avokoa ny rameva, dia nalain-dralehilahy ny kavin''orona volamena iray, lanjan''ny sasaky ny sekely, sy haba volamena roa, lanjan''ny sekely folo, hatao amin''ny tànany; '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'ary hoy izy: Zana-jovy moa ianao ? Mba lazao amiko. Ary moa misy azonay handriana va ao an-tranon''ny rainao? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ary hoy izy taminy: Zanakavavin''i Betoela, zanakalahin''i Milka, izay naterany tamin''i Nahora, aho. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ary hoy koa izy taminy: Na ny mololo na ny vilona, dia samy betsaka ao aminay, sady misy trano handrianareo koa. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Dia niondrika ralehilahy ka niankohoka teo anatrehan''i Jehovah, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'ary nanao hoe: Isaorana anie Jehovah, Andriamanitr''i Abrahama tompoko, Izay tsy nanaisotra ny famindram-pony sy ny fahamarinany tamin''ny tompoko; fa izaho dia notantanan''i Jehovah teny an-dalana ho atỳ an-tranon''ny havan''ny tompoko.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dia lasa nihazakazaka razazavavy ka nanambara araka izany teny izany tamin''ny tao an-tranon''ny reniny. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ary Rebeka nanana anadahy, Labana no anarany; dia nihazakazaka Labana nankeo amin-dralehilahy teo ivelany, teo am-pantsakana. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ary rehefa hitany ny kavin''orona sy ny haba teny an-tànan ''ny anabaviny, sady efa reny ny tenin-dRebeka anabaviny nanao hoe: Izany no nolazain-dralehilahy tamiko, dia nankeo amin-dralehilahy izy; ary, indro, mbola nijanona teo anilan''ny rameva teo am-pantsakana ralehilahy. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ary hoy Labana: Miakara. ry ilay notahin''i Jehovah; nahoana no mijanona eto ivelany ianao? fa izaho efa namboatra ny trano sy izay hitoeran''ny rameva.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Dia niditra tao an-trano ralehilahy; ary Labana dia namaha ny entana tamin''ny rameva ka nanome mololo sy vilona ho an''ny rameva ary rano hanasana ny tongo-dralehilahy sy ny tongotry ny olona izay nomba azy. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dia nandroso hanina teo anoloany izy; fa hoy ralehilahy: Tsy mbola hihinana aho, raha tsy efa voalazako ny raharahako. Ary hoy izy: Lazao ary! '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Dia hoy ralehilahy: Mpanompon''i Abrahama aho. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ary Jehovah efa nitahy ny tompoko indrindra, ka efa be ny fananany; ary Jehovah efa nanome azy ondry aman''osy sy omby, ary volafotsy sy volamena, ary andevolahy sy andevovavy, ary rameva sy boriky. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ary rehefa antitra Saraha, vadin''ny tompoko, dia niteraka zazalahy tamin''ny tompoko izy; ary efa natolotry ny tompoko ho an''ny zanany izay rehetra ananany. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ary efa nampianiana ahy ny tompoko ka nanao hoe: Aza makà vady ho an''ny zanako avy amin''ny zanakavavin''ny Kananita, izay iraisako monina; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'fa any amin''ny tranon''ikaky sy any amin''ny havako no halehanao ka hakanao vady any ho an''ny zanako. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ary izaho namaly ny tompoko hoe: Angamba tsy hety hiaraka amiko ny vehivavy. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ary hoy izy tamiko: Jehovah, Izay andehanako eo anatrehany, dia haniraka Ilay Anjeliny homba anao sy hanambina ny alehanao, ary ianao haka vady ho an''ny zanako avy amin''ny havako sy amin''ny tranon''ikaky. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Dia ho afaka amin''ny fampianianako anao ianao, raha tonga any amin''ny havako; ary raha tsy manome anao ry zareo, dia ho afaka amin''ny fampianianako anao koa ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ary tonga androany teo amin''ny fantsakana aho, ka hoy izaho: Jehovah ô, Andriamanitr''i Abrahama tompoko, raha hanambina ny alehako Hianao, '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'indro, mijanona eto anilan''ny fantsakana aho, koa izay zazavavy hivoaka hantsaka ka hilazako hoe : Mba ampisotroy rano kely avy amin''ny sininao aho, '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'ka hamaly hoe izy: Misotroa, ary hantsakako koa ny ramevanao: dia izy no aoka ho izay vehivavy voatendrin''i Jehovah ho an''ny zanakalahin''ny tompoko. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ary raha tsy mbola nitsahatra niteny anakampo aho, dia, indro, tamy Rebeka nilanja ny sininy teny an-tsorony, dia nidina nankeo amin''ny fantsakana izy ka nantsaka; ary hoy izaho taminy: Mba ampisotroy rano kely aho. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Dia nampidininy faingana ny sininy hiala teo an-tsorony, ka hoy izy: Misotroa, ary hampisotroiko koa ny ramevanao; dia nisotro aho, ary nampisotro ny rameva koa izy. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Dia nanontany azy aho ka nanao hoe: Zana-jovy moa ianao? Ary hoy izy: Zanak''i Betoela, zanakalahin''i Nahora, aho, izay naterak''i Milka taminy. Dia nataoko teo anorony ny kavin''orona, ary ny haba teny amin''ny tànany. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Dia niondrika aho ka nianko­hoka teo anatrehan''i Jehovah, dia nisaotra an''i Jehovah, Andriamanitr''i Abrahama tompoko, Izay efa nitondra ahy tamin''ny lalana marina haka ny zanakavavin''ny rahalahin''ny tompoko, ho an''ny zanany '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Koa ankehitriny, raha hanao izay soa sy marina amin''ny tompoko ianareo, dia lazao amiko; fa raha tsy izany kosa, dia lazao amiko, mba hiviliako na ho amin''ny ankavanana, na ho amin''ny ankavia. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Dia namaly Labana sy Betoela ka nanao hoe: Avy tamin''i Jehovah no nisehoan''izany zavatra izany, ka tsy mahazo milaza teny aminao izahay, na ratsy na soa. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Indro, Rebeka eto anatrehanao, ento izy, ka mandehana; ary aoka ho vadin''ny zanaky ny tomponao izy, araka izay nolazain''i Jehovah. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Ary rehefa nandre ny tenin-dry zareo ilay mpanompon''i Abrahama, dia niankohoka tamin''ny tany teo anatrehan''i Jehovah izy. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Ary ilay mpanompo dia namoaka firavaka volafotsy sy firavaka volamena ary fitafiana, ka nomeny an-dRebeka; ary nomeny zava-tsoa koa ny anadahiny sy ny reniny.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Dia vao izay no nihinana sy nisotro izy mbamin''ireo lehilahy izay nomba azy, dia nandry. Ary nifoha maraina izy ka nanao hoe: Alefaso ary aho handeha ho any amin''ny tompoko. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Ary hoy ny anadahin-dRebeka sy ny reniny: Aoka hitoetra atỳ aminay andro vitsivitsy ny zazavavy, na dia hafoloana ihany aza; fa rehefa afaka izany, dia handeha izy. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Fa hoy ralehilahy taminy: Aza samponanareo aho, fa Jehovah efa nanambina ny alehako; alefaso aho mba hankany amin''ny tompoko. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Ary hoy izy ireo: Aoka ary hantsoinay ny zazavavy, ka hanontanianay izay teniny. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Dia niantso an-dRebeka izy ka nanao taminy hoe: Handeha hiaraka amin''io lehilahy io va ianao? Ary hoy izy: Handeha aho. '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Dia namoaka an-dRebeka anabaviny sy ny mpitaiza azy ary ilay mpanompon''i Abrahama mbamin''ny olony izy. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Dia nitso-drano an-dRebeka izy ka nanao taminy hoe: Ry anabavinay, tongava alinalina anie ianao, ary aoka ny taranakao hahazo ny vavahadin''izay mankahala azy. '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Ary niainga Rebeka mbamin''ny ankizivaviny ka nitaingina ny rameva, dia nandeha niaraka tamin-dralehilahy; ary nitondra an-dRebeka ilay mpanompo ka lasa nandeha. '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Ary Isaka efa tonga avy tamin''ny nalehany tany Bera-lahai-roy; fa nonina tany amin''ny tany atsimo izy. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Ary Isaka nivoaka mba hieritreritra any an-tsaha, rehefa nitehin-ko hariva ny andro; dia nanopy ny masony izy ka nahita fa indrery nisy rameva avy manatona. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Ary Rebeka koa nanopy ny masony ka nahatazana an''Isaka; dia nidina faingana niala tamin''ny rameva izy. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Ary hoy izy tamin''ilay mpanompo: Iza moa iry lehilahy mitsangantsangana eny an-tsaha avy mitsena antsika iry? Ary hoy ilay mpanompo : Iny no tompoko, dia nandray ny fisalobonana Rebeka, ka nisalobonany. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Ary dia nambaran''ilay mpanompo tamin''Isaka ny zavatra rehetra izay efa nataony. '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: Ary Isaka dia nampandroso an-dRebeka ho ao an-dain'i Saraha reniny ka nampakatra azy ho vadiny; ary tia azy izy, dia nionona ny alahelony an-dreniny.
