document_id: JOB.9
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny teny navalin'i Joba
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dia namaly Joba ka nanao hoe:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fantatro tokoa fa izany no izy; Fa aiza no hahamarina ny zanak'olombelona eo anatrehan'Andriamanitra?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Raha te-hifandahatra aminy izy,dia tsy mahavaly teny Azy na dia iray amin'ny arivo aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hendry am-po Izy sady matanjaka amin'ny hery; iza no nikiry nanohitra Azy ka tsy naninona?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Izay mamindra tendrombohitra, nefa ireny tsy mahalala akory, izay mamadika azy amin'ny fahatezerany,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ary mampihorohoro ny tany ho afaka amin'ny fitoerany, ka mihozongozona ny andriny;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mandidy ny masoandro Izy, ka tsy miposaka iny, ary manisy tombo-kase manafina ny kintana;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Sady Izy irery ihany no mamelatra ny lanitra sy mandia ny onjan-dranomasina;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Manao ireo kintana lehibe Izy, dia ny Bera sy ny Telonohorefy ary ny Ikotokelimiadilaona sy ireo kintana maro any atsimo
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. ireny efi-trano erỳ atsimo
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ary manao zava-dehibe tsy takatry ny saina, eny, fahagagana tsy hita isa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Indro, mandalo ahy Izy, nefa tsy hitako; Ary mihelina Izy, nefa tsy fantatro.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Indro, mipaoka Izy, ka iza no mahasakana Azy? Iza no hanao aminy hoe: Inona no ataonao?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Andriamanitra tsy mampitony ny fahatezerany; Ny mpanampy an-dRahaba
  - type: usfm
    marker: x
    children:
    - type: text
      text: Rahaba = Rehareha
    marker-yv: yv-n
  - type: text
    text: ' aza dia mitanondrika eo ambaniny.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mainka fa izaho tsy mahavaly Azy, na mahafidy teny hifandaharako aminy;
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fa na dia marina aza aho, dia tsy hahavaly tsy akory; Hifona amin'Ilay manana ady amiko no hany heriko.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Raha mba niantso aho, ka namaly ahy aza Izy, dia tsy ho nino aho fa hanaiky ny fitarainako Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fa manorotoro ahy amin'ny tafio-drivotra Izy ka manamaro ny feriko tsy ahoan-tsy ahoana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Sady tsy avelany haka aina akory aho, fa vokisany zava-mangidy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Raha ny amin''ny herin''ny mahery, dia: Indro ary! Ary ny amin''ny fitsarana: Iza no hifandahatra amiko?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Na dia marina aza aho, dia hanameloka ahy ihany ny vavako; Ary na dia tsy manan-tsiny aza aho, dia hanao ahy ho meloka Izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Marina aho, ataoko tsinontsinona ny aiko; Tsy ahoako izay ho velona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tsy misy hafa aminy, ka izany no nanaovako hoe: Ny marina sy ny meloka dia samy aringany avokoa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Raha misy loza
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. fikapohana
    marker-yv: yv-n
  - type: text
    text: ' mahafaty tampoka, dia mihomehy ny fizahan-toetra ny marina Izy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ny tany efa voatolotra ho eo an-tànan'ny ratsy fanahy; Manarona ny tavan'ny mpitsara eo Izy; Raha tsy Izy no manao izany, dia iza, kosa ary?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ny androko dia faingana noho ny tsimandoa; Lasa ireny ka tsy nahita soa akory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Mihelina tahaka ny lakana faingam-pandeha
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. lakana zozoro
    marker-yv: yv-n
  - type: text
    text: ' izy, tahaka ny voromahery mipaoka hanina.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Raha hoy izaho: Hanadino ny alaheloko aho, hitsahatra tsy hanjonitra aho ka ho miramirana,'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Dia mahatsiravina ahy ny fahoriako rehetra; Fantatro fa tsy hataonao ho tsy manan-tsiny aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tsy maintsy hatao ho meloka ihany aho, koa nahoana aho no hanasa-tena foana?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Na dia mandro amin'ny oram-panala aza aho ka manadio ny tanako amin'ny ranon-davenona,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Dia hanitrika ahy any am-pahitra miaraka amin'izay Hianao, ka hataon'ny fitafiako ho zava-betaveta aho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Fa tsy olona tahaka ahy Izy ka ho azoko valiana hifanatrehanay amin'ny fitsarana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Tsy misy mpanelanelana anay Hametraka ny tànany aminay roa tonta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Aoka hanaisotra ny tsorakazony amiko Izy, ary aoka tsy hampahatsiravina ahy ny fampitahorany,
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Dia hiteny aho ka tsy hatahotra Azy; Fa fantatro fa tsy hatahotra foana aho.
