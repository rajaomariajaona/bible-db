document_id: PSA.68,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fankalazana an'Andriamanitra noho ny fitondrany ny Isiraely sy ny fandreseny ny fahavalony
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ho an''ny mpiventy hira. Salamo nataon''i Davida. Tonon-kira. Aoka hitsangana Andriamanitra, ka hiely ny fahavalony; ary aoka izay mankahala Azy handositra ny tavany. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ny olonao
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. bibinao
      marker-yv: yv-n
    - type: text
      text: ' tamàn-toerana teo; mamboatra ho an''ny ory araka ny fahasoavanao Hianao, Andriamanitra ô. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ny Tompo manome ny teny; ary ny vehivavy mpilaza soa dia antokony lehibe. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ireo mpanjaka be miaramila dia vaky mandositra; ary ny vehivavy izay mitoetra ao an-trano no mizara ny babo. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Raha mandry eo amin''ny vala ianareo, dia ho tahaka ny ela-boromailala miravaka volafotsy, ary ny volony miravaka volamena tsara '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Raha aelin'ny Tsitoha eo ny mpanjaka maro, dia latsaka ny oram-panala ao Zalmona.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Tendrombohitr''Andriamanitra ny tendrombohitr''i Basana. Tendrombohitra maro tampona ny tendrombohitr''i Basana. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ry tendrombohitra maro tampona, nahoana ianareo no mihendry ny tendrombohitra izay tian''Andriamanitra hitoerany? eny, hitoetra ao mandrakizay Jehovah. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ny kalesin'Andriamanitra dia roa alina, eny, arivo arivo; ny Tompo no eo aminy; Sinay dia eo amin'ny itoerana masina
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: amin''ny fahamasinana'
      marker-yv: yv-n
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Efa niakatra ho any amin'ny avo Hianao ka mitondra babo; efa nandray fanomezana teo amin'ny olombelona Hianao - eny, teo amin'ny maditra aza,- mba hitoeran'i Jehovah Andriamanitra any
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: ao aminy; na: mba hitoeranao any, ry Jehovah Andriamanitra; na: Efa nandray olona ho fanomezana Hianao Eny, na dia ny maditra aza mba hitoeranay ao amin''i Jehovah Andriamanitra'
      marker-yv: yv-n
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Isaorana anie ny Tompo Izay mitondra ny entan-tsika isan'andro isan'andro
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Isaorana isan''andro isan''andro anie ny Tompo; Raha misy mahavesatra antsika, dia Andriamanitra no famonjena antsika; na: Isaorana anie ny Tompo, Izay mampitondra entana antsika isan''andro isan''andro'
      marker-yv: yv-n
    - type: text
      text: ', eny, Andriamanitra Izay famonjena antsika. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Tahaka ny fanely setroka no fanelinao azy; tahaka ny fiempon''ny savoka eo anoloan''ny afo no aoka hahalevonan''ny ratsy fanahy eo anatrehan''Andriamanitra. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Andriamanitra no Andriamanitry ny famonjena ho antsika; ary an''i Jehovah Tompo ny fanafahana amin''ny fahafatesana. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Fa Andriamanitra mamely mafy ny lohan''ny fahavalony, dia ny tampon-doha lava volo an''izay mandroso amin''ny fahadisoany. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Lazain''ny Tompo hoe: hampody ny any Basana Aho; hampody ny amin''ny ranomasina lalina Aho, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Mba hampihosenanao rà ny tongotrao, ary ho anjaran'ny lelan'ny amboanao ny fahavalo.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Efa hita ny fandehananao, Andriamanitra ô, dia ny fandehanan'Andriamanitro, Mpanjakako, ao amin'ny fitoerana masina
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: amin''ny fahamasinana'
      marker-yv: yv-n
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Mialoha ny mpihira, ary manaraka ny mpitendry valiha, eo afovoan''ny zatovovavy mively ampongatapaka. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Misaora an''Andriamanitra eo amin''ny fiangonana, eny, misaora ny Tompo, ianareo ary amin''ny loharanon''ny Isiraely. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Indry Benjamina kely, mpanapaka azy, ny antokon'ny mpanapaka ny Joda, ny mpanapaka ny Zebolona sy ny mpanapaka ny Naftaly.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Andriamanitrao no nampahery anao; Ry Andriamanitra Izay miasa ho anay ô, asehoy ny herinao. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Noho
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Avy amin'''
      marker-yv: yv-n
    - type: text
      text: ' ny tempolinao eo an-tampon''i Jerosalema, no hitondran''ny mpanjaka maro fanatitra ho Anao. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fa ny marina mifaly; eny, ravoravo eo anatrehan'Andriamanitra izy ka faly tokoa.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Teneno mafy ny biby eny anaty zozoro sy ny fivorian''ny ombilahy mbamin''ireo vahoaka zanak''omby, dia izay miankohoka manatitra anja-bolafotsy aelezo ny olona tia ady '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ho avy ny tremalahin'i Egypta; Etiopia halaky hananty tanana amin'Andriamanitra.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ry fanjakana ambonin''ny tany, mihirà ho an''Andriamanitra; mankalazà ny Tompo, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ilay mitaingina ny lanitry ny lanitra izay hatry ny fahagola; Indro, mamoaka ny feony Izy, dia feo mahery. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ekeo ho an''Andriamanitra ny hery; ambonin''ny Isiraely ny voninahiny, ary ny heriny any amin''ny lanitra. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Mahatahotra Hianao, Andriamanitra ô, ao amin'ny fitoeranao masina; Andriamanitry ny Isiraely no manome hery sy tanjaka ho an'ny olona. Isaorana anie Andriamanitra.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mihirà ho an''Andriamanitra, mankalazà ny anarany; manamboara lalana ho an''izay mitaingina mamaky ny efitra Jehovah no anarany ary mifalia eo anatrehany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Rain''ny kamboty sy Mpanome rariny ny mpitondratena Andriamanitra, ao amin''ny fonenany masina. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Andriamanitra mampitoetra an-trano izay irery tena; mamoaka ny mpifatotra ho amin'ny fanambinana Izy; fa ny maditra hitoetra amin'ny tany karankaina.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Andriamanitra ô, raha nandeha teo alohan''ny olonao Hianao ka namaky ny efitra, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dia nihorohoro ny tany, ary nitaitaika ny lanitra, tamin''ny fanatrehan''Andriamanitra, na iry Sinay iry aza tamin''ny fanatrehan''Andriamanitra, Andriamanitry ny Isiraely. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ranonoram-pitahiana no nalatsakao tamin''ny lovanao, Andriamanitra ô; ary raha kotra izy, dia novelombelominao. '
