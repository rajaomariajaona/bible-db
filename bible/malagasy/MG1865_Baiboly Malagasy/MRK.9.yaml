document_id: MRK.9,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary hoy Izy taminy: Lazaiko aminareo marina tokoa: Misy ny sasany eto izay tsy mba hanandrana fahafatesana mandra-pahitany ny fanjakan''Andriamanitra tonga amin''ny hery. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ary nitana izany teny izany izy ka nifampaka saina ny amin''izay hevitr''izany fitsanganana amin''ny maty izany. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dia nanontany an''i Jesosy izy ka nanao hoe: Lazain'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Na: Nahoana no lazain'''
      marker-yv: yv-n
    - type: text
      text: '''ny mpanora-dalàna fa Elia tsy maintsy ho avy aloha. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ary Izy nanao taminy hoe: Elia dia avy aloha ihany ka mampody ny zavatra rehetra. Ary ahoana kosa no nanoratana ny amin''ny Zanak''olona fa tsy maintsy mijaly mafy Izy ka hatao tsinontsinona? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Nefa lazaiko aminareo: Efa tonga Elia, sady nataon''ny olona taminy izay sitraky ny fony araka ny nanoratana azy.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ary nony tonga teo amin''ny mpianatra izy, dia nahita vahoaka betsaka manodidina azy sy mpanora-dalàna niady hevitra taminy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary niaraka tamin''izay, nony nahita Azy ny vahoaka rehetra, dia talanjona ka nihazakazaka nanatona sy niarahaba Azy. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ary Izy nanontany azy hoe: Inona no iadianareo hevitra amin''ireto? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary ny anankiray tamin''ny vahoaka namaly ka nanao hoe: Mpampianatra ô, nentiko ho etỳ aminao ny zanako-lahy, izay azom-panahy moana; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'ary na aiza na aiza no ahazoany azy, dia ampihinjitrinjiriny izy, ary mandoa vory, dia mikitro-nify sady valaka dia valaka; ary niteny tamin''ny mpianatrao aho mba hamoaka izany; fa tsy hainy. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary Jesosy namaly azy hoe: Ry taranaka tsy mino, mandra-pahoviana no hitoerako aminareo? Mandra-pahoviana no handeferako aminareo? Ento etỳ amiko izy. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ary nony afaka henemana, Jesosy dia naka an''i Petera sy Jakoba ary Jaona ka nitondra azy nitokana niakatra ho any an-tendrombohitra avo anankiray; dia niova tarehy teo anatrehany Izy, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dia nentiny teo aminy izy; fa nony nahita an''i Jesosy izy, dia nampifanintontsintona ny tenany niaraka tamin''izay ny fanahy. Dia lavo tamin''ny tany izy sady nitsinkasinkasina sy nandoa vory. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary Jesosy nanontany an-drainy hoe: Hoatrinona izay no nahatongavan''izao taminy? Ary hoy izy: Hatry ny fony izy mbola zaza. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ary nazerany matetika tao anaty afo sy tao anaty rano izy hamonoany azy; fa raha mba misy hainao, dia mamindrà fo aminay, ka vonjeo izahay. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fa hoy Jesosy taminy: Hainao hoe? Ny zavatra rehetra dia hain''ny mino. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ary niaraka tamin'izay dia niantso
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Ampio hoe: sady nandrotsa-dranomaso'
      marker-yv: yv-n
    - type: text
      text: ' ny rain-drazazalahy ka nanao hoe: Mino aho; vonjeo mba ho afaka amin''ny tsi-finoako. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ary nony hitan''i Jesosy fa nihazakazaka nanatona azy ny vahoaka, dia niteny mafy ny fanahy maloto Izy ka nanao taminy hoe: Ry fanahy moana sy marenina! Izaho mandidy anao: Mivoaha aminy, ka aza miditra ao anatiny intsony. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary rehefa ninananana izy sady nampifanintontsintona mafy ilay zazalahy, dia nivoaka taminy; ary efa toy ny maty, ka dia nataon''ny maro hoe: Maty. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Fa Jesosy nandray ny tànany ka nanarina azy; dia nitsangana izy. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ary rehefa tonga tao an-trano Jesosy, dia nanontany Azy mangingina ny mpianany hoe: izahay'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Na:Nahoana izahay no
      marker-yv: yv-n
    - type: text
      text: ' tsy nahavoaka azy. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ary hoy Izy taminy: Iny karazana iny tsy mba azo avoaka na amin''inona na amin''inona, afa-tsy amin''ny fivavahana'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Ampio hoe: sy ny fifadian-kanina'
      marker-yv: yv-n
    - type: text
      text: ' ihany.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'ary ny fitafiany niova nanelatrelatra sady fotsy indrindra, ka tsy misy mpamotsy lamba ambonin''ny tany mahafotsy toy izany. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Dia niala teo izy ka nizotra namaky an''i Galilia, ary tsy tian''i Jesosy ho fantatry ny olona izany. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Fa nampianatra ny mpianany Izy ka nanao taminy hoe: Ny Zanak''olona dia hatolotra eo an-tànan''ny olona ka hovonoiny; ary rehefa voavono Izy, dia hitsangana rehefa afaka hateloana. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Fa izy ireo tsy nahafantatra izany teny izany sady natahotra hanontany Azy.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary tonga tao Kapernaomy izy; ary rehefa mby tao an-trano Jesosy, dia nanontany ny mpianany hoe: Inona no niadianareo hevitra teny an-dalana? '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Fa tsy nahateny izy, satria efa niady hevitra teny an-dalana izy ny amin''izay lehibe indrindra. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ary rehefa tafapetraka Jesosy, dia niantso ny roa ambin''ny folo lahy Izy ka nanao taminy hoe: Raha misy te-ho voalohany, dia hatao farany amin''izy rehetra sy ho mpanompo''izy rehetra izy. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Ary nandray zaza Izy ka nametraka azy teo afovoany; ary raha notrotroiny ilay zaza, dia hoy Izy tamin''ny mpianany: '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Na zovy na zovy no mandray zaza iray tahaka itony amin''ny anarako, dia mandray Ahy; ary na zovy na zovy no mandray Ahy, dia tsy mandray Ahy, fa Izay naniraka Ahy. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Ary hoy Jaona taminy: Mpampianatra ô, nahita olona anankiray namoaka demonia tamin''ny anaranao izahay, ka noraranay izy, satria tsy nanaraka antsika. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Fa hoy Jesosy: Aza mandrara azy; fa tsy misy olona izay hanao asa lehibe amin''ny anarako ka hahateny ratsy Ahy vetivety. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary Elia sy Mosesy niseho taminy ka niresaka tamin''i Jesosy. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Fa izay tsy manohitra antsika dia momba antsika. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Fa na iza na iza no manome anareo rano eran''ny kapoaka hosotroinareo, satria an''i Kristy ianareo, dia lazaiko aminareo marina tokoa fa tsy ho very ny valim-pitiany. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Ary na iza na iza no mahatafintohina na iray aza amin''ireo madinika mino Ahy ireo, dia tsara ho azy, raha anantonana vato lehibe fikosoham-bary ny vozony, ka hatsipy ao anaty ranomasina izy. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Ary raha ny tananao no manafintohina anao, tapaho izy; fa tsara ho anao ny hiditra kilemaina any amin'ny fiainana noho ny manana tanana roa, nefa hariana any amin'ny helo
    - type: usfm
      marker: x
      children:
      - type: text
        text: Gr. Gehena
      marker-yv: yv-n
    - type: text
      text: ', dia any amin''ny afo tsy azo vonoina'
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Ampio hoe: (44) any amin''ny kankana tsy maty, ary ny afo tsy vonoina'
      marker-yv: yv-n
    - type: text
      text: '. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Ary raha ny tongotrao no manafintohina anao, tapaho izy; fa tsara ho anao ny hiditra mandringa any amin'ny fiainana noho ny manana tongotra roa, nefa hariana any amin'ny helo
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Ampio hoe: (46) any amin''ny afo tsy azo vonoina; any ny kankany tsy maty, ary ny afo tsy vonoina'
      marker-yv: yv-n
    - type: text
      text: '. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Ary raha ny masonao no manafintohina anao, esory hiala izy: fa tsara ho anao ny hiditra toka-maso amin''ny fanjakan''Andriamanitra noho ny manana maso roa, nefa hariana any amin''ny helo; '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'any ny kankany tsy maty, ary ny afo tsy vonoina. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Fa samy ho voasira amin'ny afo izy rehetra
    - type: usfm
      marker: x
      children:
      - type: text
        text: 'Ampio hoe: ary ny fanatitra rehetra samy ho voasira amin''ny fanasina'
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary niteny Petera ka nanao tamin''i Jesosy hoe: Raby ô, tsara raha mitoetra eto isika; ary aoka hanao lay telo izahay: ny anankiray ho Anao, ny anankiray ho an''i Mosesy, ary ny anankiray ho an''i Elia. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Tsara ny sira, fa raha tonga matsatso izy, inona no ho entinareo mampody ny tsirony? Aoka hisy sira ao anatinareo, ka mihavàna tsara ianareo.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa tsy fantany izay havaliny, satria efa raiki-tahotra izy rehetra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ary nisy rahona niseho nanarona azy; ary dia nisy feo avy tao amin''ny rahona nanao hoe: Ity no Zanako malalako, Izy no henoy. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary niaraka tamin''izay, nony nijery manodidina izy ireo, dia tsy nisy hitany intsony na iza na iza afa-tsy Jesosy irery ihany, Izay teo aminy. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ary nony nidina avy teo an-tendrombohitra Izy, dia nandrara azy Jesosy mba tsy hilazalaza amin''olona izay zavatra efa hitany mandra-pitsangan''ny Zanak''olona amin''ny maty. '
