document_id: JHN.21
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rehefa afaka izany, dia niseho tamin''ny mpianatra indray Jesosy teo amoron''ny Ranomasin''i Tiberiasy; ary toy izao no nisehoany: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Niaraka Simona Petera sy Tomasy, izay atao hoe Didymo, sy Natanaela, ilay avy tany Kana any Galilia, sy ireo zanak''i Zebedio ary mpianatra roa lahy hafa koa. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hoy Simona Petera taminy: Handeha hanarato aho. Hoy ireo taminy: Handeha hiaraka aminao koa izahay. Dia nandeha izy ka niditra an-tsambokely, ary tamin''iny alina iny dia tsy nahazo na inona na inona akory izy. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary nony efa nazava ratsy ny andro, dia nitsangana teo amoron-dranomasina Jesosy, kanefa tsy fantatry ny mpianatra ho Jesosy izany. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Dia hoy Jesosy taminy: Anaka, manan-kanina'
  - type: usfm
    marker: x
    children:
    - type: text
      text: Gr. laoka
    marker-yv: yv-n
  - type: text
    text: ' va ianareo? Dia namaly Azy hoe izy: Tsia. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary hoy Izy taminy: Alatsaho eo amin''ny sisiny ankavanan''ny sambokely ny haratonareo, dia hahazo ianareo. Koa dia nalatsany izany, ka tsy zakany nakarina noho ny habetsahan''ny hazandrano. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary hoy ny mpianatra izay tian''i Jesosy tamin''i Petera: Ny Tompo iry . Ary raha ren''i Simona Petera fa ny Tompo iny, dia nisikinany ny akanjo ivelany (fa tsy niakanjo izy), ka nirotsaka teo amin''ny ranomasina izy. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa ny mpianatra sasany nandeha an-tsambokely ihany nisarika ny harato feno hazandrano; fa tsy lavitra ny tany izy, fa tokony ho roan-jato hakiho ihany. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Raha vao nikatra teo an-tanety izy, dia nahita afon''arina teo sy hazandrano teo amboniny ary mofo. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Hoy Jesosy taminy: Analao hazandrano amin''ireo vao azonareo teo. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dia niakatra Simona Petera, ka nosarihany ho eo an-tanety ny harato feno hazandrano vaventy, telo amby dimam-polo amby zato; ary na dia be tahaka izany aza izy, dia tsy triatra ny harato. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Hoy Jesosy taminy: Avia hisakafo. Fa tsy nisy mpianatra sahy nanontany Azy hoe: Iza moa Hianao? satria fantany ihany fa ny Tompo Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ary tonga Jesosy, dia nandray ny mofo, ka natolony azy, dia vao ny hazandrano indray. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Izany no fanintelon''ny nisehoan''i Jesosy tamin''ny mpianatra, rehefa nitsangana tamin''ny maty Izy. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ary rehefa nisakafo izy, dia hoy Jesosy tamin''i Simona Petera: Simona, zanak''i Jaona, moa ny fitiavanao Ahy mihoatra noho ny fitiavan''ireto? Hoy izy taminy: Eny, Tompoko; Hianao mahalala fa tia Anao aho. Dia hoy Izy taminy: Fahano ary ny ondrikeliko. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Hoy indray Izy taminy fanindroany: Simona, zanak''i Jaona, moa tia Ahy va ianao? Dia hoy izy taminy: Eny, Tompoko; Hianao mahalala fa tia Anao aho. Dia hoy Izy taminy: Andraso ary ny ondriko. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Hoy Izy fanintelony: Simona, zanak''i Jaona, moa tia Ahy va ianao? Dia nalahelo Petera, satria Izy nanao intelo taminy hoe: Moa tia Ahy va ianao? Ka hoy izy taminy: Tompoko, Hianao mahalala ny zavatra rehetra; fantatrao fa tia Anao aho. Hoy Jesosy taminy: Fahano ary ny ondriko. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lazaiko aminao marina dia marina tokoa: Raha mbola tanora ianao, dia nisikina ka nandeha tamin''izay tianao; fa rehefa antitra kosa ianao, dia haninjitra ny tananao, ary olon-kafa no hanikina anao ka hitondra anao amin''izay tsy tianao. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ary izany no nolazainy hanambara ny fomban''ny fahafatesana izay hankalazany an''Andriamanitra. Ary rehefa voalazany izany, dia hoy Izy taminy: Manaraha Ahy. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dia nitodika Petera ka nahita ny mpianatra izay tian''i Jesosy manaraka, dia ilay niankina tamin''ny tratrany tamin''ny fisakafoana ka nanao hoe: Tompoko, iza no hamadika Anao? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Koa rehefa nahita azy Petera, dia hoy izy: Tompoko, inona no ho amin''ity lehilahy ity? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hoy Jesosy taminy: Raha tiako hitoetra izy mandra-pihaviko, ahoanao izany? fa manaraha Ahy ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ary niely tamin''ny rahalahy izany teny izany, fa tsy ho faty izany mpianatra izany; nefa Jesosy tsy nilaza taminy fa tsy ho faty izy, fa: Raha tiako hitoetra izy mandra-pihaviko, ahoanao izany? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Izy no ilay mpianatra izay vavolombelona manambara izany sy nanoratra izany; ary fantatsika fa marina ny fanambarany. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ary misy zavatra maro hafa koa izay nataon'i Jesosy, ka raha voasoratra tsirairay avokoa izany rehetra izany, ataoko fa izao tontolo izao aza dia tsy omby ny boky voasoratra.
