document_id: 2CH.8,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ny amin'ny trano nataon'i Solomona sy ny nandaminay ny amin'ny fanatitra hatao ao amin'ny tempoly
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nony afaka ny roa-polo taona naonaovan''i Solomona ny tranon''i Jehovah sy ny lapan''ny tenany, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary izao no mpifehy ny olona voatendrin''i Solomona mpanjaka, dia dimam-polo amby roan-jato izay nanapaka ny olona. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Solomona nitondra ny zanakavavin''i Farao niakatra avy tany an-Tanànan''i Davida ho ao amin''ny trano izay nataony ho azy, fa hoy izy: Ny vadiko tsy mahazo mitoetra ao an-tranon''i Davida, mpanjakan''ny Isiraely, fa masina izay efa nidiran''ny fiaran''i Jehovah.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin''izany Solomona nanatitra fanatitra dorana ho an''i Jehovah teo ambonin''ny alitaran''i Jehovah, izay naoriny teo anoloan''ny lavarangana fidirana; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'eny, nanatitra izay fanao isanandro izy araka ny didin''i Mosesy dia tamin''ny Sabata sy ny voaloham-bolana ary ny fotoam-pivavahana intelo isan-taona, dia tamin''ny andro firavoravoana fihinanana mofo tsy misy masirasira sy ny andro firavoravoana manarakaraka ireo herinandro ary ny andro firavoravoana fitoerana amin''ny trano rantsan-kazo. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary notendreny koa ny antokon''ny mpisorona araka ny nandaharan''i Davida rainy azy ho amin''ny fanompoany avy ary ny Levita ho amin''ny anjara-raharahany koa, dia ny hidera sy hanao fanompoam-pivavahana eo anoloan''ny mpisorona araka ny raharaha fanao isan''andro, ary ny mpiandry varavarana araka ny antokony amin''ny isam-bavahady; fa izany no nandidian''i Davida lehilahin''Andriamanitra, azy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tsy nialan''ireo ny didin''ny mpanjaka tamin''ny mpisorona sy ny Levita na amin''inona na amin''inona, indrindra fa ny amin''ny rakitra. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toy izany no nanamboaran''i Solomona ny asa rehetra nataony hatramin''ny andro nanorenany ny tranon''i Jehovah ka ambara-pahavitany; ka dia vita tsara ny tranon''i Jehovah. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary tamin''izay Solomona dia nankany Ezion-gebera sy Elota eo amoron''ny ranomasina any amin''ny tany Edoma, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ary ny mpanompon'i Hirama dia nampandehaniny hitondra sambo sy mpanompo izay mahay ranomasina; ary niara-nandeha tamin'ny mpanompon'i Solomona ho any Ofira ireo ka nahazo talenta volamena dimam-polo amby efa-jato tany izy, dia nentiny tany amin'i Solomona mpanjaka izany.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia namboariny ny tanàna izay nomen''i Hirama azy ka namponenany ny Zanak''isiraely. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary Solomona nankany Hamata-zoba ka naharesy azy. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary nanorina an''i Tadmora tany an-efitra sy ny tanana fitehirizana rehetra izay nataony tany Hamata izy. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary namboariny koa Beti-horona ambony sy Beti-horona ambany, tanàna mafy misy manda sy vavahady mihidy, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ary Baleta sy ny tanàna fitehirizana rehetra izay an''i Solomona sy ny tanàna rehetra fitoeran-kalesy sy ny tanàna fitoeran''ny mpitaingin-tsoavaly ary izay rehetra tian''i Solomona haorina tany Jerosalema sy tany Libanona ary tany amin''ny tany nanjakany rehetra. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ary ny amin''ny olona sisa rehetra tamin''ny Hetita sy ny Amorita sy ny Perizita sy ny Hivita ary ny Jebosita, izay tsy isan''ny Isiraely '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'dia ny taranany izay sisa nandimby azy teo amin''ny taniny, fa tsy naringan''ny Isiraely, no nampanaovin''i Solomona fanompoana mandraka androany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fa ny Zanak''isiraely dia tsy mba nampanaovin''i Solomona izany, fa ireo kosa no miaramila sy komandin''ny mpanafika malaza ary komandin''ny kalesiny sy ny mpitaingin-tsoavaliny '
