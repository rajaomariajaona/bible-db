document_id: EZK.34,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny mpiandry ondry ratsy fanahy, sy ny mbola hanangonana ny ondry, ary ny hanendrena mpiandry tsara hiandry azy
  - type: text
    content: 'Ary tonga tamiko ny tenin''i Jehovah nanao hoe: '
  '10':
  - type: text
    content: 'Izao no lazain''i Jehovah Tompo: Indro, avy hamely ny mpiandry ondry Aho, dia hampamoahiko ny amin''ny ondriko izy ka hesoriko tsy hiandry ny ondry intsony; dia tsy hamahan-tena intsony ny mpiandry ondry, fa hovonjeko eo amin''ny vavany ny ondriko mba tsy ho azony hohanina intsony.'
  '11':
  - type: text
    content: 'Fa izao no lazain''i Jehovah Tompo: Indro, Izaho, eny, Izaho no hiahy ny ondriko sy handinidinika azy. '
  '12':
  - type: text
    content: 'Toy ny fandinidiniko ny mpiandry ny ondriny amin''izay andro hahatratrarany ny ondriny izay efa niely, dia toy izany no handinidinihako ny ondriko sy hamonjeko azy avy any amin''izay rehetra efa nielezany tamin''ny andro mandrahona sy maizim-pito. '
  '13':
  - type: text
    content: 'Ary ho entiko mivoaka avy any amin''ny firenena izy ka hangoniko avy any amin''ny tany samy hafa, dia ho entiko ho any amin''ny taniny sy handrasako eny an-tendrombohitry ny Isiraely sy eny an-dohasahan-driaka izy ary eny amin''izay tsara honenana rehetra eran''ny tany. '
  '14':
  - type: text
    content: Eny amin'ny tany tsara ho fiandrasana no hiandrasako azy, ary eny an-tendrombohitra avon'ny Isiraely no ho tany hiandrasana azy; ao no handriany amin'ny tany tsara, ary eny amin'ny fiandrasana tsara ahitra
  - type: note
    content: Heb. matavy
  - type: text
    content: ' no hihinanany, dia any an-tendrombohitry ny Isiraely. '
  '15':
  - type: text
    content: 'Izaho no hiandry ny ondriko, ary Izaho no hampandry azy, hoy Jehovah Tompo. '
  '16':
  - type: text
    content: 'Ny very hotadiaviko, ny voaroaka hampodiko, ny folaka hohamarako, ny malemy hohatanjahiko; fa ny matavy sy ny matanjaka kosa dia haringako ka handrasako amin''ny fitsarana. '
  '17':
  - type: text
    content: 'Ary ny aminareo, ry ondriko, izao no lazain''i Jehovah Tompo: Indro, hotsaraiko ny adin''ny ondry aman''osy, dia ny ady ataon''ny ondrilahy sy ny osilahy namany aminy. '
  '18':
  - type: text
    content: 'Moa ataonareo ho zavatra kely va ny nandanianareo ny ahitra tsara, no dia nohosihosen''ny tongotrareo ny ahitrareo sisa, ary ny efa nisotroanareo ny rano madio, no dia nolotoin''ny tongotrareo ny sisa? '
  '19':
  - type: text
    content: 'Ary ny amin''ny ondriko, moa izay voahosihosin''ny tongotrareo va no hohaniny, ary izay voaloton''ny tongotrareo va no hosotroiny? '
  '2':
  - type: text
    content: 'Ry zanak''olona, maminania ny hamelezana ny mpiandry ny Isiraely, eny, maminania, ka ataovy aminy hoe: Izao no lazain''i Jehovah Tompo: Lozan''ny mpiandry ondrin''ny Isiraely izay mamahan-tena! Moa tsy ny ondry va no tokony handrasan''ny mpiandry? '
  '20':
  - type: text
    content: 'Koa izao no lazain''i Jehovah Tompo aminy: Indro, Izaho, eny, Izaho no hitsara ny adin''ny ondry matavy amin''ny ondry mahia. '
  '21':
  - type: text
    content: 'Satria ny tehezanareo sy ny sorokareo no entinareo manosika ny marary rehetra, ary ny tandrokareo no entinareo manoto azy mandra- pandronjinareo azy ho any ivelany; '
  '22':
  - type: text
    content: 'dia hovonieko ny ondriko, ary tsy ho babo intsony izy, ary hotsaraiko ny adin''ny ondry amin''ny ondry namany. '
  '23':
  - type: text
    content: 'Ary hanangana Mpiandry iray ho azy Aho, Izy no hiandry azy, dia Davida Mpanompoko, ka Izy no hitondra azy sy ho Mpiandry azy. '
  '24':
  - type: text
    content: 'Ary Izaho Jehovah no ho Andriamaniny, ary Davida Mpanompoko no ho Mpanapaka ao aminy. Izaho Jehovah no niteny izany. '
  '25':
  - type: text
    content: 'Ary hanao fanekem-pihavanana aminy Aho ka hampiala ny biby masiaka tsy ho eo amin''ny tany intsony, dia handry fahizay izy na dia any an-efitra aza, sady hatory na dia any anaty ala aza. '
  '26':
  - type: text
    content: 'Ary izy sy ny manodidina ny havoanako dia hataoko fitaziana, ary hampilatsaka ranonorana amin''ny fotoany Aho, dia ranonoram-pitahiana mivatravatra. '
  '27':
  - type: text
    content: 'Ary hamoa ny hazo any an-tsaha, sady hahavokatra ny tany, ary handry fahizay amin''ny tany izy; ka dia ho fantany fa Izaho no Jehovah, raha hotapahiko ny ziogany, ary hovonjeko amin''ny tànan''izay nampanompo azy izy. '
  '28':
  - type: text
    content: 'Ary tsy ho babon''ny jentilisa na ho rembin''ny bibi-dia intsony izy, fa handry fahizay, ary tsy hisy hanaitaitra azy. '
  '29':
  - type: text
    content: 'Ary hampaniry voly ho laza ho azy Aho, ka tsy ho ritry ny mosary amin''ny tany intsony izy, na hitondra ny latsan''ny jentilisa intsony; '
  '3':
  - type: text
    content: 'Ny taviny dia haninareo, ary ny volony tafinareo, ny nafahy vonoinareo; nefa ny ondry tsy mba andrasanareo. '
  '30':
  - type: text
    content: 'ka dia ho fantany fa Izaho, Jehovah Andriamaniny, no momba azy, ary izy, taranak''Isiraely, no oloko, hoy Jehovah Tompo. '
  '31':
  - type: text
    content: Ary ny aminareo ondriko ondry fiandriko olona ianareo, ary Izaho no Andriamanitrareo, hoy Jehovah Tompo.
  '4':
  - type: text
    content: 'Tsy manatanjaka ny malemy ianareo, na manasitrana ny marary, na manamatra ny folaka, na mampody ny noroahina, na mikatsaka ny very; fa loza loatra ny fampanomponareo azy. '
  '5':
  - type: text
    content: 'Dia miely izy, satria tsy misy mpiandry; ary rehefa miely izy, dia tonga rembin''ny bibidia rehetra. '
  '6':
  - type: text
    content: 'Mirenireny eny an-tendrombohitra sy eny amin''ny havoana andrandraina rehetra ny ondriko; eny, any amin''ny tany rehetra no ielezan''ny ondriko, ary tsy misy mitady na miahy azy. '
  '7':
  - type: text
    content: 'Koa mihainoa ny tenin''i Jehovah ianareo, ry mpiandry ondry: '
  '8':
  - type: text
    content: 'Raha velona koa Aho, hoy Jehovah Tompo, noho ny nahababoan''ny ondriko sy ny nahatongavan''ny ondriko ho rembin''ny bibi-dia rehetra, satria tsy nisy mpiandry azy, fa tsy nitady ny ondriko ny mpiandry, fa ny mamahan-tena kosa no ataony, ka tsy namahana ny ondriko, '
  '9':
  - type: text
    content: 'dia mihainoa ny tenin''i Jehovah ianareo, ry mpiandry ondry. '
