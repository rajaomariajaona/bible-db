document_id: HOS.3,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny amin'ny vehivavy janga anankiray, izay natao tandindon'ny Isiraely
  - type: text
    content: 'Dia hoy Jehovah tamiko: Mandehana indray, tiava vehivavy izay tian''ny vadiny nefa'
  - type: note
    content: 'Na: tian''ny sakaizany sady'
  - type: text
    content: ' mijangajanga, dia tahaka ny fitiavan''i Jehovah ny Zanak''Isiraely, nefa ireo kosa dia mihodina ho amin''izay andriamani-kafa sady tia ampempam-boaloboka. '
  '2':
  - type: text
    content: 'Ka dia novidiko sekely volafotsy dimy ambin''ny folo sy vary hordea homera iray sy tapany izy. '
  '3':
  - type: text
    content: 'Ary hoy izaho taminy: Andro maro no hitoeranao miandry ahy; fa tsy havela hijangajanga na hanambady olon-kafa ianao; ary izaho koa dia ho toy izany aminao. '
  '4':
  - type: text
    content: 'Fa andro maro no hitoeran''ny Zanak''Isiraely tsy hanana mpanjaka, na mpanapaka, na fanatitra, na tsangam-bato, na efoda, na terafima. '
  '5':
  - type: text
    content: Rehefa afaka izany, dia hiverina ny Zanak'Isiraely ka hitady an'i Jehovah Andriamaniny sy Davida mpanjakany; ary nandeha amin-kovitra hanatona an'i Jehovah sy ny fahasoavany izy, raha mby any amparany.
