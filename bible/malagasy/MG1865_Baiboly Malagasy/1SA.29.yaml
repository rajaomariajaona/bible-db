document_id: 1SA.29,96
type_code: plt
verses:
  '1':
  - type: heading
    content: Ny nanesorana an'i Davida tsy hiaraka tamin'ny miaramilan'ny Filistina
  - type: text
    content: 'Ary ny Filistina dia namory ny miaramilany rehetra ho ao Afeka; fa ny Isiraely kosa nitoby teo anilan''ny loharano ao Jezirela. '
  '10':
  - type: text
    content: 'Koa mifohaza maraina koa ianao mbamin''ny mpanompon''ny tomponao izay nanaraka anao; ary rehefa nifoha maraina ianareo, ka mazava ny andro, dia mandehana. '
  '11':
  - type: text
    content: Ary Davida sy ny olony nifoha maraina koa handeha maraina hiverina any amin'ny tanin'ny Filistina. Ary ny Filistina dia niakatra nankany Jezirela.
  '2':
  - type: text
    content: 'Ary ireo andrianan''ny Filistina nandroso nitarika ny miaramilany isan-jato sy isan''arivo; fa Davida sy ny olony kosa nandroso teo aoriana niaraka tamin''i Akisy. '
  '3':
  - type: text
    content: 'Ary hoy ireo andrianan''ny Filistina: Haninona moa ireto Hebreo ireto? Ary hoy Akisy tamin''ireo andrianan''ny Filistina: Tsy io va no Davida, mpanompon''i Saoly, mpanjakan''ny Isiraely, ilay tatỳ amiko elaela ihany izay, ary tsy hitako izay tsininy hatrizay nialany niandany tamiko ka mandraka androany? '
  '4':
  - type: text
    content: 'Dia tezitra taminy ireo andrianan''ny Filistina ka nanao taminy hoe: Avereno ihany ilehio ho any amin''ny fonenany izay efa nomenao azy, fa aza avela hidina hiaraka amintsika hiady izy, fandrao ho tonga fahavalontsika raha miady; fa amin''inona no hahazoan''io sitraka amin''ny tompony? Tsy amin''ny lohan''ireto olona ireto va? '
  '5':
  - type: text
    content: 'Tsy io moa no Davida, izay nandihizany sy nanaovany hira mifamaly hoe: "Saoly nahafaty arivoarivo, Fa Davida nahafaty alinalina?"'
  '6':
  - type: text
    content: 'Ary Akisy niantso an''i Davida ka nanao taminy hoe: Raha velona koa Jehovah, marina ianao, sady sitrako ny iarahanao miditra sy mivoaka amiko eto an-toby, fa tsy hitako izay tsininao hatrizay nahatongavanao teto amiko ka mandraka androany; nefa kosa tsy sitrak''ireo andriana ireo ianao. '
  '7':
  - type: text
    content: 'Koa miverena, ary mandehana soa aman-tsara, mba tsy hanaovanao izay tsy sitrak''ireo andrianan''ny Filistina. '
  '8':
  - type: text
    content: 'Fa hoy Davida tamin''i Akisy: Inona no nataoko, ary inona no hitanao tamin''ny mpanomponao hatrizay nitoerako tatỳ aminao ka mandraka androany, no tsy hahazoako mandeha hiady amin''ny fahavalon''ny mpanjaka tompoko? '
  '9':
  - type: text
    content: 'Ary Akisy namaly an''i Davida hoe: Fantatro fa tsara eo imasoko tahaka ny anjelin''Andriamanitra ianao; nefa ireo andrianan''ny Filistina no nanao hoe: Tsy hiara-miakatra amintsika hiady izy. '
