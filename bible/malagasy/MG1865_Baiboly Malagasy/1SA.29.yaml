document_id: 1SA.29
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ny nanesorana an'i Davida tsy hiaraka tamin'ny miaramilan'ny Filistina
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ary ny Filistina dia namory ny miaramilany rehetra ho ao Afeka; fa ny Isiraely kosa nitoby teo anilan''ny loharano ao Jezirela. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary ireo andrianan''ny Filistina nandroso nitarika ny miaramilany isan-jato sy isan''arivo; fa Davida sy ny olony kosa nandroso teo aoriana niaraka tamin''i Akisy. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ary hoy ireo andrianan''ny Filistina: Haninona moa ireto Hebreo ireto? Ary hoy Akisy tamin''ireo andrianan''ny Filistina: Tsy io va no Davida, mpanompon''i Saoly, mpanjakan''ny Isiraely, ilay tatỳ amiko elaela ihany izay, ary tsy hitako izay tsininy hatrizay nialany niandany tamiko ka mandraka androany? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dia tezitra taminy ireo andrianan''ny Filistina ka nanao taminy hoe: Avereno ihany ilehio ho any amin''ny fonenany izay efa nomenao azy, fa aza avela hidina hiaraka amintsika hiady izy, fandrao ho tonga fahavalontsika raha miady; fa amin''inona no hahazoan''io sitraka amin''ny tompony? Tsy amin''ny lohan''ireto olona ireto va? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tsy io moa no Davida, izay nandihizany sy nanaovany hira mifamaly hoe: "Saoly nahafaty arivoarivo, Fa Davida nahafaty alinalina?"'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ary Akisy niantso an''i Davida ka nanao taminy hoe: Raha velona koa Jehovah, marina ianao, sady sitrako ny iarahanao miditra sy mivoaka amiko eto an-toby, fa tsy hitako izay tsininao hatrizay nahatongavanao teto amiko ka mandraka androany; nefa kosa tsy sitrak''ireo andriana ireo ianao. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Koa miverena, ary mandehana soa aman-tsara, mba tsy hanaovanao izay tsy sitrak''ireo andrianan''ny Filistina. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fa hoy Davida tamin''i Akisy: Inona no nataoko, ary inona no hitanao tamin''ny mpanomponao hatrizay nitoerako tatỳ aminao ka mandraka androany, no tsy hahazoako mandeha hiady amin''ny fahavalon''ny mpanjaka tompoko? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ary Akisy namaly an''i Davida hoe: Fantatro fa tsara eo imasoko tahaka ny anjelin''Andriamanitra ianao; nefa ireo andrianan''ny Filistina no nanao hoe: Tsy hiara-miakatra amintsika hiady izy. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Koa mifohaza maraina koa ianao mbamin''ny mpanompon''ny tomponao izay nanaraka anao; ary rehefa nifoha maraina ianareo, ka mazava ny andro, dia mandehana. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ary Davida sy ny olony nifoha maraina koa handeha maraina hiverina any amin'ny tanin'ny Filistina. Ary ny Filistina dia niakatra nankany Jezirela.
