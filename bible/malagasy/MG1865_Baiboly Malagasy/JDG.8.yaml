document_id: JDG.8,96
type_code: plt
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ary hoy ny lehilahy amin''ny Efraima tamin''i Gideona: Ahoana izao zavatra nataonao taminay izao, no tsy nantsoinao izahay, raha nandeha hiady tamin''ny Midiana ianao? Dia nanome tsiny azy mafy ireo. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ary Zebaha sy Zalmona dia tonga tao Karkora mbamin'ny miaramila teo aminy tokony ho dimy arivo sy iray alin-dahy, dia izay sisa rehetra tamin'ny miaramila rehetra an'ny zanaky ny atsinanana; ary ny maty kosa dia roa alina sy iray hetsy, samy lehilahy mpitan-tsabatra
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. mpanatsoaka sabatra
      marker-yv: yv-n
    - type: text
      text: ' avokoa ireo. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ary Gideona niakatra tamin''ny lalan''ny mpitoetra an-day, atsinanan''i Noha sy Jogbeha, ka dia namely ny toby, raha mbola ilay tsy nanampo iny ny olona. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Dia nandositra Zebaha sy Zalmona, ary nanenjika azy ny Isiraely ka nisambotra ny mpanjaka roa tamin'ny Midiana, dia Zebaha sy Zalmona, fa efa nampihorohoroiny avokoa ny toby rehetra.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Dia niverina avy tamin''ny ady Gideona, zanak''i Joasy, avy teo amin''ny fiakarana Heresa; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'ary nisambotra zatovo tamin''ny mponina tao Sokota izy ka nanontany azy; dia nosoratan''ilay zatovo ny anaran''ireo andrianan''i Sokota sy ny loholona tao, ka fito amby fito-polo lahy izy. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ary Gideona dia nankany amin''ny mponina tao Sokota ka nanao hoe: Indreo Zebaha sy Zalmona, izay efa nandatsanareo ahy hoe: Moa efa voahazon''ny tananao ankehitriny va ny tànan''i Zebaha sy Zalmona, no homenay mofo ny olonao efa reraka? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dia naka ny loholona tao an-tanàna izy ary tsilo avy tany an-efitra sy sampivato, ka ireny no namaizany ny mponina tao Sokota. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ary nandrava ny tilikambo tao Penoela koa izy ka namono ny lehilahy tao an-tanàna. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Dia hoy izy tamin''i Zebaha sy Zalmona: Lehilahy toy inona ange izay novonoinareo tany Tabara? Ary hoy izy roa lahy: Tahaka anao ihany izy. Nitarehin-janak''andriana avokoa izy rehetra. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ary hoy izy: Rahalahiko, zanaky ny reniko ireo. Raha velona koa Jehovah, dia tsy mba hovonoiko ianareo, raha novelominareo ireo. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Fa hoy Gideona taminy: Zinona izao nataoko izao. raha oharina amin''izay nataonareo? Tsy tsara va ny fitsimponam-boalobok''i Efraima noho ny fiotazam-boalobok''i Abiezera? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ary hoy izy tamin''i Jatera lahimatoany: Mitsangàna, ka vonoy izy roa lahy. Fa ilay zatovo tsy nanatsoaka ny sabany, fa natahotra, satria mbola tanora fanahy izy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ary hoy Zebaha sy Zalmona: Aoka ianao no hitsangana hamely anay; fa araka ny toetry ny olona ihany ny heriny. Dia nitsangana Gideona ka namono an''i Zebaha sy Zalmona ary naka ny ravaka sarim-bolan-tsinana, izay teo amin''ny vozon''ny ramevany.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Dia hoy ny lehilahy amin''ny Isiraely tamin''i Gideona: Manapaha anay ianao sy ny zanakao ary ny zafinao; fa efa namonjy anay tamin''ny tanan''ny Midiana ianao. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fa hoy Gideona taminy: Tsy hanapaka anareo aho, ary tsy hanapaka anareo koa ny zanako; Jehovah ihany no hanapaka anareo. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ary hoy koa Gideona taminy: Zavatra iray loha monja no hany mba angatahiko aminareo; aoka samy hanome ahy ny kavina izay avy amin''ny babony avy ianareo (fa nanana kavim-bolamena ireny, satria Isimaelita). '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Dia hoy kosa ny olona: Eny, fa homenay tokoa izany. Dia namelatra lamba ny olona, ka samy nanipy ny kavina izay avy tamin''ny babony teo. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ary ny lanjan''ny kavim-bolamena nangatahiny dia sekely volamena fiton-jato amby arivo, afa-tsy ny ravaka sarim-bolan-tsinana sy ny kavina voavola sy ny lamba volomparasy, izay teny amin''ireo mpanjakan''ny Midiana, ary ny rojo, izay teny amin''ny vozon''ny ramevany. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Dia nataon''i Gideona efoda ireo, ka nataony tao an-tanànany, dia tao Ofra; ary ny Isiraely rehetra nankany nijangajanga nanaraka izany efoda izany; ary tonga fandrika tamin''i Gideona sy ny ankohonany izany. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Dia resy teo anoloan'ny Zanak'Isiraely ny Midiana ka tsy nahatraka ny lohany intsony. Dia nandry efa-polo taona ny tany tamin'ny andron'i Gideona.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Dia nandeha Jerobala, zanak''i Joasy, ka nitoetra tao an-tranony. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Teo an-tananareo no nanoloran'Andriamanitra ny andrianan'ny Midiana, dia Oreba sy Zeba; ary inona no azoko atao, raha oharina amin'ny nataonareo? Ary rehefa nilaza izany teny izany Gideona, dia nitony ny fahatezeran'ireo taminy.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ary Gideona nanan-janaka fito-polo lahy izay naterany: fa maro vady izy. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ary ny vaditsindranony, izay tany Sekema, dia niteraka zazalahy taminy koa, ka ny anarany nataony hoe Abimeleka. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Dia maty Gideona. zanak''i Joasy, rehefa tratrantitra tsara, ka nalevina tao amin''ny fasan''i Joasy rainy tao Ofran''ny Abiezrita izy. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ary rehefa maty Gideona, dia nijangajanga nanaraka ireo Bala indray ny Zanak''Isiraely ka nanao an''i Bala-berita ho andriamaniny. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ary ny Zanak''Isiraely tsy nahatsiaro an''i Jehovah Andriamaniny, Izay efa namonjy azy tamin''ny tanan''ny fahavalony rehetra nanodidina, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: sady tsy nanao soa tamin'ny taranak'i Jerobala (na Gideona), araka izay soa rehetra nataon'i Gideona tamin'ny Isiraely, izy.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ary Gideona nankany Jordana, ka nita izy sy ny telon-jato lahy teo aminy, na dia efa reraka aza, mbola nanenjika ihany. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ary hoy izy tamin''ny mponina tao Sokota: Masìna ianareo, mba omeo mofo ny olona manaraka ahy, fa reraka izy, ary izaho manenjika an''i Zebaha sy Zalmona, mpanjakan''ny Midiana. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Fa hoy ireo andrianan''i Sokota: Moa efa voahazon''ny tananao ankehitriny va ny tànan''i Zebaha sy Zalmona, no homenay mofo ny miaramilamao? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dia hoy Gideona: Rehefa voatolotr''i Jehovah eo an-tanako Zehaba sy Zalmona, dia handalasiko amin''ny tsilo avy any an-efitra sy ny sampivato ny tenanareo'
    - type: usfm
      marker: x
      children:
      - type: text
        text: Heb. nofonareo
      marker-yv: yv-n
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ary niakatra avy teo izy ka nankany Penoela, dia nanao teny tahaka izany koa tamin''ny olona tao; ary ny mponina tao Penoela koa dia namaly azy tahaka ny navalin''ny mponina tao Sokota ihany. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dia niteny tamin''ny mponina tao Penoela izy ka nanao hoe: Raha tafaverina soa aman-tsara aho, dia horavako ity tilikambo ity. '
