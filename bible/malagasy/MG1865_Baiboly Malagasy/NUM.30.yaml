document_id: NUM.30
type_code: plt
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lalàna ny amin'ny hahatanterahana ny voady sy ny hanafoanana azy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Dia nolazain'i Mosesy tamin'ny Zanak'Isiraely izany, araka izay rehetra efa nandidian'i Jehovah azy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ary Mosesy niteny tamin''ireo lohan''ny firenen''ny Zanak''Isiraely ka nanao hoe: Izao no teny izay nandidian''i Jehovah: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Raha misy lehilahy mivoady amin''i Jehovah, na mianiana hamehy ny fanahiny hifady, dia tsy hitsoa-teny izy; araka izay rehetra naloaky ny vavany no hataony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ary raha misy vehivavy mivoady amin''i Jehovah ka mamehy tena hifady, raha mbola zaza ao an-tranon-drainy izy, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ka ren-drainy ny voadiny sy ny namehezany ny fanahiny hifady, nefa tsy niteny azy rainy, dia tsy afaka ny voadiny sy izay famehezana na inona na inona namehezany ny fanahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fa raha nandrara azy rainy tamin''ny andro nandrenesany, dia afaka ny voadiny, na izay famehezana namehezany ny fanahiny; ary Jehovah hamela ny helony, satria nandrara azy rainy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ary raha manam-bady izy ka misy voady efa nataony, na misy teniteny foana nataon''ny molony, izay namehezany ny fanahiny hifady, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'ka nandre izany ny lahy, nefa tsy niteny azy tamin''ny andro nandrenesany, dia tsy afaka ny voadiny sy izay famehezana namehezany ny fanahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fa raha nandrara azy ny vadiny tamin''ny andro nandrenesany, dia hahafoana ny voadiny izay nivoadiany sy izay teniteny foana naloaky ny vavany ka namehezany ny fanahiny izy; ary Jehovah hamela ny helony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fa ny amin''ny voadin''ny vehivavy maty vady na ny efa nisaorana kosa, dia tsy afaka izay rehetra namehezany ny fanahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ary raha nisy vehivavy nivoady tao an-tranon''ny vadiny, na nianiana namehy ny fanahiny hifady, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'ka nandre ny vadiny, nefa tsy niteny azy na nandrara azy, dia tsy afaka ny voadiny, na ny famehezana na inona na inona izay namehezany ny fanahiny. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fa raha nahafoana izany kosa ny vadiny tamin''ny andro nandrenesany, dia afaka izay rehetra naloaky ny vavany ho voadiny na ho famehezana ny fanahiny; ny vadiny no nahafoana izany, ary Jehovah hamela ny helony. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ny voady rehetra sy ny fianianana rehetra amehezany tena hampahory ny tenany, dia ny lahy ihany no tsy hahafaka azy, na hahafaka azy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fa raha tsy niteny azy akory tamin''ny an-davan''andro ny lahy, dia tsy hahafaka ny voadiny, na izay famehezana namehezany ny tenany, izy; tsy mahafaka izany izy, satria tsy niteny azy tamin''ny andro nandrenesany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Fa raha manao izay hahafoana izany izy aorian'ny andrenesany azy, dia hitondra ny heloky ny vavy izy. Ireo no lalàna izay nandidian'i Jehovah an'i Mosesy ny amin'ny lehilahy sy ny vadiny, ary ny amin'ny ray sy ny zananivavy, raha mbola zaza ao an-tranon-drainy izy.
