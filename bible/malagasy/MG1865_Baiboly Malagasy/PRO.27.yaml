document_id: PRO.27
type_code: plt
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Aza mirehareha ny amin'ny ho ampitso ianao; Fa na dia ny havoaky ny anio aza tsy fantatrao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Aoka ny olon-kafa no hidera anao, fa tsy ny vavanao, Eny, ny vahiny, fa tsy ny molotrao.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mavesatra ny vato, ary mavesa-danja ny fasika; Fa ny fahasosoran'ny adala dia manoatra noho izy roa tonta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Masiaka ny fahavinirana, ary misafoaka ny fahatezerana; Fa iza no mahajanona eo anatrehan'ny fahasaro-piaro?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Aleo anatra imaso Toy izay fitia afenina.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Azo itokiana hahasoa ny fery ataon'ny sakaiza; Fa tena fitaka ny fanorohan'ny fahavalo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hitsakitsahin'ny voky na dia ny toho-tantely aza; Fa mamin'ny noana na dia ny zava-mangidy rehetra aza.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Toy ny voron-kely miala amin'ny akaniny ka mirenireny, Dia toy izany ny olona izay mirenireny miala amin'ny fonenany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ny diloilo sy ny zava-manitra mahafaly ny fo, Ary ny hamamin'ny sakaiza dia avy amin'ny ana-panahy ataony.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aza mahafoy ny sakaizanao, na ny sakaizan-drainao, Ary aza mankany amin'ny tranon'ny rahalahinao amin'ny andro fahorianao; Fa tsara ny namana akaiky noho ny rahalahy lavitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Anaka, hendre, ary ampifalio ny foko, Mba hamaliako izay miteny ratsy ahy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ny mahira-tsaina mahatazana ny loza ka miery; Fa ny kely saina kosa mandroso ka voa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Alao ny lambany, fa efa niantoka olon-kafa izy, Ary tano ho solon'ny vahiny janga niantohany izy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Izay mifoha maraina koa ka misaotra ny sakaizany amin'ny feo mahery, Dia isaina ho fanozonana izany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tahaka ny fijononoky ny ranonorana be Ny vehivavy tia ady. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Izay misakana azy dia toy ny misakana ny rivotra, Sady toy ny mamihina
  - type: usfm
    marker: x
    children:
    - type: text
      text: 'Na: mihatra amin''ny'
    marker-yv: yv-n
  - type: text
    text: ' diloilo ny tànany ankavanana.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ny vy maharanitra ny vy, Toy izany, ny olona maharanitra ny tarehin''ny sakaizany. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Izay miaro aviavy dia hihinana ny voany; Ary izay miambin-tompo dia homem-boninahitra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Toy ny tandindona eny anaty rano mifanahaka amin'ny tarehy, Dia toy izany no ifanahafan'ny fon'ny olona amin'ny an'olona.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ny fiainan-tsi-hita
  - type: usfm
    marker: x
    children:
    - type: text
      text: Heb. Sheola
    marker-yv: yv-n
  - type: text
    text: ' sy ny fandringanana tsy mety voky, Dia toy izany no tsy ahamamoan''ny mason''ny olona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ny memy ho an'ny volafotsy, Ny fandrendrehana ho an'ny volamena, Ary ny toetry ny olona dia tsy maintsy ho araka izay zavatra derainy.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Na dia miara-totoinao ny fanoto amin'ny vary eo an-daona aza ny adala, Dia tsy mba hiala aminy tsy akory ny fahadalany.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fantaro tsara ny tarehin''ny ondry aman''osinao, Ary miahia tsara ny andian''ny bibinao; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fa ny harena tsy ho mandrakizay; Ary moa haharitra ho amin''ny taranaka rehetra va ny satro-boninahitra? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Na dia lany aza ny ahitra, ka mitsiry ny solofony, Ary voataona ny zava-maniry any an-tendrombohitra, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ny zanak''ondry dia hahazoanao fitafiana, Ary ny osy hamidinao tany; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ary ho ampy hosotroinao ny rononon'osy Sy ho an'ny ankohonanao, Ary hisy hiveloman'ny ankizivavinao.
