document_id: ISA.56,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Salvation for Others
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Maintain justice
  - type: text
    content: and do what is right,
  - type: text
    content: for my salvation is close at hand
  - type: text
    content: and my righteousness will soon be revealed.
  '10':
  - type: text
    content: Israel’s watchmen are blind,
  - type: text
    content: they all lack knowledge;
  - type: text
    content: they are all mute dogs,
  - type: text
    content: they cannot bark;
  - type: text
    content: they lie around and dream,
  - type: text
    content: they love to sleep.
  '11':
  - type: text
    content: They are dogs with mighty appetites;
  - type: text
    content: they never have enough.
  - type: text
    content: They are shepherds who lack understanding;
  - type: text
    content: they all turn to their own way,
  - type: text
    content: they seek their own gain.
  '12':
  - type: text
    content: “Come,” each one cries, “let me get wine!
  - type: text
    content: Let us drink our fill of beer!
  - type: text
    content: And tomorrow will be like today,
  - type: text
    content: or even far better.”
  '2':
  - type: text
    content: Blessed is the one who does this—
  - type: text
    content: the person who holds it fast,
  - type: text
    content: who keeps the Sabbath without desecrating it,
  - type: text
    content: and keeps their hands from doing any evil.”
  '3':
  - type: text
    content: 'Let no foreigner who is bound to the '
  - type: text
    content: Lord
  - type: text
    content: ' say,'
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' will surely exclude me from his people.”'
  - type: text
    content: And let no eunuch complain,
  - type: text
    content: “I am only a dry tree.”
  '4':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “To the eunuchs who keep my Sabbaths,
  - type: text
    content: who choose what pleases me
  - type: text
    content: and hold fast to my covenant—
  '5':
  - type: text
    content: to them I will give within my temple and its walls
  - type: text
    content: a memorial and a name
  - type: text
    content: better than sons and daughters;
  - type: text
    content: I will give them an everlasting name
  - type: text
    content: that will endure forever.
  '6':
  - type: text
    content: 'And foreigners who bind themselves to the '
  - type: text
    content: Lord
  - type: text
    content: to minister to him,
  - type: text
    content: 'to love the name of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and to be his servants,
  - type: text
    content: all who keep the Sabbath without desecrating it
  - type: text
    content: and who hold fast to my covenant—
  '7':
  - type: text
    content: these I will bring to my holy mountain
  - type: text
    content: and give them joy in my house of prayer.
  - type: text
    content: Their burnt offerings and sacrifices
  - type: text
    content: will be accepted on my altar;
  - type: text
    content: for my house will be called
  - type: text
    content: a house of prayer for all nations.”
  '8':
  - type: text
    content: 'The Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' declares—'
  - type: text
    content: 'he who gathers the exiles of Israel:'
  - type: text
    content: “I will gather still others to them
  - type: text
    content: besides those already gathered.”
  - type: heading
    content: God’s Accusation Against the Wicked
  '9':
  - type: text
    content: Come, all you beasts of the field,
  - type: text
    content: come and devour, all you beasts of the forest!
