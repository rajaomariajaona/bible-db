document_id: ISA.56,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salvation for Others
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Maintain justice
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and do what is right,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for my salvation is close at hand
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my righteousness will soon be revealed.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Israel’s watchmen are blind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they all lack knowledge;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they are all mute dogs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they cannot bark;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they lie around and dream,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they love to sleep.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: They are dogs with mighty appetites;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they never have enough.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are shepherds who lack understanding;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they all turn to their own way,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they seek their own gain.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “Come,” each one cries, “let me get wine!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let us drink our fill of beer!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And tomorrow will be like today,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or even far better.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Blessed is the one who does this—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the person who holds it fast,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who keeps the Sabbath without desecrating it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and keeps their hands from doing any evil.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Let no foreigner who is bound to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' say,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will surely exclude me from his people.”'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And let no eunuch complain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I am only a dry tree.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “To the eunuchs who keep my Sabbaths,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who choose what pleases me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hold fast to my covenant—
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: to them I will give within my temple and its walls
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a memorial and a name
  - type: usfm
    marker: q2
    children:
    - type: text
      text: better than sons and daughters;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will give them an everlasting name
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that will endure forever.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'And foreigners who bind themselves to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to minister to him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'to love the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to be his servants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all who keep the Sabbath without desecrating it
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and who hold fast to my covenant—
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: these I will bring to my holy mountain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and give them joy in my house of prayer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their burnt offerings and sacrifices
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be accepted on my altar;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for my house will be called
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a house of prayer for all nations.”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' declares—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'he who gathers the exiles of Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will gather still others to them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: besides those already gathered.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Accusation Against the Wicked
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Come, all you beasts of the field,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: come and devour, all you beasts of the forest!
