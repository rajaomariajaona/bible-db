document_id: JOB.2,111
type_code: eng
verses:
  '1':
  - type: text
    content: On another day the angels
  - type: note
    content: Hebrew the sons of God
  - type: text
    content: ' came to present themselves before the '
  - type: text
    content: Lord
  - type: text
    content: ', and Satan also came with them to present himself before him. '
  '10':
  - type: text
    content: He replied, “You are talking like a foolish
  - type: note
    content: The Hebrew word rendered foolish denotes moral deficiency.
  - type: text
    content: ' woman. Shall we accept good from God, and not trouble?”'
  - type: text
    content: In all this, Job did not sin in what he said.
  '11':
  - type: text
    content: 'When Job’s three friends, Eliphaz the Temanite, Bildad the Shuhite and Zophar the Naamathite, heard about all the troubles that had come upon him, they set out from their homes and met together by agreement to go and sympathize with him and comfort him. '
  '12':
  - type: text
    content: 'When they saw him from a distance, they could hardly recognize him; they began to weep aloud, and they tore their robes and sprinkled dust on their heads. '
  '13':
  - type: text
    content: Then they sat on the ground with him for seven days and seven nights. No one said a word to him, because they saw how great his suffering was.
  '2':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Satan, “Where have you come from?”'
  - type: text
    content: 'Satan answered the '
  - type: text
    content: Lord
  - type: text
    content: ', “From roaming throughout the earth, going back and forth on it.”'
  '3':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Satan, “Have you considered my servant Job? There is no one on earth like him; he is blameless and upright, a man who fears God and shuns evil. And he still maintains his integrity, though you incited me against him to ruin him without any reason.”'
  '4':
  - type: text
    content: '“Skin for skin!” Satan replied. “A man will give all he has for his own life. '
  '5':
  - type: text
    content: But now stretch out your hand and strike his flesh and bones, and he will surely curse you to your face.”
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Satan, “Very well, then, he is in your hands; but you must spare his life.”'
  '7':
  - type: text
    content: 'So Satan went out from the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' and afflicted Job with painful sores from the soles of his feet to the crown of his head. '
  '8':
  - type: text
    content: Then Job took a piece of broken pottery and scraped himself with it as he sat among the ashes.
  '9':
  - type: text
    content: His wife said to him, “Are you still maintaining your integrity? Curse God and die!”
