document_id: 1TI.4,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'The Spirit clearly says that in later times some will abandon the faith and follow deceiving spirits and things taught by demons. '
  '10':
  - type: text
    content: That is why we labor and strive, because we have put our hope in the living God, who is the Savior of all people, and especially of those who believe.
  '11':
  - type: text
    content: 'Command and teach these things. '
  '12':
  - type: text
    content: 'Don’t let anyone look down on you because you are young, but set an example for the believers in speech, in conduct, in love, in faith and in purity. '
  '13':
  - type: text
    content: 'Until I come, devote yourself to the public reading of Scripture, to preaching and to teaching. '
  '14':
  - type: text
    content: Do not neglect your gift, which was given you through prophecy when the body of elders laid their hands on you.
  '15':
  - type: text
    content: 'Be diligent in these matters; give yourself wholly to them, so that everyone may see your progress. '
  '16':
  - type: text
    content: Watch your life and doctrine closely. Persevere in them, because if you do, you will save both yourself and your hearers.
  '2':
  - type: text
    content: 'Such teachings come through hypocritical liars, whose consciences have been seared as with a hot iron. '
  '3':
  - type: text
    content: 'They forbid people to marry and order them to abstain from certain foods, which God created to be received with thanksgiving by those who believe and who know the truth. '
  '4':
  - type: text
    content: 'For everything God created is good, and nothing is to be rejected if it is received with thanksgiving, '
  '5':
  - type: text
    content: because it is consecrated by the word of God and prayer.
  '6':
  - type: text
    content: If you point these things out to the brothers and sisters,
  - type: note
    content: The Greek word for brothers and sisters (adelphoi) refers here to believers, both men and women, as part of God’s family.
  - type: text
    content: ' you will be a good minister of Christ Jesus, nourished on the truths of the faith and of the good teaching that you have followed. '
  '7':
  - type: text
    content: 'Have nothing to do with godless myths and old wives’ tales; rather, train yourself to be godly. '
  '8':
  - type: text
    content: 'For physical training is of some value, but godliness has value for all things, holding promise for both the present life and the life to come. '
  '9':
  - type: text
    content: 'This is a trustworthy saying that deserves full acceptance. '
