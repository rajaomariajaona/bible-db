document_id: JOS.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Rahab and the Spies
  - type: text
    content: Then Joshua son of Nun secretly sent two spies from Shittim. “Go, look over the land,” he said, “especially Jericho.” So they went and entered the house of a prostitute named Rahab and stayed there.
  '10':
  - type: text
    content: 'We have heard how the '
  - type: text
    content: Lord
  - type: text
    content: ' dried up the water of the Red Sea'
  - type: note
    content: Or the Sea of Reeds
  - type: text
    content: ' for you when you came out of Egypt, and what you did to Sihon and Og, the two kings of the Amorites east of the Jordan, whom you completely destroyed.'
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'When we heard of it, our hearts melted in fear and everyone’s courage failed because of you, for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is God in heaven above and on the earth below.'
  '12':
  - type: text
    content: '“Now then, please swear to me by the '
  - type: text
    content: Lord
  - type: text
    content: ' that you will show kindness to my family, because I have shown kindness to you. Give me a sure sign '
  '13':
  - type: text
    content: that you will spare the lives of my father and mother, my brothers and sisters, and all who belong to them—and that you will save us from death.”
  '14':
  - type: text
    content: '“Our lives for your lives!” the men assured her. “If you don’t tell what we are doing, we will treat you kindly and faithfully when the '
  - type: text
    content: Lord
  - type: text
    content: ' gives us the land.”'
  '15':
  - type: text
    content: 'So she let them down by a rope through the window, for the house she lived in was part of the city wall. '
  '16':
  - type: text
    content: She said to them, “Go to the hills so the pursuers will not find you. Hide yourselves there three days until they return, and then go on your way.”
  '17':
  - type: text
    content: 'Now the men had said to her, “This oath you made us swear will not be binding on us '
  '18':
  - type: text
    content: 'unless, when we enter the land, you have tied this scarlet cord in the window through which you let us down, and unless you have brought your father and mother, your brothers and all your family into your house. '
  '19':
  - type: text
    content: 'If any of them go outside your house into the street, their blood will be on their own heads; we will not be responsible. As for those who are in the house with you, their blood will be on our head if a hand is laid on them. '
  '2':
  - type: text
    content: 'The king of Jericho was told, “Look, some of the Israelites have come here tonight to spy out the land.” '
  '20':
  - type: text
    content: But if you tell what we are doing, we will be released from the oath you made us swear.”
  '21':
  - type: text
    content: “Agreed,” she replied. “Let it be as you say.”
  - type: text
    content: So she sent them away, and they departed. And she tied the scarlet cord in the window.
  '22':
  - type: text
    content: 'When they left, they went into the hills and stayed there three days, until the pursuers had searched all along the road and returned without finding them. '
  '23':
  - type: text
    content: 'Then the two men started back. They went down out of the hills, forded the river and came to Joshua son of Nun and told him everything that had happened to them. '
  '24':
  - type: text
    content: 'They said to Joshua, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has surely given the whole land into our hands; all the people are melting in fear because of us.”'
  '3':
  - type: text
    content: 'So the king of Jericho sent this message to Rahab: “Bring out the men who came to you and entered your house, because they have come to spy out the whole land.”'
  '4':
  - type: text
    content: 'But the woman had taken the two men and hidden them. She said, “Yes, the men came to me, but I did not know where they had come from. '
  '5':
  - type: text
    content: 'At dusk, when it was time to close the city gate, they left. I don’t know which way they went. Go after them quickly. You may catch up with them.” '
  '6':
  - type: text
    content: '(But she had taken them up to the roof and hidden them under the stalks of flax she had laid out on the roof.) '
  '7':
  - type: text
    content: So the men set out in pursuit of the spies on the road that leads to the fords of the Jordan, and as soon as the pursuers had gone out, the gate was shut.
  '8':
  - type: text
    content: 'Before the spies lay down for the night, she went up on the roof '
  '9':
  - type: text
    content: 'and said to them, “I know that the '
  - type: text
    content: Lord
  - type: text
    content: ' has given you this land and that a great fear of you has fallen on us, so that all who live in this country are melting in fear because of you. '
