type_code: eng
verses:
  '1':
  - type: heading
    content: A Lament Over Israel’s Princes
  - type: text
    content: '“Take up a lament concerning the princes of Israel '
  '10':
  - type: text
    content: “ ‘Your mother was like a vine in your vineyard
  - type: note
    content: Two Hebrew manuscripts; most Hebrew manuscripts your blood
  - type: text
    content: planted by the water;
  - type: text
    content: it was fruitful and full of branches
  - type: text
    content: because of abundant water.
  '11':
  - type: text
    content: Its branches were strong,
  - type: text
    content: fit for a ruler’s scepter.
  - type: text
    content: It towered high
  - type: text
    content: above the thick foliage,
  - type: text
    content: conspicuous for its height
  - type: text
    content: and for its many branches.
  '12':
  - type: text
    content: But it was uprooted in fury
  - type: text
    content: and thrown to the ground.
  - type: text
    content: The east wind made it shrivel,
  - type: text
    content: it was stripped of its fruit;
  - type: text
    content: its strong branches withered
  - type: text
    content: and fire consumed them.
  '13':
  - type: text
    content: Now it is planted in the desert,
  - type: text
    content: in a dry and thirsty land.
  '14':
  - type: text
    content: Fire spread from one of its main
  - type: note
    content: Or from under its
  - type: text
    content: ' branches'
  - type: text
    content: and consumed its fruit.
  - type: text
    content: No strong branch is left on it
  - type: text
    content: fit for a ruler’s scepter.’
  - type: text
    content: “This is a lament and is to be used as a lament.”
  '2':
  - type: text
    content: 'and say:'
  - type: text
    content: “ ‘What a lioness was your mother
  - type: text
    content: among the lions!
  - type: text
    content: She lay down among them
  - type: text
    content: and reared her cubs.
  '3':
  - type: text
    content: She brought up one of her cubs,
  - type: text
    content: and he became a strong lion.
  - type: text
    content: He learned to tear the prey
  - type: text
    content: and he became a man-eater.
  '4':
  - type: text
    content: The nations heard about him,
  - type: text
    content: and he was trapped in their pit.
  - type: text
    content: They led him with hooks
  - type: text
    content: to the land of Egypt.
  '5':
  - type: text
    content: “ ‘When she saw her hope unfulfilled,
  - type: text
    content: her expectation gone,
  - type: text
    content: she took another of her cubs
  - type: text
    content: and made him a strong lion.
  '6':
  - type: text
    content: He prowled among the lions,
  - type: text
    content: for he was now a strong lion.
  - type: text
    content: He learned to tear the prey
  - type: text
    content: and he became a man-eater.
  '7':
  - type: text
    content: He broke down
  - type: note
    content: Targum (see Septuagint); Hebrew He knew
  - type: text
    content: ' their strongholds'
  - type: text
    content: and devastated their towns.
  - type: text
    content: The land and all who were in it
  - type: text
    content: were terrified by his roaring.
  '8':
  - type: text
    content: Then the nations came against him,
  - type: text
    content: those from regions round about.
  - type: text
    content: They spread their net for him,
  - type: text
    content: and he was trapped in their pit.
  '9':
  - type: text
    content: With hooks they pulled him into a cage
  - type: text
    content: and brought him to the king of Babylon.
  - type: text
    content: They put him in prison,
  - type: text
    content: so his roar was heard no longer
  - type: text
    content: on the mountains of Israel.
