document_id: EZK.19,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Lament Over Israel’s Princes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Take up a lament concerning the princes of Israel '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘Your mother was like a vine in your vineyard
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Two Hebrew manuscripts; most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: your blood
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: planted by the water;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: it was fruitful and full of branches
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of abundant water.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Its branches were strong,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fit for a ruler’s scepter.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It towered high
  - type: usfm
    marker: q2
    children:
    - type: text
      text: above the thick foliage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: conspicuous for its height
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and for its many branches.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But it was uprooted in fury
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and thrown to the ground.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The east wind made it shrivel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it was stripped of its fruit;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: its strong branches withered
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fire consumed them.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Now it is planted in the desert,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in a dry and thirsty land.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fire spread from one of its main
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from under its
      marker-yv: yv-n
    - type: text
      text: ' branches'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and consumed its fruit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No strong branch is left on it
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fit for a ruler’s scepter.’
  - type: usfm
    marker: m
    children:
    - type: text
      text: “This is a lament and is to be used as a lament.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and say:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘What a lioness was your mother
  - type: usfm
    marker: q2
    children:
    - type: text
      text: among the lions!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She lay down among them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and reared her cubs.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She brought up one of her cubs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he became a strong lion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He learned to tear the prey
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he became a man-eater.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The nations heard about him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he was trapped in their pit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They led him with hooks
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the land of Egypt.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘When she saw her hope unfulfilled,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her expectation gone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: she took another of her cubs
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and made him a strong lion.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He prowled among the lions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he was now a strong lion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He learned to tear the prey
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he became a man-eater.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He broke down
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Targum (see Septuagint); Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: He knew
      marker-yv: yv-n
    - type: text
      text: ' their strongholds'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and devastated their towns.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The land and all who were in it
  - type: usfm
    marker: q2
    children:
    - type: text
      text: were terrified by his roaring.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then the nations came against him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those from regions round about.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They spread their net for him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he was trapped in their pit.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With hooks they pulled him into a cage
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and brought him to the king of Babylon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They put him in prison,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so his roar was heard no longer
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the mountains of Israel.
