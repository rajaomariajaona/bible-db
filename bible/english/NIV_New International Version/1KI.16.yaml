document_id: 1KI.16,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Jehu son of Hanani concerning Baasha: '
  '10':
  - type: text
    content: Zimri came in, struck him down and killed him in the twenty-seventh year of Asa king of Judah. Then he succeeded him as king.
  '11':
  - type: text
    content: 'As soon as he began to reign and was seated on the throne, he killed off Baasha’s whole family. He did not spare a single male, whether relative or friend. '
  '12':
  - type: text
    content: 'So Zimri destroyed the whole family of Baasha, in accordance with the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' spoken against Baasha through the prophet Jehu— '
  '13':
  - type: text
    content: 'because of all the sins Baasha and his son Elah had committed and had caused Israel to commit, so that they aroused the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, by their worthless idols.'
  '14':
  - type: text
    content: As for the other events of Elah’s reign, and all he did, are they not written in the book of the annals of the kings of Israel?
  - type: heading
    content: Zimri King of Israel
  '15':
  - type: text
    content: 'In the twenty-seventh year of Asa king of Judah, Zimri reigned in Tirzah seven days. The army was encamped near Gibbethon, a Philistine town. '
  '16':
  - type: text
    content: 'When the Israelites in the camp heard that Zimri had plotted against the king and murdered him, they proclaimed Omri, the commander of the army, king over Israel that very day there in the camp. '
  '17':
  - type: text
    content: 'Then Omri and all the Israelites with him withdrew from Gibbethon and laid siege to Tirzah. '
  '18':
  - type: text
    content: 'When Zimri saw that the city was taken, he went into the citadel of the royal palace and set the palace on fire around him. So he died, '
  '19':
  - type: text
    content: 'because of the sins he had committed, doing evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' and following the ways of Jeroboam and committing the same sin Jeroboam had caused Israel to commit.'
  '2':
  - type: text
    content: '“I lifted you up from the dust and appointed you ruler over my people Israel, but you followed the ways of Jeroboam and caused my people Israel to sin and to arouse my anger by their sins. '
  '20':
  - type: text
    content: As for the other events of Zimri’s reign, and the rebellion he carried out, are they not written in the book of the annals of the kings of Israel?
  - type: heading
    content: Omri King of Israel
  '21':
  - type: text
    content: 'Then the people of Israel were split into two factions; half supported Tibni son of Ginath for king, and the other half supported Omri. '
  '22':
  - type: text
    content: But Omri’s followers proved stronger than those of Tibni son of Ginath. So Tibni died and Omri became king.
  '23':
  - type: text
    content: 'In the thirty-first year of Asa king of Judah, Omri became king of Israel, and he reigned twelve years, six of them in Tirzah. '
  '24':
  - type: text
    content: He bought the hill of Samaria from Shemer for two talents
  - type: note
    content: That is, about 150 pounds or about 68 kilograms
  - type: text
    content: ' of silver and built a city on the hill, calling it Samaria, after Shemer, the name of the former owner of the hill.'
  '25':
  - type: text
    content: 'But Omri did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' and sinned more than all those before him. '
  '26':
  - type: text
    content: 'He followed completely the ways of Jeroboam son of Nebat, committing the same sin Jeroboam had caused Israel to commit, so that they aroused the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, by their worthless idols.'
  '27':
  - type: text
    content: 'As for the other events of Omri’s reign, what he did and the things he achieved, are they not written in the book of the annals of the kings of Israel? '
  '28':
  - type: text
    content: Omri rested with his ancestors and was buried in Samaria. And Ahab his son succeeded him as king.
  - type: heading
    content: Ahab Becomes King of Israel
  '29':
  - type: text
    content: 'In the thirty-eighth year of Asa king of Judah, Ahab son of Omri became king of Israel, and he reigned in Samaria over Israel twenty-two years. '
  '3':
  - type: text
    content: 'So I am about to wipe out Baasha and his house, and I will make your house like that of Jeroboam son of Nebat. '
  '30':
  - type: text
    content: 'Ahab son of Omri did more evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' than any of those before him. '
  '31':
  - type: text
    content: 'He not only considered it trivial to commit the sins of Jeroboam son of Nebat, but he also married Jezebel daughter of Ethbaal king of the Sidonians, and began to serve Baal and worship him. '
  '32':
  - type: text
    content: 'He set up an altar for Baal in the temple of Baal that he built in Samaria. '
  '33':
  - type: text
    content: 'Ahab also made an Asherah pole and did more to arouse the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, than did all the kings of Israel before him.'
  '34':
  - type: text
    content: 'In Ahab’s time, Hiel of Bethel rebuilt Jericho. He laid its foundations at the cost of his firstborn son Abiram, and he set up its gates at the cost of his youngest son Segub, in accordance with the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' spoken by Joshua son of Nun.'
  '4':
  - type: text
    content: Dogs will eat those belonging to Baasha who die in the city, and birds will feed on those who die in the country.”
  '5':
  - type: text
    content: 'As for the other events of Baasha’s reign, what he did and his achievements, are they not written in the book of the annals of the kings of Israel? '
  '6':
  - type: text
    content: Baasha rested with his ancestors and was buried in Tirzah. And Elah his son succeeded him as king.
  '7':
  - type: text
    content: 'Moreover, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came through the prophet Jehu son of Hanani to Baasha and his house, because of all the evil he had done in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', arousing his anger by the things he did, becoming like the house of Jeroboam—and also because he destroyed it.'
  - type: heading
    content: Elah King of Israel
  '8':
  - type: text
    content: In the twenty-sixth year of Asa king of Judah, Elah son of Baasha became king of Israel, and he reigned in Tirzah two years.
  '9':
  - type: text
    content: 'Zimri, one of his officials, who had command of half his chariots, plotted against him. Elah was in Tirzah at the time, getting drunk in the home of Arza, the palace administrator at Tirzah. '
