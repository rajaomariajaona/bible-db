document_id: ZEC.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Call to Return to the Lord
  - type: text
    content: 'In the eighth month of the second year of Darius, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to the prophet Zechariah son of Berekiah, the son of Iddo:'
  '10':
  - type: text
    content: 'Then the man standing among the myrtle trees explained, “They are the ones the '
  - type: text
    content: Lord
  - type: text
    content: ' has sent to go throughout the earth.”'
  '11':
  - type: text
    content: 'And they reported to the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' who was standing among the myrtle trees, “We have gone throughout the earth and found the whole world at rest and in peace.”'
  '12':
  - type: text
    content: 'Then the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “'
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, how long will you withhold mercy from Jerusalem and from the towns of Judah, which you have been angry with these seventy years?” '
  '13':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke kind and comforting words to the angel who talked with me.'
  '14':
  - type: text
    content: 'Then the angel who was speaking to me said, “Proclaim this word: This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says: ‘I am very jealous for Jerusalem and Zion, '
  '15':
  - type: text
    content: and I am very angry with the nations that feel secure. I was only a little angry, but they went too far with the punishment.’
  '16':
  - type: text
    content: '“Therefore this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘I will return to Jerusalem with mercy, and there my house will be rebuilt. And the measuring line will be stretched out over Jerusalem,’ declares the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  '17':
  - type: text
    content: '“Proclaim further: This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says: ‘My towns will again overflow with prosperity, and the '
  - type: text
    content: Lord
  - type: text
    content: ' will again comfort Zion and choose Jerusalem.’ ”'
  - type: heading
    content: Four Horns and Four Craftsmen
  '18':
  - type: text
    content: 'Then I looked up, and there before me were four horns. '
  '19':
  - type: text
    content: I asked the angel who was speaking to me, “What are these?”
  - type: text
    content: He answered me, “These are the horns that scattered Judah, Israel and Jerusalem.”
  '2':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' was very angry with your ancestors. '
  '20':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' showed me four craftsmen. '
  '21':
  - type: text
    content: I asked, “What are these coming to do?”
  - type: text
    content: He answered, “These are the horns that scattered Judah so that no one could raise their head, but the craftsmen have come to terrify them and throw down these horns of the nations who lifted up their horns against the land of Judah to scatter its people.”
  - type: note
    content: In Hebrew texts 1:18-21 is numbered 2:1-4.
  '3':
  - type: text
    content: 'Therefore tell the people: This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says: ‘Return to me,’ declares the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, ‘and I will return to you,’ says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty. '
  '4':
  - type: text
    content: 'Do not be like your ancestors, to whom the earlier prophets proclaimed: This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says: ‘Turn from your evil ways and your evil practices.’ But they would not listen or pay attention to me, declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '5':
  - type: text
    content: 'Where are your ancestors now? And the prophets, do they live forever? '
  '6':
  - type: text
    content: But did not my words and my decrees, which I commanded my servants the prophets, overtake your ancestors?
  - type: text
    content: '“Then they repented and said, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty has done to us what our ways and practices deserve, just as he determined to do.’ ”'
  - type: heading
    content: The Man Among the Myrtle Trees
  '7':
  - type: text
    content: 'On the twenty-fourth day of the eleventh month, the month of Shebat, in the second year of Darius, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to the prophet Zechariah son of Berekiah, the son of Iddo.'
  '8':
  - type: text
    content: During the night I had a vision, and there before me was a man mounted on a red horse. He was standing among the myrtle trees in a ravine. Behind him were red, brown and white horses.
  '9':
  - type: text
    content: I asked, “What are these, my lord?”
  - type: text
    content: The angel who was talking with me answered, “I will show you what they are.”
