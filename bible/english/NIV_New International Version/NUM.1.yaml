document_id: NUM.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Census
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses in the tent of meeting in the Desert of Sinai on the first day of the second month of the second year after the Israelites came out of Egypt. He said: '
  '10':
  - type: text
    content: 'from the sons of Joseph:'
  - type: text
    content: from Ephraim, Elishama son of Ammihud;
  - type: text
    content: from Manasseh, Gamaliel son of Pedahzur;
  '11':
  - type: text
    content: from Benjamin, Abidan son of Gideoni;
  '12':
  - type: text
    content: from Dan, Ahiezer son of Ammishaddai;
  '13':
  - type: text
    content: from Asher, Pagiel son of Okran;
  '14':
  - type: text
    content: from Gad, Eliasaph son of Deuel;
  '15':
  - type: text
    content: from Naphtali, Ahira son of Enan.”
  '16':
  - type: text
    content: These were the men appointed from the community, the leaders of their ancestral tribes. They were the heads of the clans of Israel.
  '17':
  - type: text
    content: 'Moses and Aaron took these men whose names had been specified, '
  '18':
  - type: text
    content: 'and they called the whole community together on the first day of the second month. The people registered their ancestry by their clans and families, and the men twenty years old or more were listed by name, one by one, '
  '19':
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses. And so he counted them in the Desert of Sinai:'
  '2':
  - type: text
    content: '“Take a census of the whole Israelite community by their clans and families, listing every man by name, one by one. '
  '20':
  - type: text
    content: 'From the descendants of Reuben the firstborn son of Israel:'
  - type: text
    content: 'All the men twenty years old or more who were able to serve in the army were listed by name, one by one, according to the records of their clans and families. '
  '21':
  - type: text
    content: The number from the tribe of Reuben was 46,500.
  '22':
  - type: text
    content: 'From the descendants of Simeon:'
  - type: text
    content: 'All the men twenty years old or more who were able to serve in the army were counted and listed by name, one by one, according to the records of their clans and families. '
  '23':
  - type: text
    content: The number from the tribe of Simeon was 59,300.
  '24':
  - type: text
    content: 'From the descendants of Gad:'
  - type: text
    content: 'All the men twenty years old or more who were able to serve in the army were listed by name, according to the records of their clans and families. '
  '25':
  - type: text
    content: The number from the tribe of Gad was 45,650.
  '26':
  - type: text
    content: 'From the descendants of Judah:'
  - type: text
    content: 'All the men twenty years old or more who were able to serve in the army were listed by name, according to the records of their clans and families. '
  '27':
  - type: text
    content: The number from the tribe of Judah was 74,600.
  '28':
  - type: text
    content: 'From the descendants of Issachar:'
  - type: text
    content: 'All the men twenty years old or more who were able to serve in the army were listed by name, according to the records of their clans and families. '
  '29':
  - type: text
    content: The number from the tribe of Issachar was 54,400.
  '3':
  - type: text
    content: 'You and Aaron are to count according to their divisions all the men in Israel who are twenty years old or more and able to serve in the army. '
  '30':
  - type: text
    content: 'From the descendants of Zebulun:'
  - type: text
    content: 'All the men twenty years old or more who were able to serve in the army were listed by name, according to the records of their clans and families. '
  '31':
  - type: text
    content: The number from the tribe of Zebulun was 57,400.
  '32':
  - type: text
    content: 'From the sons of Joseph:'
  - type: text
    content: 'From the descendants of Ephraim:'
  - type: text
    content: 'All the men twenty years old or more who were able to serve in the army were listed by name, according to the records of their clans and families. '
  '33':
  - type: text
    content: The number from the tribe of Ephraim was 40,500.
  '34':
  - type: text
    content: 'From the descendants of Manasseh:'
  - type: text
    content: 'All the men twenty years old or more who were able to serve in the army were listed by name, according to the records of their clans and families. '
  '35':
  - type: text
    content: The number from the tribe of Manasseh was 32,200.
  '36':
  - type: text
    content: 'From the descendants of Benjamin:'
  - type: text
    content: 'All the men twenty years old or more who were able to serve in the army were listed by name, according to the records of their clans and families. '
  '37':
  - type: text
    content: The number from the tribe of Benjamin was 35,400.
  '38':
  - type: text
    content: 'From the descendants of Dan:'
  - type: text
    content: 'All the men twenty years old or more who were able to serve in the army were listed by name, according to the records of their clans and families. '
  '39':
  - type: text
    content: The number from the tribe of Dan was 62,700.
  '4':
  - type: text
    content: 'One man from each tribe, each of them the head of his family, is to help you. '
  '40':
  - type: text
    content: 'From the descendants of Asher:'
  - type: text
    content: 'All the men twenty years old or more who were able to serve in the army were listed by name, according to the records of their clans and families. '
  '41':
  - type: text
    content: The number from the tribe of Asher was 41,500.
  '42':
  - type: text
    content: 'From the descendants of Naphtali:'
  - type: text
    content: 'All the men twenty years old or more who were able to serve in the army were listed by name, according to the records of their clans and families. '
  '43':
  - type: text
    content: The number from the tribe of Naphtali was 53,400.
  '44':
  - type: text
    content: 'These were the men counted by Moses and Aaron and the twelve leaders of Israel, each one representing his family. '
  '45':
  - type: text
    content: 'All the Israelites twenty years old or more who were able to serve in Israel’s army were counted according to their families. '
  '46':
  - type: text
    content: The total number was 603,550.
  '47':
  - type: text
    content: 'The ancestral tribe of the Levites, however, was not counted along with the others. '
  '48':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' had said to Moses: '
  '49':
  - type: text
    content: '“You must not count the tribe of Levi or include them in the census of the other Israelites. '
  '5':
  - type: text
    content: 'These are the names of the men who are to assist you:'
  - type: text
    content: from Reuben, Elizur son of Shedeur;
  '50':
  - type: text
    content: 'Instead, appoint the Levites to be in charge of the tabernacle of the covenant law—over all its furnishings and everything belonging to it. They are to carry the tabernacle and all its furnishings; they are to take care of it and encamp around it. '
  '51':
  - type: text
    content: 'Whenever the tabernacle is to move, the Levites are to take it down, and whenever the tabernacle is to be set up, the Levites shall do it. Anyone else who approaches it is to be put to death. '
  '52':
  - type: text
    content: 'The Israelites are to set up their tents by divisions, each of them in their own camp under their standard. '
  '53':
  - type: text
    content: The Levites, however, are to set up their tents around the tabernacle of the covenant law so that my wrath will not fall on the Israelite community. The Levites are to be responsible for the care of the tabernacle of the covenant law.”
  '54':
  - type: text
    content: 'The Israelites did all this just as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '6':
  - type: text
    content: from Simeon, Shelumiel son of Zurishaddai;
  '7':
  - type: text
    content: from Judah, Nahshon son of Amminadab;
  '8':
  - type: text
    content: from Issachar, Nethanel son of Zuar;
  '9':
  - type: text
    content: from Zebulun, Eliab son of Helon;
