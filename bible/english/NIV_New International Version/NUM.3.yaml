document_id: NUM.3,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Levites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the account of the family of Aaron and Moses at the time the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke to Moses at Mount Sinai.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Appoint Aaron and his sons to serve as priests; anyone else who approaches the sanctuary is to be put to death.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' also said to Moses, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I have taken the Levites from among the Israelites in place of the first male offspring of every Israelite woman. The Levites are mine, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for all the firstborn are mine. When I struck down all the firstborn in Egypt, I set apart for myself every firstborn in Israel, whether human or animal. They are to be mine. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses in the Desert of Sinai, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Count the Levites by their families and clans. Count every male a month old or more.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses counted them, as he was commanded by the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '17':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'These were the names of the sons of Levi:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Gershon, Kohath and Merari.
  '18':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'These were the names of the Gershonite clans:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Libni and Shimei.
  '19':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The Kohathite clans:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Amram, Izhar, Hebron and Uzziel.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The names of the sons of Aaron were Nadab the firstborn and Abihu, Eleazar and Ithamar. '
  '20':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The Merarite clans:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Mahli and Mushi.
  - type: usfm
    marker: p
    children:
    - type: text
      text: These were the Levite clans, according to their families.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To Gershon belonged the clans of the Libnites and Shimeites; these were the Gershonite clans. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The number of all the males a month old or more who were counted was 7,500. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Gershonite clans were to camp on the west, behind the tabernacle. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The leader of the families of the Gershonites was Eliasaph son of Lael. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At the tent of meeting the Gershonites were responsible for the care of the tabernacle and tent, its coverings, the curtain at the entrance to the tent of meeting, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the curtains of the courtyard, the curtain at the entrance to the courtyard surrounding the tabernacle and altar, and the ropes—and everything related to their use.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To Kohath belonged the clans of the Amramites, Izharites, Hebronites and Uzzielites; these were the Kohathite clans. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The number of all the males a month old or more was 8,600.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew; some Septuagint manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 8,300
      marker-yv: yv-n
    - type: text
      text: ' The Kohathites were responsible for the care of the sanctuary. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Kohathite clans were to camp on the south side of the tabernacle. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those were the names of Aaron’s sons, the anointed priests, who were ordained to serve as priests. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The leader of the families of the Kohathite clans was Elizaphan son of Uzziel. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They were responsible for the care of the ark, the table, the lampstand, the altars, the articles of the sanctuary used in ministering, the curtain, and everything related to their use. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The chief leader of the Levites was Eleazar son of Aaron, the priest. He was appointed over those who were responsible for the care of the sanctuary.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To Merari belonged the clans of the Mahlites and the Mushites; these were the Merarite clans. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The number of all the males a month old or more who were counted was 6,200. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The leader of the families of the Merarite clans was Zuriel son of Abihail; they were to camp on the north side of the tabernacle. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Merarites were appointed to take care of the frames of the tabernacle, its crossbars, posts, bases, all its equipment, and everything related to their use, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: as well as the posts of the surrounding courtyard with their bases, tent pegs and ropes.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moses and Aaron and his sons were to camp to the east of the tabernacle, toward the sunrise, in front of the tent of meeting. They were responsible for the care of the sanctuary on behalf of the Israelites. Anyone else who approached the sanctuary was to be put to death.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The total number of Levites counted at the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s command by Moses and Aaron according to their clans, including every male a month old or more, was 22,000.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nadab and Abihu, however, died before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' when they made an offering with unauthorized fire before him in the Desert of Sinai. They had no sons, so Eleazar and Ithamar served as priests during the lifetime of their father Aaron.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Count all the firstborn Israelite males who are a month old or more and make a list of their names. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Take the Levites for me in place of all the firstborn of the Israelites, and the livestock of the Levites in place of all the firstborn of the livestock of the Israelites. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses counted all the firstborn of the Israelites, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded him. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The total number of firstborn males a month old or more, listed by name, was 22,273.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' also said to Moses, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Take the Levites in place of all the firstborn of Israel, and the livestock of the Levites in place of their livestock. The Levites are to be mine. I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To redeem the 273 firstborn Israelites who exceed the number of the Levites, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: collect five shekels
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:47 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 2 ounces or about 58 grams
      marker-yv: yv-n
    - type: text
      text: ' for each one, according to the sanctuary shekel, which weighs twenty gerahs. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Give the money for the redemption of the additional Israelites to Aaron and his sons.”
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses collected the redemption money from those who exceeded the number redeemed by the Levites. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: From the firstborn of the Israelites he collected silver weighing 1,365 shekels,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:50 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 35 pounds or about 16 kilograms
      marker-yv: yv-n
    - type: text
      text: ' according to the sanctuary shekel. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses gave the redemption money to Aaron and his sons, as he was commanded by the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Bring the tribe of Levi and present them to Aaron the priest to assist him. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They are to perform duties for him and for the whole community at the tent of meeting by doing the work of the tabernacle. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They are to take care of all the furnishings of the tent of meeting, fulfilling the obligations of the Israelites by doing the work of the tabernacle. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Give the Levites to Aaron and his sons; they are the Israelites who are to be given wholly to him.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Most manuscripts of the Masoretic Text; some manuscripts of the Masoretic Text, Samaritan Pentateuch and Septuagint (see also 8:16) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to me
      marker-yv: yv-n
    - type: text
      text: ' '
