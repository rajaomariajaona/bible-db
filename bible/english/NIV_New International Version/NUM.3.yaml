document_id: NUM.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Levites
  - type: text
    content: 'This is the account of the family of Aaron and Moses at the time the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses at Mount Sinai.'
  '10':
  - type: text
    content: Appoint Aaron and his sons to serve as priests; anyone else who approaches the sanctuary is to be put to death.”
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' also said to Moses, '
  '12':
  - type: text
    content: '“I have taken the Levites from among the Israelites in place of the first male offspring of every Israelite woman. The Levites are mine, '
  '13':
  - type: text
    content: 'for all the firstborn are mine. When I struck down all the firstborn in Egypt, I set apart for myself every firstborn in Israel, whether human or animal. They are to be mine. I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses in the Desert of Sinai, '
  '15':
  - type: text
    content: '“Count the Levites by their families and clans. Count every male a month old or more.” '
  '16':
  - type: text
    content: 'So Moses counted them, as he was commanded by the word of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '17':
  - type: text
    content: 'These were the names of the sons of Levi:'
  - type: text
    content: Gershon, Kohath and Merari.
  '18':
  - type: text
    content: 'These were the names of the Gershonite clans:'
  - type: text
    content: Libni and Shimei.
  '19':
  - type: text
    content: 'The Kohathite clans:'
  - type: text
    content: Amram, Izhar, Hebron and Uzziel.
  '2':
  - type: text
    content: 'The names of the sons of Aaron were Nadab the firstborn and Abihu, Eleazar and Ithamar. '
  '20':
  - type: text
    content: 'The Merarite clans:'
  - type: text
    content: Mahli and Mushi.
  - type: text
    content: These were the Levite clans, according to their families.
  '21':
  - type: text
    content: 'To Gershon belonged the clans of the Libnites and Shimeites; these were the Gershonite clans. '
  '22':
  - type: text
    content: 'The number of all the males a month old or more who were counted was 7,500. '
  '23':
  - type: text
    content: 'The Gershonite clans were to camp on the west, behind the tabernacle. '
  '24':
  - type: text
    content: 'The leader of the families of the Gershonites was Eliasaph son of Lael. '
  '25':
  - type: text
    content: 'At the tent of meeting the Gershonites were responsible for the care of the tabernacle and tent, its coverings, the curtain at the entrance to the tent of meeting, '
  '26':
  - type: text
    content: the curtains of the courtyard, the curtain at the entrance to the courtyard surrounding the tabernacle and altar, and the ropes—and everything related to their use.
  '27':
  - type: text
    content: 'To Kohath belonged the clans of the Amramites, Izharites, Hebronites and Uzzielites; these were the Kohathite clans. '
  '28':
  - type: text
    content: The number of all the males a month old or more was 8,600.
  - type: note
    content: Hebrew; some Septuagint manuscripts 8,300
  - type: text
    content: ' The Kohathites were responsible for the care of the sanctuary. '
  '29':
  - type: text
    content: 'The Kohathite clans were to camp on the south side of the tabernacle. '
  '3':
  - type: text
    content: 'Those were the names of Aaron’s sons, the anointed priests, who were ordained to serve as priests. '
  '30':
  - type: text
    content: 'The leader of the families of the Kohathite clans was Elizaphan son of Uzziel. '
  '31':
  - type: text
    content: 'They were responsible for the care of the ark, the table, the lampstand, the altars, the articles of the sanctuary used in ministering, the curtain, and everything related to their use. '
  '32':
  - type: text
    content: The chief leader of the Levites was Eleazar son of Aaron, the priest. He was appointed over those who were responsible for the care of the sanctuary.
  '33':
  - type: text
    content: 'To Merari belonged the clans of the Mahlites and the Mushites; these were the Merarite clans. '
  '34':
  - type: text
    content: 'The number of all the males a month old or more who were counted was 6,200. '
  '35':
  - type: text
    content: 'The leader of the families of the Merarite clans was Zuriel son of Abihail; they were to camp on the north side of the tabernacle. '
  '36':
  - type: text
    content: 'The Merarites were appointed to take care of the frames of the tabernacle, its crossbars, posts, bases, all its equipment, and everything related to their use, '
  '37':
  - type: text
    content: as well as the posts of the surrounding courtyard with their bases, tent pegs and ropes.
  '38':
  - type: text
    content: Moses and Aaron and his sons were to camp to the east of the tabernacle, toward the sunrise, in front of the tent of meeting. They were responsible for the care of the sanctuary on behalf of the Israelites. Anyone else who approached the sanctuary was to be put to death.
  '39':
  - type: text
    content: 'The total number of Levites counted at the '
  - type: text
    content: Lord
  - type: text
    content: ’s command by Moses and Aaron according to their clans, including every male a month old or more, was 22,000.
  '4':
  - type: text
    content: 'Nadab and Abihu, however, died before the '
  - type: text
    content: Lord
  - type: text
    content: ' when they made an offering with unauthorized fire before him in the Desert of Sinai. They had no sons, so Eleazar and Ithamar served as priests during the lifetime of their father Aaron.'
  '40':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Count all the firstborn Israelite males who are a month old or more and make a list of their names. '
  '41':
  - type: text
    content: 'Take the Levites for me in place of all the firstborn of the Israelites, and the livestock of the Levites in place of all the firstborn of the livestock of the Israelites. I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '42':
  - type: text
    content: 'So Moses counted all the firstborn of the Israelites, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded him. '
  '43':
  - type: text
    content: The total number of firstborn males a month old or more, listed by name, was 22,273.
  '44':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' also said to Moses, '
  '45':
  - type: text
    content: '“Take the Levites in place of all the firstborn of Israel, and the livestock of the Levites in place of their livestock. The Levites are to be mine. I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '46':
  - type: text
    content: 'To redeem the 273 firstborn Israelites who exceed the number of the Levites, '
  '47':
  - type: text
    content: collect five shekels
  - type: note
    content: That is, about 2 ounces or about 58 grams
  - type: text
    content: ' for each one, according to the sanctuary shekel, which weighs twenty gerahs. '
  '48':
  - type: text
    content: Give the money for the redemption of the additional Israelites to Aaron and his sons.”
  '49':
  - type: text
    content: 'So Moses collected the redemption money from those who exceeded the number redeemed by the Levites. '
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '50':
  - type: text
    content: From the firstborn of the Israelites he collected silver weighing 1,365 shekels,
  - type: note
    content: That is, about 35 pounds or about 16 kilograms
  - type: text
    content: ' according to the sanctuary shekel. '
  '51':
  - type: text
    content: 'Moses gave the redemption money to Aaron and his sons, as he was commanded by the word of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: '“Bring the tribe of Levi and present them to Aaron the priest to assist him. '
  '7':
  - type: text
    content: 'They are to perform duties for him and for the whole community at the tent of meeting by doing the work of the tabernacle. '
  '8':
  - type: text
    content: 'They are to take care of all the furnishings of the tent of meeting, fulfilling the obligations of the Israelites by doing the work of the tabernacle. '
  '9':
  - type: text
    content: Give the Levites to Aaron and his sons; they are the Israelites who are to be given wholly to him.
  - type: note
    content: Most manuscripts of the Masoretic Text; some manuscripts of the Masoretic Text, Samaritan Pentateuch and Septuagint (see also 8:16) to me
  - type: text
    content: ' '
