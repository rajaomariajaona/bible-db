document_id: JER.7,111
type_code: eng
verses:
  '1':
  - type: heading
    content: False Religion Worthless
  - type: text
    content: 'This is the word that came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: 'and then come and stand before me in this house, which bears my Name, and say, “We are safe”—safe to do all these detestable things? '
  '11':
  - type: text
    content: 'Has this house, which bears my Name, become a den of robbers to you? But I have been watching! declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: '“ ‘Go now to the place in Shiloh where I first made a dwelling for my Name, and see what I did to it because of the wickedness of my people Israel. '
  '13':
  - type: text
    content: 'While you were doing all these things, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', I spoke to you again and again, but you did not listen; I called you, but you did not answer. '
  '14':
  - type: text
    content: 'Therefore, what I did to Shiloh I will now do to the house that bears my Name, the temple you trust in, the place I gave to you and your ancestors. '
  '15':
  - type: text
    content: I will thrust you from my presence, just as I did all your fellow Israelites, the people of Ephraim.’
  '16':
  - type: text
    content: '“So do not pray for this people nor offer any plea or petition for them; do not plead with me, for I will not listen to you. '
  '17':
  - type: text
    content: 'Do you not see what they are doing in the towns of Judah and in the streets of Jerusalem? '
  '18':
  - type: text
    content: 'The children gather wood, the fathers light the fire, and the women knead the dough and make cakes to offer to the Queen of Heaven. They pour out drink offerings to other gods to arouse my anger. '
  '19':
  - type: text
    content: 'But am I the one they are provoking? declares the '
  - type: text
    content: Lord
  - type: text
    content: . Are they not rather harming themselves, to their own shame?
  '2':
  - type: text
    content: '“Stand at the gate of the '
  - type: text
    content: Lord
  - type: text
    content: '’s house and there proclaim this message:'
  - type: text
    content: '“ ‘Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', all you people of Judah who come through these gates to worship the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '20':
  - type: text
    content: '“ ‘Therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: My anger and my wrath will be poured out on this place—on man and beast, on the trees of the field and on the crops of your land—and it will burn and not be quenched.'
  '21':
  - type: text
    content: '“ ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says: Go ahead, add your burnt offerings to your other sacrifices and eat the meat yourselves! '
  '22':
  - type: text
    content: 'For when I brought your ancestors out of Egypt and spoke to them, I did not just give them commands about burnt offerings and sacrifices, '
  '23':
  - type: text
    content: 'but I gave them this command: Obey me, and I will be your God and you will be my people. Walk in obedience to all I command you, that it may go well with you. '
  '24':
  - type: text
    content: 'But they did not listen or pay attention; instead, they followed the stubborn inclinations of their evil hearts. They went backward and not forward. '
  '25':
  - type: text
    content: 'From the time your ancestors left Egypt until now, day after day, again and again I sent you my servants the prophets. '
  '26':
  - type: text
    content: But they did not listen to me or pay attention. They were stiff-necked and did more evil than their ancestors.’
  '27':
  - type: text
    content: '“When you tell them all this, they will not listen to you; when you call to them, they will not answer. '
  '28':
  - type: text
    content: 'Therefore say to them, ‘This is the nation that has not obeyed the '
  - type: text
    content: Lord
  - type: text
    content: ' its God or responded to correction. Truth has perished; it has vanished from their lips.'
  '29':
  - type: text
    content: '“ ‘Cut off your hair and throw it away; take up a lament on the barren heights, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has rejected and abandoned this generation that is under his wrath.'
  - type: heading
    content: The Valley of Slaughter
  '3':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says: Reform your ways and your actions, and I will let you live in this place. '
  '30':
  - type: text
    content: '“ ‘The people of Judah have done evil in my eyes, declares the '
  - type: text
    content: Lord
  - type: text
    content: '. They have set up their detestable idols in the house that bears my Name and have defiled it. '
  '31':
  - type: text
    content: 'They have built the high places of Topheth in the Valley of Ben Hinnom to burn their sons and daughters in the fire—something I did not command, nor did it enter my mind. '
  '32':
  - type: text
    content: 'So beware, the days are coming, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', when people will no longer call it Topheth or the Valley of Ben Hinnom, but the Valley of Slaughter, for they will bury the dead in Topheth until there is no more room. '
  '33':
  - type: text
    content: 'Then the carcasses of this people will become food for the birds and the wild animals, and there will be no one to frighten them away. '
  '34':
  - type: text
    content: I will bring an end to the sounds of joy and gladness and to the voices of bride and bridegroom in the towns of Judah and the streets of Jerusalem, for the land will become desolate.
  '4':
  - type: text
    content: 'Do not trust in deceptive words and say, “This is the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '!” '
  '5':
  - type: text
    content: 'If you really change your ways and your actions and deal with each other justly, '
  '6':
  - type: text
    content: 'if you do not oppress the foreigner, the fatherless or the widow and do not shed innocent blood in this place, and if you do not follow other gods to your own harm, '
  '7':
  - type: text
    content: 'then I will let you live in this place, in the land I gave your ancestors for ever and ever. '
  '8':
  - type: text
    content: But look, you are trusting in deceptive words that are worthless.
  '9':
  - type: text
    content: “ ‘Will you steal and murder, commit adultery and perjury,
  - type: note
    content: Or and swear by false gods
  - type: text
    content: ' burn incense to Baal and follow other gods you have not known, '
