document_id: JER.7,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: False Religion Worthless
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is the word that came to Jeremiah from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and then come and stand before me in this house, which bears my Name, and say, “We are safe”—safe to do all these detestable things? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Has this house, which bears my Name, become a den of robbers to you? But I have been watching! declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘Go now to the place in Shiloh where I first made a dwelling for my Name, and see what I did to it because of the wickedness of my people Israel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While you were doing all these things, declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I spoke to you again and again, but you did not listen; I called you, but you did not answer. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, what I did to Shiloh I will now do to the house that bears my Name, the temple you trust in, the place I gave to you and your ancestors. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will thrust you from my presence, just as I did all your fellow Israelites, the people of Ephraim.’
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“So do not pray for this people nor offer any plea or petition for them; do not plead with me, for I will not listen to you. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do you not see what they are doing in the towns of Judah and in the streets of Jerusalem? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The children gather wood, the fathers light the fire, and the women knead the dough and make cakes to offer to the Queen of Heaven. They pour out drink offerings to other gods to arouse my anger. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But am I the one they are provoking? declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . Are they not rather harming themselves, to their own shame?
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Stand at the gate of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s house and there proclaim this message:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘Hear the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', all you people of Judah who come through these gates to worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘Therefore this is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: My anger and my wrath will be poured out on this place—on man and beast, on the trees of the field and on the crops of your land—and it will burn and not be quenched.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, the God of Israel, says: Go ahead, add your burnt offerings to your other sacrifices and eat the meat yourselves! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For when I brought your ancestors out of Egypt and spoke to them, I did not just give them commands about burnt offerings and sacrifices, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but I gave them this command: Obey me, and I will be your God and you will be my people. Walk in obedience to all I command you, that it may go well with you. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they did not listen or pay attention; instead, they followed the stubborn inclinations of their evil hearts. They went backward and not forward. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From the time your ancestors left Egypt until now, day after day, again and again I sent you my servants the prophets. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But they did not listen to me or pay attention. They were stiff-necked and did more evil than their ancestors.’
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“When you tell them all this, they will not listen to you; when you call to them, they will not answer. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore say to them, ‘This is the nation that has not obeyed the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' its God or responded to correction. Truth has perished; it has vanished from their lips.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘Cut off your hair and throw it away; take up a lament on the barren heights, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has rejected and abandoned this generation that is under his wrath.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Valley of Slaughter
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, the God of Israel, says: Reform your ways and your actions, and I will let you live in this place. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘The people of Judah have done evil in my eyes, declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. They have set up their detestable idols in the house that bears my Name and have defiled it. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They have built the high places of Topheth in the Valley of Ben Hinnom to burn their sons and daughters in the fire—something I did not command, nor did it enter my mind. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So beware, the days are coming, declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', when people will no longer call it Topheth or the Valley of Ben Hinnom, but the Valley of Slaughter, for they will bury the dead in Topheth until there is no more room. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the carcasses of this people will become food for the birds and the wild animals, and there will be no one to frighten them away. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will bring an end to the sounds of joy and gladness and to the voices of bride and bridegroom in the towns of Judah and the streets of Jerusalem, for the land will become desolate.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not trust in deceptive words and say, “This is the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you really change your ways and your actions and deal with each other justly, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'if you do not oppress the foreigner, the fatherless or the widow and do not shed innocent blood in this place, and if you do not follow other gods to your own harm, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then I will let you live in this place, in the land I gave your ancestors for ever and ever. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But look, you are trusting in deceptive words that are worthless.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “ ‘Will you steal and murder, commit adultery and perjury,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and swear by false gods
      marker-yv: yv-n
    - type: text
      text: ' burn incense to Baal and follow other gods you have not known, '
