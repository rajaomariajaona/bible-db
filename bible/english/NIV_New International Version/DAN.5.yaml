document_id: DAN.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Writing on the Wall
  - type: text
    content: 'King Belshazzar gave a great banquet for a thousand of his nobles and drank wine with them. '
  '10':
  - type: text
    content: The queen,
  - type: note
    content: Or queen mother
  - type: text
    content: ' hearing the voices of the king and his nobles, came into the banquet hall. “May the king live forever!” she said. “Don’t be alarmed! Don’t look so pale! '
  '11':
  - type: text
    content: 'There is a man in your kingdom who has the spirit of the holy gods in him. In the time of your father he was found to have insight and intelligence and wisdom like that of the gods. Your father, King Nebuchadnezzar, appointed him chief of the magicians, enchanters, astrologers and diviners. '
  '12':
  - type: text
    content: He did this because Daniel, whom the king called Belteshazzar, was found to have a keen mind and knowledge and understanding, and also the ability to interpret dreams, explain riddles and solve difficult problems. Call for Daniel, and he will tell you what the writing means.”
  '13':
  - type: text
    content: 'So Daniel was brought before the king, and the king said to him, “Are you Daniel, one of the exiles my father the king brought from Judah? '
  '14':
  - type: text
    content: 'I have heard that the spirit of the gods is in you and that you have insight, intelligence and outstanding wisdom. '
  '15':
  - type: text
    content: 'The wise men and enchanters were brought before me to read this writing and tell me what it means, but they could not explain it. '
  '16':
  - type: text
    content: Now I have heard that you are able to give interpretations and to solve difficult problems. If you can read this writing and tell me what it means, you will be clothed in purple and have a gold chain placed around your neck, and you will be made the third highest ruler in the kingdom.”
  '17':
  - type: text
    content: Then Daniel answered the king, “You may keep your gifts for yourself and give your rewards to someone else. Nevertheless, I will read the writing for the king and tell him what it means.
  '18':
  - type: text
    content: '“Your Majesty, the Most High God gave your father Nebuchadnezzar sovereignty and greatness and glory and splendor. '
  '19':
  - type: text
    content: 'Because of the high position he gave him, all the nations and peoples of every language dreaded and feared him. Those the king wanted to put to death, he put to death; those he wanted to spare, he spared; those he wanted to promote, he promoted; and those he wanted to humble, he humbled. '
  '2':
  - type: text
    content: While Belshazzar was drinking his wine, he gave orders to bring in the gold and silver goblets that Nebuchadnezzar his father
  - type: note
    content: Or ancestor; or predecessor; also in verses 11, 13 and 18
  - type: text
    content: ' had taken from the temple in Jerusalem, so that the king and his nobles, his wives and his concubines might drink from them. '
  '20':
  - type: text
    content: 'But when his heart became arrogant and hardened with pride, he was deposed from his royal throne and stripped of his glory. '
  '21':
  - type: text
    content: He was driven away from people and given the mind of an animal; he lived with the wild donkeys and ate grass like the ox; and his body was drenched with the dew of heaven, until he acknowledged that the Most High God is sovereign over all kingdoms on earth and sets over them anyone he wishes.
  '22':
  - type: text
    content: “But you, Belshazzar, his son,
  - type: note
    content: Or descendant; or successor
  - type: text
    content: ' have not humbled yourself, though you knew all this. '
  '23':
  - type: text
    content: 'Instead, you have set yourself up against the Lord of heaven. You had the goblets from his temple brought to you, and you and your nobles, your wives and your concubines drank wine from them. You praised the gods of silver and gold, of bronze, iron, wood and stone, which cannot see or hear or understand. But you did not honor the God who holds in his hand your life and all your ways. '
  '24':
  - type: text
    content: Therefore he sent the hand that wrote the inscription.
  '25':
  - type: text
    content: '“This is the inscription that was written:'
  - type: text
    content: mene, mene, tekel, parsin
  '26':
  - type: text
    content: '“Here is what these words mean:'
  - type: text
    content: Mene
  - type: text
    content: ' '
  - type: note
    content: Mene can mean numbered or mina (a unit of money).
  - type: text
    content: ': God has numbered the days of your reign and brought it to an end.'
  '27':
  - type: text
    content: ' '
  - type: text
    content: Tekel
  - type: text
    content: ' '
  - type: note
    content: Tekel can mean weighed or shekel.
  - type: text
    content: ': You have been weighed on the scales and found wanting.'
  '28':
  - type: text
    content: ' '
  - type: text
    content: Peres
  - type: text
    content: ' '
  - type: note
    content: Peres (the singular of Parsin) can mean divided or Persia or a half mina or a half shekel.
  - type: text
    content: ': Your kingdom is divided and given to the Medes and Persians.”'
  '29':
  - type: text
    content: Then at Belshazzar’s command, Daniel was clothed in purple, a gold chain was placed around his neck, and he was proclaimed the third highest ruler in the kingdom.
  '3':
  - type: text
    content: 'So they brought in the gold goblets that had been taken from the temple of God in Jerusalem, and the king and his nobles, his wives and his concubines drank from them. '
  '30':
  - type: text
    content: That very night Belshazzar, king of the Babylonians,
  - type: note
    content: Or Chaldeans
  - type: text
    content: ' was slain, '
  '31':
  - type: text
    content: and Darius the Mede took over the kingdom, at the age of sixty-two.
  - type: note
    content: In Aramaic texts this verse (5:31) is numbered 6:1.
  '4':
  - type: text
    content: As they drank the wine, they praised the gods of gold and silver, of bronze, iron, wood and stone.
  '5':
  - type: text
    content: 'Suddenly the fingers of a human hand appeared and wrote on the plaster of the wall, near the lampstand in the royal palace. The king watched the hand as it wrote. '
  '6':
  - type: text
    content: His face turned pale and he was so frightened that his legs became weak and his knees were knocking.
  '7':
  - type: text
    content: The king summoned the enchanters, astrologers
  - type: note
    content: Or Chaldeans; also in verse 11
  - type: text
    content: ' and diviners. Then he said to these wise men of Babylon, “Whoever reads this writing and tells me what it means will be clothed in purple and have a gold chain placed around his neck, and he will be made the third highest ruler in the kingdom.”'
  '8':
  - type: text
    content: 'Then all the king’s wise men came in, but they could not read the writing or tell the king what it meant. '
  '9':
  - type: text
    content: So King Belshazzar became even more terrified and his face grew more pale. His nobles were baffled.
