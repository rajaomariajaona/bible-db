document_id: JDG.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Deborah
  - type: text
    content: 'Again the Israelites did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', now that Ehud was dead. '
  '10':
  - type: text
    content: There Barak summoned Zebulun and Naphtali, and ten thousand men went up under his command. Deborah also went up with him.
  '11':
  - type: text
    content: Now Heber the Kenite had left the other Kenites, the descendants of Hobab, Moses’ brother-in-law,
  - type: note
    content: Or father-in-law
  - type: text
    content: ' and pitched his tent by the great tree in Zaanannim near Kedesh.'
  '12':
  - type: text
    content: 'When they told Sisera that Barak son of Abinoam had gone up to Mount Tabor, '
  '13':
  - type: text
    content: Sisera summoned from Harosheth Haggoyim to the Kishon River all his men and his nine hundred chariots fitted with iron.
  '14':
  - type: text
    content: 'Then Deborah said to Barak, “Go! This is the day the '
  - type: text
    content: Lord
  - type: text
    content: ' has given Sisera into your hands. Has not the '
  - type: text
    content: Lord
  - type: text
    content: ' gone ahead of you?” So Barak went down Mount Tabor, with ten thousand men following him. '
  '15':
  - type: text
    content: 'At Barak’s advance, the '
  - type: text
    content: Lord
  - type: text
    content: ' routed Sisera and all his chariots and army by the sword, and Sisera got down from his chariot and fled on foot.'
  '16':
  - type: text
    content: 'Barak pursued the chariots and army as far as Harosheth Haggoyim, and all Sisera’s troops fell by the sword; not a man was left. '
  '17':
  - type: text
    content: Sisera, meanwhile, fled on foot to the tent of Jael, the wife of Heber the Kenite, because there was an alliance between Jabin king of Hazor and the family of Heber the Kenite.
  '18':
  - type: text
    content: Jael went out to meet Sisera and said to him, “Come, my lord, come right in. Don’t be afraid.” So he entered her tent, and she covered him with a blanket.
  '19':
  - type: text
    content: “I’m thirsty,” he said. “Please give me some water.” She opened a skin of milk, gave him a drink, and covered him up.
  '2':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' sold them into the hands of Jabin king of Canaan, who reigned in Hazor. Sisera, the commander of his army, was based in Harosheth Haggoyim. '
  '20':
  - type: text
    content: “Stand in the doorway of the tent,” he told her. “If someone comes by and asks you, ‘Is anyone in there?’ say ‘No.’ ”
  '21':
  - type: text
    content: But Jael, Heber’s wife, picked up a tent peg and a hammer and went quietly to him while he lay fast asleep, exhausted. She drove the peg through his temple into the ground, and he died.
  '22':
  - type: text
    content: Just then Barak came by in pursuit of Sisera, and Jael went out to meet him. “Come,” she said, “I will show you the man you’re looking for.” So he went in with her, and there lay Sisera with the tent peg through his temple—dead.
  '23':
  - type: text
    content: 'On that day God subdued Jabin king of Canaan before the Israelites. '
  '24':
  - type: text
    content: And the hand of the Israelites pressed harder and harder against Jabin king of Canaan until they destroyed him.
  '3':
  - type: text
    content: 'Because he had nine hundred chariots fitted with iron and had cruelly oppressed the Israelites for twenty years, they cried to the '
  - type: text
    content: Lord
  - type: text
    content: ' for help.'
  '4':
  - type: text
    content: Now Deborah, a prophet, the wife of Lappidoth, was leading
  - type: note
    content: Traditionally judging
  - type: text
    content: ' Israel at that time. '
  '5':
  - type: text
    content: 'She held court under the Palm of Deborah between Ramah and Bethel in the hill country of Ephraim, and the Israelites went up to her to have their disputes decided. '
  '6':
  - type: text
    content: 'She sent for Barak son of Abinoam from Kedesh in Naphtali and said to him, “The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, commands you: ‘Go, take with you ten thousand men of Naphtali and Zebulun and lead them up to Mount Tabor. '
  '7':
  - type: text
    content: I will lead Sisera, the commander of Jabin’s army, with his chariots and his troops to the Kishon River and give him into your hands.’ ”
  '8':
  - type: text
    content: Barak said to her, “If you go with me, I will go; but if you don’t go with me, I won’t go.”
  '9':
  - type: text
    content: '“Certainly I will go with you,” said Deborah. “But because of the course you are taking, the honor will not be yours, for the '
  - type: text
    content: Lord
  - type: text
    content: ' will deliver Sisera into the hands of a woman.” So Deborah went with Barak to Kedesh. '
