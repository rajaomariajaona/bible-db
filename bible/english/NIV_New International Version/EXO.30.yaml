document_id: EXO.30,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Altar of Incense
  - type: text
    content: '“Make an altar of acacia wood for burning incense. '
  '10':
  - type: text
    content: Once a year Aaron shall make atonement on its horns. This annual atonement must be made with the blood of the atoning sin offering
  - type: note
    content: Or purification offering
  - type: text
    content: ' for the generations to come. It is most holy to the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: heading
    content: Atonement Money
  '11':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '12':
  - type: text
    content: '“When you take a census of the Israelites to count them, each one must pay the '
  - type: text
    content: Lord
  - type: text
    content: ' a ransom for his life at the time he is counted. Then no plague will come on them when you number them. '
  '13':
  - type: text
    content: Each one who crosses over to those already counted is to give a half shekel,
  - type: note
    content: That is, about 1/5 ounce or about 5.8 grams; also in verse 15
  - type: text
    content: ' according to the sanctuary shekel, which weighs twenty gerahs. This half shekel is an offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'All who cross over, those twenty years old or more, are to give an offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'The rich are not to give more than a half shekel and the poor are not to give less when you make the offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' to atone for your lives. '
  '16':
  - type: text
    content: 'Receive the atonement money from the Israelites and use it for the service of the tent of meeting. It will be a memorial for the Israelites before the '
  - type: text
    content: Lord
  - type: text
    content: ', making atonement for your lives.”'
  - type: heading
    content: Basin for Washing
  '17':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '18':
  - type: text
    content: '“Make a bronze basin, with its bronze stand, for washing. Place it between the tent of meeting and the altar, and put water in it. '
  '19':
  - type: text
    content: 'Aaron and his sons are to wash their hands and feet with water from it. '
  '2':
  - type: text
    content: It is to be square, a cubit long and a cubit wide, and two cubits high
  - type: note
    content: That is, about 1 1/2 feet long and wide and 3 feet high or about 45 centimeters long and wide and 90 centimeters high
  - type: text
    content: '—its horns of one piece with it. '
  '20':
  - type: text
    content: 'Whenever they enter the tent of meeting, they shall wash with water so that they will not die. Also, when they approach the altar to minister by presenting a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '21':
  - type: text
    content: they shall wash their hands and feet so that they will not die. This is to be a lasting ordinance for Aaron and his descendants for the generations to come.”
  - type: heading
    content: Anointing Oil
  '22':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '23':
  - type: text
    content: '“Take the following fine spices: 500 shekels'
  - type: note
    content: That is, about 12 1/2 pounds or about 5.8 kilograms; also in verse 24
  - type: text
    content: ' of liquid myrrh, half as much (that is, 250 shekels) of fragrant cinnamon, 250 shekels'
  - type: note
    content: That is, about 6 1/4 pounds or about 2.9 kilograms
  - type: text
    content: ' of fragrant calamus, '
  '24':
  - type: text
    content: 500 shekels of cassia—all according to the sanctuary shekel—and a hin
  - type: note
    content: That is, probably about 1 gallon or about 3.8 liters
  - type: text
    content: ' of olive oil. '
  '25':
  - type: text
    content: 'Make these into a sacred anointing oil, a fragrant blend, the work of a perfumer. It will be the sacred anointing oil. '
  '26':
  - type: text
    content: 'Then use it to anoint the tent of meeting, the ark of the covenant law, '
  '27':
  - type: text
    content: 'the table and all its articles, the lampstand and its accessories, the altar of incense, '
  '28':
  - type: text
    content: 'the altar of burnt offering and all its utensils, and the basin with its stand. '
  '29':
  - type: text
    content: You shall consecrate them so they will be most holy, and whatever touches them will be holy.
  '3':
  - type: text
    content: 'Overlay the top and all the sides and the horns with pure gold, and make a gold molding around it. '
  '30':
  - type: text
    content: '“Anoint Aaron and his sons and consecrate them so they may serve me as priests. '
  '31':
  - type: text
    content: 'Say to the Israelites, ‘This is to be my sacred anointing oil for the generations to come. '
  '32':
  - type: text
    content: 'Do not pour it on anyone else’s body and do not make any other oil using the same formula. It is sacred, and you are to consider it sacred. '
  '33':
  - type: text
    content: Whoever makes perfume like it and puts it on anyone other than a priest must be cut off from their people.’ ”
  - type: heading
    content: Incense
  '34':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Take fragrant spices—gum resin, onycha and galbanum—and pure frankincense, all in equal amounts, '
  '35':
  - type: text
    content: 'and make a fragrant blend of incense, the work of a perfumer. It is to be salted and pure and sacred. '
  '36':
  - type: text
    content: 'Grind some of it to powder and place it in front of the ark of the covenant law in the tent of meeting, where I will meet with you. It shall be most holy to you. '
  '37':
  - type: text
    content: 'Do not make any incense with this formula for yourselves; consider it holy to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '38':
  - type: text
    content: Whoever makes incense like it to enjoy its fragrance must be cut off from their people.”
  '4':
  - type: text
    content: 'Make two gold rings for the altar below the molding—two on each of the opposite sides—to hold the poles used to carry it. '
  '5':
  - type: text
    content: 'Make the poles of acacia wood and overlay them with gold. '
  '6':
  - type: text
    content: Put the altar in front of the curtain that shields the ark of the covenant law—before the atonement cover that is over the tablets of the covenant law—where I will meet with you.
  '7':
  - type: text
    content: '“Aaron must burn fragrant incense on the altar every morning when he tends the lamps. '
  '8':
  - type: text
    content: 'He must burn incense again when he lights the lamps at twilight so incense will burn regularly before the '
  - type: text
    content: Lord
  - type: text
    content: ' for the generations to come. '
  '9':
  - type: text
    content: 'Do not offer on this altar any other incense or any burnt offering or grain offering, and do not pour a drink offering on it. '
