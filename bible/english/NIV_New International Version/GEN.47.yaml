document_id: GEN.47,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Joseph went and told Pharaoh, “My father and brothers, with their flocks and herds and everything they own, have come from the land of Canaan and are now in Goshen.” '
  '10':
  - type: text
    content: Then Jacob blessed
  - type: note
    content: Or said farewell to
  - type: text
    content: ' Pharaoh and went out from his presence.'
  '11':
  - type: text
    content: 'So Joseph settled his father and his brothers in Egypt and gave them property in the best part of the land, the district of Rameses, as Pharaoh directed. '
  '12':
  - type: text
    content: Joseph also provided his father and his brothers and all his father’s household with food, according to the number of their children.
  - type: heading
    content: Joseph and the Famine
  '13':
  - type: text
    content: 'There was no food, however, in the whole region because the famine was severe; both Egypt and Canaan wasted away because of the famine. '
  '14':
  - type: text
    content: 'Joseph collected all the money that was to be found in Egypt and Canaan in payment for the grain they were buying, and he brought it to Pharaoh’s palace. '
  '15':
  - type: text
    content: When the money of the people of Egypt and Canaan was gone, all Egypt came to Joseph and said, “Give us food. Why should we die before your eyes? Our money is all gone.”
  '16':
  - type: text
    content: '“Then bring your livestock,” said Joseph. “I will sell you food in exchange for your livestock, since your money is gone.” '
  '17':
  - type: text
    content: So they brought their livestock to Joseph, and he gave them food in exchange for their horses, their sheep and goats, their cattle and donkeys. And he brought them through that year with food in exchange for all their livestock.
  '18':
  - type: text
    content: 'When that year was over, they came to him the following year and said, “We cannot hide from our lord the fact that since our money is gone and our livestock belongs to you, there is nothing left for our lord except our bodies and our land. '
  '19':
  - type: text
    content: Why should we perish before your eyes—we and our land as well? Buy us and our land in exchange for food, and we with our land will be in bondage to Pharaoh. Give us seed so that we may live and not die, and that the land may not become desolate.”
  '2':
  - type: text
    content: He chose five of his brothers and presented them before Pharaoh.
  '20':
  - type: text
    content: 'So Joseph bought all the land in Egypt for Pharaoh. The Egyptians, one and all, sold their fields, because the famine was too severe for them. The land became Pharaoh’s, '
  '21':
  - type: text
    content: and Joseph reduced the people to servitude,
  - type: note
    content: Samaritan Pentateuch and Septuagint (see also Vulgate); Masoretic Text and he moved the people into the cities
  - type: text
    content: ' from one end of Egypt to the other. '
  '22':
  - type: text
    content: However, he did not buy the land of the priests, because they received a regular allotment from Pharaoh and had food enough from the allotment Pharaoh gave them. That is why they did not sell their land.
  '23':
  - type: text
    content: 'Joseph said to the people, “Now that I have bought you and your land today for Pharaoh, here is seed for you so you can plant the ground. '
  '24':
  - type: text
    content: But when the crop comes in, give a fifth of it to Pharaoh. The other four-fifths you may keep as seed for the fields and as food for yourselves and your households and your children.”
  '25':
  - type: text
    content: “You have saved our lives,” they said. “May we find favor in the eyes of our lord; we will be in bondage to Pharaoh.”
  '26':
  - type: text
    content: So Joseph established it as a law concerning land in Egypt—still in force today—that a fifth of the produce belongs to Pharaoh. It was only the land of the priests that did not become Pharaoh’s.
  '27':
  - type: text
    content: Now the Israelites settled in Egypt in the region of Goshen. They acquired property there and were fruitful and increased greatly in number.
  '28':
  - type: text
    content: 'Jacob lived in Egypt seventeen years, and the years of his life were a hundred and forty-seven. '
  '29':
  - type: text
    content: 'When the time drew near for Israel to die, he called for his son Joseph and said to him, “If I have found favor in your eyes, put your hand under my thigh and promise that you will show me kindness and faithfulness. Do not bury me in Egypt, '
  '3':
  - type: text
    content: Pharaoh asked the brothers, “What is your occupation?”
  - type: text
    content: '“Your servants are shepherds,” they replied to Pharaoh, “just as our fathers were.” '
  '30':
  - type: text
    content: but when I rest with my fathers, carry me out of Egypt and bury me where they are buried.”
  - type: text
    content: “I will do as you say,” he said.
  '31':
  - type: text
    content: “Swear to me,” he said. Then Joseph swore to him, and Israel worshiped as he leaned on the top of his staff.
  - type: note
    content: Or Israel bowed down at the head of his bed
  '4':
  - type: text
    content: They also said to him, “We have come to live here for a while, because the famine is severe in Canaan and your servants’ flocks have no pasture. So now, please let your servants settle in Goshen.”
  '5':
  - type: text
    content: 'Pharaoh said to Joseph, “Your father and your brothers have come to you, '
  '6':
  - type: text
    content: and the land of Egypt is before you; settle your father and your brothers in the best part of the land. Let them live in Goshen. And if you know of any among them with special ability, put them in charge of my own livestock.”
  '7':
  - type: text
    content: Then Joseph brought his father Jacob in and presented him before Pharaoh. After Jacob blessed
  - type: note
    content: Or greeted
  - type: text
    content: ' Pharaoh, '
  '8':
  - type: text
    content: Pharaoh asked him, “How old are you?”
  '9':
  - type: text
    content: 'And Jacob said to Pharaoh, “The years of my pilgrimage are a hundred and thirty. My years have been few and difficult, and they do not equal the years of the pilgrimage of my fathers.” '
