document_id: ECC.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Oppression, Toil, Friendlessness
  - type: text
    content: 'Again I looked and saw all the oppression that was taking place under the sun:'
  - type: text
    content: I saw the tears of the oppressed—
  - type: text
    content: and they have no comforter;
  - type: text
    content: power was on the side of their oppressors—
  - type: text
    content: and they have no comforter.
  '10':
  - type: text
    content: If either of them falls down,
  - type: text
    content: one can help the other up.
  - type: text
    content: But pity anyone who falls
  - type: text
    content: and has no one to help them up.
  '11':
  - type: text
    content: Also, if two lie down together, they will keep warm.
  - type: text
    content: But how can one keep warm alone?
  '12':
  - type: text
    content: Though one may be overpowered,
  - type: text
    content: two can defend themselves.
  - type: text
    content: A cord of three strands is not quickly broken.
  - type: heading
    content: Advancement Is Meaningless
  '13':
  - type: text
    content: 'Better a poor but wise youth than an old but foolish king who no longer knows how to heed a warning. '
  '14':
  - type: text
    content: 'The youth may have come from prison to the kingship, or he may have been born in poverty within his kingdom. '
  '15':
  - type: text
    content: 'I saw that all who lived and walked under the sun followed the youth, the king’s successor. '
  '16':
  - type: text
    content: There was no end to all the people who were before them. But those who came later were not pleased with the successor. This too is meaningless, a chasing after the wind.
  '2':
  - type: text
    content: And I declared that the dead,
  - type: text
    content: who had already died,
  - type: text
    content: are happier than the living,
  - type: text
    content: who are still alive.
  '3':
  - type: text
    content: But better than both
  - type: text
    content: is the one who has never been born,
  - type: text
    content: who has not seen the evil
  - type: text
    content: that is done under the sun.
  '4':
  - type: text
    content: And I saw that all toil and all achievement spring from one person’s envy of another. This too is meaningless, a chasing after the wind.
  '5':
  - type: text
    content: Fools fold their hands
  - type: text
    content: and ruin themselves.
  '6':
  - type: text
    content: Better one handful with tranquillity
  - type: text
    content: than two handfuls with toil
  - type: text
    content: and chasing after the wind.
  '7':
  - type: text
    content: 'Again I saw something meaningless under the sun:'
  '8':
  - type: text
    content: There was a man all alone;
  - type: text
    content: he had neither son nor brother.
  - type: text
    content: There was no end to his toil,
  - type: text
    content: yet his eyes were not content with his wealth.
  - type: text
    content: “For whom am I toiling,” he asked,
  - type: text
    content: “and why am I depriving myself of enjoyment?”
  - type: text
    content: This too is meaningless—
  - type: text
    content: a miserable business!
  '9':
  - type: text
    content: Two are better than one,
  - type: text
    content: 'because they have a good return for their labor:'
