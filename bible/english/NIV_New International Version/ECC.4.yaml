document_id: ECC.4
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Oppression, Toil, Friendlessness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Again I looked and saw all the oppression that was taking place under the sun:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I saw the tears of the oppressed—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they have no comforter;
- type: usfm
  marker: q1
  children:
  - type: text
    text: power was on the side of their oppressors—
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they have no comforter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: And I declared that the dead,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who had already died,
- type: usfm
  marker: q1
  children:
  - type: text
    text: are happier than the living,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who are still alive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But better than both
- type: usfm
  marker: q2
  children:
  - type: text
    text: is the one who has never been born,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who has not seen the evil
- type: usfm
  marker: q2
  children:
  - type: text
    text: that is done under the sun.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And I saw that all toil and all achievement spring from one person’s envy of another. This too is meaningless, a chasing after the wind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fools fold their hands
- type: usfm
  marker: q2
  children:
  - type: text
    text: and ruin themselves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Better one handful with tranquillity
- type: usfm
  marker: q2
  children:
  - type: text
    text: than two handfuls with toil
- type: usfm
  marker: q2
  children:
  - type: text
    text: and chasing after the wind.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Again I saw something meaningless under the sun:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: There was a man all alone;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he had neither son nor brother.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There was no end to his toil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet his eyes were not content with his wealth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “For whom am I toiling,” he asked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “and why am I depriving myself of enjoyment?”
- type: usfm
  marker: q1
  children:
  - type: text
    text: This too is meaningless—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a miserable business!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Two are better than one,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'because they have a good return for their labor:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: If either of them falls down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: one can help the other up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But pity anyone who falls
- type: usfm
  marker: q2
  children:
  - type: text
    text: and has no one to help them up.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Also, if two lie down together, they will keep warm.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But how can one keep warm alone?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Though one may be overpowered,
- type: usfm
  marker: q2
  children:
  - type: text
    text: two can defend themselves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cord of three strands is not quickly broken.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Advancement Is Meaningless
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Better a poor but wise youth than an old but foolish king who no longer knows how to heed a warning. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The youth may have come from prison to the kingship, or he may have been born in poverty within his kingdom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I saw that all who lived and walked under the sun followed the youth, the king’s successor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: There was no end to all the people who were before them. But those who came later were not pleased with the successor. This too is meaningless, a chasing after the wind.
