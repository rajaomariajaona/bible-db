document_id: ROM.16,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Personal Greetings
  - type: text
    content: I commend to you our sister Phoebe, a deacon
  - type: note
    content: Or servant
  - type: note
    content: The word deacon refers here to a Christian designated to serve with the overseers/elders of the church in a variety of ways; similarly in Phil. 1:1 and 1 Tim. 3:8,12.
  - type: text
    content: ' of the church in Cenchreae. '
  '10':
  - type: text
    content: Greet Apelles, whose fidelity to Christ has stood the test.
  - type: text
    content: Greet those who belong to the household of Aristobulus.
  '11':
  - type: text
    content: Greet Herodion, my fellow Jew.
  - type: text
    content: Greet those in the household of Narcissus who are in the Lord.
  '12':
  - type: text
    content: Greet Tryphena and Tryphosa, those women who work hard in the Lord.
  - type: text
    content: Greet my dear friend Persis, another woman who has worked very hard in the Lord.
  '13':
  - type: text
    content: Greet Rufus, chosen in the Lord, and his mother, who has been a mother to me, too.
  '14':
  - type: text
    content: Greet Asyncritus, Phlegon, Hermes, Patrobas, Hermas and the other brothers and sisters with them.
  '15':
  - type: text
    content: Greet Philologus, Julia, Nereus and his sister, and Olympas and all the Lord’s people who are with them.
  '16':
  - type: text
    content: Greet one another with a holy kiss.
  - type: text
    content: All the churches of Christ send greetings.
  '17':
  - type: text
    content: 'I urge you, brothers and sisters, to watch out for those who cause divisions and put obstacles in your way that are contrary to the teaching you have learned. Keep away from them. '
  '18':
  - type: text
    content: 'For such people are not serving our Lord Christ, but their own appetites. By smooth talk and flattery they deceive the minds of naive people. '
  '19':
  - type: text
    content: Everyone has heard about your obedience, so I rejoice because of you; but I want you to be wise about what is good, and innocent about what is evil.
  '2':
  - type: text
    content: I ask you to receive her in the Lord in a way worthy of his people and to give her any help she may need from you, for she has been the benefactor of many people, including me.
  '20':
  - type: text
    content: The God of peace will soon crush Satan under your feet.
  - type: text
    content: The grace of our Lord Jesus be with you.
  '21':
  - type: text
    content: Timothy, my co-worker, sends his greetings to you, as do Lucius, Jason and Sosipater, my fellow Jews.
  '22':
  - type: text
    content: I, Tertius, who wrote down this letter, greet you in the Lord.
  '23':
  - type: text
    content: Gaius, whose hospitality I and the whole church here enjoy, sends you his greetings.
  - type: text
    content: 'Erastus, who is the city’s director of public works, and our brother Quartus send you their greetings. '
  '24':
  - type: note
    content: Some manuscripts include here May the grace of our Lord Jesus Christ be with all of you. Amen.
  '25':
  - type: text
    content: 'Now to him who is able to establish you in accordance with my gospel, the message I proclaim about Jesus Christ, in keeping with the revelation of the mystery hidden for long ages past, '
  '26':
  - type: text
    content: but now revealed and made known through the prophetic writings by the command of the eternal God, so that all the Gentiles might come to the obedience that comes from
  - type: note
    content: Or that is
  - type: text
    content: ' faith— '
  '27':
  - type: text
    content: to the only wise God be glory forever through Jesus Christ! Amen.
  '3':
  - type: text
    content: Greet Priscilla
  - type: note
    content: Greek Prisca, a variant of Priscilla
  - type: text
    content: ' and Aquila, my co-workers in Christ Jesus. '
  '4':
  - type: text
    content: They risked their lives for me. Not only I but all the churches of the Gentiles are grateful to them.
  '5':
  - type: text
    content: Greet also the church that meets at their house.
  - type: text
    content: Greet my dear friend Epenetus, who was the first convert to Christ in the province of Asia.
  '6':
  - type: text
    content: Greet Mary, who worked very hard for you.
  '7':
  - type: text
    content: Greet Andronicus and Junia, my fellow Jews who have been in prison with me. They are outstanding among
  - type: note
    content: Or are esteemed by
  - type: text
    content: ' the apostles, and they were in Christ before I was.'
  '8':
  - type: text
    content: Greet Ampliatus, my dear friend in the Lord.
  '9':
  - type: text
    content: Greet Urbanus, our co-worker in Christ, and my dear friend Stachys.
