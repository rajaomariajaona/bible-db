document_id: ROM.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Personal Greetings
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I commend to you our sister Phoebe, a deacon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: servant
    marker-yv: yv-n
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The word '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'deacon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: refers here to a Christian designated to serve with the overseers/elders of the church in a variety of ways; similarly in Phil. 1:1 and 1 Tim. 3:8,12.
    marker-yv: yv-n
  - type: text
    text: ' of the church in Cenchreae. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I ask you to receive her in the Lord in a way worthy of his people and to give her any help she may need from you, for she has been the benefactor of many people, including me.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Greet Priscilla
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Prisca
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Priscilla
    marker-yv: yv-n
  - type: text
    text: ' and Aquila, my co-workers in Christ Jesus. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They risked their lives for me. Not only I but all the churches of the Gentiles are grateful to them.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Greet also the church that meets at their house.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Greet my dear friend Epenetus, who was the first convert to Christ in the province of Asia.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Greet Mary, who worked very hard for you.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Greet Andronicus and Junia, my fellow Jews who have been in prison with me. They are outstanding among
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: are esteemed by
    marker-yv: yv-n
  - type: text
    text: ' the apostles, and they were in Christ before I was.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Greet Ampliatus, my dear friend in the Lord.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Greet Urbanus, our co-worker in Christ, and my dear friend Stachys.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Greet Apelles, whose fidelity to Christ has stood the test.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Greet those who belong to the household of Aristobulus.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Greet Herodion, my fellow Jew.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Greet those in the household of Narcissus who are in the Lord.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Greet Tryphena and Tryphosa, those women who work hard in the Lord.
- type: usfm
  marker: li1
  children:
  - type: text
    text: Greet my dear friend Persis, another woman who has worked very hard in the Lord.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Greet Rufus, chosen in the Lord, and his mother, who has been a mother to me, too.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Greet Asyncritus, Phlegon, Hermes, Patrobas, Hermas and the other brothers and sisters with them.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Greet Philologus, Julia, Nereus and his sister, and Olympas and all the Lord’s people who are with them.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Greet one another with a holy kiss.
- type: usfm
  marker: li1
  children:
  - type: text
    text: All the churches of Christ send greetings.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I urge you, brothers and sisters, to watch out for those who cause divisions and put obstacles in your way that are contrary to the teaching you have learned. Keep away from them. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'For such people are not serving our Lord Christ, but their own appetites. By smooth talk and flattery they deceive the minds of naive people. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Everyone has heard about your obedience, so I rejoice because of you; but I want you to be wise about what is good, and innocent about what is evil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The God of peace will soon crush Satan under your feet.
- type: usfm
  marker: p
  children:
  - type: text
    text: The grace of our Lord Jesus be with you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Timothy, my co-worker, sends his greetings to you, as do Lucius, Jason and Sosipater, my fellow Jews.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: I, Tertius, who wrote down this letter, greet you in the Lord.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Gaius, whose hospitality I and the whole church here enjoy, sends you his greetings.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Erastus, who is the city’s director of public works, and our brother Quartus send you their greetings. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '[24]'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts include here '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: May the grace of our Lord Jesus Christ be with all of you. Amen.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Now to him who is able to establish you in accordance with my gospel, the message I proclaim about Jesus Christ, in keeping with the revelation of the mystery hidden for long ages past, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: but now revealed and made known through the prophetic writings by the command of the eternal God, so that all the Gentiles might come to the obedience that comes from
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: that is
    marker-yv: yv-n
  - type: text
    text: ' faith— '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: to the only wise God be glory forever through Jesus Christ! Amen.
