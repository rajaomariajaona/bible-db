document_id: EZK.7,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The End Has Come
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: “ ‘See, the day!
  - type: text
    content: See, it comes!
  - type: text
    content: Doom has burst forth,
  - type: text
    content: the rod has budded,
  - type: text
    content: arrogance has blossomed!
  '11':
  - type: text
    content: Violence has arisen,
  - type: note
    content: Or The violent one has become
  - type: text
    content: a rod to punish the wicked.
  - type: text
    content: None of the people will be left,
  - type: text
    content: none of that crowd—
  - type: text
    content: none of their wealth,
  - type: text
    content: nothing of value.
  '12':
  - type: text
    content: The time has come!
  - type: text
    content: The day has arrived!
  - type: text
    content: Let not the buyer rejoice
  - type: text
    content: nor the seller grieve,
  - type: text
    content: for my wrath is on the whole crowd.
  '13':
  - type: text
    content: The seller will not recover
  - type: text
    content: the property that was sold—
  - type: text
    content: as long as both buyer and seller live.
  - type: text
    content: For the vision concerning the whole crowd
  - type: text
    content: will not be reversed.
  - type: text
    content: Because of their sins, not one of them
  - type: text
    content: will preserve their life.
  '14':
  - type: text
    content: “ ‘They have blown the trumpet,
  - type: text
    content: they have made all things ready,
  - type: text
    content: but no one will go into battle,
  - type: text
    content: for my wrath is on the whole crowd.
  '15':
  - type: text
    content: Outside is the sword;
  - type: text
    content: inside are plague and famine.
  - type: text
    content: Those in the country
  - type: text
    content: will die by the sword;
  - type: text
    content: those in the city
  - type: text
    content: will be devoured by famine and plague.
  '16':
  - type: text
    content: The fugitives who escape
  - type: text
    content: will flee to the mountains.
  - type: text
    content: Like doves of the valleys,
  - type: text
    content: they will all moan,
  - type: text
    content: each for their own sins.
  '17':
  - type: text
    content: Every hand will go limp;
  - type: text
    content: every leg will be wet with urine.
  '18':
  - type: text
    content: They will put on sackcloth
  - type: text
    content: and be clothed with terror.
  - type: text
    content: Every face will be covered with shame,
  - type: text
    content: and every head will be shaved.
  '19':
  - type: text
    content: “ ‘They will throw their silver into the streets,
  - type: text
    content: and their gold will be treated as a thing unclean.
  - type: text
    content: Their silver and gold
  - type: text
    content: will not be able to deliver them
  - type: text
    content: 'in the day of the '
  - type: text
    content: Lord
  - type: text
    content: ’s wrath.
  - type: text
    content: It will not satisfy their hunger
  - type: text
    content: or fill their stomachs,
  - type: text
    content: for it has caused them to stumble into sin.
  '2':
  - type: text
    content: '“Son of man, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says to the land of Israel:'
  - type: text
    content: “ ‘The end! The end has come
  - type: text
    content: upon the four corners of the land!
  '20':
  - type: text
    content: They took pride in their beautiful jewelry
  - type: text
    content: and used it to make their detestable idols.
  - type: text
    content: They made it into vile images;
  - type: text
    content: therefore I will make it a thing unclean for them.
  '21':
  - type: text
    content: I will give their wealth as plunder to foreigners
  - type: text
    content: and as loot to the wicked of the earth,
  - type: text
    content: who will defile it.
  '22':
  - type: text
    content: I will turn my face away from the people,
  - type: text
    content: and robbers will desecrate the place I treasure.
  - type: text
    content: They will enter it
  - type: text
    content: and will defile it.
  '23':
  - type: text
    content: “ ‘Prepare chains!
  - type: text
    content: For the land is full of bloodshed,
  - type: text
    content: and the city is full of violence.
  '24':
  - type: text
    content: I will bring the most wicked of nations
  - type: text
    content: to take possession of their houses.
  - type: text
    content: I will put an end to the pride of the mighty,
  - type: text
    content: and their sanctuaries will be desecrated.
  '25':
  - type: text
    content: When terror comes,
  - type: text
    content: they will seek peace in vain.
  '26':
  - type: text
    content: Calamity upon calamity will come,
  - type: text
    content: and rumor upon rumor.
  - type: text
    content: They will go searching for a vision from the prophet,
  - type: text
    content: priestly instruction in the law will cease,
  - type: text
    content: the counsel of the elders will come to an end.
  '27':
  - type: text
    content: The king will mourn,
  - type: text
    content: the prince will be clothed with despair,
  - type: text
    content: and the hands of the people of the land will tremble.
  - type: text
    content: I will deal with them according to their conduct,
  - type: text
    content: and by their own standards I will judge them.
  - type: text
    content: '“ ‘Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  '3':
  - type: text
    content: The end is now upon you,
  - type: text
    content: and I will unleash my anger against you.
  - type: text
    content: I will judge you according to your conduct
  - type: text
    content: and repay you for all your detestable practices.
  '4':
  - type: text
    content: I will not look on you with pity;
  - type: text
    content: I will not spare you.
  - type: text
    content: I will surely repay you for your conduct
  - type: text
    content: and for the detestable practices among you.
  - type: text
    content: '“ ‘Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .’
  '5':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘Disaster! Unheard-of
  - type: note
    content: Most Hebrew manuscripts; some Hebrew manuscripts and Syriac Disaster after
  - type: text
    content: ' disaster!'
  - type: text
    content: See, it comes!
  '6':
  - type: text
    content: The end has come!
  - type: text
    content: The end has come!
  - type: text
    content: It has roused itself against you.
  - type: text
    content: See, it comes!
  '7':
  - type: text
    content: Doom has come upon you,
  - type: text
    content: upon you who dwell in the land.
  - type: text
    content: The time has come! The day is near!
  - type: text
    content: There is panic, not joy, on the mountains.
  '8':
  - type: text
    content: I am about to pour out my wrath on you
  - type: text
    content: and spend my anger against you.
  - type: text
    content: I will judge you according to your conduct
  - type: text
    content: and repay you for all your detestable practices.
  '9':
  - type: text
    content: I will not look on you with pity;
  - type: text
    content: I will not spare you.
  - type: text
    content: I will repay you for your conduct
  - type: text
    content: and for the detestable practices among you.
  - type: text
    content: '“ ‘Then you will know that it is I the '
  - type: text
    content: Lord
  - type: text
    content: ' who strikes you.'
