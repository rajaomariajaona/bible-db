- type: usfm
  marker: s1
  children:
  - type: text
    text: The End Has Come
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came to me: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says to the land of Israel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘The end! The end has come
- type: usfm
  marker: q2
  children:
  - type: text
    text: upon the four corners of the land!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The end is now upon you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will unleash my anger against you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will judge you according to your conduct
- type: usfm
  marker: q2
  children:
  - type: text
    text: and repay you for all your detestable practices.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I will not look on you with pity;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will not spare you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will surely repay you for your conduct
- type: usfm
  marker: q2
  children:
  - type: text
    text: and for the detestable practices among you.
- type: usfm
  marker: m
  children:
  - type: text
    text: '“ ‘Then you will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘Disaster! Unheard-of
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Most Hebrew manuscripts; some Hebrew manuscripts and Syriac '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Disaster after
    marker-yv: yv-n
  - type: text
    text: ' disaster!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: See, it comes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The end has come!
- type: usfm
  marker: q2
  children:
  - type: text
    text: The end has come!
- type: usfm
  marker: q1
  children:
  - type: text
    text: It has roused itself against you.
- type: usfm
  marker: q2
  children:
  - type: text
    text: See, it comes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Doom has come upon you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: upon you who dwell in the land.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The time has come! The day is near!
- type: usfm
  marker: q2
  children:
  - type: text
    text: There is panic, not joy, on the mountains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I am about to pour out my wrath on you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and spend my anger against you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will judge you according to your conduct
- type: usfm
  marker: q2
  children:
  - type: text
    text: and repay you for all your detestable practices.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I will not look on you with pity;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will not spare you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will repay you for your conduct
- type: usfm
  marker: q2
  children:
  - type: text
    text: and for the detestable practices among you.
- type: usfm
  marker: m
  children:
  - type: text
    text: '“ ‘Then you will know that it is I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' who strikes you.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “ ‘See, the day!
- type: usfm
  marker: q2
  children:
  - type: text
    text: See, it comes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Doom has burst forth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the rod has budded,
- type: usfm
  marker: q2
  children:
  - type: text
    text: arrogance has blossomed!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Violence has arisen,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: The violent one has become
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: a rod to punish the wicked.
- type: usfm
  marker: q1
  children:
  - type: text
    text: None of the people will be left,
- type: usfm
  marker: q2
  children:
  - type: text
    text: none of that crowd—
- type: usfm
  marker: q1
  children:
  - type: text
    text: none of their wealth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nothing of value.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The time has come!
- type: usfm
  marker: q2
  children:
  - type: text
    text: The day has arrived!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let not the buyer rejoice
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor the seller grieve,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for my wrath is on the whole crowd.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The seller will not recover
- type: usfm
  marker: q2
  children:
  - type: text
    text: the property that was sold—
- type: usfm
  marker: q2
  children:
  - type: text
    text: as long as both buyer and seller live.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the vision concerning the whole crowd
- type: usfm
  marker: q2
  children:
  - type: text
    text: will not be reversed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of their sins, not one of them
- type: usfm
  marker: q2
  children:
  - type: text
    text: will preserve their life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “ ‘They have blown the trumpet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they have made all things ready,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but no one will go into battle,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for my wrath is on the whole crowd.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Outside is the sword;
- type: usfm
  marker: q2
  children:
  - type: text
    text: inside are plague and famine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those in the country
- type: usfm
  marker: q2
  children:
  - type: text
    text: will die by the sword;
- type: usfm
  marker: q1
  children:
  - type: text
    text: those in the city
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be devoured by famine and plague.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The fugitives who escape
- type: usfm
  marker: q2
  children:
  - type: text
    text: will flee to the mountains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Like doves of the valleys,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will all moan,
- type: usfm
  marker: q2
  children:
  - type: text
    text: each for their own sins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Every hand will go limp;
- type: usfm
  marker: q2
  children:
  - type: text
    text: every leg will be wet with urine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: They will put on sackcloth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and be clothed with terror.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Every face will be covered with shame,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and every head will be shaved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “ ‘They will throw their silver into the streets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their gold will be treated as a thing unclean.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their silver and gold
- type: usfm
  marker: q2
  children:
  - type: text
    text: will not be able to deliver them
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'in the day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s wrath.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It will not satisfy their hunger
- type: usfm
  marker: q2
  children:
  - type: text
    text: or fill their stomachs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for it has caused them to stumble into sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: They took pride in their beautiful jewelry
- type: usfm
  marker: q2
  children:
  - type: text
    text: and used it to make their detestable idols.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They made it into vile images;
- type: usfm
  marker: q2
  children:
  - type: text
    text: therefore I will make it a thing unclean for them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: I will give their wealth as plunder to foreigners
- type: usfm
  marker: q2
  children:
  - type: text
    text: and as loot to the wicked of the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who will defile it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: I will turn my face away from the people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and robbers will desecrate the place I treasure.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will enter it
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will defile it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “ ‘Prepare chains!
- type: usfm
  marker: q2
  children:
  - type: text
    text: For the land is full of bloodshed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the city is full of violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: I will bring the most wicked of nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: to take possession of their houses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will put an end to the pride of the mighty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their sanctuaries will be desecrated.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: When terror comes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will seek peace in vain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Calamity upon calamity will come,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and rumor upon rumor.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will go searching for a vision from the prophet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: priestly instruction in the law will cease,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the counsel of the elders will come to an end.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The king will mourn,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the prince will be clothed with despair,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the hands of the people of the land will tremble.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will deal with them according to their conduct,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and by their own standards I will judge them.
- type: usfm
  marker: m
  children:
  - type: text
    text: '“ ‘Then they will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .’ ”
