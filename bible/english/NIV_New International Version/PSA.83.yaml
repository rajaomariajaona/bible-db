document_id: PSA.83
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 83
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 83:1-18 is numbered 83:2-19.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A song. A psalm of Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O God, do not remain silent;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not turn a deaf ear,
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not stand aloof, O God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: See how your enemies growl,
- type: usfm
  marker: q2
  children:
  - type: text
    text: how your foes rear their heads.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: With cunning they conspire against your people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they plot against those you cherish.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Come,” they say, “let us destroy them as a nation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that Israel’s name is remembered no more.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: With one mind they plot together;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they form an alliance against you—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: the tents of Edom and the Ishmaelites,
- type: usfm
  marker: q2
  children:
  - type: text
    text: of Moab and the Hagrites,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Byblos, Ammon and Amalek,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Philistia, with the people of Tyre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Even Assyria has joined them
- type: usfm
  marker: q2
  children:
  - type: text
    text: to reinforce Lot’s descendants.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '83:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew has '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Selah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (a word of uncertain meaning) here.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Do to them as you did to Midian,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as you did to Sisera and Jabin at the river Kishon,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: who perished at Endor
- type: usfm
  marker: q2
  children:
  - type: text
    text: and became like dung on the ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Make their nobles like Oreb and Zeeb,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all their princes like Zebah and Zalmunna,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: who said, “Let us take possession
- type: usfm
  marker: q2
  children:
  - type: text
    text: of the pasturelands of God.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Make them like tumbleweed, my God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like chaff before the wind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: As fire consumes the forest
- type: usfm
  marker: q2
  children:
  - type: text
    text: or a flame sets the mountains ablaze,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: so pursue them with your tempest
- type: usfm
  marker: q2
  children:
  - type: text
    text: and terrify them with your storm.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Cover their faces with shame, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that they will seek your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: May they ever be ashamed and dismayed;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may they perish in disgrace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Let them know that you, whose name is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: —
- type: usfm
  marker: q2
  children:
  - type: text
    text: that you alone are the Most High over all the earth.
