document_id: PSA.83,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 83In Hebrew texts 83:1-18 is numbered 83:2-19.
  - type: text
    content: A song. A psalm of Asaph.
  - type: text
    content: O God, do not remain silent;
  - type: text
    content: do not turn a deaf ear,
  - type: text
    content: do not stand aloof, O God.
  '10':
  - type: text
    content: who perished at Endor
  - type: text
    content: and became like dung on the ground.
  '11':
  - type: text
    content: Make their nobles like Oreb and Zeeb,
  - type: text
    content: all their princes like Zebah and Zalmunna,
  '12':
  - type: text
    content: who said, “Let us take possession
  - type: text
    content: of the pasturelands of God.”
  '13':
  - type: text
    content: Make them like tumbleweed, my God,
  - type: text
    content: like chaff before the wind.
  '14':
  - type: text
    content: As fire consumes the forest
  - type: text
    content: or a flame sets the mountains ablaze,
  '15':
  - type: text
    content: so pursue them with your tempest
  - type: text
    content: and terrify them with your storm.
  '16':
  - type: text
    content: 'Cover their faces with shame, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: so that they will seek your name.
  '17':
  - type: text
    content: May they ever be ashamed and dismayed;
  - type: text
    content: may they perish in disgrace.
  '18':
  - type: text
    content: 'Let them know that you, whose name is the '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: text
    content: that you alone are the Most High over all the earth.
  '2':
  - type: text
    content: See how your enemies growl,
  - type: text
    content: how your foes rear their heads.
  '3':
  - type: text
    content: With cunning they conspire against your people;
  - type: text
    content: they plot against those you cherish.
  '4':
  - type: text
    content: “Come,” they say, “let us destroy them as a nation,
  - type: text
    content: so that Israel’s name is remembered no more.”
  '5':
  - type: text
    content: With one mind they plot together;
  - type: text
    content: they form an alliance against you—
  '6':
  - type: text
    content: the tents of Edom and the Ishmaelites,
  - type: text
    content: of Moab and the Hagrites,
  '7':
  - type: text
    content: Byblos, Ammon and Amalek,
  - type: text
    content: Philistia, with the people of Tyre.
  '8':
  - type: text
    content: Even Assyria has joined them
  - type: text
    content: to reinforce Lot’s descendants.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here.
  '9':
  - type: text
    content: Do to them as you did to Midian,
  - type: text
    content: as you did to Sisera and Jabin at the river Kishon,
