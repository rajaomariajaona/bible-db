document_id: 2KI.24,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'During Jehoiakim’s reign, Nebuchadnezzar king of Babylon invaded the land, and Jehoiakim became his vassal for three years. But then he turned against Nebuchadnezzar and rebelled. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time the officers of Nebuchadnezzar king of Babylon advanced on Jerusalem and laid siege to it, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Nebuchadnezzar himself came up to the city while his officers were besieging it. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehoiachin king of Judah, his mother, his attendants, his nobles and his officials all surrendered to him.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the eighth year of the reign of the king of Babylon, he took Jehoiachin prisoner. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had declared, Nebuchadnezzar removed the treasures from the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and from the royal palace, and cut up the gold articles that Solomon king of Israel had made for the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He carried all Jerusalem into exile: all the officers and fighting men, and all the skilled workers and artisans—a total of ten thousand. Only the poorest people of the land were left.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nebuchadnezzar took Jehoiachin captive to Babylon. He also took from Jerusalem to Babylon the king’s mother, his wives, his officials and the prominent people of the land. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king of Babylon also deported to Babylon the entire force of seven thousand fighting men, strong and fit for war, and a thousand skilled workers and artisans. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He made Mattaniah, Jehoiachin’s uncle, king in his place and changed his name to Zedekiah.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Zedekiah King of Judah
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zedekiah was twenty-one years old when he became king, and he reigned in Jerusalem eleven years. His mother’s name was Hamutal daughter of Jeremiah; she was from Libnah. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He did evil in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', just as Jehoiakim had done. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sent Babylonian,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldean
      marker-yv: yv-n
    - type: text
      text: ' Aramean, Moabite and Ammonite raiders against him to destroy Judah, in accordance with the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' proclaimed by his servants the prophets. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It was because of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger that all this happened to Jerusalem and Judah, and in the end he thrust them from his presence.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Fall of Jerusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now Zedekiah rebelled against the king of Babylon.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Surely these things happened to Judah according to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s command, in order to remove them from his presence because of the sins of Manasseh and all he had done, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'including the shedding of innocent blood. For he had filled Jerusalem with innocent blood, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was not willing to forgive.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As for the other events of Jehoiakim’s reign, and all he did, are they not written in the book of the annals of the kings of Judah? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehoiakim rested with his ancestors. And Jehoiachin his son succeeded him as king.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The king of Egypt did not march out from his own country again, because the king of Babylon had taken all his territory, from the Wadi of Egypt to the Euphrates River.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehoiachin King of Judah
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoiachin was eighteen years old when he became king, and he reigned in Jerusalem three months. His mother’s name was Nehushta daughter of Elnathan; she was from Jerusalem. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He did evil in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', just as his father had done.'
