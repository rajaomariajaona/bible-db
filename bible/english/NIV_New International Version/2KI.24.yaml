document_id: 2KI.24,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'During Jehoiakim’s reign, Nebuchadnezzar king of Babylon invaded the land, and Jehoiakim became his vassal for three years. But then he turned against Nebuchadnezzar and rebelled. '
  '10':
  - type: text
    content: 'At that time the officers of Nebuchadnezzar king of Babylon advanced on Jerusalem and laid siege to it, '
  '11':
  - type: text
    content: 'and Nebuchadnezzar himself came up to the city while his officers were besieging it. '
  '12':
  - type: text
    content: Jehoiachin king of Judah, his mother, his attendants, his nobles and his officials all surrendered to him.
  - type: text
    content: 'In the eighth year of the reign of the king of Babylon, he took Jehoiachin prisoner. '
  '13':
  - type: text
    content: 'As the '
  - type: text
    content: Lord
  - type: text
    content: ' had declared, Nebuchadnezzar removed the treasures from the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and from the royal palace, and cut up the gold articles that Solomon king of Israel had made for the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'He carried all Jerusalem into exile: all the officers and fighting men, and all the skilled workers and artisans—a total of ten thousand. Only the poorest people of the land were left.'
  '15':
  - type: text
    content: 'Nebuchadnezzar took Jehoiachin captive to Babylon. He also took from Jerusalem to Babylon the king’s mother, his wives, his officials and the prominent people of the land. '
  '16':
  - type: text
    content: 'The king of Babylon also deported to Babylon the entire force of seven thousand fighting men, strong and fit for war, and a thousand skilled workers and artisans. '
  '17':
  - type: text
    content: He made Mattaniah, Jehoiachin’s uncle, king in his place and changed his name to Zedekiah.
  - type: heading
    content: Zedekiah King of Judah
  '18':
  - type: text
    content: 'Zedekiah was twenty-one years old when he became king, and he reigned in Jerusalem eleven years. His mother’s name was Hamutal daughter of Jeremiah; she was from Libnah. '
  '19':
  - type: text
    content: 'He did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', just as Jehoiakim had done. '
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' sent Babylonian,'
  - type: note
    content: Or Chaldean
  - type: text
    content: ' Aramean, Moabite and Ammonite raiders against him to destroy Judah, in accordance with the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' proclaimed by his servants the prophets. '
  '20':
  - type: text
    content: 'It was because of the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger that all this happened to Jerusalem and Judah, and in the end he thrust them from his presence.
  - type: heading
    content: The Fall of Jerusalem
  - type: text
    content: Now Zedekiah rebelled against the king of Babylon.
  '3':
  - type: text
    content: 'Surely these things happened to Judah according to the '
  - type: text
    content: Lord
  - type: text
    content: '’s command, in order to remove them from his presence because of the sins of Manasseh and all he had done, '
  '4':
  - type: text
    content: 'including the shedding of innocent blood. For he had filled Jerusalem with innocent blood, and the '
  - type: text
    content: Lord
  - type: text
    content: ' was not willing to forgive.'
  '5':
  - type: text
    content: 'As for the other events of Jehoiakim’s reign, and all he did, are they not written in the book of the annals of the kings of Judah? '
  '6':
  - type: text
    content: Jehoiakim rested with his ancestors. And Jehoiachin his son succeeded him as king.
  '7':
  - type: text
    content: The king of Egypt did not march out from his own country again, because the king of Babylon had taken all his territory, from the Wadi of Egypt to the Euphrates River.
  - type: heading
    content: Jehoiachin King of Judah
  '8':
  - type: text
    content: 'Jehoiachin was eighteen years old when he became king, and he reigned in Jerusalem three months. His mother’s name was Nehushta daughter of Elnathan; she was from Jerusalem. '
  '9':
  - type: text
    content: 'He did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', just as his father had done.'
