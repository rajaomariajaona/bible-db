document_id: JHN.2,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Changes Water Into Wine
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the third day a wedding took place at Cana in Galilee. Jesus’ mother was there, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and said, “Everyone brings out the choice wine first and then the cheaper wine after the guests have had too much to drink; but you have saved the best till now.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: What Jesus did here in Cana of Galilee was the first of the signs through which he revealed his glory; and his disciples believed in him.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After this he went down to Capernaum with his mother and brothers and his disciples. There they stayed for a few days.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Clears the Temple Courts
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When it was almost time for the Jewish Passover, Jesus went up to Jerusalem. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the temple courts he found people selling cattle, sheep and doves, and others sitting at tables exchanging money. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he made a whip out of cords, and drove all from the temple courts, both sheep and cattle; he scattered the coins of the money changers and overturned their tables. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To those who sold doves he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Get these out of here! Stop turning my Father’s house into a market!”
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His disciples remembered that it is written: “Zeal for your house will consume me.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalm 69:9
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Jews then responded to him, “What sign can you show us to prove your authority to do all this?”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Destroy this temple, and I will raise it again in three days.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Jesus and his disciples had also been invited to the wedding. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They replied, “It has taken forty-six years to build this temple, and you are going to raise it in three days?” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the temple he had spoken of was his body. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After he was raised from the dead, his disciples recalled what he had said. Then they believed the scripture and the words that Jesus had spoken.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now while he was in Jerusalem at the Passover Festival, many people saw the signs he was performing and believed in his name.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in him
      marker-yv: yv-n
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Jesus would not entrust himself to them, for he knew all people. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He did not need any testimony about mankind, for he knew what was in each person.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the wine was gone, Jesus’ mother said to him, “They have no more wine.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Woman,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Woman '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: does not denote any disrespect.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: why do you involve me?”
    - type: text
      text: ' Jesus replied. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My hour has not yet come.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: His mother said to the servants, “Do whatever he tells you.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nearby stood six stone water jars, the kind used by the Jews for ceremonial washing, each holding from twenty to thirty gallons.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Or from about 75 to about 115 liters
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to the servants, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Fill the jars with water”
    - type: text
      text: ; so they filled them to the brim.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he told them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Now draw some out and take it to the master of the banquet.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They did so, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the master of the banquet tasted the water that had been turned into wine. He did not realize where it had come from, though the servants who had drawn the water knew. Then he called the bridegroom aside '
