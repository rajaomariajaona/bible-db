document_id: JHN.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Changes Water Into Wine
  - type: text
    content: 'On the third day a wedding took place at Cana in Galilee. Jesus’ mother was there, '
  '10':
  - type: text
    content: and said, “Everyone brings out the choice wine first and then the cheaper wine after the guests have had too much to drink; but you have saved the best till now.”
  '11':
  - type: text
    content: What Jesus did here in Cana of Galilee was the first of the signs through which he revealed his glory; and his disciples believed in him.
  '12':
  - type: text
    content: After this he went down to Capernaum with his mother and brothers and his disciples. There they stayed for a few days.
  - type: heading
    content: Jesus Clears the Temple Courts
  '13':
  - type: text
    content: 'When it was almost time for the Jewish Passover, Jesus went up to Jerusalem. '
  '14':
  - type: text
    content: 'In the temple courts he found people selling cattle, sheep and doves, and others sitting at tables exchanging money. '
  '15':
  - type: text
    content: 'So he made a whip out of cords, and drove all from the temple courts, both sheep and cattle; he scattered the coins of the money changers and overturned their tables. '
  '16':
  - type: text
    content: 'To those who sold doves he said, '
  - type: text
    content: “Get these out of here! Stop turning my Father’s house into a market!”
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'His disciples remembered that it is written: “Zeal for your house will consume me.”'
  - type: note
    content: Psalm 69:9
  '18':
  - type: text
    content: The Jews then responded to him, “What sign can you show us to prove your authority to do all this?”
  '19':
  - type: text
    content: 'Jesus answered them, '
  - type: text
    content: “Destroy this temple, and I will raise it again in three days.”
  '2':
  - type: text
    content: 'and Jesus and his disciples had also been invited to the wedding. '
  '20':
  - type: text
    content: 'They replied, “It has taken forty-six years to build this temple, and you are going to raise it in three days?” '
  '21':
  - type: text
    content: 'But the temple he had spoken of was his body. '
  '22':
  - type: text
    content: After he was raised from the dead, his disciples recalled what he had said. Then they believed the scripture and the words that Jesus had spoken.
  '23':
  - type: text
    content: Now while he was in Jerusalem at the Passover Festival, many people saw the signs he was performing and believed in his name.
  - type: note
    content: Or in him
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'But Jesus would not entrust himself to them, for he knew all people. '
  '25':
  - type: text
    content: He did not need any testimony about mankind, for he knew what was in each person.
  '3':
  - type: text
    content: When the wine was gone, Jesus’ mother said to him, “They have no more wine.”
  '4':
  - type: text
    content: ' '
  - type: text
    content: “Woman,
  - type: text
    content: ' '
  - type: note
    content: The Greek for Woman does not denote any disrespect.
  - type: text
    content: why do you involve me?”
  - type: text
    content: ' Jesus replied. '
  - type: text
    content: “My hour has not yet come.”
  '5':
  - type: text
    content: His mother said to the servants, “Do whatever he tells you.”
  '6':
  - type: text
    content: Nearby stood six stone water jars, the kind used by the Jews for ceremonial washing, each holding from twenty to thirty gallons.
  - type: note
    content: Or from about 75 to about 115 liters
  '7':
  - type: text
    content: 'Jesus said to the servants, '
  - type: text
    content: “Fill the jars with water”
  - type: text
    content: ; so they filled them to the brim.
  '8':
  - type: text
    content: 'Then he told them, '
  - type: text
    content: “Now draw some out and take it to the master of the banquet.”
  - type: text
    content: 'They did so, '
  '9':
  - type: text
    content: 'and the master of the banquet tasted the water that had been turned into wine. He did not realize where it had come from, though the servants who had drawn the water knew. Then he called the bridegroom aside '
