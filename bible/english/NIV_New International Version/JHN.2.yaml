document_id: JHN.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Changes Water Into Wine
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'On the third day a wedding took place at Cana in Galilee. Jesus’ mother was there, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and Jesus and his disciples had also been invited to the wedding. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: When the wine was gone, Jesus’ mother said to him, “They have no more wine.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Woman,
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Woman '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: does not denote any disrespect.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: why do you involve me?”
  - type: text
    text: ' Jesus replied. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My hour has not yet come.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: His mother said to the servants, “Do whatever he tells you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nearby stood six stone water jars, the kind used by the Jews for ceremonial washing, each holding from twenty to thirty gallons.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or from about 75 to about 115 liters
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jesus said to the servants, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Fill the jars with water”
  - type: text
    text: ; so they filled them to the brim.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then he told them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Now draw some out and take it to the master of the banquet.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'They did so, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'and the master of the banquet tasted the water that had been turned into wine. He did not realize where it had come from, though the servants who had drawn the water knew. Then he called the bridegroom aside '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: and said, “Everyone brings out the choice wine first and then the cheaper wine after the guests have had too much to drink; but you have saved the best till now.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: What Jesus did here in Cana of Galilee was the first of the signs through which he revealed his glory; and his disciples believed in him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: After this he went down to Capernaum with his mother and brothers and his disciples. There they stayed for a few days.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Clears the Temple Courts
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'When it was almost time for the Jewish Passover, Jesus went up to Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'In the temple courts he found people selling cattle, sheep and doves, and others sitting at tables exchanging money. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So he made a whip out of cords, and drove all from the temple courts, both sheep and cattle; he scattered the coins of the money changers and overturned their tables. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'To those who sold doves he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Get these out of here! Stop turning my Father’s house into a market!”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'His disciples remembered that it is written: “Zeal for your house will consume me.”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 69:9
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The Jews then responded to him, “What sign can you show us to prove your authority to do all this?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jesus answered them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Destroy this temple, and I will raise it again in three days.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'They replied, “It has taken forty-six years to build this temple, and you are going to raise it in three days?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But the temple he had spoken of was his body. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: After he was raised from the dead, his disciples recalled what he had said. Then they believed the scripture and the words that Jesus had spoken.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Now while he was in Jerusalem at the Passover Festival, many people saw the signs he was performing and believed in his name.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in him
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But Jesus would not entrust himself to them, for he knew all people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: He did not need any testimony about mankind, for he knew what was in each person.
