  '50':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: You who have escaped the sword,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leave and do not linger!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Remember the '
