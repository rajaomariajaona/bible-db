document_id: JER.51,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “See, I will stir up the spirit of a destroyer
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against Babylon and the people of Leb Kamai.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51:1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Leb Kamai '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is a cryptogram for Chaldea, that is, Babylonia.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“ ‘The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has vindicated us;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: come, let us tell in Zion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God has done.’'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “Sharpen the arrows,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: take up the shields!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has stirred up the kings of the Medes,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because his purpose is to destroy Babylon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will take vengeance,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: vengeance for his temple.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Lift up a banner against the walls of Babylon!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Reinforce the guard,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: station the watchmen,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: prepare an ambush!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will carry out his purpose,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his decree against the people of Babylon.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: You who live by many waters
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and are rich in treasures,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your end has come,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the time for you to be destroyed.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty has sworn by himself:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will surely fill you with troops, as with a swarm of locusts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will shout in triumph over you.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “He made the earth by his power;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he founded the world by his wisdom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and stretched out the heavens by his understanding.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: When he thunders, the waters in the heavens roar;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he makes clouds rise from the ends of the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He sends lightning with the rain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and brings out the wind from his storehouses.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “Everyone is senseless and without knowledge;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every goldsmith is shamed by his idols.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The images he makes are a fraud;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they have no breath in them.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: They are worthless, the objects of mockery;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when their judgment comes, they will perish.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: He who is the Portion of Jacob is not like these,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he is the Maker of all things,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: including the people of his inheritance—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty is his name.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: I will send foreigners to Babylon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to winnow her and to devastate her land;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will oppose her on every side
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the day of her disaster.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “You are my war club,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my weapon for battle—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with you I shatter nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with you I destroy kingdoms,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: with you I shatter horse and rider,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with you I shatter chariot and driver,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: with you I shatter man and woman,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with you I shatter old man and youth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with you I shatter young man and young woman,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: with you I shatter shepherd and flock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with you I shatter farmer and oxen,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with you I shatter governors and officials.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: “Before your eyes I will repay Babylon and all who live in Babylonia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldea
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verse 35
      marker-yv: yv-n
    - type: text
      text: ' for all the wrong they have done in Zion,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: “I am against you, you destroying mountain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who destroy the whole earth,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will stretch out my hand against you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: roll you off the cliffs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make you a burned-out mountain.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: No rock will be taken from you for a cornerstone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor any stone for a foundation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you will be desolate forever,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: “Lift up a banner in the land!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Blow the trumpet among the nations!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prepare the nations for battle against her;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'summon against her these kingdoms:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Ararat, Minni and Ashkenaz.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Appoint a commander against her;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: send up horses like a swarm of locusts.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Prepare the nations for battle against her—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the kings of the Medes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: their governors and all their officials,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the countries they rule.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: The land trembles and writhes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s purposes against Babylon stand—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to lay waste the land of Babylon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that no one will live there.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Let not the archer string his bow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor let him put on his armor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not spare her young men;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: completely destroy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term refers to the irrevocable giving over of things or persons to the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ', often by totally destroying them.'
      marker-yv: yv-n
    - type: text
      text: ' her army.'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Babylon’s warriors have stopped fighting;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they remain in their strongholds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their strength is exhausted;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they have become weaklings.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her dwellings are set on fire;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the bars of her gates are broken.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: One courier follows another
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and messenger follows messenger
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to announce to the king of Babylon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that his entire city is captured,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: the river crossings seized,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the marshes set on fire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the soldiers terrified.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, the God of Israel, says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Daughter Babylon is like a threshing floor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the time it is trampled;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the time to harvest her will soon come.”
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: “Nebuchadnezzar king of Babylon has devoured us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has thrown us into confusion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has made us an empty jar.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a serpent he has swallowed us
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and filled his stomach with our delicacies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then has spewed us out.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: May the violence done to our flesh
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: done to us and to our children
      marker-yv: yv-n
    - type: text
      text: ' be on Babylon,”'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: say the inhabitants of Zion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “May our blood be on those who live in Babylonia,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: says Jerusalem.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Therefore this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “See, I will defend your cause
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and avenge you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will dry up her sea
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make her springs dry.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Babylon will be a heap of ruins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a haunt of jackals,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: an object of horror and scorn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a place where no one lives.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Her people all roar like young lions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they growl like lion cubs.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: But while they are aroused,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will set out a feast for them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make them drunk,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: so that they shout with laughter—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then sleep forever and not awake,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: They will fall down slain in Babylon,
    - type: usfm
      marker: f
      children:
      - type: usfm
