  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will repay in full.
  '57':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
