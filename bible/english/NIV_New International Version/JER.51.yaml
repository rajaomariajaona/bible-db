document_id: JER.51,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “See, I will stir up the spirit of a destroyer
  - type: text
    content: against Babylon and the people of Leb Kamai.
  - type: note
    content: Leb Kamai is a cryptogram for Chaldea, that is, Babylonia.
  '10':
  - type: text
    content: '“ ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' has vindicated us;'
  - type: text
    content: come, let us tell in Zion
  - type: text
    content: 'what the '
  - type: text
    content: Lord
  - type: text
    content: ' our God has done.’'
  '11':
  - type: text
    content: “Sharpen the arrows,
  - type: text
    content: take up the shields!
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has stirred up the kings of the Medes,'
  - type: text
    content: because his purpose is to destroy Babylon.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will take vengeance,'
  - type: text
    content: vengeance for his temple.
  '12':
  - type: text
    content: Lift up a banner against the walls of Babylon!
  - type: text
    content: Reinforce the guard,
  - type: text
    content: station the watchmen,
  - type: text
    content: prepare an ambush!
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will carry out his purpose,'
  - type: text
    content: his decree against the people of Babylon.
  '13':
  - type: text
    content: You who live by many waters
  - type: text
    content: and are rich in treasures,
  - type: text
    content: your end has come,
  - type: text
    content: the time for you to be destroyed.
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty has sworn by himself:'
  - type: text
    content: I will surely fill you with troops, as with a swarm of locusts,
  - type: text
    content: and they will shout in triumph over you.
  '15':
  - type: text
    content: “He made the earth by his power;
  - type: text
    content: he founded the world by his wisdom
  - type: text
    content: and stretched out the heavens by his understanding.
  '16':
  - type: text
    content: When he thunders, the waters in the heavens roar;
  - type: text
    content: he makes clouds rise from the ends of the earth.
  - type: text
    content: He sends lightning with the rain
  - type: text
    content: and brings out the wind from his storehouses.
  '17':
  - type: text
    content: “Everyone is senseless and without knowledge;
  - type: text
    content: every goldsmith is shamed by his idols.
  - type: text
    content: The images he makes are a fraud;
  - type: text
    content: they have no breath in them.
  '18':
  - type: text
    content: They are worthless, the objects of mockery;
  - type: text
    content: when their judgment comes, they will perish.
  '19':
  - type: text
    content: He who is the Portion of Jacob is not like these,
  - type: text
    content: for he is the Maker of all things,
  - type: text
    content: including the people of his inheritance—
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty is his name.'
  '2':
  - type: text
    content: I will send foreigners to Babylon
  - type: text
    content: to winnow her and to devastate her land;
  - type: text
    content: they will oppose her on every side
  - type: text
    content: in the day of her disaster.
  '20':
  - type: text
    content: “You are my war club,
  - type: text
    content: my weapon for battle—
  - type: text
    content: with you I shatter nations,
  - type: text
    content: with you I destroy kingdoms,
  '21':
  - type: text
    content: with you I shatter horse and rider,
  - type: text
    content: with you I shatter chariot and driver,
  '22':
  - type: text
    content: with you I shatter man and woman,
  - type: text
    content: with you I shatter old man and youth,
  - type: text
    content: with you I shatter young man and young woman,
  '23':
  - type: text
    content: with you I shatter shepherd and flock,
  - type: text
    content: with you I shatter farmer and oxen,
  - type: text
    content: with you I shatter governors and officials.
  '24':
  - type: text
    content: “Before your eyes I will repay Babylon and all who live in Babylonia
  - type: note
    content: Or Chaldea; also in verse 35
  - type: text
    content: ' for all the wrong they have done in Zion,” declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '25':
  - type: text
    content: “I am against you, you destroying mountain,
  - type: text
    content: you who destroy the whole earth,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “I will stretch out my hand against you,
  - type: text
    content: roll you off the cliffs,
  - type: text
    content: and make you a burned-out mountain.
  '26':
  - type: text
    content: No rock will be taken from you for a cornerstone,
  - type: text
    content: nor any stone for a foundation,
  - type: text
    content: for you will be desolate forever,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '27':
  - type: text
    content: “Lift up a banner in the land!
  - type: text
    content: Blow the trumpet among the nations!
  - type: text
    content: Prepare the nations for battle against her;
  - type: text
    content: 'summon against her these kingdoms:'
  - type: text
    content: Ararat, Minni and Ashkenaz.
  - type: text
    content: Appoint a commander against her;
  - type: text
    content: send up horses like a swarm of locusts.
  '28':
  - type: text
    content: Prepare the nations for battle against her—
  - type: text
    content: the kings of the Medes,
  - type: text
    content: their governors and all their officials,
  - type: text
    content: and all the countries they rule.
  '29':
  - type: text
    content: The land trembles and writhes,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ’s purposes against Babylon stand—
  - type: text
    content: to lay waste the land of Babylon
  - type: text
    content: so that no one will live there.
  '3':
  - type: text
    content: Let not the archer string his bow,
  - type: text
    content: nor let him put on his armor.
  - type: text
    content: Do not spare her young men;
  - type: text
    content: completely destroy
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them.
  - type: text
    content: ' her army.'
  '30':
  - type: text
    content: Babylon’s warriors have stopped fighting;
  - type: text
    content: they remain in their strongholds.
  - type: text
    content: Their strength is exhausted;
  - type: text
    content: they have become weaklings.
  - type: text
    content: Her dwellings are set on fire;
  - type: text
    content: the bars of her gates are broken.
  '31':
  - type: text
    content: One courier follows another
  - type: text
    content: and messenger follows messenger
  - type: text
    content: to announce to the king of Babylon
  - type: text
    content: that his entire city is captured,
  '32':
  - type: text
    content: the river crossings seized,
  - type: text
    content: the marshes set on fire,
  - type: text
    content: and the soldiers terrified.”
  '33':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says:'
  - type: text
    content: “Daughter Babylon is like a threshing floor
  - type: text
    content: at the time it is trampled;
  - type: text
    content: the time to harvest her will soon come.”
  '34':
  - type: text
    content: “Nebuchadnezzar king of Babylon has devoured us,
  - type: text
    content: he has thrown us into confusion,
  - type: text
    content: he has made us an empty jar.
  - type: text
    content: Like a serpent he has swallowed us
  - type: text
    content: and filled his stomach with our delicacies,
  - type: text
    content: and then has spewed us out.
  '35':
  - type: text
    content: May the violence done to our flesh
  - type: note
    content: Or done to us and to our children
  - type: text
    content: ' be on Babylon,”'
  - type: text
    content: say the inhabitants of Zion.
  - type: text
    content: “May our blood be on those who live in Babylonia,”
  - type: text
    content: says Jerusalem.
  '36':
  - type: text
    content: 'Therefore this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “See, I will defend your cause
  - type: text
    content: and avenge you;
  - type: text
    content: I will dry up her sea
  - type: text
    content: and make her springs dry.
  '37':
  - type: text
    content: Babylon will be a heap of ruins,
  - type: text
    content: a haunt of jackals,
  - type: text
    content: an object of horror and scorn,
  - type: text
    content: a place where no one lives.
  '38':
  - type: text
    content: Her people all roar like young lions,
  - type: text
    content: they growl like lion cubs.
  '39':
  - type: text
    content: But while they are aroused,
  - type: text
    content: I will set out a feast for them
  - type: text
    content: and make them drunk,
  - type: text
    content: so that they shout with laughter—
  - type: text
    content: then sleep forever and not awake,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: They will fall down slain in Babylon,
  - type: note
    content: Or Chaldea
  - type: text
    content: fatally wounded in her streets.
  '40':
  - type: text
    content: “I will bring them down
  - type: text
    content: like lambs to the slaughter,
  - type: text
    content: like rams and goats.
  '41':
  - type: text
    content: “How Sheshak
  - type: note
    content: Sheshak is a cryptogram for Babylon.
  - type: text
    content: ' will be captured,'
  - type: text
    content: the boast of the whole earth seized!
  - type: text
    content: How desolate Babylon will be
  - type: text
    content: among the nations!
  '42':
  - type: text
    content: The sea will rise over Babylon;
  - type: text
    content: its roaring waves will cover her.
  '43':
  - type: text
    content: Her towns will be desolate,
  - type: text
    content: a dry and desert land,
  - type: text
    content: a land where no one lives,
  - type: text
    content: through which no one travels.
  '44':
  - type: text
    content: I will punish Bel in Babylon
  - type: text
    content: and make him spew out what he has swallowed.
  - type: text
    content: The nations will no longer stream to him.
  - type: text
    content: And the wall of Babylon will fall.
  '45':
  - type: text
    content: “Come out of her, my people!
  - type: text
    content: Run for your lives!
  - type: text
    content: 'Run from the fierce anger of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '46':
  - type: text
    content: Do not lose heart or be afraid
  - type: text
    content: when rumors are heard in the land;
  - type: text
    content: one rumor comes this year, another the next,
  - type: text
    content: rumors of violence in the land
  - type: text
    content: and of ruler against ruler.
  '47':
  - type: text
    content: For the time will surely come
  - type: text
    content: when I will punish the idols of Babylon;
  - type: text
    content: her whole land will be disgraced
  - type: text
    content: and her slain will all lie fallen within her.
  '48':
  - type: text
    content: Then heaven and earth and all that is in them
  - type: text
    content: will shout for joy over Babylon,
  - type: text
    content: for out of the north
  - type: text
    content: destroyers will attack her,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '49':
  - type: text
    content: “Babylon must fall because of Israel’s slain,
  - type: text
    content: just as the slain in all the earth
  - type: text
    content: have fallen because of Babylon.
  '5':
  - type: text
    content: For Israel and Judah have not been forsaken
  - type: text
    content: 'by their God, the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty,'
  - type: text
    content: though their land
  - type: note
    content: Or Almighty, / and the land of the Babylonians
  - type: text
    content: ' is full of guilt'
  - type: text
    content: before the Holy One of Israel.
  '50':
  - type: text
    content: You who have escaped the sword,
  - type: text
    content: leave and do not linger!
  - type: text
    content: 'Remember the '
  - type: text
    content: Lord
  - type: text
    content: ' in a distant land,'
  - type: text
    content: and call to mind Jerusalem.”
  '51':
  - type: text
    content: “We are disgraced,
  - type: text
    content: for we have been insulted
  - type: text
    content: and shame covers our faces,
  - type: text
    content: because foreigners have entered
  - type: text
    content: 'the holy places of the '
  - type: text
    content: Lord
  - type: text
    content: ’s house.”
  '52':
  - type: text
    content: '“But days are coming,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “when I will punish her idols,
  - type: text
    content: and throughout her land
  - type: text
    content: the wounded will groan.
  '53':
  - type: text
    content: Even if Babylon ascends to the heavens
  - type: text
    content: and fortifies her lofty stronghold,
  - type: text
    content: I will send destroyers against her,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '54':
  - type: text
    content: “The sound of a cry comes from Babylon,
  - type: text
    content: the sound of great destruction
  - type: text
    content: from the land of the Babylonians.
  - type: note
    content: Or Chaldeans
  '55':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will destroy Babylon;'
  - type: text
    content: he will silence her noisy din.
  - type: text
    content: Waves of enemies will rage like great waters;
  - type: text
    content: the roar of their voices will resound.
  '56':
  - type: text
    content: A destroyer will come against Babylon;
  - type: text
    content: her warriors will be captured,
  - type: text
    content: and their bows will be broken.
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is a God of retribution;'
  - type: text
    content: he will repay in full.
  '57':
  - type: text
    content: I will make her officials and wise men drunk,
  - type: text
    content: her governors, officers and warriors as well;
  - type: text
    content: they will sleep forever and not awake,”
  - type: text
    content: 'declares the King, whose name is the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  '58':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says:'
  - type: text
    content: “Babylon’s thick wall will be leveled
  - type: text
    content: and her high gates set on fire;
  - type: text
    content: the peoples exhaust themselves for nothing,
  - type: text
    content: the nations’ labor is only fuel for the flames.”
  '59':
  - type: text
    content: 'This is the message Jeremiah the prophet gave to the staff officer Seraiah son of Neriah, the son of Mahseiah, when he went to Babylon with Zedekiah king of Judah in the fourth year of his reign. '
  '6':
  - type: text
    content: “Flee from Babylon!
  - type: text
    content: Run for your lives!
  - type: text
    content: Do not be destroyed because of her sins.
  - type: text
    content: 'It is time for the '
  - type: text
    content: Lord
  - type: text
    content: ’s vengeance;
  - type: text
    content: he will repay her what she deserves.
  '60':
  - type: text
    content: 'Jeremiah had written on a scroll about all the disasters that would come upon Babylon—all that had been recorded concerning Babylon. '
  '61':
  - type: text
    content: 'He said to Seraiah, “When you get to Babylon, see that you read all these words aloud. '
  '62':
  - type: text
    content: Then say, ‘
  - type: text
    content: Lord
  - type: text
    content: ', you have said you will destroy this place, so that neither people nor animals will live in it; it will be desolate forever.’ '
  '63':
  - type: text
    content: 'When you finish reading this scroll, tie a stone to it and throw it into the Euphrates. '
  '64':
  - type: text
    content: Then say, ‘So will Babylon sink to rise no more because of the disaster I will bring on her. And her people will fall.’ ”
  - type: text
    content: The words of Jeremiah end here.
  '7':
  - type: text
    content: 'Babylon was a gold cup in the '
  - type: text
    content: Lord
  - type: text
    content: ’s hand;
  - type: text
    content: she made the whole earth drunk.
  - type: text
    content: The nations drank her wine;
  - type: text
    content: therefore they have now gone mad.
  '8':
  - type: text
    content: Babylon will suddenly fall and be broken.
  - type: text
    content: Wail over her!
  - type: text
    content: Get balm for her pain;
  - type: text
    content: perhaps she can be healed.
  '9':
  - type: text
    content: “ ‘We would have healed Babylon,
  - type: text
    content: but she cannot be healed;
  - type: text
    content: let us leave her and each go to our own land,
  - type: text
    content: for her judgment reaches to the skies,
  - type: text
    content: it rises as high as the heavens.’
