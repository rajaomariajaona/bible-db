        - type: text
          text: '51:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Almighty, / and the land of the Babylonians
      marker-yv: yv-n
    - type: text
      text: ' is full of guilt'
  - type: usfm
    marker: q2
    children:
    - type: text
