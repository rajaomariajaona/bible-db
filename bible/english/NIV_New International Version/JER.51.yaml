    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty.'
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Babylon’s thick wall will be leveled
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and her high gates set on fire;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the peoples exhaust themselves for nothing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the nations’ labor is only fuel for the flames.”
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: 'This is the message Jeremiah the prophet gave to the staff officer Seraiah son of Neriah, the son of Mahseiah, when he went to Babylon with Zedekiah king of Judah in the fourth year of his reign. '
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “Flee from Babylon!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Run for your lives!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not be destroyed because of her sins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It is time for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s vengeance;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will repay her what she deserves.
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: 'Jeremiah had written on a scroll about all the disasters that would come upon Babylon—all that had been recorded concerning Babylon. '
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: 'He said to Seraiah, “When you get to Babylon, see that you read all these words aloud. '
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: Then say, ‘
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you have said you will destroy this place, so that neither people nor animals will live in it; it will be desolate forever.’ '
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: 'When you finish reading this scroll, tie a stone to it and throw it into the Euphrates. '
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: Then say, ‘So will Babylon sink to rise no more because of the disaster I will bring on her. And her people will fall.’ ”
  - type: usfm
    marker: p
    children:
    - type: text
      text: The words of Jeremiah end here.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Babylon was a gold cup in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s hand;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: she made the whole earth drunk.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The nations drank her wine;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: therefore they have now gone mad.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Babylon will suddenly fall and be broken.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Wail over her!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Get balm for her pain;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: perhaps she can be healed.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “ ‘We would have healed Babylon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but she cannot be healed;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: let us leave her and each go to our own land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for her judgment reaches to the skies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it rises as high as the heavens.’
