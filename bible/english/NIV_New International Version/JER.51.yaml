  '52':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: '“But days are coming,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
