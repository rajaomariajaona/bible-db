  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: For Israel and Judah have not been forsaken
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'by their God, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty,'
  - type: usfm
    marker: q1
    children:
