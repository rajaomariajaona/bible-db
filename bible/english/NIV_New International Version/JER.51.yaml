    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '49':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: “Babylon must fall because of Israel’s slain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just as the slain in all the earth
  - type: usfm
    marker: q2
    children:
    - type: text
