document_id: JHN.17,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Prays to Be Glorified
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After Jesus said this, he looked toward heaven and prayed:'
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Father, the hour has come. Glorify your Son, that your Son may glorify you.
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: All I have is yours, and all you have is mine. And glory has come to me through them.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I will remain in the world no longer, but they are still in the world, and I am coming to you. Holy Father, protect them by the power of
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Father, keep them faithful to
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: your name, the name you gave me, so that they may be one as we are one.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: While I was with them, I protected them and kept them safe by
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: kept them faithful to
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: that name you gave me. None has been lost except the one doomed to destruction so that Scripture would be fulfilled.
  '13':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I am coming to you now, but I say these things while I am still in the world, so that they may have the full measure of my joy within them.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have given them your word and the world has hated them, for they are not of the world any more than I am of the world.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: My prayer is not that you take them out of the world but that you protect them from the evil one.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: They are not of the world, even as I am not of it.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Sanctify them by
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: them to live in accordance with
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the truth; your word is truth.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: As you sent me into the world, I have sent them into the world.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For them I sanctify myself, that they too may be truly sanctified.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Prays for All Believers
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For you granted him authority over all people that he might give eternal life to all those you have given him.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “My prayer is not for them alone. I pray also for those who will believe in me through their message,
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: that all of them may be one, Father, just as you are in me and I am in you. May they also be in us so that the world may believe that you have sent me.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have given them the glory that you gave me, that they may be one as we are one—
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I in them and you in me—so that they may be brought to complete unity. Then the world will know that you sent me and have loved them even as you have loved me.
  '24':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Father, I want those you have given me to be with me where I am, and to see my glory, the glory you have given me because you loved me before the creation of the world.
  '25':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Righteous Father, though the world does not know you, I know you, and they know that you have sent me.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have made you
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: your name
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: known to them, and will continue to make you known in order that the love you have for me may be in them and that I myself may be in them.”
  '3':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Now this is eternal life: that they know you, the only true God, and Jesus Christ, whom you have sent.'
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have brought you glory on earth by finishing the work you gave me to do.
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And now, Father, glorify me in your presence with the glory I had with you before the world began.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Prays for His Disciples
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I have revealed you
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: your name
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to those whom you gave me out of the world. They were yours; you gave them to me and they have obeyed your word.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Now they know that everything you have given me comes from you.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For I gave them the words you gave me and they accepted them. They knew with certainty that I came from you, and they believed that you sent me.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: pm
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I pray for them. I am not praying for the world, but for those you have given me, for they are yours.
    - type: text
      text: ' '
