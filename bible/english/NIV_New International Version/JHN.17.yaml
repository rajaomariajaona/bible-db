document_id: JHN.17,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Prays to Be Glorified
  - type: text
    content: 'After Jesus said this, he looked toward heaven and prayed:'
  - type: text
    content: “Father, the hour has come. Glorify your Son, that your Son may glorify you.
  - type: text
    content: ' '
  '10':
  - type: text
    content: All I have is yours, and all you have is mine. And glory has come to me through them.
  - type: text
    content: ' '
  '11':
  - type: text
    content: I will remain in the world no longer, but they are still in the world, and I am coming to you. Holy Father, protect them by the power of
  - type: note
    content: Or Father, keep them faithful to
  - type: text
    content: ' '
  - type: text
    content: your name, the name you gave me, so that they may be one as we are one.
  - type: text
    content: ' '
  '12':
  - type: text
    content: While I was with them, I protected them and kept them safe by
  - type: note
    content: Or kept them faithful to
  - type: text
    content: ' '
  - type: text
    content: that name you gave me. None has been lost except the one doomed to destruction so that Scripture would be fulfilled.
  '13':
  - type: text
    content: ' '
  - type: text
    content: “I am coming to you now, but I say these things while I am still in the world, so that they may have the full measure of my joy within them.
  - type: text
    content: ' '
  '14':
  - type: text
    content: I have given them your word and the world has hated them, for they are not of the world any more than I am of the world.
  - type: text
    content: ' '
  '15':
  - type: text
    content: My prayer is not that you take them out of the world but that you protect them from the evil one.
  - type: text
    content: ' '
  '16':
  - type: text
    content: They are not of the world, even as I am not of it.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Sanctify them by
  - type: note
    content: Or them to live in accordance with
  - type: text
    content: ' '
  - type: text
    content: the truth; your word is truth.
  - type: text
    content: ' '
  '18':
  - type: text
    content: As you sent me into the world, I have sent them into the world.
  - type: text
    content: ' '
  '19':
  - type: text
    content: For them I sanctify myself, that they too may be truly sanctified.
  - type: heading
    content: Jesus Prays for All Believers
  '2':
  - type: text
    content: For you granted him authority over all people that he might give eternal life to all those you have given him.
  - type: text
    content: ' '
  '20':
  - type: text
    content: ' '
  - type: text
    content: “My prayer is not for them alone. I pray also for those who will believe in me through their message,
  - type: text
    content: ' '
  '21':
  - type: text
    content: that all of them may be one, Father, just as you are in me and I am in you. May they also be in us so that the world may believe that you have sent me.
  - type: text
    content: ' '
  '22':
  - type: text
    content: I have given them the glory that you gave me, that they may be one as we are one—
  - type: text
    content: ' '
  '23':
  - type: text
    content: I in them and you in me—so that they may be brought to complete unity. Then the world will know that you sent me and have loved them even as you have loved me.
  '24':
  - type: text
    content: ' '
  - type: text
    content: “Father, I want those you have given me to be with me where I am, and to see my glory, the glory you have given me because you loved me before the creation of the world.
  '25':
  - type: text
    content: ' '
  - type: text
    content: “Righteous Father, though the world does not know you, I know you, and they know that you have sent me.
  - type: text
    content: ' '
  '26':
  - type: text
    content: I have made you
  - type: note
    content: Greek your name
  - type: text
    content: ' '
  - type: text
    content: known to them, and will continue to make you known in order that the love you have for me may be in them and that I myself may be in them.”
  '3':
  - type: text
    content: 'Now this is eternal life: that they know you, the only true God, and Jesus Christ, whom you have sent.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: I have brought you glory on earth by finishing the work you gave me to do.
  - type: text
    content: ' '
  '5':
  - type: text
    content: And now, Father, glorify me in your presence with the glory I had with you before the world began.
  - type: heading
    content: Jesus Prays for His Disciples
  '6':
  - type: text
    content: ' '
  - type: text
    content: “I have revealed you
  - type: text
    content: ' '
  - type: note
    content: Greek your name
  - type: text
    content: to those whom you gave me out of the world. They were yours; you gave them to me and they have obeyed your word.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Now they know that everything you have given me comes from you.
  - type: text
    content: ' '
  '8':
  - type: text
    content: For I gave them the words you gave me and they accepted them. They knew with certainty that I came from you, and they believed that you sent me.
  - type: text
    content: ' '
  '9':
  - type: text
    content: I pray for them. I am not praying for the world, but for those you have given me, for they are yours.
  - type: text
    content: ' '
