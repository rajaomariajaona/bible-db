document_id: PSA.147,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 147
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: note
    content: Hebrew Hallelu Yah; also in verse 20
  - type: text
    content: How good it is to sing praises to our God,
  - type: text
    content: how pleasant and fitting to praise him!
  '10':
  - type: text
    content: His pleasure is not in the strength of the horse,
  - type: text
    content: nor his delight in the legs of the warrior;
  '11':
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' delights in those who fear him,'
  - type: text
    content: who put their hope in his unfailing love.
  '12':
  - type: text
    content: 'Extol the '
  - type: text
    content: Lord
  - type: text
    content: ', Jerusalem;'
  - type: text
    content: praise your God, Zion.
  '13':
  - type: text
    content: He strengthens the bars of your gates
  - type: text
    content: and blesses your people within you.
  '14':
  - type: text
    content: He grants peace to your borders
  - type: text
    content: and satisfies you with the finest of wheat.
  '15':
  - type: text
    content: He sends his command to the earth;
  - type: text
    content: his word runs swiftly.
  '16':
  - type: text
    content: He spreads the snow like wool
  - type: text
    content: and scatters the frost like ashes.
  '17':
  - type: text
    content: He hurls down his hail like pebbles.
  - type: text
    content: Who can withstand his icy blast?
  '18':
  - type: text
    content: He sends his word and melts them;
  - type: text
    content: he stirs up his breezes, and the waters flow.
  '19':
  - type: text
    content: He has revealed his word to Jacob,
  - type: text
    content: his laws and decrees to Israel.
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' builds up Jerusalem;'
  - type: text
    content: he gathers the exiles of Israel.
  '20':
  - type: text
    content: He has done this for no other nation;
  - type: text
    content: they do not know his laws.
  - type: note
    content: Masoretic Text; Dead Sea Scrolls and Septuagint nation; / he has not made his laws known to them
  - type: text
    content: 'Praise the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: He heals the brokenhearted
  - type: text
    content: and binds up their wounds.
  '4':
  - type: text
    content: He determines the number of the stars
  - type: text
    content: and calls them each by name.
  '5':
  - type: text
    content: Great is our Lord and mighty in power;
  - type: text
    content: his understanding has no limit.
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' sustains the humble'
  - type: text
    content: but casts the wicked to the ground.
  '7':
  - type: text
    content: 'Sing to the '
  - type: text
    content: Lord
  - type: text
    content: ' with grateful praise;'
  - type: text
    content: make music to our God on the harp.
  '8':
  - type: text
    content: He covers the sky with clouds;
  - type: text
    content: he supplies the earth with rain
  - type: text
    content: and makes grass grow on the hills.
  '9':
  - type: text
    content: He provides food for the cattle
  - type: text
    content: and for the young ravens when they call.
