- type: usfm
  marker: q1
  children:
  - type: text
    text: How good it is to sing praises to our God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: how pleasant and fitting to praise him!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' builds up Jerusalem;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he gathers the exiles of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He heals the brokenhearted
- type: usfm
  marker: q2
  children:
  - type: text
    text: and binds up their wounds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He determines the number of the stars
- type: usfm
  marker: q2
  children:
  - type: text
    text: and calls them each by name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Great is our Lord and mighty in power;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his understanding has no limit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' sustains the humble'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but casts the wicked to the ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Sing to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' with grateful praise;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: make music to our God on the harp.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He covers the sky with clouds;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he supplies the earth with rain
- type: usfm
  marker: q2
  children:
  - type: text
    text: and makes grass grow on the hills.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He provides food for the cattle
- type: usfm
  marker: q2
  children:
  - type: text
    text: and for the young ravens when they call.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: His pleasure is not in the strength of the horse,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor his delight in the legs of the warrior;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' delights in those who fear him,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: who put their hope in his unfailing love.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Extol the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', Jerusalem;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: praise your God, Zion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He strengthens the bars of your gates
- type: usfm
  marker: q2
  children:
  - type: text
    text: and blesses your people within you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He grants peace to your borders
- type: usfm
  marker: q2
  children:
  - type: text
    text: and satisfies you with the finest of wheat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He sends his command to the earth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his word runs swiftly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He spreads the snow like wool
- type: usfm
  marker: q2
  children:
  - type: text
    text: and scatters the frost like ashes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He hurls down his hail like pebbles.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who can withstand his icy blast?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: He sends his word and melts them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he stirs up his breezes, and the waters flow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He has revealed his word to Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his laws and decrees to Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He has done this for no other nation;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they do not know his laws.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '147:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Masoretic Text; Dead Sea Scrolls and Septuagint '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nation; / he has not made his laws known to them
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
