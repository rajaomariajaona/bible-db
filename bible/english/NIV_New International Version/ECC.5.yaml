document_id: ECC.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fulfill Your Vow to God
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 5:1 is numbered 4:17, and 5:2-20 is numbered 5:1-19.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Guard your steps when you go to the house of God. Go near to listen rather than to offer the sacrifice of fools, who do not know that they do wrong.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Do not be quick with your mouth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not be hasty in your heart
- type: usfm
  marker: q2
  children:
  - type: text
    text: to utter anything before God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God is in heaven
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you are on earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so let your words be few.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: A dream comes when there are many cares,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and many words mark the speech of a fool.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When you make a vow to God, do not delay to fulfill it. He has no pleasure in fools; fulfill your vow. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'It is better not to make a vow than to make one and not fulfill it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Do not let your mouth lead you into sin. And do not protest to the temple messenger, “My vow was a mistake.” Why should God be angry at what you say and destroy the work of your hands? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Much dreaming and many words are meaningless. Therefore fear God.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Riches Are Meaningless
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'If you see the poor oppressed in a district, and justice and rights denied, do not be surprised at such things; for one official is eyed by a higher one, and over them both are others higher still. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The increase from the land is taken by all; the king himself profits from the fields.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Whoever loves money never has enough;
- type: usfm
  marker: q2
  children:
  - type: text
    text: whoever loves wealth is never satisfied with their income.
- type: usfm
  marker: q2
  children:
  - type: text
    text: This too is meaningless.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: As goods increase,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so do those who consume them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: And what benefit are they to the owners
- type: usfm
  marker: q2
  children:
  - type: text
    text: except to feast their eyes on them?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The sleep of a laborer is sweet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whether they eat little or much,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but as for the rich, their abundance
- type: usfm
  marker: q2
  children:
  - type: text
    text: permits them no sleep.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I have seen a grievous evil under the sun:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: wealth hoarded to the harm of its owners,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: or wealth lost through some misfortune,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so that when they have children
- type: usfm
  marker: q2
  children:
  - type: text
    text: there is nothing left for them to inherit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Everyone comes naked from their mother’s womb,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and as everyone comes, so they depart.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They take nothing from their toil
- type: usfm
  marker: q2
  children:
  - type: text
    text: that they can carry in their hands.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'This too is a grievous evil:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: As everyone comes, so they depart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and what do they gain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: since they toil for the wind?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: All their days they eat in darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with great frustration, affliction and anger.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'This is what I have observed to be good: that it is appropriate for a person to eat, to drink and to find satisfaction in their toilsome labor under the sun during the few days of life God has given them—for this is their lot. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Moreover, when God gives someone wealth and possessions, and the ability to enjoy them, to accept their lot and be happy in their toil—this is a gift of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: They seldom reflect on the days of their life, because God keeps them occupied with gladness of heart.
