document_id: ECC.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Fulfill Your Vow to God
  - type: note
    content: In Hebrew texts 5:1 is numbered 4:17, and 5:2-20 is numbered 5:1-19.
  - type: text
    content: Guard your steps when you go to the house of God. Go near to listen rather than to offer the sacrifice of fools, who do not know that they do wrong.
  '10':
  - type: text
    content: Whoever loves money never has enough;
  - type: text
    content: whoever loves wealth is never satisfied with their income.
  - type: text
    content: This too is meaningless.
  '11':
  - type: text
    content: As goods increase,
  - type: text
    content: so do those who consume them.
  - type: text
    content: And what benefit are they to the owners
  - type: text
    content: except to feast their eyes on them?
  '12':
  - type: text
    content: The sleep of a laborer is sweet,
  - type: text
    content: whether they eat little or much,
  - type: text
    content: but as for the rich, their abundance
  - type: text
    content: permits them no sleep.
  '13':
  - type: text
    content: 'I have seen a grievous evil under the sun:'
  - type: text
    content: wealth hoarded to the harm of its owners,
  '14':
  - type: text
    content: or wealth lost through some misfortune,
  - type: text
    content: so that when they have children
  - type: text
    content: there is nothing left for them to inherit.
  '15':
  - type: text
    content: Everyone comes naked from their mother’s womb,
  - type: text
    content: and as everyone comes, so they depart.
  - type: text
    content: They take nothing from their toil
  - type: text
    content: that they can carry in their hands.
  '16':
  - type: text
    content: 'This too is a grievous evil:'
  - type: text
    content: As everyone comes, so they depart,
  - type: text
    content: and what do they gain,
  - type: text
    content: since they toil for the wind?
  '17':
  - type: text
    content: All their days they eat in darkness,
  - type: text
    content: with great frustration, affliction and anger.
  '18':
  - type: text
    content: 'This is what I have observed to be good: that it is appropriate for a person to eat, to drink and to find satisfaction in their toilsome labor under the sun during the few days of life God has given them—for this is their lot. '
  '19':
  - type: text
    content: 'Moreover, when God gives someone wealth and possessions, and the ability to enjoy them, to accept their lot and be happy in their toil—this is a gift of God. '
  '2':
  - type: text
    content: Do not be quick with your mouth,
  - type: text
    content: do not be hasty in your heart
  - type: text
    content: to utter anything before God.
  - type: text
    content: God is in heaven
  - type: text
    content: and you are on earth,
  - type: text
    content: so let your words be few.
  '20':
  - type: text
    content: They seldom reflect on the days of their life, because God keeps them occupied with gladness of heart.
  '3':
  - type: text
    content: A dream comes when there are many cares,
  - type: text
    content: and many words mark the speech of a fool.
  '4':
  - type: text
    content: 'When you make a vow to God, do not delay to fulfill it. He has no pleasure in fools; fulfill your vow. '
  '5':
  - type: text
    content: 'It is better not to make a vow than to make one and not fulfill it. '
  '6':
  - type: text
    content: 'Do not let your mouth lead you into sin. And do not protest to the temple messenger, “My vow was a mistake.” Why should God be angry at what you say and destroy the work of your hands? '
  '7':
  - type: text
    content: Much dreaming and many words are meaningless. Therefore fear God.
  - type: heading
    content: Riches Are Meaningless
  '8':
  - type: text
    content: 'If you see the poor oppressed in a district, and justice and rights denied, do not be surprised at such things; for one official is eyed by a higher one, and over them both are others higher still. '
  '9':
  - type: text
    content: The increase from the land is taken by all; the king himself profits from the fields.
