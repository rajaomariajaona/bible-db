document_id: PSA.15,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 15
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who may dwell in your sacred tent?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who may live on your holy mountain?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The one whose walk is blameless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who does what is righteous,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who speaks the truth from their heart;
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: whose tongue utters no slander,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who does no wrong to a neighbor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and casts no slur on others;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who despises a vile person
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but honors those who fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who keeps an oath even when it hurts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and does not change their mind;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who lends money to the poor without interest;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who does not accept a bribe against the innocent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoever does these things
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will never be shaken.
