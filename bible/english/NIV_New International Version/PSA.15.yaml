- type: usfm
  marker: q2
  children:
  - type: text
    text: Who may live on your holy mountain?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The one whose walk is blameless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who does what is righteous,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who speaks the truth from their heart;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: whose tongue utters no slander,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who does no wrong to a neighbor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and casts no slur on others;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: who despises a vile person
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but honors those who fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: who keeps an oath even when it hurts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and does not change their mind;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: who lends money to the poor without interest;
- type: usfm
  marker: q2
  children:
  - type: text
    text: who does not accept a bribe against the innocent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Whoever does these things
- type: usfm
  marker: q2
  children:
  - type: text
    text: will never be shaken.
