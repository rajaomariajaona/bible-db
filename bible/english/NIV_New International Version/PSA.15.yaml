verses:
  '1':
  - type: heading
    content: Psalm 15
  - type: text
    content: A psalm of David.
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', who may dwell in your sacred tent?'
  - type: text
    content: Who may live on your holy mountain?
  '2':
  - type: text
    content: The one whose walk is blameless,
  - type: text
    content: who does what is righteous,
  - type: text
    content: who speaks the truth from their heart;
  '3':
  - type: text
    content: whose tongue utters no slander,
  - type: text
    content: who does no wrong to a neighbor,
  - type: text
    content: and casts no slur on others;
  '4':
  - type: text
    content: who despises a vile person
  - type: text
    content: 'but honors those who fear the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: who keeps an oath even when it hurts,
  - type: text
    content: and does not change their mind;
  '5':
  - type: text
    content: who lends money to the poor without interest;
  - type: text
    content: who does not accept a bribe against the innocent.
  - type: text
    content: Whoever does these things
  - type: text
    content: will never be shaken.
