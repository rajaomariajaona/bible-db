document_id: SNG.1,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Solomon’s Song of Songs.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: She
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The main male and female speakers (identified primarily on the basis of the gender of the relevant Hebrew forms) are indicated by the captions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'He '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'and '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'She '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'respectively. The words of others are marked '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Friends. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In some instances the divisions and their captions are debatable.
      marker-yv: yv-n
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Your cheeks are beautiful with earrings,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your neck with strings of jewels.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: We will make you earrings of gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: studded with silver.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: She
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: While the king was at his table,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my perfume spread its fragrance.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: My beloved is to me a sachet of myrrh
  - type: usfm
    marker: q2
    children:
    - type: text
      text: resting between my breasts.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: My beloved is to me a cluster of henna blossoms
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the vineyards of En Gedi.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: He
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: How beautiful you are, my darling!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh, how beautiful!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your eyes are doves.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: She
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: How handsome you are, my beloved!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh, how charming!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And our bed is verdant.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: He
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: The beams of our house are cedars;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: our rafters are firs.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Let him kiss me with the kisses of his mouth—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for your love is more delightful than wine.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Pleasing is the fragrance of your perfumes;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your name is like perfume poured out.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No wonder the young women love you!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Take me away with you—let us hurry!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let the king bring me into his chambers.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: Friends
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We rejoice and delight in you
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Hebrew is masculine singular.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we will praise your love more than wine.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: She
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How right they are to adore you!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Dark am I, yet lovely,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: daughters of Jerusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dark like the tents of Kedar,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like the tent curtains of Solomon.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Salma
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Do not stare at me because I am dark,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because I am darkened by the sun.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My mother’s sons were angry with me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and made me take care of the vineyards;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my own vineyard I had to neglect.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tell me, you whom I love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: where you graze your flock
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and where you rest your sheep at midday.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why should I be like a veiled woman
  - type: usfm
    marker: q2
    children:
    - type: text
      text: beside the flocks of your friends?
  - type: usfm
    marker: sp
    children:
    - type: text
      text: Friends
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: If you do not know, most beautiful of women,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: follow the tracks of the sheep
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and graze your young goats
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by the tents of the shepherds.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: He
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: I liken you, my darling, to a mare
  - type: usfm
    marker: q2
    children:
    - type: text
      text: among Pharaoh’s chariot horses.
