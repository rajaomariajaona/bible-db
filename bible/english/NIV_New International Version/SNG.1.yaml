document_id: SNG.1,111
type_code: eng
verses:
  '1':
  - type: text
    content: Solomon’s Song of Songs.
  - type: heading
    content: SheThe main male and female speakers (identified primarily on the basis of the gender of the relevant Hebrew forms) are indicated by the captions He and She respectively. The words of others are marked Friends. In some instances the divisions and their captions are debatable.
  '10':
  - type: text
    content: Your cheeks are beautiful with earrings,
  - type: text
    content: your neck with strings of jewels.
  '11':
  - type: text
    content: We will make you earrings of gold,
  - type: text
    content: studded with silver.
  - type: heading
    content: She
  '12':
  - type: text
    content: While the king was at his table,
  - type: text
    content: my perfume spread its fragrance.
  '13':
  - type: text
    content: My beloved is to me a sachet of myrrh
  - type: text
    content: resting between my breasts.
  '14':
  - type: text
    content: My beloved is to me a cluster of henna blossoms
  - type: text
    content: from the vineyards of En Gedi.
  - type: heading
    content: He
  '15':
  - type: text
    content: How beautiful you are, my darling!
  - type: text
    content: Oh, how beautiful!
  - type: text
    content: Your eyes are doves.
  - type: heading
    content: She
  '16':
  - type: text
    content: How handsome you are, my beloved!
  - type: text
    content: Oh, how charming!
  - type: text
    content: And our bed is verdant.
  - type: heading
    content: He
  '17':
  - type: text
    content: The beams of our house are cedars;
  - type: text
    content: our rafters are firs.
  '2':
  - type: text
    content: Let him kiss me with the kisses of his mouth—
  - type: text
    content: for your love is more delightful than wine.
  '3':
  - type: text
    content: Pleasing is the fragrance of your perfumes;
  - type: text
    content: your name is like perfume poured out.
  - type: text
    content: No wonder the young women love you!
  '4':
  - type: text
    content: Take me away with you—let us hurry!
  - type: text
    content: Let the king bring me into his chambers.
  - type: heading
    content: Friends
  - type: text
    content: We rejoice and delight in you
  - type: note
    content: The Hebrew is masculine singular.
  - type: text
    content: ;
  - type: text
    content: we will praise your love more than wine.
  - type: heading
    content: She
  - type: text
    content: How right they are to adore you!
  '5':
  - type: text
    content: Dark am I, yet lovely,
  - type: text
    content: daughters of Jerusalem,
  - type: text
    content: dark like the tents of Kedar,
  - type: text
    content: like the tent curtains of Solomon.
  - type: note
    content: Or Salma
  '6':
  - type: text
    content: Do not stare at me because I am dark,
  - type: text
    content: because I am darkened by the sun.
  - type: text
    content: My mother’s sons were angry with me
  - type: text
    content: and made me take care of the vineyards;
  - type: text
    content: my own vineyard I had to neglect.
  '7':
  - type: text
    content: Tell me, you whom I love,
  - type: text
    content: where you graze your flock
  - type: text
    content: and where you rest your sheep at midday.
  - type: text
    content: Why should I be like a veiled woman
  - type: text
    content: beside the flocks of your friends?
  - type: heading
    content: Friends
  '8':
  - type: text
    content: If you do not know, most beautiful of women,
  - type: text
    content: follow the tracks of the sheep
  - type: text
    content: and graze your young goats
  - type: text
    content: by the tents of the shepherds.
  - type: heading
    content: He
  '9':
  - type: text
    content: I liken you, my darling, to a mare
  - type: text
    content: among Pharaoh’s chariot horses.
