document_id: PSA.49,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 49In Hebrew texts 49:1-20 is numbered 49:2-21.
  - type: text
    content: For the director of music. Of the Sons of Korah. A psalm.
  - type: text
    content: Hear this, all you peoples;
  - type: text
    content: listen, all who live in this world,
  '10':
  - type: text
    content: For all can see that the wise die,
  - type: text
    content: that the foolish and the senseless also perish,
  - type: text
    content: leaving their wealth to others.
  '11':
  - type: text
    content: Their tombs will remain their houses
  - type: note
    content: Septuagint and Syriac; Hebrew In their thoughts their houses will remain
  - type: text
    content: ' forever,'
  - type: text
    content: their dwellings for endless generations,
  - type: text
    content: though they had
  - type: note
    content: Or generations, / for they have
  - type: text
    content: ' named lands after themselves.'
  '12':
  - type: text
    content: People, despite their wealth, do not endure;
  - type: text
    content: they are like the beasts that perish.
  '13':
  - type: text
    content: This is the fate of those who trust in themselves,
  - type: text
    content: and of their followers, who approve their sayings.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here and at the end of verse 15.
  '14':
  - type: text
    content: They are like sheep and are destined to die;
  - type: text
    content: death will be their shepherd
  - type: text
    content: (but the upright will prevail over them in the morning).
  - type: text
    content: Their forms will decay in the grave,
  - type: text
    content: far from their princely mansions.
  '15':
  - type: text
    content: But God will redeem me from the realm of the dead;
  - type: text
    content: he will surely take me to himself.
  '16':
  - type: text
    content: Do not be overawed when others grow rich,
  - type: text
    content: when the splendor of their houses increases;
  '17':
  - type: text
    content: for they will take nothing with them when they die,
  - type: text
    content: their splendor will not descend with them.
  '18':
  - type: text
    content: Though while they live they count themselves blessed—
  - type: text
    content: and people praise you when you prosper—
  '19':
  - type: text
    content: they will join those who have gone before them,
  - type: text
    content: who will never again see the light of life.
  '2':
  - type: text
    content: both low and high,
  - type: text
    content: 'rich and poor alike:'
  '20':
  - type: text
    content: People who have wealth but lack understanding
  - type: text
    content: are like the beasts that perish.
  '3':
  - type: text
    content: My mouth will speak words of wisdom;
  - type: text
    content: the meditation of my heart will give you understanding.
  '4':
  - type: text
    content: I will turn my ear to a proverb;
  - type: text
    content: 'with the harp I will expound my riddle:'
  '5':
  - type: text
    content: Why should I fear when evil days come,
  - type: text
    content: when wicked deceivers surround me—
  '6':
  - type: text
    content: those who trust in their wealth
  - type: text
    content: and boast of their great riches?
  '7':
  - type: text
    content: No one can redeem the life of another
  - type: text
    content: or give to God a ransom for them—
  '8':
  - type: text
    content: the ransom for a life is costly,
  - type: text
    content: no payment is ever enough—
  '9':
  - type: text
    content: so that they should live on forever
  - type: text
    content: and not see decay.
