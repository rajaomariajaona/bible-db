document_id: PSA.49,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 49
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 49:1-20 is numbered 49:2-21.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the director of music. Of the Sons of Korah. A psalm.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Hear this, all you peoples;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: listen, all who live in this world,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: For all can see that the wise die,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that the foolish and the senseless also perish,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leaving their wealth to others.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Their tombs will remain their houses
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint and Syriac; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: In their thoughts their houses will remain
      marker-yv: yv-n
    - type: text
      text: ' forever,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their dwellings for endless generations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though they had
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: generations, / for they have
      marker-yv: yv-n
    - type: text
      text: ' named lands after themselves.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: People, despite their wealth, do not endure;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are like the beasts that perish.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: This is the fate of those who trust in themselves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and of their followers, who approve their sayings.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '49:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew has '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Selah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a word of uncertain meaning) here and at the end of verse 15.
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: They are like sheep and are destined to die;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: death will be their shepherd
  - type: usfm
    marker: q2
    children:
    - type: text
      text: (but the upright will prevail over them in the morning).
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their forms will decay in the grave,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: far from their princely mansions.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: But God will redeem me from the realm of the dead;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will surely take me to himself.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Do not be overawed when others grow rich,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when the splendor of their houses increases;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: for they will take nothing with them when they die,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their splendor will not descend with them.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Though while they live they count themselves blessed—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and people praise you when you prosper—
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: they will join those who have gone before them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who will never again see the light of life.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: both low and high,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'rich and poor alike:'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: People who have wealth but lack understanding
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are like the beasts that perish.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: My mouth will speak words of wisdom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the meditation of my heart will give you understanding.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: I will turn my ear to a proverb;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'with the harp I will expound my riddle:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Why should I fear when evil days come,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when wicked deceivers surround me—
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: those who trust in their wealth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and boast of their great riches?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: No one can redeem the life of another
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or give to God a ransom for them—
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: the ransom for a life is costly,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no payment is ever enough—
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: so that they should live on forever
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and not see decay.
