document_id: ROM.10,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Brothers and sisters, my heart’s desire and prayer to God for the Israelites is that they may be saved. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'For it is with your heart that you believe and are justified, and it is with your mouth that you profess your faith and are saved. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: As Scripture says, “Anyone who believes in him will never be put to shame.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 28:16 (see Septuagint)
      marker-yv: yv-n
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'For there is no difference between Jew and Gentile—the same Lord is Lord of all and richly blesses all who call on him, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: for, “Everyone who calls on the name of the Lord will be saved.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Joel 2:32
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'How, then, can they call on the one they have not believed in? And how can they believe in the one of whom they have not heard? And how can they hear without someone preaching to them? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And how can anyone preach unless they are sent? As it is written: “How beautiful are the feet of those who bring good news!”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 52:7
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: But not all the Israelites accepted the good news. For Isaiah says, “Lord, who has believed our message?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 53:1
      marker-yv: yv-n
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Consequently, faith comes from hearing the message, and the message is heard through the word about Christ. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'But I ask: Did they not hear? Of course they did:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Their voice has gone out into all the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their words to the ends of the world.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalm 19:4
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Again I ask: Did Israel not understand? First, Moses says,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will make you envious by those who are not a nation;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will make you angry by a nation that has no understanding.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut. 32:21
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'For I can testify about them that they are zealous for God, but their zeal is not based on knowledge. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: And Isaiah boldly says,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I was found by those who did not seek me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I revealed myself to those who did not ask for me.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 65:1
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: But concerning Israel he says,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “All day long I have held out my hands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to a disobedient and obstinate people.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 65:2
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Since they did not know the righteousness of God and sought to establish their own, they did not submit to God’s righteousness. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Christ is the culmination of the law so that there may be righteousness for everyone who believes.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Moses writes this about the righteousness that is by the law: “The person who does these things will live by them.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lev. 18:5
      marker-yv: yv-n
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'But the righteousness that is by faith says: “Do not say in your heart, ‘Who will ascend into heaven?’ ”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut. 30:12
      marker-yv: yv-n
    - type: text
      text: ' (that is, to bring Christ down) '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “or ‘Who will descend into the deep?’ ”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut. 30:13
      marker-yv: yv-n
    - type: text
      text: ' (that is, to bring Christ up from the dead). '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: But what does it say? “The word is near you; it is in your mouth and in your heart,”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut. 30:14
      marker-yv: yv-n
    - type: text
      text: ' that is, the message concerning faith that we proclaim: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'If you declare with your mouth, “Jesus is Lord,” and believe in your heart that God raised him from the dead, you will be saved. '
