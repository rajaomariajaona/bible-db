document_id: ROM.10,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Brothers and sisters, my heart’s desire and prayer to God for the Israelites is that they may be saved. '
  '10':
  - type: text
    content: 'For it is with your heart that you believe and are justified, and it is with your mouth that you profess your faith and are saved. '
  '11':
  - type: text
    content: As Scripture says, “Anyone who believes in him will never be put to shame.”
  - type: note
    content: Isaiah 28:16 (see Septuagint)
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'For there is no difference between Jew and Gentile—the same Lord is Lord of all and richly blesses all who call on him, '
  '13':
  - type: text
    content: for, “Everyone who calls on the name of the Lord will be saved.”
  - type: note
    content: Joel 2:32
  '14':
  - type: text
    content: 'How, then, can they call on the one they have not believed in? And how can they believe in the one of whom they have not heard? And how can they hear without someone preaching to them? '
  '15':
  - type: text
    content: 'And how can anyone preach unless they are sent? As it is written: “How beautiful are the feet of those who bring good news!”'
  - type: note
    content: Isaiah 52:7
  '16':
  - type: text
    content: But not all the Israelites accepted the good news. For Isaiah says, “Lord, who has believed our message?”
  - type: note
    content: Isaiah 53:1
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Consequently, faith comes from hearing the message, and the message is heard through the word about Christ. '
  '18':
  - type: text
    content: 'But I ask: Did they not hear? Of course they did:'
  - type: text
    content: “Their voice has gone out into all the earth,
  - type: text
    content: their words to the ends of the world.”
  - type: note
    content: Psalm 19:4
  '19':
  - type: text
    content: 'Again I ask: Did Israel not understand? First, Moses says,'
  - type: text
    content: “I will make you envious by those who are not a nation;
  - type: text
    content: I will make you angry by a nation that has no understanding.”
  - type: note
    content: Deut. 32:21
  '2':
  - type: text
    content: 'For I can testify about them that they are zealous for God, but their zeal is not based on knowledge. '
  '20':
  - type: text
    content: And Isaiah boldly says,
  - type: text
    content: “I was found by those who did not seek me;
  - type: text
    content: I revealed myself to those who did not ask for me.”
  - type: note
    content: Isaiah 65:1
  '21':
  - type: text
    content: But concerning Israel he says,
  - type: text
    content: “All day long I have held out my hands
  - type: text
    content: to a disobedient and obstinate people.”
  - type: note
    content: Isaiah 65:2
  '3':
  - type: text
    content: 'Since they did not know the righteousness of God and sought to establish their own, they did not submit to God’s righteousness. '
  '4':
  - type: text
    content: Christ is the culmination of the law so that there may be righteousness for everyone who believes.
  '5':
  - type: text
    content: 'Moses writes this about the righteousness that is by the law: “The person who does these things will live by them.”'
  - type: note
    content: Lev. 18:5
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'But the righteousness that is by faith says: “Do not say in your heart, ‘Who will ascend into heaven?’ ”'
  - type: note
    content: Deut. 30:12
  - type: text
    content: ' (that is, to bring Christ down) '
  '7':
  - type: text
    content: “or ‘Who will descend into the deep?’ ”
  - type: note
    content: Deut. 30:13
  - type: text
    content: ' (that is, to bring Christ up from the dead). '
  '8':
  - type: text
    content: But what does it say? “The word is near you; it is in your mouth and in your heart,”
  - type: note
    content: Deut. 30:14
  - type: text
    content: ' that is, the message concerning faith that we proclaim: '
  '9':
  - type: text
    content: 'If you declare with your mouth, “Jesus is Lord,” and believe in your heart that God raised him from the dead, you will be saved. '
