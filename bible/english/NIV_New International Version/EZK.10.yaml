document_id: EZK.10,111
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Glory Departs From the Temple
  - type: text
    content: 'I looked, and I saw the likeness of a throne of lapis lazuli above the vault that was over the heads of the cherubim. '
  '10':
  - type: text
    content: 'As for their appearance, the four of them looked alike; each was like a wheel intersecting a wheel. '
  '11':
  - type: text
    content: As they moved, they would go in any one of the four directions the cherubim faced; the wheels did not turn about
  - type: note
    content: Or aside
  - type: text
    content: ' as the cherubim went. The cherubim went in whatever direction the head faced, without turning as they went. '
  '12':
  - type: text
    content: 'Their entire bodies, including their backs, their hands and their wings, were completely full of eyes, as were their four wheels. '
  '13':
  - type: text
    content: 'I heard the wheels being called “the whirling wheels.” '
  '14':
  - type: text
    content: 'Each of the cherubim had four faces: One face was that of a cherub, the second the face of a human being, the third the face of a lion, and the fourth the face of an eagle.'
  '15':
  - type: text
    content: 'Then the cherubim rose upward. These were the living creatures I had seen by the Kebar River. '
  '16':
  - type: text
    content: 'When the cherubim moved, the wheels beside them moved; and when the cherubim spread their wings to rise from the ground, the wheels did not leave their side. '
  '17':
  - type: text
    content: When the cherubim stood still, they also stood still; and when the cherubim rose, they rose with them, because the spirit of the living creatures was in them.
  '18':
  - type: text
    content: 'Then the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' departed from over the threshold of the temple and stopped above the cherubim. '
  '19':
  - type: text
    content: 'While I watched, the cherubim spread their wings and rose from the ground, and as they went, the wheels went with them. They stopped at the entrance of the east gate of the '
  - type: text
    content: Lord
  - type: text
    content: ’s house, and the glory of the God of Israel was above them.
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to the man clothed in linen, “Go in among the wheels beneath the cherubim. Fill your hands with burning coals from among the cherubim and scatter them over the city.” And as I watched, he went in.'
  '20':
  - type: text
    content: 'These were the living creatures I had seen beneath the God of Israel by the Kebar River, and I realized that they were cherubim. '
  '21':
  - type: text
    content: 'Each had four faces and four wings, and under their wings was what looked like human hands. '
  '22':
  - type: text
    content: Their faces had the same appearance as those I had seen by the Kebar River. Each one went straight ahead.
  '3':
  - type: text
    content: 'Now the cherubim were standing on the south side of the temple when the man went in, and a cloud filled the inner court. '
  '4':
  - type: text
    content: 'Then the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' rose from above the cherubim and moved to the threshold of the temple. The cloud filled the temple, and the court was full of the radiance of the glory of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '5':
  - type: text
    content: The sound of the wings of the cherubim could be heard as far away as the outer court, like the voice of God Almighty
  - type: note
    content: Hebrew El-Shaddai
  - type: text
    content: ' when he speaks.'
  '6':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded the man in linen, “Take fire from among the wheels, from among the cherubim,” the man went in and stood beside a wheel. '
  '7':
  - type: text
    content: 'Then one of the cherubim reached out his hand to the fire that was among them. He took up some of it and put it into the hands of the man in linen, who took it and went out. '
  '8':
  - type: text
    content: (Under the wings of the cherubim could be seen what looked like human hands.)
  '9':
  - type: text
    content: 'I looked, and I saw beside the cherubim four wheels, one beside each of the cherubim; the wheels sparkled like topaz. '
