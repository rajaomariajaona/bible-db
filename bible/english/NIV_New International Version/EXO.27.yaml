document_id: EXO.27,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Altar of Burnt Offering
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “Build an altar of acacia wood, three cubits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 4 1/2 feet or about 1.4 meters
      marker-yv: yv-n
    - type: text
      text: ' high; it is to be square, five cubits long and five cubits wide.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 7 1/2 feet or about 2.3 meters long and wide
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'with twenty posts and twenty bronze bases and with silver hooks and bands on the posts. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The north side shall also be a hundred cubits long and is to have curtains, with twenty posts and twenty bronze bases and with silver hooks and bands on the posts.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “The west end of the courtyard shall be fifty cubits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 75 feet or about 23 meters; also in verse 13
      marker-yv: yv-n
    - type: text
      text: ' wide and have curtains, with ten posts and ten bases. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'On the east end, toward the sunrise, the courtyard shall also be fifty cubits wide. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Curtains fifteen cubits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 23 feet or about 6.8 meters; also in verse 15
      marker-yv: yv-n
    - type: text
      text: ' long are to be on one side of the entrance, with three posts and three bases, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: and curtains fifteen cubits long are to be on the other side, with three posts and three bases.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “For the entrance to the courtyard, provide a curtain twenty cubits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 30 feet or about 9 meters
      marker-yv: yv-n
    - type: text
      text: ' long, of blue, purple and scarlet yarn and finely twisted linen—the work of an embroiderer—with four posts and four bases. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'All the posts around the courtyard are to have silver bands and hooks, and bronze bases. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: The courtyard shall be a hundred cubits long and fifty cubits wide,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 150 feet long and 75 feet wide or about 45 meters long and 23 meters wide
      marker-yv: yv-n
    - type: text
      text: ' with curtains of finely twisted linen five cubits'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 7 1/2 feet or about 2.3 meters
      marker-yv: yv-n
    - type: text
      text: ' high, and with bronze bases. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: All the other articles used in the service of the tabernacle, whatever their function, including all the tent pegs for it and those for the courtyard, are to be of bronze.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Oil for the Lampstand
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Make a horn at each of the four corners, so that the horns and the altar are of one piece, and overlay the altar with bronze. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '“Command the Israelites to bring you clear oil of pressed olives for the light so that the lamps may be kept burning. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'In the tent of meeting, outside the curtain that shields the ark of the covenant law, Aaron and his sons are to keep the lamps burning before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' from evening till morning. This is to be a lasting ordinance among the Israelites for the generations to come.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Make all its utensils of bronze—its pots to remove the ashes, and its shovels, sprinkling bowls, meat forks and firepans. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Make a grating for it, a bronze network, and make a bronze ring at each of the four corners of the network. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Put it under the ledge of the altar so that it is halfway up the altar. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Make poles of acacia wood for the altar and overlay them with bronze. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The poles are to be inserted into the rings so they will be on two sides of the altar when it is carried. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Make the altar hollow, out of boards. It is to be made just as you were shown on the mountain.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Courtyard
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: “Make a courtyard for the tabernacle. The south side shall be a hundred cubits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 150 feet or about 45 meters; also in verse 11
      marker-yv: yv-n
    - type: text
      text: ' long and is to have curtains of finely twisted linen, '
