document_id: EXO.27,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Altar of Burnt Offering
  - type: text
    content: “Build an altar of acacia wood, three cubits
  - type: note
    content: That is, about 4 1/2 feet or about 1.4 meters
  - type: text
    content: ' high; it is to be square, five cubits long and five cubits wide.'
  - type: note
    content: That is, about 7 1/2 feet or about 2.3 meters long and wide
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'with twenty posts and twenty bronze bases and with silver hooks and bands on the posts. '
  '11':
  - type: text
    content: The north side shall also be a hundred cubits long and is to have curtains, with twenty posts and twenty bronze bases and with silver hooks and bands on the posts.
  '12':
  - type: text
    content: “The west end of the courtyard shall be fifty cubits
  - type: note
    content: That is, about 75 feet or about 23 meters; also in verse 13
  - type: text
    content: ' wide and have curtains, with ten posts and ten bases. '
  '13':
  - type: text
    content: 'On the east end, toward the sunrise, the courtyard shall also be fifty cubits wide. '
  '14':
  - type: text
    content: Curtains fifteen cubits
  - type: note
    content: That is, about 23 feet or about 6.8 meters; also in verse 15
  - type: text
    content: ' long are to be on one side of the entrance, with three posts and three bases, '
  '15':
  - type: text
    content: and curtains fifteen cubits long are to be on the other side, with three posts and three bases.
  '16':
  - type: text
    content: “For the entrance to the courtyard, provide a curtain twenty cubits
  - type: note
    content: That is, about 30 feet or about 9 meters
  - type: text
    content: ' long, of blue, purple and scarlet yarn and finely twisted linen—the work of an embroiderer—with four posts and four bases. '
  '17':
  - type: text
    content: 'All the posts around the courtyard are to have silver bands and hooks, and bronze bases. '
  '18':
  - type: text
    content: The courtyard shall be a hundred cubits long and fifty cubits wide,
  - type: note
    content: That is, about 150 feet long and 75 feet wide or about 45 meters long and 23 meters wide
  - type: text
    content: ' with curtains of finely twisted linen five cubits'
  - type: note
    content: That is, about 7 1/2 feet or about 2.3 meters
  - type: text
    content: ' high, and with bronze bases. '
  '19':
  - type: text
    content: All the other articles used in the service of the tabernacle, whatever their function, including all the tent pegs for it and those for the courtyard, are to be of bronze.
  - type: heading
    content: Oil for the Lampstand
  '2':
  - type: text
    content: 'Make a horn at each of the four corners, so that the horns and the altar are of one piece, and overlay the altar with bronze. '
  '20':
  - type: text
    content: '“Command the Israelites to bring you clear oil of pressed olives for the light so that the lamps may be kept burning. '
  '21':
  - type: text
    content: 'In the tent of meeting, outside the curtain that shields the ark of the covenant law, Aaron and his sons are to keep the lamps burning before the '
  - type: text
    content: Lord
  - type: text
    content: ' from evening till morning. This is to be a lasting ordinance among the Israelites for the generations to come.'
  '3':
  - type: text
    content: 'Make all its utensils of bronze—its pots to remove the ashes, and its shovels, sprinkling bowls, meat forks and firepans. '
  '4':
  - type: text
    content: 'Make a grating for it, a bronze network, and make a bronze ring at each of the four corners of the network. '
  '5':
  - type: text
    content: 'Put it under the ledge of the altar so that it is halfway up the altar. '
  '6':
  - type: text
    content: 'Make poles of acacia wood for the altar and overlay them with bronze. '
  '7':
  - type: text
    content: 'The poles are to be inserted into the rings so they will be on two sides of the altar when it is carried. '
  '8':
  - type: text
    content: Make the altar hollow, out of boards. It is to be made just as you were shown on the mountain.
  - type: heading
    content: The Courtyard
  '9':
  - type: text
    content: “Make a courtyard for the tabernacle. The south side shall be a hundred cubits
  - type: note
    content: That is, about 150 feet or about 45 meters; also in verse 11
  - type: text
    content: ' long and is to have curtains of finely twisted linen, '
