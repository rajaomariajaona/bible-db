document_id: PSA.71,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 71
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I have taken refuge;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let me never be put to shame.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: For my enemies speak against me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who wait to kill me conspire together.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: They say, “God has forsaken him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pursue him and seize him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for no one will rescue him.”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Do not be far from me, my God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: come quickly, God, to help me.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: May my accusers perish in shame;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may those who want to harm me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: be covered with scorn and disgrace.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: As for me, I will always have hope;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will praise you more and more.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: My mouth will tell of your righteous deeds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of your saving acts all day long—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though I know not how to relate them all.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'I will come and proclaim your mighty acts, Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will proclaim your righteous deeds, yours alone.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Since my youth, God, you have taught me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to this day I declare your marvelous deeds.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Even when I am old and gray,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not forsake me, my God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: till I declare your power to the next generation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your mighty acts to all who are to come.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Your righteousness, God, reaches to the heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who have done great things.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who is like you, God?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: In your righteousness, rescue me and deliver me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turn your ear to me and save me.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Though you have made me see troubles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: many and bitter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will restore my life again;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the depths of the earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will again bring me up.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: You will increase my honor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and comfort me once more.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: I will praise you with the harp
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for your faithfulness, my God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will sing praise to you with the lyre,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Holy One of Israel.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: My lips will shout for joy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I sing praise to you—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I whom you have delivered.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: My tongue will tell of your righteous acts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all day long,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for those who wanted to harm me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have been put to shame and confusion.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Be my rock of refuge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to which I can always go;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: give the command to save me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you are my rock and my fortress.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Deliver me, my God, from the hand of the wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the grasp of those who are evil and cruel.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'For you have been my hope, Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my confidence since my youth.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: From birth I have relied on you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you brought me forth from my mother’s womb.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will ever praise you.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: I have become a sign to many;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you are my strong refuge.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: My mouth is filled with your praise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: declaring your splendor all day long.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Do not cast me away when I am old;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not forsake me when my strength is gone.
