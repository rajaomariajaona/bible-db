document_id: PSA.71,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 71
  - type: text
    content: 'In you, '
  - type: text
    content: Lord
  - type: text
    content: ', I have taken refuge;'
  - type: text
    content: let me never be put to shame.
  '10':
  - type: text
    content: For my enemies speak against me;
  - type: text
    content: those who wait to kill me conspire together.
  '11':
  - type: text
    content: They say, “God has forsaken him;
  - type: text
    content: pursue him and seize him,
  - type: text
    content: for no one will rescue him.”
  '12':
  - type: text
    content: Do not be far from me, my God;
  - type: text
    content: come quickly, God, to help me.
  '13':
  - type: text
    content: May my accusers perish in shame;
  - type: text
    content: may those who want to harm me
  - type: text
    content: be covered with scorn and disgrace.
  '14':
  - type: text
    content: As for me, I will always have hope;
  - type: text
    content: I will praise you more and more.
  '15':
  - type: text
    content: My mouth will tell of your righteous deeds,
  - type: text
    content: of your saving acts all day long—
  - type: text
    content: though I know not how to relate them all.
  '16':
  - type: text
    content: 'I will come and proclaim your mighty acts, Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: I will proclaim your righteous deeds, yours alone.
  '17':
  - type: text
    content: Since my youth, God, you have taught me,
  - type: text
    content: and to this day I declare your marvelous deeds.
  '18':
  - type: text
    content: Even when I am old and gray,
  - type: text
    content: do not forsake me, my God,
  - type: text
    content: till I declare your power to the next generation,
  - type: text
    content: your mighty acts to all who are to come.
  '19':
  - type: text
    content: Your righteousness, God, reaches to the heavens,
  - type: text
    content: you who have done great things.
  - type: text
    content: Who is like you, God?
  '2':
  - type: text
    content: In your righteousness, rescue me and deliver me;
  - type: text
    content: turn your ear to me and save me.
  '20':
  - type: text
    content: Though you have made me see troubles,
  - type: text
    content: many and bitter,
  - type: text
    content: you will restore my life again;
  - type: text
    content: from the depths of the earth
  - type: text
    content: you will again bring me up.
  '21':
  - type: text
    content: You will increase my honor
  - type: text
    content: and comfort me once more.
  '22':
  - type: text
    content: I will praise you with the harp
  - type: text
    content: for your faithfulness, my God;
  - type: text
    content: I will sing praise to you with the lyre,
  - type: text
    content: Holy One of Israel.
  '23':
  - type: text
    content: My lips will shout for joy
  - type: text
    content: when I sing praise to you—
  - type: text
    content: I whom you have delivered.
  '24':
  - type: text
    content: My tongue will tell of your righteous acts
  - type: text
    content: all day long,
  - type: text
    content: for those who wanted to harm me
  - type: text
    content: have been put to shame and confusion.
  '3':
  - type: text
    content: Be my rock of refuge,
  - type: text
    content: to which I can always go;
  - type: text
    content: give the command to save me,
  - type: text
    content: for you are my rock and my fortress.
  '4':
  - type: text
    content: Deliver me, my God, from the hand of the wicked,
  - type: text
    content: from the grasp of those who are evil and cruel.
  '5':
  - type: text
    content: 'For you have been my hope, Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: my confidence since my youth.
  '6':
  - type: text
    content: From birth I have relied on you;
  - type: text
    content: you brought me forth from my mother’s womb.
  - type: text
    content: I will ever praise you.
  '7':
  - type: text
    content: I have become a sign to many;
  - type: text
    content: you are my strong refuge.
  '8':
  - type: text
    content: My mouth is filled with your praise,
  - type: text
    content: declaring your splendor all day long.
  '9':
  - type: text
    content: Do not cast me away when I am old;
  - type: text
    content: do not forsake me when my strength is gone.
