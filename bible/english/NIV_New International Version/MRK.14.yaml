document_id: MRK.14,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Anointed at Bethany
  - type: text
    content: 'Now the Passover and the Festival of Unleavened Bread were only two days away, and the chief priests and the teachers of the law were scheming to arrest Jesus secretly and kill him. '
  '10':
  - type: text
    content: 'Then Judas Iscariot, one of the Twelve, went to the chief priests to betray Jesus to them. '
  '11':
  - type: text
    content: They were delighted to hear this and promised to give him money. So he watched for an opportunity to hand him over.
  - type: heading
    content: The Last Supper
  '12':
  - type: text
    content: On the first day of the Festival of Unleavened Bread, when it was customary to sacrifice the Passover lamb, Jesus’ disciples asked him, “Where do you want us to go and make preparations for you to eat the Passover?”
  '13':
  - type: text
    content: 'So he sent two of his disciples, telling them, '
  - type: text
    content: “Go into the city, and a man carrying a jar of water will meet you. Follow him.
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'Say to the owner of the house he enters, ‘The Teacher asks: Where is my guest room, where I may eat the Passover with my disciples?’'
  - type: text
    content: ' '
  '15':
  - type: text
    content: He will show you a large room upstairs, furnished and ready. Make preparations for us there.”
  '16':
  - type: text
    content: The disciples left, went into the city and found things just as Jesus had told them. So they prepared the Passover.
  '17':
  - type: text
    content: 'When evening came, Jesus arrived with the Twelve. '
  '18':
  - type: text
    content: 'While they were reclining at the table eating, he said, '
  - type: text
    content: “Truly I tell you, one of you will betray me—one who is eating with me.”
  '19':
  - type: text
    content: They were saddened, and one by one they said to him, “Surely you don’t mean me?”
  '2':
  - type: text
    content: “But not during the festival,” they said, “or the people may riot.”
  '20':
  - type: text
    content: ' '
  - type: text
    content: “It is one of the Twelve,”
  - type: text
    content: ' he replied, '
  - type: text
    content: “one who dips bread into the bowl with me.
  - type: text
    content: ' '
  '21':
  - type: text
    content: The Son of Man will go just as it is written about him. But woe to that man who betrays the Son of Man! It would be better for him if he had not been born.”
  '22':
  - type: text
    content: 'While they were eating, Jesus took bread, and when he had given thanks, he broke it and gave it to his disciples, saying, '
  - type: text
    content: “Take it; this is my body.”
  '23':
  - type: text
    content: Then he took a cup, and when he had given thanks, he gave it to them, and they all drank from it.
  '24':
  - type: text
    content: ' '
  - type: text
    content: “This is my blood of the
  - type: text
    content: ' '
  - type: note
    content: Some manuscripts the new
  - type: text
    content: covenant, which is poured out for many,”
  - type: text
    content: ' he said to them. '
  '25':
  - type: text
    content: “Truly I tell you, I will not drink again from the fruit of the vine until that day when I drink it new in the kingdom of God.”
  '26':
  - type: text
    content: When they had sung a hymn, they went out to the Mount of Olives.
  - type: heading
    content: Jesus Predicts Peter’s Denial
  '27':
  - type: text
    content: ' '
  - type: text
    content: “You will all fall away,”
  - type: text
    content: ' Jesus told them, '
  - type: text
    content: '“for it is written:'
  - type: text
    content: “ ‘I will strike the shepherd,
  - type: text
    content: and the sheep will be scattered.’
  - type: note
    content: Zech. 13:7
  '28':
  - type: text
    content: ' '
  - type: text
    content: But after I have risen, I will go ahead of you into Galilee.”
  '29':
  - type: text
    content: Peter declared, “Even if all fall away, I will not.”
  '3':
  - type: text
    content: While he was in Bethany, reclining at the table in the home of Simon the Leper, a woman came with an alabaster jar of very expensive perfume, made of pure nard. She broke the jar and poured the perfume on his head.
  '30':
  - type: text
    content: ' '
  - type: text
    content: “Truly I tell you,”
  - type: text
    content: ' Jesus answered, '
  - type: text
    content: “today—yes, tonight—before the rooster crows twice
  - type: note
    content: Some early manuscripts do not have twice.
  - type: text
    content: ' '
  - type: text
    content: you yourself will disown me three times.”
  '31':
  - type: text
    content: But Peter insisted emphatically, “Even if I have to die with you, I will never disown you.” And all the others said the same.
  - type: heading
    content: Gethsemane
  '32':
  - type: text
    content: 'They went to a place called Gethsemane, and Jesus said to his disciples, '
  - type: text
    content: “Sit here while I pray.”
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'He took Peter, James and John along with him, and he began to be deeply distressed and troubled. '
  '34':
  - type: text
    content: “My soul is overwhelmed with sorrow to the point of death,”
  - type: text
    content: ' he said to them. '
  - type: text
    content: “Stay here and keep watch.”
  '35':
  - type: text
    content: 'Going a little farther, he fell to the ground and prayed that if possible the hour might pass from him. '
  '36':
  - type: text
    content: '“Abba, '
  - type: note
    content: Aramaic for father
  - type: text
    content: Father,”
  - type: text
    content: ' he said, '
  - type: text
    content: “everything is possible for you. Take this cup from me. Yet not what I will, but what you will.”
  '37':
  - type: text
    content: 'Then he returned to his disciples and found them sleeping. '
  - type: text
    content: “Simon,”
  - type: text
    content: ' he said to Peter, '
  - type: text
    content: “are you asleep? Couldn’t you keep watch for one hour?
  - type: text
    content: ' '
  '38':
  - type: text
    content: Watch and pray so that you will not fall into temptation. The spirit is willing, but the flesh is weak.”
  '39':
  - type: text
    content: 'Once more he went away and prayed the same thing. '
  '4':
  - type: text
    content: 'Some of those present were saying indignantly to one another, “Why this waste of perfume? '
  '40':
  - type: text
    content: When he came back, he again found them sleeping, because their eyes were heavy. They did not know what to say to him.
  '41':
  - type: text
    content: 'Returning the third time, he said to them, '
  - type: text
    content: “Are you still sleeping and resting? Enough! The hour has come. Look, the Son of Man is delivered into the hands of sinners.
  - type: text
    content: ' '
  '42':
  - type: text
    content: Rise! Let us go! Here comes my betrayer!”
  - type: heading
    content: Jesus Arrested
  '43':
  - type: text
    content: Just as he was speaking, Judas, one of the Twelve, appeared. With him was a crowd armed with swords and clubs, sent from the chief priests, the teachers of the law, and the elders.
  '44':
  - type: text
    content: 'Now the betrayer had arranged a signal with them: “The one I kiss is the man; arrest him and lead him away under guard.” '
  '45':
  - type: text
    content: 'Going at once to Jesus, Judas said, “Rabbi!” and kissed him. '
  '46':
  - type: text
    content: 'The men seized Jesus and arrested him. '
  '47':
  - type: text
    content: Then one of those standing near drew his sword and struck the servant of the high priest, cutting off his ear.
  '48':
  - type: text
    content: ' '
  - type: text
    content: “Am I leading a rebellion,”
  - type: text
    content: ' said Jesus, '
  - type: text
    content: “that you have come out with swords and clubs to capture me?
  - type: text
    content: ' '
  '49':
  - type: text
    content: Every day I was with you, teaching in the temple courts, and you did not arrest me. But the Scriptures must be fulfilled.”
  - type: text
    content: ' '
  '5':
  - type: text
    content: It could have been sold for more than a year’s wages
  - type: note
    content: Greek than three hundred denarii
  - type: text
    content: ' and the money given to the poor.” And they rebuked her harshly.'
  '50':
  - type: text
    content: Then everyone deserted him and fled.
  '51':
  - type: text
    content: 'A young man, wearing nothing but a linen garment, was following Jesus. When they seized him, '
  '52':
  - type: text
    content: he fled naked, leaving his garment behind.
  - type: heading
    content: Jesus Before the Sanhedrin
  '53':
  - type: text
    content: 'They took Jesus to the high priest, and all the chief priests, the elders and the teachers of the law came together. '
  '54':
  - type: text
    content: Peter followed him at a distance, right into the courtyard of the high priest. There he sat with the guards and warmed himself at the fire.
  '55':
  - type: text
    content: 'The chief priests and the whole Sanhedrin were looking for evidence against Jesus so that they could put him to death, but they did not find any. '
  '56':
  - type: text
    content: Many testified falsely against him, but their statements did not agree.
  '57':
  - type: text
    content: 'Then some stood up and gave this false testimony against him: '
  '58':
  - type: text
    content: '“We heard him say, ‘I will destroy this temple made with human hands and in three days will build another, not made with hands.’ ” '
  '59':
  - type: text
    content: Yet even then their testimony did not agree.
  '6':
  - type: text
    content: ' '
  - type: text
    content: “Leave her alone,”
  - type: text
    content: ' said Jesus. '
  - type: text
    content: “Why are you bothering her? She has done a beautiful thing to me.
  - type: text
    content: ' '
  '60':
  - type: text
    content: 'Then the high priest stood up before them and asked Jesus, “Are you not going to answer? What is this testimony that these men are bringing against you?” '
  '61':
  - type: text
    content: But Jesus remained silent and gave no answer.
  - type: text
    content: Again the high priest asked him, “Are you the Messiah, the Son of the Blessed One?”
  '62':
  - type: text
    content: ' '
  - type: text
    content: “I am,”
  - type: text
    content: ' said Jesus. '
  - type: text
    content: “And you will see the Son of Man sitting at the right hand of the Mighty One and coming on the clouds of heaven.”
  '63':
  - type: text
    content: 'The high priest tore his clothes. “Why do we need any more witnesses?” he asked. '
  '64':
  - type: text
    content: “You have heard the blasphemy. What do you think?”
  - type: text
    content: 'They all condemned him as worthy of death. '
  '65':
  - type: text
    content: Then some began to spit at him; they blindfolded him, struck him with their fists, and said, “Prophesy!” And the guards took him and beat him.
  - type: heading
    content: Peter Disowns Jesus
  '66':
  - type: text
    content: 'While Peter was below in the courtyard, one of the servant girls of the high priest came by. '
  '67':
  - type: text
    content: When she saw Peter warming himself, she looked closely at him.
  - type: text
    content: “You also were with that Nazarene, Jesus,” she said.
  '68':
  - type: text
    content: But he denied it. “I don’t know or understand what you’re talking about,” he said, and went out into the entryway.
  - type: note
    content: Some early manuscripts entryway and the rooster crowed
  '69':
  - type: text
    content: 'When the servant girl saw him there, she said again to those standing around, “This fellow is one of them.” '
  '7':
  - type: text
    content: The poor you will always have with you,
  - type: note
    content: See Deut. 15:11.
  - type: text
    content: ' '
  - type: text
    content: and you can help them any time you want. But you will not always have me.
  - type: text
    content: ' '
  '70':
  - type: text
    content: Again he denied it.
  - type: text
    content: After a little while, those standing near said to Peter, “Surely you are one of them, for you are a Galilean.”
  '71':
  - type: text
    content: He began to call down curses, and he swore to them, “I don’t know this man you’re talking about.”
  '72':
  - type: text
    content: Immediately the rooster crowed the second time.
  - type: note
    content: Some early manuscripts do not have the second time.
  - type: text
    content: ' Then Peter remembered the word Jesus had spoken to him: '
  - type: text
    content: “Before the rooster crows twice
  - type: note
    content: Some early manuscripts do not have twice.
  - type: text
    content: ' '
  - type: text
    content: you will disown me three times.”
  - type: text
    content: ' And he broke down and wept.'
  '8':
  - type: text
    content: She did what she could. She poured perfume on my body beforehand to prepare for my burial.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Truly I tell you, wherever the gospel is preached throughout the world, what she has done will also be told, in memory of her.”
