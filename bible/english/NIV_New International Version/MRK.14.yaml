document_id: MRK.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Anointed at Bethany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now the Passover and the Festival of Unleavened Bread were only two days away, and the chief priests and the teachers of the law were scheming to arrest Jesus secretly and kill him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “But not during the festival,” they said, “or the people may riot.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: While he was in Bethany, reclining at the table in the home of Simon the Leper, a woman came with an alabaster jar of very expensive perfume, made of pure nard. She broke the jar and poured the perfume on his head.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Some of those present were saying indignantly to one another, “Why this waste of perfume? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: It could have been sold for more than a year’s wages
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: than three hundred denarii
    marker-yv: yv-n
  - type: text
    text: ' and the money given to the poor.” And they rebuked her harshly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Leave her alone,”
  - type: text
    text: ' said Jesus. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why are you bothering her? She has done a beautiful thing to me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The poor you will always have with you,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See Deut. 15:11.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and you can help them any time you want. But you will not always have me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: She did what she could. She poured perfume on my body beforehand to prepare for my burial.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Truly I tell you, wherever the gospel is preached throughout the world, what she has done will also be told, in memory of her.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then Judas Iscariot, one of the Twelve, went to the chief priests to betray Jesus to them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They were delighted to hear this and promised to give him money. So he watched for an opportunity to hand him over.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Last Supper
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: On the first day of the Festival of Unleavened Bread, when it was customary to sacrifice the Passover lamb, Jesus’ disciples asked him, “Where do you want us to go and make preparations for you to eat the Passover?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'So he sent two of his disciples, telling them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go into the city, and a man carrying a jar of water will meet you. Follow him.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'Say to the owner of the house he enters, ‘The Teacher asks: Where is my guest room, where I may eat the Passover with my disciples?’'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He will show you a large room upstairs, furnished and ready. Make preparations for us there.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The disciples left, went into the city and found things just as Jesus had told them. So they prepared the Passover.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'When evening came, Jesus arrived with the Twelve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'While they were reclining at the table eating, he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Truly I tell you, one of you will betray me—one who is eating with me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: They were saddened, and one by one they said to him, “Surely you don’t mean me?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “It is one of the Twelve,”
  - type: text
    text: ' he replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “one who dips bread into the bowl with me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The Son of Man will go just as it is written about him. But woe to that man who betrays the Son of Man! It would be better for him if he had not been born.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'While they were eating, Jesus took bread, and when he had given thanks, he broke it and gave it to his disciples, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Take it; this is my body.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Then he took a cup, and when he had given thanks, he gave it to them, and they all drank from it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “This is my blood of the
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the new
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: covenant, which is poured out for many,”
  - type: text
    text: ' he said to them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Truly I tell you, I will not drink again from the fruit of the vine until that day when I drink it new in the kingdom of God.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: When they had sung a hymn, they went out to the Mount of Olives.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Predicts Peter’s Denial
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You will all fall away,”
  - type: text
    text: ' Jesus told them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“for it is written:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “ ‘I will strike the shepherd,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and the sheep will be scattered.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Zech. 13:7
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But after I have risen, I will go ahead of you into Galilee.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Peter declared, “Even if all fall away, I will not.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Truly I tell you,”
  - type: text
    text: ' Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “today—yes, tonight—before the rooster crows twice
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some early manuscripts do not have '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: twice.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you yourself will disown me three times.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: But Peter insisted emphatically, “Even if I have to die with you, I will never disown you.” And all the others said the same.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Gethsemane
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'They went to a place called Gethsemane, and Jesus said to his disciples, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Sit here while I pray.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'He took Peter, James and John along with him, and he began to be deeply distressed and troubled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My soul is overwhelmed with sorrow to the point of death,”
  - type: text
    text: ' he said to them. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Stay here and keep watch.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Going a little farther, he fell to the ground and prayed that if possible the hour might pass from him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: tl
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Abba, '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Aramaic for '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: father
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Father,”
  - type: text
    text: ' he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “everything is possible for you. Take this cup from me. Yet not what I will, but what you will.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Then he returned to his disciples and found them sleeping. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Simon,”
  - type: text
    text: ' he said to Peter, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “are you asleep? Couldn’t you keep watch for one hour?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Watch and pray so that you will not fall into temptation. The spirit is willing, but the flesh is weak.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Once more he went away and prayed the same thing. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: When he came back, he again found them sleeping, because their eyes were heavy. They did not know what to say to him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Returning the third time, he said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Are you still sleeping and resting? Enough! The hour has come. Look, the Son of Man is delivered into the hands of sinners.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Rise! Let us go! Here comes my betrayer!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Arrested
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Just as he was speaking, Judas, one of the Twelve, appeared. With him was a crowd armed with swords and clubs, sent from the chief priests, the teachers of the law, and the elders.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Now the betrayer had arranged a signal with them: “The one I kiss is the man; arrest him and lead him away under guard.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Going at once to Jesus, Judas said, “Rabbi!” and kissed him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'The men seized Jesus and arrested him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Then one of those standing near drew his sword and struck the servant of the high priest, cutting off his ear.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Am I leading a rebellion,”
  - type: text
    text: ' said Jesus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “that you have come out with swords and clubs to capture me?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Every day I was with you, teaching in the temple courts, and you did not arrest me. But the Scriptures must be fulfilled.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Then everyone deserted him and fled.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'A young man, wearing nothing but a linen garment, was following Jesus. When they seized him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: he fled naked, leaving his garment behind.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Before the Sanhedrin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'They took Jesus to the high priest, and all the chief priests, the elders and the teachers of the law came together. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Peter followed him at a distance, right into the courtyard of the high priest. There he sat with the guards and warmed himself at the fire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'The chief priests and the whole Sanhedrin were looking for evidence against Jesus so that they could put him to death, but they did not find any. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Many testified falsely against him, but their statements did not agree.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Then some stood up and gave this false testimony against him: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: '“We heard him say, ‘I will destroy this temple made with human hands and in three days will build another, not made with hands.’ ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Yet even then their testimony did not agree.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Then the high priest stood up before them and asked Jesus, “Are you not going to answer? What is this testimony that these men are bringing against you?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: But Jesus remained silent and gave no answer.
- type: usfm
  marker: p
  children:
  - type: text
    text: Again the high priest asked him, “Are you the Messiah, the Son of the Blessed One?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I am,”
  - type: text
    text: ' said Jesus. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “And you will see the Son of Man sitting at the right hand of the Mighty One and coming on the clouds of heaven.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'The high priest tore his clothes. “Why do we need any more witnesses?” he asked. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: “You have heard the blasphemy. What do you think?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'They all condemned him as worthy of death. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: Then some began to spit at him; they blindfolded him, struck him with their fists, and said, “Prophesy!” And the guards took him and beat him.
