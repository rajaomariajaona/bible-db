document_id: JHN.9,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Heals a Man Born Blind
  - type: text
    content: 'As he went along, he saw a man blind from birth. '
  '10':
  - type: text
    content: “How then were your eyes opened?” they asked.
  '11':
  - type: text
    content: He replied, “The man they call Jesus made some mud and put it on my eyes. He told me to go to Siloam and wash. So I went and washed, and then I could see.”
  '12':
  - type: text
    content: “Where is this man?” they asked him.
  - type: text
    content: “I don’t know,” he said.
  - type: heading
    content: The Pharisees Investigate the Healing
  '13':
  - type: text
    content: 'They brought to the Pharisees the man who had been blind. '
  '14':
  - type: text
    content: 'Now the day on which Jesus had made the mud and opened the man’s eyes was a Sabbath. '
  '15':
  - type: text
    content: Therefore the Pharisees also asked him how he had received his sight. “He put mud on my eyes,” the man replied, “and I washed, and now I see.”
  '16':
  - type: text
    content: Some of the Pharisees said, “This man is not from God, for he does not keep the Sabbath.”
  - type: text
    content: But others asked, “How can a sinner perform such signs?” So they were divided.
  '17':
  - type: text
    content: Then they turned again to the blind man, “What have you to say about him? It was your eyes he opened.”
  - type: text
    content: The man replied, “He is a prophet.”
  '18':
  - type: text
    content: 'They still did not believe that he had been blind and had received his sight until they sent for the man’s parents. '
  '19':
  - type: text
    content: “Is this your son?” they asked. “Is this the one you say was born blind? How is it that now he can see?”
  '2':
  - type: text
    content: His disciples asked him, “Rabbi, who sinned, this man or his parents, that he was born blind?”
  '20':
  - type: text
    content: '“We know he is our son,” the parents answered, “and we know he was born blind. '
  '21':
  - type: text
    content: 'But how he can see now, or who opened his eyes, we don’t know. Ask him. He is of age; he will speak for himself.” '
  '22':
  - type: text
    content: 'His parents said this because they were afraid of the Jewish leaders, who already had decided that anyone who acknowledged that Jesus was the Messiah would be put out of the synagogue. '
  '23':
  - type: text
    content: That was why his parents said, “He is of age; ask him.”
  '24':
  - type: text
    content: A second time they summoned the man who had been blind. “Give glory to God by telling the truth,” they said. “We know this man is a sinner.”
  '25':
  - type: text
    content: He replied, “Whether he is a sinner or not, I don’t know. One thing I do know. I was blind but now I see!”
  '26':
  - type: text
    content: Then they asked him, “What did he do to you? How did he open your eyes?”
  '27':
  - type: text
    content: He answered, “I have told you already and you did not listen. Why do you want to hear it again? Do you want to become his disciples too?”
  '28':
  - type: text
    content: 'Then they hurled insults at him and said, “You are this fellow’s disciple! We are disciples of Moses! '
  '29':
  - type: text
    content: We know that God spoke to Moses, but as for this fellow, we don’t even know where he comes from.”
  '3':
  - type: text
    content: ' '
  - type: text
    content: “Neither this man nor his parents sinned,”
  - type: text
    content: ' said Jesus, '
  - type: text
    content: “but this happened so that the works of God might be displayed in him.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'The man answered, “Now that is remarkable! You don’t know where he comes from, yet he opened my eyes. '
  '31':
  - type: text
    content: 'We know that God does not listen to sinners. He listens to the godly person who does his will. '
  '32':
  - type: text
    content: 'Nobody has ever heard of opening the eyes of a man born blind. '
  '33':
  - type: text
    content: If this man were not from God, he could do nothing.”
  '34':
  - type: text
    content: To this they replied, “You were steeped in sin at birth; how dare you lecture us!” And they threw him out.
  - type: heading
    content: Spiritual Blindness
  '35':
  - type: text
    content: 'Jesus heard that they had thrown him out, and when he found him, he said, '
  - type: text
    content: “Do you believe in the Son of Man?”
  '36':
  - type: text
    content: “Who is he, sir?” the man asked. “Tell me so that I may believe in him.”
  '37':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “You have now seen him; in fact, he is the one speaking with you.”
  '38':
  - type: text
    content: Then the man said, “Lord, I believe,” and he worshiped him.
  '39':
  - type: text
    content: Jesus said,
  - type: note
    content: Some early manuscripts do not have Then the man said… 39 Jesus said,
  - type: text
    content: ' '
  - type: text
    content: “For judgment I have come into this world, so that the blind will see and those who see will become blind.”
  '4':
  - type: text
    content: As long as it is day, we must do the works of him who sent me. Night is coming, when no one can work.
  - type: text
    content: ' '
  '40':
  - type: text
    content: Some Pharisees who were with him heard him say this and asked, “What? Are we blind too?”
  '41':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “If you were blind, you would not be guilty of sin; but now that you claim you can see, your guilt remains.
  '5':
  - type: text
    content: While I am in the world, I am the light of the world.”
  '6':
  - type: text
    content: 'After saying this, he spit on the ground, made some mud with the saliva, and put it on the man’s eyes. '
  '7':
  - type: text
    content: “Go,”
  - type: text
    content: ' he told him, '
  - type: text
    content: “wash in the Pool of Siloam”
  - type: text
    content: ' (this word means “Sent”). So the man went and washed, and came home seeing.'
  '8':
  - type: text
    content: 'His neighbors and those who had formerly seen him begging asked, “Isn’t this the same man who used to sit and beg?” '
  '9':
  - type: text
    content: Some claimed that he was.
  - type: text
    content: Others said, “No, he only looks like him.”
  - type: text
    content: But he himself insisted, “I am the man.”
