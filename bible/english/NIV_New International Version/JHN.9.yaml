document_id: JHN.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals a Man Born Blind
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'As he went along, he saw a man blind from birth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: His disciples asked him, “Rabbi, who sinned, this man or his parents, that he was born blind?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Neither this man nor his parents sinned,”
  - type: text
    text: ' said Jesus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “but this happened so that the works of God might be displayed in him.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: As long as it is day, we must do the works of him who sent me. Night is coming, when no one can work.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: While I am in the world, I am the light of the world.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'After saying this, he spit on the ground, made some mud with the saliva, and put it on the man’s eyes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go,”
  - type: text
    text: ' he told him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “wash in the Pool of Siloam”
  - type: text
    text: ' (this word means “Sent”). So the man went and washed, and came home seeing.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'His neighbors and those who had formerly seen him begging asked, “Isn’t this the same man who used to sit and beg?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Some claimed that he was.
- type: usfm
  marker: p
  children:
  - type: text
    text: Others said, “No, he only looks like him.”
- type: usfm
  marker: p
  children:
  - type: text
    text: But he himself insisted, “I am the man.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “How then were your eyes opened?” they asked.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He replied, “The man they call Jesus made some mud and put it on my eyes. He told me to go to Siloam and wash. So I went and washed, and then I could see.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Where is this man?” they asked him.
- type: usfm
  marker: p
  children:
  - type: text
    text: “I don’t know,” he said.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Pharisees Investigate the Healing
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'They brought to the Pharisees the man who had been blind. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Now the day on which Jesus had made the mud and opened the man’s eyes was a Sabbath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Therefore the Pharisees also asked him how he had received his sight. “He put mud on my eyes,” the man replied, “and I washed, and now I see.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Some of the Pharisees said, “This man is not from God, for he does not keep the Sabbath.”
- type: usfm
  marker: p
  children:
  - type: text
    text: But others asked, “How can a sinner perform such signs?” So they were divided.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then they turned again to the blind man, “What have you to say about him? It was your eyes he opened.”
- type: usfm
  marker: p
  children:
  - type: text
    text: The man replied, “He is a prophet.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'They still did not believe that he had been blind and had received his sight until they sent for the man’s parents. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Is this your son?” they asked. “Is this the one you say was born blind? How is it that now he can see?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '“We know he is our son,” the parents answered, “and we know he was born blind. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'But how he can see now, or who opened his eyes, we don’t know. Ask him. He is of age; he will speak for himself.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'His parents said this because they were afraid of the Jewish leaders, who already had decided that anyone who acknowledged that Jesus was the Messiah would be put out of the synagogue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: That was why his parents said, “He is of age; ask him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: A second time they summoned the man who had been blind. “Give glory to God by telling the truth,” they said. “We know this man is a sinner.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: He replied, “Whether he is a sinner or not, I don’t know. One thing I do know. I was blind but now I see!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Then they asked him, “What did he do to you? How did he open your eyes?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: He answered, “I have told you already and you did not listen. Why do you want to hear it again? Do you want to become his disciples too?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then they hurled insults at him and said, “You are this fellow’s disciple! We are disciples of Moses! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: We know that God spoke to Moses, but as for this fellow, we don’t even know where he comes from.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The man answered, “Now that is remarkable! You don’t know where he comes from, yet he opened my eyes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'We know that God does not listen to sinners. He listens to the godly person who does his will. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Nobody has ever heard of opening the eyes of a man born blind. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: If this man were not from God, he could do nothing.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: To this they replied, “You were steeped in sin at birth; how dare you lecture us!” And they threw him out.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Spiritual Blindness
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jesus heard that they had thrown him out, and when he found him, he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Do you believe in the Son of Man?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: “Who is he, sir?” the man asked. “Tell me so that I may believe in him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You have now seen him; in fact, he is the one speaking with you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Then the man said, “Lord, I believe,” and he worshiped him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Jesus said,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:38,39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some early manuscripts do not have '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Then the man said… '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '39 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jesus said,
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “For judgment I have come into this world, so that the blind will see and those who see will become blind.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Some Pharisees who were with him heard him say this and asked, “What? Are we blind too?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If you were blind, you would not be guilty of sin; but now that you claim you can see, your guilt remains.
