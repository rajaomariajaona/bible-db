  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your laws are right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '138'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '138'
  - type: text
    text: The statutes you have laid down are righteous;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are fully trustworthy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '139'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '139'
  - type: text
    text: My zeal wears me out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for my enemies ignore your words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '140'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '140'
  - type: text
    text: Your promises have been thoroughly tested,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your servant loves them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '141'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '141'
  - type: text
    text: Though I am lowly and despised,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I do not forget your precepts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '142'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '142'
  - type: text
    text: Your righteousness is everlasting
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your law is true.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '143'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '143'
  - type: text
    text: Trouble and distress have come upon me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but your commands give me delight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '144'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '144'
  - type: text
    text: Your statutes are always righteous;
- type: usfm
  marker: q2
  children:
  - type: text
    text: give me understanding that I may live.
- type: usfm
  marker: qa
  children:
  - type: text
    text: ק Qoph
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '145'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '145'
  - type: text
