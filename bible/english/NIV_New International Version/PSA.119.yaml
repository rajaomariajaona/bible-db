  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '137'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '137'
  - type: text
    text: 'You are righteous, '
  - type: usfm
    marker: nd
    children:
    - type: text
