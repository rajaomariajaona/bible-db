- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '108'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '108'
  - type: text
    text: 'Accept, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the willing praise of my mouth,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and teach me your laws.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '109'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '109'
  - type: text
    text: Though I constantly take my life in my hands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will not forget your law.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '110'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '110'
  - type: text
    text: The wicked have set a snare for me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I have not strayed from your precepts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '111'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '111'
  - type: text
    text: Your statutes are my heritage forever;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are the joy of my heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '112'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '112'
  - type: text
    text: My heart is set on keeping your decrees
- type: usfm
  marker: q2
