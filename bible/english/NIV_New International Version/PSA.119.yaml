  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '113'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '113'
  - type: text
    text: I hate double-minded people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I love your law.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '114'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '114'
  - type: text
    text: You are my refuge and my shield;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have put my hope in your word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '115'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '115'
  - type: text
    text: Away from me, you evildoers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I may keep the commands of my God!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '116'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '116'
  - type: text
    text: Sustain me, my God, according to your promise, and I will live;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not let my hopes be dashed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '117'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '117'
  - type: text
    text: Uphold me, and I will be delivered;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will always have regard for your decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '118'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '118'
  - type: text
    text: You reject all who stray from your decrees,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for their delusions come to nothing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '119'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '119'
  - type: text
    text: All the wicked of the earth you discard like dross;
- type: usfm
  marker: q2
  children:
  - type: text
    text: therefore I love your statutes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '120'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '120'
  - type: text
    text: My flesh trembles in fear of you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I stand in awe of your laws.
- type: usfm
  marker: qa
  children:
  - type: text
    text: ע Ayin
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '121'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '121'
  - type: text
    text: I have done what is righteous and just;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not leave me to my oppressors.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '122'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '122'
  - type: text
    text: Ensure your servant’s well-being;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not let the arrogant oppress me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '123'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '123'
  - type: text
    text: My eyes fail, looking for your salvation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: looking for your righteous promise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '124'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '124'
  - type: text
    text: Deal with your servant according to your love
- type: usfm
  marker: q2
  children:
  - type: text
    text: and teach me your decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '125'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '125'
  - type: text
    text: I am your servant; give me discernment
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I may understand your statutes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '126'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '126'
  - type: text
    text: 'It is time for you to act, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your law is being broken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '127'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '127'
  - type: text
    text: Because I love your commands
- type: usfm
  marker: q2
  children:
  - type: text
    text: more than gold, more than pure gold,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '128'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '128'
  - type: text
    text: and because I consider all your precepts right,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I hate every wrong path.
- type: usfm
  marker: qa
  children:
  - type: text
    text: פ Pe
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '129'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '129'
  - type: text
    text: Your statutes are wonderful;
- type: usfm
  marker: q2
  children:
  - type: text
    text: therefore I obey them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '130'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '130'
  - type: text
