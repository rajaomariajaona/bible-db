document_id: PSA.119,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 119
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '119 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This psalm is an acrostic poem, the stanzas of which begin with successive letters of the Hebrew alphabet; moreover, the verses of each stanza begin with the same letter of the Hebrew alphabet.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: qa
    children:
    - type: text
      text: א Aleph
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blessed are those whose ways are blameless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'who walk according to the law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I seek you with all my heart;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not let me stray from your commands.
  '100':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have more understanding than the elders,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I obey your precepts.
  '101':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have kept my feet from every evil path
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that I might obey your word.
  '102':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have not departed from your laws,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you yourself have taught me.
  '103':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How sweet are your words to my taste,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sweeter than honey to my mouth!
  '104':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I gain understanding from your precepts;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: therefore I hate every wrong path.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: נ Nun
    marker-yv: yv-h
  '105':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your word is a lamp for my feet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a light on my path.
  '106':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have taken an oath and confirmed it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that I will follow your righteous laws.
  '107':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have suffered much;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'preserve my life, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', according to your word.'
  '108':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Accept, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the willing praise of my mouth,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and teach me your laws.
  '109':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though I constantly take my life in my hands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not forget your law.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have hidden your word in my heart
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that I might not sin against you.
  '110':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked have set a snare for me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I have not strayed from your precepts.
  '111':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your statutes are my heritage forever;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are the joy of my heart.
  '112':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart is set on keeping your decrees
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the very end.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '119:112 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: decrees / for their enduring reward
      marker-yv: yv-n
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ס Samekh
    marker-yv: yv-h
  '113':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I hate double-minded people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I love your law.
  '114':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You are my refuge and my shield;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have put my hope in your word.
  '115':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Away from me, you evildoers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that I may keep the commands of my God!
  '116':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sustain me, my God, according to your promise, and I will live;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not let my hopes be dashed.
  '117':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Uphold me, and I will be delivered;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will always have regard for your decrees.
  '118':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You reject all who stray from your decrees,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for their delusions come to nothing.
  '119':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the wicked of the earth you discard like dross;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: therefore I love your statutes.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise be to you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: teach me your decrees.
  '120':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My flesh trembles in fear of you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I stand in awe of your laws.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ע Ayin
    marker-yv: yv-h
  '121':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have done what is righteous and just;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not leave me to my oppressors.
  '122':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ensure your servant’s well-being;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not let the arrogant oppress me.
  '123':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My eyes fail, looking for your salvation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: looking for your righteous promise.
  '124':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Deal with your servant according to your love
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and teach me your decrees.
  '125':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am your servant; give me discernment
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that I may understand your statutes.
  '126':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It is time for you to act, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your law is being broken.
  '127':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because I love your commands
  - type: usfm
    marker: q2
    children:
    - type: text
      text: more than gold, more than pure gold,
  '128':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and because I consider all your precepts right,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I hate every wrong path.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: פ Pe
    marker-yv: yv-h
  '129':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your statutes are wonderful;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: therefore I obey them.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With my lips I recount
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the laws that come from your mouth.
  '130':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The unfolding of your words gives light;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it gives understanding to the simple.
  '131':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I open my mouth and pant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: longing for your commands.
  '132':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Turn to me and have mercy on me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as you always do to those who love your name.
  '133':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Direct my footsteps according to your word;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let no sin rule over me.
  '134':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Redeem me from human oppression,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that I may obey your precepts.
  '135':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make your face shine on your servant
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and teach me your decrees.
  '136':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Streams of tears flow from my eyes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for your law is not obeyed.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: צ Tsadhe
    marker-yv: yv-h
  '137':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You are righteous, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your laws are right.
  '138':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The statutes you have laid down are righteous;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are fully trustworthy.
  '139':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My zeal wears me out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for my enemies ignore your words.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I rejoice in following your statutes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as one rejoices in great riches.
  '140':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your promises have been thoroughly tested,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your servant loves them.
  '141':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though I am lowly and despised,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I do not forget your precepts.
  '142':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your righteousness is everlasting
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your law is true.
  '143':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Trouble and distress have come upon me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but your commands give me delight.
  '144':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your statutes are always righteous;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: give me understanding that I may live.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ק Qoph
    marker-yv: yv-h
  '145':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I call with all my heart; answer me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will obey your decrees.
  '146':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I call out to you; save me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will keep your statutes.
  '147':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I rise before dawn and cry for help;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have put my hope in your word.
  '148':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My eyes stay open through the watches of the night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that I may meditate on your promises.
  '149':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear my voice in accordance with your love;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'preserve my life, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', according to your laws.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I meditate on your precepts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and consider your ways.
  '150':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who devise wicked schemes are near,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they are far from your law.
  '151':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yet you are near, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all your commands are true.
  '152':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Long ago I learned from your statutes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you established them to last forever.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ר Resh
    marker-yv: yv-h
  '153':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look on my suffering and deliver me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I have not forgotten your law.
  '154':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Defend my cause and redeem me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: preserve my life according to your promise.
  '155':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Salvation is far from the wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they do not seek out your decrees.
  '156':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your compassion, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', is great;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: preserve my life according to your laws.
  '157':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Many are the foes who persecute me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I have not turned from your statutes.
  '158':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I look on the faithless with loathing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they do not obey your word.
  '159':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See how I love your precepts;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'preserve my life, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', in accordance with your love.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I delight in your decrees;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not neglect your word.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ג Gimel
    marker-yv: yv-h
  '160':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All your words are true;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all your righteous laws are eternal.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ש Sin and Shin
    marker-yv: yv-h
  '161':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rulers persecute me without cause,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but my heart trembles at your word.
  '162':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I rejoice in your promise
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like one who finds great spoil.
  '163':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I hate and detest falsehood
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but I love your law.
  '164':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seven times a day I praise you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for your righteous laws.
  '165':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Great peace have those who love your law,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and nothing can make them stumble.
  '166':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I wait for your salvation, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I follow your commands.
  '167':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I obey your statutes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I love them greatly.
  '168':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I obey your precepts and your statutes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for all my ways are known to you.
  - type: usfm
    marker: qa
    children:
    - type: text
      text: ת Taw
    marker-yv: yv-h
  '169':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'May my cry come before you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: give me understanding according to your word.
