  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will obey your decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '146'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '146'
  - type: text
    text: I call out to you; save me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will keep your statutes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '147'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '147'
  - type: text
    text: I rise before dawn and cry for help;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have put my hope in your word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '148'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '148'
  - type: text
    text: My eyes stay open through the watches of the night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I may meditate on your promises.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '149'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '149'
  - type: text
    text: Hear my voice in accordance with your love;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'preserve my life, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', according to your laws.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '150'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '150'
  - type: text
    text: Those who devise wicked schemes are near,
- type: usfm
  marker: q2
  children:
  - type: text
