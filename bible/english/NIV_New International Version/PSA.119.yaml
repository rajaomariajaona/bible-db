    text: preserve my life according to your promise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '155'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '155'
  - type: text
    text: Salvation is far from the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they do not seek out your decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '156'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '156'
  - type: text
    text: 'Your compassion, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', is great;'
- type: usfm
  marker: q2
