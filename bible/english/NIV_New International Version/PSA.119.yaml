- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '106'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '106'
  - type: text
    text: I have taken an oath and confirmed it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I will follow your righteous laws.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '107'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '107'
  - type: text
