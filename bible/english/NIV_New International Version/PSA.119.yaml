      text: '153'
  - type: text
    text: Look on my suffering and deliver me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I have not forgotten your law.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '154'
  - type: usfm
    marker: vlbl
    children:
