  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all your commands are true.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '152'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '152'
  - type: text
    text: Long ago I learned from your statutes
- type: usfm
  marker: q2
  children:
  - type: text
    text: that you established them to last forever.
- type: usfm
  marker: qa
  children:
  - type: text
    text: ר Resh
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '153'
  - type: usfm
    marker: vlbl
    children:
