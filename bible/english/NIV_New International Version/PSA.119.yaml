  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '133'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '133'
  - type: text
    text: Direct my footsteps according to your word;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let no sin rule over me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '134'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '134'
  - type: text
    text: Redeem me from human oppression,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I may obey your precepts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '135'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '135'
  - type: text
    text: Make your face shine on your servant
- type: usfm
  marker: q2
  children:
  - type: text
    text: and teach me your decrees.
