document_id: PSA.119
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 119
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '119 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This psalm is an acrostic poem, the stanzas of which begin with successive letters of the Hebrew alphabet; moreover, the verses of each stanza begin with the same letter of the Hebrew alphabet.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: qa
  children:
  - type: text
    text: א Aleph
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Blessed are those whose ways are blameless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'who walk according to the law of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Blessed are those who keep his statutes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and seek him with all their heart—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: they do no wrong
- type: usfm
  marker: q2
  children:
  - type: text
    text: but follow his ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You have laid down precepts
- type: usfm
  marker: q2
  children:
  - type: text
    text: that are to be fully obeyed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Oh, that my ways were steadfast
- type: usfm
  marker: q2
  children:
  - type: text
    text: in obeying your decrees!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then I would not be put to shame
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I consider all your commands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I will praise you with an upright heart
- type: usfm
  marker: q2
  children:
  - type: text
    text: as I learn your righteous laws.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I will obey your decrees;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not utterly forsake me.
- type: usfm
  marker: qa
  children:
  - type: text
    text: ב Beth
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: How can a young person stay on the path of purity?
- type: usfm
  marker: q2
  children:
  - type: text
    text: By living according to your word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I seek you with all my heart;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not let me stray from your commands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I have hidden your word in my heart
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I might not sin against you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Praise be to you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: teach me your decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: With my lips I recount
- type: usfm
  marker: q2
  children:
  - type: text
    text: all the laws that come from your mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I rejoice in following your statutes
- type: usfm
  marker: q2
  children:
  - type: text
    text: as one rejoices in great riches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I meditate on your precepts
- type: usfm
  marker: q2
  children:
  - type: text
    text: and consider your ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I delight in your decrees;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will not neglect your word.
- type: usfm
  marker: qa
  children:
  - type: text
    text: ג Gimel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Be good to your servant while I live,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I may obey your word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Open my eyes that I may see
- type: usfm
  marker: q2
  children:
  - type: text
    text: wonderful things in your law.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: I am a stranger on earth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not hide your commands from me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: My soul is consumed with longing
- type: usfm
  marker: q2
  children:
  - type: text
    text: for your laws at all times.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: You rebuke the arrogant, who are accursed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who stray from your commands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Remove from me their scorn and contempt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I keep your statutes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Though rulers sit together and slander me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your servant will meditate on your decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Your statutes are my delight;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are my counselors.
- type: usfm
  marker: qa
  children:
  - type: text
    text: ד Daleth
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: I am laid low in the dust;
- type: usfm
  marker: q2
  children:
  - type: text
    text: preserve my life according to your word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: I gave an account of my ways and you answered me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: teach me your decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Cause me to understand the way of your precepts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I may meditate on your wonderful deeds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: My soul is weary with sorrow;
- type: usfm
  marker: q2
  children:
  - type: text
    text: strengthen me according to your word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Keep me from deceitful ways;
- type: usfm
  marker: q2
  children:
  - type: text
    text: be gracious to me and teach me your law.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: I have chosen the way of faithfulness;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have set my heart on your laws.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'I hold fast to your statutes, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not let me be put to shame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: I run in the path of your commands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you have broadened my understanding.
- type: usfm
  marker: qa
  children:
  - type: text
    text: ה He
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Teach me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the way of your decrees,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I may follow it to the end.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '119:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: follow it for its reward
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Give me understanding, so that I may keep your law
- type: usfm
  marker: q2
  children:
  - type: text
    text: and obey it with all my heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Direct me in the path of your commands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for there I find delight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Turn my heart toward your statutes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and not toward selfish gain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Turn my eyes away from worthless things;
- type: usfm
  marker: q2
  children:
  - type: text
    text: preserve my life according to your word.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '119:37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Two manuscripts of the Masoretic Text and Dead Sea Scrolls; most manuscripts of the Masoretic Text '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: life in your way
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Fulfill your promise to your servant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that you may be feared.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Take away the disgrace I dread,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for your laws are good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: How I long for your precepts!
- type: usfm
  marker: q2
  children:
  - type: text
    text: In your righteousness preserve my life.
- type: usfm
  marker: qa
  children:
  - type: text
    text: ו Waw
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'May your unfailing love come to me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: your salvation, according to your promise;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: then I can answer anyone who taunts me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I trust in your word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Never take your word of truth from my mouth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I have put my hope in your laws.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: I will always obey your law,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for ever and ever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: I will walk about in freedom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I have sought out your precepts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: I will speak of your statutes before kings
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will not be put to shame,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: for I delight in your commands
- type: usfm
  marker: q2
  children:
  - type: text
    text: because I love them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: I reach out for your commands, which I love,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I may meditate on your decrees.
- type: usfm
  marker: qa
  children:
  - type: text
    text: ז Zayin
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Remember your word to your servant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you have given me hope.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'My comfort in my suffering is this:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your promise preserves my life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: The arrogant mock me unmercifully,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I do not turn from your law.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'I remember, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', your ancient laws,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I find comfort in them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Indignation grips me because of the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who have forsaken your law.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Your decrees are the theme of my song
- type: usfm
  marker: q2
  children:
  - type: text
    text: wherever I lodge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'In the night, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', I remember your name,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I may keep your law.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'This has been my practice:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I obey your precepts.
- type: usfm
  marker: qa
  children:
  - type: text
    text: ח Heth
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'You are my portion, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have promised to obey your words.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: I have sought your face with all my heart;
- type: usfm
  marker: q2
  children:
  - type: text
    text: be gracious to me according to your promise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: I have considered my ways
- type: usfm
  marker: q2
  children:
  - type: text
    text: and have turned my steps to your statutes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: I will hasten and not delay
- type: usfm
  marker: q2
  children:
  - type: text
    text: to obey your commands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: Though the wicked bind me with ropes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will not forget your law.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: At midnight I rise to give you thanks
- type: usfm
  marker: q2
  children:
  - type: text
    text: for your righteous laws.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: I am a friend to all who fear you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to all who follow your precepts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'The earth is filled with your love, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: teach me your decrees.
- type: usfm
  marker: qa
  children:
  - type: text
    text: ט Teth
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: Do good to your servant
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'according to your word, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: Teach me knowledge and good judgment,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I trust your commands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: Before I was afflicted I went astray,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but now I obey your word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: You are good, and what you do is good;
- type: usfm
  marker: q2
  children:
  - type: text
    text: teach me your decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: Though the arrogant have smeared me with lies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I keep your precepts with all my heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: Their hearts are callous and unfeeling,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I delight in your law.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: It was good for me to be afflicted
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that I might learn your decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '72'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: The law from your mouth is more precious to me
- type: usfm
  marker: q2
  children:
  - type: text
    text: than thousands of pieces of silver and gold.
- type: usfm
  marker: qa
  children:
  - type: text
    text: י Yodh
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '73'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: Your hands made me and formed me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: give me understanding to learn your commands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '74'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: May those who fear you rejoice when they see me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I have put my hope in your word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '75'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: 'I know, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', that your laws are righteous,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and that in faithfulness you have afflicted me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '76'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '76'
  - type: text
    text: May your unfailing love be my comfort,
- type: usfm
  marker: q2
  children:
  - type: text
    text: according to your promise to your servant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '77'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '77'
  - type: text
    text: Let your compassion come to me that I may live,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for your law is my delight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '78'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '78'
  - type: text
    text: May the arrogant be put to shame for wronging me without cause;
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I will meditate on your precepts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '79'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '79'
  - type: text
    text: May those who fear you turn to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who understand your statutes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '80'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '80'
  - type: text
    text: May I wholeheartedly follow your decrees,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I may not be put to shame.
- type: usfm
  marker: qa
  children:
  - type: text
    text: כ Kaph
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '81'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '81'
  - type: text
    text: My soul faints with longing for your salvation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I have put my hope in your word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '82'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '82'
  - type: text
    text: My eyes fail, looking for your promise;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I say, “When will you comfort me?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '83'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '83'
  - type: text
    text: Though I am like a wineskin in the smoke,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I do not forget your decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '84'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '84'
  - type: text
    text: How long must your servant wait?
- type: usfm
  marker: q2
  children:
  - type: text
    text: When will you punish my persecutors?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '85'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '85'
  - type: text
    text: The arrogant dig pits to trap me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: contrary to your law.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '86'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '86'
  - type: text
    text: All your commands are trustworthy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: help me, for I am being persecuted without cause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '87'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '87'
  - type: text
    text: They almost wiped me from the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I have not forsaken your precepts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '88'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '88'
  - type: text
    text: In your unfailing love preserve my life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I may obey the statutes of your mouth.
- type: usfm
  marker: qa
  children:
  - type: text
    text: ל Lamedh
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '89'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '89'
  - type: text
    text: 'Your word, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', is eternal;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: it stands firm in the heavens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '90'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '90'
  - type: text
    text: Your faithfulness continues through all generations;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you established the earth, and it endures.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '91'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '91'
  - type: text
    text: Your laws endure to this day,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for all things serve you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '92'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '92'
  - type: text
    text: If your law had not been my delight,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I would have perished in my affliction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '93'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '93'
  - type: text
    text: I will never forget your precepts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for by them you have preserved my life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '94'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '94'
  - type: text
    text: Save me, for I am yours;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have sought out your precepts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '95'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '95'
  - type: text
    text: The wicked are waiting to destroy me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I will ponder your statutes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '96'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '96'
  - type: text
    text: To all perfection I see a limit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but your commands are boundless.
- type: usfm
  marker: qa
  children:
  - type: text
    text: מ Mem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '97'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '97'
  - type: text
    text: Oh, how I love your law!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I meditate on it all day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '98'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '98'
  - type: text
    text: Your commands are always with me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and make me wiser than my enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '99'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '99'
  - type: text
    text: I have more insight than all my teachers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I meditate on your statutes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '100'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '100'
  - type: text
    text: I have more understanding than the elders,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I obey your precepts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '101'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '101'
  - type: text
    text: I have kept my feet from every evil path
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that I might obey your word.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '102'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '102'
  - type: text
    text: I have not departed from your laws,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you yourself have taught me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '103'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '103'
  - type: text
    text: How sweet are your words to my taste,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sweeter than honey to my mouth!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '104'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '104'
  - type: text
    text: I gain understanding from your precepts;
- type: usfm
  marker: q2
  children:
  - type: text
    text: therefore I hate every wrong path.
