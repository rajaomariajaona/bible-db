document_id: PSA.119,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 119This psalm is an acrostic poem, the stanzas of which begin with successive letters of the Hebrew alphabet; moreover, the verses of each stanza begin with the same letter of the Hebrew alphabet.
  - type: heading
    content: א Aleph
  - type: text
    content: Blessed are those whose ways are blameless,
  - type: text
    content: 'who walk according to the law of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '10':
  - type: text
    content: I seek you with all my heart;
  - type: text
    content: do not let me stray from your commands.
  '100':
  - type: text
    content: I have more understanding than the elders,
  - type: text
    content: for I obey your precepts.
  '101':
  - type: text
    content: I have kept my feet from every evil path
  - type: text
    content: so that I might obey your word.
  '102':
  - type: text
    content: I have not departed from your laws,
  - type: text
    content: for you yourself have taught me.
  '103':
  - type: text
    content: How sweet are your words to my taste,
  - type: text
    content: sweeter than honey to my mouth!
  '104':
  - type: text
    content: I gain understanding from your precepts;
  - type: text
    content: therefore I hate every wrong path.
  - type: heading
    content: נ Nun
  '105':
  - type: text
    content: Your word is a lamp for my feet,
  - type: text
    content: a light on my path.
  '106':
  - type: text
    content: I have taken an oath and confirmed it,
  - type: text
    content: that I will follow your righteous laws.
  '107':
  - type: text
    content: I have suffered much;
  - type: text
    content: 'preserve my life, '
  - type: text
    content: Lord
  - type: text
    content: ', according to your word.'
  '108':
  - type: text
    content: 'Accept, '
  - type: text
    content: Lord
  - type: text
    content: ', the willing praise of my mouth,'
  - type: text
    content: and teach me your laws.
  '109':
  - type: text
    content: Though I constantly take my life in my hands,
  - type: text
    content: I will not forget your law.
  '11':
  - type: text
    content: I have hidden your word in my heart
  - type: text
    content: that I might not sin against you.
  '110':
  - type: text
    content: The wicked have set a snare for me,
  - type: text
    content: but I have not strayed from your precepts.
  '111':
  - type: text
    content: Your statutes are my heritage forever;
  - type: text
    content: they are the joy of my heart.
  '112':
  - type: text
    content: My heart is set on keeping your decrees
  - type: text
    content: to the very end.
  - type: note
    content: Or decrees / for their enduring reward
  - type: heading
    content: ס Samekh
  '113':
  - type: text
    content: I hate double-minded people,
  - type: text
    content: but I love your law.
  '114':
  - type: text
    content: You are my refuge and my shield;
  - type: text
    content: I have put my hope in your word.
  '115':
  - type: text
    content: Away from me, you evildoers,
  - type: text
    content: that I may keep the commands of my God!
  '116':
  - type: text
    content: Sustain me, my God, according to your promise, and I will live;
  - type: text
    content: do not let my hopes be dashed.
  '117':
  - type: text
    content: Uphold me, and I will be delivered;
  - type: text
    content: I will always have regard for your decrees.
  '118':
  - type: text
    content: You reject all who stray from your decrees,
  - type: text
    content: for their delusions come to nothing.
  '119':
  - type: text
    content: All the wicked of the earth you discard like dross;
  - type: text
    content: therefore I love your statutes.
  '12':
  - type: text
    content: 'Praise be to you, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: teach me your decrees.
  '120':
  - type: text
    content: My flesh trembles in fear of you;
  - type: text
    content: I stand in awe of your laws.
  - type: heading
    content: ע Ayin
  '121':
  - type: text
    content: I have done what is righteous and just;
  - type: text
    content: do not leave me to my oppressors.
  '122':
  - type: text
    content: Ensure your servant’s well-being;
  - type: text
    content: do not let the arrogant oppress me.
  '123':
  - type: text
    content: My eyes fail, looking for your salvation,
  - type: text
    content: looking for your righteous promise.
  '124':
  - type: text
    content: Deal with your servant according to your love
  - type: text
    content: and teach me your decrees.
  '125':
  - type: text
    content: I am your servant; give me discernment
  - type: text
    content: that I may understand your statutes.
  '126':
  - type: text
    content: 'It is time for you to act, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: your law is being broken.
  '127':
  - type: text
    content: Because I love your commands
  - type: text
    content: more than gold, more than pure gold,
  '128':
  - type: text
    content: and because I consider all your precepts right,
  - type: text
    content: I hate every wrong path.
  - type: heading
    content: פ Pe
  '129':
  - type: text
    content: Your statutes are wonderful;
  - type: text
    content: therefore I obey them.
  '13':
  - type: text
    content: With my lips I recount
  - type: text
    content: all the laws that come from your mouth.
  '130':
  - type: text
    content: The unfolding of your words gives light;
  - type: text
    content: it gives understanding to the simple.
  '131':
  - type: text
    content: I open my mouth and pant,
  - type: text
    content: longing for your commands.
  '132':
  - type: text
    content: Turn to me and have mercy on me,
  - type: text
    content: as you always do to those who love your name.
  '133':
  - type: text
    content: Direct my footsteps according to your word;
  - type: text
    content: let no sin rule over me.
  '134':
  - type: text
    content: Redeem me from human oppression,
  - type: text
    content: that I may obey your precepts.
  '135':
  - type: text
    content: Make your face shine on your servant
  - type: text
    content: and teach me your decrees.
  '136':
  - type: text
    content: Streams of tears flow from my eyes,
  - type: text
    content: for your law is not obeyed.
  - type: heading
    content: צ Tsadhe
  '137':
  - type: text
    content: 'You are righteous, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and your laws are right.
  '138':
  - type: text
    content: The statutes you have laid down are righteous;
  - type: text
    content: they are fully trustworthy.
  '139':
  - type: text
    content: My zeal wears me out,
  - type: text
    content: for my enemies ignore your words.
  '14':
  - type: text
    content: I rejoice in following your statutes
  - type: text
    content: as one rejoices in great riches.
  '140':
  - type: text
    content: Your promises have been thoroughly tested,
  - type: text
    content: and your servant loves them.
  '141':
  - type: text
    content: Though I am lowly and despised,
  - type: text
    content: I do not forget your precepts.
  '142':
  - type: text
    content: Your righteousness is everlasting
  - type: text
    content: and your law is true.
  '143':
  - type: text
    content: Trouble and distress have come upon me,
  - type: text
    content: but your commands give me delight.
  '144':
  - type: text
    content: Your statutes are always righteous;
  - type: text
    content: give me understanding that I may live.
  - type: heading
    content: ק Qoph
  '145':
  - type: text
    content: 'I call with all my heart; answer me, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and I will obey your decrees.
  '146':
  - type: text
    content: I call out to you; save me
  - type: text
    content: and I will keep your statutes.
  '147':
  - type: text
    content: I rise before dawn and cry for help;
  - type: text
    content: I have put my hope in your word.
  '148':
  - type: text
    content: My eyes stay open through the watches of the night,
  - type: text
    content: that I may meditate on your promises.
  '149':
  - type: text
    content: Hear my voice in accordance with your love;
  - type: text
    content: 'preserve my life, '
  - type: text
    content: Lord
  - type: text
    content: ', according to your laws.'
  '15':
  - type: text
    content: I meditate on your precepts
  - type: text
    content: and consider your ways.
  '150':
  - type: text
    content: Those who devise wicked schemes are near,
  - type: text
    content: but they are far from your law.
  '151':
  - type: text
    content: 'Yet you are near, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and all your commands are true.
  '152':
  - type: text
    content: Long ago I learned from your statutes
  - type: text
    content: that you established them to last forever.
  - type: heading
    content: ר Resh
  '153':
  - type: text
    content: Look on my suffering and deliver me,
  - type: text
    content: for I have not forgotten your law.
  '154':
  - type: text
    content: Defend my cause and redeem me;
  - type: text
    content: preserve my life according to your promise.
  '155':
  - type: text
    content: Salvation is far from the wicked,
  - type: text
    content: for they do not seek out your decrees.
  '156':
  - type: text
    content: 'Your compassion, '
  - type: text
    content: Lord
  - type: text
    content: ', is great;'
  - type: text
    content: preserve my life according to your laws.
  '157':
  - type: text
    content: Many are the foes who persecute me,
  - type: text
    content: but I have not turned from your statutes.
  '158':
  - type: text
    content: I look on the faithless with loathing,
  - type: text
    content: for they do not obey your word.
  '159':
  - type: text
    content: See how I love your precepts;
  - type: text
    content: 'preserve my life, '
  - type: text
    content: Lord
  - type: text
    content: ', in accordance with your love.'
  '16':
  - type: text
    content: I delight in your decrees;
  - type: text
    content: I will not neglect your word.
  - type: heading
    content: ג Gimel
  '160':
  - type: text
    content: All your words are true;
  - type: text
    content: all your righteous laws are eternal.
  - type: heading
    content: ש Sin and Shin
  '161':
  - type: text
    content: Rulers persecute me without cause,
  - type: text
    content: but my heart trembles at your word.
  '162':
  - type: text
    content: I rejoice in your promise
  - type: text
    content: like one who finds great spoil.
  '163':
  - type: text
    content: I hate and detest falsehood
  - type: text
    content: but I love your law.
  '164':
  - type: text
    content: Seven times a day I praise you
  - type: text
    content: for your righteous laws.
  '165':
  - type: text
    content: Great peace have those who love your law,
  - type: text
    content: and nothing can make them stumble.
  '166':
  - type: text
    content: 'I wait for your salvation, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and I follow your commands.
  '167':
  - type: text
    content: I obey your statutes,
  - type: text
    content: for I love them greatly.
  '168':
  - type: text
    content: I obey your precepts and your statutes,
  - type: text
    content: for all my ways are known to you.
  - type: heading
    content: ת Taw
  '169':
  - type: text
    content: 'May my cry come before you, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: give me understanding according to your word.
  '17':
  - type: text
    content: Be good to your servant while I live,
  - type: text
    content: that I may obey your word.
  '170':
  - type: text
    content: May my supplication come before you;
  - type: text
    content: deliver me according to your promise.
  '171':
  - type: text
    content: May my lips overflow with praise,
  - type: text
    content: for you teach me your decrees.
  '172':
  - type: text
    content: May my tongue sing of your word,
  - type: text
    content: for all your commands are righteous.
  '173':
  - type: text
    content: May your hand be ready to help me,
  - type: text
    content: for I have chosen your precepts.
  '174':
  - type: text
    content: 'I long for your salvation, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and your law gives me delight.
  '175':
  - type: text
    content: Let me live that I may praise you,
  - type: text
    content: and may your laws sustain me.
  '176':
  - type: text
    content: I have strayed like a lost sheep.
  - type: text
    content: Seek your servant,
  - type: text
    content: for I have not forgotten your commands.
  '18':
  - type: text
    content: Open my eyes that I may see
  - type: text
    content: wonderful things in your law.
  '19':
  - type: text
    content: I am a stranger on earth;
  - type: text
    content: do not hide your commands from me.
  '2':
  - type: text
    content: Blessed are those who keep his statutes
  - type: text
    content: and seek him with all their heart—
  '20':
  - type: text
    content: My soul is consumed with longing
  - type: text
    content: for your laws at all times.
  '21':
  - type: text
    content: You rebuke the arrogant, who are accursed,
  - type: text
    content: those who stray from your commands.
  '22':
  - type: text
    content: Remove from me their scorn and contempt,
  - type: text
    content: for I keep your statutes.
  '23':
  - type: text
    content: Though rulers sit together and slander me,
  - type: text
    content: your servant will meditate on your decrees.
  '24':
  - type: text
    content: Your statutes are my delight;
  - type: text
    content: they are my counselors.
  - type: heading
    content: ד Daleth
  '25':
  - type: text
    content: I am laid low in the dust;
  - type: text
    content: preserve my life according to your word.
  '26':
  - type: text
    content: I gave an account of my ways and you answered me;
  - type: text
    content: teach me your decrees.
  '27':
  - type: text
    content: Cause me to understand the way of your precepts,
  - type: text
    content: that I may meditate on your wonderful deeds.
  '28':
  - type: text
    content: My soul is weary with sorrow;
  - type: text
    content: strengthen me according to your word.
  '29':
  - type: text
    content: Keep me from deceitful ways;
  - type: text
    content: be gracious to me and teach me your law.
  '3':
  - type: text
    content: they do no wrong
  - type: text
    content: but follow his ways.
  '30':
  - type: text
    content: I have chosen the way of faithfulness;
  - type: text
    content: I have set my heart on your laws.
  '31':
  - type: text
    content: 'I hold fast to your statutes, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: do not let me be put to shame.
  '32':
  - type: text
    content: I run in the path of your commands,
  - type: text
    content: for you have broadened my understanding.
  - type: heading
    content: ה He
  '33':
  - type: text
    content: 'Teach me, '
  - type: text
    content: Lord
  - type: text
    content: ', the way of your decrees,'
  - type: text
    content: that I may follow it to the end.
  - type: note
    content: Or follow it for its reward
  '34':
  - type: text
    content: Give me understanding, so that I may keep your law
  - type: text
    content: and obey it with all my heart.
  '35':
  - type: text
    content: Direct me in the path of your commands,
  - type: text
    content: for there I find delight.
  '36':
  - type: text
    content: Turn my heart toward your statutes
  - type: text
    content: and not toward selfish gain.
  '37':
  - type: text
    content: Turn my eyes away from worthless things;
  - type: text
    content: preserve my life according to your word.
  - type: note
    content: Two manuscripts of the Masoretic Text and Dead Sea Scrolls; most manuscripts of the Masoretic Text life in your way
  '38':
  - type: text
    content: Fulfill your promise to your servant,
  - type: text
    content: so that you may be feared.
  '39':
  - type: text
    content: Take away the disgrace I dread,
  - type: text
    content: for your laws are good.
  '4':
  - type: text
    content: You have laid down precepts
  - type: text
    content: that are to be fully obeyed.
  '40':
  - type: text
    content: How I long for your precepts!
  - type: text
    content: In your righteousness preserve my life.
  - type: heading
    content: ו Waw
  '41':
  - type: text
    content: 'May your unfailing love come to me, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: your salvation, according to your promise;
  '42':
  - type: text
    content: then I can answer anyone who taunts me,
  - type: text
    content: for I trust in your word.
  '43':
  - type: text
    content: Never take your word of truth from my mouth,
  - type: text
    content: for I have put my hope in your laws.
  '44':
  - type: text
    content: I will always obey your law,
  - type: text
    content: for ever and ever.
  '45':
  - type: text
    content: I will walk about in freedom,
  - type: text
    content: for I have sought out your precepts.
  '46':
  - type: text
    content: I will speak of your statutes before kings
  - type: text
    content: and will not be put to shame,
  '47':
  - type: text
    content: for I delight in your commands
  - type: text
    content: because I love them.
  '48':
  - type: text
    content: I reach out for your commands, which I love,
  - type: text
    content: that I may meditate on your decrees.
  - type: heading
    content: ז Zayin
  '49':
  - type: text
    content: Remember your word to your servant,
  - type: text
    content: for you have given me hope.
  '5':
  - type: text
    content: Oh, that my ways were steadfast
  - type: text
    content: in obeying your decrees!
  '50':
  - type: text
    content: 'My comfort in my suffering is this:'
  - type: text
    content: Your promise preserves my life.
  '51':
  - type: text
    content: The arrogant mock me unmercifully,
  - type: text
    content: but I do not turn from your law.
  '52':
  - type: text
    content: 'I remember, '
  - type: text
    content: Lord
  - type: text
    content: ', your ancient laws,'
  - type: text
    content: and I find comfort in them.
  '53':
  - type: text
    content: Indignation grips me because of the wicked,
  - type: text
    content: who have forsaken your law.
  '54':
  - type: text
    content: Your decrees are the theme of my song
  - type: text
    content: wherever I lodge.
  '55':
  - type: text
    content: 'In the night, '
  - type: text
    content: Lord
  - type: text
    content: ', I remember your name,'
  - type: text
    content: that I may keep your law.
  '56':
  - type: text
    content: 'This has been my practice:'
  - type: text
    content: I obey your precepts.
  - type: heading
    content: ח Heth
  '57':
  - type: text
    content: 'You are my portion, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: I have promised to obey your words.
  '58':
  - type: text
    content: I have sought your face with all my heart;
  - type: text
    content: be gracious to me according to your promise.
  '59':
  - type: text
    content: I have considered my ways
  - type: text
    content: and have turned my steps to your statutes.
  '6':
  - type: text
    content: Then I would not be put to shame
  - type: text
    content: when I consider all your commands.
  '60':
  - type: text
    content: I will hasten and not delay
  - type: text
    content: to obey your commands.
  '61':
  - type: text
    content: Though the wicked bind me with ropes,
  - type: text
    content: I will not forget your law.
  '62':
  - type: text
    content: At midnight I rise to give you thanks
  - type: text
    content: for your righteous laws.
  '63':
  - type: text
    content: I am a friend to all who fear you,
  - type: text
    content: to all who follow your precepts.
  '64':
  - type: text
    content: 'The earth is filled with your love, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: teach me your decrees.
  - type: heading
    content: ט Teth
  '65':
  - type: text
    content: Do good to your servant
  - type: text
    content: 'according to your word, '
  - type: text
    content: Lord
  - type: text
    content: .
  '66':
  - type: text
    content: Teach me knowledge and good judgment,
  - type: text
    content: for I trust your commands.
  '67':
  - type: text
    content: Before I was afflicted I went astray,
  - type: text
    content: but now I obey your word.
  '68':
  - type: text
    content: You are good, and what you do is good;
  - type: text
    content: teach me your decrees.
  '69':
  - type: text
    content: Though the arrogant have smeared me with lies,
  - type: text
    content: I keep your precepts with all my heart.
  '7':
  - type: text
    content: I will praise you with an upright heart
  - type: text
    content: as I learn your righteous laws.
  '70':
  - type: text
    content: Their hearts are callous and unfeeling,
  - type: text
    content: but I delight in your law.
  '71':
  - type: text
    content: It was good for me to be afflicted
  - type: text
    content: so that I might learn your decrees.
  '72':
  - type: text
    content: The law from your mouth is more precious to me
  - type: text
    content: than thousands of pieces of silver and gold.
  - type: heading
    content: י Yodh
  '73':
  - type: text
    content: Your hands made me and formed me;
  - type: text
    content: give me understanding to learn your commands.
  '74':
  - type: text
    content: May those who fear you rejoice when they see me,
  - type: text
    content: for I have put my hope in your word.
  '75':
  - type: text
    content: 'I know, '
  - type: text
    content: Lord
  - type: text
    content: ', that your laws are righteous,'
  - type: text
    content: and that in faithfulness you have afflicted me.
  '76':
  - type: text
    content: May your unfailing love be my comfort,
  - type: text
    content: according to your promise to your servant.
  '77':
  - type: text
    content: Let your compassion come to me that I may live,
  - type: text
    content: for your law is my delight.
  '78':
  - type: text
    content: May the arrogant be put to shame for wronging me without cause;
  - type: text
    content: but I will meditate on your precepts.
  '79':
  - type: text
    content: May those who fear you turn to me,
  - type: text
    content: those who understand your statutes.
  '8':
  - type: text
    content: I will obey your decrees;
  - type: text
    content: do not utterly forsake me.
  - type: heading
    content: ב Beth
  '80':
  - type: text
    content: May I wholeheartedly follow your decrees,
  - type: text
    content: that I may not be put to shame.
  - type: heading
    content: כ Kaph
  '81':
  - type: text
    content: My soul faints with longing for your salvation,
  - type: text
    content: but I have put my hope in your word.
  '82':
  - type: text
    content: My eyes fail, looking for your promise;
  - type: text
    content: I say, “When will you comfort me?”
  '83':
  - type: text
    content: Though I am like a wineskin in the smoke,
  - type: text
    content: I do not forget your decrees.
  '84':
  - type: text
    content: How long must your servant wait?
  - type: text
    content: When will you punish my persecutors?
  '85':
  - type: text
    content: The arrogant dig pits to trap me,
  - type: text
    content: contrary to your law.
  '86':
  - type: text
    content: All your commands are trustworthy;
  - type: text
    content: help me, for I am being persecuted without cause.
  '87':
  - type: text
    content: They almost wiped me from the earth,
  - type: text
    content: but I have not forsaken your precepts.
  '88':
  - type: text
    content: In your unfailing love preserve my life,
  - type: text
    content: that I may obey the statutes of your mouth.
  - type: heading
    content: ל Lamedh
  '89':
  - type: text
    content: 'Your word, '
  - type: text
    content: Lord
  - type: text
    content: ', is eternal;'
  - type: text
    content: it stands firm in the heavens.
  '9':
  - type: text
    content: How can a young person stay on the path of purity?
  - type: text
    content: By living according to your word.
  '90':
  - type: text
    content: Your faithfulness continues through all generations;
  - type: text
    content: you established the earth, and it endures.
  '91':
  - type: text
    content: Your laws endure to this day,
  - type: text
    content: for all things serve you.
  '92':
  - type: text
    content: If your law had not been my delight,
  - type: text
    content: I would have perished in my affliction.
  '93':
  - type: text
    content: I will never forget your precepts,
  - type: text
    content: for by them you have preserved my life.
  '94':
  - type: text
    content: Save me, for I am yours;
  - type: text
    content: I have sought out your precepts.
  '95':
  - type: text
    content: The wicked are waiting to destroy me,
  - type: text
    content: but I will ponder your statutes.
  '96':
  - type: text
    content: To all perfection I see a limit,
  - type: text
    content: but your commands are boundless.
  - type: heading
    content: מ Mem
  '97':
  - type: text
    content: Oh, how I love your law!
  - type: text
    content: I meditate on it all day long.
  '98':
  - type: text
    content: Your commands are always with me
  - type: text
    content: and make me wiser than my enemies.
  '99':
  - type: text
    content: I have more insight than all my teachers,
  - type: text
    content: for I meditate on your statutes.
