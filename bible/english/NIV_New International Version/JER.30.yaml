document_id: JER.30
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Restoration of Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This is the word that came to Jeremiah from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, says: ‘Write in a book all the words I have spoken to you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The days are coming,’ declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', ‘when I will bring my people Israel and Judah back from captivity'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: will restore the fortunes of my people Israel and Judah
    marker-yv: yv-n
  - type: text
    text: ' and restore them to the land I gave their ancestors to possess,’ says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'These are the words the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke concerning Israel and Judah: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘Cries of fear are heard—
- type: usfm
  marker: q2
  children:
  - type: text
    text: terror, not peace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ask and see:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can a man bear children?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then why do I see every strong man
- type: usfm
  marker: q2
  children:
  - type: text
    text: with his hands on his stomach like a woman in labor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: every face turned deathly pale?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: How awful that day will be!
- type: usfm
  marker: q2
  children:
  - type: text
    text: No other will be like it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It will be a time of trouble for Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he will be saved out of it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“ ‘In that day,’ declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘I will break the yoke off their necks
- type: usfm
  marker: q1
  children:
  - type: text
    text: and will tear off their bonds;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no longer will foreigners enslave them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Instead, they will serve the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and David their king,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whom I will raise up for them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “ ‘So do not be afraid, Jacob my servant;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not be dismayed, Israel,’
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘I will surely save you out of a distant place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your descendants from the land of their exile.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jacob will again have peace and security,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no one will make him afraid.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I am with you and will save you,’
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Though I completely destroy all the nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: among which I scatter you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will not completely destroy you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will discipline you but only in due measure;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will not let you go entirely unpunished.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘Your wound is incurable,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your injury beyond healing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: There is no one to plead your cause,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no remedy for your sore,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no healing for you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: All your allies have forgotten you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they care nothing for you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have struck you as an enemy would
- type: usfm
  marker: q2
  children:
  - type: text
    text: and punished you as would the cruel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: because your guilt is so great
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your sins so many.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Why do you cry out over your wound,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your pain that has no cure?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of your great guilt and many sins
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have done these things to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “ ‘But all who devour you will be devoured;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all your enemies will go into exile.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who plunder you will be plundered;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all who make spoil of you I will despoil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But I will restore you to health
- type: usfm
  marker: q2
  children:
  - type: text
    text: and heal your wounds,’
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘because you are called an outcast,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Zion for whom no one cares.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘I will restore the fortunes of Jacob’s tents
- type: usfm
  marker: q2
  children:
  - type: text
    text: and have compassion on his dwellings;
- type: usfm
  marker: q1
  children:
  - type: text
    text: the city will be rebuilt on her ruins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the palace will stand in its proper place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: From them will come songs of thanksgiving
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the sound of rejoicing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will add to their numbers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they will not be decreased;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will bring them honor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they will not be disdained.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Their children will be as in days of old,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their community will be established before me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will punish all who oppress them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Their leader will be one of their own;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their ruler will arise from among them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will bring him near and he will come close to me—
- type: usfm
  marker: q2
  children:
  - type: text
    text: for who is he who will devote himself
- type: usfm
  marker: q2
  children:
  - type: text
    text: to be close to me?’
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “ ‘So you will be my people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will be your God.’ ”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'See, the storm of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: will burst out in wrath,
- type: usfm
  marker: q1
  children:
  - type: text
    text: a driving wind swirling down
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the heads of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The fierce anger of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will not turn back'
- type: usfm
  marker: q2
  children:
  - type: text
    text: until he fully accomplishes
- type: usfm
  marker: q2
  children:
  - type: text
    text: the purposes of his heart.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In days to come
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will understand this.
