document_id: JER.30,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Restoration of Israel
  - type: text
    content: 'This is the word that came to Jeremiah from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: “ ‘So do not be afraid, Jacob my servant;
  - type: text
    content: do not be dismayed, Israel,’
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: ‘I will surely save you out of a distant place,
  - type: text
    content: your descendants from the land of their exile.
  - type: text
    content: Jacob will again have peace and security,
  - type: text
    content: and no one will make him afraid.
  '11':
  - type: text
    content: I am with you and will save you,’
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: ‘Though I completely destroy all the nations
  - type: text
    content: among which I scatter you,
  - type: text
    content: I will not completely destroy you.
  - type: text
    content: I will discipline you but only in due measure;
  - type: text
    content: I will not let you go entirely unpunished.’
  '12':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘Your wound is incurable,
  - type: text
    content: your injury beyond healing.
  '13':
  - type: text
    content: There is no one to plead your cause,
  - type: text
    content: no remedy for your sore,
  - type: text
    content: no healing for you.
  '14':
  - type: text
    content: All your allies have forgotten you;
  - type: text
    content: they care nothing for you.
  - type: text
    content: I have struck you as an enemy would
  - type: text
    content: and punished you as would the cruel,
  - type: text
    content: because your guilt is so great
  - type: text
    content: and your sins so many.
  '15':
  - type: text
    content: Why do you cry out over your wound,
  - type: text
    content: your pain that has no cure?
  - type: text
    content: Because of your great guilt and many sins
  - type: text
    content: I have done these things to you.
  '16':
  - type: text
    content: “ ‘But all who devour you will be devoured;
  - type: text
    content: all your enemies will go into exile.
  - type: text
    content: Those who plunder you will be plundered;
  - type: text
    content: all who make spoil of you I will despoil.
  '17':
  - type: text
    content: But I will restore you to health
  - type: text
    content: and heal your wounds,’
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: ‘because you are called an outcast,
  - type: text
    content: Zion for whom no one cares.’
  '18':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘I will restore the fortunes of Jacob’s tents
  - type: text
    content: and have compassion on his dwellings;
  - type: text
    content: the city will be rebuilt on her ruins,
  - type: text
    content: and the palace will stand in its proper place.
  '19':
  - type: text
    content: From them will come songs of thanksgiving
  - type: text
    content: and the sound of rejoicing.
  - type: text
    content: I will add to their numbers,
  - type: text
    content: and they will not be decreased;
  - type: text
    content: I will bring them honor,
  - type: text
    content: and they will not be disdained.
  '2':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: ‘Write in a book all the words I have spoken to you. '
  '20':
  - type: text
    content: Their children will be as in days of old,
  - type: text
    content: and their community will be established before me;
  - type: text
    content: I will punish all who oppress them.
  '21':
  - type: text
    content: Their leader will be one of their own;
  - type: text
    content: their ruler will arise from among them.
  - type: text
    content: I will bring him near and he will come close to me—
  - type: text
    content: for who is he who will devote himself
  - type: text
    content: to be close to me?’
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '22':
  - type: text
    content: “ ‘So you will be my people,
  - type: text
    content: and I will be your God.’ ”
  '23':
  - type: text
    content: 'See, the storm of the '
  - type: text
    content: Lord
  - type: text
    content: will burst out in wrath,
  - type: text
    content: a driving wind swirling down
  - type: text
    content: on the heads of the wicked.
  '24':
  - type: text
    content: 'The fierce anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' will not turn back'
  - type: text
    content: until he fully accomplishes
  - type: text
    content: the purposes of his heart.
  - type: text
    content: In days to come
  - type: text
    content: you will understand this.
  '3':
  - type: text
    content: 'The days are coming,’ declares the '
  - type: text
    content: Lord
  - type: text
    content: ', ‘when I will bring my people Israel and Judah back from captivity'
  - type: note
    content: Or will restore the fortunes of my people Israel and Judah
  - type: text
    content: ' and restore them to the land I gave their ancestors to possess,’ says the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '4':
  - type: text
    content: 'These are the words the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke concerning Israel and Judah: '
  '5':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘Cries of fear are heard—
  - type: text
    content: terror, not peace.
  '6':
  - type: text
    content: 'Ask and see:'
  - type: text
    content: Can a man bear children?
  - type: text
    content: Then why do I see every strong man
  - type: text
    content: with his hands on his stomach like a woman in labor,
  - type: text
    content: every face turned deathly pale?
  '7':
  - type: text
    content: How awful that day will be!
  - type: text
    content: No other will be like it.
  - type: text
    content: It will be a time of trouble for Jacob,
  - type: text
    content: but he will be saved out of it.
  '8':
  - type: text
    content: '“ ‘In that day,’ declares the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty,'
  - type: text
    content: ‘I will break the yoke off their necks
  - type: text
    content: and will tear off their bonds;
  - type: text
    content: no longer will foreigners enslave them.
  '9':
  - type: text
    content: 'Instead, they will serve the '
  - type: text
    content: Lord
  - type: text
    content: ' their God'
  - type: text
    content: and David their king,
  - type: text
    content: whom I will raise up for them.
