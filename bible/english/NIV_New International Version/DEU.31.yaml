document_id: DEU.31,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joshua to Succeed Moses
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses went out and spoke these words to all Israel: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses commanded them: “At the end of every seven years, in the year for canceling debts, during the Festival of Tabernacles, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'when all Israel comes to appear before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God at the place he will choose, you shall read this law before them in their hearing. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Assemble the people—men, women and children, and the foreigners residing in your towns—so they can listen and learn to fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God and follow carefully all the words of this law. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Their children, who do not know this law, must hear it and learn to fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God as long as you live in the land you are crossing the Jordan to possess.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel’s Rebellion Predicted
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Now the day of your death is near. Call Joshua and present yourselves at the tent of meeting, where I will commission him.” So Moses and Joshua came and presented themselves at the tent of meeting.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' appeared at the tent in a pillar of cloud, and the cloud stood over the entrance to the tent. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses: “You are going to rest with your ancestors, and these people will soon prostitute themselves to the foreign gods of the land they are entering. They will forsake me and break the covenant I made with them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And in that day I will become angry with them and forsake them; I will hide my face from them, and they will be destroyed. Many disasters and calamities will come on them, and in that day they will ask, ‘Have not these disasters come on us because our God is not with us?’ '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I will certainly hide my face in that day because of all their wickedness in turning to other gods.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now write down this song and teach it to the Israelites and have them sing it, so that it may be a witness for me against them. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I am now a hundred and twenty years old and I am no longer able to lead you. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has said to me, ‘You shall not cross the Jordan.’ '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When I have brought them into the land flowing with milk and honey, the land I promised on oath to their ancestors, and when they eat their fill and thrive, they will turn to other gods and worship them, rejecting me and breaking my covenant. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when many disasters and calamities come on them, this song will testify against them, because it will not be forgotten by their descendants. I know what they are disposed to do, even before I bring them into the land I promised them on oath.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Moses wrote down this song that day and taught it to the Israelites.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave this command to Joshua son of Nun: “Be strong and courageous, for you will bring the Israelites into the land I promised them on oath, and I myself will be with you.”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After Moses finished writing in a book the words of this law from beginning to end, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he gave this command to the Levites who carried the ark of the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Take this Book of the Law and place it beside the ark of the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. There it will remain as a witness against you. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I know how rebellious and stiff-necked you are. If you have been rebellious against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' while I am still alive and with you, how much more will you rebel after I die! '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Assemble before me all the elders of your tribes and all your officials, so that I can speak these words in their hearing and call the heavens and the earth to testify against them. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I know that after my death you are sure to become utterly corrupt and to turn from the way I have commanded you. In days to come, disaster will fall on you because you will do evil in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and arouse his anger by what your hands have made.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Song of Moses
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God himself will cross over ahead of you. He will destroy these nations before you, and you will take possession of their land. Joshua also will cross over ahead of you, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Moses recited the words of this song from beginning to end in the hearing of the whole assembly of Israel:'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will do to them what he did to Sihon and Og, the kings of the Amorites, whom he destroyed along with their land. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will deliver them to you, and you must do to them all that I have commanded you. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be strong and courageous. Do not be afraid or terrified because of them, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God goes with you; he will never leave you nor forsake you.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses summoned Joshua and said to him in the presence of all Israel, “Be strong and courageous, for you must go with this people into the land that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' swore to their ancestors to give them, and you must divide it among them as their inheritance. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' himself goes before you and will be with you; he will never leave you nor forsake you. Do not be afraid; do not be discouraged.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Public Reading of the Law
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses wrote down this law and gave it to the Levitical priests, who carried the ark of the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and to all the elders of Israel. '
