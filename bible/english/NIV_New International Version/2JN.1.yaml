document_id: 2JN.1,111
type_code: eng
verses:
  '1':
  - type: text
    content: The elder,
  - type: text
    content: 'To the lady chosen by God and to her children, whom I love in the truth—and not I only, but also all who know the truth— '
  '10':
  - type: text
    content: 'If anyone comes to you and does not bring this teaching, do not take them into your house or welcome them. '
  '11':
  - type: text
    content: Anyone who welcomes them shares in their wicked work.
  '12':
  - type: text
    content: I have much to write to you, but I do not want to use paper and ink. Instead, I hope to visit you and talk with you face to face, so that our joy may be complete.
  '13':
  - type: text
    content: The children of your sister, who is chosen by God, send their greetings.
  '2':
  - type: text
    content: 'because of the truth, which lives in us and will be with us forever:'
  '3':
  - type: text
    content: Grace, mercy and peace from God the Father and from Jesus Christ, the Father’s Son, will be with us in truth and love.
  '4':
  - type: text
    content: 'It has given me great joy to find some of your children walking in the truth, just as the Father commanded us. '
  '5':
  - type: text
    content: 'And now, dear lady, I am not writing you a new command but one we have had from the beginning. I ask that we love one another. '
  '6':
  - type: text
    content: 'And this is love: that we walk in obedience to his commands. As you have heard from the beginning, his command is that you walk in love.'
  '7':
  - type: text
    content: 'I say this because many deceivers, who do not acknowledge Jesus Christ as coming in the flesh, have gone out into the world. Any such person is the deceiver and the antichrist. '
  '8':
  - type: text
    content: Watch out that you do not lose what we
  - type: note
    content: Some manuscripts you
  - type: text
    content: ' have worked for, but that you may be rewarded fully. '
  '9':
  - type: text
    content: 'Anyone who runs ahead and does not continue in the teaching of Christ does not have God; whoever continues in the teaching has both the Father and the Son. '
