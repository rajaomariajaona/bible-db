document_id: HEB.8,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The High Priest of a New Covenant
  - type: text
    content: 'Now the main point of what we are saying is this: We do have such a high priest, who sat down at the right hand of the throne of the Majesty in heaven, '
  '10':
  - type: text
    content: This is the covenant I will establish with the people of Israel
  - type: text
    content: after that time, declares the Lord.
  - type: text
    content: I will put my laws in their minds
  - type: text
    content: and write them on their hearts.
  - type: text
    content: I will be their God,
  - type: text
    content: and they will be my people.
  '11':
  - type: text
    content: No longer will they teach their neighbor,
  - type: text
    content: or say to one another, ‘Know the Lord,’
  - type: text
    content: because they will all know me,
  - type: text
    content: from the least of them to the greatest.
  '12':
  - type: text
    content: For I will forgive their wickedness
  - type: text
    content: and will remember their sins no more.”
  - type: note
    content: Jer. 31:31-34
  '13':
  - type: text
    content: By calling this covenant “new,” he has made the first one obsolete; and what is obsolete and outdated will soon disappear.
  '2':
  - type: text
    content: and who serves in the sanctuary, the true tabernacle set up by the Lord, not by a mere human being.
  '3':
  - type: text
    content: 'Every high priest is appointed to offer both gifts and sacrifices, and so it was necessary for this one also to have something to offer. '
  '4':
  - type: text
    content: 'If he were on earth, he would not be a priest, for there are already priests who offer the gifts prescribed by the law. '
  '5':
  - type: text
    content: 'They serve at a sanctuary that is a copy and shadow of what is in heaven. This is why Moses was warned when he was about to build the tabernacle: “See to it that you make everything according to the pattern shown you on the mountain.”'
  - type: note
    content: Exodus 25:40
  - type: text
    content: ' '
  '6':
  - type: text
    content: But in fact the ministry Jesus has received is as superior to theirs as the covenant of which he is mediator is superior to the old one, since the new covenant is established on better promises.
  '7':
  - type: text
    content: 'For if there had been nothing wrong with that first covenant, no place would have been sought for another. '
  '8':
  - type: text
    content: But God found fault with the people and said
  - type: note
    content: Some manuscripts may be translated fault and said to the people.
  - type: text
    content: ':'
  - type: text
    content: “The days are coming, declares the Lord,
  - type: text
    content: when I will make a new covenant
  - type: text
    content: with the people of Israel
  - type: text
    content: and with the people of Judah.
  '9':
  - type: text
    content: It will not be like the covenant
  - type: text
    content: I made with their ancestors
  - type: text
    content: when I took them by the hand
  - type: text
    content: to lead them out of Egypt,
  - type: text
    content: because they did not remain faithful to my covenant,
  - type: text
    content: and I turned away from them,
  - type: text
    content: declares the Lord.
