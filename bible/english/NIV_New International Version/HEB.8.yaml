document_id: HEB.8,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The High Priest of a New Covenant
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the main point of what we are saying is this: We do have such a high priest, who sat down at the right hand of the throne of the Majesty in heaven, '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is the covenant I will establish with the people of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: after that time, declares the Lord.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will put my laws in their minds
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and write them on their hearts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will be their God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will be my people.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No longer will they teach their neighbor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or say to one another, ‘Know the Lord,’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because they will all know me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the least of them to the greatest.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I will forgive their wickedness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will remember their sins no more.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jer. 31:31-34
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: By calling this covenant “new,” he has made the first one obsolete; and what is obsolete and outdated will soon disappear.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and who serves in the sanctuary, the true tabernacle set up by the Lord, not by a mere human being.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Every high priest is appointed to offer both gifts and sacrifices, and so it was necessary for this one also to have something to offer. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If he were on earth, he would not be a priest, for there are already priests who offer the gifts prescribed by the law. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They serve at a sanctuary that is a copy and shadow of what is in heaven. This is why Moses was warned when he was about to build the tabernacle: “See to it that you make everything according to the pattern shown you on the mountain.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exodus 25:40
      marker-yv: yv-n
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But in fact the ministry Jesus has received is as superior to theirs as the covenant of which he is mediator is superior to the old one, since the new covenant is established on better promises.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For if there had been nothing wrong with that first covenant, no place would have been sought for another. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But God found fault with the people and said
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts may be translated '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fault and said to the people.
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The days are coming, declares the Lord,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I will make a new covenant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with the people of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and with the people of Judah.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will not be like the covenant
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I made with their ancestors
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when I took them by the hand
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to lead them out of Egypt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because they did not remain faithful to my covenant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I turned away from them,
  - type: usfm
    marker: q4
    children:
    - type: text
      text: declares the Lord.
