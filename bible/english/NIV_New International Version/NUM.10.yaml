document_id: NUM.10,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Silver Trumpets
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses: '
  '10':
  - type: text
    content: 'Also at your times of rejoicing—your appointed festivals and New Moon feasts—you are to sound the trumpets over your burnt offerings and fellowship offerings, and they will be a memorial for you before your God. I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.”'
  - type: heading
    content: The Israelites Leave Sinai
  '11':
  - type: text
    content: 'On the twentieth day of the second month of the second year, the cloud lifted from above the tabernacle of the covenant law. '
  '12':
  - type: text
    content: 'Then the Israelites set out from the Desert of Sinai and traveled from place to place until the cloud came to rest in the Desert of Paran. '
  '13':
  - type: text
    content: 'They set out, this first time, at the '
  - type: text
    content: Lord
  - type: text
    content: ’s command through Moses.
  '14':
  - type: text
    content: 'The divisions of the camp of Judah went first, under their standard. Nahshon son of Amminadab was in command. '
  '15':
  - type: text
    content: 'Nethanel son of Zuar was over the division of the tribe of Issachar, '
  '16':
  - type: text
    content: 'and Eliab son of Helon was over the division of the tribe of Zebulun. '
  '17':
  - type: text
    content: Then the tabernacle was taken down, and the Gershonites and Merarites, who carried it, set out.
  '18':
  - type: text
    content: 'The divisions of the camp of Reuben went next, under their standard. Elizur son of Shedeur was in command. '
  '19':
  - type: text
    content: 'Shelumiel son of Zurishaddai was over the division of the tribe of Simeon, '
  '2':
  - type: text
    content: '“Make two trumpets of hammered silver, and use them for calling the community together and for having the camps set out. '
  '20':
  - type: text
    content: 'and Eliasaph son of Deuel was over the division of the tribe of Gad. '
  '21':
  - type: text
    content: Then the Kohathites set out, carrying the holy things. The tabernacle was to be set up before they arrived.
  '22':
  - type: text
    content: 'The divisions of the camp of Ephraim went next, under their standard. Elishama son of Ammihud was in command. '
  '23':
  - type: text
    content: 'Gamaliel son of Pedahzur was over the division of the tribe of Manasseh, '
  '24':
  - type: text
    content: and Abidan son of Gideoni was over the division of the tribe of Benjamin.
  '25':
  - type: text
    content: 'Finally, as the rear guard for all the units, the divisions of the camp of Dan set out under their standard. Ahiezer son of Ammishaddai was in command. '
  '26':
  - type: text
    content: 'Pagiel son of Okran was over the division of the tribe of Asher, '
  '27':
  - type: text
    content: 'and Ahira son of Enan was over the division of the tribe of Naphtali. '
  '28':
  - type: text
    content: This was the order of march for the Israelite divisions as they set out.
  '29':
  - type: text
    content: 'Now Moses said to Hobab son of Reuel the Midianite, Moses’ father-in-law, “We are setting out for the place about which the '
  - type: text
    content: Lord
  - type: text
    content: ' said, ‘I will give it to you.’ Come with us and we will treat you well, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has promised good things to Israel.”'
  '3':
  - type: text
    content: 'When both are sounded, the whole community is to assemble before you at the entrance to the tent of meeting. '
  '30':
  - type: text
    content: He answered, “No, I will not go; I am going back to my own land and my own people.”
  '31':
  - type: text
    content: 'But Moses said, “Please do not leave us. You know where we should camp in the wilderness, and you can be our eyes. '
  '32':
  - type: text
    content: 'If you come with us, we will share with you whatever good things the '
  - type: text
    content: Lord
  - type: text
    content: ' gives us.”'
  '33':
  - type: text
    content: 'So they set out from the mountain of the '
  - type: text
    content: Lord
  - type: text
    content: ' and traveled for three days. The ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' went before them during those three days to find them a place to rest. '
  '34':
  - type: text
    content: 'The cloud of the '
  - type: text
    content: Lord
  - type: text
    content: ' was over them by day when they set out from the camp.'
  '35':
  - type: text
    content: Whenever the ark set out, Moses said,
  - type: text
    content: '“Rise up, '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: May your enemies be scattered;
  - type: text
    content: may your foes flee before you.”
  '36':
  - type: text
    content: Whenever it came to rest, he said,
  - type: text
    content: '“Return, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: to the countless thousands of Israel.”
  '4':
  - type: text
    content: 'If only one is sounded, the leaders—the heads of the clans of Israel—are to assemble before you. '
  '5':
  - type: text
    content: 'When a trumpet blast is sounded, the tribes camping on the east are to set out. '
  '6':
  - type: text
    content: 'At the sounding of a second blast, the camps on the south are to set out. The blast will be the signal for setting out. '
  '7':
  - type: text
    content: To gather the assembly, blow the trumpets, but not with the signal for setting out.
  '8':
  - type: text
    content: '“The sons of Aaron, the priests, are to blow the trumpets. This is to be a lasting ordinance for you and the generations to come. '
  '9':
  - type: text
    content: 'When you go into battle in your own land against an enemy who is oppressing you, sound a blast on the trumpets. Then you will be remembered by the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and rescued from your enemies. '
