document_id: DEU.21,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Atonement for an Unsolved Murder
  - type: text
    content: 'If someone is found slain, lying in a field in the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you to possess, and it is not known who the killer was, '
  '10':
  - type: text
    content: 'When you go to war against your enemies and the '
  - type: text
    content: Lord
  - type: text
    content: ' your God delivers them into your hands and you take captives, '
  '11':
  - type: text
    content: 'if you notice among the captives a beautiful woman and are attracted to her, you may take her as your wife. '
  '12':
  - type: text
    content: 'Bring her into your home and have her shave her head, trim her nails '
  '13':
  - type: text
    content: 'and put aside the clothes she was wearing when captured. After she has lived in your house and mourned her father and mother for a full month, then you may go to her and be her husband and she shall be your wife. '
  '14':
  - type: text
    content: If you are not pleased with her, let her go wherever she wishes. You must not sell her or treat her as a slave, since you have dishonored her.
  - type: heading
    content: The Right of the Firstborn
  '15':
  - type: text
    content: 'If a man has two wives, and he loves one but not the other, and both bear him sons but the firstborn is the son of the wife he does not love, '
  '16':
  - type: text
    content: 'when he wills his property to his sons, he must not give the rights of the firstborn to the son of the wife he loves in preference to his actual firstborn, the son of the wife he does not love. '
  '17':
  - type: text
    content: He must acknowledge the son of his unloved wife as the firstborn by giving him a double share of all he has. That son is the first sign of his father’s strength. The right of the firstborn belongs to him.
  - type: heading
    content: A Rebellious Son
  '18':
  - type: text
    content: 'If someone has a stubborn and rebellious son who does not obey his father and mother and will not listen to them when they discipline him, '
  '19':
  - type: text
    content: 'his father and mother shall take hold of him and bring him to the elders at the gate of his town. '
  '2':
  - type: text
    content: 'your elders and judges shall go out and measure the distance from the body to the neighboring towns. '
  '20':
  - type: text
    content: 'They shall say to the elders, “This son of ours is stubborn and rebellious. He will not obey us. He is a glutton and a drunkard.” '
  '21':
  - type: text
    content: Then all the men of his town are to stone him to death. You must purge the evil from among you. All Israel will hear of it and be afraid.
  - type: heading
    content: Various Laws
  '22':
  - type: text
    content: 'If someone guilty of a capital offense is put to death and their body is exposed on a pole, '
  '23':
  - type: text
    content: 'you must not leave the body hanging on the pole overnight. Be sure to bury it that same day, because anyone who is hung on a pole is under God’s curse. You must not desecrate the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you as an inheritance.'
  '3':
  - type: text
    content: 'Then the elders of the town nearest the body shall take a heifer that has never been worked and has never worn a yoke '
  '4':
  - type: text
    content: 'and lead it down to a valley that has not been plowed or planted and where there is a flowing stream. There in the valley they are to break the heifer’s neck. '
  '5':
  - type: text
    content: 'The Levitical priests shall step forward, for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has chosen them to minister and to pronounce blessings in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' and to decide all cases of dispute and assault. '
  '6':
  - type: text
    content: 'Then all the elders of the town nearest the body shall wash their hands over the heifer whose neck was broken in the valley, '
  '7':
  - type: text
    content: 'and they shall declare: “Our hands did not shed this blood, nor did our eyes see it done. '
  '8':
  - type: text
    content: 'Accept this atonement for your people Israel, whom you have redeemed, '
  - type: text
    content: Lord
  - type: text
    content: ', and do not hold your people guilty of the blood of an innocent person.” Then the bloodshed will be atoned for, '
  '9':
  - type: text
    content: 'and you will have purged from yourselves the guilt of shedding innocent blood, since you have done what is right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Marrying a Captive Woman
