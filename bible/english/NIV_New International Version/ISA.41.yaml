document_id: ISA.41,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Helper of Israel
  - type: text
    content: “Be silent before me, you islands!
  - type: text
    content: Let the nations renew their strength!
  - type: text
    content: Let them come forward and speak;
  - type: text
    content: let us meet together at the place of judgment.
  '10':
  - type: text
    content: So do not fear, for I am with you;
  - type: text
    content: do not be dismayed, for I am your God.
  - type: text
    content: I will strengthen you and help you;
  - type: text
    content: I will uphold you with my righteous right hand.
  '11':
  - type: text
    content: “All who rage against you
  - type: text
    content: will surely be ashamed and disgraced;
  - type: text
    content: those who oppose you
  - type: text
    content: will be as nothing and perish.
  '12':
  - type: text
    content: Though you search for your enemies,
  - type: text
    content: you will not find them.
  - type: text
    content: Those who wage war against you
  - type: text
    content: will be as nothing at all.
  '13':
  - type: text
    content: 'For I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God'
  - type: text
    content: who takes hold of your right hand
  - type: text
    content: and says to you, Do not fear;
  - type: text
    content: I will help you.
  '14':
  - type: text
    content: Do not be afraid, you worm Jacob,
  - type: text
    content: little Israel, do not fear,
  - type: text
    content: 'for I myself will help you,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: your Redeemer, the Holy One of Israel.
  '15':
  - type: text
    content: “See, I will make you into a threshing sledge,
  - type: text
    content: new and sharp, with many teeth.
  - type: text
    content: You will thresh the mountains and crush them,
  - type: text
    content: and reduce the hills to chaff.
  '16':
  - type: text
    content: You will winnow them, the wind will pick them up,
  - type: text
    content: and a gale will blow them away.
  - type: text
    content: 'But you will rejoice in the '
  - type: text
    content: Lord
  - type: text
    content: and glory in the Holy One of Israel.
  '17':
  - type: text
    content: “The poor and needy search for water,
  - type: text
    content: but there is none;
  - type: text
    content: their tongues are parched with thirst.
  - type: text
    content: 'But I the '
  - type: text
    content: Lord
  - type: text
    content: ' will answer them;'
  - type: text
    content: I, the God of Israel, will not forsake them.
  '18':
  - type: text
    content: I will make rivers flow on barren heights,
  - type: text
    content: and springs within the valleys.
  - type: text
    content: I will turn the desert into pools of water,
  - type: text
    content: and the parched ground into springs.
  '19':
  - type: text
    content: I will put in the desert
  - type: text
    content: the cedar and the acacia, the myrtle and the olive.
  - type: text
    content: I will set junipers in the wasteland,
  - type: text
    content: the fir and the cypress together,
  '2':
  - type: text
    content: “Who has stirred up one from the east,
  - type: text
    content: calling him in righteousness to his service
  - type: note
    content: Or east, / whom victory meets at every step
  - type: text
    content: '?'
  - type: text
    content: He hands nations over to him
  - type: text
    content: and subdues kings before him.
  - type: text
    content: He turns them to dust with his sword,
  - type: text
    content: to windblown chaff with his bow.
  '20':
  - type: text
    content: so that people may see and know,
  - type: text
    content: may consider and understand,
  - type: text
    content: 'that the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' has done this,'
  - type: text
    content: that the Holy One of Israel has created it.
  '21':
  - type: text
    content: '“Present your case,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Set forth your arguments,” says Jacob’s King.
  '22':
  - type: text
    content: “Tell us, you idols,
  - type: text
    content: what is going to happen.
  - type: text
    content: Tell us what the former things were,
  - type: text
    content: so that we may consider them
  - type: text
    content: and know their final outcome.
  - type: text
    content: Or declare to us the things to come,
  '23':
  - type: text
    content: tell us what the future holds,
  - type: text
    content: so we may know that you are gods.
  - type: text
    content: Do something, whether good or bad,
  - type: text
    content: so that we will be dismayed and filled with fear.
  '24':
  - type: text
    content: But you are less than nothing
  - type: text
    content: and your works are utterly worthless;
  - type: text
    content: whoever chooses you is detestable.
  '25':
  - type: text
    content: “I have stirred up one from the north, and he comes—
  - type: text
    content: one from the rising sun who calls on my name.
  - type: text
    content: He treads on rulers as if they were mortar,
  - type: text
    content: as if he were a potter treading the clay.
  '26':
  - type: text
    content: Who told of this from the beginning, so we could know,
  - type: text
    content: or beforehand, so we could say, ‘He was right’?
  - type: text
    content: No one told of this,
  - type: text
    content: no one foretold it,
  - type: text
    content: no one heard any words from you.
  '27':
  - type: text
    content: I was the first to tell Zion, ‘Look, here they are!’
  - type: text
    content: I gave to Jerusalem a messenger of good news.
  '28':
  - type: text
    content: I look but there is no one—
  - type: text
    content: no one among the gods to give counsel,
  - type: text
    content: no one to give answer when I ask them.
  '29':
  - type: text
    content: See, they are all false!
  - type: text
    content: Their deeds amount to nothing;
  - type: text
    content: their images are but wind and confusion.
  '3':
  - type: text
    content: He pursues them and moves on unscathed,
  - type: text
    content: by a path his feet have not traveled before.
  '4':
  - type: text
    content: Who has done this and carried it through,
  - type: text
    content: calling forth the generations from the beginning?
  - type: text
    content: 'I, the '
  - type: text
    content: Lord
  - type: text
    content: —with the first of them
  - type: text
    content: and with the last—I am he.”
  '5':
  - type: text
    content: The islands have seen it and fear;
  - type: text
    content: the ends of the earth tremble.
  - type: text
    content: They approach and come forward;
  '6':
  - type: text
    content: they help each other
  - type: text
    content: and say to their companions, “Be strong!”
  '7':
  - type: text
    content: The metalworker encourages the goldsmith,
  - type: text
    content: and the one who smooths with the hammer
  - type: text
    content: spurs on the one who strikes the anvil.
  - type: text
    content: One says of the welding, “It is good.”
  - type: text
    content: The other nails down the idol so it will not topple.
  '8':
  - type: text
    content: “But you, Israel, my servant,
  - type: text
    content: Jacob, whom I have chosen,
  - type: text
    content: you descendants of Abraham my friend,
  '9':
  - type: text
    content: I took you from the ends of the earth,
  - type: text
    content: from its farthest corners I called you.
  - type: text
    content: I said, ‘You are my servant’;
  - type: text
    content: I have chosen you and have not rejected you.
