document_id: ISA.41
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Helper of Israel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Be silent before me, you islands!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let the nations renew their strength!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them come forward and speak;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let us meet together at the place of judgment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Who has stirred up one from the east,
- type: usfm
  marker: q2
  children:
  - type: text
    text: calling him in righteousness to his service
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: east, / whom victory meets at every step
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He hands nations over to him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and subdues kings before him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He turns them to dust with his sword,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to windblown chaff with his bow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He pursues them and moves on unscathed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: by a path his feet have not traveled before.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Who has done this and carried it through,
- type: usfm
  marker: q2
  children:
  - type: text
    text: calling forth the generations from the beginning?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: —with the first of them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and with the last—I am he.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The islands have seen it and fear;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the ends of the earth tremble.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They approach and come forward;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: they help each other
- type: usfm
  marker: q2
  children:
  - type: text
    text: and say to their companions, “Be strong!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The metalworker encourages the goldsmith,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the one who smooths with the hammer
- type: usfm
  marker: q2
  children:
  - type: text
    text: spurs on the one who strikes the anvil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: One says of the welding, “It is good.”
- type: usfm
  marker: q2
  children:
  - type: text
    text: The other nails down the idol so it will not topple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “But you, Israel, my servant,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Jacob, whom I have chosen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you descendants of Abraham my friend,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I took you from the ends of the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from its farthest corners I called you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I said, ‘You are my servant’;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have chosen you and have not rejected you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So do not fear, for I am with you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not be dismayed, for I am your God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will strengthen you and help you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will uphold you with my righteous right hand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “All who rage against you
- type: usfm
  marker: q2
  children:
  - type: text
    text: will surely be ashamed and disgraced;
- type: usfm
  marker: q1
  children:
  - type: text
    text: those who oppose you
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be as nothing and perish.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Though you search for your enemies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will not find them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who wage war against you
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be as nothing at all.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God'
- type: usfm
  marker: q2
  children:
  - type: text
    text: who takes hold of your right hand
- type: usfm
  marker: q1
  children:
  - type: text
    text: and says to you, Do not fear;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will help you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Do not be afraid, you worm Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: little Israel, do not fear,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'for I myself will help you,” declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: your Redeemer, the Holy One of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “See, I will make you into a threshing sledge,
- type: usfm
  marker: q2
  children:
  - type: text
    text: new and sharp, with many teeth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will thresh the mountains and crush them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and reduce the hills to chaff.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: You will winnow them, the wind will pick them up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a gale will blow them away.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But you will rejoice in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: and glory in the Holy One of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “The poor and needy search for water,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but there is none;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their tongues are parched with thirst.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'But I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will answer them;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I, the God of Israel, will not forsake them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: I will make rivers flow on barren heights,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and springs within the valleys.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will turn the desert into pools of water,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the parched ground into springs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: I will put in the desert
- type: usfm
  marker: q2
  children:
  - type: text
    text: the cedar and the acacia, the myrtle and the olive.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will set junipers in the wasteland,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the fir and the cypress together,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: so that people may see and know,
- type: usfm
  marker: q2
  children:
  - type: text
    text: may consider and understand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'that the hand of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has done this,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: that the Holy One of Israel has created it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“Present your case,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Set forth your arguments,” says Jacob’s King.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Tell us, you idols,
- type: usfm
  marker: q2
  children:
  - type: text
    text: what is going to happen.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tell us what the former things were,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that we may consider them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and know their final outcome.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Or declare to us the things to come,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: tell us what the future holds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so we may know that you are gods.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do something, whether good or bad,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that we will be dismayed and filled with fear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: But you are less than nothing
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your works are utterly worthless;
- type: usfm
  marker: q2
  children:
  - type: text
    text: whoever chooses you is detestable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “I have stirred up one from the north, and he comes—
- type: usfm
  marker: q2
  children:
  - type: text
    text: one from the rising sun who calls on my name.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He treads on rulers as if they were mortar,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as if he were a potter treading the clay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Who told of this from the beginning, so we could know,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or beforehand, so we could say, ‘He was right’?
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one told of this,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one foretold it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one heard any words from you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: I was the first to tell Zion, ‘Look, here they are!’
- type: usfm
  marker: q2
  children:
  - type: text
    text: I gave to Jerusalem a messenger of good news.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: I look but there is no one—
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one among the gods to give counsel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one to give answer when I ask them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: See, they are all false!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Their deeds amount to nothing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their images are but wind and confusion.
