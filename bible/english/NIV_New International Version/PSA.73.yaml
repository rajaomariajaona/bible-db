document_id: PSA.73
type_code: eng
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: BOOK III
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: Psalms 73–89
  marker-yv: yv-h
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 73
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A psalm of Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Surely God is good to Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to those who are pure in heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: But as for me, my feet had almost slipped;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I had nearly lost my foothold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For I envied the arrogant
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I saw the prosperity of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They have no struggles;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their bodies are healthy and strong.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '73:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'With a different word division of the Hebrew; Masoretic Text '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: struggles at their death; / their bodies are healthy
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They are free from common human burdens;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are not plagued by human ills.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Therefore pride is their necklace;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they clothe themselves with violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: From their callous hearts comes iniquity
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '73:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Syriac (see also Septuagint); Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Their eyes bulge with fat
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their evil imaginations have no limits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They scoff, and speak with malice;
- type: usfm
  marker: q2
  children:
  - type: text
    text: with arrogance they threaten oppression.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Their mouths lay claim to heaven,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their tongues take possession of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Therefore their people turn to them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and drink up waters in abundance.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '73:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this verse is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They say, “How would God know?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Does the Most High know anything?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: This is what the wicked are like—
- type: usfm
  marker: q2
  children:
  - type: text
    text: always free of care, they go on amassing wealth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Surely in vain I have kept my heart pure
- type: usfm
  marker: q2
  children:
  - type: text
    text: and have washed my hands in innocence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: All day long I have been afflicted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and every morning brings new punishments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: If I had spoken out like that,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I would have betrayed your children.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When I tried to understand all this,
- type: usfm
  marker: q2
  children:
  - type: text
    text: it troubled me deeply
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: till I entered the sanctuary of God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: then I understood their final destiny.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Surely you place them on slippery ground;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you cast them down to ruin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: How suddenly are they destroyed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: completely swept away by terrors!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: They are like a dream when one awakes;
- type: usfm
  marker: q2
  children:
  - type: text
    text: when you arise, Lord,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will despise them as fantasies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: When my heart was grieved
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my spirit embittered,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: I was senseless and ignorant;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I was a brute beast before you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Yet I am always with you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you hold me by my right hand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: You guide me with your counsel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and afterward you will take me into glory.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Whom have I in heaven but you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And earth has nothing I desire besides you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: My flesh and my heart may fail,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but God is the strength of my heart
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my portion forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Those who are far from you will perish;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you destroy all who are unfaithful to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: But as for me, it is good to be near God.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'I have made the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my refuge;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will tell of all your deeds.
