document_id: PSA.73,111
type_code: eng
verses:
  '1':
  - type: heading
    content: BOOK III
  - type: heading
    content: Psalms 73–89
  - type: heading
    content: Psalm 73
  - type: text
    content: A psalm of Asaph.
  - type: text
    content: Surely God is good to Israel,
  - type: text
    content: to those who are pure in heart.
  '10':
  - type: text
    content: Therefore their people turn to them
  - type: text
    content: and drink up waters in abundance.
  - type: note
    content: The meaning of the Hebrew for this verse is uncertain.
  '11':
  - type: text
    content: They say, “How would God know?
  - type: text
    content: Does the Most High know anything?”
  '12':
  - type: text
    content: This is what the wicked are like—
  - type: text
    content: always free of care, they go on amassing wealth.
  '13':
  - type: text
    content: Surely in vain I have kept my heart pure
  - type: text
    content: and have washed my hands in innocence.
  '14':
  - type: text
    content: All day long I have been afflicted,
  - type: text
    content: and every morning brings new punishments.
  '15':
  - type: text
    content: If I had spoken out like that,
  - type: text
    content: I would have betrayed your children.
  '16':
  - type: text
    content: When I tried to understand all this,
  - type: text
    content: it troubled me deeply
  '17':
  - type: text
    content: till I entered the sanctuary of God;
  - type: text
    content: then I understood their final destiny.
  '18':
  - type: text
    content: Surely you place them on slippery ground;
  - type: text
    content: you cast them down to ruin.
  '19':
  - type: text
    content: How suddenly are they destroyed,
  - type: text
    content: completely swept away by terrors!
  '2':
  - type: text
    content: But as for me, my feet had almost slipped;
  - type: text
    content: I had nearly lost my foothold.
  '20':
  - type: text
    content: They are like a dream when one awakes;
  - type: text
    content: when you arise, Lord,
  - type: text
    content: you will despise them as fantasies.
  '21':
  - type: text
    content: When my heart was grieved
  - type: text
    content: and my spirit embittered,
  '22':
  - type: text
    content: I was senseless and ignorant;
  - type: text
    content: I was a brute beast before you.
  '23':
  - type: text
    content: Yet I am always with you;
  - type: text
    content: you hold me by my right hand.
  '24':
  - type: text
    content: You guide me with your counsel,
  - type: text
    content: and afterward you will take me into glory.
  '25':
  - type: text
    content: Whom have I in heaven but you?
  - type: text
    content: And earth has nothing I desire besides you.
  '26':
  - type: text
    content: My flesh and my heart may fail,
  - type: text
    content: but God is the strength of my heart
  - type: text
    content: and my portion forever.
  '27':
  - type: text
    content: Those who are far from you will perish;
  - type: text
    content: you destroy all who are unfaithful to you.
  '28':
  - type: text
    content: But as for me, it is good to be near God.
  - type: text
    content: 'I have made the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' my refuge;'
  - type: text
    content: I will tell of all your deeds.
  '3':
  - type: text
    content: For I envied the arrogant
  - type: text
    content: when I saw the prosperity of the wicked.
  '4':
  - type: text
    content: They have no struggles;
  - type: text
    content: their bodies are healthy and strong.
  - type: note
    content: With a different word division of the Hebrew; Masoretic Text struggles at their death; / their bodies are healthy
  '5':
  - type: text
    content: They are free from common human burdens;
  - type: text
    content: they are not plagued by human ills.
  '6':
  - type: text
    content: Therefore pride is their necklace;
  - type: text
    content: they clothe themselves with violence.
  '7':
  - type: text
    content: From their callous hearts comes iniquity
  - type: note
    content: Syriac (see also Septuagint); Hebrew Their eyes bulge with fat
  - type: text
    content: ;
  - type: text
    content: their evil imaginations have no limits.
  '8':
  - type: text
    content: They scoff, and speak with malice;
  - type: text
    content: with arrogance they threaten oppression.
  '9':
  - type: text
    content: Their mouths lay claim to heaven,
  - type: text
    content: and their tongues take possession of the earth.
