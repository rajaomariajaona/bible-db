document_id: EZK.24,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem as a Cooking Pot
  - type: text
    content: 'In the ninth year, in the tenth month on the tenth day, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: So heap on the wood
  - type: text
    content: and kindle the fire.
  - type: text
    content: Cook the meat well,
  - type: text
    content: mixing in the spices;
  - type: text
    content: and let the bones be charred.
  '11':
  - type: text
    content: Then set the empty pot on the coals
  - type: text
    content: till it becomes hot and its copper glows,
  - type: text
    content: so that its impurities may be melted
  - type: text
    content: and its deposit burned away.
  '12':
  - type: text
    content: It has frustrated all efforts;
  - type: text
    content: its heavy deposit has not been removed,
  - type: text
    content: not even by fire.
  '13':
  - type: text
    content: “ ‘Now your impurity is lewdness. Because I tried to cleanse you but you would not be cleansed from your impurity, you will not be clean again until my wrath against you has subsided.
  '14':
  - type: text
    content: '“ ‘I the '
  - type: text
    content: Lord
  - type: text
    content: ' have spoken. The time has come for me to act. I will not hold back; I will not have pity, nor will I relent. You will be judged according to your conduct and your actions, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  - type: heading
    content: Ezekiel’s Wife Dies
  '15':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '16':
  - type: text
    content: '“Son of man, with one blow I am about to take away from you the delight of your eyes. Yet do not lament or weep or shed any tears. '
  '17':
  - type: text
    content: Groan quietly; do not mourn for the dead. Keep your turban fastened and your sandals on your feet; do not cover your mustache and beard or eat the customary food of mourners.”
  '18':
  - type: text
    content: So I spoke to the people in the morning, and in the evening my wife died. The next morning I did as I had been commanded.
  '19':
  - type: text
    content: Then the people asked me, “Won’t you tell us what these things have to do with us? Why are you acting like this?”
  '2':
  - type: text
    content: '“Son of man, record this date, this very date, because the king of Babylon has laid siege to Jerusalem this very day. '
  '20':
  - type: text
    content: 'So I said to them, “The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '21':
  - type: text
    content: 'Say to the people of Israel, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am about to desecrate my sanctuary—the stronghold in which you take pride, the delight of your eyes, the object of your affection. The sons and daughters you left behind will fall by the sword. '
  '22':
  - type: text
    content: 'And you will do as I have done. You will not cover your mustache and beard or eat the customary food of mourners. '
  '23':
  - type: text
    content: You will keep your turbans on your heads and your sandals on your feet. You will not mourn or weep but will waste away because of
  - type: note
    content: Or away in
  - type: text
    content: ' your sins and groan among yourselves. '
  '24':
  - type: text
    content: 'Ezekiel will be a sign to you; you will do just as he has done. When this happens, you will know that I am the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .’
  '25':
  - type: text
    content: '“And you, son of man, on the day I take away their stronghold, their joy and glory, the delight of their eyes, their heart’s desire, and their sons and daughters as well— '
  '26':
  - type: text
    content: 'on that day a fugitive will come to tell you the news. '
  '27':
  - type: text
    content: 'At that time your mouth will be opened; you will speak with him and will no longer be silent. So you will be a sign to them, and they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '3':
  - type: text
    content: 'Tell this rebellious people a parable and say to them: ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘Put on the cooking pot; put it on
  - type: text
    content: and pour water into it.
  '4':
  - type: text
    content: Put into it the pieces of meat,
  - type: text
    content: all the choice pieces—the leg and the shoulder.
  - type: text
    content: Fill it with the best of these bones;
  '5':
  - type: text
    content: take the pick of the flock.
  - type: text
    content: Pile wood beneath it for the bones;
  - type: text
    content: bring it to a boil
  - type: text
    content: and cook the bones in it.
  '6':
  - type: text
    content: '“ ‘For this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘Woe to the city of bloodshed,
  - type: text
    content: to the pot now encrusted,
  - type: text
    content: whose deposit will not go away!
  - type: text
    content: Take the meat out piece by piece
  - type: text
    content: in whatever order it comes.
  '7':
  - type: text
    content: '“ ‘For the blood she shed is in her midst:'
  - type: text
    content: She poured it on the bare rock;
  - type: text
    content: she did not pour it on the ground,
  - type: text
    content: where the dust would cover it.
  '8':
  - type: text
    content: To stir up wrath and take revenge
  - type: text
    content: I put her blood on the bare rock,
  - type: text
    content: so that it would not be covered.
  '9':
  - type: text
    content: '“ ‘Therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘Woe to the city of bloodshed!
  - type: text
    content: I, too, will pile the wood high.
