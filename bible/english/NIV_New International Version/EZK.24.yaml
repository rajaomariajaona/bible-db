document_id: EZK.24
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jerusalem as a Cooking Pot
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the ninth year, in the tenth month on the tenth day, the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came to me: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, record this date, this very date, because the king of Babylon has laid siege to Jerusalem this very day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tell this rebellious people a parable and say to them: ‘This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘Put on the cooking pot; put it on
- type: usfm
  marker: q2
  children:
  - type: text
    text: and pour water into it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Put into it the pieces of meat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all the choice pieces—the leg and the shoulder.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fill it with the best of these bones;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: take the pick of the flock.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pile wood beneath it for the bones;
- type: usfm
  marker: q2
  children:
  - type: text
    text: bring it to a boil
- type: usfm
  marker: q2
  children:
  - type: text
    text: and cook the bones in it.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“ ‘For this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘Woe to the city of bloodshed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the pot now encrusted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose deposit will not go away!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Take the meat out piece by piece
- type: usfm
  marker: q2
  children:
  - type: text
    text: in whatever order it comes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“ ‘For the blood she shed is in her midst:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: She poured it on the bare rock;
- type: usfm
  marker: q1
  children:
  - type: text
    text: she did not pour it on the ground,
- type: usfm
  marker: q2
  children:
  - type: text
    text: where the dust would cover it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: To stir up wrath and take revenge
- type: usfm
  marker: q2
  children:
  - type: text
    text: I put her blood on the bare rock,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that it would not be covered.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“ ‘Therefore this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘Woe to the city of bloodshed!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I, too, will pile the wood high.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: So heap on the wood
- type: usfm
  marker: q2
  children:
  - type: text
    text: and kindle the fire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cook the meat well,
- type: usfm
  marker: q2
  children:
  - type: text
    text: mixing in the spices;
- type: usfm
  marker: q2
  children:
  - type: text
    text: and let the bones be charred.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Then set the empty pot on the coals
- type: usfm
  marker: q2
  children:
  - type: text
    text: till it becomes hot and its copper glows,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so that its impurities may be melted
- type: usfm
  marker: q2
  children:
  - type: text
    text: and its deposit burned away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: It has frustrated all efforts;
- type: usfm
  marker: q2
  children:
  - type: text
    text: its heavy deposit has not been removed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not even by fire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “ ‘Now your impurity is lewdness. Because I tried to cleanse you but you would not be cleansed from your impurity, you will not be clean again until my wrath against you has subsided.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“ ‘I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' have spoken. The time has come for me to act. I will not hold back; I will not have pity, nor will I relent. You will be judged according to your conduct and your actions, declares the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .’ ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ezekiel’s Wife Dies
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came to me: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“Son of man, with one blow I am about to take away from you the delight of your eyes. Yet do not lament or weep or shed any tears. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Groan quietly; do not mourn for the dead. Keep your turban fastened and your sandals on your feet; do not cover your mustache and beard or eat the customary food of mourners.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: So I spoke to the people in the morning, and in the evening my wife died. The next morning I did as I had been commanded.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then the people asked me, “Won’t you tell us what these things have to do with us? Why are you acting like this?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'So I said to them, “The word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came to me: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Say to the people of Israel, ‘This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: I am about to desecrate my sanctuary—the stronghold in which you take pride, the delight of your eyes, the object of your affection. The sons and daughters you left behind will fall by the sword. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And you will do as I have done. You will not cover your mustache and beard or eat the customary food of mourners. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: You will keep your turbans on your heads and your sandals on your feet. You will not mourn or weep but will waste away because of
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: away in
    marker-yv: yv-n
  - type: text
    text: ' your sins and groan among yourselves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ezekiel will be a sign to you; you will do just as he has done. When this happens, you will know that I am the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“And you, son of man, on the day I take away their stronghold, their joy and glory, the delight of their eyes, their heart’s desire, and their sons and daughters as well— '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'on that day a fugitive will come to tell you the news. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'At that time your mouth will be opened; you will speak with him and will no longer be silent. So you will be a sign to them, and they will know that I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
