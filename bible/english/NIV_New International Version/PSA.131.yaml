document_id: PSA.131,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 131
  - type: text
    content: A song of ascents. Of David.
  - type: text
    content: 'My heart is not proud, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: my eyes are not haughty;
  - type: text
    content: I do not concern myself with great matters
  - type: text
    content: or things too wonderful for me.
  '2':
  - type: text
    content: But I have calmed and quieted myself,
  - type: text
    content: I am like a weaned child with its mother;
  - type: text
    content: like a weaned child I am content.
  '3':
  - type: text
    content: 'Israel, put your hope in the '
  - type: text
    content: Lord
  - type: text
    content: both now and forevermore.
