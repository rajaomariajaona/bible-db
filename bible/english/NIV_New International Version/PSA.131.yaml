verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 131
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song of ascents. Of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'My heart is not proud, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my eyes are not haughty;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I do not concern myself with great matters
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or things too wonderful for me.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I have calmed and quieted myself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am like a weaned child with its mother;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a weaned child I am content.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Israel, put your hope in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: both now and forevermore.
