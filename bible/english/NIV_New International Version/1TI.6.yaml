document_id: 1TI.6,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'All who are under the yoke of slavery should consider their masters worthy of full respect, so that God’s name and our teaching may not be slandered. '
  '10':
  - type: text
    content: For the love of money is a root of all kinds of evil. Some people, eager for money, have wandered from the faith and pierced themselves with many griefs.
  - type: heading
    content: Final Charge to Timothy
  '11':
  - type: text
    content: 'But you, man of God, flee from all this, and pursue righteousness, godliness, faith, love, endurance and gentleness. '
  '12':
  - type: text
    content: 'Fight the good fight of the faith. Take hold of the eternal life to which you were called when you made your good confession in the presence of many witnesses. '
  '13':
  - type: text
    content: 'In the sight of God, who gives life to everything, and of Christ Jesus, who while testifying before Pontius Pilate made the good confession, I charge you '
  '14':
  - type: text
    content: 'to keep this command without spot or blame until the appearing of our Lord Jesus Christ, '
  '15':
  - type: text
    content: 'which God will bring about in his own time—God, the blessed and only Ruler, the King of kings and Lord of lords, '
  '16':
  - type: text
    content: who alone is immortal and who lives in unapproachable light, whom no one has seen or can see. To him be honor and might forever. Amen.
  '17':
  - type: text
    content: 'Command those who are rich in this present world not to be arrogant nor to put their hope in wealth, which is so uncertain, but to put their hope in God, who richly provides us with everything for our enjoyment. '
  '18':
  - type: text
    content: 'Command them to do good, to be rich in good deeds, and to be generous and willing to share. '
  '19':
  - type: text
    content: In this way they will lay up treasure for themselves as a firm foundation for the coming age, so that they may take hold of the life that is truly life.
  '2':
  - type: text
    content: Those who have believing masters should not show them disrespect just because they are fellow believers. Instead, they should serve them even better because their masters are dear to them as fellow believers and are devoted to the welfare
  - type: note
    content: Or and benefit from the service
  - type: text
    content: ' of their slaves.'
  - type: heading
    content: False Teachers and the Love of Money
  - type: text
    content: 'These are the things you are to teach and insist on. '
  '20':
  - type: text
    content: 'Timothy, guard what has been entrusted to your care. Turn away from godless chatter and the opposing ideas of what is falsely called knowledge, '
  '21':
  - type: text
    content: which some have professed and in so doing have departed from the faith.
  - type: text
    content: Grace be with you all.
  '3':
  - type: text
    content: 'If anyone teaches otherwise and does not agree to the sound instruction of our Lord Jesus Christ and to godly teaching, '
  '4':
  - type: text
    content: 'they are conceited and understand nothing. They have an unhealthy interest in controversies and quarrels about words that result in envy, strife, malicious talk, evil suspicions '
  '5':
  - type: text
    content: and constant friction between people of corrupt mind, who have been robbed of the truth and who think that godliness is a means to financial gain.
  '6':
  - type: text
    content: 'But godliness with contentment is great gain. '
  '7':
  - type: text
    content: 'For we brought nothing into the world, and we can take nothing out of it. '
  '8':
  - type: text
    content: 'But if we have food and clothing, we will be content with that. '
  '9':
  - type: text
    content: 'Those who want to get rich fall into temptation and a trap and into many foolish and harmful desires that plunge people into ruin and destruction. '
