    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the director of music. Of the Sons of Korah. According to '
    - type: usfm
      marker: tl
      children:
      - type: text
        text: alamoth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Title: Probably a musical term'
      marker-yv: yv-n
    - type: text
      text: ' A song.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God is our refuge and strength,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an ever-present help in trouble.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He says, “Be still, and know that I am God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will be exalted among the nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will be exalted in the earth.”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty is with us;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the God of Jacob is our fortress.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore we will not fear, though the earth give way
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the mountains fall into the heart of the sea,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: though its waters roar and foam
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the mountains quake with their surging.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew has '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Selah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a word of uncertain meaning) here and at the end of verses 7 and 11.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is a river whose streams make glad the city of God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the holy place where the Most High dwells.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God is within her, she will not fall;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God will help her at break of day.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nations are in uproar, kingdoms fall;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he lifts his voice, the earth melts.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty is with us;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the God of Jacob is our fortress.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Come and see what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has done,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the desolations he has brought on the earth.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He makes wars cease
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the ends of the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He breaks the bow and shatters the spear;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he burns the shields
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '46:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chariots
      marker-yv: yv-n
    - type: text
      text: ' with fire.'
