document_id: PSA.46,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 46In Hebrew texts 46:1-11 is numbered 46:2-12.
  - type: text
    content: 'For the director of music. Of the Sons of Korah. According to '
  - type: text
    content: alamoth.
  - type: note
    content: 'Title: Probably a musical term'
  - type: text
    content: ' A song.'
  - type: text
    content: God is our refuge and strength,
  - type: text
    content: an ever-present help in trouble.
  '10':
  - type: text
    content: He says, “Be still, and know that I am God;
  - type: text
    content: I will be exalted among the nations,
  - type: text
    content: I will be exalted in the earth.”
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty is with us;'
  - type: text
    content: the God of Jacob is our fortress.
  '2':
  - type: text
    content: Therefore we will not fear, though the earth give way
  - type: text
    content: and the mountains fall into the heart of the sea,
  '3':
  - type: text
    content: though its waters roar and foam
  - type: text
    content: and the mountains quake with their surging.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here and at the end of verses 7 and 11.
  '4':
  - type: text
    content: There is a river whose streams make glad the city of God,
  - type: text
    content: the holy place where the Most High dwells.
  '5':
  - type: text
    content: God is within her, she will not fall;
  - type: text
    content: God will help her at break of day.
  '6':
  - type: text
    content: Nations are in uproar, kingdoms fall;
  - type: text
    content: he lifts his voice, the earth melts.
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty is with us;'
  - type: text
    content: the God of Jacob is our fortress.
  '8':
  - type: text
    content: 'Come and see what the '
  - type: text
    content: Lord
  - type: text
    content: ' has done,'
  - type: text
    content: the desolations he has brought on the earth.
  '9':
  - type: text
    content: He makes wars cease
  - type: text
    content: to the ends of the earth.
  - type: text
    content: He breaks the bow and shatters the spear;
  - type: text
    content: he burns the shields
  - type: note
    content: Or chariots
  - type: text
    content: ' with fire.'
