document_id: 1CH.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sons of David
  - type: text
    content: 'These were the sons of David born to him in Hebron:'
  - type: text
    content: The firstborn was Amnon the son of Ahinoam of Jezreel;
  - type: text
    content: the second, Daniel the son of Abigail of Carmel;
  '10':
  - type: text
    content: Solomon’s son was Rehoboam,
  - type: text
    content: Abijah his son,
  - type: text
    content: Asa his son,
  - type: text
    content: Jehoshaphat his son,
  '11':
  - type: text
    content: Jehoram
  - type: note
    content: Hebrew Joram, a variant of Jehoram
  - type: text
    content: ' his son,'
  - type: text
    content: Ahaziah his son,
  - type: text
    content: Joash his son,
  '12':
  - type: text
    content: Amaziah his son,
  - type: text
    content: Azariah his son,
  - type: text
    content: Jotham his son,
  '13':
  - type: text
    content: Ahaz his son,
  - type: text
    content: Hezekiah his son,
  - type: text
    content: Manasseh his son,
  '14':
  - type: text
    content: Amon his son,
  - type: text
    content: Josiah his son.
  '15':
  - type: text
    content: 'The sons of Josiah:'
  - type: text
    content: Johanan the firstborn,
  - type: text
    content: Jehoiakim the second son,
  - type: text
    content: Zedekiah the third,
  - type: text
    content: Shallum the fourth.
  '16':
  - type: text
    content: 'The successors of Jehoiakim:'
  - type: text
    content: Jehoiachin
  - type: note
    content: Hebrew Jeconiah, a variant of Jehoiachin; also in verse 17
  - type: text
    content: ' his son,'
  - type: text
    content: and Zedekiah.
  - type: heading
    content: The Royal Line After the Exile
  '17':
  - type: text
    content: 'The descendants of Jehoiachin the captive:'
  - type: text
    content: 'Shealtiel his son, '
  '18':
  - type: text
    content: Malkiram, Pedaiah, Shenazzar, Jekamiah, Hoshama and Nedabiah.
  '19':
  - type: text
    content: 'The sons of Pedaiah:'
  - type: text
    content: Zerubbabel and Shimei.
  - type: text
    content: 'The sons of Zerubbabel:'
  - type: text
    content: Meshullam and Hananiah.
  - type: text
    content: Shelomith was their sister.
  '2':
  - type: text
    content: the third, Absalom the son of Maakah daughter of Talmai king of Geshur;
  - type: text
    content: the fourth, Adonijah the son of Haggith;
  '20':
  - type: text
    content: 'There were also five others:'
  - type: text
    content: Hashubah, Ohel, Berekiah, Hasadiah and Jushab-Hesed.
  '21':
  - type: text
    content: 'The descendants of Hananiah:'
  - type: text
    content: Pelatiah and Jeshaiah, and the sons of Rephaiah, of Arnan, of Obadiah and of Shekaniah.
  '22':
  - type: text
    content: 'The descendants of Shekaniah:'
  - type: text
    content: 'Shemaiah and his sons:'
  - type: text
    content: Hattush, Igal, Bariah, Neariah and Shaphat—six in all.
  '23':
  - type: text
    content: 'The sons of Neariah:'
  - type: text
    content: Elioenai, Hizkiah and Azrikam—three in all.
  '24':
  - type: text
    content: 'The sons of Elioenai:'
  - type: text
    content: Hodaviah, Eliashib, Pelaiah, Akkub, Johanan, Delaiah and Anani—seven in all.
  '3':
  - type: text
    content: the fifth, Shephatiah the son of Abital;
  - type: text
    content: and the sixth, Ithream, by his wife Eglah.
  '4':
  - type: text
    content: These six were born to David in Hebron, where he reigned seven years and six months.
  - type: text
    content: 'David reigned in Jerusalem thirty-three years, '
  '5':
  - type: text
    content: 'and these were the children born to him there:'
  - type: text
    content: Shammua,
  - type: note
    content: Hebrew Shimea, a variant of Shammua
  - type: text
    content: ' Shobab, Nathan and Solomon. These four were by Bathsheba'
  - type: note
    content: One Hebrew manuscript and Vulgate (see also Septuagint and 2 Samuel 11:3); most Hebrew manuscripts Bathshua
  - type: text
    content: ' daughter of Ammiel. '
  '6':
  - type: text
    content: There were also Ibhar, Elishua,
  - type: note
    content: Two Hebrew manuscripts (see also 2 Samuel 5:15 and 1 Chron. 14:5); most Hebrew manuscripts Elishama
  - type: text
    content: ' Eliphelet, '
  '7':
  - type: text
    content: 'Nogah, Nepheg, Japhia, '
  '8':
  - type: text
    content: 'Elishama, Eliada and Eliphelet—nine in all. '
  '9':
  - type: text
    content: All these were the sons of David, besides his sons by his concubines. And Tamar was their sister.
  - type: heading
    content: The Kings of Judah
