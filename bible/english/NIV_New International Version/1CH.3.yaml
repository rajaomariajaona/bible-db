document_id: 1CH.3
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Sons of David
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'These were the sons of David born to him in Hebron:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: The firstborn was Amnon the son of Ahinoam of Jezreel;
- type: usfm
  marker: li2
  children:
  - type: text
    text: the second, Daniel the son of Abigail of Carmel;
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: the third, Absalom the son of Maakah daughter of Talmai king of Geshur;
- type: usfm
  marker: li2
  children:
  - type: text
    text: the fourth, Adonijah the son of Haggith;
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: the fifth, Shephatiah the son of Abital;
- type: usfm
  marker: li2
  children:
  - type: text
    text: and the sixth, Ithream, by his wife Eglah.
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: These six were born to David in Hebron, where he reigned seven years and six months.
- type: usfm
  marker: m
  children:
  - type: text
    text: 'David reigned in Jerusalem thirty-three years, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'and these were the children born to him there:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Shammua,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Shimea, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Shammua
    marker-yv: yv-n
  - type: text
    text: ' Shobab, Nathan and Solomon. These four were by Bathsheba'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'One Hebrew manuscript and Vulgate (see also Septuagint and 2 Samuel 11:3); most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Bathshua
    marker-yv: yv-n
  - type: text
    text: ' daughter of Ammiel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: There were also Ibhar, Elishua,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Two Hebrew manuscripts (see also 2 Samuel 5:15 and 1 Chron. 14:5); most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Elishama
    marker-yv: yv-n
  - type: text
    text: ' Eliphelet, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nogah, Nepheg, Japhia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Elishama, Eliada and Eliphelet—nine in all. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: All these were the sons of David, besides his sons by his concubines. And Tamar was their sister.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Kings of Judah
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Solomon’s son was Rehoboam,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Abijah his son,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Asa his son,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jehoshaphat his son,
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Jehoram
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Joram, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jehoram
    marker-yv: yv-n
  - type: text
    text: ' his son,'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Ahaziah his son,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Joash his son,
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Amaziah his son,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Azariah his son,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jotham his son,
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ahaz his son,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Hezekiah his son,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Manasseh his son,
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Amon his son,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Josiah his son.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The sons of Josiah:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Johanan the firstborn,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jehoiakim the second son,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Zedekiah the third,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Shallum the fourth.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The successors of Jehoiakim:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jehoiachin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jeconiah, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jehoiachin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verse 17
    marker-yv: yv-n
  - type: text
    text: ' his son,'
- type: usfm
  marker: li2
  children:
  - type: text
    text: and Zedekiah.
- type: usfm
  marker: s2
  children:
  - type: text
    text: The Royal Line After the Exile
  marker-yv: yv-h
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The descendants of Jehoiachin the captive:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Shealtiel his son, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Malkiram, Pedaiah, Shenazzar, Jekamiah, Hoshama and Nedabiah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The sons of Pedaiah:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Zerubbabel and Shimei.
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'The sons of Zerubbabel:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Meshullam and Hananiah.
- type: usfm
  marker: li2
  children:
  - type: text
    text: Shelomith was their sister.
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'There were also five others:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Hashubah, Ohel, Berekiah, Hasadiah and Jushab-Hesed.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The descendants of Hananiah:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Pelatiah and Jeshaiah, and the sons of Rephaiah, of Arnan, of Obadiah and of Shekaniah.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The descendants of Shekaniah:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Shemaiah and his sons:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Hattush, Igal, Bariah, Neariah and Shaphat—six in all.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The sons of Neariah:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Elioenai, Hizkiah and Azrikam—three in all.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The sons of Elioenai:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Hodaviah, Eliashib, Pelaiah, Akkub, Johanan, Delaiah and Anani—seven in all.
