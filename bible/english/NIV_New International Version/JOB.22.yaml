document_id: JOB.22,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Eliphaz
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Eliphaz the Temanite replied:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: That is why snares are all around you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: why sudden peril terrifies you,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: why it is so dark you cannot see,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and why a flood of water covers you.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Is not God in the heights of heaven?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And see how lofty are the highest stars!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet you say, ‘What does God know?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Does he judge through such darkness?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thick clouds veil him, so he does not see us
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as he goes about in the vaulted heavens.’
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will you keep to the old path
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that the wicked have trod?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They were carried off before their time,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their foundations washed away by a flood.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They said to God, ‘Leave us alone!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What can the Almighty do to us?’
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet it was he who filled their houses with good things,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so I stand aloof from the plans of the wicked.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The righteous see their ruin and rejoice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the innocent mock them, saying,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Can a man be of benefit to God?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Can even a wise person benefit him?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Surely our foes are destroyed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fire devours their wealth.’
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Submit to God and be at peace with him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in this way prosperity will come to you.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Accept instruction from his mouth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lay up his words in your heart.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'If you return to the Almighty, you will be restored:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If you remove wickedness far from your tent
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and assign your nuggets to the dust,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your gold of Ophir to the rocks in the ravines,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: then the Almighty will be your gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the choicest silver for you.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely then you will find delight in the Almighty
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will lift up your face to God.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will pray to him, and he will hear you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will fulfill your vows.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What you decide on will be done,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and light will shine on your ways.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When people are brought low and you say, ‘Lift them up!’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then he will save the downcast.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What pleasure would it give the Almighty if you were righteous?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What would he gain if your ways were blameless?
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will deliver even one who is not innocent,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who will be delivered through the cleanness of your hands.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Is it for your piety that he rebukes you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and brings charges against you?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is not your wickedness great?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Are not your sins endless?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You demanded security from your relatives for no reason;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you stripped people of their clothing, leaving them naked.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You gave no water to the weary
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you withheld food from the hungry,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: though you were a powerful man, owning land—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an honored man, living on it.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you sent widows away empty-handed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and broke the strength of the fatherless.
