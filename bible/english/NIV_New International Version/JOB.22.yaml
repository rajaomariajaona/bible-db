document_id: JOB.22,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Eliphaz
  - type: text
    content: 'Then Eliphaz the Temanite replied:'
  '10':
  - type: text
    content: That is why snares are all around you,
  - type: text
    content: why sudden peril terrifies you,
  '11':
  - type: text
    content: why it is so dark you cannot see,
  - type: text
    content: and why a flood of water covers you.
  '12':
  - type: text
    content: “Is not God in the heights of heaven?
  - type: text
    content: And see how lofty are the highest stars!
  '13':
  - type: text
    content: Yet you say, ‘What does God know?
  - type: text
    content: Does he judge through such darkness?
  '14':
  - type: text
    content: Thick clouds veil him, so he does not see us
  - type: text
    content: as he goes about in the vaulted heavens.’
  '15':
  - type: text
    content: Will you keep to the old path
  - type: text
    content: that the wicked have trod?
  '16':
  - type: text
    content: They were carried off before their time,
  - type: text
    content: their foundations washed away by a flood.
  '17':
  - type: text
    content: They said to God, ‘Leave us alone!
  - type: text
    content: What can the Almighty do to us?’
  '18':
  - type: text
    content: Yet it was he who filled their houses with good things,
  - type: text
    content: so I stand aloof from the plans of the wicked.
  '19':
  - type: text
    content: The righteous see their ruin and rejoice;
  - type: text
    content: the innocent mock them, saying,
  '2':
  - type: text
    content: “Can a man be of benefit to God?
  - type: text
    content: Can even a wise person benefit him?
  '20':
  - type: text
    content: ‘Surely our foes are destroyed,
  - type: text
    content: and fire devours their wealth.’
  '21':
  - type: text
    content: “Submit to God and be at peace with him;
  - type: text
    content: in this way prosperity will come to you.
  '22':
  - type: text
    content: Accept instruction from his mouth
  - type: text
    content: and lay up his words in your heart.
  '23':
  - type: text
    content: 'If you return to the Almighty, you will be restored:'
  - type: text
    content: If you remove wickedness far from your tent
  '24':
  - type: text
    content: and assign your nuggets to the dust,
  - type: text
    content: your gold of Ophir to the rocks in the ravines,
  '25':
  - type: text
    content: then the Almighty will be your gold,
  - type: text
    content: the choicest silver for you.
  '26':
  - type: text
    content: Surely then you will find delight in the Almighty
  - type: text
    content: and will lift up your face to God.
  '27':
  - type: text
    content: You will pray to him, and he will hear you,
  - type: text
    content: and you will fulfill your vows.
  '28':
  - type: text
    content: What you decide on will be done,
  - type: text
    content: and light will shine on your ways.
  '29':
  - type: text
    content: When people are brought low and you say, ‘Lift them up!’
  - type: text
    content: then he will save the downcast.
  '3':
  - type: text
    content: What pleasure would it give the Almighty if you were righteous?
  - type: text
    content: What would he gain if your ways were blameless?
  '30':
  - type: text
    content: He will deliver even one who is not innocent,
  - type: text
    content: who will be delivered through the cleanness of your hands.”
  '4':
  - type: text
    content: “Is it for your piety that he rebukes you
  - type: text
    content: and brings charges against you?
  '5':
  - type: text
    content: Is not your wickedness great?
  - type: text
    content: Are not your sins endless?
  '6':
  - type: text
    content: You demanded security from your relatives for no reason;
  - type: text
    content: you stripped people of their clothing, leaving them naked.
  '7':
  - type: text
    content: You gave no water to the weary
  - type: text
    content: and you withheld food from the hungry,
  '8':
  - type: text
    content: though you were a powerful man, owning land—
  - type: text
    content: an honored man, living on it.
  '9':
  - type: text
    content: And you sent widows away empty-handed
  - type: text
    content: and broke the strength of the fatherless.
