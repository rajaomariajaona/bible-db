document_id: DEU.6,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Love the Lord Your God
  - type: text
    content: 'These are the commands, decrees and laws the '
  - type: text
    content: Lord
  - type: text
    content: ' your God directed me to teach you to observe in the land that you are crossing the Jordan to possess, '
  '10':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' your God brings you into the land he swore to your fathers, to Abraham, Isaac and Jacob, to give you—a land with large, flourishing cities you did not build, '
  '11':
  - type: text
    content: 'houses filled with all kinds of good things you did not provide, wells you did not dig, and vineyards and olive groves you did not plant—then when you eat and are satisfied, '
  '12':
  - type: text
    content: 'be careful that you do not forget the '
  - type: text
    content: Lord
  - type: text
    content: ', who brought you out of Egypt, out of the land of slavery.'
  '13':
  - type: text
    content: 'Fear the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, serve him only and take your oaths in his name. '
  '14':
  - type: text
    content: 'Do not follow other gods, the gods of the peoples around you; '
  '15':
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, who is among you, is a jealous God and his anger will burn against you, and he will destroy you from the face of the land. '
  '16':
  - type: text
    content: 'Do not put the '
  - type: text
    content: Lord
  - type: text
    content: ' your God to the test as you did at Massah. '
  '17':
  - type: text
    content: 'Be sure to keep the commands of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and the stipulations and decrees he has given you. '
  '18':
  - type: text
    content: 'Do what is right and good in the '
  - type: text
    content: Lord
  - type: text
    content: '’s sight, so that it may go well with you and you may go in and take over the good land the '
  - type: text
    content: Lord
  - type: text
    content: ' promised on oath to your ancestors, '
  '19':
  - type: text
    content: 'thrusting out all your enemies before you, as the '
  - type: text
    content: Lord
  - type: text
    content: ' said.'
  '2':
  - type: text
    content: 'so that you, your children and their children after them may fear the '
  - type: text
    content: Lord
  - type: text
    content: ' your God as long as you live by keeping all his decrees and commands that I give you, and so that you may enjoy long life. '
  '20':
  - type: text
    content: 'In the future, when your son asks you, “What is the meaning of the stipulations, decrees and laws the '
  - type: text
    content: Lord
  - type: text
    content: ' our God has commanded you?” '
  '21':
  - type: text
    content: 'tell him: “We were slaves of Pharaoh in Egypt, but the '
  - type: text
    content: Lord
  - type: text
    content: ' brought us out of Egypt with a mighty hand. '
  '22':
  - type: text
    content: 'Before our eyes the '
  - type: text
    content: Lord
  - type: text
    content: ' sent signs and wonders—great and terrible—on Egypt and Pharaoh and his whole household. '
  '23':
  - type: text
    content: 'But he brought us out from there to bring us in and give us the land he promised on oath to our ancestors. '
  '24':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' commanded us to obey all these decrees and to fear the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, so that we might always prosper and be kept alive, as is the case today. '
  '25':
  - type: text
    content: 'And if we are careful to obey all this law before the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, as he has commanded us, that will be our righteousness.”'
  '3':
  - type: text
    content: 'Hear, Israel, and be careful to obey so that it may go well with you and that you may increase greatly in a land flowing with milk and honey, just as the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your ancestors, promised you.'
  '4':
  - type: text
    content: 'Hear, O Israel: The '
  - type: text
    content: Lord
  - type: text
    content: ' our God, the '
  - type: text
    content: Lord
  - type: text
    content: ' is one.'
  - type: note
    content: Or The Lord our God is one Lord; or The Lord is our God, the Lord is one; or The Lord is our God, the Lord alone
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Love the '
  - type: text
    content: Lord
  - type: text
    content: ' your God with all your heart and with all your soul and with all your strength. '
  '6':
  - type: text
    content: 'These commandments that I give you today are to be on your hearts. '
  '7':
  - type: text
    content: 'Impress them on your children. Talk about them when you sit at home and when you walk along the road, when you lie down and when you get up. '
  '8':
  - type: text
    content: 'Tie them as symbols on your hands and bind them on your foreheads. '
  '9':
  - type: text
    content: Write them on the doorframes of your houses and on your gates.
