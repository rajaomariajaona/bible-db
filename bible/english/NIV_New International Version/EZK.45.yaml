document_id: EZK.45,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Fully Restored
  - type: text
    content: '“ ‘When you allot the land as an inheritance, you are to present to the '
  - type: text
    content: Lord
  - type: text
    content: ' a portion of the land as a sacred district, 25,000 cubits'
  - type: note
    content: That is, about 8 miles or about 13 kilometers; also in verses 3, 5 and 6
  - type: text
    content: ' long and 20,000'
  - type: note
    content: Septuagint (see also verses 3 and 5 and 48:9); Hebrew 10,000
  - type: text
    content: ' cubits'
  - type: note
    content: That is, about 6 1/2 miles or about 11 kilometers
  - type: text
    content: ' wide; the entire area will be holy. '
  '10':
  - type: text
    content: You are to use accurate scales, an accurate ephah
  - type: note
    content: An ephah was a dry measure having the capacity of about 3/5 bushel or about 22 liters.
  - type: text
    content: ' and an accurate bath.'
  - type: note
    content: A bath was a liquid measure equaling about 6 gallons or about 22 liters.
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'The ephah and the bath are to be the same size, the bath containing a tenth of a homer and the ephah a tenth of a homer; the homer is to be the standard measure for both. '
  '12':
  - type: text
    content: The shekel
  - type: note
    content: A shekel weighed about 2/5 ounce or about 12 grams.
  - type: text
    content: ' is to consist of twenty gerahs. Twenty shekels plus twenty-five shekels plus fifteen shekels equal one mina.'
  - type: note
    content: That is, 60 shekels; the common mina was 50 shekels. Sixty shekels were about 1 1/2 pounds or about 690 grams.
  '13':
  - type: text
    content: '“ ‘This is the special gift you are to offer: a sixth of an ephah'
  - type: note
    content: That is, probably about 6 pounds or about 2.7 kilograms
  - type: text
    content: ' from each homer of wheat and a sixth of an ephah'
  - type: note
    content: That is, probably about 5 pounds or about 2.3 kilograms
  - type: text
    content: ' from each homer of barley. '
  '14':
  - type: text
    content: The prescribed portion of olive oil, measured by the bath, is a tenth of a bath
  - type: note
    content: That is, about 2 1/2 quarts or about 2.2 liters
  - type: text
    content: ' from each cor (which consists of ten baths or one homer, for ten baths are equivalent to a homer). '
  '15':
  - type: text
    content: 'Also one sheep is to be taken from every flock of two hundred from the well-watered pastures of Israel. These will be used for the grain offerings, burnt offerings and fellowship offerings to make atonement for the people, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'All the people of the land will be required to give this special offering to the prince in Israel. '
  '17':
  - type: text
    content: It will be the duty of the prince to provide the burnt offerings, grain offerings and drink offerings at the festivals, the New Moons and the Sabbaths—at all the appointed festivals of Israel. He will provide the sin offerings,
  - type: note
    content: Or purification offerings; also in verses 19, 22, 23 and 25
  - type: text
    content: ' grain offerings, burnt offerings and fellowship offerings to make atonement for the Israelites.'
  '18':
  - type: text
    content: '“ ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: In the first month on the first day you are to take a young bull without defect and purify the sanctuary. '
  '19':
  - type: text
    content: 'The priest is to take some of the blood of the sin offering and put it on the doorposts of the temple, on the four corners of the upper ledge of the altar and on the gateposts of the inner court. '
  '2':
  - type: text
    content: Of this, a section 500 cubits
  - type: note
    content: That is, about 875 feet or about 265 meters
  - type: text
    content: ' square is to be for the sanctuary, with 50 cubits'
  - type: note
    content: That is, about 88 feet or about 27 meters
  - type: text
    content: ' around it for open land. '
  '20':
  - type: text
    content: You are to do the same on the seventh day of the month for anyone who sins unintentionally or through ignorance; so you are to make atonement for the temple.
  '21':
  - type: text
    content: '“ ‘In the first month on the fourteenth day you are to observe the Passover, a festival lasting seven days, during which you shall eat bread made without yeast. '
  '22':
  - type: text
    content: 'On that day the prince is to provide a bull as a sin offering for himself and for all the people of the land. '
  '23':
  - type: text
    content: 'Every day during the seven days of the festival he is to provide seven bulls and seven rams without defect as a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', and a male goat for a sin offering. '
  '24':
  - type: text
    content: He is to provide as a grain offering an ephah for each bull and an ephah for each ram, along with a hin
  - type: note
    content: That is, about 1 gallon or about 3.8 liters
  - type: text
    content: ' of olive oil for each ephah.'
  '25':
  - type: text
    content: “ ‘During the seven days of the festival, which begins in the seventh month on the fifteenth day, he is to make the same provision for sin offerings, burnt offerings, grain offerings and oil.
  '3':
  - type: text
    content: In the sacred district, measure off a section 25,000 cubits long and 10,000 cubits
  - type: note
    content: That is, about 3 1/3 miles or about 5.3 kilometers; also in verse 5
  - type: text
    content: ' wide. In it will be the sanctuary, the Most Holy Place. '
  '4':
  - type: text
    content: 'It will be the sacred portion of the land for the priests, who minister in the sanctuary and who draw near to minister before the '
  - type: text
    content: Lord
  - type: text
    content: '. It will be a place for their houses as well as a holy place for the sanctuary. '
  '5':
  - type: text
    content: An area 25,000 cubits long and 10,000 cubits wide will belong to the Levites, who serve in the temple, as their possession for towns to live in.
  - type: note
    content: Septuagint; Hebrew temple; they will have as their possession 20 rooms
  '6':
  - type: text
    content: “ ‘You are to give the city as its property an area 5,000 cubits
  - type: note
    content: That is, about 1 2/3 miles or about 2.7 kilometers
  - type: text
    content: ' wide and 25,000 cubits long, adjoining the sacred portion; it will belong to all Israel.'
  '7':
  - type: text
    content: '“ ‘The prince will have the land bordering each side of the area formed by the sacred district and the property of the city. It will extend westward from the west side and eastward from the east side, running lengthwise from the western to the eastern border parallel to one of the tribal portions. '
  '8':
  - type: text
    content: This land will be his possession in Israel. And my princes will no longer oppress my people but will allow the people of Israel to possess the land according to their tribes.
  '9':
  - type: text
    content: '“ ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: You have gone far enough, princes of Israel! Give up your violence and oppression and do what is just and right. Stop dispossessing my people, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
