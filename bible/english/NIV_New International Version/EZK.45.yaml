document_id: EZK.45
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel Fully Restored
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“ ‘When you allot the land as an inheritance, you are to present to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' a portion of the land as a sacred district, 25,000 cubits'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 8 miles or about 13 kilometers; also in verses 3, 5 and 6
    marker-yv: yv-n
  - type: text
    text: ' long and 20,000'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint (see also verses 3 and 5 and 48:9); Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 10,000
    marker-yv: yv-n
  - type: text
    text: ' cubits'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 6 1/2 miles or about 11 kilometers
    marker-yv: yv-n
  - type: text
    text: ' wide; the entire area will be holy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Of this, a section 500 cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 875 feet or about 265 meters
    marker-yv: yv-n
  - type: text
    text: ' square is to be for the sanctuary, with 50 cubits'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 88 feet or about 27 meters
    marker-yv: yv-n
  - type: text
    text: ' around it for open land. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: In the sacred district, measure off a section 25,000 cubits long and 10,000 cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 3 1/3 miles or about 5.3 kilometers; also in verse 5
    marker-yv: yv-n
  - type: text
    text: ' wide. In it will be the sanctuary, the Most Holy Place. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'It will be the sacred portion of the land for the priests, who minister in the sanctuary and who draw near to minister before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. It will be a place for their houses as well as a holy place for the sanctuary. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: An area 25,000 cubits long and 10,000 cubits wide will belong to the Levites, who serve in the temple, as their possession for towns to live in.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: temple; they will have as their possession 20 rooms
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “ ‘You are to give the city as its property an area 5,000 cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 1 2/3 miles or about 2.7 kilometers
    marker-yv: yv-n
  - type: text
    text: ' wide and 25,000 cubits long, adjoining the sacred portion; it will belong to all Israel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“ ‘The prince will have the land bordering each side of the area formed by the sacred district and the property of the city. It will extend westward from the west side and eastward from the east side, running lengthwise from the western to the eastern border parallel to one of the tribal portions. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: This land will be his possession in Israel. And my princes will no longer oppress my people but will allow the people of Israel to possess the land according to their tribes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“ ‘This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: You have gone far enough, princes of Israel! Give up your violence and oppression and do what is just and right. Stop dispossessing my people, declares the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: You are to use accurate scales, an accurate ephah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: An ephah was a dry measure having the capacity of about 3/5 bushel or about 22 liters.
    marker-yv: yv-n
  - type: text
    text: ' and an accurate bath.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A bath was a liquid measure equaling about 6 gallons or about 22 liters.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The ephah and the bath are to be the same size, the bath containing a tenth of a homer and the ephah a tenth of a homer; the homer is to be the standard measure for both. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The shekel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A shekel weighed about 2/5 ounce or about 12 grams.
    marker-yv: yv-n
  - type: text
    text: ' is to consist of twenty gerahs. Twenty shekels plus twenty-five shekels plus fifteen shekels equal one mina.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, 60 shekels; the common mina was 50 shekels. Sixty shekels were about 1 1/2 pounds or about 690 grams.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“ ‘This is the special gift you are to offer: a sixth of an ephah'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, probably about 6 pounds or about 2.7 kilograms
    marker-yv: yv-n
  - type: text
    text: ' from each homer of wheat and a sixth of an ephah'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, probably about 5 pounds or about 2.3 kilograms
    marker-yv: yv-n
  - type: text
    text: ' from each homer of barley. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The prescribed portion of olive oil, measured by the bath, is a tenth of a bath
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 2 1/2 quarts or about 2.2 liters
    marker-yv: yv-n
  - type: text
    text: ' from each cor (which consists of ten baths or one homer, for ten baths are equivalent to a homer). '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Also one sheep is to be taken from every flock of two hundred from the well-watered pastures of Israel. These will be used for the grain offerings, burnt offerings and fellowship offerings to make atonement for the people, declares the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'All the people of the land will be required to give this special offering to the prince in Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: It will be the duty of the prince to provide the burnt offerings, grain offerings and drink offerings at the festivals, the New Moons and the Sabbaths—at all the appointed festivals of Israel. He will provide the sin offerings,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: purification offerings
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verses 19, 22, 23 and 25
    marker-yv: yv-n
  - type: text
    text: ' grain offerings, burnt offerings and fellowship offerings to make atonement for the Israelites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“ ‘This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: In the first month on the first day you are to take a young bull without defect and purify the sanctuary. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The priest is to take some of the blood of the sin offering and put it on the doorposts of the temple, on the four corners of the upper ledge of the altar and on the gateposts of the inner court. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: You are to do the same on the seventh day of the month for anyone who sins unintentionally or through ignorance; so you are to make atonement for the temple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“ ‘In the first month on the fourteenth day you are to observe the Passover, a festival lasting seven days, during which you shall eat bread made without yeast. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'On that day the prince is to provide a bull as a sin offering for himself and for all the people of the land. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Every day during the seven days of the festival he is to provide seven bulls and seven rams without defect as a burnt offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and a male goat for a sin offering. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: He is to provide as a grain offering an ephah for each bull and an ephah for each ram, along with a hin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 1 gallon or about 3.8 liters
    marker-yv: yv-n
  - type: text
    text: ' of olive oil for each ephah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “ ‘During the seven days of the festival, which begins in the seventh month on the fifteenth day, he is to make the same provision for sin offerings, burnt offerings, grain offerings and oil.
