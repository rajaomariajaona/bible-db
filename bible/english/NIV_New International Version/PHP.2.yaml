document_id: PHP.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Imitating Christ’s Humility
  - type: text
    content: 'Therefore if you have any encouragement from being united with Christ, if any comfort from his love, if any common sharing in the Spirit, if any tenderness and compassion, '
  '10':
  - type: text
    content: that at the name of Jesus every knee should bow,
  - type: text
    content: in heaven and on earth and under the earth,
  '11':
  - type: text
    content: and every tongue acknowledge that Jesus Christ is Lord,
  - type: text
    content: to the glory of God the Father.
  - type: heading
    content: Do Everything Without Grumbling
  '12':
  - type: text
    content: 'Therefore, my dear friends, as you have always obeyed—not only in my presence, but now much more in my absence—continue to work out your salvation with fear and trembling, '
  '13':
  - type: text
    content: for it is God who works in you to will and to act in order to fulfill his good purpose.
  '14':
  - type: text
    content: 'Do everything without grumbling or arguing, '
  '15':
  - type: text
    content: so that you may become blameless and pure, “children of God without fault in a warped and crooked generation.”
  - type: note
    content: Deut. 32:5
  - type: text
    content: ' Then you will shine among them like stars in the sky '
  '16':
  - type: text
    content: 'as you hold firmly to the word of life. And then I will be able to boast on the day of Christ that I did not run or labor in vain. '
  '17':
  - type: text
    content: 'But even if I am being poured out like a drink offering on the sacrifice and service coming from your faith, I am glad and rejoice with all of you. '
  '18':
  - type: text
    content: So you too should be glad and rejoice with me.
  - type: heading
    content: Timothy and Epaphroditus
  '19':
  - type: text
    content: 'I hope in the Lord Jesus to send Timothy to you soon, that I also may be cheered when I receive news about you. '
  '2':
  - type: text
    content: 'then make my joy complete by being like-minded, having the same love, being one in spirit and of one mind. '
  '20':
  - type: text
    content: 'I have no one else like him, who will show genuine concern for your welfare. '
  '21':
  - type: text
    content: 'For everyone looks out for their own interests, not those of Jesus Christ. '
  '22':
  - type: text
    content: 'But you know that Timothy has proved himself, because as a son with his father he has served with me in the work of the gospel. '
  '23':
  - type: text
    content: 'I hope, therefore, to send him as soon as I see how things go with me. '
  '24':
  - type: text
    content: And I am confident in the Lord that I myself will come soon.
  '25':
  - type: text
    content: 'But I think it is necessary to send back to you Epaphroditus, my brother, co-worker and fellow soldier, who is also your messenger, whom you sent to take care of my needs. '
  '26':
  - type: text
    content: 'For he longs for all of you and is distressed because you heard he was ill. '
  '27':
  - type: text
    content: 'Indeed he was ill, and almost died. But God had mercy on him, and not on him only but also on me, to spare me sorrow upon sorrow. '
  '28':
  - type: text
    content: 'Therefore I am all the more eager to send him, so that when you see him again you may be glad and I may have less anxiety. '
  '29':
  - type: text
    content: 'So then, welcome him in the Lord with great joy, and honor people like him, '
  '3':
  - type: text
    content: 'Do nothing out of selfish ambition or vain conceit. Rather, in humility value others above yourselves, '
  '30':
  - type: text
    content: because he almost died for the work of Christ. He risked his life to make up for the help you yourselves could not give me.
  '4':
  - type: text
    content: not looking to your own interests but each of you to the interests of the others.
  '5':
  - type: text
    content: 'In your relationships with one another, have the same mindset as Christ Jesus:'
  '6':
  - type: text
    content: Who, being in very nature
  - type: note
    content: Or in the form of
  - type: text
    content: ' God,'
  - type: text
    content: did not consider equality with God something to be used to his own advantage;
  '7':
  - type: text
    content: rather, he made himself nothing
  - type: text
    content: by taking the very nature
  - type: note
    content: Or the form
  - type: text
    content: ' of a servant,'
  - type: text
    content: being made in human likeness.
  '8':
  - type: text
    content: And being found in appearance as a man,
  - type: text
    content: he humbled himself
  - type: text
    content: by becoming obedient to death—
  - type: text
    content: even death on a cross!
  '9':
  - type: text
    content: Therefore God exalted him to the highest place
  - type: text
    content: and gave him the name that is above every name,
