document_id: PHP.2,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Imitating Christ’s Humility
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore if you have any encouragement from being united with Christ, if any comfort from his love, if any common sharing in the Spirit, if any tenderness and compassion, '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that at the name of Jesus every knee should bow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in heaven and on earth and under the earth,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and every tongue acknowledge that Jesus Christ is Lord,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the glory of God the Father.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Do Everything Without Grumbling
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, my dear friends, as you have always obeyed—not only in my presence, but now much more in my absence—continue to work out your salvation with fear and trembling, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: for it is God who works in you to will and to act in order to fulfill his good purpose.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do everything without grumbling or arguing, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: so that you may become blameless and pure, “children of God without fault in a warped and crooked generation.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut. 32:5
      marker-yv: yv-n
    - type: text
      text: ' Then you will shine among them like stars in the sky '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'as you hold firmly to the word of life. And then I will be able to boast on the day of Christ that I did not run or labor in vain. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But even if I am being poured out like a drink offering on the sacrifice and service coming from your faith, I am glad and rejoice with all of you. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So you too should be glad and rejoice with me.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Timothy and Epaphroditus
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I hope in the Lord Jesus to send Timothy to you soon, that I also may be cheered when I receive news about you. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then make my joy complete by being like-minded, having the same love, being one in spirit and of one mind. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have no one else like him, who will show genuine concern for your welfare. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For everyone looks out for their own interests, not those of Jesus Christ. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you know that Timothy has proved himself, because as a son with his father he has served with me in the work of the gospel. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I hope, therefore, to send him as soon as I see how things go with me. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And I am confident in the Lord that I myself will come soon.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But I think it is necessary to send back to you Epaphroditus, my brother, co-worker and fellow soldier, who is also your messenger, whom you sent to take care of my needs. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For he longs for all of you and is distressed because you heard he was ill. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indeed he was ill, and almost died. But God had mercy on him, and not on him only but also on me, to spare me sorrow upon sorrow. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore I am all the more eager to send him, so that when you see him again you may be glad and I may have less anxiety. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So then, welcome him in the Lord with great joy, and honor people like him, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do nothing out of selfish ambition or vain conceit. Rather, in humility value others above yourselves, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: because he almost died for the work of Christ. He risked his life to make up for the help you yourselves could not give me.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: not looking to your own interests but each of you to the interests of the others.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In your relationships with one another, have the same mindset as Christ Jesus:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who, being in very nature
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in the form of
      marker-yv: yv-n
    - type: text
      text: ' God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: did not consider equality with God something to be used to his own advantage;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rather, he made himself nothing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by taking the very nature
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the form
      marker-yv: yv-n
    - type: text
      text: ' of a servant,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: being made in human likeness.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And being found in appearance as a man,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he humbled himself
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by becoming obedient to death—
  - type: usfm
    marker: q3
    children:
    - type: text
      text: even death on a cross!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore God exalted him to the highest place
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and gave him the name that is above every name,
