document_id: LUK.24,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Has Risen
  - type: text
    content: 'On the first day of the week, very early in the morning, the women took the spices they had prepared and went to the tomb. '
  '10':
  - type: text
    content: 'It was Mary Magdalene, Joanna, Mary the mother of James, and the others with them who told this to the apostles. '
  '11':
  - type: text
    content: 'But they did not believe the women, because their words seemed to them like nonsense. '
  '12':
  - type: text
    content: Peter, however, got up and ran to the tomb. Bending over, he saw the strips of linen lying by themselves, and he went away, wondering to himself what had happened.
  - type: heading
    content: On the Road to Emmaus
  '13':
  - type: text
    content: Now that same day two of them were going to a village called Emmaus, about seven miles
  - type: note
    content: Or about 11 kilometers
  - type: text
    content: ' from Jerusalem. '
  '14':
  - type: text
    content: 'They were talking with each other about everything that had happened. '
  '15':
  - type: text
    content: 'As they talked and discussed these things with each other, Jesus himself came up and walked along with them; '
  '16':
  - type: text
    content: but they were kept from recognizing him.
  '17':
  - type: text
    content: 'He asked them, '
  - type: text
    content: “What are you discussing together as you walk along?”
  - type: text
    content: 'They stood still, their faces downcast. '
  '18':
  - type: text
    content: One of them, named Cleopas, asked him, “Are you the only one visiting Jerusalem who does not know the things that have happened there in these days?”
  '19':
  - type: text
    content: ' '
  - type: text
    content: “What things?”
  - type: text
    content: ' he asked.'
  - type: text
    content: '“About Jesus of Nazareth,” they replied. “He was a prophet, powerful in word and deed before God and all the people. '
  '2':
  - type: text
    content: 'They found the stone rolled away from the tomb, '
  '20':
  - type: text
    content: 'The chief priests and our rulers handed him over to be sentenced to death, and they crucified him; '
  '21':
  - type: text
    content: 'but we had hoped that he was the one who was going to redeem Israel. And what is more, it is the third day since all this took place. '
  '22':
  - type: text
    content: 'In addition, some of our women amazed us. They went to the tomb early this morning '
  '23':
  - type: text
    content: 'but didn’t find his body. They came and told us that they had seen a vision of angels, who said he was alive. '
  '24':
  - type: text
    content: Then some of our companions went to the tomb and found it just as the women had said, but they did not see Jesus.”
  '25':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “How foolish you are, and how slow to believe all that the prophets have spoken!
  - type: text
    content: ' '
  '26':
  - type: text
    content: Did not the Messiah have to suffer these things and then enter his glory?”
  - type: text
    content: ' '
  '27':
  - type: text
    content: And beginning with Moses and all the Prophets, he explained to them what was said in all the Scriptures concerning himself.
  '28':
  - type: text
    content: 'As they approached the village to which they were going, Jesus continued on as if he were going farther. '
  '29':
  - type: text
    content: But they urged him strongly, “Stay with us, for it is nearly evening; the day is almost over.” So he went in to stay with them.
  '3':
  - type: text
    content: 'but when they entered, they did not find the body of the Lord Jesus. '
  '30':
  - type: text
    content: 'When he was at the table with them, he took bread, gave thanks, broke it and began to give it to them. '
  '31':
  - type: text
    content: 'Then their eyes were opened and they recognized him, and he disappeared from their sight. '
  '32':
  - type: text
    content: They asked each other, “Were not our hearts burning within us while he talked with us on the road and opened the Scriptures to us?”
  '33':
  - type: text
    content: 'They got up and returned at once to Jerusalem. There they found the Eleven and those with them, assembled together '
  '34':
  - type: text
    content: 'and saying, “It is true! The Lord has risen and has appeared to Simon.” '
  '35':
  - type: text
    content: Then the two told what had happened on the way, and how Jesus was recognized by them when he broke the bread.
  - type: heading
    content: Jesus Appears to the Disciples
  '36':
  - type: text
    content: 'While they were still talking about this, Jesus himself stood among them and said to them, '
  - type: text
    content: “Peace be with you.”
  '37':
  - type: text
    content: 'They were startled and frightened, thinking they saw a ghost. '
  '38':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “Why are you troubled, and why do doubts rise in your minds?
  - type: text
    content: ' '
  '39':
  - type: text
    content: Look at my hands and my feet. It is I myself! Touch me and see; a ghost does not have flesh and bones, as you see I have.”
  '4':
  - type: text
    content: 'While they were wondering about this, suddenly two men in clothes that gleamed like lightning stood beside them. '
  '40':
  - type: text
    content: 'When he had said this, he showed them his hands and feet. '
  '41':
  - type: text
    content: 'And while they still did not believe it because of joy and amazement, he asked them, '
  - type: text
    content: “Do you have anything here to eat?”
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'They gave him a piece of broiled fish, '
  '43':
  - type: text
    content: and he took it and ate it in their presence.
  '44':
  - type: text
    content: 'He said to them, '
  - type: text
    content: '“This is what I told you while I was still with you: Everything must be fulfilled that is written about me in the Law of Moses, the Prophets and the Psalms.”'
  '45':
  - type: text
    content: 'Then he opened their minds so they could understand the Scriptures. '
  '46':
  - type: text
    content: 'He told them, '
  - type: text
    content: '“This is what is written: The Messiah will suffer and rise from the dead on the third day,'
  - type: text
    content: ' '
  '47':
  - type: text
    content: and repentance for the forgiveness of sins will be preached in his name to all nations, beginning at Jerusalem.
  - type: text
    content: ' '
  '48':
  - type: text
    content: You are witnesses of these things.
  - type: text
    content: ' '
  '49':
  - type: text
    content: I am going to send you what my Father has promised; but stay in the city until you have been clothed with power from on high.”
  - type: heading
    content: The Ascension of Jesus
  '5':
  - type: text
    content: 'In their fright the women bowed down with their faces to the ground, but the men said to them, “Why do you look for the living among the dead? '
  '50':
  - type: text
    content: 'When he had led them out to the vicinity of Bethany, he lifted up his hands and blessed them. '
  '51':
  - type: text
    content: 'While he was blessing them, he left them and was taken up into heaven. '
  '52':
  - type: text
    content: 'Then they worshiped him and returned to Jerusalem with great joy. '
  '53':
  - type: text
    content: And they stayed continually at the temple, praising God.
  '6':
  - type: text
    content: 'He is not here; he has risen! Remember how he told you, while he was still with you in Galilee: '
  '7':
  - type: text
    content: ‘The Son of Man must be delivered over to the hands of sinners, be crucified and on the third day be raised again.’
  - type: text
    content: ' ” '
  '8':
  - type: text
    content: Then they remembered his words.
  '9':
  - type: text
    content: 'When they came back from the tomb, they told all these things to the Eleven and to all the others. '
