document_id: LUK.24
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Has Risen
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'On the first day of the week, very early in the morning, the women took the spices they had prepared and went to the tomb. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'They found the stone rolled away from the tomb, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'but when they entered, they did not find the body of the Lord Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'While they were wondering about this, suddenly two men in clothes that gleamed like lightning stood beside them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'In their fright the women bowed down with their faces to the ground, but the men said to them, “Why do you look for the living among the dead? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He is not here; he has risen! Remember how he told you, while he was still with you in Galilee: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘The Son of Man must be delivered over to the hands of sinners, be crucified and on the third day be raised again.’
  - type: text
    text: ' ” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Then they remembered his words.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When they came back from the tomb, they told all these things to the Eleven and to all the others. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'It was Mary Magdalene, Joanna, Mary the mother of James, and the others with them who told this to the apostles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But they did not believe the women, because their words seemed to them like nonsense. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Peter, however, got up and ran to the tomb. Bending over, he saw the strips of linen lying by themselves, and he went away, wondering to himself what had happened.
- type: usfm
  marker: s1
  children:
  - type: text
    text: On the Road to Emmaus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Now that same day two of them were going to a village called Emmaus, about seven miles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Or about 11 kilometers
    marker-yv: yv-n
  - type: text
    text: ' from Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'They were talking with each other about everything that had happened. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'As they talked and discussed these things with each other, Jesus himself came up and walked along with them; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: but they were kept from recognizing him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'He asked them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What are you discussing together as you walk along?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'They stood still, their faces downcast. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: One of them, named Cleopas, asked him, “Are you the only one visiting Jerusalem who does not know the things that have happened there in these days?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What things?”
  - type: text
    text: ' he asked.'
- type: usfm
  marker: p
  children:
  - type: text
    text: '“About Jesus of Nazareth,” they replied. “He was a prophet, powerful in word and deed before God and all the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The chief priests and our rulers handed him over to be sentenced to death, and they crucified him; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'but we had hoped that he was the one who was going to redeem Israel. And what is more, it is the third day since all this took place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'In addition, some of our women amazed us. They went to the tomb early this morning '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'but didn’t find his body. They came and told us that they had seen a vision of angels, who said he was alive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Then some of our companions went to the tomb and found it just as the women had said, but they did not see Jesus.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “How foolish you are, and how slow to believe all that the prophets have spoken!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Did not the Messiah have to suffer these things and then enter his glory?”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: And beginning with Moses and all the Prophets, he explained to them what was said in all the Scriptures concerning himself.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'As they approached the village to which they were going, Jesus continued on as if he were going farther. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: But they urged him strongly, “Stay with us, for it is nearly evening; the day is almost over.” So he went in to stay with them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'When he was at the table with them, he took bread, gave thanks, broke it and began to give it to them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then their eyes were opened and they recognized him, and he disappeared from their sight. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: They asked each other, “Were not our hearts burning within us while he talked with us on the road and opened the Scriptures to us?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'They got up and returned at once to Jerusalem. There they found the Eleven and those with them, assembled together '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'and saying, “It is true! The Lord has risen and has appeared to Simon.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Then the two told what had happened on the way, and how Jesus was recognized by them when he broke the bread.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Appears to the Disciples
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'While they were still talking about this, Jesus himself stood among them and said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Peace be with you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'They were startled and frightened, thinking they saw a ghost. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why are you troubled, and why do doubts rise in your minds?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Look at my hands and my feet. It is I myself! Touch me and see; a ghost does not have flesh and bones, as you see I have.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'When he had said this, he showed them his hands and feet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'And while they still did not believe it because of joy and amazement, he asked them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Do you have anything here to eat?”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'They gave him a piece of broiled fish, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: and he took it and ate it in their presence.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“This is what I told you while I was still with you: Everything must be fulfilled that is written about me in the Law of Moses, the Prophets and the Psalms.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Then he opened their minds so they could understand the Scriptures. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'He told them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“This is what is written: The Messiah will suffer and rise from the dead on the third day,'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and repentance for the forgiveness of sins will be preached in his name to all nations, beginning at Jerusalem.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You are witnesses of these things.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am going to send you what my Father has promised; but stay in the city until you have been clothed with power from on high.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Ascension of Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'When he had led them out to the vicinity of Bethany, he lifted up his hands and blessed them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'While he was blessing them, he left them and was taken up into heaven. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Then they worshiped him and returned to Jerusalem with great joy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: And they stayed continually at the temple, praising God.
