document_id: 2TH.1,111
type_code: eng
verses:
  '1':
  - type: text
    content: Paul, Silas
  - type: note
    content: Greek Silvanus, a variant of Silas
  - type: text
    content: ' and Timothy,'
  - type: text
    content: 'To the church of the Thessalonians in God our Father and the Lord Jesus Christ:'
  '10':
  - type: text
    content: on the day he comes to be glorified in his holy people and to be marveled at among all those who have believed. This includes you, because you believed our testimony to you.
  '11':
  - type: text
    content: 'With this in mind, we constantly pray for you, that our God may make you worthy of his calling, and that by his power he may bring to fruition your every desire for goodness and your every deed prompted by faith. '
  '12':
  - type: text
    content: We pray this so that the name of our Lord Jesus may be glorified in you, and you in him, according to the grace of our God and the Lord Jesus Christ.
  - type: note
    content: Or God and Lord, Jesus Christ
  '2':
  - type: text
    content: Grace and peace to you from God the Father and the Lord Jesus Christ.
  - type: heading
    content: Thanksgiving and Prayer
  '3':
  - type: text
    content: We ought always to thank God for you, brothers and sisters,
  - type: note
    content: The Greek word for brothers and sisters (adelphoi) refers here to believers, both men and women, as part of God’s family; also in 2:1, 13, 15; 3:1, 6, 13.
  - type: text
    content: ' and rightly so, because your faith is growing more and more, and the love all of you have for one another is increasing. '
  '4':
  - type: text
    content: Therefore, among God’s churches we boast about your perseverance and faith in all the persecutions and trials you are enduring.
  '5':
  - type: text
    content: 'All this is evidence that God’s judgment is right, and as a result you will be counted worthy of the kingdom of God, for which you are suffering. '
  '6':
  - type: text
    content: 'God is just: He will pay back trouble to those who trouble you '
  '7':
  - type: text
    content: 'and give relief to you who are troubled, and to us as well. This will happen when the Lord Jesus is revealed from heaven in blazing fire with his powerful angels. '
  '8':
  - type: text
    content: 'He will punish those who do not know God and do not obey the gospel of our Lord Jesus. '
  '9':
  - type: text
    content: 'They will be punished with everlasting destruction and shut out from the presence of the Lord and from the glory of his might '
