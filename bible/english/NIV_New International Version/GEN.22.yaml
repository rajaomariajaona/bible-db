document_id: GEN.22,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Abraham Tested
  - type: text
    content: Some time later God tested Abraham. He said to him, “Abraham!”
  - type: text
    content: “Here I am,” he replied.
  '10':
  - type: text
    content: 'Then he reached out his hand and took the knife to slay his son. '
  '11':
  - type: text
    content: 'But the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' called out to him from heaven, “Abraham! Abraham!”'
  - type: text
    content: “Here I am,” he replied.
  '12':
  - type: text
    content: “Do not lay a hand on the boy,” he said. “Do not do anything to him. Now I know that you fear God, because you have not withheld from me your son, your only son.”
  '13':
  - type: text
    content: Abraham looked up and there in a thicket he saw a ram
  - type: note
    content: Many manuscripts of the Masoretic Text, Samaritan Pentateuch, Septuagint and Syriac; most manuscripts of the Masoretic Text a ram behind him
  - type: text
    content: ' caught by its horns. He went over and took the ram and sacrificed it as a burnt offering instead of his son. '
  '14':
  - type: text
    content: 'So Abraham called that place The '
  - type: text
    content: Lord
  - type: text
    content: ' Will Provide. And to this day it is said, “On the mountain of the '
  - type: text
    content: Lord
  - type: text
    content: ' it will be provided.”'
  '15':
  - type: text
    content: 'The angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' called to Abraham from heaven a second time '
  '16':
  - type: text
    content: 'and said, “I swear by myself, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', that because you have done this and have not withheld your son, your only son, '
  '17':
  - type: text
    content: 'I will surely bless you and make your descendants as numerous as the stars in the sky and as the sand on the seashore. Your descendants will take possession of the cities of their enemies, '
  '18':
  - type: text
    content: and through your offspring
  - type: note
    content: Or seed
  - type: text
    content: ' all nations on earth will be blessed,'
  - type: note
    content: Or and all nations on earth will use the name of your offspring in blessings (see 48:20)
  - type: text
    content: ' because you have obeyed me.”'
  '19':
  - type: text
    content: Then Abraham returned to his servants, and they set off together for Beersheba. And Abraham stayed in Beersheba.
  - type: heading
    content: Nahor’s Sons
  '2':
  - type: text
    content: Then God said, “Take your son, your only son, whom you love—Isaac—and go to the region of Moriah. Sacrifice him there as a burnt offering on a mountain I will show you.”
  '20':
  - type: text
    content: 'Some time later Abraham was told, “Milkah is also a mother; she has borne sons to your brother Nahor: '
  '21':
  - type: text
    content: 'Uz the firstborn, Buz his brother, Kemuel (the father of Aram), '
  '22':
  - type: text
    content: 'Kesed, Hazo, Pildash, Jidlaph and Bethuel.” '
  '23':
  - type: text
    content: 'Bethuel became the father of Rebekah. Milkah bore these eight sons to Abraham’s brother Nahor. '
  '24':
  - type: text
    content: 'His concubine, whose name was Reumah, also had sons: Tebah, Gaham, Tahash and Maakah.'
  '3':
  - type: text
    content: 'Early the next morning Abraham got up and loaded his donkey. He took with him two of his servants and his son Isaac. When he had cut enough wood for the burnt offering, he set out for the place God had told him about. '
  '4':
  - type: text
    content: 'On the third day Abraham looked up and saw the place in the distance. '
  '5':
  - type: text
    content: He said to his servants, “Stay here with the donkey while I and the boy go over there. We will worship and then we will come back to you.”
  '6':
  - type: text
    content: 'Abraham took the wood for the burnt offering and placed it on his son Isaac, and he himself carried the fire and the knife. As the two of them went on together, '
  '7':
  - type: text
    content: Isaac spoke up and said to his father Abraham, “Father?”
  - type: text
    content: “Yes, my son?” Abraham replied.
  - type: text
    content: “The fire and wood are here,” Isaac said, “but where is the lamb for the burnt offering?”
  '8':
  - type: text
    content: Abraham answered, “God himself will provide the lamb for the burnt offering, my son.” And the two of them went on together.
  '9':
  - type: text
    content: 'When they reached the place God had told him about, Abraham built an altar there and arranged the wood on it. He bound his son Isaac and laid him on the altar, on top of the wood. '
