document_id: JER.4,111
type_code: eng
verses:
  '1':
  - type: text
    content: “If you, Israel, will return,
  - type: text
    content: then return to me,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “If you put your detestable idols out of my sight
  - type: text
    content: and no longer go astray,
  '10':
  - type: text
    content: 'Then I said, “Alas, Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '! How completely you have deceived this people and Jerusalem by saying, ‘You will have peace,’ when the sword is at our throats!”'
  '11':
  - type: text
    content: 'At that time this people and Jerusalem will be told, “A scorching wind from the barren heights in the desert blows toward my people, but not to winnow or cleanse; '
  '12':
  - type: text
    content: a wind too strong for that comes from me. Now I pronounce my judgments against them.”
  '13':
  - type: text
    content: Look! He advances like the clouds,
  - type: text
    content: his chariots come like a whirlwind,
  - type: text
    content: his horses are swifter than eagles.
  - type: text
    content: Woe to us! We are ruined!
  '14':
  - type: text
    content: Jerusalem, wash the evil from your heart and be saved.
  - type: text
    content: How long will you harbor wicked thoughts?
  '15':
  - type: text
    content: A voice is announcing from Dan,
  - type: text
    content: proclaiming disaster from the hills of Ephraim.
  '16':
  - type: text
    content: “Tell this to the nations,
  - type: text
    content: 'proclaim concerning Jerusalem:'
  - type: text
    content: ‘A besieging army is coming from a distant land,
  - type: text
    content: raising a war cry against the cities of Judah.
  '17':
  - type: text
    content: They surround her like men guarding a field,
  - type: text
    content: because she has rebelled against me,’ ”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '18':
  - type: text
    content: “Your own conduct and actions
  - type: text
    content: have brought this on you.
  - type: text
    content: This is your punishment.
  - type: text
    content: How bitter it is!
  - type: text
    content: How it pierces to the heart!”
  '19':
  - type: text
    content: Oh, my anguish, my anguish!
  - type: text
    content: I writhe in pain.
  - type: text
    content: Oh, the agony of my heart!
  - type: text
    content: My heart pounds within me,
  - type: text
    content: I cannot keep silent.
  - type: text
    content: For I have heard the sound of the trumpet;
  - type: text
    content: I have heard the battle cry.
  '2':
  - type: text
    content: and if in a truthful, just and righteous way
  - type: text
    content: 'you swear, ‘As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives,’'
  - type: text
    content: then the nations will invoke blessings by him
  - type: text
    content: and in him they will boast.”
  '20':
  - type: text
    content: Disaster follows disaster;
  - type: text
    content: the whole land lies in ruins.
  - type: text
    content: In an instant my tents are destroyed,
  - type: text
    content: my shelter in a moment.
  '21':
  - type: text
    content: How long must I see the battle standard
  - type: text
    content: and hear the sound of the trumpet?
  '22':
  - type: text
    content: “My people are fools;
  - type: text
    content: they do not know me.
  - type: text
    content: They are senseless children;
  - type: text
    content: they have no understanding.
  - type: text
    content: They are skilled in doing evil;
  - type: text
    content: they know not how to do good.”
  '23':
  - type: text
    content: I looked at the earth,
  - type: text
    content: and it was formless and empty;
  - type: text
    content: and at the heavens,
  - type: text
    content: and their light was gone.
  '24':
  - type: text
    content: I looked at the mountains,
  - type: text
    content: and they were quaking;
  - type: text
    content: all the hills were swaying.
  '25':
  - type: text
    content: I looked, and there were no people;
  - type: text
    content: every bird in the sky had flown away.
  '26':
  - type: text
    content: I looked, and the fruitful land was a desert;
  - type: text
    content: all its towns lay in ruins
  - type: text
    content: 'before the '
  - type: text
    content: Lord
  - type: text
    content: ', before his fierce anger.'
  '27':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “The whole land will be ruined,
  - type: text
    content: though I will not destroy it completely.
  '28':
  - type: text
    content: Therefore the earth will mourn
  - type: text
    content: and the heavens above grow dark,
  - type: text
    content: because I have spoken and will not relent,
  - type: text
    content: I have decided and will not turn back.”
  '29':
  - type: text
    content: At the sound of horsemen and archers
  - type: text
    content: every town takes to flight.
  - type: text
    content: Some go into the thickets;
  - type: text
    content: some climb up among the rocks.
  - type: text
    content: All the towns are deserted;
  - type: text
    content: no one lives in them.
  '3':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says to the people of Judah and to Jerusalem:'
  - type: text
    content: “Break up your unplowed ground
  - type: text
    content: and do not sow among thorns.
  '30':
  - type: text
    content: What are you doing, you devastated one?
  - type: text
    content: Why dress yourself in scarlet
  - type: text
    content: and put on jewels of gold?
  - type: text
    content: Why highlight your eyes with makeup?
  - type: text
    content: You adorn yourself in vain.
  - type: text
    content: Your lovers despise you;
  - type: text
    content: they want to kill you.
  '31':
  - type: text
    content: I hear a cry as of a woman in labor,
  - type: text
    content: a groan as of one bearing her first child—
  - type: text
    content: the cry of Daughter Zion gasping for breath,
  - type: text
    content: stretching out her hands and saying,
  - type: text
    content: “Alas! I am fainting;
  - type: text
    content: my life is given over to murderers.”
  '4':
  - type: text
    content: 'Circumcise yourselves to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: circumcise your hearts,
  - type: text
    content: you people of Judah and inhabitants of Jerusalem,
  - type: text
    content: or my wrath will flare up and burn like fire
  - type: text
    content: because of the evil you have done—
  - type: text
    content: burn with no one to quench it.
  - type: heading
    content: Disaster From the North
  '5':
  - type: text
    content: '“Announce in Judah and proclaim in Jerusalem and say:'
  - type: text
    content: ‘Sound the trumpet throughout the land!’
  - type: text
    content: 'Cry aloud and say:'
  - type: text
    content: ‘Gather together!
  - type: text
    content: Let us flee to the fortified cities!’
  '6':
  - type: text
    content: Raise the signal to go to Zion!
  - type: text
    content: Flee for safety without delay!
  - type: text
    content: For I am bringing disaster from the north,
  - type: text
    content: even terrible destruction.”
  '7':
  - type: text
    content: A lion has come out of his lair;
  - type: text
    content: a destroyer of nations has set out.
  - type: text
    content: He has left his place
  - type: text
    content: to lay waste your land.
  - type: text
    content: Your towns will lie in ruins
  - type: text
    content: without inhabitant.
  '8':
  - type: text
    content: So put on sackcloth,
  - type: text
    content: lament and wail,
  - type: text
    content: 'for the fierce anger of the '
  - type: text
    content: Lord
  - type: text
    content: has not turned away from us.
  '9':
  - type: text
    content: '“In that day,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “the king and the officials will lose heart,
  - type: text
    content: the priests will be horrified,
  - type: text
    content: and the prophets will be appalled.”
