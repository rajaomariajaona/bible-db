document_id: JER.4,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “If you, Israel, will return,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then return to me,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If you put your detestable idols out of my sight
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no longer go astray,
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Then I said, “Alas, Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '! How completely you have deceived this people and Jerusalem by saying, ‘You will have peace,’ when the sword is at our throats!”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'At that time this people and Jerusalem will be told, “A scorching wind from the barren heights in the desert blows toward my people, but not to winnow or cleanse; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: a wind too strong for that comes from me. Now I pronounce my judgments against them.”
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Look! He advances like the clouds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his chariots come like a whirlwind,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: his horses are swifter than eagles.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Woe to us! We are ruined!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Jerusalem, wash the evil from your heart and be saved.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long will you harbor wicked thoughts?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: A voice is announcing from Dan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: proclaiming disaster from the hills of Ephraim.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “Tell this to the nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'proclaim concerning Jerusalem:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘A besieging army is coming from a distant land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: raising a war cry against the cities of Judah.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: They surround her like men guarding a field,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because she has rebelled against me,’ ”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “Your own conduct and actions
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have brought this on you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is your punishment.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How bitter it is!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How it pierces to the heart!”
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Oh, my anguish, my anguish!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I writhe in pain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, the agony of my heart!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: My heart pounds within me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I cannot keep silent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I have heard the sound of the trumpet;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have heard the battle cry.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: and if in a truthful, just and righteous way
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'you swear, ‘As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives,’'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: then the nations will invoke blessings by him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and in him they will boast.”
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Disaster follows disaster;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the whole land lies in ruins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In an instant my tents are destroyed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my shelter in a moment.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: How long must I see the battle standard
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hear the sound of the trumpet?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “My people are fools;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they do not know me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are senseless children;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they have no understanding.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are skilled in doing evil;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they know not how to do good.”
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: I looked at the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and it was formless and empty;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and at the heavens,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their light was gone.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: I looked at the mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they were quaking;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the hills were swaying.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: I looked, and there were no people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every bird in the sky had flown away.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: I looked, and the fruitful land was a desert;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all its towns lay in ruins
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', before his fierce anger.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The whole land will be ruined,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though I will not destroy it completely.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Therefore the earth will mourn
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the heavens above grow dark,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because I have spoken and will not relent,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have decided and will not turn back.”
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: At the sound of horsemen and archers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every town takes to flight.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Some go into the thickets;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: some climb up among the rocks.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All the towns are deserted;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one lives in them.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says to the people of Judah and to Jerusalem:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Break up your unplowed ground
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and do not sow among thorns.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: What are you doing, you devastated one?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why dress yourself in scarlet
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and put on jewels of gold?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why highlight your eyes with makeup?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You adorn yourself in vain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your lovers despise you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they want to kill you.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: I hear a cry as of a woman in labor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a groan as of one bearing her first child—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the cry of Daughter Zion gasping for breath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stretching out her hands and saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Alas! I am fainting;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my life is given over to murderers.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Circumcise yourselves to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: circumcise your hearts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you people of Judah and inhabitants of Jerusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or my wrath will flare up and burn like fire
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of the evil you have done—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: burn with no one to quench it.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Disaster From the North
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“Announce in Judah and proclaim in Jerusalem and say:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Sound the trumpet throughout the land!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Cry aloud and say:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Gather together!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let us flee to the fortified cities!’
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Raise the signal to go to Zion!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Flee for safety without delay!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I am bringing disaster from the north,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even terrible destruction.”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: A lion has come out of his lair;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a destroyer of nations has set out.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has left his place
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to lay waste your land.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your towns will lie in ruins
  - type: usfm
    marker: q2
    children:
    - type: text
      text: without inhabitant.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: So put on sackcloth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lament and wail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for the fierce anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has not turned away from us.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“In that day,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “the king and the officials will lose heart,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the priests will be horrified,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the prophets will be appalled.”
