document_id: JHN.INTRO1
type_code: eng
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Intro
- type: usfm
  marker: im
  children:
  - type: text
    text: 'John closes his book by revealing his purpose in writing Jesus’ story: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: These are written that you may believe that Jesus is the Messiah, the Son of God, and that by believing you may have life in his name.
- type: usfm
  marker: ip
  children:
  - type: text
    text: John begins his book by echoing words from the Bible’s creation story—
  - type: usfm
    marker: qt
    children:
    - type: text
      text: In the beginning
  - type: text
    text: —showing his readers that this is a story of a new creation. Just as the first creation was completed in seven days, John uses the number seven to structure his book. For the Jews the number seven represented completeness and wholeness, a finished work of God revealing his purpose for the world.
- type: usfm
  marker: ip
  children:
  - type: text
    text: The story is told in two main parts. The first describes Jesus’ public ministry and has seven sections. Each section closes with a report on how people respond to Jesus, either in faith or unbelief. The second part is devoted to the Passover weekend, when Jesus gave his life for the world.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'John records seven instances in which Jesus revealed his identity by using the phrase '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: I am
  - type: text
    text: ', the name by which God had revealed himself earlier. Similarly, John records seven miraculous signs that Jesus performed. John’s narrative mentions twice that the resurrection of Jesus took place on the'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: first day of the week.
  - type: text
    text: ' In this way he confirms that the power of a new creation has broken into our world.'
