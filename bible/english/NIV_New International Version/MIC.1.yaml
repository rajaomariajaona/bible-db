document_id: MIC.1
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' that came to Micah of Moresheth during the reigns of Jotham, Ahaz and Hezekiah, kings of Judah—the vision he saw concerning Samaria and Jerusalem.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Hear, you peoples, all of you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: listen, earth and all who live in it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'that the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' may bear witness against you,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Lord from his holy temple.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judgment Against Samaria and Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Look! The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is coming from his dwelling place;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he comes down and treads on the heights of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The mountains melt beneath him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the valleys split apart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: like wax before the fire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like water rushing down a slope.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: All this is because of Jacob’s transgression,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of the sins of the people of Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What is Jacob’s transgression?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Is it not Samaria?
- type: usfm
  marker: q1
  children:
  - type: text
    text: What is Judah’s high place?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Is it not Jerusalem?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Therefore I will make Samaria a heap of rubble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a place for planting vineyards.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will pour her stones into the valley
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lay bare her foundations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: All her idols will be broken to pieces;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all her temple gifts will be burned with fire;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will destroy all her images.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Since she gathered her gifts from the wages of prostitutes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as the wages of prostitutes they will again be used.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Weeping and Mourning
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Because of this I will weep and wail;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will go about barefoot and naked.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will howl like a jackal
- type: usfm
  marker: q2
  children:
  - type: text
    text: and moan like an owl.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For Samaria’s plague is incurable;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it has spread to Judah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It has reached the very gate of my people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even to Jerusalem itself.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tell it not in Gath
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Gath '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sounds like the Hebrew for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tell
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: weep not at all.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In Beth Ophrah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Beth Ophrah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: house of dust.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: roll in the dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Pass by naked and in shame,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who live in Shaphir.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Shaphir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pleasant.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who live in Zaanan
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Zaanan '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sounds like the Hebrew for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: come out
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: will not come out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Beth Ezel is in mourning;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it no longer protects you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Those who live in Maroth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Maroth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sounds like the Hebrew for '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: bitter.
    marker-yv: yv-n
  - type: text
    text: ' writhe in pain,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: waiting for relief,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'because disaster has come from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: even to the gate of Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: You who live in Lachish,
- type: usfm
  marker: q2
  children:
  - type: text
    text: harness fast horses to the chariot.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You are where the sin of Daughter Zion began,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the transgressions of Israel were found in you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Therefore you will give parting gifts
- type: usfm
  marker: q2
  children:
  - type: text
    text: to Moresheth Gath.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The town of Akzib
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Akzib '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: deception.
    marker-yv: yv-n
  - type: text
    text: ' will prove deceptive'
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the kings of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I will bring a conqueror against you
- type: usfm
  marker: q2
  children:
  - type: text
    text: who live in Mareshah.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mareshah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sounds like the Hebrew for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: conqueror
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: The nobles of Israel
- type: usfm
  marker: q2
  children:
  - type: text
    text: will flee to Adullam.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Shave your head in mourning
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the children in whom you delight;
- type: usfm
  marker: q1
  children:
  - type: text
    text: make yourself as bald as the vulture,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they will go from you into exile.
