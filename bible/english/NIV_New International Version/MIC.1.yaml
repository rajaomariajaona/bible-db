document_id: MIC.1,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that came to Micah of Moresheth during the reigns of Jotham, Ahaz and Hezekiah, kings of Judah—the vision he saw concerning Samaria and Jerusalem.'
  '10':
  - type: text
    content: Tell it not in Gath
  - type: note
    content: Gath sounds like the Hebrew for tell.
  - type: text
    content: ;
  - type: text
    content: weep not at all.
  - type: text
    content: In Beth Ophrah
  - type: note
    content: Beth Ophrah means house of dust.
  - type: text
    content: roll in the dust.
  '11':
  - type: text
    content: Pass by naked and in shame,
  - type: text
    content: you who live in Shaphir.
  - type: note
    content: Shaphir means pleasant.
  - type: text
    content: Those who live in Zaanan
  - type: note
    content: Zaanan sounds like the Hebrew for come out.
  - type: text
    content: will not come out.
  - type: text
    content: Beth Ezel is in mourning;
  - type: text
    content: it no longer protects you.
  '12':
  - type: text
    content: Those who live in Maroth
  - type: note
    content: Maroth sounds like the Hebrew for bitter.
  - type: text
    content: ' writhe in pain,'
  - type: text
    content: waiting for relief,
  - type: text
    content: 'because disaster has come from the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: even to the gate of Jerusalem.
  '13':
  - type: text
    content: You who live in Lachish,
  - type: text
    content: harness fast horses to the chariot.
  - type: text
    content: You are where the sin of Daughter Zion began,
  - type: text
    content: for the transgressions of Israel were found in you.
  '14':
  - type: text
    content: Therefore you will give parting gifts
  - type: text
    content: to Moresheth Gath.
  - type: text
    content: The town of Akzib
  - type: note
    content: Akzib means deception.
  - type: text
    content: ' will prove deceptive'
  - type: text
    content: to the kings of Israel.
  '15':
  - type: text
    content: I will bring a conqueror against you
  - type: text
    content: who live in Mareshah.
  - type: note
    content: Mareshah sounds like the Hebrew for conqueror.
  - type: text
    content: The nobles of Israel
  - type: text
    content: will flee to Adullam.
  '16':
  - type: text
    content: Shave your head in mourning
  - type: text
    content: for the children in whom you delight;
  - type: text
    content: make yourself as bald as the vulture,
  - type: text
    content: for they will go from you into exile.
  '2':
  - type: text
    content: Hear, you peoples, all of you,
  - type: text
    content: listen, earth and all who live in it,
  - type: text
    content: 'that the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' may bear witness against you,'
  - type: text
    content: the Lord from his holy temple.
  - type: heading
    content: Judgment Against Samaria and Jerusalem
  '3':
  - type: text
    content: 'Look! The '
  - type: text
    content: Lord
  - type: text
    content: ' is coming from his dwelling place;'
  - type: text
    content: he comes down and treads on the heights of the earth.
  '4':
  - type: text
    content: The mountains melt beneath him
  - type: text
    content: and the valleys split apart,
  - type: text
    content: like wax before the fire,
  - type: text
    content: like water rushing down a slope.
  '5':
  - type: text
    content: All this is because of Jacob’s transgression,
  - type: text
    content: because of the sins of the people of Israel.
  - type: text
    content: What is Jacob’s transgression?
  - type: text
    content: Is it not Samaria?
  - type: text
    content: What is Judah’s high place?
  - type: text
    content: Is it not Jerusalem?
  '6':
  - type: text
    content: “Therefore I will make Samaria a heap of rubble,
  - type: text
    content: a place for planting vineyards.
  - type: text
    content: I will pour her stones into the valley
  - type: text
    content: and lay bare her foundations.
  '7':
  - type: text
    content: All her idols will be broken to pieces;
  - type: text
    content: all her temple gifts will be burned with fire;
  - type: text
    content: I will destroy all her images.
  - type: text
    content: Since she gathered her gifts from the wages of prostitutes,
  - type: text
    content: as the wages of prostitutes they will again be used.”
  - type: heading
    content: Weeping and Mourning
  '8':
  - type: text
    content: Because of this I will weep and wail;
  - type: text
    content: I will go about barefoot and naked.
  - type: text
    content: I will howl like a jackal
  - type: text
    content: and moan like an owl.
  '9':
  - type: text
    content: For Samaria’s plague is incurable;
  - type: text
    content: it has spread to Judah.
  - type: text
    content: It has reached the very gate of my people,
  - type: text
    content: even to Jerusalem itself.
