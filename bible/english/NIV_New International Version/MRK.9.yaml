document_id: MRK.9,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'And he said to them, '
  - type: text
    content: “Truly I tell you, some who are standing here will not taste death before they see that the kingdom of God has come with power.”
  - type: heading
    content: The Transfiguration
  '10':
  - type: text
    content: They kept the matter to themselves, discussing what “rising from the dead” meant.
  '11':
  - type: text
    content: And they asked him, “Why do the teachers of the law say that Elijah must come first?”
  '12':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “To be sure, Elijah does come first, and restores all things. Why then is it written that the Son of Man must suffer much and be rejected?
  - type: text
    content: ' '
  '13':
  - type: text
    content: But I tell you, Elijah has come, and they have done to him everything they wished, just as it is written about him.”
  - type: heading
    content: Jesus Heals a Boy Possessed by an Impure Spirit
  '14':
  - type: text
    content: 'When they came to the other disciples, they saw a large crowd around them and the teachers of the law arguing with them. '
  '15':
  - type: text
    content: As soon as all the people saw Jesus, they were overwhelmed with wonder and ran to greet him.
  '16':
  - type: text
    content: ' '
  - type: text
    content: “What are you arguing with them about?”
  - type: text
    content: ' he asked.'
  '17':
  - type: text
    content: 'A man in the crowd answered, “Teacher, I brought you my son, who is possessed by a spirit that has robbed him of speech. '
  '18':
  - type: text
    content: Whenever it seizes him, it throws him to the ground. He foams at the mouth, gnashes his teeth and becomes rigid. I asked your disciples to drive out the spirit, but they could not.”
  '19':
  - type: text
    content: ' '
  - type: text
    content: “You unbelieving generation,”
  - type: text
    content: ' Jesus replied, '
  - type: text
    content: “how long shall I stay with you? How long shall I put up with you? Bring the boy to me.”
  '2':
  - type: text
    content: 'After six days Jesus took Peter, James and John with him and led them up a high mountain, where they were all alone. There he was transfigured before them. '
  '20':
  - type: text
    content: So they brought him. When the spirit saw Jesus, it immediately threw the boy into a convulsion. He fell to the ground and rolled around, foaming at the mouth.
  '21':
  - type: text
    content: 'Jesus asked the boy’s father, '
  - type: text
    content: “How long has he been like this?”
  - type: text
    content: '“From childhood,” he answered. '
  '22':
  - type: text
    content: “It has often thrown him into fire or water to kill him. But if you can do anything, take pity on us and help us.”
  '23':
  - type: text
    content: ' '
  - type: text
    content: “ ‘If you can’?”
  - type: text
    content: ' said Jesus. '
  - type: text
    content: “Everything is possible for one who believes.”
  '24':
  - type: text
    content: Immediately the boy’s father exclaimed, “I do believe; help me overcome my unbelief!”
  '25':
  - type: text
    content: 'When Jesus saw that a crowd was running to the scene, he rebuked the impure spirit. '
  - type: text
    content: “You deaf and mute spirit,”
  - type: text
    content: ' he said, '
  - type: text
    content: “I command you, come out of him and never enter him again.”
  '26':
  - type: text
    content: 'The spirit shrieked, convulsed him violently and came out. The boy looked so much like a corpse that many said, “He’s dead.” '
  '27':
  - type: text
    content: But Jesus took him by the hand and lifted him to his feet, and he stood up.
  '28':
  - type: text
    content: After Jesus had gone indoors, his disciples asked him privately, “Why couldn’t we drive it out?”
  '29':
  - type: text
    content: 'He replied, '
  - type: text
    content: “This kind can come out only by prayer.
  - type: note
    content: Some manuscripts prayer and fasting
  - type: text
    content: ”
  - type: heading
    content: Jesus Predicts His Death a Second Time
  '3':
  - type: text
    content: 'His clothes became dazzling white, whiter than anyone in the world could bleach them. '
  '30':
  - type: text
    content: 'They left that place and passed through Galilee. Jesus did not want anyone to know where they were, '
  '31':
  - type: text
    content: 'because he was teaching his disciples. He said to them, '
  - type: text
    content: “The Son of Man is going to be delivered into the hands of men. They will kill him, and after three days he will rise.”
  - type: text
    content: ' '
  '32':
  - type: text
    content: But they did not understand what he meant and were afraid to ask him about it.
  '33':
  - type: text
    content: 'They came to Capernaum. When he was in the house, he asked them, '
  - type: text
    content: “What were you arguing about on the road?”
  - type: text
    content: ' '
  '34':
  - type: text
    content: But they kept quiet because on the way they had argued about who was the greatest.
  '35':
  - type: text
    content: 'Sitting down, Jesus called the Twelve and said, '
  - type: text
    content: “Anyone who wants to be first must be the very last, and the servant of all.”
  '36':
  - type: text
    content: 'He took a little child whom he placed among them. Taking the child in his arms, he said to them, '
  '37':
  - type: text
    content: “Whoever welcomes one of these little children in my name welcomes me; and whoever welcomes me does not welcome me but the one who sent me.”
  - type: heading
    content: Whoever Is Not Against Us Is for Us
  '38':
  - type: text
    content: “Teacher,” said John, “we saw someone driving out demons in your name and we told him to stop, because he was not one of us.”
  '39':
  - type: text
    content: ' '
  - type: text
    content: “Do not stop him,”
  - type: text
    content: ' Jesus said. '
  - type: text
    content: “For no one who does a miracle in my name can in the next moment say anything bad about me,
  - type: text
    content: ' '
  '4':
  - type: text
    content: And there appeared before them Elijah and Moses, who were talking with Jesus.
  '40':
  - type: text
    content: for whoever is not against us is for us.
  - type: text
    content: ' '
  '41':
  - type: text
    content: Truly I tell you, anyone who gives you a cup of water in my name because you belong to the Messiah will certainly not lose their reward.
  - type: heading
    content: Causing to Stumble
  '42':
  - type: text
    content: ' '
  - type: text
    content: “If anyone causes one of these little ones—those who believe in me—to stumble, it would be better for them if a large millstone were hung around their neck and they were thrown into the sea.
  - type: text
    content: ' '
  '43':
  - type: text
    content: If your hand causes you to stumble, cut it off. It is better for you to enter life maimed than with two hands to go into hell, where the fire never goes out.
  - type: text
    content: ' '
  '44':
  - type: note
    content: Some manuscripts include here the words of verse 48.
  - type: text
    content: ' '
  '45':
  - type: text
    content: And if your foot causes you to stumble, cut it off. It is better for you to enter life crippled than to have two feet and be thrown into hell.
  - type: text
    content: ' '
  '46':
  - type: note
    content: Some manuscripts include here the words of verse 48.
  - type: text
    content: ' '
  '47':
  - type: text
    content: And if your eye causes you to stumble, pluck it out. It is better for you to enter the kingdom of God with one eye than to have two eyes and be thrown into hell,
  - type: text
    content: ' '
  '48':
  - type: text
    content: where
  - type: text
    content: “ ‘the worms that eat them do not die,
  - type: text
    content: and the fire is not quenched.’
  - type: note
    content: Isaiah 66:24
  '49':
  - type: text
    content: ' '
  - type: text
    content: Everyone will be salted with fire.
  '5':
  - type: text
    content: 'Peter said to Jesus, “Rabbi, it is good for us to be here. Let us put up three shelters—one for you, one for Moses and one for Elijah.” '
  '50':
  - type: text
    content: ' '
  - type: text
    content: “Salt is good, but if it loses its saltiness, how can you make it salty again? Have salt among yourselves, and be at peace with each other.”
  '6':
  - type: text
    content: (He did not know what to say, they were so frightened.)
  '7':
  - type: text
    content: 'Then a cloud appeared and covered them, and a voice came from the cloud: “This is my Son, whom I love. Listen to him!”'
  '8':
  - type: text
    content: Suddenly, when they looked around, they no longer saw anyone with them except Jesus.
  '9':
  - type: text
    content: 'As they were coming down the mountain, Jesus gave them orders not to tell anyone what they had seen until the Son of Man had risen from the dead. '
