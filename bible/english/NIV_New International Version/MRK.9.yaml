document_id: MRK.9
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And he said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Truly I tell you, some who are standing here will not taste death before they see that the kingdom of God has come with power.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Transfiguration
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'After six days Jesus took Peter, James and John with him and led them up a high mountain, where they were all alone. There he was transfigured before them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'His clothes became dazzling white, whiter than anyone in the world could bleach them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: And there appeared before them Elijah and Moses, who were talking with Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Peter said to Jesus, “Rabbi, it is good for us to be here. Let us put up three shelters—one for you, one for Moses and one for Elijah.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: (He did not know what to say, they were so frightened.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then a cloud appeared and covered them, and a voice came from the cloud: “This is my Son, whom I love. Listen to him!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Suddenly, when they looked around, they no longer saw anyone with them except Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'As they were coming down the mountain, Jesus gave them orders not to tell anyone what they had seen until the Son of Man had risen from the dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They kept the matter to themselves, discussing what “rising from the dead” meant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: And they asked him, “Why do the teachers of the law say that Elijah must come first?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “To be sure, Elijah does come first, and restores all things. Why then is it written that the Son of Man must suffer much and be rejected?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But I tell you, Elijah has come, and they have done to him everything they wished, just as it is written about him.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals a Boy Possessed by an Impure Spirit
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When they came to the other disciples, they saw a large crowd around them and the teachers of the law arguing with them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: As soon as all the people saw Jesus, they were overwhelmed with wonder and ran to greet him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What are you arguing with them about?”
  - type: text
    text: ' he asked.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'A man in the crowd answered, “Teacher, I brought you my son, who is possessed by a spirit that has robbed him of speech. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Whenever it seizes him, it throws him to the ground. He foams at the mouth, gnashes his teeth and becomes rigid. I asked your disciples to drive out the spirit, but they could not.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You unbelieving generation,”
  - type: text
    text: ' Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “how long shall I stay with you? How long shall I put up with you? Bring the boy to me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So they brought him. When the spirit saw Jesus, it immediately threw the boy into a convulsion. He fell to the ground and rolled around, foaming at the mouth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jesus asked the boy’s father, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “How long has he been like this?”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“From childhood,” he answered. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “It has often thrown him into fire or water to kill him. But if you can do anything, take pity on us and help us.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “ ‘If you can’?”
  - type: text
    text: ' said Jesus. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Everything is possible for one who believes.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Immediately the boy’s father exclaimed, “I do believe; help me overcome my unbelief!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'When Jesus saw that a crowd was running to the scene, he rebuked the impure spirit. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You deaf and mute spirit,”
  - type: text
    text: ' he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I command you, come out of him and never enter him again.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The spirit shrieked, convulsed him violently and came out. The boy looked so much like a corpse that many said, “He’s dead.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: But Jesus took him by the hand and lifted him to his feet, and he stood up.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: After Jesus had gone indoors, his disciples asked him privately, “Why couldn’t we drive it out?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'He replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “This kind can come out only by prayer.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: prayer and fasting
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Predicts His Death a Second Time
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'They left that place and passed through Galilee. Jesus did not want anyone to know where they were, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'because he was teaching his disciples. He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The Son of Man is going to be delivered into the hands of men. They will kill him, and after three days he will rise.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: But they did not understand what he meant and were afraid to ask him about it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'They came to Capernaum. When he was in the house, he asked them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What were you arguing about on the road?”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: But they kept quiet because on the way they had argued about who was the greatest.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Sitting down, Jesus called the Twelve and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Anyone who wants to be first must be the very last, and the servant of all.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'He took a little child whom he placed among them. Taking the child in his arms, he said to them, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Whoever welcomes one of these little children in my name welcomes me; and whoever welcomes me does not welcome me but the one who sent me.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Whoever Is Not Against Us Is for Us
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: “Teacher,” said John, “we saw someone driving out demons in your name and we told him to stop, because he was not one of us.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Do not stop him,”
  - type: text
    text: ' Jesus said. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “For no one who does a miracle in my name can in the next moment say anything bad about me,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: for whoever is not against us is for us.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Truly I tell you, anyone who gives you a cup of water in my name because you belong to the Messiah will certainly not lose their reward.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Causing to Stumble
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If anyone causes one of these little ones—those who believe in me—to stumble, it would be better for them if a large millstone were hung around their neck and they were thrown into the sea.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If your hand causes you to stumble, cut it off. It is better for you to enter life maimed than with two hands to go into hell, where the fire never goes out.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '[44]'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some manuscripts include here the words of verse 48.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if your foot causes you to stumble, cut it off. It is better for you to enter life crippled than to have two feet and be thrown into hell.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '[46]'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some manuscripts include here the words of verse 48.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if your eye causes you to stumble, pluck it out. It is better for you to enter the kingdom of God with one eye than to have two eyes and be thrown into hell,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: where
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “ ‘the worms that eat them do not die,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and the fire is not quenched.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:48 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah 66:24
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Everyone will be salted with fire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Salt is good, but if it loses its saltiness, how can you make it salty again? Have salt among yourselves, and be at peace with each other.”
