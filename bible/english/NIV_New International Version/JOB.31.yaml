document_id: JOB.31
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “I made a covenant with my eyes
- type: usfm
  marker: q2
  children:
  - type: text
    text: not to look lustfully at a young woman.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For what is our lot from God above,
- type: usfm
  marker: q2
  children:
  - type: text
    text: our heritage from the Almighty on high?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Is it not ruin for the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: disaster for those who do wrong?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Does he not see my ways
- type: usfm
  marker: q2
  children:
  - type: text
    text: and count my every step?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “If I have walked with falsehood
- type: usfm
  marker: q2
  children:
  - type: text
    text: or my foot has hurried after deceit—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: let God weigh me in honest scales
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he will know that I am blameless—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: if my steps have turned from the path,
- type: usfm
  marker: q2
  children:
  - type: text
    text: if my heart has been led by my eyes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or if my hands have been defiled,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: then may others eat what I have sown,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and may my crops be uprooted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “If my heart has been enticed by a woman,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or if I have lurked at my neighbor’s door,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: then may my wife grind another man’s grain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and may other men sleep with her.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For that would have been wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a sin to be judged.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: It is a fire that burns to Destruction
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Abaddon
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it would have uprooted my harvest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “If I have denied justice to any of my servants,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whether male or female,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when they had a grievance against me,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: what will I do when God confronts me?
- type: usfm
  marker: q2
  children:
  - type: text
    text: What will I answer when called to account?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Did not he who made me in the womb make them?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Did not the same one form us both within our mothers?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “If I have denied the desires of the poor
- type: usfm
  marker: q2
  children:
  - type: text
    text: or let the eyes of the widow grow weary,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: if I have kept my bread to myself,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not sharing it with the fatherless—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: but from my youth I reared them as a father would,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and from my birth I guided the widow—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: if I have seen anyone perishing for lack of clothing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or the needy without garments,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: and their hearts did not bless me
- type: usfm
  marker: q2
  children:
  - type: text
    text: for warming them with the fleece from my sheep,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: if I have raised my hand against the fatherless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: knowing that I had influence in court,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: then let my arm fall from the shoulder,
- type: usfm
  marker: q2
  children:
  - type: text
    text: let it be broken off at the joint.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: For I dreaded destruction from God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and for fear of his splendor I could not do such things.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “If I have put my trust in gold
- type: usfm
  marker: q2
  children:
  - type: text
    text: or said to pure gold, ‘You are my security,’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: if I have rejoiced over my great wealth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the fortune my hands had gained,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: if I have regarded the sun in its radiance
- type: usfm
  marker: q2
  children:
  - type: text
    text: or the moon moving in splendor,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: so that my heart was secretly enticed
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my hand offered them a kiss of homage,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: then these also would be sins to be judged,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I would have been unfaithful to God on high.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “If I have rejoiced at my enemy’s misfortune
- type: usfm
  marker: q2
  children:
  - type: text
    text: or gloated over the trouble that came to him—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: I have not allowed my mouth to sin
- type: usfm
  marker: q2
  children:
  - type: text
    text: by invoking a curse against their life—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: if those of my household have never said,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Who has not been filled with Job’s meat?’—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: but no stranger had to spend the night in the street,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for my door was always open to the traveler—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: if I have concealed my sin as people do,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: as Adam did
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: by hiding my guilt in my heart
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: because I so feared the crowd
- type: usfm
  marker: q2
  children:
  - type: text
    text: and so dreaded the contempt of the clans
- type: usfm
  marker: q2
  children:
  - type: text
    text: that I kept silent and would not go outside—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: (“Oh, that I had someone to hear me!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I sign now my defense—let the Almighty answer me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let my accuser put his indictment in writing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Surely I would wear it on my shoulder,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I would put it on like a crown.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: I would give him an account of my every step;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I would present it to him as to a ruler.)—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: “if my land cries out against me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all its furrows are wet with tears,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: if I have devoured its yield without payment
- type: usfm
  marker: q2
  children:
  - type: text
    text: or broken the spirit of its tenants,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: then let briers come up instead of wheat
- type: usfm
  marker: q2
  children:
  - type: text
    text: and stinkweed instead of barley.”
- type: usfm
  marker: p
  children:
  - type: text
    text: The words of Job are ended.
