document_id: JOB.31,111
type_code: eng
verses:
  '1':
  - type: text
    content: “I made a covenant with my eyes
  - type: text
    content: not to look lustfully at a young woman.
  '10':
  - type: text
    content: then may my wife grind another man’s grain,
  - type: text
    content: and may other men sleep with her.
  '11':
  - type: text
    content: For that would have been wicked,
  - type: text
    content: a sin to be judged.
  '12':
  - type: text
    content: It is a fire that burns to Destruction
  - type: note
    content: Hebrew Abaddon
  - type: text
    content: ;
  - type: text
    content: it would have uprooted my harvest.
  '13':
  - type: text
    content: “If I have denied justice to any of my servants,
  - type: text
    content: whether male or female,
  - type: text
    content: when they had a grievance against me,
  '14':
  - type: text
    content: what will I do when God confronts me?
  - type: text
    content: What will I answer when called to account?
  '15':
  - type: text
    content: Did not he who made me in the womb make them?
  - type: text
    content: Did not the same one form us both within our mothers?
  '16':
  - type: text
    content: “If I have denied the desires of the poor
  - type: text
    content: or let the eyes of the widow grow weary,
  '17':
  - type: text
    content: if I have kept my bread to myself,
  - type: text
    content: not sharing it with the fatherless—
  '18':
  - type: text
    content: but from my youth I reared them as a father would,
  - type: text
    content: and from my birth I guided the widow—
  '19':
  - type: text
    content: if I have seen anyone perishing for lack of clothing,
  - type: text
    content: or the needy without garments,
  '2':
  - type: text
    content: For what is our lot from God above,
  - type: text
    content: our heritage from the Almighty on high?
  '20':
  - type: text
    content: and their hearts did not bless me
  - type: text
    content: for warming them with the fleece from my sheep,
  '21':
  - type: text
    content: if I have raised my hand against the fatherless,
  - type: text
    content: knowing that I had influence in court,
  '22':
  - type: text
    content: then let my arm fall from the shoulder,
  - type: text
    content: let it be broken off at the joint.
  '23':
  - type: text
    content: For I dreaded destruction from God,
  - type: text
    content: and for fear of his splendor I could not do such things.
  '24':
  - type: text
    content: “If I have put my trust in gold
  - type: text
    content: or said to pure gold, ‘You are my security,’
  '25':
  - type: text
    content: if I have rejoiced over my great wealth,
  - type: text
    content: the fortune my hands had gained,
  '26':
  - type: text
    content: if I have regarded the sun in its radiance
  - type: text
    content: or the moon moving in splendor,
  '27':
  - type: text
    content: so that my heart was secretly enticed
  - type: text
    content: and my hand offered them a kiss of homage,
  '28':
  - type: text
    content: then these also would be sins to be judged,
  - type: text
    content: for I would have been unfaithful to God on high.
  '29':
  - type: text
    content: “If I have rejoiced at my enemy’s misfortune
  - type: text
    content: or gloated over the trouble that came to him—
  '3':
  - type: text
    content: Is it not ruin for the wicked,
  - type: text
    content: disaster for those who do wrong?
  '30':
  - type: text
    content: I have not allowed my mouth to sin
  - type: text
    content: by invoking a curse against their life—
  '31':
  - type: text
    content: if those of my household have never said,
  - type: text
    content: ‘Who has not been filled with Job’s meat?’—
  '32':
  - type: text
    content: but no stranger had to spend the night in the street,
  - type: text
    content: for my door was always open to the traveler—
  '33':
  - type: text
    content: if I have concealed my sin as people do,
  - type: note
    content: Or as Adam did
  - type: text
    content: by hiding my guilt in my heart
  '34':
  - type: text
    content: because I so feared the crowd
  - type: text
    content: and so dreaded the contempt of the clans
  - type: text
    content: that I kept silent and would not go outside—
  '35':
  - type: text
    content: (“Oh, that I had someone to hear me!
  - type: text
    content: I sign now my defense—let the Almighty answer me;
  - type: text
    content: let my accuser put his indictment in writing.
  '36':
  - type: text
    content: Surely I would wear it on my shoulder,
  - type: text
    content: I would put it on like a crown.
  '37':
  - type: text
    content: I would give him an account of my every step;
  - type: text
    content: I would present it to him as to a ruler.)—
  '38':
  - type: text
    content: “if my land cries out against me
  - type: text
    content: and all its furrows are wet with tears,
  '39':
  - type: text
    content: if I have devoured its yield without payment
  - type: text
    content: or broken the spirit of its tenants,
  '4':
  - type: text
    content: Does he not see my ways
  - type: text
    content: and count my every step?
  '40':
  - type: text
    content: then let briers come up instead of wheat
  - type: text
    content: and stinkweed instead of barley.”
  - type: text
    content: The words of Job are ended.
  '5':
  - type: text
    content: “If I have walked with falsehood
  - type: text
    content: or my foot has hurried after deceit—
  '6':
  - type: text
    content: let God weigh me in honest scales
  - type: text
    content: and he will know that I am blameless—
  '7':
  - type: text
    content: if my steps have turned from the path,
  - type: text
    content: if my heart has been led by my eyes,
  - type: text
    content: or if my hands have been defiled,
  '8':
  - type: text
    content: then may others eat what I have sown,
  - type: text
    content: and may my crops be uprooted.
  '9':
  - type: text
    content: “If my heart has been enticed by a woman,
  - type: text
    content: or if I have lurked at my neighbor’s door,
