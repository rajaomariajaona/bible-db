document_id: EZK.36,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Hope for the Mountains of Israel
  - type: text
    content: '“Son of man, prophesy to the mountains of Israel and say, ‘Mountains of Israel, hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'and I will cause many people to live on you—yes, all of Israel. The towns will be inhabited and the ruins rebuilt. '
  '11':
  - type: text
    content: 'I will increase the number of people and animals living on you, and they will be fruitful and become numerous. I will settle people on you as in the past and will make you prosper more than before. Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '12':
  - type: text
    content: I will cause people, my people Israel, to live on you. They will possess you, and you will be their inheritance; you will never again deprive them of their children.
  '13':
  - type: text
    content: '“ ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Because some say to you, “You devour people and deprive your nation of its children,” '
  '14':
  - type: text
    content: 'therefore you will no longer devour people or make your nation childless, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'No longer will I make you hear the taunts of the nations, and no longer will you suffer the scorn of the peoples or cause your nation to fall, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  - type: heading
    content: Israel’s Restoration Assured
  '16':
  - type: text
    content: 'Again the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '17':
  - type: text
    content: '“Son of man, when the people of Israel were living in their own land, they defiled it by their conduct and their actions. Their conduct was like a woman’s monthly uncleanness in my sight. '
  '18':
  - type: text
    content: 'So I poured out my wrath on them because they had shed blood in the land and because they had defiled it with their idols. '
  '19':
  - type: text
    content: 'I dispersed them among the nations, and they were scattered through the countries; I judged them according to their conduct and their actions. '
  '2':
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: The enemy said of you, “Aha! The ancient heights have become our possession.” ’ '
  '20':
  - type: text
    content: 'And wherever they went among the nations they profaned my holy name, for it was said of them, ‘These are the '
  - type: text
    content: Lord
  - type: text
    content: '’s people, and yet they had to leave his land.’ '
  '21':
  - type: text
    content: I had concern for my holy name, which the people of Israel profaned among the nations where they had gone.
  '22':
  - type: text
    content: '“Therefore say to the Israelites, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: It is not for your sake, people of Israel, that I am going to do these things, but for the sake of my holy name, which you have profaned among the nations where you have gone. '
  '23':
  - type: text
    content: 'I will show the holiness of my great name, which has been profaned among the nations, the name you have profaned among them. Then the nations will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ', declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', when I am proved holy through you before their eyes.'
  '24':
  - type: text
    content: '“ ‘For I will take you out of the nations; I will gather you from all the countries and bring you back into your own land. '
  '25':
  - type: text
    content: 'I will sprinkle clean water on you, and you will be clean; I will cleanse you from all your impurities and from all your idols. '
  '26':
  - type: text
    content: 'I will give you a new heart and put a new spirit in you; I will remove from you your heart of stone and give you a heart of flesh. '
  '27':
  - type: text
    content: 'And I will put my Spirit in you and move you to follow my decrees and be careful to keep my laws. '
  '28':
  - type: text
    content: 'Then you will live in the land I gave your ancestors; you will be my people, and I will be your God. '
  '29':
  - type: text
    content: 'I will save you from all your uncleanness. I will call for the grain and make it plentiful and will not bring famine upon you. '
  '3':
  - type: text
    content: 'Therefore prophesy and say, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Because they ravaged and crushed you from every side so that you became the possession of the rest of the nations and the object of people’s malicious talk and slander, '
  '30':
  - type: text
    content: 'I will increase the fruit of the trees and the crops of the field, so that you will no longer suffer disgrace among the nations because of famine. '
  '31':
  - type: text
    content: 'Then you will remember your evil ways and wicked deeds, and you will loathe yourselves for your sins and detestable practices. '
  '32':
  - type: text
    content: 'I want you to know that I am not doing this for your sake, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: . Be ashamed and disgraced for your conduct, people of Israel!
  '33':
  - type: text
    content: '“ ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: On the day I cleanse you from all your sins, I will resettle your towns, and the ruins will be rebuilt. '
  '34':
  - type: text
    content: 'The desolate land will be cultivated instead of lying desolate in the sight of all who pass through it. '
  '35':
  - type: text
    content: 'They will say, “This land that was laid waste has become like the garden of Eden; the cities that were lying in ruins, desolate and destroyed, are now fortified and inhabited.” '
  '36':
  - type: text
    content: 'Then the nations around you that remain will know that I the '
  - type: text
    content: Lord
  - type: text
    content: ' have rebuilt what was destroyed and have replanted what was desolate. I the '
  - type: text
    content: Lord
  - type: text
    content: ' have spoken, and I will do it.’'
  '37':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Once again I will yield to Israel’s plea and do this for them: I will make their people as numerous as sheep, '
  '38':
  - type: text
    content: 'as numerous as the flocks for offerings at Jerusalem during her appointed festivals. So will the ruined cities be filled with flocks of people. Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '4':
  - type: text
    content: 'therefore, mountains of Israel, hear the word of the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ': This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says to the mountains and hills, to the ravines and valleys, to the desolate ruins and the deserted towns that have been plundered and ridiculed by the rest of the nations around you— '
  '5':
  - type: text
    content: 'this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: In my burning zeal I have spoken against the rest of the nations, and against all Edom, for with glee and with malice in their hearts they made my land their own possession so that they might plunder its pastureland.’ '
  '6':
  - type: text
    content: 'Therefore prophesy concerning the land of Israel and say to the mountains and hills, to the ravines and valleys: ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I speak in my jealous wrath because you have suffered the scorn of the nations. '
  '7':
  - type: text
    content: 'Therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I swear with uplifted hand that the nations around you will also suffer scorn.'
  '8':
  - type: text
    content: '“ ‘But you, mountains of Israel, will produce branches and fruit for my people Israel, for they will soon come home. '
  '9':
  - type: text
    content: 'I am concerned for you and will look on you with favor; you will be plowed and sown, '
