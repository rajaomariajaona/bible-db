document_id: NUM.28
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Daily Offerings
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Give this command to the Israelites and say to them: ‘Make sure that you present to me at the appointed time my food offerings, as an aroma pleasing to me.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Say to them: ‘This is the food offering you are to present to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': two lambs a year old without defect, as a regular burnt offering each day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Offer one lamb in the morning and the other at twilight, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: together with a grain offering of a tenth of an ephah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, probably about 3 1/2 pounds or about 1.6 kilograms; also in verses 13, 21 and 29
    marker-yv: yv-n
  - type: text
    text: ' of the finest flour mixed with a quarter of a hin'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 1 quart or about 1 liter; also in verses 7 and 14
    marker-yv: yv-n
  - type: text
    text: ' of oil from pressed olives. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'This is the regular burnt offering instituted at Mount Sinai as a pleasing aroma, a food offering presented to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The accompanying drink offering is to be a quarter of a hin of fermented drink with each lamb. Pour out the drink offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' at the sanctuary. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Offer the second lamb at twilight, along with the same kind of grain offering and drink offering that you offer in the morning. This is a food offering, an aroma pleasing to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sabbath Offerings
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “ ‘On the Sabbath day, make an offering of two lambs a year old without defect, together with its drink offering and a grain offering of two-tenths of an ephah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, probably about 7 pounds or about 3.2 kilograms; also in verses 12, 20 and 28
    marker-yv: yv-n
  - type: text
    text: ' of the finest flour mixed with olive oil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: This is the burnt offering for every Sabbath, in addition to the regular burnt offering and its drink offering.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Monthly Offerings
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“ ‘On the first of every month, present to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' a burnt offering of two young bulls, one ram and seven male lambs a year old, all without defect. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: With each bull there is to be a grain offering of three-tenths of an ephah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, probably about 11 pounds or about 5 kilograms; also in verses 20 and 28
    marker-yv: yv-n
  - type: text
    text: ' of the finest flour mixed with oil; with the ram, a grain offering of two-tenths of an ephah of the finest flour mixed with oil; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'and with each lamb, a grain offering of a tenth of an ephah of the finest flour mixed with oil. This is for a burnt offering, a pleasing aroma, a food offering presented to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: With each bull there is to be a drink offering of half a hin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 2 quarts or about 1.9 liters
    marker-yv: yv-n
  - type: text
    text: ' of wine; with the ram, a third of a hin'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 1 1/3 quarts or about 1.3 liters
    marker-yv: yv-n
  - type: text
    text: '; and with each lamb, a quarter of a hin. This is the monthly burnt offering to be made at each new moon during the year. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Besides the regular burnt offering with its drink offering, one male goat is to be presented to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' as a sin offering.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: purification offering
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verse 22
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Passover
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“ ‘On the fourteenth day of the first month the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s Passover is to be held. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'On the fifteenth day of this month there is to be a festival; for seven days eat bread made without yeast. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'On the first day hold a sacred assembly and do no regular work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Present to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' a food offering consisting of a burnt offering of two young bulls, one ram and seven male lambs a year old, all without defect. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'With each bull offer a grain offering of three-tenths of an ephah of the finest flour mixed with oil; with the ram, two-tenths; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'and with each of the seven lambs, one-tenth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Include one male goat as a sin offering to make atonement for you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Offer these in addition to the regular morning burnt offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'In this way present the food offering every day for seven days as an aroma pleasing to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '; it is to be offered in addition to the regular burnt offering and its drink offering. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: On the seventh day hold a sacred assembly and do no regular work.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Festival of Weeks
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '“ ‘On the day of firstfruits, when you present to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' an offering of new grain during the Festival of Weeks, hold a sacred assembly and do no regular work. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Present a burnt offering of two young bulls, one ram and seven male lambs a year old as an aroma pleasing to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'With each bull there is to be a grain offering of three-tenths of an ephah of the finest flour mixed with oil; with the ram, two-tenths; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'and with each of the seven lambs, one-tenth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Include one male goat to make atonement for you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Offer these together with their drink offerings, in addition to the regular burnt offering and its grain offering. Be sure the animals are without defect.
