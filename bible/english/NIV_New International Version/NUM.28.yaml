document_id: NUM.28,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Daily Offerings
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: This is the burnt offering for every Sabbath, in addition to the regular burnt offering and its drink offering.
  - type: heading
    content: Monthly Offerings
  '11':
  - type: text
    content: '“ ‘On the first of every month, present to the '
  - type: text
    content: Lord
  - type: text
    content: ' a burnt offering of two young bulls, one ram and seven male lambs a year old, all without defect. '
  '12':
  - type: text
    content: With each bull there is to be a grain offering of three-tenths of an ephah
  - type: note
    content: That is, probably about 11 pounds or about 5 kilograms; also in verses 20 and 28
  - type: text
    content: ' of the finest flour mixed with oil; with the ram, a grain offering of two-tenths of an ephah of the finest flour mixed with oil; '
  '13':
  - type: text
    content: 'and with each lamb, a grain offering of a tenth of an ephah of the finest flour mixed with oil. This is for a burnt offering, a pleasing aroma, a food offering presented to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '14':
  - type: text
    content: With each bull there is to be a drink offering of half a hin
  - type: note
    content: That is, about 2 quarts or about 1.9 liters
  - type: text
    content: ' of wine; with the ram, a third of a hin'
  - type: note
    content: That is, about 1 1/3 quarts or about 1.3 liters
  - type: text
    content: '; and with each lamb, a quarter of a hin. This is the monthly burnt offering to be made at each new moon during the year. '
  '15':
  - type: text
    content: 'Besides the regular burnt offering with its drink offering, one male goat is to be presented to the '
  - type: text
    content: Lord
  - type: text
    content: ' as a sin offering.'
  - type: note
    content: Or purification offering; also in verse 22
  - type: heading
    content: The Passover
  '16':
  - type: text
    content: '“ ‘On the fourteenth day of the first month the '
  - type: text
    content: Lord
  - type: text
    content: '’s Passover is to be held. '
  '17':
  - type: text
    content: 'On the fifteenth day of this month there is to be a festival; for seven days eat bread made without yeast. '
  '18':
  - type: text
    content: 'On the first day hold a sacred assembly and do no regular work. '
  '19':
  - type: text
    content: 'Present to the '
  - type: text
    content: Lord
  - type: text
    content: ' a food offering consisting of a burnt offering of two young bulls, one ram and seven male lambs a year old, all without defect. '
  '2':
  - type: text
    content: '“Give this command to the Israelites and say to them: ‘Make sure that you present to me at the appointed time my food offerings, as an aroma pleasing to me.’ '
  '20':
  - type: text
    content: 'With each bull offer a grain offering of three-tenths of an ephah of the finest flour mixed with oil; with the ram, two-tenths; '
  '21':
  - type: text
    content: 'and with each of the seven lambs, one-tenth. '
  '22':
  - type: text
    content: 'Include one male goat as a sin offering to make atonement for you. '
  '23':
  - type: text
    content: 'Offer these in addition to the regular morning burnt offering. '
  '24':
  - type: text
    content: 'In this way present the food offering every day for seven days as an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: '; it is to be offered in addition to the regular burnt offering and its drink offering. '
  '25':
  - type: text
    content: On the seventh day hold a sacred assembly and do no regular work.
  - type: heading
    content: The Festival of Weeks
  '26':
  - type: text
    content: '“ ‘On the day of firstfruits, when you present to the '
  - type: text
    content: Lord
  - type: text
    content: ' an offering of new grain during the Festival of Weeks, hold a sacred assembly and do no regular work. '
  '27':
  - type: text
    content: 'Present a burnt offering of two young bulls, one ram and seven male lambs a year old as an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'With each bull there is to be a grain offering of three-tenths of an ephah of the finest flour mixed with oil; with the ram, two-tenths; '
  '29':
  - type: text
    content: 'and with each of the seven lambs, one-tenth. '
  '3':
  - type: text
    content: 'Say to them: ‘This is the food offering you are to present to the '
  - type: text
    content: Lord
  - type: text
    content: ': two lambs a year old without defect, as a regular burnt offering each day. '
  '30':
  - type: text
    content: 'Include one male goat to make atonement for you. '
  '31':
  - type: text
    content: Offer these together with their drink offerings, in addition to the regular burnt offering and its grain offering. Be sure the animals are without defect.
  '4':
  - type: text
    content: 'Offer one lamb in the morning and the other at twilight, '
  '5':
  - type: text
    content: together with a grain offering of a tenth of an ephah
  - type: note
    content: That is, probably about 3 1/2 pounds or about 1.6 kilograms; also in verses 13, 21 and 29
  - type: text
    content: ' of the finest flour mixed with a quarter of a hin'
  - type: note
    content: That is, about 1 quart or about 1 liter; also in verses 7 and 14
  - type: text
    content: ' of oil from pressed olives. '
  '6':
  - type: text
    content: 'This is the regular burnt offering instituted at Mount Sinai as a pleasing aroma, a food offering presented to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'The accompanying drink offering is to be a quarter of a hin of fermented drink with each lamb. Pour out the drink offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' at the sanctuary. '
  '8':
  - type: text
    content: 'Offer the second lamb at twilight, along with the same kind of grain offering and drink offering that you offer in the morning. This is a food offering, an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Sabbath Offerings
  '9':
  - type: text
    content: “ ‘On the Sabbath day, make an offering of two lambs a year old without defect, together with its drink offering and a grain offering of two-tenths of an ephah
  - type: note
    content: That is, probably about 7 pounds or about 3.2 kilograms; also in verses 12, 20 and 28
  - type: text
    content: ' of the finest flour mixed with olive oil. '
