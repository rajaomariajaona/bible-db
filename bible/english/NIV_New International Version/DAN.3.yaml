document_id: DAN.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Image of Gold and the Blazing Furnace
  - type: text
    content: King Nebuchadnezzar made an image of gold, sixty cubits high and six cubits wide,
  - type: note
    content: That is, about 90 feet high and 9 feet wide or about 27 meters high and 2.7 meters wide
  - type: text
    content: ' and set it up on the plain of Dura in the province of Babylon. '
  '10':
  - type: text
    content: 'Your Majesty has issued a decree that everyone who hears the sound of the horn, flute, zither, lyre, harp, pipe and all kinds of music must fall down and worship the image of gold, '
  '11':
  - type: text
    content: 'and that whoever does not fall down and worship will be thrown into a blazing furnace. '
  '12':
  - type: text
    content: But there are some Jews whom you have set over the affairs of the province of Babylon—Shadrach, Meshach and Abednego—who pay no attention to you, Your Majesty. They neither serve your gods nor worship the image of gold you have set up.”
  '13':
  - type: text
    content: 'Furious with rage, Nebuchadnezzar summoned Shadrach, Meshach and Abednego. So these men were brought before the king, '
  '14':
  - type: text
    content: 'and Nebuchadnezzar said to them, “Is it true, Shadrach, Meshach and Abednego, that you do not serve my gods or worship the image of gold I have set up? '
  '15':
  - type: text
    content: Now when you hear the sound of the horn, flute, zither, lyre, harp, pipe and all kinds of music, if you are ready to fall down and worship the image I made, very good. But if you do not worship it, you will be thrown immediately into a blazing furnace. Then what god will be able to rescue you from my hand?”
  '16':
  - type: text
    content: 'Shadrach, Meshach and Abednego replied to him, “King Nebuchadnezzar, we do not need to defend ourselves before you in this matter. '
  '17':
  - type: text
    content: If we are thrown into the blazing furnace, the God we serve is able to deliver us from it, and he will deliver us
  - type: note
    content: Or If the God we serve is able to deliver us, then he will deliver us from the blazing furnace and
  - type: text
    content: ' from Your Majesty’s hand. '
  '18':
  - type: text
    content: But even if he does not, we want you to know, Your Majesty, that we will not serve your gods or worship the image of gold you have set up.”
  '19':
  - type: text
    content: 'Then Nebuchadnezzar was furious with Shadrach, Meshach and Abednego, and his attitude toward them changed. He ordered the furnace heated seven times hotter than usual '
  '2':
  - type: text
    content: 'He then summoned the satraps, prefects, governors, advisers, treasurers, judges, magistrates and all the other provincial officials to come to the dedication of the image he had set up. '
  '20':
  - type: text
    content: 'and commanded some of the strongest soldiers in his army to tie up Shadrach, Meshach and Abednego and throw them into the blazing furnace. '
  '21':
  - type: text
    content: 'So these men, wearing their robes, trousers, turbans and other clothes, were bound and thrown into the blazing furnace. '
  '22':
  - type: text
    content: 'The king’s command was so urgent and the furnace so hot that the flames of the fire killed the soldiers who took up Shadrach, Meshach and Abednego, '
  '23':
  - type: text
    content: and these three men, firmly tied, fell into the blazing furnace.
  '24':
  - type: text
    content: Then King Nebuchadnezzar leaped to his feet in amazement and asked his advisers, “Weren’t there three men that we tied up and threw into the fire?”
  - type: text
    content: They replied, “Certainly, Your Majesty.”
  '25':
  - type: text
    content: He said, “Look! I see four men walking around in the fire, unbound and unharmed, and the fourth looks like a son of the gods.”
  '26':
  - type: text
    content: Nebuchadnezzar then approached the opening of the blazing furnace and shouted, “Shadrach, Meshach and Abednego, servants of the Most High God, come out! Come here!”
  - type: text
    content: 'So Shadrach, Meshach and Abednego came out of the fire, '
  '27':
  - type: text
    content: and the satraps, prefects, governors and royal advisers crowded around them. They saw that the fire had not harmed their bodies, nor was a hair of their heads singed; their robes were not scorched, and there was no smell of fire on them.
  '28':
  - type: text
    content: 'Then Nebuchadnezzar said, “Praise be to the God of Shadrach, Meshach and Abednego, who has sent his angel and rescued his servants! They trusted in him and defied the king’s command and were willing to give up their lives rather than serve or worship any god except their own God. '
  '29':
  - type: text
    content: Therefore I decree that the people of any nation or language who say anything against the God of Shadrach, Meshach and Abednego be cut into pieces and their houses be turned into piles of rubble, for no other god can save in this way.”
  '3':
  - type: text
    content: So the satraps, prefects, governors, advisers, treasurers, judges, magistrates and all the other provincial officials assembled for the dedication of the image that King Nebuchadnezzar had set up, and they stood before it.
  '30':
  - type: text
    content: Then the king promoted Shadrach, Meshach and Abednego in the province of Babylon.
  '4':
  - type: text
    content: 'Then the herald loudly proclaimed, “Nations and peoples of every language, this is what you are commanded to do: '
  '5':
  - type: text
    content: 'As soon as you hear the sound of the horn, flute, zither, lyre, harp, pipe and all kinds of music, you must fall down and worship the image of gold that King Nebuchadnezzar has set up. '
  '6':
  - type: text
    content: Whoever does not fall down and worship will immediately be thrown into a blazing furnace.”
  '7':
  - type: text
    content: Therefore, as soon as they heard the sound of the horn, flute, zither, lyre, harp and all kinds of music, all the nations and peoples of every language fell down and worshiped the image of gold that King Nebuchadnezzar had set up.
  '8':
  - type: text
    content: At this time some astrologers
  - type: note
    content: Or Chaldeans
  - type: text
    content: ' came forward and denounced the Jews. '
  '9':
  - type: text
    content: 'They said to King Nebuchadnezzar, “May the king live forever! '
