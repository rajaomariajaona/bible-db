document_id: ROM.1,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Paul, a servant of Christ Jesus, called to be an apostle and set apart for the gospel of God— '
  '10':
  - type: text
    content: in my prayers at all times; and I pray that now at last by God’s will the way may be opened for me to come to you.
  '11':
  - type: text
    content: 'I long to see you so that I may impart to you some spiritual gift to make you strong— '
  '12':
  - type: text
    content: 'that is, that you and I may be mutually encouraged by each other’s faith. '
  '13':
  - type: text
    content: I do not want you to be unaware, brothers and sisters,
  - type: note
    content: The Greek word for brothers and sisters (adelphoi) refers here to believers, both men and women, as part of God’s family; also in 7:1, 4; 8:12, 29; 10:1; 11:25; 12:1; 15:14, 30; 16:14, 17.
  - type: text
    content: ' that I planned many times to come to you (but have been prevented from doing so until now) in order that I might have a harvest among you, just as I have had among the other Gentiles.'
  '14':
  - type: text
    content: 'I am obligated both to Greeks and non-Greeks, both to the wise and the foolish. '
  '15':
  - type: text
    content: That is why I am so eager to preach the gospel also to you who are in Rome.
  '16':
  - type: text
    content: 'For I am not ashamed of the gospel, because it is the power of God that brings salvation to everyone who believes: first to the Jew, then to the Gentile. '
  '17':
  - type: text
    content: For in the gospel the righteousness of God is revealed—a righteousness that is by faith from first to last,
  - type: note
    content: Or is from faith to faith
  - type: text
    content: ' just as it is written: “The righteous will live by faith.”'
  - type: note
    content: Hab. 2:4
  - type: heading
    content: God’s Wrath Against Sinful Humanity
  '18':
  - type: text
    content: 'The wrath of God is being revealed from heaven against all the godlessness and wickedness of people, who suppress the truth by their wickedness, '
  '19':
  - type: text
    content: 'since what may be known about God is plain to them, because God has made it plain to them. '
  '2':
  - type: text
    content: 'the gospel he promised beforehand through his prophets in the Holy Scriptures '
  '20':
  - type: text
    content: For since the creation of the world God’s invisible qualities—his eternal power and divine nature—have been clearly seen, being understood from what has been made, so that people are without excuse.
  '21':
  - type: text
    content: 'For although they knew God, they neither glorified him as God nor gave thanks to him, but their thinking became futile and their foolish hearts were darkened. '
  '22':
  - type: text
    content: 'Although they claimed to be wise, they became fools '
  '23':
  - type: text
    content: and exchanged the glory of the immortal God for images made to look like a mortal human being and birds and animals and reptiles.
  '24':
  - type: text
    content: 'Therefore God gave them over in the sinful desires of their hearts to sexual impurity for the degrading of their bodies with one another. '
  '25':
  - type: text
    content: They exchanged the truth about God for a lie, and worshiped and served created things rather than the Creator—who is forever praised. Amen.
  '26':
  - type: text
    content: 'Because of this, God gave them over to shameful lusts. Even their women exchanged natural sexual relations for unnatural ones. '
  '27':
  - type: text
    content: In the same way the men also abandoned natural relations with women and were inflamed with lust for one another. Men committed shameful acts with other men, and received in themselves the due penalty for their error.
  '28':
  - type: text
    content: 'Furthermore, just as they did not think it worthwhile to retain the knowledge of God, so God gave them over to a depraved mind, so that they do what ought not to be done. '
  '29':
  - type: text
    content: 'They have become filled with every kind of wickedness, evil, greed and depravity. They are full of envy, murder, strife, deceit and malice. They are gossips, '
  '3':
  - type: text
    content: regarding his Son, who as to his earthly life
  - type: note
    content: Or who according to the flesh
  - type: text
    content: ' was a descendant of David, '
  '30':
  - type: text
    content: 'slanderers, God-haters, insolent, arrogant and boastful; they invent ways of doing evil; they disobey their parents; '
  '31':
  - type: text
    content: 'they have no understanding, no fidelity, no love, no mercy. '
  '32':
  - type: text
    content: Although they know God’s righteous decree that those who do such things deserve death, they not only continue to do these very things but also approve of those who practice them.
  '4':
  - type: text
    content: and who through the Spirit of holiness was appointed the Son of God in power
  - type: note
    content: Or was declared with power to be the Son of God
  - type: text
    content: ' by his resurrection from the dead: Jesus Christ our Lord. '
  '5':
  - type: text
    content: Through him we received grace and apostleship to call all the Gentiles to the obedience that comes from
  - type: note
    content: Or that is
  - type: text
    content: ' faith for his name’s sake. '
  '6':
  - type: text
    content: And you also are among those Gentiles who are called to belong to Jesus Christ.
  '7':
  - type: text
    content: 'To all in Rome who are loved by God and called to be his holy people:'
  - type: text
    content: Grace and peace to you from God our Father and from the Lord Jesus Christ.
  - type: heading
    content: Paul’s Longing to Visit Rome
  '8':
  - type: text
    content: 'First, I thank my God through Jesus Christ for all of you, because your faith is being reported all over the world. '
  '9':
  - type: text
    content: 'God, whom I serve in my spirit in preaching the gospel of his Son, is my witness how constantly I remember you '
