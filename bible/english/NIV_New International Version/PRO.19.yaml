document_id: PRO.19
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Better the poor whose walk is blameless
- type: usfm
  marker: q2
  children:
  - type: text
    text: than a fool whose lips are perverse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Desire without knowledge is not good—
- type: usfm
  marker: q2
  children:
  - type: text
    text: how much more will hasty feet miss the way!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: A person’s own folly leads to their ruin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'yet their heart rages against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Wealth attracts many friends,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but even the closest friend of the poor person deserts them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: A false witness will not go unpunished,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and whoever pours out lies will not go free.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Many curry favor with a ruler,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and everyone is the friend of one who gives gifts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The poor are shunned by all their relatives—
- type: usfm
  marker: q2
  children:
  - type: text
    text: how much more do their friends avoid them!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Though the poor pursue them with pleading,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are nowhere to be found.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this sentence is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The one who gets wisdom loves life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the one who cherishes understanding will soon prosper.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: A false witness will not go unpunished,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and whoever pours out lies will perish.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: It is not fitting for a fool to live in luxury—
- type: usfm
  marker: q2
  children:
  - type: text
    text: how much worse for a slave to rule over princes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: A person’s wisdom yields patience;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is to one’s glory to overlook an offense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: A king’s rage is like the roar of a lion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but his favor is like dew on the grass.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: A foolish child is a father’s ruin,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a quarrelsome wife is like
- type: usfm
  marker: q2
  children:
  - type: text
    text: the constant dripping of a leaky roof.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Houses and wealth are inherited from parents,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but a prudent wife is from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Laziness brings on deep sleep,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the shiftless go hungry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Whoever keeps commandments keeps their life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but whoever shows contempt for their ways will die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Whoever is kind to the poor lends to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he will reward them for what they have done.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Discipline your children, for in that there is hope;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not be a willing party to their death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: A hot-tempered person must pay the penalty;
- type: usfm
  marker: q2
  children:
  - type: text
    text: rescue them, and you will have to do it again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Listen to advice and accept discipline,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and at the end you will be counted among the wise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Many are the plans in a person’s heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but it is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s purpose that prevails.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: What a person desires is unfailing love
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Greed is a person’s shame
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: better to be poor than a liar.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' leads to life;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: then one rests content, untouched by trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: A sluggard buries his hand in the dish;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will not even bring it back to his mouth!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Flog a mocker, and the simple will learn prudence;
- type: usfm
  marker: q2
  children:
  - type: text
    text: rebuke the discerning, and they will gain knowledge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Whoever robs their father and drives out their mother
- type: usfm
  marker: q2
  children:
  - type: text
    text: is a child who brings shame and disgrace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Stop listening to instruction, my son,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you will stray from the words of knowledge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: A corrupt witness mocks at justice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the mouth of the wicked gulps down evil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Penalties are prepared for mockers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and beatings for the backs of fools.
