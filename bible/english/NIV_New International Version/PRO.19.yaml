document_id: PRO.19,111
type_code: eng
verses:
  '1':
  - type: text
    content: Better the poor whose walk is blameless
  - type: text
    content: than a fool whose lips are perverse.
  '10':
  - type: text
    content: It is not fitting for a fool to live in luxury—
  - type: text
    content: how much worse for a slave to rule over princes!
  '11':
  - type: text
    content: A person’s wisdom yields patience;
  - type: text
    content: it is to one’s glory to overlook an offense.
  '12':
  - type: text
    content: A king’s rage is like the roar of a lion,
  - type: text
    content: but his favor is like dew on the grass.
  '13':
  - type: text
    content: A foolish child is a father’s ruin,
  - type: text
    content: and a quarrelsome wife is like
  - type: text
    content: the constant dripping of a leaky roof.
  '14':
  - type: text
    content: Houses and wealth are inherited from parents,
  - type: text
    content: 'but a prudent wife is from the '
  - type: text
    content: Lord
  - type: text
    content: .
  '15':
  - type: text
    content: Laziness brings on deep sleep,
  - type: text
    content: and the shiftless go hungry.
  '16':
  - type: text
    content: Whoever keeps commandments keeps their life,
  - type: text
    content: but whoever shows contempt for their ways will die.
  '17':
  - type: text
    content: 'Whoever is kind to the poor lends to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and he will reward them for what they have done.
  '18':
  - type: text
    content: Discipline your children, for in that there is hope;
  - type: text
    content: do not be a willing party to their death.
  '19':
  - type: text
    content: A hot-tempered person must pay the penalty;
  - type: text
    content: rescue them, and you will have to do it again.
  '2':
  - type: text
    content: Desire without knowledge is not good—
  - type: text
    content: how much more will hasty feet miss the way!
  '20':
  - type: text
    content: Listen to advice and accept discipline,
  - type: text
    content: and at the end you will be counted among the wise.
  '21':
  - type: text
    content: Many are the plans in a person’s heart,
  - type: text
    content: 'but it is the '
  - type: text
    content: Lord
  - type: text
    content: ’s purpose that prevails.
  '22':
  - type: text
    content: What a person desires is unfailing love
  - type: note
    content: Or Greed is a person’s shame
  - type: text
    content: ;
  - type: text
    content: better to be poor than a liar.
  '23':
  - type: text
    content: 'The fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' leads to life;'
  - type: text
    content: then one rests content, untouched by trouble.
  '24':
  - type: text
    content: A sluggard buries his hand in the dish;
  - type: text
    content: he will not even bring it back to his mouth!
  '25':
  - type: text
    content: Flog a mocker, and the simple will learn prudence;
  - type: text
    content: rebuke the discerning, and they will gain knowledge.
  '26':
  - type: text
    content: Whoever robs their father and drives out their mother
  - type: text
    content: is a child who brings shame and disgrace.
  '27':
  - type: text
    content: Stop listening to instruction, my son,
  - type: text
    content: and you will stray from the words of knowledge.
  '28':
  - type: text
    content: A corrupt witness mocks at justice,
  - type: text
    content: and the mouth of the wicked gulps down evil.
  '29':
  - type: text
    content: Penalties are prepared for mockers,
  - type: text
    content: and beatings for the backs of fools.
  '3':
  - type: text
    content: A person’s own folly leads to their ruin,
  - type: text
    content: 'yet their heart rages against the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: Wealth attracts many friends,
  - type: text
    content: but even the closest friend of the poor person deserts them.
  '5':
  - type: text
    content: A false witness will not go unpunished,
  - type: text
    content: and whoever pours out lies will not go free.
  '6':
  - type: text
    content: Many curry favor with a ruler,
  - type: text
    content: and everyone is the friend of one who gives gifts.
  '7':
  - type: text
    content: The poor are shunned by all their relatives—
  - type: text
    content: how much more do their friends avoid them!
  - type: text
    content: Though the poor pursue them with pleading,
  - type: text
    content: they are nowhere to be found.
  - type: note
    content: The meaning of the Hebrew for this sentence is uncertain.
  '8':
  - type: text
    content: The one who gets wisdom loves life;
  - type: text
    content: the one who cherishes understanding will soon prosper.
  '9':
  - type: text
    content: A false witness will not go unpunished,
  - type: text
    content: and whoever pours out lies will perish.
