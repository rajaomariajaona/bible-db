document_id: 1TI.3
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Qualifications for Overseers and Deacons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Here is a trustworthy saying: Whoever aspires to be an overseer desires a noble task. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Now the overseer is to be above reproach, faithful to his wife, temperate, self-controlled, respectable, hospitable, able to teach, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'not given to drunkenness, not violent but gentle, not quarrelsome, not a lover of money. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He must manage his own family well and see that his children obey him, and he must do so in a manner worthy of full
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: him with proper
    marker-yv: yv-n
  - type: text
    text: ' respect. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '(If anyone does not know how to manage his own family, how can he take care of God’s church?) '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He must not be a recent convert, or he may become conceited and fall under the same judgment as the devil. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He must also have a good reputation with outsiders, so that he will not fall into disgrace and into the devil’s trap.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: In the same way, deacons
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The word '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'deacons '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: refers here to Christians designated to serve with the overseers/elders of the church in a variety of ways; similarly in verse 12; and in Romans 16:1 and Phil. 1:1.
    marker-yv: yv-n
  - type: text
    text: ' are to be worthy of respect, sincere, not indulging in much wine, and not pursuing dishonest gain. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'They must keep hold of the deep truths of the faith with a clear conscience. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They must first be tested; and then if there is nothing against them, let them serve as deacons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: In the same way, the women
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Possibly deacons’ wives or women who are deacons
    marker-yv: yv-n
  - type: text
    text: ' are to be worthy of respect, not malicious talkers but temperate and trustworthy in everything.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'A deacon must be faithful to his wife and must manage his children and his household well. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Those who have served well gain an excellent standing and great assurance in their faith in Christ Jesus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Reasons for Paul’s Instructions
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Although I hope to come to you soon, I am writing you these instructions so that, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'if I am delayed, you will know how people ought to conduct themselves in God’s household, which is the church of the living God, the pillar and foundation of the truth. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Beyond all question, the mystery from which true godliness springs is great:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He appeared in the flesh,
- type: usfm
  marker: q2
  children:
  - type: text
    text: was vindicated by the Spirit,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vindicated in spirit
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: was seen by angels,
- type: usfm
  marker: q2
  children:
  - type: text
    text: was preached among the nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: was believed on in the world,
- type: usfm
  marker: q2
  children:
  - type: text
    text: was taken up in glory.
