document_id: 1TI.3,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Qualifications for Overseers and Deacons
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Here is a trustworthy saying: Whoever aspires to be an overseer desires a noble task. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They must first be tested; and then if there is nothing against them, let them serve as deacons.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the same way, the women
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Possibly deacons’ wives or women who are deacons
      marker-yv: yv-n
    - type: text
      text: ' are to be worthy of respect, not malicious talkers but temperate and trustworthy in everything.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A deacon must be faithful to his wife and must manage his children and his household well. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Those who have served well gain an excellent standing and great assurance in their faith in Christ Jesus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Reasons for Paul’s Instructions
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Although I hope to come to you soon, I am writing you these instructions so that, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'if I am delayed, you will know how people ought to conduct themselves in God’s household, which is the church of the living God, the pillar and foundation of the truth. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beyond all question, the mystery from which true godliness springs is great:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He appeared in the flesh,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: was vindicated by the Spirit,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vindicated in spirit
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: was seen by angels,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: was preached among the nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: was believed on in the world,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: was taken up in glory.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the overseer is to be above reproach, faithful to his wife, temperate, self-controlled, respectable, hospitable, able to teach, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'not given to drunkenness, not violent but gentle, not quarrelsome, not a lover of money. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He must manage his own family well and see that his children obey him, and he must do so in a manner worthy of full
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: him with proper
      marker-yv: yv-n
    - type: text
      text: ' respect. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(If anyone does not know how to manage his own family, how can he take care of God’s church?) '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He must not be a recent convert, or he may become conceited and fall under the same judgment as the devil. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He must also have a good reputation with outsiders, so that he will not fall into disgrace and into the devil’s trap.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the same way, deacons
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The word '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'deacons '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: refers here to Christians designated to serve with the overseers/elders of the church in a variety of ways; similarly in verse 12; and in Romans 16:1 and Phil. 1:1.
      marker-yv: yv-n
    - type: text
      text: ' are to be worthy of respect, sincere, not indulging in much wine, and not pursuing dishonest gain. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They must keep hold of the deep truths of the faith with a clear conscience. '
