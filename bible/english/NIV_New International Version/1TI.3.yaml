document_id: 1TI.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Qualifications for Overseers and Deacons
  - type: text
    content: 'Here is a trustworthy saying: Whoever aspires to be an overseer desires a noble task. '
  '10':
  - type: text
    content: They must first be tested; and then if there is nothing against them, let them serve as deacons.
  '11':
  - type: text
    content: In the same way, the women
  - type: note
    content: Possibly deacons’ wives or women who are deacons
  - type: text
    content: ' are to be worthy of respect, not malicious talkers but temperate and trustworthy in everything.'
  '12':
  - type: text
    content: 'A deacon must be faithful to his wife and must manage his children and his household well. '
  '13':
  - type: text
    content: Those who have served well gain an excellent standing and great assurance in their faith in Christ Jesus.
  - type: heading
    content: Reasons for Paul’s Instructions
  '14':
  - type: text
    content: 'Although I hope to come to you soon, I am writing you these instructions so that, '
  '15':
  - type: text
    content: 'if I am delayed, you will know how people ought to conduct themselves in God’s household, which is the church of the living God, the pillar and foundation of the truth. '
  '16':
  - type: text
    content: 'Beyond all question, the mystery from which true godliness springs is great:'
  - type: text
    content: He appeared in the flesh,
  - type: text
    content: was vindicated by the Spirit,
  - type: note
    content: Or vindicated in spirit
  - type: text
    content: was seen by angels,
  - type: text
    content: was preached among the nations,
  - type: text
    content: was believed on in the world,
  - type: text
    content: was taken up in glory.
  '2':
  - type: text
    content: 'Now the overseer is to be above reproach, faithful to his wife, temperate, self-controlled, respectable, hospitable, able to teach, '
  '3':
  - type: text
    content: 'not given to drunkenness, not violent but gentle, not quarrelsome, not a lover of money. '
  '4':
  - type: text
    content: He must manage his own family well and see that his children obey him, and he must do so in a manner worthy of full
  - type: note
    content: Or him with proper
  - type: text
    content: ' respect. '
  '5':
  - type: text
    content: '(If anyone does not know how to manage his own family, how can he take care of God’s church?) '
  '6':
  - type: text
    content: 'He must not be a recent convert, or he may become conceited and fall under the same judgment as the devil. '
  '7':
  - type: text
    content: He must also have a good reputation with outsiders, so that he will not fall into disgrace and into the devil’s trap.
  '8':
  - type: text
    content: In the same way, deacons
  - type: note
    content: The word deacons refers here to Christians designated to serve with the overseers/elders of the church in a variety of ways; similarly in verse 12; and in Romans 16:1 and Phil. 1:1.
  - type: text
    content: ' are to be worthy of respect, sincere, not indulging in much wine, and not pursuing dishonest gain. '
  '9':
  - type: text
    content: 'They must keep hold of the deep truths of the faith with a clear conscience. '
