document_id: PSA.137
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 137
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: By the rivers of Babylon we sat and wept
- type: usfm
  marker: q2
  children:
  - type: text
    text: when we remembered Zion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: There on the poplars
- type: usfm
  marker: q2
  children:
  - type: text
    text: we hung our harps,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: for there our captors asked us for songs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: our tormentors demanded songs of joy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they said, “Sing us one of the songs of Zion!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'How can we sing the songs of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: while in a foreign land?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: If I forget you, Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: may my right hand forget its skill.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: May my tongue cling to the roof of my mouth
- type: usfm
  marker: q2
  children:
  - type: text
    text: if I do not remember you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: if I do not consider Jerusalem
- type: usfm
  marker: q2
  children:
  - type: text
    text: my highest joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Remember, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', what the Edomites did'
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the day Jerusalem fell.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Tear it down,” they cried,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “tear it down to its foundations!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Daughter Babylon, doomed to destruction,
- type: usfm
  marker: q2
  children:
  - type: text
    text: happy is the one who repays you
- type: usfm
  marker: q2
  children:
  - type: text
    text: according to what you have done to us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Happy is the one who seizes your infants
- type: usfm
  marker: q2
  children:
  - type: text
    text: and dashes them against the rocks.
