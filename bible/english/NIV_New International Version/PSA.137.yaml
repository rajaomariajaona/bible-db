document_id: PSA.137,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 137
  - type: text
    content: By the rivers of Babylon we sat and wept
  - type: text
    content: when we remembered Zion.
  '2':
  - type: text
    content: There on the poplars
  - type: text
    content: we hung our harps,
  '3':
  - type: text
    content: for there our captors asked us for songs,
  - type: text
    content: our tormentors demanded songs of joy;
  - type: text
    content: they said, “Sing us one of the songs of Zion!”
  '4':
  - type: text
    content: 'How can we sing the songs of the '
  - type: text
    content: Lord
  - type: text
    content: while in a foreign land?
  '5':
  - type: text
    content: If I forget you, Jerusalem,
  - type: text
    content: may my right hand forget its skill.
  '6':
  - type: text
    content: May my tongue cling to the roof of my mouth
  - type: text
    content: if I do not remember you,
  - type: text
    content: if I do not consider Jerusalem
  - type: text
    content: my highest joy.
  '7':
  - type: text
    content: 'Remember, '
  - type: text
    content: Lord
  - type: text
    content: ', what the Edomites did'
  - type: text
    content: on the day Jerusalem fell.
  - type: text
    content: “Tear it down,” they cried,
  - type: text
    content: “tear it down to its foundations!”
  '8':
  - type: text
    content: Daughter Babylon, doomed to destruction,
  - type: text
    content: happy is the one who repays you
  - type: text
    content: according to what you have done to us.
  '9':
  - type: text
    content: Happy is the one who seizes your infants
  - type: text
    content: and dashes them against the rocks.
