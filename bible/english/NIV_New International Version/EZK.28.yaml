document_id: EZK.28,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Prophecy Against the King of Tyre
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to me: '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: You will die the death of the uncircumcised
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the hands of foreigners.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'I have spoken, declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .’ ”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to me: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '“Son of man, take up a lament concerning the king of Tyre and say to him: ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘You were the seal of perfection,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: full of wisdom and perfect in beauty.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: You were in Eden,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the garden of God;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'every precious stone adorned you:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: carnelian, chrysolite and emerald,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: topaz, onyx and jasper,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lapis lazuli, turquoise and beryl.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The precise identification of some of these precious stones is uncertain.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your settings and mountings
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this phrase is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' were made of gold;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the day you were created they were prepared.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: You were anointed as a guardian cherub,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for so I ordained you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You were on the holy mount of God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you walked among the fiery stones.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: You were blameless in your ways
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the day you were created
  - type: usfm
    marker: q2
    children:
    - type: text
      text: till wickedness was found in you.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Through your widespread trade
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you were filled with violence,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you sinned.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I drove you in disgrace from the mount of God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I expelled you, guardian cherub,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from among the fiery stones.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Your heart became proud
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on account of your beauty,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and you corrupted your wisdom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of your splendor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I threw you to the earth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I made a spectacle of you before kings.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: By your many sins and dishonest trade
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have desecrated your sanctuaries.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I made a fire come out from you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and it consumed you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I reduced you to ashes on the ground
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the sight of all who were watching.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: All the nations who knew you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are appalled at you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you have come to a horrible end
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will be no more.’ ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Prophecy Against Sidon
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Son of man, say to the ruler of Tyre, ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘In the pride of your heart
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you say, “I am a god;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I sit on the throne of a god
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the heart of the seas.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you are a mere mortal and not a god,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though you think you are as wise as a god.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to me: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“Son of man, set your face against Sidon; prophesy against her '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'and say: ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘I am against you, Sidon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and among you I will display my glory.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I inflict punishment on you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and within you am proved to be holy.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: I will send a plague upon you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make blood flow in your streets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The slain will fall within you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with the sword against you on every side.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then you will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '“ ‘No longer will the people of Israel have malicious neighbors who are painful briers and sharp thorns. Then they will know that I am the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '“ ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: When I gather the people of Israel from the nations where they have been scattered, I will be proved holy through them in the sight of the nations. Then they will live in their own land, which I gave to my servant Jacob. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'They will live there in safety and will build houses and plant vineyards; they will live in safety when I inflict punishment on all their neighbors who maligned them. Then they will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God.’ ”'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Are you wiser than Daniel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Danel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a man of renown in ancient literature'
      marker-yv: yv-n
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Is no secret hidden from you?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: By your wisdom and understanding
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have gained wealth for yourself
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and amassed gold and silver
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in your treasuries.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: By your great skill in trading
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have increased your wealth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and because of your wealth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your heart has grown proud.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“ ‘Therefore this is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘Because you think you are wise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as wise as a god,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: I am going to bring foreigners against you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the most ruthless of nations;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will draw their swords against your beauty and wisdom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and pierce your shining splendor.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: They will bring you down to the pit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will die a violent death
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the heart of the seas.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Will you then say, “I am a god,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the presence of those who kill you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will be but a mortal, not a god,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the hands of those who slay you.
