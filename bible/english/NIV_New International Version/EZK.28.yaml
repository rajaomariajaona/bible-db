document_id: EZK.28,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prophecy Against the King of Tyre
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: You will die the death of the uncircumcised
  - type: text
    content: at the hands of foreigners.
  - type: text
    content: 'I have spoken, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  '11':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '12':
  - type: text
    content: '“Son of man, take up a lament concerning the king of Tyre and say to him: ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘You were the seal of perfection,
  - type: text
    content: full of wisdom and perfect in beauty.
  '13':
  - type: text
    content: You were in Eden,
  - type: text
    content: the garden of God;
  - type: text
    content: 'every precious stone adorned you:'
  - type: text
    content: carnelian, chrysolite and emerald,
  - type: text
    content: topaz, onyx and jasper,
  - type: text
    content: lapis lazuli, turquoise and beryl.
  - type: note
    content: The precise identification of some of these precious stones is uncertain.
  - type: text
    content: Your settings and mountings
  - type: note
    content: The meaning of the Hebrew for this phrase is uncertain.
  - type: text
    content: ' were made of gold;'
  - type: text
    content: on the day you were created they were prepared.
  '14':
  - type: text
    content: You were anointed as a guardian cherub,
  - type: text
    content: for so I ordained you.
  - type: text
    content: You were on the holy mount of God;
  - type: text
    content: you walked among the fiery stones.
  '15':
  - type: text
    content: You were blameless in your ways
  - type: text
    content: from the day you were created
  - type: text
    content: till wickedness was found in you.
  '16':
  - type: text
    content: Through your widespread trade
  - type: text
    content: you were filled with violence,
  - type: text
    content: and you sinned.
  - type: text
    content: So I drove you in disgrace from the mount of God,
  - type: text
    content: and I expelled you, guardian cherub,
  - type: text
    content: from among the fiery stones.
  '17':
  - type: text
    content: Your heart became proud
  - type: text
    content: on account of your beauty,
  - type: text
    content: and you corrupted your wisdom
  - type: text
    content: because of your splendor.
  - type: text
    content: So I threw you to the earth;
  - type: text
    content: I made a spectacle of you before kings.
  '18':
  - type: text
    content: By your many sins and dishonest trade
  - type: text
    content: you have desecrated your sanctuaries.
  - type: text
    content: So I made a fire come out from you,
  - type: text
    content: and it consumed you,
  - type: text
    content: and I reduced you to ashes on the ground
  - type: text
    content: in the sight of all who were watching.
  '19':
  - type: text
    content: All the nations who knew you
  - type: text
    content: are appalled at you;
  - type: text
    content: you have come to a horrible end
  - type: text
    content: and will be no more.’ ”
  - type: heading
    content: A Prophecy Against Sidon
  '2':
  - type: text
    content: '“Son of man, say to the ruler of Tyre, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘In the pride of your heart
  - type: text
    content: you say, “I am a god;
  - type: text
    content: I sit on the throne of a god
  - type: text
    content: in the heart of the seas.”
  - type: text
    content: But you are a mere mortal and not a god,
  - type: text
    content: though you think you are as wise as a god.
  '20':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '21':
  - type: text
    content: '“Son of man, set your face against Sidon; prophesy against her '
  '22':
  - type: text
    content: 'and say: ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘I am against you, Sidon,
  - type: text
    content: and among you I will display my glory.
  - type: text
    content: 'You will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: when I inflict punishment on you
  - type: text
    content: and within you am proved to be holy.
  '23':
  - type: text
    content: I will send a plague upon you
  - type: text
    content: and make blood flow in your streets.
  - type: text
    content: The slain will fall within you,
  - type: text
    content: with the sword against you on every side.
  - type: text
    content: 'Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '24':
  - type: text
    content: '“ ‘No longer will the people of Israel have malicious neighbors who are painful briers and sharp thorns. Then they will know that I am the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '25':
  - type: text
    content: '“ ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: When I gather the people of Israel from the nations where they have been scattered, I will be proved holy through them in the sight of the nations. Then they will live in their own land, which I gave to my servant Jacob. '
  '26':
  - type: text
    content: 'They will live there in safety and will build houses and plant vineyards; they will live in safety when I inflict punishment on all their neighbors who maligned them. Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' their God.’ ”'
  '3':
  - type: text
    content: Are you wiser than Daniel
  - type: note
    content: Or Danel, a man of renown in ancient literature
  - type: text
    content: '?'
  - type: text
    content: Is no secret hidden from you?
  '4':
  - type: text
    content: By your wisdom and understanding
  - type: text
    content: you have gained wealth for yourself
  - type: text
    content: and amassed gold and silver
  - type: text
    content: in your treasuries.
  '5':
  - type: text
    content: By your great skill in trading
  - type: text
    content: you have increased your wealth,
  - type: text
    content: and because of your wealth
  - type: text
    content: your heart has grown proud.
  '6':
  - type: text
    content: '“ ‘Therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘Because you think you are wise,
  - type: text
    content: as wise as a god,
  '7':
  - type: text
    content: I am going to bring foreigners against you,
  - type: text
    content: the most ruthless of nations;
  - type: text
    content: they will draw their swords against your beauty and wisdom
  - type: text
    content: and pierce your shining splendor.
  '8':
  - type: text
    content: They will bring you down to the pit,
  - type: text
    content: and you will die a violent death
  - type: text
    content: in the heart of the seas.
  '9':
  - type: text
    content: Will you then say, “I am a god,”
  - type: text
    content: in the presence of those who kill you?
  - type: text
    content: You will be but a mortal, not a god,
  - type: text
    content: in the hands of those who slay you.
