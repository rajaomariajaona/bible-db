document_id: HOS.9,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Punishment for Israel
  - type: text
    content: Do not rejoice, Israel;
  - type: text
    content: do not be jubilant like the other nations.
  - type: text
    content: For you have been unfaithful to your God;
  - type: text
    content: you love the wages of a prostitute
  - type: text
    content: at every threshing floor.
  '10':
  - type: text
    content: “When I found Israel,
  - type: text
    content: it was like finding grapes in the desert;
  - type: text
    content: when I saw your ancestors,
  - type: text
    content: it was like seeing the early fruit on the fig tree.
  - type: text
    content: But when they came to Baal Peor,
  - type: text
    content: they consecrated themselves to that shameful idol
  - type: text
    content: and became as vile as the thing they loved.
  '11':
  - type: text
    content: Ephraim’s glory will fly away like a bird—
  - type: text
    content: no birth, no pregnancy, no conception.
  '12':
  - type: text
    content: Even if they rear children,
  - type: text
    content: I will bereave them of every one.
  - type: text
    content: Woe to them
  - type: text
    content: when I turn away from them!
  '13':
  - type: text
    content: I have seen Ephraim, like Tyre,
  - type: text
    content: planted in a pleasant place.
  - type: text
    content: But Ephraim will bring out
  - type: text
    content: their children to the slayer.”
  '14':
  - type: text
    content: 'Give them, '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: text
    content: what will you give them?
  - type: text
    content: Give them wombs that miscarry
  - type: text
    content: and breasts that are dry.
  '15':
  - type: text
    content: “Because of all their wickedness in Gilgal,
  - type: text
    content: I hated them there.
  - type: text
    content: Because of their sinful deeds,
  - type: text
    content: I will drive them out of my house.
  - type: text
    content: I will no longer love them;
  - type: text
    content: all their leaders are rebellious.
  '16':
  - type: text
    content: Ephraim is blighted,
  - type: text
    content: their root is withered,
  - type: text
    content: they yield no fruit.
  - type: text
    content: Even if they bear children,
  - type: text
    content: I will slay their cherished offspring.”
  '17':
  - type: text
    content: My God will reject them
  - type: text
    content: because they have not obeyed him;
  - type: text
    content: they will be wanderers among the nations.
  '2':
  - type: text
    content: Threshing floors and winepresses will not feed the people;
  - type: text
    content: the new wine will fail them.
  '3':
  - type: text
    content: 'They will not remain in the '
  - type: text
    content: Lord
  - type: text
    content: ’s land;
  - type: text
    content: Ephraim will return to Egypt
  - type: text
    content: and eat unclean food in Assyria.
  '4':
  - type: text
    content: 'They will not pour out wine offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: nor will their sacrifices please him.
  - type: text
    content: Such sacrifices will be to them like the bread of mourners;
  - type: text
    content: all who eat them will be unclean.
  - type: text
    content: This food will be for themselves;
  - type: text
    content: 'it will not come into the temple of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: What will you do on the day of your appointed festivals,
  - type: text
    content: 'on the feast days of the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  '6':
  - type: text
    content: Even if they escape from destruction,
  - type: text
    content: Egypt will gather them,
  - type: text
    content: and Memphis will bury them.
  - type: text
    content: Their treasures of silver will be taken over by briers,
  - type: text
    content: and thorns will overrun their tents.
  '7':
  - type: text
    content: The days of punishment are coming,
  - type: text
    content: the days of reckoning are at hand.
  - type: text
    content: Let Israel know this.
  - type: text
    content: Because your sins are so many
  - type: text
    content: and your hostility so great,
  - type: text
    content: the prophet is considered a fool,
  - type: text
    content: the inspired person a maniac.
  '8':
  - type: text
    content: The prophet, along with my God,
  - type: text
    content: is the watchman over Ephraim,
  - type: note
    content: Or The prophet is the watchman over Ephraim, / the people of my God
  - type: text
    content: yet snares await him on all his paths,
  - type: text
    content: and hostility in the house of his God.
  '9':
  - type: text
    content: They have sunk deep into corruption,
  - type: text
    content: as in the days of Gibeah.
  - type: text
    content: God will remember their wickedness
  - type: text
    content: and punish them for their sins.
