document_id: HOS.9,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Punishment for Israel
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not rejoice, Israel;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not be jubilant like the other nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you have been unfaithful to your God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you love the wages of a prostitute
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at every threshing floor.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “When I found Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it was like finding grapes in the desert;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when I saw your ancestors,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it was like seeing the early fruit on the fig tree.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when they came to Baal Peor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they consecrated themselves to that shameful idol
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and became as vile as the thing they loved.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim’s glory will fly away like a bird—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no birth, no pregnancy, no conception.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even if they rear children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will bereave them of every one.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I turn away from them!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have seen Ephraim, like Tyre,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: planted in a pleasant place.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But Ephraim will bring out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their children to the slayer.”
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Give them, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what will you give them?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Give them wombs that miscarry
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and breasts that are dry.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because of all their wickedness in Gilgal,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I hated them there.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of their sinful deeds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will drive them out of my house.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will no longer love them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all their leaders are rebellious.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraim is blighted,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their root is withered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they yield no fruit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even if they bear children,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will slay their cherished offspring.”
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My God will reject them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because they have not obeyed him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will be wanderers among the nations.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Threshing floors and winepresses will not feed the people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the new wine will fail them.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They will not remain in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s land;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Ephraim will return to Egypt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and eat unclean food in Assyria.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They will not pour out wine offerings to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor will their sacrifices please him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Such sacrifices will be to them like the bread of mourners;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all who eat them will be unclean.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This food will be for themselves;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'it will not come into the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What will you do on the day of your appointed festivals,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'on the feast days of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even if they escape from destruction,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Egypt will gather them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Memphis will bury them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their treasures of silver will be taken over by briers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and thorns will overrun their tents.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The days of punishment are coming,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the days of reckoning are at hand.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let Israel know this.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because your sins are so many
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your hostility so great,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the prophet is considered a fool,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the inspired person a maniac.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The prophet, along with my God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is the watchman over Ephraim,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: The prophet is the watchman over Ephraim, / the people of my God
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yet snares await him on all his paths,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hostility in the house of his God.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have sunk deep into corruption,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as in the days of Gibeah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God will remember their wickedness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and punish them for their sins.
