document_id: 2KI.18
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hezekiah King of Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the third year of Hoshea son of Elah king of Israel, Hezekiah son of Ahaz king of Judah began to reign. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He was twenty-five years old when he became king, and he reigned in Jerusalem twenty-nine years. His mother’s name was Abijah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Abi, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Abijah
    marker-yv: yv-n
  - type: text
    text: ' daughter of Zechariah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He did what was right in the eyes of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', just as his father David had done. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He removed the high places, smashed the sacred stones and cut down the Asherah poles. He broke into pieces the bronze snake Moses had made, for up to that time the Israelites had been burning incense to it. (It was called Nehushtan.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Nehushtan '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sounds like the Hebrew for both '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'bronze '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'and '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: snake
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: )
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hezekiah trusted in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel. There was no one like him among all the kings of Judah, either before him or after him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He held fast to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and did not stop following him; he kept the commands the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had given Moses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was with him; he was successful in whatever he undertook. He rebelled against the king of Assyria and did not serve him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: From watchtower to fortified city, he defeated the Philistines, as far as Gaza and its territory.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'In King Hezekiah’s fourth year, which was the seventh year of Hoshea son of Elah king of Israel, Shalmaneser king of Assyria marched against Samaria and laid siege to it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'At the end of three years the Assyrians took it. So Samaria was captured in Hezekiah’s sixth year, which was the ninth year of Hoshea king of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The king of Assyria deported Israel to Assyria and settled them in Halah, in Gozan on the Habor River and in towns of the Medes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'This happened because they had not obeyed the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God, but had violated his covenant—all that Moses the servant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' commanded. They neither listened to the commands nor carried them out.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'In the fourteenth year of King Hezekiah’s reign, Sennacherib king of Assyria attacked all the fortified cities of Judah and captured them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'So Hezekiah king of Judah sent this message to the king of Assyria at Lachish: “I have done wrong. Withdraw from me, and I will pay whatever you demand of me.” The king of Assyria exacted from Hezekiah king of Judah three hundred talents'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 11 tons or about 10 metric tons
    marker-yv: yv-n
  - type: text
    text: ' of silver and thirty talents'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 1 ton or about 1 metric ton
    marker-yv: yv-n
  - type: text
    text: ' of gold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So Hezekiah gave him all the silver that was found in the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and in the treasuries of the royal palace.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'At this time Hezekiah king of Judah stripped off the gold with which he had covered the doors and doorposts of the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and gave it to the king of Assyria.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sennacherib Threatens Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The king of Assyria sent his supreme commander, his chief officer and his field commander with a large army, from Lachish to King Hezekiah at Jerusalem. They came up to Jerusalem and stopped at the aqueduct of the Upper Pool, on the road to the Washerman’s Field. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: They called for the king; and Eliakim son of Hilkiah the palace administrator, Shebna the secretary, and Joah son of Asaph the recorder went out to them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The field commander said to them, “Tell Hezekiah:'
- type: usfm
  marker: pm
  children:
  - type: text
    text: '“ ‘This is what the great king, the king of Assyria, says: On what are you basing this confidence of yours? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'You say you have the counsel and the might for war—but you speak only empty words. On whom are you depending, that you rebel against me? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Look, I know you are depending on Egypt, that splintered reed of a staff, which pierces the hand of anyone who leans on it! Such is Pharaoh king of Egypt to all who depend on him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But if you say to me, “We are depending on the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God”—isn’t he the one whose high places and altars Hezekiah removed, saying to Judah and Jerusalem, “You must worship before this altar in Jerusalem”?'
- type: usfm
  marker: pm
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '“ ‘Come now, make a bargain with my master, the king of Assyria: I will give you two thousand horses—if you can put riders on them! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: How can you repulse one officer of the least of my master’s officials, even though you are depending on Egypt for chariots and horsemen
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: charioteers
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Furthermore, have I come to attack and destroy this place without word from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '? The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' himself told me to march against this country and destroy it.’ ”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Then Eliakim son of Hilkiah, and Shebna and Joah said to the field commander, “Please speak to your servants in Aramaic, since we understand it. Don’t speak to us in Hebrew in the hearing of the people on the wall.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: But the commander replied, “Was it only to your master and you that my master sent me to say these things, and not to the people sitting on the wall—who, like you, will have to eat their own excrement and drink their own urine?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then the commander stood and called out in Hebrew, “Hear the word of the great king, the king of Assyria! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'This is what the king says: Do not let Hezekiah deceive you. He cannot deliver you from my hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Do not let Hezekiah persuade you to trust in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' when he says, ‘The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will surely deliver us; this city will not be given into the hand of the king of Assyria.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“Do not listen to Hezekiah. This is what the king of Assyria says: Make peace with me and come out to me. Then each of you will eat fruit from your own vine and fig tree and drink water from your own cistern, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: until I come and take you to a land like your own—a land of grain and new wine, a land of bread and vineyards, a land of olive trees and honey. Choose life and not death!
- type: usfm
  marker: p
  children:
  - type: text
    text: '“Do not listen to Hezekiah, for he is misleading you when he says, ‘The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will deliver us.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Has the god of any nation ever delivered his land from the hand of the king of Assyria? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Where are the gods of Hamath and Arpad? Where are the gods of Sepharvaim, Hena and Ivvah? Have they rescued Samaria from my hand? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Who of all the gods of these countries has been able to save his land from me? How then can the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' deliver Jerusalem from my hand?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: But the people remained silent and said nothing in reply, because the king had commanded, “Do not answer him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Then Eliakim son of Hilkiah the palace administrator, Shebna the secretary, and Joah son of Asaph the recorder went to Hezekiah, with their clothes torn, and told him what the field commander had said.
