document_id: 2KI.18,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Hezekiah King of Judah
  - type: text
    content: 'In the third year of Hoshea son of Elah king of Israel, Hezekiah son of Ahaz king of Judah began to reign. '
  '10':
  - type: text
    content: 'At the end of three years the Assyrians took it. So Samaria was captured in Hezekiah’s sixth year, which was the ninth year of Hoshea king of Israel. '
  '11':
  - type: text
    content: 'The king of Assyria deported Israel to Assyria and settled them in Halah, in Gozan on the Habor River and in towns of the Medes. '
  '12':
  - type: text
    content: 'This happened because they had not obeyed the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, but had violated his covenant—all that Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded. They neither listened to the commands nor carried them out.'
  '13':
  - type: text
    content: 'In the fourteenth year of King Hezekiah’s reign, Sennacherib king of Assyria attacked all the fortified cities of Judah and captured them. '
  '14':
  - type: text
    content: 'So Hezekiah king of Judah sent this message to the king of Assyria at Lachish: “I have done wrong. Withdraw from me, and I will pay whatever you demand of me.” The king of Assyria exacted from Hezekiah king of Judah three hundred talents'
  - type: note
    content: That is, about 11 tons or about 10 metric tons
  - type: text
    content: ' of silver and thirty talents'
  - type: note
    content: That is, about 1 ton or about 1 metric ton
  - type: text
    content: ' of gold. '
  '15':
  - type: text
    content: 'So Hezekiah gave him all the silver that was found in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and in the treasuries of the royal palace.'
  '16':
  - type: text
    content: 'At this time Hezekiah king of Judah stripped off the gold with which he had covered the doors and doorposts of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', and gave it to the king of Assyria.'
  - type: heading
    content: Sennacherib Threatens Jerusalem
  '17':
  - type: text
    content: 'The king of Assyria sent his supreme commander, his chief officer and his field commander with a large army, from Lachish to King Hezekiah at Jerusalem. They came up to Jerusalem and stopped at the aqueduct of the Upper Pool, on the road to the Washerman’s Field. '
  '18':
  - type: text
    content: They called for the king; and Eliakim son of Hilkiah the palace administrator, Shebna the secretary, and Joah son of Asaph the recorder went out to them.
  '19':
  - type: text
    content: 'The field commander said to them, “Tell Hezekiah:'
  - type: text
    content: '“ ‘This is what the great king, the king of Assyria, says: On what are you basing this confidence of yours? '
  '2':
  - type: text
    content: He was twenty-five years old when he became king, and he reigned in Jerusalem twenty-nine years. His mother’s name was Abijah
  - type: note
    content: Hebrew Abi, a variant of Abijah
  - type: text
    content: ' daughter of Zechariah. '
  '20':
  - type: text
    content: 'You say you have the counsel and the might for war—but you speak only empty words. On whom are you depending, that you rebel against me? '
  '21':
  - type: text
    content: 'Look, I know you are depending on Egypt, that splintered reed of a staff, which pierces the hand of anyone who leans on it! Such is Pharaoh king of Egypt to all who depend on him. '
  '22':
  - type: text
    content: 'But if you say to me, “We are depending on the '
  - type: text
    content: Lord
  - type: text
    content: ' our God”—isn’t he the one whose high places and altars Hezekiah removed, saying to Judah and Jerusalem, “You must worship before this altar in Jerusalem”?'
  '23':
  - type: text
    content: '“ ‘Come now, make a bargain with my master, the king of Assyria: I will give you two thousand horses—if you can put riders on them! '
  '24':
  - type: text
    content: How can you repulse one officer of the least of my master’s officials, even though you are depending on Egypt for chariots and horsemen
  - type: note
    content: Or charioteers
  - type: text
    content: '? '
  '25':
  - type: text
    content: 'Furthermore, have I come to attack and destroy this place without word from the '
  - type: text
    content: Lord
  - type: text
    content: '? The '
  - type: text
    content: Lord
  - type: text
    content: ' himself told me to march against this country and destroy it.’ ”'
  '26':
  - type: text
    content: Then Eliakim son of Hilkiah, and Shebna and Joah said to the field commander, “Please speak to your servants in Aramaic, since we understand it. Don’t speak to us in Hebrew in the hearing of the people on the wall.”
  '27':
  - type: text
    content: But the commander replied, “Was it only to your master and you that my master sent me to say these things, and not to the people sitting on the wall—who, like you, will have to eat their own excrement and drink their own urine?”
  '28':
  - type: text
    content: 'Then the commander stood and called out in Hebrew, “Hear the word of the great king, the king of Assyria! '
  '29':
  - type: text
    content: 'This is what the king says: Do not let Hezekiah deceive you. He cannot deliver you from my hand. '
  '3':
  - type: text
    content: 'He did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', just as his father David had done. '
  '30':
  - type: text
    content: 'Do not let Hezekiah persuade you to trust in the '
  - type: text
    content: Lord
  - type: text
    content: ' when he says, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' will surely deliver us; this city will not be given into the hand of the king of Assyria.’'
  '31':
  - type: text
    content: '“Do not listen to Hezekiah. This is what the king of Assyria says: Make peace with me and come out to me. Then each of you will eat fruit from your own vine and fig tree and drink water from your own cistern, '
  '32':
  - type: text
    content: until I come and take you to a land like your own—a land of grain and new wine, a land of bread and vineyards, a land of olive trees and honey. Choose life and not death!
  - type: text
    content: '“Do not listen to Hezekiah, for he is misleading you when he says, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' will deliver us.’ '
  '33':
  - type: text
    content: 'Has the god of any nation ever delivered his land from the hand of the king of Assyria? '
  '34':
  - type: text
    content: 'Where are the gods of Hamath and Arpad? Where are the gods of Sepharvaim, Hena and Ivvah? Have they rescued Samaria from my hand? '
  '35':
  - type: text
    content: 'Who of all the gods of these countries has been able to save his land from me? How then can the '
  - type: text
    content: Lord
  - type: text
    content: ' deliver Jerusalem from my hand?”'
  '36':
  - type: text
    content: But the people remained silent and said nothing in reply, because the king had commanded, “Do not answer him.”
  '37':
  - type: text
    content: Then Eliakim son of Hilkiah the palace administrator, Shebna the secretary, and Joah son of Asaph the recorder went to Hezekiah, with their clothes torn, and told him what the field commander had said.
  '4':
  - type: text
    content: He removed the high places, smashed the sacred stones and cut down the Asherah poles. He broke into pieces the bronze snake Moses had made, for up to that time the Israelites had been burning incense to it. (It was called Nehushtan.
  - type: note
    content: Nehushtan sounds like the Hebrew for both bronze and snake.
  - type: text
    content: )
  '5':
  - type: text
    content: 'Hezekiah trusted in the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. There was no one like him among all the kings of Judah, either before him or after him. '
  '6':
  - type: text
    content: 'He held fast to the '
  - type: text
    content: Lord
  - type: text
    content: ' and did not stop following him; he kept the commands the '
  - type: text
    content: Lord
  - type: text
    content: ' had given Moses. '
  '7':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' was with him; he was successful in whatever he undertook. He rebelled against the king of Assyria and did not serve him. '
  '8':
  - type: text
    content: From watchtower to fortified city, he defeated the Philistines, as far as Gaza and its territory.
  '9':
  - type: text
    content: 'In King Hezekiah’s fourth year, which was the seventh year of Hoshea son of Elah king of Israel, Shalmaneser king of Assyria marched against Samaria and laid siege to it. '
