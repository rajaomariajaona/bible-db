      marker-yv: yv-n
    - type: text
      text: ' have shown great kindness to me in sparing my life. But I can’t flee to the mountains; this disaster will overtake me, and I’ll die. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “My lords,” he said, “please turn aside to your servant’s house. You can wash your feet and spend the night and then go on your way early in the morning.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “No,” they answered, “we will spend the night in the square.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Look, here is a town near enough to run to, and it is small. Let me flee to it—it is very small, isn’t it? Then my life will be spared.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to him, “Very well, I will grant this request too; I will not overthrow the town you speak of. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But flee there quickly, because I cannot do anything until you reach it.” (That is why the town was called Zoar.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Zoar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: small.
      marker-yv: yv-n
    - type: text
      text: )
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'By the time Lot reached Zoar, the sun had risen over the land. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' rained down burning sulfur on Sodom and Gomorrah—from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' out of the heavens. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thus he overthrew those cities and the entire plain, destroying all those living in the cities—and also the vegetation in the land. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Lot’s wife looked back, and she became a pillar of salt.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Early the next morning Abraham got up and returned to the place where he had stood before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He looked down toward Sodom and Gomorrah, toward all the land of the plain, and he saw dense smoke rising from the land, like smoke from a furnace.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So when God destroyed the cities of the plain, he remembered Abraham, and he brought Lot out of the catastrophe that overthrew the cities where Lot had lived.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lot and His Daughters
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he insisted so strongly that they did go with him and entered his house. He prepared a meal for them, baking bread without yeast, and they ate. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lot and his two daughters left Zoar and settled in the mountains, for he was afraid to stay in Zoar. He and his two daughters lived in a cave. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One day the older daughter said to the younger, “Our father is old, and there is no man around here to give us children—as is the custom all over the earth. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Let’s get our father to drink wine and then sleep with him and preserve our family line through our father.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That night they got their father to drink wine, and the older daughter went in and slept with him. He was not aware of it when she lay down or when she got up.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The next day the older daughter said to the younger, “Last night I slept with my father. Let’s get him to drink wine again tonight, and you go in and sleep with him so we can preserve our family line through our father.” '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they got their father to drink wine that night also, and the younger daughter went in and slept with him. Again he was not aware of it when she lay down or when she got up.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So both of Lot’s daughters became pregnant by their father. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The older daughter had a son, and she named him Moab
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:37 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Moab '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sounds like the Hebrew for '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from father.
      marker-yv: yv-n
    - type: text
      text: '; he is the father of the Moabites of today. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The younger daughter also had a son, and she named him Ben-Ammi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:38 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ben-Ammi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son of my father’s people.
      marker-yv: yv-n
    - type: text
      text: ; he is the father of the Ammonites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Bene-Ammon
      marker-yv: yv-n
    - type: text
      text: ' of today.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Before they had gone to bed, all the men from every part of the city of Sodom—both young and old—surrounded the house. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They called to Lot, “Where are the men who came to you tonight? Bring them out to us so that we can have sex with them.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lot went outside to meet them and shut the door behind him '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said, “No, my friends. Don’t do this wicked thing. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Look, I have two daughters who have never slept with a man. Let me bring them out to you, and you can do what you like with them. But don’t do anything to these men, for they have come under the protection of my roof.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Get out of our way,” they replied. “This fellow came here as a foreigner, and now he wants to play the judge! We’ll treat you worse than them.” They kept bringing pressure on Lot and moved forward to break down the door.
