      text: Sodom and Gomorrah Destroyed
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The two angels arrived at Sodom in the evening, and Lot was sitting in the gateway of the city. When he saw them, he got up to meet them and bowed down with his face to the ground. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the men inside reached out and pulled Lot back into the house and shut the door. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then they struck the men who were at the door of the house, young and old, with blindness so that they could not find the door.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The two men said to Lot, “Do you have anyone else here—sons-in-law, sons or daughters, or anyone else in the city who belongs to you? Get them out of here, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'because we are going to destroy this place. The outcry to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' against its people is so great that he has sent us to destroy it.”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Lot went out and spoke to his sons-in-law, who were pledged to marry
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: were married to
      marker-yv: yv-n
    - type: text
      text: ' his daughters. He said, “Hurry and get out of this place, because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is about to destroy the city!” But his sons-in-law thought he was joking.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: With the coming of dawn, the angels urged Lot, saying, “Hurry! Take your wife and your two daughters who are here, or you will be swept away when the city is punished.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he hesitated, the men grasped his hand and the hands of his wife and of his two daughters and led them safely out of the city, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was merciful to them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As soon as they had brought them out, one of them said, “Flee for your lives! Don’t look back, and don’t stop anywhere in the plain! Flee to the mountains or you will be swept away!”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Lot said to them, “No, my lords,
