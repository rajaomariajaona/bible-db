document_id: GEN.19,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Sodom and Gomorrah Destroyed
  - type: text
    content: 'The two angels arrived at Sodom in the evening, and Lot was sitting in the gateway of the city. When he saw them, he got up to meet them and bowed down with his face to the ground. '
  '10':
  - type: text
    content: 'But the men inside reached out and pulled Lot back into the house and shut the door. '
  '11':
  - type: text
    content: Then they struck the men who were at the door of the house, young and old, with blindness so that they could not find the door.
  '12':
  - type: text
    content: 'The two men said to Lot, “Do you have anyone else here—sons-in-law, sons or daughters, or anyone else in the city who belongs to you? Get them out of here, '
  '13':
  - type: text
    content: 'because we are going to destroy this place. The outcry to the '
  - type: text
    content: Lord
  - type: text
    content: ' against its people is so great that he has sent us to destroy it.”'
  '14':
  - type: text
    content: So Lot went out and spoke to his sons-in-law, who were pledged to marry
  - type: note
    content: Or were married to
  - type: text
    content: ' his daughters. He said, “Hurry and get out of this place, because the '
  - type: text
    content: Lord
  - type: text
    content: ' is about to destroy the city!” But his sons-in-law thought he was joking.'
  '15':
  - type: text
    content: With the coming of dawn, the angels urged Lot, saying, “Hurry! Take your wife and your two daughters who are here, or you will be swept away when the city is punished.”
  '16':
  - type: text
    content: 'When he hesitated, the men grasped his hand and the hands of his wife and of his two daughters and led them safely out of the city, for the '
  - type: text
    content: Lord
  - type: text
    content: ' was merciful to them. '
  '17':
  - type: text
    content: As soon as they had brought them out, one of them said, “Flee for your lives! Don’t look back, and don’t stop anywhere in the plain! Flee to the mountains or you will be swept away!”
  '18':
  - type: text
    content: But Lot said to them, “No, my lords,
  - type: note
    content: Or No, Lord; or No, my lord
  - type: text
    content: ' please! '
  '19':
  - type: text
    content: Your
  - type: note
    content: The Hebrew is singular.
  - type: text
    content: ' servant has found favor in your'
  - type: note
    content: The Hebrew is singular.
  - type: text
    content: ' eyes, and you'
  - type: note
    content: The Hebrew is singular.
  - type: text
    content: ' have shown great kindness to me in sparing my life. But I can’t flee to the mountains; this disaster will overtake me, and I’ll die. '
  '2':
  - type: text
    content: “My lords,” he said, “please turn aside to your servant’s house. You can wash your feet and spend the night and then go on your way early in the morning.”
  - type: text
    content: “No,” they answered, “we will spend the night in the square.”
  '20':
  - type: text
    content: Look, here is a town near enough to run to, and it is small. Let me flee to it—it is very small, isn’t it? Then my life will be spared.”
  '21':
  - type: text
    content: 'He said to him, “Very well, I will grant this request too; I will not overthrow the town you speak of. '
  '22':
  - type: text
    content: But flee there quickly, because I cannot do anything until you reach it.” (That is why the town was called Zoar.
  - type: note
    content: Zoar means small.
  - type: text
    content: )
  '23':
  - type: text
    content: 'By the time Lot reached Zoar, the sun had risen over the land. '
  '24':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' rained down burning sulfur on Sodom and Gomorrah—from the '
  - type: text
    content: Lord
  - type: text
    content: ' out of the heavens. '
  '25':
  - type: text
    content: 'Thus he overthrew those cities and the entire plain, destroying all those living in the cities—and also the vegetation in the land. '
  '26':
  - type: text
    content: But Lot’s wife looked back, and she became a pillar of salt.
  '27':
  - type: text
    content: 'Early the next morning Abraham got up and returned to the place where he had stood before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: He looked down toward Sodom and Gomorrah, toward all the land of the plain, and he saw dense smoke rising from the land, like smoke from a furnace.
  '29':
  - type: text
    content: So when God destroyed the cities of the plain, he remembered Abraham, and he brought Lot out of the catastrophe that overthrew the cities where Lot had lived.
  - type: heading
    content: Lot and His Daughters
  '3':
  - type: text
    content: 'But he insisted so strongly that they did go with him and entered his house. He prepared a meal for them, baking bread without yeast, and they ate. '
  '30':
  - type: text
    content: 'Lot and his two daughters left Zoar and settled in the mountains, for he was afraid to stay in Zoar. He and his two daughters lived in a cave. '
  '31':
  - type: text
    content: 'One day the older daughter said to the younger, “Our father is old, and there is no man around here to give us children—as is the custom all over the earth. '
  '32':
  - type: text
    content: Let’s get our father to drink wine and then sleep with him and preserve our family line through our father.”
  '33':
  - type: text
    content: That night they got their father to drink wine, and the older daughter went in and slept with him. He was not aware of it when she lay down or when she got up.
  '34':
  - type: text
    content: 'The next day the older daughter said to the younger, “Last night I slept with my father. Let’s get him to drink wine again tonight, and you go in and sleep with him so we can preserve our family line through our father.” '
  '35':
  - type: text
    content: So they got their father to drink wine that night also, and the younger daughter went in and slept with him. Again he was not aware of it when she lay down or when she got up.
  '36':
  - type: text
    content: 'So both of Lot’s daughters became pregnant by their father. '
  '37':
  - type: text
    content: The older daughter had a son, and she named him Moab
  - type: note
    content: Moab sounds like the Hebrew for from father.
  - type: text
    content: '; he is the father of the Moabites of today. '
  '38':
  - type: text
    content: The younger daughter also had a son, and she named him Ben-Ammi
  - type: note
    content: Ben-Ammi means son of my father’s people.
  - type: text
    content: ; he is the father of the Ammonites
  - type: note
    content: Hebrew Bene-Ammon
  - type: text
    content: ' of today.'
  '4':
  - type: text
    content: 'Before they had gone to bed, all the men from every part of the city of Sodom—both young and old—surrounded the house. '
  '5':
  - type: text
    content: They called to Lot, “Where are the men who came to you tonight? Bring them out to us so that we can have sex with them.”
  '6':
  - type: text
    content: 'Lot went outside to meet them and shut the door behind him '
  '7':
  - type: text
    content: 'and said, “No, my friends. Don’t do this wicked thing. '
  '8':
  - type: text
    content: Look, I have two daughters who have never slept with a man. Let me bring them out to you, and you can do what you like with them. But don’t do anything to these men, for they have come under the protection of my roof.”
  '9':
  - type: text
    content: “Get out of our way,” they replied. “This fellow came here as a foreigner, and now he wants to play the judge! We’ll treat you worse than them.” They kept bringing pressure on Lot and moved forward to break down the door.
