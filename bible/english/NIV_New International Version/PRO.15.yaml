document_id: PRO.15,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: A gentle answer turns away wrath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a harsh word stirs up anger.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Stern discipline awaits anyone who leaves the path;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the one who hates correction will die.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Death and Destruction
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Abaddon
      marker-yv: yv-n
    - type: text
      text: ' lie open before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how much more do human hearts!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mockers resent correction,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so they avoid the wise.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: A happy heart makes the face cheerful,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but heartache crushes the spirit.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: The discerning heart seeks knowledge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the mouth of a fool feeds on folly.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: All the days of the oppressed are wretched,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the cheerful heart has a continual feast.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Better a little with the fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than great wealth with turmoil.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Better a small serving of vegetables with love
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than a fattened calf with hatred.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: A hot-tempered person stirs up conflict,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the one who is patient calms a quarrel.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: The way of the sluggard is blocked with thorns,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the path of the upright is a highway.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: The tongue of the wise adorns knowledge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the mouth of the fool gushes folly.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: A wise son brings joy to his father,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a foolish man despises his mother.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Folly brings joy to one who has no sense,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but whoever has understanding keeps a straight course.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Plans fail for lack of counsel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but with many advisers they succeed.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: A person finds joy in giving an apt reply—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and how good is a timely word!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: The path of life leads upward for the prudent
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to keep them from going down to the realm of the dead.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' tears down the house of the proud,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he sets the widow’s boundary stones in place.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' detests the thoughts of the wicked,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but gracious words are pure in his sight.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: The greedy bring ruin to their households,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the one who hates bribes will live.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: The heart of the righteous weighs its answers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the mouth of the wicked gushes evil.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is far from the wicked,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he hears the prayer of the righteous.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' are everywhere,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: keeping watch on the wicked and the good.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Light in a messenger’s eyes brings joy to the heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and good news gives health to the bones.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Whoever heeds life-giving correction
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be at home among the wise.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Those who disregard discipline despise themselves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the one who heeds correction gains understanding.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Wisdom’s instruction is to fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and humility comes before honor.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The soothing tongue is a tree of life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a perverse tongue crushes the spirit.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: A fool spurns a parent’s discipline,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but whoever heeds correction shows prudence.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The house of the righteous contains great treasure,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the income of the wicked brings ruin.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The lips of the wise spread knowledge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the hearts of fools are not upright.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' detests the sacrifice of the wicked,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but the prayer of the upright pleases him.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' detests the way of the wicked,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but he loves those who pursue righteousness.
