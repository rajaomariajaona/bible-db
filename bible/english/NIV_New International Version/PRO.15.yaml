document_id: PRO.15,111
type_code: eng
verses:
  '1':
  - type: text
    content: A gentle answer turns away wrath,
  - type: text
    content: but a harsh word stirs up anger.
  '10':
  - type: text
    content: Stern discipline awaits anyone who leaves the path;
  - type: text
    content: the one who hates correction will die.
  '11':
  - type: text
    content: Death and Destruction
  - type: note
    content: Hebrew Abaddon
  - type: text
    content: ' lie open before the '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: text
    content: how much more do human hearts!
  '12':
  - type: text
    content: Mockers resent correction,
  - type: text
    content: so they avoid the wise.
  '13':
  - type: text
    content: A happy heart makes the face cheerful,
  - type: text
    content: but heartache crushes the spirit.
  '14':
  - type: text
    content: The discerning heart seeks knowledge,
  - type: text
    content: but the mouth of a fool feeds on folly.
  '15':
  - type: text
    content: All the days of the oppressed are wretched,
  - type: text
    content: but the cheerful heart has a continual feast.
  '16':
  - type: text
    content: 'Better a little with the fear of the '
  - type: text
    content: Lord
  - type: text
    content: than great wealth with turmoil.
  '17':
  - type: text
    content: Better a small serving of vegetables with love
  - type: text
    content: than a fattened calf with hatred.
  '18':
  - type: text
    content: A hot-tempered person stirs up conflict,
  - type: text
    content: but the one who is patient calms a quarrel.
  '19':
  - type: text
    content: The way of the sluggard is blocked with thorns,
  - type: text
    content: but the path of the upright is a highway.
  '2':
  - type: text
    content: The tongue of the wise adorns knowledge,
  - type: text
    content: but the mouth of the fool gushes folly.
  '20':
  - type: text
    content: A wise son brings joy to his father,
  - type: text
    content: but a foolish man despises his mother.
  '21':
  - type: text
    content: Folly brings joy to one who has no sense,
  - type: text
    content: but whoever has understanding keeps a straight course.
  '22':
  - type: text
    content: Plans fail for lack of counsel,
  - type: text
    content: but with many advisers they succeed.
  '23':
  - type: text
    content: A person finds joy in giving an apt reply—
  - type: text
    content: and how good is a timely word!
  '24':
  - type: text
    content: The path of life leads upward for the prudent
  - type: text
    content: to keep them from going down to the realm of the dead.
  '25':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' tears down the house of the proud,'
  - type: text
    content: but he sets the widow’s boundary stones in place.
  '26':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' detests the thoughts of the wicked,'
  - type: text
    content: but gracious words are pure in his sight.
  '27':
  - type: text
    content: The greedy bring ruin to their households,
  - type: text
    content: but the one who hates bribes will live.
  '28':
  - type: text
    content: The heart of the righteous weighs its answers,
  - type: text
    content: but the mouth of the wicked gushes evil.
  '29':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is far from the wicked,'
  - type: text
    content: but he hears the prayer of the righteous.
  '3':
  - type: text
    content: 'The eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' are everywhere,'
  - type: text
    content: keeping watch on the wicked and the good.
  '30':
  - type: text
    content: Light in a messenger’s eyes brings joy to the heart,
  - type: text
    content: and good news gives health to the bones.
  '31':
  - type: text
    content: Whoever heeds life-giving correction
  - type: text
    content: will be at home among the wise.
  '32':
  - type: text
    content: Those who disregard discipline despise themselves,
  - type: text
    content: but the one who heeds correction gains understanding.
  '33':
  - type: text
    content: 'Wisdom’s instruction is to fear the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and humility comes before honor.
  '4':
  - type: text
    content: The soothing tongue is a tree of life,
  - type: text
    content: but a perverse tongue crushes the spirit.
  '5':
  - type: text
    content: A fool spurns a parent’s discipline,
  - type: text
    content: but whoever heeds correction shows prudence.
  '6':
  - type: text
    content: The house of the righteous contains great treasure,
  - type: text
    content: but the income of the wicked brings ruin.
  '7':
  - type: text
    content: The lips of the wise spread knowledge,
  - type: text
    content: but the hearts of fools are not upright.
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' detests the sacrifice of the wicked,'
  - type: text
    content: but the prayer of the upright pleases him.
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' detests the way of the wicked,'
  - type: text
    content: but he loves those who pursue righteousness.
