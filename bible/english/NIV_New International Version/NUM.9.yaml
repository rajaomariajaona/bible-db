document_id: NUM.9,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Passover
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Moses in the Desert of Sinai in the first month of the second year after they came out of Egypt. He said, '
  '10':
  - type: text
    content: '“Tell the Israelites: ‘When any of you or your descendants are unclean because of a dead body or are away on a journey, they are still to celebrate the '
  - type: text
    content: Lord
  - type: text
    content: '’s Passover, '
  '11':
  - type: text
    content: 'but they are to do it on the fourteenth day of the second month at twilight. They are to eat the lamb, together with unleavened bread and bitter herbs. '
  '12':
  - type: text
    content: 'They must not leave any of it till morning or break any of its bones. When they celebrate the Passover, they must follow all the regulations. '
  '13':
  - type: text
    content: 'But if anyone who is ceremonially clean and not on a journey fails to celebrate the Passover, they must be cut off from their people for not presenting the '
  - type: text
    content: Lord
  - type: text
    content: ’s offering at the appointed time. They will bear the consequences of their sin.
  '14':
  - type: text
    content: '“ ‘A foreigner residing among you is also to celebrate the '
  - type: text
    content: Lord
  - type: text
    content: ’s Passover in accordance with its rules and regulations. You must have the same regulations for both the foreigner and the native-born.’ ”
  - type: heading
    content: The Cloud Above the Tabernacle
  '15':
  - type: text
    content: 'On the day the tabernacle, the tent of the covenant law, was set up, the cloud covered it. From evening till morning the cloud above the tabernacle looked like fire. '
  '16':
  - type: text
    content: 'That is how it continued to be; the cloud covered it, and at night it looked like fire. '
  '17':
  - type: text
    content: 'Whenever the cloud lifted from above the tent, the Israelites set out; wherever the cloud settled, the Israelites encamped. '
  '18':
  - type: text
    content: 'At the '
  - type: text
    content: Lord
  - type: text
    content: '’s command the Israelites set out, and at his command they encamped. As long as the cloud stayed over the tabernacle, they remained in camp. '
  '19':
  - type: text
    content: 'When the cloud remained over the tabernacle a long time, the Israelites obeyed the '
  - type: text
    content: Lord
  - type: text
    content: '’s order and did not set out. '
  '2':
  - type: text
    content: '“Have the Israelites celebrate the Passover at the appointed time. '
  '20':
  - type: text
    content: 'Sometimes the cloud was over the tabernacle only a few days; at the '
  - type: text
    content: Lord
  - type: text
    content: '’s command they would encamp, and then at his command they would set out. '
  '21':
  - type: text
    content: 'Sometimes the cloud stayed only from evening till morning, and when it lifted in the morning, they set out. Whether by day or by night, whenever the cloud lifted, they set out. '
  '22':
  - type: text
    content: 'Whether the cloud stayed over the tabernacle for two days or a month or a year, the Israelites would remain in camp and not set out; but when it lifted, they would set out. '
  '23':
  - type: text
    content: 'At the '
  - type: text
    content: Lord
  - type: text
    content: '’s command they encamped, and at the '
  - type: text
    content: Lord
  - type: text
    content: '’s command they set out. They obeyed the '
  - type: text
    content: Lord
  - type: text
    content: ’s order, in accordance with his command through Moses.
  '3':
  - type: text
    content: Celebrate it at the appointed time, at twilight on the fourteenth day of this month, in accordance with all its rules and regulations.”
  '4':
  - type: text
    content: 'So Moses told the Israelites to celebrate the Passover, '
  '5':
  - type: text
    content: 'and they did so in the Desert of Sinai at twilight on the fourteenth day of the first month. The Israelites did everything just as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '6':
  - type: text
    content: 'But some of them could not celebrate the Passover on that day because they were ceremonially unclean on account of a dead body. So they came to Moses and Aaron that same day '
  '7':
  - type: text
    content: 'and said to Moses, “We have become unclean because of a dead body, but why should we be kept from presenting the '
  - type: text
    content: Lord
  - type: text
    content: ’s offering with the other Israelites at the appointed time?”
  '8':
  - type: text
    content: 'Moses answered them, “Wait until I find out what the '
  - type: text
    content: Lord
  - type: text
    content: ' commands concerning you.”'
  '9':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
