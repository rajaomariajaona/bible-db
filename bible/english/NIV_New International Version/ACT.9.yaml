document_id: ACT.9
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Saul’s Conversion
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Meanwhile, Saul was still breathing out murderous threats against the Lord’s disciples. He went to the high priest '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and asked him for letters to the synagogues in Damascus, so that if he found any there who belonged to the Way, whether men or women, he might take them as prisoners to Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'As he neared Damascus on his journey, suddenly a light from heaven flashed around him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'He fell to the ground and heard a voice say to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Saul, Saul, why do you persecute me?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Who are you, Lord?” Saul asked.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I am Jesus, whom you are persecuting,”
  - type: text
    text: ' he replied. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Now get up and go into the city, and you will be told what you must do.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The men traveling with Saul stood there speechless; they heard the sound but did not see anyone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Saul got up from the ground, but when he opened his eyes he could see nothing. So they led him by the hand into Damascus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For three days he was blind, and did not eat or drink anything.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'In Damascus there was a disciple named Ananias. The Lord called to him in a vision, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Ananias!”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Yes, Lord,” he answered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The Lord told him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go to the house of Judas on Straight Street and ask for a man from Tarsus named Saul, for he is praying.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: In a vision he has seen a man named Ananias come and place his hands on him to restore his sight.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '“Lord,” Ananias answered, “I have heard many reports about this man and all the harm he has done to your holy people in Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And he has come here with authority from the chief priests to arrest all who call on your name.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'But the Lord said to Ananias, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go! This man is my chosen instrument to proclaim my name to the Gentiles and their kings and to the people of Israel.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I will show him how much he must suffer for my name.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Then Ananias went to the house and entered it. Placing his hands on Saul, he said, “Brother Saul, the Lord—Jesus, who appeared to you on the road as you were coming here—has sent me so that you may see again and be filled with the Holy Spirit.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Immediately, something like scales fell from Saul’s eyes, and he could see again. He got up and was baptized, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: and after taking some food, he regained his strength.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Saul in Damascus and Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Saul spent several days with the disciples in Damascus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'At once he began to preach in the synagogues that Jesus is the Son of God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'All those who heard him were astonished and asked, “Isn’t he the man who raised havoc in Jerusalem among those who call on this name? And hasn’t he come here to take them as prisoners to the chief priests?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Yet Saul grew more and more powerful and baffled the Jews living in Damascus by proving that Jesus is the Messiah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'After many days had gone by, there was a conspiracy among the Jews to kill him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'but Saul learned of their plan. Day and night they kept close watch on the city gates in order to kill him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: But his followers took him by night and lowered him in a basket through an opening in the wall.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'When he came to Jerusalem, he tried to join the disciples, but they were all afraid of him, not believing that he really was a disciple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'But Barnabas took him and brought him to the apostles. He told them how Saul on his journey had seen the Lord and that the Lord had spoken to him, and how in Damascus he had preached fearlessly in the name of Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So Saul stayed with them and moved about freely in Jerusalem, speaking boldly in the name of the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: He talked and debated with the Hellenistic Jews,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, Jews who had adopted the Greek language and culture
    marker-yv: yv-n
  - type: text
    text: ' but they tried to kill him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: When the believers learned of this, they took him down to Caesarea and sent him off to Tarsus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Then the church throughout Judea, Galilee and Samaria enjoyed a time of peace and was strengthened. Living in the fear of the Lord and encouraged by the Holy Spirit, it increased in numbers.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aeneas and Dorcas
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'As Peter traveled about the country, he went to visit the Lord’s people who lived in Lydda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'There he found a man named Aeneas, who was paralyzed and had been bedridden for eight years. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: '“Aeneas,” Peter said to him, “Jesus Christ heals you. Get up and roll up your mat.” Immediately Aeneas got up. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: All those who lived in Lydda and Sharon saw him and turned to the Lord.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'In Joppa there was a disciple named Tabitha (in Greek her name is Dorcas); she was always doing good and helping the poor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'About that time she became sick and died, and her body was washed and placed in an upstairs room. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Lydda was near Joppa; so when the disciples heard that Peter was in Lydda, they sent two men to him and urged him, “Please come at once!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Peter went with them, and when he arrived he was taken upstairs to the room. All the widows stood around him, crying and showing him the robes and other clothing that Dorcas had made while she was still with them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Peter sent them all out of the room; then he got down on his knees and prayed. Turning toward the dead woman, he said, “Tabitha, get up.” She opened her eyes, and seeing Peter she sat up. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'He took her by the hand and helped her to her feet. Then he called for the believers, especially the widows, and presented her to them alive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'This became known all over Joppa, and many people believed in the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Peter stayed in Joppa for some time with a tanner named Simon.
