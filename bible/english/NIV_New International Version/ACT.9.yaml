document_id: ACT.9,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Saul’s Conversion
  - type: text
    content: 'Meanwhile, Saul was still breathing out murderous threats against the Lord’s disciples. He went to the high priest '
  '10':
  - type: text
    content: 'In Damascus there was a disciple named Ananias. The Lord called to him in a vision, '
  - type: text
    content: “Ananias!”
  - type: text
    content: “Yes, Lord,” he answered.
  '11':
  - type: text
    content: 'The Lord told him, '
  - type: text
    content: “Go to the house of Judas on Straight Street and ask for a man from Tarsus named Saul, for he is praying.
  - type: text
    content: ' '
  '12':
  - type: text
    content: In a vision he has seen a man named Ananias come and place his hands on him to restore his sight.”
  '13':
  - type: text
    content: '“Lord,” Ananias answered, “I have heard many reports about this man and all the harm he has done to your holy people in Jerusalem. '
  '14':
  - type: text
    content: And he has come here with authority from the chief priests to arrest all who call on your name.”
  '15':
  - type: text
    content: 'But the Lord said to Ananias, '
  - type: text
    content: “Go! This man is my chosen instrument to proclaim my name to the Gentiles and their kings and to the people of Israel.
  - type: text
    content: ' '
  '16':
  - type: text
    content: I will show him how much he must suffer for my name.”
  '17':
  - type: text
    content: 'Then Ananias went to the house and entered it. Placing his hands on Saul, he said, “Brother Saul, the Lord—Jesus, who appeared to you on the road as you were coming here—has sent me so that you may see again and be filled with the Holy Spirit.” '
  '18':
  - type: text
    content: 'Immediately, something like scales fell from Saul’s eyes, and he could see again. He got up and was baptized, '
  '19':
  - type: text
    content: and after taking some food, he regained his strength.
  - type: heading
    content: Saul in Damascus and Jerusalem
  - type: text
    content: 'Saul spent several days with the disciples in Damascus. '
  '2':
  - type: text
    content: 'and asked him for letters to the synagogues in Damascus, so that if he found any there who belonged to the Way, whether men or women, he might take them as prisoners to Jerusalem. '
  '20':
  - type: text
    content: 'At once he began to preach in the synagogues that Jesus is the Son of God. '
  '21':
  - type: text
    content: 'All those who heard him were astonished and asked, “Isn’t he the man who raised havoc in Jerusalem among those who call on this name? And hasn’t he come here to take them as prisoners to the chief priests?” '
  '22':
  - type: text
    content: Yet Saul grew more and more powerful and baffled the Jews living in Damascus by proving that Jesus is the Messiah.
  '23':
  - type: text
    content: 'After many days had gone by, there was a conspiracy among the Jews to kill him, '
  '24':
  - type: text
    content: 'but Saul learned of their plan. Day and night they kept close watch on the city gates in order to kill him. '
  '25':
  - type: text
    content: But his followers took him by night and lowered him in a basket through an opening in the wall.
  '26':
  - type: text
    content: 'When he came to Jerusalem, he tried to join the disciples, but they were all afraid of him, not believing that he really was a disciple. '
  '27':
  - type: text
    content: 'But Barnabas took him and brought him to the apostles. He told them how Saul on his journey had seen the Lord and that the Lord had spoken to him, and how in Damascus he had preached fearlessly in the name of Jesus. '
  '28':
  - type: text
    content: 'So Saul stayed with them and moved about freely in Jerusalem, speaking boldly in the name of the Lord. '
  '29':
  - type: text
    content: He talked and debated with the Hellenistic Jews,
  - type: note
    content: That is, Jews who had adopted the Greek language and culture
  - type: text
    content: ' but they tried to kill him. '
  '3':
  - type: text
    content: 'As he neared Damascus on his journey, suddenly a light from heaven flashed around him. '
  '30':
  - type: text
    content: When the believers learned of this, they took him down to Caesarea and sent him off to Tarsus.
  '31':
  - type: text
    content: Then the church throughout Judea, Galilee and Samaria enjoyed a time of peace and was strengthened. Living in the fear of the Lord and encouraged by the Holy Spirit, it increased in numbers.
  - type: heading
    content: Aeneas and Dorcas
  '32':
  - type: text
    content: 'As Peter traveled about the country, he went to visit the Lord’s people who lived in Lydda. '
  '33':
  - type: text
    content: 'There he found a man named Aeneas, who was paralyzed and had been bedridden for eight years. '
  '34':
  - type: text
    content: '“Aeneas,” Peter said to him, “Jesus Christ heals you. Get up and roll up your mat.” Immediately Aeneas got up. '
  '35':
  - type: text
    content: All those who lived in Lydda and Sharon saw him and turned to the Lord.
  '36':
  - type: text
    content: 'In Joppa there was a disciple named Tabitha (in Greek her name is Dorcas); she was always doing good and helping the poor. '
  '37':
  - type: text
    content: 'About that time she became sick and died, and her body was washed and placed in an upstairs room. '
  '38':
  - type: text
    content: Lydda was near Joppa; so when the disciples heard that Peter was in Lydda, they sent two men to him and urged him, “Please come at once!”
  '39':
  - type: text
    content: Peter went with them, and when he arrived he was taken upstairs to the room. All the widows stood around him, crying and showing him the robes and other clothing that Dorcas had made while she was still with them.
  '4':
  - type: text
    content: 'He fell to the ground and heard a voice say to him, '
  - type: text
    content: “Saul, Saul, why do you persecute me?”
  '40':
  - type: text
    content: 'Peter sent them all out of the room; then he got down on his knees and prayed. Turning toward the dead woman, he said, “Tabitha, get up.” She opened her eyes, and seeing Peter she sat up. '
  '41':
  - type: text
    content: 'He took her by the hand and helped her to her feet. Then he called for the believers, especially the widows, and presented her to them alive. '
  '42':
  - type: text
    content: 'This became known all over Joppa, and many people believed in the Lord. '
  '43':
  - type: text
    content: Peter stayed in Joppa for some time with a tanner named Simon.
  '5':
  - type: text
    content: “Who are you, Lord?” Saul asked.
  - type: text
    content: “I am Jesus, whom you are persecuting,”
  - type: text
    content: ' he replied. '
  '6':
  - type: text
    content: “Now get up and go into the city, and you will be told what you must do.”
  '7':
  - type: text
    content: 'The men traveling with Saul stood there speechless; they heard the sound but did not see anyone. '
  '8':
  - type: text
    content: 'Saul got up from the ground, but when he opened his eyes he could see nothing. So they led him by the hand into Damascus. '
  '9':
  - type: text
    content: For three days he was blind, and did not eat or drink anything.
