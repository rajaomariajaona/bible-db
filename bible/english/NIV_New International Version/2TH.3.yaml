document_id: 2TH.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Request for Prayer
  - type: text
    content: 'As for other matters, brothers and sisters, pray for us that the message of the Lord may spread rapidly and be honored, just as it was with you. '
  '10':
  - type: text
    content: 'For even when we were with you, we gave you this rule: “The one who is unwilling to work shall not eat.”'
  '11':
  - type: text
    content: 'We hear that some among you are idle and disruptive. They are not busy; they are busybodies. '
  '12':
  - type: text
    content: 'Such people we command and urge in the Lord Jesus Christ to settle down and earn the food they eat. '
  '13':
  - type: text
    content: And as for you, brothers and sisters, never tire of doing what is good.
  '14':
  - type: text
    content: 'Take special note of anyone who does not obey our instruction in this letter. Do not associate with them, in order that they may feel ashamed. '
  '15':
  - type: text
    content: Yet do not regard them as an enemy, but warn them as you would a fellow believer.
  - type: heading
    content: Final Greetings
  '16':
  - type: text
    content: Now may the Lord of peace himself give you peace at all times and in every way. The Lord be with all of you.
  '17':
  - type: text
    content: I, Paul, write this greeting in my own hand, which is the distinguishing mark in all my letters. This is how I write.
  '18':
  - type: text
    content: The grace of our Lord Jesus Christ be with you all.
  '2':
  - type: text
    content: 'And pray that we may be delivered from wicked and evil people, for not everyone has faith. '
  '3':
  - type: text
    content: 'But the Lord is faithful, and he will strengthen you and protect you from the evil one. '
  '4':
  - type: text
    content: 'We have confidence in the Lord that you are doing and will continue to do the things we command. '
  '5':
  - type: text
    content: May the Lord direct your hearts into God’s love and Christ’s perseverance.
  - type: heading
    content: Warning Against Idleness
  '6':
  - type: text
    content: In the name of the Lord Jesus Christ, we command you, brothers and sisters, to keep away from every believer who is idle and disruptive and does not live according to the teaching
  - type: note
    content: Or tradition
  - type: text
    content: ' you received from us. '
  '7':
  - type: text
    content: 'For you yourselves know how you ought to follow our example. We were not idle when we were with you, '
  '8':
  - type: text
    content: 'nor did we eat anyone’s food without paying for it. On the contrary, we worked night and day, laboring and toiling so that we would not be a burden to any of you. '
  '9':
  - type: text
    content: 'We did this, not because we do not have the right to such help, but in order to offer ourselves as a model for you to imitate. '
