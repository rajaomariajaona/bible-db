document_id: DEU.10,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Tablets Like the First Ones
  - type: text
    content: 'At that time the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Chisel out two stone tablets like the first ones and come up to me on the mountain. Also make a wooden ark.'
  - type: note
    content: That is, a chest
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Now I had stayed on the mountain forty days and forty nights, as I did the first time, and the '
  - type: text
    content: Lord
  - type: text
    content: ' listened to me at this time also. It was not his will to destroy you. '
  '11':
  - type: text
    content: '“Go,” the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “and lead the people on their way, so that they may enter and possess the land I swore to their ancestors to give them.”'
  - type: heading
    content: Fear the Lord
  '12':
  - type: text
    content: 'And now, Israel, what does the '
  - type: text
    content: Lord
  - type: text
    content: ' your God ask of you but to fear the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, to walk in obedience to him, to love him, to serve the '
  - type: text
    content: Lord
  - type: text
    content: ' your God with all your heart and with all your soul, '
  '13':
  - type: text
    content: 'and to observe the '
  - type: text
    content: Lord
  - type: text
    content: ’s commands and decrees that I am giving you today for your own good?
  '14':
  - type: text
    content: 'To the '
  - type: text
    content: Lord
  - type: text
    content: ' your God belong the heavens, even the highest heavens, the earth and everything in it. '
  '15':
  - type: text
    content: 'Yet the '
  - type: text
    content: Lord
  - type: text
    content: ' set his affection on your ancestors and loved them, and he chose you, their descendants, above all the nations—as it is today. '
  '16':
  - type: text
    content: 'Circumcise your hearts, therefore, and do not be stiff-necked any longer. '
  '17':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is God of gods and Lord of lords, the great God, mighty and awesome, who shows no partiality and accepts no bribes. '
  '18':
  - type: text
    content: 'He defends the cause of the fatherless and the widow, and loves the foreigner residing among you, giving them food and clothing. '
  '19':
  - type: text
    content: 'And you are to love those who are foreigners, for you yourselves were foreigners in Egypt. '
  '2':
  - type: text
    content: I will write on the tablets the words that were on the first tablets, which you broke. Then you are to put them in the ark.”
  '20':
  - type: text
    content: 'Fear the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and serve him. Hold fast to him and take your oaths in his name. '
  '21':
  - type: text
    content: 'He is the one you praise; he is your God, who performed for you those great and awesome wonders you saw with your own eyes. '
  '22':
  - type: text
    content: 'Your ancestors who went down into Egypt were seventy in all, and now the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has made you as numerous as the stars in the sky.'
  '3':
  - type: text
    content: 'So I made the ark out of acacia wood and chiseled out two stone tablets like the first ones, and I went up on the mountain with the two tablets in my hands. '
  '4':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' wrote on these tablets what he had written before, the Ten Commandments he had proclaimed to you on the mountain, out of the fire, on the day of the assembly. And the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them to me. '
  '5':
  - type: text
    content: 'Then I came back down the mountain and put the tablets in the ark I had made, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded me, and they are there now.'
  '6':
  - type: text
    content: '(The Israelites traveled from the wells of Bene Jaakan to Moserah. There Aaron died and was buried, and Eleazar his son succeeded him as priest. '
  '7':
  - type: text
    content: 'From there they traveled to Gudgodah and on to Jotbathah, a land with streams of water. '
  '8':
  - type: text
    content: 'At that time the '
  - type: text
    content: Lord
  - type: text
    content: ' set apart the tribe of Levi to carry the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ', to stand before the '
  - type: text
    content: Lord
  - type: text
    content: ' to minister and to pronounce blessings in his name, as they still do today. '
  '9':
  - type: text
    content: 'That is why the Levites have no share or inheritance among their fellow Israelites; the '
  - type: text
    content: Lord
  - type: text
    content: ' is their inheritance, as the '
  - type: text
    content: Lord
  - type: text
    content: ' your God told them.)'
