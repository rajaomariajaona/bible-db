document_id: ISA.13,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prophecy Against Babylon
  - type: text
    content: 'A prophecy against Babylon that Isaiah son of Amoz saw:'
  '10':
  - type: text
    content: The stars of heaven and their constellations
  - type: text
    content: will not show their light.
  - type: text
    content: The rising sun will be darkened
  - type: text
    content: and the moon will not give its light.
  '11':
  - type: text
    content: I will punish the world for its evil,
  - type: text
    content: the wicked for their sins.
  - type: text
    content: I will put an end to the arrogance of the haughty
  - type: text
    content: and will humble the pride of the ruthless.
  '12':
  - type: text
    content: I will make people scarcer than pure gold,
  - type: text
    content: more rare than the gold of Ophir.
  '13':
  - type: text
    content: Therefore I will make the heavens tremble;
  - type: text
    content: and the earth will shake from its place
  - type: text
    content: 'at the wrath of the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty,'
  - type: text
    content: in the day of his burning anger.
  '14':
  - type: text
    content: Like a hunted gazelle,
  - type: text
    content: like sheep without a shepherd,
  - type: text
    content: they will all return to their own people,
  - type: text
    content: they will flee to their native land.
  '15':
  - type: text
    content: Whoever is captured will be thrust through;
  - type: text
    content: all who are caught will fall by the sword.
  '16':
  - type: text
    content: Their infants will be dashed to pieces before their eyes;
  - type: text
    content: their houses will be looted and their wives violated.
  '17':
  - type: text
    content: See, I will stir up against them the Medes,
  - type: text
    content: who do not care for silver
  - type: text
    content: and have no delight in gold.
  '18':
  - type: text
    content: Their bows will strike down the young men;
  - type: text
    content: they will have no mercy on infants,
  - type: text
    content: nor will they look with compassion on children.
  '19':
  - type: text
    content: Babylon, the jewel of kingdoms,
  - type: text
    content: the pride and glory of the Babylonians,
  - type: note
    content: Or Chaldeans
  - type: text
    content: will be overthrown by God
  - type: text
    content: like Sodom and Gomorrah.
  '2':
  - type: text
    content: Raise a banner on a bare hilltop,
  - type: text
    content: shout to them;
  - type: text
    content: beckon to them
  - type: text
    content: to enter the gates of the nobles.
  '20':
  - type: text
    content: She will never be inhabited
  - type: text
    content: or lived in through all generations;
  - type: text
    content: there no nomads will pitch their tents,
  - type: text
    content: there no shepherds will rest their flocks.
  '21':
  - type: text
    content: But desert creatures will lie there,
  - type: text
    content: jackals will fill her houses;
  - type: text
    content: there the owls will dwell,
  - type: text
    content: and there the wild goats will leap about.
  '22':
  - type: text
    content: Hyenas will inhabit her strongholds,
  - type: text
    content: jackals her luxurious palaces.
  - type: text
    content: Her time is at hand,
  - type: text
    content: and her days will not be prolonged.
  '3':
  - type: text
    content: I have commanded those I prepared for battle;
  - type: text
    content: I have summoned my warriors to carry out my wrath—
  - type: text
    content: those who rejoice in my triumph.
  '4':
  - type: text
    content: Listen, a noise on the mountains,
  - type: text
    content: like that of a great multitude!
  - type: text
    content: Listen, an uproar among the kingdoms,
  - type: text
    content: like nations massing together!
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty is mustering'
  - type: text
    content: an army for war.
  '5':
  - type: text
    content: They come from faraway lands,
  - type: text
    content: from the ends of the heavens—
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' and the weapons of his wrath—'
  - type: text
    content: to destroy the whole country.
  '6':
  - type: text
    content: 'Wail, for the day of the '
  - type: text
    content: Lord
  - type: text
    content: ' is near;'
  - type: text
    content: it will come like destruction from the Almighty.
  - type: note
    content: Hebrew Shaddai
  '7':
  - type: text
    content: Because of this, all hands will go limp,
  - type: text
    content: every heart will melt with fear.
  '8':
  - type: text
    content: Terror will seize them,
  - type: text
    content: pain and anguish will grip them;
  - type: text
    content: they will writhe like a woman in labor.
  - type: text
    content: They will look aghast at each other,
  - type: text
    content: their faces aflame.
  '9':
  - type: text
    content: 'See, the day of the '
  - type: text
    content: Lord
  - type: text
    content: ' is coming'
  - type: text
    content: —a cruel day, with wrath and fierce anger—
  - type: text
    content: to make the land desolate
  - type: text
    content: and destroy the sinners within it.
