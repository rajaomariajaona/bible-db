document_id: ISA.13,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Prophecy Against Babylon
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A prophecy against Babylon that Isaiah son of Amoz saw:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The stars of heaven and their constellations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will not show their light.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The rising sun will be darkened
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the moon will not give its light.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will punish the world for its evil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wicked for their sins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will put an end to the arrogance of the haughty
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will humble the pride of the ruthless.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make people scarcer than pure gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: more rare than the gold of Ophir.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore I will make the heavens tremble;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the earth will shake from its place
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'at the wrath of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the day of his burning anger.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a hunted gazelle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like sheep without a shepherd,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will all return to their own people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will flee to their native land.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoever is captured will be thrust through;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all who are caught will fall by the sword.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their infants will be dashed to pieces before their eyes;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their houses will be looted and their wives violated.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: See, I will stir up against them the Medes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who do not care for silver
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have no delight in gold.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their bows will strike down the young men;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will have no mercy on infants,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor will they look with compassion on children.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Babylon, the jewel of kingdoms,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the pride and glory of the Babylonians,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldeans
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will be overthrown by God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like Sodom and Gomorrah.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Raise a banner on a bare hilltop,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shout to them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: beckon to them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to enter the gates of the nobles.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She will never be inhabited
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or lived in through all generations;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: there no nomads will pitch their tents,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there no shepherds will rest their flocks.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But desert creatures will lie there,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: jackals will fill her houses;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: there the owls will dwell,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there the wild goats will leap about.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hyenas will inhabit her strongholds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: jackals her luxurious palaces.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her time is at hand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and her days will not be prolonged.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have commanded those I prepared for battle;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have summoned my warriors to carry out my wrath—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who rejoice in my triumph.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, a noise on the mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like that of a great multitude!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, an uproar among the kingdoms,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like nations massing together!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty is mustering'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an army for war.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They come from faraway lands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the ends of the heavens—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and the weapons of his wrath—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to destroy the whole country.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Wail, for the day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is near;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it will come like destruction from the Almighty.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shaddai
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of this, all hands will go limp,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every heart will melt with fear.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Terror will seize them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pain and anguish will grip them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will writhe like a woman in labor.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will look aghast at each other,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their faces aflame.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'See, the day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is coming'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: —a cruel day, with wrath and fierce anger—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to make the land desolate
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and destroy the sinners within it.
