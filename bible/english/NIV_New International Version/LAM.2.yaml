document_id: LAM.2,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: This chapter is an acrostic poem, the verses of which begin with the successive letters of the Hebrew alphabet.
      marker-yv: yv-n
    - type: text
      text: How the Lord has covered Daughter Zion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with the cloud of his anger
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: How the Lord in his anger / has treated Daughter Zion with contempt
      marker-yv: yv-n
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has hurled down the splendor of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from heaven to earth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he has not remembered his footstool
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the day of his anger.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The elders of Daughter Zion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sit on the ground in silence;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they have sprinkled dust on their heads
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and put on sackcloth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The young women of Jerusalem
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have bowed their heads to the ground.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My eyes fail from weeping,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am in torment within;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my heart is poured out on the ground
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because my people are destroyed,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because children and infants faint
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the streets of the city.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They say to their mothers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Where is bread and wine?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as they faint like the wounded
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the streets of the city,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as their lives ebb away
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in their mothers’ arms.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What can I say for you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: With what can I compare you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Daughter Jerusalem?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To what can I liken you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that I may comfort you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Virgin Daughter Zion?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your wound is as deep as the sea.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who can heal you?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The visions of your prophets
  - type: usfm
    marker: q2
    children:
    - type: text
      text: were false and worthless;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they did not expose your sin
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to ward off your captivity.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The prophecies they gave you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: were false and misleading.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who pass your way
  - type: usfm
    marker: q2
    children:
    - type: text
      text: clap their hands at you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they scoff and shake their heads
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'at Daughter Jerusalem:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Is this the city that was called
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the perfection of beauty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the joy of the whole earth?”
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All your enemies open their mouths
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wide against you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they scoff and gnash their teeth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and say, “We have swallowed her up.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This is the day we have waited for;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we have lived to see it.”
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has done what he planned;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has fulfilled his word,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: which he decreed long ago.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has overthrown you without pity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has let the enemy gloat over you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has exalted the horn
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Horn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: here symbolizes strength.
      marker-yv: yv-n
    - type: text
      text: ' of your foes.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The hearts of the people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cry out to the Lord.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You walls of Daughter Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let your tears flow like a river
  - type: usfm
    marker: q2
    children:
    - type: text
      text: day and night;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: give yourself no relief,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your eyes no rest.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arise, cry out in the night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as the watches of the night begin;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour out your heart like water
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the presence of the Lord.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lift up your hands to him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the lives of your children,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who faint from hunger
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at every street corner.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Without pity the Lord has swallowed up
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the dwellings of Jacob;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in his wrath he has torn down
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the strongholds of Daughter Judah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has brought her kingdom and its princes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: down to the ground in dishonor.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Look, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and consider:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Whom have you ever treated like this?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Should women eat their offspring,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the children they have cared for?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Should priest and prophet be killed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the sanctuary of the Lord?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Young and old lie together
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the dust of the streets;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my young men and young women
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have fallen by the sword.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have slain them in the day of your anger;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have slaughtered them without pity.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “As you summon to a feast day,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so you summoned against me terrors on every side.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In the day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one escaped or survived;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: those I cared for and reared
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my enemy has destroyed.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In fierce anger he has cut off
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every horn
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: off / all the strength
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: every king
      marker-yv: yv-n
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Horn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: here symbolizes strength.
      marker-yv: yv-n
    - type: text
      text: ' of Israel.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has withdrawn his right hand
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the approach of the enemy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has burned in Jacob like a flaming fire
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that consumes everything around it.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like an enemy he has strung his bow;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his right hand is ready.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like a foe he has slain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all who were pleasing to the eye;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he has poured out his wrath like fire
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the tent of Daughter Zion.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord is like an enemy;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has swallowed up Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has swallowed up all her palaces
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and destroyed her strongholds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has multiplied mourning and lamentation
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for Daughter Judah.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has laid waste his dwelling like a garden;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has destroyed his place of meeting.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has made Zion forget'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her appointed festivals and her Sabbaths;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in his fierce anger he has spurned
  - type: usfm
    marker: q2
    children:
    - type: text
      text: both king and priest.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The Lord has rejected his altar
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and abandoned his sanctuary.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He has given the walls of her palaces
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into the hands of the enemy;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'they have raised a shout in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as on the day of an appointed festival.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' determined to tear down'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wall around Daughter Zion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He stretched out a measuring line
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and did not withhold his hand from destroying.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He made ramparts and walls lament;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: together they wasted away.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her gates have sunk into the ground;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their bars he has broken and destroyed.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her king and her princes are exiled among the nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the law is no more,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and her prophets no longer find
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'visions from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
