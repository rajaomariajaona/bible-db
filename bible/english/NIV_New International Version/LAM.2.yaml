document_id: LAM.2,111
type_code: eng
verses:
  '1':
  - type: note
    content: This chapter is an acrostic poem, the verses of which begin with the successive letters of the Hebrew alphabet.
  - type: text
    content: How the Lord has covered Daughter Zion
  - type: text
    content: with the cloud of his anger
  - type: note
    content: Or How the Lord in his anger / has treated Daughter Zion with contempt
  - type: text
    content: '!'
  - type: text
    content: He has hurled down the splendor of Israel
  - type: text
    content: from heaven to earth;
  - type: text
    content: he has not remembered his footstool
  - type: text
    content: in the day of his anger.
  '10':
  - type: text
    content: The elders of Daughter Zion
  - type: text
    content: sit on the ground in silence;
  - type: text
    content: they have sprinkled dust on their heads
  - type: text
    content: and put on sackcloth.
  - type: text
    content: The young women of Jerusalem
  - type: text
    content: have bowed their heads to the ground.
  '11':
  - type: text
    content: My eyes fail from weeping,
  - type: text
    content: I am in torment within;
  - type: text
    content: my heart is poured out on the ground
  - type: text
    content: because my people are destroyed,
  - type: text
    content: because children and infants faint
  - type: text
    content: in the streets of the city.
  '12':
  - type: text
    content: They say to their mothers,
  - type: text
    content: “Where is bread and wine?”
  - type: text
    content: as they faint like the wounded
  - type: text
    content: in the streets of the city,
  - type: text
    content: as their lives ebb away
  - type: text
    content: in their mothers’ arms.
  '13':
  - type: text
    content: What can I say for you?
  - type: text
    content: With what can I compare you,
  - type: text
    content: Daughter Jerusalem?
  - type: text
    content: To what can I liken you,
  - type: text
    content: that I may comfort you,
  - type: text
    content: Virgin Daughter Zion?
  - type: text
    content: Your wound is as deep as the sea.
  - type: text
    content: Who can heal you?
  '14':
  - type: text
    content: The visions of your prophets
  - type: text
    content: were false and worthless;
  - type: text
    content: they did not expose your sin
  - type: text
    content: to ward off your captivity.
  - type: text
    content: The prophecies they gave you
  - type: text
    content: were false and misleading.
  '15':
  - type: text
    content: All who pass your way
  - type: text
    content: clap their hands at you;
  - type: text
    content: they scoff and shake their heads
  - type: text
    content: 'at Daughter Jerusalem:'
  - type: text
    content: “Is this the city that was called
  - type: text
    content: the perfection of beauty,
  - type: text
    content: the joy of the whole earth?”
  '16':
  - type: text
    content: All your enemies open their mouths
  - type: text
    content: wide against you;
  - type: text
    content: they scoff and gnash their teeth
  - type: text
    content: and say, “We have swallowed her up.
  - type: text
    content: This is the day we have waited for;
  - type: text
    content: we have lived to see it.”
  '17':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has done what he planned;'
  - type: text
    content: he has fulfilled his word,
  - type: text
    content: which he decreed long ago.
  - type: text
    content: He has overthrown you without pity,
  - type: text
    content: he has let the enemy gloat over you,
  - type: text
    content: he has exalted the horn
  - type: note
    content: Horn here symbolizes strength.
  - type: text
    content: ' of your foes.'
  '18':
  - type: text
    content: The hearts of the people
  - type: text
    content: cry out to the Lord.
  - type: text
    content: You walls of Daughter Zion,
  - type: text
    content: let your tears flow like a river
  - type: text
    content: day and night;
  - type: text
    content: give yourself no relief,
  - type: text
    content: your eyes no rest.
  '19':
  - type: text
    content: Arise, cry out in the night,
  - type: text
    content: as the watches of the night begin;
  - type: text
    content: pour out your heart like water
  - type: text
    content: in the presence of the Lord.
  - type: text
    content: Lift up your hands to him
  - type: text
    content: for the lives of your children,
  - type: text
    content: who faint from hunger
  - type: text
    content: at every street corner.
  '2':
  - type: text
    content: Without pity the Lord has swallowed up
  - type: text
    content: all the dwellings of Jacob;
  - type: text
    content: in his wrath he has torn down
  - type: text
    content: the strongholds of Daughter Judah.
  - type: text
    content: He has brought her kingdom and its princes
  - type: text
    content: down to the ground in dishonor.
  '20':
  - type: text
    content: '“Look, '
  - type: text
    content: Lord
  - type: text
    content: ', and consider:'
  - type: text
    content: Whom have you ever treated like this?
  - type: text
    content: Should women eat their offspring,
  - type: text
    content: the children they have cared for?
  - type: text
    content: Should priest and prophet be killed
  - type: text
    content: in the sanctuary of the Lord?
  '21':
  - type: text
    content: “Young and old lie together
  - type: text
    content: in the dust of the streets;
  - type: text
    content: my young men and young women
  - type: text
    content: have fallen by the sword.
  - type: text
    content: You have slain them in the day of your anger;
  - type: text
    content: you have slaughtered them without pity.
  '22':
  - type: text
    content: “As you summon to a feast day,
  - type: text
    content: so you summoned against me terrors on every side.
  - type: text
    content: 'In the day of the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger
  - type: text
    content: no one escaped or survived;
  - type: text
    content: those I cared for and reared
  - type: text
    content: my enemy has destroyed.”
  '3':
  - type: text
    content: In fierce anger he has cut off
  - type: text
    content: every horn
  - type: note
    content: Or off / all the strength; or every king
  - type: note
    content: Horn here symbolizes strength.
  - type: text
    content: ' of Israel.'
  - type: text
    content: He has withdrawn his right hand
  - type: text
    content: at the approach of the enemy.
  - type: text
    content: He has burned in Jacob like a flaming fire
  - type: text
    content: that consumes everything around it.
  '4':
  - type: text
    content: Like an enemy he has strung his bow;
  - type: text
    content: his right hand is ready.
  - type: text
    content: Like a foe he has slain
  - type: text
    content: all who were pleasing to the eye;
  - type: text
    content: he has poured out his wrath like fire
  - type: text
    content: on the tent of Daughter Zion.
  '5':
  - type: text
    content: The Lord is like an enemy;
  - type: text
    content: he has swallowed up Israel.
  - type: text
    content: He has swallowed up all her palaces
  - type: text
    content: and destroyed her strongholds.
  - type: text
    content: He has multiplied mourning and lamentation
  - type: text
    content: for Daughter Judah.
  '6':
  - type: text
    content: He has laid waste his dwelling like a garden;
  - type: text
    content: he has destroyed his place of meeting.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has made Zion forget'
  - type: text
    content: her appointed festivals and her Sabbaths;
  - type: text
    content: in his fierce anger he has spurned
  - type: text
    content: both king and priest.
  '7':
  - type: text
    content: The Lord has rejected his altar
  - type: text
    content: and abandoned his sanctuary.
  - type: text
    content: He has given the walls of her palaces
  - type: text
    content: into the hands of the enemy;
  - type: text
    content: 'they have raised a shout in the house of the '
  - type: text
    content: Lord
  - type: text
    content: as on the day of an appointed festival.
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' determined to tear down'
  - type: text
    content: the wall around Daughter Zion.
  - type: text
    content: He stretched out a measuring line
  - type: text
    content: and did not withhold his hand from destroying.
  - type: text
    content: He made ramparts and walls lament;
  - type: text
    content: together they wasted away.
  '9':
  - type: text
    content: Her gates have sunk into the ground;
  - type: text
    content: their bars he has broken and destroyed.
  - type: text
    content: Her king and her princes are exiled among the nations,
  - type: text
    content: the law is no more,
  - type: text
    content: and her prophets no longer find
  - type: text
    content: 'visions from the '
  - type: text
    content: Lord
  - type: text
    content: .
