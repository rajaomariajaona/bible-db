document_id: 1CH.16,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Ministering Before the Ark
  - type: text
    content: 'They brought the ark of God and set it inside the tent that David had pitched for it, and they presented burnt offerings and fellowship offerings before God. '
  '10':
  - type: text
    content: Glory in his holy name;
  - type: text
    content: 'let the hearts of those who seek the '
  - type: text
    content: Lord
  - type: text
    content: ' rejoice.'
  '11':
  - type: text
    content: 'Look to the '
  - type: text
    content: Lord
  - type: text
    content: ' and his strength;'
  - type: text
    content: seek his face always.
  '12':
  - type: text
    content: Remember the wonders he has done,
  - type: text
    content: his miracles, and the judgments he pronounced,
  '13':
  - type: text
    content: you his servants, the descendants of Israel,
  - type: text
    content: his chosen ones, the children of Jacob.
  '14':
  - type: text
    content: 'He is the '
  - type: text
    content: Lord
  - type: text
    content: ' our God;'
  - type: text
    content: his judgments are in all the earth.
  '15':
  - type: text
    content: He remembers
  - type: note
    content: Some Septuagint manuscripts (see also Psalm 105:8); Hebrew Remember
  - type: text
    content: ' his covenant forever,'
  - type: text
    content: the promise he made, for a thousand generations,
  '16':
  - type: text
    content: the covenant he made with Abraham,
  - type: text
    content: the oath he swore to Isaac.
  '17':
  - type: text
    content: He confirmed it to Jacob as a decree,
  - type: text
    content: 'to Israel as an everlasting covenant:'
  '18':
  - type: text
    content: “To you I will give the land of Canaan
  - type: text
    content: as the portion you will inherit.”
  '19':
  - type: text
    content: When they were but few in number,
  - type: text
    content: few indeed, and strangers in it,
  '2':
  - type: text
    content: 'After David had finished sacrificing the burnt offerings and fellowship offerings, he blessed the people in the name of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '20':
  - type: text
    content: they
  - type: note
    content: One Hebrew manuscript, Septuagint and Vulgate (see also Psalm 105:12); most Hebrew manuscripts inherit, / 19 though you are but few in number, / few indeed, and strangers in it.” / 20 They
  - type: text
    content: ' wandered from nation to nation,'
  - type: text
    content: from one kingdom to another.
  '21':
  - type: text
    content: He allowed no one to oppress them;
  - type: text
    content: 'for their sake he rebuked kings:'
  '22':
  - type: text
    content: “Do not touch my anointed ones;
  - type: text
    content: do my prophets no harm.”
  '23':
  - type: text
    content: 'Sing to the '
  - type: text
    content: Lord
  - type: text
    content: ', all the earth;'
  - type: text
    content: proclaim his salvation day after day.
  '24':
  - type: text
    content: Declare his glory among the nations,
  - type: text
    content: his marvelous deeds among all peoples.
  '25':
  - type: text
    content: 'For great is the '
  - type: text
    content: Lord
  - type: text
    content: ' and most worthy of praise;'
  - type: text
    content: he is to be feared above all gods.
  '26':
  - type: text
    content: For all the gods of the nations are idols,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' made the heavens.'
  '27':
  - type: text
    content: Splendor and majesty are before him;
  - type: text
    content: strength and joy are in his dwelling place.
  '28':
  - type: text
    content: 'Ascribe to the '
  - type: text
    content: Lord
  - type: text
    content: ', all you families of nations,'
  - type: text
    content: 'ascribe to the '
  - type: text
    content: Lord
  - type: text
    content: ' glory and strength.'
  '29':
  - type: text
    content: 'Ascribe to the '
  - type: text
    content: Lord
  - type: text
    content: ' the glory due his name;'
  - type: text
    content: bring an offering and come before him.
  - type: text
    content: 'Worship the '
  - type: text
    content: Lord
  - type: text
    content: ' in the splendor of his'
  - type: note
    content: Or Lord with the splendor of
  - type: text
    content: ' holiness.'
  '3':
  - type: text
    content: Then he gave a loaf of bread, a cake of dates and a cake of raisins to each Israelite man and woman.
  '30':
  - type: text
    content: Tremble before him, all the earth!
  - type: text
    content: The world is firmly established; it cannot be moved.
  '31':
  - type: text
    content: Let the heavens rejoice, let the earth be glad;
  - type: text
    content: 'let them say among the nations, “The '
  - type: text
    content: Lord
  - type: text
    content: ' reigns!”'
  '32':
  - type: text
    content: Let the sea resound, and all that is in it;
  - type: text
    content: let the fields be jubilant, and everything in them!
  '33':
  - type: text
    content: Let the trees of the forest sing,
  - type: text
    content: 'let them sing for joy before the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for he comes to judge the earth.
  '34':
  - type: text
    content: 'Give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ', for he is good;'
  - type: text
    content: his love endures forever.
  '35':
  - type: text
    content: Cry out, “Save us, God our Savior;
  - type: text
    content: gather us and deliver us from the nations,
  - type: text
    content: that we may give thanks to your holy name,
  - type: text
    content: and glory in your praise.”
  '36':
  - type: text
    content: 'Praise be to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel,'
  - type: text
    content: from everlasting to everlasting.
  - type: text
    content: 'Then all the people said “Amen” and “Praise the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '37':
  - type: text
    content: 'David left Asaph and his associates before the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' to minister there regularly, according to each day’s requirements. '
  '38':
  - type: text
    content: He also left Obed-Edom and his sixty-eight associates to minister with them. Obed-Edom son of Jeduthun, and also Hosah, were gatekeepers.
  '39':
  - type: text
    content: 'David left Zadok the priest and his fellow priests before the tabernacle of the '
  - type: text
    content: Lord
  - type: text
    content: ' at the high place in Gibeon '
  '4':
  - type: text
    content: 'He appointed some of the Levites to minister before the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ', to extol,'
  - type: note
    content: Or petition; or invoke
  - type: text
    content: ' thank, and praise the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel: '
  '40':
  - type: text
    content: 'to present burnt offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ' on the altar of burnt offering regularly, morning and evening, in accordance with everything written in the Law of the '
  - type: text
    content: Lord
  - type: text
    content: ', which he had given Israel. '
  '41':
  - type: text
    content: 'With them were Heman and Jeduthun and the rest of those chosen and designated by name to give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ', “for his love endures forever.” '
  '42':
  - type: text
    content: Heman and Jeduthun were responsible for the sounding of the trumpets and cymbals and for the playing of the other instruments for sacred song. The sons of Jeduthun were stationed at the gate.
  '43':
  - type: text
    content: Then all the people left, each for their own home, and David returned home to bless his family.
  '5':
  - type: text
    content: Asaph was the chief, and next to him in rank were Zechariah, then Jaaziel,
  - type: note
    content: See 15:18,20; Hebrew Jeiel, possibly another name for Jaaziel.
  - type: text
    content: ' Shemiramoth, Jehiel, Mattithiah, Eliab, Benaiah, Obed-Edom and Jeiel. They were to play the lyres and harps, Asaph was to sound the cymbals, '
  '6':
  - type: text
    content: and Benaiah and Jahaziel the priests were to blow the trumpets regularly before the ark of the covenant of God.
  '7':
  - type: text
    content: 'That day David first appointed Asaph and his associates to give praise to the '
  - type: text
    content: Lord
  - type: text
    content: ' in this manner:'
  '8':
  - type: text
    content: 'Give praise to the '
  - type: text
    content: Lord
  - type: text
    content: ', proclaim his name;'
  - type: text
    content: make known among the nations what he has done.
  '9':
  - type: text
    content: Sing to him, sing praise to him;
  - type: text
    content: tell of all his wonderful acts.
