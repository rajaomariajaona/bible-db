document_id: 1CH.16,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ministering Before the Ark
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'They brought the ark of God and set it inside the tent that David had pitched for it, and they presented burnt offerings and fellowship offerings before God. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Glory in his holy name;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'let the hearts of those who seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' rejoice.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Look to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and his strength;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: seek his face always.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Remember the wonders he has done,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his miracles, and the judgments he pronounced,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: you his servants, the descendants of Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his chosen ones, the children of Jacob.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'He is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his judgments are in all the earth.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: He remembers
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Septuagint manuscripts (see also Psalm 105:8); Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Remember
      marker-yv: yv-n
    - type: text
      text: ' his covenant forever,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the promise he made, for a thousand generations,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: the covenant he made with Abraham,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the oath he swore to Isaac.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: He confirmed it to Jacob as a decree,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'to Israel as an everlasting covenant:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “To you I will give the land of Canaan
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as the portion you will inherit.”
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: When they were but few in number,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: few indeed, and strangers in it,
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'After David had finished sacrificing the burnt offerings and fellowship offerings, he blessed the people in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: they
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:18-20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'One Hebrew manuscript, Septuagint and Vulgate (see also Psalm 105:12); most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'inherit, / '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '19 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'though you are but few in number, / few indeed, and strangers in it.” / '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '20 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: They
      marker-yv: yv-n
    - type: text
      text: ' wandered from nation to nation,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from one kingdom to another.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: He allowed no one to oppress them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for their sake he rebuked kings:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “Do not touch my anointed ones;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do my prophets no harm.”
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Sing to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', all the earth;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: proclaim his salvation day after day.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Declare his glory among the nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his marvelous deeds among all peoples.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'For great is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and most worthy of praise;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is to be feared above all gods.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: For all the gods of the nations are idols,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' made the heavens.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Splendor and majesty are before him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: strength and joy are in his dwelling place.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ascribe to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', all you families of nations,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'ascribe to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' glory and strength.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ascribe to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' the glory due his name;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bring an offering and come before him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in the splendor of his'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' with the splendor of'
      marker-yv: yv-n
    - type: text
      text: ' holiness.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Then he gave a loaf of bread, a cake of dates and a cake of raisins to each Israelite man and woman.
  '30':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Tremble before him, all the earth!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The world is firmly established; it cannot be moved.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Let the heavens rejoice, let the earth be glad;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'let them say among the nations, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' reigns!”'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Let the sea resound, and all that is in it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let the fields be jubilant, and everything in them!
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Let the trees of the forest sing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'let them sing for joy before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he comes to judge the earth.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Give thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for he is good;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his love endures forever.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Cry out, “Save us, God our Savior;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gather us and deliver us from the nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that we may give thanks to your holy name,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and glory in your praise.”
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Praise be to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from everlasting to everlasting.
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Then all the people said “Amen” and “Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'David left Asaph and his associates before the ark of the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to minister there regularly, according to each day’s requirements. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: He also left Obed-Edom and his sixty-eight associates to minister with them. Obed-Edom son of Jeduthun, and also Hosah, were gatekeepers.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'David left Zadok the priest and his fellow priests before the tabernacle of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at the high place in Gibeon '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'He appointed some of the Levites to minister before the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', to extol,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: petition
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: invoke
      marker-yv: yv-n
    - type: text
      text: ' thank, and praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel: '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'to present burnt offerings to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' on the altar of burnt offering regularly, morning and evening, in accordance with everything written in the Law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', which he had given Israel. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'With them were Heman and Jeduthun and the rest of those chosen and designated by name to give thanks to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “for his love endures forever.” '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Heman and Jeduthun were responsible for the sounding of the trumpets and cymbals and for the playing of the other instruments for sacred song. The sons of Jeduthun were stationed at the gate.
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Then all the people left, each for their own home, and David returned home to bless his family.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Asaph was the chief, and next to him in rank were Zechariah, then Jaaziel,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'See 15:18,20; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jeiel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', possibly another name for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jaaziel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' Shemiramoth, Jehiel, Mattithiah, Eliab, Benaiah, Obed-Edom and Jeiel. They were to play the lyres and harps, Asaph was to sound the cymbals, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: and Benaiah and Jahaziel the priests were to blow the trumpets regularly before the ark of the covenant of God.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'That day David first appointed Asaph and his associates to give praise to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in this manner:'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Give praise to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', proclaim his name;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: make known among the nations what he has done.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Sing to him, sing praise to him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: tell of all his wonderful acts.
