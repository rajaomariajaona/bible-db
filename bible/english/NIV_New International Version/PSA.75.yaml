document_id: PSA.75
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 75
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 75:1-10 is numbered 75:2-11.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the director of music. To the tune of “Do Not Destroy.” A psalm of Asaph. A song.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: We praise you, God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: we praise you, for your Name is near;
- type: usfm
  marker: q2
  children:
  - type: text
    text: people tell of your wonderful deeds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: You say, “I choose the appointed time;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is I who judge with equity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: When the earth and all its people quake,
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is I who hold its pillars firm.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '75:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew has '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Selah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (a word of uncertain meaning) here.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: To the arrogant I say, ‘Boast no more,’
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to the wicked, ‘Do not lift up your horns.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '75:4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Horns '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: here symbolize strength; also in verses 5 and 10.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Do not lift your horns against heaven;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not speak so defiantly.’ ”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: No one from the east or the west
- type: usfm
  marker: q2
  children:
  - type: text
    text: or from the desert can exalt themselves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'It is God who judges:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He brings one down, he exalts another.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'In the hand of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is a cup'
- type: usfm
  marker: q2
  children:
  - type: text
    text: full of foaming wine mixed with spices;
- type: usfm
  marker: q1
  children:
  - type: text
    text: he pours it out, and all the wicked of the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: drink it down to its very dregs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: As for me, I will declare this forever;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will sing praise to the God of Jacob,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: who says, “I will cut off the horns of all the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the horns of the righteous will be lifted up.”
