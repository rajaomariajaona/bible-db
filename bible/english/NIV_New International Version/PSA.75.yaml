document_id: PSA.75,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 75In Hebrew texts 75:1-10 is numbered 75:2-11.
  - type: text
    content: For the director of music. To the tune of “Do Not Destroy.” A psalm of Asaph. A song.
  - type: text
    content: We praise you, God,
  - type: text
    content: we praise you, for your Name is near;
  - type: text
    content: people tell of your wonderful deeds.
  '10':
  - type: text
    content: who says, “I will cut off the horns of all the wicked,
  - type: text
    content: but the horns of the righteous will be lifted up.”
  '2':
  - type: text
    content: You say, “I choose the appointed time;
  - type: text
    content: it is I who judge with equity.
  '3':
  - type: text
    content: When the earth and all its people quake,
  - type: text
    content: it is I who hold its pillars firm.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here.
  '4':
  - type: text
    content: To the arrogant I say, ‘Boast no more,’
  - type: text
    content: and to the wicked, ‘Do not lift up your horns.
  - type: note
    content: Horns here symbolize strength; also in verses 5 and 10.
  '5':
  - type: text
    content: Do not lift your horns against heaven;
  - type: text
    content: do not speak so defiantly.’ ”
  '6':
  - type: text
    content: No one from the east or the west
  - type: text
    content: or from the desert can exalt themselves.
  '7':
  - type: text
    content: 'It is God who judges:'
  - type: text
    content: He brings one down, he exalts another.
  '8':
  - type: text
    content: 'In the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' is a cup'
  - type: text
    content: full of foaming wine mixed with spices;
  - type: text
    content: he pours it out, and all the wicked of the earth
  - type: text
    content: drink it down to its very dregs.
  '9':
  - type: text
    content: As for me, I will declare this forever;
  - type: text
    content: I will sing praise to the God of Jacob,
