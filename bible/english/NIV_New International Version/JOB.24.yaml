document_id: JOB.24
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Why does the Almighty not set times for judgment?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why must those who know him look in vain for such days?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: There are those who move boundary stones;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they pasture flocks they have stolen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They drive away the orphan’s donkey
- type: usfm
  marker: q2
  children:
  - type: text
    text: and take the widow’s ox in pledge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: They thrust the needy from the path
- type: usfm
  marker: q2
  children:
  - type: text
    text: and force all the poor of the land into hiding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Like wild donkeys in the desert,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the poor go about their labor of foraging food;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the wasteland provides food for their children.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: They gather fodder in the fields
- type: usfm
  marker: q2
  children:
  - type: text
    text: and glean in the vineyards of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Lacking clothes, they spend the night naked;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they have nothing to cover themselves in the cold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They are drenched by mountain rains
- type: usfm
  marker: q2
  children:
  - type: text
    text: and hug the rocks for lack of shelter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The fatherless child is snatched from the breast;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the infant of the poor is seized for a debt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Lacking clothes, they go about naked;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they carry the sheaves, but still go hungry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They crush olives among the terraces
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this word is uncertain.
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they tread the winepresses, yet suffer thirst.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The groans of the dying rise from the city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the souls of the wounded cry out for help.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But God charges no one with wrongdoing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “There are those who rebel against the light,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who do not know its ways
- type: usfm
  marker: q2
  children:
  - type: text
    text: or stay in its paths.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: When daylight is gone, the murderer rises up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: kills the poor and needy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and in the night steals forth like a thief.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The eye of the adulterer watches for dusk;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he thinks, ‘No eye will see me,’
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he keeps his face concealed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: In the dark, thieves break into houses,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but by day they shut themselves in;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they want nothing to do with the light.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For all of them, midnight is their morning;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they make friends with the terrors of darkness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Yet they are foam on the surface of the water;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their portion of the land is cursed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that no one goes to the vineyards.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: As heat and drought snatch away the melted snow,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so the grave snatches away those who have sinned.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The womb forgets them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the worm feasts on them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: the wicked are no longer remembered
- type: usfm
  marker: q2
  children:
  - type: text
    text: but are broken like a tree.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: They prey on the barren and childless woman,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to the widow they show no kindness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But God drags away the mighty by his power;
- type: usfm
  marker: q2
  children:
  - type: text
    text: though they become established, they have no assurance of life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: He may let them rest in a feeling of security,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but his eyes are on their ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: For a little while they are exalted, and then they are gone;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are brought low and gathered up like all others;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are cut off like heads of grain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “If this is not so, who can prove me false
- type: usfm
  marker: q2
  children:
  - type: text
    text: and reduce my words to nothing?”
