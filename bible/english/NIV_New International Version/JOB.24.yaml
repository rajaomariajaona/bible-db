document_id: JOB.24,111
type_code: eng
verses:
  '1':
  - type: text
    content: “Why does the Almighty not set times for judgment?
  - type: text
    content: Why must those who know him look in vain for such days?
  '10':
  - type: text
    content: Lacking clothes, they go about naked;
  - type: text
    content: they carry the sheaves, but still go hungry.
  '11':
  - type: text
    content: They crush olives among the terraces
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ;
  - type: text
    content: they tread the winepresses, yet suffer thirst.
  '12':
  - type: text
    content: The groans of the dying rise from the city,
  - type: text
    content: and the souls of the wounded cry out for help.
  - type: text
    content: But God charges no one with wrongdoing.
  '13':
  - type: text
    content: “There are those who rebel against the light,
  - type: text
    content: who do not know its ways
  - type: text
    content: or stay in its paths.
  '14':
  - type: text
    content: When daylight is gone, the murderer rises up,
  - type: text
    content: kills the poor and needy,
  - type: text
    content: and in the night steals forth like a thief.
  '15':
  - type: text
    content: The eye of the adulterer watches for dusk;
  - type: text
    content: he thinks, ‘No eye will see me,’
  - type: text
    content: and he keeps his face concealed.
  '16':
  - type: text
    content: In the dark, thieves break into houses,
  - type: text
    content: but by day they shut themselves in;
  - type: text
    content: they want nothing to do with the light.
  '17':
  - type: text
    content: For all of them, midnight is their morning;
  - type: text
    content: they make friends with the terrors of darkness.
  '18':
  - type: text
    content: “Yet they are foam on the surface of the water;
  - type: text
    content: their portion of the land is cursed,
  - type: text
    content: so that no one goes to the vineyards.
  '19':
  - type: text
    content: As heat and drought snatch away the melted snow,
  - type: text
    content: so the grave snatches away those who have sinned.
  '2':
  - type: text
    content: There are those who move boundary stones;
  - type: text
    content: they pasture flocks they have stolen.
  '20':
  - type: text
    content: The womb forgets them,
  - type: text
    content: the worm feasts on them;
  - type: text
    content: the wicked are no longer remembered
  - type: text
    content: but are broken like a tree.
  '21':
  - type: text
    content: They prey on the barren and childless woman,
  - type: text
    content: and to the widow they show no kindness.
  '22':
  - type: text
    content: But God drags away the mighty by his power;
  - type: text
    content: though they become established, they have no assurance of life.
  '23':
  - type: text
    content: He may let them rest in a feeling of security,
  - type: text
    content: but his eyes are on their ways.
  '24':
  - type: text
    content: For a little while they are exalted, and then they are gone;
  - type: text
    content: they are brought low and gathered up like all others;
  - type: text
    content: they are cut off like heads of grain.
  '25':
  - type: text
    content: “If this is not so, who can prove me false
  - type: text
    content: and reduce my words to nothing?”
  '3':
  - type: text
    content: They drive away the orphan’s donkey
  - type: text
    content: and take the widow’s ox in pledge.
  '4':
  - type: text
    content: They thrust the needy from the path
  - type: text
    content: and force all the poor of the land into hiding.
  '5':
  - type: text
    content: Like wild donkeys in the desert,
  - type: text
    content: the poor go about their labor of foraging food;
  - type: text
    content: the wasteland provides food for their children.
  '6':
  - type: text
    content: They gather fodder in the fields
  - type: text
    content: and glean in the vineyards of the wicked.
  '7':
  - type: text
    content: Lacking clothes, they spend the night naked;
  - type: text
    content: they have nothing to cover themselves in the cold.
  '8':
  - type: text
    content: They are drenched by mountain rains
  - type: text
    content: and hug the rocks for lack of shelter.
  '9':
  - type: text
    content: The fatherless child is snatched from the breast;
  - type: text
    content: the infant of the poor is seized for a debt.
