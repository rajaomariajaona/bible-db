document_id: JOB.24,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Why does the Almighty not set times for judgment?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why must those who know him look in vain for such days?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lacking clothes, they go about naked;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they carry the sheaves, but still go hungry.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They crush olives among the terraces
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this word is uncertain.
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they tread the winepresses, yet suffer thirst.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The groans of the dying rise from the city,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the souls of the wounded cry out for help.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But God charges no one with wrongdoing.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “There are those who rebel against the light,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who do not know its ways
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or stay in its paths.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When daylight is gone, the murderer rises up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: kills the poor and needy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and in the night steals forth like a thief.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The eye of the adulterer watches for dusk;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he thinks, ‘No eye will see me,’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he keeps his face concealed.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the dark, thieves break into houses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but by day they shut themselves in;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they want nothing to do with the light.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For all of them, midnight is their morning;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they make friends with the terrors of darkness.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Yet they are foam on the surface of the water;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their portion of the land is cursed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that no one goes to the vineyards.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As heat and drought snatch away the melted snow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so the grave snatches away those who have sinned.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There are those who move boundary stones;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they pasture flocks they have stolen.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The womb forgets them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the worm feasts on them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the wicked are no longer remembered
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but are broken like a tree.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They prey on the barren and childless woman,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to the widow they show no kindness.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But God drags away the mighty by his power;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though they become established, they have no assurance of life.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He may let them rest in a feeling of security,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but his eyes are on their ways.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For a little while they are exalted, and then they are gone;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are brought low and gathered up like all others;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are cut off like heads of grain.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If this is not so, who can prove me false
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and reduce my words to nothing?”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They drive away the orphan’s donkey
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and take the widow’s ox in pledge.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They thrust the needy from the path
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and force all the poor of the land into hiding.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like wild donkeys in the desert,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the poor go about their labor of foraging food;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wasteland provides food for their children.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They gather fodder in the fields
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and glean in the vineyards of the wicked.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lacking clothes, they spend the night naked;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they have nothing to cover themselves in the cold.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are drenched by mountain rains
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hug the rocks for lack of shelter.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The fatherless child is snatched from the breast;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the infant of the poor is seized for a debt.
