document_id: 1KI.21,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Naboth’s Vineyard
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some time later there was an incident involving a vineyard belonging to Naboth the Jezreelite. The vineyard was in Jezreel, close to the palace of Ahab king of Samaria. '
  '10':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: But seat two scoundrels opposite him and have them bring charges that he has cursed both God and the king. Then take him out and stone him to death.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the elders and nobles who lived in Naboth’s city did as Jezebel directed in the letters she had written to them. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They proclaimed a fast and seated Naboth in a prominent place among the people. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then two scoundrels came and sat opposite him and brought charges against Naboth before the people, saying, “Naboth has cursed both God and the king.” So they took him outside the city and stoned him to death. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they sent word to Jezebel: “Naboth has been stoned to death.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As soon as Jezebel heard that Naboth had been stoned to death, she said to Ahab, “Get up and take possession of the vineyard of Naboth the Jezreelite that he refused to sell you. He is no longer alive, but dead.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Ahab heard that Naboth was dead, he got up and went down to take possession of Naboth’s vineyard.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to Elijah the Tishbite: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Go down to meet Ahab king of Israel, who rules in Samaria. He is now in Naboth’s vineyard, where he has gone to take possession of it. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Say to him, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Have you not murdered a man and seized his property?’ Then say to him, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: In the place where dogs licked up Naboth’s blood, dogs will lick up your blood—yes, yours!’ ”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ahab said to Naboth, “Let me have your vineyard to use for a vegetable garden, since it is close to my palace. In exchange I will give you a better vineyard or, if you prefer, I will pay you whatever it is worth.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ahab said to Elijah, “So you have found me, my enemy!”
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I have found you,” he answered, “because you have sold yourself to do evil in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He says, ‘I am going to bring disaster on you. I will wipe out your descendants and cut off from Ahab every last male in Israel—slave or free.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Israel—every ruler or leader
      marker-yv: yv-n
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will make your house like that of Jeroboam son of Nebat and that of Baasha son of Ahijah, because you have aroused my anger and have caused Israel to sin.’
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And also concerning Jezebel the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: ‘Dogs will devour Jezebel by the wall of'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Most Hebrew manuscripts; a few Hebrew manuscripts, Vulgate and Syriac (see also 2 Kings 9:26) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the plot of ground at
      marker-yv: yv-n
    - type: text
      text: ' Jezreel.’'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Dogs will eat those belonging to Ahab who die in the city, and the birds will feed on those who die in the country.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(There was never anyone like Ahab, who sold himself to do evil in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', urged on by Jezebel his wife. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He behaved in the vilest manner by going after idols, like the Amorites the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' drove out before Israel.)'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Ahab heard these words, he tore his clothes, put on sackcloth and fasted. He lay in sackcloth and went around meekly.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to Elijah the Tishbite: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Have you noticed how Ahab has humbled himself before me? Because he has humbled himself, I will not bring this disaster in his day, but I will bring it on his house in the days of his son.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Naboth replied, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' forbid that I should give you the inheritance of my ancestors.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Ahab went home, sullen and angry because Naboth the Jezreelite had said, “I will not give you the inheritance of my ancestors.” He lay on his bed sulking and refused to eat.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: His wife Jezebel came in and asked him, “Why are you so sullen? Why won’t you eat?”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He answered her, “Because I said to Naboth the Jezreelite, ‘Sell me your vineyard; or if you prefer, I will give you another vineyard in its place.’ But he said, ‘I will not give you my vineyard.’ ”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jezebel his wife said, “Is this how you act as king over Israel? Get up and eat! Cheer up. I’ll get you the vineyard of Naboth the Jezreelite.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So she wrote letters in Ahab’s name, placed his seal on them, and sent them to the elders and nobles who lived in Naboth’s city with him. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In those letters she wrote:'
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“Proclaim a day of fasting and seat Naboth in a prominent place among the people. '
