document_id: 1KI.21,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Naboth’s Vineyard
  - type: text
    content: 'Some time later there was an incident involving a vineyard belonging to Naboth the Jezreelite. The vineyard was in Jezreel, close to the palace of Ahab king of Samaria. '
  '10':
  - type: text
    content: But seat two scoundrels opposite him and have them bring charges that he has cursed both God and the king. Then take him out and stone him to death.”
  '11':
  - type: text
    content: 'So the elders and nobles who lived in Naboth’s city did as Jezebel directed in the letters she had written to them. '
  '12':
  - type: text
    content: 'They proclaimed a fast and seated Naboth in a prominent place among the people. '
  '13':
  - type: text
    content: 'Then two scoundrels came and sat opposite him and brought charges against Naboth before the people, saying, “Naboth has cursed both God and the king.” So they took him outside the city and stoned him to death. '
  '14':
  - type: text
    content: 'Then they sent word to Jezebel: “Naboth has been stoned to death.”'
  '15':
  - type: text
    content: 'As soon as Jezebel heard that Naboth had been stoned to death, she said to Ahab, “Get up and take possession of the vineyard of Naboth the Jezreelite that he refused to sell you. He is no longer alive, but dead.” '
  '16':
  - type: text
    content: When Ahab heard that Naboth was dead, he got up and went down to take possession of Naboth’s vineyard.
  '17':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Elijah the Tishbite: '
  '18':
  - type: text
    content: '“Go down to meet Ahab king of Israel, who rules in Samaria. He is now in Naboth’s vineyard, where he has gone to take possession of it. '
  '19':
  - type: text
    content: 'Say to him, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Have you not murdered a man and seized his property?’ Then say to him, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: In the place where dogs licked up Naboth’s blood, dogs will lick up your blood—yes, yours!’ ”'
  '2':
  - type: text
    content: Ahab said to Naboth, “Let me have your vineyard to use for a vegetable garden, since it is close to my palace. In exchange I will give you a better vineyard or, if you prefer, I will pay you whatever it is worth.”
  '20':
  - type: text
    content: Ahab said to Elijah, “So you have found me, my enemy!”
  - type: text
    content: '“I have found you,” he answered, “because you have sold yourself to do evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '21':
  - type: text
    content: He says, ‘I am going to bring disaster on you. I will wipe out your descendants and cut off from Ahab every last male in Israel—slave or free.
  - type: note
    content: Or Israel—every ruler or leader
  - type: text
    content: ' '
  '22':
  - type: text
    content: I will make your house like that of Jeroboam son of Nebat and that of Baasha son of Ahijah, because you have aroused my anger and have caused Israel to sin.’
  '23':
  - type: text
    content: '“And also concerning Jezebel the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘Dogs will devour Jezebel by the wall of'
  - type: note
    content: Most Hebrew manuscripts; a few Hebrew manuscripts, Vulgate and Syriac (see also 2 Kings 9:26) the plot of ground at
  - type: text
    content: ' Jezreel.’'
  '24':
  - type: text
    content: “Dogs will eat those belonging to Ahab who die in the city, and the birds will feed on those who die in the country.”
  '25':
  - type: text
    content: '(There was never anyone like Ahab, who sold himself to do evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', urged on by Jezebel his wife. '
  '26':
  - type: text
    content: 'He behaved in the vilest manner by going after idols, like the Amorites the '
  - type: text
    content: Lord
  - type: text
    content: ' drove out before Israel.)'
  '27':
  - type: text
    content: When Ahab heard these words, he tore his clothes, put on sackcloth and fasted. He lay in sackcloth and went around meekly.
  '28':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Elijah the Tishbite: '
  '29':
  - type: text
    content: “Have you noticed how Ahab has humbled himself before me? Because he has humbled himself, I will not bring this disaster in his day, but I will bring it on his house in the days of his son.”
  '3':
  - type: text
    content: 'But Naboth replied, “The '
  - type: text
    content: Lord
  - type: text
    content: ' forbid that I should give you the inheritance of my ancestors.”'
  '4':
  - type: text
    content: So Ahab went home, sullen and angry because Naboth the Jezreelite had said, “I will not give you the inheritance of my ancestors.” He lay on his bed sulking and refused to eat.
  '5':
  - type: text
    content: His wife Jezebel came in and asked him, “Why are you so sullen? Why won’t you eat?”
  '6':
  - type: text
    content: He answered her, “Because I said to Naboth the Jezreelite, ‘Sell me your vineyard; or if you prefer, I will give you another vineyard in its place.’ But he said, ‘I will not give you my vineyard.’ ”
  '7':
  - type: text
    content: Jezebel his wife said, “Is this how you act as king over Israel? Get up and eat! Cheer up. I’ll get you the vineyard of Naboth the Jezreelite.”
  '8':
  - type: text
    content: 'So she wrote letters in Ahab’s name, placed his seal on them, and sent them to the elders and nobles who lived in Naboth’s city with him. '
  '9':
  - type: text
    content: 'In those letters she wrote:'
  - type: text
    content: '“Proclaim a day of fasting and seat Naboth in a prominent place among the people. '
