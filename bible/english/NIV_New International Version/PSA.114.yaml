document_id: PSA.114,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 114
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: When Israel came out of Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Jacob from a people of foreign tongue,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Judah became God’s sanctuary,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Israel his dominion.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The sea looked and fled,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Jordan turned back;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: the mountains leaped like rams,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the hills like lambs.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Why was it, sea, that you fled?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why, Jordan, did you turn back?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Why, mountains, did you leap like rams,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you hills, like lambs?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tremble, earth, at the presence of the Lord,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the presence of the God of Jacob,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: who turned the rock into a pool,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the hard rock into springs of water.
