document_id: PSA.114,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 114
  - type: text
    content: When Israel came out of Egypt,
  - type: text
    content: Jacob from a people of foreign tongue,
  '2':
  - type: text
    content: Judah became God’s sanctuary,
  - type: text
    content: Israel his dominion.
  '3':
  - type: text
    content: The sea looked and fled,
  - type: text
    content: the Jordan turned back;
  '4':
  - type: text
    content: the mountains leaped like rams,
  - type: text
    content: the hills like lambs.
  '5':
  - type: text
    content: Why was it, sea, that you fled?
  - type: text
    content: Why, Jordan, did you turn back?
  '6':
  - type: text
    content: Why, mountains, did you leap like rams,
  - type: text
    content: you hills, like lambs?
  '7':
  - type: text
    content: Tremble, earth, at the presence of the Lord,
  - type: text
    content: at the presence of the God of Jacob,
  '8':
  - type: text
    content: who turned the rock into a pool,
  - type: text
    content: the hard rock into springs of water.
