document_id: GEN.33,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob Meets Esau
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jacob looked up and there was Esau, coming with his four hundred men; so he divided the children among Leah, Rachel and the two female servants. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“No, please!” said Jacob. “If I have found favor in your eyes, accept this gift from me. For to see your face is like seeing the face of God, now that you have received me favorably. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Please accept the present that was brought to you, for God has been gracious to me and I have all I need.” And because Jacob insisted, Esau accepted it.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Then Esau said, “Let us be on our way; I’ll accompany you.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But Jacob said to him, “My lord knows that the children are tender and that I must care for the ewes and cows that are nursing their young. If they are driven hard just one day, all the animals will die. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: So let my lord go on ahead of his servant, while I move along slowly at the pace of the flocks and herds before me and the pace of the children, until I come to my lord in Seir.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Esau said, “Then let me leave some of my men with you.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “But why do that?” Jacob asked. “Just let me find favor in the eyes of my lord.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So that day Esau started on his way back to Seir. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Jacob, however, went to Sukkoth, where he built a place for himself and made shelters for his livestock. That is why the place is called Sukkoth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sukkoth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: shelters
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: After Jacob came from Paddan Aram,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Northwest Mesopotamia
      marker-yv: yv-n
    - type: text
      text: ' he arrived safely at the city of Shechem in Canaan and camped within sight of the city. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: For a hundred pieces of silver,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: hundred kesitahs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; a kesitah was a unit of money of unknown weight and value.
      marker-yv: yv-n
    - type: text
      text: ' he bought from the sons of Hamor, the father of Shechem, the plot of ground where he pitched his tent. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He put the female servants and their children in front, Leah and her children next, and Rachel and Joseph in the rear. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: There he set up an altar and called it El Elohe Israel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'El Elohe Israel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'can mean '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'El is the God of Israel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mighty is the God of Israel.
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: He himself went on ahead and bowed down to the ground seven times as he approached his brother.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'But Esau ran to meet Jacob and embraced him; he threw his arms around his neck and kissed him. And they wept. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Then Esau looked up and saw the women and children. “Who are these with you?” he asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jacob answered, “They are the children God has graciously given your servant.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then the female servants and their children approached and bowed down. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Next, Leah and her children came and bowed down. Last of all came Joseph and Rachel, and they too bowed down.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Esau asked, “What’s the meaning of all these flocks and herds I met?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “To find favor in your eyes, my lord,” he said.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: But Esau said, “I already have plenty, my brother. Keep what you have for yourself.”
