document_id: GEN.33,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob Meets Esau
  - type: text
    content: 'Jacob looked up and there was Esau, coming with his four hundred men; so he divided the children among Leah, Rachel and the two female servants. '
  '10':
  - type: text
    content: '“No, please!” said Jacob. “If I have found favor in your eyes, accept this gift from me. For to see your face is like seeing the face of God, now that you have received me favorably. '
  '11':
  - type: text
    content: Please accept the present that was brought to you, for God has been gracious to me and I have all I need.” And because Jacob insisted, Esau accepted it.
  '12':
  - type: text
    content: Then Esau said, “Let us be on our way; I’ll accompany you.”
  '13':
  - type: text
    content: 'But Jacob said to him, “My lord knows that the children are tender and that I must care for the ewes and cows that are nursing their young. If they are driven hard just one day, all the animals will die. '
  '14':
  - type: text
    content: So let my lord go on ahead of his servant, while I move along slowly at the pace of the flocks and herds before me and the pace of the children, until I come to my lord in Seir.”
  '15':
  - type: text
    content: Esau said, “Then let me leave some of my men with you.”
  - type: text
    content: “But why do that?” Jacob asked. “Just let me find favor in the eyes of my lord.”
  '16':
  - type: text
    content: 'So that day Esau started on his way back to Seir. '
  '17':
  - type: text
    content: Jacob, however, went to Sukkoth, where he built a place for himself and made shelters for his livestock. That is why the place is called Sukkoth.
  - type: note
    content: Sukkoth means shelters.
  '18':
  - type: text
    content: After Jacob came from Paddan Aram,
  - type: note
    content: That is, Northwest Mesopotamia
  - type: text
    content: ' he arrived safely at the city of Shechem in Canaan and camped within sight of the city. '
  '19':
  - type: text
    content: For a hundred pieces of silver,
  - type: note
    content: Hebrew hundred kesitahs; a kesitah was a unit of money of unknown weight and value.
  - type: text
    content: ' he bought from the sons of Hamor, the father of Shechem, the plot of ground where he pitched his tent. '
  '2':
  - type: text
    content: 'He put the female servants and their children in front, Leah and her children next, and Rachel and Joseph in the rear. '
  '20':
  - type: text
    content: There he set up an altar and called it El Elohe Israel.
  - type: note
    content: El Elohe Israel can mean El is the God of Israel or mighty is the God of Israel.
  '3':
  - type: text
    content: He himself went on ahead and bowed down to the ground seven times as he approached his brother.
  '4':
  - type: text
    content: 'But Esau ran to meet Jacob and embraced him; he threw his arms around his neck and kissed him. And they wept. '
  '5':
  - type: text
    content: Then Esau looked up and saw the women and children. “Who are these with you?” he asked.
  - type: text
    content: Jacob answered, “They are the children God has graciously given your servant.”
  '6':
  - type: text
    content: 'Then the female servants and their children approached and bowed down. '
  '7':
  - type: text
    content: Next, Leah and her children came and bowed down. Last of all came Joseph and Rachel, and they too bowed down.
  '8':
  - type: text
    content: Esau asked, “What’s the meaning of all these flocks and herds I met?”
  - type: text
    content: “To find favor in your eyes, my lord,” he said.
  '9':
  - type: text
    content: But Esau said, “I already have plenty, my brother. Keep what you have for yourself.”
