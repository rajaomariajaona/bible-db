document_id: JOB.7,111
type_code: eng
verses:
  '1':
  - type: text
    content: “Do not mortals have hard service on earth?
  - type: text
    content: Are not their days like those of hired laborers?
  '10':
  - type: text
    content: He will never come to his house again;
  - type: text
    content: his place will know him no more.
  '11':
  - type: text
    content: “Therefore I will not keep silent;
  - type: text
    content: I will speak out in the anguish of my spirit,
  - type: text
    content: I will complain in the bitterness of my soul.
  '12':
  - type: text
    content: Am I the sea, or the monster of the deep,
  - type: text
    content: that you put me under guard?
  '13':
  - type: text
    content: When I think my bed will comfort me
  - type: text
    content: and my couch will ease my complaint,
  '14':
  - type: text
    content: even then you frighten me with dreams
  - type: text
    content: and terrify me with visions,
  '15':
  - type: text
    content: so that I prefer strangling and death,
  - type: text
    content: rather than this body of mine.
  '16':
  - type: text
    content: I despise my life; I would not live forever.
  - type: text
    content: Let me alone; my days have no meaning.
  '17':
  - type: text
    content: “What is mankind that you make so much of them,
  - type: text
    content: that you give them so much attention,
  '18':
  - type: text
    content: that you examine them every morning
  - type: text
    content: and test them every moment?
  '19':
  - type: text
    content: Will you never look away from me,
  - type: text
    content: or let me alone even for an instant?
  '2':
  - type: text
    content: Like a slave longing for the evening shadows,
  - type: text
    content: or a hired laborer waiting to be paid,
  '20':
  - type: text
    content: If I have sinned, what have I done to you,
  - type: text
    content: you who see everything we do?
  - type: text
    content: Why have you made me your target?
  - type: text
    content: Have I become a burden to you?
  - type: note
    content: A few manuscripts of the Masoretic Text, an ancient Hebrew scribal tradition and Septuagint; most manuscripts of the Masoretic Text I have become a burden to myself.
  '21':
  - type: text
    content: Why do you not pardon my offenses
  - type: text
    content: and forgive my sins?
  - type: text
    content: For I will soon lie down in the dust;
  - type: text
    content: you will search for me, but I will be no more.”
  '3':
  - type: text
    content: so I have been allotted months of futility,
  - type: text
    content: and nights of misery have been assigned to me.
  '4':
  - type: text
    content: When I lie down I think, ‘How long before I get up?’
  - type: text
    content: The night drags on, and I toss and turn until dawn.
  '5':
  - type: text
    content: My body is clothed with worms and scabs,
  - type: text
    content: my skin is broken and festering.
  '6':
  - type: text
    content: “My days are swifter than a weaver’s shuttle,
  - type: text
    content: and they come to an end without hope.
  '7':
  - type: text
    content: Remember, O God, that my life is but a breath;
  - type: text
    content: my eyes will never see happiness again.
  '8':
  - type: text
    content: The eye that now sees me will see me no longer;
  - type: text
    content: you will look for me, but I will be no more.
  '9':
  - type: text
    content: As a cloud vanishes and is gone,
  - type: text
    content: so one who goes down to the grave does not return.
