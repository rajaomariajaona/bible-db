document_id: JOB.7,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “Do not mortals have hard service on earth?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Are not their days like those of hired laborers?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: He will never come to his house again;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his place will know him no more.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “Therefore I will not keep silent;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will speak out in the anguish of my spirit,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will complain in the bitterness of my soul.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Am I the sea, or the monster of the deep,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you put me under guard?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: When I think my bed will comfort me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my couch will ease my complaint,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: even then you frighten me with dreams
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and terrify me with visions,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: so that I prefer strangling and death,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rather than this body of mine.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: I despise my life; I would not live forever.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let me alone; my days have no meaning.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “What is mankind that you make so much of them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you give them so much attention,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: that you examine them every morning
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and test them every moment?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Will you never look away from me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or let me alone even for an instant?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Like a slave longing for the evening shadows,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or a hired laborer waiting to be paid,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: If I have sinned, what have I done to you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who see everything we do?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why have you made me your target?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Have I become a burden to you?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A few manuscripts of the Masoretic Text, an ancient Hebrew scribal tradition and Septuagint; most manuscripts of the Masoretic Text '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: I have become a burden to myself.
      marker-yv: yv-n
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Why do you not pardon my offenses
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and forgive my sins?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I will soon lie down in the dust;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will search for me, but I will be no more.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: so I have been allotted months of futility,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and nights of misery have been assigned to me.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: When I lie down I think, ‘How long before I get up?’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The night drags on, and I toss and turn until dawn.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: My body is clothed with worms and scabs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my skin is broken and festering.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “My days are swifter than a weaver’s shuttle,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they come to an end without hope.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Remember, O God, that my life is but a breath;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my eyes will never see happiness again.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The eye that now sees me will see me no longer;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will look for me, but I will be no more.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: As a cloud vanishes and is gone,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so one who goes down to the grave does not return.
