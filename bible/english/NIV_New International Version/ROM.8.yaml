document_id: ROM.8,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Life Through the Spirit
  - type: text
    content: 'Therefore, there is now no condemnation for those who are in Christ Jesus, '
  '10':
  - type: text
    content: But if Christ is in you, then even though your body is subject to death because of sin, the Spirit gives life
  - type: note
    content: Or you, your body is dead because of sin, yet your spirit is alive
  - type: text
    content: ' because of righteousness. '
  '11':
  - type: text
    content: And if the Spirit of him who raised Jesus from the dead is living in you, he who raised Christ from the dead will also give life to your mortal bodies because of
  - type: note
    content: Some manuscripts bodies through
  - type: text
    content: ' his Spirit who lives in you.'
  '12':
  - type: text
    content: 'Therefore, brothers and sisters, we have an obligation—but it is not to the flesh, to live according to it. '
  '13':
  - type: text
    content: For if you live according to the flesh, you will die; but if by the Spirit you put to death the misdeeds of the body, you will live.
  '14':
  - type: text
    content: 'For those who are led by the Spirit of God are the children of God. '
  '15':
  - type: text
    content: The Spirit you received does not make you slaves, so that you live in fear again; rather, the Spirit you received brought about your adoption to sonship.
  - type: note
    content: The Greek word for adoption to sonship is a term referring to the full legal standing of an adopted male heir in Roman culture; also in verse 23.
  - type: text
    content: ' And by him we cry, “'
  - type: text
    content: Abba,
  - type: note
    content: Aramaic for father
  - type: text
    content: ' Father.” '
  '16':
  - type: text
    content: 'The Spirit himself testifies with our spirit that we are God’s children. '
  '17':
  - type: text
    content: Now if we are children, then we are heirs—heirs of God and co-heirs with Christ, if indeed we share in his sufferings in order that we may also share in his glory.
  - type: heading
    content: Present Suffering and Future Glory
  '18':
  - type: text
    content: 'I consider that our present sufferings are not worth comparing with the glory that will be revealed in us. '
  '19':
  - type: text
    content: 'For the creation waits in eager expectation for the children of God to be revealed. '
  '2':
  - type: text
    content: because through Christ Jesus the law of the Spirit who gives life has set you
  - type: note
    content: The Greek is singular; some manuscripts me
  - type: text
    content: ' free from the law of sin and death. '
  '20':
  - type: text
    content: 'For the creation was subjected to frustration, not by its own choice, but by the will of the one who subjected it, in hope '
  '21':
  - type: text
    content: that
  - type: note
    content: Or subjected it in hope. 21 For
  - type: text
    content: ' the creation itself will be liberated from its bondage to decay and brought into the freedom and glory of the children of God.'
  '22':
  - type: text
    content: 'We know that the whole creation has been groaning as in the pains of childbirth right up to the present time. '
  '23':
  - type: text
    content: 'Not only so, but we ourselves, who have the firstfruits of the Spirit, groan inwardly as we wait eagerly for our adoption to sonship, the redemption of our bodies. '
  '24':
  - type: text
    content: 'For in this hope we were saved. But hope that is seen is no hope at all. Who hopes for what they already have? '
  '25':
  - type: text
    content: But if we hope for what we do not yet have, we wait for it patiently.
  '26':
  - type: text
    content: 'In the same way, the Spirit helps us in our weakness. We do not know what we ought to pray for, but the Spirit himself intercedes for us through wordless groans. '
  '27':
  - type: text
    content: And he who searches our hearts knows the mind of the Spirit, because the Spirit intercedes for God’s people in accordance with the will of God.
  '28':
  - type: text
    content: And we know that in all things God works for the good of those who love him, who
  - type: note
    content: Or that all things work together for good to those who love God, who; or that in all things God works together with those who love him to bring about what is good—with those who
  - type: text
    content: ' have been called according to his purpose. '
  '29':
  - type: text
    content: 'For those God foreknew he also predestined to be conformed to the image of his Son, that he might be the firstborn among many brothers and sisters. '
  '3':
  - type: text
    content: For what the law was powerless to do because it was weakened by the flesh,
  - type: note
    content: In contexts like this, the Greek word for flesh (sarx) refers to the sinful state of human beings, often presented as a power in opposition to the Spirit; also in verses 4-13.
  - type: text
    content: ' God did by sending his own Son in the likeness of sinful flesh to be a sin offering.'
  - type: note
    content: Or flesh, for sin
  - type: text
    content: ' And so he condemned sin in the flesh, '
  '30':
  - type: text
    content: And those he predestined, he also called; those he called, he also justified; those he justified, he also glorified.
  - type: heading
    content: More Than Conquerors
  '31':
  - type: text
    content: 'What, then, shall we say in response to these things? If God is for us, who can be against us? '
  '32':
  - type: text
    content: 'He who did not spare his own Son, but gave him up for us all—how will he not also, along with him, graciously give us all things? '
  '33':
  - type: text
    content: 'Who will bring any charge against those whom God has chosen? It is God who justifies. '
  '34':
  - type: text
    content: 'Who then is the one who condemns? No one. Christ Jesus who died—more than that, who was raised to life—is at the right hand of God and is also interceding for us. '
  '35':
  - type: text
    content: 'Who shall separate us from the love of Christ? Shall trouble or hardship or persecution or famine or nakedness or danger or sword? '
  '36':
  - type: text
    content: 'As it is written:'
  - type: text
    content: “For your sake we face death all day long;
  - type: text
    content: we are considered as sheep to be slaughtered.”
  - type: note
    content: Psalm 44:22
  '37':
  - type: text
    content: 'No, in all these things we are more than conquerors through him who loved us. '
  '38':
  - type: text
    content: For I am convinced that neither death nor life, neither angels nor demons,
  - type: note
    content: Or nor heavenly rulers
  - type: text
    content: ' neither the present nor the future, nor any powers, '
  '39':
  - type: text
    content: neither height nor depth, nor anything else in all creation, will be able to separate us from the love of God that is in Christ Jesus our Lord.
  '4':
  - type: text
    content: in order that the righteous requirement of the law might be fully met in us, who do not live according to the flesh but according to the Spirit.
  '5':
  - type: text
    content: 'Those who live according to the flesh have their minds set on what the flesh desires; but those who live in accordance with the Spirit have their minds set on what the Spirit desires. '
  '6':
  - type: text
    content: 'The mind governed by the flesh is death, but the mind governed by the Spirit is life and peace. '
  '7':
  - type: text
    content: 'The mind governed by the flesh is hostile to God; it does not submit to God’s law, nor can it do so. '
  '8':
  - type: text
    content: Those who are in the realm of the flesh cannot please God.
  '9':
  - type: text
    content: 'You, however, are not in the realm of the flesh but are in the realm of the Spirit, if indeed the Spirit of God lives in you. And if anyone does not have the Spirit of Christ, they do not belong to Christ. '
