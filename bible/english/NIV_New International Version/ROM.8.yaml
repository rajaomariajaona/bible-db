document_id: ROM.8,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Life Through the Spirit
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, there is now no condemnation for those who are in Christ Jesus, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if Christ is in you, then even though your body is subject to death because of sin, the Spirit gives life
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: you, your body is dead because of sin, yet your spirit is alive
      marker-yv: yv-n
    - type: text
      text: ' because of righteousness. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And if the Spirit of him who raised Jesus from the dead is living in you, he who raised Christ from the dead will also give life to your mortal bodies because of
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: bodies through
      marker-yv: yv-n
    - type: text
      text: ' his Spirit who lives in you.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, brothers and sisters, we have an obligation—but it is not to the flesh, to live according to it. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For if you live according to the flesh, you will die; but if by the Spirit you put to death the misdeeds of the body, you will live.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For those who are led by the Spirit of God are the children of God. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Spirit you received does not make you slaves, so that you live in fear again; rather, the Spirit you received brought about your adoption to sonship.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek word for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'adoption to sonship '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: is a term referring to the full legal standing of an adopted male heir in Roman culture; also in verse 23.
      marker-yv: yv-n
    - type: text
      text: ' And by him we cry, “'
    - type: usfm
      marker: tl
      children:
      - type: text
        text: Abba,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Aramaic for '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: father
      marker-yv: yv-n
    - type: text
      text: ' Father.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Spirit himself testifies with our spirit that we are God’s children. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now if we are children, then we are heirs—heirs of God and co-heirs with Christ, if indeed we share in his sufferings in order that we may also share in his glory.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Present Suffering and Future Glory
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I consider that our present sufferings are not worth comparing with the glory that will be revealed in us. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the creation waits in eager expectation for the children of God to be revealed. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: because through Christ Jesus the law of the Spirit who gives life has set you
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek is singular; some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: me
      marker-yv: yv-n
    - type: text
      text: ' free from the law of sin and death. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the creation was subjected to frustration, not by its own choice, but by the will of the one who subjected it, in hope '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: that
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:20,21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'subjected it in hope. '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '21 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: For
      marker-yv: yv-n
    - type: text
      text: ' the creation itself will be liberated from its bondage to decay and brought into the freedom and glory of the children of God.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We know that the whole creation has been groaning as in the pains of childbirth right up to the present time. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Not only so, but we ourselves, who have the firstfruits of the Spirit, groan inwardly as we wait eagerly for our adoption to sonship, the redemption of our bodies. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For in this hope we were saved. But hope that is seen is no hope at all. Who hopes for what they already have? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if we hope for what we do not yet have, we wait for it patiently.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the same way, the Spirit helps us in our weakness. We do not know what we ought to pray for, but the Spirit himself intercedes for us through wordless groans. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he who searches our hearts knows the mind of the Spirit, because the Spirit intercedes for God’s people in accordance with the will of God.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And we know that in all things God works for the good of those who love him, who
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: that all things work together for good to those who love God, who
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: that in all things God works together with those who love him to bring about what is good—with those who
      marker-yv: yv-n
    - type: text
      text: ' have been called according to his purpose. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For those God foreknew he also predestined to be conformed to the image of his Son, that he might be the firstborn among many brothers and sisters. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For what the law was powerless to do because it was weakened by the flesh,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'In contexts like this, the Greek word for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'flesh '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: tl
          children:
          - type: text
            text: sarx
        - type: text
          text: ) refers to the sinful state of human beings, often presented as a power in opposition to the Spirit; also in verses 4-13.
      marker-yv: yv-n
    - type: text
      text: ' God did by sending his own Son in the likeness of sinful flesh to be a sin offering.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: flesh, for sin
      marker-yv: yv-n
    - type: text
      text: ' And so he condemned sin in the flesh, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And those he predestined, he also called; those he called, he also justified; those he justified, he also glorified.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: More Than Conquerors
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What, then, shall we say in response to these things? If God is for us, who can be against us? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He who did not spare his own Son, but gave him up for us all—how will he not also, along with him, graciously give us all things? '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who will bring any charge against those whom God has chosen? It is God who justifies. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who then is the one who condemns? No one. Christ Jesus who died—more than that, who was raised to life—is at the right hand of God and is also interceding for us. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Who shall separate us from the love of Christ? Shall trouble or hardship or persecution or famine or nakedness or danger or sword? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As it is written:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For your sake we face death all day long;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we are considered as sheep to be slaughtered.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalm 44:22
      marker-yv: yv-n
  '37':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'No, in all these things we are more than conquerors through him who loved us. '
  '38':
  - type: usfm
    marker: m
    children:
    - type: text
      text: For I am convinced that neither death nor life, neither angels nor demons,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nor heavenly rulers
      marker-yv: yv-n
    - type: text
      text: ' neither the present nor the future, nor any powers, '
  '39':
  - type: usfm
    marker: m
    children:
    - type: text
      text: neither height nor depth, nor anything else in all creation, will be able to separate us from the love of God that is in Christ Jesus our Lord.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: in order that the righteous requirement of the law might be fully met in us, who do not live according to the flesh but according to the Spirit.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those who live according to the flesh have their minds set on what the flesh desires; but those who live in accordance with the Spirit have their minds set on what the Spirit desires. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The mind governed by the flesh is death, but the mind governed by the Spirit is life and peace. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The mind governed by the flesh is hostile to God; it does not submit to God’s law, nor can it do so. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Those who are in the realm of the flesh cannot please God.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You, however, are not in the realm of the flesh but are in the realm of the Spirit, if indeed the Spirit of God lives in you. And if anyone does not have the Spirit of Christ, they do not belong to Christ. '
