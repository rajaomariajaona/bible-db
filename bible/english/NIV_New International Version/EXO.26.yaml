document_id: EXO.26,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Tabernacle
  - type: text
    content: '“Make the tabernacle with ten curtains of finely twisted linen and blue, purple and scarlet yarn, with cherubim woven into them by a skilled worker. '
  '10':
  - type: text
    content: 'Make fifty loops along the edge of the end curtain in one set and also along the edge of the end curtain in the other set. '
  '11':
  - type: text
    content: 'Then make fifty bronze clasps and put them in the loops to fasten the tent together as a unit. '
  '12':
  - type: text
    content: 'As for the additional length of the tent curtains, the half curtain that is left over is to hang down at the rear of the tabernacle. '
  '13':
  - type: text
    content: The tent curtains will be a cubit
  - type: note
    content: That is, about 18 inches or about 45 centimeters
  - type: text
    content: ' longer on both sides; what is left will hang over the sides of the tabernacle so as to cover it. '
  '14':
  - type: text
    content: Make for the tent a covering of ram skins dyed red, and over that a covering of the other durable leather.
  - type: note
    content: Possibly the hides of large aquatic mammals (see 25:5)
  '15':
  - type: text
    content: '“Make upright frames of acacia wood for the tabernacle. '
  '16':
  - type: text
    content: Each frame is to be ten cubits long and a cubit and a half wide,
  - type: note
    content: That is, about 15 feet long and 2 1/4 feet wide or about 4.5 meters long and 68 centimeters wide
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'with two projections set parallel to each other. Make all the frames of the tabernacle in this way. '
  '18':
  - type: text
    content: 'Make twenty frames for the south side of the tabernacle '
  '19':
  - type: text
    content: 'and make forty silver bases to go under them—two bases for each frame, one under each projection. '
  '2':
  - type: text
    content: All the curtains are to be the same size—twenty-eight cubits long and four cubits wide.
  - type: note
    content: That is, about 42 feet long and 6 feet wide or about 13 meters long and 1.8 meters wide
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'For the other side, the north side of the tabernacle, make twenty frames '
  '21':
  - type: text
    content: 'and forty silver bases—two under each frame. '
  '22':
  - type: text
    content: 'Make six frames for the far end, that is, the west end of the tabernacle, '
  '23':
  - type: text
    content: 'and make two frames for the corners at the far end. '
  '24':
  - type: text
    content: 'At these two corners they must be double from the bottom all the way to the top and fitted into a single ring; both shall be like that. '
  '25':
  - type: text
    content: So there will be eight frames and sixteen silver bases—two under each frame.
  '26':
  - type: text
    content: '“Also make crossbars of acacia wood: five for the frames on one side of the tabernacle, '
  '27':
  - type: text
    content: 'five for those on the other side, and five for the frames on the west, at the far end of the tabernacle. '
  '28':
  - type: text
    content: 'The center crossbar is to extend from end to end at the middle of the frames. '
  '29':
  - type: text
    content: Overlay the frames with gold and make gold rings to hold the crossbars. Also overlay the crossbars with gold.
  '3':
  - type: text
    content: 'Join five of the curtains together, and do the same with the other five. '
  '30':
  - type: text
    content: “Set up the tabernacle according to the plan shown you on the mountain.
  '31':
  - type: text
    content: '“Make a curtain of blue, purple and scarlet yarn and finely twisted linen, with cherubim woven into it by a skilled worker. '
  '32':
  - type: text
    content: 'Hang it with gold hooks on four posts of acacia wood overlaid with gold and standing on four silver bases. '
  '33':
  - type: text
    content: 'Hang the curtain from the clasps and place the ark of the covenant law behind the curtain. The curtain will separate the Holy Place from the Most Holy Place. '
  '34':
  - type: text
    content: 'Put the atonement cover on the ark of the covenant law in the Most Holy Place. '
  '35':
  - type: text
    content: Place the table outside the curtain on the north side of the tabernacle and put the lampstand opposite it on the south side.
  '36':
  - type: text
    content: '“For the entrance to the tent make a curtain of blue, purple and scarlet yarn and finely twisted linen—the work of an embroiderer. '
  '37':
  - type: text
    content: Make gold hooks for this curtain and five posts of acacia wood overlaid with gold. And cast five bronze bases for them.
  '4':
  - type: text
    content: 'Make loops of blue material along the edge of the end curtain in one set, and do the same with the end curtain in the other set. '
  '5':
  - type: text
    content: 'Make fifty loops on one curtain and fifty loops on the end curtain of the other set, with the loops opposite each other. '
  '6':
  - type: text
    content: Then make fifty gold clasps and use them to fasten the curtains together so that the tabernacle is a unit.
  '7':
  - type: text
    content: '“Make curtains of goat hair for the tent over the tabernacle—eleven altogether. '
  '8':
  - type: text
    content: All eleven curtains are to be the same size—thirty cubits long and four cubits wide.
  - type: note
    content: That is, about 45 feet long and 6 feet wide or about 13.5 meters long and 1.8 meters wide
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'Join five of the curtains together into one set and the other six into another set. Fold the sixth curtain double at the front of the tent. '
