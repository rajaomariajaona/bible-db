document_id: SNG.8,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If only you were to me like a brother,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who was nursed at my mother’s breasts!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then, if I found you outside,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I would kiss you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one would despise me.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am a wall,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my breasts are like towers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Thus I have become in his eyes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like one bringing contentment.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Solomon had a vineyard in Baal Hamon;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he let out his vineyard to tenants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Each was to bring for its fruit
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a thousand shekels
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 25 pounds or about 12 kilograms; also in verse 12
      marker-yv: yv-n
    - type: text
      text: ' of silver.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But my own vineyard is mine to give;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the thousand shekels are for you, Solomon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and two hundred
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 5 pounds or about 2.3 kilograms
      marker-yv: yv-n
    - type: text
      text: ' are for those who tend its fruit.'
  - type: usfm
    marker: sp
    children:
    - type: text
      text: He
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You who dwell in the gardens
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with friends in attendance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let me hear your voice!
  - type: usfm
    marker: sp
    children:
    - type: text
      text: She
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come away, my beloved,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and be like a gazelle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: or like a young stag
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the spice-laden mountains.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I would lead you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bring you to my mother’s house—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: she who has taught me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I would give you spiced wine to drink,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the nectar of my pomegranates.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His left arm is under my head
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his right arm embraces me.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Daughters of Jerusalem, I charge you:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do not arouse or awaken love
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until it so desires.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: Friends
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who is this coming up from the wilderness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: leaning on her beloved?
  - type: usfm
    marker: sp
    children:
    - type: text
      text: She
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Under the apple tree I roused you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there your mother conceived you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there she who was in labor gave you birth.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Place me like a seal over your heart,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a seal on your arm;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for love is as strong as death,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its jealousy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ardor
      marker-yv: yv-n
    - type: text
      text: ' unyielding as the grave.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It burns like blazing fire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a mighty flame.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fire, / like the very flame of the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Many waters cannot quench love;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rivers cannot sweep it away.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If one were to give
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the wealth of one’s house for love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he
      marker-yv: yv-n
    - type: text
      text: ' would be utterly scorned.'
  - type: usfm
    marker: sp
    children:
    - type: text
      text: Friends
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We have a little sister,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and her breasts are not yet grown.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What shall we do for our sister
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the day she is spoken for?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If she is a wall,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we will build towers of silver on her.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If she is a door,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we will enclose her with panels of cedar.
  - type: usfm
    marker: sp
    children:
    - type: text
      text: She
    marker-yv: yv-h
