document_id: SNG.8,111
type_code: eng
verses:
  '1':
  - type: text
    content: If only you were to me like a brother,
  - type: text
    content: who was nursed at my mother’s breasts!
  - type: text
    content: Then, if I found you outside,
  - type: text
    content: I would kiss you,
  - type: text
    content: and no one would despise me.
  '10':
  - type: text
    content: I am a wall,
  - type: text
    content: and my breasts are like towers.
  - type: text
    content: Thus I have become in his eyes
  - type: text
    content: like one bringing contentment.
  '11':
  - type: text
    content: Solomon had a vineyard in Baal Hamon;
  - type: text
    content: he let out his vineyard to tenants.
  - type: text
    content: Each was to bring for its fruit
  - type: text
    content: a thousand shekels
  - type: note
    content: That is, about 25 pounds or about 12 kilograms; also in verse 12
  - type: text
    content: ' of silver.'
  '12':
  - type: text
    content: But my own vineyard is mine to give;
  - type: text
    content: the thousand shekels are for you, Solomon,
  - type: text
    content: and two hundred
  - type: note
    content: That is, about 5 pounds or about 2.3 kilograms
  - type: text
    content: ' are for those who tend its fruit.'
  - type: heading
    content: He
  '13':
  - type: text
    content: You who dwell in the gardens
  - type: text
    content: with friends in attendance,
  - type: text
    content: let me hear your voice!
  - type: heading
    content: She
  '14':
  - type: text
    content: Come away, my beloved,
  - type: text
    content: and be like a gazelle
  - type: text
    content: or like a young stag
  - type: text
    content: on the spice-laden mountains.
  '2':
  - type: text
    content: I would lead you
  - type: text
    content: and bring you to my mother’s house—
  - type: text
    content: she who has taught me.
  - type: text
    content: I would give you spiced wine to drink,
  - type: text
    content: the nectar of my pomegranates.
  '3':
  - type: text
    content: His left arm is under my head
  - type: text
    content: and his right arm embraces me.
  '4':
  - type: text
    content: 'Daughters of Jerusalem, I charge you:'
  - type: text
    content: Do not arouse or awaken love
  - type: text
    content: until it so desires.
  - type: heading
    content: Friends
  '5':
  - type: text
    content: Who is this coming up from the wilderness
  - type: text
    content: leaning on her beloved?
  - type: heading
    content: She
  - type: text
    content: Under the apple tree I roused you;
  - type: text
    content: there your mother conceived you,
  - type: text
    content: there she who was in labor gave you birth.
  '6':
  - type: text
    content: Place me like a seal over your heart,
  - type: text
    content: like a seal on your arm;
  - type: text
    content: for love is as strong as death,
  - type: text
    content: its jealousy
  - type: note
    content: Or ardor
  - type: text
    content: ' unyielding as the grave.'
  - type: text
    content: It burns like blazing fire,
  - type: text
    content: like a mighty flame.
  - type: note
    content: Or fire, / like the very flame of the Lord
  '7':
  - type: text
    content: Many waters cannot quench love;
  - type: text
    content: rivers cannot sweep it away.
  - type: text
    content: If one were to give
  - type: text
    content: all the wealth of one’s house for love,
  - type: text
    content: it
  - type: note
    content: Or he
  - type: text
    content: ' would be utterly scorned.'
  - type: heading
    content: Friends
  '8':
  - type: text
    content: We have a little sister,
  - type: text
    content: and her breasts are not yet grown.
  - type: text
    content: What shall we do for our sister
  - type: text
    content: on the day she is spoken for?
  '9':
  - type: text
    content: If she is a wall,
  - type: text
    content: we will build towers of silver on her.
  - type: text
    content: If she is a door,
  - type: text
    content: we will enclose her with panels of cedar.
  - type: heading
    content: She
