document_id: LUK.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Birth of Jesus
  - type: text
    content: 'In those days Caesar Augustus issued a decree that a census should be taken of the entire Roman world. '
  '10':
  - type: text
    content: 'But the angel said to them, “Do not be afraid. I bring you good news that will cause great joy for all the people. '
  '11':
  - type: text
    content: 'Today in the town of David a Savior has been born to you; he is the Messiah, the Lord. '
  '12':
  - type: text
    content: 'This will be a sign to you: You will find a baby wrapped in cloths and lying in a manger.”'
  '13':
  - type: text
    content: Suddenly a great company of the heavenly host appeared with the angel, praising God and saying,
  '14':
  - type: text
    content: “Glory to God in the highest heaven,
  - type: text
    content: and on earth peace to those on whom his favor rests.”
  '15':
  - type: text
    content: When the angels had left them and gone into heaven, the shepherds said to one another, “Let’s go to Bethlehem and see this thing that has happened, which the Lord has told us about.”
  '16':
  - type: text
    content: 'So they hurried off and found Mary and Joseph, and the baby, who was lying in the manger. '
  '17':
  - type: text
    content: 'When they had seen him, they spread the word concerning what had been told them about this child, '
  '18':
  - type: text
    content: 'and all who heard it were amazed at what the shepherds said to them. '
  '19':
  - type: text
    content: 'But Mary treasured up all these things and pondered them in her heart. '
  '2':
  - type: text
    content: (This was the first census that took place while
  - type: note
    content: Or This census took place before
  - type: text
    content: ' Quirinius was governor of Syria.) '
  '20':
  - type: text
    content: The shepherds returned, glorifying and praising God for all the things they had heard and seen, which were just as they had been told.
  '21':
  - type: text
    content: On the eighth day, when it was time to circumcise the child, he was named Jesus, the name the angel had given him before he was conceived.
  - type: heading
    content: Jesus Presented in the Temple
  '22':
  - type: text
    content: 'When the time came for the purification rites required by the Law of Moses, Joseph and Mary took him to Jerusalem to present him to the Lord '
  '23':
  - type: text
    content: (as it is written in the Law of the Lord, “Every firstborn male is to be consecrated to the Lord”
  - type: note
    content: Exodus 13:2,12
  - type: text
    content: '), '
  '24':
  - type: text
    content: 'and to offer a sacrifice in keeping with what is said in the Law of the Lord: “a pair of doves or two young pigeons.”'
  - type: note
    content: Lev. 12:8
  '25':
  - type: text
    content: 'Now there was a man in Jerusalem called Simeon, who was righteous and devout. He was waiting for the consolation of Israel, and the Holy Spirit was on him. '
  '26':
  - type: text
    content: 'It had been revealed to him by the Holy Spirit that he would not die before he had seen the Lord’s Messiah. '
  '27':
  - type: text
    content: 'Moved by the Spirit, he went into the temple courts. When the parents brought in the child Jesus to do for him what the custom of the Law required, '
  '28':
  - type: text
    content: 'Simeon took him in his arms and praised God, saying:'
  '29':
  - type: text
    content: “Sovereign Lord, as you have promised,
  - type: text
    content: you may now dismiss
  - type: note
    content: Or promised, / now dismiss
  - type: text
    content: ' your servant in peace.'
  '3':
  - type: text
    content: And everyone went to their own town to register.
  '30':
  - type: text
    content: For my eyes have seen your salvation,
  '31':
  - type: text
    content: 'which you have prepared in the sight of all nations:'
  '32':
  - type: text
    content: a light for revelation to the Gentiles,
  - type: text
    content: and the glory of your people Israel.”
  '33':
  - type: text
    content: 'The child’s father and mother marveled at what was said about him. '
  '34':
  - type: text
    content: 'Then Simeon blessed them and said to Mary, his mother: “This child is destined to cause the falling and rising of many in Israel, and to be a sign that will be spoken against, '
  '35':
  - type: text
    content: so that the thoughts of many hearts will be revealed. And a sword will pierce your own soul too.”
  '36':
  - type: text
    content: 'There was also a prophet, Anna, the daughter of Penuel, of the tribe of Asher. She was very old; she had lived with her husband seven years after her marriage, '
  '37':
  - type: text
    content: and then was a widow until she was eighty-four.
  - type: note
    content: Or then had been a widow for eighty-four years.
  - type: text
    content: ' She never left the temple but worshiped night and day, fasting and praying. '
  '38':
  - type: text
    content: Coming up to them at that very moment, she gave thanks to God and spoke about the child to all who were looking forward to the redemption of Jerusalem.
  '39':
  - type: text
    content: 'When Joseph and Mary had done everything required by the Law of the Lord, they returned to Galilee to their own town of Nazareth. '
  '4':
  - type: text
    content: 'So Joseph also went up from the town of Nazareth in Galilee to Judea, to Bethlehem the town of David, because he belonged to the house and line of David. '
  '40':
  - type: text
    content: And the child grew and became strong; he was filled with wisdom, and the grace of God was on him.
  - type: heading
    content: The Boy Jesus at the Temple
  '41':
  - type: text
    content: 'Every year Jesus’ parents went to Jerusalem for the Festival of the Passover. '
  '42':
  - type: text
    content: 'When he was twelve years old, they went up to the festival, according to the custom. '
  '43':
  - type: text
    content: 'After the festival was over, while his parents were returning home, the boy Jesus stayed behind in Jerusalem, but they were unaware of it. '
  '44':
  - type: text
    content: 'Thinking he was in their company, they traveled on for a day. Then they began looking for him among their relatives and friends. '
  '45':
  - type: text
    content: 'When they did not find him, they went back to Jerusalem to look for him. '
  '46':
  - type: text
    content: 'After three days they found him in the temple courts, sitting among the teachers, listening to them and asking them questions. '
  '47':
  - type: text
    content: 'Everyone who heard him was amazed at his understanding and his answers. '
  '48':
  - type: text
    content: When his parents saw him, they were astonished. His mother said to him, “Son, why have you treated us like this? Your father and I have been anxiously searching for you.”
  '49':
  - type: text
    content: ' '
  - type: text
    content: “Why were you searching for me?”
  - type: text
    content: ' he asked. '
  - type: text
    content: “Didn’t you know I had to be in my Father’s house?”
  - type: note
    content: Or be about my Father’s business
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'He went there to register with Mary, who was pledged to be married to him and was expecting a child. '
  '50':
  - type: text
    content: But they did not understand what he was saying to them.
  '51':
  - type: text
    content: 'Then he went down to Nazareth with them and was obedient to them. But his mother treasured all these things in her heart. '
  '52':
  - type: text
    content: And Jesus grew in wisdom and stature, and in favor with God and man.
  '6':
  - type: text
    content: 'While they were there, the time came for the baby to be born, '
  '7':
  - type: text
    content: and she gave birth to her firstborn, a son. She wrapped him in cloths and placed him in a manger, because there was no guest room available for them.
  '8':
  - type: text
    content: 'And there were shepherds living out in the fields nearby, keeping watch over their flocks at night. '
  '9':
  - type: text
    content: 'An angel of the Lord appeared to them, and the glory of the Lord shone around them, and they were terrified. '
