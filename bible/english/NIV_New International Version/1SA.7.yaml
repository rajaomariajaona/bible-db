document_id: 1SA.7,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'So the men of Kiriath Jearim came and took up the ark of the '
  - type: text
    content: Lord
  - type: text
    content: '. They brought it to Abinadab’s house on the hill and consecrated Eleazar his son to guard the ark of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'While Samuel was sacrificing the burnt offering, the Philistines drew near to engage Israel in battle. But that day the '
  - type: text
    content: Lord
  - type: text
    content: ' thundered with loud thunder against the Philistines and threw them into such a panic that they were routed before the Israelites. '
  '11':
  - type: text
    content: The men of Israel rushed out of Mizpah and pursued the Philistines, slaughtering them along the way to a point below Beth Kar.
  '12':
  - type: text
    content: Then Samuel took a stone and set it up between Mizpah and Shen. He named it Ebenezer,
  - type: note
    content: Ebenezer means stone of help.
  - type: text
    content: ' saying, “Thus far the '
  - type: text
    content: Lord
  - type: text
    content: ' has helped us.”'
  '13':
  - type: text
    content: 'So the Philistines were subdued and they stopped invading Israel’s territory. Throughout Samuel’s lifetime, the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' was against the Philistines. '
  '14':
  - type: text
    content: The towns from Ekron to Gath that the Philistines had captured from Israel were restored to Israel, and Israel delivered the neighboring territory from the hands of the Philistines. And there was peace between Israel and the Amorites.
  '15':
  - type: text
    content: 'Samuel continued as Israel’s leader all the days of his life. '
  '16':
  - type: text
    content: 'From year to year he went on a circuit from Bethel to Gilgal to Mizpah, judging Israel in all those places. '
  '17':
  - type: text
    content: 'But he always went back to Ramah, where his home was, and there he also held court for Israel. And he built an altar there to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: The ark remained at Kiriath Jearim a long time—twenty years in all.
  - type: heading
    content: Samuel Subdues the Philistines at Mizpah
  - type: text
    content: 'Then all the people of Israel turned back to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'So Samuel said to all the Israelites, “If you are returning to the '
  - type: text
    content: Lord
  - type: text
    content: ' with all your hearts, then rid yourselves of the foreign gods and the Ashtoreths and commit yourselves to the '
  - type: text
    content: Lord
  - type: text
    content: ' and serve him only, and he will deliver you out of the hand of the Philistines.” '
  '4':
  - type: text
    content: 'So the Israelites put away their Baals and Ashtoreths, and served the '
  - type: text
    content: Lord
  - type: text
    content: ' only.'
  '5':
  - type: text
    content: 'Then Samuel said, “Assemble all Israel at Mizpah, and I will intercede with the '
  - type: text
    content: Lord
  - type: text
    content: ' for you.” '
  '6':
  - type: text
    content: 'When they had assembled at Mizpah, they drew water and poured it out before the '
  - type: text
    content: Lord
  - type: text
    content: '. On that day they fasted and there they confessed, “We have sinned against the '
  - type: text
    content: Lord
  - type: text
    content: .” Now Samuel was serving as leader
  - type: note
    content: Traditionally judge; also in verse 15
  - type: text
    content: ' of Israel at Mizpah.'
  '7':
  - type: text
    content: 'When the Philistines heard that Israel had assembled at Mizpah, the rulers of the Philistines came up to attack them. When the Israelites heard of it, they were afraid because of the Philistines. '
  '8':
  - type: text
    content: 'They said to Samuel, “Do not stop crying out to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God for us, that he may rescue us from the hand of the Philistines.” '
  '9':
  - type: text
    content: 'Then Samuel took a suckling lamb and sacrificed it as a whole burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. He cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ' on Israel’s behalf, and the '
  - type: text
    content: Lord
  - type: text
    content: ' answered him.'
