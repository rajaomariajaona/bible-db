document_id: 1SA.7,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'So the men of Kiriath Jearim came and took up the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. They brought it to Abinadab’s house on the hill and consecrated Eleazar his son to guard the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While Samuel was sacrificing the burnt offering, the Philistines drew near to engage Israel in battle. But that day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' thundered with loud thunder against the Philistines and threw them into such a panic that they were routed before the Israelites. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The men of Israel rushed out of Mizpah and pursued the Philistines, slaughtering them along the way to a point below Beth Kar.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Samuel took a stone and set it up between Mizpah and Shen. He named it Ebenezer,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ebenezer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: stone of help.
      marker-yv: yv-n
    - type: text
      text: ' saying, “Thus far the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has helped us.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the Philistines were subdued and they stopped invading Israel’s territory. Throughout Samuel’s lifetime, the hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was against the Philistines. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The towns from Ekron to Gath that the Philistines had captured from Israel were restored to Israel, and Israel delivered the neighboring territory from the hands of the Philistines. And there was peace between Israel and the Amorites.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel continued as Israel’s leader all the days of his life. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From year to year he went on a circuit from Bethel to Gilgal to Mizpah, judging Israel in all those places. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he always went back to Ramah, where his home was, and there he also held court for Israel. And he built an altar there to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: The ark remained at Kiriath Jearim a long time—twenty years in all.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Samuel Subdues the Philistines at Mizpah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all the people of Israel turned back to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Samuel said to all the Israelites, “If you are returning to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with all your hearts, then rid yourselves of the foreign gods and the Ashtoreths and commit yourselves to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and serve him only, and he will deliver you out of the hand of the Philistines.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the Israelites put away their Baals and Ashtoreths, and served the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' only.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Samuel said, “Assemble all Israel at Mizpah, and I will intercede with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for you.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they had assembled at Mizpah, they drew water and poured it out before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. On that day they fasted and there they confessed, “We have sinned against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .” Now Samuel was serving as leader
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Traditionally '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: judge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verse 15
      marker-yv: yv-n
    - type: text
      text: ' of Israel at Mizpah.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the Philistines heard that Israel had assembled at Mizpah, the rulers of the Philistines came up to attack them. When the Israelites heard of it, they were afraid because of the Philistines. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They said to Samuel, “Do not stop crying out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God for us, that he may rescue us from the hand of the Philistines.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Samuel took a suckling lamb and sacrificed it as a whole burnt offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. He cried out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' on Israel’s behalf, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' answered him.'
