document_id: ISA.26,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Song of Praise
  - type: text
    content: 'In that day this song will be sung in the land of Judah:'
  - type: text
    content: We have a strong city;
  - type: text
    content: God makes salvation
  - type: text
    content: its walls and ramparts.
  '10':
  - type: text
    content: But when grace is shown to the wicked,
  - type: text
    content: they do not learn righteousness;
  - type: text
    content: even in a land of uprightness they go on doing evil
  - type: text
    content: 'and do not regard the majesty of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '11':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', your hand is lifted high,'
  - type: text
    content: but they do not see it.
  - type: text
    content: Let them see your zeal for your people and be put to shame;
  - type: text
    content: let the fire reserved for your enemies consume them.
  '12':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', you establish peace for us;'
  - type: text
    content: all that we have accomplished you have done for us.
  '13':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ' our God, other lords besides you have ruled over us,'
  - type: text
    content: but your name alone do we honor.
  '14':
  - type: text
    content: They are now dead, they live no more;
  - type: text
    content: their spirits do not rise.
  - type: text
    content: You punished them and brought them to ruin;
  - type: text
    content: you wiped out all memory of them.
  '15':
  - type: text
    content: 'You have enlarged the nation, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: you have enlarged the nation.
  - type: text
    content: You have gained glory for yourself;
  - type: text
    content: you have extended all the borders of the land.
  '16':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', they came to you in their distress;'
  - type: text
    content: when you disciplined them,
  - type: text
    content: they could barely whisper a prayer.
  - type: note
    content: The meaning of the Hebrew for this clause is uncertain.
  '17':
  - type: text
    content: As a pregnant woman about to give birth
  - type: text
    content: writhes and cries out in her pain,
  - type: text
    content: 'so were we in your presence, '
  - type: text
    content: Lord
  - type: text
    content: .
  '18':
  - type: text
    content: We were with child, we writhed in labor,
  - type: text
    content: but we gave birth to wind.
  - type: text
    content: We have not brought salvation to the earth,
  - type: text
    content: and the people of the world have not come to life.
  '19':
  - type: text
    content: 'But your dead will live, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: their bodies will rise—
  - type: text
    content: let those who dwell in the dust
  - type: text
    content: wake up and shout for joy—
  - type: text
    content: your dew is like the dew of the morning;
  - type: text
    content: the earth will give birth to her dead.
  '2':
  - type: text
    content: Open the gates
  - type: text
    content: that the righteous nation may enter,
  - type: text
    content: the nation that keeps faith.
  '20':
  - type: text
    content: Go, my people, enter your rooms
  - type: text
    content: and shut the doors behind you;
  - type: text
    content: hide yourselves for a little while
  - type: text
    content: until his wrath has passed by.
  '21':
  - type: text
    content: 'See, the '
  - type: text
    content: Lord
  - type: text
    content: ' is coming out of his dwelling'
  - type: text
    content: to punish the people of the earth for their sins.
  - type: text
    content: The earth will disclose the blood shed on it;
  - type: text
    content: the earth will conceal its slain no longer.
  '3':
  - type: text
    content: You will keep in perfect peace
  - type: text
    content: those whose minds are steadfast,
  - type: text
    content: because they trust in you.
  '4':
  - type: text
    content: 'Trust in the '
  - type: text
    content: Lord
  - type: text
    content: ' forever,'
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ', the '
  - type: text
    content: Lord
  - type: text
    content: ' himself, is the Rock eternal.'
  '5':
  - type: text
    content: He humbles those who dwell on high,
  - type: text
    content: he lays the lofty city low;
  - type: text
    content: he levels it to the ground
  - type: text
    content: and casts it down to the dust.
  '6':
  - type: text
    content: Feet trample it down—
  - type: text
    content: the feet of the oppressed,
  - type: text
    content: the footsteps of the poor.
  '7':
  - type: text
    content: The path of the righteous is level;
  - type: text
    content: you, the Upright One, make the way of the righteous smooth.
  '8':
  - type: text
    content: 'Yes, '
  - type: text
    content: Lord
  - type: text
    content: ', walking in the way of your laws,'
  - type: note
    content: Or judgments
  - type: text
    content: we wait for you;
  - type: text
    content: your name and renown
  - type: text
    content: are the desire of our hearts.
  '9':
  - type: text
    content: My soul yearns for you in the night;
  - type: text
    content: in the morning my spirit longs for you.
  - type: text
    content: When your judgments come upon the earth,
  - type: text
    content: the people of the world learn righteousness.
