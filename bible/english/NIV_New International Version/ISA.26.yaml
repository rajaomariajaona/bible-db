document_id: ISA.26
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Song of Praise
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In that day this song will be sung in the land of Judah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: We have a strong city;
- type: usfm
  marker: q2
  children:
  - type: text
    text: God makes salvation
- type: usfm
  marker: q2
  children:
  - type: text
    text: its walls and ramparts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Open the gates
- type: usfm
  marker: q2
  children:
  - type: text
    text: that the righteous nation may enter,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the nation that keeps faith.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: You will keep in perfect peace
- type: usfm
  marker: q2
  children:
  - type: text
    text: those whose minds are steadfast,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because they trust in you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Trust in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' forever,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' himself, is the Rock eternal.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He humbles those who dwell on high,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he lays the lofty city low;
- type: usfm
  marker: q1
  children:
  - type: text
    text: he levels it to the ground
- type: usfm
  marker: q2
  children:
  - type: text
    text: and casts it down to the dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Feet trample it down—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the feet of the oppressed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the footsteps of the poor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The path of the righteous is level;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you, the Upright One, make the way of the righteous smooth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Yes, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', walking in the way of your laws,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: judgments
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: we wait for you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: your name and renown
- type: usfm
  marker: q2
  children:
  - type: text
    text: are the desire of our hearts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: My soul yearns for you in the night;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the morning my spirit longs for you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When your judgments come upon the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the people of the world learn righteousness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But when grace is shown to the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they do not learn righteousness;
- type: usfm
  marker: q1
  children:
  - type: text
    text: even in a land of uprightness they go on doing evil
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and do not regard the majesty of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', your hand is lifted high,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they do not see it.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them see your zeal for your people and be put to shame;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let the fire reserved for your enemies consume them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you establish peace for us;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: all that we have accomplished you have done for us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God, other lords besides you have ruled over us,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but your name alone do we honor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They are now dead, they live no more;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their spirits do not rise.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You punished them and brought them to ruin;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you wiped out all memory of them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'You have enlarged the nation, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have enlarged the nation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have gained glory for yourself;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have extended all the borders of the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', they came to you in their distress;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: when you disciplined them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they could barely whisper a prayer.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this clause is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: As a pregnant woman about to give birth
- type: usfm
  marker: q2
  children:
  - type: text
    text: writhes and cries out in her pain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'so were we in your presence, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: We were with child, we writhed in labor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but we gave birth to wind.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We have not brought salvation to the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the people of the world have not come to life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But your dead will live, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their bodies will rise—
- type: usfm
  marker: q1
  children:
  - type: text
    text: let those who dwell in the dust
- type: usfm
  marker: q2
  children:
  - type: text
    text: wake up and shout for joy—
- type: usfm
  marker: q1
  children:
  - type: text
    text: your dew is like the dew of the morning;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the earth will give birth to her dead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Go, my people, enter your rooms
- type: usfm
  marker: q2
  children:
  - type: text
    text: and shut the doors behind you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: hide yourselves for a little while
- type: usfm
  marker: q2
  children:
  - type: text
    text: until his wrath has passed by.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'See, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is coming out of his dwelling'
- type: usfm
  marker: q2
  children:
  - type: text
    text: to punish the people of the earth for their sins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The earth will disclose the blood shed on it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the earth will conceal its slain no longer.
