document_id: LEV.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Grain Offering
  - type: text
    content: '“ ‘When anyone brings a grain offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', their offering is to be of the finest flour. They are to pour olive oil on it, put incense on it '
  '10':
  - type: text
    content: 'The rest of the grain offering belongs to Aaron and his sons; it is a most holy part of the food offerings presented to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '11':
  - type: text
    content: '“ ‘Every grain offering you bring to the '
  - type: text
    content: Lord
  - type: text
    content: ' must be made without yeast, for you are not to burn any yeast or honey in a food offering presented to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'You may bring them to the '
  - type: text
    content: Lord
  - type: text
    content: ' as an offering of the firstfruits, but they are not to be offered on the altar as a pleasing aroma. '
  '13':
  - type: text
    content: Season all your grain offerings with salt. Do not leave the salt of the covenant of your God out of your grain offerings; add salt to all your offerings.
  '14':
  - type: text
    content: '“ ‘If you bring a grain offering of firstfruits to the '
  - type: text
    content: Lord
  - type: text
    content: ', offer crushed heads of new grain roasted in the fire. '
  '15':
  - type: text
    content: 'Put oil and incense on it; it is a grain offering. '
  '16':
  - type: text
    content: 'The priest shall burn the memorial portion of the crushed grain and the oil, together with all the incense, as a food offering presented to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: and take it to Aaron’s sons the priests. The priest shall take a handful of the flour and oil, together with all the incense, and burn this as a memorial
  - type: note
    content: Or representative; also in verses 9 and 16
  - type: text
    content: ' portion on the altar, a food offering, an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'The rest of the grain offering belongs to Aaron and his sons; it is a most holy part of the food offerings presented to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: '“ ‘If you bring a grain offering baked in an oven, it is to consist of the finest flour: either thick loaves made without yeast and with olive oil mixed in or thin loaves made without yeast and brushed with olive oil. '
  '5':
  - type: text
    content: 'If your grain offering is prepared on a griddle, it is to be made of the finest flour mixed with oil, and without yeast. '
  '6':
  - type: text
    content: 'Crumble it and pour oil on it; it is a grain offering. '
  '7':
  - type: text
    content: 'If your grain offering is cooked in a pan, it is to be made of the finest flour and some olive oil. '
  '8':
  - type: text
    content: 'Bring the grain offering made of these things to the '
  - type: text
    content: Lord
  - type: text
    content: '; present it to the priest, who shall take it to the altar. '
  '9':
  - type: text
    content: 'He shall take out the memorial portion from the grain offering and burn it on the altar as a food offering, an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
