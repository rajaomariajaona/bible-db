document_id: LEV.14,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Cleansing From Defiling Skin Diseases
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: “On the eighth day they must bring two male lambs and one ewe lamb a year old, each without defect, along with three-tenths of an ephah
  - type: note
    content: That is, probably about 11 pounds or about 5 kilograms
  - type: text
    content: ' of the finest flour mixed with olive oil for a grain offering, and one log'
  - type: note
    content: That is, about 1/3 quart or about 0.3 liter; also in verses 12, 15, 21 and 24
  - type: text
    content: ' of oil. '
  '11':
  - type: text
    content: 'The priest who pronounces them clean shall present both the one to be cleansed and their offerings before the '
  - type: text
    content: Lord
  - type: text
    content: ' at the entrance to the tent of meeting.'
  '12':
  - type: text
    content: '“Then the priest is to take one of the male lambs and offer it as a guilt offering, along with the log of oil; he shall wave them before the '
  - type: text
    content: Lord
  - type: text
    content: ' as a wave offering. '
  '13':
  - type: text
    content: He is to slaughter the lamb in the sanctuary area where the sin offering
  - type: note
    content: Or purification offering; also in verses 19, 22 and 31
  - type: text
    content: ' and the burnt offering are slaughtered. Like the sin offering, the guilt offering belongs to the priest; it is most holy. '
  '14':
  - type: text
    content: 'The priest is to take some of the blood of the guilt offering and put it on the lobe of the right ear of the one to be cleansed, on the thumb of their right hand and on the big toe of their right foot. '
  '15':
  - type: text
    content: 'The priest shall then take some of the log of oil, pour it in the palm of his own left hand, '
  '16':
  - type: text
    content: 'dip his right forefinger into the oil in his palm, and with his finger sprinkle some of it before the '
  - type: text
    content: Lord
  - type: text
    content: ' seven times. '
  '17':
  - type: text
    content: 'The priest is to put some of the oil remaining in his palm on the lobe of the right ear of the one to be cleansed, on the thumb of their right hand and on the big toe of their right foot, on top of the blood of the guilt offering. '
  '18':
  - type: text
    content: 'The rest of the oil in his palm the priest shall put on the head of the one to be cleansed and make atonement for them before the '
  - type: text
    content: Lord
  - type: text
    content: .
  '19':
  - type: text
    content: '“Then the priest is to sacrifice the sin offering and make atonement for the one to be cleansed from their uncleanness. After that, the priest shall slaughter the burnt offering '
  '2':
  - type: text
    content: '“These are the regulations for any diseased person at the time of their ceremonial cleansing, when they are brought to the priest: '
  '20':
  - type: text
    content: and offer it on the altar, together with the grain offering, and make atonement for them, and they will be clean.
  '21':
  - type: text
    content: “If, however, they are poor and cannot afford these, they must take one male lamb as a guilt offering to be waved to make atonement for them, together with a tenth of an ephah
  - type: note
    content: That is, probably about 3 1/2 pounds or about 1.6 kilograms
  - type: text
    content: ' of the finest flour mixed with olive oil for a grain offering, a log of oil, '
  '22':
  - type: text
    content: and two doves or two young pigeons, such as they can afford, one for a sin offering and the other for a burnt offering.
  '23':
  - type: text
    content: '“On the eighth day they must bring them for their cleansing to the priest at the entrance to the tent of meeting, before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'The priest is to take the lamb for the guilt offering, together with the log of oil, and wave them before the '
  - type: text
    content: Lord
  - type: text
    content: ' as a wave offering. '
  '25':
  - type: text
    content: 'He shall slaughter the lamb for the guilt offering and take some of its blood and put it on the lobe of the right ear of the one to be cleansed, on the thumb of their right hand and on the big toe of their right foot. '
  '26':
  - type: text
    content: 'The priest is to pour some of the oil into the palm of his own left hand, '
  '27':
  - type: text
    content: 'and with his right forefinger sprinkle some of the oil from his palm seven times before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Some of the oil in his palm he is to put on the same places he put the blood of the guilt offering—on the lobe of the right ear of the one to be cleansed, on the thumb of their right hand and on the big toe of their right foot. '
  '29':
  - type: text
    content: 'The rest of the oil in his palm the priest shall put on the head of the one to be cleansed, to make atonement for them before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '3':
  - type: text
    content: The priest is to go outside the camp and examine them. If they have been healed of their defiling skin disease,
  - type: note
    content: The Hebrew word for defiling skin disease, traditionally translated “leprosy,” was used for various diseases affecting the skin; also in verses 7, 32, 54 and 57.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Then he shall sacrifice the doves or the young pigeons, such as the person can afford, '
  '31':
  - type: text
    content: 'one as a sin offering and the other as a burnt offering, together with the grain offering. In this way the priest will make atonement before the '
  - type: text
    content: Lord
  - type: text
    content: ' on behalf of the one to be cleansed.”'
  '32':
  - type: text
    content: These are the regulations for anyone who has a defiling skin disease and who cannot afford the regular offerings for their cleansing.
  - type: heading
    content: Cleansing From Defiling Molds
  '33':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron, '
  '34':
  - type: text
    content: '“When you enter the land of Canaan, which I am giving you as your possession, and I put a spreading mold in a house in that land, '
  '35':
  - type: text
    content: 'the owner of the house must go and tell the priest, ‘I have seen something that looks like a defiling mold in my house.’ '
  '36':
  - type: text
    content: 'The priest is to order the house to be emptied before he goes in to examine the mold, so that nothing in the house will be pronounced unclean. After this the priest is to go in and inspect the house. '
  '37':
  - type: text
    content: 'He is to examine the mold on the walls, and if it has greenish or reddish depressions that appear to be deeper than the surface of the wall, '
  '38':
  - type: text
    content: 'the priest shall go out the doorway of the house and close it up for seven days. '
  '39':
  - type: text
    content: 'On the seventh day the priest shall return to inspect the house. If the mold has spread on the walls, '
  '4':
  - type: text
    content: 'the priest shall order that two live clean birds and some cedar wood, scarlet yarn and hyssop be brought for the person to be cleansed. '
  '40':
  - type: text
    content: 'he is to order that the contaminated stones be torn out and thrown into an unclean place outside the town. '
  '41':
  - type: text
    content: 'He must have all the inside walls of the house scraped and the material that is scraped off dumped into an unclean place outside the town. '
  '42':
  - type: text
    content: Then they are to take other stones to replace these and take new clay and plaster the house.
  '43':
  - type: text
    content: '“If the defiling mold reappears in the house after the stones have been torn out and the house scraped and plastered, '
  '44':
  - type: text
    content: 'the priest is to go and examine it and, if the mold has spread in the house, it is a persistent defiling mold; the house is unclean. '
  '45':
  - type: text
    content: It must be torn down—its stones, timbers and all the plaster—and taken out of the town to an unclean place.
  '46':
  - type: text
    content: '“Anyone who goes into the house while it is closed up will be unclean till evening. '
  '47':
  - type: text
    content: Anyone who sleeps or eats in the house must wash their clothes.
  '48':
  - type: text
    content: '“But if the priest comes to examine it and the mold has not spread after the house has been plastered, he shall pronounce the house clean, because the defiling mold is gone. '
  '49':
  - type: text
    content: 'To purify the house he is to take two birds and some cedar wood, scarlet yarn and hyssop. '
  '5':
  - type: text
    content: 'Then the priest shall order that one of the birds be killed over fresh water in a clay pot. '
  '50':
  - type: text
    content: 'He shall kill one of the birds over fresh water in a clay pot. '
  '51':
  - type: text
    content: 'Then he is to take the cedar wood, the hyssop, the scarlet yarn and the live bird, dip them into the blood of the dead bird and the fresh water, and sprinkle the house seven times. '
  '52':
  - type: text
    content: 'He shall purify the house with the bird’s blood, the fresh water, the live bird, the cedar wood, the hyssop and the scarlet yarn. '
  '53':
  - type: text
    content: Then he is to release the live bird in the open fields outside the town. In this way he will make atonement for the house, and it will be clean.”
  '54':
  - type: text
    content: 'These are the regulations for any defiling skin disease, for a sore, '
  '55':
  - type: text
    content: 'for defiling molds in fabric or in a house, '
  '56':
  - type: text
    content: 'and for a swelling, a rash or a shiny spot, '
  '57':
  - type: text
    content: to determine when something is clean or unclean.
  - type: text
    content: These are the regulations for defiling skin diseases and defiling molds.
  '6':
  - type: text
    content: 'He is then to take the live bird and dip it, together with the cedar wood, the scarlet yarn and the hyssop, into the blood of the bird that was killed over the fresh water. '
  '7':
  - type: text
    content: Seven times he shall sprinkle the one to be cleansed of the defiling disease, and then pronounce them clean. After that, he is to release the live bird in the open fields.
  '8':
  - type: text
    content: '“The person to be cleansed must wash their clothes, shave off all their hair and bathe with water; then they will be ceremonially clean. After this they may come into the camp, but they must stay outside their tent for seven days. '
  '9':
  - type: text
    content: On the seventh day they must shave off all their hair; they must shave their head, their beard, their eyebrows and the rest of their hair. They must wash their clothes and bathe themselves with water, and they will be clean.
