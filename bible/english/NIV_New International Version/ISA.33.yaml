document_id: ISA.33,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Distress and Help
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to you, destroyer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who have not been destroyed!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to you, betrayer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who have not been betrayed!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When you stop destroying,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will be destroyed;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when you stop betraying,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will be betrayed.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Now will I arise,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Now will I be exalted;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now will I be lifted up.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You conceive chaff,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you give birth to straw;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your breath is a fire that consumes you.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The peoples will be burned to ashes;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like cut thornbushes they will be set ablaze.”
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You who are far away, hear what I have done;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who are near, acknowledge my power!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The sinners in Zion are terrified;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'trembling grips the godless:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Who of us can dwell with the consuming fire?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who of us can dwell with everlasting burning?”
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who walk righteously
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and speak what is right,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who reject gain from extortion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and keep their hands from accepting bribes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who stop their ears against plots of murder
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and shut their eyes against contemplating evil—
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they are the ones who will dwell on the heights,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose refuge will be the mountain fortress.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their bread will be supplied,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and water will not fail them.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your eyes will see the king in his beauty
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and view a land that stretches afar.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In your thoughts you will ponder the former terror:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Where is that chief officer?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Where is the one who took the revenue?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Where is the officer in charge of the towers?”
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will see those arrogant people no more,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: people whose speech is obscure,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose language is strange and incomprehensible.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', be gracious to us;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we long for you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be our strength every morning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: our salvation in time of distress.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look on Zion, the city of our festivals;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your eyes will see Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a peaceful abode, a tent that will not be moved;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: its stakes will never be pulled up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor any of its ropes broken.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be our Mighty One.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: It will be like a place of broad rivers and streams.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No galley with oars will ride them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no mighty ship will sail them.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is our judge,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is our lawgiver,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is our king;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it is he who will save us.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Your rigging hangs loose:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The mast is not held secure,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the sail is not spread.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then an abundance of spoils will be divided
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and even the lame will carry off plunder.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No one living in Zion will say, “I am ill”;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the sins of those who dwell there will be forgiven.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At the uproar of your army, the peoples flee;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when you rise up, the nations scatter.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your plunder, O nations, is harvested as by young locusts;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a swarm of locusts people pounce on it.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is exalted, for he dwells on high;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will fill Zion with his justice and righteousness.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will be the sure foundation for your times,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a rich store of salvation and wisdom and knowledge;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is the key to this treasure.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: is a treasure from him
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look, their brave men cry aloud in the streets;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the envoys of peace weep bitterly.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The highways are deserted,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no travelers are on the roads.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The treaty is broken,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: its witnesses
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dead Sea Scrolls; Masoretic Text '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: / the cities
      marker-yv: yv-n
    - type: text
      text: ' are despised,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no one is respected.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The land dries up and wastes away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Lebanon is ashamed and withers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sharon is like the Arabah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Bashan and Carmel drop their leaves.
