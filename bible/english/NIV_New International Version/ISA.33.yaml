document_id: ISA.33,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Distress and Help
  - type: text
    content: Woe to you, destroyer,
  - type: text
    content: you who have not been destroyed!
  - type: text
    content: Woe to you, betrayer,
  - type: text
    content: you who have not been betrayed!
  - type: text
    content: When you stop destroying,
  - type: text
    content: you will be destroyed;
  - type: text
    content: when you stop betraying,
  - type: text
    content: you will be betrayed.
  '10':
  - type: text
    content: '“Now will I arise,” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Now will I be exalted;
  - type: text
    content: now will I be lifted up.
  '11':
  - type: text
    content: You conceive chaff,
  - type: text
    content: you give birth to straw;
  - type: text
    content: your breath is a fire that consumes you.
  '12':
  - type: text
    content: The peoples will be burned to ashes;
  - type: text
    content: like cut thornbushes they will be set ablaze.”
  '13':
  - type: text
    content: You who are far away, hear what I have done;
  - type: text
    content: you who are near, acknowledge my power!
  '14':
  - type: text
    content: The sinners in Zion are terrified;
  - type: text
    content: 'trembling grips the godless:'
  - type: text
    content: “Who of us can dwell with the consuming fire?
  - type: text
    content: Who of us can dwell with everlasting burning?”
  '15':
  - type: text
    content: Those who walk righteously
  - type: text
    content: and speak what is right,
  - type: text
    content: who reject gain from extortion
  - type: text
    content: and keep their hands from accepting bribes,
  - type: text
    content: who stop their ears against plots of murder
  - type: text
    content: and shut their eyes against contemplating evil—
  '16':
  - type: text
    content: they are the ones who will dwell on the heights,
  - type: text
    content: whose refuge will be the mountain fortress.
  - type: text
    content: Their bread will be supplied,
  - type: text
    content: and water will not fail them.
  '17':
  - type: text
    content: Your eyes will see the king in his beauty
  - type: text
    content: and view a land that stretches afar.
  '18':
  - type: text
    content: 'In your thoughts you will ponder the former terror:'
  - type: text
    content: “Where is that chief officer?
  - type: text
    content: Where is the one who took the revenue?
  - type: text
    content: Where is the officer in charge of the towers?”
  '19':
  - type: text
    content: You will see those arrogant people no more,
  - type: text
    content: people whose speech is obscure,
  - type: text
    content: whose language is strange and incomprehensible.
  '2':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', be gracious to us;'
  - type: text
    content: we long for you.
  - type: text
    content: Be our strength every morning,
  - type: text
    content: our salvation in time of distress.
  '20':
  - type: text
    content: Look on Zion, the city of our festivals;
  - type: text
    content: your eyes will see Jerusalem,
  - type: text
    content: a peaceful abode, a tent that will not be moved;
  - type: text
    content: its stakes will never be pulled up,
  - type: text
    content: nor any of its ropes broken.
  '21':
  - type: text
    content: 'There the '
  - type: text
    content: Lord
  - type: text
    content: ' will be our Mighty One.'
  - type: text
    content: It will be like a place of broad rivers and streams.
  - type: text
    content: No galley with oars will ride them,
  - type: text
    content: no mighty ship will sail them.
  '22':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' is our judge,'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is our lawgiver,'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is our king;'
  - type: text
    content: it is he who will save us.
  '23':
  - type: text
    content: 'Your rigging hangs loose:'
  - type: text
    content: The mast is not held secure,
  - type: text
    content: the sail is not spread.
  - type: text
    content: Then an abundance of spoils will be divided
  - type: text
    content: and even the lame will carry off plunder.
  '24':
  - type: text
    content: No one living in Zion will say, “I am ill”;
  - type: text
    content: and the sins of those who dwell there will be forgiven.
  '3':
  - type: text
    content: At the uproar of your army, the peoples flee;
  - type: text
    content: when you rise up, the nations scatter.
  '4':
  - type: text
    content: Your plunder, O nations, is harvested as by young locusts;
  - type: text
    content: like a swarm of locusts people pounce on it.
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is exalted, for he dwells on high;'
  - type: text
    content: he will fill Zion with his justice and righteousness.
  '6':
  - type: text
    content: He will be the sure foundation for your times,
  - type: text
    content: a rich store of salvation and wisdom and knowledge;
  - type: text
    content: 'the fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' is the key to this treasure.'
  - type: note
    content: Or is a treasure from him
  '7':
  - type: text
    content: Look, their brave men cry aloud in the streets;
  - type: text
    content: the envoys of peace weep bitterly.
  '8':
  - type: text
    content: The highways are deserted,
  - type: text
    content: no travelers are on the roads.
  - type: text
    content: The treaty is broken,
  - type: text
    content: its witnesses
  - type: note
    content: Dead Sea Scrolls; Masoretic Text / the cities
  - type: text
    content: ' are despised,'
  - type: text
    content: no one is respected.
  '9':
  - type: text
    content: The land dries up and wastes away,
  - type: text
    content: Lebanon is ashamed and withers;
  - type: text
    content: Sharon is like the Arabah,
  - type: text
    content: and Bashan and Carmel drop their leaves.
