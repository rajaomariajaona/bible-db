document_id: TIT.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Saved in Order to Do Good
  - type: text
    content: 'Remind the people to be subject to rulers and authorities, to be obedient, to be ready to do whatever is good, '
  '10':
  - type: text
    content: 'Warn a divisive person once, and then warn them a second time. After that, have nothing to do with them. '
  '11':
  - type: text
    content: You may be sure that such people are warped and sinful; they are self-condemned.
  - type: heading
    content: Final Remarks
  '12':
  - type: text
    content: 'As soon as I send Artemas or Tychicus to you, do your best to come to me at Nicopolis, because I have decided to winter there. '
  '13':
  - type: text
    content: 'Do everything you can to help Zenas the lawyer and Apollos on their way and see that they have everything they need. '
  '14':
  - type: text
    content: Our people must learn to devote themselves to doing what is good, in order to provide for urgent needs and not live unproductive lives.
  '15':
  - type: text
    content: Everyone with me sends you greetings. Greet those who love us in the faith.
  - type: text
    content: Grace be with you all.
  '2':
  - type: text
    content: to slander no one, to be peaceable and considerate, and always to be gentle toward everyone.
  '3':
  - type: text
    content: 'At one time we too were foolish, disobedient, deceived and enslaved by all kinds of passions and pleasures. We lived in malice and envy, being hated and hating one another. '
  '4':
  - type: text
    content: 'But when the kindness and love of God our Savior appeared, '
  '5':
  - type: text
    content: 'he saved us, not because of righteous things we had done, but because of his mercy. He saved us through the washing of rebirth and renewal by the Holy Spirit, '
  '6':
  - type: text
    content: 'whom he poured out on us generously through Jesus Christ our Savior, '
  '7':
  - type: text
    content: 'so that, having been justified by his grace, we might become heirs having the hope of eternal life. '
  '8':
  - type: text
    content: This is a trustworthy saying. And I want you to stress these things, so that those who have trusted in God may be careful to devote themselves to doing what is good. These things are excellent and profitable for everyone.
  '9':
  - type: text
    content: 'But avoid foolish controversies and genealogies and arguments and quarrels about the law, because these are unprofitable and useless. '
