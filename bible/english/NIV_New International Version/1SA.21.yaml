verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David at Nob
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 21:1-15 is numbered 21:2-16.
      marker-yv: yv-n
    - type: text
      text: David went to Nob, to Ahimelek the priest. Ahimelek trembled when he met him, and asked, “Why are you alone? Why is no one with you?”
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That day David fled from Saul and went to Achish king of Gath. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the servants of Achish said to him, “Isn’t this David, the king of the land? Isn’t he the one they sing about in their dances:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘Saul has slain his thousands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and David his tens of thousands’?”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David took these words to heart and was very much afraid of Achish king of Gath. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he pretended to be insane in their presence; and while he was in their hands he acted like a madman, making marks on the doors of the gate and letting saliva run down his beard.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Achish said to his servants, “Look at the man! He is insane! Why bring him to me? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Am I so short of madmen that you have to bring this fellow here to carry on like this in front of me? Must this man come into my house?”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David answered Ahimelek the priest, “The king sent me on a mission and said to me, ‘No one is to know anything about the mission I am sending you on.’ As for my men, I have told them to meet me at a certain place. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now then, what do you have on hand? Give me five loaves of bread, or whatever you can find.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the priest answered David, “I don’t have any ordinary bread on hand; however, there is some consecrated bread here—provided the men have kept themselves from women.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David replied, “Indeed women have been kept from us, as usual whenever
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from us in the past few days since
      marker-yv: yv-n
    - type: text
      text: ' I set out. The men’s bodies are holy even on missions that are not holy. How much more so today!” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the priest gave him the consecrated bread, since there was no bread there except the bread of the Presence that had been removed from before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and replaced by hot bread on the day it was taken away.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now one of Saul’s servants was there that day, detained before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ; he was Doeg the Edomite, Saul’s chief shepherd.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David asked Ahimelek, “Don’t you have a spear or a sword here? I haven’t brought my sword or any other weapon, because the king’s mission was urgent.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The priest replied, “The sword of Goliath the Philistine, whom you killed in the Valley of Elah, is here; it is wrapped in a cloth behind the ephod. If you want it, take it; there is no sword here but that one.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: David said, “There is none like it; give it to me.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David at Gath
    marker-yv: yv-h
