document_id: ISA.52,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Awake, awake, Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: clothe yourself with strength!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Put on your garments of splendor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Jerusalem, the holy city.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The uncircumcised and defiled
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will not enter you again.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will lay bare his holy arm'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the sight of all the nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and all the ends of the earth will see
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the salvation of our God.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Depart, depart, go out from there!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Touch no unclean thing!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come out from it and be pure,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'you who carry the articles of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s house.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: But you will not leave in haste
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or go in flight;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will go before you,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the God of Israel will be your rear guard.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Suffering and Glory of the Servant
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: See, my servant will act wisely
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will prosper
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will be raised and lifted up and highly exalted.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Just as there were many who were appalled at him
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: you
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his appearance was so disfigured beyond that of any human being
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his form marred beyond human likeness—
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: so he will sprinkle many nations,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'so will many nations be amazed at him '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (see also Septuagint)
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and kings will shut their mouths because of him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For what they were not told, they will see,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and what they have not heard, they will understand.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Shake off your dust;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rise up, sit enthroned, Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Free yourself from the chains on your neck,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Daughter Zion, now a captive.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'For this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You were sold for nothing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and without money you will be redeemed.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For this is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “At first my people went down to Egypt to live;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lately, Assyria has oppressed them.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: '“And now what do I have here?” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For my people have been taken away for nothing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those who rule them mock,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '52:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dead Sea Scrolls and Vulgate; Masoretic Text '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wail
      marker-yv: yv-n
    - type: text
      text: ”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “And all day long
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my name is constantly blasphemed.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Therefore my people will know my name;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: therefore in that day they will know
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that it is I who foretold it.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yes, it is I.”
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: How beautiful on the mountains
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are the feet of those who bring good news,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who proclaim peace,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who bring good tidings,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who proclaim salvation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who say to Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Your God reigns!”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Listen! Your watchmen lift up their voices;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: together they shout for joy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' returns to Zion,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will see it with their own eyes.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Burst into songs of joy together,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you ruins of Jerusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has comforted his people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has redeemed Jerusalem.
