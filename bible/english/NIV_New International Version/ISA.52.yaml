verses:
  '1':
  - type: text
    content: Awake, awake, Zion,
  - type: text
    content: clothe yourself with strength!
  - type: text
    content: Put on your garments of splendor,
  - type: text
    content: Jerusalem, the holy city.
  - type: text
    content: The uncircumcised and defiled
  - type: text
    content: will not enter you again.
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will lay bare his holy arm'
  - type: text
    content: in the sight of all the nations,
  - type: text
    content: and all the ends of the earth will see
  - type: text
    content: the salvation of our God.
  '11':
  - type: text
    content: Depart, depart, go out from there!
  - type: text
    content: Touch no unclean thing!
  - type: text
    content: Come out from it and be pure,
  - type: text
    content: 'you who carry the articles of the '
  - type: text
    content: Lord
  - type: text
    content: ’s house.
  '12':
  - type: text
    content: But you will not leave in haste
  - type: text
    content: or go in flight;
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' will go before you,'
  - type: text
    content: the God of Israel will be your rear guard.
  - type: heading
    content: The Suffering and Glory of the Servant
  '13':
  - type: text
    content: See, my servant will act wisely
  - type: note
    content: Or will prosper
  - type: text
    content: ;
  - type: text
    content: he will be raised and lifted up and highly exalted.
  '14':
  - type: text
    content: Just as there were many who were appalled at him
  - type: note
    content: Hebrew you
  - type: text
    content: —
  - type: text
    content: his appearance was so disfigured beyond that of any human being
  - type: text
    content: and his form marred beyond human likeness—
  '15':
  - type: text
    content: so he will sprinkle many nations,
  - type: note
    content: Or so will many nations be amazed at him (see also Septuagint)
  - type: text
    content: and kings will shut their mouths because of him.
  - type: text
    content: For what they were not told, they will see,
  - type: text
    content: and what they have not heard, they will understand.
  '2':
  - type: text
    content: Shake off your dust;
  - type: text
    content: rise up, sit enthroned, Jerusalem.
  - type: text
    content: Free yourself from the chains on your neck,
  - type: text
    content: Daughter Zion, now a captive.
  '3':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “You were sold for nothing,
  - type: text
    content: and without money you will be redeemed.”
  '4':
  - type: text
    content: 'For this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “At first my people went down to Egypt to live;
  - type: text
    content: lately, Assyria has oppressed them.
  '5':
  - type: text
    content: '“And now what do I have here?” declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “For my people have been taken away for nothing,
  - type: text
    content: and those who rule them mock,
  - type: note
    content: Dead Sea Scrolls and Vulgate; Masoretic Text wail
  - type: text
    content: ”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “And all day long
  - type: text
    content: my name is constantly blasphemed.
  '6':
  - type: text
    content: Therefore my people will know my name;
  - type: text
    content: therefore in that day they will know
  - type: text
    content: that it is I who foretold it.
  - type: text
    content: Yes, it is I.”
  '7':
  - type: text
    content: How beautiful on the mountains
  - type: text
    content: are the feet of those who bring good news,
  - type: text
    content: who proclaim peace,
  - type: text
    content: who bring good tidings,
  - type: text
    content: who proclaim salvation,
  - type: text
    content: who say to Zion,
  - type: text
    content: “Your God reigns!”
  '8':
  - type: text
    content: Listen! Your watchmen lift up their voices;
  - type: text
    content: together they shout for joy.
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' returns to Zion,'
  - type: text
    content: they will see it with their own eyes.
  '9':
  - type: text
    content: Burst into songs of joy together,
  - type: text
    content: you ruins of Jerusalem,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has comforted his people,'
  - type: text
    content: he has redeemed Jerusalem.
