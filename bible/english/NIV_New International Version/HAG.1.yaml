document_id: HAG.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Call to Build the House of the Lord
  - type: text
    content: 'In the second year of King Darius, on the first day of the sixth month, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came through the prophet Haggai to Zerubbabel son of Shealtiel, governor of Judah, and to Joshua son of Jozadak,'
  - type: note
    content: Hebrew Jehozadak, a variant of Jozadak; also in verses 12 and 14
  - type: text
    content: ' the high priest:'
  '10':
  - type: text
    content: 'Therefore, because of you the heavens have withheld their dew and the earth its crops. '
  '11':
  - type: text
    content: I called for a drought on the fields and the mountains, on the grain, the new wine, the olive oil and everything else the ground produces, on people and livestock, and on all the labor of your hands.”
  '12':
  - type: text
    content: 'Then Zerubbabel son of Shealtiel, Joshua son of Jozadak, the high priest, and the whole remnant of the people obeyed the voice of the '
  - type: text
    content: Lord
  - type: text
    content: ' their God and the message of the prophet Haggai, because the '
  - type: text
    content: Lord
  - type: text
    content: ' their God had sent him. And the people feared the '
  - type: text
    content: Lord
  - type: text
    content: .
  '13':
  - type: text
    content: 'Then Haggai, the '
  - type: text
    content: Lord
  - type: text
    content: '’s messenger, gave this message of the '
  - type: text
    content: Lord
  - type: text
    content: ' to the people: “I am with you,” declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' stirred up the spirit of Zerubbabel son of Shealtiel, governor of Judah, and the spirit of Joshua son of Jozadak, the high priest, and the spirit of the whole remnant of the people. They came and began to work on the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, their God, '
  '15':
  - type: text
    content: on the twenty-fourth day of the sixth month.
  - type: heading
    content: The Promised Glory of the New House
  - type: text
    content: In the second year of King Darius,
  '2':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says: “These people say, ‘The time has not yet come to rebuild the '
  - type: text
    content: Lord
  - type: text
    content: ’s house.’ ”
  '3':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came through the prophet Haggai: '
  '4':
  - type: text
    content: “Is it a time for you yourselves to be living in your paneled houses, while this house remains a ruin?”
  '5':
  - type: text
    content: 'Now this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says: “Give careful thought to your ways. '
  '6':
  - type: text
    content: You have planted much, but harvested little. You eat, but never have enough. You drink, but never have your fill. You put on clothes, but are not warm. You earn wages, only to put them in a purse with holes in it.”
  '7':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says: “Give careful thought to your ways. '
  '8':
  - type: text
    content: 'Go up into the mountains and bring down timber and build my house, so that I may take pleasure in it and be honored,” says the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '9':
  - type: text
    content: '“You expected much, but see, it turned out to be little. What you brought home, I blew away. Why?” declares the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty. “Because of my house, which remains a ruin, while each of you is busy with your own house. '
