- type: usfm
  marker: q2
  children:
  - type: text
    text: and no one can deliver out of my hand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'I lift my hand to heaven and solemnly swear:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: As surely as I live forever,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: when I sharpen my flashing sword
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my hand grasps it in judgment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will take vengeance on my adversaries
- type: usfm
  marker: q2
  children:
  - type: text
    text: and repay those who hate me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: I will make my arrows drunk with blood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'while my sword devours flesh:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: the blood of the slain and the captives,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the heads of the enemy leaders.”
- type: usfm
  marker: q1
  children:
  - type: usfm
