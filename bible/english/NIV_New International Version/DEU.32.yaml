document_id: DEU.32
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Listen, you heavens, and I will speak;
- type: usfm
  marker: q2
  children:
  - type: text
    text: hear, you earth, the words of my mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Let my teaching fall like rain
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my words descend like dew,
- type: usfm
  marker: q1
  children:
  - type: text
    text: like showers on new grass,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like abundant rain on tender plants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I will proclaim the name of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: Oh, praise the greatness of our God!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He is the Rock, his works are perfect,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all his ways are just.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A faithful God who does no wrong,
- type: usfm
  marker: q2
  children:
  - type: text
    text: upright and just is he.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: They are corrupt and not his children;
- type: usfm
  marker: q2
  children:
  - type: text
    text: to their shame they are a warped and crooked generation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Is this the way you repay the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: you foolish and unwise people?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is he not your Father, your Creator,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Father, who bought you
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: who made you and formed you?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Remember the days of old;
- type: usfm
  marker: q2
  children:
  - type: text
    text: consider the generations long past.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ask your father and he will tell you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your elders, and they will explain to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: When the Most High gave the nations their inheritance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when he divided all mankind,
- type: usfm
  marker: q1
  children:
  - type: text
    text: he set up boundaries for the peoples
- type: usfm
  marker: q2
  children:
  - type: text
    text: according to the number of the sons of Israel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Masoretic Text; Dead Sea Scrolls (see also Septuagint) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sons of God
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s portion is his people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Jacob his allotted inheritance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: In a desert land he found him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in a barren and howling waste.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He shielded him and cared for him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he guarded him as the apple of his eye,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: like an eagle that stirs up its nest
- type: usfm
  marker: q2
  children:
  - type: text
    text: and hovers over its young,
- type: usfm
  marker: q1
  children:
  - type: text
    text: that spreads its wings to catch them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and carries them aloft.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' alone led him;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: no foreign god was with him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He made him ride on the heights of the land
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fed him with the fruit of the fields.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He nourished him with honey from the rock,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and with oil from the flinty crag,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: with curds and milk from herd and flock
- type: usfm
  marker: q2
  children:
  - type: text
    text: and with fattened lambs and goats,
- type: usfm
  marker: q1
  children:
  - type: text
    text: with choice rams of Bashan
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the finest kernels of wheat.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You drank the foaming blood of the grape.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Jeshurun
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jeshurun '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the upright one, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: that is, Israel.
    marker-yv: yv-n
  - type: text
    text: ' grew fat and kicked;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: filled with food, they became heavy and sleek.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They abandoned the God who made them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and rejected the Rock their Savior.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: They made him jealous with their foreign gods
- type: usfm
  marker: q2
  children:
  - type: text
    text: and angered him with their detestable idols.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: They sacrificed to false gods, which are not God—
- type: usfm
  marker: q2
  children:
  - type: text
    text: gods they had not known,
- type: usfm
  marker: q2
  children:
  - type: text
    text: gods that recently appeared,
- type: usfm
  marker: q2
  children:
  - type: text
    text: gods your ancestors did not fear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: You deserted the Rock, who fathered you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you forgot the God who gave you birth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' saw this and rejected them'
- type: usfm
  marker: q2
  children:
  - type: text
    text: because he was angered by his sons and daughters.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “I will hide my face from them,” he said,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “and see what their end will be;
- type: usfm
  marker: q1
  children:
  - type: text
    text: for they are a perverse generation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: children who are unfaithful.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: They made me jealous by what is no god
- type: usfm
  marker: q2
  children:
  - type: text
    text: and angered me with their worthless idols.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will make them envious by those who are not a people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will make them angry by a nation that has no understanding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: For a fire will be kindled by my wrath,
- type: usfm
  marker: q2
  children:
  - type: text
    text: one that burns down to the realm of the dead below.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It will devour the earth and its harvests
- type: usfm
  marker: q2
  children:
  - type: text
    text: and set afire the foundations of the mountains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “I will heap calamities on them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and spend my arrows against them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: I will send wasting famine against them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: consuming pestilence and deadly plague;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will send against them the fangs of wild beasts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the venom of vipers that glide in the dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: In the street the sword will make them childless;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in their homes terror will reign.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The young men and young women will perish,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the infants and those with gray hair.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: I said I would scatter them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and erase their name from human memory,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: but I dreaded the taunt of the enemy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: lest the adversary misunderstand
- type: usfm
  marker: q1
  children:
  - type: text
    text: and say, ‘Our hand has triumphed;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has not done all this.’ ”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: They are a nation without sense,
- type: usfm
  marker: q2
  children:
  - type: text
    text: there is no discernment in them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: If only they were wise and would understand this
- type: usfm
  marker: q2
  children:
  - type: text
    text: and discern what their end will be!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: How could one man chase a thousand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or two put ten thousand to flight,
- type: usfm
  marker: q1
  children:
  - type: text
    text: unless their Rock had sold them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'unless the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had given them up?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: For their rock is not like our Rock,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as even our enemies concede.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Their vine comes from the vine of Sodom
- type: usfm
  marker: q2
  children:
  - type: text
    text: and from the fields of Gomorrah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their grapes are filled with poison,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their clusters with bitterness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Their wine is the venom of serpents,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the deadly poison of cobras.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: “Have I not kept this in reserve
- type: usfm
  marker: q2
  children:
  - type: text
    text: and sealed it in my vaults?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: It is mine to avenge; I will repay.
- type: usfm
  marker: q2
  children:
  - type: text
    text: In due time their foot will slip;
- type: usfm
  marker: q1
  children:
  - type: text
    text: their day of disaster is near
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their doom rushes upon them.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will vindicate his people'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and relent concerning his servants
- type: usfm
  marker: q1
  children:
  - type: text
    text: when he sees their strength is gone
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no one is left, slave or free.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and they are without a ruler or leader
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'He will say: “Now where are their gods,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the rock they took refuge in,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: the gods who ate the fat of their sacrifices
- type: usfm
  marker: q2
  children:
  - type: text
    text: and drank the wine of their drink offerings?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them rise up to help you!
