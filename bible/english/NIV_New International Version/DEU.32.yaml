document_id: DEU.32,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen, you heavens, and I will speak;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hear, you earth, the words of my mouth.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In a desert land he found him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in a barren and howling waste.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shielded him and cared for him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he guarded him as the apple of his eye,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like an eagle that stirs up its nest
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hovers over its young,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that spreads its wings to catch them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and carries them aloft.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' alone led him;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no foreign god was with him.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He made him ride on the heights of the land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fed him with the fruit of the fields.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He nourished him with honey from the rock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and with oil from the flinty crag,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with curds and milk from herd and flock
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and with fattened lambs and goats,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with choice rams of Bashan
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the finest kernels of wheat.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You drank the foaming blood of the grape.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jeshurun
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jeshurun '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the upright one, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: that is, Israel.
      marker-yv: yv-n
    - type: text
      text: ' grew fat and kicked;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: filled with food, they became heavy and sleek.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They abandoned the God who made them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and rejected the Rock their Savior.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They made him jealous with their foreign gods
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and angered him with their detestable idols.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They sacrificed to false gods, which are not God—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gods they had not known,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gods that recently appeared,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: gods your ancestors did not fear.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You deserted the Rock, who fathered you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you forgot the God who gave you birth.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' saw this and rejected them'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because he was angered by his sons and daughters.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let my teaching fall like rain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my words descend like dew,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like showers on new grass,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like abundant rain on tender plants.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will hide my face from them,” he said,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “and see what their end will be;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they are a perverse generation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: children who are unfaithful.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They made me jealous by what is no god
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and angered me with their worthless idols.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make them envious by those who are not a people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will make them angry by a nation that has no understanding.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For a fire will be kindled by my wrath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: one that burns down to the realm of the dead below.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will devour the earth and its harvests
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and set afire the foundations of the mountains.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will heap calamities on them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and spend my arrows against them.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will send wasting famine against them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: consuming pestilence and deadly plague;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will send against them the fangs of wild beasts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the venom of vipers that glide in the dust.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the street the sword will make them childless;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in their homes terror will reign.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The young men and young women will perish,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the infants and those with gray hair.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I said I would scatter them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and erase their name from human memory,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but I dreaded the taunt of the enemy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: lest the adversary misunderstand
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and say, ‘Our hand has triumphed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has not done all this.’ ”'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are a nation without sense,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is no discernment in them.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If only they were wise and would understand this
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and discern what their end will be!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will proclaim the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh, praise the greatness of our God!
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: How could one man chase a thousand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or two put ten thousand to flight,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: unless their Rock had sold them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'unless the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had given them up?'
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For their rock is not like our Rock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as even our enemies concede.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their vine comes from the vine of Sodom
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and from the fields of Gomorrah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their grapes are filled with poison,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their clusters with bitterness.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their wine is the venom of serpents,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the deadly poison of cobras.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Have I not kept this in reserve
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sealed it in my vaults?
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is mine to avenge; I will repay.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: In due time their foot will slip;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: their day of disaster is near
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their doom rushes upon them.”
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will vindicate his people'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and relent concerning his servants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when he sees their strength is gone
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one is left, slave or free.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and they are without a ruler or leader
      marker-yv: yv-n
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He will say: “Now where are their gods,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the rock they took refuge in,
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the gods who ate the fat of their sacrifices
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and drank the wine of their drink offerings?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let them rise up to help you!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let them give you shelter!
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “See now that I myself am he!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: There is no god besides me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I put to death and I bring to life,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have wounded and I will heal,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one can deliver out of my hand.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is the Rock, his works are perfect,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all his ways are just.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A faithful God who does no wrong,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: upright and just is he.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I lift my hand to heaven and solemnly swear:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: As surely as I live forever,
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when I sharpen my flashing sword
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my hand grasps it in judgment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will take vengeance on my adversaries
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and repay those who hate me.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make my arrows drunk with blood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'while my sword devours flesh:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the blood of the slain and the captives,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the heads of the enemy leaders.”
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rejoice, you nations, with his people,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:43 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Make his people rejoice, you nations
      marker-yv: yv-n
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:43 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Masoretic Text; Dead Sea Scrolls (see also Septuagint) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: people, / and let all the angels worship him,
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he will avenge the blood of his servants;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he will take vengeance on his enemies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make atonement for his land and people.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moses came with Joshua
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Hoshea
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Joshua
      marker-yv: yv-n
    - type: text
      text: ' son of Nun and spoke all the words of this song in the hearing of the people. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Moses finished reciting all these words to all Israel, '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he said to them, “Take to heart all the words I have solemnly declared to you this day, so that you may command your children to obey carefully all the words of this law. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They are not just idle words for you—they are your life. By them you will live long in the land you are crossing the Jordan to possess.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moses to Die on Mount Nebo
    marker-yv: yv-h
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On that same day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told Moses, '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Go up into the Abarim Range to Mount Nebo in Moab, across from Jericho, and view Canaan, the land I am giving the Israelites as their own possession. '
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are corrupt and not his children;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to their shame they are a warped and crooked generation.
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There on the mountain that you have climbed you will die and be gathered to your people, just as your brother Aaron died on Mount Hor and was gathered to his people. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is because both of you broke faith with me in the presence of the Israelites at the waters of Meribah Kadesh in the Desert of Zin and because you did not uphold my holiness among the Israelites. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Therefore, you will see the land only from a distance; you will not enter the land I am giving to the people of Israel.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Is this the way you repay the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you foolish and unwise people?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is he not your Father, your Creator,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Father, who bought you
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who made you and formed you?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Remember the days of old;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: consider the generations long past.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ask your father and he will tell you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your elders, and they will explain to you.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the Most High gave the nations their inheritance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when he divided all mankind,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he set up boundaries for the peoples
  - type: usfm
    marker: q2
    children:
    - type: text
      text: according to the number of the sons of Israel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Masoretic Text; Dead Sea Scrolls (see also Septuagint) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sons of God
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s portion is his people,
  - type: usfm
