document_id: DEU.32,111
type_code: eng
verses:
  '1':
  - type: text
    content: Listen, you heavens, and I will speak;
  - type: text
    content: hear, you earth, the words of my mouth.
  '10':
  - type: text
    content: In a desert land he found him,
  - type: text
    content: in a barren and howling waste.
  - type: text
    content: He shielded him and cared for him;
  - type: text
    content: he guarded him as the apple of his eye,
  '11':
  - type: text
    content: like an eagle that stirs up its nest
  - type: text
    content: and hovers over its young,
  - type: text
    content: that spreads its wings to catch them
  - type: text
    content: and carries them aloft.
  '12':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' alone led him;'
  - type: text
    content: no foreign god was with him.
  '13':
  - type: text
    content: He made him ride on the heights of the land
  - type: text
    content: and fed him with the fruit of the fields.
  - type: text
    content: He nourished him with honey from the rock,
  - type: text
    content: and with oil from the flinty crag,
  '14':
  - type: text
    content: with curds and milk from herd and flock
  - type: text
    content: and with fattened lambs and goats,
  - type: text
    content: with choice rams of Bashan
  - type: text
    content: and the finest kernels of wheat.
  - type: text
    content: You drank the foaming blood of the grape.
  '15':
  - type: text
    content: Jeshurun
  - type: note
    content: Jeshurun means the upright one, that is, Israel.
  - type: text
    content: ' grew fat and kicked;'
  - type: text
    content: filled with food, they became heavy and sleek.
  - type: text
    content: They abandoned the God who made them
  - type: text
    content: and rejected the Rock their Savior.
  '16':
  - type: text
    content: They made him jealous with their foreign gods
  - type: text
    content: and angered him with their detestable idols.
  '17':
  - type: text
    content: They sacrificed to false gods, which are not God—
  - type: text
    content: gods they had not known,
  - type: text
    content: gods that recently appeared,
  - type: text
    content: gods your ancestors did not fear.
  '18':
  - type: text
    content: You deserted the Rock, who fathered you;
  - type: text
    content: you forgot the God who gave you birth.
  '19':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' saw this and rejected them'
  - type: text
    content: because he was angered by his sons and daughters.
  '2':
  - type: text
    content: Let my teaching fall like rain
  - type: text
    content: and my words descend like dew,
  - type: text
    content: like showers on new grass,
  - type: text
    content: like abundant rain on tender plants.
  '20':
  - type: text
    content: “I will hide my face from them,” he said,
  - type: text
    content: “and see what their end will be;
  - type: text
    content: for they are a perverse generation,
  - type: text
    content: children who are unfaithful.
  '21':
  - type: text
    content: They made me jealous by what is no god
  - type: text
    content: and angered me with their worthless idols.
  - type: text
    content: I will make them envious by those who are not a people;
  - type: text
    content: I will make them angry by a nation that has no understanding.
  '22':
  - type: text
    content: For a fire will be kindled by my wrath,
  - type: text
    content: one that burns down to the realm of the dead below.
  - type: text
    content: It will devour the earth and its harvests
  - type: text
    content: and set afire the foundations of the mountains.
  '23':
  - type: text
    content: “I will heap calamities on them
  - type: text
    content: and spend my arrows against them.
  '24':
  - type: text
    content: I will send wasting famine against them,
  - type: text
    content: consuming pestilence and deadly plague;
  - type: text
    content: I will send against them the fangs of wild beasts,
  - type: text
    content: the venom of vipers that glide in the dust.
  '25':
  - type: text
    content: In the street the sword will make them childless;
  - type: text
    content: in their homes terror will reign.
  - type: text
    content: The young men and young women will perish,
  - type: text
    content: the infants and those with gray hair.
  '26':
  - type: text
    content: I said I would scatter them
  - type: text
    content: and erase their name from human memory,
  '27':
  - type: text
    content: but I dreaded the taunt of the enemy,
  - type: text
    content: lest the adversary misunderstand
  - type: text
    content: and say, ‘Our hand has triumphed;
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' has not done all this.’ ”'
  '28':
  - type: text
    content: They are a nation without sense,
  - type: text
    content: there is no discernment in them.
  '29':
  - type: text
    content: If only they were wise and would understand this
  - type: text
    content: and discern what their end will be!
  '3':
  - type: text
    content: 'I will proclaim the name of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: Oh, praise the greatness of our God!
  '30':
  - type: text
    content: How could one man chase a thousand,
  - type: text
    content: or two put ten thousand to flight,
  - type: text
    content: unless their Rock had sold them,
  - type: text
    content: 'unless the '
  - type: text
    content: Lord
  - type: text
    content: ' had given them up?'
  '31':
  - type: text
    content: For their rock is not like our Rock,
  - type: text
    content: as even our enemies concede.
  '32':
  - type: text
    content: Their vine comes from the vine of Sodom
  - type: text
    content: and from the fields of Gomorrah.
  - type: text
    content: Their grapes are filled with poison,
  - type: text
    content: and their clusters with bitterness.
  '33':
  - type: text
    content: Their wine is the venom of serpents,
  - type: text
    content: the deadly poison of cobras.
  '34':
  - type: text
    content: “Have I not kept this in reserve
  - type: text
    content: and sealed it in my vaults?
  '35':
  - type: text
    content: It is mine to avenge; I will repay.
  - type: text
    content: In due time their foot will slip;
  - type: text
    content: their day of disaster is near
  - type: text
    content: and their doom rushes upon them.”
  '36':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will vindicate his people'
  - type: text
    content: and relent concerning his servants
  - type: text
    content: when he sees their strength is gone
  - type: text
    content: and no one is left, slave or free.
  - type: note
    content: Or and they are without a ruler or leader
  '37':
  - type: text
    content: 'He will say: “Now where are their gods,'
  - type: text
    content: the rock they took refuge in,
  '38':
  - type: text
    content: the gods who ate the fat of their sacrifices
  - type: text
    content: and drank the wine of their drink offerings?
  - type: text
    content: Let them rise up to help you!
  - type: text
    content: Let them give you shelter!
  '39':
  - type: text
    content: “See now that I myself am he!
  - type: text
    content: There is no god besides me.
  - type: text
    content: I put to death and I bring to life,
  - type: text
    content: I have wounded and I will heal,
  - type: text
    content: and no one can deliver out of my hand.
  '4':
  - type: text
    content: He is the Rock, his works are perfect,
  - type: text
    content: and all his ways are just.
  - type: text
    content: A faithful God who does no wrong,
  - type: text
    content: upright and just is he.
  '40':
  - type: text
    content: 'I lift my hand to heaven and solemnly swear:'
  - type: text
    content: As surely as I live forever,
  '41':
  - type: text
    content: when I sharpen my flashing sword
  - type: text
    content: and my hand grasps it in judgment,
  - type: text
    content: I will take vengeance on my adversaries
  - type: text
    content: and repay those who hate me.
  '42':
  - type: text
    content: I will make my arrows drunk with blood,
  - type: text
    content: 'while my sword devours flesh:'
  - type: text
    content: the blood of the slain and the captives,
  - type: text
    content: the heads of the enemy leaders.”
  '43':
  - type: text
    content: Rejoice, you nations, with his people,
  - type: note
    content: Or Make his people rejoice, you nations
  - type: note
    content: Masoretic Text; Dead Sea Scrolls (see also Septuagint) people, / and let all the angels worship him,
  - type: text
    content: for he will avenge the blood of his servants;
  - type: text
    content: he will take vengeance on his enemies
  - type: text
    content: and make atonement for his land and people.
  '44':
  - type: text
    content: Moses came with Joshua
  - type: note
    content: Hebrew Hoshea, a variant of Joshua
  - type: text
    content: ' son of Nun and spoke all the words of this song in the hearing of the people. '
  '45':
  - type: text
    content: 'When Moses finished reciting all these words to all Israel, '
  '46':
  - type: text
    content: 'he said to them, “Take to heart all the words I have solemnly declared to you this day, so that you may command your children to obey carefully all the words of this law. '
  '47':
  - type: text
    content: They are not just idle words for you—they are your life. By them you will live long in the land you are crossing the Jordan to possess.”
  - type: heading
    content: Moses to Die on Mount Nebo
  '48':
  - type: text
    content: 'On that same day the '
  - type: text
    content: Lord
  - type: text
    content: ' told Moses, '
  '49':
  - type: text
    content: '“Go up into the Abarim Range to Mount Nebo in Moab, across from Jericho, and view Canaan, the land I am giving the Israelites as their own possession. '
  '5':
  - type: text
    content: They are corrupt and not his children;
  - type: text
    content: to their shame they are a warped and crooked generation.
  '50':
  - type: text
    content: 'There on the mountain that you have climbed you will die and be gathered to your people, just as your brother Aaron died on Mount Hor and was gathered to his people. '
  '51':
  - type: text
    content: 'This is because both of you broke faith with me in the presence of the Israelites at the waters of Meribah Kadesh in the Desert of Zin and because you did not uphold my holiness among the Israelites. '
  '52':
  - type: text
    content: Therefore, you will see the land only from a distance; you will not enter the land I am giving to the people of Israel.”
  '6':
  - type: text
    content: 'Is this the way you repay the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: you foolish and unwise people?
  - type: text
    content: Is he not your Father, your Creator,
  - type: note
    content: Or Father, who bought you
  - type: text
    content: who made you and formed you?
  '7':
  - type: text
    content: Remember the days of old;
  - type: text
    content: consider the generations long past.
  - type: text
    content: Ask your father and he will tell you,
  - type: text
    content: your elders, and they will explain to you.
  '8':
  - type: text
    content: When the Most High gave the nations their inheritance,
  - type: text
    content: when he divided all mankind,
  - type: text
    content: he set up boundaries for the peoples
  - type: text
    content: according to the number of the sons of Israel.
  - type: note
    content: Masoretic Text; Dead Sea Scrolls (see also Septuagint) sons of God
  '9':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ’s portion is his people,
  - type: text
    content: Jacob his allotted inheritance.
