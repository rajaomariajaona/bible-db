document_id: DEU.16,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Passover
  - type: text
    content: 'Observe the month of Aviv and celebrate the Passover of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, because in the month of Aviv he brought you out of Egypt by night. '
  '10':
  - type: text
    content: 'Then celebrate the Festival of Weeks to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God by giving a freewill offering in proportion to the blessings the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has given you. '
  '11':
  - type: text
    content: 'And rejoice before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God at the place he will choose as a dwelling for his Name—you, your sons and daughters, your male and female servants, the Levites in your towns, and the foreigners, the fatherless and the widows living among you. '
  '12':
  - type: text
    content: Remember that you were slaves in Egypt, and follow carefully these decrees.
  - type: heading
    content: The Festival of Tabernacles
  '13':
  - type: text
    content: 'Celebrate the Festival of Tabernacles for seven days after you have gathered the produce of your threshing floor and your winepress. '
  '14':
  - type: text
    content: 'Be joyful at your festival—you, your sons and daughters, your male and female servants, and the Levites, the foreigners, the fatherless and the widows who live in your towns. '
  '15':
  - type: text
    content: 'For seven days celebrate the festival to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God at the place the '
  - type: text
    content: Lord
  - type: text
    content: ' will choose. For the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will bless you in all your harvest and in all the work of your hands, and your joy will be complete.'
  '16':
  - type: text
    content: 'Three times a year all your men must appear before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God at the place he will choose: at the Festival of Unleavened Bread, the Festival of Weeks and the Festival of Tabernacles. No one should appear before the '
  - type: text
    content: Lord
  - type: text
    content: ' empty-handed: '
  '17':
  - type: text
    content: 'Each of you must bring a gift in proportion to the way the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has blessed you.'
  - type: heading
    content: Judges
  '18':
  - type: text
    content: 'Appoint judges and officials for each of your tribes in every town the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you, and they shall judge the people fairly. '
  '19':
  - type: text
    content: 'Do not pervert justice or show partiality. Do not accept a bribe, for a bribe blinds the eyes of the wise and twists the words of the innocent. '
  '2':
  - type: text
    content: 'Sacrifice as the Passover to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God an animal from your flock or herd at the place the '
  - type: text
    content: Lord
  - type: text
    content: ' will choose as a dwelling for his Name. '
  '20':
  - type: text
    content: 'Follow justice and justice alone, so that you may live and possess the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you.'
  - type: heading
    content: Worshiping Other Gods
  '21':
  - type: text
    content: 'Do not set up any wooden Asherah pole beside the altar you build to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, '
  '22':
  - type: text
    content: 'and do not erect a sacred stone, for these the '
  - type: text
    content: Lord
  - type: text
    content: ' your God hates.'
  '3':
  - type: text
    content: 'Do not eat it with bread made with yeast, but for seven days eat unleavened bread, the bread of affliction, because you left Egypt in haste—so that all the days of your life you may remember the time of your departure from Egypt. '
  '4':
  - type: text
    content: Let no yeast be found in your possession in all your land for seven days. Do not let any of the meat you sacrifice on the evening of the first day remain until morning.
  '5':
  - type: text
    content: 'You must not sacrifice the Passover in any town the '
  - type: text
    content: Lord
  - type: text
    content: ' your God gives you '
  '6':
  - type: text
    content: except in the place he will choose as a dwelling for his Name. There you must sacrifice the Passover in the evening, when the sun goes down, on the anniversary
  - type: note
    content: Or down, at the time of day
  - type: text
    content: ' of your departure from Egypt. '
  '7':
  - type: text
    content: 'Roast it and eat it at the place the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will choose. Then in the morning return to your tents. '
  '8':
  - type: text
    content: 'For six days eat unleavened bread and on the seventh day hold an assembly to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and do no work.'
  - type: heading
    content: The Festival of Weeks
  '9':
  - type: text
    content: 'Count off seven weeks from the time you begin to put the sickle to the standing grain. '
