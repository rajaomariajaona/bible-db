document_id: HEB.12,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Therefore, since we are surrounded by such a great cloud of witnesses, let us throw off everything that hinders and the sin that so easily entangles. And let us run with perseverance the race marked out for us, '
  '10':
  - type: text
    content: 'They disciplined us for a little while as they thought best; but God disciplines us for our good, in order that we may share in his holiness. '
  '11':
  - type: text
    content: No discipline seems pleasant at the time, but painful. Later on, however, it produces a harvest of righteousness and peace for those who have been trained by it.
  '12':
  - type: text
    content: 'Therefore, strengthen your feeble arms and weak knees. '
  '13':
  - type: text
    content: “Make level paths for your feet,”
  - type: note
    content: Prov. 4:26
  - type: text
    content: ' so that the lame may not be disabled, but rather healed.'
  - type: heading
    content: Warning and Encouragement
  '14':
  - type: text
    content: 'Make every effort to live in peace with everyone and to be holy; without holiness no one will see the Lord. '
  '15':
  - type: text
    content: 'See to it that no one falls short of the grace of God and that no bitter root grows up to cause trouble and defile many. '
  '16':
  - type: text
    content: 'See that no one is sexually immoral, or is godless like Esau, who for a single meal sold his inheritance rights as the oldest son. '
  '17':
  - type: text
    content: Afterward, as you know, when he wanted to inherit this blessing, he was rejected. Even though he sought the blessing with tears, he could not change what he had done.
  - type: heading
    content: The Mountain of Fear and the Mountain of Joy
  '18':
  - type: text
    content: 'You have not come to a mountain that can be touched and that is burning with fire; to darkness, gloom and storm; '
  '19':
  - type: text
    content: 'to a trumpet blast or to such a voice speaking words that those who heard it begged that no further word be spoken to them, '
  '2':
  - type: text
    content: 'fixing our eyes on Jesus, the pioneer and perfecter of faith. For the joy set before him he endured the cross, scorning its shame, and sat down at the right hand of the throne of God. '
  '20':
  - type: text
    content: 'because they could not bear what was commanded: “If even an animal touches the mountain, it must be stoned to death.”'
  - type: note
    content: Exodus 19:12,13
  - type: text
    content: ' '
  '21':
  - type: text
    content: The sight was so terrifying that Moses said, “I am trembling with fear.”
  - type: note
    content: See Deut. 9:19.
  '22':
  - type: text
    content: 'But you have come to Mount Zion, to the city of the living God, the heavenly Jerusalem. You have come to thousands upon thousands of angels in joyful assembly, '
  '23':
  - type: text
    content: 'to the church of the firstborn, whose names are written in heaven. You have come to God, the Judge of all, to the spirits of the righteous made perfect, '
  '24':
  - type: text
    content: to Jesus the mediator of a new covenant, and to the sprinkled blood that speaks a better word than the blood of Abel.
  '25':
  - type: text
    content: 'See to it that you do not refuse him who speaks. If they did not escape when they refused him who warned them on earth, how much less will we, if we turn away from him who warns us from heaven? '
  '26':
  - type: text
    content: At that time his voice shook the earth, but now he has promised, “Once more I will shake not only the earth but also the heavens.”
  - type: note
    content: Haggai 2:6
  - type: text
    content: ' '
  '27':
  - type: text
    content: The words “once more” indicate the removing of what can be shaken—that is, created things—so that what cannot be shaken may remain.
  '28':
  - type: text
    content: 'Therefore, since we are receiving a kingdom that cannot be shaken, let us be thankful, and so worship God acceptably with reverence and awe, '
  '29':
  - type: text
    content: for our “God is a consuming fire.”
  - type: note
    content: Deut. 4:24
  '3':
  - type: text
    content: Consider him who endured such opposition from sinners, so that you will not grow weary and lose heart.
  - type: heading
    content: God Disciplines His Children
  '4':
  - type: text
    content: 'In your struggle against sin, you have not yet resisted to the point of shedding your blood. '
  '5':
  - type: text
    content: And have you completely forgotten this word of encouragement that addresses you as a father addresses his son? It says,
  - type: text
    content: “My son, do not make light of the Lord’s discipline,
  - type: text
    content: and do not lose heart when he rebukes you,
  '6':
  - type: text
    content: because the Lord disciplines the one he loves,
  - type: text
    content: and he chastens everyone he accepts as his son.”
  - type: note
    content: Prov. 3:11,12 (see Septuagint)
  '7':
  - type: text
    content: 'Endure hardship as discipline; God is treating you as his children. For what children are not disciplined by their father? '
  '8':
  - type: text
    content: 'If you are not disciplined—and everyone undergoes discipline—then you are not legitimate, not true sons and daughters at all. '
  '9':
  - type: text
    content: 'Moreover, we have all had human fathers who disciplined us and we respected them for it. How much more should we submit to the Father of spirits and live! '
