document_id: 2KI.9,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehu Anointed King of Israel
  - type: text
    content: 'The prophet Elisha summoned a man from the company of the prophets and said to him, “Tuck your cloak into your belt, take this flask of olive oil with you and go to Ramoth Gilead. '
  '10':
  - type: text
    content: As for Jezebel, dogs will devour her on the plot of ground at Jezreel, and no one will bury her.’ ” Then he opened the door and ran.
  '11':
  - type: text
    content: When Jehu went out to his fellow officers, one of them asked him, “Is everything all right? Why did this maniac come to you?”
  - type: text
    content: “You know the man and the sort of things he says,” Jehu replied.
  '12':
  - type: text
    content: “That’s not true!” they said. “Tell us.”
  - type: text
    content: 'Jehu said, “Here is what he told me: ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: I anoint you king over Israel.’ ”'
  '13':
  - type: text
    content: They quickly took their cloaks and spread them under him on the bare steps. Then they blew the trumpet and shouted, “Jehu is king!”
  - type: heading
    content: Jehu Kills Joram and Ahaziah
  '14':
  - type: text
    content: 'So Jehu son of Jehoshaphat, the son of Nimshi, conspired against Joram. (Now Joram and all Israel had been defending Ramoth Gilead against Hazael king of Aram, '
  '15':
  - type: text
    content: but King Joram
  - type: note
    content: Hebrew Jehoram, a variant of Joram; also in verses 17 and 21-24
  - type: text
    content: ' had returned to Jezreel to recover from the wounds the Arameans had inflicted on him in the battle with Hazael king of Aram.) Jehu said, “If you desire to make me king, don’t let anyone slip out of the city to go and tell the news in Jezreel.” '
  '16':
  - type: text
    content: Then he got into his chariot and rode to Jezreel, because Joram was resting there and Ahaziah king of Judah had gone down to see him.
  '17':
  - type: text
    content: When the lookout standing on the tower in Jezreel saw Jehu’s troops approaching, he called out, “I see some troops coming.”
  - type: text
    content: “Get a horseman,” Joram ordered. “Send him to meet them and ask, ‘Do you come in peace?’ ”
  '18':
  - type: text
    content: 'The horseman rode off to meet Jehu and said, “This is what the king says: ‘Do you come in peace?’ ”'
  - type: text
    content: “What do you have to do with peace?” Jehu replied. “Fall in behind me.”
  - type: text
    content: The lookout reported, “The messenger has reached them, but he isn’t coming back.”
  '19':
  - type: text
    content: 'So the king sent out a second horseman. When he came to them he said, “This is what the king says: ‘Do you come in peace?’ ”'
  - type: text
    content: Jehu replied, “What do you have to do with peace? Fall in behind me.”
  '2':
  - type: text
    content: 'When you get there, look for Jehu son of Jehoshaphat, the son of Nimshi. Go to him, get him away from his companions and take him into an inner room. '
  '20':
  - type: text
    content: The lookout reported, “He has reached them, but he isn’t coming back either. The driving is like that of Jehu son of Nimshi—he drives like a maniac.”
  '21':
  - type: text
    content: '“Hitch up my chariot,” Joram ordered. And when it was hitched up, Joram king of Israel and Ahaziah king of Judah rode out, each in his own chariot, to meet Jehu. They met him at the plot of ground that had belonged to Naboth the Jezreelite. '
  '22':
  - type: text
    content: When Joram saw Jehu he asked, “Have you come in peace, Jehu?”
  - type: text
    content: “How can there be peace,” Jehu replied, “as long as all the idolatry and witchcraft of your mother Jezebel abound?”
  '23':
  - type: text
    content: Joram turned about and fled, calling out to Ahaziah, “Treachery, Ahaziah!”
  '24':
  - type: text
    content: 'Then Jehu drew his bow and shot Joram between the shoulders. The arrow pierced his heart and he slumped down in his chariot. '
  '25':
  - type: text
    content: 'Jehu said to Bidkar, his chariot officer, “Pick him up and throw him on the field that belonged to Naboth the Jezreelite. Remember how you and I were riding together in chariots behind Ahab his father when the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke this prophecy against him: '
  '26':
  - type: text
    content: '‘Yesterday I saw the blood of Naboth and the blood of his sons, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', and I will surely make you pay for it on this plot of ground, declares the '
  - type: text
    content: Lord
  - type: text
    content: .’
  - type: note
    content: See 1 Kings 21:19.
  - type: text
    content: ' Now then, pick him up and throw him on that plot, in accordance with the word of the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '27':
  - type: text
    content: When Ahaziah king of Judah saw what had happened, he fled up the road to Beth Haggan.
  - type: note
    content: Or fled by way of the garden house
  - type: text
    content: ' Jehu chased him, shouting, “Kill him too!” They wounded him in his chariot on the way up to Gur near Ibleam, but he escaped to Megiddo and died there. '
  '28':
  - type: text
    content: 'His servants took him by chariot to Jerusalem and buried him with his ancestors in his tomb in the City of David. '
  '29':
  - type: text
    content: (In the eleventh year of Joram son of Ahab, Ahaziah had become king of Judah.)
  - type: heading
    content: Jezebel Killed
  '3':
  - type: text
    content: 'Then take the flask and pour the oil on his head and declare, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: I anoint you king over Israel.’ Then open the door and run; don’t delay!”'
  '30':
  - type: text
    content: 'Then Jehu went to Jezreel. When Jezebel heard about it, she put on eye makeup, arranged her hair and looked out of a window. '
  '31':
  - type: text
    content: As Jehu entered the gate, she asked, “Have you come in peace, you Zimri, you murderer of your master?”
  - type: note
    content: Or “Was there peace for Zimri, who murdered his master?”
  '32':
  - type: text
    content: 'He looked up at the window and called out, “Who is on my side? Who?” Two or three eunuchs looked down at him. '
  '33':
  - type: text
    content: “Throw her down!” Jehu said. So they threw her down, and some of her blood spattered the wall and the horses as they trampled her underfoot.
  '34':
  - type: text
    content: 'Jehu went in and ate and drank. “Take care of that cursed woman,” he said, “and bury her, for she was a king’s daughter.” '
  '35':
  - type: text
    content: 'But when they went out to bury her, they found nothing except her skull, her feet and her hands. '
  '36':
  - type: text
    content: 'They went back and told Jehu, who said, “This is the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that he spoke through his servant Elijah the Tishbite: On the plot of ground at Jezreel dogs will devour Jezebel’s flesh.'
  - type: note
    content: See 1 Kings 21:23.
  - type: text
    content: ' '
  '37':
  - type: text
    content: Jezebel’s body will be like dung on the ground in the plot at Jezreel, so that no one will be able to say, ‘This is Jezebel.’ ”
  '4':
  - type: text
    content: 'So the young prophet went to Ramoth Gilead. '
  '5':
  - type: text
    content: When he arrived, he found the army officers sitting together. “I have a message for you, commander,” he said.
  - type: text
    content: “For which of us?” asked Jehu.
  - type: text
    content: “For you, commander,” he replied.
  '6':
  - type: text
    content: 'Jehu got up and went into the house. Then the prophet poured the oil on Jehu’s head and declared, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: ‘I anoint you king over the '
  - type: text
    content: Lord
  - type: text
    content: '’s people Israel. '
  '7':
  - type: text
    content: 'You are to destroy the house of Ahab your master, and I will avenge the blood of my servants the prophets and the blood of all the '
  - type: text
    content: Lord
  - type: text
    content: '’s servants shed by Jezebel. '
  '8':
  - type: text
    content: The whole house of Ahab will perish. I will cut off from Ahab every last male in Israel—slave or free.
  - type: note
    content: Or Israel—every ruler or leader
  - type: text
    content: ' '
  '9':
  - type: text
    content: 'I will make the house of Ahab like the house of Jeroboam son of Nebat and like the house of Baasha son of Ahijah. '
