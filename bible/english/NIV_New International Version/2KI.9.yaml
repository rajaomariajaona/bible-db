document_id: 2KI.9,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehu Anointed King of Israel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The prophet Elisha summoned a man from the company of the prophets and said to him, “Tuck your cloak into your belt, take this flask of olive oil with you and go to Ramoth Gilead. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: As for Jezebel, dogs will devour her on the plot of ground at Jezreel, and no one will bury her.’ ” Then he opened the door and ran.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: When Jehu went out to his fellow officers, one of them asked him, “Is everything all right? Why did this maniac come to you?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “You know the man and the sort of things he says,” Jehu replied.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: “That’s not true!” they said. “Tell us.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehu said, “Here is what he told me: ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I anoint you king over Israel.’ ”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: They quickly took their cloaks and spread them under him on the bare steps. Then they blew the trumpet and shouted, “Jehu is king!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehu Kills Joram and Ahaziah
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So Jehu son of Jehoshaphat, the son of Nimshi, conspired against Joram. (Now Joram and all Israel had been defending Ramoth Gilead against Hazael king of Aram, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: but King Joram
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jehoram, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Joram
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verses 17 and 21-24
      marker-yv: yv-n
    - type: text
      text: ' had returned to Jezreel to recover from the wounds the Arameans had inflicted on him in the battle with Hazael king of Aram.) Jehu said, “If you desire to make me king, don’t let anyone slip out of the city to go and tell the news in Jezreel.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Then he got into his chariot and rode to Jezreel, because Joram was resting there and Ahaziah king of Judah had gone down to see him.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: When the lookout standing on the tower in Jezreel saw Jehu’s troops approaching, he called out, “I see some troops coming.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Get a horseman,” Joram ordered. “Send him to meet them and ask, ‘Do you come in peace?’ ”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'The horseman rode off to meet Jehu and said, “This is what the king says: ‘Do you come in peace?’ ”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “What do you have to do with peace?” Jehu replied. “Fall in behind me.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: The lookout reported, “The messenger has reached them, but he isn’t coming back.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'So the king sent out a second horseman. When he came to them he said, “This is what the king says: ‘Do you come in peace?’ ”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehu replied, “What do you have to do with peace? Fall in behind me.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'When you get there, look for Jehu son of Jehoshaphat, the son of Nimshi. Go to him, get him away from his companions and take him into an inner room. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: The lookout reported, “He has reached them, but he isn’t coming back either. The driving is like that of Jehu son of Nimshi—he drives like a maniac.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '“Hitch up my chariot,” Joram ordered. And when it was hitched up, Joram king of Israel and Ahaziah king of Judah rode out, each in his own chariot, to meet Jehu. They met him at the plot of ground that had belonged to Naboth the Jezreelite. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: When Joram saw Jehu he asked, “Have you come in peace, Jehu?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “How can there be peace,” Jehu replied, “as long as all the idolatry and witchcraft of your mother Jezebel abound?”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Joram turned about and fled, calling out to Ahaziah, “Treachery, Ahaziah!”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Then Jehu drew his bow and shot Joram between the shoulders. The arrow pierced his heart and he slumped down in his chariot. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Jehu said to Bidkar, his chariot officer, “Pick him up and throw him on the field that belonged to Naboth the Jezreelite. Remember how you and I were riding together in chariots behind Ahab his father when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' spoke this prophecy against him: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '‘Yesterday I saw the blood of Naboth and the blood of his sons, declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and I will surely make you pay for it on this plot of ground, declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See 1 Kings 21:19.
      marker-yv: yv-n
    - type: text
      text: ' Now then, pick him up and throw him on that plot, in accordance with the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: When Ahaziah king of Judah saw what had happened, he fled up the road to Beth Haggan.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fled by way of the garden house
      marker-yv: yv-n
    - type: text
      text: ' Jehu chased him, shouting, “Kill him too!” They wounded him in his chariot on the way up to Gur near Ibleam, but he escaped to Megiddo and died there. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'His servants took him by chariot to Jerusalem and buried him with his ancestors in his tomb in the City of David. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: (In the eleventh year of Joram son of Ahab, Ahaziah had become king of Judah.)
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jezebel Killed
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Then take the flask and pour the oil on his head and declare, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I anoint you king over Israel.’ Then open the door and run; don’t delay!”'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Then Jehu went to Jezreel. When Jezebel heard about it, she put on eye makeup, arranged her hair and looked out of a window. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: As Jehu entered the gate, she asked, “Have you come in peace, you Zimri, you murderer of your master?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: “Was there peace for Zimri, who murdered his master?”
      marker-yv: yv-n
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'He looked up at the window and called out, “Who is on my side? Who?” Two or three eunuchs looked down at him. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: “Throw her down!” Jehu said. So they threw her down, and some of her blood spattered the wall and the horses as they trampled her underfoot.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Jehu went in and ate and drank. “Take care of that cursed woman,” he said, “and bury her, for she was a king’s daughter.” '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'But when they went out to bury her, they found nothing except her skull, her feet and her hands. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'They went back and told Jehu, who said, “This is the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that he spoke through his servant Elijah the Tishbite: On the plot of ground at Jezreel dogs will devour Jezebel’s flesh.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See 1 Kings 21:23.
      marker-yv: yv-n
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Jezebel’s body will be like dung on the ground in the plot at Jezreel, so that no one will be able to say, ‘This is Jezebel.’ ”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So the young prophet went to Ramoth Gilead. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: When he arrived, he found the army officers sitting together. “I have a message for you, commander,” he said.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “For which of us?” asked Jehu.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “For you, commander,” he replied.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Jehu got up and went into the house. Then the prophet poured the oil on Jehu’s head and declared, “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says: ‘I anoint you king over the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s people Israel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'You are to destroy the house of Ahab your master, and I will avenge the blood of my servants the prophets and the blood of all the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s servants shed by Jezebel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The whole house of Ahab will perish. I will cut off from Ahab every last male in Israel—slave or free.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Israel—every ruler or leader
      marker-yv: yv-n
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'I will make the house of Ahab like the house of Jeroboam son of Nebat and like the house of Baasha son of Ahijah. '
