document_id: ROM.12,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Living Sacrifice
  - type: text
    content: 'Therefore, I urge you, brothers and sisters, in view of God’s mercy, to offer your bodies as a living sacrifice, holy and pleasing to God—this is your true and proper worship. '
  '10':
  - type: text
    content: 'Be devoted to one another in love. Honor one another above yourselves. '
  '11':
  - type: text
    content: 'Never be lacking in zeal, but keep your spiritual fervor, serving the Lord. '
  '12':
  - type: text
    content: 'Be joyful in hope, patient in affliction, faithful in prayer. '
  '13':
  - type: text
    content: Share with the Lord’s people who are in need. Practice hospitality.
  '14':
  - type: text
    content: 'Bless those who persecute you; bless and do not curse. '
  '15':
  - type: text
    content: 'Rejoice with those who rejoice; mourn with those who mourn. '
  '16':
  - type: text
    content: Live in harmony with one another. Do not be proud, but be willing to associate with people of low position.
  - type: note
    content: Or willing to do menial work
  - type: text
    content: ' Do not be conceited.'
  '17':
  - type: text
    content: 'Do not repay anyone evil for evil. Be careful to do what is right in the eyes of everyone. '
  '18':
  - type: text
    content: 'If it is possible, as far as it depends on you, live at peace with everyone. '
  '19':
  - type: text
    content: 'Do not take revenge, my dear friends, but leave room for God’s wrath, for it is written: “It is mine to avenge; I will repay,”'
  - type: note
    content: Deut. 32:35
  - type: text
    content: ' says the Lord. '
  '2':
  - type: text
    content: Do not conform to the pattern of this world, but be transformed by the renewing of your mind. Then you will be able to test and approve what God’s will is—his good, pleasing and perfect will.
  - type: heading
    content: Humble Service in the Body of Christ
  '20':
  - type: text
    content: 'On the contrary:'
  - type: text
    content: “If your enemy is hungry, feed him;
  - type: text
    content: if he is thirsty, give him something to drink.
  - type: text
    content: In doing this, you will heap burning coals on his head.”
  - type: note
    content: Prov. 25:21,22
  '21':
  - type: text
    content: Do not be overcome by evil, but overcome evil with good.
  '3':
  - type: text
    content: 'For by the grace given me I say to every one of you: Do not think of yourself more highly than you ought, but rather think of yourself with sober judgment, in accordance with the faith God has distributed to each of you. '
  '4':
  - type: text
    content: 'For just as each of us has one body with many members, and these members do not all have the same function, '
  '5':
  - type: text
    content: 'so in Christ we, though many, form one body, and each member belongs to all the others. '
  '6':
  - type: text
    content: We have different gifts, according to the grace given to each of us. If your gift is prophesying, then prophesy in accordance with your
  - type: note
    content: Or the
  - type: text
    content: ' faith; '
  '7':
  - type: text
    content: 'if it is serving, then serve; if it is teaching, then teach; '
  '8':
  - type: text
    content: if it is to encourage, then give encouragement; if it is giving, then give generously; if it is to lead,
  - type: note
    content: Or to provide for others
  - type: text
    content: ' do it diligently; if it is to show mercy, do it cheerfully.'
  - type: heading
    content: Love in Action
  '9':
  - type: text
    content: 'Love must be sincere. Hate what is evil; cling to what is good. '
