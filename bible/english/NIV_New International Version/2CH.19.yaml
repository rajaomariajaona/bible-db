document_id: 2CH.19,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Jehoshaphat king of Judah returned safely to his palace in Jerusalem, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In every case that comes before you from your people who live in the cities—whether bloodshed or other concerns of the law, commands, decrees or regulations—you are to warn them not to sin against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ; otherwise his wrath will come on you and your people. Do this, and you will not sin.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Amariah the chief priest will be over you in any matter concerning the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and Zebadiah son of Ishmael, the leader of the tribe of Judah, will be over you in any matter concerning the king, and the Levites will serve as officials before you. Act with courage, and may the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' be with those who do well.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jehu the seer, the son of Hanani, went out to meet him and said to the king, “Should you help the wicked and love
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and make alliances with
      marker-yv: yv-n
    - type: text
      text: ' those who hate the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '? Because of this, the wrath of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is on you. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: There is, however, some good in you, for you have rid the land of the Asherah poles and have set your heart on seeking God.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jehoshaphat Appoints Judges
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jehoshaphat lived in Jerusalem, and he went out again among the people from Beersheba to the hill country of Ephraim and turned them back to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of their ancestors. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He appointed judges in the land, in each of the fortified cities of Judah. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He told them, “Consider carefully what you do, because you are not judging for mere mortals but for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who is with you whenever you give a verdict. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now let the fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' be on you. Judge carefully, for with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God there is no injustice or partiality or bribery.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In Jerusalem also, Jehoshaphat appointed some of the Levites, priests and heads of Israelite families to administer the law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and to settle disputes. And they lived in Jerusalem. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He gave them these orders: “You must serve faithfully and wholeheartedly in the fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
