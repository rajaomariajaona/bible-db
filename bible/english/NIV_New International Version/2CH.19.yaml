type_code: eng
verses:
  '1':
  - type: text
    content: 'When Jehoshaphat king of Judah returned safely to his palace in Jerusalem, '
  '10':
  - type: text
    content: 'In every case that comes before you from your people who live in the cities—whether bloodshed or other concerns of the law, commands, decrees or regulations—you are to warn them not to sin against the '
  - type: text
    content: Lord
  - type: text
    content: ; otherwise his wrath will come on you and your people. Do this, and you will not sin.
  '11':
  - type: text
    content: '“Amariah the chief priest will be over you in any matter concerning the '
  - type: text
    content: Lord
  - type: text
    content: ', and Zebadiah son of Ishmael, the leader of the tribe of Judah, will be over you in any matter concerning the king, and the Levites will serve as officials before you. Act with courage, and may the '
  - type: text
    content: Lord
  - type: text
    content: ' be with those who do well.”'
  '2':
  - type: text
    content: Jehu the seer, the son of Hanani, went out to meet him and said to the king, “Should you help the wicked and love
  - type: note
    content: Or and make alliances with
  - type: text
    content: ' those who hate the '
  - type: text
    content: Lord
  - type: text
    content: '? Because of this, the wrath of the '
  - type: text
    content: Lord
  - type: text
    content: ' is on you. '
  '3':
  - type: text
    content: There is, however, some good in you, for you have rid the land of the Asherah poles and have set your heart on seeking God.”
  - type: heading
    content: Jehoshaphat Appoints Judges
  '4':
  - type: text
    content: 'Jehoshaphat lived in Jerusalem, and he went out again among the people from Beersheba to the hill country of Ephraim and turned them back to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors. '
  '5':
  - type: text
    content: 'He appointed judges in the land, in each of the fortified cities of Judah. '
  '6':
  - type: text
    content: 'He told them, “Consider carefully what you do, because you are not judging for mere mortals but for the '
  - type: text
    content: Lord
  - type: text
    content: ', who is with you whenever you give a verdict. '
  '7':
  - type: text
    content: 'Now let the fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' be on you. Judge carefully, for with the '
  - type: text
    content: Lord
  - type: text
    content: ' our God there is no injustice or partiality or bribery.”'
  '8':
  - type: text
    content: 'In Jerusalem also, Jehoshaphat appointed some of the Levites, priests and heads of Israelite families to administer the law of the '
  - type: text
    content: Lord
  - type: text
    content: ' and to settle disputes. And they lived in Jerusalem. '
  '9':
  - type: text
    content: 'He gave them these orders: “You must serve faithfully and wholeheartedly in the fear of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
