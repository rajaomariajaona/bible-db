document_id: REV.22,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Eden Restored
  - type: text
    content: 'Then the angel showed me the river of the water of life, as clear as crystal, flowing from the throne of God and of the Lamb '
  '10':
  - type: text
    content: 'Then he told me, “Do not seal up the words of the prophecy of this scroll, because the time is near. '
  '11':
  - type: text
    content: Let the one who does wrong continue to do wrong; let the vile person continue to be vile; let the one who does right continue to do right; and let the holy person continue to be holy.”
  - type: heading
    content: 'Epilogue: Invitation and Warning'
  '12':
  - type: text
    content: ' '
  - type: text
    content: “Look, I am coming soon! My reward is with me, and I will give to each person according to what they have done.
  - type: text
    content: ' '
  '13':
  - type: text
    content: I am the Alpha and the Omega, the First and the Last, the Beginning and the End.
  '14':
  - type: text
    content: ' '
  - type: text
    content: “Blessed are those who wash their robes, that they may have the right to the tree of life and may go through the gates into the city.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Outside are the dogs, those who practice magic arts, the sexually immoral, the murderers, the idolaters and everyone who loves and practices falsehood.
  '16':
  - type: text
    content: ' '
  - type: text
    content: “I, Jesus, have sent my angel to give you
  - type: text
    content: ' '
  - type: note
    content: The Greek is plural.
  - type: text
    content: this testimony for the churches. I am the Root and the Offspring of David, and the bright Morning Star.”
  '17':
  - type: text
    content: The Spirit and the bride say, “Come!” And let the one who hears say, “Come!” Let the one who is thirsty come; and let the one who wishes take the free gift of the water of life.
  '18':
  - type: text
    content: 'I warn everyone who hears the words of the prophecy of this scroll: If anyone adds anything to them, God will add to that person the plagues described in this scroll. '
  '19':
  - type: text
    content: And if anyone takes words away from this scroll of prophecy, God will take away from that person any share in the tree of life and in the Holy City, which are described in this scroll.
  '2':
  - type: text
    content: 'down the middle of the great street of the city. On each side of the river stood the tree of life, bearing twelve crops of fruit, yielding its fruit every month. And the leaves of the tree are for the healing of the nations. '
  '20':
  - type: text
    content: 'He who testifies to these things says, '
  - type: text
    content: “Yes, I am coming soon.”
  - type: text
    content: Amen. Come, Lord Jesus.
  '21':
  - type: text
    content: The grace of the Lord Jesus be with God’s people. Amen.
  '3':
  - type: text
    content: 'No longer will there be any curse. The throne of God and of the Lamb will be in the city, and his servants will serve him. '
  '4':
  - type: text
    content: 'They will see his face, and his name will be on their foreheads. '
  '5':
  - type: text
    content: There will be no more night. They will not need the light of a lamp or the light of the sun, for the Lord God will give them light. And they will reign for ever and ever.
  - type: heading
    content: John and the Angel
  '6':
  - type: text
    content: The angel said to me, “These words are trustworthy and true. The Lord, the God who inspires the prophets, sent his angel to show his servants the things that must soon take place.”
  '7':
  - type: text
    content: ' '
  - type: text
    content: “Look, I am coming soon! Blessed is the one who keeps the words of the prophecy written in this scroll.”
  '8':
  - type: text
    content: 'I, John, am the one who heard and saw these things. And when I had heard and seen them, I fell down to worship at the feet of the angel who had been showing them to me. '
  '9':
  - type: text
    content: But he said to me, “Don’t do that! I am a fellow servant with you and with your fellow prophets and with all who keep the words of this scroll. Worship God!”
