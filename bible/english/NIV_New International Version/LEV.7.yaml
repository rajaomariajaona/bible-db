document_id: LEV.7,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Guilt Offering
  - type: text
    content: '“ ‘These are the regulations for the guilt offering, which is most holy: '
  '10':
  - type: text
    content: and every grain offering, whether mixed with olive oil or dry, belongs equally to all the sons of Aaron.
  - type: heading
    content: The Fellowship Offering
  '11':
  - type: text
    content: '“ ‘These are the regulations for the fellowship offering anyone may present to the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  '12':
  - type: text
    content: '“ ‘If they offer it as an expression of thankfulness, then along with this thank offering they are to offer thick loaves made without yeast and with olive oil mixed in, thin loaves made without yeast and brushed with oil, and thick loaves of the finest flour well-kneaded and with oil mixed in. '
  '13':
  - type: text
    content: 'Along with their fellowship offering of thanksgiving they are to present an offering with thick loaves of bread made with yeast. '
  '14':
  - type: text
    content: 'They are to bring one of each kind as an offering, a contribution to the '
  - type: text
    content: Lord
  - type: text
    content: '; it belongs to the priest who splashes the blood of the fellowship offering against the altar. '
  '15':
  - type: text
    content: The meat of their fellowship offering of thanksgiving must be eaten on the day it is offered; they must leave none of it till morning.
  '16':
  - type: text
    content: '“ ‘If, however, their offering is the result of a vow or is a freewill offering, the sacrifice shall be eaten on the day they offer it, but anything left over may be eaten on the next day. '
  '17':
  - type: text
    content: 'Any meat of the sacrifice left over till the third day must be burned up. '
  '18':
  - type: text
    content: If any meat of the fellowship offering is eaten on the third day, the one who offered it will not be accepted. It will not be reckoned to their credit, for it has become impure; the person who eats any of it will be held responsible.
  '19':
  - type: text
    content: '“ ‘Meat that touches anything ceremonially unclean must not be eaten; it must be burned up. As for other meat, anyone ceremonially clean may eat it. '
  '2':
  - type: text
    content: 'The guilt offering is to be slaughtered in the place where the burnt offering is slaughtered, and its blood is to be splashed against the sides of the altar. '
  '20':
  - type: text
    content: 'But if anyone who is unclean eats any meat of the fellowship offering belonging to the '
  - type: text
    content: Lord
  - type: text
    content: ', they must be cut off from their people. '
  '21':
  - type: text
    content: Anyone who touches something unclean—whether human uncleanness or an unclean animal or any unclean creature that moves along the ground
  - type: note
    content: A few Hebrew manuscripts, Samaritan Pentateuch, Syriac and Targum (see 5:2); most Hebrew manuscripts any unclean, detestable thing
  - type: text
    content: '—and then eats any of the meat of the fellowship offering belonging to the '
  - type: text
    content: Lord
  - type: text
    content: ' must be cut off from their people.’ ”'
  - type: heading
    content: Eating Fat and Blood Forbidden
  '22':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '23':
  - type: text
    content: '“Say to the Israelites: ‘Do not eat any of the fat of cattle, sheep or goats. '
  '24':
  - type: text
    content: 'The fat of an animal found dead or torn by wild animals may be used for any other purpose, but you must not eat it. '
  '25':
  - type: text
    content: Anyone who eats the fat of an animal from which a food offering may be
  - type: note
    content: Or offering is
  - type: text
    content: ' presented to the '
  - type: text
    content: Lord
  - type: text
    content: ' must be cut off from their people. '
  '26':
  - type: text
    content: 'And wherever you live, you must not eat the blood of any bird or animal. '
  '27':
  - type: text
    content: Anyone who eats blood must be cut off from their people.’ ”
  - type: heading
    content: The Priests’ Share
  '28':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '29':
  - type: text
    content: '“Say to the Israelites: ‘Anyone who brings a fellowship offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' is to bring part of it as their sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'All its fat shall be offered: the fat tail and the fat that covers the internal organs, '
  '30':
  - type: text
    content: 'With their own hands they are to present the food offering to the '
  - type: text
    content: Lord
  - type: text
    content: '; they are to bring the fat, together with the breast, and wave the breast before the '
  - type: text
    content: Lord
  - type: text
    content: ' as a wave offering. '
  '31':
  - type: text
    content: 'The priest shall burn the fat on the altar, but the breast belongs to Aaron and his sons. '
  '32':
  - type: text
    content: 'You are to give the right thigh of your fellowship offerings to the priest as a contribution. '
  '33':
  - type: text
    content: 'The son of Aaron who offers the blood and the fat of the fellowship offering shall have the right thigh as his share. '
  '34':
  - type: text
    content: From the fellowship offerings of the Israelites, I have taken the breast that is waved and the thigh that is presented and have given them to Aaron the priest and his sons as their perpetual share from the Israelites.’ ”
  '35':
  - type: text
    content: 'This is the portion of the food offerings presented to the '
  - type: text
    content: Lord
  - type: text
    content: ' that were allotted to Aaron and his sons on the day they were presented to serve the '
  - type: text
    content: Lord
  - type: text
    content: ' as priests. '
  '36':
  - type: text
    content: 'On the day they were anointed, the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded that the Israelites give this to them as their perpetual share for the generations to come.'
  '37':
  - type: text
    content: 'These, then, are the regulations for the burnt offering, the grain offering, the sin offering, the guilt offering, the ordination offering and the fellowship offering, '
  '38':
  - type: text
    content: 'which the '
  - type: text
    content: Lord
  - type: text
    content: ' gave Moses at Mount Sinai in the Desert of Sinai on the day he commanded the Israelites to bring their offerings to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: 'both kidneys with the fat on them near the loins, and the long lobe of the liver, which is to be removed with the kidneys. '
  '5':
  - type: text
    content: 'The priest shall burn them on the altar as a food offering presented to the '
  - type: text
    content: Lord
  - type: text
    content: '. It is a guilt offering. '
  '6':
  - type: text
    content: Any male in a priest’s family may eat it, but it must be eaten in the sanctuary area; it is most holy.
  '7':
  - type: text
    content: “ ‘The same law applies to both the sin offering
  - type: note
    content: Or purification offering; also in verse 37
  - type: text
    content: ' and the guilt offering: They belong to the priest who makes atonement with them. '
  '8':
  - type: text
    content: 'The priest who offers a burnt offering for anyone may keep its hide for himself. '
  '9':
  - type: text
    content: 'Every grain offering baked in an oven or cooked in a pan or on a griddle belongs to the priest who offers it, '
