type_code: eng
verses:
  '1':
  - type: text
    content: When Isaac was old and his eyes were so weak that he could no longer see, he called for Esau his older son and said to him, “My son.”
  - type: text
    content: “Here I am,” he answered.
  '10':
  - type: text
    content: Then take it to your father to eat, so that he may give you his blessing before he dies.”
  '11':
  - type: text
    content: 'Jacob said to Rebekah his mother, “But my brother Esau is a hairy man while I have smooth skin. '
  '12':
  - type: text
    content: What if my father touches me? I would appear to be tricking him and would bring down a curse on myself rather than a blessing.”
  '13':
  - type: text
    content: His mother said to him, “My son, let the curse fall on me. Just do what I say; go and get them for me.”
  '14':
  - type: text
    content: 'So he went and got them and brought them to his mother, and she prepared some tasty food, just the way his father liked it. '
  '15':
  - type: text
    content: 'Then Rebekah took the best clothes of Esau her older son, which she had in the house, and put them on her younger son Jacob. '
  '16':
  - type: text
    content: 'She also covered his hands and the smooth part of his neck with the goatskins. '
  '17':
  - type: text
    content: Then she handed to her son Jacob the tasty food and the bread she had made.
  '18':
  - type: text
    content: He went to his father and said, “My father.”
  - type: text
    content: “Yes, my son,” he answered. “Who is it?”
  '19':
  - type: text
    content: Jacob said to his father, “I am Esau your firstborn. I have done as you told me. Please sit up and eat some of my game, so that you may give me your blessing.”
  '2':
  - type: text
    content: 'Isaac said, “I am now an old man and don’t know the day of my death. '
  '20':
  - type: text
    content: Isaac asked his son, “How did you find it so quickly, my son?”
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' your God gave me success,” he replied.'
  '21':
  - type: text
    content: Then Isaac said to Jacob, “Come near so I can touch you, my son, to know whether you really are my son Esau or not.”
  '22':
  - type: text
    content: 'Jacob went close to his father Isaac, who touched him and said, “The voice is the voice of Jacob, but the hands are the hands of Esau.” '
  '23':
  - type: text
    content: 'He did not recognize him, for his hands were hairy like those of his brother Esau; so he proceeded to bless him. '
  '24':
  - type: text
    content: “Are you really my son Esau?” he asked.
  - type: text
    content: “I am,” he replied.
  '25':
  - type: text
    content: Then he said, “My son, bring me some of your game to eat, so that I may give you my blessing.”
  - type: text
    content: 'Jacob brought it to him and he ate; and he brought some wine and he drank. '
  '26':
  - type: text
    content: Then his father Isaac said to him, “Come here, my son, and kiss me.”
  '27':
  - type: text
    content: So he went to him and kissed him. When Isaac caught the smell of his clothes, he blessed him and said,
  - type: text
    content: “Ah, the smell of my son
  - type: text
    content: is like the smell of a field
  - type: text
    content: 'that the '
  - type: text
    content: Lord
  - type: text
    content: ' has blessed.'
  '28':
  - type: text
    content: May God give you heaven’s dew
  - type: text
    content: and earth’s richness—
  - type: text
    content: an abundance of grain and new wine.
  '29':
  - type: text
    content: May nations serve you
  - type: text
    content: and peoples bow down to you.
  - type: text
    content: Be lord over your brothers,
  - type: text
    content: and may the sons of your mother bow down to you.
  - type: text
    content: May those who curse you be cursed
  - type: text
    content: and those who bless you be blessed.”
  '3':
  - type: text
    content: 'Now then, get your equipment—your quiver and bow—and go out to the open country to hunt some wild game for me. '
  '30':
  - type: text
    content: 'After Isaac finished blessing him, and Jacob had scarcely left his father’s presence, his brother Esau came in from hunting. '
  '31':
  - type: text
    content: He too prepared some tasty food and brought it to his father. Then he said to him, “My father, please sit up and eat some of my game, so that you may give me your blessing.”
  '32':
  - type: text
    content: His father Isaac asked him, “Who are you?”
  - type: text
    content: “I am your son,” he answered, “your firstborn, Esau.”
  '33':
  - type: text
    content: Isaac trembled violently and said, “Who was it, then, that hunted game and brought it to me? I ate it just before you came and I blessed him—and indeed he will be blessed!”
  '34':
  - type: text
    content: When Esau heard his father’s words, he burst out with a loud and bitter cry and said to his father, “Bless me—me too, my father!”
  '35':
  - type: text
    content: But he said, “Your brother came deceitfully and took your blessing.”
  '36':
  - type: text
    content: Esau said, “Isn’t he rightly named Jacob
  - type: note
    content: Jacob means he grasps the heel, a Hebrew idiom for he takes advantage of or he deceives.
  - type: text
    content: '? This is the second time he has taken advantage of me: He took my birthright, and now he’s taken my blessing!” Then he asked, “Haven’t you reserved any blessing for me?”'
  '37':
  - type: text
    content: Isaac answered Esau, “I have made him lord over you and have made all his relatives his servants, and I have sustained him with grain and new wine. So what can I possibly do for you, my son?”
  '38':
  - type: text
    content: Esau said to his father, “Do you have only one blessing, my father? Bless me too, my father!” Then Esau wept aloud.
  '39':
  - type: text
    content: His father Isaac answered him,
  - type: text
    content: “Your dwelling will be
  - type: text
    content: away from the earth’s richness,
  - type: text
    content: away from the dew of heaven above.
  '4':
  - type: text
    content: Prepare me the kind of tasty food I like and bring it to me to eat, so that I may give you my blessing before I die.”
  '40':
  - type: text
    content: You will live by the sword
  - type: text
    content: and you will serve your brother.
  - type: text
    content: But when you grow restless,
  - type: text
    content: you will throw his yoke
  - type: text
    content: from off your neck.”
  '41':
  - type: text
    content: Esau held a grudge against Jacob because of the blessing his father had given him. He said to himself, “The days of mourning for my father are near; then I will kill my brother Jacob.”
  '42':
  - type: text
    content: 'When Rebekah was told what her older son Esau had said, she sent for her younger son Jacob and said to him, “Your brother Esau is planning to avenge himself by killing you. '
  '43':
  - type: text
    content: 'Now then, my son, do what I say: Flee at once to my brother Laban in Harran. '
  '44':
  - type: text
    content: 'Stay with him for a while until your brother’s fury subsides. '
  '45':
  - type: text
    content: When your brother is no longer angry with you and forgets what you did to him, I’ll send word for you to come back from there. Why should I lose both of you in one day?”
  '46':
  - type: text
    content: Then Rebekah said to Isaac, “I’m disgusted with living because of these Hittite women. If Jacob takes a wife from among the women of this land, from Hittite women like these, my life will not be worth living.”
  '5':
  - type: text
    content: 'Now Rebekah was listening as Isaac spoke to his son Esau. When Esau left for the open country to hunt game and bring it back, '
  '6':
  - type: text
    content: 'Rebekah said to her son Jacob, “Look, I overheard your father say to your brother Esau, '
  '7':
  - type: text
    content: '‘Bring me some game and prepare me some tasty food to eat, so that I may give you my blessing in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' before I die.’ '
  '8':
  - type: text
    content: 'Now, my son, listen carefully and do what I tell you: '
  '9':
  - type: text
    content: 'Go out to the flock and bring me two choice young goats, so I can prepare some tasty food for your father, just the way he likes it. '
