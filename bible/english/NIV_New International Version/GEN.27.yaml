document_id: GEN.27,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: When Isaac was old and his eyes were so weak that he could no longer see, he called for Esau his older son and said to him, “My son.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Here I am,” he answered.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Then take it to your father to eat, so that he may give you his blessing before he dies.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Jacob said to Rebekah his mother, “But my brother Esau is a hairy man while I have smooth skin. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: What if my father touches me? I would appear to be tricking him and would bring down a curse on myself rather than a blessing.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: His mother said to him, “My son, let the curse fall on me. Just do what I say; go and get them for me.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'So he went and got them and brought them to his mother, and she prepared some tasty food, just the way his father liked it. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then Rebekah took the best clothes of Esau her older son, which she had in the house, and put them on her younger son Jacob. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'She also covered his hands and the smooth part of his neck with the goatskins. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Then she handed to her son Jacob the tasty food and the bread she had made.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: He went to his father and said, “My father.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes, my son,” he answered. “Who is it?”
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Jacob said to his father, “I am Esau your firstborn. I have done as you told me. Please sit up and eat some of my game, so that you may give me your blessing.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Isaac said, “I am now an old man and don’t know the day of my death. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Isaac asked his son, “How did you find it so quickly, my son?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God gave me success,” he replied.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Then Isaac said to Jacob, “Come near so I can touch you, my son, to know whether you really are my son Esau or not.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Jacob went close to his father Isaac, who touched him and said, “The voice is the voice of Jacob, but the hands are the hands of Esau.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'He did not recognize him, for his hands were hairy like those of his brother Esau; so he proceeded to bless him. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: “Are you really my son Esau?” he asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I am,” he replied.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Then he said, “My son, bring me some of your game to eat, so that I may give you my blessing.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob brought it to him and he ate; and he brought some wine and he drank. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Then his father Isaac said to him, “Come here, my son, and kiss me.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: So he went to him and kissed him. When Isaac caught the smell of his clothes, he blessed him and said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Ah, the smell of my son
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is like the smell of a field
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has blessed.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: May God give you heaven’s dew
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and earth’s richness—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an abundance of grain and new wine.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: May nations serve you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and peoples bow down to you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Be lord over your brothers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and may the sons of your mother bow down to you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May those who curse you be cursed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those who bless you be blessed.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Now then, get your equipment—your quiver and bow—and go out to the open country to hunt some wild game for me. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'After Isaac finished blessing him, and Jacob had scarcely left his father’s presence, his brother Esau came in from hunting. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: He too prepared some tasty food and brought it to his father. Then he said to him, “My father, please sit up and eat some of my game, so that you may give me your blessing.”
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: His father Isaac asked him, “Who are you?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I am your son,” he answered, “your firstborn, Esau.”
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Isaac trembled violently and said, “Who was it, then, that hunted game and brought it to me? I ate it just before you came and I blessed him—and indeed he will be blessed!”
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: When Esau heard his father’s words, he burst out with a loud and bitter cry and said to his father, “Bless me—me too, my father!”
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: But he said, “Your brother came deceitfully and took your blessing.”
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Esau said, “Isn’t he rightly named Jacob
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:36 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jacob '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he grasps the heel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a Hebrew idiom for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'he takes advantage of '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he deceives.
      marker-yv: yv-n
    - type: text
      text: '? This is the second time he has taken advantage of me: He took my birthright, and now he’s taken my blessing!” Then he asked, “Haven’t you reserved any blessing for me?”'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Isaac answered Esau, “I have made him lord over you and have made all his relatives his servants, and I have sustained him with grain and new wine. So what can I possibly do for you, my son?”
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Esau said to his father, “Do you have only one blessing, my father? Bless me too, my father!” Then Esau wept aloud.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: His father Isaac answered him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Your dwelling will be
  - type: usfm
    marker: q2
    children:
    - type: text
      text: away from the earth’s richness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: away from the dew of heaven above.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Prepare me the kind of tasty food I like and bring it to me to eat, so that I may give you my blessing before I die.”
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: You will live by the sword
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will serve your brother.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when you grow restless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will throw his yoke
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from off your neck.”
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Esau held a grudge against Jacob because of the blessing his father had given him. He said to himself, “The days of mourning for my father are near; then I will kill my brother Jacob.”
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'When Rebekah was told what her older son Esau had said, she sent for her younger son Jacob and said to him, “Your brother Esau is planning to avenge himself by killing you. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Now then, my son, do what I say: Flee at once to my brother Laban in Harran. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Stay with him for a while until your brother’s fury subsides. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: When your brother is no longer angry with you and forgets what you did to him, I’ll send word for you to come back from there. Why should I lose both of you in one day?”
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Then Rebekah said to Isaac, “I’m disgusted with living because of these Hittite women. If Jacob takes a wife from among the women of this land, from Hittite women like these, my life will not be worth living.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Now Rebekah was listening as Isaac spoke to his son Esau. When Esau left for the open country to hunt game and bring it back, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Rebekah said to her son Jacob, “Look, I overheard your father say to your brother Esau, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '‘Bring me some game and prepare me some tasty food to eat, so that I may give you my blessing in the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' before I die.’ '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Now, my son, listen carefully and do what I tell you: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Go out to the flock and bring me two choice young goats, so I can prepare some tasty food for your father, just the way he likes it. '
