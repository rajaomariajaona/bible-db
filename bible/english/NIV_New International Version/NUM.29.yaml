document_id: NUM.29,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Festival of Trumpets
  - type: text
    content: '“ ‘On the first day of the seventh month hold a sacred assembly and do no regular work. It is a day for you to sound the trumpets. '
  '10':
  - type: text
    content: 'and with each of the seven lambs, one-tenth. '
  '11':
  - type: text
    content: Include one male goat as a sin offering, in addition to the sin offering for atonement and the regular burnt offering with its grain offering, and their drink offerings.
  - type: heading
    content: The Festival of Tabernacles
  '12':
  - type: text
    content: '“ ‘On the fifteenth day of the seventh month, hold a sacred assembly and do no regular work. Celebrate a festival to the '
  - type: text
    content: Lord
  - type: text
    content: ' for seven days. '
  '13':
  - type: text
    content: 'Present as an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: ' a food offering consisting of a burnt offering of thirteen young bulls, two rams and fourteen male lambs a year old, all without defect. '
  '14':
  - type: text
    content: 'With each of the thirteen bulls offer a grain offering of three-tenths of an ephah of the finest flour mixed with oil; with each of the two rams, two-tenths; '
  '15':
  - type: text
    content: 'and with each of the fourteen lambs, one-tenth. '
  '16':
  - type: text
    content: Include one male goat as a sin offering, in addition to the regular burnt offering with its grain offering and drink offering.
  '17':
  - type: text
    content: '“ ‘On the second day offer twelve young bulls, two rams and fourteen male lambs a year old, all without defect. '
  '18':
  - type: text
    content: 'With the bulls, rams and lambs, offer their grain offerings and drink offerings according to the number specified. '
  '19':
  - type: text
    content: Include one male goat as a sin offering, in addition to the regular burnt offering with its grain offering, and their drink offerings.
  '2':
  - type: text
    content: 'As an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: ', offer a burnt offering of one young bull, one ram and seven male lambs a year old, all without defect. '
  '20':
  - type: text
    content: '“ ‘On the third day offer eleven bulls, two rams and fourteen male lambs a year old, all without defect. '
  '21':
  - type: text
    content: 'With the bulls, rams and lambs, offer their grain offerings and drink offerings according to the number specified. '
  '22':
  - type: text
    content: Include one male goat as a sin offering, in addition to the regular burnt offering with its grain offering and drink offering.
  '23':
  - type: text
    content: '“ ‘On the fourth day offer ten bulls, two rams and fourteen male lambs a year old, all without defect. '
  '24':
  - type: text
    content: 'With the bulls, rams and lambs, offer their grain offerings and drink offerings according to the number specified. '
  '25':
  - type: text
    content: Include one male goat as a sin offering, in addition to the regular burnt offering with its grain offering and drink offering.
  '26':
  - type: text
    content: '“ ‘On the fifth day offer nine bulls, two rams and fourteen male lambs a year old, all without defect. '
  '27':
  - type: text
    content: 'With the bulls, rams and lambs, offer their grain offerings and drink offerings according to the number specified. '
  '28':
  - type: text
    content: Include one male goat as a sin offering, in addition to the regular burnt offering with its grain offering and drink offering.
  '29':
  - type: text
    content: '“ ‘On the sixth day offer eight bulls, two rams and fourteen male lambs a year old, all without defect. '
  '3':
  - type: text
    content: With the bull offer a grain offering of three-tenths of an ephah
  - type: note
    content: That is, probably about 11 pounds or about 5 kilograms; also in verses 9 and 14
  - type: text
    content: ' of the finest flour mixed with olive oil; with the ram, two-tenths'
  - type: note
    content: That is, probably about 7 pounds or about 3.2 kilograms; also in verses 9 and 14
  - type: text
    content: '; '
  '30':
  - type: text
    content: 'With the bulls, rams and lambs, offer their grain offerings and drink offerings according to the number specified. '
  '31':
  - type: text
    content: Include one male goat as a sin offering, in addition to the regular burnt offering with its grain offering and drink offering.
  '32':
  - type: text
    content: '“ ‘On the seventh day offer seven bulls, two rams and fourteen male lambs a year old, all without defect. '
  '33':
  - type: text
    content: 'With the bulls, rams and lambs, offer their grain offerings and drink offerings according to the number specified. '
  '34':
  - type: text
    content: Include one male goat as a sin offering, in addition to the regular burnt offering with its grain offering and drink offering.
  '35':
  - type: text
    content: '“ ‘On the eighth day hold a closing special assembly and do no regular work. '
  '36':
  - type: text
    content: 'Present as an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: ' a food offering consisting of a burnt offering of one bull, one ram and seven male lambs a year old, all without defect. '
  '37':
  - type: text
    content: 'With the bull, the ram and the lambs, offer their grain offerings and drink offerings according to the number specified. '
  '38':
  - type: text
    content: Include one male goat as a sin offering, in addition to the regular burnt offering with its grain offering and drink offering.
  '39':
  - type: text
    content: '“ ‘In addition to what you vow and your freewill offerings, offer these to the '
  - type: text
    content: Lord
  - type: text
    content: ' at your appointed festivals: your burnt offerings, grain offerings, drink offerings and fellowship offerings.’ ”'
  '4':
  - type: text
    content: and with each of the seven lambs, one-tenth.
  - type: note
    content: That is, probably about 3 1/2 pounds or about 1.6 kilograms; also in verses 10 and 15
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'Moses told the Israelites all that the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded him.'
  - type: note
    content: In Hebrew texts this verse (29:40) is numbered 30:1.
  '5':
  - type: text
    content: Include one male goat as a sin offering
  - type: note
    content: Or purification offering; also elsewhere in this chapter
  - type: text
    content: ' to make atonement for you. '
  '6':
  - type: text
    content: 'These are in addition to the monthly and daily burnt offerings with their grain offerings and drink offerings as specified. They are food offerings presented to the '
  - type: text
    content: Lord
  - type: text
    content: ', a pleasing aroma.'
  - type: heading
    content: The Day of Atonement
  '7':
  - type: text
    content: “ ‘On the tenth day of this seventh month hold a sacred assembly. You must deny yourselves
  - type: note
    content: Or must fast
  - type: text
    content: ' and do no work. '
  '8':
  - type: text
    content: 'Present as an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: ' a burnt offering of one young bull, one ram and seven male lambs a year old, all without defect. '
  '9':
  - type: text
    content: 'With the bull offer a grain offering of three-tenths of an ephah of the finest flour mixed with oil; with the ram, two-tenths; '
