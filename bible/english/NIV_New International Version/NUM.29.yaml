    children:
    - type: text
      text: '1'
  - type: text
    text: '“ ‘On the first day of the seventh month hold a sacred assembly and do no regular work. It is a day for you to sound the trumpets. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'As an aroma pleasing to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', offer a burnt offering of one young bull, one ram and seven male lambs a year old, all without defect. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: With the bull offer a grain offering of three-tenths of an ephah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, probably about 11 pounds or about 5 kilograms; also in verses 9 and 14
    marker-yv: yv-n
  - type: text
    text: ' of the finest flour mixed with olive oil; with the ram, two-tenths'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
