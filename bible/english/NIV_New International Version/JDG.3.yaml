document_id: JDG.3,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'These are the nations the '
  - type: text
    content: Lord
  - type: text
    content: ' left to test all those Israelites who had not experienced any of the wars in Canaan '
  '10':
  - type: text
    content: 'The Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' came on him, so that he became Israel’s judge'
  - type: note
    content: Or leader
  - type: text
    content: ' and went to war. The '
  - type: text
    content: Lord
  - type: text
    content: ' gave Cushan-Rishathaim king of Aram into the hands of Othniel, who overpowered him. '
  '11':
  - type: text
    content: So the land had peace for forty years, until Othniel son of Kenaz died.
  - type: heading
    content: Ehud
  '12':
  - type: text
    content: 'Again the Israelites did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', and because they did this evil the '
  - type: text
    content: Lord
  - type: text
    content: ' gave Eglon king of Moab power over Israel. '
  '13':
  - type: text
    content: Getting the Ammonites and Amalekites to join him, Eglon came and attacked Israel, and they took possession of the City of Palms.
  - type: note
    content: That is, Jericho
  - type: text
    content: ' '
  '14':
  - type: text
    content: The Israelites were subject to Eglon king of Moab for eighteen years.
  '15':
  - type: text
    content: 'Again the Israelites cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', and he gave them a deliverer—Ehud, a left-handed man, the son of Gera the Benjamite. The Israelites sent him with tribute to Eglon king of Moab. '
  '16':
  - type: text
    content: Now Ehud had made a double-edged sword about a cubit
  - type: note
    content: That is, about 18 inches or about 45 centimeters
  - type: text
    content: ' long, which he strapped to his right thigh under his clothing. '
  '17':
  - type: text
    content: 'He presented the tribute to Eglon king of Moab, who was a very fat man. '
  '18':
  - type: text
    content: 'After Ehud had presented the tribute, he sent on their way those who had carried it. '
  '19':
  - type: text
    content: But on reaching the stone images near Gilgal he himself went back to Eglon and said, “Your Majesty, I have a secret message for you.”
  - type: text
    content: The king said to his attendants, “Leave us!” And they all left.
  '2':
  - type: text
    content: '(he did this only to teach warfare to the descendants of the Israelites who had not had previous battle experience): '
  '20':
  - type: text
    content: Ehud then approached him while he was sitting alone in the upper room of his palace
  - type: note
    content: The meaning of the Hebrew for this word is uncertain; also in verse 24.
  - type: text
    content: ' and said, “I have a message from God for you.” As the king rose from his seat, '
  '21':
  - type: text
    content: 'Ehud reached with his left hand, drew the sword from his right thigh and plunged it into the king’s belly. '
  '22':
  - type: text
    content: 'Even the handle sank in after the blade, and his bowels discharged. Ehud did not pull the sword out, and the fat closed in over it. '
  '23':
  - type: text
    content: Then Ehud went out to the porch
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ; he shut the doors of the upper room behind him and locked them.
  '24':
  - type: text
    content: 'After he had gone, the servants came and found the doors of the upper room locked. They said, “He must be relieving himself in the inner room of the palace.” '
  '25':
  - type: text
    content: They waited to the point of embarrassment, but when he did not open the doors of the room, they took a key and unlocked them. There they saw their lord fallen to the floor, dead.
  '26':
  - type: text
    content: 'While they waited, Ehud got away. He passed by the stone images and escaped to Seirah. '
  '27':
  - type: text
    content: When he arrived there, he blew a trumpet in the hill country of Ephraim, and the Israelites went down with him from the hills, with him leading them.
  '28':
  - type: text
    content: '“Follow me,” he ordered, “for the '
  - type: text
    content: Lord
  - type: text
    content: ' has given Moab, your enemy, into your hands.” So they followed him down and took possession of the fords of the Jordan that led to Moab; they allowed no one to cross over. '
  '29':
  - type: text
    content: 'At that time they struck down about ten thousand Moabites, all vigorous and strong; not one escaped. '
  '3':
  - type: text
    content: 'the five rulers of the Philistines, all the Canaanites, the Sidonians, and the Hivites living in the Lebanon mountains from Mount Baal Hermon to Lebo Hamath. '
  '30':
  - type: text
    content: That day Moab was made subject to Israel, and the land had peace for eighty years.
  - type: heading
    content: Shamgar
  '31':
  - type: text
    content: After Ehud came Shamgar son of Anath, who struck down six hundred Philistines with an oxgoad. He too saved Israel.
  '4':
  - type: text
    content: 'They were left to test the Israelites to see whether they would obey the '
  - type: text
    content: Lord
  - type: text
    content: ’s commands, which he had given their ancestors through Moses.
  '5':
  - type: text
    content: 'The Israelites lived among the Canaanites, Hittites, Amorites, Perizzites, Hivites and Jebusites. '
  '6':
  - type: text
    content: They took their daughters in marriage and gave their own daughters to their sons, and served their gods.
  - type: heading
    content: Othniel
  '7':
  - type: text
    content: 'The Israelites did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: '; they forgot the '
  - type: text
    content: Lord
  - type: text
    content: ' their God and served the Baals and the Asherahs. '
  '8':
  - type: text
    content: 'The anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' burned against Israel so that he sold them into the hands of Cushan-Rishathaim king of Aram Naharaim,'
  - type: note
    content: That is, Northwest Mesopotamia
  - type: text
    content: ' to whom the Israelites were subject for eight years. '
  '9':
  - type: text
    content: 'But when they cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', he raised up for them a deliverer, Othniel son of Kenaz, Caleb’s younger brother, who saved them. '
