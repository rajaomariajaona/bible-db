document_id: JDG.3,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the nations the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' left to test all those Israelites who had not experienced any of the wars in Canaan '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came on him, so that he became Israel’s judge'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leader
      marker-yv: yv-n
    - type: text
      text: ' and went to war. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave Cushan-Rishathaim king of Aram into the hands of Othniel, who overpowered him. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So the land had peace for forty years, until Othniel son of Kenaz died.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ehud
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again the Israelites did evil in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and because they did this evil the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave Eglon king of Moab power over Israel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Getting the Ammonites and Amalekites to join him, Eglon came and attacked Israel, and they took possession of the City of Palms.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Jericho
      marker-yv: yv-n
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Israelites were subject to Eglon king of Moab for eighteen years.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again the Israelites cried out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and he gave them a deliverer—Ehud, a left-handed man, the son of Gera the Benjamite. The Israelites sent him with tribute to Eglon king of Moab. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now Ehud had made a double-edged sword about a cubit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 18 inches or about 45 centimeters
      marker-yv: yv-n
    - type: text
      text: ' long, which he strapped to his right thigh under his clothing. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He presented the tribute to Eglon king of Moab, who was a very fat man. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After Ehud had presented the tribute, he sent on their way those who had carried it. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But on reaching the stone images near Gilgal he himself went back to Eglon and said, “Your Majesty, I have a secret message for you.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: The king said to his attendants, “Leave us!” And they all left.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(he did this only to teach warfare to the descendants of the Israelites who had not had previous battle experience): '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ehud then approached him while he was sitting alone in the upper room of his palace
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this word is uncertain; also in verse 24.
      marker-yv: yv-n
    - type: text
      text: ' and said, “I have a message from God for you.” As the king rose from his seat, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ehud reached with his left hand, drew the sword from his right thigh and plunged it into the king’s belly. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Even the handle sank in after the blade, and his bowels discharged. Ehud did not pull the sword out, and the fat closed in over it. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Ehud went out to the porch
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this word is uncertain.
      marker-yv: yv-n
    - type: text
      text: ; he shut the doors of the upper room behind him and locked them.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After he had gone, the servants came and found the doors of the upper room locked. They said, “He must be relieving himself in the inner room of the palace.” '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They waited to the point of embarrassment, but when he did not open the doors of the room, they took a key and unlocked them. There they saw their lord fallen to the floor, dead.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While they waited, Ehud got away. He passed by the stone images and escaped to Seirah. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When he arrived there, he blew a trumpet in the hill country of Ephraim, and the Israelites went down with him from the hills, with him leading them.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Follow me,” he ordered, “for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given Moab, your enemy, into your hands.” So they followed him down and took possession of the fords of the Jordan that led to Moab; they allowed no one to cross over. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time they struck down about ten thousand Moabites, all vigorous and strong; not one escaped. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the five rulers of the Philistines, all the Canaanites, the Sidonians, and the Hivites living in the Lebanon mountains from Mount Baal Hermon to Lebo Hamath. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That day Moab was made subject to Israel, and the land had peace for eighty years.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Shamgar
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After Ehud came Shamgar son of Anath, who struck down six hundred Philistines with an oxgoad. He too saved Israel.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They were left to test the Israelites to see whether they would obey the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s commands, which he had given their ancestors through Moses.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Israelites lived among the Canaanites, Hittites, Amorites, Perizzites, Hivites and Jebusites. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They took their daughters in marriage and gave their own daughters to their sons, and served their gods.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Othniel
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Israelites did evil in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '; they forgot the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God and served the Baals and the Asherahs. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' burned against Israel so that he sold them into the hands of Cushan-Rishathaim king of Aram Naharaim,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Northwest Mesopotamia
      marker-yv: yv-n
    - type: text
      text: ' to whom the Israelites were subject for eight years. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when they cried out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', he raised up for them a deliverer, Othniel son of Kenaz, Caleb’s younger brother, who saved them. '
