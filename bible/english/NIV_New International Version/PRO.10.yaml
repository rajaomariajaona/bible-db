document_id: PRO.10
type_code: eng
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Proverbs of Solomon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The proverbs of Solomon:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A wise son brings joy to his father,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a foolish son brings grief to his mother.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ill-gotten treasures have no lasting value,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but righteousness delivers from death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' does not let the righteous go hungry,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he thwarts the craving of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Lazy hands make for poverty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but diligent hands bring wealth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He who gathers crops in summer is a prudent son,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he who sleeps during harvest is a disgraceful son.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Blessings crown the head of the righteous,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but violence overwhelms the mouth of the wicked.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: righteous, / but the mouth of the wicked conceals violence
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The name of the righteous is used in blessings,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See Gen. 48:20.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the name of the wicked will rot.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The wise in heart accept commands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a chattering fool comes to ruin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Whoever walks in integrity walks securely,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but whoever takes crooked paths will be found out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Whoever winks maliciously causes grief,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a chattering fool comes to ruin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The mouth of the righteous is a fountain of life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the mouth of the wicked conceals violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Hatred stirs up conflict,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but love covers over all wrongs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Wisdom is found on the lips of the discerning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a rod is for the back of one who has no sense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The wise store up knowledge,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the mouth of a fool invites ruin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The wealth of the rich is their fortified city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but poverty is the ruin of the poor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The wages of the righteous is life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the earnings of the wicked are sin and death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Whoever heeds discipline shows the way to life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but whoever ignores correction leads others astray.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Whoever conceals hatred with lying lips
- type: usfm
  marker: q2
  children:
  - type: text
    text: and spreads slander is a fool.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Sin is not ended by multiplying words,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the prudent hold their tongues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The tongue of the righteous is choice silver,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the heart of the wicked is of little value.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The lips of the righteous nourish many,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but fools die for lack of sense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'The blessing of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' brings wealth,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: without painful toil for it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: A fool finds pleasure in wicked schemes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a person of understanding delights in wisdom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: What the wicked dread will overtake them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: what the righteous desire will be granted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: When the storm has swept by, the wicked are gone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the righteous stand firm forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: As vinegar to the teeth and smoke to the eyes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so are sluggards to those who send them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'The fear of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' adds length to life,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the years of the wicked are cut short.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: The prospect of the righteous is joy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the hopes of the wicked come to nothing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'The way of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is a refuge for the blameless,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but it is the ruin of those who do evil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: The righteous will never be uprooted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the wicked will not remain in the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: From the mouth of the righteous comes the fruit of wisdom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a perverse tongue will be silenced.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: The lips of the righteous know what finds favor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the mouth of the wicked only what is perverse.
