document_id: PRO.10,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Proverbs of Solomon
  - type: text
    content: 'The proverbs of Solomon:'
  - type: text
    content: A wise son brings joy to his father,
  - type: text
    content: but a foolish son brings grief to his mother.
  '10':
  - type: text
    content: Whoever winks maliciously causes grief,
  - type: text
    content: and a chattering fool comes to ruin.
  '11':
  - type: text
    content: The mouth of the righteous is a fountain of life,
  - type: text
    content: but the mouth of the wicked conceals violence.
  '12':
  - type: text
    content: Hatred stirs up conflict,
  - type: text
    content: but love covers over all wrongs.
  '13':
  - type: text
    content: Wisdom is found on the lips of the discerning,
  - type: text
    content: but a rod is for the back of one who has no sense.
  '14':
  - type: text
    content: The wise store up knowledge,
  - type: text
    content: but the mouth of a fool invites ruin.
  '15':
  - type: text
    content: The wealth of the rich is their fortified city,
  - type: text
    content: but poverty is the ruin of the poor.
  '16':
  - type: text
    content: The wages of the righteous is life,
  - type: text
    content: but the earnings of the wicked are sin and death.
  '17':
  - type: text
    content: Whoever heeds discipline shows the way to life,
  - type: text
    content: but whoever ignores correction leads others astray.
  '18':
  - type: text
    content: Whoever conceals hatred with lying lips
  - type: text
    content: and spreads slander is a fool.
  '19':
  - type: text
    content: Sin is not ended by multiplying words,
  - type: text
    content: but the prudent hold their tongues.
  '2':
  - type: text
    content: Ill-gotten treasures have no lasting value,
  - type: text
    content: but righteousness delivers from death.
  '20':
  - type: text
    content: The tongue of the righteous is choice silver,
  - type: text
    content: but the heart of the wicked is of little value.
  '21':
  - type: text
    content: The lips of the righteous nourish many,
  - type: text
    content: but fools die for lack of sense.
  '22':
  - type: text
    content: 'The blessing of the '
  - type: text
    content: Lord
  - type: text
    content: ' brings wealth,'
  - type: text
    content: without painful toil for it.
  '23':
  - type: text
    content: A fool finds pleasure in wicked schemes,
  - type: text
    content: but a person of understanding delights in wisdom.
  '24':
  - type: text
    content: What the wicked dread will overtake them;
  - type: text
    content: what the righteous desire will be granted.
  '25':
  - type: text
    content: When the storm has swept by, the wicked are gone,
  - type: text
    content: but the righteous stand firm forever.
  '26':
  - type: text
    content: As vinegar to the teeth and smoke to the eyes,
  - type: text
    content: so are sluggards to those who send them.
  '27':
  - type: text
    content: 'The fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' adds length to life,'
  - type: text
    content: but the years of the wicked are cut short.
  '28':
  - type: text
    content: The prospect of the righteous is joy,
  - type: text
    content: but the hopes of the wicked come to nothing.
  '29':
  - type: text
    content: 'The way of the '
  - type: text
    content: Lord
  - type: text
    content: ' is a refuge for the blameless,'
  - type: text
    content: but it is the ruin of those who do evil.
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' does not let the righteous go hungry,'
  - type: text
    content: but he thwarts the craving of the wicked.
  '30':
  - type: text
    content: The righteous will never be uprooted,
  - type: text
    content: but the wicked will not remain in the land.
  '31':
  - type: text
    content: From the mouth of the righteous comes the fruit of wisdom,
  - type: text
    content: but a perverse tongue will be silenced.
  '32':
  - type: text
    content: The lips of the righteous know what finds favor,
  - type: text
    content: but the mouth of the wicked only what is perverse.
  '4':
  - type: text
    content: Lazy hands make for poverty,
  - type: text
    content: but diligent hands bring wealth.
  '5':
  - type: text
    content: He who gathers crops in summer is a prudent son,
  - type: text
    content: but he who sleeps during harvest is a disgraceful son.
  '6':
  - type: text
    content: Blessings crown the head of the righteous,
  - type: text
    content: but violence overwhelms the mouth of the wicked.
  - type: note
    content: Or righteous, / but the mouth of the wicked conceals violence
  '7':
  - type: text
    content: The name of the righteous is used in blessings,
  - type: note
    content: See Gen. 48:20.
  - type: text
    content: but the name of the wicked will rot.
  '8':
  - type: text
    content: The wise in heart accept commands,
  - type: text
    content: but a chattering fool comes to ruin.
  '9':
  - type: text
    content: Whoever walks in integrity walks securely,
  - type: text
    content: but whoever takes crooked paths will be found out.
