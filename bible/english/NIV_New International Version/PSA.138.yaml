document_id: PSA.138,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 138
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will praise you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', with all my heart;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: before the “gods” I will sing your praise.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will bow down toward your holy temple
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will praise your name
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for your unfailing love and your faithfulness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you have so exalted your solemn decree
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that it surpasses your fame.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I called, you answered me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you greatly emboldened me.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'May all the kings of the earth praise you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they hear what you have decreed.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'May they sing of the ways of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is great.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Though the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is exalted, he looks kindly on the lowly;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though lofty, he sees them from afar.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though I walk in the midst of trouble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you preserve my life.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You stretch out your hand against the anger of my foes;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with your right hand you save me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will vindicate me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'your love, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', endures forever—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not abandon the works of your hands.
