document_id: PSA.138,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 138
  - type: text
    content: Of David.
  - type: text
    content: 'I will praise you, '
  - type: text
    content: Lord
  - type: text
    content: ', with all my heart;'
  - type: text
    content: before the “gods” I will sing your praise.
  '2':
  - type: text
    content: I will bow down toward your holy temple
  - type: text
    content: and will praise your name
  - type: text
    content: for your unfailing love and your faithfulness,
  - type: text
    content: for you have so exalted your solemn decree
  - type: text
    content: that it surpasses your fame.
  '3':
  - type: text
    content: When I called, you answered me;
  - type: text
    content: you greatly emboldened me.
  '4':
  - type: text
    content: 'May all the kings of the earth praise you, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: when they hear what you have decreed.
  '5':
  - type: text
    content: 'May they sing of the ways of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'for the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' is great.'
  '6':
  - type: text
    content: 'Though the '
  - type: text
    content: Lord
  - type: text
    content: ' is exalted, he looks kindly on the lowly;'
  - type: text
    content: though lofty, he sees them from afar.
  '7':
  - type: text
    content: Though I walk in the midst of trouble,
  - type: text
    content: you preserve my life.
  - type: text
    content: You stretch out your hand against the anger of my foes;
  - type: text
    content: with your right hand you save me.
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will vindicate me;'
  - type: text
    content: 'your love, '
  - type: text
    content: Lord
  - type: text
    content: ', endures forever—'
  - type: text
    content: do not abandon the works of your hands.
