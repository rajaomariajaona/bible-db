      text: '45'
  - type: text
    text: the pots, shovels and sprinkling bowls.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'All these objects that Huram made for King Solomon for the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' were of burnished bronze. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'The king had them cast in clay molds in the plain of the Jordan between Sukkoth and Zarethan. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Solomon left all these things unweighed, because there were so many; the weight of the bronze was not determined.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Solomon also made all the furnishings that were in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s temple:'
- type: usfm
  marker: li1
  children:
