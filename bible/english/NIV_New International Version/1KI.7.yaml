      text: '51'
  - type: text
    text: 'When all the work King Solomon had done for the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was finished, he brought in the things his father David had dedicated—the silver and gold and the furnishings—and he placed them in the treasuries of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s temple.
