  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: the lampstands of pure gold (five on the right and five on the left, in front of the inner sanctuary);
- type: usfm
  marker: li1
  children:
  - type: text
    text: the gold floral work and lamps and tongs;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
