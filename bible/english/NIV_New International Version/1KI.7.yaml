    text: and the gold sockets for the doors of the innermost room, the Most Holy Place, and also for the doors of the main hall of the temple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
