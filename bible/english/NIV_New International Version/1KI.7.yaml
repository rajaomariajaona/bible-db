document_id: 1KI.7,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Solomon Builds His Palace
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It took Solomon thirteen years, however, to complete the construction of his palace. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The foundations were laid with large stones of good quality, some measuring ten cubits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 15 feet or about 4.5 meters; also in verse 23
      marker-yv: yv-n
    - type: text
      text: ' and some eight.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 12 feet or about 3.6 meters
      marker-yv: yv-n
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Above were high-grade stones, cut to size, and cedar beams. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The great courtyard was surrounded by a wall of three courses of dressed stone and one course of trimmed cedar beams, as was the inner courtyard of the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' with its portico.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Temple’s Furnishings
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: King Solomon sent to Tyre and brought Huram,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Hiram, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Huram
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verses 40 and 45
      marker-yv: yv-n
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: whose mother was a widow from the tribe of Naphtali and whose father was from Tyre and a skilled craftsman in bronze. Huram was filled with wisdom, with understanding and with knowledge to do all kinds of bronze work. He came to King Solomon and did all the work assigned to him.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He cast two bronze pillars, each eighteen cubits high and twelve cubits in circumference.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 27 feet high and 18 feet in circumference or about 8.1 meters high and 5.4 meters in circumference
      marker-yv: yv-n
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He also made two capitals of cast bronze to set on the tops of the pillars; each capital was five cubits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 7 1/2 feet or about 2.3 meters; also in verse 23
      marker-yv: yv-n
    - type: text
      text: ' high. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A network of interwoven chains adorned the capitals on top of the pillars, seven for each capital. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He made pomegranates in two rows
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Two Hebrew manuscripts and Septuagint; most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: made the pillars, and there were two rows
      marker-yv: yv-n
    - type: text
      text: ' encircling each network to decorate the capitals on top of the pillars.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Many Hebrew manuscripts and Syriac; most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pomegranates
      marker-yv: yv-n
    - type: text
      text: ' He did the same for each capital. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The capitals on top of the pillars in the portico were in the shape of lilies, four cubits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 6 feet or about 1.8 meters; also in verse 38
      marker-yv: yv-n
    - type: text
      text: ' high. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He built the Palace of the Forest of Lebanon a hundred cubits long, fifty wide and thirty high,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 150 feet long, 75 feet wide and 45 feet high or about 45 meters long, 23 meters wide and 14 meters high
      marker-yv: yv-n
    - type: text
      text: ' with four rows of cedar columns supporting trimmed cedar beams. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the capitals of both pillars, above the bowl-shaped part next to the network, were the two hundred pomegranates in rows all around. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He erected the pillars at the portico of the temple. The pillar to the south he named Jakin
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jakin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'probably means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he establishes.
      marker-yv: yv-n
    - type: text
      text: ' and the one to the north Boaz.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Boaz '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'probably means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in him is strength.
      marker-yv: yv-n
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The capitals on top were in the shape of lilies. And so the work on the pillars was completed.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He made the Sea of cast metal, circular in shape, measuring ten cubits from rim to rim and five cubits high. It took a line of thirty cubits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 45 feet or about 14 meters
      marker-yv: yv-n
    - type: text
      text: ' to measure around it. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Below the rim, gourds encircled it—ten to a cubit. The gourds were cast in two rows in one piece with the Sea.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Sea stood on twelve bulls, three facing north, three facing west, three facing south and three facing east. The Sea rested on top of them, and their hindquarters were toward the center. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It was a handbreadth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 3 inches or about 7.5 centimeters
      marker-yv: yv-n
    - type: text
      text: ' in thickness, and its rim was like the rim of a cup, like a lily blossom. It held two thousand baths.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 12,000 gallons or about 44,000 liters; the Septuagint does not have this sentence.
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He also made ten movable stands of bronze; each was four cubits long, four wide and three high.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 6 feet long and wide and about 4 1/2 feet high or about 1.8 meters long and wide and 1.4 meters high
      marker-yv: yv-n
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is how the stands were made: They had side panels attached to uprights. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the panels between the uprights were lions, bulls and cherubim—and on the uprights as well. Above and below the lions and bulls were wreaths of hammered work. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It was roofed with cedar above the beams that rested on the columns—forty-five beams, fifteen to a row. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Each stand had four bronze wheels with bronze axles, and each had a basin resting on four supports, cast with wreaths on each side. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On the inside of the stand there was an opening that had a circular frame one cubit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 18 inches or about 45 centimeters
      marker-yv: yv-n
    - type: text
      text: ' deep. This opening was round, and with its basework it measured a cubit and a half.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 2 1/4 feet or about 68 centimeters; also in verse 32
      marker-yv: yv-n
    - type: text
      text: ' Around its opening there was engraving. The panels of the stands were square, not round. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The four wheels were under the panels, and the axles of the wheels were attached to the stand. The diameter of each wheel was a cubit and a half. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The wheels were made like chariot wheels; the axles, rims, spokes and hubs were all of cast metal.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Each stand had four handles, one on each corner, projecting from the stand. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At the top of the stand there was a circular band half a cubit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 9 inches or about 23 centimeters
      marker-yv: yv-n
    - type: text
      text: ' deep. The supports and panels were attached to the top of the stand. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He engraved cherubim, lions and palm trees on the surfaces of the supports and on the panels, in every available space, with wreaths all around. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This is the way he made the ten stands. They were all cast in the same molds and were identical in size and shape.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He then made ten bronze basins, each holding forty baths
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 240 gallons or about 880 liters
      marker-yv: yv-n
    - type: text
      text: ' and measuring four cubits across, one basin to go on each of the ten stands. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He placed five of the stands on the south side of the temple and five on the north. He placed the Sea on the south side, at the southeast corner of the temple. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Its windows were placed high in sets of three, facing each other. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He also made the pots
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Many Hebrew manuscripts, Septuagint, Syriac and Vulgate (see also verse 45 and 2 Chron. 4:11); many other Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: basins
      marker-yv: yv-n
    - type: text
      text: ' and shovels and sprinkling bowls.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Huram finished all the work he had undertaken for King Solomon in the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ':'
  '41':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the two pillars;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the two bowl-shaped capitals on top of the pillars;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the two sets of network decorating the two bowl-shaped capitals on top of the pillars;
  '42':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the four hundred pomegranates for the two sets of network (two rows of pomegranates for each network decorating the bowl-shaped capitals on top of the pillars);
  '43':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the ten stands with their ten basins;
  '44':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the Sea and the twelve bulls under it;
  '45':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the pots, shovels and sprinkling bowls.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All these objects that Huram made for King Solomon for the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' were of burnished bronze. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king had them cast in clay molds in the plain of the Jordan between Sukkoth and Zarethan. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Solomon left all these things unweighed, because there were so many; the weight of the bronze was not determined.
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Solomon also made all the furnishings that were in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s temple:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the golden altar;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the golden table on which was the bread of the Presence;
  '49':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the lampstands of pure gold (five on the right and five on the left, in front of the inner sanctuary);
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the gold floral work and lamps and tongs;
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All the doorways had rectangular frames; they were in the front part in sets of three, facing each other.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this verse is uncertain.
      marker-yv: yv-n
  '50':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: the pure gold basins, wick trimmers, sprinkling bowls, dishes and censers;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: and the gold sockets for the doors of the innermost room, the Most Holy Place, and also for the doors of the main hall of the temple.
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When all the work King Solomon had done for the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was finished, he brought in the things his father David had dedicated—the silver and gold and the furnishings—and he placed them in the treasuries of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s temple.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He made a colonnade fifty cubits long and thirty wide.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 75 feet long and 45 feet wide or about 23 meters long and 14 meters wide
      marker-yv: yv-n
    - type: text
      text: ' In front of it was a portico, and in front of that were pillars and an overhanging roof.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He built the throne hall, the Hall of Justice, where he was to judge, and he covered it with cedar from floor to ceiling.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Vulgate and Syriac; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: floor
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the palace in which he was to live, set farther back, was similar in design. Solomon also made a palace like this hall for Pharaoh’s daughter, whom he had married.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All these structures, from the outside to the great courtyard and from foundation to eaves, were made of blocks of high-grade stone cut to size and smoothed on their inner and outer faces. '
