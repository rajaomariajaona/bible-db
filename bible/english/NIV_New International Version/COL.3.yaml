document_id: COL.3,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Living as Those Made Alive in Christ
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Since, then, you have been raised with Christ, set your hearts on things above, where Christ is, seated at the right hand of God. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and have put on the new self, which is being renewed in knowledge in the image of its Creator. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Here there is no Gentile or Jew, circumcised or uncircumcised, barbarian, Scythian, slave or free, but Christ is all, and is in all.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, as God’s chosen people, holy and dearly loved, clothe yourselves with compassion, kindness, humility, gentleness and patience. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bear with each other and forgive one another if any of you has a grievance against someone. Forgive as the Lord forgave you. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And over all these virtues put on love, which binds them all together in perfect unity.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let the peace of Christ rule in your hearts, since as members of one body you were called to peace. And be thankful. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let the message of Christ dwell among you richly as you teach and admonish one another with all wisdom through psalms, hymns, and songs from the Spirit, singing to God with gratitude in your hearts. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And whatever you do, whether in word or deed, do it all in the name of the Lord Jesus, giving thanks to God the Father through him.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Instructions for Christian Households
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Wives, submit yourselves to your husbands, as is fitting in the Lord.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Husbands, love your wives and do not be harsh with them.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Set your minds on things above, not on earthly things. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Children, obey your parents in everything, for this pleases the Lord.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Fathers,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Parents
      marker-yv: yv-n
    - type: text
      text: ' do not embitter your children, or they will become discouraged.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Slaves, obey your earthly masters in everything; and do it, not only when their eye is on you and to curry their favor, but with sincerity of heart and reverence for the Lord. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whatever you do, work at it with all your heart, as working for the Lord, not for human masters, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'since you know that you will receive an inheritance from the Lord as a reward. It is the Lord Christ you are serving. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Anyone who does wrong will be repaid for their wrongs, and there is no favoritism.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For you died, and your life is now hidden with Christ in God. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Christ, who is your
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: our
      marker-yv: yv-n
    - type: text
      text: ' life, appears, then you also will appear with him in glory.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Put to death, therefore, whatever belongs to your earthly nature: sexual immorality, impurity, lust, evil desires and greed, which is idolatry. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Because of these, the wrath of God is coming.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some early manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: coming on those who are disobedient
      marker-yv: yv-n
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You used to walk in these ways, in the life you once lived. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now you must also rid yourselves of all such things as these: anger, rage, malice, slander, and filthy language from your lips. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not lie to each other, since you have taken off your old self with its practices '
