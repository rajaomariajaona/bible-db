document_id: COL.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Living as Those Made Alive in Christ
  - type: text
    content: 'Since, then, you have been raised with Christ, set your hearts on things above, where Christ is, seated at the right hand of God. '
  '10':
  - type: text
    content: 'and have put on the new self, which is being renewed in knowledge in the image of its Creator. '
  '11':
  - type: text
    content: Here there is no Gentile or Jew, circumcised or uncircumcised, barbarian, Scythian, slave or free, but Christ is all, and is in all.
  '12':
  - type: text
    content: 'Therefore, as God’s chosen people, holy and dearly loved, clothe yourselves with compassion, kindness, humility, gentleness and patience. '
  '13':
  - type: text
    content: 'Bear with each other and forgive one another if any of you has a grievance against someone. Forgive as the Lord forgave you. '
  '14':
  - type: text
    content: And over all these virtues put on love, which binds them all together in perfect unity.
  '15':
  - type: text
    content: 'Let the peace of Christ rule in your hearts, since as members of one body you were called to peace. And be thankful. '
  '16':
  - type: text
    content: 'Let the message of Christ dwell among you richly as you teach and admonish one another with all wisdom through psalms, hymns, and songs from the Spirit, singing to God with gratitude in your hearts. '
  '17':
  - type: text
    content: And whatever you do, whether in word or deed, do it all in the name of the Lord Jesus, giving thanks to God the Father through him.
  - type: heading
    content: Instructions for Christian Households
  '18':
  - type: text
    content: Wives, submit yourselves to your husbands, as is fitting in the Lord.
  '19':
  - type: text
    content: Husbands, love your wives and do not be harsh with them.
  '2':
  - type: text
    content: 'Set your minds on things above, not on earthly things. '
  '20':
  - type: text
    content: Children, obey your parents in everything, for this pleases the Lord.
  '21':
  - type: text
    content: Fathers,
  - type: note
    content: Or Parents
  - type: text
    content: ' do not embitter your children, or they will become discouraged.'
  '22':
  - type: text
    content: 'Slaves, obey your earthly masters in everything; and do it, not only when their eye is on you and to curry their favor, but with sincerity of heart and reverence for the Lord. '
  '23':
  - type: text
    content: 'Whatever you do, work at it with all your heart, as working for the Lord, not for human masters, '
  '24':
  - type: text
    content: 'since you know that you will receive an inheritance from the Lord as a reward. It is the Lord Christ you are serving. '
  '25':
  - type: text
    content: Anyone who does wrong will be repaid for their wrongs, and there is no favoritism.
  '3':
  - type: text
    content: 'For you died, and your life is now hidden with Christ in God. '
  '4':
  - type: text
    content: When Christ, who is your
  - type: note
    content: Some manuscripts our
  - type: text
    content: ' life, appears, then you also will appear with him in glory.'
  '5':
  - type: text
    content: 'Put to death, therefore, whatever belongs to your earthly nature: sexual immorality, impurity, lust, evil desires and greed, which is idolatry. '
  '6':
  - type: text
    content: Because of these, the wrath of God is coming.
  - type: note
    content: Some early manuscripts coming on those who are disobedient
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'You used to walk in these ways, in the life you once lived. '
  '8':
  - type: text
    content: 'But now you must also rid yourselves of all such things as these: anger, rage, malice, slander, and filthy language from your lips. '
  '9':
  - type: text
    content: 'Do not lie to each other, since you have taken off your old self with its practices '
