verses:
  '1':
  - type: heading
    content: The Fellowship Offering
  - type: text
    content: '“ ‘If your offering is a fellowship offering, and you offer an animal from the herd, whether male or female, you are to present before the '
  - type: text
    content: Lord
  - type: text
    content: ' an animal without defect. '
  '10':
  - type: text
    content: 'both kidneys with the fat on them near the loins, and the long lobe of the liver, which you will remove with the kidneys. '
  '11':
  - type: text
    content: 'The priest shall burn them on the altar as a food offering presented to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: '“ ‘If your offering is a goat, you are to present it before the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '13':
  - type: text
    content: 'lay your hand on its head and slaughter it in front of the tent of meeting. Then Aaron’s sons shall splash its blood against the sides of the altar. '
  '14':
  - type: text
    content: 'From what you offer you are to present this food offering to the '
  - type: text
    content: Lord
  - type: text
    content: ': the internal organs and all the fat that is connected to them, '
  '15':
  - type: text
    content: 'both kidneys with the fat on them near the loins, and the long lobe of the liver, which you will remove with the kidneys. '
  '16':
  - type: text
    content: 'The priest shall burn them on the altar as a food offering, a pleasing aroma. All the fat is the '
  - type: text
    content: Lord
  - type: text
    content: ’s.
  '17':
  - type: text
    content: '“ ‘This is a lasting ordinance for the generations to come, wherever you live: You must not eat any fat or any blood.’ ”'
  '2':
  - type: text
    content: 'You are to lay your hand on the head of your offering and slaughter it at the entrance to the tent of meeting. Then Aaron’s sons the priests shall splash the blood against the sides of the altar. '
  '3':
  - type: text
    content: 'From the fellowship offering you are to bring a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: ': the internal organs and all the fat that is connected to them, '
  '4':
  - type: text
    content: 'both kidneys with the fat on them near the loins, and the long lobe of the liver, which you will remove with the kidneys. '
  '5':
  - type: text
    content: 'Then Aaron’s sons are to burn it on the altar on top of the burnt offering that is lying on the burning wood; it is a food offering, an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: '“ ‘If you offer an animal from the flock as a fellowship offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', you are to offer a male or female without defect. '
  '7':
  - type: text
    content: 'If you offer a lamb, you are to present it before the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '8':
  - type: text
    content: 'lay your hand on its head and slaughter it in front of the tent of meeting. Then Aaron’s sons shall splash its blood against the sides of the altar. '
  '9':
  - type: text
    content: 'From the fellowship offering you are to bring a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: ': its fat, the entire fat tail cut off close to the backbone, the internal organs and all the fat that is connected to them, '
