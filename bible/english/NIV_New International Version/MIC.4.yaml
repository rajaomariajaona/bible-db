document_id: MIC.4,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The Mountain of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: In the last days
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'the mountain of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s temple will be established
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as the highest of the mountains;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: it will be exalted above the hills,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and peoples will stream to it.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Writhe in agony, Daughter Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a woman in labor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for now you must leave the city
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to camp in the open field.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will go to Babylon;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there you will be rescued.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'There the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will redeem you'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: out of the hand of your enemies.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: But now many nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are gathered against you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They say, “Let her be defiled,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let our eyes gloat over Zion!”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: But they do not know
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the thoughts of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they do not understand his plan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that he has gathered them like sheaves to the threshing floor.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “Rise and thresh, Daughter Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I will give you horns of iron;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will give you hooves of bronze,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will break to pieces many nations.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You will devote their ill-gotten gains to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their wealth to the Lord of all the earth.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Many nations will come and say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Come, let us go up to the mountain of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the temple of the God of Jacob.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will teach us his ways,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that we may walk in his paths.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The law will go out from Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' from Jerusalem.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: He will judge between many peoples
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will settle disputes for strong nations far and wide.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will beat their swords into plowshares
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their spears into pruning hooks.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nation will not take up sword against nation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor will they train for war anymore.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Everyone will sit under their own vine
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and under their own fig tree,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and no one will make them afraid,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty has spoken.'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: All the nations may walk
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the name of their gods,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'but we will walk in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: our God for ever and ever.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s Plan
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '“In that day,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I will gather the lame;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will assemble the exiles
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those I have brought to grief.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: I will make the lame my remnant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those driven away a strong nation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will rule over them in Mount Zion'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from that day and forever.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: As for you, watchtower of the flock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stronghold
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: hill
      marker-yv: yv-n
    - type: text
      text: ' of Daughter Zion,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the former dominion will be restored to you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: kingship will come to Daughter Jerusalem.”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Why do you now cry aloud—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have you no king
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: King
      marker-yv: yv-n
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Has your ruler
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ruler
      marker-yv: yv-n
    - type: text
      text: ' perished,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that pain seizes you like that of a woman in labor?
