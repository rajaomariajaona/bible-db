type_code: eng
verses:
  '1':
  - type: heading
    content: The Mountain of the Lord
  - type: text
    content: In the last days
  - type: text
    content: 'the mountain of the '
  - type: text
    content: Lord
  - type: text
    content: ’s temple will be established
  - type: text
    content: as the highest of the mountains;
  - type: text
    content: it will be exalted above the hills,
  - type: text
    content: and peoples will stream to it.
  '10':
  - type: text
    content: Writhe in agony, Daughter Zion,
  - type: text
    content: like a woman in labor,
  - type: text
    content: for now you must leave the city
  - type: text
    content: to camp in the open field.
  - type: text
    content: You will go to Babylon;
  - type: text
    content: there you will be rescued.
  - type: text
    content: 'There the '
  - type: text
    content: Lord
  - type: text
    content: ' will redeem you'
  - type: text
    content: out of the hand of your enemies.
  '11':
  - type: text
    content: But now many nations
  - type: text
    content: are gathered against you.
  - type: text
    content: They say, “Let her be defiled,
  - type: text
    content: let our eyes gloat over Zion!”
  '12':
  - type: text
    content: But they do not know
  - type: text
    content: 'the thoughts of the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: they do not understand his plan,
  - type: text
    content: that he has gathered them like sheaves to the threshing floor.
  '13':
  - type: text
    content: “Rise and thresh, Daughter Zion,
  - type: text
    content: for I will give you horns of iron;
  - type: text
    content: I will give you hooves of bronze,
  - type: text
    content: and you will break to pieces many nations.”
  - type: text
    content: 'You will devote their ill-gotten gains to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: their wealth to the Lord of all the earth.
  '2':
  - type: text
    content: Many nations will come and say,
  - type: text
    content: '“Come, let us go up to the mountain of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: to the temple of the God of Jacob.
  - type: text
    content: He will teach us his ways,
  - type: text
    content: so that we may walk in his paths.”
  - type: text
    content: The law will go out from Zion,
  - type: text
    content: 'the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' from Jerusalem.'
  '3':
  - type: text
    content: He will judge between many peoples
  - type: text
    content: and will settle disputes for strong nations far and wide.
  - type: text
    content: They will beat their swords into plowshares
  - type: text
    content: and their spears into pruning hooks.
  - type: text
    content: Nation will not take up sword against nation,
  - type: text
    content: nor will they train for war anymore.
  '4':
  - type: text
    content: Everyone will sit under their own vine
  - type: text
    content: and under their own fig tree,
  - type: text
    content: and no one will make them afraid,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty has spoken.'
  '5':
  - type: text
    content: All the nations may walk
  - type: text
    content: in the name of their gods,
  - type: text
    content: 'but we will walk in the name of the '
  - type: text
    content: Lord
  - type: text
    content: our God for ever and ever.
  - type: heading
    content: The Lord’s Plan
  '6':
  - type: text
    content: '“In that day,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “I will gather the lame;
  - type: text
    content: I will assemble the exiles
  - type: text
    content: and those I have brought to grief.
  '7':
  - type: text
    content: I will make the lame my remnant,
  - type: text
    content: those driven away a strong nation.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will rule over them in Mount Zion'
  - type: text
    content: from that day and forever.
  '8':
  - type: text
    content: As for you, watchtower of the flock,
  - type: text
    content: stronghold
  - type: note
    content: Or hill
  - type: text
    content: ' of Daughter Zion,'
  - type: text
    content: the former dominion will be restored to you;
  - type: text
    content: kingship will come to Daughter Jerusalem.”
  '9':
  - type: text
    content: Why do you now cry aloud—
  - type: text
    content: have you no king
  - type: note
    content: Or King
  - type: text
    content: '?'
  - type: text
    content: Has your ruler
  - type: note
    content: Or Ruler
  - type: text
    content: ' perished,'
  - type: text
    content: that pain seizes you like that of a woman in labor?
