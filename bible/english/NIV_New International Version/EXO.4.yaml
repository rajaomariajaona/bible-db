document_id: EXO.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Signs for Moses
  - type: text
    content: 'Moses answered, “What if they do not believe me or listen to me and say, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' did not appear to you’?”'
  '10':
  - type: text
    content: 'Moses said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “Pardon your servant, Lord. I have never been eloquent, neither in the past nor since you have spoken to your servant. I am slow of speech and tongue.”'
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “Who gave human beings their mouths? Who makes them deaf or mute? Who gives them sight or makes them blind? Is it not I, the '
  - type: text
    content: Lord
  - type: text
    content: '? '
  '12':
  - type: text
    content: Now go; I will help you speak and will teach you what to say.”
  '13':
  - type: text
    content: But Moses said, “Pardon your servant, Lord. Please send someone else.”
  '14':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: '’s anger burned against Moses and he said, “What about your brother, Aaron the Levite? I know he can speak well. He is already on his way to meet you, and he will be glad to see you. '
  '15':
  - type: text
    content: 'You shall speak to him and put words in his mouth; I will help both of you speak and will teach you what to do. '
  '16':
  - type: text
    content: 'He will speak to the people for you, and it will be as if he were your mouth and as if you were God to him. '
  '17':
  - type: text
    content: But take this staff in your hand so you can perform the signs with it.”
  - type: heading
    content: Moses Returns to Egypt
  '18':
  - type: text
    content: Then Moses went back to Jethro his father-in-law and said to him, “Let me return to my own people in Egypt to see if any of them are still alive.”
  - type: text
    content: Jethro said, “Go, and I wish you well.”
  '19':
  - type: text
    content: 'Now the '
  - type: text
    content: Lord
  - type: text
    content: ' had said to Moses in Midian, “Go back to Egypt, for all those who wanted to kill you are dead.” '
  '2':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “What is that in your hand?”'
  - type: text
    content: “A staff,” he replied.
  '20':
  - type: text
    content: So Moses took his wife and sons, put them on a donkey and started back to Egypt. And he took the staff of God in his hand.
  '21':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “When you return to Egypt, see that you perform before Pharaoh all the wonders I have given you the power to do. But I will harden his heart so that he will not let the people go. '
  '22':
  - type: text
    content: 'Then say to Pharaoh, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Israel is my firstborn son, '
  '23':
  - type: text
    content: and I told you, “Let my son go, so he may worship me.” But you refused to let him go; so I will kill your firstborn son.’ ”
  '24':
  - type: text
    content: 'At a lodging place on the way, the '
  - type: text
    content: Lord
  - type: text
    content: ' met Moses'
  - type: note
    content: Hebrew him
  - type: text
    content: ' and was about to kill him. '
  '25':
  - type: text
    content: But Zipporah took a flint knife, cut off her son’s foreskin and touched Moses’ feet with it.
  - type: note
    content: The meaning of the Hebrew for this clause is uncertain.
  - type: text
    content: ' “Surely you are a bridegroom of blood to me,” she said. '
  '26':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' let him alone. (At that time she said “bridegroom of blood,” referring to circumcision.)'
  '27':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Aaron, “Go into the wilderness to meet Moses.” So he met Moses at the mountain of God and kissed him. '
  '28':
  - type: text
    content: 'Then Moses told Aaron everything the '
  - type: text
    content: Lord
  - type: text
    content: ' had sent him to say, and also about all the signs he had commanded him to perform.'
  '29':
  - type: text
    content: 'Moses and Aaron brought together all the elders of the Israelites, '
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Throw it on the ground.”'
  - type: text
    content: 'Moses threw it on the ground and it became a snake, and he ran from it. '
  '30':
  - type: text
    content: 'and Aaron told them everything the '
  - type: text
    content: Lord
  - type: text
    content: ' had said to Moses. He also performed the signs before the people, '
  '31':
  - type: text
    content: 'and they believed. And when they heard that the '
  - type: text
    content: Lord
  - type: text
    content: ' was concerned about them and had seen their misery, they bowed down and worshiped.'
  '4':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “Reach out your hand and take it by the tail.” So Moses reached out and took hold of the snake and it turned back into a staff in his hand. '
  '5':
  - type: text
    content: '“This,” said the '
  - type: text
    content: Lord
  - type: text
    content: ', “is so that they may believe that the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their fathers—the God of Abraham, the God of Isaac and the God of Jacob—has appeared to you.”'
  '6':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “Put your hand inside your cloak.” So Moses put his hand into his cloak, and when he took it out, the skin was leprous'
  - type: note
    content: The Hebrew word for leprous was used for various diseases affecting the skin.
  - type: text
    content: —it had become as white as snow.
  '7':
  - type: text
    content: “Now put it back into your cloak,” he said. So Moses put his hand back into his cloak, and when he took it out, it was restored, like the rest of his flesh.
  '8':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “If they do not believe you or pay attention to the first sign, they may believe the second. '
  '9':
  - type: text
    content: But if they do not believe these two signs or listen to you, take some water from the Nile and pour it on the dry ground. The water you take from the river will become blood on the ground.”
