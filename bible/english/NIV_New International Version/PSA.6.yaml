verses:
  '1':
  - type: heading
    content: Psalm 6In Hebrew texts 6:1-10 is numbered 6:2-11.
  - type: text
    content: 'For the director of music. With stringed instruments. According to '
  - type: text
    content: sheminith.
  - type: note
    content: 'Title: Probably a musical term'
  - type: text
    content: ' A psalm of David.'
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', do not rebuke me in your anger'
  - type: text
    content: or discipline me in your wrath.
  '10':
  - type: text
    content: All my enemies will be overwhelmed with shame and anguish;
  - type: text
    content: they will turn back and suddenly be put to shame.
  '2':
  - type: text
    content: 'Have mercy on me, '
  - type: text
    content: Lord
  - type: text
    content: ', for I am faint;'
  - type: text
    content: 'heal me, '
  - type: text
    content: Lord
  - type: text
    content: ', for my bones are in agony.'
  '3':
  - type: text
    content: My soul is in deep anguish.
  - type: text
    content: 'How long, '
  - type: text
    content: Lord
  - type: text
    content: ', how long?'
  '4':
  - type: text
    content: 'Turn, '
  - type: text
    content: Lord
  - type: text
    content: ', and deliver me;'
  - type: text
    content: save me because of your unfailing love.
  '5':
  - type: text
    content: Among the dead no one proclaims your name.
  - type: text
    content: Who praises you from the grave?
  '6':
  - type: text
    content: I am worn out from my groaning.
  - type: text
    content: All night long I flood my bed with weeping
  - type: text
    content: and drench my couch with tears.
  '7':
  - type: text
    content: My eyes grow weak with sorrow;
  - type: text
    content: they fail because of all my foes.
  '8':
  - type: text
    content: Away from me, all you who do evil,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has heard my weeping.'
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has heard my cry for mercy;'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' accepts my prayer.'
