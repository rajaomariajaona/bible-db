document_id: PSA.6,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 6
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 6:1-10 is numbered 6:2-11.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the director of music. With stringed instruments. According to '
    - type: usfm
      marker: tl
      children:
      - type: text
        text: sheminith.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Title: Probably a musical term'
      marker-yv: yv-n
    - type: text
      text: ' A psalm of David.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', do not rebuke me in your anger'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or discipline me in your wrath.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: All my enemies will be overwhelmed with shame and anguish;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will turn back and suddenly be put to shame.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Have mercy on me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for I am faint;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'heal me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for my bones are in agony.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: My soul is in deep anguish.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'How long, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', how long?'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Turn, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and deliver me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: save me because of your unfailing love.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Among the dead no one proclaims your name.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who praises you from the grave?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: I am worn out from my groaning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All night long I flood my bed with weeping
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and drench my couch with tears.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: My eyes grow weak with sorrow;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they fail because of all my foes.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Away from me, all you who do evil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has heard my weeping.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has heard my cry for mercy;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' accepts my prayer.'
