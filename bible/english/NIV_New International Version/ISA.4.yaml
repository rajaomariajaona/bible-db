document_id: ISA.4,111
type_code: eng
verses:
  '1':
  - type: text
    content: In that day seven women
  - type: text
    content: will take hold of one man
  - type: text
    content: and say, “We will eat our own food
  - type: text
    content: and provide our own clothes;
  - type: text
    content: only let us be called by your name.
  - type: text
    content: Take away our disgrace!”
  - type: heading
    content: The Branch of the Lord
  '2':
  - type: text
    content: 'In that day the Branch of the '
  - type: text
    content: Lord
  - type: text
    content: ' will be beautiful and glorious, and the fruit of the land will be the pride and glory of the survivors in Israel. '
  '3':
  - type: text
    content: 'Those who are left in Zion, who remain in Jerusalem, will be called holy, all who are recorded among the living in Jerusalem. '
  '4':
  - type: text
    content: The Lord will wash away the filth of the women of Zion; he will cleanse the bloodstains from Jerusalem by a spirit
  - type: note
    content: Or the Spirit
  - type: text
    content: ' of judgment and a spirit'
  - type: note
    content: Or the Spirit
  - type: text
    content: ' of fire. '
  '5':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' will create over all of Mount Zion and over those who assemble there a cloud of smoke by day and a glow of flaming fire by night; over everything the glory'
  - type: note
    content: Or over all the glory there
  - type: text
    content: ' will be a canopy. '
  '6':
  - type: text
    content: It will be a shelter and shade from the heat of the day, and a refuge and hiding place from the storm and rain.
