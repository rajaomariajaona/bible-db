document_id: ISA.4,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In that day seven women
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will take hold of one man
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and say, “We will eat our own food
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and provide our own clothes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: only let us be called by your name.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Take away our disgrace!”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The Branch of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In that day the Branch of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be beautiful and glorious, and the fruit of the land will be the pride and glory of the survivors in Israel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those who are left in Zion, who remain in Jerusalem, will be called holy, all who are recorded among the living in Jerusalem. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Lord will wash away the filth of the women of Zion; he will cleanse the bloodstains from Jerusalem by a spirit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Spirit
      marker-yv: yv-n
    - type: text
      text: ' of judgment and a spirit'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Spirit
      marker-yv: yv-n
    - type: text
      text: ' of fire. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will create over all of Mount Zion and over those who assemble there a cloud of smoke by day and a glow of flaming fire by night; over everything the glory'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: over all the glory there
      marker-yv: yv-n
    - type: text
      text: ' will be a canopy. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: It will be a shelter and shade from the heat of the day, and a refuge and hiding place from the storm and rain.
