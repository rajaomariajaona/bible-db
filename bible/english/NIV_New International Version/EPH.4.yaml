document_id: EPH.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Unity and Maturity in the Body of Christ
  - type: text
    content: 'As a prisoner for the Lord, then, I urge you to live a life worthy of the calling you have received. '
  '10':
  - type: text
    content: 'He who descended is the very one who ascended higher than all the heavens, in order to fill the whole universe.) '
  '11':
  - type: text
    content: 'So Christ himself gave the apostles, the prophets, the evangelists, the pastors and teachers, '
  '12':
  - type: text
    content: 'to equip his people for works of service, so that the body of Christ may be built up '
  '13':
  - type: text
    content: until we all reach unity in the faith and in the knowledge of the Son of God and become mature, attaining to the whole measure of the fullness of Christ.
  '14':
  - type: text
    content: 'Then we will no longer be infants, tossed back and forth by the waves, and blown here and there by every wind of teaching and by the cunning and craftiness of people in their deceitful scheming. '
  '15':
  - type: text
    content: 'Instead, speaking the truth in love, we will grow to become in every respect the mature body of him who is the head, that is, Christ. '
  '16':
  - type: text
    content: From him the whole body, joined and held together by every supporting ligament, grows and builds itself up in love, as each part does its work.
  - type: heading
    content: Instructions for Christian Living
  '17':
  - type: text
    content: 'So I tell you this, and insist on it in the Lord, that you must no longer live as the Gentiles do, in the futility of their thinking. '
  '18':
  - type: text
    content: 'They are darkened in their understanding and separated from the life of God because of the ignorance that is in them due to the hardening of their hearts. '
  '19':
  - type: text
    content: Having lost all sensitivity, they have given themselves over to sensuality so as to indulge in every kind of impurity, and they are full of greed.
  '2':
  - type: text
    content: 'Be completely humble and gentle; be patient, bearing with one another in love. '
  '20':
  - type: text
    content: 'That, however, is not the way of life you learned '
  '21':
  - type: text
    content: 'when you heard about Christ and were taught in him in accordance with the truth that is in Jesus. '
  '22':
  - type: text
    content: 'You were taught, with regard to your former way of life, to put off your old self, which is being corrupted by its deceitful desires; '
  '23':
  - type: text
    content: 'to be made new in the attitude of your minds; '
  '24':
  - type: text
    content: and to put on the new self, created to be like God in true righteousness and holiness.
  '25':
  - type: text
    content: 'Therefore each of you must put off falsehood and speak truthfully to your neighbor, for we are all members of one body. '
  '26':
  - type: text
    content: “In your anger do not sin”
  - type: note
    content: Psalm 4:4 (see Septuagint)
  - type: text
    content: ': Do not let the sun go down while you are still angry, '
  '27':
  - type: text
    content: 'and do not give the devil a foothold. '
  '28':
  - type: text
    content: Anyone who has been stealing must steal no longer, but must work, doing something useful with their own hands, that they may have something to share with those in need.
  '29':
  - type: text
    content: 'Do not let any unwholesome talk come out of your mouths, but only what is helpful for building others up according to their needs, that it may benefit those who listen. '
  '3':
  - type: text
    content: 'Make every effort to keep the unity of the Spirit through the bond of peace. '
  '30':
  - type: text
    content: 'And do not grieve the Holy Spirit of God, with whom you were sealed for the day of redemption. '
  '31':
  - type: text
    content: 'Get rid of all bitterness, rage and anger, brawling and slander, along with every form of malice. '
  '32':
  - type: text
    content: Be kind and compassionate to one another, forgiving each other, just as in Christ God forgave you.
  '4':
  - type: text
    content: 'There is one body and one Spirit, just as you were called to one hope when you were called; '
  '5':
  - type: text
    content: 'one Lord, one faith, one baptism; '
  '6':
  - type: text
    content: one God and Father of all, who is over all and through all and in all.
  '7':
  - type: text
    content: 'But to each one of us grace has been given as Christ apportioned it. '
  '8':
  - type: text
    content: This is why it
  - type: note
    content: Or God
  - type: text
    content: ' says:'
  - type: text
    content: “When he ascended on high,
  - type: text
    content: he took many captives
  - type: text
    content: and gave gifts to his people.”
  - type: note
    content: Psalm 68:18
  '9':
  - type: text
    content: (What does “he ascended” mean except that he also descended to the lower, earthly regions
  - type: note
    content: Or the depths of the earth
  - type: text
    content: '? '
