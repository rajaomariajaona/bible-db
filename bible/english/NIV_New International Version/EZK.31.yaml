document_id: EZK.31
type_code: eng
segments:
- type: usfm
  marker: s2
  children:
  - type: text
    text: Pharaoh as a Felled Cedar of Lebanon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the eleventh year, in the third month on the first day, the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came to me: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Son of man, say to Pharaoh king of Egypt and to his hordes:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘Who can be compared with you in majesty?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Consider Assyria, once a cedar in Lebanon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with beautiful branches overshadowing the forest;
- type: usfm
  marker: q1
  children:
  - type: text
    text: it towered on high,
- type: usfm
  marker: q2
  children:
  - type: text
    text: its top above the thick foliage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The waters nourished it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: deep springs made it grow tall;
- type: usfm
  marker: q1
  children:
  - type: text
    text: their streams flowed
- type: usfm
  marker: q2
  children:
  - type: text
    text: all around its base
- type: usfm
  marker: q1
  children:
  - type: text
    text: and sent their channels
- type: usfm
  marker: q2
  children:
  - type: text
    text: to all the trees of the field.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So it towered higher
- type: usfm
  marker: q2
  children:
  - type: text
    text: than all the trees of the field;
- type: usfm
  marker: q1
  children:
  - type: text
    text: its boughs increased
- type: usfm
  marker: q2
  children:
  - type: text
    text: and its branches grew long,
- type: usfm
  marker: q2
  children:
  - type: text
    text: spreading because of abundant waters.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: All the birds of the sky
- type: usfm
  marker: q2
  children:
  - type: text
    text: nested in its boughs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: all the animals of the wild
- type: usfm
  marker: q2
  children:
  - type: text
    text: gave birth under its branches;
- type: usfm
  marker: q1
  children:
  - type: text
    text: all the great nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: lived in its shade.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: It was majestic in beauty,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with its spreading boughs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for its roots went down
- type: usfm
  marker: q2
  children:
  - type: text
    text: to abundant waters.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The cedars in the garden of God
- type: usfm
  marker: q2
  children:
  - type: text
    text: could not rival it,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nor could the junipers
- type: usfm
  marker: q2
  children:
  - type: text
    text: equal its boughs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nor could the plane trees
- type: usfm
  marker: q2
  children:
  - type: text
    text: compare with its branches—
- type: usfm
  marker: q1
  children:
  - type: text
    text: no tree in the garden of God
- type: usfm
  marker: q2
  children:
  - type: text
    text: could match its beauty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: I made it beautiful
- type: usfm
  marker: q2
  children:
  - type: text
    text: with abundant branches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the envy of all the trees of Eden
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the garden of God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“ ‘Therefore this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Because the great cedar towered over the thick foliage, and because it was proud of its height, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I gave it into the hands of the ruler of the nations, for him to deal with according to its wickedness. I cast it aside, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'and the most ruthless of foreign nations cut it down and left it. Its boughs fell on the mountains and in all the valleys; its branches lay broken in all the ravines of the land. All the nations of the earth came out from under its shade and left it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'All the birds settled on the fallen tree, and all the wild animals lived among its branches. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Therefore no other trees by the waters are ever to tower proudly on high, lifting their tops above the thick foliage. No other trees so well-watered are ever to reach such a height; they are all destined for death, for the earth below, among mortals who go down to the realm of the dead.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“ ‘This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: On the day it was brought down to the realm of the dead I covered the deep springs with mourning for it; I held back its streams, and its abundant waters were restrained. Because of it I clothed Lebanon with gloom, and all the trees of the field withered away. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I made the nations tremble at the sound of its fall when I brought it down to the realm of the dead to be with those who go down to the pit. Then all the trees of Eden, the choicest and best of Lebanon, the well-watered trees, were consoled in the earth below. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: They too, like the great cedar, had gone down to the realm of the dead, to those killed by the sword, along with the armed men who lived in its shade among the nations.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “ ‘Which of the trees of Eden can be compared with you in splendor and majesty? Yet you, too, will be brought down with the trees of Eden to the earth below; you will lie among the uncircumcised, with those killed by the sword.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“ ‘This is Pharaoh and all his hordes, declares the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .’ ”
