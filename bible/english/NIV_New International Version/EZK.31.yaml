document_id: EZK.31,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Pharaoh as a Felled Cedar of Lebanon
  - type: text
    content: 'In the eleventh year, in the third month on the first day, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: '“ ‘Therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Because the great cedar towered over the thick foliage, and because it was proud of its height, '
  '11':
  - type: text
    content: 'I gave it into the hands of the ruler of the nations, for him to deal with according to its wickedness. I cast it aside, '
  '12':
  - type: text
    content: 'and the most ruthless of foreign nations cut it down and left it. Its boughs fell on the mountains and in all the valleys; its branches lay broken in all the ravines of the land. All the nations of the earth came out from under its shade and left it. '
  '13':
  - type: text
    content: 'All the birds settled on the fallen tree, and all the wild animals lived among its branches. '
  '14':
  - type: text
    content: Therefore no other trees by the waters are ever to tower proudly on high, lifting their tops above the thick foliage. No other trees so well-watered are ever to reach such a height; they are all destined for death, for the earth below, among mortals who go down to the realm of the dead.
  '15':
  - type: text
    content: '“ ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: On the day it was brought down to the realm of the dead I covered the deep springs with mourning for it; I held back its streams, and its abundant waters were restrained. Because of it I clothed Lebanon with gloom, and all the trees of the field withered away. '
  '16':
  - type: text
    content: 'I made the nations tremble at the sound of its fall when I brought it down to the realm of the dead to be with those who go down to the pit. Then all the trees of Eden, the choicest and best of Lebanon, the well-watered trees, were consoled in the earth below. '
  '17':
  - type: text
    content: They too, like the great cedar, had gone down to the realm of the dead, to those killed by the sword, along with the armed men who lived in its shade among the nations.
  '18':
  - type: text
    content: “ ‘Which of the trees of Eden can be compared with you in splendor and majesty? Yet you, too, will be brought down with the trees of Eden to the earth below; you will lie among the uncircumcised, with those killed by the sword.
  - type: text
    content: '“ ‘This is Pharaoh and all his hordes, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  '2':
  - type: text
    content: '“Son of man, say to Pharaoh king of Egypt and to his hordes:'
  - type: text
    content: “ ‘Who can be compared with you in majesty?
  '3':
  - type: text
    content: Consider Assyria, once a cedar in Lebanon,
  - type: text
    content: with beautiful branches overshadowing the forest;
  - type: text
    content: it towered on high,
  - type: text
    content: its top above the thick foliage.
  '4':
  - type: text
    content: The waters nourished it,
  - type: text
    content: deep springs made it grow tall;
  - type: text
    content: their streams flowed
  - type: text
    content: all around its base
  - type: text
    content: and sent their channels
  - type: text
    content: to all the trees of the field.
  '5':
  - type: text
    content: So it towered higher
  - type: text
    content: than all the trees of the field;
  - type: text
    content: its boughs increased
  - type: text
    content: and its branches grew long,
  - type: text
    content: spreading because of abundant waters.
  '6':
  - type: text
    content: All the birds of the sky
  - type: text
    content: nested in its boughs,
  - type: text
    content: all the animals of the wild
  - type: text
    content: gave birth under its branches;
  - type: text
    content: all the great nations
  - type: text
    content: lived in its shade.
  '7':
  - type: text
    content: It was majestic in beauty,
  - type: text
    content: with its spreading boughs,
  - type: text
    content: for its roots went down
  - type: text
    content: to abundant waters.
  '8':
  - type: text
    content: The cedars in the garden of God
  - type: text
    content: could not rival it,
  - type: text
    content: nor could the junipers
  - type: text
    content: equal its boughs,
  - type: text
    content: nor could the plane trees
  - type: text
    content: compare with its branches—
  - type: text
    content: no tree in the garden of God
  - type: text
    content: could match its beauty.
  '9':
  - type: text
    content: I made it beautiful
  - type: text
    content: with abundant branches,
  - type: text
    content: the envy of all the trees of Eden
  - type: text
    content: in the garden of God.
