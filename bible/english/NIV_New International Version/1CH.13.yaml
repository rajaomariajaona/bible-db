document_id: 1CH.13,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Bringing Back the Ark
  - type: text
    content: 'David conferred with each of his officers, the commanders of thousands and commanders of hundreds. '
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ’s anger burned against Uzzah, and he struck him down because he had put his hand on the ark. So he died there before God.
  '11':
  - type: text
    content: 'Then David was angry because the '
  - type: text
    content: Lord
  - type: text
    content: ’s wrath had broken out against Uzzah, and to this day that place is called Perez Uzzah.
  - type: note
    content: Perez Uzzah means outbreak against Uzzah.
  '12':
  - type: text
    content: 'David was afraid of God that day and asked, “How can I ever bring the ark of God to me?” '
  '13':
  - type: text
    content: 'He did not take the ark to be with him in the City of David. Instead, he took it to the house of Obed-Edom the Gittite. '
  '14':
  - type: text
    content: 'The ark of God remained with the family of Obed-Edom in his house for three months, and the '
  - type: text
    content: Lord
  - type: text
    content: ' blessed his household and everything he had.'
  '2':
  - type: text
    content: 'He then said to the whole assembly of Israel, “If it seems good to you and if it is the will of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, let us send word far and wide to the rest of our people throughout the territories of Israel, and also to the priests and Levites who are with them in their towns and pasturelands, to come and join us. '
  '3':
  - type: text
    content: Let us bring the ark of our God back to us, for we did not inquire of
  - type: note
    content: Or we neglected
  - type: text
    content: ' it'
  - type: note
    content: Or him
  - type: text
    content: ' during the reign of Saul.” '
  '4':
  - type: text
    content: The whole assembly agreed to do this, because it seemed right to all the people.
  '5':
  - type: text
    content: 'So David assembled all Israel, from the Shihor River in Egypt to Lebo Hamath, to bring the ark of God from Kiriath Jearim. '
  '6':
  - type: text
    content: 'David and all Israel went to Baalah of Judah (Kiriath Jearim) to bring up from there the ark of God the '
  - type: text
    content: Lord
  - type: text
    content: ', who is enthroned between the cherubim—the ark that is called by the Name.'
  '7':
  - type: text
    content: 'They moved the ark of God from Abinadab’s house on a new cart, with Uzzah and Ahio guiding it. '
  '8':
  - type: text
    content: David and all the Israelites were celebrating with all their might before God, with songs and with harps, lyres, timbrels, cymbals and trumpets.
  '9':
  - type: text
    content: 'When they came to the threshing floor of Kidon, Uzzah reached out his hand to steady the ark, because the oxen stumbled. '
