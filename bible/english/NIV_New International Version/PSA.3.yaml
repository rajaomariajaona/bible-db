document_id: PSA.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 3In Hebrew texts 3:1-8 is numbered 3:2-9.
  - type: text
    content: A psalm of David. When he fled from his son Absalom.
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', how many are my foes!'
  - type: text
    content: How many rise up against me!
  '2':
  - type: text
    content: Many are saying of me,
  - type: text
    content: “God will not deliver him.”
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here and at the end of verses 4 and 8.
  '3':
  - type: text
    content: 'But you, '
  - type: text
    content: Lord
  - type: text
    content: ', are a shield around me,'
  - type: text
    content: my glory, the One who lifts my head high.
  '4':
  - type: text
    content: 'I call out to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and he answers me from his holy mountain.
  '5':
  - type: text
    content: I lie down and sleep;
  - type: text
    content: 'I wake again, because the '
  - type: text
    content: Lord
  - type: text
    content: ' sustains me.'
  '6':
  - type: text
    content: I will not fear though tens of thousands
  - type: text
    content: assail me on every side.
  '7':
  - type: text
    content: 'Arise, '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: Deliver me, my God!
  - type: text
    content: Strike all my enemies on the jaw;
  - type: text
    content: break the teeth of the wicked.
  '8':
  - type: text
    content: 'From the '
  - type: text
    content: Lord
  - type: text
    content: ' comes deliverance.'
  - type: text
    content: May your blessing be on your people.
