document_id: ZEP.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Judah and Jerusalem Judged Along With the Nations
  - type: heading
    content: Judah Summoned to Repent
  - type: text
    content: Gather together, gather yourselves together,
  - type: text
    content: you shameful nation,
  '10':
  - type: text
    content: This is what they will get in return for their pride,
  - type: text
    content: for insulting and mocking
  - type: text
    content: 'the people of the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will be awesome to them'
  - type: text
    content: when he destroys all the gods of the earth.
  - type: text
    content: Distant nations will bow down to him,
  - type: text
    content: all of them in their own lands.
  - type: heading
    content: Cush
  '12':
  - type: text
    content: “You Cushites,
  - type: note
    content: That is, people from the upper Nile region
  - type: text
    content: ' too,'
  - type: text
    content: will be slain by my sword.”
  - type: heading
    content: Assyria
  '13':
  - type: text
    content: He will stretch out his hand against the north
  - type: text
    content: and destroy Assyria,
  - type: text
    content: leaving Nineveh utterly desolate
  - type: text
    content: and dry as the desert.
  '14':
  - type: text
    content: Flocks and herds will lie down there,
  - type: text
    content: creatures of every kind.
  - type: text
    content: The desert owl and the screech owl
  - type: text
    content: will roost on her columns.
  - type: text
    content: Their hooting will echo through the windows,
  - type: text
    content: rubble will fill the doorways,
  - type: text
    content: the beams of cedar will be exposed.
  '15':
  - type: text
    content: This is the city of revelry
  - type: text
    content: that lived in safety.
  - type: text
    content: She said to herself,
  - type: text
    content: “I am the one! And there is none besides me.”
  - type: text
    content: What a ruin she has become,
  - type: text
    content: a lair for wild beasts!
  - type: text
    content: All who pass by her scoff
  - type: text
    content: and shake their fists.
  '2':
  - type: text
    content: before the decree takes effect
  - type: text
    content: and that day passes like windblown chaff,
  - type: text
    content: 'before the '
  - type: text
    content: Lord
  - type: text
    content: ’s fierce anger
  - type: text
    content: comes upon you,
  - type: text
    content: 'before the day of the '
  - type: text
    content: Lord
  - type: text
    content: ’s wrath
  - type: text
    content: comes upon you.
  '3':
  - type: text
    content: 'Seek the '
  - type: text
    content: Lord
  - type: text
    content: ', all you humble of the land,'
  - type: text
    content: you who do what he commands.
  - type: text
    content: Seek righteousness, seek humility;
  - type: text
    content: perhaps you will be sheltered
  - type: text
    content: 'on the day of the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger.
  - type: heading
    content: Philistia
  '4':
  - type: text
    content: Gaza will be abandoned
  - type: text
    content: and Ashkelon left in ruins.
  - type: text
    content: At midday Ashdod will be emptied
  - type: text
    content: and Ekron uprooted.
  '5':
  - type: text
    content: Woe to you who live by the sea,
  - type: text
    content: you Kerethite people;
  - type: text
    content: 'the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' is against you,'
  - type: text
    content: Canaan, land of the Philistines.
  - type: text
    content: He says, “I will destroy you,
  - type: text
    content: and none will be left.”
  '6':
  - type: text
    content: The land by the sea will become pastures
  - type: text
    content: having wells for shepherds
  - type: text
    content: and pens for flocks.
  '7':
  - type: text
    content: That land will belong
  - type: text
    content: to the remnant of the people of Judah;
  - type: text
    content: there they will find pasture.
  - type: text
    content: In the evening they will lie down
  - type: text
    content: in the houses of Ashkelon.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' their God will care for them;'
  - type: text
    content: he will restore their fortunes.
  - type: note
    content: Or will bring back their captives
  - type: heading
    content: Moab and Ammon
  '8':
  - type: text
    content: “I have heard the insults of Moab
  - type: text
    content: and the taunts of the Ammonites,
  - type: text
    content: who insulted my people
  - type: text
    content: and made threats against their land.
  '9':
  - type: text
    content: Therefore, as surely as I live,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty,'
  - type: text
    content: the God of Israel,
  - type: text
    content: “surely Moab will become like Sodom,
  - type: text
    content: the Ammonites like Gomorrah—
  - type: text
    content: a place of weeds and salt pits,
  - type: text
    content: a wasteland forever.
  - type: text
    content: The remnant of my people will plunder them;
  - type: text
    content: the survivors of my nation will inherit their land.”
