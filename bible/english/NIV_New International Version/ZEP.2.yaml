document_id: ZEP.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judah and Jerusalem Judged Along With the Nations
  marker-yv: yv-h
- type: usfm
  marker: s2
  children:
  - type: text
    text: Judah Summoned to Repent
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Gather together, gather yourselves together,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you shameful nation,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: before the decree takes effect
- type: usfm
  marker: q2
  children:
  - type: text
    text: and that day passes like windblown chaff,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s fierce anger
- type: usfm
  marker: q2
  children:
  - type: text
    text: comes upon you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'before the day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s wrath
- type: usfm
  marker: q2
  children:
  - type: text
    text: comes upon you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', all you humble of the land,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who do what he commands.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Seek righteousness, seek humility;
- type: usfm
  marker: q2
  children:
  - type: text
    text: perhaps you will be sheltered
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'on the day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s anger.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Philistia
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Gaza will be abandoned
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Ashkelon left in ruins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: At midday Ashdod will be emptied
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Ekron uprooted.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Woe to you who live by the sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you Kerethite people;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is against you,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Canaan, land of the Philistines.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He says, “I will destroy you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and none will be left.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The land by the sea will become pastures
- type: usfm
  marker: q2
  children:
  - type: text
    text: having wells for shepherds
- type: usfm
  marker: q2
  children:
  - type: text
    text: and pens for flocks.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: That land will belong
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the remnant of the people of Judah;
- type: usfm
  marker: q2
  children:
  - type: text
    text: there they will find pasture.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the evening they will lie down
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the houses of Ashkelon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' their God will care for them;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will restore their fortunes.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: will bring back their captives
    marker-yv: yv-n
- type: usfm
  marker: s2
  children:
  - type: text
    text: Moab and Ammon
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “I have heard the insults of Moab
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the taunts of the Ammonites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who insulted my people
- type: usfm
  marker: q2
  children:
  - type: text
    text: and made threats against their land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Therefore, as surely as I live,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the God of Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “surely Moab will become like Sodom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Ammonites like Gomorrah—
- type: usfm
  marker: q1
  children:
  - type: text
    text: a place of weeds and salt pits,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a wasteland forever.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The remnant of my people will plunder them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the survivors of my nation will inherit their land.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: This is what they will get in return for their pride,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for insulting and mocking
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the people of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will be awesome to them'
- type: usfm
  marker: q2
  children:
  - type: text
    text: when he destroys all the gods of the earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Distant nations will bow down to him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all of them in their own lands.
- type: usfm
  marker: s2
  children:
  - type: text
    text: Cush
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “You Cushites,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, people from the upper Nile region
    marker-yv: yv-n
  - type: text
    text: ' too,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be slain by my sword.”
- type: usfm
  marker: s2
  children:
  - type: text
    text: Assyria
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He will stretch out his hand against the north
- type: usfm
  marker: q2
  children:
  - type: text
    text: and destroy Assyria,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leaving Nineveh utterly desolate
- type: usfm
  marker: q2
  children:
  - type: text
    text: and dry as the desert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Flocks and herds will lie down there,
- type: usfm
  marker: q2
  children:
  - type: text
    text: creatures of every kind.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The desert owl and the screech owl
- type: usfm
  marker: q2
  children:
  - type: text
    text: will roost on her columns.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their hooting will echo through the windows,
- type: usfm
  marker: q2
  children:
  - type: text
    text: rubble will fill the doorways,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the beams of cedar will be exposed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: This is the city of revelry
- type: usfm
  marker: q2
  children:
  - type: text
    text: that lived in safety.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She said to herself,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “I am the one! And there is none besides me.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: What a ruin she has become,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a lair for wild beasts!
- type: usfm
  marker: q1
  children:
  - type: text
    text: All who pass by her scoff
- type: usfm
  marker: q2
  children:
  - type: text
    text: and shake their fists.
