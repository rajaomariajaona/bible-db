document_id: EZK.35,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Prophecy Against Edom
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to me: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘Because you have said, “These two nations and countries will be ours and we will take possession of them,” even though I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was there, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'therefore as surely as I live, declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I will treat you in accordance with the anger and jealousy you showed in your hatred of them and I will make myself known among them when I judge you. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then you will know that I the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' have heard all the contemptible things you have said against the mountains of Israel. You said, “They have been laid waste and have been given over to us to devour.” '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You boasted against me and spoke against me without restraint, and I heard it. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: While the whole earth rejoices, I will make you desolate. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because you rejoiced when the inheritance of Israel became desolate, that is how I will treat you. You will be desolate, Mount Seir, you and all of Edom. Then they will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .’ ”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Son of man, set your face against Mount Seir; prophesy against it '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and say: ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: I am against you, Mount Seir, and I will stretch out my hand against you and make you a desolate waste. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will turn your towns into ruins and you will be desolate. Then you will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘Because you harbored an ancient hostility and delivered the Israelites over to the sword at the time of their calamity, the time their punishment reached its climax, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'therefore as surely as I live, declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I will give you over to bloodshed and it will pursue you. Since you did not hate bloodshed, bloodshed will pursue you. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will make Mount Seir a desolate waste and cut off from it all who come and go. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will fill your mountains with the slain; those killed by the sword will fall on your hills and in your valleys and in all your ravines. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will make you desolate forever; your towns will not be inhabited. Then you will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
