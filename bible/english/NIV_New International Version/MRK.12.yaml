document_id: MRK.12,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Parable of the Tenants
  - type: text
    content: 'Jesus then began to speak to them in parables: '
  - type: text
    content: “A man planted a vineyard. He put a wall around it, dug a pit for the winepress and built a watchtower. Then he rented the vineyard to some farmers and moved to another place.
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Haven’t you read this passage of Scripture:'
  - type: text
    content: “ ‘The stone the builders rejected
  - type: text
    content: has become the cornerstone;
  '11':
  - type: text
    content: ' '
  - type: text
    content: the Lord has done this,
  - type: text
    content: and it is marvelous in our eyes’
  - type: text
    content: ' '
  - type: note
    content: Psalm 118:22,23
  - type: text
    content: ?”
  '12':
  - type: text
    content: Then the chief priests, the teachers of the law and the elders looked for a way to arrest him because they knew he had spoken the parable against them. But they were afraid of the crowd; so they left him and went away.
  - type: heading
    content: Paying the Imperial Tax to Caesar
  '13':
  - type: text
    content: 'Later they sent some of the Pharisees and Herodians to Jesus to catch him in his words. '
  '14':
  - type: text
    content: They came to him and said, “Teacher, we know that you are a man of integrity. You aren’t swayed by others, because you pay no attention to who they are; but you teach the way of God in accordance with the truth. Is it right to pay the imperial tax
  - type: note
    content: A special tax levied on subject peoples, not on Roman citizens
  - type: text
    content: ' to Caesar or not? '
  '15':
  - type: text
    content: Should we pay or shouldn’t we?”
  - type: text
    content: 'But Jesus knew their hypocrisy. '
  - type: text
    content: “Why are you trying to trap me?”
  - type: text
    content: ' he asked. '
  - type: text
    content: “Bring me a denarius and let me look at it.”
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'They brought the coin, and he asked them, '
  - type: text
    content: “Whose image is this? And whose inscription?”
  - type: text
    content: “Caesar’s,” they replied.
  '17':
  - type: text
    content: 'Then Jesus said to them, '
  - type: text
    content: “Give back to Caesar what is Caesar’s and to God what is God’s.”
  - type: text
    content: And they were amazed at him.
  - type: heading
    content: Marriage at the Resurrection
  '18':
  - type: text
    content: 'Then the Sadducees, who say there is no resurrection, came to him with a question. '
  '19':
  - type: text
    content: '“Teacher,” they said, “Moses wrote for us that if a man’s brother dies and leaves a wife but no children, the man must marry the widow and raise up offspring for his brother. '
  '2':
  - type: text
    content: At harvest time he sent a servant to the tenants to collect from them some of the fruit of the vineyard.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'Now there were seven brothers. The first one married and died without leaving any children. '
  '21':
  - type: text
    content: 'The second one married the widow, but he also died, leaving no child. It was the same with the third. '
  '22':
  - type: text
    content: 'In fact, none of the seven left any children. Last of all, the woman died too. '
  '23':
  - type: text
    content: At the resurrection
  - type: note
    content: Some manuscripts resurrection, when people rise from the dead,
  - type: text
    content: ' whose wife will she be, since the seven were married to her?”'
  '24':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Are you not in error because you do not know the Scriptures or the power of God?
  - type: text
    content: ' '
  '25':
  - type: text
    content: When the dead rise, they will neither marry nor be given in marriage; they will be like the angels in heaven.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Now about the dead rising—have you not read in the Book of Moses, in the account of the burning bush, how God said to him, ‘I am the God of Abraham, the God of Isaac, and the God of Jacob’
  - type: note
    content: Exodus 3:6
  - type: text
    content: '?'
  - type: text
    content: ' '
  '27':
  - type: text
    content: He is not the God of the dead, but of the living. You are badly mistaken!”
  - type: heading
    content: The Greatest Commandment
  '28':
  - type: text
    content: One of the teachers of the law came and heard them debating. Noticing that Jesus had given them a good answer, he asked him, “Of all the commandments, which is the most important?”
  '29':
  - type: text
    content: ' '
  - type: text
    content: “The most important one,”
  - type: text
    content: ' answered Jesus, '
  - type: text
    content: '“is this: ‘Hear, O Israel: The Lord our God, the Lord is one.'
  - type: note
    content: Or The Lord our God is one Lord
  - type: text
    content: ' '
  '3':
  - type: text
    content: But they seized him, beat him and sent him away empty-handed.
  - type: text
    content: ' '
  '30':
  - type: text
    content: Love the Lord your God with all your heart and with all your soul and with all your mind and with all your strength.’
  - type: note
    content: Deut. 6:4,5
  - type: text
    content: ' '
  '31':
  - type: text
    content: 'The second is this: ‘Love your neighbor as yourself.’'
  - type: note
    content: Lev. 19:18
  - type: text
    content: ' '
  - type: text
    content: There is no commandment greater than these.”
  '32':
  - type: text
    content: '“Well said, teacher,” the man replied. “You are right in saying that God is one and there is no other but him. '
  '33':
  - type: text
    content: To love him with all your heart, with all your understanding and with all your strength, and to love your neighbor as yourself is more important than all burnt offerings and sacrifices.”
  '34':
  - type: text
    content: 'When Jesus saw that he had answered wisely, he said to him, '
  - type: text
    content: “You are not far from the kingdom of God.”
  - type: text
    content: ' And from then on no one dared ask him any more questions.'
  - type: heading
    content: Whose Son Is the Messiah?
  '35':
  - type: text
    content: 'While Jesus was teaching in the temple courts, he asked, '
  - type: text
    content: “Why do the teachers of the law say that the Messiah is the son of David?
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'David himself, speaking by the Holy Spirit, declared:'
  - type: text
    content: '“ ‘The Lord said to my Lord:'
  - type: text
    content: “Sit at my right hand
  - type: text
    content: until I put your enemies
  - type: text
    content: under your feet.” ’
  - type: note
    content: Psalm 110:1
  '37':
  - type: text
    content: ' '
  - type: text
    content: David himself calls him ‘Lord.’ How then can he be his son?”
  - type: text
    content: The large crowd listened to him with delight.
  - type: heading
    content: Warning Against the Teachers of the Law
  '38':
  - type: text
    content: 'As he taught, Jesus said, '
  - type: text
    content: “Watch out for the teachers of the law. They like to walk around in flowing robes and be greeted with respect in the marketplaces,
  - type: text
    content: ' '
  '39':
  - type: text
    content: and have the most important seats in the synagogues and the places of honor at banquets.
  - type: text
    content: ' '
  '4':
  - type: text
    content: Then he sent another servant to them; they struck this man on the head and treated him shamefully.
  - type: text
    content: ' '
  '40':
  - type: text
    content: They devour widows’ houses and for a show make lengthy prayers. These men will be punished most severely.”
  - type: heading
    content: The Widow’s Offering
  '41':
  - type: text
    content: 'Jesus sat down opposite the place where the offerings were put and watched the crowd putting their money into the temple treasury. Many rich people threw in large amounts. '
  '42':
  - type: text
    content: But a poor widow came and put in two very small copper coins, worth only a few cents.
  '43':
  - type: text
    content: 'Calling his disciples to him, Jesus said, '
  - type: text
    content: “Truly I tell you, this poor widow has put more into the treasury than all the others.
  - type: text
    content: ' '
  '44':
  - type: text
    content: They all gave out of their wealth; but she, out of her poverty, put in everything—all she had to live on.”
  '5':
  - type: text
    content: He sent still another, and that one they killed. He sent many others; some of them they beat, others they killed.
  '6':
  - type: text
    content: ' '
  - type: text
    content: “He had one left to send, a son, whom he loved. He sent him last of all, saying, ‘They will respect my son.’
  '7':
  - type: text
    content: ' '
  - type: text
    content: “But the tenants said to one another, ‘This is the heir. Come, let’s kill him, and the inheritance will be ours.’
  - type: text
    content: ' '
  '8':
  - type: text
    content: So they took him and killed him, and threw him out of the vineyard.
  '9':
  - type: text
    content: ' '
  - type: text
    content: “What then will the owner of the vineyard do? He will come and kill those tenants and give the vineyard to others.
  - type: text
    content: ' '
