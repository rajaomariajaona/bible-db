document_id: PSA.79
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 79
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A psalm of Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: O God, the nations have invaded your inheritance;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they have defiled your holy temple,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they have reduced Jerusalem to rubble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: They have left the dead bodies of your servants
- type: usfm
  marker: q2
  children:
  - type: text
    text: as food for the birds of the sky,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the flesh of your own people for the animals of the wild.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: They have poured out blood like water
- type: usfm
  marker: q2
  children:
  - type: text
    text: all around Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and there is no one to bury the dead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: We are objects of contempt to our neighbors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: of scorn and derision to those around us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'How long, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '? Will you be angry forever?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: How long will your jealousy burn like fire?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Pour out your wrath on the nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: that do not acknowledge you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on the kingdoms
- type: usfm
  marker: q2
  children:
  - type: text
    text: that do not call on your name;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: for they have devoured Jacob
- type: usfm
  marker: q2
  children:
  - type: text
    text: and devastated his homeland.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Do not hold against us the sins of past generations;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may your mercy come quickly to meet us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for we are in desperate need.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Help us, God our Savior,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the glory of your name;
- type: usfm
  marker: q1
  children:
  - type: text
    text: deliver us and forgive our sins
- type: usfm
  marker: q2
  children:
  - type: text
    text: for your name’s sake.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Why should the nations say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Where is their God?”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Before our eyes, make known among the nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: that you avenge the outpoured blood of your servants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: May the groans of the prisoners come before you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: with your strong arm preserve those condemned to die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Pay back into the laps of our neighbors seven times
- type: usfm
  marker: q2
  children:
  - type: text
    text: the contempt they have hurled at you, Lord.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then we your people, the sheep of your pasture,
- type: usfm
  marker: q2
  children:
  - type: text
    text: will praise you forever;
- type: usfm
  marker: q1
  children:
  - type: text
    text: from generation to generation
- type: usfm
  marker: q2
  children:
  - type: text
    text: we will proclaim your praise.
