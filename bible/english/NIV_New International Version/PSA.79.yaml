document_id: PSA.79,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 79
  - type: text
    content: A psalm of Asaph.
  - type: text
    content: O God, the nations have invaded your inheritance;
  - type: text
    content: they have defiled your holy temple,
  - type: text
    content: they have reduced Jerusalem to rubble.
  '10':
  - type: text
    content: Why should the nations say,
  - type: text
    content: “Where is their God?”
  - type: text
    content: Before our eyes, make known among the nations
  - type: text
    content: that you avenge the outpoured blood of your servants.
  '11':
  - type: text
    content: May the groans of the prisoners come before you;
  - type: text
    content: with your strong arm preserve those condemned to die.
  '12':
  - type: text
    content: Pay back into the laps of our neighbors seven times
  - type: text
    content: the contempt they have hurled at you, Lord.
  '13':
  - type: text
    content: Then we your people, the sheep of your pasture,
  - type: text
    content: will praise you forever;
  - type: text
    content: from generation to generation
  - type: text
    content: we will proclaim your praise.
  '2':
  - type: text
    content: They have left the dead bodies of your servants
  - type: text
    content: as food for the birds of the sky,
  - type: text
    content: the flesh of your own people for the animals of the wild.
  '3':
  - type: text
    content: They have poured out blood like water
  - type: text
    content: all around Jerusalem,
  - type: text
    content: and there is no one to bury the dead.
  '4':
  - type: text
    content: We are objects of contempt to our neighbors,
  - type: text
    content: of scorn and derision to those around us.
  '5':
  - type: text
    content: 'How long, '
  - type: text
    content: Lord
  - type: text
    content: '? Will you be angry forever?'
  - type: text
    content: How long will your jealousy burn like fire?
  '6':
  - type: text
    content: Pour out your wrath on the nations
  - type: text
    content: that do not acknowledge you,
  - type: text
    content: on the kingdoms
  - type: text
    content: that do not call on your name;
  '7':
  - type: text
    content: for they have devoured Jacob
  - type: text
    content: and devastated his homeland.
  '8':
  - type: text
    content: Do not hold against us the sins of past generations;
  - type: text
    content: may your mercy come quickly to meet us,
  - type: text
    content: for we are in desperate need.
  '9':
  - type: text
    content: Help us, God our Savior,
  - type: text
    content: for the glory of your name;
  - type: text
    content: deliver us and forgive our sins
  - type: text
    content: for your name’s sake.
