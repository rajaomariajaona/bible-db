document_id: PSA.79,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 79
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm of Asaph.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O God, the nations have invaded your inheritance;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they have defiled your holy temple,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they have reduced Jerusalem to rubble.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why should the nations say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Where is their God?”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before our eyes, make known among the nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you avenge the outpoured blood of your servants.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the groans of the prisoners come before you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with your strong arm preserve those condemned to die.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pay back into the laps of our neighbors seven times
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the contempt they have hurled at you, Lord.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then we your people, the sheep of your pasture,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will praise you forever;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from generation to generation
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we will proclaim your praise.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have left the dead bodies of your servants
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as food for the birds of the sky,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the flesh of your own people for the animals of the wild.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have poured out blood like water
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all around Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there is no one to bury the dead.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We are objects of contempt to our neighbors,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of scorn and derision to those around us.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'How long, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '? Will you be angry forever?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long will your jealousy burn like fire?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour out your wrath on the nations
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that do not acknowledge you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on the kingdoms
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that do not call on your name;
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they have devoured Jacob
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and devastated his homeland.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not hold against us the sins of past generations;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may your mercy come quickly to meet us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for we are in desperate need.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Help us, God our Savior,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the glory of your name;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: deliver us and forgive our sins
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for your name’s sake.
