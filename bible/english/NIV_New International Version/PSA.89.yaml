verses:
  '1':
  - type: heading
    content: Psalm 89In Hebrew texts 89:1-52 is numbered 89:2-53.
  - type: text
    content: 'A '
  - type: text
    content: maskil
  - type: note
    content: 'Title: Probably a literary or musical term'
  - type: text
    content: ' of Ethan the Ezrahite.'
  - type: text
    content: 'I will sing of the '
  - type: text
    content: Lord
  - type: text
    content: ’s great love forever;
  - type: text
    content: with my mouth I will make your faithfulness known
  - type: text
    content: through all generations.
  '10':
  - type: text
    content: You crushed Rahab like one of the slain;
  - type: text
    content: with your strong arm you scattered your enemies.
  '11':
  - type: text
    content: The heavens are yours, and yours also the earth;
  - type: text
    content: you founded the world and all that is in it.
  '12':
  - type: text
    content: You created the north and the south;
  - type: text
    content: Tabor and Hermon sing for joy at your name.
  '13':
  - type: text
    content: Your arm is endowed with power;
  - type: text
    content: your hand is strong, your right hand exalted.
  '14':
  - type: text
    content: Righteousness and justice are the foundation of your throne;
  - type: text
    content: love and faithfulness go before you.
  '15':
  - type: text
    content: Blessed are those who have learned to acclaim you,
  - type: text
    content: 'who walk in the light of your presence, '
  - type: text
    content: Lord
  - type: text
    content: .
  '16':
  - type: text
    content: They rejoice in your name all day long;
  - type: text
    content: they celebrate your righteousness.
  '17':
  - type: text
    content: For you are their glory and strength,
  - type: text
    content: and by your favor you exalt our horn.
  - type: note
    content: Horn here symbolizes strong one.
  '18':
  - type: text
    content: Indeed, our shield
  - type: note
    content: Or sovereign
  - type: text
    content: ' belongs to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: our king to the Holy One of Israel.
  '19':
  - type: text
    content: Once you spoke in a vision,
  - type: text
    content: 'to your faithful people you said:'
  - type: text
    content: “I have bestowed strength on a warrior;
  - type: text
    content: I have raised up a young man from among the people.
  '2':
  - type: text
    content: I will declare that your love stands firm forever,
  - type: text
    content: that you have established your faithfulness in heaven itself.
  '20':
  - type: text
    content: I have found David my servant;
  - type: text
    content: with my sacred oil I have anointed him.
  '21':
  - type: text
    content: My hand will sustain him;
  - type: text
    content: surely my arm will strengthen him.
  '22':
  - type: text
    content: The enemy will not get the better of him;
  - type: text
    content: the wicked will not oppress him.
  '23':
  - type: text
    content: I will crush his foes before him
  - type: text
    content: and strike down his adversaries.
  '24':
  - type: text
    content: My faithful love will be with him,
  - type: text
    content: and through my name his horn
  - type: note
    content: Horn here symbolizes strength.
  - type: text
    content: ' will be exalted.'
  '25':
  - type: text
    content: I will set his hand over the sea,
  - type: text
    content: his right hand over the rivers.
  '26':
  - type: text
    content: He will call out to me, ‘You are my Father,
  - type: text
    content: my God, the Rock my Savior.’
  '27':
  - type: text
    content: And I will appoint him to be my firstborn,
  - type: text
    content: the most exalted of the kings of the earth.
  '28':
  - type: text
    content: I will maintain my love to him forever,
  - type: text
    content: and my covenant with him will never fail.
  '29':
  - type: text
    content: I will establish his line forever,
  - type: text
    content: his throne as long as the heavens endure.
  '3':
  - type: text
    content: You said, “I have made a covenant with my chosen one,
  - type: text
    content: I have sworn to David my servant,
  '30':
  - type: text
    content: “If his sons forsake my law
  - type: text
    content: and do not follow my statutes,
  '31':
  - type: text
    content: if they violate my decrees
  - type: text
    content: and fail to keep my commands,
  '32':
  - type: text
    content: I will punish their sin with the rod,
  - type: text
    content: their iniquity with flogging;
  '33':
  - type: text
    content: but I will not take my love from him,
  - type: text
    content: nor will I ever betray my faithfulness.
  '34':
  - type: text
    content: I will not violate my covenant
  - type: text
    content: or alter what my lips have uttered.
  '35':
  - type: text
    content: Once for all, I have sworn by my holiness—
  - type: text
    content: and I will not lie to David—
  '36':
  - type: text
    content: that his line will continue forever
  - type: text
    content: and his throne endure before me like the sun;
  '37':
  - type: text
    content: it will be established forever like the moon,
  - type: text
    content: the faithful witness in the sky.”
  '38':
  - type: text
    content: But you have rejected, you have spurned,
  - type: text
    content: you have been very angry with your anointed one.
  '39':
  - type: text
    content: You have renounced the covenant with your servant
  - type: text
    content: and have defiled his crown in the dust.
  '4':
  - type: text
    content: ‘I will establish your line forever
  - type: text
    content: and make your throne firm through all generations.’ ”
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here and at the end of verses 37, 45 and 48.
  '40':
  - type: text
    content: You have broken through all his walls
  - type: text
    content: and reduced his strongholds to ruins.
  '41':
  - type: text
    content: All who pass by have plundered him;
  - type: text
    content: he has become the scorn of his neighbors.
  '42':
  - type: text
    content: You have exalted the right hand of his foes;
  - type: text
    content: you have made all his enemies rejoice.
  '43':
  - type: text
    content: Indeed, you have turned back the edge of his sword
  - type: text
    content: and have not supported him in battle.
  '44':
  - type: text
    content: You have put an end to his splendor
  - type: text
    content: and cast his throne to the ground.
  '45':
  - type: text
    content: You have cut short the days of his youth;
  - type: text
    content: you have covered him with a mantle of shame.
  '46':
  - type: text
    content: 'How long, '
  - type: text
    content: Lord
  - type: text
    content: '? Will you hide yourself forever?'
  - type: text
    content: How long will your wrath burn like fire?
  '47':
  - type: text
    content: Remember how fleeting is my life.
  - type: text
    content: For what futility you have created all humanity!
  '48':
  - type: text
    content: Who can live and not see death,
  - type: text
    content: or who can escape the power of the grave?
  '49':
  - type: text
    content: Lord, where is your former great love,
  - type: text
    content: which in your faithfulness you swore to David?
  '5':
  - type: text
    content: 'The heavens praise your wonders, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: your faithfulness too, in the assembly of the holy ones.
  '50':
  - type: text
    content: Remember, Lord, how your servant has
  - type: note
    content: Or your servants have
  - type: text
    content: ' been mocked,'
  - type: text
    content: how I bear in my heart the taunts of all the nations,
  '51':
  - type: text
    content: 'the taunts with which your enemies, '
  - type: text
    content: Lord
  - type: text
    content: ', have mocked,'
  - type: text
    content: with which they have mocked every step of your anointed one.
  '52':
  - type: text
    content: 'Praise be to the '
  - type: text
    content: Lord
  - type: text
    content: ' forever!'
  - type: text
    content: Amen and Amen.
  '6':
  - type: text
    content: 'For who in the skies above can compare with the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: 'Who is like the '
  - type: text
    content: Lord
  - type: text
    content: ' among the heavenly beings?'
  '7':
  - type: text
    content: In the council of the holy ones God is greatly feared;
  - type: text
    content: he is more awesome than all who surround him.
  '8':
  - type: text
    content: 'Who is like you, '
  - type: text
    content: Lord
  - type: text
    content: ' God Almighty?'
  - type: text
    content: 'You, '
  - type: text
    content: Lord
  - type: text
    content: ', are mighty, and your faithfulness surrounds you.'
  '9':
  - type: text
    content: You rule over the surging sea;
  - type: text
    content: when its waves mount up, you still them.
