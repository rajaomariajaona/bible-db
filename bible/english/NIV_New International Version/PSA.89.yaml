document_id: PSA.89,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 89
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 89:1-52 is numbered 89:2-53.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'A '
    - type: usfm
      marker: tl
      children:
      - type: text
        text: maskil
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Title: Probably a literary or musical term'
      marker-yv: yv-n
    - type: text
      text: ' of Ethan the Ezrahite.'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'I will sing of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s great love forever;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with my mouth I will make your faithfulness known
  - type: usfm
    marker: q2
    children:
    - type: text
      text: through all generations.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: You crushed Rahab like one of the slain;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with your strong arm you scattered your enemies.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: The heavens are yours, and yours also the earth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you founded the world and all that is in it.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: You created the north and the south;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Tabor and Hermon sing for joy at your name.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Your arm is endowed with power;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your hand is strong, your right hand exalted.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Righteousness and justice are the foundation of your throne;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: love and faithfulness go before you.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Blessed are those who have learned to acclaim you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'who walk in the light of your presence, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: They rejoice in your name all day long;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they celebrate your righteousness.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: For you are their glory and strength,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and by your favor you exalt our horn.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89:17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Horn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: here symbolizes strong one.
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Indeed, our shield
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sovereign
      marker-yv: yv-n
    - type: text
      text: ' belongs to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: our king to the Holy One of Israel.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Once you spoke in a vision,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'to your faithful people you said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I have bestowed strength on a warrior;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have raised up a young man from among the people.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: I will declare that your love stands firm forever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you have established your faithfulness in heaven itself.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: I have found David my servant;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with my sacred oil I have anointed him.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: My hand will sustain him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: surely my arm will strengthen him.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The enemy will not get the better of him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wicked will not oppress him.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: I will crush his foes before him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and strike down his adversaries.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: My faithful love will be with him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and through my name his horn
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89:24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Horn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: here symbolizes strength.
      marker-yv: yv-n
    - type: text
      text: ' will be exalted.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: I will set his hand over the sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his right hand over the rivers.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: He will call out to me, ‘You are my Father,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my God, the Rock my Savior.’
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: And I will appoint him to be my firstborn,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the most exalted of the kings of the earth.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: I will maintain my love to him forever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my covenant with him will never fail.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: I will establish his line forever,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his throne as long as the heavens endure.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: You said, “I have made a covenant with my chosen one,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have sworn to David my servant,
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: “If his sons forsake my law
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and do not follow my statutes,
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: if they violate my decrees
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fail to keep my commands,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: I will punish their sin with the rod,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their iniquity with flogging;
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: but I will not take my love from him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor will I ever betray my faithfulness.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: I will not violate my covenant
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or alter what my lips have uttered.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Once for all, I have sworn by my holiness—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will not lie to David—
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: that his line will continue forever
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his throne endure before me like the sun;
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: it will be established forever like the moon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the faithful witness in the sky.”
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: But you have rejected, you have spurned,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have been very angry with your anointed one.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: You have renounced the covenant with your servant
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have defiled his crown in the dust.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ‘I will establish your line forever
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make your throne firm through all generations.’ ”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew has '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Selah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a word of uncertain meaning) here and at the end of verses 37, 45 and 48.
      marker-yv: yv-n
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: You have broken through all his walls
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and reduced his strongholds to ruins.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: All who pass by have plundered him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has become the scorn of his neighbors.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: You have exalted the right hand of his foes;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have made all his enemies rejoice.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Indeed, you have turned back the edge of his sword
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have not supported him in battle.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: You have put an end to his splendor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cast his throne to the ground.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: You have cut short the days of his youth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have covered him with a mantle of shame.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'How long, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '? Will you hide yourself forever?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long will your wrath burn like fire?
  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Remember how fleeting is my life.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: For what futility you have created all humanity!
  '48':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: Who can live and not see death,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or who can escape the power of the grave?
  '49':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Lord, where is your former great love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: which in your faithfulness you swore to David?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'The heavens praise your wonders, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your faithfulness too, in the assembly of the holy ones.
  '50':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Remember, Lord, how your servant has
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '89:50 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: your servants have
      marker-yv: yv-n
    - type: text
      text: ' been mocked,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how I bear in my heart the taunts of all the nations,
  '51':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'the taunts with which your enemies, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have mocked,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with which they have mocked every step of your anointed one.
  '52':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Praise be to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' forever!'
  - type: usfm
    marker: qc
    children:
    - type: text
      text: Amen and Amen.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For who in the skies above can compare with the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'Who is like the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' among the heavenly beings?'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: In the council of the holy ones God is greatly feared;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is more awesome than all who surround him.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Who is like you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God Almighty?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'You, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', are mighty, and your faithfulness surrounds you.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: You rule over the surging sea;
  - type: usfm
    marker: q2
    children:
    - type: text
