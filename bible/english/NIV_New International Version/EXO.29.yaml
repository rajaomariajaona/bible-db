document_id: EXO.29,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Consecration of the Priests
  - type: text
    content: '“This is what you are to do to consecrate them, so they may serve me as priests: Take a young bull and two rams without defect. '
  '10':
  - type: text
    content: '“Bring the bull to the front of the tent of meeting, and Aaron and his sons shall lay their hands on its head. '
  '11':
  - type: text
    content: 'Slaughter it in the '
  - type: text
    content: Lord
  - type: text
    content: '’s presence at the entrance to the tent of meeting. '
  '12':
  - type: text
    content: 'Take some of the bull’s blood and put it on the horns of the altar with your finger, and pour out the rest of it at the base of the altar. '
  '13':
  - type: text
    content: 'Then take all the fat on the internal organs, the long lobe of the liver, and both kidneys with the fat on them, and burn them on the altar. '
  '14':
  - type: text
    content: But burn the bull’s flesh and its hide and its intestines outside the camp. It is a sin offering.
  - type: note
    content: Or purification offering; also in verse 36
  '15':
  - type: text
    content: '“Take one of the rams, and Aaron and his sons shall lay their hands on its head. '
  '16':
  - type: text
    content: 'Slaughter it and take the blood and splash it against the sides of the altar. '
  '17':
  - type: text
    content: 'Cut the ram into pieces and wash the internal organs and the legs, putting them with the head and the other pieces. '
  '18':
  - type: text
    content: 'Then burn the entire ram on the altar. It is a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', a pleasing aroma, a food offering presented to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '19':
  - type: text
    content: '“Take the other ram, and Aaron and his sons shall lay their hands on its head. '
  '2':
  - type: text
    content: 'And from the finest wheat flour make round loaves without yeast, thick loaves without yeast and with olive oil mixed in, and thin loaves without yeast and brushed with olive oil. '
  '20':
  - type: text
    content: 'Slaughter it, take some of its blood and put it on the lobes of the right ears of Aaron and his sons, on the thumbs of their right hands, and on the big toes of their right feet. Then splash blood against the sides of the altar. '
  '21':
  - type: text
    content: And take some blood from the altar and some of the anointing oil and sprinkle it on Aaron and his garments and on his sons and their garments. Then he and his sons and their garments will be consecrated.
  '22':
  - type: text
    content: '“Take from this ram the fat, the fat tail, the fat on the internal organs, the long lobe of the liver, both kidneys with the fat on them, and the right thigh. (This is the ram for the ordination.) '
  '23':
  - type: text
    content: 'From the basket of bread made without yeast, which is before the '
  - type: text
    content: Lord
  - type: text
    content: ', take one round loaf, one thick loaf with olive oil mixed in, and one thin loaf. '
  '24':
  - type: text
    content: 'Put all these in the hands of Aaron and his sons and have them wave them before the '
  - type: text
    content: Lord
  - type: text
    content: ' as a wave offering. '
  '25':
  - type: text
    content: 'Then take them from their hands and burn them on the altar along with the burnt offering for a pleasing aroma to the '
  - type: text
    content: Lord
  - type: text
    content: ', a food offering presented to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'After you take the breast of the ram for Aaron’s ordination, wave it before the '
  - type: text
    content: Lord
  - type: text
    content: ' as a wave offering, and it will be your share.'
  '27':
  - type: text
    content: '“Consecrate those parts of the ordination ram that belong to Aaron and his sons: the breast that was waved and the thigh that was presented. '
  '28':
  - type: text
    content: 'This is always to be the perpetual share from the Israelites for Aaron and his sons. It is the contribution the Israelites are to make to the '
  - type: text
    content: Lord
  - type: text
    content: ' from their fellowship offerings.'
  '29':
  - type: text
    content: '“Aaron’s sacred garments will belong to his descendants so that they can be anointed and ordained in them. '
  '3':
  - type: text
    content: 'Put them in a basket and present them along with the bull and the two rams. '
  '30':
  - type: text
    content: The son who succeeds him as priest and comes to the tent of meeting to minister in the Holy Place is to wear them seven days.
  '31':
  - type: text
    content: '“Take the ram for the ordination and cook the meat in a sacred place. '
  '32':
  - type: text
    content: 'At the entrance to the tent of meeting, Aaron and his sons are to eat the meat of the ram and the bread that is in the basket. '
  '33':
  - type: text
    content: 'They are to eat these offerings by which atonement was made for their ordination and consecration. But no one else may eat them, because they are sacred. '
  '34':
  - type: text
    content: And if any of the meat of the ordination ram or any bread is left over till morning, burn it up. It must not be eaten, because it is sacred.
  '35':
  - type: text
    content: '“Do for Aaron and his sons everything I have commanded you, taking seven days to ordain them. '
  '36':
  - type: text
    content: 'Sacrifice a bull each day as a sin offering to make atonement. Purify the altar by making atonement for it, and anoint it to consecrate it. '
  '37':
  - type: text
    content: For seven days make atonement for the altar and consecrate it. Then the altar will be most holy, and whatever touches it will be holy.
  '38':
  - type: text
    content: '“This is what you are to offer on the altar regularly each day: two lambs a year old. '
  '39':
  - type: text
    content: 'Offer one in the morning and the other at twilight. '
  '4':
  - type: text
    content: 'Then bring Aaron and his sons to the entrance to the tent of meeting and wash them with water. '
  '40':
  - type: text
    content: With the first lamb offer a tenth of an ephah
  - type: note
    content: That is, probably about 3 1/2 pounds or about 1.6 kilograms
  - type: text
    content: ' of the finest flour mixed with a quarter of a hin'
  - type: note
    content: That is, probably about 1 quart or about 1 liter
  - type: text
    content: ' of oil from pressed olives, and a quarter of a hin of wine as a drink offering. '
  '41':
  - type: text
    content: 'Sacrifice the other lamb at twilight with the same grain offering and its drink offering as in the morning—a pleasing aroma, a food offering presented to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '42':
  - type: text
    content: '“For the generations to come this burnt offering is to be made regularly at the entrance to the tent of meeting, before the '
  - type: text
    content: Lord
  - type: text
    content: '. There I will meet you and speak to you; '
  '43':
  - type: text
    content: there also I will meet with the Israelites, and the place will be consecrated by my glory.
  '44':
  - type: text
    content: '“So I will consecrate the tent of meeting and the altar and will consecrate Aaron and his sons to serve me as priests. '
  '45':
  - type: text
    content: 'Then I will dwell among the Israelites and be their God. '
  '46':
  - type: text
    content: 'They will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' their God, who brought them out of Egypt so that I might dwell among them. I am the '
  - type: text
    content: Lord
  - type: text
    content: ' their God.'
  '5':
  - type: text
    content: 'Take the garments and dress Aaron with the tunic, the robe of the ephod, the ephod itself and the breastpiece. Fasten the ephod on him by its skillfully woven waistband. '
  '6':
  - type: text
    content: 'Put the turban on his head and attach the sacred emblem to the turban. '
  '7':
  - type: text
    content: 'Take the anointing oil and anoint him by pouring it on his head. '
  '8':
  - type: text
    content: 'Bring his sons and dress them in tunics '
  '9':
  - type: text
    content: and fasten caps on them. Then tie sashes on Aaron and his sons.
  - type: note
    content: Hebrew; Septuagint on them
  - type: text
    content: ' The priesthood is theirs by a lasting ordinance.'
  - type: text
    content: “Then you shall ordain Aaron and his sons.
