document_id: NUM.27,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Zelophehad’s Daughters
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The daughters of Zelophehad son of Hepher, the son of Gilead, the son of Makir, the son of Manasseh, belonged to the clans of Manasseh son of Joseph. The names of the daughters were Mahlah, Noah, Hoglah, Milkah and Tirzah. They came forward '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If he has no brothers, give his inheritance to his father’s brothers. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If his father had no brothers, give his inheritance to the nearest relative in his clan, that he may possess it. This is to have the force of law for the Israelites, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded Moses.’ ”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joshua to Succeed Moses
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Go up this mountain in the Abarim Range and see the land I have given the Israelites. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After you have seen it, you too will be gathered to your people, as your brother Aaron was, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: for when the community rebelled at the waters in the Desert of Zin, both of you disobeyed my command to honor me as holy before their eyes.” (These were the waters of Meribah Kadesh, in the Desert of Zin.)
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses said to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God who gives breath to all living things, appoint someone over this community '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'to go out and come in before them, one who will lead them out and bring them in, so the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s people will not be like sheep without a shepherd.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Take Joshua son of Nun, a man in whom is the spirit of leadership,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Spirit
      marker-yv: yv-n
    - type: text
      text: ' and lay your hand on him. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Have him stand before Eleazar the priest and the entire assembly and commission him in their presence. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and stood before Moses, Eleazar the priest, the leaders and the whole assembly at the entrance to the tent of meeting and said, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Give him some of your authority so the whole Israelite community will obey him. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He is to stand before Eleazar the priest, who will obtain decisions for him by inquiring of the Urim before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . At his command he and the entire community of the Israelites will go out, and at his command they will come in.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses did as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded him. He took Joshua and had him stand before Eleazar the priest and the whole assembly. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he laid his hands on him and commissioned him, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' instructed through Moses.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Our father died in the wilderness. He was not among Korah’s followers, who banded together against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', but he died for his own sin and left no sons. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Why should our father’s name disappear from his clan because he had no son? Give us property among our father’s relatives.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses brought their case before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to him, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “What Zelophehad’s daughters are saying is right. You must certainly give them property as an inheritance among their father’s relatives and give their father’s inheritance to them.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Say to the Israelites, ‘If a man dies and leaves no son, give his inheritance to his daughter. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If he has no daughter, give his inheritance to his brothers. '
