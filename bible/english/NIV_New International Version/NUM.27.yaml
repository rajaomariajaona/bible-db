document_id: NUM.27,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Zelophehad’s Daughters
  - type: text
    content: 'The daughters of Zelophehad son of Hepher, the son of Gilead, the son of Makir, the son of Manasseh, belonged to the clans of Manasseh son of Joseph. The names of the daughters were Mahlah, Noah, Hoglah, Milkah and Tirzah. They came forward '
  '10':
  - type: text
    content: 'If he has no brothers, give his inheritance to his father’s brothers. '
  '11':
  - type: text
    content: 'If his father had no brothers, give his inheritance to the nearest relative in his clan, that he may possess it. This is to have the force of law for the Israelites, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.’ ”'
  - type: heading
    content: Joshua to Succeed Moses
  '12':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Go up this mountain in the Abarim Range and see the land I have given the Israelites. '
  '13':
  - type: text
    content: 'After you have seen it, you too will be gathered to your people, as your brother Aaron was, '
  '14':
  - type: text
    content: for when the community rebelled at the waters in the Desert of Zin, both of you disobeyed my command to honor me as holy before their eyes.” (These were the waters of Meribah Kadesh, in the Desert of Zin.)
  '15':
  - type: text
    content: 'Moses said to the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '16':
  - type: text
    content: '“May the '
  - type: text
    content: Lord
  - type: text
    content: ', the God who gives breath to all living things, appoint someone over this community '
  '17':
  - type: text
    content: 'to go out and come in before them, one who will lead them out and bring them in, so the '
  - type: text
    content: Lord
  - type: text
    content: ’s people will not be like sheep without a shepherd.”
  '18':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Take Joshua son of Nun, a man in whom is the spirit of leadership,'
  - type: note
    content: Or the Spirit
  - type: text
    content: ' and lay your hand on him. '
  '19':
  - type: text
    content: 'Have him stand before Eleazar the priest and the entire assembly and commission him in their presence. '
  '2':
  - type: text
    content: 'and stood before Moses, Eleazar the priest, the leaders and the whole assembly at the entrance to the tent of meeting and said, '
  '20':
  - type: text
    content: 'Give him some of your authority so the whole Israelite community will obey him. '
  '21':
  - type: text
    content: 'He is to stand before Eleazar the priest, who will obtain decisions for him by inquiring of the Urim before the '
  - type: text
    content: Lord
  - type: text
    content: . At his command he and the entire community of the Israelites will go out, and at his command they will come in.”
  '22':
  - type: text
    content: 'Moses did as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded him. He took Joshua and had him stand before Eleazar the priest and the whole assembly. '
  '23':
  - type: text
    content: 'Then he laid his hands on him and commissioned him, as the '
  - type: text
    content: Lord
  - type: text
    content: ' instructed through Moses.'
  '3':
  - type: text
    content: '“Our father died in the wilderness. He was not among Korah’s followers, who banded together against the '
  - type: text
    content: Lord
  - type: text
    content: ', but he died for his own sin and left no sons. '
  '4':
  - type: text
    content: Why should our father’s name disappear from his clan because he had no son? Give us property among our father’s relatives.”
  '5':
  - type: text
    content: 'So Moses brought their case before the '
  - type: text
    content: Lord
  - type: text
    content: ', '
  '6':
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, '
  '7':
  - type: text
    content: “What Zelophehad’s daughters are saying is right. You must certainly give them property as an inheritance among their father’s relatives and give their father’s inheritance to them.
  '8':
  - type: text
    content: '“Say to the Israelites, ‘If a man dies and leaves no son, give his inheritance to his daughter. '
  '9':
  - type: text
    content: 'If he has no daughter, give his inheritance to his brothers. '
