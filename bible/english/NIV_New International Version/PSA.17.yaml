document_id: PSA.17,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 17
  - type: text
    content: A prayer of David.
  - type: text
    content: 'Hear me, '
  - type: text
    content: Lord
  - type: text
    content: ', my plea is just;'
  - type: text
    content: listen to my cry.
  - type: text
    content: Hear my prayer—
  - type: text
    content: it does not rise from deceitful lips.
  '10':
  - type: text
    content: They close up their callous hearts,
  - type: text
    content: and their mouths speak with arrogance.
  '11':
  - type: text
    content: They have tracked me down, they now surround me,
  - type: text
    content: with eyes alert, to throw me to the ground.
  '12':
  - type: text
    content: They are like a lion hungry for prey,
  - type: text
    content: like a fierce lion crouching in cover.
  '13':
  - type: text
    content: 'Rise up, '
  - type: text
    content: Lord
  - type: text
    content: ', confront them, bring them down;'
  - type: text
    content: with your sword rescue me from the wicked.
  '14':
  - type: text
    content: 'By your hand save me from such people, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: from those of this world whose reward is in this life.
  - type: text
    content: May what you have stored up for the wicked fill their bellies;
  - type: text
    content: may their children gorge themselves on it,
  - type: text
    content: and may there be leftovers for their little ones.
  '15':
  - type: text
    content: As for me, I will be vindicated and will see your face;
  - type: text
    content: when I awake, I will be satisfied with seeing your likeness.
  '2':
  - type: text
    content: Let my vindication come from you;
  - type: text
    content: may your eyes see what is right.
  '3':
  - type: text
    content: Though you probe my heart,
  - type: text
    content: though you examine me at night and test me,
  - type: text
    content: you will find that I have planned no evil;
  - type: text
    content: my mouth has not transgressed.
  '4':
  - type: text
    content: Though people tried to bribe me,
  - type: text
    content: I have kept myself from the ways of the violent
  - type: text
    content: through what your lips have commanded.
  '5':
  - type: text
    content: My steps have held to your paths;
  - type: text
    content: my feet have not stumbled.
  '6':
  - type: text
    content: I call on you, my God, for you will answer me;
  - type: text
    content: turn your ear to me and hear my prayer.
  '7':
  - type: text
    content: Show me the wonders of your great love,
  - type: text
    content: you who save by your right hand
  - type: text
    content: those who take refuge in you from their foes.
  '8':
  - type: text
    content: Keep me as the apple of your eye;
  - type: text
    content: hide me in the shadow of your wings
  '9':
  - type: text
    content: from the wicked who are out to destroy me,
  - type: text
    content: from my mortal enemies who surround me.
