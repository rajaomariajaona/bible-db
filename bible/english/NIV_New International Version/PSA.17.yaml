document_id: PSA.17
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 17
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A prayer of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hear me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', my plea is just;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: listen to my cry.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hear my prayer—
- type: usfm
  marker: q2
  children:
  - type: text
    text: it does not rise from deceitful lips.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Let my vindication come from you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may your eyes see what is right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Though you probe my heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: though you examine me at night and test me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you will find that I have planned no evil;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my mouth has not transgressed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Though people tried to bribe me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have kept myself from the ways of the violent
- type: usfm
  marker: q2
  children:
  - type: text
    text: through what your lips have commanded.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: My steps have held to your paths;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my feet have not stumbled.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I call on you, my God, for you will answer me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: turn your ear to me and hear my prayer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Show me the wonders of your great love,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who save by your right hand
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who take refuge in you from their foes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Keep me as the apple of your eye;
- type: usfm
  marker: q2
  children:
  - type: text
    text: hide me in the shadow of your wings
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: from the wicked who are out to destroy me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from my mortal enemies who surround me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They close up their callous hearts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their mouths speak with arrogance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They have tracked me down, they now surround me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with eyes alert, to throw me to the ground.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They are like a lion hungry for prey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a fierce lion crouching in cover.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Rise up, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', confront them, bring them down;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: with your sword rescue me from the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'By your hand save me from such people, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: from those of this world whose reward is in this life.
- type: usfm
  marker: q1
  children:
  - type: text
    text: May what you have stored up for the wicked fill their bellies;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may their children gorge themselves on it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and may there be leftovers for their little ones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: As for me, I will be vindicated and will see your face;
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I awake, I will be satisfied with seeing your likeness.
