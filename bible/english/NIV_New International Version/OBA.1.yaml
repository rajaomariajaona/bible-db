document_id: OBA.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Obadiah’s Vision
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The vision of Obadiah.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'This is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says about Edom—'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'We have heard a message from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ':'
- type: usfm
  marker: q2
  children:
  - type: text
    text: An envoy was sent to the nations to say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Rise, let us go against her for battle”—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “See, I will make you small among the nations;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will be utterly despised.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The pride of your heart has deceived you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who live in the clefts of the rocks
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of Sela
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and make your home on the heights,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you who say to yourself,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Who can bring me down to the ground?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Though you soar like the eagle
- type: usfm
  marker: q2
  children:
  - type: text
    text: and make your nest among the stars,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from there I will bring you down,”
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “If thieves came to you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: if robbers in the night—
- type: usfm
  marker: q1
  children:
  - type: text
    text: oh, what a disaster awaits you!—
- type: usfm
  marker: q2
  children:
  - type: text
    text: would they not steal only as much as they wanted?
- type: usfm
  marker: q1
  children:
  - type: text
    text: If grape pickers came to you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: would they not leave a few grapes?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: But how Esau will be ransacked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his hidden treasures pillaged!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: All your allies will force you to the border;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your friends will deceive and overpower you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: those who eat your bread will set a trap for you,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this clause is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: but you will not detect it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“In that day,” declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: “will I not destroy the wise men of Edom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: those of understanding in the mountains of Esau?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Your warriors, Teman, will be terrified,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and everyone in Esau’s mountains
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be cut down in the slaughter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Because of the violence against your brother Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will be covered with shame;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will be destroyed forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: On the day you stood aloof
- type: usfm
  marker: q2
  children:
  - type: text
    text: while strangers carried off his wealth
- type: usfm
  marker: q1
  children:
  - type: text
    text: and foreigners entered his gates
- type: usfm
  marker: q2
  children:
  - type: text
    text: and cast lots for Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you were like one of them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: You should not gloat over your brother
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the day of his misfortune,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nor rejoice over the people of Judah
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the day of their destruction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nor boast so much
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the day of their trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: You should not march through the gates of my people
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the day of their disaster,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nor gloat over them in their calamity
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the day of their disaster,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nor seize their wealth
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the day of their disaster.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: You should not wait at the crossroads
- type: usfm
  marker: q2
  children:
  - type: text
    text: to cut down their fugitives,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nor hand over their survivors
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the day of their trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '“The day of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is near'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for all nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: As you have done, it will be done to you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your deeds will return upon your own head.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Just as you drank on my holy hill,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so all the nations will drink continually;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they will drink and drink
- type: usfm
  marker: q2
  children:
  - type: text
    text: and be as if they had never been.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But on Mount Zion will be deliverance;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will be holy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Jacob will possess his inheritance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Jacob will be a fire
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Joseph a flame;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Esau will be stubble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they will set him on fire and destroy him.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There will be no survivors
- type: usfm
  marker: q2
  children:
  - type: text
    text: from Esau.”
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has spoken.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: People from the Negev will occupy
- type: usfm
  marker: q2
  children:
  - type: text
    text: the mountains of Esau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and people from the foothills will possess
- type: usfm
  marker: q2
  children:
  - type: text
    text: the land of the Philistines.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will occupy the fields of Ephraim and Samaria,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Benjamin will possess Gilead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: This company of Israelite exiles who are in Canaan
- type: usfm
  marker: q2
  children:
  - type: text
    text: will possess the land as far as Zarephath;
- type: usfm
  marker: q1
  children:
  - type: text
    text: the exiles from Jerusalem who are in Sepharad
- type: usfm
  marker: q2
  children:
  - type: text
    text: will possess the towns of the Negev.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Deliverers will go up on
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: from
    marker-yv: yv-n
  - type: text
    text: ' Mount Zion'
- type: usfm
  marker: q2
  children:
  - type: text
    text: to govern the mountains of Esau.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And the kingdom will be the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s.
