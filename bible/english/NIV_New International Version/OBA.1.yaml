document_id: OBA.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Obadiah’s Vision
  - type: text
    content: The vision of Obadiah.
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says about Edom—'
  - type: text
    content: 'We have heard a message from the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: An envoy was sent to the nations to say,
  - type: text
    content: “Rise, let us go against her for battle”—
  '10':
  - type: text
    content: Because of the violence against your brother Jacob,
  - type: text
    content: you will be covered with shame;
  - type: text
    content: you will be destroyed forever.
  '11':
  - type: text
    content: On the day you stood aloof
  - type: text
    content: while strangers carried off his wealth
  - type: text
    content: and foreigners entered his gates
  - type: text
    content: and cast lots for Jerusalem,
  - type: text
    content: you were like one of them.
  '12':
  - type: text
    content: You should not gloat over your brother
  - type: text
    content: in the day of his misfortune,
  - type: text
    content: nor rejoice over the people of Judah
  - type: text
    content: in the day of their destruction,
  - type: text
    content: nor boast so much
  - type: text
    content: in the day of their trouble.
  '13':
  - type: text
    content: You should not march through the gates of my people
  - type: text
    content: in the day of their disaster,
  - type: text
    content: nor gloat over them in their calamity
  - type: text
    content: in the day of their disaster,
  - type: text
    content: nor seize their wealth
  - type: text
    content: in the day of their disaster.
  '14':
  - type: text
    content: You should not wait at the crossroads
  - type: text
    content: to cut down their fugitives,
  - type: text
    content: nor hand over their survivors
  - type: text
    content: in the day of their trouble.
  '15':
  - type: text
    content: '“The day of the '
  - type: text
    content: Lord
  - type: text
    content: ' is near'
  - type: text
    content: for all nations.
  - type: text
    content: As you have done, it will be done to you;
  - type: text
    content: your deeds will return upon your own head.
  '16':
  - type: text
    content: Just as you drank on my holy hill,
  - type: text
    content: so all the nations will drink continually;
  - type: text
    content: they will drink and drink
  - type: text
    content: and be as if they had never been.
  '17':
  - type: text
    content: But on Mount Zion will be deliverance;
  - type: text
    content: it will be holy,
  - type: text
    content: and Jacob will possess his inheritance.
  '18':
  - type: text
    content: Jacob will be a fire
  - type: text
    content: and Joseph a flame;
  - type: text
    content: Esau will be stubble,
  - type: text
    content: and they will set him on fire and destroy him.
  - type: text
    content: There will be no survivors
  - type: text
    content: from Esau.”
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken.'
  '19':
  - type: text
    content: People from the Negev will occupy
  - type: text
    content: the mountains of Esau,
  - type: text
    content: and people from the foothills will possess
  - type: text
    content: the land of the Philistines.
  - type: text
    content: They will occupy the fields of Ephraim and Samaria,
  - type: text
    content: and Benjamin will possess Gilead.
  '2':
  - type: text
    content: “See, I will make you small among the nations;
  - type: text
    content: you will be utterly despised.
  '20':
  - type: text
    content: This company of Israelite exiles who are in Canaan
  - type: text
    content: will possess the land as far as Zarephath;
  - type: text
    content: the exiles from Jerusalem who are in Sepharad
  - type: text
    content: will possess the towns of the Negev.
  '21':
  - type: text
    content: Deliverers will go up on
  - type: note
    content: Or from
  - type: text
    content: ' Mount Zion'
  - type: text
    content: to govern the mountains of Esau.
  - type: text
    content: 'And the kingdom will be the '
  - type: text
    content: Lord
  - type: text
    content: ’s.
  '3':
  - type: text
    content: The pride of your heart has deceived you,
  - type: text
    content: you who live in the clefts of the rocks
  - type: note
    content: Or of Sela
  - type: text
    content: and make your home on the heights,
  - type: text
    content: you who say to yourself,
  - type: text
    content: ‘Who can bring me down to the ground?’
  '4':
  - type: text
    content: Though you soar like the eagle
  - type: text
    content: and make your nest among the stars,
  - type: text
    content: from there I will bring you down,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: “If thieves came to you,
  - type: text
    content: if robbers in the night—
  - type: text
    content: oh, what a disaster awaits you!—
  - type: text
    content: would they not steal only as much as they wanted?
  - type: text
    content: If grape pickers came to you,
  - type: text
    content: would they not leave a few grapes?
  '6':
  - type: text
    content: But how Esau will be ransacked,
  - type: text
    content: his hidden treasures pillaged!
  '7':
  - type: text
    content: All your allies will force you to the border;
  - type: text
    content: your friends will deceive and overpower you;
  - type: text
    content: those who eat your bread will set a trap for you,
  - type: note
    content: The meaning of the Hebrew for this clause is uncertain.
  - type: text
    content: but you will not detect it.
  '8':
  - type: text
    content: '“In that day,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “will I not destroy the wise men of Edom,
  - type: text
    content: those of understanding in the mountains of Esau?
  '9':
  - type: text
    content: Your warriors, Teman, will be terrified,
  - type: text
    content: and everyone in Esau’s mountains
  - type: text
    content: will be cut down in the slaughter.
