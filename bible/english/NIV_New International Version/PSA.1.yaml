document_id: PSA.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: BOOK I
  - type: heading
    content: Psalms 1–41
  - type: heading
    content: Psalm 1
  - type: text
    content: Blessed is the one
  - type: text
    content: who does not walk in step with the wicked
  - type: text
    content: or stand in the way that sinners take
  - type: text
    content: or sit in the company of mockers,
  '2':
  - type: text
    content: 'but whose delight is in the law of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and who meditates on his law day and night.
  '3':
  - type: text
    content: That person is like a tree planted by streams of water,
  - type: text
    content: which yields its fruit in season
  - type: text
    content: and whose leaf does not wither—
  - type: text
    content: whatever they do prospers.
  '4':
  - type: text
    content: Not so the wicked!
  - type: text
    content: They are like chaff
  - type: text
    content: that the wind blows away.
  '5':
  - type: text
    content: Therefore the wicked will not stand in the judgment,
  - type: text
    content: nor sinners in the assembly of the righteous.
  '6':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' watches over the way of the righteous,'
  - type: text
    content: but the way of the wicked leads to destruction.
