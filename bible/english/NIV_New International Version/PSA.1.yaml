  children:
  - type: text
    text: Psalms 1–41
  marker-yv: yv-h
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 1
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Blessed is the one
- type: usfm
  marker: q2
  children:
  - type: text
    text: who does not walk in step with the wicked
- type: usfm
  marker: q1
  children:
  - type: text
    text: or stand in the way that sinners take
- type: usfm
  marker: q2
  children:
  - type: text
    text: or sit in the company of mockers,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'but whose delight is in the law of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and who meditates on his law day and night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: That person is like a tree planted by streams of water,
- type: usfm
  marker: q2
  children:
  - type: text
    text: which yields its fruit in season
- type: usfm
  marker: q1
  children:
  - type: text
    text: and whose leaf does not wither—
- type: usfm
  marker: q2
  children:
  - type: text
    text: whatever they do prospers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Not so the wicked!
- type: usfm
  marker: q2
  children:
  - type: text
    text: They are like chaff
- type: usfm
  marker: q2
  children:
  - type: text
    text: that the wind blows away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Therefore the wicked will not stand in the judgment,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor sinners in the assembly of the righteous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' watches over the way of the righteous,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the way of the wicked leads to destruction.
