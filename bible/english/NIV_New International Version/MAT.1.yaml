document_id: MAT.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Genealogy of Jesus the Messiah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: This is the genealogy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: is an account of the origin
    marker-yv: yv-n
  - type: text
    text: ' of Jesus the Messiah'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jesus Christ
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Messiah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Hebrew) and '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Christ '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Greek) both mean '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Anointed One
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verse 18.
    marker-yv: yv-n
  - type: text
    text: ' the son of David, the son of Abraham:'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Abraham was the father of Isaac,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Isaac the father of Jacob,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jacob the father of Judah and his brothers,
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Judah the father of Perez and Zerah, whose mother was Tamar,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Perez the father of Hezron,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Hezron the father of Ram,
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ram the father of Amminadab,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Amminadab the father of Nahshon,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Nahshon the father of Salmon,
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Salmon the father of Boaz, whose mother was Rahab,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Boaz the father of Obed, whose mother was Ruth,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Obed the father of Jesse,
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: and Jesse the father of King David.
- type: usfm
  marker: li1
  children:
  - type: text
    text: David was the father of Solomon, whose mother had been Uriah’s wife,
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Solomon the father of Rehoboam,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Rehoboam the father of Abijah,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Abijah the father of Asa,
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Asa the father of Jehoshaphat,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jehoshaphat the father of Jehoram,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jehoram the father of Uzziah,
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Uzziah the father of Jotham,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jotham the father of Ahaz,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Ahaz the father of Hezekiah,
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Hezekiah the father of Manasseh,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Manasseh the father of Amon,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Amon the father of Josiah,
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: and Josiah the father of Jeconiah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, Jehoiachin; also in verse 12
    marker-yv: yv-n
  - type: text
    text: ' and his brothers at the time of the exile to Babylon.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'After the exile to Babylon:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jeconiah was the father of Shealtiel,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Shealtiel the father of Zerubbabel,
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Zerubbabel the father of Abihud,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Abihud the father of Eliakim,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Eliakim the father of Azor,
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Azor the father of Zadok,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Zadok the father of Akim,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Akim the father of Elihud,
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Elihud the father of Eleazar,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Eleazar the father of Matthan,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Matthan the father of Jacob,
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: and Jacob the father of Joseph, the husband of Mary, and Mary was the mother of Jesus who is called the Messiah.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Thus there were fourteen generations in all from Abraham to David, fourteen from David to the exile to Babylon, and fourteen from the exile to the Messiah.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph Accepts Jesus as His Son
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: This is how the birth of Jesus the Messiah came about
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: The origin of Jesus the Messiah was like this
    marker-yv: yv-n
  - type: text
    text: ': His mother Mary was pledged to be married to Joseph, but before they came together, she was found to be pregnant through the Holy Spirit. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Because Joseph her husband was faithful to the law, and yet
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: was a righteous man and
    marker-yv: yv-n
  - type: text
    text: ' did not want to expose her to public disgrace, he had in mind to divorce her quietly.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But after he had considered this, an angel of the Lord appeared to him in a dream and said, “Joseph son of David, do not be afraid to take Mary home as your wife, because what is conceived in her is from the Holy Spirit. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: She will give birth to a son, and you are to give him the name Jesus,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jesus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'is the Greek form of '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Joshua, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'which means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ' saves.'
    marker-yv: yv-n
  - type: text
    text: ' because he will save his people from their sins.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'All this took place to fulfill what the Lord had said through the prophet: '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “The virgin will conceive and give birth to a son, and they will call him Immanuel”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah 7:14
    marker-yv: yv-n
  - type: text
    text: ' (which means “God with us”).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'When Joseph woke up, he did what the angel of the Lord had commanded him and took Mary home as his wife. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: But he did not consummate their marriage until she gave birth to a son. And he gave him the name Jesus.
