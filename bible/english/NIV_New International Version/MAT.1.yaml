document_id: MAT.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Genealogy of Jesus the Messiah
  - type: text
    content: This is the genealogy
  - type: note
    content: Or is an account of the origin
  - type: text
    content: ' of Jesus the Messiah'
  - type: note
    content: Or Jesus Christ. Messiah (Hebrew) and Christ (Greek) both mean Anointed One; also in verse 18.
  - type: text
    content: ' the son of David, the son of Abraham:'
  '10':
  - type: text
    content: Hezekiah the father of Manasseh,
  - type: text
    content: Manasseh the father of Amon,
  - type: text
    content: Amon the father of Josiah,
  '11':
  - type: text
    content: and Josiah the father of Jeconiah
  - type: note
    content: That is, Jehoiachin; also in verse 12
  - type: text
    content: ' and his brothers at the time of the exile to Babylon.'
  '12':
  - type: text
    content: 'After the exile to Babylon:'
  - type: text
    content: Jeconiah was the father of Shealtiel,
  - type: text
    content: Shealtiel the father of Zerubbabel,
  '13':
  - type: text
    content: Zerubbabel the father of Abihud,
  - type: text
    content: Abihud the father of Eliakim,
  - type: text
    content: Eliakim the father of Azor,
  '14':
  - type: text
    content: Azor the father of Zadok,
  - type: text
    content: Zadok the father of Akim,
  - type: text
    content: Akim the father of Elihud,
  '15':
  - type: text
    content: Elihud the father of Eleazar,
  - type: text
    content: Eleazar the father of Matthan,
  - type: text
    content: Matthan the father of Jacob,
  '16':
  - type: text
    content: and Jacob the father of Joseph, the husband of Mary, and Mary was the mother of Jesus who is called the Messiah.
  '17':
  - type: text
    content: Thus there were fourteen generations in all from Abraham to David, fourteen from David to the exile to Babylon, and fourteen from the exile to the Messiah.
  - type: heading
    content: Joseph Accepts Jesus as His Son
  '18':
  - type: text
    content: This is how the birth of Jesus the Messiah came about
  - type: note
    content: Or The origin of Jesus the Messiah was like this
  - type: text
    content: ': His mother Mary was pledged to be married to Joseph, but before they came together, she was found to be pregnant through the Holy Spirit. '
  '19':
  - type: text
    content: Because Joseph her husband was faithful to the law, and yet
  - type: note
    content: Or was a righteous man and
  - type: text
    content: ' did not want to expose her to public disgrace, he had in mind to divorce her quietly.'
  '2':
  - type: text
    content: Abraham was the father of Isaac,
  - type: text
    content: Isaac the father of Jacob,
  - type: text
    content: Jacob the father of Judah and his brothers,
  '20':
  - type: text
    content: 'But after he had considered this, an angel of the Lord appeared to him in a dream and said, “Joseph son of David, do not be afraid to take Mary home as your wife, because what is conceived in her is from the Holy Spirit. '
  '21':
  - type: text
    content: She will give birth to a son, and you are to give him the name Jesus,
  - type: note
    content: Jesus is the Greek form of Joshua, which means the Lord saves.
  - type: text
    content: ' because he will save his people from their sins.”'
  '22':
  - type: text
    content: 'All this took place to fulfill what the Lord had said through the prophet: '
  '23':
  - type: text
    content: “The virgin will conceive and give birth to a son, and they will call him Immanuel”
  - type: note
    content: Isaiah 7:14
  - type: text
    content: ' (which means “God with us”).'
  '24':
  - type: text
    content: 'When Joseph woke up, he did what the angel of the Lord had commanded him and took Mary home as his wife. '
  '25':
  - type: text
    content: But he did not consummate their marriage until she gave birth to a son. And he gave him the name Jesus.
  '3':
  - type: text
    content: Judah the father of Perez and Zerah, whose mother was Tamar,
  - type: text
    content: Perez the father of Hezron,
  - type: text
    content: Hezron the father of Ram,
  '4':
  - type: text
    content: Ram the father of Amminadab,
  - type: text
    content: Amminadab the father of Nahshon,
  - type: text
    content: Nahshon the father of Salmon,
  '5':
  - type: text
    content: Salmon the father of Boaz, whose mother was Rahab,
  - type: text
    content: Boaz the father of Obed, whose mother was Ruth,
  - type: text
    content: Obed the father of Jesse,
  '6':
  - type: text
    content: and Jesse the father of King David.
  - type: text
    content: David was the father of Solomon, whose mother had been Uriah’s wife,
  '7':
  - type: text
    content: Solomon the father of Rehoboam,
  - type: text
    content: Rehoboam the father of Abijah,
  - type: text
    content: Abijah the father of Asa,
  '8':
  - type: text
    content: Asa the father of Jehoshaphat,
  - type: text
    content: Jehoshaphat the father of Jehoram,
  - type: text
    content: Jehoram the father of Uzziah,
  '9':
  - type: text
    content: Uzziah the father of Jotham,
  - type: text
    content: Jotham the father of Ahaz,
  - type: text
    content: Ahaz the father of Hezekiah,
