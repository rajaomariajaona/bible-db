document_id: NUM.36,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Inheritance of Zelophehad’s Daughters
  - type: text
    content: 'The family heads of the clan of Gilead son of Makir, the son of Manasseh, who were from the clans of the descendants of Joseph, came and spoke before Moses and the leaders, the heads of the Israelite families. '
  '10':
  - type: text
    content: 'So Zelophehad’s daughters did as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses. '
  '11':
  - type: text
    content: 'Zelophehad’s daughters—Mahlah, Tirzah, Hoglah, Milkah and Noah—married their cousins on their father’s side. '
  '12':
  - type: text
    content: They married within the clans of the descendants of Manasseh son of Joseph, and their inheritance remained in their father’s tribe and clan.
  '13':
  - type: text
    content: 'These are the commands and regulations the '
  - type: text
    content: Lord
  - type: text
    content: ' gave through Moses to the Israelites on the plains of Moab by the Jordan across from Jericho.'
  '2':
  - type: text
    content: 'They said, “When the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded my lord to give the land as an inheritance to the Israelites by lot, he ordered you to give the inheritance of our brother Zelophehad to his daughters. '
  '3':
  - type: text
    content: 'Now suppose they marry men from other Israelite tribes; then their inheritance will be taken from our ancestral inheritance and added to that of the tribe they marry into. And so part of the inheritance allotted to us will be taken away. '
  '4':
  - type: text
    content: When the Year of Jubilee for the Israelites comes, their inheritance will be added to that of the tribe into which they marry, and their property will be taken from the tribal inheritance of our ancestors.”
  '5':
  - type: text
    content: 'Then at the '
  - type: text
    content: Lord
  - type: text
    content: '’s command Moses gave this order to the Israelites: “What the tribe of the descendants of Joseph is saying is right. '
  '6':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' commands for Zelophehad’s daughters: They may marry anyone they please as long as they marry within their father’s tribal clan. '
  '7':
  - type: text
    content: 'No inheritance in Israel is to pass from one tribe to another, for every Israelite shall keep the tribal inheritance of their ancestors. '
  '8':
  - type: text
    content: 'Every daughter who inherits land in any Israelite tribe must marry someone in her father’s tribal clan, so that every Israelite will possess the inheritance of their ancestors. '
  '9':
  - type: text
    content: No inheritance may pass from one tribe to another, for each Israelite tribe is to keep the land it inherits.”
