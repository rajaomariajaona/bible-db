document_id: ACT.17,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: In Thessalonica
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Paul and his companions had passed through Amphipolis and Apollonia, they came to Thessalonica, where there was a Jewish synagogue. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As soon as it was night, the believers sent Paul and Silas away to Berea. On arriving there, they went to the Jewish synagogue. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the Berean Jews were of more noble character than those in Thessalonica, for they received the message with great eagerness and examined the Scriptures every day to see if what Paul said was true. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As a result, many of them believed, as did also a number of prominent Greek women and many Greek men.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when the Jews in Thessalonica learned that Paul was preaching the word of God at Berea, some of them went there too, agitating the crowds and stirring them up. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The believers immediately sent Paul to the coast, but Silas and Timothy stayed at Berea. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Those who escorted Paul brought him to Athens and then left with instructions for Silas and Timothy to join him as soon as possible.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: In Athens
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While Paul was waiting for them in Athens, he was greatly distressed to see that the city was full of idols. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he reasoned in the synagogue with both Jews and God-fearing Greeks, as well as in the marketplace day by day with those who happened to be there. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A group of Epicurean and Stoic philosophers began to debate with him. Some of them asked, “What is this babbler trying to say?” Others remarked, “He seems to be advocating foreign gods.” They said this because Paul was preaching the good news about Jesus and the resurrection. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they took him and brought him to a meeting of the Areopagus, where they said to him, “May we know what this new teaching is that you are presenting? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As was his custom, Paul went into the synagogue, and on three Sabbath days he reasoned with them from the Scriptures, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You are bringing some strange ideas to our ears, and we would like to know what they mean.” '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: (All the Athenians and the foreigners who lived there spent their time doing nothing but talking about and listening to the latest ideas.)
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul then stood up in the meeting of the Areopagus and said: “People of Athens! I see that in every way you are very religious. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For as I walked around and looked carefully at your objects of worship, I even found an altar with this inscription: '
    - type: usfm
      marker: sc
      children:
      - type: text
        text: to an unknown god
    - type: text
      text: . So you are ignorant of the very thing you worship—and this is what I am going to proclaim to you.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The God who made the world and everything in it is the Lord of heaven and earth and does not live in temples built by human hands. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he is not served by human hands, as if he needed anything. Rather, he himself gives everyone life and breath and everything else. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From one man he made all the nations, that they should inhabit the whole earth; and he marked out their appointed times in history and the boundaries of their lands. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God did this so that they would seek him and perhaps reach out for him and find him, though he is not far from any one of us. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘For in him we live and move and have our being.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: From the Cretan philosopher Epimenides
      marker-yv: yv-n
    - type: text
      text: ' As some of your own poets have said, ‘We are his offspring.’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: From the Cilician Stoic philosopher Aratus
      marker-yv: yv-n
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Therefore since we are God’s offspring, we should not think that the divine being is like gold or silver or stone—an image made by human design and skill. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'explaining and proving that the Messiah had to suffer and rise from the dead. “This Jesus I am proclaiming to you is the Messiah,” he said. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the past God overlooked such ignorance, but now he commands all people everywhere to repent. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For he has set a day when he will judge the world with justice by the man he has appointed. He has given proof of this to everyone by raising him from the dead.”
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they heard about the resurrection of the dead, some of them sneered, but others said, “We want to hear you again on this subject.” '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that, Paul left the Council. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Some of the people became followers of Paul and believed. Among them was Dionysius, a member of the Areopagus, also a woman named Damaris, and a number of others.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Some of the Jews were persuaded and joined Paul and Silas, as did a large number of God-fearing Greeks and quite a few prominent women.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But other Jews were jealous; so they rounded up some bad characters from the marketplace, formed a mob and started a riot in the city. They rushed to Jason’s house in search of Paul and Silas in order to bring them out to the crowd.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the assembly of the people
      marker-yv: yv-n
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when they did not find them, they dragged Jason and some other believers before the city officials, shouting: “These men who have caused trouble all over the world have now come here, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and Jason has welcomed them into his house. They are all defying Caesar’s decrees, saying that there is another king, one called Jesus.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they heard this, the crowd and the city officials were thrown into turmoil. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then they made Jason and the others post bond and let them go.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: In Berea
    marker-yv: yv-h
