document_id: ACT.17,111
type_code: eng
verses:
  '1':
  - type: heading
    content: In Thessalonica
  - type: text
    content: 'When Paul and his companions had passed through Amphipolis and Apollonia, they came to Thessalonica, where there was a Jewish synagogue. '
  '10':
  - type: text
    content: 'As soon as it was night, the believers sent Paul and Silas away to Berea. On arriving there, they went to the Jewish synagogue. '
  '11':
  - type: text
    content: 'Now the Berean Jews were of more noble character than those in Thessalonica, for they received the message with great eagerness and examined the Scriptures every day to see if what Paul said was true. '
  '12':
  - type: text
    content: As a result, many of them believed, as did also a number of prominent Greek women and many Greek men.
  '13':
  - type: text
    content: 'But when the Jews in Thessalonica learned that Paul was preaching the word of God at Berea, some of them went there too, agitating the crowds and stirring them up. '
  '14':
  - type: text
    content: 'The believers immediately sent Paul to the coast, but Silas and Timothy stayed at Berea. '
  '15':
  - type: text
    content: Those who escorted Paul brought him to Athens and then left with instructions for Silas and Timothy to join him as soon as possible.
  - type: heading
    content: In Athens
  '16':
  - type: text
    content: 'While Paul was waiting for them in Athens, he was greatly distressed to see that the city was full of idols. '
  '17':
  - type: text
    content: 'So he reasoned in the synagogue with both Jews and God-fearing Greeks, as well as in the marketplace day by day with those who happened to be there. '
  '18':
  - type: text
    content: 'A group of Epicurean and Stoic philosophers began to debate with him. Some of them asked, “What is this babbler trying to say?” Others remarked, “He seems to be advocating foreign gods.” They said this because Paul was preaching the good news about Jesus and the resurrection. '
  '19':
  - type: text
    content: 'Then they took him and brought him to a meeting of the Areopagus, where they said to him, “May we know what this new teaching is that you are presenting? '
  '2':
  - type: text
    content: 'As was his custom, Paul went into the synagogue, and on three Sabbath days he reasoned with them from the Scriptures, '
  '20':
  - type: text
    content: 'You are bringing some strange ideas to our ears, and we would like to know what they mean.” '
  '21':
  - type: text
    content: (All the Athenians and the foreigners who lived there spent their time doing nothing but talking about and listening to the latest ideas.)
  '22':
  - type: text
    content: 'Paul then stood up in the meeting of the Areopagus and said: “People of Athens! I see that in every way you are very religious. '
  '23':
  - type: text
    content: 'For as I walked around and looked carefully at your objects of worship, I even found an altar with this inscription: '
  - type: heading
    content: to an unknown god
  - type: text
    content: . So you are ignorant of the very thing you worship—and this is what I am going to proclaim to you.
  '24':
  - type: text
    content: '“The God who made the world and everything in it is the Lord of heaven and earth and does not live in temples built by human hands. '
  '25':
  - type: text
    content: 'And he is not served by human hands, as if he needed anything. Rather, he himself gives everyone life and breath and everything else. '
  '26':
  - type: text
    content: 'From one man he made all the nations, that they should inhabit the whole earth; and he marked out their appointed times in history and the boundaries of their lands. '
  '27':
  - type: text
    content: 'God did this so that they would seek him and perhaps reach out for him and find him, though he is not far from any one of us. '
  '28':
  - type: text
    content: ‘For in him we live and move and have our being.’
  - type: note
    content: From the Cretan philosopher Epimenides
  - type: text
    content: ' As some of your own poets have said, ‘We are his offspring.’'
  - type: note
    content: From the Cilician Stoic philosopher Aratus
  '29':
  - type: text
    content: '“Therefore since we are God’s offspring, we should not think that the divine being is like gold or silver or stone—an image made by human design and skill. '
  '3':
  - type: text
    content: 'explaining and proving that the Messiah had to suffer and rise from the dead. “This Jesus I am proclaiming to you is the Messiah,” he said. '
  '30':
  - type: text
    content: 'In the past God overlooked such ignorance, but now he commands all people everywhere to repent. '
  '31':
  - type: text
    content: For he has set a day when he will judge the world with justice by the man he has appointed. He has given proof of this to everyone by raising him from the dead.”
  '32':
  - type: text
    content: 'When they heard about the resurrection of the dead, some of them sneered, but others said, “We want to hear you again on this subject.” '
  '33':
  - type: text
    content: 'At that, Paul left the Council. '
  '34':
  - type: text
    content: Some of the people became followers of Paul and believed. Among them was Dionysius, a member of the Areopagus, also a woman named Damaris, and a number of others.
  '4':
  - type: text
    content: Some of the Jews were persuaded and joined Paul and Silas, as did a large number of God-fearing Greeks and quite a few prominent women.
  '5':
  - type: text
    content: But other Jews were jealous; so they rounded up some bad characters from the marketplace, formed a mob and started a riot in the city. They rushed to Jason’s house in search of Paul and Silas in order to bring them out to the crowd.
  - type: note
    content: Or the assembly of the people
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'But when they did not find them, they dragged Jason and some other believers before the city officials, shouting: “These men who have caused trouble all over the world have now come here, '
  '7':
  - type: text
    content: 'and Jason has welcomed them into his house. They are all defying Caesar’s decrees, saying that there is another king, one called Jesus.” '
  '8':
  - type: text
    content: 'When they heard this, the crowd and the city officials were thrown into turmoil. '
  '9':
  - type: text
    content: Then they made Jason and the others post bond and let them go.
  - type: heading
    content: In Berea
