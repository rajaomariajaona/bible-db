document_id: PSA.36
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 36
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 36:1-12 is numbered 36:2-13.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the director of music. Of David the servant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: I have a message from God in my heart
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'concerning the sinfulness of the wicked:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'A message from God: The transgression of the wicked / resides in their hearts.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: There is no fear of God
- type: usfm
  marker: q2
  children:
  - type: text
    text: before their eyes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: In their own eyes they flatter themselves
- type: usfm
  marker: q2
  children:
  - type: text
    text: too much to detect or hate their sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The words of their mouths are wicked and deceitful;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they fail to act wisely or do good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Even on their beds they plot evil;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they commit themselves to a sinful course
- type: usfm
  marker: q2
  children:
  - type: text
    text: and do not reject what is wrong.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Your love, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', reaches to the heavens,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: your faithfulness to the skies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Your righteousness is like the highest mountains,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your justice like the great deep.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'You, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', preserve both people and animals.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: How priceless is your unfailing love, O God!
- type: usfm
  marker: q2
  children:
  - type: text
    text: People take refuge in the shadow of your wings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They feast on the abundance of your house;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you give them drink from your river of delights.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For with you is the fountain of life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in your light we see light.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Continue your love to those who know you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your righteousness to the upright in heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: May the foot of the proud not come against me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor the hand of the wicked drive me away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: See how the evildoers lie fallen—
- type: usfm
  marker: q2
  children:
  - type: text
    text: thrown down, not able to rise!
