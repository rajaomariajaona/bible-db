document_id: PSA.36,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 36In Hebrew texts 36:1-12 is numbered 36:2-13.
  - type: text
    content: 'For the director of music. Of David the servant of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: I have a message from God in my heart
  - type: text
    content: 'concerning the sinfulness of the wicked:'
  - type: note
    content: 'Or A message from God: The transgression of the wicked / resides in their hearts.'
  - type: text
    content: There is no fear of God
  - type: text
    content: before their eyes.
  '10':
  - type: text
    content: Continue your love to those who know you,
  - type: text
    content: your righteousness to the upright in heart.
  '11':
  - type: text
    content: May the foot of the proud not come against me,
  - type: text
    content: nor the hand of the wicked drive me away.
  '12':
  - type: text
    content: See how the evildoers lie fallen—
  - type: text
    content: thrown down, not able to rise!
  '2':
  - type: text
    content: In their own eyes they flatter themselves
  - type: text
    content: too much to detect or hate their sin.
  '3':
  - type: text
    content: The words of their mouths are wicked and deceitful;
  - type: text
    content: they fail to act wisely or do good.
  '4':
  - type: text
    content: Even on their beds they plot evil;
  - type: text
    content: they commit themselves to a sinful course
  - type: text
    content: and do not reject what is wrong.
  '5':
  - type: text
    content: 'Your love, '
  - type: text
    content: Lord
  - type: text
    content: ', reaches to the heavens,'
  - type: text
    content: your faithfulness to the skies.
  '6':
  - type: text
    content: Your righteousness is like the highest mountains,
  - type: text
    content: your justice like the great deep.
  - type: text
    content: 'You, '
  - type: text
    content: Lord
  - type: text
    content: ', preserve both people and animals.'
  '7':
  - type: text
    content: How priceless is your unfailing love, O God!
  - type: text
    content: People take refuge in the shadow of your wings.
  '8':
  - type: text
    content: They feast on the abundance of your house;
  - type: text
    content: you give them drink from your river of delights.
  '9':
  - type: text
    content: For with you is the fountain of life;
  - type: text
    content: in your light we see light.
