document_id: HOS.6,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Unrepentant
  - type: text
    content: '“Come, let us return to the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: He has torn us to pieces
  - type: text
    content: but he will heal us;
  - type: text
    content: he has injured us
  - type: text
    content: but he will bind up our wounds.
  '10':
  - type: text
    content: 'I have seen a horrible thing in Israel:'
  - type: text
    content: There Ephraim is given to prostitution,
  - type: text
    content: Israel is defiled.
  '11':
  - type: text
    content: “Also for you, Judah,
  - type: text
    content: a harvest is appointed.
  - type: text
    content: “Whenever I would restore the fortunes of my people,
  '2':
  - type: text
    content: After two days he will revive us;
  - type: text
    content: on the third day he will restore us,
  - type: text
    content: that we may live in his presence.
  '3':
  - type: text
    content: 'Let us acknowledge the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: let us press on to acknowledge him.
  - type: text
    content: As surely as the sun rises,
  - type: text
    content: he will appear;
  - type: text
    content: he will come to us like the winter rains,
  - type: text
    content: like the spring rains that water the earth.”
  '4':
  - type: text
    content: “What can I do with you, Ephraim?
  - type: text
    content: What can I do with you, Judah?
  - type: text
    content: Your love is like the morning mist,
  - type: text
    content: like the early dew that disappears.
  '5':
  - type: text
    content: Therefore I cut you in pieces with my prophets,
  - type: text
    content: I killed you with the words of my mouth—
  - type: text
    content: then my judgments go forth like the sun.
  - type: note
    content: The meaning of the Hebrew for this line is uncertain.
  '6':
  - type: text
    content: For I desire mercy, not sacrifice,
  - type: text
    content: and acknowledgment of God rather than burnt offerings.
  '7':
  - type: text
    content: As at Adam,
  - type: note
    content: Or Like Adam; or Like human beings
  - type: text
    content: ' they have broken the covenant;'
  - type: text
    content: they were unfaithful to me there.
  '8':
  - type: text
    content: Gilead is a city of evildoers,
  - type: text
    content: stained with footprints of blood.
  '9':
  - type: text
    content: As marauders lie in ambush for a victim,
  - type: text
    content: so do bands of priests;
  - type: text
    content: they murder on the road to Shechem,
  - type: text
    content: carrying out their wicked schemes.
