document_id: JER.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jerusalem Under Siege
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Flee for safety, people of Benjamin!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Flee from Jerusalem!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sound the trumpet in Tekoa!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Raise the signal over Beth Hakkerem!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For disaster looms out of the north,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even terrible destruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I will destroy Daughter Zion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so beautiful and delicate.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Shepherds with their flocks will come against her;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will pitch their tents around her,
- type: usfm
  marker: q2
  children:
  - type: text
    text: each tending his own portion.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Prepare for battle against her!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Arise, let us attack at noon!
- type: usfm
  marker: q1
  children:
  - type: text
    text: But, alas, the daylight is fading,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the shadows of evening grow long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So arise, let us attack at night
- type: usfm
  marker: q2
  children:
  - type: text
    text: and destroy her fortresses!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Cut down the trees
- type: usfm
  marker: q2
  children:
  - type: text
    text: and build siege ramps against Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: text
    text: This city must be punished;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is filled with oppression.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: As a well pours out its water,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so she pours out her wickedness.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Violence and destruction resound in her;
- type: usfm
  marker: q2
  children:
  - type: text
    text: her sickness and wounds are ever before me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Take warning, Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or I will turn away from you
- type: usfm
  marker: q1
  children:
  - type: text
    text: and make your land desolate
- type: usfm
  marker: q2
  children:
  - type: text
    text: so no one can live in it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Let them glean the remnant of Israel
- type: usfm
  marker: q2
  children:
  - type: text
    text: as thoroughly as a vine;
- type: usfm
  marker: q1
  children:
  - type: text
    text: pass your hand over the branches again,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like one gathering grapes.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: To whom can I speak and give warning?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who will listen to me?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their ears are closed
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: uncircumcised
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: so they cannot hear.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is offensive to them;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: they find no pleasure in it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But I am full of the wrath of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I cannot hold it in.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Pour it out on the children in the street
- type: usfm
  marker: q2
  children:
  - type: text
    text: and on the young men gathered together;
- type: usfm
  marker: q1
  children:
  - type: text
    text: both husband and wife will be caught in it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the old, those weighed down with years.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Their houses will be turned over to others,
- type: usfm
  marker: q2
  children:
  - type: text
    text: together with their fields and their wives,
- type: usfm
  marker: q1
  children:
  - type: text
    text: when I stretch out my hand
- type: usfm
  marker: q2
  children:
  - type: text
    text: against those who live in the land,”
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “From the least to the greatest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all are greedy for gain;
- type: usfm
  marker: q1
  children:
  - type: text
    text: prophets and priests alike,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all practice deceit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: They dress the wound of my people
- type: usfm
  marker: q2
  children:
  - type: text
    text: as though it were not serious.
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Peace, peace,’ they say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when there is no peace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Are they ashamed of their detestable conduct?
- type: usfm
  marker: q2
  children:
  - type: text
    text: No, they have no shame at all;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they do not even know how to blush.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So they will fall among the fallen;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will be brought down when I punish them,”
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Stand at the crossroads and look;
- type: usfm
  marker: q2
  children:
  - type: text
    text: ask for the ancient paths,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ask where the good way is, and walk in it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you will find rest for your souls.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But you said, ‘We will not walk in it.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: I appointed watchmen over you and said,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Listen to the sound of the trumpet!’
- type: usfm
  marker: q2
  children:
  - type: text
    text: But you said, ‘We will not listen.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Therefore hear, you nations;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who are witnesses,
- type: usfm
  marker: q2
  children:
  - type: text
    text: observe what will happen to them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hear, you earth:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am bringing disaster on this people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the fruit of their schemes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: because they have not listened to my words
- type: usfm
  marker: q2
  children:
  - type: text
    text: and have rejected my law.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: What do I care about incense from Sheba
- type: usfm
  marker: q2
  children:
  - type: text
    text: or sweet calamus from a distant land?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your burnt offerings are not acceptable;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your sacrifices do not please me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Therefore this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will put obstacles before this people.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Parents and children alike will stumble over them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: neighbors and friends will perish.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Look, an army is coming
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the land of the north;
- type: usfm
  marker: q1
  children:
  - type: text
    text: a great nation is being stirred up
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the ends of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: They are armed with bow and spear;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are cruel and show no mercy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They sound like the roaring sea
- type: usfm
  marker: q2
  children:
  - type: text
    text: as they ride on their horses;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they come like men in battle formation
- type: usfm
  marker: q2
  children:
  - type: text
    text: to attack you, Daughter Zion.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: We have heard reports about them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and our hands hang limp.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Anguish has gripped us,
- type: usfm
  marker: q2
  children:
  - type: text
    text: pain like that of a woman in labor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Do not go out to the fields
- type: usfm
  marker: q2
  children:
  - type: text
    text: or walk on the roads,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for the enemy has a sword,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and there is terror on every side.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Put on sackcloth, my people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and roll in ashes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mourn with bitter wailing
- type: usfm
  marker: q2
  children:
  - type: text
    text: as for an only son,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for suddenly the destroyer
- type: usfm
  marker: q2
  children:
  - type: text
    text: will come upon us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “I have made you a tester of metals
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my people the ore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: that you may observe
- type: usfm
  marker: q2
  children:
  - type: text
    text: and test their ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: They are all hardened rebels,
- type: usfm
  marker: q2
  children:
  - type: text
    text: going about to slander.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are bronze and iron;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they all act corruptly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: The bellows blow fiercely
- type: usfm
  marker: q2
  children:
  - type: text
    text: to burn away the lead with fire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but the refining goes on in vain;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the wicked are not purged out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: They are called rejected silver,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'because the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has rejected them.”'
