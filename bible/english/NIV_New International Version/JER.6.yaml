document_id: JER.6,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem Under Siege
  - type: text
    content: “Flee for safety, people of Benjamin!
  - type: text
    content: Flee from Jerusalem!
  - type: text
    content: Sound the trumpet in Tekoa!
  - type: text
    content: Raise the signal over Beth Hakkerem!
  - type: text
    content: For disaster looms out of the north,
  - type: text
    content: even terrible destruction.
  '10':
  - type: text
    content: To whom can I speak and give warning?
  - type: text
    content: Who will listen to me?
  - type: text
    content: Their ears are closed
  - type: note
    content: Hebrew uncircumcised
  - type: text
    content: so they cannot hear.
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' is offensive to them;'
  - type: text
    content: they find no pleasure in it.
  '11':
  - type: text
    content: 'But I am full of the wrath of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and I cannot hold it in.
  - type: text
    content: “Pour it out on the children in the street
  - type: text
    content: and on the young men gathered together;
  - type: text
    content: both husband and wife will be caught in it,
  - type: text
    content: and the old, those weighed down with years.
  '12':
  - type: text
    content: Their houses will be turned over to others,
  - type: text
    content: together with their fields and their wives,
  - type: text
    content: when I stretch out my hand
  - type: text
    content: against those who live in the land,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '13':
  - type: text
    content: “From the least to the greatest,
  - type: text
    content: all are greedy for gain;
  - type: text
    content: prophets and priests alike,
  - type: text
    content: all practice deceit.
  '14':
  - type: text
    content: They dress the wound of my people
  - type: text
    content: as though it were not serious.
  - type: text
    content: ‘Peace, peace,’ they say,
  - type: text
    content: when there is no peace.
  '15':
  - type: text
    content: Are they ashamed of their detestable conduct?
  - type: text
    content: No, they have no shame at all;
  - type: text
    content: they do not even know how to blush.
  - type: text
    content: So they will fall among the fallen;
  - type: text
    content: they will be brought down when I punish them,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '16':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Stand at the crossroads and look;
  - type: text
    content: ask for the ancient paths,
  - type: text
    content: ask where the good way is, and walk in it,
  - type: text
    content: and you will find rest for your souls.
  - type: text
    content: But you said, ‘We will not walk in it.’
  '17':
  - type: text
    content: I appointed watchmen over you and said,
  - type: text
    content: ‘Listen to the sound of the trumpet!’
  - type: text
    content: But you said, ‘We will not listen.’
  '18':
  - type: text
    content: Therefore hear, you nations;
  - type: text
    content: you who are witnesses,
  - type: text
    content: observe what will happen to them.
  '19':
  - type: text
    content: 'Hear, you earth:'
  - type: text
    content: I am bringing disaster on this people,
  - type: text
    content: the fruit of their schemes,
  - type: text
    content: because they have not listened to my words
  - type: text
    content: and have rejected my law.
  '2':
  - type: text
    content: I will destroy Daughter Zion,
  - type: text
    content: so beautiful and delicate.
  '20':
  - type: text
    content: What do I care about incense from Sheba
  - type: text
    content: or sweet calamus from a distant land?
  - type: text
    content: Your burnt offerings are not acceptable;
  - type: text
    content: your sacrifices do not please me.”
  '21':
  - type: text
    content: 'Therefore this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “I will put obstacles before this people.
  - type: text
    content: Parents and children alike will stumble over them;
  - type: text
    content: neighbors and friends will perish.”
  '22':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Look, an army is coming
  - type: text
    content: from the land of the north;
  - type: text
    content: a great nation is being stirred up
  - type: text
    content: from the ends of the earth.
  '23':
  - type: text
    content: They are armed with bow and spear;
  - type: text
    content: they are cruel and show no mercy.
  - type: text
    content: They sound like the roaring sea
  - type: text
    content: as they ride on their horses;
  - type: text
    content: they come like men in battle formation
  - type: text
    content: to attack you, Daughter Zion.”
  '24':
  - type: text
    content: We have heard reports about them,
  - type: text
    content: and our hands hang limp.
  - type: text
    content: Anguish has gripped us,
  - type: text
    content: pain like that of a woman in labor.
  '25':
  - type: text
    content: Do not go out to the fields
  - type: text
    content: or walk on the roads,
  - type: text
    content: for the enemy has a sword,
  - type: text
    content: and there is terror on every side.
  '26':
  - type: text
    content: Put on sackcloth, my people,
  - type: text
    content: and roll in ashes;
  - type: text
    content: mourn with bitter wailing
  - type: text
    content: as for an only son,
  - type: text
    content: for suddenly the destroyer
  - type: text
    content: will come upon us.
  '27':
  - type: text
    content: “I have made you a tester of metals
  - type: text
    content: and my people the ore,
  - type: text
    content: that you may observe
  - type: text
    content: and test their ways.
  '28':
  - type: text
    content: They are all hardened rebels,
  - type: text
    content: going about to slander.
  - type: text
    content: They are bronze and iron;
  - type: text
    content: they all act corruptly.
  '29':
  - type: text
    content: The bellows blow fiercely
  - type: text
    content: to burn away the lead with fire,
  - type: text
    content: but the refining goes on in vain;
  - type: text
    content: the wicked are not purged out.
  '3':
  - type: text
    content: Shepherds with their flocks will come against her;
  - type: text
    content: they will pitch their tents around her,
  - type: text
    content: each tending his own portion.”
  '30':
  - type: text
    content: They are called rejected silver,
  - type: text
    content: 'because the '
  - type: text
    content: Lord
  - type: text
    content: ' has rejected them.”'
  '4':
  - type: text
    content: “Prepare for battle against her!
  - type: text
    content: Arise, let us attack at noon!
  - type: text
    content: But, alas, the daylight is fading,
  - type: text
    content: and the shadows of evening grow long.
  '5':
  - type: text
    content: So arise, let us attack at night
  - type: text
    content: and destroy her fortresses!”
  '6':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says:'
  - type: text
    content: “Cut down the trees
  - type: text
    content: and build siege ramps against Jerusalem.
  - type: text
    content: This city must be punished;
  - type: text
    content: it is filled with oppression.
  '7':
  - type: text
    content: As a well pours out its water,
  - type: text
    content: so she pours out her wickedness.
  - type: text
    content: Violence and destruction resound in her;
  - type: text
    content: her sickness and wounds are ever before me.
  '8':
  - type: text
    content: Take warning, Jerusalem,
  - type: text
    content: or I will turn away from you
  - type: text
    content: and make your land desolate
  - type: text
    content: so no one can live in it.”
  '9':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says:'
  - type: text
    content: “Let them glean the remnant of Israel
  - type: text
    content: as thoroughly as a vine;
  - type: text
    content: pass your hand over the branches again,
  - type: text
    content: like one gathering grapes.”
