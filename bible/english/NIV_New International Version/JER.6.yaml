document_id: JER.6,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jerusalem Under Siege
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Flee for safety, people of Benjamin!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Flee from Jerusalem!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sound the trumpet in Tekoa!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Raise the signal over Beth Hakkerem!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For disaster looms out of the north,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even terrible destruction.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To whom can I speak and give warning?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who will listen to me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their ears are closed
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: uncircumcised
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so they cannot hear.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is offensive to them;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they find no pleasure in it.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But I am full of the wrath of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I cannot hold it in.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Pour it out on the children in the street
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and on the young men gathered together;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: both husband and wife will be caught in it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the old, those weighed down with years.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their houses will be turned over to others,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: together with their fields and their wives,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when I stretch out my hand
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against those who live in the land,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “From the least to the greatest,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all are greedy for gain;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prophets and priests alike,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all practice deceit.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They dress the wound of my people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as though it were not serious.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Peace, peace,’ they say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when there is no peace.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are they ashamed of their detestable conduct?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: No, they have no shame at all;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they do not even know how to blush.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So they will fall among the fallen;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will be brought down when I punish them,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Stand at the crossroads and look;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ask for the ancient paths,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ask where the good way is, and walk in it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will find rest for your souls.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But you said, ‘We will not walk in it.’
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I appointed watchmen over you and said,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Listen to the sound of the trumpet!’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But you said, ‘We will not listen.’
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore hear, you nations;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who are witnesses,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: observe what will happen to them.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hear, you earth:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am bringing disaster on this people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the fruit of their schemes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because they have not listened to my words
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have rejected my law.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will destroy Daughter Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so beautiful and delicate.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What do I care about incense from Sheba
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or sweet calamus from a distant land?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your burnt offerings are not acceptable;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your sacrifices do not please me.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will put obstacles before this people.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Parents and children alike will stumble over them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: neighbors and friends will perish.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Look, an army is coming
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the land of the north;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a great nation is being stirred up
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the ends of the earth.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are armed with bow and spear;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are cruel and show no mercy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They sound like the roaring sea
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as they ride on their horses;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they come like men in battle formation
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to attack you, Daughter Zion.”
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We have heard reports about them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and our hands hang limp.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Anguish has gripped us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pain like that of a woman in labor.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not go out to the fields
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or walk on the roads,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for the enemy has a sword,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there is terror on every side.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Put on sackcloth, my people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and roll in ashes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mourn with bitter wailing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as for an only son,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for suddenly the destroyer
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will come upon us.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I have made you a tester of metals
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my people the ore,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that you may observe
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and test their ways.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are all hardened rebels,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: going about to slander.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are bronze and iron;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they all act corruptly.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The bellows blow fiercely
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to burn away the lead with fire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but the refining goes on in vain;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wicked are not purged out.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Shepherds with their flocks will come against her;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will pitch their tents around her,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: each tending his own portion.”
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are called rejected silver,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has rejected them.”'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Prepare for battle against her!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Arise, let us attack at noon!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But, alas, the daylight is fading,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the shadows of evening grow long.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So arise, let us attack at night
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and destroy her fortresses!”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Cut down the trees
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and build siege ramps against Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This city must be punished;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it is filled with oppression.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As a well pours out its water,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so she pours out her wickedness.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Violence and destruction resound in her;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her sickness and wounds are ever before me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take warning, Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or I will turn away from you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and make your land desolate
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so no one can live in it.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Let them glean the remnant of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as thoroughly as a vine;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pass your hand over the branches again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like one gathering grapes.”
