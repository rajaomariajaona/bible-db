document_id: MIC.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Promised Ruler From Bethlehem
  - type: note
    content: In Hebrew texts 5:1 is numbered 4:14, and 5:2-15 is numbered 5:1-14.
  - type: text
    content: Marshal your troops now, city of troops,
  - type: text
    content: for a siege is laid against us.
  - type: text
    content: They will strike Israel’s ruler
  - type: text
    content: on the cheek with a rod.
  '10':
  - type: text
    content: '“In that day,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “I will destroy your horses from among you
  - type: text
    content: and demolish your chariots.
  '11':
  - type: text
    content: I will destroy the cities of your land
  - type: text
    content: and tear down all your strongholds.
  '12':
  - type: text
    content: I will destroy your witchcraft
  - type: text
    content: and you will no longer cast spells.
  '13':
  - type: text
    content: I will destroy your idols
  - type: text
    content: and your sacred stones from among you;
  - type: text
    content: you will no longer bow down
  - type: text
    content: to the work of your hands.
  '14':
  - type: text
    content: I will uproot from among you your Asherah poles
  - type: note
    content: That is, wooden symbols of the goddess Asherah
  - type: text
    content: when I demolish your cities.
  '15':
  - type: text
    content: I will take vengeance in anger and wrath
  - type: text
    content: on the nations that have not obeyed me.”
  '2':
  - type: text
    content: “But you, Bethlehem Ephrathah,
  - type: text
    content: though you are small among the clans
  - type: note
    content: Or rulers
  - type: text
    content: ' of Judah,'
  - type: text
    content: out of you will come for me
  - type: text
    content: one who will be ruler over Israel,
  - type: text
    content: whose origins are from of old,
  - type: text
    content: from ancient times.”
  '3':
  - type: text
    content: Therefore Israel will be abandoned
  - type: text
    content: until the time when she who is in labor bears a son,
  - type: text
    content: and the rest of his brothers return
  - type: text
    content: to join the Israelites.
  '4':
  - type: text
    content: He will stand and shepherd his flock
  - type: text
    content: 'in the strength of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'in the majesty of the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God.'
  - type: text
    content: And they will live securely, for then his greatness
  - type: text
    content: will reach to the ends of the earth.
  '5':
  - type: text
    content: And he will be our peace
  - type: text
    content: when the Assyrians invade our land
  - type: text
    content: and march through our fortresses.
  - type: text
    content: We will raise against them seven shepherds,
  - type: text
    content: even eight commanders,
  '6':
  - type: text
    content: who will rule
  - type: note
    content: Or crush
  - type: text
    content: ' the land of Assyria with the sword,'
  - type: text
    content: the land of Nimrod with drawn sword.
  - type: note
    content: Or Nimrod in its gates
  - type: text
    content: He will deliver us from the Assyrians
  - type: text
    content: when they invade our land
  - type: text
    content: and march across our borders.
  '7':
  - type: text
    content: The remnant of Jacob will be
  - type: text
    content: in the midst of many peoples
  - type: text
    content: 'like dew from the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: like showers on the grass,
  - type: text
    content: which do not wait for anyone
  - type: text
    content: or depend on man.
  '8':
  - type: text
    content: The remnant of Jacob will be among the nations,
  - type: text
    content: in the midst of many peoples,
  - type: text
    content: like a lion among the beasts of the forest,
  - type: text
    content: like a young lion among flocks of sheep,
  - type: text
    content: which mauls and mangles as it goes,
  - type: text
    content: and no one can rescue.
  '9':
  - type: text
    content: Your hand will be lifted up in triumph over your enemies,
  - type: text
    content: and all your foes will be destroyed.
