document_id: MIC.5,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Promised Ruler From Bethlehem
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:0 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 5:1 is numbered 4:14, and 5:2-15 is numbered 5:1-14.
      marker-yv: yv-n
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Marshal your troops now, city of troops,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for a siege is laid against us.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will strike Israel’s ruler
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the cheek with a rod.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“In that day,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will destroy your horses from among you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and demolish your chariots.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: I will destroy the cities of your land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and tear down all your strongholds.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: I will destroy your witchcraft
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will no longer cast spells.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: I will destroy your idols
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your sacred stones from among you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will no longer bow down
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the work of your hands.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I will uproot from among you your Asherah poles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, wooden symbols of the goddess Asherah
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I demolish your cities.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: I will take vengeance in anger and wrath
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the nations that have not obeyed me.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “But you, Bethlehem Ephrathah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though you are small among the clans
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: rulers
      marker-yv: yv-n
    - type: text
      text: ' of Judah,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: out of you will come for me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: one who will be ruler over Israel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: whose origins are from of old,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from ancient times.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Therefore Israel will be abandoned
  - type: usfm
    marker: q2
    children:
    - type: text
      text: until the time when she who is in labor bears a son,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the rest of his brothers return
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to join the Israelites.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: He will stand and shepherd his flock
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'in the strength of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'in the majesty of the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And they will live securely, for then his greatness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will reach to the ends of the earth.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: And he will be our peace
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when the Assyrians invade our land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and march through our fortresses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We will raise against them seven shepherds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even eight commanders,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: who will rule
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: crush
      marker-yv: yv-n
    - type: text
      text: ' the land of Assyria with the sword,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the land of Nimrod with drawn sword.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Nimrod in its gates
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will deliver us from the Assyrians
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they invade our land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and march across our borders.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: The remnant of Jacob will be
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the midst of many peoples
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'like dew from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like showers on the grass,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: which do not wait for anyone
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or depend on man.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The remnant of Jacob will be among the nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the midst of many peoples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a lion among the beasts of the forest,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a young lion among flocks of sheep,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: which mauls and mangles as it goes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one can rescue.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Your hand will be lifted up in triumph over your enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all your foes will be destroyed.
