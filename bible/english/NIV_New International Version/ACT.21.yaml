document_id: ACT.21,111
type_code: eng
verses:
  '1':
  - type: heading
    content: On to Jerusalem
  - type: text
    content: 'After we had torn ourselves away from them, we put out to sea and sailed straight to Kos. The next day we went to Rhodes and from there to Patara. '
  '10':
  - type: text
    content: 'After we had been there a number of days, a prophet named Agabus came down from Judea. '
  '11':
  - type: text
    content: Coming over to us, he took Paul’s belt, tied his own hands and feet with it and said, “The Holy Spirit says, ‘In this way the Jewish leaders in Jerusalem will bind the owner of this belt and will hand him over to the Gentiles.’ ”
  '12':
  - type: text
    content: 'When we heard this, we and the people there pleaded with Paul not to go up to Jerusalem. '
  '13':
  - type: text
    content: 'Then Paul answered, “Why are you weeping and breaking my heart? I am ready not only to be bound, but also to die in Jerusalem for the name of the Lord Jesus.” '
  '14':
  - type: text
    content: When he would not be dissuaded, we gave up and said, “The Lord’s will be done.”
  '15':
  - type: text
    content: 'After this, we started on our way up to Jerusalem. '
  '16':
  - type: text
    content: Some of the disciples from Caesarea accompanied us and brought us to the home of Mnason, where we were to stay. He was a man from Cyprus and one of the early disciples.
  - type: heading
    content: Paul’s Arrival at Jerusalem
  '17':
  - type: text
    content: 'When we arrived at Jerusalem, the brothers and sisters received us warmly. '
  '18':
  - type: text
    content: 'The next day Paul and the rest of us went to see James, and all the elders were present. '
  '19':
  - type: text
    content: Paul greeted them and reported in detail what God had done among the Gentiles through his ministry.
  '2':
  - type: text
    content: 'We found a ship crossing over to Phoenicia, went on board and set sail. '
  '20':
  - type: text
    content: 'When they heard this, they praised God. Then they said to Paul: “You see, brother, how many thousands of Jews have believed, and all of them are zealous for the law. '
  '21':
  - type: text
    content: 'They have been informed that you teach all the Jews who live among the Gentiles to turn away from Moses, telling them not to circumcise their children or live according to our customs. '
  '22':
  - type: text
    content: 'What shall we do? They will certainly hear that you have come, '
  '23':
  - type: text
    content: 'so do what we tell you. There are four men with us who have made a vow. '
  '24':
  - type: text
    content: 'Take these men, join in their purification rites and pay their expenses, so that they can have their heads shaved. Then everyone will know there is no truth in these reports about you, but that you yourself are living in obedience to the law. '
  '25':
  - type: text
    content: As for the Gentile believers, we have written to them our decision that they should abstain from food sacrificed to idols, from blood, from the meat of strangled animals and from sexual immorality.”
  '26':
  - type: text
    content: The next day Paul took the men and purified himself along with them. Then he went to the temple to give notice of the date when the days of purification would end and the offering would be made for each of them.
  - type: heading
    content: Paul Arrested
  '27':
  - type: text
    content: 'When the seven days were nearly over, some Jews from the province of Asia saw Paul at the temple. They stirred up the whole crowd and seized him, '
  '28':
  - type: text
    content: 'shouting, “Fellow Israelites, help us! This is the man who teaches everyone everywhere against our people and our law and this place. And besides, he has brought Greeks into the temple and defiled this holy place.” '
  '29':
  - type: text
    content: (They had previously seen Trophimus the Ephesian in the city with Paul and assumed that Paul had brought him into the temple.)
  '3':
  - type: text
    content: 'After sighting Cyprus and passing to the south of it, we sailed on to Syria. We landed at Tyre, where our ship was to unload its cargo. '
  '30':
  - type: text
    content: 'The whole city was aroused, and the people came running from all directions. Seizing Paul, they dragged him from the temple, and immediately the gates were shut. '
  '31':
  - type: text
    content: 'While they were trying to kill him, news reached the commander of the Roman troops that the whole city of Jerusalem was in an uproar. '
  '32':
  - type: text
    content: He at once took some officers and soldiers and ran down to the crowd. When the rioters saw the commander and his soldiers, they stopped beating Paul.
  '33':
  - type: text
    content: 'The commander came up and arrested him and ordered him to be bound with two chains. Then he asked who he was and what he had done. '
  '34':
  - type: text
    content: 'Some in the crowd shouted one thing and some another, and since the commander could not get at the truth because of the uproar, he ordered that Paul be taken into the barracks. '
  '35':
  - type: text
    content: 'When Paul reached the steps, the violence of the mob was so great he had to be carried by the soldiers. '
  '36':
  - type: text
    content: The crowd that followed kept shouting, “Get rid of him!”
  - type: heading
    content: Paul Speaks to the Crowd
  '37':
  - type: text
    content: As the soldiers were about to take Paul into the barracks, he asked the commander, “May I say something to you?”
  - type: text
    content: '“Do you speak Greek?” he replied. '
  '38':
  - type: text
    content: “Aren’t you the Egyptian who started a revolt and led four thousand terrorists out into the wilderness some time ago?”
  '39':
  - type: text
    content: Paul answered, “I am a Jew, from Tarsus in Cilicia, a citizen of no ordinary city. Please let me speak to the people.”
  '4':
  - type: text
    content: 'We sought out the disciples there and stayed with them seven days. Through the Spirit they urged Paul not to go on to Jerusalem. '
  '40':
  - type: text
    content: After receiving the commander’s permission, Paul stood on the steps and motioned to the crowd. When they were all silent, he said to them in Aramaic
  - type: note
    content: Or possibly Hebrew; also in 22:2
  - type: text
    content: ':'
  '5':
  - type: text
    content: 'When it was time to leave, we left and continued on our way. All of them, including wives and children, accompanied us out of the city, and there on the beach we knelt to pray. '
  '6':
  - type: text
    content: After saying goodbye to each other, we went aboard the ship, and they returned home.
  '7':
  - type: text
    content: 'We continued our voyage from Tyre and landed at Ptolemais, where we greeted the brothers and sisters and stayed with them for a day. '
  '8':
  - type: text
    content: 'Leaving the next day, we reached Caesarea and stayed at the house of Philip the evangelist, one of the Seven. '
  '9':
  - type: text
    content: He had four unmarried daughters who prophesied.
