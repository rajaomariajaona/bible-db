document_id: NAM.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Nineveh to Fall
  - type: note
    content: In Hebrew texts 2:1-13 is numbered 2:2-14.
  - type: text
    content: An attacker advances against you, Nineveh.
  - type: text
    content: Guard the fortress,
  - type: text
    content: watch the road,
  - type: text
    content: brace yourselves,
  - type: text
    content: marshal all your strength!
  '10':
  - type: text
    content: She is pillaged, plundered, stripped!
  - type: text
    content: Hearts melt, knees give way,
  - type: text
    content: bodies tremble, every face grows pale.
  '11':
  - type: text
    content: Where now is the lions’ den,
  - type: text
    content: the place where they fed their young,
  - type: text
    content: where the lion and lioness went,
  - type: text
    content: and the cubs, with nothing to fear?
  '12':
  - type: text
    content: The lion killed enough for his cubs
  - type: text
    content: and strangled the prey for his mate,
  - type: text
    content: filling his lairs with the kill
  - type: text
    content: and his dens with the prey.
  '13':
  - type: text
    content: “I am against you,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  - type: text
    content: “I will burn up your chariots in smoke,
  - type: text
    content: and the sword will devour your young lions.
  - type: text
    content: I will leave you no prey on the earth.
  - type: text
    content: The voices of your messengers
  - type: text
    content: will no longer be heard.”
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will restore the splendor of Jacob'
  - type: text
    content: like the splendor of Israel,
  - type: text
    content: though destroyers have laid them waste
  - type: text
    content: and have ruined their vines.
  '3':
  - type: text
    content: The shields of the soldiers are red;
  - type: text
    content: the warriors are clad in scarlet.
  - type: text
    content: The metal on the chariots flashes
  - type: text
    content: on the day they are made ready;
  - type: text
    content: the spears of juniper are brandished.
  - type: note
    content: Hebrew; Septuagint and Syriac ready; / the horsemen rush to and fro.
  '4':
  - type: text
    content: The chariots storm through the streets,
  - type: text
    content: rushing back and forth through the squares.
  - type: text
    content: They look like flaming torches;
  - type: text
    content: they dart about like lightning.
  '5':
  - type: text
    content: Nineveh summons her picked troops,
  - type: text
    content: yet they stumble on their way.
  - type: text
    content: They dash to the city wall;
  - type: text
    content: the protective shield is put in place.
  '6':
  - type: text
    content: The river gates are thrown open
  - type: text
    content: and the palace collapses.
  '7':
  - type: text
    content: It is decreed
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' that Nineveh'
  - type: text
    content: be exiled and carried away.
  - type: text
    content: Her female slaves moan like doves
  - type: text
    content: and beat on their breasts.
  '8':
  - type: text
    content: Nineveh is like a pool
  - type: text
    content: whose water is draining away.
  - type: text
    content: “Stop! Stop!” they cry,
  - type: text
    content: but no one turns back.
  '9':
  - type: text
    content: Plunder the silver!
  - type: text
    content: Plunder the gold!
  - type: text
    content: The supply is endless,
  - type: text
    content: the wealth from all its treasures!
