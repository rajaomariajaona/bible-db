document_id: NAM.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nineveh to Fall
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 2:1-13 is numbered 2:2-14.
    marker-yv: yv-n
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: An attacker advances against you, Nineveh.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Guard the fortress,
- type: usfm
  marker: q2
  children:
  - type: text
    text: watch the road,
- type: usfm
  marker: q2
  children:
  - type: text
    text: brace yourselves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: marshal all your strength!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will restore the splendor of Jacob'
- type: usfm
  marker: q2
  children:
  - type: text
    text: like the splendor of Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: though destroyers have laid them waste
- type: usfm
  marker: q2
  children:
  - type: text
    text: and have ruined their vines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The shields of the soldiers are red;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the warriors are clad in scarlet.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The metal on the chariots flashes
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the day they are made ready;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the spears of juniper are brandished.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew; Septuagint and Syriac '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ready; / the horsemen rush to and fro.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The chariots storm through the streets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: rushing back and forth through the squares.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They look like flaming torches;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they dart about like lightning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Nineveh summons her picked troops,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet they stumble on their way.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They dash to the city wall;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the protective shield is put in place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The river gates are thrown open
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the palace collapses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: It is decreed
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this word is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' that Nineveh'
- type: usfm
  marker: q2
  children:
  - type: text
    text: be exiled and carried away.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Her female slaves moan like doves
- type: usfm
  marker: q2
  children:
  - type: text
    text: and beat on their breasts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nineveh is like a pool
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose water is draining away.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Stop! Stop!” they cry,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but no one turns back.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Plunder the silver!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Plunder the gold!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The supply is endless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the wealth from all its treasures!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: She is pillaged, plundered, stripped!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Hearts melt, knees give way,
- type: usfm
  marker: q2
  children:
  - type: text
    text: bodies tremble, every face grows pale.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Where now is the lions’ den,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the place where they fed their young,
- type: usfm
  marker: q1
  children:
  - type: text
    text: where the lion and lioness went,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the cubs, with nothing to fear?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The lion killed enough for his cubs
- type: usfm
  marker: q2
  children:
  - type: text
    text: and strangled the prey for his mate,
- type: usfm
  marker: q1
  children:
  - type: text
    text: filling his lairs with the kill
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his dens with the prey.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “I am against you,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will burn up your chariots in smoke,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the sword will devour your young lions.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will leave you no prey on the earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The voices of your messengers
- type: usfm
  marker: q2
  children:
  - type: text
    text: will no longer be heard.”
