document_id: JOB.26,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Job
  - type: text
    content: 'Then Job replied:'
  '10':
  - type: text
    content: He marks out the horizon on the face of the waters
  - type: text
    content: for a boundary between light and darkness.
  '11':
  - type: text
    content: The pillars of the heavens quake,
  - type: text
    content: aghast at his rebuke.
  '12':
  - type: text
    content: By his power he churned up the sea;
  - type: text
    content: by his wisdom he cut Rahab to pieces.
  '13':
  - type: text
    content: By his breath the skies became fair;
  - type: text
    content: his hand pierced the gliding serpent.
  '14':
  - type: text
    content: And these are but the outer fringe of his works;
  - type: text
    content: how faint the whisper we hear of him!
  - type: text
    content: Who then can understand the thunder of his power?”
  '2':
  - type: text
    content: “How you have helped the powerless!
  - type: text
    content: How you have saved the arm that is feeble!
  '3':
  - type: text
    content: What advice you have offered to one without wisdom!
  - type: text
    content: And what great insight you have displayed!
  '4':
  - type: text
    content: Who has helped you utter these words?
  - type: text
    content: And whose spirit spoke from your mouth?
  '5':
  - type: text
    content: “The dead are in deep anguish,
  - type: text
    content: those beneath the waters and all that live in them.
  '6':
  - type: text
    content: The realm of the dead is naked before God;
  - type: text
    content: Destruction
  - type: note
    content: Hebrew Abaddon
  - type: text
    content: ' lies uncovered.'
  '7':
  - type: text
    content: He spreads out the northern skies over empty space;
  - type: text
    content: he suspends the earth over nothing.
  '8':
  - type: text
    content: He wraps up the waters in his clouds,
  - type: text
    content: yet the clouds do not burst under their weight.
  '9':
  - type: text
    content: He covers the face of the full moon,
  - type: text
    content: spreading his clouds over it.
