document_id: JOB.26
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Job replied:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “How you have helped the powerless!
- type: usfm
  marker: q2
  children:
  - type: text
    text: How you have saved the arm that is feeble!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: What advice you have offered to one without wisdom!
- type: usfm
  marker: q2
  children:
  - type: text
    text: And what great insight you have displayed!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Who has helped you utter these words?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And whose spirit spoke from your mouth?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “The dead are in deep anguish,
- type: usfm
  marker: q2
  children:
  - type: text
    text: those beneath the waters and all that live in them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The realm of the dead is naked before God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Destruction
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Abaddon
    marker-yv: yv-n
  - type: text
    text: ' lies uncovered.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: He spreads out the northern skies over empty space;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he suspends the earth over nothing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He wraps up the waters in his clouds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet the clouds do not burst under their weight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He covers the face of the full moon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: spreading his clouds over it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He marks out the horizon on the face of the waters
- type: usfm
  marker: q2
  children:
  - type: text
    text: for a boundary between light and darkness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The pillars of the heavens quake,
- type: usfm
  marker: q2
  children:
  - type: text
    text: aghast at his rebuke.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: By his power he churned up the sea;
- type: usfm
  marker: q2
  children:
  - type: text
    text: by his wisdom he cut Rahab to pieces.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: By his breath the skies became fair;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his hand pierced the gliding serpent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: And these are but the outer fringe of his works;
- type: usfm
  marker: q2
  children:
  - type: text
    text: how faint the whisper we hear of him!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who then can understand the thunder of his power?”
