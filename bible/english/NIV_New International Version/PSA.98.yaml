- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Sing to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' a new song,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: for he has done marvelous things;
- type: usfm
  marker: q1
  children:
  - type: text
    text: his right hand and his holy arm
- type: usfm
  marker: q2
  children:
  - type: text
    text: have worked salvation for him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has made his salvation known'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and revealed his righteousness to the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: He has remembered his love
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his faithfulness to Israel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: all the ends of the earth have seen
- type: usfm
  marker: q2
  children:
  - type: text
    text: the salvation of our God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Shout for joy to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', all the earth,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: burst into jubilant song with music;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'make music to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' with the harp,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: with the harp and the sound of singing,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: with trumpets and the blast of the ram’s horn—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'shout for joy before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the King.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Let the sea resound, and everything in it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the world, and all who live in it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Let the rivers clap their hands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: let the mountains sing together for joy;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'let them sing before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: for he comes to judge the earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will judge the world in righteousness
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the peoples with equity.
