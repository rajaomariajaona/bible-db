document_id: PSA.98,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 98
  - type: text
    content: A psalm.
  - type: text
    content: 'Sing to the '
  - type: text
    content: Lord
  - type: text
    content: ' a new song,'
  - type: text
    content: for he has done marvelous things;
  - type: text
    content: his right hand and his holy arm
  - type: text
    content: have worked salvation for him.
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has made his salvation known'
  - type: text
    content: and revealed his righteousness to the nations.
  '3':
  - type: text
    content: He has remembered his love
  - type: text
    content: and his faithfulness to Israel;
  - type: text
    content: all the ends of the earth have seen
  - type: text
    content: the salvation of our God.
  '4':
  - type: text
    content: 'Shout for joy to the '
  - type: text
    content: Lord
  - type: text
    content: ', all the earth,'
  - type: text
    content: burst into jubilant song with music;
  '5':
  - type: text
    content: 'make music to the '
  - type: text
    content: Lord
  - type: text
    content: ' with the harp,'
  - type: text
    content: with the harp and the sound of singing,
  '6':
  - type: text
    content: with trumpets and the blast of the ram’s horn—
  - type: text
    content: 'shout for joy before the '
  - type: text
    content: Lord
  - type: text
    content: ', the King.'
  '7':
  - type: text
    content: Let the sea resound, and everything in it,
  - type: text
    content: the world, and all who live in it.
  '8':
  - type: text
    content: Let the rivers clap their hands,
  - type: text
    content: let the mountains sing together for joy;
  '9':
  - type: text
    content: 'let them sing before the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for he comes to judge the earth.
  - type: text
    content: He will judge the world in righteousness
  - type: text
    content: and the peoples with equity.
