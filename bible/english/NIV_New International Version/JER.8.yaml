document_id: JER.8,111
type_code: eng
verses:
  '1':
  - type: text
    content: '“ ‘At that time, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', the bones of the kings and officials of Judah, the bones of the priests and prophets, and the bones of the people of Jerusalem will be removed from their graves. '
  '10':
  - type: text
    content: Therefore I will give their wives to other men
  - type: text
    content: and their fields to new owners.
  - type: text
    content: From the least to the greatest,
  - type: text
    content: all are greedy for gain;
  - type: text
    content: prophets and priests alike,
  - type: text
    content: all practice deceit.
  '11':
  - type: text
    content: They dress the wound of my people
  - type: text
    content: as though it were not serious.
  - type: text
    content: “Peace, peace,” they say,
  - type: text
    content: when there is no peace.
  '12':
  - type: text
    content: Are they ashamed of their detestable conduct?
  - type: text
    content: No, they have no shame at all;
  - type: text
    content: they do not even know how to blush.
  - type: text
    content: So they will fall among the fallen;
  - type: text
    content: they will be brought down when they are punished,
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '13':
  - type: text
    content: “ ‘I will take away their harvest,
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: There will be no grapes on the vine.
  - type: text
    content: There will be no figs on the tree,
  - type: text
    content: and their leaves will wither.
  - type: text
    content: What I have given them
  - type: text
    content: will be taken from them.
  - type: note
    content: The meaning of the Hebrew for this sentence is uncertain.
  - type: text
    content: ’ ”
  '14':
  - type: text
    content: Why are we sitting here?
  - type: text
    content: Gather together!
  - type: text
    content: Let us flee to the fortified cities
  - type: text
    content: and perish there!
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' our God has doomed us to perish'
  - type: text
    content: and given us poisoned water to drink,
  - type: text
    content: because we have sinned against him.
  '15':
  - type: text
    content: We hoped for peace
  - type: text
    content: but no good has come,
  - type: text
    content: for a time of healing
  - type: text
    content: but there is only terror.
  '16':
  - type: text
    content: The snorting of the enemy’s horses
  - type: text
    content: is heard from Dan;
  - type: text
    content: at the neighing of their stallions
  - type: text
    content: the whole land trembles.
  - type: text
    content: They have come to devour
  - type: text
    content: the land and everything in it,
  - type: text
    content: the city and all who live there.
  '17':
  - type: text
    content: “See, I will send venomous snakes among you,
  - type: text
    content: vipers that cannot be charmed,
  - type: text
    content: and they will bite you,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '18':
  - type: text
    content: You who are my Comforter
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' in sorrow,'
  - type: text
    content: my heart is faint within me.
  '19':
  - type: text
    content: Listen to the cry of my people
  - type: text
    content: 'from a land far away:'
  - type: text
    content: '“Is the '
  - type: text
    content: Lord
  - type: text
    content: ' not in Zion?'
  - type: text
    content: Is her King no longer there?”
  - type: text
    content: “Why have they aroused my anger with their images,
  - type: text
    content: with their worthless foreign idols?”
  '2':
  - type: text
    content: 'They will be exposed to the sun and the moon and all the stars of the heavens, which they have loved and served and which they have followed and consulted and worshiped. They will not be gathered up or buried, but will be like dung lying on the ground. '
  '20':
  - type: text
    content: “The harvest is past,
  - type: text
    content: the summer has ended,
  - type: text
    content: and we are not saved.”
  '21':
  - type: text
    content: Since my people are crushed, I am crushed;
  - type: text
    content: I mourn, and horror grips me.
  '22':
  - type: text
    content: Is there no balm in Gilead?
  - type: text
    content: Is there no physician there?
  - type: text
    content: Why then is there no healing
  - type: text
    content: for the wound of my people?
  '3':
  - type: text
    content: 'Wherever I banish them, all the survivors of this evil nation will prefer death to life, declares the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.’'
  - type: heading
    content: Sin and Punishment
  '4':
  - type: text
    content: '“Say to them, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘When people fall down, do they not get up?
  - type: text
    content: When someone turns away, do they not return?
  '5':
  - type: text
    content: Why then have these people turned away?
  - type: text
    content: Why does Jerusalem always turn away?
  - type: text
    content: They cling to deceit;
  - type: text
    content: they refuse to return.
  '6':
  - type: text
    content: I have listened attentively,
  - type: text
    content: but they do not say what is right.
  - type: text
    content: None of them repent of their wickedness,
  - type: text
    content: saying, “What have I done?”
  - type: text
    content: Each pursues their own course
  - type: text
    content: like a horse charging into battle.
  '7':
  - type: text
    content: Even the stork in the sky
  - type: text
    content: knows her appointed seasons,
  - type: text
    content: and the dove, the swift and the thrush
  - type: text
    content: observe the time of their migration.
  - type: text
    content: But my people do not know
  - type: text
    content: 'the requirements of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '8':
  - type: text
    content: “ ‘How can you say, “We are wise,
  - type: text
    content: 'for we have the law of the '
  - type: text
    content: Lord
  - type: text
    content: ',”'
  - type: text
    content: when actually the lying pen of the scribes
  - type: text
    content: has handled it falsely?
  '9':
  - type: text
    content: The wise will be put to shame;
  - type: text
    content: they will be dismayed and trapped.
  - type: text
    content: 'Since they have rejected the word of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: what kind of wisdom do they have?
