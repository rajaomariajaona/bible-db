document_id: JER.8
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '“ ‘At that time, declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the bones of the kings and officials of Judah, the bones of the priests and prophets, and the bones of the people of Jerusalem will be removed from their graves. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'They will be exposed to the sun and the moon and all the stars of the heavens, which they have loved and served and which they have followed and consulted and worshiped. They will not be gathered up or buried, but will be like dung lying on the ground. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Wherever I banish them, all the survivors of this evil nation will prefer death to life, declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty.’'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sin and Punishment
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“Say to them, ‘This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘When people fall down, do they not get up?
- type: usfm
  marker: q2
  children:
  - type: text
    text: When someone turns away, do they not return?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Why then have these people turned away?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why does Jerusalem always turn away?
- type: usfm
  marker: q1
  children:
  - type: text
    text: They cling to deceit;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they refuse to return.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I have listened attentively,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they do not say what is right.
- type: usfm
  marker: q1
  children:
  - type: text
    text: None of them repent of their wickedness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: saying, “What have I done?”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Each pursues their own course
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a horse charging into battle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Even the stork in the sky
- type: usfm
  marker: q2
  children:
  - type: text
    text: knows her appointed seasons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and the dove, the swift and the thrush
- type: usfm
  marker: q2
  children:
  - type: text
    text: observe the time of their migration.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But my people do not know
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the requirements of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “ ‘How can you say, “We are wise,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for we have the law of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ',”'
- type: usfm
  marker: q1
  children:
  - type: text
    text: when actually the lying pen of the scribes
- type: usfm
  marker: q2
  children:
  - type: text
    text: has handled it falsely?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The wise will be put to shame;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will be dismayed and trapped.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Since they have rejected the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: what kind of wisdom do they have?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Therefore I will give their wives to other men
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their fields to new owners.
- type: usfm
  marker: q1
  children:
  - type: text
    text: From the least to the greatest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all are greedy for gain;
- type: usfm
  marker: q1
  children:
  - type: text
    text: prophets and priests alike,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all practice deceit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They dress the wound of my people
- type: usfm
  marker: q2
  children:
  - type: text
    text: as though it were not serious.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Peace, peace,” they say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when there is no peace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Are they ashamed of their detestable conduct?
- type: usfm
  marker: q2
  children:
  - type: text
    text: No, they have no shame at all;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they do not even know how to blush.
- type: usfm
  marker: q1
  children:
  - type: text
    text: So they will fall among the fallen;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will be brought down when they are punished,
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “ ‘I will take away their harvest,
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: There will be no grapes on the vine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: There will be no figs on the tree,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their leaves will wither.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What I have given them
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be taken from them.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this sentence is uncertain.
    marker-yv: yv-n
  - type: text
    text: ’ ”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Why are we sitting here?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Gather together!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let us flee to the fortified cities
- type: usfm
  marker: q2
  children:
  - type: text
    text: and perish there!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God has doomed us to perish'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and given us poisoned water to drink,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because we have sinned against him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: We hoped for peace
- type: usfm
  marker: q2
  children:
  - type: text
    text: but no good has come,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for a time of healing
- type: usfm
  marker: q2
  children:
  - type: text
    text: but there is only terror.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The snorting of the enemy’s horses
- type: usfm
  marker: q2
  children:
  - type: text
    text: is heard from Dan;
- type: usfm
  marker: q1
  children:
  - type: text
    text: at the neighing of their stallions
- type: usfm
  marker: q2
  children:
  - type: text
    text: the whole land trembles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They have come to devour
- type: usfm
  marker: q2
  children:
  - type: text
    text: the land and everything in it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the city and all who live there.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “See, I will send venomous snakes among you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: vipers that cannot be charmed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they will bite you,”
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: You who are my Comforter
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this word is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' in sorrow,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: my heart is faint within me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Listen to the cry of my people
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'from a land far away:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“Is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' not in Zion?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Is her King no longer there?”
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Why have they aroused my anger with their images,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with their worthless foreign idols?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “The harvest is past,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the summer has ended,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and we are not saved.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Since my people are crushed, I am crushed;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I mourn, and horror grips me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Is there no balm in Gilead?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Is there no physician there?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why then is there no healing
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the wound of my people?
