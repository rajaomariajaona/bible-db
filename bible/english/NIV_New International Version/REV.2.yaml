document_id: REV.2,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Church in Ephesus
    marker-yv: yv-h
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “To the angel
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: messenger
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verses 8, 12 and 18
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'of the church in Ephesus write:'
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: These are the words of him who holds the seven stars in his right hand and walks among the seven golden lampstands.
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Do not be afraid of what you are about to suffer. I tell you, the devil will put some of you in prison to test you, and you will suffer persecution for ten days. Be faithful, even to the point of death, and I will give you life as your victor’s crown.
  '11':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whoever has ears, let them hear what the Spirit says to the churches. The one who is victorious will not be hurt at all by the second death.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Church in Pergamum
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“To the angel of the church in Pergamum write:'
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: These are the words of him who has the sharp, double-edged sword.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I know where you live—where Satan has his throne. Yet you remain true to my name. You did not renounce your faith in me, not even in the days of Antipas, my faithful witness, who was put to death in your city—where Satan lives.
  '14':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Nevertheless, I have a few things against you: There are some among you who hold to the teaching of Balaam, who taught Balak to entice the Israelites to sin so that they ate food sacrificed to idols and committed sexual immorality.'
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Likewise, you also have those who hold to the teaching of the Nicolaitans.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Repent therefore! Otherwise, I will soon come to you and will fight against them with the sword of my mouth.
  '17':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whoever has ears, let them hear what the Spirit says to the churches. To the one who is victorious, I will give some of the hidden manna. I will also give that person a white stone with a new name written on it, known only to the one who receives it.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Church in Thyatira
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“To the angel of the church in Thyatira write:'
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: These are the words of the Son of God, whose eyes are like blazing fire and whose feet are like burnished bronze.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I know your deeds, your love and faith, your service and perseverance, and that you are now doing more than you did at first.
  '2':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I know your deeds, your hard work and your perseverance. I know that you cannot tolerate wicked people, that you have tested those who claim to be apostles but are not, and have found them false.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Nevertheless, I have this against you: You tolerate that woman Jezebel, who calls herself a prophet. By her teaching she misleads my servants into sexual immorality and the eating of food sacrificed to idols.'
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I have given her time to repent of her immorality, but she is unwilling.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So I will cast her on a bed of suffering, and I will make those who commit adultery with her suffer intensely, unless they repent of her ways.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I will strike her children dead. Then all the churches will know that I am he who searches hearts and minds, and I will repay each of you according to your deeds.
  '24':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Now I say to the rest of you in Thyatira, to you who do not hold to her teaching and have not learned Satan’s so-called deep secrets, ‘I will not impose any other burden on you,
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: except to hold on to what you have until I come.’
  '26':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: To the one who is victorious and does my will to the end, I will give authority over the nations—
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: that one ‘will rule them with an iron scepter and will dash them to pieces like pottery’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalm 2:9
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: —just as I have received authority from my Father.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I will also give that one the morning star.
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whoever has ears, let them hear what the Spirit says to the churches.
  '3':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You have persevered and have endured hardships for my name, and have not grown weary.
  '4':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'Yet I hold this against you: You have forsaken the love you had at first.'
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Consider how far you have fallen! Repent and do the things you did at first. If you do not repent, I will come to you and remove your lampstand from its place.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But you have this in your favor: You hate the practices of the Nicolaitans, which I also hate.'
  '7':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Whoever has ears, let them hear what the Spirit says to the churches. To the one who is victorious, I will give the right to eat from the tree of life, which is in the paradise of God.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: To the Church in Smyrna
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“To the angel of the church in Smyrna write:'
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: These are the words of him who is the First and the Last, who died and came to life again.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I know your afflictions and your poverty—yet you are rich! I know about the slander of those who say they are Jews and are not, but are a synagogue of Satan.
    - type: text
      text: ' '
