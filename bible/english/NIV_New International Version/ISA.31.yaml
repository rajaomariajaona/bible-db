document_id: ISA.31,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Woe to Those Who Rely on Egypt
  - type: text
    content: Woe to those who go down to Egypt for help,
  - type: text
    content: who rely on horses,
  - type: text
    content: who trust in the multitude of their chariots
  - type: text
    content: and in the great strength of their horsemen,
  - type: text
    content: but do not look to the Holy One of Israel,
  - type: text
    content: 'or seek help from the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: Yet he too is wise and can bring disaster;
  - type: text
    content: he does not take back his words.
  - type: text
    content: He will rise up against that wicked nation,
  - type: text
    content: against those who help evildoers.
  '3':
  - type: text
    content: But the Egyptians are mere mortals and not God;
  - type: text
    content: their horses are flesh and not spirit.
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' stretches out his hand,'
  - type: text
    content: those who help will stumble,
  - type: text
    content: those who are helped will fall;
  - type: text
    content: all will perish together.
  '4':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says to me:'
  - type: text
    content: “As a lion growls,
  - type: text
    content: a great lion over its prey—
  - type: text
    content: and though a whole band of shepherds
  - type: text
    content: is called together against it,
  - type: text
    content: it is not frightened by their shouts
  - type: text
    content: or disturbed by their clamor—
  - type: text
    content: 'so the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty will come down'
  - type: text
    content: to do battle on Mount Zion and on its heights.
  '5':
  - type: text
    content: Like birds hovering overhead,
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty will shield Jerusalem;'
  - type: text
    content: he will shield it and deliver it,
  - type: text
    content: he will ‘pass over’ it and will rescue it.”
  '6':
  - type: text
    content: 'Return, you Israelites, to the One you have so greatly revolted against. '
  '7':
  - type: text
    content: For in that day every one of you will reject the idols of silver and gold your sinful hands have made.
  '8':
  - type: text
    content: “Assyria will fall by no human sword;
  - type: text
    content: a sword, not of mortals, will devour them.
  - type: text
    content: They will flee before the sword
  - type: text
    content: and their young men will be put to forced labor.
  '9':
  - type: text
    content: Their stronghold will fall because of terror;
  - type: text
    content: at the sight of the battle standard their commanders will panic,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: whose fire is in Zion,
  - type: text
    content: whose furnace is in Jerusalem.
