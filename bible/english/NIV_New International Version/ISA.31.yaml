document_id: ISA.31,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Woe to Those Who Rely on Egypt
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to those who go down to Egypt for help,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who rely on horses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who trust in the multitude of their chariots
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and in the great strength of their horsemen,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but do not look to the Holy One of Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'or seek help from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet he too is wise and can bring disaster;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he does not take back his words.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will rise up against that wicked nation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against those who help evildoers.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But the Egyptians are mere mortals and not God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their horses are flesh and not spirit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'When the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' stretches out his hand,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who help will stumble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who are helped will fall;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all will perish together.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says to me:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “As a lion growls,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a great lion over its prey—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and though a whole band of shepherds
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is called together against it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: it is not frightened by their shouts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or disturbed by their clamor—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'so the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty will come down'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to do battle on Mount Zion and on its heights.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like birds hovering overhead,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty will shield Jerusalem;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he will shield it and deliver it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will ‘pass over’ it and will rescue it.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Return, you Israelites, to the One you have so greatly revolted against. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For in that day every one of you will reject the idols of silver and gold your sinful hands have made.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Assyria will fall by no human sword;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a sword, not of mortals, will devour them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will flee before the sword
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their young men will be put to forced labor.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their stronghold will fall because of terror;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the sight of the battle standard their commanders will panic,”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose fire is in Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose furnace is in Jerusalem.
