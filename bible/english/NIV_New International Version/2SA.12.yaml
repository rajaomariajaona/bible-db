document_id: 2SA.12,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Nathan Rebukes David
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' sent Nathan to David. When he came to him, he said, “There were two men in a certain town, one rich and the other poor. '
  '10':
  - type: text
    content: Now, therefore, the sword will never depart from your house, because you despised me and took the wife of Uriah the Hittite to be your own.’
  '11':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘Out of your own household I am going to bring calamity on you. Before your very eyes I will take your wives and give them to one who is close to you, and he will sleep with your wives in broad daylight. '
  '12':
  - type: text
    content: You did it in secret, but I will do this thing in broad daylight before all Israel.’ ”
  '13':
  - type: text
    content: 'Then David said to Nathan, “I have sinned against the '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: text
    content: 'Nathan replied, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has taken away your sin. You are not going to die. '
  '14':
  - type: text
    content: But because by doing this you have shown utter contempt for
  - type: note
    content: An ancient Hebrew scribal tradition; Masoretic Text for the enemies of
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ', the son born to you will die.”'
  '15':
  - type: text
    content: 'After Nathan had gone home, the '
  - type: text
    content: Lord
  - type: text
    content: ' struck the child that Uriah’s wife had borne to David, and he became ill. '
  '16':
  - type: text
    content: David pleaded with God for the child. He fasted and spent the nights lying in sackcloth
  - type: note
    content: Dead Sea Scrolls and Septuagint; Masoretic Text does not have in sackcloth.
  - type: text
    content: ' on the ground. '
  '17':
  - type: text
    content: The elders of his household stood beside him to get him up from the ground, but he refused, and he would not eat any food with them.
  '18':
  - type: text
    content: On the seventh day the child died. David’s attendants were afraid to tell him that the child was dead, for they thought, “While the child was still living, he wouldn’t listen to us when we spoke to him. How can we now tell him the child is dead? He may do something desperate.”
  '19':
  - type: text
    content: David noticed that his attendants were whispering among themselves, and he realized the child was dead. “Is the child dead?” he asked.
  - type: text
    content: “Yes,” they replied, “he is dead.”
  '2':
  - type: text
    content: 'The rich man had a very large number of sheep and cattle, '
  '20':
  - type: text
    content: 'Then David got up from the ground. After he had washed, put on lotions and changed his clothes, he went into the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and worshiped. Then he went to his own house, and at his request they served him food, and he ate.'
  '21':
  - type: text
    content: His attendants asked him, “Why are you acting this way? While the child was alive, you fasted and wept, but now that the child is dead, you get up and eat!”
  '22':
  - type: text
    content: 'He answered, “While the child was still alive, I fasted and wept. I thought, ‘Who knows? The '
  - type: text
    content: Lord
  - type: text
    content: ' may be gracious to me and let the child live.’ '
  '23':
  - type: text
    content: But now that he is dead, why should I go on fasting? Can I bring him back again? I will go to him, but he will not return to me.”
  '24':
  - type: text
    content: 'Then David comforted his wife Bathsheba, and he went to her and made love to her. She gave birth to a son, and they named him Solomon. The '
  - type: text
    content: Lord
  - type: text
    content: ' loved him; '
  '25':
  - type: text
    content: 'and because the '
  - type: text
    content: Lord
  - type: text
    content: ' loved him, he sent word through Nathan the prophet to name him Jedidiah.'
  - type: note
    content: Jedidiah means loved by the Lord.
  '26':
  - type: text
    content: 'Meanwhile Joab fought against Rabbah of the Ammonites and captured the royal citadel. '
  '27':
  - type: text
    content: 'Joab then sent messengers to David, saying, “I have fought against Rabbah and taken its water supply. '
  '28':
  - type: text
    content: Now muster the rest of the troops and besiege the city and capture it. Otherwise I will take the city, and it will be named after me.”
  '29':
  - type: text
    content: 'So David mustered the entire army and went to Rabbah, and attacked and captured it. '
  '3':
  - type: text
    content: but the poor man had nothing except one little ewe lamb he had bought. He raised it, and it grew up with him and his children. It shared his food, drank from his cup and even slept in his arms. It was like a daughter to him.
  '30':
  - type: text
    content: David took the crown from their king’s
  - type: note
    content: Or from Milkom’s (that is, Molek’s)
  - type: text
    content: ' head, and it was placed on his own head. It weighed a talent'
  - type: note
    content: That is, about 75 pounds or about 34 kilograms
  - type: text
    content: ' of gold, and it was set with precious stones. David took a great quantity of plunder from the city '
  '31':
  - type: text
    content: and brought out the people who were there, consigning them to labor with saws and with iron picks and axes, and he made them work at brickmaking.
  - type: note
    content: The meaning of the Hebrew for this clause is uncertain.
  - type: text
    content: ' David did this to all the Ammonite towns. Then he and his entire army returned to Jerusalem.'
  '4':
  - type: text
    content: “Now a traveler came to the rich man, but the rich man refrained from taking one of his own sheep or cattle to prepare a meal for the traveler who had come to him. Instead, he took the ewe lamb that belonged to the poor man and prepared it for the one who had come to him.”
  '5':
  - type: text
    content: 'David burned with anger against the man and said to Nathan, “As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, the man who did this must die! '
  '6':
  - type: text
    content: He must pay for that lamb four times over, because he did such a thing and had no pity.”
  '7':
  - type: text
    content: 'Then Nathan said to David, “You are the man! This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: ‘I anointed you king over Israel, and I delivered you from the hand of Saul. '
  '8':
  - type: text
    content: 'I gave your master’s house to you, and your master’s wives into your arms. I gave you all Israel and Judah. And if all this had been too little, I would have given you even more. '
  '9':
  - type: text
    content: 'Why did you despise the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' by doing what is evil in his eyes? You struck down Uriah the Hittite with the sword and took his wife to be your own. You killed him with the sword of the Ammonites. '
