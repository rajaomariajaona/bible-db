document_id: DEU.17,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Do not sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God an ox or a sheep that has any defect or flaw in it, for that would be detestable to him.'
  '10':
  - type: text
    content: 'You must act according to the decisions they give you at the place the '
  - type: text
    content: Lord
  - type: text
    content: ' will choose. Be careful to do everything they instruct you to do. '
  '11':
  - type: text
    content: 'Act according to whatever they teach you and the decisions they give you. Do not turn aside from what they tell you, to the right or to the left. '
  '12':
  - type: text
    content: 'Anyone who shows contempt for the judge or for the priest who stands ministering there to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is to be put to death. You must purge the evil from Israel. '
  '13':
  - type: text
    content: All the people will hear and be afraid, and will not be contemptuous again.
  - type: heading
    content: The King
  '14':
  - type: text
    content: 'When you enter the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you and have taken possession of it and settled in it, and you say, “Let us set a king over us like all the nations around us,” '
  '15':
  - type: text
    content: 'be sure to appoint over you a king the '
  - type: text
    content: Lord
  - type: text
    content: ' your God chooses. He must be from among your fellow Israelites. Do not place a foreigner over you, one who is not an Israelite. '
  '16':
  - type: text
    content: 'The king, moreover, must not acquire great numbers of horses for himself or make the people return to Egypt to get more of them, for the '
  - type: text
    content: Lord
  - type: text
    content: ' has told you, “You are not to go back that way again.” '
  '17':
  - type: text
    content: He must not take many wives, or his heart will be led astray. He must not accumulate large amounts of silver and gold.
  '18':
  - type: text
    content: 'When he takes the throne of his kingdom, he is to write for himself on a scroll a copy of this law, taken from that of the Levitical priests. '
  '19':
  - type: text
    content: 'It is to be with him, and he is to read it all the days of his life so that he may learn to revere the '
  - type: text
    content: Lord
  - type: text
    content: ' his God and follow carefully all the words of this law and these decrees '
  '2':
  - type: text
    content: 'If a man or woman living among you in one of the towns the '
  - type: text
    content: Lord
  - type: text
    content: ' gives you is found doing evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God in violation of his covenant, '
  '20':
  - type: text
    content: and not consider himself better than his fellow Israelites and turn from the law to the right or to the left. Then he and his descendants will reign a long time over his kingdom in Israel.
  '3':
  - type: text
    content: 'and contrary to my command has worshiped other gods, bowing down to them or to the sun or the moon or the stars in the sky, '
  '4':
  - type: text
    content: 'and this has been brought to your attention, then you must investigate it thoroughly. If it is true and it has been proved that this detestable thing has been done in Israel, '
  '5':
  - type: text
    content: 'take the man or woman who has done this evil deed to your city gate and stone that person to death. '
  '6':
  - type: text
    content: 'On the testimony of two or three witnesses a person is to be put to death, but no one is to be put to death on the testimony of only one witness. '
  '7':
  - type: text
    content: The hands of the witnesses must be the first in putting that person to death, and then the hands of all the people. You must purge the evil from among you.
  - type: heading
    content: Law Courts
  '8':
  - type: text
    content: 'If cases come before your courts that are too difficult for you to judge—whether bloodshed, lawsuits or assaults—take them to the place the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will choose. '
  '9':
  - type: text
    content: 'Go to the Levitical priests and to the judge who is in office at that time. Inquire of them and they will give you the verdict. '
