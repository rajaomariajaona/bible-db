document_id: DEU.17,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not sacrifice to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God an ox or a sheep that has any defect or flaw in it, for that would be detestable to him.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You must act according to the decisions they give you at the place the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will choose. Be careful to do everything they instruct you to do. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Act according to whatever they teach you and the decisions they give you. Do not turn aside from what they tell you, to the right or to the left. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Anyone who shows contempt for the judge or for the priest who stands ministering there to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is to be put to death. You must purge the evil from Israel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All the people will hear and be afraid, and will not be contemptuous again.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The King
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When you enter the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you and have taken possession of it and settled in it, and you say, “Let us set a king over us like all the nations around us,” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'be sure to appoint over you a king the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God chooses. He must be from among your fellow Israelites. Do not place a foreigner over you, one who is not an Israelite. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The king, moreover, must not acquire great numbers of horses for himself or make the people return to Egypt to get more of them, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has told you, “You are not to go back that way again.” '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He must not take many wives, or his heart will be led astray. He must not accumulate large amounts of silver and gold.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he takes the throne of his kingdom, he is to write for himself on a scroll a copy of this law, taken from that of the Levitical priests. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It is to be with him, and he is to read it all the days of his life so that he may learn to revere the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God and follow carefully all the words of this law and these decrees '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If a man or woman living among you in one of the towns the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gives you is found doing evil in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God in violation of his covenant, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and not consider himself better than his fellow Israelites and turn from the law to the right or to the left. Then he and his descendants will reign a long time over his kingdom in Israel.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and contrary to my command has worshiped other gods, bowing down to them or to the sun or the moon or the stars in the sky, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and this has been brought to your attention, then you must investigate it thoroughly. If it is true and it has been proved that this detestable thing has been done in Israel, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'take the man or woman who has done this evil deed to your city gate and stone that person to death. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the testimony of two or three witnesses a person is to be put to death, but no one is to be put to death on the testimony of only one witness. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The hands of the witnesses must be the first in putting that person to death, and then the hands of all the people. You must purge the evil from among you.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Law Courts
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If cases come before your courts that are too difficult for you to judge—whether bloodshed, lawsuits or assaults—take them to the place the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will choose. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Go to the Levitical priests and to the judge who is in office at that time. Inquire of them and they will give you the verdict. '
