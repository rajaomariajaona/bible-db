document_id: JOB.35
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Elihu said:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Do you think this is just?
- type: usfm
  marker: q2
  children:
  - type: text
    text: You say, ‘I am in the right, not God.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Yet you ask him, ‘What profit is it to me,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: you
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and what do I gain by not sinning?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “I would like to reply to you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to your friends with you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Look up at the heavens and see;
- type: usfm
  marker: q2
  children:
  - type: text
    text: gaze at the clouds so high above you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: If you sin, how does that affect him?
- type: usfm
  marker: q2
  children:
  - type: text
    text: If your sins are many, what does that do to him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: If you are righteous, what do you give to him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or what does he receive from your hand?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Your wickedness only affects humans like yourself,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your righteousness only other people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “People cry out under a load of oppression;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they plead for relief from the arm of the powerful.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But no one says, ‘Where is God my Maker,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who gives songs in the night,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: who teaches us more than he teaches
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:10,11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'night, / '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '11 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: who teaches us by
    marker-yv: yv-n
  - type: text
    text: ' the beasts of the earth'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and makes us wiser than
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: us wise by
    marker-yv: yv-n
  - type: text
    text: ' the birds in the sky?’'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He does not answer when people cry out
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of the arrogance of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Indeed, God does not listen to their empty plea;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Almighty pays no attention to it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: How much less, then, will he listen
- type: usfm
  marker: q2
  children:
  - type: text
    text: when you say that you do not see him,
- type: usfm
  marker: q1
  children:
  - type: text
    text: that your case is before him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you must wait for him,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: and further, that his anger never punishes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he does not take the least notice of wickedness.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Symmachus, Theodotion and Vulgate; the meaning of the Hebrew for this word is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: So Job opens his mouth with empty talk;
- type: usfm
  marker: q2
  children:
  - type: text
    text: without knowledge he multiplies words.”
