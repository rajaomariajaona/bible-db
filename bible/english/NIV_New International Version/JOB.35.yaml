document_id: JOB.35,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then Elihu said:'
  '10':
  - type: text
    content: But no one says, ‘Where is God my Maker,
  - type: text
    content: who gives songs in the night,
  '11':
  - type: text
    content: who teaches us more than he teaches
  - type: note
    content: Or night, / 11 who teaches us by
  - type: text
    content: ' the beasts of the earth'
  - type: text
    content: and makes us wiser than
  - type: note
    content: Or us wise by
  - type: text
    content: ' the birds in the sky?’'
  '12':
  - type: text
    content: He does not answer when people cry out
  - type: text
    content: because of the arrogance of the wicked.
  '13':
  - type: text
    content: Indeed, God does not listen to their empty plea;
  - type: text
    content: the Almighty pays no attention to it.
  '14':
  - type: text
    content: How much less, then, will he listen
  - type: text
    content: when you say that you do not see him,
  - type: text
    content: that your case is before him
  - type: text
    content: and you must wait for him,
  '15':
  - type: text
    content: and further, that his anger never punishes
  - type: text
    content: and he does not take the least notice of wickedness.
  - type: note
    content: Symmachus, Theodotion and Vulgate; the meaning of the Hebrew for this word is uncertain.
  '16':
  - type: text
    content: So Job opens his mouth with empty talk;
  - type: text
    content: without knowledge he multiplies words.”
  '2':
  - type: text
    content: “Do you think this is just?
  - type: text
    content: You say, ‘I am in the right, not God.’
  '3':
  - type: text
    content: Yet you ask him, ‘What profit is it to me,
  - type: note
    content: Or you
  - type: text
    content: and what do I gain by not sinning?’
  '4':
  - type: text
    content: “I would like to reply to you
  - type: text
    content: and to your friends with you.
  '5':
  - type: text
    content: Look up at the heavens and see;
  - type: text
    content: gaze at the clouds so high above you.
  '6':
  - type: text
    content: If you sin, how does that affect him?
  - type: text
    content: If your sins are many, what does that do to him?
  '7':
  - type: text
    content: If you are righteous, what do you give to him,
  - type: text
    content: or what does he receive from your hand?
  '8':
  - type: text
    content: Your wickedness only affects humans like yourself,
  - type: text
    content: and your righteousness only other people.
  '9':
  - type: text
    content: “People cry out under a load of oppression;
  - type: text
    content: they plead for relief from the arm of the powerful.
