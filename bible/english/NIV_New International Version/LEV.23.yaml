document_id: LEV.23,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Appointed Festivals
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: '“Speak to the Israelites and say to them: ‘When you enter the land I am going to give you and you reap its harvest, bring to the priest a sheaf of the first grain you harvest. '
  '11':
  - type: text
    content: 'He is to wave the sheaf before the '
  - type: text
    content: Lord
  - type: text
    content: ' so it will be accepted on your behalf; the priest is to wave it on the day after the Sabbath. '
  '12':
  - type: text
    content: 'On the day you wave the sheaf, you must sacrifice as a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' a lamb a year old without defect, '
  '13':
  - type: text
    content: together with its grain offering of two-tenths of an ephah
  - type: note
    content: That is, probably about 7 pounds or about 3.2 kilograms; also in verse 17
  - type: text
    content: ' of the finest flour mixed with olive oil—a food offering presented to the '
  - type: text
    content: Lord
  - type: text
    content: ', a pleasing aroma—and its drink offering of a quarter of a hin'
  - type: note
    content: That is, about 1 quart or about 1 liter
  - type: text
    content: ' of wine. '
  '14':
  - type: text
    content: You must not eat any bread, or roasted or new grain, until the very day you bring this offering to your God. This is to be a lasting ordinance for the generations to come, wherever you live.
  - type: heading
    content: The Festival of Weeks
  '15':
  - type: text
    content: '“ ‘From the day after the Sabbath, the day you brought the sheaf of the wave offering, count off seven full weeks. '
  '16':
  - type: text
    content: 'Count off fifty days up to the day after the seventh Sabbath, and then present an offering of new grain to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'From wherever you live, bring two loaves made of two-tenths of an ephah of the finest flour, baked with yeast, as a wave offering of firstfruits to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Present with this bread seven male lambs, each a year old and without defect, one young bull and two rams. They will be a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', together with their grain offerings and drink offerings—a food offering, an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '19':
  - type: text
    content: Then sacrifice one male goat for a sin offering
  - type: note
    content: Or purification offering
  - type: text
    content: ' and two lambs, each a year old, for a fellowship offering. '
  '2':
  - type: text
    content: '“Speak to the Israelites and say to them: ‘These are my appointed festivals, the appointed festivals of the '
  - type: text
    content: Lord
  - type: text
    content: ', which you are to proclaim as sacred assemblies.'
  - type: heading
    content: The Sabbath
  '20':
  - type: text
    content: 'The priest is to wave the two lambs before the '
  - type: text
    content: Lord
  - type: text
    content: ' as a wave offering, together with the bread of the firstfruits. They are a sacred offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' for the priest. '
  '21':
  - type: text
    content: On that same day you are to proclaim a sacred assembly and do no regular work. This is to be a lasting ordinance for the generations to come, wherever you live.
  '22':
  - type: text
    content: '“ ‘When you reap the harvest of your land, do not reap to the very edges of your field or gather the gleanings of your harvest. Leave them for the poor and for the foreigner residing among you. I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.’ ”'
  - type: heading
    content: The Festival of Trumpets
  '23':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '24':
  - type: text
    content: '“Say to the Israelites: ‘On the first day of the seventh month you are to have a day of sabbath rest, a sacred assembly commemorated with trumpet blasts. '
  '25':
  - type: text
    content: 'Do no regular work, but present a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  - type: heading
    content: The Day of Atonement
  '26':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '27':
  - type: text
    content: “The tenth day of this seventh month is the Day of Atonement. Hold a sacred assembly and deny yourselves,
  - type: note
    content: Or and fast; similarly in verses 29 and 32
  - type: text
    content: ' and present a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Do not do any work on that day, because it is the Day of Atonement, when atonement is made for you before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '29':
  - type: text
    content: 'Those who do not deny themselves on that day must be cut off from their people. '
  '3':
  - type: text
    content: '“ ‘There are six days when you may work, but the seventh day is a day of sabbath rest, a day of sacred assembly. You are not to do any work; wherever you live, it is a sabbath to the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: The Passover and the Festival of Unleavened Bread
  '30':
  - type: text
    content: 'I will destroy from among their people anyone who does any work on that day. '
  '31':
  - type: text
    content: 'You shall do no work at all. This is to be a lasting ordinance for the generations to come, wherever you live. '
  '32':
  - type: text
    content: It is a day of sabbath rest for you, and you must deny yourselves. From the evening of the ninth day of the month until the following evening you are to observe your sabbath.”
  - type: heading
    content: The Festival of Tabernacles
  '33':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '34':
  - type: text
    content: '“Say to the Israelites: ‘On the fifteenth day of the seventh month the '
  - type: text
    content: Lord
  - type: text
    content: '’s Festival of Tabernacles begins, and it lasts for seven days. '
  '35':
  - type: text
    content: 'The first day is a sacred assembly; do no regular work. '
  '36':
  - type: text
    content: 'For seven days present food offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ', and on the eighth day hold a sacred assembly and present a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: . It is the closing special assembly; do no regular work.
  '37':
  - type: text
    content: '(“ ‘These are the '
  - type: text
    content: Lord
  - type: text
    content: '’s appointed festivals, which you are to proclaim as sacred assemblies for bringing food offerings to the '
  - type: text
    content: Lord
  - type: text
    content: '—the burnt offerings and grain offerings, sacrifices and drink offerings required for each day. '
  '38':
  - type: text
    content: 'These offerings are in addition to those for the '
  - type: text
    content: Lord
  - type: text
    content: ’s Sabbaths and
  - type: note
    content: Or These festivals are in addition to the Lord’s Sabbaths, and these offerings are
  - type: text
    content: ' in addition to your gifts and whatever you have vowed and all the freewill offerings you give to the '
  - type: text
    content: Lord
  - type: text
    content: .)
  '39':
  - type: text
    content: '“ ‘So beginning with the fifteenth day of the seventh month, after you have gathered the crops of the land, celebrate the festival to the '
  - type: text
    content: Lord
  - type: text
    content: ' for seven days; the first day is a day of sabbath rest, and the eighth day also is a day of sabbath rest. '
  '4':
  - type: text
    content: '“ ‘These are the '
  - type: text
    content: Lord
  - type: text
    content: '’s appointed festivals, the sacred assemblies you are to proclaim at their appointed times: '
  '40':
  - type: text
    content: 'On the first day you are to take branches from luxuriant trees—from palms, willows and other leafy trees—and rejoice before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God for seven days. '
  '41':
  - type: text
    content: 'Celebrate this as a festival to the '
  - type: text
    content: Lord
  - type: text
    content: ' for seven days each year. This is to be a lasting ordinance for the generations to come; celebrate it in the seventh month. '
  '42':
  - type: text
    content: 'Live in temporary shelters for seven days: All native-born Israelites are to live in such shelters '
  '43':
  - type: text
    content: 'so your descendants will know that I had the Israelites live in temporary shelters when I brought them out of Egypt. I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.’ ”'
  '44':
  - type: text
    content: 'So Moses announced to the Israelites the appointed festivals of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: '’s Passover begins at twilight on the fourteenth day of the first month. '
  '6':
  - type: text
    content: 'On the fifteenth day of that month the '
  - type: text
    content: Lord
  - type: text
    content: '’s Festival of Unleavened Bread begins; for seven days you must eat bread made without yeast. '
  '7':
  - type: text
    content: 'On the first day hold a sacred assembly and do no regular work. '
  '8':
  - type: text
    content: 'For seven days present a food offering to the '
  - type: text
    content: Lord
  - type: text
    content: . And on the seventh day hold a sacred assembly and do no regular work.’ ”
  - type: heading
    content: Offering the Firstfruits
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
