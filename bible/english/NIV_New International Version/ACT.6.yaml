document_id: ACT.6,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Choosing of the Seven
  - type: text
    content: In those days when the number of disciples was increasing, the Hellenistic Jews
  - type: note
    content: That is, Jews who had adopted the Greek language and culture
  - type: text
    content: ' among them complained against the Hebraic Jews because their widows were being overlooked in the daily distribution of food. '
  '10':
  - type: text
    content: But they could not stand up against the wisdom the Spirit gave him as he spoke.
  '11':
  - type: text
    content: Then they secretly persuaded some men to say, “We have heard Stephen speak blasphemous words against Moses and against God.”
  '12':
  - type: text
    content: 'So they stirred up the people and the elders and the teachers of the law. They seized Stephen and brought him before the Sanhedrin. '
  '13':
  - type: text
    content: 'They produced false witnesses, who testified, “This fellow never stops speaking against this holy place and against the law. '
  '14':
  - type: text
    content: For we have heard him say that this Jesus of Nazareth will destroy this place and change the customs Moses handed down to us.”
  '15':
  - type: text
    content: All who were sitting in the Sanhedrin looked intently at Stephen, and they saw that his face was like the face of an angel.
  '2':
  - type: text
    content: 'So the Twelve gathered all the disciples together and said, “It would not be right for us to neglect the ministry of the word of God in order to wait on tables. '
  '3':
  - type: text
    content: 'Brothers and sisters, choose seven men from among you who are known to be full of the Spirit and wisdom. We will turn this responsibility over to them '
  '4':
  - type: text
    content: and will give our attention to prayer and the ministry of the word.”
  '5':
  - type: text
    content: 'This proposal pleased the whole group. They chose Stephen, a man full of faith and of the Holy Spirit; also Philip, Procorus, Nicanor, Timon, Parmenas, and Nicolas from Antioch, a convert to Judaism. '
  '6':
  - type: text
    content: They presented these men to the apostles, who prayed and laid their hands on them.
  '7':
  - type: text
    content: So the word of God spread. The number of disciples in Jerusalem increased rapidly, and a large number of priests became obedient to the faith.
  - type: heading
    content: Stephen Seized
  '8':
  - type: text
    content: 'Now Stephen, a man full of God’s grace and power, performed great wonders and signs among the people. '
  '9':
  - type: text
    content: 'Opposition arose, however, from members of the Synagogue of the Freedmen (as it was called)—Jews of Cyrene and Alexandria as well as the provinces of Cilicia and Asia—who began to argue with Stephen. '
