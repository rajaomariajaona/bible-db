document_id: JAS.1,111
type_code: eng
verses:
  '1':
  - type: text
    content: James, a servant of God and of the Lord Jesus Christ,
  - type: text
    content: 'To the twelve tribes scattered among the nations:'
  - type: text
    content: Greetings.
  - type: heading
    content: Trials and Temptations
  '10':
  - type: text
    content: 'But the rich should take pride in their humiliation—since they will pass away like a wild flower. '
  '11':
  - type: text
    content: For the sun rises with scorching heat and withers the plant; its blossom falls and its beauty is destroyed. In the same way, the rich will fade away even while they go about their business.
  '12':
  - type: text
    content: Blessed is the one who perseveres under trial because, having stood the test, that person will receive the crown of life that the Lord has promised to those who love him.
  '13':
  - type: text
    content: 'When tempted, no one should say, “God is tempting me.” For God cannot be tempted by evil, nor does he tempt anyone; '
  '14':
  - type: text
    content: 'but each person is tempted when they are dragged away by their own evil desire and enticed. '
  '15':
  - type: text
    content: Then, after desire has conceived, it gives birth to sin; and sin, when it is full-grown, gives birth to death.
  '16':
  - type: text
    content: 'Don’t be deceived, my dear brothers and sisters. '
  '17':
  - type: text
    content: 'Every good and perfect gift is from above, coming down from the Father of the heavenly lights, who does not change like shifting shadows. '
  '18':
  - type: text
    content: He chose to give us birth through the word of truth, that we might be a kind of firstfruits of all he created.
  - type: heading
    content: Listening and Doing
  '19':
  - type: text
    content: 'My dear brothers and sisters, take note of this: Everyone should be quick to listen, slow to speak and slow to become angry, '
  '2':
  - type: text
    content: Consider it pure joy, my brothers and sisters,
  - type: note
    content: The Greek word for brothers and sisters (adelphoi) refers here to believers, both men and women, as part of God’s family; also in verses 16 and 19; and in 2:1, 5, 14; 3:10, 12; 4:11; 5:7, 9, 10, 12, 19.
  - type: text
    content: ' whenever you face trials of many kinds, '
  '20':
  - type: text
    content: 'because human anger does not produce the righteousness that God desires. '
  '21':
  - type: text
    content: Therefore, get rid of all moral filth and the evil that is so prevalent and humbly accept the word planted in you, which can save you.
  '22':
  - type: text
    content: 'Do not merely listen to the word, and so deceive yourselves. Do what it says. '
  '23':
  - type: text
    content: 'Anyone who listens to the word but does not do what it says is like someone who looks at his face in a mirror '
  '24':
  - type: text
    content: 'and, after looking at himself, goes away and immediately forgets what he looks like. '
  '25':
  - type: text
    content: But whoever looks intently into the perfect law that gives freedom, and continues in it—not forgetting what they have heard, but doing it—they will be blessed in what they do.
  '26':
  - type: text
    content: 'Those who consider themselves religious and yet do not keep a tight rein on their tongues deceive themselves, and their religion is worthless. '
  '27':
  - type: text
    content: 'Religion that God our Father accepts as pure and faultless is this: to look after orphans and widows in their distress and to keep oneself from being polluted by the world.'
  '3':
  - type: text
    content: 'because you know that the testing of your faith produces perseverance. '
  '4':
  - type: text
    content: 'Let perseverance finish its work so that you may be mature and complete, not lacking anything. '
  '5':
  - type: text
    content: 'If any of you lacks wisdom, you should ask God, who gives generously to all without finding fault, and it will be given to you. '
  '6':
  - type: text
    content: 'But when you ask, you must believe and not doubt, because the one who doubts is like a wave of the sea, blown and tossed by the wind. '
  '7':
  - type: text
    content: 'That person should not expect to receive anything from the Lord. '
  '8':
  - type: text
    content: Such a person is double-minded and unstable in all they do.
  '9':
  - type: text
    content: 'Believers in humble circumstances ought to take pride in their high position. '
