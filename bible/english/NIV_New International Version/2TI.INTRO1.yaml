document_id: 2TI.INTRO1
type_code: eng
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Intro
- type: usfm
  marker: im
  children:
  - type: text
    text: 'Paul left his co-worker Timothy in the city of Ephesus to deal with some renegade leaders in the church there. When Timothy struggled, however, Paul went back to Ephesus. Once there, Paul suffered '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: a great deal of harm
  - type: text
    text: ' from Alexander, one of these leaders, and he was once again imprisoned and taken to Rome. He expected that this time he would be tried and executed. Paul wrote to Timothy to ask him to come to Rome quickly.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Things in Ephesus had not gone as Paul or Timothy expected. Paul had ordered both Alexander and Hymenaeus to step down from leadership, but they were continuing to oppose Paul. Others had joined them, and they were still misdirecting people into a corrupted version of the faith that stressed debate and dissension rather than purity and obedience. Timothy was discouraged and intimidated. Paul’s letter includes challenges to stay faithful to the true message—even if this meant suffering or death. Paul reminds Timothy that in the days before the open appearance of Jesus as king, there will be lots of trouble. False teachers, treacherous and insincere people, persecutions and more will all challenge the faithfulness of God’s people.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Paul urges Timothy to remember the gospel message: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Jesus Christ, raised from the dead, descended from David.
  - type: text
    text: ' He points out that the sacred writings Timothy has known since he was a child are God-breathed, and will help him continue in doing good work.'
