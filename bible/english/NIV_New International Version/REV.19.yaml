document_id: REV.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Threefold Hallelujah Over Babylon’s Fall
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After this I heard what sounded like the roar of a great multitude in heaven shouting:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Hallelujah!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Salvation and glory and power belong to our God,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: for true and just are his judgments.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has condemned the great prostitute
- type: usfm
  marker: q2
  children:
  - type: text
    text: who corrupted the earth by her adulteries.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He has avenged on her the blood of his servants.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'And again they shouted:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Hallelujah!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The smoke from her goes up for ever and ever.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The twenty-four elders and the four living creatures fell down and worshiped God, who was seated on the throne. And they cried:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Amen, Hallelujah!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then a voice came from the throne, saying:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Praise our God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all you his servants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you who fear him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: both great and small!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then I heard what sounded like a great multitude, like the roar of rushing waters and like loud peals of thunder, shouting:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Hallelujah!
- type: usfm
  marker: q2
  children:
  - type: text
    text: For our Lord God Almighty reigns.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Let us rejoice and be glad
- type: usfm
  marker: q2
  children:
  - type: text
    text: and give him glory!
- type: usfm
  marker: q1
  children:
  - type: text
    text: For the wedding of the Lamb has come,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his bride has made herself ready.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fine linen, bright and clean,
- type: usfm
  marker: q2
  children:
  - type: text
    text: was given her to wear.”
- type: usfm
  marker: qm1
  children:
  - type: text
    text: (Fine linen stands for the righteous acts of God’s holy people.)
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then the angel said to me, “Write this: Blessed are those who are invited to the wedding supper of the Lamb!” And he added, “These are the true words of God.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: At this I fell at his feet to worship him. But he said to me, “Don’t do that! I am a fellow servant with you and with your brothers and sisters who hold to the testimony of Jesus. Worship God! For it is the Spirit of prophecy who bears testimony to Jesus.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Heavenly Warrior Defeats the Beast
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I saw heaven standing open and there before me was a white horse, whose rider is called Faithful and True. With justice he judges and wages war. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'His eyes are like blazing fire, and on his head are many crowns. He has a name written on him that no one knows but he himself. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He is dressed in a robe dipped in blood, and his name is the Word of God. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The armies of heaven were following him, riding on white horses and dressed in fine linen, white and clean. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Coming out of his mouth is a sharp sword with which to strike down the nations. “He will rule them with an iron scepter.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 2:9
    marker-yv: yv-n
  - type: text
    text: ' He treads the winepress of the fury of the wrath of God Almighty. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'On his robe and on his thigh he has this name written:'
- type: usfm
  marker: pc
  children:
  - type: text
    text: king of kings and lord of lords.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'And I saw an angel standing in the sun, who cried in a loud voice to all the birds flying in midair, “Come, gather together for the great supper of God, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: so that you may eat the flesh of kings, generals, and the mighty, of horses and their riders, and the flesh of all people, free and slave, great and small.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then I saw the beast and the kings of the earth and their armies gathered together to wage war against the rider on the horse and his army. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'But the beast was captured, and with it the false prophet who had performed the signs on its behalf. With these signs he had deluded those who had received the mark of the beast and worshiped its image. The two of them were thrown alive into the fiery lake of burning sulfur. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The rest were killed with the sword coming out of the mouth of the rider on the horse, and all the birds gorged themselves on their flesh.
