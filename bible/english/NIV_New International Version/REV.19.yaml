document_id: REV.19,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Threefold Hallelujah Over Babylon’s Fall
  - type: text
    content: 'After this I heard what sounded like the roar of a great multitude in heaven shouting:'
  - type: text
    content: “Hallelujah!
  - type: text
    content: Salvation and glory and power belong to our God,
  '10':
  - type: text
    content: At this I fell at his feet to worship him. But he said to me, “Don’t do that! I am a fellow servant with you and with your brothers and sisters who hold to the testimony of Jesus. Worship God! For it is the Spirit of prophecy who bears testimony to Jesus.”
  - type: heading
    content: The Heavenly Warrior Defeats the Beast
  '11':
  - type: text
    content: 'I saw heaven standing open and there before me was a white horse, whose rider is called Faithful and True. With justice he judges and wages war. '
  '12':
  - type: text
    content: 'His eyes are like blazing fire, and on his head are many crowns. He has a name written on him that no one knows but he himself. '
  '13':
  - type: text
    content: 'He is dressed in a robe dipped in blood, and his name is the Word of God. '
  '14':
  - type: text
    content: 'The armies of heaven were following him, riding on white horses and dressed in fine linen, white and clean. '
  '15':
  - type: text
    content: Coming out of his mouth is a sharp sword with which to strike down the nations. “He will rule them with an iron scepter.”
  - type: note
    content: Psalm 2:9
  - type: text
    content: ' He treads the winepress of the fury of the wrath of God Almighty. '
  '16':
  - type: text
    content: 'On his robe and on his thigh he has this name written:'
  - type: text
    content: king of kings and lord of lords.
  '17':
  - type: text
    content: 'And I saw an angel standing in the sun, who cried in a loud voice to all the birds flying in midair, “Come, gather together for the great supper of God, '
  '18':
  - type: text
    content: so that you may eat the flesh of kings, generals, and the mighty, of horses and their riders, and the flesh of all people, free and slave, great and small.”
  '19':
  - type: text
    content: 'Then I saw the beast and the kings of the earth and their armies gathered together to wage war against the rider on the horse and his army. '
  '2':
  - type: text
    content: for true and just are his judgments.
  - type: text
    content: He has condemned the great prostitute
  - type: text
    content: who corrupted the earth by her adulteries.
  - type: text
    content: He has avenged on her the blood of his servants.”
  '20':
  - type: text
    content: 'But the beast was captured, and with it the false prophet who had performed the signs on its behalf. With these signs he had deluded those who had received the mark of the beast and worshiped its image. The two of them were thrown alive into the fiery lake of burning sulfur. '
  '21':
  - type: text
    content: The rest were killed with the sword coming out of the mouth of the rider on the horse, and all the birds gorged themselves on their flesh.
  '3':
  - type: text
    content: 'And again they shouted:'
  - type: text
    content: “Hallelujah!
  - type: text
    content: The smoke from her goes up for ever and ever.”
  '4':
  - type: text
    content: 'The twenty-four elders and the four living creatures fell down and worshiped God, who was seated on the throne. And they cried:'
  - type: text
    content: “Amen, Hallelujah!”
  '5':
  - type: text
    content: 'Then a voice came from the throne, saying:'
  - type: text
    content: “Praise our God,
  - type: text
    content: all you his servants,
  - type: text
    content: you who fear him,
  - type: text
    content: both great and small!”
  '6':
  - type: text
    content: 'Then I heard what sounded like a great multitude, like the roar of rushing waters and like loud peals of thunder, shouting:'
  - type: text
    content: “Hallelujah!
  - type: text
    content: For our Lord God Almighty reigns.
  '7':
  - type: text
    content: Let us rejoice and be glad
  - type: text
    content: and give him glory!
  - type: text
    content: For the wedding of the Lamb has come,
  - type: text
    content: and his bride has made herself ready.
  '8':
  - type: text
    content: Fine linen, bright and clean,
  - type: text
    content: was given her to wear.”
  - type: text
    content: (Fine linen stands for the righteous acts of God’s holy people.)
  '9':
  - type: text
    content: 'Then the angel said to me, “Write this: Blessed are those who are invited to the wedding supper of the Lamb!” And he added, “These are the true words of God.”'
