document_id: GEN.43,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Second Journey to Egypt
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the famine was still severe in the land. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As it is, if we had not delayed, we could have gone and returned twice.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then their father Israel said to them, “If it must be, then do this: Put some of the best products of the land in your bags and take them down to the man as a gift—a little balm and a little honey, some spices and myrrh, some pistachio nuts and almonds. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Take double the amount of silver with you, for you must return the silver that was put back into the mouths of your sacks. Perhaps it was a mistake. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Take your brother also and go back to the man at once. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And may God Almighty
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: El-Shaddai
      marker-yv: yv-n
    - type: text
      text: ' grant you mercy before the man so that he will let your other brother and Benjamin come back with you. As for me, if I am bereaved, I am bereaved.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the men took the gifts and double the amount of silver, and Benjamin also. They hurried down to Egypt and presented themselves to Joseph. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Joseph saw Benjamin with them, he said to the steward of his house, “Take these men to my house, slaughter an animal and prepare a meal; they are to eat with me at noon.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The man did as Joseph told him and took the men to Joseph’s house. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now the men were frightened when they were taken to his house. They thought, “We were brought here because of the silver that was put back into our sacks the first time. He wants to attack us and overpower us and seize us as slaves and take our donkeys.”
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they went up to Joseph’s steward and spoke to him at the entrance to the house. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So when they had eaten all the grain they had brought from Egypt, their father said to them, “Go back and buy us a little more food.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“We beg your pardon, our lord,” they said, “we came down here the first time to buy food. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But at the place where we stopped for the night we opened our sacks and each of us found his silver—the exact weight—in the mouth of his sack. So we have brought it back with us. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We have also brought additional silver with us to buy food. We don’t know who put our silver in our sacks.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “It’s all right,” he said. “Don’t be afraid. Your God, the God of your father, has given you treasure in your sacks; I received your silver.” Then he brought Simeon out to them.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The steward took the men into Joseph’s house, gave them water to wash their feet and provided fodder for their donkeys. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They prepared their gifts for Joseph’s arrival at noon, because they had heard that they were to eat there.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Joseph came home, they presented to him the gifts they had brought into the house, and they bowed down before him to the ground. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He asked them how they were, and then he said, “How is your aged father you told me about? Is he still living?”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They replied, “Your servant our father is still alive and well.” And they bowed down, prostrating themselves before him.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As he looked about and saw his brother Benjamin, his own mother’s son, he asked, “Is this your youngest brother, the one you told me about?” And he said, “God be gracious to you, my son.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Judah said to him, “The man warned us solemnly, ‘You will not see my face again unless your brother is with you.’ '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Deeply moved at the sight of his brother, Joseph hurried out and looked for a place to weep. He went into his private room and wept there.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After he had washed his face, he came out and, controlling himself, said, “Serve the food.”
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They served him by himself, the brothers by themselves, and the Egyptians who ate with him by themselves, because Egyptians could not eat with Hebrews, for that is detestable to Egyptians. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The men had been seated before him in the order of their ages, from the firstborn to the youngest; and they looked at each other in astonishment. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When portions were served to them from Joseph’s table, Benjamin’s portion was five times as much as anyone else’s. So they feasted and drank freely with him.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you will send our brother along with us, we will go down and buy food for you. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if you will not send him, we will not go down, because the man said to us, ‘You will not see my face again unless your brother is with you.’ ”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Israel asked, “Why did you bring this trouble on me by telling the man you had another brother?”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They replied, “The man questioned us closely about ourselves and our family. ‘Is your father still living?’ he asked us. ‘Do you have another brother?’ We simply answered his questions. How were we to know he would say, ‘Bring your brother down here’?”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Judah said to Israel his father, “Send the boy along with me and we will go at once, so that we and you and our children may live and not die. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I myself will guarantee his safety; you can hold me personally responsible for him. If I do not bring him back to you and set him here before you, I will bear the blame before you all my life. '
