document_id: JON.2,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 2:1 is numbered 1:17, and 2:1-10 is numbered 2:2-11.
      marker-yv: yv-n
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'From inside the fish Jonah prayed to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded the fish, and it vomited Jonah onto dry land.'
  '2':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“In my distress I called to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he answered me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From deep in the realm of the dead I called for help,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you listened to my cry.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: You hurled me into the depths,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into the very heart of the seas,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the currents swirled about me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all your waves and breakers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: swept over me.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: I said, ‘I have been banished
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from your sight;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yet I will look again
  - type: usfm
    marker: q2
    children:
    - type: text
      text: toward your holy temple.’
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: The engulfing waters threatened me,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: waters were at my throat
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the deep surrounded me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: seaweed was wrapped around my head.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: To the roots of the mountains I sank down;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the earth beneath barred me in forever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: brought my life up from the pit.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “When my life was ebbing away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I remembered you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and my prayer rose to you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to your holy temple.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “Those who cling to worthless idols
  - type: usfm
    marker: q2
    children:
    - type: text
      text: turn away from God’s love for them.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: But I, with shouts of grateful praise,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will sacrifice to you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What I have vowed I will make good.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'I will say, ‘Salvation comes from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .’ ”
