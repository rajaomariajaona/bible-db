document_id: JON.2,111
type_code: eng
verses:
  '1':
  - type: note
    content: In Hebrew texts 2:1 is numbered 1:17, and 2:1-10 is numbered 2:2-11.
  - type: text
    content: 'From inside the fish Jonah prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ' his God. '
  '10':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded the fish, and it vomited Jonah onto dry land.'
  '2':
  - type: text
    content: 'He said:'
  - type: text
    content: '“In my distress I called to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and he answered me.
  - type: text
    content: From deep in the realm of the dead I called for help,
  - type: text
    content: and you listened to my cry.
  '3':
  - type: text
    content: You hurled me into the depths,
  - type: text
    content: into the very heart of the seas,
  - type: text
    content: and the currents swirled about me;
  - type: text
    content: all your waves and breakers
  - type: text
    content: swept over me.
  '4':
  - type: text
    content: I said, ‘I have been banished
  - type: text
    content: from your sight;
  - type: text
    content: yet I will look again
  - type: text
    content: toward your holy temple.’
  '5':
  - type: text
    content: The engulfing waters threatened me,
  - type: note
    content: Or waters were at my throat
  - type: text
    content: the deep surrounded me;
  - type: text
    content: seaweed was wrapped around my head.
  '6':
  - type: text
    content: To the roots of the mountains I sank down;
  - type: text
    content: the earth beneath barred me in forever.
  - type: text
    content: 'But you, '
  - type: text
    content: Lord
  - type: text
    content: ' my God,'
  - type: text
    content: brought my life up from the pit.
  '7':
  - type: text
    content: “When my life was ebbing away,
  - type: text
    content: 'I remembered you, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and my prayer rose to you,
  - type: text
    content: to your holy temple.
  '8':
  - type: text
    content: “Those who cling to worthless idols
  - type: text
    content: turn away from God’s love for them.
  '9':
  - type: text
    content: But I, with shouts of grateful praise,
  - type: text
    content: will sacrifice to you.
  - type: text
    content: What I have vowed I will make good.
  - type: text
    content: 'I will say, ‘Salvation comes from the '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
