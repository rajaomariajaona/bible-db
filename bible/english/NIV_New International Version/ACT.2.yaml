document_id: ACT.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Holy Spirit Comes at Pentecost
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When the day of Pentecost came, they were all together in one place. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Suddenly a sound like the blowing of a violent wind came from heaven and filled the whole house where they were sitting. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'They saw what seemed to be tongues of fire that separated and came to rest on each of them. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: All of them were filled with the Holy Spirit and began to speak in other tongues
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: languages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verse 11
    marker-yv: yv-n
  - type: text
    text: ' as the Spirit enabled them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now there were staying in Jerusalem God-fearing Jews from every nation under heaven. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'When they heard this sound, a crowd came together in bewilderment, because each one heard their own language being spoken. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Utterly amazed, they asked: “Aren’t all these who are speaking Galileans? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then how is it that each of us hears them in our native language? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Parthians, Medes and Elamites; residents of Mesopotamia, Judea and Cappadocia, Pontus and Asia,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the Roman province by that name
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Phrygia and Pamphylia, Egypt and the parts of Libya near Cyrene; visitors from Rome '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '(both Jews and converts to Judaism); Cretans and Arabs—we hear them declaring the wonders of God in our own tongues!” '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Amazed and perplexed, they asked one another, “What does this mean?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Some, however, made fun of them and said, “They have had too much wine.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter Addresses the Crowd
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then Peter stood up with the Eleven, raised his voice and addressed the crowd: “Fellow Jews and all of you who live in Jerusalem, let me explain this to you; listen carefully to what I say. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'These people are not drunk, as you suppose. It’s only nine in the morning! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'No, this is what was spoken by the prophet Joel:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “ ‘In the last days, God says,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will pour out my Spirit on all people.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your sons and daughters will prophesy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your young men will see visions,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your old men will dream dreams.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Even on my servants, both men and women,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will pour out my Spirit in those days,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they will prophesy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: I will show wonders in the heavens above
- type: usfm
  marker: q2
  children:
  - type: text
    text: and signs on the earth below,
- type: usfm
  marker: q2
  children:
  - type: text
    text: blood and fire and billows of smoke.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The sun will be turned to darkness
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the moon to blood
- type: usfm
  marker: q2
  children:
  - type: text
    text: before the coming of the great and glorious day of the Lord.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: And everyone who calls
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the name of the Lord will be saved.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Joel 2:28-32
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“Fellow Israelites, listen to this: Jesus of Nazareth was a man accredited by God to you by miracles, wonders and signs, which God did among you through him, as you yourselves know. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: This man was handed over to you by God’s deliberate plan and foreknowledge; and you, with the help of wicked men,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'of those not having the law '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (that is, Gentiles)
    marker-yv: yv-n
  - type: text
    text: ' put him to death by nailing him to the cross. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But God raised him from the dead, freeing him from the agony of death, because it was impossible for death to keep its hold on him. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'David said about him:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘I saw the Lord always before me.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Because he is at my right hand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will not be shaken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Therefore my heart is glad and my tongue rejoices;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my body also will rest in hope,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: because you will not abandon me to the realm of the dead,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will not let your holy one see decay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: You have made known to me the paths of life;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will fill me with joy in your presence.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 16:8-11 (see Septuagint)
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '“Fellow Israelites, I can tell you confidently that the patriarch David died and was buried, and his tomb is here to this day. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'But he was a prophet and knew that God had promised him on oath that he would place one of his descendants on his throne. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Seeing what was to come, he spoke of the resurrection of the Messiah, that he was not abandoned to the realm of the dead, nor did his body see decay. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'God has raised this Jesus to life, and we are all witnesses of it. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Exalted to the right hand of God, he has received from the Father the promised Holy Spirit and has poured out what you now see and hear. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: For David did not ascend to heaven, and yet he said,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“ ‘The Lord said to my Lord:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Sit at my right hand
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: until I make your enemies
- type: usfm
  marker: q2
  children:
  - type: text
    text: a footstool for your feet.” ’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 110:1
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: '“Therefore let all Israel be assured of this: God has made this Jesus, whom you crucified, both Lord and Messiah.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: When the people heard this, they were cut to the heart and said to Peter and the other apostles, “Brothers, what shall we do?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Peter replied, “Repent and be baptized, every one of you, in the name of Jesus Christ for the forgiveness of your sins. And you will receive the gift of the Holy Spirit. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: The promise is for you and your children and for all who are far off—for all whom the Lord our God will call.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'With many other words he warned them; and he pleaded with them, “Save yourselves from this corrupt generation.” '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Those who accepted his message were baptized, and about three thousand were added to their number that day.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Fellowship of the Believers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'They devoted themselves to the apostles’ teaching and to fellowship, to the breaking of bread and to prayer. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Everyone was filled with awe at the many wonders and signs performed by the apostles. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'All the believers were together and had everything in common. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'They sold property and possessions to give to anyone who had need. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Every day they continued to meet together in the temple courts. They broke bread in their homes and ate together with glad and sincere hearts, '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: praising God and enjoying the favor of all the people. And the Lord added to their number daily those who were being saved.
