document_id: ACT.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Holy Spirit Comes at Pentecost
  - type: text
    content: 'When the day of Pentecost came, they were all together in one place. '
  '10':
  - type: text
    content: 'Phrygia and Pamphylia, Egypt and the parts of Libya near Cyrene; visitors from Rome '
  '11':
  - type: text
    content: '(both Jews and converts to Judaism); Cretans and Arabs—we hear them declaring the wonders of God in our own tongues!” '
  '12':
  - type: text
    content: Amazed and perplexed, they asked one another, “What does this mean?”
  '13':
  - type: text
    content: Some, however, made fun of them and said, “They have had too much wine.”
  - type: heading
    content: Peter Addresses the Crowd
  '14':
  - type: text
    content: 'Then Peter stood up with the Eleven, raised his voice and addressed the crowd: “Fellow Jews and all of you who live in Jerusalem, let me explain this to you; listen carefully to what I say. '
  '15':
  - type: text
    content: 'These people are not drunk, as you suppose. It’s only nine in the morning! '
  '16':
  - type: text
    content: 'No, this is what was spoken by the prophet Joel:'
  '17':
  - type: text
    content: “ ‘In the last days, God says,
  - type: text
    content: I will pour out my Spirit on all people.
  - type: text
    content: Your sons and daughters will prophesy,
  - type: text
    content: your young men will see visions,
  - type: text
    content: your old men will dream dreams.
  '18':
  - type: text
    content: Even on my servants, both men and women,
  - type: text
    content: I will pour out my Spirit in those days,
  - type: text
    content: and they will prophesy.
  '19':
  - type: text
    content: I will show wonders in the heavens above
  - type: text
    content: and signs on the earth below,
  - type: text
    content: blood and fire and billows of smoke.
  '2':
  - type: text
    content: 'Suddenly a sound like the blowing of a violent wind came from heaven and filled the whole house where they were sitting. '
  '20':
  - type: text
    content: The sun will be turned to darkness
  - type: text
    content: and the moon to blood
  - type: text
    content: before the coming of the great and glorious day of the Lord.
  '21':
  - type: text
    content: And everyone who calls
  - type: text
    content: on the name of the Lord will be saved.’
  - type: note
    content: Joel 2:28-32
  '22':
  - type: text
    content: '“Fellow Israelites, listen to this: Jesus of Nazareth was a man accredited by God to you by miracles, wonders and signs, which God did among you through him, as you yourselves know. '
  '23':
  - type: text
    content: This man was handed over to you by God’s deliberate plan and foreknowledge; and you, with the help of wicked men,
  - type: note
    content: Or of those not having the law (that is, Gentiles)
  - type: text
    content: ' put him to death by nailing him to the cross. '
  '24':
  - type: text
    content: 'But God raised him from the dead, freeing him from the agony of death, because it was impossible for death to keep its hold on him. '
  '25':
  - type: text
    content: 'David said about him:'
  - type: text
    content: “ ‘I saw the Lord always before me.
  - type: text
    content: Because he is at my right hand,
  - type: text
    content: I will not be shaken.
  '26':
  - type: text
    content: Therefore my heart is glad and my tongue rejoices;
  - type: text
    content: my body also will rest in hope,
  '27':
  - type: text
    content: because you will not abandon me to the realm of the dead,
  - type: text
    content: you will not let your holy one see decay.
  '28':
  - type: text
    content: You have made known to me the paths of life;
  - type: text
    content: you will fill me with joy in your presence.’
  - type: note
    content: Psalm 16:8-11 (see Septuagint)
  '29':
  - type: text
    content: '“Fellow Israelites, I can tell you confidently that the patriarch David died and was buried, and his tomb is here to this day. '
  '3':
  - type: text
    content: 'They saw what seemed to be tongues of fire that separated and came to rest on each of them. '
  '30':
  - type: text
    content: 'But he was a prophet and knew that God had promised him on oath that he would place one of his descendants on his throne. '
  '31':
  - type: text
    content: 'Seeing what was to come, he spoke of the resurrection of the Messiah, that he was not abandoned to the realm of the dead, nor did his body see decay. '
  '32':
  - type: text
    content: 'God has raised this Jesus to life, and we are all witnesses of it. '
  '33':
  - type: text
    content: 'Exalted to the right hand of God, he has received from the Father the promised Holy Spirit and has poured out what you now see and hear. '
  '34':
  - type: text
    content: For David did not ascend to heaven, and yet he said,
  - type: text
    content: '“ ‘The Lord said to my Lord:'
  - type: text
    content: “Sit at my right hand
  '35':
  - type: text
    content: until I make your enemies
  - type: text
    content: a footstool for your feet.” ’
  - type: note
    content: Psalm 110:1
  '36':
  - type: text
    content: '“Therefore let all Israel be assured of this: God has made this Jesus, whom you crucified, both Lord and Messiah.”'
  '37':
  - type: text
    content: When the people heard this, they were cut to the heart and said to Peter and the other apostles, “Brothers, what shall we do?”
  '38':
  - type: text
    content: 'Peter replied, “Repent and be baptized, every one of you, in the name of Jesus Christ for the forgiveness of your sins. And you will receive the gift of the Holy Spirit. '
  '39':
  - type: text
    content: The promise is for you and your children and for all who are far off—for all whom the Lord our God will call.”
  '4':
  - type: text
    content: All of them were filled with the Holy Spirit and began to speak in other tongues
  - type: note
    content: Or languages; also in verse 11
  - type: text
    content: ' as the Spirit enabled them.'
  '40':
  - type: text
    content: 'With many other words he warned them; and he pleaded with them, “Save yourselves from this corrupt generation.” '
  '41':
  - type: text
    content: Those who accepted his message were baptized, and about three thousand were added to their number that day.
  - type: heading
    content: The Fellowship of the Believers
  '42':
  - type: text
    content: 'They devoted themselves to the apostles’ teaching and to fellowship, to the breaking of bread and to prayer. '
  '43':
  - type: text
    content: 'Everyone was filled with awe at the many wonders and signs performed by the apostles. '
  '44':
  - type: text
    content: 'All the believers were together and had everything in common. '
  '45':
  - type: text
    content: 'They sold property and possessions to give to anyone who had need. '
  '46':
  - type: text
    content: 'Every day they continued to meet together in the temple courts. They broke bread in their homes and ate together with glad and sincere hearts, '
  '47':
  - type: text
    content: praising God and enjoying the favor of all the people. And the Lord added to their number daily those who were being saved.
  '5':
  - type: text
    content: 'Now there were staying in Jerusalem God-fearing Jews from every nation under heaven. '
  '6':
  - type: text
    content: 'When they heard this sound, a crowd came together in bewilderment, because each one heard their own language being spoken. '
  '7':
  - type: text
    content: 'Utterly amazed, they asked: “Aren’t all these who are speaking Galileans? '
  '8':
  - type: text
    content: 'Then how is it that each of us hears them in our native language? '
  '9':
  - type: text
    content: Parthians, Medes and Elamites; residents of Mesopotamia, Judea and Cappadocia, Pontus and Asia,
  - type: note
    content: That is, the Roman province by that name
  - type: text
    content: ' '
