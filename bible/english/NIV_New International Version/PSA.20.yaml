document_id: PSA.20,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 20In Hebrew texts 20:1-9 is numbered 20:2-10.
  - type: text
    content: For the director of music. A psalm of David.
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' answer you when you are in distress;'
  - type: text
    content: may the name of the God of Jacob protect you.
  '2':
  - type: text
    content: May he send you help from the sanctuary
  - type: text
    content: and grant you support from Zion.
  '3':
  - type: text
    content: May he remember all your sacrifices
  - type: text
    content: and accept your burnt offerings.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here.
  '4':
  - type: text
    content: May he give you the desire of your heart
  - type: text
    content: and make all your plans succeed.
  '5':
  - type: text
    content: May we shout for joy over your victory
  - type: text
    content: and lift up our banners in the name of our God.
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' grant all your requests.'
  '6':
  - type: text
    content: 'Now this I know:'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' gives victory to his anointed.'
  - type: text
    content: He answers him from his heavenly sanctuary
  - type: text
    content: with the victorious power of his right hand.
  '7':
  - type: text
    content: Some trust in chariots and some in horses,
  - type: text
    content: 'but we trust in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God.'
  '8':
  - type: text
    content: They are brought to their knees and fall,
  - type: text
    content: but we rise up and stand firm.
  '9':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', give victory to the king!'
  - type: text
    content: Answer us when we call!
