document_id: JDG.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Israelites Punish the Benjamites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then all Israel from Dan to Beersheba and from the land of Gilead came together as one and assembled before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' in Mizpah. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The leaders of all the people of the tribes of Israel took their places in the assembly of God’s people, four hundred thousand men armed with swords. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: (The Benjamites heard that the Israelites had gone up to Mizpah.) Then the Israelites said, “Tell us how this awful thing happened.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'So the Levite, the husband of the murdered woman, said, “I and my concubine came to Gibeah in Benjamin to spend the night. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'During the night the men of Gibeah came after me and surrounded the house, intending to kill me. They raped my concubine, and she died. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'I took my concubine, cut her into pieces and sent one piece to each region of Israel’s inheritance, because they committed this lewd and outrageous act in Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Now, all you Israelites, speak up and tell me what you have decided to do.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'All the men rose up together as one, saying, “None of us will go home. No, not one of us will return to his house. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'But now this is what we’ll do to Gibeah: We’ll go up against it in the order decided by casting lots. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: We’ll take ten men out of every hundred from all the tribes of Israel, and a hundred from a thousand, and a thousand from ten thousand, to get provisions for the army. Then, when the army arrives at Gibeah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'One Hebrew manuscript; most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Geba, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Gibeah
    marker-yv: yv-n
  - type: text
    text: ' in Benjamin, it can give them what they deserve for this outrageous act done in Israel.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So all the Israelites got together and united as one against the city.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The tribes of Israel sent messengers throughout the tribe of Benjamin, saying, “What about this awful crime that was committed among you? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Now turn those wicked men of Gibeah over to us so that we may put them to death and purge the evil from Israel.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'But the Benjamites would not listen to their fellow Israelites. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'From their towns they came together at Gibeah to fight against the Israelites. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'At once the Benjamites mobilized twenty-six thousand swordsmen from their towns, in addition to seven hundred able young men from those living in Gibeah. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Among all these soldiers there were seven hundred select troops who were left-handed, each of whom could sling a stone at a hair and not miss.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Israel, apart from Benjamin, mustered four hundred thousand swordsmen, all of them fit for battle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The Israelites went up to Bethel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to the house of God
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verse 26
    marker-yv: yv-n
  - type: text
    text: ' and inquired of God. They said, “Who of us is to go up first to fight against the Benjamites?”'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' replied, “Judah shall go first.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The next morning the Israelites got up and pitched camp near Gibeah. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The Israelites went out to fight the Benjamites and took up battle positions against them at Gibeah. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The Benjamites came out of Gibeah and cut down twenty-two thousand Israelites on the battlefield that day. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But the Israelites encouraged one another and again took up their positions where they had stationed themselves the first day. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The Israelites went up and wept before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' until evening, and they inquired of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: . They said, “Shall we go up again to fight against the Benjamites, our fellow Israelites?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' answered, “Go up against them.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Then the Israelites drew near to Benjamin the second day. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: This time, when the Benjamites came out from Gibeah to oppose them, they cut down another eighteen thousand Israelites, all of them armed with swords.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Then all the Israelites, the whole army, went up to Bethel, and there they sat weeping before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. They fasted that day until evening and presented burnt offerings and fellowship offerings to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'And the Israelites inquired of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. (In those days the ark of the covenant of God was there, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: with Phinehas son of Eleazar, the son of Aaron, ministering before it.) They asked, “Shall we go up again to fight against the Benjamites, our fellow Israelites, or not?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' responded, “Go, for tomorrow I will give them into your hands.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then Israel set an ambush around Gibeah. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'They went up against the Benjamites on the third day and took up positions against Gibeah as they had done before. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'The Benjamites came out to meet them and were drawn away from the city. They began to inflict casualties on the Israelites as before, so that about thirty men fell in the open field and on the roads—the one leading to Bethel and the other to Gibeah. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: While the Benjamites were saying, “We are defeating them as before,” the Israelites were saying, “Let’s retreat and draw them away from the city to the roads.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: All the men of Israel moved from their places and took up positions at Baal Tamar, and the Israelite ambush charged out of its place on the west
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some Septuagint manuscripts and Vulgate; the meaning of the Hebrew for this word is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' of Gibeah.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Geba, '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Gibeah
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Then ten thousand of Israel’s able young men made a frontal attack on Gibeah. The fighting was so heavy that the Benjamites did not realize how near disaster was. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' defeated Benjamin before Israel, and on that day the Israelites struck down 25,100 Benjamites, all armed with swords. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Then the Benjamites saw that they were beaten.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Now the men of Israel had given way before Benjamin, because they relied on the ambush they had set near Gibeah. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Those who had been in ambush made a sudden dash into Gibeah, spread out and put the whole city to the sword. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'The Israelites had arranged with the ambush that they should send up a great cloud of smoke from the city, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: and then the Israelites would counterattack.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The Benjamites had begun to inflict casualties on the Israelites (about thirty), and they said, “We are defeating them as in the first battle.” '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'But when the column of smoke began to rise from the city, the Benjamites turned and saw the whole city going up in smoke. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Then the Israelites counterattacked, and the Benjamites were terrified, because they realized that disaster had come on them. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'So they fled before the Israelites in the direction of the wilderness, but they could not escape the battle. And the Israelites who came out of the towns cut them down there. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: They surrounded the Benjamites, chased them and easily
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this word is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' overran them in the vicinity of Gibeah on the east. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Eighteen thousand Benjamites fell, all of them valiant fighters. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: As they turned and fled toward the wilderness to the rock of Rimmon, the Israelites cut down five thousand men along the roads. They kept pressing after the Benjamites as far as Gidom and struck down two thousand more.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'On that day twenty-five thousand Benjamite swordsmen fell, all of them valiant fighters. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'But six hundred of them turned and fled into the wilderness to the rock of Rimmon, where they stayed four months. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: The men of Israel went back to Benjamin and put all the towns to the sword, including the animals and everything else they found. All the towns they came across they set on fire.
