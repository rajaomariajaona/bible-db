document_id: JDG.20,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Israelites Punish the Benjamites
  - type: text
    content: 'Then all Israel from Dan to Beersheba and from the land of Gilead came together as one and assembled before the '
  - type: text
    content: Lord
  - type: text
    content: ' in Mizpah. '
  '10':
  - type: text
    content: We’ll take ten men out of every hundred from all the tribes of Israel, and a hundred from a thousand, and a thousand from ten thousand, to get provisions for the army. Then, when the army arrives at Gibeah
  - type: note
    content: One Hebrew manuscript; most Hebrew manuscripts Geba, a variant of Gibeah
  - type: text
    content: ' in Benjamin, it can give them what they deserve for this outrageous act done in Israel.” '
  '11':
  - type: text
    content: So all the Israelites got together and united as one against the city.
  '12':
  - type: text
    content: 'The tribes of Israel sent messengers throughout the tribe of Benjamin, saying, “What about this awful crime that was committed among you? '
  '13':
  - type: text
    content: Now turn those wicked men of Gibeah over to us so that we may put them to death and purge the evil from Israel.”
  - type: text
    content: 'But the Benjamites would not listen to their fellow Israelites. '
  '14':
  - type: text
    content: 'From their towns they came together at Gibeah to fight against the Israelites. '
  '15':
  - type: text
    content: 'At once the Benjamites mobilized twenty-six thousand swordsmen from their towns, in addition to seven hundred able young men from those living in Gibeah. '
  '16':
  - type: text
    content: Among all these soldiers there were seven hundred select troops who were left-handed, each of whom could sling a stone at a hair and not miss.
  '17':
  - type: text
    content: Israel, apart from Benjamin, mustered four hundred thousand swordsmen, all of them fit for battle.
  '18':
  - type: text
    content: The Israelites went up to Bethel
  - type: note
    content: Or to the house of God; also in verse 26
  - type: text
    content: ' and inquired of God. They said, “Who of us is to go up first to fight against the Benjamites?”'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' replied, “Judah shall go first.”'
  '19':
  - type: text
    content: 'The next morning the Israelites got up and pitched camp near Gibeah. '
  '2':
  - type: text
    content: 'The leaders of all the people of the tribes of Israel took their places in the assembly of God’s people, four hundred thousand men armed with swords. '
  '20':
  - type: text
    content: 'The Israelites went out to fight the Benjamites and took up battle positions against them at Gibeah. '
  '21':
  - type: text
    content: 'The Benjamites came out of Gibeah and cut down twenty-two thousand Israelites on the battlefield that day. '
  '22':
  - type: text
    content: 'But the Israelites encouraged one another and again took up their positions where they had stationed themselves the first day. '
  '23':
  - type: text
    content: 'The Israelites went up and wept before the '
  - type: text
    content: Lord
  - type: text
    content: ' until evening, and they inquired of the '
  - type: text
    content: Lord
  - type: text
    content: . They said, “Shall we go up again to fight against the Benjamites, our fellow Israelites?”
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' answered, “Go up against them.”'
  '24':
  - type: text
    content: 'Then the Israelites drew near to Benjamin the second day. '
  '25':
  - type: text
    content: This time, when the Benjamites came out from Gibeah to oppose them, they cut down another eighteen thousand Israelites, all of them armed with swords.
  '26':
  - type: text
    content: 'Then all the Israelites, the whole army, went up to Bethel, and there they sat weeping before the '
  - type: text
    content: Lord
  - type: text
    content: '. They fasted that day until evening and presented burnt offerings and fellowship offerings to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'And the Israelites inquired of the '
  - type: text
    content: Lord
  - type: text
    content: '. (In those days the ark of the covenant of God was there, '
  '28':
  - type: text
    content: with Phinehas son of Eleazar, the son of Aaron, ministering before it.) They asked, “Shall we go up again to fight against the Benjamites, our fellow Israelites, or not?”
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' responded, “Go, for tomorrow I will give them into your hands.”'
  '29':
  - type: text
    content: 'Then Israel set an ambush around Gibeah. '
  '3':
  - type: text
    content: (The Benjamites heard that the Israelites had gone up to Mizpah.) Then the Israelites said, “Tell us how this awful thing happened.”
  '30':
  - type: text
    content: 'They went up against the Benjamites on the third day and took up positions against Gibeah as they had done before. '
  '31':
  - type: text
    content: 'The Benjamites came out to meet them and were drawn away from the city. They began to inflict casualties on the Israelites as before, so that about thirty men fell in the open field and on the roads—the one leading to Bethel and the other to Gibeah. '
  '32':
  - type: text
    content: While the Benjamites were saying, “We are defeating them as before,” the Israelites were saying, “Let’s retreat and draw them away from the city to the roads.”
  '33':
  - type: text
    content: All the men of Israel moved from their places and took up positions at Baal Tamar, and the Israelite ambush charged out of its place on the west
  - type: note
    content: Some Septuagint manuscripts and Vulgate; the meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' of Gibeah.'
  - type: note
    content: Hebrew Geba, a variant of Gibeah
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Then ten thousand of Israel’s able young men made a frontal attack on Gibeah. The fighting was so heavy that the Benjamites did not realize how near disaster was. '
  '35':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' defeated Benjamin before Israel, and on that day the Israelites struck down 25,100 Benjamites, all armed with swords. '
  '36':
  - type: text
    content: Then the Benjamites saw that they were beaten.
  - type: text
    content: 'Now the men of Israel had given way before Benjamin, because they relied on the ambush they had set near Gibeah. '
  '37':
  - type: text
    content: 'Those who had been in ambush made a sudden dash into Gibeah, spread out and put the whole city to the sword. '
  '38':
  - type: text
    content: 'The Israelites had arranged with the ambush that they should send up a great cloud of smoke from the city, '
  '39':
  - type: text
    content: and then the Israelites would counterattack.
  - type: text
    content: 'The Benjamites had begun to inflict casualties on the Israelites (about thirty), and they said, “We are defeating them as in the first battle.” '
  '4':
  - type: text
    content: 'So the Levite, the husband of the murdered woman, said, “I and my concubine came to Gibeah in Benjamin to spend the night. '
  '40':
  - type: text
    content: 'But when the column of smoke began to rise from the city, the Benjamites turned and saw the whole city going up in smoke. '
  '41':
  - type: text
    content: 'Then the Israelites counterattacked, and the Benjamites were terrified, because they realized that disaster had come on them. '
  '42':
  - type: text
    content: 'So they fled before the Israelites in the direction of the wilderness, but they could not escape the battle. And the Israelites who came out of the towns cut them down there. '
  '43':
  - type: text
    content: They surrounded the Benjamites, chased them and easily
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' overran them in the vicinity of Gibeah on the east. '
  '44':
  - type: text
    content: 'Eighteen thousand Benjamites fell, all of them valiant fighters. '
  '45':
  - type: text
    content: As they turned and fled toward the wilderness to the rock of Rimmon, the Israelites cut down five thousand men along the roads. They kept pressing after the Benjamites as far as Gidom and struck down two thousand more.
  '46':
  - type: text
    content: 'On that day twenty-five thousand Benjamite swordsmen fell, all of them valiant fighters. '
  '47':
  - type: text
    content: 'But six hundred of them turned and fled into the wilderness to the rock of Rimmon, where they stayed four months. '
  '48':
  - type: text
    content: The men of Israel went back to Benjamin and put all the towns to the sword, including the animals and everything else they found. All the towns they came across they set on fire.
  '5':
  - type: text
    content: 'During the night the men of Gibeah came after me and surrounded the house, intending to kill me. They raped my concubine, and she died. '
  '6':
  - type: text
    content: 'I took my concubine, cut her into pieces and sent one piece to each region of Israel’s inheritance, because they committed this lewd and outrageous act in Israel. '
  '7':
  - type: text
    content: Now, all you Israelites, speak up and tell me what you have decided to do.”
  '8':
  - type: text
    content: 'All the men rose up together as one, saying, “None of us will go home. No, not one of us will return to his house. '
  '9':
  - type: text
    content: 'But now this is what we’ll do to Gibeah: We’ll go up against it in the order decided by casting lots. '
