document_id: ISA.32,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Kingdom of Righteousness
  - type: text
    content: See, a king will reign in righteousness
  - type: text
    content: and rulers will rule with justice.
  '10':
  - type: text
    content: In little more than a year
  - type: text
    content: you who feel secure will tremble;
  - type: text
    content: the grape harvest will fail,
  - type: text
    content: and the harvest of fruit will not come.
  '11':
  - type: text
    content: Tremble, you complacent women;
  - type: text
    content: shudder, you daughters who feel secure!
  - type: text
    content: Strip off your fine clothes
  - type: text
    content: and wrap yourselves in rags.
  '12':
  - type: text
    content: Beat your breasts for the pleasant fields,
  - type: text
    content: for the fruitful vines
  '13':
  - type: text
    content: and for the land of my people,
  - type: text
    content: a land overgrown with thorns and briers—
  - type: text
    content: yes, mourn for all houses of merriment
  - type: text
    content: and for this city of revelry.
  '14':
  - type: text
    content: The fortress will be abandoned,
  - type: text
    content: the noisy city deserted;
  - type: text
    content: citadel and watchtower will become a wasteland forever,
  - type: text
    content: the delight of donkeys, a pasture for flocks,
  '15':
  - type: text
    content: till the Spirit is poured on us from on high,
  - type: text
    content: and the desert becomes a fertile field,
  - type: text
    content: and the fertile field seems like a forest.
  '16':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ’s justice will dwell in the desert,
  - type: text
    content: his righteousness live in the fertile field.
  '17':
  - type: text
    content: The fruit of that righteousness will be peace;
  - type: text
    content: its effect will be quietness and confidence forever.
  '18':
  - type: text
    content: My people will live in peaceful dwelling places,
  - type: text
    content: in secure homes,
  - type: text
    content: in undisturbed places of rest.
  '19':
  - type: text
    content: Though hail flattens the forest
  - type: text
    content: and the city is leveled completely,
  '2':
  - type: text
    content: Each one will be like a shelter from the wind
  - type: text
    content: and a refuge from the storm,
  - type: text
    content: like streams of water in the desert
  - type: text
    content: and the shadow of a great rock in a thirsty land.
  '20':
  - type: text
    content: how blessed you will be,
  - type: text
    content: sowing your seed by every stream,
  - type: text
    content: and letting your cattle and donkeys range free.
  '3':
  - type: text
    content: Then the eyes of those who see will no longer be closed,
  - type: text
    content: and the ears of those who hear will listen.
  '4':
  - type: text
    content: The fearful heart will know and understand,
  - type: text
    content: and the stammering tongue will be fluent and clear.
  '5':
  - type: text
    content: No longer will the fool be called noble
  - type: text
    content: nor the scoundrel be highly respected.
  '6':
  - type: text
    content: For fools speak folly,
  - type: text
    content: 'their hearts are bent on evil:'
  - type: text
    content: They practice ungodliness
  - type: text
    content: 'and spread error concerning the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: the hungry they leave empty
  - type: text
    content: and from the thirsty they withhold water.
  '7':
  - type: text
    content: Scoundrels use wicked methods,
  - type: text
    content: they make up evil schemes
  - type: text
    content: to destroy the poor with lies,
  - type: text
    content: even when the plea of the needy is just.
  '8':
  - type: text
    content: But the noble make noble plans,
  - type: text
    content: and by noble deeds they stand.
  - type: heading
    content: The Women of Jerusalem
  '9':
  - type: text
    content: You women who are so complacent,
  - type: text
    content: rise up and listen to me;
  - type: text
    content: you daughters who feel secure,
  - type: text
    content: hear what I have to say!
