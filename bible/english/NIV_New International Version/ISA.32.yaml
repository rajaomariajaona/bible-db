document_id: ISA.32
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Kingdom of Righteousness
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: See, a king will reign in righteousness
- type: usfm
  marker: q2
  children:
  - type: text
    text: and rulers will rule with justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Each one will be like a shelter from the wind
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a refuge from the storm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: like streams of water in the desert
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the shadow of a great rock in a thirsty land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Then the eyes of those who see will no longer be closed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the ears of those who hear will listen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The fearful heart will know and understand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the stammering tongue will be fluent and clear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: No longer will the fool be called noble
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor the scoundrel be highly respected.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: For fools speak folly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'their hearts are bent on evil:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They practice ungodliness
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and spread error concerning the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: the hungry they leave empty
- type: usfm
  marker: q2
  children:
  - type: text
    text: and from the thirsty they withhold water.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Scoundrels use wicked methods,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they make up evil schemes
- type: usfm
  marker: q1
  children:
  - type: text
    text: to destroy the poor with lies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even when the plea of the needy is just.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But the noble make noble plans,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and by noble deeds they stand.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Women of Jerusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You women who are so complacent,
- type: usfm
  marker: q2
  children:
  - type: text
    text: rise up and listen to me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: you daughters who feel secure,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hear what I have to say!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: In little more than a year
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who feel secure will tremble;
- type: usfm
  marker: q1
  children:
  - type: text
    text: the grape harvest will fail,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the harvest of fruit will not come.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tremble, you complacent women;
- type: usfm
  marker: q2
  children:
  - type: text
    text: shudder, you daughters who feel secure!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Strip off your fine clothes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wrap yourselves in rags.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Beat your breasts for the pleasant fields,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the fruitful vines
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: and for the land of my people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a land overgrown with thorns and briers—
- type: usfm
  marker: q1
  children:
  - type: text
    text: yes, mourn for all houses of merriment
- type: usfm
  marker: q2
  children:
  - type: text
    text: and for this city of revelry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The fortress will be abandoned,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the noisy city deserted;
- type: usfm
  marker: q1
  children:
  - type: text
    text: citadel and watchtower will become a wasteland forever,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the delight of donkeys, a pasture for flocks,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: till the Spirit is poured on us from on high,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the desert becomes a fertile field,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the fertile field seems like a forest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s justice will dwell in the desert,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his righteousness live in the fertile field.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The fruit of that righteousness will be peace;
- type: usfm
  marker: q2
  children:
  - type: text
    text: its effect will be quietness and confidence forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: My people will live in peaceful dwelling places,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in secure homes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in undisturbed places of rest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Though hail flattens the forest
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the city is leveled completely,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: how blessed you will be,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sowing your seed by every stream,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and letting your cattle and donkeys range free.
