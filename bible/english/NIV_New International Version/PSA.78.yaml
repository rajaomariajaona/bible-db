document_id: PSA.78,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 78
  - type: text
    content: 'A '
  - type: text
    content: maskil
  - type: note
    content: 'Title: Probably a literary or musical term'
  - type: text
    content: ' of Asaph.'
  - type: text
    content: My people, hear my teaching;
  - type: text
    content: listen to the words of my mouth.
  '10':
  - type: text
    content: they did not keep God’s covenant
  - type: text
    content: and refused to live by his law.
  '11':
  - type: text
    content: They forgot what he had done,
  - type: text
    content: the wonders he had shown them.
  '12':
  - type: text
    content: He did miracles in the sight of their ancestors
  - type: text
    content: in the land of Egypt, in the region of Zoan.
  '13':
  - type: text
    content: He divided the sea and led them through;
  - type: text
    content: he made the water stand up like a wall.
  '14':
  - type: text
    content: He guided them with the cloud by day
  - type: text
    content: and with light from the fire all night.
  '15':
  - type: text
    content: He split the rocks in the wilderness
  - type: text
    content: and gave them water as abundant as the seas;
  '16':
  - type: text
    content: he brought streams out of a rocky crag
  - type: text
    content: and made water flow down like rivers.
  '17':
  - type: text
    content: But they continued to sin against him,
  - type: text
    content: rebelling in the wilderness against the Most High.
  '18':
  - type: text
    content: They willfully put God to the test
  - type: text
    content: by demanding the food they craved.
  '19':
  - type: text
    content: They spoke against God;
  - type: text
    content: they said, “Can God really
  - type: text
    content: spread a table in the wilderness?
  '2':
  - type: text
    content: I will open my mouth with a parable;
  - type: text
    content: I will utter hidden things, things from of old—
  '20':
  - type: text
    content: True, he struck the rock,
  - type: text
    content: and water gushed out,
  - type: text
    content: streams flowed abundantly,
  - type: text
    content: but can he also give us bread?
  - type: text
    content: Can he supply meat for his people?”
  '21':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' heard them, he was furious;'
  - type: text
    content: his fire broke out against Jacob,
  - type: text
    content: and his wrath rose against Israel,
  '22':
  - type: text
    content: for they did not believe in God
  - type: text
    content: or trust in his deliverance.
  '23':
  - type: text
    content: Yet he gave a command to the skies above
  - type: text
    content: and opened the doors of the heavens;
  '24':
  - type: text
    content: he rained down manna for the people to eat,
  - type: text
    content: he gave them the grain of heaven.
  '25':
  - type: text
    content: Human beings ate the bread of angels;
  - type: text
    content: he sent them all the food they could eat.
  '26':
  - type: text
    content: He let loose the east wind from the heavens
  - type: text
    content: and by his power made the south wind blow.
  '27':
  - type: text
    content: He rained meat down on them like dust,
  - type: text
    content: birds like sand on the seashore.
  '28':
  - type: text
    content: He made them come down inside their camp,
  - type: text
    content: all around their tents.
  '29':
  - type: text
    content: They ate till they were gorged—
  - type: text
    content: he had given them what they craved.
  '3':
  - type: text
    content: things we have heard and known,
  - type: text
    content: things our ancestors have told us.
  '30':
  - type: text
    content: But before they turned from what they craved,
  - type: text
    content: even while the food was still in their mouths,
  '31':
  - type: text
    content: God’s anger rose against them;
  - type: text
    content: he put to death the sturdiest among them,
  - type: text
    content: cutting down the young men of Israel.
  '32':
  - type: text
    content: In spite of all this, they kept on sinning;
  - type: text
    content: in spite of his wonders, they did not believe.
  '33':
  - type: text
    content: So he ended their days in futility
  - type: text
    content: and their years in terror.
  '34':
  - type: text
    content: Whenever God slew them, they would seek him;
  - type: text
    content: they eagerly turned to him again.
  '35':
  - type: text
    content: They remembered that God was their Rock,
  - type: text
    content: that God Most High was their Redeemer.
  '36':
  - type: text
    content: But then they would flatter him with their mouths,
  - type: text
    content: lying to him with their tongues;
  '37':
  - type: text
    content: their hearts were not loyal to him,
  - type: text
    content: they were not faithful to his covenant.
  '38':
  - type: text
    content: Yet he was merciful;
  - type: text
    content: he forgave their iniquities
  - type: text
    content: and did not destroy them.
  - type: text
    content: Time after time he restrained his anger
  - type: text
    content: and did not stir up his full wrath.
  '39':
  - type: text
    content: He remembered that they were but flesh,
  - type: text
    content: a passing breeze that does not return.
  '4':
  - type: text
    content: We will not hide them from their descendants;
  - type: text
    content: we will tell the next generation
  - type: text
    content: 'the praiseworthy deeds of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: his power, and the wonders he has done.
  '40':
  - type: text
    content: How often they rebelled against him in the wilderness
  - type: text
    content: and grieved him in the wasteland!
  '41':
  - type: text
    content: Again and again they put God to the test;
  - type: text
    content: they vexed the Holy One of Israel.
  '42':
  - type: text
    content: They did not remember his power—
  - type: text
    content: the day he redeemed them from the oppressor,
  '43':
  - type: text
    content: the day he displayed his signs in Egypt,
  - type: text
    content: his wonders in the region of Zoan.
  '44':
  - type: text
    content: He turned their river into blood;
  - type: text
    content: they could not drink from their streams.
  '45':
  - type: text
    content: He sent swarms of flies that devoured them,
  - type: text
    content: and frogs that devastated them.
  '46':
  - type: text
    content: He gave their crops to the grasshopper,
  - type: text
    content: their produce to the locust.
  '47':
  - type: text
    content: He destroyed their vines with hail
  - type: text
    content: and their sycamore-figs with sleet.
  '48':
  - type: text
    content: He gave over their cattle to the hail,
  - type: text
    content: their livestock to bolts of lightning.
  '49':
  - type: text
    content: He unleashed against them his hot anger,
  - type: text
    content: his wrath, indignation and hostility—
  - type: text
    content: a band of destroying angels.
  '5':
  - type: text
    content: He decreed statutes for Jacob
  - type: text
    content: and established the law in Israel,
  - type: text
    content: which he commanded our ancestors
  - type: text
    content: to teach their children,
  '50':
  - type: text
    content: He prepared a path for his anger;
  - type: text
    content: he did not spare them from death
  - type: text
    content: but gave them over to the plague.
  '51':
  - type: text
    content: He struck down all the firstborn of Egypt,
  - type: text
    content: the firstfruits of manhood in the tents of Ham.
  '52':
  - type: text
    content: But he brought his people out like a flock;
  - type: text
    content: he led them like sheep through the wilderness.
  '53':
  - type: text
    content: He guided them safely, so they were unafraid;
  - type: text
    content: but the sea engulfed their enemies.
  '54':
  - type: text
    content: And so he brought them to the border of his holy land,
  - type: text
    content: to the hill country his right hand had taken.
  '55':
  - type: text
    content: He drove out nations before them
  - type: text
    content: and allotted their lands to them as an inheritance;
  - type: text
    content: he settled the tribes of Israel in their homes.
  '56':
  - type: text
    content: But they put God to the test
  - type: text
    content: and rebelled against the Most High;
  - type: text
    content: they did not keep his statutes.
  '57':
  - type: text
    content: Like their ancestors they were disloyal and faithless,
  - type: text
    content: as unreliable as a faulty bow.
  '58':
  - type: text
    content: They angered him with their high places;
  - type: text
    content: they aroused his jealousy with their idols.
  '59':
  - type: text
    content: When God heard them, he was furious;
  - type: text
    content: he rejected Israel completely.
  '6':
  - type: text
    content: so the next generation would know them,
  - type: text
    content: even the children yet to be born,
  - type: text
    content: and they in turn would tell their children.
  '60':
  - type: text
    content: He abandoned the tabernacle of Shiloh,
  - type: text
    content: the tent he had set up among humans.
  '61':
  - type: text
    content: He sent the ark of his might into captivity,
  - type: text
    content: his splendor into the hands of the enemy.
  '62':
  - type: text
    content: He gave his people over to the sword;
  - type: text
    content: he was furious with his inheritance.
  '63':
  - type: text
    content: Fire consumed their young men,
  - type: text
    content: and their young women had no wedding songs;
  '64':
  - type: text
    content: their priests were put to the sword,
  - type: text
    content: and their widows could not weep.
  '65':
  - type: text
    content: Then the Lord awoke as from sleep,
  - type: text
    content: as a warrior wakes from the stupor of wine.
  '66':
  - type: text
    content: He beat back his enemies;
  - type: text
    content: he put them to everlasting shame.
  '67':
  - type: text
    content: Then he rejected the tents of Joseph,
  - type: text
    content: he did not choose the tribe of Ephraim;
  '68':
  - type: text
    content: but he chose the tribe of Judah,
  - type: text
    content: Mount Zion, which he loved.
  '69':
  - type: text
    content: He built his sanctuary like the heights,
  - type: text
    content: like the earth that he established forever.
  '7':
  - type: text
    content: Then they would put their trust in God
  - type: text
    content: and would not forget his deeds
  - type: text
    content: but would keep his commands.
  '70':
  - type: text
    content: He chose David his servant
  - type: text
    content: and took him from the sheep pens;
  '71':
  - type: text
    content: from tending the sheep he brought him
  - type: text
    content: to be the shepherd of his people Jacob,
  - type: text
    content: of Israel his inheritance.
  '72':
  - type: text
    content: And David shepherded them with integrity of heart;
  - type: text
    content: with skillful hands he led them.
  '8':
  - type: text
    content: They would not be like their ancestors—
  - type: text
    content: a stubborn and rebellious generation,
  - type: text
    content: whose hearts were not loyal to God,
  - type: text
    content: whose spirits were not faithful to him.
  '9':
  - type: text
    content: The men of Ephraim, though armed with bows,
  - type: text
    content: turned back on the day of battle;
