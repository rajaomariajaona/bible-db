document_id: PSA.78
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 78
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'A '
  - type: usfm
    marker: tl
    children:
    - type: text
      text: maskil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Title: Probably a literary or musical term'
    marker-yv: yv-n
  - type: text
    text: ' of Asaph.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: My people, hear my teaching;
- type: usfm
  marker: q2
  children:
  - type: text
    text: listen to the words of my mouth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I will open my mouth with a parable;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will utter hidden things, things from of old—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: things we have heard and known,
- type: usfm
  marker: q2
  children:
  - type: text
    text: things our ancestors have told us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: We will not hide them from their descendants;
- type: usfm
  marker: q2
  children:
  - type: text
    text: we will tell the next generation
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'the praiseworthy deeds of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: his power, and the wonders he has done.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: He decreed statutes for Jacob
- type: usfm
  marker: q2
  children:
  - type: text
    text: and established the law in Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: which he commanded our ancestors
- type: usfm
  marker: q2
  children:
  - type: text
    text: to teach their children,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: so the next generation would know them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even the children yet to be born,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they in turn would tell their children.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Then they would put their trust in God
- type: usfm
  marker: q2
  children:
  - type: text
    text: and would not forget his deeds
- type: usfm
  marker: q2
  children:
  - type: text
    text: but would keep his commands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They would not be like their ancestors—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a stubborn and rebellious generation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: whose hearts were not loyal to God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose spirits were not faithful to him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The men of Ephraim, though armed with bows,
- type: usfm
  marker: q2
  children:
  - type: text
    text: turned back on the day of battle;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: they did not keep God’s covenant
- type: usfm
  marker: q2
  children:
  - type: text
    text: and refused to live by his law.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They forgot what he had done,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the wonders he had shown them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He did miracles in the sight of their ancestors
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the land of Egypt, in the region of Zoan.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: He divided the sea and led them through;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he made the water stand up like a wall.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He guided them with the cloud by day
- type: usfm
  marker: q2
  children:
  - type: text
    text: and with light from the fire all night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He split the rocks in the wilderness
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gave them water as abundant as the seas;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: he brought streams out of a rocky crag
- type: usfm
  marker: q2
  children:
  - type: text
    text: and made water flow down like rivers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: But they continued to sin against him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: rebelling in the wilderness against the Most High.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: They willfully put God to the test
- type: usfm
  marker: q2
  children:
  - type: text
    text: by demanding the food they craved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: They spoke against God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they said, “Can God really
- type: usfm
  marker: q2
  children:
  - type: text
    text: spread a table in the wilderness?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: True, he struck the rock,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and water gushed out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: streams flowed abundantly,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but can he also give us bread?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Can he supply meat for his people?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'When the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' heard them, he was furious;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: his fire broke out against Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his wrath rose against Israel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: for they did not believe in God
- type: usfm
  marker: q2
  children:
  - type: text
    text: or trust in his deliverance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Yet he gave a command to the skies above
- type: usfm
  marker: q2
  children:
  - type: text
    text: and opened the doors of the heavens;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: he rained down manna for the people to eat,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he gave them the grain of heaven.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Human beings ate the bread of angels;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he sent them all the food they could eat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: He let loose the east wind from the heavens
- type: usfm
  marker: q2
  children:
  - type: text
    text: and by his power made the south wind blow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: He rained meat down on them like dust,
- type: usfm
  marker: q2
  children:
  - type: text
    text: birds like sand on the seashore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: He made them come down inside their camp,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all around their tents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: They ate till they were gorged—
- type: usfm
  marker: q2
  children:
  - type: text
    text: he had given them what they craved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: But before they turned from what they craved,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even while the food was still in their mouths,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: God’s anger rose against them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he put to death the sturdiest among them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: cutting down the young men of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: In spite of all this, they kept on sinning;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in spite of his wonders, they did not believe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: So he ended their days in futility
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their years in terror.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Whenever God slew them, they would seek him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they eagerly turned to him again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: They remembered that God was their Rock,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that God Most High was their Redeemer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: But then they would flatter him with their mouths,
- type: usfm
  marker: q2
  children:
  - type: text
    text: lying to him with their tongues;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: their hearts were not loyal to him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they were not faithful to his covenant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Yet he was merciful;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he forgave their iniquities
- type: usfm
  marker: q2
  children:
  - type: text
    text: and did not destroy them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Time after time he restrained his anger
- type: usfm
  marker: q2
  children:
  - type: text
    text: and did not stir up his full wrath.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: He remembered that they were but flesh,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a passing breeze that does not return.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: How often they rebelled against him in the wilderness
- type: usfm
  marker: q2
  children:
  - type: text
    text: and grieved him in the wasteland!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Again and again they put God to the test;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they vexed the Holy One of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: They did not remember his power—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the day he redeemed them from the oppressor,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: the day he displayed his signs in Egypt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his wonders in the region of Zoan.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: He turned their river into blood;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they could not drink from their streams.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: He sent swarms of flies that devoured them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and frogs that devastated them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: He gave their crops to the grasshopper,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their produce to the locust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: He destroyed their vines with hail
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their sycamore-figs with sleet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: He gave over their cattle to the hail,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their livestock to bolts of lightning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: He unleashed against them his hot anger,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his wrath, indignation and hostility—
- type: usfm
  marker: q2
  children:
  - type: text
    text: a band of destroying angels.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: He prepared a path for his anger;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he did not spare them from death
- type: usfm
  marker: q2
  children:
  - type: text
    text: but gave them over to the plague.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: He struck down all the firstborn of Egypt,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the firstfruits of manhood in the tents of Ham.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: But he brought his people out like a flock;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he led them like sheep through the wilderness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: He guided them safely, so they were unafraid;
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the sea engulfed their enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: And so he brought them to the border of his holy land,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the hill country his right hand had taken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: He drove out nations before them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and allotted their lands to them as an inheritance;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he settled the tribes of Israel in their homes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: But they put God to the test
- type: usfm
  marker: q2
  children:
  - type: text
    text: and rebelled against the Most High;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they did not keep his statutes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Like their ancestors they were disloyal and faithless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as unreliable as a faulty bow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: They angered him with their high places;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they aroused his jealousy with their idols.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: When God heard them, he was furious;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he rejected Israel completely.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: He abandoned the tabernacle of Shiloh,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the tent he had set up among humans.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: He sent the ark of his might into captivity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his splendor into the hands of the enemy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: He gave his people over to the sword;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he was furious with his inheritance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: Fire consumed their young men,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their young women had no wedding songs;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: their priests were put to the sword,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their widows could not weep.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: Then the Lord awoke as from sleep,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as a warrior wakes from the stupor of wine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: He beat back his enemies;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he put them to everlasting shame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: Then he rejected the tents of Joseph,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he did not choose the tribe of Ephraim;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: but he chose the tribe of Judah,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Mount Zion, which he loved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: He built his sanctuary like the heights,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like the earth that he established forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: He chose David his servant
- type: usfm
  marker: q2
  children:
  - type: text
    text: and took him from the sheep pens;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: from tending the sheep he brought him
- type: usfm
  marker: q2
  children:
  - type: text
    text: to be the shepherd of his people Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: of Israel his inheritance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '72'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: And David shepherded them with integrity of heart;
- type: usfm
  marker: q2
  children:
  - type: text
    text: with skillful hands he led them.
