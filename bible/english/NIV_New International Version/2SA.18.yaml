document_id: 2SA.18
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'David mustered the men who were with him and appointed over them commanders of thousands and commanders of hundreds. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: David sent out his troops, a third under the command of Joab, a third under Joab’s brother Abishai son of Zeruiah, and a third under Ittai the Gittite. The king told the troops, “I myself will surely march out with you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But the men said, “You must not go out; if we are forced to flee, they won’t care about us. Even if half of us die, they won’t care; but you are worth ten thousand of us.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Two Hebrew manuscripts, some Septuagint manuscripts and Vulgate; most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: care; for now there are ten thousand like us
    marker-yv: yv-n
  - type: text
    text: ' It would be better now for you to give us support from the city.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The king answered, “I will do whatever seems best to you.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'So the king stood beside the gate while all his men marched out in units of hundreds and of thousands. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The king commanded Joab, Abishai and Ittai, “Be gentle with the young man Absalom for my sake.” And all the troops heard the king giving orders concerning Absalom to each of the commanders.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'David’s army marched out of the city to fight Israel, and the battle took place in the forest of Ephraim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'There Israel’s troops were routed by David’s men, and the casualties that day were great—twenty thousand men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The battle spread out over the whole countryside, and the forest swallowed up more men that day than the sword.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Now Absalom happened to meet David’s men. He was riding his mule, and as the mule went under the thick branches of a large oak, Absalom’s hair got caught in the tree. He was left hanging in midair, while the mule he was riding kept on going.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: When one of the men saw what had happened, he told Joab, “I just saw Absalom hanging in an oak tree.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Joab said to the man who had told him this, “What! You saw him? Why didn’t you strike him to the ground right there? Then I would have had to give you ten shekels
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 4 ounces or about 115 grams
    marker-yv: yv-n
  - type: text
    text: ' of silver and a warrior’s belt.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: But the man replied, “Even if a thousand shekels
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 25 pounds or about 12 kilograms
    marker-yv: yv-n
  - type: text
    text: ' were weighed out into my hands, I would not lay a hand on the king’s son. In our hearing the king commanded you and Abishai and Ittai, ‘Protect the young man Absalom for my sake.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A few Hebrew manuscripts, Septuagint, Vulgate and Syriac; most Hebrew manuscripts may be translated '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Absalom, whoever you may be.
    marker-yv: yv-n
  - type: text
    text: '’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And if I had put my life in jeopardy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Otherwise, if I had acted treacherously toward him
    marker-yv: yv-n
  - type: text
    text: —and nothing is hidden from the king—you would have kept your distance from me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Joab said, “I’m not going to wait like this for you.” So he took three javelins in his hand and plunged them into Absalom’s heart while Absalom was still alive in the oak tree. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And ten of Joab’s armor-bearers surrounded Absalom, struck him and killed him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Then Joab sounded the trumpet, and the troops stopped pursuing Israel, for Joab halted them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: They took Absalom, threw him into a big pit in the forest and piled up a large heap of rocks over him. Meanwhile, all the Israelites fled to their homes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: During his lifetime Absalom had taken a pillar and erected it in the King’s Valley as a monument to himself, for he thought, “I have no son to carry on the memory of my name.” He named the pillar after himself, and it is called Absalom’s Monument to this day.
- type: usfm
  marker: s1
  children:
  - type: text
    text: David Mourns
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Now Ahimaaz son of Zadok said, “Let me run and take the news to the king that the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has vindicated him by delivering him from the hand of his enemies.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “You are not the one to take the news today,” Joab told him. “You may take the news another time, but you must not do so today, because the king’s son is dead.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Then Joab said to a Cushite, “Go, tell the king what you have seen.” The Cushite bowed down before Joab and ran off.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ahimaaz son of Zadok again said to Joab, “Come what may, please let me run behind the Cushite.”
- type: usfm
  marker: p
  children:
  - type: text
    text: But Joab replied, “My son, why do you want to go? You don’t have any news that will bring you a reward.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: He said, “Come what may, I want to run.”
- type: usfm
  marker: p
  children:
  - type: text
    text: So Joab said, “Run!” Then Ahimaaz ran by way of the plain
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the plain of the Jordan
    marker-yv: yv-n
  - type: text
    text: ' and outran the Cushite.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'While David was sitting between the inner and outer gates, the watchman went up to the roof of the gateway by the wall. As he looked out, he saw a man running alone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The watchman called out to the king and reported it.
- type: usfm
  marker: p
  children:
  - type: text
    text: The king said, “If he is alone, he must have good news.” And the runner came closer and closer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Then the watchman saw another runner, and he called down to the gatekeeper, “Look, another man running alone!”
- type: usfm
  marker: p
  children:
  - type: text
    text: The king said, “He must be bringing good news, too.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The watchman said, “It seems to me that the first one runs like Ahimaaz son of Zadok.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “He’s a good man,” the king said. “He comes with good news.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Then Ahimaaz called out to the king, “All is well!” He bowed down before the king with his face to the ground and said, “Praise be to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God! He has delivered up those who lifted their hands against my lord the king.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: The king asked, “Is the young man Absalom safe?”
- type: usfm
  marker: p
  children:
  - type: text
    text: Ahimaaz answered, “I saw great confusion just as Joab was about to send the king’s servant and me, your servant, but I don’t know what it was.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: The king said, “Stand aside and wait here.” So he stepped aside and stood there.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then the Cushite arrived and said, “My lord the king, hear the good news! The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has vindicated you today by delivering you from the hand of all who rose up against you.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: The king asked the Cushite, “Is the young man Absalom safe?”
- type: usfm
  marker: p
  children:
  - type: text
    text: The Cushite replied, “May the enemies of my lord the king and all who rise up to harm you be like that young man.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The king was shaken. He went up to the room over the gateway and wept. As he went, he said: “O my son Absalom! My son, my son Absalom! If only I had died instead of you—O Absalom, my son, my son!”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts this verse (18:33) is numbered 19:1.
    marker-yv: yv-n
