document_id: 2CO.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Present Weakness and Resurrection Life
  - type: text
    content: 'Therefore, since through God’s mercy we have this ministry, we do not lose heart. '
  '10':
  - type: text
    content: 'We always carry around in our body the death of Jesus, so that the life of Jesus may also be revealed in our body. '
  '11':
  - type: text
    content: 'For we who are alive are always being given over to death for Jesus’ sake, so that his life may also be revealed in our mortal body. '
  '12':
  - type: text
    content: So then, death is at work in us, but life is at work in you.
  '13':
  - type: text
    content: 'It is written: “I believed; therefore I have spoken.”'
  - type: note
    content: Psalm 116:10 (see Septuagint)
  - type: text
    content: ' Since we have that same spirit of'
  - type: note
    content: Or Spirit-given
  - type: text
    content: ' faith, we also believe and therefore speak, '
  '14':
  - type: text
    content: 'because we know that the one who raised the Lord Jesus from the dead will also raise us with Jesus and present us with you to himself. '
  '15':
  - type: text
    content: All this is for your benefit, so that the grace that is reaching more and more people may cause thanksgiving to overflow to the glory of God.
  '16':
  - type: text
    content: 'Therefore we do not lose heart. Though outwardly we are wasting away, yet inwardly we are being renewed day by day. '
  '17':
  - type: text
    content: 'For our light and momentary troubles are achieving for us an eternal glory that far outweighs them all. '
  '18':
  - type: text
    content: So we fix our eyes not on what is seen, but on what is unseen, since what is seen is temporary, but what is unseen is eternal.
  '2':
  - type: text
    content: 'Rather, we have renounced secret and shameful ways; we do not use deception, nor do we distort the word of God. On the contrary, by setting forth the truth plainly we commend ourselves to everyone’s conscience in the sight of God. '
  '3':
  - type: text
    content: 'And even if our gospel is veiled, it is veiled to those who are perishing. '
  '4':
  - type: text
    content: 'The god of this age has blinded the minds of unbelievers, so that they cannot see the light of the gospel that displays the glory of Christ, who is the image of God. '
  '5':
  - type: text
    content: 'For what we preach is not ourselves, but Jesus Christ as Lord, and ourselves as your servants for Jesus’ sake. '
  '6':
  - type: text
    content: For God, who said, “Let light shine out of darkness,”
  - type: note
    content: Gen. 1:3
  - type: text
    content: ' made his light shine in our hearts to give us the light of the knowledge of God’s glory displayed in the face of Christ.'
  '7':
  - type: text
    content: 'But we have this treasure in jars of clay to show that this all-surpassing power is from God and not from us. '
  '8':
  - type: text
    content: 'We are hard pressed on every side, but not crushed; perplexed, but not in despair; '
  '9':
  - type: text
    content: 'persecuted, but not abandoned; struck down, but not destroyed. '
