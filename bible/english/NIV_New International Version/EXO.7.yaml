document_id: EXO.7,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “See, I have made you like God to Pharaoh, and your brother Aaron will be your prophet. '
  '10':
  - type: text
    content: 'So Moses and Aaron went to Pharaoh and did just as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded. Aaron threw his staff down in front of Pharaoh and his officials, and it became a snake. '
  '11':
  - type: text
    content: 'Pharaoh then summoned wise men and sorcerers, and the Egyptian magicians also did the same things by their secret arts: '
  '12':
  - type: text
    content: 'Each one threw down his staff and it became a snake. But Aaron’s staff swallowed up their staffs. '
  '13':
  - type: text
    content: 'Yet Pharaoh’s heart became hard and he would not listen to them, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had said.'
  - type: heading
    content: The Plague of Blood
  '14':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Pharaoh’s heart is unyielding; he refuses to let the people go. '
  '15':
  - type: text
    content: 'Go to Pharaoh in the morning as he goes out to the river. Confront him on the bank of the Nile, and take in your hand the staff that was changed into a snake. '
  '16':
  - type: text
    content: 'Then say to him, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ', the God of the Hebrews, has sent me to say to you: Let my people go, so that they may worship me in the wilderness. But until now you have not listened. '
  '17':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: By this you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ': With the staff that is in my hand I will strike the water of the Nile, and it will be changed into blood. '
  '18':
  - type: text
    content: The fish in the Nile will die, and the river will stink; the Egyptians will not be able to drink its water.’ ”
  '19':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Tell Aaron, ‘Take your staff and stretch out your hand over the waters of Egypt—over the streams and canals, over the ponds and all the reservoirs—and they will turn to blood.’ Blood will be everywhere in Egypt, even in vessels'
  - type: note
    content: Or even on their idols
  - type: text
    content: ' of wood and stone.”'
  '2':
  - type: text
    content: 'You are to say everything I command you, and your brother Aaron is to tell Pharaoh to let the Israelites go out of his country. '
  '20':
  - type: text
    content: 'Moses and Aaron did just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded. He raised his staff in the presence of Pharaoh and his officials and struck the water of the Nile, and all the water was changed into blood. '
  '21':
  - type: text
    content: The fish in the Nile died, and the river smelled so bad that the Egyptians could not drink its water. Blood was everywhere in Egypt.
  '22':
  - type: text
    content: 'But the Egyptian magicians did the same things by their secret arts, and Pharaoh’s heart became hard; he would not listen to Moses and Aaron, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had said. '
  '23':
  - type: text
    content: 'Instead, he turned and went into his palace, and did not take even this to heart. '
  '24':
  - type: text
    content: And all the Egyptians dug along the Nile to get drinking water, because they could not drink the water of the river.
  - type: heading
    content: The Plague of Frogs
  '25':
  - type: text
    content: 'Seven days passed after the '
  - type: text
    content: Lord
  - type: text
    content: ' struck the Nile.'
  '3':
  - type: text
    content: 'But I will harden Pharaoh’s heart, and though I multiply my signs and wonders in Egypt, '
  '4':
  - type: text
    content: 'he will not listen to you. Then I will lay my hand on Egypt and with mighty acts of judgment I will bring out my divisions, my people the Israelites. '
  '5':
  - type: text
    content: 'And the Egyptians will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' when I stretch out my hand against Egypt and bring the Israelites out of it.”'
  '6':
  - type: text
    content: 'Moses and Aaron did just as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded them. '
  '7':
  - type: text
    content: Moses was eighty years old and Aaron eighty-three when they spoke to Pharaoh.
  - type: heading
    content: Aaron’s Staff Becomes a Snake
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses and Aaron, '
  '9':
  - type: text
    content: “When Pharaoh says to you, ‘Perform a miracle,’ then say to Aaron, ‘Take your staff and throw it down before Pharaoh,’ and it will become a snake.”
