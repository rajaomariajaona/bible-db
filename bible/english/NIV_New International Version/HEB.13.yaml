document_id: HEB.13,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Concluding Exhortations
  - type: text
    content: 'Keep on loving one another as brothers and sisters. '
  '10':
  - type: text
    content: We have an altar from which those who minister at the tabernacle have no right to eat.
  '11':
  - type: text
    content: 'The high priest carries the blood of animals into the Most Holy Place as a sin offering, but the bodies are burned outside the camp. '
  '12':
  - type: text
    content: 'And so Jesus also suffered outside the city gate to make the people holy through his own blood. '
  '13':
  - type: text
    content: 'Let us, then, go to him outside the camp, bearing the disgrace he bore. '
  '14':
  - type: text
    content: For here we do not have an enduring city, but we are looking for the city that is to come.
  '15':
  - type: text
    content: 'Through Jesus, therefore, let us continually offer to God a sacrifice of praise—the fruit of lips that openly profess his name. '
  '16':
  - type: text
    content: And do not forget to do good and to share with others, for with such sacrifices God is pleased.
  '17':
  - type: text
    content: Have confidence in your leaders and submit to their authority, because they keep watch over you as those who must give an account. Do this so that their work will be a joy, not a burden, for that would be of no benefit to you.
  '18':
  - type: text
    content: 'Pray for us. We are sure that we have a clear conscience and desire to live honorably in every way. '
  '19':
  - type: text
    content: I particularly urge you to pray so that I may be restored to you soon.
  - type: heading
    content: Benediction and Final Greetings
  '2':
  - type: text
    content: 'Do not forget to show hospitality to strangers, for by so doing some people have shown hospitality to angels without knowing it. '
  '20':
  - type: text
    content: 'Now may the God of peace, who through the blood of the eternal covenant brought back from the dead our Lord Jesus, that great Shepherd of the sheep, '
  '21':
  - type: text
    content: equip you with everything good for doing his will, and may he work in us what is pleasing to him, through Jesus Christ, to whom be glory for ever and ever. Amen.
  '22':
  - type: text
    content: Brothers and sisters, I urge you to bear with my word of exhortation, for in fact I have written to you quite briefly.
  '23':
  - type: text
    content: I want you to know that our brother Timothy has been released. If he arrives soon, I will come with him to see you.
  '24':
  - type: text
    content: Greet all your leaders and all the Lord’s people. Those from Italy send you their greetings.
  '25':
  - type: text
    content: Grace be with you all.
  '3':
  - type: text
    content: Continue to remember those in prison as if you were together with them in prison, and those who are mistreated as if you yourselves were suffering.
  '4':
  - type: text
    content: 'Marriage should be honored by all, and the marriage bed kept pure, for God will judge the adulterer and all the sexually immoral. '
  '5':
  - type: text
    content: Keep your lives free from the love of money and be content with what you have, because God has said,
  - type: text
    content: “Never will I leave you;
  - type: text
    content: never will I forsake you.”
  - type: note
    content: Deut. 31:6
  '6':
  - type: text
    content: So we say with confidence,
  - type: text
    content: “The Lord is my helper; I will not be afraid.
  - type: text
    content: What can mere mortals do to me?”
  - type: note
    content: Psalm 118:6,7
  '7':
  - type: text
    content: 'Remember your leaders, who spoke the word of God to you. Consider the outcome of their way of life and imitate their faith. '
  '8':
  - type: text
    content: Jesus Christ is the same yesterday and today and forever.
  '9':
  - type: text
    content: 'Do not be carried away by all kinds of strange teachings. It is good for our hearts to be strengthened by grace, not by eating ceremonial foods, which is of no benefit to those who do so. '
