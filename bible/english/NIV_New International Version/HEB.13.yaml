document_id: HEB.13,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Concluding Exhortations
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Keep on loving one another as brothers and sisters. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We have an altar from which those who minister at the tabernacle have no right to eat.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The high priest carries the blood of animals into the Most Holy Place as a sin offering, but the bodies are burned outside the camp. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And so Jesus also suffered outside the city gate to make the people holy through his own blood. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let us, then, go to him outside the camp, bearing the disgrace he bore. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For here we do not have an enduring city, but we are looking for the city that is to come.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Through Jesus, therefore, let us continually offer to God a sacrifice of praise—the fruit of lips that openly profess his name. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And do not forget to do good and to share with others, for with such sacrifices God is pleased.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Have confidence in your leaders and submit to their authority, because they keep watch over you as those who must give an account. Do this so that their work will be a joy, not a burden, for that would be of no benefit to you.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pray for us. We are sure that we have a clear conscience and desire to live honorably in every way. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I particularly urge you to pray so that I may be restored to you soon.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Benediction and Final Greetings
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not forget to show hospitality to strangers, for by so doing some people have shown hospitality to angels without knowing it. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now may the God of peace, who through the blood of the eternal covenant brought back from the dead our Lord Jesus, that great Shepherd of the sheep, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: equip you with everything good for doing his will, and may he work in us what is pleasing to him, through Jesus Christ, to whom be glory for ever and ever. Amen.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Brothers and sisters, I urge you to bear with my word of exhortation, for in fact I have written to you quite briefly.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I want you to know that our brother Timothy has been released. If he arrives soon, I will come with him to see you.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Greet all your leaders and all the Lord’s people. Those from Italy send you their greetings.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Grace be with you all.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Continue to remember those in prison as if you were together with them in prison, and those who are mistreated as if you yourselves were suffering.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Marriage should be honored by all, and the marriage bed kept pure, for God will judge the adulterer and all the sexually immoral. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Keep your lives free from the love of money and be content with what you have, because God has said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Never will I leave you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never will I forsake you.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut. 31:6
      marker-yv: yv-n
  '6':
  - type: usfm
    marker: m
    children:
    - type: text
      text: So we say with confidence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The Lord is my helper; I will not be afraid.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: What can mere mortals do to me?”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalm 118:6,7
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Remember your leaders, who spoke the word of God to you. Consider the outcome of their way of life and imitate their faith. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jesus Christ is the same yesterday and today and forever.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do not be carried away by all kinds of strange teachings. It is good for our hearts to be strengthened by grace, not by eating ceremonial foods, which is of no benefit to those who do so. '
