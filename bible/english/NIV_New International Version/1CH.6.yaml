document_id: 1CH.6,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Levi
    marker-yv: yv-h
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 6:1-15 is numbered 5:27-41, and 6:16-81 is numbered 6:1-66.
      marker-yv: yv-n
    - type: text
      text: 'The sons of Levi:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Gershon, Kohath and Merari.
  '10':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Johanan the father of Azariah (it was he who served as priest in the temple Solomon built in Jerusalem),
  '11':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Azariah the father of Amariah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Amariah the father of Ahitub,
  '12':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ahitub the father of Zadok,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Zadok the father of Shallum,
  '13':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Shallum the father of Hilkiah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Hilkiah the father of Azariah,
  '14':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Azariah the father of Seraiah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: and Seraiah the father of Jozadak.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jehozadak
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jozadak
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verse 15
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: li4
    children:
    - type: text
      text: 'Jozadak was deported when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sent Judah and Jerusalem into exile by the hand of Nebuchadnezzar.'
  '16':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Levi:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Gershon,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Gershom, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gershon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verses 17, 20, 43, 62 and 71
      marker-yv: yv-n
    - type: text
      text: ' Kohath and Merari.'
  '17':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'These are the names of the sons of Gershon:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Libni and Shimei.
  '18':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Kohath:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Amram, Izhar, Hebron and Uzziel.
  '19':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Merari:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Mahli and Mushi.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'These are the clans of the Levites listed according to their fathers:'
  '2':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Kohath:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Amram, Izhar, Hebron and Uzziel.
  '20':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Of Gershon:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Libni his son, Jahath his son,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Zimmah his son, '
  '21':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Joah his son,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Iddo his son, Zerah his son
  - type: usfm
    marker: li2
    children:
    - type: text
      text: and Jeatherai his son.
  '22':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The descendants of Kohath:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Amminadab his son, Korah his son,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Assir his son, '
  '23':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Elkanah his son,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ebiasaph his son, Assir his son,
  '24':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Tahath his son, Uriel his son,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Uzziah his son and Shaul his son.
  '25':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The descendants of Elkanah:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Amasai, Ahimoth,
  '26':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Elkanah his son,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Hebrew manuscripts, Septuagint and Syriac; most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ahimoth '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '26 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'and Elkanah. The sons of Elkanah:'
      marker-yv: yv-n
    - type: text
      text: ' Zophai his son,'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Nahath his son, '
  '27':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Eliab his son,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Jeroham his son, Elkanah his son
  - type: usfm
    marker: li2
    children:
    - type: text
      text: and Samuel his son.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Septuagint manuscripts (see also 1 Samuel 1:19,20 and 1 Chron. 6:33,34); Hebrew does not have '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: and Samuel his son
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Samuel:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Joel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Septuagint manuscripts and Syriac (see also 1 Samuel 8:2 and 1 Chron. 6:33); Hebrew does not have '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Joel
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' the firstborn'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: and Abijah the second son.
  '29':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The descendants of Merari:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Mahli, Libni his son,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Shimei his son, Uzzah his son,
  '3':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The children of Amram:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Aaron, Moses and Miriam.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Aaron:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Nadab, Abihu, Eleazar and Ithamar.
  '30':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Shimea his son, Haggiah his son
  - type: usfm
    marker: li2
    children:
    - type: text
      text: and Asaiah his son.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Temple Musicians
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the men David put in charge of the music in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' after the ark came to rest there. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They ministered with music before the tabernacle, the tent of meeting, until Solomon built the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in Jerusalem. They performed their duties according to the regulations laid down for them.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Here are the men who served, together with their sons:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the Kohathites:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Heman, the musician,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Joel, the son of Samuel,
  '34':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Elkanah, the son of Jeroham,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Eliel, the son of Toah,
  '35':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Zuph, the son of Elkanah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Mahath, the son of Amasai,
  '36':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Elkanah, the son of Joel,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Azariah, the son of Zephaniah,
  '37':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Tahath, the son of Assir,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Ebiasaph, the son of Korah,
  '38':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Izhar, the son of Kohath,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Levi, the son of Israel;
  '39':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'and Heman’s associate Asaph, who served at his right hand:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Asaph son of Berekiah, the son of Shimea,
  '4':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Eleazar was the father of Phinehas,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Phinehas the father of Abishua,
  '40':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Michael, the son of Baaseiah,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Most Hebrew manuscripts; some Hebrew manuscripts, one Septuagint manuscript and Syriac '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Maaseiah
      marker-yv: yv-n
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'the son of Malkijah, '
  '41':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Ethni,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Zerah, the son of Adaiah,
  '42':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Ethan, the son of Zimmah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'the son of Shimei, '
  '43':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Jahath,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Gershon, the son of Levi;
  '44':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'and from their associates, the Merarites, at his left hand:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ethan son of Kishi, the son of Abdi,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'the son of Malluk, '
  '45':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Hashabiah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Amaziah, the son of Hilkiah,
  '46':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Amzi, the son of Bani,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'the son of Shemer, '
  '47':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Mahli,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Mushi, the son of Merari,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: the son of Levi.
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Their fellow Levites were assigned to all the other duties of the tabernacle, the house of God. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Aaron and his descendants were the ones who presented offerings on the altar of burnt offering and on the altar of incense in connection with all that was done in the Most Holy Place, making atonement for Israel, in accordance with all that Moses the servant of God had commanded.
  '5':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Abishua the father of Bukki,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Bukki the father of Uzzi,
  '50':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'These were the descendants of Aaron:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Eleazar his son, Phinehas his son,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Abishua his son, '
  '51':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Bukki his son,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Uzzi his son, Zerahiah his son,
  '52':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Meraioth his son, Amariah his son,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Ahitub his son, '
  '53':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Zadok his son
  - type: usfm
    marker: li2
    children:
    - type: text
      text: and Ahimaaz his son.
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These were the locations of their settlements allotted as their territory (they were assigned to the descendants of Aaron who were from the Kohathite clan, because the first lot was for them):'
  '55':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'They were given Hebron in Judah with its surrounding pasturelands. '
  '56':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: But the fields and villages around the city were given to Caleb son of Jephunneh.
  '57':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: So the descendants of Aaron were given Hebron (a city of refuge), and Libnah,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:57 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'See Joshua 21:13; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'given the cities of refuge: Hebron, Libnah.'
      marker-yv: yv-n
    - type: text
      text: ' Jattir, Eshtemoa, '
  '58':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: 'Hilen, Debir, '
  '59':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: Ashan, Juttah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:59 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Syriac (see also Septuagint and Joshua 21:16); Hebrew does not have '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Juttah
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' and Beth Shemesh, together with their pasturelands. '
  '6':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Uzzi the father of Zerahiah,
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Zerahiah the father of Meraioth,
  '60':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: And from the tribe of Benjamin they were given Gibeon,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:60 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'See Joshua 21:17; Hebrew does not have '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gibeon
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' Geba, Alemeth and Anathoth, together with their pasturelands.'
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: The total number of towns distributed among the Kohathite clans came to thirteen.
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The rest of Kohath’s descendants were allotted ten towns from the clans of half the tribe of Manasseh.
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The descendants of Gershon, clan by clan, were allotted thirteen towns from the tribes of Issachar, Asher and Naphtali, and from the part of the tribe of Manasseh that is in Bashan.
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The descendants of Merari, clan by clan, were allotted twelve towns from the tribes of Reuben, Gad and Zebulun.
  '64':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the Israelites gave the Levites these towns and their pasturelands. '
  '65':
  - type: usfm
    marker: p
    children:
    - type: text
      text: From the tribes of Judah, Simeon and Benjamin they allotted the previously named towns.
  '66':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Some of the Kohathite clans were given as their territory towns from the tribe of Ephraim.
  '67':
  - type: usfm
    marker: pi1
    children:
    - type: text
      text: In the hill country of Ephraim they were given Shechem (a city of refuge), and Gezer,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6:67 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'See Joshua 21:21; Hebrew '
      - type: usfm
