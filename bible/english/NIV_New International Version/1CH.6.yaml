document_id: 1CH.6,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Levi
  - type: note
    content: In Hebrew texts 6:1-15 is numbered 5:27-41, and 6:16-81 is numbered 6:1-66.
  - type: text
    content: 'The sons of Levi:'
  - type: text
    content: Gershon, Kohath and Merari.
  '10':
  - type: text
    content: Johanan the father of Azariah (it was he who served as priest in the temple Solomon built in Jerusalem),
  '11':
  - type: text
    content: Azariah the father of Amariah,
  - type: text
    content: Amariah the father of Ahitub,
  '12':
  - type: text
    content: Ahitub the father of Zadok,
  - type: text
    content: Zadok the father of Shallum,
  '13':
  - type: text
    content: Shallum the father of Hilkiah,
  - type: text
    content: Hilkiah the father of Azariah,
  '14':
  - type: text
    content: Azariah the father of Seraiah,
  - type: text
    content: and Seraiah the father of Jozadak.
  - type: note
    content: Hebrew Jehozadak, a variant of Jozadak; also in verse 15
  '15':
  - type: text
    content: 'Jozadak was deported when the '
  - type: text
    content: Lord
  - type: text
    content: ' sent Judah and Jerusalem into exile by the hand of Nebuchadnezzar.'
  '16':
  - type: text
    content: 'The sons of Levi:'
  - type: text
    content: Gershon,
  - type: note
    content: Hebrew Gershom, a variant of Gershon; also in verses 17, 20, 43, 62 and 71
  - type: text
    content: ' Kohath and Merari.'
  '17':
  - type: text
    content: 'These are the names of the sons of Gershon:'
  - type: text
    content: Libni and Shimei.
  '18':
  - type: text
    content: 'The sons of Kohath:'
  - type: text
    content: Amram, Izhar, Hebron and Uzziel.
  '19':
  - type: text
    content: 'The sons of Merari:'
  - type: text
    content: Mahli and Mushi.
  - type: text
    content: 'These are the clans of the Levites listed according to their fathers:'
  '2':
  - type: text
    content: 'The sons of Kohath:'
  - type: text
    content: Amram, Izhar, Hebron and Uzziel.
  '20':
  - type: text
    content: 'Of Gershon:'
  - type: text
    content: Libni his son, Jahath his son,
  - type: text
    content: 'Zimmah his son, '
  '21':
  - type: text
    content: Joah his son,
  - type: text
    content: Iddo his son, Zerah his son
  - type: text
    content: and Jeatherai his son.
  '22':
  - type: text
    content: 'The descendants of Kohath:'
  - type: text
    content: Amminadab his son, Korah his son,
  - type: text
    content: 'Assir his son, '
  '23':
  - type: text
    content: Elkanah his son,
  - type: text
    content: Ebiasaph his son, Assir his son,
  '24':
  - type: text
    content: Tahath his son, Uriel his son,
  - type: text
    content: Uzziah his son and Shaul his son.
  '25':
  - type: text
    content: 'The descendants of Elkanah:'
  - type: text
    content: Amasai, Ahimoth,
  '26':
  - type: text
    content: Elkanah his son,
  - type: note
    content: 'Some Hebrew manuscripts, Septuagint and Syriac; most Hebrew manuscripts Ahimoth 26 and Elkanah. The sons of Elkanah:'
  - type: text
    content: ' Zophai his son,'
  - type: text
    content: 'Nahath his son, '
  '27':
  - type: text
    content: Eliab his son,
  - type: text
    content: Jeroham his son, Elkanah his son
  - type: text
    content: and Samuel his son.
  - type: note
    content: Some Septuagint manuscripts (see also 1 Samuel 1:19,20 and 1 Chron. 6:33,34); Hebrew does not have and Samuel his son.
  '28':
  - type: text
    content: 'The sons of Samuel:'
  - type: text
    content: Joel
  - type: note
    content: Some Septuagint manuscripts and Syriac (see also 1 Samuel 8:2 and 1 Chron. 6:33); Hebrew does not have Joel.
  - type: text
    content: ' the firstborn'
  - type: text
    content: and Abijah the second son.
  '29':
  - type: text
    content: 'The descendants of Merari:'
  - type: text
    content: Mahli, Libni his son,
  - type: text
    content: Shimei his son, Uzzah his son,
  '3':
  - type: text
    content: 'The children of Amram:'
  - type: text
    content: Aaron, Moses and Miriam.
  - type: text
    content: 'The sons of Aaron:'
  - type: text
    content: Nadab, Abihu, Eleazar and Ithamar.
  '30':
  - type: text
    content: Shimea his son, Haggiah his son
  - type: text
    content: and Asaiah his son.
  - type: heading
    content: The Temple Musicians
  '31':
  - type: text
    content: 'These are the men David put in charge of the music in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' after the ark came to rest there. '
  '32':
  - type: text
    content: 'They ministered with music before the tabernacle, the tent of meeting, until Solomon built the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' in Jerusalem. They performed their duties according to the regulations laid down for them.'
  '33':
  - type: text
    content: 'Here are the men who served, together with their sons:'
  - type: text
    content: 'From the Kohathites:'
  - type: text
    content: Heman, the musician,
  - type: text
    content: the son of Joel, the son of Samuel,
  '34':
  - type: text
    content: the son of Elkanah, the son of Jeroham,
  - type: text
    content: the son of Eliel, the son of Toah,
  '35':
  - type: text
    content: the son of Zuph, the son of Elkanah,
  - type: text
    content: the son of Mahath, the son of Amasai,
  '36':
  - type: text
    content: the son of Elkanah, the son of Joel,
  - type: text
    content: the son of Azariah, the son of Zephaniah,
  '37':
  - type: text
    content: the son of Tahath, the son of Assir,
  - type: text
    content: the son of Ebiasaph, the son of Korah,
  '38':
  - type: text
    content: the son of Izhar, the son of Kohath,
  - type: text
    content: the son of Levi, the son of Israel;
  '39':
  - type: text
    content: 'and Heman’s associate Asaph, who served at his right hand:'
  - type: text
    content: Asaph son of Berekiah, the son of Shimea,
  '4':
  - type: text
    content: Eleazar was the father of Phinehas,
  - type: text
    content: Phinehas the father of Abishua,
  '40':
  - type: text
    content: the son of Michael, the son of Baaseiah,
  - type: note
    content: Most Hebrew manuscripts; some Hebrew manuscripts, one Septuagint manuscript and Syriac Maaseiah
  - type: text
    content: 'the son of Malkijah, '
  '41':
  - type: text
    content: the son of Ethni,
  - type: text
    content: the son of Zerah, the son of Adaiah,
  '42':
  - type: text
    content: the son of Ethan, the son of Zimmah,
  - type: text
    content: 'the son of Shimei, '
  '43':
  - type: text
    content: the son of Jahath,
  - type: text
    content: the son of Gershon, the son of Levi;
  '44':
  - type: text
    content: 'and from their associates, the Merarites, at his left hand:'
  - type: text
    content: Ethan son of Kishi, the son of Abdi,
  - type: text
    content: 'the son of Malluk, '
  '45':
  - type: text
    content: the son of Hashabiah,
  - type: text
    content: the son of Amaziah, the son of Hilkiah,
  '46':
  - type: text
    content: the son of Amzi, the son of Bani,
  - type: text
    content: 'the son of Shemer, '
  '47':
  - type: text
    content: the son of Mahli,
  - type: text
    content: the son of Mushi, the son of Merari,
  - type: text
    content: the son of Levi.
  '48':
  - type: text
    content: 'Their fellow Levites were assigned to all the other duties of the tabernacle, the house of God. '
  '49':
  - type: text
    content: But Aaron and his descendants were the ones who presented offerings on the altar of burnt offering and on the altar of incense in connection with all that was done in the Most Holy Place, making atonement for Israel, in accordance with all that Moses the servant of God had commanded.
  '5':
  - type: text
    content: Abishua the father of Bukki,
  - type: text
    content: Bukki the father of Uzzi,
  '50':
  - type: text
    content: 'These were the descendants of Aaron:'
  - type: text
    content: Eleazar his son, Phinehas his son,
  - type: text
    content: 'Abishua his son, '
  '51':
  - type: text
    content: Bukki his son,
  - type: text
    content: Uzzi his son, Zerahiah his son,
  '52':
  - type: text
    content: Meraioth his son, Amariah his son,
  - type: text
    content: 'Ahitub his son, '
  '53':
  - type: text
    content: Zadok his son
  - type: text
    content: and Ahimaaz his son.
  '54':
  - type: text
    content: 'These were the locations of their settlements allotted as their territory (they were assigned to the descendants of Aaron who were from the Kohathite clan, because the first lot was for them):'
  '55':
  - type: text
    content: 'They were given Hebron in Judah with its surrounding pasturelands. '
  '56':
  - type: text
    content: But the fields and villages around the city were given to Caleb son of Jephunneh.
  '57':
  - type: text
    content: So the descendants of Aaron were given Hebron (a city of refuge), and Libnah,
  - type: note
    content: 'See Joshua 21:13; Hebrew given the cities of refuge: Hebron, Libnah.'
  - type: text
    content: ' Jattir, Eshtemoa, '
  '58':
  - type: text
    content: 'Hilen, Debir, '
  '59':
  - type: text
    content: Ashan, Juttah
  - type: note
    content: Syriac (see also Septuagint and Joshua 21:16); Hebrew does not have Juttah.
  - type: text
    content: ' and Beth Shemesh, together with their pasturelands. '
  '6':
  - type: text
    content: Uzzi the father of Zerahiah,
  - type: text
    content: Zerahiah the father of Meraioth,
  '60':
  - type: text
    content: And from the tribe of Benjamin they were given Gibeon,
  - type: note
    content: See Joshua 21:17; Hebrew does not have Gibeon.
  - type: text
    content: ' Geba, Alemeth and Anathoth, together with their pasturelands.'
  - type: text
    content: The total number of towns distributed among the Kohathite clans came to thirteen.
  '61':
  - type: text
    content: The rest of Kohath’s descendants were allotted ten towns from the clans of half the tribe of Manasseh.
  '62':
  - type: text
    content: The descendants of Gershon, clan by clan, were allotted thirteen towns from the tribes of Issachar, Asher and Naphtali, and from the part of the tribe of Manasseh that is in Bashan.
  '63':
  - type: text
    content: The descendants of Merari, clan by clan, were allotted twelve towns from the tribes of Reuben, Gad and Zebulun.
  '64':
  - type: text
    content: 'So the Israelites gave the Levites these towns and their pasturelands. '
  '65':
  - type: text
    content: From the tribes of Judah, Simeon and Benjamin they allotted the previously named towns.
  '66':
  - type: text
    content: Some of the Kohathite clans were given as their territory towns from the tribe of Ephraim.
  '67':
  - type: text
    content: In the hill country of Ephraim they were given Shechem (a city of refuge), and Gezer,
  - type: note
    content: 'See Joshua 21:21; Hebrew given the cities of refuge: Shechem, Gezer.'
  - type: text
    content: ' '
  '68':
  - type: text
    content: 'Jokmeam, Beth Horon, '
  '69':
  - type: text
    content: Aijalon and Gath Rimmon, together with their pasturelands.
  '7':
  - type: text
    content: Meraioth the father of Amariah,
  - type: text
    content: Amariah the father of Ahitub,
  '70':
  - type: text
    content: And from half the tribe of Manasseh the Israelites gave Aner and Bileam, together with their pasturelands, to the rest of the Kohathite clans.
  '71':
  - type: text
    content: 'The Gershonites received the following:'
  - type: text
    content: From the clan of the half-tribe of Manasseh
  - type: text
    content: they received Golan in Bashan and also Ashtaroth, together with their pasturelands;
  '72':
  - type: text
    content: from the tribe of Issachar
  - type: text
    content: 'they received Kedesh, Daberath, '
  '73':
  - type: text
    content: Ramoth and Anem, together with their pasturelands;
  '74':
  - type: text
    content: from the tribe of Asher
  - type: text
    content: 'they received Mashal, Abdon, '
  '75':
  - type: text
    content: Hukok and Rehob, together with their pasturelands;
  '76':
  - type: text
    content: and from the tribe of Naphtali
  - type: text
    content: they received Kedesh in Galilee, Hammon and Kiriathaim, together with their pasturelands.
  '77':
  - type: text
    content: 'The Merarites (the rest of the Levites) received the following:'
  - type: text
    content: From the tribe of Zebulun
  - type: text
    content: they received Jokneam, Kartah,
  - type: note
    content: See Septuagint and Joshua 21:34; Hebrew does not have Jokneam, Kartah.
  - type: text
    content: ' Rimmono and Tabor, together with their pasturelands;'
  '78':
  - type: text
    content: from the tribe of Reuben across the Jordan east of Jericho
  - type: text
    content: 'they received Bezer in the wilderness, Jahzah, '
  '79':
  - type: text
    content: Kedemoth and Mephaath, together with their pasturelands;
  '8':
  - type: text
    content: Ahitub the father of Zadok,
  - type: text
    content: Zadok the father of Ahimaaz,
  '80':
  - type: text
    content: and from the tribe of Gad
  - type: text
    content: 'they received Ramoth in Gilead, Mahanaim, '
  '81':
  - type: text
    content: Heshbon and Jazer, together with their pasturelands.
  '9':
  - type: text
    content: Ahimaaz the father of Azariah,
  - type: text
    content: Azariah the father of Johanan,
