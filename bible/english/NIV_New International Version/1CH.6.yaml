    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'and from their associates, the Merarites, at his left hand:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Ethan son of Kishi, the son of Abdi,
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'the son of Malluk, '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: the son of Hashabiah,
- type: usfm
  marker: li2
  children:
  - type: text
    text: the son of Amaziah, the son of Hilkiah,
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: the son of Amzi, the son of Bani,
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'the son of Shemer, '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: the son of Mahli,
- type: usfm
  marker: li2
  children:
  - type: text
    text: the son of Mushi, the son of Merari,
- type: usfm
  marker: li2
  children:
  - type: text
    text: the son of Levi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Their fellow Levites were assigned to all the other duties of the tabernacle, the house of God. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: But Aaron and his descendants were the ones who presented offerings on the altar of burnt offering and on the altar of incense in connection with all that was done in the Most Holy Place, making atonement for Israel, in accordance with all that Moses the servant of God had commanded.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'These were the descendants of Aaron:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Eleazar his son, Phinehas his son,
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Abishua his son, '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Bukki his son,
- type: usfm
  marker: li2
  children:
  - type: text
    text: Uzzi his son, Zerahiah his son,
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Meraioth his son, Amariah his son,
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Ahitub his son, '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Zadok his son
- type: usfm
  marker: li2
  children:
  - type: text
    text: and Ahimaaz his son.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'These were the locations of their settlements allotted as their territory (they were assigned to the descendants of Aaron who were from the Kohathite clan, because the first lot was for them):'
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'They were given Hebron in Judah with its surrounding pasturelands. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: But the fields and villages around the city were given to Caleb son of Jephunneh.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: So the descendants of Aaron were given Hebron (a city of refuge), and Libnah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:57 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'See Joshua 21:13; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'given the cities of refuge: Hebron, Libnah.'
    marker-yv: yv-n
  - type: text
    text: ' Jattir, Eshtemoa, '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Hilen, Debir, '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Ashan, Juttah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:59 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Syriac (see also Septuagint and Joshua 21:16); Hebrew does not have '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Juttah
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' and Beth Shemesh, together with their pasturelands. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: And from the tribe of Benjamin they were given Gibeon,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:60 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'See Joshua 21:17; Hebrew does not have '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Gibeon
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' Geba, Alemeth and Anathoth, together with their pasturelands.'
- type: usfm
  marker: pi1
  children:
  - type: text
    text: The total number of towns distributed among the Kohathite clans came to thirteen.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: The rest of Kohath’s descendants were allotted ten towns from the clans of half the tribe of Manasseh.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: The descendants of Gershon, clan by clan, were allotted thirteen towns from the tribes of Issachar, Asher and Naphtali, and from the part of the tribe of Manasseh that is in Bashan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: The descendants of Merari, clan by clan, were allotted twelve towns from the tribes of Reuben, Gad and Zebulun.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'So the Israelites gave the Levites these towns and their pasturelands. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: From the tribes of Judah, Simeon and Benjamin they allotted the previously named towns.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: Some of the Kohathite clans were given as their territory towns from the tribe of Ephraim.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: In the hill country of Ephraim they were given Shechem (a city of refuge), and Gezer,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:67 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'See Joshua 21:21; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'given the cities of refuge: Shechem, Gezer.'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'Jokmeam, Beth Horon, '
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: Aijalon and Gath Rimmon, together with their pasturelands.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: And from half the tribe of Manasseh the Israelites gave Aner and Bileam, together with their pasturelands, to the rest of the Kohathite clans.
- type: usfm
  marker: li4
  children:
  - type: usfm
    marker: v
    metadata:
      v: '71'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: 'The Gershonites received the following:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: From the clan of the half-tribe of Manasseh
- type: usfm
  marker: li2
  children:
  - type: text
    text: they received Golan in Bashan and also Ashtaroth, together with their pasturelands;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '72'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: from the tribe of Issachar
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'they received Kedesh, Daberath, '
  - type: usfm
    marker: v
    metadata:
      v: '73'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: Ramoth and Anem, together with their pasturelands;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '74'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: from the tribe of Asher
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'they received Mashal, Abdon, '
  - type: usfm
    marker: v
    metadata:
      v: '75'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: Hukok and Rehob, together with their pasturelands;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '76'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '76'
  - type: text
    text: and from the tribe of Naphtali
- type: usfm
  marker: li2
  children:
  - type: text
    text: they received Kedesh in Galilee, Hammon and Kiriathaim, together with their pasturelands.
- type: usfm
  marker: li4
  children:
  - type: usfm
    marker: v
    metadata:
      v: '77'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '77'
  - type: text
    text: 'The Merarites (the rest of the Levites) received the following:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: From the tribe of Zebulun
- type: usfm
  marker: li2
  children:
  - type: text
    text: they received Jokneam, Kartah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:77 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'See Septuagint and Joshua 21:34; Hebrew does not have '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jokneam, Kartah
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' Rimmono and Tabor, together with their pasturelands;'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '78'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '78'
  - type: text
    text: from the tribe of Reuben across the Jordan east of Jericho
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'they received Bezer in the wilderness, Jahzah, '
  - type: usfm
    marker: v
    metadata:
      v: '79'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '79'
  - type: text
    text: Kedemoth and Mephaath, together with their pasturelands;
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '80'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '80'
  - type: text
    text: and from the tribe of Gad
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'they received Ramoth in Gilead, Mahanaim, '
  - type: usfm
    marker: v
    metadata:
      v: '81'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '81'
  - type: text
    text: Heshbon and Jazer, together with their pasturelands.
