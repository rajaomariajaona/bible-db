document_id: EZR.10,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The People’s Confession of Sin
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While Ezra was praying and confessing, weeping and throwing himself down before the house of God, a large crowd of Israelites—men, women and children—gathered around him. They too wept bitterly. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Ezra the priest stood up and said to them, “You have been unfaithful; you have married foreign women, adding to Israel’s guilt. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now honor
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Now make confession to
      marker-yv: yv-n
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of your ancestors, and do his will. Separate yourselves from the peoples around you and from your foreign wives.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The whole assembly responded with a loud voice: “You are right! We must do as you say. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But there are many people here and it is the rainy season; so we cannot stand outside. Besides, this matter cannot be taken care of in a day or two, because we have sinned greatly in this thing. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Let our officials act for the whole assembly. Then let everyone in our towns who has married a foreign woman come at a set time, along with the elders and judges of each town, until the fierce anger of our God in this matter is turned away from us.” '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Only Jonathan son of Asahel and Jahzeiah son of Tikvah, supported by Meshullam and Shabbethai the Levite, opposed this.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the exiles did as was proposed. Ezra the priest selected men who were family heads, one from each family division, and all of them designated by name. On the first day of the tenth month they sat down to investigate the cases, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and by the first day of the first month they finished dealing with all the men who had married foreign women.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Those Guilty of Intermarriage
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Among the descendants of the priests, the following had married foreign women:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the descendants of Joshua son of Jozadak, and his brothers: Maaseiah, Eliezer, Jarib and Gedaliah. '
  '19':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: (They all gave their hands in pledge to put away their wives, and for their guilt they each presented a ram from the flock as a guilt offering.)
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Shekaniah son of Jehiel, one of the descendants of Elam, said to Ezra, “We have been unfaithful to our God by marrying foreign women from the peoples around us. But in spite of this, there is still hope for Israel. '
  '20':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the descendants of Immer:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Hanani and Zebadiah.
  '21':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the descendants of Harim:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Maaseiah, Elijah, Shemaiah, Jehiel and Uzziah.
  '22':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the descendants of Pashhur:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Elioenai, Maaseiah, Ishmael, Nethanel, Jozabad and Elasah.
  '23':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'Among the Levites:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Jozabad, Shimei, Kelaiah (that is, Kelita), Pethahiah, Judah and Eliezer.
  '24':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the musicians:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Eliashib.
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the gatekeepers:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Shallum, Telem and Uri.
  '25':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'And among the other Israelites:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the descendants of Parosh:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ramiah, Izziah, Malkijah, Mijamin, Eleazar, Malkijah and Benaiah.
  '26':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the descendants of Elam:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Mattaniah, Zechariah, Jehiel, Abdi, Jeremoth and Elijah.
  '27':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the descendants of Zattu:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Elioenai, Eliashib, Mattaniah, Jeremoth, Zabad and Aziza.
  '28':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the descendants of Bebai:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Jehohanan, Hananiah, Zabbai and Athlai.
  '29':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the descendants of Bani:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Meshullam, Malluk, Adaiah, Jashub, Sheal and Jeremoth.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now let us make a covenant before our God to send away all these women and their children, in accordance with the counsel of my lord and of those who fear the commands of our God. Let it be done according to the Law. '
  '30':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the descendants of Pahath-Moab:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Adna, Kelal, Benaiah, Maaseiah, Mattaniah, Bezalel, Binnui and Manasseh.
  '31':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the descendants of Harim:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Eliezer, Ishijah, Malkijah, Shemaiah, Shimeon, '
  '32':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Benjamin, Malluk and Shemariah.
  '33':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the descendants of Hashum:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Mattenai, Mattattah, Zabad, Eliphelet, Jeremai, Manasseh and Shimei.
  '34':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the descendants of Bani:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Maadai, Amram, Uel, '
  '35':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Benaiah, Bedeiah, Keluhi, '
  '36':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Vaniah, Meremoth, Eliashib, '
  '37':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Mattaniah, Mattenai and Jaasu.
  '38':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the descendants of Binnui:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:37,38 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'See Septuagint (also 1 Esdras 9:34); Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Jaasu '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '38 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and Bani and Binnui,
      marker-yv: yv-n
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Shimei, '
  '39':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Shelemiah, Nathan, Adaiah, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rise up; this matter is in your hands. We will support you, so take courage and do it.”
  '40':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Maknadebai, Shashai, Sharai, '
  '41':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Azarel, Shelemiah, Shemariah, '
  '42':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Shallum, Amariah and Joseph.
  '43':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'From the descendants of Nebo:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Jeiel, Mattithiah, Zabad, Zebina, Jaddai, Joel and Benaiah.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All these had married foreign women, and some of them had children by these wives.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:44 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: and they sent them away with their children
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Ezra rose up and put the leading priests and Levites and all Israel under oath to do what had been suggested. And they took the oath. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Ezra withdrew from before the house of God and went to the room of Jehohanan son of Eliashib. While he was there, he ate no food and drank no water, because he continued to mourn over the unfaithfulness of the exiles.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A proclamation was then issued throughout Judah and Jerusalem for all the exiles to assemble in Jerusalem. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Anyone who failed to appear within three days would forfeit all his property, in accordance with the decision of the officials and elders, and would himself be expelled from the assembly of the exiles.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Within the three days, all the men of Judah and Benjamin had gathered in Jerusalem. And on the twentieth day of the ninth month, all the people were sitting in the square before the house of God, greatly distressed by the occasion and because of the rain. '
