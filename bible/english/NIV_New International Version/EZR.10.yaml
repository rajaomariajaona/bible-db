document_id: EZR.10,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The People’s Confession of Sin
  - type: text
    content: 'While Ezra was praying and confessing, weeping and throwing himself down before the house of God, a large crowd of Israelites—men, women and children—gathered around him. They too wept bitterly. '
  '10':
  - type: text
    content: 'Then Ezra the priest stood up and said to them, “You have been unfaithful; you have married foreign women, adding to Israel’s guilt. '
  '11':
  - type: text
    content: Now honor
  - type: note
    content: Or Now make confession to
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your ancestors, and do his will. Separate yourselves from the peoples around you and from your foreign wives.”'
  '12':
  - type: text
    content: 'The whole assembly responded with a loud voice: “You are right! We must do as you say. '
  '13':
  - type: text
    content: 'But there are many people here and it is the rainy season; so we cannot stand outside. Besides, this matter cannot be taken care of in a day or two, because we have sinned greatly in this thing. '
  '14':
  - type: text
    content: 'Let our officials act for the whole assembly. Then let everyone in our towns who has married a foreign woman come at a set time, along with the elders and judges of each town, until the fierce anger of our God in this matter is turned away from us.” '
  '15':
  - type: text
    content: Only Jonathan son of Asahel and Jahzeiah son of Tikvah, supported by Meshullam and Shabbethai the Levite, opposed this.
  '16':
  - type: text
    content: 'So the exiles did as was proposed. Ezra the priest selected men who were family heads, one from each family division, and all of them designated by name. On the first day of the tenth month they sat down to investigate the cases, '
  '17':
  - type: text
    content: and by the first day of the first month they finished dealing with all the men who had married foreign women.
  - type: heading
    content: Those Guilty of Intermarriage
  '18':
  - type: text
    content: 'Among the descendants of the priests, the following had married foreign women:'
  - type: text
    content: 'From the descendants of Joshua son of Jozadak, and his brothers: Maaseiah, Eliezer, Jarib and Gedaliah. '
  '19':
  - type: text
    content: (They all gave their hands in pledge to put away their wives, and for their guilt they each presented a ram from the flock as a guilt offering.)
  '2':
  - type: text
    content: 'Then Shekaniah son of Jehiel, one of the descendants of Elam, said to Ezra, “We have been unfaithful to our God by marrying foreign women from the peoples around us. But in spite of this, there is still hope for Israel. '
  '20':
  - type: text
    content: 'From the descendants of Immer:'
  - type: text
    content: Hanani and Zebadiah.
  '21':
  - type: text
    content: 'From the descendants of Harim:'
  - type: text
    content: Maaseiah, Elijah, Shemaiah, Jehiel and Uzziah.
  '22':
  - type: text
    content: 'From the descendants of Pashhur:'
  - type: text
    content: Elioenai, Maaseiah, Ishmael, Nethanel, Jozabad and Elasah.
  '23':
  - type: text
    content: 'Among the Levites:'
  - type: text
    content: Jozabad, Shimei, Kelaiah (that is, Kelita), Pethahiah, Judah and Eliezer.
  '24':
  - type: text
    content: 'From the musicians:'
  - type: text
    content: Eliashib.
  - type: text
    content: 'From the gatekeepers:'
  - type: text
    content: Shallum, Telem and Uri.
  '25':
  - type: text
    content: 'And among the other Israelites:'
  - type: text
    content: 'From the descendants of Parosh:'
  - type: text
    content: Ramiah, Izziah, Malkijah, Mijamin, Eleazar, Malkijah and Benaiah.
  '26':
  - type: text
    content: 'From the descendants of Elam:'
  - type: text
    content: Mattaniah, Zechariah, Jehiel, Abdi, Jeremoth and Elijah.
  '27':
  - type: text
    content: 'From the descendants of Zattu:'
  - type: text
    content: Elioenai, Eliashib, Mattaniah, Jeremoth, Zabad and Aziza.
  '28':
  - type: text
    content: 'From the descendants of Bebai:'
  - type: text
    content: Jehohanan, Hananiah, Zabbai and Athlai.
  '29':
  - type: text
    content: 'From the descendants of Bani:'
  - type: text
    content: Meshullam, Malluk, Adaiah, Jashub, Sheal and Jeremoth.
  '3':
  - type: text
    content: 'Now let us make a covenant before our God to send away all these women and their children, in accordance with the counsel of my lord and of those who fear the commands of our God. Let it be done according to the Law. '
  '30':
  - type: text
    content: 'From the descendants of Pahath-Moab:'
  - type: text
    content: Adna, Kelal, Benaiah, Maaseiah, Mattaniah, Bezalel, Binnui and Manasseh.
  '31':
  - type: text
    content: 'From the descendants of Harim:'
  - type: text
    content: 'Eliezer, Ishijah, Malkijah, Shemaiah, Shimeon, '
  '32':
  - type: text
    content: Benjamin, Malluk and Shemariah.
  '33':
  - type: text
    content: 'From the descendants of Hashum:'
  - type: text
    content: Mattenai, Mattattah, Zabad, Eliphelet, Jeremai, Manasseh and Shimei.
  '34':
  - type: text
    content: 'From the descendants of Bani:'
  - type: text
    content: 'Maadai, Amram, Uel, '
  '35':
  - type: text
    content: 'Benaiah, Bedeiah, Keluhi, '
  '36':
  - type: text
    content: 'Vaniah, Meremoth, Eliashib, '
  '37':
  - type: text
    content: Mattaniah, Mattenai and Jaasu.
  '38':
  - type: text
    content: 'From the descendants of Binnui:'
  - type: note
    content: See Septuagint (also 1 Esdras 9:34); Hebrew Jaasu 38 and Bani and Binnui,
  - type: text
    content: 'Shimei, '
  '39':
  - type: text
    content: 'Shelemiah, Nathan, Adaiah, '
  '4':
  - type: text
    content: Rise up; this matter is in your hands. We will support you, so take courage and do it.”
  '40':
  - type: text
    content: 'Maknadebai, Shashai, Sharai, '
  '41':
  - type: text
    content: 'Azarel, Shelemiah, Shemariah, '
  '42':
  - type: text
    content: Shallum, Amariah and Joseph.
  '43':
  - type: text
    content: 'From the descendants of Nebo:'
  - type: text
    content: Jeiel, Mattithiah, Zabad, Zebina, Jaddai, Joel and Benaiah.
  '44':
  - type: text
    content: All these had married foreign women, and some of them had children by these wives.
  - type: note
    content: Or and they sent them away with their children
  '5':
  - type: text
    content: 'So Ezra rose up and put the leading priests and Levites and all Israel under oath to do what had been suggested. And they took the oath. '
  '6':
  - type: text
    content: Then Ezra withdrew from before the house of God and went to the room of Jehohanan son of Eliashib. While he was there, he ate no food and drank no water, because he continued to mourn over the unfaithfulness of the exiles.
  '7':
  - type: text
    content: 'A proclamation was then issued throughout Judah and Jerusalem for all the exiles to assemble in Jerusalem. '
  '8':
  - type: text
    content: Anyone who failed to appear within three days would forfeit all his property, in accordance with the decision of the officials and elders, and would himself be expelled from the assembly of the exiles.
  '9':
  - type: text
    content: 'Within the three days, all the men of Judah and Benjamin had gathered in Jerusalem. And on the twentieth day of the ninth month, all the people were sitting in the square before the house of God, greatly distressed by the occasion and because of the rain. '
