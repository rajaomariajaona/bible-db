type_code: eng
verses:
  '1':
  - type: heading
    content: Wickedness in the World
  - type: text
    content: 'When human beings began to increase in number on the earth and daughters were born to them, '
  '10':
  - type: text
    content: 'Noah had three sons: Shem, Ham and Japheth.'
  '11':
  - type: text
    content: 'Now the earth was corrupt in God’s sight and was full of violence. '
  '12':
  - type: text
    content: 'God saw how corrupt the earth had become, for all the people on earth had corrupted their ways. '
  '13':
  - type: text
    content: 'So God said to Noah, “I am going to put an end to all people, for the earth is filled with violence because of them. I am surely going to destroy both them and the earth. '
  '14':
  - type: text
    content: So make yourself an ark of cypress
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' wood; make rooms in it and coat it with pitch inside and out. '
  '15':
  - type: text
    content: 'This is how you are to build it: The ark is to be three hundred cubits long, fifty cubits wide and thirty cubits high.'
  - type: note
    content: That is, about 450 feet long, 75 feet wide and 45 feet high or about 135 meters long, 23 meters wide and 14 meters high
  - type: text
    content: ' '
  '16':
  - type: text
    content: Make a roof for it, leaving below the roof an opening one cubit
  - type: note
    content: That is, about 18 inches or about 45 centimeters
  - type: text
    content: ' high all around.'
  - type: note
    content: The meaning of the Hebrew for this clause is uncertain.
  - type: text
    content: ' Put a door in the side of the ark and make lower, middle and upper decks. '
  '17':
  - type: text
    content: 'I am going to bring floodwaters on the earth to destroy all life under the heavens, every creature that has the breath of life in it. Everything on earth will perish. '
  '18':
  - type: text
    content: 'But I will establish my covenant with you, and you will enter the ark—you and your sons and your wife and your sons’ wives with you. '
  '19':
  - type: text
    content: 'You are to bring into the ark two of all living creatures, male and female, to keep them alive with you. '
  '2':
  - type: text
    content: 'the sons of God saw that the daughters of humans were beautiful, and they married any of them they chose. '
  '20':
  - type: text
    content: 'Two of every kind of bird, of every kind of animal and of every kind of creature that moves along the ground will come to you to be kept alive. '
  '21':
  - type: text
    content: You are to take every kind of food that is to be eaten and store it away as food for you and for them.”
  '22':
  - type: text
    content: Noah did everything just as God commanded him.
  '3':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “My Spirit will not contend with'
  - type: note
    content: Or My spirit will not remain in
  - type: text
    content: ' humans forever, for they are mortal'
  - type: note
    content: Or corrupt
  - type: text
    content: ; their days will be a hundred and twenty years.”
  '4':
  - type: text
    content: The Nephilim were on the earth in those days—and also afterward—when the sons of God went to the daughters of humans and had children by them. They were the heroes of old, men of renown.
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' saw how great the wickedness of the human race had become on the earth, and that every inclination of the thoughts of the human heart was only evil all the time. '
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' regretted that he had made human beings on the earth, and his heart was deeply troubled. '
  '7':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' said, “I will wipe from the face of the earth the human race I have created—and with them the animals, the birds and the creatures that move along the ground—for I regret that I have made them.” '
  '8':
  - type: text
    content: 'But Noah found favor in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Noah and the Flood
  '9':
  - type: text
    content: This is the account of Noah and his family.
  - type: text
    content: 'Noah was a righteous man, blameless among the people of his time, and he walked faithfully with God. '
