document_id: 1CO.15,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Resurrection of Christ
  - type: text
    content: 'Now, brothers and sisters, I want to remind you of the gospel I preached to you, which you received and on which you have taken your stand. '
  '10':
  - type: text
    content: 'But by the grace of God I am what I am, and his grace to me was not without effect. No, I worked harder than all of them—yet not I, but the grace of God that was with me. '
  '11':
  - type: text
    content: Whether, then, it is I or they, this is what we preach, and this is what you believed.
  - type: heading
    content: The Resurrection of the Dead
  '12':
  - type: text
    content: 'But if it is preached that Christ has been raised from the dead, how can some of you say that there is no resurrection of the dead? '
  '13':
  - type: text
    content: 'If there is no resurrection of the dead, then not even Christ has been raised. '
  '14':
  - type: text
    content: 'And if Christ has not been raised, our preaching is useless and so is your faith. '
  '15':
  - type: text
    content: 'More than that, we are then found to be false witnesses about God, for we have testified about God that he raised Christ from the dead. But he did not raise him if in fact the dead are not raised. '
  '16':
  - type: text
    content: 'For if the dead are not raised, then Christ has not been raised either. '
  '17':
  - type: text
    content: 'And if Christ has not been raised, your faith is futile; you are still in your sins. '
  '18':
  - type: text
    content: 'Then those also who have fallen asleep in Christ are lost. '
  '19':
  - type: text
    content: If only for this life we have hope in Christ, we are of all people most to be pitied.
  '2':
  - type: text
    content: By this gospel you are saved, if you hold firmly to the word I preached to you. Otherwise, you have believed in vain.
  '20':
  - type: text
    content: 'But Christ has indeed been raised from the dead, the firstfruits of those who have fallen asleep. '
  '21':
  - type: text
    content: 'For since death came through a man, the resurrection of the dead comes also through a man. '
  '22':
  - type: text
    content: 'For as in Adam all die, so in Christ all will be made alive. '
  '23':
  - type: text
    content: 'But each in turn: Christ, the firstfruits; then, when he comes, those who belong to him. '
  '24':
  - type: text
    content: 'Then the end will come, when he hands over the kingdom to God the Father after he has destroyed all dominion, authority and power. '
  '25':
  - type: text
    content: 'For he must reign until he has put all his enemies under his feet. '
  '26':
  - type: text
    content: 'The last enemy to be destroyed is death. '
  '27':
  - type: text
    content: For he “has put everything under his feet.”
  - type: note
    content: Psalm 8:6
  - type: text
    content: ' Now when it says that “everything” has been put under him, it is clear that this does not include God himself, who put everything under Christ. '
  '28':
  - type: text
    content: When he has done this, then the Son himself will be made subject to him who put everything under him, so that God may be all in all.
  '29':
  - type: text
    content: 'Now if there is no resurrection, what will those do who are baptized for the dead? If the dead are not raised at all, why are people baptized for them? '
  '3':
  - type: text
    content: For what I received I passed on to you as of first importance
  - type: note
    content: Or you at the first
  - type: text
    content: ': that Christ died for our sins according to the Scriptures, '
  '30':
  - type: text
    content: 'And as for us, why do we endanger ourselves every hour? '
  '31':
  - type: text
    content: 'I face death every day—yes, just as surely as I boast about you in Christ Jesus our Lord. '
  '32':
  - type: text
    content: If I fought wild beasts in Ephesus with no more than human hopes, what have I gained? If the dead are not raised,
  - type: text
    content: “Let us eat and drink,
  - type: text
    content: for tomorrow we die.”
  - type: note
    content: Isaiah 22:13
  '33':
  - type: text
    content: 'Do not be misled: “Bad company corrupts good character.”'
  - type: note
    content: From the Greek poet Menander
  - type: text
    content: ' '
  '34':
  - type: text
    content: Come back to your senses as you ought, and stop sinning; for there are some who are ignorant of God—I say this to your shame.
  - type: heading
    content: The Resurrection Body
  '35':
  - type: text
    content: 'But someone will ask, “How are the dead raised? With what kind of body will they come?” '
  '36':
  - type: text
    content: 'How foolish! What you sow does not come to life unless it dies. '
  '37':
  - type: text
    content: 'When you sow, you do not plant the body that will be, but just a seed, perhaps of wheat or of something else. '
  '38':
  - type: text
    content: 'But God gives it a body as he has determined, and to each kind of seed he gives its own body. '
  '39':
  - type: text
    content: 'Not all flesh is the same: People have one kind of flesh, animals have another, birds another and fish another. '
  '4':
  - type: text
    content: 'that he was buried, that he was raised on the third day according to the Scriptures, '
  '40':
  - type: text
    content: 'There are also heavenly bodies and there are earthly bodies; but the splendor of the heavenly bodies is one kind, and the splendor of the earthly bodies is another. '
  '41':
  - type: text
    content: The sun has one kind of splendor, the moon another and the stars another; and star differs from star in splendor.
  '42':
  - type: text
    content: 'So will it be with the resurrection of the dead. The body that is sown is perishable, it is raised imperishable; '
  '43':
  - type: text
    content: 'it is sown in dishonor, it is raised in glory; it is sown in weakness, it is raised in power; '
  '44':
  - type: text
    content: it is sown a natural body, it is raised a spiritual body.
  - type: text
    content: 'If there is a natural body, there is also a spiritual body. '
  '45':
  - type: text
    content: 'So it is written: “The first man Adam became a living being”'
  - type: note
    content: Gen. 2:7
  - type: text
    content: '; the last Adam, a life-giving spirit. '
  '46':
  - type: text
    content: 'The spiritual did not come first, but the natural, and after that the spiritual. '
  '47':
  - type: text
    content: 'The first man was of the dust of the earth; the second man is of heaven. '
  '48':
  - type: text
    content: 'As was the earthly man, so are those who are of the earth; and as is the heavenly man, so also are those who are of heaven. '
  '49':
  - type: text
    content: And just as we have borne the image of the earthly man, so shall we
  - type: note
    content: Some early manuscripts so let us
  - type: text
    content: ' bear the image of the heavenly man.'
  '5':
  - type: text
    content: and that he appeared to Cephas,
  - type: note
    content: That is, Peter
  - type: text
    content: ' and then to the Twelve. '
  '50':
  - type: text
    content: 'I declare to you, brothers and sisters, that flesh and blood cannot inherit the kingdom of God, nor does the perishable inherit the imperishable. '
  '51':
  - type: text
    content: 'Listen, I tell you a mystery: We will not all sleep, but we will all be changed— '
  '52':
  - type: text
    content: 'in a flash, in the twinkling of an eye, at the last trumpet. For the trumpet will sound, the dead will be raised imperishable, and we will be changed. '
  '53':
  - type: text
    content: 'For the perishable must clothe itself with the imperishable, and the mortal with immortality. '
  '54':
  - type: text
    content: 'When the perishable has been clothed with the imperishable, and the mortal with immortality, then the saying that is written will come true: “Death has been swallowed up in victory.”'
  - type: note
    content: Isaiah 25:8
  '55':
  - type: text
    content: “Where, O death, is your victory?
  - type: text
    content: Where, O death, is your sting?”
  - type: note
    content: Hosea 13:14
  '56':
  - type: text
    content: 'The sting of death is sin, and the power of sin is the law. '
  '57':
  - type: text
    content: But thanks be to God! He gives us the victory through our Lord Jesus Christ.
  '58':
  - type: text
    content: Therefore, my dear brothers and sisters, stand firm. Let nothing move you. Always give yourselves fully to the work of the Lord, because you know that your labor in the Lord is not in vain.
  '6':
  - type: text
    content: 'After that, he appeared to more than five hundred of the brothers and sisters at the same time, most of whom are still living, though some have fallen asleep. '
  '7':
  - type: text
    content: 'Then he appeared to James, then to all the apostles, '
  '8':
  - type: text
    content: and last of all he appeared to me also, as to one abnormally born.
  '9':
  - type: text
    content: 'For I am the least of the apostles and do not even deserve to be called an apostle, because I persecuted the church of God. '
