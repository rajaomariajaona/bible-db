document_id: REV.16,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Seven Bowls of God’s Wrath
  - type: text
    content: Then I heard a loud voice from the temple saying to the seven angels, “Go, pour out the seven bowls of God’s wrath on the earth.”
  '10':
  - type: text
    content: 'The fifth angel poured out his bowl on the throne of the beast, and its kingdom was plunged into darkness. People gnawed their tongues in agony '
  '11':
  - type: text
    content: and cursed the God of heaven because of their pains and their sores, but they refused to repent of what they had done.
  '12':
  - type: text
    content: 'The sixth angel poured out his bowl on the great river Euphrates, and its water was dried up to prepare the way for the kings from the East. '
  '13':
  - type: text
    content: 'Then I saw three impure spirits that looked like frogs; they came out of the mouth of the dragon, out of the mouth of the beast and out of the mouth of the false prophet. '
  '14':
  - type: text
    content: They are demonic spirits that perform signs, and they go out to the kings of the whole world, to gather them for the battle on the great day of God Almighty.
  '15':
  - type: text
    content: ' '
  - type: text
    content: “Look, I come like a thief! Blessed is the one who stays awake and remains clothed, so as not to go naked and be shamefully exposed.”
  '16':
  - type: text
    content: Then they gathered the kings together to the place that in Hebrew is called Armageddon.
  '17':
  - type: text
    content: 'The seventh angel poured out his bowl into the air, and out of the temple came a loud voice from the throne, saying, “It is done!” '
  '18':
  - type: text
    content: 'Then there came flashes of lightning, rumblings, peals of thunder and a severe earthquake. No earthquake like it has ever occurred since mankind has been on earth, so tremendous was the quake. '
  '19':
  - type: text
    content: 'The great city split into three parts, and the cities of the nations collapsed. God remembered Babylon the Great and gave her the cup filled with the wine of the fury of his wrath. '
  '2':
  - type: text
    content: The first angel went and poured out his bowl on the land, and ugly, festering sores broke out on the people who had the mark of the beast and worshiped its image.
  '20':
  - type: text
    content: 'Every island fled away and the mountains could not be found. '
  '21':
  - type: text
    content: From the sky huge hailstones, each weighing about a hundred pounds,
  - type: note
    content: Or about 45 kilograms
  - type: text
    content: ' fell on people. And they cursed God on account of the plague of hail, because the plague was so terrible.'
  '3':
  - type: text
    content: The second angel poured out his bowl on the sea, and it turned into blood like that of a dead person, and every living thing in the sea died.
  '4':
  - type: text
    content: 'The third angel poured out his bowl on the rivers and springs of water, and they became blood. '
  '5':
  - type: text
    content: 'Then I heard the angel in charge of the waters say:'
  - type: text
    content: “You are just in these judgments, O Holy One,
  - type: text
    content: you who are and who were;
  '6':
  - type: text
    content: for they have shed the blood of your holy people and your prophets,
  - type: text
    content: and you have given them blood to drink as they deserve.”
  '7':
  - type: text
    content: 'And I heard the altar respond:'
  - type: text
    content: “Yes, Lord God Almighty,
  - type: text
    content: true and just are your judgments.”
  '8':
  - type: text
    content: 'The fourth angel poured out his bowl on the sun, and the sun was allowed to scorch people with fire. '
  '9':
  - type: text
    content: They were seared by the intense heat and they cursed the name of God, who had control over these plagues, but they refused to repent and glorify him.
