document_id: EZK.32,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s2
    children:
    - type: text
      text: A Lament Over Pharaoh
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'In the twelfth year, in the twelfth month on the first day, the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to me: '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: I will cause many peoples to be appalled at you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their kings will shudder with horror because of you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I brandish my sword before them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On the day of your downfall
  - type: usfm
    marker: q2
    children:
    - type: text
      text: each of them will tremble
  - type: usfm
    marker: q2
    children:
    - type: text
      text: every moment for his life.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“ ‘For this is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘The sword of the king of Babylon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will come against you.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: I will cause your hordes to fall
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by the swords of mighty men—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the most ruthless of all nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will shatter the pride of Egypt,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all her hordes will be overthrown.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: I will destroy all her cattle
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from beside abundant waters
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no longer to be stirred by the foot of man
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or muddied by the hooves of cattle.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Then I will let her waters settle
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make her streams flow like oil,
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: When I make Egypt desolate
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and strip the land of everything in it,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when I strike down all who live there,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'then they will know that I am the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .’
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '“This is the lament they will chant for her. The daughters of the nations will chant it; for Egypt and all her hordes they will chant it, declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  - type: usfm
    marker: s2
    children:
    - type: text
      text: Egypt’s Descent Into the Realm of the Dead
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'In the twelfth year, on the fifteenth day of the month, the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to me: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“Son of man, wail for the hordes of Egypt and consign to the earth below both her and the daughters of mighty nations, along with those who go down to the pit. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Say to them, ‘Are you more favored than others? Go down and be laid among the uncircumcised.’ '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“Son of man, take up a lament concerning Pharaoh king of Egypt and say to him:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘You are like a lion among the nations;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you are like a monster in the seas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: thrashing about in your streams,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: churning the water with your feet
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and muddying the streams.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'They will fall among those killed by the sword. The sword is drawn; let her be dragged off with all her hordes. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: From within the realm of the dead the mighty leaders will say of Egypt and her allies, ‘They have come down and they lie with the uncircumcised, with those killed by the sword.’
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '“Assyria is there with her whole army; she is surrounded by the graves of all her slain, all who have fallen by the sword. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Their graves are in the depths of the pit and her army lies around her grave. All who had spread terror in the land of the living are slain, fallen by the sword.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '“Elam is there, with all her hordes around her grave. All of them are slain, fallen by the sword. All who had spread terror in the land of the living went down uncircumcised to the earth below. They bear their shame with those who go down to the pit. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: A bed is made for her among the slain, with all her hordes around her grave. All of them are uncircumcised, killed by the sword. Because their terror had spread in the land of the living, they bear their shame with those who go down to the pit; they are laid among the slain.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '“Meshek and Tubal are there, with all their hordes around their graves. All of them are uncircumcised, killed by the sword because they spread their terror in the land of the living. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: But they do not lie with the fallen warriors of old,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: warriors who were uncircumcised
      marker-yv: yv-n
    - type: text
      text: ' who went down to the realm of the dead with their weapons of war—their swords placed under their heads and their shields'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Probable reading of the original Hebrew text; Masoretic Text '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: punishment
      marker-yv: yv-n
    - type: text
      text: ' resting on their bones—though these warriors also had terrorized the land of the living.'
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: “You too, Pharaoh, will be broken and will lie among the uncircumcised, with those killed by the sword.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: “Edom is there, her kings and all her princes; despite their power, they are laid with those killed by the sword. They lie with the uncircumcised, with those who go down to the pit.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“ ‘This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘With a great throng of people
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will cast my net over you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will haul you up in my net.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: “All the princes of the north and all the Sidonians are there; they went down with the slain in disgrace despite the terror caused by their power. They lie uncircumcised with those killed by the sword and bear their shame with those who go down to the pit.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: '“Pharaoh—he and all his army—will see them and he will be consoled for all his hordes that were killed by the sword, declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Although I had him spread terror in the land of the living, Pharaoh and all his hordes will be laid among the uncircumcised, with those killed by the sword, declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: I will throw you on the land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hurl you on the open field.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will let all the birds of the sky settle on you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all the animals of the wild gorge themselves on you.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: I will spread your flesh on the mountains
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fill the valleys with your remains.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: I will drench the land with your flowing blood
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the way to the mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the ravines will be filled with your flesh.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: When I snuff you out, I will cover the heavens
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and darken their stars;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will cover the sun with a cloud,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the moon will not give its light.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: All the shining lights in the heavens
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will darken over you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will bring darkness over your land,
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: I will trouble the hearts of many peoples
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I bring about your destruction among the nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: among
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew; Septuagint '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: bring you into captivity among the nations, / to
      marker-yv: yv-n
    - type: text
      text: ' lands you have not known.'
