document_id: EZK.32,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Lament Over Pharaoh
  - type: text
    content: 'In the twelfth year, in the twelfth month on the first day, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: I will cause many peoples to be appalled at you,
  - type: text
    content: and their kings will shudder with horror because of you
  - type: text
    content: when I brandish my sword before them.
  - type: text
    content: On the day of your downfall
  - type: text
    content: each of them will tremble
  - type: text
    content: every moment for his life.
  '11':
  - type: text
    content: '“ ‘For this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘The sword of the king of Babylon
  - type: text
    content: will come against you.
  '12':
  - type: text
    content: I will cause your hordes to fall
  - type: text
    content: by the swords of mighty men—
  - type: text
    content: the most ruthless of all nations.
  - type: text
    content: They will shatter the pride of Egypt,
  - type: text
    content: and all her hordes will be overthrown.
  '13':
  - type: text
    content: I will destroy all her cattle
  - type: text
    content: from beside abundant waters
  - type: text
    content: no longer to be stirred by the foot of man
  - type: text
    content: or muddied by the hooves of cattle.
  '14':
  - type: text
    content: Then I will let her waters settle
  - type: text
    content: and make her streams flow like oil,
  - type: text
    content: 'declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '15':
  - type: text
    content: When I make Egypt desolate
  - type: text
    content: and strip the land of everything in it,
  - type: text
    content: when I strike down all who live there,
  - type: text
    content: 'then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .’
  '16':
  - type: text
    content: '“This is the lament they will chant for her. The daughters of the nations will chant it; for Egypt and all her hordes they will chant it, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .”
  - type: heading
    content: Egypt’s Descent Into the Realm of the Dead
  '17':
  - type: text
    content: 'In the twelfth year, on the fifteenth day of the month, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '18':
  - type: text
    content: '“Son of man, wail for the hordes of Egypt and consign to the earth below both her and the daughters of mighty nations, along with those who go down to the pit. '
  '19':
  - type: text
    content: 'Say to them, ‘Are you more favored than others? Go down and be laid among the uncircumcised.’ '
  '2':
  - type: text
    content: '“Son of man, take up a lament concerning Pharaoh king of Egypt and say to him:'
  - type: text
    content: “ ‘You are like a lion among the nations;
  - type: text
    content: you are like a monster in the seas
  - type: text
    content: thrashing about in your streams,
  - type: text
    content: churning the water with your feet
  - type: text
    content: and muddying the streams.
  '20':
  - type: text
    content: 'They will fall among those killed by the sword. The sword is drawn; let her be dragged off with all her hordes. '
  '21':
  - type: text
    content: From within the realm of the dead the mighty leaders will say of Egypt and her allies, ‘They have come down and they lie with the uncircumcised, with those killed by the sword.’
  '22':
  - type: text
    content: '“Assyria is there with her whole army; she is surrounded by the graves of all her slain, all who have fallen by the sword. '
  '23':
  - type: text
    content: Their graves are in the depths of the pit and her army lies around her grave. All who had spread terror in the land of the living are slain, fallen by the sword.
  '24':
  - type: text
    content: '“Elam is there, with all her hordes around her grave. All of them are slain, fallen by the sword. All who had spread terror in the land of the living went down uncircumcised to the earth below. They bear their shame with those who go down to the pit. '
  '25':
  - type: text
    content: A bed is made for her among the slain, with all her hordes around her grave. All of them are uncircumcised, killed by the sword. Because their terror had spread in the land of the living, they bear their shame with those who go down to the pit; they are laid among the slain.
  '26':
  - type: text
    content: '“Meshek and Tubal are there, with all their hordes around their graves. All of them are uncircumcised, killed by the sword because they spread their terror in the land of the living. '
  '27':
  - type: text
    content: But they do not lie with the fallen warriors of old,
  - type: note
    content: Septuagint; Hebrew warriors who were uncircumcised
  - type: text
    content: ' who went down to the realm of the dead with their weapons of war—their swords placed under their heads and their shields'
  - type: note
    content: Probable reading of the original Hebrew text; Masoretic Text punishment
  - type: text
    content: ' resting on their bones—though these warriors also had terrorized the land of the living.'
  '28':
  - type: text
    content: “You too, Pharaoh, will be broken and will lie among the uncircumcised, with those killed by the sword.
  '29':
  - type: text
    content: “Edom is there, her kings and all her princes; despite their power, they are laid with those killed by the sword. They lie with the uncircumcised, with those who go down to the pit.
  '3':
  - type: text
    content: '“ ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘With a great throng of people
  - type: text
    content: I will cast my net over you,
  - type: text
    content: and they will haul you up in my net.
  '30':
  - type: text
    content: “All the princes of the north and all the Sidonians are there; they went down with the slain in disgrace despite the terror caused by their power. They lie uncircumcised with those killed by the sword and bear their shame with those who go down to the pit.
  '31':
  - type: text
    content: '“Pharaoh—he and all his army—will see them and he will be consoled for all his hordes that were killed by the sword, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Although I had him spread terror in the land of the living, Pharaoh and all his hordes will be laid among the uncircumcised, with those killed by the sword, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .”
  '4':
  - type: text
    content: I will throw you on the land
  - type: text
    content: and hurl you on the open field.
  - type: text
    content: I will let all the birds of the sky settle on you
  - type: text
    content: and all the animals of the wild gorge themselves on you.
  '5':
  - type: text
    content: I will spread your flesh on the mountains
  - type: text
    content: and fill the valleys with your remains.
  '6':
  - type: text
    content: I will drench the land with your flowing blood
  - type: text
    content: all the way to the mountains,
  - type: text
    content: and the ravines will be filled with your flesh.
  '7':
  - type: text
    content: When I snuff you out, I will cover the heavens
  - type: text
    content: and darken their stars;
  - type: text
    content: I will cover the sun with a cloud,
  - type: text
    content: and the moon will not give its light.
  '8':
  - type: text
    content: All the shining lights in the heavens
  - type: text
    content: I will darken over you;
  - type: text
    content: I will bring darkness over your land,
  - type: text
    content: 'declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: I will trouble the hearts of many peoples
  - type: text
    content: when I bring about your destruction among the nations,
  - type: text
    content: among
  - type: note
    content: Hebrew; Septuagint bring you into captivity among the nations, / to
  - type: text
    content: ' lands you have not known.'
