document_id: 1CO.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Church and Its Leaders
  - type: text
    content: 'Brothers and sisters, I could not address you as people who live by the Spirit but as people who are still worldly—mere infants in Christ. '
  '10':
  - type: text
    content: 'By the grace God has given me, I laid a foundation as a wise builder, and someone else is building on it. But each one should build with care. '
  '11':
  - type: text
    content: 'For no one can lay any foundation other than the one already laid, which is Jesus Christ. '
  '12':
  - type: text
    content: 'If anyone builds on this foundation using gold, silver, costly stones, wood, hay or straw, '
  '13':
  - type: text
    content: 'their work will be shown for what it is, because the Day will bring it to light. It will be revealed with fire, and the fire will test the quality of each person’s work. '
  '14':
  - type: text
    content: 'If what has been built survives, the builder will receive a reward. '
  '15':
  - type: text
    content: If it is burned up, the builder will suffer loss but yet will be saved—even though only as one escaping through the flames.
  '16':
  - type: text
    content: 'Don’t you know that you yourselves are God’s temple and that God’s Spirit dwells in your midst? '
  '17':
  - type: text
    content: If anyone destroys God’s temple, God will destroy that person; for God’s temple is sacred, and you together are that temple.
  '18':
  - type: text
    content: 'Do not deceive yourselves. If any of you think you are wise by the standards of this age, you should become “fools” so that you may become wise. '
  '19':
  - type: text
    content: 'For the wisdom of this world is foolishness in God’s sight. As it is written: “He catches the wise in their craftiness”'
  - type: note
    content: Job 5:13
  - type: text
    content: '; '
  '2':
  - type: text
    content: 'I gave you milk, not solid food, for you were not yet ready for it. Indeed, you are still not ready. '
  '20':
  - type: text
    content: and again, “The Lord knows that the thoughts of the wise are futile.”
  - type: note
    content: Psalm 94:11
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'So then, no more boasting about human leaders! All things are yours, '
  '22':
  - type: text
    content: whether Paul or Apollos or Cephas
  - type: note
    content: That is, Peter
  - type: text
    content: ' or the world or life or death or the present or the future—all are yours, '
  '23':
  - type: text
    content: and you are of Christ, and Christ is of God.
  '3':
  - type: text
    content: 'You are still worldly. For since there is jealousy and quarreling among you, are you not worldly? Are you not acting like mere humans? '
  '4':
  - type: text
    content: For when one says, “I follow Paul,” and another, “I follow Apollos,” are you not mere human beings?
  '5':
  - type: text
    content: 'What, after all, is Apollos? And what is Paul? Only servants, through whom you came to believe—as the Lord has assigned to each his task. '
  '6':
  - type: text
    content: 'I planted the seed, Apollos watered it, but God has been making it grow. '
  '7':
  - type: text
    content: 'So neither the one who plants nor the one who waters is anything, but only God, who makes things grow. '
  '8':
  - type: text
    content: 'The one who plants and the one who waters have one purpose, and they will each be rewarded according to their own labor. '
  '9':
  - type: text
    content: For we are co-workers in God’s service; you are God’s field, God’s building.
