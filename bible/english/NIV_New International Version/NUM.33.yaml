document_id: NUM.33,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Stages in Israel’s Journey
  - type: text
    content: 'Here are the stages in the journey of the Israelites when they came out of Egypt by divisions under the leadership of Moses and Aaron. '
  '10':
  - type: text
    content: They left Elim and camped by the Red Sea.
  - type: note
    content: Or the Sea of Reeds; also in verse 11
  '11':
  - type: text
    content: They left the Red Sea and camped in the Desert of Sin.
  '12':
  - type: text
    content: They left the Desert of Sin and camped at Dophkah.
  '13':
  - type: text
    content: They left Dophkah and camped at Alush.
  '14':
  - type: text
    content: They left Alush and camped at Rephidim, where there was no water for the people to drink.
  '15':
  - type: text
    content: They left Rephidim and camped in the Desert of Sinai.
  '16':
  - type: text
    content: They left the Desert of Sinai and camped at Kibroth Hattaavah.
  '17':
  - type: text
    content: They left Kibroth Hattaavah and camped at Hazeroth.
  '18':
  - type: text
    content: They left Hazeroth and camped at Rithmah.
  '19':
  - type: text
    content: They left Rithmah and camped at Rimmon Perez.
  '2':
  - type: text
    content: 'At the '
  - type: text
    content: Lord
  - type: text
    content: '’s command Moses recorded the stages in their journey. This is their journey by stages:'
  '20':
  - type: text
    content: They left Rimmon Perez and camped at Libnah.
  '21':
  - type: text
    content: They left Libnah and camped at Rissah.
  '22':
  - type: text
    content: They left Rissah and camped at Kehelathah.
  '23':
  - type: text
    content: They left Kehelathah and camped at Mount Shepher.
  '24':
  - type: text
    content: They left Mount Shepher and camped at Haradah.
  '25':
  - type: text
    content: They left Haradah and camped at Makheloth.
  '26':
  - type: text
    content: They left Makheloth and camped at Tahath.
  '27':
  - type: text
    content: They left Tahath and camped at Terah.
  '28':
  - type: text
    content: They left Terah and camped at Mithkah.
  '29':
  - type: text
    content: They left Mithkah and camped at Hashmonah.
  '3':
  - type: text
    content: 'The Israelites set out from Rameses on the fifteenth day of the first month, the day after the Passover. They marched out defiantly in full view of all the Egyptians, '
  '30':
  - type: text
    content: They left Hashmonah and camped at Moseroth.
  '31':
  - type: text
    content: They left Moseroth and camped at Bene Jaakan.
  '32':
  - type: text
    content: They left Bene Jaakan and camped at Hor Haggidgad.
  '33':
  - type: text
    content: They left Hor Haggidgad and camped at Jotbathah.
  '34':
  - type: text
    content: They left Jotbathah and camped at Abronah.
  '35':
  - type: text
    content: They left Abronah and camped at Ezion Geber.
  '36':
  - type: text
    content: They left Ezion Geber and camped at Kadesh, in the Desert of Zin.
  '37':
  - type: text
    content: 'They left Kadesh and camped at Mount Hor, on the border of Edom. '
  '38':
  - type: text
    content: 'At the '
  - type: text
    content: Lord
  - type: text
    content: '’s command Aaron the priest went up Mount Hor, where he died on the first day of the fifth month of the fortieth year after the Israelites came out of Egypt. '
  '39':
  - type: text
    content: Aaron was a hundred and twenty-three years old when he died on Mount Hor.
  '4':
  - type: text
    content: 'who were burying all their firstborn, whom the '
  - type: text
    content: Lord
  - type: text
    content: ' had struck down among them; for the '
  - type: text
    content: Lord
  - type: text
    content: ' had brought judgment on their gods.'
  '40':
  - type: text
    content: The Canaanite king of Arad, who lived in the Negev of Canaan, heard that the Israelites were coming.
  '41':
  - type: text
    content: They left Mount Hor and camped at Zalmonah.
  '42':
  - type: text
    content: They left Zalmonah and camped at Punon.
  '43':
  - type: text
    content: They left Punon and camped at Oboth.
  '44':
  - type: text
    content: They left Oboth and camped at Iye Abarim, on the border of Moab.
  '45':
  - type: text
    content: They left Iye Abarim and camped at Dibon Gad.
  '46':
  - type: text
    content: They left Dibon Gad and camped at Almon Diblathaim.
  '47':
  - type: text
    content: They left Almon Diblathaim and camped in the mountains of Abarim, near Nebo.
  '48':
  - type: text
    content: 'They left the mountains of Abarim and camped on the plains of Moab by the Jordan across from Jericho. '
  '49':
  - type: text
    content: There on the plains of Moab they camped along the Jordan from Beth Jeshimoth to Abel Shittim.
  '5':
  - type: text
    content: The Israelites left Rameses and camped at Sukkoth.
  '50':
  - type: text
    content: 'On the plains of Moab by the Jordan across from Jericho the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '51':
  - type: text
    content: '“Speak to the Israelites and say to them: ‘When you cross the Jordan into Canaan, '
  '52':
  - type: text
    content: 'drive out all the inhabitants of the land before you. Destroy all their carved images and their cast idols, and demolish all their high places. '
  '53':
  - type: text
    content: 'Take possession of the land and settle in it, for I have given you the land to possess. '
  '54':
  - type: text
    content: Distribute the land by lot, according to your clans. To a larger group give a larger inheritance, and to a smaller group a smaller one. Whatever falls to them by lot will be theirs. Distribute it according to your ancestral tribes.
  '55':
  - type: text
    content: '“ ‘But if you do not drive out the inhabitants of the land, those you allow to remain will become barbs in your eyes and thorns in your sides. They will give you trouble in the land where you will live. '
  '56':
  - type: text
    content: And then I will do to you what I plan to do to them.’ ”
  '6':
  - type: text
    content: They left Sukkoth and camped at Etham, on the edge of the desert.
  '7':
  - type: text
    content: They left Etham, turned back to Pi Hahiroth, to the east of Baal Zephon, and camped near Migdol.
  '8':
  - type: text
    content: They left Pi Hahiroth
  - type: note
    content: Many manuscripts of the Masoretic Text, Samaritan Pentateuch and Vulgate; most manuscripts of the Masoretic Text left from before Hahiroth
  - type: text
    content: ' and passed through the sea into the desert, and when they had traveled for three days in the Desert of Etham, they camped at Marah.'
  '9':
  - type: text
    content: They left Marah and went to Elim, where there were twelve springs and seventy palm trees, and they camped there.
