document_id: MAT.12,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Is Lord of the Sabbath
  - type: text
    content: 'At that time Jesus went through the grainfields on the Sabbath. His disciples were hungry and began to pick some heads of grain and eat them. '
  '10':
  - type: text
    content: and a man with a shriveled hand was there. Looking for a reason to bring charges against Jesus, they asked him, “Is it lawful to heal on the Sabbath?”
  '11':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “If any of you has a sheep and it falls into a pit on the Sabbath, will you not take hold of it and lift it out?
  - type: text
    content: ' '
  '12':
  - type: text
    content: How much more valuable is a person than a sheep! Therefore it is lawful to do good on the Sabbath.”
  '13':
  - type: text
    content: 'Then he said to the man, '
  - type: text
    content: “Stretch out your hand.”
  - type: text
    content: ' So he stretched it out and it was completely restored, just as sound as the other. '
  '14':
  - type: text
    content: But the Pharisees went out and plotted how they might kill Jesus.
  - type: heading
    content: God’s Chosen Servant
  '15':
  - type: text
    content: 'Aware of this, Jesus withdrew from that place. A large crowd followed him, and he healed all who were ill. '
  '16':
  - type: text
    content: 'He warned them not to tell others about him. '
  '17':
  - type: text
    content: 'This was to fulfill what was spoken through the prophet Isaiah:'
  '18':
  - type: text
    content: “Here is my servant whom I have chosen,
  - type: text
    content: the one I love, in whom I delight;
  - type: text
    content: I will put my Spirit on him,
  - type: text
    content: and he will proclaim justice to the nations.
  '19':
  - type: text
    content: He will not quarrel or cry out;
  - type: text
    content: no one will hear his voice in the streets.
  '2':
  - type: text
    content: When the Pharisees saw this, they said to him, “Look! Your disciples are doing what is unlawful on the Sabbath.”
  '20':
  - type: text
    content: A bruised reed he will not break,
  - type: text
    content: and a smoldering wick he will not snuff out,
  - type: text
    content: till he has brought justice through to victory.
  '21':
  - type: text
    content: In his name the nations will put their hope.”
  - type: note
    content: Isaiah 42:1-4
  - type: heading
    content: Jesus and Beelzebul
  '22':
  - type: text
    content: 'Then they brought him a demon-possessed man who was blind and mute, and Jesus healed him, so that he could both talk and see. '
  '23':
  - type: text
    content: All the people were astonished and said, “Could this be the Son of David?”
  '24':
  - type: text
    content: But when the Pharisees heard this, they said, “It is only by Beelzebul, the prince of demons, that this fellow drives out demons.”
  '25':
  - type: text
    content: 'Jesus knew their thoughts and said to them, '
  - type: text
    content: “Every kingdom divided against itself will be ruined, and every city or household divided against itself will not stand.
  - type: text
    content: ' '
  '26':
  - type: text
    content: If Satan drives out Satan, he is divided against himself. How then can his kingdom stand?
  - type: text
    content: ' '
  '27':
  - type: text
    content: And if I drive out demons by Beelzebul, by whom do your people drive them out? So then, they will be your judges.
  - type: text
    content: ' '
  '28':
  - type: text
    content: But if it is by the Spirit of God that I drive out demons, then the kingdom of God has come upon you.
  '29':
  - type: text
    content: ' '
  - type: text
    content: “Or again, how can anyone enter a strong man’s house and carry off his possessions unless he first ties up the strong man? Then he can plunder his house.
  '3':
  - type: text
    content: 'He answered, '
  - type: text
    content: “Haven’t you read what David did when he and his companions were hungry?
  - type: text
    content: ' '
  '30':
  - type: text
    content: ' '
  - type: text
    content: “Whoever is not with me is against me, and whoever does not gather with me scatters.
  - type: text
    content: ' '
  '31':
  - type: text
    content: And so I tell you, every kind of sin and slander can be forgiven, but blasphemy against the Spirit will not be forgiven.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Anyone who speaks a word against the Son of Man will be forgiven, but anyone who speaks against the Holy Spirit will not be forgiven, either in this age or in the age to come.
  '33':
  - type: text
    content: ' '
  - type: text
    content: “Make a tree good and its fruit will be good, or make a tree bad and its fruit will be bad, for a tree is recognized by its fruit.
  - type: text
    content: ' '
  '34':
  - type: text
    content: You brood of vipers, how can you who are evil say anything good? For the mouth speaks what the heart is full of.
  - type: text
    content: ' '
  '35':
  - type: text
    content: A good man brings good things out of the good stored up in him, and an evil man brings evil things out of the evil stored up in him.
  - type: text
    content: ' '
  '36':
  - type: text
    content: But I tell you that everyone will have to give account on the day of judgment for every empty word they have spoken.
  - type: text
    content: ' '
  '37':
  - type: text
    content: For by your words you will be acquitted, and by your words you will be condemned.”
  - type: heading
    content: The Sign of Jonah
  '38':
  - type: text
    content: Then some of the Pharisees and teachers of the law said to him, “Teacher, we want to see a sign from you.”
  '39':
  - type: text
    content: 'He answered, '
  - type: text
    content: “A wicked and adulterous generation asks for a sign! But none will be given it except the sign of the prophet Jonah.
  - type: text
    content: ' '
  '4':
  - type: text
    content: He entered the house of God, and he and his companions ate the consecrated bread—which was not lawful for them to do, but only for the priests.
  - type: text
    content: ' '
  '40':
  - type: text
    content: For as Jonah was three days and three nights in the belly of a huge fish, so the Son of Man will be three days and three nights in the heart of the earth.
  - type: text
    content: ' '
  '41':
  - type: text
    content: The men of Nineveh will stand up at the judgment with this generation and condemn it; for they repented at the preaching of Jonah, and now something greater than Jonah is here.
  - type: text
    content: ' '
  '42':
  - type: text
    content: The Queen of the South will rise at the judgment with this generation and condemn it; for she came from the ends of the earth to listen to Solomon’s wisdom, and now something greater than Solomon is here.
  '43':
  - type: text
    content: ' '
  - type: text
    content: “When an impure spirit comes out of a person, it goes through arid places seeking rest and does not find it.
  - type: text
    content: ' '
  '44':
  - type: text
    content: Then it says, ‘I will return to the house I left.’ When it arrives, it finds the house unoccupied, swept clean and put in order.
  - type: text
    content: ' '
  '45':
  - type: text
    content: Then it goes and takes with it seven other spirits more wicked than itself, and they go in and live there. And the final condition of that person is worse than the first. That is how it will be with this wicked generation.”
  - type: heading
    content: Jesus’ Mother and Brothers
  '46':
  - type: text
    content: 'While Jesus was still talking to the crowd, his mother and brothers stood outside, wanting to speak to him. '
  '47':
  - type: text
    content: Someone told him, “Your mother and brothers are standing outside, wanting to speak to you.”
  '48':
  - type: text
    content: 'He replied to him, '
  - type: text
    content: “Who is my mother, and who are my brothers?”
  - type: text
    content: ' '
  '49':
  - type: text
    content: 'Pointing to his disciples, he said, '
  - type: text
    content: “Here are my mother and my brothers.
  - type: text
    content: ' '
  '5':
  - type: text
    content: Or haven’t you read in the Law that the priests on Sabbath duty in the temple desecrate the Sabbath and yet are innocent?
  - type: text
    content: ' '
  '50':
  - type: text
    content: For whoever does the will of my Father in heaven is my brother and sister and mother.”
  '6':
  - type: text
    content: I tell you that something greater than the temple is here.
  - type: text
    content: ' '
  '7':
  - type: text
    content: If you had known what these words mean, ‘I desire mercy, not sacrifice,’
  - type: note
    content: Hosea 6:6
  - type: text
    content: ' '
  - type: text
    content: you would not have condemned the innocent.
  - type: text
    content: ' '
  '8':
  - type: text
    content: For the Son of Man is Lord of the Sabbath.”
  '9':
  - type: text
    content: 'Going on from that place, he went into their synagogue, '
