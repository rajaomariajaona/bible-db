document_id: MAT.12
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Is Lord of the Sabbath
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'At that time Jesus went through the grainfields on the Sabbath. His disciples were hungry and began to pick some heads of grain and eat them. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When the Pharisees saw this, they said to him, “Look! Your disciples are doing what is unlawful on the Sabbath.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Haven’t you read what David did when he and his companions were hungry?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He entered the house of God, and he and his companions ate the consecrated bread—which was not lawful for them to do, but only for the priests.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Or haven’t you read in the Law that the priests on Sabbath duty in the temple desecrate the Sabbath and yet are innocent?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I tell you that something greater than the temple is here.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If you had known what these words mean, ‘I desire mercy, not sacrifice,’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hosea 6:6
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: you would not have condemned the innocent.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For the Son of Man is Lord of the Sabbath.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Going on from that place, he went into their synagogue, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: and a man with a shriveled hand was there. Looking for a reason to bring charges against Jesus, they asked him, “Is it lawful to heal on the Sabbath?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If any of you has a sheep and it falls into a pit on the Sabbath, will you not take hold of it and lift it out?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: How much more valuable is a person than a sheep! Therefore it is lawful to do good on the Sabbath.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then he said to the man, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Stretch out your hand.”
  - type: text
    text: ' So he stretched it out and it was completely restored, just as sound as the other. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: But the Pharisees went out and plotted how they might kill Jesus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Chosen Servant
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Aware of this, Jesus withdrew from that place. A large crowd followed him, and he healed all who were ill. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'He warned them not to tell others about him. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'This was to fulfill what was spoken through the prophet Isaiah:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Here is my servant whom I have chosen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the one I love, in whom I delight;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will put my Spirit on him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he will proclaim justice to the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He will not quarrel or cry out;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one will hear his voice in the streets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: A bruised reed he will not break,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a smoldering wick he will not snuff out,
- type: usfm
  marker: q1
  children:
  - type: text
    text: till he has brought justice through to victory.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: In his name the nations will put their hope.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah 42:1-4
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus and Beelzebul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Then they brought him a demon-possessed man who was blind and mute, and Jesus healed him, so that he could both talk and see. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: All the people were astonished and said, “Could this be the Son of David?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: But when the Pharisees heard this, they said, “It is only by Beelzebul, the prince of demons, that this fellow drives out demons.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jesus knew their thoughts and said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Every kingdom divided against itself will be ruined, and every city or household divided against itself will not stand.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If Satan drives out Satan, he is divided against himself. How then can his kingdom stand?
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And if I drive out demons by Beelzebul, by whom do your people drive them out? So then, they will be your judges.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But if it is by the Spirit of God that I drive out demons, then the kingdom of God has come upon you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Or again, how can anyone enter a strong man’s house and carry off his possessions unless he first ties up the strong man? Then he can plunder his house.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Whoever is not with me is against me, and whoever does not gather with me scatters.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: And so I tell you, every kind of sin and slander can be forgiven, but blasphemy against the Spirit will not be forgiven.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Anyone who speaks a word against the Son of Man will be forgiven, but anyone who speaks against the Holy Spirit will not be forgiven, either in this age or in the age to come.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Make a tree good and its fruit will be good, or make a tree bad and its fruit will be bad, for a tree is recognized by its fruit.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You brood of vipers, how can you who are evil say anything good? For the mouth speaks what the heart is full of.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: A good man brings good things out of the good stored up in him, and an evil man brings evil things out of the evil stored up in him.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But I tell you that everyone will have to give account on the day of judgment for every empty word they have spoken.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For by your words you will be acquitted, and by your words you will be condemned.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Sign of Jonah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Then some of the Pharisees and teachers of the law said to him, “Teacher, we want to see a sign from you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'He answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “A wicked and adulterous generation asks for a sign! But none will be given it except the sign of the prophet Jonah.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For as Jonah was three days and three nights in the belly of a huge fish, so the Son of Man will be three days and three nights in the heart of the earth.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The men of Nineveh will stand up at the judgment with this generation and condemn it; for they repented at the preaching of Jonah, and now something greater than Jonah is here.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The Queen of the South will rise at the judgment with this generation and condemn it; for she came from the ends of the earth to listen to Solomon’s wisdom, and now something greater than Solomon is here.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “When an impure spirit comes out of a person, it goes through arid places seeking rest and does not find it.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then it says, ‘I will return to the house I left.’ When it arrives, it finds the house unoccupied, swept clean and put in order.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then it goes and takes with it seven other spirits more wicked than itself, and they go in and live there. And the final condition of that person is worse than the first. That is how it will be with this wicked generation.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus’ Mother and Brothers
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'While Jesus was still talking to the crowd, his mother and brothers stood outside, wanting to speak to him. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Someone told him, “Your mother and brothers are standing outside, wanting to speak to you.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'He replied to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Who is my mother, and who are my brothers?”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Pointing to his disciples, he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Here are my mother and my brothers.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: For whoever does the will of my Father in heaven is my brother and sister and mother.”
