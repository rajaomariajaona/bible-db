document_id: SNG.3,111
type_code: eng
verses:
  '1':
  - type: text
    content: All night long on my bed
  - type: text
    content: I looked for the one my heart loves;
  - type: text
    content: I looked for him but did not find him.
  '10':
  - type: text
    content: Its posts he made of silver,
  - type: text
    content: its base of gold.
  - type: text
    content: Its seat was upholstered with purple,
  - type: text
    content: its interior inlaid with love.
  - type: text
    content: 'Daughters of Jerusalem, '
  '11':
  - type: text
    content: come out,
  - type: text
    content: and look, you daughters of Zion.
  - type: text
    content: Look
  - type: note
    content: Or interior lovingly inlaid / by the daughters of Jerusalem. / 11 Come out, you daughters of Zion, / and look
  - type: text
    content: ' on King Solomon wearing a crown,'
  - type: text
    content: the crown with which his mother crowned him
  - type: text
    content: on the day of his wedding,
  - type: text
    content: the day his heart rejoiced.
  '2':
  - type: text
    content: I will get up now and go about the city,
  - type: text
    content: through its streets and squares;
  - type: text
    content: I will search for the one my heart loves.
  - type: text
    content: So I looked for him but did not find him.
  '3':
  - type: text
    content: The watchmen found me
  - type: text
    content: as they made their rounds in the city.
  - type: text
    content: “Have you seen the one my heart loves?”
  '4':
  - type: text
    content: Scarcely had I passed them
  - type: text
    content: when I found the one my heart loves.
  - type: text
    content: I held him and would not let him go
  - type: text
    content: till I had brought him to my mother’s house,
  - type: text
    content: to the room of the one who conceived me.
  '5':
  - type: text
    content: Daughters of Jerusalem, I charge you
  - type: text
    content: 'by the gazelles and by the does of the field:'
  - type: text
    content: Do not arouse or awaken love
  - type: text
    content: until it so desires.
  '6':
  - type: text
    content: Who is this coming up from the wilderness
  - type: text
    content: like a column of smoke,
  - type: text
    content: perfumed with myrrh and incense
  - type: text
    content: made from all the spices of the merchant?
  '7':
  - type: text
    content: Look! It is Solomon’s carriage,
  - type: text
    content: escorted by sixty warriors,
  - type: text
    content: the noblest of Israel,
  '8':
  - type: text
    content: all of them wearing the sword,
  - type: text
    content: all experienced in battle,
  - type: text
    content: each with his sword at his side,
  - type: text
    content: prepared for the terrors of the night.
  '9':
  - type: text
    content: King Solomon made for himself the carriage;
  - type: text
    content: he made it of wood from Lebanon.
