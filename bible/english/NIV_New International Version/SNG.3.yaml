document_id: SNG.3
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: All night long on my bed
- type: usfm
  marker: q2
  children:
  - type: text
    text: I looked for the one my heart loves;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I looked for him but did not find him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I will get up now and go about the city,
- type: usfm
  marker: q2
  children:
  - type: text
    text: through its streets and squares;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will search for the one my heart loves.
- type: usfm
  marker: q2
  children:
  - type: text
    text: So I looked for him but did not find him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The watchmen found me
- type: usfm
  marker: q2
  children:
  - type: text
    text: as they made their rounds in the city.
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Have you seen the one my heart loves?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Scarcely had I passed them
- type: usfm
  marker: q2
  children:
  - type: text
    text: when I found the one my heart loves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I held him and would not let him go
- type: usfm
  marker: q2
  children:
  - type: text
    text: till I had brought him to my mother’s house,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the room of the one who conceived me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Daughters of Jerusalem, I charge you
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'by the gazelles and by the does of the field:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Do not arouse or awaken love
- type: usfm
  marker: q2
  children:
  - type: text
    text: until it so desires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Who is this coming up from the wilderness
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a column of smoke,
- type: usfm
  marker: q1
  children:
  - type: text
    text: perfumed with myrrh and incense
- type: usfm
  marker: q2
  children:
  - type: text
    text: made from all the spices of the merchant?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Look! It is Solomon’s carriage,
- type: usfm
  marker: q2
  children:
  - type: text
    text: escorted by sixty warriors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the noblest of Israel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: all of them wearing the sword,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all experienced in battle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: each with his sword at his side,
- type: usfm
  marker: q2
  children:
  - type: text
    text: prepared for the terrors of the night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: King Solomon made for himself the carriage;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he made it of wood from Lebanon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Its posts he made of silver,
- type: usfm
  marker: q2
  children:
  - type: text
    text: its base of gold.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Its seat was upholstered with purple,
- type: usfm
  marker: q2
  children:
  - type: text
    text: its interior inlaid with love.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Daughters of Jerusalem, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: come out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and look, you daughters of Zion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Look
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3:10,11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'interior lovingly inlaid / by the daughters of Jerusalem. / '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '11 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Come out, you daughters of Zion, / and look
    marker-yv: yv-n
  - type: text
    text: ' on King Solomon wearing a crown,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the crown with which his mother crowned him
- type: usfm
  marker: q1
  children:
  - type: text
    text: on the day of his wedding,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the day his heart rejoiced.
