document_id: ROM.14,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Weak and the Strong
  - type: text
    content: 'Accept the one whose faith is weak, without quarreling over disputable matters. '
  '10':
  - type: text
    content: You, then, why do you judge your brother or sister
  - type: note
    content: The Greek word for brother or sister (adelphos) refers here to a believer, whether man or woman, as part of God’s family; also in verses 13, 15 and 21.
  - type: text
    content: '? Or why do you treat them with contempt? For we will all stand before God’s judgment seat. '
  '11':
  - type: text
    content: 'It is written:'
  - type: text
    content: “ ‘As surely as I live,’ says the Lord,
  - type: text
    content: ‘every knee will bow before me;
  - type: text
    content: every tongue will acknowledge God.’ ”
  - type: note
    content: Isaiah 45:23
  '12':
  - type: text
    content: So then, each of us will give an account of ourselves to God.
  '13':
  - type: text
    content: 'Therefore let us stop passing judgment on one another. Instead, make up your mind not to put any stumbling block or obstacle in the way of a brother or sister. '
  '14':
  - type: text
    content: 'I am convinced, being fully persuaded in the Lord Jesus, that nothing is unclean in itself. But if anyone regards something as unclean, then for that person it is unclean. '
  '15':
  - type: text
    content: 'If your brother or sister is distressed because of what you eat, you are no longer acting in love. Do not by your eating destroy someone for whom Christ died. '
  '16':
  - type: text
    content: 'Therefore do not let what you know is good be spoken of as evil. '
  '17':
  - type: text
    content: 'For the kingdom of God is not a matter of eating and drinking, but of righteousness, peace and joy in the Holy Spirit, '
  '18':
  - type: text
    content: because anyone who serves Christ in this way is pleasing to God and receives human approval.
  '19':
  - type: text
    content: 'Let us therefore make every effort to do what leads to peace and to mutual edification. '
  '2':
  - type: text
    content: 'One person’s faith allows them to eat anything, but another, whose faith is weak, eats only vegetables. '
  '20':
  - type: text
    content: 'Do not destroy the work of God for the sake of food. All food is clean, but it is wrong for a person to eat anything that causes someone else to stumble. '
  '21':
  - type: text
    content: It is better not to eat meat or drink wine or to do anything else that will cause your brother or sister to fall.
  '22':
  - type: text
    content: 'So whatever you believe about these things keep between yourself and God. Blessed is the one who does not condemn himself by what he approves. '
  '23':
  - type: text
    content: But whoever has doubts is condemned if they eat, because their eating is not from faith; and everything that does not come from faith is sin.
  - type: note
    content: Some manuscripts place 16:25-27 here; others after 15:33.
  '3':
  - type: text
    content: 'The one who eats everything must not treat with contempt the one who does not, and the one who does not eat everything must not judge the one who does, for God has accepted them. '
  '4':
  - type: text
    content: Who are you to judge someone else’s servant? To their own master, servants stand or fall. And they will stand, for the Lord is able to make them stand.
  '5':
  - type: text
    content: 'One person considers one day more sacred than another; another considers every day alike. Each of them should be fully convinced in their own mind. '
  '6':
  - type: text
    content: 'Whoever regards one day as special does so to the Lord. Whoever eats meat does so to the Lord, for they give thanks to God; and whoever abstains does so to the Lord and gives thanks to God. '
  '7':
  - type: text
    content: 'For none of us lives for ourselves alone, and none of us dies for ourselves alone. '
  '8':
  - type: text
    content: 'If we live, we live for the Lord; and if we die, we die for the Lord. So, whether we live or die, we belong to the Lord. '
  '9':
  - type: text
    content: For this very reason, Christ died and returned to life so that he might be the Lord of both the dead and the living.
