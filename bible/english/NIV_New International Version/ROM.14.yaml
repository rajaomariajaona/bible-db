document_id: ROM.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Weak and the Strong
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Accept the one whose faith is weak, without quarreling over disputable matters. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'One person’s faith allows them to eat anything, but another, whose faith is weak, eats only vegetables. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The one who eats everything must not treat with contempt the one who does not, and the one who does not eat everything must not judge the one who does, for God has accepted them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Who are you to judge someone else’s servant? To their own master, servants stand or fall. And they will stand, for the Lord is able to make them stand.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'One person considers one day more sacred than another; another considers every day alike. Each of them should be fully convinced in their own mind. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Whoever regards one day as special does so to the Lord. Whoever eats meat does so to the Lord, for they give thanks to God; and whoever abstains does so to the Lord and gives thanks to God. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For none of us lives for ourselves alone, and none of us dies for ourselves alone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'If we live, we live for the Lord; and if we die, we die for the Lord. So, whether we live or die, we belong to the Lord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For this very reason, Christ died and returned to life so that he might be the Lord of both the dead and the living.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: You, then, why do you judge your brother or sister
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek word for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'brother or sister '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: tl
        children:
        - type: text
          text: adelphos
      - type: text
        text: ) refers here to a believer, whether man or woman, as part of God’s family; also in verses 13, 15 and 21.
    marker-yv: yv-n
  - type: text
    text: '? Or why do you treat them with contempt? For we will all stand before God’s judgment seat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'It is written:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘As surely as I live,’ says the Lord,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘every knee will bow before me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: every tongue will acknowledge God.’ ”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah 45:23
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So then, each of us will give an account of ourselves to God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Therefore let us stop passing judgment on one another. Instead, make up your mind not to put any stumbling block or obstacle in the way of a brother or sister. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I am convinced, being fully persuaded in the Lord Jesus, that nothing is unclean in itself. But if anyone regards something as unclean, then for that person it is unclean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'If your brother or sister is distressed because of what you eat, you are no longer acting in love. Do not by your eating destroy someone for whom Christ died. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Therefore do not let what you know is good be spoken of as evil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For the kingdom of God is not a matter of eating and drinking, but of righteousness, peace and joy in the Holy Spirit, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: because anyone who serves Christ in this way is pleasing to God and receives human approval.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Let us therefore make every effort to do what leads to peace and to mutual edification. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Do not destroy the work of God for the sake of food. All food is clean, but it is wrong for a person to eat anything that causes someone else to stumble. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: It is better not to eat meat or drink wine or to do anything else that will cause your brother or sister to fall.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'So whatever you believe about these things keep between yourself and God. Blessed is the one who does not condemn himself by what he approves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: But whoever has doubts is condemned if they eat, because their eating is not from faith; and everything that does not come from faith is sin.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Some manuscripts place 16:25-27 here; others after 15:33.
    marker-yv: yv-n
