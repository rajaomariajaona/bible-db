document_id: MIC.6,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord’s Case Against Israel
  - type: text
    content: 'Listen to what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Stand up, plead my case before the mountains;
  - type: text
    content: let the hills hear what you have to say.
  '10':
  - type: text
    content: Am I still to forget your ill-gotten treasures, you wicked house,
  - type: text
    content: and the short ephah,
  - type: note
    content: An ephah was a dry measure.
  - type: text
    content: ' which is accursed?'
  '11':
  - type: text
    content: Shall I acquit someone with dishonest scales,
  - type: text
    content: with a bag of false weights?
  '12':
  - type: text
    content: Your rich people are violent;
  - type: text
    content: your inhabitants are liars
  - type: text
    content: and their tongues speak deceitfully.
  '13':
  - type: text
    content: Therefore, I have begun to destroy you,
  - type: text
    content: to ruin
  - type: note
    content: Or Therefore, I will make you ill and destroy you; / I will ruin
  - type: text
    content: ' you because of your sins.'
  '14':
  - type: text
    content: You will eat but not be satisfied;
  - type: text
    content: your stomach will still be empty.
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: You will store up but save nothing,
  - type: text
    content: because what you save
  - type: note
    content: Or You will press toward birth but not give birth, / and what you bring to birth
  - type: text
    content: ' I will give to the sword.'
  '15':
  - type: text
    content: You will plant but not harvest;
  - type: text
    content: you will press olives but not use the oil,
  - type: text
    content: you will crush grapes but not drink the wine.
  '16':
  - type: text
    content: You have observed the statutes of Omri
  - type: text
    content: and all the practices of Ahab’s house;
  - type: text
    content: you have followed their traditions.
  - type: text
    content: Therefore I will give you over to ruin
  - type: text
    content: and your people to derision;
  - type: text
    content: you will bear the scorn of the nations.
  - type: note
    content: Septuagint; Hebrew scorn due my people
  - type: text
    content: ”
  '2':
  - type: text
    content: '“Hear, you mountains, the '
  - type: text
    content: Lord
  - type: text
    content: ’s accusation;
  - type: text
    content: listen, you everlasting foundations of the earth.
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has a case against his people;'
  - type: text
    content: he is lodging a charge against Israel.
  '3':
  - type: text
    content: “My people, what have I done to you?
  - type: text
    content: How have I burdened you? Answer me.
  '4':
  - type: text
    content: I brought you up out of Egypt
  - type: text
    content: and redeemed you from the land of slavery.
  - type: text
    content: I sent Moses to lead you,
  - type: text
    content: also Aaron and Miriam.
  '5':
  - type: text
    content: My people, remember
  - type: text
    content: what Balak king of Moab plotted
  - type: text
    content: and what Balaam son of Beor answered.
  - type: text
    content: Remember your journey from Shittim to Gilgal,
  - type: text
    content: 'that you may know the righteous acts of the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '6':
  - type: text
    content: 'With what shall I come before the '
  - type: text
    content: Lord
  - type: text
    content: and bow down before the exalted God?
  - type: text
    content: Shall I come before him with burnt offerings,
  - type: text
    content: with calves a year old?
  '7':
  - type: text
    content: 'Will the '
  - type: text
    content: Lord
  - type: text
    content: ' be pleased with thousands of rams,'
  - type: text
    content: with ten thousand rivers of olive oil?
  - type: text
    content: Shall I offer my firstborn for my transgression,
  - type: text
    content: the fruit of my body for the sin of my soul?
  '8':
  - type: text
    content: He has shown you, O mortal, what is good.
  - type: text
    content: 'And what does the '
  - type: text
    content: Lord
  - type: text
    content: ' require of you?'
  - type: text
    content: To act justly and to love mercy
  - type: text
    content: and to walk humbly
  - type: note
    content: Or prudently
  - type: text
    content: ' with your God.'
  - type: heading
    content: Israel’s Guilt and Punishment
  '9':
  - type: text
    content: 'Listen! The '
  - type: text
    content: Lord
  - type: text
    content: ' is calling to the city—'
  - type: text
    content: and to fear your name is wisdom—
  - type: text
    content: “Heed the rod and the One who appointed it.
  - type: note
    content: The meaning of the Hebrew for this line is uncertain.
