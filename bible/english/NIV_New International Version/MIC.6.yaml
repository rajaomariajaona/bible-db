document_id: MIC.6
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Case Against Israel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Listen to what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Stand up, plead my case before the mountains;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let the hills hear what you have to say.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Hear, you mountains, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s accusation;
- type: usfm
  marker: q2
  children:
  - type: text
    text: listen, you everlasting foundations of the earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has a case against his people;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he is lodging a charge against Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “My people, what have I done to you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: How have I burdened you? Answer me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I brought you up out of Egypt
- type: usfm
  marker: q2
  children:
  - type: text
    text: and redeemed you from the land of slavery.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I sent Moses to lead you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: also Aaron and Miriam.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: My people, remember
- type: usfm
  marker: q2
  children:
  - type: text
    text: what Balak king of Moab plotted
- type: usfm
  marker: q2
  children:
  - type: text
    text: and what Balaam son of Beor answered.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Remember your journey from Shittim to Gilgal,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'that you may know the righteous acts of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'With what shall I come before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bow down before the exalted God?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shall I come before him with burnt offerings,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with calves a year old?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Will the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' be pleased with thousands of rams,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: with ten thousand rivers of olive oil?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Shall I offer my firstborn for my transgression,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the fruit of my body for the sin of my soul?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He has shown you, O mortal, what is good.
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'And what does the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' require of you?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: To act justly and to love mercy
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to walk humbly
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: prudently
    marker-yv: yv-n
  - type: text
    text: ' with your God.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel’s Guilt and Punishment
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Listen! The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is calling to the city—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to fear your name is wisdom—
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Heed the rod and the One who appointed it.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this line is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Am I still to forget your ill-gotten treasures, you wicked house,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the short ephah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: An ephah was a dry measure.
    marker-yv: yv-n
  - type: text
    text: ' which is accursed?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Shall I acquit someone with dishonest scales,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with a bag of false weights?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Your rich people are violent;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your inhabitants are liars
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their tongues speak deceitfully.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Therefore, I have begun to destroy you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to ruin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Therefore, I will make you ill and destroy you; / I will ruin
    marker-yv: yv-n
  - type: text
    text: ' you because of your sins.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: You will eat but not be satisfied;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your stomach will still be empty.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this word is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will store up but save nothing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because what you save
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: You will press toward birth but not give birth, / and what you bring to birth
    marker-yv: yv-n
  - type: text
    text: ' I will give to the sword.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: You will plant but not harvest;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will press olives but not use the oil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will crush grapes but not drink the wine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: You have observed the statutes of Omri
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all the practices of Ahab’s house;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have followed their traditions.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Therefore I will give you over to ruin
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your people to derision;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will bear the scorn of the nations.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: scorn due my people
    marker-yv: yv-n
  - type: text
    text: ”
