segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judgment Against Israel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Hear this, you priests!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Pay attention, you Israelites!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Listen, royal house!
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'This judgment is against you:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You have been a snare at Mizpah,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a net spread out on Tabor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The rebels are knee-deep in slaughter.
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will discipline all of them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I know all about Ephraim;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Israel is not hidden from me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ephraim, you have now turned to prostitution;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Israel is corrupt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Their deeds do not permit them
- type: usfm
  marker: q2
  children:
  - type: text
    text: to return to their God.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A spirit of prostitution is in their heart;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'they do not acknowledge the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Israel’s arrogance testifies against them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Israelites, even Ephraim, stumble in their sin;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Judah also stumbles with them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When they go with their flocks and herds
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'to seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: they will not find him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he has withdrawn himself from them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'They are unfaithful to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they give birth to illegitimate children.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When they celebrate their New Moon feasts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will devour
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Now their New Moon feasts / will devour them and
    marker-yv: yv-n
  - type: text
    text: ' their fields.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Sound the trumpet in Gibeah,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the horn in Ramah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raise the battle cry in Beth Aven
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Beth Aven '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'house of wickedness '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(a derogatory name for Bethel, which means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: house of God
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: lead on, Benjamin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ephraim will be laid waste
- type: usfm
  marker: q2
  children:
  - type: text
    text: on the day of reckoning.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Among the tribes of Israel
- type: usfm
  marker: q2
  children:
  - type: text
    text: I proclaim what is certain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Judah’s leaders are like those
- type: usfm
  marker: q2
  children:
  - type: text
    text: who move boundary stones.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will pour out my wrath on them
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a flood of water.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ephraim is oppressed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: trampled in judgment,
- type: usfm
  marker: q2
  children:
  - type: text
    text: intent on pursuing idols.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The meaning of the Hebrew for this word is uncertain.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I am like a moth to Ephraim,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like rot to the people of Judah.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “When Ephraim saw his sickness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Judah his sores,
- type: usfm
  marker: q1
  children:
  - type: text
    text: then Ephraim turned to Assyria,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and sent to the great king for help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But he is not able to cure you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not able to heal your sores.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: For I will be like a lion to Ephraim,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a great lion to Judah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will tear them to pieces and go away;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will carry them off, with no one to rescue them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Then I will return to my lair
- type: usfm
  marker: q2
  children:
  - type: text
    text: until they have borne their guilt
- type: usfm
  marker: q2
  children:
  - type: text
    text: and seek my face—
- type: usfm
  marker: q1
  children:
  - type: text
    text: in their misery
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will earnestly seek me.”
