type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment Against Israel
  - type: text
    content: “Hear this, you priests!
  - type: text
    content: Pay attention, you Israelites!
  - type: text
    content: Listen, royal house!
  - type: text
    content: 'This judgment is against you:'
  - type: text
    content: You have been a snare at Mizpah,
  - type: text
    content: a net spread out on Tabor.
  '10':
  - type: text
    content: Judah’s leaders are like those
  - type: text
    content: who move boundary stones.
  - type: text
    content: I will pour out my wrath on them
  - type: text
    content: like a flood of water.
  '11':
  - type: text
    content: Ephraim is oppressed,
  - type: text
    content: trampled in judgment,
  - type: text
    content: intent on pursuing idols.
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  '12':
  - type: text
    content: I am like a moth to Ephraim,
  - type: text
    content: like rot to the people of Judah.
  '13':
  - type: text
    content: “When Ephraim saw his sickness,
  - type: text
    content: and Judah his sores,
  - type: text
    content: then Ephraim turned to Assyria,
  - type: text
    content: and sent to the great king for help.
  - type: text
    content: But he is not able to cure you,
  - type: text
    content: not able to heal your sores.
  '14':
  - type: text
    content: For I will be like a lion to Ephraim,
  - type: text
    content: like a great lion to Judah.
  - type: text
    content: I will tear them to pieces and go away;
  - type: text
    content: I will carry them off, with no one to rescue them.
  '15':
  - type: text
    content: Then I will return to my lair
  - type: text
    content: until they have borne their guilt
  - type: text
    content: and seek my face—
  - type: text
    content: in their misery
  - type: text
    content: they will earnestly seek me.”
  '2':
  - type: text
    content: The rebels are knee-deep in slaughter.
  - type: text
    content: I will discipline all of them.
  '3':
  - type: text
    content: I know all about Ephraim;
  - type: text
    content: Israel is not hidden from me.
  - type: text
    content: Ephraim, you have now turned to prostitution;
  - type: text
    content: Israel is corrupt.
  '4':
  - type: text
    content: “Their deeds do not permit them
  - type: text
    content: to return to their God.
  - type: text
    content: A spirit of prostitution is in their heart;
  - type: text
    content: 'they do not acknowledge the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: Israel’s arrogance testifies against them;
  - type: text
    content: the Israelites, even Ephraim, stumble in their sin;
  - type: text
    content: Judah also stumbles with them.
  '6':
  - type: text
    content: When they go with their flocks and herds
  - type: text
    content: 'to seek the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: they will not find him;
  - type: text
    content: he has withdrawn himself from them.
  '7':
  - type: text
    content: 'They are unfaithful to the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: they give birth to illegitimate children.
  - type: text
    content: When they celebrate their New Moon feasts,
  - type: text
    content: he will devour
  - type: note
    content: Or Now their New Moon feasts / will devour them and
  - type: text
    content: ' their fields.'
  '8':
  - type: text
    content: “Sound the trumpet in Gibeah,
  - type: text
    content: the horn in Ramah.
  - type: text
    content: Raise the battle cry in Beth Aven
  - type: note
    content: Beth Aven means house of wickedness (a derogatory name for Bethel, which means house of God).
  - type: text
    content: ;
  - type: text
    content: lead on, Benjamin.
  '9':
  - type: text
    content: Ephraim will be laid waste
  - type: text
    content: on the day of reckoning.
  - type: text
    content: Among the tribes of Israel
  - type: text
    content: I proclaim what is certain.
