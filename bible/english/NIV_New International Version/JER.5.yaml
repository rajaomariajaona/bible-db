document_id: JER.5,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Not One Is Upright
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Go up and down the streets of Jerusalem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: look around and consider,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: search through her squares.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If you can find but one person
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who deals honestly and seeks the truth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will forgive this city.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Go through her vineyards and ravage them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but do not destroy them completely.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Strip off her branches,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for these people do not belong to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The people of Israel and the people of Judah
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have been utterly unfaithful to me,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They have lied about the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they said, “He will do nothing!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No harm will come to us;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we will never see sword or famine.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The prophets are but wind
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the word is not in them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so let what they say be done to them.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God Almighty says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because the people have spoken these words,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will make my words in your mouth a fire
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and these people the wood it consumes.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'People of Israel,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I am bringing a distant nation against you—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: an ancient and enduring nation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a people whose language you do not know,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whose speech you do not understand.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their quivers are like an open grave;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all of them are mighty warriors.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will devour your harvests and food,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: devour your sons and daughters;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will devour your flocks and herds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: devour your vines and fig trees.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the sword they will destroy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the fortified cities in which you trust.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Yet even in those days,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “I will not destroy you completely. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when the people ask, ‘Why has the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God done all this to us?’ you will tell them, ‘As you have forsaken me and served foreign gods in your own land, so now you will serve foreigners in a land not your own.’'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Although they say, ‘As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives,’'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: still they are swearing falsely.”
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Announce this to the descendants of Jacob
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and proclaim it in Judah:'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear this, you foolish and senseless people,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who have eyes but do not see,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'who have ears but do not hear:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Should you not fear me?” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Should you not tremble in my presence?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I made the sand a boundary for the sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an everlasting barrier it cannot cross.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The waves may roll, but they cannot prevail;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they may roar, but they cannot cross it.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But these people have stubborn and rebellious hearts;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they have turned aside and gone away.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They do not say to themselves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: '‘Let us fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who gives autumn and spring rains in season,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who assures us of the regular weeks of harvest.’
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your wrongdoings have kept these away;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your sins have deprived you of good.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Among my people are the wicked
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who lie in wait like men who snare birds
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and like those who set traps to catch people.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like cages full of birds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their houses are full of deceit;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they have become rich and powerful
  '28':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have grown fat and sleek.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their evil deeds have no limit;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they do not seek justice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They do not promote the case of the fatherless;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they do not defend the just cause of the poor.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Should I not punish them for this?”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Should I not avenge myself
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on such a nation as this?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', do not your eyes look for truth?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You struck them, but they felt no pain;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you crushed them, but they refused correction.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They made their faces harder than stone
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and refused to repent.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “A horrible and shocking thing
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'has happened in the land:'
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The prophets prophesy lies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the priests rule by their own authority,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and my people love it this way.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: But what will you do in the end?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I thought, “These are only the poor;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are foolish,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'for they do not know the way of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the requirements of their God.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So I will go to the leaders
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and speak to them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'surely they know the way of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the requirements of their God.”
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But with one accord they too had broken off the yoke
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and torn off the bonds.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore a lion from the forest will attack them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a wolf from the desert will ravage them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a leopard will lie in wait near their towns
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to tear to pieces any who venture out,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for their rebellion is great
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their backslidings many.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Why should I forgive you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your children have forsaken me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sworn by gods that are not gods.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I supplied all their needs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet they committed adultery
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and thronged to the houses of prostitutes.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are well-fed, lusty stallions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: each neighing for another man’s wife.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Should I not punish them for this?”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Should I not avenge myself
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on such a nation as this?
