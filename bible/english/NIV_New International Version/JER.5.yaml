document_id: JER.5
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Not One Is Upright
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Go up and down the streets of Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: look around and consider,
- type: usfm
  marker: q2
  children:
  - type: text
    text: search through her squares.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you can find but one person
- type: usfm
  marker: q2
  children:
  - type: text
    text: who deals honestly and seeks the truth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will forgive this city.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Although they say, ‘As surely as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' lives,’'
- type: usfm
  marker: q2
  children:
  - type: text
    text: still they are swearing falsely.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', do not your eyes look for truth?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: You struck them, but they felt no pain;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you crushed them, but they refused correction.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They made their faces harder than stone
- type: usfm
  marker: q2
  children:
  - type: text
    text: and refused to repent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I thought, “These are only the poor;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are foolish,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'for they do not know the way of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: the requirements of their God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: So I will go to the leaders
- type: usfm
  marker: q2
  children:
  - type: text
    text: and speak to them;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'surely they know the way of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: the requirements of their God.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: But with one accord they too had broken off the yoke
- type: usfm
  marker: q2
  children:
  - type: text
    text: and torn off the bonds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Therefore a lion from the forest will attack them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a wolf from the desert will ravage them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: a leopard will lie in wait near their towns
- type: usfm
  marker: q2
  children:
  - type: text
    text: to tear to pieces any who venture out,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for their rebellion is great
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their backslidings many.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Why should I forgive you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your children have forsaken me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and sworn by gods that are not gods.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I supplied all their needs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet they committed adultery
- type: usfm
  marker: q2
  children:
  - type: text
    text: and thronged to the houses of prostitutes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They are well-fed, lusty stallions,
- type: usfm
  marker: q2
  children:
  - type: text
    text: each neighing for another man’s wife.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Should I not punish them for this?”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Should I not avenge myself
- type: usfm
  marker: q2
  children:
  - type: text
    text: on such a nation as this?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “Go through her vineyards and ravage them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but do not destroy them completely.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Strip off her branches,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'for these people do not belong to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The people of Israel and the people of Judah
- type: usfm
  marker: q2
  children:
  - type: text
    text: have been utterly unfaithful to me,”
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'They have lied about the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they said, “He will do nothing!
- type: usfm
  marker: q1
  children:
  - type: text
    text: No harm will come to us;
- type: usfm
  marker: q2
  children:
  - type: text
    text: we will never see sword or famine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The prophets are but wind
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the word is not in them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: so let what they say be done to them.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Therefore this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' God Almighty says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Because the people have spoken these words,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will make my words in your mouth a fire
- type: usfm
  marker: q2
  children:
  - type: text
    text: and these people the wood it consumes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'People of Israel,” declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: “I am bringing a distant nation against you—
- type: usfm
  marker: q1
  children:
  - type: text
    text: an ancient and enduring nation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a people whose language you do not know,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose speech you do not understand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Their quivers are like an open grave;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all of them are mighty warriors.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: They will devour your harvests and food,
- type: usfm
  marker: q2
  children:
  - type: text
    text: devour your sons and daughters;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they will devour your flocks and herds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: devour your vines and fig trees.
- type: usfm
  marker: q1
  children:
  - type: text
    text: With the sword they will destroy
- type: usfm
  marker: q2
  children:
  - type: text
    text: the fortified cities in which you trust.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“Yet even in those days,” declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “I will not destroy you completely. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'And when the people ask, ‘Why has the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God done all this to us?’ you will tell them, ‘As you have forsaken me and served foreign gods in your own land, so now you will serve foreigners in a land not your own.’'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “Announce this to the descendants of Jacob
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and proclaim it in Judah:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Hear this, you foolish and senseless people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who have eyes but do not see,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'who have ears but do not hear:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Should you not fear me?” declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Should you not tremble in my presence?
- type: usfm
  marker: q1
  children:
  - type: text
    text: I made the sand a boundary for the sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: an everlasting barrier it cannot cross.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The waves may roll, but they cannot prevail;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they may roar, but they cannot cross it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: But these people have stubborn and rebellious hearts;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they have turned aside and gone away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: They do not say to themselves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: '‘Let us fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: who gives autumn and spring rains in season,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who assures us of the regular weeks of harvest.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Your wrongdoings have kept these away;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your sins have deprived you of good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “Among my people are the wicked
- type: usfm
  marker: q2
  children:
  - type: text
    text: who lie in wait like men who snare birds
- type: usfm
  marker: q2
  children:
  - type: text
    text: and like those who set traps to catch people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Like cages full of birds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their houses are full of deceit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they have become rich and powerful
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: and have grown fat and sleek.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their evil deeds have no limit;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they do not seek justice.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They do not promote the case of the fatherless;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they do not defend the just cause of the poor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Should I not punish them for this?”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Should I not avenge myself
- type: usfm
  marker: q2
  children:
  - type: text
    text: on such a nation as this?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: “A horrible and shocking thing
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'has happened in the land:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: The prophets prophesy lies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the priests rule by their own authority,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and my people love it this way.
- type: usfm
  marker: q2
  children:
  - type: text
    text: But what will you do in the end?
