type_code: eng
verses:
  '1':
  - type: heading
    content: Not One Is Upright
  - type: text
    content: “Go up and down the streets of Jerusalem,
  - type: text
    content: look around and consider,
  - type: text
    content: search through her squares.
  - type: text
    content: If you can find but one person
  - type: text
    content: who deals honestly and seeks the truth,
  - type: text
    content: I will forgive this city.
  '10':
  - type: text
    content: “Go through her vineyards and ravage them,
  - type: text
    content: but do not destroy them completely.
  - type: text
    content: Strip off her branches,
  - type: text
    content: 'for these people do not belong to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '11':
  - type: text
    content: The people of Israel and the people of Judah
  - type: text
    content: have been utterly unfaithful to me,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: 'They have lied about the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: they said, “He will do nothing!
  - type: text
    content: No harm will come to us;
  - type: text
    content: we will never see sword or famine.
  '13':
  - type: text
    content: The prophets are but wind
  - type: text
    content: and the word is not in them;
  - type: text
    content: so let what they say be done to them.”
  '14':
  - type: text
    content: 'Therefore this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' God Almighty says:'
  - type: text
    content: “Because the people have spoken these words,
  - type: text
    content: I will make my words in your mouth a fire
  - type: text
    content: and these people the wood it consumes.
  '15':
  - type: text
    content: 'People of Israel,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “I am bringing a distant nation against you—
  - type: text
    content: an ancient and enduring nation,
  - type: text
    content: a people whose language you do not know,
  - type: text
    content: whose speech you do not understand.
  '16':
  - type: text
    content: Their quivers are like an open grave;
  - type: text
    content: all of them are mighty warriors.
  '17':
  - type: text
    content: They will devour your harvests and food,
  - type: text
    content: devour your sons and daughters;
  - type: text
    content: they will devour your flocks and herds,
  - type: text
    content: devour your vines and fig trees.
  - type: text
    content: With the sword they will destroy
  - type: text
    content: the fortified cities in which you trust.
  '18':
  - type: text
    content: '“Yet even in those days,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “I will not destroy you completely. '
  '19':
  - type: text
    content: 'And when the people ask, ‘Why has the '
  - type: text
    content: Lord
  - type: text
    content: ' our God done all this to us?’ you will tell them, ‘As you have forsaken me and served foreign gods in your own land, so now you will serve foreigners in a land not your own.’'
  '2':
  - type: text
    content: 'Although they say, ‘As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives,’'
  - type: text
    content: still they are swearing falsely.”
  '20':
  - type: text
    content: “Announce this to the descendants of Jacob
  - type: text
    content: 'and proclaim it in Judah:'
  '21':
  - type: text
    content: Hear this, you foolish and senseless people,
  - type: text
    content: who have eyes but do not see,
  - type: text
    content: 'who have ears but do not hear:'
  '22':
  - type: text
    content: 'Should you not fear me?” declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Should you not tremble in my presence?
  - type: text
    content: I made the sand a boundary for the sea,
  - type: text
    content: an everlasting barrier it cannot cross.
  - type: text
    content: The waves may roll, but they cannot prevail;
  - type: text
    content: they may roar, but they cannot cross it.
  '23':
  - type: text
    content: But these people have stubborn and rebellious hearts;
  - type: text
    content: they have turned aside and gone away.
  '24':
  - type: text
    content: They do not say to themselves,
  - type: text
    content: '‘Let us fear the '
  - type: text
    content: Lord
  - type: text
    content: ' our God,'
  - type: text
    content: who gives autumn and spring rains in season,
  - type: text
    content: who assures us of the regular weeks of harvest.’
  '25':
  - type: text
    content: Your wrongdoings have kept these away;
  - type: text
    content: your sins have deprived you of good.
  '26':
  - type: text
    content: “Among my people are the wicked
  - type: text
    content: who lie in wait like men who snare birds
  - type: text
    content: and like those who set traps to catch people.
  '27':
  - type: text
    content: Like cages full of birds,
  - type: text
    content: their houses are full of deceit;
  - type: text
    content: they have become rich and powerful
  '28':
  - type: text
    content: and have grown fat and sleek.
  - type: text
    content: Their evil deeds have no limit;
  - type: text
    content: they do not seek justice.
  - type: text
    content: They do not promote the case of the fatherless;
  - type: text
    content: they do not defend the just cause of the poor.
  '29':
  - type: text
    content: Should I not punish them for this?”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Should I not avenge myself
  - type: text
    content: on such a nation as this?
  '3':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', do not your eyes look for truth?'
  - type: text
    content: You struck them, but they felt no pain;
  - type: text
    content: you crushed them, but they refused correction.
  - type: text
    content: They made their faces harder than stone
  - type: text
    content: and refused to repent.
  '30':
  - type: text
    content: “A horrible and shocking thing
  - type: text
    content: 'has happened in the land:'
  '31':
  - type: text
    content: The prophets prophesy lies,
  - type: text
    content: the priests rule by their own authority,
  - type: text
    content: and my people love it this way.
  - type: text
    content: But what will you do in the end?
  '4':
  - type: text
    content: I thought, “These are only the poor;
  - type: text
    content: they are foolish,
  - type: text
    content: 'for they do not know the way of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the requirements of their God.
  '5':
  - type: text
    content: So I will go to the leaders
  - type: text
    content: and speak to them;
  - type: text
    content: 'surely they know the way of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the requirements of their God.”
  - type: text
    content: But with one accord they too had broken off the yoke
  - type: text
    content: and torn off the bonds.
  '6':
  - type: text
    content: Therefore a lion from the forest will attack them,
  - type: text
    content: a wolf from the desert will ravage them,
  - type: text
    content: a leopard will lie in wait near their towns
  - type: text
    content: to tear to pieces any who venture out,
  - type: text
    content: for their rebellion is great
  - type: text
    content: and their backslidings many.
  '7':
  - type: text
    content: “Why should I forgive you?
  - type: text
    content: Your children have forsaken me
  - type: text
    content: and sworn by gods that are not gods.
  - type: text
    content: I supplied all their needs,
  - type: text
    content: yet they committed adultery
  - type: text
    content: and thronged to the houses of prostitutes.
  '8':
  - type: text
    content: They are well-fed, lusty stallions,
  - type: text
    content: each neighing for another man’s wife.
  '9':
  - type: text
    content: Should I not punish them for this?”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Should I not avenge myself
  - type: text
    content: on such a nation as this?
