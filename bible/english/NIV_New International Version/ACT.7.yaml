document_id: ACT.7,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Stephen’s Speech to the Sanhedrin
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Then the high priest asked Stephen, “Are these charges true?”
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: and rescued him from all his troubles. He gave Joseph wisdom and enabled him to gain the goodwill of Pharaoh king of Egypt. So Pharaoh made him ruler over Egypt and all his palace.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“Then a famine struck all Egypt and Canaan, bringing great suffering, and our ancestors could not find food. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'When Jacob heard that there was grain in Egypt, he sent our forefathers on their first visit. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'On their second visit, Joseph told his brothers who he was, and Pharaoh learned about Joseph’s family. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'After this, Joseph sent for his father Jacob and his whole family, seventy-five in all. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Then Jacob went down to Egypt, where he and our ancestors died. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Their bodies were brought back to Shechem and placed in the tomb that Abraham had bought from the sons of Hamor at Shechem for a certain sum of money.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '“As the time drew near for God to fulfill his promise to Abraham, the number of our people in Egypt had greatly increased. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Then ‘a new king, to whom Joseph meant nothing, came to power in Egypt.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exodus 1:8
      marker-yv: yv-n
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: He dealt treacherously with our people and oppressed our ancestors by forcing them to throw out their newborn babies so that they would die.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'To this he replied: “Brothers and fathers, listen to me! The God of glory appeared to our father Abraham while he was still in Mesopotamia, before he lived in Harran. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “At that time Moses was born, and he was no ordinary child.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: was fair in the sight of God
      marker-yv: yv-n
    - type: text
      text: ' For three months he was cared for by his family. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'When he was placed outside, Pharaoh’s daughter took him and brought him up as her own son. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Moses was educated in all the wisdom of the Egyptians and was powerful in speech and action.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '“When Moses was forty years old, he decided to visit his own people, the Israelites. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'He saw one of them being mistreated by an Egyptian, so he went to his defense and avenged him by killing the Egyptian. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Moses thought that his own people would realize that God was using him to rescue them, but they did not. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: The next day Moses came upon two Israelites who were fighting. He tried to reconcile them by saying, ‘Men, you are brothers; why do you want to hurt each other?’
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '“But the man who was mistreating the other pushed Moses aside and said, ‘Who made you ruler and judge over us? '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Are you thinking of killing me as you killed the Egyptian yesterday?’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exodus 2:14
      marker-yv: yv-n
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: When Moses heard this, he fled to Midian, where he settled as a foreigner and had two sons.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ‘Leave your country and your people,’ God said, ‘and go to the land I will show you.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen. 12:1
      marker-yv: yv-n
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '“After forty years had passed, an angel appeared to Moses in the flames of a burning bush in the desert near Mount Sinai. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'When he saw this, he was amazed at the sight. As he went over to get a closer look, he heard the Lord say: '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: ‘I am the God of your fathers, the God of Abraham, Isaac and Jacob.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exodus 3:6
      marker-yv: yv-n
    - type: text
      text: ' Moses trembled with fear and did not dare to look.'
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: '“Then the Lord said to him, ‘Take off your sandals, for the place where you are standing is holy ground. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: I have indeed seen the oppression of my people in Egypt. I have heard their groaning and have come down to set them free. Now come, I will send you back to Egypt.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exodus 3:5,7,8,10
      marker-yv: yv-n
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: '“This is the same Moses they had rejected with the words, ‘Who made you ruler and judge?’ He was sent to be their ruler and deliverer by God himself, through the angel who appeared to him in the bush. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: He led them out of Egypt and performed wonders and signs in Egypt, at the Red Sea and for forty years in the wilderness.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: “This is the Moses who told the Israelites, ‘God will raise up for you a prophet like me from your own people.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:37 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut. 18:15
      marker-yv: yv-n
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: He was in the assembly in the wilderness, with the angel who spoke to him on Mount Sinai, and with our ancestors; and he received living words to pass on to us.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: '“But our ancestors refused to obey him. Instead, they rejected him and in their hearts turned back to Egypt. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“So he left the land of the Chaldeans and settled in Harran. After the death of his father, God sent him to this land where you are now living. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: They told Aaron, ‘Make us gods who will go before us. As for this fellow Moses who led us out of Egypt—we don’t know what has happened to him!’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exodus 32:1
      marker-yv: yv-n
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'That was the time they made an idol in the form of a calf. They brought sacrifices to it and reveled in what their own hands had made. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'But God turned away from them and gave them over to the worship of the sun, moon and stars. This agrees with what is written in the book of the prophets:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘Did you bring me sacrifices and offerings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: forty years in the wilderness, people of Israel?
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: You have taken up the tabernacle of Molek
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the star of your god Rephan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the idols you made to worship.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore I will send you into exile’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:43 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Amos 5:25-27 (see Septuagint)
      marker-yv: yv-n
    - type: text
      text: ' beyond Babylon.'
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: '“Our ancestors had the tabernacle of the covenant law with them in the wilderness. It had been made as God directed Moses, according to the pattern he had seen. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'After receiving the tabernacle, our ancestors under Joshua brought it with them when they took the land from the nations God drove out before them. It remained in the land until the time of David, '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: who enjoyed God’s favor and asked that he might provide a dwelling place for the God of Jacob.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:46 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some early manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the house of Jacob
      marker-yv: yv-n
    - type: text
      text: ' '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: But it was Solomon who built a house for him.
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: '“However, the Most High does not live in houses made by human hands. As the prophet says:'
  '49':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: “ ‘Heaven is my throne,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the earth is my footstool.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: What kind of house will you build for me?
  - type: usfm
    marker: q4
    children:
    - type: text
      text: says the Lord.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Or where will my resting place be?
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'He gave him no inheritance here, not even enough ground to set his foot on. But God promised him that he and his descendants after him would possess the land, even though at that time Abraham had no child. '
  '50':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Has not my hand made all these things?’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:50 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 66:1,2
      marker-yv: yv-n
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: '“You stiff-necked people! Your hearts and ears are still uncircumcised. You are just like your ancestors: You always resist the Holy Spirit! '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Was there ever a prophet your ancestors did not persecute? They even killed those who predicted the coming of the Righteous One. And now you have betrayed and murdered him— '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: you who have received the law that was given through angels but have not obeyed it.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Stoning of Stephen
    marker-yv: yv-h
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'When the members of the Sanhedrin heard this, they were furious and gnashed their teeth at him. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'But Stephen, full of the Holy Spirit, looked up to heaven and saw the glory of God, and Jesus standing at the right hand of God. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: “Look,” he said, “I see heaven open and the Son of Man standing at the right hand of God.”
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'At this they covered their ears and, yelling at the top of their voices, they all rushed at him, '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: dragged him out of the city and began to stone him. Meanwhile, the witnesses laid their coats at the feet of a young man named Saul.
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: 'While they were stoning him, Stephen prayed, “Lord Jesus, receive my spirit.” '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'God spoke to him in this way: ‘For four hundred years your descendants will be strangers in a country not their own, and they will be enslaved and mistreated. '
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: Then he fell on his knees and cried out, “Lord, do not hold this sin against them.” When he had said this, he fell asleep.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: But I will punish the nation they serve as slaves,’ God said, ‘and afterward they will come out of that country and worship me in this place.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gen. 15:13,14
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Then he gave Abraham the covenant of circumcision. And Abraham became the father of Isaac and circumcised him eight days after his birth. Later Isaac became the father of Jacob, and Jacob became the father of the twelve patriarchs.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“Because the patriarchs were jealous of Joseph, they sold him as a slave into Egypt. But God was with him '
