document_id: JOB.34
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Elihu said:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Hear my words, you wise men;
- type: usfm
  marker: q2
  children:
  - type: text
    text: listen to me, you men of learning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For the ear tests words
- type: usfm
  marker: q2
  children:
  - type: text
    text: as the tongue tastes food.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Let us discern for ourselves what is right;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let us learn together what is good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Job says, ‘I am innocent,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but God denies me justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Although I am right,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am considered a liar;
- type: usfm
  marker: q1
  children:
  - type: text
    text: although I am guiltless,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his arrow inflicts an incurable wound.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Is there anyone like Job,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who drinks scorn like water?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: He keeps company with evildoers;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he associates with the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For he says, ‘There is no profit
- type: usfm
  marker: q2
  children:
  - type: text
    text: in trying to please God.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “So listen to me, you men of understanding.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Far be it from God to do evil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the Almighty to do wrong.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He repays everyone for what they have done;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he brings on them what their conduct deserves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: It is unthinkable that God would do wrong,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that the Almighty would pervert justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Who appointed him over the earth?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who put him in charge of the whole world?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: If it were his intention
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he withdrew his spirit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Spirit
    marker-yv: yv-n
  - type: text
    text: ' and breath,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: all humanity would perish together
- type: usfm
  marker: q2
  children:
  - type: text
    text: and mankind would return to the dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “If you have understanding, hear this;
- type: usfm
  marker: q2
  children:
  - type: text
    text: listen to what I say.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Can someone who hates justice govern?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will you condemn the just and mighty One?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Is he not the One who says to kings, ‘You are worthless,’
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to nobles, ‘You are wicked,’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: who shows no partiality to princes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and does not favor the rich over the poor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they are all the work of his hands?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: They die in an instant, in the middle of the night;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the people are shaken and they pass away;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the mighty are removed without human hand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “His eyes are on the ways of mortals;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he sees their every step.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: There is no deep shadow, no utter darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: where evildoers can hide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: God has no need to examine people further,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that they should come before him for judgment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Without inquiry he shatters the mighty
- type: usfm
  marker: q2
  children:
  - type: text
    text: and sets up others in their place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Because he takes note of their deeds,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he overthrows them in the night and they are crushed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: He punishes them for their wickedness
- type: usfm
  marker: q2
  children:
  - type: text
    text: where everyone can see them,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: because they turned from following him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and had no regard for any of his ways.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: They caused the cry of the poor to come before him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that he heard the cry of the needy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: But if he remains silent, who can condemn him?
- type: usfm
  marker: q2
  children:
  - type: text
    text: If he hides his face, who can see him?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet he is over individual and nation alike,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: to keep the godless from ruling,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from laying snares for the people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: “Suppose someone says to God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘I am guilty but will offend no more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Teach me what I cannot see;
- type: usfm
  marker: q2
  children:
  - type: text
    text: if I have done wrong, I will not do so again.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Should God then reward you on your terms,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when you refuse to repent?
- type: usfm
  marker: q1
  children:
  - type: text
    text: You must decide, not I;
- type: usfm
  marker: q2
  children:
  - type: text
    text: so tell me what you know.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: “Men of understanding declare,
- type: usfm
  marker: q2
  children:
  - type: text
    text: wise men who hear me say to me,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: ‘Job speaks without knowledge;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his words lack insight.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Oh, that Job might be tested to the utmost
- type: usfm
  marker: q2
  children:
  - type: text
    text: for answering like a wicked man!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: To his sin he adds rebellion;
- type: usfm
  marker: q2
  children:
  - type: text
    text: scornfully he claps his hands among us
- type: usfm
  marker: q2
  children:
  - type: text
    text: and multiplies his words against God.”
