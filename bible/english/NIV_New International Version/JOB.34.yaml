document_id: JOB.34,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then Elihu said:'
  '10':
  - type: text
    content: “So listen to me, you men of understanding.
  - type: text
    content: Far be it from God to do evil,
  - type: text
    content: from the Almighty to do wrong.
  '11':
  - type: text
    content: He repays everyone for what they have done;
  - type: text
    content: he brings on them what their conduct deserves.
  '12':
  - type: text
    content: It is unthinkable that God would do wrong,
  - type: text
    content: that the Almighty would pervert justice.
  '13':
  - type: text
    content: Who appointed him over the earth?
  - type: text
    content: Who put him in charge of the whole world?
  '14':
  - type: text
    content: If it were his intention
  - type: text
    content: and he withdrew his spirit
  - type: note
    content: Or Spirit
  - type: text
    content: ' and breath,'
  '15':
  - type: text
    content: all humanity would perish together
  - type: text
    content: and mankind would return to the dust.
  '16':
  - type: text
    content: “If you have understanding, hear this;
  - type: text
    content: listen to what I say.
  '17':
  - type: text
    content: Can someone who hates justice govern?
  - type: text
    content: Will you condemn the just and mighty One?
  '18':
  - type: text
    content: Is he not the One who says to kings, ‘You are worthless,’
  - type: text
    content: and to nobles, ‘You are wicked,’
  '19':
  - type: text
    content: who shows no partiality to princes
  - type: text
    content: and does not favor the rich over the poor,
  - type: text
    content: for they are all the work of his hands?
  '2':
  - type: text
    content: “Hear my words, you wise men;
  - type: text
    content: listen to me, you men of learning.
  '20':
  - type: text
    content: They die in an instant, in the middle of the night;
  - type: text
    content: the people are shaken and they pass away;
  - type: text
    content: the mighty are removed without human hand.
  '21':
  - type: text
    content: “His eyes are on the ways of mortals;
  - type: text
    content: he sees their every step.
  '22':
  - type: text
    content: There is no deep shadow, no utter darkness,
  - type: text
    content: where evildoers can hide.
  '23':
  - type: text
    content: God has no need to examine people further,
  - type: text
    content: that they should come before him for judgment.
  '24':
  - type: text
    content: Without inquiry he shatters the mighty
  - type: text
    content: and sets up others in their place.
  '25':
  - type: text
    content: Because he takes note of their deeds,
  - type: text
    content: he overthrows them in the night and they are crushed.
  '26':
  - type: text
    content: He punishes them for their wickedness
  - type: text
    content: where everyone can see them,
  '27':
  - type: text
    content: because they turned from following him
  - type: text
    content: and had no regard for any of his ways.
  '28':
  - type: text
    content: They caused the cry of the poor to come before him,
  - type: text
    content: so that he heard the cry of the needy.
  '29':
  - type: text
    content: But if he remains silent, who can condemn him?
  - type: text
    content: If he hides his face, who can see him?
  - type: text
    content: Yet he is over individual and nation alike,
  '3':
  - type: text
    content: For the ear tests words
  - type: text
    content: as the tongue tastes food.
  '30':
  - type: text
    content: to keep the godless from ruling,
  - type: text
    content: from laying snares for the people.
  '31':
  - type: text
    content: “Suppose someone says to God,
  - type: text
    content: ‘I am guilty but will offend no more.
  '32':
  - type: text
    content: Teach me what I cannot see;
  - type: text
    content: if I have done wrong, I will not do so again.’
  '33':
  - type: text
    content: Should God then reward you on your terms,
  - type: text
    content: when you refuse to repent?
  - type: text
    content: You must decide, not I;
  - type: text
    content: so tell me what you know.
  '34':
  - type: text
    content: “Men of understanding declare,
  - type: text
    content: wise men who hear me say to me,
  '35':
  - type: text
    content: ‘Job speaks without knowledge;
  - type: text
    content: his words lack insight.’
  '36':
  - type: text
    content: Oh, that Job might be tested to the utmost
  - type: text
    content: for answering like a wicked man!
  '37':
  - type: text
    content: To his sin he adds rebellion;
  - type: text
    content: scornfully he claps his hands among us
  - type: text
    content: and multiplies his words against God.”
  '4':
  - type: text
    content: Let us discern for ourselves what is right;
  - type: text
    content: let us learn together what is good.
  '5':
  - type: text
    content: “Job says, ‘I am innocent,
  - type: text
    content: but God denies me justice.
  '6':
  - type: text
    content: Although I am right,
  - type: text
    content: I am considered a liar;
  - type: text
    content: although I am guiltless,
  - type: text
    content: his arrow inflicts an incurable wound.’
  '7':
  - type: text
    content: Is there anyone like Job,
  - type: text
    content: who drinks scorn like water?
  '8':
  - type: text
    content: He keeps company with evildoers;
  - type: text
    content: he associates with the wicked.
  '9':
  - type: text
    content: For he says, ‘There is no profit
  - type: text
    content: in trying to please God.’
