document_id: JOB.34,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Elihu said:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “So listen to me, you men of understanding.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Far be it from God to do evil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the Almighty to do wrong.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He repays everyone for what they have done;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he brings on them what their conduct deserves.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is unthinkable that God would do wrong,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that the Almighty would pervert justice.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who appointed him over the earth?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who put him in charge of the whole world?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If it were his intention
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he withdrew his spirit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Spirit
      marker-yv: yv-n
    - type: text
      text: ' and breath,'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all humanity would perish together
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and mankind would return to the dust.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If you have understanding, hear this;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: listen to what I say.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Can someone who hates justice govern?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will you condemn the just and mighty One?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is he not the One who says to kings, ‘You are worthless,’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to nobles, ‘You are wicked,’
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who shows no partiality to princes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and does not favor the rich over the poor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they are all the work of his hands?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Hear my words, you wise men;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: listen to me, you men of learning.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They die in an instant, in the middle of the night;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the people are shaken and they pass away;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the mighty are removed without human hand.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “His eyes are on the ways of mortals;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he sees their every step.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There is no deep shadow, no utter darkness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: where evildoers can hide.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God has no need to examine people further,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that they should come before him for judgment.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Without inquiry he shatters the mighty
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sets up others in their place.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because he takes note of their deeds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he overthrows them in the night and they are crushed.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He punishes them for their wickedness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: where everyone can see them,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because they turned from following him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and had no regard for any of his ways.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They caused the cry of the poor to come before him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that he heard the cry of the needy.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But if he remains silent, who can condemn him?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: If he hides his face, who can see him?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet he is over individual and nation alike,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the ear tests words
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as the tongue tastes food.
  '30':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to keep the godless from ruling,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from laying snares for the people.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Suppose someone says to God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘I am guilty but will offend no more.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teach me what I cannot see;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if I have done wrong, I will not do so again.’
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Should God then reward you on your terms,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when you refuse to repent?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You must decide, not I;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so tell me what you know.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Men of understanding declare,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wise men who hear me say to me,
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Job speaks without knowledge;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his words lack insight.’
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, that Job might be tested to the utmost
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for answering like a wicked man!
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To his sin he adds rebellion;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: scornfully he claps his hands among us
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and multiplies his words against God.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let us discern for ourselves what is right;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let us learn together what is good.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Job says, ‘I am innocent,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but God denies me justice.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Although I am right,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am considered a liar;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: although I am guiltless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his arrow inflicts an incurable wound.’
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is there anyone like Job,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who drinks scorn like water?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He keeps company with evildoers;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he associates with the wicked.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he says, ‘There is no profit
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in trying to please God.’
