    children:
    - type: text
      text: Cain and Abel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Adam
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: The man
      marker-yv: yv-n
    - type: text
      text: ' made love to his wife Eve, and she became pregnant and gave birth to Cain.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Cain '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sounds like the Hebrew for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'brought forth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: acquired.
      marker-yv: yv-n
    - type: text
      text: ' She said, “With the help of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' I have brought forth'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: have acquired
      marker-yv: yv-n
    - type: text
      text: ' a man.” '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said, “What have you done? Listen! Your brother’s blood cries out to me from the ground. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Now you are under a curse and driven from the ground, which opened its mouth to receive your brother’s blood from your hand. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: When you work the ground, it will no longer yield its crops for you. You will be a restless wanderer on the earth.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Cain said to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “My punishment is more than I can bear. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Today you are driving me from the land, and I will be hidden from your presence; I will be a restless wanderer on the earth, and whoever finds me will kill me.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to him, “Not so'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint, Vulgate and Syriac; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Very well
      marker-yv: yv-n
    - type: text
      text: '; anyone who kills Cain will suffer vengeance seven times over.” Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' put a mark on Cain so that no one who found him would kill him. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'So Cain went out from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s presence and lived in the land of Nod,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Nod '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'wandering '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (see verses 12 and 14).
      marker-yv: yv-n
    - type: text
      text: ' east of Eden.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Cain made love to his wife, and she became pregnant and gave birth to Enoch. Cain was then building a city, and he named it after his son Enoch. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: To Enoch was born Irad, and Irad was the father of Mehujael, and Mehujael was the father of Methushael, and Methushael was the father of Lamech.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Lamech married two women, one named Adah and the other Zillah. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Later she gave birth to his brother Abel.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Abel kept flocks, and Cain worked the soil. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Adah gave birth to Jabal; he was the father of those who live in tents and raise livestock. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'His brother’s name was Jubal; he was the father of all who play stringed instruments and pipes. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Zillah also had a son, Tubal-Cain, who forged all kinds of tools out of
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: who instructed all who work in
      marker-yv: yv-n
    - type: text
      text: ' bronze and iron. Tubal-Cain’s sister was Naamah.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Lamech said to his wives,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Adah and Zillah, listen to me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wives of Lamech, hear my words.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have killed a man for wounding me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a young man for injuring me.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: If Cain is avenged seven times,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then Lamech seventy-seven times.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Adam made love to his wife again, and she gave birth to a son and named him Seth,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Seth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'probably means '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: granted
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' saying, “God has granted me another child in place of Abel, since Cain killed him.” '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Seth also had a son, and he named him Enosh.
  - type: usfm
    marker: p
    children:
    - type: text
      text: At that time people began to call on
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to proclaim
      marker-yv: yv-n
    - type: text
      text: ' the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'In the course of time Cain brought some of the fruits of the soil as an offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'And Abel also brought an offering—fat portions from some of the firstborn of his flock. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' looked with favor on Abel and his offering, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: but on Cain and his offering he did not look with favor. So Cain was very angry, and his face was downcast.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Cain, “Why are you angry? Why is your face downcast? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: If you do what is right, will you not be accepted? But if you do not do what is right, sin is crouching at your door; it desires to have you, but you must rule over it.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Now Cain said to his brother Abel, “Let’s go out to the field.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Samaritan Pentateuch, Septuagint, Vulgate and Syriac; Masoretic Text does not have '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: “Let’s go out to the field.”
      marker-yv: yv-n
    - type: text
      text: ' While they were in the field, Cain attacked his brother Abel and killed him.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Cain, “Where is your brother Abel?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I don’t know,” he replied. “Am I my brother’s keeper?”
