document_id: GEN.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Cain and Abel
  - type: text
    content: Adam
  - type: note
    content: Or The man
  - type: text
    content: ' made love to his wife Eve, and she became pregnant and gave birth to Cain.'
  - type: note
    content: Cain sounds like the Hebrew for brought forth or acquired.
  - type: text
    content: ' She said, “With the help of the '
  - type: text
    content: Lord
  - type: text
    content: ' I have brought forth'
  - type: note
    content: Or have acquired
  - type: text
    content: ' a man.” '
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said, “What have you done? Listen! Your brother’s blood cries out to me from the ground. '
  '11':
  - type: text
    content: 'Now you are under a curse and driven from the ground, which opened its mouth to receive your brother’s blood from your hand. '
  '12':
  - type: text
    content: When you work the ground, it will no longer yield its crops for you. You will be a restless wanderer on the earth.”
  '13':
  - type: text
    content: 'Cain said to the '
  - type: text
    content: Lord
  - type: text
    content: ', “My punishment is more than I can bear. '
  '14':
  - type: text
    content: Today you are driving me from the land, and I will be hidden from your presence; I will be a restless wanderer on the earth, and whoever finds me will kill me.”
  '15':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to him, “Not so'
  - type: note
    content: Septuagint, Vulgate and Syriac; Hebrew Very well
  - type: text
    content: '; anyone who kills Cain will suffer vengeance seven times over.” Then the '
  - type: text
    content: Lord
  - type: text
    content: ' put a mark on Cain so that no one who found him would kill him. '
  '16':
  - type: text
    content: 'So Cain went out from the '
  - type: text
    content: Lord
  - type: text
    content: ’s presence and lived in the land of Nod,
  - type: note
    content: Nod means wandering (see verses 12 and 14).
  - type: text
    content: ' east of Eden.'
  '17':
  - type: text
    content: 'Cain made love to his wife, and she became pregnant and gave birth to Enoch. Cain was then building a city, and he named it after his son Enoch. '
  '18':
  - type: text
    content: To Enoch was born Irad, and Irad was the father of Mehujael, and Mehujael was the father of Methushael, and Methushael was the father of Lamech.
  '19':
  - type: text
    content: 'Lamech married two women, one named Adah and the other Zillah. '
  '2':
  - type: text
    content: Later she gave birth to his brother Abel.
  - type: text
    content: 'Now Abel kept flocks, and Cain worked the soil. '
  '20':
  - type: text
    content: 'Adah gave birth to Jabal; he was the father of those who live in tents and raise livestock. '
  '21':
  - type: text
    content: 'His brother’s name was Jubal; he was the father of all who play stringed instruments and pipes. '
  '22':
  - type: text
    content: Zillah also had a son, Tubal-Cain, who forged all kinds of tools out of
  - type: note
    content: Or who instructed all who work in
  - type: text
    content: ' bronze and iron. Tubal-Cain’s sister was Naamah.'
  '23':
  - type: text
    content: Lamech said to his wives,
  - type: text
    content: “Adah and Zillah, listen to me;
  - type: text
    content: wives of Lamech, hear my words.
  - type: text
    content: I have killed a man for wounding me,
  - type: text
    content: a young man for injuring me.
  '24':
  - type: text
    content: If Cain is avenged seven times,
  - type: text
    content: then Lamech seventy-seven times.”
  '25':
  - type: text
    content: Adam made love to his wife again, and she gave birth to a son and named him Seth,
  - type: note
    content: Seth probably means granted.
  - type: text
    content: ' saying, “God has granted me another child in place of Abel, since Cain killed him.” '
  '26':
  - type: text
    content: Seth also had a son, and he named him Enosh.
  - type: text
    content: At that time people began to call on
  - type: note
    content: Or to proclaim
  - type: text
    content: ' the name of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: 'In the course of time Cain brought some of the fruits of the soil as an offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'And Abel also brought an offering—fat portions from some of the firstborn of his flock. The '
  - type: text
    content: Lord
  - type: text
    content: ' looked with favor on Abel and his offering, '
  '5':
  - type: text
    content: but on Cain and his offering he did not look with favor. So Cain was very angry, and his face was downcast.
  '6':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Cain, “Why are you angry? Why is your face downcast? '
  '7':
  - type: text
    content: If you do what is right, will you not be accepted? But if you do not do what is right, sin is crouching at your door; it desires to have you, but you must rule over it.”
  '8':
  - type: text
    content: Now Cain said to his brother Abel, “Let’s go out to the field.”
  - type: note
    content: Samaritan Pentateuch, Septuagint, Vulgate and Syriac; Masoretic Text does not have “Let’s go out to the field.”
  - type: text
    content: ' While they were in the field, Cain attacked his brother Abel and killed him.'
  '9':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Cain, “Where is your brother Abel?”'
  - type: text
    content: “I don’t know,” he replied. “Am I my brother’s keeper?”
