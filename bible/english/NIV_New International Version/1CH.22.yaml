document_id: 1CH.22,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David said, “The house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God is to be here, and also the altar of burnt offering for Israel.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Preparations for the Temple
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He is the one who will build a house for my Name. He will be my son, and I will be his father. And I will establish the throne of his kingdom over Israel forever.’
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Now, my son, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' be with you, and may you have success and build the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, as he said you would. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' give you discretion and understanding when he puts you in command over Israel, so that you may keep the law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then you will have success if you are careful to observe the decrees and laws that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave Moses for Israel. Be strong and courageous. Do not be afraid or discouraged.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I have taken great pains to provide for the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' a hundred thousand talents'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 3,750 tons or about 3,400 metric tons
      marker-yv: yv-n
    - type: text
      text: ' of gold, a million talents'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 37,500 tons or about 34,000 metric tons
      marker-yv: yv-n
    - type: text
      text: ' of silver, quantities of bronze and iron too great to be weighed, and wood and stone. And you may add to them. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You have many workers: stonecutters, masons and carpenters, as well as those skilled in every kind of work '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'in gold and silver, bronze and iron—craftsmen beyond number. Now begin the work, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' be with you.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then David ordered all the leaders of Israel to help his son Solomon. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to them, “Is not the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God with you? And has he not granted you rest on every side? For he has given the inhabitants of the land into my hands, and the land is subject to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and to his people. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now devote your heart and soul to seeking the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God. Begin to build the sanctuary of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God, so that you may bring the ark of the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and the sacred articles belonging to God into the temple that will be built for the Name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David gave orders to assemble the foreigners residing in Israel, and from among them he appointed stonecutters to prepare dressed stone for building the house of God. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He provided a large amount of iron to make nails for the doors of the gateways and for the fittings, and more bronze than could be weighed. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He also provided more cedar logs than could be counted, for the Sidonians and Tyrians had brought large numbers of them to David.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David said, “My son Solomon is young and inexperienced, and the house to be built for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' should be of great magnificence and fame and splendor in the sight of all the nations. Therefore I will make preparations for it.” So David made extensive preparations before his death.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he called for his son Solomon and charged him to build a house for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David said to Solomon: “My son, I had it in my heart to build a house for the Name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But this word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to me: ‘You have shed much blood and have fought many wars. You are not to build a house for my Name, because you have shed much blood on the earth in my sight. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But you will have a son who will be a man of peace and rest, and I will give him rest from all his enemies on every side. His name will be Solomon,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Solomon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sounds like and may be derived from the Hebrew for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: peace
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' and I will grant Israel peace and quiet during his reign. '
