document_id: 1CH.22,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then David said, “The house of the '
  - type: text
    content: Lord
  - type: text
    content: ' God is to be here, and also the altar of burnt offering for Israel.”'
  - type: heading
    content: Preparations for the Temple
  '10':
  - type: text
    content: He is the one who will build a house for my Name. He will be my son, and I will be his father. And I will establish the throne of his kingdom over Israel forever.’
  '11':
  - type: text
    content: '“Now, my son, the '
  - type: text
    content: Lord
  - type: text
    content: ' be with you, and may you have success and build the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, as he said you would. '
  '12':
  - type: text
    content: 'May the '
  - type: text
    content: Lord
  - type: text
    content: ' give you discretion and understanding when he puts you in command over Israel, so that you may keep the law of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '13':
  - type: text
    content: 'Then you will have success if you are careful to observe the decrees and laws that the '
  - type: text
    content: Lord
  - type: text
    content: ' gave Moses for Israel. Be strong and courageous. Do not be afraid or discouraged.'
  '14':
  - type: text
    content: '“I have taken great pains to provide for the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' a hundred thousand talents'
  - type: note
    content: That is, about 3,750 tons or about 3,400 metric tons
  - type: text
    content: ' of gold, a million talents'
  - type: note
    content: That is, about 37,500 tons or about 34,000 metric tons
  - type: text
    content: ' of silver, quantities of bronze and iron too great to be weighed, and wood and stone. And you may add to them. '
  '15':
  - type: text
    content: 'You have many workers: stonecutters, masons and carpenters, as well as those skilled in every kind of work '
  '16':
  - type: text
    content: 'in gold and silver, bronze and iron—craftsmen beyond number. Now begin the work, and the '
  - type: text
    content: Lord
  - type: text
    content: ' be with you.”'
  '17':
  - type: text
    content: 'Then David ordered all the leaders of Israel to help his son Solomon. '
  '18':
  - type: text
    content: 'He said to them, “Is not the '
  - type: text
    content: Lord
  - type: text
    content: ' your God with you? And has he not granted you rest on every side? For he has given the inhabitants of the land into my hands, and the land is subject to the '
  - type: text
    content: Lord
  - type: text
    content: ' and to his people. '
  '19':
  - type: text
    content: 'Now devote your heart and soul to seeking the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. Begin to build the sanctuary of the '
  - type: text
    content: Lord
  - type: text
    content: ' God, so that you may bring the ark of the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' and the sacred articles belonging to God into the temple that will be built for the Name of the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '2':
  - type: text
    content: 'So David gave orders to assemble the foreigners residing in Israel, and from among them he appointed stonecutters to prepare dressed stone for building the house of God. '
  '3':
  - type: text
    content: 'He provided a large amount of iron to make nails for the doors of the gateways and for the fittings, and more bronze than could be weighed. '
  '4':
  - type: text
    content: He also provided more cedar logs than could be counted, for the Sidonians and Tyrians had brought large numbers of them to David.
  '5':
  - type: text
    content: 'David said, “My son Solomon is young and inexperienced, and the house to be built for the '
  - type: text
    content: Lord
  - type: text
    content: ' should be of great magnificence and fame and splendor in the sight of all the nations. Therefore I will make preparations for it.” So David made extensive preparations before his death.'
  '6':
  - type: text
    content: 'Then he called for his son Solomon and charged him to build a house for the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '7':
  - type: text
    content: 'David said to Solomon: “My son, I had it in my heart to build a house for the Name of the '
  - type: text
    content: Lord
  - type: text
    content: ' my God. '
  '8':
  - type: text
    content: 'But this word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: ‘You have shed much blood and have fought many wars. You are not to build a house for my Name, because you have shed much blood on the earth in my sight. '
  '9':
  - type: text
    content: But you will have a son who will be a man of peace and rest, and I will give him rest from all his enemies on every side. His name will be Solomon,
  - type: note
    content: Solomon sounds like and may be derived from the Hebrew for peace.
  - type: text
    content: ' and I will grant Israel peace and quiet during his reign. '
