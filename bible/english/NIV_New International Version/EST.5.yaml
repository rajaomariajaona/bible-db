document_id: EST.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Esther’s Request to the King
  - type: text
    content: 'On the third day Esther put on her royal robes and stood in the inner court of the palace, in front of the king’s hall. The king was sitting on his royal throne in the hall, facing the entrance. '
  '10':
  - type: text
    content: Nevertheless, Haman restrained himself and went home.
  - type: text
    content: 'Calling together his friends and Zeresh, his wife, '
  '11':
  - type: text
    content: 'Haman boasted to them about his vast wealth, his many sons, and all the ways the king had honored him and how he had elevated him above the other nobles and officials. '
  '12':
  - type: text
    content: '“And that’s not all,” Haman added. “I’m the only person Queen Esther invited to accompany the king to the banquet she gave. And she has invited me along with the king tomorrow. '
  '13':
  - type: text
    content: But all this gives me no satisfaction as long as I see that Jew Mordecai sitting at the king’s gate.”
  '14':
  - type: text
    content: His wife Zeresh and all his friends said to him, “Have a pole set up, reaching to a height of fifty cubits,
  - type: note
    content: That is, about 75 feet or about 23 meters
  - type: text
    content: ' and ask the king in the morning to have Mordecai impaled on it. Then go with the king to the banquet and enjoy yourself.” This suggestion delighted Haman, and he had the pole set up.'
  '2':
  - type: text
    content: When he saw Queen Esther standing in the court, he was pleased with her and held out to her the gold scepter that was in his hand. So Esther approached and touched the tip of the scepter.
  '3':
  - type: text
    content: Then the king asked, “What is it, Queen Esther? What is your request? Even up to half the kingdom, it will be given you.”
  '4':
  - type: text
    content: “If it pleases the king,” replied Esther, “let the king, together with Haman, come today to a banquet I have prepared for him.”
  '5':
  - type: text
    content: “Bring Haman at once,” the king said, “so that we may do what Esther asks.”
  - type: text
    content: 'So the king and Haman went to the banquet Esther had prepared. '
  '6':
  - type: text
    content: As they were drinking wine, the king again asked Esther, “Now what is your petition? It will be given you. And what is your request? Even up to half the kingdom, it will be granted.”
  '7':
  - type: text
    content: 'Esther replied, “My petition and my request is this: '
  '8':
  - type: text
    content: If the king regards me with favor and if it pleases the king to grant my petition and fulfill my request, let the king and Haman come tomorrow to the banquet I will prepare for them. Then I will answer the king’s question.”
  - type: heading
    content: Haman’s Rage Against Mordecai
  '9':
  - type: text
    content: 'Haman went out that day happy and in high spirits. But when he saw Mordecai at the king’s gate and observed that he neither rose nor showed fear in his presence, he was filled with rage against Mordecai. '
