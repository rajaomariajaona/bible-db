document_id: PSA.102,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 102
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 102:1-28 is numbered 102:2-29.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'A prayer of an afflicted person who has grown weak and pours out a lament before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Hear my prayer, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let my cry for help come to you.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because of your great wrath,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for you have taken me up and thrown me aside.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My days are like the evening shadow;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I wither away like grass.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', sit enthroned forever;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your renown endures through all generations.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will arise and have compassion on Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for it is time to show favor to her;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the appointed time has come.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For her stones are dear to your servants;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her very dust moves them to pity.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The nations will fear the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the kings of the earth will revere your glory.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will rebuild Zion'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and appear in his glory.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will respond to the prayer of the destitute;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will not despise their plea.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let this be written for a future generation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'that a people not yet created may praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ':'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' looked down from his sanctuary on high,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from heaven he viewed the earth,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not hide your face from me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I am in distress.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Turn your ear to me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I call, answer me quickly.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to hear the groans of the prisoners
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and release those condemned to death.”
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be declared in Zion'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his praise in Jerusalem
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when the peoples and the kingdoms
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'assemble to worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the course of my life
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '102:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: By his power
      marker-yv: yv-n
    - type: text
      text: ' he broke my strength;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he cut short my days.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'So I said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Do not take me away, my God, in the midst of my days;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your years go on through all generations.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the beginning you laid the foundations of the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the heavens are the work of your hands.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will perish, but you remain;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will all wear out like a garment.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like clothing you will change them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will be discarded.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you remain the same,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your years will never end.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The children of your servants will live in your presence;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their descendants will be established before you.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For my days vanish like smoke;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my bones burn like glowing embers.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart is blighted and withered like grass;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I forget to eat my food.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In my distress I groan aloud
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and am reduced to skin and bones.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am like a desert owl,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like an owl among the ruins.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I lie awake; I have become
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a bird alone on a roof.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All day long my enemies taunt me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who rail against me use my name as a curse.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I eat ashes as my food
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and mingle my drink with tears
