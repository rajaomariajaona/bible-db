verses:
  '1':
  - type: heading
    content: Psalm 102In Hebrew texts 102:1-28 is numbered 102:2-29.
  - type: text
    content: 'A prayer of an afflicted person who has grown weak and pours out a lament before the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: 'Hear my prayer, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: let my cry for help come to you.
  '10':
  - type: text
    content: because of your great wrath,
  - type: text
    content: for you have taken me up and thrown me aside.
  '11':
  - type: text
    content: My days are like the evening shadow;
  - type: text
    content: I wither away like grass.
  '12':
  - type: text
    content: 'But you, '
  - type: text
    content: Lord
  - type: text
    content: ', sit enthroned forever;'
  - type: text
    content: your renown endures through all generations.
  '13':
  - type: text
    content: You will arise and have compassion on Zion,
  - type: text
    content: for it is time to show favor to her;
  - type: text
    content: the appointed time has come.
  '14':
  - type: text
    content: For her stones are dear to your servants;
  - type: text
    content: her very dust moves them to pity.
  '15':
  - type: text
    content: 'The nations will fear the name of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: all the kings of the earth will revere your glory.
  '16':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' will rebuild Zion'
  - type: text
    content: and appear in his glory.
  '17':
  - type: text
    content: He will respond to the prayer of the destitute;
  - type: text
    content: he will not despise their plea.
  '18':
  - type: text
    content: Let this be written for a future generation,
  - type: text
    content: 'that a people not yet created may praise the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  '19':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' looked down from his sanctuary on high,'
  - type: text
    content: from heaven he viewed the earth,
  '2':
  - type: text
    content: Do not hide your face from me
  - type: text
    content: when I am in distress.
  - type: text
    content: Turn your ear to me;
  - type: text
    content: when I call, answer me quickly.
  '20':
  - type: text
    content: to hear the groans of the prisoners
  - type: text
    content: and release those condemned to death.”
  '21':
  - type: text
    content: 'So the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' will be declared in Zion'
  - type: text
    content: and his praise in Jerusalem
  '22':
  - type: text
    content: when the peoples and the kingdoms
  - type: text
    content: 'assemble to worship the '
  - type: text
    content: Lord
  - type: text
    content: .
  '23':
  - type: text
    content: In the course of my life
  - type: note
    content: Or By his power
  - type: text
    content: ' he broke my strength;'
  - type: text
    content: he cut short my days.
  '24':
  - type: text
    content: 'So I said:'
  - type: text
    content: “Do not take me away, my God, in the midst of my days;
  - type: text
    content: your years go on through all generations.
  '25':
  - type: text
    content: In the beginning you laid the foundations of the earth,
  - type: text
    content: and the heavens are the work of your hands.
  '26':
  - type: text
    content: They will perish, but you remain;
  - type: text
    content: they will all wear out like a garment.
  - type: text
    content: Like clothing you will change them
  - type: text
    content: and they will be discarded.
  '27':
  - type: text
    content: But you remain the same,
  - type: text
    content: and your years will never end.
  '28':
  - type: text
    content: The children of your servants will live in your presence;
  - type: text
    content: their descendants will be established before you.”
  '3':
  - type: text
    content: For my days vanish like smoke;
  - type: text
    content: my bones burn like glowing embers.
  '4':
  - type: text
    content: My heart is blighted and withered like grass;
  - type: text
    content: I forget to eat my food.
  '5':
  - type: text
    content: In my distress I groan aloud
  - type: text
    content: and am reduced to skin and bones.
  '6':
  - type: text
    content: I am like a desert owl,
  - type: text
    content: like an owl among the ruins.
  '7':
  - type: text
    content: I lie awake; I have become
  - type: text
    content: like a bird alone on a roof.
  '8':
  - type: text
    content: All day long my enemies taunt me;
  - type: text
    content: those who rail against me use my name as a curse.
  '9':
  - type: text
    content: For I eat ashes as my food
  - type: text
    content: and mingle my drink with tears
