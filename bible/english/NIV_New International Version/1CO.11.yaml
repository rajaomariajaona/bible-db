document_id: 1CO.11,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Follow my example, as I follow the example of Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: On Covering the Head in Worship
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: It is for this reason that a woman ought to have authority over her own
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: have a sign of authority on her
      marker-yv: yv-n
    - type: text
      text: ' head, because of the angels. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nevertheless, in the Lord woman is not independent of man, nor is man independent of woman. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: For as woman came from man, so also man is born of woman. But everything comes from God.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Judge for yourselves: Is it proper for a woman to pray to God with her head uncovered? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Does not the very nature of things teach you that if a man has long hair, it is a disgrace to him, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'but that if a woman has long hair, it is her glory? For long hair is given to her as a covering. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: If anyone wants to be contentious about this, we have no other practice—nor do the churches of God.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Correcting an Abuse of the Lord’s Supper
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'In the following directives I have no praise for you, for your meetings do more harm than good. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'In the first place, I hear that when you come together as a church, there are divisions among you, and to some extent I believe it. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'No doubt there have to be differences among you to show which of you have God’s approval. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'I praise you for remembering me in everything and for holding to the traditions just as I passed them on to you. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'So then, when you come together, it is not the Lord’s Supper you eat, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'for when you are eating, some of you go ahead with your own private suppers. As a result, one person remains hungry and another gets drunk. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Don’t you have homes to eat and drink in? Or do you despise the church of God by humiliating those who have nothing? What shall I say to you? Shall I praise you? Certainly not in this matter!
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'For I received from the Lord what I also passed on to you: The Lord Jesus, on the night he was betrayed, took bread, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'and when he had given thanks, he broke it and said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “This is my body, which is for you; do this in remembrance of me.”
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'In the same way, after supper he took the cup, saying, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “This cup is the new covenant in my blood; do this, whenever you drink it, in remembrance of me.”
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: For whenever you eat this bread and drink this cup, you proclaim the Lord’s death until he comes.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'So then, whoever eats the bread or drinks the cup of the Lord in an unworthy manner will be guilty of sinning against the body and blood of the Lord. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Everyone ought to examine themselves before they eat of the bread and drink from the cup. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'For those who eat and drink without discerning the body of Christ eat and drink judgment on themselves. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: But I want you to realize that the head of every man is Christ, and the head of the woman is man,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of the wife is her husband
      marker-yv: yv-n
    - type: text
      text: ' and the head of Christ is God. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'That is why many among you are weak and sick, and a number of you have fallen asleep. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'But if we were more discerning with regard to ourselves, we would not come under such judgment. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Nevertheless, when we are judged in this way by the Lord, we are being disciplined so that we will not be finally condemned with the world.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'So then, my brothers and sisters, when you gather to eat, you should all eat together. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Anyone who is hungry should eat something at home, so that when you meet together it may not result in judgment.
  - type: usfm
    marker: p
    children:
    - type: text
      text: And when I come I will give further directions.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Every man who prays or prophesies with his head covered dishonors his head. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'But every woman who prays or prophesies with her head uncovered dishonors her head—it is the same as having her head shaved. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: For if a woman does not cover her head, she might as well have her hair cut off; but if it is a disgrace for a woman to have her hair cut off or her head shaved, then she should cover her head.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: A man ought not to cover his head,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:4-7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '4 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Every man who prays or prophesies with long hair dishonors his head. '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '5 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'But every woman who prays or prophesies with no covering of hair dishonors her head—she is just like one of the “shorn women.” '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '6 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'If a woman has no covering, let her be for now with short hair; but since it is a disgrace for a woman to have her hair shorn or shaved, she should grow it again. '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '7 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: A man ought not to have long hair
      marker-yv: yv-n
    - type: text
      text: ' since he is the image and glory of God; but woman is the glory of man. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'For man did not come from woman, but woman from man; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'neither was man created for woman, but woman for man. '
