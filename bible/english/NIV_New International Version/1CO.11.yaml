document_id: 1CO.11,111
type_code: eng
verses:
  '1':
  - type: text
    content: Follow my example, as I follow the example of Christ.
  - type: heading
    content: On Covering the Head in Worship
  '10':
  - type: text
    content: It is for this reason that a woman ought to have authority over her own
  - type: note
    content: Or have a sign of authority on her
  - type: text
    content: ' head, because of the angels. '
  '11':
  - type: text
    content: 'Nevertheless, in the Lord woman is not independent of man, nor is man independent of woman. '
  '12':
  - type: text
    content: For as woman came from man, so also man is born of woman. But everything comes from God.
  '13':
  - type: text
    content: 'Judge for yourselves: Is it proper for a woman to pray to God with her head uncovered? '
  '14':
  - type: text
    content: 'Does not the very nature of things teach you that if a man has long hair, it is a disgrace to him, '
  '15':
  - type: text
    content: 'but that if a woman has long hair, it is her glory? For long hair is given to her as a covering. '
  '16':
  - type: text
    content: If anyone wants to be contentious about this, we have no other practice—nor do the churches of God.
  - type: heading
    content: Correcting an Abuse of the Lord’s Supper
  '17':
  - type: text
    content: 'In the following directives I have no praise for you, for your meetings do more harm than good. '
  '18':
  - type: text
    content: 'In the first place, I hear that when you come together as a church, there are divisions among you, and to some extent I believe it. '
  '19':
  - type: text
    content: 'No doubt there have to be differences among you to show which of you have God’s approval. '
  '2':
  - type: text
    content: 'I praise you for remembering me in everything and for holding to the traditions just as I passed them on to you. '
  '20':
  - type: text
    content: 'So then, when you come together, it is not the Lord’s Supper you eat, '
  '21':
  - type: text
    content: 'for when you are eating, some of you go ahead with your own private suppers. As a result, one person remains hungry and another gets drunk. '
  '22':
  - type: text
    content: Don’t you have homes to eat and drink in? Or do you despise the church of God by humiliating those who have nothing? What shall I say to you? Shall I praise you? Certainly not in this matter!
  '23':
  - type: text
    content: 'For I received from the Lord what I also passed on to you: The Lord Jesus, on the night he was betrayed, took bread, '
  '24':
  - type: text
    content: 'and when he had given thanks, he broke it and said, '
  - type: text
    content: “This is my body, which is for you; do this in remembrance of me.”
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'In the same way, after supper he took the cup, saying, '
  - type: text
    content: “This cup is the new covenant in my blood; do this, whenever you drink it, in remembrance of me.”
  - type: text
    content: ' '
  '26':
  - type: text
    content: For whenever you eat this bread and drink this cup, you proclaim the Lord’s death until he comes.
  '27':
  - type: text
    content: 'So then, whoever eats the bread or drinks the cup of the Lord in an unworthy manner will be guilty of sinning against the body and blood of the Lord. '
  '28':
  - type: text
    content: 'Everyone ought to examine themselves before they eat of the bread and drink from the cup. '
  '29':
  - type: text
    content: 'For those who eat and drink without discerning the body of Christ eat and drink judgment on themselves. '
  '3':
  - type: text
    content: But I want you to realize that the head of every man is Christ, and the head of the woman is man,
  - type: note
    content: Or of the wife is her husband
  - type: text
    content: ' and the head of Christ is God. '
  '30':
  - type: text
    content: 'That is why many among you are weak and sick, and a number of you have fallen asleep. '
  '31':
  - type: text
    content: 'But if we were more discerning with regard to ourselves, we would not come under such judgment. '
  '32':
  - type: text
    content: Nevertheless, when we are judged in this way by the Lord, we are being disciplined so that we will not be finally condemned with the world.
  '33':
  - type: text
    content: 'So then, my brothers and sisters, when you gather to eat, you should all eat together. '
  '34':
  - type: text
    content: Anyone who is hungry should eat something at home, so that when you meet together it may not result in judgment.
  - type: text
    content: And when I come I will give further directions.
  '4':
  - type: text
    content: 'Every man who prays or prophesies with his head covered dishonors his head. '
  '5':
  - type: text
    content: 'But every woman who prays or prophesies with her head uncovered dishonors her head—it is the same as having her head shaved. '
  '6':
  - type: text
    content: For if a woman does not cover her head, she might as well have her hair cut off; but if it is a disgrace for a woman to have her hair cut off or her head shaved, then she should cover her head.
  '7':
  - type: text
    content: A man ought not to cover his head,
  - type: note
    content: Or 4 Every man who prays or prophesies with long hair dishonors his head. 5 But every woman who prays or prophesies with no covering of hair dishonors her head—she is just like one of the “shorn women.” 6 If a woman has no covering, let her be for now with short hair; but since it is a disgrace for a woman to have her hair shorn or shaved, she should grow it again. 7 A man ought not to have long hair
  - type: text
    content: ' since he is the image and glory of God; but woman is the glory of man. '
  '8':
  - type: text
    content: 'For man did not come from woman, but woman from man; '
  '9':
  - type: text
    content: 'neither was man created for woman, but woman for man. '
