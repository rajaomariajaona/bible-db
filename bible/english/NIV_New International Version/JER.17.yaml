document_id: JER.17
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “Judah’s sin is engraved with an iron tool,
- type: usfm
  marker: q2
  children:
  - type: text
    text: inscribed with a flint point,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on the tablets of their hearts
- type: usfm
  marker: q2
  children:
  - type: text
    text: and on the horns of their altars.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Even their children remember
- type: usfm
  marker: q2
  children:
  - type: text
    text: their altars and Asherah poles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, wooden symbols of the goddess Asherah
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: beside the spreading trees
- type: usfm
  marker: q2
  children:
  - type: text
    text: and on the high hills.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: My mountain in the land
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:2,3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'hills / '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '3 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and the mountains of the land. / Your
    marker-yv: yv-n
  - type: text
    text: ' wealth and all your treasures'
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will give away as plunder,
- type: usfm
  marker: q2
  children:
  - type: text
    text: together with your high places,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of sin throughout your country.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Through your own fault you will lose
- type: usfm
  marker: q2
  children:
  - type: text
    text: the inheritance I gave you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will enslave you to your enemies
- type: usfm
  marker: q2
  children:
  - type: text
    text: in a land you do not know,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for you have kindled my anger,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and it will burn forever.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Cursed is the one who trusts in man,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who draws strength from mere flesh
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and whose heart turns away from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: That person will be like a bush in the wastelands;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will not see prosperity when it comes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will dwell in the parched places of the desert,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in a salt land where no one lives.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '“But blessed is the one who trusts in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: whose confidence is in him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: They will be like a tree planted by the water
- type: usfm
  marker: q2
  children:
  - type: text
    text: that sends out its roots by the stream.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It does not fear when heat comes;
- type: usfm
  marker: q2
  children:
  - type: text
    text: its leaves are always green.
- type: usfm
  marker: q1
  children:
  - type: text
    text: It has no worries in a year of drought
- type: usfm
  marker: q2
  children:
  - type: text
    text: and never fails to bear fruit.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The heart is deceitful above all things
- type: usfm
  marker: q2
  children:
  - type: text
    text: and beyond cure.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who can understand it?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“I the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' search the heart'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and examine the mind,
- type: usfm
  marker: q1
  children:
  - type: text
    text: to reward each person according to their conduct,
- type: usfm
  marker: q2
  children:
  - type: text
    text: according to what their deeds deserve.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Like a partridge that hatches eggs it did not lay
- type: usfm
  marker: q2
  children:
  - type: text
    text: are those who gain riches by unjust means.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When their lives are half gone, their riches will desert them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and in the end they will prove to be fools.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: A glorious throne, exalted from the beginning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: is the place of our sanctuary.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you are the hope of Israel;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: all who forsake you will be put to shame.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those who turn away from you will be written in the dust
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'because they have forsaken the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: the spring of living water.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Heal me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and I will be healed;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: save me and I will be saved,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for you are the one I praise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: They keep saying to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: '“Where is the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Let it now be fulfilled!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I have not run away from being your shepherd;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you know I have not desired the day of despair.
- type: usfm
  marker: q2
  children:
  - type: text
    text: What passes my lips is open before you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Do not be a terror to me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you are my refuge in the day of disaster.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Let my persecutors be put to shame,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but keep me from shame;
- type: usfm
  marker: q1
  children:
  - type: text
    text: let them be terrified,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but keep me from terror.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bring on them the day of disaster;
- type: usfm
  marker: q2
  children:
  - type: text
    text: destroy them with double destruction.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Keeping the Sabbath Day Holy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to me: “Go and stand at the Gate of the People,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Army
    marker-yv: yv-n
  - type: text
    text: ' through which the kings of Judah go in and out; stand also at all the other gates of Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Say to them, ‘Hear the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you kings of Judah and all people of Judah and everyone living in Jerusalem who come through these gates. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: Be careful not to carry a load on the Sabbath day or bring it through the gates of Jerusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Do not bring a load out of your houses or do any work on the Sabbath, but keep the Sabbath day holy, as I commanded your ancestors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Yet they did not listen or pay attention; they were stiff-necked and would not listen or respond to discipline. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But if you are careful to obey me, declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and bring no load through the gates of this city on the Sabbath, but keep the Sabbath day holy by not doing any work on it, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'then kings who sit on David’s throne will come through the gates of this city with their officials. They and their officials will come riding in chariots and on horses, accompanied by the men of Judah and those living in Jerusalem, and this city will be inhabited forever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'People will come from the towns of Judah and the villages around Jerusalem, from the territory of Benjamin and the western foothills, from the hill country and the Negev, bringing burnt offerings and sacrifices, grain offerings and incense, and bringing thank offerings to the house of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: But if you do not obey me to keep the Sabbath day holy by not carrying any load as you come through the gates of Jerusalem on the Sabbath day, then I will kindle an unquenchable fire in the gates of Jerusalem that will consume her fortresses.’ ”
