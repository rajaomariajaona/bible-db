document_id: JER.17,111
type_code: eng
verses:
  '1':
  - type: text
    content: “Judah’s sin is engraved with an iron tool,
  - type: text
    content: inscribed with a flint point,
  - type: text
    content: on the tablets of their hearts
  - type: text
    content: and on the horns of their altars.
  '10':
  - type: text
    content: '“I the '
  - type: text
    content: Lord
  - type: text
    content: ' search the heart'
  - type: text
    content: and examine the mind,
  - type: text
    content: to reward each person according to their conduct,
  - type: text
    content: according to what their deeds deserve.”
  '11':
  - type: text
    content: Like a partridge that hatches eggs it did not lay
  - type: text
    content: are those who gain riches by unjust means.
  - type: text
    content: When their lives are half gone, their riches will desert them,
  - type: text
    content: and in the end they will prove to be fools.
  '12':
  - type: text
    content: A glorious throne, exalted from the beginning,
  - type: text
    content: is the place of our sanctuary.
  '13':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', you are the hope of Israel;'
  - type: text
    content: all who forsake you will be put to shame.
  - type: text
    content: Those who turn away from you will be written in the dust
  - type: text
    content: 'because they have forsaken the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the spring of living water.
  '14':
  - type: text
    content: 'Heal me, '
  - type: text
    content: Lord
  - type: text
    content: ', and I will be healed;'
  - type: text
    content: save me and I will be saved,
  - type: text
    content: for you are the one I praise.
  '15':
  - type: text
    content: They keep saying to me,
  - type: text
    content: '“Where is the word of the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: Let it now be fulfilled!”
  '16':
  - type: text
    content: I have not run away from being your shepherd;
  - type: text
    content: you know I have not desired the day of despair.
  - type: text
    content: What passes my lips is open before you.
  '17':
  - type: text
    content: Do not be a terror to me;
  - type: text
    content: you are my refuge in the day of disaster.
  '18':
  - type: text
    content: Let my persecutors be put to shame,
  - type: text
    content: but keep me from shame;
  - type: text
    content: let them be terrified,
  - type: text
    content: but keep me from terror.
  - type: text
    content: Bring on them the day of disaster;
  - type: text
    content: destroy them with double destruction.
  - type: heading
    content: Keeping the Sabbath Day Holy
  '19':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me: “Go and stand at the Gate of the People,'
  - type: note
    content: Or Army
  - type: text
    content: ' through which the kings of Judah go in and out; stand also at all the other gates of Jerusalem. '
  '2':
  - type: text
    content: Even their children remember
  - type: text
    content: their altars and Asherah poles
  - type: note
    content: That is, wooden symbols of the goddess Asherah
  - type: text
    content: beside the spreading trees
  - type: text
    content: and on the high hills.
  '20':
  - type: text
    content: 'Say to them, ‘Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', you kings of Judah and all people of Judah and everyone living in Jerusalem who come through these gates. '
  '21':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Be careful not to carry a load on the Sabbath day or bring it through the gates of Jerusalem. '
  '22':
  - type: text
    content: 'Do not bring a load out of your houses or do any work on the Sabbath, but keep the Sabbath day holy, as I commanded your ancestors. '
  '23':
  - type: text
    content: 'Yet they did not listen or pay attention; they were stiff-necked and would not listen or respond to discipline. '
  '24':
  - type: text
    content: 'But if you are careful to obey me, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', and bring no load through the gates of this city on the Sabbath, but keep the Sabbath day holy by not doing any work on it, '
  '25':
  - type: text
    content: 'then kings who sit on David’s throne will come through the gates of this city with their officials. They and their officials will come riding in chariots and on horses, accompanied by the men of Judah and those living in Jerusalem, and this city will be inhabited forever. '
  '26':
  - type: text
    content: 'People will come from the towns of Judah and the villages around Jerusalem, from the territory of Benjamin and the western foothills, from the hill country and the Negev, bringing burnt offerings and sacrifices, grain offerings and incense, and bringing thank offerings to the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '27':
  - type: text
    content: But if you do not obey me to keep the Sabbath day holy by not carrying any load as you come through the gates of Jerusalem on the Sabbath day, then I will kindle an unquenchable fire in the gates of Jerusalem that will consume her fortresses.’ ”
  '3':
  - type: text
    content: My mountain in the land
  - type: text
    content: and your
  - type: note
    content: Or hills / 3 and the mountains of the land. / Your
  - type: text
    content: ' wealth and all your treasures'
  - type: text
    content: I will give away as plunder,
  - type: text
    content: together with your high places,
  - type: text
    content: because of sin throughout your country.
  '4':
  - type: text
    content: Through your own fault you will lose
  - type: text
    content: the inheritance I gave you.
  - type: text
    content: I will enslave you to your enemies
  - type: text
    content: in a land you do not know,
  - type: text
    content: for you have kindled my anger,
  - type: text
    content: and it will burn forever.”
  '5':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Cursed is the one who trusts in man,
  - type: text
    content: who draws strength from mere flesh
  - type: text
    content: 'and whose heart turns away from the '
  - type: text
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: That person will be like a bush in the wastelands;
  - type: text
    content: they will not see prosperity when it comes.
  - type: text
    content: They will dwell in the parched places of the desert,
  - type: text
    content: in a salt land where no one lives.
  '7':
  - type: text
    content: '“But blessed is the one who trusts in the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: whose confidence is in him.
  '8':
  - type: text
    content: They will be like a tree planted by the water
  - type: text
    content: that sends out its roots by the stream.
  - type: text
    content: It does not fear when heat comes;
  - type: text
    content: its leaves are always green.
  - type: text
    content: It has no worries in a year of drought
  - type: text
    content: and never fails to bear fruit.”
  '9':
  - type: text
    content: The heart is deceitful above all things
  - type: text
    content: and beyond cure.
  - type: text
    content: Who can understand it?
