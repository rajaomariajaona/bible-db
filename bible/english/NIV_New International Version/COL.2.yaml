document_id: COL.2
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I want you to know how hard I am contending for you and for those at Laodicea, and for all who have not met me personally. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'My goal is that they may be encouraged in heart and united in love, so that they may have the full riches of complete understanding, in order that they may know the mystery of God, namely, Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'in whom are hidden all the treasures of wisdom and knowledge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'I tell you this so that no one may deceive you by fine-sounding arguments. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For though I am absent from you in body, I am present with you in spirit and delight to see how disciplined you are and how firm your faith in Christ is.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Spiritual Fullness in Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So then, just as you received Christ Jesus as Lord, continue to live your lives in him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: rooted and built up in him, strengthened in the faith as you were taught, and overflowing with thankfulness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: See to it that no one takes you captive through hollow and deceptive philosophy, which depends on human tradition and the elemental spiritual forces
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the basic principles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verse 20
    marker-yv: yv-n
  - type: text
    text: ' of this world rather than on Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For in Christ all the fullness of the Deity lives in bodily form, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and in Christ you have been brought to fullness. He is the head over every power and authority. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: In him you were also circumcised with a circumcision not performed by human hands. Your whole self ruled by the flesh
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'In contexts like this, the Greek word for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'flesh '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: tl
        children:
        - type: text
          text: sarx
      - type: text
        text: ) refers to the sinful state of human beings, often presented as a power in opposition to the Spirit; also in verse 13.
    marker-yv: yv-n
  - type: text
    text: ' was put off when you were circumcised by'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: put off in the circumcision of
    marker-yv: yv-n
  - type: text
    text: ' Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: having been buried with him in baptism, in which you were also raised with him through your faith in the working of God, who raised him from the dead.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: When you were dead in your sins and in the uncircumcision of your flesh, God made you
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: us
    marker-yv: yv-n
  - type: text
    text: ' alive with Christ. He forgave us all our sins, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'having canceled the charge of our legal indebtedness, which stood against us and condemned us; he has taken it away, nailing it to the cross. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: And having disarmed the powers and authorities, he made a public spectacle of them, triumphing over them by the cross.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: them in him
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Freedom From Human Rules
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Therefore do not let anyone judge you by what you eat or drink, or with regard to a religious festival, a New Moon celebration or a Sabbath day. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'These are a shadow of the things that were to come; the reality, however, is found in Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Do not let anyone who delights in false humility and the worship of angels disqualify you. Such a person also goes into great detail about what they have seen; they are puffed up with idle notions by their unspiritual mind. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: They have lost connection with the head, from whom the whole body, supported and held together by its ligaments and sinews, grows as God causes it to grow.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Since you died with Christ to the elemental spiritual forces of this world, why, as though you still belonged to the world, do you submit to its rules: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“Do not handle! Do not taste! Do not touch!”? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'These rules, which have to do with things that are all destined to perish with use, are based on merely human commands and teachings. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Such regulations indeed have an appearance of wisdom, with their self-imposed worship, their false humility and their harsh treatment of the body, but they lack any value in restraining sensual indulgence.
