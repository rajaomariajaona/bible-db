document_id: COL.2,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'I want you to know how hard I am contending for you and for those at Laodicea, and for all who have not met me personally. '
  '10':
  - type: text
    content: 'and in Christ you have been brought to fullness. He is the head over every power and authority. '
  '11':
  - type: text
    content: In him you were also circumcised with a circumcision not performed by human hands. Your whole self ruled by the flesh
  - type: note
    content: In contexts like this, the Greek word for flesh (sarx) refers to the sinful state of human beings, often presented as a power in opposition to the Spirit; also in verse 13.
  - type: text
    content: ' was put off when you were circumcised by'
  - type: note
    content: Or put off in the circumcision of
  - type: text
    content: ' Christ, '
  '12':
  - type: text
    content: having been buried with him in baptism, in which you were also raised with him through your faith in the working of God, who raised him from the dead.
  '13':
  - type: text
    content: When you were dead in your sins and in the uncircumcision of your flesh, God made you
  - type: note
    content: Some manuscripts us
  - type: text
    content: ' alive with Christ. He forgave us all our sins, '
  '14':
  - type: text
    content: 'having canceled the charge of our legal indebtedness, which stood against us and condemned us; he has taken it away, nailing it to the cross. '
  '15':
  - type: text
    content: And having disarmed the powers and authorities, he made a public spectacle of them, triumphing over them by the cross.
  - type: note
    content: Or them in him
  - type: heading
    content: Freedom From Human Rules
  '16':
  - type: text
    content: 'Therefore do not let anyone judge you by what you eat or drink, or with regard to a religious festival, a New Moon celebration or a Sabbath day. '
  '17':
  - type: text
    content: 'These are a shadow of the things that were to come; the reality, however, is found in Christ. '
  '18':
  - type: text
    content: 'Do not let anyone who delights in false humility and the worship of angels disqualify you. Such a person also goes into great detail about what they have seen; they are puffed up with idle notions by their unspiritual mind. '
  '19':
  - type: text
    content: They have lost connection with the head, from whom the whole body, supported and held together by its ligaments and sinews, grows as God causes it to grow.
  '2':
  - type: text
    content: 'My goal is that they may be encouraged in heart and united in love, so that they may have the full riches of complete understanding, in order that they may know the mystery of God, namely, Christ, '
  '20':
  - type: text
    content: 'Since you died with Christ to the elemental spiritual forces of this world, why, as though you still belonged to the world, do you submit to its rules: '
  '21':
  - type: text
    content: '“Do not handle! Do not taste! Do not touch!”? '
  '22':
  - type: text
    content: 'These rules, which have to do with things that are all destined to perish with use, are based on merely human commands and teachings. '
  '23':
  - type: text
    content: Such regulations indeed have an appearance of wisdom, with their self-imposed worship, their false humility and their harsh treatment of the body, but they lack any value in restraining sensual indulgence.
  '3':
  - type: text
    content: 'in whom are hidden all the treasures of wisdom and knowledge. '
  '4':
  - type: text
    content: 'I tell you this so that no one may deceive you by fine-sounding arguments. '
  '5':
  - type: text
    content: For though I am absent from you in body, I am present with you in spirit and delight to see how disciplined you are and how firm your faith in Christ is.
  - type: heading
    content: Spiritual Fullness in Christ
  '6':
  - type: text
    content: 'So then, just as you received Christ Jesus as Lord, continue to live your lives in him, '
  '7':
  - type: text
    content: rooted and built up in him, strengthened in the faith as you were taught, and overflowing with thankfulness.
  '8':
  - type: text
    content: See to it that no one takes you captive through hollow and deceptive philosophy, which depends on human tradition and the elemental spiritual forces
  - type: note
    content: Or the basic principles; also in verse 20
  - type: text
    content: ' of this world rather than on Christ.'
  '9':
  - type: text
    content: 'For in Christ all the fullness of the Deity lives in bodily form, '
