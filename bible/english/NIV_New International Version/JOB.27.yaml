document_id: JOB.27
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Job’s Final Word to His Friends
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'And Job continued his discourse:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “As surely as God lives, who has denied me justice,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Almighty, who has made my life bitter,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: as long as I have life within me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the breath of God in my nostrils,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: my lips will not say anything wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my tongue will not utter lies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I will never admit you are in the right;
- type: usfm
  marker: q2
  children:
  - type: text
    text: till I die, I will not deny my integrity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I will maintain my innocence and never let go of it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my conscience will not reproach me as long as I live.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “May my enemy be like the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my adversary like the unjust!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: For what hope have the godless when they are cut off,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when God takes away their life?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Does God listen to their cry
- type: usfm
  marker: q2
  children:
  - type: text
    text: when distress comes upon them?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Will they find delight in the Almighty?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will they call on God at all times?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “I will teach you about the power of God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the ways of the Almighty I will not conceal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: You have all seen this yourselves.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why then this meaningless talk?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Here is the fate God allots to the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the heritage a ruthless man receives from the Almighty:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: However many his children, their fate is the sword;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his offspring will never have enough to eat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The plague will bury those who survive him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their widows will not weep for them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Though he heaps up silver like dust
- type: usfm
  marker: q2
  children:
  - type: text
    text: and clothes like piles of clay,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: what he lays up the righteous will wear,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the innocent will divide his silver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The house he builds is like a moth’s cocoon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a hut made by a watchman.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He lies down wealthy, but will do so no more;
- type: usfm
  marker: q2
  children:
  - type: text
    text: when he opens his eyes, all is gone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Terrors overtake him like a flood;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a tempest snatches him away in the night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: The east wind carries him off, and he is gone;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it sweeps him out of his place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: It hurls itself against him without mercy
- type: usfm
  marker: q2
  children:
  - type: text
    text: as he flees headlong from its power.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: It claps its hands in derision
- type: usfm
  marker: q2
  children:
  - type: text
    text: and hisses him out of his place.”
