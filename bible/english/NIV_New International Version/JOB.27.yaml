document_id: JOB.27,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Job’s Final Word to His Friends
  - type: text
    content: 'And Job continued his discourse:'
  '10':
  - type: text
    content: Will they find delight in the Almighty?
  - type: text
    content: Will they call on God at all times?
  '11':
  - type: text
    content: “I will teach you about the power of God;
  - type: text
    content: the ways of the Almighty I will not conceal.
  '12':
  - type: text
    content: You have all seen this yourselves.
  - type: text
    content: Why then this meaningless talk?
  '13':
  - type: text
    content: “Here is the fate God allots to the wicked,
  - type: text
    content: 'the heritage a ruthless man receives from the Almighty:'
  '14':
  - type: text
    content: However many his children, their fate is the sword;
  - type: text
    content: his offspring will never have enough to eat.
  '15':
  - type: text
    content: The plague will bury those who survive him,
  - type: text
    content: and their widows will not weep for them.
  '16':
  - type: text
    content: Though he heaps up silver like dust
  - type: text
    content: and clothes like piles of clay,
  '17':
  - type: text
    content: what he lays up the righteous will wear,
  - type: text
    content: and the innocent will divide his silver.
  '18':
  - type: text
    content: The house he builds is like a moth’s cocoon,
  - type: text
    content: like a hut made by a watchman.
  '19':
  - type: text
    content: He lies down wealthy, but will do so no more;
  - type: text
    content: when he opens his eyes, all is gone.
  '2':
  - type: text
    content: “As surely as God lives, who has denied me justice,
  - type: text
    content: the Almighty, who has made my life bitter,
  '20':
  - type: text
    content: Terrors overtake him like a flood;
  - type: text
    content: a tempest snatches him away in the night.
  '21':
  - type: text
    content: The east wind carries him off, and he is gone;
  - type: text
    content: it sweeps him out of his place.
  '22':
  - type: text
    content: It hurls itself against him without mercy
  - type: text
    content: as he flees headlong from its power.
  '23':
  - type: text
    content: It claps its hands in derision
  - type: text
    content: and hisses him out of his place.”
  '3':
  - type: text
    content: as long as I have life within me,
  - type: text
    content: the breath of God in my nostrils,
  '4':
  - type: text
    content: my lips will not say anything wicked,
  - type: text
    content: and my tongue will not utter lies.
  '5':
  - type: text
    content: I will never admit you are in the right;
  - type: text
    content: till I die, I will not deny my integrity.
  '6':
  - type: text
    content: I will maintain my innocence and never let go of it;
  - type: text
    content: my conscience will not reproach me as long as I live.
  '7':
  - type: text
    content: “May my enemy be like the wicked,
  - type: text
    content: my adversary like the unjust!
  '8':
  - type: text
    content: For what hope have the godless when they are cut off,
  - type: text
    content: when God takes away their life?
  '9':
  - type: text
    content: Does God listen to their cry
  - type: text
    content: when distress comes upon them?
