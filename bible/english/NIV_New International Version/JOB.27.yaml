document_id: JOB.27,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job’s Final Word to His Friends
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Job continued his discourse:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Will they find delight in the Almighty?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will they call on God at all times?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will teach you about the power of God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the ways of the Almighty I will not conceal.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have all seen this yourselves.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why then this meaningless talk?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Here is the fate God allots to the wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the heritage a ruthless man receives from the Almighty:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: However many his children, their fate is the sword;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his offspring will never have enough to eat.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The plague will bury those who survive him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their widows will not weep for them.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though he heaps up silver like dust
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and clothes like piles of clay,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: what he lays up the righteous will wear,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the innocent will divide his silver.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The house he builds is like a moth’s cocoon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a hut made by a watchman.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He lies down wealthy, but will do so no more;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when he opens his eyes, all is gone.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “As surely as God lives, who has denied me justice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Almighty, who has made my life bitter,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Terrors overtake him like a flood;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a tempest snatches him away in the night.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The east wind carries him off, and he is gone;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it sweeps him out of his place.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It hurls itself against him without mercy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as he flees headlong from its power.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It claps its hands in derision
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and hisses him out of his place.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as long as I have life within me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the breath of God in my nostrils,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: my lips will not say anything wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my tongue will not utter lies.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will never admit you are in the right;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: till I die, I will not deny my integrity.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will maintain my innocence and never let go of it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my conscience will not reproach me as long as I live.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “May my enemy be like the wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my adversary like the unjust!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For what hope have the godless when they are cut off,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when God takes away their life?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Does God listen to their cry
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when distress comes upon them?
