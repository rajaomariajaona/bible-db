document_id: NUM.32,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Transjordan Tribes
  - type: text
    content: 'The Reubenites and Gadites, who had very large herds and flocks, saw that the lands of Jazer and Gilead were suitable for livestock. '
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: '’s anger was aroused that day and he swore this oath: '
  '11':
  - type: text
    content: '‘Because they have not followed me wholeheartedly, not one of those who were twenty years old or more when they came up out of Egypt will see the land I promised on oath to Abraham, Isaac and Jacob— '
  '12':
  - type: text
    content: 'not one except Caleb son of Jephunneh the Kenizzite and Joshua son of Nun, for they followed the '
  - type: text
    content: Lord
  - type: text
    content: ' wholeheartedly.’ '
  '13':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ’s anger burned against Israel and he made them wander in the wilderness forty years, until the whole generation of those who had done evil in his sight was gone.
  '14':
  - type: text
    content: '“And here you are, a brood of sinners, standing in the place of your fathers and making the '
  - type: text
    content: Lord
  - type: text
    content: ' even more angry with Israel. '
  '15':
  - type: text
    content: If you turn away from following him, he will again leave all this people in the wilderness, and you will be the cause of their destruction.”
  '16':
  - type: text
    content: 'Then they came up to him and said, “We would like to build pens here for our livestock and cities for our women and children. '
  '17':
  - type: text
    content: But we will arm ourselves for battle
  - type: note
    content: Septuagint; Hebrew will be quick to arm ourselves
  - type: text
    content: ' and go ahead of the Israelites until we have brought them to their place. Meanwhile our women and children will live in fortified cities, for protection from the inhabitants of the land. '
  '18':
  - type: text
    content: 'We will not return to our homes until each of the Israelites has received their inheritance. '
  '19':
  - type: text
    content: We will not receive any inheritance with them on the other side of the Jordan, because our inheritance has come to us on the east side of the Jordan.”
  '2':
  - type: text
    content: 'So they came to Moses and Eleazar the priest and to the leaders of the community, and said, '
  '20':
  - type: text
    content: 'Then Moses said to them, “If you will do this—if you will arm yourselves before the '
  - type: text
    content: Lord
  - type: text
    content: ' for battle '
  '21':
  - type: text
    content: 'and if all of you who are armed cross over the Jordan before the '
  - type: text
    content: Lord
  - type: text
    content: ' until he has driven his enemies out before him— '
  '22':
  - type: text
    content: 'then when the land is subdued before the '
  - type: text
    content: Lord
  - type: text
    content: ', you may return and be free from your obligation to the '
  - type: text
    content: Lord
  - type: text
    content: ' and to Israel. And this land will be your possession before the '
  - type: text
    content: Lord
  - type: text
    content: .
  '23':
  - type: text
    content: '“But if you fail to do this, you will be sinning against the '
  - type: text
    content: Lord
  - type: text
    content: '; and you may be sure that your sin will find you out. '
  '24':
  - type: text
    content: Build cities for your women and children, and pens for your flocks, but do what you have promised.”
  '25':
  - type: text
    content: 'The Gadites and Reubenites said to Moses, “We your servants will do as our lord commands. '
  '26':
  - type: text
    content: 'Our children and wives, our flocks and herds will remain here in the cities of Gilead. '
  '27':
  - type: text
    content: 'But your servants, every man who is armed for battle, will cross over to fight before the '
  - type: text
    content: Lord
  - type: text
    content: ', just as our lord says.”'
  '28':
  - type: text
    content: 'Then Moses gave orders about them to Eleazar the priest and Joshua son of Nun and to the family heads of the Israelite tribes. '
  '29':
  - type: text
    content: 'He said to them, “If the Gadites and Reubenites, every man armed for battle, cross over the Jordan with you before the '
  - type: text
    content: Lord
  - type: text
    content: ', then when the land is subdued before you, you must give them the land of Gilead as their possession. '
  '3':
  - type: text
    content: '“Ataroth, Dibon, Jazer, Nimrah, Heshbon, Elealeh, Sebam, Nebo and Beon— '
  '30':
  - type: text
    content: But if they do not cross over with you armed, they must accept their possession with you in Canaan.”
  '31':
  - type: text
    content: 'The Gadites and Reubenites answered, “Your servants will do what the '
  - type: text
    content: Lord
  - type: text
    content: ' has said. '
  '32':
  - type: text
    content: 'We will cross over before the '
  - type: text
    content: Lord
  - type: text
    content: ' into Canaan armed, but the property we inherit will be on this side of the Jordan.”'
  '33':
  - type: text
    content: Then Moses gave to the Gadites, the Reubenites and the half-tribe of Manasseh son of Joseph the kingdom of Sihon king of the Amorites and the kingdom of Og king of Bashan—the whole land with its cities and the territory around them.
  '34':
  - type: text
    content: 'The Gadites built up Dibon, Ataroth, Aroer, '
  '35':
  - type: text
    content: 'Atroth Shophan, Jazer, Jogbehah, '
  '36':
  - type: text
    content: 'Beth Nimrah and Beth Haran as fortified cities, and built pens for their flocks. '
  '37':
  - type: text
    content: 'And the Reubenites rebuilt Heshbon, Elealeh and Kiriathaim, '
  '38':
  - type: text
    content: as well as Nebo and Baal Meon (these names were changed) and Sibmah. They gave names to the cities they rebuilt.
  '39':
  - type: text
    content: 'The descendants of Makir son of Manasseh went to Gilead, captured it and drove out the Amorites who were there. '
  '4':
  - type: text
    content: 'the land the '
  - type: text
    content: Lord
  - type: text
    content: ' subdued before the people of Israel—are suitable for livestock, and your servants have livestock. '
  '40':
  - type: text
    content: 'So Moses gave Gilead to the Makirites, the descendants of Manasseh, and they settled there. '
  '41':
  - type: text
    content: Jair, a descendant of Manasseh, captured their settlements and called them Havvoth Jair.
  - type: note
    content: Or them the settlements of Jair
  - type: text
    content: ' '
  '42':
  - type: text
    content: And Nobah captured Kenath and its surrounding settlements and called it Nobah after himself.
  '5':
  - type: text
    content: If we have found favor in your eyes,” they said, “let this land be given to your servants as our possession. Do not make us cross the Jordan.”
  '6':
  - type: text
    content: 'Moses said to the Gadites and Reubenites, “Should your fellow Israelites go to war while you sit here? '
  '7':
  - type: text
    content: 'Why do you discourage the Israelites from crossing over into the land the '
  - type: text
    content: Lord
  - type: text
    content: ' has given them? '
  '8':
  - type: text
    content: 'This is what your fathers did when I sent them from Kadesh Barnea to look over the land. '
  '9':
  - type: text
    content: 'After they went up to the Valley of Eshkol and viewed the land, they discouraged the Israelites from entering the land the '
  - type: text
    content: Lord
  - type: text
    content: ' had given them. '
