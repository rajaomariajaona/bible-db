document_id: NUM.32,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Transjordan Tribes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Reubenites and Gadites, who had very large herds and flocks, saw that the lands of Jazer and Gilead were suitable for livestock. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s anger was aroused that day and he swore this oath: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘Because they have not followed me wholeheartedly, not one of those who were twenty years old or more when they came up out of Egypt will see the land I promised on oath to Abraham, Isaac and Jacob— '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'not one except Caleb son of Jephunneh the Kenizzite and Joshua son of Nun, for they followed the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' wholeheartedly.’ '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger burned against Israel and he made them wander in the wilderness forty years, until the whole generation of those who had done evil in his sight was gone.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“And here you are, a brood of sinners, standing in the place of your fathers and making the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' even more angry with Israel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If you turn away from following him, he will again leave all this people in the wilderness, and you will be the cause of their destruction.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then they came up to him and said, “We would like to build pens here for our livestock and cities for our women and children. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But we will arm ourselves for battle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will be quick to arm ourselves
      marker-yv: yv-n
    - type: text
      text: ' and go ahead of the Israelites until we have brought them to their place. Meanwhile our women and children will live in fortified cities, for protection from the inhabitants of the land. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We will not return to our homes until each of the Israelites has received their inheritance. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We will not receive any inheritance with them on the other side of the Jordan, because our inheritance has come to us on the east side of the Jordan.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they came to Moses and Eleazar the priest and to the leaders of the community, and said, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses said to them, “If you will do this—if you will arm yourselves before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' for battle '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and if all of you who are armed cross over the Jordan before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' until he has driven his enemies out before him— '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then when the land is subdued before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you may return and be free from your obligation to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and to Israel. And this land will be your possession before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But if you fail to do this, you will be sinning against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '; and you may be sure that your sin will find you out. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Build cities for your women and children, and pens for your flocks, but do what you have promised.”
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Gadites and Reubenites said to Moses, “We your servants will do as our lord commands. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Our children and wives, our flocks and herds will remain here in the cities of Gilead. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But your servants, every man who is armed for battle, will cross over to fight before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', just as our lord says.”'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses gave orders about them to Eleazar the priest and Joshua son of Nun and to the family heads of the Israelite tribes. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to them, “If the Gadites and Reubenites, every man armed for battle, cross over the Jordan with you before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', then when the land is subdued before you, you must give them the land of Gilead as their possession. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Ataroth, Dibon, Jazer, Nimrah, Heshbon, Elealeh, Sebam, Nebo and Beon— '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But if they do not cross over with you armed, they must accept their possession with you in Canaan.”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Gadites and Reubenites answered, “Your servants will do what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has said. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We will cross over before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' into Canaan armed, but the property we inherit will be on this side of the Jordan.”'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Moses gave to the Gadites, the Reubenites and the half-tribe of Manasseh son of Joseph the kingdom of Sihon king of the Amorites and the kingdom of Og king of Bashan—the whole land with its cities and the territory around them.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Gadites built up Dibon, Ataroth, Aroer, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Atroth Shophan, Jazer, Jogbehah, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beth Nimrah and Beth Haran as fortified cities, and built pens for their flocks. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the Reubenites rebuilt Heshbon, Elealeh and Kiriathaim, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: as well as Nebo and Baal Meon (these names were changed) and Sibmah. They gave names to the cities they rebuilt.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The descendants of Makir son of Manasseh went to Gilead, captured it and drove out the Amorites who were there. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' subdued before the people of Israel—are suitable for livestock, and your servants have livestock. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses gave Gilead to the Makirites, the descendants of Manasseh, and they settled there. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jair, a descendant of Manasseh, captured their settlements and called them Havvoth Jair.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32:41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: them the settlements of Jair
      marker-yv: yv-n
    - type: text
      text: ' '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Nobah captured Kenath and its surrounding settlements and called it Nobah after himself.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If we have found favor in your eyes,” they said, “let this land be given to your servants as our possession. Do not make us cross the Jordan.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses said to the Gadites and Reubenites, “Should your fellow Israelites go to war while you sit here? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Why do you discourage the Israelites from crossing over into the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given them? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what your fathers did when I sent them from Kadesh Barnea to look over the land. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After they went up to the Valley of Eshkol and viewed the land, they discouraged the Israelites from entering the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had given them. '
