document_id: 1CO.1,111
type_code: eng
verses:
  '1':
  - type: text
    content: Paul, called to be an apostle of Christ Jesus by the will of God, and our brother Sosthenes,
  '10':
  - type: text
    content: I appeal to you, brothers and sisters,
  - type: note
    content: The Greek word for brothers and sisters (adelphoi) refers here to believers, both men and women, as part of God’s family; also in verses 11 and 26; and in 2:1; 3:1; 4:6; 6:8; 7:24, 29; 10:1; 11:33; 12:1; 14:6, 20, 26, 39; 15:1, 6, 50, 58; 16:15, 20.
  - type: text
    content: ' in the name of our Lord Jesus Christ, that all of you agree with one another in what you say and that there be no divisions among you, but that you be perfectly united in mind and thought. '
  '11':
  - type: text
    content: 'My brothers and sisters, some from Chloe’s household have informed me that there are quarrels among you. '
  '12':
  - type: text
    content: 'What I mean is this: One of you says, “I follow Paul”; another, “I follow Apollos”; another, “I follow Cephas'
  - type: note
    content: That is, Peter
  - type: text
    content: ”; still another, “I follow Christ.”
  '13':
  - type: text
    content: 'Is Christ divided? Was Paul crucified for you? Were you baptized in the name of Paul? '
  '14':
  - type: text
    content: 'I thank God that I did not baptize any of you except Crispus and Gaius, '
  '15':
  - type: text
    content: 'so no one can say that you were baptized in my name. '
  '16':
  - type: text
    content: '(Yes, I also baptized the household of Stephanas; beyond that, I don’t remember if I baptized anyone else.) '
  '17':
  - type: text
    content: For Christ did not send me to baptize, but to preach the gospel—not with wisdom and eloquence, lest the cross of Christ be emptied of its power.
  - type: heading
    content: Christ Crucified Is God’s Power and Wisdom
  '18':
  - type: text
    content: 'For the message of the cross is foolishness to those who are perishing, but to us who are being saved it is the power of God. '
  '19':
  - type: text
    content: 'For it is written:'
  - type: text
    content: “I will destroy the wisdom of the wise;
  - type: text
    content: the intelligence of the intelligent I will frustrate.”
  - type: note
    content: Isaiah 29:14
  '2':
  - type: text
    content: 'To the church of God in Corinth, to those sanctified in Christ Jesus and called to be his holy people, together with all those everywhere who call on the name of our Lord Jesus Christ—their Lord and ours:'
  '20':
  - type: text
    content: 'Where is the wise person? Where is the teacher of the law? Where is the philosopher of this age? Has not God made foolish the wisdom of the world? '
  '21':
  - type: text
    content: 'For since in the wisdom of God the world through its wisdom did not know him, God was pleased through the foolishness of what was preached to save those who believe. '
  '22':
  - type: text
    content: 'Jews demand signs and Greeks look for wisdom, '
  '23':
  - type: text
    content: 'but we preach Christ crucified: a stumbling block to Jews and foolishness to Gentiles, '
  '24':
  - type: text
    content: 'but to those whom God has called, both Jews and Greeks, Christ the power of God and the wisdom of God. '
  '25':
  - type: text
    content: For the foolishness of God is wiser than human wisdom, and the weakness of God is stronger than human strength.
  '26':
  - type: text
    content: 'Brothers and sisters, think of what you were when you were called. Not many of you were wise by human standards; not many were influential; not many were of noble birth. '
  '27':
  - type: text
    content: 'But God chose the foolish things of the world to shame the wise; God chose the weak things of the world to shame the strong. '
  '28':
  - type: text
    content: 'God chose the lowly things of this world and the despised things—and the things that are not—to nullify the things that are, '
  '29':
  - type: text
    content: 'so that no one may boast before him. '
  '3':
  - type: text
    content: Grace and peace to you from God our Father and the Lord Jesus Christ.
  - type: heading
    content: Thanksgiving
  '30':
  - type: text
    content: 'It is because of him that you are in Christ Jesus, who has become for us wisdom from God—that is, our righteousness, holiness and redemption. '
  '31':
  - type: text
    content: 'Therefore, as it is written: “Let the one who boasts boast in the Lord.”'
  - type: note
    content: Jer. 9:24
  '4':
  - type: text
    content: 'I always thank my God for you because of his grace given you in Christ Jesus. '
  '5':
  - type: text
    content: 'For in him you have been enriched in every way—with all kinds of speech and with all knowledge— '
  '6':
  - type: text
    content: 'God thus confirming our testimony about Christ among you. '
  '7':
  - type: text
    content: 'Therefore you do not lack any spiritual gift as you eagerly wait for our Lord Jesus Christ to be revealed. '
  '8':
  - type: text
    content: 'He will also keep you firm to the end, so that you will be blameless on the day of our Lord Jesus Christ. '
  '9':
  - type: text
    content: God is faithful, who has called you into fellowship with his Son, Jesus Christ our Lord.
  - type: heading
    content: A Church Divided Over Leaders
