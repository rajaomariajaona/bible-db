document_id: 1CO.1,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Paul, called to be an apostle of Christ Jesus by the will of God, and our brother Sosthenes,
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I appeal to you, brothers and sisters,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek word for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'brothers and sisters '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: tl
          children:
          - type: text
            text: adelphoi
        - type: text
          text: ) refers here to believers, both men and women, as part of God’s family; also in verses 11 and 26; and in 2:1; 3:1; 4:6; 6:8; 7:24, 29; 10:1; 11:33; 12:1; 14:6, 20, 26, 39; 15:1, 6, 50, 58; 16:15, 20.
      marker-yv: yv-n
    - type: text
      text: ' in the name of our Lord Jesus Christ, that all of you agree with one another in what you say and that there be no divisions among you, but that you be perfectly united in mind and thought. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'My brothers and sisters, some from Chloe’s household have informed me that there are quarrels among you. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What I mean is this: One of you says, “I follow Paul”; another, “I follow Apollos”; another, “I follow Cephas'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Peter
      marker-yv: yv-n
    - type: text
      text: ”; still another, “I follow Christ.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Is Christ divided? Was Paul crucified for you? Were you baptized in the name of Paul? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I thank God that I did not baptize any of you except Crispus and Gaius, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so no one can say that you were baptized in my name. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '(Yes, I also baptized the household of Stephanas; beyond that, I don’t remember if I baptized anyone else.) '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For Christ did not send me to baptize, but to preach the gospel—not with wisdom and eloquence, lest the cross of Christ be emptied of its power.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Christ Crucified Is God’s Power and Wisdom
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For the message of the cross is foolishness to those who are perishing, but to us who are being saved it is the power of God. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For it is written:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will destroy the wisdom of the wise;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the intelligence of the intelligent I will frustrate.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 29:14
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To the church of God in Corinth, to those sanctified in Christ Jesus and called to be his holy people, together with all those everywhere who call on the name of our Lord Jesus Christ—their Lord and ours:'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Where is the wise person? Where is the teacher of the law? Where is the philosopher of this age? Has not God made foolish the wisdom of the world? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For since in the wisdom of God the world through its wisdom did not know him, God was pleased through the foolishness of what was preached to save those who believe. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jews demand signs and Greeks look for wisdom, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but we preach Christ crucified: a stumbling block to Jews and foolishness to Gentiles, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but to those whom God has called, both Jews and Greeks, Christ the power of God and the wisdom of God. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For the foolishness of God is wiser than human wisdom, and the weakness of God is stronger than human strength.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Brothers and sisters, think of what you were when you were called. Not many of you were wise by human standards; not many were influential; not many were of noble birth. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But God chose the foolish things of the world to shame the wise; God chose the weak things of the world to shame the strong. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God chose the lowly things of this world and the despised things—and the things that are not—to nullify the things that are, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so that no one may boast before him. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Grace and peace to you from God our Father and the Lord Jesus Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Thanksgiving
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It is because of him that you are in Christ Jesus, who has become for us wisdom from God—that is, our righteousness, holiness and redemption. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, as it is written: “Let the one who boasts boast in the Lord.”'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jer. 9:24
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I always thank my God for you because of his grace given you in Christ Jesus. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For in him you have been enriched in every way—with all kinds of speech and with all knowledge— '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God thus confirming our testimony about Christ among you. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore you do not lack any spiritual gift as you eagerly wait for our Lord Jesus Christ to be revealed. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He will also keep you firm to the end, so that you will be blameless on the day of our Lord Jesus Christ. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: God is faithful, who has called you into fellowship with his Son, Jesus Christ our Lord.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Church Divided Over Leaders
    marker-yv: yv-h
