document_id: MRK.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Parable of the Sower
  - type: text
    content: 'Again Jesus began to teach by the lake. The crowd that gathered around him was so large that he got into a boat and sat in it out on the lake, while all the people were along the shore at the water’s edge. '
  '10':
  - type: text
    content: 'When he was alone, the Twelve and the others around him asked him about the parables. '
  '11':
  - type: text
    content: 'He told them, '
  - type: text
    content: “The secret of the kingdom of God has been given to you. But to those on the outside everything is said in parables
  - type: text
    content: ' '
  '12':
  - type: text
    content: so that,
  - type: text
    content: “ ‘they may be ever seeing but never perceiving,
  - type: text
    content: and ever hearing but never understanding;
  - type: text
    content: otherwise they might turn and be forgiven!’
  - type: text
    content: ' '
  - type: note
    content: Isaiah 6:9,10
  - type: text
    content: ”
  '13':
  - type: text
    content: 'Then Jesus said to them, '
  - type: text
    content: “Don’t you understand this parable? How then will you understand any parable?
  - type: text
    content: ' '
  '14':
  - type: text
    content: The farmer sows the word.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Some people are like seed along the path, where the word is sown. As soon as they hear it, Satan comes and takes away the word that was sown in them.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Others, like seed sown on rocky places, hear the word and at once receive it with joy.
  - type: text
    content: ' '
  '17':
  - type: text
    content: But since they have no root, they last only a short time. When trouble or persecution comes because of the word, they quickly fall away.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Still others, like seed sown among thorns, hear the word;
  - type: text
    content: ' '
  '19':
  - type: text
    content: but the worries of this life, the deceitfulness of wealth and the desires for other things come in and choke the word, making it unfruitful.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'He taught them many things by parables, and in his teaching said: '
  '20':
  - type: text
    content: Others, like seed sown on good soil, hear the word, accept it, and produce a crop—some thirty, some sixty, some a hundred times what was sown.”
  - type: heading
    content: A Lamp on a Stand
  '21':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “Do you bring in a lamp to put it under a bowl or a bed? Instead, don’t you put it on its stand?
  - type: text
    content: ' '
  '22':
  - type: text
    content: For whatever is hidden is meant to be disclosed, and whatever is concealed is meant to be brought out into the open.
  - type: text
    content: ' '
  '23':
  - type: text
    content: If anyone has ears to hear, let them hear.”
  '24':
  - type: text
    content: ' '
  - type: text
    content: “Consider carefully what you hear,”
  - type: text
    content: ' he continued. '
  - type: text
    content: “With the measure you use, it will be measured to you—and even more.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Whoever has will be given more; whoever does not have, even what they have will be taken from them.”
  - type: heading
    content: The Parable of the Growing Seed
  '26':
  - type: text
    content: 'He also said, '
  - type: text
    content: “This is what the kingdom of God is like. A man scatters seed on the ground.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Night and day, whether he sleeps or gets up, the seed sprouts and grows, though he does not know how.
  - type: text
    content: ' '
  '28':
  - type: text
    content: All by itself the soil produces grain—first the stalk, then the head, then the full kernel in the head.
  - type: text
    content: ' '
  '29':
  - type: text
    content: As soon as the grain is ripe, he puts the sickle to it, because the harvest has come.”
  - type: heading
    content: The Parable of the Mustard Seed
  '3':
  - type: text
    content: “Listen! A farmer went out to sow his seed.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Again he said, '
  - type: text
    content: “What shall we say the kingdom of God is like, or what parable shall we use to describe it?
  - type: text
    content: ' '
  '31':
  - type: text
    content: It is like a mustard seed, which is the smallest of all seeds on earth.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Yet when planted, it grows and becomes the largest of all garden plants, with such big branches that the birds can perch in its shade.”
  '33':
  - type: text
    content: 'With many similar parables Jesus spoke the word to them, as much as they could understand. '
  '34':
  - type: text
    content: He did not say anything to them without using a parable. But when he was alone with his own disciples, he explained everything.
  - type: heading
    content: Jesus Calms the Storm
  '35':
  - type: text
    content: 'That day when evening came, he said to his disciples, '
  - type: text
    content: “Let us go over to the other side.”
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'Leaving the crowd behind, they took him along, just as he was, in the boat. There were also other boats with him. '
  '37':
  - type: text
    content: 'A furious squall came up, and the waves broke over the boat, so that it was nearly swamped. '
  '38':
  - type: text
    content: Jesus was in the stern, sleeping on a cushion. The disciples woke him and said to him, “Teacher, don’t you care if we drown?”
  '39':
  - type: text
    content: 'He got up, rebuked the wind and said to the waves, '
  - type: text
    content: “Quiet! Be still!”
  - type: text
    content: ' Then the wind died down and it was completely calm.'
  '4':
  - type: text
    content: As he was scattering the seed, some fell along the path, and the birds came and ate it up.
  - type: text
    content: ' '
  '40':
  - type: text
    content: 'He said to his disciples, '
  - type: text
    content: “Why are you so afraid? Do you still have no faith?”
  '41':
  - type: text
    content: They were terrified and asked each other, “Who is this? Even the wind and the waves obey him!”
  '5':
  - type: text
    content: Some fell on rocky places, where it did not have much soil. It sprang up quickly, because the soil was shallow.
  - type: text
    content: ' '
  '6':
  - type: text
    content: But when the sun came up, the plants were scorched, and they withered because they had no root.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Other seed fell among thorns, which grew up and choked the plants, so that they did not bear grain.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Still other seed fell on good soil. It came up, grew and produced a crop, some multiplying thirty, some sixty, some a hundred times.”
  '9':
  - type: text
    content: 'Then Jesus said, '
  - type: text
    content: “Whoever has ears to hear, let them hear.”
