document_id: JER.19,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: “Go and buy a clay jar from a potter. Take along some of the elders of the people and of the priests '
  '10':
  - type: text
    content: '“Then break the jar while those who go with you are watching, '
  '11':
  - type: text
    content: 'and say to them, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says: I will smash this nation and this city just as this potter’s jar is smashed and cannot be repaired. They will bury the dead in Topheth until there is no more room. '
  '12':
  - type: text
    content: 'This is what I will do to this place and to those who live here, declares the '
  - type: text
    content: Lord
  - type: text
    content: '. I will make this city like Topheth. '
  '13':
  - type: text
    content: The houses in Jerusalem and those of the kings of Judah will be defiled like this place, Topheth—all the houses where they burned incense on the roofs to all the starry hosts and poured out drink offerings to other gods.’ ”
  '14':
  - type: text
    content: 'Jeremiah then returned from Topheth, where the '
  - type: text
    content: Lord
  - type: text
    content: ' had sent him to prophesy, and stood in the court of the '
  - type: text
    content: Lord
  - type: text
    content: '’s temple and said to all the people, '
  '15':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says: ‘Listen! I am going to bring on this city and all the villages around it every disaster I pronounced against them, because they were stiff-necked and would not listen to my words.’ ”'
  '2':
  - type: text
    content: 'and go out to the Valley of Ben Hinnom, near the entrance of the Potsherd Gate. There proclaim the words I tell you, '
  '3':
  - type: text
    content: 'and say, ‘Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', you kings of Judah and people of Jerusalem. This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says: Listen! I am going to bring a disaster on this place that will make the ears of everyone who hears of it tingle. '
  '4':
  - type: text
    content: 'For they have forsaken me and made this a place of foreign gods; they have burned incense in it to gods that neither they nor their ancestors nor the kings of Judah ever knew, and they have filled this place with the blood of the innocent. '
  '5':
  - type: text
    content: 'They have built the high places of Baal to burn their children in the fire as offerings to Baal—something I did not command or mention, nor did it enter my mind. '
  '6':
  - type: text
    content: 'So beware, the days are coming, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', when people will no longer call this place Topheth or the Valley of Ben Hinnom, but the Valley of Slaughter.'
  '7':
  - type: text
    content: “ ‘In this place I will ruin
  - type: note
    content: The Hebrew for ruin sounds like the Hebrew for jar (see verses 1 and 10).
  - type: text
    content: ' the plans of Judah and Jerusalem. I will make them fall by the sword before their enemies, at the hands of those who want to kill them, and I will give their carcasses as food to the birds and the wild animals. '
  '8':
  - type: text
    content: 'I will devastate this city and make it an object of horror and scorn; all who pass by will be appalled and will scoff because of all its wounds. '
  '9':
  - type: text
    content: I will make them eat the flesh of their sons and daughters, and they will eat one another’s flesh because their enemies will press the siege so hard against them to destroy them.’
