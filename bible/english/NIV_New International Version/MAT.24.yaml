document_id: MAT.24,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Destruction of the Temple and Signs of the End Times
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus left the temple and was walking away when his disciples came up to him to call his attention to its buildings. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: At that time many will turn away from the faith and will betray and hate each other,
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and many false prophets will appear and deceive many people.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Because of the increase of wickedness, the love of most will grow cold,
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but the one who stands firm to the end will be saved.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And this gospel of the kingdom will be preached in the whole world as a testimony to all nations, and then the end will come.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “So when you see standing in the holy place ‘the abomination that causes desolation,’
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Daniel 9:27; 11:31; 12:11
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: spoken of through the prophet Daniel—let the reader understand—
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: then let those who are in Judea flee to the mountains.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Let no one on the housetop go down to take anything out of the house.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Let no one in the field go back to get their cloak.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: How dreadful it will be in those days for pregnant women and nursing mothers!
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do you see all these things?”
    - type: text
      text: ' he asked. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Truly I tell you, not one stone here will be left on another; every one will be thrown down.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Pray that your flight will not take place in winter or on the Sabbath.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For then there will be great distress, unequaled from the beginning of the world until now—and never to be equaled again.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If those days had not been cut short, no one would survive, but for the sake of the elect those days will be shortened.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: At that time if anyone says to you, ‘Look, here is the Messiah!’ or, ‘There he is!’ do not believe it.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For false messiahs and false prophets will appear and perform great signs and wonders to deceive, if possible, even the elect.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: See, I have told you ahead of time.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “So if anyone tells you, ‘There he is, out in the wilderness,’ do not go out; or, ‘Here he is, in the inner rooms,’ do not believe it.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For as lightning that comes from the east is visible even in the west, so will be the coming of the Son of Man.
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Wherever there is a carcass, there the vultures will gather.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Immediately after the distress of those days
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “ ‘the sun will be darkened,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and the moon will not give its light;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: the stars will fall from the sky,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and the heavenly bodies will be shaken.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 13:10; 34:4
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As Jesus was sitting on the Mount of Olives, the disciples came to him privately. “Tell us,” they said, “when will this happen, and what will be the sign of your coming and of the end of the age?”
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Then will appear the sign of the Son of Man in heaven. And then all the peoples of the earth
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the tribes of the land
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: will mourn when they see the Son of Man coming on the clouds of heaven, with power and great glory.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Daniel 7:13-14.
      marker-yv: yv-n
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And he will send his angels with a loud trumpet call, and they will gather his elect from the four winds, from one end of the heavens to the other.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Now learn this lesson from the fig tree: As soon as its twigs get tender and its leaves come out, you know that summer is near.'
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Even so, when you see all these things, you know that it
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: is near, right at the door.
    - type: text
      text: ' '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Truly I tell you, this generation will certainly not pass away until all these things have happened.
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Heaven and earth will pass away, but my words will never pass away.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Day and Hour Unknown
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But about that day or hour no one knows, not even the angels in heaven, nor the Son,
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts do not have '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nor the Son.
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: but only the Father.
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: As it was in the days of Noah, so it will be at the coming of the Son of Man.
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For in the days before the flood, people were eating and drinking, marrying and giving in marriage, up to the day Noah entered the ark;
    - type: text
      text: ' '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and they knew nothing about what would happen until the flood came and took them all away. That is how it will be at the coming of the Son of Man.
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Watch out that no one deceives you.
    - type: text
      text: ' '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Two men will be in the field; one will be taken and the other left.
    - type: text
      text: ' '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Two women will be grinding with a hand mill; one will be taken and the other left.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Therefore keep watch, because you do not know on what day your Lord will come.
    - type: text
      text: ' '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: 'But understand this: If the owner of the house had known at what time of night the thief was coming, he would have kept watch and would not have let his house be broken into.'
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: So you also must be ready, because the Son of Man will come at an hour when you do not expect him.
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Who then is the faithful and wise servant, whom the master has put in charge of the servants in his household to give them their food at the proper time?
    - type: text
      text: ' '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It will be good for that servant whose master finds him doing so when he returns.
    - type: text
      text: ' '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Truly I tell you, he will put him in charge of all his possessions.
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But suppose that servant is wicked and says to himself, ‘My master is staying away a long time,’
    - type: text
      text: ' '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and he then begins to beat his fellow servants and to eat and drink with drunkards.
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For many will come in my name, claiming, ‘I am the Messiah,’ and will deceive many.
    - type: text
      text: ' '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: The master of that servant will come on a day when he does not expect him and at an hour he is not aware of.
    - type: text
      text: ' '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He will cut him to pieces and assign him a place with the hypocrites, where there will be weeping and gnashing of teeth.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: You will hear of wars and rumors of wars, but see to it that you are not alarmed. Such things must happen, but the end is still to come.
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Nation will rise against nation, and kingdom against kingdom. There will be famines and earthquakes in various places.
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: All these are the beginning of birth pains.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Then you will be handed over to be persecuted and put to death, and you will be hated by all nations because of me.
    - type: text
      text: ' '
