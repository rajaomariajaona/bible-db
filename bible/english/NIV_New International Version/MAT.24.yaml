document_id: MAT.24,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Destruction of the Temple and Signs of the End Times
  - type: text
    content: 'Jesus left the temple and was walking away when his disciples came up to him to call his attention to its buildings. '
  '10':
  - type: text
    content: At that time many will turn away from the faith and will betray and hate each other,
  - type: text
    content: ' '
  '11':
  - type: text
    content: and many false prophets will appear and deceive many people.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Because of the increase of wickedness, the love of most will grow cold,
  - type: text
    content: ' '
  '13':
  - type: text
    content: but the one who stands firm to the end will be saved.
  - type: text
    content: ' '
  '14':
  - type: text
    content: And this gospel of the kingdom will be preached in the whole world as a testimony to all nations, and then the end will come.
  '15':
  - type: text
    content: ' '
  - type: text
    content: “So when you see standing in the holy place ‘the abomination that causes desolation,’
  - type: text
    content: ' '
  - type: note
    content: Daniel 9:27; 11:31; 12:11
  - type: text
    content: spoken of through the prophet Daniel—let the reader understand—
  - type: text
    content: ' '
  '16':
  - type: text
    content: then let those who are in Judea flee to the mountains.
  - type: text
    content: ' '
  '17':
  - type: text
    content: Let no one on the housetop go down to take anything out of the house.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Let no one in the field go back to get their cloak.
  - type: text
    content: ' '
  '19':
  - type: text
    content: How dreadful it will be in those days for pregnant women and nursing mothers!
  - type: text
    content: ' '
  '2':
  - type: text
    content: “Do you see all these things?”
  - type: text
    content: ' he asked. '
  - type: text
    content: “Truly I tell you, not one stone here will be left on another; every one will be thrown down.”
  '20':
  - type: text
    content: Pray that your flight will not take place in winter or on the Sabbath.
  - type: text
    content: ' '
  '21':
  - type: text
    content: For then there will be great distress, unequaled from the beginning of the world until now—and never to be equaled again.
  '22':
  - type: text
    content: ' '
  - type: text
    content: “If those days had not been cut short, no one would survive, but for the sake of the elect those days will be shortened.
  - type: text
    content: ' '
  '23':
  - type: text
    content: At that time if anyone says to you, ‘Look, here is the Messiah!’ or, ‘There he is!’ do not believe it.
  - type: text
    content: ' '
  '24':
  - type: text
    content: For false messiahs and false prophets will appear and perform great signs and wonders to deceive, if possible, even the elect.
  - type: text
    content: ' '
  '25':
  - type: text
    content: See, I have told you ahead of time.
  '26':
  - type: text
    content: ' '
  - type: text
    content: “So if anyone tells you, ‘There he is, out in the wilderness,’ do not go out; or, ‘Here he is, in the inner rooms,’ do not believe it.
  - type: text
    content: ' '
  '27':
  - type: text
    content: For as lightning that comes from the east is visible even in the west, so will be the coming of the Son of Man.
  - type: text
    content: ' '
  '28':
  - type: text
    content: Wherever there is a carcass, there the vultures will gather.
  '29':
  - type: text
    content: ' '
  - type: text
    content: “Immediately after the distress of those days
  - type: text
    content: “ ‘the sun will be darkened,
  - type: text
    content: and the moon will not give its light;
  - type: text
    content: the stars will fall from the sky,
  - type: text
    content: and the heavenly bodies will be shaken.’
  - type: note
    content: Isaiah 13:10; 34:4
  '3':
  - type: text
    content: As Jesus was sitting on the Mount of Olives, the disciples came to him privately. “Tell us,” they said, “when will this happen, and what will be the sign of your coming and of the end of the age?”
  '30':
  - type: text
    content: ' '
  - type: text
    content: “Then will appear the sign of the Son of Man in heaven. And then all the peoples of the earth
  - type: text
    content: ' '
  - type: note
    content: Or the tribes of the land
  - type: text
    content: will mourn when they see the Son of Man coming on the clouds of heaven, with power and great glory.
  - type: note
    content: See Daniel 7:13-14.
  - type: text
    content: ' '
  '31':
  - type: text
    content: And he will send his angels with a loud trumpet call, and they will gather his elect from the four winds, from one end of the heavens to the other.
  '32':
  - type: text
    content: ' '
  - type: text
    content: '“Now learn this lesson from the fig tree: As soon as its twigs get tender and its leaves come out, you know that summer is near.'
  - type: text
    content: ' '
  '33':
  - type: text
    content: Even so, when you see all these things, you know that it
  - type: note
    content: Or he
  - type: text
    content: ' '
  - type: text
    content: is near, right at the door.
  - type: text
    content: ' '
  '34':
  - type: text
    content: Truly I tell you, this generation will certainly not pass away until all these things have happened.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Heaven and earth will pass away, but my words will never pass away.
  - type: heading
    content: The Day and Hour Unknown
  '36':
  - type: text
    content: ' '
  - type: text
    content: “But about that day or hour no one knows, not even the angels in heaven, nor the Son,
  - type: text
    content: ' '
  - type: note
    content: Some manuscripts do not have nor the Son.
  - type: text
    content: but only the Father.
  - type: text
    content: ' '
  '37':
  - type: text
    content: As it was in the days of Noah, so it will be at the coming of the Son of Man.
  - type: text
    content: ' '
  '38':
  - type: text
    content: For in the days before the flood, people were eating and drinking, marrying and giving in marriage, up to the day Noah entered the ark;
  - type: text
    content: ' '
  '39':
  - type: text
    content: and they knew nothing about what would happen until the flood came and took them all away. That is how it will be at the coming of the Son of Man.
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Jesus answered: '
  - type: text
    content: “Watch out that no one deceives you.
  - type: text
    content: ' '
  '40':
  - type: text
    content: Two men will be in the field; one will be taken and the other left.
  - type: text
    content: ' '
  '41':
  - type: text
    content: Two women will be grinding with a hand mill; one will be taken and the other left.
  '42':
  - type: text
    content: ' '
  - type: text
    content: “Therefore keep watch, because you do not know on what day your Lord will come.
  - type: text
    content: ' '
  '43':
  - type: text
    content: 'But understand this: If the owner of the house had known at what time of night the thief was coming, he would have kept watch and would not have let his house be broken into.'
  - type: text
    content: ' '
  '44':
  - type: text
    content: So you also must be ready, because the Son of Man will come at an hour when you do not expect him.
  '45':
  - type: text
    content: ' '
  - type: text
    content: “Who then is the faithful and wise servant, whom the master has put in charge of the servants in his household to give them their food at the proper time?
  - type: text
    content: ' '
  '46':
  - type: text
    content: It will be good for that servant whose master finds him doing so when he returns.
  - type: text
    content: ' '
  '47':
  - type: text
    content: Truly I tell you, he will put him in charge of all his possessions.
  - type: text
    content: ' '
  '48':
  - type: text
    content: But suppose that servant is wicked and says to himself, ‘My master is staying away a long time,’
  - type: text
    content: ' '
  '49':
  - type: text
    content: and he then begins to beat his fellow servants and to eat and drink with drunkards.
  - type: text
    content: ' '
  '5':
  - type: text
    content: For many will come in my name, claiming, ‘I am the Messiah,’ and will deceive many.
  - type: text
    content: ' '
  '50':
  - type: text
    content: The master of that servant will come on a day when he does not expect him and at an hour he is not aware of.
  - type: text
    content: ' '
  '51':
  - type: text
    content: He will cut him to pieces and assign him a place with the hypocrites, where there will be weeping and gnashing of teeth.
  '6':
  - type: text
    content: You will hear of wars and rumors of wars, but see to it that you are not alarmed. Such things must happen, but the end is still to come.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Nation will rise against nation, and kingdom against kingdom. There will be famines and earthquakes in various places.
  - type: text
    content: ' '
  '8':
  - type: text
    content: All these are the beginning of birth pains.
  '9':
  - type: text
    content: ' '
  - type: text
    content: “Then you will be handed over to be persecuted and put to death, and you will be hated by all nations because of me.
  - type: text
    content: ' '
