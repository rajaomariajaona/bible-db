document_id: JER.22,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment Against Wicked Kings
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: “Go down to the palace of the king of Judah and proclaim this message there: '
  '10':
  - type: text
    content: Do not weep for the dead king or mourn his loss;
  - type: text
    content: rather, weep bitterly for him who is exiled,
  - type: text
    content: because he will never return
  - type: text
    content: nor see his native land again.
  '11':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says about Shallum'
  - type: note
    content: Also called Jehoahaz
  - type: text
    content: ' son of Josiah, who succeeded his father as king of Judah but has gone from this place: “He will never return. '
  '12':
  - type: text
    content: He will die in the place where they have led him captive; he will not see this land again.”
  '13':
  - type: text
    content: “Woe to him who builds his palace by unrighteousness,
  - type: text
    content: his upper rooms by injustice,
  - type: text
    content: making his own people work for nothing,
  - type: text
    content: not paying them for their labor.
  '14':
  - type: text
    content: He says, ‘I will build myself a great palace
  - type: text
    content: with spacious upper rooms.’
  - type: text
    content: So he makes large windows in it,
  - type: text
    content: panels it with cedar
  - type: text
    content: and decorates it in red.
  '15':
  - type: text
    content: “Does it make you a king
  - type: text
    content: to have more and more cedar?
  - type: text
    content: Did not your father have food and drink?
  - type: text
    content: He did what was right and just,
  - type: text
    content: so all went well with him.
  '16':
  - type: text
    content: He defended the cause of the poor and needy,
  - type: text
    content: and so all went well.
  - type: text
    content: Is that not what it means to know me?”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '17':
  - type: text
    content: “But your eyes and your heart
  - type: text
    content: are set only on dishonest gain,
  - type: text
    content: on shedding innocent blood
  - type: text
    content: and on oppression and extortion.”
  '18':
  - type: text
    content: 'Therefore this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says about Jehoiakim son of Josiah king of Judah:'
  - type: text
    content: '“They will not mourn for him:'
  - type: text
    content: ‘Alas, my brother! Alas, my sister!’
  - type: text
    content: 'They will not mourn for him:'
  - type: text
    content: ‘Alas, my master! Alas, his splendor!’
  '19':
  - type: text
    content: He will have the burial of a donkey—
  - type: text
    content: dragged away and thrown
  - type: text
    content: outside the gates of Jerusalem.”
  '2':
  - type: text
    content: '‘Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' to you, king of Judah, you who sit on David’s throne—you, your officials and your people who come through these gates. '
  '20':
  - type: text
    content: “Go up to Lebanon and cry out,
  - type: text
    content: let your voice be heard in Bashan,
  - type: text
    content: cry out from Abarim,
  - type: text
    content: for all your allies are crushed.
  '21':
  - type: text
    content: I warned you when you felt secure,
  - type: text
    content: but you said, ‘I will not listen!’
  - type: text
    content: This has been your way from your youth;
  - type: text
    content: you have not obeyed me.
  '22':
  - type: text
    content: The wind will drive all your shepherds away,
  - type: text
    content: and your allies will go into exile.
  - type: text
    content: Then you will be ashamed and disgraced
  - type: text
    content: because of all your wickedness.
  '23':
  - type: text
    content: You who live in ‘Lebanon,
  - type: note
    content: That is, the palace in Jerusalem (see 1 Kings 7:2)
  - type: text
    content: ’
  - type: text
    content: who are nestled in cedar buildings,
  - type: text
    content: how you will groan when pangs come upon you,
  - type: text
    content: pain like that of a woman in labor!
  '24':
  - type: text
    content: '“As surely as I live,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “even if you, Jehoiachin'
  - type: note
    content: Hebrew Koniah, a variant of Jehoiachin; also in verse 28
  - type: text
    content: ' son of Jehoiakim king of Judah, were a signet ring on my right hand, I would still pull you off. '
  '25':
  - type: text
    content: I will deliver you into the hands of those who want to kill you, those you fear—Nebuchadnezzar king of Babylon and the Babylonians.
  - type: note
    content: Or Chaldeans
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'I will hurl you and the mother who gave you birth into another country, where neither of you was born, and there you both will die. '
  '27':
  - type: text
    content: You will never come back to the land you long to return to.”
  '28':
  - type: text
    content: Is this man Jehoiachin a despised, broken pot,
  - type: text
    content: an object no one wants?
  - type: text
    content: Why will he and his children be hurled out,
  - type: text
    content: cast into a land they do not know?
  '29':
  - type: text
    content: O land, land, land,
  - type: text
    content: 'hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  '3':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Do what is just and right. Rescue from the hand of the oppressor the one who has been robbed. Do no wrong or violence to the foreigner, the fatherless or the widow, and do not shed innocent blood in this place. '
  '30':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Record this man as if childless,
  - type: text
    content: a man who will not prosper in his lifetime,
  - type: text
    content: for none of his offspring will prosper,
  - type: text
    content: none will sit on the throne of David
  - type: text
    content: or rule anymore in Judah.”
  '4':
  - type: text
    content: 'For if you are careful to carry out these commands, then kings who sit on David’s throne will come through the gates of this palace, riding in chariots and on horses, accompanied by their officials and their people. '
  '5':
  - type: text
    content: 'But if you do not obey these commands, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', I swear by myself that this palace will become a ruin.’ ”'
  '6':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says about the palace of the king of Judah:'
  - type: text
    content: “Though you are like Gilead to me,
  - type: text
    content: like the summit of Lebanon,
  - type: text
    content: I will surely make you like a wasteland,
  - type: text
    content: like towns not inhabited.
  '7':
  - type: text
    content: I will send destroyers against you,
  - type: text
    content: each man with his weapons,
  - type: text
    content: and they will cut up your fine cedar beams
  - type: text
    content: and throw them into the fire.
  '8':
  - type: text
    content: '“People from many nations will pass by this city and will ask one another, ‘Why has the '
  - type: text
    content: Lord
  - type: text
    content: ' done such a thing to this great city?’ '
  '9':
  - type: text
    content: 'And the answer will be: ‘Because they have forsaken the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' their God and have worshiped and served other gods.’ ”'
