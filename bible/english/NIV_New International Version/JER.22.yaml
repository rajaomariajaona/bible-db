document_id: JER.22,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judgment Against Wicked Kings
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: “Go down to the palace of the king of Judah and proclaim this message there: '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Do not weep for the dead king or mourn his loss;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: rather, weep bitterly for him who is exiled,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because he will never return
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor see his native land again.
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says about Shallum'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Also called '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jehoahaz
      marker-yv: yv-n
    - type: text
      text: ' son of Josiah, who succeeded his father as king of Judah but has gone from this place: “He will never return. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: He will die in the place where they have led him captive; he will not see this land again.”
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “Woe to him who builds his palace by unrighteousness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his upper rooms by injustice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: making his own people work for nothing,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not paying them for their labor.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: He says, ‘I will build myself a great palace
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with spacious upper rooms.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So he makes large windows in it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: panels it with cedar
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and decorates it in red.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: “Does it make you a king
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to have more and more cedar?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Did not your father have food and drink?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: He did what was right and just,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so all went well with him.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: He defended the cause of the poor and needy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and so all went well.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Is that not what it means to know me?”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: “But your eyes and your heart
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are set only on dishonest gain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on shedding innocent blood
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and on oppression and extortion.”
  '18':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Therefore this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says about Jehoiakim son of Josiah king of Judah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“They will not mourn for him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Alas, my brother! Alas, my sister!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They will not mourn for him:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Alas, my master! Alas, his splendor!’
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: He will have the burial of a donkey—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: dragged away and thrown
  - type: usfm
    marker: q2
    children:
    - type: text
      text: outside the gates of Jerusalem.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '‘Hear the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to you, king of Judah, you who sit on David’s throne—you, your officials and your people who come through these gates. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: “Go up to Lebanon and cry out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let your voice be heard in Bashan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cry out from Abarim,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for all your allies are crushed.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: I warned you when you felt secure,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but you said, ‘I will not listen!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: This has been your way from your youth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have not obeyed me.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: The wind will drive all your shepherds away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your allies will go into exile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then you will be ashamed and disgraced
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of all your wickedness.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: You who live in ‘Lebanon,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the palace in Jerusalem (see 1 Kings 7:2)
      marker-yv: yv-n
    - type: text
      text: ’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who are nestled in cedar buildings,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: how you will groan when pangs come upon you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pain like that of a woman in labor!
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '“As surely as I live,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “even if you, Jehoiachin'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Koniah, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jehoiachin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verse 28
      marker-yv: yv-n
    - type: text
      text: ' son of Jehoiakim king of Judah, were a signet ring on my right hand, I would still pull you off. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: I will deliver you into the hands of those who want to kill you, those you fear—Nebuchadnezzar king of Babylon and the Babylonians.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldeans
      marker-yv: yv-n
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'I will hurl you and the mother who gave you birth into another country, where neither of you was born, and there you both will die. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: You will never come back to the land you long to return to.”
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Is this man Jehoiachin a despised, broken pot,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: an object no one wants?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why will he and his children be hurled out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: cast into a land they do not know?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: O land, land, land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'hear the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Do what is just and right. Rescue from the hand of the oppressor the one who has been robbed. Do no wrong or violence to the foreigner, the fatherless or the widow, and do not shed innocent blood in this place. '
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Record this man as if childless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a man who will not prosper in his lifetime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for none of his offspring will prosper,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: none will sit on the throne of David
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or rule anymore in Judah.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For if you are careful to carry out these commands, then kings who sit on David’s throne will come through the gates of this palace, riding in chariots and on horses, accompanied by their officials and their people. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'But if you do not obey these commands, declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', I swear by myself that this palace will become a ruin.’ ”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'For this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says about the palace of the king of Judah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Though you are like Gilead to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like the summit of Lebanon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will surely make you like a wasteland,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like towns not inhabited.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: I will send destroyers against you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: each man with his weapons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and they will cut up your fine cedar beams
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and throw them into the fire.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '“People from many nations will pass by this city and will ask one another, ‘Why has the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' done such a thing to this great city?’ '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'And the answer will be: ‘Because they have forsaken the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' their God and have worshiped and served other gods.’ ”'
