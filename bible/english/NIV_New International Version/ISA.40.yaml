document_id: ISA.40,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Comfort for God’s People
  - type: text
    content: Comfort, comfort my people,
  - type: text
    content: says your God.
  '10':
  - type: text
    content: 'See, the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' comes with power,'
  - type: text
    content: and he rules with a mighty arm.
  - type: text
    content: See, his reward is with him,
  - type: text
    content: and his recompense accompanies him.
  '11':
  - type: text
    content: 'He tends his flock like a shepherd:'
  - type: text
    content: He gathers the lambs in his arms
  - type: text
    content: and carries them close to his heart;
  - type: text
    content: he gently leads those that have young.
  '12':
  - type: text
    content: Who has measured the waters in the hollow of his hand,
  - type: text
    content: or with the breadth of his hand marked off the heavens?
  - type: text
    content: Who has held the dust of the earth in a basket,
  - type: text
    content: or weighed the mountains on the scales
  - type: text
    content: and the hills in a balance?
  '13':
  - type: text
    content: Who can fathom the Spirit
  - type: note
    content: Or mind
  - type: text
    content: ' of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'or instruct the '
  - type: text
    content: Lord
  - type: text
    content: ' as his counselor?'
  '14':
  - type: text
    content: 'Whom did the '
  - type: text
    content: Lord
  - type: text
    content: ' consult to enlighten him,'
  - type: text
    content: and who taught him the right way?
  - type: text
    content: Who was it that taught him knowledge,
  - type: text
    content: or showed him the path of understanding?
  '15':
  - type: text
    content: Surely the nations are like a drop in a bucket;
  - type: text
    content: they are regarded as dust on the scales;
  - type: text
    content: he weighs the islands as though they were fine dust.
  '16':
  - type: text
    content: Lebanon is not sufficient for altar fires,
  - type: text
    content: nor its animals enough for burnt offerings.
  '17':
  - type: text
    content: Before him all the nations are as nothing;
  - type: text
    content: they are regarded by him as worthless
  - type: text
    content: and less than nothing.
  '18':
  - type: text
    content: With whom, then, will you compare God?
  - type: text
    content: To what image will you liken him?
  '19':
  - type: text
    content: As for an idol, a metalworker casts it,
  - type: text
    content: and a goldsmith overlays it with gold
  - type: text
    content: and fashions silver chains for it.
  '2':
  - type: text
    content: Speak tenderly to Jerusalem,
  - type: text
    content: and proclaim to her
  - type: text
    content: that her hard service has been completed,
  - type: text
    content: that her sin has been paid for,
  - type: text
    content: 'that she has received from the '
  - type: text
    content: Lord
  - type: text
    content: ’s hand
  - type: text
    content: double for all her sins.
  '20':
  - type: text
    content: A person too poor to present such an offering
  - type: text
    content: selects wood that will not rot;
  - type: text
    content: they look for a skilled worker
  - type: text
    content: to set up an idol that will not topple.
  '21':
  - type: text
    content: Do you not know?
  - type: text
    content: Have you not heard?
  - type: text
    content: Has it not been told you from the beginning?
  - type: text
    content: Have you not understood since the earth was founded?
  '22':
  - type: text
    content: He sits enthroned above the circle of the earth,
  - type: text
    content: and its people are like grasshoppers.
  - type: text
    content: He stretches out the heavens like a canopy,
  - type: text
    content: and spreads them out like a tent to live in.
  '23':
  - type: text
    content: He brings princes to naught
  - type: text
    content: and reduces the rulers of this world to nothing.
  '24':
  - type: text
    content: No sooner are they planted,
  - type: text
    content: no sooner are they sown,
  - type: text
    content: no sooner do they take root in the ground,
  - type: text
    content: than he blows on them and they wither,
  - type: text
    content: and a whirlwind sweeps them away like chaff.
  '25':
  - type: text
    content: “To whom will you compare me?
  - type: text
    content: Or who is my equal?” says the Holy One.
  '26':
  - type: text
    content: 'Lift up your eyes and look to the heavens:'
  - type: text
    content: Who created all these?
  - type: text
    content: He who brings out the starry host one by one
  - type: text
    content: and calls forth each of them by name.
  - type: text
    content: Because of his great power and mighty strength,
  - type: text
    content: not one of them is missing.
  '27':
  - type: text
    content: Why do you complain, Jacob?
  - type: text
    content: Why do you say, Israel,
  - type: text
    content: '“My way is hidden from the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: my cause is disregarded by my God”?
  '28':
  - type: text
    content: Do you not know?
  - type: text
    content: Have you not heard?
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is the everlasting God,'
  - type: text
    content: the Creator of the ends of the earth.
  - type: text
    content: He will not grow tired or weary,
  - type: text
    content: and his understanding no one can fathom.
  '29':
  - type: text
    content: He gives strength to the weary
  - type: text
    content: and increases the power of the weak.
  '3':
  - type: text
    content: 'A voice of one calling:'
  - type: text
    content: “In the wilderness prepare
  - type: text
    content: 'the way for the '
  - type: text
    content: Lord
  - type: note
    content: 'Or A voice of one calling in the wilderness: / “Prepare the way for the Lord'
  - type: text
    content: ;
  - type: text
    content: make straight in the desert
  - type: text
    content: a highway for our God.
  - type: note
    content: Hebrew; Septuagint make straight the paths of our God
  '30':
  - type: text
    content: Even youths grow tired and weary,
  - type: text
    content: and young men stumble and fall;
  '31':
  - type: text
    content: 'but those who hope in the '
  - type: text
    content: Lord
  - type: text
    content: will renew their strength.
  - type: text
    content: They will soar on wings like eagles;
  - type: text
    content: they will run and not grow weary,
  - type: text
    content: they will walk and not be faint.
  '4':
  - type: text
    content: Every valley shall be raised up,
  - type: text
    content: every mountain and hill made low;
  - type: text
    content: the rough ground shall become level,
  - type: text
    content: the rugged places a plain.
  '5':
  - type: text
    content: 'And the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' will be revealed,'
  - type: text
    content: and all people will see it together.
  - type: text
    content: 'For the mouth of the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken.”'
  '6':
  - type: text
    content: A voice says, “Cry out.”
  - type: text
    content: And I said, “What shall I cry?”
  - type: text
    content: “All people are like grass,
  - type: text
    content: and all their faithfulness is like the flowers of the field.
  '7':
  - type: text
    content: The grass withers and the flowers fall,
  - type: text
    content: 'because the breath of the '
  - type: text
    content: Lord
  - type: text
    content: ' blows on them.'
  - type: text
    content: Surely the people are grass.
  '8':
  - type: text
    content: The grass withers and the flowers fall,
  - type: text
    content: but the word of our God endures forever.”
  '9':
  - type: text
    content: You who bring good news to Zion,
  - type: text
    content: go up on a high mountain.
  - type: text
    content: You who bring good news to Jerusalem,
  - type: note
    content: Or Zion, bringer of good news, / go up on a high mountain. / Jerusalem, bringer of good news
  - type: text
    content: lift up your voice with a shout,
  - type: text
    content: lift it up, do not be afraid;
  - type: text
    content: say to the towns of Judah,
  - type: text
    content: “Here is your God!”
