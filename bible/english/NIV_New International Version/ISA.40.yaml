document_id: ISA.40
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Comfort for God’s People
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Comfort, comfort my people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: says your God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Speak tenderly to Jerusalem,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and proclaim to her
- type: usfm
  marker: q1
  children:
  - type: text
    text: that her hard service has been completed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that her sin has been paid for,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'that she has received from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s hand
- type: usfm
  marker: q2
  children:
  - type: text
    text: double for all her sins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'A voice of one calling:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “In the wilderness prepare
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the way for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'A voice of one calling in the wilderness: / “Prepare the way for the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: make straight in the desert
- type: usfm
  marker: q2
  children:
  - type: text
    text: a highway for our God.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew; Septuagint '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: make straight the paths of our God
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Every valley shall be raised up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: every mountain and hill made low;
- type: usfm
  marker: q1
  children:
  - type: text
    text: the rough ground shall become level,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the rugged places a plain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'And the glory of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will be revealed,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all people will see it together.
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'For the mouth of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has spoken.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: A voice says, “Cry out.”
- type: usfm
  marker: q2
  children:
  - type: text
    text: And I said, “What shall I cry?”
- type: usfm
  marker: q1
  children:
  - type: text
    text: “All people are like grass,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all their faithfulness is like the flowers of the field.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The grass withers and the flowers fall,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'because the breath of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' blows on them.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Surely the people are grass.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The grass withers and the flowers fall,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the word of our God endures forever.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You who bring good news to Zion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: go up on a high mountain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You who bring good news to Jerusalem,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Zion, bringer of good news, / go up on a high mountain. / Jerusalem, bringer of good news
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: lift up your voice with a shout,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lift it up, do not be afraid;
- type: usfm
  marker: q2
  children:
  - type: text
    text: say to the towns of Judah,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Here is your God!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'See, the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' comes with power,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he rules with a mighty arm.
- type: usfm
  marker: q1
  children:
  - type: text
    text: See, his reward is with him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his recompense accompanies him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'He tends his flock like a shepherd:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He gathers the lambs in his arms
- type: usfm
  marker: q1
  children:
  - type: text
    text: and carries them close to his heart;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he gently leads those that have young.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Who has measured the waters in the hollow of his hand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or with the breadth of his hand marked off the heavens?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who has held the dust of the earth in a basket,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or weighed the mountains on the scales
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the hills in a balance?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Who can fathom the Spirit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mind
    marker-yv: yv-n
  - type: text
    text: ' of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'or instruct the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' as his counselor?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Whom did the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' consult to enlighten him,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and who taught him the right way?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who was it that taught him knowledge,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or showed him the path of understanding?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Surely the nations are like a drop in a bucket;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are regarded as dust on the scales;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he weighs the islands as though they were fine dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Lebanon is not sufficient for altar fires,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor its animals enough for burnt offerings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Before him all the nations are as nothing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are regarded by him as worthless
- type: usfm
  marker: q2
  children:
  - type: text
    text: and less than nothing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: With whom, then, will you compare God?
- type: usfm
  marker: q2
  children:
  - type: text
    text: To what image will you liken him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: As for an idol, a metalworker casts it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a goldsmith overlays it with gold
- type: usfm
  marker: q2
  children:
  - type: text
    text: and fashions silver chains for it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: A person too poor to present such an offering
- type: usfm
  marker: q2
  children:
  - type: text
    text: selects wood that will not rot;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they look for a skilled worker
- type: usfm
  marker: q2
  children:
  - type: text
    text: to set up an idol that will not topple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Do you not know?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Have you not heard?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Has it not been told you from the beginning?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Have you not understood since the earth was founded?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: He sits enthroned above the circle of the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and its people are like grasshoppers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He stretches out the heavens like a canopy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and spreads them out like a tent to live in.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: He brings princes to naught
- type: usfm
  marker: q2
  children:
  - type: text
    text: and reduces the rulers of this world to nothing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: No sooner are they planted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no sooner are they sown,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no sooner do they take root in the ground,
- type: usfm
  marker: q1
  children:
  - type: text
    text: than he blows on them and they wither,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a whirlwind sweeps them away like chaff.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “To whom will you compare me?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Or who is my equal?” says the Holy One.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Lift up your eyes and look to the heavens:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who created all these?
- type: usfm
  marker: q1
  children:
  - type: text
    text: He who brings out the starry host one by one
- type: usfm
  marker: q2
  children:
  - type: text
    text: and calls forth each of them by name.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Because of his great power and mighty strength,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not one of them is missing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Why do you complain, Jacob?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why do you say, Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '“My way is hidden from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my cause is disregarded by my God”?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Do you not know?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Have you not heard?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is the everlasting God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Creator of the ends of the earth.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will not grow tired or weary,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his understanding no one can fathom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: He gives strength to the weary
- type: usfm
  marker: q2
  children:
  - type: text
    text: and increases the power of the weak.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Even youths grow tired and weary,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and young men stumble and fall;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'but those who hope in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: will renew their strength.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will soar on wings like eagles;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will run and not grow weary,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will walk and not be faint.
