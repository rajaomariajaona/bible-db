document_id: PRO.25,111
type_code: eng
verses:
  '1':
  - type: heading
    content: More Proverbs of Solomon
  - type: text
    content: 'These are more proverbs of Solomon, compiled by the men of Hezekiah king of Judah:'
  '10':
  - type: text
    content: or the one who hears it may shame you
  - type: text
    content: and the charge against you will stand.
  '11':
  - type: text
    content: Like apples
  - type: note
    content: Or possibly apricots
  - type: text
    content: ' of gold in settings of silver'
  - type: text
    content: is a ruling rightly given.
  '12':
  - type: text
    content: Like an earring of gold or an ornament of fine gold
  - type: text
    content: is the rebuke of a wise judge to a listening ear.
  '13':
  - type: text
    content: Like a snow-cooled drink at harvest time
  - type: text
    content: is a trustworthy messenger to the one who sends him;
  - type: text
    content: he refreshes the spirit of his master.
  '14':
  - type: text
    content: Like clouds and wind without rain
  - type: text
    content: is one who boasts of gifts never given.
  '15':
  - type: text
    content: Through patience a ruler can be persuaded,
  - type: text
    content: and a gentle tongue can break a bone.
  '16':
  - type: text
    content: If you find honey, eat just enough—
  - type: text
    content: too much of it, and you will vomit.
  '17':
  - type: text
    content: Seldom set foot in your neighbor’s house—
  - type: text
    content: too much of you, and they will hate you.
  '18':
  - type: text
    content: Like a club or a sword or a sharp arrow
  - type: text
    content: is one who gives false testimony against a neighbor.
  '19':
  - type: text
    content: Like a broken tooth or a lame foot
  - type: text
    content: is reliance on the unfaithful in a time of trouble.
  '2':
  - type: text
    content: It is the glory of God to conceal a matter;
  - type: text
    content: to search out a matter is the glory of kings.
  '20':
  - type: text
    content: Like one who takes away a garment on a cold day,
  - type: text
    content: or like vinegar poured on a wound,
  - type: text
    content: is one who sings songs to a heavy heart.
  '21':
  - type: text
    content: If your enemy is hungry, give him food to eat;
  - type: text
    content: if he is thirsty, give him water to drink.
  '22':
  - type: text
    content: In doing this, you will heap burning coals on his head,
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' will reward you.'
  '23':
  - type: text
    content: Like a north wind that brings unexpected rain
  - type: text
    content: is a sly tongue—which provokes a horrified look.
  '24':
  - type: text
    content: Better to live on a corner of the roof
  - type: text
    content: than share a house with a quarrelsome wife.
  '25':
  - type: text
    content: Like cold water to a weary soul
  - type: text
    content: is good news from a distant land.
  '26':
  - type: text
    content: Like a muddied spring or a polluted well
  - type: text
    content: are the righteous who give way to the wicked.
  '27':
  - type: text
    content: It is not good to eat too much honey,
  - type: text
    content: nor is it honorable to search out matters that are too deep.
  '28':
  - type: text
    content: Like a city whose walls are broken through
  - type: text
    content: is a person who lacks self-control.
  '3':
  - type: text
    content: As the heavens are high and the earth is deep,
  - type: text
    content: so the hearts of kings are unsearchable.
  '4':
  - type: text
    content: Remove the dross from the silver,
  - type: text
    content: and a silversmith can produce a vessel;
  '5':
  - type: text
    content: remove wicked officials from the king’s presence,
  - type: text
    content: and his throne will be established through righteousness.
  '6':
  - type: text
    content: Do not exalt yourself in the king’s presence,
  - type: text
    content: and do not claim a place among his great men;
  '7':
  - type: text
    content: it is better for him to say to you, “Come up here,”
  - type: text
    content: than for him to humiliate you before his nobles.
  - type: text
    content: What you have seen with your eyes
  '8':
  - type: text
    content: do not bring
  - type: note
    content: Or nobles / on whom you had set your eyes. / 8 Do not go
  - type: text
    content: ' hastily to court,'
  - type: text
    content: for what will you do in the end
  - type: text
    content: if your neighbor puts you to shame?
  '9':
  - type: text
    content: If you take your neighbor to court,
  - type: text
    content: do not betray another’s confidence,
