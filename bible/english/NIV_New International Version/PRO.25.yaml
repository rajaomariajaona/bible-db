document_id: PRO.25
type_code: eng
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: More Proverbs of Solomon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'These are more proverbs of Solomon, compiled by the men of Hezekiah king of Judah:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: It is the glory of God to conceal a matter;
- type: usfm
  marker: q2
  children:
  - type: text
    text: to search out a matter is the glory of kings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: As the heavens are high and the earth is deep,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so the hearts of kings are unsearchable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Remove the dross from the silver,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a silversmith can produce a vessel;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: remove wicked officials from the king’s presence,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his throne will be established through righteousness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Do not exalt yourself in the king’s presence,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and do not claim a place among his great men;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: it is better for him to say to you, “Come up here,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: than for him to humiliate you before his nobles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What you have seen with your eyes
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: do not bring
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:7,8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'nobles / on whom you had set your eyes. / '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '8 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Do not go
    marker-yv: yv-n
  - type: text
    text: ' hastily to court,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: for what will you do in the end
- type: usfm
  marker: q2
  children:
  - type: text
    text: if your neighbor puts you to shame?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: If you take your neighbor to court,
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not betray another’s confidence,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: or the one who hears it may shame you
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the charge against you will stand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Like apples
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or possibly '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: apricots
    marker-yv: yv-n
  - type: text
    text: ' of gold in settings of silver'
- type: usfm
  marker: q2
  children:
  - type: text
    text: is a ruling rightly given.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Like an earring of gold or an ornament of fine gold
- type: usfm
  marker: q2
  children:
  - type: text
    text: is the rebuke of a wise judge to a listening ear.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Like a snow-cooled drink at harvest time
- type: usfm
  marker: q2
  children:
  - type: text
    text: is a trustworthy messenger to the one who sends him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he refreshes the spirit of his master.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Like clouds and wind without rain
- type: usfm
  marker: q2
  children:
  - type: text
    text: is one who boasts of gifts never given.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Through patience a ruler can be persuaded,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a gentle tongue can break a bone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: If you find honey, eat just enough—
- type: usfm
  marker: q2
  children:
  - type: text
    text: too much of it, and you will vomit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Seldom set foot in your neighbor’s house—
- type: usfm
  marker: q2
  children:
  - type: text
    text: too much of you, and they will hate you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Like a club or a sword or a sharp arrow
- type: usfm
  marker: q2
  children:
  - type: text
    text: is one who gives false testimony against a neighbor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Like a broken tooth or a lame foot
- type: usfm
  marker: q2
  children:
  - type: text
    text: is reliance on the unfaithful in a time of trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Like one who takes away a garment on a cold day,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or like vinegar poured on a wound,
- type: usfm
  marker: q2
  children:
  - type: text
    text: is one who sings songs to a heavy heart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: If your enemy is hungry, give him food to eat;
- type: usfm
  marker: q2
  children:
  - type: text
    text: if he is thirsty, give him water to drink.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: In doing this, you will heap burning coals on his head,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will reward you.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Like a north wind that brings unexpected rain
- type: usfm
  marker: q2
  children:
  - type: text
    text: is a sly tongue—which provokes a horrified look.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Better to live on a corner of the roof
- type: usfm
  marker: q2
  children:
  - type: text
    text: than share a house with a quarrelsome wife.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Like cold water to a weary soul
- type: usfm
  marker: q2
  children:
  - type: text
    text: is good news from a distant land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Like a muddied spring or a polluted well
- type: usfm
  marker: q2
  children:
  - type: text
    text: are the righteous who give way to the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: It is not good to eat too much honey,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor is it honorable to search out matters that are too deep.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Like a city whose walls are broken through
- type: usfm
  marker: q2
  children:
  - type: text
    text: is a person who lacks self-control.
