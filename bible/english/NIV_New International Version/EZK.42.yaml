document_id: EZK.42,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Rooms for the Priests
  - type: text
    content: 'Then the man led me northward into the outer court and brought me to the rooms opposite the temple courtyard and opposite the outer wall on the north side. '
  '10':
  - type: text
    content: On the south side
  - type: note
    content: Septuagint; Hebrew Eastward
  - type: text
    content: ' along the length of the wall of the outer court, adjoining the temple courtyard and opposite the outer wall, were rooms '
  '11':
  - type: text
    content: 'with a passageway in front of them. These were like the rooms on the north; they had the same length and width, with similar exits and dimensions. Similar to the doorways on the north '
  '12':
  - type: text
    content: were the doorways of the rooms on the south. There was a doorway at the beginning of the passageway that was parallel to the corresponding wall extending eastward, by which one enters the rooms.
  '13':
  - type: text
    content: 'Then he said to me, “The north and south rooms facing the temple courtyard are the priests’ rooms, where the priests who approach the '
  - type: text
    content: Lord
  - type: text
    content: ' will eat the most holy offerings. There they will put the most holy offerings—the grain offerings, the sin offerings'
  - type: note
    content: Or purification offerings
  - type: text
    content: ' and the guilt offerings—for the place is holy. '
  '14':
  - type: text
    content: Once the priests enter the holy precincts, they are not to go into the outer court until they leave behind the garments in which they minister, for these are holy. They are to put on other clothes before they go near the places that are for the people.”
  '15':
  - type: text
    content: 'When he had finished measuring what was inside the temple area, he led me out by the east gate and measured the area all around: '
  '16':
  - type: text
    content: He measured the east side with the measuring rod; it was five hundred cubits.
  - type: note
    content: See Septuagint of verse 17; Hebrew rods; also in verses 18 and 19.
  - type: note
    content: Five hundred cubits equal about 875 feet or about 265 meters; also in verses 17, 18 and 19.
  - type: text
    content: ' '
  '17':
  - type: text
    content: He measured the north side; it was five hundred cubits
  - type: note
    content: Septuagint; Hebrew rods
  - type: text
    content: ' by the measuring rod. '
  '18':
  - type: text
    content: 'He measured the south side; it was five hundred cubits by the measuring rod. '
  '19':
  - type: text
    content: 'Then he turned to the west side and measured; it was five hundred cubits by the measuring rod. '
  '2':
  - type: text
    content: The building whose door faced north was a hundred cubits long and fifty cubits wide.
  - type: note
    content: That is, about 175 feet long and 88 feet wide or about 53 meters long and 27 meters wide
  - type: text
    content: ' '
  '20':
  - type: text
    content: So he measured the area on all four sides. It had a wall around it, five hundred cubits long and five hundred cubits wide, to separate the holy from the common.
  '3':
  - type: text
    content: Both in the section twenty cubits
  - type: note
    content: That is, about 35 feet or about 11 meters
  - type: text
    content: ' from the inner court and in the section opposite the pavement of the outer court, gallery faced gallery at the three levels. '
  '4':
  - type: text
    content: In front of the rooms was an inner passageway ten cubits wide and a hundred cubits
  - type: note
    content: Septuagint and Syriac; Hebrew and one cubit
  - type: text
    content: ' long.'
  - type: note
    content: That is, about 18 feet wide and 175 feet long or about 5.3 meters wide and 53 meters long
  - type: text
    content: ' Their doors were on the north. '
  '5':
  - type: text
    content: 'Now the upper rooms were narrower, for the galleries took more space from them than from the rooms on the lower and middle floors of the building. '
  '6':
  - type: text
    content: 'The rooms on the top floor had no pillars, as the courts had; so they were smaller in floor space than those on the lower and middle floors. '
  '7':
  - type: text
    content: 'There was an outer wall parallel to the rooms and the outer court; it extended in front of the rooms for fifty cubits. '
  '8':
  - type: text
    content: 'While the row of rooms on the side next to the outer court was fifty cubits long, the row on the side nearest the sanctuary was a hundred cubits long. '
  '9':
  - type: text
    content: The lower rooms had an entrance on the east side as one enters them from the outer court.
