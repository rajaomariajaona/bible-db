document_id: EZK.42
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Rooms for the Priests
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the man led me northward into the outer court and brought me to the rooms opposite the temple courtyard and opposite the outer wall on the north side. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: The building whose door faced north was a hundred cubits long and fifty cubits wide.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 175 feet long and 88 feet wide or about 53 meters long and 27 meters wide
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Both in the section twenty cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 35 feet or about 11 meters
    marker-yv: yv-n
  - type: text
    text: ' from the inner court and in the section opposite the pavement of the outer court, gallery faced gallery at the three levels. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: In front of the rooms was an inner passageway ten cubits wide and a hundred cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint and Syriac; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and one cubit
    marker-yv: yv-n
  - type: text
    text: ' long.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 18 feet wide and 175 feet long or about 5.3 meters wide and 53 meters long
    marker-yv: yv-n
  - type: text
    text: ' Their doors were on the north. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now the upper rooms were narrower, for the galleries took more space from them than from the rooms on the lower and middle floors of the building. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The rooms on the top floor had no pillars, as the courts had; so they were smaller in floor space than those on the lower and middle floors. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'There was an outer wall parallel to the rooms and the outer court; it extended in front of the rooms for fifty cubits. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'While the row of rooms on the side next to the outer court was fifty cubits long, the row on the side nearest the sanctuary was a hundred cubits long. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The lower rooms had an entrance on the east side as one enters them from the outer court.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: On the south side
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Eastward
    marker-yv: yv-n
  - type: text
    text: ' along the length of the wall of the outer court, adjoining the temple courtyard and opposite the outer wall, were rooms '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'with a passageway in front of them. These were like the rooms on the north; they had the same length and width, with similar exits and dimensions. Similar to the doorways on the north '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: were the doorways of the rooms on the south. There was a doorway at the beginning of the passageway that was parallel to the corresponding wall extending eastward, by which one enters the rooms.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then he said to me, “The north and south rooms facing the temple courtyard are the priests’ rooms, where the priests who approach the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will eat the most holy offerings. There they will put the most holy offerings—the grain offerings, the sin offerings'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: purification offerings
    marker-yv: yv-n
  - type: text
    text: ' and the guilt offerings—for the place is holy. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Once the priests enter the holy precincts, they are not to go into the outer court until they leave behind the garments in which they minister, for these are holy. They are to put on other clothes before they go near the places that are for the people.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'When he had finished measuring what was inside the temple area, he led me out by the east gate and measured the area all around: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He measured the east side with the measuring rod; it was five hundred cubits.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'See Septuagint of verse 17; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: rods
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verses 18 and 19.
    marker-yv: yv-n
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Five hundred cubits equal about 875 feet or about 265 meters; also in verses 17, 18 and 19.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He measured the north side; it was five hundred cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '42:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: rods
    marker-yv: yv-n
  - type: text
    text: ' by the measuring rod. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'He measured the south side; it was five hundred cubits by the measuring rod. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Then he turned to the west side and measured; it was five hundred cubits by the measuring rod. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: So he measured the area on all four sides. It had a wall around it, five hundred cubits long and five hundred cubits wide, to separate the holy from the common.
