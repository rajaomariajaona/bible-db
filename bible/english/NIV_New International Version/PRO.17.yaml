document_id: PRO.17,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Better a dry crust with peace and quiet
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than a house full of feasting, with strife.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A rebuke impresses a discerning person
  - type: usfm
    marker: q2
    children:
    - type: text
      text: more than a hundred lashes a fool.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Evildoers foster rebellion against God;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the messenger of death will be sent against them.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Better to meet a bear robbed of her cubs
  - type: usfm
    marker: q2
    children:
    - type: text
      text: than a fool bent on folly.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Evil will never leave the house
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of one who pays back evil for good.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Starting a quarrel is like breaching a dam;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so drop the matter before a dispute breaks out.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Acquitting the guilty and condemning the innocent—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' detests them both.'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why should fools have money in hand to buy wisdom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when they are not able to understand it?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A friend loves at all times,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a brother is born for a time of adversity.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: One who has no sense shakes hands in pledge
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and puts up security for a neighbor.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoever loves a quarrel loves sin;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whoever builds a high gate invites destruction.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A prudent servant will rule over a disgraceful son
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will share the inheritance as one of the family.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: One whose heart is corrupt does not prosper;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: one whose tongue is perverse falls into trouble.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To have a fool for a child brings grief;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is no joy for the parent of a godless fool.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cheerful heart is good medicine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a crushed spirit dries up the bones.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The wicked accept bribes in secret
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to pervert the course of justice.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A discerning person keeps wisdom in view,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but a fool’s eyes wander to the ends of the earth.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A foolish son brings grief to his father
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bitterness to the mother who bore him.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If imposing a fine on the innocent is not good,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: surely to flog honest officials is not right.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The one who has knowledge uses words with restraint,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and whoever has understanding is even-tempered.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even fools are thought wise if they keep silent,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and discerning if they hold their tongues.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The crucible for silver and the furnace for gold,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' tests the heart.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A wicked person listens to deceitful lips;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a liar pays attention to a destructive tongue.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoever mocks the poor shows contempt for their Maker;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: whoever gloats over disaster will not go unpunished.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Children’s children are a crown to the aged,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and parents are the pride of their children.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eloquent lips are unsuited to a godless fool—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how much worse lying lips to a ruler!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A bribe is seen as a charm by the one who gives it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they think success will come at every turn.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoever would foster love covers over an offense,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but whoever repeats the matter separates close friends.
