document_id: PRO.17,111
type_code: eng
verses:
  '1':
  - type: text
    content: Better a dry crust with peace and quiet
  - type: text
    content: than a house full of feasting, with strife.
  '10':
  - type: text
    content: A rebuke impresses a discerning person
  - type: text
    content: more than a hundred lashes a fool.
  '11':
  - type: text
    content: Evildoers foster rebellion against God;
  - type: text
    content: the messenger of death will be sent against them.
  '12':
  - type: text
    content: Better to meet a bear robbed of her cubs
  - type: text
    content: than a fool bent on folly.
  '13':
  - type: text
    content: Evil will never leave the house
  - type: text
    content: of one who pays back evil for good.
  '14':
  - type: text
    content: Starting a quarrel is like breaching a dam;
  - type: text
    content: so drop the matter before a dispute breaks out.
  '15':
  - type: text
    content: Acquitting the guilty and condemning the innocent—
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' detests them both.'
  '16':
  - type: text
    content: Why should fools have money in hand to buy wisdom,
  - type: text
    content: when they are not able to understand it?
  '17':
  - type: text
    content: A friend loves at all times,
  - type: text
    content: and a brother is born for a time of adversity.
  '18':
  - type: text
    content: One who has no sense shakes hands in pledge
  - type: text
    content: and puts up security for a neighbor.
  '19':
  - type: text
    content: Whoever loves a quarrel loves sin;
  - type: text
    content: whoever builds a high gate invites destruction.
  '2':
  - type: text
    content: A prudent servant will rule over a disgraceful son
  - type: text
    content: and will share the inheritance as one of the family.
  '20':
  - type: text
    content: One whose heart is corrupt does not prosper;
  - type: text
    content: one whose tongue is perverse falls into trouble.
  '21':
  - type: text
    content: To have a fool for a child brings grief;
  - type: text
    content: there is no joy for the parent of a godless fool.
  '22':
  - type: text
    content: A cheerful heart is good medicine,
  - type: text
    content: but a crushed spirit dries up the bones.
  '23':
  - type: text
    content: The wicked accept bribes in secret
  - type: text
    content: to pervert the course of justice.
  '24':
  - type: text
    content: A discerning person keeps wisdom in view,
  - type: text
    content: but a fool’s eyes wander to the ends of the earth.
  '25':
  - type: text
    content: A foolish son brings grief to his father
  - type: text
    content: and bitterness to the mother who bore him.
  '26':
  - type: text
    content: If imposing a fine on the innocent is not good,
  - type: text
    content: surely to flog honest officials is not right.
  '27':
  - type: text
    content: The one who has knowledge uses words with restraint,
  - type: text
    content: and whoever has understanding is even-tempered.
  '28':
  - type: text
    content: Even fools are thought wise if they keep silent,
  - type: text
    content: and discerning if they hold their tongues.
  '3':
  - type: text
    content: The crucible for silver and the furnace for gold,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' tests the heart.'
  '4':
  - type: text
    content: A wicked person listens to deceitful lips;
  - type: text
    content: a liar pays attention to a destructive tongue.
  '5':
  - type: text
    content: Whoever mocks the poor shows contempt for their Maker;
  - type: text
    content: whoever gloats over disaster will not go unpunished.
  '6':
  - type: text
    content: Children’s children are a crown to the aged,
  - type: text
    content: and parents are the pride of their children.
  '7':
  - type: text
    content: Eloquent lips are unsuited to a godless fool—
  - type: text
    content: how much worse lying lips to a ruler!
  '8':
  - type: text
    content: A bribe is seen as a charm by the one who gives it;
  - type: text
    content: they think success will come at every turn.
  '9':
  - type: text
    content: Whoever would foster love covers over an offense,
  - type: text
    content: but whoever repeats the matter separates close friends.
