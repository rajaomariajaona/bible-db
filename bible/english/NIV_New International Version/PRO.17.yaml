document_id: PRO.17
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Better a dry crust with peace and quiet
- type: usfm
  marker: q2
  children:
  - type: text
    text: than a house full of feasting, with strife.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: A prudent servant will rule over a disgraceful son
- type: usfm
  marker: q2
  children:
  - type: text
    text: and will share the inheritance as one of the family.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The crucible for silver and the furnace for gold,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' tests the heart.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A wicked person listens to deceitful lips;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a liar pays attention to a destructive tongue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Whoever mocks the poor shows contempt for their Maker;
- type: usfm
  marker: q2
  children:
  - type: text
    text: whoever gloats over disaster will not go unpunished.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Children’s children are a crown to the aged,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and parents are the pride of their children.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Eloquent lips are unsuited to a godless fool—
- type: usfm
  marker: q2
  children:
  - type: text
    text: how much worse lying lips to a ruler!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: A bribe is seen as a charm by the one who gives it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they think success will come at every turn.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Whoever would foster love covers over an offense,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but whoever repeats the matter separates close friends.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: A rebuke impresses a discerning person
- type: usfm
  marker: q2
  children:
  - type: text
    text: more than a hundred lashes a fool.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Evildoers foster rebellion against God;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the messenger of death will be sent against them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Better to meet a bear robbed of her cubs
- type: usfm
  marker: q2
  children:
  - type: text
    text: than a fool bent on folly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Evil will never leave the house
- type: usfm
  marker: q2
  children:
  - type: text
    text: of one who pays back evil for good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Starting a quarrel is like breaching a dam;
- type: usfm
  marker: q2
  children:
  - type: text
    text: so drop the matter before a dispute breaks out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Acquitting the guilty and condemning the innocent—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' detests them both.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Why should fools have money in hand to buy wisdom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when they are not able to understand it?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: A friend loves at all times,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a brother is born for a time of adversity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: One who has no sense shakes hands in pledge
- type: usfm
  marker: q2
  children:
  - type: text
    text: and puts up security for a neighbor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Whoever loves a quarrel loves sin;
- type: usfm
  marker: q2
  children:
  - type: text
    text: whoever builds a high gate invites destruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: One whose heart is corrupt does not prosper;
- type: usfm
  marker: q2
  children:
  - type: text
    text: one whose tongue is perverse falls into trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: To have a fool for a child brings grief;
- type: usfm
  marker: q2
  children:
  - type: text
    text: there is no joy for the parent of a godless fool.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: A cheerful heart is good medicine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a crushed spirit dries up the bones.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The wicked accept bribes in secret
- type: usfm
  marker: q2
  children:
  - type: text
    text: to pervert the course of justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: A discerning person keeps wisdom in view,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a fool’s eyes wander to the ends of the earth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: A foolish son brings grief to his father
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bitterness to the mother who bore him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: If imposing a fine on the innocent is not good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: surely to flog honest officials is not right.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The one who has knowledge uses words with restraint,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and whoever has understanding is even-tempered.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Even fools are thought wise if they keep silent,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and discerning if they hold their tongues.
