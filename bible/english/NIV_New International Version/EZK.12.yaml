document_id: EZK.12,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Exile Symbolized
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: '“Say to them, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: This prophecy concerns the prince in Jerusalem and all the Israelites who are there.’ '
  '11':
  - type: text
    content: Say to them, ‘I am a sign to you.’
  - type: text
    content: “As I have done, so it will be done to them. They will go into exile as captives.
  '12':
  - type: text
    content: '“The prince among them will put his things on his shoulder at dusk and leave, and a hole will be dug in the wall for him to go through. He will cover his face so that he cannot see the land. '
  '13':
  - type: text
    content: 'I will spread my net for him, and he will be caught in my snare; I will bring him to Babylonia, the land of the Chaldeans, but he will not see it, and there he will die. '
  '14':
  - type: text
    content: I will scatter to the winds all those around him—his staff and all his troops—and I will pursue them with drawn sword.
  '15':
  - type: text
    content: '“They will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ', when I disperse them among the nations and scatter them through the countries. '
  '16':
  - type: text
    content: 'But I will spare a few of them from the sword, famine and plague, so that in the nations where they go they may acknowledge all their detestable practices. Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '17':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '18':
  - type: text
    content: '“Son of man, tremble as you eat your food, and shudder in fear as you drink your water. '
  '19':
  - type: text
    content: 'Say to the people of the land: ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says about those living in Jerusalem and in the land of Israel: They will eat their food in anxiety and drink their water in despair, for their land will be stripped of everything in it because of the violence of all who live there. '
  '2':
  - type: text
    content: “Son of man, you are living among a rebellious people. They have eyes to see but do not see and ears to hear but do not hear, for they are a rebellious people.
  '20':
  - type: text
    content: 'The inhabited towns will be laid waste and the land will be desolate. Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  - type: heading
    content: There Will Be No Delay
  '21':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '22':
  - type: text
    content: '“Son of man, what is this proverb you have in the land of Israel: ‘The days go by and every vision comes to nothing’? '
  '23':
  - type: text
    content: 'Say to them, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am going to put an end to this proverb, and they will no longer quote it in Israel.’ Say to them, ‘The days are near when every vision will be fulfilled. '
  '24':
  - type: text
    content: 'For there will be no more false visions or flattering divinations among the people of Israel. '
  '25':
  - type: text
    content: 'But I the '
  - type: text
    content: Lord
  - type: text
    content: ' will speak what I will, and it shall be fulfilled without delay. For in your days, you rebellious people, I will fulfill whatever I say, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  '26':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '27':
  - type: text
    content: “Son of man, the Israelites are saying, ‘The vision he sees is for many years from now, and he prophesies about the distant future.’
  '28':
  - type: text
    content: '“Therefore say to them, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: None of my words will be delayed any longer; whatever I say will be fulfilled, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  '3':
  - type: text
    content: '“Therefore, son of man, pack your belongings for exile and in the daytime, as they watch, set out and go from where you are to another place. Perhaps they will understand, though they are a rebellious people. '
  '4':
  - type: text
    content: 'During the daytime, while they watch, bring out your belongings packed for exile. Then in the evening, while they are watching, go out like those who go into exile. '
  '5':
  - type: text
    content: 'While they watch, dig through the wall and take your belongings out through it. '
  '6':
  - type: text
    content: Put them on your shoulder as they are watching and carry them out at dusk. Cover your face so that you cannot see the land, for I have made you a sign to the Israelites.”
  '7':
  - type: text
    content: So I did as I was commanded. During the day I brought out my things packed for exile. Then in the evening I dug through the wall with my hands. I took my belongings out at dusk, carrying them on my shoulders while they watched.
  '8':
  - type: text
    content: 'In the morning the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '9':
  - type: text
    content: “Son of man, did not the Israelites, that rebellious people, ask you, ‘What are you doing?’
