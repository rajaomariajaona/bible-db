document_id: MAT.13,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Parable of the Sower
  - type: text
    content: 'That same day Jesus went out of the house and sat by the lake. '
  '10':
  - type: text
    content: The disciples came to him and asked, “Why do you speak to the people in parables?”
  '11':
  - type: text
    content: 'He replied, '
  - type: text
    content: “Because the knowledge of the secrets of the kingdom of heaven has been given to you, but not to them.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Whoever has will be given more, and they will have an abundance. Whoever does not have, even what they have will be taken from them.
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'This is why I speak to them in parables:'
  - type: text
    content: “Though seeing, they do not see;
  - type: text
    content: though hearing, they do not hear or understand.
  '14':
  - type: text
    content: ' '
  - type: text
    content: 'In them is fulfilled the prophecy of Isaiah:'
  - type: text
    content: “ ‘You will be ever hearing but never understanding;
  - type: text
    content: you will be ever seeing but never perceiving.
  '15':
  - type: text
    content: ' '
  - type: text
    content: For this people’s heart has become calloused;
  - type: text
    content: they hardly hear with their ears,
  - type: text
    content: and they have closed their eyes.
  - type: text
    content: Otherwise they might see with their eyes,
  - type: text
    content: hear with their ears,
  - type: text
    content: understand with their hearts
  - type: text
    content: and turn, and I would heal them.’
  - type: note
    content: Isaiah 6:9,10 (see Septuagint)
  '16':
  - type: text
    content: ' '
  - type: text
    content: But blessed are your eyes because they see, and your ears because they hear.
  - type: text
    content: ' '
  '17':
  - type: text
    content: For truly I tell you, many prophets and righteous people longed to see what you see but did not see it, and to hear what you hear but did not hear it.
  '18':
  - type: text
    content: ' '
  - type: text
    content: '“Listen then to what the parable of the sower means:'
  - type: text
    content: ' '
  '19':
  - type: text
    content: When anyone hears the message about the kingdom and does not understand it, the evil one comes and snatches away what was sown in their heart. This is the seed sown along the path.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Such large crowds gathered around him that he got into a boat and sat in it, while all the people stood on the shore. '
  '20':
  - type: text
    content: The seed falling on rocky ground refers to someone who hears the word and at once receives it with joy.
  - type: text
    content: ' '
  '21':
  - type: text
    content: But since they have no root, they last only a short time. When trouble or persecution comes because of the word, they quickly fall away.
  - type: text
    content: ' '
  '22':
  - type: text
    content: The seed falling among the thorns refers to someone who hears the word, but the worries of this life and the deceitfulness of wealth choke the word, making it unfruitful.
  - type: text
    content: ' '
  '23':
  - type: text
    content: But the seed falling on good soil refers to someone who hears the word and understands it. This is the one who produces a crop, yielding a hundred, sixty or thirty times what was sown.”
  - type: heading
    content: The Parable of the Weeds
  '24':
  - type: text
    content: 'Jesus told them another parable: '
  - type: text
    content: “The kingdom of heaven is like a man who sowed good seed in his field.
  - type: text
    content: ' '
  '25':
  - type: text
    content: But while everyone was sleeping, his enemy came and sowed weeds among the wheat, and went away.
  - type: text
    content: ' '
  '26':
  - type: text
    content: When the wheat sprouted and formed heads, then the weeds also appeared.
  '27':
  - type: text
    content: ' '
  - type: text
    content: “The owner’s servants came to him and said, ‘Sir, didn’t you sow good seed in your field? Where then did the weeds come from?’
  '28':
  - type: text
    content: ' '
  - type: text
    content: “ ‘An enemy did this,’ he replied.
  - type: text
    content: “The servants asked him, ‘Do you want us to go and pull them up?’
  '29':
  - type: text
    content: ' '
  - type: text
    content: “ ‘No,’ he answered, ‘because while you are pulling the weeds, you may uproot the wheat with them.
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Then he told them many things in parables, saying: '
  - type: text
    content: “A farmer went out to sow his seed.
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'Let both grow together until the harvest. At that time I will tell the harvesters: First collect the weeds and tie them in bundles to be burned; then gather the wheat and bring it into my barn.’ ”'
  - type: heading
    content: The Parables of the Mustard Seed and the Yeast
  '31':
  - type: text
    content: 'He told them another parable: '
  - type: text
    content: “The kingdom of heaven is like a mustard seed, which a man took and planted in his field.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Though it is the smallest of all seeds, yet when it grows, it is the largest of garden plants and becomes a tree, so that the birds come and perch in its branches.”
  '33':
  - type: text
    content: 'He told them still another parable: '
  - type: text
    content: “The kingdom of heaven is like yeast that a woman took and mixed into about sixty pounds
  - type: note
    content: Or about 27 kilograms
  - type: text
    content: ' '
  - type: text
    content: of flour until it worked all through the dough.”
  '34':
  - type: text
    content: 'Jesus spoke all these things to the crowd in parables; he did not say anything to them without using a parable. '
  '35':
  - type: text
    content: 'So was fulfilled what was spoken through the prophet:'
  - type: text
    content: “I will open my mouth in parables,
  - type: text
    content: I will utter things hidden since the creation of the world.”
  - type: note
    content: Psalm 78:2
  - type: heading
    content: The Parable of the Weeds Explained
  '36':
  - type: text
    content: Then he left the crowd and went into the house. His disciples came to him and said, “Explain to us the parable of the weeds in the field.”
  '37':
  - type: text
    content: 'He answered, '
  - type: text
    content: “The one who sowed the good seed is the Son of Man.
  - type: text
    content: ' '
  '38':
  - type: text
    content: The field is the world, and the good seed stands for the people of the kingdom. The weeds are the people of the evil one,
  - type: text
    content: ' '
  '39':
  - type: text
    content: and the enemy who sows them is the devil. The harvest is the end of the age, and the harvesters are angels.
  '4':
  - type: text
    content: As he was scattering the seed, some fell along the path, and the birds came and ate it up.
  - type: text
    content: ' '
  '40':
  - type: text
    content: ' '
  - type: text
    content: “As the weeds are pulled up and burned in the fire, so it will be at the end of the age.
  - type: text
    content: ' '
  '41':
  - type: text
    content: The Son of Man will send out his angels, and they will weed out of his kingdom everything that causes sin and all who do evil.
  - type: text
    content: ' '
  '42':
  - type: text
    content: They will throw them into the blazing furnace, where there will be weeping and gnashing of teeth.
  - type: text
    content: ' '
  '43':
  - type: text
    content: Then the righteous will shine like the sun in the kingdom of their Father. Whoever has ears, let them hear.
  - type: heading
    content: The Parables of the Hidden Treasure and the Pearl
  '44':
  - type: text
    content: ' '
  - type: text
    content: “The kingdom of heaven is like treasure hidden in a field. When a man found it, he hid it again, and then in his joy went and sold all he had and bought that field.
  '45':
  - type: text
    content: ' '
  - type: text
    content: “Again, the kingdom of heaven is like a merchant looking for fine pearls.
  - type: text
    content: ' '
  '46':
  - type: text
    content: When he found one of great value, he went away and sold everything he had and bought it.
  - type: heading
    content: The Parable of the Net
  '47':
  - type: text
    content: ' '
  - type: text
    content: “Once again, the kingdom of heaven is like a net that was let down into the lake and caught all kinds of fish.
  - type: text
    content: ' '
  '48':
  - type: text
    content: When it was full, the fishermen pulled it up on the shore. Then they sat down and collected the good fish in baskets, but threw the bad away.
  - type: text
    content: ' '
  '49':
  - type: text
    content: This is how it will be at the end of the age. The angels will come and separate the wicked from the righteous
  - type: text
    content: ' '
  '5':
  - type: text
    content: Some fell on rocky places, where it did not have much soil. It sprang up quickly, because the soil was shallow.
  - type: text
    content: ' '
  '50':
  - type: text
    content: and throw them into the blazing furnace, where there will be weeping and gnashing of teeth.
  '51':
  - type: text
    content: ' '
  - type: text
    content: “Have you understood all these things?”
  - type: text
    content: ' Jesus asked.'
  - type: text
    content: “Yes,” they replied.
  '52':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “Therefore every teacher of the law who has become a disciple in the kingdom of heaven is like the owner of a house who brings out of his storeroom new treasures as well as old.”
  - type: heading
    content: A Prophet Without Honor
  '53':
  - type: text
    content: 'When Jesus had finished these parables, he moved on from there. '
  '54':
  - type: text
    content: 'Coming to his hometown, he began teaching the people in their synagogue, and they were amazed. “Where did this man get this wisdom and these miraculous powers?” they asked. '
  '55':
  - type: text
    content: '“Isn’t this the carpenter’s son? Isn’t his mother’s name Mary, and aren’t his brothers James, Joseph, Simon and Judas? '
  '56':
  - type: text
    content: 'Aren’t all his sisters with us? Where then did this man get all these things?” '
  '57':
  - type: text
    content: And they took offense at him.
  - type: text
    content: 'But Jesus said to them, '
  - type: text
    content: “A prophet is not without honor except in his own town and in his own home.”
  '58':
  - type: text
    content: And he did not do many miracles there because of their lack of faith.
  '6':
  - type: text
    content: But when the sun came up, the plants were scorched, and they withered because they had no root.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Other seed fell among thorns, which grew up and choked the plants.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Still other seed fell on good soil, where it produced a crop—a hundred, sixty or thirty times what was sown.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Whoever has ears, let them hear.”
