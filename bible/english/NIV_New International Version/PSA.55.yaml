document_id: PSA.55,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 55In Hebrew texts 55:1-23 is numbered 55:2-24.
  - type: text
    content: 'For the director of music. With stringed instruments. A '
  - type: text
    content: maskil
  - type: note
    content: 'Title: Probably a literary or musical term'
  - type: text
    content: ' of David.'
  - type: text
    content: Listen to my prayer, O God,
  - type: text
    content: do not ignore my plea;
  '10':
  - type: text
    content: Day and night they prowl about on its walls;
  - type: text
    content: malice and abuse are within it.
  '11':
  - type: text
    content: Destructive forces are at work in the city;
  - type: text
    content: threats and lies never leave its streets.
  '12':
  - type: text
    content: If an enemy were insulting me,
  - type: text
    content: I could endure it;
  - type: text
    content: if a foe were rising against me,
  - type: text
    content: I could hide.
  '13':
  - type: text
    content: But it is you, a man like myself,
  - type: text
    content: my companion, my close friend,
  '14':
  - type: text
    content: with whom I once enjoyed sweet fellowship
  - type: text
    content: at the house of God,
  - type: text
    content: as we walked about
  - type: text
    content: among the worshipers.
  '15':
  - type: text
    content: Let death take my enemies by surprise;
  - type: text
    content: let them go down alive to the realm of the dead,
  - type: text
    content: for evil finds lodging among them.
  '16':
  - type: text
    content: As for me, I call to God,
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' saves me.'
  '17':
  - type: text
    content: Evening, morning and noon
  - type: text
    content: I cry out in distress,
  - type: text
    content: and he hears my voice.
  '18':
  - type: text
    content: He rescues me unharmed
  - type: text
    content: from the battle waged against me,
  - type: text
    content: even though many oppose me.
  '19':
  - type: text
    content: God, who is enthroned from of old,
  - type: text
    content: who does not change—
  - type: text
    content: he will hear them and humble them,
  - type: text
    content: because they have no fear of God.
  '2':
  - type: text
    content: hear me and answer me.
  - type: text
    content: My thoughts trouble me and I am distraught
  '20':
  - type: text
    content: My companion attacks his friends;
  - type: text
    content: he violates his covenant.
  '21':
  - type: text
    content: His talk is smooth as butter,
  - type: text
    content: yet war is in his heart;
  - type: text
    content: his words are more soothing than oil,
  - type: text
    content: yet they are drawn swords.
  '22':
  - type: text
    content: 'Cast your cares on the '
  - type: text
    content: Lord
  - type: text
    content: and he will sustain you;
  - type: text
    content: he will never let
  - type: text
    content: the righteous be shaken.
  '23':
  - type: text
    content: But you, God, will bring down the wicked
  - type: text
    content: into the pit of decay;
  - type: text
    content: the bloodthirsty and deceitful
  - type: text
    content: will not live out half their days.
  - type: text
    content: But as for me, I trust in you.
  '3':
  - type: text
    content: because of what my enemy is saying,
  - type: text
    content: because of the threats of the wicked;
  - type: text
    content: for they bring down suffering on me
  - type: text
    content: and assail me in their anger.
  '4':
  - type: text
    content: My heart is in anguish within me;
  - type: text
    content: the terrors of death have fallen on me.
  '5':
  - type: text
    content: Fear and trembling have beset me;
  - type: text
    content: horror has overwhelmed me.
  '6':
  - type: text
    content: I said, “Oh, that I had the wings of a dove!
  - type: text
    content: I would fly away and be at rest.
  '7':
  - type: text
    content: I would flee far away
  - type: text
    content: and stay in the desert;
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here and in the middle of verse 19.
  '8':
  - type: text
    content: I would hurry to my place of shelter,
  - type: text
    content: far from the tempest and storm.”
  '9':
  - type: text
    content: Lord, confuse the wicked, confound their words,
  - type: text
    content: for I see violence and strife in the city.
