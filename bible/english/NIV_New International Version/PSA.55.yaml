document_id: PSA.55,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 55
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 55:1-23 is numbered 55:2-24.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the director of music. With stringed instruments. A '
    - type: usfm
      marker: tl
      children:
      - type: text
        text: maskil
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Title: Probably a literary or musical term'
      marker-yv: yv-n
    - type: text
      text: ' of David.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Listen to my prayer, O God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not ignore my plea;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Day and night they prowl about on its walls;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: malice and abuse are within it.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Destructive forces are at work in the city;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: threats and lies never leave its streets.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If an enemy were insulting me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I could endure it;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: if a foe were rising against me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I could hide.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But it is you, a man like myself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my companion, my close friend,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with whom I once enjoyed sweet fellowship
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the house of God,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as we walked about
  - type: usfm
    marker: q2
    children:
    - type: text
      text: among the worshipers.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let death take my enemies by surprise;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let them go down alive to the realm of the dead,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for evil finds lodging among them.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As for me, I call to God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' saves me.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Evening, morning and noon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I cry out in distress,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he hears my voice.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He rescues me unharmed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the battle waged against me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even though many oppose me.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God, who is enthroned from of old,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who does not change—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he will hear them and humble them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because they have no fear of God.
  '2':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hear me and answer me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My thoughts trouble me and I am distraught
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My companion attacks his friends;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he violates his covenant.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: His talk is smooth as butter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet war is in his heart;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: his words are more soothing than oil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet they are drawn swords.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Cast your cares on the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he will sustain you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he will never let
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the righteous be shaken.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But you, God, will bring down the wicked
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into the pit of decay;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the bloodthirsty and deceitful
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will not live out half their days.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But as for me, I trust in you.
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of what my enemy is saying,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of the threats of the wicked;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for they bring down suffering on me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and assail me in their anger.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My heart is in anguish within me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the terrors of death have fallen on me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fear and trembling have beset me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: horror has overwhelmed me.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I said, “Oh, that I had the wings of a dove!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I would fly away and be at rest.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I would flee far away
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and stay in the desert;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '55:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew has '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Selah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (a word of uncertain meaning) here and in the middle of verse 19.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I would hurry to my place of shelter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: far from the tempest and storm.”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord, confuse the wicked, confound their words,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I see violence and strife in the city.
