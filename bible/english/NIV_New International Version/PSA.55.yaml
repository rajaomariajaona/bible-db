segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 55
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 55:1-23 is numbered 55:2-24.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the director of music. With stringed instruments. A '
  - type: usfm
    marker: tl
    children:
    - type: text
      text: maskil
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Title: Probably a literary or musical term'
    marker-yv: yv-n
  - type: text
    text: ' of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Listen to my prayer, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not ignore my plea;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: hear me and answer me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My thoughts trouble me and I am distraught
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: because of what my enemy is saying,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of the threats of the wicked;
- type: usfm
  marker: q1
  children:
  - type: text
    text: for they bring down suffering on me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and assail me in their anger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: My heart is in anguish within me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the terrors of death have fallen on me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Fear and trembling have beset me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: horror has overwhelmed me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I said, “Oh, that I had the wings of a dove!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I would fly away and be at rest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: I would flee far away
- type: usfm
  marker: q2
  children:
  - type: text
    text: and stay in the desert;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '55:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew has '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Selah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (a word of uncertain meaning) here and in the middle of verse 19.
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I would hurry to my place of shelter,
- type: usfm
  marker: q2
  children:
  - type: text
    text: far from the tempest and storm.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Lord, confuse the wicked, confound their words,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for I see violence and strife in the city.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Day and night they prowl about on its walls;
- type: usfm
  marker: q2
  children:
  - type: text
    text: malice and abuse are within it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Destructive forces are at work in the city;
- type: usfm
  marker: q2
  children:
  - type: text
    text: threats and lies never leave its streets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: If an enemy were insulting me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I could endure it;
- type: usfm
  marker: q1
  children:
  - type: text
    text: if a foe were rising against me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I could hide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But it is you, a man like myself,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my companion, my close friend,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: with whom I once enjoyed sweet fellowship
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the house of God,
- type: usfm
  marker: q1
  children:
  - type: text
    text: as we walked about
- type: usfm
  marker: q2
  children:
  - type: text
    text: among the worshipers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Let death take my enemies by surprise;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let them go down alive to the realm of the dead,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for evil finds lodging among them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: As for me, I call to God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' saves me.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Evening, morning and noon
- type: usfm
  marker: q2
  children:
  - type: text
    text: I cry out in distress,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he hears my voice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: He rescues me unharmed
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the battle waged against me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even though many oppose me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: God, who is enthroned from of old,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who does not change—
- type: usfm
  marker: q1
  children:
  - type: text
    text: he will hear them and humble them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: because they have no fear of God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: My companion attacks his friends;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he violates his covenant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: His talk is smooth as butter,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet war is in his heart;
- type: usfm
  marker: q1
  children:
  - type: text
    text: his words are more soothing than oil,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet they are drawn swords.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Cast your cares on the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he will sustain you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: he will never let
- type: usfm
  marker: q2
  children:
  - type: text
    text: the righteous be shaken.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: But you, God, will bring down the wicked
- type: usfm
  marker: q2
  children:
  - type: text
    text: into the pit of decay;
- type: usfm
  marker: q1
  children:
  - type: text
    text: the bloodthirsty and deceitful
- type: usfm
  marker: q2
  children:
  - type: text
    text: will not live out half their days.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But as for me, I trust in you.
