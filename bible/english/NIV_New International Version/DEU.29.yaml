document_id: DEU.29,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Renewal of the Covenant
  - type: note
    content: In Hebrew texts 29:1 is numbered 28:69, and 29:2-29 is numbered 29:1-28.
  - type: text
    content: 'These are the terms of the covenant the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses to make with the Israelites in Moab, in addition to the covenant he had made with them at Horeb.'
  '10':
  - type: text
    content: 'All of you are standing today in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God—your leaders and chief men, your elders and officials, and all the other men of Israel, '
  '11':
  - type: text
    content: 'together with your children and your wives, and the foreigners living in your camps who chop your wood and carry your water. '
  '12':
  - type: text
    content: 'You are standing here in order to enter into a covenant with the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, a covenant the '
  - type: text
    content: Lord
  - type: text
    content: ' is making with you this day and sealing with an oath, '
  '13':
  - type: text
    content: 'to confirm you this day as his people, that he may be your God as he promised you and as he swore to your fathers, Abraham, Isaac and Jacob. '
  '14':
  - type: text
    content: 'I am making this covenant, with its oath, not only with you '
  '15':
  - type: text
    content: 'who are standing here with us today in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God but also with those who are not here today.'
  '16':
  - type: text
    content: 'You yourselves know how we lived in Egypt and how we passed through the countries on the way here. '
  '17':
  - type: text
    content: 'You saw among them their detestable images and idols of wood and stone, of silver and gold. '
  '18':
  - type: text
    content: 'Make sure there is no man or woman, clan or tribe among you today whose heart turns away from the '
  - type: text
    content: Lord
  - type: text
    content: ' our God to go and worship the gods of those nations; make sure there is no root among you that produces such bitter poison.'
  '19':
  - type: text
    content: 'When such a person hears the words of this oath and they invoke a blessing on themselves, thinking, “I will be safe, even though I persist in going my own way,” they will bring disaster on the watered land as well as the dry. '
  '2':
  - type: text
    content: 'Moses summoned all the Israelites and said to them:'
  - type: text
    content: 'Your eyes have seen all that the '
  - type: text
    content: Lord
  - type: text
    content: ' did in Egypt to Pharaoh, to all his officials and to all his land. '
  '20':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will never be willing to forgive them; his wrath and zeal will burn against them. All the curses written in this book will fall on them, and the '
  - type: text
    content: Lord
  - type: text
    content: ' will blot out their names from under heaven. '
  '21':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will single them out from all the tribes of Israel for disaster, according to all the curses of the covenant written in this Book of the Law.'
  '22':
  - type: text
    content: 'Your children who follow you in later generations and foreigners who come from distant lands will see the calamities that have fallen on the land and the diseases with which the '
  - type: text
    content: Lord
  - type: text
    content: ' has afflicted it. '
  '23':
  - type: text
    content: 'The whole land will be a burning waste of salt and sulfur—nothing planted, nothing sprouting, no vegetation growing on it. It will be like the destruction of Sodom and Gomorrah, Admah and Zeboyim, which the '
  - type: text
    content: Lord
  - type: text
    content: ' overthrew in fierce anger. '
  '24':
  - type: text
    content: 'All the nations will ask: “Why has the '
  - type: text
    content: Lord
  - type: text
    content: ' done this to this land? Why this fierce, burning anger?”'
  '25':
  - type: text
    content: 'And the answer will be: “It is because this people abandoned the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of their ancestors, the covenant he made with them when he brought them out of Egypt. '
  '26':
  - type: text
    content: 'They went off and worshiped other gods and bowed down to them, gods they did not know, gods he had not given them. '
  '27':
  - type: text
    content: 'Therefore the '
  - type: text
    content: Lord
  - type: text
    content: '’s anger burned against this land, so that he brought on it all the curses written in this book. '
  '28':
  - type: text
    content: 'In furious anger and in great wrath the '
  - type: text
    content: Lord
  - type: text
    content: ' uprooted them from their land and thrust them into another land, as it is now.”'
  '29':
  - type: text
    content: 'The secret things belong to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God, but the things revealed belong to us and to our children forever, that we may follow all the words of this law.'
  '3':
  - type: text
    content: 'With your own eyes you saw those great trials, those signs and great wonders. '
  '4':
  - type: text
    content: 'But to this day the '
  - type: text
    content: Lord
  - type: text
    content: ' has not given you a mind that understands or eyes that see or ears that hear. '
  '5':
  - type: text
    content: 'Yet the '
  - type: text
    content: Lord
  - type: text
    content: ' says, “During the forty years that I led you through the wilderness, your clothes did not wear out, nor did the sandals on your feet. '
  '6':
  - type: text
    content: 'You ate no bread and drank no wine or other fermented drink. I did this so that you might know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.”'
  '7':
  - type: text
    content: 'When you reached this place, Sihon king of Heshbon and Og king of Bashan came out to fight against us, but we defeated them. '
  '8':
  - type: text
    content: We took their land and gave it as an inheritance to the Reubenites, the Gadites and the half-tribe of Manasseh.
  '9':
  - type: text
    content: 'Carefully follow the terms of this covenant, so that you may prosper in everything you do. '
