document_id: HAG.2,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'on the twenty-first day of the seventh month, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came through the prophet Haggai: '
  '10':
  - type: text
    content: 'On the twenty-fourth day of the ninth month, in the second year of Darius, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to the prophet Haggai: '
  '11':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says: ‘Ask the priests what the law says: '
  '12':
  - type: text
    content: If someone carries consecrated meat in the fold of their garment, and that fold touches some bread or stew, some wine, olive oil or other food, does it become consecrated?’ ”
  - type: text
    content: The priests answered, “No.”
  '13':
  - type: text
    content: Then Haggai said, “If a person defiled by contact with a dead body touches one of these things, does it become defiled?”
  - type: text
    content: “Yes,” the priests replied, “it becomes defiled.”
  '14':
  - type: text
    content: 'Then Haggai said, “ ‘So it is with this people and this nation in my sight,’ declares the '
  - type: text
    content: Lord
  - type: text
    content: . ‘Whatever they do and whatever they offer there is defiled.
  '15':
  - type: text
    content: “ ‘Now give careful thought to this from this day on
  - type: note
    content: Or to the days past
  - type: text
    content: '—consider how things were before one stone was laid on another in the '
  - type: text
    content: Lord
  - type: text
    content: '’s temple. '
  '16':
  - type: text
    content: 'When anyone came to a heap of twenty measures, there were only ten. When anyone went to a wine vat to draw fifty measures, there were only twenty. '
  '17':
  - type: text
    content: 'I struck all the work of your hands with blight, mildew and hail, yet you did not return to me,’ declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '18':
  - type: text
    content: '‘From this day on, from this twenty-fourth day of the ninth month, give careful thought to the day when the foundation of the '
  - type: text
    content: Lord
  - type: text
    content: '’s temple was laid. Give careful thought: '
  '19':
  - type: text
    content: Is there yet any seed left in the barn? Until now, the vine and the fig tree, the pomegranate and the olive tree have not borne fruit.
  - type: text
    content: “ ‘From this day on I will bless you.’ ”
  - type: heading
    content: Zerubbabel the Lord’s Signet Ring
  '2':
  - type: text
    content: “Speak to Zerubbabel son of Shealtiel, governor of Judah, to Joshua son of Jozadak,
  - type: note
    content: Hebrew Jehozadak, a variant of Jozadak; also in verse 4
  - type: text
    content: ' the high priest, and to the remnant of the people. Ask them, '
  '20':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Haggai a second time on the twenty-fourth day of the month: '
  '21':
  - type: text
    content: '“Tell Zerubbabel governor of Judah that I am going to shake the heavens and the earth. '
  '22':
  - type: text
    content: I will overturn royal thrones and shatter the power of the foreign kingdoms. I will overthrow chariots and their drivers; horses and their riders will fall, each by the sword of his brother.
  '23':
  - type: text
    content: '“ ‘On that day,’ declares the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, ‘I will take you, my servant Zerubbabel son of Shealtiel,’ declares the '
  - type: text
    content: Lord
  - type: text
    content: ', ‘and I will make you like my signet ring, for I have chosen you,’ declares the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.”'
  '3':
  - type: text
    content: '‘Who of you is left who saw this house in its former glory? How does it look to you now? Does it not seem to you like nothing? '
  '4':
  - type: text
    content: 'But now be strong, Zerubbabel,’ declares the '
  - type: text
    content: Lord
  - type: text
    content: '. ‘Be strong, Joshua son of Jozadak, the high priest. Be strong, all you people of the land,’ declares the '
  - type: text
    content: Lord
  - type: text
    content: ', ‘and work. For I am with you,’ declares the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty. '
  '5':
  - type: text
    content: ‘This is what I covenanted with you when you came out of Egypt. And my Spirit remains among you. Do not fear.’
  '6':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says: ‘In a little while I will once more shake the heavens and the earth, the sea and the dry land. '
  '7':
  - type: text
    content: 'I will shake all nations, and what is desired by all nations will come, and I will fill this house with glory,’ says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty. '
  '8':
  - type: text
    content: '‘The silver is mine and the gold is mine,’ declares the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty. '
  '9':
  - type: text
    content: '‘The glory of this present house will be greater than the glory of the former house,’ says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty. ‘And in this place I will grant peace,’ declares the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.”'
  - type: heading
    content: Blessings for a Defiled People
