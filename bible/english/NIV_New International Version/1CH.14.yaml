document_id: 1CH.14,111
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s House and Family
  - type: text
    content: 'Now Hiram king of Tyre sent messengers to David, along with cedar logs, stonemasons and carpenters to build a palace for him. '
  '10':
  - type: text
    content: 'so David inquired of God: “Shall I go and attack the Philistines? Will you deliver them into my hands?”'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' answered him, “Go, I will deliver them into your hands.”'
  '11':
  - type: text
    content: So David and his men went up to Baal Perazim, and there he defeated them. He said, “As waters break out, God has broken out against my enemies by my hand.” So that place was called Baal Perazim.
  - type: note
    content: Baal Perazim means the lord who breaks out.
  - type: text
    content: ' '
  '12':
  - type: text
    content: The Philistines had abandoned their gods there, and David gave orders to burn them in the fire.
  '13':
  - type: text
    content: 'Once more the Philistines raided the valley; '
  '14':
  - type: text
    content: 'so David inquired of God again, and God answered him, “Do not go directly after them, but circle around them and attack them in front of the poplar trees. '
  '15':
  - type: text
    content: 'As soon as you hear the sound of marching in the tops of the poplar trees, move out to battle, because that will mean God has gone out in front of you to strike the Philistine army.” '
  '16':
  - type: text
    content: So David did as God commanded him, and they struck down the Philistine army, all the way from Gibeon to Gezer.
  '17':
  - type: text
    content: 'So David’s fame spread throughout every land, and the '
  - type: text
    content: Lord
  - type: text
    content: ' made all the nations fear him.'
  '2':
  - type: text
    content: 'And David knew that the '
  - type: text
    content: Lord
  - type: text
    content: ' had established him as king over Israel and that his kingdom had been highly exalted for the sake of his people Israel.'
  '3':
  - type: text
    content: 'In Jerusalem David took more wives and became the father of more sons and daughters. '
  '4':
  - type: text
    content: 'These are the names of the children born to him there: Shammua, Shobab, Nathan, Solomon, '
  '5':
  - type: text
    content: 'Ibhar, Elishua, Elpelet, '
  '6':
  - type: text
    content: 'Nogah, Nepheg, Japhia, '
  '7':
  - type: text
    content: Elishama, Beeliada
  - type: note
    content: A variant of Eliada
  - type: text
    content: ' and Eliphelet.'
  - type: heading
    content: David Defeats the Philistines
  '8':
  - type: text
    content: 'When the Philistines heard that David had been anointed king over all Israel, they went up in full force to search for him, but David heard about it and went out to meet them. '
  '9':
  - type: text
    content: 'Now the Philistines had come and raided the Valley of Rephaim; '
