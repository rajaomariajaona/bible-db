document_id: 1CH.14,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s House and Family
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Hiram king of Tyre sent messengers to David, along with cedar logs, stonemasons and carpenters to build a palace for him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so David inquired of God: “Shall I go and attack the Philistines? Will you deliver them into my hands?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' answered him, “Go, I will deliver them into your hands.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So David and his men went up to Baal Perazim, and there he defeated them. He said, “As waters break out, God has broken out against my enemies by my hand.” So that place was called Baal Perazim.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Baal Perazim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the lord who breaks out.
      marker-yv: yv-n
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Philistines had abandoned their gods there, and David gave orders to burn them in the fire.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Once more the Philistines raided the valley; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so David inquired of God again, and God answered him, “Do not go directly after them, but circle around them and attack them in front of the poplar trees. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As soon as you hear the sound of marching in the tops of the poplar trees, move out to battle, because that will mean God has gone out in front of you to strike the Philistine army.” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So David did as God commanded him, and they struck down the Philistine army, all the way from Gibeon to Gezer.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So David’s fame spread throughout every land, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' made all the nations fear him.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And David knew that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had established him as king over Israel and that his kingdom had been highly exalted for the sake of his people Israel.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In Jerusalem David took more wives and became the father of more sons and daughters. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are the names of the children born to him there: Shammua, Shobab, Nathan, Solomon, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ibhar, Elishua, Elpelet, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nogah, Nepheg, Japhia, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elishama, Beeliada
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A variant of '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Eliada
      marker-yv: yv-n
    - type: text
      text: ' and Eliphelet.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David Defeats the Philistines
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the Philistines heard that David had been anointed king over all Israel, they went up in full force to search for him, but David heard about it and went out to meet them. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the Philistines had come and raided the Valley of Rephaim; '
