document_id: PSA.47,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 47In Hebrew texts 47:1-9 is numbered 47:2-10.
  - type: text
    content: For the director of music. Of the Sons of Korah. A psalm.
  - type: text
    content: Clap your hands, all you nations;
  - type: text
    content: shout to God with cries of joy.
  '2':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' Most High is awesome,'
  - type: text
    content: the great King over all the earth.
  '3':
  - type: text
    content: He subdued nations under us,
  - type: text
    content: peoples under our feet.
  '4':
  - type: text
    content: He chose our inheritance for us,
  - type: text
    content: the pride of Jacob, whom he loved.
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here.
  '5':
  - type: text
    content: God has ascended amid shouts of joy,
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' amid the sounding of trumpets.'
  '6':
  - type: text
    content: Sing praises to God, sing praises;
  - type: text
    content: sing praises to our King, sing praises.
  '7':
  - type: text
    content: For God is the King of all the earth;
  - type: text
    content: sing to him a psalm of praise.
  '8':
  - type: text
    content: God reigns over the nations;
  - type: text
    content: God is seated on his holy throne.
  '9':
  - type: text
    content: The nobles of the nations assemble
  - type: text
    content: as the people of the God of Abraham,
  - type: text
    content: for the kings
  - type: note
    content: Or shields
  - type: text
    content: ' of the earth belong to God;'
  - type: text
    content: he is greatly exalted.
