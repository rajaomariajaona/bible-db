document_id: 1KI.4,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Solomon’s Officials and Governors
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So King Solomon ruled over all Israel. '
  '10':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ben-Hesed—in Arubboth (Sokoh and all the land of Hepher were his);
  '11':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ben-Abinadab—in Naphoth Dor (he was married to Taphath daughter of Solomon);
  '12':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Baana son of Ahilud—in Taanach and Megiddo, and in all of Beth Shan next to Zarethan below Jezreel, from Beth Shan to Abel Meholah across to Jokmeam;
  '13':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ben-Geber—in Ramoth Gilead (the settlements of Jair son of Manasseh in Gilead were his, as well as the region of Argob in Bashan and its sixty large walled cities with bronze gate bars);
  '14':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ahinadab son of Iddo—in Mahanaim;
  '15':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ahimaaz—in Naphtali (he had married Basemath daughter of Solomon);
  '16':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Baana son of Hushai—in Asher and in Aloth;
  '17':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jehoshaphat son of Paruah—in Issachar;
  '18':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Shimei son of Ela—in Benjamin;
  '19':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Geber son of Uri—in Gilead (the country of Sihon king of the Amorites and the country of Og king of Bashan). He was the only governor over the district.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Solomon’s Daily Provisions
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And these were his chief officials:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Azariah son of Zadok—the priest;
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people of Judah and Israel were as numerous as the sand on the seashore; they ate, they drank and they were happy. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Solomon ruled over all the kingdoms from the Euphrates River to the land of the Philistines, as far as the border of Egypt. These countries brought tribute and were Solomon’s subjects all his life.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Solomon’s daily provisions were thirty cors
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, probably about 5 1/2 tons or about 5 metric tons
      marker-yv: yv-n
    - type: text
      text: ' of the finest flour and sixty cors'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, probably about 11 tons or about 10 metric tons
      marker-yv: yv-n
    - type: text
      text: ' of meal, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ten head of stall-fed cattle, twenty of pasture-fed cattle and a hundred sheep and goats, as well as deer, gazelles, roebucks and choice fowl. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For he ruled over all the kingdoms west of the Euphrates River, from Tiphsah to Gaza, and had peace on all sides. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: During Solomon’s lifetime Judah and Israel, from Dan to Beersheba, lived in safety, everyone under their own vine and under their own fig tree.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Solomon had four
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Septuagint manuscripts (see also 2 Chron. 9:25); Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: forty
      marker-yv: yv-n
    - type: text
      text: ' thousand stalls for chariot horses, and twelve thousand horses.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: charioteers
      marker-yv: yv-n
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The district governors, each in his month, supplied provisions for King Solomon and all who came to the king’s table. They saw to it that nothing was lacking. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They also brought to the proper place their quotas of barley and straw for the chariot horses and the other horses.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Solomon’s Wisdom
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God gave Solomon wisdom and very great insight, and a breadth of understanding as measureless as the sand on the seashore. '
  '3':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Elihoreph and Ahijah, sons of Shisha—secretaries;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Jehoshaphat son of Ahilud—recorder;
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Solomon’s wisdom was greater than the wisdom of all the people of the East, and greater than all the wisdom of Egypt. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He was wiser than anyone else, including Ethan the Ezrahite—wiser than Heman, Kalkol and Darda, the sons of Mahol. And his fame spread to all the surrounding nations. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He spoke three thousand proverbs and his songs numbered a thousand and five. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He spoke about plant life, from the cedar of Lebanon to the hyssop that grows out of walls. He also spoke about animals and birds, reptiles and fish. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: From all nations people came to listen to Solomon’s wisdom, sent by all the kings of the world, who had heard of his wisdom.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 4:21-34 is numbered 5:1-14.
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Benaiah son of Jehoiada—commander in chief;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Zadok and Abiathar—priests;
  '5':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Azariah son of Nathan—in charge of the district governors;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Zabud son of Nathan—a priest and adviser to the king;
  '6':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ahishar—palace administrator;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Adoniram son of Abda—in charge of forced labor.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Solomon had twelve district governors over all Israel, who supplied provisions for the king and the royal household. Each one had to provide supplies for one month in the year. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These are their names:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ben-Hur—in the hill country of Ephraim;
  '9':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Ben-Deker—in Makaz, Shaalbim, Beth Shemesh and Elon Bethhanan;
