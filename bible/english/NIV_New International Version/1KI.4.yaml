document_id: 1KI.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Solomon’s Officials and Governors
  - type: text
    content: 'So King Solomon ruled over all Israel. '
  '10':
  - type: text
    content: Ben-Hesed—in Arubboth (Sokoh and all the land of Hepher were his);
  '11':
  - type: text
    content: Ben-Abinadab—in Naphoth Dor (he was married to Taphath daughter of Solomon);
  '12':
  - type: text
    content: Baana son of Ahilud—in Taanach and Megiddo, and in all of Beth Shan next to Zarethan below Jezreel, from Beth Shan to Abel Meholah across to Jokmeam;
  '13':
  - type: text
    content: Ben-Geber—in Ramoth Gilead (the settlements of Jair son of Manasseh in Gilead were his, as well as the region of Argob in Bashan and its sixty large walled cities with bronze gate bars);
  '14':
  - type: text
    content: Ahinadab son of Iddo—in Mahanaim;
  '15':
  - type: text
    content: Ahimaaz—in Naphtali (he had married Basemath daughter of Solomon);
  '16':
  - type: text
    content: Baana son of Hushai—in Asher and in Aloth;
  '17':
  - type: text
    content: Jehoshaphat son of Paruah—in Issachar;
  '18':
  - type: text
    content: Shimei son of Ela—in Benjamin;
  '19':
  - type: text
    content: Geber son of Uri—in Gilead (the country of Sihon king of the Amorites and the country of Og king of Bashan). He was the only governor over the district.
  - type: heading
    content: Solomon’s Daily Provisions
  '2':
  - type: text
    content: 'And these were his chief officials:'
  - type: text
    content: Azariah son of Zadok—the priest;
  '20':
  - type: text
    content: 'The people of Judah and Israel were as numerous as the sand on the seashore; they ate, they drank and they were happy. '
  '21':
  - type: text
    content: And Solomon ruled over all the kingdoms from the Euphrates River to the land of the Philistines, as far as the border of Egypt. These countries brought tribute and were Solomon’s subjects all his life.
  '22':
  - type: text
    content: Solomon’s daily provisions were thirty cors
  - type: note
    content: That is, probably about 5 1/2 tons or about 5 metric tons
  - type: text
    content: ' of the finest flour and sixty cors'
  - type: note
    content: That is, probably about 11 tons or about 10 metric tons
  - type: text
    content: ' of meal, '
  '23':
  - type: text
    content: 'ten head of stall-fed cattle, twenty of pasture-fed cattle and a hundred sheep and goats, as well as deer, gazelles, roebucks and choice fowl. '
  '24':
  - type: text
    content: 'For he ruled over all the kingdoms west of the Euphrates River, from Tiphsah to Gaza, and had peace on all sides. '
  '25':
  - type: text
    content: During Solomon’s lifetime Judah and Israel, from Dan to Beersheba, lived in safety, everyone under their own vine and under their own fig tree.
  '26':
  - type: text
    content: Solomon had four
  - type: note
    content: Some Septuagint manuscripts (see also 2 Chron. 9:25); Hebrew forty
  - type: text
    content: ' thousand stalls for chariot horses, and twelve thousand horses.'
  - type: note
    content: Or charioteers
  '27':
  - type: text
    content: 'The district governors, each in his month, supplied provisions for King Solomon and all who came to the king’s table. They saw to it that nothing was lacking. '
  '28':
  - type: text
    content: They also brought to the proper place their quotas of barley and straw for the chariot horses and the other horses.
  - type: heading
    content: Solomon’s Wisdom
  '29':
  - type: text
    content: 'God gave Solomon wisdom and very great insight, and a breadth of understanding as measureless as the sand on the seashore. '
  '3':
  - type: text
    content: Elihoreph and Ahijah, sons of Shisha—secretaries;
  - type: text
    content: Jehoshaphat son of Ahilud—recorder;
  '30':
  - type: text
    content: 'Solomon’s wisdom was greater than the wisdom of all the people of the East, and greater than all the wisdom of Egypt. '
  '31':
  - type: text
    content: 'He was wiser than anyone else, including Ethan the Ezrahite—wiser than Heman, Kalkol and Darda, the sons of Mahol. And his fame spread to all the surrounding nations. '
  '32':
  - type: text
    content: 'He spoke three thousand proverbs and his songs numbered a thousand and five. '
  '33':
  - type: text
    content: 'He spoke about plant life, from the cedar of Lebanon to the hyssop that grows out of walls. He also spoke about animals and birds, reptiles and fish. '
  '34':
  - type: text
    content: From all nations people came to listen to Solomon’s wisdom, sent by all the kings of the world, who had heard of his wisdom.
  - type: note
    content: In Hebrew texts 4:21-34 is numbered 5:1-14.
  '4':
  - type: text
    content: Benaiah son of Jehoiada—commander in chief;
  - type: text
    content: Zadok and Abiathar—priests;
  '5':
  - type: text
    content: Azariah son of Nathan—in charge of the district governors;
  - type: text
    content: Zabud son of Nathan—a priest and adviser to the king;
  '6':
  - type: text
    content: Ahishar—palace administrator;
  - type: text
    content: Adoniram son of Abda—in charge of forced labor.
  '7':
  - type: text
    content: 'Solomon had twelve district governors over all Israel, who supplied provisions for the king and the royal household. Each one had to provide supplies for one month in the year. '
  '8':
  - type: text
    content: 'These are their names:'
  - type: text
    content: Ben-Hur—in the hill country of Ephraim;
  '9':
  - type: text
    content: Ben-Deker—in Makaz, Shaalbim, Beth Shemesh and Elon Bethhanan;
