document_id: JER.29,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Letter to the Exiles
  - type: text
    content: 'This is the text of the letter that the prophet Jeremiah sent from Jerusalem to the surviving elders among the exiles and to the priests, the prophets and all the other people Nebuchadnezzar had carried into exile from Jerusalem to Babylon. '
  '10':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: “When seventy years are completed for Babylon, I will come to you and fulfill my good promise to bring you back to this place. '
  '11':
  - type: text
    content: 'For I know the plans I have for you,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “plans to prosper you and not to harm you, plans to give you hope and a future. '
  '12':
  - type: text
    content: 'Then you will call on me and come and pray to me, and I will listen to you. '
  '13':
  - type: text
    content: 'You will seek me and find me when you seek me with all your heart. '
  '14':
  - type: text
    content: 'I will be found by you,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “and will bring you back from captivity.'
  - type: note
    content: Or will restore your fortunes
  - type: text
    content: ' I will gather you from all the nations and places where I have banished you,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “and will bring you back to the place from which I carried you into exile.”'
  '15':
  - type: text
    content: 'You may say, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has raised up prophets for us in Babylon,” '
  '16':
  - type: text
    content: 'but this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says about the king who sits on David’s throne and all the people who remain in this city, your fellow citizens who did not go with you into exile— '
  '17':
  - type: text
    content: 'yes, this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says: “I will send the sword, famine and plague against them and I will make them like figs that are so bad they cannot be eaten. '
  '18':
  - type: text
    content: I will pursue them with the sword, famine and plague and will make them abhorrent to all the kingdoms of the earth, a curse
  - type: note
    content: That is, their names will be used in cursing (see verse 22); or, others will see that they are cursed.
  - type: text
    content: ' and an object of horror, of scorn and reproach, among all the nations where I drive them. '
  '19':
  - type: text
    content: 'For they have not listened to my words,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “words that I sent to them again and again by my servants the prophets. And you exiles have not listened either,” declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: (This was after King Jehoiachin
  - type: note
    content: Hebrew Jeconiah, a variant of Jehoiachin
  - type: text
    content: ' and the queen mother, the court officials and the leaders of Judah and Jerusalem, the skilled workers and the artisans had gone into exile from Jerusalem.) '
  '20':
  - type: text
    content: 'Therefore, hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', all you exiles whom I have sent away from Jerusalem to Babylon. '
  '21':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says about Ahab son of Kolaiah and Zedekiah son of Maaseiah, who are prophesying lies to you in my name: “I will deliver them into the hands of Nebuchadnezzar king of Babylon, and he will put them to death before your very eyes. '
  '22':
  - type: text
    content: 'Because of them, all the exiles from Judah who are in Babylon will use this curse: ‘May the '
  - type: text
    content: Lord
  - type: text
    content: ' treat you like Zedekiah and Ahab, whom the king of Babylon burned in the fire.’ '
  '23':
  - type: text
    content: 'For they have done outrageous things in Israel; they have committed adultery with their neighbors’ wives, and in my name they have uttered lies—which I did not authorize. I know it and am a witness to it,” declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: Message to Shemaiah
  '24':
  - type: text
    content: 'Tell Shemaiah the Nehelamite, '
  '25':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says: You sent letters in your own name to all the people in Jerusalem, to the priest Zephaniah son of Maaseiah, and to all the other priests. You said to Zephaniah, '
  '26':
  - type: text
    content: '‘The '
  - type: text
    content: Lord
  - type: text
    content: ' has appointed you priest in place of Jehoiada to be in charge of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '; you should put any maniac who acts like a prophet into the stocks and neck-irons. '
  '27':
  - type: text
    content: 'So why have you not reprimanded Jeremiah from Anathoth, who poses as a prophet among you? '
  '28':
  - type: text
    content: 'He has sent this message to us in Babylon: It will be a long time. Therefore build houses and settle down; plant gardens and eat what they produce.’ ”'
  '29':
  - type: text
    content: 'Zephaniah the priest, however, read the letter to Jeremiah the prophet. '
  '3':
  - type: text
    content: 'He entrusted the letter to Elasah son of Shaphan and to Gemariah son of Hilkiah, whom Zedekiah king of Judah sent to King Nebuchadnezzar in Babylon. It said:'
  '30':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Jeremiah: '
  '31':
  - type: text
    content: '“Send this message to all the exiles: ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says about Shemaiah the Nehelamite: Because Shemaiah has prophesied to you, even though I did not send him, and has persuaded you to trust in lies, '
  '32':
  - type: text
    content: 'this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: I will surely punish Shemaiah the Nehelamite and his descendants. He will have no one left among this people, nor will he see the good things I will do for my people, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', because he has preached rebellion against me.’ ”'
  '4':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says to all those I carried into exile from Jerusalem to Babylon: '
  '5':
  - type: text
    content: '“Build houses and settle down; plant gardens and eat what they produce. '
  '6':
  - type: text
    content: 'Marry and have sons and daughters; find wives for your sons and give your daughters in marriage, so that they too may have sons and daughters. Increase in number there; do not decrease. '
  '7':
  - type: text
    content: 'Also, seek the peace and prosperity of the city to which I have carried you into exile. Pray to the '
  - type: text
    content: Lord
  - type: text
    content: ' for it, because if it prospers, you too will prosper.” '
  '8':
  - type: text
    content: 'Yes, this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says: “Do not let the prophets and diviners among you deceive you. Do not listen to the dreams you encourage them to have. '
  '9':
  - type: text
    content: 'They are prophesying lies to you in my name. I have not sent them,” declares the '
  - type: text
    content: Lord
  - type: text
    content: .
