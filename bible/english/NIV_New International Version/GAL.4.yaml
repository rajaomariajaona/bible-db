document_id: GAL.4,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'What I am saying is that as long as an heir is underage, he is no different from a slave, although he owns the whole estate. '
  '10':
  - type: text
    content: 'You are observing special days and months and seasons and years! '
  '11':
  - type: text
    content: I fear for you, that somehow I have wasted my efforts on you.
  '12':
  - type: text
    content: 'I plead with you, brothers and sisters, become like me, for I became like you. You did me no wrong. '
  '13':
  - type: text
    content: 'As you know, it was because of an illness that I first preached the gospel to you, '
  '14':
  - type: text
    content: 'and even though my illness was a trial to you, you did not treat me with contempt or scorn. Instead, you welcomed me as if I were an angel of God, as if I were Christ Jesus himself. '
  '15':
  - type: text
    content: 'Where, then, is your blessing of me now? I can testify that, if you could have done so, you would have torn out your eyes and given them to me. '
  '16':
  - type: text
    content: Have I now become your enemy by telling you the truth?
  '17':
  - type: text
    content: 'Those people are zealous to win you over, but for no good. What they want is to alienate you from us, so that you may have zeal for them. '
  '18':
  - type: text
    content: 'It is fine to be zealous, provided the purpose is good, and to be so always, not just when I am with you. '
  '19':
  - type: text
    content: 'My dear children, for whom I am again in the pains of childbirth until Christ is formed in you, '
  '2':
  - type: text
    content: 'The heir is subject to guardians and trustees until the time set by his father. '
  '20':
  - type: text
    content: how I wish I could be with you now and change my tone, because I am perplexed about you!
  - type: heading
    content: Hagar and Sarah
  '21':
  - type: text
    content: 'Tell me, you who want to be under the law, are you not aware of what the law says? '
  '22':
  - type: text
    content: 'For it is written that Abraham had two sons, one by the slave woman and the other by the free woman. '
  '23':
  - type: text
    content: His son by the slave woman was born according to the flesh, but his son by the free woman was born as the result of a divine promise.
  '24':
  - type: text
    content: 'These things are being taken figuratively: The women represent two covenants. One covenant is from Mount Sinai and bears children who are to be slaves: This is Hagar. '
  '25':
  - type: text
    content: 'Now Hagar stands for Mount Sinai in Arabia and corresponds to the present city of Jerusalem, because she is in slavery with her children. '
  '26':
  - type: text
    content: 'But the Jerusalem that is above is free, and she is our mother. '
  '27':
  - type: text
    content: 'For it is written:'
  - type: text
    content: “Be glad, barren woman,
  - type: text
    content: you who never bore a child;
  - type: text
    content: shout for joy and cry aloud,
  - type: text
    content: you who were never in labor;
  - type: text
    content: because more are the children of the desolate woman
  - type: text
    content: than of her who has a husband.”
  - type: note
    content: Isaiah 54:1
  '28':
  - type: text
    content: 'Now you, brothers and sisters, like Isaac, are children of promise. '
  '29':
  - type: text
    content: 'At that time the son born according to the flesh persecuted the son born by the power of the Spirit. It is the same now. '
  '3':
  - type: text
    content: So also, when we were underage, we were in slavery under the elemental spiritual forces
  - type: note
    content: Or under the basic principles
  - type: text
    content: ' of the world. '
  '30':
  - type: text
    content: But what does Scripture say? “Get rid of the slave woman and her son, for the slave woman’s son will never share in the inheritance with the free woman’s son.”
  - type: note
    content: Gen. 21:10
  - type: text
    content: ' '
  '31':
  - type: text
    content: Therefore, brothers and sisters, we are not children of the slave woman, but of the free woman.
  '4':
  - type: text
    content: 'But when the set time had fully come, God sent his Son, born of a woman, born under the law, '
  '5':
  - type: text
    content: to redeem those under the law, that we might receive adoption to sonship.
  - type: note
    content: The Greek word for adoption to sonship is a legal term referring to the full legal standing of an adopted male heir in Roman culture.
  - type: text
    content: ' '
  '6':
  - type: text
    content: Because you are his sons, God sent the Spirit of his Son into our hearts, the Spirit who calls out, “
  - type: text
    content: Abba,
  - type: note
    content: Aramaic for Father
  - type: text
    content: ' Father.” '
  '7':
  - type: text
    content: So you are no longer a slave, but God’s child; and since you are his child, God has made you also an heir.
  - type: heading
    content: Paul’s Concern for the Galatians
  '8':
  - type: text
    content: 'Formerly, when you did not know God, you were slaves to those who by nature are not gods. '
  '9':
  - type: text
    content: But now that you know God—or rather are known by God—how is it that you are turning back to those weak and miserable forces
  - type: note
    content: Or principles
  - type: text
    content: '? Do you wish to be enslaved by them all over again? '
