document_id: GAL.4
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'What I am saying is that as long as an heir is underage, he is no different from a slave, although he owns the whole estate. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The heir is subject to guardians and trustees until the time set by his father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: So also, when we were underage, we were in slavery under the elemental spiritual forces
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: under the basic principles
    marker-yv: yv-n
  - type: text
    text: ' of the world. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'But when the set time had fully come, God sent his Son, born of a woman, born under the law, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: to redeem those under the law, that we might receive adoption to sonship.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek word for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'adoption to sonship '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is a legal term referring to the full legal standing of an adopted male heir in Roman culture.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Because you are his sons, God sent the Spirit of his Son into our hearts, the Spirit who calls out, “
  - type: usfm
    marker: tl
    children:
    - type: text
      text: Abba,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Aramaic for '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Father
    marker-yv: yv-n
  - type: text
    text: ' Father.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So you are no longer a slave, but God’s child; and since you are his child, God has made you also an heir.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Concern for the Galatians
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Formerly, when you did not know God, you were slaves to those who by nature are not gods. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But now that you know God—or rather are known by God—how is it that you are turning back to those weak and miserable forces
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: principles
    marker-yv: yv-n
  - type: text
    text: '? Do you wish to be enslaved by them all over again? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'You are observing special days and months and seasons and years! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: I fear for you, that somehow I have wasted my efforts on you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I plead with you, brothers and sisters, become like me, for I became like you. You did me no wrong. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'As you know, it was because of an illness that I first preached the gospel to you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'and even though my illness was a trial to you, you did not treat me with contempt or scorn. Instead, you welcomed me as if I were an angel of God, as if I were Christ Jesus himself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Where, then, is your blessing of me now? I can testify that, if you could have done so, you would have torn out your eyes and given them to me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Have I now become your enemy by telling you the truth?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Those people are zealous to win you over, but for no good. What they want is to alienate you from us, so that you may have zeal for them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'It is fine to be zealous, provided the purpose is good, and to be so always, not just when I am with you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'My dear children, for whom I am again in the pains of childbirth until Christ is formed in you, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: how I wish I could be with you now and change my tone, because I am perplexed about you!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hagar and Sarah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tell me, you who want to be under the law, are you not aware of what the law says? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For it is written that Abraham had two sons, one by the slave woman and the other by the free woman. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: His son by the slave woman was born according to the flesh, but his son by the free woman was born as the result of a divine promise.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'These things are being taken figuratively: The women represent two covenants. One covenant is from Mount Sinai and bears children who are to be slaves: This is Hagar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Now Hagar stands for Mount Sinai in Arabia and corresponds to the present city of Jerusalem, because she is in slavery with her children. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'But the Jerusalem that is above is free, and she is our mother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'For it is written:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Be glad, barren woman,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who never bore a child;
- type: usfm
  marker: q1
  children:
  - type: text
    text: shout for joy and cry aloud,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who were never in labor;
- type: usfm
  marker: q1
  children:
  - type: text
    text: because more are the children of the desolate woman
- type: usfm
  marker: q2
  children:
  - type: text
    text: than of her who has a husband.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah 54:1
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Now you, brothers and sisters, like Isaac, are children of promise. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'At that time the son born according to the flesh persecuted the son born by the power of the Spirit. It is the same now. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: But what does Scripture say? “Get rid of the slave woman and her son, for the slave woman’s son will never share in the inheritance with the free woman’s son.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gen. 21:10
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Therefore, brothers and sisters, we are not children of the slave woman, but of the free woman.
