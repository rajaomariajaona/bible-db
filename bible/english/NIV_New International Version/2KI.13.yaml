document_id: 2KI.13,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehoahaz King of Israel
  - type: text
    content: 'In the twenty-third year of Joash son of Ahaziah king of Judah, Jehoahaz son of Jehu became king of Israel in Samaria, and he reigned seventeen years. '
  '10':
  - type: text
    content: 'In the thirty-seventh year of Joash king of Judah, Jehoash son of Jehoahaz became king of Israel in Samaria, and he reigned sixteen years. '
  '11':
  - type: text
    content: 'He did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' and did not turn away from any of the sins of Jeroboam son of Nebat, which he had caused Israel to commit; he continued in them.'
  '12':
  - type: text
    content: 'As for the other events of the reign of Jehoash, all he did and his achievements, including his war against Amaziah king of Judah, are they not written in the book of the annals of the kings of Israel? '
  '13':
  - type: text
    content: Jehoash rested with his ancestors, and Jeroboam succeeded him on the throne. Jehoash was buried in Samaria with the kings of Israel.
  '14':
  - type: text
    content: Now Elisha had been suffering from the illness from which he died. Jehoash king of Israel went down to see him and wept over him. “My father! My father!” he cried. “The chariots and horsemen of Israel!”
  '15':
  - type: text
    content: 'Elisha said, “Get a bow and some arrows,” and he did so. '
  '16':
  - type: text
    content: “Take the bow in your hands,” he said to the king of Israel. When he had taken it, Elisha put his hands on the king’s hands.
  '17':
  - type: text
    content: '“Open the east window,” he said, and he opened it. “Shoot!” Elisha said, and he shot. “The '
  - type: text
    content: Lord
  - type: text
    content: ’s arrow of victory, the arrow of victory over Aram!” Elisha declared. “You will completely destroy the Arameans at Aphek.”
  '18':
  - type: text
    content: 'Then he said, “Take the arrows,” and the king took them. Elisha told him, “Strike the ground.” He struck it three times and stopped. '
  '19':
  - type: text
    content: The man of God was angry with him and said, “You should have struck the ground five or six times; then you would have defeated Aram and completely destroyed it. But now you will defeat it only three times.”
  '2':
  - type: text
    content: 'He did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' by following the sins of Jeroboam son of Nebat, which he had caused Israel to commit, and he did not turn away from them. '
  '20':
  - type: text
    content: Elisha died and was buried.
  - type: text
    content: 'Now Moabite raiders used to enter the country every spring. '
  '21':
  - type: text
    content: Once while some Israelites were burying a man, suddenly they saw a band of raiders; so they threw the man’s body into Elisha’s tomb. When the body touched Elisha’s bones, the man came to life and stood up on his feet.
  '22':
  - type: text
    content: 'Hazael king of Aram oppressed Israel throughout the reign of Jehoahaz. '
  '23':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' was gracious to them and had compassion and showed concern for them because of his covenant with Abraham, Isaac and Jacob. To this day he has been unwilling to destroy them or banish them from his presence.'
  '24':
  - type: text
    content: 'Hazael king of Aram died, and Ben-Hadad his son succeeded him as king. '
  '25':
  - type: text
    content: Then Jehoash son of Jehoahaz recaptured from Ben-Hadad son of Hazael the towns he had taken in battle from his father Jehoahaz. Three times Jehoash defeated him, and so he recovered the Israelite towns.
  '3':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger burned against Israel, and for a long time he kept them under the power of Hazael king of Aram and Ben-Hadad his son.
  '4':
  - type: text
    content: 'Then Jehoahaz sought the '
  - type: text
    content: Lord
  - type: text
    content: '’s favor, and the '
  - type: text
    content: Lord
  - type: text
    content: ' listened to him, for he saw how severely the king of Aram was oppressing Israel. '
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' provided a deliverer for Israel, and they escaped from the power of Aram. So the Israelites lived in their own homes as they had before. '
  '6':
  - type: text
    content: But they did not turn away from the sins of the house of Jeroboam, which he had caused Israel to commit; they continued in them. Also, the Asherah pole
  - type: note
    content: That is, a wooden symbol of the goddess Asherah; here and elsewhere in 2 Kings
  - type: text
    content: ' remained standing in Samaria.'
  '7':
  - type: text
    content: Nothing had been left of the army of Jehoahaz except fifty horsemen, ten chariots and ten thousand foot soldiers, for the king of Aram had destroyed the rest and made them like the dust at threshing time.
  '8':
  - type: text
    content: 'As for the other events of the reign of Jehoahaz, all he did and his achievements, are they not written in the book of the annals of the kings of Israel? '
  '9':
  - type: text
    content: Jehoahaz rested with his ancestors and was buried in Samaria. And Jehoash
  - type: note
    content: Hebrew Joash, a variant of Jehoash; also in verses 12-14 and 25
  - type: text
    content: ' his son succeeded him as king.'
  - type: heading
    content: Jehoash King of Israel
