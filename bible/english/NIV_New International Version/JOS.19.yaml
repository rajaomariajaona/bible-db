document_id: JOS.19,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Allotment for Simeon
  - type: text
    content: 'The second lot came out for the tribe of Simeon according to its clans. Their inheritance lay within the territory of Judah. '
  '10':
  - type: text
    content: 'The third lot came up for Zebulun according to its clans:'
  - type: text
    content: 'The boundary of their inheritance went as far as Sarid. '
  '11':
  - type: text
    content: 'Going west it ran to Maralah, touched Dabbesheth, and extended to the ravine near Jokneam. '
  '12':
  - type: text
    content: 'It turned east from Sarid toward the sunrise to the territory of Kisloth Tabor and went on to Daberath and up to Japhia. '
  '13':
  - type: text
    content: 'Then it continued eastward to Gath Hepher and Eth Kazin; it came out at Rimmon and turned toward Neah. '
  '14':
  - type: text
    content: 'There the boundary went around on the north to Hannathon and ended at the Valley of Iphtah El. '
  '15':
  - type: text
    content: Included were Kattath, Nahalal, Shimron, Idalah and Bethlehem. There were twelve towns and their villages.
  '16':
  - type: text
    content: These towns and their villages were the inheritance of Zebulun, according to its clans.
  - type: heading
    content: Allotment for Issachar
  '17':
  - type: text
    content: 'The fourth lot came out for Issachar according to its clans. '
  '18':
  - type: text
    content: 'Their territory included:'
  - type: text
    content: 'Jezreel, Kesulloth, Shunem, '
  '19':
  - type: text
    content: 'Hapharaim, Shion, Anaharath, '
  '2':
  - type: text
    content: 'It included:'
  - type: text
    content: Beersheba (or Sheba),
  - type: note
    content: Or Beersheba, Sheba; 1 Chron. 4:28 does not have Sheba.
  - type: text
    content: ' Moladah, '
  '20':
  - type: text
    content: 'Rabbith, Kishion, Ebez, '
  '21':
  - type: text
    content: 'Remeth, En Gannim, En Haddah and Beth Pazzez. '
  '22':
  - type: text
    content: The boundary touched Tabor, Shahazumah and Beth Shemesh, and ended at the Jordan. There were sixteen towns and their villages.
  '23':
  - type: text
    content: These towns and their villages were the inheritance of the tribe of Issachar, according to its clans.
  - type: heading
    content: Allotment for Asher
  '24':
  - type: text
    content: 'The fifth lot came out for the tribe of Asher according to its clans. '
  '25':
  - type: text
    content: 'Their territory included:'
  - type: text
    content: 'Helkath, Hali, Beten, Akshaph, '
  '26':
  - type: text
    content: 'Allammelek, Amad and Mishal. On the west the boundary touched Carmel and Shihor Libnath. '
  '27':
  - type: text
    content: 'It then turned east toward Beth Dagon, touched Zebulun and the Valley of Iphtah El, and went north to Beth Emek and Neiel, passing Kabul on the left. '
  '28':
  - type: text
    content: It went to Abdon,
  - type: note
    content: Some Hebrew manuscripts (see also 21:30); most Hebrew manuscripts Ebron
  - type: text
    content: ' Rehob, Hammon and Kanah, as far as Greater Sidon. '
  '29':
  - type: text
    content: 'The boundary then turned back toward Ramah and went to the fortified city of Tyre, turned toward Hosah and came out at the Mediterranean Sea in the region of Akzib, '
  '3':
  - type: text
    content: 'Hazar Shual, Balah, Ezem, '
  '30':
  - type: text
    content: Ummah, Aphek and Rehob. There were twenty-two towns and their villages.
  '31':
  - type: text
    content: These towns and their villages were the inheritance of the tribe of Asher, according to its clans.
  - type: heading
    content: Allotment for Naphtali
  '32':
  - type: text
    content: 'The sixth lot came out for Naphtali according to its clans:'
  '33':
  - type: text
    content: 'Their boundary went from Heleph and the large tree in Zaanannim, passing Adami Nekeb and Jabneel to Lakkum and ending at the Jordan. '
  '34':
  - type: text
    content: The boundary ran west through Aznoth Tabor and came out at Hukkok. It touched Zebulun on the south, Asher on the west and the Jordan
  - type: note
    content: Septuagint; Hebrew west, and Judah, the Jordan,
  - type: text
    content: ' on the east. '
  '35':
  - type: text
    content: 'The fortified towns were Ziddim, Zer, Hammath, Rakkath, Kinnereth, '
  '36':
  - type: text
    content: 'Adamah, Ramah, Hazor, '
  '37':
  - type: text
    content: 'Kedesh, Edrei, En Hazor, '
  '38':
  - type: text
    content: Iron, Migdal El, Horem, Beth Anath and Beth Shemesh. There were nineteen towns and their villages.
  '39':
  - type: text
    content: These towns and their villages were the inheritance of the tribe of Naphtali, according to its clans.
  - type: heading
    content: Allotment for Dan
  '4':
  - type: text
    content: 'Eltolad, Bethul, Hormah, '
  '40':
  - type: text
    content: 'The seventh lot came out for the tribe of Dan according to its clans. '
  '41':
  - type: text
    content: 'The territory of their inheritance included:'
  - type: text
    content: 'Zorah, Eshtaol, Ir Shemesh, '
  '42':
  - type: text
    content: 'Shaalabbin, Aijalon, Ithlah, '
  '43':
  - type: text
    content: 'Elon, Timnah, Ekron, '
  '44':
  - type: text
    content: 'Eltekeh, Gibbethon, Baalath, '
  '45':
  - type: text
    content: 'Jehud, Bene Berak, Gath Rimmon, '
  '46':
  - type: text
    content: Me Jarkon and Rakkon, with the area facing Joppa.
  '47':
  - type: text
    content: (When the territory of the Danites was lost to them, they went up and attacked Leshem, took it, put it to the sword and occupied it. They settled in Leshem and named it Dan after their ancestor.)
  '48':
  - type: text
    content: These towns and their villages were the inheritance of the tribe of Dan, according to its clans.
  - type: heading
    content: Allotment for Joshua
  '49':
  - type: text
    content: 'When they had finished dividing the land into its allotted portions, the Israelites gave Joshua son of Nun an inheritance among them, '
  '5':
  - type: text
    content: 'Ziklag, Beth Markaboth, Hazar Susah, '
  '50':
  - type: text
    content: 'as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded. They gave him the town he asked for—Timnath Serah'
  - type: note
    content: Also known as Timnath Heres (see Judges 2:9)
  - type: text
    content: ' in the hill country of Ephraim. And he built up the town and settled there.'
  '51':
  - type: text
    content: 'These are the territories that Eleazar the priest, Joshua son of Nun and the heads of the tribal clans of Israel assigned by lot at Shiloh in the presence of the '
  - type: text
    content: Lord
  - type: text
    content: ' at the entrance to the tent of meeting. And so they finished dividing the land.'
  '6':
  - type: text
    content: Beth Lebaoth and Sharuhen—thirteen towns and their villages;
  '7':
  - type: text
    content: 'Ain, Rimmon, Ether and Ashan—four towns and their villages— '
  '8':
  - type: text
    content: and all the villages around these towns as far as Baalath Beer (Ramah in the Negev).
  - type: text
    content: 'This was the inheritance of the tribe of the Simeonites, according to its clans. '
  '9':
  - type: text
    content: The inheritance of the Simeonites was taken from the share of Judah, because Judah’s portion was more than they needed. So the Simeonites received their inheritance within the territory of Judah.
  - type: heading
    content: Allotment for Zebulun
