document_id: GEN.12,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Call of Abram
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' had said to Abram, “Go from your country, your people and your father’s household to the land I will show you.'
  '10':
  - type: text
    content: 'Now there was a famine in the land, and Abram went down to Egypt to live there for a while because the famine was severe. '
  '11':
  - type: text
    content: 'As he was about to enter Egypt, he said to his wife Sarai, “I know what a beautiful woman you are. '
  '12':
  - type: text
    content: 'When the Egyptians see you, they will say, ‘This is his wife.’ Then they will kill me but will let you live. '
  '13':
  - type: text
    content: Say you are my sister, so that I will be treated well for your sake and my life will be spared because of you.”
  '14':
  - type: text
    content: 'When Abram came to Egypt, the Egyptians saw that Sarai was a very beautiful woman. '
  '15':
  - type: text
    content: 'And when Pharaoh’s officials saw her, they praised her to Pharaoh, and she was taken into his palace. '
  '16':
  - type: text
    content: He treated Abram well for her sake, and Abram acquired sheep and cattle, male and female donkeys, male and female servants, and camels.
  '17':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' inflicted serious diseases on Pharaoh and his household because of Abram’s wife Sarai. '
  '18':
  - type: text
    content: 'So Pharaoh summoned Abram. “What have you done to me?” he said. “Why didn’t you tell me she was your wife? '
  '19':
  - type: text
    content: 'Why did you say, ‘She is my sister,’ so that I took her to be my wife? Now then, here is your wife. Take her and go!” '
  '2':
  - type: text
    content: “I will make you into a great nation,
  - type: text
    content: and I will bless you;
  - type: text
    content: I will make your name great,
  - type: text
    content: and you will be a blessing.
  - type: note
    content: Or be seen as blessed
  '20':
  - type: text
    content: Then Pharaoh gave orders about Abram to his men, and they sent him on his way, with his wife and everything he had.
  '3':
  - type: text
    content: I will bless those who bless you,
  - type: text
    content: and whoever curses you I will curse;
  - type: text
    content: and all peoples on earth
  - type: text
    content: will be blessed through you.”
  - type: note
    content: Or earth / will use your name in blessings (see 48:20)
  '4':
  - type: text
    content: 'So Abram went, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had told him; and Lot went with him. Abram was seventy-five years old when he set out from Harran. '
  '5':
  - type: text
    content: He took his wife Sarai, his nephew Lot, all the possessions they had accumulated and the people they had acquired in Harran, and they set out for the land of Canaan, and they arrived there.
  '6':
  - type: text
    content: 'Abram traveled through the land as far as the site of the great tree of Moreh at Shechem. At that time the Canaanites were in the land. '
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to Abram and said, “To your offspring'
  - type: note
    content: Or seed
  - type: text
    content: ' I will give this land.” So he built an altar there to the '
  - type: text
    content: Lord
  - type: text
    content: ', who had appeared to him.'
  '8':
  - type: text
    content: 'From there he went on toward the hills east of Bethel and pitched his tent, with Bethel on the west and Ai on the east. There he built an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' and called on the name of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: Then Abram set out and continued toward the Negev.
  - type: heading
    content: Abram in Egypt
