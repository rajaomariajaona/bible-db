document_id: GEN.12,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Call of Abram
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had said to Abram, “Go from your country, your people and your father’s household to the land I will show you.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now there was a famine in the land, and Abram went down to Egypt to live there for a while because the famine was severe. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As he was about to enter Egypt, he said to his wife Sarai, “I know what a beautiful woman you are. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the Egyptians see you, they will say, ‘This is his wife.’ Then they will kill me but will let you live. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Say you are my sister, so that I will be treated well for your sake and my life will be spared because of you.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Abram came to Egypt, the Egyptians saw that Sarai was a very beautiful woman. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when Pharaoh’s officials saw her, they praised her to Pharaoh, and she was taken into his palace. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He treated Abram well for her sake, and Abram acquired sheep and cattle, male and female donkeys, male and female servants, and camels.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' inflicted serious diseases on Pharaoh and his household because of Abram’s wife Sarai. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Pharaoh summoned Abram. “What have you done to me?” he said. “Why didn’t you tell me she was your wife? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Why did you say, ‘She is my sister,’ so that I took her to be my wife? Now then, here is your wife. Take her and go!” '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will make you into a great nation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will bless you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make your name great,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will be a blessing.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: be seen as blessed
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Pharaoh gave orders about Abram to his men, and they sent him on his way, with his wife and everything he had.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will bless those who bless you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and whoever curses you I will curse;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and all peoples on earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will be blessed through you.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'earth / will use your name in blessings '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (see 48:20)
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Abram went, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had told him; and Lot went with him. Abram was seventy-five years old when he set out from Harran. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He took his wife Sarai, his nephew Lot, all the possessions they had accumulated and the people they had acquired in Harran, and they set out for the land of Canaan, and they arrived there.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abram traveled through the land as far as the site of the great tree of Moreh at Shechem. At that time the Canaanites were in the land. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' appeared to Abram and said, “To your offspring'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: seed
      marker-yv: yv-n
    - type: text
      text: ' I will give this land.” So he built an altar there to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who had appeared to him.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From there he went on toward the hills east of Bethel and pitched his tent, with Bethel on the west and Ai on the east. There he built an altar to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and called on the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Abram set out and continued toward the Negev.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Abram in Egypt
    marker-yv: yv-h
