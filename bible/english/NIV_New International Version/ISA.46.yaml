document_id: ISA.46,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Gods of Babylon
  - type: text
    content: Bel bows down, Nebo stoops low;
  - type: text
    content: their idols are borne by beasts of burden.
  - type: note
    content: Or are but beasts and cattle
  - type: text
    content: The images that are carried about are burdensome,
  - type: text
    content: a burden for the weary.
  '10':
  - type: text
    content: I make known the end from the beginning,
  - type: text
    content: from ancient times, what is still to come.
  - type: text
    content: I say, ‘My purpose will stand,
  - type: text
    content: and I will do all that I please.’
  '11':
  - type: text
    content: From the east I summon a bird of prey;
  - type: text
    content: from a far-off land, a man to fulfill my purpose.
  - type: text
    content: What I have said, that I will bring about;
  - type: text
    content: what I have planned, that I will do.
  '12':
  - type: text
    content: Listen to me, you stubborn-hearted,
  - type: text
    content: you who are now far from my righteousness.
  '13':
  - type: text
    content: I am bringing my righteousness near,
  - type: text
    content: it is not far away;
  - type: text
    content: and my salvation will not be delayed.
  - type: text
    content: I will grant salvation to Zion,
  - type: text
    content: my splendor to Israel.
  '2':
  - type: text
    content: They stoop and bow down together;
  - type: text
    content: unable to rescue the burden,
  - type: text
    content: they themselves go off into captivity.
  '3':
  - type: text
    content: “Listen to me, you descendants of Jacob,
  - type: text
    content: all the remnant of the people of Israel,
  - type: text
    content: you whom I have upheld since your birth,
  - type: text
    content: and have carried since you were born.
  '4':
  - type: text
    content: Even to your old age and gray hairs
  - type: text
    content: I am he, I am he who will sustain you.
  - type: text
    content: I have made you and I will carry you;
  - type: text
    content: I will sustain you and I will rescue you.
  '5':
  - type: text
    content: “With whom will you compare me or count me equal?
  - type: text
    content: To whom will you liken me that we may be compared?
  '6':
  - type: text
    content: Some pour out gold from their bags
  - type: text
    content: and weigh out silver on the scales;
  - type: text
    content: they hire a goldsmith to make it into a god,
  - type: text
    content: and they bow down and worship it.
  '7':
  - type: text
    content: They lift it to their shoulders and carry it;
  - type: text
    content: they set it up in its place, and there it stands.
  - type: text
    content: From that spot it cannot move.
  - type: text
    content: Even though someone cries out to it, it cannot answer;
  - type: text
    content: it cannot save them from their troubles.
  '8':
  - type: text
    content: “Remember this, keep it in mind,
  - type: text
    content: take it to heart, you rebels.
  '9':
  - type: text
    content: Remember the former things, those of long ago;
  - type: text
    content: I am God, and there is no other;
  - type: text
    content: I am God, and there is none like me.
