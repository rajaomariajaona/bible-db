document_id: ISA.46
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Gods of Babylon
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Bel bows down, Nebo stoops low;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their idols are borne by beasts of burden.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: are but beasts and cattle
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: The images that are carried about are burdensome,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a burden for the weary.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: They stoop and bow down together;
- type: usfm
  marker: q2
  children:
  - type: text
    text: unable to rescue the burden,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they themselves go off into captivity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Listen to me, you descendants of Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all the remnant of the people of Israel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you whom I have upheld since your birth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and have carried since you were born.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Even to your old age and gray hairs
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am he, I am he who will sustain you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have made you and I will carry you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will sustain you and I will rescue you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “With whom will you compare me or count me equal?
- type: usfm
  marker: q2
  children:
  - type: text
    text: To whom will you liken me that we may be compared?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Some pour out gold from their bags
- type: usfm
  marker: q2
  children:
  - type: text
    text: and weigh out silver on the scales;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they hire a goldsmith to make it into a god,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they bow down and worship it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: They lift it to their shoulders and carry it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they set it up in its place, and there it stands.
- type: usfm
  marker: q2
  children:
  - type: text
    text: From that spot it cannot move.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Even though someone cries out to it, it cannot answer;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it cannot save them from their troubles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “Remember this, keep it in mind,
- type: usfm
  marker: q2
  children:
  - type: text
    text: take it to heart, you rebels.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Remember the former things, those of long ago;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am God, and there is no other;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am God, and there is none like me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I make known the end from the beginning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from ancient times, what is still to come.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I say, ‘My purpose will stand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I will do all that I please.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: From the east I summon a bird of prey;
- type: usfm
  marker: q2
  children:
  - type: text
    text: from a far-off land, a man to fulfill my purpose.
- type: usfm
  marker: q1
  children:
  - type: text
    text: What I have said, that I will bring about;
- type: usfm
  marker: q2
  children:
  - type: text
    text: what I have planned, that I will do.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Listen to me, you stubborn-hearted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who are now far from my righteousness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: I am bringing my righteousness near,
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is not far away;
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my salvation will not be delayed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will grant salvation to Zion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my splendor to Israel.
