  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: A song of ascents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', remember David'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all his self-denial.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He swore an oath to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'he made a vow to the Mighty One of Jacob:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “I will not enter my house
- type: usfm
  marker: q2
  children:
  - type: text
    text: or go to my bed,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I will allow no sleep to my eyes
- type: usfm
  marker: q2
  children:
  - type: text
    text: or slumber to my eyelids,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'till I find a place for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: a dwelling for the Mighty One of Jacob.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: We heard it in Ephrathah,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'we came upon it in the fields of Jaar:'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '132:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'heard of it in Ephrathah, / we found it in the fields of Jearim. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (See 1 Chron. 13:5,6) (And no quotation marks around verses 7-9)
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: “Let us go to his dwelling place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: let us worship at his footstool, saying,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '‘Arise, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and come to your resting place,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: you and the ark of your might.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: May your priests be clothed with your righteousness;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may your faithful people sing for joy.’ ”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: For the sake of your servant David,
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not reject your anointed one.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' swore an oath to David,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'a sure oath he will not revoke:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “One of your own descendants
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will place on your throne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: If your sons keep my covenant
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the statutes I teach them,
- type: usfm
  marker: q1
  children:
  - type: text
    text: then their sons will sit
- type: usfm
  marker: q2
  children:
  - type: text
    text: on your throne for ever and ever.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has chosen Zion,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he has desired it for his dwelling, saying,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “This is my resting place for ever and ever;
- type: usfm
  marker: q2
  children:
  - type: text
    text: here I will sit enthroned, for I have desired it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: I will bless her with abundant provisions;
- type: usfm
  marker: q2
  children:
  - type: text
    text: her poor I will satisfy with food.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: I will clothe her priests with salvation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and her faithful people will ever sing for joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Here I will make a horn
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '132:17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Horn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: here symbolizes strong one, that is, king.
    marker-yv: yv-n
  - type: text
    text: ' grow for David'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and set up a lamp for my anointed one.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: I will clothe his enemies with shame,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but his head will be adorned with a radiant crown.”
