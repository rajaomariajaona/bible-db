document_id: PSA.132,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 132
  - type: text
    content: A song of ascents.
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', remember David'
  - type: text
    content: and all his self-denial.
  '10':
  - type: text
    content: For the sake of your servant David,
  - type: text
    content: do not reject your anointed one.
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' swore an oath to David,'
  - type: text
    content: 'a sure oath he will not revoke:'
  - type: text
    content: “One of your own descendants
  - type: text
    content: I will place on your throne.
  '12':
  - type: text
    content: If your sons keep my covenant
  - type: text
    content: and the statutes I teach them,
  - type: text
    content: then their sons will sit
  - type: text
    content: on your throne for ever and ever.”
  '13':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has chosen Zion,'
  - type: text
    content: he has desired it for his dwelling, saying,
  '14':
  - type: text
    content: “This is my resting place for ever and ever;
  - type: text
    content: here I will sit enthroned, for I have desired it.
  '15':
  - type: text
    content: I will bless her with abundant provisions;
  - type: text
    content: her poor I will satisfy with food.
  '16':
  - type: text
    content: I will clothe her priests with salvation,
  - type: text
    content: and her faithful people will ever sing for joy.
  '17':
  - type: text
    content: “Here I will make a horn
  - type: note
    content: Horn here symbolizes strong one, that is, king.
  - type: text
    content: ' grow for David'
  - type: text
    content: and set up a lamp for my anointed one.
  '18':
  - type: text
    content: I will clothe his enemies with shame,
  - type: text
    content: but his head will be adorned with a radiant crown.”
  '2':
  - type: text
    content: 'He swore an oath to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: 'he made a vow to the Mighty One of Jacob:'
  '3':
  - type: text
    content: “I will not enter my house
  - type: text
    content: or go to my bed,
  '4':
  - type: text
    content: I will allow no sleep to my eyes
  - type: text
    content: or slumber to my eyelids,
  '5':
  - type: text
    content: 'till I find a place for the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: a dwelling for the Mighty One of Jacob.”
  '6':
  - type: text
    content: We heard it in Ephrathah,
  - type: text
    content: 'we came upon it in the fields of Jaar:'
  - type: note
    content: Or heard of it in Ephrathah, / we found it in the fields of Jearim. (See 1 Chron. 13:5,6) (And no quotation marks around verses 7-9)
  '7':
  - type: text
    content: “Let us go to his dwelling place,
  - type: text
    content: let us worship at his footstool, saying,
  '8':
  - type: text
    content: '‘Arise, '
  - type: text
    content: Lord
  - type: text
    content: ', and come to your resting place,'
  - type: text
    content: you and the ark of your might.
  '9':
  - type: text
    content: May your priests be clothed with your righteousness;
  - type: text
    content: may your faithful people sing for joy.’ ”
