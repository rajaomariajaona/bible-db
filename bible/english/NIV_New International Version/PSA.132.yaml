document_id: PSA.132,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 132
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A song of ascents.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', remember David'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all his self-denial.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For the sake of your servant David,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not reject your anointed one.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' swore an oath to David,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'a sure oath he will not revoke:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “One of your own descendants
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will place on your throne.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If your sons keep my covenant
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the statutes I teach them,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: then their sons will sit
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on your throne for ever and ever.”
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has chosen Zion,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has desired it for his dwelling, saying,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “This is my resting place for ever and ever;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: here I will sit enthroned, for I have desired it.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will bless her with abundant provisions;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her poor I will satisfy with food.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will clothe her priests with salvation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and her faithful people will ever sing for joy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Here I will make a horn
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '132:17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Horn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: here symbolizes strong one, that is, king.
      marker-yv: yv-n
    - type: text
      text: ' grow for David'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and set up a lamp for my anointed one.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will clothe his enemies with shame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but his head will be adorned with a radiant crown.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'He swore an oath to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'he made a vow to the Mighty One of Jacob:'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will not enter my house
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or go to my bed,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will allow no sleep to my eyes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or slumber to my eyelids,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'till I find a place for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a dwelling for the Mighty One of Jacob.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We heard it in Ephrathah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'we came upon it in the fields of Jaar:'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '132:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'heard of it in Ephrathah, / we found it in the fields of Jearim. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (See 1 Chron. 13:5,6) (And no quotation marks around verses 7-9)
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Let us go to his dwelling place,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let us worship at his footstool, saying,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘Arise, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and come to your resting place,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you and the ark of your might.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May your priests be clothed with your righteousness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may your faithful people sing for joy.’ ”
