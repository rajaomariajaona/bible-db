document_id: JOS.15
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Allotment for Judah
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The allotment for the tribe of Judah, according to its clans, extended down to the territory of Edom, to the Desert of Zin in the extreme south.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Their southern boundary started from the bay at the southern end of the Dead Sea, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'crossed south of Scorpion Pass, continued on to Zin and went over to the south of Kadesh Barnea. Then it ran past Hezron up to Addar and curved around to Karka. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: It then passed along to Azmon and joined the Wadi of Egypt, ending at the Mediterranean Sea. This is their
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: your
    marker-yv: yv-n
  - type: text
    text: ' southern boundary.'
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The eastern boundary is the Dead Sea as far as the mouth of the Jordan.
- type: usfm
  marker: pi1
  children:
  - type: text
    text: 'The northern boundary started from the bay of the sea at the mouth of the Jordan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'went up to Beth Hoglah and continued north of Beth Arabah to the Stone of Bohan son of Reuben. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'The boundary then went up to Debir from the Valley of Achor and turned north to Gilgal, which faces the Pass of Adummim south of the gorge. It continued along to the waters of En Shemesh and came out at En Rogel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Then it ran up the Valley of Ben Hinnom along the southern slope of the Jebusite city (that is, Jerusalem). From there it climbed to the top of the hill west of the Hinnom Valley at the northern end of the Valley of Rephaim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'From the hilltop the boundary headed toward the spring of the waters of Nephtoah, came out at the towns of Mount Ephron and went down toward Baalah (that is, Kiriath Jearim). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Then it curved westward from Baalah to Mount Seir, ran along the northern slope of Mount Jearim (that is, Kesalon), continued down to Beth Shemesh and crossed to Timnah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: It went to the northern slope of Ekron, turned toward Shikkeron, passed along to Mount Baalah and reached Jabneel. The boundary ended at the sea.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The western boundary is the coastline of the Mediterranean Sea.
- type: usfm
  marker: p
  children:
  - type: text
    text: These are the boundaries around the people of Judah by their clans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'In accordance with the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s command to him, Joshua gave to Caleb son of Jephunneh a portion in Judah—Kiriath Arba, that is, Hebron. (Arba was the forefather of Anak.) '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'From Hebron Caleb drove out the three Anakites—Sheshai, Ahiman and Talmai, the sons of Anak. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'From there he marched against the people living in Debir (formerly called Kiriath Sepher). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'And Caleb said, “I will give my daughter Aksah in marriage to the man who attacks and captures Kiriath Sepher.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Othniel son of Kenaz, Caleb’s brother, took it; so Caleb gave his daughter Aksah to him in marriage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: One day when she came to Othniel, she urged him
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew and some Septuagint manuscripts; other Septuagint manuscripts (see also note at Judges 1:14) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Othniel, he urged her
    marker-yv: yv-n
  - type: text
    text: ' to ask her father for a field. When she got off her donkey, Caleb asked her, “What can I do for you?”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: She replied, “Do me a special favor. Since you have given me land in the Negev, give me also springs of water.” So Caleb gave her the upper and lower springs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'This is the inheritance of the tribe of Judah, according to its clans:'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The southernmost towns of the tribe of Judah in the Negev toward the boundary of Edom were:'
- type: usfm
  marker: pi1
  children:
  - type: text
    text: 'Kabzeel, Eder, Jagur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Kinah, Dimonah, Adadah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Kedesh, Hazor, Ithnan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ziph, Telem, Bealoth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Hazor Hadattah, Kerioth Hezron (that is, Hazor), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Amam, Shema, Moladah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hazar Gaddah, Heshmon, Beth Pelet, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Hazar Shual, Beersheba, Biziothiah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Baalah, Iyim, Ezem, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Eltolad, Kesil, Hormah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ziklag, Madmannah, Sansannah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Lebaoth, Shilhim, Ain and Rimmon—a total of twenty-nine towns and their villages.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'In the western foothills:'
- type: usfm
  marker: pi1
  children:
  - type: text
    text: 'Eshtaol, Zorah, Ashnah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Zanoah, En Gannim, Tappuah, Enam, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jarmuth, Adullam, Sokoh, Azekah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Shaaraim, Adithaim and Gederah (or Gederothaim)
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Gederah and Gederothaim
    marker-yv: yv-n
  - type: text
    text: —fourteen towns and their villages.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Zenan, Hadashah, Migdal Gad, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dilean, Mizpah, Joktheel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Lachish, Bozkath, Eglon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Kabbon, Lahmas, Kitlish, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Gederoth, Beth Dagon, Naamah and Makkedah—sixteen towns and their villages.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Libnah, Ether, Ashan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Iphtah, Ashnah, Nezib, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Keilah, Akzib and Mareshah—nine towns and their villages.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ekron, with its surrounding settlements and villages; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'west of Ekron, all that were in the vicinity of Ashdod, together with their villages; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Ashdod, its surrounding settlements and villages; and Gaza, its settlements and villages, as far as the Wadi of Egypt and the coastline of the Mediterranean Sea.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'In the hill country:'
- type: usfm
  marker: pi1
  children:
  - type: text
    text: 'Shamir, Jattir, Sokoh, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Dannah, Kiriath Sannah (that is, Debir), '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Anab, Eshtemoh, Anim, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Goshen, Holon and Giloh—eleven towns and their villages.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Arab, Dumah, Eshan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Janim, Beth Tappuah, Aphekah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Humtah, Kiriath Arba (that is, Hebron) and Zior—nine towns and their villages.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Maon, Carmel, Ziph, Juttah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Jezreel, Jokdeam, Zanoah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Kain, Gibeah and Timnah—ten towns and their villages.
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Halhul, Beth Zur, Gedor, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Maarath, Beth Anoth and Eltekon—six towns and their villages.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15:59 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Septuagint adds another district of eleven towns, including Tekoa and Ephrathah (Bethlehem).
    marker-yv: yv-n
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: Kiriath Baal (that is, Kiriath Jearim) and Rabbah—two towns and their villages.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'In the wilderness:'
- type: usfm
  marker: pi1
  children:
  - type: text
    text: 'Beth Arabah, Middin, Sekakah, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: Nibshan, the City of Salt and En Gedi—six towns and their villages.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: Judah could not dislodge the Jebusites, who were living in Jerusalem; to this day the Jebusites live there with the people of Judah.
