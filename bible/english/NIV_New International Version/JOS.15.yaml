document_id: JOS.15,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Allotment for Judah
  - type: text
    content: The allotment for the tribe of Judah, according to its clans, extended down to the territory of Edom, to the Desert of Zin in the extreme south.
  '10':
  - type: text
    content: 'Then it curved westward from Baalah to Mount Seir, ran along the northern slope of Mount Jearim (that is, Kesalon), continued down to Beth Shemesh and crossed to Timnah. '
  '11':
  - type: text
    content: It went to the northern slope of Ekron, turned toward Shikkeron, passed along to Mount Baalah and reached Jabneel. The boundary ended at the sea.
  '12':
  - type: text
    content: The western boundary is the coastline of the Mediterranean Sea.
  - type: text
    content: These are the boundaries around the people of Judah by their clans.
  '13':
  - type: text
    content: 'In accordance with the '
  - type: text
    content: Lord
  - type: text
    content: '’s command to him, Joshua gave to Caleb son of Jephunneh a portion in Judah—Kiriath Arba, that is, Hebron. (Arba was the forefather of Anak.) '
  '14':
  - type: text
    content: 'From Hebron Caleb drove out the three Anakites—Sheshai, Ahiman and Talmai, the sons of Anak. '
  '15':
  - type: text
    content: 'From there he marched against the people living in Debir (formerly called Kiriath Sepher). '
  '16':
  - type: text
    content: 'And Caleb said, “I will give my daughter Aksah in marriage to the man who attacks and captures Kiriath Sepher.” '
  '17':
  - type: text
    content: Othniel son of Kenaz, Caleb’s brother, took it; so Caleb gave his daughter Aksah to him in marriage.
  '18':
  - type: text
    content: One day when she came to Othniel, she urged him
  - type: note
    content: Hebrew and some Septuagint manuscripts; other Septuagint manuscripts (see also note at Judges 1:14) Othniel, he urged her
  - type: text
    content: ' to ask her father for a field. When she got off her donkey, Caleb asked her, “What can I do for you?”'
  '19':
  - type: text
    content: She replied, “Do me a special favor. Since you have given me land in the Negev, give me also springs of water.” So Caleb gave her the upper and lower springs.
  '2':
  - type: text
    content: 'Their southern boundary started from the bay at the southern end of the Dead Sea, '
  '20':
  - type: text
    content: 'This is the inheritance of the tribe of Judah, according to its clans:'
  '21':
  - type: text
    content: 'The southernmost towns of the tribe of Judah in the Negev toward the boundary of Edom were:'
  - type: text
    content: 'Kabzeel, Eder, Jagur, '
  '22':
  - type: text
    content: 'Kinah, Dimonah, Adadah, '
  '23':
  - type: text
    content: 'Kedesh, Hazor, Ithnan, '
  '24':
  - type: text
    content: 'Ziph, Telem, Bealoth, '
  '25':
  - type: text
    content: 'Hazor Hadattah, Kerioth Hezron (that is, Hazor), '
  '26':
  - type: text
    content: 'Amam, Shema, Moladah, '
  '27':
  - type: text
    content: 'Hazar Gaddah, Heshmon, Beth Pelet, '
  '28':
  - type: text
    content: 'Hazar Shual, Beersheba, Biziothiah, '
  '29':
  - type: text
    content: 'Baalah, Iyim, Ezem, '
  '3':
  - type: text
    content: 'crossed south of Scorpion Pass, continued on to Zin and went over to the south of Kadesh Barnea. Then it ran past Hezron up to Addar and curved around to Karka. '
  '30':
  - type: text
    content: 'Eltolad, Kesil, Hormah, '
  '31':
  - type: text
    content: 'Ziklag, Madmannah, Sansannah, '
  '32':
  - type: text
    content: Lebaoth, Shilhim, Ain and Rimmon—a total of twenty-nine towns and their villages.
  '33':
  - type: text
    content: 'In the western foothills:'
  - type: text
    content: 'Eshtaol, Zorah, Ashnah, '
  '34':
  - type: text
    content: 'Zanoah, En Gannim, Tappuah, Enam, '
  '35':
  - type: text
    content: 'Jarmuth, Adullam, Sokoh, Azekah, '
  '36':
  - type: text
    content: Shaaraim, Adithaim and Gederah (or Gederothaim)
  - type: note
    content: Or Gederah and Gederothaim
  - type: text
    content: —fourteen towns and their villages.
  '37':
  - type: text
    content: 'Zenan, Hadashah, Migdal Gad, '
  '38':
  - type: text
    content: 'Dilean, Mizpah, Joktheel, '
  '39':
  - type: text
    content: 'Lachish, Bozkath, Eglon, '
  '4':
  - type: text
    content: It then passed along to Azmon and joined the Wadi of Egypt, ending at the Mediterranean Sea. This is their
  - type: note
    content: Septuagint; Hebrew your
  - type: text
    content: ' southern boundary.'
  '40':
  - type: text
    content: 'Kabbon, Lahmas, Kitlish, '
  '41':
  - type: text
    content: Gederoth, Beth Dagon, Naamah and Makkedah—sixteen towns and their villages.
  '42':
  - type: text
    content: 'Libnah, Ether, Ashan, '
  '43':
  - type: text
    content: 'Iphtah, Ashnah, Nezib, '
  '44':
  - type: text
    content: Keilah, Akzib and Mareshah—nine towns and their villages.
  '45':
  - type: text
    content: 'Ekron, with its surrounding settlements and villages; '
  '46':
  - type: text
    content: 'west of Ekron, all that were in the vicinity of Ashdod, together with their villages; '
  '47':
  - type: text
    content: Ashdod, its surrounding settlements and villages; and Gaza, its settlements and villages, as far as the Wadi of Egypt and the coastline of the Mediterranean Sea.
  '48':
  - type: text
    content: 'In the hill country:'
  - type: text
    content: 'Shamir, Jattir, Sokoh, '
  '49':
  - type: text
    content: 'Dannah, Kiriath Sannah (that is, Debir), '
  '5':
  - type: text
    content: The eastern boundary is the Dead Sea as far as the mouth of the Jordan.
  - type: text
    content: 'The northern boundary started from the bay of the sea at the mouth of the Jordan, '
  '50':
  - type: text
    content: 'Anab, Eshtemoh, Anim, '
  '51':
  - type: text
    content: Goshen, Holon and Giloh—eleven towns and their villages.
  '52':
  - type: text
    content: 'Arab, Dumah, Eshan, '
  '53':
  - type: text
    content: 'Janim, Beth Tappuah, Aphekah, '
  '54':
  - type: text
    content: Humtah, Kiriath Arba (that is, Hebron) and Zior—nine towns and their villages.
  '55':
  - type: text
    content: 'Maon, Carmel, Ziph, Juttah, '
  '56':
  - type: text
    content: 'Jezreel, Jokdeam, Zanoah, '
  '57':
  - type: text
    content: Kain, Gibeah and Timnah—ten towns and their villages.
  '58':
  - type: text
    content: 'Halhul, Beth Zur, Gedor, '
  '59':
  - type: text
    content: Maarath, Beth Anoth and Eltekon—six towns and their villages.
  - type: note
    content: The Septuagint adds another district of eleven towns, including Tekoa and Ephrathah (Bethlehem).
  '6':
  - type: text
    content: 'went up to Beth Hoglah and continued north of Beth Arabah to the Stone of Bohan son of Reuben. '
  '60':
  - type: text
    content: Kiriath Baal (that is, Kiriath Jearim) and Rabbah—two towns and their villages.
  '61':
  - type: text
    content: 'In the wilderness:'
  - type: text
    content: 'Beth Arabah, Middin, Sekakah, '
  '62':
  - type: text
    content: Nibshan, the City of Salt and En Gedi—six towns and their villages.
  '63':
  - type: text
    content: Judah could not dislodge the Jebusites, who were living in Jerusalem; to this day the Jebusites live there with the people of Judah.
  '7':
  - type: text
    content: 'The boundary then went up to Debir from the Valley of Achor and turned north to Gilgal, which faces the Pass of Adummim south of the gorge. It continued along to the waters of En Shemesh and came out at En Rogel. '
  '8':
  - type: text
    content: 'Then it ran up the Valley of Ben Hinnom along the southern slope of the Jebusite city (that is, Jerusalem). From there it climbed to the top of the hill west of the Hinnom Valley at the northern end of the Valley of Rephaim. '
  '9':
  - type: text
    content: 'From the hilltop the boundary headed toward the spring of the waters of Nephtoah, came out at the towns of Mount Ephron and went down toward Baalah (that is, Kiriath Jearim). '
