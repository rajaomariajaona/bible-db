document_id: GEN.20,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Abraham and Abimelek
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Abraham moved on from there into the region of the Negev and lived between Kadesh and Shur. For a while he stayed in Gerar, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Abimelek asked Abraham, “What was your reason for doing this?”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham replied, “I said to myself, ‘There is surely no fear of God in this place, and they will kill me because of my wife.’ '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Besides, she really is my sister, the daughter of my father though not of my mother; and she became my wife. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And when God had me wander from my father’s household, I said to her, ‘This is how you can show your love to me: Everywhere we go, say of me, “He is my brother.” ’ ”'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Abimelek brought sheep and cattle and male and female slaves and gave them to Abraham, and he returned Sarah his wife to him. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And Abimelek said, “My land is before you; live wherever you like.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: To Sarah he said, “I am giving your brother a thousand shekels
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 25 pounds or about 12 kilograms
      marker-yv: yv-n
    - type: text
      text: ' of silver. This is to cover the offense against you before all who are with you; you are completely vindicated.”'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Abraham prayed to God, and God healed Abimelek, his wife and his female slaves so they could have children again, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had kept all the women in Abimelek’s household from conceiving because of Abraham’s wife Sarah.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and there Abraham said of his wife Sarah, “She is my sister.” Then Abimelek king of Gerar sent for Sarah and took her.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But God came to Abimelek in a dream one night and said to him, “You are as good as dead because of the woman you have taken; she is a married woman.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Abimelek had not gone near her, so he said, “Lord, will you destroy an innocent nation? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Did he not say to me, ‘She is my sister,’ and didn’t she also say, ‘He is my brother’? I have done this with a clear conscience and clean hands.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then God said to him in the dream, “Yes, I know you did this with a clear conscience, and so I have kept you from sinning against me. That is why I did not let you touch her. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now return the man’s wife, for he is a prophet, and he will pray for you and you will live. But if you do not return her, you may be sure that you and all who belong to you will die.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Early the next morning Abimelek summoned all his officials, and when he told them all that had happened, they were very much afraid. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Abimelek called Abraham in and said, “What have you done to us? How have I wronged you that you have brought such great guilt upon me and my kingdom? You have done things to me that should never be done.” '
