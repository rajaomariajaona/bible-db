document_id: MIC.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Human Plans and God’s Plans
  - type: text
    content: Woe to those who plan iniquity,
  - type: text
    content: to those who plot evil on their beds!
  - type: text
    content: At morning’s light they carry it out
  - type: text
    content: because it is in their power to do it.
  '10':
  - type: text
    content: Get up, go away!
  - type: text
    content: For this is not your resting place,
  - type: text
    content: because it is defiled,
  - type: text
    content: it is ruined, beyond all remedy.
  '11':
  - type: text
    content: If a liar and deceiver comes and says,
  - type: text
    content: ‘I will prophesy for you plenty of wine and beer,’
  - type: text
    content: that would be just the prophet for this people!
  - type: heading
    content: Deliverance Promised
  '12':
  - type: text
    content: “I will surely gather all of you, Jacob;
  - type: text
    content: I will surely bring together the remnant of Israel.
  - type: text
    content: I will bring them together like sheep in a pen,
  - type: text
    content: like a flock in its pasture;
  - type: text
    content: the place will throng with people.
  '13':
  - type: text
    content: The One who breaks open the way will go up before them;
  - type: text
    content: they will break through the gate and go out.
  - type: text
    content: Their King will pass through before them,
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' at their head.”'
  '2':
  - type: text
    content: They covet fields and seize them,
  - type: text
    content: and houses, and take them.
  - type: text
    content: They defraud people of their homes,
  - type: text
    content: they rob them of their inheritance.
  '3':
  - type: text
    content: 'Therefore, the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “I am planning disaster against this people,
  - type: text
    content: from which you cannot save yourselves.
  - type: text
    content: You will no longer walk proudly,
  - type: text
    content: for it will be a time of calamity.
  '4':
  - type: text
    content: In that day people will ridicule you;
  - type: text
    content: 'they will taunt you with this mournful song:'
  - type: text
    content: ‘We are utterly ruined;
  - type: text
    content: my people’s possession is divided up.
  - type: text
    content: He takes it from me!
  - type: text
    content: He assigns our fields to traitors.’ ”
  '5':
  - type: text
    content: 'Therefore you will have no one in the assembly of the '
  - type: text
    content: Lord
  - type: text
    content: to divide the land by lot.
  - type: heading
    content: False Prophets
  '6':
  - type: text
    content: “Do not prophesy,” their prophets say.
  - type: text
    content: “Do not prophesy about these things;
  - type: text
    content: disgrace will not overtake us.”
  '7':
  - type: text
    content: You descendants of Jacob, should it be said,
  - type: text
    content: '“Does the '
  - type: text
    content: Lord
  - type: text
    content: ' become'
  - type: note
    content: Or Is the Spirit of the Lord
  - type: text
    content: ' impatient?'
  - type: text
    content: Does he do such things?”
  - type: text
    content: “Do not my words do good
  - type: text
    content: to the one whose ways are upright?
  '8':
  - type: text
    content: Lately my people have risen up
  - type: text
    content: like an enemy.
  - type: text
    content: You strip off the rich robe
  - type: text
    content: from those who pass by without a care,
  - type: text
    content: like men returning from battle.
  '9':
  - type: text
    content: You drive the women of my people
  - type: text
    content: from their pleasant homes.
  - type: text
    content: You take away my blessing
  - type: text
    content: from their children forever.
