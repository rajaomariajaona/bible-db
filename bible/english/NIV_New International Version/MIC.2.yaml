document_id: MIC.2
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Human Plans and God’s Plans
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Woe to those who plan iniquity,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to those who plot evil on their beds!
- type: usfm
  marker: q1
  children:
  - type: text
    text: At morning’s light they carry it out
- type: usfm
  marker: q2
  children:
  - type: text
    text: because it is in their power to do it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: They covet fields and seize them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and houses, and take them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They defraud people of their homes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they rob them of their inheritance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Therefore, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I am planning disaster against this people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from which you cannot save yourselves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You will no longer walk proudly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for it will be a time of calamity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: In that day people will ridicule you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'they will taunt you with this mournful song:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘We are utterly ruined;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my people’s possession is divided up.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He takes it from me!
- type: usfm
  marker: q2
  children:
  - type: text
    text: He assigns our fields to traitors.’ ”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Therefore you will have no one in the assembly of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: to divide the land by lot.
- type: usfm
  marker: s1
  children:
  - type: text
    text: False Prophets
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Do not prophesy,” their prophets say.
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Do not prophesy about these things;
- type: usfm
  marker: q2
  children:
  - type: text
    text: disgrace will not overtake us.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: You descendants of Jacob, should it be said,
- type: usfm
  marker: q2
  children:
  - type: text
    text: '“Does the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' become'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Is the Spirit of the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
    marker-yv: yv-n
  - type: text
    text: ' impatient?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Does he do such things?”
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Do not my words do good
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the one whose ways are upright?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Lately my people have risen up
- type: usfm
  marker: q2
  children:
  - type: text
    text: like an enemy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You strip off the rich robe
- type: usfm
  marker: q2
  children:
  - type: text
    text: from those who pass by without a care,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like men returning from battle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You drive the women of my people
- type: usfm
  marker: q2
  children:
  - type: text
    text: from their pleasant homes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You take away my blessing
- type: usfm
  marker: q2
  children:
  - type: text
    text: from their children forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Get up, go away!
- type: usfm
  marker: q2
  children:
  - type: text
    text: For this is not your resting place,
- type: usfm
  marker: q1
  children:
  - type: text
    text: because it is defiled,
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is ruined, beyond all remedy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: If a liar and deceiver comes and says,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘I will prophesy for you plenty of wine and beer,’
- type: usfm
  marker: q2
  children:
  - type: text
    text: that would be just the prophet for this people!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Deliverance Promised
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “I will surely gather all of you, Jacob;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will surely bring together the remnant of Israel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will bring them together like sheep in a pen,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a flock in its pasture;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the place will throng with people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The One who breaks open the way will go up before them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will break through the gate and go out.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their King will pass through before them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' at their head.”'
