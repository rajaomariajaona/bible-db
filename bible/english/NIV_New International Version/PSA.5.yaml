document_id: PSA.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 5In Hebrew texts 5:1-12 is numbered 5:2-13.
  - type: text
    content: For the director of music. For pipes. A psalm of David.
  - type: text
    content: 'Listen to my words, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: consider my lament.
  '10':
  - type: text
    content: Declare them guilty, O God!
  - type: text
    content: Let their intrigues be their downfall.
  - type: text
    content: Banish them for their many sins,
  - type: text
    content: for they have rebelled against you.
  '11':
  - type: text
    content: But let all who take refuge in you be glad;
  - type: text
    content: let them ever sing for joy.
  - type: text
    content: Spread your protection over them,
  - type: text
    content: that those who love your name may rejoice in you.
  '12':
  - type: text
    content: 'Surely, '
  - type: text
    content: Lord
  - type: text
    content: ', you bless the righteous;'
  - type: text
    content: you surround them with your favor as with a shield.
  '2':
  - type: text
    content: Hear my cry for help,
  - type: text
    content: my King and my God,
  - type: text
    content: for to you I pray.
  '3':
  - type: text
    content: 'In the morning, '
  - type: text
    content: Lord
  - type: text
    content: ', you hear my voice;'
  - type: text
    content: in the morning I lay my requests before you
  - type: text
    content: and wait expectantly.
  '4':
  - type: text
    content: For you are not a God who is pleased with wickedness;
  - type: text
    content: with you, evil people are not welcome.
  '5':
  - type: text
    content: The arrogant cannot stand
  - type: text
    content: in your presence.
  - type: text
    content: You hate all who do wrong;
  '6':
  - type: text
    content: you destroy those who tell lies.
  - type: text
    content: The bloodthirsty and deceitful
  - type: text
    content: 'you, '
  - type: text
    content: Lord
  - type: text
    content: ', detest.'
  '7':
  - type: text
    content: But I, by your great love,
  - type: text
    content: can come into your house;
  - type: text
    content: in reverence I bow down
  - type: text
    content: toward your holy temple.
  '8':
  - type: text
    content: 'Lead me, '
  - type: text
    content: Lord
  - type: text
    content: ', in your righteousness'
  - type: text
    content: because of my enemies—
  - type: text
    content: make your way straight before me.
  '9':
  - type: text
    content: Not a word from their mouth can be trusted;
  - type: text
    content: their heart is filled with malice.
  - type: text
    content: Their throat is an open grave;
  - type: text
    content: with their tongues they tell lies.
