document_id: PSA.5,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 5
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 5:1-12 is numbered 5:2-13.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the director of music. For pipes. A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Listen to my words, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: consider my lament.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Declare them guilty, O God!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let their intrigues be their downfall.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Banish them for their many sins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they have rebelled against you.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But let all who take refuge in you be glad;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let them ever sing for joy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Spread your protection over them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that those who love your name may rejoice in you.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Surely, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you bless the righteous;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you surround them with your favor as with a shield.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear my cry for help,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my King and my God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for to you I pray.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'In the morning, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you hear my voice;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the morning I lay my requests before you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wait expectantly.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you are not a God who is pleased with wickedness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with you, evil people are not welcome.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The arrogant cannot stand
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in your presence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You hate all who do wrong;
  '6':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you destroy those who tell lies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The bloodthirsty and deceitful
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', detest.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But I, by your great love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: can come into your house;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in reverence I bow down
  - type: usfm
    marker: q2
    children:
    - type: text
      text: toward your holy temple.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lead me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', in your righteousness'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of my enemies—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: make your way straight before me.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Not a word from their mouth can be trusted;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their heart is filled with malice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their throat is an open grave;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with their tongues they tell lies.
