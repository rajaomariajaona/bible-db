document_id: PRO.11
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' detests dishonest scales,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but accurate weights find favor with him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When pride comes, then comes disgrace,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but with humility comes wisdom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The integrity of the upright guides them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the unfaithful are destroyed by their duplicity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Wealth is worthless in the day of wrath,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but righteousness delivers from death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The righteousness of the blameless makes their paths straight,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the wicked are brought down by their own wickedness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The righteousness of the upright delivers them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the unfaithful are trapped by evil desires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Hopes placed in mortals die with them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all the promise of
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Two Hebrew manuscripts; most Hebrew manuscripts, Vulgate, Syriac and Targum '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: When the wicked die, their hope perishes; / all they expected from
    marker-yv: yv-n
  - type: text
    text: ' their power comes to nothing.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The righteous person is rescued from trouble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and it falls on the wicked instead.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: With their mouths the godless destroy their neighbors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but through knowledge the righteous escape.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: When the righteous prosper, the city rejoices;
- type: usfm
  marker: q2
  children:
  - type: text
    text: when the wicked perish, there are shouts of joy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Through the blessing of the upright a city is exalted,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but by the mouth of the wicked it is destroyed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Whoever derides their neighbor has no sense,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the one who has understanding holds their tongue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: A gossip betrays a confidence,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a trustworthy person keeps a secret.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: For lack of guidance a nation falls,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but victory is won through many advisers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Whoever puts up security for a stranger will surely suffer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but whoever refuses to shake hands in pledge is safe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: A kindhearted woman gains honor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but ruthless men gain only wealth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Those who are kind benefit themselves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the cruel bring ruin on themselves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: A wicked person earns deceptive wages,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the one who sows righteousness reaps a sure reward.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Truly the righteous attain life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but whoever pursues evil finds death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' detests those whose hearts are perverse,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but he delights in those whose ways are blameless.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Be sure of this: The wicked will not go unpunished,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: but those who are righteous will go free.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Like a gold ring in a pig’s snout
- type: usfm
  marker: q2
  children:
  - type: text
    text: is a beautiful woman who shows no discretion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The desire of the righteous ends only in good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the hope of the wicked only in wrath.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: One person gives freely, yet gains even more;
- type: usfm
  marker: q2
  children:
  - type: text
    text: another withholds unduly, but comes to poverty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: A generous person will prosper;
- type: usfm
  marker: q2
  children:
  - type: text
    text: whoever refreshes others will be refreshed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: People curse the one who hoards grain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but they pray God’s blessing on the one who is willing to sell.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Whoever seeks good finds favor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but evil comes to one who searches for it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Those who trust in their riches will fall,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the righteous will thrive like a green leaf.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Whoever brings ruin on their family will inherit only wind,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the fool will be servant to the wise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: The fruit of the righteous is a tree of life,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the one who is wise saves lives.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: If the righteous receive their due on earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: how much more the ungodly and the sinner!
