document_id: PRO.11,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' detests dishonest scales,'
  - type: text
    content: but accurate weights find favor with him.
  '10':
  - type: text
    content: When the righteous prosper, the city rejoices;
  - type: text
    content: when the wicked perish, there are shouts of joy.
  '11':
  - type: text
    content: Through the blessing of the upright a city is exalted,
  - type: text
    content: but by the mouth of the wicked it is destroyed.
  '12':
  - type: text
    content: Whoever derides their neighbor has no sense,
  - type: text
    content: but the one who has understanding holds their tongue.
  '13':
  - type: text
    content: A gossip betrays a confidence,
  - type: text
    content: but a trustworthy person keeps a secret.
  '14':
  - type: text
    content: For lack of guidance a nation falls,
  - type: text
    content: but victory is won through many advisers.
  '15':
  - type: text
    content: Whoever puts up security for a stranger will surely suffer,
  - type: text
    content: but whoever refuses to shake hands in pledge is safe.
  '16':
  - type: text
    content: A kindhearted woman gains honor,
  - type: text
    content: but ruthless men gain only wealth.
  '17':
  - type: text
    content: Those who are kind benefit themselves,
  - type: text
    content: but the cruel bring ruin on themselves.
  '18':
  - type: text
    content: A wicked person earns deceptive wages,
  - type: text
    content: but the one who sows righteousness reaps a sure reward.
  '19':
  - type: text
    content: Truly the righteous attain life,
  - type: text
    content: but whoever pursues evil finds death.
  '2':
  - type: text
    content: When pride comes, then comes disgrace,
  - type: text
    content: but with humility comes wisdom.
  '20':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' detests those whose hearts are perverse,'
  - type: text
    content: but he delights in those whose ways are blameless.
  '21':
  - type: text
    content: 'Be sure of this: The wicked will not go unpunished,'
  - type: text
    content: but those who are righteous will go free.
  '22':
  - type: text
    content: Like a gold ring in a pig’s snout
  - type: text
    content: is a beautiful woman who shows no discretion.
  '23':
  - type: text
    content: The desire of the righteous ends only in good,
  - type: text
    content: but the hope of the wicked only in wrath.
  '24':
  - type: text
    content: One person gives freely, yet gains even more;
  - type: text
    content: another withholds unduly, but comes to poverty.
  '25':
  - type: text
    content: A generous person will prosper;
  - type: text
    content: whoever refreshes others will be refreshed.
  '26':
  - type: text
    content: People curse the one who hoards grain,
  - type: text
    content: but they pray God’s blessing on the one who is willing to sell.
  '27':
  - type: text
    content: Whoever seeks good finds favor,
  - type: text
    content: but evil comes to one who searches for it.
  '28':
  - type: text
    content: Those who trust in their riches will fall,
  - type: text
    content: but the righteous will thrive like a green leaf.
  '29':
  - type: text
    content: Whoever brings ruin on their family will inherit only wind,
  - type: text
    content: and the fool will be servant to the wise.
  '3':
  - type: text
    content: The integrity of the upright guides them,
  - type: text
    content: but the unfaithful are destroyed by their duplicity.
  '30':
  - type: text
    content: The fruit of the righteous is a tree of life,
  - type: text
    content: and the one who is wise saves lives.
  '31':
  - type: text
    content: If the righteous receive their due on earth,
  - type: text
    content: how much more the ungodly and the sinner!
  '4':
  - type: text
    content: Wealth is worthless in the day of wrath,
  - type: text
    content: but righteousness delivers from death.
  '5':
  - type: text
    content: The righteousness of the blameless makes their paths straight,
  - type: text
    content: but the wicked are brought down by their own wickedness.
  '6':
  - type: text
    content: The righteousness of the upright delivers them,
  - type: text
    content: but the unfaithful are trapped by evil desires.
  '7':
  - type: text
    content: Hopes placed in mortals die with them;
  - type: text
    content: all the promise of
  - type: note
    content: Two Hebrew manuscripts; most Hebrew manuscripts, Vulgate, Syriac and Targum When the wicked die, their hope perishes; / all they expected from
  - type: text
    content: ' their power comes to nothing.'
  '8':
  - type: text
    content: The righteous person is rescued from trouble,
  - type: text
    content: and it falls on the wicked instead.
  '9':
  - type: text
    content: With their mouths the godless destroy their neighbors,
  - type: text
    content: but through knowledge the righteous escape.
