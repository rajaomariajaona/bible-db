document_id: PSA.9,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 9Psalms 9 and 10 may originally have been a single acrostic poem in which alternating lines began with the successive letters of the Hebrew alphabet. In the Septuagint they constitute one psalm.In Hebrew texts 9:1-20 is numbered 9:2-21.
  - type: text
    content: For the director of music. To the tune of “The Death of the Son.” A psalm of David.
  - type: text
    content: 'I will give thanks to you, '
  - type: text
    content: Lord
  - type: text
    content: ', with all my heart;'
  - type: text
    content: I will tell of all your wonderful deeds.
  '10':
  - type: text
    content: Those who know your name trust in you,
  - type: text
    content: 'for you, '
  - type: text
    content: Lord
  - type: text
    content: ', have never forsaken those who seek you.'
  '11':
  - type: text
    content: 'Sing the praises of the '
  - type: text
    content: Lord
  - type: text
    content: ', enthroned in Zion;'
  - type: text
    content: proclaim among the nations what he has done.
  '12':
  - type: text
    content: For he who avenges blood remembers;
  - type: text
    content: he does not ignore the cries of the afflicted.
  '13':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', see how my enemies persecute me!'
  - type: text
    content: Have mercy and lift me up from the gates of death,
  '14':
  - type: text
    content: that I may declare your praises
  - type: text
    content: in the gates of Daughter Zion,
  - type: text
    content: and there rejoice in your salvation.
  '15':
  - type: text
    content: The nations have fallen into the pit they have dug;
  - type: text
    content: their feet are caught in the net they have hidden.
  '16':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is known by his acts of justice;'
  - type: text
    content: the wicked are ensnared by the work of their hands.
  - type: note
    content: The Hebrew has Higgaion and Selah (words of uncertain meaning) here; Selah occurs also at the end of verse 20.
  '17':
  - type: text
    content: The wicked go down to the realm of the dead,
  - type: text
    content: all the nations that forget God.
  '18':
  - type: text
    content: But God will never forget the needy;
  - type: text
    content: the hope of the afflicted will never perish.
  '19':
  - type: text
    content: 'Arise, '
  - type: text
    content: Lord
  - type: text
    content: ', do not let mortals triumph;'
  - type: text
    content: let the nations be judged in your presence.
  '2':
  - type: text
    content: I will be glad and rejoice in you;
  - type: text
    content: I will sing the praises of your name, O Most High.
  '20':
  - type: text
    content: 'Strike them with terror, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: let the nations know they are only mortal.
  '3':
  - type: text
    content: My enemies turn back;
  - type: text
    content: they stumble and perish before you.
  '4':
  - type: text
    content: For you have upheld my right and my cause,
  - type: text
    content: sitting enthroned as the righteous judge.
  '5':
  - type: text
    content: You have rebuked the nations and destroyed the wicked;
  - type: text
    content: you have blotted out their name for ever and ever.
  '6':
  - type: text
    content: Endless ruin has overtaken my enemies,
  - type: text
    content: you have uprooted their cities;
  - type: text
    content: even the memory of them has perished.
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' reigns forever;'
  - type: text
    content: he has established his throne for judgment.
  '8':
  - type: text
    content: He rules the world in righteousness
  - type: text
    content: and judges the peoples with equity.
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is a refuge for the oppressed,'
  - type: text
    content: a stronghold in times of trouble.
