document_id: PSA.9,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 9
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalms 9 and 10 may originally have been a single acrostic poem in which alternating lines began with the successive letters of the Hebrew alphabet. In the Septuagint they constitute one psalm.
      marker-yv: yv-n
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 9:1-20 is numbered 9:2-21.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the director of music. To the tune of “The Death of the Son.” A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'I will give thanks to you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', with all my heart;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will tell of all your wonderful deeds.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Those who know your name trust in you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have never forsaken those who seek you.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Sing the praises of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', enthroned in Zion;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: proclaim among the nations what he has done.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: For he who avenges blood remembers;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he does not ignore the cries of the afflicted.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', see how my enemies persecute me!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Have mercy and lift me up from the gates of death,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: that I may declare your praises
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the gates of Daughter Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there rejoice in your salvation.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: The nations have fallen into the pit they have dug;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: their feet are caught in the net they have hidden.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is known by his acts of justice;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wicked are ensnared by the work of their hands.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew has '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Higgaion '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'and '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Selah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(words of uncertain meaning) here; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Selah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: occurs also at the end of verse 20.
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: The wicked go down to the realm of the dead,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the nations that forget God.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: But God will never forget the needy;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the hope of the afflicted will never perish.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Arise, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', do not let mortals triumph;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let the nations be judged in your presence.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: I will be glad and rejoice in you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will sing the praises of your name, O Most High.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Strike them with terror, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let the nations know they are only mortal.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: My enemies turn back;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they stumble and perish before you.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: For you have upheld my right and my cause,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: sitting enthroned as the righteous judge.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: You have rebuked the nations and destroyed the wicked;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have blotted out their name for ever and ever.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Endless ruin has overtaken my enemies,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have uprooted their cities;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even the memory of them has perished.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' reigns forever;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has established his throne for judgment.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He rules the world in righteousness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and judges the peoples with equity.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is a refuge for the oppressed,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a stronghold in times of trouble.
