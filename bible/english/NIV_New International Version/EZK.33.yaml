document_id: EZK.33,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Renewal of Ezekiel’s Call as Watchman
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: '“Son of man, say to the Israelites, ‘This is what you are saying: “Our offenses and sins weigh us down, and we are wasting away because of'
  - type: note
    content: Or away in
  - type: text
    content: ' them. How then can we live?” ’ '
  '11':
  - type: text
    content: 'Say to them, ‘As surely as I live, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', I take no pleasure in the death of the wicked, but rather that they turn from their ways and live. Turn! Turn from your evil ways! Why will you die, people of Israel?’'
  '12':
  - type: text
    content: '“Therefore, son of man, say to your people, ‘If someone who is righteous disobeys, that person’s former righteousness will count for nothing. And if someone who is wicked repents, that person’s former wickedness will not bring condemnation. The righteous person who sins will not be allowed to live even though they were formerly righteous.’ '
  '13':
  - type: text
    content: 'If I tell a righteous person that they will surely live, but then they trust in their righteousness and do evil, none of the righteous things that person has done will be remembered; they will die for the evil they have done. '
  '14':
  - type: text
    content: 'And if I say to a wicked person, ‘You will surely die,’ but they then turn away from their sin and do what is just and right— '
  '15':
  - type: text
    content: 'if they give back what they took in pledge for a loan, return what they have stolen, follow the decrees that give life, and do no evil—that person will surely live; they will not die. '
  '16':
  - type: text
    content: None of the sins that person has committed will be remembered against them. They have done what is just and right; they will surely live.
  '17':
  - type: text
    content: '“Yet your people say, ‘The way of the Lord is not just.’ But it is their way that is not just. '
  '18':
  - type: text
    content: 'If a righteous person turns from their righteousness and does evil, they will die for it. '
  '19':
  - type: text
    content: 'And if a wicked person turns away from their wickedness and does what is just and right, they will live by doing so. '
  '2':
  - type: text
    content: '“Son of man, speak to your people and say to them: ‘When I bring the sword against a land, and the people of the land choose one of their men and make him their watchman, '
  '20':
  - type: text
    content: Yet you Israelites say, ‘The way of the Lord is not just.’ But I will judge each of you according to your own ways.”
  - type: heading
    content: Jerusalem’s Fall Explained
  '21':
  - type: text
    content: 'In the twelfth year of our exile, in the tenth month on the fifth day, a man who had escaped from Jerusalem came to me and said, “The city has fallen!” '
  '22':
  - type: text
    content: 'Now the evening before the man arrived, the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' was on me, and he opened my mouth before the man came to me in the morning. So my mouth was opened and I was no longer silent.'
  '23':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '24':
  - type: text
    content: '“Son of man, the people living in those ruins in the land of Israel are saying, ‘Abraham was only one man, yet he possessed the land. But we are many; surely the land has been given to us as our possession.’ '
  '25':
  - type: text
    content: 'Therefore say to them, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Since you eat meat with the blood still in it and look to your idols and shed blood, should you then possess the land? '
  '26':
  - type: text
    content: You rely on your sword, you do detestable things, and each of you defiles his neighbor’s wife. Should you then possess the land?’
  '27':
  - type: text
    content: '“Say this to them: ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: As surely as I live, those who are left in the ruins will fall by the sword, those out in the country I will give to the wild animals to be devoured, and those in strongholds and caves will die of a plague. '
  '28':
  - type: text
    content: 'I will make the land a desolate waste, and her proud strength will come to an end, and the mountains of Israel will become desolate so that no one will cross them. '
  '29':
  - type: text
    content: 'Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ', when I have made the land a desolate waste because of all the detestable things they have done.’'
  '3':
  - type: text
    content: 'and he sees the sword coming against the land and blows the trumpet to warn the people, '
  '30':
  - type: text
    content: '“As for you, son of man, your people are talking together about you by the walls and at the doors of the houses, saying to each other, ‘Come and hear the message that has come from the '
  - type: text
    content: Lord
  - type: text
    content: '.’ '
  '31':
  - type: text
    content: 'My people come to you, as they usually do, and sit before you to hear your words, but they do not put them into practice. Their mouths speak of love, but their hearts are greedy for unjust gain. '
  '32':
  - type: text
    content: Indeed, to them you are nothing more than one who sings love songs with a beautiful voice and plays an instrument well, for they hear your words but do not put them into practice.
  '33':
  - type: text
    content: “When all this comes true—and it surely will—then they will know that a prophet has been among them.”
  '4':
  - type: text
    content: 'then if anyone hears the trumpet but does not heed the warning and the sword comes and takes their life, their blood will be on their own head. '
  '5':
  - type: text
    content: 'Since they heard the sound of the trumpet but did not heed the warning, their blood will be on their own head. If they had heeded the warning, they would have saved themselves. '
  '6':
  - type: text
    content: But if the watchman sees the sword coming and does not blow the trumpet to warn the people and the sword comes and takes someone’s life, that person’s life will be taken because of their sin, but I will hold the watchman accountable for their blood.’
  '7':
  - type: text
    content: '“Son of man, I have made you a watchman for the people of Israel; so hear the word I speak and give them warning from me. '
  '8':
  - type: text
    content: When I say to the wicked, ‘You wicked person, you will surely die,’ and you do not speak out to dissuade them from their ways, that wicked person will die for
  - type: note
    content: Or in; also in verse 9
  - type: text
    content: ' their sin, and I will hold you accountable for their blood. '
  '9':
  - type: text
    content: But if you do warn the wicked person to turn from their ways and they do not do so, they will die for their sin, though you yourself will be saved.
