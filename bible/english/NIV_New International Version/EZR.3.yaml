document_id: EZR.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Rebuilding the Altar
  - type: text
    content: 'When the seventh month came and the Israelites had settled in their towns, the people assembled together as one in Jerusalem. '
  '10':
  - type: text
    content: 'When the builders laid the foundation of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', the priests in their vestments and with trumpets, and the Levites (the sons of Asaph) with cymbals, took their places to praise the '
  - type: text
    content: Lord
  - type: text
    content: ', as prescribed by David king of Israel. '
  '11':
  - type: text
    content: 'With praise and thanksgiving they sang to the '
  - type: text
    content: Lord
  - type: text
    content: ':'
  - type: text
    content: “He is good;
  - type: text
    content: his love toward Israel endures forever.”
  - type: text
    content: 'And all the people gave a great shout of praise to the '
  - type: text
    content: Lord
  - type: text
    content: ', because the foundation of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' was laid. '
  '12':
  - type: text
    content: 'But many of the older priests and Levites and family heads, who had seen the former temple, wept aloud when they saw the foundation of this temple being laid, while many others shouted for joy. '
  '13':
  - type: text
    content: No one could distinguish the sound of the shouts of joy from the sound of weeping, because the people made so much noise. And the sound was heard far away.
  '2':
  - type: text
    content: 'Then Joshua son of Jozadak and his fellow priests and Zerubbabel son of Shealtiel and his associates began to build the altar of the God of Israel to sacrifice burnt offerings on it, in accordance with what is written in the Law of Moses the man of God. '
  '3':
  - type: text
    content: 'Despite their fear of the peoples around them, they built the altar on its foundation and sacrificed burnt offerings on it to the '
  - type: text
    content: Lord
  - type: text
    content: ', both the morning and evening sacrifices. '
  '4':
  - type: text
    content: 'Then in accordance with what is written, they celebrated the Festival of Tabernacles with the required number of burnt offerings prescribed for each day. '
  '5':
  - type: text
    content: 'After that, they presented the regular burnt offerings, the New Moon sacrifices and the sacrifices for all the appointed sacred festivals of the '
  - type: text
    content: Lord
  - type: text
    content: ', as well as those brought as freewill offerings to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'On the first day of the seventh month they began to offer burnt offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ', though the foundation of the '
  - type: text
    content: Lord
  - type: text
    content: ’s temple had not yet been laid.
  - type: heading
    content: Rebuilding the Temple
  '7':
  - type: text
    content: Then they gave money to the masons and carpenters, and gave food and drink and olive oil to the people of Sidon and Tyre, so that they would bring cedar logs by sea from Lebanon to Joppa, as authorized by Cyrus king of Persia.
  '8':
  - type: text
    content: 'In the second month of the second year after their arrival at the house of God in Jerusalem, Zerubbabel son of Shealtiel, Joshua son of Jozadak and the rest of the people (the priests and the Levites and all who had returned from the captivity to Jerusalem) began the work. They appointed Levites twenty years old and older to supervise the building of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '9':
  - type: text
    content: Joshua and his sons and brothers and Kadmiel and his sons (descendants of Hodaviah
  - type: note
    content: Hebrew Yehudah, a variant of Hodaviah
  - type: text
    content: ) and the sons of Henadad and their sons and brothers—all Levites—joined together in supervising those working on the house of God.
