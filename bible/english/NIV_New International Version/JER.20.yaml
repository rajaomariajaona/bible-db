document_id: JER.20,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah and Pashhur
  - type: text
    content: 'When the priest Pashhur son of Immer, the official in charge of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', heard Jeremiah prophesying these things, '
  '10':
  - type: text
    content: I hear many whispering,
  - type: text
    content: “Terror on every side!
  - type: text
    content: Denounce him! Let’s denounce him!”
  - type: text
    content: All my friends
  - type: text
    content: are waiting for me to slip, saying,
  - type: text
    content: “Perhaps he will be deceived;
  - type: text
    content: then we will prevail over him
  - type: text
    content: and take our revenge on him.”
  '11':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' is with me like a mighty warrior;'
  - type: text
    content: so my persecutors will stumble and not prevail.
  - type: text
    content: They will fail and be thoroughly disgraced;
  - type: text
    content: their dishonor will never be forgotten.
  '12':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, you who examine the righteous'
  - type: text
    content: and probe the heart and mind,
  - type: text
    content: let me see your vengeance on them,
  - type: text
    content: for to you I have committed my cause.
  '13':
  - type: text
    content: 'Sing to the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: 'Give praise to the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: He rescues the life of the needy
  - type: text
    content: from the hands of the wicked.
  '14':
  - type: text
    content: Cursed be the day I was born!
  - type: text
    content: May the day my mother bore me not be blessed!
  '15':
  - type: text
    content: Cursed be the man who brought my father the news,
  - type: text
    content: who made him very glad, saying,
  - type: text
    content: “A child is born to you—a son!”
  '16':
  - type: text
    content: May that man be like the towns
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' overthrew without pity.'
  - type: text
    content: May he hear wailing in the morning,
  - type: text
    content: a battle cry at noon.
  '17':
  - type: text
    content: For he did not kill me in the womb,
  - type: text
    content: with my mother as my grave,
  - type: text
    content: her womb enlarged forever.
  '18':
  - type: text
    content: Why did I ever come out of the womb
  - type: text
    content: to see trouble and sorrow
  - type: text
    content: and to end my days in shame?
  '2':
  - type: text
    content: 'he had Jeremiah the prophet beaten and put in the stocks at the Upper Gate of Benjamin at the '
  - type: text
    content: Lord
  - type: text
    content: '’s temple. '
  '3':
  - type: text
    content: 'The next day, when Pashhur released him from the stocks, Jeremiah said to him, “The '
  - type: text
    content: Lord
  - type: text
    content: '’s name for you is not Pashhur, but Terror on Every Side. '
  '4':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘I will make you a terror to yourself and to all your friends; with your own eyes you will see them fall by the sword of their enemies. I will give all Judah into the hands of the king of Babylon, who will carry them away to Babylon or put them to the sword. '
  '5':
  - type: text
    content: 'I will deliver all the wealth of this city into the hands of their enemies—all its products, all its valuables and all the treasures of the kings of Judah. They will take it away as plunder and carry it off to Babylon. '
  '6':
  - type: text
    content: And you, Pashhur, and all who live in your house will go into exile to Babylon. There you will die and be buried, you and all your friends to whom you have prophesied lies.’ ”
  - type: heading
    content: Jeremiah’s Complaint
  '7':
  - type: text
    content: You deceived
  - type: note
    content: Or persuaded
  - type: text
    content: ' me, '
  - type: text
    content: Lord
  - type: text
    content: ', and I was deceived'
  - type: note
    content: Or persuaded
  - type: text
    content: ;
  - type: text
    content: you overpowered me and prevailed.
  - type: text
    content: I am ridiculed all day long;
  - type: text
    content: everyone mocks me.
  '8':
  - type: text
    content: Whenever I speak, I cry out
  - type: text
    content: proclaiming violence and destruction.
  - type: text
    content: 'So the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' has brought me'
  - type: text
    content: insult and reproach all day long.
  '9':
  - type: text
    content: But if I say, “I will not mention his word
  - type: text
    content: or speak anymore in his name,”
  - type: text
    content: his word is in my heart like a fire,
  - type: text
    content: a fire shut up in my bones.
  - type: text
    content: I am weary of holding it in;
  - type: text
    content: indeed, I cannot.
