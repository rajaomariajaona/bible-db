document_id: JER.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah and Pashhur
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When the priest Pashhur son of Immer, the official in charge of the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', heard Jeremiah prophesying these things, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'he had Jeremiah the prophet beaten and put in the stocks at the Upper Gate of Benjamin at the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s temple. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The next day, when Pashhur released him from the stocks, Jeremiah said to him, “The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '’s name for you is not Pashhur, but Terror on Every Side. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'For this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: ‘I will make you a terror to yourself and to all your friends; with your own eyes you will see them fall by the sword of their enemies. I will give all Judah into the hands of the king of Babylon, who will carry them away to Babylon or put them to the sword. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'I will deliver all the wealth of this city into the hands of their enemies—all its products, all its valuables and all the treasures of the kings of Judah. They will take it away as plunder and carry it off to Babylon. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And you, Pashhur, and all who live in your house will go into exile to Babylon. There you will die and be buried, you and all your friends to whom you have prophesied lies.’ ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jeremiah’s Complaint
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: You deceived
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: persuaded
    marker-yv: yv-n
  - type: text
    text: ' me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and I was deceived'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: persuaded
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you overpowered me and prevailed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am ridiculed all day long;
- type: usfm
  marker: q2
  children:
  - type: text
    text: everyone mocks me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Whenever I speak, I cry out
- type: usfm
  marker: q2
  children:
  - type: text
    text: proclaiming violence and destruction.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'So the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has brought me'
- type: usfm
  marker: q2
  children:
  - type: text
    text: insult and reproach all day long.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: But if I say, “I will not mention his word
- type: usfm
  marker: q2
  children:
  - type: text
    text: or speak anymore in his name,”
- type: usfm
  marker: q1
  children:
  - type: text
    text: his word is in my heart like a fire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a fire shut up in my bones.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am weary of holding it in;
- type: usfm
  marker: q2
  children:
  - type: text
    text: indeed, I cannot.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: I hear many whispering,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Terror on every side!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Denounce him! Let’s denounce him!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: All my friends
- type: usfm
  marker: q2
  children:
  - type: text
    text: are waiting for me to slip, saying,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Perhaps he will be deceived;
- type: usfm
  marker: q2
  children:
  - type: text
    text: then we will prevail over him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and take our revenge on him.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'But the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is with me like a mighty warrior;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: so my persecutors will stumble and not prevail.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will fail and be thoroughly disgraced;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their dishonor will never be forgotten.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty, you who examine the righteous'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and probe the heart and mind,
- type: usfm
  marker: q1
  children:
  - type: text
    text: let me see your vengeance on them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for to you I have committed my cause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Sing to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'Give praise to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: He rescues the life of the needy
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the hands of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Cursed be the day I was born!
- type: usfm
  marker: q2
  children:
  - type: text
    text: May the day my mother bore me not be blessed!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Cursed be the man who brought my father the news,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who made him very glad, saying,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “A child is born to you—a son!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: May that man be like the towns
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' overthrew without pity.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: May he hear wailing in the morning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a battle cry at noon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: For he did not kill me in the womb,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with my mother as my grave,
- type: usfm
  marker: q2
  children:
  - type: text
    text: her womb enlarged forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Why did I ever come out of the womb
- type: usfm
  marker: q2
  children:
  - type: text
    text: to see trouble and sorrow
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to end my days in shame?
