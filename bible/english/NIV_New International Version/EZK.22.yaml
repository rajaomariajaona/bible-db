document_id: EZK.22,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment on Jerusalem’s Sins
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me:'
  '10':
  - type: text
    content: 'In you are those who dishonor their father’s bed; in you are those who violate women during their period, when they are ceremonially unclean. '
  '11':
  - type: text
    content: 'In you one man commits a detestable offense with his neighbor’s wife, another shamefully defiles his daughter-in-law, and another violates his sister, his own father’s daughter. '
  '12':
  - type: text
    content: 'In you are people who accept bribes to shed blood; you take interest and make a profit from the poor. You extort unjust gain from your neighbors. And you have forgotten me, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '13':
  - type: text
    content: '“ ‘I will surely strike my hands together at the unjust gain you have made and at the blood you have shed in your midst. '
  '14':
  - type: text
    content: 'Will your courage endure or your hands be strong in the day I deal with you? I the '
  - type: text
    content: Lord
  - type: text
    content: ' have spoken, and I will do it. '
  '15':
  - type: text
    content: 'I will disperse you among the nations and scatter you through the countries; and I will put an end to your uncleanness. '
  '16':
  - type: text
    content: When you have been defiled
  - type: note
    content: Or When I have allotted you your inheritance
  - type: text
    content: ' in the eyes of the nations, you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  '17':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '18':
  - type: text
    content: '“Son of man, the people of Israel have become dross to me; all of them are the copper, tin, iron and lead left inside a furnace. They are but the dross of silver. '
  '19':
  - type: text
    content: 'Therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘Because you have all become dross, I will gather you into Jerusalem. '
  '2':
  - type: text
    content: '“Son of man, will you judge her? Will you judge this city of bloodshed? Then confront her with all her detestable practices '
  '20':
  - type: text
    content: 'As silver, copper, iron, lead and tin are gathered into a furnace to be melted with a fiery blast, so will I gather you in my anger and my wrath and put you inside the city and melt you. '
  '21':
  - type: text
    content: 'I will gather you and I will blow on you with my fiery wrath, and you will be melted inside her. '
  '22':
  - type: text
    content: 'As silver is melted in a furnace, so you will be melted inside her, and you will know that I the '
  - type: text
    content: Lord
  - type: text
    content: ' have poured out my wrath on you.’ ”'
  '23':
  - type: text
    content: 'Again the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '24':
  - type: text
    content: '“Son of man, say to the land, ‘You are a land that has not been cleansed or rained on in the day of wrath.’ '
  '25':
  - type: text
    content: There is a conspiracy of her princes
  - type: note
    content: Septuagint; Hebrew prophets
  - type: text
    content: ' within her like a roaring lion tearing its prey; they devour people, take treasures and precious things and make many widows within her. '
  '26':
  - type: text
    content: 'Her priests do violence to my law and profane my holy things; they do not distinguish between the holy and the common; they teach that there is no difference between the unclean and the clean; and they shut their eyes to the keeping of my Sabbaths, so that I am profaned among them. '
  '27':
  - type: text
    content: 'Her officials within her are like wolves tearing their prey; they shed blood and kill people to make unjust gain. '
  '28':
  - type: text
    content: 'Her prophets whitewash these deeds for them by false visions and lying divinations. They say, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says’—when the '
  - type: text
    content: Lord
  - type: text
    content: ' has not spoken. '
  '29':
  - type: text
    content: The people of the land practice extortion and commit robbery; they oppress the poor and needy and mistreat the foreigner, denying them justice.
  '3':
  - type: text
    content: 'and say: ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: You city that brings on herself doom by shedding blood in her midst and defiles herself by making idols, '
  '30':
  - type: text
    content: '“I looked for someone among them who would build up the wall and stand before me in the gap on behalf of the land so I would not have to destroy it, but I found no one. '
  '31':
  - type: text
    content: 'So I will pour out my wrath on them and consume them with my fiery anger, bringing down on their own heads all they have done, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .”
  '4':
  - type: text
    content: 'you have become guilty because of the blood you have shed and have become defiled by the idols you have made. You have brought your days to a close, and the end of your years has come. Therefore I will make you an object of scorn to the nations and a laughingstock to all the countries. '
  '5':
  - type: text
    content: Those who are near and those who are far away will mock you, you infamous city, full of turmoil.
  '6':
  - type: text
    content: '“ ‘See how each of the princes of Israel who are in you uses his power to shed blood. '
  '7':
  - type: text
    content: 'In you they have treated father and mother with contempt; in you they have oppressed the foreigner and mistreated the fatherless and the widow. '
  '8':
  - type: text
    content: 'You have despised my holy things and desecrated my Sabbaths. '
  '9':
  - type: text
    content: 'In you are slanderers who are bent on shedding blood; in you are those who eat at the mountain shrines and commit lewd acts. '
