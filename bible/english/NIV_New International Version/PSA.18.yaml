document_id: PSA.18
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 18
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 18:1-50 is numbered 18:2-51.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: 'For the director of music. Of David the servant of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. He sang to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' the words of this song when the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' delivered him from the hand of all his enemies and from the hand of Saul. He said:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'I love you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', my strength.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is my rock, my fortress and my deliverer;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: my God is my rock, in whom I take refuge,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my shield
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sovereign
    marker-yv: yv-n
  - type: text
    text: ' and the horn'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Horn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: here symbolizes strength.
    marker-yv: yv-n
  - type: text
    text: ' of my salvation, my stronghold.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'I called to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', who is worthy of praise,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I have been saved from my enemies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The cords of death entangled me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the torrents of destruction overwhelmed me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The cords of the grave coiled around me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the snares of death confronted me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'In my distress I called to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I cried to my God for help.
- type: usfm
  marker: q1
  children:
  - type: text
    text: From his temple he heard my voice;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my cry came before him, into his ears.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The earth trembled and quaked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the foundations of the mountains shook;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they trembled because he was angry.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Smoke rose from his nostrils;
- type: usfm
  marker: q2
  children:
  - type: text
    text: consuming fire came from his mouth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: burning coals blazed out of it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: He parted the heavens and came down;
- type: usfm
  marker: q2
  children:
  - type: text
    text: dark clouds were under his feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He mounted the cherubim and flew;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he soared on the wings of the wind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He made darkness his covering, his canopy around him—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the dark rain clouds of the sky.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Out of the brightness of his presence clouds advanced,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with hailstones and bolts of lightning.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' thundered from heaven;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the voice of the Most High resounded.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Hebrew manuscripts and Septuagint (see also 2 Samuel 22:14); most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: resounded, / amid hailstones and bolts of lightning
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: He shot his arrows and scattered the enemy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with great bolts of lightning he routed them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The valleys of the sea were exposed
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the foundations of the earth laid bare
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'at your rebuke, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the blast of breath from your nostrils.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He reached down from on high and took hold of me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he drew me out of deep waters.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He rescued me from my powerful enemy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from my foes, who were too strong for me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: They confronted me in the day of my disaster,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was my support.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: He brought me out into a spacious place;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he rescued me because he delighted in me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has dealt with me according to my righteousness;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: according to the cleanness of my hands he has rewarded me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'For I have kept the ways of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am not guilty of turning from my God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: All his laws are before me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have not turned away from his decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: I have been blameless before him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and have kept myself from sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has rewarded me according to my righteousness,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: according to the cleanness of my hands in his sight.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: To the faithful you show yourself faithful,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the blameless you show yourself blameless,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: to the pure you show yourself pure,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but to the devious you show yourself shrewd.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: You save the humble
- type: usfm
  marker: q2
  children:
  - type: text
    text: but bring low those whose eyes are haughty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'You, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', keep my lamp burning;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: my God turns my darkness into light.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: With your help I can advance against a troop
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: can run through a barricade
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: with my God I can scale a wall.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'As for God, his way is perfect:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s word is flawless;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he shields all who take refuge in him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'For who is God besides the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: And who is the Rock except our God?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: It is God who arms me with strength
- type: usfm
  marker: q2
  children:
  - type: text
    text: and keeps my way secure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: He makes my feet like the feet of a deer;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he causes me to stand on the heights.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: He trains my hands for battle;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my arms can bend a bow of bronze.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: You make your saving help my shield,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your right hand sustains me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your help has made me great.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: You provide a broad path for my feet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that my ankles do not give way.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: I pursued my enemies and overtook them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I did not turn back till they were destroyed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: I crushed them so that they could not rise;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they fell beneath my feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: You armed me with strength for battle;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you humbled my adversaries before me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: You made my enemies turn their backs in flight,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I destroyed my foes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: They cried for help, but there was no one to save them—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', but he did not answer.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: I beat them as fine as windblown dust;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I trampled them
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18:42 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Many Hebrew manuscripts, Septuagint, Syriac and Targum (see also 2 Samuel 22:43); Masoretic Text '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: I poured them out
    marker-yv: yv-n
  - type: text
    text: ' like mud in the streets.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: You have delivered me from the attacks of the people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have made me the head of nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: People I did not know now serve me,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: foreigners cower before me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: as soon as they hear of me, they obey me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: They all lose heart;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they come trembling from their strongholds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' lives! Praise be to my Rock!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Exalted be God my Savior!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: He is the God who avenges me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who subdues nations under me,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: who saves me from my enemies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You exalted me above my foes;
- type: usfm
  marker: q2
  children:
  - type: text
    text: from a violent man you rescued me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Therefore I will praise you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', among the nations;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will sing the praises of your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: He gives his king great victories;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he shows unfailing love to his anointed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to David and to his descendants forever.
