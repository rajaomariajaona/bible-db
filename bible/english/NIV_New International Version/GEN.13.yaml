document_id: GEN.13,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Abram and Lot Separate
  - type: text
    content: 'So Abram went up from Egypt to the Negev, with his wife and everything he had, and Lot went with him. '
  '10':
  - type: text
    content: 'Lot looked around and saw that the whole plain of the Jordan toward Zoar was well watered, like the garden of the '
  - type: text
    content: Lord
  - type: text
    content: ', like the land of Egypt. (This was before the '
  - type: text
    content: Lord
  - type: text
    content: ' destroyed Sodom and Gomorrah.) '
  '11':
  - type: text
    content: 'So Lot chose for himself the whole plain of the Jordan and set out toward the east. The two men parted company: '
  '12':
  - type: text
    content: 'Abram lived in the land of Canaan, while Lot lived among the cities of the plain and pitched his tents near Sodom. '
  '13':
  - type: text
    content: 'Now the people of Sodom were wicked and were sinning greatly against the '
  - type: text
    content: Lord
  - type: text
    content: .
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Abram after Lot had parted from him, “Look around from where you are, to the north and south, to the east and west. '
  '15':
  - type: text
    content: All the land that you see I will give to you and your offspring
  - type: note
    content: Or seed; also in verse 16
  - type: text
    content: ' forever. '
  '16':
  - type: text
    content: 'I will make your offspring like the dust of the earth, so that if anyone could count the dust, then your offspring could be counted. '
  '17':
  - type: text
    content: Go, walk through the length and breadth of the land, for I am giving it to you.”
  '18':
  - type: text
    content: 'So Abram went to live near the great trees of Mamre at Hebron, where he pitched his tents. There he built an altar to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: Abram had become very wealthy in livestock and in silver and gold.
  '3':
  - type: text
    content: 'From the Negev he went from place to place until he came to Bethel, to the place between Bethel and Ai where his tent had been earlier '
  '4':
  - type: text
    content: 'and where he had first built an altar. There Abram called on the name of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '5':
  - type: text
    content: 'Now Lot, who was moving about with Abram, also had flocks and herds and tents. '
  '6':
  - type: text
    content: 'But the land could not support them while they stayed together, for their possessions were so great that they were not able to stay together. '
  '7':
  - type: text
    content: And quarreling arose between Abram’s herders and Lot’s. The Canaanites and Perizzites were also living in the land at that time.
  '8':
  - type: text
    content: 'So Abram said to Lot, “Let’s not have any quarreling between you and me, or between your herders and mine, for we are close relatives. '
  '9':
  - type: text
    content: Is not the whole land before you? Let’s part company. If you go to the left, I’ll go to the right; if you go to the right, I’ll go to the left.”
