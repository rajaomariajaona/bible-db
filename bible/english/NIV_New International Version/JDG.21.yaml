document_id: JDG.21,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Wives for the Benjamites
  - type: text
    content: 'The men of Israel had taken an oath at Mizpah: “Not one of us will give his daughter in marriage to a Benjamite.”'
  '10':
  - type: text
    content: 'So the assembly sent twelve thousand fighting men with instructions to go to Jabesh Gilead and put to the sword those living there, including the women and children. '
  '11':
  - type: text
    content: '“This is what you are to do,” they said. “Kill every male and every woman who is not a virgin.” '
  '12':
  - type: text
    content: They found among the people living in Jabesh Gilead four hundred young women who had never slept with a man, and they took them to the camp at Shiloh in Canaan.
  '13':
  - type: text
    content: 'Then the whole assembly sent an offer of peace to the Benjamites at the rock of Rimmon. '
  '14':
  - type: text
    content: So the Benjamites returned at that time and were given the women of Jabesh Gilead who had been spared. But there were not enough for all of them.
  '15':
  - type: text
    content: 'The people grieved for Benjamin, because the '
  - type: text
    content: Lord
  - type: text
    content: ' had made a gap in the tribes of Israel. '
  '16':
  - type: text
    content: 'And the elders of the assembly said, “With the women of Benjamin destroyed, how shall we provide wives for the men who are left? '
  '17':
  - type: text
    content: 'The Benjamite survivors must have heirs,” they said, “so that a tribe of Israel will not be wiped out. '
  '18':
  - type: text
    content: 'We can’t give them our daughters as wives, since we Israelites have taken this oath: ‘Cursed be anyone who gives a wife to a Benjamite.’ '
  '19':
  - type: text
    content: 'But look, there is the annual festival of the '
  - type: text
    content: Lord
  - type: text
    content: ' in Shiloh, which lies north of Bethel, east of the road that goes from Bethel to Shechem, and south of Lebonah.”'
  '2':
  - type: text
    content: The people went to Bethel,
  - type: note
    content: Or to the house of God
  - type: text
    content: ' where they sat before God until evening, raising their voices and weeping bitterly. '
  '20':
  - type: text
    content: 'So they instructed the Benjamites, saying, “Go and hide in the vineyards '
  '21':
  - type: text
    content: 'and watch. When the young women of Shiloh come out to join in the dancing, rush from the vineyards and each of you seize one of them to be your wife. Then return to the land of Benjamin. '
  '22':
  - type: text
    content: When their fathers or brothers complain to us, we will say to them, ‘Do us the favor of helping them, because we did not get wives for them during the war. You will not be guilty of breaking your oath because you did not give your daughters to them.’ ”
  '23':
  - type: text
    content: So that is what the Benjamites did. While the young women were dancing, each man caught one and carried her off to be his wife. Then they returned to their inheritance and rebuilt the towns and settled in them.
  '24':
  - type: text
    content: At that time the Israelites left that place and went home to their tribes and clans, each to his own inheritance.
  '25':
  - type: text
    content: In those days Israel had no king; everyone did as they saw fit.
  '3':
  - type: text
    content: “
  - type: text
    content: Lord
  - type: text
    content: ', God of Israel,” they cried, “why has this happened to Israel? Why should one tribe be missing from Israel today?”'
  '4':
  - type: text
    content: Early the next day the people built an altar and presented burnt offerings and fellowship offerings.
  '5':
  - type: text
    content: 'Then the Israelites asked, “Who from all the tribes of Israel has failed to assemble before the '
  - type: text
    content: Lord
  - type: text
    content: '?” For they had taken a solemn oath that anyone who failed to assemble before the '
  - type: text
    content: Lord
  - type: text
    content: ' at Mizpah was to be put to death.'
  '6':
  - type: text
    content: 'Now the Israelites grieved for the tribe of Benjamin, their fellow Israelites. “Today one tribe is cut off from Israel,” they said. '
  '7':
  - type: text
    content: '“How can we provide wives for those who are left, since we have taken an oath by the '
  - type: text
    content: Lord
  - type: text
    content: ' not to give them any of our daughters in marriage?” '
  '8':
  - type: text
    content: 'Then they asked, “Which one of the tribes of Israel failed to assemble before the '
  - type: text
    content: Lord
  - type: text
    content: ' at Mizpah?” They discovered that no one from Jabesh Gilead had come to the camp for the assembly. '
  '9':
  - type: text
    content: For when they counted the people, they found that none of the people of Jabesh Gilead were there.
