document_id: NUM.30,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Vows
  - type: note
    content: In Hebrew texts 30:1-16 is numbered 30:2-17.
  - type: text
    content: 'Moses said to the heads of the tribes of Israel: “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' commands: '
  '10':
  - type: text
    content: '“If a woman living with her husband makes a vow or obligates herself by a pledge under oath '
  '11':
  - type: text
    content: 'and her husband hears about it but says nothing to her and does not forbid her, then all her vows or the pledges by which she obligated herself will stand. '
  '12':
  - type: text
    content: 'But if her husband nullifies them when he hears about them, then none of the vows or pledges that came from her lips will stand. Her husband has nullified them, and the '
  - type: text
    content: Lord
  - type: text
    content: ' will release her. '
  '13':
  - type: text
    content: Her husband may confirm or nullify any vow she makes or any sworn pledge to deny herself.
  - type: note
    content: Or to fast
  - type: text
    content: ' '
  '14':
  - type: text
    content: 'But if her husband says nothing to her about it from day to day, then he confirms all her vows or the pledges binding on her. He confirms them by saying nothing to her when he hears about them. '
  '15':
  - type: text
    content: If, however, he nullifies them some time after he hears about them, then he must bear the consequences of her wrongdoing.”
  '16':
  - type: text
    content: 'These are the regulations the '
  - type: text
    content: Lord
  - type: text
    content: ' gave Moses concerning relationships between a man and his wife, and between a father and his young daughter still living at home.'
  '2':
  - type: text
    content: 'When a man makes a vow to the '
  - type: text
    content: Lord
  - type: text
    content: ' or takes an oath to obligate himself by a pledge, he must not break his word but must do everything he said.'
  '3':
  - type: text
    content: '“When a young woman still living in her father’s household makes a vow to the '
  - type: text
    content: Lord
  - type: text
    content: ' or obligates herself by a pledge '
  '4':
  - type: text
    content: 'and her father hears about her vow or pledge but says nothing to her, then all her vows and every pledge by which she obligated herself will stand. '
  '5':
  - type: text
    content: 'But if her father forbids her when he hears about it, none of her vows or the pledges by which she obligated herself will stand; the '
  - type: text
    content: Lord
  - type: text
    content: ' will release her because her father has forbidden her.'
  '6':
  - type: text
    content: '“If she marries after she makes a vow or after her lips utter a rash promise by which she obligates herself '
  '7':
  - type: text
    content: 'and her husband hears about it but says nothing to her, then her vows or the pledges by which she obligated herself will stand. '
  '8':
  - type: text
    content: 'But if her husband forbids her when he hears about it, he nullifies the vow that obligates her or the rash promise by which she obligates herself, and the '
  - type: text
    content: Lord
  - type: text
    content: ' will release her.'
  '9':
  - type: text
    content: “Any vow or obligation taken by a widow or divorced woman will be binding on her.
