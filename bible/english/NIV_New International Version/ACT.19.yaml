document_id: ACT.19,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul in Ephesus
  - type: text
    content: 'While Apollos was at Corinth, Paul took the road through the interior and arrived at Ephesus. There he found some disciples '
  '10':
  - type: text
    content: This went on for two years, so that all the Jews and Greeks who lived in the province of Asia heard the word of the Lord.
  '11':
  - type: text
    content: 'God did extraordinary miracles through Paul, '
  '12':
  - type: text
    content: so that even handkerchiefs and aprons that had touched him were taken to the sick, and their illnesses were cured and the evil spirits left them.
  '13':
  - type: text
    content: 'Some Jews who went around driving out evil spirits tried to invoke the name of the Lord Jesus over those who were demon-possessed. They would say, “In the name of the Jesus whom Paul preaches, I command you to come out.” '
  '14':
  - type: text
    content: 'Seven sons of Sceva, a Jewish chief priest, were doing this. '
  '15':
  - type: text
    content: 'One day the evil spirit answered them, “Jesus I know, and Paul I know about, but who are you?” '
  '16':
  - type: text
    content: Then the man who had the evil spirit jumped on them and overpowered them all. He gave them such a beating that they ran out of the house naked and bleeding.
  '17':
  - type: text
    content: 'When this became known to the Jews and Greeks living in Ephesus, they were all seized with fear, and the name of the Lord Jesus was held in high honor. '
  '18':
  - type: text
    content: 'Many of those who believed now came and openly confessed what they had done. '
  '19':
  - type: text
    content: A number who had practiced sorcery brought their scrolls together and burned them publicly. When they calculated the value of the scrolls, the total came to fifty thousand drachmas.
  - type: note
    content: A drachma was a silver coin worth about a day’s wages.
  - type: text
    content: ' '
  '2':
  - type: text
    content: and asked them, “Did you receive the Holy Spirit when
  - type: note
    content: Or after
  - type: text
    content: ' you believed?”'
  - type: text
    content: They answered, “No, we have not even heard that there is a Holy Spirit.”
  '20':
  - type: text
    content: In this way the word of the Lord spread widely and grew in power.
  '21':
  - type: text
    content: After all this had happened, Paul decided
  - type: note
    content: Or decided in the Spirit
  - type: text
    content: ' to go to Jerusalem, passing through Macedonia and Achaia. “After I have been there,” he said, “I must visit Rome also.” '
  '22':
  - type: text
    content: He sent two of his helpers, Timothy and Erastus, to Macedonia, while he stayed in the province of Asia a little longer.
  - type: heading
    content: The Riot in Ephesus
  '23':
  - type: text
    content: 'About that time there arose a great disturbance about the Way. '
  '24':
  - type: text
    content: 'A silversmith named Demetrius, who made silver shrines of Artemis, brought in a lot of business for the craftsmen there. '
  '25':
  - type: text
    content: 'He called them together, along with the workers in related trades, and said: “You know, my friends, that we receive a good income from this business. '
  '26':
  - type: text
    content: 'And you see and hear how this fellow Paul has convinced and led astray large numbers of people here in Ephesus and in practically the whole province of Asia. He says that gods made by human hands are no gods at all. '
  '27':
  - type: text
    content: There is danger not only that our trade will lose its good name, but also that the temple of the great goddess Artemis will be discredited; and the goddess herself, who is worshiped throughout the province of Asia and the world, will be robbed of her divine majesty.”
  '28':
  - type: text
    content: 'When they heard this, they were furious and began shouting: “Great is Artemis of the Ephesians!” '
  '29':
  - type: text
    content: 'Soon the whole city was in an uproar. The people seized Gaius and Aristarchus, Paul’s traveling companions from Macedonia, and all of them rushed into the theater together. '
  '3':
  - type: text
    content: So Paul asked, “Then what baptism did you receive?”
  - type: text
    content: “John’s baptism,” they replied.
  '30':
  - type: text
    content: 'Paul wanted to appear before the crowd, but the disciples would not let him. '
  '31':
  - type: text
    content: Even some of the officials of the province, friends of Paul, sent him a message begging him not to venture into the theater.
  '32':
  - type: text
    content: 'The assembly was in confusion: Some were shouting one thing, some another. Most of the people did not even know why they were there. '
  '33':
  - type: text
    content: 'The Jews in the crowd pushed Alexander to the front, and they shouted instructions to him. He motioned for silence in order to make a defense before the people. '
  '34':
  - type: text
    content: 'But when they realized he was a Jew, they all shouted in unison for about two hours: “Great is Artemis of the Ephesians!”'
  '35':
  - type: text
    content: 'The city clerk quieted the crowd and said: “Fellow Ephesians, doesn’t all the world know that the city of Ephesus is the guardian of the temple of the great Artemis and of her image, which fell from heaven? '
  '36':
  - type: text
    content: 'Therefore, since these facts are undeniable, you ought to calm down and not do anything rash. '
  '37':
  - type: text
    content: 'You have brought these men here, though they have neither robbed temples nor blasphemed our goddess. '
  '38':
  - type: text
    content: 'If, then, Demetrius and his fellow craftsmen have a grievance against anybody, the courts are open and there are proconsuls. They can press charges. '
  '39':
  - type: text
    content: 'If there is anything further you want to bring up, it must be settled in a legal assembly. '
  '4':
  - type: text
    content: 'Paul said, “John’s baptism was a baptism of repentance. He told the people to believe in the one coming after him, that is, in Jesus.” '
  '40':
  - type: text
    content: 'As it is, we are in danger of being charged with rioting because of what happened today. In that case we would not be able to account for this commotion, since there is no reason for it.” '
  '41':
  - type: text
    content: After he had said this, he dismissed the assembly.
  '5':
  - type: text
    content: 'On hearing this, they were baptized in the name of the Lord Jesus. '
  '6':
  - type: text
    content: When Paul placed his hands on them, the Holy Spirit came on them, and they spoke in tongues
  - type: note
    content: Or other languages
  - type: text
    content: ' and prophesied. '
  '7':
  - type: text
    content: There were about twelve men in all.
  '8':
  - type: text
    content: 'Paul entered the synagogue and spoke boldly there for three months, arguing persuasively about the kingdom of God. '
  '9':
  - type: text
    content: 'But some of them became obstinate; they refused to believe and publicly maligned the Way. So Paul left them. He took the disciples with him and had discussions daily in the lecture hall of Tyrannus. '
