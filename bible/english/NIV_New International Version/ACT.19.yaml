document_id: ACT.19,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul in Ephesus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While Apollos was at Corinth, Paul took the road through the interior and arrived at Ephesus. There he found some disciples '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This went on for two years, so that all the Jews and Greeks who lived in the province of Asia heard the word of the Lord.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'God did extraordinary miracles through Paul, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: so that even handkerchiefs and aprons that had touched him were taken to the sick, and their illnesses were cured and the evil spirits left them.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some Jews who went around driving out evil spirits tried to invoke the name of the Lord Jesus over those who were demon-possessed. They would say, “In the name of the Jesus whom Paul preaches, I command you to come out.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seven sons of Sceva, a Jewish chief priest, were doing this. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One day the evil spirit answered them, “Jesus I know, and Paul I know about, but who are you?” '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the man who had the evil spirit jumped on them and overpowered them all. He gave them such a beating that they ran out of the house naked and bleeding.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When this became known to the Jews and Greeks living in Ephesus, they were all seized with fear, and the name of the Lord Jesus was held in high honor. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Many of those who believed now came and openly confessed what they had done. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A number who had practiced sorcery brought their scrolls together and burned them publicly. When they calculated the value of the scrolls, the total came to fifty thousand drachmas.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A drachma was a silver coin worth about a day’s wages.
      marker-yv: yv-n
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and asked them, “Did you receive the Holy Spirit when
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: after
      marker-yv: yv-n
    - type: text
      text: ' you believed?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: They answered, “No, we have not even heard that there is a Holy Spirit.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In this way the word of the Lord spread widely and grew in power.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After all this had happened, Paul decided
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: decided in the Spirit
      marker-yv: yv-n
    - type: text
      text: ' to go to Jerusalem, passing through Macedonia and Achaia. “After I have been there,” he said, “I must visit Rome also.” '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He sent two of his helpers, Timothy and Erastus, to Macedonia, while he stayed in the province of Asia a little longer.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Riot in Ephesus
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'About that time there arose a great disturbance about the Way. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A silversmith named Demetrius, who made silver shrines of Artemis, brought in a lot of business for the craftsmen there. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He called them together, along with the workers in related trades, and said: “You know, my friends, that we receive a good income from this business. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And you see and hear how this fellow Paul has convinced and led astray large numbers of people here in Ephesus and in practically the whole province of Asia. He says that gods made by human hands are no gods at all. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: There is danger not only that our trade will lose its good name, but also that the temple of the great goddess Artemis will be discredited; and the goddess herself, who is worshiped throughout the province of Asia and the world, will be robbed of her divine majesty.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they heard this, they were furious and began shouting: “Great is Artemis of the Ephesians!” '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Soon the whole city was in an uproar. The people seized Gaius and Aristarchus, Paul’s traveling companions from Macedonia, and all of them rushed into the theater together. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Paul asked, “Then what baptism did you receive?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “John’s baptism,” they replied.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul wanted to appear before the crowd, but the disciples would not let him. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Even some of the officials of the province, friends of Paul, sent him a message begging him not to venture into the theater.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The assembly was in confusion: Some were shouting one thing, some another. Most of the people did not even know why they were there. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Jews in the crowd pushed Alexander to the front, and they shouted instructions to him. He motioned for silence in order to make a defense before the people. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when they realized he was a Jew, they all shouted in unison for about two hours: “Great is Artemis of the Ephesians!”'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The city clerk quieted the crowd and said: “Fellow Ephesians, doesn’t all the world know that the city of Ephesus is the guardian of the temple of the great Artemis and of her image, which fell from heaven? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore, since these facts are undeniable, you ought to calm down and not do anything rash. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You have brought these men here, though they have neither robbed temples nor blasphemed our goddess. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If, then, Demetrius and his fellow craftsmen have a grievance against anybody, the courts are open and there are proconsuls. They can press charges. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If there is anything further you want to bring up, it must be settled in a legal assembly. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul said, “John’s baptism was a baptism of repentance. He told the people to believe in the one coming after him, that is, in Jesus.” '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As it is, we are in danger of being charged with rioting because of what happened today. In that case we would not be able to account for this commotion, since there is no reason for it.” '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: After he had said this, he dismissed the assembly.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On hearing this, they were baptized in the name of the Lord Jesus. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Paul placed his hands on them, the Holy Spirit came on them, and they spoke in tongues
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: other languages
      marker-yv: yv-n
    - type: text
      text: ' and prophesied. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: There were about twelve men in all.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul entered the synagogue and spoke boldly there for three months, arguing persuasively about the kingdom of God. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But some of them became obstinate; they refused to believe and publicly maligned the Way. So Paul left them. He took the disciples with him and had discussions daily in the lecture hall of Tyrannus. '
