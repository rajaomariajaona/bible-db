document_id: PSA.51
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 51
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 51:1-19 is numbered 51:3-21.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the director of music. A psalm of David. When the prophet Nathan came to him after David had committed adultery with Bathsheba.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Have mercy on me, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: according to your unfailing love;
- type: usfm
  marker: q1
  children:
  - type: text
    text: according to your great compassion
- type: usfm
  marker: q2
  children:
  - type: text
    text: blot out my transgressions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Wash away all my iniquity
- type: usfm
  marker: q2
  children:
  - type: text
    text: and cleanse me from my sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: For I know my transgressions,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my sin is always before me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Against you, you only, have I sinned
- type: usfm
  marker: q2
  children:
  - type: text
    text: and done what is evil in your sight;
- type: usfm
  marker: q1
  children:
  - type: text
    text: so you are right in your verdict
- type: usfm
  marker: q2
  children:
  - type: text
    text: and justified when you judge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Surely I was sinful at birth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sinful from the time my mother conceived me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Yet you desired faithfulness even in the womb;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you taught me wisdom in that secret place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Cleanse me with hyssop, and I will be clean;
- type: usfm
  marker: q2
  children:
  - type: text
    text: wash me, and I will be whiter than snow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Let me hear joy and gladness;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let the bones you have crushed rejoice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Hide your face from my sins
- type: usfm
  marker: q2
  children:
  - type: text
    text: and blot out all my iniquity.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Create in me a pure heart, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and renew a steadfast spirit within me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Do not cast me from your presence
- type: usfm
  marker: q2
  children:
  - type: text
    text: or take your Holy Spirit from me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Restore to me the joy of your salvation
- type: usfm
  marker: q2
  children:
  - type: text
    text: and grant me a willing spirit, to sustain me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Then I will teach transgressors your ways,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that sinners will turn back to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Deliver me from the guilt of bloodshed, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who are God my Savior,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my tongue will sing of your righteousness.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Open my lips, Lord,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my mouth will declare your praise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: You do not delight in sacrifice, or I would bring it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you do not take pleasure in burnt offerings.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: My sacrifice, O God, is
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '51:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: The sacrifices of God are
    marker-yv: yv-n
  - type: text
    text: ' a broken spirit;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: a broken and contrite heart
- type: usfm
  marker: q2
  children:
  - type: text
    text: you, God, will not despise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: May it please you to prosper Zion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to build up the walls of Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then you will delight in the sacrifices of the righteous,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in burnt offerings offered whole;
- type: usfm
  marker: q2
  children:
  - type: text
    text: then bulls will be offered on your altar.
