document_id: PSA.51,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 51In Hebrew texts 51:1-19 is numbered 51:3-21.
  - type: text
    content: For the director of music. A psalm of David. When the prophet Nathan came to him after David had committed adultery with Bathsheba.
  - type: text
    content: Have mercy on me, O God,
  - type: text
    content: according to your unfailing love;
  - type: text
    content: according to your great compassion
  - type: text
    content: blot out my transgressions.
  '10':
  - type: text
    content: Create in me a pure heart, O God,
  - type: text
    content: and renew a steadfast spirit within me.
  '11':
  - type: text
    content: Do not cast me from your presence
  - type: text
    content: or take your Holy Spirit from me.
  '12':
  - type: text
    content: Restore to me the joy of your salvation
  - type: text
    content: and grant me a willing spirit, to sustain me.
  '13':
  - type: text
    content: Then I will teach transgressors your ways,
  - type: text
    content: so that sinners will turn back to you.
  '14':
  - type: text
    content: Deliver me from the guilt of bloodshed, O God,
  - type: text
    content: you who are God my Savior,
  - type: text
    content: and my tongue will sing of your righteousness.
  '15':
  - type: text
    content: Open my lips, Lord,
  - type: text
    content: and my mouth will declare your praise.
  '16':
  - type: text
    content: You do not delight in sacrifice, or I would bring it;
  - type: text
    content: you do not take pleasure in burnt offerings.
  '17':
  - type: text
    content: My sacrifice, O God, is
  - type: note
    content: Or The sacrifices of God are
  - type: text
    content: ' a broken spirit;'
  - type: text
    content: a broken and contrite heart
  - type: text
    content: you, God, will not despise.
  '18':
  - type: text
    content: May it please you to prosper Zion,
  - type: text
    content: to build up the walls of Jerusalem.
  '19':
  - type: text
    content: Then you will delight in the sacrifices of the righteous,
  - type: text
    content: in burnt offerings offered whole;
  - type: text
    content: then bulls will be offered on your altar.
  '2':
  - type: text
    content: Wash away all my iniquity
  - type: text
    content: and cleanse me from my sin.
  '3':
  - type: text
    content: For I know my transgressions,
  - type: text
    content: and my sin is always before me.
  '4':
  - type: text
    content: Against you, you only, have I sinned
  - type: text
    content: and done what is evil in your sight;
  - type: text
    content: so you are right in your verdict
  - type: text
    content: and justified when you judge.
  '5':
  - type: text
    content: Surely I was sinful at birth,
  - type: text
    content: sinful from the time my mother conceived me.
  '6':
  - type: text
    content: Yet you desired faithfulness even in the womb;
  - type: text
    content: you taught me wisdom in that secret place.
  '7':
  - type: text
    content: Cleanse me with hyssop, and I will be clean;
  - type: text
    content: wash me, and I will be whiter than snow.
  '8':
  - type: text
    content: Let me hear joy and gladness;
  - type: text
    content: let the bones you have crushed rejoice.
  '9':
  - type: text
    content: Hide your face from my sins
  - type: text
    content: and blot out all my iniquity.
