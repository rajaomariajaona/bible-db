document_id: COL.4,111
type_code: eng
verses:
  '1':
  - type: text
    content: Masters, provide your slaves with what is right and fair, because you know that you also have a Master in heaven.
  - type: heading
    content: Further Instructions
  '10':
  - type: text
    content: 'My fellow prisoner Aristarchus sends you his greetings, as does Mark, the cousin of Barnabas. (You have received instructions about him; if he comes to you, welcome him.) '
  '11':
  - type: text
    content: Jesus, who is called Justus, also sends greetings. These are the only Jews
  - type: note
    content: Greek only ones of the circumcision group
  - type: text
    content: ' among my co-workers for the kingdom of God, and they have proved a comfort to me. '
  '12':
  - type: text
    content: 'Epaphras, who is one of you and a servant of Christ Jesus, sends greetings. He is always wrestling in prayer for you, that you may stand firm in all the will of God, mature and fully assured. '
  '13':
  - type: text
    content: 'I vouch for him that he is working hard for you and for those at Laodicea and Hierapolis. '
  '14':
  - type: text
    content: 'Our dear friend Luke, the doctor, and Demas send greetings. '
  '15':
  - type: text
    content: Give my greetings to the brothers and sisters at Laodicea, and to Nympha and the church in her house.
  '16':
  - type: text
    content: After this letter has been read to you, see that it is also read in the church of the Laodiceans and that you in turn read the letter from Laodicea.
  '17':
  - type: text
    content: 'Tell Archippus: “See to it that you complete the ministry you have received in the Lord.”'
  '18':
  - type: text
    content: I, Paul, write this greeting in my own hand. Remember my chains. Grace be with you.
  '2':
  - type: text
    content: 'Devote yourselves to prayer, being watchful and thankful. '
  '3':
  - type: text
    content: 'And pray for us, too, that God may open a door for our message, so that we may proclaim the mystery of Christ, for which I am in chains. '
  '4':
  - type: text
    content: 'Pray that I may proclaim it clearly, as I should. '
  '5':
  - type: text
    content: 'Be wise in the way you act toward outsiders; make the most of every opportunity. '
  '6':
  - type: text
    content: Let your conversation be always full of grace, seasoned with salt, so that you may know how to answer everyone.
  - type: heading
    content: Final Greetings
  '7':
  - type: text
    content: Tychicus will tell you all the news about me. He is a dear brother, a faithful minister and fellow servant
  - type: note
    content: Or slave; also in verse 12
  - type: text
    content: ' in the Lord. '
  '8':
  - type: text
    content: I am sending him to you for the express purpose that you may know about our
  - type: note
    content: Some manuscripts that he may know about your
  - type: text
    content: ' circumstances and that he may encourage your hearts. '
  '9':
  - type: text
    content: He is coming with Onesimus, our faithful and dear brother, who is one of you. They will tell you everything that is happening here.
