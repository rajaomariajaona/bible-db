document_id: COL.1,111
type_code: eng
verses:
  '1':
  - type: text
    content: Paul, an apostle of Christ Jesus by the will of God, and Timothy our brother,
  '10':
  - type: text
    content: 'so that you may live a life worthy of the Lord and please him in every way: bearing fruit in every good work, growing in the knowledge of God, '
  '11':
  - type: text
    content: 'being strengthened with all power according to his glorious might so that you may have great endurance and patience, '
  '12':
  - type: text
    content: and giving joyful thanks to the Father, who has qualified you
  - type: note
    content: Some manuscripts us
  - type: text
    content: ' to share in the inheritance of his holy people in the kingdom of light. '
  '13':
  - type: text
    content: 'For he has rescued us from the dominion of darkness and brought us into the kingdom of the Son he loves, '
  '14':
  - type: text
    content: in whom we have redemption, the forgiveness of sins.
  - type: heading
    content: The Supremacy of the Son of God
  '15':
  - type: text
    content: 'The Son is the image of the invisible God, the firstborn over all creation. '
  '16':
  - type: text
    content: 'For in him all things were created: things in heaven and on earth, visible and invisible, whether thrones or powers or rulers or authorities; all things have been created through him and for him. '
  '17':
  - type: text
    content: 'He is before all things, and in him all things hold together. '
  '18':
  - type: text
    content: 'And he is the head of the body, the church; he is the beginning and the firstborn from among the dead, so that in everything he might have the supremacy. '
  '19':
  - type: text
    content: 'For God was pleased to have all his fullness dwell in him, '
  '2':
  - type: text
    content: To God’s holy people in Colossae, the faithful brothers and sisters
  - type: note
    content: The Greek word for brothers and sisters (adelphoi) refers here to believers, both men and women, as part of God’s family; also in 4:15.
  - type: text
    content: ' in Christ:'
  - type: text
    content: Grace and peace to you from God our Father.
  - type: note
    content: Some manuscripts Father and the Lord Jesus Christ
  - type: heading
    content: Thanksgiving and Prayer
  '20':
  - type: text
    content: and through him to reconcile to himself all things, whether things on earth or things in heaven, by making peace through his blood, shed on the cross.
  '21':
  - type: text
    content: Once you were alienated from God and were enemies in your minds because of
  - type: note
    content: Or minds, as shown by
  - type: text
    content: ' your evil behavior. '
  '22':
  - type: text
    content: 'But now he has reconciled you by Christ’s physical body through death to present you holy in his sight, without blemish and free from accusation— '
  '23':
  - type: text
    content: if you continue in your faith, established and firm, and do not move from the hope held out in the gospel. This is the gospel that you heard and that has been proclaimed to every creature under heaven, and of which I, Paul, have become a servant.
  - type: heading
    content: Paul’s Labor for the Church
  '24':
  - type: text
    content: 'Now I rejoice in what I am suffering for you, and I fill up in my flesh what is still lacking in regard to Christ’s afflictions, for the sake of his body, which is the church. '
  '25':
  - type: text
    content: 'I have become its servant by the commission God gave me to present to you the word of God in its fullness— '
  '26':
  - type: text
    content: 'the mystery that has been kept hidden for ages and generations, but is now disclosed to the Lord’s people. '
  '27':
  - type: text
    content: To them God has chosen to make known among the Gentiles the glorious riches of this mystery, which is Christ in you, the hope of glory.
  '28':
  - type: text
    content: 'He is the one we proclaim, admonishing and teaching everyone with all wisdom, so that we may present everyone fully mature in Christ. '
  '29':
  - type: text
    content: To this end I strenuously contend with all the energy Christ so powerfully works in me.
  '3':
  - type: text
    content: 'We always thank God, the Father of our Lord Jesus Christ, when we pray for you, '
  '4':
  - type: text
    content: 'because we have heard of your faith in Christ Jesus and of the love you have for all God’s people— '
  '5':
  - type: text
    content: 'the faith and love that spring from the hope stored up for you in heaven and about which you have already heard in the true message of the gospel '
  '6':
  - type: text
    content: 'that has come to you. In the same way, the gospel is bearing fruit and growing throughout the whole world—just as it has been doing among you since the day you heard it and truly understood God’s grace. '
  '7':
  - type: text
    content: You learned it from Epaphras, our dear fellow servant,
  - type: note
    content: Or slave
  - type: text
    content: ' who is a faithful minister of Christ on our'
  - type: note
    content: Some manuscripts your
  - type: text
    content: ' behalf, '
  '8':
  - type: text
    content: and who also told us of your love in the Spirit.
  '9':
  - type: text
    content: For this reason, since the day we heard about you, we have not stopped praying for you. We continually ask God to fill you with the knowledge of his will through all the wisdom and understanding that the Spirit gives,
  - type: note
    content: Or all spiritual wisdom and understanding
  - type: text
    content: ' '
