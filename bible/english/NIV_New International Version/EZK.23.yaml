document_id: EZK.23,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Two Adulterous Sisters
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: They stripped her naked, took away her sons and daughters and killed her with the sword. She became a byword among women, and punishment was inflicted on her.
  '11':
  - type: text
    content: '“Her sister Oholibah saw this, yet in her lust and prostitution she was more depraved than her sister. '
  '12':
  - type: text
    content: 'She too lusted after the Assyrians—governors and commanders, warriors in full dress, mounted horsemen, all handsome young men. '
  '13':
  - type: text
    content: I saw that she too defiled herself; both of them went the same way.
  '14':
  - type: text
    content: “But she carried her prostitution still further. She saw men portrayed on a wall, figures of Chaldeans
  - type: note
    content: Or Babylonians
  - type: text
    content: ' portrayed in red, '
  '15':
  - type: text
    content: with belts around their waists and flowing turbans on their heads; all of them looked like Babylonian chariot officers, natives of Chaldea.
  - type: note
    content: Or Babylonia; also in verse 16
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'As soon as she saw them, she lusted after them and sent messengers to them in Chaldea. '
  '17':
  - type: text
    content: 'Then the Babylonians came to her, to the bed of love, and in their lust they defiled her. After she had been defiled by them, she turned away from them in disgust. '
  '18':
  - type: text
    content: 'When she carried on her prostitution openly and exposed her naked body, I turned away from her in disgust, just as I had turned away from her sister. '
  '19':
  - type: text
    content: 'Yet she became more and more promiscuous as she recalled the days of her youth, when she was a prostitute in Egypt. '
  '2':
  - type: text
    content: '“Son of man, there were two women, daughters of the same mother. '
  '20':
  - type: text
    content: 'There she lusted after her lovers, whose genitals were like those of donkeys and whose emission was like that of horses. '
  '21':
  - type: text
    content: So you longed for the lewdness of your youth, when in Egypt your bosom was caressed and your young breasts fondled.
  - type: note
    content: Syriac (see also verse 3); Hebrew caressed because of your young breasts
  '22':
  - type: text
    content: '“Therefore, Oholibah, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I will stir up your lovers against you, those you turned away from in disgust, and I will bring them against you from every side— '
  '23':
  - type: text
    content: 'the Babylonians and all the Chaldeans, the men of Pekod and Shoa and Koa, and all the Assyrians with them, handsome young men, all of them governors and commanders, chariot officers and men of high rank, all mounted on horses. '
  '24':
  - type: text
    content: They will come against you with weapons,
  - type: note
    content: The meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' chariots and wagons and with a throng of people; they will take up positions against you on every side with large and small shields and with helmets. I will turn you over to them for punishment, and they will punish you according to their standards. '
  '25':
  - type: text
    content: 'I will direct my jealous anger against you, and they will deal with you in fury. They will cut off your noses and your ears, and those of you who are left will fall by the sword. They will take away your sons and daughters, and those of you who are left will be consumed by fire. '
  '26':
  - type: text
    content: 'They will also strip you of your clothes and take your fine jewelry. '
  '27':
  - type: text
    content: So I will put a stop to the lewdness and prostitution you began in Egypt. You will not look on these things with longing or remember Egypt anymore.
  '28':
  - type: text
    content: '“For this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am about to deliver you into the hands of those you hate, to those you turned away from in disgust. '
  '29':
  - type: text
    content: 'They will deal with you in hatred and take away everything you have worked for. They will leave you stark naked, and the shame of your prostitution will be exposed. Your lewdness and promiscuity '
  '3':
  - type: text
    content: 'They became prostitutes in Egypt, engaging in prostitution from their youth. In that land their breasts were fondled and their virgin bosoms caressed. '
  '30':
  - type: text
    content: 'have brought this on you, because you lusted after the nations and defiled yourself with their idols. '
  '31':
  - type: text
    content: You have gone the way of your sister; so I will put her cup into your hand.
  '32':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “You will drink your sister’s cup,
  - type: text
    content: a cup large and deep;
  - type: text
    content: it will bring scorn and derision,
  - type: text
    content: for it holds so much.
  '33':
  - type: text
    content: You will be filled with drunkenness and sorrow,
  - type: text
    content: the cup of ruin and desolation,
  - type: text
    content: the cup of your sister Samaria.
  '34':
  - type: text
    content: You will drink it and drain it dry
  - type: text
    content: and chew on its pieces—
  - type: text
    content: and you will tear your breasts.
  - type: text
    content: 'I have spoken, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '35':
  - type: text
    content: '“Therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Since you have forgotten me and turned your back on me, you must bear the consequences of your lewdness and prostitution.”'
  '36':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to me: “Son of man, will you judge Oholah and Oholibah? Then confront them with their detestable practices, '
  '37':
  - type: text
    content: 'for they have committed adultery and blood is on their hands. They committed adultery with their idols; they even sacrificed their children, whom they bore to me, as food for them. '
  '38':
  - type: text
    content: 'They have also done this to me: At that same time they defiled my sanctuary and desecrated my Sabbaths. '
  '39':
  - type: text
    content: On the very day they sacrificed their children to their idols, they entered my sanctuary and desecrated it. That is what they did in my house.
  '4':
  - type: text
    content: The older was named Oholah, and her sister was Oholibah. They were mine and gave birth to sons and daughters. Oholah is Samaria, and Oholibah is Jerusalem.
  '40':
  - type: text
    content: '“They even sent messengers for men who came from far away, and when they arrived you bathed yourself for them, applied eye makeup and put on your jewelry. '
  '41':
  - type: text
    content: You sat on an elegant couch, with a table spread before it on which you had placed the incense and olive oil that belonged to me.
  '42':
  - type: text
    content: '“The noise of a carefree crowd was around her; drunkards were brought from the desert along with men from the rabble, and they put bracelets on the wrists of the woman and her sister and beautiful crowns on their heads. '
  '43':
  - type: text
    content: 'Then I said about the one worn out by adultery, ‘Now let them use her as a prostitute, for that is all she is.’ '
  '44':
  - type: text
    content: 'And they slept with her. As men sleep with a prostitute, so they slept with those lewd women, Oholah and Oholibah. '
  '45':
  - type: text
    content: But righteous judges will sentence them to the punishment of women who commit adultery and shed blood, because they are adulterous and blood is on their hands.
  '46':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Bring a mob against them and give them over to terror and plunder. '
  '47':
  - type: text
    content: The mob will stone them and cut them down with their swords; they will kill their sons and daughters and burn down their houses.
  '48':
  - type: text
    content: '“So I will put an end to lewdness in the land, that all women may take warning and not imitate you. '
  '49':
  - type: text
    content: 'You will suffer the penalty for your lewdness and bear the consequences of your sins of idolatry. Then you will know that I am the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .”
  '5':
  - type: text
    content: '“Oholah engaged in prostitution while she was still mine; and she lusted after her lovers, the Assyrians—warriors '
  '6':
  - type: text
    content: 'clothed in blue, governors and commanders, all of them handsome young men, and mounted horsemen. '
  '7':
  - type: text
    content: 'She gave herself as a prostitute to all the elite of the Assyrians and defiled herself with all the idols of everyone she lusted after. '
  '8':
  - type: text
    content: She did not give up the prostitution she began in Egypt, when during her youth men slept with her, caressed her virgin bosom and poured out their lust on her.
  '9':
  - type: text
    content: '“Therefore I delivered her into the hands of her lovers, the Assyrians, for whom she lusted. '
