document_id: NEH.1,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nehemiah’s Prayer
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The words of Nehemiah son of Hakaliah:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the month of Kislev in the twentieth year, while I was in the citadel of Susa, '
  '10':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“They are your servants and your people, whom you redeemed by your great strength and your mighty hand. '
  '11':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: Lord, let your ear be attentive to the prayer of this your servant and to the prayer of your servants who delight in revering your name. Give your servant success today by granting him favor in the presence of this man.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: I was cupbearer to the king.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hanani, one of my brothers, came from Judah with some other men, and I questioned them about the Jewish remnant that had survived the exile, and also about Jerusalem.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They said to me, “Those who survived the exile and are back in the province are in great trouble and disgrace. The wall of Jerusalem is broken down, and its gates have been burned with fire.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When I heard these things, I sat down and wept. For some days I mourned and fasted and prayed before the God of heaven. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I said:'
  - type: usfm
    marker: pm
    children:
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of heaven, the great and awesome God, who keeps his covenant of love with those who love him and keep his commandments, '
  '6':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'let your ear be attentive and your eyes open to hear the prayer your servant is praying before you day and night for your servants, the people of Israel. I confess the sins we Israelites, including myself and my father’s family, have committed against you. '
  '7':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: We have acted very wickedly toward you. We have not obeyed the commands, decrees and laws you gave your servant Moses.
  '8':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“Remember the instruction you gave your servant Moses, saying, ‘If you are unfaithful, I will scatter you among the nations, '
  '9':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: but if you return to me and obey my commands, then even if your exiled people are at the farthest horizon, I will gather them from there and bring them to the place I have chosen as a dwelling for my Name.’
