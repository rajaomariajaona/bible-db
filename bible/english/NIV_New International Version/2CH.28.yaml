document_id: 2CH.28,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ahaz King of Judah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahaz was twenty years old when he became king, and he reigned in Jerusalem sixteen years. Unlike David his father, he did not do what was right in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And now you intend to make the men and women of Judah and Jerusalem your slaves. But aren’t you also guilty of sins against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now listen to me! Send back your fellow Israelites you have taken as prisoners, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s fierce anger rests on you.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then some of the leaders in Ephraim—Azariah son of Jehohanan, Berekiah son of Meshillemoth, Jehizkiah son of Shallum, and Amasa son of Hadlai—confronted those who were arriving from the war. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You must not bring those prisoners here,” they said, “or we will be guilty before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . Do you intend to add to our sin and guilt? For our guilt is already great, and his fierce anger rests on Israel.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the soldiers gave up the prisoners and plunder in the presence of the officials and all the assembly. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The men designated by name took the prisoners, and from the plunder they clothed all who were naked. They provided them with clothes and sandals, food and drink, and healing balm. All those who were weak they put on donkeys. So they took them back to their fellow Israelites at Jericho, the City of Palms, and returned to Samaria.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At that time King Ahaz sent to the kings
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Most Hebrew manuscripts; one Hebrew manuscript, Septuagint and Vulgate (see also 2 Kings 16:7) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: king
      marker-yv: yv-n
    - type: text
      text: ' of Assyria for help. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Edomites had again come and attacked Judah and carried away prisoners, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'while the Philistines had raided towns in the foothills and in the Negev of Judah. They captured and occupied Beth Shemesh, Aijalon and Gederoth, as well as Soko, Timnah and Gimzo, with their surrounding villages. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had humbled Judah because of Ahaz king of Israel,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Judah, as frequently in 2 Chronicles
      marker-yv: yv-n
    - type: text
      text: ' for he had promoted wickedness in Judah and had been most unfaithful to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He followed the ways of the kings of Israel and also made idols for worshiping the Baals. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tiglath-Pileser
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Tilgath-Pilneser, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tiglath-Pileser
      marker-yv: yv-n
    - type: text
      text: ' king of Assyria came to him, but he gave him trouble instead of help. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahaz took some of the things from the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and from the royal palace and from the officials and presented them to the king of Assyria, but that did not help him.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In his time of trouble King Ahaz became even more unfaithful to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He offered sacrifices to the gods of Damascus, who had defeated him; for he thought, “Since the gods of the kings of Aram have helped them, I will sacrifice to them so they will help me.” But they were his downfall and the downfall of all Israel.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ahaz gathered together the furnishings from the temple of God and cut them in pieces. He shut the doors of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s temple and set up altars at every street corner in Jerusalem. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In every town in Judah he built high places to burn sacrifices to other gods and aroused the anger of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of his ancestors.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The other events of his reign and all his ways, from beginning to end, are written in the book of the kings of Judah and Israel. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ahaz rested with his ancestors and was buried in the city of Jerusalem, but he was not placed in the tombs of the kings of Israel. And Hezekiah his son succeeded him as king.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He burned sacrifices in the Valley of Ben Hinnom and sacrificed his children in the fire, engaging in the detestable practices of the nations the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had driven out before the Israelites. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He offered sacrifices and burned incense at the high places, on the hilltops and under every spreading tree.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God delivered him into the hands of the king of Aram. The Arameans defeated him and took many of his people as prisoners and brought them to Damascus.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He was also given into the hands of the king of Israel, who inflicted heavy casualties on him. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In one day Pekah son of Remaliah killed a hundred and twenty thousand soldiers in Judah—because Judah had forsaken the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of their ancestors. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zikri, an Ephraimite warrior, killed Maaseiah the king’s son, Azrikam the officer in charge of the palace, and Elkanah, second to the king. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The men of Israel took captive from their fellow Israelites who were from Judah two hundred thousand wives, sons and daughters. They also took a great deal of plunder, which they carried back to Samaria.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But a prophet of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' named Oded was there, and he went out to meet the army when it returned to Samaria. He said to them, “Because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of your ancestors, was angry with Judah, he gave them into your hand. But you have slaughtered them in a rage that reaches to heaven. '
