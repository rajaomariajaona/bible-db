  '6':
  - type: text
    content: 'These are the people of the province who came up from the captivity of the exiles whom Nebuchadnezzar king of Babylon had taken captive (they returned to Jerusalem and Judah, each to his own town, '
  '60':
  - type: text
    content: The temple servants and the descendants of the servants of Solomon
  - type: text
    content: '392'
  '61':
  - type: text
    content: 'The following came up from the towns of Tel Melah, Tel Harsha, Kerub, Addon and Immer, but they could not show that their families were descended from Israel:'
  '62':
  - type: text
    content: the descendants of
  - type: text
    content: Delaiah, Tobiah and Nekoda
  - type: text
    content: '642'
  '63':
  - type: text
    content: 'And from among the priests:'
  - type: text
    content: the descendants of
  - type: text
    content: Hobaiah, Hakkoz and Barzillai (a man who had married a daughter of Barzillai the Gileadite and was called by that name).
  '64':
  - type: text
    content: 'These searched for their family records, but they could not find them and so were excluded from the priesthood as unclean. '
  '65':
  - type: text
    content: The governor, therefore, ordered them not to eat any of the most sacred food until there should be a priest ministering with the Urim and Thummim.
  '66':
  - type: text
    content: 'The whole company numbered 42,360, '
  '67':
  - type: text
    content: 'besides their 7,337 male and female slaves; and they also had 245 male and female singers. '
  '68':
  - type: text
    content: There were 736 horses, 245 mules,
  - type: note
    content: Some Hebrew manuscripts (see also Ezra 2:66); most Hebrew manuscripts do not have this verse.
  - type: text
    content: ' '
  '69':
  - type: text
