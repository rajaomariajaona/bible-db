  '7':
  - type: text
    content: 'in company with Zerubbabel, Joshua, Nehemiah, Azariah, Raamiah, Nahamani, Mordecai, Bilshan, Mispereth, Bigvai, Nehum and Baanah):'
  - type: text
    content: 'The list of the men of Israel:'
  '70':
  - type: text
    content: Some of the heads of the families contributed to the work. The governor gave to the treasury 1,000 darics
  - type: note
    content: That is, about 19 pounds or about 8.4 kilograms
  - type: text
    content: ' of gold, 50 bowls and 530 garments for priests. '
  '71':
  - type: text
    content: Some of the heads of the families gave to the treasury for the work 20,000 darics
  - type: note
    content: That is, about 375 pounds or about 170 kilograms; also in verse 72
  - type: text
    content: ' of gold and 2,200 minas'
  - type: note
    content: That is, about 1 1/3 tons or about 1.2 metric tons
  - type: text
    content: ' of silver. '
  '72':
  - type: text
    content: The total given by the rest of the people was 20,000 darics of gold, 2,000 minas
  - type: note
    content: That is, about 1 1/4 tons or about 1.1 metric tons
  - type: text
    content: ' of silver and 67 garments for priests.'
  '73':
  - type: text
    content: The priests, the Levites, the gatekeepers, the musicians and the temple servants, along with certain of the people and the rest of the Israelites, settled in their own towns.
  - type: heading
    content: Ezra Reads the Law
  - type: text
    content: When the seventh month came and the Israelites had settled in their towns,
