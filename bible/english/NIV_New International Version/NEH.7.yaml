    text: Lebana, Hagaba, Shalmai,
  '49':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Hanan, Giddel, Gahar,
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'So my God put it into my heart to assemble the nobles, the officials and the common people for registration by families. I found the genealogical record of those who had been the first to return. This is what I found written there:'
  '50':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: Reaiah, Rezin, Nekoda,
  '51':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Gazzam, Uzza, Paseah,
  '52':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Besai, Meunim, Nephusim,
  '53':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Bakbuk, Hakupha, Harhur,
  '54':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Bazluth, Mehida, Harsha,
  '55':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: Barkos, Sisera, Temah,
  '56':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Neziah and Hatipha
  '57':
  - type: usfm
    marker: mi
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'The descendants of the servants of Solomon:'
  - type: text
    text: the descendants ofSotai, Sophereth, Perida,
  '58':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Jaala, Darkon, Giddel,
  '59':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Shephatiah, Hattil,Pokereth-Hazzebaim and Amon
  '6':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'These are the people of the province who came up from the captivity of the exiles whom Nebuchadnezzar king of Babylon had taken captive (they returned to Jerusalem and Judah, each to his own town, '
  '60':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: The temple servants and the descendants of the servants of Solomon392
  '61':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: 'The following came up from the towns of Tel Melah, Tel Harsha, Kerub, Addon and Immer, but they could not show that their families were descended from Israel:'
  '62':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: the descendants ofDelaiah, Tobiah and Nekoda642
  '63':
  - type: usfm
    marker: mi
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: 'And from among the priests:'
  - type: text
    text: the descendants ofHobaiah, Hakkoz and Barzillai (a man who had married a daughter of Barzillai the Gileadite and was called by that name).
  '64':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: 'These searched for their family records, but they could not find them and so were excluded from the priesthood as unclean. '
  '65':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: The governor, therefore, ordered them not to eat any of the most sacred food until there should be a priest ministering with the Urim and Thummim.
  '66':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: 'The whole company numbered 42,360, '
  '67':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '67'
    - type: text
      text: 'besides their 7,337 male and female slaves; and they also had 245 male and female singers. '
  '68':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '68'
    - type: text
      text: There were 736 horses, 245 mules,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:68 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Some Hebrew manuscripts (see also Ezra 2:66); most Hebrew manuscripts do not have this verse.
      marker-yv: yv-n
    - type: text
      text: ' '
  '69':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '69'
    - type: text
      text: 435 camels and 6,720 donkeys.
  '7':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'in company with Zerubbabel, Joshua, Nehemiah, Azariah, Raamiah, Nahamani, Mordecai, Bilshan, Mispereth, Bigvai, Nehum and Baanah):'
  - type: usfm
    marker: mi
    children:
    - type: text
      text: 'The list of the men of Israel:'
  '70':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '70'
    - type: text
      text: Some of the heads of the families contributed to the work. The governor gave to the treasury 1,000 darics
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:70 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 19 pounds or about 8.4 kilograms
      marker-yv: yv-n
    - type: text
      text: ' of gold, 50 bowls and 530 garments for priests. '
  '71':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '71'
    - type: text
      text: Some of the heads of the families gave to the treasury for the work 20,000 darics
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:71 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 375 pounds or about 170 kilograms; also in verse 72
      marker-yv: yv-n
    - type: text
      text: ' of gold and 2,200 minas'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:71 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 1 1/3 tons or about 1.2 metric tons
      marker-yv: yv-n
    - type: text
      text: ' of silver. '
  '72':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '72'
    - type: text
      text: The total given by the rest of the people was 20,000 darics of gold, 2,000 minas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:72 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 1 1/4 tons or about 1.1 metric tons
      marker-yv: yv-n
    - type: text
      text: ' of silver and 67 garments for priests.'
  '73':
  - type: usfm
    marker: pi1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '73'
    - type: text
      text: The priests, the Levites, the gatekeepers, the musicians and the temple servants, along with certain of the people and the rest of the Israelites, settled in their own towns.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ezra Reads the Law
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the seventh month came and the Israelites had settled in their towns,
  '8':
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: the descendants of Parosh2,172
  '9':
  - type: usfm
