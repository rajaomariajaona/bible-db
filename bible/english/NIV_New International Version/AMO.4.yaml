document_id: AMO.4,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel Has Not Returned to God
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hear this word, you cows of Bashan on Mount Samaria,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you women who oppress the poor and crush the needy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and say to your husbands, “Bring us some drinks!”
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I sent plagues among you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as I did to Egypt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I killed your young men with the sword,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: along with your captured horses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I filled your nostrils with the stench of your camps,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet you have not returned to me,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I overthrew some of you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as I overthrew Sodom and Gomorrah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You were like a burning stick snatched from the fire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet you have not returned to me,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Therefore this is what I will do to you, Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and because I will do this to you, Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: prepare to meet your God.”
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who forms the mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who creates the wind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and who reveals his thoughts to mankind,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who turns dawn to darkness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and treads on the heights of the earth—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God Almighty is his name.'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has sworn by his holiness:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “The time will surely come
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when you will be taken away with hooks,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the last of you with fishhooks.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: away in baskets, / the last of you in fish baskets
      marker-yv: yv-n
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will each go straight out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: through breaches in the wall,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will be cast out toward Harmon,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Masoretic Text; with a different word division of the Hebrew (see Septuagint) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: out, you mountain of oppression
      marker-yv: yv-n
    - type: text
      text: ”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Go to Bethel and sin;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: go to Gilgal and sin yet more.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bring your sacrifices every morning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your tithes every three years.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: days
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Burn leavened bread as a thank offering
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and brag about your freewill offerings—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: boast about them, you Israelites,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for this is what you love to do,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I gave you empty stomachs in every city
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and lack of bread in every town,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet you have not returned to me,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I also withheld rain from you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when the harvest was still three months away.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I sent rain on one town,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but withheld it from another.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: One field had rain;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: another had none and dried up.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People staggered from town to town for water
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but did not get enough to drink,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet you have not returned to me,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Many times I struck your gardens and vineyards,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: destroying them with blight and mildew.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Locusts devoured your fig and olive trees,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet you have not returned to me,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
