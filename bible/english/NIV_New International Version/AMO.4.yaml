document_id: AMO.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Has Not Returned to God
  - type: text
    content: Hear this word, you cows of Bashan on Mount Samaria,
  - type: text
    content: you women who oppress the poor and crush the needy
  - type: text
    content: and say to your husbands, “Bring us some drinks!”
  '10':
  - type: text
    content: “I sent plagues among you
  - type: text
    content: as I did to Egypt.
  - type: text
    content: I killed your young men with the sword,
  - type: text
    content: along with your captured horses.
  - type: text
    content: I filled your nostrils with the stench of your camps,
  - type: text
    content: yet you have not returned to me,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '11':
  - type: text
    content: “I overthrew some of you
  - type: text
    content: as I overthrew Sodom and Gomorrah.
  - type: text
    content: You were like a burning stick snatched from the fire,
  - type: text
    content: yet you have not returned to me,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: “Therefore this is what I will do to you, Israel,
  - type: text
    content: and because I will do this to you, Israel,
  - type: text
    content: prepare to meet your God.”
  '13':
  - type: text
    content: He who forms the mountains,
  - type: text
    content: who creates the wind,
  - type: text
    content: and who reveals his thoughts to mankind,
  - type: text
    content: who turns dawn to darkness,
  - type: text
    content: and treads on the heights of the earth—
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' God Almighty is his name.'
  '2':
  - type: text
    content: 'The Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' has sworn by his holiness:'
  - type: text
    content: “The time will surely come
  - type: text
    content: when you will be taken away with hooks,
  - type: text
    content: the last of you with fishhooks.
  - type: note
    content: Or away in baskets, / the last of you in fish baskets
  '3':
  - type: text
    content: You will each go straight out
  - type: text
    content: through breaches in the wall,
  - type: text
    content: and you will be cast out toward Harmon,
  - type: note
    content: Masoretic Text; with a different word division of the Hebrew (see Septuagint) out, you mountain of oppression
  - type: text
    content: ”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: “Go to Bethel and sin;
  - type: text
    content: go to Gilgal and sin yet more.
  - type: text
    content: Bring your sacrifices every morning,
  - type: text
    content: your tithes every three years.
  - type: note
    content: Or days
  '5':
  - type: text
    content: Burn leavened bread as a thank offering
  - type: text
    content: and brag about your freewill offerings—
  - type: text
    content: boast about them, you Israelites,
  - type: text
    content: for this is what you love to do,”
  - type: text
    content: 'declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: “I gave you empty stomachs in every city
  - type: text
    content: and lack of bread in every town,
  - type: text
    content: yet you have not returned to me,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '7':
  - type: text
    content: “I also withheld rain from you
  - type: text
    content: when the harvest was still three months away.
  - type: text
    content: I sent rain on one town,
  - type: text
    content: but withheld it from another.
  - type: text
    content: One field had rain;
  - type: text
    content: another had none and dried up.
  '8':
  - type: text
    content: People staggered from town to town for water
  - type: text
    content: but did not get enough to drink,
  - type: text
    content: yet you have not returned to me,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: “Many times I struck your gardens and vineyards,
  - type: text
    content: destroying them with blight and mildew.
  - type: text
    content: Locusts devoured your fig and olive trees,
  - type: text
    content: yet you have not returned to me,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
