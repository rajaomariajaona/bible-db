document_id: LUK.4,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Is Tested in the Wilderness
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus, full of the Holy Spirit, left the Jordan and was led by the Spirit into the wilderness, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For it is written:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “ ‘He will command his angels concerning you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to guard you carefully;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will lift you up in their hands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that you will not strike your foot against a stone.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalm 91:11,12
      marker-yv: yv-n
    - type: text
      text: ”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“It is said: ‘Do not put the Lord your God to the test.’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut. 6:16
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When the devil had finished all this tempting, he left him until an opportune time.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Rejected at Nazareth
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus returned to Galilee in the power of the Spirit, and news about him spread through the whole countryside. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He was teaching in their synagogues, and everyone praised him.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He went to Nazareth, where he had been brought up, and on the Sabbath day he went into the synagogue, as was his custom. He stood up to read, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and the scroll of the prophet Isaiah was handed to him. Unrolling it, he found the place where it is written:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The Spirit of the Lord is on me,
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: because he has anointed me
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to proclaim good news to the poor.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: He has sent me to proclaim freedom for the prisoners
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and recovery of sight for the blind,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to set the oppressed free,
  '19':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: to proclaim the year of the Lord’s favor.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 61:1,2 (see Septuagint); Isaiah 58:6
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: where for forty days he was tempted
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tempted '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'can also mean '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tested.
      marker-yv: yv-n
    - type: text
      text: ' by the devil. He ate nothing during those days, and at the end of them he was hungry.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he rolled up the scroll, gave it back to the attendant and sat down. The eyes of everyone in the synagogue were fastened on him. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He began by saying to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Today this scripture is fulfilled in your hearing.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All spoke well of him and were amazed at the gracious words that came from his lips. “Isn’t this Joseph’s son?” they asked.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus said to them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“Surely you will quote this proverb to me: ‘Physician, heal yourself!’ And you will tell me, ‘Do here in your hometown what we have heard that you did in Capernaum.’ ”'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Truly I tell you,”
    - type: text
      text: ' he continued, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “no prophet is accepted in his hometown.
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I assure you that there were many widows in Israel in Elijah’s time, when the sky was shut for three and a half years and there was a severe famine throughout the land.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: Yet Elijah was not sent to any of them, but to a widow in Zarephath in the region of Sidon.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And there were many in Israel with leprosy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek word traditionally translated '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'leprosy '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was used for various diseases affecting the skin.
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: in the time of Elisha the prophet, yet not one of them was cleansed—only Naaman the Syrian.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the people in the synagogue were furious when they heard this. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They got up, drove him out of the town, and took him to the brow of the hill on which the town was built, in order to throw him off the cliff. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The devil said to him, “If you are the Son of God, tell this stone to become bread.”
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But he walked right through the crowd and went on his way.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Drives Out an Impure Spirit
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he went down to Capernaum, a town in Galilee, and on the Sabbath he taught the people. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They were amazed at his teaching, because his words had authority.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the synagogue there was a man possessed by a demon, an impure spirit. He cried out at the top of his voice, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Go away! What do you want with us, Jesus of Nazareth? Have you come to destroy us? I know who you are—the Holy One of God!”
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Be quiet!”
    - type: text
      text: ' Jesus said sternly. '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Come out of him!”
    - type: text
      text: ' Then the demon threw the man down before them all and came out without injuring him.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the people were amazed and said to each other, “What words these are! With authority and power he gives orders to impure spirits and they come out!” '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the news about him spread throughout the surrounding area.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Heals Many
    marker-yv: yv-h
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus left the synagogue and went to the home of Simon. Now Simon’s mother-in-law was suffering from a high fever, and they asked Jesus to help her. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he bent over her and rebuked the fever, and it left her. She got up at once and began to wait on them.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“It is written: ‘Man shall not live on bread alone.’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut. 8:3
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At sunset, the people brought to Jesus all who had various kinds of sickness, and laying his hands on each one, he healed them. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moreover, demons came out of many people, shouting, “You are the Son of God!” But he rebuked them and would not allow them to speak, because they knew he was the Messiah.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At daybreak, Jesus went out to a solitary place. The people were looking for him and when they came to where he was, they tried to keep him from leaving them. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But he said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “I must proclaim the good news of the kingdom of God to the other towns also, because that is why I was sent.”
    - type: text
      text: ' '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he kept on preaching in the synagogues of Judea.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The devil led him up to a high place and showed him in an instant all the kingdoms of the world. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he said to him, “I will give you all their authority and splendor; it has been given to me, and I can give it to anyone I want to. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: If you worship me, it will all be yours.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus answered, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: '“It is written: ‘Worship the Lord your God and serve him only.’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Deut. 6:13
      marker-yv: yv-n
    - type: usfm
      marker: wj
      children:
      - type: text
        text: ”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The devil led him to Jerusalem and had him stand on the highest point of the temple. “If you are the Son of God,” he said, “throw yourself down from here. '
