document_id: LUK.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Is Tested in the Wilderness
  - type: text
    content: 'Jesus, full of the Holy Spirit, left the Jordan and was led by the Spirit into the wilderness, '
  '10':
  - type: text
    content: 'For it is written:'
  - type: text
    content: “ ‘He will command his angels concerning you
  - type: text
    content: to guard you carefully;
  '11':
  - type: text
    content: they will lift you up in their hands,
  - type: text
    content: so that you will not strike your foot against a stone.’
  - type: note
    content: Psalm 91:11,12
  - type: text
    content: ”
  '12':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“It is said: ‘Do not put the Lord your God to the test.’'
  - type: note
    content: Deut. 6:16
  - type: text
    content: ”
  '13':
  - type: text
    content: When the devil had finished all this tempting, he left him until an opportune time.
  - type: heading
    content: Jesus Rejected at Nazareth
  '14':
  - type: text
    content: 'Jesus returned to Galilee in the power of the Spirit, and news about him spread through the whole countryside. '
  '15':
  - type: text
    content: He was teaching in their synagogues, and everyone praised him.
  '16':
  - type: text
    content: 'He went to Nazareth, where he had been brought up, and on the Sabbath day he went into the synagogue, as was his custom. He stood up to read, '
  '17':
  - type: text
    content: 'and the scroll of the prophet Isaiah was handed to him. Unrolling it, he found the place where it is written:'
  '18':
  - type: text
    content: ' '
  - type: text
    content: “The Spirit of the Lord is on me,
  - type: text
    content: because he has anointed me
  - type: text
    content: to proclaim good news to the poor.
  - type: text
    content: He has sent me to proclaim freedom for the prisoners
  - type: text
    content: and recovery of sight for the blind,
  - type: text
    content: to set the oppressed free,
  '19':
  - type: text
    content: ' '
  - type: text
    content: to proclaim the year of the Lord’s favor.”
  - type: note
    content: Isaiah 61:1,2 (see Septuagint); Isaiah 58:6
  '2':
  - type: text
    content: where for forty days he was tempted
  - type: note
    content: The Greek for tempted can also mean tested.
  - type: text
    content: ' by the devil. He ate nothing during those days, and at the end of them he was hungry.'
  '20':
  - type: text
    content: 'Then he rolled up the scroll, gave it back to the attendant and sat down. The eyes of everyone in the synagogue were fastened on him. '
  '21':
  - type: text
    content: 'He began by saying to them, '
  - type: text
    content: “Today this scripture is fulfilled in your hearing.”
  '22':
  - type: text
    content: All spoke well of him and were amazed at the gracious words that came from his lips. “Isn’t this Joseph’s son?” they asked.
  '23':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: '“Surely you will quote this proverb to me: ‘Physician, heal yourself!’ And you will tell me, ‘Do here in your hometown what we have heard that you did in Capernaum.’ ”'
  '24':
  - type: text
    content: ' '
  - type: text
    content: “Truly I tell you,”
  - type: text
    content: ' he continued, '
  - type: text
    content: “no prophet is accepted in his hometown.
  - type: text
    content: ' '
  '25':
  - type: text
    content: I assure you that there were many widows in Israel in Elijah’s time, when the sky was shut for three and a half years and there was a severe famine throughout the land.
  - type: text
    content: ' '
  '26':
  - type: text
    content: Yet Elijah was not sent to any of them, but to a widow in Zarephath in the region of Sidon.
  - type: text
    content: ' '
  '27':
  - type: text
    content: And there were many in Israel with leprosy
  - type: note
    content: The Greek word traditionally translated leprosy was used for various diseases affecting the skin.
  - type: text
    content: ' '
  - type: text
    content: in the time of Elisha the prophet, yet not one of them was cleansed—only Naaman the Syrian.”
  '28':
  - type: text
    content: 'All the people in the synagogue were furious when they heard this. '
  '29':
  - type: text
    content: 'They got up, drove him out of the town, and took him to the brow of the hill on which the town was built, in order to throw him off the cliff. '
  '3':
  - type: text
    content: The devil said to him, “If you are the Son of God, tell this stone to become bread.”
  '30':
  - type: text
    content: But he walked right through the crowd and went on his way.
  - type: heading
    content: Jesus Drives Out an Impure Spirit
  '31':
  - type: text
    content: 'Then he went down to Capernaum, a town in Galilee, and on the Sabbath he taught the people. '
  '32':
  - type: text
    content: They were amazed at his teaching, because his words had authority.
  '33':
  - type: text
    content: 'In the synagogue there was a man possessed by a demon, an impure spirit. He cried out at the top of his voice, '
  '34':
  - type: text
    content: “Go away! What do you want with us, Jesus of Nazareth? Have you come to destroy us? I know who you are—the Holy One of God!”
  '35':
  - type: text
    content: ' '
  - type: text
    content: “Be quiet!”
  - type: text
    content: ' Jesus said sternly. '
  - type: text
    content: “Come out of him!”
  - type: text
    content: ' Then the demon threw the man down before them all and came out without injuring him.'
  '36':
  - type: text
    content: 'All the people were amazed and said to each other, “What words these are! With authority and power he gives orders to impure spirits and they come out!” '
  '37':
  - type: text
    content: And the news about him spread throughout the surrounding area.
  - type: heading
    content: Jesus Heals Many
  '38':
  - type: text
    content: 'Jesus left the synagogue and went to the home of Simon. Now Simon’s mother-in-law was suffering from a high fever, and they asked Jesus to help her. '
  '39':
  - type: text
    content: So he bent over her and rebuked the fever, and it left her. She got up at once and began to wait on them.
  '4':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“It is written: ‘Man shall not live on bread alone.’'
  - type: note
    content: Deut. 8:3
  - type: text
    content: ”
  '40':
  - type: text
    content: 'At sunset, the people brought to Jesus all who had various kinds of sickness, and laying his hands on each one, he healed them. '
  '41':
  - type: text
    content: Moreover, demons came out of many people, shouting, “You are the Son of God!” But he rebuked them and would not allow them to speak, because they knew he was the Messiah.
  '42':
  - type: text
    content: 'At daybreak, Jesus went out to a solitary place. The people were looking for him and when they came to where he was, they tried to keep him from leaving them. '
  '43':
  - type: text
    content: 'But he said, '
  - type: text
    content: “I must proclaim the good news of the kingdom of God to the other towns also, because that is why I was sent.”
  - type: text
    content: ' '
  '44':
  - type: text
    content: And he kept on preaching in the synagogues of Judea.
  '5':
  - type: text
    content: 'The devil led him up to a high place and showed him in an instant all the kingdoms of the world. '
  '6':
  - type: text
    content: 'And he said to him, “I will give you all their authority and splendor; it has been given to me, and I can give it to anyone I want to. '
  '7':
  - type: text
    content: If you worship me, it will all be yours.”
  '8':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: '“It is written: ‘Worship the Lord your God and serve him only.’'
  - type: note
    content: Deut. 6:13
  - type: text
    content: ”
  '9':
  - type: text
    content: 'The devil led him to Jerusalem and had him stand on the highest point of the temple. “If you are the Son of God,” he said, “throw yourself down from here. '
