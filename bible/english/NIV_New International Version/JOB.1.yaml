  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prologue
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the land of Uz there lived a man whose name was Job. This man was blameless and upright; he feared God and shunned evil. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Have you not put a hedge around him and his household and everything he has? You have blessed the work of his hands, so that his flocks and herds are spread throughout the land. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But now stretch out your hand and strike everything he has, and he will surely curse you to your face.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Satan, “Very well, then, everything he has is in your power, but on the man himself do not lay a finger.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Satan went out from the presence of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One day when Job’s sons and daughters were feasting and drinking wine at the oldest brother’s house, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'a messenger came to Job and said, “The oxen were plowing and the donkeys were grazing nearby, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and the Sabeans attacked and made off with them. They put the servants to the sword, and I am the only one who has escaped to tell you!”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: While he was still speaking, another messenger came and said, “The fire of God fell from the heavens and burned up the sheep and the servants, and I am the only one who has escaped to tell you!”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: While he was still speaking, another messenger came and said, “The Chaldeans formed three raiding parties and swept down on your camels and made off with them. They put the servants to the sword, and I am the only one who has escaped to tell you!”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While he was still speaking, yet another messenger came and said, “Your sons and daughters were feasting and drinking wine at the oldest brother’s house, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: when suddenly a mighty wind swept in from the desert and struck the four corners of the house. It collapsed on them and they are dead, and I am the only one who has escaped to tell you!”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He had seven sons and three daughters, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At this, Job got up and tore his robe and shaved his head. Then he fell to the ground in worship '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Naked I came from my mother’s womb,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and naked I will depart.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will return there
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has taken away;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'may the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' be praised.”'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In all this, Job did not sin by charging God with wrongdoing.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and he owned seven thousand sheep, three thousand camels, five hundred yoke of oxen and five hundred donkeys, and had a large number of servants. He was the greatest man among all the people of the East.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His sons used to hold feasts in their homes on their birthdays, and they would invite their three sisters to eat and drink with them. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When a period of feasting had run its course, Job would make arrangements for them to be purified. Early in the morning he would sacrifice a burnt offering for each of them, thinking, “Perhaps my children have sinned and cursed God in their hearts.” This was Job’s regular custom.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: One day the angels
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the sons of God
      marker-yv: yv-n
    - type: text
      text: ' came to present themselves before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and Satan'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
        - type: usfm
          marker: tl
          children:
          - type: text
            text: satan
        - type: text
          text: ' means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: adversary.
      marker-yv: yv-n
    - type: text
      text: ' also came with them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Satan, “Where have you come from?”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Satan answered the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “From roaming throughout the earth, going back and forth on it.”'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Satan, “Have you considered my servant Job? There is no one on earth like him; he is blameless and upright, a man who fears God and shuns evil.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Does Job fear God for nothing?” Satan replied. '
