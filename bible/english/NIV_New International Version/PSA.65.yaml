document_id: PSA.65,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 65
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 65:1-13 is numbered 65:2-14.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the director of music. A psalm of David. A song.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Praise awaits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '65:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: befits
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; the meaning of the Hebrew for this word is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' you, our God, in Zion;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to you our vows will be fulfilled.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: You drench its furrows and level its ridges;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you soften it with showers and bless its crops.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: You crown the year with your bounty,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your carts overflow with abundance.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The grasslands of the wilderness overflow;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the hills are clothed with gladness.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: The meadows are covered with flocks
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the valleys are mantled with grain;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they shout for joy and sing.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: You who answer prayer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to you all people will come.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: When we were overwhelmed by sins,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you forgave
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '65:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: made atonement for
      marker-yv: yv-n
    - type: text
      text: ' our transgressions.'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Blessed are those you choose
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bring near to live in your courts!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We are filled with the good things of your house,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of your holy temple.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: You answer us with awesome and righteous deeds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: God our Savior,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the hope of all the ends of the earth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and of the farthest seas,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: who formed the mountains by your power,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: having armed yourself with strength,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: who stilled the roaring of the seas,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the roaring of their waves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the turmoil of the nations.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: The whole earth is filled with awe at your wonders;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: where morning dawns, where evening fades,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you call forth songs of joy.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: You care for the land and water it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you enrich it abundantly.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The streams of God are filled with water
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to provide the people with grain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for so you have ordained it.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '65:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: for that is how you prepare the land
      marker-yv: yv-n
