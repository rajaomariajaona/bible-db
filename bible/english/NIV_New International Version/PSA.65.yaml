document_id: PSA.65,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 65In Hebrew texts 65:1-13 is numbered 65:2-14.
  - type: text
    content: For the director of music. A psalm of David. A song.
  - type: text
    content: Praise awaits
  - type: note
    content: Or befits; the meaning of the Hebrew for this word is uncertain.
  - type: text
    content: ' you, our God, in Zion;'
  - type: text
    content: to you our vows will be fulfilled.
  '10':
  - type: text
    content: You drench its furrows and level its ridges;
  - type: text
    content: you soften it with showers and bless its crops.
  '11':
  - type: text
    content: You crown the year with your bounty,
  - type: text
    content: and your carts overflow with abundance.
  '12':
  - type: text
    content: The grasslands of the wilderness overflow;
  - type: text
    content: the hills are clothed with gladness.
  '13':
  - type: text
    content: The meadows are covered with flocks
  - type: text
    content: and the valleys are mantled with grain;
  - type: text
    content: they shout for joy and sing.
  '2':
  - type: text
    content: You who answer prayer,
  - type: text
    content: to you all people will come.
  '3':
  - type: text
    content: When we were overwhelmed by sins,
  - type: text
    content: you forgave
  - type: note
    content: Or made atonement for
  - type: text
    content: ' our transgressions.'
  '4':
  - type: text
    content: Blessed are those you choose
  - type: text
    content: and bring near to live in your courts!
  - type: text
    content: We are filled with the good things of your house,
  - type: text
    content: of your holy temple.
  '5':
  - type: text
    content: You answer us with awesome and righteous deeds,
  - type: text
    content: God our Savior,
  - type: text
    content: the hope of all the ends of the earth
  - type: text
    content: and of the farthest seas,
  '6':
  - type: text
    content: who formed the mountains by your power,
  - type: text
    content: having armed yourself with strength,
  '7':
  - type: text
    content: who stilled the roaring of the seas,
  - type: text
    content: the roaring of their waves,
  - type: text
    content: and the turmoil of the nations.
  '8':
  - type: text
    content: The whole earth is filled with awe at your wonders;
  - type: text
    content: where morning dawns, where evening fades,
  - type: text
    content: you call forth songs of joy.
  '9':
  - type: text
    content: You care for the land and water it;
  - type: text
    content: you enrich it abundantly.
  - type: text
    content: The streams of God are filled with water
  - type: text
    content: to provide the people with grain,
  - type: text
    content: for so you have ordained it.
  - type: note
    content: Or for that is how you prepare the land
