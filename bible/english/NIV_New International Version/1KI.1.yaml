document_id: 1KI.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Adonijah Sets Himself Up as King
  - type: text
    content: 'When King David was very old, he could not keep warm even when they put covers over him. '
  '10':
  - type: text
    content: but he did not invite Nathan the prophet or Benaiah or the special guard or his brother Solomon.
  '11':
  - type: text
    content: 'Then Nathan asked Bathsheba, Solomon’s mother, “Have you not heard that Adonijah, the son of Haggith, has become king, and our lord David knows nothing about it? '
  '12':
  - type: text
    content: 'Now then, let me advise you how you can save your own life and the life of your son Solomon. '
  '13':
  - type: text
    content: 'Go in to King David and say to him, ‘My lord the king, did you not swear to me your servant: “Surely Solomon your son shall be king after me, and he will sit on my throne”? Why then has Adonijah become king?’ '
  '14':
  - type: text
    content: While you are still there talking to the king, I will come in and add my word to what you have said.”
  '15':
  - type: text
    content: 'So Bathsheba went to see the aged king in his room, where Abishag the Shunammite was attending him. '
  '16':
  - type: text
    content: Bathsheba bowed down, prostrating herself before the king.
  - type: text
    content: “What is it you want?” the king asked.
  '17':
  - type: text
    content: 'She said to him, “My lord, you yourself swore to me your servant by the '
  - type: text
    content: Lord
  - type: text
    content: ' your God: ‘Solomon your son shall be king after me, and he will sit on my throne.’ '
  '18':
  - type: text
    content: 'But now Adonijah has become king, and you, my lord the king, do not know about it. '
  '19':
  - type: text
    content: 'He has sacrificed great numbers of cattle, fattened calves, and sheep, and has invited all the king’s sons, Abiathar the priest and Joab the commander of the army, but he has not invited Solomon your servant. '
  '2':
  - type: text
    content: So his attendants said to him, “Let us look for a young virgin to serve the king and take care of him. She can lie beside him so that our lord the king may keep warm.”
  '20':
  - type: text
    content: 'My lord the king, the eyes of all Israel are on you, to learn from you who will sit on the throne of my lord the king after him. '
  '21':
  - type: text
    content: Otherwise, as soon as my lord the king is laid to rest with his ancestors, I and my son Solomon will be treated as criminals.”
  '22':
  - type: text
    content: 'While she was still speaking with the king, Nathan the prophet arrived. '
  '23':
  - type: text
    content: And the king was told, “Nathan the prophet is here.” So he went before the king and bowed with his face to the ground.
  '24':
  - type: text
    content: 'Nathan said, “Have you, my lord the king, declared that Adonijah shall be king after you, and that he will sit on your throne? '
  '25':
  - type: text
    content: 'Today he has gone down and sacrificed great numbers of cattle, fattened calves, and sheep. He has invited all the king’s sons, the commanders of the army and Abiathar the priest. Right now they are eating and drinking with him and saying, ‘Long live King Adonijah!’ '
  '26':
  - type: text
    content: 'But me your servant, and Zadok the priest, and Benaiah son of Jehoiada, and your servant Solomon he did not invite. '
  '27':
  - type: text
    content: Is this something my lord the king has done without letting his servants know who should sit on the throne of my lord the king after him?”
  - type: heading
    content: David Makes Solomon King
  '28':
  - type: text
    content: Then King David said, “Call in Bathsheba.” So she came into the king’s presence and stood before him.
  '29':
  - type: text
    content: 'The king then took an oath: “As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, who has delivered me out of every trouble, '
  '3':
  - type: text
    content: 'Then they searched throughout Israel for a beautiful young woman and found Abishag, a Shunammite, and brought her to the king. '
  '30':
  - type: text
    content: 'I will surely carry out this very day what I swore to you by the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel: Solomon your son shall be king after me, and he will sit on my throne in my place.”'
  '31':
  - type: text
    content: Then Bathsheba bowed down with her face to the ground, prostrating herself before the king, and said, “May my lord King David live forever!”
  '32':
  - type: text
    content: 'King David said, “Call in Zadok the priest, Nathan the prophet and Benaiah son of Jehoiada.” When they came before the king, '
  '33':
  - type: text
    content: 'he said to them: “Take your lord’s servants with you and have Solomon my son mount my own mule and take him down to Gihon. '
  '34':
  - type: text
    content: 'There have Zadok the priest and Nathan the prophet anoint him king over Israel. Blow the trumpet and shout, ‘Long live King Solomon!’ '
  '35':
  - type: text
    content: Then you are to go up with him, and he is to come and sit on my throne and reign in my place. I have appointed him ruler over Israel and Judah.”
  '36':
  - type: text
    content: 'Benaiah son of Jehoiada answered the king, “Amen! May the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of my lord the king, so declare it. '
  '37':
  - type: text
    content: 'As the '
  - type: text
    content: Lord
  - type: text
    content: ' was with my lord the king, so may he be with Solomon to make his throne even greater than the throne of my lord King David!”'
  '38':
  - type: text
    content: 'So Zadok the priest, Nathan the prophet, Benaiah son of Jehoiada, the Kerethites and the Pelethites went down and had Solomon mount King David’s mule, and they escorted him to Gihon. '
  '39':
  - type: text
    content: 'Zadok the priest took the horn of oil from the sacred tent and anointed Solomon. Then they sounded the trumpet and all the people shouted, “Long live King Solomon!” '
  '4':
  - type: text
    content: The woman was very beautiful; she took care of the king and waited on him, but the king had no sexual relations with her.
  '40':
  - type: text
    content: And all the people went up after him, playing pipes and rejoicing greatly, so that the ground shook with the sound.
  '41':
  - type: text
    content: Adonijah and all the guests who were with him heard it as they were finishing their feast. On hearing the sound of the trumpet, Joab asked, “What’s the meaning of all the noise in the city?”
  '42':
  - type: text
    content: Even as he was speaking, Jonathan son of Abiathar the priest arrived. Adonijah said, “Come in. A worthy man like you must be bringing good news.”
  '43':
  - type: text
    content: '“Not at all!” Jonathan answered. “Our lord King David has made Solomon king. '
  '44':
  - type: text
    content: 'The king has sent with him Zadok the priest, Nathan the prophet, Benaiah son of Jehoiada, the Kerethites and the Pelethites, and they have put him on the king’s mule, '
  '45':
  - type: text
    content: 'and Zadok the priest and Nathan the prophet have anointed him king at Gihon. From there they have gone up cheering, and the city resounds with it. That’s the noise you hear. '
  '46':
  - type: text
    content: 'Moreover, Solomon has taken his seat on the royal throne. '
  '47':
  - type: text
    content: 'Also, the royal officials have come to congratulate our lord King David, saying, ‘May your God make Solomon’s name more famous than yours and his throne greater than yours!’ And the king bowed in worship on his bed '
  '48':
  - type: text
    content: 'and said, ‘Praise be to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, who has allowed my eyes to see a successor on my throne today.’ ”'
  '49':
  - type: text
    content: 'At this, all Adonijah’s guests rose in alarm and dispersed. '
  '5':
  - type: text
    content: Now Adonijah, whose mother was Haggith, put himself forward and said, “I will be king.” So he got chariots and horses
  - type: note
    content: Or charioteers
  - type: text
    content: ' ready, with fifty men to run ahead of him. '
  '50':
  - type: text
    content: 'But Adonijah, in fear of Solomon, went and took hold of the horns of the altar. '
  '51':
  - type: text
    content: Then Solomon was told, “Adonijah is afraid of King Solomon and is clinging to the horns of the altar. He says, ‘Let King Solomon swear to me today that he will not put his servant to death with the sword.’ ”
  '52':
  - type: text
    content: 'Solomon replied, “If he shows himself to be worthy, not a hair of his head will fall to the ground; but if evil is found in him, he will die.” '
  '53':
  - type: text
    content: Then King Solomon sent men, and they brought him down from the altar. And Adonijah came and bowed down to King Solomon, and Solomon said, “Go to your home.”
  '6':
  - type: text
    content: (His father had never rebuked him by asking, “Why do you behave as you do?” He was also very handsome and was born next after Absalom.)
  '7':
  - type: text
    content: 'Adonijah conferred with Joab son of Zeruiah and with Abiathar the priest, and they gave him their support. '
  '8':
  - type: text
    content: But Zadok the priest, Benaiah son of Jehoiada, Nathan the prophet, Shimei and Rei and David’s special guard did not join Adonijah.
  '9':
  - type: text
    content: 'Adonijah then sacrificed sheep, cattle and fattened calves at the Stone of Zoheleth near En Rogel. He invited all his brothers, the king’s sons, and all the royal officials of Judah, '
