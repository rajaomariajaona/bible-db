document_id: DEU.11,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Love and Obey the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Love the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God and keep his requirements, his decrees, his laws and his commands always. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The land you are entering to take over is not like the land of Egypt, from which you have come, where you planted your seed and irrigated it by foot as in a vegetable garden. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the land you are crossing the Jordan to take possession of is a land of mountains and valleys that drinks rain from heaven. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It is a land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God cares for; the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God are continually on it from the beginning of the year to its end.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So if you faithfully obey the commands I am giving you today—to love the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God and to serve him with all your heart and with all your soul— '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then I will send rain on your land in its season, both autumn and spring rains, so that you may gather in your grain, new wine and olive oil. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I will provide grass in the fields for your cattle, and you will eat and be satisfied.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be careful, or you will be enticed to turn away and worship other gods and bow down to them. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s anger will burn against you, and he will shut up the heavens so that it will not rain and the ground will yield no produce, and you will soon perish from the good land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is giving you. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fix these words of mine in your hearts and minds; tie them as symbols on your hands and bind them on your foreheads. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Teach them to your children, talking about them when you sit at home and when you walk along the road, when you lie down and when you get up. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Remember today that your children were not the ones who saw and experienced the discipline of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God: his majesty, his mighty hand, his outstretched arm; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Write them on the doorframes of your houses and on your gates, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so that your days and the days of your children may be many in the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' swore to give your ancestors, as many as the days that the heavens are above the earth.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If you carefully observe all these commands I am giving you to follow—to love the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, to walk in obedience to him and to hold fast to him— '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will drive out all these nations before you, and you will dispossess nations larger and stronger than you. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Every place where you set your foot will be yours: Your territory will extend from the desert to Lebanon, and from the Euphrates River to the Mediterranean Sea. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'No one will be able to stand against you. The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, as he promised you, will put the terror and fear of you on the whole land, wherever you go.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'See, I am setting before you today a blessing and a curse— '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the blessing if you obey the commands of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God that I am giving you today; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the curse if you disobey the commands of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God and turn from the way that I command you today by following other gods, which you have not known. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has brought you into the land you are entering to possess, you are to proclaim on Mount Gerizim the blessings, and on Mount Ebal the curses. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the signs he performed and the things he did in the heart of Egypt, both to Pharaoh king of Egypt and to his whole country; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As you know, these mountains are across the Jordan, westward, toward the setting sun, near the great trees of Moreh, in the territory of those Canaanites living in the Arabah in the vicinity of Gilgal. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You are about to cross the Jordan to enter and take possession of the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God is giving you. When you have taken it over and are living there, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: be sure that you obey all the decrees and laws I am setting before you today.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: what he did to the Egyptian army, to its horses and chariots, how he overwhelmed them with the waters of the Red Sea
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Sea of Reeds
      marker-yv: yv-n
    - type: text
      text: ' as they were pursuing you, and how the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brought lasting ruin on them. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It was not your children who saw what he did for you in the wilderness until you arrived at this place, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and what he did to Dathan and Abiram, sons of Eliab the Reubenite, when the earth opened its mouth right in the middle of all Israel and swallowed them up with their households, their tents and every living thing that belonged to them. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But it was your own eyes that saw all these great things the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has done.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Observe therefore all the commands I am giving you today, so that you may have the strength to go in and take over the land that you are crossing the Jordan to possess, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and so that you may live long in the land the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' swore to your ancestors to give to them and their descendants, a land flowing with milk and honey. '
