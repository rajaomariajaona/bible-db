document_id: 2KI.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Elijah Taken Up to Heaven
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' was about to take Elijah up to heaven in a whirlwind, Elijah and Elisha were on their way from Gilgal. '
  '10':
  - type: text
    content: “You have asked a difficult thing,” Elijah said, “yet if you see me when I am taken from you, it will be yours—otherwise, it will not.”
  '11':
  - type: text
    content: 'As they were walking along and talking together, suddenly a chariot of fire and horses of fire appeared and separated the two of them, and Elijah went up to heaven in a whirlwind. '
  '12':
  - type: text
    content: Elisha saw this and cried out, “My father! My father! The chariots and horsemen of Israel!” And Elisha saw him no more. Then he took hold of his garment and tore it in two.
  '13':
  - type: text
    content: 'Elisha then picked up Elijah’s cloak that had fallen from him and went back and stood on the bank of the Jordan. '
  '14':
  - type: text
    content: 'He took the cloak that had fallen from Elijah and struck the water with it. “Where now is the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Elijah?” he asked. When he struck the water, it divided to the right and to the left, and he crossed over.'
  '15':
  - type: text
    content: 'The company of the prophets from Jericho, who were watching, said, “The spirit of Elijah is resting on Elisha.” And they went to meet him and bowed to the ground before him. '
  '16':
  - type: text
    content: '“Look,” they said, “we your servants have fifty able men. Let them go and look for your master. Perhaps the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' has picked him up and set him down on some mountain or in some valley.”'
  - type: text
    content: “No,” Elisha replied, “do not send them.”
  '17':
  - type: text
    content: 'But they persisted until he was too embarrassed to refuse. So he said, “Send them.” And they sent fifty men, who searched for three days but did not find him. '
  '18':
  - type: text
    content: When they returned to Elisha, who was staying in Jericho, he said to them, “Didn’t I tell you not to go?”
  - type: heading
    content: Healing of the Water
  '19':
  - type: text
    content: The people of the city said to Elisha, “Look, our lord, this town is well situated, as you can see, but the water is bad and the land is unproductive.”
  '2':
  - type: text
    content: 'Elijah said to Elisha, “Stay here; the '
  - type: text
    content: Lord
  - type: text
    content: ' has sent me to Bethel.”'
  - type: text
    content: 'But Elisha said, “As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives and as you live, I will not leave you.” So they went down to Bethel.'
  '20':
  - type: text
    content: “Bring me a new bowl,” he said, “and put salt in it.” So they brought it to him.
  '21':
  - type: text
    content: 'Then he went out to the spring and threw the salt into it, saying, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘I have healed this water. Never again will it cause death or make the land unproductive.’ ” '
  '22':
  - type: text
    content: And the water has remained pure to this day, according to the word Elisha had spoken.
  - type: heading
    content: Elisha Is Jeered
  '23':
  - type: text
    content: 'From there Elisha went up to Bethel. As he was walking along the road, some boys came out of the town and jeered at him. “Get out of here, baldy!” they said. “Get out of here, baldy!” '
  '24':
  - type: text
    content: 'He turned around, looked at them and called down a curse on them in the name of the '
  - type: text
    content: Lord
  - type: text
    content: '. Then two bears came out of the woods and mauled forty-two of the boys. '
  '25':
  - type: text
    content: And he went on to Mount Carmel and from there returned to Samaria.
  '3':
  - type: text
    content: 'The company of the prophets at Bethel came out to Elisha and asked, “Do you know that the '
  - type: text
    content: Lord
  - type: text
    content: ' is going to take your master from you today?”'
  - type: text
    content: “Yes, I know,” Elisha replied, “so be quiet.”
  '4':
  - type: text
    content: 'Then Elijah said to him, “Stay here, Elisha; the '
  - type: text
    content: Lord
  - type: text
    content: ' has sent me to Jericho.”'
  - type: text
    content: 'And he replied, “As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives and as you live, I will not leave you.” So they went to Jericho.'
  '5':
  - type: text
    content: 'The company of the prophets at Jericho went up to Elisha and asked him, “Do you know that the '
  - type: text
    content: Lord
  - type: text
    content: ' is going to take your master from you today?”'
  - type: text
    content: “Yes, I know,” he replied, “so be quiet.”
  '6':
  - type: text
    content: 'Then Elijah said to him, “Stay here; the '
  - type: text
    content: Lord
  - type: text
    content: ' has sent me to the Jordan.”'
  - type: text
    content: 'And he replied, “As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives and as you live, I will not leave you.” So the two of them walked on.'
  '7':
  - type: text
    content: 'Fifty men from the company of the prophets went and stood at a distance, facing the place where Elijah and Elisha had stopped at the Jordan. '
  '8':
  - type: text
    content: Elijah took his cloak, rolled it up and struck the water with it. The water divided to the right and to the left, and the two of them crossed over on dry ground.
  '9':
  - type: text
    content: When they had crossed, Elijah said to Elisha, “Tell me, what can I do for you before I am taken from you?”
  - type: text
    content: “Let me inherit a double portion of your spirit,” Elisha replied.
