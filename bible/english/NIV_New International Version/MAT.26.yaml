document_id: MAT.26,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Plot Against Jesus
  - type: text
    content: 'When Jesus had finished saying all these things, he said to his disciples, '
  '10':
  - type: text
    content: 'Aware of this, Jesus said to them, '
  - type: text
    content: “Why are you bothering this woman? She has done a beautiful thing to me.
  - type: text
    content: ' '
  '11':
  - type: text
    content: The poor you will always have with you,
  - type: note
    content: See Deut. 15:11.
  - type: text
    content: ' '
  - type: text
    content: but you will not always have me.
  - type: text
    content: ' '
  '12':
  - type: text
    content: When she poured this perfume on my body, she did it to prepare me for burial.
  - type: text
    content: ' '
  '13':
  - type: text
    content: Truly I tell you, wherever this gospel is preached throughout the world, what she has done will also be told, in memory of her.”
  - type: heading
    content: Judas Agrees to Betray Jesus
  '14':
  - type: text
    content: 'Then one of the Twelve—the one called Judas Iscariot—went to the chief priests '
  '15':
  - type: text
    content: 'and asked, “What are you willing to give me if I deliver him over to you?” So they counted out for him thirty pieces of silver. '
  '16':
  - type: text
    content: From then on Judas watched for an opportunity to hand him over.
  - type: heading
    content: The Last Supper
  '17':
  - type: text
    content: On the first day of the Festival of Unleavened Bread, the disciples came to Jesus and asked, “Where do you want us to make preparations for you to eat the Passover?”
  '18':
  - type: text
    content: 'He replied, '
  - type: text
    content: '“Go into the city to a certain man and tell him, ‘The Teacher says: My appointed time is near. I am going to celebrate the Passover with my disciples at your house.’ ”'
  - type: text
    content: ' '
  '19':
  - type: text
    content: So the disciples did as Jesus had directed them and prepared the Passover.
  '2':
  - type: text
    content: “As you know, the Passover is two days away—and the Son of Man will be handed over to be crucified.”
  '20':
  - type: text
    content: 'When evening came, Jesus was reclining at the table with the Twelve. '
  '21':
  - type: text
    content: 'And while they were eating, he said, '
  - type: text
    content: “Truly I tell you, one of you will betray me.”
  '22':
  - type: text
    content: They were very sad and began to say to him one after the other, “Surely you don’t mean me, Lord?”
  '23':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “The one who has dipped his hand into the bowl with me will betray me.
  - type: text
    content: ' '
  '24':
  - type: text
    content: The Son of Man will go just as it is written about him. But woe to that man who betrays the Son of Man! It would be better for him if he had not been born.”
  '25':
  - type: text
    content: Then Judas, the one who would betray him, said, “Surely you don’t mean me, Rabbi?”
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “You have said so.”
  '26':
  - type: text
    content: 'While they were eating, Jesus took bread, and when he had given thanks, he broke it and gave it to his disciples, saying, '
  - type: text
    content: “Take and eat; this is my body.”
  '27':
  - type: text
    content: 'Then he took a cup, and when he had given thanks, he gave it to them, saying, '
  - type: text
    content: “Drink from it, all of you.
  - type: text
    content: ' '
  '28':
  - type: text
    content: This is my blood of the
  - type: note
    content: Some manuscripts the new
  - type: text
    content: ' '
  - type: text
    content: covenant, which is poured out for many for the forgiveness of sins.
  - type: text
    content: ' '
  '29':
  - type: text
    content: I tell you, I will not drink from this fruit of the vine from now on until that day when I drink it new with you in my Father’s kingdom.”
  '3':
  - type: text
    content: 'Then the chief priests and the elders of the people assembled in the palace of the high priest, whose name was Caiaphas, '
  '30':
  - type: text
    content: When they had sung a hymn, they went out to the Mount of Olives.
  - type: heading
    content: Jesus Predicts Peter’s Denial
  '31':
  - type: text
    content: 'Then Jesus told them, '
  - type: text
    content: '“This very night you will all fall away on account of me, for it is written:'
  - type: text
    content: “ ‘I will strike the shepherd,
  - type: text
    content: and the sheep of the flock will be scattered.’
  - type: note
    content: Zech. 13:7
  '32':
  - type: text
    content: ' '
  - type: text
    content: But after I have risen, I will go ahead of you into Galilee.”
  '33':
  - type: text
    content: Peter replied, “Even if all fall away on account of you, I never will.”
  '34':
  - type: text
    content: ' '
  - type: text
    content: “Truly I tell you,”
  - type: text
    content: ' Jesus answered, '
  - type: text
    content: “this very night, before the rooster crows, you will disown me three times.”
  '35':
  - type: text
    content: But Peter declared, “Even if I have to die with you, I will never disown you.” And all the other disciples said the same.
  - type: heading
    content: Gethsemane
  '36':
  - type: text
    content: 'Then Jesus went with his disciples to a place called Gethsemane, and he said to them, '
  - type: text
    content: “Sit here while I go over there and pray.”
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'He took Peter and the two sons of Zebedee along with him, and he began to be sorrowful and troubled. '
  '38':
  - type: text
    content: 'Then he said to them, '
  - type: text
    content: “My soul is overwhelmed with sorrow to the point of death. Stay here and keep watch with me.”
  '39':
  - type: text
    content: 'Going a little farther, he fell with his face to the ground and prayed, '
  - type: text
    content: “My Father, if it is possible, may this cup be taken from me. Yet not as I will, but as you will.”
  '4':
  - type: text
    content: 'and they schemed to arrest Jesus secretly and kill him. '
  '40':
  - type: text
    content: 'Then he returned to his disciples and found them sleeping. '
  - type: text
    content: “Couldn’t you men keep watch with me for one hour?”
  - type: text
    content: ' he asked Peter. '
  '41':
  - type: text
    content: “Watch and pray so that you will not fall into temptation. The spirit is willing, but the flesh is weak.”
  '42':
  - type: text
    content: 'He went away a second time and prayed, '
  - type: text
    content: “My Father, if it is not possible for this cup to be taken away unless I drink it, may your will be done.”
  '43':
  - type: text
    content: 'When he came back, he again found them sleeping, because their eyes were heavy. '
  '44':
  - type: text
    content: So he left them and went away once more and prayed the third time, saying the same thing.
  '45':
  - type: text
    content: 'Then he returned to the disciples and said to them, '
  - type: text
    content: “Are you still sleeping and resting? Look, the hour has come, and the Son of Man is delivered into the hands of sinners.
  - type: text
    content: ' '
  '46':
  - type: text
    content: Rise! Let us go! Here comes my betrayer!”
  - type: heading
    content: Jesus Arrested
  '47':
  - type: text
    content: 'While he was still speaking, Judas, one of the Twelve, arrived. With him was a large crowd armed with swords and clubs, sent from the chief priests and the elders of the people. '
  '48':
  - type: text
    content: 'Now the betrayer had arranged a signal with them: “The one I kiss is the man; arrest him.” '
  '49':
  - type: text
    content: Going at once to Jesus, Judas said, “Greetings, Rabbi!” and kissed him.
  '5':
  - type: text
    content: “But not during the festival,” they said, “or there may be a riot among the people.”
  - type: heading
    content: Jesus Anointed at Bethany
  '50':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Do what you came for, friend.”
  - type: note
    content: Or “Why have you come, friend?”
  - type: text
    content: 'Then the men stepped forward, seized Jesus and arrested him. '
  '51':
  - type: text
    content: With that, one of Jesus’ companions reached for his sword, drew it out and struck the servant of the high priest, cutting off his ear.
  '52':
  - type: text
    content: ' '
  - type: text
    content: “Put your sword back in its place,”
  - type: text
    content: ' Jesus said to him, '
  - type: text
    content: “for all who draw the sword will die by the sword.
  - type: text
    content: ' '
  '53':
  - type: text
    content: Do you think I cannot call on my Father, and he will at once put at my disposal more than twelve legions of angels?
  - type: text
    content: ' '
  '54':
  - type: text
    content: But how then would the Scriptures be fulfilled that say it must happen in this way?”
  '55':
  - type: text
    content: 'In that hour Jesus said to the crowd, '
  - type: text
    content: “Am I leading a rebellion, that you have come out with swords and clubs to capture me? Every day I sat in the temple courts teaching, and you did not arrest me.
  - type: text
    content: ' '
  '56':
  - type: text
    content: But this has all taken place that the writings of the prophets might be fulfilled.”
  - type: text
    content: ' Then all the disciples deserted him and fled.'
  - type: heading
    content: Jesus Before the Sanhedrin
  '57':
  - type: text
    content: 'Those who had arrested Jesus took him to Caiaphas the high priest, where the teachers of the law and the elders had assembled. '
  '58':
  - type: text
    content: But Peter followed him at a distance, right up to the courtyard of the high priest. He entered and sat down with the guards to see the outcome.
  '59':
  - type: text
    content: 'The chief priests and the whole Sanhedrin were looking for false evidence against Jesus so that they could put him to death. '
  '6':
  - type: text
    content: 'While Jesus was in Bethany in the home of Simon the Leper, '
  '60':
  - type: text
    content: But they did not find any, though many false witnesses came forward.
  - type: text
    content: 'Finally two came forward '
  '61':
  - type: text
    content: and declared, “This fellow said, ‘I am able to destroy the temple of God and rebuild it in three days.’ ”
  '62':
  - type: text
    content: 'Then the high priest stood up and said to Jesus, “Are you not going to answer? What is this testimony that these men are bringing against you?” '
  '63':
  - type: text
    content: But Jesus remained silent.
  - type: text
    content: 'The high priest said to him, “I charge you under oath by the living God: Tell us if you are the Messiah, the Son of God.”'
  '64':
  - type: text
    content: ' '
  - type: text
    content: “You have said so,”
  - type: text
    content: ' Jesus replied. '
  - type: text
    content: '“But I say to all of you: From now on you will see the Son of Man sitting at the right hand of the Mighty One and coming on the clouds of heaven.”'
  - type: note
    content: See Psalm 110:1; Daniel 7:13.
  '65':
  - type: text
    content: 'Then the high priest tore his clothes and said, “He has spoken blasphemy! Why do we need any more witnesses? Look, now you have heard the blasphemy. '
  '66':
  - type: text
    content: What do you think?”
  - type: text
    content: “He is worthy of death,” they answered.
  '67':
  - type: text
    content: 'Then they spit in his face and struck him with their fists. Others slapped him '
  '68':
  - type: text
    content: and said, “Prophesy to us, Messiah. Who hit you?”
  - type: heading
    content: Peter Disowns Jesus
  '69':
  - type: text
    content: Now Peter was sitting out in the courtyard, and a servant girl came to him. “You also were with Jesus of Galilee,” she said.
  '7':
  - type: text
    content: a woman came to him with an alabaster jar of very expensive perfume, which she poured on his head as he was reclining at the table.
  '70':
  - type: text
    content: But he denied it before them all. “I don’t know what you’re talking about,” he said.
  '71':
  - type: text
    content: Then he went out to the gateway, where another servant girl saw him and said to the people there, “This fellow was with Jesus of Nazareth.”
  '72':
  - type: text
    content: 'He denied it again, with an oath: “I don’t know the man!”'
  '73':
  - type: text
    content: After a little while, those standing there went up to Peter and said, “Surely you are one of them; your accent gives you away.”
  '74':
  - type: text
    content: Then he began to call down curses, and he swore to them, “I don’t know the man!”
  - type: text
    content: 'Immediately a rooster crowed. '
  '75':
  - type: text
    content: 'Then Peter remembered the word Jesus had spoken: '
  - type: text
    content: “Before the rooster crows, you will disown me three times.”
  - type: text
    content: ' And he went outside and wept bitterly.'
  '8':
  - type: text
    content: 'When the disciples saw this, they were indignant. “Why this waste?” they asked. '
  '9':
  - type: text
    content: “This perfume could have been sold at a high price and the money given to the poor.”
