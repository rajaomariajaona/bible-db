document_id: MAT.26
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Plot Against Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When Jesus had finished saying all these things, he said to his disciples, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “As you know, the Passover is two days away—and the Son of Man will be handed over to be crucified.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then the chief priests and the elders of the people assembled in the palace of the high priest, whose name was Caiaphas, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'and they schemed to arrest Jesus secretly and kill him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “But not during the festival,” they said, “or there may be a riot among the people.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Anointed at Bethany
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'While Jesus was in Bethany in the home of Simon the Leper, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: a woman came to him with an alabaster jar of very expensive perfume, which she poured on his head as he was reclining at the table.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'When the disciples saw this, they were indignant. “Why this waste?” they asked. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “This perfume could have been sold at a high price and the money given to the poor.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Aware of this, Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why are you bothering this woman? She has done a beautiful thing to me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The poor you will always have with you,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See Deut. 15:11.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: but you will not always have me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: When she poured this perfume on my body, she did it to prepare me for burial.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Truly I tell you, wherever this gospel is preached throughout the world, what she has done will also be told, in memory of her.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judas Agrees to Betray Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Then one of the Twelve—the one called Judas Iscariot—went to the chief priests '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'and asked, “What are you willing to give me if I deliver him over to you?” So they counted out for him thirty pieces of silver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: From then on Judas watched for an opportunity to hand him over.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Last Supper
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: On the first day of the Festival of Unleavened Bread, the disciples came to Jesus and asked, “Where do you want us to make preparations for you to eat the Passover?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'He replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Go into the city to a certain man and tell him, ‘The Teacher says: My appointed time is near. I am going to celebrate the Passover with my disciples at your house.’ ”'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: So the disciples did as Jesus had directed them and prepared the Passover.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'When evening came, Jesus was reclining at the table with the Twelve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'And while they were eating, he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Truly I tell you, one of you will betray me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: They were very sad and began to say to him one after the other, “Surely you don’t mean me, Lord?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The one who has dipped his hand into the bowl with me will betray me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The Son of Man will go just as it is written about him. But woe to that man who betrays the Son of Man! It would be better for him if he had not been born.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Then Judas, the one who would betray him, said, “Surely you don’t mean me, Rabbi?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You have said so.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'While they were eating, Jesus took bread, and when he had given thanks, he broke it and gave it to his disciples, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Take and eat; this is my body.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then he took a cup, and when he had given thanks, he gave it to them, saying, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Drink from it, all of you.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: This is my blood of the
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the new
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: covenant, which is poured out for many for the forgiveness of sins.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I tell you, I will not drink from this fruit of the vine from now on until that day when I drink it new with you in my Father’s kingdom.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: When they had sung a hymn, they went out to the Mount of Olives.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Predicts Peter’s Denial
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then Jesus told them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“This very night you will all fall away on account of me, for it is written:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “ ‘I will strike the shepherd,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and the sheep of the flock will be scattered.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Zech. 13:7
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But after I have risen, I will go ahead of you into Galilee.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Peter replied, “Even if all fall away on account of you, I never will.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Truly I tell you,”
  - type: text
    text: ' Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “this very night, before the rooster crows, you will disown me three times.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: But Peter declared, “Even if I have to die with you, I will never disown you.” And all the other disciples said the same.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Gethsemane
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Then Jesus went with his disciples to a place called Gethsemane, and he said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Sit here while I go over there and pray.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'He took Peter and the two sons of Zebedee along with him, and he began to be sorrowful and troubled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Then he said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My soul is overwhelmed with sorrow to the point of death. Stay here and keep watch with me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Going a little farther, he fell with his face to the ground and prayed, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My Father, if it is possible, may this cup be taken from me. Yet not as I will, but as you will.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Then he returned to his disciples and found them sleeping. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Couldn’t you men keep watch with me for one hour?”
  - type: text
    text: ' he asked Peter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Watch and pray so that you will not fall into temptation. The spirit is willing, but the flesh is weak.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'He went away a second time and prayed, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “My Father, if it is not possible for this cup to be taken away unless I drink it, may your will be done.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'When he came back, he again found them sleeping, because their eyes were heavy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: So he left them and went away once more and prayed the third time, saying the same thing.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Then he returned to the disciples and said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Are you still sleeping and resting? Look, the hour has come, and the Son of Man is delivered into the hands of sinners.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Rise! Let us go! Here comes my betrayer!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Arrested
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'While he was still speaking, Judas, one of the Twelve, arrived. With him was a large crowd armed with swords and clubs, sent from the chief priests and the elders of the people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Now the betrayer had arranged a signal with them: “The one I kiss is the man; arrest him.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Going at once to Jesus, Judas said, “Greetings, Rabbi!” and kissed him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Do what you came for, friend.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:50 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: “Why have you come, friend?”
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Then the men stepped forward, seized Jesus and arrested him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: With that, one of Jesus’ companions reached for his sword, drew it out and struck the servant of the high priest, cutting off his ear.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Put your sword back in its place,”
  - type: text
    text: ' Jesus said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “for all who draw the sword will die by the sword.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Do you think I cannot call on my Father, and he will at once put at my disposal more than twelve legions of angels?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But how then would the Scriptures be fulfilled that say it must happen in this way?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'In that hour Jesus said to the crowd, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Am I leading a rebellion, that you have come out with swords and clubs to capture me? Every day I sat in the temple courts teaching, and you did not arrest me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But this has all taken place that the writings of the prophets might be fulfilled.”
  - type: text
    text: ' Then all the disciples deserted him and fled.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Before the Sanhedrin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Those who had arrested Jesus took him to Caiaphas the high priest, where the teachers of the law and the elders had assembled. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: But Peter followed him at a distance, right up to the courtyard of the high priest. He entered and sat down with the guards to see the outcome.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'The chief priests and the whole Sanhedrin were looking for false evidence against Jesus so that they could put him to death. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: But they did not find any, though many false witnesses came forward.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Finally two came forward '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: and declared, “This fellow said, ‘I am able to destroy the temple of God and rebuild it in three days.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Then the high priest stood up and said to Jesus, “Are you not going to answer? What is this testimony that these men are bringing against you?” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: But Jesus remained silent.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'The high priest said to him, “I charge you under oath by the living God: Tell us if you are the Messiah, the Son of God.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You have said so,”
  - type: text
    text: ' Jesus replied. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“But I say to all of you: From now on you will see the Son of Man sitting at the right hand of the Mighty One and coming on the clouds of heaven.”'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26:64 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: See Psalm 110:1; Daniel 7:13.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Then the high priest tore his clothes and said, “He has spoken blasphemy! Why do we need any more witnesses? Look, now you have heard the blasphemy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: What do you think?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “He is worthy of death,” they answered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'Then they spit in his face and struck him with their fists. Others slapped him '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: and said, “Prophesy to us, Messiah. Who hit you?”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Peter Disowns Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: Now Peter was sitting out in the courtyard, and a servant girl came to him. “You also were with Jesus of Galilee,” she said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: But he denied it before them all. “I don’t know what you’re talking about,” he said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: Then he went out to the gateway, where another servant girl saw him and said to the people there, “This fellow was with Jesus of Nazareth.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: 'He denied it again, with an oath: “I don’t know the man!”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '73'
  - type: text
    text: After a little while, those standing there went up to Peter and said, “Surely you are one of them; your accent gives you away.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '74'
  - type: text
    text: Then he began to call down curses, and he swore to them, “I don’t know the man!”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Immediately a rooster crowed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '75'
  - type: text
    text: 'Then Peter remembered the word Jesus had spoken: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Before the rooster crows, you will disown me three times.”
  - type: text
    text: ' And he went outside and wept bitterly.'
