document_id: JER.16,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Day of Disaster
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: '“When you tell these people all this and they ask you, ‘Why has the '
  - type: text
    content: Lord
  - type: text
    content: ' decreed such a great disaster against us? What wrong have we done? What sin have we committed against the '
  - type: text
    content: Lord
  - type: text
    content: ' our God?’ '
  '11':
  - type: text
    content: 'then say to them, ‘It is because your ancestors forsook me,’ declares the '
  - type: text
    content: Lord
  - type: text
    content: ', ‘and followed other gods and served and worshiped them. They forsook me and did not keep my law. '
  '12':
  - type: text
    content: 'But you have behaved more wickedly than your ancestors. See how all of you are following the stubbornness of your evil hearts instead of obeying me. '
  '13':
  - type: text
    content: So I will throw you out of this land into a land neither you nor your ancestors have known, and there you will serve other gods day and night, for I will show you no favor.’
  '14':
  - type: text
    content: '“However, the days are coming,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “when it will no longer be said, ‘As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, who brought the Israelites up out of Egypt,’ '
  '15':
  - type: text
    content: 'but it will be said, ‘As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, who brought the Israelites up out of the land of the north and out of all the countries where he had banished them.’ For I will restore them to the land I gave their ancestors.'
  '16':
  - type: text
    content: '“But now I will send for many fishermen,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “and they will catch them. After that I will send for many hunters, and they will hunt them down on every mountain and hill and from the crevices of the rocks. '
  '17':
  - type: text
    content: 'My eyes are on all their ways; they are not hidden from me, nor is their sin concealed from my eyes. '
  '18':
  - type: text
    content: I will repay them double for their wickedness and their sin, because they have defiled my land with the lifeless forms of their vile images and have filled my inheritance with their detestable idols.”
  '19':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', my strength and my fortress,'
  - type: text
    content: my refuge in time of distress,
  - type: text
    content: to you the nations will come
  - type: text
    content: from the ends of the earth and say,
  - type: text
    content: “Our ancestors possessed nothing but false gods,
  - type: text
    content: worthless idols that did them no good.
  '2':
  - type: text
    content: '“You must not marry and have sons or daughters in this place.” '
  '20':
  - type: text
    content: Do people make their own gods?
  - type: text
    content: Yes, but they are not gods!”
  '21':
  - type: text
    content: “Therefore I will teach them—
  - type: text
    content: this time I will teach them
  - type: text
    content: my power and might.
  - type: text
    content: Then they will know
  - type: text
    content: 'that my name is the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says about the sons and daughters born in this land and about the women who are their mothers and the men who are their fathers: '
  '4':
  - type: text
    content: “They will die of deadly diseases. They will not be mourned or buried but will be like dung lying on the ground. They will perish by sword and famine, and their dead bodies will become food for the birds and the wild animals.”
  '5':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: “Do not enter a house where there is a funeral meal; do not go to mourn or show sympathy, because I have withdrawn my blessing, my love and my pity from this people,” declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '6':
  - type: text
    content: '“Both high and low will die in this land. They will not be buried or mourned, and no one will cut themselves or shave their head for the dead. '
  '7':
  - type: text
    content: No one will offer food to comfort those who mourn for the dead—not even for a father or a mother—nor will anyone give them a drink to console them.
  '8':
  - type: text
    content: '“And do not enter a house where there is feasting and sit down to eat and drink. '
  '9':
  - type: text
    content: 'For this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says: Before your eyes and in your days I will bring an end to the sounds of joy and gladness and to the voices of bride and bridegroom in this place.'
