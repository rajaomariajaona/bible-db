document_id: JER.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Day of Disaster
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' came to me: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“You must not marry and have sons or daughters in this place.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says about the sons and daughters born in this land and about the women who are their mothers and the men who are their fathers: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “They will die of deadly diseases. They will not be mourned or buried but will be like dung lying on the ground. They will perish by sword and famine, and their dead bodies will become food for the birds and the wild animals.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'For this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: “Do not enter a house where there is a funeral meal; do not go to mourn or show sympathy, because I have withdrawn my blessing, my love and my pity from this people,” declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Both high and low will die in this land. They will not be buried or mourned, and no one will cut themselves or shave their head for the dead. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: No one will offer food to comfort those who mourn for the dead—not even for a father or a mother—nor will anyone give them a drink to console them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“And do not enter a house where there is feasting and sit down to eat and drink. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'For this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty, the God of Israel, says: Before your eyes and in your days I will bring an end to the sounds of joy and gladness and to the voices of bride and bridegroom in this place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“When you tell these people all this and they ask you, ‘Why has the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' decreed such a great disaster against us? What wrong have we done? What sin have we committed against the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' our God?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'then say to them, ‘It is because your ancestors forsook me,’ declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', ‘and followed other gods and served and worshiped them. They forsook me and did not keep my law. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But you have behaved more wickedly than your ancestors. See how all of you are following the stubbornness of your evil hearts instead of obeying me. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: So I will throw you out of this land into a land neither you nor your ancestors have known, and there you will serve other gods day and night, for I will show you no favor.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“However, the days are coming,” declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “when it will no longer be said, ‘As surely as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' lives, who brought the Israelites up out of Egypt,’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'but it will be said, ‘As surely as the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' lives, who brought the Israelites up out of the land of the north and out of all the countries where he had banished them.’ For I will restore them to the land I gave their ancestors.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '“But now I will send for many fishermen,” declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “and they will catch them. After that I will send for many hunters, and they will hunt them down on every mountain and hill and from the crevices of the rocks. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'My eyes are on all their ways; they are not hidden from me, nor is their sin concealed from my eyes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: I will repay them double for their wickedness and their sin, because they have defiled my land with the lifeless forms of their vile images and have filled my inheritance with their detestable idols.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', my strength and my fortress,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: my refuge in time of distress,
- type: usfm
  marker: q1
  children:
  - type: text
    text: to you the nations will come
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the ends of the earth and say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Our ancestors possessed nothing but false gods,
- type: usfm
  marker: q2
  children:
  - type: text
    text: worthless idols that did them no good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Do people make their own gods?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yes, but they are not gods!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Therefore I will teach them—
- type: usfm
  marker: q2
  children:
  - type: text
    text: this time I will teach them
- type: usfm
  marker: q2
  children:
  - type: text
    text: my power and might.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then they will know
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'that my name is the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
