document_id: 2SA.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David Hears of Saul’s Death
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'After the death of Saul, David returned from striking down the Amalekites and stayed in Ziklag two days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: On the third day a man arrived from Saul’s camp with his clothes torn and dust on his head. When he came to David, he fell to the ground to pay him honor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Where have you come from?” David asked him.
- type: usfm
  marker: p
  children:
  - type: text
    text: He answered, “I have escaped from the Israelite camp.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “What happened?” David asked. “Tell me.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “The men fled from the battle,” he replied. “Many of them fell and died. And Saul and his son Jonathan are dead.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then David said to the young man who brought him the report, “How do you know that Saul and his son Jonathan are dead?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“I happened to be on Mount Gilboa,” the young man said, “and there was Saul, leaning on his spear, with the chariots and their drivers in hot pursuit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: When he turned around and saw me, he called out to me, and I said, ‘What can I do?’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “He asked me, ‘Who are you?’
- type: usfm
  marker: p
  children:
  - type: text
    text: “ ‘An Amalekite,’ I answered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: “Then he said to me, ‘Stand here by me and kill me! I’m in the throes of death, but I’m still alive.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “So I stood beside him and killed him, because I knew that after he had fallen he could not survive. And I took the crown that was on his head and the band on his arm and have brought them here to my lord.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Then David and all the men with him took hold of their clothes and tore them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'They mourned and wept and fasted till evening for Saul and his son Jonathan, and for the army of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and for the nation of Israel, because they had fallen by the sword.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: David said to the young man who brought him the report, “Where are you from?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “I am the son of a foreigner, an Amalekite,” he answered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'David asked him, “Why weren’t you afraid to lift your hand to destroy the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s anointed?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Then David called one of his men and said, “Go, strike him down!” So he struck him down, and he died. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'For David had said to him, “Your blood be on your own head. Your own mouth testified against you when you said, ‘I killed the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s anointed.’ ”
- type: usfm
  marker: s1
  children:
  - type: text
    text: David’s Lament for Saul and Jonathan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'David took up this lament concerning Saul and his son Jonathan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'and he ordered that the people of Judah be taught this lament of the bow (it is written in the Book of Jashar):'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “A gazelle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Gazelle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: here symbolizes a human dignitary.
    marker-yv: yv-n
  - type: text
    text: ' lies slain on your heights, Israel.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: How the mighty have fallen!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “Tell it not in Gath,
- type: usfm
  marker: q2
  children:
  - type: text
    text: proclaim it not in the streets of Ashkelon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lest the daughters of the Philistines be glad,
- type: usfm
  marker: q2
  children:
  - type: text
    text: lest the daughters of the uncircumcised rejoice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: “Mountains of Gilboa,
- type: usfm
  marker: q2
  children:
  - type: text
    text: may you have neither dew nor rain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: may no showers fall on your terraced fields.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: / nor fields that yield grain for offerings
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: For there the shield of the mighty was despised,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the shield of Saul—no longer rubbed with oil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “From the blood of the slain,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the flesh of the mighty,
- type: usfm
  marker: q1
  children:
  - type: text
    text: the bow of Jonathan did not turn back,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the sword of Saul did not return unsatisfied.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Saul and Jonathan—
- type: usfm
  marker: q2
  children:
  - type: text
    text: in life they were loved and admired,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and in death they were not parted.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They were swifter than eagles,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they were stronger than lions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: “Daughters of Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: weep for Saul,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who clothed you in scarlet and finery,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who adorned your garments with ornaments of gold.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “How the mighty have fallen in battle!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Jonathan lies slain on your heights.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: I grieve for you, Jonathan my brother;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you were very dear to me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Your love for me was wonderful,
- type: usfm
  marker: q2
  children:
  - type: text
    text: more wonderful than that of women.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “How the mighty have fallen!
- type: usfm
  marker: q2
  children:
  - type: text
    text: The weapons of war have perished!”
