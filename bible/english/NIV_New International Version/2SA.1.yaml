document_id: 2SA.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: David Hears of Saul’s Death
  - type: text
    content: 'After the death of Saul, David returned from striking down the Amalekites and stayed in Ziklag two days. '
  '10':
  - type: text
    content: “So I stood beside him and killed him, because I knew that after he had fallen he could not survive. And I took the crown that was on his head and the band on his arm and have brought them here to my lord.”
  '11':
  - type: text
    content: 'Then David and all the men with him took hold of their clothes and tore them. '
  '12':
  - type: text
    content: 'They mourned and wept and fasted till evening for Saul and his son Jonathan, and for the army of the '
  - type: text
    content: Lord
  - type: text
    content: ' and for the nation of Israel, because they had fallen by the sword.'
  '13':
  - type: text
    content: David said to the young man who brought him the report, “Where are you from?”
  - type: text
    content: “I am the son of a foreigner, an Amalekite,” he answered.
  '14':
  - type: text
    content: 'David asked him, “Why weren’t you afraid to lift your hand to destroy the '
  - type: text
    content: Lord
  - type: text
    content: ’s anointed?”
  '15':
  - type: text
    content: 'Then David called one of his men and said, “Go, strike him down!” So he struck him down, and he died. '
  '16':
  - type: text
    content: 'For David had said to him, “Your blood be on your own head. Your own mouth testified against you when you said, ‘I killed the '
  - type: text
    content: Lord
  - type: text
    content: ’s anointed.’ ”
  - type: heading
    content: David’s Lament for Saul and Jonathan
  '17':
  - type: text
    content: 'David took up this lament concerning Saul and his son Jonathan, '
  '18':
  - type: text
    content: 'and he ordered that the people of Judah be taught this lament of the bow (it is written in the Book of Jashar):'
  '19':
  - type: text
    content: “A gazelle
  - type: note
    content: Gazelle here symbolizes a human dignitary.
  - type: text
    content: ' lies slain on your heights, Israel.'
  - type: text
    content: How the mighty have fallen!
  '2':
  - type: text
    content: On the third day a man arrived from Saul’s camp with his clothes torn and dust on his head. When he came to David, he fell to the ground to pay him honor.
  '20':
  - type: text
    content: “Tell it not in Gath,
  - type: text
    content: proclaim it not in the streets of Ashkelon,
  - type: text
    content: lest the daughters of the Philistines be glad,
  - type: text
    content: lest the daughters of the uncircumcised rejoice.
  '21':
  - type: text
    content: “Mountains of Gilboa,
  - type: text
    content: may you have neither dew nor rain,
  - type: text
    content: may no showers fall on your terraced fields.
  - type: note
    content: Or / nor fields that yield grain for offerings
  - type: text
    content: For there the shield of the mighty was despised,
  - type: text
    content: the shield of Saul—no longer rubbed with oil.
  '22':
  - type: text
    content: “From the blood of the slain,
  - type: text
    content: from the flesh of the mighty,
  - type: text
    content: the bow of Jonathan did not turn back,
  - type: text
    content: the sword of Saul did not return unsatisfied.
  '23':
  - type: text
    content: Saul and Jonathan—
  - type: text
    content: in life they were loved and admired,
  - type: text
    content: and in death they were not parted.
  - type: text
    content: They were swifter than eagles,
  - type: text
    content: they were stronger than lions.
  '24':
  - type: text
    content: “Daughters of Israel,
  - type: text
    content: weep for Saul,
  - type: text
    content: who clothed you in scarlet and finery,
  - type: text
    content: who adorned your garments with ornaments of gold.
  '25':
  - type: text
    content: “How the mighty have fallen in battle!
  - type: text
    content: Jonathan lies slain on your heights.
  '26':
  - type: text
    content: I grieve for you, Jonathan my brother;
  - type: text
    content: you were very dear to me.
  - type: text
    content: Your love for me was wonderful,
  - type: text
    content: more wonderful than that of women.
  '27':
  - type: text
    content: “How the mighty have fallen!
  - type: text
    content: The weapons of war have perished!”
  '3':
  - type: text
    content: “Where have you come from?” David asked him.
  - type: text
    content: He answered, “I have escaped from the Israelite camp.”
  '4':
  - type: text
    content: “What happened?” David asked. “Tell me.”
  - type: text
    content: “The men fled from the battle,” he replied. “Many of them fell and died. And Saul and his son Jonathan are dead.”
  '5':
  - type: text
    content: Then David said to the young man who brought him the report, “How do you know that Saul and his son Jonathan are dead?”
  '6':
  - type: text
    content: '“I happened to be on Mount Gilboa,” the young man said, “and there was Saul, leaning on his spear, with the chariots and their drivers in hot pursuit. '
  '7':
  - type: text
    content: When he turned around and saw me, he called out to me, and I said, ‘What can I do?’
  '8':
  - type: text
    content: “He asked me, ‘Who are you?’
  - type: text
    content: “ ‘An Amalekite,’ I answered.
  '9':
  - type: text
    content: “Then he said to me, ‘Stand here by me and kill me! I’m in the throes of death, but I’m still alive.’
