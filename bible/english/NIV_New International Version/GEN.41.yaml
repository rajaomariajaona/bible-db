document_id: GEN.41,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Pharaoh’s Dreams
  - type: text
    content: 'When two full years had passed, Pharaoh had a dream: He was standing by the Nile, '
  '10':
  - type: text
    content: 'Pharaoh was once angry with his servants, and he imprisoned me and the chief baker in the house of the captain of the guard. '
  '11':
  - type: text
    content: 'Each of us had a dream the same night, and each dream had a meaning of its own. '
  '12':
  - type: text
    content: 'Now a young Hebrew was there with us, a servant of the captain of the guard. We told him our dreams, and he interpreted them for us, giving each man the interpretation of his dream. '
  '13':
  - type: text
    content: 'And things turned out exactly as he interpreted them to us: I was restored to my position, and the other man was impaled.”'
  '14':
  - type: text
    content: So Pharaoh sent for Joseph, and he was quickly brought from the dungeon. When he had shaved and changed his clothes, he came before Pharaoh.
  '15':
  - type: text
    content: Pharaoh said to Joseph, “I had a dream, and no one can interpret it. But I have heard it said of you that when you hear a dream you can interpret it.”
  '16':
  - type: text
    content: “I cannot do it,” Joseph replied to Pharaoh, “but God will give Pharaoh the answer he desires.”
  '17':
  - type: text
    content: 'Then Pharaoh said to Joseph, “In my dream I was standing on the bank of the Nile, '
  '18':
  - type: text
    content: 'when out of the river there came up seven cows, fat and sleek, and they grazed among the reeds. '
  '19':
  - type: text
    content: 'After them, seven other cows came up—scrawny and very ugly and lean. I had never seen such ugly cows in all the land of Egypt. '
  '2':
  - type: text
    content: 'when out of the river there came up seven cows, sleek and fat, and they grazed among the reeds. '
  '20':
  - type: text
    content: 'The lean, ugly cows ate up the seven fat cows that came up first. '
  '21':
  - type: text
    content: But even after they ate them, no one could tell that they had done so; they looked just as ugly as before. Then I woke up.
  '22':
  - type: text
    content: '“In my dream I saw seven heads of grain, full and good, growing on a single stalk. '
  '23':
  - type: text
    content: 'After them, seven other heads sprouted—withered and thin and scorched by the east wind. '
  '24':
  - type: text
    content: The thin heads of grain swallowed up the seven good heads. I told this to the magicians, but none of them could explain it to me.”
  '25':
  - type: text
    content: 'Then Joseph said to Pharaoh, “The dreams of Pharaoh are one and the same. God has revealed to Pharaoh what he is about to do. '
  '26':
  - type: text
    content: 'The seven good cows are seven years, and the seven good heads of grain are seven years; it is one and the same dream. '
  '27':
  - type: text
    content: 'The seven lean, ugly cows that came up afterward are seven years, and so are the seven worthless heads of grain scorched by the east wind: They are seven years of famine.'
  '28':
  - type: text
    content: '“It is just as I said to Pharaoh: God has shown Pharaoh what he is about to do. '
  '29':
  - type: text
    content: 'Seven years of great abundance are coming throughout the land of Egypt, '
  '3':
  - type: text
    content: 'After them, seven other cows, ugly and gaunt, came up out of the Nile and stood beside those on the riverbank. '
  '30':
  - type: text
    content: 'but seven years of famine will follow them. Then all the abundance in Egypt will be forgotten, and the famine will ravage the land. '
  '31':
  - type: text
    content: 'The abundance in the land will not be remembered, because the famine that follows it will be so severe. '
  '32':
  - type: text
    content: The reason the dream was given to Pharaoh in two forms is that the matter has been firmly decided by God, and God will do it soon.
  '33':
  - type: text
    content: '“And now let Pharaoh look for a discerning and wise man and put him in charge of the land of Egypt. '
  '34':
  - type: text
    content: 'Let Pharaoh appoint commissioners over the land to take a fifth of the harvest of Egypt during the seven years of abundance. '
  '35':
  - type: text
    content: 'They should collect all the food of these good years that are coming and store up the grain under the authority of Pharaoh, to be kept in the cities for food. '
  '36':
  - type: text
    content: This food should be held in reserve for the country, to be used during the seven years of famine that will come upon Egypt, so that the country may not be ruined by the famine.”
  '37':
  - type: text
    content: 'The plan seemed good to Pharaoh and to all his officials. '
  '38':
  - type: text
    content: So Pharaoh asked them, “Can we find anyone like this man, one in whom is the spirit of God
  - type: note
    content: Or of the gods
  - type: text
    content: ?”
  '39':
  - type: text
    content: 'Then Pharaoh said to Joseph, “Since God has made all this known to you, there is no one so discerning and wise as you. '
  '4':
  - type: text
    content: And the cows that were ugly and gaunt ate up the seven sleek, fat cows. Then Pharaoh woke up.
  '40':
  - type: text
    content: You shall be in charge of my palace, and all my people are to submit to your orders. Only with respect to the throne will I be greater than you.”
  - type: heading
    content: Joseph in Charge of Egypt
  '41':
  - type: text
    content: 'So Pharaoh said to Joseph, “I hereby put you in charge of the whole land of Egypt.” '
  '42':
  - type: text
    content: 'Then Pharaoh took his signet ring from his finger and put it on Joseph’s finger. He dressed him in robes of fine linen and put a gold chain around his neck. '
  '43':
  - type: text
    content: He had him ride in a chariot as his second-in-command,
  - type: note
    content: Or in the chariot of his second-in-command; or in his second chariot
  - type: text
    content: ' and people shouted before him, “Make way'
  - type: note
    content: Or Bow down
  - type: text
    content: '!” Thus he put him in charge of the whole land of Egypt.'
  '44':
  - type: text
    content: 'Then Pharaoh said to Joseph, “I am Pharaoh, but without your word no one will lift hand or foot in all Egypt.” '
  '45':
  - type: text
    content: Pharaoh gave Joseph the name Zaphenath-Paneah and gave him Asenath daughter of Potiphera, priest of On,
  - type: note
    content: That is, Heliopolis; also in verse 50
  - type: text
    content: ' to be his wife. And Joseph went throughout the land of Egypt.'
  '46':
  - type: text
    content: 'Joseph was thirty years old when he entered the service of Pharaoh king of Egypt. And Joseph went out from Pharaoh’s presence and traveled throughout Egypt. '
  '47':
  - type: text
    content: 'During the seven years of abundance the land produced plentifully. '
  '48':
  - type: text
    content: 'Joseph collected all the food produced in those seven years of abundance in Egypt and stored it in the cities. In each city he put the food grown in the fields surrounding it. '
  '49':
  - type: text
    content: Joseph stored up huge quantities of grain, like the sand of the sea; it was so much that he stopped keeping records because it was beyond measure.
  '5':
  - type: text
    content: 'He fell asleep again and had a second dream: Seven heads of grain, healthy and good, were growing on a single stalk. '
  '50':
  - type: text
    content: 'Before the years of famine came, two sons were born to Joseph by Asenath daughter of Potiphera, priest of On. '
  '51':
  - type: text
    content: Joseph named his firstborn Manasseh
  - type: note
    content: Manasseh sounds like and may be derived from the Hebrew for forget.
  - type: text
    content: ' and said, “It is because God has made me forget all my trouble and all my father’s household.” '
  '52':
  - type: text
    content: The second son he named Ephraim
  - type: note
    content: Ephraim sounds like the Hebrew for twice fruitful.
  - type: text
    content: ' and said, “It is because God has made me fruitful in the land of my suffering.”'
  '53':
  - type: text
    content: 'The seven years of abundance in Egypt came to an end, '
  '54':
  - type: text
    content: 'and the seven years of famine began, just as Joseph had said. There was famine in all the other lands, but in the whole land of Egypt there was food. '
  '55':
  - type: text
    content: When all Egypt began to feel the famine, the people cried to Pharaoh for food. Then Pharaoh told all the Egyptians, “Go to Joseph and do what he tells you.”
  '56':
  - type: text
    content: 'When the famine had spread over the whole country, Joseph opened all the storehouses and sold grain to the Egyptians, for the famine was severe throughout Egypt. '
  '57':
  - type: text
    content: And all the world came to Egypt to buy grain from Joseph, because the famine was severe everywhere.
  '6':
  - type: text
    content: 'After them, seven other heads of grain sprouted—thin and scorched by the east wind. '
  '7':
  - type: text
    content: The thin heads of grain swallowed up the seven healthy, full heads. Then Pharaoh woke up; it had been a dream.
  '8':
  - type: text
    content: In the morning his mind was troubled, so he sent for all the magicians and wise men of Egypt. Pharaoh told them his dreams, but no one could interpret them for him.
  '9':
  - type: text
    content: 'Then the chief cupbearer said to Pharaoh, “Today I am reminded of my shortcomings. '
