document_id: 2SA.8,111
type_code: eng
verses:
  '1':
  - type: heading
    content: David’s Victories
  - type: text
    content: In the course of time, David defeated the Philistines and subdued them, and he took Metheg Ammah from the control of the Philistines.
  '10':
  - type: text
    content: he sent his son Joram
  - type: note
    content: A variant of Hadoram
  - type: text
    content: ' to King David to greet him and congratulate him on his victory in battle over Hadadezer, who had been at war with Tou. Joram brought with him articles of silver, of gold and of bronze.'
  '11':
  - type: text
    content: 'King David dedicated these articles to the '
  - type: text
    content: Lord
  - type: text
    content: ', as he had done with the silver and gold from all the nations he had subdued: '
  '12':
  - type: text
    content: Edom
  - type: note
    content: Some Hebrew manuscripts, Septuagint and Syriac (see also 1 Chron. 18:11); most Hebrew manuscripts Aram
  - type: text
    content: ' and Moab, the Ammonites and the Philistines, and Amalek. He also dedicated the plunder taken from Hadadezer son of Rehob, king of Zobah.'
  '13':
  - type: text
    content: And David became famous after he returned from striking down eighteen thousand Edomites
  - type: note
    content: A few Hebrew manuscripts, Septuagint and Syriac (see also 1 Chron. 18:12); most Hebrew manuscripts Aram (that is, Arameans)
  - type: text
    content: ' in the Valley of Salt.'
  '14':
  - type: text
    content: 'He put garrisons throughout Edom, and all the Edomites became subject to David. The '
  - type: text
    content: Lord
  - type: text
    content: ' gave David victory wherever he went.'
  - type: heading
    content: David’s Officials
  '15':
  - type: text
    content: 'David reigned over all Israel, doing what was just and right for all his people. '
  '16':
  - type: text
    content: 'Joab son of Zeruiah was over the army; Jehoshaphat son of Ahilud was recorder; '
  '17':
  - type: text
    content: 'Zadok son of Ahitub and Ahimelek son of Abiathar were priests; Seraiah was secretary; '
  '18':
  - type: text
    content: Benaiah son of Jehoiada was over the Kerethites and Pelethites; and David’s sons were priests.
  - type: note
    content: Or were chief officials (see Septuagint and Targum; see also 1 Chron. 18:17)
  '2':
  - type: text
    content: David also defeated the Moabites. He made them lie down on the ground and measured them off with a length of cord. Every two lengths of them were put to death, and the third length was allowed to live. So the Moabites became subject to David and brought him tribute.
  '3':
  - type: text
    content: Moreover, David defeated Hadadezer son of Rehob, king of Zobah, when he went to restore his monument at
  - type: note
    content: Or his control along
  - type: text
    content: ' the Euphrates River. '
  '4':
  - type: text
    content: David captured a thousand of his chariots, seven thousand charioteers
  - type: note
    content: Septuagint (see also Dead Sea Scrolls and 1 Chron. 18:4); Masoretic Text captured seventeen hundred of his charioteers
  - type: text
    content: ' and twenty thousand foot soldiers. He hamstrung all but a hundred of the chariot horses.'
  '5':
  - type: text
    content: 'When the Arameans of Damascus came to help Hadadezer king of Zobah, David struck down twenty-two thousand of them. '
  '6':
  - type: text
    content: 'He put garrisons in the Aramean kingdom of Damascus, and the Arameans became subject to him and brought tribute. The '
  - type: text
    content: Lord
  - type: text
    content: ' gave David victory wherever he went.'
  '7':
  - type: text
    content: 'David took the gold shields that belonged to the officers of Hadadezer and brought them to Jerusalem. '
  '8':
  - type: text
    content: From Tebah
  - type: note
    content: See some Septuagint manuscripts (see also 1 Chron. 18:8); Hebrew Betah.
  - type: text
    content: ' and Berothai, towns that belonged to Hadadezer, King David took a great quantity of bronze.'
  '9':
  - type: text
    content: When Tou
  - type: note
    content: Hebrew Toi, a variant of Tou; also in verse 10
  - type: text
    content: ' king of Hamath heard that David had defeated the entire army of Hadadezer, '
