document_id: 2SA.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David’s Victories
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: In the course of time, David defeated the Philistines and subdued them, and he took Metheg Ammah from the control of the Philistines.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: David also defeated the Moabites. He made them lie down on the ground and measured them off with a length of cord. Every two lengths of them were put to death, and the third length was allowed to live. So the Moabites became subject to David and brought him tribute.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Moreover, David defeated Hadadezer son of Rehob, king of Zobah, when he went to restore his monument at
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: his control along
    marker-yv: yv-n
  - type: text
    text: ' the Euphrates River. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: David captured a thousand of his chariots, seven thousand charioteers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint (see also Dead Sea Scrolls and 1 Chron. 18:4); Masoretic Text '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: captured seventeen hundred of his charioteers
    marker-yv: yv-n
  - type: text
    text: ' and twenty thousand foot soldiers. He hamstrung all but a hundred of the chariot horses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When the Arameans of Damascus came to help Hadadezer king of Zobah, David struck down twenty-two thousand of them. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'He put garrisons in the Aramean kingdom of Damascus, and the Arameans became subject to him and brought tribute. The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave David victory wherever he went.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'David took the gold shields that belonged to the officers of Hadadezer and brought them to Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: From Tebah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'See some Septuagint manuscripts (see also 1 Chron. 18:8); Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Betah.
    marker-yv: yv-n
  - type: text
    text: ' and Berothai, towns that belonged to Hadadezer, King David took a great quantity of bronze.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: When Tou
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Toi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tou
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verse 10
    marker-yv: yv-n
  - type: text
    text: ' king of Hamath heard that David had defeated the entire army of Hadadezer, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: he sent his son Joram
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A variant of '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Hadoram
    marker-yv: yv-n
  - type: text
    text: ' to King David to greet him and congratulate him on his victory in battle over Hadadezer, who had been at war with Tou. Joram brought with him articles of silver, of gold and of bronze.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'King David dedicated these articles to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', as he had done with the silver and gold from all the nations he had subdued: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Edom
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Hebrew manuscripts, Septuagint and Syriac (see also 1 Chron. 18:11); most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Aram
    marker-yv: yv-n
  - type: text
    text: ' and Moab, the Ammonites and the Philistines, and Amalek. He also dedicated the plunder taken from Hadadezer son of Rehob, king of Zobah.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: And David became famous after he returned from striking down eighteen thousand Edomites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A few Hebrew manuscripts, Septuagint and Syriac (see also 1 Chron. 18:12); most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Aram '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (that is, Arameans)
    marker-yv: yv-n
  - type: text
    text: ' in the Valley of Salt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'He put garrisons throughout Edom, and all the Edomites became subject to David. The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' gave David victory wherever he went.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: David’s Officials
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'David reigned over all Israel, doing what was just and right for all his people. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Joab son of Zeruiah was over the army; Jehoshaphat son of Ahilud was recorder; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Zadok son of Ahitub and Ahimelek son of Abiathar were priests; Seraiah was secretary; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Benaiah son of Jehoiada was over the Kerethites and Pelethites; and David’s sons were priests.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'were chief officials '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (see Septuagint and Targum; see also 1 Chron. 18:17)
    marker-yv: yv-n
