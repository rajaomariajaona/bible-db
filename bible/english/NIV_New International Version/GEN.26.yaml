document_id: GEN.26,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Isaac and Abimelek
  - type: text
    content: 'Now there was a famine in the land—besides the previous famine in Abraham’s time—and Isaac went to Abimelek king of the Philistines in Gerar. '
  '10':
  - type: text
    content: Then Abimelek said, “What is this you have done to us? One of the men might well have slept with your wife, and you would have brought guilt upon us.”
  '11':
  - type: text
    content: 'So Abimelek gave orders to all the people: “Anyone who harms this man or his wife shall surely be put to death.”'
  '12':
  - type: text
    content: 'Isaac planted crops in that land and the same year reaped a hundredfold, because the '
  - type: text
    content: Lord
  - type: text
    content: ' blessed him. '
  '13':
  - type: text
    content: 'The man became rich, and his wealth continued to grow until he became very wealthy. '
  '14':
  - type: text
    content: 'He had so many flocks and herds and servants that the Philistines envied him. '
  '15':
  - type: text
    content: So all the wells that his father’s servants had dug in the time of his father Abraham, the Philistines stopped up, filling them with earth.
  '16':
  - type: text
    content: Then Abimelek said to Isaac, “Move away from us; you have become too powerful for us.”
  '17':
  - type: text
    content: 'So Isaac moved away from there and encamped in the Valley of Gerar, where he settled. '
  '18':
  - type: text
    content: Isaac reopened the wells that had been dug in the time of his father Abraham, which the Philistines had stopped up after Abraham died, and he gave them the same names his father had given them.
  '19':
  - type: text
    content: 'Isaac’s servants dug in the valley and discovered a well of fresh water there. '
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to Isaac and said, “Do not go down to Egypt; live in the land where I tell you to live. '
  '20':
  - type: text
    content: But the herders of Gerar quarreled with those of Isaac and said, “The water is ours!” So he named the well Esek,
  - type: note
    content: Esek means dispute.
  - type: text
    content: ' because they disputed with him. '
  '21':
  - type: text
    content: Then they dug another well, but they quarreled over that one also; so he named it Sitnah.
  - type: note
    content: Sitnah means opposition.
  - type: text
    content: ' '
  '22':
  - type: text
    content: He moved on from there and dug another well, and no one quarreled over it. He named it Rehoboth,
  - type: note
    content: Rehoboth means room.
  - type: text
    content: ' saying, “Now the '
  - type: text
    content: Lord
  - type: text
    content: ' has given us room and we will flourish in the land.”'
  '23':
  - type: text
    content: 'From there he went up to Beersheba. '
  '24':
  - type: text
    content: 'That night the '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to him and said, “I am the God of your father Abraham. Do not be afraid, for I am with you; I will bless you and will increase the number of your descendants for the sake of my servant Abraham.”'
  '25':
  - type: text
    content: 'Isaac built an altar there and called on the name of the '
  - type: text
    content: Lord
  - type: text
    content: . There he pitched his tent, and there his servants dug a well.
  '26':
  - type: text
    content: 'Meanwhile, Abimelek had come to him from Gerar, with Ahuzzath his personal adviser and Phicol the commander of his forces. '
  '27':
  - type: text
    content: Isaac asked them, “Why have you come to me, since you were hostile to me and sent me away?”
  '28':
  - type: text
    content: 'They answered, “We saw clearly that the '
  - type: text
    content: Lord
  - type: text
    content: ' was with you; so we said, ‘There ought to be a sworn agreement between us’—between us and you. Let us make a treaty with you '
  '29':
  - type: text
    content: 'that you will do us no harm, just as we did not harm you but always treated you well and sent you away peacefully. And now you are blessed by the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '3':
  - type: text
    content: 'Stay in this land for a while, and I will be with you and will bless you. For to you and your descendants I will give all these lands and will confirm the oath I swore to your father Abraham. '
  '30':
  - type: text
    content: 'Isaac then made a feast for them, and they ate and drank. '
  '31':
  - type: text
    content: Early the next morning the men swore an oath to each other. Then Isaac sent them on their way, and they went away peacefully.
  '32':
  - type: text
    content: 'That day Isaac’s servants came and told him about the well they had dug. They said, “We’ve found water!” '
  '33':
  - type: text
    content: He called it Shibah,
  - type: note
    content: Shibah can mean oath or seven.
  - type: text
    content: ' and to this day the name of the town has been Beersheba.'
  - type: note
    content: Beersheba can mean well of the oath and well of seven.
  - type: heading
    content: Jacob Takes Esau’s Blessing
  '34':
  - type: text
    content: 'When Esau was forty years old, he married Judith daughter of Beeri the Hittite, and also Basemath daughter of Elon the Hittite. '
  '35':
  - type: text
    content: They were a source of grief to Isaac and Rebekah.
  '4':
  - type: text
    content: I will make your descendants as numerous as the stars in the sky and will give them all these lands, and through your offspring
  - type: note
    content: Or seed
  - type: text
    content: ' all nations on earth will be blessed,'
  - type: note
    content: Or and all nations on earth will use the name of your offspring in blessings (see 48:20)
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'because Abraham obeyed me and did everything I required of him, keeping my commands, my decrees and my instructions.” '
  '6':
  - type: text
    content: So Isaac stayed in Gerar.
  '7':
  - type: text
    content: When the men of that place asked him about his wife, he said, “She is my sister,” because he was afraid to say, “She is my wife.” He thought, “The men of this place might kill me on account of Rebekah, because she is beautiful.”
  '8':
  - type: text
    content: 'When Isaac had been there a long time, Abimelek king of the Philistines looked down from a window and saw Isaac caressing his wife Rebekah. '
  '9':
  - type: text
    content: So Abimelek summoned Isaac and said, “She is really your wife! Why did you say, ‘She is my sister’?”
  - type: text
    content: Isaac answered him, “Because I thought I might lose my life on account of her.”
