document_id: LAM.4,111
type_code: eng
verses:
  '1':
  - type: note
    content: This chapter is an acrostic poem, the verses of which begin with the successive letters of the Hebrew alphabet.
  - type: text
    content: How the gold has lost its luster,
  - type: text
    content: the fine gold become dull!
  - type: text
    content: The sacred gems are scattered
  - type: text
    content: at every street corner.
  '10':
  - type: text
    content: With their own hands compassionate women
  - type: text
    content: have cooked their own children,
  - type: text
    content: who became their food
  - type: text
    content: when my people were destroyed.
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has given full vent to his wrath;'
  - type: text
    content: he has poured out his fierce anger.
  - type: text
    content: He kindled a fire in Zion
  - type: text
    content: that consumed her foundations.
  '12':
  - type: text
    content: The kings of the earth did not believe,
  - type: text
    content: nor did any of the peoples of the world,
  - type: text
    content: that enemies and foes could enter
  - type: text
    content: the gates of Jerusalem.
  '13':
  - type: text
    content: But it happened because of the sins of her prophets
  - type: text
    content: and the iniquities of her priests,
  - type: text
    content: who shed within her
  - type: text
    content: the blood of the righteous.
  '14':
  - type: text
    content: Now they grope through the streets
  - type: text
    content: as if they were blind.
  - type: text
    content: They are so defiled with blood
  - type: text
    content: that no one dares to touch their garments.
  '15':
  - type: text
    content: “Go away! You are unclean!” people cry to them.
  - type: text
    content: “Away! Away! Don’t touch us!”
  - type: text
    content: When they flee and wander about,
  - type: text
    content: people among the nations say,
  - type: text
    content: “They can stay here no longer.”
  '16':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' himself has scattered them;'
  - type: text
    content: he no longer watches over them.
  - type: text
    content: The priests are shown no honor,
  - type: text
    content: the elders no favor.
  '17':
  - type: text
    content: Moreover, our eyes failed,
  - type: text
    content: looking in vain for help;
  - type: text
    content: from our towers we watched
  - type: text
    content: for a nation that could not save us.
  '18':
  - type: text
    content: People stalked us at every step,
  - type: text
    content: so we could not walk in our streets.
  - type: text
    content: Our end was near, our days were numbered,
  - type: text
    content: for our end had come.
  '19':
  - type: text
    content: Our pursuers were swifter
  - type: text
    content: than eagles in the sky;
  - type: text
    content: they chased us over the mountains
  - type: text
    content: and lay in wait for us in the desert.
  '2':
  - type: text
    content: How the precious children of Zion,
  - type: text
    content: once worth their weight in gold,
  - type: text
    content: are now considered as pots of clay,
  - type: text
    content: the work of a potter’s hands!
  '20':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ’s anointed, our very life breath,
  - type: text
    content: was caught in their traps.
  - type: text
    content: We thought that under his shadow
  - type: text
    content: we would live among the nations.
  '21':
  - type: text
    content: Rejoice and be glad, Daughter Edom,
  - type: text
    content: you who live in the land of Uz.
  - type: text
    content: But to you also the cup will be passed;
  - type: text
    content: you will be drunk and stripped naked.
  '22':
  - type: text
    content: Your punishment will end, Daughter Zion;
  - type: text
    content: he will not prolong your exile.
  - type: text
    content: But he will punish your sin, Daughter Edom,
  - type: text
    content: and expose your wickedness.
  '3':
  - type: text
    content: Even jackals offer their breasts
  - type: text
    content: to nurse their young,
  - type: text
    content: but my people have become heartless
  - type: text
    content: like ostriches in the desert.
  '4':
  - type: text
    content: Because of thirst the infant’s tongue
  - type: text
    content: sticks to the roof of its mouth;
  - type: text
    content: the children beg for bread,
  - type: text
    content: but no one gives it to them.
  '5':
  - type: text
    content: Those who once ate delicacies
  - type: text
    content: are destitute in the streets.
  - type: text
    content: Those brought up in royal purple
  - type: text
    content: now lie on ash heaps.
  '6':
  - type: text
    content: The punishment of my people
  - type: text
    content: is greater than that of Sodom,
  - type: text
    content: which was overthrown in a moment
  - type: text
    content: without a hand turned to help her.
  '7':
  - type: text
    content: Their princes were brighter than snow
  - type: text
    content: and whiter than milk,
  - type: text
    content: their bodies more ruddy than rubies,
  - type: text
    content: their appearance like lapis lazuli.
  '8':
  - type: text
    content: But now they are blacker than soot;
  - type: text
    content: they are not recognized in the streets.
  - type: text
    content: Their skin has shriveled on their bones;
  - type: text
    content: it has become as dry as a stick.
  '9':
  - type: text
    content: Those killed by the sword are better off
  - type: text
    content: than those who die of famine;
  - type: text
    content: racked with hunger, they waste away
  - type: text
    content: for lack of food from the field.
