document_id: LAM.4
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: This chapter is an acrostic poem, the verses of which begin with the successive letters of the Hebrew alphabet.
    marker-yv: yv-n
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: How the gold has lost its luster,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the fine gold become dull!
- type: usfm
  marker: q1
  children:
  - type: text
    text: The sacred gems are scattered
- type: usfm
  marker: q2
  children:
  - type: text
    text: at every street corner.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: How the precious children of Zion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: once worth their weight in gold,
- type: usfm
  marker: q1
  children:
  - type: text
    text: are now considered as pots of clay,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the work of a potter’s hands!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Even jackals offer their breasts
- type: usfm
  marker: q2
  children:
  - type: text
    text: to nurse their young,
- type: usfm
  marker: q1
  children:
  - type: text
    text: but my people have become heartless
- type: usfm
  marker: q2
  children:
  - type: text
    text: like ostriches in the desert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Because of thirst the infant’s tongue
- type: usfm
  marker: q2
  children:
  - type: text
    text: sticks to the roof of its mouth;
- type: usfm
  marker: q1
  children:
  - type: text
    text: the children beg for bread,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but no one gives it to them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Those who once ate delicacies
- type: usfm
  marker: q2
  children:
  - type: text
    text: are destitute in the streets.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Those brought up in royal purple
- type: usfm
  marker: q2
  children:
  - type: text
    text: now lie on ash heaps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The punishment of my people
- type: usfm
  marker: q2
  children:
  - type: text
    text: is greater than that of Sodom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: which was overthrown in a moment
- type: usfm
  marker: q2
  children:
  - type: text
    text: without a hand turned to help her.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Their princes were brighter than snow
- type: usfm
  marker: q2
  children:
  - type: text
    text: and whiter than milk,
- type: usfm
  marker: q1
  children:
  - type: text
    text: their bodies more ruddy than rubies,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their appearance like lapis lazuli.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But now they are blacker than soot;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they are not recognized in the streets.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their skin has shriveled on their bones;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it has become as dry as a stick.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Those killed by the sword are better off
- type: usfm
  marker: q2
  children:
  - type: text
    text: than those who die of famine;
- type: usfm
  marker: q1
  children:
  - type: text
    text: racked with hunger, they waste away
- type: usfm
  marker: q2
  children:
  - type: text
    text: for lack of food from the field.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: With their own hands compassionate women
- type: usfm
  marker: q2
  children:
  - type: text
    text: have cooked their own children,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who became their food
- type: usfm
  marker: q2
  children:
  - type: text
    text: when my people were destroyed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has given full vent to his wrath;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he has poured out his fierce anger.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He kindled a fire in Zion
- type: usfm
  marker: q2
  children:
  - type: text
    text: that consumed her foundations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: The kings of the earth did not believe,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor did any of the peoples of the world,
- type: usfm
  marker: q1
  children:
  - type: text
    text: that enemies and foes could enter
- type: usfm
  marker: q2
  children:
  - type: text
    text: the gates of Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: But it happened because of the sins of her prophets
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the iniquities of her priests,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who shed within her
- type: usfm
  marker: q2
  children:
  - type: text
    text: the blood of the righteous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Now they grope through the streets
- type: usfm
  marker: q2
  children:
  - type: text
    text: as if they were blind.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are so defiled with blood
- type: usfm
  marker: q2
  children:
  - type: text
    text: that no one dares to touch their garments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Go away! You are unclean!” people cry to them.
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Away! Away! Don’t touch us!”
- type: usfm
  marker: q1
  children:
  - type: text
    text: When they flee and wander about,
- type: usfm
  marker: q2
  children:
  - type: text
    text: people among the nations say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “They can stay here no longer.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' himself has scattered them;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he no longer watches over them.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The priests are shown no honor,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the elders no favor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Moreover, our eyes failed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: looking in vain for help;
- type: usfm
  marker: q1
  children:
  - type: text
    text: from our towers we watched
- type: usfm
  marker: q2
  children:
  - type: text
    text: for a nation that could not save us.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: People stalked us at every step,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so we could not walk in our streets.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Our end was near, our days were numbered,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for our end had come.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Our pursuers were swifter
- type: usfm
  marker: q2
  children:
  - type: text
    text: than eagles in the sky;
- type: usfm
  marker: q1
  children:
  - type: text
    text: they chased us over the mountains
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lay in wait for us in the desert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s anointed, our very life breath,
- type: usfm
  marker: q2
  children:
  - type: text
    text: was caught in their traps.
- type: usfm
  marker: q1
  children:
  - type: text
    text: We thought that under his shadow
- type: usfm
  marker: q2
  children:
  - type: text
    text: we would live among the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Rejoice and be glad, Daughter Edom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who live in the land of Uz.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But to you also the cup will be passed;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will be drunk and stripped naked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Your punishment will end, Daughter Zion;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will not prolong your exile.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But he will punish your sin, Daughter Edom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and expose your wickedness.
