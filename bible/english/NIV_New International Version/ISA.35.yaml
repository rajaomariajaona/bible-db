document_id: ISA.35,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joy of the Redeemed
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The desert and the parched land will be glad;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the wilderness will rejoice and blossom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Like the crocus, '
  '10':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and those the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has rescued will return.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will enter Zion with singing;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: everlasting joy will crown their heads.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gladness and joy will overtake them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and sorrow and sighing will flee away.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: it will burst into bloom;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it will rejoice greatly and shout for joy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The glory of Lebanon will be given to it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the splendor of Carmel and Sharon;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'they will see the glory of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the splendor of our God.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Strengthen the feeble hands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: steady the knees that give way;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: say to those with fearful hearts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Be strong, do not fear;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your God will come,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will come with vengeance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with divine retribution
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will come to save you.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then will the eyes of the blind be opened
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the ears of the deaf unstopped.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then will the lame leap like a deer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the mute tongue shout for joy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Water will gush forth in the wilderness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and streams in the desert.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The burning sand will become a pool,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the thirsty ground bubbling springs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the haunts where jackals once lay,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: grass and reeds and papyrus will grow.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And a highway will be there;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it will be called the Way of Holiness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it will be for those who walk on that Way.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The unclean will not journey on it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wicked fools will not go about on it.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: No lion will be there,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor any ravenous beast;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will not be found there.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But only the redeemed will walk there,
