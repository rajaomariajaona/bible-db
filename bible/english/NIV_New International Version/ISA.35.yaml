document_id: ISA.35,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Joy of the Redeemed
  - type: text
    content: The desert and the parched land will be glad;
  - type: text
    content: the wilderness will rejoice and blossom.
  - type: text
    content: 'Like the crocus, '
  '10':
  - type: text
    content: 'and those the '
  - type: text
    content: Lord
  - type: text
    content: ' has rescued will return.'
  - type: text
    content: They will enter Zion with singing;
  - type: text
    content: everlasting joy will crown their heads.
  - type: text
    content: Gladness and joy will overtake them,
  - type: text
    content: and sorrow and sighing will flee away.
  '2':
  - type: text
    content: it will burst into bloom;
  - type: text
    content: it will rejoice greatly and shout for joy.
  - type: text
    content: The glory of Lebanon will be given to it,
  - type: text
    content: the splendor of Carmel and Sharon;
  - type: text
    content: 'they will see the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the splendor of our God.
  '3':
  - type: text
    content: Strengthen the feeble hands,
  - type: text
    content: steady the knees that give way;
  '4':
  - type: text
    content: say to those with fearful hearts,
  - type: text
    content: “Be strong, do not fear;
  - type: text
    content: your God will come,
  - type: text
    content: he will come with vengeance;
  - type: text
    content: with divine retribution
  - type: text
    content: he will come to save you.”
  '5':
  - type: text
    content: Then will the eyes of the blind be opened
  - type: text
    content: and the ears of the deaf unstopped.
  '6':
  - type: text
    content: Then will the lame leap like a deer,
  - type: text
    content: and the mute tongue shout for joy.
  - type: text
    content: Water will gush forth in the wilderness
  - type: text
    content: and streams in the desert.
  '7':
  - type: text
    content: The burning sand will become a pool,
  - type: text
    content: the thirsty ground bubbling springs.
  - type: text
    content: In the haunts where jackals once lay,
  - type: text
    content: grass and reeds and papyrus will grow.
  '8':
  - type: text
    content: And a highway will be there;
  - type: text
    content: it will be called the Way of Holiness;
  - type: text
    content: it will be for those who walk on that Way.
  - type: text
    content: The unclean will not journey on it;
  - type: text
    content: wicked fools will not go about on it.
  '9':
  - type: text
    content: No lion will be there,
  - type: text
    content: nor any ravenous beast;
  - type: text
    content: they will not be found there.
  - type: text
    content: But only the redeemed will walk there,
