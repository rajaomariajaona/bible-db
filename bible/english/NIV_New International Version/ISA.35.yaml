document_id: ISA.35
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joy of the Redeemed
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The desert and the parched land will be glad;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the wilderness will rejoice and blossom.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Like the crocus, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: it will burst into bloom;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will rejoice greatly and shout for joy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The glory of Lebanon will be given to it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the splendor of Carmel and Sharon;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'they will see the glory of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: the splendor of our God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Strengthen the feeble hands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: steady the knees that give way;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: say to those with fearful hearts,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Be strong, do not fear;
- type: usfm
  marker: q1
  children:
  - type: text
    text: your God will come,
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will come with vengeance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: with divine retribution
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will come to save you.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Then will the eyes of the blind be opened
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the ears of the deaf unstopped.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then will the lame leap like a deer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the mute tongue shout for joy.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Water will gush forth in the wilderness
- type: usfm
  marker: q2
  children:
  - type: text
    text: and streams in the desert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: The burning sand will become a pool,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the thirsty ground bubbling springs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In the haunts where jackals once lay,
- type: usfm
  marker: q2
  children:
  - type: text
    text: grass and reeds and papyrus will grow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: And a highway will be there;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will be called the Way of Holiness;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will be for those who walk on that Way.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The unclean will not journey on it;
- type: usfm
  marker: q2
  children:
  - type: text
    text: wicked fools will not go about on it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: No lion will be there,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor any ravenous beast;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will not be found there.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But only the redeemed will walk there,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'and those the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has rescued will return.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will enter Zion with singing;
- type: usfm
  marker: q2
  children:
  - type: text
    text: everlasting joy will crown their heads.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gladness and joy will overtake them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and sorrow and sighing will flee away.
