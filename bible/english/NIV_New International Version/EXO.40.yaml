document_id: EXO.40,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Setting Up the Tabernacle
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses: '
  '10':
  - type: text
    content: 'Then anoint the altar of burnt offering and all its utensils; consecrate the altar, and it will be most holy. '
  '11':
  - type: text
    content: Anoint the basin and its stand and consecrate them.
  '12':
  - type: text
    content: '“Bring Aaron and his sons to the entrance to the tent of meeting and wash them with water. '
  '13':
  - type: text
    content: 'Then dress Aaron in the sacred garments, anoint him and consecrate him so he may serve me as priest. '
  '14':
  - type: text
    content: 'Bring his sons and dress them in tunics. '
  '15':
  - type: text
    content: 'Anoint them just as you anointed their father, so they may serve me as priests. Their anointing will be to a priesthood that will continue throughout their generations.” '
  '16':
  - type: text
    content: 'Moses did everything just as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded him.'
  '17':
  - type: text
    content: 'So the tabernacle was set up on the first day of the first month in the second year. '
  '18':
  - type: text
    content: 'When Moses set up the tabernacle, he put the bases in place, erected the frames, inserted the crossbars and set up the posts. '
  '19':
  - type: text
    content: 'Then he spread the tent over the tabernacle and put the covering over the tent, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded him.'
  '2':
  - type: text
    content: '“Set up the tabernacle, the tent of meeting, on the first day of the first month. '
  '20':
  - type: text
    content: 'He took the tablets of the covenant law and placed them in the ark, attached the poles to the ark and put the atonement cover over it. '
  '21':
  - type: text
    content: 'Then he brought the ark into the tabernacle and hung the shielding curtain and shielded the ark of the covenant law, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded him.'
  '22':
  - type: text
    content: 'Moses placed the table in the tent of meeting on the north side of the tabernacle outside the curtain '
  '23':
  - type: text
    content: 'and set out the bread on it before the '
  - type: text
    content: Lord
  - type: text
    content: ', as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded him.'
  '24':
  - type: text
    content: 'He placed the lampstand in the tent of meeting opposite the table on the south side of the tabernacle '
  '25':
  - type: text
    content: 'and set up the lamps before the '
  - type: text
    content: Lord
  - type: text
    content: ', as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded him.'
  '26':
  - type: text
    content: 'Moses placed the gold altar in the tent of meeting in front of the curtain '
  '27':
  - type: text
    content: 'and burned fragrant incense on it, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded him.'
  '28':
  - type: text
    content: 'Then he put up the curtain at the entrance to the tabernacle. '
  '29':
  - type: text
    content: 'He set the altar of burnt offering near the entrance to the tabernacle, the tent of meeting, and offered on it burnt offerings and grain offerings, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded him.'
  '3':
  - type: text
    content: 'Place the ark of the covenant law in it and shield the ark with the curtain. '
  '30':
  - type: text
    content: 'He placed the basin between the tent of meeting and the altar and put water in it for washing, '
  '31':
  - type: text
    content: 'and Moses and Aaron and his sons used it to wash their hands and feet. '
  '32':
  - type: text
    content: 'They washed whenever they entered the tent of meeting or approached the altar, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '33':
  - type: text
    content: Then Moses set up the courtyard around the tabernacle and altar and put up the curtain at the entrance to the courtyard. And so Moses finished the work.
  - type: heading
    content: The Glory of the Lord
  '34':
  - type: text
    content: 'Then the cloud covered the tent of meeting, and the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' filled the tabernacle. '
  '35':
  - type: text
    content: 'Moses could not enter the tent of meeting because the cloud had settled on it, and the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' filled the tabernacle.'
  '36':
  - type: text
    content: 'In all the travels of the Israelites, whenever the cloud lifted from above the tabernacle, they would set out; '
  '37':
  - type: text
    content: 'but if the cloud did not lift, they did not set out—until the day it lifted. '
  '38':
  - type: text
    content: 'So the cloud of the '
  - type: text
    content: Lord
  - type: text
    content: ' was over the tabernacle by day, and fire was in the cloud by night, in the sight of all the Israelites during all their travels.'
  '4':
  - type: text
    content: 'Bring in the table and set out what belongs on it. Then bring in the lampstand and set up its lamps. '
  '5':
  - type: text
    content: Place the gold altar of incense in front of the ark of the covenant law and put the curtain at the entrance to the tabernacle.
  '6':
  - type: text
    content: '“Place the altar of burnt offering in front of the entrance to the tabernacle, the tent of meeting; '
  '7':
  - type: text
    content: 'place the basin between the tent of meeting and the altar and put water in it. '
  '8':
  - type: text
    content: Set up the courtyard around it and put the curtain at the entrance to the courtyard.
  '9':
  - type: text
    content: '“Take the anointing oil and anoint the tabernacle and everything in it; consecrate it and all its furnishings, and it will be holy. '
