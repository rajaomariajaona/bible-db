document_id: 1SA.8,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel Asks for a King
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Samuel grew old, he appointed his sons as Israel’s leaders.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Traditionally '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: judges
      marker-yv: yv-n
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel told all the words of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to the people who were asking him for a king. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said, “This is what the king who will reign over you will claim as his rights: He will take your sons and make them serve with his chariots and horses, and they will run in front of his chariots. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some he will assign to be commanders of thousands and commanders of fifties, and others to plow his ground and reap his harvest, and still others to make weapons of war and equipment for his chariots. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He will take your daughters to be perfumers and cooks and bakers. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He will take the best of your fields and vineyards and olive groves and give them to his attendants. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He will take a tenth of your grain and of your vintage and give it to his officials and attendants. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Your male and female servants and the best of your cattle
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: young men
      marker-yv: yv-n
    - type: text
      text: ' and donkeys he will take for his own use. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He will take a tenth of your flocks, and you yourselves will become his slaves. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When that day comes, you will cry out for relief from the king you have chosen, but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will not answer you in that day.”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the people refused to listen to Samuel. “No!” they said. “We want a king over us. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The name of his firstborn was Joel and the name of his second was Abijah, and they served at Beersheba. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then we will be like all the other nations, with a king to lead us and to go out before us and fight our battles.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Samuel heard all that the people said, he repeated it before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' answered, “Listen to them and give them a king.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Samuel said to the Israelites, “Everyone go back to your own town.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But his sons did not follow his ways. They turned aside after dishonest gain and accepted bribes and perverted justice.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So all the elders of Israel gathered together and came to Samuel at Ramah. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They said to him, “You are old, and your sons do not follow your ways; now appoint a king to lead
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Traditionally '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: judge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verses 6 and 20
      marker-yv: yv-n
    - type: text
      text: ' us, such as all the other nations have.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when they said, “Give us a king to lead us,” this displeased Samuel; so he prayed to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told him: “Listen to all that the people are saying to you; it is not you they have rejected, but they have rejected me as their king. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As they have done from the day I brought them up out of Egypt until this day, forsaking me and serving other gods, so they are doing to you. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now listen to them; but warn them solemnly and let them know what the king who will reign over them will claim as his rights.”
