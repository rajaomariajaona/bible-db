document_id: 1SA.8,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel Asks for a King
  - type: text
    content: When Samuel grew old, he appointed his sons as Israel’s leaders.
  - type: note
    content: Traditionally judges
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Samuel told all the words of the '
  - type: text
    content: Lord
  - type: text
    content: ' to the people who were asking him for a king. '
  '11':
  - type: text
    content: 'He said, “This is what the king who will reign over you will claim as his rights: He will take your sons and make them serve with his chariots and horses, and they will run in front of his chariots. '
  '12':
  - type: text
    content: 'Some he will assign to be commanders of thousands and commanders of fifties, and others to plow his ground and reap his harvest, and still others to make weapons of war and equipment for his chariots. '
  '13':
  - type: text
    content: 'He will take your daughters to be perfumers and cooks and bakers. '
  '14':
  - type: text
    content: 'He will take the best of your fields and vineyards and olive groves and give them to his attendants. '
  '15':
  - type: text
    content: 'He will take a tenth of your grain and of your vintage and give it to his officials and attendants. '
  '16':
  - type: text
    content: Your male and female servants and the best of your cattle
  - type: note
    content: Septuagint; Hebrew young men
  - type: text
    content: ' and donkeys he will take for his own use. '
  '17':
  - type: text
    content: 'He will take a tenth of your flocks, and you yourselves will become his slaves. '
  '18':
  - type: text
    content: 'When that day comes, you will cry out for relief from the king you have chosen, but the '
  - type: text
    content: Lord
  - type: text
    content: ' will not answer you in that day.”'
  '19':
  - type: text
    content: 'But the people refused to listen to Samuel. “No!” they said. “We want a king over us. '
  '2':
  - type: text
    content: 'The name of his firstborn was Joel and the name of his second was Abijah, and they served at Beersheba. '
  '20':
  - type: text
    content: Then we will be like all the other nations, with a king to lead us and to go out before us and fight our battles.”
  '21':
  - type: text
    content: 'When Samuel heard all that the people said, he repeated it before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' answered, “Listen to them and give them a king.”'
  - type: text
    content: Then Samuel said to the Israelites, “Everyone go back to your own town.”
  '3':
  - type: text
    content: But his sons did not follow his ways. They turned aside after dishonest gain and accepted bribes and perverted justice.
  '4':
  - type: text
    content: 'So all the elders of Israel gathered together and came to Samuel at Ramah. '
  '5':
  - type: text
    content: They said to him, “You are old, and your sons do not follow your ways; now appoint a king to lead
  - type: note
    content: Traditionally judge; also in verses 6 and 20
  - type: text
    content: ' us, such as all the other nations have.”'
  '6':
  - type: text
    content: 'But when they said, “Give us a king to lead us,” this displeased Samuel; so he prayed to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' told him: “Listen to all that the people are saying to you; it is not you they have rejected, but they have rejected me as their king. '
  '8':
  - type: text
    content: 'As they have done from the day I brought them up out of Egypt until this day, forsaking me and serving other gods, so they are doing to you. '
  '9':
  - type: text
    content: Now listen to them; but warn them solemnly and let them know what the king who will reign over them will claim as his rights.”
