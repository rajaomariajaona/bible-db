document_id: 2SA.17
type_code: eng
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ahithophel said to Absalom, “I would
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Let me
    marker-yv: yv-n
  - type: text
    text: ' choose twelve thousand men and set out tonight in pursuit of David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I would attack him while he is weary and weak. I would strike him with terror, and then all the people with him will flee. I would strike down only the king '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'and bring all the people back to you. The death of the man you seek will mean the return of all; all the people will be unharmed.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: This plan seemed good to Absalom and to all the elders of Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But Absalom said, “Summon also Hushai the Arkite, so we can hear what he has to say as well.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: When Hushai came to him, Absalom said, “Ahithophel has given this advice. Should we do what he says? If not, give us your opinion.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hushai replied to Absalom, “The advice Ahithophel has given is not good this time. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'You know your father and his men; they are fighters, and as fierce as a wild bear robbed of her cubs. Besides, your father is an experienced fighter; he will not spend the night with the troops. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Even now, he is hidden in a cave or some other place. If he should attack your troops first,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: When some of the men fall at the first attack
    marker-yv: yv-n
  - type: text
    text: ' whoever hears about it will say, ‘There has been a slaughter among the troops who follow Absalom.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then even the bravest soldier, whose heart is like the heart of a lion, will melt with fear, for all Israel knows that your father is a fighter and that those with him are brave.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“So I advise you: Let all Israel, from Dan to Beersheba—as numerous as the sand on the seashore—be gathered to you, with you yourself leading them into battle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Then we will attack him wherever he may be found, and we will fall on him as dew settles on the ground. Neither he nor any of his men will be left alive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: If he withdraws into a city, then all Israel will bring ropes to that city, and we will drag it down to the valley until not so much as a pebble is left.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Absalom and all the men of Israel said, “The advice of Hushai the Arkite is better than that of Ahithophel.” For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' had determined to frustrate the good advice of Ahithophel in order to bring disaster on Absalom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hushai told Zadok and Abiathar, the priests, “Ahithophel has advised Absalom and the elders of Israel to do such and such, but I have advised them to do so and so. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Now send a message at once and tell David, ‘Do not spend the night at the fords in the wilderness; cross over without fail, or the king and all the people with him will be swallowed up.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jonathan and Ahimaaz were staying at En Rogel. A female servant was to go and inform them, and they were to go and tell King David, for they could not risk being seen entering the city. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'But a young man saw them and told Absalom. So the two of them left at once and went to the house of a man in Bahurim. He had a well in his courtyard, and they climbed down into it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: His wife took a covering and spread it out over the opening of the well and scattered grain over it. No one knew anything about it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: When Absalom’s men came to the woman at the house, they asked, “Where are Ahimaaz and Jonathan?”
- type: usfm
  marker: p
  children:
  - type: text
    text: The woman answered them, “They crossed over the brook.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: “They passed by the sheep pen toward the water.”
    marker-yv: yv-n
  - type: text
    text: ' The men searched but found no one, so they returned to Jerusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'After they had gone, the two climbed out of the well and went to inform King David. They said to him, “Set out and cross the river at once; Ahithophel has advised such and such against you.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: So David and all the people with him set out and crossed the Jordan. By daybreak, no one was left who had not crossed the Jordan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: When Ahithophel saw that his advice had not been followed, he saddled his donkey and set out for his house in his hometown. He put his house in order and then hanged himself. So he died and was buried in his father’s tomb.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Absalom’s Death
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'David went to Mahanaim, and Absalom crossed the Jordan with all the men of Israel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Absalom had appointed Amasa over the army in place of Joab. Amasa was the son of Jether,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ithra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jether
    marker-yv: yv-n
  - type: text
    text: ' an Ishmaelite'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Septuagint manuscripts (see also 1 Chron. 2:17); Hebrew and other Septuagint manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Israelite
    marker-yv: yv-n
  - type: text
    text: ' who had married Abigail,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Abigal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Abigail
    marker-yv: yv-n
  - type: text
    text: ' the daughter of Nahash and sister of Zeruiah the mother of Joab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: The Israelites and Absalom camped in the land of Gilead.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'When David came to Mahanaim, Shobi son of Nahash from Rabbah of the Ammonites, and Makir son of Ammiel from Lo Debar, and Barzillai the Gileadite from Rogelim '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: brought bedding and bowls and articles of pottery. They also brought wheat and barley, flour and roasted grain, beans and lentils,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Most Septuagint manuscripts and Syriac; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: lentils, and roasted grain
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: honey and curds, sheep, and cheese from cows’ milk for David and his people to eat. For they said, “The people have become exhausted and hungry and thirsty in the wilderness.”
