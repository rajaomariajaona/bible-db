document_id: ISA.34
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Judgment Against the Nations
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Come near, you nations, and listen;
- type: usfm
  marker: q2
  children:
  - type: text
    text: pay attention, you peoples!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let the earth hear, and all that is in it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the world, and all that comes out of it!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is angry with all nations;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: his wrath is on all their armies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: He will totally destroy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term refers to the irrevocable giving over of things or persons to the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ', often by totally destroying them; also in verse 5.'
    marker-yv: yv-n
  - type: text
    text: ' them,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will give them over to slaughter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Their slain will be thrown out,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their dead bodies will stink;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the mountains will be soaked with their blood.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: All the stars in the sky will be dissolved
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the heavens rolled up like a scroll;
- type: usfm
  marker: q1
  children:
  - type: text
    text: all the starry host will fall
- type: usfm
  marker: q2
  children:
  - type: text
    text: like withered leaves from the vine,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like shriveled figs from the fig tree.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: My sword has drunk its fill in the heavens;
- type: usfm
  marker: q2
  children:
  - type: text
    text: see, it descends in judgment on Edom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the people I have totally destroyed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'The sword of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is bathed in blood,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: it is covered with fat—
- type: usfm
  marker: q1
  children:
  - type: text
    text: the blood of lambs and goats,
- type: usfm
  marker: q2
  children:
  - type: text
    text: fat from the kidneys of rams.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has a sacrifice in Bozrah'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and a great slaughter in the land of Edom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: And the wild oxen will fall with them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the bull calves and the great bulls.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Their land will be drenched with blood,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the dust will be soaked with fat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'For the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has a day of vengeance,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: a year of retribution, to uphold Zion’s cause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Edom’s streams will be turned into pitch,
- type: usfm
  marker: q2
  children:
  - type: text
    text: her dust into burning sulfur;
- type: usfm
  marker: q2
  children:
  - type: text
    text: her land will become blazing pitch!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: It will not be quenched night or day;
- type: usfm
  marker: q2
  children:
  - type: text
    text: its smoke will rise forever.
- type: usfm
  marker: q1
  children:
  - type: text
    text: From generation to generation it will lie desolate;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no one will ever pass through it again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The desert owl
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The precise identification of these birds is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' and screech owl'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The precise identification of these birds is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' will possess it;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the great owl
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The precise identification of these birds is uncertain.
    marker-yv: yv-n
  - type: text
    text: ' and the raven will nest there.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: God will stretch out over Edom
- type: usfm
  marker: q2
  children:
  - type: text
    text: the measuring line of chaos
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the plumb line of desolation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Her nobles will have nothing there to be called a kingdom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: all her princes will vanish away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Thorns will overrun her citadels,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nettles and brambles her strongholds.
- type: usfm
  marker: q1
  children:
  - type: text
    text: She will become a haunt for jackals,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a home for owls.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Desert creatures will meet with hyenas,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wild goats will bleat to each other;
- type: usfm
  marker: q1
  children:
  - type: text
    text: there the night creatures will also lie down
- type: usfm
  marker: q2
  children:
  - type: text
    text: and find for themselves places of rest.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: The owl will nest there and lay eggs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: she will hatch them, and care for her young
- type: usfm
  marker: q2
  children:
  - type: text
    text: under the shadow of her wings;
- type: usfm
  marker: q1
  children:
  - type: text
    text: there also the falcons will gather,
- type: usfm
  marker: q2
  children:
  - type: text
    text: each with its mate.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Look in the scroll of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and read:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: None of these will be missing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not one will lack her mate.
- type: usfm
  marker: q1
  children:
  - type: text
    text: For it is his mouth that has given the order,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his Spirit will gather them together.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He allots their portions;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his hand distributes them by measure.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They will possess it forever
- type: usfm
  marker: q2
  children:
  - type: text
    text: and dwell there from generation to generation.
