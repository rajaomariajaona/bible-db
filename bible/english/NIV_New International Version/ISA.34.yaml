document_id: ISA.34,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment Against the Nations
  - type: text
    content: Come near, you nations, and listen;
  - type: text
    content: pay attention, you peoples!
  - type: text
    content: Let the earth hear, and all that is in it,
  - type: text
    content: the world, and all that comes out of it!
  '10':
  - type: text
    content: It will not be quenched night or day;
  - type: text
    content: its smoke will rise forever.
  - type: text
    content: From generation to generation it will lie desolate;
  - type: text
    content: no one will ever pass through it again.
  '11':
  - type: text
    content: The desert owl
  - type: note
    content: The precise identification of these birds is uncertain.
  - type: text
    content: ' and screech owl'
  - type: note
    content: The precise identification of these birds is uncertain.
  - type: text
    content: ' will possess it;'
  - type: text
    content: the great owl
  - type: note
    content: The precise identification of these birds is uncertain.
  - type: text
    content: ' and the raven will nest there.'
  - type: text
    content: God will stretch out over Edom
  - type: text
    content: the measuring line of chaos
  - type: text
    content: and the plumb line of desolation.
  '12':
  - type: text
    content: Her nobles will have nothing there to be called a kingdom,
  - type: text
    content: all her princes will vanish away.
  '13':
  - type: text
    content: Thorns will overrun her citadels,
  - type: text
    content: nettles and brambles her strongholds.
  - type: text
    content: She will become a haunt for jackals,
  - type: text
    content: a home for owls.
  '14':
  - type: text
    content: Desert creatures will meet with hyenas,
  - type: text
    content: and wild goats will bleat to each other;
  - type: text
    content: there the night creatures will also lie down
  - type: text
    content: and find for themselves places of rest.
  '15':
  - type: text
    content: The owl will nest there and lay eggs,
  - type: text
    content: she will hatch them, and care for her young
  - type: text
    content: under the shadow of her wings;
  - type: text
    content: there also the falcons will gather,
  - type: text
    content: each with its mate.
  '16':
  - type: text
    content: 'Look in the scroll of the '
  - type: text
    content: Lord
  - type: text
    content: ' and read:'
  - type: text
    content: None of these will be missing,
  - type: text
    content: not one will lack her mate.
  - type: text
    content: For it is his mouth that has given the order,
  - type: text
    content: and his Spirit will gather them together.
  '17':
  - type: text
    content: He allots their portions;
  - type: text
    content: his hand distributes them by measure.
  - type: text
    content: They will possess it forever
  - type: text
    content: and dwell there from generation to generation.
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is angry with all nations;'
  - type: text
    content: his wrath is on all their armies.
  - type: text
    content: He will totally destroy
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them; also in verse 5.
  - type: text
    content: ' them,'
  - type: text
    content: he will give them over to slaughter.
  '3':
  - type: text
    content: Their slain will be thrown out,
  - type: text
    content: their dead bodies will stink;
  - type: text
    content: the mountains will be soaked with their blood.
  '4':
  - type: text
    content: All the stars in the sky will be dissolved
  - type: text
    content: and the heavens rolled up like a scroll;
  - type: text
    content: all the starry host will fall
  - type: text
    content: like withered leaves from the vine,
  - type: text
    content: like shriveled figs from the fig tree.
  '5':
  - type: text
    content: My sword has drunk its fill in the heavens;
  - type: text
    content: see, it descends in judgment on Edom,
  - type: text
    content: the people I have totally destroyed.
  '6':
  - type: text
    content: 'The sword of the '
  - type: text
    content: Lord
  - type: text
    content: ' is bathed in blood,'
  - type: text
    content: it is covered with fat—
  - type: text
    content: the blood of lambs and goats,
  - type: text
    content: fat from the kidneys of rams.
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has a sacrifice in Bozrah'
  - type: text
    content: and a great slaughter in the land of Edom.
  '7':
  - type: text
    content: And the wild oxen will fall with them,
  - type: text
    content: the bull calves and the great bulls.
  - type: text
    content: Their land will be drenched with blood,
  - type: text
    content: and the dust will be soaked with fat.
  '8':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has a day of vengeance,'
  - type: text
    content: a year of retribution, to uphold Zion’s cause.
  '9':
  - type: text
    content: Edom’s streams will be turned into pitch,
  - type: text
    content: her dust into burning sulfur;
  - type: text
    content: her land will become blazing pitch!
