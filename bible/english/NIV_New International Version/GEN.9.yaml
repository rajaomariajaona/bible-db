document_id: GEN.9,111
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Covenant With Noah
  - type: text
    content: 'Then God blessed Noah and his sons, saying to them, “Be fruitful and increase in number and fill the earth. '
  '10':
  - type: text
    content: 'and with every living creature that was with you—the birds, the livestock and all the wild animals, all those that came out of the ark with you—every living creature on earth. '
  '11':
  - type: text
    content: 'I establish my covenant with you: Never again will all life be destroyed by the waters of a flood; never again will there be a flood to destroy the earth.”'
  '12':
  - type: text
    content: 'And God said, “This is the sign of the covenant I am making between me and you and every living creature with you, a covenant for all generations to come: '
  '13':
  - type: text
    content: 'I have set my rainbow in the clouds, and it will be the sign of the covenant between me and the earth. '
  '14':
  - type: text
    content: 'Whenever I bring clouds over the earth and the rainbow appears in the clouds, '
  '15':
  - type: text
    content: 'I will remember my covenant between me and you and all living creatures of every kind. Never again will the waters become a flood to destroy all life. '
  '16':
  - type: text
    content: Whenever the rainbow appears in the clouds, I will see it and remember the everlasting covenant between God and all living creatures of every kind on the earth.”
  '17':
  - type: text
    content: So God said to Noah, “This is the sign of the covenant I have established between me and all life on the earth.”
  - type: heading
    content: The Sons of Noah
  '18':
  - type: text
    content: 'The sons of Noah who came out of the ark were Shem, Ham and Japheth. (Ham was the father of Canaan.) '
  '19':
  - type: text
    content: These were the three sons of Noah, and from them came the people who were scattered over the whole earth.
  '2':
  - type: text
    content: 'The fear and dread of you will fall on all the beasts of the earth, and on all the birds in the sky, on every creature that moves along the ground, and on all the fish in the sea; they are given into your hands. '
  '20':
  - type: text
    content: Noah, a man of the soil, proceeded
  - type: note
    content: Or soil, was the first
  - type: text
    content: ' to plant a vineyard. '
  '21':
  - type: text
    content: 'When he drank some of its wine, he became drunk and lay uncovered inside his tent. '
  '22':
  - type: text
    content: 'Ham, the father of Canaan, saw his father naked and told his two brothers outside. '
  '23':
  - type: text
    content: But Shem and Japheth took a garment and laid it across their shoulders; then they walked in backward and covered their father’s naked body. Their faces were turned the other way so that they would not see their father naked.
  '24':
  - type: text
    content: 'When Noah awoke from his wine and found out what his youngest son had done to him, '
  '25':
  - type: text
    content: he said,
  - type: text
    content: “Cursed be Canaan!
  - type: text
    content: The lowest of slaves
  - type: text
    content: will he be to his brothers.”
  '26':
  - type: text
    content: He also said,
  - type: text
    content: '“Praise be to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Shem!'
  - type: text
    content: May Canaan be the slave of Shem.
  '27':
  - type: text
    content: May God extend Japheth’s
  - type: note
    content: Japheth sounds like the Hebrew for extend.
  - type: text
    content: ' territory;'
  - type: text
    content: may Japheth live in the tents of Shem,
  - type: text
    content: and may Canaan be the slave of Japheth.”
  '28':
  - type: text
    content: 'After the flood Noah lived 350 years. '
  '29':
  - type: text
    content: Noah lived a total of 950 years, and then he died.
  '3':
  - type: text
    content: Everything that lives and moves about will be food for you. Just as I gave you the green plants, I now give you everything.
  '4':
  - type: text
    content: '“But you must not eat meat that has its lifeblood still in it. '
  '5':
  - type: text
    content: And for your lifeblood I will surely demand an accounting. I will demand an accounting from every animal. And from each human being, too, I will demand an accounting for the life of another human being.
  '6':
  - type: text
    content: “Whoever sheds human blood,
  - type: text
    content: by humans shall their blood be shed;
  - type: text
    content: for in the image of God
  - type: text
    content: has God made mankind.
  '7':
  - type: text
    content: As for you, be fruitful and increase in number; multiply on the earth and increase upon it.”
  '8':
  - type: text
    content: 'Then God said to Noah and to his sons with him: '
  '9':
  - type: text
    content: '“I now establish my covenant with you and with your descendants after you '
