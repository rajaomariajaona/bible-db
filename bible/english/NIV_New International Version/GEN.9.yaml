document_id: GEN.9,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: God’s Covenant With Noah
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then God blessed Noah and his sons, saying to them, “Be fruitful and increase in number and fill the earth. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and with every living creature that was with you—the birds, the livestock and all the wild animals, all those that came out of the ark with you—every living creature on earth. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I establish my covenant with you: Never again will all life be destroyed by the waters of a flood; never again will there be a flood to destroy the earth.”'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And God said, “This is the sign of the covenant I am making between me and you and every living creature with you, a covenant for all generations to come: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I have set my rainbow in the clouds, and it will be the sign of the covenant between me and the earth. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whenever I bring clouds over the earth and the rainbow appears in the clouds, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will remember my covenant between me and you and all living creatures of every kind. Never again will the waters become a flood to destroy all life. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Whenever the rainbow appears in the clouds, I will see it and remember the everlasting covenant between God and all living creatures of every kind on the earth.”
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So God said to Noah, “This is the sign of the covenant I have established between me and all life on the earth.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Sons of Noah
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sons of Noah who came out of the ark were Shem, Ham and Japheth. (Ham was the father of Canaan.) '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These were the three sons of Noah, and from them came the people who were scattered over the whole earth.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The fear and dread of you will fall on all the beasts of the earth, and on all the birds in the sky, on every creature that moves along the ground, and on all the fish in the sea; they are given into your hands. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Noah, a man of the soil, proceeded
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: soil, was the first
      marker-yv: yv-n
    - type: text
      text: ' to plant a vineyard. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he drank some of its wine, he became drunk and lay uncovered inside his tent. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ham, the father of Canaan, saw his father naked and told his two brothers outside. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Shem and Japheth took a garment and laid it across their shoulders; then they walked in backward and covered their father’s naked body. Their faces were turned the other way so that they would not see their father naked.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Noah awoke from his wine and found out what his youngest son had done to him, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: he said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Cursed be Canaan!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: The lowest of slaves
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will he be to his brothers.”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He also said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Praise be to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Shem!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: May Canaan be the slave of Shem.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May God extend Japheth’s
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Japheth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sounds like the Hebrew for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: extend
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' territory;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may Japheth live in the tents of Shem,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and may Canaan be the slave of Japheth.”
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After the flood Noah lived 350 years. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Noah lived a total of 950 years, and then he died.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Everything that lives and moves about will be food for you. Just as I gave you the green plants, I now give you everything.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But you must not eat meat that has its lifeblood still in it. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And for your lifeblood I will surely demand an accounting. I will demand an accounting from every animal. And from each human being, too, I will demand an accounting for the life of another human being.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Whoever sheds human blood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by humans shall their blood be shed;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for in the image of God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has God made mankind.
  '7':
  - type: usfm
    marker: m
    children:
    - type: text
      text: As for you, be fruitful and increase in number; multiply on the earth and increase upon it.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then God said to Noah and to his sons with him: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I now establish my covenant with you and with your descendants after you '
