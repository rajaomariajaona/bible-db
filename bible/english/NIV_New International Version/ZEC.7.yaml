document_id: ZEC.7,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Justice and Mercy, Not Fasting
  - type: text
    content: 'In the fourth year of King Darius, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Zechariah on the fourth day of the ninth month, the month of Kislev. '
  '10':
  - type: text
    content: Do not oppress the widow or the fatherless, the foreigner or the poor. Do not plot evil against each other.’
  '11':
  - type: text
    content: '“But they refused to pay attention; stubbornly they turned their backs and covered their ears. '
  '12':
  - type: text
    content: 'They made their hearts as hard as flint and would not listen to the law or to the words that the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty had sent by his Spirit through the earlier prophets. So the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty was very angry.'
  '13':
  - type: text
    content: '“ ‘When I called, they did not listen; so when they called, I would not listen,’ says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty. '
  '14':
  - type: text
    content: ‘I scattered them with a whirlwind among all the nations, where they were strangers. The land they left behind them was so desolate that no one traveled through it. This is how they made the pleasant land desolate.’ ”
  '2':
  - type: text
    content: 'The people of Bethel had sent Sharezer and Regem-Melek, together with their men, to entreat the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'by asking the priests of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty and the prophets, “Should I mourn and fast in the fifth month, as I have done for so many years?”'
  '4':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty came to me: '
  '5':
  - type: text
    content: '“Ask all the people of the land and the priests, ‘When you fasted and mourned in the fifth and seventh months for the past seventy years, was it really for me that you fasted? '
  '6':
  - type: text
    content: 'And when you were eating and drinking, were you not just feasting for yourselves? '
  '7':
  - type: text
    content: 'Are these not the words the '
  - type: text
    content: Lord
  - type: text
    content: ' proclaimed through the earlier prophets when Jerusalem and its surrounding towns were at rest and prosperous, and the Negev and the western foothills were settled?’ ”'
  '8':
  - type: text
    content: 'And the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came again to Zechariah: '
  '9':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty said: ‘Administer true justice; show mercy and compassion to one another. '
