    children:
    - type: text
      text: Psalm 116
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I love the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', for he heard my voice;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he heard my cry for mercy.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I trusted in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' when I said,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I am greatly afflicted”;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in my alarm I said,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Everyone is a liar.”
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'What shall I return to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for all his goodness to me?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will lift up the cup of salvation
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and call on the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will fulfill my vows to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the presence of all his people.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Precious in the sight of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: is the death of his faithful servants.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Truly I am your servant, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I serve you just as my mother did;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have freed me from my chains.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will sacrifice a thank offering to you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and call on the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will fulfill my vows to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the presence of all his people,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'in the courts of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in your midst, Jerusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '116:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Hallelu Yah
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because he turned his ear to me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will call on him as long as I live.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The cords of death entangled me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the anguish of the grave came over me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I was overcome by distress and sorrow.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then I called on the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ':'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', save me!”'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is gracious and righteous;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: our God is full of compassion.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' protects the unwary;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when I was brought low, he saved me.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Return to your rest, my soul,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has been good to you.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', have delivered me from death,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my eyes from tears,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my feet from stumbling,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'that I may walk before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the land of the living.
