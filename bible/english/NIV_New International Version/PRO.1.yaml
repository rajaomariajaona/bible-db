document_id: PRO.1,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Purpose and Theme
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The proverbs of Solomon son of David, king of Israel:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: My son, if sinful men entice you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not give in to them.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: If they say, “Come along with us;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let’s lie in wait for innocent blood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let’s ambush some harmless soul;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: let’s swallow them alive, like the grave,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and whole, like those who go down to the pit;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: we will get all sorts of valuable things
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fill our houses with plunder;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: cast lots with us;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we will all share the loot”—
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: my son, do not go along with them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not set foot on their paths;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: for their feet rush into evil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are swift to shed blood.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: How useless to spread a net
  - type: usfm
    marker: q2
    children:
    - type: text
      text: where every bird can see it!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: These men lie in wait for their own blood;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they ambush only themselves!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Such are the paths of all who go after ill-gotten gain;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it takes away the life of those who get it.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Wisdom’s Rebuke
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: for gaining wisdom and instruction;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for understanding words of insight;
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Out in the open wisdom calls aloud,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: she raises her voice in the public square;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: on top of the wall
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: / at noisy street corners
      marker-yv: yv-n
    - type: text
      text: ' she cries out,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'at the city gate she makes her speech:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: “How long will you who are simple love your simple ways?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How long will mockers delight in mockery
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and fools hate knowledge?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Repent at my rebuke!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Then I will pour out my thoughts to you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will make known to you my teachings.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: But since you refuse to listen when I call
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one pays attention when I stretch out my hand,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: since you disregard all my advice
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and do not accept my rebuke,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: I in turn will laugh when disaster strikes you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will mock when calamity overtakes you—
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: when calamity overtakes you like a storm,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when disaster sweeps over you like a whirlwind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when distress and trouble overwhelm you.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: “Then they will call to me but I will not answer;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will look for me but will not find me,
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: since they hated knowledge
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and did not choose to fear the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: for receiving instruction in prudent behavior,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: doing what is right and just and fair;
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Since they would not accept my advice
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and spurned my rebuke,
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: they will eat the fruit of their ways
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and be filled with the fruit of their schemes.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: For the waywardness of the simple will kill them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the complacency of fools will destroy them;
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: but whoever listens to me will live in safety
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and be at ease, without fear of harm.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: for giving prudence to those who are simple,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew word rendered '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'simple '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: in Proverbs denotes a person who is gullible, without moral direction and inclined to evil.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: knowledge and discretion to the young—
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: let the wise listen and add to their learning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and let the discerning get guidance—
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: for understanding proverbs and parables,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the sayings and riddles of the wise.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: understanding a proverb, namely, a parable, / and the sayings of the wise, their riddles
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The fear of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is the beginning of knowledge,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but fools
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew words rendered '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fool '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: in Proverbs, and often elsewhere in the Old Testament, denote a person who is morally deficient.
      marker-yv: yv-n
    - type: text
      text: ' despise wisdom and instruction.'
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: 'Prologue: Exhortations to Embrace Wisdom'
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Warning Against the Invitation of Sinful Men
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Listen, my son, to your father’s instruction
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and do not forsake your mother’s teaching.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: They are a garland to grace your head
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and a chain to adorn your neck.
