document_id: PRO.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Purpose and Theme
  - type: text
    content: 'The proverbs of Solomon son of David, king of Israel:'
  '10':
  - type: text
    content: My son, if sinful men entice you,
  - type: text
    content: do not give in to them.
  '11':
  - type: text
    content: If they say, “Come along with us;
  - type: text
    content: let’s lie in wait for innocent blood,
  - type: text
    content: let’s ambush some harmless soul;
  '12':
  - type: text
    content: let’s swallow them alive, like the grave,
  - type: text
    content: and whole, like those who go down to the pit;
  '13':
  - type: text
    content: we will get all sorts of valuable things
  - type: text
    content: and fill our houses with plunder;
  '14':
  - type: text
    content: cast lots with us;
  - type: text
    content: we will all share the loot”—
  '15':
  - type: text
    content: my son, do not go along with them,
  - type: text
    content: do not set foot on their paths;
  '16':
  - type: text
    content: for their feet rush into evil,
  - type: text
    content: they are swift to shed blood.
  '17':
  - type: text
    content: How useless to spread a net
  - type: text
    content: where every bird can see it!
  '18':
  - type: text
    content: These men lie in wait for their own blood;
  - type: text
    content: they ambush only themselves!
  '19':
  - type: text
    content: Such are the paths of all who go after ill-gotten gain;
  - type: text
    content: it takes away the life of those who get it.
  - type: heading
    content: Wisdom’s Rebuke
  '2':
  - type: text
    content: for gaining wisdom and instruction;
  - type: text
    content: for understanding words of insight;
  '20':
  - type: text
    content: Out in the open wisdom calls aloud,
  - type: text
    content: she raises her voice in the public square;
  '21':
  - type: text
    content: on top of the wall
  - type: note
    content: Septuagint; Hebrew / at noisy street corners
  - type: text
    content: ' she cries out,'
  - type: text
    content: 'at the city gate she makes her speech:'
  '22':
  - type: text
    content: “How long will you who are simple love your simple ways?
  - type: text
    content: How long will mockers delight in mockery
  - type: text
    content: and fools hate knowledge?
  '23':
  - type: text
    content: Repent at my rebuke!
  - type: text
    content: Then I will pour out my thoughts to you,
  - type: text
    content: I will make known to you my teachings.
  '24':
  - type: text
    content: But since you refuse to listen when I call
  - type: text
    content: and no one pays attention when I stretch out my hand,
  '25':
  - type: text
    content: since you disregard all my advice
  - type: text
    content: and do not accept my rebuke,
  '26':
  - type: text
    content: I in turn will laugh when disaster strikes you;
  - type: text
    content: I will mock when calamity overtakes you—
  '27':
  - type: text
    content: when calamity overtakes you like a storm,
  - type: text
    content: when disaster sweeps over you like a whirlwind,
  - type: text
    content: when distress and trouble overwhelm you.
  '28':
  - type: text
    content: “Then they will call to me but I will not answer;
  - type: text
    content: they will look for me but will not find me,
  '29':
  - type: text
    content: since they hated knowledge
  - type: text
    content: 'and did not choose to fear the '
  - type: text
    content: Lord
  - type: text
    content: .
  '3':
  - type: text
    content: for receiving instruction in prudent behavior,
  - type: text
    content: doing what is right and just and fair;
  '30':
  - type: text
    content: Since they would not accept my advice
  - type: text
    content: and spurned my rebuke,
  '31':
  - type: text
    content: they will eat the fruit of their ways
  - type: text
    content: and be filled with the fruit of their schemes.
  '32':
  - type: text
    content: For the waywardness of the simple will kill them,
  - type: text
    content: and the complacency of fools will destroy them;
  '33':
  - type: text
    content: but whoever listens to me will live in safety
  - type: text
    content: and be at ease, without fear of harm.”
  '4':
  - type: text
    content: for giving prudence to those who are simple,
  - type: note
    content: The Hebrew word rendered simple in Proverbs denotes a person who is gullible, without moral direction and inclined to evil.
  - type: text
    content: knowledge and discretion to the young—
  '5':
  - type: text
    content: let the wise listen and add to their learning,
  - type: text
    content: and let the discerning get guidance—
  '6':
  - type: text
    content: for understanding proverbs and parables,
  - type: text
    content: the sayings and riddles of the wise.
  - type: note
    content: Or understanding a proverb, namely, a parable, / and the sayings of the wise, their riddles
  '7':
  - type: text
    content: 'The fear of the '
  - type: text
    content: Lord
  - type: text
    content: ' is the beginning of knowledge,'
  - type: text
    content: but fools
  - type: note
    content: The Hebrew words rendered fool in Proverbs, and often elsewhere in the Old Testament, denote a person who is morally deficient.
  - type: text
    content: ' despise wisdom and instruction.'
  - type: heading
    content: 'Prologue: Exhortations to Embrace Wisdom'
  - type: heading
    content: Warning Against the Invitation of Sinful Men
  '8':
  - type: text
    content: Listen, my son, to your father’s instruction
  - type: text
    content: and do not forsake your mother’s teaching.
  '9':
  - type: text
    content: They are a garland to grace your head
  - type: text
    content: and a chain to adorn your neck.
