verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Cupbearer and the Baker
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Some time later, the cupbearer and the baker of the king of Egypt offended their master, the king of Egypt. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and on the vine were three branches. As soon as it budded, it blossomed, and its clusters ripened into grapes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pharaoh’s cup was in my hand, and I took the grapes, squeezed them into Pharaoh’s cup and put the cup in his hand.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what it means,” Joseph said to him. “The three branches are three days. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Within three days Pharaoh will lift up your head and restore you to your position, and you will put Pharaoh’s cup in his hand, just as you used to do when you were his cupbearer. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when all goes well with you, remember me and show me kindness; mention me to Pharaoh and get me out of this prison. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I was forcibly carried off from the land of the Hebrews, and even here I have done nothing to deserve being put in a dungeon.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the chief baker saw that Joseph had given a favorable interpretation, he said to Joseph, “I too had a dream: On my head were three baskets of bread.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: three wicker baskets
      marker-yv: yv-n
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the top basket were all kinds of baked goods for Pharaoh, but the birds were eating them out of the basket on my head.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what it means,” Joseph said. “The three baskets are three days. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Within three days Pharaoh will lift off your head and impale your body on a pole. And the birds will eat away your flesh.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pharaoh was angry with his two officials, the chief cupbearer and the chief baker, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the third day was Pharaoh’s birthday, and he gave a feast for all his officials. He lifted up the heads of the chief cupbearer and the chief baker in the presence of his officials: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He restored the chief cupbearer to his position, so that he once again put the cup into Pharaoh’s hand— '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but he impaled the chief baker, just as Joseph had said to them in his interpretation.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The chief cupbearer, however, did not remember Joseph; he forgot him.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and put them in custody in the house of the captain of the guard, in the same prison where Joseph was confined. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The captain of the guard assigned them to Joseph, and he attended them.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After they had been in custody for some time, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: each of the two men—the cupbearer and the baker of the king of Egypt, who were being held in prison—had a dream the same night, and each dream had a meaning of its own.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Joseph came to them the next morning, he saw that they were dejected. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he asked Pharaoh’s officials who were in custody with him in his master’s house, “Why do you look so sad today?”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “We both had dreams,” they answered, “but there is no one to interpret them.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Joseph said to them, “Do not interpretations belong to God? Tell me your dreams.”
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the chief cupbearer told Joseph his dream. He said to him, “In my dream I saw a vine in front of me, '
