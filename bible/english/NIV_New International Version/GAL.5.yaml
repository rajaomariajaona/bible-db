document_id: GAL.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Freedom in Christ
  - type: text
    content: It is for freedom that Christ has set us free. Stand firm, then, and do not let yourselves be burdened again by a yoke of slavery.
  '10':
  - type: text
    content: 'I am confident in the Lord that you will take no other view. The one who is throwing you into confusion, whoever that may be, will have to pay the penalty. '
  '11':
  - type: text
    content: 'Brothers and sisters, if I am still preaching circumcision, why am I still being persecuted? In that case the offense of the cross has been abolished. '
  '12':
  - type: text
    content: As for those agitators, I wish they would go the whole way and emasculate themselves!
  - type: heading
    content: Life by the Spirit
  '13':
  - type: text
    content: You, my brothers and sisters, were called to be free. But do not use your freedom to indulge the flesh
  - type: note
    content: In contexts like this, the Greek word for flesh (sarx) refers to the sinful state of human beings, often presented as a power in opposition to the Spirit; also in verses 16, 17, 19 and 24; and in 6:8.
  - type: text
    content: '; rather, serve one another humbly in love. '
  '14':
  - type: text
    content: 'For the entire law is fulfilled in keeping this one command: “Love your neighbor as yourself.”'
  - type: note
    content: Lev. 19:18
  - type: text
    content: ' '
  '15':
  - type: text
    content: If you bite and devour each other, watch out or you will be destroyed by each other.
  '16':
  - type: text
    content: 'So I say, walk by the Spirit, and you will not gratify the desires of the flesh. '
  '17':
  - type: text
    content: For the flesh desires what is contrary to the Spirit, and the Spirit what is contrary to the flesh. They are in conflict with each other, so that you are not to do whatever
  - type: note
    content: Or you do not do what
  - type: text
    content: ' you want. '
  '18':
  - type: text
    content: But if you are led by the Spirit, you are not under the law.
  '19':
  - type: text
    content: 'The acts of the flesh are obvious: sexual immorality, impurity and debauchery; '
  '2':
  - type: text
    content: 'Mark my words! I, Paul, tell you that if you let yourselves be circumcised, Christ will be of no value to you at all. '
  '20':
  - type: text
    content: 'idolatry and witchcraft; hatred, discord, jealousy, fits of rage, selfish ambition, dissensions, factions '
  '21':
  - type: text
    content: and envy; drunkenness, orgies, and the like. I warn you, as I did before, that those who live like this will not inherit the kingdom of God.
  '22':
  - type: text
    content: 'But the fruit of the Spirit is love, joy, peace, forbearance, kindness, goodness, faithfulness, '
  '23':
  - type: text
    content: 'gentleness and self-control. Against such things there is no law. '
  '24':
  - type: text
    content: 'Those who belong to Christ Jesus have crucified the flesh with its passions and desires. '
  '25':
  - type: text
    content: 'Since we live by the Spirit, let us keep in step with the Spirit. '
  '26':
  - type: text
    content: Let us not become conceited, provoking and envying each other.
  '3':
  - type: text
    content: 'Again I declare to every man who lets himself be circumcised that he is obligated to obey the whole law. '
  '4':
  - type: text
    content: 'You who are trying to be justified by the law have been alienated from Christ; you have fallen away from grace. '
  '5':
  - type: text
    content: 'For through the Spirit we eagerly await by faith the righteousness for which we hope. '
  '6':
  - type: text
    content: For in Christ Jesus neither circumcision nor uncircumcision has any value. The only thing that counts is faith expressing itself through love.
  '7':
  - type: text
    content: 'You were running a good race. Who cut in on you to keep you from obeying the truth? '
  '8':
  - type: text
    content: 'That kind of persuasion does not come from the one who calls you. '
  '9':
  - type: text
    content: '“A little yeast works through the whole batch of dough.” '
