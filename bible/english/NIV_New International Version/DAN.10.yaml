document_id: DAN.10,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Daniel’s Vision of a Man
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: In the third year of Cyrus king of Persia, a revelation was given to Daniel (who was called Belteshazzar). Its message was true and it concerned a great war.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: true and burdensome
      marker-yv: yv-n
    - type: text
      text: ' The understanding of the message came to him in a vision.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A hand touched me and set me trembling on my hands and knees. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said, “Daniel, you who are highly esteemed, consider carefully the words I am about to speak to you, and stand up, for I have now been sent to you.” And when he said this to me, I stood up trembling.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he continued, “Do not be afraid, Daniel. Since the first day that you set your mind to gain understanding and to humble yourself before your God, your words were heard, and I have come in response to them. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the prince of the Persian kingdom resisted me twenty-one days. Then Michael, one of the chief princes, came to help me, because I was detained there with the king of Persia. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now I have come to explain to you what will happen to your people in the future, for the vision concerns a time yet to come.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While he was saying this to me, I bowed with my face toward the ground and was speechless. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then one who looked like a man
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Most manuscripts of the Masoretic Text; one manuscript of the Masoretic Text, Dead Sea Scrolls and Septuagint '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Then something that looked like a human hand
      marker-yv: yv-n
    - type: text
      text: ' touched my lips, and I opened my mouth and began to speak. I said to the one standing before me, “I am overcome with anguish because of the vision, my lord, and I feel very weak. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: How can I, your servant, talk with you, my lord? My strength is gone and I can hardly breathe.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Again the one who looked like a man touched me and gave me strength. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Do not be afraid, you who are highly esteemed,” he said. “Peace! Be strong now; be strong.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: When he spoke to me, I was strengthened and said, “Speak, my lord, since you have given me strength.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time I, Daniel, mourned for three weeks. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he said, “Do you know why I have come to you? Soon I will return to fight against the prince of Persia, and when I go, the prince of Greece will come; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but first I will tell you what is written in the Book of Truth. (No one supports me against them except Michael, your prince.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I ate no choice food; no meat or wine touched my lips; and I used no lotions at all until the three weeks were over.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the twenty-fourth day of the first month, as I was standing on the bank of the great river, the Tigris, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I looked up and there before me was a man dressed in linen, with a belt of fine gold from Uphaz around his waist. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: His body was like topaz, his face like lightning, his eyes like flaming torches, his arms and legs like the gleam of burnished bronze, and his voice like the sound of a multitude.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I, Daniel, was the only one who saw the vision; those who were with me did not see it, but such terror overwhelmed them that they fled and hid themselves. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I was left alone, gazing at this great vision; I had no strength left, my face turned deathly pale and I was helpless. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I heard him speaking, and as I listened to him, I fell into a deep sleep, my face to the ground.
