document_id: 2KI.10
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ahab’s Family Killed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now there were in Samaria seventy sons of the house of Ahab. So Jehu wrote letters and sent them to Samaria: to the officials of Jezreel,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew; some Septuagint manuscripts and Vulgate '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: of the city
    marker-yv: yv-n
  - type: text
    text: ' to the elders and to the guardians of Ahab’s children. He said, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“You have your master’s sons with you and you have chariots and horses, a fortified city and weapons. Now as soon as this letter reaches you, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: choose the best and most worthy of your master’s sons and set him on his father’s throne. Then fight for your master’s house.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: But they were terrified and said, “If two kings could not resist him, how can we?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'So the palace administrator, the city governor, the elders and the guardians sent this message to Jehu: “We are your servants and we will do anything you say. We will not appoint anyone as king; you do whatever you think best.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Then Jehu wrote them a second letter, saying, “If you are on my side and will obey me, take the heads of your master’s sons and come to me in Jezreel by this time tomorrow.”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Now the royal princes, seventy of them, were with the leading men of the city, who were rearing them. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'When the letter arrived, these men took the princes and slaughtered all seventy of them. They put their heads in baskets and sent them to Jehu in Jezreel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: When the messenger arrived, he told Jehu, “They have brought the heads of the princes.”
- type: usfm
  marker: p
  children:
  - type: text
    text: Then Jehu ordered, “Put them in two piles at the entrance of the city gate until morning.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The next morning Jehu went out. He stood before all the people and said, “You are innocent. It was I who conspired against my master and killed him, but who killed all these? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Know, then, that not a word the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has spoken against the house of Ahab will fail. The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has done what he announced through his servant Elijah.” '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: So Jehu killed everyone in Jezreel who remained of the house of Ahab, as well as all his chief men, his close friends and his priests, leaving him no survivor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jehu then set out and went toward Samaria. At Beth Eked of the Shepherds, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: he met some relatives of Ahaziah king of Judah and asked, “Who are you?”
- type: usfm
  marker: p
  children:
  - type: text
    text: They said, “We are relatives of Ahaziah, and we have come down to greet the families of the king and of the queen mother.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “Take them alive!” he ordered. So they took them alive and slaughtered them by the well of Beth Eked—forty-two of them. He left no survivor.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: After he left there, he came upon Jehonadab son of Rekab, who was on his way to meet him. Jehu greeted him and said, “Are you in accord with me, as I am with you?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “I am,” Jehonadab answered.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“If so,” said Jehu, “give me your hand.” So he did, and Jehu helped him up into the chariot. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jehu said, “Come with me and see my zeal for the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .” Then he had him ride along in his chariot.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'When Jehu came to Samaria, he killed all who were left there of Ahab’s family; he destroyed them, according to the word of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoken to Elijah.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Servants of Baal Killed
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then Jehu brought all the people together and said to them, “Ahab served Baal a little; Jehu will serve him much. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Now summon all the prophets of Baal, all his servants and all his priests. See that no one is missing, because I am going to hold a great sacrifice for Baal. Anyone who fails to come will no longer live.” But Jehu was acting deceptively in order to destroy the servants of Baal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jehu said, “Call an assembly in honor of Baal.” So they proclaimed it. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Then he sent word throughout Israel, and all the servants of Baal came; not one stayed away. They crowded into the temple of Baal until it was full from one end to the other. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: And Jehu said to the keeper of the wardrobe, “Bring robes for all the servants of Baal.” So he brought out robes for them.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then Jehu and Jehonadab son of Rekab went into the temple of Baal. Jehu said to the servants of Baal, “Look around and see that no one who serves the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is here with you—only servants of Baal.” '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'So they went in to make sacrifices and burnt offerings. Now Jehu had posted eighty men outside with this warning: “If one of you lets any of the men I am placing in your hands escape, it will be your life for his life.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'As soon as Jehu had finished making the burnt offering, he ordered the guards and officers: “Go in and kill them; let no one escape.” So they cut them down with the sword. The guards and officers threw the bodies out and then entered the inner shrine of the temple of Baal. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'They brought the sacred stone out of the temple of Baal and burned it. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: They demolished the sacred stone of Baal and tore down the temple of Baal, and people have used it for a latrine to this day.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So Jehu destroyed Baal worship in Israel. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: However, he did not turn away from the sins of Jeroboam son of Nebat, which he had caused Israel to commit—the worship of the golden calves at Bethel and Dan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Jehu, “Because you have done well in accomplishing what is right in my eyes and have done to the house of Ahab all I had in mind to do, your descendants will sit on the throne of Israel to the fourth generation.” '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Yet Jehu was not careful to keep the law of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, with all his heart. He did not turn away from the sins of Jeroboam, which he had caused Israel to commit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'In those days the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' began to reduce the size of Israel. Hazael overpowered the Israelites throughout their territory '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: east of the Jordan in all the land of Gilead (the region of Gad, Reuben and Manasseh), from Aroer by the Arnon Gorge through Gilead to Bashan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: As for the other events of Jehu’s reign, all he did, and all his achievements, are they not written in the book of the annals of the kings of Israel?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jehu rested with his ancestors and was buried in Samaria. And Jehoahaz his son succeeded him as king. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: The time that Jehu reigned over Israel in Samaria was twenty-eight years.
