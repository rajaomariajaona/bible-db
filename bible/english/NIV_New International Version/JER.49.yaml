document_id: JER.49,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message About Ammon
  - type: text
    content: 'Concerning the Ammonites:'
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Has Israel no sons?
  - type: text
    content: Has Israel no heir?
  - type: text
    content: Why then has Molek
  - type: note
    content: Or their king; also in verse 3
  - type: text
    content: ' taken possession of Gad?'
  - type: text
    content: Why do his people live in its towns?
  '10':
  - type: text
    content: But I will strip Esau bare;
  - type: text
    content: I will uncover his hiding places,
  - type: text
    content: so that he cannot conceal himself.
  - type: text
    content: His armed men are destroyed,
  - type: text
    content: also his allies and neighbors,
  - type: text
    content: so there is no one to say,
  '11':
  - type: text
    content: ‘Leave your fatherless children; I will keep them alive.
  - type: text
    content: Your widows too can depend on me.’ ”
  '12':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: “If those who do not deserve to drink the cup must drink it, why should you go unpunished? You will not go unpunished, but must drink it. '
  '13':
  - type: text
    content: 'I swear by myself,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “that Bozrah will become a ruin and a curse,'
  - type: note
    content: That is, its name will be used in cursing (see 29:22); or, others will see that it is cursed.
  - type: text
    content: ' an object of horror and reproach; and all its towns will be in ruins forever.”'
  '14':
  - type: text
    content: 'I have heard a message from the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: an envoy was sent to the nations to say,
  - type: text
    content: “Assemble yourselves to attack it!
  - type: text
    content: Rise up for battle!”
  '15':
  - type: text
    content: “Now I will make you small among the nations,
  - type: text
    content: despised by mankind.
  '16':
  - type: text
    content: The terror you inspire
  - type: text
    content: and the pride of your heart have deceived you,
  - type: text
    content: you who live in the clefts of the rocks,
  - type: text
    content: who occupy the heights of the hill.
  - type: text
    content: Though you build your nest as high as the eagle’s,
  - type: text
    content: from there I will bring you down,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '17':
  - type: text
    content: “Edom will become an object of horror;
  - type: text
    content: all who pass by will be appalled and will scoff
  - type: text
    content: because of all its wounds.
  '18':
  - type: text
    content: As Sodom and Gomorrah were overthrown,
  - type: text
    content: along with their neighboring towns,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “so no one will live there;
  - type: text
    content: no people will dwell in it.
  '19':
  - type: text
    content: “Like a lion coming up from Jordan’s thickets
  - type: text
    content: to a rich pastureland,
  - type: text
    content: I will chase Edom from its land in an instant.
  - type: text
    content: Who is the chosen one I will appoint for this?
  - type: text
    content: Who is like me and who can challenge me?
  - type: text
    content: And what shepherd can stand against me?”
  '2':
  - type: text
    content: But the days are coming,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “when I will sound the battle cry
  - type: text
    content: against Rabbah of the Ammonites;
  - type: text
    content: it will become a mound of ruins,
  - type: text
    content: and its surrounding villages will be set on fire.
  - type: text
    content: Then Israel will drive out
  - type: text
    content: those who drove her out,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  '20':
  - type: text
    content: 'Therefore, hear what the '
  - type: text
    content: Lord
  - type: text
    content: ' has planned against Edom,'
  - type: text
    content: 'what he has purposed against those who live in Teman:'
  - type: text
    content: The young of the flock will be dragged away;
  - type: text
    content: their pasture will be appalled at their fate.
  '21':
  - type: text
    content: At the sound of their fall the earth will tremble;
  - type: text
    content: their cry will resound to the Red Sea.
  - type: note
    content: Or the Sea of Reeds
  '22':
  - type: text
    content: Look! An eagle will soar and swoop down,
  - type: text
    content: spreading its wings over Bozrah.
  - type: text
    content: In that day the hearts of Edom’s warriors
  - type: text
    content: will be like the heart of a woman in labor.
  - type: heading
    content: A Message About Damascus
  '23':
  - type: text
    content: 'Concerning Damascus:'
  - type: text
    content: “Hamath and Arpad are dismayed,
  - type: text
    content: for they have heard bad news.
  - type: text
    content: They are disheartened,
  - type: text
    content: troubled like
  - type: note
    content: Hebrew on or by
  - type: text
    content: ' the restless sea.'
  '24':
  - type: text
    content: Damascus has become feeble,
  - type: text
    content: she has turned to flee
  - type: text
    content: and panic has gripped her;
  - type: text
    content: anguish and pain have seized her,
  - type: text
    content: pain like that of a woman in labor.
  '25':
  - type: text
    content: Why has the city of renown not been abandoned,
  - type: text
    content: the town in which I delight?
  '26':
  - type: text
    content: Surely, her young men will fall in the streets;
  - type: text
    content: all her soldiers will be silenced in that day,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  '27':
  - type: text
    content: “I will set fire to the walls of Damascus;
  - type: text
    content: it will consume the fortresses of Ben-Hadad.”
  - type: heading
    content: A Message About Kedar and Hazor
  '28':
  - type: text
    content: 'Concerning Kedar and the kingdoms of Hazor, which Nebuchadnezzar king of Babylon attacked:'
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Arise, and attack Kedar
  - type: text
    content: and destroy the people of the East.
  '29':
  - type: text
    content: Their tents and their flocks will be taken;
  - type: text
    content: their shelters will be carried off
  - type: text
    content: with all their goods and camels.
  - type: text
    content: People will shout to them,
  - type: text
    content: ‘Terror on every side!’
  '3':
  - type: text
    content: “Wail, Heshbon, for Ai is destroyed!
  - type: text
    content: Cry out, you inhabitants of Rabbah!
  - type: text
    content: Put on sackcloth and mourn;
  - type: text
    content: rush here and there inside the walls,
  - type: text
    content: for Molek will go into exile,
  - type: text
    content: together with his priests and officials.
  '30':
  - type: text
    content: “Flee quickly away!
  - type: text
    content: Stay in deep caves, you who live in Hazor,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Nebuchadnezzar king of Babylon has plotted against you;
  - type: text
    content: he has devised a plan against you.
  '31':
  - type: text
    content: “Arise and attack a nation at ease,
  - type: text
    content: which lives in confidence,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “a nation that has neither gates nor bars;
  - type: text
    content: its people live far from danger.
  '32':
  - type: text
    content: Their camels will become plunder,
  - type: text
    content: and their large herds will be spoils of war.
  - type: text
    content: I will scatter to the winds those who are in distant places
  - type: note
    content: Or who clip the hair by their foreheads
  - type: text
    content: and will bring disaster on them from every side,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '33':
  - type: text
    content: “Hazor will become a haunt of jackals,
  - type: text
    content: a desolate place forever.
  - type: text
    content: No one will live there;
  - type: text
    content: no people will dwell in it.”
  - type: heading
    content: A Message About Elam
  '34':
  - type: text
    content: 'This is the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' that came to Jeremiah the prophet concerning Elam, early in the reign of Zedekiah king of Judah:'
  '35':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says:'
  - type: text
    content: “See, I will break the bow of Elam,
  - type: text
    content: the mainstay of their might.
  '36':
  - type: text
    content: I will bring against Elam the four winds
  - type: text
    content: from the four quarters of heaven;
  - type: text
    content: I will scatter them to the four winds,
  - type: text
    content: and there will not be a nation
  - type: text
    content: where Elam’s exiles do not go.
  '37':
  - type: text
    content: I will shatter Elam before their foes,
  - type: text
    content: before those who want to kill them;
  - type: text
    content: I will bring disaster on them,
  - type: text
    content: even my fierce anger,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “I will pursue them with the sword
  - type: text
    content: until I have made an end of them.
  '38':
  - type: text
    content: I will set my throne in Elam
  - type: text
    content: and destroy her king and officials,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '39':
  - type: text
    content: “Yet I will restore the fortunes of Elam
  - type: text
    content: in days to come,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: Why do you boast of your valleys,
  - type: text
    content: boast of your valleys so fruitful?
  - type: text
    content: Unfaithful Daughter Ammon,
  - type: text
    content: you trust in your riches and say,
  - type: text
    content: ‘Who will attack me?’
  '5':
  - type: text
    content: I will bring terror on you
  - type: text
    content: from all those around you,”
  - type: text
    content: 'declares the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  - type: text
    content: “Every one of you will be driven away,
  - type: text
    content: and no one will gather the fugitives.
  '6':
  - type: text
    content: “Yet afterward, I will restore the fortunes of the Ammonites,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: A Message About Edom
  '7':
  - type: text
    content: 'Concerning Edom:'
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says:'
  - type: text
    content: “Is there no longer wisdom in Teman?
  - type: text
    content: Has counsel perished from the prudent?
  - type: text
    content: Has their wisdom decayed?
  '8':
  - type: text
    content: Turn and flee, hide in deep caves,
  - type: text
    content: you who live in Dedan,
  - type: text
    content: for I will bring disaster on Esau
  - type: text
    content: at the time when I punish him.
  '9':
  - type: text
    content: If grape pickers came to you,
  - type: text
    content: would they not leave a few grapes?
  - type: text
    content: If thieves came during the night,
  - type: text
    content: would they not steal only as much as they wanted?
