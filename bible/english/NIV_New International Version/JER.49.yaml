  children:
  - type: text
    text: A Message About Ammon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Concerning the Ammonites:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Has Israel no sons?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Has Israel no heir?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Why then has Molek
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: their king
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verse 3
    marker-yv: yv-n
  - type: text
    text: ' taken possession of Gad?'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why do his people live in its towns?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: But the days are coming,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “when I will sound the battle cry
- type: usfm
  marker: q2
  children:
  - type: text
    text: against Rabbah of the Ammonites;
- type: usfm
  marker: q1
  children:
  - type: text
    text: it will become a mound of ruins,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and its surrounding villages will be set on fire.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then Israel will drive out
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who drove her out,”
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Wail, Heshbon, for Ai is destroyed!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Cry out, you inhabitants of Rabbah!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Put on sackcloth and mourn;
- type: usfm
  marker: q2
  children:
  - type: text
    text: rush here and there inside the walls,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for Molek will go into exile,
- type: usfm
  marker: q2
  children:
  - type: text
    text: together with his priests and officials.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Why do you boast of your valleys,
- type: usfm
  marker: q2
  children:
  - type: text
    text: boast of your valleys so fruitful?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Unfaithful Daughter Ammon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you trust in your riches and say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Who will attack me?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I will bring terror on you
- type: usfm
  marker: q2
  children:
  - type: text
    text: from all those around you,”
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'declares the Lord, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Every one of you will be driven away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and no one will gather the fugitives.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Yet afterward, I will restore the fortunes of the Ammonites,”
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message About Edom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Concerning Edom:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Is there no longer wisdom in Teman?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Has counsel perished from the prudent?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Has their wisdom decayed?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Turn and flee, hide in deep caves,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who live in Dedan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: for I will bring disaster on Esau
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the time when I punish him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: If grape pickers came to you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: would they not leave a few grapes?
- type: usfm
  marker: q1
  children:
  - type: text
    text: If thieves came during the night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: would they not steal only as much as they wanted?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: But I will strip Esau bare;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will uncover his hiding places,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that he cannot conceal himself.
- type: usfm
  marker: q1
  children:
  - type: text
    text: His armed men are destroyed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: also his allies and neighbors,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so there is no one to say,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ‘Leave your fatherless children; I will keep them alive.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Your widows too can depend on me.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: “If those who do not deserve to drink the cup must drink it, why should you go unpunished? You will not go unpunished, but must drink it. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I swear by myself,” declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “that Bozrah will become a ruin and a curse,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, its name will be used in cursing (see 29:22); or, others will see that it is cursed.
    marker-yv: yv-n
  - type: text
    text: ' an object of horror and reproach; and all its towns will be in ruins forever.”'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'I have heard a message from the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: an envoy was sent to the nations to say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Assemble yourselves to attack it!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Rise up for battle!”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “Now I will make you small among the nations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: despised by mankind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The terror you inspire
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the pride of your heart have deceived you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: you who live in the clefts of the rocks,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who occupy the heights of the hill.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Though you build your nest as high as the eagle’s,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from there I will bring you down,”
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “Edom will become an object of horror;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all who pass by will be appalled and will scoff
- type: usfm
  marker: q2
  children:
  - type: text
    text: because of all its wounds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: As Sodom and Gomorrah were overthrown,
- type: usfm
  marker: q2
  children:
  - type: text
    text: along with their neighboring towns,”
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: “so no one will live there;
- type: usfm
  marker: q2
  children:
  - type: text
    text: no people will dwell in it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Like a lion coming up from Jordan’s thickets
- type: usfm
  marker: q2
  children:
  - type: text
    text: to a rich pastureland,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will chase Edom from its land in an instant.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who is the chosen one I will appoint for this?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Who is like me and who can challenge me?
- type: usfm
  marker: q2
  children:
  - type: text
    text: And what shepherd can stand against me?”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Therefore, hear what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has planned against Edom,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'what he has purposed against those who live in Teman:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: The young of the flock will be dragged away;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their pasture will be appalled at their fate.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: At the sound of their fall the earth will tremble;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their cry will resound to the Red Sea.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the Sea of Reeds
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Look! An eagle will soar and swoop down,
- type: usfm
  marker: q2
  children:
  - type: text
    text: spreading its wings over Bozrah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: In that day the hearts of Edom’s warriors
- type: usfm
  marker: q2
  children:
  - type: text
    text: will be like the heart of a woman in labor.
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message About Damascus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Concerning Damascus:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Hamath and Arpad are dismayed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for they have heard bad news.
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are disheartened,
- type: usfm
  marker: q2
  children:
  - type: text
    text: troubled like
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'on '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: by
    marker-yv: yv-n
  - type: text
    text: ' the restless sea.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Damascus has become feeble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: she has turned to flee
- type: usfm
  marker: q2
  children:
  - type: text
    text: and panic has gripped her;
- type: usfm
  marker: q1
  children:
  - type: text
    text: anguish and pain have seized her,
- type: usfm
  marker: q2
  children:
  - type: text
    text: pain like that of a woman in labor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Why has the city of renown not been abandoned,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the town in which I delight?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Surely, her young men will fall in the streets;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all her soldiers will be silenced in that day,”
- type: usfm
  marker: q4
  children:
  - type: text
    text: 'declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “I will set fire to the walls of Damascus;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will consume the fortresses of Ben-Hadad.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Message About Kedar and Hazor
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Concerning Kedar and the kingdoms of Hazor, which Nebuchadnezzar king of Babylon attacked:'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Arise, and attack Kedar
- type: usfm
  marker: q2
  children:
  - type: text
    text: and destroy the people of the East.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Their tents and their flocks will be taken;
- type: usfm
  marker: q2
  children:
  - type: text
    text: their shelters will be carried off
- type: usfm
  marker: q2
  children:
  - type: text
    text: with all their goods and camels.
- type: usfm
  marker: q1
  children:
  - type: text
    text: People will shout to them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Terror on every side!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
