document_id: REV.21,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A New Heaven and a New Earth
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I saw “a new heaven and a new earth,”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 65:17
      marker-yv: yv-n
    - type: text
      text: ' for the first heaven and the first earth had passed away, and there was no longer any sea. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he carried me away in the Spirit to a mountain great and high, and showed me the Holy City, Jerusalem, coming down out of heaven from God. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It shone with the glory of God, and its brilliance was like that of a very precious jewel, like a jasper, clear as crystal. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It had a great, high wall with twelve gates, and with twelve angels at the gates. On the gates were written the names of the twelve tribes of Israel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There were three gates on the east, three on the north, three on the south and three on the west. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The wall of the city had twelve foundations, and on them were the names of the twelve apostles of the Lamb.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The angel who talked with me had a measuring rod of gold to measure the city, its gates and its walls. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The city was laid out like a square, as long as it was wide. He measured the city with the rod and found it to be 12,000 stadia
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 1,400 miles or about 2,200 kilometers
      marker-yv: yv-n
    - type: text
      text: ' in length, and as wide and high as it is long. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The angel measured the wall using human measurement, and it was 144 cubits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 200 feet or about 65 meters
      marker-yv: yv-n
    - type: text
      text: ' thick.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: high
      marker-yv: yv-n
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The wall was made of jasper, and the city of pure gold, as pure as glass. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The foundations of the city walls were decorated with every kind of precious stone. The first foundation was jasper, the second sapphire, the third agate, the fourth emerald, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I saw the Holy City, the new Jerusalem, coming down out of heaven from God, prepared as a bride beautifully dressed for her husband. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: the fifth onyx, the sixth ruby, the seventh chrysolite, the eighth beryl, the ninth topaz, the tenth turquoise, the eleventh jacinth, and the twelfth amethyst.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The precise identification of some of these precious stones is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The twelve gates were twelve pearls, each gate made of a single pearl. The great street of the city was of gold, as pure as transparent glass.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I did not see a temple in the city, because the Lord God Almighty and the Lamb are its temple. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The city does not need the sun or the moon to shine on it, for the glory of God gives it light, and the Lamb is its lamp. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The nations will walk by its light, and the kings of the earth will bring their splendor into it. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On no day will its gates ever be shut, for there will be no night there. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The glory and honor of the nations will be brought into it. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nothing impure will ever enter it, nor will anyone who does what is shameful or deceitful, but only those whose names are written in the Lamb’s book of life.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I heard a loud voice from the throne saying, “Look! God’s dwelling place is now among the people, and he will dwell with them. They will be his people, and God himself will be with them and be their God. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ‘He will wipe every tear from their eyes. There will be no more death’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 25:8
      marker-yv: yv-n
    - type: text
      text: ' or mourning or crying or pain, for the old order of things has passed away.”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He who was seated on the throne said, “I am making everything new!” Then he said, “Write this down, for these words are trustworthy and true.”
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to me: “It is done. I am the Alpha and the Omega, the Beginning and the End. To the thirsty I will give water without cost from the spring of the water of life. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those who are victorious will inherit all this, and I will be their God and they will be my children. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the cowardly, the unbelieving, the vile, the murderers, the sexually immoral, those who practice magic arts, the idolaters and all liars—they will be consigned to the fiery lake of burning sulfur. This is the second death.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The New Jerusalem, the Bride of the Lamb
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One of the seven angels who had the seven bowls full of the seven last plagues came and said to me, “Come, I will show you the bride, the wife of the Lamb.” '
