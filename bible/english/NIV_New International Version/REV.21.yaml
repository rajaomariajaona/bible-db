document_id: REV.21,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A New Heaven and a New Earth
  - type: text
    content: Then I saw “a new heaven and a new earth,”
  - type: note
    content: Isaiah 65:17
  - type: text
    content: ' for the first heaven and the first earth had passed away, and there was no longer any sea. '
  '10':
  - type: text
    content: 'And he carried me away in the Spirit to a mountain great and high, and showed me the Holy City, Jerusalem, coming down out of heaven from God. '
  '11':
  - type: text
    content: 'It shone with the glory of God, and its brilliance was like that of a very precious jewel, like a jasper, clear as crystal. '
  '12':
  - type: text
    content: 'It had a great, high wall with twelve gates, and with twelve angels at the gates. On the gates were written the names of the twelve tribes of Israel. '
  '13':
  - type: text
    content: 'There were three gates on the east, three on the north, three on the south and three on the west. '
  '14':
  - type: text
    content: The wall of the city had twelve foundations, and on them were the names of the twelve apostles of the Lamb.
  '15':
  - type: text
    content: 'The angel who talked with me had a measuring rod of gold to measure the city, its gates and its walls. '
  '16':
  - type: text
    content: The city was laid out like a square, as long as it was wide. He measured the city with the rod and found it to be 12,000 stadia
  - type: note
    content: That is, about 1,400 miles or about 2,200 kilometers
  - type: text
    content: ' in length, and as wide and high as it is long. '
  '17':
  - type: text
    content: The angel measured the wall using human measurement, and it was 144 cubits
  - type: note
    content: That is, about 200 feet or about 65 meters
  - type: text
    content: ' thick.'
  - type: note
    content: Or high
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'The wall was made of jasper, and the city of pure gold, as pure as glass. '
  '19':
  - type: text
    content: 'The foundations of the city walls were decorated with every kind of precious stone. The first foundation was jasper, the second sapphire, the third agate, the fourth emerald, '
  '2':
  - type: text
    content: 'I saw the Holy City, the new Jerusalem, coming down out of heaven from God, prepared as a bride beautifully dressed for her husband. '
  '20':
  - type: text
    content: the fifth onyx, the sixth ruby, the seventh chrysolite, the eighth beryl, the ninth topaz, the tenth turquoise, the eleventh jacinth, and the twelfth amethyst.
  - type: note
    content: The precise identification of some of these precious stones is uncertain.
  - type: text
    content: ' '
  '21':
  - type: text
    content: The twelve gates were twelve pearls, each gate made of a single pearl. The great street of the city was of gold, as pure as transparent glass.
  '22':
  - type: text
    content: 'I did not see a temple in the city, because the Lord God Almighty and the Lamb are its temple. '
  '23':
  - type: text
    content: 'The city does not need the sun or the moon to shine on it, for the glory of God gives it light, and the Lamb is its lamp. '
  '24':
  - type: text
    content: 'The nations will walk by its light, and the kings of the earth will bring their splendor into it. '
  '25':
  - type: text
    content: 'On no day will its gates ever be shut, for there will be no night there. '
  '26':
  - type: text
    content: 'The glory and honor of the nations will be brought into it. '
  '27':
  - type: text
    content: Nothing impure will ever enter it, nor will anyone who does what is shameful or deceitful, but only those whose names are written in the Lamb’s book of life.
  '3':
  - type: text
    content: 'And I heard a loud voice from the throne saying, “Look! God’s dwelling place is now among the people, and he will dwell with them. They will be his people, and God himself will be with them and be their God. '
  '4':
  - type: text
    content: ‘He will wipe every tear from their eyes. There will be no more death’
  - type: note
    content: Isaiah 25:8
  - type: text
    content: ' or mourning or crying or pain, for the old order of things has passed away.”'
  '5':
  - type: text
    content: He who was seated on the throne said, “I am making everything new!” Then he said, “Write this down, for these words are trustworthy and true.”
  '6':
  - type: text
    content: 'He said to me: “It is done. I am the Alpha and the Omega, the Beginning and the End. To the thirsty I will give water without cost from the spring of the water of life. '
  '7':
  - type: text
    content: 'Those who are victorious will inherit all this, and I will be their God and they will be my children. '
  '8':
  - type: text
    content: But the cowardly, the unbelieving, the vile, the murderers, the sexually immoral, those who practice magic arts, the idolaters and all liars—they will be consigned to the fiery lake of burning sulfur. This is the second death.”
  - type: heading
    content: The New Jerusalem, the Bride of the Lamb
  '9':
  - type: text
    content: 'One of the seven angels who had the seven bowls full of the seven last plagues came and said to me, “Come, I will show you the bride, the wife of the Lamb.” '
