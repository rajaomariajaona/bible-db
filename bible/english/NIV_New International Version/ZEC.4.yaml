    - type: text
      text: The Gold Lampstand and the Two Olive Trees
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the angel who talked with me returned and woke me up, like someone awakened from sleep. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Who dares despise the day of small things, since the seven eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' that range throughout the earth will rejoice when they see the chosen capstone'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the plumb line
      marker-yv: yv-n
    - type: text
      text: ' in the hand of Zerubbabel?”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then I asked the angel, “What are these two olive trees on the right and the left of the lampstand?”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Again I asked him, “What are these two olive branches beside the two gold pipes that pour out golden oil?”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He replied, “Do you not know what these are?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “No, my lord,” I said.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he said, “These are the two who are anointed to
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: two who bring oil and
      marker-yv: yv-n
    - type: text
      text: ' serve the Lord of all the earth.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He asked me, “What do you see?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I answered, “I see a solid gold lampstand with a bowl at the top and seven lamps on it, with seven channels to the lamps. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Also there are two olive trees by it, one on the right of the bowl and the other on its left.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: I asked the angel who talked with me, “What are these, my lord?”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He answered, “Do you not know what these are?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “No, my lord,” I replied.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So he said to me, “This is the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to Zerubbabel: ‘Not by might nor by power, but by my Spirit,’ says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “What are you, mighty mountain? Before Zerubbabel you will become level ground. Then he will bring out the capstone to shouts of ‘God bless it! God bless it!’ ”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to me: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“The hands of Zerubbabel have laid the foundation of this temple; his hands will also complete it. Then you will know that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty has sent me to you.'
