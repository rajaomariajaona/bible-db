verses:
  '1':
  - type: heading
    content: The Gold Lampstand and the Two Olive Trees
  - type: text
    content: 'Then the angel who talked with me returned and woke me up, like someone awakened from sleep. '
  '10':
  - type: text
    content: '“Who dares despise the day of small things, since the seven eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ' that range throughout the earth will rejoice when they see the chosen capstone'
  - type: note
    content: Or the plumb line
  - type: text
    content: ' in the hand of Zerubbabel?”'
  '11':
  - type: text
    content: Then I asked the angel, “What are these two olive trees on the right and the left of the lampstand?”
  '12':
  - type: text
    content: Again I asked him, “What are these two olive branches beside the two gold pipes that pour out golden oil?”
  '13':
  - type: text
    content: He replied, “Do you not know what these are?”
  - type: text
    content: “No, my lord,” I said.
  '14':
  - type: text
    content: So he said, “These are the two who are anointed to
  - type: note
    content: Or two who bring oil and
  - type: text
    content: ' serve the Lord of all the earth.”'
  '2':
  - type: text
    content: He asked me, “What do you see?”
  - type: text
    content: 'I answered, “I see a solid gold lampstand with a bowl at the top and seven lamps on it, with seven channels to the lamps. '
  '3':
  - type: text
    content: Also there are two olive trees by it, one on the right of the bowl and the other on its left.”
  '4':
  - type: text
    content: I asked the angel who talked with me, “What are these, my lord?”
  '5':
  - type: text
    content: He answered, “Do you not know what these are?”
  - type: text
    content: “No, my lord,” I replied.
  '6':
  - type: text
    content: 'So he said to me, “This is the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' to Zerubbabel: ‘Not by might nor by power, but by my Spirit,’ says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  '7':
  - type: text
    content: “What are you, mighty mountain? Before Zerubbabel you will become level ground. Then he will bring out the capstone to shouts of ‘God bless it! God bless it!’ ”
  '8':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '9':
  - type: text
    content: '“The hands of Zerubbabel have laid the foundation of this temple; his hands will also complete it. Then you will know that the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty has sent me to you.'
