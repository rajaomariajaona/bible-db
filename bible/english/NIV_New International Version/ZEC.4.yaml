    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: He asked me, “What do you see?”
- type: usfm
  marker: p
  children:
  - type: text
    text: 'I answered, “I see a solid gold lampstand with a bowl at the top and seven lamps on it, with seven channels to the lamps. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Also there are two olive trees by it, one on the right of the bowl and the other on its left.”
