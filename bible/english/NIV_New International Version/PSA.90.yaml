document_id: PSA.90,111
type_code: eng
verses:
  '1':
  - type: heading
    content: BOOK IV
  - type: heading
    content: Psalms 90–106
  - type: heading
    content: Psalm 90
  - type: text
    content: A prayer of Moses the man of God.
  - type: text
    content: Lord, you have been our dwelling place
  - type: text
    content: throughout all generations.
  '10':
  - type: text
    content: Our days may come to seventy years,
  - type: text
    content: or eighty, if our strength endures;
  - type: text
    content: yet the best of them are but trouble and sorrow,
  - type: text
    content: for they quickly pass, and we fly away.
  '11':
  - type: text
    content: If only we knew the power of your anger!
  - type: text
    content: Your wrath is as great as the fear that is your due.
  '12':
  - type: text
    content: Teach us to number our days,
  - type: text
    content: that we may gain a heart of wisdom.
  '13':
  - type: text
    content: 'Relent, '
  - type: text
    content: Lord
  - type: text
    content: '! How long will it be?'
  - type: text
    content: Have compassion on your servants.
  '14':
  - type: text
    content: Satisfy us in the morning with your unfailing love,
  - type: text
    content: that we may sing for joy and be glad all our days.
  '15':
  - type: text
    content: Make us glad for as many days as you have afflicted us,
  - type: text
    content: for as many years as we have seen trouble.
  '16':
  - type: text
    content: May your deeds be shown to your servants,
  - type: text
    content: your splendor to their children.
  '17':
  - type: text
    content: May the favor
  - type: note
    content: Or beauty
  - type: text
    content: ' of the Lord our God rest on us;'
  - type: text
    content: establish the work of our hands for us—
  - type: text
    content: yes, establish the work of our hands.
  '2':
  - type: text
    content: Before the mountains were born
  - type: text
    content: or you brought forth the whole world,
  - type: text
    content: from everlasting to everlasting you are God.
  '3':
  - type: text
    content: You turn people back to dust,
  - type: text
    content: saying, “Return to dust, you mortals.”
  '4':
  - type: text
    content: A thousand years in your sight
  - type: text
    content: are like a day that has just gone by,
  - type: text
    content: or like a watch in the night.
  '5':
  - type: text
    content: Yet you sweep people away in the sleep of death—
  - type: text
    content: 'they are like the new grass of the morning:'
  '6':
  - type: text
    content: In the morning it springs up new,
  - type: text
    content: but by evening it is dry and withered.
  '7':
  - type: text
    content: We are consumed by your anger
  - type: text
    content: and terrified by your indignation.
  '8':
  - type: text
    content: You have set our iniquities before you,
  - type: text
    content: our secret sins in the light of your presence.
  '9':
  - type: text
    content: All our days pass away under your wrath;
  - type: text
    content: we finish our years with a moan.
