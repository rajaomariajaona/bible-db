document_id: PSA.90,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: BOOK IV
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: Psalms 90–106
    marker-yv: yv-h
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 90
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A prayer of Moses the man of God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lord, you have been our dwelling place
  - type: usfm
    marker: q2
    children:
    - type: text
      text: throughout all generations.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Our days may come to seventy years,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or eighty, if our strength endures;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yet the best of them are but trouble and sorrow,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for they quickly pass, and we fly away.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If only we knew the power of your anger!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your wrath is as great as the fear that is your due.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Teach us to number our days,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that we may gain a heart of wisdom.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Relent, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '! How long will it be?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Have compassion on your servants.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Satisfy us in the morning with your unfailing love,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that we may sing for joy and be glad all our days.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make us glad for as many days as you have afflicted us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for as many years as we have seen trouble.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May your deeds be shown to your servants,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your splendor to their children.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the favor
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '90:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: beauty
      marker-yv: yv-n
    - type: text
      text: ' of the Lord our God rest on us;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: establish the work of our hands for us—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yes, establish the work of our hands.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Before the mountains were born
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or you brought forth the whole world,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from everlasting to everlasting you are God.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You turn people back to dust,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: saying, “Return to dust, you mortals.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A thousand years in your sight
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are like a day that has just gone by,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or like a watch in the night.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet you sweep people away in the sleep of death—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'they are like the new grass of the morning:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the morning it springs up new,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but by evening it is dry and withered.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We are consumed by your anger
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and terrified by your indignation.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have set our iniquities before you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: our secret sins in the light of your presence.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All our days pass away under your wrath;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we finish our years with a moan.
