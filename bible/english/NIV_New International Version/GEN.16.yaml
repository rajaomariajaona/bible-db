verses:
  '1':
  - type: heading
    content: Hagar and Ishmael
  - type: text
    content: 'Now Sarai, Abram’s wife, had borne him no children. But she had an Egyptian slave named Hagar; '
  '10':
  - type: text
    content: The angel added, “I will increase your descendants so much that they will be too numerous to count.”
  '11':
  - type: text
    content: 'The angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' also said to her:'
  - type: text
    content: “You are now pregnant
  - type: text
    content: and you will give birth to a son.
  - type: text
    content: You shall name him Ishmael,
  - type: note
    content: Ishmael means God hears.
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' has heard of your misery.'
  '12':
  - type: text
    content: He will be a wild donkey of a man;
  - type: text
    content: his hand will be against everyone
  - type: text
    content: and everyone’s hand against him,
  - type: text
    content: and he will live in hostility
  - type: text
    content: toward
  - type: note
    content: Or live to the east / of
  - type: text
    content: ' all his brothers.”'
  '13':
  - type: text
    content: 'She gave this name to the '
  - type: text
    content: Lord
  - type: text
    content: ' who spoke to her: “You are the God who sees me,” for she said, “I have now seen'
  - type: note
    content: Or seen the back of
  - type: text
    content: ' the One who sees me.” '
  '14':
  - type: text
    content: That is why the well was called Beer Lahai Roi
  - type: note
    content: Beer Lahai Roi means well of the Living One who sees me.
  - type: text
    content: ; it is still there, between Kadesh and Bered.
  '15':
  - type: text
    content: 'So Hagar bore Abram a son, and Abram gave the name Ishmael to the son she had borne. '
  '16':
  - type: text
    content: Abram was eighty-six years old when Hagar bore him Ishmael.
  '2':
  - type: text
    content: 'so she said to Abram, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has kept me from having children. Go, sleep with my slave; perhaps I can build a family through her.”'
  - type: text
    content: 'Abram agreed to what Sarai said. '
  '3':
  - type: text
    content: 'So after Abram had been living in Canaan ten years, Sarai his wife took her Egyptian slave Hagar and gave her to her husband to be his wife. '
  '4':
  - type: text
    content: He slept with Hagar, and she conceived.
  - type: text
    content: 'When she knew she was pregnant, she began to despise her mistress. '
  '5':
  - type: text
    content: 'Then Sarai said to Abram, “You are responsible for the wrong I am suffering. I put my slave in your arms, and now that she knows she is pregnant, she despises me. May the '
  - type: text
    content: Lord
  - type: text
    content: ' judge between you and me.”'
  '6':
  - type: text
    content: “Your slave is in your hands,” Abram said. “Do with her whatever you think best.” Then Sarai mistreated Hagar; so she fled from her.
  '7':
  - type: text
    content: 'The angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' found Hagar near a spring in the desert; it was the spring that is beside the road to Shur. '
  '8':
  - type: text
    content: And he said, “Hagar, slave of Sarai, where have you come from, and where are you going?”
  - type: text
    content: “I’m running away from my mistress Sarai,” she answered.
  '9':
  - type: text
    content: 'Then the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' told her, “Go back to your mistress and submit to her.” '
