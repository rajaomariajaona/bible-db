    - type: text
      text: Hagar and Ishmael
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Sarai, Abram’s wife, had borne him no children. But she had an Egyptian slave named Hagar; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The angel added, “I will increase your descendants so much that they will be too numerous to count.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' also said to her:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You are now pregnant
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will give birth to a son.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You shall name him Ishmael,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ishmael '
