        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: God hears.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has heard of your misery.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will be a wild donkey of a man;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his hand will be against everyone
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and everyone’s hand against him,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and he will live in hostility
  - type: usfm
    marker: q2
    children:
    - type: text
      text: toward
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
