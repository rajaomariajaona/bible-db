        - type: text
          text: '16:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: live to the east / of
      marker-yv: yv-n
    - type: text
      text: ' all his brothers.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'She gave this name to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who spoke to her: “You are the God who sees me,” for she said, “I have now seen'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: seen the back of
      marker-yv: yv-n
    - type: text
      text: ' the One who sees me.” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That is why the well was called Beer Lahai Roi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16:14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Beer Lahai Roi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: well of the Living One who sees me.
      marker-yv: yv-n
    - type: text
      text: ; it is still there, between Kadesh and Bered.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Hagar bore Abram a son, and Abram gave the name Ishmael to the son she had borne. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abram was eighty-six years old when Hagar bore him Ishmael.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'so she said to Abram, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has kept me from having children. Go, sleep with my slave; perhaps I can build a family through her.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abram agreed to what Sarai said. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So after Abram had been living in Canaan ten years, Sarai his wife took her Egyptian slave Hagar and gave her to her husband to be his wife. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He slept with Hagar, and she conceived.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When she knew she was pregnant, she began to despise her mistress. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Sarai said to Abram, “You are responsible for the wrong I am suffering. I put my slave in your arms, and now that she knows she is pregnant, she despises me. May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' judge between you and me.”'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Your slave is in your hands,” Abram said. “Do with her whatever you think best.” Then Sarai mistreated Hagar; so she fled from her.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' found Hagar near a spring in the desert; it was the spring that is beside the road to Shur. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he said, “Hagar, slave of Sarai, where have you come from, and where are you going?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I’m running away from my mistress Sarai,” she answered.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' told her, “Go back to your mistress and submit to her.” '
