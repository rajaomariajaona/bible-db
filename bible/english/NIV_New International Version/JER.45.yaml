document_id: JER.45,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Message to Baruch
  - type: text
    content: 'When Baruch son of Neriah wrote on a scroll the words Jeremiah the prophet dictated in the fourth year of Jehoiakim son of Josiah king of Judah, Jeremiah said this to Baruch: '
  '2':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says to you, Baruch: '
  '3':
  - type: text
    content: 'You said, ‘Woe to me! The '
  - type: text
    content: Lord
  - type: text
    content: ' has added sorrow to my pain; I am worn out with groaning and find no rest.’ '
  '4':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' has told me to say to you, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: I will overthrow what I have built and uproot what I have planted, throughout the earth. '
  '5':
  - type: text
    content: 'Should you then seek great things for yourself? Do not seek them. For I will bring disaster on all people, declares the '
  - type: text
    content: Lord
  - type: text
    content: ', but wherever you go I will let you escape with your life.’ ”'
