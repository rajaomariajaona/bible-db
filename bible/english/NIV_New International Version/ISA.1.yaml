document_id: ISA.1,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: The vision concerning Judah and Jerusalem that Isaiah son of Amoz saw during the reigns of Uzziah, Jotham, Ahaz and Hezekiah, kings of Judah.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Rebellious Nation
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Hear the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you rulers of Sodom;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: listen to the instruction of our God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you people of Gomorrah!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: “The multitude of your sacrifices—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'what are they to me?” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I have more than enough of burnt offerings,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: of rams and the fat of fattened animals;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have no pleasure
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the blood of bulls and lambs and goats.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: When you come to appear before me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who has asked this of you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: this trampling of my courts?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Stop bringing meaningless offerings!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Your incense is detestable to me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: New Moons, Sabbaths and convocations—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I cannot bear your worthless assemblies.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Your New Moon feasts and your appointed festivals
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I hate with all my being.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They have become a burden to me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am weary of bearing them.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: When you spread out your hands in prayer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I hide my eyes from you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: even when you offer many prayers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am not listening.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your hands are full of blood!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Wash and make yourselves clean.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Take your evil deeds out of my sight;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stop doing wrong.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Learn to do right; seek justice.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Defend the oppressed.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: justice. / Correct the oppressor
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take up the cause of the fatherless;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: plead the case of the widow.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: “Come now, let us settle the matter,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Though your sins are like scarlet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they shall be as white as snow;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: though they are red as crimson,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they shall be like wool.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: If you are willing and obedient,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will eat the good things of the land;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Hear me, you heavens! Listen, earth!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has spoken:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I reared children and brought them up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they have rebelled against me.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: but if you resist and rebel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will be devoured by the sword.”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'For the mouth of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has spoken.'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: See how the faithful city
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has become a prostitute!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: She once was full of justice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: righteousness used to dwell in her—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but now murderers!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Your silver has become dross,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your choice wine is diluted with water.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Your rulers are rebels,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: partners with thieves;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they all love bribes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and chase after gifts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They do not defend the cause of the fatherless;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the widow’s case does not come before them.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Therefore the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the Mighty One of Israel, declares:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Ah! I will vent my wrath on my foes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and avenge myself on my enemies.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: I will turn my hand against you;
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, against Jerusalem
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will thoroughly purge away your dross
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and remove all your impurities.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: I will restore your leaders as in days of old,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your rulers as at the beginning.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afterward you will be called
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the City of Righteousness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the Faithful City.”
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Zion will be delivered with justice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: her penitent ones with righteousness.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: But rebels and sinners will both be broken,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and those who forsake the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will perish.'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: “You will be ashamed because of the sacred oaks
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in which you have delighted;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you will be disgraced because of the gardens
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you have chosen.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: The ox knows its master,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the donkey its owner’s manger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but Israel does not know,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my people do not understand.”
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: You will be like an oak with fading leaves,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a garden without water.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: The mighty man will become tinder
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his work a spark;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: both will burn together,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with no one to quench the fire.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Woe to the sinful nation,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a people whose guilt is great,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a brood of evildoers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: children given to corruption!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'They have forsaken the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they have spurned the Holy One of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and turned their backs on him.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Why should you be beaten anymore?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why do you persist in rebellion?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your whole head is injured,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your whole heart afflicted.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: From the sole of your foot to the top of your head
  - type: usfm
    marker: q2
    children:
    - type: text
      text: there is no soundness—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: only wounds and welts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and open sores,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: not cleansed or bandaged
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or soothed with olive oil.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Your country is desolate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your cities burned with fire;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your fields are being stripped by foreigners
  - type: usfm
    marker: q2
    children:
    - type: text
      text: right before you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: laid waste as when overthrown by strangers.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Daughter Zion is left
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a shelter in a vineyard,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like a hut in a cucumber field,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like a city under siege.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Unless the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: had left us some survivors,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: we would have become like Sodom,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we would have been like Gomorrah.
