document_id: ISA.1,111
type_code: eng
verses:
  '1':
  - type: text
    content: The vision concerning Judah and Jerusalem that Isaiah son of Amoz saw during the reigns of Uzziah, Jotham, Ahaz and Hezekiah, kings of Judah.
  - type: heading
    content: A Rebellious Nation
  '10':
  - type: text
    content: 'Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: you rulers of Sodom;
  - type: text
    content: listen to the instruction of our God,
  - type: text
    content: you people of Gomorrah!
  '11':
  - type: text
    content: “The multitude of your sacrifices—
  - type: text
    content: 'what are they to me?” says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “I have more than enough of burnt offerings,
  - type: text
    content: of rams and the fat of fattened animals;
  - type: text
    content: I have no pleasure
  - type: text
    content: in the blood of bulls and lambs and goats.
  '12':
  - type: text
    content: When you come to appear before me,
  - type: text
    content: who has asked this of you,
  - type: text
    content: this trampling of my courts?
  '13':
  - type: text
    content: Stop bringing meaningless offerings!
  - type: text
    content: Your incense is detestable to me.
  - type: text
    content: New Moons, Sabbaths and convocations—
  - type: text
    content: I cannot bear your worthless assemblies.
  '14':
  - type: text
    content: Your New Moon feasts and your appointed festivals
  - type: text
    content: I hate with all my being.
  - type: text
    content: They have become a burden to me;
  - type: text
    content: I am weary of bearing them.
  '15':
  - type: text
    content: When you spread out your hands in prayer,
  - type: text
    content: I hide my eyes from you;
  - type: text
    content: even when you offer many prayers,
  - type: text
    content: I am not listening.
  - type: text
    content: Your hands are full of blood!
  '16':
  - type: text
    content: Wash and make yourselves clean.
  - type: text
    content: Take your evil deeds out of my sight;
  - type: text
    content: stop doing wrong.
  '17':
  - type: text
    content: Learn to do right; seek justice.
  - type: text
    content: Defend the oppressed.
  - type: note
    content: Or justice. / Correct the oppressor
  - type: text
    content: Take up the cause of the fatherless;
  - type: text
    content: plead the case of the widow.
  '18':
  - type: text
    content: “Come now, let us settle the matter,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Though your sins are like scarlet,
  - type: text
    content: they shall be as white as snow;
  - type: text
    content: though they are red as crimson,
  - type: text
    content: they shall be like wool.
  '19':
  - type: text
    content: If you are willing and obedient,
  - type: text
    content: you will eat the good things of the land;
  '2':
  - type: text
    content: Hear me, you heavens! Listen, earth!
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken:'
  - type: text
    content: “I reared children and brought them up,
  - type: text
    content: but they have rebelled against me.
  '20':
  - type: text
    content: but if you resist and rebel,
  - type: text
    content: you will be devoured by the sword.”
  - type: text
    content: 'For the mouth of the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken.'
  '21':
  - type: text
    content: See how the faithful city
  - type: text
    content: has become a prostitute!
  - type: text
    content: She once was full of justice;
  - type: text
    content: righteousness used to dwell in her—
  - type: text
    content: but now murderers!
  '22':
  - type: text
    content: Your silver has become dross,
  - type: text
    content: your choice wine is diluted with water.
  '23':
  - type: text
    content: Your rulers are rebels,
  - type: text
    content: partners with thieves;
  - type: text
    content: they all love bribes
  - type: text
    content: and chase after gifts.
  - type: text
    content: They do not defend the cause of the fatherless;
  - type: text
    content: the widow’s case does not come before them.
  '24':
  - type: text
    content: 'Therefore the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty,'
  - type: text
    content: 'the Mighty One of Israel, declares:'
  - type: text
    content: “Ah! I will vent my wrath on my foes
  - type: text
    content: and avenge myself on my enemies.
  '25':
  - type: text
    content: I will turn my hand against you;
  - type: note
    content: That is, against Jerusalem
  - type: text
    content: I will thoroughly purge away your dross
  - type: text
    content: and remove all your impurities.
  '26':
  - type: text
    content: I will restore your leaders as in days of old,
  - type: text
    content: your rulers as at the beginning.
  - type: text
    content: Afterward you will be called
  - type: text
    content: the City of Righteousness,
  - type: text
    content: the Faithful City.”
  '27':
  - type: text
    content: Zion will be delivered with justice,
  - type: text
    content: her penitent ones with righteousness.
  '28':
  - type: text
    content: But rebels and sinners will both be broken,
  - type: text
    content: 'and those who forsake the '
  - type: text
    content: Lord
  - type: text
    content: ' will perish.'
  '29':
  - type: text
    content: “You will be ashamed because of the sacred oaks
  - type: text
    content: in which you have delighted;
  - type: text
    content: you will be disgraced because of the gardens
  - type: text
    content: that you have chosen.
  '3':
  - type: text
    content: The ox knows its master,
  - type: text
    content: the donkey its owner’s manger,
  - type: text
    content: but Israel does not know,
  - type: text
    content: my people do not understand.”
  '30':
  - type: text
    content: You will be like an oak with fading leaves,
  - type: text
    content: like a garden without water.
  '31':
  - type: text
    content: The mighty man will become tinder
  - type: text
    content: and his work a spark;
  - type: text
    content: both will burn together,
  - type: text
    content: with no one to quench the fire.”
  '4':
  - type: text
    content: Woe to the sinful nation,
  - type: text
    content: a people whose guilt is great,
  - type: text
    content: a brood of evildoers,
  - type: text
    content: children given to corruption!
  - type: text
    content: 'They have forsaken the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: they have spurned the Holy One of Israel
  - type: text
    content: and turned their backs on him.
  '5':
  - type: text
    content: Why should you be beaten anymore?
  - type: text
    content: Why do you persist in rebellion?
  - type: text
    content: Your whole head is injured,
  - type: text
    content: your whole heart afflicted.
  '6':
  - type: text
    content: From the sole of your foot to the top of your head
  - type: text
    content: there is no soundness—
  - type: text
    content: only wounds and welts
  - type: text
    content: and open sores,
  - type: text
    content: not cleansed or bandaged
  - type: text
    content: or soothed with olive oil.
  '7':
  - type: text
    content: Your country is desolate,
  - type: text
    content: your cities burned with fire;
  - type: text
    content: your fields are being stripped by foreigners
  - type: text
    content: right before you,
  - type: text
    content: laid waste as when overthrown by strangers.
  '8':
  - type: text
    content: Daughter Zion is left
  - type: text
    content: like a shelter in a vineyard,
  - type: text
    content: like a hut in a cucumber field,
  - type: text
    content: like a city under siege.
  '9':
  - type: text
    content: 'Unless the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty'
  - type: text
    content: had left us some survivors,
  - type: text
    content: we would have become like Sodom,
  - type: text
    content: we would have been like Gomorrah.
