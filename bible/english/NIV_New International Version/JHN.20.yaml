document_id: JHN.20,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Empty Tomb
  - type: text
    content: 'Early on the first day of the week, while it was still dark, Mary Magdalene went to the tomb and saw that the stone had been removed from the entrance. '
  '10':
  - type: text
    content: Then the disciples went back to where they were staying.
  - type: heading
    content: Jesus Appears to Mary Magdalene
  '11':
  - type: text
    content: 'Now Mary stood outside the tomb crying. As she wept, she bent over to look into the tomb '
  '12':
  - type: text
    content: and saw two angels in white, seated where Jesus’ body had been, one at the head and the other at the foot.
  '13':
  - type: text
    content: They asked her, “Woman, why are you crying?”
  - type: text
    content: '“They have taken my Lord away,” she said, “and I don’t know where they have put him.” '
  '14':
  - type: text
    content: At this, she turned around and saw Jesus standing there, but she did not realize that it was Jesus.
  '15':
  - type: text
    content: 'He asked her, '
  - type: text
    content: “Woman, why are you crying? Who is it you are looking for?”
  - type: text
    content: Thinking he was the gardener, she said, “Sir, if you have carried him away, tell me where you have put him, and I will get him.”
  '16':
  - type: text
    content: 'Jesus said to her, '
  - type: text
    content: “Mary.”
  - type: text
    content: She turned toward him and cried out in Aramaic, “Rabboni!” (which means “Teacher”).
  '17':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Do not hold on to me, for I have not yet ascended to the Father. Go instead to my brothers and tell them, ‘I am ascending to my Father and your Father, to my God and your God.’ ”
  '18':
  - type: text
    content: 'Mary Magdalene went to the disciples with the news: “I have seen the Lord!” And she told them that he had said these things to her.'
  - type: heading
    content: Jesus Appears to His Disciples
  '19':
  - type: text
    content: 'On the evening of that first day of the week, when the disciples were together, with the doors locked for fear of the Jewish leaders, Jesus came and stood among them and said, '
  - type: text
    content: “Peace be with you!”
  - type: text
    content: ' '
  '2':
  - type: text
    content: So she came running to Simon Peter and the other disciple, the one Jesus loved, and said, “They have taken the Lord out of the tomb, and we don’t know where they have put him!”
  '20':
  - type: text
    content: After he said this, he showed them his hands and side. The disciples were overjoyed when they saw the Lord.
  '21':
  - type: text
    content: 'Again Jesus said, '
  - type: text
    content: “Peace be with you! As the Father has sent me, I am sending you.”
  - type: text
    content: ' '
  '22':
  - type: text
    content: 'And with that he breathed on them and said, '
  - type: text
    content: “Receive the Holy Spirit.
  - type: text
    content: ' '
  '23':
  - type: text
    content: If you forgive anyone’s sins, their sins are forgiven; if you do not forgive them, they are not forgiven.”
  - type: heading
    content: Jesus Appears to Thomas
  '24':
  - type: text
    content: Now Thomas (also known as Didymus
  - type: note
    content: Thomas (Aramaic) and Didymus (Greek) both mean twin.
  - type: text
    content: '), one of the Twelve, was not with the disciples when Jesus came. '
  '25':
  - type: text
    content: So the other disciples told him, “We have seen the Lord!”
  - type: text
    content: But he said to them, “Unless I see the nail marks in his hands and put my finger where the nails were, and put my hand into his side, I will not believe.”
  '26':
  - type: text
    content: 'A week later his disciples were in the house again, and Thomas was with them. Though the doors were locked, Jesus came and stood among them and said, '
  - type: text
    content: “Peace be with you!”
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Then he said to Thomas, '
  - type: text
    content: “Put your finger here; see my hands. Reach out your hand and put it into my side. Stop doubting and believe.”
  '28':
  - type: text
    content: Thomas said to him, “My Lord and my God!”
  '29':
  - type: text
    content: 'Then Jesus told him, '
  - type: text
    content: “Because you have seen me, you have believed; blessed are those who have not seen and yet have believed.”
  - type: heading
    content: The Purpose of John’s Gospel
  '3':
  - type: text
    content: 'So Peter and the other disciple started for the tomb. '
  '30':
  - type: text
    content: 'Jesus performed many other signs in the presence of his disciples, which are not recorded in this book. '
  '31':
  - type: text
    content: But these are written that you may believe
  - type: note
    content: Or may continue to believe
  - type: text
    content: ' that Jesus is the Messiah, the Son of God, and that by believing you may have life in his name.'
  '4':
  - type: text
    content: 'Both were running, but the other disciple outran Peter and reached the tomb first. '
  '5':
  - type: text
    content: 'He bent over and looked in at the strips of linen lying there but did not go in. '
  '6':
  - type: text
    content: 'Then Simon Peter came along behind him and went straight into the tomb. He saw the strips of linen lying there, '
  '7':
  - type: text
    content: 'as well as the cloth that had been wrapped around Jesus’ head. The cloth was still lying in its place, separate from the linen. '
  '8':
  - type: text
    content: 'Finally the other disciple, who had reached the tomb first, also went inside. He saw and believed. '
  '9':
  - type: text
    content: '(They still did not understand from Scripture that Jesus had to rise from the dead.) '
