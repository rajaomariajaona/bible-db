document_id: JHN.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Empty Tomb
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Early on the first day of the week, while it was still dark, Mary Magdalene went to the tomb and saw that the stone had been removed from the entrance. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: So she came running to Simon Peter and the other disciple, the one Jesus loved, and said, “They have taken the Lord out of the tomb, and we don’t know where they have put him!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'So Peter and the other disciple started for the tomb. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Both were running, but the other disciple outran Peter and reached the tomb first. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'He bent over and looked in at the strips of linen lying there but did not go in. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Then Simon Peter came along behind him and went straight into the tomb. He saw the strips of linen lying there, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'as well as the cloth that had been wrapped around Jesus’ head. The cloth was still lying in its place, separate from the linen. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Finally the other disciple, who had reached the tomb first, also went inside. He saw and believed. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '(They still did not understand from Scripture that Jesus had to rise from the dead.) '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Then the disciples went back to where they were staying.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Appears to Mary Magdalene
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Now Mary stood outside the tomb crying. As she wept, she bent over to look into the tomb '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: and saw two angels in white, seated where Jesus’ body had been, one at the head and the other at the foot.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: They asked her, “Woman, why are you crying?”
- type: usfm
  marker: p
  children:
  - type: text
    text: '“They have taken my Lord away,” she said, “and I don’t know where they have put him.” '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: At this, she turned around and saw Jesus standing there, but she did not realize that it was Jesus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He asked her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Woman, why are you crying? Who is it you are looking for?”
- type: usfm
  marker: p
  children:
  - type: text
    text: Thinking he was the gardener, she said, “Sir, if you have carried him away, tell me where you have put him, and I will get him.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jesus said to her, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Mary.”
- type: usfm
  marker: p
  children:
  - type: text
    text: She turned toward him and cried out in Aramaic, “Rabboni!” (which means “Teacher”).
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Do not hold on to me, for I have not yet ascended to the Father. Go instead to my brothers and tell them, ‘I am ascending to my Father and your Father, to my God and your God.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mary Magdalene went to the disciples with the news: “I have seen the Lord!” And she told them that he had said these things to her.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Appears to His Disciples
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'On the evening of that first day of the week, when the disciples were together, with the doors locked for fear of the Jewish leaders, Jesus came and stood among them and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Peace be with you!”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: After he said this, he showed them his hands and side. The disciples were overjoyed when they saw the Lord.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Again Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Peace be with you! As the Father has sent me, I am sending you.”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And with that he breathed on them and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Receive the Holy Spirit.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: If you forgive anyone’s sins, their sins are forgiven; if you do not forgive them, they are not forgiven.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Appears to Thomas
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Now Thomas (also known as Didymus
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Thomas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Aramaic) and '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Didymus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Greek) both mean '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: twin.
    marker-yv: yv-n
  - type: text
    text: '), one of the Twelve, was not with the disciples when Jesus came. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: So the other disciples told him, “We have seen the Lord!”
- type: usfm
  marker: p
  children:
  - type: text
    text: But he said to them, “Unless I see the nail marks in his hands and put my finger where the nails were, and put my hand into his side, I will not believe.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'A week later his disciples were in the house again, and Thomas was with them. Though the doors were locked, Jesus came and stood among them and said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Peace be with you!”
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Then he said to Thomas, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Put your finger here; see my hands. Reach out your hand and put it into my side. Stop doubting and believe.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Thomas said to him, “My Lord and my God!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Then Jesus told him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Because you have seen me, you have believed; blessed are those who have not seen and yet have believed.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Purpose of John’s Gospel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jesus performed many other signs in the presence of his disciples, which are not recorded in this book. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: But these are written that you may believe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: may continue to believe
    marker-yv: yv-n
  - type: text
    text: ' that Jesus is the Messiah, the Son of God, and that by believing you may have life in his name.'
