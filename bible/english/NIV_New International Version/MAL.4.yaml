verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Judgment and Covenant Renewal
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 4:1-6 is numbered 3:19-24.
      marker-yv: yv-n
    - type: text
      text: '“Surely the day is coming; it will burn like a furnace. All the arrogant and every evildoer will be stubble, and the day that is coming will set them on fire,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty. “Not a root or a branch will be left to them. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But for you who revere my name, the sun of righteousness will rise with healing in its rays. And you will go out and frolic like well-fed calves. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then you will trample on the wicked; they will be ashes under the soles of your feet on the day when I act,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Remember the law of my servant Moses, the decrees and laws I gave him at Horeb for all Israel.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“See, I will send the prophet Elijah to you before that great and dreadful day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' comes. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He will turn the hearts of the parents to their children, and the hearts of the children to their parents; or else I will come and strike the land with total destruction.”
