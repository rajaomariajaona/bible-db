document_id: MAL.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Judgment and Covenant Renewal
  - type: note
    content: In Hebrew texts 4:1-6 is numbered 3:19-24.
  - type: text
    content: '“Surely the day is coming; it will burn like a furnace. All the arrogant and every evildoer will be stubble, and the day that is coming will set them on fire,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty. “Not a root or a branch will be left to them. '
  '2':
  - type: text
    content: 'But for you who revere my name, the sun of righteousness will rise with healing in its rays. And you will go out and frolic like well-fed calves. '
  '3':
  - type: text
    content: 'Then you will trample on the wicked; they will be ashes under the soles of your feet on the day when I act,” says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  '4':
  - type: text
    content: “Remember the law of my servant Moses, the decrees and laws I gave him at Horeb for all Israel.
  '5':
  - type: text
    content: '“See, I will send the prophet Elijah to you before that great and dreadful day of the '
  - type: text
    content: Lord
  - type: text
    content: ' comes. '
  '6':
  - type: text
    content: He will turn the hearts of the parents to their children, and the hearts of the children to their parents; or else I will come and strike the land with total destruction.”
