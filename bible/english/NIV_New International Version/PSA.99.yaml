document_id: PSA.99,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 99
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' reigns,'
  - type: text
    content: let the nations tremble;
  - type: text
    content: he sits enthroned between the cherubim,
  - type: text
    content: let the earth shake.
  '2':
  - type: text
    content: 'Great is the '
  - type: text
    content: Lord
  - type: text
    content: ' in Zion;'
  - type: text
    content: he is exalted over all the nations.
  '3':
  - type: text
    content: Let them praise your great and awesome name—
  - type: text
    content: he is holy.
  '4':
  - type: text
    content: The King is mighty, he loves justice—
  - type: text
    content: you have established equity;
  - type: text
    content: in Jacob you have done
  - type: text
    content: what is just and right.
  '5':
  - type: text
    content: 'Exalt the '
  - type: text
    content: Lord
  - type: text
    content: ' our God'
  - type: text
    content: and worship at his footstool;
  - type: text
    content: he is holy.
  '6':
  - type: text
    content: Moses and Aaron were among his priests,
  - type: text
    content: Samuel was among those who called on his name;
  - type: text
    content: 'they called on the '
  - type: text
    content: Lord
  - type: text
    content: and he answered them.
  '7':
  - type: text
    content: He spoke to them from the pillar of cloud;
  - type: text
    content: they kept his statutes and the decrees he gave them.
  '8':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ' our God,'
  - type: text
    content: you answered them;
  - type: text
    content: you were to Israel a forgiving God,
  - type: text
    content: though you punished their misdeeds.
  - type: note
    content: Or God, / an avenger of the wrongs done to them
  '9':
  - type: text
    content: 'Exalt the '
  - type: text
    content: Lord
  - type: text
    content: ' our God'
  - type: text
    content: and worship at his holy mountain,
  - type: text
    content: 'for the '
  - type: text
    content: Lord
  - type: text
    content: ' our God is holy.'
