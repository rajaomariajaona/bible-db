    children:
    - type: text
      text: Psalm 99
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' reigns,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let the nations tremble;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he sits enthroned between the cherubim,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let the earth shake.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Great is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in Zion;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is exalted over all the nations.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Let them praise your great and awesome name—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is holy.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The King is mighty, he loves justice—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have established equity;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in Jacob you have done
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what is just and right.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Exalt the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and worship at his footstool;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is holy.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Moses and Aaron were among his priests,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Samuel was among those who called on his name;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'they called on the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he answered them.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: He spoke to them from the pillar of cloud;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they kept his statutes and the decrees he gave them.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you answered them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: you were to Israel a forgiving God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though you punished their misdeeds.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '99:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: God, / an avenger of the wrongs done to them
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Exalt the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and worship at his holy mountain,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God is holy.'
