document_id: ECC.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Everything Is Meaningless
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The words of the Teacher,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the leader of the assembly
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verses 2 and 12
    marker-yv: yv-n
  - type: text
    text: ' son of David, king in Jerusalem:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Meaningless! Meaningless!”
- type: usfm
  marker: q2
  children:
  - type: text
    text: says the Teacher.
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Utterly meaningless!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Everything is meaningless.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: What do people gain from all their labors
- type: usfm
  marker: q2
  children:
  - type: text
    text: at which they toil under the sun?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Generations come and generations go,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the earth remains forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: The sun rises and the sun sets,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and hurries back to where it rises.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The wind blows to the south
- type: usfm
  marker: q2
  children:
  - type: text
    text: and turns to the north;
- type: usfm
  marker: q1
  children:
  - type: text
    text: round and round it goes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ever returning on its course.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: All streams flow into the sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet the sea is never full.
- type: usfm
  marker: q1
  children:
  - type: text
    text: To the place the streams come from,
- type: usfm
  marker: q2
  children:
  - type: text
    text: there they return again.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: All things are wearisome,
- type: usfm
  marker: q2
  children:
  - type: text
    text: more than one can say.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The eye never has enough of seeing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor the ear its fill of hearing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: What has been will be again,
- type: usfm
  marker: q2
  children:
  - type: text
    text: what has been done will be done again;
- type: usfm
  marker: q2
  children:
  - type: text
    text: there is nothing new under the sun.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Is there anything of which one can say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “Look! This is something new”?
- type: usfm
  marker: q1
  children:
  - type: text
    text: It was here already, long ago;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it was here before our time.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: No one remembers the former generations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and even those yet to come
- type: usfm
  marker: q1
  children:
  - type: text
    text: will not be remembered
- type: usfm
  marker: q2
  children:
  - type: text
    text: by those who follow them.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Wisdom Is Meaningless
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'I, the Teacher, was king over Israel in Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'I applied my mind to study and to explore by wisdom all that is done under the heavens. What a heavy burden God has laid on mankind! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I have seen all the things that are done under the sun; all of them are meaningless, a chasing after the wind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: What is crooked cannot be straightened;
- type: usfm
  marker: q2
  children:
  - type: text
    text: what is lacking cannot be counted.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'I said to myself, “Look, I have increased in wisdom more than anyone who has ruled over Jerusalem before me; I have experienced much of wisdom and knowledge.” '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Then I applied myself to the understanding of wisdom, and also of madness and folly, but I learned that this, too, is a chasing after the wind.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For with much wisdom comes much sorrow;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the more knowledge, the more grief.
