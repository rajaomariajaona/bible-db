document_id: ECC.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Everything Is Meaningless
  - type: text
    content: The words of the Teacher,
  - type: note
    content: Or the leader of the assembly; also in verses 2 and 12
  - type: text
    content: ' son of David, king in Jerusalem:'
  '10':
  - type: text
    content: Is there anything of which one can say,
  - type: text
    content: “Look! This is something new”?
  - type: text
    content: It was here already, long ago;
  - type: text
    content: it was here before our time.
  '11':
  - type: text
    content: No one remembers the former generations,
  - type: text
    content: and even those yet to come
  - type: text
    content: will not be remembered
  - type: text
    content: by those who follow them.
  - type: heading
    content: Wisdom Is Meaningless
  '12':
  - type: text
    content: 'I, the Teacher, was king over Israel in Jerusalem. '
  '13':
  - type: text
    content: 'I applied my mind to study and to explore by wisdom all that is done under the heavens. What a heavy burden God has laid on mankind! '
  '14':
  - type: text
    content: I have seen all the things that are done under the sun; all of them are meaningless, a chasing after the wind.
  '15':
  - type: text
    content: What is crooked cannot be straightened;
  - type: text
    content: what is lacking cannot be counted.
  '16':
  - type: text
    content: 'I said to myself, “Look, I have increased in wisdom more than anyone who has ruled over Jerusalem before me; I have experienced much of wisdom and knowledge.” '
  '17':
  - type: text
    content: Then I applied myself to the understanding of wisdom, and also of madness and folly, but I learned that this, too, is a chasing after the wind.
  '18':
  - type: text
    content: For with much wisdom comes much sorrow;
  - type: text
    content: the more knowledge, the more grief.
  '2':
  - type: text
    content: “Meaningless! Meaningless!”
  - type: text
    content: says the Teacher.
  - type: text
    content: “Utterly meaningless!
  - type: text
    content: Everything is meaningless.”
  '3':
  - type: text
    content: What do people gain from all their labors
  - type: text
    content: at which they toil under the sun?
  '4':
  - type: text
    content: Generations come and generations go,
  - type: text
    content: but the earth remains forever.
  '5':
  - type: text
    content: The sun rises and the sun sets,
  - type: text
    content: and hurries back to where it rises.
  '6':
  - type: text
    content: The wind blows to the south
  - type: text
    content: and turns to the north;
  - type: text
    content: round and round it goes,
  - type: text
    content: ever returning on its course.
  '7':
  - type: text
    content: All streams flow into the sea,
  - type: text
    content: yet the sea is never full.
  - type: text
    content: To the place the streams come from,
  - type: text
    content: there they return again.
  '8':
  - type: text
    content: All things are wearisome,
  - type: text
    content: more than one can say.
  - type: text
    content: The eye never has enough of seeing,
  - type: text
    content: nor the ear its fill of hearing.
  '9':
  - type: text
    content: What has been will be again,
  - type: text
    content: what has been done will be done again;
  - type: text
    content: there is nothing new under the sun.
