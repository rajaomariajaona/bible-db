document_id: JOB.12,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Job
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Then Job replied:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: In his hand is the life of every creature
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the breath of all mankind.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Does not the ear test words
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as the tongue tastes food?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Is not wisdom found among the aged?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Does not long life bring understanding?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “To God belong wisdom and power;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: counsel and understanding are his.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: What he tears down cannot be rebuilt;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those he imprisons cannot be released.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: If he holds back the waters, there is drought;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: if he lets them loose, they devastate the land.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: To him belong strength and insight;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: both deceived and deceiver are his.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: He leads rulers away stripped
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and makes fools of judges.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: He takes off the shackles put on by kings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and ties a loincloth
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: shackles of kings / and ties a belt
      marker-yv: yv-n
    - type: text
      text: ' around their waist.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: He leads priests away stripped
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and overthrows officials long established.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “Doubtless you are the only people who matter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wisdom will die with you!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: He silences the lips of trusted advisers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and takes away the discernment of elders.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: He pours contempt on nobles
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and disarms the mighty.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: He reveals the deep things of darkness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and brings utter darkness into the light.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: He makes nations great, and destroys them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he enlarges nations, and disperses them.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: He deprives the leaders of the earth of their reason;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he makes them wander in a trackless waste.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: They grope in darkness with no light;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he makes them stagger like drunkards.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: But I have a mind as well as you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am not inferior to you.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who does not know all these things?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: “I have become a laughingstock to my friends,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though I called on God and he answered—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a mere laughingstock, though righteous and blameless!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Those who are at ease have contempt for misfortune
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as the fate of those whose feet are slipping.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: The tents of marauders are undisturbed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those who provoke God are secure—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those God has in his hand.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: those whose god is in their own hand
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “But ask the animals, and they will teach you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or the birds in the sky, and they will tell you;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: or speak to the earth, and it will teach you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or let the fish in the sea inform you.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Which of all these does not know
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'that the hand of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has done this?'
