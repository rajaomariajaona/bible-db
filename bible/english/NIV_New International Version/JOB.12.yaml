document_id: JOB.12,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Job
  - type: text
    content: 'Then Job replied:'
  '10':
  - type: text
    content: In his hand is the life of every creature
  - type: text
    content: and the breath of all mankind.
  '11':
  - type: text
    content: Does not the ear test words
  - type: text
    content: as the tongue tastes food?
  '12':
  - type: text
    content: Is not wisdom found among the aged?
  - type: text
    content: Does not long life bring understanding?
  '13':
  - type: text
    content: “To God belong wisdom and power;
  - type: text
    content: counsel and understanding are his.
  '14':
  - type: text
    content: What he tears down cannot be rebuilt;
  - type: text
    content: those he imprisons cannot be released.
  '15':
  - type: text
    content: If he holds back the waters, there is drought;
  - type: text
    content: if he lets them loose, they devastate the land.
  '16':
  - type: text
    content: To him belong strength and insight;
  - type: text
    content: both deceived and deceiver are his.
  '17':
  - type: text
    content: He leads rulers away stripped
  - type: text
    content: and makes fools of judges.
  '18':
  - type: text
    content: He takes off the shackles put on by kings
  - type: text
    content: and ties a loincloth
  - type: note
    content: Or shackles of kings / and ties a belt
  - type: text
    content: ' around their waist.'
  '19':
  - type: text
    content: He leads priests away stripped
  - type: text
    content: and overthrows officials long established.
  '2':
  - type: text
    content: “Doubtless you are the only people who matter,
  - type: text
    content: and wisdom will die with you!
  '20':
  - type: text
    content: He silences the lips of trusted advisers
  - type: text
    content: and takes away the discernment of elders.
  '21':
  - type: text
    content: He pours contempt on nobles
  - type: text
    content: and disarms the mighty.
  '22':
  - type: text
    content: He reveals the deep things of darkness
  - type: text
    content: and brings utter darkness into the light.
  '23':
  - type: text
    content: He makes nations great, and destroys them;
  - type: text
    content: he enlarges nations, and disperses them.
  '24':
  - type: text
    content: He deprives the leaders of the earth of their reason;
  - type: text
    content: he makes them wander in a trackless waste.
  '25':
  - type: text
    content: They grope in darkness with no light;
  - type: text
    content: he makes them stagger like drunkards.
  '3':
  - type: text
    content: But I have a mind as well as you;
  - type: text
    content: I am not inferior to you.
  - type: text
    content: Who does not know all these things?
  '4':
  - type: text
    content: “I have become a laughingstock to my friends,
  - type: text
    content: though I called on God and he answered—
  - type: text
    content: a mere laughingstock, though righteous and blameless!
  '5':
  - type: text
    content: Those who are at ease have contempt for misfortune
  - type: text
    content: as the fate of those whose feet are slipping.
  '6':
  - type: text
    content: The tents of marauders are undisturbed,
  - type: text
    content: and those who provoke God are secure—
  - type: text
    content: those God has in his hand.
  - type: note
    content: Or those whose god is in their own hand
  '7':
  - type: text
    content: “But ask the animals, and they will teach you,
  - type: text
    content: or the birds in the sky, and they will tell you;
  '8':
  - type: text
    content: or speak to the earth, and it will teach you,
  - type: text
    content: or let the fish in the sea inform you.
  '9':
  - type: text
    content: Which of all these does not know
  - type: text
    content: 'that the hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' has done this?'
