document_id: EZR.5,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tattenai’s Letter to Darius
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Haggai the prophet and Zechariah the prophet, a descendant of Iddo, prophesied to the Jews in Judah and Jerusalem in the name of the God of Israel, who was over them. '
  '10':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: We also asked them their names, so that we could write down the names of their leaders for your information.
  '11':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'This is the answer they gave us:'
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“We are the servants of the God of heaven and earth, and we are rebuilding the temple that was built many years ago, one that a great king of Israel built and finished. '
  '12':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: But because our ancestors angered the God of heaven, he gave them into the hands of Nebuchadnezzar the Chaldean, king of Babylon, who destroyed this temple and deported the people to Babylon.
  '13':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: '“However, in the first year of Cyrus king of Babylon, King Cyrus issued a decree to rebuild this house of God. '
  '14':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: He even removed from the temple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: palace
      marker-yv: yv-n
    - type: text
      text: ' of Babylon the gold and silver articles of the house of God, which Nebuchadnezzar had taken from the temple in Jerusalem and brought to the temple'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: palace
      marker-yv: yv-n
    - type: text
      text: ' in Babylon. Then King Cyrus gave them to a man named Sheshbazzar, whom he had appointed governor, '
  '15':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: and he told him, ‘Take these articles and go and deposit them in the temple in Jerusalem. And rebuild the house of God on its site.’
  '16':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: “So this Sheshbazzar came and laid the foundations of the house of God in Jerusalem. From that day to the present it has been under construction but is not yet finished.”
  '17':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: Now if it pleases the king, let a search be made in the royal archives of Babylon to see if King Cyrus did in fact issue a decree to rebuild this house of God in Jerusalem. Then let the king send us his decision in this matter.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Zerubbabel son of Shealtiel and Joshua son of Jozadak set to work to rebuild the house of God in Jerusalem. And the prophets of God were with them, supporting them.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At that time Tattenai, governor of Trans-Euphrates, and Shethar-Bozenai and their associates went to them and asked, “Who authorized you to rebuild this temple and to finish it?” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'See Septuagint; Aramaic '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: We.
      marker-yv: yv-n
    - type: text
      text: ' also asked, “What are the names of those who are constructing this building?” '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the eye of their God was watching over the elders of the Jews, and they were not stopped until a report could go to Darius and his written reply be received.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is a copy of the letter that Tattenai, governor of Trans-Euphrates, and Shethar-Bozenai and their associates, the officials of Trans-Euphrates, sent to King Darius. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The report they sent him read as follows:'
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: 'To King Darius:'
  - type: usfm
    marker: pmo
    children:
    - type: text
      text: Cordial greetings.
  '8':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: The king should know that we went to the district of Judah, to the temple of the great God. The people are building it with large stones and placing the timbers in the walls. The work is being carried on with diligence and is making rapid progress under their direction.
  '9':
  - type: usfm
    marker: pm
    children:
    - type: text
      text: 'We questioned the elders and asked them, “Who authorized you to rebuild this temple and to finish it?” '
