document_id: EZR.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Tattenai’s Letter to Darius
  - type: text
    content: 'Now Haggai the prophet and Zechariah the prophet, a descendant of Iddo, prophesied to the Jews in Judah and Jerusalem in the name of the God of Israel, who was over them. '
  '10':
  - type: text
    content: We also asked them their names, so that we could write down the names of their leaders for your information.
  '11':
  - type: text
    content: 'This is the answer they gave us:'
  - type: text
    content: '“We are the servants of the God of heaven and earth, and we are rebuilding the temple that was built many years ago, one that a great king of Israel built and finished. '
  '12':
  - type: text
    content: But because our ancestors angered the God of heaven, he gave them into the hands of Nebuchadnezzar the Chaldean, king of Babylon, who destroyed this temple and deported the people to Babylon.
  '13':
  - type: text
    content: '“However, in the first year of Cyrus king of Babylon, King Cyrus issued a decree to rebuild this house of God. '
  '14':
  - type: text
    content: He even removed from the temple
  - type: note
    content: Or palace
  - type: text
    content: ' of Babylon the gold and silver articles of the house of God, which Nebuchadnezzar had taken from the temple in Jerusalem and brought to the temple'
  - type: note
    content: Or palace
  - type: text
    content: ' in Babylon. Then King Cyrus gave them to a man named Sheshbazzar, whom he had appointed governor, '
  '15':
  - type: text
    content: and he told him, ‘Take these articles and go and deposit them in the temple in Jerusalem. And rebuild the house of God on its site.’
  '16':
  - type: text
    content: “So this Sheshbazzar came and laid the foundations of the house of God in Jerusalem. From that day to the present it has been under construction but is not yet finished.”
  '17':
  - type: text
    content: Now if it pleases the king, let a search be made in the royal archives of Babylon to see if King Cyrus did in fact issue a decree to rebuild this house of God in Jerusalem. Then let the king send us his decision in this matter.
  '2':
  - type: text
    content: Then Zerubbabel son of Shealtiel and Joshua son of Jozadak set to work to rebuild the house of God in Jerusalem. And the prophets of God were with them, supporting them.
  '3':
  - type: text
    content: 'At that time Tattenai, governor of Trans-Euphrates, and Shethar-Bozenai and their associates went to them and asked, “Who authorized you to rebuild this temple and to finish it?” '
  '4':
  - type: text
    content: They
  - type: note
    content: See Septuagint; Aramaic We.
  - type: text
    content: ' also asked, “What are the names of those who are constructing this building?” '
  '5':
  - type: text
    content: But the eye of their God was watching over the elders of the Jews, and they were not stopped until a report could go to Darius and his written reply be received.
  '6':
  - type: text
    content: 'This is a copy of the letter that Tattenai, governor of Trans-Euphrates, and Shethar-Bozenai and their associates, the officials of Trans-Euphrates, sent to King Darius. '
  '7':
  - type: text
    content: 'The report they sent him read as follows:'
  - type: text
    content: 'To King Darius:'
  - type: text
    content: Cordial greetings.
  '8':
  - type: text
    content: The king should know that we went to the district of Judah, to the temple of the great God. The people are building it with large stones and placing the timbers in the walls. The work is being carried on with diligence and is making rapid progress under their direction.
  '9':
  - type: text
    content: 'We questioned the elders and asked them, “Who authorized you to rebuild this temple and to finish it?” '
