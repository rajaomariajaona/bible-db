document_id: ACT.14,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: In Iconium
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At Iconium Paul and Barnabas went as usual into the Jewish synagogue. There they spoke so effectively that a great number of Jews and Greeks believed. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and called out, “Stand up on your feet!” At that, the man jumped up and began to walk.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the crowd saw what Paul had done, they shouted in the Lycaonian language, “The gods have come down to us in human form!” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Barnabas they called Zeus, and Paul they called Hermes because he was the chief speaker. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The priest of Zeus, whose temple was just outside the city, brought bulls and wreaths to the city gates because he and the crowd wanted to offer sacrifices to them.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when the apostles Barnabas and Paul heard of this, they tore their clothes and rushed out into the crowd, shouting: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Friends, why are you doing this? We too are only human, like you. We are bringing you good news, telling you to turn from these worthless things to the living God, who made the heavens and the earth and the sea and everything in them. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the past, he let all nations go their own way. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yet he has not left himself without testimony: He has shown kindness by giving you rain from heaven and crops in their seasons; he provides you with plenty of food and fills your hearts with joy.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Even with these words, they had difficulty keeping the crowd from sacrificing to them.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then some Jews came from Antioch and Iconium and won the crowd over. They stoned Paul and dragged him outside the city, thinking he was dead. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the Jews who refused to believe stirred up the other Gentiles and poisoned their minds against the brothers. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But after the disciples had gathered around him, he got up and went back into the city. The next day he and Barnabas left for Derbe.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Return to Antioch in Syria
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They preached the gospel in that city and won a large number of disciples. Then they returned to Lystra, Iconium and Antioch, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'strengthening the disciples and encouraging them to remain true to the faith. “We must go through many hardships to enter the kingdom of God,” they said. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Paul and Barnabas appointed elders
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Barnabas ordained elders
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Barnabas had elders elected
      marker-yv: yv-n
    - type: text
      text: ' for them in each church and, with prayer and fasting, committed them to the Lord, in whom they had put their trust. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After going through Pisidia, they came into Pamphylia, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and when they had preached the word in Perga, they went down to Attalia.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From Attalia they sailed back to Antioch, where they had been committed to the grace of God for the work they had now completed. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On arriving there, they gathered the church together and reported all that God had done through them and how he had opened a door of faith to the Gentiles. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they stayed there a long time with the disciples.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Paul and Barnabas spent considerable time there, speaking boldly for the Lord, who confirmed the message of his grace by enabling them to perform signs and wonders. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The people of the city were divided; some sided with the Jews, others with the apostles. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There was a plot afoot among both Gentiles and Jews, together with their leaders, to mistreat them and stone them. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But they found out about it and fled to the Lycaonian cities of Lystra and Derbe and to the surrounding country, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: where they continued to preach the gospel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: In Lystra and Derbe
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In Lystra there sat a man who was lame. He had been that way from birth and had never walked. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He listened to Paul as he was speaking. Paul looked directly at him, saw that he had faith to be healed '
