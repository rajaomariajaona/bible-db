document_id: MAT.3,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: John the Baptist Prepares the Way
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In those days John the Baptist came, preaching in the wilderness of Judea '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The ax is already at the root of the trees, and every tree that does not produce good fruit will be cut down and thrown into the fire.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “I baptize you with
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in
      marker-yv: yv-n
    - type: text
      text: ' water for repentance. But after me comes one who is more powerful than I, whose sandals I am not worthy to carry. He will baptize you with'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in
      marker-yv: yv-n
    - type: text
      text: ' the Holy Spirit and fire. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: His winnowing fork is in his hand, and he will clear his threshing floor, gathering his wheat into the barn and burning up the chaff with unquenchable fire.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Baptism of Jesus
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus came from Galilee to the Jordan to be baptized by John. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But John tried to deter him, saying, “I need to be baptized by you, and do you come to me?”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Let it be so now; it is proper for us to do this to fulfill all righteousness.”
    - type: text
      text: ' Then John consented.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As soon as Jesus was baptized, he went up out of the water. At that moment heaven was opened, and he saw the Spirit of God descending like a dove and alighting on him. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And a voice from heaven said, “This is my Son, whom I love; with him I am well pleased.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and saying, “Repent, for the kingdom of heaven has come near.” '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is he who was spoken of through the prophet Isaiah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “A voice of one calling in the wilderness,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Prepare the way for the Lord,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: make straight paths for him.’ ”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 40:3
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'John’s clothes were made of camel’s hair, and he had a leather belt around his waist. His food was locusts and wild honey. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'People went out to him from Jerusalem and all Judea and the whole region of the Jordan. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Confessing their sins, they were baptized by him in the Jordan River.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But when he saw many of the Pharisees and Sadducees coming to where he was baptizing, he said to them: “You brood of vipers! Who warned you to flee from the coming wrath? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Produce fruit in keeping with repentance. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And do not think you can say to yourselves, ‘We have Abraham as our father.’ I tell you that out of these stones God can raise up children for Abraham. '
