document_id: MAT.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: John the Baptist Prepares the Way
  - type: text
    content: 'In those days John the Baptist came, preaching in the wilderness of Judea '
  '10':
  - type: text
    content: The ax is already at the root of the trees, and every tree that does not produce good fruit will be cut down and thrown into the fire.
  '11':
  - type: text
    content: “I baptize you with
  - type: note
    content: Or in
  - type: text
    content: ' water for repentance. But after me comes one who is more powerful than I, whose sandals I am not worthy to carry. He will baptize you with'
  - type: note
    content: Or in
  - type: text
    content: ' the Holy Spirit and fire. '
  '12':
  - type: text
    content: His winnowing fork is in his hand, and he will clear his threshing floor, gathering his wheat into the barn and burning up the chaff with unquenchable fire.”
  - type: heading
    content: The Baptism of Jesus
  '13':
  - type: text
    content: 'Then Jesus came from Galilee to the Jordan to be baptized by John. '
  '14':
  - type: text
    content: But John tried to deter him, saying, “I need to be baptized by you, and do you come to me?”
  '15':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Let it be so now; it is proper for us to do this to fulfill all righteousness.”
  - type: text
    content: ' Then John consented.'
  '16':
  - type: text
    content: 'As soon as Jesus was baptized, he went up out of the water. At that moment heaven was opened, and he saw the Spirit of God descending like a dove and alighting on him. '
  '17':
  - type: text
    content: And a voice from heaven said, “This is my Son, whom I love; with him I am well pleased.”
  '2':
  - type: text
    content: 'and saying, “Repent, for the kingdom of heaven has come near.” '
  '3':
  - type: text
    content: 'This is he who was spoken of through the prophet Isaiah:'
  - type: text
    content: “A voice of one calling in the wilderness,
  - type: text
    content: ‘Prepare the way for the Lord,
  - type: text
    content: make straight paths for him.’ ”
  - type: note
    content: Isaiah 40:3
  '4':
  - type: text
    content: 'John’s clothes were made of camel’s hair, and he had a leather belt around his waist. His food was locusts and wild honey. '
  '5':
  - type: text
    content: 'People went out to him from Jerusalem and all Judea and the whole region of the Jordan. '
  '6':
  - type: text
    content: Confessing their sins, they were baptized by him in the Jordan River.
  '7':
  - type: text
    content: 'But when he saw many of the Pharisees and Sadducees coming to where he was baptizing, he said to them: “You brood of vipers! Who warned you to flee from the coming wrath? '
  '8':
  - type: text
    content: 'Produce fruit in keeping with repentance. '
  '9':
  - type: text
    content: 'And do not think you can say to yourselves, ‘We have Abraham as our father.’ I tell you that out of these stones God can raise up children for Abraham. '
