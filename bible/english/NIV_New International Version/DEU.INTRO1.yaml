  children:
  - type: text
    text: Intro
- type: usfm
  marker: im
  children:
  - type: text
    text: 'The book of Deuteronomy records the great speech Moses gives just before his death. He addresses the generation of Israelites who grew up in the wilderness just as they are preparing to enter the land of Canaan. God wants this promised land to show what renewed life under God’s blessing looks like. The book presents the covenant in a form commonly used by rulers of the time to make treaties with those they ruled over. The standard form of these treaties included five elements:'
- type: usfm
  marker: ili1
  children:
  - type: text
    text: : The great ruler is identified by name and title.
- type: usfm
  marker: ili1
  children:
  - type: text
    text: : The history and mighty acts of the great ruler are told.
- type: usfm
  marker: ili1
  children:
  - type: text
    text: : The allegiance and specific duties expected of the ruler’s servants are spelled out.
- type: usfm
  marker: ili1
  children:
  - type: text
    text: : Blessings for keeping the treaty and curses for breaking it are listed.
- type: usfm
  marker: ili1
  children:
  - type: text
    text: : Provisions for continuing the covenant with future generations are laid out.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Deuteronomy follows this pattern very closely. Moses is identified as the representative of the Great King—the God of Israel—whose mighty acts for his people are recalled. Moses reminds them to give exclusive allegiance to their king and lists their duties. He then calls on the people to join in a sacred oath to ratify the covenant. After naming a successor and climbing a mountain to look out over the land, Moses dies. The people of Israel stand on the edge of their inheritance, the promise of a new creation before them.
