document_id: JOS.10,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Sun Stands Still
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now Adoni-Zedek king of Jerusalem heard that Joshua had taken Ai and totally destroyed
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term refers to the irrevocable giving over of things or persons to the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ', often by totally destroying them; also in verses 28, 35, 37, 39 and 40.'
      marker-yv: yv-n
    - type: text
      text: ' it, doing to Ai and its king as he had done to Jericho and its king, and that the people of Gibeon had made a treaty of peace with Israel and had become their allies. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' threw them into confusion before Israel, so Joshua and the Israelites defeated them completely at Gibeon. Israel pursued them along the road going up to Beth Horon and cut them down all the way to Azekah and Makkedah. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As they fled before Israel on the road down from Beth Horon to Azekah, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' hurled large hailstones down on them, and more of them died from the hail than were killed by the swords of the Israelites.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On the day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave the Amorites over to Israel, Joshua said to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in the presence of Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Sun, stand still over Gibeon,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you, moon, over the Valley of Aijalon.”
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: So the sun stood still,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the moon stopped,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: till the nation avenged itself on
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nation triumphed over
      marker-yv: yv-n
    - type: text
      text: ' its enemies,'
  - type: usfm
    marker: m
    children:
    - type: text
      text: as it is written in the Book of Jashar.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The sun stopped in the middle of the sky and delayed going down about a full day. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There has never been a day like it before or since, a day when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' listened to a human being. Surely the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was fighting for Israel!'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Joshua returned with all Israel to the camp at Gilgal.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Five Amorite Kings Killed
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now the five kings had fled and hidden in the cave at Makkedah. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Joshua was told that the five kings had been found hiding in the cave at Makkedah, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'he said, “Roll large rocks up to the mouth of the cave, and post some men there to guard it. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But don’t stop; pursue your enemies! Attack them from the rear and don’t let them reach their cities, for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has given them into your hand.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He and his people were very much alarmed at this, because Gibeon was an important city, like one of the royal cities; it was larger than Ai, and all its men were good fighters. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joshua and the Israelites defeated them completely, but a few survivors managed to reach their fortified cities. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The whole army then returned safely to Joshua in the camp at Makkedah, and no one uttered a word against the Israelites.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua said, “Open the mouth of the cave and bring those five kings out to me.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So they brought the five kings out of the cave—the kings of Jerusalem, Hebron, Jarmuth, Lachish and Eglon. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When they had brought these kings to Joshua, he summoned all the men of Israel and said to the army commanders who had come with him, “Come here and put your feet on the necks of these kings.” So they came forward and placed their feet on their necks.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua said to them, “Do not be afraid; do not be discouraged. Be strong and courageous. This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will do to all the enemies you are going to fight.” '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Joshua put the kings to death and exposed their bodies on five poles, and they were left hanging on the poles until evening.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: At sunset Joshua gave the order and they took them down from the poles and threw them into the cave where they had been hiding. At the mouth of the cave they placed large rocks, which are there to this day.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Southern Cities Conquered
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That day Joshua took Makkedah. He put the city and its king to the sword and totally destroyed everyone in it. He left no survivors. And he did to the king of Makkedah as he had done to the king of Jericho.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joshua and all Israel with him moved on from Makkedah to Libnah and attacked it. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Adoni-Zedek king of Jerusalem appealed to Hoham king of Hebron, Piram king of Jarmuth, Japhia king of Lachish and Debir king of Eglon. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' also gave that city and its king into Israel’s hand. The city and everyone in it Joshua put to the sword. He left no survivors there. And he did to its king as he had done to the king of Jericho.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joshua and all Israel with him moved on from Libnah to Lachish; he took up positions against it and attacked it. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave Lachish into Israel’s hands, and Joshua took it on the second day. The city and everyone in it he put to the sword, just as he had done to Libnah. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Meanwhile, Horam king of Gezer had come up to help Lachish, but Joshua defeated him and his army—until no survivors were left.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joshua and all Israel with him moved on from Lachish to Eglon; they took up positions against it and attacked it. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They captured it that same day and put it to the sword and totally destroyed everyone in it, just as they had done to Lachish.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joshua and all Israel with him went up from Eglon to Hebron and attacked it. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They took the city and put it to the sword, together with its king, its villages and everyone in it. They left no survivors. Just as at Eglon, they totally destroyed it and everyone in it.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joshua and all Israel with him turned around and attacked Debir. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They took the city, its king and its villages, and put them to the sword. Everyone in it they totally destroyed. They left no survivors. They did to Debir and its king as they had done to Libnah and its king and to Hebron.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Come up and help me attack Gibeon,” he said, “because it has made peace with Joshua and the Israelites.”
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joshua subdued the whole region, including the hill country, the Negev, the western foothills and the mountain slopes, together with all their kings. He left no survivors. He totally destroyed all who breathed, just as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, had commanded. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua subdued them from Kadesh Barnea to Gaza and from the whole region of Goshen to Gibeon. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All these kings and their lands Joshua conquered in one campaign, because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, fought for Israel.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Joshua returned with all Israel to the camp at Gilgal.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the five kings of the Amorites—the kings of Jerusalem, Hebron, Jarmuth, Lachish and Eglon—joined forces. They moved up with all their troops and took up positions against Gibeon and attacked it.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Gibeonites then sent word to Joshua in the camp at Gilgal: “Do not abandon your servants. Come up to us quickly and save us! Help us, because all the Amorite kings from the hill country have joined forces against us.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joshua marched up from Gilgal with his entire army, including all the best fighting men. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Joshua, “Do not be afraid of them; I have given them into your hand. Not one of them will be able to withstand you.”'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After an all-night march from Gilgal, Joshua took them by surprise. '
