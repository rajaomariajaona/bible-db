document_id: 1SA.14,111
type_code: eng
verses:
  '1':
  - type: text
    content: One day Jonathan son of Saul said to his young armor-bearer, “Come, let’s go over to the Philistine outpost on the other side.” But he did not tell his father.
  '10':
  - type: text
    content: 'But if they say, ‘Come up to us,’ we will climb up, because that will be our sign that the '
  - type: text
    content: Lord
  - type: text
    content: ' has given them into our hands.”'
  '11':
  - type: text
    content: 'So both of them showed themselves to the Philistine outpost. “Look!” said the Philistines. “The Hebrews are crawling out of the holes they were hiding in.” '
  '12':
  - type: text
    content: The men of the outpost shouted to Jonathan and his armor-bearer, “Come up to us and we’ll teach you a lesson.”
  - type: text
    content: 'So Jonathan said to his armor-bearer, “Climb up after me; the '
  - type: text
    content: Lord
  - type: text
    content: ' has given them into the hand of Israel.”'
  '13':
  - type: text
    content: 'Jonathan climbed up, using his hands and feet, with his armor-bearer right behind him. The Philistines fell before Jonathan, and his armor-bearer followed and killed behind him. '
  '14':
  - type: text
    content: In that first attack Jonathan and his armor-bearer killed some twenty men in an area of about half an acre.
  - type: heading
    content: Israel Routs the Philistines
  '15':
  - type: text
    content: Then panic struck the whole army—those in the camp and field, and those in the outposts and raiding parties—and the ground shook. It was a panic sent by God.
  - type: note
    content: Or a terrible panic
  '16':
  - type: text
    content: 'Saul’s lookouts at Gibeah in Benjamin saw the army melting away in all directions. '
  '17':
  - type: text
    content: Then Saul said to the men who were with him, “Muster the forces and see who has left us.” When they did, it was Jonathan and his armor-bearer who were not there.
  '18':
  - type: text
    content: Saul said to Ahijah, “Bring the ark of God.” (At that time it was with the Israelites.)
  - type: note
    content: Hebrew; Septuagint “Bring the ephod.” (At that time he wore the ephod before the Israelites.)
  - type: text
    content: ' '
  '19':
  - type: text
    content: While Saul was talking to the priest, the tumult in the Philistine camp increased more and more. So Saul said to the priest, “Withdraw your hand.”
  '2':
  - type: text
    content: 'Saul was staying on the outskirts of Gibeah under a pomegranate tree in Migron. With him were about six hundred men, '
  '20':
  - type: text
    content: 'Then Saul and all his men assembled and went to the battle. They found the Philistines in total confusion, striking each other with their swords. '
  '21':
  - type: text
    content: 'Those Hebrews who had previously been with the Philistines and had gone up with them to their camp went over to the Israelites who were with Saul and Jonathan. '
  '22':
  - type: text
    content: 'When all the Israelites who had hidden in the hill country of Ephraim heard that the Philistines were on the run, they joined the battle in hot pursuit. '
  '23':
  - type: text
    content: 'So on that day the '
  - type: text
    content: Lord
  - type: text
    content: ' saved Israel, and the battle moved on beyond Beth Aven.'
  - type: heading
    content: Jonathan Eats Honey
  '24':
  - type: text
    content: Now the Israelites were in distress that day, because Saul had bound the people under an oath, saying, “Cursed be anyone who eats food before evening comes, before I have avenged myself on my enemies!” So none of the troops tasted food.
  '25':
  - type: text
    content: 'The entire army entered the woods, and there was honey on the ground. '
  '26':
  - type: text
    content: 'When they went into the woods, they saw the honey oozing out; yet no one put his hand to his mouth, because they feared the oath. '
  '27':
  - type: text
    content: But Jonathan had not heard that his father had bound the people with the oath, so he reached out the end of the staff that was in his hand and dipped it into the honeycomb. He raised his hand to his mouth, and his eyes brightened.
  - type: note
    content: Or his strength was renewed; similarly in verse 29
  - type: text
    content: ' '
  '28':
  - type: text
    content: Then one of the soldiers told him, “Your father bound the army under a strict oath, saying, ‘Cursed be anyone who eats food today!’ That is why the men are faint.”
  '29':
  - type: text
    content: 'Jonathan said, “My father has made trouble for the country. See how my eyes brightened when I tasted a little of this honey. '
  '3':
  - type: text
    content: 'among whom was Ahijah, who was wearing an ephod. He was a son of Ichabod’s brother Ahitub son of Phinehas, the son of Eli, the '
  - type: text
    content: Lord
  - type: text
    content: ’s priest in Shiloh. No one was aware that Jonathan had left.
  '30':
  - type: text
    content: How much better it would have been if the men had eaten today some of the plunder they took from their enemies. Would not the slaughter of the Philistines have been even greater?”
  '31':
  - type: text
    content: 'That day, after the Israelites had struck down the Philistines from Mikmash to Aijalon, they were exhausted. '
  '32':
  - type: text
    content: 'They pounced on the plunder and, taking sheep, cattle and calves, they butchered them on the ground and ate them, together with the blood. '
  '33':
  - type: text
    content: 'Then someone said to Saul, “Look, the men are sinning against the '
  - type: text
    content: Lord
  - type: text
    content: ' by eating meat that has blood in it.”'
  - type: text
    content: '“You have broken faith,” he said. “Roll a large stone over here at once.” '
  '34':
  - type: text
    content: 'Then he said, “Go out among the men and tell them, ‘Each of you bring me your cattle and sheep, and slaughter them here and eat them. Do not sin against the '
  - type: text
    content: Lord
  - type: text
    content: ' by eating meat with blood still in it.’ ”'
  - type: text
    content: 'So everyone brought his ox that night and slaughtered it there. '
  '35':
  - type: text
    content: 'Then Saul built an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ; it was the first time he had done this.
  '36':
  - type: text
    content: Saul said, “Let us go down and pursue the Philistines by night and plunder them till dawn, and let us not leave one of them alive.”
  - type: text
    content: “Do whatever seems best to you,” they replied.
  - type: text
    content: But the priest said, “Let us inquire of God here.”
  '37':
  - type: text
    content: So Saul asked God, “Shall I go down and pursue the Philistines? Will you give them into Israel’s hand?” But God did not answer him that day.
  '38':
  - type: text
    content: 'Saul therefore said, “Come here, all you who are leaders of the army, and let us find out what sin has been committed today. '
  '39':
  - type: text
    content: 'As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' who rescues Israel lives, even if the guilt lies with my son Jonathan, he must die.” But not one of them said a word.'
  '4':
  - type: text
    content: 'On each side of the pass that Jonathan intended to cross to reach the Philistine outpost was a cliff; one was called Bozez and the other Seneh. '
  '40':
  - type: text
    content: Saul then said to all the Israelites, “You stand over there; I and Jonathan my son will stand over here.”
  - type: text
    content: “Do what seems best to you,” they replied.
  '41':
  - type: text
    content: 'Then Saul prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, “Why have you not answered your servant today? If the fault is in me or my son Jonathan, respond with Urim, but if the men of Israel are at fault,'
  - type: note
    content: Septuagint; Hebrew does not have “Why… at fault.
  - type: text
    content: ' respond with Thummim.” Jonathan and Saul were taken by lot, and the men were cleared. '
  '42':
  - type: text
    content: Saul said, “Cast the lot between me and Jonathan my son.” And Jonathan was taken.
  '43':
  - type: text
    content: Then Saul said to Jonathan, “Tell me what you have done.”
  - type: text
    content: So Jonathan told him, “I tasted a little honey with the end of my staff. And now I must die!”
  '44':
  - type: text
    content: Saul said, “May God deal with me, be it ever so severely, if you do not die, Jonathan.”
  '45':
  - type: text
    content: 'But the men said to Saul, “Should Jonathan die—he who has brought about this great deliverance in Israel? Never! As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, not a hair of his head will fall to the ground, for he did this today with God’s help.” So the men rescued Jonathan, and he was not put to death.'
  '46':
  - type: text
    content: Then Saul stopped pursuing the Philistines, and they withdrew to their own land.
  '47':
  - type: text
    content: 'After Saul had assumed rule over Israel, he fought against their enemies on every side: Moab, the Ammonites, Edom, the kings'
  - type: note
    content: Masoretic Text; Dead Sea Scrolls and Septuagint king
  - type: text
    content: ' of Zobah, and the Philistines. Wherever he turned, he inflicted punishment on them.'
  - type: note
    content: Hebrew; Septuagint he was victorious
  - type: text
    content: ' '
  '48':
  - type: text
    content: He fought valiantly and defeated the Amalekites, delivering Israel from the hands of those who had plundered them.
  - type: heading
    content: Saul’s Family
  '49':
  - type: text
    content: 'Saul’s sons were Jonathan, Ishvi and Malki-Shua. The name of his older daughter was Merab, and that of the younger was Michal. '
  '5':
  - type: text
    content: One cliff stood to the north toward Mikmash, the other to the south toward Geba.
  '50':
  - type: text
    content: 'His wife’s name was Ahinoam daughter of Ahimaaz. The name of the commander of Saul’s army was Abner son of Ner, and Ner was Saul’s uncle. '
  '51':
  - type: text
    content: Saul’s father Kish and Abner’s father Ner were sons of Abiel.
  '52':
  - type: text
    content: All the days of Saul there was bitter war with the Philistines, and whenever Saul saw a mighty or brave man, he took him into his service.
  '6':
  - type: text
    content: 'Jonathan said to his young armor-bearer, “Come, let’s go over to the outpost of those uncircumcised men. Perhaps the '
  - type: text
    content: Lord
  - type: text
    content: ' will act in our behalf. Nothing can hinder the '
  - type: text
    content: Lord
  - type: text
    content: ' from saving, whether by many or by few.”'
  '7':
  - type: text
    content: “Do all that you have in mind,” his armor-bearer said. “Go ahead; I am with you heart and soul.”
  '8':
  - type: text
    content: 'Jonathan said, “Come on, then; we will cross over toward them and let them see us. '
  '9':
  - type: text
    content: 'If they say to us, ‘Wait there until we come to you,’ we will stay where we are and not go up to them. '
