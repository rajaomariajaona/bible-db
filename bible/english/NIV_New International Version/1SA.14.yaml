document_id: 1SA.14,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: One day Jonathan son of Saul said to his young armor-bearer, “Come, let’s go over to the Philistine outpost on the other side.” But he did not tell his father.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But if they say, ‘Come up to us,’ we will climb up, because that will be our sign that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given them into our hands.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So both of them showed themselves to the Philistine outpost. “Look!” said the Philistines. “The Hebrews are crawling out of the holes they were hiding in.” '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The men of the outpost shouted to Jonathan and his armor-bearer, “Come up to us and we’ll teach you a lesson.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Jonathan said to his armor-bearer, “Climb up after me; the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given them into the hand of Israel.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonathan climbed up, using his hands and feet, with his armor-bearer right behind him. The Philistines fell before Jonathan, and his armor-bearer followed and killed behind him. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In that first attack Jonathan and his armor-bearer killed some twenty men in an area of about half an acre.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel Routs the Philistines
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then panic struck the whole army—those in the camp and field, and those in the outposts and raiding parties—and the ground shook. It was a panic sent by God.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a terrible panic
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul’s lookouts at Gibeah in Benjamin saw the army melting away in all directions. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Saul said to the men who were with him, “Muster the forces and see who has left us.” When they did, it was Jonathan and his armor-bearer who were not there.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul said to Ahijah, “Bring the ark of God.” (At that time it was with the Israelites.)
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew; Septuagint '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: “Bring the ephod.” (At that time he wore the ephod before the Israelites.)
      marker-yv: yv-n
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: While Saul was talking to the priest, the tumult in the Philistine camp increased more and more. So Saul said to the priest, “Withdraw your hand.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul was staying on the outskirts of Gibeah under a pomegranate tree in Migron. With him were about six hundred men, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Saul and all his men assembled and went to the battle. They found the Philistines in total confusion, striking each other with their swords. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Those Hebrews who had previously been with the Philistines and had gone up with them to their camp went over to the Israelites who were with Saul and Jonathan. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When all the Israelites who had hidden in the hill country of Ephraim heard that the Philistines were on the run, they joined the battle in hot pursuit. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So on that day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' saved Israel, and the battle moved on beyond Beth Aven.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jonathan Eats Honey
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now the Israelites were in distress that day, because Saul had bound the people under an oath, saying, “Cursed be anyone who eats food before evening comes, before I have avenged myself on my enemies!” So none of the troops tasted food.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The entire army entered the woods, and there was honey on the ground. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they went into the woods, they saw the honey oozing out; yet no one put his hand to his mouth, because they feared the oath. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Jonathan had not heard that his father had bound the people with the oath, so he reached out the end of the staff that was in his hand and dipped it into the honeycomb. He raised his hand to his mouth, and his eyes brightened.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: his strength was renewed
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; similarly in verse 29
      marker-yv: yv-n
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then one of the soldiers told him, “Your father bound the army under a strict oath, saying, ‘Cursed be anyone who eats food today!’ That is why the men are faint.”
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonathan said, “My father has made trouble for the country. See how my eyes brightened when I tasted a little of this honey. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'among whom was Ahijah, who was wearing an ephod. He was a son of Ichabod’s brother Ahitub son of Phinehas, the son of Eli, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s priest in Shiloh. No one was aware that Jonathan had left.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: How much better it would have been if the men had eaten today some of the plunder they took from their enemies. Would not the slaughter of the Philistines have been even greater?”
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'That day, after the Israelites had struck down the Philistines from Mikmash to Aijalon, they were exhausted. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They pounced on the plunder and, taking sheep, cattle and calves, they butchered them on the ground and ate them, together with the blood. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then someone said to Saul, “Look, the men are sinning against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by eating meat that has blood in it.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You have broken faith,” he said. “Roll a large stone over here at once.” '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he said, “Go out among the men and tell them, ‘Each of you bring me your cattle and sheep, and slaughter them here and eat them. Do not sin against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' by eating meat with blood still in it.’ ”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So everyone brought his ox that night and slaughtered it there. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Saul built an altar to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ; it was the first time he had done this.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul said, “Let us go down and pursue the Philistines by night and plunder them till dawn, and let us not leave one of them alive.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Do whatever seems best to you,” they replied.
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the priest said, “Let us inquire of God here.”
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Saul asked God, “Shall I go down and pursue the Philistines? Will you give them into Israel’s hand?” But God did not answer him that day.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul therefore said, “Come here, all you who are leaders of the army, and let us find out what sin has been committed today. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who rescues Israel lives, even if the guilt lies with my son Jonathan, he must die.” But not one of them said a word.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On each side of the pass that Jonathan intended to cross to reach the Philistine outpost was a cliff; one was called Bozez and the other Seneh. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul then said to all the Israelites, “You stand over there; I and Jonathan my son will stand over here.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Do what seems best to you,” they replied.
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Saul prayed to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, “Why have you not answered your servant today? If the fault is in me or my son Jonathan, respond with Urim, but if the men of Israel are at fault,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint; Hebrew does not have '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: “Why… at fault
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' respond with Thummim.” Jonathan and Saul were taken by lot, and the men were cleared. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul said, “Cast the lot between me and Jonathan my son.” And Jonathan was taken.
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Saul said to Jonathan, “Tell me what you have done.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Jonathan told him, “I tasted a little honey with the end of my staff. And now I must die!”
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul said, “May God deal with me, be it ever so severely, if you do not die, Jonathan.”
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But the men said to Saul, “Should Jonathan die—he who has brought about this great deliverance in Israel? Never! As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives, not a hair of his head will fall to the ground, for he did this today with God’s help.” So the men rescued Jonathan, and he was not put to death.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Saul stopped pursuing the Philistines, and they withdrew to their own land.
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After Saul had assumed rule over Israel, he fought against their enemies on every side: Moab, the Ammonites, Edom, the kings'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:47 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Masoretic Text; Dead Sea Scrolls and Septuagint '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: king
      marker-yv: yv-n
    - type: text
      text: ' of Zobah, and the Philistines. Wherever he turned, he inflicted punishment on them.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:47 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew; Septuagint '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: he was victorious
      marker-yv: yv-n
    - type: text
      text: ' '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He fought valiantly and defeated the Amalekites, delivering Israel from the hands of those who had plundered them.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saul’s Family
    marker-yv: yv-h
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul’s sons were Jonathan, Ishvi and Malki-Shua. The name of his older daughter was Merab, and that of the younger was Michal. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: One cliff stood to the north toward Mikmash, the other to the south toward Geba.
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His wife’s name was Ahinoam daughter of Ahimaaz. The name of the commander of Saul’s army was Abner son of Ner, and Ner was Saul’s uncle. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saul’s father Kish and Abner’s father Ner were sons of Abiel.
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All the days of Saul there was bitter war with the Philistines, and whenever Saul saw a mighty or brave man, he took him into his service.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonathan said to his young armor-bearer, “Come, let’s go over to the outpost of those uncircumcised men. Perhaps the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will act in our behalf. Nothing can hinder the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' from saving, whether by many or by few.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Do all that you have in mind,” his armor-bearer said. “Go ahead; I am with you heart and soul.”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jonathan said, “Come on, then; we will cross over toward them and let them see us. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If they say to us, ‘Wait there until we come to you,’ we will stay where we are and not go up to them. '
