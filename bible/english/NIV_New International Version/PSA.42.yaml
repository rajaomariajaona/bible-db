type_code: eng
verses:
  '1':
  - type: heading
    content: BOOK II
  - type: heading
    content: Psalms 42–72
  - type: heading
    content: Psalm 42In many Hebrew manuscripts Psalms 42 and 43 constitute one psalm.In Hebrew texts 42:1-11 is numbered 42:2-12.
  - type: text
    content: 'For the director of music. A '
  - type: text
    content: maskil
  - type: note
    content: 'Title: Probably a literary or musical term'
  - type: text
    content: ' of the Sons of Korah.'
  - type: text
    content: As the deer pants for streams of water,
  - type: text
    content: so my soul pants for you, my God.
  '10':
  - type: text
    content: My bones suffer mortal agony
  - type: text
    content: as my foes taunt me,
  - type: text
    content: saying to me all day long,
  - type: text
    content: “Where is your God?”
  '11':
  - type: text
    content: Why, my soul, are you downcast?
  - type: text
    content: Why so disturbed within me?
  - type: text
    content: Put your hope in God,
  - type: text
    content: for I will yet praise him,
  - type: text
    content: my Savior and my God.
  '2':
  - type: text
    content: My soul thirsts for God, for the living God.
  - type: text
    content: When can I go and meet with God?
  '3':
  - type: text
    content: My tears have been my food
  - type: text
    content: day and night,
  - type: text
    content: while people say to me all day long,
  - type: text
    content: “Where is your God?”
  '4':
  - type: text
    content: These things I remember
  - type: text
    content: 'as I pour out my soul:'
  - type: text
    content: how I used to go to the house of God
  - type: text
    content: under the protection of the Mighty One
  - type: note
    content: See Septuagint and Syriac; the meaning of the Hebrew for this line is uncertain.
  - type: text
    content: with shouts of joy and praise
  - type: text
    content: among the festive throng.
  '5':
  - type: text
    content: Why, my soul, are you downcast?
  - type: text
    content: Why so disturbed within me?
  - type: text
    content: Put your hope in God,
  - type: text
    content: for I will yet praise him,
  - type: text
    content: my Savior and my God.
  '6':
  - type: text
    content: My soul is downcast within me;
  - type: text
    content: therefore I will remember you
  - type: text
    content: from the land of the Jordan,
  - type: text
    content: the heights of Hermon—from Mount Mizar.
  '7':
  - type: text
    content: Deep calls to deep
  - type: text
    content: in the roar of your waterfalls;
  - type: text
    content: all your waves and breakers
  - type: text
    content: have swept over me.
  '8':
  - type: text
    content: 'By day the '
  - type: text
    content: Lord
  - type: text
    content: ' directs his love,'
  - type: text
    content: at night his song is with me—
  - type: text
    content: a prayer to the God of my life.
  '9':
  - type: text
    content: I say to God my Rock,
  - type: text
    content: “Why have you forgotten me?
  - type: text
    content: Why must I go about mourning,
  - type: text
    content: oppressed by the enemy?”
