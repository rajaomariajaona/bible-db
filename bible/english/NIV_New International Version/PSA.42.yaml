document_id: PSA.42,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: BOOK II
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: Psalms 42–72
    marker-yv: yv-h
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 42
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In many Hebrew manuscripts Psalms 42 and 43 constitute one psalm.
      marker-yv: yv-n
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 42:1-11 is numbered 42:2-12.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'For the director of music. A '
    - type: usfm
      marker: tl
      children:
      - type: text
        text: maskil
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Title: Probably a literary or musical term'
      marker-yv: yv-n
    - type: text
      text: ' of the Sons of Korah.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: As the deer pants for streams of water,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so my soul pants for you, my God.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My bones suffer mortal agony
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as my foes taunt me,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: saying to me all day long,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Where is your God?”
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why, my soul, are you downcast?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why so disturbed within me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Put your hope in God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I will yet praise him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my Savior and my God.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My soul thirsts for God, for the living God.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When can I go and meet with God?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My tears have been my food
  - type: usfm
    marker: q2
    children:
    - type: text
      text: day and night,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: while people say to me all day long,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Where is your God?”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: These things I remember
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'as I pour out my soul:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: how I used to go to the house of God
  - type: usfm
    marker: q2
    children:
    - type: text
      text: under the protection of the Mighty One
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Septuagint and Syriac; the meaning of the Hebrew for this line is uncertain.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with shouts of joy and praise
  - type: usfm
    marker: q2
    children:
    - type: text
      text: among the festive throng.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why, my soul, are you downcast?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Why so disturbed within me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Put your hope in God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I will yet praise him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my Savior and my God.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My soul is downcast within me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: therefore I will remember you
  - type: usfm
    marker: q1
    children:
    - type: text
      text: from the land of the Jordan,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the heights of Hermon—from Mount Mizar.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Deep calls to deep
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the roar of your waterfalls;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all your waves and breakers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: have swept over me.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'By day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' directs his love,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at night his song is with me—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a prayer to the God of my life.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I say to God my Rock,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Why have you forgotten me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Why must I go about mourning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: oppressed by the enemy?”
