document_id: EST.6,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mordecai Honored
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'That night the king could not sleep; so he ordered the book of the chronicles, the record of his reign, to be brought in and read to him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: “Go at once,” the king commanded Haman. “Get the robe and the horse and do just as you have suggested for Mordecai the Jew, who sits at the king’s gate. Do not neglect anything you have recommended.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: So Haman got the robe and the horse. He robed Mordecai, and led him on horseback through the city streets, proclaiming before him, “This is what is done for the man the king delights to honor!”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Afterward Mordecai returned to the king’s gate. But Haman rushed home, with his head covered in grief, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: and told Zeresh his wife and all his friends everything that had happened to him.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'His advisers and his wife Zeresh said to him, “Since Mordecai, before whom your downfall has started, is of Jewish origin, you cannot stand against him—you will surely come to ruin!” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: While they were still talking with him, the king’s eunuchs arrived and hurried Haman away to the banquet Esther had prepared.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: It was found recorded there that Mordecai had exposed Bigthana and Teresh, two of the king’s officers who guarded the doorway, who had conspired to assassinate King Xerxes.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: “What honor and recognition has Mordecai received for this?” the king asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Nothing has been done for him,” his attendants answered.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: The king said, “Who is in the court?” Now Haman had just entered the outer court of the palace to speak to the king about impaling Mordecai on the pole he had set up for him.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: His attendants answered, “Haman is standing in the court.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Bring him in,” the king ordered.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: When Haman entered, the king asked him, “What should be done for the man the king delights to honor?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Haman thought to himself, “Who is there that the king would rather honor than me?” '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So he answered the king, “For the man the king delights to honor, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'have them bring a royal robe the king has worn and a horse the king has ridden, one with a royal crest placed on its head. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Then let the robe and horse be entrusted to one of the king’s most noble princes. Let them robe the man the king delights to honor, and lead him on the horse through the city streets, proclaiming before him, ‘This is what is done for the man the king delights to honor!’ ”
