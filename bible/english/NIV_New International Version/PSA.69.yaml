document_id: PSA.69,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 69In Hebrew texts 69:1-36 is numbered 69:2-37.
  - type: text
    content: For the director of music. To the tune of “Lilies.” Of David.
  - type: text
    content: Save me, O God,
  - type: text
    content: for the waters have come up to my neck.
  '10':
  - type: text
    content: When I weep and fast,
  - type: text
    content: I must endure scorn;
  '11':
  - type: text
    content: when I put on sackcloth,
  - type: text
    content: people make sport of me.
  '12':
  - type: text
    content: Those who sit at the gate mock me,
  - type: text
    content: and I am the song of the drunkards.
  '13':
  - type: text
    content: 'But I pray to you, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: in the time of your favor;
  - type: text
    content: in your great love, O God,
  - type: text
    content: answer me with your sure salvation.
  '14':
  - type: text
    content: Rescue me from the mire,
  - type: text
    content: do not let me sink;
  - type: text
    content: deliver me from those who hate me,
  - type: text
    content: from the deep waters.
  '15':
  - type: text
    content: Do not let the floodwaters engulf me
  - type: text
    content: or the depths swallow me up
  - type: text
    content: or the pit close its mouth over me.
  '16':
  - type: text
    content: 'Answer me, '
  - type: text
    content: Lord
  - type: text
    content: ', out of the goodness of your love;'
  - type: text
    content: in your great mercy turn to me.
  '17':
  - type: text
    content: Do not hide your face from your servant;
  - type: text
    content: answer me quickly, for I am in trouble.
  '18':
  - type: text
    content: Come near and rescue me;
  - type: text
    content: deliver me because of my foes.
  '19':
  - type: text
    content: You know how I am scorned, disgraced and shamed;
  - type: text
    content: all my enemies are before you.
  '2':
  - type: text
    content: I sink in the miry depths,
  - type: text
    content: where there is no foothold.
  - type: text
    content: I have come into the deep waters;
  - type: text
    content: the floods engulf me.
  '20':
  - type: text
    content: Scorn has broken my heart
  - type: text
    content: and has left me helpless;
  - type: text
    content: I looked for sympathy, but there was none,
  - type: text
    content: for comforters, but I found none.
  '21':
  - type: text
    content: They put gall in my food
  - type: text
    content: and gave me vinegar for my thirst.
  '22':
  - type: text
    content: May the table set before them become a snare;
  - type: text
    content: may it become retribution and
  - type: note
    content: Or snare / and their fellowship become
  - type: text
    content: ' a trap.'
  '23':
  - type: text
    content: May their eyes be darkened so they cannot see,
  - type: text
    content: and their backs be bent forever.
  '24':
  - type: text
    content: Pour out your wrath on them;
  - type: text
    content: let your fierce anger overtake them.
  '25':
  - type: text
    content: May their place be deserted;
  - type: text
    content: let there be no one to dwell in their tents.
  '26':
  - type: text
    content: For they persecute those you wound
  - type: text
    content: and talk about the pain of those you hurt.
  '27':
  - type: text
    content: Charge them with crime upon crime;
  - type: text
    content: do not let them share in your salvation.
  '28':
  - type: text
    content: May they be blotted out of the book of life
  - type: text
    content: and not be listed with the righteous.
  '29':
  - type: text
    content: But as for me, afflicted and in pain—
  - type: text
    content: may your salvation, God, protect me.
  '3':
  - type: text
    content: I am worn out calling for help;
  - type: text
    content: my throat is parched.
  - type: text
    content: My eyes fail,
  - type: text
    content: looking for my God.
  '30':
  - type: text
    content: I will praise God’s name in song
  - type: text
    content: and glorify him with thanksgiving.
  '31':
  - type: text
    content: 'This will please the '
  - type: text
    content: Lord
  - type: text
    content: ' more than an ox,'
  - type: text
    content: more than a bull with its horns and hooves.
  '32':
  - type: text
    content: The poor will see and be glad—
  - type: text
    content: you who seek God, may your hearts live!
  '33':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' hears the needy'
  - type: text
    content: and does not despise his captive people.
  '34':
  - type: text
    content: Let heaven and earth praise him,
  - type: text
    content: the seas and all that move in them,
  '35':
  - type: text
    content: for God will save Zion
  - type: text
    content: and rebuild the cities of Judah.
  - type: text
    content: Then people will settle there and possess it;
  '36':
  - type: text
    content: the children of his servants will inherit it,
  - type: text
    content: and those who love his name will dwell there.
  '4':
  - type: text
    content: Those who hate me without reason
  - type: text
    content: outnumber the hairs of my head;
  - type: text
    content: many are my enemies without cause,
  - type: text
    content: those who seek to destroy me.
  - type: text
    content: I am forced to restore
  - type: text
    content: what I did not steal.
  '5':
  - type: text
    content: You, God, know my folly;
  - type: text
    content: my guilt is not hidden from you.
  '6':
  - type: text
    content: 'Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty,'
  - type: text
    content: may those who hope in you
  - type: text
    content: not be disgraced because of me;
  - type: text
    content: God of Israel,
  - type: text
    content: may those who seek you
  - type: text
    content: not be put to shame because of me.
  '7':
  - type: text
    content: For I endure scorn for your sake,
  - type: text
    content: and shame covers my face.
  '8':
  - type: text
    content: I am a foreigner to my own family,
  - type: text
    content: a stranger to my own mother’s children;
  '9':
  - type: text
    content: for zeal for your house consumes me,
  - type: text
    content: and the insults of those who insult you fall on me.
