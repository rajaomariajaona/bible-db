document_id: PSA.69,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 69
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 69:1-36 is numbered 69:2-37.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the director of music. To the tune of “Lilies.” Of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Save me, O God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the waters have come up to my neck.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I weep and fast,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I must endure scorn;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when I put on sackcloth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: people make sport of me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who sit at the gate mock me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I am the song of the drunkards.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But I pray to you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the time of your favor;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in your great love, O God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: answer me with your sure salvation.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rescue me from the mire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not let me sink;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: deliver me from those who hate me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the deep waters.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not let the floodwaters engulf me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or the depths swallow me up
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or the pit close its mouth over me.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Answer me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', out of the goodness of your love;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in your great mercy turn to me.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not hide your face from your servant;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: answer me quickly, for I am in trouble.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Come near and rescue me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: deliver me because of my foes.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You know how I am scorned, disgraced and shamed;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all my enemies are before you.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I sink in the miry depths,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: where there is no foothold.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have come into the deep waters;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the floods engulf me.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Scorn has broken my heart
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and has left me helpless;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I looked for sympathy, but there was none,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for comforters, but I found none.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They put gall in my food
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and gave me vinegar for my thirst.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May the table set before them become a snare;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may it become retribution and
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '69:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: snare / and their fellowship become
      marker-yv: yv-n
    - type: text
      text: ' a trap.'
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May their eyes be darkened so they cannot see,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and their backs be bent forever.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour out your wrath on them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let your fierce anger overtake them.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May their place be deserted;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let there be no one to dwell in their tents.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For they persecute those you wound
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and talk about the pain of those you hurt.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Charge them with crime upon crime;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not let them share in your salvation.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May they be blotted out of the book of life
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and not be listed with the righteous.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But as for me, afflicted and in pain—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may your salvation, God, protect me.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am worn out calling for help;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my throat is parched.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My eyes fail,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: looking for my God.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will praise God’s name in song
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and glorify him with thanksgiving.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This will please the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' more than an ox,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: more than a bull with its horns and hooves.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The poor will see and be glad—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you who seek God, may your hearts live!
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' hears the needy'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and does not despise his captive people.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let heaven and earth praise him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the seas and all that move in them,
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for God will save Zion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and rebuild the cities of Judah.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Then people will settle there and possess it;
  '36':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the children of his servants will inherit it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and those who love his name will dwell there.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Those who hate me without reason
  - type: usfm
    marker: q2
    children:
    - type: text
      text: outnumber the hairs of my head;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: many are my enemies without cause,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: those who seek to destroy me.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am forced to restore
  - type: usfm
    marker: q2
    children:
    - type: text
      text: what I did not steal.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You, God, know my folly;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my guilt is not hidden from you.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may those who hope in you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not be disgraced because of me;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: God of Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may those who seek you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: not be put to shame because of me.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I endure scorn for your sake,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and shame covers my face.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I am a foreigner to my own family,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a stranger to my own mother’s children;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for zeal for your house consumes me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the insults of those who insult you fall on me.
