document_id: PSA.69
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 69
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 69:1-36 is numbered 69:2-37.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the director of music. To the tune of “Lilies.” Of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Save me, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for the waters have come up to my neck.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I sink in the miry depths,
- type: usfm
  marker: q2
  children:
  - type: text
    text: where there is no foothold.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have come into the deep waters;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the floods engulf me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I am worn out calling for help;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my throat is parched.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My eyes fail,
- type: usfm
  marker: q2
  children:
  - type: text
    text: looking for my God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Those who hate me without reason
- type: usfm
  marker: q2
  children:
  - type: text
    text: outnumber the hairs of my head;
- type: usfm
  marker: q1
  children:
  - type: text
    text: many are my enemies without cause,
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who seek to destroy me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am forced to restore
- type: usfm
  marker: q2
  children:
  - type: text
    text: what I did not steal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You, God, know my folly;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my guilt is not hidden from you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Lord, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: may those who hope in you
- type: usfm
  marker: q2
  children:
  - type: text
    text: not be disgraced because of me;
- type: usfm
  marker: q1
  children:
  - type: text
    text: God of Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: may those who seek you
- type: usfm
  marker: q2
  children:
  - type: text
    text: not be put to shame because of me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: For I endure scorn for your sake,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and shame covers my face.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: I am a foreigner to my own family,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a stranger to my own mother’s children;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: for zeal for your house consumes me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the insults of those who insult you fall on me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: When I weep and fast,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I must endure scorn;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: when I put on sackcloth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: people make sport of me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Those who sit at the gate mock me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I am the song of the drunkards.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'But I pray to you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the time of your favor;
- type: usfm
  marker: q1
  children:
  - type: text
    text: in your great love, O God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: answer me with your sure salvation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Rescue me from the mire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not let me sink;
- type: usfm
  marker: q1
  children:
  - type: text
    text: deliver me from those who hate me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the deep waters.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Do not let the floodwaters engulf me
- type: usfm
  marker: q2
  children:
  - type: text
    text: or the depths swallow me up
- type: usfm
  marker: q2
  children:
  - type: text
    text: or the pit close its mouth over me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Answer me, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', out of the goodness of your love;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: in your great mercy turn to me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Do not hide your face from your servant;
- type: usfm
  marker: q2
  children:
  - type: text
    text: answer me quickly, for I am in trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Come near and rescue me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: deliver me because of my foes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: You know how I am scorned, disgraced and shamed;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all my enemies are before you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Scorn has broken my heart
- type: usfm
  marker: q2
  children:
  - type: text
    text: and has left me helpless;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I looked for sympathy, but there was none,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for comforters, but I found none.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: They put gall in my food
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gave me vinegar for my thirst.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: May the table set before them become a snare;
- type: usfm
  marker: q2
  children:
  - type: text
    text: may it become retribution and
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '69:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: snare / and their fellowship become
    marker-yv: yv-n
  - type: text
    text: ' a trap.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: May their eyes be darkened so they cannot see,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their backs be bent forever.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Pour out your wrath on them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let your fierce anger overtake them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: May their place be deserted;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let there be no one to dwell in their tents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: For they persecute those you wound
- type: usfm
  marker: q2
  children:
  - type: text
    text: and talk about the pain of those you hurt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Charge them with crime upon crime;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not let them share in your salvation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: May they be blotted out of the book of life
- type: usfm
  marker: q2
  children:
  - type: text
    text: and not be listed with the righteous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: But as for me, afflicted and in pain—
- type: usfm
  marker: q2
  children:
  - type: text
    text: may your salvation, God, protect me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: I will praise God’s name in song
- type: usfm
  marker: q2
  children:
  - type: text
    text: and glorify him with thanksgiving.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'This will please the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' more than an ox,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: more than a bull with its horns and hooves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: The poor will see and be glad—
- type: usfm
  marker: q2
  children:
  - type: text
    text: you who seek God, may your hearts live!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' hears the needy'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and does not despise his captive people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Let heaven and earth praise him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the seas and all that move in them,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: for God will save Zion
- type: usfm
  marker: q2
  children:
  - type: text
    text: and rebuild the cities of Judah.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Then people will settle there and possess it;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: the children of his servants will inherit it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those who love his name will dwell there.
