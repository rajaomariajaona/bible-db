document_id: ACT.8,111
type_code: eng
verses:
  '1':
  - type: text
    content: And Saul approved of their killing him.
  - type: heading
    content: The Church Persecuted and Scattered
  - type: text
    content: 'On that day a great persecution broke out against the church in Jerusalem, and all except the apostles were scattered throughout Judea and Samaria. '
  '10':
  - type: text
    content: 'and all the people, both high and low, gave him their attention and exclaimed, “This man is rightly called the Great Power of God.” '
  '11':
  - type: text
    content: 'They followed him because he had amazed them for a long time with his sorcery. '
  '12':
  - type: text
    content: 'But when they believed Philip as he proclaimed the good news of the kingdom of God and the name of Jesus Christ, they were baptized, both men and women. '
  '13':
  - type: text
    content: Simon himself believed and was baptized. And he followed Philip everywhere, astonished by the great signs and miracles he saw.
  '14':
  - type: text
    content: 'When the apostles in Jerusalem heard that Samaria had accepted the word of God, they sent Peter and John to Samaria. '
  '15':
  - type: text
    content: 'When they arrived, they prayed for the new believers there that they might receive the Holy Spirit, '
  '16':
  - type: text
    content: 'because the Holy Spirit had not yet come on any of them; they had simply been baptized in the name of the Lord Jesus. '
  '17':
  - type: text
    content: Then Peter and John placed their hands on them, and they received the Holy Spirit.
  '18':
  - type: text
    content: 'When Simon saw that the Spirit was given at the laying on of the apostles’ hands, he offered them money '
  '19':
  - type: text
    content: and said, “Give me also this ability so that everyone on whom I lay my hands may receive the Holy Spirit.”
  '2':
  - type: text
    content: 'Godly men buried Stephen and mourned deeply for him. '
  '20':
  - type: text
    content: 'Peter answered: “May your money perish with you, because you thought you could buy the gift of God with money! '
  '21':
  - type: text
    content: 'You have no part or share in this ministry, because your heart is not right before God. '
  '22':
  - type: text
    content: 'Repent of this wickedness and pray to the Lord in the hope that he may forgive you for having such a thought in your heart. '
  '23':
  - type: text
    content: For I see that you are full of bitterness and captive to sin.”
  '24':
  - type: text
    content: Then Simon answered, “Pray to the Lord for me so that nothing you have said may happen to me.”
  '25':
  - type: text
    content: After they had further proclaimed the word of the Lord and testified about Jesus, Peter and John returned to Jerusalem, preaching the gospel in many Samaritan villages.
  - type: heading
    content: Philip and the Ethiopian
  '26':
  - type: text
    content: 'Now an angel of the Lord said to Philip, “Go south to the road—the desert road—that goes down from Jerusalem to Gaza.” '
  '27':
  - type: text
    content: So he started out, and on his way he met an Ethiopian
  - type: note
    content: That is, from the southern Nile region
  - type: text
    content: ' eunuch, an important official in charge of all the treasury of the Kandake (which means “queen of the Ethiopians”). This man had gone to Jerusalem to worship, '
  '28':
  - type: text
    content: 'and on his way home was sitting in his chariot reading the Book of Isaiah the prophet. '
  '29':
  - type: text
    content: The Spirit told Philip, “Go to that chariot and stay near it.”
  '3':
  - type: text
    content: But Saul began to destroy the church. Going from house to house, he dragged off both men and women and put them in prison.
  - type: heading
    content: Philip in Samaria
  '30':
  - type: text
    content: Then Philip ran up to the chariot and heard the man reading Isaiah the prophet. “Do you understand what you are reading?” Philip asked.
  '31':
  - type: text
    content: “How can I,” he said, “unless someone explains it to me?” So he invited Philip to come up and sit with him.
  '32':
  - type: text
    content: 'This is the passage of Scripture the eunuch was reading:'
  - type: text
    content: “He was led like a sheep to the slaughter,
  - type: text
    content: and as a lamb before its shearer is silent,
  - type: text
    content: so he did not open his mouth.
  '33':
  - type: text
    content: In his humiliation he was deprived of justice.
  - type: text
    content: Who can speak of his descendants?
  - type: text
    content: For his life was taken from the earth.”
  - type: note
    content: Isaiah 53:7,8 (see Septuagint)
  '34':
  - type: text
    content: 'The eunuch asked Philip, “Tell me, please, who is the prophet talking about, himself or someone else?” '
  '35':
  - type: text
    content: Then Philip began with that very passage of Scripture and told him the good news about Jesus.
  '36':
  - type: text
    content: 'As they traveled along the road, they came to some water and the eunuch said, “Look, here is water. What can stand in the way of my being baptized?” '
  '37':
  - type: note
    content: Some manuscripts include here Philip said, “If you believe with all your heart, you may.” The eunuch answered, “I believe that Jesus Christ is the Son of God.”
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'And he gave orders to stop the chariot. Then both Philip and the eunuch went down into the water and Philip baptized him. '
  '39':
  - type: text
    content: 'When they came up out of the water, the Spirit of the Lord suddenly took Philip away, and the eunuch did not see him again, but went on his way rejoicing. '
  '4':
  - type: text
    content: 'Those who had been scattered preached the word wherever they went. '
  '40':
  - type: text
    content: Philip, however, appeared at Azotus and traveled about, preaching the gospel in all the towns until he reached Caesarea.
  '5':
  - type: text
    content: 'Philip went down to a city in Samaria and proclaimed the Messiah there. '
  '6':
  - type: text
    content: 'When the crowds heard Philip and saw the signs he performed, they all paid close attention to what he said. '
  '7':
  - type: text
    content: 'For with shrieks, impure spirits came out of many, and many who were paralyzed or lame were healed. '
  '8':
  - type: text
    content: So there was great joy in that city.
  - type: heading
    content: Simon the Sorcerer
  '9':
  - type: text
    content: 'Now for some time a man named Simon had practiced sorcery in the city and amazed all the people of Samaria. He boasted that he was someone great, '
