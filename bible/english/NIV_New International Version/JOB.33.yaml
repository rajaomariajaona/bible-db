document_id: JOB.33,111
type_code: eng
verses:
  '1':
  - type: text
    content: “But now, Job, listen to my words;
  - type: text
    content: pay attention to everything I say.
  '10':
  - type: text
    content: Yet God has found fault with me;
  - type: text
    content: he considers me his enemy.
  '11':
  - type: text
    content: He fastens my feet in shackles;
  - type: text
    content: he keeps close watch on all my paths.’
  '12':
  - type: text
    content: “But I tell you, in this you are not right,
  - type: text
    content: for God is greater than any mortal.
  '13':
  - type: text
    content: Why do you complain to him
  - type: text
    content: that he responds to no one’s words
  - type: note
    content: Or that he does not answer for any of his actions
  - type: text
    content: '?'
  '14':
  - type: text
    content: For God does speak—now one way, now another—
  - type: text
    content: though no one perceives it.
  '15':
  - type: text
    content: In a dream, in a vision of the night,
  - type: text
    content: when deep sleep falls on people
  - type: text
    content: as they slumber in their beds,
  '16':
  - type: text
    content: he may speak in their ears
  - type: text
    content: and terrify them with warnings,
  '17':
  - type: text
    content: to turn them from wrongdoing
  - type: text
    content: and keep them from pride,
  '18':
  - type: text
    content: to preserve them from the pit,
  - type: text
    content: their lives from perishing by the sword.
  - type: note
    content: Or from crossing the river
  '19':
  - type: text
    content: “Or someone may be chastened on a bed of pain
  - type: text
    content: with constant distress in their bones,
  '2':
  - type: text
    content: I am about to open my mouth;
  - type: text
    content: my words are on the tip of my tongue.
  '20':
  - type: text
    content: so that their body finds food repulsive
  - type: text
    content: and their soul loathes the choicest meal.
  '21':
  - type: text
    content: Their flesh wastes away to nothing,
  - type: text
    content: and their bones, once hidden, now stick out.
  '22':
  - type: text
    content: They draw near to the pit,
  - type: text
    content: and their life to the messengers of death.
  - type: note
    content: Or to the place of the dead
  '23':
  - type: text
    content: Yet if there is an angel at their side,
  - type: text
    content: a messenger, one out of a thousand,
  - type: text
    content: sent to tell them how to be upright,
  '24':
  - type: text
    content: and he is gracious to that person and says to God,
  - type: text
    content: ‘Spare them from going down to the pit;
  - type: text
    content: I have found a ransom for them—
  '25':
  - type: text
    content: let their flesh be renewed like a child’s;
  - type: text
    content: let them be restored as in the days of their youth’—
  '26':
  - type: text
    content: then that person can pray to God and find favor with him,
  - type: text
    content: they will see God’s face and shout for joy;
  - type: text
    content: he will restore them to full well-being.
  '27':
  - type: text
    content: And they will go to others and say,
  - type: text
    content: ‘I have sinned, I have perverted what is right,
  - type: text
    content: but I did not get what I deserved.
  '28':
  - type: text
    content: God has delivered me from going down to the pit,
  - type: text
    content: and I shall live to enjoy the light of life.’
  '29':
  - type: text
    content: “God does all these things to a person—
  - type: text
    content: twice, even three times—
  '3':
  - type: text
    content: My words come from an upright heart;
  - type: text
    content: my lips sincerely speak what I know.
  '30':
  - type: text
    content: to turn them back from the pit,
  - type: text
    content: that the light of life may shine on them.
  '31':
  - type: text
    content: “Pay attention, Job, and listen to me;
  - type: text
    content: be silent, and I will speak.
  '32':
  - type: text
    content: If you have anything to say, answer me;
  - type: text
    content: speak up, for I want to vindicate you.
  '33':
  - type: text
    content: But if not, then listen to me;
  - type: text
    content: be silent, and I will teach you wisdom.”
  '4':
  - type: text
    content: The Spirit of God has made me;
  - type: text
    content: the breath of the Almighty gives me life.
  '5':
  - type: text
    content: Answer me then, if you can;
  - type: text
    content: stand up and argue your case before me.
  '6':
  - type: text
    content: I am the same as you in God’s sight;
  - type: text
    content: I too am a piece of clay.
  '7':
  - type: text
    content: No fear of me should alarm you,
  - type: text
    content: nor should my hand be heavy on you.
  '8':
  - type: text
    content: “But you have said in my hearing—
  - type: text
    content: I heard the very words—
  '9':
  - type: text
    content: ‘I am pure, I have done no wrong;
  - type: text
    content: I am clean and free from sin.
