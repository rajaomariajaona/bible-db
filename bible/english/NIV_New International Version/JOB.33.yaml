document_id: JOB.33
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “But now, Job, listen to my words;
- type: usfm
  marker: q2
  children:
  - type: text
    text: pay attention to everything I say.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: I am about to open my mouth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my words are on the tip of my tongue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: My words come from an upright heart;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my lips sincerely speak what I know.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: The Spirit of God has made me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the breath of the Almighty gives me life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Answer me then, if you can;
- type: usfm
  marker: q2
  children:
  - type: text
    text: stand up and argue your case before me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I am the same as you in God’s sight;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I too am a piece of clay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: No fear of me should alarm you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor should my hand be heavy on you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: “But you have said in my hearing—
- type: usfm
  marker: q2
  children:
  - type: text
    text: I heard the very words—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ‘I am pure, I have done no wrong;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am clean and free from sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Yet God has found fault with me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he considers me his enemy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: He fastens my feet in shackles;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he keeps close watch on all my paths.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “But I tell you, in this you are not right,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for God is greater than any mortal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Why do you complain to him
- type: usfm
  marker: q2
  children:
  - type: text
    text: that he responds to no one’s words
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: that he does not answer for any of his actions
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: For God does speak—now one way, now another—
- type: usfm
  marker: q2
  children:
  - type: text
    text: though no one perceives it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: In a dream, in a vision of the night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when deep sleep falls on people
- type: usfm
  marker: q2
  children:
  - type: text
    text: as they slumber in their beds,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: he may speak in their ears
- type: usfm
  marker: q2
  children:
  - type: text
    text: and terrify them with warnings,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: to turn them from wrongdoing
- type: usfm
  marker: q2
  children:
  - type: text
    text: and keep them from pride,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: to preserve them from the pit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their lives from perishing by the sword.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: from crossing the river
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “Or someone may be chastened on a bed of pain
- type: usfm
  marker: q2
  children:
  - type: text
    text: with constant distress in their bones,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: so that their body finds food repulsive
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their soul loathes the choicest meal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Their flesh wastes away to nothing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their bones, once hidden, now stick out.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: They draw near to the pit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and their life to the messengers of death.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to the place of the dead
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Yet if there is an angel at their side,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a messenger, one out of a thousand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: sent to tell them how to be upright,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: and he is gracious to that person and says to God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘Spare them from going down to the pit;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have found a ransom for them—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: let their flesh be renewed like a child’s;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let them be restored as in the days of their youth’—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: then that person can pray to God and find favor with him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will see God’s face and shout for joy;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will restore them to full well-being.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: And they will go to others and say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘I have sinned, I have perverted what is right,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but I did not get what I deserved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: God has delivered me from going down to the pit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I shall live to enjoy the light of life.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “God does all these things to a person—
- type: usfm
  marker: q2
  children:
  - type: text
    text: twice, even three times—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: to turn them back from the pit,
- type: usfm
  marker: q2
  children:
  - type: text
    text: that the light of life may shine on them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: “Pay attention, Job, and listen to me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: be silent, and I will speak.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: If you have anything to say, answer me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: speak up, for I want to vindicate you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: But if not, then listen to me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: be silent, and I will teach you wisdom.”
