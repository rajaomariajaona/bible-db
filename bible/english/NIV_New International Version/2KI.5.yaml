document_id: 2KI.5,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Naaman Healed of Leprosy
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Naaman was commander of the army of the king of Aram. He was a great man in the sight of his master and highly regarded, because through him the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had given victory to Aram. He was a valiant soldier, but he had leprosy.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'leprosy '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: was used for various diseases affecting the skin; also in verses 3, 6, 7, 11 and 27.
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elisha sent a messenger to say to him, “Go, wash yourself seven times in the Jordan, and your flesh will be restored and you will be cleansed.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Naaman went away angry and said, “I thought that he would surely come out to me and stand and call on the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' his God, wave his hand over the spot and cure me of my leprosy. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Are not Abana and Pharpar, the rivers of Damascus, better than all the waters of Israel? Couldn’t I wash in them and be cleansed?” So he turned and went off in a rage.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naaman’s servants went to him and said, “My father, if the prophet had told you to do some great thing, would you not have done it? How much more, then, when he tells you, ‘Wash and be cleansed’!” '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he went down and dipped himself in the Jordan seven times, as the man of God had told him, and his flesh was restored and became clean like that of a young boy.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Naaman and all his attendants went back to the man of God. He stood before him and said, “Now I know that there is no God in all the world except in Israel. So please accept a gift from your servant.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The prophet answered, “As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives, whom I serve, I will not accept a thing.” And even though Naaman urged him, he refused.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“If you will not,” said Naaman, “please let me, your servant, be given as much earth as a pair of mules can carry, for your servant will never again make burnt offerings and sacrifices to any other god but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But may the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' forgive your servant for this one thing: When my master enters the temple of Rimmon to bow down and he is leaning on my arm and I have to bow there also—when I bow down in the temple of Rimmon, may the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' forgive your servant for this.”'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Go in peace,” Elisha said.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After Naaman had traveled some distance, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now bands of raiders from Aram had gone out and had taken captive a young girl from Israel, and she served Naaman’s wife. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gehazi, the servant of Elisha the man of God, said to himself, “My master was too easy on Naaman, this Aramean, by not accepting from him what he brought. As surely as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives, I will run after him and get something from him.”'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Gehazi hurried after Naaman. When Naaman saw him running toward him, he got down from the chariot to meet him. “Is everything all right?” he asked.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Everything is all right,” Gehazi answered. “My master sent me to say, ‘Two young men from the company of the prophets have just come to me from the hill country of Ephraim. Please give them a talent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 75 pounds or about 34 kilograms
      marker-yv: yv-n
    - type: text
      text: ' of silver and two sets of clothing.’ ”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“By all means, take two talents,” said Naaman. He urged Gehazi to accept them, and then tied up the two talents of silver in two bags, with two sets of clothing. He gave them to two of his servants, and they carried them ahead of Gehazi. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When Gehazi came to the hill, he took the things from the servants and put them away in the house. He sent the men away and they left.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When he went in and stood before his master, Elisha asked him, “Where have you been, Gehazi?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Your servant didn’t go anywhere,” Gehazi answered.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Elisha said to him, “Was not my spirit with you when the man got down from his chariot to meet you? Is this the time to take money or to accept clothes—or olive groves and vineyards, or flocks and herds, or male and female slaves? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Naaman’s leprosy will cling to you and to your descendants forever.” Then Gehazi went from Elisha’s presence and his skin was leprous—it had become as white as snow.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: She said to her mistress, “If only my master would see the prophet who is in Samaria! He would cure him of his leprosy.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naaman went to his master and told him what the girl from Israel had said. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “By all means, go,” the king of Aram replied. “I will send a letter to the king of Israel.” So Naaman left, taking with him ten talents
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 750 pounds or about 340 kilograms
      marker-yv: yv-n
    - type: text
      text: ' of silver, six thousand shekels'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 150 pounds or about 69 kilograms
      marker-yv: yv-n
    - type: text
      text: ' of gold and ten sets of clothing. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The letter that he took to the king of Israel read: “With this letter I am sending my servant Naaman to you so that you may cure him of his leprosy.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: As soon as the king of Israel read the letter, he tore his robes and said, “Am I God? Can I kill and bring back to life? Why does this fellow send someone to me to be cured of his leprosy? See how he is trying to pick a quarrel with me!”
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Elisha the man of God heard that the king of Israel had torn his robes, he sent him this message: “Why have you torn your robes? Have the man come to me and he will know that there is a prophet in Israel.” '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Naaman went with his horses and chariots and stopped at the door of Elisha’s house. '
