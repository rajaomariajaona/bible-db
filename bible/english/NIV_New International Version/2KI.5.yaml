document_id: 2KI.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Naaman Healed of Leprosy
  - type: text
    content: 'Now Naaman was commander of the army of the king of Aram. He was a great man in the sight of his master and highly regarded, because through him the '
  - type: text
    content: Lord
  - type: text
    content: ' had given victory to Aram. He was a valiant soldier, but he had leprosy.'
  - type: note
    content: The Hebrew for leprosy was used for various diseases affecting the skin; also in verses 3, 6, 7, 11 and 27.
  '10':
  - type: text
    content: Elisha sent a messenger to say to him, “Go, wash yourself seven times in the Jordan, and your flesh will be restored and you will be cleansed.”
  '11':
  - type: text
    content: 'But Naaman went away angry and said, “I thought that he would surely come out to me and stand and call on the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God, wave his hand over the spot and cure me of my leprosy. '
  '12':
  - type: text
    content: Are not Abana and Pharpar, the rivers of Damascus, better than all the waters of Israel? Couldn’t I wash in them and be cleansed?” So he turned and went off in a rage.
  '13':
  - type: text
    content: 'Naaman’s servants went to him and said, “My father, if the prophet had told you to do some great thing, would you not have done it? How much more, then, when he tells you, ‘Wash and be cleansed’!” '
  '14':
  - type: text
    content: So he went down and dipped himself in the Jordan seven times, as the man of God had told him, and his flesh was restored and became clean like that of a young boy.
  '15':
  - type: text
    content: Then Naaman and all his attendants went back to the man of God. He stood before him and said, “Now I know that there is no God in all the world except in Israel. So please accept a gift from your servant.”
  '16':
  - type: text
    content: 'The prophet answered, “As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, whom I serve, I will not accept a thing.” And even though Naaman urged him, he refused.'
  '17':
  - type: text
    content: '“If you will not,” said Naaman, “please let me, your servant, be given as much earth as a pair of mules can carry, for your servant will never again make burnt offerings and sacrifices to any other god but the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'But may the '
  - type: text
    content: Lord
  - type: text
    content: ' forgive your servant for this one thing: When my master enters the temple of Rimmon to bow down and he is leaning on my arm and I have to bow there also—when I bow down in the temple of Rimmon, may the '
  - type: text
    content: Lord
  - type: text
    content: ' forgive your servant for this.”'
  '19':
  - type: text
    content: “Go in peace,” Elisha said.
  - type: text
    content: 'After Naaman had traveled some distance, '
  '2':
  - type: text
    content: 'Now bands of raiders from Aram had gone out and had taken captive a young girl from Israel, and she served Naaman’s wife. '
  '20':
  - type: text
    content: 'Gehazi, the servant of Elisha the man of God, said to himself, “My master was too easy on Naaman, this Aramean, by not accepting from him what he brought. As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, I will run after him and get something from him.”'
  '21':
  - type: text
    content: So Gehazi hurried after Naaman. When Naaman saw him running toward him, he got down from the chariot to meet him. “Is everything all right?” he asked.
  '22':
  - type: text
    content: “Everything is all right,” Gehazi answered. “My master sent me to say, ‘Two young men from the company of the prophets have just come to me from the hill country of Ephraim. Please give them a talent
  - type: note
    content: That is, about 75 pounds or about 34 kilograms
  - type: text
    content: ' of silver and two sets of clothing.’ ”'
  '23':
  - type: text
    content: '“By all means, take two talents,” said Naaman. He urged Gehazi to accept them, and then tied up the two talents of silver in two bags, with two sets of clothing. He gave them to two of his servants, and they carried them ahead of Gehazi. '
  '24':
  - type: text
    content: When Gehazi came to the hill, he took the things from the servants and put them away in the house. He sent the men away and they left.
  '25':
  - type: text
    content: When he went in and stood before his master, Elisha asked him, “Where have you been, Gehazi?”
  - type: text
    content: “Your servant didn’t go anywhere,” Gehazi answered.
  '26':
  - type: text
    content: 'But Elisha said to him, “Was not my spirit with you when the man got down from his chariot to meet you? Is this the time to take money or to accept clothes—or olive groves and vineyards, or flocks and herds, or male and female slaves? '
  '27':
  - type: text
    content: Naaman’s leprosy will cling to you and to your descendants forever.” Then Gehazi went from Elisha’s presence and his skin was leprous—it had become as white as snow.
  '3':
  - type: text
    content: She said to her mistress, “If only my master would see the prophet who is in Samaria! He would cure him of his leprosy.”
  '4':
  - type: text
    content: 'Naaman went to his master and told him what the girl from Israel had said. '
  '5':
  - type: text
    content: “By all means, go,” the king of Aram replied. “I will send a letter to the king of Israel.” So Naaman left, taking with him ten talents
  - type: note
    content: That is, about 750 pounds or about 340 kilograms
  - type: text
    content: ' of silver, six thousand shekels'
  - type: note
    content: That is, about 150 pounds or about 69 kilograms
  - type: text
    content: ' of gold and ten sets of clothing. '
  '6':
  - type: text
    content: 'The letter that he took to the king of Israel read: “With this letter I am sending my servant Naaman to you so that you may cure him of his leprosy.”'
  '7':
  - type: text
    content: As soon as the king of Israel read the letter, he tore his robes and said, “Am I God? Can I kill and bring back to life? Why does this fellow send someone to me to be cured of his leprosy? See how he is trying to pick a quarrel with me!”
  '8':
  - type: text
    content: 'When Elisha the man of God heard that the king of Israel had torn his robes, he sent him this message: “Why have you torn your robes? Have the man come to me and he will know that there is a prophet in Israel.” '
  '9':
  - type: text
    content: 'So Naaman went with his horses and chariots and stopped at the door of Elisha’s house. '
