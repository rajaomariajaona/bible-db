document_id: MRK.11,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Comes to Jerusalem as King
  - type: text
    content: 'As they approached Jerusalem and came to Bethphage and Bethany at the Mount of Olives, Jesus sent two of his disciples, '
  '10':
  - type: text
    content: “Blessed is the coming kingdom of our father David!”
  - type: text
    content: “Hosanna in the highest heaven!”
  '11':
  - type: text
    content: Jesus entered Jerusalem and went into the temple courts. He looked around at everything, but since it was already late, he went out to Bethany with the Twelve.
  - type: heading
    content: Jesus Curses a Fig Tree and Clears the Temple Courts
  '12':
  - type: text
    content: 'The next day as they were leaving Bethany, Jesus was hungry. '
  '13':
  - type: text
    content: 'Seeing in the distance a fig tree in leaf, he went to find out if it had any fruit. When he reached it, he found nothing but leaves, because it was not the season for figs. '
  '14':
  - type: text
    content: 'Then he said to the tree, '
  - type: text
    content: “May no one ever eat fruit from you again.”
  - type: text
    content: ' And his disciples heard him say it.'
  '15':
  - type: text
    content: 'On reaching Jerusalem, Jesus entered the temple courts and began driving out those who were buying and selling there. He overturned the tables of the money changers and the benches of those selling doves, '
  '16':
  - type: text
    content: 'and would not allow anyone to carry merchandise through the temple courts. '
  '17':
  - type: text
    content: 'And as he taught them, he said, '
  - type: text
    content: '“Is it not written: ‘My house will be called a house of prayer for all nations’'
  - type: note
    content: Isaiah 56:7
  - type: text
    content: '? But you have made it ‘a den of robbers.’'
  - type: note
    content: Jer. 7:11
  - type: text
    content: ”
  '18':
  - type: text
    content: The chief priests and the teachers of the law heard this and began looking for a way to kill him, for they feared him, because the whole crowd was amazed at his teaching.
  '19':
  - type: text
    content: When evening came, Jesus and his disciples
  - type: note
    content: Some early manuscripts came, Jesus
  - type: text
    content: ' went out of the city.'
  '2':
  - type: text
    content: 'saying to them, '
  - type: text
    content: “Go to the village ahead of you, and just as you enter it, you will find a colt tied there, which no one has ever ridden. Untie it and bring it here.
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'In the morning, as they went along, they saw the fig tree withered from the roots. '
  '21':
  - type: text
    content: Peter remembered and said to Jesus, “Rabbi, look! The fig tree you cursed has withered!”
  '22':
  - type: text
    content: ' '
  - type: text
    content: “Have faith in God,”
  - type: text
    content: ' Jesus answered. '
  '23':
  - type: text
    content: “Truly
  - type: note
    content: Some early manuscripts “If you have faith in God,” Jesus answered, 23 “truly
  - type: text
    content: ' '
  - type: text
    content: I tell you, if anyone says to this mountain, ‘Go, throw yourself into the sea,’ and does not doubt in their heart but believes that what they say will happen, it will be done for them.
  - type: text
    content: ' '
  '24':
  - type: text
    content: Therefore I tell you, whatever you ask for in prayer, believe that you have received it, and it will be yours.
  - type: text
    content: ' '
  '25':
  - type: text
    content: And when you stand praying, if you hold anything against anyone, forgive them, so that your Father in heaven may forgive you your sins.”
  - type: text
    content: ' '
  '26':
  - type: note
    content: Some manuscripts include here words similar to Matt. 6:15.
  - type: heading
    content: The Authority of Jesus Questioned
  '27':
  - type: text
    content: 'They arrived again in Jerusalem, and while Jesus was walking in the temple courts, the chief priests, the teachers of the law and the elders came to him. '
  '28':
  - type: text
    content: “By what authority are you doing these things?” they asked. “And who gave you authority to do this?”
  '29':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “I will ask you one question. Answer me, and I will tell you by what authority I am doing these things.
  - type: text
    content: ' '
  '3':
  - type: text
    content: If anyone asks you, ‘Why are you doing this?’ say, ‘The Lord needs it and will send it back here shortly.’ ”
  '30':
  - type: text
    content: John’s baptism—was it from heaven, or of human origin? Tell me!”
  '31':
  - type: text
    content: 'They discussed it among themselves and said, “If we say, ‘From heaven,’ he will ask, ‘Then why didn’t you believe him?’ '
  '32':
  - type: text
    content: But if we say, ‘Of human origin’ …” (They feared the people, for everyone held that John really was a prophet.)
  '33':
  - type: text
    content: So they answered Jesus, “We don’t know.”
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Neither will I tell you by what authority I am doing these things.”
  '4':
  - type: text
    content: 'They went and found a colt outside in the street, tied at a doorway. As they untied it, '
  '5':
  - type: text
    content: 'some people standing there asked, “What are you doing, untying that colt?” '
  '6':
  - type: text
    content: 'They answered as Jesus had told them to, and the people let them go. '
  '7':
  - type: text
    content: 'When they brought the colt to Jesus and threw their cloaks over it, he sat on it. '
  '8':
  - type: text
    content: 'Many people spread their cloaks on the road, while others spread branches they had cut in the fields. '
  '9':
  - type: text
    content: Those who went ahead and those who followed shouted,
  - type: text
    content: “Hosanna!
  - type: note
    content: A Hebrew expression meaning “Save!” which became an exclamation of praise; also in verse 10
  - type: text
    content: ”
  - type: text
    content: “Blessed is he who comes in the name of the Lord!”
  - type: note
    content: Psalm 118:25,26
