document_id: JOS.7,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Achan’s Sin
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the Israelites were unfaithful in regard to the devoted things
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term refers to the irrevocable giving over of things or persons to the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ', often by totally destroying them; also in verses 11, 12, 13 and 15.'
      marker-yv: yv-n
    - type: text
      text: ; Achan son of Karmi, the son of Zimri,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'See Septuagint and 1 Chron. 2:6; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zabdi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verses 17 and 18.
      marker-yv: yv-n
    - type: text
      text: ' the son of Zerah, of the tribe of Judah, took some of them. So the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s anger burned against Israel.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Joshua, “Stand up! What are you doing down on your face? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Israel has sinned; they have violated my covenant, which I commanded them to keep. They have taken some of the devoted things; they have stolen, they have lied, they have put them with their own possessions. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: That is why the Israelites cannot stand against their enemies; they turn their backs and run because they have been made liable to destruction. I will not be with you anymore unless you destroy whatever among you is devoted to destruction.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Go, consecrate the people. Tell them, ‘Consecrate yourselves in preparation for tomorrow; for this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says: There are devoted things among you, Israel. You cannot stand against your enemies until you remove them.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘In the morning, present yourselves tribe by tribe. The tribe the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' chooses shall come forward clan by clan; the clan the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' chooses shall come forward family by family; and the family the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' chooses shall come forward man by man. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Whoever is caught with the devoted things shall be destroyed by fire, along with all that belongs to him. He has violated the covenant of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and has done an outrageous thing in Israel!’ ”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Early the next morning Joshua had Israel come forward by tribes, and Judah was chosen. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The clans of Judah came forward, and the Zerahites were chosen. He had the clan of the Zerahites come forward by families, and Zimri was chosen. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joshua had his family come forward man by man, and Achan son of Karmi, the son of Zimri, the son of Zerah, of the tribe of Judah, was chosen.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joshua said to Achan, “My son, give glory to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, and honor him. Tell me what you have done; do not hide it from me.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now Joshua sent men from Jericho to Ai, which is near Beth Aven to the east of Bethel, and told them, “Go up and spy out the region.” So the men went up and spied out Ai.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Achan replied, “It is true! I have sinned against the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel. This is what I have done: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When I saw in the plunder a beautiful robe from Babylonia,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shinar
      marker-yv: yv-n
    - type: text
      text: ' two hundred shekels'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 5 pounds or about 2.3 kilograms
      marker-yv: yv-n
    - type: text
      text: ' of silver and a bar of gold weighing fifty shekels,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 1 1/4 pounds or about 575 grams
      marker-yv: yv-n
    - type: text
      text: ' I coveted them and took them. They are hidden in the ground inside my tent, with the silver underneath.”'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joshua sent messengers, and they ran to the tent, and there it was, hidden in his tent, with the silver underneath. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They took the things from the tent, brought them to Joshua and all the Israelites and spread them out before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joshua, together with all Israel, took Achan son of Zerah, the silver, the robe, the gold bar, his sons and daughters, his cattle, donkeys and sheep, his tent and all that he had, to the Valley of Achor. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joshua said, “Why have you brought this trouble on us? The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will bring trouble on you today.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then all Israel stoned him, and after they had stoned the rest, they burned them. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Over Achan they heaped up a large pile of rocks, which remains to this day. Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' turned from his fierce anger. Therefore that place has been called the Valley of Achor'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Achor '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: trouble.
      marker-yv: yv-n
    - type: text
      text: ' ever since.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When they returned to Joshua, they said, “Not all the army will have to go up against Ai. Send two or three thousand men to take it and do not weary the whole army, for only a few people live there.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So about three thousand went up; but they were routed by the men of Ai, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: who killed about thirty-six of them. They chased the Israelites from the city gate as far as the stone quarries and struck them down on the slopes. At this the hearts of the people melted in fear and became like water.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Joshua tore his clothes and fell facedown to the ground before the ark of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', remaining there till evening. The elders of Israel did the same, and sprinkled dust on their heads. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And Joshua said, “Alas, Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', why did you ever bring this people across the Jordan to deliver us into the hands of the Amorites to destroy us? If only we had been content to stay on the other side of the Jordan! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pardon your servant, Lord. What can I say, now that Israel has been routed by its enemies? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The Canaanites and the other people of the country will hear about this and they will surround us and wipe out our name from the earth. What then will you do for your own great name?”
