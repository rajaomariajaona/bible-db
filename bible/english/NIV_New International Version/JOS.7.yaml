document_id: JOS.7,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Achan’s Sin
  - type: text
    content: But the Israelites were unfaithful in regard to the devoted things
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them; also in verses 11, 12, 13 and 15.
  - type: text
    content: ; Achan son of Karmi, the son of Zimri,
  - type: note
    content: See Septuagint and 1 Chron. 2:6; Hebrew Zabdi; also in verses 17 and 18.
  - type: text
    content: ' the son of Zerah, of the tribe of Judah, took some of them. So the '
  - type: text
    content: Lord
  - type: text
    content: ’s anger burned against Israel.
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, “Stand up! What are you doing down on your face? '
  '11':
  - type: text
    content: 'Israel has sinned; they have violated my covenant, which I commanded them to keep. They have taken some of the devoted things; they have stolen, they have lied, they have put them with their own possessions. '
  '12':
  - type: text
    content: That is why the Israelites cannot stand against their enemies; they turn their backs and run because they have been made liable to destruction. I will not be with you anymore unless you destroy whatever among you is devoted to destruction.
  '13':
  - type: text
    content: '“Go, consecrate the people. Tell them, ‘Consecrate yourselves in preparation for tomorrow; for this is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: There are devoted things among you, Israel. You cannot stand against your enemies until you remove them.'
  '14':
  - type: text
    content: '“ ‘In the morning, present yourselves tribe by tribe. The tribe the '
  - type: text
    content: Lord
  - type: text
    content: ' chooses shall come forward clan by clan; the clan the '
  - type: text
    content: Lord
  - type: text
    content: ' chooses shall come forward family by family; and the family the '
  - type: text
    content: Lord
  - type: text
    content: ' chooses shall come forward man by man. '
  '15':
  - type: text
    content: 'Whoever is caught with the devoted things shall be destroyed by fire, along with all that belongs to him. He has violated the covenant of the '
  - type: text
    content: Lord
  - type: text
    content: ' and has done an outrageous thing in Israel!’ ”'
  '16':
  - type: text
    content: 'Early the next morning Joshua had Israel come forward by tribes, and Judah was chosen. '
  '17':
  - type: text
    content: 'The clans of Judah came forward, and the Zerahites were chosen. He had the clan of the Zerahites come forward by families, and Zimri was chosen. '
  '18':
  - type: text
    content: Joshua had his family come forward man by man, and Achan son of Karmi, the son of Zimri, the son of Zerah, of the tribe of Judah, was chosen.
  '19':
  - type: text
    content: 'Then Joshua said to Achan, “My son, give glory to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, and honor him. Tell me what you have done; do not hide it from me.”'
  '2':
  - type: text
    content: Now Joshua sent men from Jericho to Ai, which is near Beth Aven to the east of Bethel, and told them, “Go up and spy out the region.” So the men went up and spied out Ai.
  '20':
  - type: text
    content: 'Achan replied, “It is true! I have sinned against the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. This is what I have done: '
  '21':
  - type: text
    content: When I saw in the plunder a beautiful robe from Babylonia,
  - type: note
    content: Hebrew Shinar
  - type: text
    content: ' two hundred shekels'
  - type: note
    content: That is, about 5 pounds or about 2.3 kilograms
  - type: text
    content: ' of silver and a bar of gold weighing fifty shekels,'
  - type: note
    content: That is, about 1 1/4 pounds or about 575 grams
  - type: text
    content: ' I coveted them and took them. They are hidden in the ground inside my tent, with the silver underneath.”'
  '22':
  - type: text
    content: 'So Joshua sent messengers, and they ran to the tent, and there it was, hidden in his tent, with the silver underneath. '
  '23':
  - type: text
    content: 'They took the things from the tent, brought them to Joshua and all the Israelites and spread them out before the '
  - type: text
    content: Lord
  - type: text
    content: .
  '24':
  - type: text
    content: 'Then Joshua, together with all Israel, took Achan son of Zerah, the silver, the robe, the gold bar, his sons and daughters, his cattle, donkeys and sheep, his tent and all that he had, to the Valley of Achor. '
  '25':
  - type: text
    content: 'Joshua said, “Why have you brought this trouble on us? The '
  - type: text
    content: Lord
  - type: text
    content: ' will bring trouble on you today.”'
  - type: text
    content: 'Then all Israel stoned him, and after they had stoned the rest, they burned them. '
  '26':
  - type: text
    content: 'Over Achan they heaped up a large pile of rocks, which remains to this day. Then the '
  - type: text
    content: Lord
  - type: text
    content: ' turned from his fierce anger. Therefore that place has been called the Valley of Achor'
  - type: note
    content: Achor means trouble.
  - type: text
    content: ' ever since.'
  '3':
  - type: text
    content: 'When they returned to Joshua, they said, “Not all the army will have to go up against Ai. Send two or three thousand men to take it and do not weary the whole army, for only a few people live there.” '
  '4':
  - type: text
    content: 'So about three thousand went up; but they were routed by the men of Ai, '
  '5':
  - type: text
    content: who killed about thirty-six of them. They chased the Israelites from the city gate as far as the stone quarries and struck them down on the slopes. At this the hearts of the people melted in fear and became like water.
  '6':
  - type: text
    content: 'Then Joshua tore his clothes and fell facedown to the ground before the ark of the '
  - type: text
    content: Lord
  - type: text
    content: ', remaining there till evening. The elders of Israel did the same, and sprinkled dust on their heads. '
  '7':
  - type: text
    content: 'And Joshua said, “Alas, Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', why did you ever bring this people across the Jordan to deliver us into the hands of the Amorites to destroy us? If only we had been content to stay on the other side of the Jordan! '
  '8':
  - type: text
    content: 'Pardon your servant, Lord. What can I say, now that Israel has been routed by its enemies? '
  '9':
  - type: text
    content: The Canaanites and the other people of the country will hear about this and they will surround us and wipe out our name from the earth. What then will you do for your own great name?”
