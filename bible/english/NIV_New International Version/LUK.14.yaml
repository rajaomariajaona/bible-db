document_id: LUK.14,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus at a Pharisee’s House
  - type: text
    content: 'One Sabbath, when Jesus went to eat in the house of a prominent Pharisee, he was being carefully watched. '
  '10':
  - type: text
    content: But when you are invited, take the lowest place, so that when your host comes, he will say to you, ‘Friend, move up to a better place.’ Then you will be honored in the presence of all the other guests.
  - type: text
    content: ' '
  '11':
  - type: text
    content: For all those who exalt themselves will be humbled, and those who humble themselves will be exalted.”
  '12':
  - type: text
    content: 'Then Jesus said to his host, '
  - type: text
    content: “When you give a luncheon or dinner, do not invite your friends, your brothers or sisters, your relatives, or your rich neighbors; if you do, they may invite you back and so you will be repaid.
  - type: text
    content: ' '
  '13':
  - type: text
    content: But when you give a banquet, invite the poor, the crippled, the lame, the blind,
  - type: text
    content: ' '
  '14':
  - type: text
    content: and you will be blessed. Although they cannot repay you, you will be repaid at the resurrection of the righteous.”
  - type: heading
    content: The Parable of the Great Banquet
  '15':
  - type: text
    content: When one of those at the table with him heard this, he said to Jesus, “Blessed is the one who will eat at the feast in the kingdom of God.”
  '16':
  - type: text
    content: 'Jesus replied: '
  - type: text
    content: “A certain man was preparing a great banquet and invited many guests.
  - type: text
    content: ' '
  '17':
  - type: text
    content: At the time of the banquet he sent his servant to tell those who had been invited, ‘Come, for everything is now ready.’
  '18':
  - type: text
    content: ' '
  - type: text
    content: “But they all alike began to make excuses. The first said, ‘I have just bought a field, and I must go and see it. Please excuse me.’
  '19':
  - type: text
    content: ' '
  - type: text
    content: “Another said, ‘I have just bought five yoke of oxen, and I’m on my way to try them out. Please excuse me.’
  '2':
  - type: text
    content: 'There in front of him was a man suffering from abnormal swelling of his body. '
  '20':
  - type: text
    content: ' '
  - type: text
    content: “Still another said, ‘I just got married, so I can’t come.’
  '21':
  - type: text
    content: ' '
  - type: text
    content: “The servant came back and reported this to his master. Then the owner of the house became angry and ordered his servant, ‘Go out quickly into the streets and alleys of the town and bring in the poor, the crippled, the blind and the lame.’
  '22':
  - type: text
    content: ' '
  - type: text
    content: “ ‘Sir,’ the servant said, ‘what you ordered has been done, but there is still room.’
  '23':
  - type: text
    content: ' '
  - type: text
    content: “Then the master told his servant, ‘Go out to the roads and country lanes and compel them to come in, so that my house will be full.
  - type: text
    content: ' '
  '24':
  - type: text
    content: I tell you, not one of those who were invited will get a taste of my banquet.’ ”
  - type: heading
    content: The Cost of Being a Disciple
  '25':
  - type: text
    content: 'Large crowds were traveling with Jesus, and turning to them he said: '
  '26':
  - type: text
    content: “If anyone comes to me and does not hate father and mother, wife and children, brothers and sisters—yes, even their own life—such a person cannot be my disciple.
  - type: text
    content: ' '
  '27':
  - type: text
    content: And whoever does not carry their cross and follow me cannot be my disciple.
  '28':
  - type: text
    content: ' '
  - type: text
    content: “Suppose one of you wants to build a tower. Won’t you first sit down and estimate the cost to see if you have enough money to complete it?
  - type: text
    content: ' '
  '29':
  - type: text
    content: For if you lay the foundation and are not able to finish it, everyone who sees it will ridicule you,
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Jesus asked the Pharisees and experts in the law, '
  - type: text
    content: “Is it lawful to heal on the Sabbath or not?”
  - type: text
    content: ' '
  '30':
  - type: text
    content: saying, ‘This person began to build and wasn’t able to finish.’
  '31':
  - type: text
    content: ' '
  - type: text
    content: “Or suppose a king is about to go to war against another king. Won’t he first sit down and consider whether he is able with ten thousand men to oppose the one coming against him with twenty thousand?
  - type: text
    content: ' '
  '32':
  - type: text
    content: If he is not able, he will send a delegation while the other is still a long way off and will ask for terms of peace.
  - type: text
    content: ' '
  '33':
  - type: text
    content: In the same way, those of you who do not give up everything you have cannot be my disciples.
  '34':
  - type: text
    content: ' '
  - type: text
    content: “Salt is good, but if it loses its saltiness, how can it be made salty again?
  - type: text
    content: ' '
  '35':
  - type: text
    content: It is fit neither for the soil nor for the manure pile; it is thrown out.
  - type: text
    content: “Whoever has ears to hear, let them hear.”
  '4':
  - type: text
    content: But they remained silent. So taking hold of the man, he healed him and sent him on his way.
  '5':
  - type: text
    content: 'Then he asked them, '
  - type: text
    content: “If one of you has a child
  - type: note
    content: Some manuscripts donkey
  - type: text
    content: ' '
  - type: text
    content: or an ox that falls into a well on the Sabbath day, will you not immediately pull it out?”
  - type: text
    content: ' '
  '6':
  - type: text
    content: And they had nothing to say.
  '7':
  - type: text
    content: 'When he noticed how the guests picked the places of honor at the table, he told them this parable: '
  '8':
  - type: text
    content: “When someone invites you to a wedding feast, do not take the place of honor, for a person more distinguished than you may have been invited.
  - type: text
    content: ' '
  '9':
  - type: text
    content: If so, the host who invited both of you will come and say to you, ‘Give this person your seat.’ Then, humiliated, you will have to take the least important place.
  - type: text
    content: ' '
