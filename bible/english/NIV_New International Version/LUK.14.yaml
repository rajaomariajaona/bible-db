document_id: LUK.14,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus at a Pharisee’s House
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One Sabbath, when Jesus went to eat in the house of a prominent Pharisee, he was being carefully watched. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But when you are invited, take the lowest place, so that when your host comes, he will say to you, ‘Friend, move up to a better place.’ Then you will be honored in the presence of all the other guests.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For all those who exalt themselves will be humbled, and those who humble themselves will be exalted.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jesus said to his host, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “When you give a luncheon or dinner, do not invite your friends, your brothers or sisters, your relatives, or your rich neighbors; if you do, they may invite you back and so you will be repaid.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: But when you give a banquet, invite the poor, the crippled, the lame, the blind,
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: and you will be blessed. Although they cannot repay you, you will be repaid at the resurrection of the righteous.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Parable of the Great Banquet
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: When one of those at the table with him heard this, he said to Jesus, “Blessed is the one who will eat at the feast in the kingdom of God.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus replied: '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “A certain man was preparing a great banquet and invited many guests.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: At the time of the banquet he sent his servant to tell those who had been invited, ‘Come, for everything is now ready.’
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “But they all alike began to make excuses. The first said, ‘I have just bought a field, and I must go and see it. Please excuse me.’
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Another said, ‘I have just bought five yoke of oxen, and I’m on my way to try them out. Please excuse me.’
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'There in front of him was a man suffering from abnormal swelling of his body. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Still another said, ‘I just got married, so I can’t come.’
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “The servant came back and reported this to his master. Then the owner of the house became angry and ordered his servant, ‘Go out quickly into the streets and alleys of the town and bring in the poor, the crippled, the blind and the lame.’
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “ ‘Sir,’ the servant said, ‘what you ordered has been done, but there is still room.’
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Then the master told his servant, ‘Go out to the roads and country lanes and compel them to come in, so that my house will be full.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: I tell you, not one of those who were invited will get a taste of my banquet.’ ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Cost of Being a Disciple
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Large crowds were traveling with Jesus, and turning to them he said: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If anyone comes to me and does not hate father and mother, wife and children, brothers and sisters—yes, even their own life—such a person cannot be my disciple.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: And whoever does not carry their cross and follow me cannot be my disciple.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Suppose one of you wants to build a tower. Won’t you first sit down and estimate the cost to see if you have enough money to complete it?
    - type: text
      text: ' '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: For if you lay the foundation and are not able to finish it, everyone who sees it will ridicule you,
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jesus asked the Pharisees and experts in the law, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Is it lawful to heal on the Sabbath or not?”
    - type: text
      text: ' '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: saying, ‘This person began to build and wasn’t able to finish.’
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Or suppose a king is about to go to war against another king. Won’t he first sit down and consider whether he is able with ten thousand men to oppose the one coming against him with twenty thousand?
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If he is not able, he will send a delegation while the other is still a long way off and will ask for terms of peace.
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: In the same way, those of you who do not give up everything you have cannot be my disciples.
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Salt is good, but if it loses its saltiness, how can it be made salty again?
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: It is fit neither for the soil nor for the manure pile; it is thrown out.
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Whoever has ears to hear, let them hear.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But they remained silent. So taking hold of the man, he healed him and sent him on his way.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he asked them, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “If one of you has a child
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: donkey
      marker-yv: yv-n
    - type: text
      text: ' '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: or an ox that falls into a well on the Sabbath day, will you not immediately pull it out?”
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And they had nothing to say.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When he noticed how the guests picked the places of honor at the table, he told them this parable: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “When someone invites you to a wedding feast, do not take the place of honor, for a person more distinguished than you may have been invited.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: wj
      children:
      - type: text
        text: If so, the host who invited both of you will come and say to you, ‘Give this person your seat.’ Then, humiliated, you will have to take the least important place.
    - type: text
      text: ' '
