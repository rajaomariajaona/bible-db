document_id: ACT.28
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Ashore on Malta
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Once safely on shore, we found out that the island was called Malta. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'The islanders showed us unusual kindness. They built a fire and welcomed us all because it was raining and cold. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Paul gathered a pile of brushwood and, as he put it on the fire, a viper, driven out by the heat, fastened itself on his hand. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'When the islanders saw the snake hanging from his hand, they said to each other, “This man must be a murderer; for though he escaped from the sea, the goddess Justice has not allowed him to live.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'But Paul shook the snake off into the fire and suffered no ill effects. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: The people expected him to swell up or suddenly fall dead; but after waiting a long time and seeing nothing unusual happen to him, they changed their minds and said he was a god.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'There was an estate nearby that belonged to Publius, the chief official of the island. He welcomed us to his home and showed us generous hospitality for three days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'His father was sick in bed, suffering from fever and dysentery. Paul went in to see him and, after prayer, placed his hands on him and healed him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'When this had happened, the rest of the sick on the island came and were cured. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They honored us in many ways; and when we were ready to sail, they furnished us with the supplies we needed.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul’s Arrival at Rome
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'After three months we put out to sea in a ship that had wintered in the island—it was an Alexandrian ship with the figurehead of the twin gods Castor and Pollux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'We put in at Syracuse and stayed there three days. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'From there we set sail and arrived at Rhegium. The next day the south wind came up, and on the following day we reached Puteoli. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'There we found some brothers and sisters who invited us to spend a week with them. And so we came to Rome. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The brothers and sisters there had heard that we were coming, and they traveled as far as the Forum of Appius and the Three Taverns to meet us. At the sight of these people Paul thanked God and was encouraged. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: When we got to Rome, Paul was allowed to live by himself, with a soldier to guard him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul Preaches at Rome Under Guard
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Three days later he called together the local Jewish leaders. When they had assembled, Paul said to them: “My brothers, although I have done nothing against our people or against the customs of our ancestors, I was arrested in Jerusalem and handed over to the Romans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'They examined me and wanted to release me, because I was not guilty of any crime deserving death. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The Jews objected, so I was compelled to make an appeal to Caesar. I certainly did not intend to bring any charge against my own people. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: For this reason I have asked to see you and talk with you. It is because of the hope of Israel that I am bound with this chain.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'They replied, “We have not received any letters from Judea concerning you, and none of our people who have come from there has reported or said anything bad about you. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: But we want to hear what your views are, for we know that people everywhere are talking against this sect.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'They arranged to meet Paul on a certain day, and came in even larger numbers to the place where he was staying. He witnessed to them from morning till evening, explaining about the kingdom of God, and from the Law of Moses and from the Prophets he tried to persuade them about Jesus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Some were convinced by what he said, but others would not believe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'They disagreed among themselves and began to leave after Paul had made this final statement: “The Holy Spirit spoke the truth to your ancestors when he said through Isaiah the prophet:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “ ‘Go to this people and say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You will be ever hearing but never understanding;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will be ever seeing but never perceiving.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: For this people’s heart has become calloused;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they hardly hear with their ears,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and they have closed their eyes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Otherwise they might see with their eyes,
- type: usfm
  marker: q2
  children:
  - type: text
    text: hear with their ears,
- type: usfm
  marker: q2
  children:
  - type: text
    text: understand with their hearts
- type: usfm
  marker: q1
  children:
  - type: text
    text: and turn, and I would heal them.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah 6:9,10 (see Septuagint)
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '“Therefore I want you to know that God’s salvation has been sent to the Gentiles, and they will listen!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '[29]'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts include here '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: After he said this, the Jews left, arguing vigorously among themselves.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'For two whole years Paul stayed there in his own rented house and welcomed all who came to see him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: He proclaimed the kingdom of God and taught about the Lord Jesus Christ—with all boldness and without hindrance!
