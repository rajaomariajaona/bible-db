document_id: ACT.28,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul Ashore on Malta
  - type: text
    content: 'Once safely on shore, we found out that the island was called Malta. '
  '10':
  - type: text
    content: They honored us in many ways; and when we were ready to sail, they furnished us with the supplies we needed.
  - type: heading
    content: Paul’s Arrival at Rome
  '11':
  - type: text
    content: 'After three months we put out to sea in a ship that had wintered in the island—it was an Alexandrian ship with the figurehead of the twin gods Castor and Pollux. '
  '12':
  - type: text
    content: 'We put in at Syracuse and stayed there three days. '
  '13':
  - type: text
    content: 'From there we set sail and arrived at Rhegium. The next day the south wind came up, and on the following day we reached Puteoli. '
  '14':
  - type: text
    content: 'There we found some brothers and sisters who invited us to spend a week with them. And so we came to Rome. '
  '15':
  - type: text
    content: 'The brothers and sisters there had heard that we were coming, and they traveled as far as the Forum of Appius and the Three Taverns to meet us. At the sight of these people Paul thanked God and was encouraged. '
  '16':
  - type: text
    content: When we got to Rome, Paul was allowed to live by himself, with a soldier to guard him.
  - type: heading
    content: Paul Preaches at Rome Under Guard
  '17':
  - type: text
    content: 'Three days later he called together the local Jewish leaders. When they had assembled, Paul said to them: “My brothers, although I have done nothing against our people or against the customs of our ancestors, I was arrested in Jerusalem and handed over to the Romans. '
  '18':
  - type: text
    content: 'They examined me and wanted to release me, because I was not guilty of any crime deserving death. '
  '19':
  - type: text
    content: 'The Jews objected, so I was compelled to make an appeal to Caesar. I certainly did not intend to bring any charge against my own people. '
  '2':
  - type: text
    content: 'The islanders showed us unusual kindness. They built a fire and welcomed us all because it was raining and cold. '
  '20':
  - type: text
    content: For this reason I have asked to see you and talk with you. It is because of the hope of Israel that I am bound with this chain.”
  '21':
  - type: text
    content: 'They replied, “We have not received any letters from Judea concerning you, and none of our people who have come from there has reported or said anything bad about you. '
  '22':
  - type: text
    content: But we want to hear what your views are, for we know that people everywhere are talking against this sect.”
  '23':
  - type: text
    content: 'They arranged to meet Paul on a certain day, and came in even larger numbers to the place where he was staying. He witnessed to them from morning till evening, explaining about the kingdom of God, and from the Law of Moses and from the Prophets he tried to persuade them about Jesus. '
  '24':
  - type: text
    content: 'Some were convinced by what he said, but others would not believe. '
  '25':
  - type: text
    content: 'They disagreed among themselves and began to leave after Paul had made this final statement: “The Holy Spirit spoke the truth to your ancestors when he said through Isaiah the prophet:'
  '26':
  - type: text
    content: “ ‘Go to this people and say,
  - type: text
    content: “You will be ever hearing but never understanding;
  - type: text
    content: you will be ever seeing but never perceiving.”
  '27':
  - type: text
    content: For this people’s heart has become calloused;
  - type: text
    content: they hardly hear with their ears,
  - type: text
    content: and they have closed their eyes.
  - type: text
    content: Otherwise they might see with their eyes,
  - type: text
    content: hear with their ears,
  - type: text
    content: understand with their hearts
  - type: text
    content: and turn, and I would heal them.’
  - type: note
    content: Isaiah 6:9,10 (see Septuagint)
  '28':
  - type: text
    content: '“Therefore I want you to know that God’s salvation has been sent to the Gentiles, and they will listen!” '
  '29':
  - type: note
    content: Some manuscripts include here After he said this, the Jews left, arguing vigorously among themselves.
  '3':
  - type: text
    content: 'Paul gathered a pile of brushwood and, as he put it on the fire, a viper, driven out by the heat, fastened itself on his hand. '
  '30':
  - type: text
    content: 'For two whole years Paul stayed there in his own rented house and welcomed all who came to see him. '
  '31':
  - type: text
    content: He proclaimed the kingdom of God and taught about the Lord Jesus Christ—with all boldness and without hindrance!
  '4':
  - type: text
    content: 'When the islanders saw the snake hanging from his hand, they said to each other, “This man must be a murderer; for though he escaped from the sea, the goddess Justice has not allowed him to live.” '
  '5':
  - type: text
    content: 'But Paul shook the snake off into the fire and suffered no ill effects. '
  '6':
  - type: text
    content: The people expected him to swell up or suddenly fall dead; but after waiting a long time and seeing nothing unusual happen to him, they changed their minds and said he was a god.
  '7':
  - type: text
    content: 'There was an estate nearby that belonged to Publius, the chief official of the island. He welcomed us to his home and showed us generous hospitality for three days. '
  '8':
  - type: text
    content: 'His father was sick in bed, suffering from fever and dysentery. Paul went in to see him and, after prayer, placed his hands on him and healed him. '
  '9':
  - type: text
    content: 'When this had happened, the rest of the sick on the island came and were cured. '
