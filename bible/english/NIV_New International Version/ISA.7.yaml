document_id: ISA.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Sign of Immanuel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: When Ahaz son of Jotham, the son of Uzziah, was king of Judah, King Rezin of Aram and Pekah son of Remaliah king of Israel marched up to fight against Jerusalem, but they could not overpower it.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Now the house of David was told, “Aram has allied itself with
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: has set up camp in
    marker-yv: yv-n
  - type: text
    text: ' Ephraim”; so the hearts of Ahaz and his people were shaken, as the trees of the forest are shaken by the wind.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Isaiah, “Go out, you and your son Shear-Jashub,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Shear-Jashub '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a remnant will return.
    marker-yv: yv-n
  - type: text
    text: ' to meet Ahaz at the end of the aqueduct of the Upper Pool, on the road to the Launderer’s Field. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Say to him, ‘Be careful, keep calm and don’t be afraid. Do not lose heart because of these two smoldering stubs of firewood—because of the fierce anger of Rezin and Aram and of the son of Remaliah. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Aram, Ephraim and Remaliah’s son have plotted your ruin, saying, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '“Let us invade Judah; let us tear it apart and divide it among ourselves, and make the son of Tabeel king over it.” '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Yet this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘It will not take place,
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will not happen,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: for the head of Aram is Damascus,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the head of Damascus is only Rezin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Within sixty-five years
- type: usfm
  marker: q2
  children:
  - type: text
    text: Ephraim will be too shattered to be a people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The head of Ephraim is Samaria,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the head of Samaria is only Remaliah’s son.
- type: usfm
  marker: q1
  children:
  - type: text
    text: If you do not stand firm in your faith,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will not stand at all.’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Again the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' spoke to Ahaz, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '“Ask the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God for a sign, whether in the deepest depths or in the highest heights.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'But Ahaz said, “I will not ask; I will not put the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' to the test.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Isaiah said, “Hear now, you house of David! Is it not enough to try the patience of humans? Will you try the patience of my God also? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Therefore the Lord himself will give you
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: The Hebrew is plural.
    marker-yv: yv-n
  - type: text
    text: ' a sign: The virgin'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: young woman
    marker-yv: yv-n
  - type: text
    text: ' will conceive and give birth to a son, and'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Masoretic Text; Dead Sea Scrolls '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'son, and he '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son, and they
    marker-yv: yv-n
  - type: text
    text: ' will call him Immanuel.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Immanuel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: God with us.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'He will be eating curds and honey when he knows enough to reject the wrong and choose the right, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'for before the boy knows enough to reject the wrong and choose the right, the land of the two kings you dread will be laid waste. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will bring on you and on your people and on the house of your father a time unlike any since Ephraim broke away from Judah—he will bring the king of Assyria.”'
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Assyria, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ’s Instrument
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'In that day the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will whistle for flies from the Nile delta in Egypt and for bees from the land of Assyria. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'They will all come and settle in the steep ravines and in the crevices in the rocks, on all the thornbushes and at all the water holes. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'In that day the Lord will use a razor hired from beyond the Euphrates River—the king of Assyria—to shave your heads and private parts, and to cut off your beards also. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'In that day, a person will keep alive a young cow and two goats. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'And because of the abundance of the milk they give, there will be curds to eat. All who remain in the land will eat curds and honey. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: In that day, in every place where there were a thousand vines worth a thousand silver shekels,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 25 pounds or about 12 kilograms
    marker-yv: yv-n
  - type: text
    text: ' there will be only briers and thorns. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hunters will go there with bow and arrow, for the land will be covered with briers and thorns. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: As for all the hills once cultivated by the hoe, you will no longer go there for fear of the briers and thorns; they will become places where cattle are turned loose and where sheep run.
