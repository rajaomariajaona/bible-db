document_id: ISA.7,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Sign of Immanuel
  - type: text
    content: When Ahaz son of Jotham, the son of Uzziah, was king of Judah, King Rezin of Aram and Pekah son of Remaliah king of Israel marched up to fight against Jerusalem, but they could not overpower it.
  '10':
  - type: text
    content: 'Again the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Ahaz, '
  '11':
  - type: text
    content: '“Ask the '
  - type: text
    content: Lord
  - type: text
    content: ' your God for a sign, whether in the deepest depths or in the highest heights.”'
  '12':
  - type: text
    content: 'But Ahaz said, “I will not ask; I will not put the '
  - type: text
    content: Lord
  - type: text
    content: ' to the test.”'
  '13':
  - type: text
    content: 'Then Isaiah said, “Hear now, you house of David! Is it not enough to try the patience of humans? Will you try the patience of my God also? '
  '14':
  - type: text
    content: Therefore the Lord himself will give you
  - type: note
    content: The Hebrew is plural.
  - type: text
    content: ' a sign: The virgin'
  - type: note
    content: Or young woman
  - type: text
    content: ' will conceive and give birth to a son, and'
  - type: note
    content: Masoretic Text; Dead Sea Scrolls son, and he or son, and they
  - type: text
    content: ' will call him Immanuel.'
  - type: note
    content: Immanuel means God with us.
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'He will be eating curds and honey when he knows enough to reject the wrong and choose the right, '
  '16':
  - type: text
    content: 'for before the boy knows enough to reject the wrong and choose the right, the land of the two kings you dread will be laid waste. '
  '17':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will bring on you and on your people and on the house of your father a time unlike any since Ephraim broke away from Judah—he will bring the king of Assyria.”'
  - type: heading
    content: Assyria, the Lord’s Instrument
  '18':
  - type: text
    content: 'In that day the '
  - type: text
    content: Lord
  - type: text
    content: ' will whistle for flies from the Nile delta in Egypt and for bees from the land of Assyria. '
  '19':
  - type: text
    content: 'They will all come and settle in the steep ravines and in the crevices in the rocks, on all the thornbushes and at all the water holes. '
  '2':
  - type: text
    content: Now the house of David was told, “Aram has allied itself with
  - type: note
    content: Or has set up camp in
  - type: text
    content: ' Ephraim”; so the hearts of Ahaz and his people were shaken, as the trees of the forest are shaken by the wind.'
  '20':
  - type: text
    content: 'In that day the Lord will use a razor hired from beyond the Euphrates River—the king of Assyria—to shave your heads and private parts, and to cut off your beards also. '
  '21':
  - type: text
    content: 'In that day, a person will keep alive a young cow and two goats. '
  '22':
  - type: text
    content: 'And because of the abundance of the milk they give, there will be curds to eat. All who remain in the land will eat curds and honey. '
  '23':
  - type: text
    content: In that day, in every place where there were a thousand vines worth a thousand silver shekels,
  - type: note
    content: That is, about 25 pounds or about 12 kilograms
  - type: text
    content: ' there will be only briers and thorns. '
  '24':
  - type: text
    content: 'Hunters will go there with bow and arrow, for the land will be covered with briers and thorns. '
  '25':
  - type: text
    content: As for all the hills once cultivated by the hoe, you will no longer go there for fear of the briers and thorns; they will become places where cattle are turned loose and where sheep run.
  '3':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Isaiah, “Go out, you and your son Shear-Jashub,'
  - type: note
    content: Shear-Jashub means a remnant will return.
  - type: text
    content: ' to meet Ahaz at the end of the aqueduct of the Upper Pool, on the road to the Launderer’s Field. '
  '4':
  - type: text
    content: 'Say to him, ‘Be careful, keep calm and don’t be afraid. Do not lose heart because of these two smoldering stubs of firewood—because of the fierce anger of Rezin and Aram and of the son of Remaliah. '
  '5':
  - type: text
    content: 'Aram, Ephraim and Remaliah’s son have plotted your ruin, saying, '
  '6':
  - type: text
    content: '“Let us invade Judah; let us tear it apart and divide it among ourselves, and make the son of Tabeel king over it.” '
  '7':
  - type: text
    content: 'Yet this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘It will not take place,
  - type: text
    content: it will not happen,
  '8':
  - type: text
    content: for the head of Aram is Damascus,
  - type: text
    content: and the head of Damascus is only Rezin.
  - type: text
    content: Within sixty-five years
  - type: text
    content: Ephraim will be too shattered to be a people.
  '9':
  - type: text
    content: The head of Ephraim is Samaria,
  - type: text
    content: and the head of Samaria is only Remaliah’s son.
  - type: text
    content: If you do not stand firm in your faith,
  - type: text
    content: you will not stand at all.’ ”
