document_id: 2CO.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Awaiting the New Body
  - type: text
    content: 'For we know that if the earthly tent we live in is destroyed, we have a building from God, an eternal house in heaven, not built by human hands. '
  '10':
  - type: text
    content: For we must all appear before the judgment seat of Christ, so that each of us may receive what is due us for the things done while in the body, whether good or bad.
  - type: heading
    content: The Ministry of Reconciliation
  '11':
  - type: text
    content: 'Since, then, we know what it is to fear the Lord, we try to persuade others. What we are is plain to God, and I hope it is also plain to your conscience. '
  '12':
  - type: text
    content: 'We are not trying to commend ourselves to you again, but are giving you an opportunity to take pride in us, so that you can answer those who take pride in what is seen rather than in what is in the heart. '
  '13':
  - type: text
    content: 'If we are “out of our mind,” as some say, it is for God; if we are in our right mind, it is for you. '
  '14':
  - type: text
    content: 'For Christ’s love compels us, because we are convinced that one died for all, and therefore all died. '
  '15':
  - type: text
    content: And he died for all, that those who live should no longer live for themselves but for him who died for them and was raised again.
  '16':
  - type: text
    content: 'So from now on we regard no one from a worldly point of view. Though we once regarded Christ in this way, we do so no longer. '
  '17':
  - type: text
    content: 'Therefore, if anyone is in Christ, the new creation has come:'
  - type: note
    content: Or Christ, that person is a new creation.
  - type: text
    content: ' The old has gone, the new is here! '
  '18':
  - type: text
    content: 'All this is from God, who reconciled us to himself through Christ and gave us the ministry of reconciliation: '
  '19':
  - type: text
    content: 'that God was reconciling the world to himself in Christ, not counting people’s sins against them. And he has committed to us the message of reconciliation. '
  '2':
  - type: text
    content: 'Meanwhile we groan, longing to be clothed instead with our heavenly dwelling, '
  '20':
  - type: text
    content: 'We are therefore Christ’s ambassadors, as though God were making his appeal through us. We implore you on Christ’s behalf: Be reconciled to God. '
  '21':
  - type: text
    content: God made him who had no sin to be sin
  - type: note
    content: Or be a sin offering
  - type: text
    content: ' for us, so that in him we might become the righteousness of God.'
  '3':
  - type: text
    content: 'because when we are clothed, we will not be found naked. '
  '4':
  - type: text
    content: 'For while we are in this tent, we groan and are burdened, because we do not wish to be unclothed but to be clothed instead with our heavenly dwelling, so that what is mortal may be swallowed up by life. '
  '5':
  - type: text
    content: Now the one who has fashioned us for this very purpose is God, who has given us the Spirit as a deposit, guaranteeing what is to come.
  '6':
  - type: text
    content: 'Therefore we are always confident and know that as long as we are at home in the body we are away from the Lord. '
  '7':
  - type: text
    content: 'For we live by faith, not by sight. '
  '8':
  - type: text
    content: 'We are confident, I say, and would prefer to be away from the body and at home with the Lord. '
  '9':
  - type: text
    content: 'So we make it our goal to please him, whether we are at home in the body or away from it. '
