document_id: GEN.28,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'So Isaac called for Jacob and blessed him. Then he commanded him: “Do not marry a Canaanite woman. '
  '10':
  - type: text
    content: 'Jacob left Beersheba and set out for Harran. '
  '11':
  - type: text
    content: 'When he reached a certain place, he stopped for the night because the sun had set. Taking one of the stones there, he put it under his head and lay down to sleep. '
  '12':
  - type: text
    content: 'He had a dream in which he saw a stairway resting on the earth, with its top reaching to heaven, and the angels of God were ascending and descending on it. '
  '13':
  - type: text
    content: There above it
  - type: note
    content: Or There beside him
  - type: text
    content: ' stood the '
  - type: text
    content: Lord
  - type: text
    content: ', and he said: “I am the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of your father Abraham and the God of Isaac. I will give you and your descendants the land on which you are lying. '
  '14':
  - type: text
    content: Your descendants will be like the dust of the earth, and you will spread out to the west and to the east, to the north and to the south. All peoples on earth will be blessed through you and your offspring.
  - type: note
    content: Or will use your name and the name of your offspring in blessings (see 48:20)
  - type: text
    content: ' '
  '15':
  - type: text
    content: I am with you and will watch over you wherever you go, and I will bring you back to this land. I will not leave you until I have done what I have promised you.”
  '16':
  - type: text
    content: 'When Jacob awoke from his sleep, he thought, “Surely the '
  - type: text
    content: Lord
  - type: text
    content: ' is in this place, and I was not aware of it.” '
  '17':
  - type: text
    content: He was afraid and said, “How awesome is this place! This is none other than the house of God; this is the gate of heaven.”
  '18':
  - type: text
    content: 'Early the next morning Jacob took the stone he had placed under his head and set it up as a pillar and poured oil on top of it. '
  '19':
  - type: text
    content: He called that place Bethel,
  - type: note
    content: Bethel means house of God.
  - type: text
    content: ' though the city used to be called Luz.'
  '2':
  - type: text
    content: Go at once to Paddan Aram,
  - type: note
    content: That is, Northwest Mesopotamia; also in verses 5, 6 and 7
  - type: text
    content: ' to the house of your mother’s father Bethuel. Take a wife for yourself there, from among the daughters of Laban, your mother’s brother. '
  '20':
  - type: text
    content: 'Then Jacob made a vow, saying, “If God will be with me and will watch over me on this journey I am taking and will give me food to eat and clothes to wear '
  '21':
  - type: text
    content: 'so that I return safely to my father’s household, then the '
  - type: text
    content: Lord
  - type: note
    content: Or Since God… father’s household, the Lord
  - type: text
    content: ' will be my God '
  '22':
  - type: text
    content: and
  - type: note
    content: Or household, and the Lord will be my God, 22 then
  - type: text
    content: ' this stone that I have set up as a pillar will be God’s house, and of all that you give me I will give you a tenth.”'
  '3':
  - type: text
    content: May God Almighty
  - type: note
    content: Hebrew El-Shaddai
  - type: text
    content: ' bless you and make you fruitful and increase your numbers until you become a community of peoples. '
  '4':
  - type: text
    content: 'May he give you and your descendants the blessing given to Abraham, so that you may take possession of the land where you now reside as a foreigner, the land God gave to Abraham.” '
  '5':
  - type: text
    content: Then Isaac sent Jacob on his way, and he went to Paddan Aram, to Laban son of Bethuel the Aramean, the brother of Rebekah, who was the mother of Jacob and Esau.
  '6':
  - type: text
    content: 'Now Esau learned that Isaac had blessed Jacob and had sent him to Paddan Aram to take a wife from there, and that when he blessed him he commanded him, “Do not marry a Canaanite woman,” '
  '7':
  - type: text
    content: 'and that Jacob had obeyed his father and mother and had gone to Paddan Aram. '
  '8':
  - type: text
    content: 'Esau then realized how displeasing the Canaanite women were to his father Isaac; '
  '9':
  - type: text
    content: so he went to Ishmael and married Mahalath, the sister of Nebaioth and daughter of Ishmael son of Abraham, in addition to the wives he already had.
  - type: heading
    content: Jacob’s Dream at Bethel
