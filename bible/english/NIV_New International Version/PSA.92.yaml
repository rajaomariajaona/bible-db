document_id: PSA.92,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 92
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 92:1-15 is numbered 92:2-16.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm. A song. For the Sabbath day.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'It is good to praise the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make music to your name, O Most High,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: You have exalted my horn
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '92:10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Horn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: here symbolizes strength.
      marker-yv: yv-n
    - type: text
      text: ' like that of a wild ox;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fine oils have been poured on me.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: My eyes have seen the defeat of my adversaries;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my ears have heard the rout of my wicked foes.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: The righteous will flourish like a palm tree,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will grow like a cedar of Lebanon;
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'planted in the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will flourish in the courts of our God.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: They will still bear fruit in old age,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will stay fresh and green,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'proclaiming, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is upright;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he is my Rock, and there is no wickedness in him.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: proclaiming your love in the morning
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your faithfulness at night,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: to the music of the ten-stringed lyre
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the melody of the harp.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For you make me glad by your deeds, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I sing for joy at what your hands have done.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'How great are your works, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: how profound your thoughts!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Senseless people do not know,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fools do not understand,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: that though the wicked spring up like grass
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all evildoers flourish,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will be destroyed forever.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'But you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', are forever exalted.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'For surely your enemies, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: surely your enemies will perish;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all evildoers will be scattered.
