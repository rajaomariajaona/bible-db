document_id: PSA.92,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 92In Hebrew texts 92:1-15 is numbered 92:2-16.
  - type: text
    content: A psalm. A song. For the Sabbath day.
  - type: text
    content: 'It is good to praise the '
  - type: text
    content: Lord
  - type: text
    content: and make music to your name, O Most High,
  '10':
  - type: text
    content: You have exalted my horn
  - type: note
    content: Horn here symbolizes strength.
  - type: text
    content: ' like that of a wild ox;'
  - type: text
    content: fine oils have been poured on me.
  '11':
  - type: text
    content: My eyes have seen the defeat of my adversaries;
  - type: text
    content: my ears have heard the rout of my wicked foes.
  '12':
  - type: text
    content: The righteous will flourish like a palm tree,
  - type: text
    content: they will grow like a cedar of Lebanon;
  '13':
  - type: text
    content: 'planted in the house of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: they will flourish in the courts of our God.
  '14':
  - type: text
    content: They will still bear fruit in old age,
  - type: text
    content: they will stay fresh and green,
  '15':
  - type: text
    content: 'proclaiming, “The '
  - type: text
    content: Lord
  - type: text
    content: ' is upright;'
  - type: text
    content: he is my Rock, and there is no wickedness in him.”
  '2':
  - type: text
    content: proclaiming your love in the morning
  - type: text
    content: and your faithfulness at night,
  '3':
  - type: text
    content: to the music of the ten-stringed lyre
  - type: text
    content: and the melody of the harp.
  '4':
  - type: text
    content: 'For you make me glad by your deeds, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: I sing for joy at what your hands have done.
  '5':
  - type: text
    content: 'How great are your works, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: how profound your thoughts!
  '6':
  - type: text
    content: Senseless people do not know,
  - type: text
    content: fools do not understand,
  '7':
  - type: text
    content: that though the wicked spring up like grass
  - type: text
    content: and all evildoers flourish,
  - type: text
    content: they will be destroyed forever.
  '8':
  - type: text
    content: 'But you, '
  - type: text
    content: Lord
  - type: text
    content: ', are forever exalted.'
  '9':
  - type: text
    content: 'For surely your enemies, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: surely your enemies will perish;
  - type: text
    content: all evildoers will be scattered.
