document_id: 1TI.2,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Instructions on Worship
  - type: text
    content: 'I urge, then, first of all, that petitions, prayers, intercession and thanksgiving be made for all people— '
  '10':
  - type: text
    content: but with good deeds, appropriate for women who profess to worship God.
  '11':
  - type: text
    content: A woman
  - type: note
    content: Or wife; also in verse 12
  - type: text
    content: ' should learn in quietness and full submission. '
  '12':
  - type: text
    content: I do not permit a woman to teach or to assume authority over a man;
  - type: note
    content: Or over her husband
  - type: text
    content: ' she must be quiet. '
  '13':
  - type: text
    content: 'For Adam was formed first, then Eve. '
  '14':
  - type: text
    content: 'And Adam was not the one deceived; it was the woman who was deceived and became a sinner. '
  '15':
  - type: text
    content: But women
  - type: note
    content: Greek she
  - type: text
    content: ' will be saved through childbearing—if they continue in faith, love and holiness with propriety.'
  '2':
  - type: text
    content: 'for kings and all those in authority, that we may live peaceful and quiet lives in all godliness and holiness. '
  '3':
  - type: text
    content: 'This is good, and pleases God our Savior, '
  '4':
  - type: text
    content: 'who wants all people to be saved and to come to a knowledge of the truth. '
  '5':
  - type: text
    content: 'For there is one God and one mediator between God and mankind, the man Christ Jesus, '
  '6':
  - type: text
    content: 'who gave himself as a ransom for all people. This has now been witnessed to at the proper time. '
  '7':
  - type: text
    content: And for this purpose I was appointed a herald and an apostle—I am telling the truth, I am not lying—and a true and faithful teacher of the Gentiles.
  '8':
  - type: text
    content: 'Therefore I want the men everywhere to pray, lifting up holy hands without anger or disputing. '
  '9':
  - type: text
    content: 'I also want the women to dress modestly, with decency and propriety, adorning themselves, not with elaborate hairstyles or gold or pearls or expensive clothes, '
