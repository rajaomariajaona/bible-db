document_id: ECC.3,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Time for Everything
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: There is a time for everything,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and a season for every activity under the heavens:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'I have seen the burden God has laid on the human race. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: He has made everything beautiful in its time. He has also set eternity in the human heart; yet
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: also placed ignorance in the human heart, so that
      marker-yv: yv-n
    - type: text
      text: ' no one can fathom what God has done from beginning to end. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'I know that there is nothing better for people than to be happy and to do good while they live. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'That each of them may eat and drink, and find satisfaction in all their toil—this is the gift of God. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I know that everything God does will endure forever; nothing can be added to it and nothing taken from it. God does it so that people will fear him.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Whatever is has already been,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and what will be has been before;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and God will call the past to account.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: God calls back the past
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'And I saw something else under the sun:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In the place of judgment—wickedness was there,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in the place of justice—wickedness was there.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: I said to myself,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “God will bring into judgment
  - type: usfm
    marker: q2
    children:
    - type: text
      text: both the righteous and the wicked,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for there will be a time for every activity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a time to judge every deed.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'I also said to myself, “As for humans, God tests them so that they may see that they are like the animals. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Surely the fate of human beings is like that of the animals; the same fate awaits them both: As one dies, so dies the other. All have the same breath'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: spirit
      marker-yv: yv-n
    - type: text
      text: '; humans have no advantage over animals. Everything is meaningless. '
  '2':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: a time to be born and a time to die,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a time to plant and a time to uproot,
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'All go to the same place; all come from dust, and to dust all return. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Who knows if the human spirit rises upward and if the spirit of the animal goes down into the earth?”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: So I saw that there is nothing better for a person than to enjoy their work, because that is their lot. For who can bring them to see what will happen after them?
  '3':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: a time to kill and a time to heal,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a time to tear down and a time to build,
  '4':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: a time to weep and a time to laugh,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a time to mourn and a time to dance,
  '5':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: a time to scatter stones and a time to gather them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a time to embrace and a time to refrain from embracing,
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: a time to search and a time to give up,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a time to keep and a time to throw away,
  '7':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: a time to tear and a time to mend,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a time to be silent and a time to speak,
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: a time to love and a time to hate,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a time for war and a time for peace.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'What do workers gain from their toil? '
