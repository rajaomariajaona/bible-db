document_id: ISA.43
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israel’s Only Savior
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'But now, this is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he who created you, Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'he who formed you, Israel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Do not fear, for I have redeemed you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have summoned you by name; you are mine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When you pass through the waters,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will be with you;
- type: usfm
  marker: q1
  children:
  - type: text
    text: and when you pass through the rivers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will not sweep over you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When you walk through the fire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will not be burned;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the flames will not set you ablaze.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'For I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Holy One of Israel, your Savior;
- type: usfm
  marker: q1
  children:
  - type: text
    text: I give Egypt for your ransom,
- type: usfm
  marker: q2
  children:
  - type: text
    text: Cush
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, the upper Nile region
    marker-yv: yv-n
  - type: text
    text: ' and Seba in your stead.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Since you are precious and honored in my sight,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and because I love you,
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will give people in exchange for you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nations in exchange for your life.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Do not be afraid, for I am with you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will bring your children from the east
- type: usfm
  marker: q2
  children:
  - type: text
    text: and gather you from the west.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I will say to the north, ‘Give them up!’
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to the south, ‘Do not hold them back.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bring my sons from afar
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my daughters from the ends of the earth—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: everyone who is called by my name,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whom I created for my glory,
- type: usfm
  marker: q2
  children:
  - type: text
    text: whom I formed and made.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Lead out those who have eyes but are blind,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who have ears but are deaf.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: All the nations gather together
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the peoples assemble.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Which of their gods foretold this
- type: usfm
  marker: q2
  children:
  - type: text
    text: and proclaimed to us the former things?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let them bring in their witnesses to prove they were right,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that others may hear and say, “It is true.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“You are my witnesses,” declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: “and my servant whom I have chosen,
- type: usfm
  marker: q1
  children:
  - type: text
    text: so that you may know and believe me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and understand that I am he.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Before me no god was formed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor will there be one after me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'I, even I, am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: and apart from me there is no savior.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: I have revealed and saved and proclaimed—
- type: usfm
  marker: q2
  children:
  - type: text
    text: I, and not some foreign god among you.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'You are my witnesses,” declares the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “that I am God.'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Yes, and from ancient days I am he.
- type: usfm
  marker: q1
  children:
  - type: text
    text: No one can deliver out of my hand.
- type: usfm
  marker: q2
  children:
  - type: text
    text: When I act, who can reverse it?”
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Mercy and Israel’s Unfaithfulness
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'your Redeemer, the Holy One of Israel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “For your sake I will send to Babylon
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bring down as fugitives all the Babylonians,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Chaldeans
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the ships in which they took pride.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', your Holy One,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Israel’s Creator, your King.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'This is what the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: he who made a way through the sea,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a path through the mighty waters,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: who drew out the chariots and horses,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the army and reinforcements together,
- type: usfm
  marker: q1
  children:
  - type: text
    text: and they lay there, never to rise again,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'extinguished, snuffed out like a wick:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: “Forget the former things;
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not dwell on the past.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: See, I am doing a new thing!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Now it springs up; do you not perceive it?
- type: usfm
  marker: q1
  children:
  - type: text
    text: I am making a way in the wilderness
- type: usfm
  marker: q2
  children:
  - type: text
    text: and streams in the wasteland.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: The wild animals honor me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the jackals and the owls,
- type: usfm
  marker: q1
  children:
  - type: text
    text: because I provide water in the wilderness
- type: usfm
  marker: q2
  children:
  - type: text
    text: and streams in the wasteland,
- type: usfm
  marker: q1
  children:
  - type: text
    text: to give drink to my people, my chosen,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: the people I formed for myself
- type: usfm
  marker: q2
  children:
  - type: text
    text: that they may proclaim my praise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: “Yet you have not called on me, Jacob,
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have not wearied yourselves for
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jacob; / surely you have grown weary of
    marker-yv: yv-n
  - type: text
    text: ' me, Israel.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: You have not brought me sheep for burnt offerings,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor honored me with your sacrifices.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I have not burdened you with grain offerings
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor wearied you with demands for incense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: You have not bought any fragrant calamus for me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or lavished on me the fat of your sacrifices.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you have burdened me with your sins
- type: usfm
  marker: q2
  children:
  - type: text
    text: and wearied me with your offenses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “I, even I, am he who blots out
- type: usfm
  marker: q2
  children:
  - type: text
    text: your transgressions, for my own sake,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and remembers your sins no more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Review the past for me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: let us argue the matter together;
- type: usfm
  marker: q2
  children:
  - type: text
    text: state the case for your innocence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Your first father sinned;
- type: usfm
  marker: q2
  children:
  - type: text
    text: those I sent to teach you rebelled against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: So I disgraced the dignitaries of your temple;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I consigned Jacob to destruction
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Hebrew term refers to the irrevocable giving over of things or persons to the '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Lord
      - type: text
        text: ', often by totally destroying them.'
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Israel to scorn.
