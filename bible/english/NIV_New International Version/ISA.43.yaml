document_id: ISA.43,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel’s Only Savior
  - type: text
    content: 'But now, this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says—'
  - type: text
    content: he who created you, Jacob,
  - type: text
    content: 'he who formed you, Israel:'
  - type: text
    content: “Do not fear, for I have redeemed you;
  - type: text
    content: I have summoned you by name; you are mine.
  '10':
  - type: text
    content: '“You are my witnesses,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “and my servant whom I have chosen,
  - type: text
    content: so that you may know and believe me
  - type: text
    content: and understand that I am he.
  - type: text
    content: Before me no god was formed,
  - type: text
    content: nor will there be one after me.
  '11':
  - type: text
    content: 'I, even I, am the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and apart from me there is no savior.
  '12':
  - type: text
    content: I have revealed and saved and proclaimed—
  - type: text
    content: I, and not some foreign god among you.
  - type: text
    content: 'You are my witnesses,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “that I am God.'
  '13':
  - type: text
    content: Yes, and from ancient days I am he.
  - type: text
    content: No one can deliver out of my hand.
  - type: text
    content: When I act, who can reverse it?”
  - type: heading
    content: God’s Mercy and Israel’s Unfaithfulness
  '14':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says—'
  - type: text
    content: 'your Redeemer, the Holy One of Israel:'
  - type: text
    content: “For your sake I will send to Babylon
  - type: text
    content: and bring down as fugitives all the Babylonians,
  - type: note
    content: Or Chaldeans
  - type: text
    content: in the ships in which they took pride.
  '15':
  - type: text
    content: 'I am the '
  - type: text
    content: Lord
  - type: text
    content: ', your Holy One,'
  - type: text
    content: Israel’s Creator, your King.”
  '16':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says—'
  - type: text
    content: he who made a way through the sea,
  - type: text
    content: a path through the mighty waters,
  '17':
  - type: text
    content: who drew out the chariots and horses,
  - type: text
    content: the army and reinforcements together,
  - type: text
    content: and they lay there, never to rise again,
  - type: text
    content: 'extinguished, snuffed out like a wick:'
  '18':
  - type: text
    content: “Forget the former things;
  - type: text
    content: do not dwell on the past.
  '19':
  - type: text
    content: See, I am doing a new thing!
  - type: text
    content: Now it springs up; do you not perceive it?
  - type: text
    content: I am making a way in the wilderness
  - type: text
    content: and streams in the wasteland.
  '2':
  - type: text
    content: When you pass through the waters,
  - type: text
    content: I will be with you;
  - type: text
    content: and when you pass through the rivers,
  - type: text
    content: they will not sweep over you.
  - type: text
    content: When you walk through the fire,
  - type: text
    content: you will not be burned;
  - type: text
    content: the flames will not set you ablaze.
  '20':
  - type: text
    content: The wild animals honor me,
  - type: text
    content: the jackals and the owls,
  - type: text
    content: because I provide water in the wilderness
  - type: text
    content: and streams in the wasteland,
  - type: text
    content: to give drink to my people, my chosen,
  '21':
  - type: text
    content: the people I formed for myself
  - type: text
    content: that they may proclaim my praise.
  '22':
  - type: text
    content: “Yet you have not called on me, Jacob,
  - type: text
    content: you have not wearied yourselves for
  - type: note
    content: Or Jacob; / surely you have grown weary of
  - type: text
    content: ' me, Israel.'
  '23':
  - type: text
    content: You have not brought me sheep for burnt offerings,
  - type: text
    content: nor honored me with your sacrifices.
  - type: text
    content: I have not burdened you with grain offerings
  - type: text
    content: nor wearied you with demands for incense.
  '24':
  - type: text
    content: You have not bought any fragrant calamus for me,
  - type: text
    content: or lavished on me the fat of your sacrifices.
  - type: text
    content: But you have burdened me with your sins
  - type: text
    content: and wearied me with your offenses.
  '25':
  - type: text
    content: “I, even I, am he who blots out
  - type: text
    content: your transgressions, for my own sake,
  - type: text
    content: and remembers your sins no more.
  '26':
  - type: text
    content: Review the past for me,
  - type: text
    content: let us argue the matter together;
  - type: text
    content: state the case for your innocence.
  '27':
  - type: text
    content: Your first father sinned;
  - type: text
    content: those I sent to teach you rebelled against me.
  '28':
  - type: text
    content: So I disgraced the dignitaries of your temple;
  - type: text
    content: I consigned Jacob to destruction
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them.
  - type: text
    content: and Israel to scorn.
  '3':
  - type: text
    content: 'For I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God,'
  - type: text
    content: the Holy One of Israel, your Savior;
  - type: text
    content: I give Egypt for your ransom,
  - type: text
    content: Cush
  - type: note
    content: That is, the upper Nile region
  - type: text
    content: ' and Seba in your stead.'
  '4':
  - type: text
    content: Since you are precious and honored in my sight,
  - type: text
    content: and because I love you,
  - type: text
    content: I will give people in exchange for you,
  - type: text
    content: nations in exchange for your life.
  '5':
  - type: text
    content: Do not be afraid, for I am with you;
  - type: text
    content: I will bring your children from the east
  - type: text
    content: and gather you from the west.
  '6':
  - type: text
    content: I will say to the north, ‘Give them up!’
  - type: text
    content: and to the south, ‘Do not hold them back.’
  - type: text
    content: Bring my sons from afar
  - type: text
    content: and my daughters from the ends of the earth—
  '7':
  - type: text
    content: everyone who is called by my name,
  - type: text
    content: whom I created for my glory,
  - type: text
    content: whom I formed and made.”
  '8':
  - type: text
    content: Lead out those who have eyes but are blind,
  - type: text
    content: who have ears but are deaf.
  '9':
  - type: text
    content: All the nations gather together
  - type: text
    content: and the peoples assemble.
  - type: text
    content: Which of their gods foretold this
  - type: text
    content: and proclaimed to us the former things?
  - type: text
    content: Let them bring in their witnesses to prove they were right,
  - type: text
    content: so that others may hear and say, “It is true.”
