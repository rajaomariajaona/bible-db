document_id: EZK.8,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Idolatry in the Temple
  - type: text
    content: 'In the sixth year, in the sixth month on the fifth day, while I was sitting in my house and the elders of Judah were sitting before me, the hand of the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' came on me there. '
  '10':
  - type: text
    content: 'So I went in and looked, and I saw portrayed all over the walls all kinds of crawling things and unclean animals and all the idols of Israel. '
  '11':
  - type: text
    content: In front of them stood seventy elders of Israel, and Jaazaniah son of Shaphan was standing among them. Each had a censer in his hand, and a fragrant cloud of incense was rising.
  '12':
  - type: text
    content: 'He said to me, “Son of man, have you seen what the elders of Israel are doing in the darkness, each at the shrine of his own idol? They say, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' does not see us; the '
  - type: text
    content: Lord
  - type: text
    content: ' has forsaken the land.’ ” '
  '13':
  - type: text
    content: Again, he said, “You will see them doing things that are even more detestable.”
  '14':
  - type: text
    content: 'Then he brought me to the entrance of the north gate of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', and I saw women sitting there, mourning the god Tammuz. '
  '15':
  - type: text
    content: He said to me, “Do you see this, son of man? You will see things that are even more detestable than this.”
  '16':
  - type: text
    content: 'He then brought me into the inner court of the house of the '
  - type: text
    content: Lord
  - type: text
    content: ', and there at the entrance to the temple, between the portico and the altar, were about twenty-five men. With their backs toward the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and their faces toward the east, they were bowing down to the sun in the east.'
  '17':
  - type: text
    content: 'He said to me, “Have you seen this, son of man? Is it a trivial matter for the people of Judah to do the detestable things they are doing here? Must they also fill the land with violence and continually arouse my anger? Look at them putting the branch to their nose! '
  '18':
  - type: text
    content: Therefore I will deal with them in anger; I will not look on them with pity or spare them. Although they shout in my ears, I will not listen to them.”
  '2':
  - type: text
    content: I looked, and I saw a figure like that of a man.
  - type: note
    content: Or saw a fiery figure
  - type: text
    content: ' From what appeared to be his waist down he was like fire, and from there up his appearance was as bright as glowing metal. '
  '3':
  - type: text
    content: 'He stretched out what looked like a hand and took me by the hair of my head. The Spirit lifted me up between earth and heaven and in visions of God he took me to Jerusalem, to the entrance of the north gate of the inner court, where the idol that provokes to jealousy stood. '
  '4':
  - type: text
    content: And there before me was the glory of the God of Israel, as in the vision I had seen in the plain.
  '5':
  - type: text
    content: Then he said to me, “Son of man, look toward the north.” So I looked, and in the entrance north of the gate of the altar I saw this idol of jealousy.
  '6':
  - type: text
    content: And he said to me, “Son of man, do you see what they are doing—the utterly detestable things the Israelites are doing here, things that will drive me far from my sanctuary? But you will see things that are even more detestable.”
  '7':
  - type: text
    content: 'Then he brought me to the entrance to the court. I looked, and I saw a hole in the wall. '
  '8':
  - type: text
    content: He said to me, “Son of man, now dig into the wall.” So I dug into the wall and saw a doorway there.
  '9':
  - type: text
    content: 'And he said to me, “Go in and see the wicked and detestable things they are doing here.” '
