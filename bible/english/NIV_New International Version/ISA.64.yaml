document_id: ISA.64,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 64:1 is numbered 63:19b, and 64:2-12 is numbered 64:1-11.
      marker-yv: yv-n
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Oh, that you would rend the heavens and come down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that the mountains would tremble before you!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Your sacred cities have become a wasteland;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even Zion is a wasteland, Jerusalem a desolation.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Our holy and glorious temple, where our ancestors praised you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has been burned with fire,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all that we treasured lies in ruins.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'After all this, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', will you hold yourself back?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Will you keep silent and punish us beyond measure?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: As when fire sets twigs ablaze
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and causes water to boil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: come down to make your name known to your enemies
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cause the nations to quake before you!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: For when you did awesome things that we did not expect,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you came down, and the mountains trembled before you.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Since ancient times no one has heard,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no ear has perceived,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no eye has seen any God besides you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who acts on behalf of those who wait for him.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: You come to the help of those who gladly do right,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who remember your ways.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But when we continued to sin against them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you were angry.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: How then can we be saved?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: All of us have become like one who is unclean,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all our righteous acts are like filthy rags;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: we all shrivel up like a leaf,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and like the wind our sins sweep us away.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: No one calls on your name
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or strives to lay hold of you;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you have hidden your face from us
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have given us over to
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '64:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint, Syriac and Targum; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: have made us melt because of
      marker-yv: yv-n
    - type: text
      text: ' our sins.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Yet you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', are our Father.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: We are the clay, you are the potter;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: we are all the work of your hand.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Do not be angry beyond measure, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not remember our sins forever.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh, look on us, we pray,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for we are all your people.
