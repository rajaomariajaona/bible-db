document_id: ISA.64,111
type_code: eng
verses:
  '1':
  - type: note
    content: In Hebrew texts 64:1 is numbered 63:19b, and 64:2-12 is numbered 64:1-11.
  - type: text
    content: Oh, that you would rend the heavens and come down,
  - type: text
    content: that the mountains would tremble before you!
  '10':
  - type: text
    content: Your sacred cities have become a wasteland;
  - type: text
    content: even Zion is a wasteland, Jerusalem a desolation.
  '11':
  - type: text
    content: Our holy and glorious temple, where our ancestors praised you,
  - type: text
    content: has been burned with fire,
  - type: text
    content: and all that we treasured lies in ruins.
  '12':
  - type: text
    content: 'After all this, '
  - type: text
    content: Lord
  - type: text
    content: ', will you hold yourself back?'
  - type: text
    content: Will you keep silent and punish us beyond measure?
  '2':
  - type: text
    content: As when fire sets twigs ablaze
  - type: text
    content: and causes water to boil,
  - type: text
    content: come down to make your name known to your enemies
  - type: text
    content: and cause the nations to quake before you!
  '3':
  - type: text
    content: For when you did awesome things that we did not expect,
  - type: text
    content: you came down, and the mountains trembled before you.
  '4':
  - type: text
    content: Since ancient times no one has heard,
  - type: text
    content: no ear has perceived,
  - type: text
    content: no eye has seen any God besides you,
  - type: text
    content: who acts on behalf of those who wait for him.
  '5':
  - type: text
    content: You come to the help of those who gladly do right,
  - type: text
    content: who remember your ways.
  - type: text
    content: But when we continued to sin against them,
  - type: text
    content: you were angry.
  - type: text
    content: How then can we be saved?
  '6':
  - type: text
    content: All of us have become like one who is unclean,
  - type: text
    content: and all our righteous acts are like filthy rags;
  - type: text
    content: we all shrivel up like a leaf,
  - type: text
    content: and like the wind our sins sweep us away.
  '7':
  - type: text
    content: No one calls on your name
  - type: text
    content: or strives to lay hold of you;
  - type: text
    content: for you have hidden your face from us
  - type: text
    content: and have given us over to
  - type: note
    content: Septuagint, Syriac and Targum; Hebrew have made us melt because of
  - type: text
    content: ' our sins.'
  '8':
  - type: text
    content: 'Yet you, '
  - type: text
    content: Lord
  - type: text
    content: ', are our Father.'
  - type: text
    content: We are the clay, you are the potter;
  - type: text
    content: we are all the work of your hand.
  '9':
  - type: text
    content: 'Do not be angry beyond measure, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: do not remember our sins forever.
  - type: text
    content: Oh, look on us, we pray,
  - type: text
    content: for we are all your people.
