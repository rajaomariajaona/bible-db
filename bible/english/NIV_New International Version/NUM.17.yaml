document_id: NUM.17,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Budding of Aaron’s Staff
  - type: note
    content: In Hebrew texts 17:1-13 is numbered 17:16-28.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Put back Aaron’s staff in front of the ark of the covenant law, to be kept as a sign to the rebellious. This will put an end to their grumbling against me, so that they will not die.” '
  '11':
  - type: text
    content: 'Moses did just as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded him.'
  '12':
  - type: text
    content: 'The Israelites said to Moses, “We will die! We are lost, we are all lost! '
  '13':
  - type: text
    content: 'Anyone who even comes near the tabernacle of the '
  - type: text
    content: Lord
  - type: text
    content: ' will die. Are we all going to die?”'
  '2':
  - type: text
    content: '“Speak to the Israelites and get twelve staffs from them, one from the leader of each of their ancestral tribes. Write the name of each man on his staff. '
  '3':
  - type: text
    content: 'On the staff of Levi write Aaron’s name, for there must be one staff for the head of each ancestral tribe. '
  '4':
  - type: text
    content: 'Place them in the tent of meeting in front of the ark of the covenant law, where I meet with you. '
  '5':
  - type: text
    content: The staff belonging to the man I choose will sprout, and I will rid myself of this constant grumbling against you by the Israelites.”
  '6':
  - type: text
    content: 'So Moses spoke to the Israelites, and their leaders gave him twelve staffs, one for the leader of each of their ancestral tribes, and Aaron’s staff was among them. '
  '7':
  - type: text
    content: 'Moses placed the staffs before the '
  - type: text
    content: Lord
  - type: text
    content: ' in the tent of the covenant law.'
  '8':
  - type: text
    content: 'The next day Moses entered the tent and saw that Aaron’s staff, which represented the tribe of Levi, had not only sprouted but had budded, blossomed and produced almonds. '
  '9':
  - type: text
    content: 'Then Moses brought out all the staffs from the '
  - type: text
    content: Lord
  - type: text
    content: ’s presence to all the Israelites. They looked at them, and each of the leaders took his own staff.
