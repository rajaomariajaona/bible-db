document_id: PSA.23,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 23
  - type: text
    content: A psalm of David.
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' is my shepherd, I lack nothing.'
  '2':
  - type: text
    content: He makes me lie down in green pastures,
  - type: text
    content: he leads me beside quiet waters,
  '3':
  - type: text
    content: he refreshes my soul.
  - type: text
    content: He guides me along the right paths
  - type: text
    content: for his name’s sake.
  '4':
  - type: text
    content: Even though I walk
  - type: text
    content: through the darkest valley,
  - type: note
    content: Or the valley of the shadow of death
  - type: text
    content: I will fear no evil,
  - type: text
    content: for you are with me;
  - type: text
    content: your rod and your staff,
  - type: text
    content: they comfort me.
  '5':
  - type: text
    content: You prepare a table before me
  - type: text
    content: in the presence of my enemies.
  - type: text
    content: You anoint my head with oil;
  - type: text
    content: my cup overflows.
  '6':
  - type: text
    content: Surely your goodness and love will follow me
  - type: text
    content: all the days of my life,
  - type: text
    content: 'and I will dwell in the house of the '
  - type: text
    content: Lord
  - type: text
    content: forever.
