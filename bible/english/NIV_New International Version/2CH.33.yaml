document_id: 2CH.33,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Manasseh King of Judah
  - type: text
    content: 'Manasseh was twelve years old when he became king, and he reigned in Jerusalem fifty-five years. '
  '10':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to Manasseh and his people, but they paid no attention. '
  '11':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' brought against them the army commanders of the king of Assyria, who took Manasseh prisoner, put a hook in his nose, bound him with bronze shackles and took him to Babylon. '
  '12':
  - type: text
    content: 'In his distress he sought the favor of the '
  - type: text
    content: Lord
  - type: text
    content: ' his God and humbled himself greatly before the God of his ancestors. '
  '13':
  - type: text
    content: 'And when he prayed to him, the '
  - type: text
    content: Lord
  - type: text
    content: ' was moved by his entreaty and listened to his plea; so he brought him back to Jerusalem and to his kingdom. Then Manasseh knew that the '
  - type: text
    content: Lord
  - type: text
    content: ' is God.'
  '14':
  - type: text
    content: Afterward he rebuilt the outer wall of the City of David, west of the Gihon spring in the valley, as far as the entrance of the Fish Gate and encircling the hill of Ophel; he also made it much higher. He stationed military commanders in all the fortified cities in Judah.
  '15':
  - type: text
    content: 'He got rid of the foreign gods and removed the image from the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', as well as all the altars he had built on the temple hill and in Jerusalem; and he threw them out of the city. '
  '16':
  - type: text
    content: 'Then he restored the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' and sacrificed fellowship offerings and thank offerings on it, and told Judah to serve the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel. '
  '17':
  - type: text
    content: 'The people, however, continued to sacrifice at the high places, but only to the '
  - type: text
    content: Lord
  - type: text
    content: ' their God.'
  '18':
  - type: text
    content: 'The other events of Manasseh’s reign, including his prayer to his God and the words the seers spoke to him in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, are written in the annals of the kings of Israel.'
  - type: note
    content: That is, Judah, as frequently in 2 Chronicles
  - type: text
    content: ' '
  '19':
  - type: text
    content: His prayer and how God was moved by his entreaty, as well as all his sins and unfaithfulness, and the sites where he built high places and set up Asherah poles and idols before he humbled himself—all these are written in the records of the seers.
  - type: note
    content: One Hebrew manuscript and Septuagint; most Hebrew manuscripts of Hozai
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'He did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', following the detestable practices of the nations the '
  - type: text
    content: Lord
  - type: text
    content: ' had driven out before the Israelites. '
  '20':
  - type: text
    content: Manasseh rested with his ancestors and was buried in his palace. And Amon his son succeeded him as king.
  - type: heading
    content: Amon King of Judah
  '21':
  - type: text
    content: 'Amon was twenty-two years old when he became king, and he reigned in Jerusalem two years. '
  '22':
  - type: text
    content: 'He did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', as his father Manasseh had done. Amon worshiped and offered sacrifices to all the idols Manasseh had made. '
  '23':
  - type: text
    content: 'But unlike his father Manasseh, he did not humble himself before the '
  - type: text
    content: Lord
  - type: text
    content: ; Amon increased his guilt.
  '24':
  - type: text
    content: 'Amon’s officials conspired against him and assassinated him in his palace. '
  '25':
  - type: text
    content: Then the people of the land killed all who had plotted against King Amon, and they made Josiah his son king in his place.
  '3':
  - type: text
    content: 'He rebuilt the high places his father Hezekiah had demolished; he also erected altars to the Baals and made Asherah poles. He bowed down to all the starry hosts and worshiped them. '
  '4':
  - type: text
    content: 'He built altars in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', of which the '
  - type: text
    content: Lord
  - type: text
    content: ' had said, “My Name will remain in Jerusalem forever.” '
  '5':
  - type: text
    content: 'In both courts of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ', he built altars to all the starry hosts. '
  '6':
  - type: text
    content: 'He sacrificed his children in the fire in the Valley of Ben Hinnom, practiced divination and witchcraft, sought omens, and consulted mediums and spiritists. He did much evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', arousing his anger.'
  '7':
  - type: text
    content: 'He took the image he had made and put it in God’s temple, of which God had said to David and to his son Solomon, “In this temple and in Jerusalem, which I have chosen out of all the tribes of Israel, I will put my Name forever. '
  '8':
  - type: text
    content: 'I will not again make the feet of the Israelites leave the land I assigned to your ancestors, if only they will be careful to do everything I commanded them concerning all the laws, decrees and regulations given through Moses.” '
  '9':
  - type: text
    content: 'But Manasseh led Judah and the people of Jerusalem astray, so that they did more evil than the nations the '
  - type: text
    content: Lord
  - type: text
    content: ' had destroyed before the Israelites.'
