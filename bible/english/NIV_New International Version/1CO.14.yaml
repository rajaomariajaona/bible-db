document_id: 1CO.14,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Intelligibility in Worship
  - type: text
    content: 'Follow the way of love and eagerly desire gifts of the Spirit, especially prophecy. '
  '10':
  - type: text
    content: 'Undoubtedly there are all sorts of languages in the world, yet none of them is without meaning. '
  '11':
  - type: text
    content: 'If then I do not grasp the meaning of what someone is saying, I am a foreigner to the speaker, and the speaker is a foreigner to me. '
  '12':
  - type: text
    content: So it is with you. Since you are eager for gifts of the Spirit, try to excel in those that build up the church.
  '13':
  - type: text
    content: 'For this reason the one who speaks in a tongue should pray that they may interpret what they say. '
  '14':
  - type: text
    content: 'For if I pray in a tongue, my spirit prays, but my mind is unfruitful. '
  '15':
  - type: text
    content: 'So what shall I do? I will pray with my spirit, but I will also pray with my understanding; I will sing with my spirit, but I will also sing with my understanding. '
  '16':
  - type: text
    content: Otherwise when you are praising God in the Spirit, how can someone else, who is now put in the position of an inquirer,
  - type: note
    content: The Greek word for inquirer is a technical term for someone not fully initiated into a religion; also in verses 23 and 24.
  - type: text
    content: ' say “Amen” to your thanksgiving, since they do not know what you are saying? '
  '17':
  - type: text
    content: You are giving thanks well enough, but no one else is edified.
  '18':
  - type: text
    content: 'I thank God that I speak in tongues more than all of you. '
  '19':
  - type: text
    content: But in the church I would rather speak five intelligible words to instruct others than ten thousand words in a tongue.
  '2':
  - type: text
    content: For anyone who speaks in a tongue
  - type: note
    content: Or in another language; also in verses 4, 13, 14, 19, 26 and 27
  - type: text
    content: ' does not speak to people but to God. Indeed, no one understands them; they utter mysteries by the Spirit. '
  '20':
  - type: text
    content: 'Brothers and sisters, stop thinking like children. In regard to evil be infants, but in your thinking be adults. '
  '21':
  - type: text
    content: 'In the Law it is written:'
  - type: text
    content: “With other tongues
  - type: text
    content: and through the lips of foreigners
  - type: text
    content: I will speak to this people,
  - type: text
    content: but even then they will not listen to me,
  - type: text
    content: says the Lord.”
  - type: note
    content: Isaiah 28:11,12
  '22':
  - type: text
    content: 'Tongues, then, are a sign, not for believers but for unbelievers; prophecy, however, is not for unbelievers but for believers. '
  '23':
  - type: text
    content: 'So if the whole church comes together and everyone speaks in tongues, and inquirers or unbelievers come in, will they not say that you are out of your mind? '
  '24':
  - type: text
    content: 'But if an unbeliever or an inquirer comes in while everyone is prophesying, they are convicted of sin and are brought under judgment by all, '
  '25':
  - type: text
    content: as the secrets of their hearts are laid bare. So they will fall down and worship God, exclaiming, “God is really among you!”
  - type: heading
    content: Good Order in Worship
  '26':
  - type: text
    content: 'What then shall we say, brothers and sisters? When you come together, each of you has a hymn, or a word of instruction, a revelation, a tongue or an interpretation. Everything must be done so that the church may be built up. '
  '27':
  - type: text
    content: 'If anyone speaks in a tongue, two—or at the most three—should speak, one at a time, and someone must interpret. '
  '28':
  - type: text
    content: If there is no interpreter, the speaker should keep quiet in the church and speak to himself and to God.
  '29':
  - type: text
    content: 'Two or three prophets should speak, and the others should weigh carefully what is said. '
  '3':
  - type: text
    content: 'But the one who prophesies speaks to people for their strengthening, encouraging and comfort. '
  '30':
  - type: text
    content: 'And if a revelation comes to someone who is sitting down, the first speaker should stop. '
  '31':
  - type: text
    content: 'For you can all prophesy in turn so that everyone may be instructed and encouraged. '
  '32':
  - type: text
    content: 'The spirits of prophets are subject to the control of prophets. '
  '33':
  - type: text
    content: For God is not a God of disorder but of peace—as in all the congregations of the Lord’s people.
  '34':
  - type: text
    content: Women
  - type: note
    content: Or peace. As in all the congregations of the Lord’s people, 34 women
  - type: text
    content: ' should remain silent in the churches. They are not allowed to speak, but must be in submission, as the law says. '
  '35':
  - type: text
    content: If they want to inquire about something, they should ask their own husbands at home; for it is disgraceful for a woman to speak in the church.
  - type: note
    content: In a few manuscripts these verses come after verse 40.
  '36':
  - type: text
    content: 'Or did the word of God originate with you? Or are you the only people it has reached? '
  '37':
  - type: text
    content: 'If anyone thinks they are a prophet or otherwise gifted by the Spirit, let them acknowledge that what I am writing to you is the Lord’s command. '
  '38':
  - type: text
    content: But if anyone ignores this, they will themselves be ignored.
  - type: note
    content: Some manuscripts But anyone who is ignorant of this will be ignorant
  '39':
  - type: text
    content: 'Therefore, my brothers and sisters, be eager to prophesy, and do not forbid speaking in tongues. '
  '4':
  - type: text
    content: 'Anyone who speaks in a tongue edifies themselves, but the one who prophesies edifies the church. '
  '40':
  - type: text
    content: But everything should be done in a fitting and orderly way.
  '5':
  - type: text
    content: I would like every one of you to speak in tongues,
  - type: note
    content: Or in other languages; also in verses 6, 18, 22, 23 and 39
  - type: text
    content: ' but I would rather have you prophesy. The one who prophesies is greater than the one who speaks in tongues,'
  - type: note
    content: Or in other languages; also in verses 6, 18, 22, 23 and 39
  - type: text
    content: ' unless someone interprets, so that the church may be edified.'
  '6':
  - type: text
    content: 'Now, brothers and sisters, if I come to you and speak in tongues, what good will I be to you, unless I bring you some revelation or knowledge or prophecy or word of instruction? '
  '7':
  - type: text
    content: 'Even in the case of lifeless things that make sounds, such as the pipe or harp, how will anyone know what tune is being played unless there is a distinction in the notes? '
  '8':
  - type: text
    content: 'Again, if the trumpet does not sound a clear call, who will get ready for battle? '
  '9':
  - type: text
    content: 'So it is with you. Unless you speak intelligible words with your tongue, how will anyone know what you are saying? You will just be speaking into the air. '
