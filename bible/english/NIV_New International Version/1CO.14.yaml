document_id: 1CO.14
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Intelligibility in Worship
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Follow the way of love and eagerly desire gifts of the Spirit, especially prophecy. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: For anyone who speaks in a tongue
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in another language
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verses 4, 13, 14, 19, 26 and 27
    marker-yv: yv-n
  - type: text
    text: ' does not speak to people but to God. Indeed, no one understands them; they utter mysteries by the Spirit. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'But the one who prophesies speaks to people for their strengthening, encouraging and comfort. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Anyone who speaks in a tongue edifies themselves, but the one who prophesies edifies the church. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: I would like every one of you to speak in tongues,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in other languages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verses 6, 18, 22, 23 and 39
    marker-yv: yv-n
  - type: text
    text: ' but I would rather have you prophesy. The one who prophesies is greater than the one who speaks in tongues,'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: in other languages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verses 6, 18, 22, 23 and 39
    marker-yv: yv-n
  - type: text
    text: ' unless someone interprets, so that the church may be edified.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Now, brothers and sisters, if I come to you and speak in tongues, what good will I be to you, unless I bring you some revelation or knowledge or prophecy or word of instruction? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Even in the case of lifeless things that make sounds, such as the pipe or harp, how will anyone know what tune is being played unless there is a distinction in the notes? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Again, if the trumpet does not sound a clear call, who will get ready for battle? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'So it is with you. Unless you speak intelligible words with your tongue, how will anyone know what you are saying? You will just be speaking into the air. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Undoubtedly there are all sorts of languages in the world, yet none of them is without meaning. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'If then I do not grasp the meaning of what someone is saying, I am a foreigner to the speaker, and the speaker is a foreigner to me. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: So it is with you. Since you are eager for gifts of the Spirit, try to excel in those that build up the church.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For this reason the one who speaks in a tongue should pray that they may interpret what they say. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For if I pray in a tongue, my spirit prays, but my mind is unfruitful. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'So what shall I do? I will pray with my spirit, but I will also pray with my understanding; I will sing with my spirit, but I will also sing with my understanding. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Otherwise when you are praising God in the Spirit, how can someone else, who is now put in the position of an inquirer,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek word for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'inquirer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: is a technical term for someone not fully initiated into a religion; also in verses 23 and 24.
    marker-yv: yv-n
  - type: text
    text: ' say “Amen” to your thanksgiving, since they do not know what you are saying? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: You are giving thanks well enough, but no one else is edified.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'I thank God that I speak in tongues more than all of you. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: But in the church I would rather speak five intelligible words to instruct others than ten thousand words in a tongue.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Brothers and sisters, stop thinking like children. In regard to evil be infants, but in your thinking be adults. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'In the Law it is written:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “With other tongues
- type: usfm
  marker: q2
  children:
  - type: text
    text: and through the lips of foreigners
- type: usfm
  marker: q1
  children:
  - type: text
    text: I will speak to this people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but even then they will not listen to me,
- type: usfm
  marker: q4
  children:
  - type: text
    text: says the Lord.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah 28:11,12
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tongues, then, are a sign, not for believers but for unbelievers; prophecy, however, is not for unbelievers but for believers. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'So if the whole church comes together and everyone speaks in tongues, and inquirers or unbelievers come in, will they not say that you are out of your mind? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'But if an unbeliever or an inquirer comes in while everyone is prophesying, they are convicted of sin and are brought under judgment by all, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: as the secrets of their hearts are laid bare. So they will fall down and worship God, exclaiming, “God is really among you!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Good Order in Worship
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'What then shall we say, brothers and sisters? When you come together, each of you has a hymn, or a word of instruction, a revelation, a tongue or an interpretation. Everything must be done so that the church may be built up. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'If anyone speaks in a tongue, two—or at the most three—should speak, one at a time, and someone must interpret. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: If there is no interpreter, the speaker should keep quiet in the church and speak to himself and to God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Two or three prophets should speak, and the others should weigh carefully what is said. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'And if a revelation comes to someone who is sitting down, the first speaker should stop. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'For you can all prophesy in turn so that everyone may be instructed and encouraged. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'The spirits of prophets are subject to the control of prophets. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: For God is not a God of disorder but of peace—as in all the congregations of the Lord’s people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Women
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:33,34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'peace. As in all the congregations of the Lord’s people, '
    - type: usfm
      marker: fv
      children:
      - type: text
        text: '34 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: women
    marker-yv: yv-n
  - type: text
    text: ' should remain silent in the churches. They are not allowed to speak, but must be in submission, as the law says. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: If they want to inquire about something, they should ask their own husbands at home; for it is disgraceful for a woman to speak in the church.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:34,35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In a few manuscripts these verses come after verse 40.
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Or did the word of God originate with you? Or are you the only people it has reached? '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'If anyone thinks they are a prophet or otherwise gifted by the Spirit, let them acknowledge that what I am writing to you is the Lord’s command. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: But if anyone ignores this, they will themselves be ignored.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14:38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: But anyone who is ignorant of this will be ignorant
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Therefore, my brothers and sisters, be eager to prophesy, and do not forbid speaking in tongues. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: But everything should be done in a fitting and orderly way.
