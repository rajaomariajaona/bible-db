document_id: EZK.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Razor of Judgment
  - type: text
    content: '“Now, son of man, take a sharp sword and use it as a barber’s razor to shave your head and your beard. Then take a set of scales and divide up the hair. '
  '10':
  - type: text
    content: 'Therefore in your midst parents will eat their children, and children will eat their parents. I will inflict punishment on you and will scatter all your survivors to the winds. '
  '11':
  - type: text
    content: 'Therefore as surely as I live, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', because you have defiled my sanctuary with all your vile images and detestable practices, I myself will shave you; I will not look on you with pity or spare you. '
  '12':
  - type: text
    content: A third of your people will die of the plague or perish by famine inside you; a third will fall by the sword outside your walls; and a third I will scatter to the winds and pursue with drawn sword.
  '13':
  - type: text
    content: '“Then my anger will cease and my wrath against them will subside, and I will be avenged. And when I have spent my wrath on them, they will know that I the '
  - type: text
    content: Lord
  - type: text
    content: ' have spoken in my zeal.'
  '14':
  - type: text
    content: '“I will make you a ruin and a reproach among the nations around you, in the sight of all who pass by. '
  '15':
  - type: text
    content: 'You will be a reproach and a taunt, a warning and an object of horror to the nations around you when I inflict punishment on you in anger and in wrath and with stinging rebuke. I the '
  - type: text
    content: Lord
  - type: text
    content: ' have spoken. '
  '16':
  - type: text
    content: 'When I shoot at you with my deadly and destructive arrows of famine, I will shoot to destroy you. I will bring more and more famine upon you and cut off your supply of food. '
  '17':
  - type: text
    content: 'I will send famine and wild beasts against you, and they will leave you childless. Plague and bloodshed will sweep through you, and I will bring the sword against you. I the '
  - type: text
    content: Lord
  - type: text
    content: ' have spoken.”'
  '2':
  - type: text
    content: 'When the days of your siege come to an end, burn a third of the hair inside the city. Take a third and strike it with the sword all around the city. And scatter a third to the wind. For I will pursue them with drawn sword. '
  '3':
  - type: text
    content: 'But take a few hairs and tuck them away in the folds of your garment. '
  '4':
  - type: text
    content: Again, take a few of these and throw them into the fire and burn them up. A fire will spread from there to all Israel.
  '5':
  - type: text
    content: '“This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: This is Jerusalem, which I have set in the center of the nations, with countries all around her. '
  '6':
  - type: text
    content: Yet in her wickedness she has rebelled against my laws and decrees more than the nations and countries around her. She has rejected my laws and has not followed my decrees.
  '7':
  - type: text
    content: '“Therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: You have been more unruly than the nations around you and have not followed my decrees or kept my laws. You have not even'
  - type: note
    content: Most Hebrew manuscripts; some Hebrew manuscripts and Syriac You have
  - type: text
    content: ' conformed to the standards of the nations around you.'
  '8':
  - type: text
    content: '“Therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I myself am against you, Jerusalem, and I will inflict punishment on you in the sight of the nations. '
  '9':
  - type: text
    content: 'Because of all your detestable idols, I will do to you what I have never done before and will never do again. '
