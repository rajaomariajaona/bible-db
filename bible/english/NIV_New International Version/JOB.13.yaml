document_id: JOB.13,111
type_code: eng
verses:
  '1':
  - type: text
    content: “My eyes have seen all this,
  - type: text
    content: my ears have heard and understood it.
  '10':
  - type: text
    content: He would surely call you to account
  - type: text
    content: if you secretly showed partiality.
  '11':
  - type: text
    content: Would not his splendor terrify you?
  - type: text
    content: Would not the dread of him fall on you?
  '12':
  - type: text
    content: Your maxims are proverbs of ashes;
  - type: text
    content: your defenses are defenses of clay.
  '13':
  - type: text
    content: “Keep silent and let me speak;
  - type: text
    content: then let come to me what may.
  '14':
  - type: text
    content: Why do I put myself in jeopardy
  - type: text
    content: and take my life in my hands?
  '15':
  - type: text
    content: Though he slay me, yet will I hope in him;
  - type: text
    content: I will surely
  - type: note
    content: Or He will surely slay me; I have no hope— / yet I will
  - type: text
    content: ' defend my ways to his face.'
  '16':
  - type: text
    content: Indeed, this will turn out for my deliverance,
  - type: text
    content: for no godless person would dare come before him!
  '17':
  - type: text
    content: Listen carefully to what I say;
  - type: text
    content: let my words ring in your ears.
  '18':
  - type: text
    content: Now that I have prepared my case,
  - type: text
    content: I know I will be vindicated.
  '19':
  - type: text
    content: Can anyone bring charges against me?
  - type: text
    content: If so, I will be silent and die.
  '2':
  - type: text
    content: What you know, I also know;
  - type: text
    content: I am not inferior to you.
  '20':
  - type: text
    content: “Only grant me these two things, God,
  - type: text
    content: 'and then I will not hide from you:'
  '21':
  - type: text
    content: Withdraw your hand far from me,
  - type: text
    content: and stop frightening me with your terrors.
  '22':
  - type: text
    content: Then summon me and I will answer,
  - type: text
    content: or let me speak, and you reply to me.
  '23':
  - type: text
    content: How many wrongs and sins have I committed?
  - type: text
    content: Show me my offense and my sin.
  '24':
  - type: text
    content: Why do you hide your face
  - type: text
    content: and consider me your enemy?
  '25':
  - type: text
    content: Will you torment a windblown leaf?
  - type: text
    content: Will you chase after dry chaff?
  '26':
  - type: text
    content: For you write down bitter things against me
  - type: text
    content: and make me reap the sins of my youth.
  '27':
  - type: text
    content: You fasten my feet in shackles;
  - type: text
    content: you keep close watch on all my paths
  - type: text
    content: by putting marks on the soles of my feet.
  '28':
  - type: text
    content: “So man wastes away like something rotten,
  - type: text
    content: like a garment eaten by moths.
  '3':
  - type: text
    content: But I desire to speak to the Almighty
  - type: text
    content: and to argue my case with God.
  '4':
  - type: text
    content: You, however, smear me with lies;
  - type: text
    content: you are worthless physicians, all of you!
  '5':
  - type: text
    content: If only you would be altogether silent!
  - type: text
    content: For you, that would be wisdom.
  '6':
  - type: text
    content: Hear now my argument;
  - type: text
    content: listen to the pleas of my lips.
  '7':
  - type: text
    content: Will you speak wickedly on God’s behalf?
  - type: text
    content: Will you speak deceitfully for him?
  '8':
  - type: text
    content: Will you show him partiality?
  - type: text
    content: Will you argue the case for God?
  '9':
  - type: text
    content: Would it turn out well if he examined you?
  - type: text
    content: Could you deceive him as you might deceive a mortal?
