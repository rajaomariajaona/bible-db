document_id: JOB.13
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: “My eyes have seen all this,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my ears have heard and understood it.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: What you know, I also know;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am not inferior to you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: But I desire to speak to the Almighty
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to argue my case with God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You, however, smear me with lies;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you are worthless physicians, all of you!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: If only you would be altogether silent!
- type: usfm
  marker: q2
  children:
  - type: text
    text: For you, that would be wisdom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Hear now my argument;
- type: usfm
  marker: q2
  children:
  - type: text
    text: listen to the pleas of my lips.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Will you speak wickedly on God’s behalf?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will you speak deceitfully for him?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Will you show him partiality?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will you argue the case for God?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Would it turn out well if he examined you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Could you deceive him as you might deceive a mortal?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He would surely call you to account
- type: usfm
  marker: q2
  children:
  - type: text
    text: if you secretly showed partiality.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Would not his splendor terrify you?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Would not the dread of him fall on you?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Your maxims are proverbs of ashes;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your defenses are defenses of clay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “Keep silent and let me speak;
- type: usfm
  marker: q2
  children:
  - type: text
    text: then let come to me what may.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Why do I put myself in jeopardy
- type: usfm
  marker: q2
  children:
  - type: text
    text: and take my life in my hands?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Though he slay me, yet will I hope in him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will surely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: He will surely slay me; I have no hope— / yet I will
    marker-yv: yv-n
  - type: text
    text: ' defend my ways to his face.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Indeed, this will turn out for my deliverance,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for no godless person would dare come before him!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Listen carefully to what I say;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let my words ring in your ears.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Now that I have prepared my case,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I know I will be vindicated.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Can anyone bring charges against me?
- type: usfm
  marker: q2
  children:
  - type: text
    text: If so, I will be silent and die.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “Only grant me these two things, God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and then I will not hide from you:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Withdraw your hand far from me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and stop frightening me with your terrors.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Then summon me and I will answer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or let me speak, and you reply to me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: How many wrongs and sins have I committed?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Show me my offense and my sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Why do you hide your face
- type: usfm
  marker: q2
  children:
  - type: text
    text: and consider me your enemy?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Will you torment a windblown leaf?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will you chase after dry chaff?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: For you write down bitter things against me
- type: usfm
  marker: q2
  children:
  - type: text
    text: and make me reap the sins of my youth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: You fasten my feet in shackles;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you keep close watch on all my paths
- type: usfm
  marker: q2
  children:
  - type: text
    text: by putting marks on the soles of my feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: “So man wastes away like something rotten,
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a garment eaten by moths.
