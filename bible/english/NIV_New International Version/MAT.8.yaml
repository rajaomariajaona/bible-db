document_id: MAT.8
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals a Man With Leprosy
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'When Jesus came down from the mountainside, large crowds followed him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: A man with leprosy
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek word traditionally translated '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'leprosy '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: was used for various diseases affecting the skin.
    marker-yv: yv-n
  - type: text
    text: ' came and knelt before him and said, “Lord, if you are willing, you can make me clean.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jesus reached out his hand and touched the man. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I am willing,”
  - type: text
    text: ' he said. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Be clean!”
  - type: text
    text: ' Immediately he was cleansed of his leprosy. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Then Jesus said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “See that you don’t tell anyone. But go, show yourself to the priest and offer the gift Moses commanded, as a testimony to them.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Faith of the Centurion
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'When Jesus had entered Capernaum, a centurion came to him, asking for help. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “Lord,” he said, “my servant lies at home paralyzed, suffering terribly.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jesus said to him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Shall I come and heal him?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The centurion replied, “Lord, I do not deserve to have you come under my roof. But just say the word, and my servant will be healed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: For I myself am a man under authority, with soldiers under me. I tell this one, ‘Go,’ and he goes; and that one, ‘Come,’ and he comes. I say to my servant, ‘Do this,’ and he does it.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When Jesus heard this, he was amazed and said to those following him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Truly I tell you, I have not found anyone in Israel with such great faith.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I say to you that many will come from the east and the west, and will take their places at the feast with Abraham, Isaac and Jacob in the kingdom of heaven.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But the subjects of the kingdom will be thrown outside, into the darkness, where there will be weeping and gnashing of teeth.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Then Jesus said to the centurion, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go! Let it be done just as you believed it would.”
  - type: text
    text: ' And his servant was healed at that moment.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Heals Many
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'When Jesus came into Peter’s house, he saw Peter’s mother-in-law lying in bed with a fever. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He touched her hand and the fever left her, and she got up and began to wait on him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'When evening came, many who were demon-possessed were brought to him, and he drove out the spirits with a word and healed all the sick. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'This was to fulfill what was spoken through the prophet Isaiah:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “He took up our infirmities
- type: usfm
  marker: q2
  children:
  - type: text
    text: and bore our diseases.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Isaiah 53:4 (see Septuagint)
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Cost of Following Jesus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'When Jesus saw the crowd around him, he gave orders to cross to the other side of the lake. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then a teacher of the law came to him and said, “Teacher, I will follow you wherever you go.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Foxes have dens and birds have nests, but the Son of Man has no place to lay his head.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Another disciple said to him, “Lord, first let me go and bury my father.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'But Jesus told him, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Follow me, and let the dead bury their own dead.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Calms the Storm
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Then he got into the boat and his disciples followed him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Suddenly a furious storm came up on the lake, so that the waves swept over the boat. But Jesus was sleeping. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The disciples went and woke him, saying, “Lord, save us! We’re going to drown!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'He replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You of little faith, why are you so afraid?”
  - type: text
    text: ' Then he got up and rebuked the winds and the waves, and it was completely calm.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The men were amazed and asked, “What kind of man is this? Even the winds and the waves obey him!”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Restores Two Demon-Possessed Men
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: When he arrived at the other side in the region of the Gadarenes,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Gergesenes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '; other manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Gerasenes
    marker-yv: yv-n
  - type: text
    text: ' two demon-possessed men coming from the tombs met him. They were so violent that no one could pass that way. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “What do you want with us, Son of God?” they shouted. “Have you come here to torture us before the appointed time?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Some distance from them a large herd of pigs was feeding. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: The demons begged Jesus, “If you drive us out, send us into the herd of pigs.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Go!”
  - type: text
    text: ' So they came out and went into the pigs, and the whole herd rushed down the steep bank into the lake and died in the water. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Those tending the pigs ran off, went into the town and reported all this, including what had happened to the demon-possessed men. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Then the whole town went out to meet Jesus. And when they saw him, they pleaded with him to leave their region.
