document_id: MAT.8,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Heals a Man With Leprosy
  - type: text
    content: 'When Jesus came down from the mountainside, large crowds followed him. '
  '10':
  - type: text
    content: 'When Jesus heard this, he was amazed and said to those following him, '
  - type: text
    content: “Truly I tell you, I have not found anyone in Israel with such great faith.
  - type: text
    content: ' '
  '11':
  - type: text
    content: I say to you that many will come from the east and the west, and will take their places at the feast with Abraham, Isaac and Jacob in the kingdom of heaven.
  - type: text
    content: ' '
  '12':
  - type: text
    content: But the subjects of the kingdom will be thrown outside, into the darkness, where there will be weeping and gnashing of teeth.”
  '13':
  - type: text
    content: 'Then Jesus said to the centurion, '
  - type: text
    content: “Go! Let it be done just as you believed it would.”
  - type: text
    content: ' And his servant was healed at that moment.'
  - type: heading
    content: Jesus Heals Many
  '14':
  - type: text
    content: 'When Jesus came into Peter’s house, he saw Peter’s mother-in-law lying in bed with a fever. '
  '15':
  - type: text
    content: He touched her hand and the fever left her, and she got up and began to wait on him.
  '16':
  - type: text
    content: 'When evening came, many who were demon-possessed were brought to him, and he drove out the spirits with a word and healed all the sick. '
  '17':
  - type: text
    content: 'This was to fulfill what was spoken through the prophet Isaiah:'
  - type: text
    content: “He took up our infirmities
  - type: text
    content: and bore our diseases.”
  - type: note
    content: Isaiah 53:4 (see Septuagint)
  - type: heading
    content: The Cost of Following Jesus
  '18':
  - type: text
    content: 'When Jesus saw the crowd around him, he gave orders to cross to the other side of the lake. '
  '19':
  - type: text
    content: Then a teacher of the law came to him and said, “Teacher, I will follow you wherever you go.”
  '2':
  - type: text
    content: A man with leprosy
  - type: note
    content: The Greek word traditionally translated leprosy was used for various diseases affecting the skin.
  - type: text
    content: ' came and knelt before him and said, “Lord, if you are willing, you can make me clean.”'
  '20':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Foxes have dens and birds have nests, but the Son of Man has no place to lay his head.”
  '21':
  - type: text
    content: Another disciple said to him, “Lord, first let me go and bury my father.”
  '22':
  - type: text
    content: 'But Jesus told him, '
  - type: text
    content: “Follow me, and let the dead bury their own dead.”
  - type: heading
    content: Jesus Calms the Storm
  '23':
  - type: text
    content: 'Then he got into the boat and his disciples followed him. '
  '24':
  - type: text
    content: 'Suddenly a furious storm came up on the lake, so that the waves swept over the boat. But Jesus was sleeping. '
  '25':
  - type: text
    content: The disciples went and woke him, saying, “Lord, save us! We’re going to drown!”
  '26':
  - type: text
    content: 'He replied, '
  - type: text
    content: “You of little faith, why are you so afraid?”
  - type: text
    content: ' Then he got up and rebuked the winds and the waves, and it was completely calm.'
  '27':
  - type: text
    content: The men were amazed and asked, “What kind of man is this? Even the winds and the waves obey him!”
  - type: heading
    content: Jesus Restores Two Demon-Possessed Men
  '28':
  - type: text
    content: When he arrived at the other side in the region of the Gadarenes,
  - type: note
    content: Some manuscripts Gergesenes; other manuscripts Gerasenes
  - type: text
    content: ' two demon-possessed men coming from the tombs met him. They were so violent that no one could pass that way. '
  '29':
  - type: text
    content: “What do you want with us, Son of God?” they shouted. “Have you come here to torture us before the appointed time?”
  '3':
  - type: text
    content: 'Jesus reached out his hand and touched the man. '
  - type: text
    content: “I am willing,”
  - type: text
    content: ' he said. '
  - type: text
    content: “Be clean!”
  - type: text
    content: ' Immediately he was cleansed of his leprosy. '
  '30':
  - type: text
    content: 'Some distance from them a large herd of pigs was feeding. '
  '31':
  - type: text
    content: The demons begged Jesus, “If you drive us out, send us into the herd of pigs.”
  '32':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “Go!”
  - type: text
    content: ' So they came out and went into the pigs, and the whole herd rushed down the steep bank into the lake and died in the water. '
  '33':
  - type: text
    content: 'Those tending the pigs ran off, went into the town and reported all this, including what had happened to the demon-possessed men. '
  '34':
  - type: text
    content: Then the whole town went out to meet Jesus. And when they saw him, they pleaded with him to leave their region.
  '4':
  - type: text
    content: 'Then Jesus said to him, '
  - type: text
    content: “See that you don’t tell anyone. But go, show yourself to the priest and offer the gift Moses commanded, as a testimony to them.”
  - type: heading
    content: The Faith of the Centurion
  '5':
  - type: text
    content: 'When Jesus had entered Capernaum, a centurion came to him, asking for help. '
  '6':
  - type: text
    content: “Lord,” he said, “my servant lies at home paralyzed, suffering terribly.”
  '7':
  - type: text
    content: 'Jesus said to him, '
  - type: text
    content: “Shall I come and heal him?”
  '8':
  - type: text
    content: 'The centurion replied, “Lord, I do not deserve to have you come under my roof. But just say the word, and my servant will be healed. '
  '9':
  - type: text
    content: For I myself am a man under authority, with soldiers under me. I tell this one, ‘Go,’ and he goes; and that one, ‘Come,’ and he comes. I say to my servant, ‘Do this,’ and he does it.”
