document_id: HEB.7
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Melchizedek the Priest
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'This Melchizedek was king of Salem and priest of God Most High. He met Abraham returning from the defeat of the kings and blessed him, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and Abraham gave him a tenth of everything. First, the name Melchizedek means “king of righteousness”; then also, “king of Salem” means “king of peace.” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Without father or mother, without genealogy, without beginning of days or end of life, resembling the Son of God, he remains a priest forever.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Just think how great he was: Even the patriarch Abraham gave him a tenth of the plunder! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Now the law requires the descendants of Levi who become priests to collect a tenth from the people—that is, from their fellow Israelites—even though they also are descended from Abraham. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'This man, however, did not trace his descent from Levi, yet he collected a tenth from Abraham and blessed him who had the promises. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'And without doubt the lesser is blessed by the greater. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'In the one case, the tenth is collected by people who die; but in the other case, by him who is declared to be living. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'One might even say that Levi, who collects the tenth, paid the tenth through Abraham, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: because when Melchizedek met Abraham, Levi was still in the body of his ancestor.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus Like Melchizedek
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'If perfection could have been attained through the Levitical priesthood—and indeed the law given to the people established that priesthood—why was there still need for another priest to come, one in the order of Melchizedek, not in the order of Aaron? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'For when the priesthood is changed, the law must be changed also. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'He of whom these things are said belonged to a different tribe, and no one from that tribe has ever served at the altar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'For it is clear that our Lord descended from Judah, and in regard to that tribe Moses said nothing about priests. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'And what we have said is even more clear if another priest like Melchizedek appears, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'one who has become a priest not on the basis of a regulation as to his ancestry but on the basis of the power of an indestructible life. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'For it is declared:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You are a priest forever,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the order of Melchizedek.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 110:4
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The former regulation is set aside because it was weak and useless '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: (for the law made nothing perfect), and a better hope is introduced, by which we draw near to God.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'And it was not without an oath! Others became priests without any oath, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'but he became a priest with an oath when God said to him:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “The Lord has sworn
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'and will not change his mind:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: ‘You are a priest forever.’ ”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 110:4
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Because of this oath, Jesus has become the guarantor of a better covenant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Now there have been many of those priests, since death prevented them from continuing in office; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'but because Jesus lives forever, he has a permanent priesthood. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Therefore he is able to save completely
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: forever
    marker-yv: yv-n
  - type: text
    text: ' those who come to God through him, because he always lives to intercede for them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Such a high priest truly meets our need—one who is holy, blameless, pure, set apart from sinners, exalted above the heavens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Unlike the other high priests, he does not need to offer sacrifices day after day, first for his own sins, and then for the sins of the people. He sacrificed for their sins once for all when he offered himself. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: For the law appoints as high priests men in all their weakness; but the oath, which came after the law, appointed the Son, who has been made perfect forever.
