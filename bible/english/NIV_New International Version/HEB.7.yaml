document_id: HEB.7,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Melchizedek the Priest
  - type: text
    content: 'This Melchizedek was king of Salem and priest of God Most High. He met Abraham returning from the defeat of the kings and blessed him, '
  '10':
  - type: text
    content: because when Melchizedek met Abraham, Levi was still in the body of his ancestor.
  - type: heading
    content: Jesus Like Melchizedek
  '11':
  - type: text
    content: 'If perfection could have been attained through the Levitical priesthood—and indeed the law given to the people established that priesthood—why was there still need for another priest to come, one in the order of Melchizedek, not in the order of Aaron? '
  '12':
  - type: text
    content: 'For when the priesthood is changed, the law must be changed also. '
  '13':
  - type: text
    content: 'He of whom these things are said belonged to a different tribe, and no one from that tribe has ever served at the altar. '
  '14':
  - type: text
    content: 'For it is clear that our Lord descended from Judah, and in regard to that tribe Moses said nothing about priests. '
  '15':
  - type: text
    content: 'And what we have said is even more clear if another priest like Melchizedek appears, '
  '16':
  - type: text
    content: 'one who has become a priest not on the basis of a regulation as to his ancestry but on the basis of the power of an indestructible life. '
  '17':
  - type: text
    content: 'For it is declared:'
  - type: text
    content: “You are a priest forever,
  - type: text
    content: in the order of Melchizedek.”
  - type: note
    content: Psalm 110:4
  '18':
  - type: text
    content: 'The former regulation is set aside because it was weak and useless '
  '19':
  - type: text
    content: (for the law made nothing perfect), and a better hope is introduced, by which we draw near to God.
  '2':
  - type: text
    content: 'and Abraham gave him a tenth of everything. First, the name Melchizedek means “king of righteousness”; then also, “king of Salem” means “king of peace.” '
  '20':
  - type: text
    content: 'And it was not without an oath! Others became priests without any oath, '
  '21':
  - type: text
    content: 'but he became a priest with an oath when God said to him:'
  - type: text
    content: “The Lord has sworn
  - type: text
    content: 'and will not change his mind:'
  - type: text
    content: ‘You are a priest forever.’ ”
  - type: note
    content: Psalm 110:4
  '22':
  - type: text
    content: Because of this oath, Jesus has become the guarantor of a better covenant.
  '23':
  - type: text
    content: 'Now there have been many of those priests, since death prevented them from continuing in office; '
  '24':
  - type: text
    content: 'but because Jesus lives forever, he has a permanent priesthood. '
  '25':
  - type: text
    content: Therefore he is able to save completely
  - type: note
    content: Or forever
  - type: text
    content: ' those who come to God through him, because he always lives to intercede for them.'
  '26':
  - type: text
    content: 'Such a high priest truly meets our need—one who is holy, blameless, pure, set apart from sinners, exalted above the heavens. '
  '27':
  - type: text
    content: 'Unlike the other high priests, he does not need to offer sacrifices day after day, first for his own sins, and then for the sins of the people. He sacrificed for their sins once for all when he offered himself. '
  '28':
  - type: text
    content: For the law appoints as high priests men in all their weakness; but the oath, which came after the law, appointed the Son, who has been made perfect forever.
  '3':
  - type: text
    content: Without father or mother, without genealogy, without beginning of days or end of life, resembling the Son of God, he remains a priest forever.
  '4':
  - type: text
    content: 'Just think how great he was: Even the patriarch Abraham gave him a tenth of the plunder! '
  '5':
  - type: text
    content: 'Now the law requires the descendants of Levi who become priests to collect a tenth from the people—that is, from their fellow Israelites—even though they also are descended from Abraham. '
  '6':
  - type: text
    content: 'This man, however, did not trace his descent from Levi, yet he collected a tenth from Abraham and blessed him who had the promises. '
  '7':
  - type: text
    content: 'And without doubt the lesser is blessed by the greater. '
  '8':
  - type: text
    content: 'In the one case, the tenth is collected by people who die; but in the other case, by him who is declared to be living. '
  '9':
  - type: text
    content: 'One might even say that Levi, who collects the tenth, paid the tenth through Abraham, '
