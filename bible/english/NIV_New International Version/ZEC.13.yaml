document_id: ZEC.13,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Cleansing From Sin
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: “On that day a fountain will be opened to the house of David and the inhabitants of Jerusalem, to cleanse them from sin and impurity.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '“On that day, I will banish the names of the idols from the land, and they will be remembered no more,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty. “I will remove both the prophets and the spirit of impurity from the land. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'And if anyone still prophesies, their father and mother, to whom they were born, will say to them, ‘You must die, because you have told lies in the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s name.’ Then their own parents will stab the one who prophesies.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '“On that day every prophet will be ashamed of their prophetic vision. They will not put on a prophet’s garment of hair in order to deceive. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Each will say, ‘I am not a prophet. I am a farmer; the land has been my livelihood since my youth.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: farmer; a man sold me in my youth
      marker-yv: yv-n
    - type: text
      text: '’ '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: If someone asks, ‘What are these wounds on your body
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: wounds between your hands
      marker-yv: yv-n
    - type: text
      text: ?’ they will answer, ‘The wounds I was given at the house of my friends.’
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Shepherd Struck, the Sheep Scattered
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: “Awake, sword, against my shepherd,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: against the man who is close to me!”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Strike the shepherd,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the sheep will be scattered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will turn my hand against the little ones.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'In the whole land,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “two-thirds will be struck down and perish;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet one-third will be left in it.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: This third I will put into the fire;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will refine them like silver
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and test them like gold.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will call on my name
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I will answer them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will say, ‘They are my people,’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and they will say, ‘The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is our God.’ ”'
