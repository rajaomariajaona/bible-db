document_id: ZEC.13,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Cleansing From Sin
  - type: text
    content: “On that day a fountain will be opened to the house of David and the inhabitants of Jerusalem, to cleanse them from sin and impurity.
  '2':
  - type: text
    content: '“On that day, I will banish the names of the idols from the land, and they will be remembered no more,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty. “I will remove both the prophets and the spirit of impurity from the land. '
  '3':
  - type: text
    content: 'And if anyone still prophesies, their father and mother, to whom they were born, will say to them, ‘You must die, because you have told lies in the '
  - type: text
    content: Lord
  - type: text
    content: ’s name.’ Then their own parents will stab the one who prophesies.
  '4':
  - type: text
    content: '“On that day every prophet will be ashamed of their prophetic vision. They will not put on a prophet’s garment of hair in order to deceive. '
  '5':
  - type: text
    content: Each will say, ‘I am not a prophet. I am a farmer; the land has been my livelihood since my youth.
  - type: note
    content: Or farmer; a man sold me in my youth
  - type: text
    content: '’ '
  '6':
  - type: text
    content: If someone asks, ‘What are these wounds on your body
  - type: note
    content: Or wounds between your hands
  - type: text
    content: ?’ they will answer, ‘The wounds I was given at the house of my friends.’
  - type: heading
    content: The Shepherd Struck, the Sheep Scattered
  '7':
  - type: text
    content: “Awake, sword, against my shepherd,
  - type: text
    content: against the man who is close to me!”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  - type: text
    content: “Strike the shepherd,
  - type: text
    content: and the sheep will be scattered,
  - type: text
    content: and I will turn my hand against the little ones.
  '8':
  - type: text
    content: 'In the whole land,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “two-thirds will be struck down and perish;
  - type: text
    content: yet one-third will be left in it.
  '9':
  - type: text
    content: This third I will put into the fire;
  - type: text
    content: I will refine them like silver
  - type: text
    content: and test them like gold.
  - type: text
    content: They will call on my name
  - type: text
    content: and I will answer them;
  - type: text
    content: I will say, ‘They are my people,’
  - type: text
    content: 'and they will say, ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' is our God.’ ”'
