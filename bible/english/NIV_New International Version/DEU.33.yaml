document_id: DEU.33,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Moses Blesses the Tribes
  - type: text
    content: 'This is the blessing that Moses the man of God pronounced on the Israelites before his death. '
  '10':
  - type: text
    content: He teaches your precepts to Jacob
  - type: text
    content: and your law to Israel.
  - type: text
    content: He offers incense before you
  - type: text
    content: and whole burnt offerings on your altar.
  '11':
  - type: text
    content: 'Bless all his skills, '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and be pleased with the work of his hands.
  - type: text
    content: Strike down those who rise against him,
  - type: text
    content: his foes till they rise no more.”
  '12':
  - type: text
    content: 'About Benjamin he said:'
  - type: text
    content: '“Let the beloved of the '
  - type: text
    content: Lord
  - type: text
    content: ' rest secure in him,'
  - type: text
    content: for he shields him all day long,
  - type: text
    content: 'and the one the '
  - type: text
    content: Lord
  - type: text
    content: ' loves rests between his shoulders.”'
  '13':
  - type: text
    content: 'About Joseph he said:'
  - type: text
    content: '“May the '
  - type: text
    content: Lord
  - type: text
    content: ' bless his land'
  - type: text
    content: with the precious dew from heaven above
  - type: text
    content: and with the deep waters that lie below;
  '14':
  - type: text
    content: with the best the sun brings forth
  - type: text
    content: and the finest the moon can yield;
  '15':
  - type: text
    content: with the choicest gifts of the ancient mountains
  - type: text
    content: and the fruitfulness of the everlasting hills;
  '16':
  - type: text
    content: with the best gifts of the earth and its fullness
  - type: text
    content: and the favor of him who dwelt in the burning bush.
  - type: text
    content: Let all these rest on the head of Joseph,
  - type: text
    content: on the brow of the prince among
  - type: note
    content: Or of the one separated from
  - type: text
    content: ' his brothers.'
  '17':
  - type: text
    content: In majesty he is like a firstborn bull;
  - type: text
    content: his horns are the horns of a wild ox.
  - type: text
    content: With them he will gore the nations,
  - type: text
    content: even those at the ends of the earth.
  - type: text
    content: Such are the ten thousands of Ephraim;
  - type: text
    content: such are the thousands of Manasseh.”
  '18':
  - type: text
    content: 'About Zebulun he said:'
  - type: text
    content: “Rejoice, Zebulun, in your going out,
  - type: text
    content: and you, Issachar, in your tents.
  '19':
  - type: text
    content: They will summon peoples to the mountain
  - type: text
    content: and there offer the sacrifices of the righteous;
  - type: text
    content: they will feast on the abundance of the seas,
  - type: text
    content: on the treasures hidden in the sand.”
  '2':
  - type: text
    content: 'He said:'
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' came from Sinai'
  - type: text
    content: and dawned over them from Seir;
  - type: text
    content: he shone forth from Mount Paran.
  - type: text
    content: He came with
  - type: note
    content: Or from
  - type: text
    content: ' myriads of holy ones'
  - type: text
    content: from the south, from his mountain slopes.
  - type: note
    content: The meaning of the Hebrew for this phrase is uncertain.
  '20':
  - type: text
    content: 'About Gad he said:'
  - type: text
    content: “Blessed is he who enlarges Gad’s domain!
  - type: text
    content: Gad lives there like a lion,
  - type: text
    content: tearing at arm or head.
  '21':
  - type: text
    content: He chose the best land for himself;
  - type: text
    content: the leader’s portion was kept for him.
  - type: text
    content: When the heads of the people assembled,
  - type: text
    content: 'he carried out the '
  - type: text
    content: Lord
  - type: text
    content: ’s righteous will,
  - type: text
    content: and his judgments concerning Israel.”
  '22':
  - type: text
    content: 'About Dan he said:'
  - type: text
    content: “Dan is a lion’s cub,
  - type: text
    content: springing out of Bashan.”
  '23':
  - type: text
    content: 'About Naphtali he said:'
  - type: text
    content: '“Naphtali is abounding with the favor of the '
  - type: text
    content: Lord
  - type: text
    content: and is full of his blessing;
  - type: text
    content: he will inherit southward to the lake.”
  '24':
  - type: text
    content: 'About Asher he said:'
  - type: text
    content: “Most blessed of sons is Asher;
  - type: text
    content: let him be favored by his brothers,
  - type: text
    content: and let him bathe his feet in oil.
  '25':
  - type: text
    content: The bolts of your gates will be iron and bronze,
  - type: text
    content: and your strength will equal your days.
  '26':
  - type: text
    content: “There is no one like the God of Jeshurun,
  - type: text
    content: who rides across the heavens to help you
  - type: text
    content: and on the clouds in his majesty.
  '27':
  - type: text
    content: The eternal God is your refuge,
  - type: text
    content: and underneath are the everlasting arms.
  - type: text
    content: He will drive out your enemies before you,
  - type: text
    content: saying, ‘Destroy them!’
  '28':
  - type: text
    content: So Israel will live in safety;
  - type: text
    content: Jacob will dwell
  - type: note
    content: Septuagint; Hebrew Jacob’s spring is
  - type: text
    content: ' secure'
  - type: text
    content: in a land of grain and new wine,
  - type: text
    content: where the heavens drop dew.
  '29':
  - type: text
    content: Blessed are you, Israel!
  - type: text
    content: Who is like you,
  - type: text
    content: 'a people saved by the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: He is your shield and helper
  - type: text
    content: and your glorious sword.
  - type: text
    content: Your enemies will cower before you,
  - type: text
    content: and you will tread on their heights.”
  '3':
  - type: text
    content: Surely it is you who love the people;
  - type: text
    content: all the holy ones are in your hand.
  - type: text
    content: At your feet they all bow down,
  - type: text
    content: and from you receive instruction,
  '4':
  - type: text
    content: the law that Moses gave us,
  - type: text
    content: the possession of the assembly of Jacob.
  '5':
  - type: text
    content: He was king over Jeshurun
  - type: note
    content: Jeshurun means the upright one, that is, Israel; also in verse 26.
  - type: text
    content: when the leaders of the people assembled,
  - type: text
    content: along with the tribes of Israel.
  '6':
  - type: text
    content: “Let Reuben live and not die,
  - type: text
    content: nor
  - type: note
    content: Or but let
  - type: text
    content: ' his people be few.”'
  '7':
  - type: text
    content: 'And this he said about Judah:'
  - type: text
    content: '“Hear, '
  - type: text
    content: Lord
  - type: text
    content: ', the cry of Judah;'
  - type: text
    content: bring him to his people.
  - type: text
    content: With his own hands he defends his cause.
  - type: text
    content: Oh, be his help against his foes!”
  '8':
  - type: text
    content: 'About Levi he said:'
  - type: text
    content: “Your Thummim and Urim belong
  - type: text
    content: to your faithful servant.
  - type: text
    content: You tested him at Massah;
  - type: text
    content: you contended with him at the waters of Meribah.
  '9':
  - type: text
    content: He said of his father and mother,
  - type: text
    content: ‘I have no regard for them.’
  - type: text
    content: He did not recognize his brothers
  - type: text
    content: or acknowledge his own children,
  - type: text
    content: but he watched over your word
  - type: text
    content: and guarded your covenant.
