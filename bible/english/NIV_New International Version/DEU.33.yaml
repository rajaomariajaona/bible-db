document_id: DEU.33,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moses Blesses the Tribes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'This is the blessing that Moses the man of God pronounced on the Israelites before his death. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: He teaches your precepts to Jacob
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your law to Israel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He offers incense before you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and whole burnt offerings on your altar.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Bless all his skills, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and be pleased with the work of his hands.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Strike down those who rise against him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his foes till they rise no more.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'About Benjamin he said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Let the beloved of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' rest secure in him,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for he shields him all day long,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and the one the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' loves rests between his shoulders.”'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'About Joseph he said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“May the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' bless his land'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with the precious dew from heaven above
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and with the deep waters that lie below;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: with the best the sun brings forth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the finest the moon can yield;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: with the choicest gifts of the ancient mountains
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the fruitfulness of the everlasting hills;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: with the best gifts of the earth and its fullness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the favor of him who dwelt in the burning bush.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let all these rest on the head of Joseph,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the brow of the prince among
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: of the one separated from
      marker-yv: yv-n
    - type: text
      text: ' his brothers.'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: In majesty he is like a firstborn bull;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his horns are the horns of a wild ox.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With them he will gore the nations,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: even those at the ends of the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Such are the ten thousands of Ephraim;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: such are the thousands of Manasseh.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'About Zebulun he said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Rejoice, Zebulun, in your going out,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you, Issachar, in your tents.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: They will summon peoples to the mountain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and there offer the sacrifices of the righteous;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will feast on the abundance of the seas,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the treasures hidden in the sand.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came from Sinai'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and dawned over them from Seir;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he shone forth from Mount Paran.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He came with
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: from
      marker-yv: yv-n
    - type: text
      text: ' myriads of holy ones'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the south, from his mountain slopes.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this phrase is uncertain.
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'About Gad he said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Blessed is he who enlarges Gad’s domain!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Gad lives there like a lion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: tearing at arm or head.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: He chose the best land for himself;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the leader’s portion was kept for him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When the heads of the people assembled,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'he carried out the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s righteous will,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and his judgments concerning Israel.”
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'About Dan he said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Dan is a lion’s cub,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: springing out of Bashan.”
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'About Naphtali he said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Naphtali is abounding with the favor of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and is full of his blessing;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will inherit southward to the lake.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'About Asher he said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Most blessed of sons is Asher;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let him be favored by his brothers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and let him bathe his feet in oil.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: The bolts of your gates will be iron and bronze,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your strength will equal your days.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: “There is no one like the God of Jeshurun,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who rides across the heavens to help you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and on the clouds in his majesty.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: The eternal God is your refuge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and underneath are the everlasting arms.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will drive out your enemies before you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: saying, ‘Destroy them!’
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: So Israel will live in safety;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Jacob will dwell
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jacob’s spring is
      marker-yv: yv-n
    - type: text
      text: ' secure'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: in a land of grain and new wine,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: where the heavens drop dew.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Blessed are you, Israel!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who is like you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'a people saved by the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is your shield and helper
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your glorious sword.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your enemies will cower before you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you will tread on their heights.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Surely it is you who love the people;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: all the holy ones are in your hand.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: At your feet they all bow down,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and from you receive instruction,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: the law that Moses gave us,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the possession of the assembly of Jacob.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: He was king over Jeshurun
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jeshurun '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'the upright one, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: that is, Israel; also in verse 26.
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: when the leaders of the people assembled,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: along with the tribes of Israel.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: “Let Reuben live and not die,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33:6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: but let
      marker-yv: yv-n
    - type: text
      text: ' his people be few.”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'And this he said about Judah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Hear, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the cry of Judah;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bring him to his people.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With his own hands he defends his cause.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Oh, be his help against his foes!”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'About Levi he said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Your Thummim and Urim belong
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to your faithful servant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You tested him at Massah;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you contended with him at the waters of Meribah.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: He said of his father and mother,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘I have no regard for them.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He did not recognize his brothers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or acknowledge his own children,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but he watched over your word
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and guarded your covenant.
