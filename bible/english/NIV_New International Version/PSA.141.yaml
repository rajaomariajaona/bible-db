document_id: PSA.141,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 141
  - type: text
    content: A psalm of David.
  - type: text
    content: 'I call to you, '
  - type: text
    content: Lord
  - type: text
    content: ', come quickly to me;'
  - type: text
    content: hear me when I call to you.
  '10':
  - type: text
    content: Let the wicked fall into their own nets,
  - type: text
    content: while I pass by in safety.
  '2':
  - type: text
    content: May my prayer be set before you like incense;
  - type: text
    content: may the lifting up of my hands be like the evening sacrifice.
  '3':
  - type: text
    content: 'Set a guard over my mouth, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: keep watch over the door of my lips.
  '4':
  - type: text
    content: Do not let my heart be drawn to what is evil
  - type: text
    content: so that I take part in wicked deeds
  - type: text
    content: along with those who are evildoers;
  - type: text
    content: do not let me eat their delicacies.
  '5':
  - type: text
    content: Let a righteous man strike me—that is a kindness;
  - type: text
    content: let him rebuke me—that is oil on my head.
  - type: text
    content: My head will not refuse it,
  - type: text
    content: for my prayer will still be against the deeds of evildoers.
  '6':
  - type: text
    content: Their rulers will be thrown down from the cliffs,
  - type: text
    content: and the wicked will learn that my words were well spoken.
  '7':
  - type: text
    content: They will say, “As one plows and breaks up the earth,
  - type: text
    content: so our bones have been scattered at the mouth of the grave.”
  '8':
  - type: text
    content: 'But my eyes are fixed on you, Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: in you I take refuge—do not give me over to death.
  '9':
  - type: text
    content: Keep me safe from the traps set by evildoers,
  - type: text
    content: from the snares they have laid for me.
