document_id: PSA.141,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 141
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I call to you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', come quickly to me;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: hear me when I call to you.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the wicked fall into their own nets,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: while I pass by in safety.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: May my prayer be set before you like incense;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: may the lifting up of my hands be like the evening sacrifice.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Set a guard over my mouth, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: keep watch over the door of my lips.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Do not let my heart be drawn to what is evil
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that I take part in wicked deeds
  - type: usfm
    marker: q1
    children:
    - type: text
      text: along with those who are evildoers;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not let me eat their delicacies.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let a righteous man strike me—that is a kindness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: let him rebuke me—that is oil on my head.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My head will not refuse it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for my prayer will still be against the deeds of evildoers.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Their rulers will be thrown down from the cliffs,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the wicked will learn that my words were well spoken.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will say, “As one plows and breaks up the earth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so our bones have been scattered at the mouth of the grave.”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But my eyes are fixed on you, Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: in you I take refuge—do not give me over to death.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Keep me safe from the traps set by evildoers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the snares they have laid for me.
