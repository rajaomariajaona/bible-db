document_id: MAT.6,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Giving to the Needy
  - type: text
    content: ' '
  - type: text
    content: “Be careful not to practice your righteousness in front of others to be seen by them. If you do, you will have no reward from your Father in heaven.
  '10':
  - type: text
    content: ' '
  - type: text
    content: your kingdom come,
  - type: text
    content: your will be done,
  - type: text
    content: on earth as it is in heaven.
  '11':
  - type: text
    content: ' '
  - type: text
    content: Give us today our daily bread.
  '12':
  - type: text
    content: ' '
  - type: text
    content: And forgive us our debts,
  - type: text
    content: as we also have forgiven our debtors.
  '13':
  - type: text
    content: ' '
  - type: text
    content: And lead us not into temptation,
  - type: note
    content: The Greek for temptation can also mean testing.
  - type: text
    content: but deliver us from the evil one.
  - type: text
    content: ' '
  - type: note
    content: Or from evil ; some late manuscripts one, / for yours is the kingdom and the power and the glory forever. Amen.
  - type: text
    content: ’
  '14':
  - type: text
    content: ' '
  - type: text
    content: For if you forgive other people when they sin against you, your heavenly Father will also forgive you.
  - type: text
    content: ' '
  '15':
  - type: text
    content: But if you do not forgive others their sins, your Father will not forgive your sins.
  - type: heading
    content: Fasting
  '16':
  - type: text
    content: ' '
  - type: text
    content: “When you fast, do not look somber as the hypocrites do, for they disfigure their faces to show others they are fasting. Truly I tell you, they have received their reward in full.
  - type: text
    content: ' '
  '17':
  - type: text
    content: But when you fast, put oil on your head and wash your face,
  - type: text
    content: ' '
  '18':
  - type: text
    content: so that it will not be obvious to others that you are fasting, but only to your Father, who is unseen; and your Father, who sees what is done in secret, will reward you.
  - type: heading
    content: Treasures in Heaven
  '19':
  - type: text
    content: ' '
  - type: text
    content: “Do not store up for yourselves treasures on earth, where moths and vermin destroy, and where thieves break in and steal.
  - type: text
    content: ' '
  '2':
  - type: text
    content: ' '
  - type: text
    content: “So when you give to the needy, do not announce it with trumpets, as the hypocrites do in the synagogues and on the streets, to be honored by others. Truly I tell you, they have received their reward in full.
  - type: text
    content: ' '
  '20':
  - type: text
    content: But store up for yourselves treasures in heaven, where moths and vermin do not destroy, and where thieves do not break in and steal.
  - type: text
    content: ' '
  '21':
  - type: text
    content: For where your treasure is, there your heart will be also.
  '22':
  - type: text
    content: ' '
  - type: text
    content: “The eye is the lamp of the body. If your eyes are healthy,
  - type: text
    content: ' '
  - type: note
    content: The Greek for healthy here implies generous.
  - type: text
    content: your whole body will be full of light.
  - type: text
    content: ' '
  '23':
  - type: text
    content: But if your eyes are unhealthy,
  - type: note
    content: The Greek for unhealthy here implies stingy.
  - type: text
    content: ' '
  - type: text
    content: your whole body will be full of darkness. If then the light within you is darkness, how great is that darkness!
  '24':
  - type: text
    content: ' '
  - type: text
    content: “No one can serve two masters. Either you will hate the one and love the other, or you will be devoted to the one and despise the other. You cannot serve both God and money.
  - type: heading
    content: Do Not Worry
  '25':
  - type: text
    content: ' '
  - type: text
    content: “Therefore I tell you, do not worry about your life, what you will eat or drink; or about your body, what you will wear. Is not life more than food, and the body more than clothes?
  - type: text
    content: ' '
  '26':
  - type: text
    content: Look at the birds of the air; they do not sow or reap or store away in barns, and yet your heavenly Father feeds them. Are you not much more valuable than they?
  - type: text
    content: ' '
  '27':
  - type: text
    content: Can any one of you by worrying add a single hour to your life
  - type: note
    content: Or single cubit to your height
  - type: text
    content: '?'
  '28':
  - type: text
    content: ' '
  - type: text
    content: “And why do you worry about clothes? See how the flowers of the field grow. They do not labor or spin.
  - type: text
    content: ' '
  '29':
  - type: text
    content: Yet I tell you that not even Solomon in all his splendor was dressed like one of these.
  - type: text
    content: ' '
  '3':
  - type: text
    content: But when you give to the needy, do not let your left hand know what your right hand is doing,
  - type: text
    content: ' '
  '30':
  - type: text
    content: If that is how God clothes the grass of the field, which is here today and tomorrow is thrown into the fire, will he not much more clothe you—you of little faith?
  - type: text
    content: ' '
  '31':
  - type: text
    content: So do not worry, saying, ‘What shall we eat?’ or ‘What shall we drink?’ or ‘What shall we wear?’
  - type: text
    content: ' '
  '32':
  - type: text
    content: For the pagans run after all these things, and your heavenly Father knows that you need them.
  - type: text
    content: ' '
  '33':
  - type: text
    content: But seek first his kingdom and his righteousness, and all these things will be given to you as well.
  - type: text
    content: ' '
  '34':
  - type: text
    content: Therefore do not worry about tomorrow, for tomorrow will worry about itself. Each day has enough trouble of its own.
  '4':
  - type: text
    content: so that your giving may be in secret. Then your Father, who sees what is done in secret, will reward you.
  - type: heading
    content: Prayer
  '5':
  - type: text
    content: ' '
  - type: text
    content: “And when you pray, do not be like the hypocrites, for they love to pray standing in the synagogues and on the street corners to be seen by others. Truly I tell you, they have received their reward in full.
  - type: text
    content: ' '
  '6':
  - type: text
    content: But when you pray, go into your room, close the door and pray to your Father, who is unseen. Then your Father, who sees what is done in secret, will reward you.
  - type: text
    content: ' '
  '7':
  - type: text
    content: And when you pray, do not keep on babbling like pagans, for they think they will be heard because of their many words.
  - type: text
    content: ' '
  '8':
  - type: text
    content: Do not be like them, for your Father knows what you need before you ask him.
  '9':
  - type: text
    content: ' '
  - type: text
    content: '“This, then, is how you should pray:'
  - type: text
    content: “ ‘Our Father in heaven,
  - type: text
    content: hallowed be your name,
