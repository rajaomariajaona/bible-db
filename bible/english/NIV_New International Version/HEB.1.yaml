document_id: HEB.1
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'God’s Final Word: His Son'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'In the past God spoke to our ancestors through the prophets at many times and in various ways, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'but in these last days he has spoken to us by his Son, whom he appointed heir of all things, and through whom also he made the universe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The Son is the radiance of God’s glory and the exact representation of his being, sustaining all things by his powerful word. After he had provided purification for sins, he sat down at the right hand of the Majesty in heaven. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: So he became as much superior to the angels as the name he has inherited is superior to theirs.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Son Superior to Angels
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: For to which of the angels did God ever say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “You are my Son;
- type: usfm
  marker: q2
  children:
  - type: text
    text: today I have become your Father”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 2:7
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: m
  children:
  - type: text
    text: Or again,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “I will be his Father,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he will be my Son”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2 Samuel 7:14; 1 Chron. 17:13
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: And again, when God brings his firstborn into the world, he says,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Let all God’s angels worship him.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Deut. 32:43 (see Dead Sea Scrolls and Septuagint)
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: In speaking of the angels he says,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “He makes his angels spirits,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his servants flames of fire.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 104:4
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: But about the Son he says,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Your throne, O God, will last for ever and ever;
- type: usfm
  marker: q2
  children:
  - type: text
    text: a scepter of justice will be the scepter of your kingdom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: You have loved righteousness and hated wickedness;
- type: usfm
  marker: q2
  children:
  - type: text
    text: therefore God, your God, has set you above your companions
- type: usfm
  marker: q2
  children:
  - type: text
    text: by anointing you with the oil of joy.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 45:6,7
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: He also says,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “In the beginning, Lord, you laid the foundations of the earth,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the heavens are the work of your hands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: They will perish, but you remain;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will all wear out like a garment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: You will roll them up like a robe;
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a garment they will be changed.
- type: usfm
  marker: q1
  children:
  - type: text
    text: But you remain the same,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and your years will never end.”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 102:25-27
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: To which of the angels did God ever say,
- type: usfm
  marker: q1
  children:
  - type: text
    text: “Sit at my right hand
- type: usfm
  marker: q2
  children:
  - type: text
    text: until I make your enemies
- type: usfm
  marker: q2
  children:
  - type: text
    text: a footstool for your feet”
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 110:1
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Are not all angels ministering spirits sent to serve those who will inherit salvation?
