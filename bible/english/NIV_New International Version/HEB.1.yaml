document_id: HEB.1,111
type_code: eng
verses:
  '1':
  - type: heading
    content: 'God’s Final Word: His Son'
  - type: text
    content: 'In the past God spoke to our ancestors through the prophets at many times and in various ways, '
  '10':
  - type: text
    content: He also says,
  - type: text
    content: “In the beginning, Lord, you laid the foundations of the earth,
  - type: text
    content: and the heavens are the work of your hands.
  '11':
  - type: text
    content: They will perish, but you remain;
  - type: text
    content: they will all wear out like a garment.
  '12':
  - type: text
    content: You will roll them up like a robe;
  - type: text
    content: like a garment they will be changed.
  - type: text
    content: But you remain the same,
  - type: text
    content: and your years will never end.”
  - type: note
    content: Psalm 102:25-27
  '13':
  - type: text
    content: To which of the angels did God ever say,
  - type: text
    content: “Sit at my right hand
  - type: text
    content: until I make your enemies
  - type: text
    content: a footstool for your feet”
  - type: note
    content: Psalm 110:1
  - type: text
    content: '?'
  '14':
  - type: text
    content: Are not all angels ministering spirits sent to serve those who will inherit salvation?
  '2':
  - type: text
    content: 'but in these last days he has spoken to us by his Son, whom he appointed heir of all things, and through whom also he made the universe. '
  '3':
  - type: text
    content: 'The Son is the radiance of God’s glory and the exact representation of his being, sustaining all things by his powerful word. After he had provided purification for sins, he sat down at the right hand of the Majesty in heaven. '
  '4':
  - type: text
    content: So he became as much superior to the angels as the name he has inherited is superior to theirs.
  - type: heading
    content: The Son Superior to Angels
  '5':
  - type: text
    content: For to which of the angels did God ever say,
  - type: text
    content: “You are my Son;
  - type: text
    content: today I have become your Father”
  - type: note
    content: Psalm 2:7
  - type: text
    content: '?'
  - type: text
    content: Or again,
  - type: text
    content: “I will be his Father,
  - type: text
    content: and he will be my Son”
  - type: note
    content: 2 Samuel 7:14; 1 Chron. 17:13
  - type: text
    content: '?'
  '6':
  - type: text
    content: And again, when God brings his firstborn into the world, he says,
  - type: text
    content: “Let all God’s angels worship him.”
  - type: note
    content: Deut. 32:43 (see Dead Sea Scrolls and Septuagint)
  '7':
  - type: text
    content: In speaking of the angels he says,
  - type: text
    content: “He makes his angels spirits,
  - type: text
    content: and his servants flames of fire.”
  - type: note
    content: Psalm 104:4
  '8':
  - type: text
    content: But about the Son he says,
  - type: text
    content: “Your throne, O God, will last for ever and ever;
  - type: text
    content: a scepter of justice will be the scepter of your kingdom.
  '9':
  - type: text
    content: You have loved righteousness and hated wickedness;
  - type: text
    content: therefore God, your God, has set you above your companions
  - type: text
    content: by anointing you with the oil of joy.”
  - type: note
    content: Psalm 45:6,7
