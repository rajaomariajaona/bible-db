document_id: NUM.31,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vengeance on the Midianites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They burned all the towns where the Midianites had settled, as well as all their camps. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They took all the plunder and spoils, including the people and animals, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and brought the captives, spoils and plunder to Moses and Eleazar the priest and the Israelite assembly at their camp on the plains of Moab, by the Jordan across from Jericho.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses, Eleazar the priest and all the leaders of the community went to meet them outside the camp. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moses was angry with the officers of the army—the commanders of thousands and commanders of hundreds—who returned from the battle.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Have you allowed all the women to live?” he asked them. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“They were the ones who followed Balaam’s advice and enticed the Israelites to be unfaithful to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' in the Peor incident, so that a plague struck the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s people. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now kill all the boys. And kill every woman who has slept with a man, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: but save for yourselves every girl who has never slept with a man.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Anyone who has killed someone or touched someone who was killed must stay outside the camp seven days. On the third and seventh days you must purify yourselves and your captives. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Take vengeance on the Midianites for the Israelites. After that, you will be gathered to your people.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Purify every garment as well as everything made of leather, goat hair or wood.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Eleazar the priest said to the soldiers who had gone into battle, “This is what is required by the law that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave Moses: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gold, silver, bronze, iron, tin, lead '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and anything else that can withstand fire must be put through the fire, and then it will be clean. But it must also be purified with the water of cleansing. And whatever cannot withstand fire must be put through that water. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On the seventh day wash your clothes and you will be clean. Then you may come into the camp.”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dividing the Spoils
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“You and Eleazar the priest and the family heads of the community are to count all the people and animals that were captured. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Divide the spoils equally between the soldiers who took part in the battle and the rest of the community. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From the soldiers who fought in the battle, set apart as tribute for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' one out of every five hundred, whether people, cattle, donkeys or sheep. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Take this tribute from their half share and give it to Eleazar the priest as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s part. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses said to the people, “Arm some of your men to go to war against the Midianites so that they may carry out the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s vengeance on them. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From the Israelites’ half, select one out of every fifty, whether people, cattle, donkeys, sheep or other animals. Give them to the Levites, who are responsible for the care of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s tabernacle.” '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Moses and Eleazar the priest did as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded Moses.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The plunder remaining from the spoils that the soldiers took was 675,000 sheep, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '72,000 cattle, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '61,000 donkeys '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and 32,000 women who had never slept with a man.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The half share of those who fought in the battle was:'
  - type: usfm
    marker: li1
    children:
    - type: text
      text: '337,500 sheep, '
  '37':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'of which the tribute for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was 675;'
  '38':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: '36,000 cattle, of which the tribute for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was 72;'
  '39':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: '30,500 donkeys, of which the tribute for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was 61;'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Send into battle a thousand men from each of the tribes of Israel.” '
  '40':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: '16,000 people, of whom the tribute for the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was 32.'
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses gave the tribute to Eleazar the priest as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s part, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded Moses.'
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The half belonging to the Israelites, which Moses set apart from that of the fighting men— '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'the community’s half—was 337,500 sheep, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '36,000 cattle, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '30,500 donkeys '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and 16,000 people. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'From the Israelites’ half, Moses selected one out of every fifty people and animals, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded him, and gave them to the Levites, who were responsible for the care of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s tabernacle.
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the officers who were over the units of the army—the commanders of thousands and commanders of hundreds—went to Moses '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said to him, “Your servants have counted the soldiers under our command, and not one is missing. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So twelve thousand men armed for battle, a thousand from each tribe, were supplied from the clans of Israel. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So we have brought as an offering to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' the gold articles each of us acquired—armlets, bracelets, signet rings, earrings and necklaces—to make atonement for ourselves before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses and Eleazar the priest accepted from them the gold—all the crafted articles. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'All the gold from the commanders of thousands and commanders of hundreds that Moses and Eleazar presented as a gift to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' weighed 16,750 shekels.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:52 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, about 420 pounds or about 190 kilograms
      marker-yv: yv-n
    - type: text
      text: ' '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Each soldier had taken plunder for himself. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses and Eleazar the priest accepted the gold from the commanders of thousands and commanders of hundreds and brought it into the tent of meeting as a memorial for the Israelites before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moses sent them into battle, a thousand from each tribe, along with Phinehas son of Eleazar, the priest, who took with him articles from the sanctuary and the trumpets for signaling.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They fought against Midian, as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded Moses, and killed every man. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Among their victims were Evi, Rekem, Zur, Hur and Reba—the five kings of Midian. They also killed Balaam son of Beor with the sword. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Israelites captured the Midianite women and children and took all the Midianite herds, flocks and goods as plunder. '
