document_id: NUM.31,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Vengeance on the Midianites
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: 'They burned all the towns where the Midianites had settled, as well as all their camps. '
  '11':
  - type: text
    content: 'They took all the plunder and spoils, including the people and animals, '
  '12':
  - type: text
    content: and brought the captives, spoils and plunder to Moses and Eleazar the priest and the Israelite assembly at their camp on the plains of Moab, by the Jordan across from Jericho.
  '13':
  - type: text
    content: 'Moses, Eleazar the priest and all the leaders of the community went to meet them outside the camp. '
  '14':
  - type: text
    content: Moses was angry with the officers of the army—the commanders of thousands and commanders of hundreds—who returned from the battle.
  '15':
  - type: text
    content: '“Have you allowed all the women to live?” he asked them. '
  '16':
  - type: text
    content: '“They were the ones who followed Balaam’s advice and enticed the Israelites to be unfaithful to the '
  - type: text
    content: Lord
  - type: text
    content: ' in the Peor incident, so that a plague struck the '
  - type: text
    content: Lord
  - type: text
    content: '’s people. '
  '17':
  - type: text
    content: 'Now kill all the boys. And kill every woman who has slept with a man, '
  '18':
  - type: text
    content: but save for yourselves every girl who has never slept with a man.
  '19':
  - type: text
    content: '“Anyone who has killed someone or touched someone who was killed must stay outside the camp seven days. On the third and seventh days you must purify yourselves and your captives. '
  '2':
  - type: text
    content: “Take vengeance on the Midianites for the Israelites. After that, you will be gathered to your people.”
  '20':
  - type: text
    content: Purify every garment as well as everything made of leather, goat hair or wood.”
  '21':
  - type: text
    content: 'Then Eleazar the priest said to the soldiers who had gone into battle, “This is what is required by the law that the '
  - type: text
    content: Lord
  - type: text
    content: ' gave Moses: '
  '22':
  - type: text
    content: 'Gold, silver, bronze, iron, tin, lead '
  '23':
  - type: text
    content: 'and anything else that can withstand fire must be put through the fire, and then it will be clean. But it must also be purified with the water of cleansing. And whatever cannot withstand fire must be put through that water. '
  '24':
  - type: text
    content: On the seventh day wash your clothes and you will be clean. Then you may come into the camp.”
  - type: heading
    content: Dividing the Spoils
  '25':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '26':
  - type: text
    content: '“You and Eleazar the priest and the family heads of the community are to count all the people and animals that were captured. '
  '27':
  - type: text
    content: 'Divide the spoils equally between the soldiers who took part in the battle and the rest of the community. '
  '28':
  - type: text
    content: 'From the soldiers who fought in the battle, set apart as tribute for the '
  - type: text
    content: Lord
  - type: text
    content: ' one out of every five hundred, whether people, cattle, donkeys or sheep. '
  '29':
  - type: text
    content: 'Take this tribute from their half share and give it to Eleazar the priest as the '
  - type: text
    content: Lord
  - type: text
    content: '’s part. '
  '3':
  - type: text
    content: 'So Moses said to the people, “Arm some of your men to go to war against the Midianites so that they may carry out the '
  - type: text
    content: Lord
  - type: text
    content: '’s vengeance on them. '
  '30':
  - type: text
    content: 'From the Israelites’ half, select one out of every fifty, whether people, cattle, donkeys, sheep or other animals. Give them to the Levites, who are responsible for the care of the '
  - type: text
    content: Lord
  - type: text
    content: '’s tabernacle.” '
  '31':
  - type: text
    content: 'So Moses and Eleazar the priest did as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '32':
  - type: text
    content: 'The plunder remaining from the spoils that the soldiers took was 675,000 sheep, '
  '33':
  - type: text
    content: '72,000 cattle, '
  '34':
  - type: text
    content: '61,000 donkeys '
  '35':
  - type: text
    content: and 32,000 women who had never slept with a man.
  '36':
  - type: text
    content: 'The half share of those who fought in the battle was:'
  - type: text
    content: '337,500 sheep, '
  '37':
  - type: text
    content: 'of which the tribute for the '
  - type: text
    content: Lord
  - type: text
    content: ' was 675;'
  '38':
  - type: text
    content: '36,000 cattle, of which the tribute for the '
  - type: text
    content: Lord
  - type: text
    content: ' was 72;'
  '39':
  - type: text
    content: '30,500 donkeys, of which the tribute for the '
  - type: text
    content: Lord
  - type: text
    content: ' was 61;'
  '4':
  - type: text
    content: 'Send into battle a thousand men from each of the tribes of Israel.” '
  '40':
  - type: text
    content: '16,000 people, of whom the tribute for the '
  - type: text
    content: Lord
  - type: text
    content: ' was 32.'
  '41':
  - type: text
    content: 'Moses gave the tribute to Eleazar the priest as the '
  - type: text
    content: Lord
  - type: text
    content: '’s part, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '42':
  - type: text
    content: 'The half belonging to the Israelites, which Moses set apart from that of the fighting men— '
  '43':
  - type: text
    content: 'the community’s half—was 337,500 sheep, '
  '44':
  - type: text
    content: '36,000 cattle, '
  '45':
  - type: text
    content: '30,500 donkeys '
  '46':
  - type: text
    content: 'and 16,000 people. '
  '47':
  - type: text
    content: 'From the Israelites’ half, Moses selected one out of every fifty people and animals, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded him, and gave them to the Levites, who were responsible for the care of the '
  - type: text
    content: Lord
  - type: text
    content: ’s tabernacle.
  '48':
  - type: text
    content: 'Then the officers who were over the units of the army—the commanders of thousands and commanders of hundreds—went to Moses '
  '49':
  - type: text
    content: 'and said to him, “Your servants have counted the soldiers under our command, and not one is missing. '
  '5':
  - type: text
    content: 'So twelve thousand men armed for battle, a thousand from each tribe, were supplied from the clans of Israel. '
  '50':
  - type: text
    content: 'So we have brought as an offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' the gold articles each of us acquired—armlets, bracelets, signet rings, earrings and necklaces—to make atonement for ourselves before the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '51':
  - type: text
    content: 'Moses and Eleazar the priest accepted from them the gold—all the crafted articles. '
  '52':
  - type: text
    content: 'All the gold from the commanders of thousands and commanders of hundreds that Moses and Eleazar presented as a gift to the '
  - type: text
    content: Lord
  - type: text
    content: ' weighed 16,750 shekels.'
  - type: note
    content: That is, about 420 pounds or about 190 kilograms
  - type: text
    content: ' '
  '53':
  - type: text
    content: 'Each soldier had taken plunder for himself. '
  '54':
  - type: text
    content: 'Moses and Eleazar the priest accepted the gold from the commanders of thousands and commanders of hundreds and brought it into the tent of meeting as a memorial for the Israelites before the '
  - type: text
    content: Lord
  - type: text
    content: .
  '6':
  - type: text
    content: Moses sent them into battle, a thousand from each tribe, along with Phinehas son of Eleazar, the priest, who took with him articles from the sanctuary and the trumpets for signaling.
  '7':
  - type: text
    content: 'They fought against Midian, as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses, and killed every man. '
  '8':
  - type: text
    content: 'Among their victims were Evi, Rekem, Zur, Hur and Reba—the five kings of Midian. They also killed Balaam son of Beor with the sword. '
  '9':
  - type: text
    content: 'The Israelites captured the Midianite women and children and took all the Midianite herds, flocks and goods as plunder. '
