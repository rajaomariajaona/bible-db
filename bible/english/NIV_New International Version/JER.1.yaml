document_id: JER.1,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'The words of Jeremiah son of Hilkiah, one of the priests at Anathoth in the territory of Benjamin. '
  '10':
  - type: text
    content: See, today I appoint you over nations and kingdoms to uproot and tear down, to destroy and overthrow, to build and to plant.”
  '11':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: “What do you see, Jeremiah?”'
  - type: text
    content: “I see the branch of an almond tree,” I replied.
  '12':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “You have seen correctly, for I am watching'
  - type: note
    content: The Hebrew for watching sounds like the Hebrew for almond tree.
  - type: text
    content: ' to see that my word is fulfilled.”'
  '13':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me again: “What do you see?”'
  - type: text
    content: “I see a pot that is boiling,” I answered. “It is tilting toward us from the north.”
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “From the north disaster will be poured out on all who live in the land. '
  '15':
  - type: text
    content: 'I am about to summon all the peoples of the northern kingdoms,” declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Their kings will come and set up their thrones
  - type: text
    content: in the entrance of the gates of Jerusalem;
  - type: text
    content: they will come against all her surrounding walls
  - type: text
    content: and against all the towns of Judah.
  '16':
  - type: text
    content: I will pronounce my judgments on my people
  - type: text
    content: because of their wickedness in forsaking me,
  - type: text
    content: in burning incense to other gods
  - type: text
    content: and in worshiping what their hands have made.
  '17':
  - type: text
    content: '“Get yourself ready! Stand up and say to them whatever I command you. Do not be terrified by them, or I will terrify you before them. '
  '18':
  - type: text
    content: 'Today I have made you a fortified city, an iron pillar and a bronze wall to stand against the whole land—against the kings of Judah, its officials, its priests and the people of the land. '
  '19':
  - type: text
    content: 'They will fight against you but will not overcome you, for I am with you and will rescue you,” declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to him in the thirteenth year of the reign of Josiah son of Amon king of Judah, '
  '3':
  - type: text
    content: and through the reign of Jehoiakim son of Josiah king of Judah, down to the fifth month of the eleventh year of Zedekiah son of Josiah king of Judah, when the people of Jerusalem went into exile.
  - type: heading
    content: The Call of Jeremiah
  '4':
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me, saying,'
  '5':
  - type: text
    content: “Before I formed you in the womb I knew
  - type: note
    content: Or chose
  - type: text
    content: ' you,'
  - type: text
    content: before you were born I set you apart;
  - type: text
    content: I appointed you as a prophet to the nations.”
  '6':
  - type: text
    content: '“Alas, Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ',” I said, “I do not know how to speak; I am too young.”'
  '7':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “Do not say, ‘I am too young.’ You must go to everyone I send you to and say whatever I command you. '
  '8':
  - type: text
    content: 'Do not be afraid of them, for I am with you and will rescue you,” declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' reached out his hand and touched my mouth and said to me, “I have put my words in your mouth. '
