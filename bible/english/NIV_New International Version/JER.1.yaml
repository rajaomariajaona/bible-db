    - type: text
      text: '17'
  - type: text
    text: '“Get yourself ready! Stand up and say to them whatever I command you. Do not be terrified by them, or I will terrify you before them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Today I have made you a fortified city, an iron pillar and a bronze wall to stand against the whole land—against the kings of Judah, its officials, its priests and the people of the land. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'They will fight against you but will not overcome you, for I am with you and will rescue you,” declares the '
