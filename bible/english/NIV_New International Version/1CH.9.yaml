document_id: 1CH.9,111
type_code: eng
verses:
  '1':
  - type: text
    content: All Israel was listed in the genealogies recorded in the book of the kings of Israel and Judah. They were taken captive to Babylon because of their unfaithfulness.
  - type: heading
    content: The People in Jerusalem
  '10':
  - type: text
    content: 'Of the priests:'
  - type: text
    content: Jedaiah; Jehoiarib; Jakin;
  '11':
  - type: text
    content: Azariah son of Hilkiah, the son of Meshullam, the son of Zadok, the son of Meraioth, the son of Ahitub, the official in charge of the house of God;
  '12':
  - type: text
    content: Adaiah son of Jeroham, the son of Pashhur, the son of Malkijah; and Maasai son of Adiel, the son of Jahzerah, the son of Meshullam, the son of Meshillemith, the son of Immer.
  '13':
  - type: text
    content: The priests, who were heads of families, numbered 1,760. They were able men, responsible for ministering in the house of God.
  '14':
  - type: text
    content: 'Of the Levites:'
  - type: text
    content: 'Shemaiah son of Hasshub, the son of Azrikam, the son of Hashabiah, a Merarite; '
  '15':
  - type: text
    content: 'Bakbakkar, Heresh, Galal and Mattaniah son of Mika, the son of Zikri, the son of Asaph; '
  '16':
  - type: text
    content: Obadiah son of Shemaiah, the son of Galal, the son of Jeduthun; and Berekiah son of Asa, the son of Elkanah, who lived in the villages of the Netophathites.
  '17':
  - type: text
    content: 'The gatekeepers:'
  - type: text
    content: 'Shallum, Akkub, Talmon, Ahiman and their fellow Levites, Shallum their chief '
  '18':
  - type: text
    content: 'being stationed at the King’s Gate on the east, up to the present time. These were the gatekeepers belonging to the camp of the Levites. '
  '19':
  - type: text
    content: 'Shallum son of Kore, the son of Ebiasaph, the son of Korah, and his fellow gatekeepers from his family (the Korahites) were responsible for guarding the thresholds of the tent just as their ancestors had been responsible for guarding the entrance to the dwelling of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '2':
  - type: text
    content: Now the first to resettle on their own property in their own towns were some Israelites, priests, Levites and temple servants.
  '20':
  - type: text
    content: 'In earlier times Phinehas son of Eleazar was the official in charge of the gatekeepers, and the '
  - type: text
    content: Lord
  - type: text
    content: ' was with him. '
  '21':
  - type: text
    content: Zechariah son of Meshelemiah was the gatekeeper at the entrance to the tent of meeting.
  '22':
  - type: text
    content: 'Altogether, those chosen to be gatekeepers at the thresholds numbered 212. They were registered by genealogy in their villages. The gatekeepers had been assigned to their positions of trust by David and Samuel the seer. '
  '23':
  - type: text
    content: 'They and their descendants were in charge of guarding the gates of the house of the '
  - type: text
    content: Lord
  - type: text
    content: '—the house called the tent of meeting. '
  '24':
  - type: text
    content: 'The gatekeepers were on the four sides: east, west, north and south. '
  '25':
  - type: text
    content: 'Their fellow Levites in their villages had to come from time to time and share their duties for seven-day periods. '
  '26':
  - type: text
    content: 'But the four principal gatekeepers, who were Levites, were entrusted with the responsibility for the rooms and treasuries in the house of God. '
  '27':
  - type: text
    content: They would spend the night stationed around the house of God, because they had to guard it; and they had charge of the key for opening it each morning.
  '28':
  - type: text
    content: 'Some of them were in charge of the articles used in the temple service; they counted them when they were brought in and when they were taken out. '
  '29':
  - type: text
    content: 'Others were assigned to take care of the furnishings and all the other articles of the sanctuary, as well as the special flour and wine, and the olive oil, incense and spices. '
  '3':
  - type: text
    content: 'Those from Judah, from Benjamin, and from Ephraim and Manasseh who lived in Jerusalem were:'
  '30':
  - type: text
    content: 'But some of the priests took care of mixing the spices. '
  '31':
  - type: text
    content: 'A Levite named Mattithiah, the firstborn son of Shallum the Korahite, was entrusted with the responsibility for baking the offering bread. '
  '32':
  - type: text
    content: Some of the Kohathites, their fellow Levites, were in charge of preparing for every Sabbath the bread set out on the table.
  '33':
  - type: text
    content: Those who were musicians, heads of Levite families, stayed in the rooms of the temple and were exempt from other duties because they were responsible for the work day and night.
  '34':
  - type: text
    content: All these were heads of Levite families, chiefs as listed in their genealogy, and they lived in Jerusalem.
  - type: heading
    content: The Genealogy of Saul
  '35':
  - type: text
    content: Jeiel the father
  - type: note
    content: Father may mean civic leader or military leader.
  - type: text
    content: ' of Gibeon lived in Gibeon.'
  - type: text
    content: 'His wife’s name was Maakah, '
  '36':
  - type: text
    content: 'and his firstborn son was Abdon, followed by Zur, Kish, Baal, Ner, Nadab, '
  '37':
  - type: text
    content: 'Gedor, Ahio, Zechariah and Mikloth. '
  '38':
  - type: text
    content: Mikloth was the father of Shimeam. They too lived near their relatives in Jerusalem.
  '39':
  - type: text
    content: Ner was the father of Kish, Kish the father of Saul, and Saul the father of Jonathan, Malki-Shua, Abinadab and Esh-Baal.
  - type: note
    content: Also known as Ish-Bosheth
  '4':
  - type: text
    content: Uthai son of Ammihud, the son of Omri, the son of Imri, the son of Bani, a descendant of Perez son of Judah.
  '40':
  - type: text
    content: 'The son of Jonathan:'
  - type: text
    content: Merib-Baal,
  - type: note
    content: Also known as Mephibosheth
  - type: text
    content: ' who was the father of Micah.'
  '41':
  - type: text
    content: 'The sons of Micah:'
  - type: text
    content: Pithon, Melek, Tahrea and Ahaz.
  - type: note
    content: Vulgate and Syriac (see also Septuagint and 8:35); Hebrew does not have and Ahaz.
  '42':
  - type: text
    content: Ahaz was the father of Jadah, Jadah
  - type: note
    content: Some Hebrew manuscripts and Septuagint (see also 8:36); most Hebrew manuscripts Jarah, Jarah
  - type: text
    content: ' was the father of Alemeth, Azmaveth and Zimri, and Zimri was the father of Moza. '
  '43':
  - type: text
    content: Moza was the father of Binea; Rephaiah was his son, Eleasah his son and Azel his son.
  '44':
  - type: text
    content: 'Azel had six sons, and these were their names:'
  - type: text
    content: Azrikam, Bokeru, Ishmael, Sheariah, Obadiah and Hanan. These were the sons of Azel.
  '5':
  - type: text
    content: Of the Shelanites
  - type: note
    content: See Num. 26:20; Hebrew Shilonites.
  - type: text
    content: ':'
  - type: text
    content: Asaiah the firstborn and his sons.
  '6':
  - type: text
    content: 'Of the Zerahites:'
  - type: text
    content: Jeuel.
  - type: text
    content: The people from Judah numbered 690.
  '7':
  - type: text
    content: 'Of the Benjamites:'
  - type: text
    content: Sallu son of Meshullam, the son of Hodaviah, the son of Hassenuah;
  '8':
  - type: text
    content: Ibneiah son of Jeroham; Elah son of Uzzi, the son of Mikri; and Meshullam son of Shephatiah, the son of Reuel, the son of Ibnijah.
  '9':
  - type: text
    content: The people from Benjamin, as listed in their genealogy, numbered 956. All these men were heads of their families.
