document_id: 1CH.9,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: All Israel was listed in the genealogies recorded in the book of the kings of Israel and Judah. They were taken captive to Babylon because of their unfaithfulness.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The People in Jerusalem
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Of the priests:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Jedaiah; Jehoiarib; Jakin;
  '11':
  - type: usfm
    marker: li2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Azariah son of Hilkiah, the son of Meshullam, the son of Zadok, the son of Meraioth, the son of Ahitub, the official in charge of the house of God;
  '12':
  - type: usfm
    marker: li2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Adaiah son of Jeroham, the son of Pashhur, the son of Malkijah; and Maasai son of Adiel, the son of Jahzerah, the son of Meshullam, the son of Meshillemith, the son of Immer.
  '13':
  - type: usfm
    marker: li2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: The priests, who were heads of families, numbered 1,760. They were able men, responsible for ministering in the house of God.
  '14':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Of the Levites:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Shemaiah son of Hasshub, the son of Azrikam, the son of Hashabiah, a Merarite; '
  '15':
  - type: usfm
    marker: li2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Bakbakkar, Heresh, Galal and Mattaniah son of Mika, the son of Zikri, the son of Asaph; '
  '16':
  - type: usfm
    marker: li2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Obadiah son of Shemaiah, the son of Galal, the son of Jeduthun; and Berekiah son of Asa, the son of Elkanah, who lived in the villages of the Netophathites.
  '17':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'The gatekeepers:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'Shallum, Akkub, Talmon, Ahiman and their fellow Levites, Shallum their chief '
  '18':
  - type: usfm
    marker: li2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'being stationed at the King’s Gate on the east, up to the present time. These were the gatekeepers belonging to the camp of the Levites. '
  '19':
  - type: usfm
    marker: li2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Shallum son of Kore, the son of Ebiasaph, the son of Korah, and his fellow gatekeepers from his family (the Korahites) were responsible for guarding the thresholds of the tent just as their ancestors had been responsible for guarding the entrance to the dwelling of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Now the first to resettle on their own property in their own towns were some Israelites, priests, Levites and temple servants.
  '20':
  - type: usfm
    marker: li2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'In earlier times Phinehas son of Eleazar was the official in charge of the gatekeepers, and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was with him. '
  '21':
  - type: usfm
    marker: li2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Zechariah son of Meshelemiah was the gatekeeper at the entrance to the tent of meeting.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Altogether, those chosen to be gatekeepers at the thresholds numbered 212. They were registered by genealogy in their villages. The gatekeepers had been assigned to their positions of trust by David and Samuel the seer. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'They and their descendants were in charge of guarding the gates of the house of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '—the house called the tent of meeting. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'The gatekeepers were on the four sides: east, west, north and south. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Their fellow Levites in their villages had to come from time to time and share their duties for seven-day periods. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'But the four principal gatekeepers, who were Levites, were entrusted with the responsibility for the rooms and treasuries in the house of God. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: They would spend the night stationed around the house of God, because they had to guard it; and they had charge of the key for opening it each morning.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Some of them were in charge of the articles used in the temple service; they counted them when they were brought in and when they were taken out. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Others were assigned to take care of the furnishings and all the other articles of the sanctuary, as well as the special flour and wine, and the olive oil, incense and spices. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Those from Judah, from Benjamin, and from Ephraim and Manasseh who lived in Jerusalem were:'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'But some of the priests took care of mixing the spices. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'A Levite named Mattithiah, the firstborn son of Shallum the Korahite, was entrusted with the responsibility for baking the offering bread. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Some of the Kohathites, their fellow Levites, were in charge of preparing for every Sabbath the bread set out on the table.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Those who were musicians, heads of Levite families, stayed in the rooms of the temple and were exempt from other duties because they were responsible for the work day and night.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: All these were heads of Levite families, chiefs as listed in their genealogy, and they lived in Jerusalem.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Genealogy of Saul
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Jeiel the father
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:35 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Father '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'may mean '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'civic leader '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: military leader.
      marker-yv: yv-n
    - type: text
      text: ' of Gibeon lived in Gibeon.'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: 'His wife’s name was Maakah, '
  '36':
  - type: usfm
    marker: li2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'and his firstborn son was Abdon, followed by Zur, Kish, Baal, Ner, Nadab, '
  '37':
  - type: usfm
    marker: li2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Gedor, Ahio, Zechariah and Mikloth. '
  '38':
  - type: usfm
    marker: li2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Mikloth was the father of Shimeam. They too lived near their relatives in Jerusalem.
  '39':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Ner was the father of Kish, Kish the father of Saul, and Saul the father of Jonathan, Malki-Shua, Abinadab and Esh-Baal.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:39 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Also known as '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ish-Bosheth
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Uthai son of Ammihud, the son of Omri, the son of Imri, the son of Bani, a descendant of Perez son of Judah.
  '40':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'The son of Jonathan:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Merib-Baal,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Also known as '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Mephibosheth
      marker-yv: yv-n
    - type: text
      text: ' who was the father of Micah.'
  '41':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'The sons of Micah:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Pithon, Melek, Tahrea and Ahaz.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Vulgate and Syriac (see also Septuagint and 8:35); Hebrew does not have '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: and Ahaz
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '42':
  - type: usfm
    marker: li2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Ahaz was the father of Jadah, Jadah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:42 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Hebrew manuscripts and Septuagint (see also 8:36); most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jarah, Jarah
      marker-yv: yv-n
    - type: text
      text: ' was the father of Alemeth, Azmaveth and Zimri, and Zimri was the father of Moza. '
  '43':
  - type: usfm
    marker: li2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Moza was the father of Binea; Rephaiah was his son, Eleasah his son and Azel his son.
  '44':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Azel had six sons, and these were their names:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Azrikam, Bokeru, Ishmael, Sheariah, Obadiah and Hanan. These were the sons of Azel.
  '5':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Of the Shelanites
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'See Num. 26:20; Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shilonites.
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Asaiah the firstborn and his sons.
  '6':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Of the Zerahites:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Jeuel.
  - type: usfm
    marker: li2
    children:
    - type: text
      text: The people from Judah numbered 690.
  '7':
  - type: usfm
    marker: li1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Of the Benjamites:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Sallu son of Meshullam, the son of Hodaviah, the son of Hassenuah;
  '8':
  - type: usfm
    marker: li2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ibneiah son of Jeroham; Elah son of Uzzi, the son of Mikri; and Meshullam son of Shephatiah, the son of Reuel, the son of Ibnijah.
  '9':
  - type: usfm
    marker: li2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: The people from Benjamin, as listed in their genealogy, numbered 956. All these men were heads of their families.
