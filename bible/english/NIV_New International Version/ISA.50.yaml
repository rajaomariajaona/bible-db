document_id: ISA.50,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israel’s Sin and the Servant’s Obedience
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Where is your mother’s certificate of divorce
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with which I sent her away?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Or to which of my creditors
  - type: usfm
    marker: q2
    children:
    - type: text
      text: did I sell you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of your sins you were sold;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of your transgressions your mother was sent away.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Who among you fears the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and obeys the word of his servant?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Let the one who walks in the dark,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who has no light,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'trust in the name of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and rely on their God.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But now, all you who light fires
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and provide yourselves with flaming torches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: go, walk in the light of your fires
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and of the torches you have set ablaze.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'This is what you shall receive from my hand:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: You will lie down in torment.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When I came, why was there no one?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: When I called, why was there no one to answer?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Was my arm too short to deliver you?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Do I lack the strength to rescue you?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By a mere rebuke I dry up the sea,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I turn rivers into a desert;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: their fish rot for lack of water
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and die of thirst.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I clothe the heavens with darkness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make sackcloth its covering.”
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has given me a well-instructed tongue,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to know the word that sustains the weary.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He wakens me morning by morning,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: wakens my ear to listen like one being instructed.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has opened my ears;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have not been rebellious,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have not turned away.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I offered my back to those who beat me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my cheeks to those who pulled out my beard;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I did not hide my face
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from mocking and spitting.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' helps me,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not be disgraced.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore have I set my face like flint,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I know I will not be put to shame.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who vindicates me is near.
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who then will bring charges against me?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let us face each other!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who is my accuser?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Let him confront me!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'It is the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' who helps me.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Who will condemn me?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will all wear out like a garment;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the moths will eat them up.
