document_id: ISA.50,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Israel’s Sin and the Servant’s Obedience
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Where is your mother’s certificate of divorce
  - type: text
    content: with which I sent her away?
  - type: text
    content: Or to which of my creditors
  - type: text
    content: did I sell you?
  - type: text
    content: Because of your sins you were sold;
  - type: text
    content: because of your transgressions your mother was sent away.
  '10':
  - type: text
    content: 'Who among you fears the '
  - type: text
    content: Lord
  - type: text
    content: and obeys the word of his servant?
  - type: text
    content: Let the one who walks in the dark,
  - type: text
    content: who has no light,
  - type: text
    content: 'trust in the name of the '
  - type: text
    content: Lord
  - type: text
    content: and rely on their God.
  '11':
  - type: text
    content: But now, all you who light fires
  - type: text
    content: and provide yourselves with flaming torches,
  - type: text
    content: go, walk in the light of your fires
  - type: text
    content: and of the torches you have set ablaze.
  - type: text
    content: 'This is what you shall receive from my hand:'
  - type: text
    content: You will lie down in torment.
  '2':
  - type: text
    content: When I came, why was there no one?
  - type: text
    content: When I called, why was there no one to answer?
  - type: text
    content: Was my arm too short to deliver you?
  - type: text
    content: Do I lack the strength to rescue you?
  - type: text
    content: By a mere rebuke I dry up the sea,
  - type: text
    content: I turn rivers into a desert;
  - type: text
    content: their fish rot for lack of water
  - type: text
    content: and die of thirst.
  '3':
  - type: text
    content: I clothe the heavens with darkness
  - type: text
    content: and make sackcloth its covering.”
  '4':
  - type: text
    content: 'The Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' has given me a well-instructed tongue,'
  - type: text
    content: to know the word that sustains the weary.
  - type: text
    content: He wakens me morning by morning,
  - type: text
    content: wakens my ear to listen like one being instructed.
  '5':
  - type: text
    content: 'The Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' has opened my ears;'
  - type: text
    content: I have not been rebellious,
  - type: text
    content: I have not turned away.
  '6':
  - type: text
    content: I offered my back to those who beat me,
  - type: text
    content: my cheeks to those who pulled out my beard;
  - type: text
    content: I did not hide my face
  - type: text
    content: from mocking and spitting.
  '7':
  - type: text
    content: 'Because the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' helps me,'
  - type: text
    content: I will not be disgraced.
  - type: text
    content: Therefore have I set my face like flint,
  - type: text
    content: and I know I will not be put to shame.
  '8':
  - type: text
    content: He who vindicates me is near.
  - type: text
    content: Who then will bring charges against me?
  - type: text
    content: Let us face each other!
  - type: text
    content: Who is my accuser?
  - type: text
    content: Let him confront me!
  '9':
  - type: text
    content: 'It is the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' who helps me.'
  - type: text
    content: Who will condemn me?
  - type: text
    content: They will all wear out like a garment;
  - type: text
    content: the moths will eat them up.
