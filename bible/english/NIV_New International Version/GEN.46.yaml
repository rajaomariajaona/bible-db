document_id: GEN.46,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jacob Goes to Egypt
  - type: text
    content: So Israel set out with all that was his, and when he reached Beersheba, he offered sacrifices to the God of his father Isaac.
  '10':
  - type: text
    content: 'The sons of Simeon:'
  - type: text
    content: Jemuel, Jamin, Ohad, Jakin, Zohar and Shaul the son of a Canaanite woman.
  '11':
  - type: text
    content: 'The sons of Levi:'
  - type: text
    content: Gershon, Kohath and Merari.
  '12':
  - type: text
    content: 'The sons of Judah:'
  - type: text
    content: Er, Onan, Shelah, Perez and Zerah (but Er and Onan had died in the land of Canaan).
  - type: text
    content: 'The sons of Perez:'
  - type: text
    content: Hezron and Hamul.
  '13':
  - type: text
    content: 'The sons of Issachar:'
  - type: text
    content: Tola, Puah,
  - type: note
    content: Samaritan Pentateuch and Syriac (see also 1 Chron. 7:1); Masoretic Text Puvah
  - type: text
    content: ' Jashub'
  - type: note
    content: Samaritan Pentateuch and some Septuagint manuscripts (see also Num. 26:24 and 1 Chron. 7:1); Masoretic Text Iob
  - type: text
    content: ' and Shimron.'
  '14':
  - type: text
    content: 'The sons of Zebulun:'
  - type: text
    content: Sered, Elon and Jahleel.
  '15':
  - type: text
    content: These were the sons Leah bore to Jacob in Paddan Aram,
  - type: note
    content: That is, Northwest Mesopotamia
  - type: text
    content: ' besides his daughter Dinah. These sons and daughters of his were thirty-three in all.'
  '16':
  - type: text
    content: 'The sons of Gad:'
  - type: text
    content: Zephon,
  - type: note
    content: Samaritan Pentateuch and Septuagint (see also Num. 26:15); Masoretic Text Ziphion
  - type: text
    content: ' Haggi, Shuni, Ezbon, Eri, Arodi and Areli.'
  '17':
  - type: text
    content: 'The sons of Asher:'
  - type: text
    content: Imnah, Ishvah, Ishvi and Beriah.
  - type: text
    content: Their sister was Serah.
  - type: text
    content: 'The sons of Beriah:'
  - type: text
    content: Heber and Malkiel.
  '18':
  - type: text
    content: These were the children born to Jacob by Zilpah, whom Laban had given to his daughter Leah—sixteen in all.
  '19':
  - type: text
    content: 'The sons of Jacob’s wife Rachel:'
  - type: text
    content: 'Joseph and Benjamin. '
  '2':
  - type: text
    content: And God spoke to Israel in a vision at night and said, “Jacob! Jacob!”
  - type: text
    content: “Here I am,” he replied.
  '20':
  - type: text
    content: In Egypt, Manasseh and Ephraim were born to Joseph by Asenath daughter of Potiphera, priest of On.
  - type: note
    content: That is, Heliopolis
  '21':
  - type: text
    content: 'The sons of Benjamin:'
  - type: text
    content: Bela, Beker, Ashbel, Gera, Naaman, Ehi, Rosh, Muppim, Huppim and Ard.
  '22':
  - type: text
    content: These were the sons of Rachel who were born to Jacob—fourteen in all.
  '23':
  - type: text
    content: 'The son of Dan:'
  - type: text
    content: Hushim.
  '24':
  - type: text
    content: 'The sons of Naphtali:'
  - type: text
    content: Jahziel, Guni, Jezer and Shillem.
  '25':
  - type: text
    content: These were the sons born to Jacob by Bilhah, whom Laban had given to his daughter Rachel—seven in all.
  '26':
  - type: text
    content: 'All those who went to Egypt with Jacob—those who were his direct descendants, not counting his sons’ wives—numbered sixty-six persons. '
  '27':
  - type: text
    content: With the two sons
  - type: note
    content: Hebrew; Septuagint the nine children
  - type: text
    content: ' who had been born to Joseph in Egypt, the members of Jacob’s family, which went to Egypt, were seventy'
  - type: note
    content: Hebrew (see also Exodus 1:5 and note); Septuagint (see also Acts 7:14) seventy-five
  - type: text
    content: ' in all.'
  '28':
  - type: text
    content: 'Now Jacob sent Judah ahead of him to Joseph to get directions to Goshen. When they arrived in the region of Goshen, '
  '29':
  - type: text
    content: Joseph had his chariot made ready and went to Goshen to meet his father Israel. As soon as Joseph appeared before him, he threw his arms around his father
  - type: note
    content: Hebrew around him
  - type: text
    content: ' and wept for a long time.'
  '3':
  - type: text
    content: '“I am God, the God of your father,” he said. “Do not be afraid to go down to Egypt, for I will make you into a great nation there. '
  '30':
  - type: text
    content: Israel said to Joseph, “Now I am ready to die, since I have seen for myself that you are still alive.”
  '31':
  - type: text
    content: 'Then Joseph said to his brothers and to his father’s household, “I will go up and speak to Pharaoh and will say to him, ‘My brothers and my father’s household, who were living in the land of Canaan, have come to me. '
  '32':
  - type: text
    content: 'The men are shepherds; they tend livestock, and they have brought along their flocks and herds and everything they own.’ '
  '33':
  - type: text
    content: 'When Pharaoh calls you in and asks, ‘What is your occupation?’ '
  '34':
  - type: text
    content: you should answer, ‘Your servants have tended livestock from our boyhood on, just as our fathers did.’ Then you will be allowed to settle in the region of Goshen, for all shepherds are detestable to the Egyptians.”
  '4':
  - type: text
    content: I will go down to Egypt with you, and I will surely bring you back again. And Joseph’s own hand will close your eyes.”
  '5':
  - type: text
    content: 'Then Jacob left Beersheba, and Israel’s sons took their father Jacob and their children and their wives in the carts that Pharaoh had sent to transport him. '
  '6':
  - type: text
    content: 'So Jacob and all his offspring went to Egypt, taking with them their livestock and the possessions they had acquired in Canaan. '
  '7':
  - type: text
    content: Jacob brought with him to Egypt his sons and grandsons and his daughters and granddaughters—all his offspring.
  '8':
  - type: text
    content: 'These are the names of the sons of Israel (Jacob and his descendants) who went to Egypt:'
  - type: text
    content: Reuben the firstborn of Jacob.
  '9':
  - type: text
    content: 'The sons of Reuben:'
  - type: text
    content: Hanok, Pallu, Hezron and Karmi.
