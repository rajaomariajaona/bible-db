document_id: GEN.46
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob Goes to Egypt
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: So Israel set out with all that was his, and when he reached Beersheba, he offered sacrifices to the God of his father Isaac.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: And God spoke to Israel in a vision at night and said, “Jacob! Jacob!”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Here I am,” he replied.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“I am God, the God of your father,” he said. “Do not be afraid to go down to Egypt, for I will make you into a great nation there. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: I will go down to Egypt with you, and I will surely bring you back again. And Joseph’s own hand will close your eyes.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then Jacob left Beersheba, and Israel’s sons took their father Jacob and their children and their wives in the carts that Pharaoh had sent to transport him. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'So Jacob and all his offspring went to Egypt, taking with them their livestock and the possessions they had acquired in Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Jacob brought with him to Egypt his sons and grandsons and his daughters and granddaughters—all his offspring.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'These are the names of the sons of Israel (Jacob and his descendants) who went to Egypt:'
- type: usfm
  marker: li1
  children:
  - type: text
    text: Reuben the firstborn of Jacob.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The sons of Reuben:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Hanok, Pallu, Hezron and Karmi.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'The sons of Simeon:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jemuel, Jamin, Ohad, Jakin, Zohar and Shaul the son of a Canaanite woman.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'The sons of Levi:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Gershon, Kohath and Merari.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The sons of Judah:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Er, Onan, Shelah, Perez and Zerah (but Er and Onan had died in the land of Canaan).
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'The sons of Perez:'
- type: usfm
  marker: li3
  children:
  - type: text
    text: Hezron and Hamul.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The sons of Issachar:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Tola, Puah,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Samaritan Pentateuch and Syriac (see also 1 Chron. 7:1); Masoretic Text Puvah
    marker-yv: yv-n
  - type: text
    text: ' Jashub'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Samaritan Pentateuch and some Septuagint manuscripts (see also Num. 26:24 and 1 Chron. 7:1); Masoretic Text Iob
    marker-yv: yv-n
  - type: text
    text: ' and Shimron.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The sons of Zebulun:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Sered, Elon and Jahleel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: These were the sons Leah bore to Jacob in Paddan Aram,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, Northwest Mesopotamia
    marker-yv: yv-n
  - type: text
    text: ' besides his daughter Dinah. These sons and daughters of his were thirty-three in all.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The sons of Gad:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Zephon,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Samaritan Pentateuch and Septuagint (see also Num. 26:15); Masoretic Text Ziphion
    marker-yv: yv-n
  - type: text
    text: ' Haggi, Shuni, Ezbon, Eri, Arodi and Areli.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The sons of Asher:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Imnah, Ishvah, Ishvi and Beriah.
- type: usfm
  marker: li2
  children:
  - type: text
    text: Their sister was Serah.
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'The sons of Beriah:'
- type: usfm
  marker: li3
  children:
  - type: text
    text: Heber and Malkiel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: These were the children born to Jacob by Zilpah, whom Laban had given to his daughter Leah—sixteen in all.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The sons of Jacob’s wife Rachel:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Joseph and Benjamin. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: In Egypt, Manasseh and Ephraim were born to Joseph by Asenath daughter of Potiphera, priest of On.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, Heliopolis
    marker-yv: yv-n
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The sons of Benjamin:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Bela, Beker, Ashbel, Gera, Naaman, Ehi, Rosh, Muppim, Huppim and Ard.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: These were the sons of Rachel who were born to Jacob—fourteen in all.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The son of Dan:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Hushim.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'The sons of Naphtali:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jahziel, Guni, Jezer and Shillem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: These were the sons born to Jacob by Bilhah, whom Laban had given to his daughter Rachel—seven in all.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'All those who went to Egypt with Jacob—those who were his direct descendants, not counting his sons’ wives—numbered sixty-six persons. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: With the two sons
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew; Septuagint '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the nine children
    marker-yv: yv-n
  - type: text
    text: ' who had been born to Joseph in Egypt, the members of Jacob’s family, which went to Egypt, were seventy'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew (see also Exodus 1:5 and note); Septuagint (see also Acts 7:14) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: seventy-five
    marker-yv: yv-n
  - type: text
    text: ' in all.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Now Jacob sent Judah ahead of him to Joseph to get directions to Goshen. When they arrived in the region of Goshen, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Joseph had his chariot made ready and went to Goshen to meet his father Israel. As soon as Joseph appeared before him, he threw his arms around his father
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46:29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: around him
    marker-yv: yv-n
  - type: text
    text: ' and wept for a long time.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Israel said to Joseph, “Now I am ready to die, since I have seen for myself that you are still alive.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Then Joseph said to his brothers and to his father’s household, “I will go up and speak to Pharaoh and will say to him, ‘My brothers and my father’s household, who were living in the land of Canaan, have come to me. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'The men are shepherds; they tend livestock, and they have brought along their flocks and herds and everything they own.’ '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'When Pharaoh calls you in and asks, ‘What is your occupation?’ '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: you should answer, ‘Your servants have tended livestock from our boyhood on, just as our fathers did.’ Then you will be allowed to settle in the region of Goshen, for all shepherds are detestable to the Egyptians.”
