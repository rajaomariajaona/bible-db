document_id: REV.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Throne in Heaven
  - type: text
    content: 'After this I looked, and there before me was a door standing open in heaven. And the voice I had first heard speaking to me like a trumpet said, '
  - type: text
    content: “Come up here, and I will show you what must take place after this.”
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'the twenty-four elders fall down before him who sits on the throne and worship him who lives for ever and ever. They lay their crowns before the throne and say:'
  '11':
  - type: text
    content: “You are worthy, our Lord and God,
  - type: text
    content: to receive glory and honor and power,
  - type: text
    content: for you created all things,
  - type: text
    content: and by your will they were created
  - type: text
    content: and have their being.”
  '2':
  - type: text
    content: 'At once I was in the Spirit, and there before me was a throne in heaven with someone sitting on it. '
  '3':
  - type: text
    content: 'And the one who sat there had the appearance of jasper and ruby. A rainbow that shone like an emerald encircled the throne. '
  '4':
  - type: text
    content: 'Surrounding the throne were twenty-four other thrones, and seated on them were twenty-four elders. They were dressed in white and had crowns of gold on their heads. '
  '5':
  - type: text
    content: From the throne came flashes of lightning, rumblings and peals of thunder. In front of the throne, seven lamps were blazing. These are the seven spirits
  - type: note
    content: That is, the sevenfold Spirit
  - type: text
    content: ' of God. '
  '6':
  - type: text
    content: Also in front of the throne there was what looked like a sea of glass, clear as crystal.
  - type: text
    content: 'In the center, around the throne, were four living creatures, and they were covered with eyes, in front and in back. '
  '7':
  - type: text
    content: 'The first living creature was like a lion, the second was like an ox, the third had a face like a man, the fourth was like a flying eagle. '
  '8':
  - type: text
    content: 'Each of the four living creatures had six wings and was covered with eyes all around, even under its wings. Day and night they never stop saying:'
  - type: text
    content: “ ‘Holy, holy, holy
  - type: text
    content: is the Lord God Almighty,’
  - type: note
    content: Isaiah 6:3
  - type: text
    content: who was, and is, and is to come.”
  '9':
  - type: text
    content: 'Whenever the living creatures give glory, honor and thanks to him who sits on the throne and who lives for ever and ever, '
