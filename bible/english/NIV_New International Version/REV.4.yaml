document_id: REV.4,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Throne in Heaven
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After this I looked, and there before me was a door standing open in heaven. And the voice I had first heard speaking to me like a trumpet said, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Come up here, and I will show you what must take place after this.”
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'the twenty-four elders fall down before him who sits on the throne and worship him who lives for ever and ever. They lay their crowns before the throne and say:'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You are worthy, our Lord and God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to receive glory and honor and power,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for you created all things,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and by your will they were created
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have their being.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At once I was in the Spirit, and there before me was a throne in heaven with someone sitting on it. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the one who sat there had the appearance of jasper and ruby. A rainbow that shone like an emerald encircled the throne. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Surrounding the throne were twenty-four other thrones, and seated on them were twenty-four elders. They were dressed in white and had crowns of gold on their heads. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: From the throne came flashes of lightning, rumblings and peals of thunder. In front of the throne, seven lamps were blazing. These are the seven spirits
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the sevenfold Spirit
      marker-yv: yv-n
    - type: text
      text: ' of God. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Also in front of the throne there was what looked like a sea of glass, clear as crystal.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the center, around the throne, were four living creatures, and they were covered with eyes, in front and in back. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The first living creature was like a lion, the second was like an ox, the third had a face like a man, the fourth was like a flying eagle. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Each of the four living creatures had six wings and was covered with eyes all around, even under its wings. Day and night they never stop saying:'
  - type: usfm
    marker: qc
    children:
    - type: text
      text: “ ‘Holy, holy, holy
  - type: usfm
    marker: qc
    children:
    - type: text
      text: is the Lord God Almighty,’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Isaiah 6:3
      marker-yv: yv-n
  - type: usfm
    marker: qc
    children:
    - type: text
      text: who was, and is, and is to come.”
  '9':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Whenever the living creatures give glory, honor and thanks to him who sits on the throne and who lives for ever and ever, '
