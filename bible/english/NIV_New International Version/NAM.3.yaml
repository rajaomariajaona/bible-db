document_id: NAM.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Woe to Nineveh
  - type: text
    content: Woe to the city of blood,
  - type: text
    content: full of lies,
  - type: text
    content: full of plunder,
  - type: text
    content: never without victims!
  '10':
  - type: text
    content: Yet she was taken captive
  - type: text
    content: and went into exile.
  - type: text
    content: Her infants were dashed to pieces
  - type: text
    content: at every street corner.
  - type: text
    content: Lots were cast for her nobles,
  - type: text
    content: and all her great men were put in chains.
  '11':
  - type: text
    content: You too will become drunk;
  - type: text
    content: you will go into hiding
  - type: text
    content: and seek refuge from the enemy.
  '12':
  - type: text
    content: All your fortresses are like fig trees
  - type: text
    content: with their first ripe fruit;
  - type: text
    content: when they are shaken,
  - type: text
    content: the figs fall into the mouth of the eater.
  '13':
  - type: text
    content: Look at your troops—
  - type: text
    content: they are all weaklings.
  - type: text
    content: The gates of your land
  - type: text
    content: are wide open to your enemies;
  - type: text
    content: fire has consumed the bars of your gates.
  '14':
  - type: text
    content: Draw water for the siege,
  - type: text
    content: strengthen your defenses!
  - type: text
    content: Work the clay,
  - type: text
    content: tread the mortar,
  - type: text
    content: repair the brickwork!
  '15':
  - type: text
    content: There the fire will consume you;
  - type: text
    content: the sword will cut you down—
  - type: text
    content: they will devour you like a swarm of locusts.
  - type: text
    content: Multiply like grasshoppers,
  - type: text
    content: multiply like locusts!
  '16':
  - type: text
    content: You have increased the number of your merchants
  - type: text
    content: till they are more numerous than the stars in the sky,
  - type: text
    content: but like locusts they strip the land
  - type: text
    content: and then fly away.
  '17':
  - type: text
    content: Your guards are like locusts,
  - type: text
    content: your officials like swarms of locusts
  - type: text
    content: that settle in the walls on a cold day—
  - type: text
    content: but when the sun appears they fly away,
  - type: text
    content: and no one knows where.
  '18':
  - type: text
    content: King of Assyria, your shepherds
  - type: note
    content: That is, rulers
  - type: text
    content: ' slumber;'
  - type: text
    content: your nobles lie down to rest.
  - type: text
    content: Your people are scattered on the mountains
  - type: text
    content: with no one to gather them.
  '19':
  - type: text
    content: Nothing can heal you;
  - type: text
    content: your wound is fatal.
  - type: text
    content: All who hear the news about you
  - type: text
    content: clap their hands at your fall,
  - type: text
    content: for who has not felt
  - type: text
    content: your endless cruelty?
  '2':
  - type: text
    content: The crack of whips,
  - type: text
    content: the clatter of wheels,
  - type: text
    content: galloping horses
  - type: text
    content: and jolting chariots!
  '3':
  - type: text
    content: Charging cavalry,
  - type: text
    content: flashing swords
  - type: text
    content: and glittering spears!
  - type: text
    content: Many casualties,
  - type: text
    content: piles of dead,
  - type: text
    content: bodies without number,
  - type: text
    content: people stumbling over the corpses—
  '4':
  - type: text
    content: all because of the wanton lust of a prostitute,
  - type: text
    content: alluring, the mistress of sorceries,
  - type: text
    content: who enslaved nations by her prostitution
  - type: text
    content: and peoples by her witchcraft.
  '5':
  - type: text
    content: '“I am against you,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.'
  - type: text
    content: “I will lift your skirts over your face.
  - type: text
    content: I will show the nations your nakedness
  - type: text
    content: and the kingdoms your shame.
  '6':
  - type: text
    content: I will pelt you with filth,
  - type: text
    content: I will treat you with contempt
  - type: text
    content: and make you a spectacle.
  '7':
  - type: text
    content: All who see you will flee from you and say,
  - type: text
    content: ‘Nineveh is in ruins—who will mourn for her?’
  - type: text
    content: Where can I find anyone to comfort you?”
  '8':
  - type: text
    content: Are you better than Thebes,
  - type: text
    content: situated on the Nile,
  - type: text
    content: with water around her?
  - type: text
    content: The river was her defense,
  - type: text
    content: the waters her wall.
  '9':
  - type: text
    content: Cush
  - type: note
    content: That is, the upper Nile region
  - type: text
    content: ' and Egypt were her boundless strength;'
  - type: text
    content: Put and Libya were among her allies.
