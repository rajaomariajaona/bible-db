document_id: NAM.3,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Woe to Nineveh
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to the city of blood,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: full of lies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: full of plunder,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never without victims!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Yet she was taken captive
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and went into exile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Her infants were dashed to pieces
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at every street corner.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lots were cast for her nobles,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all her great men were put in chains.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You too will become drunk;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will go into hiding
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and seek refuge from the enemy.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All your fortresses are like fig trees
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with their first ripe fruit;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when they are shaken,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the figs fall into the mouth of the eater.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Look at your troops—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are all weaklings.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The gates of your land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are wide open to your enemies;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: fire has consumed the bars of your gates.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Draw water for the siege,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: strengthen your defenses!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Work the clay,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: tread the mortar,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: repair the brickwork!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There the fire will consume you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the sword will cut you down—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will devour you like a swarm of locusts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Multiply like grasshoppers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: multiply like locusts!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have increased the number of your merchants
  - type: usfm
    marker: q2
    children:
    - type: text
      text: till they are more numerous than the stars in the sky,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but like locusts they strip the land
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and then fly away.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your guards are like locusts,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your officials like swarms of locusts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that settle in the walls on a cold day—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: but when the sun appears they fly away,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and no one knows where.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: King of Assyria, your shepherds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, rulers
      marker-yv: yv-n
    - type: text
      text: ' slumber;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your nobles lie down to rest.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Your people are scattered on the mountains
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with no one to gather them.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nothing can heal you;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your wound is fatal.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who hear the news about you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: clap their hands at your fall,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for who has not felt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your endless cruelty?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The crack of whips,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the clatter of wheels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: galloping horses
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and jolting chariots!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Charging cavalry,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: flashing swords
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and glittering spears!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Many casualties,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: piles of dead,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bodies without number,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: people stumbling over the corpses—
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: all because of the wanton lust of a prostitute,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: alluring, the mistress of sorceries,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who enslaved nations by her prostitution
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and peoples by her witchcraft.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I am against you,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “I will lift your skirts over your face.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will show the nations your nakedness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the kingdoms your shame.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will pelt you with filth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will treat you with contempt
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and make you a spectacle.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All who see you will flee from you and say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘Nineveh is in ruins—who will mourn for her?’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Where can I find anyone to comfort you?”
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Are you better than Thebes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: situated on the Nile,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with water around her?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The river was her defense,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the waters her wall.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cush
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the upper Nile region
      marker-yv: yv-n
    - type: text
      text: ' and Egypt were her boundless strength;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Put and Libya were among her allies.
