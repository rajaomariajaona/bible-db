document_id: 1SA.31,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Saul Takes His Life
  - type: text
    content: 'Now the Philistines fought against Israel; the Israelites fled before them, and many fell dead on Mount Gilboa. '
  '10':
  - type: text
    content: They put his armor in the temple of the Ashtoreths and fastened his body to the wall of Beth Shan.
  '11':
  - type: text
    content: 'When the people of Jabesh Gilead heard what the Philistines had done to Saul, '
  '12':
  - type: text
    content: 'all their valiant men marched through the night to Beth Shan. They took down the bodies of Saul and his sons from the wall of Beth Shan and went to Jabesh, where they burned them. '
  '13':
  - type: text
    content: Then they took their bones and buried them under a tamarisk tree at Jabesh, and they fasted seven days.
  '2':
  - type: text
    content: 'The Philistines were in hot pursuit of Saul and his sons, and they killed his sons Jonathan, Abinadab and Malki-Shua. '
  '3':
  - type: text
    content: The fighting grew fierce around Saul, and when the archers overtook him, they wounded him critically.
  '4':
  - type: text
    content: Saul said to his armor-bearer, “Draw your sword and run me through, or these uncircumcised fellows will come and run me through and abuse me.”
  - type: text
    content: 'But his armor-bearer was terrified and would not do it; so Saul took his own sword and fell on it. '
  '5':
  - type: text
    content: 'When the armor-bearer saw that Saul was dead, he too fell on his sword and died with him. '
  '6':
  - type: text
    content: So Saul and his three sons and his armor-bearer and all his men died together that same day.
  '7':
  - type: text
    content: When the Israelites along the valley and those across the Jordan saw that the Israelite army had fled and that Saul and his sons had died, they abandoned their towns and fled. And the Philistines came and occupied them.
  '8':
  - type: text
    content: 'The next day, when the Philistines came to strip the dead, they found Saul and his three sons fallen on Mount Gilboa. '
  '9':
  - type: text
    content: 'They cut off his head and stripped off his armor, and they sent messengers throughout the land of the Philistines to proclaim the news in the temple of their idols and among their people. '
