  '4':
  - type: text
    content: 'I said, “Have mercy on me, '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: heal me, for I have sinned against you.”
  '5':
  - type: text
    content: My enemies say of me in malice,
  - type: text
    content: “When will he die and his name perish?”
  '6':
  - type: text
    content: When one of them comes to see me,
  - type: text
    content: he speaks falsely, while his heart gathers slander;
  - type: text
    content: then he goes out and spreads it around.
  '7':
  - type: text
    content: All my enemies whisper together against me;
  - type: text
    content: they imagine the worst for me, saying,
  '8':
  - type: text
    content: “A vile disease has afflicted him;
  - type: text
    content: he will never get up from the place where he lies.”
  '9':
  - type: text
    content: Even my close friend,
  - type: text
