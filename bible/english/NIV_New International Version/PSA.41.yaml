document_id: PSA.41,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 41
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: ft
        children:
        - type: text
          text: In Hebrew texts 41:1-13 is numbered 41:2-14.
      marker-yv: yv-n
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: For the director of music. A psalm of David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Blessed are those who have regard for the weak;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' delivers them in times of trouble.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'But may you have mercy on me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: raise me up, that I may repay them.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I know that you are pleased with me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for my enemy does not triumph over me.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Because of my integrity you uphold me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and set me in your presence forever.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Praise be to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from everlasting to everlasting.
  - type: usfm
    marker: qc
    children:
    - type: text
      text: Amen and Amen.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' protects and preserves them—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they are counted among the blessed in the land—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he does not give them over to the desire of their foes.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sustains them on their sickbed'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and restores them from their bed of illness.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I said, “Have mercy on me, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: heal me, for I have sinned against you.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: My enemies say of me in malice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “When will he die and his name perish?”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: When one of them comes to see me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he speaks falsely, while his heart gathers slander;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: then he goes out and spreads it around.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All my enemies whisper together against me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they imagine the worst for me, saying,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “A vile disease has afflicted him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will never get up from the place where he lies.”
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even my close friend,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: someone I trusted,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: one who shared my bread,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: has turned
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: has lifted up his heel
      marker-yv: yv-n
    - type: text
      text: ' against me.'
