document_id: JER.39,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'In the ninth year of Zedekiah king of Judah, in the tenth month, Nebuchadnezzar king of Babylon marched against Jerusalem with his whole army and laid siege to it. '
  '10':
  - type: text
    content: But Nebuzaradan the commander of the guard left behind in the land of Judah some of the poor people, who owned nothing; and at that time he gave them vineyards and fields.
  '11':
  - type: text
    content: 'Now Nebuchadnezzar king of Babylon had given these orders about Jeremiah through Nebuzaradan commander of the imperial guard: '
  '12':
  - type: text
    content: '“Take him and look after him; don’t harm him but do for him whatever he asks.” '
  '13':
  - type: text
    content: 'So Nebuzaradan the commander of the guard, Nebushazban a chief officer, Nergal-Sharezer a high official and all the other officers of the king of Babylon '
  '14':
  - type: text
    content: sent and had Jeremiah taken out of the courtyard of the guard. They turned him over to Gedaliah son of Ahikam, the son of Shaphan, to take him back to his home. So he remained among his own people.
  '15':
  - type: text
    content: 'While Jeremiah had been confined in the courtyard of the guard, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to him: '
  '16':
  - type: text
    content: '“Go and tell Ebed-Melek the Cushite, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says: I am about to fulfill my words against this city—words concerning disaster, not prosperity. At that time they will be fulfilled before your eyes. '
  '17':
  - type: text
    content: 'But I will rescue you on that day, declares the '
  - type: text
    content: Lord
  - type: text
    content: '; you will not be given into the hands of those you fear. '
  '18':
  - type: text
    content: 'I will save you; you will not fall by the sword but will escape with your life, because you trust in me, declares the '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  '2':
  - type: text
    content: 'And on the ninth day of the fourth month of Zedekiah’s eleventh year, the city wall was broken through. '
  '3':
  - type: text
    content: 'Then all the officials of the king of Babylon came and took seats in the Middle Gate: Nergal-Sharezer of Samgar, Nebo-Sarsekim a chief officer, Nergal-Sharezer a high official and all the other officials of the king of Babylon. '
  '4':
  - type: text
    content: When Zedekiah king of Judah and all the soldiers saw them, they fled; they left the city at night by way of the king’s garden, through the gate between the two walls, and headed toward the Arabah.
  - type: note
    content: Or the Jordan Valley
  '5':
  - type: text
    content: But the Babylonian
  - type: note
    content: Or Chaldean
  - type: text
    content: ' army pursued them and overtook Zedekiah in the plains of Jericho. They captured him and took him to Nebuchadnezzar king of Babylon at Riblah in the land of Hamath, where he pronounced sentence on him. '
  '6':
  - type: text
    content: 'There at Riblah the king of Babylon slaughtered the sons of Zedekiah before his eyes and also killed all the nobles of Judah. '
  '7':
  - type: text
    content: Then he put out Zedekiah’s eyes and bound him with bronze shackles to take him to Babylon.
  '8':
  - type: text
    content: The Babylonians
  - type: note
    content: Or Chaldeans
  - type: text
    content: ' set fire to the royal palace and the houses of the people and broke down the walls of Jerusalem. '
  '9':
  - type: text
    content: 'Nebuzaradan commander of the imperial guard carried into exile to Babylon the people who remained in the city, along with those who had gone over to him, and the rest of the people. '
