document_id: LEV.19
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Various Laws
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' said to Moses, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '“Speak to the entire assembly of Israel and say to them: ‘Be holy because I, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, am holy.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '“ ‘Each of you must respect your mother and father, and you must observe my Sabbaths. I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '“ ‘Do not turn to idols or make metal gods for yourselves. I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '“ ‘When you sacrifice a fellowship offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', sacrifice it in such a way that it will be accepted on your behalf. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'It shall be eaten on the day you sacrifice it or on the next day; anything left over until the third day must be burned up. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'If any of it is eaten on the third day, it is impure and will not be accepted. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Whoever eats it will be held responsible because they have desecrated what is holy to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ; they must be cut off from their people.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '“ ‘When you reap the harvest of your land, do not reap to the very edges of your field or gather the gleanings of your harvest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Do not go over your vineyard a second time or pick up the grapes that have fallen. Leave them for the poor and the foreigner. I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: “ ‘Do not steal.
- type: usfm
  marker: p
  children:
  - type: text
    text: “ ‘Do not lie.
- type: usfm
  marker: p
  children:
  - type: text
    text: “ ‘Do not deceive one another.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“ ‘Do not swear falsely by my name and so profane the name of your God. I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “ ‘Do not defraud or rob your neighbor.
- type: usfm
  marker: p
  children:
  - type: text
    text: “ ‘Do not hold back the wages of a hired worker overnight.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '“ ‘Do not curse the deaf or put a stumbling block in front of the blind, but fear your God. I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: “ ‘Do not pervert justice; do not show partiality to the poor or favoritism to the great, but judge your neighbor fairly.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: “ ‘Do not go about spreading slander among your people.
- type: usfm
  marker: p
  children:
  - type: text
    text: '“ ‘Do not do anything that endangers your neighbor’s life. I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “ ‘Do not hate a fellow Israelite in your heart. Rebuke your neighbor frankly so you will not share in their guilt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '“ ‘Do not seek revenge or bear a grudge against anyone among your people, but love your neighbor as yourself. I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: “ ‘Keep my decrees.
- type: usfm
  marker: p
  children:
  - type: text
    text: “ ‘Do not mate different kinds of animals.
- type: usfm
  marker: p
  children:
  - type: text
    text: “ ‘Do not plant your field with two kinds of seed.
- type: usfm
  marker: p
  children:
  - type: text
    text: “ ‘Do not wear clothing woven of two kinds of material.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “ ‘If a man sleeps with a female slave who is promised to another man but who has not been ransomed or given her freedom, there must be due punishment.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: be an inquiry
    marker-yv: yv-n
  - type: text
    text: ' Yet they are not to be put to death, because she had not been freed. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The man, however, must bring a ram to the entrance to the tent of meeting for a guilt offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'With the ram of the guilt offering the priest is to make atonement for him before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' for the sin he has committed, and his sin will be forgiven.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: “ ‘When you enter the land and plant any kind of fruit tree, regard its fruit as forbidden.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: uncircumcised
    marker-yv: yv-n
  - type: text
    text: ' For three years you are to consider it forbidden'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: uncircumcised
    marker-yv: yv-n
  - type: text
    text: '; it must not be eaten. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'In the fourth year all its fruit will be holy, an offering of praise to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'But in the fifth year you may eat its fruit. In this way your harvest will be increased. I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “ ‘Do not eat any meat with the blood still in it.
- type: usfm
  marker: p
  children:
  - type: text
    text: “ ‘Do not practice divination or seek omens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: “ ‘Do not cut the hair at the sides of your head or clip off the edges of your beard.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '“ ‘Do not cut your bodies for the dead or put tattoo marks on yourselves. I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: “ ‘Do not degrade your daughter by making her a prostitute, or the land will turn to prostitution and be filled with wickedness.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '“ ‘Observe my Sabbaths and have reverence for my sanctuary. I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '“ ‘Do not turn to mediums or seek out spiritists, for you will be defiled by them. I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '“ ‘Stand up in the presence of the aged, show respect for the elderly and revere your God. I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '“ ‘When a foreigner resides among you in your land, do not mistreat them. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'The foreigner residing among you must be treated as your native-born. Love them as yourself, for you were foreigners in Egypt. I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: '“ ‘Do not use dishonest standards when measuring length, weight or quantity. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Use honest scales and honest weights, an honest ephah
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: An ephah was a dry measure having the capacity of about 3/5 of a bushel or about 22 liters.
    marker-yv: yv-n
  - type: text
    text: ' and an honest hin.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: A hin was a liquid measure having the capacity of about 1 gallon or about 3.8 liters.
    marker-yv: yv-n
  - type: text
    text: ' I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' your God, who brought you out of Egypt.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: '“ ‘Keep all my decrees and all my laws and follow them. I am the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .’ ”
