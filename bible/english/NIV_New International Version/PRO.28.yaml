document_id: PRO.28
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The wicked flee though no one pursues,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the righteous are as bold as a lion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: When a country is rebellious, it has many rulers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a ruler with discernment and knowledge maintains order.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: A ruler
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: A poor person
    marker-yv: yv-n
  - type: text
    text: ' who oppresses the poor'
- type: usfm
  marker: q2
  children:
  - type: text
    text: is like a driving rain that leaves no crops.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Those who forsake instruction praise the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but those who heed it resist them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Evildoers do not understand what is right,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but those who seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' understand it fully.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Better the poor whose walk is blameless
- type: usfm
  marker: q2
  children:
  - type: text
    text: than the rich whose ways are perverse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: A discerning son heeds instruction,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but a companion of gluttons disgraces his father.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Whoever increases wealth by taking interest or profit from the poor
- type: usfm
  marker: q2
  children:
  - type: text
    text: amasses it for another, who will be kind to the poor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: If anyone turns a deaf ear to my instruction,
- type: usfm
  marker: q2
  children:
  - type: text
    text: even their prayers are detestable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Whoever leads the upright along an evil path
- type: usfm
  marker: q2
  children:
  - type: text
    text: will fall into their own trap,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the blameless will receive a good inheritance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The rich are wise in their own eyes;
- type: usfm
  marker: q2
  children:
  - type: text
    text: one who is poor and discerning sees how deluded they are.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: When the righteous triumph, there is great elation;
- type: usfm
  marker: q2
  children:
  - type: text
    text: but when the wicked rise to power, people go into hiding.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Whoever conceals their sins does not prosper,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the one who confesses and renounces them finds mercy.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Blessed is the one who always trembles before God,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but whoever hardens their heart falls into trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Like a roaring lion or a charging bear
- type: usfm
  marker: q2
  children:
  - type: text
    text: is a wicked ruler over a helpless people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: A tyrannical ruler practices extortion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but one who hates ill-gotten gain will enjoy a long reign.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Anyone tormented by the guilt of murder
- type: usfm
  marker: q2
  children:
  - type: text
    text: will seek refuge in the grave;
- type: usfm
  marker: q2
  children:
  - type: text
    text: let no one hold them back.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The one whose walk is blameless is kept safe,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but the one whose ways are perverse will fall into the pit.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28:18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Syriac (see Septuagint); Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: into one
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Those who work their land will have abundant food,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but those who chase fantasies will have their fill of poverty.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: A faithful person will be richly blessed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but one eager to get rich will not go unpunished.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: To show partiality is not good—
- type: usfm
  marker: q2
  children:
  - type: text
    text: yet a person will do wrong for a piece of bread.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: The stingy are eager to get rich
- type: usfm
  marker: q2
  children:
  - type: text
    text: and are unaware that poverty awaits them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Whoever rebukes a person will in the end gain favor
- type: usfm
  marker: q2
  children:
  - type: text
    text: rather than one who has a flattering tongue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Whoever robs their father or mother
- type: usfm
  marker: q2
  children:
  - type: text
    text: and says, “It’s not wrong,”
- type: usfm
  marker: q2
  children:
  - type: text
    text: is partner to one who destroys.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: The greedy stir up conflict,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but those who trust in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will prosper.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Those who trust in themselves are fools,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but those who walk in wisdom are kept safe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Those who give to the poor will lack nothing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but those who close their eyes to them receive many curses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: When the wicked rise to power, people go into hiding;
- type: usfm
  marker: q2
  children:
  - type: text
    text: but when the wicked perish, the righteous thrive.
