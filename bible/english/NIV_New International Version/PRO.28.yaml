document_id: PRO.28,111
type_code: eng
verses:
  '1':
  - type: text
    content: The wicked flee though no one pursues,
  - type: text
    content: but the righteous are as bold as a lion.
  '10':
  - type: text
    content: Whoever leads the upright along an evil path
  - type: text
    content: will fall into their own trap,
  - type: text
    content: but the blameless will receive a good inheritance.
  '11':
  - type: text
    content: The rich are wise in their own eyes;
  - type: text
    content: one who is poor and discerning sees how deluded they are.
  '12':
  - type: text
    content: When the righteous triumph, there is great elation;
  - type: text
    content: but when the wicked rise to power, people go into hiding.
  '13':
  - type: text
    content: Whoever conceals their sins does not prosper,
  - type: text
    content: but the one who confesses and renounces them finds mercy.
  '14':
  - type: text
    content: Blessed is the one who always trembles before God,
  - type: text
    content: but whoever hardens their heart falls into trouble.
  '15':
  - type: text
    content: Like a roaring lion or a charging bear
  - type: text
    content: is a wicked ruler over a helpless people.
  '16':
  - type: text
    content: A tyrannical ruler practices extortion,
  - type: text
    content: but one who hates ill-gotten gain will enjoy a long reign.
  '17':
  - type: text
    content: Anyone tormented by the guilt of murder
  - type: text
    content: will seek refuge in the grave;
  - type: text
    content: let no one hold them back.
  '18':
  - type: text
    content: The one whose walk is blameless is kept safe,
  - type: text
    content: but the one whose ways are perverse will fall into the pit.
  - type: note
    content: Syriac (see Septuagint); Hebrew into one
  '19':
  - type: text
    content: Those who work their land will have abundant food,
  - type: text
    content: but those who chase fantasies will have their fill of poverty.
  '2':
  - type: text
    content: When a country is rebellious, it has many rulers,
  - type: text
    content: but a ruler with discernment and knowledge maintains order.
  '20':
  - type: text
    content: A faithful person will be richly blessed,
  - type: text
    content: but one eager to get rich will not go unpunished.
  '21':
  - type: text
    content: To show partiality is not good—
  - type: text
    content: yet a person will do wrong for a piece of bread.
  '22':
  - type: text
    content: The stingy are eager to get rich
  - type: text
    content: and are unaware that poverty awaits them.
  '23':
  - type: text
    content: Whoever rebukes a person will in the end gain favor
  - type: text
    content: rather than one who has a flattering tongue.
  '24':
  - type: text
    content: Whoever robs their father or mother
  - type: text
    content: and says, “It’s not wrong,”
  - type: text
    content: is partner to one who destroys.
  '25':
  - type: text
    content: The greedy stir up conflict,
  - type: text
    content: 'but those who trust in the '
  - type: text
    content: Lord
  - type: text
    content: ' will prosper.'
  '26':
  - type: text
    content: Those who trust in themselves are fools,
  - type: text
    content: but those who walk in wisdom are kept safe.
  '27':
  - type: text
    content: Those who give to the poor will lack nothing,
  - type: text
    content: but those who close their eyes to them receive many curses.
  '28':
  - type: text
    content: When the wicked rise to power, people go into hiding;
  - type: text
    content: but when the wicked perish, the righteous thrive.
  '3':
  - type: text
    content: A ruler
  - type: note
    content: Or A poor person
  - type: text
    content: ' who oppresses the poor'
  - type: text
    content: is like a driving rain that leaves no crops.
  '4':
  - type: text
    content: Those who forsake instruction praise the wicked,
  - type: text
    content: but those who heed it resist them.
  '5':
  - type: text
    content: Evildoers do not understand what is right,
  - type: text
    content: 'but those who seek the '
  - type: text
    content: Lord
  - type: text
    content: ' understand it fully.'
  '6':
  - type: text
    content: Better the poor whose walk is blameless
  - type: text
    content: than the rich whose ways are perverse.
  '7':
  - type: text
    content: A discerning son heeds instruction,
  - type: text
    content: but a companion of gluttons disgraces his father.
  '8':
  - type: text
    content: Whoever increases wealth by taking interest or profit from the poor
  - type: text
    content: amasses it for another, who will be kind to the poor.
  '9':
  - type: text
    content: If anyone turns a deaf ear to my instruction,
  - type: text
    content: even their prayers are detestable.
