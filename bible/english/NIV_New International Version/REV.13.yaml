document_id: REV.13,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Beast out of the Sea
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: The dragon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: And I
      marker-yv: yv-n
    - type: text
      text: ' stood on the shore of the sea. And I saw a beast coming out of the sea. It had ten horns and seven heads, with ten crowns on its horns, and on each head a blasphemous name. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “If anyone is to go into captivity,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into captivity they will go.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: If anyone is to be killed
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: anyone kills
      marker-yv: yv-n
    - type: text
      text: ' with the sword,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with the sword they will be killed.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jer. 15:2
      marker-yv: yv-n
  - type: usfm
    marker: m
    children:
    - type: text
      text: This calls for patient endurance and faithfulness on the part of God’s people.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Beast out of the Earth
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I saw a second beast, coming out of the earth. It had two horns like a lamb, but it spoke like a dragon. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It exercised all the authority of the first beast on its behalf, and made the earth and its inhabitants worship the first beast, whose fatal wound had been healed. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it performed great signs, even causing fire to come down from heaven to the earth in full view of the people. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because of the signs it was given power to perform on behalf of the first beast, it deceived the inhabitants of the earth. It ordered them to set up an image in honor of the beast who was wounded by the sword and yet lived. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The second beast was given power to give breath to the image of the first beast, so that the image could speak and cause all who refused to worship the image to be killed. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It also forced all people, great and small, rich and poor, free and slave, to receive a mark on their right hands or on their foreheads, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: so that they could not buy or sell unless they had the mark, which is the name of the beast or the number of its name.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This calls for wisdom. Let the person who has insight calculate the number of the beast, for it is the number of a man.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: is humanity’s number
      marker-yv: yv-n
    - type: text
      text: ' That number is 666.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The beast I saw resembled a leopard, but had feet like those of a bear and a mouth like that of a lion. The dragon gave the beast his power and his throne and great authority. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'One of the heads of the beast seemed to have had a fatal wound, but the fatal wound had been healed. The whole world was filled with wonder and followed the beast. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: People worshiped the dragon because he had given authority to the beast, and they also worshiped the beast and asked, “Who is like the beast? Who can wage war against it?”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The beast was given a mouth to utter proud words and blasphemies and to exercise its authority for forty-two months. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It opened its mouth to blaspheme God, and to slander his name and his dwelling place and those who live in heaven. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It was given power to wage war against God’s holy people and to conquer them. And it was given authority over every tribe, people, language and nation. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All inhabitants of the earth will worship the beast—all whose names have not been written in the Lamb’s book of life, the Lamb who was slain from the creation of the world.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: written from the creation of the world in the book of life belonging to the Lamb who was slain
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Whoever has ears, let them hear.
