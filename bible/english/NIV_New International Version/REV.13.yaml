document_id: REV.13,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Beast out of the Sea
  - type: text
    content: The dragon
  - type: note
    content: Some manuscripts And I
  - type: text
    content: ' stood on the shore of the sea. And I saw a beast coming out of the sea. It had ten horns and seven heads, with ten crowns on its horns, and on each head a blasphemous name. '
  '10':
  - type: text
    content: “If anyone is to go into captivity,
  - type: text
    content: into captivity they will go.
  - type: text
    content: If anyone is to be killed
  - type: note
    content: Some manuscripts anyone kills
  - type: text
    content: ' with the sword,'
  - type: text
    content: with the sword they will be killed.”
  - type: note
    content: Jer. 15:2
  - type: text
    content: This calls for patient endurance and faithfulness on the part of God’s people.
  - type: heading
    content: The Beast out of the Earth
  '11':
  - type: text
    content: 'Then I saw a second beast, coming out of the earth. It had two horns like a lamb, but it spoke like a dragon. '
  '12':
  - type: text
    content: 'It exercised all the authority of the first beast on its behalf, and made the earth and its inhabitants worship the first beast, whose fatal wound had been healed. '
  '13':
  - type: text
    content: 'And it performed great signs, even causing fire to come down from heaven to the earth in full view of the people. '
  '14':
  - type: text
    content: 'Because of the signs it was given power to perform on behalf of the first beast, it deceived the inhabitants of the earth. It ordered them to set up an image in honor of the beast who was wounded by the sword and yet lived. '
  '15':
  - type: text
    content: 'The second beast was given power to give breath to the image of the first beast, so that the image could speak and cause all who refused to worship the image to be killed. '
  '16':
  - type: text
    content: 'It also forced all people, great and small, rich and poor, free and slave, to receive a mark on their right hands or on their foreheads, '
  '17':
  - type: text
    content: so that they could not buy or sell unless they had the mark, which is the name of the beast or the number of its name.
  '18':
  - type: text
    content: This calls for wisdom. Let the person who has insight calculate the number of the beast, for it is the number of a man.
  - type: note
    content: Or is humanity’s number
  - type: text
    content: ' That number is 666.'
  '2':
  - type: text
    content: 'The beast I saw resembled a leopard, but had feet like those of a bear and a mouth like that of a lion. The dragon gave the beast his power and his throne and great authority. '
  '3':
  - type: text
    content: 'One of the heads of the beast seemed to have had a fatal wound, but the fatal wound had been healed. The whole world was filled with wonder and followed the beast. '
  '4':
  - type: text
    content: People worshiped the dragon because he had given authority to the beast, and they also worshiped the beast and asked, “Who is like the beast? Who can wage war against it?”
  '5':
  - type: text
    content: 'The beast was given a mouth to utter proud words and blasphemies and to exercise its authority for forty-two months. '
  '6':
  - type: text
    content: 'It opened its mouth to blaspheme God, and to slander his name and his dwelling place and those who live in heaven. '
  '7':
  - type: text
    content: 'It was given power to wage war against God’s holy people and to conquer them. And it was given authority over every tribe, people, language and nation. '
  '8':
  - type: text
    content: All inhabitants of the earth will worship the beast—all whose names have not been written in the Lamb’s book of life, the Lamb who was slain from the creation of the world.
  - type: note
    content: Or written from the creation of the world in the book of life belonging to the Lamb who was slain
  '9':
  - type: text
    content: Whoever has ears, let them hear.
