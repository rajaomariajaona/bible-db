document_id: JUD.INTRO1
type_code: eng
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: Intro
- type: usfm
  marker: im
  children:
  - type: text
    text: Jesus had several brothers, two of whom were James and Jude. Much less is known about Jude than James (see James), but he was clearly a church leader, since he wrote to believers with authority in this letter that bears his name. It cannot be determined exactly who was meant to receive the letter, although the references to angels, to Israel’s history and to specific writings indicate that Jewish Christians were in view.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Jude addresses the problem of false teachers who have come and are now threatening '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: the faith that was once for all entrusted to God’s holy people.
  - type: text
    text: ' On the basis of supposedly inspired dreams, they reject authority and pollute their own bodies. Even though they claim to be bringing God’s message, they really follow '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: mere natural instincts and do not have the Spirit.
  - type: text
    text: ' The believers must actively resist them and cleanse their community by rejecting both the teaching and the example of these ungodly men.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: It seems that the apostle Peter received a copy of Jude’s letter and wrote a similar one of his own to show that it faithfully presented the teaching of the apostles of the Lord Jesus Christ (see 2 Peter).
