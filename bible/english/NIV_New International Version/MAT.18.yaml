document_id: MAT.18,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Greatest in the Kingdom of Heaven
  - type: text
    content: At that time the disciples came to Jesus and asked, “Who, then, is the greatest in the kingdom of heaven?”
  '10':
  - type: text
    content: ' '
  - type: text
    content: “See that you do not despise one of these little ones. For I tell you that their angels in heaven always see the face of my Father in heaven.
  - type: text
    content: ' '
  '11':
  - type: note
    content: Some manuscripts include here the words of Luke 19:10.
  '12':
  - type: text
    content: ' '
  - type: text
    content: “What do you think? If a man owns a hundred sheep, and one of them wanders away, will he not leave the ninety-nine on the hills and go to look for the one that wandered off?
  - type: text
    content: ' '
  '13':
  - type: text
    content: And if he finds it, truly I tell you, he is happier about that one sheep than about the ninety-nine that did not wander off.
  - type: text
    content: ' '
  '14':
  - type: text
    content: In the same way your Father in heaven is not willing that any of these little ones should perish.
  - type: heading
    content: Dealing With Sin in the Church
  '15':
  - type: text
    content: ' '
  - type: text
    content: “If your brother or sister
  - type: text
    content: ' '
  - type: note
    content: The Greek word for brother or sister (adelphos) refers here to a fellow disciple, whether man or woman; also in verses 21 and 35.
  - type: text
    content: sins,
  - type: note
    content: Some manuscripts sins against you
  - type: text
    content: ' '
  - type: text
    content: go and point out their fault, just between the two of you. If they listen to you, you have won them over.
  - type: text
    content: ' '
  '16':
  - type: text
    content: But if they will not listen, take one or two others along, so that ‘every matter may be established by the testimony of two or three witnesses.’
  - type: note
    content: Deut. 19:15
  - type: text
    content: ' '
  '17':
  - type: text
    content: If they still refuse to listen, tell it to the church; and if they refuse to listen even to the church, treat them as you would a pagan or a tax collector.
  '18':
  - type: text
    content: ' '
  - type: text
    content: “Truly I tell you, whatever you bind on earth will be
  - type: text
    content: ' '
  - type: note
    content: Or will have been
  - type: text
    content: bound in heaven, and whatever you loose on earth will be
  - type: note
    content: Or will have been
  - type: text
    content: ' '
  - type: text
    content: loosed in heaven.
  '19':
  - type: text
    content: ' '
  - type: text
    content: “Again, truly I tell you that if two of you on earth agree about anything they ask for, it will be done for them by my Father in heaven.
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'He called a little child to him, and placed the child among them. '
  '20':
  - type: text
    content: For where two or three gather in my name, there am I with them.”
  - type: heading
    content: The Parable of the Unmerciful Servant
  '21':
  - type: text
    content: Then Peter came to Jesus and asked, “Lord, how many times shall I forgive my brother or sister who sins against me? Up to seven times?”
  '22':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “I tell you, not seven times, but seventy-seven times.
  - type: note
    content: Or seventy times seven
  '23':
  - type: text
    content: ' '
  - type: text
    content: “Therefore, the kingdom of heaven is like a king who wanted to settle accounts with his servants.
  - type: text
    content: ' '
  '24':
  - type: text
    content: As he began the settlement, a man who owed him ten thousand bags of gold
  - type: note
    content: Greek ten thousand talents; a talent was worth about 20 years of a day laborer’s wages.
  - type: text
    content: ' '
  - type: text
    content: was brought to him.
  - type: text
    content: ' '
  '25':
  - type: text
    content: Since he was not able to pay, the master ordered that he and his wife and his children and all that he had be sold to repay the debt.
  '26':
  - type: text
    content: ' '
  - type: text
    content: “At this the servant fell on his knees before him. ‘Be patient with me,’ he begged, ‘and I will pay back everything.’
  - type: text
    content: ' '
  '27':
  - type: text
    content: The servant’s master took pity on him, canceled the debt and let him go.
  '28':
  - type: text
    content: ' '
  - type: text
    content: “But when that servant went out, he found one of his fellow servants who owed him a hundred silver coins.
  - type: text
    content: ' '
  - type: note
    content: Greek a hundred denarii ; a denarius was the usual daily wage of a day laborer (see 20:2).
  - type: text
    content: He grabbed him and began to choke him. ‘Pay back what you owe me!’ he demanded.
  '29':
  - type: text
    content: ' '
  - type: text
    content: “His fellow servant fell to his knees and begged him, ‘Be patient with me, and I will pay it back.’
  '3':
  - type: text
    content: 'And he said: '
  - type: text
    content: “Truly I tell you, unless you change and become like little children, you will never enter the kingdom of heaven.
  - type: text
    content: ' '
  '30':
  - type: text
    content: ' '
  - type: text
    content: “But he refused. Instead, he went off and had the man thrown into prison until he could pay the debt.
  - type: text
    content: ' '
  '31':
  - type: text
    content: When the other servants saw what had happened, they were outraged and went and told their master everything that had happened.
  '32':
  - type: text
    content: ' '
  - type: text
    content: “Then the master called the servant in. ‘You wicked servant,’ he said, ‘I canceled all that debt of yours because you begged me to.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Shouldn’t you have had mercy on your fellow servant just as I had on you?’
  - type: text
    content: ' '
  '34':
  - type: text
    content: In anger his master handed him over to the jailers to be tortured, until he should pay back all he owed.
  '35':
  - type: text
    content: ' '
  - type: text
    content: “This is how my heavenly Father will treat each of you unless you forgive your brother or sister from your heart.”
  '4':
  - type: text
    content: Therefore, whoever takes the lowly position of this child is the greatest in the kingdom of heaven.
  - type: text
    content: ' '
  '5':
  - type: text
    content: And whoever welcomes one such child in my name welcomes me.
  - type: heading
    content: Causing to Stumble
  '6':
  - type: text
    content: ' '
  - type: text
    content: “If anyone causes one of these little ones—those who believe in me—to stumble, it would be better for them to have a large millstone hung around their neck and to be drowned in the depths of the sea.
  - type: text
    content: ' '
  '7':
  - type: text
    content: Woe to the world because of the things that cause people to stumble! Such things must come, but woe to the person through whom they come!
  - type: text
    content: ' '
  '8':
  - type: text
    content: If your hand or your foot causes you to stumble, cut it off and throw it away. It is better for you to enter life maimed or crippled than to have two hands or two feet and be thrown into eternal fire.
  - type: text
    content: ' '
  '9':
  - type: text
    content: And if your eye causes you to stumble, gouge it out and throw it away. It is better for you to enter life with one eye than to have two eyes and be thrown into the fire of hell.
  - type: heading
    content: The Parable of the Wandering Sheep
