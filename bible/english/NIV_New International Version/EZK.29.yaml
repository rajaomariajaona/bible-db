document_id: EZK.29,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Prophecy Against Egypt
  - type: heading
    content: Judgment on Pharaoh
  - type: text
    content: 'In the tenth year, in the tenth month on the twelfth day, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: therefore I am against you and against your streams, and I will make the land of Egypt a ruin and a desolate waste from Migdol to Aswan, as far as the border of Cush.
  - type: note
    content: That is, the upper Nile region
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'The foot of neither man nor beast will pass through it; no one will live there for forty years. '
  '12':
  - type: text
    content: I will make the land of Egypt desolate among devastated lands, and her cities will lie desolate forty years among ruined cities. And I will disperse the Egyptians among the nations and scatter them through the countries.
  '13':
  - type: text
    content: '“ ‘Yet this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: At the end of forty years I will gather the Egyptians from the nations where they were scattered. '
  '14':
  - type: text
    content: 'I will bring them back from captivity and return them to Upper Egypt, the land of their ancestry. There they will be a lowly kingdom. '
  '15':
  - type: text
    content: 'It will be the lowliest of kingdoms and will never again exalt itself above the other nations. I will make it so weak that it will never again rule over the nations. '
  '16':
  - type: text
    content: 'Egypt will no longer be a source of confidence for the people of Israel but will be a reminder of their sin in turning to her for help. Then they will know that I am the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .’ ”
  - type: heading
    content: Nebuchadnezzar’s Reward
  '17':
  - type: text
    content: 'In the twenty-seventh year, in the first month on the first day, the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '18':
  - type: text
    content: '“Son of man, Nebuchadnezzar king of Babylon drove his army in a hard campaign against Tyre; every head was rubbed bare and every shoulder made raw. Yet he and his army got no reward from the campaign he led against Tyre. '
  '19':
  - type: text
    content: 'Therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am going to give Egypt to Nebuchadnezzar king of Babylon, and he will carry off its wealth. He will loot and plunder the land as pay for his army. '
  '2':
  - type: text
    content: '“Son of man, set your face against Pharaoh king of Egypt and prophesy against him and against all Egypt. '
  '20':
  - type: text
    content: 'I have given him Egypt as a reward for his efforts because he and his army did it for me, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  '21':
  - type: text
    content: “On that day I will make a horn
  - type: note
    content: Horn here symbolizes strength.
  - type: text
    content: ' grow for the Israelites, and I will open your mouth among them. Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '3':
  - type: text
    content: 'Speak to him and say: ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “ ‘I am against you, Pharaoh king of Egypt,
  - type: text
    content: you great monster lying among your streams.
  - type: text
    content: You say, “The Nile belongs to me;
  - type: text
    content: I made it for myself.”
  '4':
  - type: text
    content: But I will put hooks in your jaws
  - type: text
    content: and make the fish of your streams stick to your scales.
  - type: text
    content: I will pull you out from among your streams,
  - type: text
    content: with all the fish sticking to your scales.
  '5':
  - type: text
    content: I will leave you in the desert,
  - type: text
    content: you and all the fish of your streams.
  - type: text
    content: You will fall on the open field
  - type: text
    content: and not be gathered or picked up.
  - type: text
    content: I will give you as food
  - type: text
    content: to the beasts of the earth and the birds of the sky.
  '6':
  - type: text
    content: 'Then all who live in Egypt will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: '“ ‘You have been a staff of reed for the people of Israel. '
  '7':
  - type: text
    content: When they grasped you with their hands, you splintered and you tore open their shoulders; when they leaned on you, you broke and their backs were wrenched.
  - type: note
    content: Syriac (see also Septuagint and Vulgate); Hebrew and you caused their backs to stand
  '8':
  - type: text
    content: '“ ‘Therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I will bring a sword against you and kill both man and beast. '
  '9':
  - type: text
    content: 'Egypt will become a desolate wasteland. Then they will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: '“ ‘Because you said, “The Nile is mine; I made it,” '
