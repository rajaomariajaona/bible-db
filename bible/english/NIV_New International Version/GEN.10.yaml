verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Table of Nations
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: This is the account of Shem, Ham and Japheth, Noah’s sons, who themselves had sons after the flood.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Japhethites
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
