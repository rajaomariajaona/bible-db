    marker: li2
    children:
    - type: text
      text: Gomer, Magog, Madai, Javan, Tubal, Meshek and Tiras.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These are the sons of Ham by their clans and languages, in their territories and nations.
  - type: usfm
    marker: s2
    children:
    - type: text
      text: The Semites
    marker-yv: yv-h
  '21':
  - type: usfm
