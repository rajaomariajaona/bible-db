      text: The first centers of his kingdom were Babylon, Uruk, Akkad and Kalneh, in
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Uruk and Akkad—all of them in
      marker-yv: yv-n
    - type: text
      text: ' Shinar.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, Babylonia
      marker-yv: yv-n
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: From that land he went to Assyria, where he built Nineveh, Rehoboth Ir,
