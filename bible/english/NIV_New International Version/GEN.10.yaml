          text: Nineveh with its city squares
      marker-yv: yv-n
    - type: text
      text: ' Calah '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: and Resen, which is between Nineveh and Calah—which is the great city.
  '13':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: Egypt was the father of
  - type: usfm
    marker: li2
    children:
