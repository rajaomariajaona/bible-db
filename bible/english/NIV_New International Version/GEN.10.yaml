document_id: GEN.10,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Table of Nations
  - type: text
    content: This is the account of Shem, Ham and Japheth, Noah’s sons, who themselves had sons after the flood.
  - type: heading
    content: The Japhethites
  '10':
  - type: text
    content: The first centers of his kingdom were Babylon, Uruk, Akkad and Kalneh, in
  - type: note
    content: Or Uruk and Akkad—all of them in
  - type: text
    content: ' Shinar.'
  - type: note
    content: That is, Babylonia
  - type: text
    content: ' '
  '11':
  - type: text
    content: From that land he went to Assyria, where he built Nineveh, Rehoboth Ir,
  - type: note
    content: Or Nineveh with its city squares
  - type: text
    content: ' Calah '
  '12':
  - type: text
    content: and Resen, which is between Nineveh and Calah—which is the great city.
  '13':
  - type: text
    content: Egypt was the father of
  - type: text
    content: 'the Ludites, Anamites, Lehabites, Naphtuhites, '
  '14':
  - type: text
    content: Pathrusites, Kasluhites (from whom the Philistines came) and Caphtorites.
  '15':
  - type: text
    content: Canaan was the father of
  - type: text
    content: Sidon his firstborn,
  - type: note
    content: Or of the Sidonians, the foremost
  - type: text
    content: ' and of the Hittites, '
  '16':
  - type: text
    content: 'Jebusites, Amorites, Girgashites, '
  '17':
  - type: text
    content: 'Hivites, Arkites, Sinites, '
  '18':
  - type: text
    content: Arvadites, Zemarites and Hamathites.
  - type: text
    content: 'Later the Canaanite clans scattered '
  '19':
  - type: text
    content: and the borders of Canaan reached from Sidon toward Gerar as far as Gaza, and then toward Sodom, Gomorrah, Admah and Zeboyim, as far as Lasha.
  '2':
  - type: text
    content: The sons
  - type: note
    content: Sons may mean descendants or successors or nations; also in verses 3, 4, 6, 7, 20-23, 29 and 31.
  - type: text
    content: ' of Japheth:'
  - type: text
    content: Gomer, Magog, Madai, Javan, Tubal, Meshek and Tiras.
  '20':
  - type: text
    content: These are the sons of Ham by their clans and languages, in their territories and nations.
  - type: heading
    content: The Semites
  '21':
  - type: text
    content: Sons were also born to Shem, whose older brother was
  - type: note
    content: Or Shem, the older brother of
  - type: text
    content: ' Japheth; Shem was the ancestor of all the sons of Eber.'
  '22':
  - type: text
    content: 'The sons of Shem:'
  - type: text
    content: Elam, Ashur, Arphaxad, Lud and Aram.
  '23':
  - type: text
    content: 'The sons of Aram:'
  - type: text
    content: Uz, Hul, Gether and Meshek.
  - type: note
    content: See Septuagint and 1 Chron. 1:17; Hebrew Mash.
  '24':
  - type: text
    content: Arphaxad was the father of
  - type: note
    content: Hebrew; Septuagint father of Cainan, and Cainan was the father of
  - type: text
    content: ' Shelah,'
  - type: text
    content: and Shelah the father of Eber.
  '25':
  - type: text
    content: 'Two sons were born to Eber:'
  - type: text
    content: One was named Peleg,
  - type: note
    content: Peleg means division.
  - type: text
    content: ' because in his time the earth was divided; his brother was named Joktan.'
  '26':
  - type: text
    content: Joktan was the father of
  - type: text
    content: 'Almodad, Sheleph, Hazarmaveth, Jerah, '
  '27':
  - type: text
    content: 'Hadoram, Uzal, Diklah, '
  '28':
  - type: text
    content: 'Obal, Abimael, Sheba, '
  '29':
  - type: text
    content: Ophir, Havilah and Jobab. All these were sons of Joktan.
  '3':
  - type: text
    content: 'The sons of Gomer:'
  - type: text
    content: Ashkenaz, Riphath and Togarmah.
  '30':
  - type: text
    content: The region where they lived stretched from Mesha toward Sephar, in the eastern hill country.
  '31':
  - type: text
    content: These are the sons of Shem by their clans and languages, in their territories and nations.
  '32':
  - type: text
    content: These are the clans of Noah’s sons, according to their lines of descent, within their nations. From these the nations spread out over the earth after the flood.
  '4':
  - type: text
    content: 'The sons of Javan:'
  - type: text
    content: Elishah, Tarshish, the Kittites and the Rodanites.
  - type: note
    content: Some manuscripts of the Masoretic Text and Samaritan Pentateuch (see also Septuagint and 1 Chron. 1:7); most manuscripts of the Masoretic Text Dodanites
  - type: text
    content: ' '
  '5':
  - type: text
    content: (From these the maritime peoples spread out into their territories by their clans within their nations, each with its own language.)
  - type: heading
    content: The Hamites
  '6':
  - type: text
    content: 'The sons of Ham:'
  - type: text
    content: Cush, Egypt, Put and Canaan.
  '7':
  - type: text
    content: 'The sons of Cush:'
  - type: text
    content: Seba, Havilah, Sabtah, Raamah and Sabteka.
  - type: text
    content: 'The sons of Raamah:'
  - type: text
    content: Sheba and Dedan.
  '8':
  - type: text
    content: Cush was the father
  - type: note
    content: Father may mean ancestor or predecessor or founder; also in verses 13, 15, 24 and 26.
  - type: text
    content: ' of Nimrod, who became a mighty warrior on the earth. '
  '9':
  - type: text
    content: 'He was a mighty hunter before the '
  - type: text
    content: Lord
  - type: text
    content: '; that is why it is said, “Like Nimrod, a mighty hunter before the '
  - type: text
    content: Lord
  - type: text
    content: '.” '
