    children:
    - type: text
      text: 'Obal, Abimael, Sheba, '
  '29':
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ophir, Havilah and Jobab. All these were sons of Joktan.
  '3':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Gomer:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Ashkenaz, Riphath and Togarmah.
  '30':
  - type: usfm
    marker: m
    children:
    - type: text
      text: The region where they lived stretched from Mesha toward Sephar, in the eastern hill country.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These are the sons of Shem by their clans and languages, in their territories and nations.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These are the clans of Noah’s sons, according to their lines of descent, within their nations. From these the nations spread out over the earth after the flood.
  '4':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: 'The sons of Javan:'
  - type: usfm
    marker: li2
    children:
    - type: text
      text: Elishah, Tarshish, the Kittites and the Rodanites.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
