document_id: NUM.11,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Fire From the Lord
  - type: text
    content: 'Now the people complained about their hardships in the hearing of the '
  - type: text
    content: Lord
  - type: text
    content: ', and when he heard them his anger was aroused. Then fire from the '
  - type: text
    content: Lord
  - type: text
    content: ' burned among them and consumed some of the outskirts of the camp. '
  '10':
  - type: text
    content: 'Moses heard the people of every family wailing at the entrance to their tents. The '
  - type: text
    content: Lord
  - type: text
    content: ' became exceedingly angry, and Moses was troubled. '
  '11':
  - type: text
    content: 'He asked the '
  - type: text
    content: Lord
  - type: text
    content: ', “Why have you brought this trouble on your servant? What have I done to displease you that you put the burden of all these people on me? '
  '12':
  - type: text
    content: 'Did I conceive all these people? Did I give them birth? Why do you tell me to carry them in my arms, as a nurse carries an infant, to the land you promised on oath to their ancestors? '
  '13':
  - type: text
    content: 'Where can I get meat for all these people? They keep wailing to me, ‘Give us meat to eat!’ '
  '14':
  - type: text
    content: 'I cannot carry all these people by myself; the burden is too heavy for me. '
  '15':
  - type: text
    content: If this is how you are going to treat me, please go ahead and kill me—if I have found favor in your eyes—and do not let me face my own ruin.”
  '16':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses: “Bring me seventy of Israel’s elders who are known to you as leaders and officials among the people. Have them come to the tent of meeting, that they may stand there with you. '
  '17':
  - type: text
    content: I will come down and speak with you there, and I will take some of the power of the Spirit that is on you and put it on them. They will share the burden of the people with you so that you will not have to carry it alone.
  '18':
  - type: text
    content: '“Tell the people: ‘Consecrate yourselves in preparation for tomorrow, when you will eat meat. The '
  - type: text
    content: Lord
  - type: text
    content: ' heard you when you wailed, “If only we had meat to eat! We were better off in Egypt!” Now the '
  - type: text
    content: Lord
  - type: text
    content: ' will give you meat, and you will eat it. '
  '19':
  - type: text
    content: 'You will not eat it for just one day, or two days, or five, ten or twenty days, '
  '2':
  - type: text
    content: 'When the people cried out to Moses, he prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ' and the fire died down. '
  '20':
  - type: text
    content: 'but for a whole month—until it comes out of your nostrils and you loathe it—because you have rejected the '
  - type: text
    content: Lord
  - type: text
    content: ', who is among you, and have wailed before him, saying, “Why did we ever leave Egypt?” ’ ”'
  '21':
  - type: text
    content: 'But Moses said, “Here I am among six hundred thousand men on foot, and you say, ‘I will give them meat to eat for a whole month!’ '
  '22':
  - type: text
    content: Would they have enough if flocks and herds were slaughtered for them? Would they have enough if all the fish in the sea were caught for them?”
  '23':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' answered Moses, “Is the '
  - type: text
    content: Lord
  - type: text
    content: ’s arm too short? Now you will see whether or not what I say will come true for you.”
  '24':
  - type: text
    content: 'So Moses went out and told the people what the '
  - type: text
    content: Lord
  - type: text
    content: ' had said. He brought together seventy of their elders and had them stand around the tent. '
  '25':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' came down in the cloud and spoke with him, and he took some of the power of the Spirit that was on him and put it on the seventy elders. When the Spirit rested on them, they prophesied—but did not do so again.'
  '26':
  - type: text
    content: 'However, two men, whose names were Eldad and Medad, had remained in the camp. They were listed among the elders, but did not go out to the tent. Yet the Spirit also rested on them, and they prophesied in the camp. '
  '27':
  - type: text
    content: A young man ran and told Moses, “Eldad and Medad are prophesying in the camp.”
  '28':
  - type: text
    content: Joshua son of Nun, who had been Moses’ aide since youth, spoke up and said, “Moses, my lord, stop them!”
  '29':
  - type: text
    content: 'But Moses replied, “Are you jealous for my sake? I wish that all the '
  - type: text
    content: Lord
  - type: text
    content: '’s people were prophets and that the '
  - type: text
    content: Lord
  - type: text
    content: ' would put his Spirit on them!” '
  '3':
  - type: text
    content: So that place was called Taberah,
  - type: note
    content: Taberah means burning.
  - type: text
    content: ' because fire from the '
  - type: text
    content: Lord
  - type: text
    content: ' had burned among them.'
  - type: heading
    content: Quail From the Lord
  '30':
  - type: text
    content: Then Moses and the elders of Israel returned to the camp.
  '31':
  - type: text
    content: 'Now a wind went out from the '
  - type: text
    content: Lord
  - type: text
    content: ' and drove quail in from the sea. It scattered them up to two cubits'
  - type: note
    content: That is, about 3 feet or about 90 centimeters
  - type: text
    content: ' deep all around the camp, as far as a day’s walk in any direction. '
  '32':
  - type: text
    content: All that day and night and all the next day the people went out and gathered quail. No one gathered less than ten homers.
  - type: note
    content: That is, possibly about 1 3/4 tons or about 1.6 metric tons
  - type: text
    content: ' Then they spread them out all around the camp. '
  '33':
  - type: text
    content: 'But while the meat was still between their teeth and before it could be consumed, the anger of the '
  - type: text
    content: Lord
  - type: text
    content: ' burned against the people, and he struck them with a severe plague. '
  '34':
  - type: text
    content: Therefore the place was named Kibroth Hattaavah,
  - type: note
    content: Kibroth Hattaavah means graves of craving.
  - type: text
    content: ' because there they buried the people who had craved other food.'
  '35':
  - type: text
    content: From Kibroth Hattaavah the people traveled to Hazeroth and stayed there.
  '4':
  - type: text
    content: 'The rabble with them began to crave other food, and again the Israelites started wailing and said, “If only we had meat to eat! '
  '5':
  - type: text
    content: 'We remember the fish we ate in Egypt at no cost—also the cucumbers, melons, leeks, onions and garlic. '
  '6':
  - type: text
    content: But now we have lost our appetite; we never see anything but this manna!”
  '7':
  - type: text
    content: 'The manna was like coriander seed and looked like resin. '
  '8':
  - type: text
    content: 'The people went around gathering it, and then ground it in a hand mill or crushed it in a mortar. They cooked it in a pot or made it into loaves. And it tasted like something made with olive oil. '
  '9':
  - type: text
    content: When the dew settled on the camp at night, the manna also came down.
