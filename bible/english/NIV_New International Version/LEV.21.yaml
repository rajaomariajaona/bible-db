document_id: LEV.21,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Rules for Priests
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Speak to the priests, the sons of Aaron, and say to them: ‘A priest must not make himself ceremonially unclean for any of his people who die, '
  '10':
  - type: text
    content: “ ‘The high priest, the one among his brothers who has had the anointing oil poured on his head and who has been ordained to wear the priestly garments, must not let his hair become unkempt
  - type: note
    content: Or not uncover his head
  - type: text
    content: ' or tear his clothes. '
  '11':
  - type: text
    content: 'He must not enter a place where there is a dead body. He must not make himself unclean, even for his father or mother, '
  '12':
  - type: text
    content: 'nor leave the sanctuary of his God or desecrate it, because he has been dedicated by the anointing oil of his God. I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '13':
  - type: text
    content: '“ ‘The woman he marries must be a virgin. '
  '14':
  - type: text
    content: 'He must not marry a widow, a divorced woman, or a woman defiled by prostitution, but only a virgin from his own people, '
  '15':
  - type: text
    content: 'so that he will not defile his offspring among his people. I am the '
  - type: text
    content: Lord
  - type: text
    content: ', who makes him holy.’ ”'
  '16':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '17':
  - type: text
    content: '“Say to Aaron: ‘For the generations to come none of your descendants who has a defect may come near to offer the food of his God. '
  '18':
  - type: text
    content: 'No man who has any defect may come near: no man who is blind or lame, disfigured or deformed; '
  '19':
  - type: text
    content: 'no man with a crippled foot or hand, '
  '2':
  - type: text
    content: 'except for a close relative, such as his mother or father, his son or daughter, his brother, '
  '20':
  - type: text
    content: 'or who is a hunchback or a dwarf, or who has any eye defect, or who has festering or running sores or damaged testicles. '
  '21':
  - type: text
    content: 'No descendant of Aaron the priest who has any defect is to come near to present the food offerings to the '
  - type: text
    content: Lord
  - type: text
    content: '. He has a defect; he must not come near to offer the food of his God. '
  '22':
  - type: text
    content: 'He may eat the most holy food of his God, as well as the holy food; '
  '23':
  - type: text
    content: 'yet because of his defect, he must not go near the curtain or approach the altar, and so desecrate my sanctuary. I am the '
  - type: text
    content: Lord
  - type: text
    content: ', who makes them holy.’ ”'
  '24':
  - type: text
    content: So Moses told this to Aaron and his sons and to all the Israelites.
  '3':
  - type: text
    content: 'or an unmarried sister who is dependent on him since she has no husband—for her he may make himself unclean. '
  '4':
  - type: text
    content: He must not make himself unclean for people related to him by marriage,
  - type: note
    content: Or unclean as a leader among his people
  - type: text
    content: ' and so defile himself.'
  '5':
  - type: text
    content: '“ ‘Priests must not shave their heads or shave off the edges of their beards or cut their bodies. '
  '6':
  - type: text
    content: 'They must be holy to their God and must not profane the name of their God. Because they present the food offerings to the '
  - type: text
    content: Lord
  - type: text
    content: ', the food of their God, they are to be holy.'
  '7':
  - type: text
    content: '“ ‘They must not marry women defiled by prostitution or divorced from their husbands, because priests are holy to their God. '
  '8':
  - type: text
    content: 'Regard them as holy, because they offer up the food of your God. Consider them holy, because I the '
  - type: text
    content: Lord
  - type: text
    content: ' am holy—I who make you holy.'
  '9':
  - type: text
    content: “ ‘If a priest’s daughter defiles herself by becoming a prostitute, she disgraces her father; she must be burned in the fire.
