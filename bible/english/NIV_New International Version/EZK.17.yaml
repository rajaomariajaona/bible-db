document_id: EZK.17,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Two Eagles and a Vine
  - type: text
    content: 'The word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '10':
  - type: text
    content: It has been planted, but will it thrive? Will it not wither completely when the east wind strikes it—wither away in the plot where it grew?’ ”
  '11':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to me: '
  '12':
  - type: text
    content: '“Say to this rebellious people, ‘Do you not know what these things mean?’ Say to them: ‘The king of Babylon went to Jerusalem and carried off her king and her nobles, bringing them back with him to Babylon. '
  '13':
  - type: text
    content: 'Then he took a member of the royal family and made a treaty with him, putting him under oath. He also carried away the leading men of the land, '
  '14':
  - type: text
    content: 'so that the kingdom would be brought low, unable to rise again, surviving only by keeping his treaty. '
  '15':
  - type: text
    content: But the king rebelled against him by sending his envoys to Egypt to get horses and a large army. Will he succeed? Will he who does such things escape? Will he break the treaty and yet escape?
  '16':
  - type: text
    content: '“ ‘As surely as I live, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', he shall die in Babylon, in the land of the king who put him on the throne, whose oath he despised and whose treaty he broke. '
  '17':
  - type: text
    content: 'Pharaoh with his mighty army and great horde will be of no help to him in war, when ramps are built and siege works erected to destroy many lives. '
  '18':
  - type: text
    content: He despised the oath by breaking the covenant. Because he had given his hand in pledge and yet did all these things, he shall not escape.
  '19':
  - type: text
    content: '“ ‘Therefore this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: As surely as I live, I will repay him for despising my oath and breaking my covenant. '
  '2':
  - type: text
    content: '“Son of man, set forth an allegory and tell it to the Israelites as a parable. '
  '20':
  - type: text
    content: 'I will spread my net for him, and he will be caught in my snare. I will bring him to Babylon and execute judgment on him there because he was unfaithful to me. '
  '21':
  - type: text
    content: 'All his choice troops will fall by the sword, and the survivors will be scattered to the winds. Then you will know that I the '
  - type: text
    content: Lord
  - type: text
    content: ' have spoken.'
  '22':
  - type: text
    content: '“ ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: I myself will take a shoot from the very top of a cedar and plant it; I will break off a tender sprig from its topmost shoots and plant it on a high and lofty mountain. '
  '23':
  - type: text
    content: 'On the mountain heights of Israel I will plant it; it will produce branches and bear fruit and become a splendid cedar. Birds of every kind will nest in it; they will find shelter in the shade of its branches. '
  '24':
  - type: text
    content: 'All the trees of the forest will know that I the '
  - type: text
    content: Lord
  - type: text
    content: ' bring down the tall tree and make the low tree grow tall. I dry up the green tree and make the dry tree flourish.'
  - type: text
    content: '“ ‘I the '
  - type: text
    content: Lord
  - type: text
    content: ' have spoken, and I will do it.’ ”'
  '3':
  - type: text
    content: 'Say to them, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: A great eagle with powerful wings, long feathers and full plumage of varied colors came to Lebanon. Taking hold of the top of a cedar, '
  '4':
  - type: text
    content: he broke off its topmost shoot and carried it away to a land of merchants, where he planted it in a city of traders.
  '5':
  - type: text
    content: '“ ‘He took one of the seedlings of the land and put it in fertile soil. He planted it like a willow by abundant water, '
  '6':
  - type: text
    content: and it sprouted and became a low, spreading vine. Its branches turned toward him, but its roots remained under it. So it became a vine and produced branches and put out leafy boughs.
  '7':
  - type: text
    content: '“ ‘But there was another great eagle with powerful wings and full plumage. The vine now sent out its roots toward him from the plot where it was planted and stretched out its branches to him for water. '
  '8':
  - type: text
    content: It had been planted in good soil by abundant water so that it would produce branches, bear fruit and become a splendid vine.’
  '9':
  - type: text
    content: '“Say to them, ‘This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: Will it thrive? Will it not be uprooted and stripped of its fruit so that it withers? All its new growth will wither. It will not take a strong arm or many people to pull it up by the roots. '
