document_id: EXO.17,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Water From the Rock
  - type: text
    content: 'The whole Israelite community set out from the Desert of Sin, traveling from place to place as the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded. They camped at Rephidim, but there was no water for the people to drink. '
  '10':
  - type: text
    content: 'So Joshua fought the Amalekites as Moses had ordered, and Moses, Aaron and Hur went to the top of the hill. '
  '11':
  - type: text
    content: 'As long as Moses held up his hands, the Israelites were winning, but whenever he lowered his hands, the Amalekites were winning. '
  '12':
  - type: text
    content: 'When Moses’ hands grew tired, they took a stone and put it under him and he sat on it. Aaron and Hur held his hands up—one on one side, one on the other—so that his hands remained steady till sunset. '
  '13':
  - type: text
    content: So Joshua overcame the Amalekite army with the sword.
  '14':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Write this on a scroll as something to be remembered and make sure that Joshua hears it, because I will completely blot out the name of Amalek from under heaven.”'
  '15':
  - type: text
    content: 'Moses built an altar and called it The '
  - type: text
    content: Lord
  - type: text
    content: ' is my Banner. '
  '16':
  - type: text
    content: He said, “Because hands were lifted up against
  - type: note
    content: Or to
  - type: text
    content: ' the throne of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: note
    content: The meaning of the Hebrew for this clause is uncertain.
  - type: text
    content: ' the '
  - type: text
    content: Lord
  - type: text
    content: ' will be at war against the Amalekites from generation to generation.”'
  '2':
  - type: text
    content: So they quarreled with Moses and said, “Give us water to drink.”
  - type: text
    content: 'Moses replied, “Why do you quarrel with me? Why do you put the '
  - type: text
    content: Lord
  - type: text
    content: ' to the test?”'
  '3':
  - type: text
    content: But the people were thirsty for water there, and they grumbled against Moses. They said, “Why did you bring us up out of Egypt to make us and our children and livestock die of thirst?”
  '4':
  - type: text
    content: 'Then Moses cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', “What am I to do with these people? They are almost ready to stone me.”'
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' answered Moses, “Go out in front of the people. Take with you some of the elders of Israel and take in your hand the staff with which you struck the Nile, and go. '
  '6':
  - type: text
    content: 'I will stand there before you by the rock at Horeb. Strike the rock, and water will come out of it for the people to drink.” So Moses did this in the sight of the elders of Israel. '
  '7':
  - type: text
    content: And he called the place Massah
  - type: note
    content: Massah means testing.
  - type: text
    content: ' and Meribah'
  - type: note
    content: Meribah means quarreling.
  - type: text
    content: ' because the Israelites quarreled and because they tested the '
  - type: text
    content: Lord
  - type: text
    content: ' saying, “Is the '
  - type: text
    content: Lord
  - type: text
    content: ' among us or not?”'
  - type: heading
    content: The Amalekites Defeated
  '8':
  - type: text
    content: 'The Amalekites came and attacked the Israelites at Rephidim. '
  '9':
  - type: text
    content: Moses said to Joshua, “Choose some of our men and go out to fight the Amalekites. Tomorrow I will stand on top of the hill with the staff of God in my hands.”
