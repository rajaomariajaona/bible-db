  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Water From the Rock
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The whole Israelite community set out from the Desert of Sin, traveling from place to place as the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' commanded. They camped at Rephidim, but there was no water for the people to drink. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Joshua fought the Amalekites as Moses had ordered, and Moses, Aaron and Hur went to the top of the hill. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As long as Moses held up his hands, the Israelites were winning, but whenever he lowered his hands, the Amalekites were winning. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Moses’ hands grew tired, they took a stone and put it under him and he sat on it. Aaron and Hur held his hands up—one on one side, one on the other—so that his hands remained steady till sunset. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So Joshua overcame the Amalekite army with the sword.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, “Write this on a scroll as something to be remembered and make sure that Joshua hears it, because I will completely blot out the name of Amalek from under heaven.”'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses built an altar and called it The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is my Banner. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He said, “Because hands were lifted up against
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to
      marker-yv: yv-n
    - type: text
      text: ' the throne of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this clause is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will be at war against the Amalekites from generation to generation.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So they quarreled with Moses and said, “Give us water to drink.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moses replied, “Why do you quarrel with me? Why do you put the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' to the test?”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But the people were thirsty for water there, and they grumbled against Moses. They said, “Why did you bring us up out of Egypt to make us and our children and livestock die of thirst?”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses cried out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “What am I to do with these people? They are almost ready to stone me.”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' answered Moses, “Go out in front of the people. Take with you some of the elders of Israel and take in your hand the staff with which you struck the Nile, and go. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I will stand there before you by the rock at Horeb. Strike the rock, and water will come out of it for the people to drink.” So Moses did this in the sight of the elders of Israel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And he called the place Massah
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Massah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: testing.
      marker-yv: yv-n
    - type: text
      text: ' and Meribah'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17:7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Meribah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quarreling.
      marker-yv: yv-n
    - type: text
      text: ' because the Israelites quarreled and because they tested the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' saying, “Is the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' among us or not?”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Amalekites Defeated
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The Amalekites came and attacked the Israelites at Rephidim. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moses said to Joshua, “Choose some of our men and go out to fight the Amalekites. Tomorrow I will stand on top of the hill with the staff of God in my hands.”
