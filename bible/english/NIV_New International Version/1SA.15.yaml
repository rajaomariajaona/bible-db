document_id: 1SA.15,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Lord Rejects Saul as King
  - type: text
    content: 'Samuel said to Saul, “I am the one the '
  - type: text
    content: Lord
  - type: text
    content: ' sent to anoint you king over his people Israel; so listen now to the message from the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '10':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Samuel: '
  '11':
  - type: text
    content: '“I regret that I have made Saul king, because he has turned away from me and has not carried out my instructions.” Samuel was angry, and he cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ' all that night.'
  '12':
  - type: text
    content: Early in the morning Samuel got up and went to meet Saul, but he was told, “Saul has gone to Carmel. There he has set up a monument in his own honor and has turned and gone on down to Gilgal.”
  '13':
  - type: text
    content: 'When Samuel reached him, Saul said, “The '
  - type: text
    content: Lord
  - type: text
    content: ' bless you! I have carried out the '
  - type: text
    content: Lord
  - type: text
    content: ’s instructions.”
  '14':
  - type: text
    content: But Samuel said, “What then is this bleating of sheep in my ears? What is this lowing of cattle that I hear?”
  '15':
  - type: text
    content: 'Saul answered, “The soldiers brought them from the Amalekites; they spared the best of the sheep and cattle to sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, but we totally destroyed the rest.”'
  '16':
  - type: text
    content: '“Enough!” Samuel said to Saul. “Let me tell you what the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me last night.”'
  - type: text
    content: “Tell me,” Saul replied.
  '17':
  - type: text
    content: 'Samuel said, “Although you were once small in your own eyes, did you not become the head of the tribes of Israel? The '
  - type: text
    content: Lord
  - type: text
    content: ' anointed you king over Israel. '
  '18':
  - type: text
    content: 'And he sent you on a mission, saying, ‘Go and completely destroy those wicked people, the Amalekites; wage war against them until you have wiped them out.’ '
  '19':
  - type: text
    content: 'Why did you not obey the '
  - type: text
    content: Lord
  - type: text
    content: '? Why did you pounce on the plunder and do evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ?”
  '2':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says: ‘I will punish the Amalekites for what they did to Israel when they waylaid them as they came up from Egypt. '
  '20':
  - type: text
    content: '“But I did obey the '
  - type: text
    content: Lord
  - type: text
    content: ',” Saul said. “I went on the mission the '
  - type: text
    content: Lord
  - type: text
    content: ' assigned me. I completely destroyed the Amalekites and brought back Agag their king. '
  '21':
  - type: text
    content: 'The soldiers took sheep and cattle from the plunder, the best of what was devoted to God, in order to sacrifice them to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God at Gilgal.”'
  '22':
  - type: text
    content: 'But Samuel replied:'
  - type: text
    content: '“Does the '
  - type: text
    content: Lord
  - type: text
    content: ' delight in burnt offerings and sacrifices'
  - type: text
    content: 'as much as in obeying the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: To obey is better than sacrifice,
  - type: text
    content: and to heed is better than the fat of rams.
  '23':
  - type: text
    content: For rebellion is like the sin of divination,
  - type: text
    content: and arrogance like the evil of idolatry.
  - type: text
    content: 'Because you have rejected the word of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: he has rejected you as king.”
  '24':
  - type: text
    content: 'Then Saul said to Samuel, “I have sinned. I violated the '
  - type: text
    content: Lord
  - type: text
    content: '’s command and your instructions. I was afraid of the men and so I gave in to them. '
  '25':
  - type: text
    content: 'Now I beg you, forgive my sin and come back with me, so that I may worship the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '26':
  - type: text
    content: 'But Samuel said to him, “I will not go back with you. You have rejected the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', and the '
  - type: text
    content: Lord
  - type: text
    content: ' has rejected you as king over Israel!”'
  '27':
  - type: text
    content: 'As Samuel turned to leave, Saul caught hold of the hem of his robe, and it tore. '
  '28':
  - type: text
    content: 'Samuel said to him, “The '
  - type: text
    content: Lord
  - type: text
    content: ' has torn the kingdom of Israel from you today and has given it to one of your neighbors—to one better than you. '
  '29':
  - type: text
    content: He who is the Glory of Israel does not lie or change his mind; for he is not a human being, that he should change his mind.”
  '3':
  - type: text
    content: Now go, attack the Amalekites and totally destroy
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them; also in verses 8, 9, 15, 18, 20 and 21.
  - type: text
    content: ' all that belongs to them. Do not spare them; put to death men and women, children and infants, cattle and sheep, camels and donkeys.’ ”'
  '30':
  - type: text
    content: 'Saul replied, “I have sinned. But please honor me before the elders of my people and before Israel; come back with me, so that I may worship the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.” '
  '31':
  - type: text
    content: 'So Samuel went back with Saul, and Saul worshiped the '
  - type: text
    content: Lord
  - type: text
    content: .
  '32':
  - type: text
    content: Then Samuel said, “Bring me Agag king of the Amalekites.”
  - type: text
    content: Agag came to him in chains.
  - type: note
    content: The meaning of the Hebrew for this phrase is uncertain.
  - type: text
    content: ' And he thought, “Surely the bitterness of death is past.”'
  '33':
  - type: text
    content: But Samuel said,
  - type: text
    content: “As your sword has made women childless,
  - type: text
    content: so will your mother be childless among women.”
  - type: text
    content: 'And Samuel put Agag to death before the '
  - type: text
    content: Lord
  - type: text
    content: ' at Gilgal.'
  '34':
  - type: text
    content: 'Then Samuel left for Ramah, but Saul went up to his home in Gibeah of Saul. '
  '35':
  - type: text
    content: 'Until the day Samuel died, he did not go to see Saul again, though Samuel mourned for him. And the '
  - type: text
    content: Lord
  - type: text
    content: ' regretted that he had made Saul king over Israel.'
  '4':
  - type: text
    content: 'So Saul summoned the men and mustered them at Telaim—two hundred thousand foot soldiers and ten thousand from Judah. '
  '5':
  - type: text
    content: 'Saul went to the city of Amalek and set an ambush in the ravine. '
  '6':
  - type: text
    content: Then he said to the Kenites, “Go away, leave the Amalekites so that I do not destroy you along with them; for you showed kindness to all the Israelites when they came up out of Egypt.” So the Kenites moved away from the Amalekites.
  '7':
  - type: text
    content: 'Then Saul attacked the Amalekites all the way from Havilah to Shur, near the eastern border of Egypt. '
  '8':
  - type: text
    content: 'He took Agag king of the Amalekites alive, and all his people he totally destroyed with the sword. '
  '9':
  - type: text
    content: But Saul and the army spared Agag and the best of the sheep and cattle, the fat calves
  - type: note
    content: Or the grown bulls; the meaning of the Hebrew for this phrase is uncertain.
  - type: text
    content: ' and lambs—everything that was good. These they were unwilling to destroy completely, but everything that was despised and weak they totally destroyed.'
