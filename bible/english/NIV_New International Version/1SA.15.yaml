document_id: 1SA.15,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Rejects Saul as King'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel said to Saul, “I am the one the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' sent to anoint you king over his people Israel; so listen now to the message from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to Samuel: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“I regret that I have made Saul king, because he has turned away from me and has not carried out my instructions.” Samuel was angry, and he cried out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' all that night.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Early in the morning Samuel got up and went to meet Saul, but he was told, “Saul has gone to Carmel. There he has set up a monument in his own honor and has turned and gone on down to Gilgal.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Samuel reached him, Saul said, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' bless you! I have carried out the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s instructions.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Samuel said, “What then is this bleating of sheep in my ears? What is this lowing of cattle that I hear?”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul answered, “The soldiers brought them from the Amalekites; they spared the best of the sheep and cattle to sacrifice to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God, but we totally destroyed the rest.”'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Enough!” Samuel said to Saul. “Let me tell you what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me last night.”'
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Tell me,” Saul replied.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel said, “Although you were once small in your own eyes, did you not become the head of the tribes of Israel? The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' anointed you king over Israel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And he sent you on a mission, saying, ‘Go and completely destroy those wicked people, the Amalekites; wage war against them until you have wiped them out.’ '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Why did you not obey the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '? Why did you pounce on the plunder and do evil in the eyes of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ?”
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says: ‘I will punish the Amalekites for what they did to Israel when they waylaid them as they came up from Egypt. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“But I did obey the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ',” Saul said. “I went on the mission the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' assigned me. I completely destroyed the Amalekites and brought back Agag their king. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The soldiers took sheep and cattle from the plunder, the best of what was devoted to God, in order to sacrifice them to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God at Gilgal.”'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Samuel replied:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“Does the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' delight in burnt offerings and sacrifices'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'as much as in obeying the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: To obey is better than sacrifice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and to heed is better than the fat of rams.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For rebellion is like the sin of divination,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and arrogance like the evil of idolatry.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Because you have rejected the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he has rejected you as king.”
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Saul said to Samuel, “I have sinned. I violated the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '’s command and your instructions. I was afraid of the men and so I gave in to them. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now I beg you, forgive my sin and come back with me, so that I may worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .”
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But Samuel said to him, “I will not go back with you. You have rejected the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has rejected you as king over Israel!”'
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As Samuel turned to leave, Saul caught hold of the hem of his robe, and it tore. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel said to him, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has torn the kingdom of Israel from you today and has given it to one of your neighbors—to one better than you. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He who is the Glory of Israel does not lie or change his mind; for he is not a human being, that he should change his mind.”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now go, attack the Amalekites and totally destroy
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Hebrew term refers to the irrevocable giving over of things or persons to the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ', often by totally destroying them; also in verses 8, 9, 15, 18, 20 and 21.'
      marker-yv: yv-n
    - type: text
      text: ' all that belongs to them. Do not spare them; put to death men and women, children and infants, cattle and sheep, camels and donkeys.’ ”'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul replied, “I have sinned. But please honor me before the elders of my people and before Israel; come back with me, so that I may worship the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God.” '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Samuel went back with Saul, and Saul worshiped the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Samuel said, “Bring me Agag king of the Amalekites.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Agag came to him in chains.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The meaning of the Hebrew for this phrase is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' And he thought, “Surely the bitterness of death is past.”'
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Samuel said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “As your sword has made women childless,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so will your mother be childless among women.”
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'And Samuel put Agag to death before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' at Gilgal.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Samuel left for Ramah, but Saul went up to his home in Gibeah of Saul. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Until the day Samuel died, he did not go to see Saul again, though Samuel mourned for him. And the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' regretted that he had made Saul king over Israel.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So Saul summoned the men and mustered them at Telaim—two hundred thousand foot soldiers and ten thousand from Judah. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saul went to the city of Amalek and set an ambush in the ravine. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he said to the Kenites, “Go away, leave the Amalekites so that I do not destroy you along with them; for you showed kindness to all the Israelites when they came up out of Egypt.” So the Kenites moved away from the Amalekites.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Saul attacked the Amalekites all the way from Havilah to Shur, near the eastern border of Egypt. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He took Agag king of the Amalekites alive, and all his people he totally destroyed with the sword. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Saul and the army spared Agag and the best of the sheep and cattle, the fat calves
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the grown bulls
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; the meaning of the Hebrew for this phrase is uncertain.
      marker-yv: yv-n
    - type: text
      text: ' and lambs—everything that was good. These they were unwilling to destroy completely, but everything that was despised and weak they totally destroyed.'
