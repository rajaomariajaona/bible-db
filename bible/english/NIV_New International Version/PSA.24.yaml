  - type: text
    content: Of David. A psalm.
  - type: text
    content: 'The earth is the '
  - type: text
    content: Lord
  - type: text
    content: ’s, and everything in it,
  - type: text
    content: the world, and all who live in it;
  '10':
  - type: text
    content: Who is he, this King of glory?
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty—'
  - type: text
    content: he is the King of glory.
  '2':
  - type: text
    content: for he founded it on the seas
  - type: text
    content: and established it on the waters.
  '3':
  - type: text
    content: 'Who may ascend the mountain of the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: Who may stand in his holy place?
  '4':
  - type: text
    content: The one who has clean hands and a pure heart,
  - type: text
    content: who does not trust in an idol
  - type: text
    content: or swear by a false god.
  - type: note
    content: Or swear falsely
  '5':
  - type: text
    content: 'They will receive blessing from the '
  - type: text
    content: Lord
  - type: text
    content: and vindication from God their Savior.
  '6':
  - type: text
    content: Such is the generation of those who seek him,
  - type: text
    content: who seek your face, God of Jacob.
  - type: note
    content: Two Hebrew manuscripts and Syriac (see also Septuagint); most Hebrew manuscripts face, Jacob
  - type: note
    content: The Hebrew has Selah (a word of uncertain meaning) here and at the end of verse 10.
  '7':
  - type: text
    content: Lift up your heads, you gates;
  - type: text
    content: be lifted up, you ancient doors,
  - type: text
    content: that the King of glory may come in.
  '8':
  - type: text
    content: Who is this King of glory?
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' strong and mighty,'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' mighty in battle.'
  '9':
  - type: text
    content: Lift up your heads, you gates;
  - type: text
