document_id: ROM.7,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Released From the Law, Bound to Christ
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Do you not know, brothers and sisters—for I am speaking to those who know the law—that the law has authority over someone only as long as that person lives? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I found that the very commandment that was intended to bring life actually brought death. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For sin, seizing the opportunity afforded by the commandment, deceived me, and through the commandment put me to death. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So then, the law is holy, and the commandment is holy, righteous and good.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Did that which is good, then, become death to me? By no means! Nevertheless, in order that sin might be recognized as sin, it used what is good to bring about my death, so that through the commandment sin might become utterly sinful.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'We know that the law is spiritual; but I am unspiritual, sold as a slave to sin. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I do not understand what I do. For what I want to do I do not do, but what I hate I do. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And if I do what I do not want to do, I agree that the law is good. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As it is, it is no longer I myself who do it, but it is sin living in me. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For I know that good itself does not dwell in me, that is, in my sinful nature.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: my flesh
      marker-yv: yv-n
    - type: text
      text: ' For I have the desire to do what is good, but I cannot carry it out. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For I do not do the good I want to do, but the evil I do not want to do—this I keep on doing. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For example, by law a married woman is bound to her husband as long as he is alive, but if her husband dies, she is released from the law that binds her to him. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Now if I do what I do not want to do, it is no longer I who do it, but it is sin living in me that does it.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So I find this law at work: Although I want to do good, evil is right there with me. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For in my inner being I delight in God’s law; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but I see another law at work in me, waging war against the law of my mind and making me a prisoner of the law of sin at work within me. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'What a wretched man I am! Who will rescue me from this body that is subject to death? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Thanks be to God, who delivers me through Jesus Christ our Lord!
  - type: usfm
    marker: p
    children:
    - type: text
      text: So then, I myself in my mind am a slave to God’s law, but in my sinful nature
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in the flesh
      marker-yv: yv-n
    - type: text
      text: ' a slave to the law of sin.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So then, if she has sexual relations with another man while her husband is still alive, she is called an adulteress. But if her husband dies, she is released from that law and is not an adulteress if she marries another man.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So, my brothers and sisters, you also died to the law through the body of Christ, that you might belong to another, to him who was raised from the dead, in order that we might bear fruit for God. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For when we were in the realm of the flesh,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'In contexts like this, the Greek word for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'flesh '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: tl
          children:
          - type: text
            text: sarx
        - type: text
          text: ) refers to the sinful state of human beings, often presented as a power in opposition to the Spirit.
      marker-yv: yv-n
    - type: text
      text: ' the sinful passions aroused by the law were at work in us, so that we bore fruit for death. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But now, by dying to what once bound us, we have been released from the law so that we serve in the new way of the Spirit, and not in the old way of the written code.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Law and Sin
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: What shall we say, then? Is the law sinful? Certainly not! Nevertheless, I would not have known what sin was had it not been for the law. For I would not have known what coveting really was if the law had not said, “You shall not covet.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7:7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Exodus 20:17; Deut. 5:21
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But sin, seizing the opportunity afforded by the commandment, produced in me every kind of coveting. For apart from the law, sin was dead. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Once I was alive apart from the law; but when the commandment came, sin sprang to life and I died. '
