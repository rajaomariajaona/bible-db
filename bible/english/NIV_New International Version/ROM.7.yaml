document_id: ROM.7,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Released From the Law, Bound to Christ
  - type: text
    content: 'Do you not know, brothers and sisters—for I am speaking to those who know the law—that the law has authority over someone only as long as that person lives? '
  '10':
  - type: text
    content: 'I found that the very commandment that was intended to bring life actually brought death. '
  '11':
  - type: text
    content: 'For sin, seizing the opportunity afforded by the commandment, deceived me, and through the commandment put me to death. '
  '12':
  - type: text
    content: So then, the law is holy, and the commandment is holy, righteous and good.
  '13':
  - type: text
    content: Did that which is good, then, become death to me? By no means! Nevertheless, in order that sin might be recognized as sin, it used what is good to bring about my death, so that through the commandment sin might become utterly sinful.
  '14':
  - type: text
    content: 'We know that the law is spiritual; but I am unspiritual, sold as a slave to sin. '
  '15':
  - type: text
    content: 'I do not understand what I do. For what I want to do I do not do, but what I hate I do. '
  '16':
  - type: text
    content: 'And if I do what I do not want to do, I agree that the law is good. '
  '17':
  - type: text
    content: 'As it is, it is no longer I myself who do it, but it is sin living in me. '
  '18':
  - type: text
    content: For I know that good itself does not dwell in me, that is, in my sinful nature.
  - type: note
    content: Or my flesh
  - type: text
    content: ' For I have the desire to do what is good, but I cannot carry it out. '
  '19':
  - type: text
    content: 'For I do not do the good I want to do, but the evil I do not want to do—this I keep on doing. '
  '2':
  - type: text
    content: 'For example, by law a married woman is bound to her husband as long as he is alive, but if her husband dies, she is released from the law that binds her to him. '
  '20':
  - type: text
    content: Now if I do what I do not want to do, it is no longer I who do it, but it is sin living in me that does it.
  '21':
  - type: text
    content: 'So I find this law at work: Although I want to do good, evil is right there with me. '
  '22':
  - type: text
    content: 'For in my inner being I delight in God’s law; '
  '23':
  - type: text
    content: 'but I see another law at work in me, waging war against the law of my mind and making me a prisoner of the law of sin at work within me. '
  '24':
  - type: text
    content: 'What a wretched man I am! Who will rescue me from this body that is subject to death? '
  '25':
  - type: text
    content: Thanks be to God, who delivers me through Jesus Christ our Lord!
  - type: text
    content: So then, I myself in my mind am a slave to God’s law, but in my sinful nature
  - type: note
    content: Or in the flesh
  - type: text
    content: ' a slave to the law of sin.'
  '3':
  - type: text
    content: So then, if she has sexual relations with another man while her husband is still alive, she is called an adulteress. But if her husband dies, she is released from that law and is not an adulteress if she marries another man.
  '4':
  - type: text
    content: 'So, my brothers and sisters, you also died to the law through the body of Christ, that you might belong to another, to him who was raised from the dead, in order that we might bear fruit for God. '
  '5':
  - type: text
    content: For when we were in the realm of the flesh,
  - type: note
    content: In contexts like this, the Greek word for flesh (sarx) refers to the sinful state of human beings, often presented as a power in opposition to the Spirit.
  - type: text
    content: ' the sinful passions aroused by the law were at work in us, so that we bore fruit for death. '
  '6':
  - type: text
    content: But now, by dying to what once bound us, we have been released from the law so that we serve in the new way of the Spirit, and not in the old way of the written code.
  - type: heading
    content: The Law and Sin
  '7':
  - type: text
    content: What shall we say, then? Is the law sinful? Certainly not! Nevertheless, I would not have known what sin was had it not been for the law. For I would not have known what coveting really was if the law had not said, “You shall not covet.”
  - type: note
    content: Exodus 20:17; Deut. 5:21
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'But sin, seizing the opportunity afforded by the commandment, produced in me every kind of coveting. For apart from the law, sin was dead. '
  '9':
  - type: text
    content: 'Once I was alive apart from the law; but when the commandment came, sin sprang to life and I died. '
