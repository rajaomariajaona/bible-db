document_id: EXO.14,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: 'As Pharaoh approached, the Israelites looked up, and there were the Egyptians, marching after them. They were terrified and cried out to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'They said to Moses, “Was it because there were no graves in Egypt that you brought us to the desert to die? What have you done to us by bringing us out of Egypt? '
  '12':
  - type: text
    content: Didn’t we say to you in Egypt, ‘Leave us alone; let us serve the Egyptians’? It would have been better for us to serve the Egyptians than to die in the desert!”
  '13':
  - type: text
    content: 'Moses answered the people, “Do not be afraid. Stand firm and you will see the deliverance the '
  - type: text
    content: Lord
  - type: text
    content: ' will bring you today. The Egyptians you see today you will never see again. '
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will fight for you; you need only to be still.”'
  '15':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Why are you crying out to me? Tell the Israelites to move on. '
  '16':
  - type: text
    content: 'Raise your staff and stretch out your hand over the sea to divide the water so that the Israelites can go through the sea on dry ground. '
  '17':
  - type: text
    content: 'I will harden the hearts of the Egyptians so that they will go in after them. And I will gain glory through Pharaoh and all his army, through his chariots and his horsemen. '
  '18':
  - type: text
    content: 'The Egyptians will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' when I gain glory through Pharaoh, his chariots and his horsemen.”'
  '19':
  - type: text
    content: 'Then the angel of God, who had been traveling in front of Israel’s army, withdrew and went behind them. The pillar of cloud also moved from in front and stood behind them, '
  '2':
  - type: text
    content: '“Tell the Israelites to turn back and encamp near Pi Hahiroth, between Migdol and the sea. They are to encamp by the sea, directly opposite Baal Zephon. '
  '20':
  - type: text
    content: coming between the armies of Egypt and Israel. Throughout the night the cloud brought darkness to the one side and light to the other side; so neither went near the other all night long.
  '21':
  - type: text
    content: 'Then Moses stretched out his hand over the sea, and all that night the '
  - type: text
    content: Lord
  - type: text
    content: ' drove the sea back with a strong east wind and turned it into dry land. The waters were divided, '
  '22':
  - type: text
    content: and the Israelites went through the sea on dry ground, with a wall of water on their right and on their left.
  '23':
  - type: text
    content: 'The Egyptians pursued them, and all Pharaoh’s horses and chariots and horsemen followed them into the sea. '
  '24':
  - type: text
    content: 'During the last watch of the night the '
  - type: text
    content: Lord
  - type: text
    content: ' looked down from the pillar of fire and cloud at the Egyptian army and threw it into confusion. '
  '25':
  - type: text
    content: He jammed
  - type: note
    content: See Samaritan Pentateuch, Septuagint and Syriac; Masoretic Text removed
  - type: text
    content: ' the wheels of their chariots so that they had difficulty driving. And the Egyptians said, “Let’s get away from the Israelites! The '
  - type: text
    content: Lord
  - type: text
    content: ' is fighting for them against Egypt.”'
  '26':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “Stretch out your hand over the sea so that the waters may flow back over the Egyptians and their chariots and horsemen.” '
  '27':
  - type: text
    content: Moses stretched out his hand over the sea, and at daybreak the sea went back to its place. The Egyptians were fleeing toward
  - type: note
    content: Or from
  - type: text
    content: ' it, and the '
  - type: text
    content: Lord
  - type: text
    content: ' swept them into the sea. '
  '28':
  - type: text
    content: The water flowed back and covered the chariots and horsemen—the entire army of Pharaoh that had followed the Israelites into the sea. Not one of them survived.
  '29':
  - type: text
    content: 'But the Israelites went through the sea on dry ground, with a wall of water on their right and on their left. '
  '3':
  - type: text
    content: 'Pharaoh will think, ‘The Israelites are wandering around the land in confusion, hemmed in by the desert.’ '
  '30':
  - type: text
    content: 'That day the '
  - type: text
    content: Lord
  - type: text
    content: ' saved Israel from the hands of the Egyptians, and Israel saw the Egyptians lying dead on the shore. '
  '31':
  - type: text
    content: 'And when the Israelites saw the mighty hand of the '
  - type: text
    content: Lord
  - type: text
    content: ' displayed against the Egyptians, the people feared the '
  - type: text
    content: Lord
  - type: text
    content: ' and put their trust in him and in Moses his servant.'
  '4':
  - type: text
    content: 'And I will harden Pharaoh’s heart, and he will pursue them. But I will gain glory for myself through Pharaoh and all his army, and the Egyptians will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: .” So the Israelites did this.
  '5':
  - type: text
    content: 'When the king of Egypt was told that the people had fled, Pharaoh and his officials changed their minds about them and said, “What have we done? We have let the Israelites go and have lost their services!” '
  '6':
  - type: text
    content: 'So he had his chariot made ready and took his army with him. '
  '7':
  - type: text
    content: 'He took six hundred of the best chariots, along with all the other chariots of Egypt, with officers over all of them. '
  '8':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' hardened the heart of Pharaoh king of Egypt, so that he pursued the Israelites, who were marching out boldly. '
  '9':
  - type: text
    content: The Egyptians—all Pharaoh’s horses and chariots, horsemen
  - type: note
    content: Or charioteers; also in verses 17, 18, 23, 26 and 28
  - type: text
    content: ' and troops—pursued the Israelites and overtook them as they camped by the sea near Pi Hahiroth, opposite Baal Zephon.'
