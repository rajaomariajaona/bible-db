document_id: JUD.1,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jude, a servant of Jesus Christ and a brother of James,
  - type: usfm
    marker: p
    children:
    - type: text
      text: To those who have been called, who are loved in God the Father and kept for
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: by
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: in
      marker-yv: yv-n
    - type: text
      text: ' Jesus Christ:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Yet these people slander whatever they do not understand, and the very things they do understand by instinct—as irrational animals do—will destroy them.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Woe to them! They have taken the way of Cain; they have rushed for profit into Balaam’s error; they have been destroyed in Korah’s rebellion.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'These people are blemishes at your love feasts, eating with you without the slightest qualm—shepherds who feed only themselves. They are clouds without rain, blown along by the wind; autumn trees, without fruit and uprooted—twice dead. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They are wild waves of the sea, foaming up their shame; wandering stars, for whom blackest darkness has been reserved forever.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Enoch, the seventh from Adam, prophesied about them: “See, the Lord is coming with thousands upon thousands of his holy ones '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: to judge everyone, and to convict all of them of all the ungodly acts they have committed in their ungodliness, and of all the defiant words ungodly sinners have spoken against him.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'From the Jewish First Book of Enoch (approximately the first century '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: b.c.
        - type: text
          text: )
      marker-yv: yv-n
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These people are grumblers and faultfinders; they follow their own evil desires; they boast about themselves and flatter others for their own advantage.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Call to Persevere
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But, dear friends, remember what the apostles of our Lord Jesus Christ foretold. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'They said to you, “In the last times there will be scoffers who will follow their own ungodly desires.” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: These are the people who divide you, who follow mere natural instincts and do not have the Spirit.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mercy, peace and love be yours in abundance.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: The Sin and Doom of Ungodly People
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But you, dear friends, by building yourselves up in your most holy faith and praying in the Holy Spirit, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: keep yourselves in God’s love as you wait for the mercy of our Lord Jesus Christ to bring you to eternal life.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Be merciful to those who doubt; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: save others by snatching them from the fire; to others show mercy, mixed with fear—hating even the clothing stained by corrupted flesh.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: The Greek manuscripts of these verses vary at several points.
      marker-yv: yv-n
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Doxology
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To him who is able to keep you from stumbling and to present you before his glorious presence without fault and with great joy— '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: to the only God our Savior be glory, majesty, power and authority, through Jesus Christ our Lord, before all ages, now and forevermore! Amen.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dear friends, although I was very eager to write to you about the salvation we share, I felt compelled to write and urge you to contend for the faith that was once for all entrusted to God’s holy people. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For certain individuals whose condemnation was written about
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: individuals who were marked out for condemnation
      marker-yv: yv-n
    - type: text
      text: ' long ago have secretly slipped in among you. They are ungodly people, who pervert the grace of our God into a license for immorality and deny Jesus Christ our only Sovereign and Lord.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Though you already know all this, I want to remind you that the Lord
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some early manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jesus
      marker-yv: yv-n
    - type: text
      text: ' at one time delivered his people out of Egypt, but later destroyed those who did not believe. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And the angels who did not keep their positions of authority but abandoned their proper dwelling—these he has kept in darkness, bound with everlasting chains for judgment on the great Day. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: In a similar way, Sodom and Gomorrah and the surrounding towns gave themselves up to sexual immorality and perversion. They serve as an example of those who suffer the punishment of eternal fire.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'In the very same way, on the strength of their dreams these ungodly people pollute their own bodies, reject authority and heap abuse on celestial beings. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But even the archangel Michael, when he was disputing with the devil about the body of Moses, did not himself dare to condemn him for slander but said, “The Lord rebuke you!”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jude is alluding to the Jewish Testament of Moses (approximately the first century '
        - type: usfm
          marker: sc
          children:
          - type: text
            text: a.d.
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' '
