document_id: JOB.17
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: My spirit is broken,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my days are cut short,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the grave awaits me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Surely mockers surround me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my eyes must dwell on their hostility.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: “Give me, O God, the pledge you demand.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Who else will put up security for me?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: You have closed their minds to understanding;
- type: usfm
  marker: q2
  children:
  - type: text
    text: therefore you will not let them triumph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: If anyone denounces their friends for reward,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the eyes of their children will fail.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: “God has made me a byword to everyone,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a man in whose face people spit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: My eyes have grown dim with grief;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my whole frame is but a shadow.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: The upright are appalled at this;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the innocent are aroused against the ungodly.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Nevertheless, the righteous will hold to their ways,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and those with clean hands will grow stronger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: “But come on, all of you, try again!
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will not find a wise man among you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: My days have passed, my plans are shattered.
- type: usfm
  marker: q2
  children:
  - type: text
    text: Yet the desires of my heart
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: turn night into day;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the face of the darkness light is near.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: If the only home I hope for is the grave,
- type: usfm
  marker: q2
  children:
  - type: text
    text: if I spread out my bed in the realm of darkness,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: if I say to corruption, ‘You are my father,’
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to the worm, ‘My mother’ or ‘My sister,’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: where then is my hope—
- type: usfm
  marker: q2
  children:
  - type: text
    text: who can see any hope for me?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Will it go down to the gates of death?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Will we descend together into the dust?”
