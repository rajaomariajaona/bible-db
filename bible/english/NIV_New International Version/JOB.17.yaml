document_id: JOB.17,111
type_code: eng
verses:
  '1':
  - type: text
    content: My spirit is broken,
  - type: text
    content: my days are cut short,
  - type: text
    content: the grave awaits me.
  '10':
  - type: text
    content: “But come on, all of you, try again!
  - type: text
    content: I will not find a wise man among you.
  '11':
  - type: text
    content: My days have passed, my plans are shattered.
  - type: text
    content: Yet the desires of my heart
  '12':
  - type: text
    content: turn night into day;
  - type: text
    content: in the face of the darkness light is near.
  '13':
  - type: text
    content: If the only home I hope for is the grave,
  - type: text
    content: if I spread out my bed in the realm of darkness,
  '14':
  - type: text
    content: if I say to corruption, ‘You are my father,’
  - type: text
    content: and to the worm, ‘My mother’ or ‘My sister,’
  '15':
  - type: text
    content: where then is my hope—
  - type: text
    content: who can see any hope for me?
  '16':
  - type: text
    content: Will it go down to the gates of death?
  - type: text
    content: Will we descend together into the dust?”
  '2':
  - type: text
    content: Surely mockers surround me;
  - type: text
    content: my eyes must dwell on their hostility.
  '3':
  - type: text
    content: “Give me, O God, the pledge you demand.
  - type: text
    content: Who else will put up security for me?
  '4':
  - type: text
    content: You have closed their minds to understanding;
  - type: text
    content: therefore you will not let them triumph.
  '5':
  - type: text
    content: If anyone denounces their friends for reward,
  - type: text
    content: the eyes of their children will fail.
  '6':
  - type: text
    content: “God has made me a byword to everyone,
  - type: text
    content: a man in whose face people spit.
  '7':
  - type: text
    content: My eyes have grown dim with grief;
  - type: text
    content: my whole frame is but a shadow.
  '8':
  - type: text
    content: The upright are appalled at this;
  - type: text
    content: the innocent are aroused against the ungodly.
  '9':
  - type: text
    content: Nevertheless, the righteous will hold to their ways,
  - type: text
    content: and those with clean hands will grow stronger.
