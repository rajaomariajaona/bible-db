document_id: JDG.7,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Gideon Defeats the Midianites
  - type: text
    content: 'Early in the morning, Jerub-Baal (that is, Gideon) and all his men camped at the spring of Harod. The camp of Midian was north of them in the valley near the hill of Moreh. '
  '10':
  - type: text
    content: 'If you are afraid to attack, go down to the camp with your servant Purah '
  '11':
  - type: text
    content: 'and listen to what they are saying. Afterward, you will be encouraged to attack the camp.” So he and Purah his servant went down to the outposts of the camp. '
  '12':
  - type: text
    content: The Midianites, the Amalekites and all the other eastern peoples had settled in the valley, thick as locusts. Their camels could no more be counted than the sand on the seashore.
  '13':
  - type: text
    content: Gideon arrived just as a man was telling a friend his dream. “I had a dream,” he was saying. “A round loaf of barley bread came tumbling into the Midianite camp. It struck the tent with such force that the tent overturned and collapsed.”
  '14':
  - type: text
    content: His friend responded, “This can be nothing other than the sword of Gideon son of Joash, the Israelite. God has given the Midianites and the whole camp into his hands.”
  '15':
  - type: text
    content: 'When Gideon heard the dream and its interpretation, he bowed down and worshiped. He returned to the camp of Israel and called out, “Get up! The '
  - type: text
    content: Lord
  - type: text
    content: ' has given the Midianite camp into your hands.” '
  '16':
  - type: text
    content: Dividing the three hundred men into three companies, he placed trumpets and empty jars in the hands of all of them, with torches inside.
  '17':
  - type: text
    content: '“Watch me,” he told them. “Follow my lead. When I get to the edge of the camp, do exactly as I do. '
  '18':
  - type: text
    content: 'When I and all who are with me blow our trumpets, then from all around the camp blow yours and shout, ‘For the '
  - type: text
    content: Lord
  - type: text
    content: ' and for Gideon.’ ”'
  '19':
  - type: text
    content: 'Gideon and the hundred men with him reached the edge of the camp at the beginning of the middle watch, just after they had changed the guard. They blew their trumpets and broke the jars that were in their hands. '
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Gideon, “You have too many men. I cannot deliver Midian into their hands, or Israel would boast against me, ‘My own strength has saved me.’ '
  '20':
  - type: text
    content: 'The three companies blew the trumpets and smashed the jars. Grasping the torches in their left hands and holding in their right hands the trumpets they were to blow, they shouted, “A sword for the '
  - type: text
    content: Lord
  - type: text
    content: ' and for Gideon!” '
  '21':
  - type: text
    content: While each man held his position around the camp, all the Midianites ran, crying out as they fled.
  '22':
  - type: text
    content: 'When the three hundred trumpets sounded, the '
  - type: text
    content: Lord
  - type: text
    content: ' caused the men throughout the camp to turn on each other with their swords. The army fled to Beth Shittah toward Zererah as far as the border of Abel Meholah near Tabbath. '
  '23':
  - type: text
    content: 'Israelites from Naphtali, Asher and all Manasseh were called out, and they pursued the Midianites. '
  '24':
  - type: text
    content: Gideon sent messengers throughout the hill country of Ephraim, saying, “Come down against the Midianites and seize the waters of the Jordan ahead of them as far as Beth Barah.”
  - type: text
    content: 'So all the men of Ephraim were called out and they seized the waters of the Jordan as far as Beth Barah. '
  '25':
  - type: text
    content: They also captured two of the Midianite leaders, Oreb and Zeeb. They killed Oreb at the rock of Oreb, and Zeeb at the winepress of Zeeb. They pursued the Midianites and brought the heads of Oreb and Zeeb to Gideon, who was by the Jordan.
  '3':
  - type: text
    content: Now announce to the army, ‘Anyone who trembles with fear may turn back and leave Mount Gilead.’ ” So twenty-two thousand men left, while ten thousand remained.
  '4':
  - type: text
    content: 'But the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Gideon, “There are still too many men. Take them down to the water, and I will thin them out for you there. If I say, ‘This one shall go with you,’ he shall go; but if I say, ‘This one shall not go with you,’ he shall not go.”'
  '5':
  - type: text
    content: 'So Gideon took the men down to the water. There the '
  - type: text
    content: Lord
  - type: text
    content: ' told him, “Separate those who lap the water with their tongues as a dog laps from those who kneel down to drink.” '
  '6':
  - type: text
    content: Three hundred of them drank from cupped hands, lapping like dogs. All the rest got down on their knees to drink.
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Gideon, “With the three hundred men that lapped I will save you and give the Midianites into your hands. Let all the others go home.” '
  '8':
  - type: text
    content: So Gideon sent the rest of the Israelites home but kept the three hundred, who took over the provisions and trumpets of the others.
  - type: text
    content: 'Now the camp of Midian lay below him in the valley. '
  '9':
  - type: text
    content: 'During that night the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Gideon, “Get up, go down against the camp, because I am going to give it into your hands. '
