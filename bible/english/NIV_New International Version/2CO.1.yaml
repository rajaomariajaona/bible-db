document_id: 2CO.1,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Paul, an apostle of Christ Jesus by the will of God, and Timothy our brother,
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'To the church of God in Corinth, together with all his holy people throughout Achaia:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He has delivered us from such a deadly peril, and he will deliver us again. On him we have set our hope that he will continue to deliver us, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: as you help us by your prayers. Then many will give thanks on our behalf for the gracious favor granted us in answer to the prayers of many.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul’s Change of Plans
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now this is our boast: Our conscience testifies that we have conducted ourselves in the world, and especially in our relations with you, with integrity'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Many manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: holiness
      marker-yv: yv-n
    - type: text
      text: ' and godly sincerity. We have done so, relying not on worldly wisdom but on God’s grace. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For we do not write you anything you cannot read or understand. And I hope that, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: as you have understood us in part, you will come to understand fully that you can boast of us just as we will boast of you in the day of the Lord Jesus.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Because I was confident of this, I wanted to visit you first so that you might benefit twice. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I wanted to visit you on my way to Macedonia and to come back to you from Macedonia, and then to have you send me on my way to Judea. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Was I fickle when I intended to do this? Or do I make my plans in a worldly manner so that in the same breath I say both “Yes, yes” and “No, no”?
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But as surely as God is faithful, our message to you is not “Yes” and “No.” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For the Son of God, Jesus Christ, who was preached among you by us—by me and Silas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Greek '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Silvanus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Silas
      marker-yv: yv-n
    - type: text
      text: ' and Timothy—was not “Yes” and “No,” but in him it has always been “Yes.” '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Grace and peace to you from God our Father and the Lord Jesus Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Praise to the God of All Comfort
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For no matter how many promises God has made, they are “Yes” in Christ. And so through him the “Amen” is spoken by us to the glory of God. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now it is God who makes both us and you stand firm in Christ. He anointed us, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: set his seal of ownership on us, and put his Spirit in our hearts as a deposit, guaranteeing what is to come.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I call God as my witness—and I stake my life on it—that it was in order to spare you that I did not return to Corinth. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Not that we lord it over your faith, but we work with you for your joy, because it is by faith you stand firm.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Praise be to the God and Father of our Lord Jesus Christ, the Father of compassion and the God of all comfort, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'who comforts us in all our troubles, so that we can comfort those in any trouble with the comfort we ourselves receive from God. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For just as we share abundantly in the sufferings of Christ, so also our comfort abounds through Christ. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'If we are distressed, it is for your comfort and salvation; if we are comforted, it is for your comfort, which produces in you patient endurance of the same sufferings we suffer. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And our hope for you is firm, because we know that just as you share in our sufferings, so also you share in our comfort.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: We do not want you to be uninformed, brothers and sisters,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'The Greek word for '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'brothers and sisters '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: tl
          children:
          - type: text
            text: adelphoi
        - type: text
          text: ) refers here to believers, both men and women, as part of God’s family; also in 8:1; 13:11.
      marker-yv: yv-n
    - type: text
      text: ' about the troubles we experienced in the province of Asia. We were under great pressure, far beyond our ability to endure, so that we despaired of life itself. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Indeed, we felt we had received the sentence of death. But this happened that we might not rely on ourselves but on God, who raises the dead. '
