document_id: 2CO.1,111
type_code: eng
verses:
  '1':
  - type: text
    content: Paul, an apostle of Christ Jesus by the will of God, and Timothy our brother,
  - type: text
    content: 'To the church of God in Corinth, together with all his holy people throughout Achaia:'
  '10':
  - type: text
    content: 'He has delivered us from such a deadly peril, and he will deliver us again. On him we have set our hope that he will continue to deliver us, '
  '11':
  - type: text
    content: as you help us by your prayers. Then many will give thanks on our behalf for the gracious favor granted us in answer to the prayers of many.
  - type: heading
    content: Paul’s Change of Plans
  '12':
  - type: text
    content: 'Now this is our boast: Our conscience testifies that we have conducted ourselves in the world, and especially in our relations with you, with integrity'
  - type: note
    content: Many manuscripts holiness
  - type: text
    content: ' and godly sincerity. We have done so, relying not on worldly wisdom but on God’s grace. '
  '13':
  - type: text
    content: 'For we do not write you anything you cannot read or understand. And I hope that, '
  '14':
  - type: text
    content: as you have understood us in part, you will come to understand fully that you can boast of us just as we will boast of you in the day of the Lord Jesus.
  '15':
  - type: text
    content: 'Because I was confident of this, I wanted to visit you first so that you might benefit twice. '
  '16':
  - type: text
    content: 'I wanted to visit you on my way to Macedonia and to come back to you from Macedonia, and then to have you send me on my way to Judea. '
  '17':
  - type: text
    content: Was I fickle when I intended to do this? Or do I make my plans in a worldly manner so that in the same breath I say both “Yes, yes” and “No, no”?
  '18':
  - type: text
    content: 'But as surely as God is faithful, our message to you is not “Yes” and “No.” '
  '19':
  - type: text
    content: For the Son of God, Jesus Christ, who was preached among you by us—by me and Silas
  - type: note
    content: Greek Silvanus, a variant of Silas
  - type: text
    content: ' and Timothy—was not “Yes” and “No,” but in him it has always been “Yes.” '
  '2':
  - type: text
    content: Grace and peace to you from God our Father and the Lord Jesus Christ.
  - type: heading
    content: Praise to the God of All Comfort
  '20':
  - type: text
    content: 'For no matter how many promises God has made, they are “Yes” in Christ. And so through him the “Amen” is spoken by us to the glory of God. '
  '21':
  - type: text
    content: 'Now it is God who makes both us and you stand firm in Christ. He anointed us, '
  '22':
  - type: text
    content: set his seal of ownership on us, and put his Spirit in our hearts as a deposit, guaranteeing what is to come.
  '23':
  - type: text
    content: 'I call God as my witness—and I stake my life on it—that it was in order to spare you that I did not return to Corinth. '
  '24':
  - type: text
    content: Not that we lord it over your faith, but we work with you for your joy, because it is by faith you stand firm.
  '3':
  - type: text
    content: 'Praise be to the God and Father of our Lord Jesus Christ, the Father of compassion and the God of all comfort, '
  '4':
  - type: text
    content: 'who comforts us in all our troubles, so that we can comfort those in any trouble with the comfort we ourselves receive from God. '
  '5':
  - type: text
    content: 'For just as we share abundantly in the sufferings of Christ, so also our comfort abounds through Christ. '
  '6':
  - type: text
    content: 'If we are distressed, it is for your comfort and salvation; if we are comforted, it is for your comfort, which produces in you patient endurance of the same sufferings we suffer. '
  '7':
  - type: text
    content: And our hope for you is firm, because we know that just as you share in our sufferings, so also you share in our comfort.
  '8':
  - type: text
    content: We do not want you to be uninformed, brothers and sisters,
  - type: note
    content: The Greek word for brothers and sisters (adelphoi) refers here to believers, both men and women, as part of God’s family; also in 8:1; 13:11.
  - type: text
    content: ' about the troubles we experienced in the province of Asia. We were under great pressure, far beyond our ability to endure, so that we despaired of life itself. '
  '9':
  - type: text
    content: 'Indeed, we felt we had received the sentence of death. But this happened that we might not rely on ourselves but on God, who raises the dead. '
