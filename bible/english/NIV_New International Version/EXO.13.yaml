document_id: EXO.13,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Consecration of the Firstborn
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: You must keep this ordinance at the appointed time year after year.
  '11':
  - type: text
    content: '“After the '
  - type: text
    content: Lord
  - type: text
    content: ' brings you into the land of the Canaanites and gives it to you, as he promised on oath to you and your ancestors, '
  '12':
  - type: text
    content: 'you are to give over to the '
  - type: text
    content: Lord
  - type: text
    content: ' the first offspring of every womb. All the firstborn males of your livestock belong to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '13':
  - type: text
    content: Redeem with a lamb every firstborn donkey, but if you do not redeem it, break its neck. Redeem every firstborn among your sons.
  '14':
  - type: text
    content: '“In days to come, when your son asks you, ‘What does this mean?’ say to him, ‘With a mighty hand the '
  - type: text
    content: Lord
  - type: text
    content: ' brought us out of Egypt, out of the land of slavery. '
  '15':
  - type: text
    content: 'When Pharaoh stubbornly refused to let us go, the '
  - type: text
    content: Lord
  - type: text
    content: ' killed the firstborn of both people and animals in Egypt. This is why I sacrifice to the '
  - type: text
    content: Lord
  - type: text
    content: ' the first male offspring of every womb and redeem each of my firstborn sons.’ '
  '16':
  - type: text
    content: 'And it will be like a sign on your hand and a symbol on your forehead that the '
  - type: text
    content: Lord
  - type: text
    content: ' brought us out of Egypt with his mighty hand.”'
  - type: heading
    content: Crossing the Sea
  '17':
  - type: text
    content: 'When Pharaoh let the people go, God did not lead them on the road through the Philistine country, though that was shorter. For God said, “If they face war, they might change their minds and return to Egypt.” '
  '18':
  - type: text
    content: So God led the people around by the desert road toward the Red Sea.
  - type: note
    content: Or the Sea of Reeds
  - type: text
    content: ' The Israelites went up out of Egypt ready for battle.'
  '19':
  - type: text
    content: Moses took the bones of Joseph with him because Joseph had made the Israelites swear an oath. He had said, “God will surely come to your aid, and then you must carry my bones up with you from this place.”
  - type: note
    content: See Gen. 50:25.
  '2':
  - type: text
    content: “Consecrate to me every firstborn male. The first offspring of every womb among the Israelites belongs to me, whether human or animal.”
  '20':
  - type: text
    content: 'After leaving Sukkoth they camped at Etham on the edge of the desert. '
  '21':
  - type: text
    content: 'By day the '
  - type: text
    content: Lord
  - type: text
    content: ' went ahead of them in a pillar of cloud to guide them on their way and by night in a pillar of fire to give them light, so that they could travel by day or night. '
  '22':
  - type: text
    content: Neither the pillar of cloud by day nor the pillar of fire by night left its place in front of the people.
  '3':
  - type: text
    content: 'Then Moses said to the people, “Commemorate this day, the day you came out of Egypt, out of the land of slavery, because the '
  - type: text
    content: Lord
  - type: text
    content: ' brought you out of it with a mighty hand. Eat nothing containing yeast. '
  '4':
  - type: text
    content: 'Today, in the month of Aviv, you are leaving. '
  '5':
  - type: text
    content: 'When the '
  - type: text
    content: Lord
  - type: text
    content: ' brings you into the land of the Canaanites, Hittites, Amorites, Hivites and Jebusites—the land he swore to your ancestors to give you, a land flowing with milk and honey—you are to observe this ceremony in this month: '
  '6':
  - type: text
    content: 'For seven days eat bread made without yeast and on the seventh day hold a festival to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Eat unleavened bread during those seven days; nothing with yeast in it is to be seen among you, nor shall any yeast be seen anywhere within your borders. '
  '8':
  - type: text
    content: 'On that day tell your son, ‘I do this because of what the '
  - type: text
    content: Lord
  - type: text
    content: ' did for me when I came out of Egypt.’ '
  '9':
  - type: text
    content: 'This observance will be for you like a sign on your hand and a reminder on your forehead that this law of the '
  - type: text
    content: Lord
  - type: text
    content: ' is to be on your lips. For the '
  - type: text
    content: Lord
  - type: text
    content: ' brought you out of Egypt with his mighty hand. '
