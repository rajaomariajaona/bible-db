document_id: EXO.13,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Consecration of the Firstborn
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Moses, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: You must keep this ordinance at the appointed time year after year.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“After the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brings you into the land of the Canaanites and gives it to you, as he promised on oath to you and your ancestors, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'you are to give over to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' the first offspring of every womb. All the firstborn males of your livestock belong to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Redeem with a lamb every firstborn donkey, but if you do not redeem it, break its neck. Redeem every firstborn among your sons.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“In days to come, when your son asks you, ‘What does this mean?’ say to him, ‘With a mighty hand the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brought us out of Egypt, out of the land of slavery. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Pharaoh stubbornly refused to let us go, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' killed the firstborn of both people and animals in Egypt. This is why I sacrifice to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' the first male offspring of every womb and redeem each of my firstborn sons.’ '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And it will be like a sign on your hand and a symbol on your forehead that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brought us out of Egypt with his mighty hand.”'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Crossing the Sea
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When Pharaoh let the people go, God did not lead them on the road through the Philistine country, though that was shorter. For God said, “If they face war, they might change their minds and return to Egypt.” '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So God led the people around by the desert road toward the Red Sea.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the Sea of Reeds
      marker-yv: yv-n
    - type: text
      text: ' The Israelites went up out of Egypt ready for battle.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moses took the bones of Joseph with him because Joseph had made the Israelites swear an oath. He had said, “God will surely come to your aid, and then you must carry my bones up with you from this place.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: See Gen. 50:25.
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Consecrate to me every firstborn male. The first offspring of every womb among the Israelites belongs to me, whether human or animal.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After leaving Sukkoth they camped at Etham on the edge of the desert. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'By day the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' went ahead of them in a pillar of cloud to guide them on their way and by night in a pillar of fire to give them light, so that they could travel by day or night. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Neither the pillar of cloud by day nor the pillar of fire by night left its place in front of the people.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Moses said to the people, “Commemorate this day, the day you came out of Egypt, out of the land of slavery, because the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brought you out of it with a mighty hand. Eat nothing containing yeast. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Today, in the month of Aviv, you are leaving. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brings you into the land of the Canaanites, Hittites, Amorites, Hivites and Jebusites—the land he swore to your ancestors to give you, a land flowing with milk and honey—you are to observe this ceremony in this month: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'For seven days eat bread made without yeast and on the seventh day hold a festival to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eat unleavened bread during those seven days; nothing with yeast in it is to be seen among you, nor shall any yeast be seen anywhere within your borders. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On that day tell your son, ‘I do this because of what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' did for me when I came out of Egypt.’ '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This observance will be for you like a sign on your hand and a reminder on your forehead that this law of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is to be on your lips. For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' brought you out of Egypt with his mighty hand. '
