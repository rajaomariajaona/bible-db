document_id: 1CH.19,111
type_code: eng
verses:
  '1':
  - type: heading
    content: David Defeats the Ammonites
  - type: text
    content: 'In the course of time, Nahash king of the Ammonites died, and his son succeeded him as king. '
  '10':
  - type: text
    content: 'Joab saw that there were battle lines in front of him and behind him; so he selected some of the best troops in Israel and deployed them against the Arameans. '
  '11':
  - type: text
    content: 'He put the rest of the men under the command of Abishai his brother, and they were deployed against the Ammonites. '
  '12':
  - type: text
    content: 'Joab said, “If the Arameans are too strong for me, then you are to rescue me; but if the Ammonites are too strong for you, then I will rescue you. '
  '13':
  - type: text
    content: 'Be strong, and let us fight bravely for our people and the cities of our God. The '
  - type: text
    content: Lord
  - type: text
    content: ' will do what is good in his sight.”'
  '14':
  - type: text
    content: 'Then Joab and the troops with him advanced to fight the Arameans, and they fled before him. '
  '15':
  - type: text
    content: When the Ammonites realized that the Arameans were fleeing, they too fled before his brother Abishai and went inside the city. So Joab went back to Jerusalem.
  '16':
  - type: text
    content: After the Arameans saw that they had been routed by Israel, they sent messengers and had Arameans brought from beyond the Euphrates River, with Shophak the commander of Hadadezer’s army leading them.
  '17':
  - type: text
    content: 'When David was told of this, he gathered all Israel and crossed the Jordan; he advanced against them and formed his battle lines opposite them. David formed his lines to meet the Arameans in battle, and they fought against him. '
  '18':
  - type: text
    content: But they fled before Israel, and David killed seven thousand of their charioteers and forty thousand of their foot soldiers. He also killed Shophak the commander of their army.
  '19':
  - type: text
    content: When the vassals of Hadadezer saw that they had been routed by Israel, they made peace with David and became subject to him.
  - type: text
    content: So the Arameans were not willing to help the Ammonites anymore.
  '2':
  - type: text
    content: David thought, “I will show kindness to Hanun son of Nahash, because his father showed kindness to me.” So David sent a delegation to express his sympathy to Hanun concerning his father.
  - type: text
    content: 'When David’s envoys came to Hanun in the land of the Ammonites to express sympathy to him, '
  '3':
  - type: text
    content: 'the Ammonite commanders said to Hanun, “Do you think David is honoring your father by sending envoys to you to express sympathy? Haven’t his envoys come to you only to explore and spy out the country and overthrow it?” '
  '4':
  - type: text
    content: So Hanun seized David’s envoys, shaved them, cut off their garments at the buttocks, and sent them away.
  '5':
  - type: text
    content: When someone came and told David about the men, he sent messengers to meet them, for they were greatly humiliated. The king said, “Stay at Jericho till your beards have grown, and then come back.”
  '6':
  - type: text
    content: When the Ammonites realized that they had become obnoxious to David, Hanun and the Ammonites sent a thousand talents
  - type: note
    content: That is, about 38 tons or about 34 metric tons
  - type: text
    content: ' of silver to hire chariots and charioteers from Aram Naharaim,'
  - type: note
    content: That is, Northwest Mesopotamia
  - type: text
    content: ' Aram Maakah and Zobah. '
  '7':
  - type: text
    content: They hired thirty-two thousand chariots and charioteers, as well as the king of Maakah with his troops, who came and camped near Medeba, while the Ammonites were mustered from their towns and moved out for battle.
  '8':
  - type: text
    content: 'On hearing this, David sent Joab out with the entire army of fighting men. '
  '9':
  - type: text
    content: The Ammonites came out and drew up in battle formation at the entrance to their city, while the kings who had come were by themselves in the open country.
