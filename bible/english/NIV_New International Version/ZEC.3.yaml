document_id: ZEC.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Clean Garments for the High Priest
  - type: text
    content: 'Then he showed me Joshua the high priest standing before the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ', and Satan'
  - type: note
    content: Hebrew satan means adversary.
  - type: text
    content: ' standing at his right side to accuse him. '
  '10':
  - type: text
    content: '“ ‘In that day each of you will invite your neighbor to sit under your vine and fig tree,’ declares the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty.”'
  '2':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Satan, “The '
  - type: text
    content: Lord
  - type: text
    content: ' rebuke you, Satan! The '
  - type: text
    content: Lord
  - type: text
    content: ', who has chosen Jerusalem, rebuke you! Is not this man a burning stick snatched from the fire?”'
  '3':
  - type: text
    content: 'Now Joshua was dressed in filthy clothes as he stood before the angel. '
  '4':
  - type: text
    content: The angel said to those who were standing before him, “Take off his filthy clothes.”
  - type: text
    content: Then he said to Joshua, “See, I have taken away your sin, and I will put fine garments on you.”
  '5':
  - type: text
    content: 'Then I said, “Put a clean turban on his head.” So they put a clean turban on his head and clothed him, while the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' stood by.'
  '6':
  - type: text
    content: 'The angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' gave this charge to Joshua: '
  '7':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says: ‘If you will walk in obedience to me and keep my requirements, then you will govern my house and have charge of my courts, and I will give you a place among these standing here.'
  '8':
  - type: text
    content: '“ ‘Listen, High Priest Joshua, you and your associates seated before you, who are men symbolic of things to come: I am going to bring my servant, the Branch. '
  '9':
  - type: text
    content: See, the stone I have set in front of Joshua! There are seven eyes
  - type: note
    content: Or facets
  - type: text
    content: ' on that one stone, and I will engrave an inscription on it,’ says the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, ‘and I will remove the sin of this land in a single day.'
