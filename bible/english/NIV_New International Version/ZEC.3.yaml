document_id: ZEC.3,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Clean Garments for the High Priest
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then he showed me Joshua the high priest standing before the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and Satan'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
        - type: usfm
          marker: tl
          children:
          - type: text
            text: satan
        - type: text
          text: ' means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: adversary.
      marker-yv: yv-n
    - type: text
      text: ' standing at his right side to accuse him. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘In that day each of you will invite your neighbor to sit under your vine and fig tree,’ declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty.”'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to Satan, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' rebuke you, Satan! The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who has chosen Jerusalem, rebuke you! Is not this man a burning stick snatched from the fire?”'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Joshua was dressed in filthy clothes as he stood before the angel. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: The angel said to those who were standing before him, “Take off his filthy clothes.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then he said to Joshua, “See, I have taken away your sin, and I will put fine garments on you.”
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then I said, “Put a clean turban on his head.” So they put a clean turban on his head and clothed him, while the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' stood by.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' gave this charge to Joshua: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty says: ‘If you will walk in obedience to me and keep my requirements, then you will govern my house and have charge of my courts, and I will give you a place among these standing here.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“ ‘Listen, High Priest Joshua, you and your associates seated before you, who are men symbolic of things to come: I am going to bring my servant, the Branch. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: See, the stone I have set in front of Joshua! There are seven eyes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: facets
      marker-yv: yv-n
    - type: text
      text: ' on that one stone, and I will engrave an inscription on it,’ says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, ‘and I will remove the sin of this land in a single day.'
