document_id: DEU.26,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Firstfruits and Tithes
  - type: text
    content: 'When you have entered the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you as an inheritance and have taken possession of it and settled in it, '
  '10':
  - type: text
    content: 'and now I bring the firstfruits of the soil that you, '
  - type: text
    content: Lord
  - type: text
    content: ', have given me.” Place the basket before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and bow down before him. '
  '11':
  - type: text
    content: 'Then you and the Levites and the foreigners residing among you shall rejoice in all the good things the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has given to you and your household.'
  '12':
  - type: text
    content: 'When you have finished setting aside a tenth of all your produce in the third year, the year of the tithe, you shall give it to the Levite, the foreigner, the fatherless and the widow, so that they may eat in your towns and be satisfied. '
  '13':
  - type: text
    content: 'Then say to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God: “I have removed from my house the sacred portion and have given it to the Levite, the foreigner, the fatherless and the widow, according to all you commanded. I have not turned aside from your commands nor have I forgotten any of them. '
  '14':
  - type: text
    content: 'I have not eaten any of the sacred portion while I was in mourning, nor have I removed any of it while I was unclean, nor have I offered any of it to the dead. I have obeyed the '
  - type: text
    content: Lord
  - type: text
    content: ' my God; I have done everything you commanded me. '
  '15':
  - type: text
    content: Look down from heaven, your holy dwelling place, and bless your people Israel and the land you have given us as you promised on oath to our ancestors, a land flowing with milk and honey.”
  - type: heading
    content: Follow the Lord’s Commands
  '16':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' your God commands you this day to follow these decrees and laws; carefully observe them with all your heart and with all your soul. '
  '17':
  - type: text
    content: 'You have declared this day that the '
  - type: text
    content: Lord
  - type: text
    content: ' is your God and that you will walk in obedience to him, that you will keep his decrees, commands and laws—that you will listen to him. '
  '18':
  - type: text
    content: 'And the '
  - type: text
    content: Lord
  - type: text
    content: ' has declared this day that you are his people, his treasured possession as he promised, and that you are to keep all his commands. '
  '19':
  - type: text
    content: 'He has declared that he will set you in praise, fame and honor high above all the nations he has made and that you will be a people holy to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God, as he promised.'
  '2':
  - type: text
    content: 'take some of the firstfruits of all that you produce from the soil of the land the '
  - type: text
    content: Lord
  - type: text
    content: ' your God is giving you and put them in a basket. Then go to the place the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will choose as a dwelling for his Name '
  '3':
  - type: text
    content: 'and say to the priest in office at the time, “I declare today to the '
  - type: text
    content: Lord
  - type: text
    content: ' your God that I have come to the land the '
  - type: text
    content: Lord
  - type: text
    content: ' swore to our ancestors to give us.” '
  '4':
  - type: text
    content: 'The priest shall take the basket from your hands and set it down in front of the altar of the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. '
  '5':
  - type: text
    content: 'Then you shall declare before the '
  - type: text
    content: Lord
  - type: text
    content: ' your God: “My father was a wandering Aramean, and he went down into Egypt with a few people and lived there and became a great nation, powerful and numerous. '
  '6':
  - type: text
    content: 'But the Egyptians mistreated us and made us suffer, subjecting us to harsh labor. '
  '7':
  - type: text
    content: 'Then we cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of our ancestors, and the '
  - type: text
    content: Lord
  - type: text
    content: ' heard our voice and saw our misery, toil and oppression. '
  '8':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' brought us out of Egypt with a mighty hand and an outstretched arm, with great terror and with signs and wonders. '
  '9':
  - type: text
    content: 'He brought us to this place and gave us this land, a land flowing with milk and honey; '
