document_id: JDG.15,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Samson’s Vengeance on the Philistines
  - type: text
    content: Later on, at the time of wheat harvest, Samson took a young goat and went to visit his wife. He said, “I’m going to my wife’s room.” But her father would not let him go in.
  '10':
  - type: text
    content: The people of Judah asked, “Why have you come to fight us?”
  - type: text
    content: “We have come to take Samson prisoner,” they answered, “to do to him as he did to us.”
  '11':
  - type: text
    content: Then three thousand men from Judah went down to the cave in the rock of Etam and said to Samson, “Don’t you realize that the Philistines are rulers over us? What have you done to us?”
  - type: text
    content: He answered, “I merely did to them what they did to me.”
  '12':
  - type: text
    content: They said to him, “We’ve come to tie you up and hand you over to the Philistines.”
  - type: text
    content: Samson said, “Swear to me that you won’t kill me yourselves.”
  '13':
  - type: text
    content: '“Agreed,” they answered. “We will only tie you up and hand you over to them. We will not kill you.” So they bound him with two new ropes and led him up from the rock. '
  '14':
  - type: text
    content: 'As he approached Lehi, the Philistines came toward him shouting. The Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' came powerfully upon him. The ropes on his arms became like charred flax, and the bindings dropped from his hands. '
  '15':
  - type: text
    content: Finding a fresh jawbone of a donkey, he grabbed it and struck down a thousand men.
  '16':
  - type: text
    content: Then Samson said,
  - type: text
    content: “With a donkey’s jawbone
  - type: text
    content: I have made donkeys of them.
  - type: note
    content: Or made a heap or two; the Hebrew for donkey sounds like the Hebrew for heap.
  - type: text
    content: With a donkey’s jawbone
  - type: text
    content: I have killed a thousand men.”
  '17':
  - type: text
    content: When he finished speaking, he threw away the jawbone; and the place was called Ramath Lehi.
  - type: note
    content: Ramath Lehi means jawbone hill.
  '18':
  - type: text
    content: 'Because he was very thirsty, he cried out to the '
  - type: text
    content: Lord
  - type: text
    content: ', “You have given your servant this great victory. Must I now die of thirst and fall into the hands of the uncircumcised?” '
  '19':
  - type: text
    content: Then God opened up the hollow place in Lehi, and water came out of it. When Samson drank, his strength returned and he revived. So the spring was called En Hakkore,
  - type: note
    content: En Hakkore means caller’s spring.
  - type: text
    content: ' and it is still there in Lehi.'
  '2':
  - type: text
    content: “I was so sure you hated her,” he said, “that I gave her to your companion. Isn’t her younger sister more attractive? Take her instead.”
  '20':
  - type: text
    content: Samson led
  - type: note
    content: Traditionally judged
  - type: text
    content: ' Israel for twenty years in the days of the Philistines.'
  '3':
  - type: text
    content: 'Samson said to them, “This time I have a right to get even with the Philistines; I will really harm them.” '
  '4':
  - type: text
    content: 'So he went out and caught three hundred foxes and tied them tail to tail in pairs. He then fastened a torch to every pair of tails, '
  '5':
  - type: text
    content: lit the torches and let the foxes loose in the standing grain of the Philistines. He burned up the shocks and standing grain, together with the vineyards and olive groves.
  '6':
  - type: text
    content: When the Philistines asked, “Who did this?” they were told, “Samson, the Timnite’s son-in-law, because his wife was given to his companion.”
  - type: text
    content: 'So the Philistines went up and burned her and her father to death. '
  '7':
  - type: text
    content: 'Samson said to them, “Since you’ve acted like this, I swear that I won’t stop until I get my revenge on you.” '
  '8':
  - type: text
    content: He attacked them viciously and slaughtered many of them. Then he went down and stayed in a cave in the rock of Etam.
  '9':
  - type: text
    content: 'The Philistines went up and camped in Judah, spreading out near Lehi. '
