document_id: JDG.15,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Samson’s Vengeance on the Philistines
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Later on, at the time of wheat harvest, Samson took a young goat and went to visit his wife. He said, “I’m going to my wife’s room.” But her father would not let him go in.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: The people of Judah asked, “Why have you come to fight us?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “We have come to take Samson prisoner,” they answered, “to do to him as he did to us.”
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Then three thousand men from Judah went down to the cave in the rock of Etam and said to Samson, “Don’t you realize that the Philistines are rulers over us? What have you done to us?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: He answered, “I merely did to them what they did to me.”
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: They said to him, “We’ve come to tie you up and hand you over to the Philistines.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samson said, “Swear to me that you won’t kill me yourselves.”
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '“Agreed,” they answered. “We will only tie you up and hand you over to them. We will not kill you.” So they bound him with two new ropes and led him up from the rock. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'As he approached Lehi, the Philistines came toward him shouting. The Spirit of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came powerfully upon him. The ropes on his arms became like charred flax, and the bindings dropped from his hands. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Finding a fresh jawbone of a donkey, he grabbed it and struck down a thousand men.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Then Samson said,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “With a donkey’s jawbone
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have made donkeys of them.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: made a heap or two
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; the Hebrew for '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'donkey '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sounds like the Hebrew for '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: heap.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With a donkey’s jawbone
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have killed a thousand men.”
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: When he finished speaking, he threw away the jawbone; and the place was called Ramath Lehi.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ramath Lehi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'jawbone '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: hill.
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Because he was very thirsty, he cried out to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “You have given your servant this great victory. Must I now die of thirst and fall into the hands of the uncircumcised?” '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Then God opened up the hollow place in Lehi, and water came out of it. When Samson drank, his strength returned and he revived. So the spring was called En Hakkore,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'En Hakkore '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'means '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'caller’s '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: spring
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' and it is still there in Lehi.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “I was so sure you hated her,” he said, “that I gave her to your companion. Isn’t her younger sister more attractive? Take her instead.”
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Samson led
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Traditionally '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: judged
      marker-yv: yv-n
    - type: text
      text: ' Israel for twenty years in the days of the Philistines.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Samson said to them, “This time I have a right to get even with the Philistines; I will really harm them.” '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'So he went out and caught three hundred foxes and tied them tail to tail in pairs. He then fastened a torch to every pair of tails, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: lit the torches and let the foxes loose in the standing grain of the Philistines. He burned up the shocks and standing grain, together with the vineyards and olive groves.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: When the Philistines asked, “Who did this?” they were told, “Samson, the Timnite’s son-in-law, because his wife was given to his companion.”
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'So the Philistines went up and burned her and her father to death. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Samson said to them, “Since you’ve acted like this, I swear that I won’t stop until I get my revenge on you.” '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: He attacked them viciously and slaughtered many of them. Then he went down and stayed in a cave in the rock of Etam.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'The Philistines went up and camped in Judah, spreading out near Lehi. '
