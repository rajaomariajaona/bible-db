document_id: JOB.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Zophar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then Zophar the Naamathite replied:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “My troubled thoughts prompt me to answer
- type: usfm
  marker: q2
  children:
  - type: text
    text: because I am greatly disturbed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: I hear a rebuke that dishonors me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my understanding inspires me to reply.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: “Surely you know how it has been from of old,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ever since mankind
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Adam
    marker-yv: yv-n
  - type: text
    text: ' was placed on the earth,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: that the mirth of the wicked is brief,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the joy of the godless lasts but a moment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Though the pride of the godless person reaches to the heavens
- type: usfm
  marker: q2
  children:
  - type: text
    text: and his head touches the clouds,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: he will perish forever, like his own dung;
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who have seen him will say, ‘Where is he?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Like a dream he flies away, no more to be found,
- type: usfm
  marker: q2
  children:
  - type: text
    text: banished like a vision of the night.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: The eye that saw him will not see him again;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his place will look on him no more.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: His children must make amends to the poor;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his own hands must give back his wealth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: The youthful vigor that fills his bones
- type: usfm
  marker: q2
  children:
  - type: text
    text: will lie with him in the dust.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: “Though evil is sweet in his mouth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he hides it under his tongue,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: though he cannot bear to let it go
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lets it linger in his mouth,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: yet his food will turn sour in his stomach;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will become the venom of serpents within him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He will spit out the riches he swallowed;
- type: usfm
  marker: q2
  children:
  - type: text
    text: God will make his stomach vomit them up.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: He will suck the poison of serpents;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the fangs of an adder will kill him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: He will not enjoy the streams,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the rivers flowing with honey and cream.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: What he toiled for he must give back uneaten;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he will not enjoy the profit from his trading.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: For he has oppressed the poor and left them destitute;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he has seized houses he did not build.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: “Surely he will have no respite from his craving;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he cannot save himself by his treasure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Nothing is left for him to devour;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his prosperity will not endure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: In the midst of his plenty, distress will overtake him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the full force of misery will come upon him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: When he has filled his belly,
- type: usfm
  marker: q2
  children:
  - type: text
    text: God will vent his burning anger against him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and rain down his blows on him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Though he flees from an iron weapon,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a bronze-tipped arrow pierces him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: He pulls it out of his back,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the gleaming point out of his liver.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Terrors will come over him;
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: total darkness lies in wait for his treasures.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A fire unfanned will consume him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and devour what is left in his tent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: The heavens will expose his guilt;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the earth will rise up against him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: A flood will carry off his house,
- type: usfm
  marker: q2
  children:
  - type: text
    text: rushing waters
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: The possessions in his house will be carried off, / washed away
    marker-yv: yv-n
  - type: text
    text: ' on the day of God’s wrath.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Such is the fate God allots the wicked,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the heritage appointed for them by God.”
