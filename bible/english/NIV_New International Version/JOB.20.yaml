document_id: JOB.20,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Zophar
  - type: text
    content: 'Then Zophar the Naamathite replied:'
  '10':
  - type: text
    content: His children must make amends to the poor;
  - type: text
    content: his own hands must give back his wealth.
  '11':
  - type: text
    content: The youthful vigor that fills his bones
  - type: text
    content: will lie with him in the dust.
  '12':
  - type: text
    content: “Though evil is sweet in his mouth
  - type: text
    content: and he hides it under his tongue,
  '13':
  - type: text
    content: though he cannot bear to let it go
  - type: text
    content: and lets it linger in his mouth,
  '14':
  - type: text
    content: yet his food will turn sour in his stomach;
  - type: text
    content: it will become the venom of serpents within him.
  '15':
  - type: text
    content: He will spit out the riches he swallowed;
  - type: text
    content: God will make his stomach vomit them up.
  '16':
  - type: text
    content: He will suck the poison of serpents;
  - type: text
    content: the fangs of an adder will kill him.
  '17':
  - type: text
    content: He will not enjoy the streams,
  - type: text
    content: the rivers flowing with honey and cream.
  '18':
  - type: text
    content: What he toiled for he must give back uneaten;
  - type: text
    content: he will not enjoy the profit from his trading.
  '19':
  - type: text
    content: For he has oppressed the poor and left them destitute;
  - type: text
    content: he has seized houses he did not build.
  '2':
  - type: text
    content: “My troubled thoughts prompt me to answer
  - type: text
    content: because I am greatly disturbed.
  '20':
  - type: text
    content: “Surely he will have no respite from his craving;
  - type: text
    content: he cannot save himself by his treasure.
  '21':
  - type: text
    content: Nothing is left for him to devour;
  - type: text
    content: his prosperity will not endure.
  '22':
  - type: text
    content: In the midst of his plenty, distress will overtake him;
  - type: text
    content: the full force of misery will come upon him.
  '23':
  - type: text
    content: When he has filled his belly,
  - type: text
    content: God will vent his burning anger against him
  - type: text
    content: and rain down his blows on him.
  '24':
  - type: text
    content: Though he flees from an iron weapon,
  - type: text
    content: a bronze-tipped arrow pierces him.
  '25':
  - type: text
    content: He pulls it out of his back,
  - type: text
    content: the gleaming point out of his liver.
  - type: text
    content: Terrors will come over him;
  '26':
  - type: text
    content: total darkness lies in wait for his treasures.
  - type: text
    content: A fire unfanned will consume him
  - type: text
    content: and devour what is left in his tent.
  '27':
  - type: text
    content: The heavens will expose his guilt;
  - type: text
    content: the earth will rise up against him.
  '28':
  - type: text
    content: A flood will carry off his house,
  - type: text
    content: rushing waters
  - type: note
    content: Or The possessions in his house will be carried off, / washed away
  - type: text
    content: ' on the day of God’s wrath.'
  '29':
  - type: text
    content: Such is the fate God allots the wicked,
  - type: text
    content: the heritage appointed for them by God.”
  '3':
  - type: text
    content: I hear a rebuke that dishonors me,
  - type: text
    content: and my understanding inspires me to reply.
  '4':
  - type: text
    content: “Surely you know how it has been from of old,
  - type: text
    content: ever since mankind
  - type: note
    content: Or Adam
  - type: text
    content: ' was placed on the earth,'
  '5':
  - type: text
    content: that the mirth of the wicked is brief,
  - type: text
    content: the joy of the godless lasts but a moment.
  '6':
  - type: text
    content: Though the pride of the godless person reaches to the heavens
  - type: text
    content: and his head touches the clouds,
  '7':
  - type: text
    content: he will perish forever, like his own dung;
  - type: text
    content: those who have seen him will say, ‘Where is he?’
  '8':
  - type: text
    content: Like a dream he flies away, no more to be found,
  - type: text
    content: banished like a vision of the night.
  '9':
  - type: text
    content: The eye that saw him will not see him again;
  - type: text
    content: his place will look on him no more.
