document_id: 1SA.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Ark in Ashdod and Ekron
  - type: text
    content: 'After the Philistines had captured the ark of God, they took it from Ebenezer to Ashdod. '
  '10':
  - type: text
    content: So they sent the ark of God to Ekron.
  - type: text
    content: 'As the ark of God was entering Ekron, the people of Ekron cried out, “They have brought the ark of the god of Israel around to us to kill us and our people.” '
  '11':
  - type: text
    content: So they called together all the rulers of the Philistines and said, “Send the ark of the god of Israel away; let it go back to its own place, or it
  - type: note
    content: Or he
  - type: text
    content: ' will kill us and our people.” For death had filled the city with panic; God’s hand was very heavy on it. '
  '12':
  - type: text
    content: Those who did not die were afflicted with tumors, and the outcry of the city went up to heaven.
  '2':
  - type: text
    content: 'Then they carried the ark into Dagon’s temple and set it beside Dagon. '
  '3':
  - type: text
    content: 'When the people of Ashdod rose early the next day, there was Dagon, fallen on his face on the ground before the ark of the '
  - type: text
    content: Lord
  - type: text
    content: '! They took Dagon and put him back in his place. '
  '4':
  - type: text
    content: 'But the following morning when they rose, there was Dagon, fallen on his face on the ground before the ark of the '
  - type: text
    content: Lord
  - type: text
    content: '! His head and hands had been broken off and were lying on the threshold; only his body remained. '
  '5':
  - type: text
    content: That is why to this day neither the priests of Dagon nor any others who enter Dagon’s temple at Ashdod step on the threshold.
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ’s hand was heavy on the people of Ashdod and its vicinity; he brought devastation on them and afflicted them with tumors.
  - type: note
    content: Hebrew; Septuagint and Vulgate tumors. And rats appeared in their land, and there was death and destruction throughout the city
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'When the people of Ashdod saw what was happening, they said, “The ark of the god of Israel must not stay here with us, because his hand is heavy on us and on Dagon our god.” '
  '8':
  - type: text
    content: So they called together all the rulers of the Philistines and asked them, “What shall we do with the ark of the god of Israel?”
  - type: text
    content: They answered, “Have the ark of the god of Israel moved to Gath.” So they moved the ark of the God of Israel.
  '9':
  - type: text
    content: 'But after they had moved it, the '
  - type: text
    content: Lord
  - type: text
    content: ’s hand was against that city, throwing it into a great panic. He afflicted the people of the city, both young and old, with an outbreak of tumors.
  - type: note
    content: Or with tumors in the groin (see Septuagint)
  - type: text
    content: ' '
