document_id: HEB.4,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Sabbath-Rest for the People of God
  - type: text
    content: 'Therefore, since the promise of entering his rest still stands, let us be careful that none of you be found to have fallen short of it. '
  '10':
  - type: text
    content: for anyone who enters God’s rest also rests from their works,
  - type: note
    content: Or labor
  - type: text
    content: ' just as God did from his. '
  '11':
  - type: text
    content: Let us, therefore, make every effort to enter that rest, so that no one will perish by following their example of disobedience.
  '12':
  - type: text
    content: 'For the word of God is alive and active. Sharper than any double-edged sword, it penetrates even to dividing soul and spirit, joints and marrow; it judges the thoughts and attitudes of the heart. '
  '13':
  - type: text
    content: Nothing in all creation is hidden from God’s sight. Everything is uncovered and laid bare before the eyes of him to whom we must give account.
  - type: heading
    content: Jesus the Great High Priest
  '14':
  - type: text
    content: Therefore, since we have a great high priest who has ascended into heaven,
  - type: note
    content: Greek has gone through the heavens
  - type: text
    content: ' Jesus the Son of God, let us hold firmly to the faith we profess. '
  '15':
  - type: text
    content: 'For we do not have a high priest who is unable to empathize with our weaknesses, but we have one who has been tempted in every way, just as we are—yet he did not sin. '
  '16':
  - type: text
    content: Let us then approach God’s throne of grace with confidence, so that we may receive mercy and find grace to help us in our time of need.
  '2':
  - type: text
    content: For we also have had the good news proclaimed to us, just as they did; but the message they heard was of no value to them, because they did not share the faith of those who obeyed.
  - type: note
    content: Some manuscripts because those who heard did not combine it with faith
  - type: text
    content: ' '
  '3':
  - type: text
    content: Now we who have believed enter that rest, just as God has said,
  - type: text
    content: “So I declared on oath in my anger,
  - type: text
    content: ‘They shall never enter my rest.’ ”
  - type: note
    content: Psalm 95:11; also in verse 5
  - type: text
    content: 'And yet his works have been finished since the creation of the world. '
  '4':
  - type: text
    content: 'For somewhere he has spoken about the seventh day in these words: “On the seventh day God rested from all his works.”'
  - type: note
    content: Gen. 2:2
  - type: text
    content: ' '
  '5':
  - type: text
    content: And again in the passage above he says, “They shall never enter my rest.”
  '6':
  - type: text
    content: 'Therefore since it still remains for some to enter that rest, and since those who formerly had the good news proclaimed to them did not go in because of their disobedience, '
  '7':
  - type: text
    content: 'God again set a certain day, calling it “Today.” This he did when a long time later he spoke through David, as in the passage already quoted:'
  - type: text
    content: “Today, if you hear his voice,
  - type: text
    content: do not harden your hearts.”
  - type: note
    content: Psalm 95:7,8
  '8':
  - type: text
    content: 'For if Joshua had given them rest, God would not have spoken later about another day. '
  '9':
  - type: text
    content: 'There remains, then, a Sabbath-rest for the people of God; '
