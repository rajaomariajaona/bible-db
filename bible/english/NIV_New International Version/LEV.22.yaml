document_id: LEV.22,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '10':
  - type: text
    content: '“ ‘No one outside a priest’s family may eat the sacred offering, nor may the guest of a priest or his hired worker eat it. '
  '11':
  - type: text
    content: 'But if a priest buys a slave with money, or if slaves are born in his household, they may eat his food. '
  '12':
  - type: text
    content: 'If a priest’s daughter marries anyone other than a priest, she may not eat any of the sacred contributions. '
  '13':
  - type: text
    content: But if a priest’s daughter becomes a widow or is divorced, yet has no children, and she returns to live in her father’s household as in her youth, she may eat her father’s food. No unauthorized person, however, may eat it.
  '14':
  - type: text
    content: '“ ‘Anyone who eats a sacred offering by mistake must make restitution to the priest for the offering and add a fifth of the value to it. '
  '15':
  - type: text
    content: 'The priests must not desecrate the sacred offerings the Israelites present to the '
  - type: text
    content: Lord
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'by allowing them to eat the sacred offerings and so bring upon them guilt requiring payment. I am the '
  - type: text
    content: Lord
  - type: text
    content: ', who makes them holy.’ ”'
  - type: heading
    content: Unacceptable Sacrifices
  '17':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '18':
  - type: text
    content: '“Speak to Aaron and his sons and to all the Israelites and say to them: ‘If any of you—whether an Israelite or a foreigner residing in Israel—presents a gift for a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', either to fulfill a vow or as a freewill offering, '
  '19':
  - type: text
    content: 'you must present a male without defect from the cattle, sheep or goats in order that it may be accepted on your behalf. '
  '2':
  - type: text
    content: '“Tell Aaron and his sons to treat with respect the sacred offerings the Israelites consecrate to me, so they will not profane my holy name. I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '20':
  - type: text
    content: 'Do not bring anything with a defect, because it will not be accepted on your behalf. '
  '21':
  - type: text
    content: 'When anyone brings from the herd or flock a fellowship offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' to fulfill a special vow or as a freewill offering, it must be without defect or blemish to be acceptable. '
  '22':
  - type: text
    content: 'Do not offer to the '
  - type: text
    content: Lord
  - type: text
    content: ' the blind, the injured or the maimed, or anything with warts or festering or running sores. Do not place any of these on the altar as a food offering presented to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '23':
  - type: text
    content: You may, however, present as a freewill offering an ox
  - type: note
    content: The Hebrew word can refer to either male or female.
  - type: text
    content: ' or a sheep that is deformed or stunted, but it will not be accepted in fulfillment of a vow. '
  '24':
  - type: text
    content: 'You must not offer to the '
  - type: text
    content: Lord
  - type: text
    content: ' an animal whose testicles are bruised, crushed, torn or cut. You must not do this in your own land, '
  '25':
  - type: text
    content: and you must not accept such animals from the hand of a foreigner and offer them as the food of your God. They will not be accepted on your behalf, because they are deformed and have defects.’ ”
  '26':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '27':
  - type: text
    content: '“When a calf, a lamb or a goat is born, it is to remain with its mother for seven days. From the eighth day on, it will be acceptable as a food offering presented to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '28':
  - type: text
    content: Do not slaughter a cow or a sheep and its young on the same day.
  '29':
  - type: text
    content: '“When you sacrifice a thank offering to the '
  - type: text
    content: Lord
  - type: text
    content: ', sacrifice it in such a way that it will be accepted on your behalf. '
  '3':
  - type: text
    content: '“Say to them: ‘For the generations to come, if any of your descendants is ceremonially unclean and yet comes near the sacred offerings that the Israelites consecrate to the '
  - type: text
    content: Lord
  - type: text
    content: ', that person must be cut off from my presence. I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '30':
  - type: text
    content: 'It must be eaten that same day; leave none of it till morning. I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '31':
  - type: text
    content: '“Keep my commands and follow them. I am the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Do not profane my holy name, for I must be acknowledged as holy by the Israelites. I am the '
  - type: text
    content: Lord
  - type: text
    content: ', who made you holy '
  '33':
  - type: text
    content: 'and who brought you out of Egypt to be your God. I am the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '4':
  - type: text
    content: “ ‘If a descendant of Aaron has a defiling skin disease
  - type: note
    content: The Hebrew word for defiling skin disease, traditionally translated “leprosy,” was used for various diseases affecting the skin.
  - type: text
    content: ' or a bodily discharge, he may not eat the sacred offerings until he is cleansed. He will also be unclean if he touches something defiled by a corpse or by anyone who has an emission of semen, '
  '5':
  - type: text
    content: 'or if he touches any crawling thing that makes him unclean, or any person who makes him unclean, whatever the uncleanness may be. '
  '6':
  - type: text
    content: 'The one who touches any such thing will be unclean till evening. He must not eat any of the sacred offerings unless he has bathed himself with water. '
  '7':
  - type: text
    content: 'When the sun goes down, he will be clean, and after that he may eat the sacred offerings, for they are his food. '
  '8':
  - type: text
    content: 'He must not eat anything found dead or torn by wild animals, and so become unclean through it. I am the '
  - type: text
    content: Lord
  - type: text
    content: .
  '9':
  - type: text
    content: '“ ‘The priests are to perform my service in such a way that they do not become guilty and die for treating it with contempt. I am the '
  - type: text
    content: Lord
  - type: text
    content: ', who makes them holy.'
