document_id: JER.31,111
type_code: eng
verses:
  '1':
  - type: text
    content: '“At that time,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “I will be the God of all the families of Israel, and they will be my people.”'
  '10':
  - type: text
    content: '“Hear the word of the '
  - type: text
    content: Lord
  - type: text
    content: ', you nations;'
  - type: text
    content: 'proclaim it in distant coastlands:'
  - type: text
    content: ‘He who scattered Israel will gather them
  - type: text
    content: and will watch over his flock like a shepherd.’
  '11':
  - type: text
    content: 'For the '
  - type: text
    content: Lord
  - type: text
    content: ' will deliver Jacob'
  - type: text
    content: and redeem them from the hand of those stronger than they.
  '12':
  - type: text
    content: They will come and shout for joy on the heights of Zion;
  - type: text
    content: 'they will rejoice in the bounty of the '
  - type: text
    content: Lord
  - type: text
    content: —
  - type: text
    content: the grain, the new wine and the olive oil,
  - type: text
    content: the young of the flocks and herds.
  - type: text
    content: They will be like a well-watered garden,
  - type: text
    content: and they will sorrow no more.
  '13':
  - type: text
    content: Then young women will dance and be glad,
  - type: text
    content: young men and old as well.
  - type: text
    content: I will turn their mourning into gladness;
  - type: text
    content: I will give them comfort and joy instead of sorrow.
  '14':
  - type: text
    content: I will satisfy the priests with abundance,
  - type: text
    content: and my people will be filled with my bounty,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '15':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “A voice is heard in Ramah,
  - type: text
    content: mourning and great weeping,
  - type: text
    content: Rachel weeping for her children
  - type: text
    content: and refusing to be comforted,
  - type: text
    content: because they are no more.”
  '16':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Restrain your voice from weeping
  - type: text
    content: and your eyes from tears,
  - type: text
    content: for your work will be rewarded,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “They will return from the land of the enemy.
  '17':
  - type: text
    content: So there is hope for your descendants,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “Your children will return to their own land.
  '18':
  - type: text
    content: '“I have surely heard Ephraim’s moaning:'
  - type: text
    content: ‘You disciplined me like an unruly calf,
  - type: text
    content: and I have been disciplined.
  - type: text
    content: Restore me, and I will return,
  - type: text
    content: 'because you are the '
  - type: text
    content: Lord
  - type: text
    content: ' my God.'
  '19':
  - type: text
    content: After I strayed,
  - type: text
    content: I repented;
  - type: text
    content: after I came to understand,
  - type: text
    content: I beat my breast.
  - type: text
    content: I was ashamed and humiliated
  - type: text
    content: because I bore the disgrace of my youth.’
  '2':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “The people who survive the sword
  - type: text
    content: will find favor in the wilderness;
  - type: text
    content: I will come to give rest to Israel.”
  '20':
  - type: text
    content: Is not Ephraim my dear son,
  - type: text
    content: the child in whom I delight?
  - type: text
    content: Though I often speak against him,
  - type: text
    content: I still remember him.
  - type: text
    content: Therefore my heart yearns for him;
  - type: text
    content: I have great compassion for him,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '21':
  - type: text
    content: “Set up road signs;
  - type: text
    content: put up guideposts.
  - type: text
    content: Take note of the highway,
  - type: text
    content: the road that you take.
  - type: text
    content: Return, Virgin Israel,
  - type: text
    content: return to your towns.
  '22':
  - type: text
    content: How long will you wander,
  - type: text
    content: unfaithful Daughter Israel?
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will create a new thing on earth—'
  - type: text
    content: the woman will return to
  - type: note
    content: Or will protect
  - type: text
    content: ' the man.”'
  '23':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, says: “When I bring them back from captivity,'
  - type: note
    content: Or I restore their fortunes
  - type: text
    content: ' the people in the land of Judah and in its towns will once again use these words: ‘The '
  - type: text
    content: Lord
  - type: text
    content: ' bless you, you prosperous city, you sacred mountain.’ '
  '24':
  - type: text
    content: 'People will live together in Judah and all its towns—farmers and those who move about with their flocks. '
  '25':
  - type: text
    content: I will refresh the weary and satisfy the faint.”
  '26':
  - type: text
    content: At this I awoke and looked around. My sleep had been pleasant to me.
  '27':
  - type: text
    content: '“The days are coming,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “when I will plant the kingdoms of Israel and Judah with the offspring of people and of animals. '
  '28':
  - type: text
    content: 'Just as I watched over them to uproot and tear down, and to overthrow, destroy and bring disaster, so I will watch over them to build and to plant,” declares the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '29':
  - type: text
    content: “In those days people will no longer say,
  - type: text
    content: ‘The parents have eaten sour grapes,
  - type: text
    content: and the children’s teeth are set on edge.’
  '3':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' appeared to us in the past,'
  - type: note
    content: Or Lord has appeared to us from afar
  - type: text
    content: ' saying:'
  - type: text
    content: “I have loved you with an everlasting love;
  - type: text
    content: I have drawn you with unfailing kindness.
  '30':
  - type: text
    content: Instead, everyone will die for their own sin; whoever eats sour grapes—their own teeth will be set on edge.
  '31':
  - type: text
    content: '“The days are coming,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “when I will make a new covenant
  - type: text
    content: with the people of Israel
  - type: text
    content: and with the people of Judah.
  '32':
  - type: text
    content: It will not be like the covenant
  - type: text
    content: I made with their ancestors
  - type: text
    content: when I took them by the hand
  - type: text
    content: to lead them out of Egypt,
  - type: text
    content: because they broke my covenant,
  - type: text
    content: though I was a husband to
  - type: note
    content: Hebrew; Septuagint and Syriac / and I turned away from
  - type: text
    content: ' them,'
  - type: note
    content: Or was their master
  - type: text
    content: ”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '33':
  - type: text
    content: “This is the covenant I will make with the people of Israel
  - type: text
    content: 'after that time,” declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “I will put my law in their minds
  - type: text
    content: and write it on their hearts.
  - type: text
    content: I will be their God,
  - type: text
    content: and they will be my people.
  '34':
  - type: text
    content: No longer will they teach their neighbor,
  - type: text
    content: 'or say to one another, ‘Know the '
  - type: text
    content: Lord
  - type: text
    content: ',’'
  - type: text
    content: because they will all know me,
  - type: text
    content: from the least of them to the greatest,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: text
    content: “For I will forgive their wickedness
  - type: text
    content: and will remember their sins no more.”
  '35':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says,'
  - type: text
    content: he who appoints the sun
  - type: text
    content: to shine by day,
  - type: text
    content: who decrees the moon and stars
  - type: text
    content: to shine by night,
  - type: text
    content: who stirs up the sea
  - type: text
    content: so that its waves roar—
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty is his name:'
  '36':
  - type: text
    content: “Only if these decrees vanish from my sight,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “will Israel ever cease
  - type: text
    content: being a nation before me.”
  '37':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Only if the heavens above can be measured
  - type: text
    content: and the foundations of the earth below be searched out
  - type: text
    content: will I reject all the descendants of Israel
  - type: text
    content: because of all they have done,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '38':
  - type: text
    content: '“The days are coming,” declares the '
  - type: text
    content: Lord
  - type: text
    content: ', “when this city will be rebuilt for me from the Tower of Hananel to the Corner Gate. '
  '39':
  - type: text
    content: 'The measuring line will stretch from there straight to the hill of Gareb and then turn to Goah. '
  '4':
  - type: text
    content: I will build you up again,
  - type: text
    content: and you, Virgin Israel, will be rebuilt.
  - type: text
    content: Again you will take up your timbrels
  - type: text
    content: and go out to dance with the joyful.
  '40':
  - type: text
    content: 'The whole valley where dead bodies and ashes are thrown, and all the terraces out to the Kidron Valley on the east as far as the corner of the Horse Gate, will be holy to the '
  - type: text
    content: Lord
  - type: text
    content: . The city will never again be uprooted or demolished.”
  '5':
  - type: text
    content: Again you will plant vineyards
  - type: text
    content: on the hills of Samaria;
  - type: text
    content: the farmers will plant them
  - type: text
    content: and enjoy their fruit.
  '6':
  - type: text
    content: There will be a day when watchmen cry out
  - type: text
    content: on the hills of Ephraim,
  - type: text
    content: ‘Come, let us go up to Zion,
  - type: text
    content: 'to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God.’ ”'
  '7':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says:'
  - type: text
    content: “Sing with joy for Jacob;
  - type: text
    content: shout for the foremost of the nations.
  - type: text
    content: Make your praises heard, and say,
  - type: text
    content: ‘
  - type: text
    content: Lord
  - type: text
    content: ', save your people,'
  - type: text
    content: the remnant of Israel.’
  '8':
  - type: text
    content: See, I will bring them from the land of the north
  - type: text
    content: and gather them from the ends of the earth.
  - type: text
    content: Among them will be the blind and the lame,
  - type: text
    content: expectant mothers and women in labor;
  - type: text
    content: a great throng will return.
  '9':
  - type: text
    content: They will come with weeping;
  - type: text
    content: they will pray as I bring them back.
  - type: text
    content: I will lead them beside streams of water
  - type: text
    content: on a level path where they will not stumble,
  - type: text
    content: because I am Israel’s father,
  - type: text
    content: and Ephraim is my firstborn son.
