document_id: JER.31,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '“At that time,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “I will be the God of all the families of Israel, and they will be my people.”'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“Hear the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', you nations;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'proclaim it in distant coastlands:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘He who scattered Israel will gather them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will watch over his flock like a shepherd.’
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'For the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will deliver Jacob'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and redeem them from the hand of those stronger than they.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: They will come and shout for joy on the heights of Zion;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'they will rejoice in the bounty of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: —
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the grain, the new wine and the olive oil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the young of the flocks and herds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They will be like a well-watered garden,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will sorrow no more.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Then young women will dance and be glad,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: young men and old as well.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will turn their mourning into gladness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will give them comfort and joy instead of sorrow.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: I will satisfy the priests with abundance,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my people will be filled with my bounty,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “A voice is heard in Ramah,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: mourning and great weeping,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rachel weeping for her children
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and refusing to be comforted,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because they are no more.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Restrain your voice from weeping
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and your eyes from tears,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for your work will be rewarded,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “They will return from the land of the enemy.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: So there is hope for your descendants,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “Your children will return to their own land.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“I have surely heard Ephraim’s moaning:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘You disciplined me like an unruly calf,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I have been disciplined.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Restore me, and I will return,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'because you are the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' my God.'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: After I strayed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I repented;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: after I came to understand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I beat my breast.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I was ashamed and humiliated
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because I bore the disgrace of my youth.’
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “The people who survive the sword
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will find favor in the wilderness;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will come to give rest to Israel.”
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Is not Ephraim my dear son,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the child in whom I delight?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though I often speak against him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I still remember him.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore my heart yearns for him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have great compassion for him,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: “Set up road signs;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: put up guideposts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Take note of the highway,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the road that you take.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Return, Virgin Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: return to your towns.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: How long will you wander,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: unfaithful Daughter Israel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will create a new thing on earth—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the woman will return to
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: will protect
      marker-yv: yv-n
    - type: text
      text: ' the man.”'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, the God of Israel, says: “When I bring them back from captivity,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: I restore their fortunes
      marker-yv: yv-n
    - type: text
      text: ' the people in the land of Judah and in its towns will once again use these words: ‘The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' bless you, you prosperous city, you sacred mountain.’ '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'People will live together in Judah and all its towns—farmers and those who move about with their flocks. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: I will refresh the weary and satisfy the faint.”
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: At this I awoke and looked around. My sleep had been pleasant to me.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '“The days are coming,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “when I will plant the kingdoms of Israel and Judah with the offspring of people and of animals. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Just as I watched over them to uproot and tear down, and to overthrow, destroy and bring disaster, so I will watch over them to build and to plant,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: “In those days people will no longer say,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘The parents have eaten sour grapes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the children’s teeth are set on edge.’
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' appeared to us in the past,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
        - type: text
          text: ' has appeared to us from afar'
      marker-yv: yv-n
    - type: text
      text: ' saying:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I have loved you with an everlasting love;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have drawn you with unfailing kindness.
  '30':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Instead, everyone will die for their own sin; whoever eats sour grapes—their own teeth will be set on edge.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: '“The days are coming,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “when I will make a new covenant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: with the people of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and with the people of Judah.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: It will not be like the covenant
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I made with their ancestors
  - type: usfm
    marker: q1
    children:
    - type: text
      text: when I took them by the hand
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to lead them out of Egypt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because they broke my covenant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though I was a husband to
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew; Septuagint and Syriac '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: / and I turned away from
      marker-yv: yv-n
    - type: text
      text: ' them,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31:32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: was their master
      marker-yv: yv-n
    - type: text
      text: ”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: “This is the covenant I will make with the people of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'after that time,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will put my law in their minds
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and write it on their hearts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will be their God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they will be my people.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: No longer will they teach their neighbor,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'or say to one another, ‘Know the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ',’'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because they will all know me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the least of them to the greatest,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “For I will forgive their wickedness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and will remember their sins no more.”
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he who appoints the sun
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to shine by day,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who decrees the moon and stars
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to shine by night,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who stirs up the sea
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that its waves roar—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty is his name:'
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: “Only if these decrees vanish from my sight,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “will Israel ever cease
  - type: usfm
    marker: q2
    children:
    - type: text
      text: being a nation before me.”
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Only if the heavens above can be measured
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the foundations of the earth below be searched out
  - type: usfm
    marker: q1
    children:
    - type: text
      text: will I reject all the descendants of Israel
  - type: usfm
    marker: q2
    children:
    - type: text
      text: because of all they have done,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: '“The days are coming,” declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “when this city will be rebuilt for me from the Tower of Hananel to the Corner Gate. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'The measuring line will stretch from there straight to the hill of Gareb and then turn to Goah. '
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: I will build you up again,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you, Virgin Israel, will be rebuilt.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Again you will take up your timbrels
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and go out to dance with the joyful.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'The whole valley where dead bodies and ashes are thrown, and all the terraces out to the Kidron Valley on the east as far as the corner of the Horse Gate, will be holy to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: . The city will never again be uprooted or demolished.”
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Again you will plant vineyards
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the hills of Samaria;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the farmers will plant them
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and enjoy their fruit.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: There will be a day when watchmen cry out
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the hills of Ephraim,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Come, let us go up to Zion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God.’ ”'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Sing with joy for Jacob;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: shout for the foremost of the nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Make your praises heard, and say,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', save your people,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the remnant of Israel.’
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: See, I will bring them from the land of the north
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and gather them from the ends of the earth.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Among them will be the blind and the lame,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: expectant mothers and women in labor;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a great throng will return.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: They will come with weeping;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will pray as I bring them back.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will lead them beside streams of water
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on a level path where they will not stumble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because I am Israel’s father,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Ephraim is my firstborn son.
