document_id: ISA.53,111
type_code: eng
verses:
  '1':
  - type: text
    content: Who has believed our message
  - type: text
    content: 'and to whom has the arm of the '
  - type: text
    content: Lord
  - type: text
    content: ' been revealed?'
  '10':
  - type: text
    content: 'Yet it was the '
  - type: text
    content: Lord
  - type: text
    content: ’s will to crush him and cause him to suffer,
  - type: text
    content: 'and though the '
  - type: text
    content: Lord
  - type: text
    content: ' makes'
  - type: note
    content: Hebrew though you make
  - type: text
    content: ' his life an offering for sin,'
  - type: text
    content: he will see his offspring and prolong his days,
  - type: text
    content: 'and the will of the '
  - type: text
    content: Lord
  - type: text
    content: ' will prosper in his hand.'
  '11':
  - type: text
    content: After he has suffered,
  - type: text
    content: he will see the light of life
  - type: note
    content: Dead Sea Scrolls (see also Septuagint); Masoretic Text does not have the light of life.
  - type: text
    content: ' and be satisfied'
  - type: note
    content: Or (with Masoretic Text) 11 He will see the fruit of his suffering / and will be satisfied
  - type: text
    content: ;
  - type: text
    content: by his knowledge
  - type: note
    content: Or by knowledge of him
  - type: text
    content: ' my righteous servant will justify many,'
  - type: text
    content: and he will bear their iniquities.
  '12':
  - type: text
    content: Therefore I will give him a portion among the great,
  - type: note
    content: Or many
  - type: text
    content: and he will divide the spoils with the strong,
  - type: note
    content: Or numerous
  - type: text
    content: because he poured out his life unto death,
  - type: text
    content: and was numbered with the transgressors.
  - type: text
    content: For he bore the sin of many,
  - type: text
    content: and made intercession for the transgressors.
  '2':
  - type: text
    content: He grew up before him like a tender shoot,
  - type: text
    content: and like a root out of dry ground.
  - type: text
    content: He had no beauty or majesty to attract us to him,
  - type: text
    content: nothing in his appearance that we should desire him.
  '3':
  - type: text
    content: He was despised and rejected by mankind,
  - type: text
    content: a man of suffering, and familiar with pain.
  - type: text
    content: Like one from whom people hide their faces
  - type: text
    content: he was despised, and we held him in low esteem.
  '4':
  - type: text
    content: Surely he took up our pain
  - type: text
    content: and bore our suffering,
  - type: text
    content: yet we considered him punished by God,
  - type: text
    content: stricken by him, and afflicted.
  '5':
  - type: text
    content: But he was pierced for our transgressions,
  - type: text
    content: he was crushed for our iniquities;
  - type: text
    content: the punishment that brought us peace was on him,
  - type: text
    content: and by his wounds we are healed.
  '6':
  - type: text
    content: We all, like sheep, have gone astray,
  - type: text
    content: each of us has turned to our own way;
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' has laid on him'
  - type: text
    content: the iniquity of us all.
  '7':
  - type: text
    content: He was oppressed and afflicted,
  - type: text
    content: yet he did not open his mouth;
  - type: text
    content: he was led like a lamb to the slaughter,
  - type: text
    content: and as a sheep before its shearers is silent,
  - type: text
    content: so he did not open his mouth.
  '8':
  - type: text
    content: By oppression
  - type: note
    content: Or From arrest
  - type: text
    content: ' and judgment he was taken away.'
  - type: text
    content: Yet who of his generation protested?
  - type: text
    content: For he was cut off from the land of the living;
  - type: text
    content: for the transgression of my people he was punished.
  - type: note
    content: Or generation considered / that he was cut off from the land of the living, / that he was punished for the transgression of my people?
  '9':
  - type: text
    content: He was assigned a grave with the wicked,
  - type: text
    content: and with the rich in his death,
  - type: text
    content: though he had done no violence,
  - type: text
    content: nor was any deceit in his mouth.
