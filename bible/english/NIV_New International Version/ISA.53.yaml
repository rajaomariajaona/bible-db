document_id: ISA.53,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who has believed our message
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and to whom has the arm of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' been revealed?'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Yet it was the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s will to crush him and cause him to suffer,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and though the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' makes'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: though you make
      marker-yv: yv-n
    - type: text
      text: ' his life an offering for sin,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he will see his offspring and prolong his days,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'and the will of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' will prosper in his hand.'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: After he has suffered,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will see the light of life
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dead Sea Scrolls (see also Septuagint); Masoretic Text does not have '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: the light of life
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' and be satisfied'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or (with Masoretic Text) '
      - type: usfm
        marker: fv
        children:
        - type: text
          text: '11 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: He will see the fruit of his suffering / and will be satisfied
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: by his knowledge
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: by knowledge of him
      marker-yv: yv-n
    - type: text
      text: ' my righteous servant will justify many,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he will bear their iniquities.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore I will give him a portion among the great,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: many
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and he will divide the spoils with the strong,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: numerous
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: because he poured out his life unto death,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and was numbered with the transgressors.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he bore the sin of many,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and made intercession for the transgressors.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He grew up before him like a tender shoot,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and like a root out of dry ground.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He had no beauty or majesty to attract us to him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nothing in his appearance that we should desire him.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He was despised and rejected by mankind,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: a man of suffering, and familiar with pain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Like one from whom people hide their faces
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he was despised, and we held him in low esteem.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely he took up our pain
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bore our suffering,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: yet we considered him punished by God,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: stricken by him, and afflicted.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But he was pierced for our transgressions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he was crushed for our iniquities;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: the punishment that brought us peace was on him,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and by his wounds we are healed.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: We all, like sheep, have gone astray,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: each of us has turned to our own way;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'and the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has laid on him'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the iniquity of us all.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He was oppressed and afflicted,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: yet he did not open his mouth;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: he was led like a lamb to the slaughter,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and as a sheep before its shearers is silent,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so he did not open his mouth.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: By oppression
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: From arrest
      marker-yv: yv-n
    - type: text
      text: ' and judgment he was taken away.'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Yet who of his generation protested?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he was cut off from the land of the living;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the transgression of my people he was punished.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: generation considered / that he was cut off from the land of the living, / that he was punished for the transgression of my people?
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He was assigned a grave with the wicked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and with the rich in his death,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: though he had done no violence,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor was any deceit in his mouth.
