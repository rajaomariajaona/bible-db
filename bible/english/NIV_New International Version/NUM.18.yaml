document_id: NUM.18,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Duties of Priests and Levites
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Aaron, “You, your sons and your family are to bear the responsibility for offenses connected with the sanctuary, and you and your sons alone are to bear the responsibility for offenses connected with the priesthood. '
  '10':
  - type: text
    content: Eat it as something most holy; every male shall eat it. You must regard it as holy.
  '11':
  - type: text
    content: '“This also is yours: whatever is set aside from the gifts of all the wave offerings of the Israelites. I give this to you and your sons and daughters as your perpetual share. Everyone in your household who is ceremonially clean may eat it.'
  '12':
  - type: text
    content: '“I give you all the finest olive oil and all the finest new wine and grain they give the '
  - type: text
    content: Lord
  - type: text
    content: ' as the firstfruits of their harvest. '
  '13':
  - type: text
    content: 'All the land’s firstfruits that they bring to the '
  - type: text
    content: Lord
  - type: text
    content: ' will be yours. Everyone in your household who is ceremonially clean may eat it.'
  '14':
  - type: text
    content: “Everything in Israel that is devoted
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord.
  - type: text
    content: ' to the '
  - type: text
    content: Lord
  - type: text
    content: ' is yours. '
  '15':
  - type: text
    content: 'The first offspring of every womb, both human and animal, that is offered to the '
  - type: text
    content: Lord
  - type: text
    content: ' is yours. But you must redeem every firstborn son and every firstborn male of unclean animals. '
  '16':
  - type: text
    content: When they are a month old, you must redeem them at the redemption price set at five shekels
  - type: note
    content: That is, about 2 ounces or about 58 grams
  - type: text
    content: ' of silver, according to the sanctuary shekel, which weighs twenty gerahs.'
  '17':
  - type: text
    content: '“But you must not redeem the firstborn of a cow, a sheep or a goat; they are holy. Splash their blood against the altar and burn their fat as a food offering, an aroma pleasing to the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '18':
  - type: text
    content: 'Their meat is to be yours, just as the breast of the wave offering and the right thigh are yours. '
  '19':
  - type: text
    content: 'Whatever is set aside from the holy offerings the Israelites present to the '
  - type: text
    content: Lord
  - type: text
    content: ' I give to you and your sons and daughters as your perpetual share. It is an everlasting covenant of salt before the '
  - type: text
    content: Lord
  - type: text
    content: ' for both you and your offspring.”'
  '2':
  - type: text
    content: 'Bring your fellow Levites from your ancestral tribe to join you and assist you when you and your sons minister before the tent of the covenant law. '
  '20':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Aaron, “You will have no inheritance in their land, nor will you have any share among them; I am your share and your inheritance among the Israelites.'
  '21':
  - type: text
    content: '“I give to the Levites all the tithes in Israel as their inheritance in return for the work they do while serving at the tent of meeting. '
  '22':
  - type: text
    content: 'From now on the Israelites must not go near the tent of meeting, or they will bear the consequences of their sin and will die. '
  '23':
  - type: text
    content: 'It is the Levites who are to do the work at the tent of meeting and bear the responsibility for any offenses they commit against it. This is a lasting ordinance for the generations to come. They will receive no inheritance among the Israelites. '
  '24':
  - type: text
    content: 'Instead, I give to the Levites as their inheritance the tithes that the Israelites present as an offering to the '
  - type: text
    content: Lord
  - type: text
    content: '. That is why I said concerning them: ‘They will have no inheritance among the Israelites.’ ”'
  '25':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '26':
  - type: text
    content: '“Speak to the Levites and say to them: ‘When you receive from the Israelites the tithe I give you as your inheritance, you must present a tenth of that tithe as the '
  - type: text
    content: Lord
  - type: text
    content: '’s offering. '
  '27':
  - type: text
    content: 'Your offering will be reckoned to you as grain from the threshing floor or juice from the winepress. '
  '28':
  - type: text
    content: 'In this way you also will present an offering to the '
  - type: text
    content: Lord
  - type: text
    content: ' from all the tithes you receive from the Israelites. From these tithes you must give the '
  - type: text
    content: Lord
  - type: text
    content: '’s portion to Aaron the priest. '
  '29':
  - type: text
    content: 'You must present as the '
  - type: text
    content: Lord
  - type: text
    content: ’s portion the best and holiest part of everything given to you.’
  '3':
  - type: text
    content: 'They are to be responsible to you and are to perform all the duties of the tent, but they must not go near the furnishings of the sanctuary or the altar. Otherwise both they and you will die. '
  '30':
  - type: text
    content: '“Say to the Levites: ‘When you present the best part, it will be reckoned to you as the product of the threshing floor or the winepress. '
  '31':
  - type: text
    content: 'You and your households may eat the rest of it anywhere, for it is your wages for your work at the tent of meeting. '
  '32':
  - type: text
    content: By presenting the best part of it you will not be guilty in this matter; then you will not defile the holy offerings of the Israelites, and you will not die.’ ”
  '4':
  - type: text
    content: They are to join you and be responsible for the care of the tent of meeting—all the work at the tent—and no one else may come near where you are.
  '5':
  - type: text
    content: '“You are to be responsible for the care of the sanctuary and the altar, so that my wrath will not fall on the Israelites again. '
  '6':
  - type: text
    content: 'I myself have selected your fellow Levites from among the Israelites as a gift to you, dedicated to the '
  - type: text
    content: Lord
  - type: text
    content: ' to do the work at the tent of meeting. '
  '7':
  - type: text
    content: But only you and your sons may serve as priests in connection with everything at the altar and inside the curtain. I am giving you the service of the priesthood as a gift. Anyone else who comes near the sanctuary is to be put to death.”
  - type: heading
    content: Offerings for Priests and Levites
  '8':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Aaron, “I myself have put you in charge of the offerings presented to me; all the holy offerings the Israelites give me I give to you and your sons as your portion, your perpetual share. '
  '9':
  - type: text
    content: You are to have the part of the most holy offerings that is kept from the fire. From all the gifts they bring me as most holy offerings, whether grain or sin
  - type: note
    content: Or purification
  - type: text
    content: ' or guilt offerings, that part belongs to you and your sons. '
