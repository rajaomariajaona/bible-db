document_id: JOS.16,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Allotment for Ephraim and Manasseh
  - type: text
    content: 'The allotment for Joseph began at the Jordan, east of the springs of Jericho, and went up from there through the desert into the hill country of Bethel. '
  '10':
  - type: text
    content: They did not dislodge the Canaanites living in Gezer; to this day the Canaanites live among the people of Ephraim but are required to do forced labor.
  '2':
  - type: text
    content: It went on from Bethel (that is, Luz),
  - type: note
    content: Septuagint; Hebrew Bethel to Luz
  - type: text
    content: ' crossed over to the territory of the Arkites in Ataroth, '
  '3':
  - type: text
    content: descended westward to the territory of the Japhletites as far as the region of Lower Beth Horon and on to Gezer, ending at the Mediterranean Sea.
  '4':
  - type: text
    content: So Manasseh and Ephraim, the descendants of Joseph, received their inheritance.
  '5':
  - type: text
    content: 'This was the territory of Ephraim, according to its clans:'
  - type: text
    content: 'The boundary of their inheritance went from Ataroth Addar in the east to Upper Beth Horon '
  '6':
  - type: text
    content: 'and continued to the Mediterranean Sea. From Mikmethath on the north it curved eastward to Taanath Shiloh, passing by it to Janoah on the east. '
  '7':
  - type: text
    content: 'Then it went down from Janoah to Ataroth and Naarah, touched Jericho and came out at the Jordan. '
  '8':
  - type: text
    content: 'From Tappuah the border went west to the Kanah Ravine and ended at the Mediterranean Sea. This was the inheritance of the tribe of the Ephraimites, according to its clans. '
  '9':
  - type: text
    content: It also included all the towns and their villages that were set aside for the Ephraimites within the inheritance of the Manassites.
