document_id: JOS.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Allotment for Ephraim and Manasseh
  marker-yv: yv-h
- type: usfm
  marker: pi1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'The allotment for Joseph began at the Jordan, east of the springs of Jericho, and went up from there through the desert into the hill country of Bethel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: It went on from Bethel (that is, Luz),
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint; Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Bethel to Luz
    marker-yv: yv-n
  - type: text
    text: ' crossed over to the territory of the Arkites in Ataroth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: descended westward to the territory of the Japhletites as far as the region of Lower Beth Horon and on to Gezer, ending at the Mediterranean Sea.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: So Manasseh and Ephraim, the descendants of Joseph, received their inheritance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'This was the territory of Ephraim, according to its clans:'
- type: usfm
  marker: pi1
  children:
  - type: text
    text: 'The boundary of their inheritance went from Ataroth Addar in the east to Upper Beth Horon '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'and continued to the Mediterranean Sea. From Mikmethath on the north it curved eastward to Taanath Shiloh, passing by it to Janoah on the east. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Then it went down from Janoah to Ataroth and Naarah, touched Jericho and came out at the Jordan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'From Tappuah the border went west to the Kanah Ravine and ended at the Mediterranean Sea. This was the inheritance of the tribe of the Ephraimites, according to its clans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: It also included all the towns and their villages that were set aside for the Ephraimites within the inheritance of the Manassites.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: They did not dislodge the Canaanites living in Gezer; to this day the Canaanites live among the people of Ephraim but are required to do forced labor.
