document_id: JOS.11,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Northern Kings Defeated
  - type: text
    content: 'When Jabin king of Hazor heard of this, he sent word to Jobab king of Madon, to the kings of Shimron and Akshaph, '
  '10':
  - type: text
    content: 'At that time Joshua turned back and captured Hazor and put its king to the sword. (Hazor had been the head of all these kingdoms.) '
  '11':
  - type: text
    content: Everyone in it they put to the sword. They totally destroyed
  - type: note
    content: The Hebrew term refers to the irrevocable giving over of things or persons to the Lord, often by totally destroying them; also in verses 12, 20 and 21.
  - type: text
    content: ' them, not sparing anyone that breathed, and he burned Hazor itself.'
  '12':
  - type: text
    content: 'Joshua took all these royal cities and their kings and put them to the sword. He totally destroyed them, as Moses the servant of the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded. '
  '13':
  - type: text
    content: 'Yet Israel did not burn any of the cities built on their mounds—except Hazor, which Joshua burned. '
  '14':
  - type: text
    content: 'The Israelites carried off for themselves all the plunder and livestock of these cities, but all the people they put to the sword until they completely destroyed them, not sparing anyone that breathed. '
  '15':
  - type: text
    content: 'As the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded his servant Moses, so Moses commanded Joshua, and Joshua did it; he left nothing undone of all that the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses.'
  '16':
  - type: text
    content: 'So Joshua took this entire land: the hill country, all the Negev, the whole region of Goshen, the western foothills, the Arabah and the mountains of Israel with their foothills, '
  '17':
  - type: text
    content: 'from Mount Halak, which rises toward Seir, to Baal Gad in the Valley of Lebanon below Mount Hermon. He captured all their kings and put them to death. '
  '18':
  - type: text
    content: 'Joshua waged war against all these kings for a long time. '
  '19':
  - type: text
    content: 'Except for the Hivites living in Gibeon, not one city made a treaty of peace with the Israelites, who took them all in battle. '
  '2':
  - type: text
    content: 'and to the northern kings who were in the mountains, in the Arabah south of Kinnereth, in the western foothills and in Naphoth Dor on the west; '
  '20':
  - type: text
    content: 'For it was the '
  - type: text
    content: Lord
  - type: text
    content: ' himself who hardened their hearts to wage war against Israel, so that he might destroy them totally, exterminating them without mercy, as the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded Moses.'
  '21':
  - type: text
    content: 'At that time Joshua went and destroyed the Anakites from the hill country: from Hebron, Debir and Anab, from all the hill country of Judah, and from all the hill country of Israel. Joshua totally destroyed them and their towns. '
  '22':
  - type: text
    content: No Anakites were left in Israelite territory; only in Gaza, Gath and Ashdod did any survive.
  '23':
  - type: text
    content: 'So Joshua took the entire land, just as the '
  - type: text
    content: Lord
  - type: text
    content: ' had directed Moses, and he gave it as an inheritance to Israel according to their tribal divisions. Then the land had rest from war.'
  '3':
  - type: text
    content: 'to the Canaanites in the east and west; to the Amorites, Hittites, Perizzites and Jebusites in the hill country; and to the Hivites below Hermon in the region of Mizpah. '
  '4':
  - type: text
    content: 'They came out with all their troops and a large number of horses and chariots—a huge army, as numerous as the sand on the seashore. '
  '5':
  - type: text
    content: All these kings joined forces and made camp together at the Waters of Merom to fight against Israel.
  '6':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Joshua, “Do not be afraid of them, because by this time tomorrow I will hand all of them, slain, over to Israel. You are to hamstring their horses and burn their chariots.”'
  '7':
  - type: text
    content: 'So Joshua and his whole army came against them suddenly at the Waters of Merom and attacked them, '
  '8':
  - type: text
    content: 'and the '
  - type: text
    content: Lord
  - type: text
    content: ' gave them into the hand of Israel. They defeated them and pursued them all the way to Greater Sidon, to Misrephoth Maim, and to the Valley of Mizpah on the east, until no survivors were left. '
  '9':
  - type: text
    content: 'Joshua did to them as the '
  - type: text
    content: Lord
  - type: text
    content: ' had directed: He hamstrung their horses and burned their chariots.'
