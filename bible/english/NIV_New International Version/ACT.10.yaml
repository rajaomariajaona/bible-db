document_id: ACT.10,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Cornelius Calls for Peter
  - type: text
    content: 'At Caesarea there was a man named Cornelius, a centurion in what was known as the Italian Regiment. '
  '10':
  - type: text
    content: 'He became hungry and wanted something to eat, and while the meal was being prepared, he fell into a trance. '
  '11':
  - type: text
    content: 'He saw heaven opened and something like a large sheet being let down to earth by its four corners. '
  '12':
  - type: text
    content: 'It contained all kinds of four-footed animals, as well as reptiles and birds. '
  '13':
  - type: text
    content: 'Then a voice told him, '
  - type: text
    content: “Get up, Peter. Kill and eat.”
  '14':
  - type: text
    content: “Surely not, Lord!” Peter replied. “I have never eaten anything impure or unclean.”
  '15':
  - type: text
    content: 'The voice spoke to him a second time, '
  - type: text
    content: “Do not call anything impure that God has made clean.”
  '16':
  - type: text
    content: This happened three times, and immediately the sheet was taken back to heaven.
  '17':
  - type: text
    content: 'While Peter was wondering about the meaning of the vision, the men sent by Cornelius found out where Simon’s house was and stopped at the gate. '
  '18':
  - type: text
    content: They called out, asking if Simon who was known as Peter was staying there.
  '19':
  - type: text
    content: While Peter was still thinking about the vision, the Spirit said to him, “Simon, three
  - type: note
    content: One early manuscript two; other manuscripts do not have the number.
  - type: text
    content: ' men are looking for you. '
  '2':
  - type: text
    content: 'He and all his family were devout and God-fearing; he gave generously to those in need and prayed to God regularly. '
  '20':
  - type: text
    content: So get up and go downstairs. Do not hesitate to go with them, for I have sent them.”
  '21':
  - type: text
    content: Peter went down and said to the men, “I’m the one you’re looking for. Why have you come?”
  '22':
  - type: text
    content: 'The men replied, “We have come from Cornelius the centurion. He is a righteous and God-fearing man, who is respected by all the Jewish people. A holy angel told him to ask you to come to his house so that he could hear what you have to say.” '
  '23':
  - type: text
    content: Then Peter invited the men into the house to be his guests.
  - type: heading
    content: Peter at Cornelius’s House
  - type: text
    content: 'The next day Peter started out with them, and some of the believers from Joppa went along. '
  '24':
  - type: text
    content: 'The following day he arrived in Caesarea. Cornelius was expecting them and had called together his relatives and close friends. '
  '25':
  - type: text
    content: 'As Peter entered the house, Cornelius met him and fell at his feet in reverence. '
  '26':
  - type: text
    content: But Peter made him get up. “Stand up,” he said, “I am only a man myself.”
  '27':
  - type: text
    content: 'While talking with him, Peter went inside and found a large gathering of people. '
  '28':
  - type: text
    content: 'He said to them: “You are well aware that it is against our law for a Jew to associate with or visit a Gentile. But God has shown me that I should not call anyone impure or unclean. '
  '29':
  - type: text
    content: So when I was sent for, I came without raising any objection. May I ask why you sent for me?”
  '3':
  - type: text
    content: One day at about three in the afternoon he had a vision. He distinctly saw an angel of God, who came to him and said, “Cornelius!”
  '30':
  - type: text
    content: 'Cornelius answered: “Three days ago I was in my house praying at this hour, at three in the afternoon. Suddenly a man in shining clothes stood before me '
  '31':
  - type: text
    content: 'and said, ‘Cornelius, God has heard your prayer and remembered your gifts to the poor. '
  '32':
  - type: text
    content: 'Send to Joppa for Simon who is called Peter. He is a guest in the home of Simon the tanner, who lives by the sea.’ '
  '33':
  - type: text
    content: So I sent for you immediately, and it was good of you to come. Now we are all here in the presence of God to listen to everything the Lord has commanded you to tell us.”
  '34':
  - type: text
    content: 'Then Peter began to speak: “I now realize how true it is that God does not show favoritism '
  '35':
  - type: text
    content: 'but accepts from every nation the one who fears him and does what is right. '
  '36':
  - type: text
    content: 'You know the message God sent to the people of Israel, announcing the good news of peace through Jesus Christ, who is Lord of all. '
  '37':
  - type: text
    content: 'You know what has happened throughout the province of Judea, beginning in Galilee after the baptism that John preached— '
  '38':
  - type: text
    content: how God anointed Jesus of Nazareth with the Holy Spirit and power, and how he went around doing good and healing all who were under the power of the devil, because God was with him.
  '39':
  - type: text
    content: '“We are witnesses of everything he did in the country of the Jews and in Jerusalem. They killed him by hanging him on a cross, '
  '4':
  - type: text
    content: Cornelius stared at him in fear. “What is it, Lord?” he asked.
  - type: text
    content: 'The angel answered, “Your prayers and gifts to the poor have come up as a memorial offering before God. '
  '40':
  - type: text
    content: 'but God raised him from the dead on the third day and caused him to be seen. '
  '41':
  - type: text
    content: 'He was not seen by all the people, but by witnesses whom God had already chosen—by us who ate and drank with him after he rose from the dead. '
  '42':
  - type: text
    content: 'He commanded us to preach to the people and to testify that he is the one whom God appointed as judge of the living and the dead. '
  '43':
  - type: text
    content: All the prophets testify about him that everyone who believes in him receives forgiveness of sins through his name.”
  '44':
  - type: text
    content: 'While Peter was still speaking these words, the Holy Spirit came on all who heard the message. '
  '45':
  - type: text
    content: 'The circumcised believers who had come with Peter were astonished that the gift of the Holy Spirit had been poured out even on Gentiles. '
  '46':
  - type: text
    content: For they heard them speaking in tongues
  - type: note
    content: Or other languages
  - type: text
    content: ' and praising God.'
  - type: text
    content: 'Then Peter said, '
  '47':
  - type: text
    content: '“Surely no one can stand in the way of their being baptized with water. They have received the Holy Spirit just as we have.” '
  '48':
  - type: text
    content: So he ordered that they be baptized in the name of Jesus Christ. Then they asked Peter to stay with them for a few days.
  '5':
  - type: text
    content: 'Now send men to Joppa to bring back a man named Simon who is called Peter. '
  '6':
  - type: text
    content: He is staying with Simon the tanner, whose house is by the sea.”
  '7':
  - type: text
    content: 'When the angel who spoke to him had gone, Cornelius called two of his servants and a devout soldier who was one of his attendants. '
  '8':
  - type: text
    content: He told them everything that had happened and sent them to Joppa.
  - type: heading
    content: Peter’s Vision
  '9':
  - type: text
    content: 'About noon the following day as they were on their journey and approaching the city, Peter went up on the roof to pray. '
