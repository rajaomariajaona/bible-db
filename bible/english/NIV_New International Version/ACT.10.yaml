document_id: ACT.10,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Cornelius Calls for Peter
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'At Caesarea there was a man named Cornelius, a centurion in what was known as the Italian Regiment. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He became hungry and wanted something to eat, and while the meal was being prepared, he fell into a trance. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He saw heaven opened and something like a large sheet being let down to earth by its four corners. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'It contained all kinds of four-footed animals, as well as reptiles and birds. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then a voice told him, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Get up, Peter. Kill and eat.”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Surely not, Lord!” Peter replied. “I have never eaten anything impure or unclean.”
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The voice spoke to him a second time, '
    - type: usfm
      marker: wj
      children:
      - type: text
        text: “Do not call anything impure that God has made clean.”
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: This happened three times, and immediately the sheet was taken back to heaven.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While Peter was wondering about the meaning of the vision, the men sent by Cornelius found out where Simon’s house was and stopped at the gate. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They called out, asking if Simon who was known as Peter was staying there.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: While Peter was still thinking about the vision, the Spirit said to him, “Simon, three
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'One early manuscript '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: two
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; other manuscripts do not have the number.
      marker-yv: yv-n
    - type: text
      text: ' men are looking for you. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He and all his family were devout and God-fearing; he gave generously to those in need and prayed to God regularly. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So get up and go downstairs. Do not hesitate to go with them, for I have sent them.”
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peter went down and said to the men, “I’m the one you’re looking for. Why have you come?”
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The men replied, “We have come from Cornelius the centurion. He is a righteous and God-fearing man, who is respected by all the Jewish people. A holy angel told him to ask you to come to his house so that he could hear what you have to say.” '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then Peter invited the men into the house to be his guests.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peter at Cornelius’s House
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The next day Peter started out with them, and some of the believers from Joppa went along. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The following day he arrived in Caesarea. Cornelius was expecting them and had called together his relatives and close friends. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'As Peter entered the house, Cornelius met him and fell at his feet in reverence. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But Peter made him get up. “Stand up,” he said, “I am only a man myself.”
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While talking with him, Peter went inside and found a large gathering of people. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said to them: “You are well aware that it is against our law for a Jew to associate with or visit a Gentile. But God has shown me that I should not call anyone impure or unclean. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So when I was sent for, I came without raising any objection. May I ask why you sent for me?”
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: One day at about three in the afternoon he had a vision. He distinctly saw an angel of God, who came to him and said, “Cornelius!”
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cornelius answered: “Three days ago I was in my house praying at this hour, at three in the afternoon. Suddenly a man in shining clothes stood before me '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and said, ‘Cornelius, God has heard your prayer and remembered your gifts to the poor. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Send to Joppa for Simon who is called Peter. He is a guest in the home of Simon the tanner, who lives by the sea.’ '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So I sent for you immediately, and it was good of you to come. Now we are all here in the presence of God to listen to everything the Lord has commanded you to tell us.”
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Peter began to speak: “I now realize how true it is that God does not show favoritism '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but accepts from every nation the one who fears him and does what is right. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You know the message God sent to the people of Israel, announcing the good news of peace through Jesus Christ, who is Lord of all. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'You know what has happened throughout the province of Judea, beginning in Galilee after the baptism that John preached— '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: how God anointed Jesus of Nazareth with the Holy Spirit and power, and how he went around doing good and healing all who were under the power of the devil, because God was with him.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“We are witnesses of everything he did in the country of the Jews and in Jerusalem. They killed him by hanging him on a cross, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cornelius stared at him in fear. “What is it, Lord?” he asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The angel answered, “Your prayers and gifts to the poor have come up as a memorial offering before God. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'but God raised him from the dead on the third day and caused him to be seen. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He was not seen by all the people, but by witnesses whom God had already chosen—by us who ate and drank with him after he rose from the dead. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He commanded us to preach to the people and to testify that he is the one whom God appointed as judge of the living and the dead. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: All the prophets testify about him that everyone who believes in him receives forgiveness of sins through his name.”
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'While Peter was still speaking these words, the Holy Spirit came on all who heard the message. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'The circumcised believers who had come with Peter were astonished that the gift of the Holy Spirit had been poured out even on Gentiles. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: For they heard them speaking in tongues
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10:46 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: other languages
      marker-yv: yv-n
    - type: text
      text: ' and praising God.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Peter said, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“Surely no one can stand in the way of their being baptized with water. They have received the Holy Spirit just as we have.” '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: So he ordered that they be baptized in the name of Jesus Christ. Then they asked Peter to stay with them for a few days.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now send men to Joppa to bring back a man named Simon who is called Peter. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He is staying with Simon the tanner, whose house is by the sea.”
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'When the angel who spoke to him had gone, Cornelius called two of his servants and a devout soldier who was one of his attendants. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: He told them everything that had happened and sent them to Joppa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peter’s Vision
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'About noon the following day as they were on their journey and approaching the city, Peter went up on the roof to pray. '
