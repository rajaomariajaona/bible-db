document_id: EXO.16,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Manna and Quail
  - type: text
    content: 'The whole Israelite community set out from Elim and came to the Desert of Sin, which is between Elim and Sinai, on the fifteenth day of the second month after they had come out of Egypt. '
  '10':
  - type: text
    content: 'While Aaron was speaking to the whole Israelite community, they looked toward the desert, and there was the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' appearing in the cloud.'
  '11':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, '
  '12':
  - type: text
    content: '“I have heard the grumbling of the Israelites. Tell them, ‘At twilight you will eat meat, and in the morning you will be filled with bread. Then you will know that I am the '
  - type: text
    content: Lord
  - type: text
    content: ' your God.’ ”'
  '13':
  - type: text
    content: 'That evening quail came and covered the camp, and in the morning there was a layer of dew around the camp. '
  '14':
  - type: text
    content: 'When the dew was gone, thin flakes like frost on the ground appeared on the desert floor. '
  '15':
  - type: text
    content: When the Israelites saw it, they said to each other, “What is it?” For they did not know what it was.
  - type: text
    content: 'Moses said to them, “It is the bread the '
  - type: text
    content: Lord
  - type: text
    content: ' has given you to eat. '
  '16':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded: ‘Everyone is to gather as much as they need. Take an omer'
  - type: note
    content: That is, possibly about 3 pounds or about 1.4 kilograms; also in verses 18, 32, 33 and 36
  - type: text
    content: ' for each person you have in your tent.’ ”'
  '17':
  - type: text
    content: 'The Israelites did as they were told; some gathered much, some little. '
  '18':
  - type: text
    content: And when they measured it by the omer, the one who gathered much did not have too much, and the one who gathered little did not have too little. Everyone had gathered just as much as they needed.
  '19':
  - type: text
    content: Then Moses said to them, “No one is to keep any of it until morning.”
  '2':
  - type: text
    content: 'In the desert the whole community grumbled against Moses and Aaron. '
  '20':
  - type: text
    content: However, some of them paid no attention to Moses; they kept part of it until morning, but it was full of maggots and began to smell. So Moses was angry with them.
  '21':
  - type: text
    content: 'Each morning everyone gathered as much as they needed, and when the sun grew hot, it melted away. '
  '22':
  - type: text
    content: On the sixth day, they gathered twice as much—two omers
  - type: note
    content: That is, possibly about 6 pounds or about 2.8 kilograms
  - type: text
    content: ' for each person—and the leaders of the community came and reported this to Moses. '
  '23':
  - type: text
    content: 'He said to them, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded: ‘Tomorrow is to be a day of sabbath rest, a holy sabbath to the '
  - type: text
    content: Lord
  - type: text
    content: . So bake what you want to bake and boil what you want to boil. Save whatever is left and keep it until morning.’ ”
  '24':
  - type: text
    content: 'So they saved it until morning, as Moses commanded, and it did not stink or get maggots in it. '
  '25':
  - type: text
    content: '“Eat it today,” Moses said, “because today is a sabbath to the '
  - type: text
    content: Lord
  - type: text
    content: '. You will not find any of it on the ground today. '
  '26':
  - type: text
    content: Six days you are to gather it, but on the seventh day, the Sabbath, there will not be any.”
  '27':
  - type: text
    content: 'Nevertheless, some of the people went out on the seventh day to gather it, but they found none. '
  '28':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “How long will you'
  - type: note
    content: The Hebrew is plural.
  - type: text
    content: ' refuse to keep my commands and my instructions? '
  '29':
  - type: text
    content: 'Bear in mind that the '
  - type: text
    content: Lord
  - type: text
    content: ' has given you the Sabbath; that is why on the sixth day he gives you bread for two days. Everyone is to stay where they are on the seventh day; no one is to go out.” '
  '3':
  - type: text
    content: 'The Israelites said to them, “If only we had died by the '
  - type: text
    content: Lord
  - type: text
    content: ’s hand in Egypt! There we sat around pots of meat and ate all the food we wanted, but you have brought us out into this desert to starve this entire assembly to death.”
  '30':
  - type: text
    content: So the people rested on the seventh day.
  '31':
  - type: text
    content: The people of Israel called the bread manna.
  - type: note
    content: Manna sounds like the Hebrew for What is it? (see verse 15).
  - type: text
    content: ' It was white like coriander seed and tasted like wafers made with honey. '
  '32':
  - type: text
    content: 'Moses said, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' has commanded: ‘Take an omer of manna and keep it for the generations to come, so they can see the bread I gave you to eat in the wilderness when I brought you out of Egypt.’ ”'
  '33':
  - type: text
    content: 'So Moses said to Aaron, “Take a jar and put an omer of manna in it. Then place it before the '
  - type: text
    content: Lord
  - type: text
    content: ' to be kept for the generations to come.”'
  '34':
  - type: text
    content: 'As the '
  - type: text
    content: Lord
  - type: text
    content: ' commanded Moses, Aaron put the manna with the tablets of the covenant law, so that it might be preserved. '
  '35':
  - type: text
    content: The Israelites ate manna forty years, until they came to a land that was settled; they ate manna until they reached the border of Canaan.
  '36':
  - type: text
    content: (An omer is one-tenth of an ephah.)
  '4':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to Moses, “I will rain down bread from heaven for you. The people are to go out each day and gather enough for that day. In this way I will test them and see whether they will follow my instructions. '
  '5':
  - type: text
    content: On the sixth day they are to prepare what they bring in, and that is to be twice as much as they gather on the other days.”
  '6':
  - type: text
    content: 'So Moses and Aaron said to all the Israelites, “In the evening you will know that it was the '
  - type: text
    content: Lord
  - type: text
    content: ' who brought you out of Egypt, '
  '7':
  - type: text
    content: 'and in the morning you will see the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ', because he has heard your grumbling against him. Who are we, that you should grumble against us?” '
  '8':
  - type: text
    content: 'Moses also said, “You will know that it was the '
  - type: text
    content: Lord
  - type: text
    content: ' when he gives you meat to eat in the evening and all the bread you want in the morning, because he has heard your grumbling against him. Who are we? You are not grumbling against us, but against the '
  - type: text
    content: Lord
  - type: text
    content: .”
  '9':
  - type: text
    content: 'Then Moses told Aaron, “Say to the entire Israelite community, ‘Come before the '
  - type: text
    content: Lord
  - type: text
    content: ', for he has heard your grumbling.’ ”'
