document_id: JER.26,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah Threatened With Death
  - type: text
    content: 'Early in the reign of Jehoiakim son of Josiah king of Judah, this word came from the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '10':
  - type: text
    content: 'When the officials of Judah heard about these things, they went up from the royal palace to the house of the '
  - type: text
    content: Lord
  - type: text
    content: ' and took their places at the entrance of the New Gate of the '
  - type: text
    content: Lord
  - type: text
    content: '’s house. '
  '11':
  - type: text
    content: Then the priests and the prophets said to the officials and all the people, “This man should be sentenced to death because he has prophesied against this city. You have heard it with your own ears!”
  '12':
  - type: text
    content: 'Then Jeremiah said to all the officials and all the people: “The '
  - type: text
    content: Lord
  - type: text
    content: ' sent me to prophesy against this house and this city all the things you have heard. '
  '13':
  - type: text
    content: 'Now reform your ways and your actions and obey the '
  - type: text
    content: Lord
  - type: text
    content: ' your God. Then the '
  - type: text
    content: Lord
  - type: text
    content: ' will relent and not bring the disaster he has pronounced against you. '
  '14':
  - type: text
    content: 'As for me, I am in your hands; do with me whatever you think is good and right. '
  '15':
  - type: text
    content: 'Be assured, however, that if you put me to death, you will bring the guilt of innocent blood on yourselves and on this city and on those who live in it, for in truth the '
  - type: text
    content: Lord
  - type: text
    content: ' has sent me to you to speak all these words in your hearing.”'
  '16':
  - type: text
    content: 'Then the officials and all the people said to the priests and the prophets, “This man should not be sentenced to death! He has spoken to us in the name of the '
  - type: text
    content: Lord
  - type: text
    content: ' our God.”'
  '17':
  - type: text
    content: 'Some of the elders of the land stepped forward and said to the entire assembly of people, '
  '18':
  - type: text
    content: '“Micah of Moresheth prophesied in the days of Hezekiah king of Judah. He told all the people of Judah, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty says:'
  - type: text
    content: “ ‘Zion will be plowed like a field,
  - type: text
    content: Jerusalem will become a heap of rubble,
  - type: text
    content: the temple hill a mound overgrown with thickets.’
  - type: note
    content: Micah 3:12
  '19':
  - type: text
    content: '“Did Hezekiah king of Judah or anyone else in Judah put him to death? Did not Hezekiah fear the '
  - type: text
    content: Lord
  - type: text
    content: ' and seek his favor? And did not the '
  - type: text
    content: Lord
  - type: text
    content: ' relent, so that he did not bring the disaster he pronounced against them? We are about to bring a terrible disaster on ourselves!”'
  '2':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Stand in the courtyard of the '
  - type: text
    content: Lord
  - type: text
    content: '’s house and speak to all the people of the towns of Judah who come to worship in the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. Tell them everything I command you; do not omit a word. '
  '20':
  - type: text
    content: '(Now Uriah son of Shemaiah from Kiriath Jearim was another man who prophesied in the name of the '
  - type: text
    content: Lord
  - type: text
    content: '; he prophesied the same things against this city and this land as Jeremiah did. '
  '21':
  - type: text
    content: 'When King Jehoiakim and all his officers and officials heard his words, the king was determined to put him to death. But Uriah heard of it and fled in fear to Egypt. '
  '22':
  - type: text
    content: 'King Jehoiakim, however, sent Elnathan son of Akbor to Egypt, along with some other men. '
  '23':
  - type: text
    content: They brought Uriah out of Egypt and took him to King Jehoiakim, who had him struck down with a sword and his body thrown into the burial place of the common people.)
  '24':
  - type: text
    content: Furthermore, Ahikam son of Shaphan supported Jeremiah, and so he was not handed over to the people to be put to death.
  '3':
  - type: text
    content: 'Perhaps they will listen and each will turn from their evil ways. Then I will relent and not inflict on them the disaster I was planning because of the evil they have done. '
  '4':
  - type: text
    content: 'Say to them, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: If you do not listen to me and follow my law, which I have set before you, '
  '5':
  - type: text
    content: 'and if you do not listen to the words of my servants the prophets, whom I have sent to you again and again (though you have not listened), '
  '6':
  - type: text
    content: then I will make this house like Shiloh and this city a curse
  - type: note
    content: That is, its name will be used in cursing (see 29:22); or, others will see that it is cursed.
  - type: text
    content: ' among all the nations of the earth.’ ”'
  '7':
  - type: text
    content: 'The priests, the prophets and all the people heard Jeremiah speak these words in the house of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'But as soon as Jeremiah finished telling all the people everything the '
  - type: text
    content: Lord
  - type: text
    content: ' had commanded him to say, the priests, the prophets and all the people seized him and said, “You must die! '
  '9':
  - type: text
    content: 'Why do you prophesy in the '
  - type: text
    content: Lord
  - type: text
    content: '’s name that this house will be like Shiloh and this city will be desolate and deserted?” And all the people crowded around Jeremiah in the house of the '
  - type: text
    content: Lord
  - type: text
    content: .
