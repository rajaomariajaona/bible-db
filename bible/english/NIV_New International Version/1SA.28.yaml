document_id: 1SA.28,111
type_code: eng
verses:
  '1':
  - type: text
    content: In those days the Philistines gathered their forces to fight against Israel. Achish said to David, “You must understand that you and your men will accompany me in the army.”
  '10':
  - type: text
    content: 'Saul swore to her by the '
  - type: text
    content: Lord
  - type: text
    content: ', “As surely as the '
  - type: text
    content: Lord
  - type: text
    content: ' lives, you will not be punished for this.”'
  '11':
  - type: text
    content: Then the woman asked, “Whom shall I bring up for you?”
  - type: text
    content: “Bring up Samuel,” he said.
  '12':
  - type: text
    content: When the woman saw Samuel, she cried out at the top of her voice and said to Saul, “Why have you deceived me? You are Saul!”
  '13':
  - type: text
    content: The king said to her, “Don’t be afraid. What do you see?”
  - type: text
    content: The woman said, “I see a ghostly figure
  - type: note
    content: Or see spirits; or see gods
  - type: text
    content: ' coming up out of the earth.”'
  '14':
  - type: text
    content: “What does he look like?” he asked.
  - type: text
    content: “An old man wearing a robe is coming up,” she said.
  - type: text
    content: Then Saul knew it was Samuel, and he bowed down and prostrated himself with his face to the ground.
  '15':
  - type: text
    content: Samuel said to Saul, “Why have you disturbed me by bringing me up?”
  - type: text
    content: “I am in great distress,” Saul said. “The Philistines are fighting against me, and God has departed from me. He no longer answers me, either by prophets or by dreams. So I have called on you to tell me what to do.”
  '16':
  - type: text
    content: 'Samuel said, “Why do you consult me, now that the '
  - type: text
    content: Lord
  - type: text
    content: ' has departed from you and become your enemy? '
  '17':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has done what he predicted through me. The '
  - type: text
    content: Lord
  - type: text
    content: ' has torn the kingdom out of your hands and given it to one of your neighbors—to David. '
  '18':
  - type: text
    content: 'Because you did not obey the '
  - type: text
    content: Lord
  - type: text
    content: ' or carry out his fierce wrath against the Amalekites, the '
  - type: text
    content: Lord
  - type: text
    content: ' has done this to you today. '
  '19':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' will deliver both Israel and you into the hands of the Philistines, and tomorrow you and your sons will be with me. The '
  - type: text
    content: Lord
  - type: text
    content: ' will also give the army of Israel into the hands of the Philistines.”'
  '2':
  - type: text
    content: David said, “Then you will see for yourself what your servant can do.”
  - type: text
    content: Achish replied, “Very well, I will make you my bodyguard for life.”
  - type: heading
    content: Saul and the Medium at Endor
  '20':
  - type: text
    content: Immediately Saul fell full length on the ground, filled with fear because of Samuel’s words. His strength was gone, for he had eaten nothing all that day and all that night.
  '21':
  - type: text
    content: 'When the woman came to Saul and saw that he was greatly shaken, she said, “Look, your servant has obeyed you. I took my life in my hands and did what you told me to do. '
  '22':
  - type: text
    content: Now please listen to your servant and let me give you some food so you may eat and have the strength to go on your way.”
  '23':
  - type: text
    content: He refused and said, “I will not eat.”
  - type: text
    content: But his men joined the woman in urging him, and he listened to them. He got up from the ground and sat on the couch.
  '24':
  - type: text
    content: 'The woman had a fattened calf at the house, which she butchered at once. She took some flour, kneaded it and baked bread without yeast. '
  '25':
  - type: text
    content: Then she set it before Saul and his men, and they ate. That same night they got up and left.
  '3':
  - type: text
    content: Now Samuel was dead, and all Israel had mourned for him and buried him in his own town of Ramah. Saul had expelled the mediums and spiritists from the land.
  '4':
  - type: text
    content: 'The Philistines assembled and came and set up camp at Shunem, while Saul gathered all Israel and set up camp at Gilboa. '
  '5':
  - type: text
    content: 'When Saul saw the Philistine army, he was afraid; terror filled his heart. '
  '6':
  - type: text
    content: 'He inquired of the '
  - type: text
    content: Lord
  - type: text
    content: ', but the '
  - type: text
    content: Lord
  - type: text
    content: ' did not answer him by dreams or Urim or prophets. '
  '7':
  - type: text
    content: Saul then said to his attendants, “Find me a woman who is a medium, so I may go and inquire of her.”
  - type: text
    content: “There is one in Endor,” they said.
  '8':
  - type: text
    content: So Saul disguised himself, putting on other clothes, and at night he and two men went to the woman. “Consult a spirit for me,” he said, “and bring up for me the one I name.”
  '9':
  - type: text
    content: But the woman said to him, “Surely you know what Saul has done. He has cut off the mediums and spiritists from the land. Why have you set a trap for my life to bring about my death?”
