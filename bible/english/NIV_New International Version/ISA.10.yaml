document_id: ISA.10,111
type_code: eng
verses:
  '1':
  - type: text
    content: Woe to those who make unjust laws,
  - type: text
    content: to those who issue oppressive decrees,
  '10':
  - type: text
    content: As my hand seized the kingdoms of the idols,
  - type: text
    content: kingdoms whose images excelled those of Jerusalem and Samaria—
  '11':
  - type: text
    content: shall I not deal with Jerusalem and her images
  - type: text
    content: as I dealt with Samaria and her idols?’ ”
  '12':
  - type: text
    content: 'When the Lord has finished all his work against Mount Zion and Jerusalem, he will say, “I will punish the king of Assyria for the willful pride of his heart and the haughty look in his eyes. '
  '13':
  - type: text
    content: 'For he says:'
  - type: text
    content: “ ‘By the strength of my hand I have done this,
  - type: text
    content: and by my wisdom, because I have understanding.
  - type: text
    content: I removed the boundaries of nations,
  - type: text
    content: I plundered their treasures;
  - type: text
    content: like a mighty one I subdued
  - type: note
    content: Or treasures; / I subdued the mighty,
  - type: text
    content: ' their kings.'
  '14':
  - type: text
    content: As one reaches into a nest,
  - type: text
    content: so my hand reached for the wealth of the nations;
  - type: text
    content: as people gather abandoned eggs,
  - type: text
    content: so I gathered all the countries;
  - type: text
    content: not one flapped a wing,
  - type: text
    content: or opened its mouth to chirp.’ ”
  '15':
  - type: text
    content: Does the ax raise itself above the person who swings it,
  - type: text
    content: or the saw boast against the one who uses it?
  - type: text
    content: As if a rod were to wield the person who lifts it up,
  - type: text
    content: or a club brandish the one who is not wood!
  '16':
  - type: text
    content: 'Therefore, the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty,'
  - type: text
    content: will send a wasting disease upon his sturdy warriors;
  - type: text
    content: under his pomp a fire will be kindled
  - type: text
    content: like a blazing flame.
  '17':
  - type: text
    content: The Light of Israel will become a fire,
  - type: text
    content: their Holy One a flame;
  - type: text
    content: in a single day it will burn and consume
  - type: text
    content: his thorns and his briers.
  '18':
  - type: text
    content: The splendor of his forests and fertile fields
  - type: text
    content: it will completely destroy,
  - type: text
    content: as when a sick person wastes away.
  '19':
  - type: text
    content: And the remaining trees of his forests will be so few
  - type: text
    content: that a child could write them down.
  - type: heading
    content: The Remnant of Israel
  '2':
  - type: text
    content: to deprive the poor of their rights
  - type: text
    content: and withhold justice from the oppressed of my people,
  - type: text
    content: making widows their prey
  - type: text
    content: and robbing the fatherless.
  '20':
  - type: text
    content: In that day the remnant of Israel,
  - type: text
    content: the survivors of Jacob,
  - type: text
    content: will no longer rely on him
  - type: text
    content: who struck them down
  - type: text
    content: 'but will truly rely on the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: the Holy One of Israel.
  '21':
  - type: text
    content: A remnant will return,
  - type: note
    content: Hebrew shear-jashub (see 7:3 and note); also in verse 22
  - type: text
    content: ' a remnant of Jacob'
  - type: text
    content: will return to the Mighty God.
  '22':
  - type: text
    content: Though your people be like the sand by the sea, Israel,
  - type: text
    content: only a remnant will return.
  - type: text
    content: Destruction has been decreed,
  - type: text
    content: overwhelming and righteous.
  '23':
  - type: text
    content: 'The Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, will carry out'
  - type: text
    content: the destruction decreed upon the whole land.
  '24':
  - type: text
    content: 'Therefore this is what the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, says:'
  - type: text
    content: “My people who live in Zion,
  - type: text
    content: do not be afraid of the Assyrians,
  - type: text
    content: who beat you with a rod
  - type: text
    content: and lift up a club against you, as Egypt did.
  '25':
  - type: text
    content: Very soon my anger against you will end
  - type: text
    content: and my wrath will be directed to their destruction.”
  '26':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty will lash them with a whip,'
  - type: text
    content: as when he struck down Midian at the rock of Oreb;
  - type: text
    content: and he will raise his staff over the waters,
  - type: text
    content: as he did in Egypt.
  '27':
  - type: text
    content: In that day their burden will be lifted from your shoulders,
  - type: text
    content: their yoke from your neck;
  - type: text
    content: the yoke will be broken
  - type: text
    content: because you have grown so fat.
  - type: note
    content: Hebrew; Septuagint broken / from your shoulders
  '28':
  - type: text
    content: They enter Aiath;
  - type: text
    content: they pass through Migron;
  - type: text
    content: they store supplies at Mikmash.
  '29':
  - type: text
    content: They go over the pass, and say,
  - type: text
    content: “We will camp overnight at Geba.”
  - type: text
    content: Ramah trembles;
  - type: text
    content: Gibeah of Saul flees.
  '3':
  - type: text
    content: What will you do on the day of reckoning,
  - type: text
    content: when disaster comes from afar?
  - type: text
    content: To whom will you run for help?
  - type: text
    content: Where will you leave your riches?
  '30':
  - type: text
    content: Cry out, Daughter Gallim!
  - type: text
    content: Listen, Laishah!
  - type: text
    content: Poor Anathoth!
  '31':
  - type: text
    content: Madmenah is in flight;
  - type: text
    content: the people of Gebim take cover.
  '32':
  - type: text
    content: This day they will halt at Nob;
  - type: text
    content: they will shake their fist
  - type: text
    content: at the mount of Daughter Zion,
  - type: text
    content: at the hill of Jerusalem.
  '33':
  - type: text
    content: 'See, the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty,'
  - type: text
    content: will lop off the boughs with great power.
  - type: text
    content: The lofty trees will be felled,
  - type: text
    content: the tall ones will be brought low.
  '34':
  - type: text
    content: He will cut down the forest thickets with an ax;
  - type: text
    content: Lebanon will fall before the Mighty One.
  '4':
  - type: text
    content: Nothing will remain but to cringe among the captives
  - type: text
    content: or fall among the slain.
  - type: text
    content: Yet for all this, his anger is not turned away,
  - type: text
    content: his hand is still upraised.
  - type: heading
    content: God’s Judgment on Assyria
  '5':
  - type: text
    content: “Woe to the Assyrian, the rod of my anger,
  - type: text
    content: in whose hand is the club of my wrath!
  '6':
  - type: text
    content: I send him against a godless nation,
  - type: text
    content: I dispatch him against a people who anger me,
  - type: text
    content: to seize loot and snatch plunder,
  - type: text
    content: and to trample them down like mud in the streets.
  '7':
  - type: text
    content: But this is not what he intends,
  - type: text
    content: this is not what he has in mind;
  - type: text
    content: his purpose is to destroy,
  - type: text
    content: to put an end to many nations.
  '8':
  - type: text
    content: ‘Are not my commanders all kings?’ he says.
  '9':
  - type: text
    content: ‘Has not Kalno fared like Carchemish?
  - type: text
    content: Is not Hamath like Arpad,
  - type: text
    content: and Samaria like Damascus?
