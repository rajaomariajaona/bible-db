document_id: ISA.10
type_code: eng
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Woe to those who make unjust laws,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to those who issue oppressive decrees,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: to deprive the poor of their rights
- type: usfm
  marker: q2
  children:
  - type: text
    text: and withhold justice from the oppressed of my people,
- type: usfm
  marker: q1
  children:
  - type: text
    text: making widows their prey
- type: usfm
  marker: q2
  children:
  - type: text
    text: and robbing the fatherless.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: What will you do on the day of reckoning,
- type: usfm
  marker: q2
  children:
  - type: text
    text: when disaster comes from afar?
- type: usfm
  marker: q1
  children:
  - type: text
    text: To whom will you run for help?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Where will you leave your riches?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nothing will remain but to cringe among the captives
- type: usfm
  marker: q2
  children:
  - type: text
    text: or fall among the slain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Yet for all this, his anger is not turned away,
- type: usfm
  marker: q2
  children:
  - type: text
    text: his hand is still upraised.
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Judgment on Assyria
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: “Woe to the Assyrian, the rod of my anger,
- type: usfm
  marker: q2
  children:
  - type: text
    text: in whose hand is the club of my wrath!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: I send him against a godless nation,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I dispatch him against a people who anger me,
- type: usfm
  marker: q1
  children:
  - type: text
    text: to seize loot and snatch plunder,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and to trample them down like mud in the streets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: But this is not what he intends,
- type: usfm
  marker: q2
  children:
  - type: text
    text: this is not what he has in mind;
- type: usfm
  marker: q1
  children:
  - type: text
    text: his purpose is to destroy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to put an end to many nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ‘Are not my commanders all kings?’ he says.
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ‘Has not Kalno fared like Carchemish?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Is not Hamath like Arpad,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and Samaria like Damascus?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: As my hand seized the kingdoms of the idols,
- type: usfm
  marker: q2
  children:
  - type: text
    text: kingdoms whose images excelled those of Jerusalem and Samaria—
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: shall I not deal with Jerusalem and her images
- type: usfm
  marker: q2
  children:
  - type: text
    text: as I dealt with Samaria and her idols?’ ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When the Lord has finished all his work against Mount Zion and Jerusalem, he will say, “I will punish the king of Assyria for the willful pride of his heart and the haughty look in his eyes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'For he says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “ ‘By the strength of my hand I have done this,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and by my wisdom, because I have understanding.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I removed the boundaries of nations,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I plundered their treasures;
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a mighty one I subdued
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: treasures; / I subdued the mighty,
    marker-yv: yv-n
  - type: text
    text: ' their kings.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: As one reaches into a nest,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so my hand reached for the wealth of the nations;
- type: usfm
  marker: q1
  children:
  - type: text
    text: as people gather abandoned eggs,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so I gathered all the countries;
- type: usfm
  marker: q1
  children:
  - type: text
    text: not one flapped a wing,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or opened its mouth to chirp.’ ”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Does the ax raise itself above the person who swings it,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or the saw boast against the one who uses it?
- type: usfm
  marker: q1
  children:
  - type: text
    text: As if a rod were to wield the person who lifts it up,
- type: usfm
  marker: q2
  children:
  - type: text
    text: or a club brandish the one who is not wood!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Therefore, the Lord, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: will send a wasting disease upon his sturdy warriors;
- type: usfm
  marker: q1
  children:
  - type: text
    text: under his pomp a fire will be kindled
- type: usfm
  marker: q2
  children:
  - type: text
    text: like a blazing flame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The Light of Israel will become a fire,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their Holy One a flame;
- type: usfm
  marker: q1
  children:
  - type: text
    text: in a single day it will burn and consume
- type: usfm
  marker: q2
  children:
  - type: text
    text: his thorns and his briers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: The splendor of his forests and fertile fields
- type: usfm
  marker: q2
  children:
  - type: text
    text: it will completely destroy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as when a sick person wastes away.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: And the remaining trees of his forests will be so few
- type: usfm
  marker: q2
  children:
  - type: text
    text: that a child could write them down.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Remnant of Israel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: In that day the remnant of Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the survivors of Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: will no longer rely on him
- type: usfm
  marker: q2
  children:
  - type: text
    text: who struck them down
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'but will truly rely on the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: the Holy One of Israel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: A remnant will return,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'shear-jashub '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (see 7:3 and note); also in verse 22
    marker-yv: yv-n
  - type: text
    text: ' a remnant of Jacob'
- type: usfm
  marker: q2
  children:
  - type: text
    text: will return to the Mighty God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Though your people be like the sand by the sea, Israel,
- type: usfm
  marker: q2
  children:
  - type: text
    text: only a remnant will return.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Destruction has been decreed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: overwhelming and righteous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The Lord, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty, will carry out'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the destruction decreed upon the whole land.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Therefore this is what the Lord, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty, says:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: “My people who live in Zion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not be afraid of the Assyrians,
- type: usfm
  marker: q1
  children:
  - type: text
    text: who beat you with a rod
- type: usfm
  marker: q2
  children:
  - type: text
    text: and lift up a club against you, as Egypt did.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Very soon my anger against you will end
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my wrath will be directed to their destruction.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty will lash them with a whip,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: as when he struck down Midian at the rock of Oreb;
- type: usfm
  marker: q1
  children:
  - type: text
    text: and he will raise his staff over the waters,
- type: usfm
  marker: q2
  children:
  - type: text
    text: as he did in Egypt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: In that day their burden will be lifted from your shoulders,
- type: usfm
  marker: q2
  children:
  - type: text
    text: their yoke from your neck;
- type: usfm
  marker: q1
  children:
  - type: text
    text: the yoke will be broken
- type: usfm
  marker: q2
  children:
  - type: text
    text: because you have grown so fat.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10:27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew; Septuagint '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: broken / from your shoulders
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: They enter Aiath;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they pass through Migron;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they store supplies at Mikmash.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: They go over the pass, and say,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “We will camp overnight at Geba.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ramah trembles;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Gibeah of Saul flees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Cry out, Daughter Gallim!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Listen, Laishah!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Poor Anathoth!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Madmenah is in flight;
- type: usfm
  marker: q2
  children:
  - type: text
    text: the people of Gebim take cover.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: This day they will halt at Nob;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they will shake their fist
- type: usfm
  marker: q1
  children:
  - type: text
    text: at the mount of Daughter Zion,
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the hill of Jerusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'See, the Lord, the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' Almighty,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: will lop off the boughs with great power.
- type: usfm
  marker: q1
  children:
  - type: text
    text: The lofty trees will be felled,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the tall ones will be brought low.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: He will cut down the forest thickets with an ax;
- type: usfm
  marker: q2
  children:
  - type: text
    text: Lebanon will fall before the Mighty One.
