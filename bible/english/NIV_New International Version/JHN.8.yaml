document_id: JHN.8
type_code: eng
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: but Jesus went to the Mount of Olives.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: At dawn he appeared again in the temple courts, where all the people gathered around him, and he sat down to teach them.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: it
    children:
    - type: text
      text: The teachers of the law and the Pharisees brought in a woman caught in adultery. They made her stand before the group
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: it
    children:
    - type: text
      text: and said to Jesus, “Teacher, this woman was caught in the act of adultery.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: it
    children:
    - type: text
      text: In the Law Moses commanded us to stone such women. Now what do you say?”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: it
    children:
    - type: text
      text: They were using this question as a trap, in order to have a basis for accusing him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: But Jesus bent down and started to write on the ground with his finger.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: it
    children:
    - type: text
      text: When they kept on questioning him, he straightened up and said to them, “Let any one of you who is without sin be the first to throw a stone at her.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Again he stooped down and wrote on the ground.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: At this, those who heard began to go away one at a time, the older ones first, until only Jesus was left, with the woman still standing there.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Jesus straightened up and asked her, “Woman, where are they? Has no one condemned you?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: “No one, sir,” she said.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: “Then neither do I condemn you,” Jesus declared. “Go now and leave your life of sin.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dispute Over Jesus’ Testimony
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'When Jesus spoke again to the people, he said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I am the light of the world. Whoever follows me will never walk in darkness, but will have the light of life.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: The Pharisees challenged him, “Here you are, appearing as your own witness; your testimony is not valid.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Even if I testify on my own behalf, my testimony is valid, for I know where I came from and where I am going. But you have no idea where I come from or where I am going.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You judge by human standards; I pass judgment on no one.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But if I do judge, my decisions are true, because I am not alone. I stand with the Father, who sent me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: In your own Law it is written that the testimony of two witnesses is true.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am one who testifies for myself; my other witness is the Father, who sent me.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Then they asked him, “Where is your father?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You do not know me or my Father,”
  - type: text
    text: ' Jesus replied. '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If you knew me, you would know my Father also.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He spoke these words while teaching in the temple courts near the place where the offerings were put. Yet no one seized him, because his hour had not yet come.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dispute Over Who Jesus Is
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Once more Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I am going away, and you will look for me, and you will die in your sin. Where I go, you cannot come.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'This made the Jews ask, “Will he kill himself? Is that why he says, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ‘Where I go, you cannot come’
  - type: text
    text: ?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'But he continued, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “You are from below; I am from above. You are of this world; I am not of this world.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I told you that you would die in your sins; if you do not believe that I am he, you will indeed die in your sins.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: “Who are you?” they asked.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Just what I have been telling you from the beginning,”
  - type: text
    text: ' Jesus replied. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I have much to say in judgment of you. But he who sent me is trustworthy, and what I have heard from him I tell the world.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'They did not understand that he was telling them about his Father. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'So Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “When you have lifted up
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'lifted up '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'also means '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: exalted.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: the Son of Man, then you will know that I am he and that I do nothing on my own but speak just what the Father has taught me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: The one who sent me is with me; he has not left me alone, for I always do what pleases him.”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Even as he spoke, many believed in him.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dispute Over Whose Children Jesus’ Opponents Are
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'To the Jews who had believed him, Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If you hold to my teaching, you are really my disciples.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Then you will know the truth, and the truth will set you free.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: They answered him, “We are Abraham’s descendants and have never been slaves of anyone. How can you say that we shall be set free?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Very truly I tell you, everyone who sins is a slave to sin.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Now a slave has no permanent place in the family, but a son belongs to it forever.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So if the Son sets you free, you will be free indeed.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I know that you are Abraham’s descendants. Yet you are looking for a way to kill me, because you have no room for my word.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am telling you what I have seen in the Father’s presence, and you are doing what you have heard from your father.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: presence. Therefore do what you have heard from the Father.
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: ”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: “Abraham is our father,” they answered.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If you were Abraham’s children,”
  - type: text
    text: ' said Jesus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “then you would
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8:39 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some early manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: “If you are Abraham’s children,” said Jesus, “then
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: do what Abraham did.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: As it is, you are looking for a way to kill me, a man who has told you the truth that I heard from God. Abraham did not do such things.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You are doing the works of your own father.”
- type: usfm
  marker: p
  children:
  - type: text
    text: “We are not illegitimate children,” they protested. “The only Father we have is God himself.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If God were your Father, you would love me, for I have come here from God. I have not come on my own; God sent me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Why is my language not clear to you? Because you are unable to hear what I say.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: You belong to your father, the devil, and you want to carry out your father’s desires. He was a murderer from the beginning, not holding to the truth, for there is no truth in him. When he lies, he speaks his native language, for he is a liar and the father of lies.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Yet because I tell the truth, you do not believe me!
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Can any of you prove me guilty of sin? If I am telling the truth, why don’t you believe me?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Whoever belongs to God hears what God says. The reason you do not hear is that you do not belong to God.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jesus’ Claims About Himself
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: The Jews answered him, “Aren’t we right in saying that you are a Samaritan and demon-possessed?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “I am not possessed by a demon,”
  - type: text
    text: ' said Jesus, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “but I honor my Father and you dishonor me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: I am not seeking glory for myself; but there is one who seeks it, and he is the judge.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Very truly I tell you, whoever obeys my word will never see death.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'At this they exclaimed, “Now we know that you are demon-possessed! Abraham died and so did the prophets, yet you say that whoever obeys your word will never taste death. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Are you greater than our father Abraham? He died, and so did the prophets. Who do you think you are?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “If I glorify myself, my glory means nothing. My Father, whom you claim as your God, is the one who glorifies me.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Though you do not know him, I know him. If I said I did not, I would be a liar like you, but I do know him and obey his word.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Your father Abraham rejoiced at the thought of seeing my day; he saw it and was glad.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: “You are not yet fifty years old,” they said to him, “and you have seen Abraham!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Very truly I tell you,”
  - type: text
    text: ' Jesus answered, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “before Abraham was born, I am!”
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: At this, they picked up stones to stone him, but Jesus hid himself, slipping away from the temple grounds.
