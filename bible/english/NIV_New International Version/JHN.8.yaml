document_id: JHN.8,111
type_code: eng
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: but Jesus went to the Mount of Olives.
  '10':
  - type: text
    content: Jesus straightened up and asked her, “Woman, where are they? Has no one condemned you?”
  '11':
  - type: text
    content: ' '
  - type: text
    content: “No one, sir,” she said.
  - type: text
    content: “Then neither do I condemn you,” Jesus declared. “Go now and leave your life of sin.”
  - type: heading
    content: Dispute Over Jesus’ Testimony
  '12':
  - type: text
    content: 'When Jesus spoke again to the people, he said, '
  - type: text
    content: “I am the light of the world. Whoever follows me will never walk in darkness, but will have the light of life.”
  '13':
  - type: text
    content: The Pharisees challenged him, “Here you are, appearing as your own witness; your testimony is not valid.”
  '14':
  - type: text
    content: 'Jesus answered, '
  - type: text
    content: “Even if I testify on my own behalf, my testimony is valid, for I know where I came from and where I am going. But you have no idea where I come from or where I am going.
  - type: text
    content: ' '
  '15':
  - type: text
    content: You judge by human standards; I pass judgment on no one.
  - type: text
    content: ' '
  '16':
  - type: text
    content: But if I do judge, my decisions are true, because I am not alone. I stand with the Father, who sent me.
  - type: text
    content: ' '
  '17':
  - type: text
    content: In your own Law it is written that the testimony of two witnesses is true.
  - type: text
    content: ' '
  '18':
  - type: text
    content: I am one who testifies for myself; my other witness is the Father, who sent me.”
  '19':
  - type: text
    content: Then they asked him, “Where is your father?”
  - type: text
    content: “You do not know me or my Father,”
  - type: text
    content: ' Jesus replied. '
  - type: text
    content: “If you knew me, you would know my Father also.”
  - type: text
    content: ' '
  '2':
  - type: text
    content: ' '
  - type: text
    content: At dawn he appeared again in the temple courts, where all the people gathered around him, and he sat down to teach them.
  - type: text
    content: ' '
  '20':
  - type: text
    content: He spoke these words while teaching in the temple courts near the place where the offerings were put. Yet no one seized him, because his hour had not yet come.
  - type: heading
    content: Dispute Over Who Jesus Is
  '21':
  - type: text
    content: 'Once more Jesus said to them, '
  - type: text
    content: “I am going away, and you will look for me, and you will die in your sin. Where I go, you cannot come.”
  '22':
  - type: text
    content: 'This made the Jews ask, “Will he kill himself? Is that why he says, '
  - type: text
    content: ‘Where I go, you cannot come’
  - type: text
    content: ?”
  '23':
  - type: text
    content: 'But he continued, '
  - type: text
    content: “You are from below; I am from above. You are of this world; I am not of this world.
  - type: text
    content: ' '
  '24':
  - type: text
    content: I told you that you would die in your sins; if you do not believe that I am he, you will indeed die in your sins.”
  '25':
  - type: text
    content: “Who are you?” they asked.
  - type: text
    content: “Just what I have been telling you from the beginning,”
  - type: text
    content: ' Jesus replied. '
  '26':
  - type: text
    content: “I have much to say in judgment of you. But he who sent me is trustworthy, and what I have heard from him I tell the world.”
  '27':
  - type: text
    content: 'They did not understand that he was telling them about his Father. '
  '28':
  - type: text
    content: 'So Jesus said, '
  - type: text
    content: “When you have lifted up
  - type: note
    content: The Greek for lifted up also means exalted.
  - type: text
    content: ' '
  - type: text
    content: the Son of Man, then you will know that I am he and that I do nothing on my own but speak just what the Father has taught me.
  - type: text
    content: ' '
  '29':
  - type: text
    content: The one who sent me is with me; he has not left me alone, for I always do what pleases him.”
  - type: text
    content: ' '
  '3':
  - type: text
    content: The teachers of the law and the Pharisees brought in a woman caught in adultery. They made her stand before the group
  - type: text
    content: ' '
  '30':
  - type: text
    content: Even as he spoke, many believed in him.
  - type: heading
    content: Dispute Over Whose Children Jesus’ Opponents Are
  '31':
  - type: text
    content: 'To the Jews who had believed him, Jesus said, '
  - type: text
    content: “If you hold to my teaching, you are really my disciples.
  - type: text
    content: ' '
  '32':
  - type: text
    content: Then you will know the truth, and the truth will set you free.”
  '33':
  - type: text
    content: They answered him, “We are Abraham’s descendants and have never been slaves of anyone. How can you say that we shall be set free?”
  '34':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “Very truly I tell you, everyone who sins is a slave to sin.
  - type: text
    content: ' '
  '35':
  - type: text
    content: Now a slave has no permanent place in the family, but a son belongs to it forever.
  - type: text
    content: ' '
  '36':
  - type: text
    content: So if the Son sets you free, you will be free indeed.
  - type: text
    content: ' '
  '37':
  - type: text
    content: I know that you are Abraham’s descendants. Yet you are looking for a way to kill me, because you have no room for my word.
  - type: text
    content: ' '
  '38':
  - type: text
    content: I am telling you what I have seen in the Father’s presence, and you are doing what you have heard from your father.
  - type: note
    content: Or presence. Therefore do what you have heard from the Father.
  - type: text
    content: ”
  '39':
  - type: text
    content: “Abraham is our father,” they answered.
  - type: text
    content: “If you were Abraham’s children,”
  - type: text
    content: ' said Jesus, '
  - type: text
    content: “then you would
  - type: note
    content: Some early manuscripts “If you are Abraham’s children,” said Jesus, “then
  - type: text
    content: ' '
  - type: text
    content: do what Abraham did.
  - type: text
    content: ' '
  '4':
  - type: text
    content: and said to Jesus, “Teacher, this woman was caught in the act of adultery.
  - type: text
    content: ' '
  '40':
  - type: text
    content: As it is, you are looking for a way to kill me, a man who has told you the truth that I heard from God. Abraham did not do such things.
  - type: text
    content: ' '
  '41':
  - type: text
    content: You are doing the works of your own father.”
  - type: text
    content: “We are not illegitimate children,” they protested. “The only Father we have is God himself.”
  '42':
  - type: text
    content: 'Jesus said to them, '
  - type: text
    content: “If God were your Father, you would love me, for I have come here from God. I have not come on my own; God sent me.
  - type: text
    content: ' '
  '43':
  - type: text
    content: Why is my language not clear to you? Because you are unable to hear what I say.
  - type: text
    content: ' '
  '44':
  - type: text
    content: You belong to your father, the devil, and you want to carry out your father’s desires. He was a murderer from the beginning, not holding to the truth, for there is no truth in him. When he lies, he speaks his native language, for he is a liar and the father of lies.
  - type: text
    content: ' '
  '45':
  - type: text
    content: Yet because I tell the truth, you do not believe me!
  - type: text
    content: ' '
  '46':
  - type: text
    content: Can any of you prove me guilty of sin? If I am telling the truth, why don’t you believe me?
  - type: text
    content: ' '
  '47':
  - type: text
    content: Whoever belongs to God hears what God says. The reason you do not hear is that you do not belong to God.”
  - type: heading
    content: Jesus’ Claims About Himself
  '48':
  - type: text
    content: The Jews answered him, “Aren’t we right in saying that you are a Samaritan and demon-possessed?”
  '49':
  - type: text
    content: ' '
  - type: text
    content: “I am not possessed by a demon,”
  - type: text
    content: ' said Jesus, '
  - type: text
    content: “but I honor my Father and you dishonor me.
  - type: text
    content: ' '
  '5':
  - type: text
    content: In the Law Moses commanded us to stone such women. Now what do you say?”
  - type: text
    content: ' '
  '50':
  - type: text
    content: I am not seeking glory for myself; but there is one who seeks it, and he is the judge.
  - type: text
    content: ' '
  '51':
  - type: text
    content: Very truly I tell you, whoever obeys my word will never see death.”
  '52':
  - type: text
    content: 'At this they exclaimed, “Now we know that you are demon-possessed! Abraham died and so did the prophets, yet you say that whoever obeys your word will never taste death. '
  '53':
  - type: text
    content: Are you greater than our father Abraham? He died, and so did the prophets. Who do you think you are?”
  '54':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “If I glorify myself, my glory means nothing. My Father, whom you claim as your God, is the one who glorifies me.
  - type: text
    content: ' '
  '55':
  - type: text
    content: Though you do not know him, I know him. If I said I did not, I would be a liar like you, but I do know him and obey his word.
  - type: text
    content: ' '
  '56':
  - type: text
    content: Your father Abraham rejoiced at the thought of seeing my day; he saw it and was glad.”
  '57':
  - type: text
    content: “You are not yet fifty years old,” they said to him, “and you have seen Abraham!”
  '58':
  - type: text
    content: ' '
  - type: text
    content: “Very truly I tell you,”
  - type: text
    content: ' Jesus answered, '
  - type: text
    content: “before Abraham was born, I am!”
  - type: text
    content: ' '
  '59':
  - type: text
    content: At this, they picked up stones to stone him, but Jesus hid himself, slipping away from the temple grounds.
  '6':
  - type: text
    content: They were using this question as a trap, in order to have a basis for accusing him.
  - type: text
    content: But Jesus bent down and started to write on the ground with his finger.
  - type: text
    content: ' '
  '7':
  - type: text
    content: When they kept on questioning him, he straightened up and said to them, “Let any one of you who is without sin be the first to throw a stone at her.”
  - type: text
    content: ' '
  '8':
  - type: text
    content: Again he stooped down and wrote on the ground.
  '9':
  - type: text
    content: ' '
  - type: text
    content: At this, those who heard began to go away one at a time, the older ones first, until only Jesus was left, with the woman still standing there.
  - type: text
    content: ' '
