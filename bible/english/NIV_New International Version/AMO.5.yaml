document_id: AMO.5,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Lament and Call to Repentance
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hear this word, Israel, this lament I take up concerning you:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There are those who hate the one who upholds justice in court
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and detest the one who tells the truth.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You levy a straw tax on the poor
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and impose a tax on their grain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore, though you have built stone mansions,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will not live in them;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: though you have planted lush vineyards,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will not drink their wine.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For I know how many are your offenses
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and how great your sins.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There are those who oppress the innocent and take bribes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and deprive the poor of justice in the courts.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore the prudent keep quiet in such times,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for the times are evil.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seek good, not evil,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that you may live.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God Almighty will be with you,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: just as you say he is.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hate evil, love good;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: maintain justice in the courts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Perhaps the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God Almighty will have mercy'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: on the remnant of Joseph.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Therefore this is what the Lord, the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' God Almighty, says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “There will be wailing in all the streets
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cries of anguish in every public square.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The farmers will be summoned to weep
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the mourners to wail.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There will be wailing in all the vineyards,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for I will pass through your midst,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'The Day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Woe to you who long
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'for the day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Why do you long for the day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: That day will be darkness, not light.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It will be as though a man fled from a lion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: only to meet a bear,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as though he entered his house
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and rested his hand on the wall
  - type: usfm
    marker: q2
    children:
    - type: text
      text: only to have a snake bite him.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Fallen is Virgin Israel,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: never to rise again,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: deserted in her own land,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with no one to lift her up.”
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Will not the day of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' be darkness, not light—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: pitch-dark, without a ray of brightness?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I hate, I despise your religious festivals;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your assemblies are a stench to me.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Even though you bring me burnt offerings and grain offerings,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not accept them.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Though you bring choice fellowship offerings,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will have no regard for them.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Away with the noise of your songs!
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will not listen to the music of your harps.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But let justice roll on like a river,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: righteousness like a never-failing stream!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Did you bring me sacrifices and offerings
  - type: usfm
    marker: q2
    children:
    - type: text
      text: forty years in the wilderness, people of Israel?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You have lifted up the shrine of your king,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the pedestal of your idols,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the star of your god
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: lifted up Sakkuth your king / and Kaiwan your idols, / your star-gods
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; Septuagint '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: lifted up the shrine of Molek / and the star of your god Rephan, / their idols
      marker-yv: yv-n
    - type: text
      text: —
  - type: usfm
    marker: q2
    children:
    - type: text
      text: which you made for yourselves.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Therefore I will send you into exile beyond Damascus,”
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', whose name is God Almighty.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says to Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Your city that marches out a thousand strong
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will have only a hundred left;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: your town that marches out a hundred strong
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will have only ten left.”
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says to Israel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Seek me and live;
  '5':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not seek Bethel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: do not go to Gilgal,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not journey to Beersheba.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For Gilgal will surely go into exile,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Bethel will be reduced to nothing.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'aven, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a reference to Beth Aven (a derogatory name for Bethel); see Hosea 4:15.
      marker-yv: yv-n
    - type: text
      text: ”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Seek the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and live,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or he will sweep through the tribes of Joseph like a fire;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: it will devour them,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and Bethel will have no one to quench it.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: There are those who turn justice into bitterness
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cast righteousness to the ground.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He who made the Pleiades and Orion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who turns midnight into dawn
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and darkens day into night,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: who calls for the waters of the sea
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and pours them out over the face of the land—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is his name.'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With a blinding flash he destroys the stronghold
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and brings the fortified city to ruin.
