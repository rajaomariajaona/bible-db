document_id: AMO.5,111
type_code: eng
verses:
  '1':
  - type: heading
    content: A Lament and Call to Repentance
  - type: text
    content: 'Hear this word, Israel, this lament I take up concerning you:'
  '10':
  - type: text
    content: There are those who hate the one who upholds justice in court
  - type: text
    content: and detest the one who tells the truth.
  '11':
  - type: text
    content: You levy a straw tax on the poor
  - type: text
    content: and impose a tax on their grain.
  - type: text
    content: Therefore, though you have built stone mansions,
  - type: text
    content: you will not live in them;
  - type: text
    content: though you have planted lush vineyards,
  - type: text
    content: you will not drink their wine.
  '12':
  - type: text
    content: For I know how many are your offenses
  - type: text
    content: and how great your sins.
  - type: text
    content: There are those who oppress the innocent and take bribes
  - type: text
    content: and deprive the poor of justice in the courts.
  '13':
  - type: text
    content: Therefore the prudent keep quiet in such times,
  - type: text
    content: for the times are evil.
  '14':
  - type: text
    content: Seek good, not evil,
  - type: text
    content: that you may live.
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' God Almighty will be with you,'
  - type: text
    content: just as you say he is.
  '15':
  - type: text
    content: Hate evil, love good;
  - type: text
    content: maintain justice in the courts.
  - type: text
    content: 'Perhaps the '
  - type: text
    content: Lord
  - type: text
    content: ' God Almighty will have mercy'
  - type: text
    content: on the remnant of Joseph.
  '16':
  - type: text
    content: 'Therefore this is what the Lord, the '
  - type: text
    content: Lord
  - type: text
    content: ' God Almighty, says:'
  - type: text
    content: “There will be wailing in all the streets
  - type: text
    content: and cries of anguish in every public square.
  - type: text
    content: The farmers will be summoned to weep
  - type: text
    content: and the mourners to wail.
  '17':
  - type: text
    content: There will be wailing in all the vineyards,
  - type: text
    content: for I will pass through your midst,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: The Day of the Lord
  '18':
  - type: text
    content: Woe to you who long
  - type: text
    content: 'for the day of the '
  - type: text
    content: Lord
  - type: text
    content: '!'
  - type: text
    content: 'Why do you long for the day of the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: That day will be darkness, not light.
  '19':
  - type: text
    content: It will be as though a man fled from a lion
  - type: text
    content: only to meet a bear,
  - type: text
    content: as though he entered his house
  - type: text
    content: and rested his hand on the wall
  - type: text
    content: only to have a snake bite him.
  '2':
  - type: text
    content: “Fallen is Virgin Israel,
  - type: text
    content: never to rise again,
  - type: text
    content: deserted in her own land,
  - type: text
    content: with no one to lift her up.”
  '20':
  - type: text
    content: 'Will not the day of the '
  - type: text
    content: Lord
  - type: text
    content: ' be darkness, not light—'
  - type: text
    content: pitch-dark, without a ray of brightness?
  '21':
  - type: text
    content: “I hate, I despise your religious festivals;
  - type: text
    content: your assemblies are a stench to me.
  '22':
  - type: text
    content: Even though you bring me burnt offerings and grain offerings,
  - type: text
    content: I will not accept them.
  - type: text
    content: Though you bring choice fellowship offerings,
  - type: text
    content: I will have no regard for them.
  '23':
  - type: text
    content: Away with the noise of your songs!
  - type: text
    content: I will not listen to the music of your harps.
  '24':
  - type: text
    content: But let justice roll on like a river,
  - type: text
    content: righteousness like a never-failing stream!
  '25':
  - type: text
    content: “Did you bring me sacrifices and offerings
  - type: text
    content: forty years in the wilderness, people of Israel?
  '26':
  - type: text
    content: You have lifted up the shrine of your king,
  - type: text
    content: the pedestal of your idols,
  - type: text
    content: the star of your god
  - type: note
    content: Or lifted up Sakkuth your king / and Kaiwan your idols, / your star-gods; Septuagint lifted up the shrine of Molek / and the star of your god Rephan, / their idols
  - type: text
    content: —
  - type: text
    content: which you made for yourselves.
  '27':
  - type: text
    content: Therefore I will send you into exile beyond Damascus,”
  - type: text
    content: 'says the '
  - type: text
    content: Lord
  - type: text
    content: ', whose name is God Almighty.'
  '3':
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says to Israel:'
  - type: text
    content: “Your city that marches out a thousand strong
  - type: text
    content: will have only a hundred left;
  - type: text
    content: your town that marches out a hundred strong
  - type: text
    content: will have only ten left.”
  '4':
  - type: text
    content: 'This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says to Israel:'
  - type: text
    content: “Seek me and live;
  '5':
  - type: text
    content: do not seek Bethel,
  - type: text
    content: do not go to Gilgal,
  - type: text
    content: do not journey to Beersheba.
  - type: text
    content: For Gilgal will surely go into exile,
  - type: text
    content: and Bethel will be reduced to nothing.
  - type: note
    content: Hebrew aven, a reference to Beth Aven (a derogatory name for Bethel); see Hosea 4:15.
  - type: text
    content: ”
  '6':
  - type: text
    content: 'Seek the '
  - type: text
    content: Lord
  - type: text
    content: ' and live,'
  - type: text
    content: or he will sweep through the tribes of Joseph like a fire;
  - type: text
    content: it will devour them,
  - type: text
    content: and Bethel will have no one to quench it.
  '7':
  - type: text
    content: There are those who turn justice into bitterness
  - type: text
    content: and cast righteousness to the ground.
  '8':
  - type: text
    content: He who made the Pleiades and Orion,
  - type: text
    content: who turns midnight into dawn
  - type: text
    content: and darkens day into night,
  - type: text
    content: who calls for the waters of the sea
  - type: text
    content: and pours them out over the face of the land—
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is his name.'
  '9':
  - type: text
    content: With a blinding flash he destroys the stronghold
  - type: text
    content: and brings the fortified city to ruin.
