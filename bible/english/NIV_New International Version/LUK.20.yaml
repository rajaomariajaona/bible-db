document_id: LUK.20
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Authority of Jesus Questioned
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'One day as Jesus was teaching the people in the temple courts and proclaiming the good news, the chief priests and the teachers of the law, together with the elders, came up to him. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: “Tell us by what authority you are doing these things,” they said. “Who gave you this authority?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'He replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“I will also ask you a question. Tell me:'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: John’s baptism—was it from heaven, or of human origin?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'They discussed it among themselves and said, “If we say, ‘From heaven,’ he will ask, ‘Why didn’t you believe him?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: But if we say, ‘Of human origin,’ all the people will stone us, because they are persuaded that John was a prophet.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: So they answered, “We don’t know where it was from.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jesus said, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Neither will I tell you by what authority I am doing these things.”
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Parable of the Tenants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'He went on to tell the people this parable: '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “A man planted a vineyard, rented it to some farmers and went away for a long time.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: At harvest time he sent a servant to the tenants so they would give him some of the fruit of the vineyard. But the tenants beat him and sent him away empty-handed.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He sent another servant, but that one also they beat and treated shamefully and sent away empty-handed.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He sent still a third, and they wounded him and threw him out.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Then the owner of the vineyard said, ‘What shall I do? I will send my son, whom I love; perhaps they will respect him.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “But when the tenants saw him, they talked the matter over. ‘This is the heir,’ they said. ‘Let’s kill him, and the inheritance will be ours.’
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: So they threw him out of the vineyard and killed him.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “What then will the owner of the vineyard do to them?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He will come and kill those tenants and give the vineyard to others.”
- type: usfm
  marker: p
  children:
  - type: text
    text: When the people heard this, they said, “God forbid!”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jesus looked directly at them and asked, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“Then what is the meaning of that which is written:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “ ‘The stone the builders rejected
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: has become the cornerstone’
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 118:22
    marker-yv: yv-n
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '?'
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: Everyone who falls on that stone will be broken to pieces; anyone on whom it falls will be crushed.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The teachers of the law and the chief priests looked for a way to arrest him immediately, because they knew he had spoken this parable against them. But they were afraid of the people.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paying Taxes to Caesar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Keeping a close watch on him, they sent spies, who pretended to be sincere. They hoped to catch Jesus in something he said, so that they might hand him over to the power and authority of the governor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'So the spies questioned him: “Teacher, we know that you speak and teach what is right, and that you do not show partiality but teach the way of God in accordance with the truth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Is it right for us to pay taxes to Caesar or not?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'He saw through their duplicity and said to them, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Show me a denarius. Whose image and inscription are on it?”
- type: usfm
  marker: p
  children:
  - type: text
    text: “Caesar’s,” they replied.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'He said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Then give back to Caesar what is Caesar’s, and to God what is God’s.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: They were unable to trap him in what he had said there in public. And astonished by his answer, they became silent.
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Resurrection and Marriage
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Some of the Sadducees, who say there is no resurrection, came to Jesus with a question. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '“Teacher,” they said, “Moses wrote for us that if a man’s brother dies and leaves a wife but no children, the man must marry the widow and raise up offspring for his brother. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Now there were seven brothers. The first one married a woman and died childless. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'The second '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'and then the third married her, and in the same way the seven died, leaving no children. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Finally, the woman died too. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Now then, at the resurrection whose wife will she be, since the seven were married to her?”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jesus replied, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “The people of this age marry and are given in marriage.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But those who are considered worthy of taking part in the age to come and in the resurrection from the dead will neither marry nor be given in marriage,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: and they can no longer die; for they are like the angels. They are God’s children, since they are children of the resurrection.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: But in the account of the burning bush, even Moses showed that the dead rise, for he calls the Lord ‘the God of Abraham, and the God of Isaac, and the God of Jacob.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Exodus 3:6
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: He is not the God of the dead, but of the living, for to him all are alive.”
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Some of the teachers of the law responded, “Well said, teacher!” '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: And no one dared to ask him any more questions.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Whose Son Is the Messiah?
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Then Jesus said to them, '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Why is it said that the Messiah is the son of David?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: 'David himself declares in the Book of Psalms:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: '“ ‘The Lord said to my Lord:'
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Sit at my right hand
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: until I make your enemies
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: wj
    children:
    - type: text
      text: a footstool for your feet.” ’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20:43 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Psalm 110:1
    marker-yv: yv-n
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: ' '
  - type: usfm
    marker: wj
    children:
    - type: text
      text: David calls him ‘Lord.’ How then can he be his son?”
- type: usfm
  marker: s1
  children:
  - type: text
    text: Warning Against the Teachers of the Law
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'While all the people were listening, Jesus said to his disciples, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: “Beware of the teachers of the law. They like to walk around in flowing robes and love to be greeted with respect in the marketplaces and have the most important seats in the synagogues and the places of honor at banquets.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: wj
    children:
    - type: text
      text: They devour widows’ houses and for a show make lengthy prayers. These men will be punished most severely.”
