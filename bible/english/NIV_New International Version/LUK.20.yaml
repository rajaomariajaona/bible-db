document_id: LUK.20,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Authority of Jesus Questioned
  - type: text
    content: 'One day as Jesus was teaching the people in the temple courts and proclaiming the good news, the chief priests and the teachers of the law, together with the elders, came up to him. '
  '10':
  - type: text
    content: At harvest time he sent a servant to the tenants so they would give him some of the fruit of the vineyard. But the tenants beat him and sent him away empty-handed.
  - type: text
    content: ' '
  '11':
  - type: text
    content: He sent another servant, but that one also they beat and treated shamefully and sent away empty-handed.
  - type: text
    content: ' '
  '12':
  - type: text
    content: He sent still a third, and they wounded him and threw him out.
  '13':
  - type: text
    content: ' '
  - type: text
    content: “Then the owner of the vineyard said, ‘What shall I do? I will send my son, whom I love; perhaps they will respect him.’
  '14':
  - type: text
    content: ' '
  - type: text
    content: “But when the tenants saw him, they talked the matter over. ‘This is the heir,’ they said. ‘Let’s kill him, and the inheritance will be ours.’
  - type: text
    content: ' '
  '15':
  - type: text
    content: So they threw him out of the vineyard and killed him.
  - type: text
    content: “What then will the owner of the vineyard do to them?
  - type: text
    content: ' '
  '16':
  - type: text
    content: He will come and kill those tenants and give the vineyard to others.”
  - type: text
    content: When the people heard this, they said, “God forbid!”
  '17':
  - type: text
    content: 'Jesus looked directly at them and asked, '
  - type: text
    content: '“Then what is the meaning of that which is written:'
  - type: text
    content: “ ‘The stone the builders rejected
  - type: text
    content: has become the cornerstone’
  - type: text
    content: ' '
  - type: note
    content: Psalm 118:22
  - type: text
    content: '?'
  '18':
  - type: text
    content: ' '
  - type: text
    content: Everyone who falls on that stone will be broken to pieces; anyone on whom it falls will be crushed.”
  '19':
  - type: text
    content: The teachers of the law and the chief priests looked for a way to arrest him immediately, because they knew he had spoken this parable against them. But they were afraid of the people.
  - type: heading
    content: Paying Taxes to Caesar
  '2':
  - type: text
    content: “Tell us by what authority you are doing these things,” they said. “Who gave you this authority?”
  '20':
  - type: text
    content: 'Keeping a close watch on him, they sent spies, who pretended to be sincere. They hoped to catch Jesus in something he said, so that they might hand him over to the power and authority of the governor. '
  '21':
  - type: text
    content: 'So the spies questioned him: “Teacher, we know that you speak and teach what is right, and that you do not show partiality but teach the way of God in accordance with the truth. '
  '22':
  - type: text
    content: Is it right for us to pay taxes to Caesar or not?”
  '23':
  - type: text
    content: 'He saw through their duplicity and said to them, '
  '24':
  - type: text
    content: “Show me a denarius. Whose image and inscription are on it?”
  - type: text
    content: “Caesar’s,” they replied.
  '25':
  - type: text
    content: 'He said to them, '
  - type: text
    content: “Then give back to Caesar what is Caesar’s, and to God what is God’s.”
  '26':
  - type: text
    content: They were unable to trap him in what he had said there in public. And astonished by his answer, they became silent.
  - type: heading
    content: The Resurrection and Marriage
  '27':
  - type: text
    content: 'Some of the Sadducees, who say there is no resurrection, came to Jesus with a question. '
  '28':
  - type: text
    content: '“Teacher,” they said, “Moses wrote for us that if a man’s brother dies and leaves a wife but no children, the man must marry the widow and raise up offspring for his brother. '
  '29':
  - type: text
    content: 'Now there were seven brothers. The first one married a woman and died childless. '
  '3':
  - type: text
    content: 'He replied, '
  - type: text
    content: '“I will also ask you a question. Tell me:'
  - type: text
    content: ' '
  '30':
  - type: text
    content: 'The second '
  '31':
  - type: text
    content: 'and then the third married her, and in the same way the seven died, leaving no children. '
  '32':
  - type: text
    content: 'Finally, the woman died too. '
  '33':
  - type: text
    content: Now then, at the resurrection whose wife will she be, since the seven were married to her?”
  '34':
  - type: text
    content: 'Jesus replied, '
  - type: text
    content: “The people of this age marry and are given in marriage.
  - type: text
    content: ' '
  '35':
  - type: text
    content: But those who are considered worthy of taking part in the age to come and in the resurrection from the dead will neither marry nor be given in marriage,
  - type: text
    content: ' '
  '36':
  - type: text
    content: and they can no longer die; for they are like the angels. They are God’s children, since they are children of the resurrection.
  - type: text
    content: ' '
  '37':
  - type: text
    content: But in the account of the burning bush, even Moses showed that the dead rise, for he calls the Lord ‘the God of Abraham, and the God of Isaac, and the God of Jacob.’
  - type: note
    content: Exodus 3:6
  - type: text
    content: ' '
  '38':
  - type: text
    content: He is not the God of the dead, but of the living, for to him all are alive.”
  '39':
  - type: text
    content: 'Some of the teachers of the law responded, “Well said, teacher!” '
  '4':
  - type: text
    content: John’s baptism—was it from heaven, or of human origin?”
  '40':
  - type: text
    content: And no one dared to ask him any more questions.
  - type: heading
    content: Whose Son Is the Messiah?
  '41':
  - type: text
    content: 'Then Jesus said to them, '
  - type: text
    content: “Why is it said that the Messiah is the son of David?
  - type: text
    content: ' '
  '42':
  - type: text
    content: 'David himself declares in the Book of Psalms:'
  - type: text
    content: '“ ‘The Lord said to my Lord:'
  - type: text
    content: “Sit at my right hand
  '43':
  - type: text
    content: ' '
  - type: text
    content: until I make your enemies
  - type: text
    content: a footstool for your feet.” ’
  - type: note
    content: Psalm 110:1
  '44':
  - type: text
    content: ' '
  - type: text
    content: David calls him ‘Lord.’ How then can he be his son?”
  - type: heading
    content: Warning Against the Teachers of the Law
  '45':
  - type: text
    content: 'While all the people were listening, Jesus said to his disciples, '
  '46':
  - type: text
    content: “Beware of the teachers of the law. They like to walk around in flowing robes and love to be greeted with respect in the marketplaces and have the most important seats in the synagogues and the places of honor at banquets.
  - type: text
    content: ' '
  '47':
  - type: text
    content: They devour widows’ houses and for a show make lengthy prayers. These men will be punished most severely.”
  '5':
  - type: text
    content: 'They discussed it among themselves and said, “If we say, ‘From heaven,’ he will ask, ‘Why didn’t you believe him?’ '
  '6':
  - type: text
    content: But if we say, ‘Of human origin,’ all the people will stone us, because they are persuaded that John was a prophet.”
  '7':
  - type: text
    content: So they answered, “We don’t know where it was from.”
  '8':
  - type: text
    content: 'Jesus said, '
  - type: text
    content: “Neither will I tell you by what authority I am doing these things.”
  - type: heading
    content: The Parable of the Tenants
  '9':
  - type: text
    content: 'He went on to tell the people this parable: '
  - type: text
    content: “A man planted a vineyard, rented it to some farmers and went away for a long time.
  - type: text
    content: ' '
