document_id: 1CH.21,111
type_code: eng
verses:
  '1':
  - type: heading
    content: David Counts the Fighting Men
  - type: text
    content: 'Satan rose up against Israel and incited David to take a census of Israel. '
  '10':
  - type: text
    content: '“Go and tell David, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: I am giving you three options. Choose one of them for me to carry out against you.’ ”'
  '11':
  - type: text
    content: 'So Gad went to David and said to him, “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: ‘Take your choice: '
  '12':
  - type: text
    content: three years of famine, three months of being swept away
  - type: note
    content: Hebrew; Septuagint and Vulgate (see also 2 Samuel 24:13) of fleeing
  - type: text
    content: ' before your enemies, with their swords overtaking you, or three days of the sword of the '
  - type: text
    content: Lord
  - type: text
    content: '—days of plague in the land, with the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' ravaging every part of Israel.’ Now then, decide how I should answer the one who sent me.”'
  '13':
  - type: text
    content: 'David said to Gad, “I am in deep distress. Let me fall into the hands of the '
  - type: text
    content: Lord
  - type: text
    content: ', for his mercy is very great; but do not let me fall into human hands.”'
  '14':
  - type: text
    content: 'So the '
  - type: text
    content: Lord
  - type: text
    content: ' sent a plague on Israel, and seventy thousand men of Israel fell dead. '
  '15':
  - type: text
    content: 'And God sent an angel to destroy Jerusalem. But as the angel was doing so, the '
  - type: text
    content: Lord
  - type: text
    content: ' saw it and relented concerning the disaster and said to the angel who was destroying the people, “Enough! Withdraw your hand.” The angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' was then standing at the threshing floor of Araunah'
  - type: note
    content: Hebrew Ornan, a variant of Araunah; also in verses 18-28
  - type: text
    content: ' the Jebusite.'
  '16':
  - type: text
    content: 'David looked up and saw the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' standing between heaven and earth, with a drawn sword in his hand extended over Jerusalem. Then David and the elders, clothed in sackcloth, fell facedown.'
  '17':
  - type: text
    content: David said to God, “Was it not I who ordered the fighting men to be counted? I, the shepherd,
  - type: note
    content: Probable reading of the original Hebrew text (see 2 Samuel 24:17 and note); Masoretic Text does not have the shepherd.
  - type: text
    content: ' have sinned and done wrong. These are but sheep. What have they done? '
  - type: text
    content: Lord
  - type: text
    content: ' my God, let your hand fall on me and my family, but do not let this plague remain on your people.”'
  - type: heading
    content: David Builds an Altar
  '18':
  - type: text
    content: 'Then the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' ordered Gad to tell David to go up and build an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' on the threshing floor of Araunah the Jebusite. '
  '19':
  - type: text
    content: 'So David went up in obedience to the word that Gad had spoken in the name of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '2':
  - type: text
    content: So David said to Joab and the commanders of the troops, “Go and count the Israelites from Beersheba to Dan. Then report back to me so that I may know how many there are.”
  '20':
  - type: text
    content: 'While Araunah was threshing wheat, he turned and saw the angel; his four sons who were with him hid themselves. '
  '21':
  - type: text
    content: Then David approached, and when Araunah looked and saw him, he left the threshing floor and bowed down before David with his face to the ground.
  '22':
  - type: text
    content: 'David said to him, “Let me have the site of your threshing floor so I can build an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ', that the plague on the people may be stopped. Sell it to me at the full price.”'
  '23':
  - type: text
    content: Araunah said to David, “Take it! Let my lord the king do whatever pleases him. Look, I will give the oxen for the burnt offerings, the threshing sledges for the wood, and the wheat for the grain offering. I will give all this.”
  '24':
  - type: text
    content: 'But King David replied to Araunah, “No, I insist on paying the full price. I will not take for the '
  - type: text
    content: Lord
  - type: text
    content: ' what is yours, or sacrifice a burnt offering that costs me nothing.”'
  '25':
  - type: text
    content: So David paid Araunah six hundred shekels
  - type: note
    content: That is, about 15 pounds or about 6.9 kilograms
  - type: text
    content: ' of gold for the site. '
  '26':
  - type: text
    content: 'David built an altar to the '
  - type: text
    content: Lord
  - type: text
    content: ' there and sacrificed burnt offerings and fellowship offerings. He called on the '
  - type: text
    content: Lord
  - type: text
    content: ', and the '
  - type: text
    content: Lord
  - type: text
    content: ' answered him with fire from heaven on the altar of burnt offering.'
  '27':
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' spoke to the angel, and he put his sword back into its sheath. '
  '28':
  - type: text
    content: 'At that time, when David saw that the '
  - type: text
    content: Lord
  - type: text
    content: ' had answered him on the threshing floor of Araunah the Jebusite, he offered sacrifices there. '
  '29':
  - type: text
    content: 'The tabernacle of the '
  - type: text
    content: Lord
  - type: text
    content: ', which Moses had made in the wilderness, and the altar of burnt offering were at that time on the high place at Gibeon. '
  '3':
  - type: text
    content: 'But Joab replied, “May the '
  - type: text
    content: Lord
  - type: text
    content: ' multiply his troops a hundred times over. My lord the king, are they not all my lord’s subjects? Why does my lord want to do this? Why should he bring guilt on Israel?”'
  '30':
  - type: text
    content: 'But David could not go before it to inquire of God, because he was afraid of the sword of the angel of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: 'The king’s word, however, overruled Joab; so Joab left and went throughout Israel and then came back to Jerusalem. '
  '5':
  - type: text
    content: 'Joab reported the number of the fighting men to David: In all Israel there were one million one hundred thousand men who could handle a sword, including four hundred and seventy thousand in Judah.'
  '6':
  - type: text
    content: 'But Joab did not include Levi and Benjamin in the numbering, because the king’s command was repulsive to him. '
  '7':
  - type: text
    content: This command was also evil in the sight of God; so he punished Israel.
  '8':
  - type: text
    content: Then David said to God, “I have sinned greatly by doing this. Now, I beg you, take away the guilt of your servant. I have done a very foolish thing.”
  '9':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' said to Gad, David’s seer, '
