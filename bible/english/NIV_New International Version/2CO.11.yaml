document_id: 2CO.11,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Paul and the False Apostles
  - type: text
    content: 'I hope you will put up with me in a little foolishness. Yes, please put up with me! '
  '10':
  - type: text
    content: 'As surely as the truth of Christ is in me, nobody in the regions of Achaia will stop this boasting of mine. '
  '11':
  - type: text
    content: Why? Because I do not love you? God knows I do!
  '12':
  - type: text
    content: 'And I will keep on doing what I am doing in order to cut the ground from under those who want an opportunity to be considered equal with us in the things they boast about. '
  '13':
  - type: text
    content: 'For such people are false apostles, deceitful workers, masquerading as apostles of Christ. '
  '14':
  - type: text
    content: 'And no wonder, for Satan himself masquerades as an angel of light. '
  '15':
  - type: text
    content: It is not surprising, then, if his servants also masquerade as servants of righteousness. Their end will be what their actions deserve.
  - type: heading
    content: Paul Boasts About His Sufferings
  '16':
  - type: text
    content: 'I repeat: Let no one take me for a fool. But if you do, then tolerate me just as you would a fool, so that I may do a little boasting. '
  '17':
  - type: text
    content: 'In this self-confident boasting I am not talking as the Lord would, but as a fool. '
  '18':
  - type: text
    content: 'Since many are boasting in the way the world does, I too will boast. '
  '19':
  - type: text
    content: 'You gladly put up with fools since you are so wise! '
  '2':
  - type: text
    content: 'I am jealous for you with a godly jealousy. I promised you to one husband, to Christ, so that I might present you as a pure virgin to him. '
  '20':
  - type: text
    content: 'In fact, you even put up with anyone who enslaves you or exploits you or takes advantage of you or puts on airs or slaps you in the face. '
  '21':
  - type: text
    content: To my shame I admit that we were too weak for that!
  - type: text
    content: 'Whatever anyone else dares to boast about—I am speaking as a fool—I also dare to boast about. '
  '22':
  - type: text
    content: 'Are they Hebrews? So am I. Are they Israelites? So am I. Are they Abraham’s descendants? So am I. '
  '23':
  - type: text
    content: 'Are they servants of Christ? (I am out of my mind to talk like this.) I am more. I have worked much harder, been in prison more frequently, been flogged more severely, and been exposed to death again and again. '
  '24':
  - type: text
    content: 'Five times I received from the Jews the forty lashes minus one. '
  '25':
  - type: text
    content: 'Three times I was beaten with rods, once I was pelted with stones, three times I was shipwrecked, I spent a night and a day in the open sea, '
  '26':
  - type: text
    content: 'I have been constantly on the move. I have been in danger from rivers, in danger from bandits, in danger from my fellow Jews, in danger from Gentiles; in danger in the city, in danger in the country, in danger at sea; and in danger from false believers. '
  '27':
  - type: text
    content: 'I have labored and toiled and have often gone without sleep; I have known hunger and thirst and have often gone without food; I have been cold and naked. '
  '28':
  - type: text
    content: 'Besides everything else, I face daily the pressure of my concern for all the churches. '
  '29':
  - type: text
    content: Who is weak, and I do not feel weak? Who is led into sin, and I do not inwardly burn?
  '3':
  - type: text
    content: 'But I am afraid that just as Eve was deceived by the serpent’s cunning, your minds may somehow be led astray from your sincere and pure devotion to Christ. '
  '30':
  - type: text
    content: 'If I must boast, I will boast of the things that show my weakness. '
  '31':
  - type: text
    content: 'The God and Father of the Lord Jesus, who is to be praised forever, knows that I am not lying. '
  '32':
  - type: text
    content: 'In Damascus the governor under King Aretas had the city of the Damascenes guarded in order to arrest me. '
  '33':
  - type: text
    content: But I was lowered in a basket from a window in the wall and slipped through his hands.
  '4':
  - type: text
    content: For if someone comes to you and preaches a Jesus other than the Jesus we preached, or if you receive a different spirit from the Spirit you received, or a different gospel from the one you accepted, you put up with it easily enough.
  '5':
  - type: text
    content: I do not think I am in the least inferior to those “super-apostles.”
  - type: note
    content: Or to the most eminent apostles
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'I may indeed be untrained as a speaker, but I do have knowledge. We have made this perfectly clear to you in every way. '
  '7':
  - type: text
    content: 'Was it a sin for me to lower myself in order to elevate you by preaching the gospel of God to you free of charge? '
  '8':
  - type: text
    content: 'I robbed other churches by receiving support from them so as to serve you. '
  '9':
  - type: text
    content: 'And when I was with you and needed something, I was not a burden to anyone, for the brothers who came from Macedonia supplied what I needed. I have kept myself from being a burden to you in any way, and will continue to do so. '
