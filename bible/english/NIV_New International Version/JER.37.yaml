document_id: JER.37,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jeremiah in Prison
  - type: text
    content: Zedekiah son of Josiah was made king of Judah by Nebuchadnezzar king of Babylon; he reigned in place of Jehoiachin
  - type: note
    content: Hebrew Koniah, a variant of Jehoiachin
  - type: text
    content: ' son of Jehoiakim. '
  '10':
  - type: text
    content: Even if you were to defeat the entire Babylonian
  - type: note
    content: Or Chaldean; also in verse 11
  - type: text
    content: ' army that is attacking you and only wounded men were left in their tents, they would come out and burn this city down.”'
  '11':
  - type: text
    content: 'After the Babylonian army had withdrawn from Jerusalem because of Pharaoh’s army, '
  '12':
  - type: text
    content: 'Jeremiah started to leave the city to go to the territory of Benjamin to get his share of the property among the people there. '
  '13':
  - type: text
    content: But when he reached the Benjamin Gate, the captain of the guard, whose name was Irijah son of Shelemiah, the son of Hananiah, arrested him and said, “You are deserting to the Babylonians!”
  '14':
  - type: text
    content: '“That’s not true!” Jeremiah said. “I am not deserting to the Babylonians.” But Irijah would not listen to him; instead, he arrested Jeremiah and brought him to the officials. '
  '15':
  - type: text
    content: They were angry with Jeremiah and had him beaten and imprisoned in the house of Jonathan the secretary, which they had made into a prison.
  '16':
  - type: text
    content: 'Jeremiah was put into a vaulted cell in a dungeon, where he remained a long time. '
  '17':
  - type: text
    content: 'Then King Zedekiah sent for him and had him brought to the palace, where he asked him privately, “Is there any word from the '
  - type: text
    content: Lord
  - type: text
    content: ?”
  - type: text
    content: “Yes,” Jeremiah replied, “you will be delivered into the hands of the king of Babylon.”
  '18':
  - type: text
    content: 'Then Jeremiah said to King Zedekiah, “What crime have I committed against you or your attendants or this people, that you have put me in prison? '
  '19':
  - type: text
    content: 'Where are your prophets who prophesied to you, ‘The king of Babylon will not attack you or this land’? '
  '2':
  - type: text
    content: 'Neither he nor his attendants nor the people of the land paid any attention to the words the '
  - type: text
    content: Lord
  - type: text
    content: ' had spoken through Jeremiah the prophet.'
  '20':
  - type: text
    content: 'But now, my lord the king, please listen. Let me bring my petition before you: Do not send me back to the house of Jonathan the secretary, or I will die there.”'
  '21':
  - type: text
    content: King Zedekiah then gave orders for Jeremiah to be placed in the courtyard of the guard and given a loaf of bread from the street of the bakers each day until all the bread in the city was gone. So Jeremiah remained in the courtyard of the guard.
  '3':
  - type: text
    content: 'King Zedekiah, however, sent Jehukal son of Shelemiah with the priest Zephaniah son of Maaseiah to Jeremiah the prophet with this message: “Please pray to the '
  - type: text
    content: Lord
  - type: text
    content: ' our God for us.”'
  '4':
  - type: text
    content: 'Now Jeremiah was free to come and go among the people, for he had not yet been put in prison. '
  '5':
  - type: text
    content: Pharaoh’s army had marched out of Egypt, and when the Babylonians
  - type: note
    content: Or Chaldeans; also in verses 8, 9, 13 and 14
  - type: text
    content: ' who were besieging Jerusalem heard the report about them, they withdrew from Jerusalem.'
  '6':
  - type: text
    content: 'Then the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' came to Jeremiah the prophet: '
  '7':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: Tell the king of Judah, who sent you to inquire of me, ‘Pharaoh’s army, which has marched out to support you, will go back to its own land, to Egypt. '
  '8':
  - type: text
    content: Then the Babylonians will return and attack this city; they will capture it and burn it down.’
  '9':
  - type: text
    content: '“This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Do not deceive yourselves, thinking, ‘The Babylonians will surely leave us.’ They will not! '
