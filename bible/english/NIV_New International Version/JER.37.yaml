document_id: JER.37,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeremiah in Prison
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Zedekiah son of Josiah was made king of Judah by Nebuchadnezzar king of Babylon; he reigned in place of Jehoiachin
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Koniah, '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a variant of '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jehoiachin
      marker-yv: yv-n
    - type: text
      text: ' son of Jehoiakim. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Even if you were to defeat the entire Babylonian
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldean
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verse 11
      marker-yv: yv-n
    - type: text
      text: ' army that is attacking you and only wounded men were left in their tents, they would come out and burn this city down.”'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After the Babylonian army had withdrawn from Jerusalem because of Pharaoh’s army, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jeremiah started to leave the city to go to the territory of Benjamin to get his share of the property among the people there. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: But when he reached the Benjamin Gate, the captain of the guard, whose name was Irijah son of Shelemiah, the son of Hananiah, arrested him and said, “You are deserting to the Babylonians!”
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“That’s not true!” Jeremiah said. “I am not deserting to the Babylonians.” But Irijah would not listen to him; instead, he arrested Jeremiah and brought him to the officials. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: They were angry with Jeremiah and had him beaten and imprisoned in the house of Jonathan the secretary, which they had made into a prison.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jeremiah was put into a vaulted cell in a dungeon, where he remained a long time. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then King Zedekiah sent for him and had him brought to the palace, where he asked him privately, “Is there any word from the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ?”
  - type: usfm
    marker: p
    children:
    - type: text
      text: “Yes,” Jeremiah replied, “you will be delivered into the hands of the king of Babylon.”
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then Jeremiah said to King Zedekiah, “What crime have I committed against you or your attendants or this people, that you have put me in prison? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Where are your prophets who prophesied to you, ‘The king of Babylon will not attack you or this land’? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Neither he nor his attendants nor the people of the land paid any attention to the words the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' had spoken through Jeremiah the prophet.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'But now, my lord the king, please listen. Let me bring my petition before you: Do not send me back to the house of Jonathan the secretary, or I will die there.”'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: King Zedekiah then gave orders for Jeremiah to be placed in the courtyard of the guard and given a loaf of bread from the street of the bakers each day until all the bread in the city was gone. So Jeremiah remained in the courtyard of the guard.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'King Zedekiah, however, sent Jehukal son of Shelemiah with the priest Zephaniah son of Maaseiah to Jeremiah the prophet with this message: “Please pray to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God for us.”'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Now Jeremiah was free to come and go among the people, for he had not yet been put in prison. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pharaoh’s army had marched out of Egypt, and when the Babylonians
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Chaldeans
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; also in verses 8, 9, 13 and 14
      marker-yv: yv-n
    - type: text
      text: ' who were besieging Jerusalem heard the report about them, they withdrew from Jerusalem.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' came to Jeremiah the prophet: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says: Tell the king of Judah, who sent you to inquire of me, ‘Pharaoh’s army, which has marched out to support you, will go back to its own land, to Egypt. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Then the Babylonians will return and attack this city; they will capture it and burn it down.’
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '“This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Do not deceive yourselves, thinking, ‘The Babylonians will surely leave us.’ They will not! '
