document_id: 1CO.16,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Collection for the Lord’s People
  - type: text
    content: 'Now about the collection for the Lord’s people: Do what I told the Galatian churches to do. '
  '10':
  - type: text
    content: 'When Timothy comes, see to it that he has nothing to fear while he is with you, for he is carrying on the work of the Lord, just as I am. '
  '11':
  - type: text
    content: No one, then, should treat him with contempt. Send him on his way in peace so that he may return to me. I am expecting him along with the brothers.
  '12':
  - type: text
    content: 'Now about our brother Apollos: I strongly urged him to go to you with the brothers. He was quite unwilling to go now, but he will go when he has the opportunity.'
  '13':
  - type: text
    content: 'Be on your guard; stand firm in the faith; be courageous; be strong. '
  '14':
  - type: text
    content: Do everything in love.
  '15':
  - type: text
    content: 'You know that the household of Stephanas were the first converts in Achaia, and they have devoted themselves to the service of the Lord’s people. I urge you, brothers and sisters, '
  '16':
  - type: text
    content: 'to submit to such people and to everyone who joins in the work and labors at it. '
  '17':
  - type: text
    content: 'I was glad when Stephanas, Fortunatus and Achaicus arrived, because they have supplied what was lacking from you. '
  '18':
  - type: text
    content: For they refreshed my spirit and yours also. Such men deserve recognition.
  - type: heading
    content: Final Greetings
  '19':
  - type: text
    content: The churches in the province of Asia send you greetings. Aquila and Priscilla
  - type: note
    content: Greek Prisca, a variant of Priscilla
  - type: text
    content: ' greet you warmly in the Lord, and so does the church that meets at their house. '
  '2':
  - type: text
    content: 'On the first day of every week, each one of you should set aside a sum of money in keeping with your income, saving it up, so that when I come no collections will have to be made. '
  '20':
  - type: text
    content: All the brothers and sisters here send you greetings. Greet one another with a holy kiss.
  '21':
  - type: text
    content: I, Paul, write this greeting in my own hand.
  '22':
  - type: text
    content: If anyone does not love the Lord, let that person be cursed! Come, Lord
  - type: note
    content: The Greek for Come, Lord reproduces an Aramaic expression (Marana tha) used by early Christians.
  - type: text
    content: '!'
  '23':
  - type: text
    content: The grace of the Lord Jesus be with you.
  '24':
  - type: text
    content: My love to all of you in Christ Jesus. Amen.
  - type: note
    content: Some manuscripts do not have Amen.
  '3':
  - type: text
    content: 'Then, when I arrive, I will give letters of introduction to the men you approve and send them with your gift to Jerusalem. '
  '4':
  - type: text
    content: If it seems advisable for me to go also, they will accompany me.
  - type: heading
    content: Personal Requests
  '5':
  - type: text
    content: 'After I go through Macedonia, I will come to you—for I will be going through Macedonia. '
  '6':
  - type: text
    content: 'Perhaps I will stay with you for a while, or even spend the winter, so that you can help me on my journey, wherever I go. '
  '7':
  - type: text
    content: 'For I do not want to see you now and make only a passing visit; I hope to spend some time with you, if the Lord permits. '
  '8':
  - type: text
    content: 'But I will stay on at Ephesus until Pentecost, '
  '9':
  - type: text
    content: because a great door for effective work has opened to me, and there are many who oppose me.
