document_id: 1CO.16
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Collection for the Lord’s People
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Now about the collection for the Lord’s people: Do what I told the Galatian churches to do. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'On the first day of every week, each one of you should set aside a sum of money in keeping with your income, saving it up, so that when I come no collections will have to be made. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Then, when I arrive, I will give letters of introduction to the men you approve and send them with your gift to Jerusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: If it seems advisable for me to go also, they will accompany me.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Personal Requests
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'After I go through Macedonia, I will come to you—for I will be going through Macedonia. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Perhaps I will stay with you for a while, or even spend the winter, so that you can help me on my journey, wherever I go. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'For I do not want to see you now and make only a passing visit; I hope to spend some time with you, if the Lord permits. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'But I will stay on at Ephesus until Pentecost, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: because a great door for effective work has opened to me, and there are many who oppose me.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'When Timothy comes, see to it that he has nothing to fear while he is with you, for he is carrying on the work of the Lord, just as I am. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: No one, then, should treat him with contempt. Send him on his way in peace so that he may return to me. I am expecting him along with the brothers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Now about our brother Apollos: I strongly urged him to go to you with the brothers. He was quite unwilling to go now, but he will go when he has the opportunity.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Be on your guard; stand firm in the faith; be courageous; be strong. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Do everything in love.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'You know that the household of Stephanas were the first converts in Achaia, and they have devoted themselves to the service of the Lord’s people. I urge you, brothers and sisters, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'to submit to such people and to everyone who joins in the work and labors at it. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'I was glad when Stephanas, Fortunatus and Achaicus arrived, because they have supplied what was lacking from you. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: For they refreshed my spirit and yours also. Such men deserve recognition.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Final Greetings
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: The churches in the province of Asia send you greetings. Aquila and Priscilla
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Greek '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Prisca
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', a variant of '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Priscilla
    marker-yv: yv-n
  - type: text
    text: ' greet you warmly in the Lord, and so does the church that meets at their house. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: All the brothers and sisters here send you greetings. Greet one another with a holy kiss.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: I, Paul, write this greeting in my own hand.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: If anyone does not love the Lord, let that person be cursed! Come, Lord
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'The Greek for '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Come, Lord '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: reproduces an Aramaic expression (Marana tha) used by early Christians.
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: The grace of the Lord Jesus be with you.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: My love to all of you in Christ Jesus. Amen.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16:24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some manuscripts do not have '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Amen
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
