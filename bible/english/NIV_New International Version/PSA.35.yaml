document_id: PSA.35
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 35
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: Of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Contend, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', with those who contend with me;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: fight against those who fight against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Take up shield and armor;
- type: usfm
  marker: q2
  children:
  - type: text
    text: arise and come to my aid.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Brandish spear and javelin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: and block the way
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: against those who pursue me.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Say to me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “I am your salvation.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: May those who seek my life
- type: usfm
  marker: q2
  children:
  - type: text
    text: be disgraced and put to shame;
- type: usfm
  marker: q1
  children:
  - type: text
    text: may those who plot my ruin
- type: usfm
  marker: q2
  children:
  - type: text
    text: be turned back in dismay.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: May they be like chaff before the wind,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'with the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' driving them away;'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: may their path be dark and slippery,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'with the angel of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' pursuing them.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Since they hid their net for me without cause
- type: usfm
  marker: q2
  children:
  - type: text
    text: and without cause dug a pit for me,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: may ruin overtake them by surprise—
- type: usfm
  marker: q2
  children:
  - type: text
    text: may the net they hid entangle them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: may they fall into the pit, to their ruin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Then my soul will rejoice in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: and delight in his salvation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: My whole being will exclaim,
- type: usfm
  marker: q2
  children:
  - type: text
    text: '“Who is like you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: You rescue the poor from those too strong for them,
- type: usfm
  marker: q2
  children:
  - type: text
    text: the poor and needy from those who rob them.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ruthless witnesses come forward;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they question me on things I know nothing about.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: They repay me evil for good
- type: usfm
  marker: q2
  children:
  - type: text
    text: and leave me like one bereaved.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Yet when they were ill, I put on sackcloth
- type: usfm
  marker: q2
  children:
  - type: text
    text: and humbled myself with fasting.
- type: usfm
  marker: q1
  children:
  - type: text
    text: When my prayers returned to me unanswered,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I went about mourning
- type: usfm
  marker: q2
  children:
  - type: text
    text: as though for my friend or brother.
- type: usfm
  marker: q1
  children:
  - type: text
    text: I bowed my head in grief
- type: usfm
  marker: q2
  children:
  - type: text
    text: as though weeping for my mother.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: But when I stumbled, they gathered in glee;
- type: usfm
  marker: q2
  children:
  - type: text
    text: assailants gathered against me without my knowledge.
- type: usfm
  marker: q2
  children:
  - type: text
    text: They slandered me without ceasing.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Like the ungodly they maliciously mocked;
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint; Hebrew may mean '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Like an ungodly circle of mockers,
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: they gnashed their teeth at me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: How long, Lord, will you look on?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Rescue me from their ravages,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my precious life from these lions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: I will give you thanks in the great assembly;
- type: usfm
  marker: q2
  children:
  - type: text
    text: among the throngs I will praise you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Do not let those gloat over me
- type: usfm
  marker: q2
  children:
  - type: text
    text: who are my enemies without cause;
- type: usfm
  marker: q1
  children:
  - type: text
    text: do not let those who hate me without reason
- type: usfm
  marker: q2
  children:
  - type: text
    text: maliciously wink the eye.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: They do not speak peaceably,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but devise false accusations
- type: usfm
  marker: q2
  children:
  - type: text
    text: against those who live quietly in the land.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: They sneer at me and say, “Aha! Aha!
- type: usfm
  marker: q2
  children:
  - type: text
    text: With our own eyes we have seen it.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: ' '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', you have seen this; do not be silent.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Do not be far from me, Lord.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Awake, and rise to my defense!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Contend for me, my God and Lord.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Vindicate me in your righteousness, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' my God;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: do not let them gloat over me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Do not let them think, “Aha, just what we wanted!”
- type: usfm
  marker: q2
  children:
  - type: text
    text: or say, “We have swallowed him up.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: May all who gloat over my distress
- type: usfm
  marker: q2
  children:
  - type: text
    text: be put to shame and confusion;
- type: usfm
  marker: q1
  children:
  - type: text
    text: may all who exalt themselves over me
- type: usfm
  marker: q2
  children:
  - type: text
    text: be clothed with shame and disgrace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: May those who delight in my vindication
- type: usfm
  marker: q2
  children:
  - type: text
    text: shout for joy and gladness;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'may they always say, “The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' be exalted,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: who delights in the well-being of his servant.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: My tongue will proclaim your righteousness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: your praises all day long.
