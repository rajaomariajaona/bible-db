document_id: PSA.35,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 35
  - type: text
    content: Of David.
  - type: text
    content: 'Contend, '
  - type: text
    content: Lord
  - type: text
    content: ', with those who contend with me;'
  - type: text
    content: fight against those who fight against me.
  '10':
  - type: text
    content: My whole being will exclaim,
  - type: text
    content: '“Who is like you, '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: You rescue the poor from those too strong for them,
  - type: text
    content: the poor and needy from those who rob them.”
  '11':
  - type: text
    content: Ruthless witnesses come forward;
  - type: text
    content: they question me on things I know nothing about.
  '12':
  - type: text
    content: They repay me evil for good
  - type: text
    content: and leave me like one bereaved.
  '13':
  - type: text
    content: Yet when they were ill, I put on sackcloth
  - type: text
    content: and humbled myself with fasting.
  - type: text
    content: When my prayers returned to me unanswered,
  '14':
  - type: text
    content: I went about mourning
  - type: text
    content: as though for my friend or brother.
  - type: text
    content: I bowed my head in grief
  - type: text
    content: as though weeping for my mother.
  '15':
  - type: text
    content: But when I stumbled, they gathered in glee;
  - type: text
    content: assailants gathered against me without my knowledge.
  - type: text
    content: They slandered me without ceasing.
  '16':
  - type: text
    content: Like the ungodly they maliciously mocked;
  - type: note
    content: Septuagint; Hebrew may mean Like an ungodly circle of mockers,
  - type: text
    content: they gnashed their teeth at me.
  '17':
  - type: text
    content: How long, Lord, will you look on?
  - type: text
    content: Rescue me from their ravages,
  - type: text
    content: my precious life from these lions.
  '18':
  - type: text
    content: I will give you thanks in the great assembly;
  - type: text
    content: among the throngs I will praise you.
  '19':
  - type: text
    content: Do not let those gloat over me
  - type: text
    content: who are my enemies without cause;
  - type: text
    content: do not let those who hate me without reason
  - type: text
    content: maliciously wink the eye.
  '2':
  - type: text
    content: Take up shield and armor;
  - type: text
    content: arise and come to my aid.
  '20':
  - type: text
    content: They do not speak peaceably,
  - type: text
    content: but devise false accusations
  - type: text
    content: against those who live quietly in the land.
  '21':
  - type: text
    content: They sneer at me and say, “Aha! Aha!
  - type: text
    content: With our own eyes we have seen it.”
  '22':
  - type: text
    content: ' '
  - type: text
    content: Lord
  - type: text
    content: ', you have seen this; do not be silent.'
  - type: text
    content: Do not be far from me, Lord.
  '23':
  - type: text
    content: Awake, and rise to my defense!
  - type: text
    content: Contend for me, my God and Lord.
  '24':
  - type: text
    content: 'Vindicate me in your righteousness, '
  - type: text
    content: Lord
  - type: text
    content: ' my God;'
  - type: text
    content: do not let them gloat over me.
  '25':
  - type: text
    content: Do not let them think, “Aha, just what we wanted!”
  - type: text
    content: or say, “We have swallowed him up.”
  '26':
  - type: text
    content: May all who gloat over my distress
  - type: text
    content: be put to shame and confusion;
  - type: text
    content: may all who exalt themselves over me
  - type: text
    content: be clothed with shame and disgrace.
  '27':
  - type: text
    content: May those who delight in my vindication
  - type: text
    content: shout for joy and gladness;
  - type: text
    content: 'may they always say, “The '
  - type: text
    content: Lord
  - type: text
    content: ' be exalted,'
  - type: text
    content: who delights in the well-being of his servant.”
  '28':
  - type: text
    content: My tongue will proclaim your righteousness,
  - type: text
    content: your praises all day long.
  '3':
  - type: text
    content: Brandish spear and javelin
  - type: note
    content: Or and block the way
  - type: text
    content: against those who pursue me.
  - type: text
    content: Say to me,
  - type: text
    content: “I am your salvation.”
  '4':
  - type: text
    content: May those who seek my life
  - type: text
    content: be disgraced and put to shame;
  - type: text
    content: may those who plot my ruin
  - type: text
    content: be turned back in dismay.
  '5':
  - type: text
    content: May they be like chaff before the wind,
  - type: text
    content: 'with the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' driving them away;'
  '6':
  - type: text
    content: may their path be dark and slippery,
  - type: text
    content: 'with the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' pursuing them.'
  '7':
  - type: text
    content: Since they hid their net for me without cause
  - type: text
    content: and without cause dug a pit for me,
  '8':
  - type: text
    content: may ruin overtake them by surprise—
  - type: text
    content: may the net they hid entangle them,
  - type: text
    content: may they fall into the pit, to their ruin.
  '9':
  - type: text
    content: 'Then my soul will rejoice in the '
  - type: text
    content: Lord
  - type: text
    content: and delight in his salvation.
