type_code: eng
verses:
  '1':
  - type: heading
    content: A Basket of Ripe Fruit
  - type: text
    content: 'This is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' showed me: a basket of ripe fruit. '
  '10':
  - type: text
    content: I will turn your religious festivals into mourning
  - type: text
    content: and all your singing into weeping.
  - type: text
    content: I will make all of you wear sackcloth
  - type: text
    content: and shave your heads.
  - type: text
    content: I will make that time like mourning for an only son
  - type: text
    content: and the end of it like a bitter day.
  '11':
  - type: text
    content: '“The days are coming,” declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “when I will send a famine through the land—
  - type: text
    content: not a famine of food or a thirst for water,
  - type: text
    content: 'but a famine of hearing the words of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '12':
  - type: text
    content: People will stagger from sea to sea
  - type: text
    content: and wander from north to east,
  - type: text
    content: 'searching for the word of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: but they will not find it.
  '13':
  - type: text
    content: “In that day
  - type: text
    content: “the lovely young women and strong young men
  - type: text
    content: will faint because of thirst.
  '14':
  - type: text
    content: Those who swear by the sin of Samaria—
  - type: text
    content: who say, ‘As surely as your god lives, Dan,’
  - type: text
    content: or, ‘As surely as the god
  - type: note
    content: Hebrew the way
  - type: text
    content: ' of Beersheba lives’—'
  - type: text
    content: they will fall, never to rise again.”
  '2':
  - type: text
    content: “What do you see, Amos?” he asked.
  - type: text
    content: “A basket of ripe fruit,” I answered.
  - type: text
    content: 'Then the '
  - type: text
    content: Lord
  - type: text
    content: ' said to me, “The time is ripe for my people Israel; I will spare them no longer.'
  '3':
  - type: text
    content: '“In that day,” declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ', “the songs in the temple will turn to wailing.'
  - type: note
    content: Or “the temple singers will wail
  - type: text
    content: ' Many, many bodies—flung everywhere! Silence!”'
  '4':
  - type: text
    content: Hear this, you who trample the needy
  - type: text
    content: and do away with the poor of the land,
  '5':
  - type: text
    content: saying,
  - type: text
    content: “When will the New Moon be over
  - type: text
    content: that we may sell grain,
  - type: text
    content: and the Sabbath be ended
  - type: text
    content: that we may market wheat?”—
  - type: text
    content: skimping on the measure,
  - type: text
    content: boosting the price
  - type: text
    content: and cheating with dishonest scales,
  '6':
  - type: text
    content: buying the poor with silver
  - type: text
    content: and the needy for a pair of sandals,
  - type: text
    content: selling even the sweepings with the wheat.
  '7':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has sworn by himself, the Pride of Jacob: “I will never forget anything they have done.'
  '8':
  - type: text
    content: “Will not the land tremble for this,
  - type: text
    content: and all who live in it mourn?
  - type: text
    content: The whole land will rise like the Nile;
  - type: text
    content: it will be stirred up and then sink
  - type: text
    content: like the river of Egypt.
  '9':
  - type: text
    content: '“In that day,” declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: “I will make the sun go down at noon
  - type: text
    content: and darken the earth in broad daylight.
