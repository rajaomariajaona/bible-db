document_id: AMO.8,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: A Basket of Ripe Fruit
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'This is what the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' showed me: a basket of ripe fruit. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: I will turn your religious festivals into mourning
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all your singing into weeping.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make all of you wear sackcloth
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and shave your heads.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will make that time like mourning for an only son
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the end of it like a bitter day.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '“The days are coming,” declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: “when I will send a famine through the land—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: not a famine of food or a thirst for water,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but a famine of hearing the words of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: People will stagger from sea to sea
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and wander from north to east,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'searching for the word of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but they will not find it.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: “In that day
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “the lovely young women and strong young men
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will faint because of thirst.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Those who swear by the sin of Samaria—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who say, ‘As surely as your god lives, Dan,’
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or, ‘As surely as the god
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: the way
      marker-yv: yv-n
    - type: text
      text: ' of Beersheba lives’—'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they will fall, never to rise again.”
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: “What do you see, Amos?” he asked.
  - type: usfm
    marker: p
    children:
    - type: text
      text: “A basket of ripe fruit,” I answered.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' said to me, “The time is ripe for my people Israel; I will spare them no longer.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '“In that day,” declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “the songs in the temple will turn to wailing.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: “the temple singers will wail
      marker-yv: yv-n
    - type: text
      text: ' Many, many bodies—flung everywhere! Silence!”'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Hear this, you who trample the needy
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and do away with the poor of the land,
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: saying,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “When will the New Moon be over
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that we may sell grain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and the Sabbath be ended
  - type: usfm
    marker: q2
    children:
    - type: text
      text: that we may market wheat?”—
  - type: usfm
    marker: q1
    children:
    - type: text
      text: skimping on the measure,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: boosting the price
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and cheating with dishonest scales,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: buying the poor with silver
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the needy for a pair of sandals,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: selling even the sweepings with the wheat.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has sworn by himself, the Pride of Jacob: “I will never forget anything they have done.'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: “Will not the land tremble for this,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and all who live in it mourn?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The whole land will rise like the Nile;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: it will be stirred up and then sink
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like the river of Egypt.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '“In that day,” declares the Sovereign '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I will make the sun go down at noon
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and darken the earth in broad daylight.
