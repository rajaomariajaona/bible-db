    marker-yv: yv-n
  - type: text
    text: ' of David.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: The fool says in his heart,
- type: usfm
  marker: q2
  children:
  - type: text
    text: “There is no God.”
- type: usfm
  marker: q1
  children:
  - type: text
    text: They are corrupt, and their ways are vile;
- type: usfm
  marker: q2
  children:
  - type: text
    text: there is no one who does good.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: God looks down from heaven
- type: usfm
  marker: q2
  children:
  - type: text
    text: on all mankind
- type: usfm
  marker: q1
  children:
  - type: text
    text: to see if there are any who understand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: any who seek God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Everyone has turned away, all have become corrupt;
- type: usfm
  marker: q2
  children:
  - type: text
    text: there is no one who does good,
- type: usfm
  marker: q2
  children:
  - type: text
    text: not even one.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Do all these evildoers know nothing?
- type: usfm
  marker: q1
  children:
  - type: text
    text: They devour my people as though eating bread;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they never call on God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: But there they are, overwhelmed with dread,
- type: usfm
  marker: q2
  children:
  - type: text
    text: where there was nothing to dread.
- type: usfm
  marker: q1
  children:
  - type: text
    text: God scattered the bones of those who attacked you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you put them to shame, for God despised them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oh, that salvation for Israel would come out of Zion!
- type: usfm
  marker: q2
  children:
  - type: text
    text: When God restores his people,
- type: usfm
  marker: q2
  children:
  - type: text
    text: let Jacob rejoice and Israel be glad!
