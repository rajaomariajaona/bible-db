document_id: PSA.53,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 53In Hebrew texts 53:1-6 is numbered 53:2-7.
  - type: text
    content: 'For the director of music. According to '
  - type: text
    content: mahalath.
  - type: note
    content: 'Title: Probably a musical term'
  - type: text
    content: ' A '
  - type: text
    content: maskil
  - type: note
    content: 'Title: Probably a literary or musical term'
  - type: text
    content: ' of David.'
  - type: text
    content: The fool says in his heart,
  - type: text
    content: “There is no God.”
  - type: text
    content: They are corrupt, and their ways are vile;
  - type: text
    content: there is no one who does good.
  '2':
  - type: text
    content: God looks down from heaven
  - type: text
    content: on all mankind
  - type: text
    content: to see if there are any who understand,
  - type: text
    content: any who seek God.
  '3':
  - type: text
    content: Everyone has turned away, all have become corrupt;
  - type: text
    content: there is no one who does good,
  - type: text
    content: not even one.
  '4':
  - type: text
    content: Do all these evildoers know nothing?
  - type: text
    content: They devour my people as though eating bread;
  - type: text
    content: they never call on God.
  '5':
  - type: text
    content: But there they are, overwhelmed with dread,
  - type: text
    content: where there was nothing to dread.
  - type: text
    content: God scattered the bones of those who attacked you;
  - type: text
    content: you put them to shame, for God despised them.
  '6':
  - type: text
    content: Oh, that salvation for Israel would come out of Zion!
  - type: text
    content: When God restores his people,
  - type: text
    content: let Jacob rejoice and Israel be glad!
