document_id: HEB.11,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Faith in Action
  - type: text
    content: 'Now faith is confidence in what we hope for and assurance about what we do not see. '
  '10':
  - type: text
    content: 'For he was looking forward to the city with foundations, whose architect and builder is God. '
  '11':
  - type: text
    content: And by faith even Sarah, who was past childbearing age, was enabled to bear children because she
  - type: note
    content: Or By faith Abraham, even though he was too old to have children—and Sarah herself was not able to conceive—was enabled to become a father because he
  - type: text
    content: ' considered him faithful who had made the promise. '
  '12':
  - type: text
    content: And so from this one man, and he as good as dead, came descendants as numerous as the stars in the sky and as countless as the sand on the seashore.
  '13':
  - type: text
    content: 'All these people were still living by faith when they died. They did not receive the things promised; they only saw them and welcomed them from a distance, admitting that they were foreigners and strangers on earth. '
  '14':
  - type: text
    content: 'People who say such things show that they are looking for a country of their own. '
  '15':
  - type: text
    content: 'If they had been thinking of the country they had left, they would have had opportunity to return. '
  '16':
  - type: text
    content: Instead, they were longing for a better country—a heavenly one. Therefore God is not ashamed to be called their God, for he has prepared a city for them.
  '17':
  - type: text
    content: 'By faith Abraham, when God tested him, offered Isaac as a sacrifice. He who had embraced the promises was about to sacrifice his one and only son, '
  '18':
  - type: text
    content: even though God had said to him, “It is through Isaac that your offspring will be reckoned.”
  - type: note
    content: Gen. 21:12
  - type: text
    content: ' '
  '19':
  - type: text
    content: Abraham reasoned that God could even raise the dead, and so in a manner of speaking he did receive Isaac back from death.
  '2':
  - type: text
    content: This is what the ancients were commended for.
  '20':
  - type: text
    content: By faith Isaac blessed Jacob and Esau in regard to their future.
  '21':
  - type: text
    content: By faith Jacob, when he was dying, blessed each of Joseph’s sons, and worshiped as he leaned on the top of his staff.
  '22':
  - type: text
    content: By faith Joseph, when his end was near, spoke about the exodus of the Israelites from Egypt and gave instructions concerning the burial of his bones.
  '23':
  - type: text
    content: By faith Moses’ parents hid him for three months after he was born, because they saw he was no ordinary child, and they were not afraid of the king’s edict.
  '24':
  - type: text
    content: 'By faith Moses, when he had grown up, refused to be known as the son of Pharaoh’s daughter. '
  '25':
  - type: text
    content: 'He chose to be mistreated along with the people of God rather than to enjoy the fleeting pleasures of sin. '
  '26':
  - type: text
    content: 'He regarded disgrace for the sake of Christ as of greater value than the treasures of Egypt, because he was looking ahead to his reward. '
  '27':
  - type: text
    content: 'By faith he left Egypt, not fearing the king’s anger; he persevered because he saw him who is invisible. '
  '28':
  - type: text
    content: By faith he kept the Passover and the application of blood, so that the destroyer of the firstborn would not touch the firstborn of Israel.
  '29':
  - type: text
    content: By faith the people passed through the Red Sea as on dry land; but when the Egyptians tried to do so, they were drowned.
  '3':
  - type: text
    content: By faith we understand that the universe was formed at God’s command, so that what is seen was not made out of what was visible.
  '30':
  - type: text
    content: By faith the walls of Jericho fell, after the army had marched around them for seven days.
  '31':
  - type: text
    content: By faith the prostitute Rahab, because she welcomed the spies, was not killed with those who were disobedient.
  - type: note
    content: Or unbelieving
  '32':
  - type: text
    content: 'And what more shall I say? I do not have time to tell about Gideon, Barak, Samson and Jephthah, about David and Samuel and the prophets, '
  '33':
  - type: text
    content: 'who through faith conquered kingdoms, administered justice, and gained what was promised; who shut the mouths of lions, '
  '34':
  - type: text
    content: 'quenched the fury of the flames, and escaped the edge of the sword; whose weakness was turned to strength; and who became powerful in battle and routed foreign armies. '
  '35':
  - type: text
    content: 'Women received back their dead, raised to life again. There were others who were tortured, refusing to be released so that they might gain an even better resurrection. '
  '36':
  - type: text
    content: 'Some faced jeers and flogging, and even chains and imprisonment. '
  '37':
  - type: text
    content: They were put to death by stoning;
  - type: note
    content: Some early manuscripts stoning; they were put to the test;
  - type: text
    content: ' they were sawed in two; they were killed by the sword. They went about in sheepskins and goatskins, destitute, persecuted and mistreated— '
  '38':
  - type: text
    content: the world was not worthy of them. They wandered in deserts and mountains, living in caves and in holes in the ground.
  '39':
  - type: text
    content: 'These were all commended for their faith, yet none of them received what had been promised, '
  '4':
  - type: text
    content: By faith Abel brought God a better offering than Cain did. By faith he was commended as righteous, when God spoke well of his offerings. And by faith Abel still speaks, even though he is dead.
  '40':
  - type: text
    content: since God had planned something better for us so that only together with us would they be made perfect.
  '5':
  - type: text
    content: 'By faith Enoch was taken from this life, so that he did not experience death: “He could not be found, because God had taken him away.”'
  - type: note
    content: Gen. 5:24
  - type: text
    content: ' For before he was taken, he was commended as one who pleased God. '
  '6':
  - type: text
    content: And without faith it is impossible to please God, because anyone who comes to him must believe that he exists and that he rewards those who earnestly seek him.
  '7':
  - type: text
    content: By faith Noah, when warned about things not yet seen, in holy fear built an ark to save his family. By his faith he condemned the world and became heir of the righteousness that is in keeping with faith.
  '8':
  - type: text
    content: 'By faith Abraham, when called to go to a place he would later receive as his inheritance, obeyed and went, even though he did not know where he was going. '
  '9':
  - type: text
    content: 'By faith he made his home in the promised land like a stranger in a foreign country; he lived in tents, as did Isaac and Jacob, who were heirs with him of the same promise. '
