document_id: PSA.22,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 22In Hebrew texts 22:1-31 is numbered 22:2-32.
  - type: text
    content: For the director of music. To the tune of “The Doe of the Morning.” A psalm of David.
  - type: text
    content: My God, my God, why have you forsaken me?
  - type: text
    content: Why are you so far from saving me,
  - type: text
    content: so far from my cries of anguish?
  '10':
  - type: text
    content: From birth I was cast on you;
  - type: text
    content: from my mother’s womb you have been my God.
  '11':
  - type: text
    content: Do not be far from me,
  - type: text
    content: for trouble is near
  - type: text
    content: and there is no one to help.
  '12':
  - type: text
    content: Many bulls surround me;
  - type: text
    content: strong bulls of Bashan encircle me.
  '13':
  - type: text
    content: Roaring lions that tear their prey
  - type: text
    content: open their mouths wide against me.
  '14':
  - type: text
    content: I am poured out like water,
  - type: text
    content: and all my bones are out of joint.
  - type: text
    content: My heart has turned to wax;
  - type: text
    content: it has melted within me.
  '15':
  - type: text
    content: My mouth
  - type: note
    content: Probable reading of the original Hebrew text; Masoretic Text strength
  - type: text
    content: ' is dried up like a potsherd,'
  - type: text
    content: and my tongue sticks to the roof of my mouth;
  - type: text
    content: you lay me in the dust of death.
  '16':
  - type: text
    content: Dogs surround me,
  - type: text
    content: a pack of villains encircles me;
  - type: text
    content: they pierce
  - type: note
    content: Dead Sea Scrolls and some manuscripts of the Masoretic Text, Septuagint and Syriac; most manuscripts of the Masoretic Text me, / like a lion
  - type: text
    content: ' my hands and my feet.'
  '17':
  - type: text
    content: All my bones are on display;
  - type: text
    content: people stare and gloat over me.
  '18':
  - type: text
    content: They divide my clothes among them
  - type: text
    content: and cast lots for my garment.
  '19':
  - type: text
    content: 'But you, '
  - type: text
    content: Lord
  - type: text
    content: ', do not be far from me.'
  - type: text
    content: You are my strength; come quickly to help me.
  '2':
  - type: text
    content: My God, I cry out by day, but you do not answer,
  - type: text
    content: by night, but I find no rest.
  - type: note
    content: Or night, and am not silent
  '20':
  - type: text
    content: Deliver me from the sword,
  - type: text
    content: my precious life from the power of the dogs.
  '21':
  - type: text
    content: Rescue me from the mouth of the lions;
  - type: text
    content: save me from the horns of the wild oxen.
  '22':
  - type: text
    content: I will declare your name to my people;
  - type: text
    content: in the assembly I will praise you.
  '23':
  - type: text
    content: 'You who fear the '
  - type: text
    content: Lord
  - type: text
    content: ', praise him!'
  - type: text
    content: All you descendants of Jacob, honor him!
  - type: text
    content: Revere him, all you descendants of Israel!
  '24':
  - type: text
    content: For he has not despised or scorned
  - type: text
    content: the suffering of the afflicted one;
  - type: text
    content: he has not hidden his face from him
  - type: text
    content: but has listened to his cry for help.
  '25':
  - type: text
    content: From you comes the theme of my praise in the great assembly;
  - type: text
    content: before those who fear you
  - type: note
    content: Hebrew him
  - type: text
    content: ' I will fulfill my vows.'
  '26':
  - type: text
    content: The poor will eat and be satisfied;
  - type: text
    content: 'those who seek the '
  - type: text
    content: Lord
  - type: text
    content: ' will praise him—'
  - type: text
    content: may your hearts live forever!
  '27':
  - type: text
    content: All the ends of the earth
  - type: text
    content: 'will remember and turn to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: and all the families of the nations
  - type: text
    content: will bow down before him,
  '28':
  - type: text
    content: 'for dominion belongs to the '
  - type: text
    content: Lord
  - type: text
    content: and he rules over the nations.
  '29':
  - type: text
    content: All the rich of the earth will feast and worship;
  - type: text
    content: all who go down to the dust will kneel before him—
  - type: text
    content: those who cannot keep themselves alive.
  '3':
  - type: text
    content: Yet you are enthroned as the Holy One;
  - type: text
    content: you are the one Israel praises.
  - type: note
    content: Or Yet you are holy, / enthroned on the praises of Israel
  '30':
  - type: text
    content: Posterity will serve him;
  - type: text
    content: future generations will be told about the Lord.
  '31':
  - type: text
    content: They will proclaim his righteousness,
  - type: text
    content: 'declaring to a people yet unborn:'
  - type: text
    content: He has done it!
  '4':
  - type: text
    content: In you our ancestors put their trust;
  - type: text
    content: they trusted and you delivered them.
  '5':
  - type: text
    content: To you they cried out and were saved;
  - type: text
    content: in you they trusted and were not put to shame.
  '6':
  - type: text
    content: But I am a worm and not a man,
  - type: text
    content: scorned by everyone, despised by the people.
  '7':
  - type: text
    content: All who see me mock me;
  - type: text
    content: they hurl insults, shaking their heads.
  '8':
  - type: text
    content: '“He trusts in the '
  - type: text
    content: Lord
  - type: text
    content: ',” they say,'
  - type: text
    content: '“let the '
  - type: text
    content: Lord
  - type: text
    content: ' rescue him.'
  - type: text
    content: Let him deliver him,
  - type: text
    content: since he delights in him.”
  '9':
  - type: text
    content: Yet you brought me out of the womb;
  - type: text
    content: you made me trust in you, even at my mother’s breast.
