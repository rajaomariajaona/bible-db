document_id: PSA.22
type_code: eng
segments:
- type: usfm
  marker: cl
  children:
  - type: text
    text: Psalm 22
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: ft
      children:
      - type: text
        text: In Hebrew texts 22:1-31 is numbered 22:2-32.
    marker-yv: yv-n
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: text
    text: For the director of music. To the tune of “The Doe of the Morning.” A psalm of David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: My God, my God, why have you forsaken me?
- type: usfm
  marker: q2
  children:
  - type: text
    text: Why are you so far from saving me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so far from my cries of anguish?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: My God, I cry out by day, but you do not answer,
- type: usfm
  marker: q2
  children:
  - type: text
    text: by night, but I find no rest.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: night, and am not silent
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Yet you are enthroned as the Holy One;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you are the one Israel praises.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Yet you are holy, / enthroned on the praises of Israel
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: In you our ancestors put their trust;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they trusted and you delivered them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: To you they cried out and were saved;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in you they trusted and were not put to shame.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: But I am a worm and not a man,
- type: usfm
  marker: q2
  children:
  - type: text
    text: scorned by everyone, despised by the people.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: All who see me mock me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they hurl insults, shaking their heads.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '“He trusts in the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ',” they say,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: '“let the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' rescue him.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Let him deliver him,
- type: usfm
  marker: q2
  children:
  - type: text
    text: since he delights in him.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Yet you brought me out of the womb;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you made me trust in you, even at my mother’s breast.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: From birth I was cast on you;
- type: usfm
  marker: q2
  children:
  - type: text
    text: from my mother’s womb you have been my God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Do not be far from me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: for trouble is near
- type: usfm
  marker: q2
  children:
  - type: text
    text: and there is no one to help.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Many bulls surround me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: strong bulls of Bashan encircle me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Roaring lions that tear their prey
- type: usfm
  marker: q2
  children:
  - type: text
    text: open their mouths wide against me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: I am poured out like water,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and all my bones are out of joint.
- type: usfm
  marker: q1
  children:
  - type: text
    text: My heart has turned to wax;
- type: usfm
  marker: q2
  children:
  - type: text
    text: it has melted within me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: My mouth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Probable reading of the original Hebrew text; Masoretic Text '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: strength
    marker-yv: yv-n
  - type: text
    text: ' is dried up like a potsherd,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and my tongue sticks to the roof of my mouth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you lay me in the dust of death.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Dogs surround me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: a pack of villains encircles me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they pierce
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dead Sea Scrolls and some manuscripts of the Masoretic Text, Septuagint and Syriac; most manuscripts of the Masoretic Text '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: me, / like a lion
    marker-yv: yv-n
  - type: text
    text: ' my hands and my feet.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: All my bones are on display;
- type: usfm
  marker: q2
  children:
  - type: text
    text: people stare and gloat over me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: They divide my clothes among them
- type: usfm
  marker: q2
  children:
  - type: text
    text: and cast lots for my garment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'But you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', do not be far from me.'
- type: usfm
  marker: q2
  children:
  - type: text
    text: You are my strength; come quickly to help me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Deliver me from the sword,
- type: usfm
  marker: q2
  children:
  - type: text
    text: my precious life from the power of the dogs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Rescue me from the mouth of the lions;
- type: usfm
  marker: q2
  children:
  - type: text
    text: save me from the horns of the wild oxen.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: I will declare your name to my people;
- type: usfm
  marker: q2
  children:
  - type: text
    text: in the assembly I will praise you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'You who fear the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', praise him!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: All you descendants of Jacob, honor him!
- type: usfm
  marker: q2
  children:
  - type: text
    text: Revere him, all you descendants of Israel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: For he has not despised or scorned
- type: usfm
  marker: q2
  children:
  - type: text
    text: the suffering of the afflicted one;
- type: usfm
  marker: q1
  children:
  - type: text
    text: he has not hidden his face from him
- type: usfm
  marker: q2
  children:
  - type: text
    text: but has listened to his cry for help.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: From you comes the theme of my praise in the great assembly;
- type: usfm
  marker: q2
  children:
  - type: text
    text: before those who fear you
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: him
    marker-yv: yv-n
  - type: text
    text: ' I will fulfill my vows.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: The poor will eat and be satisfied;
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'those who seek the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' will praise him—'
- type: usfm
  marker: q2
  children:
  - type: text
    text: may your hearts live forever!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: All the ends of the earth
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'will remember and turn to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: and all the families of the nations
- type: usfm
  marker: q2
  children:
  - type: text
    text: will bow down before him,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'for dominion belongs to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
- type: usfm
  marker: q2
  children:
  - type: text
    text: and he rules over the nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: All the rich of the earth will feast and worship;
- type: usfm
  marker: q2
  children:
  - type: text
    text: all who go down to the dust will kneel before him—
- type: usfm
  marker: q2
  children:
  - type: text
    text: those who cannot keep themselves alive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Posterity will serve him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: future generations will be told about the Lord.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: They will proclaim his righteousness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'declaring to a people yet unborn:'
- type: usfm
  marker: q2
  children:
  - type: text
    text: He has done it!
