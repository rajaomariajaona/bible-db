document_id: 1CH.23
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Levites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: When David was old and full of years, he made his son Solomon king over Israel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'He also gathered together all the leaders of Israel, as well as the priests and Levites. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'The Levites thirty years old or more were counted, and the total number of men was thirty-eight thousand. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'David said, “Of these, twenty-four thousand are to be in charge of the work of the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' and six thousand are to be officials and judges. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Four thousand are to be gatekeepers and four thousand are to praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' with the musical instruments I have provided for that purpose.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'David separated the Levites into divisions corresponding to the sons of Levi: Gershon, Kohath and Merari.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Gershonites
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Belonging to the Gershonites:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Ladan and Shimei.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'The sons of Ladan:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jehiel the first, Zetham and Joel—three in all.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'The sons of Shimei:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Shelomoth, Haziel and Haran—three in all.
- type: usfm
  marker: li2
  children:
  - type: text
    text: These were the heads of the families of Ladan.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'And the sons of Shimei:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jahath, Ziza,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23:10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'One Hebrew manuscript, Septuagint and Vulgate (see also verse 11); most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Zina
    marker-yv: yv-n
  - type: text
    text: ' Jeush and Beriah.'
- type: usfm
  marker: li2
  children:
  - type: text
    text: These were the sons of Shimei—four in all.
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Jahath was the first and Ziza the second, but Jeush and Beriah did not have many sons; so they were counted as one family with one assignment.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Kohathites
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'The sons of Kohath:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Amram, Izhar, Hebron and Uzziel—four in all.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'The sons of Amram:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Aaron and Moses.
- type: usfm
  marker: li2
  children:
  - type: text
    text: 'Aaron was set apart, he and his descendants forever, to consecrate the most holy things, to offer sacrifices before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', to minister before him and to pronounce blessings in his name forever. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: The sons of Moses the man of God were counted as part of the tribe of Levi.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'The sons of Moses:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Gershom and Eliezer.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'The descendants of Gershom:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Shubael was the first.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'The descendants of Eliezer:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Rehabiah was the first.
- type: usfm
  marker: li2
  children:
  - type: text
    text: Eliezer had no other sons, but the sons of Rehabiah were very numerous.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'The sons of Izhar:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Shelomith was the first.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'The sons of Hebron:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Jeriah the first, Amariah the second, Jahaziel the third and Jekameam the fourth.
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'The sons of Uzziel:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Micah the first and Ishiah the second.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Merarites
  marker-yv: yv-h
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'The sons of Merari:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Mahli and Mushi.
- type: usfm
  marker: li1
  children:
  - type: text
    text: 'The sons of Mahli:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Eleazar and Kish.
- type: usfm
  marker: li2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Eleazar died without having sons: he had only daughters. Their cousins, the sons of Kish, married them.'
- type: usfm
  marker: li1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'The sons of Mushi:'
- type: usfm
  marker: li2
  children:
  - type: text
    text: Mahli, Eder and Jerimoth—three in all.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'These were the descendants of Levi by their families—the heads of families as they were registered under their names and counted individually, that is, the workers twenty years old or more who served in the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'For David had said, “Since the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', the God of Israel, has granted rest to his people and has come to dwell in Jerusalem forever, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'the Levites no longer need to carry the tabernacle or any of the articles used in its service.” '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: According to the last instructions of David, the Levites were counted from those twenty years old or more.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'The duty of the Levites was to help Aaron’s descendants in the service of the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ': to be in charge of the courtyards, the side rooms, the purification of all sacred things and the performance of other duties at the house of God. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'They were in charge of the bread set out on the table, the special flour for the grain offerings, the thin loaves made without yeast, the baking and the mixing, and all measurements of quantity and size. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'They were also to stand every morning to thank and praise the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. They were to do the same in the evening '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'and whenever burnt offerings were presented to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' on the Sabbaths, at the New Moon feasts and at the appointed festivals. They were to serve before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' regularly in the proper number and in the way prescribed for them.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'And so the Levites carried out their responsibilities for the tent of meeting, for the Holy Place and, under their relatives the descendants of Aaron, for the service of the temple of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
