document_id: 1CH.23,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Levites
  - type: text
    content: When David was old and full of years, he made his son Solomon king over Israel.
  '10':
  - type: text
    content: 'And the sons of Shimei:'
  - type: text
    content: Jahath, Ziza,
  - type: note
    content: One Hebrew manuscript, Septuagint and Vulgate (see also verse 11); most Hebrew manuscripts Zina
  - type: text
    content: ' Jeush and Beriah.'
  - type: text
    content: These were the sons of Shimei—four in all.
  '11':
  - type: text
    content: Jahath was the first and Ziza the second, but Jeush and Beriah did not have many sons; so they were counted as one family with one assignment.
  - type: heading
    content: Kohathites
  '12':
  - type: text
    content: 'The sons of Kohath:'
  - type: text
    content: Amram, Izhar, Hebron and Uzziel—four in all.
  '13':
  - type: text
    content: 'The sons of Amram:'
  - type: text
    content: Aaron and Moses.
  - type: text
    content: 'Aaron was set apart, he and his descendants forever, to consecrate the most holy things, to offer sacrifices before the '
  - type: text
    content: Lord
  - type: text
    content: ', to minister before him and to pronounce blessings in his name forever. '
  '14':
  - type: text
    content: The sons of Moses the man of God were counted as part of the tribe of Levi.
  '15':
  - type: text
    content: 'The sons of Moses:'
  - type: text
    content: Gershom and Eliezer.
  '16':
  - type: text
    content: 'The descendants of Gershom:'
  - type: text
    content: Shubael was the first.
  '17':
  - type: text
    content: 'The descendants of Eliezer:'
  - type: text
    content: Rehabiah was the first.
  - type: text
    content: Eliezer had no other sons, but the sons of Rehabiah were very numerous.
  '18':
  - type: text
    content: 'The sons of Izhar:'
  - type: text
    content: Shelomith was the first.
  '19':
  - type: text
    content: 'The sons of Hebron:'
  - type: text
    content: Jeriah the first, Amariah the second, Jahaziel the third and Jekameam the fourth.
  '2':
  - type: text
    content: 'He also gathered together all the leaders of Israel, as well as the priests and Levites. '
  '20':
  - type: text
    content: 'The sons of Uzziel:'
  - type: text
    content: Micah the first and Ishiah the second.
  - type: heading
    content: Merarites
  '21':
  - type: text
    content: 'The sons of Merari:'
  - type: text
    content: Mahli and Mushi.
  - type: text
    content: 'The sons of Mahli:'
  - type: text
    content: Eleazar and Kish.
  '22':
  - type: text
    content: 'Eleazar died without having sons: he had only daughters. Their cousins, the sons of Kish, married them.'
  '23':
  - type: text
    content: 'The sons of Mushi:'
  - type: text
    content: Mahli, Eder and Jerimoth—three in all.
  '24':
  - type: text
    content: 'These were the descendants of Levi by their families—the heads of families as they were registered under their names and counted individually, that is, the workers twenty years old or more who served in the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'For David had said, “Since the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, has granted rest to his people and has come to dwell in Jerusalem forever, '
  '26':
  - type: text
    content: 'the Levites no longer need to carry the tabernacle or any of the articles used in its service.” '
  '27':
  - type: text
    content: According to the last instructions of David, the Levites were counted from those twenty years old or more.
  '28':
  - type: text
    content: 'The duty of the Levites was to help Aaron’s descendants in the service of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ': to be in charge of the courtyards, the side rooms, the purification of all sacred things and the performance of other duties at the house of God. '
  '29':
  - type: text
    content: 'They were in charge of the bread set out on the table, the special flour for the grain offerings, the thin loaves made without yeast, the baking and the mixing, and all measurements of quantity and size. '
  '3':
  - type: text
    content: 'The Levites thirty years old or more were counted, and the total number of men was thirty-eight thousand. '
  '30':
  - type: text
    content: 'They were also to stand every morning to thank and praise the '
  - type: text
    content: Lord
  - type: text
    content: '. They were to do the same in the evening '
  '31':
  - type: text
    content: 'and whenever burnt offerings were presented to the '
  - type: text
    content: Lord
  - type: text
    content: ' on the Sabbaths, at the New Moon feasts and at the appointed festivals. They were to serve before the '
  - type: text
    content: Lord
  - type: text
    content: ' regularly in the proper number and in the way prescribed for them.'
  '32':
  - type: text
    content: 'And so the Levites carried out their responsibilities for the tent of meeting, for the Holy Place and, under their relatives the descendants of Aaron, for the service of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '4':
  - type: text
    content: 'David said, “Of these, twenty-four thousand are to be in charge of the work of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and six thousand are to be officials and judges. '
  '5':
  - type: text
    content: 'Four thousand are to be gatekeepers and four thousand are to praise the '
  - type: text
    content: Lord
  - type: text
    content: ' with the musical instruments I have provided for that purpose.”'
  '6':
  - type: text
    content: 'David separated the Levites into divisions corresponding to the sons of Levi: Gershon, Kohath and Merari.'
  - type: heading
    content: Gershonites
  '7':
  - type: text
    content: 'Belonging to the Gershonites:'
  - type: text
    content: Ladan and Shimei.
  '8':
  - type: text
    content: 'The sons of Ladan:'
  - type: text
    content: Jehiel the first, Zetham and Joel—three in all.
  '9':
  - type: text
    content: 'The sons of Shimei:'
  - type: text
    content: Shelomoth, Haziel and Haran—three in all.
  - type: text
    content: These were the heads of the families of Ladan.
