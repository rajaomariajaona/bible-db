document_id: 2TI.3,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'But mark this: There will be terrible times in the last days. '
  '10':
  - type: text
    content: 'You, however, know all about my teaching, my way of life, my purpose, faith, patience, love, endurance, '
  '11':
  - type: text
    content: 'persecutions, sufferings—what kinds of things happened to me in Antioch, Iconium and Lystra, the persecutions I endured. Yet the Lord rescued me from all of them. '
  '12':
  - type: text
    content: 'In fact, everyone who wants to live a godly life in Christ Jesus will be persecuted, '
  '13':
  - type: text
    content: 'while evildoers and impostors will go from bad to worse, deceiving and being deceived. '
  '14':
  - type: text
    content: 'But as for you, continue in what you have learned and have become convinced of, because you know those from whom you learned it, '
  '15':
  - type: text
    content: 'and how from infancy you have known the Holy Scriptures, which are able to make you wise for salvation through faith in Christ Jesus. '
  '16':
  - type: text
    content: 'All Scripture is God-breathed and is useful for teaching, rebuking, correcting and training in righteousness, '
  '17':
  - type: text
    content: so that the servant of God
  - type: note
    content: Or that you, a man of God,
  - type: text
    content: ' may be thoroughly equipped for every good work.'
  '2':
  - type: text
    content: 'People will be lovers of themselves, lovers of money, boastful, proud, abusive, disobedient to their parents, ungrateful, unholy, '
  '3':
  - type: text
    content: 'without love, unforgiving, slanderous, without self-control, brutal, not lovers of the good, '
  '4':
  - type: text
    content: 'treacherous, rash, conceited, lovers of pleasure rather than lovers of God— '
  '5':
  - type: text
    content: having a form of godliness but denying its power. Have nothing to do with such people.
  '6':
  - type: text
    content: 'They are the kind who worm their way into homes and gain control over gullible women, who are loaded down with sins and are swayed by all kinds of evil desires, '
  '7':
  - type: text
    content: 'always learning but never able to come to a knowledge of the truth. '
  '8':
  - type: text
    content: 'Just as Jannes and Jambres opposed Moses, so also these teachers oppose the truth. They are men of depraved minds, who, as far as the faith is concerned, are rejected. '
  '9':
  - type: text
    content: But they will not get very far because, as in the case of those men, their folly will be clear to everyone.
  - type: heading
    content: A Final Charge to Timothy
