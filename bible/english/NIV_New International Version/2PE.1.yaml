document_id: 2PE.1,111
type_code: eng
verses:
  '1':
  - type: text
    content: Simon Peter, a servant and apostle of Jesus Christ,
  - type: text
    content: 'To those who through the righteousness of our God and Savior Jesus Christ have received a faith as precious as ours:'
  '10':
  - type: text
    content: Therefore, my brothers and sisters,
  - type: note
    content: The Greek word for brothers and sisters (adelphoi) refers here to believers, both men and women, as part of God’s family.
  - type: text
    content: ' make every effort to confirm your calling and election. For if you do these things, you will never stumble, '
  '11':
  - type: text
    content: and you will receive a rich welcome into the eternal kingdom of our Lord and Savior Jesus Christ.
  - type: heading
    content: Prophecy of Scripture
  '12':
  - type: text
    content: 'So I will always remind you of these things, even though you know them and are firmly established in the truth you now have. '
  '13':
  - type: text
    content: 'I think it is right to refresh your memory as long as I live in the tent of this body, '
  '14':
  - type: text
    content: 'because I know that I will soon put it aside, as our Lord Jesus Christ has made clear to me. '
  '15':
  - type: text
    content: And I will make every effort to see that after my departure you will always be able to remember these things.
  '16':
  - type: text
    content: 'For we did not follow cleverly devised stories when we told you about the coming of our Lord Jesus Christ in power, but we were eyewitnesses of his majesty. '
  '17':
  - type: text
    content: He received honor and glory from God the Father when the voice came to him from the Majestic Glory, saying, “This is my Son, whom I love; with him I am well pleased.”
  - type: note
    content: Matt. 17:5; Mark 9:7; Luke 9:35
  - type: text
    content: ' '
  '18':
  - type: text
    content: We ourselves heard this voice that came from heaven when we were with him on the sacred mountain.
  '19':
  - type: text
    content: 'We also have the prophetic message as something completely reliable, and you will do well to pay attention to it, as to a light shining in a dark place, until the day dawns and the morning star rises in your hearts. '
  '2':
  - type: text
    content: Grace and peace be yours in abundance through the knowledge of God and of Jesus our Lord.
  - type: heading
    content: Confirming One’s Calling and Election
  '20':
  - type: text
    content: 'Above all, you must understand that no prophecy of Scripture came about by the prophet’s own interpretation of things. '
  '21':
  - type: text
    content: For prophecy never had its origin in the human will, but prophets, though human, spoke from God as they were carried along by the Holy Spirit.
  '3':
  - type: text
    content: 'His divine power has given us everything we need for a godly life through our knowledge of him who called us by his own glory and goodness. '
  '4':
  - type: text
    content: Through these he has given us his very great and precious promises, so that through them you may participate in the divine nature, having escaped the corruption in the world caused by evil desires.
  '5':
  - type: text
    content: 'For this very reason, make every effort to add to your faith goodness; and to goodness, knowledge; '
  '6':
  - type: text
    content: 'and to knowledge, self-control; and to self-control, perseverance; and to perseverance, godliness; '
  '7':
  - type: text
    content: 'and to godliness, mutual affection; and to mutual affection, love. '
  '8':
  - type: text
    content: 'For if you possess these qualities in increasing measure, they will keep you from being ineffective and unproductive in your knowledge of our Lord Jesus Christ. '
  '9':
  - type: text
    content: But whoever does not have them is nearsighted and blind, forgetting that they have been cleansed from their past sins.
