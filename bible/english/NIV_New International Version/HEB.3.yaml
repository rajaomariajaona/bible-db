document_id: HEB.3,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jesus Greater Than Moses
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Therefore, holy brothers and sisters, who share in the heavenly calling, fix your thoughts on Jesus, whom we acknowledge as our apostle and high priest. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: That is why I was angry with that generation;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I said, ‘Their hearts are always going astray,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and they have not known my ways.’
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: So I declared on oath in my anger,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘They shall never enter my rest.’ ”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalm 95:7-11
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'See to it, brothers and sisters, that none of you has a sinful, unbelieving heart that turns away from the living God. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'But encourage one another daily, as long as it is called “Today,” so that none of you may be hardened by sin’s deceitfulness. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'We have come to share in Christ, if indeed we hold our original conviction firmly to the very end. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'As has just been said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Today, if you hear his voice,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: do not harden your hearts
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as you did in the rebellion.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psalm 95:7,8
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Who were they who heard and rebelled? Were they not all those Moses led out of Egypt? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'And with whom was he angry for forty years? Was it not with those who sinned, whose bodies perished in the wilderness? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'And to whom did God swear that they would never enter his rest if not to those who disobeyed? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: So we see that they were not able to enter, because of their unbelief.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He was faithful to the one who appointed him, just as Moses was faithful in all God’s house. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jesus has been found worthy of greater honor than Moses, just as the builder of a house has greater honor than the house itself. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'For every house is built by someone, but God is the builder of everything. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: “Moses was faithful as a servant in all God’s house,”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3:5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Num. 12:7
      marker-yv: yv-n
    - type: text
      text: ' bearing witness to what would be spoken by God in the future. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: But Christ is faithful as the Son over God’s house. And we are his house, if indeed we hold firmly to our confidence and the hope in which we glory.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Warning Against Unbelief
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'So, as the Holy Spirit says:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Today, if you hear his voice,
  '8':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: do not harden your hearts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: as you did in the rebellion,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: during the time of testing in the wilderness,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: where your ancestors tested and tried me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: though for forty years they saw what I did.
