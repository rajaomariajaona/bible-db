document_id: HEB.3,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jesus Greater Than Moses
  - type: text
    content: 'Therefore, holy brothers and sisters, who share in the heavenly calling, fix your thoughts on Jesus, whom we acknowledge as our apostle and high priest. '
  '10':
  - type: text
    content: That is why I was angry with that generation;
  - type: text
    content: I said, ‘Their hearts are always going astray,
  - type: text
    content: and they have not known my ways.’
  '11':
  - type: text
    content: So I declared on oath in my anger,
  - type: text
    content: ‘They shall never enter my rest.’ ”
  - type: note
    content: Psalm 95:7-11
  '12':
  - type: text
    content: 'See to it, brothers and sisters, that none of you has a sinful, unbelieving heart that turns away from the living God. '
  '13':
  - type: text
    content: 'But encourage one another daily, as long as it is called “Today,” so that none of you may be hardened by sin’s deceitfulness. '
  '14':
  - type: text
    content: 'We have come to share in Christ, if indeed we hold our original conviction firmly to the very end. '
  '15':
  - type: text
    content: 'As has just been said:'
  - type: text
    content: “Today, if you hear his voice,
  - type: text
    content: do not harden your hearts
  - type: text
    content: as you did in the rebellion.”
  - type: note
    content: Psalm 95:7,8
  '16':
  - type: text
    content: 'Who were they who heard and rebelled? Were they not all those Moses led out of Egypt? '
  '17':
  - type: text
    content: 'And with whom was he angry for forty years? Was it not with those who sinned, whose bodies perished in the wilderness? '
  '18':
  - type: text
    content: 'And to whom did God swear that they would never enter his rest if not to those who disobeyed? '
  '19':
  - type: text
    content: So we see that they were not able to enter, because of their unbelief.
  '2':
  - type: text
    content: 'He was faithful to the one who appointed him, just as Moses was faithful in all God’s house. '
  '3':
  - type: text
    content: 'Jesus has been found worthy of greater honor than Moses, just as the builder of a house has greater honor than the house itself. '
  '4':
  - type: text
    content: 'For every house is built by someone, but God is the builder of everything. '
  '5':
  - type: text
    content: “Moses was faithful as a servant in all God’s house,”
  - type: note
    content: Num. 12:7
  - type: text
    content: ' bearing witness to what would be spoken by God in the future. '
  '6':
  - type: text
    content: But Christ is faithful as the Son over God’s house. And we are his house, if indeed we hold firmly to our confidence and the hope in which we glory.
  - type: heading
    content: Warning Against Unbelief
  '7':
  - type: text
    content: 'So, as the Holy Spirit says:'
  - type: text
    content: “Today, if you hear his voice,
  '8':
  - type: text
    content: do not harden your hearts
  - type: text
    content: as you did in the rebellion,
  - type: text
    content: during the time of testing in the wilderness,
  '9':
  - type: text
    content: where your ancestors tested and tried me,
  - type: text
    content: though for forty years they saw what I did.
