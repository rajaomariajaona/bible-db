document_id: EZK.48,111
type_code: eng
verses:
  '1':
  - type: heading
    content: The Division of the Land
  - type: text
    content: '“These are the tribes, listed by name: At the northern frontier, Dan will have one portion; it will follow the Hethlon road to Lebo Hamath; Hazar Enan and the northern border of Damascus next to Hamath will be part of its border from the east side to the west side.'
  '10':
  - type: text
    content: 'This will be the sacred portion for the priests. It will be 25,000 cubits long on the north side, 10,000 cubits wide on the west side, 10,000 cubits wide on the east side and 25,000 cubits long on the south side. In the center of it will be the sanctuary of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'This will be for the consecrated priests, the Zadokites, who were faithful in serving me and did not go astray as the Levites did when the Israelites went astray. '
  '12':
  - type: text
    content: It will be a special gift to them from the sacred portion of the land, a most holy portion, bordering the territory of the Levites.
  '13':
  - type: text
    content: '“Alongside the territory of the priests, the Levites will have an allotment 25,000 cubits long and 10,000 cubits wide. Its total length will be 25,000 cubits and its width 10,000 cubits. '
  '14':
  - type: text
    content: 'They must not sell or exchange any of it. This is the best of the land and must not pass into other hands, because it is holy to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '15':
  - type: text
    content: “The remaining area, 5,000 cubits
  - type: note
    content: That is, about 1 2/3 miles or about 2.7 kilometers
  - type: text
    content: ' wide and 25,000 cubits long, will be for the common use of the city, for houses and for pastureland. The city will be in the center of it '
  '16':
  - type: text
    content: 'and will have these measurements: the north side 4,500 cubits,'
  - type: note
    content: That is, about 1 1/2 miles or about 2.4 kilometers; also in verses 30, 32, 33 and 34
  - type: text
    content: ' the south side 4,500 cubits, the east side 4,500 cubits, and the west side 4,500 cubits. '
  '17':
  - type: text
    content: The pastureland for the city will be 250 cubits
  - type: note
    content: That is, about 440 feet or about 135 meters
  - type: text
    content: ' on the north, 250 cubits on the south, 250 cubits on the east, and 250 cubits on the west. '
  '18':
  - type: text
    content: 'What remains of the area, bordering on the sacred portion and running the length of it, will be 10,000 cubits on the east side and 10,000 cubits on the west side. Its produce will supply food for the workers of the city. '
  '19':
  - type: text
    content: 'The workers from the city who farm it will come from all the tribes of Israel. '
  '2':
  - type: text
    content: “Asher will have one portion; it will border the territory of Dan from east to west.
  '20':
  - type: text
    content: The entire portion will be a square, 25,000 cubits on each side. As a special gift you will set aside the sacred portion, along with the property of the city.
  '21':
  - type: text
    content: '“What remains on both sides of the area formed by the sacred portion and the property of the city will belong to the prince. It will extend eastward from the 25,000 cubits of the sacred portion to the eastern border, and westward from the 25,000 cubits to the western border. Both these areas running the length of the tribal portions will belong to the prince, and the sacred portion with the temple sanctuary will be in the center of them. '
  '22':
  - type: text
    content: So the property of the Levites and the property of the city will lie in the center of the area that belongs to the prince. The area belonging to the prince will lie between the border of Judah and the border of Benjamin.
  '23':
  - type: text
    content: '“As for the rest of the tribes: Benjamin will have one portion; it will extend from the east side to the west side.'
  '24':
  - type: text
    content: “Simeon will have one portion; it will border the territory of Benjamin from east to west.
  '25':
  - type: text
    content: “Issachar will have one portion; it will border the territory of Simeon from east to west.
  '26':
  - type: text
    content: “Zebulun will have one portion; it will border the territory of Issachar from east to west.
  '27':
  - type: text
    content: “Gad will have one portion; it will border the territory of Zebulun from east to west.
  '28':
  - type: text
    content: “The southern boundary of Gad will run south from Tamar to the waters of Meribah Kadesh, then along the Wadi of Egypt to the Mediterranean Sea.
  '29':
  - type: text
    content: '“This is the land you are to allot as an inheritance to the tribes of Israel, and these will be their portions,” declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .
  - type: heading
    content: The Gates of the New City
  '3':
  - type: text
    content: “Naphtali will have one portion; it will border the territory of Asher from east to west.
  '30':
  - type: text
    content: '“These will be the exits of the city: Beginning on the north side, which is 4,500 cubits long, '
  '31':
  - type: text
    content: the gates of the city will be named after the tribes of Israel. The three gates on the north side will be the gate of Reuben, the gate of Judah and the gate of Levi.
  '32':
  - type: text
    content: '“On the east side, which is 4,500 cubits long, will be three gates: the gate of Joseph, the gate of Benjamin and the gate of Dan.'
  '33':
  - type: text
    content: '“On the south side, which measures 4,500 cubits, will be three gates: the gate of Simeon, the gate of Issachar and the gate of Zebulun.'
  '34':
  - type: text
    content: '“On the west side, which is 4,500 cubits long, will be three gates: the gate of Gad, the gate of Asher and the gate of Naphtali.'
  '35':
  - type: text
    content: “The distance all around will be 18,000 cubits.
  - type: note
    content: That is, about 6 miles or about 9.5 kilometers
  - type: text
    content: '“And the name of the city from that time on will be:'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' is there.”'
  '4':
  - type: text
    content: “Manasseh will have one portion; it will border the territory of Naphtali from east to west.
  '5':
  - type: text
    content: “Ephraim will have one portion; it will border the territory of Manasseh from east to west.
  '6':
  - type: text
    content: “Reuben will have one portion; it will border the territory of Ephraim from east to west.
  '7':
  - type: text
    content: “Judah will have one portion; it will border the territory of Reuben from east to west.
  '8':
  - type: text
    content: “Bordering the territory of Judah from east to west will be the portion you are to present as a special gift. It will be 25,000 cubits
  - type: note
    content: That is, about 8 miles or about 13 kilometers; also in verses 9, 10, 13, 15, 20 and 21
  - type: text
    content: ' wide, and its length from east to west will equal one of the tribal portions; the sanctuary will be in the center of it.'
  '9':
  - type: text
    content: '“The special portion you are to offer to the '
  - type: text
    content: Lord
  - type: text
    content: ' will be 25,000 cubits long and 10,000 cubits'
  - type: note
    content: That is, about 3 1/3 miles or about 5.3 kilometers; also in verses 10, 13 and 18
  - type: text
    content: ' wide. '
