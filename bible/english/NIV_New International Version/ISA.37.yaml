document_id: ISA.37,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jerusalem’s Deliverance Foretold
  - type: text
    content: 'When King Hezekiah heard this, he tore his clothes and put on sackcloth and went into the temple of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '10':
  - type: text
    content: '“Say to Hezekiah king of Judah: Do not let the god you depend on deceive you when he says, ‘Jerusalem will not be given into the hands of the king of Assyria.’ '
  '11':
  - type: text
    content: 'Surely you have heard what the kings of Assyria have done to all the countries, destroying them completely. And will you be delivered? '
  '12':
  - type: text
    content: 'Did the gods of the nations that were destroyed by my predecessors deliver them—the gods of Gozan, Harran, Rezeph and the people of Eden who were in Tel Assar? '
  '13':
  - type: text
    content: Where is the king of Hamath or the king of Arpad? Where are the kings of Lair, Sepharvaim, Hena and Ivvah?”
  - type: heading
    content: Hezekiah’s Prayer
  '14':
  - type: text
    content: 'Hezekiah received the letter from the messengers and read it. Then he went up to the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' and spread it out before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '15':
  - type: text
    content: 'And Hezekiah prayed to the '
  - type: text
    content: Lord
  - type: text
    content: ': '
  '16':
  - type: text
    content: “
  - type: text
    content: Lord
  - type: text
    content: ' Almighty, the God of Israel, enthroned between the cherubim, you alone are God over all the kingdoms of the earth. You have made heaven and earth. '
  '17':
  - type: text
    content: 'Give ear, '
  - type: text
    content: Lord
  - type: text
    content: ', and hear; open your eyes, '
  - type: text
    content: Lord
  - type: text
    content: ', and see; listen to all the words Sennacherib has sent to ridicule the living God.'
  '18':
  - type: text
    content: '“It is true, '
  - type: text
    content: Lord
  - type: text
    content: ', that the Assyrian kings have laid waste all these peoples and their lands. '
  '19':
  - type: text
    content: 'They have thrown their gods into the fire and destroyed them, for they were not gods but only wood and stone, fashioned by human hands. '
  '2':
  - type: text
    content: 'He sent Eliakim the palace administrator, Shebna the secretary, and the leading priests, all wearing sackcloth, to the prophet Isaiah son of Amoz. '
  '20':
  - type: text
    content: 'Now, '
  - type: text
    content: Lord
  - type: text
    content: ' our God, deliver us from his hand, so that all the kingdoms of the earth may know that you, '
  - type: text
    content: Lord
  - type: text
    content: ', are the only God.'
  - type: note
    content: Dead Sea Scrolls (see also 2 Kings 19:19); Masoretic Text you alone are the Lord
  - type: text
    content: ”
  - type: heading
    content: Sennacherib’s Fall
  '21':
  - type: text
    content: 'Then Isaiah son of Amoz sent a message to Hezekiah: “This is what the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, says: Because you have prayed to me concerning Sennacherib king of Assyria, '
  '22':
  - type: text
    content: 'this is the word the '
  - type: text
    content: Lord
  - type: text
    content: ' has spoken against him:'
  - type: text
    content: “Virgin Daughter Zion
  - type: text
    content: despises and mocks you.
  - type: text
    content: Daughter Jerusalem
  - type: text
    content: tosses her head as you flee.
  '23':
  - type: text
    content: Who is it you have ridiculed and blasphemed?
  - type: text
    content: Against whom have you raised your voice
  - type: text
    content: and lifted your eyes in pride?
  - type: text
    content: Against the Holy One of Israel!
  '24':
  - type: text
    content: By your messengers
  - type: text
    content: you have ridiculed the Lord.
  - type: text
    content: And you have said,
  - type: text
    content: ‘With my many chariots
  - type: text
    content: I have ascended the heights of the mountains,
  - type: text
    content: the utmost heights of Lebanon.
  - type: text
    content: I have cut down its tallest cedars,
  - type: text
    content: the choicest of its junipers.
  - type: text
    content: I have reached its remotest heights,
  - type: text
    content: the finest of its forests.
  '25':
  - type: text
    content: I have dug wells in foreign lands
  - type: note
    content: Dead Sea Scrolls (see also 2 Kings 19:24); Masoretic Text does not have in foreign lands.
  - type: text
    content: and drunk the water there.
  - type: text
    content: With the soles of my feet
  - type: text
    content: I have dried up all the streams of Egypt.’
  '26':
  - type: text
    content: “Have you not heard?
  - type: text
    content: Long ago I ordained it.
  - type: text
    content: In days of old I planned it;
  - type: text
    content: now I have brought it to pass,
  - type: text
    content: that you have turned fortified cities
  - type: text
    content: into piles of stone.
  '27':
  - type: text
    content: Their people, drained of power,
  - type: text
    content: are dismayed and put to shame.
  - type: text
    content: They are like plants in the field,
  - type: text
    content: like tender green shoots,
  - type: text
    content: like grass sprouting on the roof,
  - type: text
    content: scorched
  - type: note
    content: Some manuscripts of the Masoretic Text, Dead Sea Scrolls and some Septuagint manuscripts (see also 2 Kings 19:26); most manuscripts of the Masoretic Text roof / and terraced fields
  - type: text
    content: ' before it grows up.'
  '28':
  - type: text
    content: “But I know where you are
  - type: text
    content: and when you come and go
  - type: text
    content: and how you rage against me.
  '29':
  - type: text
    content: Because you rage against me
  - type: text
    content: and because your insolence has reached my ears,
  - type: text
    content: I will put my hook in your nose
  - type: text
    content: and my bit in your mouth,
  - type: text
    content: and I will make you return
  - type: text
    content: by the way you came.
  '3':
  - type: text
    content: 'They told him, “This is what Hezekiah says: This day is a day of distress and rebuke and disgrace, as when children come to the moment of birth and there is no strength to deliver them. '
  '30':
  - type: text
    content: '“This will be the sign for you, Hezekiah:'
  - type: text
    content: “This year you will eat what grows by itself,
  - type: text
    content: and the second year what springs from that.
  - type: text
    content: But in the third year sow and reap,
  - type: text
    content: plant vineyards and eat their fruit.
  '31':
  - type: text
    content: Once more a remnant of the kingdom of Judah
  - type: text
    content: will take root below and bear fruit above.
  '32':
  - type: text
    content: For out of Jerusalem will come a remnant,
  - type: text
    content: and out of Mount Zion a band of survivors.
  - type: text
    content: 'The zeal of the '
  - type: text
    content: Lord
  - type: text
    content: ' Almighty'
  - type: text
    content: will accomplish this.
  '33':
  - type: text
    content: '“Therefore this is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says concerning the king of Assyria:'
  - type: text
    content: “He will not enter this city
  - type: text
    content: or shoot an arrow here.
  - type: text
    content: He will not come before it with shield
  - type: text
    content: or build a siege ramp against it.
  '34':
  - type: text
    content: By the way that he came he will return;
  - type: text
    content: he will not enter this city,”
  - type: text
    content: 'declares the '
  - type: text
    content: Lord
  - type: text
    content: .
  '35':
  - type: text
    content: “I will defend this city and save it,
  - type: text
    content: for my sake and for the sake of David my servant!”
  '36':
  - type: text
    content: 'Then the angel of the '
  - type: text
    content: Lord
  - type: text
    content: ' went out and put to death a hundred and eighty-five thousand in the Assyrian camp. When the people got up the next morning—there were all the dead bodies! '
  '37':
  - type: text
    content: So Sennacherib king of Assyria broke camp and withdrew. He returned to Nineveh and stayed there.
  '38':
  - type: text
    content: One day, while he was worshiping in the temple of his god Nisrok, his sons Adrammelek and Sharezer killed him with the sword, and they escaped to the land of Ararat. And Esarhaddon his son succeeded him as king.
  '4':
  - type: text
    content: 'It may be that the '
  - type: text
    content: Lord
  - type: text
    content: ' your God will hear the words of the field commander, whom his master, the king of Assyria, has sent to ridicule the living God, and that he will rebuke him for the words the '
  - type: text
    content: Lord
  - type: text
    content: ' your God has heard. Therefore pray for the remnant that still survives.”'
  '5':
  - type: text
    content: 'When King Hezekiah’s officials came to Isaiah, '
  '6':
  - type: text
    content: 'Isaiah said to them, “Tell your master, ‘This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says: Do not be afraid of what you have heard—those words with which the underlings of the king of Assyria have blasphemed me. '
  '7':
  - type: text
    content: Listen! When he hears a certain report, I will make him want to return to his own country, and there I will have him cut down with the sword.’ ”
  '8':
  - type: text
    content: When the field commander heard that the king of Assyria had left Lachish, he withdrew and found the king fighting against Libnah.
  '9':
  - type: text
    content: Now Sennacherib received a report that Tirhakah, the king of Cush,
  - type: note
    content: That is, the upper Nile region
  - type: text
    content: ' was marching out to fight against him. When he heard it, he sent messengers to Hezekiah with this word: '
