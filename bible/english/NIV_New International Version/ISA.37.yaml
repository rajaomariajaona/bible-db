document_id: ISA.37,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jerusalem’s Deliverance Foretold
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'When King Hezekiah heard this, he tore his clothes and put on sackcloth and went into the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '“Say to Hezekiah king of Judah: Do not let the god you depend on deceive you when he says, ‘Jerusalem will not be given into the hands of the king of Assyria.’ '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Surely you have heard what the kings of Assyria have done to all the countries, destroying them completely. And will you be delivered? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Did the gods of the nations that were destroyed by my predecessors deliver them—the gods of Gozan, Harran, Rezeph and the people of Eden who were in Tel Assar? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Where is the king of Hamath or the king of Arpad? Where are the kings of Lair, Sepharvaim, Hena and Ivvah?”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hezekiah’s Prayer
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Hezekiah received the letter from the messengers and read it. Then he went up to the temple of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' and spread it out before the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'And Hezekiah prayed to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ': '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: “
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty, the God of Israel, enthroned between the cherubim, you alone are God over all the kingdoms of the earth. You have made heaven and earth. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Give ear, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and hear; open your eyes, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', and see; listen to all the words Sennacherib has sent to ridicule the living God.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '“It is true, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', that the Assyrian kings have laid waste all these peoples and their lands. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'They have thrown their gods into the fire and destroyed them, for they were not gods but only wood and stone, fashioned by human hands. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'He sent Eliakim the palace administrator, Shebna the secretary, and the leading priests, all wearing sackcloth, to the prophet Isaiah son of Amoz. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Now, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' our God, deliver us from his hand, so that all the kingdoms of the earth may know that you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', are the only God.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dead Sea Scrolls (see also 2 Kings 19:19); Masoretic Text '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'you alone are the '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Lord
      marker-yv: yv-n
    - type: text
      text: ”
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sennacherib’s Fall
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Then Isaiah son of Amoz sent a message to Hezekiah: “This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', the God of Israel, says: Because you have prayed to me concerning Sennacherib king of Assyria, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'this is the word the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has spoken against him:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Virgin Daughter Zion
  - type: usfm
    marker: q2
    children:
    - type: text
      text: despises and mocks you.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Daughter Jerusalem
  - type: usfm
    marker: q2
    children:
    - type: text
      text: tosses her head as you flee.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Who is it you have ridiculed and blasphemed?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Against whom have you raised your voice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and lifted your eyes in pride?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Against the Holy One of Israel!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: By your messengers
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have ridiculed the Lord.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: And you have said,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ‘With my many chariots
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have ascended the heights of the mountains,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the utmost heights of Lebanon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have cut down its tallest cedars,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the choicest of its junipers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have reached its remotest heights,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the finest of its forests.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: I have dug wells in foreign lands
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dead Sea Scrolls (see also 2 Kings 19:24); Masoretic Text does not have '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: in foreign lands
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and drunk the water there.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With the soles of my feet
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have dried up all the streams of Egypt.’
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: “Have you not heard?
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Long ago I ordained it.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: In days of old I planned it;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: now I have brought it to pass,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: that you have turned fortified cities
  - type: usfm
    marker: q2
    children:
    - type: text
      text: into piles of stone.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Their people, drained of power,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: are dismayed and put to shame.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They are like plants in the field,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: like tender green shoots,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: like grass sprouting on the roof,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: scorched
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts of the Masoretic Text, Dead Sea Scrolls and some Septuagint manuscripts (see also 2 Kings 19:26); most manuscripts of the Masoretic Text '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: roof / and terraced fields
      marker-yv: yv-n
    - type: text
      text: ' before it grows up.'
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: “But I know where you are
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and when you come and go
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and how you rage against me.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Because you rage against me
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and because your insolence has reached my ears,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I will put my hook in your nose
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and my bit in your mouth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: and I will make you return
  - type: usfm
    marker: q2
    children:
    - type: text
      text: by the way you came.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'They told him, “This is what Hezekiah says: This day is a day of distress and rebuke and disgrace, as when children come to the moment of birth and there is no strength to deliver them. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '“This will be the sign for you, Hezekiah:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “This year you will eat what grows by itself,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the second year what springs from that.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: But in the third year sow and reap,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: plant vineyards and eat their fruit.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Once more a remnant of the kingdom of Judah
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will take root below and bear fruit above.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: For out of Jerusalem will come a remnant,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and out of Mount Zion a band of survivors.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The zeal of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' Almighty'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will accomplish this.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: '“Therefore this is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says concerning the king of Assyria:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He will not enter this city
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or shoot an arrow here.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will not come before it with shield
  - type: usfm
    marker: q2
    children:
    - type: text
      text: or build a siege ramp against it.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: By the way that he came he will return;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he will not enter this city,”
  - type: usfm
    marker: q4
    children:
    - type: text
      text: 'declares the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: .
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: “I will defend this city and save it,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: for my sake and for the sake of David my servant!”
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Then the angel of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' went out and put to death a hundred and eighty-five thousand in the Assyrian camp. When the people got up the next morning—there were all the dead bodies! '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: So Sennacherib king of Assyria broke camp and withdrew. He returned to Nineveh and stayed there.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: One day, while he was worshiping in the temple of his god Nisrok, his sons Adrammelek and Sharezer killed him with the sword, and they escaped to the land of Ararat. And Esarhaddon his son succeeded him as king.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'It may be that the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God will hear the words of the field commander, whom his master, the king of Assyria, has sent to ridicule the living God, and that he will rebuke him for the words the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' your God has heard. Therefore pray for the remnant that still survives.”'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'When King Hezekiah’s officials came to Isaiah, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Isaiah said to them, “Tell your master, ‘This is what the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' says: Do not be afraid of what you have heard—those words with which the underlings of the king of Assyria have blasphemed me. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Listen! When he hears a certain report, I will make him want to return to his own country, and there I will have him cut down with the sword.’ ”
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: When the field commander heard that the king of Assyria had left Lachish, he withdrew and found the king fighting against Libnah.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Now Sennacherib received a report that Tirhakah, the king of Cush,
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37:9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, the upper Nile region
      marker-yv: yv-n
    - type: text
      text: ' was marching out to fight against him. When he heard it, he sent messengers to Hezekiah with this word: '
