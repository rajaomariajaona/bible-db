document_id: 1TH.3,111
type_code: eng
verses:
  '1':
  - type: text
    content: 'So when we could stand it no longer, we thought it best to be left by ourselves in Athens. '
  '10':
  - type: text
    content: Night and day we pray most earnestly that we may see you again and supply what is lacking in your faith.
  '11':
  - type: text
    content: 'Now may our God and Father himself and our Lord Jesus clear the way for us to come to you. '
  '12':
  - type: text
    content: 'May the Lord make your love increase and overflow for each other and for everyone else, just as ours does for you. '
  '13':
  - type: text
    content: May he strengthen your hearts so that you will be blameless and holy in the presence of our God and Father when our Lord Jesus comes with all his holy ones.
  '2':
  - type: text
    content: 'We sent Timothy, who is our brother and co-worker in God’s service in spreading the gospel of Christ, to strengthen and encourage you in your faith, '
  '3':
  - type: text
    content: 'so that no one would be unsettled by these trials. For you know quite well that we are destined for them. '
  '4':
  - type: text
    content: 'In fact, when we were with you, we kept telling you that we would be persecuted. And it turned out that way, as you well know. '
  '5':
  - type: text
    content: For this reason, when I could stand it no longer, I sent to find out about your faith. I was afraid that in some way the tempter had tempted you and that our labors might have been in vain.
  - type: heading
    content: Timothy’s Encouraging Report
  '6':
  - type: text
    content: 'But Timothy has just now come to us from you and has brought good news about your faith and love. He has told us that you always have pleasant memories of us and that you long to see us, just as we also long to see you. '
  '7':
  - type: text
    content: 'Therefore, brothers and sisters, in all our distress and persecution we were encouraged about you because of your faith. '
  '8':
  - type: text
    content: 'For now we really live, since you are standing firm in the Lord. '
  '9':
  - type: text
    content: 'How can we thank God enough for you in return for all the joy we have in the presence of our God because of you? '
