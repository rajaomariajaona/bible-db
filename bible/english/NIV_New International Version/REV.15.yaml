document_id: REV.15,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Seven Angels With Seven Plagues
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'I saw in heaven another great and marvelous sign: seven angels with the seven last plagues—last, because with them God’s wrath is completed. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'And I saw what looked like a sea of glass glowing with fire and, standing beside the sea, those who had been victorious over the beast and its image and over the number of its name. They held harps given them by God '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'and sang the song of God’s servant Moses and of the Lamb:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Great and marvelous are your deeds,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Lord God Almighty.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Just and true are your ways,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: King of the nations.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ages
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Who will not fear you, Lord,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and bring glory to your name?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For you alone are holy.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All nations will come
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and worship before you,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: for your righteous acts have been revealed.”
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15:3,4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Phrases in this song are drawn from Psalm 111:2,3; Deut. 32:4; Jer. 10:7; Psalms 86:9; 98:2.
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'After this I looked, and I saw in heaven the temple—that is, the tabernacle of the covenant law—and it was opened. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Out of the temple came the seven angels with the seven plagues. They were dressed in clean, shining linen and wore golden sashes around their chests. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Then one of the four living creatures gave to the seven angels seven golden bowls filled with the wrath of God, who lives for ever and ever. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: And the temple was filled with smoke from the glory of God and from his power, and no one could enter the temple until the seven plagues of the seven angels were completed.
