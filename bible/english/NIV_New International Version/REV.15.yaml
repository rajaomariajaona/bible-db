document_id: REV.15,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Seven Angels With Seven Plagues
  - type: text
    content: 'I saw in heaven another great and marvelous sign: seven angels with the seven last plagues—last, because with them God’s wrath is completed. '
  '2':
  - type: text
    content: 'And I saw what looked like a sea of glass glowing with fire and, standing beside the sea, those who had been victorious over the beast and its image and over the number of its name. They held harps given them by God '
  '3':
  - type: text
    content: 'and sang the song of God’s servant Moses and of the Lamb:'
  - type: text
    content: “Great and marvelous are your deeds,
  - type: text
    content: Lord God Almighty.
  - type: text
    content: Just and true are your ways,
  - type: text
    content: King of the nations.
  - type: note
    content: Some manuscripts ages
  '4':
  - type: text
    content: Who will not fear you, Lord,
  - type: text
    content: and bring glory to your name?
  - type: text
    content: For you alone are holy.
  - type: text
    content: All nations will come
  - type: text
    content: and worship before you,
  - type: text
    content: for your righteous acts have been revealed.”
  - type: note
    content: Phrases in this song are drawn from Psalm 111:2,3; Deut. 32:4; Jer. 10:7; Psalms 86:9; 98:2.
  '5':
  - type: text
    content: 'After this I looked, and I saw in heaven the temple—that is, the tabernacle of the covenant law—and it was opened. '
  '6':
  - type: text
    content: 'Out of the temple came the seven angels with the seven plagues. They were dressed in clean, shining linen and wore golden sashes around their chests. '
  '7':
  - type: text
    content: 'Then one of the four living creatures gave to the seven angels seven golden bowls filled with the wrath of God, who lives for ever and ever. '
  '8':
  - type: text
    content: And the temple was filled with smoke from the glory of God and from his power, and no one could enter the temple until the seven plagues of the seven angels were completed.
