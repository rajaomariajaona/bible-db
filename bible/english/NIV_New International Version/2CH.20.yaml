document_id: 2CH.20,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Jehoshaphat Defeats Moab and Ammon
  - type: text
    content: After this, the Moabites and Ammonites with some of the Meunites
  - type: note
    content: Some Septuagint manuscripts; Hebrew Ammonites
  - type: text
    content: ' came to wage war against Jehoshaphat.'
  '10':
  - type: text
    content: '“But now here are men from Ammon, Moab and Mount Seir, whose territory you would not allow Israel to invade when they came from Egypt; so they turned away from them and did not destroy them. '
  '11':
  - type: text
    content: 'See how they are repaying us by coming to drive us out of the possession you gave us as an inheritance. '
  '12':
  - type: text
    content: Our God, will you not judge them? For we have no power to face this vast army that is attacking us. We do not know what to do, but our eyes are on you.”
  '13':
  - type: text
    content: 'All the men of Judah, with their wives and children and little ones, stood there before the '
  - type: text
    content: Lord
  - type: text
    content: .
  '14':
  - type: text
    content: 'Then the Spirit of the '
  - type: text
    content: Lord
  - type: text
    content: ' came on Jahaziel son of Zechariah, the son of Benaiah, the son of Jeiel, the son of Mattaniah, a Levite and descendant of Asaph, as he stood in the assembly.'
  '15':
  - type: text
    content: 'He said: “Listen, King Jehoshaphat and all who live in Judah and Jerusalem! This is what the '
  - type: text
    content: Lord
  - type: text
    content: ' says to you: ‘Do not be afraid or discouraged because of this vast army. For the battle is not yours, but God’s. '
  '16':
  - type: text
    content: 'Tomorrow march down against them. They will be climbing up by the Pass of Ziz, and you will find them at the end of the gorge in the Desert of Jeruel. '
  '17':
  - type: text
    content: 'You will not have to fight this battle. Take up your positions; stand firm and see the deliverance the '
  - type: text
    content: Lord
  - type: text
    content: ' will give you, Judah and Jerusalem. Do not be afraid; do not be discouraged. Go out to face them tomorrow, and the '
  - type: text
    content: Lord
  - type: text
    content: ' will be with you.’ ”'
  '18':
  - type: text
    content: 'Jehoshaphat bowed down with his face to the ground, and all the people of Judah and Jerusalem fell down in worship before the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Then some Levites from the Kohathites and Korahites stood up and praised the '
  - type: text
    content: Lord
  - type: text
    content: ', the God of Israel, with a very loud voice.'
  '2':
  - type: text
    content: Some people came and told Jehoshaphat, “A vast army is coming against you from Edom,
  - type: note
    content: One Hebrew manuscript; most Hebrew manuscripts, Septuagint and Vulgate Aram
  - type: text
    content: ' from the other side of the Dead Sea. It is already in Hazezon Tamar” (that is, En Gedi). '
  '20':
  - type: text
    content: 'Early in the morning they left for the Desert of Tekoa. As they set out, Jehoshaphat stood and said, “Listen to me, Judah and people of Jerusalem! Have faith in the '
  - type: text
    content: Lord
  - type: text
    content: ' your God and you will be upheld; have faith in his prophets and you will be successful.” '
  '21':
  - type: text
    content: 'After consulting the people, Jehoshaphat appointed men to sing to the '
  - type: text
    content: Lord
  - type: text
    content: ' and to praise him for the splendor of his'
  - type: note
    content: Or him with the splendor of
  - type: text
    content: ' holiness as they went out at the head of the army, saying:'
  - type: text
    content: '“Give thanks to the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: for his love endures forever.”
  '22':
  - type: text
    content: 'As they began to sing and praise, the '
  - type: text
    content: Lord
  - type: text
    content: ' set ambushes against the men of Ammon and Moab and Mount Seir who were invading Judah, and they were defeated. '
  '23':
  - type: text
    content: The Ammonites and Moabites rose up against the men from Mount Seir to destroy and annihilate them. After they finished slaughtering the men from Seir, they helped to destroy one another.
  '24':
  - type: text
    content: 'When the men of Judah came to the place that overlooks the desert and looked toward the vast army, they saw only dead bodies lying on the ground; no one had escaped. '
  '25':
  - type: text
    content: So Jehoshaphat and his men went to carry off their plunder, and they found among them a great amount of equipment and clothing
  - type: note
    content: Some Hebrew manuscripts and Vulgate; most Hebrew manuscripts corpses
  - type: text
    content: ' and also articles of value—more than they could take away. There was so much plunder that it took three days to collect it. '
  '26':
  - type: text
    content: 'On the fourth day they assembled in the Valley of Berakah, where they praised the '
  - type: text
    content: Lord
  - type: text
    content: . This is why it is called the Valley of Berakah
  - type: note
    content: Berakah means praise.
  - type: text
    content: ' to this day.'
  '27':
  - type: text
    content: 'Then, led by Jehoshaphat, all the men of Judah and Jerusalem returned joyfully to Jerusalem, for the '
  - type: text
    content: Lord
  - type: text
    content: ' had given them cause to rejoice over their enemies. '
  '28':
  - type: text
    content: 'They entered Jerusalem and went to the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' with harps and lyres and trumpets.'
  '29':
  - type: text
    content: 'The fear of God came on all the surrounding kingdoms when they heard how the '
  - type: text
    content: Lord
  - type: text
    content: ' had fought against the enemies of Israel. '
  '3':
  - type: text
    content: 'Alarmed, Jehoshaphat resolved to inquire of the '
  - type: text
    content: Lord
  - type: text
    content: ', and he proclaimed a fast for all Judah. '
  '30':
  - type: text
    content: And the kingdom of Jehoshaphat was at peace, for his God had given him rest on every side.
  - type: heading
    content: The End of Jehoshaphat’s Reign
  '31':
  - type: text
    content: 'So Jehoshaphat reigned over Judah. He was thirty-five years old when he became king of Judah, and he reigned in Jerusalem twenty-five years. His mother’s name was Azubah daughter of Shilhi. '
  '32':
  - type: text
    content: 'He followed the ways of his father Asa and did not stray from them; he did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '33':
  - type: text
    content: The high places, however, were not removed, and the people still had not set their hearts on the God of their ancestors.
  '34':
  - type: text
    content: The other events of Jehoshaphat’s reign, from beginning to end, are written in the annals of Jehu son of Hanani, which are recorded in the book of the kings of Israel.
  '35':
  - type: text
    content: 'Later, Jehoshaphat king of Judah made an alliance with Ahaziah king of Israel, whose ways were wicked. '
  '36':
  - type: text
    content: He agreed with him to construct a fleet of trading ships.
  - type: note
    content: Hebrew of ships that could go to Tarshish
  - type: text
    content: ' After these were built at Ezion Geber, '
  '37':
  - type: text
    content: 'Eliezer son of Dodavahu of Mareshah prophesied against Jehoshaphat, saying, “Because you have made an alliance with Ahaziah, the '
  - type: text
    content: Lord
  - type: text
    content: ' will destroy what you have made.” The ships were wrecked and were not able to set sail to trade.'
  - type: note
    content: Hebrew sail for Tarshish
  '4':
  - type: text
    content: 'The people of Judah came together to seek help from the '
  - type: text
    content: Lord
  - type: text
    content: ; indeed, they came from every town in Judah to seek him.
  '5':
  - type: text
    content: 'Then Jehoshaphat stood up in the assembly of Judah and Jerusalem at the temple of the '
  - type: text
    content: Lord
  - type: text
    content: ' in the front of the new courtyard '
  '6':
  - type: text
    content: 'and said:'
  - type: text
    content: “
  - type: text
    content: Lord
  - type: text
    content: ', the God of our ancestors, are you not the God who is in heaven? You rule over all the kingdoms of the nations. Power and might are in your hand, and no one can withstand you. '
  '7':
  - type: text
    content: 'Our God, did you not drive out the inhabitants of this land before your people Israel and give it forever to the descendants of Abraham your friend? '
  '8':
  - type: text
    content: 'They have lived in it and have built in it a sanctuary for your Name, saying, '
  '9':
  - type: text
    content: ‘If calamity comes upon us, whether the sword of judgment, or plague or famine, we will stand in your presence before this temple that bears your Name and will cry out to you in our distress, and you will hear us and save us.’
