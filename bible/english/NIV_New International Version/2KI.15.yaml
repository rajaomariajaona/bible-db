document_id: 2KI.15,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Azariah King of Judah
  - type: text
    content: In the twenty-seventh year of Jeroboam king of Israel, Azariah
  - type: note
    content: Also called Uzziah; also in verses 6, 7, 8, 17, 23 and 27
  - type: text
    content: ' son of Amaziah king of Judah began to reign. '
  '10':
  - type: text
    content: Shallum son of Jabesh conspired against Zechariah. He attacked him in front of the people,
  - type: note
    content: Hebrew; some Septuagint manuscripts in Ibleam
  - type: text
    content: ' assassinated him and succeeded him as king. '
  '11':
  - type: text
    content: 'The other events of Zechariah’s reign are written in the book of the annals of the kings of Israel. '
  '12':
  - type: text
    content: 'So the word of the '
  - type: text
    content: Lord
  - type: text
    content: ' spoken to Jehu was fulfilled: “Your descendants will sit on the throne of Israel to the fourth generation.”'
  - type: note
    content: 2 Kings 10:30
  - type: heading
    content: Shallum King of Israel
  '13':
  - type: text
    content: 'Shallum son of Jabesh became king in the thirty-ninth year of Uzziah king of Judah, and he reigned in Samaria one month. '
  '14':
  - type: text
    content: Then Menahem son of Gadi went from Tirzah up to Samaria. He attacked Shallum son of Jabesh in Samaria, assassinated him and succeeded him as king.
  '15':
  - type: text
    content: The other events of Shallum’s reign, and the conspiracy he led, are written in the book of the annals of the kings of Israel.
  '16':
  - type: text
    content: At that time Menahem, starting out from Tirzah, attacked Tiphsah and everyone in the city and its vicinity, because they refused to open their gates. He sacked Tiphsah and ripped open all the pregnant women.
  - type: heading
    content: Menahem King of Israel
  '17':
  - type: text
    content: 'In the thirty-ninth year of Azariah king of Judah, Menahem son of Gadi became king of Israel, and he reigned in Samaria ten years. '
  '18':
  - type: text
    content: 'He did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: . During his entire reign he did not turn away from the sins of Jeroboam son of Nebat, which he had caused Israel to commit.
  '19':
  - type: text
    content: Then Pul
  - type: note
    content: Also called Tiglath-Pileser
  - type: text
    content: ' king of Assyria invaded the land, and Menahem gave him a thousand talents'
  - type: note
    content: That is, about 38 tons or about 34 metric tons
  - type: text
    content: ' of silver to gain his support and strengthen his own hold on the kingdom. '
  '2':
  - type: text
    content: 'He was sixteen years old when he became king, and he reigned in Jerusalem fifty-two years. His mother’s name was Jekoliah; she was from Jerusalem. '
  '20':
  - type: text
    content: Menahem exacted this money from Israel. Every wealthy person had to contribute fifty shekels
  - type: note
    content: That is, about 1 1/4 pounds or about 575 grams
  - type: text
    content: ' of silver to be given to the king of Assyria. So the king of Assyria withdrew and stayed in the land no longer.'
  '21':
  - type: text
    content: 'As for the other events of Menahem’s reign, and all he did, are they not written in the book of the annals of the kings of Israel? '
  '22':
  - type: text
    content: Menahem rested with his ancestors. And Pekahiah his son succeeded him as king.
  - type: heading
    content: Pekahiah King of Israel
  '23':
  - type: text
    content: 'In the fiftieth year of Azariah king of Judah, Pekahiah son of Menahem became king of Israel in Samaria, and he reigned two years. '
  '24':
  - type: text
    content: 'Pekahiah did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: '. He did not turn away from the sins of Jeroboam son of Nebat, which he had caused Israel to commit. '
  '25':
  - type: text
    content: One of his chief officers, Pekah son of Remaliah, conspired against him. Taking fifty men of Gilead with him, he assassinated Pekahiah, along with Argob and Arieh, in the citadel of the royal palace at Samaria. So Pekah killed Pekahiah and succeeded him as king.
  '26':
  - type: text
    content: The other events of Pekahiah’s reign, and all he did, are written in the book of the annals of the kings of Israel.
  - type: heading
    content: Pekah King of Israel
  '27':
  - type: text
    content: 'In the fifty-second year of Azariah king of Judah, Pekah son of Remaliah became king of Israel in Samaria, and he reigned twenty years. '
  '28':
  - type: text
    content: 'He did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: . He did not turn away from the sins of Jeroboam son of Nebat, which he had caused Israel to commit.
  '29':
  - type: text
    content: 'In the time of Pekah king of Israel, Tiglath-Pileser king of Assyria came and took Ijon, Abel Beth Maakah, Janoah, Kedesh and Hazor. He took Gilead and Galilee, including all the land of Naphtali, and deported the people to Assyria. '
  '3':
  - type: text
    content: 'He did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', just as his father Amaziah had done. '
  '30':
  - type: text
    content: Then Hoshea son of Elah conspired against Pekah son of Remaliah. He attacked and assassinated him, and then succeeded him as king in the twentieth year of Jotham son of Uzziah.
  '31':
  - type: text
    content: As for the other events of Pekah’s reign, and all he did, are they not written in the book of the annals of the kings of Israel?
  - type: heading
    content: Jotham King of Judah
  '32':
  - type: text
    content: 'In the second year of Pekah son of Remaliah king of Israel, Jotham son of Uzziah king of Judah began to reign. '
  '33':
  - type: text
    content: 'He was twenty-five years old when he became king, and he reigned in Jerusalem sixteen years. His mother’s name was Jerusha daughter of Zadok. '
  '34':
  - type: text
    content: 'He did what was right in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', just as his father Uzziah had done. '
  '35':
  - type: text
    content: 'The high places, however, were not removed; the people continued to offer sacrifices and burn incense there. Jotham rebuilt the Upper Gate of the temple of the '
  - type: text
    content: Lord
  - type: text
    content: .
  '36':
  - type: text
    content: 'As for the other events of Jotham’s reign, and what he did, are they not written in the book of the annals of the kings of Judah? '
  '37':
  - type: text
    content: '(In those days the '
  - type: text
    content: Lord
  - type: text
    content: ' began to send Rezin king of Aram and Pekah son of Remaliah against Judah.) '
  '38':
  - type: text
    content: Jotham rested with his ancestors and was buried with them in the City of David, the city of his father. And Ahaz his son succeeded him as king.
  '4':
  - type: text
    content: The high places, however, were not removed; the people continued to offer sacrifices and burn incense there.
  '5':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' afflicted the king with leprosy'
  - type: note
    content: The Hebrew for leprosy was used for various diseases affecting the skin.
  - type: text
    content: ' until the day he died, and he lived in a separate house.'
  - type: note
    content: Or in a house where he was relieved of responsibilities
  - type: text
    content: ' Jotham the king’s son had charge of the palace and governed the people of the land.'
  '6':
  - type: text
    content: 'As for the other events of Azariah’s reign, and all he did, are they not written in the book of the annals of the kings of Judah? '
  '7':
  - type: text
    content: Azariah rested with his ancestors and was buried near them in the City of David. And Jotham his son succeeded him as king.
  - type: heading
    content: Zechariah King of Israel
  '8':
  - type: text
    content: 'In the thirty-eighth year of Azariah king of Judah, Zechariah son of Jeroboam became king of Israel in Samaria, and he reigned six months. '
  '9':
  - type: text
    content: 'He did evil in the eyes of the '
  - type: text
    content: Lord
  - type: text
    content: ', as his predecessors had done. He did not turn away from the sins of Jeroboam son of Nebat, which he had caused Israel to commit.'
