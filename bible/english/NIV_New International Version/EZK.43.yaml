document_id: EZK.43,111
type_code: eng
verses:
  '1':
  - type: heading
    content: God’s Glory Returns to the Temple
  - type: text
    content: 'Then the man brought me to the gate facing east, '
  '10':
  - type: text
    content: '“Son of man, describe the temple to the people of Israel, that they may be ashamed of their sins. Let them consider its perfection, '
  '11':
  - type: text
    content: and if they are ashamed of all they have done, make known to them the design of the temple—its arrangement, its exits and entrances—its whole design and all its regulations
  - type: note
    content: Some Hebrew manuscripts and Septuagint; most Hebrew manuscripts regulations and its whole design
  - type: text
    content: ' and laws. Write these down before them so that they may be faithful to its design and follow all its regulations.'
  '12':
  - type: text
    content: '“This is the law of the temple: All the surrounding area on top of the mountain will be most holy. Such is the law of the temple.'
  - type: heading
    content: The Great Altar Restored
  '13':
  - type: text
    content: “These are the measurements of the altar in long cubits,
  - type: note
    content: That is, about 21 inches or about 53 centimeters; also in verses 14 and 17. The long cubit is the basic unit for linear measurement throughout Ezekiel 40–48.
  - type: text
    content: ' that cubit being a cubit and a handbreadth: Its gutter is a cubit deep and a cubit wide, with a rim of one span'
  - type: note
    content: That is, about 11 inches or about 27 centimeters
  - type: text
    content: ' around the edge. And this is the height of the altar: '
  '14':
  - type: text
    content: From the gutter on the ground up to the lower ledge that goes around the altar it is two cubits high, and the ledge is a cubit wide.
  - type: note
    content: That is, about 3 1/2 feet high and 1 3/4 feet wide or about 105 centimeters high and 53 centimeters wide
  - type: text
    content: ' From this lower ledge to the upper ledge that goes around the altar it is four cubits high, and that ledge is also a cubit wide.'
  - type: note
    content: That is, about 7 feet high and 1 3/4 feet wide or about 2.1 meters high and 53 centimeters wide
  - type: text
    content: ' '
  '15':
  - type: text
    content: 'Above that, the altar hearth is four cubits high, and four horns project upward from the hearth. '
  '16':
  - type: text
    content: The altar hearth is square, twelve cubits
  - type: note
    content: That is, about 21 feet or about 6.4 meters
  - type: text
    content: ' long and twelve cubits wide. '
  '17':
  - type: text
    content: The upper ledge also is square, fourteen cubits
  - type: note
    content: That is, about 25 feet or about 7.4 meters
  - type: text
    content: ' long and fourteen cubits wide. All around the altar is a gutter of one cubit with a rim of half a cubit.'
  - type: note
    content: That is, about 11 inches or about 27 centimeters
  - type: text
    content: ' The steps of the altar face east.”'
  '18':
  - type: text
    content: 'Then he said to me, “Son of man, this is what the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: ' says: These will be the regulations for sacrificing burnt offerings and splashing blood against the altar when it is built: '
  '19':
  - type: text
    content: You are to give a young bull as a sin offering
  - type: note
    content: Or purification offering; also in verses 21, 22 and 25
  - type: text
    content: ' to the Levitical priests of the family of Zadok, who come near to minister before me, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'and I saw the glory of the God of Israel coming from the east. His voice was like the roar of rushing waters, and the land was radiant with his glory. '
  '20':
  - type: text
    content: 'You are to take some of its blood and put it on the four horns of the altar and on the four corners of the upper ledge and all around the rim, and so purify the altar and make atonement for it. '
  '21':
  - type: text
    content: You are to take the bull for the sin offering and burn it in the designated part of the temple area outside the sanctuary.
  '22':
  - type: text
    content: '“On the second day you are to offer a male goat without defect for a sin offering, and the altar is to be purified as it was purified with the bull. '
  '23':
  - type: text
    content: 'When you have finished purifying it, you are to offer a young bull and a ram from the flock, both without defect. '
  '24':
  - type: text
    content: 'You are to offer them before the '
  - type: text
    content: Lord
  - type: text
    content: ', and the priests are to sprinkle salt on them and sacrifice them as a burnt offering to the '
  - type: text
    content: Lord
  - type: text
    content: .
  '25':
  - type: text
    content: '“For seven days you are to provide a male goat daily for a sin offering; you are also to provide a young bull and a ram from the flock, both without defect. '
  '26':
  - type: text
    content: 'For seven days they are to make atonement for the altar and cleanse it; thus they will dedicate it. '
  '27':
  - type: text
    content: 'At the end of these days, from the eighth day on, the priests are to present your burnt offerings and fellowship offerings on the altar. Then I will accept you, declares the Sovereign '
  - type: text
    content: Lord
  - type: text
    content: .”
  '3':
  - type: text
    content: The vision I saw was like the vision I had seen when he
  - type: note
    content: Some Hebrew manuscripts and Vulgate; most Hebrew manuscripts I
  - type: text
    content: ' came to destroy the city and like the visions I had seen by the Kebar River, and I fell facedown. '
  '4':
  - type: text
    content: 'The glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' entered the temple through the gate facing east. '
  '5':
  - type: text
    content: 'Then the Spirit lifted me up and brought me into the inner court, and the glory of the '
  - type: text
    content: Lord
  - type: text
    content: ' filled the temple.'
  '6':
  - type: text
    content: 'While the man was standing beside me, I heard someone speaking to me from inside the temple. '
  '7':
  - type: text
    content: 'He said: “Son of man, this is the place of my throne and the place for the soles of my feet. This is where I will live among the Israelites forever. The people of Israel will never again defile my holy name—neither they nor their kings—by their prostitution and the funeral offerings'
  - type: note
    content: Or the memorial monuments; also in verse 9
  - type: text
    content: ' for their kings at their death.'
  - type: note
    content: Or their high places
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'When they placed their threshold next to my threshold and their doorposts beside my doorposts, with only a wall between me and them, they defiled my holy name by their detestable practices. So I destroyed them in my anger. '
  '9':
  - type: text
    content: Now let them put away from me their prostitution and the funeral offerings for their kings, and I will live among them forever.
