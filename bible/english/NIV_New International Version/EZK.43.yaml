document_id: EZK.43
type_code: eng
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: God’s Glory Returns to the Temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Then the man brought me to the gate facing east, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'and I saw the glory of the God of Israel coming from the east. His voice was like the roar of rushing waters, and the land was radiant with his glory. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: The vision I saw was like the vision I had seen when he
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43:3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Hebrew manuscripts and Vulgate; most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: I
    marker-yv: yv-n
  - type: text
    text: ' came to destroy the city and like the visions I had seen by the Kebar River, and I fell facedown. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'The glory of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' entered the temple through the gate facing east. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Then the Spirit lifted me up and brought me into the inner court, and the glory of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' filled the temple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'While the man was standing beside me, I heard someone speaking to me from inside the temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'He said: “Son of man, this is the place of my throne and the place for the soles of my feet. This is where I will live among the Israelites forever. The people of Israel will never again defile my holy name—neither they nor their kings—by their prostitution and the funeral offerings'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: the memorial monuments
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verse 9
    marker-yv: yv-n
  - type: text
    text: ' for their kings at their death.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43:7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: their high places
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'When they placed their threshold next to my threshold and their doorposts beside my doorposts, with only a wall between me and them, they defiled my holy name by their detestable practices. So I destroyed them in my anger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Now let them put away from me their prostitution and the funeral offerings for their kings, and I will live among them forever.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '“Son of man, describe the temple to the people of Israel, that they may be ashamed of their sins. Let them consider its perfection, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: and if they are ashamed of all they have done, make known to them the design of the temple—its arrangement, its exits and entrances—its whole design and all its regulations
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43:11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Hebrew manuscripts and Septuagint; most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: regulations and its whole design
    marker-yv: yv-n
  - type: text
    text: ' and laws. Write these down before them so that they may be faithful to its design and follow all its regulations.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '“This is the law of the temple: All the surrounding area on top of the mountain will be most holy. Such is the law of the temple.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: The Great Altar Restored
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: “These are the measurements of the altar in long cubits,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 21 inches or about 53 centimeters; also in verses 14 and 17. The long cubit is the basic unit for linear measurement throughout Ezekiel 40–48.
    marker-yv: yv-n
  - type: text
    text: ' that cubit being a cubit and a handbreadth: Its gutter is a cubit deep and a cubit wide, with a rim of one span'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43:13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 11 inches or about 27 centimeters
    marker-yv: yv-n
  - type: text
    text: ' around the edge. And this is the height of the altar: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: From the gutter on the ground up to the lower ledge that goes around the altar it is two cubits high, and the ledge is a cubit wide.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 3 1/2 feet high and 1 3/4 feet wide or about 105 centimeters high and 53 centimeters wide
    marker-yv: yv-n
  - type: text
    text: ' From this lower ledge to the upper ledge that goes around the altar it is four cubits high, and that ledge is also a cubit wide.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 7 feet high and 1 3/4 feet wide or about 2.1 meters high and 53 centimeters wide
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Above that, the altar hearth is four cubits high, and four horns project upward from the hearth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The altar hearth is square, twelve cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43:16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 21 feet or about 6.4 meters
    marker-yv: yv-n
  - type: text
    text: ' long and twelve cubits wide. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: The upper ledge also is square, fourteen cubits
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 25 feet or about 7.4 meters
    marker-yv: yv-n
  - type: text
    text: ' long and fourteen cubits wide. All around the altar is a gutter of one cubit with a rim of half a cubit.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43:17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, about 11 inches or about 27 centimeters
    marker-yv: yv-n
  - type: text
    text: ' The steps of the altar face east.”'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Then he said to me, “Son of man, this is what the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' says: These will be the regulations for sacrificing burnt offerings and splashing blood against the altar when it is built: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: You are to give a young bull as a sin offering
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43:19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: purification offering
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; also in verses 21, 22 and 25
    marker-yv: yv-n
  - type: text
    text: ' to the Levitical priests of the family of Zadok, who come near to minister before me, declares the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'You are to take some of its blood and put it on the four horns of the altar and on the four corners of the upper ledge and all around the rim, and so purify the altar and make atonement for it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: You are to take the bull for the sin offering and burn it in the designated part of the temple area outside the sanctuary.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '“On the second day you are to offer a male goat without defect for a sin offering, and the altar is to be purified as it was purified with the bull. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'When you have finished purifying it, you are to offer a young bull and a ram from the flock, both without defect. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'You are to offer them before the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', and the priests are to sprinkle salt on them and sacrifice them as a burnt offering to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '“For seven days you are to provide a male goat daily for a sin offering; you are also to provide a young bull and a ram from the flock, both without defect. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'For seven days they are to make atonement for the altar and cleanse it; thus they will dedicate it. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'At the end of these days, from the eighth day on, the priests are to present your burnt offerings and fellowship offerings on the altar. Then I will accept you, declares the Sovereign '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: .”
