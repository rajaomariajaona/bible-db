document_id: ACT.12,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Peter’s Miraculous Escape From Prison
  - type: text
    content: 'It was about this time that King Herod arrested some who belonged to the church, intending to persecute them. '
  '10':
  - type: text
    content: They passed the first and second guards and came to the iron gate leading to the city. It opened for them by itself, and they went through it. When they had walked the length of one street, suddenly the angel left him.
  '11':
  - type: text
    content: Then Peter came to himself and said, “Now I know without a doubt that the Lord has sent his angel and rescued me from Herod’s clutches and from everything the Jewish people were hoping would happen.”
  '12':
  - type: text
    content: 'When this had dawned on him, he went to the house of Mary the mother of John, also called Mark, where many people had gathered and were praying. '
  '13':
  - type: text
    content: 'Peter knocked at the outer entrance, and a servant named Rhoda came to answer the door. '
  '14':
  - type: text
    content: When she recognized Peter’s voice, she was so overjoyed she ran back without opening it and exclaimed, “Peter is at the door!”
  '15':
  - type: text
    content: “You’re out of your mind,” they told her. When she kept insisting that it was so, they said, “It must be his angel.”
  '16':
  - type: text
    content: 'But Peter kept on knocking, and when they opened the door and saw him, they were astonished. '
  '17':
  - type: text
    content: Peter motioned with his hand for them to be quiet and described how the Lord had brought him out of prison. “Tell James and the other brothers and sisters about this,” he said, and then he left for another place.
  '18':
  - type: text
    content: 'In the morning, there was no small commotion among the soldiers as to what had become of Peter. '
  '19':
  - type: text
    content: After Herod had a thorough search made for him and did not find him, he cross-examined the guards and ordered that they be executed.
  - type: heading
    content: Herod’s Death
  - type: text
    content: 'Then Herod went from Judea to Caesarea and stayed there. '
  '2':
  - type: text
    content: 'He had James, the brother of John, put to death with the sword. '
  '20':
  - type: text
    content: He had been quarreling with the people of Tyre and Sidon; they now joined together and sought an audience with him. After securing the support of Blastus, a trusted personal servant of the king, they asked for peace, because they depended on the king’s country for their food supply.
  '21':
  - type: text
    content: 'On the appointed day Herod, wearing his royal robes, sat on his throne and delivered a public address to the people. '
  '22':
  - type: text
    content: 'They shouted, “This is the voice of a god, not of a man.” '
  '23':
  - type: text
    content: Immediately, because Herod did not give praise to God, an angel of the Lord struck him down, and he was eaten by worms and died.
  '24':
  - type: text
    content: But the word of God continued to spread and flourish.
  - type: heading
    content: Barnabas and Saul Sent Off
  '25':
  - type: text
    content: When Barnabas and Saul had finished their mission, they returned from
  - type: note
    content: Some manuscripts to
  - type: text
    content: ' Jerusalem, taking with them John, also called Mark.'
  '3':
  - type: text
    content: 'When he saw that this met with approval among the Jews, he proceeded to seize Peter also. This happened during the Festival of Unleavened Bread. '
  '4':
  - type: text
    content: After arresting him, he put him in prison, handing him over to be guarded by four squads of four soldiers each. Herod intended to bring him out for public trial after the Passover.
  '5':
  - type: text
    content: So Peter was kept in prison, but the church was earnestly praying to God for him.
  '6':
  - type: text
    content: 'The night before Herod was to bring him to trial, Peter was sleeping between two soldiers, bound with two chains, and sentries stood guard at the entrance. '
  '7':
  - type: text
    content: Suddenly an angel of the Lord appeared and a light shone in the cell. He struck Peter on the side and woke him up. “Quick, get up!” he said, and the chains fell off Peter’s wrists.
  '8':
  - type: text
    content: 'Then the angel said to him, “Put on your clothes and sandals.” And Peter did so. “Wrap your cloak around you and follow me,” the angel told him. '
  '9':
  - type: text
    content: 'Peter followed him out of the prison, but he had no idea that what the angel was doing was really happening; he thought he was seeing a vision. '
