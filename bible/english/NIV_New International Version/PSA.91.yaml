document_id: PSA.91,111
type_code: eng
verses:
  '1':
  - type: heading
    content: Psalm 91
  - type: text
    content: Whoever dwells in the shelter of the Most High
  - type: text
    content: will rest in the shadow of the Almighty.
  - type: note
    content: Hebrew Shaddai
  '10':
  - type: text
    content: no harm will overtake you,
  - type: text
    content: no disaster will come near your tent.
  '11':
  - type: text
    content: For he will command his angels concerning you
  - type: text
    content: to guard you in all your ways;
  '12':
  - type: text
    content: they will lift you up in their hands,
  - type: text
    content: so that you will not strike your foot against a stone.
  '13':
  - type: text
    content: You will tread on the lion and the cobra;
  - type: text
    content: you will trample the great lion and the serpent.
  '14':
  - type: text
    content: “Because he
  - type: note
    content: That is, probably the king
  - type: text
    content: ' loves me,” says the '
  - type: text
    content: Lord
  - type: text
    content: ', “I will rescue him;'
  - type: text
    content: I will protect him, for he acknowledges my name.
  '15':
  - type: text
    content: He will call on me, and I will answer him;
  - type: text
    content: I will be with him in trouble,
  - type: text
    content: I will deliver him and honor him.
  '16':
  - type: text
    content: With long life I will satisfy him
  - type: text
    content: and show him my salvation.”
  '2':
  - type: text
    content: 'I will say of the '
  - type: text
    content: Lord
  - type: text
    content: ', “He is my refuge and my fortress,'
  - type: text
    content: my God, in whom I trust.”
  '3':
  - type: text
    content: Surely he will save you
  - type: text
    content: from the fowler’s snare
  - type: text
    content: and from the deadly pestilence.
  '4':
  - type: text
    content: He will cover you with his feathers,
  - type: text
    content: and under his wings you will find refuge;
  - type: text
    content: his faithfulness will be your shield and rampart.
  '5':
  - type: text
    content: You will not fear the terror of night,
  - type: text
    content: nor the arrow that flies by day,
  '6':
  - type: text
    content: nor the pestilence that stalks in the darkness,
  - type: text
    content: nor the plague that destroys at midday.
  '7':
  - type: text
    content: A thousand may fall at your side,
  - type: text
    content: ten thousand at your right hand,
  - type: text
    content: but it will not come near you.
  '8':
  - type: text
    content: You will only observe with your eyes
  - type: text
    content: and see the punishment of the wicked.
  '9':
  - type: text
    content: 'If you say, “The '
  - type: text
    content: Lord
  - type: text
    content: ' is my refuge,”'
  - type: text
    content: and you make the Most High your dwelling,
