document_id: PSA.91,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: cl
    children:
    - type: text
      text: Psalm 91
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Whoever dwells in the shelter of the Most High
  - type: usfm
    marker: q2
    children:
    - type: text
      text: will rest in the shadow of the Almighty.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '91:1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shaddai
      marker-yv: yv-n
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: no harm will overtake you,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: no disaster will come near your tent.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: For he will command his angels concerning you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to guard you in all your ways;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: they will lift you up in their hands,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that you will not strike your foot against a stone.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will tread on the lion and the cobra;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you will trample the great lion and the serpent.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “Because he
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '91:14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: That is, probably the king
      marker-yv: yv-n
    - type: text
      text: ' loves me,” says the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “I will rescue him;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will protect him, for he acknowledges my name.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will call on me, and I will answer him;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will be with him in trouble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will deliver him and honor him.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With long life I will satisfy him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and show him my salvation.”
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'I will say of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', “He is my refuge and my fortress,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my God, in whom I trust.”
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Surely he will save you
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from the fowler’s snare
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and from the deadly pestilence.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He will cover you with his feathers,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and under his wings you will find refuge;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: his faithfulness will be your shield and rampart.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will not fear the terror of night,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor the arrow that flies by day,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nor the pestilence that stalks in the darkness,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: nor the plague that destroys at midday.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A thousand may fall at your side,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: ten thousand at your right hand,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but it will not come near you.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You will only observe with your eyes
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and see the punishment of the wicked.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'If you say, “The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is my refuge,”'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and you make the Most High your dwelling,
