  children:
  - type: text
    text: Psalm 91
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Whoever dwells in the shelter of the Most High
- type: usfm
  marker: q2
  children:
  - type: text
    text: will rest in the shadow of the Almighty.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '91:1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shaddai
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'I will say of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “He is my refuge and my fortress,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: my God, in whom I trust.”
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Surely he will save you
- type: usfm
  marker: q2
  children:
  - type: text
    text: from the fowler’s snare
- type: usfm
  marker: q2
  children:
  - type: text
    text: and from the deadly pestilence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: He will cover you with his feathers,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and under his wings you will find refuge;
- type: usfm
  marker: q2
  children:
  - type: text
    text: his faithfulness will be your shield and rampart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: You will not fear the terror of night,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor the arrow that flies by day,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: nor the pestilence that stalks in the darkness,
- type: usfm
  marker: q2
  children:
  - type: text
    text: nor the plague that destroys at midday.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: A thousand may fall at your side,
- type: usfm
  marker: q2
  children:
  - type: text
    text: ten thousand at your right hand,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but it will not come near you.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: You will only observe with your eyes
- type: usfm
  marker: q2
  children:
  - type: text
    text: and see the punishment of the wicked.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'If you say, “The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' is my refuge,”'
- type: usfm
  marker: q2
  children:
  - type: text
    text: and you make the Most High your dwelling,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: no harm will overtake you,
- type: usfm
  marker: q2
  children:
  - type: text
    text: no disaster will come near your tent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: For he will command his angels concerning you
- type: usfm
  marker: q2
  children:
  - type: text
    text: to guard you in all your ways;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: they will lift you up in their hands,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that you will not strike your foot against a stone.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: You will tread on the lion and the cobra;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you will trample the great lion and the serpent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: “Because he
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '91:14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: That is, probably the king
    marker-yv: yv-n
  - type: text
    text: ' loves me,” says the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', “I will rescue him;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will protect him, for he acknowledges my name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He will call on me, and I will answer him;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will be with him in trouble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will deliver him and honor him.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: With long life I will satisfy him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and show him my salvation.”
