    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sovereign
    marker-yv: yv-n
  - type: text
    text: ' and the horn'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Horn '
    - type: usfm
      marker: ft
      children:
