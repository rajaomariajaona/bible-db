verses:
  '1':
  - type: heading
    content: David’s Song of Praise
  - type: text
    content: 'David sang to the '
  - type: text
    content: Lord
  - type: text
    content: ' the words of this song when the '
  - type: text
    content: Lord
  - type: text
    content: ' delivered him from the hand of all his enemies and from the hand of Saul. '
  '10':
  - type: text
    content: He parted the heavens and came down;
  - type: text
    content: dark clouds were under his feet.
  '11':
  - type: text
    content: He mounted the cherubim and flew;
  - type: text
    content: he soared
  - type: note
    content: Many Hebrew manuscripts (see also Psalm 18:10); most Hebrew manuscripts appeared
  - type: text
    content: ' on the wings of the wind.'
  '12':
  - type: text
    content: He made darkness his canopy around him—
  - type: text
    content: the dark
  - type: note
    content: Septuagint (see also Psalm 18:11); Hebrew massed
  - type: text
    content: ' rain clouds of the sky.'
  '13':
  - type: text
    content: Out of the brightness of his presence
  - type: text
    content: bolts of lightning blazed forth.
  '14':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' thundered from heaven;'
  - type: text
    content: the voice of the Most High resounded.
  '15':
  - type: text
    content: He shot his arrows and scattered the enemy,
  - type: text
    content: with great bolts of lightning he routed them.
  '16':
  - type: text
    content: The valleys of the sea were exposed
  - type: text
    content: and the foundations of the earth laid bare
  - type: text
    content: 'at the rebuke of the '
  - type: text
    content: Lord
  - type: text
    content: ','
  - type: text
    content: at the blast of breath from his nostrils.
  '17':
  - type: text
    content: “He reached down from on high and took hold of me;
  - type: text
    content: he drew me out of deep waters.
  '18':
  - type: text
    content: He rescued me from my powerful enemy,
  - type: text
    content: from my foes, who were too strong for me.
  '19':
  - type: text
    content: They confronted me in the day of my disaster,
  - type: text
    content: 'but the '
  - type: text
    content: Lord
  - type: text
    content: ' was my support.'
  '2':
  - type: text
    content: 'He said:'
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' is my rock, my fortress and my deliverer;'
  '20':
  - type: text
    content: He brought me out into a spacious place;
  - type: text
    content: he rescued me because he delighted in me.
  '21':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' has dealt with me according to my righteousness;'
  - type: text
    content: according to the cleanness of my hands he has rewarded me.
  '22':
  - type: text
    content: 'For I have kept the ways of the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: I am not guilty of turning from my God.
  '23':
  - type: text
    content: All his laws are before me;
  - type: text
    content: I have not turned away from his decrees.
  '24':
  - type: text
    content: I have been blameless before him
  - type: text
    content: and have kept myself from sin.
  '25':
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ' has rewarded me according to my righteousness,'
  - type: text
    content: according to my cleanness
  - type: note
    content: Hebrew; Septuagint and Vulgate (see also Psalm 18:24) to the cleanness of my hands
  - type: text
    content: ' in his sight.'
  '26':
  - type: text
    content: “To the faithful you show yourself faithful,
  - type: text
    content: to the blameless you show yourself blameless,
  '27':
  - type: text
    content: to the pure you show yourself pure,
  - type: text
    content: but to the devious you show yourself shrewd.
  '28':
  - type: text
    content: You save the humble,
  - type: text
    content: but your eyes are on the haughty to bring them low.
  '29':
  - type: text
    content: 'You, '
  - type: text
    content: Lord
  - type: text
    content: ', are my lamp;'
  - type: text
    content: 'the '
  - type: text
    content: Lord
  - type: text
    content: ' turns my darkness into light.'
  '3':
  - type: text
    content: my God is my rock, in whom I take refuge,
  - type: text
    content: my shield
  - type: note
    content: Or sovereign
  - type: text
    content: ' and the horn'
  - type: note
    content: Horn here symbolizes strength.
  - type: text
    content: ' of my salvation.'
  - type: text
    content: He is my stronghold, my refuge and my savior—
  - type: text
    content: from violent people you save me.
  '30':
  - type: text
    content: With your help I can advance against a troop
  - type: note
    content: Or can run through a barricade
  - type: text
    content: ;
  - type: text
    content: with my God I can scale a wall.
  '31':
  - type: text
    content: '“As for God, his way is perfect:'
  - type: text
    content: 'The '
  - type: text
    content: Lord
  - type: text
    content: ’s word is flawless;
  - type: text
    content: he shields all who take refuge in him.
  '32':
  - type: text
    content: 'For who is God besides the '
  - type: text
    content: Lord
  - type: text
    content: '?'
  - type: text
    content: And who is the Rock except our God?
  '33':
  - type: text
    content: It is God who arms me with strength
  - type: note
    content: Dead Sea Scrolls, some Septuagint manuscripts, Vulgate and Syriac (see also Psalm 18:32); Masoretic Text who is my strong refuge
  - type: text
    content: and keeps my way secure.
  '34':
  - type: text
    content: He makes my feet like the feet of a deer;
  - type: text
    content: he causes me to stand on the heights.
  '35':
  - type: text
    content: He trains my hands for battle;
  - type: text
    content: my arms can bend a bow of bronze.
  '36':
  - type: text
    content: You make your saving help my shield;
  - type: text
    content: your help has made
  - type: note
    content: Dead Sea Scrolls; Masoretic Text shield; / you stoop down to make
  - type: text
    content: ' me great.'
  '37':
  - type: text
    content: You provide a broad path for my feet,
  - type: text
    content: so that my ankles do not give way.
  '38':
  - type: text
    content: “I pursued my enemies and crushed them;
  - type: text
    content: I did not turn back till they were destroyed.
  '39':
  - type: text
    content: I crushed them completely, and they could not rise;
  - type: text
    content: they fell beneath my feet.
  '4':
  - type: text
    content: '“I called to the '
  - type: text
    content: Lord
  - type: text
    content: ', who is worthy of praise,'
  - type: text
    content: and have been saved from my enemies.
  '40':
  - type: text
    content: You armed me with strength for battle;
  - type: text
    content: you humbled my adversaries before me.
  '41':
  - type: text
    content: You made my enemies turn their backs in flight,
  - type: text
    content: and I destroyed my foes.
  '42':
  - type: text
    content: They cried for help, but there was no one to save them—
  - type: text
    content: 'to the '
  - type: text
    content: Lord
  - type: text
    content: ', but he did not answer.'
  '43':
  - type: text
    content: I beat them as fine as the dust of the earth;
  - type: text
    content: I pounded and trampled them like mud in the streets.
  '44':
  - type: text
    content: “You have delivered me from the attacks of the peoples;
  - type: text
    content: you have preserved me as the head of nations.
  - type: text
    content: People I did not know now serve me,
  '45':
  - type: text
    content: foreigners cower before me;
  - type: text
    content: as soon as they hear of me, they obey me.
  '46':
  - type: text
    content: They all lose heart;
  - type: text
    content: they come trembling
  - type: note
    content: Some Septuagint manuscripts and Vulgate (see also Psalm 18:45); Masoretic Text they arm themselves
  - type: text
    content: ' from their strongholds.'
  '47':
  - type: text
    content: '“The '
  - type: text
    content: Lord
  - type: text
    content: ' lives! Praise be to my Rock!'
  - type: text
    content: Exalted be my God, the Rock, my Savior!
  '48':
  - type: text
    content: He is the God who avenges me,
  - type: text
    content: who puts the nations under me,
  '49':
  - type: text
    content: who sets me free from my enemies.
  - type: text
    content: You exalted me above my foes;
  - type: text
    content: from a violent man you rescued me.
  '5':
  - type: text
    content: The waves of death swirled about me;
  - type: text
    content: the torrents of destruction overwhelmed me.
  '50':
  - type: text
    content: 'Therefore I will praise you, '
  - type: text
    content: Lord
  - type: text
    content: ', among the nations;'
  - type: text
    content: I will sing the praises of your name.
  '51':
  - type: text
    content: “He gives his king great victories;
  - type: text
    content: he shows unfailing kindness to his anointed,
  - type: text
    content: to David and his descendants forever.”
  '6':
  - type: text
    content: The cords of the grave coiled around me;
  - type: text
    content: the snares of death confronted me.
  '7':
  - type: text
    content: '“In my distress I called to the '
  - type: text
    content: Lord
  - type: text
    content: ;
  - type: text
    content: I called out to my God.
  - type: text
    content: From his temple he heard my voice;
  - type: text
    content: my cry came to his ears.
  '8':
  - type: text
    content: The earth trembled and quaked,
  - type: text
    content: the foundations of the heavens
  - type: note
    content: Hebrew; Vulgate and Syriac (see also Psalm 18:7) mountains
  - type: text
    content: ' shook;'
  - type: text
    content: they trembled because he was angry.
  '9':
  - type: text
    content: Smoke rose from his nostrils;
  - type: text
    content: consuming fire came from his mouth,
  - type: text
    content: burning coals blazed out of it.
