    text: And who is the Rock except our God?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: It is God who arms me with strength
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dead Sea Scrolls, some Septuagint manuscripts, Vulgate and Syriac (see also Psalm 18:32); Masoretic Text '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: who is my strong refuge
    marker-yv: yv-n
- type: usfm
  marker: q2
  children:
  - type: text
    text: and keeps my way secure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: He makes my feet like the feet of a deer;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he causes me to stand on the heights.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: He trains my hands for battle;
- type: usfm
  marker: q2
  children:
  - type: text
    text: my arms can bend a bow of bronze.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: You make your saving help my shield;
- type: usfm
  marker: q2
  children:
  - type: text
    text: your help has made
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dead Sea Scrolls; Masoretic Text '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: shield; / you stoop down to make
    marker-yv: yv-n
  - type: text
    text: ' me great.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: You provide a broad path for my feet,
- type: usfm
  marker: q2
  children:
  - type: text
    text: so that my ankles do not give way.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: “I pursued my enemies and crushed them;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I did not turn back till they were destroyed.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: I crushed them completely, and they could not rise;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they fell beneath my feet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: You armed me with strength for battle;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you humbled my adversaries before me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: You made my enemies turn their backs in flight,
- type: usfm
  marker: q2
  children:
  - type: text
    text: and I destroyed my foes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: They cried for help, but there was no one to save them—
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'to the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', but he did not answer.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: I beat them as fine as the dust of the earth;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I pounded and trampled them like mud in the streets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: “You have delivered me from the attacks of the peoples;
- type: usfm
  marker: q2
  children:
  - type: text
    text: you have preserved me as the head of nations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: People I did not know now serve me,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: foreigners cower before me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: as soon as they hear of me, they obey me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: They all lose heart;
- type: usfm
  marker: q2
  children:
  - type: text
    text: they come trembling
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:46 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Some Septuagint manuscripts and Vulgate (see also Psalm 18:45); Masoretic Text '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: they arm themselves
    marker-yv: yv-n
  - type: text
    text: ' from their strongholds.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' lives! Praise be to my Rock!'
- type: usfm
  marker: q2
  children:
  - type: text
    text: Exalted be my God, the Rock, my Savior!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: He is the God who avenges me,
- type: usfm
  marker: q2
  children:
  - type: text
    text: who puts the nations under me,
- type: usfm
  marker: q2
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: who sets me free from my enemies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: You exalted me above my foes;
- type: usfm
  marker: q2
  children:
  - type: text
    text: from a violent man you rescued me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Therefore I will praise you, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', among the nations;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: I will sing the praises of your name.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: “He gives his king great victories;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he shows unfailing kindness to his anointed,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to David and his descendants forever.”
