        text: 'Many Hebrew manuscripts (see also Psalm 18:10); most Hebrew manuscripts '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: appeared
    marker-yv: yv-n
  - type: text
    text: ' on the wings of the wind.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: He made darkness his canopy around him—
- type: usfm
  marker: q2
  children:
  - type: text
    text: the dark
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Septuagint (see also Psalm 18:11); Hebrew '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: massed
    marker-yv: yv-n
  - type: text
    text: ' rain clouds of the sky.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Out of the brightness of his presence
- type: usfm
  marker: q2
  children:
  - type: text
    text: bolts of lightning blazed forth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' thundered from heaven;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: the voice of the Most High resounded.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: He shot his arrows and scattered the enemy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: with great bolts of lightning he routed them.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: The valleys of the sea were exposed
- type: usfm
  marker: q2
  children:
  - type: text
    text: and the foundations of the earth laid bare
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'at the rebuke of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ','
- type: usfm
  marker: q2
  children:
  - type: text
    text: at the blast of breath from his nostrils.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: “He reached down from on high and took hold of me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he drew me out of deep waters.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: He rescued me from my powerful enemy,
- type: usfm
  marker: q2
  children:
  - type: text
    text: from my foes, who were too strong for me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: They confronted me in the day of my disaster,
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'but the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' was my support.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: He brought me out into a spacious place;
- type: usfm
  marker: q2
  children:
  - type: text
    text: he rescued me because he delighted in me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '“The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has dealt with me according to my righteousness;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: according to the cleanness of my hands he has rewarded me.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'For I have kept the ways of the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I am not guilty of turning from my God.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: All his laws are before me;
- type: usfm
  marker: q2
  children:
  - type: text
    text: I have not turned away from his decrees.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: I have been blameless before him
- type: usfm
  marker: q2
  children:
  - type: text
    text: and have kept myself from sin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'The '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' has rewarded me according to my righteousness,'
- type: usfm
  marker: q2
  children:
  - type: text
    text: according to my cleanness
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hebrew; Septuagint and Vulgate (see also Psalm 18:24) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: to the cleanness of my hands
    marker-yv: yv-n
  - type: text
    text: ' in his sight.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: “To the faithful you show yourself faithful,
- type: usfm
  marker: q2
  children:
  - type: text
    text: to the blameless you show yourself blameless,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: to the pure you show yourself pure,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but to the devious you show yourself shrewd.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: You save the humble,
- type: usfm
  marker: q2
  children:
  - type: text
    text: but your eyes are on the haughty to bring them low.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'You, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ', are my lamp;'
- type: usfm
  marker: q2
  children:
  - type: text
    text: 'the '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Lord
  - type: text
    text: ' turns my darkness into light.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: With your help I can advance against a troop
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22:30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Or '
    - type: usfm
