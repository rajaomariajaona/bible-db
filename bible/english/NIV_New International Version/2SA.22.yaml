document_id: 2SA.22,111
type_code: eng
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David’s Song of Praise
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David sang to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' the words of this song when the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' delivered him from the hand of all his enemies and from the hand of Saul. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He parted the heavens and came down;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: dark clouds were under his feet.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He mounted the cherubim and flew;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he soared
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Many Hebrew manuscripts (see also Psalm 18:10); most Hebrew manuscripts '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: appeared
      marker-yv: yv-n
    - type: text
      text: ' on the wings of the wind.'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He made darkness his canopy around him—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the dark
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Septuagint (see also Psalm 18:11); Hebrew '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: massed
      marker-yv: yv-n
    - type: text
      text: ' rain clouds of the sky.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Out of the brightness of his presence
  - type: usfm
    marker: q2
    children:
    - type: text
      text: bolts of lightning blazed forth.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' thundered from heaven;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the voice of the Most High resounded.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He shot his arrows and scattered the enemy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with great bolts of lightning he routed them.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The valleys of the sea were exposed
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and the foundations of the earth laid bare
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'at the rebuke of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ','
  - type: usfm
    marker: q2
    children:
    - type: text
      text: at the blast of breath from his nostrils.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He reached down from on high and took hold of me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he drew me out of deep waters.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He rescued me from my powerful enemy,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from my foes, who were too strong for me.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They confronted me in the day of my disaster,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'but the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' was my support.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'He said:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' is my rock, my fortress and my deliverer;'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He brought me out into a spacious place;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he rescued me because he delighted in me.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has dealt with me according to my righteousness;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: according to the cleanness of my hands he has rewarded me.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For I have kept the ways of the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I am not guilty of turning from my God.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: All his laws are before me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I have not turned away from his decrees.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I have been blameless before him
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have kept myself from sin.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' has rewarded me according to my righteousness,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: according to my cleanness
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew; Septuagint and Vulgate (see also Psalm 18:24) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: to the cleanness of my hands
      marker-yv: yv-n
    - type: text
      text: ' in his sight.'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “To the faithful you show yourself faithful,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to the blameless you show yourself blameless,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: to the pure you show yourself pure,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but to the devious you show yourself shrewd.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You save the humble,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: but your eyes are on the haughty to bring them low.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'You, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', are my lamp;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' turns my darkness into light.'
  '3':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my God is my rock, in whom I take refuge,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my shield
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sovereign
      marker-yv: yv-n
    - type: text
      text: ' and the horn'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Horn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: here symbolizes strength.
      marker-yv: yv-n
    - type: text
      text: ' of my salvation.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is my stronghold, my refuge and my savior—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from violent people you save me.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: With your help I can advance against a troop
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Or '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: can run through a barricade
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: with my God I can scale a wall.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“As for God, his way is perfect:'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ’s word is flawless;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he shields all who take refuge in him.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'For who is God besides the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: '?'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: And who is the Rock except our God?
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: It is God who arms me with strength
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dead Sea Scrolls, some Septuagint manuscripts, Vulgate and Syriac (see also Psalm 18:32); Masoretic Text '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: who is my strong refuge
      marker-yv: yv-n
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and keeps my way secure.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He makes my feet like the feet of a deer;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he causes me to stand on the heights.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He trains my hands for battle;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my arms can bend a bow of bronze.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You make your saving help my shield;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: your help has made
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dead Sea Scrolls; Masoretic Text '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: shield; / you stoop down to make
      marker-yv: yv-n
    - type: text
      text: ' me great.'
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You provide a broad path for my feet,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: so that my ankles do not give way.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “I pursued my enemies and crushed them;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I did not turn back till they were destroyed.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I crushed them completely, and they could not rise;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they fell beneath my feet.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“I called to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', who is worthy of praise,'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and have been saved from my enemies.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You armed me with strength for battle;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you humbled my adversaries before me.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You made my enemies turn their backs in flight,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: and I destroyed my foes.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They cried for help, but there was no one to save them—
  - type: usfm
    marker: q2
    children:
    - type: text
      text: 'to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', but he did not answer.'
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: I beat them as fine as the dust of the earth;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I pounded and trampled them like mud in the streets.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “You have delivered me from the attacks of the peoples;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: you have preserved me as the head of nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: People I did not know now serve me,
  '45':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: foreigners cower before me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: as soon as they hear of me, they obey me.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: They all lose heart;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they come trembling
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:46 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Some Septuagint manuscripts and Vulgate (see also Psalm 18:45); Masoretic Text '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: they arm themselves
      marker-yv: yv-n
    - type: text
      text: ' from their strongholds.'
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“The '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ' lives! Praise be to my Rock!'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: Exalted be my God, the Rock, my Savior!
  '48':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: He is the God who avenges me,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who puts the nations under me,
  '49':
  - type: usfm
    marker: q2
    children:
    - type: text
      text: who sets me free from my enemies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: You exalted me above my foes;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: from a violent man you rescued me.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The waves of death swirled about me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the torrents of destruction overwhelmed me.
  '50':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Therefore I will praise you, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ', among the nations;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I will sing the praises of your name.
  '51':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: “He gives his king great victories;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: he shows unfailing kindness to his anointed,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: to David and his descendants forever.”
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The cords of the grave coiled around me;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the snares of death confronted me.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '“In my distress I called to the '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Lord
    - type: text
      text: ;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: I called out to my God.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: From his temple he heard my voice;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: my cry came to his ears.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: The earth trembled and quaked,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: the foundations of the heavens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22:8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hebrew; Vulgate and Syriac (see also Psalm 18:7) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mountains
      marker-yv: yv-n
    - type: text
      text: ' shook;'
  - type: usfm
    marker: q2
    children:
    - type: text
      text: they trembled because he was angry.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Smoke rose from his nostrils;
  - type: usfm
    marker: q2
    children:
    - type: text
      text: consuming fire came from his mouth,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: burning coals blazed out of it.
